document_id: ZEP.3,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jerusalem’s Rebellion and Redemption
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: What sorrow awaits rebellious, polluted Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the city of violence and crime!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: My scattered people who live beyond the rivers of Ethiopia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Cush.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will come to present their offerings.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: On that day you will no longer need to be ashamed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you will no longer be rebels against me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will remove all proud and arrogant people from among you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There will be no more haughtiness on my holy mountain.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Those who are left will be the lowly and humble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for it is they who trust in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: The remnant of Israel will do no wrong;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will never tell lies or deceive one another.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will eat and sleep in safety,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one will make them afraid.”
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Sing, O daughter of Zion;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shout aloud, O Israel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be glad and rejoice with all your heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O daughter of Jerusalem!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will remove his hand of judgment'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will disperse the armies of your enemy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: 'Lord '
    - type: text
      text: himself, the King of Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will live among you!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At last your troubles will be over,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will never again fear disaster.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: On that day the announcement to Jerusalem will be,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Cheer up, Zion! Don’t be afraid!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is living among you.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He is a mighty savior.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will take delight in you with gladness.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With his love, he will calm all your fears.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'He will be silent in his love. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek and Syriac versions read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: He will renew you with his love.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will rejoice over you with joyful songs.”
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “I will gather you who mourn for the appointed festivals;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will be disgraced no more.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this verse is uncertain.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: And I will deal severely with all who have oppressed you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will save the weak and helpless ones;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will bring together
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who were chased away.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will give glory and fame to my former exiles,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wherever they have been mocked and shamed.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: No one can tell it anything;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it refuses all correction.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It does not trust in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or draw near to its God.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: On that day I will gather you together
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bring you home again.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will give you a good name, a name of distinction,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: among all the nations of the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as I restore your fortunes before their very eyes.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!”'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Its leaders are like roaring lions
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hunting for their victims.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Its judges are like ravenous wolves at evening time,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who by dawn have left no trace of their prey.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Its prophets are arrogant liars seeking their own gain.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Its priests defile the Temple by disobeying God’s instructions.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is still there in the city,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he does no wrong.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Day by day he hands down justice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he does not fail.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the wicked know no shame.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “I have wiped out many nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: devastating their fortress walls and towers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their streets are now deserted;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their cities lie in silent ruin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There are no survivors—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: none at all.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: I thought, ‘Surely they will have reverence for me now!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Surely they will listen to my warnings.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I won’t need to strike again,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: destroying their homes.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But no, they get up early
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to continue their evil deeds.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Therefore, be patient,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Soon I will stand and accuse these evil nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I have decided to gather the kingdoms of the earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and pour out my fiercest anger and fury on them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the earth will be devoured
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by the fire of my jealousy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “Then I will purify the speech of all people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'so that everyone can worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' together.'
