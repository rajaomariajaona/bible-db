document_id: ZEP.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem’s Rebellion and Redemption
  - type: text
    content: What sorrow awaits rebellious, polluted Jerusalem,
  - type: text
    content: the city of violence and crime!
  '10':
  - type: text
    content: My scattered people who live beyond the rivers of Ethiopia
  - type: note
    content: Hebrew Cush.
  - type: text
    content: will come to present their offerings.
  '11':
  - type: text
    content: On that day you will no longer need to be ashamed,
  - type: text
    content: for you will no longer be rebels against me.
  - type: text
    content: I will remove all proud and arrogant people from among you.
  - type: text
    content: There will be no more haughtiness on my holy mountain.
  '12':
  - type: text
    content: Those who are left will be the lowly and humble,
  - type: text
    content: 'for it is they who trust in the name of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '13':
  - type: text
    content: The remnant of Israel will do no wrong;
  - type: text
    content: they will never tell lies or deceive one another.
  - type: text
    content: They will eat and sleep in safety,
  - type: text
    content: and no one will make them afraid.”
  '14':
  - type: text
    content: Sing, O daughter of Zion;
  - type: text
    content: shout aloud, O Israel!
  - type: text
    content: Be glad and rejoice with all your heart,
  - type: text
    content: O daughter of Jerusalem!
  '15':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' will remove his hand of judgment'
  - type: text
    content: and will disperse the armies of your enemy.
  - type: text
    content: 'And the '
  - type: text
    content: 'Lord '
  - type: text
    content: himself, the King of Israel,
  - type: text
    content: will live among you!
  - type: text
    content: At last your troubles will be over,
  - type: text
    content: and you will never again fear disaster.
  '16':
  - type: text
    content: On that day the announcement to Jerusalem will be,
  - type: text
    content: “Cheer up, Zion! Don’t be afraid!
  '17':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is living among you.'
  - type: text
    content: He is a mighty savior.
  - type: text
    content: He will take delight in you with gladness.
  - type: text
    content: With his love, he will calm all your fears.
  - type: note
    content: Or He will be silent in his love. Greek and Syriac versions read He will renew you with his love.
  - type: text
    content: He will rejoice over you with joyful songs.”
  '18':
  - type: text
    content: “I will gather you who mourn for the appointed festivals;
  - type: text
    content: you will be disgraced no more.
  - type: note
    content: The meaning of the Hebrew for this verse is uncertain.
  '19':
  - type: text
    content: And I will deal severely with all who have oppressed you.
  - type: text
    content: I will save the weak and helpless ones;
  - type: text
    content: I will bring together
  - type: text
    content: those who were chased away.
  - type: text
    content: I will give glory and fame to my former exiles,
  - type: text
    content: wherever they have been mocked and shamed.
  '2':
  - type: text
    content: No one can tell it anything;
  - type: text
    content: it refuses all correction.
  - type: text
    content: 'It does not trust in the '
  - type: text
    content: Lord
  - type: text
    content: or draw near to its God.
  '20':
  - type: text
    content: On that day I will gather you together
  - type: text
    content: and bring you home again.
  - type: text
    content: I will give you a good name, a name of distinction,
  - type: text
    content: among all the nations of the earth,
  - type: text
    content: as I restore your fortunes before their very eyes.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  '3':
  - type: text
    content: Its leaders are like roaring lions
  - type: text
    content: hunting for their victims.
  - type: text
    content: Its judges are like ravenous wolves at evening time,
  - type: text
    content: who by dawn have left no trace of their prey.
  '4':
  - type: text
    content: Its prophets are arrogant liars seeking their own gain.
  - type: text
    content: Its priests defile the Temple by disobeying God’s instructions.
  '5':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' is still there in the city,'
  - type: text
    content: and he does no wrong.
  - type: text
    content: Day by day he hands down justice,
  - type: text
    content: and he does not fail.
  - type: text
    content: But the wicked know no shame.
  '6':
  - type: text
    content: “I have wiped out many nations,
  - type: text
    content: devastating their fortress walls and towers.
  - type: text
    content: Their streets are now deserted;
  - type: text
    content: their cities lie in silent ruin.
  - type: text
    content: There are no survivors—
  - type: text
    content: none at all.
  '7':
  - type: text
    content: I thought, ‘Surely they will have reverence for me now!
  - type: text
    content: Surely they will listen to my warnings.
  - type: text
    content: Then I won’t need to strike again,
  - type: text
    content: destroying their homes.’
  - type: text
    content: But no, they get up early
  - type: text
    content: to continue their evil deeds.
  '8':
  - type: text
    content: 'Therefore, be patient,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Soon I will stand and accuse these evil nations.
  - type: text
    content: For I have decided to gather the kingdoms of the earth
  - type: text
    content: and pour out my fiercest anger and fury on them.
  - type: text
    content: All the earth will be devoured
  - type: text
    content: by the fire of my jealousy.
  '9':
  - type: text
    content: “Then I will purify the speech of all people,
  - type: text
    content: 'so that everyone can worship the '
  - type: text
    content: Lord
  - type: text
    content: ' together.'
