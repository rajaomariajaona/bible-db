document_id: ECC.4,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Again, I observed all the oppression that takes place under the sun. I saw the tears of the oppressed, with no one to comfort them. The oppressors have great power, and their victims are helpless. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'If one person falls, the other can reach out and help. But someone who falls alone is in real trouble. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Likewise, two people lying close together can keep each other warm. But how can one be warm alone? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: A person standing alone can be attacked and defeated, but two can stand back-to-back and conquer. Three are even better, for a triple-braided cord is not easily broken.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Futility of Political Power
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'It is better to be a poor but wise youth than an old and foolish king who refuses all advice. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Such a youth could rise from poverty and succeed. He might even become king, though he has been in prison. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: But then everyone rushes to the side of yet another youth
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the second youth.
      marker-yv: yv-n
    - type: text
      text: ' who replaces him. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Endless crowds stand around him,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: There is no end to all the people, to all those who are before them.
      marker-yv: yv-n
    - type: text
      text: ' but then another generation grows up and rejects him, too. So it is all meaningless—like chasing the wind.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'So I concluded that the dead are better off than the living. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: But most fortunate of all are those who are not yet born. For they have not seen all the evil that is done under the sun.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Then I observed that most people are motivated to success because they envy their neighbors. But this, too, is meaningless—like chasing the wind.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “Fools fold their idle hands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leading them to ruin.”
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: And yet,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Better to have one handful with quietness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than two handfuls with hard work
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and chasing the wind.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Advantages of Companionship
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'I observed yet another example of something meaningless under the sun. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: This is the case of a man who is all alone, without a child or a brother, yet who works hard to gain as much wealth as he can. But then he asks himself, “Who am I working for? Why am I giving up so much pleasure now?” It is all so meaningless and depressing.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Two people are better off than one, for they can help each other succeed. '
