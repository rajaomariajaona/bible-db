document_id: ECC.4,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'Again, I observed all the oppression that takes place under the sun. I saw the tears of the oppressed, with no one to comfort them. The oppressors have great power, and their victims are helpless. '
  '10':
  - type: text
    content: 'If one person falls, the other can reach out and help. But someone who falls alone is in real trouble. '
  '11':
  - type: text
    content: 'Likewise, two people lying close together can keep each other warm. But how can one be warm alone? '
  '12':
  - type: text
    content: A person standing alone can be attacked and defeated, but two can stand back-to-back and conquer. Three are even better, for a triple-braided cord is not easily broken.
  - type: heading
    content: The Futility of Political Power
  '13':
  - type: text
    content: 'It is better to be a poor but wise youth than an old and foolish king who refuses all advice. '
  '14':
  - type: text
    content: 'Such a youth could rise from poverty and succeed. He might even become king, though he has been in prison. '
  '15':
  - type: text
    content: But then everyone rushes to the side of yet another youth
  - type: note
    content: Hebrew the second youth.
  - type: text
    content: ' who replaces him. '
  '16':
  - type: text
    content: Endless crowds stand around him,
  - type: note
    content: Hebrew There is no end to all the people, to all those who are before them.
  - type: text
    content: ' but then another generation grows up and rejects him, too. So it is all meaningless—like chasing the wind.'
  '2':
  - type: text
    content: 'So I concluded that the dead are better off than the living. '
  '3':
  - type: text
    content: But most fortunate of all are those who are not yet born. For they have not seen all the evil that is done under the sun.
  '4':
  - type: text
    content: Then I observed that most people are motivated to success because they envy their neighbors. But this, too, is meaningless—like chasing the wind.
  '5':
  - type: text
    content: “Fools fold their idle hands,
  - type: text
    content: leading them to ruin.”
  '6':
  - type: text
    content: And yet,
  - type: text
    content: “Better to have one handful with quietness
  - type: text
    content: than two handfuls with hard work
  - type: text
    content: and chasing the wind.”
  - type: heading
    content: The Advantages of Companionship
  '7':
  - type: text
    content: 'I observed yet another example of something meaningless under the sun. '
  '8':
  - type: text
    content: This is the case of a man who is all alone, without a child or a brother, yet who works hard to gain as much wealth as he can. But then he asks himself, “Who am I working for? Why am I giving up so much pleasure now?” It is all so meaningless and depressing.
  '9':
  - type: text
    content: 'Two people are better off than one, for they can help each other succeed. '
