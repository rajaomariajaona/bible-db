document_id: JER.23,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Righteous Descendant
  - type: text
    content: '“What sorrow awaits the leaders of my people—the shepherds of my sheep—for they have destroyed and scattered the very ones they were expected to care for,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '10':
  - type: text
    content: For the land is full of adultery,
  - type: text
    content: and it lies under a curse.
  - type: text
    content: The land itself is in mourning—
  - type: text
    content: its wilderness pastures are dried up.
  - type: text
    content: For they all do evil
  - type: text
    content: and abuse what power they have.
  '11':
  - type: text
    content: “Even the priests and prophets
  - type: text
    content: are ungodly, wicked men.
  - type: text
    content: I have seen their despicable acts
  - type: text
    content: right here in my own Temple,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: “Therefore, the paths they take
  - type: text
    content: will become slippery.
  - type: text
    content: They will be chased through the dark,
  - type: text
    content: and there they will fall.
  - type: text
    content: For I will bring disaster upon them
  - type: text
    content: at the time fixed for their punishment.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!'
  '13':
  - type: text
    content: “I saw that the prophets of Samaria were terribly evil,
  - type: text
    content: for they prophesied in the name of Baal
  - type: text
    content: and led my people of Israel into sin.
  '14':
  - type: text
    content: But now I see that the prophets of Jerusalem are even worse!
  - type: text
    content: They commit adultery and love dishonesty.
  - type: text
    content: They encourage those who are doing evil
  - type: text
    content: so that no one turns away from their sins.
  - type: text
    content: These prophets are as wicked
  - type: text
    content: as the people of Sodom and Gomorrah once were.”
  '15':
  - type: text
    content: 'Therefore, this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says concerning the prophets:'
  - type: text
    content: “I will feed them with bitterness
  - type: text
    content: and give them poison to drink.
  - type: text
    content: For it is because of Jerusalem’s prophets
  - type: text
    content: that wickedness has filled this land.”
  '16':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says to his people:'
  - type: text
    content: “Do not listen to these prophets when they prophesy to you,
  - type: text
    content: filling you with futile hopes.
  - type: text
    content: They are making up everything they say.
  - type: text
    content: 'They do not speak for the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '17':
  - type: text
    content: They keep saying to those who despise my word,
  - type: text
    content: '‘Don’t worry! The '
  - type: text
    content: Lord
  - type: text
    content: ' says you will have peace!’'
  - type: text
    content: And to those who stubbornly follow their own desires,
  - type: text
    content: they say, ‘No harm will come your way!’
  '18':
  - type: text
    content: '“Have any of these prophets been in the '
  - type: text
    content: Lord
  - type: text
    content: ’s presence
  - type: text
    content: to hear what he is really saying?
  - type: text
    content: Has even one of them cared enough to listen?
  '19':
  - type: text
    content: 'Look! The '
  - type: text
    content: Lord
  - type: text
    content: ’s anger bursts out like a storm,
  - type: text
    content: a whirlwind that swirls down on the heads of the wicked.
  '2':
  - type: text
    content: 'Therefore, this is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says to these shepherds: “Instead of caring for my flock and leading them to safety, you have deserted them and driven them to destruction. Now I will pour out judgment on you for the evil you have done to them. '
  '20':
  - type: text
    content: 'The anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' will not diminish'
  - type: text
    content: until it has finished all he has planned.
  - type: text
    content: In the days to come
  - type: text
    content: you will understand all this very clearly.
  '21':
  - type: text
    content: “I have not sent these prophets,
  - type: text
    content: yet they run around claiming to speak for me.
  - type: text
    content: I have given them no message,
  - type: text
    content: yet they go on prophesying.
  '22':
  - type: text
    content: If they had stood before me and listened to me,
  - type: text
    content: they would have spoken my words,
  - type: text
    content: and they would have turned my people
  - type: text
    content: from their evil ways and deeds.
  '23':
  - type: text
    content: 'Am I a God who is only close at hand?” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “No, I am far away at the same time.
  '24':
  - type: text
    content: Can anyone hide from me in a secret place?
  - type: text
    content: Am I not everywhere in all the heavens and earth?”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '25':
  - type: text
    content: '“I have heard these prophets say, ‘Listen to the dream I had from God last night.’ And then they proceed to tell lies in my name. '
  '26':
  - type: text
    content: 'How long will this go on? If they are prophets, they are prophets of deceit, inventing everything they say. '
  '27':
  - type: text
    content: By telling these false dreams, they are trying to get my people to forget me, just as their ancestors did by worshiping the idols of Baal.
  '28':
  - type: text
    content: “Let these false prophets tell their dreams,
  - type: text
    content: but let my true messengers faithfully proclaim my every word.
  - type: text
    content: There is a difference between straw and grain!
  '29':
  - type: text
    content: Does not my word burn like fire?”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Is it not like a mighty hammer
  - type: text
    content: that smashes a rock to pieces?
  '3':
  - type: text
    content: 'But I will gather together the remnant of my flock from the countries where I have driven them. I will bring them back to their own sheepfold, and they will be fruitful and increase in number. '
  '30':
  - type: text
    content: '“Therefore,” says the '
  - type: text
    content: Lord
  - type: text
    content: ', “I am against these prophets who steal messages from each other and claim they are from me. '
  '31':
  - type: text
    content: 'I am against these smooth-tongued prophets who say, ‘This prophecy is from the '
  - type: text
    content: Lord
  - type: text
    content: '!’ '
  '32':
  - type: text
    content: 'I am against these false prophets. Their imaginary dreams are flagrant lies that lead my people into sin. I did not send or appoint them, and they have no message at all for my people. I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!'
  - type: heading
    content: False Prophecies and False Prophets
  '33':
  - type: text
    content: '“Suppose one of the people or one of the prophets or priests asks you, ‘What prophecy has the '
  - type: text
    content: Lord
  - type: text
    content: ' burdened you with now?’ You must reply, ‘You are the burden!'
  - type: note
    content: As in Greek version and Latin Vulgate; Hebrew reads What burden?
  - type: text
    content: ' The '
  - type: text
    content: Lord
  - type: text
    content: ' says he will abandon you!’'
  '34':
  - type: text
    content: '“If any prophet, priest, or anyone else says, ‘I have a prophecy from the '
  - type: text
    content: Lord
  - type: text
    content: ',’ I will punish that person along with his entire family. '
  '35':
  - type: text
    content: 'You should keep asking each other, ‘What is the '
  - type: text
    content: Lord
  - type: text
    content: '’s answer?’ or ‘What is the '
  - type: text
    content: Lord
  - type: text
    content: ' saying?’ '
  '36':
  - type: text
    content: 'But stop using this phrase, ‘prophecy from the '
  - type: text
    content: Lord
  - type: text
    content: '.’ For people are using it to give authority to their own ideas, turning upside down the words of our God, the living God, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  '37':
  - type: text
    content: '“This is what you should say to the prophets: ‘What is the '
  - type: text
    content: Lord
  - type: text
    content: '’s answer?’ or ‘What is the '
  - type: text
    content: Lord
  - type: text
    content: ' saying?’ '
  '38':
  - type: text
    content: 'But suppose they respond, ‘This is a prophecy from the '
  - type: text
    content: Lord
  - type: text
    content: '!’ Then you should say, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Because you have used this phrase, “prophecy from the '
  - type: text
    content: Lord
  - type: text
    content: ',” even though I warned you not to use it, '
  '39':
  - type: text
    content: I will forget you completely.
  - type: note
    content: Some Hebrew manuscripts and Greek version read I will surely lift you up.
  - type: text
    content: ' I will expel you from my presence, along with this city that I gave to you and your ancestors. '
  '4':
  - type: text
    content: 'Then I will appoint responsible shepherds who will care for them, and they will never be afraid again. Not a single one will be lost or missing. I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!'
  '40':
  - type: text
    content: And I will make you an object of ridicule, and your name will be infamous throughout the ages.’”
  '5':
  - type: text
    content: “For the time is coming,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “when I will raise up a righteous descendant
  - type: note
    content: Hebrew a righteous branch.
  - type: text
    content: from King David’s line.
  - type: text
    content: He will be a King who rules with wisdom.
  - type: text
    content: He will do what is just and right throughout the land.
  '6':
  - type: text
    content: 'And this will be his name:'
  - type: text
    content: '‘The '
  - type: text
    content: Lord
  - type: text
    content: ' Is Our Righteousness.’'
  - type: note
    content: Hebrew Yahweh Tsidqenu.
  - type: text
    content: In that day Judah will be saved,
  - type: text
    content: and Israel will live in safety.
  '7':
  - type: text
    content: '“In that day,” says the '
  - type: text
    content: Lord
  - type: text
    content: ', “when people are taking an oath, they will no longer say, ‘As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, who rescued the people of Israel from the land of Egypt.’ '
  '8':
  - type: text
    content: 'Instead, they will say, ‘As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, who brought the people of Israel back to their own land from the land of the north and from all the countries to which he had exiled them.’ Then they will live in their own land.”'
  - type: heading
    content: Judgment on False Prophets
  '9':
  - type: text
    content: My heart is broken because of the false prophets,
  - type: text
    content: and my bones tremble.
  - type: text
    content: I stagger like a drunkard,
  - type: text
    content: like someone overcome by wine,
  - type: text
    content: because of the holy words
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken against them.'
