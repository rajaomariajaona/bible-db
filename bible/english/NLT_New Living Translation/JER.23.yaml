document_id: JER.23,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Righteous Descendant
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“What sorrow awaits the leaders of my people—the shepherds of my sheep—for they have destroyed and scattered the very ones they were expected to care for,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the land is full of adultery,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and it lies under a curse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The land itself is in mourning—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: its wilderness pastures are dried up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they all do evil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and abuse what power they have.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Even the priests and prophets
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are ungodly, wicked men.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have seen their despicable acts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: right here in my own Temple,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Therefore, the paths they take
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will become slippery.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will be chased through the dark,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there they will fall.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I will bring disaster upon them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the time fixed for their punishment.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I saw that the prophets of Samaria were terribly evil,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for they prophesied in the name of Baal
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and led my people of Israel into sin.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But now I see that the prophets of Jerusalem are even worse!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They commit adultery and love dishonesty.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They encourage those who are doing evil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that no one turns away from their sins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These prophets are as wicked
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as the people of Sodom and Gomorrah once were.”
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Therefore, this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies says concerning the prophets:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will feed them with bitterness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and give them poison to drink.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For it is because of Jerusalem’s prophets
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that wickedness has filled this land.”
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies says to his people:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do not listen to these prophets when they prophesy to you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: filling you with futile hopes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are making up everything they say.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They do not speak for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They keep saying to those who despise my word,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '‘Don’t worry! The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says you will have peace!’'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to those who stubbornly follow their own desires,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they say, ‘No harm will come your way!’
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Have any of these prophets been in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s presence
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to hear what he is really saying?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Has even one of them cared enough to listen?
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Look! The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger bursts out like a storm,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a whirlwind that swirls down on the heads of the wicked.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says to these shepherds: “Instead of caring for my flock and leading them to safety, you have deserted them and driven them to destruction. Now I will pour out judgment on you for the evil you have done to them. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will not diminish'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until it has finished all he has planned.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the days to come
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will understand all this very clearly.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I have not sent these prophets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet they run around claiming to speak for me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have given them no message,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet they go on prophesying.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If they had stood before me and listened to me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they would have spoken my words,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and they would have turned my people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from their evil ways and deeds.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Am I a God who is only close at hand?” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “No, I am far away at the same time.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can anyone hide from me in a secret place?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Am I not everywhere in all the heavens and earth?”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I have heard these prophets say, ‘Listen to the dream I had from God last night.’ And then they proceed to tell lies in my name. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'How long will this go on? If they are prophets, they are prophets of deceit, inventing everything they say. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: By telling these false dreams, they are trying to get my people to forget me, just as their ancestors did by worshiping the idols of Baal.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Let these false prophets tell their dreams,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but let my true messengers faithfully proclaim my every word.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There is a difference between straw and grain!
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Does not my word burn like fire?”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Is it not like a mighty hammer
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that smashes a rock to pieces?
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I will gather together the remnant of my flock from the countries where I have driven them. I will bring them back to their own sheepfold, and they will be fruitful and increase in number. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Therefore,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “I am against these prophets who steal messages from each other and claim they are from me. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I am against these smooth-tongued prophets who say, ‘This prophecy is from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!’ '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I am against these false prophets. Their imaginary dreams are flagrant lies that lead my people into sin. I did not send or appoint them, and they have no message at all for my people. I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: False Prophecies and False Prophets
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Suppose one of the people or one of the prophets or priests asks you, ‘What prophecy has the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' burdened you with now?’ You must reply, ‘You are the burden!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version and Latin Vulgate; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: What burden?
      marker-yv: yv-n
    - type: text
      text: ' The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says he will abandon you!’'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If any prophet, priest, or anyone else says, ‘I have a prophecy from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ',’ I will punish that person along with his entire family. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You should keep asking each other, ‘What is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s answer?’ or ‘What is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' saying?’ '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But stop using this phrase, ‘prophecy from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '.’ For people are using it to give authority to their own ideas, turning upside down the words of our God, the living God, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is what you should say to the prophets: ‘What is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s answer?’ or ‘What is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' saying?’ '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But suppose they respond, ‘This is a prophecy from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!’ Then you should say, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: Because you have used this phrase, “prophecy from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ',” even though I warned you not to use it, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will forget you completely.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Hebrew manuscripts and Greek version read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: I will surely lift you up.
      marker-yv: yv-n
    - type: text
      text: ' I will expel you from my presence, along with this city that I gave to you and your ancestors. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I will appoint responsible shepherds who will care for them, and they will never be afraid again. Not a single one will be lost or missing. I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I will make you an object of ridicule, and your name will be infamous throughout the ages.’”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For the time is coming,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “when I will raise up a righteous descendant
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a righteous branch.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from King David’s line.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will be a King who rules with wisdom.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will do what is just and right throughout the land.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And this will be his name:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '‘The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Is Our Righteousness.’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Yahweh Tsidqenu.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In that day Judah will be saved,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Israel will live in safety.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“In that day,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “when people are taking an oath, they will no longer say, ‘As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives, who rescued the people of Israel from the land of Egypt.’ '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Instead, they will say, ‘As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives, who brought the people of Israel back to their own land from the land of the north and from all the countries to which he had exiled them.’ Then they will live in their own land.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judgment on False Prophets
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heart is broken because of the false prophets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my bones tremble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I stagger like a drunkard,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like someone overcome by wine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because of the holy words
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has spoken against them.'
