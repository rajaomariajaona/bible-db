document_id: MRK.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Heals on the Sabbath
  - type: text
    content: 'Jesus went into the synagogue again and noticed a man with a deformed hand. '
  '10':
  - type: text
    content: 'He had healed many people that day, so all the sick people eagerly pushed forward to touch him. '
  '11':
  - type: text
    content: And whenever those possessed by evil
  - type: note
    content: Greek unclean; also in 3:30.
  - type: text
    content: ' spirits caught sight of him, the spirits would throw them to the ground in front of him shrieking, “You are the Son of God!” '
  '12':
  - type: text
    content: But Jesus sternly commanded the spirits not to reveal who he was.
  - type: heading
    content: Jesus Chooses the Twelve Apostles
  '13':
  - type: text
    content: 'Afterward Jesus went up on a mountain and called out the ones he wanted to go with him. And they came to him. '
  '14':
  - type: text
    content: Then he appointed twelve of them and called them his apostles.
  - type: note
    content: Some manuscripts do not include and called them his apostles.
  - type: text
    content: ' They were to accompany him, and he would send them out to preach, '
  '15':
  - type: text
    content: 'giving them authority to cast out demons. '
  '16':
  - type: text
    content: 'These are the twelve he chose:'
  - type: text
    content: Simon (whom he named Peter),
  '17':
  - type: text
    content: James and John (the sons of Zebedee, but Jesus nicknamed them “Sons of Thunder”
  - type: note
    content: Greek whom he named Boanerges, which means Sons of Thunder.
  - type: text
    content: ),
  '18':
  - type: text
    content: Andrew,
  - type: text
    content: Philip,
  - type: text
    content: Bartholomew,
  - type: text
    content: Matthew,
  - type: text
    content: Thomas,
  - type: text
    content: James (son of Alphaeus),
  - type: text
    content: Thaddaeus,
  - type: text
    content: Simon (the zealot
  - type: note
    content: Greek the Cananean, an Aramaic term for Jewish nationalists.
  - type: text
    content: ),
  '19':
  - type: text
    content: Judas Iscariot (who later betrayed him).
  - type: heading
    content: Jesus and the Prince of Demons
  '2':
  - type: text
    content: Since it was the Sabbath, Jesus’ enemies watched him closely. If he healed the man’s hand, they planned to accuse him of working on the Sabbath.
  '20':
  - type: text
    content: 'One time Jesus entered a house, and the crowds began to gather again. Soon he and his disciples couldn’t even find time to eat. '
  '21':
  - type: text
    content: When his family heard what was happening, they tried to take him away. “He’s out of his mind,” they said.
  '22':
  - type: text
    content: But the teachers of religious law who had arrived from Jerusalem said, “He’s possessed by Satan,
  - type: note
    content: Greek Beelzeboul; other manuscripts read Beezeboul; Latin version reads Beelzebub.
  - type: text
    content: ' the prince of demons. That’s where he gets the power to cast out demons.”'
  '23':
  - type: text
    content: 'Jesus called them over and responded with an illustration. '
  - type: text
    content: '“How can Satan cast out Satan?” '
  - type: text
    content: 'he asked. '
  '24':
  - type: text
    content: “A kingdom divided by civil war will collapse.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Similarly, a family splintered by feuding will fall apart.
  - type: text
    content: ' '
  '26':
  - type: text
    content: And if Satan is divided and fights against himself, how can he stand? He would never survive.
  - type: text
    content: ' '
  '27':
  - type: text
    content: Let me illustrate this further. Who is powerful enough to enter the house of a strong man and plunder his goods? Only someone even stronger—someone who could tie him up and then plunder his house.
  '28':
  - type: text
    content: ' '
  - type: text
    content: “I tell you the truth, all sin and blasphemy can be forgiven,
  - type: text
    content: ' '
  '29':
  - type: text
    content: but anyone who blasphemes the Holy Spirit will never be forgiven. This is a sin with eternal consequences.”
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Jesus said to the man with the deformed hand, '
  - type: text
    content: “Come and stand in front of everyone.”
  - type: text
    content: ' '
  '30':
  - type: text
    content: He told them this because they were saying, “He’s possessed by an evil spirit.”
  - type: heading
    content: The True Family of Jesus
  '31':
  - type: text
    content: 'Then Jesus’ mother and brothers came to see him. They stood outside and sent word for him to come out and talk with them. '
  '32':
  - type: text
    content: There was a crowd sitting around Jesus, and someone said, “Your mother and your brothers
  - type: note
    content: Some manuscripts add and sisters.
  - type: text
    content: ' are outside asking for you.”'
  '33':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Who is my mother? Who are my brothers?”
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'Then he looked at those around him and said, '
  - type: text
    content: “Look, these are my mother and brothers.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Anyone who does God’s will is my brother and sister and mother.”
  '4':
  - type: text
    content: 'Then he turned to his critics and asked, '
  - type: text
    content: “Does the law permit good deeds on the Sabbath, or is it a day for doing evil? Is this a day to save life or to destroy it?”
  - type: text
    content: ' But they wouldn’t answer him.'
  '5':
  - type: text
    content: 'He looked around at them angrily and was deeply saddened by their hard hearts. Then he said to the man, '
  - type: text
    content: “Hold out your hand.”
  - type: text
    content: ' So the man held out his hand, and it was restored! '
  '6':
  - type: text
    content: At once the Pharisees went away and met with the supporters of Herod to plot how to kill Jesus.
  - type: heading
    content: Crowds Follow Jesus
  '7':
  - type: text
    content: 'Jesus went out to the lake with his disciples, and a large crowd followed him. They came from all over Galilee, Judea, '
  '8':
  - type: text
    content: Jerusalem, Idumea, from east of the Jordan River, and even from as far north as Tyre and Sidon. The news about his miracles had spread far and wide, and vast numbers of people came to see him.
  '9':
  - type: text
    content: 'Jesus instructed his disciples to have a boat ready so the crowd would not crush him. '
