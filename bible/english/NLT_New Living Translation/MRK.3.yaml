document_id: MRK.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals on the Sabbath
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jesus went into the synagogue again and noticed a man with a deformed hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Since it was the Sabbath, Jesus’ enemies watched him closely. If he healed the man’s hand, they planned to accuse him of working on the Sabbath.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jesus said to the man with the deformed hand, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Come and stand in front of everyone.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then he turned to his critics and asked, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Does the law permit good deeds on the Sabbath, or is it a day for doing evil? Is this a day to save life or to destroy it?”
  - type: text
    text: ' But they wouldn’t answer him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He looked around at them angrily and was deeply saddened by their hard hearts. Then he said to the man, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Hold out your hand.”
  - type: text
    text: ' So the man held out his hand, and it was restored! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: At once the Pharisees went away and met with the supporters of Herod to plot how to kill Jesus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Crowds Follow Jesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jesus went out to the lake with his disciples, and a large crowd followed him. They came from all over Galilee, Judea, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Jerusalem, Idumea, from east of the Jordan River, and even from as far north as Tyre and Sidon. The news about his miracles had spread far and wide, and vast numbers of people came to see him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jesus instructed his disciples to have a boat ready so the crowd would not crush him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'He had healed many people that day, so all the sick people eagerly pushed forward to touch him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And whenever those possessed by evil
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'unclean; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 3:30.
    marker-yv: yv-n
  - type: text
    text: ' spirits caught sight of him, the spirits would throw them to the ground in front of him shrieking, “You are the Son of God!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But Jesus sternly commanded the spirits not to reveal who he was.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Chooses the Twelve Apostles
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Afterward Jesus went up on a mountain and called out the ones he wanted to go with him. And they came to him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then he appointed twelve of them and called them his apostles.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts do not include '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and called them his apostles.
    marker-yv: yv-n
  - type: text
    text: ' They were to accompany him, and he would send them out to preach, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'giving them authority to cast out demons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'These are the twelve he chose:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: Simon (whom he named Peter),
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: James and John (the sons of Zebedee, but Jesus nicknamed them “Sons of Thunder”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: whom he named Boanerges, which means Sons of Thunder.
    marker-yv: yv-n
  - type: text
    text: ),
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Andrew,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Philip,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Bartholomew,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Matthew,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Thomas,
- type: usfm
  marker: li1
  children:
  - type: text
    text: James (son of Alphaeus),
- type: usfm
  marker: li1
  children:
  - type: text
    text: Thaddaeus,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Simon (the zealot
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the Cananean, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: an Aramaic term for Jewish nationalists.
    marker-yv: yv-n
  - type: text
    text: ),
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Judas Iscariot (who later betrayed him).
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus and the Prince of Demons
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'One time Jesus entered a house, and the crowds began to gather again. Soon he and his disciples couldn’t even find time to eat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: When his family heard what was happening, they tried to take him away. “He’s out of his mind,” they said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: But the teachers of religious law who had arrived from Jerusalem said, “He’s possessed by Satan,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Beelzeboul; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'other manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Beezeboul; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Latin version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Beelzebub.
    marker-yv: yv-n
  - type: text
    text: ' the prince of demons. That’s where he gets the power to cast out demons.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jesus called them over and responded with an illustration. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“How can Satan cast out Satan?” '
  - type: text
    text: 'he asked. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “A kingdom divided by civil war will collapse.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Similarly, a family splintered by feuding will fall apart.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And if Satan is divided and fights against himself, how can he stand? He would never survive.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Let me illustrate this further. Who is powerful enough to enter the house of a strong man and plunder his goods? Only someone even stronger—someone who could tie him up and then plunder his house.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I tell you the truth, all sin and blasphemy can be forgiven,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: but anyone who blasphemes the Holy Spirit will never be forgiven. This is a sin with eternal consequences.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: He told them this because they were saying, “He’s possessed by an evil spirit.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The True Family of Jesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then Jesus’ mother and brothers came to see him. They stood outside and sent word for him to come out and talk with them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: There was a crowd sitting around Jesus, and someone said, “Your mother and your brothers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts add '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and sisters.
    marker-yv: yv-n
  - type: text
    text: ' are outside asking for you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Who is my mother? Who are my brothers?”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Then he looked at those around him and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Look, these are my mother and brothers.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Anyone who does God’s will is my brother and sister and mother.”
