document_id: NUM.27,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Daughters of Zelophehad
  - type: text
    content: 'One day a petition was presented by the daughters of Zelophehad—Mahlah, Noah, Hoglah, Milcah, and Tirzah. Their father, Zelophehad, was a descendant of Hepher son of Gilead, son of Makir, son of Manasseh, son of Joseph. '
  '10':
  - type: text
    content: 'If he has no brothers, give his inheritance to his father’s brothers. '
  '11':
  - type: text
    content: 'But if his father has no brothers, give his inheritance to the nearest relative in his clan. This is a legal requirement for the people of Israel, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.”'
  - type: heading
    content: Joshua Chosen to Lead Israel
  '12':
  - type: text
    content: 'One day the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Climb one of the mountains east of the river,'
  - type: note
    content: Or the mountains of Abarim.
  - type: text
    content: ' and look out over the land I have given the people of Israel. '
  '13':
  - type: text
    content: 'After you have seen it, you will die like your brother, Aaron, '
  '14':
  - type: text
    content: for you both rebelled against my instructions in the wilderness of Zin. When the people of Israel rebelled, you failed to demonstrate my holiness to them at the waters.” (These are the waters of Meribah at Kadesh
  - type: note
    content: Hebrew waters of Meribath-kadesh.
  - type: text
    content: ' in the wilderness of Zin.)'
  '15':
  - type: text
    content: 'Then Moses said to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '16':
  - type: text
    content: '“O '
  - type: text
    content: Lord
  - type: text
    content: ', you are the God who gives breath to all creatures. Please appoint a new man as leader for the community. '
  '17':
  - type: text
    content: 'Give them someone who will guide them wherever they go and will lead them into battle, so the community of the '
  - type: text
    content: Lord
  - type: text
    content: ' will not be like sheep without a shepherd.”'
  '18':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “Take Joshua son of Nun, who has the Spirit in him, and lay your hands on him. '
  '19':
  - type: text
    content: 'Present him to Eleazar the priest before the whole community, and publicly commission him to lead the people. '
  '2':
  - type: text
    content: These women stood before Moses, Eleazar the priest, the tribal leaders, and the entire community at the entrance of the Tabernacle.
  - type: note
    content: Hebrew the Tent of Meeting.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Transfer some of your authority to him so the whole community of Israel will obey him. '
  '21':
  - type: text
    content: 'When direction from the '
  - type: text
    content: Lord
  - type: text
    content: ' is needed, Joshua will stand before Eleazar the priest, who will use the Urim—one of the sacred lots cast before the '
  - type: text
    content: Lord
  - type: text
    content: —to determine his will. This is how Joshua and the rest of the community of Israel will determine everything they should do.”
  '22':
  - type: text
    content: 'So Moses did as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded. He presented Joshua to Eleazar the priest and the whole community. '
  '23':
  - type: text
    content: 'Moses laid his hands on him and commissioned him to lead the people, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded through Moses.'
  '3':
  - type: text
    content: '“Our father died in the wilderness,” they said. “He was not among Korah’s followers, who rebelled against the '
  - type: text
    content: Lord
  - type: text
    content: '; he died because of his own sin. But he had no sons. '
  '4':
  - type: text
    content: Why should the name of our father disappear from his clan just because he had no sons? Give us property along with the rest of our relatives.”
  '5':
  - type: text
    content: 'So Moses brought their case before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' replied to Moses, '
  '7':
  - type: text
    content: “The claim of the daughters of Zelophehad is legitimate. You must give them a grant of land along with their father’s relatives. Assign them the property that would have been given to their father.
  '8':
  - type: text
    content: '“And give the following instructions to the people of Israel: If a man dies and has no son, then give his inheritance to his daughters. '
  '9':
  - type: text
    content: 'And if he has no daughter either, transfer his inheritance to his brothers. '
