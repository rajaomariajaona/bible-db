document_id: ZEC.6,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Four Chariots
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then I looked up again and saw four chariots coming from between two bronze mountains. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Heldai, Tobijah, and Jedaiah will bring gifts of silver and gold from the Jews exiled in Babylon. As soon as they arrive, meet them at the home of Josiah son of Zephaniah. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Accept their gifts, and make a crown from the silver and gold. Then put the crown on the head of Jeshua
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Joshua, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Jeshua.
      marker-yv: yv-n
    - type: text
      text: ' son of Jehozadak, the high priest. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tell him, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies says: Here is the man called the Branch. He will branch out from where he is and build the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Yes, he will build the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . Then he will receive royal honor and will rule as king from his throne. He will also serve as priest from his throne,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: There will be a priest by his throne.
      marker-yv: yv-n
    - type: text
      text: ' and there will be perfect harmony between his two roles.’'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The crown will be a memorial in the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to honor those who gave it—Heldai,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:14a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Syriac version (compare 6:10); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Helem.
      marker-yv: yv-n
    - type: text
      text: ' Tobijah, Jedaiah, and Josiah'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:14b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Syriac version (compare 6:10); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Hen.
      marker-yv: yv-n
    - type: text
      text: ' son of Zephaniah.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'People will come from distant lands to rebuild the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. And when this happens, you will know that my messages have been from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies. All this will happen if you carefully obey what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God says.'
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The first chariot was pulled by red horses, the second by black horses, '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'the third by white horses, and the fourth by powerful dappled-gray horses. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: “And what are these, my lord?” I asked the angel who was talking with me.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The angel replied, “These are the four spirits
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the four winds.
      marker-yv: yv-n
    - type: text
      text: ' of heaven who stand before the Lord of all the earth. They are going out to do his work. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The chariot with black horses is going north, the chariot with white horses is going west,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: is going after them.
      marker-yv: yv-n
    - type: text
      text: ' and the chariot with dappled-gray horses is going south.”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The powerful horses were eager to set out to patrol the earth. And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “Go and patrol the earth!” So they left at once on their patrol.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' summoned me and said, “Look, those who went north have vented the anger of my Spirit'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: have given my Spirit rest.
      marker-yv: yv-n
    - type: text
      text: ' there in the land of the north.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Crowning of Jeshua
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then I received another message from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': '
