document_id: ZEC.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Four Chariots
  - type: text
    content: 'Then I looked up again and saw four chariots coming from between two bronze mountains. '
  '10':
  - type: text
    content: '“Heldai, Tobijah, and Jedaiah will bring gifts of silver and gold from the Jews exiled in Babylon. As soon as they arrive, meet them at the home of Josiah son of Zephaniah. '
  '11':
  - type: text
    content: Accept their gifts, and make a crown from the silver and gold. Then put the crown on the head of Jeshua
  - type: note
    content: Hebrew Joshua, a variant spelling of Jeshua.
  - type: text
    content: ' son of Jehozadak, the high priest. '
  '12':
  - type: text
    content: 'Tell him, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says: Here is the man called the Branch. He will branch out from where he is and build the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Yes, he will build the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: . Then he will receive royal honor and will rule as king from his throne. He will also serve as priest from his throne,
  - type: note
    content: Or There will be a priest by his throne.
  - type: text
    content: ' and there will be perfect harmony between his two roles.’'
  '14':
  - type: text
    content: '“The crown will be a memorial in the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' to honor those who gave it—Heldai,'
  - type: note
    content: As in Syriac version (compare 6:10); Hebrew reads Helem.
  - type: text
    content: ' Tobijah, Jedaiah, and Josiah'
  - type: note
    content: As in Syriac version (compare 6:10); Hebrew reads Hen.
  - type: text
    content: ' son of Zephaniah.”'
  '15':
  - type: text
    content: 'People will come from distant lands to rebuild the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. And when this happens, you will know that my messages have been from the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies. All this will happen if you carefully obey what the '
  - type: text
    content: Lord
  - type: text
    content: ' your God says.'
  '2':
  - type: text
    content: 'The first chariot was pulled by red horses, the second by black horses, '
  '3':
  - type: text
    content: 'the third by white horses, and the fourth by powerful dappled-gray horses. '
  '4':
  - type: text
    content: “And what are these, my lord?” I asked the angel who was talking with me.
  '5':
  - type: text
    content: The angel replied, “These are the four spirits
  - type: note
    content: Or the four winds.
  - type: text
    content: ' of heaven who stand before the Lord of all the earth. They are going out to do his work. '
  '6':
  - type: text
    content: The chariot with black horses is going north, the chariot with white horses is going west,
  - type: note
    content: Hebrew is going after them.
  - type: text
    content: ' and the chariot with dappled-gray horses is going south.”'
  '7':
  - type: text
    content: 'The powerful horses were eager to set out to patrol the earth. And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Go and patrol the earth!” So they left at once on their patrol.'
  '8':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' summoned me and said, “Look, those who went north have vented the anger of my Spirit'
  - type: note
    content: Hebrew have given my Spirit rest.
  - type: text
    content: ' there in the land of the north.”'
  - type: heading
    content: The Crowning of Jeshua
  '9':
  - type: text
    content: 'Then I received another message from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
