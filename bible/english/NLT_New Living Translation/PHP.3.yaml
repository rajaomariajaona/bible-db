document_id: PHP.3,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Priceless Value of Knowing Christ
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Whatever happens, my dear brothers and sisters,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'brothers; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 3:13, 17.
      marker-yv: yv-n
    - type: text
      text: ' rejoice in the Lord. I never get tired of telling you these things, and I do it to safeguard your faith.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'I want to know Christ and experience the mighty power that raised him from the dead. I want to suffer with him, sharing in his death, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: so that one way or another I will experience the resurrection from the dead!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pressing toward the Goal
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'I don’t mean to say that I have already achieved these things or that I have already reached perfection. But I press on to possess that perfection for which Christ Jesus first possessed me. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: No, dear brothers and sisters, I have not achieved it,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: not yet achieved it.
      marker-yv: yv-n
    - type: text
      text: ' but I focus on this one thing: Forgetting the past and looking forward to what lies ahead, '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I press on to reach the end of the race and receive the heavenly prize for which God, through Christ Jesus, is calling us.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Let all who are spiritually mature agree on these things. If you disagree on some point, I believe God will make it plain to you. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: But we must hold on to the progress we have already made.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dear brothers and sisters, pattern your lives after mine, and learn from those who follow our example. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'For I have told you often before, and I say it again with tears in my eyes, that there are many whose conduct shows they are really enemies of the cross of Christ. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'They are headed for destruction. Their god is their appetite, they brag about shameful things, and they think only about this life here on earth. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Watch out for those dogs, those people who do evil, those mutilators who say you must be circumcised to be saved. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'But we are citizens of heaven, where the Lord Jesus Christ lives. And we are eagerly waiting for him to return as our Savior. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: He will take our weak mortal bodies and change them into glorious bodies like his own, using the same power with which he will bring everything under his control.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For we who worship by the Spirit of God
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'worship God in spirit; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'one early manuscript reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: worship in spirit.
      marker-yv: yv-n
    - type: text
      text: ' are the ones who are truly circumcised. We rely on what Christ Jesus has done for us. We put no confidence in human effort, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: though I could have confidence in my own effort if anyone could. Indeed, if others have reason for confidence in their own efforts, I have even more!
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'I was circumcised when I was eight days old. I am a pure-blooded citizen of Israel and a member of the tribe of Benjamin—a real Hebrew if there ever was one! I was a member of the Pharisees, who demand the strictest obedience to the Jewish law. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: I was so zealous that I harshly persecuted the church. And as for righteousness, I obeyed the law without fault.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'I once thought these things were valuable, but now I consider them worthless because of what Christ has done. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Yes, everything else is worthless when compared with the infinite value of knowing Christ Jesus my Lord. For his sake I have discarded everything else, counting it all as garbage, so that I could gain Christ '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: and become one with him. I no longer count on my own righteousness through obeying the law; rather, I become righteous through faith in Christ.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: through the faithfulness of Christ.
      marker-yv: yv-n
    - type: text
      text: ' For God’s way of making us right with himself depends on faith. '
