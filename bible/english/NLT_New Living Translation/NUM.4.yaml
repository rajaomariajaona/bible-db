document_id: NUM.4,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Duties of the Kohathite Clan
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses and Aaron, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Then they must cover the lampstand and its accessories with fine goatskin leather and place the bundle on a carrying frame.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“Next they must spread a blue cloth over the gold incense altar and cover this cloth with fine goatskin leather. Then they must attach the carrying poles to the altar. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: They must take all the remaining furnishings of the sanctuary and wrap them in a blue cloth, cover them with fine goatskin leather, and place them on the carrying frame.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“They must remove the ashes from the altar for sacrifices and cover the altar with a purple cloth. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'All the altar utensils—the firepans, meat forks, shovels, basins, and all the containers—must be placed on the cloth, and a covering of fine goatskin leather must be spread over them. Finally, they must put the carrying poles in place. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The camp will be ready to move when Aaron and his sons have finished covering the sanctuary and all the sacred articles. The Kohathites will come and carry these things to the next destination. But they must not touch the sacred objects, or they will die. So these are the things from the Tabernacle that the Kohathites must carry.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “Eleazar son of Aaron the priest will be responsible for the oil of the lampstand, the fragrant incense, the daily grain offering, and the anointing oil. In fact, Eleazar will be responsible for the entire Tabernacle and everything in it, including the sanctuary and its furnishings.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses and Aaron, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“Do not let the Kohathite clans be destroyed from among the Levites! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'This is what you must do so they will live and not die when they approach the most sacred objects. Aaron and his sons must always go in with them and assign a specific duty or load to each person. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Record the names of the members of the clans and families of the Kohathite division of the tribe of Levi. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: The Kohathites must never enter the sanctuary to look at the sacred objects for even a moment, or they will die.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Duties of the Gershonite Clan
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '“Record the names of the members of the clans and families of the Gershonite division of the tribe of Levi. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: List all the men between the ages of thirty and fifty who are eligible to serve in the Tabernacle.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '“These Gershonite clans will be responsible for general service and carrying loads. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'They must carry the curtains of the Tabernacle, the Tabernacle itself with its coverings, the outer covering of fine goatskin leather, and the curtain for the Tabernacle entrance. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'They are also to carry the curtains for the courtyard walls that surround the Tabernacle and altar, the curtain across the courtyard entrance, the ropes, and all the equipment related to their use. The Gershonites are responsible for all these items. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Aaron and his sons will direct the Gershonites regarding all their duties, whether it involves moving the equipment or doing other work. They must assign the Gershonites responsibility for the loads they are to carry. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: So these are the duties assigned to the Gershonite clans at the Tabernacle. They will be directly responsible to Ithamar son of Aaron the priest.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Duties of the Merarite Clan
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: '“Now record the names of the members of the clans and families of the Merarite division of the tribe of Levi. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: List all the men between the ages of thirty and fifty who are eligible to serve in the Tabernacle.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the Tent of Meeting; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 4:4, 15, 23, 25, 28, 30, 31, 33, 35, 37, 39, 41, 43, 47.
      marker-yv: yv-n
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: List all the men between the ages of thirty and fifty who are eligible to serve in the Tabernacle.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: '“Their only duty at the Tabernacle will be to carry loads. They will carry the frames of the Tabernacle, the crossbars, the posts, and the bases; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'also the posts for the courtyard walls with their bases, pegs, and ropes; and all the accessories and everything else related to their use. Assign the various loads to each man by name. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: So these are the duties of the Merarite clans at the Tabernacle. They are directly responsible to Ithamar son of Aaron the priest.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Summary of the Registration
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'So Moses, Aaron, and the other leaders of the community listed the members of the Kohathite division by their clans and families. '
  '35':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'The list included all the men between thirty and fifty years of age who were eligible for service in the Tabernacle, '
  '36':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'and the total number came to 2,750. '
  '37':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'So this was the total of all those from the Kohathite clans who were eligible to serve at the Tabernacle. Moses and Aaron listed them, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded through Moses.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'The Gershonite division was also listed by its clans and families. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'The list included all the men between thirty and fifty years of age who were eligible for service in the Tabernacle, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '“The duties of the Kohathites at the Tabernacle will relate to the most sacred objects. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'and the total number came to 2,630. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'So this was the total of all those from the Gershonite clans who were eligible to serve at the Tabernacle. Moses and Aaron listed them, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'The Merarite division was also listed by its clans and families. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'The list included all the men between thirty and fifty years of age who were eligible for service in the Tabernacle, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'and the total number came to 3,200. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'So this was the total of all those from the Merarite clans who were eligible for service. Moses and Aaron listed them, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded through Moses.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'So Moses, Aaron, and the leaders of Israel listed all the Levites by their clans and families. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'All the men between thirty and fifty years of age who were eligible for service in the Tabernacle and for its transportation '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'numbered 8,580. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'When their names were recorded, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded through Moses, each man was assigned his task and told what to carry.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And so the registration was completed, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: When the camp moves, Aaron and his sons must enter the Tabernacle first to take down the inner curtain and cover the Ark of the Covenant
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ark of the Testimony.
      marker-yv: yv-n
    - type: text
      text: ' with it. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Then they must cover the inner curtain with fine goatskin leather and spread over that a single piece of blue cloth. Finally, they must put the carrying poles of the Ark in place.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“Next they must spread a blue cloth over the table where the Bread of the Presence is displayed, and on the cloth they will place the bowls, ladles, jars, pitchers, and the special bread. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: They must spread a scarlet cloth over all of this, and finally a covering of fine goatskin leather on top of the scarlet cloth. Then they must insert the carrying poles into the table.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '“Next they must cover the lampstand with a blue cloth, along with its lamps, lamp snuffers, trays, and special jars of olive oil. '
