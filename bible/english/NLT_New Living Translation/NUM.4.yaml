document_id: NUM.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Duties of the Kohathite Clan
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron, '
  '10':
  - type: text
    content: Then they must cover the lampstand and its accessories with fine goatskin leather and place the bundle on a carrying frame.
  '11':
  - type: text
    content: '“Next they must spread a blue cloth over the gold incense altar and cover this cloth with fine goatskin leather. Then they must attach the carrying poles to the altar. '
  '12':
  - type: text
    content: They must take all the remaining furnishings of the sanctuary and wrap them in a blue cloth, cover them with fine goatskin leather, and place them on the carrying frame.
  '13':
  - type: text
    content: '“They must remove the ashes from the altar for sacrifices and cover the altar with a purple cloth. '
  '14':
  - type: text
    content: 'All the altar utensils—the firepans, meat forks, shovels, basins, and all the containers—must be placed on the cloth, and a covering of fine goatskin leather must be spread over them. Finally, they must put the carrying poles in place. '
  '15':
  - type: text
    content: The camp will be ready to move when Aaron and his sons have finished covering the sanctuary and all the sacred articles. The Kohathites will come and carry these things to the next destination. But they must not touch the sacred objects, or they will die. So these are the things from the Tabernacle that the Kohathites must carry.
  '16':
  - type: text
    content: “Eleazar son of Aaron the priest will be responsible for the oil of the lampstand, the fragrant incense, the daily grain offering, and the anointing oil. In fact, Eleazar will be responsible for the entire Tabernacle and everything in it, including the sanctuary and its furnishings.”
  '17':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron, '
  '18':
  - type: text
    content: '“Do not let the Kohathite clans be destroyed from among the Levites! '
  '19':
  - type: text
    content: 'This is what you must do so they will live and not die when they approach the most sacred objects. Aaron and his sons must always go in with them and assign a specific duty or load to each person. '
  '2':
  - type: text
    content: '“Record the names of the members of the clans and families of the Kohathite division of the tribe of Levi. '
  '20':
  - type: text
    content: The Kohathites must never enter the sanctuary to look at the sacred objects for even a moment, or they will die.”
  - type: heading
    content: Duties of the Gershonite Clan
  '21':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '22':
  - type: text
    content: '“Record the names of the members of the clans and families of the Gershonite division of the tribe of Levi. '
  '23':
  - type: text
    content: List all the men between the ages of thirty and fifty who are eligible to serve in the Tabernacle.
  '24':
  - type: text
    content: '“These Gershonite clans will be responsible for general service and carrying loads. '
  '25':
  - type: text
    content: 'They must carry the curtains of the Tabernacle, the Tabernacle itself with its coverings, the outer covering of fine goatskin leather, and the curtain for the Tabernacle entrance. '
  '26':
  - type: text
    content: 'They are also to carry the curtains for the courtyard walls that surround the Tabernacle and altar, the curtain across the courtyard entrance, the ropes, and all the equipment related to their use. The Gershonites are responsible for all these items. '
  '27':
  - type: text
    content: 'Aaron and his sons will direct the Gershonites regarding all their duties, whether it involves moving the equipment or doing other work. They must assign the Gershonites responsibility for the loads they are to carry. '
  '28':
  - type: text
    content: So these are the duties assigned to the Gershonite clans at the Tabernacle. They will be directly responsible to Ithamar son of Aaron the priest.
  - type: heading
    content: Duties of the Merarite Clan
  '29':
  - type: text
    content: '“Now record the names of the members of the clans and families of the Merarite division of the tribe of Levi. '
  '3':
  - type: text
    content: List all the men between the ages of thirty and fifty who are eligible to serve in the Tabernacle.
  - type: note
    content: Hebrew the Tent of Meeting; also in 4:4, 15, 23, 25, 28, 30, 31, 33, 35, 37, 39, 41, 43, 47.
  '30':
  - type: text
    content: List all the men between the ages of thirty and fifty who are eligible to serve in the Tabernacle.
  '31':
  - type: text
    content: '“Their only duty at the Tabernacle will be to carry loads. They will carry the frames of the Tabernacle, the crossbars, the posts, and the bases; '
  '32':
  - type: text
    content: 'also the posts for the courtyard walls with their bases, pegs, and ropes; and all the accessories and everything else related to their use. Assign the various loads to each man by name. '
  '33':
  - type: text
    content: So these are the duties of the Merarite clans at the Tabernacle. They are directly responsible to Ithamar son of Aaron the priest.”
  - type: heading
    content: Summary of the Registration
  '34':
  - type: text
    content: 'So Moses, Aaron, and the other leaders of the community listed the members of the Kohathite division by their clans and families. '
  '35':
  - type: text
    content: 'The list included all the men between thirty and fifty years of age who were eligible for service in the Tabernacle, '
  '36':
  - type: text
    content: 'and the total number came to 2,750. '
  '37':
  - type: text
    content: 'So this was the total of all those from the Kohathite clans who were eligible to serve at the Tabernacle. Moses and Aaron listed them, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded through Moses.'
  '38':
  - type: text
    content: 'The Gershonite division was also listed by its clans and families. '
  '39':
  - type: text
    content: 'The list included all the men between thirty and fifty years of age who were eligible for service in the Tabernacle, '
  '4':
  - type: text
    content: '“The duties of the Kohathites at the Tabernacle will relate to the most sacred objects. '
  '40':
  - type: text
    content: 'and the total number came to 2,630. '
  '41':
  - type: text
    content: 'So this was the total of all those from the Gershonite clans who were eligible to serve at the Tabernacle. Moses and Aaron listed them, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded.'
  '42':
  - type: text
    content: 'The Merarite division was also listed by its clans and families. '
  '43':
  - type: text
    content: 'The list included all the men between thirty and fifty years of age who were eligible for service in the Tabernacle, '
  '44':
  - type: text
    content: 'and the total number came to 3,200. '
  '45':
  - type: text
    content: 'So this was the total of all those from the Merarite clans who were eligible for service. Moses and Aaron listed them, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded through Moses.'
  '46':
  - type: text
    content: 'So Moses, Aaron, and the leaders of Israel listed all the Levites by their clans and families. '
  '47':
  - type: text
    content: 'All the men between thirty and fifty years of age who were eligible for service in the Tabernacle and for its transportation '
  '48':
  - type: text
    content: 'numbered 8,580. '
  '49':
  - type: text
    content: 'When their names were recorded, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded through Moses, each man was assigned his task and told what to carry.'
  - type: text
    content: 'And so the registration was completed, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses.'
  '5':
  - type: text
    content: When the camp moves, Aaron and his sons must enter the Tabernacle first to take down the inner curtain and cover the Ark of the Covenant
  - type: note
    content: Or Ark of the Testimony.
  - type: text
    content: ' with it. '
  '6':
  - type: text
    content: Then they must cover the inner curtain with fine goatskin leather and spread over that a single piece of blue cloth. Finally, they must put the carrying poles of the Ark in place.
  '7':
  - type: text
    content: '“Next they must spread a blue cloth over the table where the Bread of the Presence is displayed, and on the cloth they will place the bowls, ladles, jars, pitchers, and the special bread. '
  '8':
  - type: text
    content: They must spread a scarlet cloth over all of this, and finally a covering of fine goatskin leather on top of the scarlet cloth. Then they must insert the carrying poles into the table.
  '9':
  - type: text
    content: '“Next they must cover the lampstand with a blue cloth, along with its lamps, lamp snuffers, trays, and special jars of olive oil. '
