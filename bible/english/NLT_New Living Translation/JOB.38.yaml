document_id: JOB.38
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Challenges Job'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' answered Job from the whirlwind:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Who is this that questions my wisdom
- type: usfm
  marker: q2
  children:
  - type: text
    text: with such ignorant words?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Brace yourself like a man,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because I have some questions for you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you must answer them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Where were you when I laid the foundations of the earth?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Tell me, if you know so much.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Who determined its dimensions
- type: usfm
  marker: q2
  children:
  - type: text
    text: and stretched out the surveying line?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: What supports its foundations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and who laid its cornerstone
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: as the morning stars sang together
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all the angels
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the sons of God.
    marker-yv: yv-n
  - type: text
    text: ' shouted for joy?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Who kept the sea inside its boundaries
- type: usfm
  marker: q2
  children:
  - type: text
    text: as it burst from the womb,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: and as I clothed it with clouds
- type: usfm
  marker: q2
  children:
  - type: text
    text: and wrapped it in thick darkness?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For I locked it behind barred gates,
- type: usfm
  marker: q2
  children:
  - type: text
    text: limiting its shores.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I said, ‘This far and no farther will you come.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Here your proud waves must stop!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Have you ever commanded the morning to appear
- type: usfm
  marker: q2
  children:
  - type: text
    text: and caused the dawn to rise in the east?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Have you made daylight spread to the ends of the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to bring an end to the night’s wickedness?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: As the light approaches,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the earth takes shape like clay pressed beneath a seal;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is robed in brilliant colors.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: its features stand out like folds in a robe.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The light disturbs the wicked
- type: usfm
  marker: q2
  children:
  - type: text
    text: and stops the arm that is raised in violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “Have you explored the springs from which the seas come?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Have you explored their depths?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Do you know where the gates of death are located?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Have you seen the gates of utter gloom?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Do you realize the extent of the earth?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Tell me about it if you know!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Where does light come from,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and where does darkness go?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Can you take each to its home?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do you know how to get there?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: But of course you know all this!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For you were born before it was all created,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you are so very experienced!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “Have you visited the storehouses of the snow
- type: usfm
  marker: q2
  children:
  - type: text
    text: or seen the storehouses of hail?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: (I have reserved them as weapons for the time of trouble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the day of battle and war.)
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Where is the path to the source of light?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Where is the home of the east wind?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “Who created a channel for the torrents of rain?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who laid out the path for the lightning?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Who makes the rain fall on barren land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in a desert where no one lives?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Who sends rain to satisfy the parched ground
- type: usfm
  marker: q2
  children:
  - type: text
    text: and make the tender grass spring up?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “Does the rain have a father?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who gives birth to the dew?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Who is the mother of the ice?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who gives birth to the frost from the heavens?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: For the water turns to ice as hard as rock,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the surface of the water freezes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: “Can you direct the movement of the stars—
- type: usfm
  marker: q2
  children:
  - type: text
    text: binding the cluster of the Pleiades
- type: usfm
  marker: q2
  children:
  - type: text
    text: or loosening the cords of Orion?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Can you direct the constellations through the seasons
- type: usfm
  marker: q2
  children:
  - type: text
    text: or guide the Bear with her cubs across the heavens?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Do you know the laws of the universe?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can you use them to regulate the earth?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: “Can you shout to the clouds
- type: usfm
  marker: q2
  children:
  - type: text
    text: and make it rain?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Can you make lightning appear
- type: usfm
  marker: q2
  children:
  - type: text
    text: and cause it to strike as you direct?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Who gives intuition to the heart
- type: usfm
  marker: q2
  children:
  - type: text
    text: and instinct to the mind?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Who is wise enough to count all the clouds?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who can tilt the water jars of heaven
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: when the parched ground is dry
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the soil has hardened into clods?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: “Can you stalk prey for a lioness
- type: usfm
  marker: q2
  children:
  - type: text
    text: and satisfy the young lions’ appetites
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: as they lie in their dens
- type: usfm
  marker: q2
  children:
  - type: text
    text: or crouch in the thicket?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Who provides food for the ravens
- type: usfm
  marker: q2
  children:
  - type: text
    text: when their young cry out to God
- type: usfm
  marker: q2
  children:
  - type: text
    text: and wander about in hunger?
