document_id: JOB.38,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord Challenges Job
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' answered Job from the whirlwind:'
  '10':
  - type: text
    content: For I locked it behind barred gates,
  - type: text
    content: limiting its shores.
  '11':
  - type: text
    content: I said, ‘This far and no farther will you come.
  - type: text
    content: Here your proud waves must stop!’
  '12':
  - type: text
    content: “Have you ever commanded the morning to appear
  - type: text
    content: and caused the dawn to rise in the east?
  '13':
  - type: text
    content: Have you made daylight spread to the ends of the earth,
  - type: text
    content: to bring an end to the night’s wickedness?
  '14':
  - type: text
    content: As the light approaches,
  - type: text
    content: the earth takes shape like clay pressed beneath a seal;
  - type: text
    content: it is robed in brilliant colors.
  - type: note
    content: Or its features stand out like folds in a robe.
  '15':
  - type: text
    content: The light disturbs the wicked
  - type: text
    content: and stops the arm that is raised in violence.
  '16':
  - type: text
    content: “Have you explored the springs from which the seas come?
  - type: text
    content: Have you explored their depths?
  '17':
  - type: text
    content: Do you know where the gates of death are located?
  - type: text
    content: Have you seen the gates of utter gloom?
  '18':
  - type: text
    content: Do you realize the extent of the earth?
  - type: text
    content: Tell me about it if you know!
  '19':
  - type: text
    content: “Where does light come from,
  - type: text
    content: and where does darkness go?
  '2':
  - type: text
    content: “Who is this that questions my wisdom
  - type: text
    content: with such ignorant words?
  '20':
  - type: text
    content: Can you take each to its home?
  - type: text
    content: Do you know how to get there?
  '21':
  - type: text
    content: But of course you know all this!
  - type: text
    content: For you were born before it was all created,
  - type: text
    content: and you are so very experienced!
  '22':
  - type: text
    content: “Have you visited the storehouses of the snow
  - type: text
    content: or seen the storehouses of hail?
  '23':
  - type: text
    content: (I have reserved them as weapons for the time of trouble,
  - type: text
    content: for the day of battle and war.)
  '24':
  - type: text
    content: Where is the path to the source of light?
  - type: text
    content: Where is the home of the east wind?
  '25':
  - type: text
    content: “Who created a channel for the torrents of rain?
  - type: text
    content: Who laid out the path for the lightning?
  '26':
  - type: text
    content: Who makes the rain fall on barren land,
  - type: text
    content: in a desert where no one lives?
  '27':
  - type: text
    content: Who sends rain to satisfy the parched ground
  - type: text
    content: and make the tender grass spring up?
  '28':
  - type: text
    content: “Does the rain have a father?
  - type: text
    content: Who gives birth to the dew?
  '29':
  - type: text
    content: Who is the mother of the ice?
  - type: text
    content: Who gives birth to the frost from the heavens?
  '3':
  - type: text
    content: Brace yourself like a man,
  - type: text
    content: because I have some questions for you,
  - type: text
    content: and you must answer them.
  '30':
  - type: text
    content: For the water turns to ice as hard as rock,
  - type: text
    content: and the surface of the water freezes.
  '31':
  - type: text
    content: “Can you direct the movement of the stars—
  - type: text
    content: binding the cluster of the Pleiades
  - type: text
    content: or loosening the cords of Orion?
  '32':
  - type: text
    content: Can you direct the constellations through the seasons
  - type: text
    content: or guide the Bear with her cubs across the heavens?
  '33':
  - type: text
    content: Do you know the laws of the universe?
  - type: text
    content: Can you use them to regulate the earth?
  '34':
  - type: text
    content: “Can you shout to the clouds
  - type: text
    content: and make it rain?
  '35':
  - type: text
    content: Can you make lightning appear
  - type: text
    content: and cause it to strike as you direct?
  '36':
  - type: text
    content: Who gives intuition to the heart
  - type: text
    content: and instinct to the mind?
  '37':
  - type: text
    content: Who is wise enough to count all the clouds?
  - type: text
    content: Who can tilt the water jars of heaven
  '38':
  - type: text
    content: when the parched ground is dry
  - type: text
    content: and the soil has hardened into clods?
  '39':
  - type: text
    content: “Can you stalk prey for a lioness
  - type: text
    content: and satisfy the young lions’ appetites
  '4':
  - type: text
    content: “Where were you when I laid the foundations of the earth?
  - type: text
    content: Tell me, if you know so much.
  '40':
  - type: text
    content: as they lie in their dens
  - type: text
    content: or crouch in the thicket?
  '41':
  - type: text
    content: Who provides food for the ravens
  - type: text
    content: when their young cry out to God
  - type: text
    content: and wander about in hunger?
  '5':
  - type: text
    content: Who determined its dimensions
  - type: text
    content: and stretched out the surveying line?
  '6':
  - type: text
    content: What supports its foundations,
  - type: text
    content: and who laid its cornerstone
  '7':
  - type: text
    content: as the morning stars sang together
  - type: text
    content: and all the angels
  - type: note
    content: Hebrew the sons of God.
  - type: text
    content: ' shouted for joy?'
  '8':
  - type: text
    content: “Who kept the sea inside its boundaries
  - type: text
    content: as it burst from the womb,
  '9':
  - type: text
    content: and as I clothed it with clouds
  - type: text
    content: and wrapped it in thick darkness?
