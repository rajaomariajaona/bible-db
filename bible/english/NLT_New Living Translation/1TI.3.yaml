document_id: 1TI.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Leaders in the Church
  - type: text
    content: 'This is a trustworthy saying: “If someone aspires to be a church leader,'
  - type: note
    content: Or an overseer, or a bishop; also in 3:2, 6.
  - type: text
    content: ' he desires an honorable position.” '
  '10':
  - type: text
    content: Before they are appointed as deacons, let them be closely examined. If they pass the test, then let them serve as deacons.
  '11':
  - type: text
    content: In the same way, their wives
  - type: note
    content: Or the women deacons. The Greek word can be translated women or wives.
  - type: text
    content: ' must be respected and must not slander others. They must exercise self-control and be faithful in everything they do.'
  '12':
  - type: text
    content: 'A deacon must be faithful to his wife, and he must manage his children and household well. '
  '13':
  - type: text
    content: Those who do well as deacons will be rewarded with respect from others and will have increased confidence in their faith in Christ Jesus.
  - type: heading
    content: The Truths of Our Faith
  '14':
  - type: text
    content: 'I am writing these things to you now, even though I hope to be with you soon, '
  '15':
  - type: text
    content: so that if I am delayed, you will know how people must conduct themselves in the household of God. This is the church of the living God, which is the pillar and foundation of the truth.
  '16':
  - type: text
    content: Without question, this is the great mystery of our faith
  - type: note
    content: Or of godliness.
  - type: text
    content: ':'
  - type: text
    content: Christ
  - type: note
    content: Greek He who; other manuscripts read God.
  - type: text
    content: ' was revealed in a human body'
  - type: text
    content: and vindicated by the Spirit.
  - type: note
    content: Or in his spirit.
  - type: text
    content: He was seen by angels
  - type: text
    content: and announced to the nations.
  - type: text
    content: He was believed in throughout the world
  - type: text
    content: and taken to heaven in glory.
  '2':
  - type: text
    content: So a church leader must be a man whose life is above reproach. He must be faithful to his wife.
  - type: note
    content: Or must have only one wife, or must be married only once; Greek reads must be the husband of one wife; also in 3:12.
  - type: text
    content: ' He must exercise self-control, live wisely, and have a good reputation. He must enjoy having guests in his home, and he must be able to teach. '
  '3':
  - type: text
    content: He must not be a heavy drinker
  - type: note
    content: Greek must not drink too much wine; similarly in 3:8.
  - type: text
    content: ' or be violent. He must be gentle, not quarrelsome, and not love money. '
  '4':
  - type: text
    content: 'He must manage his own family well, having children who respect and obey him. '
  '5':
  - type: text
    content: For if a man cannot manage his own household, how can he take care of God’s church?
  '6':
  - type: text
    content: A church leader must not be a new believer, because he might become proud, and the devil would cause him to fall.
  - type: note
    content: Or he might fall into the same judgment as the devil.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Also, people outside the church must speak well of him so that he will not be disgraced and fall into the devil’s trap.
  '8':
  - type: text
    content: 'In the same way, deacons must be well respected and have integrity. They must not be heavy drinkers or dishonest with money. '
  '9':
  - type: text
    content: 'They must be committed to the mystery of the faith now revealed and must live with a clear conscience. '
