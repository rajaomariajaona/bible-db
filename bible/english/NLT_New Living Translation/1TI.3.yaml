document_id: 1TI.3,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Leaders in the Church
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This is a trustworthy saying: “If someone aspires to be a church leader,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'an overseer, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'a bishop; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 3:2, 6.
      marker-yv: yv-n
    - type: text
      text: ' he desires an honorable position.” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Before they are appointed as deacons, let them be closely examined. If they pass the test, then let them serve as deacons.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In the same way, their wives
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the women deacons. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek word can be translated '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'women '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: wives.
      marker-yv: yv-n
    - type: text
      text: ' must be respected and must not slander others. They must exercise self-control and be faithful in everything they do.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A deacon must be faithful to his wife, and he must manage his children and household well. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Those who do well as deacons will be rewarded with respect from others and will have increased confidence in their faith in Christ Jesus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Truths of Our Faith
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I am writing these things to you now, even though I hope to be with you soon, '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: so that if I am delayed, you will know how people must conduct themselves in the household of God. This is the church of the living God, which is the pillar and foundation of the truth.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Without question, this is the great mystery of our faith
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:16a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of godliness.
      marker-yv: yv-n
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Christ
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:16b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'He who; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'other manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: God.
      marker-yv: yv-n
    - type: text
      text: ' was revealed in a human body'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and vindicated by the Spirit.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:16c '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in his spirit.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He was seen by angels
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and announced to the nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He was believed in throughout the world
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and taken to heaven in glory.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So a church leader must be a man whose life is above reproach. He must be faithful to his wife.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'must have only one wife, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'must be married only once; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'must be the husband of one wife; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 3:12.
      marker-yv: yv-n
    - type: text
      text: ' He must exercise self-control, live wisely, and have a good reputation. He must enjoy having guests in his home, and he must be able to teach. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: He must not be a heavy drinker
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'must not drink too much wine; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: similarly in 3:8.
      marker-yv: yv-n
    - type: text
      text: ' or be violent. He must be gentle, not quarrelsome, and not love money. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He must manage his own family well, having children who respect and obey him. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: For if a man cannot manage his own household, how can he take care of God’s church?
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A church leader must not be a new believer, because he might become proud, and the devil would cause him to fall.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he might fall into the same judgment as the devil.
      marker-yv: yv-n
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Also, people outside the church must speak well of him so that he will not be disgraced and fall into the devil’s trap.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the same way, deacons must be well respected and have integrity. They must not be heavy drinkers or dishonest with money. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They must be committed to the mystery of the faith now revealed and must live with a clear conscience. '
