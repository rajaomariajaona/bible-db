document_id: JOB.37,116
type_code: eng
verses:
  '1':
  - type: text
    content: “My heart pounds as I think of this.
  - type: text
    content: It trembles within me.
  '10':
  - type: text
    content: God’s breath sends the ice,
  - type: text
    content: freezing wide expanses of water.
  '11':
  - type: text
    content: He loads the clouds with moisture,
  - type: text
    content: and they flash with his lightning.
  '12':
  - type: text
    content: The clouds churn about at his direction.
  - type: text
    content: They do whatever he commands throughout the earth.
  '13':
  - type: text
    content: He makes these things happen either to punish people
  - type: text
    content: or to show his unfailing love.
  '14':
  - type: text
    content: “Pay attention to this, Job.
  - type: text
    content: Stop and consider the wonderful miracles of God!
  '15':
  - type: text
    content: Do you know how God controls the storm
  - type: text
    content: and causes the lightning to flash from his clouds?
  '16':
  - type: text
    content: Do you understand how he moves the clouds
  - type: text
    content: with wonderful perfection and skill?
  '17':
  - type: text
    content: When you are sweltering in your clothes
  - type: text
    content: and the south wind dies down and everything is still,
  '18':
  - type: text
    content: he makes the skies reflect the heat like a bronze mirror.
  - type: text
    content: Can you do that?
  '19':
  - type: text
    content: “So teach the rest of us what to say to God.
  - type: text
    content: We are too ignorant to make our own arguments.
  '2':
  - type: text
    content: Listen carefully to the thunder of God’s voice
  - type: text
    content: as it rolls from his mouth.
  '20':
  - type: text
    content: Should God be notified that I want to speak?
  - type: text
    content: Can people even speak when they are confused?
  - type: note
    content: Or speak without being swallowed up?
  '21':
  - type: text
    content: We cannot look at the sun,
  - type: text
    content: for it shines brightly in the sky
  - type: text
    content: when the wind clears away the clouds.
  '22':
  - type: text
    content: So also, golden splendor comes from the mountain of God.
  - type: note
    content: Or from the north; or from the abode.
  - type: text
    content: He is clothed in dazzling splendor.
  '23':
  - type: text
    content: We cannot imagine the power of the Almighty;
  - type: text
    content: but even though he is just and righteous,
  - type: text
    content: he does not destroy us.
  '24':
  - type: text
    content: No wonder people everywhere fear him.
  - type: text
    content: All who are wise show him reverence.
  - type: note
    content: As in Greek version; Hebrew reads He is not impressed by the wise.
  - type: text
    content: ”
  '3':
  - type: text
    content: It rolls across the heavens,
  - type: text
    content: and his lightning flashes in every direction.
  '4':
  - type: text
    content: Then comes the roaring of the thunder—
  - type: text
    content: the tremendous voice of his majesty.
  - type: text
    content: He does not restrain it when he speaks.
  '5':
  - type: text
    content: God’s voice is glorious in the thunder.
  - type: text
    content: We can’t even imagine the greatness of his power.
  '6':
  - type: text
    content: “He directs the snow to fall on the earth
  - type: text
    content: and tells the rain to pour down.
  '7':
  - type: text
    content: Then everyone stops working
  - type: text
    content: so they can watch his power.
  '8':
  - type: text
    content: The wild animals take cover
  - type: text
    content: and stay inside their dens.
  '9':
  - type: text
    content: The stormy wind comes from its chamber,
  - type: text
    content: and the driving winds bring the cold.
