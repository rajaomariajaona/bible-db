document_id: JOB.37,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “My heart pounds as I think of this.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It trembles within me.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: God’s breath sends the ice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: freezing wide expanses of water.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: He loads the clouds with moisture,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they flash with his lightning.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The clouds churn about at his direction.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They do whatever he commands throughout the earth.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: He makes these things happen either to punish people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or to show his unfailing love.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “Pay attention to this, Job.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Stop and consider the wonderful miracles of God!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Do you know how God controls the storm
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and causes the lightning to flash from his clouds?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Do you understand how he moves the clouds
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with wonderful perfection and skill?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: When you are sweltering in your clothes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the south wind dies down and everything is still,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: he makes the skies reflect the heat like a bronze mirror.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can you do that?
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “So teach the rest of us what to say to God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We are too ignorant to make our own arguments.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Listen carefully to the thunder of God’s voice
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as it rolls from his mouth.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Should God be notified that I want to speak?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can people even speak when they are confused?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: speak without being swallowed up?
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: We cannot look at the sun,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for it shines brightly in the sky
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when the wind clears away the clouds.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: So also, golden splendor comes from the mountain of God.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'from the north; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from the abode.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He is clothed in dazzling splendor.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: We cannot imagine the power of the Almighty;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but even though he is just and righteous,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he does not destroy us.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: No wonder people everywhere fear him.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All who are wise show him reverence.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: He is not impressed by the wise.
      marker-yv: yv-n
    - type: text
      text: ”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: It rolls across the heavens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his lightning flashes in every direction.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Then comes the roaring of the thunder—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the tremendous voice of his majesty.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He does not restrain it when he speaks.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: God’s voice is glorious in the thunder.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We can’t even imagine the greatness of his power.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “He directs the snow to fall on the earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and tells the rain to pour down.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Then everyone stops working
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so they can watch his power.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The wild animals take cover
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and stay inside their dens.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: The stormy wind comes from its chamber,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the driving winds bring the cold.
