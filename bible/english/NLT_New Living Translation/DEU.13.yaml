document_id: DEU.13,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Warning against Idolatry
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses 13:1-18 are numbered 13:2-19 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: '“Suppose there are prophets among you or those who dream dreams about the future, and they promise you signs or miracles, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Stone the guilty ones to death because they have tried to draw you away from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, who rescued you from the land of Egypt, the place of slavery. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then all Israel will hear about it and be afraid, and no one will act so wickedly again.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When you begin living in the towns the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you, you may hear '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that scoundrels among you are leading their fellow citizens astray by saying, ‘Let us go worship other gods’—gods you have not known before. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In such cases, you must examine the facts carefully. If you find that the report is true and such a detestable act has been committed among you, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: you must attack that town and completely destroy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew term used here refers to the complete consecration of things or people to the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ', either by destroying them or by giving them as an offering; similarly in 13:17.'
      marker-yv: yv-n
    - type: text
      text: ' all its inhabitants, as well as all the livestock. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then you must pile all the plunder in the middle of the open square and burn it. Burn the entire town as a burnt offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. That town must remain a ruin forever; it may never be rebuilt. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Keep none of the plunder that has been set apart for destruction. Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will turn from his fierce anger and be merciful to you. He will have compassion on you and make you a large nation, just as he swore to your ancestors.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will be merciful only if you listen to his voice and keep all his commands that I am giving you today, doing what pleases him.'
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'and the predicted signs or miracles occur. If they then say, ‘Come, let us worship other gods’—gods you have not known before— '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'do not listen to them. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is testing you to see if you truly love him with all your heart and soul. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Serve only the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God and fear him alone. Obey his commands, listen to his voice, and cling to him. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The false prophets or visionaries who try to lead you astray must be put to death, for they encourage rebellion against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, who redeemed you from slavery and brought you out of the land of Egypt. Since they try to lead you astray from the way the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God commanded you to live, you must put them to death. In this way you will purge the evil from among you.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Suppose someone secretly entices you—even your brother, your son or daughter, your beloved wife, or your closest friend—and says, ‘Let us go worship other gods’—gods that neither you nor your ancestors have known. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They might suggest that you worship the gods of peoples who live nearby or who come from the ends of the earth. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But do not give in or listen. Have no pity, and do not spare or protect them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You must put them to death! Strike the first blow yourself, and then all the people must join in. '
