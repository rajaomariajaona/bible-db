document_id: PHP.1,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Greetings from Paul
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: This letter is from Paul and Timothy, slaves of Christ Jesus.
  - type: usfm
    marker: p
    children:
    - type: text
      text: I am writing to all of God’s holy people in Philippi who belong to Christ Jesus, including the church leaders
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'overseers, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: bishops.
      marker-yv: yv-n
    - type: text
      text: ' and deacons.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For I want you to understand what really matters, so that you may live pure and blameless lives until the day of Christ’s return. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: May you always be filled with the fruit of your salvation—the righteous character produced in your life by Jesus Christ
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: with the fruit of righteousness through Jesus Christ.
      marker-yv: yv-n
    - type: text
      text: —for this will bring much glory and praise to God.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Joy That Christ Is Preached
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: And I want you to know, my dear brothers and sisters,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: brothers.
      marker-yv: yv-n
    - type: text
      text: ' that everything that has happened to me here has helped to spread the Good News. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: For everyone here, including the whole palace guard,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: including all the Praetorium.
      marker-yv: yv-n
    - type: text
      text: ' knows that I am in chains because of Christ. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: And because of my imprisonment, most of the believers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:14a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: brothers in the Lord.
      marker-yv: yv-n
    - type: text
      text: ' here have gained confidence and boldly speak God’s message'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:14b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: speak the message.
      marker-yv: yv-n
    - type: text
      text: ' without fear.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'It’s true that some are preaching out of jealousy and rivalry. But others preach about Christ with pure motives. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'They preach because they love me, for they know I have been appointed to defend the Good News. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Those others do not have pure motives as they preach about Christ. They preach with selfish ambition, not sincerely, intending to make my chains more painful to me. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'But that doesn’t matter. Whether their motives are false or genuine, the message about Christ is being preached either way, so I rejoice. And I will continue to rejoice. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: For I know that as you pray for me and the Spirit of Jesus Christ helps me, this will lead to my deliverance.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Life for Christ
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: May God our Father and the Lord Jesus Christ give you grace and peace.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Thanksgiving and Prayer
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'For I fully expect and hope that I will never be ashamed, but that I will continue to be bold for Christ, as I have been in the past. And I trust that my life will bring honor to Christ, whether I live or die. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'For to me, living means living for Christ, and dying is even better. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'But if I live, I can do more fruitful work for Christ. So I really don’t know which is better. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'I’m torn between two desires: I long to go and be with Christ, which would be far better for me. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: But for your sakes, it is better that I continue to live.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Knowing this, I am convinced that I will remain alive so I can continue to help all of you grow and experience the joy of your faith. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: And when I come to you again, you will have even more reason to take pride in Christ Jesus because of what he is doing through me.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Live as Citizens of Heaven
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Above all, you must live as citizens of heaven, conducting yourselves in a manner worthy of the Good News about Christ. Then, whether I come and see you again or only hear about you, I will know that you are standing together with one spirit and one purpose, fighting together for the faith, which is the Good News. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Don’t be intimidated in any way by your enemies. This will be a sign to them that they are going to be destroyed, but that you are going to be saved, even by God himself. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'For you have been given not only the privilege of trusting in Christ but also the privilege of suffering for him. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Every time I think of you, I give thanks to my God. '
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: We are in this struggle together. You have seen my struggle in the past, and you know that I am still in the midst of it.
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Whenever I pray, I make my requests for all of you with joy, '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'for you have been my partners in spreading the Good News about Christ from the time you first heard it until now. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: And I am certain that God, who began the good work within you, will continue his work until it is finally finished on the day when Christ Jesus returns.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So it is right that I should feel as I do about all of you, for you have a special place in my heart. You share with me the special favor of God, both in my imprisonment and in defending and confirming the truth of the Good News. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: God knows how much I love you and long for you with the tender compassion of Christ Jesus.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'I pray that your love will overflow more and more, and that you will keep on growing in knowledge and understanding. '
