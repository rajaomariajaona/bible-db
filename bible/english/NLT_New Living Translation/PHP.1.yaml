document_id: PHP.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Greetings from Paul
  - type: text
    content: This letter is from Paul and Timothy, slaves of Christ Jesus.
  - type: text
    content: I am writing to all of God’s holy people in Philippi who belong to Christ Jesus, including the church leaders
  - type: note
    content: Or overseers, or bishops.
  - type: text
    content: ' and deacons.'
  '10':
  - type: text
    content: 'For I want you to understand what really matters, so that you may live pure and blameless lives until the day of Christ’s return. '
  '11':
  - type: text
    content: May you always be filled with the fruit of your salvation—the righteous character produced in your life by Jesus Christ
  - type: note
    content: Greek with the fruit of righteousness through Jesus Christ.
  - type: text
    content: —for this will bring much glory and praise to God.
  - type: heading
    content: Paul’s Joy That Christ Is Preached
  '12':
  - type: text
    content: And I want you to know, my dear brothers and sisters,
  - type: note
    content: Greek brothers.
  - type: text
    content: ' that everything that has happened to me here has helped to spread the Good News. '
  '13':
  - type: text
    content: For everyone here, including the whole palace guard,
  - type: note
    content: Greek including all the Praetorium.
  - type: text
    content: ' knows that I am in chains because of Christ. '
  '14':
  - type: text
    content: And because of my imprisonment, most of the believers
  - type: note
    content: Greek brothers in the Lord.
  - type: text
    content: ' here have gained confidence and boldly speak God’s message'
  - type: note
    content: Some manuscripts read speak the message.
  - type: text
    content: ' without fear.'
  '15':
  - type: text
    content: 'It’s true that some are preaching out of jealousy and rivalry. But others preach about Christ with pure motives. '
  '16':
  - type: text
    content: 'They preach because they love me, for they know I have been appointed to defend the Good News. '
  '17':
  - type: text
    content: 'Those others do not have pure motives as they preach about Christ. They preach with selfish ambition, not sincerely, intending to make my chains more painful to me. '
  '18':
  - type: text
    content: 'But that doesn’t matter. Whether their motives are false or genuine, the message about Christ is being preached either way, so I rejoice. And I will continue to rejoice. '
  '19':
  - type: text
    content: For I know that as you pray for me and the Spirit of Jesus Christ helps me, this will lead to my deliverance.
  - type: heading
    content: Paul’s Life for Christ
  '2':
  - type: text
    content: May God our Father and the Lord Jesus Christ give you grace and peace.
  - type: heading
    content: Paul’s Thanksgiving and Prayer
  '20':
  - type: text
    content: 'For I fully expect and hope that I will never be ashamed, but that I will continue to be bold for Christ, as I have been in the past. And I trust that my life will bring honor to Christ, whether I live or die. '
  '21':
  - type: text
    content: 'For to me, living means living for Christ, and dying is even better. '
  '22':
  - type: text
    content: 'But if I live, I can do more fruitful work for Christ. So I really don’t know which is better. '
  '23':
  - type: text
    content: 'I’m torn between two desires: I long to go and be with Christ, which would be far better for me. '
  '24':
  - type: text
    content: But for your sakes, it is better that I continue to live.
  '25':
  - type: text
    content: 'Knowing this, I am convinced that I will remain alive so I can continue to help all of you grow and experience the joy of your faith. '
  '26':
  - type: text
    content: And when I come to you again, you will have even more reason to take pride in Christ Jesus because of what he is doing through me.
  - type: heading
    content: Live as Citizens of Heaven
  '27':
  - type: text
    content: 'Above all, you must live as citizens of heaven, conducting yourselves in a manner worthy of the Good News about Christ. Then, whether I come and see you again or only hear about you, I will know that you are standing together with one spirit and one purpose, fighting together for the faith, which is the Good News. '
  '28':
  - type: text
    content: 'Don’t be intimidated in any way by your enemies. This will be a sign to them that they are going to be destroyed, but that you are going to be saved, even by God himself. '
  '29':
  - type: text
    content: 'For you have been given not only the privilege of trusting in Christ but also the privilege of suffering for him. '
  '3':
  - type: text
    content: 'Every time I think of you, I give thanks to my God. '
  '30':
  - type: text
    content: We are in this struggle together. You have seen my struggle in the past, and you know that I am still in the midst of it.
  '4':
  - type: text
    content: 'Whenever I pray, I make my requests for all of you with joy, '
  '5':
  - type: text
    content: 'for you have been my partners in spreading the Good News about Christ from the time you first heard it until now. '
  '6':
  - type: text
    content: And I am certain that God, who began the good work within you, will continue his work until it is finally finished on the day when Christ Jesus returns.
  '7':
  - type: text
    content: 'So it is right that I should feel as I do about all of you, for you have a special place in my heart. You share with me the special favor of God, both in my imprisonment and in defending and confirming the truth of the Good News. '
  '8':
  - type: text
    content: God knows how much I love you and long for you with the tender compassion of Christ Jesus.
  '9':
  - type: text
    content: 'I pray that your love will overflow more and more, and that you will keep on growing in knowledge and understanding. '
