document_id: ISA.25,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Praise for Judgment and Salvation
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I will honor and praise your name,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you are my God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You do such wonderful things!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You planned them long ago,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and now you have accomplished them.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s hand of blessing will rest on Jerusalem.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But Moab will be crushed.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It will be like straw trampled down and left to rot.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: God will push down Moab’s people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as a swimmer pushes down water with his hands.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will end their pride
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all their evil works.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The high walls of Moab will be demolished.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will be brought down to the ground,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: down into the dust.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: You turn mighty cities into heaps of ruins.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Cities with strong walls are turned to rubble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Beautiful palaces in distant lands disappear
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will never be rebuilt.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Therefore, strong nations will declare your glory;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ruthless nations will fear you.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'But you are a tower of refuge to the poor, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a tower of refuge to the needy in distress.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are a refuge from the storm
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a shelter from the heat.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the oppressive acts of ruthless people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are like a storm beating against a wall,
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: or like the relentless heat of the desert.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you silence the roar of foreign nations.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As the shade of a cloud cools relentless heat,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so the boastful songs of ruthless people are stilled.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: In Jerusalem,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'On this mountain; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 25:10.
      marker-yv: yv-n
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will spread a wonderful feast
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for all the people of the world.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will be a delicious banquet
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with clear, well-aged wine and choice meat.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: There he will remove the cloud of gloom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the shadow of death that hangs over the earth.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: He will swallow up death forever!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will wipe away all tears.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will remove forever all insults and mockery
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against his land and people.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has spoken!'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: In that day the people will proclaim,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “This is our God!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We trusted in him, and he saved us!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', in whom we trusted.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let us rejoice in the salvation he brings!”
