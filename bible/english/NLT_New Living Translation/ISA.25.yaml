document_id: ISA.25,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Praise for Judgment and Salvation
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', I will honor and praise your name,'
  - type: text
    content: for you are my God.
  - type: text
    content: You do such wonderful things!
  - type: text
    content: You planned them long ago,
  - type: text
    content: and now you have accomplished them.
  '10':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ’s hand of blessing will rest on Jerusalem.
  - type: text
    content: But Moab will be crushed.
  - type: text
    content: It will be like straw trampled down and left to rot.
  '11':
  - type: text
    content: God will push down Moab’s people
  - type: text
    content: as a swimmer pushes down water with his hands.
  - type: text
    content: He will end their pride
  - type: text
    content: and all their evil works.
  '12':
  - type: text
    content: The high walls of Moab will be demolished.
  - type: text
    content: They will be brought down to the ground,
  - type: text
    content: down into the dust.
  '2':
  - type: text
    content: You turn mighty cities into heaps of ruins.
  - type: text
    content: Cities with strong walls are turned to rubble.
  - type: text
    content: Beautiful palaces in distant lands disappear
  - type: text
    content: and will never be rebuilt.
  '3':
  - type: text
    content: Therefore, strong nations will declare your glory;
  - type: text
    content: ruthless nations will fear you.
  '4':
  - type: text
    content: 'But you are a tower of refuge to the poor, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: a tower of refuge to the needy in distress.
  - type: text
    content: You are a refuge from the storm
  - type: text
    content: and a shelter from the heat.
  - type: text
    content: For the oppressive acts of ruthless people
  - type: text
    content: are like a storm beating against a wall,
  '5':
  - type: text
    content: or like the relentless heat of the desert.
  - type: text
    content: But you silence the roar of foreign nations.
  - type: text
    content: As the shade of a cloud cools relentless heat,
  - type: text
    content: so the boastful songs of ruthless people are stilled.
  '6':
  - type: text
    content: In Jerusalem,
  - type: note
    content: Hebrew On this mountain; also in 25:10.
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies'
  - type: text
    content: will spread a wonderful feast
  - type: text
    content: for all the people of the world.
  - type: text
    content: It will be a delicious banquet
  - type: text
    content: with clear, well-aged wine and choice meat.
  '7':
  - type: text
    content: There he will remove the cloud of gloom,
  - type: text
    content: the shadow of death that hangs over the earth.
  '8':
  - type: text
    content: He will swallow up death forever!
  - type: text
    content: 'The Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' will wipe away all tears.'
  - type: text
    content: He will remove forever all insults and mockery
  - type: text
    content: against his land and people.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken!'
  '9':
  - type: text
    content: In that day the people will proclaim,
  - type: text
    content: “This is our God!
  - type: text
    content: We trusted in him, and he saved us!
  - type: text
    content: 'This is the '
  - type: text
    content: Lord
  - type: text
    content: ', in whom we trusted.'
  - type: text
    content: Let us rejoice in the salvation he brings!”
