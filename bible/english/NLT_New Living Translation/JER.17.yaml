document_id: JER.17,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Judah’s Sin and Punishment
  - type: text
    content: “The sin of Judah
  - type: text
    content: is inscribed with an iron chisel—
  - type: text
    content: engraved with a diamond point on their stony hearts
  - type: text
    content: and on the corners of their altars.
  '10':
  - type: text
    content: 'But I, the '
  - type: text
    content: Lord
  - type: text
    content: ', search all hearts'
  - type: text
    content: and examine secret motives.
  - type: text
    content: I give all people their due rewards,
  - type: text
    content: according to what their actions deserve.”
  - type: heading
    content: Jeremiah’s Trust in the Lord
  '11':
  - type: text
    content: Like a partridge that hatches eggs she has not laid,
  - type: text
    content: so are those who get their wealth by unjust means.
  - type: text
    content: At midlife they will lose their riches;
  - type: text
    content: in the end, they will become poor old fools.
  '12':
  - type: text
    content: But we worship at your throne—
  - type: text
    content: eternal, high, and glorious!
  '13':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', the hope of Israel,'
  - type: text
    content: all who turn away from you will be disgraced.
  - type: text
    content: They will be buried in the dust of the earth,
  - type: text
    content: 'for they have abandoned the '
  - type: text
    content: Lord
  - type: text
    content: ', the fountain of living water.'
  '14':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', if you heal me, I will be truly healed;'
  - type: text
    content: if you save me, I will be truly saved.
  - type: text
    content: My praises are for you alone!
  '15':
  - type: text
    content: People scoff at me and say,
  - type: text
    content: '“What is this ‘message from the '
  - type: text
    content: Lord
  - type: text
    content: ’ you talk about?
  - type: text
    content: Why don’t your predictions come true?”
  '16':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', I have not abandoned my job'
  - type: text
    content: as a shepherd for your people.
  - type: text
    content: I have not urged you to send disaster.
  - type: text
    content: You have heard everything I’ve said.
  '17':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', don’t terrorize me!'
  - type: text
    content: You alone are my hope in the day of disaster.
  '18':
  - type: text
    content: Bring shame and dismay on all who persecute me,
  - type: text
    content: but don’t let me experience shame and dismay.
  - type: text
    content: Bring a day of terror on them.
  - type: text
    content: Yes, bring double destruction upon them!
  - type: heading
    content: Observing the Sabbath
  '19':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me: “Go and stand in the gates of Jerusalem, first in the gate where the king goes in and out, and then in each of the other gates. '
  '2':
  - type: text
    content: Even their children go to worship
  - type: text
    content: at their pagan altars and Asherah poles,
  - type: text
    content: beneath every green tree
  - type: text
    content: and on every high hill.
  '20':
  - type: text
    content: 'Say to all the people, ‘Listen to this message from the '
  - type: text
    content: Lord
  - type: text
    content: ', you kings of Judah and all you people of Judah and everyone living in Jerusalem. '
  '21':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Listen to my warning! Stop carrying on your trade at Jerusalem’s gates on the Sabbath day. '
  '22':
  - type: text
    content: 'Do not do your work on the Sabbath, but make it a holy day. I gave this command to your ancestors, '
  '23':
  - type: text
    content: but they did not listen or obey. They stubbornly refused to pay attention or accept my discipline.
  '24':
  - type: text
    content: '“‘But if you obey me, says the '
  - type: text
    content: Lord
  - type: text
    content: ', and do not carry on your trade at the gates or work on the Sabbath day, and if you keep it holy, '
  '25':
  - type: text
    content: 'then kings and their officials will go in and out of these gates forever. There will always be a descendant of David sitting on the throne here in Jerusalem. Kings and their officials will always ride in and out among the people of Judah in chariots and on horses, and this city will remain forever. '
  '26':
  - type: text
    content: And from all around Jerusalem, from the towns of Judah and Benjamin, from the western foothills
  - type: note
    content: Hebrew the Shephelah.
  - type: text
    content: ' and the hill country and the Negev, the people will come with their burnt offerings and sacrifices. They will bring their grain offerings, frankincense, and thanksgiving offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple.
  '27':
  - type: text
    content: “‘But if you do not listen to me and refuse to keep the Sabbath holy, and if on the Sabbath day you bring loads of merchandise through the gates of Jerusalem just as on other days, then I will set fire to these gates. The fire will spread to the palaces, and no one will be able to put out the roaring flames.’”
  '3':
  - type: text
    content: So I will hand over my holy mountain—
  - type: text
    content: along with all your wealth and treasures
  - type: text
    content: and your pagan shrines—
  - type: text
    content: as plunder to your enemies,
  - type: text
    content: for sin runs rampant in your land.
  '4':
  - type: text
    content: The wonderful possession I have reserved for you
  - type: text
    content: will slip from your hands.
  - type: text
    content: I will tell your enemies to take you
  - type: text
    content: as captives to a foreign land.
  - type: text
    content: For my anger blazes like a fire
  - type: text
    content: that will burn forever.”
  - type: heading
    content: Wisdom from the Lord
  '5':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Cursed are those who put their trust in mere humans,
  - type: text
    content: who rely on human strength
  - type: text
    content: 'and turn their hearts away from the '
  - type: text
    content: Lord
  - type: text
    content: .
  '6':
  - type: text
    content: They are like stunted shrubs in the desert,
  - type: text
    content: with no hope for the future.
  - type: text
    content: They will live in the barren wilderness,
  - type: text
    content: in an uninhabited salty land.
  '7':
  - type: text
    content: '“But blessed are those who trust in the '
  - type: text
    content: Lord
  - type: text
    content: 'and have made the '
  - type: text
    content: Lord
  - type: text
    content: ' their hope and confidence.'
  '8':
  - type: text
    content: They are like trees planted along a riverbank,
  - type: text
    content: with roots that reach deep into the water.
  - type: text
    content: Such trees are not bothered by the heat
  - type: text
    content: or worried by long months of drought.
  - type: text
    content: Their leaves stay green,
  - type: text
    content: and they never stop producing fruit.
  '9':
  - type: text
    content: “The human heart is the most deceitful of all things,
  - type: text
    content: and desperately wicked.
  - type: text
    content: Who really knows how bad it is?
