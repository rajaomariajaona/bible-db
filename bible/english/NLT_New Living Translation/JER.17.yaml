document_id: JER.17
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judah’s Sin and Punishment
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “The sin of Judah
- type: usfm
  marker: q2
  children:
  - type: text
    text: is inscribed with an iron chisel—
- type: usfm
  marker: q1
  children:
  - type: text
    text: engraved with a diamond point on their stony hearts
- type: usfm
  marker: q2
  children:
  - type: text
    text: and on the corners of their altars.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Even their children go to worship
- type: usfm
  marker: q2
  children:
  - type: text
    text: at their pagan altars and Asherah poles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: beneath every green tree
- type: usfm
  marker: q2
  children:
  - type: text
    text: and on every high hill.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: So I will hand over my holy mountain—
- type: usfm
  marker: q2
  children:
  - type: text
    text: along with all your wealth and treasures
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your pagan shrines—
- type: usfm
  marker: q1
  children:
  - type: text
    text: as plunder to your enemies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for sin runs rampant in your land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The wonderful possession I have reserved for you
- type: usfm
  marker: q2
  children:
  - type: text
    text: will slip from your hands.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will tell your enemies to take you
- type: usfm
  marker: q2
  children:
  - type: text
    text: as captives to a foreign land.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For my anger blazes like a fire
- type: usfm
  marker: q2
  children:
  - type: text
    text: that will burn forever.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Wisdom from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Cursed are those who put their trust in mere humans,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who rely on human strength
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and turn their hearts away from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They are like stunted shrubs in the desert,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with no hope for the future.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will live in the barren wilderness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in an uninhabited salty land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“But blessed are those who trust in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and have made the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' their hope and confidence.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They are like trees planted along a riverbank,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with roots that reach deep into the water.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Such trees are not bothered by the heat
- type: usfm
  marker: q2
  children:
  - type: text
    text: or worried by long months of drought.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their leaves stay green,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they never stop producing fruit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “The human heart is the most deceitful of all things,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and desperately wicked.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who really knows how bad it is?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', search all hearts'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and examine secret motives.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I give all people their due rewards,
- type: usfm
  marker: q2
  children:
  - type: text
    text: according to what their actions deserve.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jeremiah’s Trust in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Like a partridge that hatches eggs she has not laid,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so are those who get their wealth by unjust means.
- type: usfm
  marker: q1
  children:
  - type: text
    text: At midlife they will lose their riches;
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the end, they will become poor old fools.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But we worship at your throne—
- type: usfm
  marker: q2
  children:
  - type: text
    text: eternal, high, and glorious!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the hope of Israel,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: all who turn away from you will be disgraced.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will be buried in the dust of the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for they have abandoned the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the fountain of living water.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', if you heal me, I will be truly healed;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: if you save me, I will be truly saved.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My praises are for you alone!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: People scoff at me and say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“What is this ‘message from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’ you talk about?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why don’t your predictions come true?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', I have not abandoned my job'
- type: usfm
  marker: q2
  children:
  - type: text
    text: as a shepherd for your people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have not urged you to send disaster.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You have heard everything I’ve said.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', don’t terrorize me!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: You alone are my hope in the day of disaster.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Bring shame and dismay on all who persecute me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but don’t let me experience shame and dismay.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bring a day of terror on them.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yes, bring double destruction upon them!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Observing the Sabbath
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to me: “Go and stand in the gates of Jerusalem, first in the gate where the king goes in and out, and then in each of the other gates. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Say to all the people, ‘Listen to this message from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you kings of Judah and all you people of Judah and everyone living in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Listen to my warning! Stop carrying on your trade at Jerusalem’s gates on the Sabbath day. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Do not do your work on the Sabbath, but make it a holy day. I gave this command to your ancestors, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: but they did not listen or obey. They stubbornly refused to pay attention or accept my discipline.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“‘But if you obey me, says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and do not carry on your trade at the gates or work on the Sabbath day, and if you keep it holy, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'then kings and their officials will go in and out of these gates forever. There will always be a descendant of David sitting on the throne here in Jerusalem. Kings and their officials will always ride in and out among the people of Judah in chariots and on horses, and this city will remain forever. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: And from all around Jerusalem, from the towns of Judah and Benjamin, from the western foothills
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Shephelah.
    marker-yv: yv-n
  - type: text
    text: ' and the hill country and the Negev, the people will come with their burnt offerings and sacrifices. They will bring their grain offerings, frankincense, and thanksgiving offerings to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Temple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “‘But if you do not listen to me and refuse to keep the Sabbath holy, and if on the Sabbath day you bring loads of merchandise through the gates of Jerusalem just as on other days, then I will set fire to these gates. The fire will spread to the palaces, and no one will be able to put out the roaring flames.’”
