document_id: NUM.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Silver Trumpets
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Make two trumpets of hammered silver for calling the community to assemble and for signaling the breaking of camp. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: When both trumpets are blown, everyone must gather before you at the entrance of the Tabernacle.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Tent of Meeting.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But if only one trumpet is blown, then only the leaders—the heads of the clans of Israel—must present themselves to you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“When you sound the signal to move on, the tribes camped on the east side of the Tabernacle must break camp and move forward. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When you sound the signal a second time, the tribes camped on the south will follow. You must sound short blasts as the signal for moving on. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But when you call the people to an assembly, blow the trumpets with a different signal. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Only the priests, Aaron’s descendants, are allowed to blow the trumpets. This is a permanent law for you, to be observed from generation to generation.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“When you arrive in your own land and go to war against your enemies who attack you, sound the alarm with the trumpets. Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God will remember you and rescue you from your enemies. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Blow the trumpets in times of gladness, too, sounding them at your annual festivals and at the beginning of each month. And blow the trumpets over your burnt offerings and peace offerings. The trumpets will remind your God of his covenant with you. I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Israelites Leave Sinai
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: In the second year after Israel’s departure from Egypt—on the twentieth day of the second month
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:11a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This day in the ancient Hebrew lunar calendar occurred in late April, May, or early June.
    marker-yv: yv-n
  - type: text
    text: —the cloud lifted from the Tabernacle of the Covenant.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:11b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Tabernacle of the Testimony.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So the Israelites set out from the wilderness of Sinai and traveled on from place to place until the cloud stopped in the wilderness of Paran.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When the people set out for the first time, following the instructions the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had given through Moses, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Judah’s troops led the way. They marched behind their banner, and their leader was Nahshon son of Amminadab. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'They were joined by the troops of the tribe of Issachar, led by Nethanel son of Zuar, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: and the troops of the tribe of Zebulun, led by Eliab son of Helon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then the Tabernacle was taken down, and the Gershonite and Merarite divisions of the Levites were next in the line of march, carrying the Tabernacle with them. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Reuben’s troops went next, marching behind their banner. Their leader was Elizur son of Shedeur. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'They were joined by the troops of the tribe of Simeon, led by Shelumiel son of Zurishaddai, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: and the troops of the tribe of Gad, led by Eliasaph son of Deuel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Next came the Kohathite division of the Levites, carrying the sacred objects from the Tabernacle. Before they arrived at the next camp, the Tabernacle would already be set up at its new location. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ephraim’s troops went next, marching behind their banner. Their leader was Elishama son of Ammihud. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'They were joined by the troops of the tribe of Manasseh, led by Gamaliel son of Pedahzur, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: and the troops of the tribe of Benjamin, led by Abidan son of Gideoni.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dan’s troops went last, marching behind their banner and serving as the rear guard for all the tribal camps. Their leader was Ahiezer son of Ammishaddai. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'They were joined by the troops of the tribe of Asher, led by Pagiel son of Ocran, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: and the troops of the tribe of Naphtali, led by Ahira son of Enan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: This was the order in which the Israelites marched, division by division.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'One day Moses said to his brother-in-law, Hobab son of Reuel the Midianite, “We are on our way to the place the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' promised us, for he said, ‘I will give it to you.’ Come with us and we will treat you well, for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has promised wonderful blessings for Israel!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: But Hobab replied, “No, I will not go. I must return to my own land and family.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '“Please don’t leave us,” Moses pleaded. “You know the places in the wilderness where we should camp. Come, be our guide. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'If you do, we’ll share with you all the blessings the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gives us.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'They marched for three days after leaving the mountain of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', with the Ark of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Covenant moving ahead of them to show them where to stop and rest. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'As they moved on each day, the cloud of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' hovered over them. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And whenever the Ark set out, Moses would shout, “Arise, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and let your enemies be scattered! Let them flee before you!” '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And when the Ark was set down, he would say, “Return, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', to the countless thousands of Israel!”'
