document_id: NUM.10,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Silver Trumpets
  - type: text
    content: 'Now the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: 'Blow the trumpets in times of gladness, too, sounding them at your annual festivals and at the beginning of each month. And blow the trumpets over your burnt offerings and peace offerings. The trumpets will remind your God of his covenant with you. I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.”'
  - type: heading
    content: The Israelites Leave Sinai
  '11':
  - type: text
    content: In the second year after Israel’s departure from Egypt—on the twentieth day of the second month
  - type: note
    content: This day in the ancient Hebrew lunar calendar occurred in late April, May, or early June.
  - type: text
    content: —the cloud lifted from the Tabernacle of the Covenant.
  - type: note
    content: Or Tabernacle of the Testimony.
  - type: text
    content: ' '
  '12':
  - type: text
    content: So the Israelites set out from the wilderness of Sinai and traveled on from place to place until the cloud stopped in the wilderness of Paran.
  '13':
  - type: text
    content: 'When the people set out for the first time, following the instructions the '
  - type: text
    content: Lord
  - type: text
    content: ' had given through Moses, '
  '14':
  - type: text
    content: 'Judah’s troops led the way. They marched behind their banner, and their leader was Nahshon son of Amminadab. '
  '15':
  - type: text
    content: 'They were joined by the troops of the tribe of Issachar, led by Nethanel son of Zuar, '
  '16':
  - type: text
    content: and the troops of the tribe of Zebulun, led by Eliab son of Helon.
  '17':
  - type: text
    content: 'Then the Tabernacle was taken down, and the Gershonite and Merarite divisions of the Levites were next in the line of march, carrying the Tabernacle with them. '
  '18':
  - type: text
    content: 'Reuben’s troops went next, marching behind their banner. Their leader was Elizur son of Shedeur. '
  '19':
  - type: text
    content: 'They were joined by the troops of the tribe of Simeon, led by Shelumiel son of Zurishaddai, '
  '2':
  - type: text
    content: '“Make two trumpets of hammered silver for calling the community to assemble and for signaling the breaking of camp. '
  '20':
  - type: text
    content: and the troops of the tribe of Gad, led by Eliasaph son of Deuel.
  '21':
  - type: text
    content: 'Next came the Kohathite division of the Levites, carrying the sacred objects from the Tabernacle. Before they arrived at the next camp, the Tabernacle would already be set up at its new location. '
  '22':
  - type: text
    content: 'Ephraim’s troops went next, marching behind their banner. Their leader was Elishama son of Ammihud. '
  '23':
  - type: text
    content: 'They were joined by the troops of the tribe of Manasseh, led by Gamaliel son of Pedahzur, '
  '24':
  - type: text
    content: and the troops of the tribe of Benjamin, led by Abidan son of Gideoni.
  '25':
  - type: text
    content: 'Dan’s troops went last, marching behind their banner and serving as the rear guard for all the tribal camps. Their leader was Ahiezer son of Ammishaddai. '
  '26':
  - type: text
    content: 'They were joined by the troops of the tribe of Asher, led by Pagiel son of Ocran, '
  '27':
  - type: text
    content: and the troops of the tribe of Naphtali, led by Ahira son of Enan.
  '28':
  - type: text
    content: This was the order in which the Israelites marched, division by division.
  '29':
  - type: text
    content: 'One day Moses said to his brother-in-law, Hobab son of Reuel the Midianite, “We are on our way to the place the '
  - type: text
    content: Lord
  - type: text
    content: ' promised us, for he said, ‘I will give it to you.’ Come with us and we will treat you well, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has promised wonderful blessings for Israel!”'
  '3':
  - type: text
    content: When both trumpets are blown, everyone must gather before you at the entrance of the Tabernacle.
  - type: note
    content: Hebrew Tent of Meeting.
  - type: text
    content: ' '
  '30':
  - type: text
    content: But Hobab replied, “No, I will not go. I must return to my own land and family.”
  '31':
  - type: text
    content: '“Please don’t leave us,” Moses pleaded. “You know the places in the wilderness where we should camp. Come, be our guide. '
  '32':
  - type: text
    content: 'If you do, we’ll share with you all the blessings the '
  - type: text
    content: Lord
  - type: text
    content: ' gives us.”'
  '33':
  - type: text
    content: 'They marched for three days after leaving the mountain of the '
  - type: text
    content: Lord
  - type: text
    content: ', with the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Covenant moving ahead of them to show them where to stop and rest. '
  '34':
  - type: text
    content: 'As they moved on each day, the cloud of the '
  - type: text
    content: Lord
  - type: text
    content: ' hovered over them. '
  '35':
  - type: text
    content: 'And whenever the Ark set out, Moses would shout, “Arise, O '
  - type: text
    content: Lord
  - type: text
    content: ', and let your enemies be scattered! Let them flee before you!” '
  '36':
  - type: text
    content: 'And when the Ark was set down, he would say, “Return, O '
  - type: text
    content: Lord
  - type: text
    content: ', to the countless thousands of Israel!”'
  '4':
  - type: text
    content: But if only one trumpet is blown, then only the leaders—the heads of the clans of Israel—must present themselves to you.
  '5':
  - type: text
    content: '“When you sound the signal to move on, the tribes camped on the east side of the Tabernacle must break camp and move forward. '
  '6':
  - type: text
    content: 'When you sound the signal a second time, the tribes camped on the south will follow. You must sound short blasts as the signal for moving on. '
  '7':
  - type: text
    content: 'But when you call the people to an assembly, blow the trumpets with a different signal. '
  '8':
  - type: text
    content: Only the priests, Aaron’s descendants, are allowed to blow the trumpets. This is a permanent law for you, to be observed from generation to generation.
  '9':
  - type: text
    content: '“When you arrive in your own land and go to war against your enemies who attack you, sound the alarm with the trumpets. Then the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will remember you and rescue you from your enemies. '
