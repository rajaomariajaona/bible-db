document_id: REV.11,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Two Witnesses
  - type: text
    content: 'Then I was given a measuring stick, and I was told, “Go and measure the Temple of God and the altar, and count the number of worshipers. '
  '10':
  - type: text
    content: All the people who belong to this world will gloat over them and give presents to each other to celebrate the death of the two prophets who had tormented them.
  '11':
  - type: text
    content: 'But after three and a half days, God breathed life into them, and they stood up! Terror struck all who were staring at them. '
  '12':
  - type: text
    content: Then a loud voice from heaven called to the two prophets, “Come up here!” And they rose to heaven in a cloud as their enemies watched.
  '13':
  - type: text
    content: At the same time there was a terrible earthquake that destroyed a tenth of the city. Seven thousand people died in that earthquake, and everyone else was terrified and gave glory to the God of heaven.
  '14':
  - type: text
    content: The second terror is past, but look, the third terror is coming quickly.
  - type: heading
    content: The Seventh Trumpet Brings the Third Terror
  '15':
  - type: text
    content: 'Then the seventh angel blew his trumpet, and there were loud voices shouting in heaven:'
  - type: text
    content: “The world has now become the Kingdom of our Lord and of his Christ,
  - type: note
    content: Or his Messiah.
  - type: text
    content: and he will reign forever and ever.”
  '16':
  - type: text
    content: 'The twenty-four elders sitting on their thrones before God fell with their faces to the ground and worshiped him. '
  '17':
  - type: text
    content: And they said,
  - type: text
    content: “We give thanks to you, Lord God, the Almighty,
  - type: text
    content: the one who is and who always was,
  - type: text
    content: for now you have assumed your great power
  - type: text
    content: and have begun to reign.
  '18':
  - type: text
    content: The nations were filled with wrath,
  - type: text
    content: but now the time of your wrath has come.
  - type: text
    content: It is time to judge the dead
  - type: text
    content: and reward your servants the prophets,
  - type: text
    content: as well as your holy people,
  - type: text
    content: and all who fear your name,
  - type: text
    content: from the least to the greatest.
  - type: text
    content: It is time to destroy
  - type: text
    content: all who have caused destruction on the earth.”
  '19':
  - type: text
    content: Then, in heaven, the Temple of God was opened and the Ark of his covenant could be seen inside the Temple. Lightning flashed, thunder crashed and roared, and there was an earthquake and a terrible hailstorm.
  '2':
  - type: text
    content: 'But do not measure the outer courtyard, for it has been turned over to the nations. They will trample the holy city for 42 months. '
  '3':
  - type: text
    content: And I will give power to my two witnesses, and they will be clothed in burlap and will prophesy during those 1,260 days.”
  '4':
  - type: text
    content: 'These two prophets are the two olive trees and the two lampstands that stand before the Lord of all the earth. '
  '5':
  - type: text
    content: 'If anyone tries to harm them, fire flashes from their mouths and consumes their enemies. This is how anyone who tries to harm them must die. '
  '6':
  - type: text
    content: They have power to shut the sky so that no rain will fall for as long as they prophesy. And they have the power to turn the rivers and oceans into blood, and to strike the earth with every kind of plague as often as they wish.
  '7':
  - type: text
    content: When they complete their testimony, the beast that comes up out of the bottomless pit
  - type: note
    content: Or the abyss, or the underworld.
  - type: text
    content: ' will declare war against them, and he will conquer them and kill them. '
  '8':
  - type: text
    content: And their bodies will lie in the main street of Jerusalem,
  - type: note
    content: Greek the great city.
  - type: text
    content: ' the city that is figuratively called “Sodom” and “Egypt,” the city where their Lord was crucified. '
  '9':
  - type: text
    content: 'And for three and a half days, all peoples, tribes, languages, and nations will stare at their bodies. No one will be allowed to bury them. '
