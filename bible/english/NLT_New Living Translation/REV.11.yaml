document_id: REV.11,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Two Witnesses
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then I was given a measuring stick, and I was told, “Go and measure the Temple of God and the altar, and count the number of worshipers. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All the people who belong to this world will gloat over them and give presents to each other to celebrate the death of the two prophets who had tormented them.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But after three and a half days, God breathed life into them, and they stood up! Terror struck all who were staring at them. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then a loud voice from heaven called to the two prophets, “Come up here!” And they rose to heaven in a cloud as their enemies watched.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At the same time there was a terrible earthquake that destroyed a tenth of the city. Seven thousand people died in that earthquake, and everyone else was terrified and gave glory to the God of heaven.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The second terror is past, but look, the third terror is coming quickly.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Seventh Trumpet Brings the Third Terror
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the seventh angel blew his trumpet, and there were loud voices shouting in heaven:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The world has now become the Kingdom of our Lord and of his Christ,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: his Messiah.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he will reign forever and ever.”
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The twenty-four elders sitting on their thrones before God fell with their faces to the ground and worshiped him. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And they said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “We give thanks to you, Lord God, the Almighty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the one who is and who always was,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for now you have assumed your great power
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have begun to reign.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The nations were filled with wrath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but now the time of your wrath has come.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is time to judge the dead
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and reward your servants the prophets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as well as your holy people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and all who fear your name,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the least to the greatest.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is time to destroy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all who have caused destruction on the earth.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then, in heaven, the Temple of God was opened and the Ark of his covenant could be seen inside the Temple. Lightning flashed, thunder crashed and roared, and there was an earthquake and a terrible hailstorm.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But do not measure the outer courtyard, for it has been turned over to the nations. They will trample the holy city for 42 months. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And I will give power to my two witnesses, and they will be clothed in burlap and will prophesy during those 1,260 days.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These two prophets are the two olive trees and the two lampstands that stand before the Lord of all the earth. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If anyone tries to harm them, fire flashes from their mouths and consumes their enemies. This is how anyone who tries to harm them must die. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They have power to shut the sky so that no rain will fall for as long as they prophesy. And they have the power to turn the rivers and oceans into blood, and to strike the earth with every kind of plague as often as they wish.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When they complete their testimony, the beast that comes up out of the bottomless pit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the abyss, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the underworld.
      marker-yv: yv-n
    - type: text
      text: ' will declare war against them, and he will conquer them and kill them. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And their bodies will lie in the main street of Jerusalem,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the great city.
      marker-yv: yv-n
    - type: text
      text: ' the city that is figuratively called “Sodom” and “Egypt,” the city where their Lord was crucified. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And for three and a half days, all peoples, tribes, languages, and nations will stare at their bodies. No one will be allowed to bury them. '
