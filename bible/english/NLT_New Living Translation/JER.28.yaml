document_id: JER.28,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah Condemns Hananiah
  - type: text
    content: One day in late summer
  - type: note
    content: Hebrew In the fifth month, of the ancient Hebrew lunar calendar. The fifth month in the fourth year of Zedekiah’s reign occurred within the months of August and September 593 b.c. Also see note on 1:3.
  - type: text
    content: ' of that same year—the fourth year of the reign of Zedekiah, king of Judah—Hananiah son of Azzur, a prophet from Gibeon, addressed me publicly in the Temple while all the priests and people listened. He said, '
  '10':
  - type: text
    content: 'Then Hananiah the prophet took the yoke off Jeremiah’s neck and broke it in pieces. '
  '11':
  - type: text
    content: 'And Hananiah said again to the crowd that had gathered, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘Just as this yoke has been broken, within two years I will break the yoke of oppression from all the nations now subject to King Nebuchadnezzar of Babylon.’” With that, Jeremiah left the Temple area.'
  '12':
  - type: text
    content: 'Soon after this confrontation with Hananiah, the '
  - type: text
    content: Lord
  - type: text
    content: ' gave this message to Jeremiah: '
  '13':
  - type: text
    content: '“Go and tell Hananiah, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: You have broken a wooden yoke, but you have replaced it with a yoke of iron. '
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, the God of Israel, says: I have put a yoke of iron on the necks of all these nations, forcing them into slavery under King Nebuchadnezzar of Babylon. I have put everything, even the wild animals, under his control.’”'
  '15':
  - type: text
    content: 'Then Jeremiah the prophet said to Hananiah, “Listen, Hananiah! The '
  - type: text
    content: Lord
  - type: text
    content: ' has not sent you, but the people believe your lies. '
  '16':
  - type: text
    content: 'Therefore, this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘You must die. Your life will end this very year because you have rebelled against the '
  - type: text
    content: Lord
  - type: text
    content: .’”
  '17':
  - type: text
    content: Two months later
  - type: note
    content: Hebrew In the seventh month of that same year. See 28:1 and the note there.
  - type: text
    content: ' the prophet Hananiah died.'
  '2':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, the God of Israel, says: ‘I will remove the yoke of the king of Babylon from your necks. '
  '3':
  - type: text
    content: 'Within two years I will bring back all the Temple treasures that King Nebuchadnezzar carried off to Babylon. '
  '4':
  - type: text
    content: And I will bring back Jehoiachin
  - type: note
    content: Hebrew Jeconiah, a variant spelling of Jehoiachin.
  - type: text
    content: ' son of Jehoiakim, king of Judah, and all the other captives that were taken to Babylon. I will surely break the yoke that the king of Babylon has put on your necks. I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!’”'
  '5':
  - type: text
    content: 'Jeremiah responded to Hananiah as they stood in front of all the priests and people at the Temple. '
  '6':
  - type: text
    content: 'He said, “Amen! May your prophecies come true! I hope the '
  - type: text
    content: Lord
  - type: text
    content: ' does everything you say. I hope he does bring back from Babylon the treasures of this Temple and all the captives. '
  '7':
  - type: text
    content: 'But listen now to the solemn words I speak to you in the presence of all these people. '
  '8':
  - type: text
    content: 'The ancient prophets who preceded you and me spoke against many nations, always warning of war, disaster, and disease. '
  '9':
  - type: text
    content: 'So a prophet who predicts peace must show he is right. Only when his predictions come true can we know that he is really from the '
  - type: text
    content: Lord
  - type: text
    content: .”
