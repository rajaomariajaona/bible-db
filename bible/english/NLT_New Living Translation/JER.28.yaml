document_id: JER.28
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah Condemns Hananiah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: One day in late summer
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'In the fifth month, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'of the ancient Hebrew lunar calendar. The fifth month in the fourth year of Zedekiah’s reign occurred within the months of August and September 593 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ' Also see note on 1:3.'
    marker-yv: yv-n
  - type: text
    text: ' of that same year—the fourth year of the reign of Zedekiah, king of Judah—Hananiah son of Azzur, a prophet from Gibeon, addressed me publicly in the Temple while all the priests and people listened. He said, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, the God of Israel, says: ‘I will remove the yoke of the king of Babylon from your necks. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Within two years I will bring back all the Temple treasures that King Nebuchadnezzar carried off to Babylon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And I will bring back Jehoiachin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jeconiah, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Jehoiachin.
    marker-yv: yv-n
  - type: text
    text: ' son of Jehoiakim, king of Judah, and all the other captives that were taken to Babylon. I will surely break the yoke that the king of Babylon has put on your necks. I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jeremiah responded to Hananiah as they stood in front of all the priests and people at the Temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He said, “Amen! May your prophecies come true! I hope the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' does everything you say. I hope he does bring back from Babylon the treasures of this Temple and all the captives. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But listen now to the solemn words I speak to you in the presence of all these people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The ancient prophets who preceded you and me spoke against many nations, always warning of war, disaster, and disease. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So a prophet who predicts peace must show he is right. Only when his predictions come true can we know that he is really from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Hananiah the prophet took the yoke off Jeremiah’s neck and broke it in pieces. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Hananiah said again to the crowd that had gathered, “This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: ‘Just as this yoke has been broken, within two years I will break the yoke of oppression from all the nations now subject to King Nebuchadnezzar of Babylon.’” With that, Jeremiah left the Temple area.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Soon after this confrontation with Hananiah, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave this message to Jeremiah: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“Go and tell Hananiah, ‘This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: You have broken a wooden yoke, but you have replaced it with a yoke of iron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, the God of Israel, says: I have put a yoke of iron on the necks of all these nations, forcing them into slavery under King Nebuchadnezzar of Babylon. I have put everything, even the wild animals, under his control.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then Jeremiah the prophet said to Hananiah, “Listen, Hananiah! The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has not sent you, but the people believe your lies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Therefore, this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: ‘You must die. Your life will end this very year because you have rebelled against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Two months later
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'In the seventh month of that same year. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See 28:1 and the note there.
    marker-yv: yv-n
  - type: text
    text: ' the prophet Hananiah died.'
