document_id: GEN.30,116
type_code: eng
verses:
  '1':
  - type: text
    content: When Rachel saw that she wasn’t having any children for Jacob, she became jealous of her sister. She pleaded with Jacob, “Give me children, or I’ll die!”
  '10':
  - type: text
    content: 'Soon Zilpah presented him with a son. '
  '11':
  - type: text
    content: Leah named him Gad,
  - type: note
    content: Gad means “good fortune.”
  - type: text
    content: ' for she said, “How fortunate I am!” '
  '12':
  - type: text
    content: 'Then Zilpah gave Jacob a second son. '
  '13':
  - type: text
    content: And Leah named him Asher,
  - type: note
    content: Asher means “happy.”
  - type: text
    content: ' for she said, “What joy is mine! Now the other women will celebrate with me.”'
  '14':
  - type: text
    content: One day during the wheat harvest, Reuben found some mandrakes growing in a field and brought them to his mother, Leah. Rachel begged Leah, “Please give me some of your son’s mandrakes.”
  '15':
  - type: text
    content: But Leah angrily replied, “Wasn’t it enough that you stole my husband? Now will you steal my son’s mandrakes, too?”
  - type: text
    content: Rachel answered, “I will let Jacob sleep with you tonight if you give me some of the mandrakes.”
  '16':
  - type: text
    content: 'So that evening, as Jacob was coming home from the fields, Leah went out to meet him. “You must come and sleep with me tonight!” she said. “I have paid for you with some mandrakes that my son found.” So that night he slept with Leah. '
  '17':
  - type: text
    content: 'And God answered Leah’s prayers. She became pregnant again and gave birth to a fifth son for Jacob. '
  '18':
  - type: text
    content: She named him Issachar,
  - type: note
    content: Issachar sounds like a Hebrew term that means “reward.”
  - type: text
    content: ' for she said, “God has rewarded me for giving my servant to my husband as a wife.” '
  '19':
  - type: text
    content: 'Then Leah became pregnant again and gave birth to a sixth son for Jacob. '
  '2':
  - type: text
    content: Then Jacob became furious with Rachel. “Am I God?” he asked. “He’s the one who has kept you from having children!”
  '20':
  - type: text
    content: She named him Zebulun,
  - type: note
    content: Zebulun probably means “honor.”
  - type: text
    content: ' for she said, “God has given me a good reward. Now my husband will treat me with respect, for I have given him six sons.” '
  '21':
  - type: text
    content: Later she gave birth to a daughter and named her Dinah.
  '22':
  - type: text
    content: 'Then God remembered Rachel’s plight and answered her prayers by enabling her to have children. '
  '23':
  - type: text
    content: 'She became pregnant and gave birth to a son. “God has removed my disgrace,” she said. '
  '24':
  - type: text
    content: And she named him Joseph,
  - type: note
    content: Joseph means “may he add.”
  - type: text
    content: ' for she said, “May the '
  - type: text
    content: Lord
  - type: text
    content: ' add yet another son to my family.”'
  - type: heading
    content: Jacob’s Wealth Increases
  '25':
  - type: text
    content: 'Soon after Rachel had given birth to Joseph, Jacob said to Laban, “Please release me so I can go home to my own country. '
  '26':
  - type: text
    content: Let me take my wives and children, for I have earned them by serving you, and let me be on my way. You certainly know how hard I have worked for you.”
  '27':
  - type: text
    content: “Please listen to me,” Laban replied. “I have become wealthy, for
  - type: note
    content: Or I have learned by divination that.
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: ' has blessed me because of you. '
  '28':
  - type: text
    content: Tell me how much I owe you. Whatever it is, I’ll pay it.”
  '29':
  - type: text
    content: 'Jacob replied, “You know how hard I’ve worked for you, and how your flocks and herds have grown under my care. '
  '3':
  - type: text
    content: Then Rachel told him, “Take my maid, Bilhah, and sleep with her. She will bear children for me,
  - type: note
    content: Hebrew bear children on my knees.
  - type: text
    content: ' and through her I can have a family, too.” '
  '30':
  - type: text
    content: 'You had little indeed before I came, but your wealth has increased enormously. The '
  - type: text
    content: Lord
  - type: text
    content: ' has blessed you through everything I’ve done. But now, what about me? When can I start providing for my own family?”'
  '31':
  - type: text
    content: “What wages do you want?” Laban asked again.
  - type: text
    content: 'Jacob replied, “Don’t give me anything. Just do this one thing, and I’ll continue to tend and watch over your flocks. '
  '32':
  - type: text
    content: 'Let me inspect your flocks today and remove all the sheep and goats that are speckled or spotted, along with all the black sheep. Give these to me as my wages. '
  '33':
  - type: text
    content: In the future, when you check on the animals you have given me as my wages, you’ll see that I have been honest. If you find in my flock any goats without speckles or spots, or any sheep that are not black, you will know that I have stolen them from you.”
  '34':
  - type: text
    content: '“All right,” Laban replied. “It will be as you say.” '
  '35':
  - type: text
    content: 'But that very day Laban went out and removed the male goats that were streaked and spotted, all the female goats that were speckled and spotted or had white patches, and all the black sheep. He placed them in the care of his own sons, '
  '36':
  - type: text
    content: who took them a three-days’ journey from where Jacob was. Meanwhile, Jacob stayed and cared for the rest of Laban’s flock.
  '37':
  - type: text
    content: 'Then Jacob took some fresh branches from poplar, almond, and plane trees and peeled off strips of bark, making white streaks on them. '
  '38':
  - type: text
    content: 'Then he placed these peeled branches in the watering troughs where the flocks came to drink, for that was where they mated. '
  '39':
  - type: text
    content: 'And when they mated in front of the white-streaked branches, they gave birth to young that were streaked, speckled, and spotted. '
  '4':
  - type: text
    content: 'So Rachel gave her servant, Bilhah, to Jacob as a wife, and he slept with her. '
  '40':
  - type: text
    content: Jacob separated those lambs from Laban’s flock. And at mating time he turned the flock to face Laban’s animals that were streaked or black. This is how he built his own flock instead of increasing Laban’s.
  '41':
  - type: text
    content: 'Whenever the stronger females were ready to mate, Jacob would place the peeled branches in the watering troughs in front of them. Then they would mate in front of the branches. '
  '42':
  - type: text
    content: 'But he didn’t do this with the weaker ones, so the weaker lambs belonged to Laban, and the stronger ones were Jacob’s. '
  '43':
  - type: text
    content: As a result, Jacob became very wealthy, with large flocks of sheep and goats, female and male servants, and many camels and donkeys.
  '5':
  - type: text
    content: 'Bilhah became pregnant and presented him with a son. '
  '6':
  - type: text
    content: Rachel named him Dan,
  - type: note
    content: Dan means “he judged” or “he vindicated.”
  - type: text
    content: ' for she said, “God has vindicated me! He has heard my request and given me a son.” '
  '7':
  - type: text
    content: 'Then Bilhah became pregnant again and gave Jacob a second son. '
  '8':
  - type: text
    content: Rachel named him Naphtali,
  - type: note
    content: Naphtali means “my struggle.”
  - type: text
    content: ' for she said, “I have struggled hard with my sister, and I’m winning!”'
  '9':
  - type: text
    content: 'Meanwhile, Leah realized that she wasn’t getting pregnant anymore, so she took her servant, Zilpah, and gave her to Jacob as a wife. '
