document_id: HEB.13,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Concluding Words
  - type: text
    content: Keep on loving each other as brothers and sisters.
  - type: note
    content: Greek Continue in brotherly love.
  - type: text
    content: ' '
  '10':
  - type: text
    content: We have an altar from which the priests in the Tabernacle
  - type: note
    content: Or tent.
  - type: text
    content: ' have no right to eat. '
  '11':
  - type: text
    content: 'Under the old system, the high priest brought the blood of animals into the Holy Place as a sacrifice for sin, and the bodies of the animals were burned outside the camp. '
  '12':
  - type: text
    content: 'So also Jesus suffered and died outside the city gates to make his people holy by means of his own blood. '
  '13':
  - type: text
    content: 'So let us go out to him, outside the camp, and bear the disgrace he bore. '
  '14':
  - type: text
    content: For this world is not our permanent home; we are looking forward to a home yet to come.
  '15':
  - type: text
    content: 'Therefore, let us offer through Jesus a continual sacrifice of praise to God, proclaiming our allegiance to his name. '
  '16':
  - type: text
    content: And don’t forget to do good and to share with those in need. These are the sacrifices that please God.
  '17':
  - type: text
    content: Obey your spiritual leaders, and do what they say. Their work is to watch over your souls, and they are accountable to God. Give them reason to do this with joy and not with sorrow. That would certainly not be for your benefit.
  '18':
  - type: text
    content: 'Pray for us, for our conscience is clear and we want to live honorably in everything we do. '
  '19':
  - type: text
    content: And especially pray that I will be able to come back to you soon.
  '2':
  - type: text
    content: 'Don’t forget to show hospitality to strangers, for some who have done this have entertained angels without realizing it! '
  '20':
  - type: text
    content: Now may the God of peace—
  - type: text
    content: who brought up from the dead our Lord Jesus,
  - type: text
    content: the great Shepherd of the sheep,
  - type: text
    content: and ratified an eternal covenant with his blood—
  '21':
  - type: text
    content: may he equip you with all you need
  - type: text
    content: for doing his will.
  - type: text
    content: May he produce in you,
  - type: note
    content: Some manuscripts read in us.
  - type: text
    content: through the power of Jesus Christ,
  - type: text
    content: every good thing that is pleasing to him.
  - type: text
    content: All glory to him forever and ever! Amen.
  '22':
  - type: text
    content: I urge you, dear brothers and sisters,
  - type: note
    content: Greek brothers.
  - type: text
    content: ' to pay attention to what I have written in this brief exhortation.'
  '23':
  - type: text
    content: I want you to know that our brother Timothy has been released from jail. If he comes here soon, I will bring him with me to see you.
  '24':
  - type: text
    content: Greet all your leaders and all the believers there.
  - type: note
    content: Greek all of God’s holy people.
  - type: text
    content: ' The believers from Italy send you their greetings.'
  '25':
  - type: text
    content: May God’s grace be with you all.
  '3':
  - type: text
    content: Remember those in prison, as if you were there yourself. Remember also those being mistreated, as if you felt their pain in your own bodies.
  '4':
  - type: text
    content: Give honor to marriage, and remain faithful to one another in marriage. God will surely judge people who are immoral and those who commit adultery.
  '5':
  - type: text
    content: Don’t love money; be satisfied with what you have. For God has said,
  - type: text
    content: “I will never fail you.
  - type: text
    content: I will never abandon you.”
  - type: note
    content: Deut 31:6, 8.
  '6':
  - type: text
    content: So we can say with confidence,
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' is my helper,'
  - type: text
    content: so I will have no fear.
  - type: text
    content: What can mere people do to me?”
  - type: note
    content: Ps 118:6.
  '7':
  - type: text
    content: Remember your leaders who taught you the word of God. Think of all the good that has come from their lives, and follow the example of their faith.
  '8':
  - type: text
    content: 'Jesus Christ is the same yesterday, today, and forever. '
  '9':
  - type: text
    content: So do not be attracted by strange, new ideas. Your strength comes from God’s grace, not from rules about food, which don’t help those who follow them.
