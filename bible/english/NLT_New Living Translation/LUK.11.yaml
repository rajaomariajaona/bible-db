document_id: LUK.11,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Teaching about Prayer
  - type: text
    content: Once Jesus was in a certain place praying. As he finished, one of his disciples came to him and said, “Lord, teach us to pray, just as John taught his disciples.”
  '10':
  - type: text
    content: For everyone who asks, receives. Everyone who seeks, finds. And to everyone who knocks, the door will be opened.
  '11':
  - type: text
    content: ' '
  - type: text
    content: “You fathers—if your children ask
  - type: text
    content: ' '
  - type: note
    content: Some manuscripts add for bread, do you give them a stone? Or [if they ask].
  - type: text
    content: for a fish, do you give them a snake instead?
  - type: text
    content: ' '
  '12':
  - type: text
    content: Or if they ask for an egg, do you give them a scorpion? Of course not!
  - type: text
    content: ' '
  '13':
  - type: text
    content: So if you sinful people know how to give good gifts to your children, how much more will your heavenly Father give the Holy Spirit to those who ask him.”
  - type: heading
    content: Jesus and the Prince of Demons
  '14':
  - type: text
    content: 'One day Jesus cast out a demon from a man who couldn’t speak, and when the demon was gone, the man began to speak. The crowds were amazed, '
  '15':
  - type: text
    content: but some of them said, “No wonder he can cast out demons. He gets his power from Satan,
  - type: note
    content: Greek Beelzeboul; also in 11:18, 19. Other manuscripts read Beezeboul; Latin version reads Beelzebub.
  - type: text
    content: ' the prince of demons.” '
  '16':
  - type: text
    content: Others, trying to test Jesus, demanded that he show them a miraculous sign from heaven to prove his authority.
  '17':
  - type: text
    content: 'He knew their thoughts, so he said, '
  - type: text
    content: “Any kingdom divided by civil war is doomed. A family splintered by feuding will fall apart.
  - type: text
    content: ' '
  '18':
  - type: text
    content: You say I am empowered by Satan. But if Satan is divided and fighting against himself, how can his kingdom survive?
  - type: text
    content: ' '
  '19':
  - type: text
    content: And if I am empowered by Satan, what about your own exorcists? They cast out demons, too, so they will condemn you for what you have said.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: '“This is how you should pray:'
  - type: note
    content: Some manuscripts add additional phrases from the Lord’s Prayer as it reads in Matt 6:9-13.
  - type: text
    content: “Father, may your name be kept holy.
  - type: text
    content: May your Kingdom come soon.
  '20':
  - type: text
    content: But if I am casting out demons by the power of God,
  - type: note
    content: Greek by the finger of God.
  - type: text
    content: ' '
  - type: text
    content: then the Kingdom of God has arrived among you.
  - type: text
    content: ' '
  '21':
  - type: text
    content: For when a strong man is fully armed and guards his palace, his possessions are safe—
  - type: text
    content: ' '
  '22':
  - type: text
    content: until someone even stronger attacks and overpowers him, strips him of his weapons, and carries off his belongings.
  '23':
  - type: text
    content: ' '
  - type: text
    content: “Anyone who isn’t with me opposes me, and anyone who isn’t working with me is actually working against me.
  '24':
  - type: text
    content: ' '
  - type: text
    content: “When an evil
  - type: text
    content: ' '
  - type: note
    content: Greek unclean.
  - type: text
    content: spirit leaves a person, it goes into the desert, searching for rest. But when it finds none, it says, ‘I will return to the person I came from.’
  - type: text
    content: ' '
  '25':
  - type: text
    content: So it returns and finds that its former home is all swept and in order.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Then the spirit finds seven other spirits more evil than itself, and they all enter the person and live there. And so that person is worse off than before.”
  '27':
  - type: text
    content: As he was speaking, a woman in the crowd called out, “God bless your mother—the womb from which you came, and the breasts that nursed you!”
  '28':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “But even more blessed are all who hear the word of God and put it into practice.”
  - type: heading
    content: The Sign of Jonah
  '29':
  - type: text
    content: 'As the crowd pressed in on Jesus, he said, '
  - type: text
    content: “This evil generation keeps asking me to show them a miraculous sign. But the only sign I will give them is the sign of Jonah.
  - type: text
    content: ' '
  '3':
  - type: text
    content: ' '
  - type: text
    content: Give us each day the food we need,
  - type: note
    content: Or Give us each day our food for the day; or Give us each day our food for tomorrow.
  '30':
  - type: text
    content: What happened to him was a sign to the people of Nineveh that God had sent him. What happens to the Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: will be a sign to these people that he was sent by God.
  '31':
  - type: text
    content: ' '
  - type: text
    content: “The queen of Sheba
  - type: text
    content: ' '
  - type: note
    content: Greek The queen of the south.
  - type: text
    content: will stand up against this generation on judgment day and condemn it, for she came from a distant land to hear the wisdom of Solomon. Now someone greater than Solomon is here—but you refuse to listen.
  - type: text
    content: ' '
  '32':
  - type: text
    content: The people of Nineveh will also stand up against this generation on judgment day and condemn it, for they repented of their sins at the preaching of Jonah. Now someone greater than Jonah is here—but you refuse to repent.
  - type: heading
    content: Receiving the Light
  '33':
  - type: text
    content: ' '
  - type: text
    content: “No one lights a lamp and then hides it or puts it under a basket.
  - type: text
    content: ' '
  - type: note
    content: Some manuscripts do not include or puts it under a basket.
  - type: text
    content: Instead, a lamp is placed on a stand, where its light can be seen by all who enter the house.
  '34':
  - type: text
    content: ' '
  - type: text
    content: “Your eye is like a lamp that provides light for your body. When your eye is healthy, your whole body is filled with light. But when it is unhealthy, your body is filled with darkness.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Make sure that the light you think you have is not actually darkness.
  - type: text
    content: ' '
  '36':
  - type: text
    content: If you are filled with light, with no dark corners, then your whole life will be radiant, as though a floodlight were filling you with light.”
  - type: heading
    content: Jesus Criticizes the Religious Leaders
  '37':
  - type: text
    content: As Jesus was speaking, one of the Pharisees invited him home for a meal. So he went in and took his place at the table.
  - type: note
    content: Or and reclined.
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'His host was amazed to see that he sat down to eat without first performing the hand-washing ceremony required by Jewish custom. '
  '39':
  - type: text
    content: 'Then the Lord said to him, '
  - type: text
    content: “You Pharisees are so careful to clean the outside of the cup and the dish, but inside you are filthy—full of greed and wickedness!
  - type: text
    content: ' '
  '4':
  - type: text
    content: ' '
  - type: text
    content: and forgive us our sins,
  - type: text
    content: as we forgive those who sin against us.
  - type: text
    content: And don’t let us yield to temptation.
  - type: text
    content: ' '
  - type: note
    content: Or And keep us from being tested.
  - type: text
    content: ”
  '40':
  - type: text
    content: Fools! Didn’t God make the inside as well as the outside?
  - type: text
    content: ' '
  '41':
  - type: text
    content: So clean the inside by giving gifts to the poor, and you will be clean all over.
  '42':
  - type: text
    content: ' '
  - type: text
    content: “What sorrow awaits you Pharisees! For you are careful to tithe even the tiniest income from your herb gardens,
  - type: text
    content: ' '
  - type: note
    content: Greek tithe the mint, the rue, and every herb.
  - type: text
    content: but you ignore justice and the love of God. You should tithe, yes, but do not neglect the more important things.
  '43':
  - type: text
    content: ' '
  - type: text
    content: “What sorrow awaits you Pharisees! For you love to sit in the seats of honor in the synagogues and receive respectful greetings as you walk in the marketplaces.
  - type: text
    content: ' '
  '44':
  - type: text
    content: Yes, what sorrow awaits you! For you are like hidden graves in a field. People walk over them without knowing the corruption they are stepping on.”
  '45':
  - type: text
    content: “Teacher,” said an expert in religious law, “you have insulted us, too, in what you just said.”
  '46':
  - type: text
    content: ' '
  - type: text
    content: “Yes,”
  - type: text
    content: ' said Jesus, '
  - type: text
    content: “what sorrow also awaits you experts in religious law! For you crush people with unbearable religious demands, and you never lift a finger to ease the burden.
  - type: text
    content: ' '
  '47':
  - type: text
    content: What sorrow awaits you! For you build monuments for the prophets your own ancestors killed long ago.
  - type: text
    content: ' '
  '48':
  - type: text
    content: But in fact, you stand as witnesses who agree with what your ancestors did. They killed the prophets, and you join in their crime by building the monuments!
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'This is what God in his wisdom said about you:'
  - type: note
    content: Greek Therefore, the wisdom of God said.
  - type: text
    content: ' '
  - type: text
    content: ‘I will send prophets and apostles to them, but they will kill some and persecute the others.’
  '5':
  - type: text
    content: 'Then, teaching them more about prayer, he used this story: '
  - type: text
    content: “Suppose you went to a friend’s house at midnight, wanting to borrow three loaves of bread. You say to him,
  - type: text
    content: ' '
  '50':
  - type: text
    content: ' '
  - type: text
    content: “As a result, this generation will be held responsible for the murder of all God’s prophets from the creation of the world—
  - type: text
    content: ' '
  '51':
  - type: text
    content: from the murder of Abel to the murder of Zechariah, who was killed between the altar and the sanctuary. Yes, it will certainly be charged against this generation.
  '52':
  - type: text
    content: ' '
  - type: text
    content: “What sorrow awaits you experts in religious law! For you remove the key to knowledge from the people. You don’t enter the Kingdom yourselves, and you prevent others from entering.”
  '53':
  - type: text
    content: 'As Jesus was leaving, the teachers of religious law and the Pharisees became hostile and tried to provoke him with many questions. '
  '54':
  - type: text
    content: They wanted to trap him into saying something they could use against him.
  '6':
  - type: text
    content: ‘A friend of mine has just arrived for a visit, and I have nothing for him to eat.’
  - type: text
    content: ' '
  '7':
  - type: text
    content: And suppose he calls out from his bedroom, ‘Don’t bother me. The door is locked for the night, and my family and I are all in bed. I can’t help you.’
  - type: text
    content: ' '
  '8':
  - type: text
    content: But I tell you this—though he won’t do it for friendship’s sake, if you keep knocking long enough, he will get up and give you whatever you need because of your shameless persistence.
  - type: note
    content: Or in order to avoid shame, or so his reputation won’t be damaged.
  '9':
  - type: text
    content: ' '
  - type: text
    content: “And so I tell you, keep on asking, and you will receive what you ask for. Keep on seeking, and you will find. Keep on knocking, and the door will be opened to you.
  - type: text
    content: ' '
