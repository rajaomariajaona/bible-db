document_id: LUK.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Teaching about Prayer
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Once Jesus was in a certain place praying. As he finished, one of his disciples came to him and said, “Lord, teach us to pray, just as John taught his disciples.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“This is how you should pray:'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some manuscripts add additional phrases from the Lord’s Prayer as it reads in Matt 6:9-13.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Father, may your name be kept holy.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: May your Kingdom come soon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Give us each day the food we need,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Give us each day our food for the day; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Give us each day our food for tomorrow.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and forgive us our sins,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: as we forgive those who sin against us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And don’t let us yield to temptation.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: And keep us from being tested.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then, teaching them more about prayer, he used this story: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Suppose you went to a friend’s house at midnight, wanting to borrow three loaves of bread. You say to him,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘A friend of mine has just arrived for a visit, and I have nothing for him to eat.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And suppose he calls out from his bedroom, ‘Don’t bother me. The door is locked for the night, and my family and I are all in bed. I can’t help you.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But I tell you this—though he won’t do it for friendship’s sake, if you keep knocking long enough, he will get up and give you whatever you need because of your shameless persistence.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'in order to avoid shame, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: so his reputation won’t be damaged.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “And so I tell you, keep on asking, and you will receive what you ask for. Keep on seeking, and you will find. Keep on knocking, and the door will be opened to you.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For everyone who asks, receives. Everyone who seeks, finds. And to everyone who knocks, the door will be opened.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You fathers—if your children ask
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts add '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: for bread, do you give them a stone? Or [if they ask].
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for a fish, do you give them a snake instead?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Or if they ask for an egg, do you give them a scorpion? Of course not!
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So if you sinful people know how to give good gifts to your children, how much more will your heavenly Father give the Holy Spirit to those who ask him.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus and the Prince of Demons
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'One day Jesus cast out a demon from a man who couldn’t speak, and when the demon was gone, the man began to speak. The crowds were amazed, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: but some of them said, “No wonder he can cast out demons. He gets his power from Satan,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Beelzeboul; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'also in 11:18, 19. Other manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Beezeboul; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Latin version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Beelzebub.
    marker-yv: yv-n
  - type: text
    text: ' the prince of demons.” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Others, trying to test Jesus, demanded that he show them a miraculous sign from heaven to prove his authority.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He knew their thoughts, so he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Any kingdom divided by civil war is doomed. A family splintered by feuding will fall apart.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You say I am empowered by Satan. But if Satan is divided and fighting against himself, how can his kingdom survive?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And if I am empowered by Satan, what about your own exorcists? They cast out demons, too, so they will condemn you for what you have said.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But if I am casting out demons by the power of God,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: by the finger of God.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: then the Kingdom of God has arrived among you.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For when a strong man is fully armed and guards his palace, his possessions are safe—
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: until someone even stronger attacks and overpowers him, strips him of his weapons, and carries off his belongings.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Anyone who isn’t with me opposes me, and anyone who isn’t working with me is actually working against me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “When an evil
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: unclean.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: spirit leaves a person, it goes into the desert, searching for rest. But when it finds none, it says, ‘I will return to the person I came from.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So it returns and finds that its former home is all swept and in order.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then the spirit finds seven other spirits more evil than itself, and they all enter the person and live there. And so that person is worse off than before.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: As he was speaking, a woman in the crowd called out, “God bless your mother—the womb from which you came, and the breasts that nursed you!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But even more blessed are all who hear the word of God and put it into practice.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Sign of Jonah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'As the crowd pressed in on Jesus, he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “This evil generation keeps asking me to show them a miraculous sign. But the only sign I will give them is the sign of Jonah.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: What happened to him was a sign to the people of Nineveh that God had sent him. What happens to the Son of Man
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “Son of Man” is a title Jesus used for himself.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will be a sign to these people that he was sent by God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The queen of Sheba
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: The queen of the south.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will stand up against this generation on judgment day and condemn it, for she came from a distant land to hear the wisdom of Solomon. Now someone greater than Solomon is here—but you refuse to listen.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The people of Nineveh will also stand up against this generation on judgment day and condemn it, for they repented of their sins at the preaching of Jonah. Now someone greater than Jonah is here—but you refuse to repent.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Receiving the Light
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “No one lights a lamp and then hides it or puts it under a basket.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts do not include '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: or puts it under a basket.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Instead, a lamp is placed on a stand, where its light can be seen by all who enter the house.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Your eye is like a lamp that provides light for your body. When your eye is healthy, your whole body is filled with light. But when it is unhealthy, your body is filled with darkness.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Make sure that the light you think you have is not actually darkness.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If you are filled with light, with no dark corners, then your whole life will be radiant, as though a floodlight were filling you with light.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Criticizes the Religious Leaders
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: As Jesus was speaking, one of the Pharisees invited him home for a meal. So he went in and took his place at the table.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and reclined.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'His host was amazed to see that he sat down to eat without first performing the hand-washing ceremony required by Jewish custom. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Then the Lord said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You Pharisees are so careful to clean the outside of the cup and the dish, but inside you are filthy—full of greed and wickedness!
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Fools! Didn’t God make the inside as well as the outside?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So clean the inside by giving gifts to the poor, and you will be clean all over.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What sorrow awaits you Pharisees! For you are careful to tithe even the tiniest income from your herb gardens,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tithe the mint, the rue, and every herb.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: but you ignore justice and the love of God. You should tithe, yes, but do not neglect the more important things.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What sorrow awaits you Pharisees! For you love to sit in the seats of honor in the synagogues and receive respectful greetings as you walk in the marketplaces.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Yes, what sorrow awaits you! For you are like hidden graves in a field. People walk over them without knowing the corruption they are stepping on.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: “Teacher,” said an expert in religious law, “you have insulted us, too, in what you just said.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Yes,”
  - type: text
    text: ' said Jesus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “what sorrow also awaits you experts in religious law! For you crush people with unbearable religious demands, and you never lift a finger to ease the burden.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: What sorrow awaits you! For you build monuments for the prophets your own ancestors killed long ago.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But in fact, you stand as witnesses who agree with what your ancestors did. They killed the prophets, and you join in their crime by building the monuments!
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'This is what God in his wisdom said about you:'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:49 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Therefore, the wisdom of God said.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘I will send prophets and apostles to them, but they will kill some and persecute the others.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “As a result, this generation will be held responsible for the murder of all God’s prophets from the creation of the world—
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: from the murder of Abel to the murder of Zechariah, who was killed between the altar and the sanctuary. Yes, it will certainly be charged against this generation.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What sorrow awaits you experts in religious law! For you remove the key to knowledge from the people. You don’t enter the Kingdom yourselves, and you prevent others from entering.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'As Jesus was leaving, the teachers of religious law and the Pharisees became hostile and tried to provoke him with many questions. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: They wanted to trap him into saying something they could use against him.
