document_id: 1CO.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Greetings from Paul
  - type: text
    content: This letter is from Paul, chosen by the will of God to be an apostle of Christ Jesus, and from our brother Sosthenes.
  '10':
  - type: text
    content: I appeal to you, dear brothers and sisters,
  - type: note
    content: Greek brothers; also in 1:11, 26.
  - type: text
    content: ' by the authority of our Lord Jesus Christ, to live in harmony with each other. Let there be no divisions in the church. Rather, be of one mind, united in thought and purpose. '
  '11':
  - type: text
    content: 'For some members of Chloe’s household have told me about your quarrels, my dear brothers and sisters. '
  '12':
  - type: text
    content: Some of you are saying, “I am a follower of Paul.” Others are saying, “I follow Apollos,” or “I follow Peter,
  - type: note
    content: Greek Cephas.
  - type: text
    content: ” or “I follow only Christ.”
  '13':
  - type: text
    content: 'Has Christ been divided into factions? Was I, Paul, crucified for you? Were any of you baptized in the name of Paul? Of course not! '
  '14':
  - type: text
    content: 'I thank God that I did not baptize any of you except Crispus and Gaius, '
  '15':
  - type: text
    content: 'for now no one can say they were baptized in my name. '
  '16':
  - type: text
    content: '(Oh yes, I also baptized the household of Stephanas, but I don’t remember baptizing anyone else.) '
  '17':
  - type: text
    content: For Christ didn’t send me to baptize, but to preach the Good News—and not with clever speech, for fear that the cross of Christ would lose its power.
  - type: heading
    content: The Wisdom of God
  '18':
  - type: text
    content: 'The message of the cross is foolish to those who are headed for destruction! But we who are being saved know it is the very power of God. '
  '19':
  - type: text
    content: As the Scriptures say,
  - type: text
    content: “I will destroy the wisdom of the wise
  - type: text
    content: and discard the intelligence of the intelligent.”
  - type: note
    content: Isa 29:14.
  '2':
  - type: text
    content: I am writing to God’s church in Corinth,
  - type: note
    content: Corinth was the capital city of Achaia, the southern region of the Greek peninsula.
  - type: text
    content: ' to you who have been called by God to be his own holy people. He made you holy by means of Christ Jesus,'
  - type: note
    content: Or because you belong to Christ Jesus.
  - type: text
    content: ' just as he did for all people everywhere who call on the name of our Lord Jesus Christ, their Lord and ours.'
  '20':
  - type: text
    content: 'So where does this leave the philosophers, the scholars, and the world’s brilliant debaters? God has made the wisdom of this world look foolish. '
  '21':
  - type: text
    content: 'Since God in his wisdom saw to it that the world would never know him through human wisdom, he has used our foolish preaching to save those who believe. '
  '22':
  - type: text
    content: 'It is foolish to the Jews, who ask for signs from heaven. And it is foolish to the Greeks, who seek human wisdom. '
  '23':
  - type: text
    content: So when we preach that Christ was crucified, the Jews are offended and the Gentiles say it’s all nonsense.
  '24':
  - type: text
    content: But to those called by God to salvation, both Jews and Gentiles,
  - type: note
    content: Greek and Greeks.
  - type: text
    content: ' Christ is the power of God and the wisdom of God. '
  '25':
  - type: text
    content: This foolish plan of God is wiser than the wisest of human plans, and God’s weakness is stronger than the greatest of human strength.
  '26':
  - type: text
    content: Remember, dear brothers and sisters, that few of you were wise in the world’s eyes or powerful or wealthy
  - type: note
    content: Or high born.
  - type: text
    content: ' when God called you. '
  '27':
  - type: text
    content: 'Instead, God chose things the world considers foolish in order to shame those who think they are wise. And he chose things that are powerless to shame those who are powerful. '
  '28':
  - type: text
    content: God chose things despised by the world,
  - type: note
    content: Or God chose those who are low born.
  - type: text
    content: ' things counted as nothing at all, and used them to bring to nothing what the world considers important. '
  '29':
  - type: text
    content: As a result, no one can ever boast in the presence of God.
  '3':
  - type: text
    content: May God our Father and the Lord Jesus Christ give you grace and peace.
  - type: heading
    content: Paul Gives Thanks to God
  '30':
  - type: text
    content: 'God has united you with Christ Jesus. For our benefit God made him to be wisdom itself. Christ made us right with God; he made us pure and holy, and he freed us from sin. '
  '31':
  - type: text
    content: 'Therefore, as the Scriptures say, “If you want to boast, boast only about the '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: note
    content: Jer 9:24.
  '4':
  - type: text
    content: 'I always thank my God for you and for the gracious gifts he has given you, now that you belong to Christ Jesus. '
  '5':
  - type: text
    content: 'Through him, God has enriched your church in every way—with all of your eloquent words and all of your knowledge. '
  '6':
  - type: text
    content: 'This confirms that what I told you about Christ is true. '
  '7':
  - type: text
    content: 'Now you have every spiritual gift you need as you eagerly wait for the return of our Lord Jesus Christ. '
  '8':
  - type: text
    content: 'He will keep you strong to the end so that you will be free from all blame on the day when our Lord Jesus Christ returns. '
  '9':
  - type: text
    content: God will do this, for he is faithful to do what he says, and he has invited you into partnership with his Son, Jesus Christ our Lord.
  - type: heading
    content: Divisions in the Church
