document_id: EZR.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ezra Arrives in Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Many years later, during the reign of King Artaxerxes of Persia,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:1a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Artaxerxes reigned 465–424 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
    marker-yv: yv-n
  - type: text
    text: ' there was a man named Ezra. He was the son'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:1b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'descendant; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: see 1 Chr 6:14.
    marker-yv: yv-n
  - type: text
    text: ' of Seraiah, son of Azariah, son of Hilkiah, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'son of Shallum, son of Zadok, son of Ahitub, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: son of Amariah, son of Azariah, son
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'descendant; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: see 1 Chr 6:6-10.
    marker-yv: yv-n
  - type: text
    text: ' of Meraioth, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'son of Zerahiah, son of Uzzi, son of Bukki, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: son of Abishua, son of Phinehas, son of Eleazar, son of Aaron the high priest.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the first priest.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'This Ezra was a scribe who was well versed in the Law of Moses, which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, had given to the people of Israel. He came up to Jerusalem from Babylon, and the king gave him everything he asked for, because the gracious hand of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' his God was on him. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Some of the people of Israel, as well as some of the priests, Levites, singers, gatekeepers, and Temple servants, traveled up to Jerusalem with him in the seventh year of King Artaxerxes’ reign.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ezra arrived in Jerusalem in August
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'in the fifth month. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'This month in the ancient Hebrew lunar calendar occurred within the months of August and September 458 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
    marker-yv: yv-n
  - type: text
    text: ' of that year. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He had arranged to leave Babylon on April 8, the first day of the new year,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:9a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'on the first day of the first month, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'of the ancient Hebrew lunar calendar. This day was April 8, 458 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ; also see note on 6:15.
    marker-yv: yv-n
  - type: text
    text: ' and he arrived at Jerusalem on August 4,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:9b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'on the first day of the fifth month, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'of the ancient Hebrew lunar calendar. This day was August 4, 458 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ; also see note on 6:15.
    marker-yv: yv-n
  - type: text
    text: ' for the gracious hand of his God was on him. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'This was because Ezra had determined to study and obey the Law of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and to teach those decrees and regulations to the people of Israel.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Artaxerxes’ Letter to Ezra
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'King Artaxerxes had given a copy of the following letter to Ezra, the priest and scribe who studied and taught the commands and decrees of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' to Israel:'
- type: usfm
  marker: pmo
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The original text of 7:12-26 is in Aramaic.
    marker-yv: yv-n
  - type: text
    text: “From Artaxerxes, the king of kings, to Ezra the priest, the teacher of the law of the God of heaven. Greetings.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“I decree that any of the people of Israel in my kingdom, including the priests and Levites, may volunteer to return to Jerusalem with you. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I and my council of seven hereby instruct you to conduct an inquiry into the situation in Judah and Jerusalem, based on your God’s law, which is in your hand. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: We also commission you to take with you silver and gold, which we are freely presenting as an offering to the God of Israel who lives in Jerusalem.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“Furthermore, you are to take any silver and gold that you may obtain from the province of Babylon, as well as the voluntary offerings of the people and the priests that are presented for the Temple of their God in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'These donations are to be used specifically for the purchase of bulls, rams, male lambs, and the appropriate grain offerings and liquid offerings, all of which will be offered on the altar of the Temple of your God in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Any silver and gold that is left over may be used in whatever way you and your colleagues feel is the will of your God.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“But as for the cups we are entrusting to you for the service of the Temple of your God, deliver them all to the God of Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: If you need anything else for your God’s Temple or for any similar needs, you may take it from the royal treasury.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “I, Artaxerxes the king, hereby send this decree to all the treasurers in the province west of the Euphrates River
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Aramaic '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the province beyond the river; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 7:25.
    marker-yv: yv-n
  - type: text
    text: ': ‘You are to give Ezra, the priest and teacher of the law of the God of heaven, whatever he requests of you. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: You are to give him up to 7,500 pounds
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:22a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Aramaic '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '100 talents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[3,400 kilograms].'
    marker-yv: yv-n
  - type: text
    text: ' of silver, 500 bushels'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:22b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Aramaic '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '100 cors '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[22 kiloliters].'
    marker-yv: yv-n
  - type: text
    text: ' of wheat, 550 gallons of wine, 550 gallons of olive oil,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:22c '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Aramaic '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '100 baths '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[2.1 kiloliters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of wine, 100 baths of olive oil.
    marker-yv: yv-n
  - type: text
    text: ' and an unlimited supply of salt. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Be careful to provide whatever the God of heaven demands for his Temple, for why should we risk bringing God’s anger against the realm of the king and his sons? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: I also decree that no priest, Levite, singer, gatekeeper, Temple servant, or other worker in this Temple of God will be required to pay tribute, customs, or tolls of any kind.’
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“And you, Ezra, are to use the wisdom your God has given you to appoint magistrates and judges who know your God’s laws to govern all the people in the province west of the Euphrates River. Teach the law to anyone who does not know it. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Anyone who refuses to obey the law of your God and the law of the king will be punished immediately, either by death, banishment, confiscation of goods, or imprisonment.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ezra Praises the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of our ancestors, who made the king want to beautify the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' in Jerusalem! '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And praise him for demonstrating such unfailing love to me by honoring me before the king, his council, and all his mighty nobles! I felt encouraged because the gracious hand of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God was on me. And I gathered some of the leaders of Israel to return with me to Jerusalem.'
