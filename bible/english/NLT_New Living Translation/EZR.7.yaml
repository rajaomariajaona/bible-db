document_id: EZR.7,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Ezra Arrives in Jerusalem
  - type: text
    content: Many years later, during the reign of King Artaxerxes of Persia,
  - type: note
    content: Artaxerxes reigned 465–424 b.c.
  - type: text
    content: ' there was a man named Ezra. He was the son'
  - type: note
    content: Or descendant; see 1 Chr 6:14.
  - type: text
    content: ' of Seraiah, son of Azariah, son of Hilkiah, '
  '10':
  - type: text
    content: 'This was because Ezra had determined to study and obey the Law of the '
  - type: text
    content: Lord
  - type: text
    content: ' and to teach those decrees and regulations to the people of Israel.'
  - type: heading
    content: Artaxerxes’ Letter to Ezra
  '11':
  - type: text
    content: 'King Artaxerxes had given a copy of the following letter to Ezra, the priest and scribe who studied and taught the commands and decrees of the '
  - type: text
    content: Lord
  - type: text
    content: ' to Israel:'
  '12':
  - type: text
    content: ' '
  - type: note
    content: The original text of 7:12-26 is in Aramaic.
  - type: text
    content: “From Artaxerxes, the king of kings, to Ezra the priest, the teacher of the law of the God of heaven. Greetings.
  '13':
  - type: text
    content: '“I decree that any of the people of Israel in my kingdom, including the priests and Levites, may volunteer to return to Jerusalem with you. '
  '14':
  - type: text
    content: 'I and my council of seven hereby instruct you to conduct an inquiry into the situation in Judah and Jerusalem, based on your God’s law, which is in your hand. '
  '15':
  - type: text
    content: We also commission you to take with you silver and gold, which we are freely presenting as an offering to the God of Israel who lives in Jerusalem.
  '16':
  - type: text
    content: '“Furthermore, you are to take any silver and gold that you may obtain from the province of Babylon, as well as the voluntary offerings of the people and the priests that are presented for the Temple of their God in Jerusalem. '
  '17':
  - type: text
    content: 'These donations are to be used specifically for the purchase of bulls, rams, male lambs, and the appropriate grain offerings and liquid offerings, all of which will be offered on the altar of the Temple of your God in Jerusalem. '
  '18':
  - type: text
    content: Any silver and gold that is left over may be used in whatever way you and your colleagues feel is the will of your God.
  '19':
  - type: text
    content: '“But as for the cups we are entrusting to you for the service of the Temple of your God, deliver them all to the God of Jerusalem. '
  '2':
  - type: text
    content: 'son of Shallum, son of Zadok, son of Ahitub, '
  '20':
  - type: text
    content: If you need anything else for your God’s Temple or for any similar needs, you may take it from the royal treasury.
  '21':
  - type: text
    content: “I, Artaxerxes the king, hereby send this decree to all the treasurers in the province west of the Euphrates River
  - type: note
    content: Aramaic the province beyond the river; also in 7:25.
  - type: text
    content: ': ‘You are to give Ezra, the priest and teacher of the law of the God of heaven, whatever he requests of you. '
  '22':
  - type: text
    content: You are to give him up to 7,500 pounds
  - type: note
    content: Aramaic 100 talents [3,400 kilograms].
  - type: text
    content: ' of silver, 500 bushels'
  - type: note
    content: Aramaic 100 cors [22 kiloliters].
  - type: text
    content: ' of wheat, 550 gallons of wine, 550 gallons of olive oil,'
  - type: note
    content: Aramaic 100 baths [2.1 kiloliters] of wine, 100 baths of olive oil.
  - type: text
    content: ' and an unlimited supply of salt. '
  '23':
  - type: text
    content: 'Be careful to provide whatever the God of heaven demands for his Temple, for why should we risk bringing God’s anger against the realm of the king and his sons? '
  '24':
  - type: text
    content: I also decree that no priest, Levite, singer, gatekeeper, Temple servant, or other worker in this Temple of God will be required to pay tribute, customs, or tolls of any kind.’
  '25':
  - type: text
    content: '“And you, Ezra, are to use the wisdom your God has given you to appoint magistrates and judges who know your God’s laws to govern all the people in the province west of the Euphrates River. Teach the law to anyone who does not know it. '
  '26':
  - type: text
    content: Anyone who refuses to obey the law of your God and the law of the king will be punished immediately, either by death, banishment, confiscation of goods, or imprisonment.”
  - type: heading
    content: Ezra Praises the Lord
  '27':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of our ancestors, who made the king want to beautify the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' in Jerusalem! '
  '28':
  - type: text
    content: 'And praise him for demonstrating such unfailing love to me by honoring me before the king, his council, and all his mighty nobles! I felt encouraged because the gracious hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' my God was on me. And I gathered some of the leaders of Israel to return with me to Jerusalem.'
  '3':
  - type: text
    content: son of Amariah, son of Azariah, son
  - type: note
    content: Or descendant; see 1 Chr 6:6-10.
  - type: text
    content: ' of Meraioth, '
  '4':
  - type: text
    content: 'son of Zerahiah, son of Uzzi, son of Bukki, '
  '5':
  - type: text
    content: son of Abishua, son of Phinehas, son of Eleazar, son of Aaron the high priest.
  - type: note
    content: Or the first priest.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'This Ezra was a scribe who was well versed in the Law of Moses, which the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, had given to the people of Israel. He came up to Jerusalem from Babylon, and the king gave him everything he asked for, because the gracious hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God was on him. '
  '7':
  - type: text
    content: Some of the people of Israel, as well as some of the priests, Levites, singers, gatekeepers, and Temple servants, traveled up to Jerusalem with him in the seventh year of King Artaxerxes’ reign.
  '8':
  - type: text
    content: Ezra arrived in Jerusalem in August
  - type: note
    content: Hebrew in the fifth month. This month in the ancient Hebrew lunar calendar occurred within the months of August and September 458 b.c.
  - type: text
    content: ' of that year. '
  '9':
  - type: text
    content: He had arranged to leave Babylon on April 8, the first day of the new year,
  - type: note
    content: Hebrew on the first day of the first month, of the ancient Hebrew lunar calendar. This day was April 8, 458 b.c.; also see note on 6:15.
  - type: text
    content: ' and he arrived at Jerusalem on August 4,'
  - type: note
    content: Hebrew on the first day of the fifth month, of the ancient Hebrew lunar calendar. This day was August 4, 458 b.c.; also see note on 6:15.
  - type: text
    content: ' for the gracious hand of his God was on him. '
