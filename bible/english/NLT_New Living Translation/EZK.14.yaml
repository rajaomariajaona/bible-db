document_id: EZK.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Idolatry of Israel’s Leaders
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then some of the leaders of Israel visited me, and while they were sitting with me, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'this message came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Son of man, these leaders have set up idols
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term (literally '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: round things
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) probably alludes to dung; also in 14:4, 5, 6, 7.
    marker-yv: yv-n
  - type: text
    text: ' in their hearts. They have embraced things that will make them fall into sin. Why should I listen to their requests? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tell them, ‘This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: The people of Israel have set up idols in their hearts and fallen into sin, and then they go to a prophet asking for a message. So I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', will give them the kind of answer their great idolatry deserves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I will do this to capture the minds and hearts of all my people who have turned from me to worship their detestable idols.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Therefore, tell the people of Israel, ‘This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Repent and turn away from your idols, and stop all your detestable sins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', will answer all those, both Israelites and foreigners, who reject me and set up idols in their hearts and so fall into sin, and who then come to a prophet asking for my advice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I will turn against such people and make a terrible example of them, eliminating them from among my people. Then you will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“‘And if a prophet is deceived into giving a message, it is because I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have deceived that prophet. I will lift my fist against such prophets and cut them off from the community of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'False prophets and those who seek their guidance will all be punished for their sins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'In this way, the people of Israel will learn not to stray from me, polluting themselves with sin. They will be my people, and I will be their God. I, the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!’”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The Certainty of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Judgment
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then this message came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“Son of man, suppose the people of a country were to sin against me, and I lifted my fist to crush them, cutting off their food supply and sending a famine to destroy both people and animals. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Even if Noah, Daniel, and Job were there, their righteousness would save no one but themselves, says the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“Or suppose I were to send wild animals to invade the country, kill the people, and make the land too desolate and dangerous to pass through. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'As surely as I live, says the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', even if those three men were there, they wouldn’t be able to save their own sons or daughters. They alone would be saved, but the land would be made desolate.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Or suppose I were to bring war against the land, and I sent enemy armies to destroy both people and animals. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'As surely as I live, says the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', even if those three men were there, they wouldn’t be able to save their own sons or daughters. They alone would be saved.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“Or suppose I were to pour out my fury by sending an epidemic into the land, and the disease killed people and animals alike. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'As surely as I live, says the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', even if Noah, Daniel, and Job were there, they wouldn’t be able to save their own sons or daughters. They alone would be saved by their righteousness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“Now this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: How terrible it will be when all four of these dreadful punishments fall upon Jerusalem—war, famine, wild animals, and disease—destroying all her people and animals. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Yet there will be survivors, and they will come here to join you as exiles in Babylon. You will see with your own eyes how wicked they are, and then you will feel better about what I have done to Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'When you meet them and see their behavior, you will understand that these things are not being done to Israel without cause. I, the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!”'
