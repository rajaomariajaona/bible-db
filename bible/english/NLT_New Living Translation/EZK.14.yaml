document_id: EZK.14,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Idolatry of Israel’s Leaders
  - type: text
    content: 'Then some of the leaders of Israel visited me, and while they were sitting with me, '
  '10':
  - type: text
    content: 'False prophets and those who seek their guidance will all be punished for their sins. '
  '11':
  - type: text
    content: 'In this way, the people of Israel will learn not to stray from me, polluting themselves with sin. They will be my people, and I will be their God. I, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!’”'
  - type: heading
    content: The Certainty of the Lord’s Judgment
  '12':
  - type: text
    content: 'Then this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '13':
  - type: text
    content: '“Son of man, suppose the people of a country were to sin against me, and I lifted my fist to crush them, cutting off their food supply and sending a famine to destroy both people and animals. '
  '14':
  - type: text
    content: 'Even if Noah, Daniel, and Job were there, their righteousness would save no one but themselves, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  '15':
  - type: text
    content: '“Or suppose I were to send wild animals to invade the country, kill the people, and make the land too desolate and dangerous to pass through. '
  '16':
  - type: text
    content: 'As surely as I live, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', even if those three men were there, they wouldn’t be able to save their own sons or daughters. They alone would be saved, but the land would be made desolate.'
  '17':
  - type: text
    content: '“Or suppose I were to bring war against the land, and I sent enemy armies to destroy both people and animals. '
  '18':
  - type: text
    content: 'As surely as I live, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', even if those three men were there, they wouldn’t be able to save their own sons or daughters. They alone would be saved.'
  '19':
  - type: text
    content: '“Or suppose I were to pour out my fury by sending an epidemic into the land, and the disease killed people and animals alike. '
  '2':
  - type: text
    content: 'this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '20':
  - type: text
    content: 'As surely as I live, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', even if Noah, Daniel, and Job were there, they wouldn’t be able to save their own sons or daughters. They alone would be saved by their righteousness.'
  '21':
  - type: text
    content: '“Now this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: How terrible it will be when all four of these dreadful punishments fall upon Jerusalem—war, famine, wild animals, and disease—destroying all her people and animals. '
  '22':
  - type: text
    content: 'Yet there will be survivors, and they will come here to join you as exiles in Babylon. You will see with your own eyes how wicked they are, and then you will feel better about what I have done to Jerusalem. '
  '23':
  - type: text
    content: 'When you meet them and see their behavior, you will understand that these things are not being done to Israel without cause. I, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  '3':
  - type: text
    content: “Son of man, these leaders have set up idols
  - type: note
    content: The Hebrew term (literally round things) probably alludes to dung; also in 14:4, 5, 6, 7.
  - type: text
    content: ' in their hearts. They have embraced things that will make them fall into sin. Why should I listen to their requests? '
  '4':
  - type: text
    content: 'Tell them, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: The people of Israel have set up idols in their hearts and fallen into sin, and then they go to a prophet asking for a message. So I, the '
  - type: text
    content: Lord
  - type: text
    content: ', will give them the kind of answer their great idolatry deserves. '
  '5':
  - type: text
    content: I will do this to capture the minds and hearts of all my people who have turned from me to worship their detestable idols.’
  '6':
  - type: text
    content: '“Therefore, tell the people of Israel, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Repent and turn away from your idols, and stop all your detestable sins. '
  '7':
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', will answer all those, both Israelites and foreigners, who reject me and set up idols in their hearts and so fall into sin, and who then come to a prophet asking for my advice. '
  '8':
  - type: text
    content: 'I will turn against such people and make a terrible example of them, eliminating them from among my people. Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '9':
  - type: text
    content: '“‘And if a prophet is deceived into giving a message, it is because I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have deceived that prophet. I will lift my fist against such prophets and cut them off from the community of Israel. '
