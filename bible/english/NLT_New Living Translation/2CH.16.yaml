document_id: 2CH.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Final Years of Asa’s Reign
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: In the thirty-sixth year of Asa’s reign, King Baasha of Israel invaded Judah and fortified Ramah in order to prevent anyone from entering or leaving King Asa’s territory in Judah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Asa responded by removing the silver and gold from the treasuries of the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and the royal palace. He sent it to King Ben-hadad of Aram, who was ruling in Damascus, along with this message:'
- type: usfm
  marker: pmo
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Let there be a treaty
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: There is a treaty.
    marker-yv: yv-n
  - type: text
    text: ' between you and me like the one between your father and my father. See, I am sending you silver and gold. Break your treaty with King Baasha of Israel so that he will leave me alone.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ben-hadad agreed to King Asa’s request and sent the commanders of his army to attack the towns of Israel. They conquered the towns of Ijon, Dan, Abel-beth-maacah,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel text at 1 Kgs 15:20; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Abel-maim, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: another name for Abel-beth-maacah.
    marker-yv: yv-n
  - type: text
    text: ' and all the store cities in Naphtali. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'As soon as Baasha of Israel heard what was happening, he abandoned his project of fortifying Ramah and stopped all work on it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then King Asa called out all the men of Judah to carry away the building stones and timbers that Baasha had been using to fortify Ramah. Asa used these materials to fortify the towns of Geba and Mizpah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'At that time Hanani the seer came to King Asa and told him, “Because you have put your trust in the king of Aram instead of in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God, you missed your chance to destroy the army of the king of Aram. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Don’t you remember what happened to the Ethiopians
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:8a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Cushites.
    marker-yv: yv-n
  - type: text
    text: ' and Libyans and their vast army, with all of their chariots and charioteers?'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:8b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and horsemen?
    marker-yv: yv-n
  - type: text
    text: ' At that time you relied on the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and he handed them over to you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The eyes of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' search the whole earth in order to strengthen those whose hearts are fully committed to him. What a fool you have been! From now on you will be at war.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Asa became so angry with Hanani for saying this that he threw him into prison and put him in stocks. At that time Asa also began to oppress some of his people.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Summary of Asa’s Reign
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The rest of the events of Asa’s reign, from beginning to end, are recorded in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of the Kings of Judah and Israel.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'In the thirty-ninth year of his reign, Asa developed a serious foot disease. Yet even with the severity of his disease, he did not seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s help but turned only to his physicians. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So he died in the forty-first year of his reign. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He was buried in the tomb he had carved out for himself in the City of David. He was laid on a bed perfumed with sweet spices and fragrant ointments, and the people built a huge funeral fire in his honor.
