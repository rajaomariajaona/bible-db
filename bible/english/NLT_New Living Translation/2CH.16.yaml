document_id: 2CH.16,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Final Years of Asa’s Reign
  - type: text
    content: In the thirty-sixth year of Asa’s reign, King Baasha of Israel invaded Judah and fortified Ramah in order to prevent anyone from entering or leaving King Asa’s territory in Judah.
  '10':
  - type: text
    content: Asa became so angry with Hanani for saying this that he threw him into prison and put him in stocks. At that time Asa also began to oppress some of his people.
  - type: heading
    content: Summary of Asa’s Reign
  '11':
  - type: text
    content: 'The rest of the events of Asa’s reign, from beginning to end, are recorded in '
  - type: text
    content: The Book of the Kings of Judah and Israel.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'In the thirty-ninth year of his reign, Asa developed a serious foot disease. Yet even with the severity of his disease, he did not seek the '
  - type: text
    content: Lord
  - type: text
    content: '’s help but turned only to his physicians. '
  '13':
  - type: text
    content: 'So he died in the forty-first year of his reign. '
  '14':
  - type: text
    content: He was buried in the tomb he had carved out for himself in the City of David. He was laid on a bed perfumed with sweet spices and fragrant ointments, and the people built a huge funeral fire in his honor.
  '2':
  - type: text
    content: 'Asa responded by removing the silver and gold from the treasuries of the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and the royal palace. He sent it to King Ben-hadad of Aram, who was ruling in Damascus, along with this message:'
  '3':
  - type: text
    content: “Let there be a treaty
  - type: note
    content: As in Greek version; Hebrew reads There is a treaty.
  - type: text
    content: ' between you and me like the one between your father and my father. See, I am sending you silver and gold. Break your treaty with King Baasha of Israel so that he will leave me alone.”'
  '4':
  - type: text
    content: Ben-hadad agreed to King Asa’s request and sent the commanders of his army to attack the towns of Israel. They conquered the towns of Ijon, Dan, Abel-beth-maacah,
  - type: note
    content: As in parallel text at 1 Kgs 15:20; Hebrew reads Abel-maim, another name for Abel-beth-maacah.
  - type: text
    content: ' and all the store cities in Naphtali. '
  '5':
  - type: text
    content: 'As soon as Baasha of Israel heard what was happening, he abandoned his project of fortifying Ramah and stopped all work on it. '
  '6':
  - type: text
    content: Then King Asa called out all the men of Judah to carry away the building stones and timbers that Baasha had been using to fortify Ramah. Asa used these materials to fortify the towns of Geba and Mizpah.
  '7':
  - type: text
    content: 'At that time Hanani the seer came to King Asa and told him, “Because you have put your trust in the king of Aram instead of in the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, you missed your chance to destroy the army of the king of Aram. '
  '8':
  - type: text
    content: Don’t you remember what happened to the Ethiopians
  - type: note
    content: Hebrew Cushites.
  - type: text
    content: ' and Libyans and their vast army, with all of their chariots and charioteers?'
  - type: note
    content: Or and horsemen?
  - type: text
    content: ' At that time you relied on the '
  - type: text
    content: Lord
  - type: text
    content: ', and he handed them over to you. '
  '9':
  - type: text
    content: 'The eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' search the whole earth in order to strengthen those whose hearts are fully committed to him. What a fool you have been! From now on you will be at war.”'
