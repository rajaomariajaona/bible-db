document_id: SNG.2,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: sp
    children:
    - type: text
      text: Young Woman
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: I am the spring crocus blooming on the Sharon Plain,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Traditionally rendered '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'I am the rose of Sharon. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sharon Plain is a region in the coastal plain of Palestine.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the lily of the valley.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: Young Man
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: My lover said to me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Rise up, my darling!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Come away with me, my fair one!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Look, the winter is past,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the rains are over and gone.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The flowers are springing up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the season of singing birds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the season of pruning vines.
      marker-yv: yv-n
    - type: text
      text: ' has come,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the cooing of turtledoves fills the air.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: The fig trees are forming young fruit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the fragrant grapevines are blossoming.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rise up, my darling!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Come away with me, my fair one!”
  - type: usfm
    marker: sp
    children:
    - type: text
      text: Young Man
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: My dove is hiding behind the rocks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: behind an outcrop on the cliff.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let me see your face;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let me hear your voice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For your voice is pleasant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your face is lovely.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: Young Women of Jerusalem
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Catch all the foxes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those little foxes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: before they ruin the vineyard of love,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the grapevines are blossoming!
  - type: usfm
    marker: sp
    children:
    - type: text
      text: Young Woman
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: My lover is mine, and I am his.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He browses among the lilies.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Before the dawn breezes blow
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the night shadows flee,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: return to me, my love, like a gazelle
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or a young stag on the rugged mountains.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on the hills of Bether.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Like a lily among thistles
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is my darling among young women.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: Young Woman
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Like the finest apple tree in the orchard
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is my lover among other young men.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I sit in his delightful shade
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and taste his delicious fruit.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: He escorts me to the banquet hall;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it’s obvious how much he loves me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Strengthen me with raisin cakes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: refresh me with apples,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I am weak with love.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: His left arm is under my head,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his right arm embraces me.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Promise me, O women of Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by the gazelles and wild deer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not to awaken love until the time is right.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: not to awaken love until it is ready.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ah, I hear my lover coming!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He is leaping over the mountains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bounding over the hills.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: My lover is like a swift gazelle
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or a young stag.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look, there he is behind the wall,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: looking through the window,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: peering into the room.
