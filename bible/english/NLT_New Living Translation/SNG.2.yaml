document_id: SNG.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Young Woman
  - type: text
    content: I am the spring crocus blooming on the Sharon Plain,
  - type: note
    content: Traditionally rendered I am the rose of Sharon. Sharon Plain is a region in the coastal plain of Palestine.
  - type: text
    content: the lily of the valley.
  - type: heading
    content: Young Man
  '10':
  - type: text
    content: My lover said to me,
  - type: text
    content: “Rise up, my darling!
  - type: text
    content: Come away with me, my fair one!
  '11':
  - type: text
    content: Look, the winter is past,
  - type: text
    content: and the rains are over and gone.
  '12':
  - type: text
    content: The flowers are springing up,
  - type: text
    content: the season of singing birds
  - type: note
    content: Or the season of pruning vines.
  - type: text
    content: ' has come,'
  - type: text
    content: and the cooing of turtledoves fills the air.
  '13':
  - type: text
    content: The fig trees are forming young fruit,
  - type: text
    content: and the fragrant grapevines are blossoming.
  - type: text
    content: Rise up, my darling!
  - type: text
    content: Come away with me, my fair one!”
  - type: heading
    content: Young Man
  '14':
  - type: text
    content: My dove is hiding behind the rocks,
  - type: text
    content: behind an outcrop on the cliff.
  - type: text
    content: Let me see your face;
  - type: text
    content: let me hear your voice.
  - type: text
    content: For your voice is pleasant,
  - type: text
    content: and your face is lovely.
  - type: heading
    content: Young Women of Jerusalem
  '15':
  - type: text
    content: Catch all the foxes,
  - type: text
    content: those little foxes,
  - type: text
    content: before they ruin the vineyard of love,
  - type: text
    content: for the grapevines are blossoming!
  - type: heading
    content: Young Woman
  '16':
  - type: text
    content: My lover is mine, and I am his.
  - type: text
    content: He browses among the lilies.
  '17':
  - type: text
    content: Before the dawn breezes blow
  - type: text
    content: and the night shadows flee,
  - type: text
    content: return to me, my love, like a gazelle
  - type: text
    content: or a young stag on the rugged mountains.
  - type: note
    content: Or on the hills of Bether.
  '2':
  - type: text
    content: Like a lily among thistles
  - type: text
    content: is my darling among young women.
  - type: heading
    content: Young Woman
  '3':
  - type: text
    content: Like the finest apple tree in the orchard
  - type: text
    content: is my lover among other young men.
  - type: text
    content: I sit in his delightful shade
  - type: text
    content: and taste his delicious fruit.
  '4':
  - type: text
    content: He escorts me to the banquet hall;
  - type: text
    content: it’s obvious how much he loves me.
  '5':
  - type: text
    content: Strengthen me with raisin cakes,
  - type: text
    content: refresh me with apples,
  - type: text
    content: for I am weak with love.
  '6':
  - type: text
    content: His left arm is under my head,
  - type: text
    content: and his right arm embraces me.
  '7':
  - type: text
    content: Promise me, O women of Jerusalem,
  - type: text
    content: by the gazelles and wild deer,
  - type: text
    content: not to awaken love until the time is right.
  - type: note
    content: Or not to awaken love until it is ready.
  '8':
  - type: text
    content: Ah, I hear my lover coming!
  - type: text
    content: He is leaping over the mountains,
  - type: text
    content: bounding over the hills.
  '9':
  - type: text
    content: My lover is like a swift gazelle
  - type: text
    content: or a young stag.
  - type: text
    content: Look, there he is behind the wall,
  - type: text
    content: looking through the window,
  - type: text
    content: peering into the room.
