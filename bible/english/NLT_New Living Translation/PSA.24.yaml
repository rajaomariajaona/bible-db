document_id: PSA.24,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The earth is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s, and everything in it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The world and all its people belong to him.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who is the King of glory?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'he is the King of glory. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he laid the earth’s foundation on the seas
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and built it on the ocean depths.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who may climb the mountain of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who may stand in his holy place?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Only those whose hands and hearts are pure,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who do not worship idols
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and never tell lies.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They will receive the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s blessing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have a right relationship with God their savior.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Such people may seek you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and worship in your presence, O God of Jacob.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in two Hebrew manuscripts and Greek and Syriac versions; most Hebrew manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: O Jacob.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Open up, ancient gates!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Open up, ancient doors,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and let the King of glory enter.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who is the King of glory?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', strong and mighty;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', invincible in battle.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Open up, ancient gates!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Open up, ancient doors,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and let the King of glory enter.
