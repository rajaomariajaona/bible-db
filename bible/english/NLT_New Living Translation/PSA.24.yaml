document_id: PSA.24,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm of David.
  - type: text
    content: 'The earth is the '
  - type: text
    content: Lord
  - type: text
    content: ’s, and everything in it.
  - type: text
    content: The world and all its people belong to him.
  '10':
  - type: text
    content: Who is the King of glory?
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies—'
  - type: text
    content: 'he is the King of glory. '
  - type: text
    content: Interlude
  '2':
  - type: text
    content: For he laid the earth’s foundation on the seas
  - type: text
    content: and built it on the ocean depths.
  '3':
  - type: text
    content: 'Who may climb the mountain of the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: Who may stand in his holy place?
  '4':
  - type: text
    content: Only those whose hands and hearts are pure,
  - type: text
    content: who do not worship idols
  - type: text
    content: and never tell lies.
  '5':
  - type: text
    content: 'They will receive the '
  - type: text
    content: Lord
  - type: text
    content: ’s blessing
  - type: text
    content: and have a right relationship with God their savior.
  '6':
  - type: text
    content: Such people may seek you
  - type: text
    content: and worship in your presence, O God of Jacob.
  - type: note
    content: As in two Hebrew manuscripts and Greek and Syriac versions; most Hebrew manuscripts read O Jacob.
  - type: text
    content: ' '
  - type: text
    content: Interlude
  '7':
  - type: text
    content: Open up, ancient gates!
  - type: text
    content: Open up, ancient doors,
  - type: text
    content: and let the King of glory enter.
  '8':
  - type: text
    content: Who is the King of glory?
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ', strong and mighty;'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ', invincible in battle.'
  '9':
  - type: text
    content: Open up, ancient gates!
  - type: text
    content: Open up, ancient doors,
  - type: text
    content: and let the King of glory enter.
