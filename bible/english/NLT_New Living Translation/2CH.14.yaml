document_id: 2CH.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Early Years of Asa’s Reign
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Verse 14:1 is numbered 13:23 in Hebrew text.
    marker-yv: yv-n
  - type: text
    text: 'When Abijah died, he was buried in the City of David. Then his son Asa became the next king. There was peace in the land for ten years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Verses 14:2-15 are numbered 14:1-14 in Hebrew text.
    marker-yv: yv-n
  - type: text
    text: 'Asa did what was pleasing and good in the sight of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' his God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He removed the foreign altars and the pagan shrines. He smashed the sacred pillars and cut down the Asherah poles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He commanded the people of Judah to seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of their ancestors, and to obey his law and his commands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Asa also removed the pagan shrines, as well as the incense altars from every one of Judah’s towns. So Asa’s kingdom enjoyed a period of peace. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'During those peaceful years, he was able to build up the fortified towns throughout Judah. No one tried to make war against him at this time, for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was giving him rest from his enemies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Asa told the people of Judah, “Let us build towns and fortify them with walls, towers, gates, and bars. The land is still ours because we sought the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God, and he has given us peace on every side.” So they went ahead with these projects and brought them to completion.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: King Asa had an army of 300,000 warriors from the tribe of Judah, armed with large shields and spears. He also had an army of 280,000 warriors from the tribe of Benjamin, armed with small shields and bows. Both armies were composed of well-trained fighting men.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Once an Ethiopian
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:9a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: a Cushite.
    marker-yv: yv-n
  - type: text
    text: ' named Zerah attacked Judah with an army of 1,000,000 men'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:9b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'an army of thousands and thousands; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: an army of a thousand thousands.
    marker-yv: yv-n
  - type: text
    text: ' and 300 chariots. They advanced to the town of Mareshah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: so Asa deployed his armies for battle in the valley north of Mareshah.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: valley of Zephathah near Mareshah.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then Asa cried out to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' his God, “O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', no one but you can help the powerless against the mighty! Help us, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God, for we trust in you alone. It is in your name that we have come against this vast horde. O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you are our God; do not let mere men prevail against you!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' defeated the Ethiopians'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Cushites; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 14:13.
    marker-yv: yv-n
  - type: text
    text: ' in the presence of Asa and the army of Judah, and the enemy fled. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Asa and his army pursued them as far as Gerar, and so many Ethiopians fell that they were unable to rally. They were destroyed by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and his army, and the army of Judah carried off a vast amount of plunder.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'While they were at Gerar, they attacked all the towns in that area, and terror from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came upon the people there. As a result, a vast amount of plunder was taken from these towns, too. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: They also attacked the camps of herdsmen and captured many sheep, goats, and camels before finally returning to Jerusalem.
