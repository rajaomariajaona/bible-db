document_id: 2CH.14,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Early Years of Asa’s Reign
  - type: text
    content: ' '
  - type: note
    content: Verse 14:1 is numbered 13:23 in Hebrew text.
  - type: text
    content: 'When Abijah died, he was buried in the City of David. Then his son Asa became the next king. There was peace in the land for ten years. '
  '10':
  - type: text
    content: so Asa deployed his armies for battle in the valley north of Mareshah.
  - type: note
    content: As in Greek version; Hebrew reads valley of Zephathah near Mareshah.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Then Asa cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ' his God, “O '
  - type: text
    content: Lord
  - type: text
    content: ', no one but you can help the powerless against the mighty! Help us, O '
  - type: text
    content: Lord
  - type: text
    content: ' our God, for we trust in you alone. It is in your name that we have come against this vast horde. O '
  - type: text
    content: Lord
  - type: text
    content: ', you are our God; do not let mere men prevail against you!”'
  '12':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' defeated the Ethiopians'
  - type: note
    content: Hebrew Cushites; also in 14:13.
  - type: text
    content: ' in the presence of Asa and the army of Judah, and the enemy fled. '
  '13':
  - type: text
    content: 'Asa and his army pursued them as far as Gerar, and so many Ethiopians fell that they were unable to rally. They were destroyed by the '
  - type: text
    content: Lord
  - type: text
    content: ' and his army, and the army of Judah carried off a vast amount of plunder.'
  '14':
  - type: text
    content: 'While they were at Gerar, they attacked all the towns in that area, and terror from the '
  - type: text
    content: Lord
  - type: text
    content: ' came upon the people there. As a result, a vast amount of plunder was taken from these towns, too. '
  '15':
  - type: text
    content: They also attacked the camps of herdsmen and captured many sheep, goats, and camels before finally returning to Jerusalem.
  '2':
  - type: note
    content: Verses 14:2-15 are numbered 14:1-14 in Hebrew text.
  - type: text
    content: 'Asa did what was pleasing and good in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God. '
  '3':
  - type: text
    content: 'He removed the foreign altars and the pagan shrines. He smashed the sacred pillars and cut down the Asherah poles. '
  '4':
  - type: text
    content: 'He commanded the people of Judah to seek the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors, and to obey his law and his commands. '
  '5':
  - type: text
    content: 'Asa also removed the pagan shrines, as well as the incense altars from every one of Judah’s towns. So Asa’s kingdom enjoyed a period of peace. '
  '6':
  - type: text
    content: 'During those peaceful years, he was able to build up the fortified towns throughout Judah. No one tried to make war against him at this time, for the '
  - type: text
    content: Lord
  - type: text
    content: ' was giving him rest from his enemies.'
  '7':
  - type: text
    content: 'Asa told the people of Judah, “Let us build towns and fortify them with walls, towers, gates, and bars. The land is still ours because we sought the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, and he has given us peace on every side.” So they went ahead with these projects and brought them to completion.'
  '8':
  - type: text
    content: King Asa had an army of 300,000 warriors from the tribe of Judah, armed with large shields and spears. He also had an army of 280,000 warriors from the tribe of Benjamin, armed with small shields and bows. Both armies were composed of well-trained fighting men.
  '9':
  - type: text
    content: Once an Ethiopian
  - type: note
    content: Hebrew a Cushite.
  - type: text
    content: ' named Zerah attacked Judah with an army of 1,000,000 men'
  - type: note
    content: Or an army of thousands and thousands; Hebrew reads an army of a thousand thousands.
  - type: text
    content: ' and 300 chariots. They advanced to the town of Mareshah, '
