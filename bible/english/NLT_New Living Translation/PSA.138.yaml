document_id: PSA.138,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I give you thanks, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', with all my heart;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will sing your praises before the gods.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I bow before your holy Temple as I worship.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I praise your name for your unfailing love and faithfulness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for your promises are backed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by all the honor of your name.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As soon as I pray, you answer me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you encourage me by giving me strength.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Every king in all the earth will thank you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for all of them will hear your words.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yes, they will sing about the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s ways,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is very great.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Though the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is great, he cares for the humble,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he keeps his distance from the proud.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though I am surrounded by troubles,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will protect me from the anger of my enemies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You reach out your hand,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the power of your right hand saves me.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will work out his plans for my life—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for your faithful love, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', endures forever.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t abandon me, for you made me.
