document_id: PSA.138,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm of David.
  - type: text
    content: 'I give you thanks, O '
  - type: text
    content: Lord
  - type: text
    content: ', with all my heart;'
  - type: text
    content: I will sing your praises before the gods.
  '2':
  - type: text
    content: I bow before your holy Temple as I worship.
  - type: text
    content: I praise your name for your unfailing love and faithfulness;
  - type: text
    content: for your promises are backed
  - type: text
    content: by all the honor of your name.
  '3':
  - type: text
    content: As soon as I pray, you answer me;
  - type: text
    content: you encourage me by giving me strength.
  '4':
  - type: text
    content: 'Every king in all the earth will thank you, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for all of them will hear your words.
  '5':
  - type: text
    content: 'Yes, they will sing about the '
  - type: text
    content: Lord
  - type: text
    content: ’s ways,
  - type: text
    content: 'for the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' is very great.'
  '6':
  - type: text
    content: 'Though the '
  - type: text
    content: Lord
  - type: text
    content: ' is great, he cares for the humble,'
  - type: text
    content: but he keeps his distance from the proud.
  '7':
  - type: text
    content: Though I am surrounded by troubles,
  - type: text
    content: you will protect me from the anger of my enemies.
  - type: text
    content: You reach out your hand,
  - type: text
    content: and the power of your right hand saves me.
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will work out his plans for my life—'
  - type: text
    content: 'for your faithful love, O '
  - type: text
    content: Lord
  - type: text
    content: ', endures forever.'
  - type: text
    content: Don’t abandon me, for you made me.
