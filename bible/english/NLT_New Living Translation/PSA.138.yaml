document_id: PSA.138
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: A psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I give you thanks, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', with all my heart;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will sing your praises before the gods.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I bow before your holy Temple as I worship.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I praise your name for your unfailing love and faithfulness;
- type: usfm
  marker: q1
  children:
  - type: text
    text: for your promises are backed
- type: usfm
  marker: q2
  children:
  - type: text
    text: by all the honor of your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: As soon as I pray, you answer me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you encourage me by giving me strength.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Every king in all the earth will thank you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: for all of them will hear your words.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Yes, they will sing about the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s ways,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for the glory of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is very great.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Though the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is great, he cares for the humble,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he keeps his distance from the proud.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Though I am surrounded by troubles,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will protect me from the anger of my enemies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You reach out your hand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the power of your right hand saves me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will work out his plans for my life—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for your faithful love, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', endures forever.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t abandon me, for you made me.
