document_id: 2SA.4,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Murder of Ishbosheth
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: When Ishbosheth,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:1 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ishbosheth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is another name for Esh-baal.
      marker-yv: yv-n
    - type: text
      text: ' Saul’s son, heard about Abner’s death at Hebron, he lost all courage, and all Israel became paralyzed with fear. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Someone once told me, ‘Saul is dead,’ thinking he was bringing me good news. But I seized him and killed him at Ziklag. That’s the reward I gave him for his news! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: How much more should I reward evil men who have killed an innocent man in his own house and on his own bed? Shouldn’t I hold you responsible for his blood and rid the earth of you?”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: So David ordered his young men to kill them, and they did. They cut off their hands and feet and hung their bodies beside the pool in Hebron. Then they took Ishbosheth’s head and buried it in Abner’s tomb in Hebron.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Now there were two brothers, Baanah and Recab, who were captains of Ishbosheth’s raiding parties. They were sons of Rimmon, a member of the tribe of Benjamin who lived in Beeroth. The town of Beeroth is now part of Benjamin’s territory '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: because the original people of Beeroth fled to Gittaim, where they still live as foreigners.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: (Saul’s son Jonathan had a son named Mephibosheth,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:4 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Mephibosheth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is another name for Merib-baal.
      marker-yv: yv-n
    - type: text
      text: ' who was crippled as a child. He was five years old when the report came from Jezreel that Saul and Jonathan had been killed in battle. When the child’s nurse heard the news, she picked him up and fled. But as she hurried away, she dropped him, and he became crippled.)'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'One day Recab and Baanah, the sons of Rimmon from Beeroth, went to Ishbosheth’s house around noon as he was taking his midday rest. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The doorkeeper, who had been sifting wheat, became drowsy and fell asleep. So Recab and Baanah slipped past her.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: So they went into the house pretending to fetch wheat, but they stabbed him in the stomach. Then Recab and Baanah escaped.
      marker-yv: yv-n
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: They went into the house and found Ishbosheth sleeping on his bed. They struck and killed him and cut off his head. Then, taking his head with them, they fled across the Jordan Valley
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Arabah.
      marker-yv: yv-n
    - type: text
      text: ' through the night. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'When they arrived at Hebron, they presented Ishbosheth’s head to David. “Look!” they exclaimed to the king. “Here is the head of Ishbosheth, the son of your enemy Saul who tried to kill you. Today the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given my lord the king revenge on Saul and his entire family!”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But David said to Recab and Baanah, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who saves me from all my enemies, is my witness. '
