document_id: GEN.46,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob’s Journey to Egypt
  - type: text
    content: So Jacob
  - type: note
    content: Hebrew Israel; also in 46:29, 30. See note on 35:21.
  - type: text
    content: ' set out for Egypt with all his possessions. And when he came to Beersheba, he offered sacrifices to the God of his father, Isaac. '
  '10':
  - type: text
    content: The sons of Simeon were Jemuel, Jamin, Ohad, Jakin, Zohar, and Shaul. (Shaul’s mother was a Canaanite woman.)
  '11':
  - type: text
    content: The sons of Levi were Gershon, Kohath, and Merari.
  '12':
  - type: text
    content: The sons of Judah were Er, Onan, Shelah, Perez, and Zerah (though Er and Onan had died in the land of Canaan). The sons of Perez were Hezron and Hamul.
  '13':
  - type: text
    content: The sons of Issachar were Tola, Puah,
  - type: note
    content: As in Syriac version and Samaritan Pentateuch (see also 1 Chr 7:1); Hebrew reads Puvah.
  - type: text
    content: ' Jashub,'
  - type: note
    content: As in some Greek manuscripts and Samaritan Pentateuch (see also Num 26:24; 1 Chr 7:1); Hebrew reads Iob.
  - type: text
    content: ' and Shimron.'
  '14':
  - type: text
    content: The sons of Zebulun were Sered, Elon, and Jahleel.
  '15':
  - type: text
    content: These were the sons of Leah and Jacob who were born in Paddan-aram, in addition to their daughter, Dinah. The number of Jacob’s descendants (male and female) through Leah was thirty-three.
  '16':
  - type: text
    content: The sons of Gad were Zephon,
  - type: note
    content: As in Greek version and Samaritan Pentateuch (see also Num 26:15); Hebrew reads Ziphion.
  - type: text
    content: ' Haggi, Shuni, Ezbon, Eri, Arodi, and Areli.'
  '17':
  - type: text
    content: The sons of Asher were Imnah, Ishvah, Ishvi, and Beriah. Their sister was Serah. Beriah’s sons were Heber and Malkiel.
  '18':
  - type: text
    content: These were the sons of Zilpah, the servant given to Leah by her father, Laban. The number of Jacob’s descendants through Zilpah was sixteen.
  '19':
  - type: text
    content: The sons of Jacob’s wife Rachel were Joseph and Benjamin.
  '2':
  - type: text
    content: During the night God spoke to him in a vision. “Jacob! Jacob!” he called.
  - type: text
    content: “Here I am,” Jacob replied.
  '20':
  - type: text
    content: Joseph’s sons, born in the land of Egypt, were Manasseh and Ephraim. Their mother was Asenath, daughter of Potiphera, the priest of On.
  - type: note
    content: Greek version reads of Heliopolis.
  '21':
  - type: text
    content: Benjamin’s sons were Bela, Beker, Ashbel, Gera, Naaman, Ehi, Rosh, Muppim, Huppim, and Ard.
  '22':
  - type: text
    content: These were the sons of Rachel and Jacob. The number of Jacob’s descendants through Rachel was fourteen.
  '23':
  - type: text
    content: The son of Dan was Hushim.
  '24':
  - type: text
    content: The sons of Naphtali were Jahzeel, Guni, Jezer, and Shillem.
  '25':
  - type: text
    content: These were the sons of Bilhah, the servant given to Rachel by her father, Laban. The number of Jacob’s descendants through Bilhah was seven.
  '26':
  - type: text
    content: 'The total number of Jacob’s direct descendants who went with him to Egypt, not counting his sons’ wives, was sixty-six. '
  '27':
  - type: text
    content: In addition, Joseph had two sons
  - type: note
    content: Greek version reads nine sons, probably including Joseph’s grandsons through Ephraim and Manasseh (see 1 Chr 7:14-20).
  - type: text
    content: ' who were born in Egypt. So altogether, there were seventy'
  - type: note
    content: Greek version reads seventy-five; see note on Exod 1:5.
  - type: text
    content: ' members of Jacob’s family in the land of Egypt.'
  - type: heading
    content: Jacob’s Family Arrives in Goshen
  '28':
  - type: text
    content: 'As they neared their destination, Jacob sent Judah ahead to meet Joseph and get directions to the region of Goshen. And when they finally arrived there, '
  '29':
  - type: text
    content: 'Joseph prepared his chariot and traveled to Goshen to meet his father, Jacob. When Joseph arrived, he embraced his father and wept, holding him for a long time. '
  '3':
  - type: text
    content: “I am God,
  - type: note
    content: Hebrew I am El.
  - type: text
    content: ' the God of your father,” the voice said. “Do not be afraid to go down to Egypt, for there I will make your family into a great nation. '
  '30':
  - type: text
    content: Finally, Jacob said to Joseph, “Now I am ready to die, since I have seen your face again and know you are still alive.”
  '31':
  - type: text
    content: 'And Joseph said to his brothers and to his father’s entire family, “I will go to Pharaoh and tell him, ‘My brothers and my father’s entire family have come to me from the land of Canaan. '
  '32':
  - type: text
    content: These men are shepherds, and they raise livestock. They have brought with them their flocks and herds and everything they own.’”
  '33':
  - type: text
    content: 'Then he said, “When Pharaoh calls for you and asks you about your occupation, '
  '34':
  - type: text
    content: you must tell him, ‘We, your servants, have raised livestock all our lives, as our ancestors have always done.’ When you tell him this, he will let you live here in the region of Goshen, for the Egyptians despise shepherds.”
  '4':
  - type: text
    content: I will go with you down to Egypt, and I will bring you back again. You will die in Egypt, but Joseph will be with you to close your eyes.”
  '5':
  - type: text
    content: 'So Jacob left Beersheba, and his sons took him to Egypt. They carried him and their little ones and their wives in the wagons Pharaoh had provided for them. '
  '6':
  - type: text
    content: 'They also took all their livestock and all the personal belongings they had acquired in the land of Canaan. So Jacob and his entire family went to Egypt— '
  '7':
  - type: text
    content: sons and grandsons, daughters and granddaughters—all his descendants.
  '8':
  - type: text
    content: 'These are the names of the descendants of Israel—the sons of Jacob—who went to Egypt:'
  - type: text
    content: 'Reuben was Jacob’s oldest son. '
  '9':
  - type: text
    content: The sons of Reuben were Hanoch, Pallu, Hezron, and Carmi.
