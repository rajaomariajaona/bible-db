document_id: GEN.46
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob’s Journey to Egypt
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: So Jacob
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Israel; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 46:29, 30. See note on 35:21.
    marker-yv: yv-n
  - type: text
    text: ' set out for Egypt with all his possessions. And when he came to Beersheba, he offered sacrifices to the God of his father, Isaac. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: During the night God spoke to him in a vision. “Jacob! Jacob!” he called.
- type: usfm
  marker: p
  children:
  - type: text
    text: “Here I am,” Jacob replied.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “I am God,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: I am El.
    marker-yv: yv-n
  - type: text
    text: ' the God of your father,” the voice said. “Do not be afraid to go down to Egypt, for there I will make your family into a great nation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I will go with you down to Egypt, and I will bring you back again. You will die in Egypt, but Joseph will be with you to close your eyes.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So Jacob left Beersheba, and his sons took him to Egypt. They carried him and their little ones and their wives in the wagons Pharaoh had provided for them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'They also took all their livestock and all the personal belongings they had acquired in the land of Canaan. So Jacob and his entire family went to Egypt— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: sons and grandsons, daughters and granddaughters—all his descendants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'These are the names of the descendants of Israel—the sons of Jacob—who went to Egypt:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'Reuben was Jacob’s oldest son. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The sons of Reuben were Hanoch, Pallu, Hezron, and Carmi.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The sons of Simeon were Jemuel, Jamin, Ohad, Jakin, Zohar, and Shaul. (Shaul’s mother was a Canaanite woman.)
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The sons of Levi were Gershon, Kohath, and Merari.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The sons of Judah were Er, Onan, Shelah, Perez, and Zerah (though Er and Onan had died in the land of Canaan). The sons of Perez were Hezron and Hamul.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The sons of Issachar were Tola, Puah,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46:13a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Syriac version and Samaritan Pentateuch (see also 1 Chr 7:1); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Puvah.
    marker-yv: yv-n
  - type: text
    text: ' Jashub,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46:13b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Greek manuscripts and Samaritan Pentateuch (see also Num 26:24; 1 Chr 7:1); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Iob.
    marker-yv: yv-n
  - type: text
    text: ' and Shimron.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The sons of Zebulun were Sered, Elon, and Jahleel.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: These were the sons of Leah and Jacob who were born in Paddan-aram, in addition to their daughter, Dinah. The number of Jacob’s descendants (male and female) through Leah was thirty-three.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The sons of Gad were Zephon,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version and Samaritan Pentateuch (see also Num 26:15); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ziphion.
    marker-yv: yv-n
  - type: text
    text: ' Haggi, Shuni, Ezbon, Eri, Arodi, and Areli.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The sons of Asher were Imnah, Ishvah, Ishvi, and Beriah. Their sister was Serah. Beriah’s sons were Heber and Malkiel.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: These were the sons of Zilpah, the servant given to Leah by her father, Laban. The number of Jacob’s descendants through Zilpah was sixteen.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The sons of Jacob’s wife Rachel were Joseph and Benjamin.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Joseph’s sons, born in the land of Egypt, were Manasseh and Ephraim. Their mother was Asenath, daughter of Potiphera, the priest of On.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of Heliopolis.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Benjamin’s sons were Bela, Beker, Ashbel, Gera, Naaman, Ehi, Rosh, Muppim, Huppim, and Ard.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: These were the sons of Rachel and Jacob. The number of Jacob’s descendants through Rachel was fourteen.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The son of Dan was Hushim.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The sons of Naphtali were Jahzeel, Guni, Jezer, and Shillem.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: These were the sons of Bilhah, the servant given to Rachel by her father, Laban. The number of Jacob’s descendants through Bilhah was seven.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The total number of Jacob’s direct descendants who went with him to Egypt, not counting his sons’ wives, was sixty-six. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: In addition, Joseph had two sons
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46:27a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'nine sons, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: probably including Joseph’s grandsons through Ephraim and Manasseh (see 1 Chr 7:14-20).
    marker-yv: yv-n
  - type: text
    text: ' who were born in Egypt. So altogether, there were seventy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46:27b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'seventy-five; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: see note on Exod 1:5.
    marker-yv: yv-n
  - type: text
    text: ' members of Jacob’s family in the land of Egypt.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob’s Family Arrives in Goshen
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'As they neared their destination, Jacob sent Judah ahead to meet Joseph and get directions to the region of Goshen. And when they finally arrived there, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Joseph prepared his chariot and traveled to Goshen to meet his father, Jacob. When Joseph arrived, he embraced his father and wept, holding him for a long time. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Finally, Jacob said to Joseph, “Now I am ready to die, since I have seen your face again and know you are still alive.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And Joseph said to his brothers and to his father’s entire family, “I will go to Pharaoh and tell him, ‘My brothers and my father’s entire family have come to me from the land of Canaan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: These men are shepherds, and they raise livestock. They have brought with them their flocks and herds and everything they own.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Then he said, “When Pharaoh calls for you and asks you about your occupation, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: you must tell him, ‘We, your servants, have raised livestock all our lives, as our ancestors have always done.’ When you tell him this, he will let you live here in the region of Goshen, for the Egyptians despise shepherds.”
