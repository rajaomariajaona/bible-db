document_id: 2KI.21,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manasseh Rules in Judah
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Manasseh was twelve years old when he became king, and he reigned in Jerusalem fifty-five years. His mother was Hephzibah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said through his servants the prophets: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “King Manasseh of Judah has done many detestable things. He is even more wicked than the Amorites, who lived in this land before Israel. He has caused the people of Judah to sin with his idols.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew term (literally '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: round things
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) probably alludes to dung; also in 21:21.
      marker-yv: yv-n
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says: I will bring such disaster on Jerusalem and Judah that the ears of those who hear about it will tingle with horror. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will judge Jerusalem by the same standard I used for Samaria and the same measure
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the same plumb line I used for Samaria and the same plumb bob.
      marker-yv: yv-n
    - type: text
      text: ' I used for the family of Ahab. I will wipe away the people of Jerusalem as one wipes a dish and turns it upside down. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I will reject even the remnant of my own people who are left, and I will hand them over as plunder for their enemies. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For they have done great evil in my sight and have angered me ever since their ancestors came out of Egypt.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manasseh also murdered many innocent people until Jerusalem was filled from one end to the other with innocent blood. This was in addition to the sin that he caused the people of Judah to commit, leading them to do evil in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s sight.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The rest of the events in Manasseh’s reign and everything he did, including the sins he committed, are recorded in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Book of the History of the Kings of Judah.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Manasseh died, he was buried in the palace garden, the garden of Uzza. Then his son Amon became the next king.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Amon Rules in Judah
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Amon was twenty-two years old when he became king, and he reigned in Jerusalem two years. His mother was Meshullemeth, the daughter of Haruz from Jotbah. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He did what was evil in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s sight, following the detestable practices of the pagan nations that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had driven from the land ahead of the Israelites. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He did what was evil in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s sight, just as his father, Manasseh, had done. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He followed the example of his father, worshiping the same idols his father had worshiped. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He abandoned the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of his ancestors, and he refused to follow the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s ways.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Amon’s own officials conspired against him and assassinated him in his palace. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the people of the land killed all those who had conspired against King Amon, and they made his son Josiah the next king.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The rest of the events in Amon’s reign and what he did are recorded in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Book of the History of the Kings of Judah.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He was buried in his tomb in the garden of Uzza. Then his son Josiah became the next king.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: He rebuilt the pagan shrines his father, Hezekiah, had destroyed. He constructed altars for Baal and set up an Asherah pole, just as King Ahab of Israel had done. He also bowed before all the powers of the heavens and worshiped them.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He built pagan altars in the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the place where the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had said, “My name will remain in Jerusalem forever.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He built these altars for all the powers of the heavens in both courtyards of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Temple. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manasseh also sacrificed his own son in the fire.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: also made his son pass through the fire.
      marker-yv: yv-n
    - type: text
      text: ' He practiced sorcery and divination, and he consulted with mediums and psychics. He did much that was evil in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s sight, arousing his anger.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manasseh even made a carved image of Asherah and set it up in the Temple, the very place where the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had told David and his son Solomon: “My name will be honored forever in this Temple and in Jerusalem—the city I have chosen from among all the tribes of Israel. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If the Israelites will be careful to obey my commands—all the laws my servant Moses gave them—I will not send them into exile from this land that I gave their ancestors.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the people refused to listen, and Manasseh led them to do even more evil than the pagan nations that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had destroyed when the people of Israel entered the land.'
