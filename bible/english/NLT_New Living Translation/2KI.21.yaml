document_id: 2KI.21,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Manasseh Rules in Judah
  - type: text
    content: 'Manasseh was twelve years old when he became king, and he reigned in Jerusalem fifty-five years. His mother was Hephzibah. '
  '10':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said through his servants the prophets: '
  '11':
  - type: text
    content: “King Manasseh of Judah has done many detestable things. He is even more wicked than the Amorites, who lived in this land before Israel. He has caused the people of Judah to sin with his idols.
  - type: note
    content: The Hebrew term (literally round things) probably alludes to dung; also in 21:21.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'So this is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: I will bring such disaster on Jerusalem and Judah that the ears of those who hear about it will tingle with horror. '
  '13':
  - type: text
    content: I will judge Jerusalem by the same standard I used for Samaria and the same measure
  - type: note
    content: Hebrew the same plumb line I used for Samaria and the same plumb bob.
  - type: text
    content: ' I used for the family of Ahab. I will wipe away the people of Jerusalem as one wipes a dish and turns it upside down. '
  '14':
  - type: text
    content: 'Then I will reject even the remnant of my own people who are left, and I will hand them over as plunder for their enemies. '
  '15':
  - type: text
    content: For they have done great evil in my sight and have angered me ever since their ancestors came out of Egypt.”
  '16':
  - type: text
    content: 'Manasseh also murdered many innocent people until Jerusalem was filled from one end to the other with innocent blood. This was in addition to the sin that he caused the people of Judah to commit, leading them to do evil in the '
  - type: text
    content: Lord
  - type: text
    content: ’s sight.
  '17':
  - type: text
    content: 'The rest of the events in Manasseh’s reign and everything he did, including the sins he committed, are recorded in '
  - type: text
    content: The Book of the History of the Kings of Judah.
  - type: text
    content: ' '
  '18':
  - type: text
    content: When Manasseh died, he was buried in the palace garden, the garden of Uzza. Then his son Amon became the next king.
  - type: heading
    content: Amon Rules in Judah
  '19':
  - type: text
    content: 'Amon was twenty-two years old when he became king, and he reigned in Jerusalem two years. His mother was Meshullemeth, the daughter of Haruz from Jotbah. '
  '2':
  - type: text
    content: 'He did what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight, following the detestable practices of the pagan nations that the '
  - type: text
    content: Lord
  - type: text
    content: ' had driven from the land ahead of the Israelites. '
  '20':
  - type: text
    content: 'He did what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight, just as his father, Manasseh, had done. '
  '21':
  - type: text
    content: 'He followed the example of his father, worshiping the same idols his father had worshiped. '
  '22':
  - type: text
    content: 'He abandoned the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of his ancestors, and he refused to follow the '
  - type: text
    content: Lord
  - type: text
    content: ’s ways.
  '23':
  - type: text
    content: 'Then Amon’s own officials conspired against him and assassinated him in his palace. '
  '24':
  - type: text
    content: But the people of the land killed all those who had conspired against King Amon, and they made his son Josiah the next king.
  '25':
  - type: text
    content: 'The rest of the events in Amon’s reign and what he did are recorded in '
  - type: text
    content: The Book of the History of the Kings of Judah.
  - type: text
    content: ' '
  '26':
  - type: text
    content: He was buried in his tomb in the garden of Uzza. Then his son Josiah became the next king.
  '3':
  - type: text
    content: He rebuilt the pagan shrines his father, Hezekiah, had destroyed. He constructed altars for Baal and set up an Asherah pole, just as King Ahab of Israel had done. He also bowed before all the powers of the heavens and worshiped them.
  '4':
  - type: text
    content: 'He built pagan altars in the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', the place where the '
  - type: text
    content: Lord
  - type: text
    content: ' had said, “My name will remain in Jerusalem forever.” '
  '5':
  - type: text
    content: 'He built these altars for all the powers of the heavens in both courtyards of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple. '
  '6':
  - type: text
    content: Manasseh also sacrificed his own son in the fire.
  - type: note
    content: Or also made his son pass through the fire.
  - type: text
    content: ' He practiced sorcery and divination, and he consulted with mediums and psychics. He did much that was evil in the '
  - type: text
    content: Lord
  - type: text
    content: ’s sight, arousing his anger.
  '7':
  - type: text
    content: 'Manasseh even made a carved image of Asherah and set it up in the Temple, the very place where the '
  - type: text
    content: Lord
  - type: text
    content: ' had told David and his son Solomon: “My name will be honored forever in this Temple and in Jerusalem—the city I have chosen from among all the tribes of Israel. '
  '8':
  - type: text
    content: 'If the Israelites will be careful to obey my commands—all the laws my servant Moses gave them—I will not send them into exile from this land that I gave their ancestors.” '
  '9':
  - type: text
    content: 'But the people refused to listen, and Manasseh led them to do even more evil than the pagan nations that the '
  - type: text
    content: Lord
  - type: text
    content: ' had destroyed when the people of Israel entered the land.'
