document_id: 2SA.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David and Bathsheba
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: In the spring of the year,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'At the turn of the year. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The first day of the year in the ancient Hebrew lunar calendar occurred in March or April.
    marker-yv: yv-n
  - type: text
    text: ' when kings normally go out to war, David sent Joab and the Israelite army to fight the Ammonites. They destroyed the Ammonite army and laid siege to the city of Rabbah. However, David stayed behind in Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Late one afternoon, after his midday rest, David got out of bed and was walking on the roof of the palace. As he looked out over the city, he noticed a woman of unusual beauty taking a bath. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He sent someone to find out who she was, and he was told, “She is Bathsheba, the daughter of Eliam and the wife of Uriah the Hittite.” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then David sent messengers to get her; and when she came to the palace, he slept with her. She had just completed the purification rites after having her menstrual period. Then she returned home. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Later, when Bathsheba discovered that she was pregnant, she sent David a message, saying, “I’m pregnant.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then David sent word to Joab: “Send me Uriah the Hittite.” So Joab sent him to David. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'When Uriah arrived, David asked him how Joab and the army were getting along and how the war was progressing. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then he told Uriah, “Go on home and relax.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'and wash your feet, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: an expression that may also have a connotation of ritualistic washing.
    marker-yv: yv-n
  - type: text
    text: '” David even sent a gift to Uriah after he had left the palace. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But Uriah didn’t go home. He slept that night at the palace entrance with the king’s palace guard.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: When David heard that Uriah had not gone home, he summoned him and asked, “What’s the matter? Why didn’t you go home last night after being away for so long?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Uriah replied, “The Ark and the armies of Israel and Judah are living in tents,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: at Succoth.
    marker-yv: yv-n
  - type: text
    text: ' and Joab and my master’s men are camping in the open fields. How could I go home to wine and dine and sleep with my wife? I swear that I would never do such a thing.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“Well, stay here today,” David told him, “and tomorrow you may return to the army.” So Uriah stayed in Jerusalem that day and the next. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then David invited him to dinner and got him drunk. But even then he couldn’t get Uriah to go home to his wife. Again he slept at the palace entrance with the king’s palace guard.
- type: usfm
  marker: s1
  children:
  - type: text
    text: David Arranges for Uriah’s Death
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So the next morning David wrote a letter to Joab and gave it to Uriah to deliver. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The letter instructed Joab, “Station Uriah on the front lines where the battle is fiercest. Then pull back so that he will be killed.” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So Joab assigned Uriah to a spot close to the city wall where he knew the enemy’s strongest men were fighting. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And when the enemy soldiers came out of the city to fight, Uriah the Hittite was killed along with several other Israelite soldiers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then Joab sent a battle report to David. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'He told his messenger, “Report all the news of the battle to the king. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But he might get angry and ask, ‘Why did the troops go so close to the city? Didn’t they know there would be shooting from the walls? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Wasn’t Abimelech son of Gideon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'son of Jerub-besheth. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jerub-besheth is a variation on the name Jerub-baal, which is another name for Gideon; see Judg 6:32.
    marker-yv: yv-n
  - type: text
    text: ' killed at Thebez by a woman who threw a millstone down on him from the wall? Why would you get so close to the wall?’ Then tell him, ‘Uriah the Hittite was killed, too.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So the messenger went to Jerusalem and gave a complete report to David. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“The enemy came out against us in the open fields,” he said. “And as we chased them back to the city gate, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: the archers on the wall shot arrows at us. Some of the king’s men were killed, including Uriah the Hittite.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “Well, tell Joab not to be discouraged,” David said. “The sword devours this one today and that one tomorrow! Fight harder next time, and conquer the city!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'When Uriah’s wife heard that her husband was dead, she mourned for him. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'When the period of mourning was over, David sent for her and brought her to the palace, and she became one of his wives. Then she gave birth to a son. But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was displeased with what David had done.'
