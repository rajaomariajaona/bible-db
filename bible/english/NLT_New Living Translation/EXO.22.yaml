document_id: EXO.22,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Protection of Property
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:1a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verse 22:1 is numbered 21:37 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: “If someone steals an ox
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:1b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'bull, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cow; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 22:4, 9, 10.
      marker-yv: yv-n
    - type: text
      text: ' or sheep and then kills or sells it, the thief must pay back five oxen for each ox stolen, and four sheep for each sheep stolen.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now suppose someone leaves a donkey, ox, sheep, or any other animal with a neighbor for safekeeping, but it dies or is injured or is taken away, and no one sees what happened. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The neighbor must then take an oath in the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. If the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' confirms that the neighbor did not steal the property, the owner must accept the verdict, and no payment will be required. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if the animal was indeed stolen, the guilty person must pay compensation to the owner. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If it was torn to pieces by a wild animal, the remains of the carcass must be shown as evidence, and no compensation will be required.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If someone borrows an animal from a neighbor and it is injured or dies when the owner is absent, the person who borrowed it must pay full compensation. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if the owner was present, no compensation is required. And no compensation is required if the animal was rented, for this loss is covered by the rental fee.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Social Responsibility
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“If a man seduces a virgin who is not engaged to anyone and has sex with her, he must pay the customary bride price and marry her. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But if her father refuses to let him marry her, the man must still pay him an amount equal to the bride price of a virgin.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You must not allow a sorceress to live.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Anyone who has sexual relations with an animal must certainly be put to death.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses 22:2-31 are numbered 22:1-30 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: '“If a thief is caught in the act of breaking into a house and is struck and killed in the process, the person who killed the thief is not guilty of murder. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Anyone who sacrifices to any god other than the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' must be destroyed.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew term used here refers to the complete consecration of things or people to the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ', either by destroying them or by giving them as an offering.'
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You must not mistreat or oppress foreigners in any way. Remember, you yourselves were once foreigners in the land of Egypt.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You must not exploit a widow or an orphan. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you exploit them in any way and they cry out to me, then I will certainly hear their cry. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: My anger will blaze against you, and I will kill you with the sword. Then your wives will be widows and your children fatherless.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If you lend money to any of my people who are in need, do not charge interest as a money lender would. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you take your neighbor’s cloak as security for a loan, you must return it before sunset. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This coat may be the only blanket your neighbor has. How can a person sleep without it? If you do not return it and your neighbor cries out to me for help, then I will hear, for I am merciful.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You must not dishonor God or curse any of your rulers.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You must not hold anything back when you give me offerings from your crops and your wine.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You must give me your firstborn sons.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if it happens in daylight, the one who killed the thief is guilty of murder.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“A thief who is caught must pay in full for everything he stole. If he cannot pay, he must be sold as a slave to pay for his theft. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You must also give me the firstborn of your cattle, sheep, and goats. But leave the newborn animal with its mother for seven days; then give it to me on the eighth day.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You must be my holy people. Therefore, do not eat any animal that has been torn up and killed by wild animals. Throw it to the dogs.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If someone steals an ox or a donkey or a sheep and it is found in the thief’s possession, then the thief must pay double the value of the stolen animal.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “If an animal is grazing in a field or vineyard and the owner lets it stray into someone else’s field to graze, then the animal’s owner must pay compensation from the best of his own grain or grapes.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “If you are burning thornbushes and the fire gets out of control and spreads into another person’s field, destroying the sheaves or the uncut grain or the whole crop, the one who started the fire must pay for the lost crop.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Suppose someone leaves money or goods with a neighbor for safekeeping, and they are stolen from the neighbor’s house. If the thief is caught, the compensation is double the value of what was stolen. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if the thief is not caught, the neighbor must appear before God,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: before the judges.
      marker-yv: yv-n
    - type: text
      text: ' who will determine if he stole the property.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Suppose there is a dispute between two people who both claim to own a particular ox, donkey, sheep, article of clothing, or any lost property. Both parties must come before God, and the person whom God declares
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: before the judges, and the person whom the judges declare.
      marker-yv: yv-n
    - type: text
      text: ' guilty must pay double compensation to the other.'
