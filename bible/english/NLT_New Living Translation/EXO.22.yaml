document_id: EXO.22,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Protection of Property
  - type: text
    content: ' '
  - type: note
    content: Verse 22:1 is numbered 21:37 in Hebrew text.
  - type: text
    content: “If someone steals an ox
  - type: note
    content: Or bull, or cow; also in 22:4, 9, 10.
  - type: text
    content: ' or sheep and then kills or sells it, the thief must pay back five oxen for each ox stolen, and four sheep for each sheep stolen.'
  '10':
  - type: text
    content: '“Now suppose someone leaves a donkey, ox, sheep, or any other animal with a neighbor for safekeeping, but it dies or is injured or is taken away, and no one sees what happened. '
  '11':
  - type: text
    content: 'The neighbor must then take an oath in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: '. If the '
  - type: text
    content: Lord
  - type: text
    content: ' confirms that the neighbor did not steal the property, the owner must accept the verdict, and no payment will be required. '
  '12':
  - type: text
    content: 'But if the animal was indeed stolen, the guilty person must pay compensation to the owner. '
  '13':
  - type: text
    content: If it was torn to pieces by a wild animal, the remains of the carcass must be shown as evidence, and no compensation will be required.
  '14':
  - type: text
    content: '“If someone borrows an animal from a neighbor and it is injured or dies when the owner is absent, the person who borrowed it must pay full compensation. '
  '15':
  - type: text
    content: But if the owner was present, no compensation is required. And no compensation is required if the animal was rented, for this loss is covered by the rental fee.
  - type: heading
    content: Social Responsibility
  '16':
  - type: text
    content: '“If a man seduces a virgin who is not engaged to anyone and has sex with her, he must pay the customary bride price and marry her. '
  '17':
  - type: text
    content: But if her father refuses to let him marry her, the man must still pay him an amount equal to the bride price of a virgin.
  '18':
  - type: text
    content: “You must not allow a sorceress to live.
  '19':
  - type: text
    content: “Anyone who has sexual relations with an animal must certainly be put to death.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Verses 22:2-31 are numbered 22:1-30 in Hebrew text.
  - type: text
    content: '“If a thief is caught in the act of breaking into a house and is struck and killed in the process, the person who killed the thief is not guilty of murder. '
  '20':
  - type: text
    content: '“Anyone who sacrifices to any god other than the '
  - type: text
    content: Lord
  - type: text
    content: ' must be destroyed.'
  - type: note
    content: The Hebrew term used here refers to the complete consecration of things or people to the Lord, either by destroying them or by giving them as an offering.
  '21':
  - type: text
    content: “You must not mistreat or oppress foreigners in any way. Remember, you yourselves were once foreigners in the land of Egypt.
  '22':
  - type: text
    content: '“You must not exploit a widow or an orphan. '
  '23':
  - type: text
    content: 'If you exploit them in any way and they cry out to me, then I will certainly hear their cry. '
  '24':
  - type: text
    content: My anger will blaze against you, and I will kill you with the sword. Then your wives will be widows and your children fatherless.
  '25':
  - type: text
    content: '“If you lend money to any of my people who are in need, do not charge interest as a money lender would. '
  '26':
  - type: text
    content: 'If you take your neighbor’s cloak as security for a loan, you must return it before sunset. '
  '27':
  - type: text
    content: This coat may be the only blanket your neighbor has. How can a person sleep without it? If you do not return it and your neighbor cries out to me for help, then I will hear, for I am merciful.
  '28':
  - type: text
    content: “You must not dishonor God or curse any of your rulers.
  '29':
  - type: text
    content: “You must not hold anything back when you give me offerings from your crops and your wine.
  - type: text
    content: “You must give me your firstborn sons.
  '3':
  - type: text
    content: But if it happens in daylight, the one who killed the thief is guilty of murder.
  - type: text
    content: '“A thief who is caught must pay in full for everything he stole. If he cannot pay, he must be sold as a slave to pay for his theft. '
  '30':
  - type: text
    content: “You must also give me the firstborn of your cattle, sheep, and goats. But leave the newborn animal with its mother for seven days; then give it to me on the eighth day.
  '31':
  - type: text
    content: “You must be my holy people. Therefore, do not eat any animal that has been torn up and killed by wild animals. Throw it to the dogs.
  '4':
  - type: text
    content: If someone steals an ox or a donkey or a sheep and it is found in the thief’s possession, then the thief must pay double the value of the stolen animal.
  '5':
  - type: text
    content: “If an animal is grazing in a field or vineyard and the owner lets it stray into someone else’s field to graze, then the animal’s owner must pay compensation from the best of his own grain or grapes.
  '6':
  - type: text
    content: “If you are burning thornbushes and the fire gets out of control and spreads into another person’s field, destroying the sheaves or the uncut grain or the whole crop, the one who started the fire must pay for the lost crop.
  '7':
  - type: text
    content: '“Suppose someone leaves money or goods with a neighbor for safekeeping, and they are stolen from the neighbor’s house. If the thief is caught, the compensation is double the value of what was stolen. '
  '8':
  - type: text
    content: But if the thief is not caught, the neighbor must appear before God,
  - type: note
    content: Or before the judges.
  - type: text
    content: ' who will determine if he stole the property.'
  '9':
  - type: text
    content: “Suppose there is a dispute between two people who both claim to own a particular ox, donkey, sheep, article of clothing, or any lost property. Both parties must come before God, and the person whom God declares
  - type: note
    content: Or before the judges, and the person whom the judges declare.
  - type: text
    content: ' guilty must pay double compensation to the other.'
