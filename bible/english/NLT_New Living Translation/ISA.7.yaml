document_id: ISA.7,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message for Ahaz
  - type: text
    content: When Ahaz, son of Jotham and grandson of Uzziah, was king of Judah, King Rezin of Syria
  - type: note
    content: Hebrew Aram; also in 7:2, 4, 5, 8.
  - type: text
    content: ' and Pekah son of Remaliah, the king of Israel, set out to attack Jerusalem. However, they were unable to carry out their plan.'
  '10':
  - type: text
    content: 'Later, the '
  - type: text
    content: Lord
  - type: text
    content: ' sent this message to King Ahaz: '
  '11':
  - type: text
    content: '“Ask the '
  - type: text
    content: Lord
  - type: text
    content: ' your God for a sign of confirmation, Ahaz. Make it as difficult as you want—as high as heaven or as deep as the place of the dead.'
  - type: note
    content: Hebrew as deep as Sheol.
  - type: text
    content: ”
  '12':
  - type: text
    content: 'But the king refused. “No,” he said, “I will not test the '
  - type: text
    content: Lord
  - type: text
    content: ' like that.”'
  '13':
  - type: text
    content: 'Then Isaiah said, “Listen well, you royal family of David! Isn’t it enough to exhaust human patience? Must you exhaust the patience of my God as well? '
  '14':
  - type: text
    content: All right then, the Lord himself will give you the sign. Look! The virgin
  - type: note
    content: Or young woman.
  - type: text
    content: ' will conceive a child! She will give birth to a son and will call him Immanuel (which means ‘God is with us’). '
  '15':
  - type: text
    content: By the time this child is old enough to choose what is right and reject what is wrong, he will be eating yogurt
  - type: note
    content: Or curds; also in 7:22.
  - type: text
    content: ' and honey. '
  '16':
  - type: text
    content: For before the child is that old, the lands of the two kings you fear so much will both be deserted.
  '17':
  - type: text
    content: '“Then the '
  - type: text
    content: Lord
  - type: text
    content: ' will bring things on you, your nation, and your family unlike anything since Israel broke away from Judah. He will bring the king of Assyria upon you!”'
  '18':
  - type: text
    content: 'In that day the '
  - type: text
    content: Lord
  - type: text
    content: ' will whistle for the army of southern Egypt and for the army of Assyria. They will swarm around you like flies and bees. '
  '19':
  - type: text
    content: 'They will come in vast hordes and settle in the fertile areas and also in the desolate valleys, caves, and thorny places. '
  '2':
  - type: text
    content: 'The news had come to the royal court of Judah: “Syria is allied with Israel'
  - type: note
    content: Hebrew Ephraim, referring to the northern kingdom of Israel; also in 7:5, 8, 9, 17.
  - type: text
    content: ' against us!” So the hearts of the king and his people trembled with fear, like trees shaking in a storm.'
  '20':
  - type: text
    content: In that day the Lord will hire a “razor” from beyond the Euphrates River
  - type: note
    content: Hebrew the river.
  - type: text
    content: '—the king of Assyria—and use it to shave off everything: your land, your crops, and your people.'
  - type: note
    content: Hebrew shave off the head, the hair of the legs, and the beard.
  '21':
  - type: text
    content: 'In that day a farmer will be fortunate to have a cow and two sheep or goats left. '
  '22':
  - type: text
    content: 'Nevertheless, there will be enough milk for everyone because so few people will be left in the land. They will eat their fill of yogurt and honey. '
  '23':
  - type: text
    content: In that day the lush vineyards, now worth 1,000 pieces of silver,
  - type: note
    content: Hebrew 1,000 [shekels] of silver, about 25 pounds or 11.4 kilograms in weight.
  - type: text
    content: ' will become patches of briers and thorns. '
  '24':
  - type: text
    content: 'The entire land will become a vast expanse of briers and thorns, a hunting ground overrun by wildlife. '
  '25':
  - type: text
    content: No one will go to the fertile hillsides where the gardens once grew, for briers and thorns will cover them. Cattle, sheep, and goats will graze there.
  '3':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Isaiah, “Take your son Shear-jashub'
  - type: note
    content: Shear-jashub means “A remnant will return.”
  - type: text
    content: ' and go out to meet King Ahaz. You will find him at the end of the aqueduct that feeds water into the upper pool, near the road leading to the field where cloth is washed.'
  - type: note
    content: Or bleached.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Tell him to stop worrying. Tell him he doesn’t need to fear the fierce anger of those two burned-out embers, King Rezin of Syria and Pekah son of Remaliah. '
  '5':
  - type: text
    content: 'Yes, the kings of Syria and Israel are plotting against him, saying, '
  '6':
  - type: text
    content: '‘We will attack Judah and capture it for ourselves. Then we will install the son of Tabeel as Judah’s king.’ '
  '7':
  - type: text
    content: 'But this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “This invasion will never happen;
  - type: text
    content: it will never take place;
  '8':
  - type: text
    content: for Syria is no stronger than its capital, Damascus,
  - type: text
    content: and Damascus is no stronger than its king, Rezin.
  - type: text
    content: As for Israel, within sixty-five years
  - type: text
    content: it will be crushed and completely destroyed.
  '9':
  - type: text
    content: Israel is no stronger than its capital, Samaria,
  - type: text
    content: and Samaria is no stronger than its king, Pekah son of Remaliah.
  - type: text
    content: Unless your faith is firm,
  - type: text
    content: I cannot make you stand firm.”
  - type: heading
    content: The Sign of Immanuel
