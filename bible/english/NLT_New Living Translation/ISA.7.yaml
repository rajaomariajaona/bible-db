document_id: ISA.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message for Ahaz
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: When Ahaz, son of Jotham and grandson of Uzziah, was king of Judah, King Rezin of Syria
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Aram; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 7:2, 4, 5, 8.
    marker-yv: yv-n
  - type: text
    text: ' and Pekah son of Remaliah, the king of Israel, set out to attack Jerusalem. However, they were unable to carry out their plan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The news had come to the royal court of Judah: “Syria is allied with Israel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ephraim, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: referring to the northern kingdom of Israel; also in 7:5, 8, 9, 17.
    marker-yv: yv-n
  - type: text
    text: ' against us!” So the hearts of the king and his people trembled with fear, like trees shaking in a storm.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Isaiah, “Take your son Shear-jashub'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:3a '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Shear-jashub '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “A remnant will return.”
    marker-yv: yv-n
  - type: text
    text: ' and go out to meet King Ahaz. You will find him at the end of the aqueduct that feeds water into the upper pool, near the road leading to the field where cloth is washed.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:3b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: bleached.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tell him to stop worrying. Tell him he doesn’t need to fear the fierce anger of those two burned-out embers, King Rezin of Syria and Pekah son of Remaliah. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Yes, the kings of Syria and Israel are plotting against him, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '‘We will attack Judah and capture it for ourselves. Then we will install the son of Tabeel as Judah’s king.’ '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “This invasion will never happen;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it will never take place;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: for Syria is no stronger than its capital, Damascus,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Damascus is no stronger than its king, Rezin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: As for Israel, within sixty-five years
- type: usfm
  marker: q2
  children:
  - type: text
    text: it will be crushed and completely destroyed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Israel is no stronger than its capital, Samaria,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Samaria is no stronger than its king, Pekah son of Remaliah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Unless your faith is firm,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I cannot make you stand firm.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Sign of Immanuel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Later, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' sent this message to King Ahaz: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“Ask the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God for a sign of confirmation, Ahaz. Make it as difficult as you want—as high as heaven or as deep as the place of the dead.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: as deep as Sheol.
    marker-yv: yv-n
  - type: text
    text: ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But the king refused. “No,” he said, “I will not test the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' like that.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Isaiah said, “Listen well, you royal family of David! Isn’t it enough to exhaust human patience? Must you exhaust the patience of my God as well? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: All right then, the Lord himself will give you the sign. Look! The virgin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: young woman.
    marker-yv: yv-n
  - type: text
    text: ' will conceive a child! She will give birth to a son and will call him Immanuel (which means ‘God is with us’). '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: By the time this child is old enough to choose what is right and reject what is wrong, he will be eating yogurt
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'curds; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 7:22.
    marker-yv: yv-n
  - type: text
    text: ' and honey. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For before the child is that old, the lands of the two kings you fear so much will both be deserted.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will bring things on you, your nation, and your family unlike anything since Israel broke away from Judah. He will bring the king of Assyria upon you!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'In that day the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will whistle for the army of southern Egypt and for the army of Assyria. They will swarm around you like flies and bees. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'They will come in vast hordes and settle in the fertile areas and also in the desolate valleys, caves, and thorny places. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: In that day the Lord will hire a “razor” from beyond the Euphrates River
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:20a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the river.
    marker-yv: yv-n
  - type: text
    text: '—the king of Assyria—and use it to shave off everything: your land, your crops, and your people.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:20b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: shave off the head, the hair of the legs, and the beard.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'In that day a farmer will be fortunate to have a cow and two sheep or goats left. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nevertheless, there will be enough milk for everyone because so few people will be left in the land. They will eat their fill of yogurt and honey. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: In that day the lush vineyards, now worth 1,000 pieces of silver,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1,000 [shekels] of silver, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: about 25 pounds or 11.4 kilograms in weight.
    marker-yv: yv-n
  - type: text
    text: ' will become patches of briers and thorns. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The entire land will become a vast expanse of briers and thorns, a hunting ground overrun by wildlife. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: No one will go to the fertile hillsides where the gardens once grew, for briers and thorns will cover them. Cattle, sheep, and goats will graze there.
