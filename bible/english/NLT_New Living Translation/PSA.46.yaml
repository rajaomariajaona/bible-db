document_id: PSA.46,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A song of the descendants of Korah, to be sung by soprano voices.'
  - type: note
    content: Hebrew according to alamoth.
  - type: text
    content: God is our refuge and strength,
  - type: text
    content: always ready to help in times of trouble.
  '10':
  - type: text
    content: “Be still, and know that I am God!
  - type: text
    content: I will be honored by every nation.
  - type: text
    content: I will be honored throughout the world.”
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies is here among us;'
  - type: text
    content: 'the God of Israel is our fortress. '
  - type: text
    content: Interlude
  '2':
  - type: text
    content: So we will not fear when earthquakes come
  - type: text
    content: and the mountains crumble into the sea.
  '3':
  - type: text
    content: Let the oceans roar and foam.
  - type: text
    content: 'Let the mountains tremble as the waters surge! '
  - type: text
    content: Interlude
  '4':
  - type: text
    content: A river brings joy to the city of our God,
  - type: text
    content: the sacred home of the Most High.
  '5':
  - type: text
    content: God dwells in that city; it cannot be destroyed.
  - type: text
    content: From the very break of day, God will protect it.
  '6':
  - type: text
    content: The nations are in chaos,
  - type: text
    content: and their kingdoms crumble!
  - type: text
    content: God’s voice thunders,
  - type: text
    content: and the earth melts!
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies is here among us;'
  - type: text
    content: the God of Israel
  - type: note
    content: Hebrew of Jacob; also in 46:11. See note on 44:4.
  - type: text
    content: ' is our fortress. '
  - type: text
    content: Interlude
  '8':
  - type: text
    content: 'Come, see the glorious works of the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: See how he brings destruction upon the world.
  '9':
  - type: text
    content: He causes wars to end throughout the earth.
  - type: text
    content: He breaks the bow and snaps the spear;
  - type: text
    content: he burns the shields with fire.
