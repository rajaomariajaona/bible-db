document_id: PSA.46
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the choir director: A song of the descendants of Korah, to be sung by soprano voices.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46:TITLE '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: according to alamoth.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: God is our refuge and strength,
- type: usfm
  marker: q2
  children:
  - type: text
    text: always ready to help in times of trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: So we will not fear when earthquakes come
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the mountains crumble into the sea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Let the oceans roar and foam.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Let the mountains tremble as the waters surge! '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Interlude
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A river brings joy to the city of our God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the sacred home of the Most High.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: God dwells in that city; it cannot be destroyed.
- type: usfm
  marker: q2
  children:
  - type: text
    text: From the very break of day, God will protect it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The nations are in chaos,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their kingdoms crumble!
- type: usfm
  marker: q1
  children:
  - type: text
    text: God’s voice thunders,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the earth melts!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies is here among us;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the God of Israel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of Jacob; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 46:11. See note on 44:4.
    marker-yv: yv-n
  - type: text
    text: ' is our fortress. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Interlude
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Come, see the glorious works of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ':'
- type: usfm
  marker: q2
  children:
  - type: text
    text: See how he brings destruction upon the world.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He causes wars to end throughout the earth.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He breaks the bow and snaps the spear;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he burns the shields with fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Be still, and know that I am God!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will be honored by every nation.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will be honored throughout the world.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies is here among us;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the God of Israel is our fortress. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Interlude
