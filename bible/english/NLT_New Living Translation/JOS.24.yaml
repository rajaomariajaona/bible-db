document_id: JOS.24,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Covenant Renewed
  - type: text
    content: Then Joshua summoned all the tribes of Israel to Shechem, including their elders, leaders, judges, and officers. So they came and presented themselves to God.
  '10':
  - type: text
    content: but I would not listen to him. Instead, I made Balaam bless you, and so I rescued you from Balak.
  '11':
  - type: text
    content: '“When you crossed the Jordan River and came to Jericho, the men of Jericho fought against you, as did the Amorites, the Perizzites, the Canaanites, the Hittites, the Girgashites, the Hivites, and the Jebusites. But I gave you victory over them. '
  '12':
  - type: text
    content: And I sent terror
  - type: note
    content: Often rendered the hornet. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' ahead of you to drive out the two kings of the Amorites. It was not your swords or bows that brought you victory. '
  '13':
  - type: text
    content: I gave you land you had not worked on, and I gave you towns you did not build—the towns where you are now living. I gave you vineyards and olive groves for food, though you did not plant them.
  '14':
  - type: text
    content: '“So fear the '
  - type: text
    content: Lord
  - type: text
    content: ' and serve him wholeheartedly. Put away forever the idols your ancestors worshiped when they lived beyond the Euphrates River and in Egypt. Serve the '
  - type: text
    content: Lord
  - type: text
    content: ' alone. '
  '15':
  - type: text
    content: 'But if you refuse to serve the '
  - type: text
    content: Lord
  - type: text
    content: ', then choose today whom you will serve. Would you prefer the gods your ancestors served beyond the Euphrates? Or will it be the gods of the Amorites in whose land you now live? But as for me and my family, we will serve the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '16':
  - type: text
    content: 'The people replied, “We would never abandon the '
  - type: text
    content: Lord
  - type: text
    content: ' and serve other gods. '
  '17':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' our God is the one who rescued us and our ancestors from slavery in the land of Egypt. He performed mighty miracles before our very eyes. As we traveled through the wilderness among our enemies, he preserved us. '
  '18':
  - type: text
    content: 'It was the '
  - type: text
    content: Lord
  - type: text
    content: ' who drove out the Amorites and the other nations living here in the land. So we, too, will serve the '
  - type: text
    content: Lord
  - type: text
    content: ', for he alone is our God.”'
  '19':
  - type: text
    content: 'Then Joshua warned the people, “You are not able to serve the '
  - type: text
    content: Lord
  - type: text
    content: ', for he is a holy and jealous God. He will not forgive your rebellion and your sins. '
  '2':
  - type: text
    content: 'Joshua said to the people, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: Long ago your ancestors, including Terah, the father of Abraham and Nahor, lived beyond the Euphrates River,'
  - type: note
    content: Hebrew the river; also in 24:3, 14, 15.
  - type: text
    content: ' and they worshiped other gods. '
  '20':
  - type: text
    content: 'If you abandon the '
  - type: text
    content: Lord
  - type: text
    content: ' and serve other gods, he will turn against you and destroy you, even though he has been so good to you.”'
  '21':
  - type: text
    content: 'But the people answered Joshua, “No, we will serve the '
  - type: text
    content: Lord
  - type: text
    content: '!”'
  '22':
  - type: text
    content: '“You are a witness to your own decision,” Joshua said. “You have chosen to serve the '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: text
    content: “Yes,” they replied, “we are witnesses to what we have said.”
  '23':
  - type: text
    content: '“All right then,” Joshua said, “destroy the idols among you, and turn your hearts to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel.”'
  '24':
  - type: text
    content: 'The people said to Joshua, “We will serve the '
  - type: text
    content: Lord
  - type: text
    content: ' our God. We will obey him alone.”'
  '25':
  - type: text
    content: 'So Joshua made a covenant with the people that day at Shechem, committing them to follow the decrees and regulations of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'Joshua recorded these things in the Book of God’s Instructions. As a reminder of their agreement, he took a huge stone and rolled it beneath the terebinth tree beside the Tabernacle of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '27':
  - type: text
    content: 'Joshua said to all the people, “This stone has heard everything the '
  - type: text
    content: Lord
  - type: text
    content: ' said to us. It will be a witness to testify against you if you go back on your word to God.”'
  '28':
  - type: text
    content: Then Joshua sent all the people away to their own homelands.
  - type: heading
    content: Leaders Buried in the Promised Land
  '29':
  - type: text
    content: 'After this, Joshua son of Nun, the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ', died at the age of 110. '
  '3':
  - type: text
    content: 'But I took your ancestor Abraham from the land beyond the Euphrates and led him into the land of Canaan. I gave him many descendants through his son Isaac. '
  '30':
  - type: text
    content: They buried him in the land he had been allocated, at Timnath-serah in the hill country of Ephraim, north of Mount Gaash.
  '31':
  - type: text
    content: 'The people of Israel served the '
  - type: text
    content: Lord
  - type: text
    content: ' throughout the lifetime of Joshua and of the elders who outlived him—those who had personally experienced all that the '
  - type: text
    content: Lord
  - type: text
    content: ' had done for Israel.'
  '32':
  - type: text
    content: The bones of Joseph, which the Israelites had brought along with them when they left Egypt, were buried at Shechem, in the plot of land Jacob had bought from the sons of Hamor for 100 pieces of silver.
  - type: note
    content: Hebrew 100 kesitahs; the value or weight of the kesitah is no longer known.
  - type: text
    content: ' This land was located in the territory allotted to the descendants of Joseph.'
  '33':
  - type: text
    content: Eleazar son of Aaron also died. He was buried in the hill country of Ephraim, in the town of Gibeah, which had been given to his son Phinehas.
  '4':
  - type: text
    content: To Isaac I gave Jacob and Esau. To Esau I gave the mountains of Seir, while Jacob and his children went down into Egypt.
  '5':
  - type: text
    content: '“Then I sent Moses and Aaron, and I brought terrible plagues on Egypt; and afterward I brought you out as a free people. '
  '6':
  - type: text
    content: But when your ancestors arrived at the Red Sea,
  - type: note
    content: Hebrew sea of reeds.
  - type: text
    content: ' the Egyptians chased after you with chariots and charioteers. '
  '7':
  - type: text
    content: 'When your ancestors cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ', I put darkness between you and the Egyptians. I brought the sea crashing down on the Egyptians, drowning them. With your very own eyes you saw what I did. Then you lived in the wilderness for many years.'
  '8':
  - type: text
    content: '“Finally, I brought you into the land of the Amorites on the east side of the Jordan. They fought against you, but I destroyed them before you. I gave you victory over them, and you took possession of their land. '
  '9':
  - type: text
    content: 'Then Balak son of Zippor, king of Moab, started a war against Israel. He summoned Balaam son of Beor to curse you, '
