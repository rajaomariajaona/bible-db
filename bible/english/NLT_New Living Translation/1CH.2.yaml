document_id: 1CH.2,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Descendants of Israel
    marker-yv: yv-h
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The sons of Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Israel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is the name that God gave to Jacob.
      marker-yv: yv-n
    - type: text
      text: ' were Reuben, Simeon, Levi, Judah, Issachar, Zebulun, '
  '10':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ram was the father of Amminadab.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Amminadab was the father of Nahshon, a leader of Judah.
  '11':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Nahshon was the father of Salmon.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version (see also Ruth 4:20); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Salma.
      marker-yv: yv-n
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Salmon was the father of Boaz.
  '12':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Boaz was the father of Obed.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Obed was the father of Jesse.
  '13':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Jesse’s first son was Eliab, his second was Abinadab, his third was Shimea, '
  '14':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'his fourth was Nethanel, his fifth was Raddai, '
  '15':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: his sixth was Ozem, and his seventh was David.
  '16':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Their sisters were named Zeruiah and Abigail. Zeruiah had three sons named Abishai, Joab, and Asahel. '
  '17':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Abigail married a man named Jether, an Ishmaelite, and they had a son named Amasa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Other Descendants of Hezron
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Hezron’s son Caleb had sons from his wife Azubah and from Jerioth.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Caleb had a daughter named Jerioth from his wife, Azubah. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' Her sons were named Jesher, Shobab, and Ardon. '
  '19':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: After Azubah died, Caleb married Ephrathah,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ephrath, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Ephrathah; compare 2:50 and 4:4.
      marker-yv: yv-n
    - type: text
      text: ' and they had a son named Hur. '
  '2':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Dan, Joseph, Benjamin, Naphtali, Gad, and Asher.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Descendants of Judah
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Hur was the father of Uri. Uri was the father of Bezalel.
  '21':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'When Hezron was sixty years old, he married Gilead’s sister, the daughter of Makir. They had a son named Segub. '
  '22':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Segub was the father of Jair, who ruled twenty-three towns in the land of Gilead. '
  '23':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: (But Geshur and Aram captured the Towns of Jair
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: captured Havvoth-jair.
      marker-yv: yv-n
    - type: text
      text: ' and also took Kenath and its sixty surrounding villages.) All these were descendants of Makir, the father of Gilead.'
  '24':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Soon after Hezron died in the town of Caleb-ephrathah, his wife Abijah gave birth to a son named Ashhur (the father of
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the founder of; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 2:42, 45, 49.
      marker-yv: yv-n
    - type: text
      text: ' Tekoa).'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Descendants of Hezron’s Son Jerahmeel
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'The sons of Jerahmeel, the oldest son of Hezron, were Ram (the firstborn), Bunah, Oren, Ozem, and Ahijah. '
  '26':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Jerahmeel had a second wife named Atarah. She was the mother of Onam.
  '27':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: The sons of Ram, the oldest son of Jerahmeel, were Maaz, Jamin, and Eker.
  '28':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: The sons of Onam were Shammai and Jada.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The sons of Shammai were Nadab and Abishur.
  '29':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: The sons of Abishur and his wife Abihail were Ahban and Molid.
  '3':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Judah had three sons from Bathshua, a Canaanite woman. Their names were Er, Onan, and Shelah. But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' saw that the oldest son, Er, was a wicked man, so he killed him. '
  '30':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'The sons of Nadab were Seled and Appaim. Seled died without children, '
  '31':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: but Appaim had a son named Ishi. The son of Ishi was Sheshan. Sheshan had a descendant named Ahlai.
  '32':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'The sons of Jada, Shammai’s brother, were Jether and Jonathan. Jether died without children, '
  '33':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: but Jonathan had two sons named Peleth and Zaza.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: These were all descendants of Jerahmeel.
  '34':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Sheshan had no sons, though he did have daughters. He also had an Egyptian servant named Jarha. '
  '35':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Sheshan gave one of his daughters to be the wife of Jarha, and they had a son named Attai.
  '36':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Attai was the father of Nathan.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Nathan was the father of Zabad.
  '37':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Zabad was the father of Ephlal.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ephlal was the father of Obed.
  '38':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Obed was the father of Jehu.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jehu was the father of Azariah.
  '39':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Azariah was the father of Helez.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Helez was the father of Eleasah.
  '4':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Later Judah had twin sons from Tamar, his widowed daughter-in-law. Their names were Perez and Zerah. So Judah had five sons in all.
  '40':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Eleasah was the father of Sismai.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Sismai was the father of Shallum.
  '41':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Shallum was the father of Jekamiah.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jekamiah was the father of Elishama.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Descendants of Hezron’s Son Caleb
    marker-yv: yv-h
  '42':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: The descendants of Caleb, the brother of Jerahmeel, included Mesha (the firstborn), who became the father of Ziph. Caleb’s descendants also included the sons of Mareshah, the father of Hebron.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'who founded Hebron. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
  '43':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'The sons of Hebron were Korah, Tappuah, Rekem, and Shema. '
  '44':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Shema was the father of Raham. Raham was the father of Jorkeam. Rekem was the father of Shammai. '
  '45':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: The son of Shammai was Maon. Maon was the father of Beth-zur.
  '46':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Caleb’s concubine Ephah gave birth to Haran, Moza, and Gazez. Haran was the father of Gazez.
  '47':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: The sons of Jahdai were Regem, Jotham, Geshan, Pelet, Ephah, and Shaaph.
  '48':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Another of Caleb’s concubines, Maacah, gave birth to Sheber and Tirhanah. '
  '49':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: She also gave birth to Shaaph (the father of Madmannah) and Sheva (the father of Macbenah and Gibea). Caleb also had a daughter named Acsah.
  '5':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The sons of Perez were Hezron and Hamul.
  '50':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: These were all descendants of Caleb.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Descendants of Caleb’s Son Hur
    marker-yv: yv-h
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Hur, the oldest son of Caleb’s wife Ephrathah, were Shobal (the founder of Kiriath-jearim), '
  '51':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: Salma (the founder of Bethlehem), and Hareph (the founder of Beth-gader).
  '52':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'The descendants of Shobal (the founder of Kiriath-jearim) were Haroeh, half the Manahathites, '
  '53':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: and the families of Kiriath-jearim—the Ithrites, Puthites, Shumathites, and Mishraites, from whom came the people of Zorah and Eshtaol.
  '54':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'The descendants of Salma were the people of Bethlehem, the Netophathites, Atroth-beth-joab, the other half of the Manahathites, the Zorites, '
  '55':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: and the families of scribes living at Jabez—the Tirathites, Shimeathites, and Sucathites. All these were Kenites who descended from Hammath, the father of the family of Recab.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:55 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the founder of Beth-recab.
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The sons of Zerah were Zimri, Ethan, Heman, Calcol, and Darda
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in many Hebrew manuscripts, some Greek manuscripts, and Syriac version (see also 1 Kgs 4:31); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Dara.
      marker-yv: yv-n
    - type: text
      text: —five in all.
  '7':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The son of Carmi (a descendant of Zimri) was Achan,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:7a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Achar; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'compare Josh 7:1. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Achar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “disaster.”
      marker-yv: yv-n
    - type: text
      text: ' who brought disaster on Israel by taking plunder that had been set apart for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:7b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew term used here refers to the complete consecration of things or people to the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
