document_id: 1CH.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Descendants of Israel
  - type: text
    content: The sons of Israel
  - type: note
    content: Israel is the name that God gave to Jacob.
  - type: text
    content: ' were Reuben, Simeon, Levi, Judah, Issachar, Zebulun, '
  '10':
  - type: text
    content: Ram was the father of Amminadab.
  - type: text
    content: Amminadab was the father of Nahshon, a leader of Judah.
  '11':
  - type: text
    content: Nahshon was the father of Salmon.
  - type: note
    content: As in Greek version (see also Ruth 4:20); Hebrew reads Salma.
  - type: text
    content: Salmon was the father of Boaz.
  '12':
  - type: text
    content: Boaz was the father of Obed.
  - type: text
    content: Obed was the father of Jesse.
  '13':
  - type: text
    content: 'Jesse’s first son was Eliab, his second was Abinadab, his third was Shimea, '
  '14':
  - type: text
    content: 'his fourth was Nethanel, his fifth was Raddai, '
  '15':
  - type: text
    content: his sixth was Ozem, and his seventh was David.
  '16':
  - type: text
    content: 'Their sisters were named Zeruiah and Abigail. Zeruiah had three sons named Abishai, Joab, and Asahel. '
  '17':
  - type: text
    content: Abigail married a man named Jether, an Ishmaelite, and they had a son named Amasa.
  - type: heading
    content: Other Descendants of Hezron
  '18':
  - type: text
    content: Hezron’s son Caleb had sons from his wife Azubah and from Jerioth.
  - type: note
    content: Or Caleb had a daughter named Jerioth from his wife, Azubah. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' Her sons were named Jesher, Shobab, and Ardon. '
  '19':
  - type: text
    content: After Azubah died, Caleb married Ephrathah,
  - type: note
    content: Hebrew Ephrath, a variant spelling of Ephrathah; compare 2:50 and 4:4.
  - type: text
    content: ' and they had a son named Hur. '
  '2':
  - type: text
    content: Dan, Joseph, Benjamin, Naphtali, Gad, and Asher.
  - type: heading
    content: Descendants of Judah
  '20':
  - type: text
    content: Hur was the father of Uri. Uri was the father of Bezalel.
  '21':
  - type: text
    content: 'When Hezron was sixty years old, he married Gilead’s sister, the daughter of Makir. They had a son named Segub. '
  '22':
  - type: text
    content: 'Segub was the father of Jair, who ruled twenty-three towns in the land of Gilead. '
  '23':
  - type: text
    content: (But Geshur and Aram captured the Towns of Jair
  - type: note
    content: Or captured Havvoth-jair.
  - type: text
    content: ' and also took Kenath and its sixty surrounding villages.) All these were descendants of Makir, the father of Gilead.'
  '24':
  - type: text
    content: Soon after Hezron died in the town of Caleb-ephrathah, his wife Abijah gave birth to a son named Ashhur (the father of
  - type: note
    content: Or the founder of; also in 2:42, 45, 49.
  - type: text
    content: ' Tekoa).'
  - type: heading
    content: Descendants of Hezron’s Son Jerahmeel
  '25':
  - type: text
    content: 'The sons of Jerahmeel, the oldest son of Hezron, were Ram (the firstborn), Bunah, Oren, Ozem, and Ahijah. '
  '26':
  - type: text
    content: Jerahmeel had a second wife named Atarah. She was the mother of Onam.
  '27':
  - type: text
    content: The sons of Ram, the oldest son of Jerahmeel, were Maaz, Jamin, and Eker.
  '28':
  - type: text
    content: The sons of Onam were Shammai and Jada.
  - type: text
    content: The sons of Shammai were Nadab and Abishur.
  '29':
  - type: text
    content: The sons of Abishur and his wife Abihail were Ahban and Molid.
  '3':
  - type: text
    content: 'Judah had three sons from Bathshua, a Canaanite woman. Their names were Er, Onan, and Shelah. But the '
  - type: text
    content: Lord
  - type: text
    content: ' saw that the oldest son, Er, was a wicked man, so he killed him. '
  '30':
  - type: text
    content: 'The sons of Nadab were Seled and Appaim. Seled died without children, '
  '31':
  - type: text
    content: but Appaim had a son named Ishi. The son of Ishi was Sheshan. Sheshan had a descendant named Ahlai.
  '32':
  - type: text
    content: 'The sons of Jada, Shammai’s brother, were Jether and Jonathan. Jether died without children, '
  '33':
  - type: text
    content: but Jonathan had two sons named Peleth and Zaza.
  - type: text
    content: These were all descendants of Jerahmeel.
  '34':
  - type: text
    content: 'Sheshan had no sons, though he did have daughters. He also had an Egyptian servant named Jarha. '
  '35':
  - type: text
    content: Sheshan gave one of his daughters to be the wife of Jarha, and they had a son named Attai.
  '36':
  - type: text
    content: Attai was the father of Nathan.
  - type: text
    content: Nathan was the father of Zabad.
  '37':
  - type: text
    content: Zabad was the father of Ephlal.
  - type: text
    content: Ephlal was the father of Obed.
  '38':
  - type: text
    content: Obed was the father of Jehu.
  - type: text
    content: Jehu was the father of Azariah.
  '39':
  - type: text
    content: Azariah was the father of Helez.
  - type: text
    content: Helez was the father of Eleasah.
  '4':
  - type: text
    content: Later Judah had twin sons from Tamar, his widowed daughter-in-law. Their names were Perez and Zerah. So Judah had five sons in all.
  '40':
  - type: text
    content: Eleasah was the father of Sismai.
  - type: text
    content: Sismai was the father of Shallum.
  '41':
  - type: text
    content: Shallum was the father of Jekamiah.
  - type: text
    content: Jekamiah was the father of Elishama.
  - type: heading
    content: Descendants of Hezron’s Son Caleb
  '42':
  - type: text
    content: The descendants of Caleb, the brother of Jerahmeel, included Mesha (the firstborn), who became the father of Ziph. Caleb’s descendants also included the sons of Mareshah, the father of Hebron.
  - type: note
    content: Or who founded Hebron. The meaning of the Hebrew is uncertain.
  '43':
  - type: text
    content: 'The sons of Hebron were Korah, Tappuah, Rekem, and Shema. '
  '44':
  - type: text
    content: 'Shema was the father of Raham. Raham was the father of Jorkeam. Rekem was the father of Shammai. '
  '45':
  - type: text
    content: The son of Shammai was Maon. Maon was the father of Beth-zur.
  '46':
  - type: text
    content: Caleb’s concubine Ephah gave birth to Haran, Moza, and Gazez. Haran was the father of Gazez.
  '47':
  - type: text
    content: The sons of Jahdai were Regem, Jotham, Geshan, Pelet, Ephah, and Shaaph.
  '48':
  - type: text
    content: 'Another of Caleb’s concubines, Maacah, gave birth to Sheber and Tirhanah. '
  '49':
  - type: text
    content: She also gave birth to Shaaph (the father of Madmannah) and Sheva (the father of Macbenah and Gibea). Caleb also had a daughter named Acsah.
  '5':
  - type: text
    content: The sons of Perez were Hezron and Hamul.
  '50':
  - type: text
    content: These were all descendants of Caleb.
  - type: heading
    content: Descendants of Caleb’s Son Hur
  - type: text
    content: 'The sons of Hur, the oldest son of Caleb’s wife Ephrathah, were Shobal (the founder of Kiriath-jearim), '
  '51':
  - type: text
    content: Salma (the founder of Bethlehem), and Hareph (the founder of Beth-gader).
  '52':
  - type: text
    content: 'The descendants of Shobal (the founder of Kiriath-jearim) were Haroeh, half the Manahathites, '
  '53':
  - type: text
    content: and the families of Kiriath-jearim—the Ithrites, Puthites, Shumathites, and Mishraites, from whom came the people of Zorah and Eshtaol.
  '54':
  - type: text
    content: 'The descendants of Salma were the people of Bethlehem, the Netophathites, Atroth-beth-joab, the other half of the Manahathites, the Zorites, '
  '55':
  - type: text
    content: and the families of scribes living at Jabez—the Tirathites, Shimeathites, and Sucathites. All these were Kenites who descended from Hammath, the father of the family of Recab.
  - type: note
    content: Or the founder of Beth-recab.
  '6':
  - type: text
    content: The sons of Zerah were Zimri, Ethan, Heman, Calcol, and Darda
  - type: note
    content: As in many Hebrew manuscripts, some Greek manuscripts, and Syriac version (see also 1 Kgs 4:31); Hebrew reads Dara.
  - type: text
    content: —five in all.
  '7':
  - type: text
    content: The son of Carmi (a descendant of Zimri) was Achan,
  - type: note
    content: Hebrew Achar; compare Josh 7:1. Achar means “disaster.”
  - type: text
    content: ' who brought disaster on Israel by taking plunder that had been set apart for the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: The Hebrew term used here refers to the complete consecration of things or people to the Lord, either by destroying them or by giving them as an offering.
  '8':
  - type: text
    content: The son of Ethan was Azariah.
  - type: heading
    content: From Judah’s Grandson Hezron to David
  '9':
  - type: text
    content: The sons of Hezron were Jerahmeel, Ram, and Caleb.
  - type: note
    content: Hebrew Kelubai, a variant spelling of Caleb; compare 2:18.
