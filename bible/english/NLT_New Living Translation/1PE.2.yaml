document_id: 1PE.2,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'So get rid of all evil behavior. Be done with all deceit, hypocrisy, jealousy, and all unkind speech. '
  '10':
  - type: text
    content: “Once you had no identity as a people;
  - type: text
    content: now you are God’s people.
  - type: text
    content: Once you received no mercy;
  - type: text
    content: now you have received God’s mercy.”
  - type: note
    content: Hos 1:6, 9; 2:23.
  '11':
  - type: text
    content: 'Dear friends, I warn you as “temporary residents and foreigners” to keep away from worldly desires that wage war against your very souls. '
  '12':
  - type: text
    content: Be careful to live properly among your unbelieving neighbors. Then even if they accuse you of doing wrong, they will see your honorable behavior, and they will give honor to God when he judges the world.
  - type: note
    content: Or on the day of visitation.
  - type: heading
    content: Respecting People in Authority
  '13':
  - type: text
    content: 'For the Lord’s sake, submit to all human authority—whether the king as head of state, '
  '14':
  - type: text
    content: or the officials he has appointed. For the king has sent them to punish those who do wrong and to honor those who do right.
  '15':
  - type: text
    content: 'It is God’s will that your honorable lives should silence those ignorant people who make foolish accusations against you. '
  '16':
  - type: text
    content: 'For you are free, yet you are God’s slaves, so don’t use your freedom as an excuse to do evil. '
  '17':
  - type: text
    content: Respect everyone, and love the family of believers.
  - type: note
    content: Greek love the brotherhood.
  - type: text
    content: ' Fear God, and respect the king.'
  - type: heading
    content: Slaves
  '18':
  - type: text
    content: You who are slaves must submit to your masters with all respect.
  - type: note
    content: Or because you fear God; Greek reads in all fear.
  - type: text
    content: ' Do what they tell you—not only if they are kind and reasonable, but even if they are cruel. '
  '19':
  - type: text
    content: 'For God is pleased when, conscious of his will, you patiently endure unjust treatment. '
  '2':
  - type: text
    content: 'Like newborn babies, you must crave pure spiritual milk so that you will grow into a full experience of salvation. Cry out for this nourishment, '
  '20':
  - type: text
    content: Of course, you get no credit for being patient if you are beaten for doing wrong. But if you suffer for doing good and endure it patiently, God is pleased with you.
  '21':
  - type: text
    content: For God called you to do good, even if it means suffering, just as Christ suffered
  - type: note
    content: Some manuscripts read died.
  - type: text
    content: ' for you. He is your example, and you must follow in his steps.'
  '22':
  - type: text
    content: He never sinned,
  - type: text
    content: nor ever deceived anyone.
  - type: note
    content: Isa 53:9.
  '23':
  - type: text
    content: He did not retaliate when he was insulted,
  - type: text
    content: nor threaten revenge when he suffered.
  - type: text
    content: He left his case in the hands of God,
  - type: text
    content: who always judges fairly.
  '24':
  - type: text
    content: He personally carried our sins
  - type: text
    content: in his body on the cross
  - type: text
    content: so that we can be dead to sin
  - type: text
    content: and live for what is right.
  - type: text
    content: By his wounds
  - type: text
    content: you are healed.
  '25':
  - type: text
    content: Once you were like sheep
  - type: text
    content: who wandered away.
  - type: text
    content: But now you have turned to your Shepherd,
  - type: text
    content: the Guardian of your souls.
  '3':
  - type: text
    content: now that you have had a taste of the Lord’s kindness.
  - type: heading
    content: Living Stones for God’s House
  '4':
  - type: text
    content: You are coming to Christ, who is the living cornerstone of God’s temple. He was rejected by people, but he was chosen by God for great honor.
  '5':
  - type: text
    content: And you are living stones that God is building into his spiritual temple. What’s more, you are his holy priests.
  - type: note
    content: Greek holy priesthood.
  - type: text
    content: ' Through the mediation of Jesus Christ, you offer spiritual sacrifices that please God. '
  '6':
  - type: text
    content: As the Scriptures say,
  - type: text
    content: “I am placing a cornerstone in Jerusalem,
  - type: note
    content: Greek in Zion.
  - type: text
    content: chosen for great honor,
  - type: text
    content: and anyone who trusts in him
  - type: text
    content: will never be disgraced.”
  - type: note
    content: Isa 28:16 (Greek version).
  '7':
  - type: text
    content: Yes, you who trust him recognize the honor God has given him.
  - type: note
    content: Or Yes, for you who believe, there is honor.
  - type: text
    content: ' But for those who reject him,'
  - type: text
    content: “The stone that the builders rejected
  - type: text
    content: has now become the cornerstone.”
  - type: note
    content: Ps 118:22.
  '8':
  - type: text
    content: And,
  - type: text
    content: “He is the stone that makes people stumble,
  - type: text
    content: the rock that makes them fall.”
  - type: note
    content: Isa 8:14.
  - type: text
    content: They stumble because they do not obey God’s word, and so they meet the fate that was planned for them.
  '9':
  - type: text
    content: But you are not like that, for you are a chosen people. You are royal priests,
  - type: note
    content: Greek a royal priesthood.
  - type: text
    content: ' a holy nation, God’s very own possession. As a result, you can show others the goodness of God, for he called you out of the darkness into his wonderful light.'
