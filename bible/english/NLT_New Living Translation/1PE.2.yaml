document_id: 1PE.2,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So get rid of all evil behavior. Be done with all deceit, hypocrisy, jealousy, and all unkind speech. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Once you had no identity as a people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: now you are God’s people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Once you received no mercy;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: now you have received God’s mercy.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hos 1:6, 9; 2:23.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dear friends, I warn you as “temporary residents and foreigners” to keep away from worldly desires that wage war against your very souls. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Be careful to live properly among your unbelieving neighbors. Then even if they accuse you of doing wrong, they will see your honorable behavior, and they will give honor to God when he judges the world.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on the day of visitation.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Respecting People in Authority
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For the Lord’s sake, submit to all human authority—whether the king as head of state, '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: or the officials he has appointed. For the king has sent them to punish those who do wrong and to honor those who do right.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It is God’s will that your honorable lives should silence those ignorant people who make foolish accusations against you. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For you are free, yet you are God’s slaves, so don’t use your freedom as an excuse to do evil. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Respect everyone, and love the family of believers.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: love the brotherhood.
      marker-yv: yv-n
    - type: text
      text: ' Fear God, and respect the king.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Slaves
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: You who are slaves must submit to your masters with all respect.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'because you fear God; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in all fear.
      marker-yv: yv-n
    - type: text
      text: ' Do what they tell you—not only if they are kind and reasonable, but even if they are cruel. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For God is pleased when, conscious of his will, you patiently endure unjust treatment. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Like newborn babies, you must crave pure spiritual milk so that you will grow into a full experience of salvation. Cry out for this nourishment, '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Of course, you get no credit for being patient if you are beaten for doing wrong. But if you suffer for doing good and endure it patiently, God is pleased with you.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For God called you to do good, even if it means suffering, just as Christ suffered
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: died.
      marker-yv: yv-n
    - type: text
      text: ' for you. He is your example, and you must follow in his steps.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He never sinned,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor ever deceived anyone.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 53:9.
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He did not retaliate when he was insulted,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor threaten revenge when he suffered.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He left his case in the hands of God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who always judges fairly.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He personally carried our sins
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in his body on the cross
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so that we can be dead to sin
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and live for what is right.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By his wounds
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you are healed.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Once you were like sheep
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who wandered away.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But now you have turned to your Shepherd,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Guardian of your souls.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: now that you have had a taste of the Lord’s kindness.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Living Stones for God’s House
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: You are coming to Christ, who is the living cornerstone of God’s temple. He was rejected by people, but he was chosen by God for great honor.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And you are living stones that God is building into his spiritual temple. What’s more, you are his holy priests.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: holy priesthood
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' Through the mediation of Jesus Christ, you offer spiritual sacrifices that please God. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As the Scriptures say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I am placing a cornerstone in Jerusalem,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:6a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in Zion.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: chosen for great honor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and anyone who trusts in him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will never be disgraced.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:6b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 28:16 (Greek version).
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Yes, you who trust him recognize the honor God has given him.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:7a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Yes, for you who believe, there is honor.
      marker-yv: yv-n
    - type: text
      text: ' But for those who reject him,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The stone that the builders rejected
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has now become the cornerstone.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:7b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 118:22.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He is the stone that makes people stumble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the rock that makes them fall.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 8:14.
      marker-yv: yv-n
  - type: usfm
    marker: m
    children:
    - type: text
      text: They stumble because they do not obey God’s word, and so they meet the fate that was planned for them.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But you are not like that, for you are a chosen people. You are royal priests,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a royal priesthood.
      marker-yv: yv-n
    - type: text
      text: ' a holy nation, God’s very own possession. As a result, you can show others the goodness of God, for he called you out of the darkness into his wonderful light.'
