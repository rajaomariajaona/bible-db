document_id: JDG.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jephthah Becomes Israel’s Judge
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now Jephthah of Gilead was a great warrior. He was the son of Gilead, but his mother was a prostitute. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Gilead’s wife also had several sons, and when these half brothers grew up, they chased Jephthah off the land. “You will not get any of our father’s inheritance,” they said, “for you are the son of a prostitute.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: So Jephthah fled from his brothers and lived in the land of Tob. Soon he had a band of worthless rebels following him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'At about this time, the Ammonites began their war against Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When the Ammonites attacked, the elders of Gilead sent for Jephthah in the land of Tob. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The elders said, “Come and be our commander! Help us fight the Ammonites!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But Jephthah said to them, “Aren’t you the ones who hated me and drove me from my father’s house? Why do you come to me now when you’re in trouble?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Because we need you,” the elders replied. “If you lead us in battle against the Ammonites, we will make you ruler over all the people of Gilead.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jephthah said to the elders, “Let me get this straight. If I come with you and if the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gives me victory over the Ammonites, will you really make me ruler over all the people?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is our witness,” the elders replied. “We promise to do whatever you say.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So Jephthah went with the elders of Gilead, and the people made him their ruler and commander of the army. At Mizpah, in the presence of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', Jephthah repeated what he had said to the elders.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then Jephthah sent messengers to the king of Ammon, asking, “Why have you come out to fight against my land?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The king of Ammon answered Jephthah’s messengers, “When the Israelites came out of Egypt, they stole my land from the Arnon River to the Jabbok River and all the way to the Jordan. Now then, give back the land peaceably.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jephthah sent this message back to the Ammonite king:'
- type: usfm
  marker: pmo
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“This is what Jephthah says: Israel did not steal any land from Moab or Ammon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: When the people of Israel arrived at Kadesh on their journey from Egypt after crossing the Red Sea,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sea of reeds.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: they sent messengers to the king of Edom asking for permission to pass through his land. But their request was denied. Then they asked the king of Moab for similar permission, but he wouldn’t let them pass through either. So the people of Israel stayed in Kadesh.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Finally, they went around Edom and Moab through the wilderness. They traveled along Moab’s eastern border and camped on the other side of the Arnon River. But they never once crossed the Arnon River into Moab, for the Arnon was the border of Moab.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“Then Israel sent messengers to King Sihon of the Amorites, who ruled from Heshbon, asking for permission to cross through his land to get to their destination. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But King Sihon didn’t trust Israel to pass through his land. Instead, he mobilized his army at Jahaz and attacked them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, gave his people victory over King Sihon. So Israel took control of all the land of the Amorites, who lived in that region, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: from the Arnon River to the Jabbok River, and from the eastern wilderness to the Jordan.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“So you see, it was the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, who took away the land from the Amorites and gave it to Israel. Why, then, should we give it back to you? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'You keep whatever your god Chemosh gives you, and we will keep whatever the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God gives us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Are you any better than Balak son of Zippor, king of Moab? Did he try to make a case against Israel for disputed land? Did he go to war against them?
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '“Israel has been living here for 300 years, inhabiting Heshbon and its surrounding settlements, all the way to Aroer and its settlements, and in all the towns along the Arnon River. Why have you made no effort to recover it before now? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Therefore, I have not sinned against you. Rather, you have wronged me by attacking me. Let the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', who is judge, decide today which of us is right—Israel or Ammon.”'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: But the king of Ammon paid no attention to Jephthah’s message.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jephthah’s Vow
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'At that time the Spirit of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came upon Jephthah, and he went throughout the land of Gilead and Manasseh, including Mizpah in Gilead, and from there he led an army against the Ammonites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And Jephthah made a vow to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. He said, “If you give me victory over the Ammonites, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'I will give to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' whatever comes out of my house to meet me when I return in triumph. I will sacrifice it as a burnt offering.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'So Jephthah led his army against the Ammonites, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave him victory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: He crushed the Ammonites, devastating about twenty towns from Aroer to an area near Minnith and as far away as Abel-keramim. In this way Israel defeated the Ammonites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'When Jephthah returned home to Mizpah, his daughter came out to meet him, playing on a tambourine and dancing for joy. She was his one and only child; he had no other sons or daughters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'When he saw her, he tore his clothes in anguish. “Oh, my daughter!” he cried out. “You have completely destroyed me! You’ve brought disaster on me! For I have made a vow to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and I cannot take it back.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And she said, “Father, if you have made a vow to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you must do to me what you have vowed, for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has given you a great victory over your enemies, the Ammonites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'But first let me do this one thing: Let me go up and roam in the hills and weep with my friends for two months, because I will die a virgin.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: '“You may go,” Jephthah said. And he sent her away for two months. She and her friends went into the hills and wept because she would never have children. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: When she returned home, her father kept the vow he had made, and she died a virgin.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'So it has become a custom in Israel '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: for young Israelite women to go away for four days each year to lament the fate of Jephthah’s daughter.
