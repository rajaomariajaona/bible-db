document_id: JDG.11,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jephthah Becomes Israel’s Judge
  - type: text
    content: 'Now Jephthah of Gilead was a great warrior. He was the son of Gilead, but his mother was a prostitute. '
  '10':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' is our witness,” the elders replied. “We promise to do whatever you say.”'
  '11':
  - type: text
    content: 'So Jephthah went with the elders of Gilead, and the people made him their ruler and commander of the army. At Mizpah, in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ', Jephthah repeated what he had said to the elders.'
  '12':
  - type: text
    content: Then Jephthah sent messengers to the king of Ammon, asking, “Why have you come out to fight against my land?”
  '13':
  - type: text
    content: The king of Ammon answered Jephthah’s messengers, “When the Israelites came out of Egypt, they stole my land from the Arnon River to the Jabbok River and all the way to the Jordan. Now then, give back the land peaceably.”
  '14':
  - type: text
    content: 'Jephthah sent this message back to the Ammonite king:'
  '15':
  - type: text
    content: '“This is what Jephthah says: Israel did not steal any land from Moab or Ammon. '
  '16':
  - type: text
    content: When the people of Israel arrived at Kadesh on their journey from Egypt after crossing the Red Sea,
  - type: note
    content: Hebrew sea of reeds.
  - type: text
    content: ' '
  '17':
  - type: text
    content: they sent messengers to the king of Edom asking for permission to pass through his land. But their request was denied. Then they asked the king of Moab for similar permission, but he wouldn’t let them pass through either. So the people of Israel stayed in Kadesh.
  '18':
  - type: text
    content: “Finally, they went around Edom and Moab through the wilderness. They traveled along Moab’s eastern border and camped on the other side of the Arnon River. But they never once crossed the Arnon River into Moab, for the Arnon was the border of Moab.
  '19':
  - type: text
    content: '“Then Israel sent messengers to King Sihon of the Amorites, who ruled from Heshbon, asking for permission to cross through his land to get to their destination. '
  '2':
  - type: text
    content: 'Gilead’s wife also had several sons, and when these half brothers grew up, they chased Jephthah off the land. “You will not get any of our father’s inheritance,” they said, “for you are the son of a prostitute.” '
  '20':
  - type: text
    content: 'But King Sihon didn’t trust Israel to pass through his land. Instead, he mobilized his army at Jahaz and attacked them. '
  '21':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, gave his people victory over King Sihon. So Israel took control of all the land of the Amorites, who lived in that region, '
  '22':
  - type: text
    content: from the Arnon River to the Jabbok River, and from the eastern wilderness to the Jordan.
  '23':
  - type: text
    content: '“So you see, it was the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, who took away the land from the Amorites and gave it to Israel. Why, then, should we give it back to you? '
  '24':
  - type: text
    content: 'You keep whatever your god Chemosh gives you, and we will keep whatever the '
  - type: text
    content: Lord
  - type: text
    content: ' our God gives us. '
  '25':
  - type: text
    content: Are you any better than Balak son of Zippor, king of Moab? Did he try to make a case against Israel for disputed land? Did he go to war against them?
  '26':
  - type: text
    content: '“Israel has been living here for 300 years, inhabiting Heshbon and its surrounding settlements, all the way to Aroer and its settlements, and in all the towns along the Arnon River. Why have you made no effort to recover it before now? '
  '27':
  - type: text
    content: 'Therefore, I have not sinned against you. Rather, you have wronged me by attacking me. Let the '
  - type: text
    content: Lord
  - type: text
    content: ', who is judge, decide today which of us is right—Israel or Ammon.”'
  '28':
  - type: text
    content: But the king of Ammon paid no attention to Jephthah’s message.
  - type: heading
    content: Jephthah’s Vow
  '29':
  - type: text
    content: 'At that time the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' came upon Jephthah, and he went throughout the land of Gilead and Manasseh, including Mizpah in Gilead, and from there he led an army against the Ammonites. '
  '3':
  - type: text
    content: So Jephthah fled from his brothers and lived in the land of Tob. Soon he had a band of worthless rebels following him.
  '30':
  - type: text
    content: 'And Jephthah made a vow to the '
  - type: text
    content: Lord
  - type: text
    content: '. He said, “If you give me victory over the Ammonites, '
  '31':
  - type: text
    content: 'I will give to the '
  - type: text
    content: Lord
  - type: text
    content: ' whatever comes out of my house to meet me when I return in triumph. I will sacrifice it as a burnt offering.”'
  '32':
  - type: text
    content: 'So Jephthah led his army against the Ammonites, and the '
  - type: text
    content: Lord
  - type: text
    content: ' gave him victory. '
  '33':
  - type: text
    content: He crushed the Ammonites, devastating about twenty towns from Aroer to an area near Minnith and as far away as Abel-keramim. In this way Israel defeated the Ammonites.
  '34':
  - type: text
    content: 'When Jephthah returned home to Mizpah, his daughter came out to meet him, playing on a tambourine and dancing for joy. She was his one and only child; he had no other sons or daughters. '
  '35':
  - type: text
    content: 'When he saw her, he tore his clothes in anguish. “Oh, my daughter!” he cried out. “You have completely destroyed me! You’ve brought disaster on me! For I have made a vow to the '
  - type: text
    content: Lord
  - type: text
    content: ', and I cannot take it back.”'
  '36':
  - type: text
    content: 'And she said, “Father, if you have made a vow to the '
  - type: text
    content: Lord
  - type: text
    content: ', you must do to me what you have vowed, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has given you a great victory over your enemies, the Ammonites. '
  '37':
  - type: text
    content: 'But first let me do this one thing: Let me go up and roam in the hills and weep with my friends for two months, because I will die a virgin.”'
  '38':
  - type: text
    content: '“You may go,” Jephthah said. And he sent her away for two months. She and her friends went into the hills and wept because she would never have children. '
  '39':
  - type: text
    content: When she returned home, her father kept the vow he had made, and she died a virgin.
  - type: text
    content: 'So it has become a custom in Israel '
  '4':
  - type: text
    content: 'At about this time, the Ammonites began their war against Israel. '
  '40':
  - type: text
    content: for young Israelite women to go away for four days each year to lament the fate of Jephthah’s daughter.
  '5':
  - type: text
    content: 'When the Ammonites attacked, the elders of Gilead sent for Jephthah in the land of Tob. '
  '6':
  - type: text
    content: The elders said, “Come and be our commander! Help us fight the Ammonites!”
  '7':
  - type: text
    content: But Jephthah said to them, “Aren’t you the ones who hated me and drove me from my father’s house? Why do you come to me now when you’re in trouble?”
  '8':
  - type: text
    content: “Because we need you,” the elders replied. “If you lead us in battle against the Ammonites, we will make you ruler over all the people of Gilead.”
  '9':
  - type: text
    content: 'Jephthah said to the elders, “Let me get this straight. If I come with you and if the '
  - type: text
    content: Lord
  - type: text
    content: ' gives me victory over the Ammonites, will you really make me ruler over all the people?”'
