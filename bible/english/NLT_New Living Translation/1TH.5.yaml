document_id: 1TH.5,116
type_code: eng
verses:
  '1':
  - type: text
    content: Now concerning how and when all this will happen, dear brothers and sisters,
  - type: note
    content: Greek brothers; also in 5:4, 12, 14, 25, 26, 27.
  - type: text
    content: ' we don’t really need to write you. '
  '10':
  - type: text
    content: 'Christ died for us so that, whether we are dead or alive when he returns, we can live with him forever. '
  '11':
  - type: text
    content: So encourage each other and build each other up, just as you are already doing.
  - type: heading
    content: Paul’s Final Advice
  '12':
  - type: text
    content: 'Dear brothers and sisters, honor those who are your leaders in the Lord’s work. They work hard among you and give you spiritual guidance. '
  '13':
  - type: text
    content: Show them great respect and wholehearted love because of their work. And live peacefully with each other.
  '14':
  - type: text
    content: Brothers and sisters, we urge you to warn those who are lazy. Encourage those who are timid. Take tender care of those who are weak. Be patient with everyone.
  '15':
  - type: text
    content: See that no one pays back evil for evil, but always try to do good to each other and to all people.
  '16':
  - type: text
    content: 'Always be joyful. '
  '17':
  - type: text
    content: 'Never stop praying. '
  '18':
  - type: text
    content: Be thankful in all circumstances, for this is God’s will for you who belong to Christ Jesus.
  '19':
  - type: text
    content: 'Do not stifle the Holy Spirit. '
  '2':
  - type: text
    content: 'For you know quite well that the day of the Lord’s return will come unexpectedly, like a thief in the night. '
  '20':
  - type: text
    content: 'Do not scoff at prophecies, '
  '21':
  - type: text
    content: 'but test everything that is said. Hold on to what is good. '
  '22':
  - type: text
    content: Stay away from every kind of evil.
  - type: heading
    content: Paul’s Final Greetings
  '23':
  - type: text
    content: 'Now may the God of peace make you holy in every way, and may your whole spirit and soul and body be kept blameless until our Lord Jesus Christ comes again. '
  '24':
  - type: text
    content: God will make this happen, for he who calls you is faithful.
  '25':
  - type: text
    content: Dear brothers and sisters, pray for us.
  '26':
  - type: text
    content: Greet all the brothers and sisters with a sacred kiss.
  '27':
  - type: text
    content: I command you in the name of the Lord to read this letter to all the brothers and sisters.
  '28':
  - type: text
    content: May the grace of our Lord Jesus Christ be with you.
  '3':
  - type: text
    content: When people are saying, “Everything is peaceful and secure,” then disaster will fall on them as suddenly as a pregnant woman’s labor pains begin. And there will be no escape.
  '4':
  - type: text
    content: But you aren’t in the dark about these things, dear brothers and sisters, and you won’t be surprised when the day of the Lord comes like a thief.
  - type: note
    content: Some manuscripts read comes upon you as if you were thieves.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'For you are all children of the light and of the day; we don’t belong to darkness and night. '
  '6':
  - type: text
    content: 'So be on your guard, not asleep like the others. Stay alert and be clearheaded. '
  '7':
  - type: text
    content: 'Night is the time when people sleep and drinkers get drunk. '
  '8':
  - type: text
    content: But let us who live in the light be clearheaded, protected by the armor of faith and love, and wearing as our helmet the confidence of our salvation.
  '9':
  - type: text
    content: 'For God chose to save us through our Lord Jesus Christ, not to pour out his anger on us. '
