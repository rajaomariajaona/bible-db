document_id: DEU.32,116
type_code: eng
verses:
  '1':
  - type: text
    content: “Listen, O heavens, and I will speak!
  - type: text
    content: Hear, O earth, the words that I say!
  '10':
  - type: text
    content: He found them in a desert land,
  - type: text
    content: in an empty, howling wasteland.
  - type: text
    content: He surrounded them and watched over them;
  - type: text
    content: he guarded them as he would guard his own eyes.
  - type: note
    content: Hebrew as the pupil of his eye.
  '11':
  - type: text
    content: Like an eagle that rouses her chicks
  - type: text
    content: and hovers over her young,
  - type: text
    content: so he spread his wings to take them up
  - type: text
    content: and carried them safely on his pinions.
  '12':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' alone guided them;'
  - type: text
    content: they followed no foreign gods.
  '13':
  - type: text
    content: He let them ride over the highlands
  - type: text
    content: and feast on the crops of the fields.
  - type: text
    content: He nourished them with honey from the rock
  - type: text
    content: and olive oil from the stony ground.
  '14':
  - type: text
    content: He fed them yogurt from the herd
  - type: text
    content: and milk from the flock,
  - type: text
    content: together with the fat of lambs.
  - type: text
    content: He gave them choice rams from Bashan, and goats,
  - type: text
    content: together with the choicest wheat.
  - type: text
    content: You drank the finest wine,
  - type: text
    content: made from the juice of grapes.
  '15':
  - type: text
    content: “But Israel
  - type: note
    content: Hebrew Jeshurun, a term of endearment for Israel.
  - type: text
    content: ' soon became fat and unruly;'
  - type: text
    content: the people grew heavy, plump, and stuffed!
  - type: text
    content: Then they abandoned the God who had made them;
  - type: text
    content: they made light of the Rock of their salvation.
  '16':
  - type: text
    content: They stirred up his jealousy by worshiping foreign gods;
  - type: text
    content: they provoked his fury with detestable deeds.
  '17':
  - type: text
    content: They offered sacrifices to demons, which are not God,
  - type: text
    content: to gods they had not known before,
  - type: text
    content: to new gods only recently arrived,
  - type: text
    content: to gods their ancestors had never feared.
  '18':
  - type: text
    content: You neglected the Rock who had fathered you;
  - type: text
    content: you forgot the God who had given you birth.
  '19':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' saw this and drew back,'
  - type: text
    content: provoked to anger by his own sons and daughters.
  '2':
  - type: text
    content: Let my teaching fall on you like rain;
  - type: text
    content: let my speech settle like dew.
  - type: text
    content: Let my words fall like rain on tender grass,
  - type: text
    content: like gentle showers on young plants.
  '20':
  - type: text
    content: He said, ‘I will abandon them;
  - type: text
    content: then see what becomes of them.
  - type: text
    content: For they are a twisted generation,
  - type: text
    content: children without integrity.
  '21':
  - type: text
    content: They have roused my jealousy by worshiping things that are not God;
  - type: text
    content: they have provoked my anger with their useless idols.
  - type: text
    content: Now I will rouse their jealousy through people who are not even a people;
  - type: text
    content: I will provoke their anger through the foolish Gentiles.
  '22':
  - type: text
    content: For my anger blazes forth like fire
  - type: text
    content: and burns to the depths of the grave.
  - type: note
    content: Hebrew of Sheol.
  - type: text
    content: It devours the earth and all its crops
  - type: text
    content: and ignites the foundations of the mountains.
  '23':
  - type: text
    content: I will heap disasters upon them
  - type: text
    content: and shoot them down with my arrows.
  '24':
  - type: text
    content: I will weaken them with famine,
  - type: text
    content: burning fever, and deadly disease.
  - type: text
    content: I will send the fangs of wild beasts
  - type: text
    content: and poisonous snakes that glide in the dust.
  '25':
  - type: text
    content: Outside, the sword will bring death,
  - type: text
    content: and inside, terror will strike
  - type: text
    content: both young men and young women,
  - type: text
    content: both infants and the aged.
  '26':
  - type: text
    content: I would have annihilated them,
  - type: text
    content: wiping out even the memory of them.
  '27':
  - type: text
    content: But I feared the taunt of Israel’s enemy,
  - type: text
    content: who might misunderstand and say,
  - type: text
    content: “Our own power has triumphed!
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' had nothing to do with this!”’'
  '28':
  - type: text
    content: “But Israel is a senseless nation;
  - type: text
    content: the people are foolish, without understanding.
  '29':
  - type: text
    content: Oh, that they were wise and could understand this!
  - type: text
    content: Oh, that they might know their fate!
  '3':
  - type: text
    content: 'I will proclaim the name of the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: how glorious is our God!
  '30':
  - type: text
    content: How could one person chase a thousand of them,
  - type: text
    content: and two people put ten thousand to flight,
  - type: text
    content: unless their Rock had sold them,
  - type: text
    content: 'unless the '
  - type: text
    content: Lord
  - type: text
    content: ' had given them up?'
  '31':
  - type: text
    content: But the rock of our enemies is not like our Rock,
  - type: text
    content: as even they recognize.
  - type: note
    content: The meaning of the Hebrew is uncertain. Greek version reads our enemies are fools.
  '32':
  - type: text
    content: Their vine grows from the vine of Sodom,
  - type: text
    content: from the vineyards of Gomorrah.
  - type: text
    content: Their grapes are poison,
  - type: text
    content: and their clusters are bitter.
  '33':
  - type: text
    content: Their wine is the venom of serpents,
  - type: text
    content: the deadly poison of cobras.
  '34':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' says, ‘Am I not storing up these things,'
  - type: text
    content: sealing them away in my treasury?
  '35':
  - type: text
    content: I will take revenge; I will pay them back.
  - type: text
    content: In due time their feet will slip.
  - type: text
    content: Their day of disaster will arrive,
  - type: text
    content: and their destiny will overtake them.’
  '36':
  - type: text
    content: '“Indeed, the '
  - type: text
    content: Lord
  - type: text
    content: ' will give justice to his people,'
  - type: text
    content: and he will change his mind about
  - type: note
    content: Or will take revenge for.
  - type: text
    content: ' his servants,'
  - type: text
    content: when he sees their strength is gone
  - type: text
    content: and no one is left, slave or free.
  '37':
  - type: text
    content: Then he will ask, ‘Where are their gods,
  - type: text
    content: the rocks they fled to for refuge?
  '38':
  - type: text
    content: Where now are those gods,
  - type: text
    content: who ate the fat of their sacrifices
  - type: text
    content: and drank the wine of their offerings?
  - type: text
    content: Let those gods arise and help you!
  - type: text
    content: Let them provide you with shelter!
  '39':
  - type: text
    content: Look now; I myself am he!
  - type: text
    content: There is no other god but me!
  - type: text
    content: I am the one who kills and gives life;
  - type: text
    content: I am the one who wounds and heals;
  - type: text
    content: no one can be rescued from my powerful hand!
  '4':
  - type: text
    content: He is the Rock; his deeds are perfect.
  - type: text
    content: Everything he does is just and fair.
  - type: text
    content: He is a faithful God who does no wrong;
  - type: text
    content: how just and upright he is!
  '40':
  - type: text
    content: Now I raise my hand to heaven
  - type: text
    content: and declare, “As surely as I live,
  '41':
  - type: text
    content: when I sharpen my flashing sword
  - type: text
    content: and begin to carry out justice,
  - type: text
    content: I will take revenge on my enemies
  - type: text
    content: and repay those who reject me.
  '42':
  - type: text
    content: I will make my arrows drunk with blood,
  - type: text
    content: and my sword will devour flesh—
  - type: text
    content: the blood of the slaughtered and the captives,
  - type: text
    content: and the heads of the enemy leaders.”’
  '43':
  - type: text
    content: “Rejoice with him, you heavens,
  - type: text
    content: and let all of God’s angels worship him.
  - type: note
    content: As in Dead Sea Scrolls and Greek version; Masoretic Text lacks the first two lines. Compare Heb 1:6.
  - type: text
    content: Rejoice with his people, you Gentiles,
  - type: text
    content: and let all the angels be strengthened in him.
  - type: note
    content: As in Greek version; Hebrew text lacks this sentence. Compare Rom 15:10.
  - type: text
    content: For he will avenge the blood of his children
  - type: note
    content: As in Dead Sea Scrolls and Greek version; Masoretic Text reads his servants.
  - type: text
    content: ;
  - type: text
    content: he will take revenge against his enemies.
  - type: text
    content: He will repay those who hate him
  - type: note
    content: As in Dead Sea Scrolls and Greek version; Masoretic Text lacks this line.
  - type: text
    content: and cleanse his people’s land.”
  '44':
  - type: text
    content: So Moses came with Joshua
  - type: note
    content: Hebrew Hoshea, a variant name for Joshua.
  - type: text
    content: ' son of Nun and recited all the words of this song to the people.'
  '45':
  - type: text
    content: 'When Moses had finished reciting all these words to the people of Israel, '
  '46':
  - type: text
    content: 'he added: “Take to heart all the words of warning I have given you today. Pass them on as a command to your children so they will obey every word of these instructions. '
  '47':
  - type: text
    content: These instructions are not empty words—they are your life! By obeying them you will enjoy a long life in the land you will occupy when you cross the Jordan River.”
  - type: heading
    content: Moses’ Death Foretold
  '48':
  - type: text
    content: 'That same day the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '49':
  - type: text
    content: “Go to Moab, to the mountains east of the river,
  - type: note
    content: Hebrew the mountains of Abarim.
  - type: text
    content: ' and climb Mount Nebo, which is across from Jericho. Look out across the land of Canaan, the land I am giving to the people of Israel as their own special possession. '
  '5':
  - type: text
    content: “But they have acted corruptly toward him;
  - type: text
    content: when they act so perversely,
  - type: text
    content: are they really his children?
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: They are a deceitful and twisted generation.
  '50':
  - type: text
    content: 'Then you will die there on the mountain. You will join your ancestors, just as Aaron, your brother, died on Mount Hor and joined his ancestors. '
  '51':
  - type: text
    content: For both of you betrayed me with the Israelites at the waters of Meribah at Kadesh
  - type: note
    content: Hebrew waters of Meribath-kadesh.
  - type: text
    content: ' in the wilderness of Zin. You failed to demonstrate my holiness to the people of Israel there. '
  '52':
  - type: text
    content: So you will see the land from a distance, but you may not enter the land I am giving to the people of Israel.”
  '6':
  - type: text
    content: 'Is this the way you repay the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: you foolish and senseless people?
  - type: text
    content: Isn’t he your Father who created you?
  - type: text
    content: Has he not made you and established you?
  '7':
  - type: text
    content: Remember the days of long ago;
  - type: text
    content: think about the generations past.
  - type: text
    content: Ask your father, and he will inform you.
  - type: text
    content: Inquire of your elders, and they will tell you.
  '8':
  - type: text
    content: When the Most High assigned lands to the nations,
  - type: text
    content: when he divided up the human race,
  - type: text
    content: he established the boundaries of the peoples
  - type: text
    content: according to the number in his heavenly court.
  - type: note
    content: As in Dead Sea Scrolls, which read the number of the sons of God, and Greek version, which reads the number of the angels of God; Masoretic Text reads the number of the sons of Israel.
  '9':
  - type: text
    content: '“For the people of Israel belong to the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: Jacob is his special possession.
