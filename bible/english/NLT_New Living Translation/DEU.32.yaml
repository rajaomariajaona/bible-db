document_id: DEU.32,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Listen, O heavens, and I will speak!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Hear, O earth, the words that I say!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He found them in a desert land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in an empty, howling wasteland.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He surrounded them and watched over them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he guarded them as he would guard his own eyes.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: as the pupil of his eye.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like an eagle that rouses her chicks
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and hovers over her young,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so he spread his wings to take them up
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and carried them safely on his pinions.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' alone guided them;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they followed no foreign gods.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He let them ride over the highlands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and feast on the crops of the fields.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He nourished them with honey from the rock
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and olive oil from the stony ground.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He fed them yogurt from the herd
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and milk from the flock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: together with the fat of lambs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gave them choice rams from Bashan, and goats,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: together with the choicest wheat.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You drank the finest wine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: made from the juice of grapes.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jeshurun, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a term of endearment for Israel.
      marker-yv: yv-n
    - type: text
      text: ' soon became fat and unruly;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the people grew heavy, plump, and stuffed!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then they abandoned the God who had made them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they made light of the Rock of their salvation.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They stirred up his jealousy by worshiping foreign gods;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they provoked his fury with detestable deeds.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They offered sacrifices to demons, which are not God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to gods they had not known before,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to new gods only recently arrived,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to gods their ancestors had never feared.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You neglected the Rock who had fathered you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you forgot the God who had given you birth.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' saw this and drew back,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: provoked to anger by his own sons and daughters.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let my teaching fall on you like rain;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let my speech settle like dew.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let my words fall like rain on tender grass,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like gentle showers on young plants.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He said, ‘I will abandon them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then see what becomes of them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they are a twisted generation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: children without integrity.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have roused my jealousy by worshiping things that are not God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they have provoked my anger with their useless idols.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now I will rouse their jealousy through people who are not even a people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will provoke their anger through the foolish Gentiles.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For my anger blazes forth like fire
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and burns to the depths of the grave.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of Sheol.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It devours the earth and all its crops
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and ignites the foundations of the mountains.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will heap disasters upon them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and shoot them down with my arrows.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will weaken them with famine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: burning fever, and deadly disease.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will send the fangs of wild beasts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and poisonous snakes that glide in the dust.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Outside, the sword will bring death,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and inside, terror will strike
  - type: usfm
    marker: q1
    children:
    - type: text
      text: both young men and young women,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: both infants and the aged.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I would have annihilated them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wiping out even the memory of them.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I feared the taunt of Israel’s enemy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who might misunderstand and say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Our own power has triumphed!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had nothing to do with this!”’'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But Israel is a senseless nation;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the people are foolish, without understanding.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, that they were wise and could understand this!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Oh, that they might know their fate!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will proclaim the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how glorious is our God!
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How could one person chase a thousand of them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and two people put ten thousand to flight,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: unless their Rock had sold them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'unless the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had given them up?'
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the rock of our enemies is not like our Rock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as even they recognize.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The meaning of the Hebrew is uncertain. Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: our enemies are fools.
      marker-yv: yv-n
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their vine grows from the vine of Sodom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the vineyards of Gomorrah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their grapes are poison,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their clusters are bitter.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their wine is the venom of serpents,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the deadly poison of cobras.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says, ‘Am I not storing up these things,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sealing them away in my treasury?
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will take revenge; I will pay them back.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In due time their feet will slip.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their day of disaster will arrive,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their destiny will overtake them.’
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Indeed, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will give justice to his people,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he will change his mind about
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: will take revenge for.
      marker-yv: yv-n
    - type: text
      text: ' his servants,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when he sees their strength is gone
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one is left, slave or free.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then he will ask, ‘Where are their gods,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the rocks they fled to for refuge?
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where now are those gods,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who ate the fat of their sacrifices
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and drank the wine of their offerings?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let those gods arise and help you!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them provide you with shelter!
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look now; I myself am he!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There is no other god but me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am the one who kills and gives life;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am the one who wounds and heals;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one can be rescued from my powerful hand!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is the Rock; his deeds are perfect.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Everything he does is just and fair.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is a faithful God who does no wrong;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how just and upright he is!
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now I raise my hand to heaven
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and declare, “As surely as I live,
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when I sharpen my flashing sword
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and begin to carry out justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will take revenge on my enemies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and repay those who reject me.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will make my arrows drunk with blood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my sword will devour flesh—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the blood of the slaughtered and the captives,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the heads of the enemy leaders.”’
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Rejoice with him, you heavens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and let all of God’s angels worship him.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:43a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As in Dead Sea Scrolls and Greek version; Masoretic Text lacks the first two lines. Compare Heb 1:6.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rejoice with his people, you Gentiles,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and let all the angels be strengthened in him.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:43b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As in Greek version; Hebrew text lacks this sentence. Compare Rom 15:10.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he will avenge the blood of his children
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:43c '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Dead Sea Scrolls and Greek version; Masoretic Text reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: his servants.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will take revenge against his enemies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will repay those who hate him
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:43d '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As in Dead Sea Scrolls and Greek version; Masoretic Text lacks this line.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cleanse his people’s land.”
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Moses came with Joshua
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Hoshea, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant name for Joshua.
      marker-yv: yv-n
    - type: text
      text: ' son of Nun and recited all the words of this song to the people.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Moses had finished reciting all these words to the people of Israel, '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'he added: “Take to heart all the words of warning I have given you today. Pass them on as a command to your children so they will obey every word of these instructions. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These instructions are not empty words—they are your life! By obeying them you will enjoy a long life in the land you will occupy when you cross the Jordan River.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moses’ Death Foretold
    marker-yv: yv-h
  '48':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'That same day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '49':
  - type: usfm
    marker: m
    children:
    - type: text
      text: “Go to Moab, to the mountains east of the river,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:49 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the mountains of Abarim.
      marker-yv: yv-n
    - type: text
      text: ' and climb Mount Nebo, which is across from Jericho. Look out across the land of Canaan, the land I am giving to the people of Israel as their own special possession. '
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But they have acted corruptly toward him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when they act so perversely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: are they really his children?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are a deceitful and twisted generation.
  '50':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then you will die there on the mountain. You will join your ancestors, just as Aaron, your brother, died on Mount Hor and joined his ancestors. '
  '51':
  - type: usfm
    marker: m
    children:
    - type: text
      text: For both of you betrayed me with the Israelites at the waters of Meribah at Kadesh
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:51 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: waters of Meribath-kadesh.
      marker-yv: yv-n
    - type: text
      text: ' in the wilderness of Zin. You failed to demonstrate my holiness to the people of Israel there. '
  '52':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So you will see the land from a distance, but you may not enter the land I am giving to the people of Israel.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Is this the way you repay the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you foolish and senseless people?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isn’t he your Father who created you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Has he not made you and established you?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remember the days of long ago;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: think about the generations past.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ask your father, and he will inform you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Inquire of your elders, and they will tell you.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the Most High assigned lands to the nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when he divided up the human race,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he established the boundaries of the peoples
  - type: usfm
    marker: q2
    children:
    - type: text
      text: according to the number in his heavenly court.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Dead Sea Scrolls, which read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the number of the sons of God, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'and Greek version, which reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the number of the angels of God; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Masoretic Text reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the number of the sons of Israel.
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“For the people of Israel belong to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Jacob is his special possession.
