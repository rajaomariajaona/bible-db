document_id: PSA.77,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For Jeduthun, the choir director: A psalm of Asaph.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: I cry out to God; yes, I shout.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Oh, that God would listen to me!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: And I said, “This is my fate;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Most High has turned his hand against me.”
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But then I recall all you have done, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I remember your wonderful deeds of long ago.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: They are constantly in my thoughts.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I cannot stop thinking about your mighty works.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: O God, your ways are holy.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Is there any god as mighty as you?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: You are the God of great wonders!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You demonstrate your awesome power among the nations.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: By your strong arm, you redeemed your people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the descendants of Jacob and Joseph. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: When the Red Sea
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '77:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the waters.
      marker-yv: yv-n
    - type: text
      text: ' saw you, O God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: its waters looked and trembled!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The sea quaked to its very depths.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: The clouds poured down rain;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the thunder rumbled in the sky.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your arrows of lightning flashed.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Your thunder roared from the whirlwind;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the lightning lit up the world!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The earth trembled and shook.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Your road led through the sea,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your pathway through the mighty waters—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a pathway no one knew was there!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: When I was in deep trouble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I searched for the Lord.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All night long I prayed, with hands lifted toward heaven,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but my soul was not comforted.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: You led your people along that road like a flock of sheep,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with Moses and Aaron as their shepherds.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: I think of God, and I moan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'overwhelmed with longing for his help. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: You don’t let me sleep.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am too distressed even to pray!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: I think of the good old days,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: long since ended,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: when my nights were filled with joyful songs.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I search my soul and ponder the difference now.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Has the Lord rejected me forever?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will he never again be kind to me?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Is his unfailing love gone forever?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Have his promises permanently failed?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Has God forgotten to be gracious?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Has he slammed the door on his compassion? '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
