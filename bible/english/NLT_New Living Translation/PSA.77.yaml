type_code: eng
verses:
  '1':
  - type: text
    content: 'For Jeduthun, the choir director: A psalm of Asaph.'
  - type: text
    content: I cry out to God; yes, I shout.
  - type: text
    content: Oh, that God would listen to me!
  '10':
  - type: text
    content: And I said, “This is my fate;
  - type: text
    content: the Most High has turned his hand against me.”
  '11':
  - type: text
    content: 'But then I recall all you have done, O '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: I remember your wonderful deeds of long ago.
  '12':
  - type: text
    content: They are constantly in my thoughts.
  - type: text
    content: I cannot stop thinking about your mighty works.
  '13':
  - type: text
    content: O God, your ways are holy.
  - type: text
    content: Is there any god as mighty as you?
  '14':
  - type: text
    content: You are the God of great wonders!
  - type: text
    content: You demonstrate your awesome power among the nations.
  '15':
  - type: text
    content: By your strong arm, you redeemed your people,
  - type: text
    content: 'the descendants of Jacob and Joseph. '
  - type: text
    content: Interlude
  '16':
  - type: text
    content: When the Red Sea
  - type: note
    content: Hebrew the waters.
  - type: text
    content: ' saw you, O God,'
  - type: text
    content: its waters looked and trembled!
  - type: text
    content: The sea quaked to its very depths.
  '17':
  - type: text
    content: The clouds poured down rain;
  - type: text
    content: the thunder rumbled in the sky.
  - type: text
    content: Your arrows of lightning flashed.
  '18':
  - type: text
    content: Your thunder roared from the whirlwind;
  - type: text
    content: the lightning lit up the world!
  - type: text
    content: The earth trembled and shook.
  '19':
  - type: text
    content: Your road led through the sea,
  - type: text
    content: your pathway through the mighty waters—
  - type: text
    content: a pathway no one knew was there!
  '2':
  - type: text
    content: When I was in deep trouble,
  - type: text
    content: I searched for the Lord.
  - type: text
    content: All night long I prayed, with hands lifted toward heaven,
  - type: text
    content: but my soul was not comforted.
  '20':
  - type: text
    content: You led your people along that road like a flock of sheep,
  - type: text
    content: with Moses and Aaron as their shepherds.
  '3':
  - type: text
    content: I think of God, and I moan,
  - type: text
    content: 'overwhelmed with longing for his help. '
  - type: text
    content: Interlude
  '4':
  - type: text
    content: You don’t let me sleep.
  - type: text
    content: I am too distressed even to pray!
  '5':
  - type: text
    content: I think of the good old days,
  - type: text
    content: long since ended,
  '6':
  - type: text
    content: when my nights were filled with joyful songs.
  - type: text
    content: I search my soul and ponder the difference now.
  '7':
  - type: text
    content: Has the Lord rejected me forever?
  - type: text
    content: Will he never again be kind to me?
  '8':
  - type: text
    content: Is his unfailing love gone forever?
  - type: text
    content: Have his promises permanently failed?
  '9':
  - type: text
    content: Has God forgotten to be gracious?
  - type: text
    content: 'Has he slammed the door on his compassion? '
  - type: text
    content: Interlude
