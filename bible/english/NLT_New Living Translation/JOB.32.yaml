document_id: JOB.32,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Elihu Responds to Job’s Friends
  - type: text
    content: Job’s three friends refused to reply further to him because he kept insisting on his innocence.
  '10':
  - type: text
    content: So listen to me,
  - type: text
    content: and let me tell you what I think.
  '11':
  - type: text
    content: “I have waited all this time,
  - type: text
    content: listening very carefully to your arguments,
  - type: text
    content: listening to you grope for words.
  '12':
  - type: text
    content: I have listened,
  - type: text
    content: but not one of you has refuted Job
  - type: text
    content: or answered his arguments.
  '13':
  - type: text
    content: And don’t tell me, ‘He is too wise for us.
  - type: text
    content: Only God can convince him.’
  '14':
  - type: text
    content: If Job had been arguing with me,
  - type: text
    content: I would not answer with your kind of logic!
  '15':
  - type: text
    content: You sit there baffled,
  - type: text
    content: with nothing more to say.
  '16':
  - type: text
    content: Should I continue to wait, now that you are silent?
  - type: text
    content: Must I also remain silent?
  '17':
  - type: text
    content: No, I will say my piece.
  - type: text
    content: I will speak my mind.
  '18':
  - type: text
    content: For I am full of pent-up words,
  - type: text
    content: and the spirit within me urges me on.
  '19':
  - type: text
    content: I am like a cask of wine without a vent,
  - type: text
    content: like a new wineskin ready to burst!
  '2':
  - type: text
    content: 'Then Elihu son of Barakel the Buzite, of the clan of Ram, became angry. He was angry because Job refused to admit that he had sinned and that God was right in punishing him. '
  '20':
  - type: text
    content: I must speak to find relief,
  - type: text
    content: so let me give my answers.
  '21':
  - type: text
    content: I won’t play favorites
  - type: text
    content: or try to flatter anyone.
  '22':
  - type: text
    content: For if I tried flattery,
  - type: text
    content: my Creator would soon destroy me.
  '3':
  - type: text
    content: He was also angry with Job’s three friends, for they made God
  - type: note
    content: As in ancient Hebrew scribal tradition; the Masoretic Text reads Job.
  - type: text
    content: ' appear to be wrong by their inability to answer Job’s arguments. '
  '4':
  - type: text
    content: 'Elihu had waited for the others to speak to Job because they were older than he. '
  '5':
  - type: text
    content: 'But when he saw that they had no further reply, he spoke out angrily. '
  '6':
  - type: text
    content: Elihu son of Barakel the Buzite said,
  - type: text
    content: “I am young and you are old,
  - type: text
    content: so I held back from telling you what I think.
  '7':
  - type: text
    content: I thought, ‘Those who are older should speak,
  - type: text
    content: for wisdom comes with age.’
  '8':
  - type: text
    content: But there is a spirit
  - type: note
    content: Or Spirit; also in 32:18.
  - type: text
    content: ' within people,'
  - type: text
    content: the breath of the Almighty within them,
  - type: text
    content: that makes them intelligent.
  '9':
  - type: text
    content: Sometimes the elders are not wise.
  - type: text
    content: Sometimes the aged do not understand justice.
