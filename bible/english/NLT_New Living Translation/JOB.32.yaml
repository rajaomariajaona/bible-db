document_id: JOB.32
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elihu Responds to Job’s Friends
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Job’s three friends refused to reply further to him because he kept insisting on his innocence.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then Elihu son of Barakel the Buzite, of the clan of Ram, became angry. He was angry because Job refused to admit that he had sinned and that God was right in punishing him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He was also angry with Job’s three friends, for they made God
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in ancient Hebrew scribal tradition; the Masoretic Text reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Job.
    marker-yv: yv-n
  - type: text
    text: ' appear to be wrong by their inability to answer Job’s arguments. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Elihu had waited for the others to speak to Job because they were older than he. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But when he saw that they had no further reply, he spoke out angrily. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Elihu son of Barakel the Buzite said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I am young and you are old,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so I held back from telling you what I think.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I thought, ‘Those who are older should speak,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for wisdom comes with age.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But there is a spirit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Spirit; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 32:18.
    marker-yv: yv-n
  - type: text
    text: ' within people,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the breath of the Almighty within them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that makes them intelligent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Sometimes the elders are not wise.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Sometimes the aged do not understand justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So listen to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and let me tell you what I think.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “I have waited all this time,
- type: usfm
  marker: q2
  children:
  - type: text
    text: listening very carefully to your arguments,
- type: usfm
  marker: q2
  children:
  - type: text
    text: listening to you grope for words.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I have listened,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but not one of you has refuted Job
- type: usfm
  marker: q2
  children:
  - type: text
    text: or answered his arguments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And don’t tell me, ‘He is too wise for us.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Only God can convince him.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: If Job had been arguing with me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I would not answer with your kind of logic!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: You sit there baffled,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with nothing more to say.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Should I continue to wait, now that you are silent?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Must I also remain silent?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: No, I will say my piece.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will speak my mind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: For I am full of pent-up words,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the spirit within me urges me on.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: I am like a cask of wine without a vent,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a new wineskin ready to burst!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I must speak to find relief,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so let me give my answers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: I won’t play favorites
- type: usfm
  marker: q2
  children:
  - type: text
    text: or try to flatter anyone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: For if I tried flattery,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my Creator would soon destroy me.
