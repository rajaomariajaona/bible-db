document_id: EZK.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Funeral Song for Israel’s Kings
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“Sing this funeral song for the princes of Israel:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “What is your mother?
- type: usfm
  marker: q2
  children:
  - type: text
    text: A lioness among lions!
- type: usfm
  marker: q1
  children:
  - type: text
    text: She lay down among the young lions
- type: usfm
  marker: q2
  children:
  - type: text
    text: and reared her cubs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: She raised one of her cubs
- type: usfm
  marker: q2
  children:
  - type: text
    text: to become a strong young lion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He learned to hunt and devour prey,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he became a man-eater.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then the nations heard about him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he was trapped in their pit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They led him away with hooks
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the land of Egypt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “When the lioness saw
- type: usfm
  marker: q2
  children:
  - type: text
    text: that her hopes for him were gone,
- type: usfm
  marker: q1
  children:
  - type: text
    text: she took another of her cubs
- type: usfm
  marker: q2
  children:
  - type: text
    text: and taught him to be a strong young lion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He prowled among the other lions
- type: usfm
  marker: q2
  children:
  - type: text
    text: and stood out among them in his strength.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He learned to hunt and devour prey,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he, too, became a man-eater.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He demolished fortresses
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: He knew widows.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: and destroyed their towns and cities.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their farms were desolated,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their crops were destroyed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The land and its people trembled in fear
- type: usfm
  marker: q2
  children:
  - type: text
    text: when they heard him roar.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then the armies of the nations attacked him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: surrounding him from every direction.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They threw a net over him
- type: usfm
  marker: q2
  children:
  - type: text
    text: and captured him in their pit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: With hooks, they dragged him into a cage
- type: usfm
  marker: q2
  children:
  - type: text
    text: and brought him before the king of Babylon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They held him in captivity,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so his voice could never again be heard
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the mountains of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Your mother was like a vine
- type: usfm
  marker: q2
  children:
  - type: text
    text: planted by the water’s edge.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It had lush, green foliage
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of the abundant water.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Its branches became strong—
- type: usfm
  marker: q2
  children:
  - type: text
    text: strong enough to be a ruler’s scepter.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It grew very tall,
- type: usfm
  marker: q2
  children:
  - type: text
    text: towering above all others.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It stood out because of its height
- type: usfm
  marker: q2
  children:
  - type: text
    text: and its many lush branches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But the vine was uprooted in fury
- type: usfm
  marker: q2
  children:
  - type: text
    text: and thrown down to the ground.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The desert wind dried up its fruit
- type: usfm
  marker: q2
  children:
  - type: text
    text: and tore off its strong branches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: so that it withered
- type: usfm
  marker: q2
  children:
  - type: text
    text: and was destroyed by fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Now the vine is transplanted to the wilderness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: where the ground is hard and dry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: A fire has burst out from its branches
- type: usfm
  marker: q2
  children:
  - type: text
    text: and devoured its fruit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Its remaining limbs are not
- type: usfm
  marker: q2
  children:
  - type: text
    text: strong enough to be a ruler’s scepter.
- type: usfm
  marker: m
  children:
  - type: text
    text: “This is a funeral song, and it will be used in a funeral.”
