document_id: EZK.19,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Funeral Song for Israel’s Kings
  - type: text
    content: '“Sing this funeral song for the princes of Israel:'
  '10':
  - type: text
    content: “Your mother was like a vine
  - type: text
    content: planted by the water’s edge.
  - type: text
    content: It had lush, green foliage
  - type: text
    content: because of the abundant water.
  '11':
  - type: text
    content: Its branches became strong—
  - type: text
    content: strong enough to be a ruler’s scepter.
  - type: text
    content: It grew very tall,
  - type: text
    content: towering above all others.
  - type: text
    content: It stood out because of its height
  - type: text
    content: and its many lush branches.
  '12':
  - type: text
    content: But the vine was uprooted in fury
  - type: text
    content: and thrown down to the ground.
  - type: text
    content: The desert wind dried up its fruit
  - type: text
    content: and tore off its strong branches,
  - type: text
    content: so that it withered
  - type: text
    content: and was destroyed by fire.
  '13':
  - type: text
    content: Now the vine is transplanted to the wilderness,
  - type: text
    content: where the ground is hard and dry.
  '14':
  - type: text
    content: A fire has burst out from its branches
  - type: text
    content: and devoured its fruit.
  - type: text
    content: Its remaining limbs are not
  - type: text
    content: strong enough to be a ruler’s scepter.
  - type: text
    content: “This is a funeral song, and it will be used in a funeral.”
  '2':
  - type: text
    content: “What is your mother?
  - type: text
    content: A lioness among lions!
  - type: text
    content: She lay down among the young lions
  - type: text
    content: and reared her cubs.
  '3':
  - type: text
    content: She raised one of her cubs
  - type: text
    content: to become a strong young lion.
  - type: text
    content: He learned to hunt and devour prey,
  - type: text
    content: and he became a man-eater.
  '4':
  - type: text
    content: Then the nations heard about him,
  - type: text
    content: and he was trapped in their pit.
  - type: text
    content: They led him away with hooks
  - type: text
    content: to the land of Egypt.
  '5':
  - type: text
    content: “When the lioness saw
  - type: text
    content: that her hopes for him were gone,
  - type: text
    content: she took another of her cubs
  - type: text
    content: and taught him to be a strong young lion.
  '6':
  - type: text
    content: He prowled among the other lions
  - type: text
    content: and stood out among them in his strength.
  - type: text
    content: He learned to hunt and devour prey,
  - type: text
    content: and he, too, became a man-eater.
  '7':
  - type: text
    content: He demolished fortresses
  - type: note
    content: As in Greek version; Hebrew reads He knew widows.
  - type: text
    content: and destroyed their towns and cities.
  - type: text
    content: Their farms were desolated,
  - type: text
    content: and their crops were destroyed.
  - type: text
    content: The land and its people trembled in fear
  - type: text
    content: when they heard him roar.
  '8':
  - type: text
    content: Then the armies of the nations attacked him,
  - type: text
    content: surrounding him from every direction.
  - type: text
    content: They threw a net over him
  - type: text
    content: and captured him in their pit.
  '9':
  - type: text
    content: With hooks, they dragged him into a cage
  - type: text
    content: and brought him before the king of Babylon.
  - type: text
    content: They held him in captivity,
  - type: text
    content: so his voice could never again be heard
  - type: text
    content: on the mountains of Israel.
