document_id: MRK.8,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Feeds Four Thousand
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'About this time another large crowd had gathered, and the people ran out of food again. Jesus called his disciples and told them, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Immediately after this, he got into a boat with his disciples and crossed over to the region of Dalmanutha.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pharisees Demand a Miraculous Sign
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: When the Pharisees heard that Jesus had arrived, they came and started to argue with him. Testing him, they demanded that he show them a miraculous sign from heaven to prove his authority.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he heard this, he sighed deeply in his spirit and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why do these people keep demanding a miraculous sign? I tell you the truth, I will not give this generation any such sign.”
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he got back into the boat and left them, and he crossed to the other side of the lake.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Yeast of the Pharisees and Herod
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But the disciples had forgotten to bring any food. They had only one loaf of bread with them in the boat. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'As they were crossing the lake, Jesus warned them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Watch out! Beware of the yeast of the Pharisees and of Herod.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At this they began to argue with each other because they hadn’t brought any bread. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus knew what they were saying, so he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why are you arguing about having no bread? Don’t you know or understand even yet? Are your hearts too hard to take it in?
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘You have eyes—can’t you see? You have ears—can’t you hear?’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jer 5:21.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Don’t you remember anything at all?
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: When I fed the 5,000 with five loaves of bread, how many baskets of leftovers did you pick up afterward?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Twelve,” they said.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I feel sorry for these people. They have been here with me for three days, and they have nothing left to eat.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “And when I fed the 4,000 with seven loaves, how many large baskets of leftovers did you pick up?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Seven,” they said.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Don’t you understand yet?” '
    - type: text
      text: he asked them.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Heals a Blind Man
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When they arrived at Bethsaida, some people brought a blind man to Jesus, and they begged him to touch the man and heal him. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Jesus took the blind man by the hand and led him out of the village. Then, spitting on the man’s eyes, he laid his hands on him and asked, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Can you see anything now?”
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The man looked around. “Yes,” he said, “I see people, but I can’t see them very clearly. They look like trees walking around.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus placed his hands on the man’s eyes again, and his eyes were opened. His sight was completely restored, and he could see everything clearly. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus sent him away, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Don’t go back into the village on your way home.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Peter’s Declaration about Jesus
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Jesus and his disciples left Galilee and went up to the villages near Caesarea Philippi. As they were walking along, he asked them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Who do people say I am?”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Well,” they replied, “some say John the Baptist, some say Elijah, and others say you are one of the other prophets.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he asked them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But who do you say I am?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Peter replied, “You are the Messiah.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the Christ. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Messiah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(a Hebrew term) and '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Christ '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (a Greek term) both mean “anointed one.”
      marker-yv: yv-n
    - type: text
      text: ”
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If I send them home hungry, they will faint along the way. For some of them have come a long distance.”
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Jesus warned them not to tell anyone about him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Predicts His Death
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then Jesus began to tell them that the Son of Man
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Son of Man” is a title Jesus used for himself.
      marker-yv: yv-n
    - type: text
      text: ' must suffer many terrible things and be rejected by the elders, the leading priests, and the teachers of religious law. He would be killed, but three days later he would rise from the dead. '
  '32':
  - type: usfm
    marker: m
    children:
    - type: text
      text: As he talked about this openly with his disciples, Peter took him aside and began to reprimand him for saying such things.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: began to correct him.
      marker-yv: yv-n
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus turned around and looked at his disciples, then reprimanded Peter. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Get away from me, Satan!” '
    - type: text
      text: 'he said. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You are seeing things merely from a human point of view, not from God’s.”
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then, calling the crowd to join his disciples, he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If any of you wants to be my follower, you must give up your own way, take up your cross, and follow me.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If you try to hang on to your life, you will lose it. But if you give up your life for my sake and for the sake of the Good News, you will save it.
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And what do you benefit if you gain the whole world but lose your own soul?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'your self? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 8:37.
      marker-yv: yv-n
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Is anything worth more than your soul?
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If anyone is ashamed of me and my message in these adulterous and sinful days, the Son of Man will be ashamed of that person when he returns in the glory of his Father with the holy angels.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: His disciples replied, “How are we supposed to find enough food to feed them out here in the wilderness?”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus asked, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “How much bread do you have?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Seven loaves,” they replied.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Jesus told all the people to sit down on the ground. Then he took the seven loaves, thanked God for them, and broke them into pieces. He gave them to his disciples, who distributed the bread to the crowd. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A few small fish were found, too, so Jesus also blessed these and told the disciples to distribute them.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They ate as much as they wanted. Afterward, the disciples picked up seven large baskets of leftover food. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There were about 4,000 men in the crowd that day, and Jesus sent them home after they had eaten. '
