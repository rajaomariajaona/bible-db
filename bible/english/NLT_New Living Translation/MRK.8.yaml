document_id: MRK.8,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Feeds Four Thousand
  - type: text
    content: 'About this time another large crowd had gathered, and the people ran out of food again. Jesus called his disciples and told them, '
  '10':
  - type: text
    content: Immediately after this, he got into a boat with his disciples and crossed over to the region of Dalmanutha.
  - type: heading
    content: Pharisees Demand a Miraculous Sign
  '11':
  - type: text
    content: When the Pharisees heard that Jesus had arrived, they came and started to argue with him. Testing him, they demanded that he show them a miraculous sign from heaven to prove his authority.
  '12':
  - type: text
    content: 'When he heard this, he sighed deeply in his spirit and said, '
  - type: text
    content: “Why do these people keep demanding a miraculous sign? I tell you the truth, I will not give this generation any such sign.”
  - type: text
    content: ' '
  '13':
  - type: text
    content: So he got back into the boat and left them, and he crossed to the other side of the lake.
  - type: heading
    content: Yeast of the Pharisees and Herod
  '14':
  - type: text
    content: 'But the disciples had forgotten to bring any food. They had only one loaf of bread with them in the boat. '
  '15':
  - type: text
    content: 'As they were crossing the lake, Jesus warned them, '
  - type: text
    content: “Watch out! Beware of the yeast of the Pharisees and of Herod.”
  '16':
  - type: text
    content: 'At this they began to argue with each other because they hadn’t brought any bread. '
  '17':
  - type: text
    content: 'Jesus knew what they were saying, so he said, '
  - type: text
    content: “Why are you arguing about having no bread? Don’t you know or understand even yet? Are your hearts too hard to take it in?
  - type: text
    content: ' '
  '18':
  - type: text
    content: ‘You have eyes—can’t you see? You have ears—can’t you hear?’
  - type: note
    content: Jer 5:21.
  - type: text
    content: ' '
  - type: text
    content: Don’t you remember anything at all?
  - type: text
    content: ' '
  '19':
  - type: text
    content: When I fed the 5,000 with five loaves of bread, how many baskets of leftovers did you pick up afterward?”
  - type: text
    content: “Twelve,” they said.
  '2':
  - type: text
    content: “I feel sorry for these people. They have been here with me for three days, and they have nothing left to eat.
  - type: text
    content: ' '
  '20':
  - type: text
    content: ' '
  - type: text
    content: “And when I fed the 4,000 with seven loaves, how many large baskets of leftovers did you pick up?”
  - type: text
    content: “Seven,” they said.
  '21':
  - type: text
    content: ' '
  - type: text
    content: '“Don’t you understand yet?” '
  - type: text
    content: he asked them.
  - type: heading
    content: Jesus Heals a Blind Man
  '22':
  - type: text
    content: 'When they arrived at Bethsaida, some people brought a blind man to Jesus, and they begged him to touch the man and heal him. '
  '23':
  - type: text
    content: 'Jesus took the blind man by the hand and led him out of the village. Then, spitting on the man’s eyes, he laid his hands on him and asked, '
  - type: text
    content: “Can you see anything now?”
  '24':
  - type: text
    content: The man looked around. “Yes,” he said, “I see people, but I can’t see them very clearly. They look like trees walking around.”
  '25':
  - type: text
    content: 'Then Jesus placed his hands on the man’s eyes again, and his eyes were opened. His sight was completely restored, and he could see everything clearly. '
  '26':
  - type: text
    content: 'Jesus sent him away, saying, '
  - type: text
    content: “Don’t go back into the village on your way home.”
  - type: heading
    content: Peter’s Declaration about Jesus
  '27':
  - type: text
    content: 'Jesus and his disciples left Galilee and went up to the villages near Caesarea Philippi. As they were walking along, he asked them, '
  - type: text
    content: “Who do people say I am?”
  '28':
  - type: text
    content: “Well,” they replied, “some say John the Baptist, some say Elijah, and others say you are one of the other prophets.”
  '29':
  - type: text
    content: 'Then he asked them, '
  - type: text
    content: “But who do you say I am?”
  - type: text
    content: Peter replied, “You are the Messiah.
  - type: note
    content: Or the Christ. Messiah (a Hebrew term) and Christ (a Greek term) both mean “anointed one.”
  - type: text
    content: ”
  '3':
  - type: text
    content: If I send them home hungry, they will faint along the way. For some of them have come a long distance.”
  '30':
  - type: text
    content: But Jesus warned them not to tell anyone about him.
  - type: heading
    content: Jesus Predicts His Death
  '31':
  - type: text
    content: Then Jesus began to tell them that the Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' must suffer many terrible things and be rejected by the elders, the leading priests, and the teachers of religious law. He would be killed, but three days later he would rise from the dead. '
  '32':
  - type: text
    content: As he talked about this openly with his disciples, Peter took him aside and began to reprimand him for saying such things.
  - type: note
    content: Or began to correct him.
  '33':
  - type: text
    content: 'Jesus turned around and looked at his disciples, then reprimanded Peter. '
  - type: text
    content: '“Get away from me, Satan!” '
  - type: text
    content: 'he said. '
  - type: text
    content: “You are seeing things merely from a human point of view, not from God’s.”
  '34':
  - type: text
    content: 'Then, calling the crowd to join his disciples, he said, '
  - type: text
    content: “If any of you wants to be my follower, you must give up your own way, take up your cross, and follow me.
  - type: text
    content: ' '
  '35':
  - type: text
    content: If you try to hang on to your life, you will lose it. But if you give up your life for my sake and for the sake of the Good News, you will save it.
  - type: text
    content: ' '
  '36':
  - type: text
    content: And what do you benefit if you gain the whole world but lose your own soul?
  - type: note
    content: Or your self? also in 8:37.
  - type: text
    content: ' '
  '37':
  - type: text
    content: Is anything worth more than your soul?
  - type: text
    content: ' '
  '38':
  - type: text
    content: If anyone is ashamed of me and my message in these adulterous and sinful days, the Son of Man will be ashamed of that person when he returns in the glory of his Father with the holy angels.”
  '4':
  - type: text
    content: His disciples replied, “How are we supposed to find enough food to feed them out here in the wilderness?”
  '5':
  - type: text
    content: 'Jesus asked, '
  - type: text
    content: “How much bread do you have?”
  - type: text
    content: “Seven loaves,” they replied.
  '6':
  - type: text
    content: 'So Jesus told all the people to sit down on the ground. Then he took the seven loaves, thanked God for them, and broke them into pieces. He gave them to his disciples, who distributed the bread to the crowd. '
  '7':
  - type: text
    content: A few small fish were found, too, so Jesus also blessed these and told the disciples to distribute them.
  '8':
  - type: text
    content: 'They ate as much as they wanted. Afterward, the disciples picked up seven large baskets of leftover food. '
  '9':
  - type: text
    content: 'There were about 4,000 men in the crowd that day, and Jesus sent them home after they had eaten. '
