document_id: 1CH.25,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Duties of the Musicians
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'David and the army commanders then appointed men from the families of Asaph, Heman, and Jeduthun to proclaim God’s messages to the accompaniment of lyres, harps, and cymbals. Here is a list of their names and their work:'
  '10':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The third lot fell to Zaccur and twelve of his sons and relatives.
  '11':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The fourth lot fell to Zeri
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Izri, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Zeri; compare 25:3.
      marker-yv: yv-n
    - type: text
      text: ' and twelve of his sons and relatives.'
  '12':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The fifth lot fell to Nethaniah and twelve of his sons and relatives.
  '13':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The sixth lot fell to Bukkiah and twelve of his sons and relatives.
  '14':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The seventh lot fell to Asarelah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jesarelah, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Asarelah; compare 25:2.
      marker-yv: yv-n
    - type: text
      text: ' and twelve of his sons and relatives.'
  '15':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The eighth lot fell to Jeshaiah and twelve of his sons and relatives.
  '16':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The ninth lot fell to Mattaniah and twelve of his sons and relatives.
  '17':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The tenth lot fell to Shimei and twelve of his sons and relatives.
  '18':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The eleventh lot fell to Uzziel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Azarel, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Uzziel; compare 25:4.
      marker-yv: yv-n
    - type: text
      text: ' and twelve of his sons and relatives.'
  '19':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The twelfth lot fell to Hashabiah and twelve of his sons and relatives.
  '2':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: From the sons of Asaph, there were Zaccur, Joseph, Nethaniah, and Asarelah. They worked under the direction of their father, Asaph, who proclaimed God’s messages by the king’s orders.
  '20':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The thirteenth lot fell to Shubael and twelve of his sons and relatives.
  '21':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The fourteenth lot fell to Mattithiah and twelve of his sons and relatives.
  '22':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The fifteenth lot fell to Jerimoth
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jeremoth, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Jerimoth; compare 25:4.
      marker-yv: yv-n
    - type: text
      text: ' and twelve of his sons and relatives.'
  '23':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The sixteenth lot fell to Hananiah and twelve of his sons and relatives.
  '24':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The seventeenth lot fell to Joshbekashah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Joshbekasha, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Joshbekashah; compare 25:4.
      marker-yv: yv-n
    - type: text
      text: ' and twelve of his sons and relatives.'
  '25':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The eighteenth lot fell to Hanani and twelve of his sons and relatives.
  '26':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The nineteenth lot fell to Mallothi and twelve of his sons and relatives.
  '27':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The twentieth lot fell to Eliathah and twelve of his sons and relatives.
  '28':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The twenty-first lot fell to Hothir and twelve of his sons and relatives.
  '29':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The twenty-second lot fell to Giddalti and twelve of his sons and relatives.
  '3':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: From the sons of Jeduthun, there were Gedaliah, Zeri, Jeshaiah, Shimei,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in one Hebrew manuscript and some Greek manuscripts (see also 25:17); most Hebrew manuscripts lack '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shimei.
      marker-yv: yv-n
    - type: text
      text: ' Hashabiah, and Mattithiah, six in all. They worked under the direction of their father, Jeduthun, who proclaimed God’s messages to the accompaniment of the lyre, offering thanks and praise to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '30':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The twenty-third lot fell to Mahazioth and twelve of his sons and relatives.
  '31':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The twenty-fourth lot fell to Romamti-ezer and twelve of his sons and relatives.
  '4':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: From the sons of Heman, there were Bukkiah, Mattaniah, Uzziel, Shubael,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Shebuel, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Shubael; compare 25:20.
      marker-yv: yv-n
    - type: text
      text: ' Jerimoth, Hananiah, Hanani, Eliathah, Giddalti, Romamti-ezer, Joshbekashah, Mallothi, Hothir, and Mahazioth. '
  '5':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: All these were the sons of Heman, the king’s seer, for God had honored him with fourteen sons and three daughters.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All these men were under the direction of their fathers as they made music at the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. Their responsibilities included the playing of cymbals, harps, and lyres at the house of God. Asaph, Jeduthun, and Heman reported directly to the king. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They and their families were all trained in making music before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and each of them—288 in all—was an accomplished musician. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The musicians were appointed to their term of service by means of sacred lots, without regard to whether they were young or old, teacher or student.
  '9':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The first lot fell to Joseph of the Asaph clan and twelve of his sons and relatives.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew lacks '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and twelve of his sons and relatives.
      marker-yv: yv-n
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The second lot fell to Gedaliah and twelve of his sons and relatives.
