document_id: 1CH.25,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Duties of the Musicians
  - type: text
    content: 'David and the army commanders then appointed men from the families of Asaph, Heman, and Jeduthun to proclaim God’s messages to the accompaniment of lyres, harps, and cymbals. Here is a list of their names and their work:'
  '10':
  - type: text
    content: The third lot fell to Zaccur and twelve of his sons and relatives.
  '11':
  - type: text
    content: The fourth lot fell to Zeri
  - type: note
    content: Hebrew Izri, a variant spelling of Zeri; compare 25:3.
  - type: text
    content: ' and twelve of his sons and relatives.'
  '12':
  - type: text
    content: The fifth lot fell to Nethaniah and twelve of his sons and relatives.
  '13':
  - type: text
    content: The sixth lot fell to Bukkiah and twelve of his sons and relatives.
  '14':
  - type: text
    content: The seventh lot fell to Asarelah
  - type: note
    content: Hebrew Jesarelah, a variant spelling of Asarelah; compare 25:2.
  - type: text
    content: ' and twelve of his sons and relatives.'
  '15':
  - type: text
    content: The eighth lot fell to Jeshaiah and twelve of his sons and relatives.
  '16':
  - type: text
    content: The ninth lot fell to Mattaniah and twelve of his sons and relatives.
  '17':
  - type: text
    content: The tenth lot fell to Shimei and twelve of his sons and relatives.
  '18':
  - type: text
    content: The eleventh lot fell to Uzziel
  - type: note
    content: Hebrew Azarel, a variant spelling of Uzziel; compare 25:4.
  - type: text
    content: ' and twelve of his sons and relatives.'
  '19':
  - type: text
    content: The twelfth lot fell to Hashabiah and twelve of his sons and relatives.
  '2':
  - type: text
    content: From the sons of Asaph, there were Zaccur, Joseph, Nethaniah, and Asarelah. They worked under the direction of their father, Asaph, who proclaimed God’s messages by the king’s orders.
  '20':
  - type: text
    content: The thirteenth lot fell to Shubael and twelve of his sons and relatives.
  '21':
  - type: text
    content: The fourteenth lot fell to Mattithiah and twelve of his sons and relatives.
  '22':
  - type: text
    content: The fifteenth lot fell to Jerimoth
  - type: note
    content: Hebrew Jeremoth, a variant spelling of Jerimoth; compare 25:4.
  - type: text
    content: ' and twelve of his sons and relatives.'
  '23':
  - type: text
    content: The sixteenth lot fell to Hananiah and twelve of his sons and relatives.
  '24':
  - type: text
    content: The seventeenth lot fell to Joshbekashah
  - type: note
    content: Hebrew Joshbekasha, a variant spelling of Joshbekashah; compare 25:4.
  - type: text
    content: ' and twelve of his sons and relatives.'
  '25':
  - type: text
    content: The eighteenth lot fell to Hanani and twelve of his sons and relatives.
  '26':
  - type: text
    content: The nineteenth lot fell to Mallothi and twelve of his sons and relatives.
  '27':
  - type: text
    content: The twentieth lot fell to Eliathah and twelve of his sons and relatives.
  '28':
  - type: text
    content: The twenty-first lot fell to Hothir and twelve of his sons and relatives.
  '29':
  - type: text
    content: The twenty-second lot fell to Giddalti and twelve of his sons and relatives.
  '3':
  - type: text
    content: From the sons of Jeduthun, there were Gedaliah, Zeri, Jeshaiah, Shimei,
  - type: note
    content: As in one Hebrew manuscript and some Greek manuscripts (see also 25:17); most Hebrew manuscripts lack Shimei.
  - type: text
    content: ' Hashabiah, and Mattithiah, six in all. They worked under the direction of their father, Jeduthun, who proclaimed God’s messages to the accompaniment of the lyre, offering thanks and praise to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '30':
  - type: text
    content: The twenty-third lot fell to Mahazioth and twelve of his sons and relatives.
  '31':
  - type: text
    content: The twenty-fourth lot fell to Romamti-ezer and twelve of his sons and relatives.
  '4':
  - type: text
    content: From the sons of Heman, there were Bukkiah, Mattaniah, Uzziel, Shubael,
  - type: note
    content: Hebrew Shebuel, a variant spelling of Shubael; compare 25:20.
  - type: text
    content: ' Jerimoth, Hananiah, Hanani, Eliathah, Giddalti, Romamti-ezer, Joshbekashah, Mallothi, Hothir, and Mahazioth. '
  '5':
  - type: text
    content: All these were the sons of Heman, the king’s seer, for God had honored him with fourteen sons and three daughters.
  '6':
  - type: text
    content: 'All these men were under the direction of their fathers as they made music at the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. Their responsibilities included the playing of cymbals, harps, and lyres at the house of God. Asaph, Jeduthun, and Heman reported directly to the king. '
  '7':
  - type: text
    content: 'They and their families were all trained in making music before the '
  - type: text
    content: Lord
  - type: text
    content: ', and each of them—288 in all—was an accomplished musician. '
  '8':
  - type: text
    content: The musicians were appointed to their term of service by means of sacred lots, without regard to whether they were young or old, teacher or student.
  '9':
  - type: text
    content: The first lot fell to Joseph of the Asaph clan and twelve of his sons and relatives.
  - type: note
    content: As in Greek version; Hebrew lacks and twelve of his sons and relatives.
  - type: text
    content: The second lot fell to Gedaliah and twelve of his sons and relatives.
