document_id: ZEC.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Call to Return to the Lord
  - type: text
    content: In November
  - type: note
    content: Hebrew In the eighth month. A number of dates in Zechariah can be cross-checked with dates in surviving Persian records and related accurately to our modern calendar. This month of the ancient Hebrew lunar calendar occurred within the months of October and November 520 b.c.
  - type: text
    content: ' of the second year of King Darius’s reign, the '
  - type: text
    content: Lord
  - type: text
    content: ' gave this message to the prophet Zechariah son of Berekiah and grandson of Iddo:'
  '10':
  - type: text
    content: 'The rider standing among the myrtle trees then explained, “They are the ones the '
  - type: text
    content: Lord
  - type: text
    content: ' has sent out to patrol the earth.”'
  '11':
  - type: text
    content: 'Then the other riders reported to the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ', who was standing among the myrtle trees, “We have been patrolling the earth, and the whole earth is at peace.”'
  '12':
  - type: text
    content: 'Upon hearing this, the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' prayed this prayer: “O '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, for seventy years now you have been angry with Jerusalem and the towns of Judah. How long until you again show mercy to them?” '
  '13':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke kind and comforting words to the angel who talked with me.'
  '14':
  - type: text
    content: 'Then the angel said to me, “Shout this message for all to hear: ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says: My love for Jerusalem and Mount Zion is passionate and strong. '
  '15':
  - type: text
    content: But I am very angry with the other nations that are now enjoying peace and security. I was only a little angry with my people, but the nations inflicted harm on them far beyond my intentions.
  '16':
  - type: text
    content: '“‘Therefore, this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: I have returned to show mercy to Jerusalem. My Temple will be rebuilt, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, and measurements will be taken for the reconstruction of Jerusalem.'
  - type: note
    content: Hebrew and the measuring line will be stretched out over Jerusalem.
  - type: text
    content: ’
  '17':
  - type: text
    content: '“Say this also: ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says: The towns of Israel will again overflow with prosperity, and the '
  - type: text
    content: Lord
  - type: text
    content: ' will again comfort Zion and choose Jerusalem as his own.’”'
  - type: heading
    content: Four Horns and Four Blacksmiths
  '18':
  - type: text
    content: ' '
  - type: note
    content: Verses 1:18-21 are numbered 2:1-4 in Hebrew text.
  - type: text
    content: 'Then I looked up and saw four animal horns. '
  '19':
  - type: text
    content: “What are these?” I asked the angel who was talking with me.
  - type: text
    content: He replied, “These horns represent the nations that scattered Judah, Israel, and Jerusalem.”
  '2':
  - type: text
    content: '“I, the '
  - type: text
    content: Lord
  - type: text
    content: ', was very angry with your ancestors. '
  '20':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' showed me four blacksmiths. '
  '21':
  - type: text
    content: “What are these men coming to do?” I asked.
  - type: text
    content: The angel replied, “These four horns—these nations—scattered and humbled Judah. Now these blacksmiths have come to terrify those nations and throw them down and destroy them.”
  '3':
  - type: text
    content: 'Therefore, say to the people, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says: Return to me, and I will return to you, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.’ '
  '4':
  - type: text
    content: 'Don’t be like your ancestors who would not listen or pay attention when the earlier prophets said to them, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says: Turn from your evil ways, and stop all your evil practices.’'
  '5':
  - type: text
    content: '“Where are your ancestors now? They and the prophets are long dead. '
  '6':
  - type: text
    content: 'But everything I said through my servants the prophets happened to your ancestors, just as I said. As a result, they repented and said, ‘We have received what we deserved from the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies. He has done what he said he would do.’”'
  - type: heading
    content: A Man among the Myrtle Trees
  '7':
  - type: text
    content: Three months later, on February 15,
  - type: note
    content: Hebrew On the twenty-fourth day of the eleventh month, the month of Shebat, in the second year of Darius. This event occurred on February 15, 519 b.c.; also see note on 1:1.
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: ' sent another message to the prophet Zechariah son of Berekiah and grandson of Iddo.'
  '8':
  - type: text
    content: 'In a vision during the night, I saw a man sitting on a red horse that was standing among some myrtle trees in a small valley. Behind him were riders on red, brown, and white horses. '
  '9':
  - type: text
    content: I asked the angel who was talking with me, “My lord, what do these horses mean?”
  - type: text
    content: “I will show you,” the angel replied.
