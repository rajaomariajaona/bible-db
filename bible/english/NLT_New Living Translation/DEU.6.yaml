document_id: DEU.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Call for Wholehearted Commitment
  - type: text
    content: '“These are the commands, decrees, and regulations that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God commanded me to teach you. You must obey them in the land you are about to enter and occupy, '
  '10':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' your God will soon bring you into the land he swore to give you when he made a vow to your ancestors Abraham, Isaac, and Jacob. It is a land with large, prosperous cities that you did not build. '
  '11':
  - type: text
    content: 'The houses will be richly stocked with goods you did not produce. You will draw water from cisterns you did not dig, and you will eat from vineyards and olive trees you did not plant. When you have eaten your fill in this land, '
  '12':
  - type: text
    content: 'be careful not to forget the '
  - type: text
    content: Lord
  - type: text
    content: ', who rescued you from slavery in the land of Egypt. '
  '13':
  - type: text
    content: 'You must fear the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and serve him. When you take an oath, you must use only his name.'
  '14':
  - type: text
    content: '“You must not worship any of the gods of neighboring nations, '
  '15':
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who lives among you, is a jealous God. His anger will flare up against you, and he will wipe you from the face of the earth. '
  '16':
  - type: text
    content: 'You must not test the '
  - type: text
    content: Lord
  - type: text
    content: ' your God as you did when you complained at Massah. '
  '17':
  - type: text
    content: 'You must diligently obey the commands of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God—all the laws and decrees he has given you. '
  '18':
  - type: text
    content: 'Do what is right and good in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight, so all will go well with you. Then you will enter and occupy the good land that the '
  - type: text
    content: Lord
  - type: text
    content: ' swore to give your ancestors. '
  '19':
  - type: text
    content: 'You will drive out all the enemies living in the land, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' said you would.'
  '2':
  - type: text
    content: 'and you and your children and grandchildren must fear the '
  - type: text
    content: Lord
  - type: text
    content: ' your God as long as you live. If you obey all his decrees and commands, you will enjoy a long life. '
  '20':
  - type: text
    content: '“In the future your children will ask you, ‘What is the meaning of these laws, decrees, and regulations that the '
  - type: text
    content: Lord
  - type: text
    content: ' our God has commanded us to obey?’'
  '21':
  - type: text
    content: '“Then you must tell them, ‘We were Pharaoh’s slaves in Egypt, but the '
  - type: text
    content: Lord
  - type: text
    content: ' brought us out of Egypt with his strong hand. '
  '22':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' did miraculous signs and wonders before our eyes, dealing terrifying blows against Egypt and Pharaoh and all his people. '
  '23':
  - type: text
    content: 'He brought us out of Egypt so he could give us this land he had sworn to give our ancestors. '
  '24':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' our God commanded us to obey all these decrees and to fear him so he can continue to bless us and preserve our lives, as he has done to this day. '
  '25':
  - type: text
    content: 'For we will be counted as righteous when we obey all the commands the '
  - type: text
    content: Lord
  - type: text
    content: ' our God has given us.’'
  '3':
  - type: text
    content: 'Listen closely, Israel, and be careful to obey. Then all will go well with you, and you will have many children in the land flowing with milk and honey, just as the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your ancestors, promised you.'
  '4':
  - type: text
    content: '“Listen, O Israel! The '
  - type: text
    content: Lord
  - type: text
    content: ' is our God, the '
  - type: text
    content: Lord
  - type: text
    content: ' alone.'
  - type: note
    content: Or The Lord our God is one Lord; or The Lord our God, the Lord is one; or The Lord is our God, the Lord is one.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'And you must love the '
  - type: text
    content: Lord
  - type: text
    content: ' your God with all your heart, all your soul, and all your strength. '
  '6':
  - type: text
    content: 'And you must commit yourselves wholeheartedly to these commands that I am giving you today. '
  '7':
  - type: text
    content: 'Repeat them again and again to your children. Talk about them when you are at home and when you are on the road, when you are going to bed and when you are getting up. '
  '8':
  - type: text
    content: 'Tie them to your hands and wear them on your forehead as reminders. '
  '9':
  - type: text
    content: Write them on the doorposts of your house and on your gates.
