document_id: DEU.6,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Call for Wholehearted Commitment
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“These are the commands, decrees, and regulations that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God commanded me to teach you. You must obey them in the land you are about to enter and occupy, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will soon bring you into the land he swore to give you when he made a vow to your ancestors Abraham, Isaac, and Jacob. It is a land with large, prosperous cities that you did not build. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The houses will be richly stocked with goods you did not produce. You will draw water from cisterns you did not dig, and you will eat from vineyards and olive trees you did not plant. When you have eaten your fill in this land, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'be careful not to forget the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who rescued you from slavery in the land of Egypt. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You must fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God and serve him. When you take an oath, you must use only his name.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You must not worship any of the gods of neighboring nations, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, who lives among you, is a jealous God. His anger will flare up against you, and he will wipe you from the face of the earth. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You must not test the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God as you did when you complained at Massah. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You must diligently obey the commands of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God—all the laws and decrees he has given you. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do what is right and good in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s sight, so all will go well with you. Then you will enter and occupy the good land that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' swore to give your ancestors. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You will drive out all the enemies living in the land, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said you would.'
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'and you and your children and grandchildren must fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God as long as you live. If you obey all his decrees and commands, you will enjoy a long life. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“In the future your children will ask you, ‘What is the meaning of these laws, decrees, and regulations that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God has commanded us to obey?’'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then you must tell them, ‘We were Pharaoh’s slaves in Egypt, but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' brought us out of Egypt with his strong hand. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' did miraculous signs and wonders before our eyes, dealing terrifying blows against Egypt and Pharaoh and all his people. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He brought us out of Egypt so he could give us this land he had sworn to give our ancestors. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God commanded us to obey all these decrees and to fear him so he can continue to bless us and preserve our lives, as he has done to this day. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For we will be counted as righteous when we obey all the commands the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God has given us.’'
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Listen closely, Israel, and be careful to obey. Then all will go well with you, and you will have many children in the land flowing with milk and honey, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of your ancestors, promised you.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Listen, O Israel! The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is our God, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' alone.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'The '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ' our God is one '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: '; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'The '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ' our God, the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ' is one; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'The '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ' is our God, the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ' is one.'
      marker-yv: yv-n
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you must love the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God with all your heart, all your soul, and all your strength. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you must commit yourselves wholeheartedly to these commands that I am giving you today. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Repeat them again and again to your children. Talk about them when you are at home and when you are on the road, when you are going to bed and when you are getting up. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tie them to your hands and wear them on your forehead as reminders. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Write them on the doorposts of your house and on your gates.
