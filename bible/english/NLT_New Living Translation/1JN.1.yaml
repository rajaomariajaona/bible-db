document_id: 1JN.1,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Introduction
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: We proclaim to you the one who existed from the beginning,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: What was from the beginning.
      marker-yv: yv-n
    - type: text
      text: ' whom we have heard and seen. We saw him with our own eyes and touched him with our own hands. He is the Word of life. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If we claim we have not sinned, we are calling God a liar and showing that his word has no place in our hearts.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This one who is life itself was revealed to us, and we have seen him. And now we testify and proclaim to you that he is the one who is eternal life. He was with the Father, and then he was revealed to us. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'We proclaim to you what we ourselves have actually seen and heard so that you may have fellowship with us. And our fellowship is with the Father and with his Son, Jesus Christ. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: We are writing these things so that you may fully share our joy.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'so that our joy may be complete; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: your joy.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Living in the Light
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: This is the message we heard from Jesus
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from him.
      marker-yv: yv-n
    - type: text
      text: ' and now declare to you: God is light, and there is no darkness in him at all. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So we are lying if we say we have fellowship with God but go on living in spiritual darkness; we are not practicing the truth. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But if we are living in the light, as God is in the light, then we have fellowship with each other, and the blood of Jesus, his Son, cleanses us from all sin.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If we claim we have no sin, we are only fooling ourselves and not living in the truth. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if we confess our sins to him, he is faithful and just to forgive us our sins and to cleanse us from all wickedness. '
