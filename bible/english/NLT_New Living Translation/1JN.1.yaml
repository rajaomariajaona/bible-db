document_id: 1JN.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Introduction
  - type: text
    content: We proclaim to you the one who existed from the beginning,
  - type: note
    content: Greek What was from the beginning.
  - type: text
    content: ' whom we have heard and seen. We saw him with our own eyes and touched him with our own hands. He is the Word of life. '
  '10':
  - type: text
    content: If we claim we have not sinned, we are calling God a liar and showing that his word has no place in our hearts.
  '2':
  - type: text
    content: 'This one who is life itself was revealed to us, and we have seen him. And now we testify and proclaim to you that he is the one who is eternal life. He was with the Father, and then he was revealed to us. '
  '3':
  - type: text
    content: 'We proclaim to you what we ourselves have actually seen and heard so that you may have fellowship with us. And our fellowship is with the Father and with his Son, Jesus Christ. '
  '4':
  - type: text
    content: We are writing these things so that you may fully share our joy.
  - type: note
    content: Or so that our joy may be complete; some manuscripts read your joy.
  - type: heading
    content: Living in the Light
  '5':
  - type: text
    content: This is the message we heard from Jesus
  - type: note
    content: Greek from him.
  - type: text
    content: ' and now declare to you: God is light, and there is no darkness in him at all. '
  '6':
  - type: text
    content: 'So we are lying if we say we have fellowship with God but go on living in spiritual darkness; we are not practicing the truth. '
  '7':
  - type: text
    content: But if we are living in the light, as God is in the light, then we have fellowship with each other, and the blood of Jesus, his Son, cleanses us from all sin.
  '8':
  - type: text
    content: 'If we claim we have no sin, we are only fooling ourselves and not living in the truth. '
  '9':
  - type: text
    content: 'But if we confess our sins to him, he is faithful and just to forgive us our sins and to cleanse us from all wickedness. '
