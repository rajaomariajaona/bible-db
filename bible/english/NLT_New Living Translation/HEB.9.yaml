document_id: HEB.9,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Old Rules about Worship
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'That first covenant between God and Israel had regulations for worship and a place of worship here on earth. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For that old system deals only with food and drink and various cleansing ceremonies—physical regulations that were in effect only until a better system could be established.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Christ Is the Perfect Sacrifice
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So Christ has now become the High Priest over all the good things that have come.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: that are about to come.
      marker-yv: yv-n
    - type: text
      text: ' He has entered that greater, more perfect Tabernacle in heaven, which was not made by human hands and is not part of this created world. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: With his own blood—not the blood of goats and calves—he entered the Most Holy Place once for all time and secured our redemption forever.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Under the old system, the blood of goats and bulls and the ashes of a heifer could cleanse people’s bodies from ceremonial impurity. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Just think how much more the blood of Christ will purify our consciences from sinful deeds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from dead works.
      marker-yv: yv-n
    - type: text
      text: ' so that we can worship the living God. For by the power of the eternal Spirit, Christ offered himself to God as a perfect sacrifice for our sins. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That is why he is the one who mediates a new covenant between God and people, so that all who are called can receive the eternal inheritance God has promised them. For Christ died to set them free from the penalty of the sins they had committed under that first covenant.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now when someone leaves a will,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:16a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'covenant; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 9:17.
      marker-yv: yv-n
    - type: text
      text: ' it is necessary to prove that the person who made it is dead.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:16b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Now when someone makes a covenant, it is necessary to ratify it with the death of a sacrifice.
      marker-yv: yv-n
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The will goes into effect only after the person’s death. While the person who made it is still alive, the will cannot be put into effect.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That is why even the first covenant was put into effect with the blood of an animal. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For after Moses had read each of God’s commandments to all the people, he took the blood of calves and goats,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts do not include '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and goats.
      marker-yv: yv-n
    - type: text
      text: ' along with water, and sprinkled both the book of God’s law and all the people, using hyssop branches and scarlet wool. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: There were two rooms in that Tabernacle.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tent; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 9:11, 21.
      marker-yv: yv-n
    - type: text
      text: ' In the first room were a lampstand, a table, and sacred loaves of bread on the table. This room was called the Holy Place. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he said, “This blood confirms the covenant God has made with you.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exod 24:8.
      marker-yv: yv-n
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in the same way, he sprinkled blood on the Tabernacle and on everything used for worship. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In fact, according to the law of Moses, nearly everything was purified with blood. For without the shedding of blood, there is no forgiveness.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That is why the Tabernacle and everything in it, which were copies of things in heaven, had to be purified by the blood of animals. But the real things in heaven had to be purified with far better sacrifices than the blood of animals.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For Christ did not enter into a holy place made with human hands, which was only a copy of the true one in heaven. He entered into heaven itself to appear now before God on our behalf. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he did not enter heaven to offer himself again and again, like the high priest here on earth who enters the Most Holy Place year after year with the blood of an animal. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If that had been necessary, Christ would have had to die again and again, ever since the world began. But now, once for all time, he has appeared at the end of the age
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the ages.
      marker-yv: yv-n
    - type: text
      text: ' to remove sin by his own death as a sacrifice.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And just as each person is destined to die once and after that comes judgment, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: so also Christ was offered once for all time as a sacrifice to take away the sins of many people. He will come again, not to deal with our sins, but to bring salvation to all who are eagerly waiting for him.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then there was a curtain, and behind the curtain was the second room
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: second tent.
      marker-yv: yv-n
    - type: text
      text: ' called the Most Holy Place. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'In that room were a gold incense altar and a wooden chest called the Ark of the Covenant, which was covered with gold on all sides. Inside the Ark were a gold jar containing manna, Aaron’s staff that sprouted leaves, and the stone tablets of the covenant. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Above the Ark were the cherubim of divine glory, whose wings stretched out over the Ark’s cover, the place of atonement. But we cannot explain these things in detail now.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When these things were all in place, the priests regularly entered the first room
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: first tent.
      marker-yv: yv-n
    - type: text
      text: ' as they performed their religious duties. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But only the high priest ever entered the Most Holy Place, and only once a year. And he always offered blood for his own sins and for the sins the people had committed in ignorance. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: By these regulations the Holy Spirit revealed that the entrance to the Most Holy Place was not freely open as long as the Tabernacle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the first room; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the first tent.
      marker-yv: yv-n
    - type: text
      text: ' and the system it represented were still in use.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is an illustration pointing to the present time. For the gifts and sacrifices that the priests offer are not able to cleanse the consciences of the people who bring them. '
