document_id: 1TI.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Warnings against False Teachers
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the Holy Spirit tells us clearly that in the last times some will turn away from the true faith; they will follow deceptive spirits and teachings that come from demons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: These people are hypocrites and liars, and their consciences are dead.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: are seared.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'They will say it is wrong to be married and wrong to eat certain foods. But God created those foods to be eaten with thanks by faithful people who know the truth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Since everything God created is good, we should not reject any of it but receive it with thanks. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For we know it is made acceptable
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: made holy.
    marker-yv: yv-n
  - type: text
    text: ' by the word of God and prayer.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Good Servant of Christ Jesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: If you explain these things to the brothers and sisters,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: brothers.
    marker-yv: yv-n
  - type: text
    text: ' Timothy, you will be a worthy servant of Christ Jesus, one who is nourished by the message of faith and the good teaching you have followed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Do not waste time arguing over godless ideas and old wives’ tales. Instead, train yourself to be godly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“Physical training is good, but training for godliness is much better, promising benefits in this life and in the life to come.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'This is a trustworthy saying, and everyone should accept it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: This is why we work hard and continue to struggle,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: continue to suffer.
    marker-yv: yv-n
  - type: text
    text: ' for our hope is in the living God, who is the Savior of all people and particularly of all believers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Teach these things and insist that everyone learn them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Don’t let anyone think less of you because you are young. Be an example to all believers in what you say, in the way you live, in your love, your faith, and your purity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Until I get there, focus on reading the Scriptures to the church, encouraging the believers, and teaching them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Do not neglect the spiritual gift you received through the prophecy spoken over you when the elders of the church laid their hands on you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Give your complete attention to these matters. Throw yourself into your tasks so that everyone will see your progress. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Keep a close watch on how you live and on your teaching. Stay true to what is right for the sake of your own salvation and the salvation of those who hear you.
