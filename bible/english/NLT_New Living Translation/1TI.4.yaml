document_id: 1TI.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Warnings against False Teachers
  - type: text
    content: 'Now the Holy Spirit tells us clearly that in the last times some will turn away from the true faith; they will follow deceptive spirits and teachings that come from demons. '
  '10':
  - type: text
    content: This is why we work hard and continue to struggle,
  - type: note
    content: Some manuscripts read continue to suffer.
  - type: text
    content: ' for our hope is in the living God, who is the Savior of all people and particularly of all believers.'
  '11':
  - type: text
    content: 'Teach these things and insist that everyone learn them. '
  '12':
  - type: text
    content: 'Don’t let anyone think less of you because you are young. Be an example to all believers in what you say, in the way you live, in your love, your faith, and your purity. '
  '13':
  - type: text
    content: Until I get there, focus on reading the Scriptures to the church, encouraging the believers, and teaching them.
  '14':
  - type: text
    content: 'Do not neglect the spiritual gift you received through the prophecy spoken over you when the elders of the church laid their hands on you. '
  '15':
  - type: text
    content: 'Give your complete attention to these matters. Throw yourself into your tasks so that everyone will see your progress. '
  '16':
  - type: text
    content: Keep a close watch on how you live and on your teaching. Stay true to what is right for the sake of your own salvation and the salvation of those who hear you.
  '2':
  - type: text
    content: These people are hypocrites and liars, and their consciences are dead.
  - type: note
    content: Greek are seared.
  '3':
  - type: text
    content: 'They will say it is wrong to be married and wrong to eat certain foods. But God created those foods to be eaten with thanks by faithful people who know the truth. '
  '4':
  - type: text
    content: 'Since everything God created is good, we should not reject any of it but receive it with thanks. '
  '5':
  - type: text
    content: For we know it is made acceptable
  - type: note
    content: Or made holy.
  - type: text
    content: ' by the word of God and prayer.'
  - type: heading
    content: A Good Servant of Christ Jesus
  '6':
  - type: text
    content: If you explain these things to the brothers and sisters,
  - type: note
    content: Greek brothers.
  - type: text
    content: ' Timothy, you will be a worthy servant of Christ Jesus, one who is nourished by the message of faith and the good teaching you have followed. '
  '7':
  - type: text
    content: 'Do not waste time arguing over godless ideas and old wives’ tales. Instead, train yourself to be godly. '
  '8':
  - type: text
    content: '“Physical training is good, but training for godliness is much better, promising benefits in this life and in the life to come.” '
  '9':
  - type: text
    content: 'This is a trustworthy saying, and everyone should accept it. '
