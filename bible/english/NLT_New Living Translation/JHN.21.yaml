document_id: JHN.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Epilogue: Jesus Appears to Seven Disciples'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Later, Jesus appeared again to the disciples beside the Sea of Galilee.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Sea of Tiberias, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: another name for the Sea of Galilee.
    marker-yv: yv-n
  - type: text
    text: ' This is how it happened. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Several of the disciples were there—Simon Peter, Thomas (nicknamed the Twin),
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Thomas, who was called Didymus.
    marker-yv: yv-n
  - type: text
    text: ' Nathanael from Cana in Galilee, the sons of Zebedee, and two other disciples.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Simon Peter said, “I’m going fishing.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “We’ll come, too,” they all said. So they went out in the boat, but they caught nothing all night.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'At dawn Jesus was standing on the beach, but the disciples couldn’t see who he was. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He called out, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Fellows,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Children.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: have you caught any fish?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “No,” they replied.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Throw out your net on the right-hand side of the boat, and you’ll get some!”
  - type: text
    text: ' So they did, and they couldn’t haul in the net because there were so many fish in it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then the disciple Jesus loved said to Peter, “It’s the Lord!” When Simon Peter heard that it was the Lord, he put on his tunic (for he had stripped for work), jumped into the water, and headed to shore. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The others stayed with the boat and pulled the loaded net to the shore, for they were only about a hundred yards
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '200 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[90 meters].'
    marker-yv: yv-n
  - type: text
    text: ' from shore. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: When they got there, they found breakfast waiting for them—fish cooking over a charcoal fire, and some bread.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Bring some of the fish you’ve just caught,” '
  - type: text
    text: 'Jesus said. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So Simon Peter went aboard and dragged the net to the shore. There were 153 large fish, and yet the net hadn’t torn.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Now come and have some breakfast!” '
  - type: text
    text: 'Jesus said. None of the disciples dared to ask him, “Who are you?” They knew it was the Lord. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Jesus served them the bread and the fish. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: This was the third time Jesus had appeared to his disciples since he had been raised from the dead.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'After breakfast Jesus asked Simon Peter, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Simon son of John, do you love me more than these?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: more than these others do?
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Yes, Lord,” Peter replied, “you know I love you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Then feed my lambs,” '
  - type: text
    text: Jesus told him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jesus repeated the question: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Simon son of John, do you love me?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Yes, Lord,” Peter said, “you know I love you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Then take care of my sheep,” '
  - type: text
    text: Jesus said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'A third time he asked him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Simon son of John, do you love me?”
- type: usfm
  marker: p
  children:
  - type: text
    text: Peter was hurt that Jesus asked the question a third time. He said, “Lord, you know everything. You know that I love you.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Then feed my sheep.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I tell you the truth, when you were young, you were able to do as you liked; you dressed yourself and went wherever you wanted to go. But when you are old, you will stretch out your hands, and others
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and another one.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will dress you and take you where you don’t want to go.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jesus said this to let him know by what kind of death he would glorify God. Then Jesus told him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Follow me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Peter turned around and saw behind them the disciple Jesus loved—the one who had leaned over to Jesus during supper and asked, “Lord, who will betray you?” '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Peter asked Jesus, “What about him, Lord?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If I want him to remain alive until I return, what is that to you? As for you, follow me.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: So the rumor spread among the community of believers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the brothers.
    marker-yv: yv-n
  - type: text
    text: ' that this disciple wouldn’t die. But that isn’t what Jesus said at all. He only said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If I want him to remain alive until I return, what is that to you?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: This disciple is the one who testifies to these events and has recorded them here. And we know that his account of these things is accurate.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Jesus also did many other things. If they were all written down, I suppose the whole world could not contain the books that would be written.
