document_id: JHN.21,116
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Epilogue: Jesus Appears to Seven Disciples'
  - type: text
    content: Later, Jesus appeared again to the disciples beside the Sea of Galilee.
  - type: note
    content: Greek Sea of Tiberias, another name for the Sea of Galilee.
  - type: text
    content: ' This is how it happened. '
  '10':
  - type: text
    content: ' '
  - type: text
    content: '“Bring some of the fish you’ve just caught,” '
  - type: text
    content: 'Jesus said. '
  '11':
  - type: text
    content: So Simon Peter went aboard and dragged the net to the shore. There were 153 large fish, and yet the net hadn’t torn.
  '12':
  - type: text
    content: ' '
  - type: text
    content: '“Now come and have some breakfast!” '
  - type: text
    content: 'Jesus said. None of the disciples dared to ask him, “Who are you?” They knew it was the Lord. '
  '13':
  - type: text
    content: 'Then Jesus served them the bread and the fish. '
  '14':
  - type: text
    content: This was the third time Jesus had appeared to his disciples since he had been raised from the dead.
  '15':
  - type: text
    content: 'After breakfast Jesus asked Simon Peter, '
  - type: text
    content: “Simon son of John, do you love me more than these?
  - type: note
    content: Or more than these others do?
  - type: text
    content: ”
  - type: text
    content: “Yes, Lord,” Peter replied, “you know I love you.”
  - type: text
    content: '“Then feed my lambs,” '
  - type: text
    content: Jesus told him.
  '16':
  - type: text
    content: 'Jesus repeated the question: '
  - type: text
    content: “Simon son of John, do you love me?”
  - type: text
    content: “Yes, Lord,” Peter said, “you know I love you.”
  - type: text
    content: '“Then take care of my sheep,” '
  - type: text
    content: Jesus said.
  '17':
  - type: text
    content: 'A third time he asked him, '
  - type: text
    content: “Simon son of John, do you love me?”
  - type: text
    content: Peter was hurt that Jesus asked the question a third time. He said, “Lord, you know everything. You know that I love you.”
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Then feed my sheep.
  '18':
  - type: text
    content: ' '
  - type: text
    content: “I tell you the truth, when you were young, you were able to do as you liked; you dressed yourself and went wherever you wanted to go. But when you are old, you will stretch out your hands, and others
  - type: text
    content: ' '
  - type: note
    content: Some manuscripts read and another one.
  - type: text
    content: will dress you and take you where you don’t want to go.”
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Jesus said this to let him know by what kind of death he would glorify God. Then Jesus told him, '
  - type: text
    content: “Follow me.”
  '2':
  - type: text
    content: Several of the disciples were there—Simon Peter, Thomas (nicknamed the Twin),
  - type: note
    content: Greek Thomas, who was called Didymus.
  - type: text
    content: ' Nathanael from Cana in Galilee, the sons of Zebedee, and two other disciples.'
  '20':
  - type: text
    content: 'Peter turned around and saw behind them the disciple Jesus loved—the one who had leaned over to Jesus during supper and asked, “Lord, who will betray you?” '
  '21':
  - type: text
    content: Peter asked Jesus, “What about him, Lord?”
  '22':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “If I want him to remain alive until I return, what is that to you? As for you, follow me.”
  - type: text
    content: ' '
  '23':
  - type: text
    content: So the rumor spread among the community of believers
  - type: note
    content: Greek the brothers.
  - type: text
    content: ' that this disciple wouldn’t die. But that isn’t what Jesus said at all. He only said, '
  - type: text
    content: “If I want him to remain alive until I return, what is that to you?”
  '24':
  - type: text
    content: This disciple is the one who testifies to these events and has recorded them here. And we know that his account of these things is accurate.
  '25':
  - type: text
    content: Jesus also did many other things. If they were all written down, I suppose the whole world could not contain the books that would be written.
  '3':
  - type: text
    content: Simon Peter said, “I’m going fishing.”
  - type: text
    content: “We’ll come, too,” they all said. So they went out in the boat, but they caught nothing all night.
  '4':
  - type: text
    content: 'At dawn Jesus was standing on the beach, but the disciples couldn’t see who he was. '
  '5':
  - type: text
    content: 'He called out, '
  - type: text
    content: “Fellows,
  - type: note
    content: Greek Children.
  - type: text
    content: ' '
  - type: text
    content: have you caught any fish?”
  - type: text
    content: “No,” they replied.
  '6':
  - type: text
    content: 'Then he said, '
  - type: text
    content: “Throw out your net on the right-hand side of the boat, and you’ll get some!”
  - type: text
    content: ' So they did, and they couldn’t haul in the net because there were so many fish in it.'
  '7':
  - type: text
    content: 'Then the disciple Jesus loved said to Peter, “It’s the Lord!” When Simon Peter heard that it was the Lord, he put on his tunic (for he had stripped for work), jumped into the water, and headed to shore. '
  '8':
  - type: text
    content: The others stayed with the boat and pulled the loaded net to the shore, for they were only about a hundred yards
  - type: note
    content: Greek 200 cubits [90 meters].
  - type: text
    content: ' from shore. '
  '9':
  - type: text
    content: When they got there, they found breakfast waiting for them—fish cooking over a charcoal fire, and some bread.
