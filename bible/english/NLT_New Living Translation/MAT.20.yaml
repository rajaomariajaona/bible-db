document_id: MAT.20,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Parable of the Vineyard Workers
  - type: text
    content: ' '
  - type: text
    content: “For the Kingdom of Heaven is like the landowner who went out early one morning to hire workers for his vineyard.
  - type: text
    content: ' '
  '10':
  - type: text
    content: When those hired first came to get their pay, they assumed they would receive more. But they, too, were paid a day’s wage.
  - type: text
    content: ' '
  '11':
  - type: text
    content: When they received their pay, they protested to the owner,
  - type: text
    content: ' '
  '12':
  - type: text
    content: ‘Those people worked only one hour, and yet you’ve paid them just as much as you paid us who worked all day in the scorching heat.’
  '13':
  - type: text
    content: ' '
  - type: text
    content: “He answered one of them, ‘Friend, I haven’t been unfair! Didn’t you agree to work all day for the usual wage?
  - type: text
    content: ' '
  '14':
  - type: text
    content: Take your money and go. I wanted to pay this last worker the same as you.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Is it against the law for me to do what I want with my money? Should you be jealous because I am kind to others?’
  '16':
  - type: text
    content: ' '
  - type: text
    content: “So those who are last now will be first then, and those who are first will be last.”
  - type: heading
    content: Jesus Again Predicts His Death
  '17':
  - type: text
    content: 'As Jesus was going up to Jerusalem, he took the twelve disciples aside privately and told them what was going to happen to him. '
  '18':
  - type: text
    content: '“Listen,” '
  - type: text
    content: 'he said, '
  - type: text
    content: “we’re going up to Jerusalem, where the Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: will be betrayed to the leading priests and the teachers of religious law. They will sentence him to die.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Then they will hand him over to the Romans
  - type: note
    content: Greek the Gentiles.
  - type: text
    content: ' '
  - type: text
    content: to be mocked, flogged with a whip, and crucified. But on the third day he will be raised from the dead.”
  - type: heading
    content: Jesus Teaches about Serving Others
  '2':
  - type: text
    content: He agreed to pay the normal daily wage
  - type: note
    content: Greek a denarius, the payment for a full day’s labor; similarly in 20:9, 10, 13.
  - type: text
    content: ' '
  - type: text
    content: and sent them out to work.
  '20':
  - type: text
    content: 'Then the mother of James and John, the sons of Zebedee, came to Jesus with her sons. She knelt respectfully to ask a favor. '
  '21':
  - type: text
    content: '“What is your request?” '
  - type: text
    content: he asked.
  - type: text
    content: She replied, “In your Kingdom, please let my two sons sit in places of honor next to you, one on your right and the other on your left.”
  '22':
  - type: text
    content: 'But Jesus answered by saying to them, '
  - type: text
    content: “You don’t know what you are asking! Are you able to drink from the bitter cup of suffering I am about to drink?”
  - type: text
    content: “Oh yes,” they replied, “we are able!”
  '23':
  - type: text
    content: 'Jesus told them, '
  - type: text
    content: “You will indeed drink from my bitter cup. But I have no right to say who will sit on my right or my left. My Father has prepared those places for the ones he has chosen.”
  '24':
  - type: text
    content: 'When the ten other disciples heard what James and John had asked, they were indignant. '
  '25':
  - type: text
    content: 'But Jesus called them together and said, '
  - type: text
    content: “You know that the rulers in this world lord it over their people, and officials flaunt their authority over those under them.
  - type: text
    content: ' '
  '26':
  - type: text
    content: But among you it will be different. Whoever wants to be a leader among you must be your servant,
  - type: text
    content: ' '
  '27':
  - type: text
    content: and whoever wants to be first among you must become your slave.
  - type: text
    content: ' '
  '28':
  - type: text
    content: For even the Son of Man came not to be served but to serve others and to give his life as a ransom for many.”
  - type: heading
    content: Jesus Heals Two Blind Men
  '29':
  - type: text
    content: 'As Jesus and the disciples left the town of Jericho, a large crowd followed behind. '
  '3':
  - type: text
    content: ' '
  - type: text
    content: “At nine o’clock in the morning he was passing through the marketplace and saw some people standing around doing nothing.
  - type: text
    content: ' '
  '30':
  - type: text
    content: Two blind men were sitting beside the road. When they heard that Jesus was coming that way, they began shouting, “Lord, Son of David, have mercy on us!”
  '31':
  - type: text
    content: “Be quiet!” the crowd yelled at them.
  - type: text
    content: But they only shouted louder, “Lord, Son of David, have mercy on us!”
  '32':
  - type: text
    content: 'When Jesus heard them, he stopped and called, '
  - type: text
    content: “What do you want me to do for you?”
  '33':
  - type: text
    content: '“Lord,” they said, “we want to see!” '
  '34':
  - type: text
    content: Jesus felt sorry for them and touched their eyes. Instantly they could see! Then they followed him.
  '4':
  - type: text
    content: So he hired them, telling them he would pay them whatever was right at the end of the day.
  - type: text
    content: ' '
  '5':
  - type: text
    content: So they went to work in the vineyard. At noon and again at three o’clock he did the same thing.
  '6':
  - type: text
    content: ' '
  - type: text
    content: “At five o’clock that afternoon he was in town again and saw some more people standing around. He asked them, ‘Why haven’t you been working today?’
  '7':
  - type: text
    content: ' '
  - type: text
    content: “They replied, ‘Because no one hired us.’
  - type: text
    content: “The landowner told them, ‘Then go out and join the others in my vineyard.’
  '8':
  - type: text
    content: ' '
  - type: text
    content: “That evening he told the foreman to call the workers in and pay them, beginning with the last workers first.
  - type: text
    content: ' '
  '9':
  - type: text
    content: When those hired at five o’clock were paid, each received a full day’s wage.
  - type: text
    content: ' '
