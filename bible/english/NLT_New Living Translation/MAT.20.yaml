document_id: MAT.20,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Parable of the Vineyard Workers
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “For the Kingdom of Heaven is like the landowner who went out early one morning to hire workers for his vineyard.
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: When those hired first came to get their pay, they assumed they would receive more. But they, too, were paid a day’s wage.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: When they received their pay, they protested to the owner,
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘Those people worked only one hour, and yet you’ve paid them just as much as you paid us who worked all day in the scorching heat.’
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “He answered one of them, ‘Friend, I haven’t been unfair! Didn’t you agree to work all day for the usual wage?
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Take your money and go. I wanted to pay this last worker the same as you.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Is it against the law for me to do what I want with my money? Should you be jealous because I am kind to others?’
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “So those who are last now will be first then, and those who are first will be last.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Again Predicts His Death
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'As Jesus was going up to Jerusalem, he took the twelve disciples aside privately and told them what was going to happen to him. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Listen,” '
    - type: text
      text: 'he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “we’re going up to Jerusalem, where the Son of Man
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Son of Man” is a title Jesus used for himself.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: will be betrayed to the leading priests and the teachers of religious law. They will sentence him to die.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Then they will hand him over to the Romans
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Gentiles.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: to be mocked, flogged with a whip, and crucified. But on the third day he will be raised from the dead.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Teaches about Serving Others
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He agreed to pay the normal daily wage
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'a denarius, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: the payment for a full day’s labor; similarly in 20:9, 10, 13.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and sent them out to work.
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the mother of James and John, the sons of Zebedee, came to Jesus with her sons. She knelt respectfully to ask a favor. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“What is your request?” '
    - type: text
      text: he asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: She replied, “In your Kingdom, please let my two sons sit in places of honor next to you, one on your right and the other on your left.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus answered by saying to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You don’t know what you are asking! Are you able to drink from the bitter cup of suffering I am about to drink?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Oh yes,” they replied, “we are able!”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus told them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You will indeed drink from my bitter cup. But I have no right to say who will sit on my right or my left. My Father has prepared those places for the ones he has chosen.”
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the ten other disciples heard what James and John had asked, they were indignant. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus called them together and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You know that the rulers in this world lord it over their people, and officials flaunt their authority over those under them.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But among you it will be different. Whoever wants to be a leader among you must be your servant,
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and whoever wants to be first among you must become your slave.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For even the Son of Man came not to be served but to serve others and to give his life as a ransom for many.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Heals Two Blind Men
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'As Jesus and the disciples left the town of Jericho, a large crowd followed behind. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “At nine o’clock in the morning he was passing through the marketplace and saw some people standing around doing nothing.
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Two blind men were sitting beside the road. When they heard that Jesus was coming that way, they began shouting, “Lord, Son of David, have mercy on us!”
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Be quiet!” the crowd yelled at them.
  - type: usfm
    marker: p
    children:
    - type: text
      text: But they only shouted louder, “Lord, Son of David, have mercy on us!”
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus heard them, he stopped and called, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What do you want me to do for you?”
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Lord,” they said, “we want to see!” '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus felt sorry for them and touched their eyes. Instantly they could see! Then they followed him.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So he hired them, telling them he would pay them whatever was right at the end of the day.
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So they went to work in the vineyard. At noon and again at three o’clock he did the same thing.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “At five o’clock that afternoon he was in town again and saw some more people standing around. He asked them, ‘Why haven’t you been working today?’
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “They replied, ‘Because no one hired us.’
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The landowner told them, ‘Then go out and join the others in my vineyard.’
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “That evening he told the foreman to call the workers in and pay them, beginning with the last workers first.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: When those hired at five o’clock were paid, each received a full day’s wage.
    - type: text
      text: ' '
