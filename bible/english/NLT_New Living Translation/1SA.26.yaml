document_id: 1SA.26,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Spares Saul Again
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Now some men from Ziph came to Saul at Gibeah to tell him, “David is hiding on the hill of Hakilah, which overlooks Jeshimon.”
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Surely the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will strike Saul down someday, or he will die of old age or in battle. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' forbid that I should kill the one he has anointed! But take his spear and that jug of water beside his head, and then let’s get out of here!”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'So David took the spear and jug of water that were near Saul’s head. Then he and Abishai got away without anyone seeing them or even waking up, because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had put Saul’s men into a deep sleep.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'David climbed the hill opposite the camp until he was at a safe distance. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Then he shouted down to the soldiers and to Abner son of Ner, “Wake up, Abner!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Who is it?” Abner demanded.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '“Well, Abner, you’re a great man, aren’t you?” David taunted. “Where in all Israel is there anyone as mighty? So why haven’t you guarded your master the king when someone came to kill him? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'This isn’t good at all! I swear by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' that you and your men deserve to die, because you failed to protect your master, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anointed! Look around! Where are the king’s spear and the jug of water that were beside his head?”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Saul recognized David’s voice and called out, “Is that you, my son David?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David replied, “Yes, my lord the king. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Why are you chasing me? What have I done? What is my crime? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'But now let my lord the king listen to his servant. If the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has stirred you up against me, then let him accept my offering. But if this is simply a human scheme, then may those involved be cursed by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. For they have driven me from my home, so I can no longer live among the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s people, and they have said, ‘Go, worship pagan gods.’ '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'So Saul took 3,000 of Israel’s elite troops and went to hunt him down in the wilderness of Ziph. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Must I die on foreign soil, far from the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '? Why has the king of Israel come out to search for a single flea? Why does he hunt me down like a partridge on the mountains?”'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Then Saul confessed, “I have sinned. Come back home, my son, and I will no longer try to harm you, for you valued my life today. I have been a fool and very, very wrong.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '“Here is your spear, O king,” David replied. “Let one of your young men come over and get it. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gives his own reward for doing good and for being loyal, and I refused to kill you even when the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' placed you in my power, for you are the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s anointed one. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Now may the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' value my life, even as I have valued yours today. May he rescue me from all my troubles.”'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: And Saul said to David, “Blessings on you, my son David. You will do many heroic deeds, and you will surely succeed.” Then David went away, and Saul returned home.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Saul camped along the road beside the hill of Hakilah, near Jeshimon, where David was hiding. When David learned that Saul had come after him into the wilderness, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: he sent out spies to verify the report of Saul’s arrival.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'David slipped over to Saul’s camp one night to look around. Saul and Abner son of Ner, the commander of his army, were sleeping inside a ring formed by the slumbering warriors. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “Who will volunteer to go in there with me?” David asked Ahimelech the Hittite and Abishai son of Zeruiah, Joab’s brother.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I’ll go with you,” Abishai replied. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: So David and Abishai went right into Saul’s camp and found him asleep, with his spear stuck in the ground beside his head. Abner and the soldiers were lying asleep around him.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “God has surely handed your enemy over to you this time!” Abishai whispered to David. “Let me pin him to the ground with one thrust of the spear; I won’t need to strike twice!”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '“No!” David said. “Don’t kill him. For who can remain innocent after attacking the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s anointed one? '
