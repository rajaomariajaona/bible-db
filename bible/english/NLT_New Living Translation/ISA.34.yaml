document_id: ISA.34
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message for the Nations
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Come here and listen, O nations of the earth.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let the world and everything in it hear my words.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is enraged against the nations.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: His fury is against all their armies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will completely destroy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term used here refers to the complete consecration of things or people to the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ', either by destroying them or by giving them as an offering; similarly in 34:5.'
    marker-yv: yv-n
  - type: text
    text: ' them,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: dooming them to slaughter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Their dead will be left unburied,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the stench of rotting bodies will fill the land.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The mountains will flow with their blood.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The heavens above will melt away
- type: usfm
  marker: q2
  children:
  - type: text
    text: and disappear like a rolled-up scroll.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The stars will fall from the sky
- type: usfm
  marker: q2
  children:
  - type: text
    text: like withered leaves from a grapevine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or shriveled figs from a fig tree.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: And when my sword has finished its work in the heavens,
- type: usfm
  marker: q2
  children:
  - type: text
    text: it will fall upon Edom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the nation I have marked for destruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The sword of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is drenched with blood'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and covered with fat—
- type: usfm
  marker: q1
  children:
  - type: text
    text: with the blood of lambs and goats,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with the fat of rams prepared for sacrifice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Yes, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will offer a sacrifice in the city of Bozrah.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will make a mighty slaughter in Edom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Even men as strong as wild oxen will die—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the young men alongside the veterans.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The land will be soaked with blood
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the soil enriched with fat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For it is the day of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s revenge,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the year when Edom will be paid back for all it did to Israel.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to Zion.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The streams of Edom will be filled with burning pitch,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the ground will be covered with fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: This judgment on Edom will never end;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the smoke of its burning will rise forever.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The land will lie deserted from generation to generation.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No one will live there anymore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: It will be haunted by the desert owl and the screech owl,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the great owl and the raven.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The identification of some of these birds is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: For God will measure that land carefully;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will measure it for chaos and destruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: It will be called the Land of Nothing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all its nobles will soon be gone.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Thorns will overrun its palaces;
- type: usfm
  marker: q2
  children:
  - type: text
    text: nettles and thistles will grow in its forts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The ruins will become a haunt for jackals
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a home for owls.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Desert animals will mingle there with hyenas,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their howls filling the night.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wild goats will bleat at one another among the ruins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and night creatures
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Lilith, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: possibly a reference to a mythical demon of the night.
    marker-yv: yv-n
  - type: text
    text: ' will come there to rest.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: There the owl will make her nest and lay her eggs.
- type: usfm
  marker: q2
  children:
  - type: text
    text: She will hatch her young and cover them with her wings.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the buzzards will come,
- type: usfm
  marker: q2
  children:
  - type: text
    text: each one with its mate.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Search the book of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and see what he will do.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Not one of these birds and animals will be missing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and none will lack a mate,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has promised this.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: His Spirit will make it all come true.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He has surveyed and divided the land
- type: usfm
  marker: q2
  children:
  - type: text
    text: and deeded it over to those creatures.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will possess it forever,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from generation to generation.
