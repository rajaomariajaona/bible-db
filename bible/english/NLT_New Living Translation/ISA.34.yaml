document_id: ISA.34,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message for the Nations
  - type: text
    content: Come here and listen, O nations of the earth.
  - type: text
    content: Let the world and everything in it hear my words.
  '10':
  - type: text
    content: This judgment on Edom will never end;
  - type: text
    content: the smoke of its burning will rise forever.
  - type: text
    content: The land will lie deserted from generation to generation.
  - type: text
    content: No one will live there anymore.
  '11':
  - type: text
    content: It will be haunted by the desert owl and the screech owl,
  - type: text
    content: the great owl and the raven.
  - type: note
    content: The identification of some of these birds is uncertain.
  - type: text
    content: For God will measure that land carefully;
  - type: text
    content: he will measure it for chaos and destruction.
  '12':
  - type: text
    content: It will be called the Land of Nothing,
  - type: text
    content: and all its nobles will soon be gone.
  - type: note
    content: The meaning of the Hebrew is uncertain.
  '13':
  - type: text
    content: Thorns will overrun its palaces;
  - type: text
    content: nettles and thistles will grow in its forts.
  - type: text
    content: The ruins will become a haunt for jackals
  - type: text
    content: and a home for owls.
  '14':
  - type: text
    content: Desert animals will mingle there with hyenas,
  - type: text
    content: their howls filling the night.
  - type: text
    content: Wild goats will bleat at one another among the ruins,
  - type: text
    content: and night creatures
  - type: note
    content: Hebrew Lilith, possibly a reference to a mythical demon of the night.
  - type: text
    content: ' will come there to rest.'
  '15':
  - type: text
    content: There the owl will make her nest and lay her eggs.
  - type: text
    content: She will hatch her young and cover them with her wings.
  - type: text
    content: And the buzzards will come,
  - type: text
    content: each one with its mate.
  '16':
  - type: text
    content: 'Search the book of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and see what he will do.
  - type: text
    content: Not one of these birds and animals will be missing,
  - type: text
    content: and none will lack a mate,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' has promised this.'
  - type: text
    content: His Spirit will make it all come true.
  '17':
  - type: text
    content: He has surveyed and divided the land
  - type: text
    content: and deeded it over to those creatures.
  - type: text
    content: They will possess it forever,
  - type: text
    content: from generation to generation.
  '2':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' is enraged against the nations.'
  - type: text
    content: His fury is against all their armies.
  - type: text
    content: He will completely destroy
  - type: note
    content: The Hebrew term used here refers to the complete consecration of things or people to the Lord, either by destroying them or by giving them as an offering; similarly in 34:5.
  - type: text
    content: ' them,'
  - type: text
    content: dooming them to slaughter.
  '3':
  - type: text
    content: Their dead will be left unburied,
  - type: text
    content: and the stench of rotting bodies will fill the land.
  - type: text
    content: The mountains will flow with their blood.
  '4':
  - type: text
    content: The heavens above will melt away
  - type: text
    content: and disappear like a rolled-up scroll.
  - type: text
    content: The stars will fall from the sky
  - type: text
    content: like withered leaves from a grapevine,
  - type: text
    content: or shriveled figs from a fig tree.
  '5':
  - type: text
    content: And when my sword has finished its work in the heavens,
  - type: text
    content: it will fall upon Edom,
  - type: text
    content: the nation I have marked for destruction.
  '6':
  - type: text
    content: 'The sword of the '
  - type: text
    content: Lord
  - type: text
    content: ' is drenched with blood'
  - type: text
    content: and covered with fat—
  - type: text
    content: with the blood of lambs and goats,
  - type: text
    content: with the fat of rams prepared for sacrifice.
  - type: text
    content: 'Yes, the '
  - type: text
    content: Lord
  - type: text
    content: ' will offer a sacrifice in the city of Bozrah.'
  - type: text
    content: He will make a mighty slaughter in Edom.
  '7':
  - type: text
    content: Even men as strong as wild oxen will die—
  - type: text
    content: the young men alongside the veterans.
  - type: text
    content: The land will be soaked with blood
  - type: text
    content: and the soil enriched with fat.
  '8':
  - type: text
    content: 'For it is the day of the '
  - type: text
    content: Lord
  - type: text
    content: ’s revenge,
  - type: text
    content: the year when Edom will be paid back for all it did to Israel.
  - type: note
    content: Hebrew to Zion.
  '9':
  - type: text
    content: The streams of Edom will be filled with burning pitch,
  - type: text
    content: and the ground will be covered with fire.
