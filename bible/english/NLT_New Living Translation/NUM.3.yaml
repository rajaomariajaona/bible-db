document_id: NUM.3,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Levites Appointed for Service
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This is the family line of Aaron and Moses as it was recorded when the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses on Mount Sinai: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Appoint Aaron and his sons to carry out the duties of the priesthood. But any unauthorized person who goes too near the sanctuary must be put to death.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Look, I have chosen the Levites from among the Israelites to serve as substitutes for all the firstborn sons of the people of Israel. The Levites belong to me, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for all the firstborn males are mine. On the day I struck down all the firstborn sons of the Egyptians, I set apart for myself all the firstborn in Israel, both of people and of animals. They are mine; I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Registration of the Levites
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke again to Moses in the wilderness of Sinai. He said, '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Record the names of the members of the tribe of Levi by their families and clans. List every male who is one month old or older.” '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So Moses listed them, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded.'
  '17':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Levi had three sons, whose names were Gershon, Kohath, and Merari.
  '18':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The clans descended from Gershon were named after two of his descendants, Libni and Shimei.
  '19':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The clans descended from Kohath were named after four of his descendants, Amram, Izhar, Hebron, and Uzziel.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The names of Aaron’s sons were Nadab (the oldest), Abihu, Eleazar, and Ithamar. '
  '20':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The clans descended from Merari were named after two of his descendants, Mahli and Mushi.
  - type: usfm
    marker: m
    children:
    - type: text
      text: These were the Levite clans, listed according to their family groups.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The descendants of Gershon were composed of the clans descended from Libni and Shimei. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There were 7,500 males one month old or older among these Gershonite clans. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They were assigned the area to the west of the Tabernacle for their camp. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The leader of the Gershonite clans was Eliasaph son of Lael. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These two clans were responsible to care for the Tabernacle, including the sacred tent with its layers of coverings, the curtain at its entrance, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: the curtains of the courtyard that surrounded the Tabernacle and altar, the curtain at the courtyard entrance, the ropes, and all the equipment related to their use.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The descendants of Kohath were composed of the clans descended from Amram, Izhar, Hebron, and Uzziel. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: There were 8,600
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Greek manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '8,300; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: see total in 3:39.
      marker-yv: yv-n
    - type: text
      text: ' males one month old or older among these Kohathite clans. They were responsible for the care of the sanctuary, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they were assigned the area south of the Tabernacle for their camp. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'These sons of Aaron were anointed and ordained to minister as priests. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The leader of the Kohathite clans was Elizaphan son of Uzziel. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These four clans were responsible for the care of the Ark, the table, the lampstand, the altars, the various articles used in the sanctuary, the inner curtain, and all the equipment related to their use. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eleazar, son of Aaron the priest, was the chief administrator over all the Levites, with special responsibility for the oversight of the sanctuary.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The descendants of Merari were composed of the clans descended from Mahli and Mushi. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There were 6,200 males one month old or older among these Merarite clans. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They were assigned the area north of the Tabernacle for their camp. The leader of the Merarite clans was Zuriel son of Abihail. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These two clans were responsible for the care of the frames supporting the Tabernacle, the crossbars, the pillars, the bases, and all the equipment related to their use. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They were also responsible for the posts of the courtyard and all their bases, pegs, and ropes.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The area in front of the Tabernacle, in the east toward the sunrise,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: toward the sunrise, in front of the Tent of Meeting.
      marker-yv: yv-n
    - type: text
      text: ' was reserved for the tents of Moses and of Aaron and his sons, who had the final responsibility for the sanctuary on behalf of the people of Israel. Anyone other than a priest or Levite who went too near the sanctuary was to be put to death.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Moses and Aaron counted the Levite clans at the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s command, the total number was 22,000 males one month old or older.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Redeeming the Firstborn Sons
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But Nadab and Abihu died in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s presence in the wilderness of Sinai when they burned before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' the wrong kind of fire, different than he had commanded. Since they had no sons, this left only Eleazar and Ithamar to serve as priests with their father, Aaron.'
  '40':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Now count all the firstborn sons in Israel who are one month old or older, and make a list of their names. '
  '41':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The Levites must be reserved for me as substitutes for the firstborn sons of Israel; I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . And the Levites’ livestock must be reserved for me as substitutes for the firstborn livestock of the whole nation of Israel.”
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses counted the firstborn sons of the people of Israel, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The number of firstborn sons who were one month old or older was 22,273.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Take the Levites as substitutes for the firstborn sons of the people of Israel. And take the livestock of the Levites as substitutes for the firstborn livestock of the people of Israel. The Levites belong to me; I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There are 273 more firstborn sons of Israel than there are Levites. To redeem these extra firstborn sons, '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: collect five pieces of silver
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:47 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '5 shekels '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[2 ounces or 57 grams].'
      marker-yv: yv-n
    - type: text
      text: ' for each of them (each piece weighing the same as the sanctuary shekel, which equals twenty gerahs). '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Give the silver to Aaron and his sons as the redemption price for the extra firstborn sons.”
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses collected the silver for redeeming the firstborn sons of Israel who exceeded the number of Levites. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He collected 1,365 pieces of silver
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:50 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1,365 [shekels] of silver '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[34 pounds or 15.5 kilograms].'
      marker-yv: yv-n
    - type: text
      text: ' on behalf of these firstborn sons of Israel (each piece weighing the same as the sanctuary shekel). '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses gave the silver for the redemption to Aaron and his sons, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Call forward the tribe of Levi, and present them to Aaron the priest to serve as his assistants. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They will serve Aaron and the whole community, performing their sacred duties in and around the Tabernacle.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: around the Tent of Meeting, doing service at the Tabernacle.
      marker-yv: yv-n
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They will also maintain all the furnishings of the sacred tent,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the Tent of Meeting; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 3:25.
      marker-yv: yv-n
    - type: text
      text: ' serving in the Tabernacle on behalf of all the Israelites. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Assign the Levites to Aaron and his sons. They have been given from among all the people of Israel to serve as their assistants. '
