document_id: NUM.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Levites Appointed for Service
  - type: text
    content: 'This is the family line of Aaron and Moses as it was recorded when the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses on Mount Sinai: '
  '10':
  - type: text
    content: Appoint Aaron and his sons to carry out the duties of the priesthood. But any unauthorized person who goes too near the sanctuary must be put to death.”
  '11':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '12':
  - type: text
    content: '“Look, I have chosen the Levites from among the Israelites to serve as substitutes for all the firstborn sons of the people of Israel. The Levites belong to me, '
  '13':
  - type: text
    content: 'for all the firstborn males are mine. On the day I struck down all the firstborn sons of the Egyptians, I set apart for myself all the firstborn in Israel, both of people and of animals. They are mine; I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: heading
    content: Registration of the Levites
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke again to Moses in the wilderness of Sinai. He said, '
  '15':
  - type: text
    content: '“Record the names of the members of the tribe of Levi by their families and clans. List every male who is one month old or older.” '
  '16':
  - type: text
    content: 'So Moses listed them, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded.'
  '17':
  - type: text
    content: Levi had three sons, whose names were Gershon, Kohath, and Merari.
  '18':
  - type: text
    content: The clans descended from Gershon were named after two of his descendants, Libni and Shimei.
  '19':
  - type: text
    content: The clans descended from Kohath were named after four of his descendants, Amram, Izhar, Hebron, and Uzziel.
  '2':
  - type: text
    content: 'The names of Aaron’s sons were Nadab (the oldest), Abihu, Eleazar, and Ithamar. '
  '20':
  - type: text
    content: The clans descended from Merari were named after two of his descendants, Mahli and Mushi.
  - type: text
    content: These were the Levite clans, listed according to their family groups.
  '21':
  - type: text
    content: 'The descendants of Gershon were composed of the clans descended from Libni and Shimei. '
  '22':
  - type: text
    content: 'There were 7,500 males one month old or older among these Gershonite clans. '
  '23':
  - type: text
    content: 'They were assigned the area to the west of the Tabernacle for their camp. '
  '24':
  - type: text
    content: 'The leader of the Gershonite clans was Eliasaph son of Lael. '
  '25':
  - type: text
    content: 'These two clans were responsible to care for the Tabernacle, including the sacred tent with its layers of coverings, the curtain at its entrance, '
  '26':
  - type: text
    content: the curtains of the courtyard that surrounded the Tabernacle and altar, the curtain at the courtyard entrance, the ropes, and all the equipment related to their use.
  '27':
  - type: text
    content: 'The descendants of Kohath were composed of the clans descended from Amram, Izhar, Hebron, and Uzziel. '
  '28':
  - type: text
    content: There were 8,600
  - type: note
    content: Some Greek manuscripts read 8,300; see total in 3:39.
  - type: text
    content: ' males one month old or older among these Kohathite clans. They were responsible for the care of the sanctuary, '
  '29':
  - type: text
    content: 'and they were assigned the area south of the Tabernacle for their camp. '
  '3':
  - type: text
    content: 'These sons of Aaron were anointed and ordained to minister as priests. '
  '30':
  - type: text
    content: 'The leader of the Kohathite clans was Elizaphan son of Uzziel. '
  '31':
  - type: text
    content: 'These four clans were responsible for the care of the Ark, the table, the lampstand, the altars, the various articles used in the sanctuary, the inner curtain, and all the equipment related to their use. '
  '32':
  - type: text
    content: Eleazar, son of Aaron the priest, was the chief administrator over all the Levites, with special responsibility for the oversight of the sanctuary.
  '33':
  - type: text
    content: 'The descendants of Merari were composed of the clans descended from Mahli and Mushi. '
  '34':
  - type: text
    content: 'There were 6,200 males one month old or older among these Merarite clans. '
  '35':
  - type: text
    content: 'They were assigned the area north of the Tabernacle for their camp. The leader of the Merarite clans was Zuriel son of Abihail. '
  '36':
  - type: text
    content: 'These two clans were responsible for the care of the frames supporting the Tabernacle, the crossbars, the pillars, the bases, and all the equipment related to their use. '
  '37':
  - type: text
    content: They were also responsible for the posts of the courtyard and all their bases, pegs, and ropes.
  '38':
  - type: text
    content: The area in front of the Tabernacle, in the east toward the sunrise,
  - type: note
    content: Hebrew toward the sunrise, in front of the Tent of Meeting.
  - type: text
    content: ' was reserved for the tents of Moses and of Aaron and his sons, who had the final responsibility for the sanctuary on behalf of the people of Israel. Anyone other than a priest or Levite who went too near the sanctuary was to be put to death.'
  '39':
  - type: text
    content: 'When Moses and Aaron counted the Levite clans at the '
  - type: text
    content: Lord
  - type: text
    content: ’s command, the total number was 22,000 males one month old or older.
  - type: heading
    content: Redeeming the Firstborn Sons
  '4':
  - type: text
    content: 'But Nadab and Abihu died in the '
  - type: text
    content: Lord
  - type: text
    content: '’s presence in the wilderness of Sinai when they burned before the '
  - type: text
    content: Lord
  - type: text
    content: ' the wrong kind of fire, different than he had commanded. Since they had no sons, this left only Eleazar and Ithamar to serve as priests with their father, Aaron.'
  '40':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Now count all the firstborn sons in Israel who are one month old or older, and make a list of their names. '
  '41':
  - type: text
    content: 'The Levites must be reserved for me as substitutes for the firstborn sons of Israel; I am the '
  - type: text
    content: Lord
  - type: text
    content: . And the Levites’ livestock must be reserved for me as substitutes for the firstborn livestock of the whole nation of Israel.”
  '42':
  - type: text
    content: 'So Moses counted the firstborn sons of the people of Israel, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded. '
  '43':
  - type: text
    content: The number of firstborn sons who were one month old or older was 22,273.
  '44':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '45':
  - type: text
    content: '“Take the Levites as substitutes for the firstborn sons of the people of Israel. And take the livestock of the Levites as substitutes for the firstborn livestock of the people of Israel. The Levites belong to me; I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '46':
  - type: text
    content: 'There are 273 more firstborn sons of Israel than there are Levites. To redeem these extra firstborn sons, '
  '47':
  - type: text
    content: collect five pieces of silver
  - type: note
    content: Hebrew 5 shekels [2 ounces or 57 grams].
  - type: text
    content: ' for each of them (each piece weighing the same as the sanctuary shekel, which equals twenty gerahs). '
  '48':
  - type: text
    content: Give the silver to Aaron and his sons as the redemption price for the extra firstborn sons.”
  '49':
  - type: text
    content: 'So Moses collected the silver for redeeming the firstborn sons of Israel who exceeded the number of Levites. '
  '5':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '50':
  - type: text
    content: He collected 1,365 pieces of silver
  - type: note
    content: Hebrew 1,365 [shekels] of silver [34 pounds or 15.5 kilograms].
  - type: text
    content: ' on behalf of these firstborn sons of Israel (each piece weighing the same as the sanctuary shekel). '
  '51':
  - type: text
    content: 'And Moses gave the silver for the redemption to Aaron and his sons, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded.'
  '6':
  - type: text
    content: '“Call forward the tribe of Levi, and present them to Aaron the priest to serve as his assistants. '
  '7':
  - type: text
    content: They will serve Aaron and the whole community, performing their sacred duties in and around the Tabernacle.
  - type: note
    content: Hebrew around the Tent of Meeting, doing service at the Tabernacle.
  - type: text
    content: ' '
  '8':
  - type: text
    content: They will also maintain all the furnishings of the sacred tent,
  - type: note
    content: Hebrew the Tent of Meeting; also in 3:25.
  - type: text
    content: ' serving in the Tabernacle on behalf of all the Israelites. '
  '9':
  - type: text
    content: 'Assign the Levites to Aaron and his sons. They have been given from among all the people of Israel to serve as their assistants. '
