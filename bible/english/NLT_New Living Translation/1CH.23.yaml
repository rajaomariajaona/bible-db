document_id: 1CH.23,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Duties of the Levites
  - type: text
    content: 'When David was an old man, he appointed his son Solomon to be king over Israel. '
  '10':
  - type: text
    content: Four other descendants of Shimei were Jahath, Ziza,
  - type: note
    content: As in Greek version and Latin Vulgate (see also 23:11); Hebrew reads Zina.
  - type: text
    content: ' Jeush, and Beriah. '
  '11':
  - type: text
    content: Jahath was the family leader, and Ziza was next. Jeush and Beriah were counted as a single family because neither had many sons.
  - type: heading
    content: The Kohathites
  '12':
  - type: text
    content: Four of the descendants of Kohath were Amram, Izhar, Hebron, and Uzziel.
  '13':
  - type: text
    content: 'The sons of Amram were Aaron and Moses. Aaron and his descendants were set apart to dedicate the most holy things, to offer sacrifices in the '
  - type: text
    content: Lord
  - type: text
    content: '’s presence, to serve the '
  - type: text
    content: Lord
  - type: text
    content: ', and to pronounce blessings in his name forever.'
  '14':
  - type: text
    content: 'As for Moses, the man of God, his sons were included with the tribe of Levi. '
  '15':
  - type: text
    content: 'The sons of Moses were Gershom and Eliezer. '
  '16':
  - type: text
    content: 'The descendants of Gershom included Shebuel, the family leader. '
  '17':
  - type: text
    content: Eliezer had only one son, Rehabiah, the family leader. Rehabiah had numerous descendants.
  '18':
  - type: text
    content: The descendants of Izhar included Shelomith, the family leader.
  '19':
  - type: text
    content: The descendants of Hebron included Jeriah (the family leader), Amariah (the second), Jahaziel (the third), and Jekameam (the fourth).
  '2':
  - type: text
    content: 'David summoned all the leaders of Israel, together with the priests and Levites. '
  '20':
  - type: text
    content: The descendants of Uzziel included Micah (the family leader) and Isshiah (the second).
  - type: heading
    content: The Merarites
  '21':
  - type: text
    content: The descendants of Merari included Mahli and Mushi.
  - type: text
    content: 'The sons of Mahli were Eleazar and Kish. '
  '22':
  - type: text
    content: Eleazar died with no sons, only daughters. His daughters married their cousins, the sons of Kish.
  '23':
  - type: text
    content: Three of the descendants of Mushi were Mahli, Eder, and Jerimoth.
  '24':
  - type: text
    content: 'These were the descendants of Levi by clans, the leaders of their family groups, registered carefully by name. Each had to be twenty years old or older to qualify for service in the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'For David said, “The '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, has given us peace, and he will always live in Jerusalem. '
  '26':
  - type: text
    content: 'Now the Levites will no longer need to carry the Tabernacle and its furnishings from place to place.” '
  '27':
  - type: text
    content: In accordance with David’s final instructions, all the Levites twenty years old or older were registered for service.
  '28':
  - type: text
    content: 'The work of the Levites was to assist the priests, the descendants of Aaron, as they served at the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. They also took care of the courtyards and side rooms, helped perform the ceremonies of purification, and served in many other ways in the house of God. '
  '29':
  - type: text
    content: 'They were in charge of the sacred bread that was set out on the table, the choice flour for the grain offerings, the wafers made without yeast, the cakes cooked in olive oil, and the other mixed breads. They were also responsible to check all the weights and measures. '
  '3':
  - type: text
    content: 'All the Levites who were thirty years old or older were counted, and the total came to 38,000. '
  '30':
  - type: text
    content: 'And each morning and evening they stood before the '
  - type: text
    content: Lord
  - type: text
    content: ' to sing songs of thanks and praise to him. '
  '31':
  - type: text
    content: 'They assisted with the burnt offerings that were presented to the '
  - type: text
    content: Lord
  - type: text
    content: ' on Sabbath days, at new moon celebrations, and at all the appointed festivals. The required number of Levites served in the '
  - type: text
    content: Lord
  - type: text
    content: ’s presence at all times, following all the procedures they had been given.
  '32':
  - type: text
    content: And so, under the supervision of the priests, the Levites watched over the Tabernacle and the Temple
  - type: note
    content: Hebrew the Tent of Meeting and the sanctuary.
  - type: text
    content: ' and faithfully carried out their duties of service at the house of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: 'Then David said, “From all the Levites, 24,000 will supervise the work at the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. Another 6,000 will serve as officials and judges. '
  '5':
  - type: text
    content: 'Another 4,000 will work as gatekeepers, and 4,000 will praise the '
  - type: text
    content: Lord
  - type: text
    content: ' with the musical instruments I have made.” '
  '6':
  - type: text
    content: Then David divided the Levites into divisions named after the clans descended from the three sons of Levi—Gershon, Kohath, and Merari.
  - type: heading
    content: The Gershonites
  '7':
  - type: text
    content: The Gershonite family units were defined by their lines of descent from Libni
  - type: note
    content: Hebrew Ladan (also in 23:8, 9), a variant spelling of Libni; compare 6:17.
  - type: text
    content: ' and Shimei, the sons of Gershon. '
  '8':
  - type: text
    content: 'Three of the descendants of Libni were Jehiel (the family leader), Zetham, and Joel. '
  '9':
  - type: text
    content: These were the leaders of the family of Libni.
  - type: text
    content: 'Three of the descendants of Shimei were Shelomoth, Haziel, and Haran. '
