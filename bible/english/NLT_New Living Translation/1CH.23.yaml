document_id: 1CH.23
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Duties of the Levites
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When David was an old man, he appointed his son Solomon to be king over Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'David summoned all the leaders of Israel, together with the priests and Levites. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'All the Levites who were thirty years old or older were counted, and the total came to 38,000. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then David said, “From all the Levites, 24,000 will supervise the work at the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. Another 6,000 will serve as officials and judges. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Another 4,000 will work as gatekeepers, and 4,000 will praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' with the musical instruments I have made.” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then David divided the Levites into divisions named after the clans descended from the three sons of Levi—Gershon, Kohath, and Merari.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Gershonites
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The Gershonite family units were defined by their lines of descent from Libni
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ladan '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (also in 23:8, 9), a variant spelling of Libni; compare 6:17.
    marker-yv: yv-n
  - type: text
    text: ' and Shimei, the sons of Gershon. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Three of the descendants of Libni were Jehiel (the family leader), Zetham, and Joel. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: These were the leaders of the family of Libni.
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'Three of the descendants of Shimei were Shelomoth, Haziel, and Haran. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Four other descendants of Shimei were Jahath, Ziza,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version and Latin Vulgate (see also 23:11); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Zina.
    marker-yv: yv-n
  - type: text
    text: ' Jeush, and Beriah. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Jahath was the family leader, and Ziza was next. Jeush and Beriah were counted as a single family because neither had many sons.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Kohathites
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Four of the descendants of Kohath were Amram, Izhar, Hebron, and Uzziel.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The sons of Amram were Aaron and Moses. Aaron and his descendants were set apart to dedicate the most holy things, to offer sacrifices in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s presence, to serve the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and to pronounce blessings in his name forever.'
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'As for Moses, the man of God, his sons were included with the tribe of Levi. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The sons of Moses were Gershom and Eliezer. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The descendants of Gershom included Shebuel, the family leader. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Eliezer had only one son, Rehabiah, the family leader. Rehabiah had numerous descendants.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The descendants of Izhar included Shelomith, the family leader.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The descendants of Hebron included Jeriah (the family leader), Amariah (the second), Jahaziel (the third), and Jekameam (the fourth).
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The descendants of Uzziel included Micah (the family leader) and Isshiah (the second).
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Merarites
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The descendants of Merari included Mahli and Mushi.
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'The sons of Mahli were Eleazar and Kish. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Eleazar died with no sons, only daughters. His daughters married their cousins, the sons of Kish.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Three of the descendants of Mushi were Mahli, Eder, and Jerimoth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'These were the descendants of Levi by clans, the leaders of their family groups, registered carefully by name. Each had to be twenty years old or older to qualify for service in the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'For David said, “The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, has given us peace, and he will always live in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Now the Levites will no longer need to carry the Tabernacle and its furnishings from place to place.” '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: In accordance with David’s final instructions, all the Levites twenty years old or older were registered for service.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'The work of the Levites was to assist the priests, the descendants of Aaron, as they served at the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. They also took care of the courtyards and side rooms, helped perform the ceremonies of purification, and served in many other ways in the house of God. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'They were in charge of the sacred bread that was set out on the table, the choice flour for the grain offerings, the wafers made without yeast, the cakes cooked in olive oil, and the other mixed breads. They were also responsible to check all the weights and measures. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And each morning and evening they stood before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' to sing songs of thanks and praise to him. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'They assisted with the burnt offerings that were presented to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' on Sabbath days, at new moon celebrations, and at all the appointed festivals. The required number of Levites served in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s presence at all times, following all the procedures they had been given.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: And so, under the supervision of the priests, the Levites watched over the Tabernacle and the Temple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Tent of Meeting and the sanctuary.
    marker-yv: yv-n
  - type: text
    text: ' and faithfully carried out their duties of service at the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
