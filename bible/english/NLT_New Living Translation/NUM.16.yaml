document_id: NUM.16,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Korah’s Rebellion
  - type: text
    content: 'One day Korah son of Izhar, a descendant of Kohath son of Levi, conspired with Dathan and Abiram, the sons of Eliab, and On son of Peleth, from the tribe of Reuben. '
  '10':
  - type: text
    content: 'Korah, he has already given this special ministry to you and your fellow Levites. Are you now demanding the priesthood as well? '
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is the one you and your followers are really revolting against! For who is Aaron that you are complaining about him?”'
  '12':
  - type: text
    content: 'Then Moses summoned Dathan and Abiram, the sons of Eliab, but they replied, “We refuse to come before you! '
  '13':
  - type: text
    content: 'Isn’t it enough that you brought us out of Egypt, a land flowing with milk and honey, to kill us here in this wilderness, and that you now treat us like your subjects? '
  '14':
  - type: text
    content: What’s more, you haven’t brought us into another land flowing with milk and honey. You haven’t given us a new homeland with fields and vineyards. Are you trying to fool these men?
  - type: note
    content: Hebrew Are you trying to put out the eyes of these men?
  - type: text
    content: ' We will not come.”'
  '15':
  - type: text
    content: 'Then Moses became very angry and said to the '
  - type: text
    content: Lord
  - type: text
    content: ', “Do not accept their grain offerings! I have not taken so much as a donkey from them, and I have never hurt a single one of them.” '
  '16':
  - type: text
    content: 'And Moses said to Korah, “You and all your followers must come here tomorrow and present yourselves before the '
  - type: text
    content: Lord
  - type: text
    content: '. Aaron will also be here. '
  '17':
  - type: text
    content: 'You and each of your 250 followers must prepare an incense burner and put incense on it, so you can all present them before the '
  - type: text
    content: Lord
  - type: text
    content: . Aaron will also bring his incense burner.”
  '18':
  - type: text
    content: So each of these men prepared an incense burner, lit the fire, and placed incense on it. Then they all stood at the entrance of the Tabernacle
  - type: note
    content: Hebrew the Tent of Meeting; also in 16:19, 42, 43, 50.
  - type: text
    content: ' with Moses and Aaron. '
  '19':
  - type: text
    content: 'Meanwhile, Korah had stirred up the entire community against Moses and Aaron, and they all gathered at the Tabernacle entrance. Then the glorious presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to the whole community, '
  '2':
  - type: text
    content: 'They incited a rebellion against Moses, along with 250 other leaders of the community, all prominent members of the assembly. '
  '20':
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron, '
  '21':
  - type: text
    content: “Get away from all these people so that I may instantly destroy them!”
  '22':
  - type: text
    content: But Moses and Aaron fell face down on the ground. “O God,” they pleaded, “you are the God who gives breath to all creatures. Must you be angry with all the people when only one man sins?”
  '23':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '24':
  - type: text
    content: “Then tell all the people to get away from the tents of Korah, Dathan, and Abiram.”
  '25':
  - type: text
    content: 'So Moses got up and rushed over to the tents of Dathan and Abiram, followed by the elders of Israel. '
  '26':
  - type: text
    content: '“Quick!” he told the people. “Get away from the tents of these wicked men, and don’t touch anything that belongs to them. If you do, you will be destroyed for their sins.” '
  '27':
  - type: text
    content: So all the people stood back from the tents of Korah, Dathan, and Abiram. Then Dathan and Abiram came out and stood at the entrances of their tents, together with their wives and children and little ones.
  '28':
  - type: text
    content: 'And Moses said, “This is how you will know that the '
  - type: text
    content: Lord
  - type: text
    content: ' has sent me to do all these things that I have done—for I have not done them on my own. '
  '29':
  - type: text
    content: 'If these men die a natural death, or if nothing unusual happens, then the '
  - type: text
    content: Lord
  - type: text
    content: ' has not sent me. '
  '3':
  - type: text
    content: 'They united against Moses and Aaron and said, “You have gone too far! The whole community of Israel has been set apart by the '
  - type: text
    content: Lord
  - type: text
    content: ', and he is with all of us. What right do you have to act as though you are greater than the rest of the '
  - type: text
    content: Lord
  - type: text
    content: ’s people?”
  '30':
  - type: text
    content: 'But if the '
  - type: text
    content: Lord
  - type: text
    content: ' does something entirely new and the ground opens its mouth and swallows them and all their belongings, and they go down alive into the grave,'
  - type: note
    content: Hebrew into Sheol; also in 16:33.
  - type: text
    content: ' then you will know that these men have shown contempt for the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '31':
  - type: text
    content: 'He had hardly finished speaking the words when the ground suddenly split open beneath them. '
  '32':
  - type: text
    content: 'The earth opened its mouth and swallowed the men, along with their households and all their followers who were standing with them, and everything they owned. '
  '33':
  - type: text
    content: 'So they went down alive into the grave, along with all their belongings. The earth closed over them, and they all vanished from among the people of Israel. '
  '34':
  - type: text
    content: 'All the people around them fled when they heard their screams. “The earth will swallow us, too!” they cried. '
  '35':
  - type: text
    content: 'Then fire blazed forth from the '
  - type: text
    content: Lord
  - type: text
    content: ' and burned up the 250 men who were offering incense.'
  '36':
  - type: text
    content: ' '
  - type: note
    content: Verses 16:36-50 are numbered 17:1-15 in Hebrew text.
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '37':
  - type: text
    content: '“Tell Eleazar son of Aaron the priest to pull all the incense burners from the fire, for they are holy. Also tell him to scatter the burning coals. '
  '38':
  - type: text
    content: 'Take the incense burners of these men who have sinned at the cost of their lives, and hammer the metal into a thin sheet to overlay the altar. Since these burners were used in the '
  - type: text
    content: Lord
  - type: text
    content: ’s presence, they have become holy. Let them serve as a warning to the people of Israel.”
  '39':
  - type: text
    content: 'So Eleazar the priest collected the 250 bronze incense burners that had been used by the men who died in the fire, and the bronze was hammered into a thin sheet to overlay the altar. '
  '4':
  - type: text
    content: 'When Moses heard what they were saying, he fell face down on the ground. '
  '40':
  - type: text
    content: 'This would warn the Israelites that no unauthorized person—no one who was not a descendant of Aaron—should ever enter the '
  - type: text
    content: Lord
  - type: text
    content: '’s presence to burn incense. If anyone did, the same thing would happen to him as happened to Korah and his followers. So the '
  - type: text
    content: Lord
  - type: text
    content: ’s instructions to Moses were carried out.
  '41':
  - type: text
    content: 'But the very next morning the whole community of Israel began muttering again against Moses and Aaron, saying, “You have killed the '
  - type: text
    content: Lord
  - type: text
    content: '’s people!” '
  '42':
  - type: text
    content: 'As the community gathered to protest against Moses and Aaron, they turned toward the Tabernacle and saw that the cloud had covered it, and the glorious presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared.'
  '43':
  - type: text
    content: 'Moses and Aaron came and stood in front of the Tabernacle, '
  '44':
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '45':
  - type: text
    content: “Get away from all these people so that I can instantly destroy them!” But Moses and Aaron fell face down on the ground.
  '46':
  - type: text
    content: 'And Moses said to Aaron, “Quick, take an incense burner and place burning coals on it from the altar. Lay incense on it, and carry it out among the people to purify them and make them right with the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: Or to make atonement for them.
  - type: text
    content: ' The '
  - type: text
    content: Lord
  - type: text
    content: ’s anger is blazing against them—the plague has already begun.”
  '47':
  - type: text
    content: Aaron did as Moses told him and ran out among the people. The plague had already begun to strike down the people, but Aaron burned the incense and purified
  - type: note
    content: Or and made atonement for.
  - type: text
    content: ' the people. '
  '48':
  - type: text
    content: 'He stood between the dead and the living, and the plague stopped. '
  '49':
  - type: text
    content: 'But 14,700 people died in that plague, in addition to those who had died in the affair involving Korah. '
  '5':
  - type: text
    content: 'Then he said to Korah and his followers, “Tomorrow morning the '
  - type: text
    content: Lord
  - type: text
    content: ' will show us who belongs to him'
  - type: note
    content: Greek version reads God has visited and knows those who are his. Compare 2 Tim 2:19.
  - type: text
    content: ' and who is holy. The '
  - type: text
    content: Lord
  - type: text
    content: ' will allow only those whom he selects to enter his own presence. '
  '50':
  - type: text
    content: Then because the plague had stopped, Aaron returned to Moses at the entrance of the Tabernacle.
  '6':
  - type: text
    content: 'Korah, you and all your followers must prepare your incense burners. '
  '7':
  - type: text
    content: 'Light fires in them tomorrow, and burn incense before the '
  - type: text
    content: Lord
  - type: text
    content: '. Then we will see whom the '
  - type: text
    content: Lord
  - type: text
    content: ' chooses as his holy one. You Levites are the ones who have gone too far!”'
  '8':
  - type: text
    content: 'Then Moses spoke again to Korah: “Now listen, you Levites! '
  '9':
  - type: text
    content: 'Does it seem insignificant to you that the God of Israel has chosen you from among all the community of Israel to be near him so you can serve in the '
  - type: text
    content: Lord
  - type: text
    content: '’s Tabernacle and stand before the people to minister to them? '
