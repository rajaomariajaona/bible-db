document_id: EPH.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Unity in the Body
  - type: text
    content: 'Therefore I, a prisoner for serving the Lord, beg you to lead a life worthy of your calling, for you have been called by God. '
  '10':
  - type: text
    content: And the same one who descended is the one who ascended higher than all the heavens, so that he might fill the entire universe with himself.
  '11':
  - type: text
    content: 'Now these are the gifts Christ gave to the church: the apostles, the prophets, the evangelists, and the pastors and teachers. '
  '12':
  - type: text
    content: 'Their responsibility is to equip God’s people to do his work and build up the church, the body of Christ. '
  '13':
  - type: text
    content: This will continue until we all come to such unity in our faith and knowledge of God’s Son that we will be mature in the Lord, measuring up to the full and complete standard of Christ.
  '14':
  - type: text
    content: 'Then we will no longer be immature like children. We won’t be tossed and blown about by every wind of new teaching. We will not be influenced when people try to trick us with lies so clever they sound like the truth. '
  '15':
  - type: text
    content: 'Instead, we will speak the truth in love, growing in every way more and more like Christ, who is the head of his body, the church. '
  '16':
  - type: text
    content: He makes the whole body fit together perfectly. As each part does its own special work, it helps the other parts grow, so that the whole body is healthy and growing and full of love.
  - type: heading
    content: Living as Children of Light
  '17':
  - type: text
    content: 'With the Lord’s authority I say this: Live no longer as the Gentiles do, for they are hopelessly confused. '
  '18':
  - type: text
    content: 'Their minds are full of darkness; they wander far from the life God gives because they have closed their minds and hardened their hearts against him. '
  '19':
  - type: text
    content: They have no sense of shame. They live for lustful pleasure and eagerly practice every kind of impurity.
  '2':
  - type: text
    content: 'Always be humble and gentle. Be patient with each other, making allowance for each other’s faults because of your love. '
  '20':
  - type: text
    content: 'But that isn’t what you learned about Christ. '
  '21':
  - type: text
    content: 'Since you have heard about Jesus and have learned the truth that comes from him, '
  '22':
  - type: text
    content: 'throw off your old sinful nature and your former way of life, which is corrupted by lust and deception. '
  '23':
  - type: text
    content: 'Instead, let the Spirit renew your thoughts and attitudes. '
  '24':
  - type: text
    content: Put on your new nature, created to be like God—truly righteous and holy.
  '25':
  - type: text
    content: 'So stop telling lies. Let us tell our neighbors the truth, for we are all parts of the same body. '
  '26':
  - type: text
    content: And “don’t sin by letting anger control you.”
  - type: note
    content: Ps 4:4.
  - type: text
    content: ' Don’t let the sun go down while you are still angry, '
  '27':
  - type: text
    content: for anger gives a foothold to the devil.
  '28':
  - type: text
    content: 'If you are a thief, quit stealing. Instead, use your hands for good hard work, and then give generously to others in need. '
  '29':
  - type: text
    content: Don’t use foul or abusive language. Let everything you say be good and helpful, so that your words will be an encouragement to those who hear them.
  '3':
  - type: text
    content: 'Make every effort to keep yourselves united in the Spirit, binding yourselves together with peace. '
  '30':
  - type: text
    content: And do not bring sorrow to God’s Holy Spirit by the way you live. Remember, he has identified you as his own,
  - type: note
    content: Or has put his seal on you.
  - type: text
    content: ' guaranteeing that you will be saved on the day of redemption.'
  '31':
  - type: text
    content: 'Get rid of all bitterness, rage, anger, harsh words, and slander, as well as all types of evil behavior. '
  '32':
  - type: text
    content: Instead, be kind to each other, tenderhearted, forgiving one another, just as God through Christ has forgiven you.
  '4':
  - type: text
    content: For there is one body and one Spirit, just as you have been called to one glorious hope for the future.
  '5':
  - type: text
    content: There is one Lord, one faith, one baptism,
  '6':
  - type: text
    content: one God and Father of all,
  - type: text
    content: who is over all, in all, and living through all.
  '7':
  - type: text
    content: However, he has given each one of us a special gift
  - type: note
    content: Greek a grace.
  - type: text
    content: ' through the generosity of Christ. '
  '8':
  - type: text
    content: That is why the Scriptures say,
  - type: text
    content: “When he ascended to the heights,
  - type: text
    content: he led a crowd of captives
  - type: text
    content: and gave gifts to his people.”
  - type: note
    content: Ps 68:18.
  '9':
  - type: text
    content: Notice that it says “he ascended.” This clearly means that Christ also descended to our lowly world.
  - type: note
    content: Some manuscripts read to the lower parts of the earth.
  - type: text
    content: ' '
