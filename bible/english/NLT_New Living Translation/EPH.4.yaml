document_id: EPH.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Unity in the Body
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Therefore I, a prisoner for serving the Lord, beg you to lead a life worthy of your calling, for you have been called by God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Always be humble and gentle. Be patient with each other, making allowance for each other’s faults because of your love. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Make every effort to keep yourselves united in the Spirit, binding yourselves together with peace. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For there is one body and one Spirit, just as you have been called to one glorious hope for the future.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: There is one Lord, one faith, one baptism,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: one God and Father of all,
- type: usfm
  marker: q1
  children:
  - type: text
    text: who is over all, in all, and living through all.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: However, he has given each one of us a special gift
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: a grace.
    marker-yv: yv-n
  - type: text
    text: ' through the generosity of Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: That is why the Scriptures say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “When he ascended to the heights,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he led a crowd of captives
- type: usfm
  marker: q2
  children:
  - type: text
    text: and gave gifts to his people.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 68:18.
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Notice that it says “he ascended.” This clearly means that Christ also descended to our lowly world.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to the lower parts of the earth.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And the same one who descended is the one who ascended higher than all the heavens, so that he might fill the entire universe with himself.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now these are the gifts Christ gave to the church: the apostles, the prophets, the evangelists, and the pastors and teachers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Their responsibility is to equip God’s people to do his work and build up the church, the body of Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: This will continue until we all come to such unity in our faith and knowledge of God’s Son that we will be mature in the Lord, measuring up to the full and complete standard of Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then we will no longer be immature like children. We won’t be tossed and blown about by every wind of new teaching. We will not be influenced when people try to trick us with lies so clever they sound like the truth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Instead, we will speak the truth in love, growing in every way more and more like Christ, who is the head of his body, the church. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He makes the whole body fit together perfectly. As each part does its own special work, it helps the other parts grow, so that the whole body is healthy and growing and full of love.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Living as Children of Light
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'With the Lord’s authority I say this: Live no longer as the Gentiles do, for they are hopelessly confused. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Their minds are full of darkness; they wander far from the life God gives because they have closed their minds and hardened their hearts against him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: They have no sense of shame. They live for lustful pleasure and eagerly practice every kind of impurity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But that isn’t what you learned about Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Since you have heard about Jesus and have learned the truth that comes from him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'throw off your old sinful nature and your former way of life, which is corrupted by lust and deception. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Instead, let the Spirit renew your thoughts and attitudes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Put on your new nature, created to be like God—truly righteous and holy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'So stop telling lies. Let us tell our neighbors the truth, for we are all parts of the same body. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: And “don’t sin by letting anger control you.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 4:4.
    marker-yv: yv-n
  - type: text
    text: ' Don’t let the sun go down while you are still angry, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: for anger gives a foothold to the devil.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'If you are a thief, quit stealing. Instead, use your hands for good hard work, and then give generously to others in need. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Don’t use foul or abusive language. Let everything you say be good and helpful, so that your words will be an encouragement to those who hear them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: And do not bring sorrow to God’s Holy Spirit by the way you live. Remember, he has identified you as his own,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: has put his seal on you.
    marker-yv: yv-n
  - type: text
    text: ' guaranteeing that you will be saved on the day of redemption.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Get rid of all bitterness, rage, anger, harsh words, and slander, as well as all types of evil behavior. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Instead, be kind to each other, tenderhearted, forgiving one another, just as God through Christ has forgiven you.
