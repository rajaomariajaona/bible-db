document_id: GEN.8,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Flood Recedes
  - type: text
    content: 'But God remembered Noah and all the wild animals and livestock with him in the boat. He sent a wind to blow across the earth, and the floodwaters began to recede. '
  '10':
  - type: text
    content: 'After waiting another seven days, Noah released the dove again. '
  '11':
  - type: text
    content: 'This time the dove returned to him in the evening with a fresh olive leaf in its beak. Then Noah knew that the floodwaters were almost gone. '
  '12':
  - type: text
    content: He waited another seven days and then released the dove again. This time it did not come back.
  '13':
  - type: text
    content: Noah was now 601 years old. On the first day of the new year, ten and a half months after the flood began,
  - type: note
    content: Hebrew On the first day of the first month; see 7:11.
  - type: text
    content: ' the floodwaters had almost dried up from the earth. Noah lifted back the covering of the boat and saw that the surface of the ground was drying. '
  '14':
  - type: text
    content: Two more months went by,
  - type: note
    content: Hebrew The twenty-seventh day of the second month arrived; see note on 8:13.
  - type: text
    content: ' and at last the earth was dry!'
  '15':
  - type: text
    content: 'Then God said to Noah, '
  '16':
  - type: text
    content: '“Leave the boat, all of you—you and your wife, and your sons and their wives. '
  '17':
  - type: text
    content: Release all the animals—the birds, the livestock, and the small animals that scurry along the ground—so they can be fruitful and multiply throughout the earth.”
  '18':
  - type: text
    content: 'So Noah, his wife, and his sons and their wives left the boat. '
  '19':
  - type: text
    content: And all of the large and small animals and birds came out of the boat, pair by pair.
  '2':
  - type: text
    content: 'The underground waters stopped flowing, and the torrential rains from the sky were stopped. '
  '20':
  - type: text
    content: 'Then Noah built an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ', and there he sacrificed as burnt offerings the animals and birds that had been approved for that purpose.'
  - type: note
    content: Hebrew every clean animal and every clean bird.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' was pleased with the aroma of the sacrifice and said to himself, “I will never again curse the ground because of the human race, even though everything they think or imagine is bent toward evil from childhood. I will never again destroy all living things. '
  '22':
  - type: text
    content: As long as the earth remains, there will be planting and harvest, cold and heat, summer and winter, day and night.”
  '3':
  - type: text
    content: 'So the floodwaters gradually receded from the earth. After 150 days, '
  '4':
  - type: text
    content: exactly five months from the time the flood began,
  - type: note
    content: Hebrew on the seventeenth day of the seventh month; see 7:11.
  - type: text
    content: ' the boat came to rest on the mountains of Ararat. '
  '5':
  - type: text
    content: Two and a half months later,
  - type: note
    content: Hebrew On the first day of the tenth month; see 7:11 and note on 8:4.
  - type: text
    content: ' as the waters continued to go down, other mountain peaks became visible.'
  '6':
  - type: text
    content: 'After another forty days, Noah opened the window he had made in the boat '
  '7':
  - type: text
    content: 'and released a raven. The bird flew back and forth until the floodwaters on the earth had dried up. '
  '8':
  - type: text
    content: 'He also released a dove to see if the water had receded and it could find dry ground. '
  '9':
  - type: text
    content: 'But the dove could find no place to land because the water still covered the ground. So it returned to the boat, and Noah held out his hand and drew the dove back inside. '
