document_id: GEN.8,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Flood Recedes
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But God remembered Noah and all the wild animals and livestock with him in the boat. He sent a wind to blow across the earth, and the floodwaters began to recede. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After waiting another seven days, Noah released the dove again. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This time the dove returned to him in the evening with a fresh olive leaf in its beak. Then Noah knew that the floodwaters were almost gone. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He waited another seven days and then released the dove again. This time it did not come back.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Noah was now 601 years old. On the first day of the new year, ten and a half months after the flood began,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'On the first day of the first month; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: see 7:11.
      marker-yv: yv-n
    - type: text
      text: ' the floodwaters had almost dried up from the earth. Noah lifted back the covering of the boat and saw that the surface of the ground was drying. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Two more months went by,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'The twenty-seventh day of the second month arrived; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: see note on 8:13.
      marker-yv: yv-n
    - type: text
      text: ' and at last the earth was dry!'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then God said to Noah, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Leave the boat, all of you—you and your wife, and your sons and their wives. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Release all the animals—the birds, the livestock, and the small animals that scurry along the ground—so they can be fruitful and multiply throughout the earth.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Noah, his wife, and his sons and their wives left the boat. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And all of the large and small animals and birds came out of the boat, pair by pair.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The underground waters stopped flowing, and the torrential rains from the sky were stopped. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Noah built an altar to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and there he sacrificed as burnt offerings the animals and birds that had been approved for that purpose.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: every clean animal and every clean bird.
      marker-yv: yv-n
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was pleased with the aroma of the sacrifice and said to himself, “I will never again curse the ground because of the human race, even though everything they think or imagine is bent toward evil from childhood. I will never again destroy all living things. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As long as the earth remains, there will be planting and harvest, cold and heat, summer and winter, day and night.”
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So the floodwaters gradually receded from the earth. After 150 days, '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: exactly five months from the time the flood began,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'on the seventeenth day of the seventh month; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: see 7:11.
      marker-yv: yv-n
    - type: text
      text: ' the boat came to rest on the mountains of Ararat. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Two and a half months later,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'On the first day of the tenth month; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: see 7:11 and note on 8:4.
      marker-yv: yv-n
    - type: text
      text: ' as the waters continued to go down, other mountain peaks became visible.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After another forty days, Noah opened the window he had made in the boat '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and released a raven. The bird flew back and forth until the floodwaters on the earth had dried up. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He also released a dove to see if the water had receded and it could find dry ground. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the dove could find no place to land because the water still covered the ground. So it returned to the boat, and Noah held out his hand and drew the dove back inside. '
