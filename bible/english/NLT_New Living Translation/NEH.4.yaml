document_id: NEH.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Enemies Oppose the Rebuilding
  - type: text
    content: ' '
  - type: note
    content: Verses 4:1-6 are numbered 3:33-38 in Hebrew text.
  - type: text
    content: 'Sanballat was very angry when he learned that we were rebuilding the wall. He flew into a rage and mocked the Jews, '
  '10':
  - type: text
    content: Then the people of Judah began to complain, “The workers are getting tired, and there is so much rubble to be moved. We will never be able to build the wall by ourselves.”
  '11':
  - type: text
    content: Meanwhile, our enemies were saying, “Before they know what’s happening, we will swoop down on them and kill them and end their work.”
  '12':
  - type: text
    content: The Jews who lived near the enemy came and told us again and again, “They will come from all directions and attack us!”
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: ' '
  '13':
  - type: text
    content: So I placed armed guards behind the lowest parts of the wall in the exposed areas. I stationed the people to stand guard by families, armed with swords, spears, and bows.
  '14':
  - type: text
    content: Then as I looked over the situation, I called together the nobles and the rest of the people and said to them, “Don’t be afraid of the enemy! Remember the Lord, who is great and glorious, and fight for your brothers, your sons, your daughters, your wives, and your homes!”
  '15':
  - type: text
    content: 'When our enemies heard that we knew of their plans and that God had frustrated them, we all returned to our work on the wall. '
  '16':
  - type: text
    content: 'But from then on, only half my men worked while the other half stood guard with spears, shields, bows, and coats of mail. The leaders stationed themselves behind the people of Judah '
  '17':
  - type: text
    content: 'who were building the wall. The laborers carried on their work with one hand supporting their load and one hand holding a weapon. '
  '18':
  - type: text
    content: All the builders had a sword belted to their side. The trumpeter stayed with me to sound the alarm.
  '19':
  - type: text
    content: 'Then I explained to the nobles and officials and all the people, “The work is very spread out, and we are widely separated from each other along the wall. '
  '2':
  - type: text
    content: saying in front of his friends and the Samarian army officers, “What does this bunch of poor, feeble Jews think they’re doing? Do they think they can build the wall in a single day by just offering a few sacrifices?
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: ' Do they actually think they can make something of stones from a rubbish heap—and charred ones at that?”'
  '20':
  - type: text
    content: When you hear the blast of the trumpet, rush to wherever it is sounding. Then our God will fight for us!”
  '21':
  - type: text
    content: 'We worked early and late, from sunrise to sunset. And half the men were always on guard. '
  '22':
  - type: text
    content: 'I also told everyone living outside the walls to stay in Jerusalem. That way they and their servants could help with guard duty at night and work during the day. '
  '23':
  - type: text
    content: During this time, none of us—not I, nor my relatives, nor my servants, nor the guards who were with me—ever took off our clothes. We carried our weapons with us at all times, even when we went for water.
  - type: note
    content: Or Each carried his weapon in his right hand. Hebrew reads Each his weapon the water. The meaning of the Hebrew is uncertain.
  '3':
  - type: text
    content: Tobiah the Ammonite, who was standing beside him, remarked, “That stone wall would collapse if even a fox walked along the top of it!”
  '4':
  - type: text
    content: 'Then I prayed, “Hear us, our God, for we are being mocked. May their scoffing fall back on their own heads, and may they themselves become captives in a foreign land! '
  '5':
  - type: text
    content: Do not ignore their guilt. Do not blot out their sins, for they have provoked you to anger here in front of
  - type: note
    content: Or for they have thrown insults in the face of.
  - type: text
    content: ' the builders.”'
  '6':
  - type: text
    content: At last the wall was completed to half its height around the entire city, for the people had worked with enthusiasm.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Verses 4:7-23 are numbered 4:1-17 in Hebrew text.
  - type: text
    content: 'But when Sanballat and Tobiah and the Arabs, Ammonites, and Ashdodites heard that the work was going ahead and that the gaps in the wall of Jerusalem were being repaired, they were furious. '
  '8':
  - type: text
    content: 'They all made plans to come and fight against Jerusalem and throw us into confusion. '
  '9':
  - type: text
    content: But we prayed to our God and guarded the city day and night to protect ourselves.
