document_id: ACT.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Journey to Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After saying farewell to the Ephesian elders, we sailed straight to the island of Cos. The next day we reached Rhodes and then went to Patara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'There we boarded a ship sailing for Phoenicia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: We sighted the island of Cyprus, passed it on our left, and landed at the harbor of Tyre, in Syria, where the ship was to unload its cargo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: We went ashore, found the local believers,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'disciples; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 21:16.
    marker-yv: yv-n
  - type: text
    text: ' and stayed with them a week. These believers prophesied through the Holy Spirit that Paul should not go on to Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: When we returned to the ship at the end of the week, the entire congregation, including women
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: wives.
    marker-yv: yv-n
  - type: text
    text: ' and children, left the city and came down to the shore with us. There we knelt, prayed, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: and said our farewells. Then we went aboard, and they returned home.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The next stop after leaving Tyre was Ptolemais, where we greeted the brothers and sisters
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'brothers; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 21:17.
    marker-yv: yv-n
  - type: text
    text: ' and stayed for one day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The next day we went on to Caesarea and stayed at the home of Philip the Evangelist, one of the seven men who had been chosen to distribute food. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He had four unmarried daughters who had the gift of prophecy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Several days later a man named Agabus, who also had the gift of prophecy, arrived from Judea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He came over, took Paul’s belt, and bound his own feet and hands with it. Then he said, “The Holy Spirit declares, ‘So shall the owner of this belt be bound by the Jewish leaders in Jerusalem and turned over to the Gentiles.’” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: When we heard this, we and the local believers all begged Paul not to go on to Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But he said, “Why all this weeping? You are breaking my heart! I am ready not only to be jailed at Jerusalem but even to die for the sake of the Lord Jesus.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: When it was clear that we couldn’t persuade him, we gave up and said, “The Lord’s will be done.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul Arrives at Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'After this we packed our things and left for Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Some believers from Caesarea accompanied us, and they took us to the home of Mnason, a man originally from Cyprus and one of the early believers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: When we arrived, the brothers and sisters in Jerusalem welcomed us warmly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The next day Paul went with us to meet with James, and all the elders of the Jerusalem church were present. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: After greeting them, Paul gave a detailed account of the things God had accomplished among the Gentiles through his ministry.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'After hearing this, they praised God. And then they said, “You know, dear brother, how many thousands of Jews have also believed, and they all follow the law of Moses very seriously. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But the Jewish believers here in Jerusalem have been told that you are teaching all the Jews who live among the Gentiles to turn their backs on the laws of Moses. They’ve heard that you teach them not to circumcise their children or follow other Jewish customs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: What should we do? They will certainly hear that you have come.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“Here’s what we want you to do. We have four men here who have completed their vow. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Go with them to the Temple and join them in the purification ceremony, paying for them to have their heads ritually shaved. Then everyone will know that the rumors are all false and that you yourself observe the Jewish laws.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“As for the Gentile believers, they should do what we already told them in a letter: They should abstain from eating food offered to idols, from consuming blood or the meat of strangled animals, and from sexual immorality.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul Is Arrested
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: So Paul went to the Temple the next day with the other men. They had already started the purification ritual, so he publicly announced the date when their vows would end and sacrifices would be offered for each of them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The seven days were almost ended when some Jews from the province of Asia saw Paul in the Temple and roused a mob against him. They grabbed him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: yelling, “Men of Israel, help us! This is the man who preaches against our people everywhere and tells everybody to disobey the Jewish laws. He speaks against the Temple—and even defiles this holy place by bringing in Gentiles.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Greeks.
    marker-yv: yv-n
  - type: text
    text: '” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: (For earlier that day they had seen him in the city with Trophimus, a Gentile from Ephesus,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Trophimus, the Ephesian.
    marker-yv: yv-n
  - type: text
    text: ' and they assumed Paul had taken him into the Temple.)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The whole city was rocked by these accusations, and a great riot followed. Paul was grabbed and dragged out of the Temple, and immediately the gates were closed behind him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'As they were trying to kill him, word reached the commander of the Roman regiment that all Jerusalem was in an uproar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: He immediately called out his soldiers and officers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: centurions.
    marker-yv: yv-n
  - type: text
    text: ' and ran down among the crowd. When the mob saw the commander and the troops coming, they stopped beating Paul.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Then the commander arrested him and ordered him bound with two chains. He asked the crowd who he was and what he had done. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Some shouted one thing and some another. Since he couldn’t find out the truth in all the uproar and confusion, he ordered that Paul be taken to the fortress. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'As Paul reached the stairs, the mob grew so violent the soldiers had to lift him to their shoulders to protect him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: And the crowd followed behind, shouting, “Kill him, kill him!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul Speaks to the Crowd
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: As Paul was about to be taken inside, he said to the commander, “May I have a word with you?”
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Do you know Greek?” the commander asked, surprised. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: “Aren’t you the Egyptian who led a rebellion some time ago and took 4,000 members of the Assassins out into the desert?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: '“No,” Paul replied, “I am a Jew and a citizen of Tarsus in Cilicia, which is an important city. Please, let me talk to these people.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: The commander agreed, so Paul stood on the stairs and motioned to the people to be quiet. Soon a deep silence enveloped the crowd, and he addressed them in their own language, Aramaic.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Hebrew.
    marker-yv: yv-n
