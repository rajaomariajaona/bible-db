document_id: ACT.21,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Journey to Jerusalem
  - type: text
    content: 'After saying farewell to the Ephesian elders, we sailed straight to the island of Cos. The next day we reached Rhodes and then went to Patara. '
  '10':
  - type: text
    content: 'Several days later a man named Agabus, who also had the gift of prophecy, arrived from Judea. '
  '11':
  - type: text
    content: 'He came over, took Paul’s belt, and bound his own feet and hands with it. Then he said, “The Holy Spirit declares, ‘So shall the owner of this belt be bound by the Jewish leaders in Jerusalem and turned over to the Gentiles.’” '
  '12':
  - type: text
    content: When we heard this, we and the local believers all begged Paul not to go on to Jerusalem.
  '13':
  - type: text
    content: 'But he said, “Why all this weeping? You are breaking my heart! I am ready not only to be jailed at Jerusalem but even to die for the sake of the Lord Jesus.” '
  '14':
  - type: text
    content: When it was clear that we couldn’t persuade him, we gave up and said, “The Lord’s will be done.”
  - type: heading
    content: Paul Arrives at Jerusalem
  '15':
  - type: text
    content: 'After this we packed our things and left for Jerusalem. '
  '16':
  - type: text
    content: 'Some believers from Caesarea accompanied us, and they took us to the home of Mnason, a man originally from Cyprus and one of the early believers. '
  '17':
  - type: text
    content: When we arrived, the brothers and sisters in Jerusalem welcomed us warmly.
  '18':
  - type: text
    content: 'The next day Paul went with us to meet with James, and all the elders of the Jerusalem church were present. '
  '19':
  - type: text
    content: After greeting them, Paul gave a detailed account of the things God had accomplished among the Gentiles through his ministry.
  '2':
  - type: text
    content: 'There we boarded a ship sailing for Phoenicia. '
  '20':
  - type: text
    content: 'After hearing this, they praised God. And then they said, “You know, dear brother, how many thousands of Jews have also believed, and they all follow the law of Moses very seriously. '
  '21':
  - type: text
    content: 'But the Jewish believers here in Jerusalem have been told that you are teaching all the Jews who live among the Gentiles to turn their backs on the laws of Moses. They’ve heard that you teach them not to circumcise their children or follow other Jewish customs. '
  '22':
  - type: text
    content: What should we do? They will certainly hear that you have come.
  '23':
  - type: text
    content: '“Here’s what we want you to do. We have four men here who have completed their vow. '
  '24':
  - type: text
    content: Go with them to the Temple and join them in the purification ceremony, paying for them to have their heads ritually shaved. Then everyone will know that the rumors are all false and that you yourself observe the Jewish laws.
  '25':
  - type: text
    content: '“As for the Gentile believers, they should do what we already told them in a letter: They should abstain from eating food offered to idols, from consuming blood or the meat of strangled animals, and from sexual immorality.”'
  - type: heading
    content: Paul Is Arrested
  '26':
  - type: text
    content: So Paul went to the Temple the next day with the other men. They had already started the purification ritual, so he publicly announced the date when their vows would end and sacrifices would be offered for each of them.
  '27':
  - type: text
    content: 'The seven days were almost ended when some Jews from the province of Asia saw Paul in the Temple and roused a mob against him. They grabbed him, '
  '28':
  - type: text
    content: yelling, “Men of Israel, help us! This is the man who preaches against our people everywhere and tells everybody to disobey the Jewish laws. He speaks against the Temple—and even defiles this holy place by bringing in Gentiles.
  - type: note
    content: Greek Greeks.
  - type: text
    content: '” '
  '29':
  - type: text
    content: (For earlier that day they had seen him in the city with Trophimus, a Gentile from Ephesus,
  - type: note
    content: Greek Trophimus, the Ephesian.
  - type: text
    content: ' and they assumed Paul had taken him into the Temple.)'
  '3':
  - type: text
    content: We sighted the island of Cyprus, passed it on our left, and landed at the harbor of Tyre, in Syria, where the ship was to unload its cargo.
  '30':
  - type: text
    content: 'The whole city was rocked by these accusations, and a great riot followed. Paul was grabbed and dragged out of the Temple, and immediately the gates were closed behind him. '
  '31':
  - type: text
    content: 'As they were trying to kill him, word reached the commander of the Roman regiment that all Jerusalem was in an uproar. '
  '32':
  - type: text
    content: He immediately called out his soldiers and officers
  - type: note
    content: Greek centurions.
  - type: text
    content: ' and ran down among the crowd. When the mob saw the commander and the troops coming, they stopped beating Paul.'
  '33':
  - type: text
    content: 'Then the commander arrested him and ordered him bound with two chains. He asked the crowd who he was and what he had done. '
  '34':
  - type: text
    content: 'Some shouted one thing and some another. Since he couldn’t find out the truth in all the uproar and confusion, he ordered that Paul be taken to the fortress. '
  '35':
  - type: text
    content: 'As Paul reached the stairs, the mob grew so violent the soldiers had to lift him to their shoulders to protect him. '
  '36':
  - type: text
    content: And the crowd followed behind, shouting, “Kill him, kill him!”
  - type: heading
    content: Paul Speaks to the Crowd
  '37':
  - type: text
    content: As Paul was about to be taken inside, he said to the commander, “May I have a word with you?”
  - type: text
    content: '“Do you know Greek?” the commander asked, surprised. '
  '38':
  - type: text
    content: “Aren’t you the Egyptian who led a rebellion some time ago and took 4,000 members of the Assassins out into the desert?”
  '39':
  - type: text
    content: '“No,” Paul replied, “I am a Jew and a citizen of Tarsus in Cilicia, which is an important city. Please, let me talk to these people.” '
  '4':
  - type: text
    content: We went ashore, found the local believers,
  - type: note
    content: Greek disciples; also in 21:16.
  - type: text
    content: ' and stayed with them a week. These believers prophesied through the Holy Spirit that Paul should not go on to Jerusalem. '
  '40':
  - type: text
    content: The commander agreed, so Paul stood on the stairs and motioned to the people to be quiet. Soon a deep silence enveloped the crowd, and he addressed them in their own language, Aramaic.
  - type: note
    content: Or Hebrew.
  '5':
  - type: text
    content: When we returned to the ship at the end of the week, the entire congregation, including women
  - type: note
    content: Or wives.
  - type: text
    content: ' and children, left the city and came down to the shore with us. There we knelt, prayed, '
  '6':
  - type: text
    content: and said our farewells. Then we went aboard, and they returned home.
  '7':
  - type: text
    content: The next stop after leaving Tyre was Ptolemais, where we greeted the brothers and sisters
  - type: note
    content: Greek brothers; also in 21:17.
  - type: text
    content: ' and stayed for one day. '
  '8':
  - type: text
    content: 'The next day we went on to Caesarea and stayed at the home of Philip the Evangelist, one of the seven men who had been chosen to distribute food. '
  '9':
  - type: text
    content: He had four unmarried daughters who had the gift of prophecy.
