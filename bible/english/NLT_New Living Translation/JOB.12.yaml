verses:
  '1':
  - type: heading
    content: 'Job’s Fourth Speech: A Response to Zophar'
  - type: text
    content: 'Then Job spoke again:'
  '10':
  - type: text
    content: For the life of every living thing is in his hand,
  - type: text
    content: and the breath of every human being.
  '11':
  - type: text
    content: The ear tests the words it hears
  - type: text
    content: just as the mouth distinguishes between foods.
  '12':
  - type: text
    content: Wisdom belongs to the aged,
  - type: text
    content: and understanding to the old.
  '13':
  - type: text
    content: “But true wisdom and power are found in God;
  - type: text
    content: counsel and understanding are his.
  '14':
  - type: text
    content: What he destroys cannot be rebuilt.
  - type: text
    content: When he puts someone in prison, there is no escape.
  '15':
  - type: text
    content: If he holds back the rain, the earth becomes a desert.
  - type: text
    content: If he releases the waters, they flood the earth.
  '16':
  - type: text
    content: Yes, strength and wisdom are his;
  - type: text
    content: deceivers and deceived are both in his power.
  '17':
  - type: text
    content: He leads counselors away, stripped of good judgment;
  - type: text
    content: wise judges become fools.
  '18':
  - type: text
    content: He removes the royal robe of kings.
  - type: text
    content: They are led away with ropes around their waist.
  '19':
  - type: text
    content: He leads priests away, stripped of status;
  - type: text
    content: he overthrows those with long years in power.
  '2':
  - type: text
    content: “You people really know everything, don’t you?
  - type: text
    content: And when you die, wisdom will die with you!
  '20':
  - type: text
    content: He silences the trusted adviser
  - type: text
    content: and removes the insight of the elders.
  '21':
  - type: text
    content: He pours disgrace upon princes
  - type: text
    content: and disarms the strong.
  '22':
  - type: text
    content: “He uncovers mysteries hidden in darkness;
  - type: text
    content: he brings light to the deepest gloom.
  '23':
  - type: text
    content: He builds up nations, and he destroys them.
  - type: text
    content: He expands nations, and he abandons them.
  '24':
  - type: text
    content: He strips kings of understanding
  - type: text
    content: and leaves them wandering in a pathless wasteland.
  '25':
  - type: text
    content: They grope in the darkness without a light.
  - type: text
    content: He makes them stagger like drunkards.
  '3':
  - type: text
    content: Well, I know a few things myself—
  - type: text
    content: and you’re no better than I am.
  - type: text
    content: Who doesn’t know these things you’ve been saying?
  '4':
  - type: text
    content: Yet my friends laugh at me,
  - type: text
    content: for I call on God and expect an answer.
  - type: text
    content: I am a just and blameless man,
  - type: text
    content: yet they laugh at me.
  '5':
  - type: text
    content: People who are at ease mock those in trouble.
  - type: text
    content: They give a push to people who are stumbling.
  '6':
  - type: text
    content: But robbers are left in peace,
  - type: text
    content: and those who provoke God live in safety—
  - type: text
    content: though God keeps them in his power.
  - type: note
    content: Or safety—those who try to manipulate God. The meaning of the Hebrew is uncertain.
  '7':
  - type: text
    content: “Just ask the animals, and they will teach you.
  - type: text
    content: Ask the birds of the sky, and they will tell you.
  '8':
  - type: text
    content: Speak to the earth, and it will instruct you.
  - type: text
    content: Let the fish in the sea speak to you.
  '9':
  - type: text
    content: For they all know
  - type: text
    content: that my disaster
