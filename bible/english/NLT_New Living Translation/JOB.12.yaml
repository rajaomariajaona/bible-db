          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Just ask the animals, and they will teach you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Ask the birds of the sky, and they will tell you.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Speak to the earth, and it will instruct you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let the fish in the sea speak to you.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they all know
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that my disaster
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: that this.
      marker-yv: yv-n
    - type: text
      text: ' has come from the hand of the '
