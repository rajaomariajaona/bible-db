document_id: JOB.12,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Job’s Fourth Speech: A Response to Zophar'
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Job spoke again:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the life of every living thing is in his hand,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the breath of every human being.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The ear tests the words it hears
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just as the mouth distinguishes between foods.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wisdom belongs to the aged,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and understanding to the old.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But true wisdom and power are found in God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: counsel and understanding are his.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What he destroys cannot be rebuilt.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When he puts someone in prison, there is no escape.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If he holds back the rain, the earth becomes a desert.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If he releases the waters, they flood the earth.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, strength and wisdom are his;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: deceivers and deceived are both in his power.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He leads counselors away, stripped of good judgment;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wise judges become fools.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He removes the royal robe of kings.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are led away with ropes around their waist.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He leads priests away, stripped of status;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he overthrows those with long years in power.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You people really know everything, don’t you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And when you die, wisdom will die with you!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He silences the trusted adviser
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and removes the insight of the elders.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He pours disgrace upon princes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and disarms the strong.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He uncovers mysteries hidden in darkness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he brings light to the deepest gloom.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He builds up nations, and he destroys them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He expands nations, and he abandons them.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He strips kings of understanding
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and leaves them wandering in a pathless wasteland.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They grope in the darkness without a light.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He makes them stagger like drunkards.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Well, I know a few things myself—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you’re no better than I am.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who doesn’t know these things you’ve been saying?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet my friends laugh at me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I call on God and expect an answer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am a just and blameless man,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet they laugh at me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People who are at ease mock those in trouble.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They give a push to people who are stumbling.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But robbers are left in peace,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and those who provoke God live in safety—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though God keeps them in his power.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'safety—those who try to manipulate God. '
      - type: usfm
        marker: ft
        children:
