document_id: MAT.28
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Resurrection
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Early on Sunday morning,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: After the Sabbath, on the first day of the week.
    marker-yv: yv-n
  - type: text
    text: ' as the new day was dawning, Mary Magdalene and the other Mary went out to visit the tomb.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Suddenly there was a great earthquake! For an angel of the Lord came down from heaven, rolled aside the stone, and sat on it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'His face shone like lightning, and his clothing was as white as snow. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The guards shook with fear when they saw him, and they fell into a dead faint.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the angel spoke to the women. “Don’t be afraid!” he said. “I know you are looking for Jesus, who was crucified. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He isn’t here! He is risen from the dead, just as he said would happen. Come, see where his body was lying. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And now, go quickly and tell his disciples that he has risen from the dead, and he is going ahead of you to Galilee. You will see him there. Remember what I have told you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The women ran quickly from the tomb. They were very frightened but also filled with great joy, and they rushed to give the disciples the angel’s message. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And as they went, Jesus met them and greeted them. And they ran to him, grasped his feet, and worshiped him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Don’t be afraid! Go tell my brothers to leave for Galilee, and they will see me there.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Report of the Guard
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'As the women were on their way, some of the guards went into the city and told the leading priests what had happened. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'A meeting with the elders was called, and they decided to give the soldiers a large bribe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'They told the soldiers, “You must say, ‘Jesus’ disciples came during the night while we were sleeping, and they stole his body.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'If the governor hears about it, we’ll stand up for you so you won’t get in trouble.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So the guards accepted the bribe and said what they were told to say. Their story spread widely among the Jews, and they still tell it today.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Great Commission
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then the eleven disciples left for Galilee, going to the mountain where Jesus had told them to go. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: When they saw him, they worshiped him—but some of them doubted!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jesus came and told his disciples, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I have been given all authority in heaven and on earth.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Therefore, go and make disciples of all the nations,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: all peoples.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: baptizing them in the name of the Father and the Son and the Holy Spirit.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Teach these new disciples to obey all the commands I have given you. And be sure of this: I am with you always, even to the end of the age.”'
