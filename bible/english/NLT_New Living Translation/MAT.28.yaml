document_id: MAT.28,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Resurrection
  - type: text
    content: Early on Sunday morning,
  - type: note
    content: Greek After the Sabbath, on the first day of the week.
  - type: text
    content: ' as the new day was dawning, Mary Magdalene and the other Mary went out to visit the tomb.'
  '10':
  - type: text
    content: 'Then Jesus said to them, '
  - type: text
    content: “Don’t be afraid! Go tell my brothers to leave for Galilee, and they will see me there.”
  - type: heading
    content: The Report of the Guard
  '11':
  - type: text
    content: 'As the women were on their way, some of the guards went into the city and told the leading priests what had happened. '
  '12':
  - type: text
    content: 'A meeting with the elders was called, and they decided to give the soldiers a large bribe. '
  '13':
  - type: text
    content: 'They told the soldiers, “You must say, ‘Jesus’ disciples came during the night while we were sleeping, and they stole his body.’ '
  '14':
  - type: text
    content: 'If the governor hears about it, we’ll stand up for you so you won’t get in trouble.” '
  '15':
  - type: text
    content: So the guards accepted the bribe and said what they were told to say. Their story spread widely among the Jews, and they still tell it today.
  - type: heading
    content: The Great Commission
  '16':
  - type: text
    content: 'Then the eleven disciples left for Galilee, going to the mountain where Jesus had told them to go. '
  '17':
  - type: text
    content: When they saw him, they worshiped him—but some of them doubted!
  '18':
  - type: text
    content: 'Jesus came and told his disciples, '
  - type: text
    content: “I have been given all authority in heaven and on earth.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Therefore, go and make disciples of all the nations,
  - type: note
    content: Or all peoples.
  - type: text
    content: ' '
  - type: text
    content: baptizing them in the name of the Father and the Son and the Holy Spirit.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Suddenly there was a great earthquake! For an angel of the Lord came down from heaven, rolled aside the stone, and sat on it. '
  '20':
  - type: text
    content: 'Teach these new disciples to obey all the commands I have given you. And be sure of this: I am with you always, even to the end of the age.”'
  '3':
  - type: text
    content: 'His face shone like lightning, and his clothing was as white as snow. '
  '4':
  - type: text
    content: The guards shook with fear when they saw him, and they fell into a dead faint.
  '5':
  - type: text
    content: 'Then the angel spoke to the women. “Don’t be afraid!” he said. “I know you are looking for Jesus, who was crucified. '
  '6':
  - type: text
    content: 'He isn’t here! He is risen from the dead, just as he said would happen. Come, see where his body was lying. '
  '7':
  - type: text
    content: And now, go quickly and tell his disciples that he has risen from the dead, and he is going ahead of you to Galilee. You will see him there. Remember what I have told you.”
  '8':
  - type: text
    content: 'The women ran quickly from the tomb. They were very frightened but also filled with great joy, and they rushed to give the disciples the angel’s message. '
  '9':
  - type: text
    content: 'And as they went, Jesus met them and greeted them. And they ran to him, grasped his feet, and worshiped him. '
