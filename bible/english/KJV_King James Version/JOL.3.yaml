  '3':
  - type: text
    content: And they have cast lots for my people; and have given a boy for an harlot, and sold a girl for wine, that they might drink.
  '4':
  - type: text
    content: 'Yea, and what have ye to do with me, O Tyre, and Zidon, and all the coasts of Palestine? will ye render me a recompence? and if ye recompense me, swiftly '
  - type: text
    content: and
  - type: text
    content: ' speedily will I return your recompence upon your own head; '
  '5':
