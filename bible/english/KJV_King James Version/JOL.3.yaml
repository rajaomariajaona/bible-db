document_id: JOL.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Valley of Decision
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For, behold, in those days, and in that time, when I shall bring again the captivity of Judah and Jerusalem, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'beat your plowshares into swords, and your pruninghooks into spears: let the weak say, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' strong. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Assemble yourselves, and come, all ye heathen, and gather yourselves together round about: thither cause thy mighty ones to come down, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let the heathen be wakened, and come up to the valley of Jehoshaphat: for there will I sit to judge all the heathen round about. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Put ye in the sickle, for the harvest is ripe: come, get you down; for the press is full, the fats overflow; for their wickedness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' great.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Multitudes, multitudes in the valley of decision: for the day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' near in the valley of decision. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sun and the moon shall be darkened, and the stars shall withdraw their shining. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' also shall roar out of Zion, and utter his voice from Jerusalem; and the heavens and the earth shall shake: but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: will be
    - type: text
      text: ' the hope of his people, and the strength of the children of Israel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So shall ye know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God dwelling in Zion, my holy mountain: then shall Jerusalem be holy, and there shall no strangers pass through her any more.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass in that day, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the mountains shall drop down new wine, and the hills shall flow with milk, and all the rivers of Judah shall flow with waters, and a fountain shall come forth of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and shall water the valley of Shittim. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Egypt shall be a desolation, and Edom shall be a desolate wilderness, for the violence '
    - type: usfm
      marker: add
      children:
      - type: text
        text: against
    - type: text
      text: ' the children of Judah, because they have shed innocent blood in their land. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will also gather all nations, and will bring them down into the valley of Jehoshaphat, and will plead with them there for my people and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' my heritage Israel, whom they have scattered among the nations, and parted my land. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Judah shall dwell for ever, and Jerusalem from generation to generation. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I will cleanse their blood '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' I have not cleansed: for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' dwelleth in Zion.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they have cast lots for my people; and have given a boy for an harlot, and sold a girl for wine, that they might drink.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yea, and what have ye to do with me, O Tyre, and Zidon, and all the coasts of Palestine? will ye render me a recompence? and if ye recompense me, swiftly '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' speedily will I return your recompence upon your own head; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because ye have taken my silver and my gold, and have carried into your temples my goodly pleasant things: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the children also of Judah and the children of Jerusalem have ye sold unto the Grecians, that ye might remove them far from their border. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, I will raise them out of the place whither ye have sold them, and will return your recompence upon your own head: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and I will sell your sons and your daughters into the hand of the children of Judah, and they shall sell them to the Sabeans, to a people far off: for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath spoken '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Proclaim ye this among the Gentiles; Prepare war, wake up the mighty men, let all the men of war draw near; let them come up: '
