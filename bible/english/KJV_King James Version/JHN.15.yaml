document_id: JHN.15,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The True Vine
  - type: text
    content: ' '
  - type: text
    content: I am the true vine, and my Father is the husbandman.
  - type: text
    content: ' '
  '10':
  - type: text
    content: If ye keep my commandments, ye shall abide in my love; even as I have kept my Father's commandments, and abide in his love.
  '11':
  - type: text
    content: ' '
  - type: text
    content: 'These things have I spoken unto you, that my joy might remain in you, and '
  - type: text
    content: that
  - type: text
    content: ' your joy might be full.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: This is my commandment, That ye love one another, as I have loved you.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Greater love hath no man than this, that a man lay down his life for his friends.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Ye are my friends, if ye do whatsoever I command you.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'Henceforth I call you not servants; for the servant knoweth not what his lord doeth: but I have called you friends; for all things that I have heard of my Father I have made known unto you.'
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Ye have not chosen me, but I have chosen you, and ordained you, that ye should go and bring forth fruit, and '
  - type: text
    content: that
  - type: text
    content: ' your fruit should remain: that whatsoever ye shall ask of the Father in my name, he may give it you.'
  '17':
  - type: text
    content: ' '
  - type: text
    content: These things I command you, that ye love one another.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'If the world hate you, ye know that it hated me before '
  - type: text
    content: it hated
  - type: text
    content: ' you.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'If ye were of the world, the world would love his own: but because ye are not of the world, but I have chosen you out of the world, therefore the world hateth you.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Every branch in me that beareth not fruit he taketh away: and every '
  - type: text
    content: branch
  - type: text
    content: ' that beareth fruit, he purgeth it, that it may bring forth more fruit.'
  - type: text
    content: ' '
  '20':
  - type: text
    content: Remember the word that I said unto you, The servant is not greater than his lord. If they have persecuted me, they will also persecute you; if they have kept my saying, they will keep your's also.
  - type: text
    content: ' '
  '21':
  - type: text
    content: But all these things will they do unto you for my name's sake, because they know not him that sent me.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'If I had not come and spoken unto them, they had not had sin: but now they have no cloke for their sin.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: He that hateth me hateth my Father also.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'If I had not done among them the works which none other man did, they had not had sin: but now have they both seen and hated both me and my Father.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'But '
  - type: text
    content: this cometh to pass
  - type: text
    content: ', that the word might be fulfilled that is written in their law, They hated me without a cause.'
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'But when the Comforter is come, whom I will send unto you from the Father, '
  - type: text
    content: even
  - type: text
    content: ' the Spirit of truth, which proceedeth from the Father, he shall testify of me:'
  - type: text
    content: ' '
  '27':
  - type: text
    content: and ye also shall bear witness, because ye have been with me from the beginning.
  '3':
  - type: text
    content: Now ye are clean through the word which I have spoken unto you.
  - type: text
    content: ' '
  '4':
  - type: text
    content: Abide in me, and I in you. As the branch cannot bear fruit of itself, except it abide in the vine; no more can ye, except ye abide in me.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'I am the vine, ye '
  - type: text
    content: are
  - type: text
    content: ' the branches: He that abideth in me, and I in him, the same bringeth forth much fruit: for without me ye can do nothing.'
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'If a man abide not in me, he is cast forth as a branch, and is withered; and men gather them, and cast '
  - type: text
    content: them
  - type: text
    content: ' into the fire, and they are burned.'
  - type: text
    content: ' '
  '7':
  - type: text
    content: If ye abide in me, and my words abide in you, ye shall ask what ye will, and it shall be done unto you.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Herein is my Father glorified, that ye bear much fruit; so shall ye be my disciples.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'As the Father hath loved me, so have I loved you: continue ye in my love.'
  - type: text
    content: ' '
