document_id: JHN.15,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The True Vine
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I am the true vine, and my Father is the husbandman.
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If ye keep my commandments, ye shall abide in my love; even as I have kept my Father's commandments, and abide in his love.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'These things have I spoken unto you, that my joy might remain in you, and '
      - type: usfm
        marker: add
        children:
        - type: text
          text: that
      - type: text
        text: ' your joy might be full.'
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: This is my commandment, That ye love one another, as I have loved you.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Greater love hath no man than this, that a man lay down his life for his friends.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ye are my friends, if ye do whatsoever I command you.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Henceforth I call you not servants; for the servant knoweth not what his lord doeth: but I have called you friends; for all things that I have heard of my Father I have made known unto you.'
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ye have not chosen me, but I have chosen you, and ordained you, that ye should go and bring forth fruit, and '
      - type: usfm
        marker: add
        children:
        - type: text
          text: that
      - type: text
        text: ' your fruit should remain: that whatsoever ye shall ask of the Father in my name, he may give it you.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: These things I command you, that ye love one another.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'If the world hate you, ye know that it hated me before '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it hated
      - type: text
        text: ' you.'
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'If ye were of the world, the world would love his own: but because ye are not of the world, but I have chosen you out of the world, therefore the world hateth you.'
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Every branch in me that beareth not fruit he taketh away: and every '
      - type: usfm
        marker: add
        children:
        - type: text
          text: branch
      - type: text
        text: ' that beareth fruit, he purgeth it, that it may bring forth more fruit.'
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Remember the word that I said unto you, The servant is not greater than his lord. If they have persecuted me, they will also persecute you; if they have kept my saying, they will keep your's also.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But all these things will they do unto you for my name's sake, because they know not him that sent me.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'If I had not come and spoken unto them, they had not had sin: but now they have no cloke for their sin.'
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He that hateth me hateth my Father also.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'If I had not done among them the works which none other man did, they had not had sin: but now have they both seen and hated both me and my Father.'
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But '
      - type: usfm
        marker: add
        children:
        - type: text
          text: this cometh to pass
      - type: text
        text: ', that the word might be fulfilled that is written in their law, They hated me without a cause.'
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But when the Comforter is come, whom I will send unto you from the Father, '
      - type: usfm
        marker: add
        children:
        - type: text
          text: even
      - type: text
        text: ' the Spirit of truth, which proceedeth from the Father, he shall testify of me:'
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and ye also shall bear witness, because ye have been with me from the beginning.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Now ye are clean through the word which I have spoken unto you.
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Abide in me, and I in you. As the branch cannot bear fruit of itself, except it abide in the vine; no more can ye, except ye abide in me.
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I am the vine, ye '
      - type: usfm
        marker: add
        children:
        - type: text
          text: are
      - type: text
        text: ' the branches: He that abideth in me, and I in him, the same bringeth forth much fruit: for without me ye can do nothing.'
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'If a man abide not in me, he is cast forth as a branch, and is withered; and men gather them, and cast '
      - type: usfm
        marker: add
        children:
        - type: text
          text: them
      - type: text
        text: ' into the fire, and they are burned.'
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If ye abide in me, and my words abide in you, ye shall ask what ye will, and it shall be done unto you.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Herein is my Father glorified, that ye bear much fruit; so shall ye be my disciples.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'As the Father hath loved me, so have I loved you: continue ye in my love.'
    - type: text
      text: ' '
