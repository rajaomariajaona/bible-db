document_id: GEN.21,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Isaac
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' visited Sarah as he had said, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' did unto Sarah as he had spoken. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Wherefore she said unto Abraham, Cast out this bondwoman and her son: for the son of this bondwoman shall not be heir with my son, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' with Isaac. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And the thing was very grievous in Abraham''s sight because of his son. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And God said unto Abraham, Let it not be grievous in thy sight because of the lad, and because of thy bondwoman; in all that Sarah hath said unto thee, hearken unto her voice; for in Isaac shall thy seed be called. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And also of the son of the bondwoman will I make a nation, because he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy seed.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And Abraham rose up early in the morning, and took bread, and a bottle of water, and gave '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' unto Hagar, putting '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' on her shoulder, and the child, and sent her away: and she departed, and wandered in the wilderness of Beer-sheba. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And the water was spent in the bottle, and she cast the child under one of the shrubs. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And she went, and sat her down over against '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' a good way off, as it were a bowshot: for she said, Let me not see the death of the child. And she sat over against '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', and lift up her voice, and wept. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And God heard the voice of the lad; and the angel of God called to Hagar out of heaven, and said unto her, What aileth thee, Hagar? fear not; for God hath heard the voice of the lad where he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Arise, lift up the lad, and hold him in thine hand; for I will make him a great nation. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And God opened her eyes, and she saw a well of water; and she went, and filled the bottle with water, and gave the lad drink. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For Sarah conceived, and bare Abraham a son in his old age, at the set time of which God had spoken to him. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And God was with the lad; and he grew, and dwelt in the wilderness, and became an archer. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And he dwelt in the wilderness of Paran: and his mother took him a wife out of the land of Egypt.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And it came to pass at that time, that Abimelech and Phichol the chief captain of his host spake unto Abraham, saying, God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' with thee in all that thou doest: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'now therefore swear unto me here by God that thou wilt not deal falsely with me, nor with my son, nor with my son''s son: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' according to the kindness that I have done unto thee, thou shalt do unto me, and to the land wherein thou hast sojourned. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And Abraham said, I will swear. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And Abraham reproved Abimelech because of a well of water, which Abimelech''s servants had violently taken away. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And Abimelech said, I wot not who hath done this thing: neither didst thou tell me, neither yet heard I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of it
    - type: text
      text: ', but to day. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And Abraham took sheep and oxen, and gave them unto Abimelech; and both of them made a covenant. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And Abraham set seven ewe lambs of the flock by themselves. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And Abimelech said unto Abraham, What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: mean
    - type: text
      text: ' these seven ewe lambs which thou hast set by themselves? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And Abraham called the name of his son that was born unto him, whom Sarah bare to him, Isaac. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And he said, For '
    - type: usfm
      marker: add
      children:
      - type: text
        text: these
    - type: text
      text: ' seven ewe lambs shalt thou take of my hand, that they may be a witness unto me, that I have digged this well. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Wherefore he called that place Beer-sheba; because there they sware both of them. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Thus they made a covenant at Beer-sheba: then Abimelech rose up, and Phichol the chief captain of his host, and they returned into the land of the Philistines.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Abraham
    - type: text
      text: ' planted a grove in Beer-sheba, and called there on the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', the everlasting God. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: And Abraham sojourned in the Philistines' land many days.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And Abraham circumcised his son Isaac being eight days old, as God had commanded him. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And Abraham was an hundred years old, when his son Isaac was born unto him. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And Sarah said, God hath made me to laugh, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so that
    - type: text
      text: ' all that hear will laugh with me. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And she said, Who would have said unto Abraham, that Sarah should have given children suck? for I have born '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' a son in his old age.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And the child grew, and was weaned: and Abraham made a great feast the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: same
    - type: text
      text: ' day that Isaac was weaned. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And Sarah saw the son of Hagar the Egyptian, which she had born unto Abraham, mocking. '
