    content: 'And he shall be unto thee a restorer of '
  - type: text
    content: thy
  - type: text
    content: ' life, and a nourisher of thine old age: for thy daughter in law, which loveth thee, which is better to thee than seven sons, hath born him. '
  '16':
  - type: text
    content: 'And Naomi took the child, and laid it in her bosom, and became nurse unto it. '
  '17':
  - type: text
    content: 'And the women her neighbours gave it a name, saying, There is a son born to Naomi; and they called his name Obed: he '
  - type: text
