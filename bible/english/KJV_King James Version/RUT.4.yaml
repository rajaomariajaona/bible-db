document_id: RUT.4,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ruth's Marriage
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then went Boaz up to the gate, and sat him down there: and, behold, the kinsman of whom Boaz spake came by; unto whom he said, Ho, such a one! turn aside, sit down here. And he turned aside, and sat down. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Moreover Ruth the Moabitess, the wife of Mahlon, have I purchased to be my wife, to raise up the name of the dead upon his inheritance, that the name of the dead be not cut off from among his brethren, and from the gate of his place: ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' witnesses this day. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And all the people that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in the gate, and the elders, said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: We are
    - type: text
      text: ' witnesses. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' make the woman that is come into thine house like Rachel and like Leah, which two did build the house of Israel: and do thou worthily in Ephratah, and be famous in Beth-lehem: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'and let thy house be like the house of Pharez, whom Tamar bare unto Judah, of the seed which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall give thee of this young woman.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'So Boaz took Ruth, and she was his wife: and when he went in unto her, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' gave her conception, and she bare a son. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And the women said unto Naomi, Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', which hath not left thee this day without a kinsman, that his name may be famous in Israel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And he shall be unto thee a restorer of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thy
    - type: text
      text: ' life, and a nourisher of thine old age: for thy daughter in law, which loveth thee, which is better to thee than seven sons, hath born him. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And Naomi took the child, and laid it in her bosom, and became nurse unto it. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And the women her neighbours gave it a name, saying, There is a son born to Naomi; and they called his name Obed: he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the father of Jesse, the father of David.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Now these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the generations of Pharez: Pharez begat Hezron, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'and Hezron begat Ram, and Ram begat Amminadab, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And he took ten men of the elders of the city, and said, Sit ye down here. And they sat down. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'and Amminadab begat Nahshon, and Nahshon begat Salmon, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'and Salmon begat Boaz, and Boaz begat Obed, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: and Obed begat Jesse, and Jesse begat David.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And he said unto the kinsman, Naomi, that is come again out of the country of Moab, selleth a parcel of land, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' our brother Elimelech''s: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'and I thought to advertise thee, saying, Buy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' before the inhabitants, and before the elders of my people. If thou wilt redeem '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', redeem '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'it:'
    - type: text
      text: ' but if thou wilt not redeem '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it, then
    - type: text
      text: ' tell me, that I may know: for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none to redeem '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' beside thee; and I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' after thee. And he said, I will redeem '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then said Boaz, What day thou buyest the field of the hand of Naomi, thou must buy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' also of Ruth the Moabitess, the wife of the dead, to raise up the name of the dead upon his inheritance. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And the kinsman said, I cannot redeem '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' for myself, lest I mar mine own inheritance: redeem thou my right to thyself; for I cannot redeem '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Now this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was the manner
    - type: text
      text: ' in former time in Israel concerning redeeming and concerning changing, for to confirm all things; a man plucked off his shoe, and gave '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to his neighbour: and this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' a testimony in Israel. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Therefore the kinsman said unto Boaz, Buy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' for thee. So he drew off his shoe. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And Boaz said unto the elders, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: unto
    - type: text
      text: ' all the people, Ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' witnesses this day, that I have bought all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Elimelech''s, and all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Chilion''s and Mahlon''s, of the hand of Naomi. '
