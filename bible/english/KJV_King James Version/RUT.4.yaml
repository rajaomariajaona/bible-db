    content: 'and Hezron begat Ram, and Ram begat Amminadab, '
  '2':
  - type: text
    content: 'And he took ten men of the elders of the city, and said, Sit ye down here. And they sat down. '
  '20':
  - type: text
    content: 'and Amminadab begat Nahshon, and Nahshon begat Salmon, '
