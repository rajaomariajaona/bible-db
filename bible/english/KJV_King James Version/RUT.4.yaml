    content: Ruth's Marriage
  - type: text
    content: 'Then went Boaz up to the gate, and sat him down there: and, behold, the kinsman of whom Boaz spake came by; unto whom he said, Ho, such a one! turn aside, sit down here. And he turned aside, and sat down. '
  '10':
  - type: text
    content: 'Moreover Ruth the Moabitess, the wife of Mahlon, have I purchased to be my wife, to raise up the name of the dead upon his inheritance, that the name of the dead be not cut off from among his brethren, and from the gate of his place: ye '
  - type: text
    content: are
  - type: text
    content: ' witnesses this day. '
  '11':
  - type: text
    content: 'And all the people that '
  - type: text
    content: were
  - type: text
    content: ' in the gate, and the elders, said, '
  - type: text
    content: We are
  - type: text
    content: ' witnesses. The '
  - type: text
    content: LORD
  - type: text
    content: ' make the woman that is come into thine house like Rachel and like Leah, which two did build the house of Israel: and do thou worthily in Ephratah, and be famous in Beth-lehem: '
  '12':
  - type: text
    content: 'and let thy house be like the house of Pharez, whom Tamar bare unto Judah, of the seed which the '
  - type: text
    content: LORD
  - type: text
