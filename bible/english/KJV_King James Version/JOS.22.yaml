document_id: JOS.22
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Joshua called the Reubenites, and the Gadites, and the half tribe of Manasseh, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and said unto them, Ye have kept all that Moses the servant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded you, and have obeyed my voice in all that I commanded you: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ye have not left your brethren these many days unto this day, but have kept the charge of the commandment of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And now the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God hath given rest unto your brethren, as he promised them: therefore now return ye, and get you unto your tents, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' unto the land of your possession, which Moses the servant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' gave you on the other side Jordan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But take diligent heed to do the commandment and the law, which Moses the servant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' charged you, to love the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God, and to walk in all his ways, and to keep his commandments, and to cleave unto him, and to serve him with all your heart and with all your soul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Joshua blessed them, and sent them away: and they went unto their tents.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now to the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' half of the tribe of Manasseh Moses had given '
  - type: usfm
    marker: add
    children:
    - type: text
      text: possession
  - type: text
    text: ' in Bashan: but unto the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: other
  - type: text
    text: ' half thereof gave Joshua among their brethren on this side Jordan westward. And when Joshua sent them away also unto their tents, then he blessed them, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and he spake unto them, saying, Return with much riches unto your tents, and with very much cattle, with silver, and with gold, and with brass, and with iron, and with very much raiment: divide the spoil of your enemies with your brethren. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the children of Reuben and the children of Gad and the half tribe of Manasseh returned, and departed from the children of Israel out of Shiloh, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the land of Canaan, to go unto the country of Gilead, to the land of their possession, whereof they were possessed, according to the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' by the hand of Moses.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Altar of Witness
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And when they came unto the borders of Jordan, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' in the land of Canaan, the children of Reuben and the children of Gad and the half tribe of Manasseh built there an altar by Jordan, a great altar to see to. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the children of Israel heard say, Behold, the children of Reuben and the children of Gad and the half tribe of Manasseh have built an altar over against the land of Canaan, in the borders of Jordan, at the passage of the children of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And when the children of Israel heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of it
  - type: text
    text: ', the whole congregation of the children of Israel gathered themselves together at Shiloh, to go up to war against them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And the children of Israel sent unto the children of Reuben, and to the children of Gad, and to the half tribe of Manasseh, into the land of Gilead, Phinehas the son of Eleazar the priest, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and with him ten princes, of each chief house a prince throughout all the tribes of Israel; and each one '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' an head of the house of their fathers among the thousands of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And they came unto the children of Reuben, and to the children of Gad, and to the half tribe of Manasseh, unto the land of Gilead, and they spake with them, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Thus saith the whole congregation of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', What trespass '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this that ye have committed against the God of Israel, to turn away this day from following the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', in that ye have builded you an altar, that ye might rebel this day against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' the iniquity of Peor too little for us, from which we are not cleansed until this day, although there was a plague in the congregation of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'but that ye must turn away this day from following the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '? and it will be, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: seeing
  - type: text
    text: ' ye rebel to day against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that to morrow he will be wroth with the whole congregation of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Notwithstanding, if the land of your possession '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' unclean, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' pass ye over unto the land of the possession of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', wherein the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s tabernacle dwelleth, and take possession among us: but rebel not against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', nor rebel against us, in building you an altar beside the altar of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' our God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Did not Achan the son of Zerah commit a trespass in the accursed thing, and wrath fell on all the congregation of Israel? and that man perished not alone in his iniquity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then the children of Reuben and the children of Gad and the half tribe of Manasseh answered, and said unto the heads of the thousands of Israel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of gods, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of gods, he knoweth, and Israel he shall know; if '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it be
  - type: text
    text: ' in rebellion, or if in transgression against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', (save us not this day,) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'that we have built us an altar to turn from following the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', or if to offer thereon burnt offering or meat offering, or if to offer peace offerings thereon, let the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' himself require '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and if we have not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: rather
  - type: text
    text: ' done it for fear of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' thing, saying, In time to come your children might speak unto our children, saying, What have ye to do with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath made Jordan a border between us and you, ye children of Reuben and children of Gad; ye have no part in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': so shall your children make our children cease from fearing the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Therefore we said, Let us now prepare to build us an altar, not for burnt offering, nor for sacrifice: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: may be
  - type: text
    text: ' a witness between us, and you, and our generations after us, that we might do the service of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' before him with our burnt offerings, and with our sacrifices, and with our peace offerings; that your children may not say to our children in time to come, Ye have no part in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Therefore said we, that it shall be, when they should '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' say to us or to our generations in time to come, that we may say '
  - type: usfm
    marker: add
    children:
    - type: text
      text: again
  - type: text
    text: ', Behold the pattern of the altar of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', which our fathers made, not for burnt offerings, nor for sacrifices; but it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a witness between us and you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'God forbid that we should rebel against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and turn this day from following the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', to build an altar for burnt offerings, for meat offerings, or for sacrifices, beside the altar of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' our God that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' before his tabernacle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And when Phinehas the priest, and the princes of the congregation and heads of the thousands of Israel which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with him, heard the words that the children of Reuben and the children of Gad and the children of Manasseh spake, it pleased them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And Phinehas the son of Eleazar the priest said unto the children of Reuben, and to the children of Gad, and to the children of Manasseh, This day we perceive that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' among us, because ye have not committed this trespass against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': now ye have delivered the children of Israel out of the hand of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And Phinehas the son of Eleazar the priest, and the princes, returned from the children of Reuben, and from the children of Gad, out of the land of Gilead, unto the land of Canaan, to the children of Israel, and brought them word again. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And the thing pleased the children of Israel; and the children of Israel blessed God, and did not intend to go up against them in battle, to destroy the land wherein the children of Reuben and Gad dwelt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And the children of Reuben and the children of Gad called the altar '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'Ed:'
  - type: text
    text: ' for it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' a witness between us that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' God.'
