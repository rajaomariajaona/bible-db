document_id: PSA.3
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: A Psalm of David, when he fled from Absalom his son.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', how are they increased that trouble me!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Many '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' they that rise up against me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Many '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there be
  - type: text
    text: ' which say of my soul,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' no help for him in God. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But thou, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' a shield for me;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: My glory, and the lifter up of mine head.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I cried unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' with my voice,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And he heard me out of his holy hill. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I laid me down and slept;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I awaked; for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' sustained me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I will not be afraid of ten thousands of people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'That have set '
  - type: usfm
    marker: add
    children:
    - type: text
      text: themselves
  - type: text
    text: ' against me round about.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Arise, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; save me, O my God:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For thou hast smitten all mine enemies '
  - type: usfm
    marker: add
    children:
    - type: text
      text: upon
  - type: text
    text: ' the cheek bone;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Thou hast broken the teeth of the ungodly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Salvation '
  - type: usfm
    marker: add
    children:
    - type: text
      text: belongeth
  - type: text
    text: ' unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Thy blessing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon thy people. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
