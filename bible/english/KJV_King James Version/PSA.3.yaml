verses:
  '1':
  - type: text
    content: A Psalm of David, when he fled from Absalom his son.
  - type: text
    content: ' '
  - type: text
    content: LORD
  - type: text
    content: ', how are they increased that trouble me!'
  - type: text
    content: 'Many '
  - type: text
    content: are
  - type: text
    content: ' they that rise up against me.'
  '2':
  - type: text
    content: 'Many '
  - type: text
    content: there be
  - type: text
    content: ' which say of my soul,'
  - type: text
    content: There is
  - type: text
    content: ' no help for him in God. '
  - type: text
    content: Selah.
  '3':
  - type: text
    content: 'But thou, O '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: art
  - type: text
    content: ' a shield for me;'
  - type: text
    content: My glory, and the lifter up of mine head.
  '4':
  - type: text
    content: 'I cried unto the '
  - type: text
    content: LORD
  - type: text
    content: ' with my voice,'
  - type: text
    content: 'And he heard me out of his holy hill. '
  - type: text
    content: Selah.
  '5':
  - type: text
    content: I laid me down and slept;
  - type: text
    content: 'I awaked; for the '
  - type: text
    content: LORD
  - type: text
    content: ' sustained me.'
  '6':
  - type: text
    content: I will not be afraid of ten thousands of people,
  - type: text
    content: 'That have set '
  - type: text
    content: themselves
  - type: text
    content: ' against me round about.'
  '7':
  - type: text
    content: 'Arise, O '
  - type: text
    content: LORD
  - type: text
    content: '; save me, O my God:'
  - type: text
    content: 'For thou hast smitten all mine enemies '
  - type: text
    content: upon
  - type: text
    content: ' the cheek bone;'
  - type: text
    content: Thou hast broken the teeth of the ungodly.
  '8':
  - type: text
    content: 'Salvation '
  - type: text
    content: belongeth
  - type: text
    content: ' unto the '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: 'Thy blessing '
  - type: text
    content: is
  - type: text
    content: ' upon thy people. '
  - type: text
    content: Selah.
