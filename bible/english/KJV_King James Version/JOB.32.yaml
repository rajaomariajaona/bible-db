document_id: JOB.32
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Elihu's Intrusion
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So these three men ceased to answer Job, because he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' righteous in his own eyes. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then was kindled the wrath of Elihu the son of Barachel the Buzite, of the kindred of Ram: against Job was his wrath kindled, because he justified himself rather than God. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Also against his three friends was his wrath kindled, because they had found no answer, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yet
  - type: text
    text: ' had condemned Job. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now Elihu had waited till Job had spoken, because they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' elder than he. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When Elihu saw that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' no answer in the mouth of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: these
  - type: text
    text: ' three men, then his wrath was kindled.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And Elihu the son of Barachel the Buzite answered and said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' young, and ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' very old;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Wherefore I was afraid, and durst not shew you mine opinion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I said, Days should speak,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And multitude of years should teach wisdom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' a spirit in man:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the inspiration of the Almighty giveth them understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Great men are not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: always
  - type: text
    text: ' wise:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Neither do the aged understand judgment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Therefore I said, Hearken to me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I also will shew mine opinion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Behold, I waited for your words;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I gave ear to your reasons,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Whilst ye searched out what to say.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Yea, I attended unto you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And, behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' none of you that convinced Job,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Or
  - type: text
    text: ' that answered his words:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Lest ye should say, We have found out wisdom:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: God thrusteth him down, not man.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now he hath not directed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' words against me:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Neither will I answer him with your speeches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'They were amazed, they answered no more:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They left off speaking.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: When I had waited, (for they spake not,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But stood still, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' answered no more;)'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I said
  - type: text
    text: ', I will answer also my part,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I also will shew mine opinion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: For I am full of matter,
- type: usfm
  marker: q2
  children:
  - type: text
    text: The spirit within me constraineth me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Behold, my belly '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' as wine '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' hath no vent;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: It is ready to burst like new bottles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'I will speak, that I may be refreshed:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will open my lips and answer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Let me not, I pray you, accept any man's person,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Neither let me give flattering titles unto man.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: For I know not to give flattering titles;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: In so doing
  - type: text
    text: ' my Maker would soon take me away.'
