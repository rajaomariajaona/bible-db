  '1':
  - type: heading
    content: Elihu's Intrusion
  - type: text
    content: 'So these three men ceased to answer Job, because he '
  - type: text
    content: was
  - type: text
    content: ' righteous in his own eyes. '
  '10':
  - type: text
    content: Therefore I said, Hearken to me;
  - type: text
    content: I also will shew mine opinion.
  '11':
  - type: text
    content: Behold, I waited for your words;
  - type: text
    content: I gave ear to your reasons,
  - type: text
    content: Whilst ye searched out what to say.
  '12':
  - type: text
    content: Yea, I attended unto you,
  - type: text
    content: 'And, behold, '
  - type: text
    content: there was
  - type: text
    content: ' none of you that convinced Job,'
  - type: text
    content: Or
  - type: text
    content: ' that answered his words:'
  '13':
  - type: text
    content: 'Lest ye should say, We have found out wisdom:'
  - type: text
    content: God thrusteth him down, not man.
  '14':
  - type: text
    content: 'Now he hath not directed '
  - type: text
    content: his
  - type: text
    content: ' words against me:'
  - type: text
    content: Neither will I answer him with your speeches.
  '15':
  - type: text
    content: 'They were amazed, they answered no more:'
  - type: text
    content: They left off speaking.
  '16':
  - type: text
    content: When I had waited, (for they spake not,
  - type: text
    content: 'But stood still, '
  - type: text
    content: and
  - type: text
    content: ' answered no more;)'
  '17':
  - type: text
    content: ' '
  - type: text
    content: I said
  - type: text
    content: ', I will answer also my part,'
  - type: text
    content: I also will shew mine opinion.
  '18':
  - type: text
    content: For I am full of matter,
  - type: text
    content: The spirit within me constraineth me.
  '19':
  - type: text
    content: 'Behold, my belly '
  - type: text
    content: is
  - type: text
    content: ' as wine '
  - type: text
    content: which
  - type: text
    content: ' hath no vent;'
  - type: text
    content: It is ready to burst like new bottles.
  '2':
  - type: text
    content: 'Then was kindled the wrath of Elihu the son of Barachel the Buzite, of the kindred of Ram: against Job was his wrath kindled, because he justified himself rather than God. '
  '20':
  - type: text
    content: 'I will speak, that I may be refreshed:'
  - type: text
    content: I will open my lips and answer.
  '21':
  - type: text
    content: Let me not, I pray you, accept any man's person,
  - type: text
    content: Neither let me give flattering titles unto man.
  '22':
  - type: text
    content: For I know not to give flattering titles;
  - type: text
    content: In so doing
  - type: text
    content: ' my Maker would soon take me away.'
  '3':
  - type: text
    content: 'Also against his three friends was his wrath kindled, because they had found no answer, and '
  - type: text
    content: yet
  - type: text
    content: ' had condemned Job. '
  '4':
  - type: text
    content: 'Now Elihu had waited till Job had spoken, because they '
  - type: text
    content: were
  - type: text
    content: ' elder than he. '
  '5':
  - type: text
    content: 'When Elihu saw that '
  - type: text
    content: there was
  - type: text
    content: ' no answer in the mouth of '
  - type: text
    content: these
  - type: text
    content: ' three men, then his wrath was kindled.'
  '6':
  - type: text
    content: And Elihu the son of Barachel the Buzite answered and said,
  - type: text
    content: 'I '
  - type: text
    content: am
  - type: text
    content: ' young, and ye '
  - type: text
    content: are
  - type: text
    content: ' very old;'
  - type: text
    content: Wherefore I was afraid, and durst not shew you mine opinion.
  '7':
  - type: text
    content: I said, Days should speak,
  - type: text
    content: And multitude of years should teach wisdom.
  '8':
  - type: text
    content: 'But '
  - type: text
    content: there is
  - type: text
    content: ' a spirit in man:'
  - type: text
    content: And the inspiration of the Almighty giveth them understanding.
  '9':
  - type: text
    content: 'Great men are not '
  - type: text
    content: always
  - type: text
    content: ' wise:'
  - type: text
    content: Neither do the aged understand judgment.
