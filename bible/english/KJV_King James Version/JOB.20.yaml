  '1':
  - type: heading
    content: Zophar's Speech
  - type: text
    content: Then answered Zophar the Naamathite, and said,
  '10':
  - type: text
    content: His children shall seek to please the poor,
  - type: text
    content: And his hands shall restore their goods.
  '11':
  - type: text
    content: 'His bones are full '
  - type: text
    content: of the sin
  - type: text
    content: ' of his youth,'
  - type: text
    content: Which shall lie down with him in the dust.
  '12':
  - type: text
    content: Though wickedness be sweet in his mouth,
  - type: text
    content: Though
  - type: text
    content: ' he hide it under his tongue;'
  '13':
  - type: text
    content: ' '
  - type: text
    content: Though
  - type: text
    content: ' he spare it, and forsake it not;'
  - type: text
    content: 'But keep it still within his mouth:'
  '14':
  - type: text
    content: ' '
  - type: text
    content: Yet
  - type: text
    content: ' his meat in his bowels is turned,'
  - type: text
    content: It is
  - type: text
    content: ' the gall of asps within him.'
  '15':
  - type: text
    content: 'He hath swallowed down riches, and he shall vomit them up again:'
  - type: text
    content: God shall cast them out of his belly.
  '16':
  - type: text
    content: 'He shall suck the poison of asps:'
  - type: text
    content: The viper's tongue shall slay him.
  '17':
  - type: text
    content: He shall not see the rivers,
  - type: text
    content: The floods, the brooks of honey and butter.
  '18':
  - type: text
    content: That which he laboured for shall he restore,
  - type: text
    content: 'And shall not swallow '
  - type: text
    content: it
  - type: text
    content: ' down:'
  - type: text
    content: 'According to '
  - type: text
    content: his
  - type: text
    content: ' substance '
  - type: text
    content: shall
  - type: text
    content: ' the restitution '
  - type: text
    content: be
  - type: text
    content: ','
  - type: text
    content: 'and he shall not rejoice '
  - type: text
    content: therein
  - type: text
    content: .
  '19':
  - type: text
    content: 'Because he hath oppressed '
  - type: text
    content: and
  - type: text
    content: ' hath forsaken the poor;'
  - type: text
    content: Because
  - type: text
    content: ' he hath violently taken away an house which he builded not;'
  '2':
  - type: text
    content: Therefore do my thoughts cause me to answer,
  - type: text
    content: 'And for '
  - type: text
    content: this
  - type: text
    content: ' I make haste.'
  '20':
  - type: text
    content: Surely he shall not feel quietness in his belly,
  - type: text
    content: He shall not save of that which he desired.
  '21':
  - type: text
    content: There shall none of his meat be left;
  - type: text
    content: Therefore shall no man look for his goods.
  '22':
  - type: text
    content: 'In the fulness of his sufficiency he shall be in straits:'
  - type: text
    content: Every hand of the wicked shall come upon him.
  '23':
  - type: text
    content: ' '
  - type: text
    content: When
  - type: text
    content: ' he is about to fill his belly,'
  - type: text
    content: God
  - type: text
    content: ' shall cast the fury of his wrath upon him,'
  - type: text
    content: 'And shall rain '
  - type: text
    content: it
  - type: text
    content: ' upon him while he is eating.'
  '24':
  - type: text
    content: He shall flee from the iron weapon,
  - type: text
    content: And
  - type: text
    content: ' the bow of steel shall strike him through.'
  '25':
  - type: text
    content: It is drawn, and cometh out of the body;
  - type: text
    content: 'Yea, the glittering sword cometh out of his gall:'
  - type: text
    content: 'Terrors '
  - type: text
    content: are
  - type: text
    content: ' upon him.'
  '26':
  - type: text
    content: 'All darkness '
  - type: text
    content: shall be
  - type: text
    content: ' hid in his secret places:'
  - type: text
    content: A fire not blown shall consume him;
  - type: text
    content: It shall go ill with him that is left in his tabernacle.
  '27':
  - type: text
    content: The heaven shall reveal his iniquity;
  - type: text
    content: And the earth shall rise up against him.
  '28':
  - type: text
    content: The increase of his house shall depart,
  - type: text
    content: And his goods
  - type: text
    content: ' shall flow away in the day of his wrath.'
  '29':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the portion of a wicked man from God,'
  - type: text
    content: And the heritage appointed unto him by God.
  '3':
  - type: text
    content: I have heard the check of my reproach,
  - type: text
    content: And the spirit of my understanding causeth me to answer.
  '4':
  - type: text
    content: 'Knowest thou '
  - type: text
    content: not
  - type: text
    content: ' this of old,'
  - type: text
    content: Since man was placed upon earth,
  '5':
  - type: text
    content: 'That the triumphing of the wicked '
  - type: text
    content: is
  - type: text
    content: ' short,'
  - type: text
    content: 'And the joy of the hypocrite '
  - type: text
    content: but
  - type: text
    content: ' for a moment?'
  '6':
  - type: text
    content: Though his excellency mount up to the heavens,
  - type: text
    content: And his head reach unto the clouds;
  '7':
  - type: text
    content: ' '
  - type: text
    content: Yet
  - type: text
    content: ' he shall perish for ever like his own dung:'
  - type: text
    content: 'They which have seen him shall say, Where '
  - type: text
    content: is
  - type: text
    content: ' he?'
  '8':
  - type: text
    content: 'He shall fly away as a dream, and shall not be found:'
  - type: text
    content: Yea, he shall be chased away as a vision of the night.
  '9':
  - type: text
    content: 'The eye also '
  - type: text
    content: which
  - type: text
    content: ' saw him shall '
  - type: text
    content: see him
  - type: text
    content: ' no more;'
  - type: text
    content: Neither shall his place any more behold him.
