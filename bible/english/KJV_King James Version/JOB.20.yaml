document_id: JOB.20
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Zophar's Speech
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then answered Zophar the Naamathite, and said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Therefore do my thoughts cause me to answer,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' I make haste.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I have heard the check of my reproach,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the spirit of my understanding causeth me to answer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Knowest thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: not
  - type: text
    text: ' this of old,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Since man was placed upon earth,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'That the triumphing of the wicked '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' short,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the joy of the hypocrite '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' for a moment?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Though his excellency mount up to the heavens,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And his head reach unto the clouds;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Yet
  - type: text
    text: ' he shall perish for ever like his own dung:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They which have seen him shall say, Where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' he?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He shall fly away as a dream, and shall not be found:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yea, he shall be chased away as a vision of the night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The eye also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' saw him shall '
  - type: usfm
    marker: add
    children:
    - type: text
      text: see him
  - type: text
    text: ' no more;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Neither shall his place any more behold him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: His children shall seek to please the poor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And his hands shall restore their goods.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'His bones are full '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of the sin
  - type: text
    text: ' of his youth,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Which shall lie down with him in the dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Though wickedness be sweet in his mouth,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Though
  - type: text
    text: ' he hide it under his tongue;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Though
  - type: text
    text: ' he spare it, and forsake it not;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But keep it still within his mouth:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Yet
  - type: text
    text: ' his meat in his bowels is turned,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' the gall of asps within him.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He hath swallowed down riches, and he shall vomit them up again:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: God shall cast them out of his belly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He shall suck the poison of asps:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The viper's tongue shall slay him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He shall not see the rivers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: The floods, the brooks of honey and butter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: That which he laboured for shall he restore,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And shall not swallow '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' down:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'According to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' substance '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall
  - type: text
    text: ' the restitution '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and he shall not rejoice '
  - type: usfm
    marker: add
    children:
    - type: text
      text: therein
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Because he hath oppressed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' hath forsaken the poor;'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Because
  - type: text
    text: ' he hath violently taken away an house which he builded not;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Surely he shall not feel quietness in his belly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: He shall not save of that which he desired.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: There shall none of his meat be left;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Therefore shall no man look for his goods.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'In the fulness of his sufficiency he shall be in straits:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Every hand of the wicked shall come upon him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: When
  - type: text
    text: ' he is about to fill his belly,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: God
  - type: text
    text: ' shall cast the fury of his wrath upon him,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And shall rain '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon him while he is eating.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: He shall flee from the iron weapon,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' the bow of steel shall strike him through.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: It is drawn, and cometh out of the body;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Yea, the glittering sword cometh out of his gall:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Terrors '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' upon him.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'All darkness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' hid in his secret places:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: A fire not blown shall consume him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: It shall go ill with him that is left in his tabernacle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The heaven shall reveal his iniquity;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the earth shall rise up against him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: The increase of his house shall depart,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And his goods
  - type: text
    text: ' shall flow away in the day of his wrath.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the portion of a wicked man from God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the heritage appointed unto him by God.
