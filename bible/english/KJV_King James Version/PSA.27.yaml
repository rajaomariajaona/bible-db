document_id: PSA.27,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: A Psalm
    - type: text
      text: ' of David.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my light and my salvation; whom shall I fear?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the strength of my life; of whom shall I be afraid?'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: When my father and my mother forsake me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will take me up.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Teach me thy way, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And lead me in a plain path, because of mine enemies.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Deliver me not over unto the will of mine enemies:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For false witnesses are risen up against me, and such as breathe out cruelty.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: I had fainted
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Unless I had believed to see the goodness of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in the land of the living.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Wait on the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ':'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Be of good courage, and he shall strengthen thine heart: wait, I say, on the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'When the wicked, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' mine enemies and my foes, came upon me to eat up my flesh,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They stumbled and fell.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Though an host should encamp against me, my heart shall not fear:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Though war should rise against me, in this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: will
    - type: text
      text: ' I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' confident.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'One '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thing
    - type: text
      text: ' have I desired of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', that will I seek after;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That I may dwell in the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' all the days of my life,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To behold the beauty of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and to enquire in his temple.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For in the time of trouble he shall hide me in his pavilion:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the secret of his tabernacle shall he hide me; he shall set me up upon a rock.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: And now shall mine head be lifted up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Above mine enemies round about me:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore will I offer in his tabernacle sacrifices of joy;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will sing, yea, I will sing praises unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Hear, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: when
    - type: text
      text: ' I cry with my voice:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Have mercy also upon me, and answer me.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: When thou saidst
    - type: text
      text: ', Seek ye my face; my heart said unto thee,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Thy face, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', will I seek.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Hide not thy face '
    - type: usfm
      marker: add
      children:
      - type: text
        text: far
    - type: text
      text: ' from me;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Put not thy servant away in anger:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thou hast been my help;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Leave me not, neither forsake me, O God of my salvation.
