verses:
  '1':
  - type: text
    content: 'So I returned, and considered all the oppressions that are done under the sun: and behold the tears of '
  - type: text
    content: such as were
  - type: text
    content: ' oppressed, and they had no comforter; and on the side of their oppressors '
  - type: text
    content: there was
  - type: text
    content: ' power; but they had no comforter. '
  '10':
  - type: text
    content: 'For if they fall, the one will lift up his fellow: but woe to him '
  - type: text
    content: that is
  - type: text
    content: ' alone when he falleth; for '
  - type: text
    content: he hath
  - type: text
    content: ' not another to help him up. '
  '11':
  - type: text
    content: 'Again, if two lie together, then they have heat: but how can one be warm '
  - type: text
    content: alone?
  - type: text
    content: ' '
  '12':
  - type: text
    content: And if one prevail against him, two shall withstand him; and a threefold cord is not quickly broken.
  '13':
  - type: text
    content: 'Better '
  - type: text
    content: is
  - type: text
    content: ' a poor and a wise child than an old and foolish king, who will no more be admonished. '
  '14':
  - type: text
    content: 'For out of prison he cometh to reign; whereas also '
  - type: text
    content: he that is
  - type: text
    content: ' born in his kingdom becometh poor. '
  '15':
  - type: text
    content: 'I considered all the living which walk under the sun, with the second child that shall stand up in his stead. '
  '16':
  - type: text
    content: There is
  - type: text
    content: ' no end of all the people, '
  - type: text
    content: even
  - type: text
    content: ' of all that have been before them: they also that come after shall not rejoice in him. Surely this also '
  - type: text
    content: is
  - type: text
    content: ' vanity and vexation of spirit.'
  '2':
  - type: text
    content: 'Wherefore I praised the dead which are already dead more than the living which are yet alive. '
  '3':
  - type: text
    content: 'Yea, better '
  - type: text
    content: is he
  - type: text
    content: ' than both they, which hath not yet been, who hath not seen the evil work that is done under the sun.'
  '4':
  - type: text
    content: 'Again, I considered all travail, and every right work, that for this a man is envied of his neighbour. This '
  - type: text
    content: is
  - type: text
    content: ' also vanity and vexation of spirit. '
  '5':
  - type: text
    content: 'The fool foldeth his hands together, and eateth his own flesh. '
  '6':
  - type: text
    content: 'Better '
  - type: text
    content: is
  - type: text
    content: ' an handful '
  - type: text
    content: with
  - type: text
    content: ' quietness, than both the hands full '
  - type: text
    content: with
  - type: text
    content: ' travail and vexation of spirit.'
  '7':
  - type: text
    content: 'Then I returned, and I saw vanity under the sun. '
  '8':
  - type: text
    content: 'There is one '
  - type: text
    content: alone
  - type: text
    content: ', and '
  - type: text
    content: there is
  - type: text
    content: ' not a second; yea, he hath neither child nor brother: yet '
  - type: text
    content: is there
  - type: text
    content: ' no end of all his labour; neither is his eye satisfied with riches; neither '
  - type: text
    content: saith he
  - type: text
    content: ', For whom do I labour, and bereave my soul of good? This '
  - type: text
    content: is
  - type: text
    content: ' also vanity, yea, it '
  - type: text
    content: is
  - type: text
    content: ' a sore travail. '
  '9':
  - type: text
    content: 'Two '
  - type: text
    content: are
  - type: text
    content: ' better than one; because they have a good reward for their labour. '
