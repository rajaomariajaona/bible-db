document_id: ECC.4,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I returned, and considered all the oppressions that are done under the sun: and behold the tears of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: such as were
    - type: text
      text: ' oppressed, and they had no comforter; and on the side of their oppressors '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' power; but they had no comforter. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if they fall, the one will lift up his fellow: but woe to him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is
    - type: text
      text: ' alone when he falleth; for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he hath
    - type: text
      text: ' not another to help him up. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Again, if two lie together, then they have heat: but how can one be warm '
    - type: usfm
      marker: add
      children:
      - type: text
        text: alone?
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And if one prevail against him, two shall withstand him; and a threefold cord is not quickly broken.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Better '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a poor and a wise child than an old and foolish king, who will no more be admonished. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For out of prison he cometh to reign; whereas also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he that is
    - type: text
      text: ' born in his kingdom becometh poor. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I considered all the living which walk under the sun, with the second child that shall stand up in his stead. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: There is
    - type: text
      text: ' no end of all the people, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' of all that have been before them: they also that come after shall not rejoice in him. Surely this also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' vanity and vexation of spirit.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wherefore I praised the dead which are already dead more than the living which are yet alive. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yea, better '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is he
    - type: text
      text: ' than both they, which hath not yet been, who hath not seen the evil work that is done under the sun.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Again, I considered all travail, and every right work, that for this a man is envied of his neighbour. This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' also vanity and vexation of spirit. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The fool foldeth his hands together, and eateth his own flesh. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Better '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' an handful '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' quietness, than both the hands full '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' travail and vexation of spirit.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I returned, and I saw vanity under the sun. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There is one '
    - type: usfm
      marker: add
      children:
      - type: text
        text: alone
    - type: text
      text: ', and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' not a second; yea, he hath neither child nor brother: yet '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is there
    - type: text
      text: ' no end of all his labour; neither is his eye satisfied with riches; neither '
    - type: usfm
      marker: add
      children:
      - type: text
        text: saith he
    - type: text
      text: ', For whom do I labour, and bereave my soul of good? This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' also vanity, yea, it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a sore travail. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Two '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' better than one; because they have a good reward for their labour. '
