document_id: MAT.20,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Labourers in the Vineyard
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For the kingdom of heaven is like unto a man '
      - type: usfm
        marker: add
        children:
        - type: text
          text: that is
      - type: text
        text: ' an householder, which went out early in the morning to hire labourers into his vineyard.'
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But when the first came, they supposed that they should have received more; and they likewise received every man a penny.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And when they had received '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ', they murmured against the goodman of the house,'
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'saying, These last have wrought '
      - type: usfm
        marker: add
        children:
        - type: text
          text: but
      - type: text
        text: ' one hour, and thou hast made them equal unto us, which have borne the burden and heat of the day.'
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But he answered one of them, and said, Friend, I do thee no wrong: didst not thou agree with me for a penny?'
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Take '
      - type: usfm
        marker: add
        children:
        - type: text
          text: that
      - type: text
        text: ' thine '
      - type: usfm
        marker: add
        children:
        - type: text
          text: is
      - type: text
        text: ', and go thy way: I will give unto this last, even as unto thee.'
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Is it not lawful for me to do what I will with mine own? Is thine eye evil, because I am good?
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'So the last shall be first, and the first last: for many be called, but few chosen.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And Jesus going up to Jerusalem took the twelve disciples apart in the way, and said unto them, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Behold, we go up to Jerusalem; and the Son of man shall be betrayed unto the chief priests and unto the scribes, and they shall condemn him to death,
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and shall deliver him to the Gentiles to mock, and to scourge, and to crucify '
      - type: usfm
        marker: add
        children:
        - type: text
          text: him
      - type: text
        text: ': and the third day he shall rise again.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Mother of James and John
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And when he had agreed with the labourers for a penny a day, he sent them into his vineyard.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then came to him the mother of Zebedee''s children with her sons, worshipping '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', and desiring a certain thing of him. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And he said unto her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: What wilt thou?
    - type: text
      text: ' She saith unto him, Grant that these my two sons may sit, the one on thy right hand, and the other on the left, in thy kingdom. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'But Jesus answered and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ye know not what ye ask. Are ye able to drink of the cup that I shall drink of, and to be baptized with the baptism that I am baptized with?
    - type: text
      text: ' They say unto him, We are able. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And he saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ye shall drink indeed of my cup, and be baptized with the baptism that I am baptized with: but to sit on my right hand, and on my left, is not mine to give, but '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it shall be given to them
      - type: text
        text: ' for whom it is prepared of my Father.'
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And when the ten heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', they were moved with indignation against the two brethren. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'But Jesus called them '
    - type: usfm
      marker: add
      children:
      - type: text
        text: unto him
    - type: text
      text: ', and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ye know that the princes of the Gentiles exercise dominion over them, and they that are great exercise authority upon them.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But it shall not be so among you: but whosoever will be great among you, let him be your minister;'
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and whosoever will be chief among you, let him be your servant:'
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: even as the Son of man came not to be ministered unto, but to minister, and to give his life a ransom for many.
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: And as they departed from Jericho, a great multitude followed him.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Two Blind Men
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And he went out about the third hour, and saw others standing idle in the marketplace,
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And, behold, two blind men sitting by the way side, when they heard that Jesus passed by, cried out, saying, Have mercy on us, O Lord, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thou
    - type: text
      text: ' Son of David. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And the multitude rebuked them, because they should hold their peace: but they cried the more, saying, Have mercy on us, O Lord, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thou
    - type: text
      text: ' Son of David. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And Jesus stood still, and called them, and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: What will ye that I shall do unto you?
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'They say unto him, Lord, that our eyes may be opened. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'So Jesus had compassion '
    - type: usfm
      marker: add
      children:
      - type: text
        text: on them
    - type: text
      text: ', and touched their eyes: and immediately their eyes received sight, and they followed him.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and said unto them; Go ye also into the vineyard, and whatsoever is right I will give you. And they went their way.
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Again he went out about the sixth and ninth hour, and did likewise.
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And about the eleventh hour he went out, and found others standing idle, and saith unto them, Why stand ye here all the day idle?
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'They say unto him, Because no man hath hired us. He saith unto them, Go ye also into the vineyard; and whatsoever is right, '
      - type: usfm
        marker: add
        children:
        - type: text
          text: that
      - type: text
        text: ' shall ye receive.'
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'So when even was come, the lord of the vineyard saith unto his steward, Call the labourers, and give them '
      - type: usfm
        marker: add
        children:
        - type: text
          text: their
      - type: text
        text: ' hire, beginning from the last unto the first.'
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And when they came that '
      - type: usfm
        marker: add
        children:
        - type: text
          text: were hired
      - type: text
        text: ' about the eleventh hour, they received every man a penny.'
    - type: text
      text: ' '
