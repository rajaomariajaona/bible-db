document_id: PSA.79,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Psalm of Asaph.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: O God, the heathen are come into thine inheritance;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thy holy temple have they defiled; They have laid Jerusalem on heaps.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Wherefore should the heathen say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' their God?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let him be known among the heathen in our sight
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: By
    - type: text
      text: ' the revenging of the blood of thy servants '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which is
    - type: text
      text: ' shed.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Let the sighing of the prisoner come before thee;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: According to the greatness of thy power preserve thou those that are appointed to die;
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: And render unto our neighbours sevenfold into their bosom
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their reproach, wherewith they have reproached thee, O Lord.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'So we thy people and sheep of thy pasture will give thee thanks for ever:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We will shew forth thy praise to all generations.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The dead bodies of thy servants have they given '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' meat unto the fowls of the heaven,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The flesh of thy saints unto the beasts of the earth.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Their blood have they shed like water round about Jerusalem;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' none to bury '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: We are become a reproach to our neighbours,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A scorn and derision to them that are round about us.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'How long, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '? Wilt thou be angry for ever?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shall thy jealousy burn like fire?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Pour out thy wrath upon the heathen that have not known thee,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And upon the kingdoms that have not called upon thy name.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: For they have devoured Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And laid waste his dwelling place.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'O remember not against us former iniquities: Let thy tender mercies speedily prevent us:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For we are brought very low.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Help us, O God of our salvation, for the glory of thy name:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And deliver us, and purge away our sins, for thy name's sake.
