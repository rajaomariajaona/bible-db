document_id: PSA.79,1
type_code: eng
verses:
  '1':
  - type: text
    content: A Psalm of Asaph.
  - type: text
    content: O God, the heathen are come into thine inheritance;
  - type: text
    content: Thy holy temple have they defiled; They have laid Jerusalem on heaps.
  '10':
  - type: text
    content: Wherefore should the heathen say,
  - type: text
    content: 'Where '
  - type: text
    content: is
  - type: text
    content: ' their God?'
  - type: text
    content: Let him be known among the heathen in our sight
  - type: text
    content: By
  - type: text
    content: ' the revenging of the blood of thy servants '
  - type: text
    content: which is
  - type: text
    content: ' shed.'
  '11':
  - type: text
    content: Let the sighing of the prisoner come before thee;
  - type: text
    content: According to the greatness of thy power preserve thou those that are appointed to die;
  '12':
  - type: text
    content: And render unto our neighbours sevenfold into their bosom
  - type: text
    content: Their reproach, wherewith they have reproached thee, O Lord.
  '13':
  - type: text
    content: 'So we thy people and sheep of thy pasture will give thee thanks for ever:'
  - type: text
    content: We will shew forth thy praise to all generations.
  '2':
  - type: text
    content: 'The dead bodies of thy servants have they given '
  - type: text
    content: to be
  - type: text
    content: ' meat unto the fowls of the heaven,'
  - type: text
    content: The flesh of thy saints unto the beasts of the earth.
  '3':
  - type: text
    content: Their blood have they shed like water round about Jerusalem;
  - type: text
    content: 'And '
  - type: text
    content: there was
  - type: text
    content: ' none to bury '
  - type: text
    content: them
  - type: text
    content: .
  '4':
  - type: text
    content: We are become a reproach to our neighbours,
  - type: text
    content: A scorn and derision to them that are round about us.
  '5':
  - type: text
    content: 'How long, '
  - type: text
    content: LORD
  - type: text
    content: '? Wilt thou be angry for ever?'
  - type: text
    content: Shall thy jealousy burn like fire?
  '6':
  - type: text
    content: Pour out thy wrath upon the heathen that have not known thee,
  - type: text
    content: And upon the kingdoms that have not called upon thy name.
  '7':
  - type: text
    content: For they have devoured Jacob,
  - type: text
    content: And laid waste his dwelling place.
  '8':
  - type: text
    content: 'O remember not against us former iniquities: Let thy tender mercies speedily prevent us:'
  - type: text
    content: For we are brought very low.
  '9':
  - type: text
    content: 'Help us, O God of our salvation, for the glory of thy name:'
  - type: text
    content: And deliver us, and purge away our sins, for thy name's sake.
