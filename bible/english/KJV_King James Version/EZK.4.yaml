document_id: EZK.4,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Before the fall of Jerusalem
  - type: heading
    content: Symbols of its Fall
  - type: text
    content: 'Thou also, son of man, take thee a tile, and lay it before thee, and pourtray upon it the city, '
  - type: text
    content: even
  - type: text
    content: ' Jerusalem: '
  '10':
  - type: text
    content: 'And thy meat which thou shalt eat '
  - type: text
    content: shall be
  - type: text
    content: ' by weight, twenty shekels a day: from time to time shalt thou eat it. '
  '11':
  - type: text
    content: 'Thou shalt drink also water by measure, the sixth part of an hin: from time to time shalt thou drink. '
  '12':
  - type: text
    content: 'And thou shalt eat it '
  - type: text
    content: as
  - type: text
    content: ' barley cakes, and thou shalt bake it with dung that cometh out of man, in their sight. '
  '13':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said, Even thus shall the children of Israel eat their defiled bread among the Gentiles, whither I will drive them. '
  '14':
  - type: text
    content: 'Then said I, Ah Lord '
  - type: text
    content: GOD
  - type: text
    content: '! behold, my soul hath not been polluted: for from my youth up even till now have I not eaten of that which dieth of itself, or is torn in pieces; neither came there abominable flesh into my mouth. '
  '15':
  - type: text
    content: 'Then he said unto me, Lo, I have given thee cow''s dung for man''s dung, and thou shalt prepare thy bread therewith. '
  '16':
  - type: text
    content: 'Moreover he said unto me, Son of man, behold, I will break the staff of bread in Jerusalem: and they shall eat bread by weight, and with care; and they shall drink water by measure, and with astonishment: '
  '17':
  - type: text
    content: that they may want bread and water, and be astonied one with another, and consume away for their iniquity.
  '2':
  - type: text
    content: 'and lay siege against it, and build a fort against it, and cast a mount against it; set the camp also against it, and set '
  - type: text
    content: battering
  - type: text
    content: ' rams against it round about. '
  '3':
  - type: text
    content: 'Moreover take thou unto thee an iron pan, and set it '
  - type: text
    content: for
  - type: text
    content: ' a wall of iron between thee and the city: and set thy face against it, and it shall be besieged, and thou shalt lay siege against it. This '
  - type: text
    content: shall be
  - type: text
    content: ' a sign to the house of Israel.'
  '4':
  - type: text
    content: 'Lie thou also upon thy left side, and lay the iniquity of the house of Israel upon it: '
  - type: text
    content: according
  - type: text
    content: ' to the number of the days that thou shalt lie upon it thou shalt bear their iniquity.'
  '5':
  - type: text
    content: 'For I have laid upon thee the years of their iniquity, according to the number of the days, three hundred and ninety days: so shalt thou bear the iniquity of the house of Israel. '
  '6':
  - type: text
    content: 'And when thou hast accomplished them, lie again on thy right side, and thou shalt bear the iniquity of the house of Judah forty days: I have appointed thee each day for a year. '
  '7':
  - type: text
    content: 'Therefore thou shalt set thy face toward the siege of Jerusalem, and thine arm '
  - type: text
    content: shall be
  - type: text
    content: ' uncovered, and thou shalt prophesy against it. '
  '8':
  - type: text
    content: And, behold, I will lay bands upon thee, and thou shalt not turn thee from one side to another, till thou hast ended the days of thy siege.
  '9':
  - type: text
    content: 'Take thou also unto thee wheat, and barley, and beans, and lentiles, and millet, and fitches, and put them in one vessel, and make thee bread thereof, '
  - type: text
    content: according
  - type: text
    content: ' to the number of the days that thou shalt lie upon thy side, three hundred and ninety days shalt thou eat thereof. '
