document_id: EZK.39,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, thou son of man, prophesy against Gog, and say, Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; Behold, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' against thee, O Gog, the chief prince of Meshech and Tubal: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so that they shall take no wood out of the field, neither cut down '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' out of the forests; for they shall burn the weapons with fire: and they shall spoil those that spoiled them, and rob those that robbed them, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass in that day, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' I will give unto Gog a place there of graves in Israel, the valley of the passengers on the east of the sea: and it shall stop the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: noses
    - type: text
      text: ' of the passengers: and there shall they bury Gog and all his multitude: and they shall call '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' The valley of Hamon-gog. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And seven months shall the house of Israel be burying of them, that they may cleanse the land. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yea, all the people of the land shall bury '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: '; and it shall be to them a renown the day that I shall be glorified, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they shall sever out men of continual employment, passing through the land to bury with the passengers those that remain upon the face of the earth, to cleanse it: after the end of seven months shall they search. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the passengers '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' pass through the land, when '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' seeth a man''s bone, then shall he set up a sign by it, till the buriers have buried it in the valley of Hamon-gog. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And also the name of the city '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' Hamonah. Thus shall they cleanse the land.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And, thou son of man, thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; Speak unto every feathered fowl, and to every beast of the field, Assemble yourselves, and come; gather yourselves on every side to my sacrifice that I do sacrifice for you, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' a great sacrifice upon the mountains of Israel, that ye may eat flesh, and drink blood. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ye shall eat the flesh of the mighty, and drink the blood of the princes of the earth, of rams, of lambs, and of goats, of bullocks, all of them fatlings of Bashan. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And ye shall eat fat till ye be full, and drink blood till ye be drunken, of my sacrifice which I have sacrificed for you. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and I will turn thee back, and leave but the sixth part of thee, and will cause thee to come up from the north parts, and will bring thee upon the mountains of Israel: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus ye shall be filled at my table with horses and chariots, with mighty men, and with all men of war, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: .
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will set my glory among the heathen, and all the heathen shall see my judgment that I have executed, and my hand that I have laid upon them. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the house of Israel shall know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' their God from that day and forward. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the heathen shall know that the house of Israel went into captivity for their iniquity: because they trespassed against me, therefore hid I my face from them, and gave them into the hand of their enemies: so fell they all by the sword. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: According to their uncleanness and according to their transgressions have I done unto them, and hid my face from them.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; Now will I bring again the captivity of Jacob, and have mercy upon the whole house of Israel, and will be jealous for my holy name; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'after that they have borne their shame, and all their trespasses whereby they have trespassed against me, when they dwelt safely in their land, and none made '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' afraid. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When I have brought them again from the people, and gathered them out of their enemies'' lands, and am sanctified in them in the sight of many nations; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then shall they know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' their God, which caused them to be led into captivity among the heathen: but I have gathered them unto their own land, and have left none of them any more there. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Neither will I hide my face any more from them: for I have poured out my spirit upon the house of Israel, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and I will smite thy bow out of thy left hand, and will cause thine arrows to fall out of thy right hand. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt fall upon the mountains of Israel, thou, and all thy bands, and the people that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' with thee: I will give thee unto the ravenous birds of every sort, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to
    - type: text
      text: ' the beasts of the field to be devoured. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt fall upon the open field: for I have spoken '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will send a fire on Magog, and among them that dwell carelessly in the isles: and they shall know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So will I make my holy name known in the midst of my people Israel; and I will not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: let them
    - type: text
      text: ' pollute my holy name any more: and the heathen shall know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', the Holy One in Israel. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, it is come, and it is done, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the day whereof I have spoken. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they that dwell in the cities of Israel shall go forth, and shall set on fire and burn the weapons, both the shields and the bucklers, the bows and the arrows, and the handstaves, and the spears, and they shall burn them with fire seven years: '
