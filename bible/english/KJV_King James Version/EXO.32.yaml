- type: usfm
  marker: s2
  children:
  - type: text
    text: The Golden Calf
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And when the people saw that Moses delayed to come down out of the mount, the people gathered themselves together unto Aaron, and said unto him, Up, make us gods, which shall go before us; for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as for
  - type: text
    text: ' this Moses, the man that brought us up out of the land of Egypt, we wot not what is become of him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Aaron said unto them, Break off the golden earrings, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' in the ears of your wives, of your sons, and of your daughters, and bring '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' unto me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And all the people brake off the golden earrings which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in their ears, and brought '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' unto Aaron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And he received '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' at their hand, and fashioned it with a graving tool, after he had made it a molten calf: and they said, These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' thy gods, O Israel, which brought thee up out of the land of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And when Aaron saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', he built an altar before it; and Aaron made proclamation, and said, To morrow '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a feast to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And they rose up early on the morrow, and offered burnt offerings, and brought peace offerings; and the people sat down to eat and to drink, and rose up to play.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Moses, Go, get thee down; for thy people, which thou broughtest out of the land of Egypt, have corrupted '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'themselves:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'they have turned aside quickly out of the way which I commanded them: they have made them a molten calf, and have worshipped it, and have sacrificed thereunto, and said, These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' thy gods, O Israel, which have brought thee up out of the land of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Moses, I have seen this people, and, behold, it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a stiffnecked people: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'now therefore let me alone, that my wrath may wax hot against them, and that I may consume them: and I will make of thee a great nation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Moses besought the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' his God, and said, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', why doth thy wrath wax hot against thy people, which thou hast brought forth out of the land of Egypt with great power, and with a mighty hand? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Wherefore should the Egyptians speak, and say, For mischief did he bring them out, to slay them in the mountains, and to consume them from the face of the earth? Turn from thy fierce wrath, and repent of this evil against thy people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Remember Abraham, Isaac, and Israel, thy servants, to whom thou swarest by thine own self, and saidst unto them, I will multiply your seed as the stars of heaven, and all this land that I have spoken of will I give unto your seed, and they shall inherit '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' for ever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' repented of the evil which he thought to do unto his people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Moses turned, and went down from the mount, and the two tables of the testimony '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in his hand: the tables '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' written on both their sides; on the one side and on the other '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' they written. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the tables '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' the work of God, and the writing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the writing of God, graven upon the tables. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And when Joshua heard the noise of the people as they shouted, he said unto Moses, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' a noise of war in the camp. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And he said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' not the voice of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them that
  - type: text
    text: ' shout for mastery, neither '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is it
  - type: text
    text: ' the voice of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them that
  - type: text
    text: ' cry for being overcome: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' the noise of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them that
  - type: text
    text: ' sing do I hear.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And it came to pass, as soon as he came nigh unto the camp, that he saw the calf, and the dancing: and Moses'' anger waxed hot, and he cast the tables out of his hands, and brake them beneath the mount. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And he took the calf which they had made, and burnt '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' in the fire, and ground '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to powder, and strawed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon the water, and made the children of Israel drink '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of it
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And Moses said unto Aaron, What did this people unto thee, that thou hast brought so great a sin upon them? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And Aaron said, Let not the anger of my lord wax hot: thou knowest the people, that they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are set
  - type: text
    text: ' on mischief. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For they said unto me, Make us gods, which shall go before us: for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as for
  - type: text
    text: ' this Moses, the man that brought us up out of the land of Egypt, we wot not what is become of him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And I said unto them, Whosoever hath any gold, let them break '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' off. So they gave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' me: then I cast it into the fire, and there came out this calf.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And when Moses saw that the people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' naked; (for Aaron had made them naked unto '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' shame among their enemies:) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'then Moses stood in the gate of the camp, and said, Who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' on the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s side? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: let him come
  - type: text
    text: ' unto me. And all the sons of Levi gathered themselves together unto him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And he said unto them, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel, Put every man his sword by his side, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' go in and out from gate to gate throughout the camp, and slay every man his brother, and every man his companion, and every man his neighbour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And the children of Levi did according to the word of Moses: and there fell of the people that day about three thousand men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'For Moses had said, Consecrate yourselves to day to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', even every man upon his son, and upon his brother; that he may bestow upon you a blessing this day.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Repentance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And it came to pass on the morrow, that Moses said unto the people, Ye have sinned a great sin: and now I will go up unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; peradventure I shall make an atonement for your sin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And Moses returned unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and said, Oh, this people have sinned a great sin, and have made them gods of gold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Yet now, if thou wilt forgive their sin–; and if not, blot me, I pray thee, out of thy book which thou hast written. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Moses, Whosoever hath sinned against me, him will I blot out of my book. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Therefore now go, lead the people unto '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the place
  - type: text
    text: ' of which I have spoken unto thee: behold, mine Angel shall go before thee: nevertheless in the day when I visit I will visit their sin upon them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' plagued the people, because they made the calf, which Aaron made.'
