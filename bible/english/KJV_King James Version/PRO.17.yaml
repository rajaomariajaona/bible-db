document_id: PRO.17,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Better '
  - type: text
    content: is
  - type: text
    content: ' a dry morsel, and quietness therewith,'
  - type: text
    content: 'Than an house full of sacrifices '
  - type: text
    content: with
  - type: text
    content: ' strife.'
  '10':
  - type: text
    content: A reproof entereth more into a wise man
  - type: text
    content: Than an hundred stripes into a fool.
  '11':
  - type: text
    content: 'An evil '
  - type: text
    content: man
  - type: text
    content: ' seeketh only rebellion:'
  - type: text
    content: Therefore a cruel messenger shall be sent against him.
  '12':
  - type: text
    content: Let a bear robbed of her whelps meet a man,
  - type: text
    content: Rather than a fool in his folly.
  '13':
  - type: text
    content: Whoso rewardeth evil for good,
  - type: text
    content: Evil shall not depart from his house.
  '14':
  - type: text
    content: 'The beginning of strife '
  - type: text
    content: is as
  - type: text
    content: ' when one letteth out water:'
  - type: text
    content: Therefore leave off contention, before it be meddled with.
  '15':
  - type: text
    content: He that justifieth the wicked, and he that condemneth the just,
  - type: text
    content: 'Even they both '
  - type: text
    content: are
  - type: text
    content: ' abomination to the '
  - type: text
    content: LORD
  - type: text
    content: .
  '16':
  - type: text
    content: 'Wherefore '
  - type: text
    content: is there
  - type: text
    content: ' a price in the hand of a fool to get wisdom,'
  - type: text
    content: 'Seeing '
  - type: text
    content: he hath
  - type: text
    content: ' no heart '
  - type: text
    content: to it?
  '17':
  - type: text
    content: A friend loveth at all times,
  - type: text
    content: And a brother is born for adversity.
  '18':
  - type: text
    content: A man void of understanding striketh hands,
  - type: text
    content: And
  - type: text
    content: ' becometh surety in the presence of his friend.'
  '19':
  - type: text
    content: 'He loveth transgression that loveth strife:'
  - type: text
    content: And
  - type: text
    content: ' he that exalteth his gate seeketh destruction.'
  '2':
  - type: text
    content: A wise servant shall have rule over a son that causeth shame,
  - type: text
    content: And shall have part of the inheritance among the brethren.
  '20':
  - type: text
    content: 'He that hath a froward heart findeth no good:'
  - type: text
    content: And he that hath a perverse tongue falleth into mischief.
  '21':
  - type: text
    content: 'He that begetteth a fool '
  - type: text
    content: doeth it
  - type: text
    content: ' to his sorrow:'
  - type: text
    content: And the father of a fool hath no joy.
  '22':
  - type: text
    content: 'A merry heart doeth good '
  - type: text
    content: like
  - type: text
    content: ' a medicine:'
  - type: text
    content: But a broken spirit drieth the bones.
  '23':
  - type: text
    content: 'A wicked '
  - type: text
    content: man
  - type: text
    content: ' taketh a gift out of the bosom'
  - type: text
    content: To pervert the ways of judgment.
  '24':
  - type: text
    content: 'Wisdom '
  - type: text
    content: is
  - type: text
    content: ' before him that hath understanding;'
  - type: text
    content: 'But the eyes of a fool '
  - type: text
    content: are
  - type: text
    content: ' in the ends of the earth.'
  '25':
  - type: text
    content: A foolish son is a grief to his father,
  - type: text
    content: And bitterness to her that bare him.
  '26':
  - type: text
    content: 'Also to punish the just '
  - type: text
    content: is
  - type: text
    content: ' not good,'
  - type: text
    content: Nor
  - type: text
    content: ' to strike princes for equity.'
  '27':
  - type: text
    content: 'He that hath knowledge spareth his words:'
  - type: text
    content: And
  - type: text
    content: ' a man of understanding is of an excellent spirit.'
  '28':
  - type: text
    content: 'Even a fool, when he holdeth his peace, is counted wise:'
  - type: text
    content: And
  - type: text
    content: ' he that shutteth his lips '
  - type: text
    content: is esteemed
  - type: text
    content: ' a man of understanding.'
  '3':
  - type: text
    content: 'The fining pot '
  - type: text
    content: is
  - type: text
    content: ' for silver, and the furnace for gold:'
  - type: text
    content: 'But the '
  - type: text
    content: LORD
  - type: text
    content: ' trieth the hearts.'
  '4':
  - type: text
    content: A wicked doer giveth heed to false lips;
  - type: text
    content: And
  - type: text
    content: ' a liar giveth ear to a naughty tongue.'
  '5':
  - type: text
    content: 'Whoso mocketh the poor reproacheth his Maker:'
  - type: text
    content: And
  - type: text
    content: ' he that is glad at calamities shall not be unpunished.'
  '6':
  - type: text
    content: 'Children''s children '
  - type: text
    content: are
  - type: text
    content: ' the crown of old men;'
  - type: text
    content: 'And the glory of children '
  - type: text
    content: are
  - type: text
    content: ' their fathers.'
  '7':
  - type: text
    content: 'Excellent speech becometh not a fool:'
  - type: text
    content: Much less do lying lips a prince.
  '8':
  - type: text
    content: 'A gift '
  - type: text
    content: is as
  - type: text
    content: ' a precious stone in the eyes of him that hath it:'
  - type: text
    content: Whithersoever it turneth, it prospereth.
  '9':
  - type: text
    content: He that covereth a transgression seeketh love;
  - type: text
    content: 'But he that repeateth a matter separateth '
  - type: text
    content: very
  - type: text
    content: ' friends.'
