document_id: PRO.17,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Better '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a dry morsel, and quietness therewith,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Than an house full of sacrifices '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' strife.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A reproof entereth more into a wise man
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Than an hundred stripes into a fool.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'An evil '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' seeketh only rebellion:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore a cruel messenger shall be sent against him.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let a bear robbed of her whelps meet a man,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Rather than a fool in his folly.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whoso rewardeth evil for good,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Evil shall not depart from his house.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The beginning of strife '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is as
    - type: text
      text: ' when one letteth out water:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore leave off contention, before it be meddled with.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He that justifieth the wicked, and he that condemneth the just,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Even they both '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' abomination to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Wherefore '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is there
    - type: text
      text: ' a price in the hand of a fool to get wisdom,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Seeing '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he hath
    - type: text
      text: ' no heart '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to it?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A friend loveth at all times,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a brother is born for adversity.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A man void of understanding striketh hands,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' becometh surety in the presence of his friend.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He loveth transgression that loveth strife:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' he that exalteth his gate seeketh destruction.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A wise servant shall have rule over a son that causeth shame,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And shall have part of the inheritance among the brethren.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He that hath a froward heart findeth no good:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he that hath a perverse tongue falleth into mischief.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He that begetteth a fool '
    - type: usfm
      marker: add
      children:
      - type: text
        text: doeth it
    - type: text
      text: ' to his sorrow:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the father of a fool hath no joy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A merry heart doeth good '
    - type: usfm
      marker: add
      children:
      - type: text
        text: like
    - type: text
      text: ' a medicine:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But a broken spirit drieth the bones.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A wicked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' taketh a gift out of the bosom'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To pervert the ways of judgment.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Wisdom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' before him that hath understanding;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the eyes of a fool '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in the ends of the earth.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A foolish son is a grief to his father,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And bitterness to her that bare him.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Also to punish the just '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not good,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Nor
    - type: text
      text: ' to strike princes for equity.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He that hath knowledge spareth his words:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' a man of understanding is of an excellent spirit.'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Even a fool, when he holdeth his peace, is counted wise:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' he that shutteth his lips '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is esteemed
    - type: text
      text: ' a man of understanding.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The fining pot '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' for silver, and the furnace for gold:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' trieth the hearts.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A wicked doer giveth heed to false lips;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' a liar giveth ear to a naughty tongue.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Whoso mocketh the poor reproacheth his Maker:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' he that is glad at calamities shall not be unpunished.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Children''s children '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the crown of old men;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the glory of children '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' their fathers.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Excellent speech becometh not a fool:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Much less do lying lips a prince.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A gift '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is as
    - type: text
      text: ' a precious stone in the eyes of him that hath it:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Whithersoever it turneth, it prospereth.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He that covereth a transgression seeketh love;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But he that repeateth a matter separateth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: very
    - type: text
      text: ' friends.'
