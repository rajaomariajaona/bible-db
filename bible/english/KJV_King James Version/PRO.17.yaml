document_id: PRO.17
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Better '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a dry morsel, and quietness therewith,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Than an house full of sacrifices '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' strife.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: A wise servant shall have rule over a son that causeth shame,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And shall have part of the inheritance among the brethren.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The fining pot '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' for silver, and the furnace for gold:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' trieth the hearts.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A wicked doer giveth heed to false lips;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' a liar giveth ear to a naughty tongue.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Whoso mocketh the poor reproacheth his Maker:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' he that is glad at calamities shall not be unpunished.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Children''s children '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the crown of old men;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the glory of children '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' their fathers.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Excellent speech becometh not a fool:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Much less do lying lips a prince.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'A gift '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is as
  - type: text
    text: ' a precious stone in the eyes of him that hath it:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Whithersoever it turneth, it prospereth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He that covereth a transgression seeketh love;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But he that repeateth a matter separateth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: very
  - type: text
    text: ' friends.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: A reproof entereth more into a wise man
- type: usfm
  marker: q2
  children:
  - type: text
    text: Than an hundred stripes into a fool.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'An evil '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' seeketh only rebellion:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Therefore a cruel messenger shall be sent against him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Let a bear robbed of her whelps meet a man,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Rather than a fool in his folly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Whoso rewardeth evil for good,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Evil shall not depart from his house.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The beginning of strife '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is as
  - type: text
    text: ' when one letteth out water:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Therefore leave off contention, before it be meddled with.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He that justifieth the wicked, and he that condemneth the just,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Even they both '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' abomination to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Wherefore '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is there
  - type: text
    text: ' a price in the hand of a fool to get wisdom,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Seeing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he hath
  - type: text
    text: ' no heart '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to it?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: A friend loveth at all times,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And a brother is born for adversity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: A man void of understanding striketh hands,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' becometh surety in the presence of his friend.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'He loveth transgression that loveth strife:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' he that exalteth his gate seeketh destruction.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'He that hath a froward heart findeth no good:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And he that hath a perverse tongue falleth into mischief.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'He that begetteth a fool '
  - type: usfm
    marker: add
    children:
    - type: text
      text: doeth it
  - type: text
    text: ' to his sorrow:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the father of a fool hath no joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'A merry heart doeth good '
  - type: usfm
    marker: add
    children:
    - type: text
      text: like
  - type: text
    text: ' a medicine:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But a broken spirit drieth the bones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'A wicked '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' taketh a gift out of the bosom'
- type: usfm
  marker: q2
  children:
  - type: text
    text: To pervert the ways of judgment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Wisdom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' before him that hath understanding;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But the eyes of a fool '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' in the ends of the earth.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: A foolish son is a grief to his father,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And bitterness to her that bare him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Also to punish the just '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not good,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Nor
  - type: text
    text: ' to strike princes for equity.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'He that hath knowledge spareth his words:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' a man of understanding is of an excellent spirit.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Even a fool, when he holdeth his peace, is counted wise:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' he that shutteth his lips '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is esteemed
  - type: text
    text: ' a man of understanding.'
