verses:
  '1':
  - type: heading
    content: Building the Temple
  - type: text
    content: 'And Solomon determined to build an house for the name of the '
  - type: text
    content: LORD
  - type: text
    content: ', and an house for his kingdom. '
  '10':
  - type: text
    content: And, behold, I will give to thy servants, the hewers that cut timber, twenty thousand measures of beaten wheat, and twenty thousand measures of barley, and twenty thousand baths of wine, and twenty thousand baths of oil.
  '11':
  - type: text
    content: 'Then Huram the king of Tyre answered in writing, which he sent to Solomon, Because the '
  - type: text
    content: LORD
  - type: text
    content: ' hath loved his people, he hath made thee king over them. '
  '12':
  - type: text
    content: 'Huram said moreover, Blessed '
  - type: text
    content: be
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel, that made heaven and earth, who hath given to David the king a wise son, endued with prudence and understanding, that might build an house for the '
  - type: text
    content: LORD
  - type: text
    content: ', and an house for his kingdom. '
  '13':
  - type: text
    content: 'And now I have sent a cunning man, endued with understanding, of Huram my father''s, '
  '14':
  - type: text
    content: 'the son of a woman of the daughters of Dan, and his father '
  - type: text
    content: was
  - type: text
    content: ' a man of Tyre, skilful to work in gold, and in silver, in brass, in iron, in stone, and in timber, in purple, in blue, and in fine linen, and in crimson; also to grave any manner of graving, and to find out every device which shall be put to him, with thy cunning men, and with the cunning men of my lord David thy father. '
  '15':
  - type: text
    content: 'Now therefore the wheat, and the barley, the oil, and the wine, which my lord hath spoken of, let him send unto his servants: '
  '16':
  - type: text
    content: 'and we will cut wood out of Lebanon, as much as thou shalt need: and we will bring it to thee in floats by sea to Joppa; and thou shalt carry it up to Jerusalem.'
  - type: heading
    content: Foreign Labour
  '17':
  - type: text
    content: 'And Solomon numbered all the strangers that '
  - type: text
    content: were
  - type: text
    content: ' in the land of Israel, after the numbering wherewith David his father had numbered them; and they were found an hundred and fifty thousand and three thousand and six hundred. '
  '18':
  - type: text
    content: 'And he set threescore and ten thousand of them '
  - type: text
    content: to be
  - type: text
    content: ' bearers of burdens, and fourscore thousand '
  - type: text
    content: to be
  - type: text
    content: ' hewers in the mountain, and three thousand and six hundred overseers to set the people a work.'
  '2':
  - type: text
    content: And Solomon told out threescore and ten thousand men to bear burdens, and fourscore thousand to hew in the mountain, and three thousand and six hundred to oversee them.
  '3':
  - type: text
    content: 'And Solomon sent to Huram the king of Tyre, saying, As thou didst deal with David my father, and didst send him cedars to build him an house to dwell therein, '
  - type: text
    content: even so deal with me
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Behold, I build an house to the name of the '
  - type: text
    content: LORD
  - type: text
    content: ' my God, to dedicate '
  - type: text
    content: it
  - type: text
    content: ' to him, '
  - type: text
    content: and
  - type: text
    content: ' to burn before him sweet incense, and for the continual shewbread, and for the burnt offerings morning and evening, on the sabbaths, and on the new moons, and on the solemn feasts of the '
  - type: text
    content: LORD
  - type: text
    content: ' our God. This '
  - type: text
    content: is an ordinance
  - type: text
    content: ' for ever to Israel. '
  '5':
  - type: text
    content: 'And the house which I build '
  - type: text
    content: is
  - type: text
    content: ' great: for great '
  - type: text
    content: is
  - type: text
    content: ' our God above all gods. '
  '6':
  - type: text
    content: 'But who is able to build him an house, seeing the heaven and heaven of heavens cannot contain him? who '
  - type: text
    content: am
  - type: text
    content: ' I then, that I should build him an house, save only to burn sacrifice before him? '
  '7':
  - type: text
    content: 'Send me now therefore a man cunning to work in gold, and in silver, and in brass, and in iron, and in purple, and crimson, and blue, and that can skill to grave with the cunning men that '
  - type: text
    content: are
  - type: text
    content: ' with me in Judah and in Jerusalem, whom David my father did provide. '
  '8':
  - type: text
    content: 'Send me also cedar trees, fir trees, and algum trees, out of Lebanon: for I know that thy servants can skill to cut timber in Lebanon; and, behold, my servants '
  - type: text
    content: shall be
  - type: text
    content: ' with thy servants, '
  '9':
  - type: text
    content: 'even to prepare me timber in abundance: for the house which I am about to build '
  - type: text
    content: shall be
  - type: text
    content: ' wonderful great. '
