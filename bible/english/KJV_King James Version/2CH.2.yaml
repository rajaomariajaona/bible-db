document_id: 2CH.2,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Building the Temple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Solomon determined to build an house for the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and an house for his kingdom. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And, behold, I will give to thy servants, the hewers that cut timber, twenty thousand measures of beaten wheat, and twenty thousand measures of barley, and twenty thousand baths of wine, and twenty thousand baths of oil.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Huram the king of Tyre answered in writing, which he sent to Solomon, Because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath loved his people, he hath made thee king over them. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Huram said moreover, Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel, that made heaven and earth, who hath given to David the king a wise son, endued with prudence and understanding, that might build an house for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and an house for his kingdom. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now I have sent a cunning man, endued with understanding, of Huram my father''s, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the son of a woman of the daughters of Dan, and his father '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' a man of Tyre, skilful to work in gold, and in silver, in brass, in iron, in stone, and in timber, in purple, in blue, and in fine linen, and in crimson; also to grave any manner of graving, and to find out every device which shall be put to him, with thy cunning men, and with the cunning men of my lord David thy father. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore the wheat, and the barley, the oil, and the wine, which my lord hath spoken of, let him send unto his servants: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and we will cut wood out of Lebanon, as much as thou shalt need: and we will bring it to thee in floats by sea to Joppa; and thou shalt carry it up to Jerusalem.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Foreign Labour
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Solomon numbered all the strangers that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in the land of Israel, after the numbering wherewith David his father had numbered them; and they were found an hundred and fifty thousand and three thousand and six hundred. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he set threescore and ten thousand of them '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' bearers of burdens, and fourscore thousand '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' hewers in the mountain, and three thousand and six hundred overseers to set the people a work.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Solomon told out threescore and ten thousand men to bear burdens, and fourscore thousand to hew in the mountain, and three thousand and six hundred to oversee them.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Solomon sent to Huram the king of Tyre, saying, As thou didst deal with David my father, and didst send him cedars to build him an house to dwell therein, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even so deal with me
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, I build an house to the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' my God, to dedicate '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to him, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' to burn before him sweet incense, and for the continual shewbread, and for the burnt offerings morning and evening, on the sabbaths, and on the new moons, and on the solemn feasts of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God. This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is an ordinance
    - type: text
      text: ' for ever to Israel. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the house which I build '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' great: for great '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' our God above all gods. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But who is able to build him an house, seeing the heaven and heaven of heavens cannot contain him? who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' I then, that I should build him an house, save only to burn sacrifice before him? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Send me now therefore a man cunning to work in gold, and in silver, and in brass, and in iron, and in purple, and crimson, and blue, and that can skill to grave with the cunning men that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' with me in Judah and in Jerusalem, whom David my father did provide. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Send me also cedar trees, fir trees, and algum trees, out of Lebanon: for I know that thy servants can skill to cut timber in Lebanon; and, behold, my servants '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' with thy servants, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'even to prepare me timber in abundance: for the house which I am about to build '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' wonderful great. '
