document_id: PSA.5
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: To the chief Musician upon Nehiloth, A Psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Give ear to my words, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: Consider my meditation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hearken unto the voice of my cry, my King, and my God:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: For unto thee will I pray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'My voice shalt thou hear in the morning, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'In the morning will I direct '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my prayer
  - type: text
    text: ' unto thee, and will look up.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' not a God that hath pleasure in wickedness:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Neither shall evil dwell with thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The foolish shall not stand in thy sight:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou hatest all workers of iniquity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Thou shalt destroy them that speak leasing:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will abhor the bloody and deceitful man.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But as for me, I will come '
  - type: usfm
    marker: add
    children:
    - type: text
      text: into
  - type: text
    text: ' thy house in the multitude of thy mercy:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' in thy fear will I worship toward thy holy temple.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Lead me, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', in thy righteousness because of mine enemies;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Make thy way straight before my face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no faithfulness in their mouth;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Their inward part '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' very wickedness;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Their throat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' an open sepulchre;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They flatter with their tongue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Destroy thou them, O God; let them fall by their own counsels;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Cast them out in the multitude of their transgressions; for they have rebelled against thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But let all those that put their trust in thee rejoice:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Let them ever shout for joy, because thou defendest them: let them also that love thy name be joyful in thee.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For thou, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', wilt bless the righteous;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'With favour wilt thou compass him as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' a shield.'
