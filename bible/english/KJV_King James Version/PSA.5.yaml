document_id: PSA.5,1
type_code: eng
verses:
  '1':
  - type: text
    content: To the chief Musician upon Nehiloth, A Psalm of David.
  - type: text
    content: 'Give ear to my words, O '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: Consider my meditation.
  '10':
  - type: text
    content: Destroy thou them, O God; let them fall by their own counsels;
  - type: text
    content: Cast them out in the multitude of their transgressions; for they have rebelled against thee.
  '11':
  - type: text
    content: 'But let all those that put their trust in thee rejoice:'
  - type: text
    content: 'Let them ever shout for joy, because thou defendest them: let them also that love thy name be joyful in thee.'
  '12':
  - type: text
    content: 'For thou, '
  - type: text
    content: LORD
  - type: text
    content: ', wilt bless the righteous;'
  - type: text
    content: 'With favour wilt thou compass him as '
  - type: text
    content: with
  - type: text
    content: ' a shield.'
  '2':
  - type: text
    content: 'Hearken unto the voice of my cry, my King, and my God:'
  - type: text
    content: For unto thee will I pray.
  '3':
  - type: text
    content: 'My voice shalt thou hear in the morning, O '
  - type: text
    content: LORD
  - type: text
    content: ;
  - type: text
    content: 'In the morning will I direct '
  - type: text
    content: my prayer
  - type: text
    content: ' unto thee, and will look up.'
  '4':
  - type: text
    content: 'For thou '
  - type: text
    content: art
  - type: text
    content: ' not a God that hath pleasure in wickedness:'
  - type: text
    content: Neither shall evil dwell with thee.
  '5':
  - type: text
    content: 'The foolish shall not stand in thy sight:'
  - type: text
    content: Thou hatest all workers of iniquity.
  '6':
  - type: text
    content: 'Thou shalt destroy them that speak leasing:'
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' will abhor the bloody and deceitful man.'
  '7':
  - type: text
    content: 'But as for me, I will come '
  - type: text
    content: into
  - type: text
    content: ' thy house in the multitude of thy mercy:'
  - type: text
    content: And
  - type: text
    content: ' in thy fear will I worship toward thy holy temple.'
  '8':
  - type: text
    content: 'Lead me, O '
  - type: text
    content: LORD
  - type: text
    content: ', in thy righteousness because of mine enemies;'
  - type: text
    content: Make thy way straight before my face.
  '9':
  - type: text
    content: 'For '
  - type: text
    content: there is
  - type: text
    content: ' no faithfulness in their mouth;'
  - type: text
    content: 'Their inward part '
  - type: text
    content: is
  - type: text
    content: ' very wickedness;'
  - type: text
    content: 'Their throat '
  - type: text
    content: is
  - type: text
    content: ' an open sepulchre;'
  - type: text
    content: They flatter with their tongue.
