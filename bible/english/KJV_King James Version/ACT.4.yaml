document_id: ACT.4
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Peter and John Imprisoned
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And as they spake unto the people, the priests, and the captain of the temple, and the Sadducees, came upon them, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'being grieved that they taught the people, and preached through Jesus the resurrection from the dead. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And they laid hands on them, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' in hold unto the next day: for it was now eventide. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Howbeit many of them which heard the word believed; and the number of the men was about five thousand.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And it came to pass on the morrow, that their rulers, and elders, and scribes, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and Annas the high priest, and Caiaphas, and John, and Alexander, and as many as were of the kindred of the high priest, were gathered together at Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And when they had set them in the midst, they asked, By what power, or by what name, have ye done this?
- type: usfm
  marker: s2
  children:
  - type: text
    text: Peter's Defence
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then Peter, filled with the Holy Ghost, said unto them, Ye rulers of the people, and elders of Israel, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'if we this day be examined of the good deed done to the impotent man, by what means he is made whole; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'be it known unto you all, and to all the people of Israel, that by the name of Jesus Christ of Nazareth, whom ye crucified, whom God raised from the dead, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' by him doth this man stand here before you whole. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'This is the stone which was set at nought of you builders, which is become the head of the corner. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Neither is there salvation in any other: for there is none other name under heaven given among men, whereby we must be saved.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now when they saw the boldness of Peter and John, and perceived that they were unlearned and ignorant men, they marvelled; and they took knowledge of them, that they had been with Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And beholding the man which was healed standing with them, they could say nothing against it. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But when they had commanded them to go aside out of the council, they conferred among themselves, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'saying, What shall we do to these men? for that indeed a notable miracle hath been done by them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' manifest to all them that dwell in Jerusalem; and we cannot deny '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But that it spread no further among the people, let us straitly threaten them, that they speak henceforth to no man in this name. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And they called them, and commanded them not to speak at all nor teach in the name of Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But Peter and John answered and said unto them, Whether it be right in the sight of God to hearken unto you more than unto God, judge ye. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For we cannot but speak the things which we have seen and heard. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So when they had further threatened them, they let them go, finding nothing how they might punish them, because of the people: for all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' glorified God for that which was done. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: For the man was above forty years old, on whom this miracle of healing was shewed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And being let go, they went to their own company, and reported all that the chief priests and elders had said unto them. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And when they heard that, they lifted up their voice to God with one accord, and said, Lord, thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' God, which hast made heaven, and earth, and the sea, and all that in them is: '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Who by the mouth of thy servant David hast said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why did the heathen rage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the people imagine vain things?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: The kings of the earth stood up,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the rulers were gathered together
- type: usfm
  marker: q1
  children:
  - type: text
    text: Against the Lord, and against his Christ.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'For of a truth against thy holy child Jesus, whom thou hast anointed, both Herod, and Pontius Pilate, with the Gentiles, and the people of Israel, were gathered together, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'for to do whatsoever thy hand and thy counsel determined before to be done. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And now, Lord, behold their threatenings: and grant unto thy servants, that with all boldness they may speak thy word, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: by stretching forth thine hand to heal; and that signs and wonders may be done by the name of thy holy child Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And when they had prayed, the place was shaken where they were assembled together; and they were all filled with the Holy Ghost, and they spake the word of God with boldness. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And the multitude of them that believed were of one heart and of one soul: neither said any '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of them
  - type: text
    text: ' that ought of the things which he possessed was his own; but they had all things common. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And with great power gave the apostles witness of the resurrection of the Lord Jesus: and great grace was upon them all. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Neither was there any among them that lacked: for as many as were possessors of lands or houses sold them, and brought the prices of the things that were sold, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'and laid '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' down at the apostles'' feet: and distribution was made unto every man according as he had need.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And Joses, who by the apostles was surnamed Barnabas, (which is, being interpreted, The son of consolation,) a Levite, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' of the country of Cyprus, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'having land, sold '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and brought the money, and laid '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' at the apostles'' feet.'
