document_id: EST.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Haman's Plot
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'After these things did king Ahasuerus promote Haman the son of Hammedatha the Agagite, and advanced him, and set his seat above all the princes that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with him. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And the king took his ring from his hand, and gave it unto Haman the son of Hammedatha the Agagite, the Jews'' enemy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And the king said unto Haman, The silver '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' given to thee, the people also, to do with them as it seemeth good to thee.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then were the king''s scribes called on the thirteenth day of the first month, and there was written according to all that Haman had commanded unto the king''s lieutenants, and to the governors that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' over every province, and to the rulers of every people of every province according to the writing thereof, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to
    - type: text
      text: ' every people after their language; in the name of king Ahasuerus was it written, and sealed with the king''s ring. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And the letters were sent by posts into all the king''s provinces, to destroy, to kill, and to cause to perish, all Jews, both young and old, little children and women, in one day, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' upon the thirteenth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the twelfth month, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the month Adar, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to take
    - type: text
      text: ' the spoil of them for a prey. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The copy of the writing for a commandment to be given in every province was published unto all people, that they should be ready against that day. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The posts went out, being hastened by the king's commandment, and the decree was given in Shushan the palace. And the king and Haman sat down to drink; but the city Shushan was perplexed.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And all the king''s servants, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in the king''s gate, bowed, and reverenced Haman: for the king had so commanded concerning him. But Mordecai bowed not, nor did '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' reverence. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then the king''s servants, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in the king''s gate, said unto Mordecai, Why transgressest thou the king''s commandment? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Now it came to pass, when they spake daily unto him, and he hearkened not unto them, that they told Haman, to see whether Mordecai''s matters would stand: for he had told them that he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' a Jew. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And when Haman saw that Mordecai bowed not, nor did him reverence, then was Haman full of wrath. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And he thought scorn to lay hands on Mordecai alone; for they had shewed him the people of Mordecai: wherefore Haman sought to destroy all the Jews that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' throughout the whole kingdom of Ahasuerus, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the people of Mordecai.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'In the first month, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ', the month Nisan, in the twelfth year of king Ahasuerus, they cast Pur, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ', the lot, before Haman from day to day, and from month to month, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to
    - type: text
      text: ' the twelfth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: month
    - type: text
      text: ', that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ', the month Adar. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And Haman said unto king Ahasuerus, There is a certain people scattered abroad and dispersed among the people in all the provinces of thy kingdom; and their laws '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' diverse from all people; neither keep they the king''s laws: therefore it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not for the king''s profit to suffer them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'If it please the king, let it be written that they may be destroyed: and I will pay ten thousand talents of silver to the hands of those that have the charge of the business, to bring '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' into the king''s treasuries. '
