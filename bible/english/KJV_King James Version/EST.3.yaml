  - type: text
    content: 'In the first month, that '
  - type: text
    content: is
  - type: text
    content: ', the month Nisan, in the twelfth year of king Ahasuerus, they cast Pur, that '
  - type: text
    content: is
  - type: text
    content: ', the lot, before Haman from day to day, and from month to month, '
  - type: text
    content: to
  - type: text
