    content: Haman's Plot
  - type: text
    content: 'After these things did king Ahasuerus promote Haman the son of Hammedatha the Agagite, and advanced him, and set his seat above all the princes that '
  - type: text
    content: were
  - type: text
    content: ' with him. '
  '10':
  - type: text
    content: 'And the king took his ring from his hand, and gave it unto Haman the son of Hammedatha the Agagite, the Jews'' enemy. '
  '11':
  - type: text
    content: 'And the king said unto Haman, The silver '
  - type: text
    content: is
  - type: text
    content: ' given to thee, the people also, to do with them as it seemeth good to thee.'
  '12':
  - type: text
    content: 'Then were the king''s scribes called on the thirteenth day of the first month, and there was written according to all that Haman had commanded unto the king''s lieutenants, and to the governors that '
  - type: text
    content: were
  - type: text
    content: ' over every province, and to the rulers of every people of every province according to the writing thereof, and '
  - type: text
    content: to
  - type: text
    content: ' every people after their language; in the name of king Ahasuerus was it written, and sealed with the king''s ring. '
  '13':
  - type: text
    content: 'And the letters were sent by posts into all the king''s provinces, to destroy, to kill, and to cause to perish, all Jews, both young and old, little children and women, in one day, '
  - type: text
    content: even
  - type: text
    content: ' upon the thirteenth '
  - type: text
    content: day
  - type: text
    content: ' of the twelfth month, which '
  - type: text
    content: is
  - type: text
    content: ' the month Adar, and '
  - type: text
    content: to take
  - type: text
    content: ' the spoil of them for a prey. '
  '14':
  - type: text
    content: 'The copy of the writing for a commandment to be given in every province was published unto all people, that they should be ready against that day. '
  '15':
  - type: text
    content: The posts went out, being hastened by the king's commandment, and the decree was given in Shushan the palace. And the king and Haman sat down to drink; but the city Shushan was perplexed.
  '2':
  - type: text
    content: 'And all the king''s servants, that '
  - type: text
    content: were
  - type: text
    content: ' in the king''s gate, bowed, and reverenced Haman: for the king had so commanded concerning him. But Mordecai bowed not, nor did '
  - type: text
    content: him
  - type: text
    content: ' reverence. '
  '3':
  - type: text
    content: 'Then the king''s servants, which '
  - type: text
    content: were
  - type: text
    content: ' in the king''s gate, said unto Mordecai, Why transgressest thou the king''s commandment? '
  '4':
  - type: text
    content: 'Now it came to pass, when they spake daily unto him, and he hearkened not unto them, that they told Haman, to see whether Mordecai''s matters would stand: for he had told them that he '
  - type: text
    content: was
  - type: text
    content: ' a Jew. '
  '5':
  - type: text
    content: 'And when Haman saw that Mordecai bowed not, nor did him reverence, then was Haman full of wrath. '
  '6':
  - type: text
    content: 'And he thought scorn to lay hands on Mordecai alone; for they had shewed him the people of Mordecai: wherefore Haman sought to destroy all the Jews that '
  - type: text
    content: were
  - type: text
    content: ' throughout the whole kingdom of Ahasuerus, '
  - type: text
    content: even
  - type: text
    content: ' the people of Mordecai.'
