  - type: text
    content: month
  - type: text
    content: ', that '
  - type: text
    content: is
  - type: text
    content: ', the month Adar. '
  '8':
  - type: text
    content: 'And Haman said unto king Ahasuerus, There is a certain people scattered abroad and dispersed among the people in all the provinces of thy kingdom; and their laws '
  - type: text
    content: are
  - type: text
    content: ' diverse from all people; neither keep they the king''s laws: therefore it '
  - type: text
    content: is
  - type: text
    content: ' not for the king''s profit to suffer them. '
  '9':
  - type: text
    content: 'If it please the king, let it be written that they may be destroyed: and I will pay ten thousand talents of silver to the hands of those that have the charge of the business, to bring '
  - type: text
    content: it
  - type: text
    content: ' into the king''s treasuries. '
