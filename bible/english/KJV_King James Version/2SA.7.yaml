document_id: 2SA.7,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The House of the Lord
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And it came to pass, when the king sat in his house, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had given him rest round about from all his enemies; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Moreover I will appoint a place for my people Israel, and will plant them, that they may dwell in a place of their own, and move no more; neither shall the children of wickedness afflict them any more, as beforetime, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'and as since the time that I commanded judges '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' over my people Israel, and have caused thee to rest from all thine enemies. Also the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' telleth thee that he will make thee an house. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And when thy days be fulfilled, and thou shalt sleep with thy fathers, I will set up thy seed after thee, which shall proceed out of thy bowels, and I will establish his kingdom. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'He shall build an house for my name, and I will stablish the throne of his kingdom for ever. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'I will be his father, and he shall be my son. If he commit iniquity, I will chasten him with the rod of men, and with the stripes of the children of men: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'but my mercy shall not depart away from him, as I took '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' from Saul, whom I put away before thee. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And thine house and thy kingdom shall be established for ever before thee: thy throne shall be established for ever. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: According to all these words, and according to all this vision, so did Nathan speak unto David.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then went king David in, and sat before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and he said, Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' I, O Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '? and what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my house, that thou hast brought me hitherto? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And this was yet a small thing in thy sight, O Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; but thou hast spoken also of thy servant''s house for a great while to come. And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' this the manner of man, O Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'that the king said unto Nathan the prophet, See now, I dwell in an house of cedar, but the ark of God dwelleth within curtains. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And what can David say more unto thee? for thou, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ', knowest thy servant. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'For thy word''s sake, and according to thine own heart, hast thou done all these great things, to make thy servant know '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Wherefore thou art great, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God: for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none like thee, neither '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is there any
    - type: text
      text: ' God beside thee, according to all that we have heard with our ears. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And what one nation in the earth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' like thy people, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' like Israel, whom God went to redeem for a people to himself, and to make him a name, and to do for you great things and terrible, for thy land, before thy people, which thou redeemedst to thee from Egypt, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from
    - type: text
      text: ' the nations and their gods? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'For thou hast confirmed to thyself thy people Israel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' a people unto thee for ever: and thou, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', art become their God. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And now, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God, the word that thou hast spoken concerning thy servant, and concerning his house, establish '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' for ever, and do as thou hast said. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And let thy name be magnified for ever, saying, The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the God over Israel: and let the house of thy servant David be established before thee. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'For thou, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, God of Israel, hast revealed to thy servant, saying, I will build thee an house: therefore hath thy servant found in his heart to pray this prayer unto thee. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And now, O Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ', thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' that God, and thy words be true, and thou hast promised this goodness unto thy servant: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'therefore now let it please thee to bless the house of thy servant, that it may continue for ever before thee: for thou, O Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ', hast spoken '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'it:'
    - type: text
      text: ' and with thy blessing let the house of thy servant be blessed for ever.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And Nathan said to the king, Go, do all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in thine heart; for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' with thee.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And it came to pass that night, that the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came unto Nathan, saying, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Go and tell my servant David, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', Shalt thou build me an house for me to dwell in? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Whereas I have not dwelt in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' house since the time that I brought up the children of Israel out of Egypt, even to this day, but have walked in a tent and in a tabernacle. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'In all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the places
    - type: text
      text: ' wherein I have walked with all the children of Israel spake I a word with any of the tribes of Israel, whom I commanded to feed my people Israel, saying, Why build ye not me an house of cedar? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Now therefore so shalt thou say unto my servant David, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, I took thee from the sheepcote, from following the sheep, to be ruler over my people, over Israel: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'and I was with thee whithersoever thou wentest, and have cut off all thine enemies out of thy sight, and have made thee a great name, like unto the name of the great '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in the earth. '
