document_id: ACT.7
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Stephen's Speech
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then said the high priest, Are these things so? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: And he said,
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Men, brethren, and fathers, hearken; The God of glory appeared unto our father Abraham, when he was in Mesopotamia, before he dwelt in Charran, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and said unto him, Get thee out of thy country, and from thy kindred, and come into the land which I shall shew thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then came he out of the land of the Chaldæans, and dwelt in Charran: and from thence, when his father was dead, he removed him into this land, wherein ye now dwell. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And he gave him none inheritance in it, no, not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so much as
  - type: text
    text: ' to set his foot on: yet he promised that he would give it to him for a possession, and to his seed after him, when '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as yet
  - type: text
    text: ' he had no child.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And God spake on this wise, That his seed should sojourn in a strange land; and that they should bring them into bondage, and entreat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' evil four hundred years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the nation to whom they shall be in bondage will I judge, said God: and after that shall they come forth, and serve me in this place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And he gave him the covenant of circumcision: and so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Abraham
  - type: text
    text: ' begat Isaac, and circumcised him the eighth day; and Isaac '
  - type: usfm
    marker: add
    children:
    - type: text
      text: begat
  - type: text
    text: ' Jacob; and Jacob '
  - type: usfm
    marker: add
    children:
    - type: text
      text: begat
  - type: text
    text: ' the twelve patriarchs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the patriarchs, moved with envy, sold Joseph into Egypt: but God was with him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and delivered him out of all his afflictions, and gave him favour and wisdom in the sight of Pharaoh king of Egypt; and he made him governor over Egypt and all his house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now there came a dearth over all the land of Egypt and Chanaan, and great affliction: and our fathers found no sustenance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But when Jacob heard that there was corn in Egypt, he sent out our fathers first. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And at the second '
  - type: usfm
    marker: add
    children:
    - type: text
      text: time
  - type: text
    text: ' Joseph was made known to his brethren; and Joseph''s kindred was made known unto Pharaoh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then sent Joseph, and called his father Jacob to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', and all his kindred, threescore and fifteen souls. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So Jacob went down into Egypt, and died, he, and our fathers, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and were carried over into Sychem, and laid in the sepulchre that Abraham bought for a sum of money of the sons of Emmor '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the father
  - type: text
    text: ' of Sychem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But when the time of the promise drew nigh, which God had sworn to Abraham, the people grew and multiplied in Egypt, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Till another king arose, which knew not Joseph. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The same dealt subtilly with our kindred, and evil entreated our fathers, so that they cast out their young children, to the end they might not live.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'In which time Moses was born, and was exceeding fair, and nourished up in his father''s house three months: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'and when he was cast out, Pharaoh''s daughter took him up, and nourished him for her own son. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And Moses was learned in all the wisdom of the Egyptians, and was mighty in words and in deeds. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And when he was full forty years old, it came into his heart to visit his brethren the children of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And seeing one '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of them
  - type: text
    text: ' suffer wrong, he defended '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', and avenged him that was oppressed, and smote the Egyptian: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'for he supposed his brethren would have understood how that God by his hand would deliver them: but they understood not. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And the next day he shewed himself unto them as they strove, and would have set them at one again, saying, Sirs, ye are brethren; why do ye wrong one to another? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'But he that did his neighbour wrong thrust him away, saying, Who made thee a ruler and a judge over us? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Wilt thou kill me, as thou diddest the Egyptian yesterday? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then fled Moses at this saying, and was a stranger in the land of Madian, where he begat two sons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And when forty years were expired, there appeared to him in the wilderness of mount Sina an angel of the Lord in a flame of fire in a bush. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'When Moses saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', he wondered at the sight: and as he drew near to behold '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', the voice of the Lord came unto him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: add
    children:
    - type: text
      text: saying
  - type: text
    text: ', I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the God of thy fathers, the God of Abraham, and the God of Isaac, and the God of Jacob. Then Moses trembled, and durst not behold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Then said the Lord to him, Put off thy shoes from thy feet: for the place where thou standest is holy ground. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'I have seen, I have seen the affliction of my people which is in Egypt, and I have heard their groaning, and am come down to deliver them. And now come, I will send thee into Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'This Moses whom they refused, saying, Who made thee a ruler and a judge? the same did God send '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' a ruler and a deliverer by the hand of the angel which appeared to him in the bush. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: He brought them out, after that he had shewed wonders and signs in the land of Egypt, and in the Red sea, and in the wilderness forty years.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'This is that Moses, which said unto the children of Israel, A prophet shall the Lord your God raise up unto you of your brethren, like unto me; him shall ye hear. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'This is he, that was in the church in the wilderness with the angel which spake to him in the mount Sina, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' our fathers: who received the lively oracles to give unto us: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'to whom our fathers would not obey, but thrust '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' from them, and in their hearts turned back again into Egypt, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'saying unto Aaron, Make us gods to go before us: for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as for
  - type: text
    text: ' this Moses, which brought us out of the land of Egypt, we wot not what is become of him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And they made a calf in those days, and offered sacrifice unto the idol, and rejoiced in the works of their own hands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Then God turned, and gave them up to worship the host of heaven; as it is written in the book of the prophets,
- type: usfm
  marker: q1
  children:
  - type: text
    text: O ye house of Israel, have ye offered to me slain beasts and sacrifices
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: By the space of
  - type: text
    text: ' forty years in the wilderness?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Yea, ye took up the tabernacle of Moloch,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the star of your god Remphan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Figures which ye made to worship them:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will carry you away beyond Babylon.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Our fathers had the tabernacle of witness in the wilderness, as he had appointed, speaking unto Moses, that he should make it according to the fashion that he had seen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Which also our fathers that came after brought in with Jesus into the possession of the Gentiles, whom God drave out before the face of our fathers, unto the days of David; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'who found favour before God, and desired to find a tabernacle for the God of Jacob. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: But Solomon built him an house.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Howbeit the most High dwelleth not in temples made with hands; as saith the prophet,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Heaven '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my throne,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And earth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my footstool:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'What house will ye build me? saith the Lord:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Or what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the place of my rest?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Hath not my hand made all these things?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Ye stiffnecked and uncircumcised in heart and ears, ye do always resist the Holy Ghost: as your fathers '
  - type: usfm
    marker: add
    children:
    - type: text
      text: did
  - type: text
    text: ', so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: do
  - type: text
    text: ' ye. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Which of the prophets have not your fathers persecuted? and they have slain them which shewed before of the coming of the Just One; of whom ye have been now the betrayers and murderers: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'who have received the law by the disposition of angels, and have not kept '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Death of Stephen
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'When they heard these things, they were cut to the heart, and they gnashed on him with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' teeth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'But he, being full of the Holy Ghost, looked up stedfastly into heaven, and saw the glory of God, and Jesus standing on the right hand of God, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'and said, Behold, I see the heavens opened, and the Son of man standing on the right hand of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Then they cried out with a loud voice, and stopped their ears, and ran upon him with one accord, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'and cast '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' out of the city, and stoned '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ': and the witnesses laid down their clothes at a young man''s feet, whose name was Saul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'And they stoned Stephen, calling upon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: God
  - type: text
    text: ', and saying, Lord Jesus, receive my spirit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: And he kneeled down, and cried with a loud voice, Lord, lay not this sin to their charge. And when he had said this, he fell asleep.
