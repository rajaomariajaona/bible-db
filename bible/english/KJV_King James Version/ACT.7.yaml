document_id: ACT.7,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Stephen's Speech
  - type: text
    content: 'Then said the high priest, Are these things so? '
  '10':
  - type: text
    content: 'and delivered him out of all his afflictions, and gave him favour and wisdom in the sight of Pharaoh king of Egypt; and he made him governor over Egypt and all his house. '
  '11':
  - type: text
    content: 'Now there came a dearth over all the land of Egypt and Chanaan, and great affliction: and our fathers found no sustenance. '
  '12':
  - type: text
    content: 'But when Jacob heard that there was corn in Egypt, he sent out our fathers first. '
  '13':
  - type: text
    content: 'And at the second '
  - type: text
    content: time
  - type: text
    content: ' Joseph was made known to his brethren; and Joseph''s kindred was made known unto Pharaoh. '
  '14':
  - type: text
    content: 'Then sent Joseph, and called his father Jacob to '
  - type: text
    content: him
  - type: text
    content: ', and all his kindred, threescore and fifteen souls. '
  '15':
  - type: text
    content: 'So Jacob went down into Egypt, and died, he, and our fathers, '
  '16':
  - type: text
    content: 'and were carried over into Sychem, and laid in the sepulchre that Abraham bought for a sum of money of the sons of Emmor '
  - type: text
    content: the father
  - type: text
    content: ' of Sychem. '
  '17':
  - type: text
    content: 'But when the time of the promise drew nigh, which God had sworn to Abraham, the people grew and multiplied in Egypt, '
  '18':
  - type: text
    content: 'Till another king arose, which knew not Joseph. '
  '19':
  - type: text
    content: The same dealt subtilly with our kindred, and evil entreated our fathers, so that they cast out their young children, to the end they might not live.
  '2':
  - type: text
    content: And he said,
  - type: text
    content: 'Men, brethren, and fathers, hearken; The God of glory appeared unto our father Abraham, when he was in Mesopotamia, before he dwelt in Charran, '
  '20':
  - type: text
    content: 'In which time Moses was born, and was exceeding fair, and nourished up in his father''s house three months: '
  '21':
  - type: text
    content: 'and when he was cast out, Pharaoh''s daughter took him up, and nourished him for her own son. '
  '22':
  - type: text
    content: 'And Moses was learned in all the wisdom of the Egyptians, and was mighty in words and in deeds. '
  '23':
  - type: text
    content: 'And when he was full forty years old, it came into his heart to visit his brethren the children of Israel. '
  '24':
  - type: text
    content: 'And seeing one '
  - type: text
    content: of them
  - type: text
    content: ' suffer wrong, he defended '
  - type: text
    content: him
  - type: text
    content: ', and avenged him that was oppressed, and smote the Egyptian: '
  '25':
  - type: text
    content: 'for he supposed his brethren would have understood how that God by his hand would deliver them: but they understood not. '
  '26':
  - type: text
    content: 'And the next day he shewed himself unto them as they strove, and would have set them at one again, saying, Sirs, ye are brethren; why do ye wrong one to another? '
  '27':
  - type: text
    content: 'But he that did his neighbour wrong thrust him away, saying, Who made thee a ruler and a judge over us? '
  '28':
  - type: text
    content: 'Wilt thou kill me, as thou diddest the Egyptian yesterday? '
  '29':
  - type: text
    content: 'Then fled Moses at this saying, and was a stranger in the land of Madian, where he begat two sons. '
  '3':
  - type: text
    content: 'and said unto him, Get thee out of thy country, and from thy kindred, and come into the land which I shall shew thee. '
  '30':
  - type: text
    content: 'And when forty years were expired, there appeared to him in the wilderness of mount Sina an angel of the Lord in a flame of fire in a bush. '
  '31':
  - type: text
    content: 'When Moses saw '
  - type: text
    content: it
  - type: text
    content: ', he wondered at the sight: and as he drew near to behold '
  - type: text
    content: it
  - type: text
    content: ', the voice of the Lord came unto him, '
  '32':
  - type: text
    content: saying
  - type: text
    content: ', I '
  - type: text
    content: am
  - type: text
    content: ' the God of thy fathers, the God of Abraham, and the God of Isaac, and the God of Jacob. Then Moses trembled, and durst not behold. '
  '33':
  - type: text
    content: 'Then said the Lord to him, Put off thy shoes from thy feet: for the place where thou standest is holy ground. '
  '34':
  - type: text
    content: 'I have seen, I have seen the affliction of my people which is in Egypt, and I have heard their groaning, and am come down to deliver them. And now come, I will send thee into Egypt. '
  '35':
  - type: text
    content: 'This Moses whom they refused, saying, Who made thee a ruler and a judge? the same did God send '
  - type: text
    content: to be
  - type: text
    content: ' a ruler and a deliverer by the hand of the angel which appeared to him in the bush. '
  '36':
  - type: text
    content: He brought them out, after that he had shewed wonders and signs in the land of Egypt, and in the Red sea, and in the wilderness forty years.
  '37':
  - type: text
    content: 'This is that Moses, which said unto the children of Israel, A prophet shall the Lord your God raise up unto you of your brethren, like unto me; him shall ye hear. '
  '38':
  - type: text
    content: 'This is he, that was in the church in the wilderness with the angel which spake to him in the mount Sina, and '
  - type: text
    content: with
  - type: text
    content: ' our fathers: who received the lively oracles to give unto us: '
  '39':
  - type: text
    content: 'to whom our fathers would not obey, but thrust '
  - type: text
    content: him
  - type: text
    content: ' from them, and in their hearts turned back again into Egypt, '
  '4':
  - type: text
    content: 'Then came he out of the land of the Chaldæans, and dwelt in Charran: and from thence, when his father was dead, he removed him into this land, wherein ye now dwell. '
  '40':
  - type: text
    content: 'saying unto Aaron, Make us gods to go before us: for '
  - type: text
    content: as for
  - type: text
    content: ' this Moses, which brought us out of the land of Egypt, we wot not what is become of him. '
  '41':
  - type: text
    content: 'And they made a calf in those days, and offered sacrifice unto the idol, and rejoiced in the works of their own hands. '
  '42':
  - type: text
    content: Then God turned, and gave them up to worship the host of heaven; as it is written in the book of the prophets,
  - type: text
    content: O ye house of Israel, have ye offered to me slain beasts and sacrifices
  - type: text
    content: By the space of
  - type: text
    content: ' forty years in the wilderness?'
  '43':
  - type: text
    content: Yea, ye took up the tabernacle of Moloch,
  - type: text
    content: And the star of your god Remphan,
  - type: text
    content: 'Figures which ye made to worship them:'
  - type: text
    content: And I will carry you away beyond Babylon.
  '44':
  - type: text
    content: 'Our fathers had the tabernacle of witness in the wilderness, as he had appointed, speaking unto Moses, that he should make it according to the fashion that he had seen. '
  '45':
  - type: text
    content: 'Which also our fathers that came after brought in with Jesus into the possession of the Gentiles, whom God drave out before the face of our fathers, unto the days of David; '
  '46':
  - type: text
    content: 'who found favour before God, and desired to find a tabernacle for the God of Jacob. '
  '47':
  - type: text
    content: But Solomon built him an house.
  '48':
  - type: text
    content: Howbeit the most High dwelleth not in temples made with hands; as saith the prophet,
  '49':
  - type: text
    content: 'Heaven '
  - type: text
    content: is
  - type: text
    content: ' my throne,'
  - type: text
    content: 'And earth '
  - type: text
    content: is
  - type: text
    content: ' my footstool:'
  - type: text
    content: 'What house will ye build me? saith the Lord:'
  - type: text
    content: 'Or what '
  - type: text
    content: is
  - type: text
    content: ' the place of my rest?'
  '5':
  - type: text
    content: 'And he gave him none inheritance in it, no, not '
  - type: text
    content: so much as
  - type: text
    content: ' to set his foot on: yet he promised that he would give it to him for a possession, and to his seed after him, when '
  - type: text
    content: as yet
  - type: text
    content: ' he had no child.'
  '50':
  - type: text
    content: Hath not my hand made all these things?
  '51':
  - type: text
    content: 'Ye stiffnecked and uncircumcised in heart and ears, ye do always resist the Holy Ghost: as your fathers '
  - type: text
    content: did
  - type: text
    content: ', so '
  - type: text
    content: do
  - type: text
    content: ' ye. '
  '52':
  - type: text
    content: 'Which of the prophets have not your fathers persecuted? and they have slain them which shewed before of the coming of the Just One; of whom ye have been now the betrayers and murderers: '
  '53':
  - type: text
    content: 'who have received the law by the disposition of angels, and have not kept '
  - type: text
    content: it
  - type: text
    content: .
  - type: heading
    content: Death of Stephen
  '54':
  - type: text
    content: 'When they heard these things, they were cut to the heart, and they gnashed on him with '
  - type: text
    content: their
  - type: text
    content: ' teeth. '
  '55':
  - type: text
    content: 'But he, being full of the Holy Ghost, looked up stedfastly into heaven, and saw the glory of God, and Jesus standing on the right hand of God, '
  '56':
  - type: text
    content: 'and said, Behold, I see the heavens opened, and the Son of man standing on the right hand of God. '
  '57':
  - type: text
    content: 'Then they cried out with a loud voice, and stopped their ears, and ran upon him with one accord, '
  '58':
  - type: text
    content: 'and cast '
  - type: text
    content: him
  - type: text
    content: ' out of the city, and stoned '
  - type: text
    content: him
  - type: text
    content: ': and the witnesses laid down their clothes at a young man''s feet, whose name was Saul. '
  '59':
  - type: text
    content: 'And they stoned Stephen, calling upon '
  - type: text
    content: God
  - type: text
    content: ', and saying, Lord Jesus, receive my spirit. '
  '6':
  - type: text
    content: 'And God spake on this wise, That his seed should sojourn in a strange land; and that they should bring them into bondage, and entreat '
  - type: text
    content: them
  - type: text
    content: ' evil four hundred years. '
  '60':
  - type: text
    content: And he kneeled down, and cried with a loud voice, Lord, lay not this sin to their charge. And when he had said this, he fell asleep.
  '7':
  - type: text
    content: 'And the nation to whom they shall be in bondage will I judge, said God: and after that shall they come forth, and serve me in this place. '
  '8':
  - type: text
    content: 'And he gave him the covenant of circumcision: and so '
  - type: text
    content: Abraham
  - type: text
    content: ' begat Isaac, and circumcised him the eighth day; and Isaac '
  - type: text
    content: begat
  - type: text
    content: ' Jacob; and Jacob '
  - type: text
    content: begat
  - type: text
    content: ' the twelve patriarchs. '
  '9':
  - type: text
    content: 'And the patriarchs, moved with envy, sold Joseph into Egypt: but God was with him, '
