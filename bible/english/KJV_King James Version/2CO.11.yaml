  - type: text
    content: ' are wise. '
  '2':
  - type: text
    content: 'For I am jealous over you with godly jealousy: for I have espoused you to one husband, that I may present '
  - type: text
    content: you as
  - type: text
    content: ' a chaste virgin to Christ. '
  '20':
  - type: text
    content: 'For ye suffer, if a man bring you into bondage, if a man devour '
  - type: text
