  '27':
  - type: text
    content: 'in weariness and painfulness, in watchings often, in hunger and thirst, in fastings often, in cold and nakedness. '
  '28':
  - type: text
    content: 'Beside those things that are without, that which cometh upon me daily, the care of all the churches. '
  '29':
  - type: text
    content: 'Who is weak, and I am not weak? who is offended, and I burn not? '
  '3':
  - type: text
    content: 'But I fear, lest by any means, as the serpent beguiled Eve through his subtilty, so your minds should be corrupted from the simplicity that is in Christ. '
  '30':
  - type: text
    content: 'If I must needs glory, I will glory of the things which concern mine infirmities. '
  '31':
  - type: text
    content: 'The God and Father of our Lord Jesus Christ, which is blessed for evermore, knoweth that I lie not. '
  '32':
  - type: text
    content: 'In Damascus the governor under Aretas the king kept the city of the Damascenes with a garrison, desirous to apprehend me: '
  '33':
  - type: text
    content: and through a window in a basket was I let down by the wall, and escaped his hands.
  '4':
  - type: text
    content: 'For if he that cometh preacheth another Jesus, whom we have not preached, or '
  - type: text
    content: if
  - type: text
    content: ' ye receive another spirit, which ye have not received, or another gospel, which ye have not accepted, ye might well bear with '
  - type: text
    content: him
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'For I suppose I was not a whit behind the very chiefest apostles. '
  '6':
  - type: text
    content: 'But though '
  - type: text
    content: I be
  - type: text
    content: ' rude in speech, yet not in knowledge; but we have been throughly made manifest among you in all things.'
  '7':
  - type: text
    content: 'Have I committed an offence in abasing myself that ye might be exalted, because I have preached to you the gospel of God freely? '
  '8':
  - type: text
    content: 'I robbed other churches, taking wages '
  - type: text
