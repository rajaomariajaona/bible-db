  - type: text
    content: of you
  - type: text
    content: ', if a man exalt himself, if a man smite you on the face. '
  '21':
  - type: text
    content: 'I speak as concerning reproach, as though we had been weak. Howbeit whereinsoever any is bold, (I speak foolishly,) I am bold also. '
