document_id: 2CO.11,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Would to God ye could bear with me a little in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: my
    - type: text
      text: ' folly: and indeed bear with me. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As the truth of Christ is in me, no man shall stop me of this boasting in the regions of Achaia. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Wherefore? because I love you not? God knoweth.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But what I do, that I will do, that I may cut off occasion from them which desire occasion; that wherein they glory, they may be found even as we. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For such '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' false apostles, deceitful workers, transforming themselves into the apostles of Christ. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And no marvel; for Satan himself is transformed into an angel of light. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' no great thing if his ministers also be transformed as the ministers of righteousness; whose end shall be according to their works.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Paul's Defence
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I say again, Let no man think me a fool; if otherwise, yet as a fool receive me, that I may boast myself a little. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That which I speak, I speak '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' not after the Lord, but as it were foolishly, in this confidence of boasting. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Seeing that many glory after the flesh, I will glory also. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For ye suffer fools gladly, seeing ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yourselves
    - type: text
      text: ' are wise. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I am jealous over you with godly jealousy: for I have espoused you to one husband, that I may present '
    - type: usfm
      marker: add
      children:
      - type: text
        text: you as
    - type: text
      text: ' a chaste virgin to Christ. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For ye suffer, if a man bring you into bondage, if a man devour '
    - type: usfm
      marker: add
      children:
      - type: text
        text: you
    - type: text
      text: ', if a man take '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of you
    - type: text
      text: ', if a man exalt himself, if a man smite you on the face. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I speak as concerning reproach, as though we had been weak. Howbeit whereinsoever any is bold, (I speak foolishly,) I am bold also. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Are they Hebrews? so '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' I. Are they Israelites? so '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' I. Are they the seed of Abraham? so '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' I. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Are they ministers of Christ? (I speak as a fool) I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' more; in labours more abundant, in stripes above measure, in prisons more frequent, in deaths oft. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of the Jews five times received I forty '
    - type: usfm
      marker: add
      children:
      - type: text
        text: stripes
    - type: text
      text: ' save one. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thrice was I beaten with rods, once was I stoned, thrice I suffered shipwreck, a night and a day I have been in the deep; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' journeyings often, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' perils of waters, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' perils of robbers, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' perils by '
    - type: usfm
      marker: add
      children:
      - type: text
        text: mine own
    - type: text
      text: ' countrymen, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' perils by the heathen, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' perils in the city, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' perils in the wilderness, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' perils in the sea, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' perils among false brethren; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'in weariness and painfulness, in watchings often, in hunger and thirst, in fastings often, in cold and nakedness. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beside those things that are without, that which cometh upon me daily, the care of all the churches. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who is weak, and I am not weak? who is offended, and I burn not? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I fear, lest by any means, as the serpent beguiled Eve through his subtilty, so your minds should be corrupted from the simplicity that is in Christ. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If I must needs glory, I will glory of the things which concern mine infirmities. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The God and Father of our Lord Jesus Christ, which is blessed for evermore, knoweth that I lie not. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In Damascus the governor under Aretas the king kept the city of the Damascenes with a garrison, desirous to apprehend me: '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and through a window in a basket was I let down by the wall, and escaped his hands.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if he that cometh preacheth another Jesus, whom we have not preached, or '
    - type: usfm
      marker: add
      children:
      - type: text
        text: if
    - type: text
      text: ' ye receive another spirit, which ye have not received, or another gospel, which ye have not accepted, ye might well bear with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I suppose I was not a whit behind the very chiefest apostles. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But though '
    - type: usfm
      marker: add
      children:
      - type: text
        text: I be
    - type: text
      text: ' rude in speech, yet not in knowledge; but we have been throughly made manifest among you in all things.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Have I committed an offence in abasing myself that ye might be exalted, because I have preached to you the gospel of God freely? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I robbed other churches, taking wages '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of them
    - type: text
      text: ', to do you service. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when I was present with you, and wanted, I was chargeable to no man: for that which was lacking to me the brethren which came from Macedonia supplied: and in all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' I have kept myself from being burdensome unto you, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' will I keep '
    - type: usfm
      marker: add
      children:
      - type: text
        text: myself
    - type: text
      text: '. '
