  '10':
  - type: text
    content: 'As the truth of Christ is in me, no man shall stop me of this boasting in the regions of Achaia. '
  '11':
  - type: text
    content: Wherefore? because I love you not? God knoweth.
  '12':
  - type: text
    content: 'But what I do, that I will do, that I may cut off occasion from them which desire occasion; that wherein they glory, they may be found even as we. '
  '13':
  - type: text
    content: 'For such '
  - type: text
    content: are
  - type: text
    content: ' false apostles, deceitful workers, transforming themselves into the apostles of Christ. '
  '14':
  - type: text
    content: 'And no marvel; for Satan himself is transformed into an angel of light. '
  '15':
  - type: text
    content: 'Therefore '
  - type: text
    content: it is
  - type: text
    content: ' no great thing if his ministers also be transformed as the ministers of righteousness; whose end shall be according to their works.'
  - type: heading
