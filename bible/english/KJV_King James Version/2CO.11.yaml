document_id: 2CO.11
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Would to God ye could bear with me a little in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my
  - type: text
    text: ' folly: and indeed bear with me. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For I am jealous over you with godly jealousy: for I have espoused you to one husband, that I may present '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you as
  - type: text
    text: ' a chaste virgin to Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But I fear, lest by any means, as the serpent beguiled Eve through his subtilty, so your minds should be corrupted from the simplicity that is in Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For if he that cometh preacheth another Jesus, whom we have not preached, or '
  - type: usfm
    marker: add
    children:
    - type: text
      text: if
  - type: text
    text: ' ye receive another spirit, which ye have not received, or another gospel, which ye have not accepted, ye might well bear with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For I suppose I was not a whit behind the very chiefest apostles. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But though '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I be
  - type: text
    text: ' rude in speech, yet not in knowledge; but we have been throughly made manifest among you in all things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Have I committed an offence in abasing myself that ye might be exalted, because I have preached to you the gospel of God freely? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I robbed other churches, taking wages '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of them
  - type: text
    text: ', to do you service. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And when I was present with you, and wanted, I was chargeable to no man: for that which was lacking to me the brethren which came from Macedonia supplied: and in all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' I have kept myself from being burdensome unto you, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' will I keep '
  - type: usfm
    marker: add
    children:
    - type: text
      text: myself
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'As the truth of Christ is in me, no man shall stop me of this boasting in the regions of Achaia. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Wherefore? because I love you not? God knoweth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But what I do, that I will do, that I may cut off occasion from them which desire occasion; that wherein they glory, they may be found even as we. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For such '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' false apostles, deceitful workers, transforming themselves into the apostles of Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And no marvel; for Satan himself is transformed into an angel of light. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Therefore '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' no great thing if his ministers also be transformed as the ministers of righteousness; whose end shall be according to their works.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Paul's Defence
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I say again, Let no man think me a fool; if otherwise, yet as a fool receive me, that I may boast myself a little. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'That which I speak, I speak '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' not after the Lord, but as it were foolishly, in this confidence of boasting. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Seeing that many glory after the flesh, I will glory also. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For ye suffer fools gladly, seeing ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yourselves
  - type: text
    text: ' are wise. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For ye suffer, if a man bring you into bondage, if a man devour '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: ', if a man take '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of you
  - type: text
    text: ', if a man exalt himself, if a man smite you on the face. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'I speak as concerning reproach, as though we had been weak. Howbeit whereinsoever any is bold, (I speak foolishly,) I am bold also. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Are they Hebrews? so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' I. Are they Israelites? so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' I. Are they the seed of Abraham? so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' I. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Are they ministers of Christ? (I speak as a fool) I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' more; in labours more abundant, in stripes above measure, in prisons more frequent, in deaths oft. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Of the Jews five times received I forty '
  - type: usfm
    marker: add
    children:
    - type: text
      text: stripes
  - type: text
    text: ' save one. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Thrice was I beaten with rods, once was I stoned, thrice I suffered shipwreck, a night and a day I have been in the deep; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' journeyings often, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' perils of waters, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' perils of robbers, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' perils by '
  - type: usfm
    marker: add
    children:
    - type: text
      text: mine own
  - type: text
    text: ' countrymen, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' perils by the heathen, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' perils in the city, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' perils in the wilderness, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' perils in the sea, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' perils among false brethren; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'in weariness and painfulness, in watchings often, in hunger and thirst, in fastings often, in cold and nakedness. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Beside those things that are without, that which cometh upon me daily, the care of all the churches. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Who is weak, and I am not weak? who is offended, and I burn not? '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'If I must needs glory, I will glory of the things which concern mine infirmities. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'The God and Father of our Lord Jesus Christ, which is blessed for evermore, knoweth that I lie not. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'In Damascus the governor under Aretas the king kept the city of the Damascenes with a garrison, desirous to apprehend me: '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: and through a window in a basket was I let down by the wall, and escaped his hands.
