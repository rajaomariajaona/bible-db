document_id: ROM.15,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'We then that are strong ought to bear the infirmities of the weak, and not to please ourselves. '
  '10':
  - type: text
    content: And again he saith,
  - type: text
    content: Rejoice, ye Gentiles, with his people.
  '11':
  - type: text
    content: And again,
  - type: text
    content: Praise the Lord, all ye Gentiles;
  - type: text
    content: And laud him, all ye people.
  '12':
  - type: text
    content: And again, Esaias saith,
  - type: text
    content: There shall be a root of Jesse,
  - type: text
    content: And he that shall rise to reign over the Gentiles;
  - type: text
    content: In him shall the Gentiles trust.
  '13':
  - type: text
    content: Now the God of hope fill you with all joy and peace in believing, that ye may abound in hope, through the power of the Holy Ghost.
  - type: heading
    content: Personal Messages
  '14':
  - type: text
    content: 'And I myself also am persuaded of you, my brethren, that ye also are full of goodness, filled with all knowledge, able also to admonish one another. '
  '15':
  - type: text
    content: 'Nevertheless, brethren, I have written the more boldly unto you in some sort, as putting you in mind, because of the grace that is given to me of God, '
  '16':
  - type: text
    content: 'that I should be the minister of Jesus Christ to the Gentiles, ministering the gospel of God, that the offering up of the Gentiles might be acceptable, being sanctified by the Holy Ghost. '
  '17':
  - type: text
    content: 'I have therefore whereof I may glory through Jesus Christ in those things which pertain to God. '
  '18':
  - type: text
    content: 'For I will not dare to speak of any of those things which Christ hath not wrought by me, to make the Gentiles obedient, by word and deed, '
  '19':
  - type: text
    content: 'through mighty signs and wonders, by the power of the Spirit of God; so that from Jerusalem, and round about unto Illyricum, I have fully preached the gospel of Christ. '
  '2':
  - type: text
    content: 'Let every one of us please '
  - type: text
    content: his
  - type: text
    content: ' neighbour for '
  - type: text
    content: his
  - type: text
    content: ' good to edification. '
  '20':
  - type: text
    content: 'Yea, so have I strived to preach the gospel, not where Christ was named, lest I should build upon another man''s foundation: '
  '21':
  - type: text
    content: But as it is written,
  - type: text
    content: 'To whom he was not spoken of, they shall see:'
  - type: text
    content: And they that have not heard shall understand.
  '22':
  - type: text
    content: 'For which cause also I have been much hindered from coming to you. '
  '23':
  - type: text
    content: 'But now having no more place in these parts, and having a great desire these many years to come unto you; '
  '24':
  - type: text
    content: 'whensoever I take my journey into Spain, I will come to you: for I trust to see you in my journey, and to be brought on my way thitherward by you, if first I be somewhat filled with your '
  - type: text
    content: company
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'But now I go unto Jerusalem to minister unto the saints. '
  '26':
  - type: text
    content: 'For it hath pleased them of Macedonia and Achaia to make a certain contribution for the poor saints which are at Jerusalem. '
  '27':
  - type: text
    content: 'It hath pleased them verily; and their debtors they are. For if the Gentiles have been made partakers of their spiritual things, their duty is also to minister unto them in carnal things. '
  '28':
  - type: text
    content: 'When therefore I have performed this, and have sealed to them this fruit, I will come by you into Spain. '
  '29':
  - type: text
    content: And I am sure that, when I come unto you, I shall come in the fulness of the blessing of the gospel of Christ.
  '3':
  - type: text
    content: 'For even Christ pleased not himself; but, as it is written, The reproaches of them that reproached thee fell on me. '
  '30':
  - type: text
    content: 'Now I beseech you, brethren, for the Lord Jesus Christ''s sake, and for the love of the Spirit, that ye strive together with me in '
  - type: text
    content: your
  - type: text
    content: ' prayers to God for me; '
  '31':
  - type: text
    content: 'that I may be delivered from them that do not believe in Judæa; and that my service which '
  - type: text
    content: I have
  - type: text
    content: ' for Jerusalem may be accepted of the saints; '
  '32':
  - type: text
    content: 'that I may come unto you with joy by the will of God, and may with you be refreshed. '
  '33':
  - type: text
    content: 'Now the God of peace '
  - type: text
    content: be
  - type: text
    content: ' with you all. Amen.'
  '4':
  - type: text
    content: 'For whatsoever things were written aforetime were written for our learning, that we through patience and comfort of the scriptures might have hope. '
  '5':
  - type: text
    content: 'Now the God of patience and consolation grant you to be likeminded one toward another according to Christ Jesus: '
  '6':
  - type: text
    content: 'that ye may with one mind '
  - type: text
    content: and
  - type: text
    content: ' one mouth glorify God, even the Father of our Lord Jesus Christ.'
  - type: heading
    content: To the Glory of God
  '7':
  - type: text
    content: 'Wherefore receive ye one another, as Christ also received us to the glory of God. '
  '8':
  - type: text
    content: 'Now I say that Jesus Christ was a minister of the circumcision for the truth of God, to confirm the promises '
  - type: text
    content: made
  - type: text
    content: ' unto the fathers: '
  '9':
  - type: text
    content: 'and that the Gentiles might glorify God for '
  - type: text
    content: his
  - type: text
    content: ' mercy; as it is written,'
  - type: text
    content: For this cause I will confess to thee among the Gentiles,
  - type: text
    content: And sing unto thy name.
