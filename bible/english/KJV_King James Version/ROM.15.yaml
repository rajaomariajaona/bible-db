document_id: ROM.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'We then that are strong ought to bear the infirmities of the weak, and not to please ourselves. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Let every one of us please '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' neighbour for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' good to edification. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For even Christ pleased not himself; but, as it is written, The reproaches of them that reproached thee fell on me. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For whatsoever things were written aforetime were written for our learning, that we through patience and comfort of the scriptures might have hope. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now the God of patience and consolation grant you to be likeminded one toward another according to Christ Jesus: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'that ye may with one mind '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' one mouth glorify God, even the Father of our Lord Jesus Christ.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: To the Glory of God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Wherefore receive ye one another, as Christ also received us to the glory of God. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now I say that Jesus Christ was a minister of the circumcision for the truth of God, to confirm the promises '
  - type: usfm
    marker: add
    children:
    - type: text
      text: made
  - type: text
    text: ' unto the fathers: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and that the Gentiles might glorify God for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' mercy; as it is written,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For this cause I will confess to thee among the Gentiles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And sing unto thy name.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And again he saith,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rejoice, ye Gentiles, with his people.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And again,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Praise the Lord, all ye Gentiles;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And laud him, all ye people.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And again, Esaias saith,
- type: usfm
  marker: q1
  children:
  - type: text
    text: There shall be a root of Jesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he that shall rise to reign over the Gentiles;
- type: usfm
  marker: q1
  children:
  - type: text
    text: In him shall the Gentiles trust.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Now the God of hope fill you with all joy and peace in believing, that ye may abound in hope, through the power of the Holy Ghost.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Personal Messages
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And I myself also am persuaded of you, my brethren, that ye also are full of goodness, filled with all knowledge, able also to admonish one another. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nevertheless, brethren, I have written the more boldly unto you in some sort, as putting you in mind, because of the grace that is given to me of God, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'that I should be the minister of Jesus Christ to the Gentiles, ministering the gospel of God, that the offering up of the Gentiles might be acceptable, being sanctified by the Holy Ghost. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'I have therefore whereof I may glory through Jesus Christ in those things which pertain to God. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For I will not dare to speak of any of those things which Christ hath not wrought by me, to make the Gentiles obedient, by word and deed, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'through mighty signs and wonders, by the power of the Spirit of God; so that from Jerusalem, and round about unto Illyricum, I have fully preached the gospel of Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Yea, so have I strived to preach the gospel, not where Christ was named, lest I should build upon another man''s foundation: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: But as it is written,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'To whom he was not spoken of, they shall see:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they that have not heard shall understand.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'For which cause also I have been much hindered from coming to you. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But now having no more place in these parts, and having a great desire these many years to come unto you; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'whensoever I take my journey into Spain, I will come to you: for I trust to see you in my journey, and to be brought on my way thitherward by you, if first I be somewhat filled with your '
  - type: usfm
    marker: add
    children:
    - type: text
      text: company
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But now I go unto Jerusalem to minister unto the saints. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'For it hath pleased them of Macedonia and Achaia to make a certain contribution for the poor saints which are at Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'It hath pleased them verily; and their debtors they are. For if the Gentiles have been made partakers of their spiritual things, their duty is also to minister unto them in carnal things. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'When therefore I have performed this, and have sealed to them this fruit, I will come by you into Spain. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: And I am sure that, when I come unto you, I shall come in the fulness of the blessing of the gospel of Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Now I beseech you, brethren, for the Lord Jesus Christ''s sake, and for the love of the Spirit, that ye strive together with me in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: your
  - type: text
    text: ' prayers to God for me; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'that I may be delivered from them that do not believe in Judæa; and that my service which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I have
  - type: text
    text: ' for Jerusalem may be accepted of the saints; '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'that I may come unto you with joy by the will of God, and may with you be refreshed. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Now the God of peace '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' with you all. Amen.'
