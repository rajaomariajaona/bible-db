  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: His Baptism and Temptation
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now in the fifteenth year of the reign of Tiberius Cæsar, Pontius Pilate being governor of Judæa, and Herod being tetrarch of Galilee, and his brother Philip tetrarch of Ituræa and of the region of Trachonitis, and Lysanias the tetrarch of Abilene, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people asked him, saying, What shall we do then? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He answereth and saith unto them, He that hath two coats, let him impart to him that hath none; and he that hath meat, let him do likewise. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then came also publicans to be baptized, and said unto him, Master, what shall we do? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto them, Exact no more than that which is appointed you. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the soldiers likewise demanded of him, saying, And what shall we do? And he said unto them, Do violence to no man, neither accuse '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' falsely; and be content with your wages.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as the people were in expectation, and all men mused in their hearts of John, whether he were the Christ, or not; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'John answered, saying unto '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' all, I indeed baptize you with water; but one mightier than I cometh, the latchet of whose shoes I am not worthy to unloose: he shall baptize you with the Holy Ghost and with fire: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'whose fan '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in his hand, and he will throughly purge his floor, and will gather the wheat into his garner; but the chaff he will burn with fire unquenchable. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And many other things in his exhortation preached he unto the people.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Herod the tetrarch, being reproved by him for Herodias his brother Philip''s wife, and for all the evils which Herod had done, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Annas and Caiaphas being the high priests, the word of God came unto John the son of Zacharias in the wilderness.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: added yet this above all, that he shut up John in prison.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Baptism of Jesus
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when all the people were baptized, it came to pass, that Jesus also being baptized, and praying, the heaven was opened, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and the Holy Ghost descended in a bodily shape like a dove upon him, and a voice came from heaven, which said, Thou art my beloved Son; in thee I am well pleased.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Family Records
