  '4':
  - type: text
    content: as it is written in the book of the words of Esaias the prophet, saying,
  - type: text
    content: The voice of one crying in the wilderness,
  - type: text
    content: Prepare ye the way of the Lord,
  - type: text
    content: Make his paths straight.
  '5':
  - type: text
    content: Every valley shall be filled,
  - type: text
    content: And every mountain and hill shall be brought low;
  - type: text
    content: And the crooked shall be made straight,
  - type: text
    content: 'And the rough ways '
  - type: text
    content: shall be
  - type: text
    content: ' made smooth;'
  '6':
  - type: text
    content: And all flesh shall see the salvation of God.
  '7':
  - type: text
    content: 'Then said he to the multitude that came forth to be baptized of him, O generation of vipers, who hath warned you to flee from the wrath to come? '
  '8':
  - type: text
    content: 'Bring forth therefore fruits worthy of repentance, and begin not to say within yourselves, We have Abraham to '
  - type: text
    content: our
  - type: text
    content: ' father: for I say unto you, That God is able of these stones to raise up children unto Abraham. '
  '9':
  - type: text
    content: 'And now also the axe is laid unto the root of the trees: every tree therefore which bringeth not forth good fruit is hewn down, and cast into the fire.'
