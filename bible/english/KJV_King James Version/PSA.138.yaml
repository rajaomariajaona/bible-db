document_id: PSA.138,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: A Psalm
    - type: text
      text: ' of David.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will praise thee with my whole heart:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Before the gods will I sing praise unto thee.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will worship toward thy holy temple, and praise thy name for thy lovingkindness and for thy truth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For thou hast magnified thy word above all thy name.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the day when I cried thou answeredst me,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' strengthenedst me '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' strength in my soul.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All the kings of the earth shall praise thee, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When they hear the words of thy mouth.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yea, they shall sing in the ways of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ':'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For great '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Though the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' high, yet hath he respect unto the lowly:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the proud he knoweth afar off.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Though I walk in the midst of trouble, thou wilt revive me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou shalt stretch forth thine hand against the wrath of mine enemies, and thy right hand shall save me.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will perfect '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which
    - type: text
      text: ' concerneth me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Thy mercy, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: endureth
    - type: text
      text: ' for ever: Forsake not the works of thine own hands.'
