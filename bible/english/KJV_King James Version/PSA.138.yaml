  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' high, yet hath he respect unto the lowly:'
  - type: text
    content: But the proud he knoweth afar off.
  '7':
  - type: text
    content: 'Though I walk in the midst of trouble, thou wilt revive me:'
  - type: text
    content: Thou shalt stretch forth thine hand against the wrath of mine enemies, and thy right hand shall save me.
  '8':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' will perfect '
  - type: text
    content: that which
  - type: text
    content: ' concerneth me:'
  - type: text
    content: 'Thy mercy, O '
  - type: text
    content: LORD
  - type: text
