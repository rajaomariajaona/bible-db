    content: A Psalm
  - type: text
    content: ' of David.'
  - type: text
    content: 'I will praise thee with my whole heart:'
  - type: text
    content: Before the gods will I sing praise unto thee.
  '2':
  - type: text
    content: 'I will worship toward thy holy temple, and praise thy name for thy lovingkindness and for thy truth:'
  - type: text
    content: For thou hast magnified thy word above all thy name.
  '3':
  - type: text
    content: In the day when I cried thou answeredst me,
  - type: text
    content: And
  - type: text
    content: ' strengthenedst me '
  - type: text
    content: with
  - type: text
    content: ' strength in my soul.'
  '4':
  - type: text
    content: 'All the kings of the earth shall praise thee, O '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: When they hear the words of thy mouth.
  '5':
  - type: text
    content: 'Yea, they shall sing in the ways of the '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: 'For great '
  - type: text
    content: is
  - type: text
    content: ' the glory of the '
  - type: text
    content: LORD
  - type: text
    content: .
  '6':
  - type: text
    content: 'Though the '
  - type: text
