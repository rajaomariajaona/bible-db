verses:
  '1':
  - type: heading
    content: Aaron's Rod
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '10':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Moses, Bring Aaron''s rod again before the testimony, to be kept for a token against the rebels; and thou shalt quite take away their murmurings from me, that they die not. '
  '11':
  - type: text
    content: 'And Moses did '
  - type: text
    content: 'so:'
  - type: text
    content: ' as the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded him, so did he.'
  '12':
  - type: text
    content: 'And the children of Israel spake unto Moses, saying, Behold, we die, we perish, we all perish. '
  '13':
  - type: text
    content: 'Whosoever cometh any thing near unto the tabernacle of the '
  - type: text
    content: LORD
  - type: text
    content: ' shall die: shall we be consumed with dying?'
  '2':
  - type: text
    content: 'Speak unto the children of Israel, and take of every one of them a rod according to the house of '
  - type: text
    content: their
  - type: text
    content: ' fathers, of all their princes according to the house of their fathers twelve rods: write thou every man''s name upon his rod. '
  '3':
  - type: text
    content: 'And thou shalt write Aaron''s name upon the rod of Levi: for one rod '
  - type: text
    content: shall be
  - type: text
    content: ' for the head of the house of their fathers. '
  '4':
  - type: text
    content: 'And thou shalt lay them up in the tabernacle of the congregation before the testimony, where I will meet with you. '
  '5':
  - type: text
    content: 'And it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ' the man''s rod, whom I shall choose, shall blossom: and I will make to cease from me the murmurings of the children of Israel, whereby they murmur against you. '
  '6':
  - type: text
    content: 'And Moses spake unto the children of Israel, and every one of their princes gave him a rod apiece, for each prince one, according to their fathers'' houses, '
  - type: text
    content: even
  - type: text
    content: ' twelve rods: and the rod of Aaron '
  - type: text
    content: was
  - type: text
    content: ' among their rods. '
  '7':
  - type: text
    content: 'And Moses laid up the rods before the '
  - type: text
    content: LORD
  - type: text
    content: ' in the tabernacle of witness.'
  '8':
  - type: text
    content: 'And it came to pass, that on the morrow Moses went into the tabernacle of witness; and, behold, the rod of Aaron for the house of Levi was budded, and brought forth buds, and bloomed blossoms, and yielded almonds. '
  '9':
  - type: text
    content: 'And Moses brought out all the rods from before the '
  - type: text
    content: LORD
  - type: text
    content: ' unto all the children of Israel: and they looked, and took every man his rod. '
