  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: By the rivers of Babylon, there we sat down, yea, we wept,
- type: usfm
  marker: q2
  children:
  - type: text
    text: When we remembered Zion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: We hanged our harps
- type: usfm
  marker: q2
  children:
  - type: text
    text: Upon the willows in the midst thereof.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For there they that carried us away captive required of us a song; And they that wasted us '
  - type: usfm
    marker: add
    children:
    - type: text
      text: required of us
  - type: text
    text: ' mirth, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saying
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Sing us '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' of the songs of Zion.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: How shall we sing
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s song in a strange land?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: If I forget thee, O Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Let my right hand forget '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her cunning
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: If I do not remember thee, let my tongue cleave to the roof of my mouth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: If I prefer not Jerusalem above my chief joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Remember, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the children of Edom in the day of Jerusalem;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Who said, Rase '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', rase '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to the foundation thereof.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: O daughter of Babylon, who art to be destroyed;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Happy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall he be
  - type: text
    text: ', that rewardeth thee as thou hast served us.'
- type: usfm
