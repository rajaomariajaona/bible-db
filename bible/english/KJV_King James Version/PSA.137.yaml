document_id: PSA.137,1
type_code: eng
verses:
  '1':
  - type: text
    content: By the rivers of Babylon, there we sat down, yea, we wept,
  - type: text
    content: When we remembered Zion.
  '2':
  - type: text
    content: We hanged our harps
  - type: text
    content: Upon the willows in the midst thereof.
  '3':
  - type: text
    content: 'For there they that carried us away captive required of us a song; And they that wasted us '
  - type: text
    content: required of us
  - type: text
    content: ' mirth, '
  - type: text
    content: saying
  - type: text
    content: ','
  - type: text
    content: 'Sing us '
  - type: text
    content: one
  - type: text
    content: ' of the songs of Zion.'
  '4':
  - type: text
    content: How shall we sing
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: '''s song in a strange land?'
  '5':
  - type: text
    content: If I forget thee, O Jerusalem,
  - type: text
    content: 'Let my right hand forget '
  - type: text
    content: her cunning
  - type: text
    content: .
  '6':
  - type: text
    content: If I do not remember thee, let my tongue cleave to the roof of my mouth;
  - type: text
    content: If I prefer not Jerusalem above my chief joy.
  '7':
  - type: text
    content: 'Remember, O '
  - type: text
    content: LORD
  - type: text
    content: ', the children of Edom in the day of Jerusalem;'
  - type: text
    content: 'Who said, Rase '
  - type: text
    content: it
  - type: text
    content: ', rase '
  - type: text
    content: it
  - type: text
    content: ', '
  - type: text
    content: even
  - type: text
    content: ' to the foundation thereof.'
  '8':
  - type: text
    content: O daughter of Babylon, who art to be destroyed;
  - type: text
    content: 'Happy '
  - type: text
    content: shall he be
  - type: text
    content: ', that rewardeth thee as thou hast served us.'
  '9':
  - type: text
    content: 'Happy '
  - type: text
    content: shall he be
  - type: text
    content: ', that taketh and dasheth thy little ones'
  - type: text
    content: Against the stones.
