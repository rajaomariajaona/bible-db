    content: Service of Priests and Levites
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '10':
  - type: text
    content: 'and thou shalt bring the Levites before the '
  - type: text
    content: LORD
  - type: text
    content: ': and the children of Israel shall put their hands upon the Levites: '
  '11':
  - type: text
    content: 'and Aaron shall offer the Levites before the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: for
  - type: text
    content: ' an offering of the children of Israel, that they may execute the service of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'And the Levites shall lay their hands upon the heads of the bullocks: and thou shalt offer the one '
  - type: text
    content: for
  - type: text
    content: ' a sin offering, and the other '
  - type: text
    content: for
  - type: text
    content: ' a burnt offering, unto the '
  - type: text
    content: LORD
  - type: text
    content: ', to make an atonement for the Levites. '
  '13':
  - type: text
    content: 'And thou shalt set the Levites before Aaron, and before his sons, and offer them '
  - type: text
    content: for
  - type: text
    content: ' an offering unto the '
  - type: text
    content: LORD
  - type: text
    content: .
  - type: heading
    content: Their Service
  '14':
  - type: text
    content: 'Thus shalt thou separate the Levites from among the children of Israel: and the Levites shall be mine. '
  '15':
  - type: text
    content: 'And after that shall the Levites go in to do the service of the tabernacle of the congregation: and thou shalt cleanse them, and offer them '
  - type: text
    content: for
  - type: text
    content: ' an offering. '
  '16':
  - type: text
    content: 'For they '
  - type: text
    content: are
  - type: text
    content: ' wholly given unto me from among the children of Israel; instead of such as open every womb, '
  - type: text
    content: even instead of
  - type: text
    content: ' the firstborn of all the children of Israel, have I taken them unto me. '
  '17':
  - type: text
    content: 'For all the firstborn of the children of Israel '
  - type: text
    content: are
  - type: text
    content: ' mine, '
  - type: text
    content: both
  - type: text
    content: ' man and beast: on the day that I smote every firstborn in the land of Egypt I sanctified them for myself. '
  '18':
  - type: text
    content: 'And I have taken the Levites for all the firstborn of the children of Israel. '
  '19':
  - type: text
    content: 'And I have given the Levites '
  - type: text
    content: as
  - type: text
    content: ' a gift to Aaron and to his sons from among the children of Israel, to do the service of the children of Israel in the tabernacle of the congregation, and to make an atonement for the children of Israel: that there be no plague among the children of Israel, when the children of Israel come nigh unto the sanctuary.'
  - type: heading
    content: Their Consecration
  '2':
  - type: text
    content: 'Speak unto Aaron, and say unto him, When thou lightest the lamps, the seven lamps shall give light over against the candlestick. '
  '20':
  - type: text
    content: 'And Moses, and Aaron, and all the congregation of the children of Israel, did to the Levites according unto all that the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses concerning the Levites, so did the children of Israel unto them. '
  '21':
  - type: text
    content: 'And the Levites were purified, and they washed their clothes; and Aaron offered them '
  - type: text
    content: as
  - type: text
    content: ' an offering before the '
  - type: text
    content: LORD
  - type: text
    content: '; and Aaron made an atonement for them to cleanse them. '
  '22':
  - type: text
    content: 'And after that went the Levites in to do their service in the tabernacle of the congregation before Aaron, and before his sons: as the '
  - type: text
    content: LORD
  - type: text
    content: ' had commanded Moses concerning the Levites, so did they unto them.'
  - type: heading
    content: Period of Service
  '23':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '24':
  - type: text
    content: 'This '
  - type: text
    content: is it
  - type: text
    content: ' that '
  - type: text
    content: belongeth
  - type: text
    content: ' unto the Levites: from twenty and five years old and upward they shall go in to wait upon the service of the tabernacle of the congregation: '
  '25':
  - type: text
    content: 'and from the age of fifty years they shall cease waiting upon the service '
  - type: text
    content: thereof
  - type: text
    content: ', and shall serve no more: '
  '26':
  - type: text
    content: but shall minister with their brethren in the tabernacle of the congregation, to keep the charge, and shall do no service. Thus shalt thou do unto the Levites touching their charge.
  '3':
  - type: text
    content: 'And Aaron did so; he lighted the lamps thereof over against the candlestick, as the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses. '
  '4':
  - type: text
    content: 'And this work of the candlestick '
  - type: text
    content: was of
  - type: text
    content: ' beaten gold, unto the shaft thereof, unto the flowers thereof, '
  - type: text
    content: was
  - type: text
    content: ' beaten work: according unto the pattern which the '
  - type: text
    content: LORD
  - type: text
    content: ' had shewed Moses, so he made the candlestick.'
  - type: heading
    content: The Levites
  '5':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '6':
  - type: text
    content: 'Take the Levites from among the children of Israel, and cleanse them. '
  '7':
  - type: text
    content: 'And thus shalt thou do unto them, to cleanse them: Sprinkle water of purifying upon them, and let them shave all their flesh, and let them wash their clothes, and '
  - type: text
    content: so
  - type: text
    content: ' make themselves clean. '
  '8':
  - type: text
    content: 'Then let them take a young bullock with his meat offering, '
  - type: text
    content: even
  - type: text
    content: ' fine flour mingled with oil, and another young bullock shalt thou take for a sin offering. '
  '9':
  - type: text
    content: 'And thou shalt bring the Levites before the tabernacle of the congregation: and thou shalt gather the whole assembly of the children of Israel together: '
