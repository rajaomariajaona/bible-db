document_id: NUM.8,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Service of Priests and Levites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'and thou shalt bring the Levites before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': and the children of Israel shall put their hands upon the Levites: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'and Aaron shall offer the Levites before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' an offering of the children of Israel, that they may execute the service of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And the Levites shall lay their hands upon the heads of the bullocks: and thou shalt offer the one '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a sin offering, and the other '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a burnt offering, unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', to make an atonement for the Levites. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And thou shalt set the Levites before Aaron, and before his sons, and offer them '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' an offering unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Their Service
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Thus shalt thou separate the Levites from among the children of Israel: and the Levites shall be mine. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And after that shall the Levites go in to do the service of the tabernacle of the congregation: and thou shalt cleanse them, and offer them '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' an offering. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'For they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' wholly given unto me from among the children of Israel; instead of such as open every womb, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even instead of
    - type: text
      text: ' the firstborn of all the children of Israel, have I taken them unto me. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For all the firstborn of the children of Israel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' mine, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: both
    - type: text
      text: ' man and beast: on the day that I smote every firstborn in the land of Egypt I sanctified them for myself. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And I have taken the Levites for all the firstborn of the children of Israel. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And I have given the Levites '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' a gift to Aaron and to his sons from among the children of Israel, to do the service of the children of Israel in the tabernacle of the congregation, and to make an atonement for the children of Israel: that there be no plague among the children of Israel, when the children of Israel come nigh unto the sanctuary.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Their Consecration
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Speak unto Aaron, and say unto him, When thou lightest the lamps, the seven lamps shall give light over against the candlestick. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And Moses, and Aaron, and all the congregation of the children of Israel, did to the Levites according unto all that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commanded Moses concerning the Levites, so did the children of Israel unto them. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And the Levites were purified, and they washed their clothes; and Aaron offered them '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' an offering before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; and Aaron made an atonement for them to cleanse them. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And after that went the Levites in to do their service in the tabernacle of the congregation before Aaron, and before his sons: as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had commanded Moses concerning the Levites, so did they unto them.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Period of Service
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is it
    - type: text
      text: ' that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: belongeth
    - type: text
      text: ' unto the Levites: from twenty and five years old and upward they shall go in to wait upon the service of the tabernacle of the congregation: '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'and from the age of fifty years they shall cease waiting upon the service '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thereof
    - type: text
      text: ', and shall serve no more: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: but shall minister with their brethren in the tabernacle of the congregation, to keep the charge, and shall do no service. Thus shalt thou do unto the Levites touching their charge.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And Aaron did so; he lighted the lamps thereof over against the candlestick, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commanded Moses. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And this work of the candlestick '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was of
    - type: text
      text: ' beaten gold, unto the shaft thereof, unto the flowers thereof, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' beaten work: according unto the pattern which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had shewed Moses, so he made the candlestick.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Levites
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Take the Levites from among the children of Israel, and cleanse them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And thus shalt thou do unto them, to cleanse them: Sprinkle water of purifying upon them, and let them shave all their flesh, and let them wash their clothes, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' make themselves clean. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then let them take a young bullock with his meat offering, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' fine flour mingled with oil, and another young bullock shalt thou take for a sin offering. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And thou shalt bring the Levites before the tabernacle of the congregation: and thou shalt gather the whole assembly of the children of Israel together: '
