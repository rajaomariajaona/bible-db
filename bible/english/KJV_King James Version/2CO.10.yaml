document_id: 2CO.10
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Paul Answers His Opponents
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now I Paul myself beseech you by the meekness and gentleness of Christ, who in presence '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' base among you, but being absent am bold toward you: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'but I beseech '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: ', that I may not be bold when I am present with that confidence, wherewith I think to be bold against some, which think of us as if we walked according to the flesh. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For though we walk in the flesh, we do not war after the flesh: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '(for the weapons of our warfare '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' not carnal, but mighty through God to the pulling down of strong holds;) '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'casting down imaginations, and every high thing that exalteth itself against the knowledge of God, and bringing into captivity every thought to the obedience of Christ; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and having in a readiness to revenge all disobedience, when your obedience is fulfilled. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Do ye look on things after the outward appearance? If any man trust to himself that he is Christ''s, let him of himself think this again, that, as he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Christ''s, even so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' we Christ''s. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For though I should boast somewhat more of our authority, which the Lord hath given us for edification, and not for your destruction, I should not be ashamed: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'that I may not seem as if I would terrify you by letters. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' letters, say they, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' weighty and powerful; but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' bodily presence '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' weak, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' speech contemptible. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Let such an one think this, that, such as we are in word by letters when we are absent, such '
  - type: usfm
    marker: add
    children:
    - type: text
      text: will we be
  - type: text
    text: ' also in deed when we are present. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For we dare not make ourselves of the number, or compare ourselves with some that commend themselves: but they measuring themselves by themselves, and comparing themselves among themselves, are not wise. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But we will not boast of things without '
  - type: usfm
    marker: add
    children:
    - type: text
      text: our
  - type: text
    text: ' measure, but according to the measure of the rule which God hath distributed to us, a measure to reach even unto you. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For we stretch not ourselves beyond '
  - type: usfm
    marker: add
    children:
    - type: text
      text: our measure
  - type: text
    text: ', as though we reached not unto you: for we are come as far as to you also in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: preaching
  - type: text
    text: ' the gospel of Christ: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'not boasting of things without '
  - type: usfm
    marker: add
    children:
    - type: text
      text: our
  - type: text
    text: ' measure, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ', of other men''s labours; but having hope, when your faith is increased, that we shall be enlarged by you according to our rule abundantly, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'to preach the gospel in the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: regions
  - type: text
    text: ' beyond you, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' not to boast in another man''s line of things made ready to our hand. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But he that glorieth, let him glory in the Lord. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: For not he that commendeth himself is approved, but whom the Lord commendeth.
