  - type: text
    content: 'For '
  - type: text
    content: his
  - type: text
    content: ' letters, say they, '
  - type: text
    content: are
  - type: text
    content: ' weighty and powerful; but '
  - type: text
    content: his
  - type: text
    content: ' bodily presence '
  - type: text
    content: is
  - type: text
    content: ' weak, and '
  - type: text
    content: his
  - type: text
    content: ' speech contemptible. '
  '11':
  - type: text
    content: 'Let such an one think this, that, such as we are in word by letters when we are absent, such '
  - type: text
    content: will we be
  - type: text
    content: ' also in deed when we are present. '
  '12':
  - type: text
    content: 'For we dare not make ourselves of the number, or compare ourselves with some that commend themselves: but they measuring themselves by themselves, and comparing themselves among themselves, are not wise. '
  '13':
  - type: text
    content: 'But we will not boast of things without '
  - type: text
    content: our
  - type: text
    content: ' measure, but according to the measure of the rule which God hath distributed to us, a measure to reach even unto you. '
  '14':
  - type: text
    content: 'For we stretch not ourselves beyond '
  - type: text
    content: our measure
  - type: text
    content: ', as though we reached not unto you: for we are come as far as to you also in '
  - type: text
    content: preaching
  - type: text
    content: ' the gospel of Christ: '
  '15':
  - type: text
    content: 'not boasting of things without '
  - type: text
    content: our
  - type: text
    content: ' measure, '
  - type: text
    content: that is
  - type: text
    content: ', of other men''s labours; but having hope, when your faith is increased, that we shall be enlarged by you according to our rule abundantly, '
  '16':
  - type: text
    content: 'to preach the gospel in the '
  - type: text
    content: regions
  - type: text
    content: ' beyond you, '
  - type: text
    content: and
  - type: text
    content: ' not to boast in another man''s line of things made ready to our hand. '
  '17':
  - type: text
    content: 'But he that glorieth, let him glory in the Lord. '
  '18':
  - type: text
    content: For not he that commendeth himself is approved, but whom the Lord commendeth.
  '2':
  - type: text
    content: 'but I beseech '
  - type: text
    content: you
  - type: text
    content: ', that I may not be bold when I am present with that confidence, wherewith I think to be bold against some, which think of us as if we walked according to the flesh. '
  '3':
  - type: text
    content: 'For though we walk in the flesh, we do not war after the flesh: '
  '4':
  - type: text
    content: '(for the weapons of our warfare '
  - type: text
    content: are
  - type: text
    content: ' not carnal, but mighty through God to the pulling down of strong holds;) '
  '5':
  - type: text
    content: 'casting down imaginations, and every high thing that exalteth itself against the knowledge of God, and bringing into captivity every thought to the obedience of Christ; '
  '6':
  - type: text
    content: 'and having in a readiness to revenge all disobedience, when your obedience is fulfilled. '
  '7':
  - type: text
    content: 'Do ye look on things after the outward appearance? If any man trust to himself that he is Christ''s, let him of himself think this again, that, as he '
  - type: text
    content: is
  - type: text
    content: ' Christ''s, even so '
  - type: text
    content: are
  - type: text
    content: ' we Christ''s. '
  '8':
  - type: text
    content: 'For though I should boast somewhat more of our authority, which the Lord hath given us for edification, and not for your destruction, I should not be ashamed: '
  '9':
  - type: text
    content: 'that I may not seem as if I would terrify you by letters. '
