verses:
  '1':
  - type: heading
    content: Eliphaz Speaks
  - type: text
    content: Then Eliphaz the Temanite answered and said,
  '10':
  - type: text
    content: The roaring of the lion, and the voice of the fierce lion,
  - type: text
    content: And the teeth of the young lions, are broken.
  '11':
  - type: text
    content: The old lion perisheth for lack of prey,
  - type: text
    content: And the stout lion's whelps are scattered abroad.
  '12':
  - type: text
    content: Now a thing was secretly brought to me,
  - type: text
    content: And mine ear received a little thereof.
  '13':
  - type: text
    content: In thoughts from the visions of the night,
  - type: text
    content: When deep sleep falleth on men,
  '14':
  - type: text
    content: Fear came upon me, and trembling,
  - type: text
    content: Which made all my bones to shake.
  '15':
  - type: text
    content: Then a spirit passed before my face;
  - type: text
    content: 'The hair of my flesh stood up:'
  '16':
  - type: text
    content: It stood still,
  - type: text
    content: 'But I could not discern the form thereof:'
  - type: text
    content: 'An image '
  - type: text
    content: was
  - type: text
    content: ' before mine eyes,'
  - type: text
    content: There was
  - type: text
    content: ' silence, and I heard a voice, '
  - type: text
    content: saying
  - type: text
    content: ','
  '17':
  - type: text
    content: Shall mortal man be more just than God?
  - type: text
    content: Shall a man be more pure than his maker?
  '18':
  - type: text
    content: Behold, he put no trust in his servants;
  - type: text
    content: 'And his angels he charged with folly:'
  '19':
  - type: text
    content: 'How much less '
  - type: text
    content: in
  - type: text
    content: ' them that dwell in houses of clay,'
  - type: text
    content: 'Whose foundation '
  - type: text
    content: is
  - type: text
    content: ' in the dust,'
  - type: text
    content: Which
  - type: text
    content: ' are crushed before the moth?'
  '2':
  - type: text
    content: ' '
  - type: text
    content: If
  - type: text
    content: ' we assay to commune with thee, wilt thou be grieved?'
  - type: text
    content: But who can withhold himself from speaking?
  '20':
  - type: text
    content: 'They are destroyed from morning to evening:'
  - type: text
    content: 'They perish for ever without any regarding '
  - type: text
    content: it
  - type: text
    content: .
  '21':
  - type: text
    content: 'Doth not their excellency '
  - type: text
    content: which is
  - type: text
    content: ' in them go away?'
  - type: text
    content: They die, even without wisdom.
  '3':
  - type: text
    content: Behold, thou hast instructed many,
  - type: text
    content: And thou hast strengthened the weak hands.
  '4':
  - type: text
    content: Thy words have upholden him that was falling,
  - type: text
    content: And thou hast strengthened the feeble knees.
  '5':
  - type: text
    content: But now it is come upon thee, and thou faintest;
  - type: text
    content: It toucheth thee, and thou art troubled.
  '6':
  - type: text
    content: ' '
  - type: text
    content: Is
  - type: text
    content: ' not '
  - type: text
    content: this
  - type: text
    content: ' thy fear, thy confidence,'
  - type: text
    content: Thy hope, and the uprightness of thy ways?
  '7':
  - type: text
    content: 'Remember, I pray thee, who '
  - type: text
    content: ever
  - type: text
    content: ' perished, being innocent?'
  - type: text
    content: Or where were the righteous cut off?
  '8':
  - type: text
    content: Even as I have seen, they that plow iniquity,
  - type: text
    content: And sow wickedness, reap the same.
  '9':
  - type: text
    content: By the blast of God they perish,
  - type: text
    content: And by the breath of his nostrils are they consumed.
