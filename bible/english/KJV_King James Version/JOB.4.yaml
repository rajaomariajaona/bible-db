document_id: JOB.4
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Eliphaz Speaks
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then Eliphaz the Temanite answered and said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: If
  - type: text
    text: ' we assay to commune with thee, wilt thou be grieved?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But who can withhold himself from speaking?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Behold, thou hast instructed many,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thou hast strengthened the weak hands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Thy words have upholden him that was falling,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thou hast strengthened the feeble knees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But now it is come upon thee, and thou faintest;
- type: usfm
  marker: q2
  children:
  - type: text
    text: It toucheth thee, and thou art troubled.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' thy fear, thy confidence,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thy hope, and the uprightness of thy ways?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Remember, I pray thee, who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: ever
  - type: text
    text: ' perished, being innocent?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or where were the righteous cut off?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Even as I have seen, they that plow iniquity,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And sow wickedness, reap the same.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: By the blast of God they perish,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And by the breath of his nostrils are they consumed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The roaring of the lion, and the voice of the fierce lion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the teeth of the young lions, are broken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The old lion perisheth for lack of prey,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the stout lion's whelps are scattered abroad.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Now a thing was secretly brought to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And mine ear received a little thereof.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: In thoughts from the visions of the night,
- type: usfm
  marker: q2
  children:
  - type: text
    text: When deep sleep falleth on men,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fear came upon me, and trembling,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Which made all my bones to shake.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then a spirit passed before my face;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The hair of my flesh stood up:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: It stood still,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But I could not discern the form thereof:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'An image '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' before mine eyes,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: There was
  - type: text
    text: ' silence, and I heard a voice, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saying
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Shall mortal man be more just than God?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Shall a man be more pure than his maker?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Behold, he put no trust in his servants;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And his angels he charged with folly:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'How much less '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' them that dwell in houses of clay,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Whose foundation '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the dust,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Which
  - type: text
    text: ' are crushed before the moth?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'They are destroyed from morning to evening:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They perish for ever without any regarding '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Doth not their excellency '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which is
  - type: text
    text: ' in them go away?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They die, even without wisdom.
