verses:
  '1':
  - type: heading
    content: A Father's Instruction
  - type: text
    content: Hear, ye children, the instruction of a father,
  - type: text
    content: And attend to know understanding.
  '10':
  - type: text
    content: Hear, O my son, and receive my sayings;
  - type: text
    content: And the years of thy life shall be many.
  '11':
  - type: text
    content: I have taught thee in the way of wisdom;
  - type: text
    content: I have led thee in right paths.
  '12':
  - type: text
    content: When thou goest, thy steps shall not be straitened;
  - type: text
    content: And when thou runnest, thou shalt not stumble.
  '13':
  - type: text
    content: 'Take fast hold of instruction; let '
  - type: text
    content: her
  - type: text
    content: ' not go:'
  - type: text
    content: 'Keep her; for she '
  - type: text
    content: is
  - type: text
    content: ' thy life.'
  '14':
  - type: text
    content: Enter not into the path of the wicked,
  - type: text
    content: 'And go not in the way of evil '
  - type: text
    content: men
  - type: text
    content: .
  '15':
  - type: text
    content: Avoid it, pass not by it,
  - type: text
    content: Turn from it, and pass away.
  '16':
  - type: text
    content: For they sleep not, except they have done mischief;
  - type: text
    content: 'And their sleep is taken away, unless they cause '
  - type: text
    content: some
  - type: text
    content: ' to fall.'
  '17':
  - type: text
    content: For they eat the bread of wickedness,
  - type: text
    content: And drink the wine of violence.
  '18':
  - type: text
    content: 'But the path of the just '
  - type: text
    content: is
  - type: text
    content: ' as the shining light,'
  - type: text
    content: That shineth more and more unto the perfect day.
  '19':
  - type: text
    content: 'The way of the wicked '
  - type: text
    content: is
  - type: text
    content: ' as darkness:'
  - type: text
    content: They know not at what they stumble.
  '2':
  - type: text
    content: For I give you good doctrine,
  - type: text
    content: Forsake ye not my law.
  '20':
  - type: text
    content: My son, attend to my words;
  - type: text
    content: Incline thine ear unto my sayings.
  '21':
  - type: text
    content: Let them not depart from thine eyes;
  - type: text
    content: Keep them in the midst of thine heart.
  '22':
  - type: text
    content: 'For they '
  - type: text
    content: are
  - type: text
    content: ' life unto those that find them,'
  - type: text
    content: And health to all their flesh.
  '23':
  - type: text
    content: Keep thy heart with all diligence;
  - type: text
    content: 'For out of it '
  - type: text
    content: are
  - type: text
    content: ' the issues of life.'
  '24':
  - type: text
    content: Put away from thee a froward mouth,
  - type: text
    content: And perverse lips put far from thee.
  '25':
  - type: text
    content: Let thine eyes look right on,
  - type: text
    content: And let thine eyelids look straight before thee.
  '26':
  - type: text
    content: Ponder the path of thy feet,
  - type: text
    content: And let all thy ways be established.
  '27':
  - type: text
    content: 'Turn not to the right hand nor to the left:'
  - type: text
    content: Remove thy foot from evil.
  '3':
  - type: text
    content: For I was my father's son,
  - type: text
    content: 'Tender and only '
  - type: text
    content: beloved
  - type: text
    content: ' in the sight of my mother.'
  '4':
  - type: text
    content: He taught me also, and said unto me,
  - type: text
    content: 'Let thine heart retain my words:'
  - type: text
    content: Keep my commandments, and live.
  '5':
  - type: text
    content: 'Get wisdom, get understanding:'
  - type: text
    content: 'Forget '
  - type: text
    content: it
  - type: text
    content: ' not; neither decline from the words of my mouth.'
  '6':
  - type: text
    content: 'Forsake her not, and she shall preserve thee:'
  - type: text
    content: Love her, and she shall keep thee.
  '7':
  - type: text
    content: 'Wisdom '
  - type: text
    content: is
  - type: text
    content: ' the principal thing; '
  - type: text
    content: therefore
  - type: text
    content: ' get wisdom:'
  - type: text
    content: And with all thy getting get understanding.
  '8':
  - type: text
    content: 'Exalt her, and she shall promote thee:'
  - type: text
    content: She shall bring thee to honour, when thou dost embrace her.
  '9':
  - type: text
    content: 'She shall give to thine head an ornament of grace:'
  - type: text
    content: A crown of glory shall she deliver to thee.
