document_id: PRO.4
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: A Father's Instruction
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hear, ye children, the instruction of a father,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And attend to know understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For I give you good doctrine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Forsake ye not my law.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For I was my father's son,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Tender and only '
  - type: usfm
    marker: add
    children:
    - type: text
      text: beloved
  - type: text
    text: ' in the sight of my mother.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He taught me also, and said unto me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Let thine heart retain my words:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Keep my commandments, and live.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Get wisdom, get understanding:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Forget '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' not; neither decline from the words of my mouth.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Forsake her not, and she shall preserve thee:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Love her, and she shall keep thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Wisdom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the principal thing; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: therefore
  - type: text
    text: ' get wisdom:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And with all thy getting get understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Exalt her, and she shall promote thee:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: She shall bring thee to honour, when thou dost embrace her.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'She shall give to thine head an ornament of grace:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: A crown of glory shall she deliver to thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hear, O my son, and receive my sayings;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the years of thy life shall be many.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I have taught thee in the way of wisdom;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have led thee in right paths.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: When thou goest, thy steps shall not be straitened;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And when thou runnest, thou shalt not stumble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Take fast hold of instruction; let '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her
  - type: text
    text: ' not go:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Keep her; for she '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy life.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Enter not into the path of the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And go not in the way of evil '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Avoid it, pass not by it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Turn from it, and pass away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For they sleep not, except they have done mischief;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And their sleep is taken away, unless they cause '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' to fall.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For they eat the bread of wickedness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And drink the wine of violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But the path of the just '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' as the shining light,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: That shineth more and more unto the perfect day.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The way of the wicked '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' as darkness:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They know not at what they stumble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: My son, attend to my words;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Incline thine ear unto my sayings.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Let them not depart from thine eyes;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Keep them in the midst of thine heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'For they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' life unto those that find them,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And health to all their flesh.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Keep thy heart with all diligence;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For out of it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the issues of life.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Put away from thee a froward mouth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And perverse lips put far from thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Let thine eyes look right on,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And let thine eyelids look straight before thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ponder the path of thy feet,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And let all thy ways be established.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Turn not to the right hand nor to the left:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Remove thy foot from evil.
