document_id: PRO.4,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: A Father's Instruction
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear, ye children, the instruction of a father,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And attend to know understanding.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear, O my son, and receive my sayings;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the years of thy life shall be many.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have taught thee in the way of wisdom;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have led thee in right paths.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When thou goest, thy steps shall not be straitened;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And when thou runnest, thou shalt not stumble.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Take fast hold of instruction; let '
    - type: usfm
      marker: add
      children:
      - type: text
        text: her
    - type: text
      text: ' not go:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Keep her; for she '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy life.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enter not into the path of the wicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And go not in the way of evil '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avoid it, pass not by it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Turn from it, and pass away.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they sleep not, except they have done mischief;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And their sleep is taken away, unless they cause '
    - type: usfm
      marker: add
      children:
      - type: text
        text: some
    - type: text
      text: ' to fall.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they eat the bread of wickedness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And drink the wine of violence.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the path of the just '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' as the shining light,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That shineth more and more unto the perfect day.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The way of the wicked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' as darkness:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They know not at what they stumble.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I give you good doctrine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Forsake ye not my law.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My son, attend to my words;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Incline thine ear unto my sayings.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them not depart from thine eyes;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Keep them in the midst of thine heart.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' life unto those that find them,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And health to all their flesh.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Keep thy heart with all diligence;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For out of it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the issues of life.'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Put away from thee a froward mouth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And perverse lips put far from thee.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let thine eyes look right on,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let thine eyelids look straight before thee.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ponder the path of thy feet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let all thy ways be established.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Turn not to the right hand nor to the left:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Remove thy foot from evil.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I was my father's son,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Tender and only '
    - type: usfm
      marker: add
      children:
      - type: text
        text: beloved
    - type: text
      text: ' in the sight of my mother.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He taught me also, and said unto me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let thine heart retain my words:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Keep my commandments, and live.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Get wisdom, get understanding:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Forget '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' not; neither decline from the words of my mouth.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Forsake her not, and she shall preserve thee:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Love her, and she shall keep thee.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Wisdom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the principal thing; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: therefore
    - type: text
      text: ' get wisdom:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And with all thy getting get understanding.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Exalt her, and she shall promote thee:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She shall bring thee to honour, when thou dost embrace her.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'She shall give to thine head an ornament of grace:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A crown of glory shall she deliver to thee.
