document_id: 2SA.12,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' sent Nathan unto David. And he came unto him, and said unto him, There were two men in one city; the one rich, and the other poor. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Now therefore the sword shall never depart from thine house; because thou hast despised me, and hast taken the wife of Uriah the Hittite to be thy wife. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', Behold, I will raise up evil against thee out of thine own house, and I will take thy wives before thine eyes, and give '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' unto thy neighbour, and he shall lie with thy wives in the sight of this sun. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'For thou didst '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' secretly: but I will do this thing before all Israel, and before the sun. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And David said unto Nathan, I have sinned against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. And Nathan said unto David, The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' also hath put away thy sin; thou shalt not die. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Howbeit, because by this deed thou hast given great occasion to the enemies of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' to blaspheme, the child also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is
    - type: text
      text: ' born unto thee shall surely die. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: And Nathan departed unto his house.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' struck the child that Uriah''s wife bare unto David, and it was very sick. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'David therefore besought God for the child; and David fasted, and went in, and lay all night upon the earth. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And the elders of his house arose, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and went
    - type: text
      text: ' to him, to raise him up from the earth: but he would not, neither did he eat bread with them. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And it came to pass on the seventh day, that the child died. And the servants of David feared to tell him that the child was dead: for they said, Behold, while the child was yet alive, we spake unto him, and he would not hearken unto our voice: how will he then vex himself, if we tell him that the child is dead? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'But when David saw that his servants whispered, David perceived that the child was dead: therefore David said unto his servants, Is the child dead? And they said, He is dead. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The rich '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' had exceeding many flocks and herds: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then David arose from the earth, and washed, and anointed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: himself
    - type: text
      text: ', and changed his apparel, and came into the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and worshipped: then he came to his own house; and when he required, they set bread before him, and he did eat. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then said his servants unto him, What thing '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' this that thou hast done? thou didst fast and weep for the child, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: while it was
    - type: text
      text: ' alive; but when the child was dead, thou didst rise and eat bread. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And he said, While the child was yet alive, I fasted and wept: for I said, Who can tell '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whether
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ' will be gracious to me, that the child may live? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: But now he is dead, wherefore should I fast? can I bring him back again? I shall go to him, but he shall not return to me.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And David comforted Bath-sheba his wife, and went in unto her, and lay with her: and she bare a son, and he called his name Solomon: and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' loved him. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And he sent by the hand of Nathan the prophet; and he called his name Jedidiah, because of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And Joab fought against Rabbah of the children of Ammon, and took the royal city. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And Joab sent messengers to David, and said, I have fought against Rabbah, and have taken the city of waters. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Now therefore gather the rest of the people together, and encamp against the city, and take it: lest I take the city, and it be called after my name. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And David gathered all the people together, and went to Rabbah, and fought against it, and took it. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'but the poor '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' had nothing, save one little ewe lamb, which he had bought and nourished up: and it grew up together with him, and with his children; it did eat of his own meat, and drank of his own cup, and lay in his bosom, and was unto him as a daughter. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And he took their king''s crown from off his head, the weight whereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' a talent of gold with the precious stones: and it was '
    - type: usfm
      marker: add
      children:
      - type: text
        text: set
    - type: text
      text: ' on David''s head. And he brought forth the spoil of the city in great abundance. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And he brought forth the people that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' therein, and put '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' under saws, and under harrows of iron, and under axes of iron, and made them pass through the brickkiln: and thus did he unto all the cities of the children of Ammon. So David and all the people returned unto Jerusalem.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And there came a traveller unto the rich man, and he spared to take of his own flock and of his own herd, to dress for the wayfaring man that was come unto him; but took the poor man''s lamb, and dressed it for the man that was come to him. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And David''s anger was greatly kindled against the man; and he said to Nathan, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: As
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' liveth, the man that hath done this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thing
    - type: text
      text: ' shall surely die: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: and he shall restore the lamb fourfold, because he did this thing, and because he had no pity.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And Nathan said to David, Thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' the man. Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel, I anointed thee king over Israel, and I delivered thee out of the hand of Saul; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'and I gave thee thy master''s house, and thy master''s wives into thy bosom, and gave thee the house of Israel and of Judah; and if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that had been
    - type: text
      text: ' too little, I would moreover have given unto thee such and such things. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Wherefore hast thou despised the commandment of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', to do evil in his sight? thou hast killed Uriah the Hittite with the sword, and hast taken his wife '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' thy wife, and hast slain him with the sword of the children of Ammon. '
