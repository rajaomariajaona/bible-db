document_id: 1SA.26
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Spares Saul's Life
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the Ziphites came unto Saul to Gibeah, saying, Doth not David hide himself in the hill of Hachilah, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which is
  - type: text
    text: ' before Jeshimon? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then Saul arose, and went down to the wilderness of Ziph, having three thousand chosen men of Israel with him, to seek David in the wilderness of Ziph. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Saul pitched in the hill of Hachilah, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' before Jeshimon, by the way. But David abode in the wilderness, and he saw that Saul came after him into the wilderness. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'David therefore sent out spies, and understood that Saul was come in very deed. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And David arose, and came to the place where Saul had pitched: and David beheld the place where Saul lay, and Abner the son of Ner, the captain of his host: and Saul lay in the trench, and the people pitched round about him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then answered David and said to Ahimelech the Hittite, and to Abishai the son of Zeruiah, brother to Joab, saying, Who will go down with me to Saul to the camp? And Abishai said, I will go down with thee. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So David and Abishai came to the people by night: and, behold, Saul lay sleeping within the trench, and his spear stuck in the ground at his bolster: but Abner and the people lay round about him. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then said Abishai to David, God hath delivered thine enemy into thine hand this day: now therefore let me smite him, I pray thee, with the spear even to the earth at once, and I will not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: smite
  - type: text
    text: ' him the second time. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And David said to Abishai, Destroy him not: for who can stretch forth his hand against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s anointed, and be guiltless? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'David said furthermore, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' liveth, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall smite him; or his day shall come to die; or he shall descend into battle, and perish. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' forbid that I should stretch forth mine hand against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s anointed: but, I pray thee, take thou now the spear that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' at his bolster, and the cruse of water, and let us go. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So David took the spear and the cruse of water from Saul''s bolster; and they gat them away, and no man saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', nor knew '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', neither awaked: for they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' all asleep; because a deep sleep from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' was fallen upon them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then David went over to the other side, and stood on the top of an hill afar off; a great space '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' between them: '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and David cried to the people, and to Abner the son of Ner, saying, Answerest thou not, Abner? Then Abner answered and said, Who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' criest to the king? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And David said to Abner, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Art
  - type: text
    text: ' not thou a '
  - type: usfm
    marker: add
    children:
    - type: text
      text: valiant
  - type: text
    text: ' man? and who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' like to thee in Israel? wherefore then hast thou not kept thy lord the king? for there came one of the people in to destroy the king thy lord. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'This thing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not good that thou hast done. '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' liveth, ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' worthy to die, because ye have not kept your master, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s anointed. And now see where the king''s spear '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ', and the cruse of water that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' at his bolster.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And Saul knew David''s voice, and said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' this thy voice, my son David? And David said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' my voice, my lord, O king. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And he said, Wherefore doth my lord thus pursue after his servant? for what have I done? or what evil '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in mine hand? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now therefore, I pray thee, let my lord the king hear the words of his servant. If the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' have stirred thee up against me, let him accept an offering: but if '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they be
  - type: text
    text: ' the children of men, cursed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' they before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; for they have driven me out this day from abiding in the inheritance of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', saying, Go, serve other gods. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Now therefore, let not my blood fall to the earth before the face of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': for the king of Israel is come out to seek a flea, as when one doth hunt a partridge in the mountains.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then said Saul, I have sinned: return, my son David: for I will no more do thee harm, because my soul was precious in thine eyes this day: behold, I have played the fool, and have erred exceedingly. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And David answered and said, Behold the king''s spear! and let one of the young men come over and fetch it. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' render to every man his righteousness and his faithfulness: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' delivered thee into '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my
  - type: text
    text: ' hand to day, but I would not stretch forth mine hand against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s anointed. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And, behold, as thy life was much set by this day in mine eyes, so let my life be much set by in the eyes of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and let him deliver me out of all tribulation. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then Saul said to David, Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' thou, my son David: thou shalt both do great '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ', and also shalt still prevail. So David went on his way, and Saul returned to his place.'
