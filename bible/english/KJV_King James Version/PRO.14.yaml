document_id: PRO.14,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Every wise woman buildeth her house:'
  - type: text
    content: But the foolish plucketh it down with her hands.
  '10':
  - type: text
    content: The heart knoweth his own bitterness;
  - type: text
    content: And a stranger doth not intermeddle with his joy.
  '11':
  - type: text
    content: 'The house of the wicked shall be overthrown:'
  - type: text
    content: But the tabernacle of the upright shall flourish.
  '12':
  - type: text
    content: There is a way which seemeth right unto a man,
  - type: text
    content: 'But the end thereof '
  - type: text
    content: are
  - type: text
    content: ' the ways of death.'
  '13':
  - type: text
    content: Even in laughter the heart is sorrowful;
  - type: text
    content: 'And the end of that mirth '
  - type: text
    content: is
  - type: text
    content: ' heaviness.'
  '14':
  - type: text
    content: 'The backslider in heart shall be filled with his own ways:'
  - type: text
    content: 'And a good man '
  - type: text
    content: shall be satisfied
  - type: text
    content: ' from himself.'
  '15':
  - type: text
    content: 'The simple believeth every word:'
  - type: text
    content: 'But the prudent '
  - type: text
    content: man
  - type: text
    content: ' looketh well to his going.'
  '16':
  - type: text
    content: 'A wise '
  - type: text
    content: man
  - type: text
    content: ' feareth, and departeth from evil:'
  - type: text
    content: But the fool rageth, and is confident.
  '17':
  - type: text
    content: ' '
  - type: text
    content: He that is
  - type: text
    content: ' soon angry dealeth foolishly:'
  - type: text
    content: And a man of wicked devices is hated.
  '18':
  - type: text
    content: 'The simple inherit folly:'
  - type: text
    content: But the prudent are crowned with knowledge.
  '19':
  - type: text
    content: The evil bow before the good;
  - type: text
    content: And the wicked at the gates of the righteous.
  '2':
  - type: text
    content: 'He that walketh in his uprightness feareth the '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: 'But '
  - type: text
    content: he that is
  - type: text
    content: ' perverse in his ways despiseth him.'
  '20':
  - type: text
    content: 'The poor is hated even of his own neighbour:'
  - type: text
    content: 'But the rich '
  - type: text
    content: hath
  - type: text
    content: ' many friends.'
  '21':
  - type: text
    content: 'He that despiseth his neighbour sinneth:'
  - type: text
    content: 'But he that hath mercy on the poor, happy '
  - type: text
    content: is
  - type: text
    content: ' he.'
  '22':
  - type: text
    content: Do they not err that devise evil?
  - type: text
    content: 'But mercy and truth '
  - type: text
    content: shall be
  - type: text
    content: ' to them that devise good.'
  '23':
  - type: text
    content: 'In all labour there is profit:'
  - type: text
    content: 'But the talk of the lips '
  - type: text
    content: tendeth
  - type: text
    content: ' only to penury.'
  '24':
  - type: text
    content: 'The crown of the wise '
  - type: text
    content: is
  - type: text
    content: ' their riches:'
  - type: text
    content: But
  - type: text
    content: ' the foolishness of fools '
  - type: text
    content: is
  - type: text
    content: ' folly.'
  '25':
  - type: text
    content: 'A true witness delivereth souls:'
  - type: text
    content: 'But a deceitful '
  - type: text
    content: witness
  - type: text
    content: ' speaketh lies.'
  '26':
  - type: text
    content: 'In the fear of the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' strong confidence:'
  - type: text
    content: And his children shall have a place of refuge.
  '27':
  - type: text
    content: 'The fear of the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' a fountain of life,'
  - type: text
    content: To depart from the snares of death.
  '28':
  - type: text
    content: 'In the multitude of people '
  - type: text
    content: is
  - type: text
    content: ' the king''s honour:'
  - type: text
    content: 'But in the want of people '
  - type: text
    content: is
  - type: text
    content: ' the destruction of the prince.'
  '29':
  - type: text
    content: ' '
  - type: text
    content: He that is
  - type: text
    content: ' slow to wrath '
  - type: text
    content: is
  - type: text
    content: ' of great understanding:'
  - type: text
    content: 'But '
  - type: text
    content: he that is
  - type: text
    content: ' hasty of spirit exalteth folly.'
  '3':
  - type: text
    content: 'In the mouth of the foolish '
  - type: text
    content: is
  - type: text
    content: ' a rod of pride:'
  - type: text
    content: But the lips of the wise shall preserve them.
  '30':
  - type: text
    content: 'A sound heart '
  - type: text
    content: is
  - type: text
    content: ' the life of the flesh:'
  - type: text
    content: But envy the rottenness of the bones.
  '31':
  - type: text
    content: 'He that oppresseth the poor reproacheth his Maker:'
  - type: text
    content: But he that honoureth him hath mercy on the poor.
  '32':
  - type: text
    content: 'The wicked is driven away in his wickedness:'
  - type: text
    content: But the righteous hath hope in his death.
  '33':
  - type: text
    content: 'Wisdom resteth in the heart of him that hath understanding:'
  - type: text
    content: 'But '
  - type: text
    content: that which is
  - type: text
    content: ' in the midst of fools is made known.'
  '34':
  - type: text
    content: 'Righteousness exalteth a nation:'
  - type: text
    content: 'But sin '
  - type: text
    content: is
  - type: text
    content: ' a reproach to any people.'
  '35':
  - type: text
    content: 'The king''s favour '
  - type: text
    content: is
  - type: text
    content: ' toward a wise servant:'
  - type: text
    content: 'But his wrath is '
  - type: text
    content: against
  - type: text
    content: ' him that causeth shame.'
  '4':
  - type: text
    content: 'Where no oxen '
  - type: text
    content: are
  - type: text
    content: ', the crib '
  - type: text
    content: is
  - type: text
    content: ' clean:'
  - type: text
    content: 'But much increase '
  - type: text
    content: is
  - type: text
    content: ' by the strength of the ox.'
  '5':
  - type: text
    content: 'A faithful witness will not lie:'
  - type: text
    content: But a false witness will utter lies.
  '6':
  - type: text
    content: 'A scorner seeketh wisdom, and '
  - type: text
    content: findeth it
  - type: text
    content: ' not:'
  - type: text
    content: 'But knowledge '
  - type: text
    content: is
  - type: text
    content: ' easy unto him that understandeth.'
  '7':
  - type: text
    content: Go from the presence of a foolish man,
  - type: text
    content: 'When thou perceivest not '
  - type: text
    content: in him
  - type: text
    content: ' the lips of knowledge.'
  '8':
  - type: text
    content: 'The wisdom of the prudent '
  - type: text
    content: is
  - type: text
    content: ' to understand his way:'
  - type: text
    content: 'But the folly of fools '
  - type: text
    content: is
  - type: text
    content: ' deceit.'
  '9':
  - type: text
    content: 'Fools make a mock at sin:'
  - type: text
    content: 'But among the righteous '
  - type: text
    content: there is
  - type: text
    content: ' favour.'
