document_id: PRO.14,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Every wise woman buildeth her house:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the foolish plucketh it down with her hands.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The heart knoweth his own bitterness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a stranger doth not intermeddle with his joy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The house of the wicked shall be overthrown:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the tabernacle of the upright shall flourish.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is a way which seemeth right unto a man,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the end thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the ways of death.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even in laughter the heart is sorrowful;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the end of that mirth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' heaviness.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The backslider in heart shall be filled with his own ways:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And a good man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be satisfied
    - type: text
      text: ' from himself.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The simple believeth every word:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the prudent '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' looketh well to his going.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' feareth, and departeth from evil:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the fool rageth, and is confident.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: He that is
    - type: text
      text: ' soon angry dealeth foolishly:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a man of wicked devices is hated.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The simple inherit folly:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the prudent are crowned with knowledge.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The evil bow before the good;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the wicked at the gates of the righteous.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He that walketh in his uprightness feareth the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ':'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he that is
    - type: text
      text: ' perverse in his ways despiseth him.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The poor is hated even of his own neighbour:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the rich '
    - type: usfm
      marker: add
      children:
      - type: text
        text: hath
    - type: text
      text: ' many friends.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He that despiseth his neighbour sinneth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But he that hath mercy on the poor, happy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' he.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do they not err that devise evil?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But mercy and truth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' to them that devise good.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In all labour there is profit:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the talk of the lips '
    - type: usfm
      marker: add
      children:
      - type: text
        text: tendeth
    - type: text
      text: ' only to penury.'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The crown of the wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' their riches:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: But
    - type: text
      text: ' the foolishness of fools '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' folly.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A true witness delivereth souls:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But a deceitful '
    - type: usfm
      marker: add
      children:
      - type: text
        text: witness
    - type: text
      text: ' speaketh lies.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In the fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' strong confidence:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his children shall have a place of refuge.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a fountain of life,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To depart from the snares of death.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In the multitude of people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the king''s honour:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But in the want of people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the destruction of the prince.'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: He that is
    - type: text
      text: ' slow to wrath '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' of great understanding:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he that is
    - type: text
      text: ' hasty of spirit exalteth folly.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In the mouth of the foolish '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a rod of pride:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the lips of the wise shall preserve them.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A sound heart '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the life of the flesh:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But envy the rottenness of the bones.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He that oppresseth the poor reproacheth his Maker:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But he that honoureth him hath mercy on the poor.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The wicked is driven away in his wickedness:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the righteous hath hope in his death.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Wisdom resteth in the heart of him that hath understanding:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which is
    - type: text
      text: ' in the midst of fools is made known.'
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Righteousness exalteth a nation:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But sin '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a reproach to any people.'
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The king''s favour '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' toward a wise servant:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But his wrath is '
    - type: usfm
      marker: add
      children:
      - type: text
        text: against
    - type: text
      text: ' him that causeth shame.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Where no oxen '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ', the crib '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' clean:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But much increase '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' by the strength of the ox.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A faithful witness will not lie:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But a false witness will utter lies.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A scorner seeketh wisdom, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: findeth it
    - type: text
      text: ' not:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But knowledge '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' easy unto him that understandeth.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go from the presence of a foolish man,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When thou perceivest not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in him
    - type: text
      text: ' the lips of knowledge.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The wisdom of the prudent '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' to understand his way:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the folly of fools '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' deceit.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fools make a mock at sin:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But among the righteous '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' favour.'
