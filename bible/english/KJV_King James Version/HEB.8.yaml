document_id: HEB.8,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Greatness of His Ministry
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now of the things which we have spoken '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this is
    - type: text
      text: ' the sum: We have such an high priest, who is set on the right hand of the throne of the Majesty in the heavens; '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the covenant that I will make with the house of Israel'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: After those days, saith the Lord;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will put my laws into their mind,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And write them in their hearts:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will be to them a God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And they shall be to me a people:'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they shall not teach every man his neighbour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And every man his brother, saying, Know the Lord:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For all shall know me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the least to the greatest.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I will be merciful to their unrighteousness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their sins and their iniquities will I remember no more.
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'In that he saith, A new '
    - type: usfm
      marker: add
      children:
      - type: text
        text: covenant
    - type: text
      text: ', he hath made the first old. Now that which decayeth and waxeth old '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' ready to vanish away.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'a minister of the sanctuary, and of the true tabernacle, which the Lord pitched, and not man. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For every high priest is ordained to offer gifts and sacrifices: wherefore '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' of necessity that this man have somewhat also to offer. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if he were on earth, he should not be a priest, seeing that there are priests that offer gifts according to the law: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'who serve unto the example and shadow of heavenly things, as Moses was admonished of God when he was about to make the tabernacle: for, See, saith he, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' thou make all things according to the pattern shewed to thee in the mount. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But now hath he obtained a more excellent ministry, by how much also he is the mediator of a better covenant, which was established upon better promises. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if that first '
    - type: usfm
      marker: add
      children:
      - type: text
        text: covenant
    - type: text
      text: ' had been faultless, then should no place have been sought for the second. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For finding fault with them, he saith,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold, the days come, saith the Lord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When I will make a new covenant with the house of Israel and with the house of Judah:'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not according to the covenant that I made with their fathers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the day when I took them by the hand to lead them out of the land of Egypt;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because they continued not in my covenant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I regarded them not, saith the Lord.
