document_id: HEB.8,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Greatness of His Ministry
  - type: text
    content: 'Now of the things which we have spoken '
  - type: text
    content: this is
  - type: text
    content: ' the sum: We have such an high priest, who is set on the right hand of the throne of the Majesty in the heavens; '
  '10':
  - type: text
    content: 'For this '
  - type: text
    content: is
  - type: text
    content: ' the covenant that I will make with the house of Israel'
  - type: text
    content: After those days, saith the Lord;
  - type: text
    content: I will put my laws into their mind,
  - type: text
    content: 'And write them in their hearts:'
  - type: text
    content: And I will be to them a God,
  - type: text
    content: 'And they shall be to me a people:'
  '11':
  - type: text
    content: And they shall not teach every man his neighbour,
  - type: text
    content: 'And every man his brother, saying, Know the Lord:'
  - type: text
    content: For all shall know me,
  - type: text
    content: From the least to the greatest.
  '12':
  - type: text
    content: For I will be merciful to their unrighteousness,
  - type: text
    content: And their sins and their iniquities will I remember no more.
  '13':
  - type: text
    content: 'In that he saith, A new '
  - type: text
    content: covenant
  - type: text
    content: ', he hath made the first old. Now that which decayeth and waxeth old '
  - type: text
    content: is
  - type: text
    content: ' ready to vanish away.'
  '2':
  - type: text
    content: 'a minister of the sanctuary, and of the true tabernacle, which the Lord pitched, and not man. '
  '3':
  - type: text
    content: 'For every high priest is ordained to offer gifts and sacrifices: wherefore '
  - type: text
    content: it is
  - type: text
    content: ' of necessity that this man have somewhat also to offer. '
  '4':
  - type: text
    content: 'For if he were on earth, he should not be a priest, seeing that there are priests that offer gifts according to the law: '
  '5':
  - type: text
    content: 'who serve unto the example and shadow of heavenly things, as Moses was admonished of God when he was about to make the tabernacle: for, See, saith he, '
  - type: text
    content: that
  - type: text
    content: ' thou make all things according to the pattern shewed to thee in the mount. '
  '6':
  - type: text
    content: 'But now hath he obtained a more excellent ministry, by how much also he is the mediator of a better covenant, which was established upon better promises. '
  '7':
  - type: text
    content: 'For if that first '
  - type: text
    content: covenant
  - type: text
    content: ' had been faultless, then should no place have been sought for the second. '
  '8':
  - type: text
    content: For finding fault with them, he saith,
  - type: text
    content: Behold, the days come, saith the Lord,
  - type: text
    content: 'When I will make a new covenant with the house of Israel and with the house of Judah:'
  '9':
  - type: text
    content: Not according to the covenant that I made with their fathers
  - type: text
    content: In the day when I took them by the hand to lead them out of the land of Egypt;
  - type: text
    content: Because they continued not in my covenant,
  - type: text
    content: And I regarded them not, saith the Lord.
