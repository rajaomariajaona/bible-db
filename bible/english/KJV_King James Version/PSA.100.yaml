document_id: PSA.100,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Psalm of praise.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Make a joyful noise unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', all ye lands.'
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Serve the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' with gladness: Come before his presence with singing.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Know ye that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' God:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' hath made us, and not we ourselves; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: We are
    - type: text
      text: ' his people, and the sheep of his pasture.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Enter into his gates with thanksgiving, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' into his courts with praise:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Be thankful unto him, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' bless his name.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' good; his mercy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' everlasting;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And his truth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: endureth
    - type: text
      text: ' to all generations.'
