document_id: PSA.100,1
type_code: eng
verses:
  '1':
  - type: text
    content: A Psalm of praise.
  - type: text
    content: 'Make a joyful noise unto the '
  - type: text
    content: LORD
  - type: text
    content: ', all ye lands.'
  '2':
  - type: text
    content: 'Serve the '
  - type: text
    content: LORD
  - type: text
    content: ' with gladness: Come before his presence with singing.'
  '3':
  - type: text
    content: 'Know ye that the '
  - type: text
    content: LORD
  - type: text
    content: ' he '
  - type: text
    content: is
  - type: text
    content: ' God:'
  - type: text
    content: It is
  - type: text
    content: ' he '
  - type: text
    content: that
  - type: text
    content: ' hath made us, and not we ourselves; '
  - type: text
    content: We are
  - type: text
    content: ' his people, and the sheep of his pasture.'
  '4':
  - type: text
    content: 'Enter into his gates with thanksgiving, '
  - type: text
    content: And
  - type: text
    content: ' into his courts with praise:'
  - type: text
    content: 'Be thankful unto him, '
  - type: text
    content: and
  - type: text
    content: ' bless his name.'
  '5':
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' good; his mercy '
  - type: text
    content: is
  - type: text
    content: ' everlasting;'
  - type: text
    content: 'And his truth '
  - type: text
    content: endureth
  - type: text
    content: ' to all generations.'
