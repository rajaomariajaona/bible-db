document_id: COL.3
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: His Sovereign Will
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'If ye then be risen with Christ, seek those things which are above, where Christ sitteth on the right hand of God. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Set your affection on things above, not on things on the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For ye are dead, and your life is hid with Christ in God. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'When Christ, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: who is
  - type: text
    text: ' our life, shall appear, then shall ye also appear with him in glory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mortify therefore your members which are upon the earth; fornication, uncleanness, inordinate affection, evil concupiscence, and covetousness, which is idolatry: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'for which things'' sake the wrath of God cometh on the children of disobedience: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'in the which ye also walked some time, when ye lived in them. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But now ye also put off all these; anger, wrath, malice, blasphemy, filthy communication out of your mouth. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Lie not one to another, seeing that ye have put off the old man with his deeds; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and have put on the new '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ', which is renewed in knowledge after the image of him that created him: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'where there is neither Greek nor Jew, circumcision nor uncircumcision, Barbarian, Scythian, bond '
  - type: usfm
    marker: add
    children:
    - type: text
      text: nor
  - type: text
    text: ' free: but Christ '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' all, and in all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Put on therefore, as the elect of God, holy and beloved, bowels of mercies, kindness, humbleness of mind, meekness, longsuffering; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'forbearing one another, and forgiving one another, if any man have a quarrel against any: even as Christ forgave you, so also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: do
  - type: text
    text: ' ye. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And above all these things '
  - type: usfm
    marker: add
    children:
    - type: text
      text: put on
  - type: text
    text: ' charity, which is the bond of perfectness. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And let the peace of God rule in your hearts, to the which also ye are called in one body; and be ye thankful. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Let the word of Christ dwell in you richly in all wisdom; teaching and admonishing one another in psalms and hymns and spiritual songs, singing with grace in your hearts to the Lord. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And whatsoever ye do in word or deed, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: do
  - type: text
    text: ' all in the name of the Lord Jesus, giving thanks to God and the Father by him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Wives, submit yourselves unto your own husbands, as it is fit in the Lord. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Husbands, love '
  - type: usfm
    marker: add
    children:
    - type: text
      text: your
  - type: text
    text: ' wives, and be not bitter against them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Children, obey '
  - type: usfm
    marker: add
    children:
    - type: text
      text: your
  - type: text
    text: ' parents in all things: for this is well pleasing unto the Lord. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fathers, provoke not your children '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to anger
  - type: text
    text: ', lest they be discouraged.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Servants, obey in all things '
  - type: usfm
    marker: add
    children:
    - type: text
      text: your
  - type: text
    text: ' masters according to the flesh; not with eyeservice, as menpleasers; but in singleness of heart, fearing God: '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'and whatsoever ye do, do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' heartily, as to the Lord, and not unto men; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'knowing that of the Lord ye shall receive the reward of the inheritance: for ye serve the Lord Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But he that doeth wrong shall receive for the wrong which he hath done: and there is no respect of persons.'
