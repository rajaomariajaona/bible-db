document_id: MAT.21,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: In Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Triumphal Entry
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And when they drew nigh unto Jerusalem, and were come to Bethphage, unto the mount of Olives, then sent Jesus two disciples, '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And when he was come into Jerusalem, all the city was moved, saying, Who is this? '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: And the multitude said, This is Jesus the prophet of Nazareth of Galilee.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Cleansed the Temple
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And Jesus went into the temple of God, and cast out all them that sold and bought in the temple, and overthrew the tables of the moneychangers, and the seats of them that sold doves, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'and said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It is written, My house shall be called the house of prayer; but ye have made it a den of thieves.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And the blind and the lame came to him in the temple; and he healed them. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And when the chief priests and scribes saw the wonderful things that he did, and the children crying in the temple, and saying, Hosanna to the son of David; they were sore displeased, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'and said unto him, Hearest thou what these say? And Jesus saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Yea; have ye never read, Out of the mouth of babes and sucklings thou hast perfected praise?
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: And he left them, and went out of the city into Bethany; and he lodged there.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Barren Fig Tree
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Now in the morning as he returned into the city, he hungered. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And when he saw a fig tree in the way, he came to it, and found nothing thereon, but leaves only, and said unto it, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Let no fruit grow on thee henceforward for ever.
    - type: text
      text: ' And presently the fig tree withered away. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'saying unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Go into the village over against you, and straightway ye shall find an ass tied, and a colt with her: loose '
      - type: usfm
        marker: add
        children:
        - type: text
          text: them
      - type: text
        text: ', and bring '
      - type: usfm
        marker: add
        children:
        - type: text
          text: them
      - type: text
        text: ' unto me.'
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And when the disciples saw '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', they marvelled, saying, How soon is the fig tree withered away! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Jesus answered and said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Verily I say unto you, If ye have faith, and doubt not, ye shall not only do this '
      - type: usfm
        marker: add
        children:
        - type: text
          text: which is done
      - type: text
        text: ' to the fig tree, but also if ye shall say unto this mountain, Be thou removed, and be thou cast into the sea; it shall be done.'
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And all things, whatsoever ye shall ask in prayer, believing, ye shall receive.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And when he was come into the temple, the chief priests and the elders of the people came unto him as he was teaching, and said, By what authority doest thou these things? and who gave thee this authority? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And Jesus answered and said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I also will ask you one thing, which if ye tell me, I in like wise will tell you by what authority I do these things.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The baptism of John, whence was it? from heaven, or of men?
    - type: text
      text: ' And they reasoned with themselves, saying, If we shall say, From heaven; he will say unto us, Why did ye not then believe him? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'But if we shall say, Of men; we fear the people; for all hold John as a prophet. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And they answered Jesus, and said, We cannot tell. And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Neither tell I you by what authority I do these things.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But what think ye? A '
      - type: usfm
        marker: add
        children:
        - type: text
          text: certain
      - type: text
        text: ' man had two sons; and he came to the first, and said, Son, go work to day in my vineyard.'
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'He answered and said, I will not: but afterward he repented, and went.'
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And if any '
      - type: usfm
        marker: add
        children:
        - type: text
          text: man
      - type: text
        text: ' say ought unto you, ye shall say, The Lord hath need of them; and straightway he will send them.'
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And he came to the second, and said likewise. And he answered and said, I '
      - type: usfm
        marker: add
        children:
        - type: text
          text: go
      - type: text
        text: ', sir: and went not.'
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Whether of them twain did the will of '
      - type: usfm
        marker: add
        children:
        - type: text
          text: his
      - type: text
        text: ' father?'
    - type: text
      text: ' They say unto him, The first. Jesus saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Verily I say unto you, That the publicans and the harlots go into the kingdom of God before you.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For John came unto you in the way of righteousness, and ye believed him not: but the publicans and the harlots believed him: and ye, when ye had seen '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ', repented not afterward, that ye might believe him.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Wicked Husbandmen
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Hear another parable: There was a certain householder, which planted a vineyard, and hedged it round about, and digged a winepress in it, and built a tower, and let it out to husbandmen, and went into a far country:'
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and when the time of the fruit drew near, he sent his servants to the husbandmen, that they might receive the fruits of it.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And the husbandmen took his servants, and beat one, and killed another, and stoned another.
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Again, he sent other servants more than the first: and they did unto them likewise.'
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But last of all he sent unto them his son, saying, They will reverence my son.
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But when the husbandmen saw the son, they said among themselves, This is the heir; come, let us kill him, and let us seize on his inheritance.
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And they caught him, and cast '
      - type: usfm
        marker: add
        children:
        - type: text
          text: him
      - type: text
        text: ' out of the vineyard, and slew '
      - type: usfm
        marker: add
        children:
        - type: text
          text: him
      - type: text
        text: .
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: All this was done, that it might be fulfilled which was spoken by the prophet, saying,
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: When the lord therefore of the vineyard cometh, what will he do unto those husbandmen?
    - type: text
      text: ' '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'They say unto him, He will miserably destroy those wicked men, and will let out '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' vineyard unto other husbandmen, which shall render him the fruits in their seasons. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Jesus saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Did ye never read in the scriptures,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The stone which the builders rejected,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'The same is become the head of the corner:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: This is the Lord's doing,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And it is marvellous in our eyes?
  '43':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Therefore say I unto you, The kingdom of God shall be taken from you, and given to a nation bringing forth the fruits thereof.
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And whosoever shall fall on this stone shall be broken: but on whomsoever it shall fall, it will grind him to powder.'
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'And when the chief priests and Pharisees had heard his parables, they perceived that he spake of them. '
  '46':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: But when they sought to lay hands on him, they feared the multitude, because they took him for a prophet.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tell ye the daughter of Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold, thy King cometh unto thee,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Meek, and sitting upon an ass,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a colt the foal of an ass.
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And the disciples went, and did as Jesus commanded them, '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'and brought the ass, and the colt, and put on them their clothes, and they set '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' thereon. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And a very great multitude spread their garments in the way; others cut down branches from the trees, and strawed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' in the way. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And the multitudes that went before, and that followed, cried, saying, Hosanna to the son of David: Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' he that cometh in the name of the Lord; Hosanna in the highest. '
