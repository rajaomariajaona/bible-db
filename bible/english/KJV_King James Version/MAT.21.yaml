document_id: MAT.21,1
type_code: eng
verses:
  '1':
  - type: heading
    content: In Jerusalem
  - type: heading
    content: Triumphal Entry
  - type: text
    content: 'And when they drew nigh unto Jerusalem, and were come to Bethphage, unto the mount of Olives, then sent Jesus two disciples, '
  '10':
  - type: text
    content: 'And when he was come into Jerusalem, all the city was moved, saying, Who is this? '
  '11':
  - type: text
    content: And the multitude said, This is Jesus the prophet of Nazareth of Galilee.
  - type: heading
    content: Cleansed the Temple
  '12':
  - type: text
    content: 'And Jesus went into the temple of God, and cast out all them that sold and bought in the temple, and overthrew the tables of the moneychangers, and the seats of them that sold doves, '
  '13':
  - type: text
    content: 'and said unto them, '
  - type: text
    content: It is written, My house shall be called the house of prayer; but ye have made it a den of thieves.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'And the blind and the lame came to him in the temple; and he healed them. '
  '15':
  - type: text
    content: 'And when the chief priests and scribes saw the wonderful things that he did, and the children crying in the temple, and saying, Hosanna to the son of David; they were sore displeased, '
  '16':
  - type: text
    content: 'and said unto him, Hearest thou what these say? And Jesus saith unto them, '
  - type: text
    content: Yea; have ye never read, Out of the mouth of babes and sucklings thou hast perfected praise?
  - type: text
    content: ' '
  '17':
  - type: text
    content: And he left them, and went out of the city into Bethany; and he lodged there.
  - type: heading
    content: The Barren Fig Tree
  '18':
  - type: text
    content: 'Now in the morning as he returned into the city, he hungered. '
  '19':
  - type: text
    content: 'And when he saw a fig tree in the way, he came to it, and found nothing thereon, but leaves only, and said unto it, '
  - type: text
    content: Let no fruit grow on thee henceforward for ever.
  - type: text
    content: ' And presently the fig tree withered away. '
  '2':
  - type: text
    content: 'saying unto them, '
  - type: text
    content: 'Go into the village over against you, and straightway ye shall find an ass tied, and a colt with her: loose '
  - type: text
    content: them
  - type: text
    content: ', and bring '
  - type: text
    content: them
  - type: text
    content: ' unto me.'
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'And when the disciples saw '
  - type: text
    content: it
  - type: text
    content: ', they marvelled, saying, How soon is the fig tree withered away! '
  '21':
  - type: text
    content: 'Jesus answered and said unto them, '
  - type: text
    content: 'Verily I say unto you, If ye have faith, and doubt not, ye shall not only do this '
  - type: text
    content: which is done
  - type: text
    content: ' to the fig tree, but also if ye shall say unto this mountain, Be thou removed, and be thou cast into the sea; it shall be done.'
  - type: text
    content: ' '
  '22':
  - type: text
    content: And all things, whatsoever ye shall ask in prayer, believing, ye shall receive.
  '23':
  - type: text
    content: 'And when he was come into the temple, the chief priests and the elders of the people came unto him as he was teaching, and said, By what authority doest thou these things? and who gave thee this authority? '
  '24':
  - type: text
    content: 'And Jesus answered and said unto them, '
  - type: text
    content: I also will ask you one thing, which if ye tell me, I in like wise will tell you by what authority I do these things.
  - type: text
    content: ' '
  '25':
  - type: text
    content: The baptism of John, whence was it? from heaven, or of men?
  - type: text
    content: ' And they reasoned with themselves, saying, If we shall say, From heaven; he will say unto us, Why did ye not then believe him? '
  '26':
  - type: text
    content: 'But if we shall say, Of men; we fear the people; for all hold John as a prophet. '
  '27':
  - type: text
    content: 'And they answered Jesus, and said, We cannot tell. And he said unto them, '
  - type: text
    content: Neither tell I you by what authority I do these things.
  '28':
  - type: text
    content: ' '
  - type: text
    content: 'But what think ye? A '
  - type: text
    content: certain
  - type: text
    content: ' man had two sons; and he came to the first, and said, Son, go work to day in my vineyard.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'He answered and said, I will not: but afterward he repented, and went.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'And if any '
  - type: text
    content: man
  - type: text
    content: ' say ought unto you, ye shall say, The Lord hath need of them; and straightway he will send them.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'And he came to the second, and said likewise. And he answered and said, I '
  - type: text
    content: go
  - type: text
    content: ', sir: and went not.'
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Whether of them twain did the will of '
  - type: text
    content: his
  - type: text
    content: ' father?'
  - type: text
    content: ' They say unto him, The first. Jesus saith unto them, '
  - type: text
    content: Verily I say unto you, That the publicans and the harlots go into the kingdom of God before you.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'For John came unto you in the way of righteousness, and ye believed him not: but the publicans and the harlots believed him: and ye, when ye had seen '
  - type: text
    content: it
  - type: text
    content: ', repented not afterward, that ye might believe him.'
  - type: heading
    content: The Wicked Husbandmen
  '33':
  - type: text
    content: ' '
  - type: text
    content: 'Hear another parable: There was a certain householder, which planted a vineyard, and hedged it round about, and digged a winepress in it, and built a tower, and let it out to husbandmen, and went into a far country:'
  - type: text
    content: ' '
  '34':
  - type: text
    content: and when the time of the fruit drew near, he sent his servants to the husbandmen, that they might receive the fruits of it.
  - type: text
    content: ' '
  '35':
  - type: text
    content: And the husbandmen took his servants, and beat one, and killed another, and stoned another.
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'Again, he sent other servants more than the first: and they did unto them likewise.'
  - type: text
    content: ' '
  '37':
  - type: text
    content: But last of all he sent unto them his son, saying, They will reverence my son.
  - type: text
    content: ' '
  '38':
  - type: text
    content: But when the husbandmen saw the son, they said among themselves, This is the heir; come, let us kill him, and let us seize on his inheritance.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'And they caught him, and cast '
  - type: text
    content: him
  - type: text
    content: ' out of the vineyard, and slew '
  - type: text
    content: him
  - type: text
    content: .
  - type: text
    content: ' '
  '4':
  - type: text
    content: All this was done, that it might be fulfilled which was spoken by the prophet, saying,
  '40':
  - type: text
    content: When the lord therefore of the vineyard cometh, what will he do unto those husbandmen?
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'They say unto him, He will miserably destroy those wicked men, and will let out '
  - type: text
    content: his
  - type: text
    content: ' vineyard unto other husbandmen, which shall render him the fruits in their seasons. '
  '42':
  - type: text
    content: 'Jesus saith unto them, '
  - type: text
    content: Did ye never read in the scriptures,
  - type: text
    content: The stone which the builders rejected,
  - type: text
    content: 'The same is become the head of the corner:'
  - type: text
    content: This is the Lord's doing,
  - type: text
    content: And it is marvellous in our eyes?
  '43':
  - type: text
    content: ' '
  - type: text
    content: Therefore say I unto you, The kingdom of God shall be taken from you, and given to a nation bringing forth the fruits thereof.
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'And whosoever shall fall on this stone shall be broken: but on whomsoever it shall fall, it will grind him to powder.'
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'And when the chief priests and Pharisees had heard his parables, they perceived that he spake of them. '
  '46':
  - type: text
    content: But when they sought to lay hands on him, they feared the multitude, because they took him for a prophet.
  '5':
  - type: text
    content: Tell ye the daughter of Sion,
  - type: text
    content: Behold, thy King cometh unto thee,
  - type: text
    content: Meek, and sitting upon an ass,
  - type: text
    content: And a colt the foal of an ass.
  '6':
  - type: text
    content: 'And the disciples went, and did as Jesus commanded them, '
  '7':
  - type: text
    content: 'and brought the ass, and the colt, and put on them their clothes, and they set '
  - type: text
    content: him
  - type: text
    content: ' thereon. '
  '8':
  - type: text
    content: 'And a very great multitude spread their garments in the way; others cut down branches from the trees, and strawed '
  - type: text
    content: them
  - type: text
    content: ' in the way. '
  '9':
  - type: text
    content: 'And the multitudes that went before, and that followed, cried, saying, Hosanna to the son of David: Blessed '
  - type: text
    content: is
  - type: text
    content: ' he that cometh in the name of the Lord; Hosanna in the highest. '
