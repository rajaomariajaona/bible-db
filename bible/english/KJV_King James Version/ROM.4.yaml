document_id: ROM.4,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Grasped by Faith
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'What shall we say then that Abraham our father, as pertaining to the flesh, hath found? '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'How was it then reckoned? when he was in circumcision, or in uncircumcision? Not in circumcision, but in uncircumcision. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And he received the sign of circumcision, a seal of the righteousness of the faith which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he had yet
    - type: text
      text: ' being uncircumcised: that he might be the father of all them that believe, though they be not circumcised; that righteousness might be imputed unto them also: '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'and the father of circumcision to them who are not of the circumcision only, but who also walk in the steps of that faith of our father Abraham, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he had
    - type: text
      text: ' being '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yet
    - type: text
      text: ' uncircumcised.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'For the promise, that he should be the heir of the world, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' not to Abraham, or to his seed, through the law, but through the righteousness of faith. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For if they which are of the law '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' heirs, faith is made void, and the promise made of none effect: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'because the law worketh wrath: for where no law is, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no transgression. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Therefore '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' of faith, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it might be
    - type: text
      text: ' by grace; to the end the promise might be sure to all the seed; not to that only which is of the law, but to that also which is of the faith of Abraham; who is the father of us all, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '(as it is written, I have made thee a father of many nations,) before him whom he believed, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' God, who quickeneth the dead, and calleth those things which be not as though they were. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Who against hope believed in hope, that he might become the father of many nations, according to that which was spoken, So shall thy seed be. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And being not weak in faith, he considered not his own body now dead, when he was about an hundred years old, neither yet the deadness of Sarah''s womb: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For if Abraham were justified by works, he hath '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whereof
    - type: text
      text: ' to glory; but not before God. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'he staggered not at the promise of God through unbelief; but was strong in faith, giving glory to God; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'and being fully persuaded that, what he had promised, he was able also to perform. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And therefore it was imputed to him for righteousness. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Now it was not written for his sake alone, that it was imputed to him; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'but for us also, to whom it shall be imputed, if we believe on him that raised up Jesus our Lord from the dead; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: who was delivered for our offences, and was raised again for our justification.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For what saith the scripture? Abraham believed God, and it was counted unto him for righteousness. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Now to him that worketh is the reward not reckoned of grace, but of debt. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'But to him that worketh not, but believeth on him that justifieth the ungodly, his faith is counted for righteousness. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Even as David also describeth the blessedness of the man, unto whom God imputeth righteousness without works, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: add
      children:
      - type: text
        text: saying
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' they whose iniquities are forgiven,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And whose sins are covered.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the man to whom the Lord will not impute sin.'
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Cometh
    - type: text
      text: ' this blessedness then upon the circumcision '
    - type: usfm
      marker: add
      children:
      - type: text
        text: only
    - type: text
      text: ', or upon the uncircumcision also? for we say that faith was reckoned to Abraham for righteousness. '
