document_id: ROM.4,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Grasped by Faith
  - type: text
    content: 'What shall we say then that Abraham our father, as pertaining to the flesh, hath found? '
  '10':
  - type: text
    content: 'How was it then reckoned? when he was in circumcision, or in uncircumcision? Not in circumcision, but in uncircumcision. '
  '11':
  - type: text
    content: 'And he received the sign of circumcision, a seal of the righteousness of the faith which '
  - type: text
    content: he had yet
  - type: text
    content: ' being uncircumcised: that he might be the father of all them that believe, though they be not circumcised; that righteousness might be imputed unto them also: '
  '12':
  - type: text
    content: 'and the father of circumcision to them who are not of the circumcision only, but who also walk in the steps of that faith of our father Abraham, which '
  - type: text
    content: he had
  - type: text
    content: ' being '
  - type: text
    content: yet
  - type: text
    content: ' uncircumcised.'
  '13':
  - type: text
    content: 'For the promise, that he should be the heir of the world, '
  - type: text
    content: was
  - type: text
    content: ' not to Abraham, or to his seed, through the law, but through the righteousness of faith. '
  '14':
  - type: text
    content: 'For if they which are of the law '
  - type: text
    content: be
  - type: text
    content: ' heirs, faith is made void, and the promise made of none effect: '
  '15':
  - type: text
    content: 'because the law worketh wrath: for where no law is, '
  - type: text
    content: there is
  - type: text
    content: ' no transgression. '
  '16':
  - type: text
    content: 'Therefore '
  - type: text
    content: it is
  - type: text
    content: ' of faith, that '
  - type: text
    content: it might be
  - type: text
    content: ' by grace; to the end the promise might be sure to all the seed; not to that only which is of the law, but to that also which is of the faith of Abraham; who is the father of us all, '
  '17':
  - type: text
    content: '(as it is written, I have made thee a father of many nations,) before him whom he believed, '
  - type: text
    content: even
  - type: text
    content: ' God, who quickeneth the dead, and calleth those things which be not as though they were. '
  '18':
  - type: text
    content: 'Who against hope believed in hope, that he might become the father of many nations, according to that which was spoken, So shall thy seed be. '
  '19':
  - type: text
    content: 'And being not weak in faith, he considered not his own body now dead, when he was about an hundred years old, neither yet the deadness of Sarah''s womb: '
  '2':
  - type: text
    content: 'For if Abraham were justified by works, he hath '
  - type: text
    content: whereof
  - type: text
    content: ' to glory; but not before God. '
  '20':
  - type: text
    content: 'he staggered not at the promise of God through unbelief; but was strong in faith, giving glory to God; '
  '21':
  - type: text
    content: 'and being fully persuaded that, what he had promised, he was able also to perform. '
  '22':
  - type: text
    content: 'And therefore it was imputed to him for righteousness. '
  '23':
  - type: text
    content: 'Now it was not written for his sake alone, that it was imputed to him; '
  '24':
  - type: text
    content: 'but for us also, to whom it shall be imputed, if we believe on him that raised up Jesus our Lord from the dead; '
  '25':
  - type: text
    content: who was delivered for our offences, and was raised again for our justification.
  '3':
  - type: text
    content: 'For what saith the scripture? Abraham believed God, and it was counted unto him for righteousness. '
  '4':
  - type: text
    content: 'Now to him that worketh is the reward not reckoned of grace, but of debt. '
  '5':
  - type: text
    content: 'But to him that worketh not, but believeth on him that justifieth the ungodly, his faith is counted for righteousness. '
  '6':
  - type: text
    content: 'Even as David also describeth the blessedness of the man, unto whom God imputeth righteousness without works, '
  '7':
  - type: text
    content: saying
  - type: text
    content: ','
  - type: text
    content: 'Blessed '
  - type: text
    content: are
  - type: text
    content: ' they whose iniquities are forgiven,'
  - type: text
    content: And whose sins are covered.
  '8':
  - type: text
    content: 'Blessed '
  - type: text
    content: is
  - type: text
    content: ' the man to whom the Lord will not impute sin.'
  '9':
  - type: text
    content: ' '
  - type: text
    content: Cometh
  - type: text
    content: ' this blessedness then upon the circumcision '
  - type: text
    content: only
  - type: text
    content: ', or upon the uncircumcision also? for we say that faith was reckoned to Abraham for righteousness. '
