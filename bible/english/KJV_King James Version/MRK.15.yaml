verses:
  '1':
  - type: text
    content: 'And straightway in the morning the chief priests held a consultation with the elders and scribes and the whole council, and bound Jesus, and carried '
  - type: text
    content: him
  - type: text
    content: ' away, and delivered '
  - type: text
    content: him
  - type: text
    content: ' to Pilate. '
  '10':
  - type: text
    content: 'For he knew that the chief priests had delivered him for envy. '
  '11':
  - type: text
    content: 'But the chief priests moved the people, that he should rather release Barabbas unto them. '
  '12':
  - type: text
    content: 'And Pilate answered and said again unto them, What will ye then that I shall do '
  - type: text
    content: unto him
  - type: text
    content: ' whom ye call the King of the Jews? '
  '13':
  - type: text
    content: 'And they cried out again, Crucify him. '
  '14':
  - type: text
    content: Then Pilate said unto them, Why, what evil hath he done? And they cried out the more exceedingly, Crucify him.
  '15':
  - type: text
    content: 'And '
  - type: text
    content: so
  - type: text
    content: ' Pilate, willing to content the people, released Barabbas unto them, and delivered Jesus, when he had scourged '
  - type: text
    content: him
  - type: text
    content: ', to be crucified. '
  '16':
  - type: text
    content: 'And the soldiers led him away into the hall, called Prætorium; and they call together the whole band. '
  '17':
  - type: text
    content: 'And they clothed him with purple, and platted a crown of thorns, and put it about his '
  - type: text
    content: head
  - type: text
    content: ', '
  '18':
  - type: text
    content: 'and began to salute him, Hail, King of the Jews! '
  '19':
  - type: text
    content: 'And they smote him on the head with a reed, and did spit upon him, and bowing '
  - type: text
    content: their
  - type: text
    content: ' knees worshipped him. '
  '2':
  - type: text
    content: 'And Pilate asked him, Art thou the King of the Jews? And he answering said unto him, '
  - type: text
    content: 'Thou sayest '
  - type: text
    content: 'it '
  - type: text
    content: '. '
  '20':
  - type: text
    content: And when they had mocked him, they took off the purple from him, and put his own clothes on him, and led him out to crucify him.
  '21':
  - type: text
    content: And they compel one Simon a Cyrenian, who passed by, coming out of the country, the father of Alexander and Rufus, to bear his cross.
  '22':
  - type: text
    content: 'And they bring him unto the place Golgotha, which is, being interpreted, The place of a skull. '
  '23':
  - type: text
    content: 'And they gave him to drink wine mingled with myrrh: but he received '
  - type: text
    content: it
  - type: text
    content: ' not. '
  '24':
  - type: text
    content: 'And when they had crucified him, they parted his garments, casting lots upon them, what every man should take. '
  '25':
  - type: text
    content: 'And it was the third hour, and they crucified him. '
  '26':
  - type: text
    content: 'And the superscription of his accusation was written over, THE KING OF THE JEWS. '
  '27':
  - type: text
    content: 'And with him they crucify two thieves; the one on his right hand, and the other on his left. '
  '28':
  - type: text
    content: And the scripture was fulfilled, which saith, And he was numbered with the transgressors.
  '29':
  - type: text
    content: 'And they that passed by railed on him, wagging their heads, and saying, Ah, thou that destroyest the temple, and buildest '
  - type: text
    content: it
  - type: text
    content: ' in three days, '
  '3':
  - type: text
    content: 'And the chief priests accused him of many things: but he answered nothing. '
  '30':
  - type: text
    content: 'save thyself, and come down from the cross. '
  '31':
  - type: text
    content: 'Likewise also the chief priests mocking said among themselves with the scribes, He saved others; himself he cannot save. '
  '32':
  - type: text
    content: Let Christ the King of Israel descend now from the cross, that we may see and believe. And they that were crucified with him reviled him.
  '33':
  - type: text
    content: 'And when the sixth hour was come, there was darkness over the whole land until the ninth hour. '
  '34':
  - type: text
    content: 'And at the ninth hour Jesus cried with a loud voice, saying, '
  - type: text
    content: Eloi, Eloi, lama sabachthani?
  - type: text
    content: ' which is, being interpreted, My God, my God, why hast thou forsaken me? '
  '35':
  - type: text
    content: 'And some of them that stood by, when they heard '
  - type: text
    content: it
  - type: text
    content: ', said, Behold, he calleth Elias. '
  '36':
  - type: text
    content: 'And one ran and filled a spunge full of vinegar, and put '
  - type: text
    content: it
  - type: text
    content: ' on a reed, and gave him to drink, saying, Let alone; let us see whether Elias will come to take him down. '
  '37':
  - type: text
    content: 'And Jesus cried with a loud voice, and gave up the ghost. '
  '38':
  - type: text
    content: And the veil of the temple was rent in twain from the top to the bottom.
  '39':
  - type: text
    content: 'And when the centurion, which stood over against him, saw that he so cried out, and gave up the ghost, he said, Truly this man was the Son of God. '
  '4':
  - type: text
    content: 'And Pilate asked him again, saying, Answerest thou nothing? behold how many things they witness against thee. '
  '40':
  - type: text
    content: 'There were also women looking on afar off: among whom was Mary Magdalene, and Mary the mother of James the less and of Joses, and Salome; '
  '41':
  - type: text
    content: (who also, when he was in Galilee, followed him, and ministered unto him;) and many other women which came up with him unto Jerusalem.
  '42':
  - type: text
    content: 'And now when the even was come, because it was the preparation, that is, the day before the sabbath, '
  '43':
  - type: text
    content: 'Joseph of Arimathæa, an honourable counsellor, which also waited for the kingdom of God, came, and went in boldly unto Pilate, and craved the body of Jesus. '
  '44':
  - type: text
    content: 'And Pilate marvelled if he were already dead: and calling '
  - type: text
    content: unto him
  - type: text
    content: ' the centurion, he asked him whether he had been any while dead. '
  '45':
  - type: text
    content: 'And when he knew '
  - type: text
    content: it
  - type: text
    content: ' of the centurion, he gave the body to Joseph. '
  '46':
  - type: text
    content: 'And he bought fine linen, and took him down, and wrapped him in the linen, and laid him in a sepulchre which was hewn out of a rock, and rolled a stone unto the door of the sepulchre. '
  '47':
  - type: text
    content: 'And Mary Magdalene and Mary '
  - type: text
    content: the mother
  - type: text
    content: ' of Joses beheld where he was laid.'
  '5':
  - type: text
    content: But Jesus yet answered nothing; so that Pilate marvelled.
  '6':
  - type: text
    content: 'Now at '
  - type: text
    content: that
  - type: text
    content: ' feast he released unto them one prisoner, whomsoever they desired. '
  '7':
  - type: text
    content: 'And there was '
  - type: text
    content: one
  - type: text
    content: ' named Barabbas, '
  - type: text
    content: which lay
  - type: text
    content: ' bound with them that had made insurrection with him, who had committed murder in the insurrection. '
  '8':
  - type: text
    content: 'And the multitude crying aloud began to desire '
  - type: text
    content: him to do
  - type: text
    content: ' as he had ever done unto them. '
  '9':
  - type: text
    content: 'But Pilate answered them, saying, Will ye that I release unto you the King of the Jews? '
