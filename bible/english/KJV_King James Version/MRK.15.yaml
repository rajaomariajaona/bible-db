document_id: MRK.15,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And straightway in the morning the chief priests held a consultation with the elders and scribes and the whole council, and bound Jesus, and carried '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' away, and delivered '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' to Pilate. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For he knew that the chief priests had delivered him for envy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But the chief priests moved the people, that he should rather release Barabbas unto them. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And Pilate answered and said again unto them, What will ye then that I shall do '
    - type: usfm
      marker: add
      children:
      - type: text
        text: unto him
    - type: text
      text: ' whom ye call the King of the Jews? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And they cried out again, Crucify him. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Then Pilate said unto them, Why, what evil hath he done? And they cried out the more exceedingly, Crucify him.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' Pilate, willing to content the people, released Barabbas unto them, and delivered Jesus, when he had scourged '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', to be crucified. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And the soldiers led him away into the hall, called Prætorium; and they call together the whole band. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And they clothed him with purple, and platted a crown of thorns, and put it about his '
    - type: usfm
      marker: add
      children:
      - type: text
        text: head
    - type: text
      text: ', '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'and began to salute him, Hail, King of the Jews! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And they smote him on the head with a reed, and did spit upon him, and bowing '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' knees worshipped him. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And Pilate asked him, Art thou the King of the Jews? And he answering said unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Thou sayest '
      - type: usfm
        marker: add
        children:
        - type: text
          text: 'it '
      - type: text
        text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: And when they had mocked him, they took off the purple from him, and put his own clothes on him, and led him out to crucify him.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: And they compel one Simon a Cyrenian, who passed by, coming out of the country, the father of Alexander and Rufus, to bear his cross.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And they bring him unto the place Golgotha, which is, being interpreted, The place of a skull. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And they gave him to drink wine mingled with myrrh: but he received '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' not. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And when they had crucified him, they parted his garments, casting lots upon them, what every man should take. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And it was the third hour, and they crucified him. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And the superscription of his accusation was written over, THE KING OF THE JEWS. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And with him they crucify two thieves; the one on his right hand, and the other on his left. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: And the scripture was fulfilled, which saith, And he was numbered with the transgressors.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And they that passed by railed on him, wagging their heads, and saying, Ah, thou that destroyest the temple, and buildest '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' in three days, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And the chief priests accused him of many things: but he answered nothing. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'save thyself, and come down from the cross. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Likewise also the chief priests mocking said among themselves with the scribes, He saved others; himself he cannot save. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Let Christ the King of Israel descend now from the cross, that we may see and believe. And they that were crucified with him reviled him.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And when the sixth hour was come, there was darkness over the whole land until the ninth hour. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'And at the ninth hour Jesus cried with a loud voice, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Eloi, Eloi, lama sabachthani?
    - type: text
      text: ' which is, being interpreted, My God, my God, why hast thou forsaken me? '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'And some of them that stood by, when they heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', said, Behold, he calleth Elias. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'And one ran and filled a spunge full of vinegar, and put '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' on a reed, and gave him to drink, saying, Let alone; let us see whether Elias will come to take him down. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'And Jesus cried with a loud voice, and gave up the ghost. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: And the veil of the temple was rent in twain from the top to the bottom.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'And when the centurion, which stood over against him, saw that he so cried out, and gave up the ghost, he said, Truly this man was the Son of God. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And Pilate asked him again, saying, Answerest thou nothing? behold how many things they witness against thee. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'There were also women looking on afar off: among whom was Mary Magdalene, and Mary the mother of James the less and of Joses, and Salome; '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: (who also, when he was in Galilee, followed him, and ministered unto him;) and many other women which came up with him unto Jerusalem.
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'And now when the even was come, because it was the preparation, that is, the day before the sabbath, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Joseph of Arimathæa, an honourable counsellor, which also waited for the kingdom of God, came, and went in boldly unto Pilate, and craved the body of Jesus. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'And Pilate marvelled if he were already dead: and calling '
    - type: usfm
      marker: add
      children:
      - type: text
        text: unto him
    - type: text
      text: ' the centurion, he asked him whether he had been any while dead. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'And when he knew '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' of the centurion, he gave the body to Joseph. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'And he bought fine linen, and took him down, and wrapped him in the linen, and laid him in a sepulchre which was hewn out of a rock, and rolled a stone unto the door of the sepulchre. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'And Mary Magdalene and Mary '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the mother
    - type: text
      text: ' of Joses beheld where he was laid.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: But Jesus yet answered nothing; so that Pilate marvelled.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Now at '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' feast he released unto them one prisoner, whomsoever they desired. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And there was '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' named Barabbas, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which lay
    - type: text
      text: ' bound with them that had made insurrection with him, who had committed murder in the insurrection. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And the multitude crying aloud began to desire '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him to do
    - type: text
      text: ' as he had ever done unto them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But Pilate answered them, saying, Will ye that I release unto you the King of the Jews? '
