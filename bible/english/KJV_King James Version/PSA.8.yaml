verses:
  '1':
  - type: text
    content: To the chief Musician upon Gittith, A Psalm of David.
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ' our Lord, how excellent '
  - type: text
    content: is
  - type: text
    content: ' thy name in all the earth!'
  - type: text
    content: Who hast set thy glory above the heavens.
  '2':
  - type: text
    content: Out of the mouth of babes and sucklings hast thou ordained strength because of thine enemies,
  - type: text
    content: That thou mightest still the enemy and the avenger.
  '3':
  - type: text
    content: When I consider thy heavens, the work of thy fingers,
  - type: text
    content: The moon and the stars, which thou hast ordained;
  '4':
  - type: text
    content: What is man, that thou art mindful of him?
  - type: text
    content: And the son of man, that thou visitest him?
  '5':
  - type: text
    content: For thou hast made him a little lower than the angels,
  - type: text
    content: And hast crowned him with glory and honour.
  '6':
  - type: text
    content: Thou madest him to have dominion over the works of thy hands;
  - type: text
    content: 'Thou hast put all '
  - type: text
    content: things
  - type: text
    content: ' under his feet:'
  '7':
  - type: text
    content: All sheep and oxen,
  - type: text
    content: Yea, and the beasts of the field;
  '8':
  - type: text
    content: The fowl of the air, and the fish of the sea,
  - type: text
    content: And whatsoever
  - type: text
    content: ' passeth through the paths of the seas.'
  '9':
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ' our Lord,'
  - type: text
    content: 'How excellent '
  - type: text
    content: is
  - type: text
    content: ' thy name in all the earth!'
