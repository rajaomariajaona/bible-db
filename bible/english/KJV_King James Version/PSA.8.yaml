segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: To the chief Musician upon Gittith, A Psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' our Lord, how excellent '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy name in all the earth!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who hast set thy glory above the heavens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Out of the mouth of babes and sucklings hast thou ordained strength because of thine enemies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: That thou mightest still the enemy and the avenger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: When I consider thy heavens, the work of thy fingers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: The moon and the stars, which thou hast ordained;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: What is man, that thou art mindful of him?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the son of man, that thou visitest him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For thou hast made him a little lower than the angels,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And hast crowned him with glory and honour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Thou madest him to have dominion over the works of thy hands;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Thou hast put all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' under his feet:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: All sheep and oxen,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yea, and the beasts of the field;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The fowl of the air, and the fish of the sea,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And whatsoever
  - type: text
    text: ' passeth through the paths of the seas.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' our Lord,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'How excellent '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy name in all the earth!'
