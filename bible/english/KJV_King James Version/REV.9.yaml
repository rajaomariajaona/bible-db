document_id: REV.9,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'And the fifth angel sounded, and I saw a star fall from heaven unto the earth: and to him was given the key of the bottomless pit. '
  '10':
  - type: text
    content: 'And they had tails like unto scorpions, and there were stings in their tails: and their power '
  - type: text
    content: was
  - type: text
    content: ' to hurt men five months. '
  '11':
  - type: text
    content: 'And they had a king over them, '
  - type: text
    content: which is
  - type: text
    content: ' the angel of the bottomless pit, whose name in the Hebrew tongue '
  - type: text
    content: is
  - type: text
    content: ' Abaddon, but in the Greek tongue hath '
  - type: text
    content: his
  - type: text
    content: ' name Apollyon.'
  '12':
  - type: text
    content: 'One woe is past; '
  - type: text
    content: and
  - type: text
    content: ', behold, there come two woes more hereafter.'
  '13':
  - type: text
    content: 'And the sixth angel sounded, and I heard a voice from the four horns of the golden altar which is before God, '
  '14':
  - type: text
    content: 'saying to the sixth angel which had the trumpet, Loose the four angels which are bound in the great river Euphrates. '
  '15':
  - type: text
    content: 'And the four angels were loosed, which were prepared for an hour, and a day, and a month, and a year, for to slay the third part of men. '
  '16':
  - type: text
    content: 'And the number of the army of the horsemen '
  - type: text
    content: were
  - type: text
    content: ' two hundred thousand thousand: and I heard the number of them. '
  '17':
  - type: text
    content: 'And thus I saw the horses in the vision, and them that sat on them, having breastplates of fire, and of jacinth, and brimstone: and the heads of the horses '
  - type: text
    content: were
  - type: text
    content: ' as the heads of lions; and out of their mouths issued fire and smoke and brimstone. '
  '18':
  - type: text
    content: 'By these three was the third part of men killed, by the fire, and by the smoke, and by the brimstone, which issued out of their mouths. '
  '19':
  - type: text
    content: 'For their power is in their mouth, and in their tails: for their tails '
  - type: text
    content: were
  - type: text
    content: ' like unto serpents, and had heads, and with them they do hurt. '
  '2':
  - type: text
    content: 'And he opened the bottomless pit; and there arose a smoke out of the pit, as the smoke of a great furnace; and the sun and the air were darkened by reason of the smoke of the pit. '
  '20':
  - type: text
    content: 'And the rest of the men which were not killed by these plagues yet repented not of the works of their hands, that they should not worship devils, and idols of gold, and silver, and brass, and stone, and of wood: which neither can see, nor hear, nor walk: '
  '21':
  - type: text
    content: neither repented they of their murders, nor of their sorceries, nor of their fornication, nor of their thefts.
  '3':
  - type: text
    content: 'And there came out of the smoke locusts upon the earth: and unto them was given power, as the scorpions of the earth have power. '
  '4':
  - type: text
    content: 'And it was commanded them that they should not hurt the grass of the earth, neither any green thing, neither any tree; but only those men which have not the seal of God in their foreheads. '
  '5':
  - type: text
    content: 'And to them it was given that they should not kill them, but that they should be tormented five months: and their torment '
  - type: text
    content: was
  - type: text
    content: ' as the torment of a scorpion, when he striketh a man. '
  '6':
  - type: text
    content: 'And in those days shall men seek death, and shall not find it; and shall desire to die, and death shall flee from them. '
  '7':
  - type: text
    content: 'And the shapes of the locusts '
  - type: text
    content: were
  - type: text
    content: ' like unto horses prepared unto battle; and on their heads '
  - type: text
    content: were
  - type: text
    content: ' as it were crowns like gold, and their faces '
  - type: text
    content: were
  - type: text
    content: ' as the faces of men. '
  '8':
  - type: text
    content: 'And they had hair as the hair of women, and their teeth were as '
  - type: text
    content: the teeth
  - type: text
    content: ' of lions. '
  '9':
  - type: text
    content: 'And they had breastplates, as it were breastplates of iron; and the sound of their wings '
  - type: text
    content: was
  - type: text
    content: ' as the sound of chariots of many horses running to battle. '
