document_id: REV.9,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And the fifth angel sounded, and I saw a star fall from heaven unto the earth: and to him was given the key of the bottomless pit. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And they had tails like unto scorpions, and there were stings in their tails: and their power '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' to hurt men five months. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And they had a king over them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which is
    - type: text
      text: ' the angel of the bottomless pit, whose name in the Hebrew tongue '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Abaddon, but in the Greek tongue hath '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' name Apollyon.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'One woe is past; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ', behold, there come two woes more hereafter.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And the sixth angel sounded, and I heard a voice from the four horns of the golden altar which is before God, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'saying to the sixth angel which had the trumpet, Loose the four angels which are bound in the great river Euphrates. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And the four angels were loosed, which were prepared for an hour, and a day, and a month, and a year, for to slay the third part of men. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And the number of the army of the horsemen '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' two hundred thousand thousand: and I heard the number of them. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And thus I saw the horses in the vision, and them that sat on them, having breastplates of fire, and of jacinth, and brimstone: and the heads of the horses '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' as the heads of lions; and out of their mouths issued fire and smoke and brimstone. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'By these three was the third part of men killed, by the fire, and by the smoke, and by the brimstone, which issued out of their mouths. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'For their power is in their mouth, and in their tails: for their tails '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' like unto serpents, and had heads, and with them they do hurt. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And he opened the bottomless pit; and there arose a smoke out of the pit, as the smoke of a great furnace; and the sun and the air were darkened by reason of the smoke of the pit. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And the rest of the men which were not killed by these plagues yet repented not of the works of their hands, that they should not worship devils, and idols of gold, and silver, and brass, and stone, and of wood: which neither can see, nor hear, nor walk: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: neither repented they of their murders, nor of their sorceries, nor of their fornication, nor of their thefts.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And there came out of the smoke locusts upon the earth: and unto them was given power, as the scorpions of the earth have power. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And it was commanded them that they should not hurt the grass of the earth, neither any green thing, neither any tree; but only those men which have not the seal of God in their foreheads. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And to them it was given that they should not kill them, but that they should be tormented five months: and their torment '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' as the torment of a scorpion, when he striketh a man. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And in those days shall men seek death, and shall not find it; and shall desire to die, and death shall flee from them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And the shapes of the locusts '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' like unto horses prepared unto battle; and on their heads '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' as it were crowns like gold, and their faces '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' as the faces of men. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And they had hair as the hair of women, and their teeth were as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the teeth
    - type: text
      text: ' of lions. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And they had breastplates, as it were breastplates of iron; and the sound of their wings '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' as the sound of chariots of many horses running to battle. '
