document_id: PSA.132,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Song of degrees.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', remember David,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' all his afflictions:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: For thy servant David's sake
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Turn not away the face of thine anointed.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath sworn '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' truth unto David;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will not turn from it;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Of the fruit of thy body
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will I set upon thy throne.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: If thy children will keep my covenant and my testimony that I shall teach them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their children shall also sit upon thy throne for evermore.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath chosen Zion;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He hath desired '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' for his habitation.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my rest for ever:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Here will I dwell; for I have desired it.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'I will abundantly bless her provision:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will satisfy her poor with bread.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'I will also clothe her priests with salvation:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And her saints shall shout aloud for joy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'There will I make the horn of David to bud:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have ordained a lamp for mine anointed.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'His enemies will I clothe with shame:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But upon himself shall his crown flourish.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'How he sware unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' vowed unto the mighty '
    - type: usfm
      marker: add
      children:
      - type: text
        text: God
    - type: text
      text: ' of Jacob;'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Surely I will not come into the tabernacle of my house,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor go up into my bed;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I will not give sleep to mine eyes, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: or
    - type: text
      text: ' slumber to mine eyelids,'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Until I find out a place for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'An habitation for the mighty '
    - type: usfm
      marker: add
      children:
      - type: text
        text: God
    - type: text
      text: ' of Jacob.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Lo, we heard of it at Ephratah:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We found it in the fields of the wood.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'We will go into his tabernacles:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We will worship at his footstool.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Arise, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', into thy rest;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou, and the ark of thy strength.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Let thy priests be clothed with righteousness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let thy saints shout for joy.
