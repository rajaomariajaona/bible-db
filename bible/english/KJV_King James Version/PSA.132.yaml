document_id: PSA.132,1
type_code: eng
verses:
  '1':
  - type: text
    content: A Song of degrees.
  - type: text
    content: ' '
  - type: text
    content: LORD
  - type: text
    content: ', remember David,'
  - type: text
    content: And
  - type: text
    content: ' all his afflictions:'
  '10':
  - type: text
    content: For thy servant David's sake
  - type: text
    content: Turn not away the face of thine anointed.
  '11':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' hath sworn '
  - type: text
    content: in
  - type: text
    content: ' truth unto David;'
  - type: text
    content: He will not turn from it;
  - type: text
    content: Of the fruit of thy body
  - type: text
    content: Will I set upon thy throne.
  '12':
  - type: text
    content: If thy children will keep my covenant and my testimony that I shall teach them,
  - type: text
    content: Their children shall also sit upon thy throne for evermore.
  '13':
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ' hath chosen Zion;'
  - type: text
    content: 'He hath desired '
  - type: text
    content: it
  - type: text
    content: ' for his habitation.'
  '14':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' my rest for ever:'
  - type: text
    content: Here will I dwell; for I have desired it.
  '15':
  - type: text
    content: 'I will abundantly bless her provision:'
  - type: text
    content: I will satisfy her poor with bread.
  '16':
  - type: text
    content: 'I will also clothe her priests with salvation:'
  - type: text
    content: And her saints shall shout aloud for joy.
  '17':
  - type: text
    content: 'There will I make the horn of David to bud:'
  - type: text
    content: I have ordained a lamp for mine anointed.
  '18':
  - type: text
    content: 'His enemies will I clothe with shame:'
  - type: text
    content: But upon himself shall his crown flourish.
  '2':
  - type: text
    content: 'How he sware unto the '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: And
  - type: text
    content: ' vowed unto the mighty '
  - type: text
    content: God
  - type: text
    content: ' of Jacob;'
  '3':
  - type: text
    content: Surely I will not come into the tabernacle of my house,
  - type: text
    content: Nor go up into my bed;
  '4':
  - type: text
    content: 'I will not give sleep to mine eyes, '
  - type: text
    content: or
  - type: text
    content: ' slumber to mine eyelids,'
  '5':
  - type: text
    content: 'Until I find out a place for the '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: 'An habitation for the mighty '
  - type: text
    content: God
  - type: text
    content: ' of Jacob.'
  '6':
  - type: text
    content: 'Lo, we heard of it at Ephratah:'
  - type: text
    content: We found it in the fields of the wood.
  '7':
  - type: text
    content: 'We will go into his tabernacles:'
  - type: text
    content: We will worship at his footstool.
  '8':
  - type: text
    content: 'Arise, O '
  - type: text
    content: LORD
  - type: text
    content: ', into thy rest;'
  - type: text
    content: Thou, and the ark of thy strength.
  '9':
  - type: text
    content: Let thy priests be clothed with righteousness;
  - type: text
    content: And let thy saints shout for joy.
