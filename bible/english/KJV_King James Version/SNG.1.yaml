  '5':
  - type: text
    content: 'I '
  - type: text
    content: am
  - type: text
    content: ' black, but comely,'
  - type: text
    content: O ye daughters of Jerusalem,
  - type: text
    content: As the tents of Kedar,
  - type: text
    content: As the curtains of Solomon.
  '6':
  - type: text
    content: 'Look not upon me, because I '
  - type: text
    content: am
  - type: text
    content: ' black,'
  - type: text
    content: 'Because the sun hath looked upon me:'
  - type: text
    content: My mother's children were angry with me;
  - type: text
    content: They made me the keeper of the vineyards;
  - type: text
    content: But
  - type: text
    content: ' mine own vineyard have I not kept.'
  '7':
  - type: text
    content: Tell me, O thou whom my soul loveth,
  - type: text
    content: 'Where thou feedest, where thou makest '
  - type: text
    content: thy flock
  - type: text
    content: ' to rest at noon:'
  - type: text
    content: For why should I be as one that turneth aside
  - type: text
    content: By the flocks of thy companions?
  '8':
  - type: text
    content: If thou know not,
  - type: text
    content: O thou fairest among women,
  - type: text
    content: Go thy way forth by the footsteps of the flock,
  - type: text
    content: And feed thy kids
  - type: text
    content: Beside the shepherds' tents.
  '9':
  - type: text
    content: I have compared thee, O my love,
  - type: text
    content: To a company of horses in Pharaoh's chariots.
