  '2':
  - type: text
    content: 'Let him kiss me with the kisses of his mouth:'
  - type: text
    content: 'For thy love '
  - type: text
    content: is
  - type: text
    content: ' better than wine.'
  '3':
  - type: text
    content: Because of the savour of thy good ointments
  - type: text
    content: 'Thy name '
  - type: text
    content: is as
  - type: text
    content: ' ointment poured forth,'
  - type: text
    content: Therefore do the virgins love thee.
  '4':
  - type: text
    content: 'Draw me, we will run after thee:'
  - type: text
    content: 'The king hath brought me into his chambers:'
  - type: text
    content: We will be glad and rejoice in thee,
  - type: text
    content: 'We will remember thy love more than wine:'
  - type: text
