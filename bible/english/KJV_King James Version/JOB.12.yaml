document_id: JOB.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job's Reply
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: And Job answered and said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'No doubt but ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the people,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And wisdom shall die with you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: But I have understanding as well as you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' not inferior to you:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yea, who knoweth not such things as these?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I am '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' one mocked of his neighbour,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Who calleth upon God, and he answereth him:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The just upright '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man is
  - type: text
    text: ' laughed to scorn.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He that is ready to slip with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' feet'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is as
  - type: text
    text: ' a lamp despised in the thought of him that is at ease.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The tabernacles of robbers prosper,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And they that provoke God are secure;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Into whose hand God bringeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: abundantly
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But ask now the beasts, and they shall teach thee;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the fowls of the air, and they shall tell thee:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Or speak to the earth, and it shall teach thee:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the fishes of the sea shall declare unto thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Who knoweth not in all these
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'That the hand of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath wrought this?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'In whose hand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the soul of every living thing,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the breath of all mankind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Doth not the ear try words?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the mouth taste his meat?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'With the ancient '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' wisdom;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And in length of days understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'With him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' wisdom and strength,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He hath counsel and understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Behold, he breaketh down, and it cannot be built again:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He shutteth up a man, and there can be no opening.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Behold, he withholdeth the waters, and they dry up:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Also he sendeth them out, and they overturn the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'With him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' strength and wisdom:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The deceived and the deceiver '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' his.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He leadeth counsellors away spoiled,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And maketh the judges fools.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: He looseth the bond of kings,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And girdeth their loins with a girdle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He leadeth princes away spoiled,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And overthroweth the mighty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He removeth away the speech of the trusty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And taketh away the understanding of the aged.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: He poureth contempt upon princes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And weakeneth the strength of the mighty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: He discovereth deep things out of darkness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And bringeth out to light the shadow of death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'He increaseth the nations, and destroyeth them:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He enlargeth the nations, and straiteneth them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: again
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: He taketh away the heart of the chief of the people of the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And causeth them to wander in a wilderness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: where there is
  - type: text
    text: ' no way.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: They grope in the dark without light,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And he maketh them to stagger like a drunken man.
