document_id: ISA.19,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Egypt
  - type: text
    content: The burden of Egypt.
  - type: text
    content: 'Behold, the '
  - type: text
    content: LORD
  - type: text
    content: ' rideth upon a swift cloud, and shall come into Egypt: and the idols of Egypt shall be moved at his presence, and the heart of Egypt shall melt in the midst of it. '
  '10':
  - type: text
    content: 'And they shall be broken in the purposes thereof, all that make sluices '
  - type: text
    content: and
  - type: text
    content: ' ponds for fish.'
  '11':
  - type: text
    content: 'Surely the princes of Zoan '
  - type: text
    content: are
  - type: text
    content: ' fools, the counsel of the wise counsellors of Pharaoh is become brutish: how say ye unto Pharaoh, I '
  - type: text
    content: am
  - type: text
    content: ' the son of the wise, the son of ancient kings? '
  '12':
  - type: text
    content: 'Where '
  - type: text
    content: are
  - type: text
    content: ' they? where '
  - type: text
    content: are
  - type: text
    content: ' thy wise '
  - type: text
    content: men?
  - type: text
    content: ' and let them tell thee now, and let them know what the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts hath purposed upon Egypt. '
  '13':
  - type: text
    content: 'The princes of Zoan are become fools, the princes of Noph are deceived; they have also seduced Egypt, '
  - type: text
    content: even they that are
  - type: text
    content: ' the stay of the tribes thereof. '
  '14':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' hath mingled a perverse spirit in the midst thereof: and they have caused Egypt to err in every work thereof, as a drunken '
  - type: text
    content: man
  - type: text
    content: ' staggereth in his vomit. '
  '15':
  - type: text
    content: 'Neither shall there be '
  - type: text
    content: any
  - type: text
    content: ' work for Egypt, which the head or tail, branch or rush, may do.'
  '16':
  - type: text
    content: 'In that day shall Egypt be like unto women: and it shall be afraid and fear because of the shaking of the hand of the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, which he shaketh over it. '
  '17':
  - type: text
    content: 'And the land of Judah shall be a terror unto Egypt, every one that maketh mention thereof shall be afraid in himself, because of the counsel of the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, which he hath determined against it.'
  '18':
  - type: text
    content: 'In that day shall five cities in the land of Egypt speak the language of Canaan, and swear to the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; one shall be called, The city of destruction.'
  '19':
  - type: text
    content: 'In that day shall there be an altar to the '
  - type: text
    content: LORD
  - type: text
    content: ' in the midst of the land of Egypt, and a pillar at the border thereof to the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'And I will set the Egyptians against the Egyptians: and they shall fight every one against his brother, and every one against his neighbour; city against city, '
  - type: text
    content: and
  - type: text
    content: ' kingdom against kingdom. '
  '20':
  - type: text
    content: 'And it shall be for a sign and for a witness unto the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts in the land of Egypt: for they shall cry unto the '
  - type: text
    content: LORD
  - type: text
    content: ' because of the oppressors, and he shall send them a saviour, and a great one, and he shall deliver them. '
  '21':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' shall be known to Egypt, and the Egyptians shall know the '
  - type: text
    content: LORD
  - type: text
    content: ' in that day, and shall do sacrifice and oblation; yea, they shall vow a vow unto the '
  - type: text
    content: LORD
  - type: text
    content: ', and perform '
  - type: text
    content: it
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' shall smite Egypt: he shall smite and heal '
  - type: text
    content: 'it:'
  - type: text
    content: ' and they shall return '
  - type: text
    content: even
  - type: text
    content: ' to the '
  - type: text
    content: LORD
  - type: text
    content: ', and he shall be intreated of them, and shall heal them.'
  '23':
  - type: text
    content: In that day shall there be a highway out of Egypt to Assyria, and the Assyrian shall come into Egypt, and the Egyptian into Assyria, and the Egyptians shall serve with the Assyrians.
  '24':
  - type: text
    content: 'In that day shall Israel be the third with Egypt and with Assyria, '
  - type: text
    content: even
  - type: text
    content: ' a blessing in the midst of the land: '
  '25':
  - type: text
    content: 'whom the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts shall bless, saying, Blessed '
  - type: text
    content: be
  - type: text
    content: ' Egypt my people, and Assyria the work of my hands, and Israel mine inheritance.'
  '3':
  - type: text
    content: 'And the spirit of Egypt shall fail in the midst thereof; and I will destroy the counsel thereof: and they shall seek to the idols, and to the charmers, and to them that have familiar spirits, and to the wizards. '
  '4':
  - type: text
    content: 'And the Egyptians will I give over into the hand of a cruel lord; and a fierce king shall rule over them, saith the Lord, the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts.'
  '5':
  - type: text
    content: 'And the waters shall fail from the sea, and the river shall be wasted and dried up. '
  '6':
  - type: text
    content: 'And they shall turn the rivers far away; '
  - type: text
    content: and
  - type: text
    content: ' the brooks of defence shall be emptied and dried up: the reeds and flags shall wither. '
  '7':
  - type: text
    content: 'The paper reeds by the brooks, by the mouth of the brooks, and every thing sown by the brooks, shall wither, be driven away, and be no '
  - type: text
    content: more
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'The fishers also shall mourn, and all they that cast angle into the brooks shall lament, and they that spread nets upon the waters shall languish. '
  '9':
  - type: text
    content: 'Moreover they that work in fine flax, and they that weave networks, shall be confounded. '
