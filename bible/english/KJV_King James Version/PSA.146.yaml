  - type: text
    content: 'Praise ye the '
  - type: text
    content: LORD
  - type: text
    content: .
  '2':
  - type: text
    content: 'While I live will I praise the '
  - type: text
    content: LORD
  - type: text
    content: ': I will sing praises unto my God while I have any being.'
  '3':
  - type: text
    content: 'Put not your trust in princes, '
  - type: text
    content: nor
  - type: text
    content: ' in the son of man,'
  - type: text
    content: 'In whom '
  - type: text
    content: there is
  - type: text
    content: ' no help.'
  '4':
  - type: text
    content: His breath goeth forth, he returneth to his earth;
  - type: text
    content: In that very day his thoughts perish.
  '5':
  - type: text
    content: 'Happy '
  - type: text
    content: is he
  - type: text
    content: ' that '
  - type: text
    content: hath
  - type: text
    content: ' the God of Jacob for his help,'
  - type: text
    content: 'Whose hope '
  - type: text
    content: is
  - type: text
    content: ' in the '
  - type: text
    content: LORD
  - type: text
    content: ' his God:'
  '6':
  - type: text
    content: 'Which made heaven, and earth, the sea, and all that therein '
  - type: text
    content: 'is:'
  - type: text
    content: 'Which keepeth truth for ever:'
  '7':
  - type: text
    content: 'Which executeth judgment for the oppressed:'
  - type: text
    content: Which giveth food to the hungry.
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' looseth the prisoners:'
  '8':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' openeth '
  - type: text
    content: the eyes of
  - type: text
    content: ' the blind:'
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' raiseth them that are bowed down:'
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' loveth the righteous:'
  '9':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' preserveth the strangers; He relieveth the fatherless and widow:'
  - type: text
    content: But the way of the wicked he turneth upside down.
