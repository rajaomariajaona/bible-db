  - type: text
    content: ', O my soul.'
  '10':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' shall reign for ever, '
  - type: text
    content: even
  - type: text
    content: ' thy God, O Zion,'
  - type: text
