    - type: text
      text: 'Praise ye the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', O my soul.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall reign for ever, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' thy God, O Zion,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Unto all generations.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: 'Praise ye the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'While I live will I praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': I will sing praises unto my God while I have any being.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Put not your trust in princes, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: nor
    - type: text
      text: ' in the son of man,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In whom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no help.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His breath goeth forth, he returneth to his earth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In that very day his thoughts perish.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Happy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is he
    - type: text
      text: ' that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: hath
    - type: text
      text: ' the God of Jacob for his help,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Whose hope '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' his God:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Which made heaven, and earth, the sea, and all that therein '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'is:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Which keepeth truth for ever:'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Which executeth judgment for the oppressed:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Which giveth food to the hungry.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' looseth the prisoners:'
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' openeth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the eyes of
    - type: text
      text: ' the blind:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' raiseth them that are bowed down:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' loveth the righteous:'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' preserveth the strangers; He relieveth the fatherless and widow:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the way of the wicked he turneth upside down.
