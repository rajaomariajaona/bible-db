document_id: JER.41
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now it came to pass in the seventh month, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' Ishmael the son of Nethaniah the son of Elishama, of the seed royal, and the princes of the king, even ten men with him, came unto Gedaliah the son of Ahikam to Mizpah; and there they did eat bread together in Mizpah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then arose Ishmael the son of Nethaniah, and the ten men that were with him, and smote Gedaliah the son of Ahikam the son of Shaphan with the sword, and slew him, whom the king of Babylon had made governor over the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ishmael also slew all the Jews that were with him, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' with Gedaliah, at Mizpah, and the Chaldeans that were found there, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the men of war.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And it came to pass the second day after he had slain Gedaliah, and no man knew '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'that there came certain from Shechem, from Shiloh, and from Samaria, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' fourscore men, having their beards shaven, and their clothes rent, and having cut themselves, with offerings and incense in their hand, to bring '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' to the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Ishmael the son of Nethaniah went forth from Mizpah to meet them, weeping all along as he went: and it came to pass, as he met them, he said unto them, Come to Gedaliah the son of Ahikam.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And it was '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ', when they came into the midst of the city, that Ishmael the son of Nethaniah slew them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and cast them
  - type: text
    text: ' into the midst of the pit, he, and the men that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But ten men were found among them that said unto Ishmael, Slay us not: for we have treasures in the field, of wheat, and of barley, and of oil, and of honey. So he forbare, and slew them not among their brethren. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now the pit wherein Ishmael had cast all the dead bodies of the men, whom he had slain because of Gedaliah, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' it which Asa the king had made for fear of Baasha king of Israel: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' Ishmael the son of Nethaniah filled it with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them that were
  - type: text
    text: ' slain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Ishmael carried away captive all the residue of the people that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in Mizpah, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the king''s daughters, and all the people that remained in Mizpah, whom Nebuzar-adan the captain of the guard had committed to Gedaliah the son of Ahikam: and Ishmael the son of Nethaniah carried them away captive, and departed to go over to the Ammonites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But when Johanan the son of Kareah, and all the captains of the forces that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with him, heard of all the evil that Ishmael the son of Nethaniah had done, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'then they took all the men, and went to fight with Ishmael the son of Nethaniah, and found him by the great waters that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' in Gibeon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now it came to pass, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' when all the people which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with Ishmael saw Johanan the son of Kareah, and all the captains of the forces that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with him, then they were glad. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So all the people that Ishmael had carried away captive from Mizpah cast about and returned, and went unto Johanan the son of Kareah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But Ishmael the son of Nethaniah escaped from Johanan with eight men, and went to the Ammonites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then took Johanan the son of Kareah, and all the captains of the forces that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with him, all the remnant of the people whom he had recovered from Ishmael the son of Nethaniah, from Mizpah, after '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' he had slain Gedaliah the son of Ahikam, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' mighty men of war, and the women, and the children, and the eunuchs, whom he had brought again from Gibeon: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'and they departed, and dwelt in the habitation of Chimham, which is by Beth-lehem, to go to enter into Egypt, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'because of the Chaldeans: for they were afraid of them, because Ishmael the son of Nethaniah had slain Gedaliah the son of Ahikam, whom the king of Babylon made governor in the land.'
