document_id: PSA.141
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: A Psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', I cry unto thee: make haste unto me;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Give ear unto my voice, when I cry unto thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Let my prayer be set forth before thee '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' incense;'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' the lifting up of my hands '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' the evening sacrifice.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Set a watch, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', before my mouth;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Keep the door of my lips.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Incline not my heart to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' evil thing,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'To practise wicked works with men that work iniquity: And let me not eat of their dainties.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Let the righteous smite me;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: It shall be
  - type: text
    text: ' a kindness: And let him reprove me;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: It shall be
  - type: text
    text: ' an excellent oil, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' shall not break my head:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For yet my prayer also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' in their calamities.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: When their judges are overthrown in stony places,
- type: usfm
  marker: q2
  children:
  - type: text
    text: They shall hear my words; for they are sweet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Our bones are scattered at the grave's mouth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'As when one cutteth and cleaveth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: wood
  - type: text
    text: ' upon the earth.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But mine eyes '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' unto thee, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' the Lord:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: In thee is my trust; leave not my soul destitute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Keep me from the snares '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' they have laid for me, and the gins of the workers of iniquity.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Let the wicked fall into their own nets, whilst that I withal escape.
