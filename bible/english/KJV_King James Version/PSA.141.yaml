document_id: PSA.141,1
type_code: eng
verses:
  '1':
  - type: text
    content: A Psalm of David.
  - type: text
    content: ' '
  - type: text
    content: LORD
  - type: text
    content: ', I cry unto thee: make haste unto me;'
  - type: text
    content: Give ear unto my voice, when I cry unto thee.
  '10':
  - type: text
    content: Let the wicked fall into their own nets, whilst that I withal escape.
  '2':
  - type: text
    content: 'Let my prayer be set forth before thee '
  - type: text
    content: as
  - type: text
    content: ' incense;'
  - type: text
    content: And
  - type: text
    content: ' the lifting up of my hands '
  - type: text
    content: as
  - type: text
    content: ' the evening sacrifice.'
  '3':
  - type: text
    content: 'Set a watch, O '
  - type: text
    content: LORD
  - type: text
    content: ', before my mouth;'
  - type: text
    content: Keep the door of my lips.
  '4':
  - type: text
    content: 'Incline not my heart to '
  - type: text
    content: any
  - type: text
    content: ' evil thing,'
  - type: text
    content: 'To practise wicked works with men that work iniquity: And let me not eat of their dainties.'
  '5':
  - type: text
    content: Let the righteous smite me;
  - type: text
    content: It shall be
  - type: text
    content: ' a kindness: And let him reprove me;'
  - type: text
    content: It shall be
  - type: text
    content: ' an excellent oil, '
  - type: text
    content: which
  - type: text
    content: ' shall not break my head:'
  - type: text
    content: 'For yet my prayer also '
  - type: text
    content: shall be
  - type: text
    content: ' in their calamities.'
  '6':
  - type: text
    content: When their judges are overthrown in stony places,
  - type: text
    content: They shall hear my words; for they are sweet.
  '7':
  - type: text
    content: Our bones are scattered at the grave's mouth,
  - type: text
    content: 'As when one cutteth and cleaveth '
  - type: text
    content: wood
  - type: text
    content: ' upon the earth.'
  '8':
  - type: text
    content: 'But mine eyes '
  - type: text
    content: are
  - type: text
    content: ' unto thee, O '
  - type: text
    content: GOD
  - type: text
    content: ' the Lord:'
  - type: text
    content: In thee is my trust; leave not my soul destitute.
  '9':
  - type: text
    content: 'Keep me from the snares '
  - type: text
    content: which
  - type: text
    content: ' they have laid for me, and the gins of the workers of iniquity.'
