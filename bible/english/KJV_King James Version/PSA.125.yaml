verses:
  '1':
  - type: text
    content: A Song of degrees.
  - type: text
    content: 'They that trust in the '
  - type: text
    content: LORD
  - type: text
    content: Shall be
  - type: text
    content: ' as mount Zion,'
  - type: text
    content: Which
  - type: text
    content: ' cannot be removed,'
  - type: text
    content: But
  - type: text
    content: ' abideth for ever.'
  '2':
  - type: text
    content: ' '
  - type: text
    content: As
  - type: text
    content: ' the mountains '
  - type: text
    content: are
  - type: text
    content: ' round about Jerusalem,'
  - type: text
    content: 'So the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' round about his people from henceforth even for ever.'
  '3':
  - type: text
    content: For the rod of the wicked shall not rest upon the lot of the righteous;
  - type: text
    content: Lest the righteous put forth their hands unto iniquity.
  '4':
  - type: text
    content: 'Do good, O '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: 'Unto '
  - type: text
    content: those that be
  - type: text
    content: ' good, and to '
  - type: text
    content: them that are
  - type: text
    content: ' upright in their hearts.'
  '5':
  - type: text
    content: 'As for such as turn aside unto their crooked ways, the '
  - type: text
    content: LORD
  - type: text
    content: ' shall lead them forth with the workers of iniquity:'
  - type: text
    content: But
  - type: text
    content: ' peace '
  - type: text
    content: shall be
  - type: text
    content: ' upon Israel.'
