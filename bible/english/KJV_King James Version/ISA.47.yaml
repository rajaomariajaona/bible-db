    content: Doom of Babylon
  - type: text
    content: 'Come down, and sit in the dust, O virgin daughter of Babylon, sit on the ground: '
  - type: text
    content: there is
  - type: text
    content: ' no throne, O daughter of the Chaldeans: for thou shalt no more be called tender and delicate. '
  '10':
  - type: text
    content: 'For thou hast trusted in thy wickedness: thou hast said, None seeth me. Thy wisdom and thy knowledge, it hath perverted thee; and thou hast said in thine heart, I '
  - type: text
    content: am
  - type: text
    content: ', and none else beside me. '
  '11':
  - type: text
    content: 'Therefore shall evil come upon thee; thou shalt not know from whence it riseth: and mischief shall fall upon thee; thou shalt not be able to put it off: and desolation shall come upon thee suddenly, '
  - type: text
    content: which
  - type: text
    content: ' thou shalt not know.'
  '12':
  - type: text
    content: 'Stand now with thine enchantments, and with the multitude of thy sorceries, wherein thou hast laboured from thy youth; if so be thou shalt be able to profit, if so be thou mayest prevail. '
  '13':
  - type: text
    content: 'Thou art wearied in the multitude of thy counsels. Let now the astrologers, the stargazers, the monthly prognosticators, stand up, and save thee from '
  - type: text
    content: these things
  - type: text
    content: ' that shall come upon thee. '
  '14':
  - type: text
    content: 'Behold, they shall be as stubble; the fire shall burn them; they shall not deliver themselves from the power of the flame: '
  - type: text
    content: there shall
  - type: text
