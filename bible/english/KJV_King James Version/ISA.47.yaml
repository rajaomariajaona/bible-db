  - type: text
    content: LORD
  - type: text
    content: ' of hosts '
  - type: text
    content: is
  - type: text
    content: ' his name, the Holy One of Israel. '
  '5':
  - type: text
    content: 'Sit thou silent, and get thee into darkness, O daughter of the Chaldeans: for thou shalt no more be called, The lady of kingdoms. '
  '6':
  - type: text
    content: 'I was wroth with my people, I have polluted mine inheritance, and given them into thine hand: thou didst shew them no mercy; upon the ancient hast thou very heavily laid thy yoke. '
  '7':
  - type: text
    content: 'And thou saidst, I shall be a lady for ever: '
  - type: text
