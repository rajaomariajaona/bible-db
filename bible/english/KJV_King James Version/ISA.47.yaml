  - type: text
    content: be
  - type: text
    content: ' a coal to warm at, '
  - type: text
    content: nor
  - type: text
    content: ' fire to sit before it. '
  '15':
  - type: text
    content: 'Thus shall they be unto thee with whom thou hast laboured, '
  - type: text
    content: even
  - type: text
    content: ' thy merchants, from thy youth: they shall wander every one to his quarter; none shall save thee.'
  '2':
  - type: text
    content: 'Take the millstones, and grind meal: uncover thy locks, make bare the leg, uncover the thigh, pass over the rivers. '
  '3':
  - type: text
    content: 'Thy nakedness shall be uncovered, yea, thy shame shall be seen: I will take vengeance, and I will not meet '
  - type: text
    content: thee as
  - type: text
    content: ' a man. '
  '4':
  - type: text
