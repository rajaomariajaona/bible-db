document_id: ISA.47
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Doom of Babylon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Come down, and sit in the dust, O virgin daughter of Babylon, sit on the ground: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no throne, O daughter of the Chaldeans: for thou shalt no more be called tender and delicate. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Take the millstones, and grind meal: uncover thy locks, make bare the leg, uncover the thigh, pass over the rivers. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Thy nakedness shall be uncovered, yea, thy shame shall be seen: I will take vengeance, and I will not meet '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thee as
  - type: text
    text: ' a man. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: add
    children:
    - type: text
      text: As for
  - type: text
    text: ' our redeemer, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' his name, the Holy One of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Sit thou silent, and get thee into darkness, O daughter of the Chaldeans: for thou shalt no more be called, The lady of kingdoms. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I was wroth with my people, I have polluted mine inheritance, and given them into thine hand: thou didst shew them no mercy; upon the ancient hast thou very heavily laid thy yoke. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And thou saidst, I shall be a lady for ever: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' that thou didst not lay these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' to thy heart, neither didst remember the latter end of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Therefore hear now this, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thou that art
  - type: text
    text: ' given to pleasures, that dwellest carelessly, that sayest in thine heart, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ', and none else beside me; I shall not sit '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' a widow, neither shall I know the loss of children: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'but these two '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' shall come to thee in a moment in one day, the loss of children, and widowhood: they shall come upon thee in their perfection for the multitude of thy sorceries, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' for the great abundance of thine enchantments. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For thou hast trusted in thy wickedness: thou hast said, None seeth me. Thy wisdom and thy knowledge, it hath perverted thee; and thou hast said in thine heart, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ', and none else beside me. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Therefore shall evil come upon thee; thou shalt not know from whence it riseth: and mischief shall fall upon thee; thou shalt not be able to put it off: and desolation shall come upon thee suddenly, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' thou shalt not know.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Stand now with thine enchantments, and with the multitude of thy sorceries, wherein thou hast laboured from thy youth; if so be thou shalt be able to profit, if so be thou mayest prevail. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Thou art wearied in the multitude of thy counsels. Let now the astrologers, the stargazers, the monthly prognosticators, stand up, and save thee from '
  - type: usfm
    marker: add
    children:
    - type: text
      text: these things
  - type: text
    text: ' that shall come upon thee. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Behold, they shall be as stubble; the fire shall burn them; they shall not deliver themselves from the power of the flame: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there shall
  - type: text
    text: ' not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' a coal to warm at, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: nor
  - type: text
    text: ' fire to sit before it. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Thus shall they be unto thee with whom thou hast laboured, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' thy merchants, from thy youth: they shall wander every one to his quarter; none shall save thee.'
