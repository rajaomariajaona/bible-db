document_id: 1CH.24,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: add
      children:
      - type: text
        text: these are
    - type: text
      text: ' the divisions of the sons of Aaron. The sons of Aaron; Nadab, and Abihu, Eleazar, and Ithamar. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the seventh to Hakkoz, the eighth to Abijah, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the ninth to Jeshuah, the tenth to Shecaniah, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the eleventh to Eliashib, the twelfth to Jakim, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the thirteenth to Huppah, the fourteenth to Jeshebeab, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the fifteenth to Bilgah, the sixteenth to Immer, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the seventeenth to Hezir, the eighteenth to Aphses, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the nineteenth to Pethahiah, the twentieth to Jehezekel, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the one and twentieth to Jachin, the two and twentieth to Gamul, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the three and twentieth to Delaiah, the four and twentieth to Maaziah. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' the orderings of them in their service to come into the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', according to their manner, under Aaron their father, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel had commanded him.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Nadab and Abihu died before their father, and had no children: therefore Eleazar and Ithamar executed the priest''s office. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the rest of the sons of Levi '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'were these:'
    - type: text
      text: ' Of the sons of Amram; Shubael: of the sons of Shubael; Jehdeiah. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Concerning Rehabiah: of the sons of Rehabiah, the first '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Isshiah. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of the Izharites; Shelomoth: of the sons of Shelomoth; Jahath. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of Hebron
    - type: text
      text: '; Jeriah '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the first
    - type: text
      text: ', Amariah the second, Jahaziel the third, Jekameam the fourth. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Of
    - type: text
      text: ' the sons of Uzziel; Michah: of the sons of Michah; Shamir. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The brother of Michah '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Isshiah: of the sons of Isshiah; Zechariah. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Merari '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' Mahli and Mushi: the sons of Jaaziah; Beno. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Merari by Jaaziah; Beno, and Shoham, and Zaccur, and Ibri. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of Mahli '
    - type: usfm
      marker: add
      children:
      - type: text
        text: came
    - type: text
      text: ' Eleazar, who had no sons. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Concerning Kish: the son of Kish '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Jerahmeel. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David distributed them, both Zadok of the sons of Eleazar, and Ahimelech of the sons of Ithamar, according to their offices in their service. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons also of Mushi; Mahli, and Eder, and Jerimoth. These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' the sons of the Levites after the house of their fathers. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These likewise cast lots over against their brethren the sons of Aaron in the presence of David the king, and Zadok, and Ahimelech, and the chief of the fathers of the priests and Levites, even the principal fathers over against their younger brethren.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there were more chief men found of the sons of Eleazar than of the sons of Ithamar; and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thus
    - type: text
      text: ' were they divided. Among the sons of Eleazar '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there were
    - type: text
      text: ' sixteen chief men of the house of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' fathers, and eight among the sons of Ithamar according to the house of their fathers. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus were they divided by lot, one sort with another; for the governors of the sanctuary, and governors '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of the house
    - type: text
      text: ' of God, were of the sons of Eleazar, and of the sons of Ithamar. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Shemaiah the son of Nethaneel the scribe, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' of the Levites, wrote them before the king, and the princes, and Zadok the priest, and Ahimelech the son of Abiathar, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: before
    - type: text
      text: ' the chief of the fathers of the priests and Levites: one principal household being taken for Eleazar, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' taken for Ithamar. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the first lot came forth to Jehoiarib, the second to Jedaiah, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the third to Harim, the fourth to Seorim, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the fifth to Malchijah, the sixth to Mijamin, '
