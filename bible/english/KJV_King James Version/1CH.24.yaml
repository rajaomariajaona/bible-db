document_id: 1CH.24,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Now '
  - type: text
    content: these are
  - type: text
    content: ' the divisions of the sons of Aaron. The sons of Aaron; Nadab, and Abihu, Eleazar, and Ithamar. '
  '10':
  - type: text
    content: 'the seventh to Hakkoz, the eighth to Abijah, '
  '11':
  - type: text
    content: 'the ninth to Jeshuah, the tenth to Shecaniah, '
  '12':
  - type: text
    content: 'the eleventh to Eliashib, the twelfth to Jakim, '
  '13':
  - type: text
    content: 'the thirteenth to Huppah, the fourteenth to Jeshebeab, '
  '14':
  - type: text
    content: 'the fifteenth to Bilgah, the sixteenth to Immer, '
  '15':
  - type: text
    content: 'the seventeenth to Hezir, the eighteenth to Aphses, '
  '16':
  - type: text
    content: 'the nineteenth to Pethahiah, the twentieth to Jehezekel, '
  '17':
  - type: text
    content: 'the one and twentieth to Jachin, the two and twentieth to Gamul, '
  '18':
  - type: text
    content: 'the three and twentieth to Delaiah, the four and twentieth to Maaziah. '
  '19':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' the orderings of them in their service to come into the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', according to their manner, under Aaron their father, as the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel had commanded him.'
  '2':
  - type: text
    content: 'But Nadab and Abihu died before their father, and had no children: therefore Eleazar and Ithamar executed the priest''s office. '
  '20':
  - type: text
    content: 'And the rest of the sons of Levi '
  - type: text
    content: 'were these:'
  - type: text
    content: ' Of the sons of Amram; Shubael: of the sons of Shubael; Jehdeiah. '
  '21':
  - type: text
    content: 'Concerning Rehabiah: of the sons of Rehabiah, the first '
  - type: text
    content: was
  - type: text
    content: ' Isshiah. '
  '22':
  - type: text
    content: 'Of the Izharites; Shelomoth: of the sons of Shelomoth; Jahath. '
  '23':
  - type: text
    content: 'And the sons '
  - type: text
    content: of Hebron
  - type: text
    content: '; Jeriah '
  - type: text
    content: the first
  - type: text
    content: ', Amariah the second, Jahaziel the third, Jekameam the fourth. '
  '24':
  - type: text
    content: Of
  - type: text
    content: ' the sons of Uzziel; Michah: of the sons of Michah; Shamir. '
  '25':
  - type: text
    content: 'The brother of Michah '
  - type: text
    content: was
  - type: text
    content: ' Isshiah: of the sons of Isshiah; Zechariah. '
  '26':
  - type: text
    content: 'The sons of Merari '
  - type: text
    content: were
  - type: text
    content: ' Mahli and Mushi: the sons of Jaaziah; Beno. '
  '27':
  - type: text
    content: 'The sons of Merari by Jaaziah; Beno, and Shoham, and Zaccur, and Ibri. '
  '28':
  - type: text
    content: 'Of Mahli '
  - type: text
    content: came
  - type: text
    content: ' Eleazar, who had no sons. '
  '29':
  - type: text
    content: 'Concerning Kish: the son of Kish '
  - type: text
    content: was
  - type: text
    content: ' Jerahmeel. '
  '3':
  - type: text
    content: 'And David distributed them, both Zadok of the sons of Eleazar, and Ahimelech of the sons of Ithamar, according to their offices in their service. '
  '30':
  - type: text
    content: 'The sons also of Mushi; Mahli, and Eder, and Jerimoth. These '
  - type: text
    content: were
  - type: text
    content: ' the sons of the Levites after the house of their fathers. '
  '31':
  - type: text
    content: These likewise cast lots over against their brethren the sons of Aaron in the presence of David the king, and Zadok, and Ahimelech, and the chief of the fathers of the priests and Levites, even the principal fathers over against their younger brethren.
  '4':
  - type: text
    content: 'And there were more chief men found of the sons of Eleazar than of the sons of Ithamar; and '
  - type: text
    content: thus
  - type: text
    content: ' were they divided. Among the sons of Eleazar '
  - type: text
    content: there were
  - type: text
    content: ' sixteen chief men of the house of '
  - type: text
    content: their
  - type: text
    content: ' fathers, and eight among the sons of Ithamar according to the house of their fathers. '
  '5':
  - type: text
    content: 'Thus were they divided by lot, one sort with another; for the governors of the sanctuary, and governors '
  - type: text
    content: of the house
  - type: text
    content: ' of God, were of the sons of Eleazar, and of the sons of Ithamar. '
  '6':
  - type: text
    content: 'And Shemaiah the son of Nethaneel the scribe, '
  - type: text
    content: one
  - type: text
    content: ' of the Levites, wrote them before the king, and the princes, and Zadok the priest, and Ahimelech the son of Abiathar, and '
  - type: text
    content: before
  - type: text
    content: ' the chief of the fathers of the priests and Levites: one principal household being taken for Eleazar, and '
  - type: text
    content: one
  - type: text
    content: ' taken for Ithamar. '
  '7':
  - type: text
    content: 'Now the first lot came forth to Jehoiarib, the second to Jedaiah, '
  '8':
  - type: text
    content: 'the third to Harim, the fourth to Seorim, '
  '9':
  - type: text
    content: 'the fifth to Malchijah, the sixth to Mijamin, '
