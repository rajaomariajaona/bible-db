segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A false balance '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' abomination to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ':'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But a just weight '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' his delight.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: When
  - type: text
    text: ' pride cometh, then cometh shame:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But with the lowly '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' wisdom.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The integrity of the upright shall guide them:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the perverseness of transgressors shall destroy them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Riches profit not in the day of wrath:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But righteousness delivereth from death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The righteousness of the perfect shall direct his way:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the wicked shall fall by his own wickedness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The righteousness of the upright shall deliver them:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But transgressors shall be taken in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their own
  - type: text
    text: ' naughtiness.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'When a wicked man dieth, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' expectation shall perish:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the hope of unjust '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' perisheth.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The righteous is delivered out of trouble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the wicked cometh in his stead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'An hypocrite with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' mouth destroyeth his neighbour:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But through knowledge shall the just be delivered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When it goeth well with the righteous, the city rejoiceth:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And when the wicked perish, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' shouting.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'By the blessing of the upright the city is exalted:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But it is overthrown by the mouth of the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'He that is void of wisdom despiseth his neighbour:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But a man of understanding holdeth his peace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'A talebearer revealeth secrets:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But he that is of a faithful spirit concealeth the matter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Where no counsel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ', the people fall:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But in the multitude of counsellors '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' safety.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He that is surety for a stranger shall smart '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'for it:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And he that hateth suretiship is sure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'A gracious woman retaineth honour:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And strong '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' retain riches.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The merciful man doeth good to his own soul:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he that is
  - type: text
    text: ' cruel troubleth his own flesh.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The wicked worketh a deceitful work:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But to him that soweth righteousness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' a sure reward.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'As righteousness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: tendeth
  - type: text
    text: ' to life:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'So he that pursueth evil '
  - type: usfm
    marker: add
    children:
    - type: text
      text: pursueth it
  - type: text
    text: ' to his own death.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'They that are of a froward heart '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' abomination to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ':'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But '
  - type: usfm
    marker: add
    children:
    - type: text
      text: such as are
  - type: text
    text: ' upright in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' way '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' his delight.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Though
  - type: text
    text: ' hand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: join
  - type: text
    text: ' in hand, the wicked shall not be unpunished:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the seed of the righteous shall be delivered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' a jewel of gold in a swine''s snout,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: So is
  - type: text
    text: ' a fair woman which is without discretion.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The desire of the righteous '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' only good:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: But
  - type: text
    text: ' the expectation of the wicked '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' wrath.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: There is that scattereth, and yet increaseth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' that withholdeth more than is meet, but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it tendeth
  - type: text
    text: ' to poverty.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The liberal soul shall be made fat:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And he that watereth shall be watered also himself.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'He that withholdeth corn, the people shall curse him:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But blessing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' upon the head of him that selleth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'He that diligently seeketh good procureth favour:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But he that seeketh mischief, it shall come unto him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'He that trusteth in his riches shall fall:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the righteous shall flourish as a branch.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'He that troubleth his own house shall inherit the wind:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the fool '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' servant to the wise of heart.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The fruit of the righteous '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a tree of life;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And he that winneth souls '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' wise.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Behold, the righteous shall be recompensed in the earth:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Much more the wicked and the sinner.
