  - type: text
    content: ' his delight.'
  '10':
  - type: text
    content: 'When it goeth well with the righteous, the city rejoiceth:'
  - type: text
    content: 'And when the wicked perish, '
  - type: text
    content: there is
  - type: text
    content: ' shouting.'
  '11':
  - type: text
    content: 'By the blessing of the upright the city is exalted:'
  - type: text
    content: But it is overthrown by the mouth of the wicked.
  '12':
  - type: text
    content: 'He that is void of wisdom despiseth his neighbour:'
  - type: text
    content: But a man of understanding holdeth his peace.
  '13':
  - type: text
    content: 'A talebearer revealeth secrets:'
  - type: text
    content: But he that is of a faithful spirit concealeth the matter.
  '14':
  - type: text
    content: 'Where no counsel '
  - type: text
    content: is
  - type: text
    content: ', the people fall:'
  - type: text
    content: 'But in the multitude of counsellors '
  - type: text
    content: there is
  - type: text
    content: ' safety.'
  '15':
  - type: text
    content: 'He that is surety for a stranger shall smart '
  - type: text
    content: 'for it:'
  - type: text
    content: And he that hateth suretiship is sure.
  '16':
  - type: text
    content: 'A gracious woman retaineth honour:'
  - type: text
    content: 'And strong '
  - type: text
    content: men
  - type: text
    content: ' retain riches.'
  '17':
  - type: text
    content: 'The merciful man doeth good to his own soul:'
  - type: text
    content: 'But '
  - type: text
    content: he that is
  - type: text
    content: ' cruel troubleth his own flesh.'
  '18':
  - type: text
    content: 'The wicked worketh a deceitful work:'
  - type: text
    content: 'But to him that soweth righteousness '
  - type: text
    content: shall be
  - type: text
    content: ' a sure reward.'
  '19':
  - type: text
    content: 'As righteousness '
  - type: text
    content: tendeth
  - type: text
    content: ' to life:'
  - type: text
    content: 'So he that pursueth evil '
  - type: text
    content: pursueth it
  - type: text
    content: ' to his own death.'
  '2':
  - type: text
    content: ' '
  - type: text
    content: When
  - type: text
    content: ' pride cometh, then cometh shame:'
  - type: text
    content: 'But with the lowly '
  - type: text
    content: is
  - type: text
    content: ' wisdom.'
  '20':
  - type: text
    content: 'They that are of a froward heart '
  - type: text
    content: are
  - type: text
    content: ' abomination to the '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: 'But '
  - type: text
    content: such as are
  - type: text
    content: ' upright in '
  - type: text
    content: their
  - type: text
    content: ' way '
  - type: text
    content: are
  - type: text
    content: ' his delight.'
  '21':
  - type: text
    content: ' '
  - type: text
    content: Though
  - type: text
    content: ' hand '
  - type: text
    content: join
  - type: text
    content: ' in hand, the wicked shall not be unpunished:'
  - type: text
    content: But the seed of the righteous shall be delivered.
  '22':
  - type: text
    content: ' '
  - type: text
    content: As
  - type: text
    content: ' a jewel of gold in a swine''s snout,'
  - type: text
    content: So is
  - type: text
    content: ' a fair woman which is without discretion.'
  '23':
  - type: text
    content: 'The desire of the righteous '
  - type: text
    content: is
  - type: text
    content: ' only good:'
  - type: text
    content: But
  - type: text
    content: ' the expectation of the wicked '
  - type: text
    content: is
  - type: text
    content: ' wrath.'
  '24':
  - type: text
    content: There is that scattereth, and yet increaseth;
  - type: text
    content: 'And '
  - type: text
    content: there is
  - type: text
    content: ' that withholdeth more than is meet, but '
  - type: text
    content: it tendeth
  - type: text
    content: ' to poverty.'
  '25':
  - type: text
    content: 'The liberal soul shall be made fat:'
  - type: text
    content: And he that watereth shall be watered also himself.
  '26':
  - type: text
    content: 'He that withholdeth corn, the people shall curse him:'
  - type: text
    content: 'But blessing '
  - type: text
    content: shall be
  - type: text
    content: ' upon the head of him that selleth '
  - type: text
    content: it
  - type: text
    content: .
  '27':
  - type: text
    content: 'He that diligently seeketh good procureth favour:'
  - type: text
    content: But he that seeketh mischief, it shall come unto him.
  '28':
  - type: text
    content: 'He that trusteth in his riches shall fall:'
  - type: text
    content: But the righteous shall flourish as a branch.
  '29':
  - type: text
    content: 'He that troubleth his own house shall inherit the wind:'
  - type: text
    content: 'And the fool '
  - type: text
    content: shall be
  - type: text
    content: ' servant to the wise of heart.'
  '3':
  - type: text
    content: 'The integrity of the upright shall guide them:'
  - type: text
    content: But the perverseness of transgressors shall destroy them.
  '30':
  - type: text
    content: 'The fruit of the righteous '
  - type: text
    content: is
  - type: text
    content: ' a tree of life;'
  - type: text
    content: 'And he that winneth souls '
  - type: text
    content: is
  - type: text
    content: ' wise.'
  '31':
  - type: text
    content: 'Behold, the righteous shall be recompensed in the earth:'
  - type: text
    content: Much more the wicked and the sinner.
  '4':
  - type: text
    content: 'Riches profit not in the day of wrath:'
  - type: text
    content: But righteousness delivereth from death.
  '5':
  - type: text
    content: 'The righteousness of the perfect shall direct his way:'
  - type: text
    content: But the wicked shall fall by his own wickedness.
  '6':
  - type: text
    content: 'The righteousness of the upright shall deliver them:'
  - type: text
    content: 'But transgressors shall be taken in '
  - type: text
    content: their own
  - type: text
    content: ' naughtiness.'
  '7':
  - type: text
    content: 'When a wicked man dieth, '
  - type: text
    content: his
  - type: text
    content: ' expectation shall perish:'
  - type: text
    content: 'And the hope of unjust '
  - type: text
    content: men
  - type: text
    content: ' perisheth.'
  '8':
  - type: text
    content: The righteous is delivered out of trouble,
  - type: text
    content: And the wicked cometh in his stead.
  '9':
  - type: text
    content: 'An hypocrite with '
  - type: text
    content: his
  - type: text
    content: ' mouth destroyeth his neighbour:'
  - type: text
    content: But through knowledge shall the just be delivered.
