document_id: PHM.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Paul, a prisoner of Jesus Christ, and Timothy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: our
  - type: text
    text: ' brother, unto Philemon our dearly beloved, and fellowlabourer, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: our
  - type: text
    text: ' beloved Apphia, and Archippus our fellowsoldier, and to the church in thy house: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: grace to you, and peace, from God our Father and the Lord Jesus Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I thank my God, making mention of thee always in my prayers, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'hearing of thy love and faith, which thou hast toward the Lord Jesus, and toward all saints; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'that the communication of thy faith may become effectual by the acknowledging of every good thing which is in you in Christ Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: For we have great joy and consolation in thy love, because the bowels of the saints are refreshed by thee, brother.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Wherefore, though I might be much bold in Christ to enjoin thee that which is convenient, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'yet for love''s sake I rather beseech '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thee
  - type: text
    text: ', being such an one as Paul the aged, and now also a prisoner of Jesus Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I beseech thee for my son Onesimus, whom I have begotten in my bonds: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'which in time past was to thee unprofitable, but now profitable to thee and to me: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'whom I have sent again: thou therefore receive him, that is, mine own bowels: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'whom I would have retained with me, that in thy stead he might have ministered unto me in the bonds of the gospel: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'but without thy mind would I do nothing; that thy benefit should not be as it were of necessity, but willingly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For perhaps he therefore departed for a season, that thou shouldest receive him for ever; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'not now as a servant, but above a servant, a brother beloved, specially to me, but how much more unto thee, both in the flesh, and in the Lord? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'If thou count me therefore a partner, receive him as myself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'If he hath wronged thee, or oweth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thee
  - type: text
    text: ' ought, put that on mine account; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'I Paul have written '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' with mine own hand, I will repay '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ': albeit I do not say to thee how thou owest unto me even thine own self besides. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Yea, brother, let me have joy of thee in the Lord: refresh my bowels in the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Having confidence in thy obedience I wrote unto thee, knowing that thou wilt also do more than I say. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But withal prepare me also a lodging: for I trust that through your prayers I shall be given unto you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'There salute thee Epaphras, my fellowprisoner in Christ Jesus; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Marcus, Aristarchus, Demas, Lucas, my fellowlabourers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The grace of our Lord Jesus Christ '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' with your spirit. Amen.'
- type: usfm
  marker: iex
  children:
  - type: text
    text: Written from Rome to Philemon, by Onesimus a servant.
