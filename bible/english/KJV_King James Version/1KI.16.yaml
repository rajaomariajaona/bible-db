document_id: 1KI.16,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jehu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came to Jehu the son of Hanani against Baasha, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Zimri went in and smote him, and killed him, in the twenty and seventh year of Asa king of Judah, and reigned in his stead. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, when he began to reign, as soon as he sat on his throne, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' he slew all the house of Baasha: he left him not one that pisseth against a wall, neither of his kinsfolks, nor of his friends. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus did Zimri destroy all the house of Baasha, according to the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', which he spake against Baasha by Jehu the prophet, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for all the sins of Baasha, and the sins of Elah his son, by which they sinned, and by which they made Israel to sin, in provoking the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel to anger with their vanities. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the acts of Elah, and all that he did, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Israel?'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the twenty and seventh year of Asa king of Judah did Zimri reign seven days in Tirzah. And the people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' encamped against Gibbethon, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: belonged
    - type: text
      text: ' to the Philistines. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that were
    - type: text
      text: ' encamped heard say, Zimri hath conspired, and hath also slain the king: wherefore all Israel made Omri, the captain of the host, king over Israel that day in the camp. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Omri went up from Gibbethon, and all Israel with him, and they besieged Tirzah. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, when Zimri saw that the city was taken, that he went into the palace of the king''s house, and burnt the king''s house over him with fire, and died, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for his sins which he sinned in doing evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', in walking in the way of Jeroboam, and in his sin which he did, to make Israel to sin. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Forasmuch as I exalted thee out of the dust, and made thee prince over my people Israel; and thou hast walked in the way of Jeroboam, and hast made my people Israel to sin, to provoke me to anger with their sins; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the acts of Zimri, and his treason that he wrought, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Israel?'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Omri
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then were the people of Israel divided into two parts: half of the people followed Tibni the son of Ginath, to make him king; and half followed Omri. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the people that followed Omri prevailed against the people that followed Tibni the son of Ginath: so Tibni died, and Omri reigned. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the thirty and first year of Asa king of Judah began Omri to reign over Israel, twelve years: six years reigned he in Tirzah. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he bought the hill Samaria of Shemer for two talents of silver, and built on the hill, and called the name of the city which he built, after the name of Shemer, owner of the hill, Samaria. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Omri wrought evil in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and did worse than all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' before him. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For he walked in all the way of Jeroboam the son of Nebat, and in his sin wherewith he made Israel to sin, to provoke the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel to anger with their vanities. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the acts of Omri which he did, and his might that he shewed, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Israel? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Omri slept with his fathers, and was buried in Samaria: and Ahab his son reigned in his stead.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ahab
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in the thirty and eighth year of Asa king of Judah began Ahab the son of Omri to reign over Israel: and Ahab the son of Omri reigned over Israel in Samaria twenty and two years. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'behold, I will take away the posterity of Baasha, and the posterity of his house; and will make thy house like the house of Jeroboam the son of Nebat. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Ahab the son of Omri did evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' above all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' before him. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, as if it had been a light thing for him to walk in the sins of Jeroboam the son of Nebat, that he took to wife Jezebel the daughter of Ethbaal king of the Zidonians, and went and served Baal, and worshipped him. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he reared up an altar for Baal in the house of Baal, which he had built in Samaria. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Ahab made a grove; and Ahab did more to provoke the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel to anger than all the kings of Israel that were before him. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In his days did Hiel the Beth-elite build Jericho: he laid the foundation thereof in Abiram his firstborn, and set up the gates thereof in his youngest '
    - type: usfm
      marker: add
      children:
      - type: text
        text: son
    - type: text
      text: ' Segub, according to the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', which he spake by Joshua the son of Nun.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Him that dieth of Baasha in the city shall the dogs eat; and him that dieth of his in the fields shall the fowls of the air eat.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the acts of Baasha, and what he did, and his might, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Israel? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Baasha slept with his fathers, and was buried in Tirzah: and Elah his son reigned in his stead. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And also by the hand of the prophet Jehu the son of Hanani came the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' against Baasha, and against his house, even for all the evil that he did in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', in provoking him to anger with the work of his hands, in being like the house of Jeroboam; and because he killed him.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Civil War in Israel
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the twenty and sixth year of Asa king of Judah began Elah the son of Baasha to reign over Israel in Tirzah, two years. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And his servant Zimri, captain of half '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' chariots, conspired against him, as he was in Tirzah, drinking himself drunk in the house of Arza steward of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' house in Tirzah. '
