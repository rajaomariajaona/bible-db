document_id: 1KI.16,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehu
  - type: text
    content: 'Then the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came to Jehu the son of Hanani against Baasha, saying, '
  '10':
  - type: text
    content: 'And Zimri went in and smote him, and killed him, in the twenty and seventh year of Asa king of Judah, and reigned in his stead. '
  '11':
  - type: text
    content: 'And it came to pass, when he began to reign, as soon as he sat on his throne, '
  - type: text
    content: that
  - type: text
    content: ' he slew all the house of Baasha: he left him not one that pisseth against a wall, neither of his kinsfolks, nor of his friends. '
  '12':
  - type: text
    content: 'Thus did Zimri destroy all the house of Baasha, according to the word of the '
  - type: text
    content: LORD
  - type: text
    content: ', which he spake against Baasha by Jehu the prophet, '
  '13':
  - type: text
    content: 'for all the sins of Baasha, and the sins of Elah his son, by which they sinned, and by which they made Israel to sin, in provoking the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel to anger with their vanities. '
  '14':
  - type: text
    content: 'Now the rest of the acts of Elah, and all that he did, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Israel?'
  '15':
  - type: text
    content: 'In the twenty and seventh year of Asa king of Judah did Zimri reign seven days in Tirzah. And the people '
  - type: text
    content: were
  - type: text
    content: ' encamped against Gibbethon, which '
  - type: text
    content: belonged
  - type: text
    content: ' to the Philistines. '
  '16':
  - type: text
    content: 'And the people '
  - type: text
    content: that were
  - type: text
    content: ' encamped heard say, Zimri hath conspired, and hath also slain the king: wherefore all Israel made Omri, the captain of the host, king over Israel that day in the camp. '
  '17':
  - type: text
    content: 'And Omri went up from Gibbethon, and all Israel with him, and they besieged Tirzah. '
  '18':
  - type: text
    content: 'And it came to pass, when Zimri saw that the city was taken, that he went into the palace of the king''s house, and burnt the king''s house over him with fire, and died, '
  '19':
  - type: text
    content: 'for his sins which he sinned in doing evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', in walking in the way of Jeroboam, and in his sin which he did, to make Israel to sin. '
  '2':
  - type: text
    content: 'Forasmuch as I exalted thee out of the dust, and made thee prince over my people Israel; and thou hast walked in the way of Jeroboam, and hast made my people Israel to sin, to provoke me to anger with their sins; '
  '20':
  - type: text
    content: 'Now the rest of the acts of Zimri, and his treason that he wrought, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Israel?'
  - type: heading
    content: Omri
  '21':
  - type: text
    content: 'Then were the people of Israel divided into two parts: half of the people followed Tibni the son of Ginath, to make him king; and half followed Omri. '
  '22':
  - type: text
    content: 'But the people that followed Omri prevailed against the people that followed Tibni the son of Ginath: so Tibni died, and Omri reigned. '
  '23':
  - type: text
    content: 'In the thirty and first year of Asa king of Judah began Omri to reign over Israel, twelve years: six years reigned he in Tirzah. '
  '24':
  - type: text
    content: 'And he bought the hill Samaria of Shemer for two talents of silver, and built on the hill, and called the name of the city which he built, after the name of Shemer, owner of the hill, Samaria. '
  '25':
  - type: text
    content: 'But Omri wrought evil in the eyes of the '
  - type: text
    content: LORD
  - type: text
    content: ', and did worse than all that '
  - type: text
    content: were
  - type: text
    content: ' before him. '
  '26':
  - type: text
    content: 'For he walked in all the way of Jeroboam the son of Nebat, and in his sin wherewith he made Israel to sin, to provoke the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel to anger with their vanities. '
  '27':
  - type: text
    content: 'Now the rest of the acts of Omri which he did, and his might that he shewed, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Israel? '
  '28':
  - type: text
    content: 'So Omri slept with his fathers, and was buried in Samaria: and Ahab his son reigned in his stead.'
  - type: heading
    content: Ahab
  '29':
  - type: text
    content: 'And in the thirty and eighth year of Asa king of Judah began Ahab the son of Omri to reign over Israel: and Ahab the son of Omri reigned over Israel in Samaria twenty and two years. '
  '3':
  - type: text
    content: 'behold, I will take away the posterity of Baasha, and the posterity of his house; and will make thy house like the house of Jeroboam the son of Nebat. '
  '30':
  - type: text
    content: 'And Ahab the son of Omri did evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ' above all that '
  - type: text
    content: were
  - type: text
    content: ' before him. '
  '31':
  - type: text
    content: 'And it came to pass, as if it had been a light thing for him to walk in the sins of Jeroboam the son of Nebat, that he took to wife Jezebel the daughter of Ethbaal king of the Zidonians, and went and served Baal, and worshipped him. '
  '32':
  - type: text
    content: 'And he reared up an altar for Baal in the house of Baal, which he had built in Samaria. '
  '33':
  - type: text
    content: 'And Ahab made a grove; and Ahab did more to provoke the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel to anger than all the kings of Israel that were before him. '
  '34':
  - type: text
    content: 'In his days did Hiel the Beth-elite build Jericho: he laid the foundation thereof in Abiram his firstborn, and set up the gates thereof in his youngest '
  - type: text
    content: son
  - type: text
    content: ' Segub, according to the word of the '
  - type: text
    content: LORD
  - type: text
    content: ', which he spake by Joshua the son of Nun.'
  '4':
  - type: text
    content: Him that dieth of Baasha in the city shall the dogs eat; and him that dieth of his in the fields shall the fowls of the air eat.
  '5':
  - type: text
    content: 'Now the rest of the acts of Baasha, and what he did, and his might, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Israel? '
  '6':
  - type: text
    content: 'So Baasha slept with his fathers, and was buried in Tirzah: and Elah his son reigned in his stead. '
  '7':
  - type: text
    content: 'And also by the hand of the prophet Jehu the son of Hanani came the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' against Baasha, and against his house, even for all the evil that he did in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', in provoking him to anger with the work of his hands, in being like the house of Jeroboam; and because he killed him.'
  - type: heading
    content: Civil War in Israel
  '8':
  - type: text
    content: 'In the twenty and sixth year of Asa king of Judah began Elah the son of Baasha to reign over Israel in Tirzah, two years. '
  '9':
  - type: text
    content: 'And his servant Zimri, captain of half '
  - type: text
    content: his
  - type: text
    content: ' chariots, conspired against him, as he was in Tirzah, drinking himself drunk in the house of Arza steward of '
  - type: text
    content: his
  - type: text
    content: ' house in Tirzah. '
