verses:
  '1':
  - type: heading
    content: A Last Appeal
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the words of the covenant, which the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses to make with the children of Israel in the land of Moab, beside the covenant which he made with them in Horeb.'
  '10':
  - type: text
    content: 'Ye stand this day all of you before the '
  - type: text
    content: LORD
  - type: text
    content: ' your God; your captains of your tribes, your elders, and your officers, '
  - type: text
    content: with
  - type: text
    content: ' all the men of Israel, '
  '11':
  - type: text
    content: 'your little ones, your wives, and thy stranger that '
  - type: text
    content: is
  - type: text
    content: ' in thy camp, from the hewer of thy wood unto the drawer of thy water: '
  '12':
  - type: text
    content: 'that thou shouldest enter into covenant with the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God, and into his oath, which the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God maketh with thee this day: '
  '13':
  - type: text
    content: 'that he may establish thee to day for a people unto himself, and '
  - type: text
    content: that
  - type: text
    content: ' he may be unto thee a God, as he hath said unto thee, and as he hath sworn unto thy fathers, to Abraham, to Isaac, and to Jacob.'
  '14':
  - type: text
    content: 'Neither with you only do I make this covenant and this oath; '
  '15':
  - type: text
    content: 'but with '
  - type: text
    content: him
  - type: text
    content: ' that standeth here with us this day before the '
  - type: text
    content: LORD
  - type: text
    content: ' our God, and also with '
  - type: text
    content: him
  - type: text
    content: ' that '
  - type: text
    content: is
  - type: text
    content: ' not here with us this day: '
  '16':
  - type: text
    content: '(for ye know how we have dwelt in the land of Egypt; and how we came through the nations which ye passed by; '
  '17':
  - type: text
    content: 'and ye have seen their abominations, and their idols, wood and stone, silver and gold, which '
  - type: text
    content: were
  - type: text
    content: ' among them:) '
  '18':
  - type: text
    content: 'lest there should be among you man, or woman, or family, or tribe, whose heart turneth away this day from the '
  - type: text
    content: LORD
  - type: text
    content: ' our God, to go '
  - type: text
    content: and
  - type: text
    content: ' serve the gods of these nations; lest there should be among you a root that beareth gall and wormwood; '
  '19':
  - type: text
    content: 'and it come to pass, when he heareth the words of this curse, that he bless himself in his heart, saying, I shall have peace, though I walk in the imagination of mine heart, to add drunkenness to thirst: '
  '2':
  - type: text
    content: 'And Moses called unto all Israel, and said unto them, Ye have seen all that the '
  - type: text
    content: LORD
  - type: text
    content: ' did before your eyes in the land of Egypt unto Pharaoh, and unto all his servants, and unto all his land; '
  '20':
  - type: text
    content: 'the '
  - type: text
    content: LORD
  - type: text
    content: ' will not spare him, but then the anger of the '
  - type: text
    content: LORD
  - type: text
    content: ' and his jealousy shall smoke against that man, and all the curses that are written in this book shall lie upon him, and the '
  - type: text
    content: LORD
  - type: text
    content: ' shall blot out his name from under heaven. '
  '21':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' shall separate him unto evil out of all the tribes of Israel, according to all the curses of the covenant that are written in this book of the law: '
  '22':
  - type: text
    content: 'so that the generation to come of your children that shall rise up after you, and the stranger that shall come from a far land, shall say, when they see the plagues of that land, and the sicknesses which the '
  - type: text
    content: LORD
  - type: text
    content: ' hath laid upon it; '
  '23':
  - type: text
    content: and that
  - type: text
    content: ' the whole land thereof '
  - type: text
    content: is
  - type: text
    content: ' brimstone, and salt, '
  - type: text
    content: and
  - type: text
    content: ' burning, '
  - type: text
    content: that
  - type: text
    content: ' it is not sown, nor beareth, nor any grass groweth therein, like the overthrow of Sodom, and Gomorrah, Admah, and Zeboim, which the '
  - type: text
    content: LORD
  - type: text
    content: ' overthrew in his anger, and in his wrath: '
  '24':
  - type: text
    content: 'even all nations shall say, Wherefore hath the '
  - type: text
    content: LORD
  - type: text
    content: ' done thus unto this land? what '
  - type: text
    content: meaneth
  - type: text
    content: ' the heat of this great anger? '
  '25':
  - type: text
    content: 'Then men shall say, Because they have forsaken the covenant of the '
  - type: text
    content: LORD
  - type: text
    content: ' God of their fathers, which he made with them when he brought them forth out of the land of Egypt: '
  '26':
  - type: text
    content: 'for they went and served other gods, and worshipped them, gods whom they knew not, and '
  - type: text
    content: whom
  - type: text
    content: ' he had not given unto them: '
  '27':
  - type: text
    content: 'and the anger of the '
  - type: text
    content: LORD
  - type: text
    content: ' was kindled against this land, to bring upon it all the curses that are written in this book: '
  '28':
  - type: text
    content: 'and the '
  - type: text
    content: LORD
  - type: text
    content: ' rooted them out of their land in anger, and in wrath, and in great indignation, and cast them into another land, as '
  - type: text
    content: it is
  - type: text
    content: ' this day. '
  '29':
  - type: text
    content: 'The secret '
  - type: text
    content: things belong
  - type: text
    content: ' unto the '
  - type: text
    content: LORD
  - type: text
    content: ' our God: but those '
  - type: text
    content: things which are
  - type: text
    content: ' revealed '
  - type: text
    content: belong
  - type: text
    content: ' unto us and to our children for ever, that '
  - type: text
    content: we
  - type: text
    content: ' may do all the words of this law.'
  '3':
  - type: text
    content: 'the great temptations which thine eyes have seen, the signs, and those great miracles: '
  '4':
  - type: text
    content: 'yet the '
  - type: text
    content: LORD
  - type: text
    content: ' hath not given you an heart to perceive, and eyes to see, and ears to hear, unto this day. '
  '5':
  - type: text
    content: 'And I have led you forty years in the wilderness: your clothes are not waxen old upon you, and thy shoe is not waxen old upon thy foot. '
  '6':
  - type: text
    content: 'Ye have not eaten bread, neither have ye drunk wine or strong drink: that ye might know that I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' your God. '
  '7':
  - type: text
    content: 'And when ye came unto this place, Sihon the king of Heshbon, and Og the king of Bashan, came out against us unto battle, and we smote them: '
  '8':
  - type: text
    content: 'and we took their land, and gave it for an inheritance unto the Reubenites, and to the Gadites, and to the half tribe of Manasseh. '
  '9':
  - type: text
    content: Keep therefore the words of this covenant, and do them, that ye may prosper in all that ye do.
