document_id: DEU.29,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: A Last Appeal
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the words of the covenant, which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commanded Moses to make with the children of Israel in the land of Moab, beside the covenant which he made with them in Horeb.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ye stand this day all of you before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God; your captains of your tribes, your elders, and your officers, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' all the men of Israel, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'your little ones, your wives, and thy stranger that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in thy camp, from the hewer of thy wood unto the drawer of thy water: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'that thou shouldest enter into covenant with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God, and into his oath, which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God maketh with thee this day: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'that he may establish thee to day for a people unto himself, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' he may be unto thee a God, as he hath said unto thee, and as he hath sworn unto thy fathers, to Abraham, to Isaac, and to Jacob.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Neither with you only do I make this covenant and this oath; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'but with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' that standeth here with us this day before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God, and also with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not here with us this day: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '(for ye know how we have dwelt in the land of Egypt; and how we came through the nations which ye passed by; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'and ye have seen their abominations, and their idols, wood and stone, silver and gold, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' among them:) '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'lest there should be among you man, or woman, or family, or tribe, whose heart turneth away this day from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God, to go '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' serve the gods of these nations; lest there should be among you a root that beareth gall and wormwood; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'and it come to pass, when he heareth the words of this curse, that he bless himself in his heart, saying, I shall have peace, though I walk in the imagination of mine heart, to add drunkenness to thirst: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And Moses called unto all Israel, and said unto them, Ye have seen all that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' did before your eyes in the land of Egypt unto Pharaoh, and unto all his servants, and unto all his land; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will not spare him, but then the anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' and his jealousy shall smoke against that man, and all the curses that are written in this book shall lie upon him, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall blot out his name from under heaven. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall separate him unto evil out of all the tribes of Israel, according to all the curses of the covenant that are written in this book of the law: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'so that the generation to come of your children that shall rise up after you, and the stranger that shall come from a far land, shall say, when they see the plagues of that land, and the sicknesses which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath laid upon it; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: add
      children:
      - type: text
        text: and that
    - type: text
      text: ' the whole land thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' brimstone, and salt, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' burning, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' it is not sown, nor beareth, nor any grass groweth therein, like the overthrow of Sodom, and Gomorrah, Admah, and Zeboim, which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' overthrew in his anger, and in his wrath: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'even all nations shall say, Wherefore hath the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' done thus unto this land? what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: meaneth
    - type: text
      text: ' the heat of this great anger? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Then men shall say, Because they have forsaken the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of their fathers, which he made with them when he brought them forth out of the land of Egypt: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'for they went and served other gods, and worshipped them, gods whom they knew not, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whom
    - type: text
      text: ' he had not given unto them: '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'and the anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was kindled against this land, to bring upon it all the curses that are written in this book: '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' rooted them out of their land in anger, and in wrath, and in great indignation, and cast them into another land, as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' this day. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'The secret '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things belong
    - type: text
      text: ' unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God: but those '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things which are
    - type: text
      text: ' revealed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: belong
    - type: text
      text: ' unto us and to our children for ever, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: we
    - type: text
      text: ' may do all the words of this law.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'the great temptations which thine eyes have seen, the signs, and those great miracles: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'yet the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath not given you an heart to perceive, and eyes to see, and ears to hear, unto this day. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And I have led you forty years in the wilderness: your clothes are not waxen old upon you, and thy shoe is not waxen old upon thy foot. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ye have not eaten bread, neither have ye drunk wine or strong drink: that ye might know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And when ye came unto this place, Sihon the king of Heshbon, and Og the king of Bashan, came out against us unto battle, and we smote them: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'and we took their land, and gave it for an inheritance unto the Reubenites, and to the Gadites, and to the half tribe of Manasseh. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Keep therefore the words of this covenant, and do them, that ye may prosper in all that ye do.
