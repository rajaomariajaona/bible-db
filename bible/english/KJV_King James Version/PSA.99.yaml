      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' holy.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The king's strength also loveth judgment; Thou dost establish equity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou executest judgment and righteousness in Jacob.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Exalt ye the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And worship at his footstool; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: For
    - type: text
      text: ' he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' holy.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moses and Aaron among his priests, and Samuel among them that call upon his name;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They called upon the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and he answered them.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He spake unto them in the cloudy pillar:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They kept his testimonies, and the ordinance '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' he gave them.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou answeredst them, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou wast a God that forgavest them, though thou tookest vengeance of their inventions.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Exalt the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God, and worship at his holy hill;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' holy.'
