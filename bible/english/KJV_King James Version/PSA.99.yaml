    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' great in Zion;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' high above all the people.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them praise thy great and terrible name;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: For
    - type: text
      text: ' it '
