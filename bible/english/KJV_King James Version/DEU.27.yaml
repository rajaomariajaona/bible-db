document_id: DEU.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The People of God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Moses with the elders of Israel commanded the people, saying, Keep all the commandments which I command you this day. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And it shall be on the day when ye shall pass over Jordan unto the land which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God giveth thee, that thou shalt set thee up great stones, and plaister them with plaister: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and thou shalt write upon them all the words of this law, when thou art passed over, that thou mayest go in unto the land which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God giveth thee, a land that floweth with milk and honey; as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of thy fathers hath promised thee. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Therefore it shall be when ye be gone over Jordan, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' ye shall set up these stones, which I command you this day, in mount Ebal, and thou shalt plaister them with plaister. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And there shalt thou build an altar unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, an altar of stones: thou shalt not lift up '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' iron '
  - type: usfm
    marker: add
    children:
    - type: text
      text: tool
  - type: text
    text: ' upon them. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Thou shalt build the altar of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God of whole stones: and thou shalt offer burnt offerings thereon unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and thou shalt offer peace offerings, and shalt eat there, and rejoice before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And thou shalt write upon the stones all the words of this law very plainly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And Moses and the priests the Levites spake unto all Israel, saying, Take heed, and hearken, O Israel; this day thou art become the people of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Thou shalt therefore obey the voice of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, and do his commandments and his statutes, which I command thee this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Moses charged the people the same day, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'These shall stand upon mount Gerizim to bless the people, when ye are come over Jordan; Simeon, and Levi, and Judah, and Issachar, and Joseph, and Benjamin: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: and these shall stand upon mount Ebal to curse; Reuben, Gad, and Asher, and Zebulun, Dan, and Naphtali.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And the Levites shall speak, and say unto all the men of Israel with a loud voice,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Cursed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' the man that maketh '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' graven or molten image, an abomination unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the work of the hands of the craftsman, and putteth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' in a secret place. And all the people shall answer and say, Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Cursed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' he that setteth light by his father or his mother. And all the people shall say, Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Cursed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' he that removeth his neighbour''s landmark. And all the people shall say, Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Cursed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' he that maketh the blind to wander out of the way. And all the people shall say, Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Cursed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' he that perverteth the judgment of the stranger, fatherless, and widow. And all the people shall say, Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Cursed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' he that lieth with his father''s wife; because he uncovereth his father''s skirt. And all the people shall say, Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Cursed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' he that lieth with any manner of beast. And all the people shall say, Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Cursed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' he that lieth with his sister, the daughter of his father, or the daughter of his mother. And all the people shall say, Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Cursed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' he that lieth with his mother in law. And all the people shall say, Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Cursed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' he that smiteth his neighbour secretly. And all the people shall say, Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Cursed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' he that taketh reward to slay an innocent person. And all the people shall say, Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Cursed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' he that confirmeth not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: all
  - type: text
    text: ' the words of this law to do them. And all the people shall say, Amen.'
