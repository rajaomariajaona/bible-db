document_id: JON.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came unto Jonah the son of Amittai, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Arise, go to Nineveh, that great city, and cry against it; for their wickedness is come up before me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But Jonah rose up to flee unto Tarshish from the presence of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and went down to Joppa; and he found a ship going to Tarshish: so he paid the fare thereof, and went down into it, to go with them unto Tarshish from the presence of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' sent out a great wind into the sea, and there was a mighty tempest in the sea, so that the ship was like to be broken. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the mariners were afraid, and cried every man unto his god, and cast forth the wares that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in the ship into the sea, to lighten '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' of them. But Jonah was gone down into the sides of the ship; and he lay, and was fast asleep. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So the shipmaster came to him, and said unto him, What meanest thou, O sleeper? arise, call upon thy God, if so be that God will think upon us, that we perish not. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And they said every one to his fellow, Come, and let us cast lots, that we may know for whose cause this evil '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon us. So they cast lots, and the lot fell upon Jonah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then said they unto him, Tell us, we pray thee, for whose cause this evil '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon us; What '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thine occupation? and whence comest thou? what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy country? and of what people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' thou? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And he said unto them, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' an Hebrew; and I fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the God of heaven, which hath made the sea and the dry '
  - type: usfm
    marker: add
    children:
    - type: text
      text: land
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then were the men exceedingly afraid, and said unto him, Why hast thou done this? For the men knew that he fled from the presence of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', because he had told them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then said they unto him, What shall we do unto thee, that the sea may be calm unto us? for the sea wrought, and was tempestuous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And he said unto them, Take me up, and cast me forth into the sea; so shall the sea be calm unto you: for I know that for my sake this great tempest '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nevertheless the men rowed hard to bring '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to the land; but they could not: for the sea wrought, and was tempestuous against them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Wherefore they cried unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and said, We beseech thee, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', we beseech thee, let us not perish for this man''s life, and lay not upon us innocent blood: for thou, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', hast done as it pleased thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So they took up Jonah, and cast him forth into the sea: and the sea ceased from her raging. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then the men feared the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' exceedingly, and offered a sacrifice unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and made vows.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Prophet's Prayer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had prepared a great fish to swallow up Jonah. And Jonah was in the belly of the fish three days and three nights.'
