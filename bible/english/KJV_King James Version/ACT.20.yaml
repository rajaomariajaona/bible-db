document_id: ACT.20
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Macedonia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And after the uproar was ceased, Paul called unto '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' the disciples, and embraced '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ', and departed for to go into Macedonia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And when he had gone over those parts, and had given them much exhortation, he came into Greece, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there
  - type: text
    text: ' abode three months. And when the Jews laid wait for him, as he was about to sail into Syria, he purposed to return through Macedonia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And there accompanied him into Asia Sopater of Berea; and of the Thessalonians, Aristarchus and Secundus; and Gaius of Derbe, and Timotheus; and of Asia, Tychicus and Trophimus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: These going before tarried for us at Troas.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Troas
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And we sailed away from Philippi after the days of unleavened bread, and came unto them to Troas in five days; where we abode seven days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And upon the first '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' of the week, when the disciples came together to break bread, Paul preached unto them, ready to depart on the morrow; and continued his speech until midnight. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And there were many lights in the upper chamber, where they were gathered together.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And there sat in a window a certain young man named Eutychus, being fallen into a deep sleep: and as Paul was long preaching, he sunk down with sleep, and fell down from the third loft, and was taken up dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Paul went down, and fell on him, and embracing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' said, Trouble not yourselves; for his life is in him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'When he therefore was come up again, and had broken bread, and eaten, and talked a long while, even till break of day, so he departed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And they brought the young man alive, and were not a little comforted.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Assos
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And we went before to ship, and sailed unto Assos, there intending to take in Paul: for so had he appointed, minding himself to go afoot. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And when he met with us at Assos, we took him in, and came to Mitylene. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And we sailed thence, and came the next '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' over against Chios; and the next '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' we arrived at Samos, and tarried at Trogyllium; and the next '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' we came to Miletus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For Paul had determined to sail by Ephesus, because he would not spend the time in Asia: for he hasted, if it were possible for him, to be at Jerusalem the day of Pentecost.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Miletus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And from Miletus he sent to Ephesus, and called the elders of the church. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And when they were come to him, he said unto them, Ye know, from the first day that I came into Asia, after what manner I have been with you at all seasons, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'serving the Lord with all humility of mind, and with many tears, and temptations, which befell me by the lying in wait of the Jews: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' how I kept back nothing that was profitable '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unto you
  - type: text
    text: ', but have shewed you, and have taught you publickly, and from house to house, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'testifying both to the Jews, and also to the Greeks, repentance toward God, and faith toward our Lord Jesus Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And now, behold, I go bound in the spirit unto Jerusalem, not knowing the things that shall befall me there: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'save that the Holy Ghost witnesseth in every city, saying that bonds and afflictions abide me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'But none of these things move me, neither count I my life dear unto myself, so that I might finish my course with joy, and the ministry, which I have received of the Lord Jesus, to testify the gospel of the grace of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And now, behold, I know that ye all, among whom I have gone preaching the kingdom of God, shall see my face no more. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Wherefore I take you to record this day, that I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' pure from the blood of all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: For I have not shunned to declare unto you all the counsel of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Take heed therefore unto yourselves, and to all the flock, over the which the Holy Ghost hath made you overseers, to feed the church of God, which he hath purchased with his own blood. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'For I know this, that after my departing shall grievous wolves enter in among you, not sparing the flock. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Also of your own selves shall men arise, speaking perverse things, to draw away disciples after them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Therefore watch, and remember, that by the space of three years I ceased not to warn every one night and day with tears.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And now, brethren, I commend you to God, and to the word of his grace, which is able to build you up, and to give you an inheritance among all them which are sanctified. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'I have coveted no man''s silver, or gold, or apparel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Yea, ye yourselves know, that these hands have ministered unto my necessities, and to them that were with me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'I have shewed you all things, how that so labouring ye ought to support the weak, and to remember the words of the Lord Jesus, how he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: It is more blessed to give than to receive.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And when he had thus spoken, he kneeled down, and prayed with them all. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And they all wept sore, and fell on Paul''s neck, and kissed him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: sorrowing most of all for the words which he spake, that they should see his face no more. And they accompanied him unto the ship.
