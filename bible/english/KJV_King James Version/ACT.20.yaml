document_id: ACT.20,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Macedonia
  - type: text
    content: 'And after the uproar was ceased, Paul called unto '
  - type: text
    content: him
  - type: text
    content: ' the disciples, and embraced '
  - type: text
    content: them
  - type: text
    content: ', and departed for to go into Macedonia. '
  '10':
  - type: text
    content: 'And Paul went down, and fell on him, and embracing '
  - type: text
    content: him
  - type: text
    content: ' said, Trouble not yourselves; for his life is in him. '
  '11':
  - type: text
    content: 'When he therefore was come up again, and had broken bread, and eaten, and talked a long while, even till break of day, so he departed. '
  '12':
  - type: text
    content: And they brought the young man alive, and were not a little comforted.
  - type: heading
    content: Assos
  '13':
  - type: text
    content: 'And we went before to ship, and sailed unto Assos, there intending to take in Paul: for so had he appointed, minding himself to go afoot. '
  '14':
  - type: text
    content: 'And when he met with us at Assos, we took him in, and came to Mitylene. '
  '15':
  - type: text
    content: 'And we sailed thence, and came the next '
  - type: text
    content: day
  - type: text
    content: ' over against Chios; and the next '
  - type: text
    content: day
  - type: text
    content: ' we arrived at Samos, and tarried at Trogyllium; and the next '
  - type: text
    content: day
  - type: text
    content: ' we came to Miletus. '
  '16':
  - type: text
    content: 'For Paul had determined to sail by Ephesus, because he would not spend the time in Asia: for he hasted, if it were possible for him, to be at Jerusalem the day of Pentecost.'
  - type: heading
    content: Miletus
  '17':
  - type: text
    content: 'And from Miletus he sent to Ephesus, and called the elders of the church. '
  '18':
  - type: text
    content: 'And when they were come to him, he said unto them, Ye know, from the first day that I came into Asia, after what manner I have been with you at all seasons, '
  '19':
  - type: text
    content: 'serving the Lord with all humility of mind, and with many tears, and temptations, which befell me by the lying in wait of the Jews: '
  '2':
  - type: text
    content: 'And when he had gone over those parts, and had given them much exhortation, he came into Greece, '
  '20':
  - type: text
    content: and
  - type: text
    content: ' how I kept back nothing that was profitable '
  - type: text
    content: unto you
  - type: text
    content: ', but have shewed you, and have taught you publickly, and from house to house, '
  '21':
  - type: text
    content: 'testifying both to the Jews, and also to the Greeks, repentance toward God, and faith toward our Lord Jesus Christ. '
  '22':
  - type: text
    content: 'And now, behold, I go bound in the spirit unto Jerusalem, not knowing the things that shall befall me there: '
  '23':
  - type: text
    content: 'save that the Holy Ghost witnesseth in every city, saying that bonds and afflictions abide me. '
  '24':
  - type: text
    content: 'But none of these things move me, neither count I my life dear unto myself, so that I might finish my course with joy, and the ministry, which I have received of the Lord Jesus, to testify the gospel of the grace of God. '
  '25':
  - type: text
    content: 'And now, behold, I know that ye all, among whom I have gone preaching the kingdom of God, shall see my face no more. '
  '26':
  - type: text
    content: 'Wherefore I take you to record this day, that I '
  - type: text
    content: am
  - type: text
    content: ' pure from the blood of all '
  - type: text
    content: men
  - type: text
    content: '. '
  '27':
  - type: text
    content: For I have not shunned to declare unto you all the counsel of God.
  '28':
  - type: text
    content: 'Take heed therefore unto yourselves, and to all the flock, over the which the Holy Ghost hath made you overseers, to feed the church of God, which he hath purchased with his own blood. '
  '29':
  - type: text
    content: 'For I know this, that after my departing shall grievous wolves enter in among you, not sparing the flock. '
  '3':
  - type: text
    content: 'and '
  - type: text
    content: there
  - type: text
    content: ' abode three months. And when the Jews laid wait for him, as he was about to sail into Syria, he purposed to return through Macedonia. '
  '30':
  - type: text
    content: 'Also of your own selves shall men arise, speaking perverse things, to draw away disciples after them. '
  '31':
  - type: text
    content: Therefore watch, and remember, that by the space of three years I ceased not to warn every one night and day with tears.
  '32':
  - type: text
    content: 'And now, brethren, I commend you to God, and to the word of his grace, which is able to build you up, and to give you an inheritance among all them which are sanctified. '
  '33':
  - type: text
    content: 'I have coveted no man''s silver, or gold, or apparel. '
  '34':
  - type: text
    content: 'Yea, ye yourselves know, that these hands have ministered unto my necessities, and to them that were with me. '
  '35':
  - type: text
    content: 'I have shewed you all things, how that so labouring ye ought to support the weak, and to remember the words of the Lord Jesus, how he said, '
  - type: text
    content: It is more blessed to give than to receive.
  '36':
  - type: text
    content: 'And when he had thus spoken, he kneeled down, and prayed with them all. '
  '37':
  - type: text
    content: 'And they all wept sore, and fell on Paul''s neck, and kissed him, '
  '38':
  - type: text
    content: sorrowing most of all for the words which he spake, that they should see his face no more. And they accompanied him unto the ship.
  '4':
  - type: text
    content: 'And there accompanied him into Asia Sopater of Berea; and of the Thessalonians, Aristarchus and Secundus; and Gaius of Derbe, and Timotheus; and of Asia, Tychicus and Trophimus. '
  '5':
  - type: text
    content: These going before tarried for us at Troas.
  - type: heading
    content: Troas
  '6':
  - type: text
    content: 'And we sailed away from Philippi after the days of unleavened bread, and came unto them to Troas in five days; where we abode seven days. '
  '7':
  - type: text
    content: 'And upon the first '
  - type: text
    content: day
  - type: text
    content: ' of the week, when the disciples came together to break bread, Paul preached unto them, ready to depart on the morrow; and continued his speech until midnight. '
  '8':
  - type: text
    content: And there were many lights in the upper chamber, where they were gathered together.
  '9':
  - type: text
    content: 'And there sat in a window a certain young man named Eutychus, being fallen into a deep sleep: and as Paul was long preaching, he sunk down with sleep, and fell down from the third loft, and was taken up dead. '
