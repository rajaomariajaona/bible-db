  '10':
  - type: text
    content: 'Therefore thus saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: '; Because thou hast lifted up thyself in height, and he hath shot up his top among the thick boughs, and his heart is lifted up in his height; '
  '11':
  - type: text
    content: 'I have therefore delivered him into the hand of the mighty one of the heathen; he shall surely deal with him: I have driven him out for his wickedness. '
  '12':
  - type: text
    content: 'And strangers, the terrible of the nations, have cut him off, and have left him: upon the mountains and in all the valleys his branches are fallen, and his boughs are broken by all the rivers of the land; and all the people of the earth are gone down from his shadow, and have left him. '
  '13':
  - type: text
    content: 'Upon his ruin shall all the fowls of the heaven remain, and all the beasts of the field shall be upon his branches: '
  '14':
  - type: text
    content: 'to the end that none of all the trees by the waters exalt themselves for their height, neither shoot up their top among the thick boughs, neither their trees stand up in their height, all that drink water: for they are all delivered unto death, to the nether parts of the earth, in the midst of the children of men, with them that go down to the pit.'
  '15':
  - type: text
    content: 'Thus saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: '; In the day when he went down to the grave I caused a mourning: I covered the deep for him, and I restrained the floods thereof, and the great waters were stayed: and I caused Lebanon to mourn for him, and all the trees of the field fainted for him. '
  '16':
  - type: text
    content: 'I made the nations to shake at the sound of his fall, when I cast him down to hell with them that descend into the pit: and all the trees of Eden, the choice and best of Lebanon, all that drink water, shall be comforted in the nether parts of the earth. '
  '17':
  - type: text
    content: 'They also went down into hell with him unto '
  - type: text
    content: them that be
  - type: text
    content: ' slain with the sword; and '
  - type: text
    content: they that were
  - type: text
    content: ' his arm, '
  - type: text
    content: that
  - type: text
    content: ' dwelt under his shadow in the midst of the heathen.'
  '18':
  - type: text
    content: 'To whom art thou thus like in glory and in greatness among the trees of Eden? yet shalt thou be brought down with the trees of Eden unto the nether parts of the earth: thou shalt lie in the midst of the uncircumcised with '
  - type: text
    content: them that be
  - type: text
    content: ' slain by the sword. This '
  - type: text
    content: is
  - type: text
    content: ' Pharaoh and all his multitude, saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: .
  '2':
  - type: text
    content: 'Son of man, speak unto Pharaoh king of Egypt, and to his multitude; Whom art thou like in thy greatness? '
  '3':
  - type: text
    content: 'Behold, the Assyrian '
  - type: text
    content: was
  - type: text
    content: ' a cedar in Lebanon with fair branches, and with a shadowing shroud, and of an high stature; and his top was among the thick boughs. '
  '4':
  - type: text
    content: 'The waters made him great, the deep set him up on high with her rivers running round about his plants, and sent out her little rivers unto all the trees of the field. '
  '5':
  - type: text
    content: 'Therefore his height was exalted above all the trees of the field, and his boughs were multiplied, and his branches became long because of the multitude of waters, when he shot forth. '
  '6':
  - type: text
    content: 'All the fowls of heaven made their nests in his boughs, and under his branches did all the beasts of the field bring forth their young, and under his shadow dwelt all great nations. '
  '7':
  - type: text
    content: 'Thus was he fair in his greatness, in the length of his branches: for his root was by great waters. '
  '8':
  - type: text
    content: 'The cedars in the garden of God could not hide him: the fir trees were not like his boughs, and the chesnut trees were not like his branches; nor any tree in the garden of God was like unto him in his beauty. '
  '9':
  - type: text
    content: 'I have made him fair by the multitude of his branches: so that all the trees of Eden, that '
  - type: text
    content: were
  - type: text
    content: ' in the garden of God, envied him.'
