verses:
  '1':
  - type: text
    content: To the chief Musician, to Jeduthun, A Psalm of David.
  - type: text
    content: 'Truly my soul waiteth upon God:'
  - type: text
    content: 'From him '
  - type: text
    content: cometh
  - type: text
    content: ' my salvation.'
  '10':
  - type: text
    content: 'Trust not in oppression, and become not vain in robbery:'
  - type: text
    content: 'If riches increase, set not your heart '
  - type: text
    content: upon them
  - type: text
    content: .
  '11':
  - type: text
    content: God hath spoken once; Twice have I heard this;
  - type: text
    content: 'That power '
  - type: text
    content: belongeth
  - type: text
    content: ' unto God.'
  '12':
  - type: text
    content: 'Also unto thee, O Lord, '
  - type: text
    content: belongeth
  - type: text
    content: ' mercy:'
  - type: text
    content: For thou renderest to every man according to his work.
  '2':
  - type: text
    content: 'He only '
  - type: text
    content: is
  - type: text
    content: ' my rock and my salvation;'
  - type: text
    content: He is
  - type: text
    content: ' my defence; I shall not be greatly moved.'
  '3':
  - type: text
    content: How long will ye imagine mischief against a man?
  - type: text
    content: 'Ye shall be slain all of you: As a bowing wall '
  - type: text
    content: shall ye be, and as
  - type: text
    content: ' a tottering fence.'
  '4':
  - type: text
    content: 'They only consult to cast '
  - type: text
    content: him
  - type: text
    content: ' down from his excellency:'
  - type: text
    content: 'They delight in lies: They bless with their mouth, but they curse inwardly. '
  - type: text
    content: Selah.
  '5':
  - type: text
    content: My soul, wait thou only upon God;
  - type: text
    content: 'For my expectation '
  - type: text
    content: is
  - type: text
    content: ' from him.'
  '6':
  - type: text
    content: 'He only '
  - type: text
    content: is
  - type: text
    content: ' my rock and my salvation:'
  - type: text
    content: He is
  - type: text
    content: ' my defence; I shall not be moved.'
  '7':
  - type: text
    content: 'In God '
  - type: text
    content: is
  - type: text
    content: ' my salvation and my glory:'
  - type: text
    content: 'The rock of my strength, '
  - type: text
    content: and
  - type: text
    content: ' my refuge, '
  - type: text
    content: is
  - type: text
    content: ' in God.'
  '8':
  - type: text
    content: Trust in him at all times; ye people,
  - type: text
    content: 'Pour out your heart before him: God '
  - type: text
    content: is
  - type: text
    content: ' a refuge for us. '
  - type: text
    content: Selah.
  '9':
  - type: text
    content: 'Surely men of low degree '
  - type: text
    content: are
  - type: text
    content: ' vanity,'
  - type: text
    content: and
  - type: text
    content: ' men of high degree '
  - type: text
    content: are
  - type: text
    content: ' a lie: To be laid in the balance, they '
  - type: text
    content: are
  - type: text
    content: ' altogether '
  - type: text
    content: lighter
  - type: text
    content: ' than vanity.'
