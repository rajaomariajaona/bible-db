document_id: PSA.62,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the chief Musician, to Jeduthun, A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Truly my soul waiteth upon God:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'From him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: cometh
    - type: text
      text: ' my salvation.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Trust not in oppression, and become not vain in robbery:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'If riches increase, set not your heart '
    - type: usfm
      marker: add
      children:
      - type: text
        text: upon them
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: God hath spoken once; Twice have I heard this;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That power '
    - type: usfm
      marker: add
      children:
      - type: text
        text: belongeth
    - type: text
      text: ' unto God.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Also unto thee, O Lord, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: belongeth
    - type: text
      text: ' mercy:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For thou renderest to every man according to his work.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He only '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my rock and my salvation;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: He is
    - type: text
      text: ' my defence; I shall not be greatly moved.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: How long will ye imagine mischief against a man?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Ye shall be slain all of you: As a bowing wall '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall ye be, and as
    - type: text
      text: ' a tottering fence.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'They only consult to cast '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' down from his excellency:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They delight in lies: They bless with their mouth, but they curse inwardly. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: My soul, wait thou only upon God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For my expectation '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' from him.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'He only '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my rock and my salvation:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: He is
    - type: text
      text: ' my defence; I shall not be moved.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'In God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my salvation and my glory:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The rock of my strength, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' my refuge, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in God.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Trust in him at all times; ye people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Pour out your heart before him: God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a refuge for us. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Surely men of low degree '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' vanity,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' men of high degree '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' a lie: To be laid in the balance, they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' altogether '
    - type: usfm
      marker: add
      children:
      - type: text
        text: lighter
    - type: text
      text: ' than vanity.'
