    content: Those who sealed it
  - type: text
    content: 'Now those that sealed '
  - type: text
    content: were
  - type: text
    content: ', Nehemiah, the Tirshatha, the son of Hachaliah, and Zidkijah, '
  '10':
  - type: text
    content: 'and their brethren, Shebaniah, Hodijah, Kelita, Pelaiah, Hanan, '
  '11':
  - type: text
    content: 'Micha, Rehob, Hashabiah, '
  '12':
  - type: text
    content: 'Zaccur, Sherebiah, Shebaniah, '
  '13':
  - type: text
    content: 'Hodijah, Bani, Beninu. '
  '14':
  - type: text
    content: 'The chief of the people; Parosh, Pahath-moab, Elam, Zatthu, Bani, '
  '15':
  - type: text
    content: 'Bunni, Azgad, Bebai, '
  '16':
  - type: text
    content: 'Adonijah, Bigvai, Adin, '
  '17':
  - type: text
    content: 'Ater, Hizkijah, Azzur, '
  '18':
  - type: text
    content: 'Hodijah, Hashum, Bezai, '
  '19':
  - type: text
    content: 'Hariph, Anathoth, Nebai, '
  '2':
  - type: text
    content: 'Seraiah, Azariah, Jeremiah, '
  '20':
  - type: text
    content: 'Magpiash, Meshullam, Hezir, '
  '21':
  - type: text
    content: 'Meshezabeel, Zadok, Jaddua, '
  '22':
  - type: text
    content: 'Pelatiah, Hanan, Anaiah, '
  '23':
  - type: text
    content: 'Hoshea, Hananiah, Hashub, '
  '24':
  - type: text
    content: 'Hallohesh, Pileha, Shobek, '
  '25':
  - type: text
    content: 'Rehum, Hashabnah, Maaseiah, '
  '26':
  - type: text
    content: 'and Ahijah, Hanan, Anan, '
  '27':
  - type: text
    content: Malluch, Harim, Baanah.
  - type: heading
    content: Special Obligations
  '28':
  - type: text
    content: 'And the rest of the people, the priests, the Levites, the porters, the singers, the Nethinims, and all they that had separated themselves from the people of the lands unto the law of God, their wives, their sons, and their daughters, every one having knowledge, and having understanding; '
  '29':
  - type: text
    content: 'they clave to their brethren, their nobles, and entered into a curse, and into an oath, to walk in God''s law, which was given by Moses the servant of God, and to observe and do all the commandments of the '
  - type: text
    content: LORD
  - type: text
    content: ' our Lord, and his judgments and his statutes; '
  '3':
  - type: text
    content: 'Pashur, Amariah, Malchijah, '
  '30':
  - type: text
    content: 'and that we would not give our daughters unto the people of the land, nor take their daughters for our sons: '
  '31':
  - type: text
    content: 'and '
  - type: text
    content: if
  - type: text
    content: ' the people of the land bring ware or any victuals on the sabbath day to sell, '
  - type: text
    content: that
  - type: text
    content: ' we would not buy it of them on the sabbath, or on the holy day: and '
  - type: text
    content: that
  - type: text
    content: ' we would leave the seventh year, and the exaction of every debt.'
  '32':
  - type: text
    content: 'Also we made ordinances for us, to charge ourselves yearly with the third part of a shekel for the service of the house of our God; '
  '33':
  - type: text
    content: 'for the shewbread, and for the continual meat offering, and for the continual burnt offering, of the sabbaths, of the new moons, for the set feasts, and for the holy '
  - type: text
    content: things
  - type: text
    content: ', and for the sin offerings to make an atonement for Israel, and '
  - type: text
    content: for
  - type: text
    content: ' all the work of the house of our God. '
  '34':
  - type: text
    content: 'And we cast the lots among the priests, the Levites, and the people, for the wood offering, to bring '
  - type: text
    content: it
  - type: text
    content: ' into the house of our God, after the houses of our fathers, at times appointed year by year, to burn upon the altar of the '
  - type: text
    content: LORD
  - type: text
    content: ' our God, as '
  - type: text
    content: it is
  - type: text
    content: ' written in the law: '
  '35':
  - type: text
    content: 'and to bring the firstfruits of our ground, and the firstfruits of all fruit of all trees, year by year, unto the house of the '
  - type: text
    content: LORD
  - type: text
    content: ': '
  '36':
  - type: text
    content: 'also the firstborn of our sons, and of our cattle, as '
  - type: text
    content: it is
  - type: text
    content: ' written in the law, and the firstlings of our herds and of our flocks, to bring to the house of our God, unto the priests that minister in the house of our God: '
  '37':
  - type: text
    content: 'and '
  - type: text
    content: that
  - type: text
    content: ' we should bring the firstfruits of our dough, and our offerings, and the fruit of all manner of trees, of wine and of oil, unto the priests, to the chambers of the house of our God; and the tithes of our ground unto the Levites, that the same Levites might have the tithes in all the cities of our tillage. '
  '38':
  - type: text
    content: 'And the priest the son of Aaron shall be with the Levites, when the Levites take tithes: and the Levites shall bring up the tithe of the tithes unto the house of our God, to the chambers, into the treasure house. '
  '39':
  - type: text
    content: 'For the children of Israel and the children of Levi shall bring the offering of the corn, of the new wine, and the oil, unto the chambers, where '
  - type: text
    content: are
  - type: text
    content: ' the vessels of the sanctuary, and the priests that minister, and the porters, and the singers: and we will not forsake the house of our God.'
  '4':
  - type: text
    content: 'Hattush, Shebaniah, Malluch, '
  '5':
  - type: text
    content: 'Harim, Meremoth, Obadiah, '
  '6':
  - type: text
    content: 'Daniel, Ginnethon, Baruch, '
  '7':
  - type: text
    content: 'Meshullam, Abijah, Mijamin, '
  '8':
  - type: text
    content: 'Maaziah, Bilgai, Shemaiah: these '
  - type: text
    content: were
  - type: text
    content: ' the priests. '
  '9':
  - type: text
    content: 'And the Levites: both Jeshua the son of Azaniah, Binnui of the sons of Henadad, Kadmiel; '
