document_id: ACT.9
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Conversion of Saul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Saul, yet breathing out threatenings and slaughter against the disciples of the Lord, went unto the high priest, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and desired of him letters to Damascus to the synagogues, that if he found any of this way, whether they were men or women, he might bring them bound unto Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And as he journeyed, he came near Damascus: and suddenly there shined round about him a light from heaven: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and he fell to the earth, and heard a voice saying unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Saul, Saul, why persecutest thou me?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And he said, Who art thou, Lord? And the Lord said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I am Jesus whom thou persecutest: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' hard for thee to kick against the pricks.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he trembling and astonished said, Lord, what wilt thou have me to do? And the Lord '
  - type: usfm
    marker: add
    children:
    - type: text
      text: said
  - type: text
    text: ' unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Arise, and go into the city, and it shall be told thee what thou must do.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the men which journeyed with him stood speechless, hearing a voice, but seeing no man. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Saul arose from the earth; and when his eyes were opened, he saw no man: but they led him by the hand, and brought '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' into Damascus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: And he was three days without sight, and neither did eat nor drink.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And there was a certain disciple at Damascus, named Ananias; and to him said the Lord in a vision, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ananias
  - type: text
    text: '. And he said, Behold, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am here
  - type: text
    text: ', Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the Lord '
  - type: usfm
    marker: add
    children:
    - type: text
      text: said
  - type: text
    text: ' unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Arise, and go into the street which is called Straight, and enquire in the house of Judas for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' called Saul, of Tarsus: for, behold, he prayeth,'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and hath seen in a vision a man named Ananias coming in, and putting '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' hand on him, that he might receive his sight.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Ananias answered, Lord, I have heard by many of this man, how much evil he hath done to thy saints at Jerusalem: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and here he hath authority from the chief priests to bind all that call on thy name. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But the Lord said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Go thy way: for he is a chosen vessel unto me, to bear my name before the Gentiles, and kings, and the children of Israel:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for I will shew him how great things he must suffer for my name's sake.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And Ananias went his way, and entered into the house; and putting his hands on him said, Brother Saul, the Lord, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' Jesus, that appeared unto thee in the way as thou camest, hath sent me, that thou mightest receive thy sight, and be filled with the Holy Ghost. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And immediately there fell from his eyes as it had been scales: and he received sight forthwith, and arose, and was baptized. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: And when he had received meat, he was strengthened.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Then was Saul certain days with the disciples which were at Damascus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And straightway he preached Christ in the synagogues, that he is the Son of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But all that heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' were amazed, and said; Is not this he that destroyed them which called on this name in Jerusalem, and came hither for that intent, that he might bring them bound unto the chief priests? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: But Saul increased the more in strength, and confounded the Jews which dwelt at Damascus, proving that this is very Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And after that many days were fulfilled, the Jews took counsel to kill him: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'but their laying await was known of Saul. And they watched the gates day and night to kill him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then the disciples took him by night, and let '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' down by the wall in a basket.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And when Saul was come to Jerusalem, he assayed to join himself to the disciples: but they were all afraid of him, and believed not that he was a disciple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'But Barnabas took him, and brought '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' to the apostles, and declared unto them how he had seen the Lord in the way, and that he had spoken to him, and how he had preached boldly at Damascus in the name of Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And he was with them coming in and going out at Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And he spake boldly in the name of the Lord Jesus, and disputed against the Grecians: but they went about to slay him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Which
  - type: text
    text: ' when the brethren knew, they brought him down to Cæsarea, and sent him forth to Tarsus.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The State of the Church
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Then had the churches rest throughout all Judæa and Galilee and Samaria, and were edified; and walking in the fear of the Lord, and in the comfort of the Holy Ghost, were multiplied.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Peter's Journeys
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And it came to pass, as Peter passed throughout all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: quarters
  - type: text
    text: ', he came down also to the saints which dwelt at Lydda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And there he found a certain man named Æneas, which had kept his bed eight years, and was sick of the palsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And Peter said unto him, Æneas, Jesus Christ maketh thee whole: arise, and make thy bed. And he arose immediately. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: And all that dwelt at Lydda and Saron saw him, and turned to the Lord.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Now there was at Joppa a certain disciple named Tabitha, which by interpretation is called Dorcas: this woman was full of good works and almsdeeds which she did. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And it came to pass in those days, that she was sick, and died: whom when they had washed, they laid '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her
  - type: text
    text: ' in an upper chamber. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And forasmuch as Lydda was nigh to Joppa, and the disciples had heard that Peter was there, they sent unto him two men, desiring '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' that he would not delay to come to them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Then Peter arose and went with them. When he was come, they brought him into the upper chamber: and all the widows stood by him weeping, and shewing the coats and garments which Dorcas made, while she was with them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'But Peter put them all forth, and kneeled down, and prayed; and turning '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' to the body said, Tabitha, arise. And she opened her eyes: and when she saw Peter, she sat up. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And he gave her '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' hand, and lifted her up, and when he had called the saints and widows, presented her alive. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And it was known throughout all Joppa; and many believed in the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: And it came to pass, that he tarried many days in Joppa with one Simon a tanner.
