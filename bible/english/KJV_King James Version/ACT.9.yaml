  '33':
  - type: text
    content: 'And there he found a certain man named Æneas, which had kept his bed eight years, and was sick of the palsy. '
  '34':
  - type: text
    content: 'And Peter said unto him, Æneas, Jesus Christ maketh thee whole: arise, and make thy bed. And he arose immediately. '
  '35':
  - type: text
    content: And all that dwelt at Lydda and Saron saw him, and turned to the Lord.
  '36':
  - type: text
    content: 'Now there was at Joppa a certain disciple named Tabitha, which by interpretation is called Dorcas: this woman was full of good works and almsdeeds which she did. '
  '37':
  - type: text
