  - type: text
    content: LORD
  - type: text
    content: ' had said.'
  '2':
  - type: text
    content: 'And if thou refuse to let '
  - type: text
    content: them
  - type: text
    content: ' go, behold, I will smite all thy borders with frogs: '
  '20':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Moses, Rise up early in the morning, and stand before Pharaoh; lo, he cometh forth to the water; and say unto him, Thus saith the '
