  - type: text
    content: ', Let my people go, that they may serve me. '
  '21':
  - type: text
    content: 'Else, if thou wilt not let my people go, behold, I will send swarms of flies upon thee, and upon thy servants, and upon thy people, and into thy houses: and the houses of the Egyptians shall be full of swarms of flies, and also the ground whereon they '
  - type: text
    content: are
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'And I will sever in that day the land of Goshen, in which my people dwell, that no swarms of flies shall be there; to the end thou mayest know that I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' in the midst of the earth. '
  '23':
  - type: text
    content: 'And I will put a division between my people and thy people: to morrow shall this sign be. '
  '24':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' did so; and there came a grievous swarm of flies into the house of Pharaoh, and '
  - type: text
    content: into
  - type: text
    content: ' his servants'' houses, and into all the land of Egypt: the land was corrupted by reason of the swarm of flies.'
  '25':
  - type: text
    content: 'And Pharaoh called for Moses and for Aaron, and said, Go ye, sacrifice to your God in the land. '
  '26':
  - type: text
    content: 'And Moses said, It is not meet so to do; for we shall sacrifice the abomination of the Egyptians to the '
  - type: text
    content: LORD
  - type: text
    content: ' our God: lo, shall we sacrifice the abomination of the Egyptians before their eyes, and will they not stone us? '
  '27':
  - type: text
    content: 'We will go three days'' journey into the wilderness, and sacrifice to the '
  - type: text
    content: LORD
  - type: text
    content: ' our God, as he shall command us. '
  '28':
  - type: text
    content: 'And Pharaoh said, I will let you go, that ye may sacrifice to the '
  - type: text
    content: LORD
  - type: text
    content: ' your God in the wilderness; only ye shall not go very far away: intreat for me. '
  '29':
  - type: text
    content: 'And Moses said, Behold, I go out from thee, and I will intreat the '
  - type: text
    content: LORD
  - type: text
    content: ' that the swarms of flies may depart from Pharaoh, from his servants, and from his people, to morrow: but let not Pharaoh deal deceitfully any more in not letting the people go to sacrifice to the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'and the river shall bring forth frogs abundantly, which shall go up and come into thine house, and into thy bedchamber, and upon thy bed, and into the house of thy servants, and upon thy people, and into thine ovens, and into thy kneadingtroughs: '
  '30':
  - type: text
    content: 'And Moses went out from Pharaoh, and intreated the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' did according to the word of Moses; and he removed the swarms of flies from Pharaoh, from his servants, and from his people; there remained not one. '
  '32':
  - type: text
    content: And Pharaoh hardened his heart at this time also, neither would he let the people go.
  '4':
  - type: text
    content: and the frogs shall come up both on thee, and upon thy people, and upon all thy servants.
  '5':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, Say unto Aaron, Stretch forth thine hand with thy rod over the streams, over the rivers, and over the ponds, and cause frogs to come up upon the land of Egypt. '
  '6':
  - type: text
    content: 'And Aaron stretched out his hand over the waters of Egypt; and the frogs came up, and covered the land of Egypt. '
  '7':
  - type: text
    content: And the magicians did so with their enchantments, and brought up frogs upon the land of Egypt.
  '8':
  - type: text
    content: 'Then Pharaoh called for Moses and Aaron, and said, Intreat the '
  - type: text
    content: LORD
  - type: text
    content: ', that he may take away the frogs from me, and from my people; and I will let the people go, that they may do sacrifice unto the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'And Moses said unto Pharaoh, Glory over me: when shall I intreat for thee, and for thy servants, and for thy people, to destroy the frogs from thee and thy houses, '
  - type: text
    content: that
  - type: text
    content: ' they may remain in the river only? '
