document_id: GAL.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Paul, an apostle, (not of men, neither by man, but by Jesus Christ, and God the Father, who raised him from the dead;) '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For do I now persuade men, or God? or do I seek to please men? for if I yet pleased men, I should not be the servant of Christ. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But I certify you, brethren, that the gospel which was preached of me is not after man. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'For I neither received it of man, neither was I taught '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', but by the revelation of Jesus Christ.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'For ye have heard of my conversation in time past in the Jews'' religion, how that beyond measure I persecuted the church of God, and wasted it: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'and profited in the Jews'' religion above many my equals in mine own nation, being more exceedingly zealous of the traditions of my fathers. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But when it pleased God, who separated me from my mother''s womb, and called '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ' by his grace, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'to reveal his Son in me, that I might preach him among the heathen; immediately I conferred not with flesh and blood: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'neither went I up to Jerusalem to them which were apostles before me; but I went into Arabia, and returned again unto Damascus. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then after three years I went up to Jerusalem to see Peter, and abode with him fifteen days. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'But other of the apostles saw I none, save James the Lord''s brother. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'and all the brethren which are with me, unto the churches of Galatia: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Now the things which I write unto you, behold, before God, I lie not. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Afterwards I came into the regions of Syria and Cilicia; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'and was unknown by face unto the churches of Judæa which were in Christ: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'but they had heard only, That he which persecuted us in times past now preacheth the faith which once he destroyed. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: And they glorified God in me.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'grace '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' to you and peace from God the Father, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from
    - type: text
      text: ' our Lord Jesus Christ, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'who gave himself for our sins, that he might deliver us from this present evil world, according to the will of God and our Father: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'to whom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' glory for ever and ever. Amen.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Paul Defends His Authority
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'I marvel that ye are so soon removed from him that called you into the grace of Christ unto another gospel: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'which is not another; but there be some that trouble you, and would pervert the gospel of Christ. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But though we, or an angel from heaven, preach any other gospel unto you than that which we have preached unto you, let him be accursed. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'As we said before, so say I now again, If any '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' preach any other gospel unto you than that ye have received, let him be accursed.'
