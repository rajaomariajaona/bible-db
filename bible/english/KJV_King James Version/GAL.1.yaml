document_id: GAL.1,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Paul, an apostle, (not of men, neither by man, but by Jesus Christ, and God the Father, who raised him from the dead;) '
  '10':
  - type: text
    content: 'For do I now persuade men, or God? or do I seek to please men? for if I yet pleased men, I should not be the servant of Christ. '
  '11':
  - type: text
    content: 'But I certify you, brethren, that the gospel which was preached of me is not after man. '
  '12':
  - type: text
    content: 'For I neither received it of man, neither was I taught '
  - type: text
    content: it
  - type: text
    content: ', but by the revelation of Jesus Christ.'
  '13':
  - type: text
    content: 'For ye have heard of my conversation in time past in the Jews'' religion, how that beyond measure I persecuted the church of God, and wasted it: '
  '14':
  - type: text
    content: 'and profited in the Jews'' religion above many my equals in mine own nation, being more exceedingly zealous of the traditions of my fathers. '
  '15':
  - type: text
    content: 'But when it pleased God, who separated me from my mother''s womb, and called '
  - type: text
    content: me
  - type: text
    content: ' by his grace, '
  '16':
  - type: text
    content: 'to reveal his Son in me, that I might preach him among the heathen; immediately I conferred not with flesh and blood: '
  '17':
  - type: text
    content: 'neither went I up to Jerusalem to them which were apostles before me; but I went into Arabia, and returned again unto Damascus. '
  '18':
  - type: text
    content: 'Then after three years I went up to Jerusalem to see Peter, and abode with him fifteen days. '
  '19':
  - type: text
    content: 'But other of the apostles saw I none, save James the Lord''s brother. '
  '2':
  - type: text
    content: 'and all the brethren which are with me, unto the churches of Galatia: '
  '20':
  - type: text
    content: 'Now the things which I write unto you, behold, before God, I lie not. '
  '21':
  - type: text
    content: 'Afterwards I came into the regions of Syria and Cilicia; '
  '22':
  - type: text
    content: 'and was unknown by face unto the churches of Judæa which were in Christ: '
  '23':
  - type: text
    content: 'but they had heard only, That he which persecuted us in times past now preacheth the faith which once he destroyed. '
  '24':
  - type: text
    content: And they glorified God in me.
  '3':
  - type: text
    content: 'grace '
  - type: text
    content: be
  - type: text
    content: ' to you and peace from God the Father, and '
  - type: text
    content: from
  - type: text
    content: ' our Lord Jesus Christ, '
  '4':
  - type: text
    content: 'who gave himself for our sins, that he might deliver us from this present evil world, according to the will of God and our Father: '
  '5':
  - type: text
    content: 'to whom '
  - type: text
    content: be
  - type: text
    content: ' glory for ever and ever. Amen.'
  - type: heading
    content: Paul Defends His Authority
  '6':
  - type: text
    content: 'I marvel that ye are so soon removed from him that called you into the grace of Christ unto another gospel: '
  '7':
  - type: text
    content: 'which is not another; but there be some that trouble you, and would pervert the gospel of Christ. '
  '8':
  - type: text
    content: 'But though we, or an angel from heaven, preach any other gospel unto you than that which we have preached unto you, let him be accursed. '
  '9':
  - type: text
    content: 'As we said before, so say I now again, If any '
  - type: text
    content: man
  - type: text
    content: ' preach any other gospel unto you than that ye have received, let him be accursed.'
