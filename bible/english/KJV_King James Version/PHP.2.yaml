document_id: PHP.2,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Mind of Christ
  - type: text
    content: 'If '
  - type: text
    content: there be
  - type: text
    content: ' therefore any consolation in Christ, if any comfort of love, if any fellowship of the Spirit, if any bowels and mercies, '
  '10':
  - type: text
    content: 'that at the name of Jesus every knee should bow, of '
  - type: text
    content: things
  - type: text
    content: ' in heaven, and '
  - type: text
    content: things
  - type: text
    content: ' in earth, and '
  - type: text
    content: things
  - type: text
    content: ' under the earth; '
  '11':
  - type: text
    content: 'and '
  - type: text
    content: that
  - type: text
    content: ' every tongue should confess that Jesus Christ '
  - type: text
    content: is
  - type: text
    content: ' Lord, to the glory of God the Father.'
  '12':
  - type: text
    content: 'Wherefore, my beloved, as ye have always obeyed, not as in my presence only, but now much more in my absence, work out your own salvation with fear and trembling. '
  '13':
  - type: text
    content: 'For it is God which worketh in you both to will and to do of '
  - type: text
    content: his
  - type: text
    content: ' good pleasure. '
  '14':
  - type: text
    content: 'Do all things without murmurings and disputings: '
  '15':
  - type: text
    content: 'that ye may be blameless and harmless, the sons of God, without rebuke, in the midst of a crooked and perverse nation, among whom ye shine as lights in the world; '
  '16':
  - type: text
    content: 'holding forth the word of life; that I may rejoice in the day of Christ, that I have not run in vain, neither laboured in vain. '
  '17':
  - type: text
    content: 'Yea, and if I be offered upon the sacrifice and service of your faith, I joy, and rejoice with you all. '
  '18':
  - type: text
    content: For the same cause also do ye joy, and rejoice with me.
  '19':
  - type: text
    content: 'But I trust in the Lord Jesus to send Timotheus shortly unto you, that I also may be of good comfort, when I know your state. '
  '2':
  - type: text
    content: 'fulfil ye my joy, that ye be likeminded, having the same love, '
  - type: text
    content: being
  - type: text
    content: ' of one accord, of one mind. '
  '20':
  - type: text
    content: 'For I have no man likeminded, who will naturally care for your state. '
  '21':
  - type: text
    content: 'For all seek their own, not the things which are Jesus Christ''s. '
  '22':
  - type: text
    content: 'But ye know the proof of him, that, as a son with the father, he hath served with me in the gospel. '
  '23':
  - type: text
    content: 'Him therefore I hope to send presently, so soon as I shall see how it will go with me. '
  '24':
  - type: text
    content: 'But I trust in the Lord that I also myself shall come shortly. '
  '25':
  - type: text
    content: 'Yet I supposed it necessary to send to you Epaphroditus, my brother, and companion in labour, and fellowsoldier, but your messenger, and he that ministered to my wants. '
  '26':
  - type: text
    content: 'For he longed after you all, and was full of heaviness, because that ye had heard that he had been sick. '
  '27':
  - type: text
    content: 'For indeed he was sick nigh unto death: but God had mercy on him; and not on him only, but on me also, lest I should have sorrow upon sorrow. '
  '28':
  - type: text
    content: 'I sent him therefore the more carefully, that, when ye see him again, ye may rejoice, and that I may be the less sorrowful. '
  '29':
  - type: text
    content: 'Receive him therefore in the Lord with all gladness; and hold such in reputation: '
  '3':
  - type: text
    content: Let
  - type: text
    content: ' nothing '
  - type: text
    content: be done
  - type: text
    content: ' through strife or vainglory; but in lowliness of mind let each esteem other better than themselves. '
  '30':
  - type: text
    content: because for the work of Christ he was nigh unto death, not regarding his life, to supply your lack of service toward me.
  '4':
  - type: text
    content: 'Look not every man on his own things, but every man also on the things of others. '
  '5':
  - type: text
    content: 'Let this mind be in you, which was also in Christ Jesus: '
  '6':
  - type: text
    content: 'who, being in the form of God, thought it not robbery to be equal with God: '
  '7':
  - type: text
    content: 'but made himself of no reputation, and took upon him the form of a servant, and was made in the likeness of men: '
  '8':
  - type: text
    content: 'and being found in fashion as a man, he humbled himself, and became obedient unto death, even the death of the cross. '
  '9':
  - type: text
    content: 'Wherefore God also hath highly exalted him, and given him a name which is above every name: '
