verses:
  '1':
  - type: text
    content: 'The word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came also unto me, saying, '
  '10':
  - type: text
    content: 'And it shall come to pass, when thou shalt shew this people all these words, and they shall say unto thee, Wherefore hath the '
  - type: text
    content: LORD
  - type: text
    content: ' pronounced all this great evil against us? or what '
  - type: text
    content: is
  - type: text
    content: ' our iniquity? or what '
  - type: text
    content: is
  - type: text
    content: ' our sin that we have committed against the '
  - type: text
    content: LORD
  - type: text
    content: ' our God? '
  '11':
  - type: text
    content: 'Then shalt thou say unto them, Because your fathers have forsaken me, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', and have walked after other gods, and have served them, and have worshipped them, and have forsaken me, and have not kept my law; '
  '12':
  - type: text
    content: 'and ye have done worse than your fathers; for, behold, ye walk every one after the imagination of his evil heart, that they may not hearken unto me. '
  '13':
  - type: text
    content: 'Therefore will I cast you out of this land into a land that ye know not, '
  - type: text
    content: neither
  - type: text
    content: ' ye nor your fathers; and there shall ye serve other gods day and night; where I will not shew you favour.'
  '14':
  - type: text
    content: 'Therefore, behold, the days come, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', that it shall no more be said, The '
  - type: text
    content: LORD
  - type: text
    content: ' liveth, that brought up the children of Israel out of the land of Egypt; '
  '15':
  - type: text
    content: 'but, The '
  - type: text
    content: LORD
  - type: text
    content: ' liveth, that brought up the children of Israel from the land of the north, and from all the lands whither he had driven them: and I will bring them again into their land that I gave unto their fathers.'
  '16':
  - type: text
    content: 'Behold, I will send for many fishers, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', and they shall fish them; and after will I send for many hunters, and they shall hunt them from every mountain, and from every hill, and out of the holes of the rocks. '
  '17':
  - type: text
    content: 'For mine eyes '
  - type: text
    content: are
  - type: text
    content: ' upon all their ways: they are not hid from my face, neither is their iniquity hid from mine eyes. '
  '18':
  - type: text
    content: And first I will recompense their iniquity and their sin double; because they have defiled my land, they have filled mine inheritance with the carcases of their detestable and abominable things.
  '19':
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ', my strength, and my fortress, and my refuge in the day of affliction, the Gentiles shall come unto thee from the ends of the earth, and shall say, Surely our fathers have inherited lies, vanity, and '
  - type: text
    content: things
  - type: text
    content: ' wherein '
  - type: text
    content: there is
  - type: text
    content: ' no profit. '
  '2':
  - type: text
    content: 'Thou shalt not take thee a wife, neither shalt thou have sons or daughters in this place. '
  '20':
  - type: text
    content: 'Shall a man make gods unto himself, and they '
  - type: text
    content: are
  - type: text
    content: ' no gods?'
  '21':
  - type: text
    content: 'Therefore, behold, I will this once cause them to know, I will cause them to know mine hand and my might; and they shall know that my name '
  - type: text
    content: is
  - type: text
    content: ' The '
  - type: text
    content: LORD
  - type: text
    content: .
  '3':
  - type: text
    content: 'For thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' concerning the sons and concerning the daughters that are born in this place, and concerning their mothers that bare them, and concerning their fathers that begat them in this land; '
  '4':
  - type: text
    content: 'they shall die of grievous deaths; they shall not be lamented; neither shall they be buried; '
  - type: text
    content: but
  - type: text
    content: ' they shall be as dung upon the face of the earth: and they shall be consumed by the sword, and by famine; and their carcases shall be meat for the fowls of heaven, and for the beasts of the earth.'
  '5':
  - type: text
    content: 'For thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', Enter not into the house of mourning, neither go to lament nor bemoan them: for I have taken away my peace from this people, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: even
  - type: text
    content: ' lovingkindness and mercies. '
  '6':
  - type: text
    content: 'Both the great and the small shall die in this land: they shall not be buried, neither shall '
  - type: text
    content: men
  - type: text
    content: ' lament for them, nor cut themselves, nor make themselves bald for them: '
  '7':
  - type: text
    content: 'neither shall '
  - type: text
    content: men
  - type: text
    content: ' tear '
  - type: text
    content: themselves
  - type: text
    content: ' for them in mourning, to comfort them for the dead; neither shall '
  - type: text
    content: men
  - type: text
    content: ' give them the cup of consolation to drink for their father or for their mother. '
  '8':
  - type: text
    content: 'Thou shalt not also go into the house of feasting, to sit with them to eat and to drink. '
  '9':
  - type: text
    content: 'For thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, the God of Israel; Behold, I will cause to cease out of this place in your eyes, and in your days, the voice of mirth, and the voice of gladness, the voice of the bridegroom, and the voice of the bride.'
