document_id: ISA.9
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Prince of Peace
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nevertheless the dimness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall
  - type: text
    text: ' not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' such as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in her vexation, when at the first he lightly afflicted the land of Zebulun and the land of Naphtali, and afterward did more grievously afflict '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her by
  - type: text
    text: ' the way of the sea, beyond Jordan, in Galilee of the nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The people that walked in darkness have seen a great light: they that dwell in the land of the shadow of death, upon them hath the light shined. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Thou hast multiplied the nation, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' not increased the joy: they joy before thee according to the joy in harvest, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' rejoice when they divide the spoil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For thou hast broken the yoke of his burden, and the staff of his shoulder, the rod of his oppressor, as in the day of Midian. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For every battle of the warrior '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with confused noise, and garments rolled in blood; but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' shall be with burning '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' fuel of fire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For unto us a child is born, unto us a son is given: and the government shall be upon his shoulder: and his name shall be called Wonderful, Counsellor, The mighty God, The everlasting Father, The Prince of Peace. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Of the increase of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' government and peace '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there shall be
  - type: text
    text: ' no end, upon the throne of David, and upon his kingdom, to order it, and to establish it with judgment and with justice from henceforth even for ever. The zeal of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts will perform this.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The Lord sent a word into Jacob, and it hath lighted upon Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And all the people shall know, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' Ephraim and the inhabitant of Samaria, that say in the pride and stoutness of heart, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The bricks are fallen down, but we will build with hewn stones: the sycomores are cut down, but we will change '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them into
  - type: text
    text: ' cedars. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Therefore the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall set up the adversaries of Rezin against him, and join his enemies together; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'the Syrians before, and the Philistines behind; and they shall devour Israel with open mouth. For all this his anger is not turned away, but his hand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' stretched out still.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For the people turneth not unto him that smiteth them, neither do they seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Therefore the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will cut off from Israel head and tail, branch and rush, in one day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The ancient and honourable, he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the head; and the prophet that teacheth lies, he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the tail. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For the leaders of this people cause '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' to err; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they that are
  - type: text
    text: ' led of them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' destroyed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Therefore the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall have no joy in their young men, neither shall have mercy on their fatherless and widows: for every one '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' an hypocrite and an evildoer, and every mouth speaketh folly. For all this his anger is not turned away, but his hand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' stretched out still.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For wickedness burneth as the fire: it shall devour the briers and thorns, and shall kindle in the thickets of the forest, and they shall mount up '
  - type: usfm
    marker: add
    children:
    - type: text
      text: like
  - type: text
    text: ' the lifting up of smoke. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Through the wrath of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts is the land darkened, and the people shall be as the fuel of the fire: no man shall spare his brother. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And he shall snatch on the right hand, and be hungry; and he shall eat on the left hand, and they shall not be satisfied: they shall eat every man the flesh of his own arm: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Manasseh, Ephraim; and Ephraim, Manasseh: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' they together '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' against Judah. For all this his anger is not turned away, but his hand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' stretched out still.'
