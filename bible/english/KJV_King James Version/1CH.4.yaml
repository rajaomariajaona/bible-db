document_id: 1CH.4,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Sons of Judah
  - type: text
    content: 'The sons of Judah; Pharez, Hezron, and Carmi, and Hur, and Shobal. '
  '10':
  - type: text
    content: 'And Jabez called on the God of Israel, saying, Oh that thou wouldest bless me indeed, and enlarge my coast, and that thine hand might be with me, and that thou wouldest keep '
  - type: text
    content: me
  - type: text
    content: ' from evil, that it may not grieve me! And God granted him that which he requested.'
  '11':
  - type: text
    content: 'And Chelub the brother of Shuah begat Mehir, which '
  - type: text
    content: was
  - type: text
    content: ' the father of Eshton. '
  '12':
  - type: text
    content: 'And Eshton begat Beth-rapha, and Paseah, and Tehinnah the father of Irnahash. These '
  - type: text
    content: are
  - type: text
    content: ' the men of Rechah. '
  '13':
  - type: text
    content: 'And the sons of Kenaz; Othniel, and Seraiah: and the sons of Othniel; Hathath. '
  '14':
  - type: text
    content: 'And Meonothai begat Ophrah: and Seraiah begat Joab, the father of the valley of Charashim; for they were craftsmen. '
  '15':
  - type: text
    content: 'And the sons of Caleb the son of Jephunneh; Iru, Elah, and Naam: and the sons of Elah, even Kenaz. '
  '16':
  - type: text
    content: 'And the sons of Jehaleleel; Ziph, and Ziphah, Tiria, and Asareel. '
  '17':
  - type: text
    content: 'And the sons of Ezra '
  - type: text
    content: were
  - type: text
    content: ', Jether, and Mered, and Epher, and Jalon: and she bare Miriam, and Shammai, and Ishbah the father of Eshtemoa. '
  '18':
  - type: text
    content: 'And his wife Jehudijah bare Jered the father of Gedor, and Heber the father of Socho, and Jekuthiel the father of Zanoah. And these '
  - type: text
    content: are
  - type: text
    content: ' the sons of Bithiah the daughter of Pharaoh, which Mered took. '
  '19':
  - type: text
    content: 'And the sons of '
  - type: text
    content: his
  - type: text
    content: ' wife Hodiah the sister of Naham, the father of Keilah the Garmite, and Eshtemoa the Maachathite. '
  '2':
  - type: text
    content: 'And Reaiah the son of Shobal begat Jahath; and Jahath begat Ahumai, and Lahad. These '
  - type: text
    content: are
  - type: text
    content: ' the families of the Zorathites. '
  '20':
  - type: text
    content: 'And the sons of Shimon '
  - type: text
    content: were
  - type: text
    content: ', Amnon, and Rinnah, Ben-hanan, and Tilon. And the sons of Ishi '
  - type: text
    content: were
  - type: text
    content: ', Zoheth, and Ben-zoheth. '
  '21':
  - type: text
    content: 'The sons of Shelah the son of Judah '
  - type: text
    content: were
  - type: text
    content: ', Er the father of Lecah, and Laadah the father of Mareshah, and the families of the house of them that wrought fine linen, of the house of Ashbea, '
  '22':
  - type: text
    content: 'and Jokim, and the men of Chozeba, and Joash, and Saraph, who had the dominion in Moab, and Jashubi-lehem. And '
  - type: text
    content: these are
  - type: text
    content: ' ancient things. '
  '23':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' the potters, and those that dwelt among plants and hedges: there they dwelt with the king for his work.'
  - type: heading
    content: Sons of Simeon
  '24':
  - type: text
    content: 'The sons of Simeon '
  - type: text
    content: were
  - type: text
    content: ', Nemuel, and Jamin, Jarib, Zerah, '
  - type: text
    content: and
  - type: text
    content: ' Shaul: '
  '25':
  - type: text
    content: 'Shallum his son, Mibsam his son, Mishma his son. '
  '26':
  - type: text
    content: 'And the sons of Mishma; Hamuel his son, Zacchur his son, Shimei his son. '
  '27':
  - type: text
    content: 'And Shimei had sixteen sons and six daughters; but his brethren had not many children, neither did all their family multiply, like to the children of Judah. '
  '28':
  - type: text
    content: 'And they dwelt at Beer-sheba, and Moladah, and Hazar-shual, '
  '29':
  - type: text
    content: 'and at Bilhah, and at Ezem, and at Tolad, '
  '3':
  - type: text
    content: 'And these '
  - type: text
    content: were of
  - type: text
    content: ' the father of Etam; Jezreel, and Ishma, and Idbash: and the name of their sister '
  - type: text
    content: was
  - type: text
    content: ' Hazelelponi: '
  '30':
  - type: text
    content: 'and at Bethuel, and at Hormah, and at Ziklag, '
  '31':
  - type: text
    content: 'and at Beth-marcaboth, and Hazar-susim, and at Beth-birei, and at Shaaraim. These '
  - type: text
    content: were
  - type: text
    content: ' their cities unto the reign of David. '
  '32':
  - type: text
    content: 'And their villages '
  - type: text
    content: were
  - type: text
    content: ', Etam, and Ain, Rimmon, and Tochen, and Ashan, five cities: '
  '33':
  - type: text
    content: 'and all their villages that '
  - type: text
    content: were
  - type: text
    content: ' round about the same cities, unto Baal. These '
  - type: text
    content: were
  - type: text
    content: ' their habitations, and their genealogy. '
  '34':
  - type: text
    content: 'And Meshobab, and Jamlech, and Joshah the son of Amaziah, '
  '35':
  - type: text
    content: 'and Joel, and Jehu the son of Josibiah, the son of Seraiah, the son of Asiel, '
  '36':
  - type: text
    content: 'and Elioenai, and Jaakobah, and Jeshohaiah, and Asaiah, and Adiel, and Jesimiel, and Benaiah, '
  '37':
  - type: text
    content: 'and Ziza the son of Shiphi, the son of Allon, the son of Jedaiah, the son of Shimri, the son of Shemaiah; '
  '38':
  - type: text
    content: 'these mentioned by '
  - type: text
    content: their
  - type: text
    content: ' names '
  - type: text
    content: were
  - type: text
    content: ' princes in their families: and the house of their fathers increased greatly.'
  '39':
  - type: text
    content: 'And they went to the entrance of Gedor, '
  - type: text
    content: even
  - type: text
    content: ' unto the east side of the valley, to seek pasture for their flocks. '
  '4':
  - type: text
    content: 'and Penuel the father of Gedor, and Ezer the father of Hushah. These '
  - type: text
    content: are
  - type: text
    content: ' the sons of Hur, the firstborn of Ephratah, the father of Beth-lehem. '
  '40':
  - type: text
    content: 'And they found fat pasture and good, and the land '
  - type: text
    content: was
  - type: text
    content: ' wide, and quiet, and peaceable; for '
  - type: text
    content: they
  - type: text
    content: ' of Ham had dwelt there of old. '
  '41':
  - type: text
    content: 'And these written by name came in the days of Hezekiah king of Judah, and smote their tents, and the habitations that were found there, and destroyed them utterly unto this day, and dwelt in their rooms: because '
  - type: text
    content: there was
  - type: text
    content: ' pasture there for their flocks. '
  '42':
  - type: text
    content: 'And '
  - type: text
    content: some
  - type: text
    content: ' of them, '
  - type: text
    content: even
  - type: text
    content: ' of the sons of Simeon, five hundred men, went to mount Seir, having for their captains Pelatiah, and Neariah, and Rephaiah, and Uzziel, the sons of Ishi. '
  '43':
  - type: text
    content: And they smote the rest of the Amalekites that were escaped, and dwelt there unto this day.
  '5':
  - type: text
    content: 'And Ashur the father of Tekoa had two wives, Helah and Naarah. '
  '6':
  - type: text
    content: 'And Naarah bare him Ahuzam, and Hepher, and Temeni, and Haahashtari. These '
  - type: text
    content: were
  - type: text
    content: ' the sons of Naarah. '
  '7':
  - type: text
    content: 'And the sons of Helah '
  - type: text
    content: were
  - type: text
    content: ', Zereth, and Jezoar, and Ethnan. '
  '8':
  - type: text
    content: And Coz begat Anub, and Zobebah, and the families of Aharhel the son of Harum.
  '9':
  - type: text
    content: 'And Jabez was more honourable than his brethren: and his mother called his name Jabez, saying, Because I bare him with sorrow. '
