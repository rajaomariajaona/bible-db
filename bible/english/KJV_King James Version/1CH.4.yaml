document_id: 1CH.4
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sons of Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The sons of Judah; Pharez, Hezron, and Carmi, and Hur, and Shobal. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Reaiah the son of Shobal begat Jahath; and Jahath begat Ahumai, and Lahad. These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the families of the Zorathites. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were of
  - type: text
    text: ' the father of Etam; Jezreel, and Ishma, and Idbash: and the name of their sister '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Hazelelponi: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and Penuel the father of Gedor, and Ezer the father of Hushah. These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the sons of Hur, the firstborn of Ephratah, the father of Beth-lehem. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And Ashur the father of Tekoa had two wives, Helah and Naarah. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Naarah bare him Ahuzam, and Hepher, and Temeni, and Haahashtari. These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' the sons of Naarah. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the sons of Helah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ', Zereth, and Jezoar, and Ethnan. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And Coz begat Anub, and Zobebah, and the families of Aharhel the son of Harum.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And Jabez was more honourable than his brethren: and his mother called his name Jabez, saying, Because I bare him with sorrow. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Jabez called on the God of Israel, saying, Oh that thou wouldest bless me indeed, and enlarge my coast, and that thine hand might be with me, and that thou wouldest keep '
  - type: usfm
    marker: add
    children:
    - type: text
      text: me
  - type: text
    text: ' from evil, that it may not grieve me! And God granted him that which he requested.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Chelub the brother of Shuah begat Mehir, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the father of Eshton. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Eshton begat Beth-rapha, and Paseah, and Tehinnah the father of Irnahash. These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the men of Rechah. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And the sons of Kenaz; Othniel, and Seraiah: and the sons of Othniel; Hathath. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And Meonothai begat Ophrah: and Seraiah begat Joab, the father of the valley of Charashim; for they were craftsmen. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the sons of Caleb the son of Jephunneh; Iru, Elah, and Naam: and the sons of Elah, even Kenaz. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the sons of Jehaleleel; Ziph, and Ziphah, Tiria, and Asareel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the sons of Ezra '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ', Jether, and Mered, and Epher, and Jalon: and she bare Miriam, and Shammai, and Ishbah the father of Eshtemoa. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And his wife Jehudijah bare Jered the father of Gedor, and Heber the father of Socho, and Jekuthiel the father of Zanoah. And these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the sons of Bithiah the daughter of Pharaoh, which Mered took. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And the sons of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' wife Hodiah the sister of Naham, the father of Keilah the Garmite, and Eshtemoa the Maachathite. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the sons of Shimon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ', Amnon, and Rinnah, Ben-hanan, and Tilon. And the sons of Ishi '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ', Zoheth, and Ben-zoheth. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The sons of Shelah the son of Judah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ', Er the father of Lecah, and Laadah the father of Mareshah, and the families of the house of them that wrought fine linen, of the house of Ashbea, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'and Jokim, and the men of Chozeba, and Joash, and Saraph, who had the dominion in Moab, and Jashubi-lehem. And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: these are
  - type: text
    text: ' ancient things. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' the potters, and those that dwelt among plants and hedges: there they dwelt with the king for his work.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sons of Simeon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The sons of Simeon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ', Nemuel, and Jamin, Jarib, Zerah, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' Shaul: '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Shallum his son, Mibsam his son, Mishma his son. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And the sons of Mishma; Hamuel his son, Zacchur his son, Shimei his son. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And Shimei had sixteen sons and six daughters; but his brethren had not many children, neither did all their family multiply, like to the children of Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And they dwelt at Beer-sheba, and Moladah, and Hazar-shual, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'and at Bilhah, and at Ezem, and at Tolad, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'and at Bethuel, and at Hormah, and at Ziklag, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'and at Beth-marcaboth, and Hazar-susim, and at Beth-birei, and at Shaaraim. These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' their cities unto the reign of David. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And their villages '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ', Etam, and Ain, Rimmon, and Tochen, and Ashan, five cities: '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'and all their villages that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' round about the same cities, unto Baal. These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' their habitations, and their genealogy. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And Meshobab, and Jamlech, and Joshah the son of Amaziah, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'and Joel, and Jehu the son of Josibiah, the son of Seraiah, the son of Asiel, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'and Elioenai, and Jaakobah, and Jeshohaiah, and Asaiah, and Adiel, and Jesimiel, and Benaiah, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'and Ziza the son of Shiphi, the son of Allon, the son of Jedaiah, the son of Shimri, the son of Shemaiah; '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'these mentioned by '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' names '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' princes in their families: and the house of their fathers increased greatly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And they went to the entrance of Gedor, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' unto the east side of the valley, to seek pasture for their flocks. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And they found fat pasture and good, and the land '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' wide, and quiet, and peaceable; for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they
  - type: text
    text: ' of Ham had dwelt there of old. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And these written by name came in the days of Hezekiah king of Judah, and smote their tents, and the habitations that were found there, and destroyed them utterly unto this day, and dwelt in their rooms: because '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' pasture there for their flocks. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' of them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' of the sons of Simeon, five hundred men, went to mount Seir, having for their captains Pelatiah, and Neariah, and Rephaiah, and Uzziel, the sons of Ishi. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: And they smote the rest of the Amalekites that were escaped, and dwelt there unto this day.
