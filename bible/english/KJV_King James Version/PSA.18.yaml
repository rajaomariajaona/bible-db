document_id: PSA.18,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'To the chief Musician, '
  - type: text
    content: A Psalm
  - type: text
    content: ' of David, the servant of the '
  - type: text
    content: LORD
  - type: text
    content: ', who spake unto the '
  - type: text
    content: LORD
  - type: text
    content: ' the words of this song in the day '
  - type: text
    content: that
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' delivered him from the hand of all his enemies, and from the hand of Saul: And he said,'
  - type: text
    content: 'I will love thee, O '
  - type: text
    content: LORD
  - type: text
    content: ', my strength.'
  '10':
  - type: text
    content: 'And he rode upon a cherub, and did fly:'
  - type: text
    content: Yea, he did fly upon the wings of the wind.
  '11':
  - type: text
    content: He made darkness his secret place; his pavilion round about him
  - type: text
    content: Were
  - type: text
    content: ' dark waters '
  - type: text
    content: and
  - type: text
    content: ' thick clouds of the skies.'
  '12':
  - type: text
    content: 'At the brightness '
  - type: text
    content: that was
  - type: text
    content: ' before him his thick clouds passed,'
  - type: text
    content: 'Hail '
  - type: text
    content: stones
  - type: text
    content: ' and coals of fire.'
  '13':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' also thundered in the heavens, and the Highest gave his voice;'
  - type: text
    content: 'Hail '
  - type: text
    content: stones
  - type: text
    content: ' and coals of fire.'
  '14':
  - type: text
    content: Yea, he sent out his arrows, and scattered them;
  - type: text
    content: And he shot out lightnings, and discomfited them.
  '15':
  - type: text
    content: 'Then the channels of waters were seen, and the foundations of the world were discovered at thy rebuke, O '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: At the blast of the breath of thy nostrils.
  '16':
  - type: text
    content: He sent from above, he took me,
  - type: text
    content: He drew me out of many waters.
  '17':
  - type: text
    content: 'He delivered me from my strong enemy, and from them which hated me:'
  - type: text
    content: For they were too strong for me.
  '18':
  - type: text
    content: 'They prevented me in the day of my calamity:'
  - type: text
    content: 'But the '
  - type: text
    content: LORD
  - type: text
    content: ' was my stay.'
  '19':
  - type: text
    content: He brought me forth also into a large place;
  - type: text
    content: He delivered me, because he delighted in me.
  '2':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' my rock, and my fortress, and my deliverer;'
  - type: text
    content: My God, my strength, in whom I will trust;
  - type: text
    content: 'My buckler, and the horn of my salvation, '
  - type: text
    content: and
  - type: text
    content: ' my high tower.'
  '20':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' rewarded me according to my righteousness;'
  - type: text
    content: According to the cleanness of my hands hath he recompensed me.
  '21':
  - type: text
    content: 'For I have kept the ways of the '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: And have not wickedly departed from my God.
  '22':
  - type: text
    content: 'For all his judgments '
  - type: text
    content: were
  - type: text
    content: ' before me,'
  - type: text
    content: And I did not put away his statutes from me.
  '23':
  - type: text
    content: I was also upright before him,
  - type: text
    content: And I kept myself from mine iniquity.
  '24':
  - type: text
    content: 'Therefore hath the '
  - type: text
    content: LORD
  - type: text
    content: ' recompensed me according to my righteousness,'
  - type: text
    content: According to the cleanness of my hands in his eyesight.
  '25':
  - type: text
    content: With the merciful thou wilt shew thyself merciful;
  - type: text
    content: With an upright man thou wilt shew thyself upright;
  '26':
  - type: text
    content: With the pure thou wilt shew thyself pure;
  - type: text
    content: And with the froward thou wilt shew thyself froward.
  '27':
  - type: text
    content: For thou wilt save the afflicted people;
  - type: text
    content: But wilt bring down high looks.
  '28':
  - type: text
    content: 'For thou wilt light my candle:'
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' my God will enlighten my darkness.'
  '29':
  - type: text
    content: For by thee I have run through a troop;
  - type: text
    content: And by my God have I leaped over a wall.
  '3':
  - type: text
    content: 'I will call upon the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: who is worthy
  - type: text
    content: ' to be praised:'
  - type: text
    content: So shall I be saved from mine enemies.
  '30':
  - type: text
    content: ' '
  - type: text
    content: As for
  - type: text
    content: ' God, his way '
  - type: text
    content: is
  - type: text
    content: ' perfect:'
  - type: text
    content: 'The word of the '
  - type: text
    content: LORD
  - type: text
    content: ' is tried: He '
  - type: text
    content: is
  - type: text
    content: ' a buckler to all those that trust in him.'
  '31':
  - type: text
    content: 'For who '
  - type: text
    content: is
  - type: text
    content: ' God save the '
  - type: text
    content: LORD
  - type: text
    content: '?'
  - type: text
    content: 'Or who '
  - type: text
    content: is
  - type: text
    content: ' a rock save our God?'
  '32':
  - type: text
    content: ' '
  - type: text
    content: It is
  - type: text
    content: ' God that girdeth me with strength,'
  - type: text
    content: And maketh my way perfect.
  '33':
  - type: text
    content: 'He maketh my feet like hinds'' '
  - type: text
    content: feet
  - type: text
    content: ','
  - type: text
    content: And setteth me upon my high places.
  '34':
  - type: text
    content: He teacheth my hands to war,
  - type: text
    content: So that a bow of steel is broken by mine arms.
  '35':
  - type: text
    content: 'Thou hast also given me the shield of thy salvation:'
  - type: text
    content: And thy right hand hath holden me up, and thy gentleness hath made me great.
  '36':
  - type: text
    content: Thou hast enlarged my steps under me,
  - type: text
    content: That my feet did not slip.
  '37':
  - type: text
    content: 'I have pursued mine enemies, and overtaken them:'
  - type: text
    content: Neither did I turn again till they were consumed.
  '38':
  - type: text
    content: 'I have wounded them that they were not able to rise:'
  - type: text
    content: They are fallen under my feet.
  '39':
  - type: text
    content: 'For thou hast girded me with strength unto the battle:'
  - type: text
    content: Thou hast subdued under me those that rose up against me.
  '4':
  - type: text
    content: The sorrows of death compassed me,
  - type: text
    content: And the floods of ungodly men made me afraid.
  '40':
  - type: text
    content: Thou hast also given me the necks of mine enemies;
  - type: text
    content: That I might destroy them that hate me.
  '41':
  - type: text
    content: 'They cried, but '
  - type: text
    content: there was
  - type: text
    content: ' none to save '
  - type: text
    content: 'them:'
  - type: text
    content: Even
  - type: text
    content: ' unto the '
  - type: text
    content: LORD
  - type: text
    content: ', but he answered them not.'
  '42':
  - type: text
    content: 'Then did I beat them small as the dust before the wind:'
  - type: text
    content: I did cast them out as the dirt in the streets.
  '43':
  - type: text
    content: Thou hast delivered me from the strivings of the people;
  - type: text
    content: And
  - type: text
    content: ' thou hast made me the head of the heathen:'
  - type: text
    content: 'A people '
  - type: text
    content: whom
  - type: text
    content: I have not known shall serve me.
  '44':
  - type: text
    content: 'As soon as they hear of me, they shall obey me:'
  - type: text
    content: The strangers shall submit themselves unto me.
  '45':
  - type: text
    content: The strangers shall fade away,
  - type: text
    content: And be afraid out of their close places.
  '46':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' liveth; and blessed '
  - type: text
    content: be
  - type: text
    content: ' my rock;'
  - type: text
    content: And let the God of my salvation be exalted.
  '47':
  - type: text
    content: ' '
  - type: text
    content: It is
  - type: text
    content: ' God that avengeth me,'
  - type: text
    content: And subdueth the people under me.
  '48':
  - type: text
    content: 'He delivereth me from mine enemies: Yea, thou liftest me up above those that rise up against me:'
  - type: text
    content: Thou hast delivered me from the violent man.
  '49':
  - type: text
    content: 'Therefore will I give thanks unto thee, O '
  - type: text
    content: LORD
  - type: text
    content: ', among the heathen,'
  - type: text
    content: And sing praises unto thy name.
  '5':
  - type: text
    content: 'The sorrows of hell compassed me about:'
  - type: text
    content: The snares of death prevented me.
  '50':
  - type: text
    content: Great deliverance giveth he to his king;
  - type: text
    content: And sheweth mercy to his anointed, to David, and to his seed for evermore.
  '6':
  - type: text
    content: 'In my distress I called upon the '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: 'And cried unto my God:'
  - type: text
    content: He heard my voice out of his temple,
  - type: text
    content: 'And my cry came before him, '
  - type: text
    content: even
  - type: text
    content: ' into his ears.'
  '7':
  - type: text
    content: Then the earth shook and trembled;
  - type: text
    content: The foundations also of the hills moved and were shaken, because he was wroth.
  '8':
  - type: text
    content: There went up a smoke out of his nostrils,
  - type: text
    content: 'And fire out of his mouth devoured: Coals were kindled by it.'
  '9':
  - type: text
    content: 'He bowed the heavens also, and came down:'
  - type: text
    content: 'And darkness '
  - type: text
    content: was
  - type: text
    content: ' under his feet.'
