document_id: PSA.18,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the chief Musician, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: A Psalm
    - type: text
      text: ' of David, the servant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', who spake unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' the words of this song in the day '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' delivered him from the hand of all his enemies, and from the hand of Saul: And he said,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'I will love thee, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', my strength.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And he rode upon a cherub, and did fly:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yea, he did fly upon the wings of the wind.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: He made darkness his secret place; his pavilion round about him
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Were
    - type: text
      text: ' dark waters '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' thick clouds of the skies.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'At the brightness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that was
    - type: text
      text: ' before him his thick clouds passed,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Hail '
    - type: usfm
      marker: add
      children:
      - type: text
        text: stones
    - type: text
      text: ' and coals of fire.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' also thundered in the heavens, and the Highest gave his voice;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Hail '
    - type: usfm
      marker: add
      children:
      - type: text
        text: stones
    - type: text
      text: ' and coals of fire.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Yea, he sent out his arrows, and scattered them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he shot out lightnings, and discomfited them.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then the channels of waters were seen, and the foundations of the world were discovered at thy rebuke, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: At the blast of the breath of thy nostrils.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: He sent from above, he took me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He drew me out of many waters.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'He delivered me from my strong enemy, and from them which hated me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For they were too strong for me.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'They prevented me in the day of my calamity:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was my stay.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: He brought me forth also into a large place;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He delivered me, because he delighted in me.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my rock, and my fortress, and my deliverer;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My God, my strength, in whom I will trust;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'My buckler, and the horn of my salvation, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' my high tower.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' rewarded me according to my righteousness;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: According to the cleanness of my hands hath he recompensed me.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'For I have kept the ways of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And have not wickedly departed from my God.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'For all his judgments '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' before me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I did not put away his statutes from me.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: I was also upright before him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I kept myself from mine iniquity.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Therefore hath the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' recompensed me according to my righteousness,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: According to the cleanness of my hands in his eyesight.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: With the merciful thou wilt shew thyself merciful;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With an upright man thou wilt shew thyself upright;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: With the pure thou wilt shew thyself pure;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And with the froward thou wilt shew thyself froward.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: For thou wilt save the afflicted people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But wilt bring down high looks.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'For thou wilt light my candle:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' my God will enlighten my darkness.'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: For by thee I have run through a troop;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And by my God have I leaped over a wall.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'I will call upon the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: who is worthy
    - type: text
      text: ' to be praised:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So shall I be saved from mine enemies.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: As for
    - type: text
      text: ' God, his way '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' perfect:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' is tried: He '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a buckler to all those that trust in him.'
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'For who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' God save the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Or who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a rock save our God?'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' God that girdeth me with strength,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And maketh my way perfect.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'He maketh my feet like hinds'' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: feet
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And setteth me upon my high places.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: He teacheth my hands to war,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So that a bow of steel is broken by mine arms.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Thou hast also given me the shield of thy salvation:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thy right hand hath holden me up, and thy gentleness hath made me great.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Thou hast enlarged my steps under me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That my feet did not slip.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'I have pursued mine enemies, and overtaken them:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Neither did I turn again till they were consumed.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'I have wounded them that they were not able to rise:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are fallen under my feet.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'For thou hast girded me with strength unto the battle:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou hast subdued under me those that rose up against me.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The sorrows of death compassed me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the floods of ungodly men made me afraid.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Thou hast also given me the necks of mine enemies;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That I might destroy them that hate me.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'They cried, but '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' none to save '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'them:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Even
    - type: text
      text: ' unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', but he answered them not.'
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Then did I beat them small as the dust before the wind:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I did cast them out as the dirt in the streets.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Thou hast delivered me from the strivings of the people;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' thou hast made me the head of the heathen:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whom
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have not known shall serve me.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'As soon as they hear of me, they shall obey me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The strangers shall submit themselves unto me.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: The strangers shall fade away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And be afraid out of their close places.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' liveth; and blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' my rock;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let the God of my salvation be exalted.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' God that avengeth me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And subdueth the people under me.
  '48':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'He delivereth me from mine enemies: Yea, thou liftest me up above those that rise up against me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou hast delivered me from the violent man.
  '49':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Therefore will I give thanks unto thee, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', among the heathen,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And sing praises unto thy name.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The sorrows of hell compassed me about:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The snares of death prevented me.
  '50':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Great deliverance giveth he to his king;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And sheweth mercy to his anointed, to David, and to his seed for evermore.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'In my distress I called upon the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
