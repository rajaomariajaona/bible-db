document_id: ISA.40,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Concerning the return to Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comfort ye, comfort ye my people, saith your God. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ' will come with strong '
    - type: usfm
      marker: add
      children:
      - type: text
        text: hand
    - type: text
      text: ', and his arm shall rule for him: behold, his reward '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' with him, and his work before him. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He shall feed his flock like a shepherd: he shall gather the lambs with his arm, and carry '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' in his bosom, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' shall gently lead those that are with young.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who hath measured the waters in the hollow of his hand, and meted out heaven with the span, and comprehended the dust of the earth in a measure, and weighed the mountains in scales, and the hills in a balance? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who hath directed the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', or '
    - type: usfm
      marker: add
      children:
      - type: text
        text: being
    - type: text
      text: ' his counsellor hath taught him? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'With whom took he counsel, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: who
    - type: text
      text: ' instructed him, and taught him in the path of judgment, and taught him knowledge, and shewed to him the way of understanding? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, the nations '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' as a drop of a bucket, and are counted as the small dust of the balance: behold, he taketh up the isles as a very little thing. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Lebanon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not sufficient to burn, nor the beasts thereof sufficient for a burnt offering. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All nations before him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' as nothing; and they are counted to him less than nothing, and vanity.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To whom then will ye liken God? or what likeness will ye compare unto him? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The workman melteth a graven image, and the goldsmith spreadeth it over with gold, and casteth silver chains. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Speak ye comfortably to Jerusalem, and cry unto her, that her warfare is accomplished, that her iniquity is pardoned: for she hath received of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '''s hand double for all her sins.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' so impoverished that he hath no oblation chooseth a tree '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' will not rot; he seeketh unto him a cunning workman to prepare a graven image, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' shall not be moved. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Have ye not known? have ye not heard? hath it not been told you from the beginning? have ye not understood from the foundations of the earth? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' he that sitteth upon the circle of the earth, and the inhabitants thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' as grasshoppers; that stretcheth out the heavens as a curtain, and spreadeth them out as a tent to dwell in: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that bringeth the princes to nothing; he maketh the judges of the earth as vanity. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yea, they shall not be planted; yea, they shall not be sown: yea, their stock shall not take root in the earth: and he shall also blow upon them, and they shall wither, and the whirlwind shall take them away as stubble. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To whom then will ye liken me, or shall I be equal? saith the Holy One. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lift up your eyes on high, and behold who hath created these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ', that bringeth out their host by number: he calleth them all by names by the greatness of his might, for that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he is
    - type: text
      text: ' strong in power; not one faileth.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Why sayest thou, O Jacob, and speakest, O Israel, My way is hid from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and my judgment is passed over from my God? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hast thou not known? hast thou not heard, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the everlasting God, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', the Creator of the ends of the earth, fainteth not, neither is weary? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no searching of his understanding. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He giveth power to the faint; and to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them that have
    - type: text
      text: ' no might he increaseth strength. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The voice of him that crieth in the wilderness, Prepare ye the way of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', make straight in the desert a highway for our God. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Even the youths shall faint and be weary, and the young men shall utterly fall: '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but they that wait upon the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall renew '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' strength; they shall mount up with wings as eagles; they shall run, and not be weary; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' they shall walk, and not faint.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Every valley shall be exalted, and every mountain and hill shall be made low: and the crooked shall be made straight, and the rough places plain: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall be revealed, and all flesh shall see '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' together: for the mouth of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath spoken '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The voice said, Cry. And he said, What shall I cry? All flesh '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' grass, and all the goodliness thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' as the flower of the field: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the grass withereth, the flower fadeth: because the spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' bloweth upon it: surely the people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' grass. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The grass withereth, the flower fadeth: but the word of our God shall stand for ever.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Behold your God
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'O Zion, that bringest good tidings, get thee up into the high mountain; O Jerusalem, that bringest good tidings, lift up thy voice with strength; lift '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' up, be not afraid; say unto the cities of Judah, Behold your God! '
