  '21':
  - type: text
    content: 'Have ye not known? have ye not heard? hath it not been told you from the beginning? have ye not understood from the foundations of the earth? '
  '22':
  - type: text
    content: It is
  - type: text
    content: ' he that sitteth upon the circle of the earth, and the inhabitants thereof '
