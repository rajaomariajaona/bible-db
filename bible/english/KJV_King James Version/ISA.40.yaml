    content: 'that bringeth the princes to nothing; he maketh the judges of the earth as vanity. '
  '24':
  - type: text
    content: 'Yea, they shall not be planted; yea, they shall not be sown: yea, their stock shall not take root in the earth: and he shall also blow upon them, and they shall wither, and the whirlwind shall take them away as stubble. '
  '25':
  - type: text
    content: 'To whom then will ye liken me, or shall I be equal? saith the Holy One. '
