    content: 'The workman melteth a graven image, and the goldsmith spreadeth it over with gold, and casteth silver chains. '
  '2':
  - type: text
    content: 'Speak ye comfortably to Jerusalem, and cry unto her, that her warfare is accomplished, that her iniquity is pardoned: for she hath received of the '
  - type: text
    content: LORD
  - type: text
    content: '''s hand double for all her sins.'
