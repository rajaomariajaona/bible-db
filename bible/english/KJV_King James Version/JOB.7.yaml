document_id: JOB.7
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is there
  - type: text
    text: ' not an appointed time to man upon earth?'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Are not
  - type: text
    text: ' his days also like the days of an hireling?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: As a servant earnestly desireth the shadow,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And as an hireling looketh for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the reward of
  - type: text
    text: ' his work:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: So am I made to possess months of vanity,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And wearisome nights are appointed to me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: When I lie down, I say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: When shall I arise, and the night be gone?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And I am full of tossings to and fro unto the dawning of the day.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: My flesh is clothed with worms and clods of dust;
- type: usfm
  marker: q2
  children:
  - type: text
    text: My skin is broken, and become loathsome.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: My days are swifter than a weaver's shuttle,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And are spent without hope.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'O remember that my life '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' wind:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Mine eye shall no more see good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The eye of him that hath seen me shall see me no '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'more:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Thine eyes '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' upon me, and I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' not.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' the cloud is consumed and vanisheth away:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'So he that goeth down to the grave shall come up no '
  - type: usfm
    marker: add
    children:
    - type: text
      text: more
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He shall return no more to his house,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Neither shall his place know him any more.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Therefore I will not refrain my mouth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will speak in the anguish of my spirit;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will complain in the bitterness of my soul.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Am
  - type: text
    text: ' I a sea, or a whale,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: That thou settest a watch over me?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: When I say, My bed shall comfort me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: My couch shall ease my complaint;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then thou scarest me with dreams,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And terrifiest me through visions:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So that my soul chooseth strangling,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' death rather than my life.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I loathe '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '; I would not live alway:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Let me alone; for my days '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' vanity.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'What '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' man, that thou shouldest magnify him?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And that thou shouldest set thine heart upon him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' thou shouldest visit him every morning,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' try him every moment?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: How long wilt thou not depart from me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nor let me alone till I swallow down my spittle?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I have sinned; what shall I do unto thee, O thou preserver of men?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why hast thou set me as a mark against thee,
- type: usfm
  marker: q2
  children:
  - type: text
    text: So that I am a burden to myself?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: And why dost thou not pardon my transgression,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And take away mine iniquity?
- type: usfm
  marker: q2
  children:
  - type: text
    text: For now shall I sleep in the dust;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And thou shalt seek me in the morning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall
  - type: text
    text: ' not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: .
