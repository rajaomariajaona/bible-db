document_id: ISA.59
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Behold, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s hand is not shortened, that it cannot save; neither his ear heavy, that it cannot hear: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'but your iniquities have separated between you and your God, and your sins have hid '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' face from you, that he will not hear. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For your hands are defiled with blood, and your fingers with iniquity; your lips have spoken lies, your tongue hath muttered perverseness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'None calleth for justice, nor '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' pleadeth for truth: they trust in vanity, and speak lies; they conceive mischief, and bring forth iniquity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They hatch cockatrice'' eggs, and weave the spider''s web: he that eateth of their eggs dieth, and that which is crushed breaketh out into a viper. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Their webs shall not become garments, neither shall they cover themselves with their works: their works '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' works of iniquity, and the act of violence '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in their hands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Their feet run to evil, and they make haste to shed innocent blood: their thoughts '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' thoughts of iniquity; wasting and destruction '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' in their paths. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The way of peace they know not; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no judgment in their goings: they have made them crooked paths: whosoever goeth therein shall not know peace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Therefore is judgment far from us, neither doth justice overtake us: we wait for light, but behold obscurity; for brightness, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' we walk in darkness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'We grope for the wall like the blind, and we grope as if '
  - type: usfm
    marker: add
    children:
    - type: text
      text: we had
  - type: text
    text: ' no eyes: we stumble at noon day as in the night; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: we are
  - type: text
    text: ' in desolate places as dead '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'We roar all like bears, and mourn sore like doves: we look for judgment, but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' none; for salvation, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' it is far off from us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For our transgressions are multiplied before thee, and our sins testify against us: for our transgressions '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' with us; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as for
  - type: text
    text: ' our iniquities, we know them; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'in transgressing and lying against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and departing away from our God, speaking oppression and revolt, conceiving and uttering from the heart words of falsehood. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And judgment is turned away backward, and justice standeth afar off: for truth is fallen in the street, and equity cannot enter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Yea, truth faileth; and he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' departeth from evil maketh himself a prey: and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and it displeased him that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' no judgment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And he saw that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' no man, and wondered that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' no intercessor: therefore his arm brought salvation unto him; and his righteousness, it sustained him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For he put on righteousness as a breastplate, and an helmet of salvation upon his head; and he put on the garments of vengeance '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' clothing, and was clad with zeal as a cloke. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'According to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' deeds, accordingly he will repay, fury to his adversaries, recompence to his enemies; to the islands he will repay recompence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So shall they fear the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' from the west, and his glory from the rising of the sun. When the enemy shall come in like a flood, the Spirit of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall lift up a standard against him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the Redeemer shall come to Zion, and unto them that turn from transgression in Jacob, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'As for me, this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my covenant with them, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; My spirit that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon thee, and my words which I have put in thy mouth, shall not depart out of thy mouth, nor out of the mouth of thy seed, nor out of the mouth of thy seed''s seed, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', from henceforth and for ever.'
