  - type: text
    content: ', from henceforth and for ever.'
  '3':
  - type: text
    content: 'For your hands are defiled with blood, and your fingers with iniquity; your lips have spoken lies, your tongue hath muttered perverseness. '
  '4':
  - type: text
    content: 'None calleth for justice, nor '
  - type: text
    content: any
  - type: text
