  '5':
  - type: text
    content: 'They hatch cockatrice'' eggs, and weave the spider''s web: he that eateth of their eggs dieth, and that which is crushed breaketh out into a viper. '
  '6':
  - type: text
    content: 'Their webs shall not become garments, neither shall they cover themselves with their works: their works '
  - type: text
    content: are
  - type: text
    content: ' works of iniquity, and the act of violence '
  - type: text
    content: is
  - type: text
    content: ' in their hands. '
  '7':
  - type: text
    content: 'Their feet run to evil, and they make haste to shed innocent blood: their thoughts '
  - type: text
    content: are
  - type: text
    content: ' thoughts of iniquity; wasting and destruction '
  - type: text
    content: are
  - type: text
    content: ' in their paths. '
  '8':
  - type: text
    content: 'The way of peace they know not; and '
  - type: text
    content: there is
  - type: text
    content: ' no judgment in their goings: they have made them crooked paths: whosoever goeth therein shall not know peace.'
  '9':
  - type: text
    content: 'Therefore is judgment far from us, neither doth justice overtake us: we wait for light, but behold obscurity; for brightness, '
  - type: text
