document_id: MAT.12,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Challenged
  - type: text
    content: 'At that time Jesus went on the sabbath day through the corn; and his disciples were an hungred, and began to pluck the ears of corn, and to eat. '
  '10':
  - type: text
    content: 'and, behold, there was a man which had '
  - type: text
    content: his
  - type: text
    content: ' hand withered. And they asked him, saying, Is it lawful to heal on the sabbath days? that they might accuse him. '
  '11':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: 'What man shall there be among you, that shall have one sheep, and if it fall into a pit on the sabbath day, will he not lay hold on it, and lift '
  - type: text
    content: it
  - type: text
    content: ' out?'
  - type: text
    content: ' '
  '12':
  - type: text
    content: How much then is a man better than a sheep? Wherefore it is lawful to do well on the sabbath days.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Then saith he to the man, '
  - type: text
    content: Stretch forth thine hand.
  - type: text
    content: ' And he stretched '
  - type: text
    content: it
  - type: text
    content: ' forth; and it was restored whole, like as the other.'
  - type: heading
    content: A Council of Pharisees
  '14':
  - type: text
    content: 'Then the Pharisees went out, and held a council against him, how they might destroy him. '
  '15':
  - type: text
    content: 'But when Jesus knew '
  - type: text
    content: it
  - type: text
    content: ', he withdrew himself from thence: and great multitudes followed him, and he healed them all; '
  '16':
  - type: text
    content: 'and charged them that they should not make him known: '
  '17':
  - type: text
    content: that it might be fulfilled which was spoken by Esaias the prophet, saying,
  '18':
  - type: text
    content: Behold my servant, whom I have chosen;
  - type: text
    content: 'My beloved, in whom my soul is well pleased:'
  - type: text
    content: I will put my spirit upon him,
  - type: text
    content: And he shall shew judgment to the Gentiles.
  '19':
  - type: text
    content: He shall not strive, nor cry;
  - type: text
    content: Neither shall any man hear his voice in the streets.
  '2':
  - type: text
    content: 'But when the Pharisees saw '
  - type: text
    content: it
  - type: text
    content: ', they said unto him, Behold, thy disciples do that which is not lawful to do upon the sabbath day. '
  '20':
  - type: text
    content: A bruised reed shall he not break,
  - type: text
    content: And smoking flax shall he not quench,
  - type: text
    content: Till he send forth judgment unto victory.
  '21':
  - type: text
    content: And in his name shall the Gentiles trust.
  - type: heading
    content: False Charges
  '22':
  - type: text
    content: 'Then was brought unto him one possessed with a devil, blind, and dumb: and he healed him, insomuch that the blind and dumb both spake and saw. '
  '23':
  - type: text
    content: 'And all the people were amazed, and said, Is not this the son of David? '
  '24':
  - type: text
    content: 'But when the Pharisees heard '
  - type: text
    content: it
  - type: text
    content: ', they said, This '
  - type: text
    content: fellow
  - type: text
    content: ' doth not cast out devils, but by Beelzebub the prince of the devils. '
  '25':
  - type: text
    content: 'And Jesus knew their thoughts, and said unto them, '
  - type: text
    content: 'Every kingdom divided against itself is brought to desolation; and every city or house divided against itself shall not stand:'
  - type: text
    content: ' '
  '26':
  - type: text
    content: and if Satan cast out Satan, he is divided against himself; how shall then his kingdom stand?
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'And if I by Beelzebub cast out devils, by whom do your children cast '
  - type: text
    content: them
  - type: text
    content: ' out? therefore they shall be your judges.'
  - type: text
    content: ' '
  '28':
  - type: text
    content: But if I cast out devils by the Spirit of God, then the kingdom of God is come unto you.
  - type: text
    content: ' '
  '29':
  - type: text
    content: Or else how can one enter into a strong man's house, and spoil his goods, except he first bind the strong man? and then he will spoil his house.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'But he said unto them, '
  - type: text
    content: Have ye not read what David did, when he was an hungred, and they that were with him;
  - type: text
    content: ' '
  '30':
  - type: text
    content: He that is not with me is against me; and he that gathereth not with me scattereth abroad.
  - type: heading
    content: Blasphemy
  '31':
  - type: text
    content: ' '
  - type: text
    content: 'Wherefore I say unto you, All manner of sin and blasphemy shall be forgiven unto men: but the blasphemy '
  - type: text
    content: against
  - type: text
    content: ' the '
  - type: text
    content: Holy
  - type: text
    content: ' Ghost shall not be forgiven unto men.'
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'And whosoever speaketh a word against the Son of man, it shall be forgiven him: but whosoever speaketh against the Holy Ghost, it shall not be forgiven him, neither in this world, neither in the '
  - type: text
    content: world
  - type: text
    content: ' to come.'
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'Either make the tree good, and his fruit good; or else make the tree corrupt, and his fruit corrupt: for the tree is known by '
  - type: text
    content: his
  - type: text
    content: ' fruit.'
  - type: text
    content: ' '
  '34':
  - type: text
    content: O generation of vipers, how can ye, being evil, speak good things? for out of the abundance of the heart the mouth speaketh.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'A good man out of the good treasure of the heart bringeth forth good things: and an evil man out of the evil treasure bringeth forth evil things.'
  - type: text
    content: ' '
  '36':
  - type: text
    content: But I say unto you, That every idle word that men shall speak, they shall give account thereof in the day of judgment.
  - type: text
    content: ' '
  '37':
  - type: text
    content: For by thy words thou shalt be justified, and by thy words thou shalt be condemned.
  - type: heading
    content: Demand for a Sign
  '38':
  - type: text
    content: 'Then certain of the scribes and of the Pharisees answered, saying, Master, we would see a sign from thee. '
  '39':
  - type: text
    content: 'But he answered and said unto them, '
  - type: text
    content: 'An evil and adulterous generation seeketh after a sign; and there shall no sign be given to it, but the sign of the prophet Jonas:'
  - type: text
    content: ' '
  '4':
  - type: text
    content: how he entered into the house of God, and did eat the shewbread, which was not lawful for him to eat, neither for them which were with him, but only for the priests?
  - type: text
    content: ' '
  '40':
  - type: text
    content: for as Jonas was three days and three nights in the whale's belly; so shall the Son of man be three days and three nights in the heart of the earth.
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'The men of Nineveh shall rise in judgment with this generation, and shall condemn it: because they repented at the preaching of Jonas; and, behold, a greater than Jonas '
  - type: text
    content: is
  - type: text
    content: ' here.'
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'The queen of the south shall rise up in the judgment with this generation, and shall condemn it: for she came from the uttermost parts of the earth to hear the wisdom of Solomon; and, behold, a greater than Solomon '
  - type: text
    content: is
  - type: text
    content: ' here.'
  - type: text
    content: ' '
  '43':
  - type: text
    content: When the unclean spirit is gone out of a man, he walketh through dry places, seeking rest, and findeth none.
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'Then he saith, I will return into my house from whence I came out; and when he is come, he findeth '
  - type: text
    content: it
  - type: text
    content: ' empty, swept, and garnished.'
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'Then goeth he, and taketh with himself seven other spirits more wicked than himself, and they enter in and dwell there: and the last '
  - type: text
    content: state
  - type: text
    content: ' of that man is worse than the first. Even so shall it be also unto this wicked generation.'
  '46':
  - type: text
    content: While he yet talked to the people, behold,
  - type: heading
    content: His Mother and Brethren
  - type: text
    content: his
  - type: text
    content: ' mother and his brethren stood without, desiring to speak with him. '
  '47':
  - type: text
    content: 'Then one said unto him, Behold, thy mother and thy brethren stand without, desiring to speak with thee. '
  '48':
  - type: text
    content: 'But he answered and said unto him that told him, '
  - type: text
    content: Who is my mother? and who are my brethren?
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'And he stretched forth his hand toward his disciples, and said, '
  - type: text
    content: Behold my mother and my brethren!
  - type: text
    content: ' '
  '5':
  - type: text
    content: Or have ye not read in the law, how that on the sabbath days the priests in the temple profane the sabbath, and are blameless?
  - type: text
    content: ' '
  '50':
  - type: text
    content: For whosoever shall do the will of my Father which is in heaven, the same is my brother, and sister, and mother.
  '6':
  - type: text
    content: 'But I say unto you, That in this place is '
  - type: text
    content: one
  - type: text
    content: ' greater than the temple.'
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'But if ye had known what '
  - type: text
    content: this
  - type: text
    content: ' meaneth, I will have mercy, and not sacrifice, ye would not have condemned the guiltless.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: For the Son of man is Lord even of the sabbath day.
  '9':
  - type: text
    content: 'And when he was departed thence, he went into their synagogue: '
