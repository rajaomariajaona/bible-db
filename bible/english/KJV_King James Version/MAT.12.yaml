document_id: MAT.12
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Jesus Challenged
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'At that time Jesus went on the sabbath day through the corn; and his disciples were an hungred, and began to pluck the ears of corn, and to eat. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'But when the Pharisees saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', they said unto him, Behold, thy disciples do that which is not lawful to do upon the sabbath day. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But he said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Have ye not read what David did, when he was an hungred, and they that were with him;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: how he entered into the house of God, and did eat the shewbread, which was not lawful for him to eat, neither for them which were with him, but only for the priests?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Or have ye not read in the law, how that on the sabbath days the priests in the temple profane the sabbath, and are blameless?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But I say unto you, That in this place is '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' greater than the temple.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But if ye had known what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ' meaneth, I will have mercy, and not sacrifice, ye would not have condemned the guiltless.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For the Son of man is Lord even of the sabbath day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And when he was departed thence, he went into their synagogue: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and, behold, there was a man which had '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' hand withered. And they asked him, saying, Is it lawful to heal on the sabbath days? that they might accuse him. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And he said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'What man shall there be among you, that shall have one sheep, and if it fall into a pit on the sabbath day, will he not lay hold on it, and lift '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' out?'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: How much then is a man better than a sheep? Wherefore it is lawful to do well on the sabbath days.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then saith he to the man, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Stretch forth thine hand.
  - type: text
    text: ' And he stretched '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' forth; and it was restored whole, like as the other.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: A Council of Pharisees
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then the Pharisees went out, and held a council against him, how they might destroy him. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But when Jesus knew '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', he withdrew himself from thence: and great multitudes followed him, and he healed them all; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and charged them that they should not make him known: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: that it might be fulfilled which was spoken by Esaias the prophet, saying,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Behold my servant, whom I have chosen;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'My beloved, in whom my soul is well pleased:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will put my spirit upon him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he shall shew judgment to the Gentiles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He shall not strive, nor cry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Neither shall any man hear his voice in the streets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: A bruised reed shall he not break,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And smoking flax shall he not quench,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Till he send forth judgment unto victory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: And in his name shall the Gentiles trust.
- type: usfm
  marker: s2
  children:
  - type: text
    text: False Charges
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then was brought unto him one possessed with a devil, blind, and dumb: and he healed him, insomuch that the blind and dumb both spake and saw. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And all the people were amazed, and said, Is not this the son of David? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'But when the Pharisees heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', they said, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: fellow
  - type: text
    text: ' doth not cast out devils, but by Beelzebub the prince of the devils. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And Jesus knew their thoughts, and said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Every kingdom divided against itself is brought to desolation; and every city or house divided against itself shall not stand:'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and if Satan cast out Satan, he is divided against himself; how shall then his kingdom stand?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And if I by Beelzebub cast out devils, by whom do your children cast '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' out? therefore they shall be your judges.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But if I cast out devils by the Spirit of God, then the kingdom of God is come unto you.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Or else how can one enter into a strong man's house, and spoil his goods, except he first bind the strong man? and then he will spoil his house.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He that is not with me is against me; and he that gathereth not with me scattereth abroad.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Blasphemy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Wherefore I say unto you, All manner of sin and blasphemy shall be forgiven unto men: but the blasphemy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: against
    - type: text
      text: ' the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Holy
    - type: text
      text: ' Ghost shall not be forgiven unto men.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And whosoever speaketh a word against the Son of man, it shall be forgiven him: but whosoever speaketh against the Holy Ghost, it shall not be forgiven him, neither in this world, neither in the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: world
    - type: text
      text: ' to come.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Either make the tree good, and his fruit good; or else make the tree corrupt, and his fruit corrupt: for the tree is known by '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' fruit.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: O generation of vipers, how can ye, being evil, speak good things? for out of the abundance of the heart the mouth speaketh.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'A good man out of the good treasure of the heart bringeth forth good things: and an evil man out of the evil treasure bringeth forth evil things.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But I say unto you, That every idle word that men shall speak, they shall give account thereof in the day of judgment.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For by thy words thou shalt be justified, and by thy words thou shalt be condemned.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Demand for a Sign
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Then certain of the scribes and of the Pharisees answered, saying, Master, we would see a sign from thee. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'But he answered and said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'An evil and adulterous generation seeketh after a sign; and there shall no sign be given to it, but the sign of the prophet Jonas:'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for as Jonas was three days and three nights in the whale's belly; so shall the Son of man be three days and three nights in the heart of the earth.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'The men of Nineveh shall rise in judgment with this generation, and shall condemn it: because they repented at the preaching of Jonas; and, behold, a greater than Jonas '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' here.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'The queen of the south shall rise up in the judgment with this generation, and shall condemn it: for she came from the uttermost parts of the earth to hear the wisdom of Solomon; and, behold, a greater than Solomon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' here.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: When the unclean spirit is gone out of a man, he walketh through dry places, seeking rest, and findeth none.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Then he saith, I will return into my house from whence I came out; and when he is come, he findeth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' empty, swept, and garnished.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Then goeth he, and taketh with himself seven other spirits more wicked than himself, and they enter in and dwell there: and the last '
    - type: usfm
      marker: add
      children:
      - type: text
        text: state
    - type: text
      text: ' of that man is worse than the first. Even so shall it be also unto this wicked generation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: While he yet talked to the people, behold,
- type: usfm
  marker: s2
  children:
  - type: text
    text: His Mother and Brethren
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' mother and his brethren stood without, desiring to speak with him. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Then one said unto him, Behold, thy mother and thy brethren stand without, desiring to speak with thee. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'But he answered and said unto him that told him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Who is my mother? and who are my brethren?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'And he stretched forth his hand toward his disciples, and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Behold my mother and my brethren!
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For whosoever shall do the will of my Father which is in heaven, the same is my brother, and sister, and mother.
