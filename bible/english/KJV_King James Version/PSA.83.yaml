verses:
  '1':
  - type: text
    content: 'A Song '
  - type: text
    content: or
  - type: text
    content: ' Psalm of Asaph.'
  - type: text
    content: 'Keep not thou silence, O God:'
  - type: text
    content: Hold not thy peace, and be not still, O God.
  '10':
  - type: text
    content: ' '
  - type: text
    content: Which
  - type: text
    content: ' perished at Endor:'
  - type: text
    content: 'They became '
  - type: text
    content: as
  - type: text
    content: ' dung for the earth.'
  '11':
  - type: text
    content: 'Make their nobles like Oreb, and like Zeeb:'
  - type: text
    content: 'Yea, all their princes as Zebah, and as Zalmunna:'
  '12':
  - type: text
    content: Who said, Let us take to ourselves
  - type: text
    content: The houses of God in possession.
  '13':
  - type: text
    content: O my God, make them like a wheel;
  - type: text
    content: As the stubble before the wind.
  '14':
  - type: text
    content: As the fire burneth a wood,
  - type: text
    content: And as the flame setteth the mountains on fire;
  '15':
  - type: text
    content: So persecute them with thy tempest,
  - type: text
    content: And make them afraid with thy storm.
  '16':
  - type: text
    content: Fill their faces with shame;
  - type: text
    content: 'That they may seek thy name, O '
  - type: text
    content: LORD
  - type: text
    content: .
  '17':
  - type: text
    content: Let them be confounded and troubled for ever;
  - type: text
    content: 'Yea, let them be put to shame, and perish:'
  '18':
  - type: text
    content: 'That '
  - type: text
    content: men
  - type: text
    content: ' may know that thou, whose name alone '
  - type: text
    content: is
  - type: text
    content: ' JEHOVAH,'
  - type: text
    content: Art
  - type: text
    content: ' the Most High over all the earth.'
  '2':
  - type: text
    content: 'For, lo, thine enemies make a tumult:'
  - type: text
    content: And they that hate thee have lifted up the head.
  '3':
  - type: text
    content: They have taken crafty counsel against thy people,
  - type: text
    content: And consulted against thy hidden ones.
  '4':
  - type: text
    content: 'They have said, Come, and let us cut them off from '
  - type: text
    content: being
  - type: text
    content: ' a nation;'
  - type: text
    content: That the name of Israel may be no more in remembrance.
  '5':
  - type: text
    content: 'For they have consulted together with one consent:'
  - type: text
    content: 'They are confederate against thee:'
  '6':
  - type: text
    content: The tabernacles of Edom, and the Ishmaelites;
  - type: text
    content: Of Moab, and the Hagarenes;
  '7':
  - type: text
    content: Gebal, and Ammon, and Amalek;
  - type: text
    content: The Philistines with the inhabitants of Tyre;
  '8':
  - type: text
    content: 'Assur also is joined with them:'
  - type: text
    content: 'They have holpen the children of Lot. '
  - type: text
    content: Selah.
  '9':
  - type: text
    content: 'Do unto them as '
  - type: text
    content: unto
  - type: text
    content: ' the Midianites;'
  - type: text
    content: 'As '
  - type: text
    content: to
  - type: text
    content: ' Sisera, as '
  - type: text
    content: to
  - type: text
    content: ' Jabin, at the brook of Kison:'
