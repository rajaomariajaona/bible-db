document_id: PSA.83,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'A Song '
    - type: usfm
      marker: add
      children:
      - type: text
        text: or
    - type: text
      text: ' Psalm of Asaph.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Keep not thou silence, O God:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Hold not thy peace, and be not still, O God.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Which
    - type: text
      text: ' perished at Endor:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They became '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' dung for the earth.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Make their nobles like Oreb, and like Zeeb:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yea, all their princes as Zebah, and as Zalmunna:'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Who said, Let us take to ourselves
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The houses of God in possession.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: O my God, make them like a wheel;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As the stubble before the wind.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: As the fire burneth a wood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And as the flame setteth the mountains on fire;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: So persecute them with thy tempest,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And make them afraid with thy storm.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Fill their faces with shame;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That they may seek thy name, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Let them be confounded and troubled for ever;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yea, let them be put to shame, and perish:'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'That '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' may know that thou, whose name alone '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' JEHOVAH,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Art
    - type: text
      text: ' the Most High over all the earth.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For, lo, thine enemies make a tumult:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they that hate thee have lifted up the head.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: They have taken crafty counsel against thy people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And consulted against thy hidden ones.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'They have said, Come, and let us cut them off from '
    - type: usfm
      marker: add
      children:
      - type: text
        text: being
    - type: text
      text: ' a nation;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That the name of Israel may be no more in remembrance.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For they have consulted together with one consent:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They are confederate against thee:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The tabernacles of Edom, and the Ishmaelites;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Of Moab, and the Hagarenes;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Gebal, and Ammon, and Amalek;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The Philistines with the inhabitants of Tyre;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Assur also is joined with them:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They have holpen the children of Lot. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Do unto them as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: unto
    - type: text
      text: ' the Midianites;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'As '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to
    - type: text
      text: ' Sisera, as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to
    - type: text
      text: ' Jabin, at the brook of Kison:'
