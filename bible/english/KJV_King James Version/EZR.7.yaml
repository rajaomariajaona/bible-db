document_id: EZR.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ezra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now after these things, in the reign of Artaxerxes king of Persia, Ezra the son of Seraiah, the son of Azariah, the son of Hilkiah, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'the son of Shallum, the son of Zadok, the son of Ahitub, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'the son of Amariah, the son of Azariah, the son of Meraioth, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'the son of Zerahiah, the son of Uzzi, the son of Bukki, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'the son of Abishua, the son of Phinehas, the son of Eleazar, the son of Aaron the chief priest: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'this Ezra went up from Babylon; and he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' a ready scribe in the law of Moses, which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel had given: and the king granted him all his request, according to the hand of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' his God upon him. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And there went up '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' of the children of Israel, and of the priests, and the Levites, and the singers, and the porters, and the Nethinims, unto Jerusalem, in the seventh year of Artaxerxes the king. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And he came to Jerusalem in the fifth month, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in the seventh year of the king. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For upon the first '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' of the first month began he to go up from Babylon, and on the first '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' of the fifth month came he to Jerusalem, according to the good hand of his God upon him. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For Ezra had prepared his heart to seek the law of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and to do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and to teach in Israel statutes and judgments.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Letter of Authority
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the copy of the letter that the king Artaxerxes gave unto Ezra the priest, the scribe, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' a scribe of the words of the commandments of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and of his statutes to Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Artaxerxes, king of kings, unto Ezra the priest, a scribe of the law of the God of heaven, perfect '
  - type: usfm
    marker: add
    children:
    - type: text
      text: peace
  - type: text
    text: ', and at such a time. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I make a decree, that all they of the people of Israel, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' his priests and Levites, in my realm, which are minded of their own freewill to go up to Jerusalem, go with thee. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Forasmuch as thou art sent of the king, and of his seven counsellors, to enquire concerning Judah and Jerusalem, according to the law of thy God which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in thine hand; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and to carry the silver and gold, which the king and his counsellors have freely offered unto the God of Israel, whose habitation '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in Jerusalem, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and all the silver and gold that thou canst find in all the province of Babylon, with the freewill offering of the people, and of the priests, offering willingly for the house of their God which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in Jerusalem: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'that thou mayest buy speedily with this money bullocks, rams, lambs, with their meat offerings and their drink offerings, and offer them upon the altar of the house of your God which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And whatsoever shall seem good to thee, and to thy brethren, to do with the rest of the silver and the gold, that do after the will of your God. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The vessels also that are given thee for the service of the house of thy God, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: those
  - type: text
    text: ' deliver thou before the God of Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And whatsoever more shall be needful for the house of thy God, which thou shalt have occasion to bestow, bestow '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' out of the king''s treasure house. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And I, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' I Artaxerxes the king, do make a decree to all the treasurers which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' beyond the river, that whatsoever Ezra the priest, the scribe of the law of the God of heaven, shall require of you, it be done speedily, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'unto an hundred talents of silver, and to an hundred measures of wheat, and to an hundred baths of wine, and to an hundred baths of oil, and salt without prescribing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: how much
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Whatsoever is commanded by the God of heaven, let it be diligently done for the house of the God of heaven: for why should there be wrath against the realm of the king and his sons? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Also we certify you, that touching any of the priests and Levites, singers, porters, Nethinims, or ministers of this house of God, it shall not be lawful to impose toll, tribute, or custom, upon them. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And thou, Ezra, after the wisdom of thy God, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in thine hand, set magistrates and judges, which may judge all the people that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' beyond the river, all such as know the laws of thy God; and teach ye them that know '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' not. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And whosoever will not do the law of thy God, and the law of the king, let judgment be executed speedily upon him, whether '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it be
  - type: text
    text: ' unto death, or to banishment, or to confiscation of goods, or to imprisonment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of our fathers, which hath put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: such a thing
  - type: text
    text: ' as this in the king''s heart, to beautify the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in Jerusalem: '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and hath extended mercy unto me before the king, and his counsellors, and before all the king''s mighty princes. And I was strengthened as the hand of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' my God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' upon me, and I gathered together out of Israel chief men to go up with me.'
