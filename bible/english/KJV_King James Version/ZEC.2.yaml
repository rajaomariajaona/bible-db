document_id: ZEC.2,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: A Measuring Line
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I lifted up mine eyes again, and looked, and behold a man with a measuring line in his hand. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sing and rejoice, O daughter of Zion: for, lo, I come, and I will dwell in the midst of thee, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And many nations shall be joined to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in that day, and shall be my people: and I will dwell in the midst of thee, and thou shalt know that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts hath sent me unto thee. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall inherit Judah his portion in the holy land, and shall choose Jerusalem again. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be silent, O all flesh, before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': for he is raised up out of his holy habitation.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said I, Whither goest thou? And he said unto me, To measure Jerusalem, to see what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the breadth thereof, and what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the length thereof. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And, behold, the angel that talked with me went forth, and another angel went out to meet him, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said unto him, Run, speak to this young man, saying, Jerusalem shall be inhabited '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' towns without walls for the multitude of men and cattle therein: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', will be unto her a wall of fire round about, and will be the glory in the midst of her.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho, ho, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: come forth
    - type: text
      text: ', and flee from the land of the north, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': for I have spread you abroad as the four winds of the heaven, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Deliver thyself, O Zion, that dwellest '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' the daughter of Babylon. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts; After the glory hath he sent me unto the nations which spoiled you: for he that toucheth you toucheth the apple of his eye. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For, behold, I will shake mine hand upon them, and they shall be a spoil to their servants: and ye shall know that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts hath sent me. '
