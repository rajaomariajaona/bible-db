document_id: ZEC.2,1
type_code: eng
verses:
  '1':
  - type: heading
    content: A Measuring Line
  - type: text
    content: 'I lifted up mine eyes again, and looked, and behold a man with a measuring line in his hand. '
  '10':
  - type: text
    content: 'Sing and rejoice, O daughter of Zion: for, lo, I come, and I will dwell in the midst of thee, saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'And many nations shall be joined to the '
  - type: text
    content: LORD
  - type: text
    content: ' in that day, and shall be my people: and I will dwell in the midst of thee, and thou shalt know that the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts hath sent me unto thee. '
  '12':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' shall inherit Judah his portion in the holy land, and shall choose Jerusalem again. '
  '13':
  - type: text
    content: 'Be silent, O all flesh, before the '
  - type: text
    content: LORD
  - type: text
    content: ': for he is raised up out of his holy habitation.'
  '2':
  - type: text
    content: 'Then said I, Whither goest thou? And he said unto me, To measure Jerusalem, to see what '
  - type: text
    content: is
  - type: text
    content: ' the breadth thereof, and what '
  - type: text
    content: is
  - type: text
    content: ' the length thereof. '
  '3':
  - type: text
    content: 'And, behold, the angel that talked with me went forth, and another angel went out to meet him, '
  '4':
  - type: text
    content: 'and said unto him, Run, speak to this young man, saying, Jerusalem shall be inhabited '
  - type: text
    content: as
  - type: text
    content: ' towns without walls for the multitude of men and cattle therein: '
  '5':
  - type: text
    content: 'For I, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', will be unto her a wall of fire round about, and will be the glory in the midst of her.'
  '6':
  - type: text
    content: 'Ho, ho, '
  - type: text
    content: come forth
  - type: text
    content: ', and flee from the land of the north, saith the '
  - type: text
    content: LORD
  - type: text
    content: ': for I have spread you abroad as the four winds of the heaven, saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Deliver thyself, O Zion, that dwellest '
  - type: text
    content: with
  - type: text
    content: ' the daughter of Babylon. '
  '8':
  - type: text
    content: 'For thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; After the glory hath he sent me unto the nations which spoiled you: for he that toucheth you toucheth the apple of his eye. '
  '9':
  - type: text
    content: 'For, behold, I will shake mine hand upon them, and they shall be a spoil to their servants: and ye shall know that the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts hath sent me. '
