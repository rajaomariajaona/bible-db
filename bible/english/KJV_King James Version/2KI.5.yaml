document_id: 2KI.5
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Healed Naaman the Leper
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now Naaman, captain of the host of the king of Syria, was a great man with his master, and honourable, because by him the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had given deliverance unto Syria: he was also a mighty man in valour, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but he was
  - type: text
    text: ' a leper. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the Syrians had gone out by companies, and had brought away captive out of the land of Israel a little maid; and she waited on Naaman''s wife. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And she said unto her mistress, Would God my lord '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with the prophet that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in Samaria! for he would recover him of his leprosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' went in, and told his lord, saying, Thus and thus said the maid that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' of the land of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the king of Syria said, Go to, go, and I will send a letter unto the king of Israel. And he departed, and took with him ten talents of silver, and six thousand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: pieces
  - type: text
    text: ' of gold, and ten changes of raiment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he brought the letter to the king of Israel, saying, Now when this letter is come unto thee, behold, I have '
  - type: usfm
    marker: add
    children:
    - type: text
      text: therewith
  - type: text
    text: ' sent Naaman my servant to thee, that thou mayest recover him of his leprosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And it came to pass, when the king of Israel had read the letter, that he rent his clothes, and said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Am
  - type: text
    text: ' I God, to kill and to make alive, that this man doth send unto me to recover a man of his leprosy? Wherefore consider, I pray you, and see how he seeketh a quarrel against me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And it was '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ', when Elisha the man of God had heard that the king of Israel had rent his clothes, that he sent to the king, saying, Wherefore hast thou rent thy clothes? let him come now to me, and he shall know that there is a prophet in Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So Naaman came with his horses and with his chariot, and stood at the door of the house of Elisha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Elisha sent a messenger unto him, saying, Go and wash in Jordan seven times, and thy flesh shall come again to thee, and thou shalt be clean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But Naaman was wroth, and went away, and said, Behold, I thought, He will surely come out to me, and stand, and call on the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' his God, and strike his hand over the place, and recover the leper. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Are
  - type: text
    text: ' not Abana and Pharpar, rivers of Damascus, better than all the waters of Israel? may I not wash in them, and be clean? So he turned and went away in a rage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And his servants came near, and spake unto him, and said, My father, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: if
  - type: text
    text: ' the prophet had bid thee '
  - type: usfm
    marker: add
    children:
    - type: text
      text: do some
  - type: text
    text: ' great thing, wouldest thou not have done '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it?
  - type: text
    text: ' how much rather then, when he saith to thee, Wash, and be clean? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then went he down, and dipped himself seven times in Jordan, according to the saying of the man of God: and his flesh came again like unto the flesh of a little child, and he was clean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And he returned to the man of God, he and all his company, and came, and stood before him: and he said, Behold, now I know that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no God in all the earth, but in Israel: now therefore, I pray thee, take a blessing of thy servant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But he said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' liveth, before whom I stand, I will receive none. And he urged him to take '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '; but he refused. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And Naaman said, Shall there not then, I pray thee, be given to thy servant two mules'' burden of earth? for thy servant will henceforth offer neither burnt offering nor sacrifice unto other gods, but unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'In this thing the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' pardon thy servant, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' when my master goeth into the house of Rimmon to worship there, and he leaneth on my hand, and I bow myself in the house of Rimmon: when I bow down myself in the house of Rimmon, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' pardon thy servant in this thing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: And he said unto him, Go in peace. So he departed from him a little way.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Elisha's Servant
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But Gehazi, the servant of Elisha the man of God, said, Behold, my master hath spared Naaman this Syrian, in not receiving at his hands that which he brought: but, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' liveth, I will run after him, and take somewhat of him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So Gehazi followed after Naaman. And when Naaman saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' running after him, he lighted down from the chariot to meet him, and said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' all well? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And he said, All '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' well. My master hath sent me, saying, Behold, even now there be come to me from mount Ephraim two young men of the sons of the prophets: give them, I pray thee, a talent of silver, and two changes of garments. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And Naaman said, Be content, take two talents. And he urged him, and bound two talents of silver in two bags, with two changes of garments, and laid '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' upon two of his servants; and they bare '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' before him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And when he came to the tower, he took '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' from their hand, and bestowed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' in the house: and he let the men go, and they departed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But he went in, and stood before his master. And Elisha said unto him, Whence '
  - type: usfm
    marker: add
    children:
    - type: text
      text: comest thou
  - type: text
    text: ', Gehazi? And he said, Thy servant went no whither. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And he said unto him, Went not mine heart '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with thee
  - type: text
    text: ', when the man turned again from his chariot to meet thee? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is it
  - type: text
    text: ' a time to receive money, and to receive garments, and oliveyards, and vineyards, and sheep, and oxen, and menservants, and maidservants? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The leprosy therefore of Naaman shall cleave unto thee, and unto thy seed for ever. And he went out from his presence a leper '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as white
  - type: text
    text: ' as snow.'
