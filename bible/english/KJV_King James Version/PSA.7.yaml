document_id: PSA.7,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'Shiggaion of David, which he sang unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', concerning the words of Cush the Benjamite.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' my God, in thee do I put my trust:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Save me from all them that persecute me, and deliver me:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'My defence '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' of God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Which saveth the upright in heart.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: God judgeth the righteous,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And God is angry '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with the wicked
    - type: text
      text: ' every day.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: If he turn not, he will whet his sword;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He hath bent his bow, and made it ready.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: He hath also prepared for him the instruments of death;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He ordaineth his arrows against the persecutors.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Behold, he travaileth with iniquity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And hath conceived mischief, and brought forth falsehood.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: He made a pit, and digged it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And is fallen into the ditch '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' he made.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: His mischief shall return upon his own head,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his violent dealing shall come down upon his own pate.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'I will praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' according to his righteousness:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And will sing praise to the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' most high.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Lest he tear my soul like a lion, rending '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' in pieces,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'While '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none to deliver.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' my God, if I have done this;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If there be iniquity in my hands;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: If I have rewarded evil unto him that was at peace with me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: (Yea, I have delivered him that without cause is mine enemy:)
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Let the enemy persecute my soul, and take '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yea, let him tread down my life upon the earth, and lay mine honour in the dust. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Arise, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', in thine anger, lift up thyself because of the rage of mine enemies:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And awake for me '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to
    - type: text
      text: ' the judgment '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' thou hast commanded.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So shall the congregation of the people compass thee about:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For their sakes therefore return thou on high.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall judge the people: Judge me, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'According to my righteousness, and according to mine integrity '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is
    - type: text
      text: ' in me.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Oh let the wickedness of the wicked come to an end;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but establish the just:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the righteous God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Trieth the hearts and reins.
