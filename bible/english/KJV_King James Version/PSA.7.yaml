document_id: PSA.7,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Shiggaion of David, which he sang unto the '
  - type: text
    content: LORD
  - type: text
    content: ', concerning the words of Cush the Benjamite.'
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ' my God, in thee do I put my trust:'
  - type: text
    content: 'Save me from all them that persecute me, and deliver me:'
  '10':
  - type: text
    content: 'My defence '
  - type: text
    content: is
  - type: text
    content: ' of God,'
  - type: text
    content: Which saveth the upright in heart.
  '11':
  - type: text
    content: God judgeth the righteous,
  - type: text
    content: 'And God is angry '
  - type: text
    content: with the wicked
  - type: text
    content: ' every day.'
  '12':
  - type: text
    content: If he turn not, he will whet his sword;
  - type: text
    content: He hath bent his bow, and made it ready.
  '13':
  - type: text
    content: He hath also prepared for him the instruments of death;
  - type: text
    content: He ordaineth his arrows against the persecutors.
  '14':
  - type: text
    content: Behold, he travaileth with iniquity,
  - type: text
    content: And hath conceived mischief, and brought forth falsehood.
  '15':
  - type: text
    content: He made a pit, and digged it,
  - type: text
    content: 'And is fallen into the ditch '
  - type: text
    content: which
  - type: text
    content: ' he made.'
  '16':
  - type: text
    content: His mischief shall return upon his own head,
  - type: text
    content: And his violent dealing shall come down upon his own pate.
  '17':
  - type: text
    content: 'I will praise the '
  - type: text
    content: LORD
  - type: text
    content: ' according to his righteousness:'
  - type: text
    content: 'And will sing praise to the name of the '
  - type: text
    content: LORD
  - type: text
    content: ' most high.'
  '2':
  - type: text
    content: 'Lest he tear my soul like a lion, rending '
  - type: text
    content: it
  - type: text
    content: ' in pieces,'
  - type: text
    content: 'While '
  - type: text
    content: there is
  - type: text
    content: ' none to deliver.'
  '3':
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ' my God, if I have done this;'
  - type: text
    content: If there be iniquity in my hands;
  '4':
  - type: text
    content: If I have rewarded evil unto him that was at peace with me;
  - type: text
    content: (Yea, I have delivered him that without cause is mine enemy:)
  '5':
  - type: text
    content: 'Let the enemy persecute my soul, and take '
  - type: text
    content: it
  - type: text
    content: ;
  - type: text
    content: 'Yea, let him tread down my life upon the earth, and lay mine honour in the dust. '
  - type: text
    content: Selah.
  '6':
  - type: text
    content: 'Arise, O '
  - type: text
    content: LORD
  - type: text
    content: ', in thine anger, lift up thyself because of the rage of mine enemies:'
  - type: text
    content: 'And awake for me '
  - type: text
    content: to
  - type: text
    content: ' the judgment '
  - type: text
    content: that
  - type: text
    content: ' thou hast commanded.'
  '7':
  - type: text
    content: 'So shall the congregation of the people compass thee about:'
  - type: text
    content: For their sakes therefore return thou on high.
  '8':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' shall judge the people: Judge me, O '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: 'According to my righteousness, and according to mine integrity '
  - type: text
    content: that is
  - type: text
    content: ' in me.'
  '9':
  - type: text
    content: Oh let the wickedness of the wicked come to an end;
  - type: text
    content: 'but establish the just:'
  - type: text
    content: For the righteous God
  - type: text
    content: Trieth the hearts and reins.
