document_id: ISA.14,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will have mercy on Jacob, and will yet choose Israel, and set them in their own land: and the strangers shall be joined with them, and they shall cleave to the house of Jacob. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All they shall speak and say unto thee, Art thou also become weak as we? art thou become like unto us? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thy pomp is brought down to the grave, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the noise of thy viols: the worm is spread under thee, and the worms cover thee.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'How art thou fallen from heaven, O Lucifer, son of the morning! '
    - type: usfm
      marker: add
      children:
      - type: text
        text: how
    - type: text
      text: ' art thou cut down to the ground, which didst weaken the nations! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For thou hast said in thine heart, I will ascend into heaven, I will exalt my throne above the stars of God: I will sit also upon the mount of the congregation, in the sides of the north: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will ascend above the heights of the clouds; I will be like the most High. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yet thou shalt be brought down to hell, to the sides of the pit.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They that see thee shall narrowly look upon thee, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' consider thee, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: saying, Is
    - type: text
      text: ' this the man that made the earth to tremble, that did shake kingdoms; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' made the world as a wilderness, and destroyed the cities thereof; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' opened not the house of his prisoners? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the kings of the nations, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' all of them, lie in glory, every one in his own house. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But thou art cast out of thy grave like an abominable branch, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and as
    - type: text
      text: ' the raiment of those that are slain, thrust through with a sword, that go down to the stones of the pit; as a carcase trodden under feet.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people shall take them, and bring them to their place: and the house of Israel shall possess them in the land of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' for servants and handmaids: and they shall take them captives, whose captives they were; and they shall rule over their oppressors.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt not be joined with them in burial, because thou hast destroyed thy land, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' slain thy people: the seed of evildoers shall never be renowned. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Prepare slaughter for his children for the iniquity of their fathers; that they do not rise, nor possess the land, nor fill the face of the world with cities.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I will rise up against them, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, and cut off from Babylon the name, and remnant, and son, and nephew, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will also make it a possession for the bittern, and pools of water: and I will sweep it with the besom of destruction, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Assyria
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts hath sworn, saying, Surely as I have thought, so shall it come to pass; and as I have purposed, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' shall it stand: '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that I will break the Assyrian in my land, and upon my mountains tread him under foot: then shall his yoke depart from off them, and his burden depart from off their shoulders. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the purpose that is purposed upon the whole earth: and this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the hand that is stretched out upon all the nations. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts hath purposed, and who shall disannul '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it?
    - type: text
      text: ' and his hand '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' stretched out, and who shall turn it back?'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Palestina
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In the year that king Ahaz died was this burden.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rejoice not thou, whole Palestina, because the rod of him that smote thee is broken: for out of the serpent''s root shall come forth a cockatrice, and his fruit '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' a fiery flying serpent. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass in the day that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall give thee rest from thy sorrow, and from thy fear, and from the hard bondage wherein thou wast made to serve, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the firstborn of the poor shall feed, and the needy shall lie down in safety: and I will kill thy root with famine, and he shall slay thy remnant.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Howl, O gate; cry, O city; thou, whole Palestina, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' dissolved: for there shall come from the north a smoke, and none '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' alone in his appointed times. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What shall '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' then answer the messengers of the nation? That the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath founded Zion, and the poor of his people shall trust in it.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that thou shalt take up this proverb against the king of Babylon, and say, How hath the oppressor ceased! the golden city ceased! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath broken the staff of the wicked, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the sceptre of the rulers. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He who smote the people in wrath with a continual stroke, he that ruled the nations in anger, is persecuted, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' none hindereth. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The whole earth is at rest, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' is quiet: they break forth into singing. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yea, the fir trees rejoice at thee, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the cedars of Lebanon, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: saying
    - type: text
      text: ', Since thou art laid down, no feller is come up against us.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hell from beneath is moved for thee to meet '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thee
    - type: text
      text: ' at thy coming: it stirreth up the dead for thee, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' all the chief ones of the earth; it hath raised up from their thrones all the kings of the nations. '
