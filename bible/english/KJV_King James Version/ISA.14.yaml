document_id: ISA.14,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ' will have mercy on Jacob, and will yet choose Israel, and set them in their own land: and the strangers shall be joined with them, and they shall cleave to the house of Jacob. '
  '10':
  - type: text
    content: 'All they shall speak and say unto thee, Art thou also become weak as we? art thou become like unto us? '
  '11':
  - type: text
    content: 'Thy pomp is brought down to the grave, '
  - type: text
    content: and
  - type: text
    content: ' the noise of thy viols: the worm is spread under thee, and the worms cover thee.'
  '12':
  - type: text
    content: 'How art thou fallen from heaven, O Lucifer, son of the morning! '
  - type: text
    content: how
  - type: text
    content: ' art thou cut down to the ground, which didst weaken the nations! '
  '13':
  - type: text
    content: 'For thou hast said in thine heart, I will ascend into heaven, I will exalt my throne above the stars of God: I will sit also upon the mount of the congregation, in the sides of the north: '
  '14':
  - type: text
    content: 'I will ascend above the heights of the clouds; I will be like the most High. '
  '15':
  - type: text
    content: Yet thou shalt be brought down to hell, to the sides of the pit.
  '16':
  - type: text
    content: 'They that see thee shall narrowly look upon thee, '
  - type: text
    content: and
  - type: text
    content: ' consider thee, '
  - type: text
    content: saying, Is
  - type: text
    content: ' this the man that made the earth to tremble, that did shake kingdoms; '
  '17':
  - type: text
    content: that
  - type: text
    content: ' made the world as a wilderness, and destroyed the cities thereof; '
  - type: text
    content: that
  - type: text
    content: ' opened not the house of his prisoners? '
  '18':
  - type: text
    content: 'All the kings of the nations, '
  - type: text
    content: even
  - type: text
    content: ' all of them, lie in glory, every one in his own house. '
  '19':
  - type: text
    content: 'But thou art cast out of thy grave like an abominable branch, '
  - type: text
    content: and as
  - type: text
    content: ' the raiment of those that are slain, thrust through with a sword, that go down to the stones of the pit; as a carcase trodden under feet.'
  '2':
  - type: text
    content: 'And the people shall take them, and bring them to their place: and the house of Israel shall possess them in the land of the '
  - type: text
    content: LORD
  - type: text
    content: ' for servants and handmaids: and they shall take them captives, whose captives they were; and they shall rule over their oppressors.'
  '20':
  - type: text
    content: 'Thou shalt not be joined with them in burial, because thou hast destroyed thy land, '
  - type: text
    content: and
  - type: text
    content: ' slain thy people: the seed of evildoers shall never be renowned. '
  '21':
  - type: text
    content: Prepare slaughter for his children for the iniquity of their fathers; that they do not rise, nor possess the land, nor fill the face of the world with cities.
  '22':
  - type: text
    content: 'For I will rise up against them, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, and cut off from Babylon the name, and remnant, and son, and nephew, saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'I will also make it a possession for the bittern, and pools of water: and I will sweep it with the besom of destruction, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts.'
  - type: heading
    content: Assyria
  '24':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts hath sworn, saying, Surely as I have thought, so shall it come to pass; and as I have purposed, '
  - type: text
    content: so
  - type: text
    content: ' shall it stand: '
  '25':
  - type: text
    content: 'that I will break the Assyrian in my land, and upon my mountains tread him under foot: then shall his yoke depart from off them, and his burden depart from off their shoulders. '
  '26':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the purpose that is purposed upon the whole earth: and this '
  - type: text
    content: is
  - type: text
    content: ' the hand that is stretched out upon all the nations. '
  '27':
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts hath purposed, and who shall disannul '
  - type: text
    content: it?
  - type: text
    content: ' and his hand '
  - type: text
    content: is
  - type: text
    content: ' stretched out, and who shall turn it back?'
  - type: heading
    content: Palestina
  '28':
  - type: text
    content: In the year that king Ahaz died was this burden.
  '29':
  - type: text
    content: 'Rejoice not thou, whole Palestina, because the rod of him that smote thee is broken: for out of the serpent''s root shall come forth a cockatrice, and his fruit '
  - type: text
    content: shall be
  - type: text
    content: ' a fiery flying serpent. '
  '3':
  - type: text
    content: 'And it shall come to pass in the day that the '
  - type: text
    content: LORD
  - type: text
    content: ' shall give thee rest from thy sorrow, and from thy fear, and from the hard bondage wherein thou wast made to serve, '
  '30':
  - type: text
    content: 'And the firstborn of the poor shall feed, and the needy shall lie down in safety: and I will kill thy root with famine, and he shall slay thy remnant.'
  '31':
  - type: text
    content: 'Howl, O gate; cry, O city; thou, whole Palestina, '
  - type: text
    content: art
  - type: text
    content: ' dissolved: for there shall come from the north a smoke, and none '
  - type: text
    content: shall be
  - type: text
    content: ' alone in his appointed times. '
  '32':
  - type: text
    content: 'What shall '
  - type: text
    content: one
  - type: text
    content: ' then answer the messengers of the nation? That the '
  - type: text
    content: LORD
  - type: text
    content: ' hath founded Zion, and the poor of his people shall trust in it.'
  '4':
  - type: text
    content: 'that thou shalt take up this proverb against the king of Babylon, and say, How hath the oppressor ceased! the golden city ceased! '
  '5':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' hath broken the staff of the wicked, '
  - type: text
    content: and
  - type: text
    content: ' the sceptre of the rulers. '
  '6':
  - type: text
    content: 'He who smote the people in wrath with a continual stroke, he that ruled the nations in anger, is persecuted, '
  - type: text
    content: and
  - type: text
    content: ' none hindereth. '
  '7':
  - type: text
    content: 'The whole earth is at rest, '
  - type: text
    content: and
  - type: text
    content: ' is quiet: they break forth into singing. '
  '8':
  - type: text
    content: 'Yea, the fir trees rejoice at thee, '
  - type: text
    content: and
  - type: text
    content: ' the cedars of Lebanon, '
  - type: text
    content: saying
  - type: text
    content: ', Since thou art laid down, no feller is come up against us.'
  '9':
  - type: text
    content: 'Hell from beneath is moved for thee to meet '
  - type: text
    content: thee
  - type: text
    content: ' at thy coming: it stirreth up the dead for thee, '
  - type: text
    content: even
  - type: text
    content: ' all the chief ones of the earth; it hath raised up from their thrones all the kings of the nations. '
