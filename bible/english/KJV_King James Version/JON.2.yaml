- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For thou hadst cast me into the deep, in the midst of the seas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the floods compassed me about:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: All thy billows and thy waves passed over me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then I said, I am cast out of thy sight;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet I will look again toward thy holy temple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The waters compassed me about, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to the soul:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The depth closed me round about,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The weeds were wrapped about my head.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I went down to the bottoms of the mountains;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The earth with her bars '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' about me for ever:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Yet hast thou brought up my life from corruption, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' my God.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'When my soul fainted within me I remembered the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my prayer came in unto thee, into thine holy temple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They that observe lying vanities
- type: usfm
  marker: q1
  children:
  - type: text
    text: Forsake their own mercy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But I will sacrifice unto thee with the voice of thanksgiving;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I will pay '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' that I have vowed.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Salvation '
  - type: usfm
