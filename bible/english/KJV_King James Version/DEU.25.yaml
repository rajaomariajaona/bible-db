document_id: DEU.25,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If there be a controversy between men, and they come unto judgment, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the judges
    - type: text
      text: ' may judge them; then they shall justify the righteous, and condemn the wicked. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And his name shall be called in Israel, The house of him that hath his shoe loosed.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When men strive together one with another, and the wife of the one draweth near for to deliver her husband out of the hand of him that smiteth him, and putteth forth her hand, and taketh him by the secrets: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then thou shalt cut off her hand, thine eye shall not pity '
    - type: usfm
      marker: add
      children:
      - type: text
        text: her
    - type: text
      text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt not have in thy bag divers weights, a great and a small. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt not have in thine house divers measures, a great and a small. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: But
    - type: text
      text: ' thou shalt have a perfect and just weight, a perfect and just measure shalt thou have: that thy days may be lengthened in the land which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God giveth thee. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For all that do such things, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' all that do unrighteously, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' an abomination unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Remember what Amalek did unto thee by the way, when ye were come forth out of Egypt; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'how he met thee by the way, and smote the hindmost of thee, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that were
    - type: text
      text: ' feeble behind thee, when thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: wast
    - type: text
      text: ' faint and weary; and he feared not God. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore it shall be, when the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God hath given thee rest from all thine enemies round about, in the land which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God giveth thee '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' an inheritance to possess it, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' thou shalt blot out the remembrance of Amalek from under heaven; thou shalt not forget '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall be, if the wicked man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' worthy to be beaten, that the judge shall cause him to lie down, and to be beaten before his face, according to his fault, by a certain number. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Forty stripes he may give him, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' not exceed: lest, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: if
    - type: text
      text: ' he should exceed, and beat him above these with many stripes, then thy brother should seem vile unto thee.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt not muzzle the ox when he treadeth out '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the corn
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If brethren dwell together, and one of them die, and have no child, the wife of the dead shall not marry without unto a stranger: her husband''s brother shall go in unto her, and take her to him to wife, and perform the duty of an husband''s brother unto her. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall be, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the firstborn which she beareth shall succeed in the name of his brother '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which is
    - type: text
      text: ' dead, that his name be not put out of Israel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if the man like not to take his brother''s wife, then let his brother''s wife go up to the gate unto the elders, and say, My husband''s brother refuseth to raise up unto his brother a name in Israel, he will not perform the duty of my husband''s brother. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the elders of his city shall call him, and speak unto him: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: if
    - type: text
      text: ' he stand '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to it
    - type: text
      text: ', and say, I like not to take her; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then shall his brother''s wife come unto him in the presence of the elders, and loose his shoe from off his foot, and spit in his face, and shall answer and say, So shall it be done unto that man that will not build up his brother''s house. '
