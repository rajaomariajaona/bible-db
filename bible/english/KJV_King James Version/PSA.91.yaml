document_id: PSA.91,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He that dwelleth in the secret place of the Most High
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shall abide under the shadow of the Almighty.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There shall no evil befall thee,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Neither shall any plague come nigh thy dwelling.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he shall give his angels charge over thee,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To keep thee in all thy ways.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They shall bear thee up in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' hands,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Lest thou dash thy foot against a stone.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou shalt tread upon the lion and adder:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The young lion and the dragon shalt thou trample under feet.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because he hath set his love upon me, therefore will I deliver him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will set him on high, because he hath known my name.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He shall call upon me, and I will answer him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: will be
    - type: text
      text: ' with him in trouble; I will deliver him, and honour him.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With long life will I satisfy him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And shew him my salvation.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will say of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: He is
    - type: text
      text: ' my refuge and my fortress:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My God; in him will I trust.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surely he shall deliver thee from the snare of the fowler,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' from the noisome pestilence.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He shall cover thee with his feathers, and under his wings shalt thou trust:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'His truth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be thy
    - type: text
      text: ' shield and buckler.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thou shalt not be afraid for the terror by night;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Nor
    - type: text
      text: ' for the arrow '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' flieth by day;'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Nor
    - type: text
      text: ' for the pestilence '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' walketh in darkness;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Nor
    - type: text
      text: ' for the destruction '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' wasteth at noonday.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A thousand shall fall at thy side, and ten thousand at thy right hand;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: But
    - type: text
      text: ' it shall not come nigh thee.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Only with thine eyes shalt thou behold
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And see the reward of the wicked.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because thou hast made the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which is
    - type: text
      text: ' my refuge,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Even
    - type: text
      text: ' the most High, thy habitation;'
