document_id: PSA.91
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: He that dwelleth in the secret place of the Most High
- type: usfm
  marker: q2
  children:
  - type: text
    text: Shall abide under the shadow of the Almighty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I will say of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: He is
  - type: text
    text: ' my refuge and my fortress:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: My God; in him will I trust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Surely he shall deliver thee from the snare of the fowler,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' from the noisome pestilence.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He shall cover thee with his feathers, and under his wings shalt thou trust:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'His truth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be thy
  - type: text
    text: ' shield and buckler.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Thou shalt not be afraid for the terror by night;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Nor
  - type: text
    text: ' for the arrow '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' flieth by day;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Nor
  - type: text
    text: ' for the pestilence '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' walketh in darkness;'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Nor
  - type: text
    text: ' for the destruction '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' wasteth at noonday.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: A thousand shall fall at thy side, and ten thousand at thy right hand;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: But
  - type: text
    text: ' it shall not come nigh thee.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Only with thine eyes shalt thou behold
- type: usfm
  marker: q2
  children:
  - type: text
    text: And see the reward of the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Because thou hast made the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which is
  - type: text
    text: ' my refuge,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Even
  - type: text
    text: ' the most High, thy habitation;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: There shall no evil befall thee,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Neither shall any plague come nigh thy dwelling.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For he shall give his angels charge over thee,
- type: usfm
  marker: q2
  children:
  - type: text
    text: To keep thee in all thy ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'They shall bear thee up in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' hands,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Lest thou dash thy foot against a stone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Thou shalt tread upon the lion and adder:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The young lion and the dragon shalt thou trample under feet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Because he hath set his love upon me, therefore will I deliver him:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will set him on high, because he hath known my name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He shall call upon me, and I will answer him:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: will be
  - type: text
    text: ' with him in trouble; I will deliver him, and honour him.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: With long life will I satisfy him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And shew him my salvation.
