document_id: EZK.34
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Government to be Replaced
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came unto me, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Son of man, prophesy against the shepherds of Israel, prophesy, and say unto them, Thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' unto the shepherds; Woe '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' to the shepherds of Israel that do feed themselves! should not the shepherds feed the flocks? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ye eat the fat, and ye clothe you with the wool, ye kill them that are fed: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' ye feed not the flock. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The diseased have ye not strengthened, neither have ye healed that which was sick, neither have ye bound up '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which was
  - type: text
    text: ' broken, neither have ye brought again that which was driven away, neither have ye sought that which was lost; but with force and with cruelty have ye ruled them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And they were scattered, because '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no shepherd: and they became meat to all the beasts of the field, when they were scattered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'My sheep wandered through all the mountains, and upon every high hill: yea, my flock was scattered upon all the face of the earth, and none did search or seek '
  - type: usfm
    marker: add
    children:
    - type: text
      text: after them
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Therefore, ye shepherds, hear the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' I live, saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ', surely because my flock became a prey, and my flock became meat to every beast of the field, because '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' no shepherd, neither did my shepherds search for my flock, but the shepherds fed themselves, and fed not my flock; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'therefore, O ye shepherds, hear the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; Behold, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' against the shepherds; and I will require my flock at their hand, and cause them to cease from feeding the flock; neither shall the shepherds feed themselves any more; for I will deliver my flock from their mouth, that they may not be meat for them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; Behold, I, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' I, will both search my sheep, and seek them out. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'As a shepherd seeketh out his flock in the day that he is among his sheep '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that are
  - type: text
    text: ' scattered; so will I seek out my sheep, and will deliver them out of all places where they have been scattered in the cloudy and dark day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And I will bring them out from the people, and gather them from the countries, and will bring them to their own land, and feed them upon the mountains of Israel by the rivers, and in all the inhabited places of the country. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I will feed them in a good pasture, and upon the high mountains of Israel shall their fold be: there shall they lie in a good fold, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' a fat pasture shall they feed upon the mountains of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I will feed my flock, and I will cause them to lie down, saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I will seek that which was lost, and bring again that which was driven away, and will bind up '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which was
  - type: text
    text: ' broken, and will strengthen that which was sick: but I will destroy the fat and the strong; I will feed them with judgment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as for
  - type: text
    text: ' you, O my flock, thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; Behold, I judge between cattle and cattle, between the rams and the he goats. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Seemeth it
  - type: text
    text: ' a small thing unto you to have eaten up the good pasture, but ye must tread down with your feet the residue of your pastures? and to have drunk of the deep waters, but ye must foul the residue with your feet? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as for
  - type: text
    text: ' my flock, they eat that which ye have trodden with your feet; and they drink that which ye have fouled with your feet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Therefore thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' unto them; Behold, I, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' I, will judge between the fat cattle and between the lean cattle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Because ye have thrust with side and with shoulder, and pushed all the diseased with your horns, till ye have scattered them abroad; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'therefore will I save my flock, and they shall no more be a prey; and I will judge between cattle and cattle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And I will set up one shepherd over them, and he shall feed them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' my servant David; he shall feed them, and he shall be their shepherd. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And I the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will be their God, and my servant David a prince among them; I the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' have spoken '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And I will make with them a covenant of peace, and will cause the evil beasts to cease out of the land: and they shall dwell safely in the wilderness, and sleep in the woods. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And I will make them and the places round about my hill a blessing; and I will cause the shower to come down in his season; there shall be showers of blessing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And the tree of the field shall yield her fruit, and the earth shall yield her increase, and they shall be safe in their land, and shall know that I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', when I have broken the bands of their yoke, and delivered them out of the hand of those that served themselves of them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And they shall no more be a prey to the heathen, neither shall the beast of the land devour them; but they shall dwell safely, and none shall make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' afraid. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And I will raise up for them a plant of renown, and they shall be no more consumed with hunger in the land, neither bear the shame of the heathen any more. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Thus shall they know that I the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' their God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' with them, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' they, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the house of Israel, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' my people, saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And ye my flock, the flock of my pasture, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' men, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' your God, saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: .
