document_id: GEN.33
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Jacob lifted up his eyes, and looked, and, behold, Esau came, and with him four hundred men. And he divided the children unto Leah, and unto Rachel, and unto the two handmaids. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he put the handmaids and their children foremost, and Leah and her children after, and Rachel and Joseph hindermost. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And he passed over before them, and bowed himself to the ground seven times, until he came near to his brother. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Esau ran to meet him, and embraced him, and fell on his neck, and kissed him: and they wept. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And he lifted up his eyes, and saw the women and the children; and said, Who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' those with thee? And he said, The children which God hath graciously given thy servant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then the handmaidens came near, they and their children, and they bowed themselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And Leah also with her children came near, and bowed themselves: and after came Joseph near and Rachel, and they bowed themselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And he said, What '
  - type: usfm
    marker: add
    children:
    - type: text
      text: meanest
  - type: text
    text: ' thou by all this drove which I met? And he said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: These are
  - type: text
    text: ' to find grace in the sight of my lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And Esau said, I have enough, my brother; keep that thou hast unto thyself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Jacob said, Nay, I pray thee, if now I have found grace in thy sight, then receive my present at my hand: for therefore I have seen thy face, as though I had seen the face of God, and thou wast pleased with me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Take, I pray thee, my blessing that is brought to thee; because God hath dealt graciously with me, and because I have enough. And he urged him, and he took '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And he said, Let us take our journey, and let us go, and I will go before thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And he said unto him, My lord knoweth that the children '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' tender, and the flocks and herds with young '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' with me: and if men should overdrive them one day, all the flock will die. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Let my lord, I pray thee, pass over before his servant: and I will lead on softly, according as the cattle that goeth before me and the children be able to endure, until I come unto my lord unto Seir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Esau said, Let me now leave with thee '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' of the folk that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' with me. And he said, What needeth it? let me find grace in the sight of my lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So Esau returned that day on his way unto Seir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And Jacob journeyed to Succoth, and built him an house, and made booths for his cattle: therefore the name of the place is called Succoth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And Jacob came to Shalem, a city of Shechem, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the land of Canaan, when he came from Padan-aram; and pitched his tent before the city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And he bought a parcel of a field, where he had spread his tent, at the hand of the children of Hamor, Shechem''s father, for an hundred pieces of money. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: And he erected there an altar, and called it El-elohe-Israel.
