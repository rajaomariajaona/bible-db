document_id: 2TI.1,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Paul, an apostle of Jesus Christ by the will of God, according to the promise of life which is in Christ Jesus, '
  '10':
  - type: text
    content: 'but is now made manifest by the appearing of our Saviour Jesus Christ, who hath abolished death, and hath brought life and immortality to light through the gospel: '
  '11':
  - type: text
    content: 'whereunto I am appointed a preacher, and an apostle, and a teacher of the Gentiles. '
  '12':
  - type: text
    content: 'For the which cause I also suffer these things: nevertheless I am not ashamed: for I know whom I have believed, and am persuaded that he is able to keep that which I have committed unto him against that day. '
  '13':
  - type: text
    content: 'Hold fast the form of sound words, which thou hast heard of me, in faith and love which is in Christ Jesus. '
  '14':
  - type: text
    content: That good thing which was committed unto thee keep by the Holy Ghost which dwelleth in us.
  '15':
  - type: text
    content: 'This thou knowest, that all they which are in Asia be turned away from me; of whom are Phygellus and Hermogenes. '
  '16':
  - type: text
    content: 'The Lord give mercy unto the house of Onesiphorus; for he oft refreshed me, and was not ashamed of my chain: '
  '17':
  - type: text
    content: 'but, when he was in Rome, he sought me out very diligently, and found '
  - type: text
    content: me
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'The Lord grant unto him that he may find mercy of the Lord in that day: and in how many things he ministered unto me at Ephesus, thou knowest very well.'
  '2':
  - type: text
    content: 'To Timothy, '
  - type: text
    content: my
  - type: text
    content: ' dearly beloved son: Grace, mercy, '
  - type: text
    content: and
  - type: text
    content: ' peace, from God the Father and Christ Jesus our Lord.'
  - type: heading
    content: Timothy, the Beloved
  '3':
  - type: text
    content: 'I thank God, whom I serve from '
  - type: text
    content: my
  - type: text
    content: ' forefathers with pure conscience, that without ceasing I have remembrance of thee in my prayers night and day; '
  '4':
  - type: text
    content: 'greatly desiring to see thee, being mindful of thy tears, that I may be filled with joy; '
  '5':
  - type: text
    content: 'when I call to remembrance the unfeigned faith that is in thee, which dwelt first in thy grandmother Lois, and thy mother Eunice; and I am persuaded that in thee also. '
  '6':
  - type: text
    content: 'Wherefore I put thee in remembrance that thou stir up the gift of God, which is in thee by the putting on of my hands. '
  '7':
  - type: text
    content: 'For God hath not given us the spirit of fear; but of power, and of love, and of a sound mind. '
  '8':
  - type: text
    content: 'Be not thou therefore ashamed of the testimony of our Lord, nor of me his prisoner: but be thou partaker of the afflictions of the gospel according to the power of God; '
  '9':
  - type: text
    content: 'who hath saved us, and called '
  - type: text
    content: us
  - type: text
    content: ' with an holy calling, not according to our works, but according to his own purpose and grace, which was given us in Christ Jesus before the world began, '
