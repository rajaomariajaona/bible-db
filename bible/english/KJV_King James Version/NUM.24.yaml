document_id: NUM.24,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Balaam saw that it pleased the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' to bless Israel, he went not, as at other times, to seek for enchantments, but he set his face toward the wilderness. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Balak''s anger was kindled against Balaam, and he smote his hands together: and Balak said unto Balaam, I called thee to curse mine enemies, and, behold, thou hast altogether blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' these three times. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore now flee thou to thy place: I thought to promote thee unto great honour; but, lo, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath kept thee back from honour. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Balaam said unto Balak, Spake I not also to thy messengers which thou sentest unto me, saying, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If Balak would give me his house full of silver and gold, I cannot go beyond the commandment of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', to do '
    - type: usfm
      marker: add
      children:
      - type: text
        text: either
    - type: text
      text: ' good or bad of mine own mind; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' saith, that will I speak? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now, behold, I go unto my people: come '
    - type: usfm
      marker: add
      children:
      - type: text
        text: therefore, and
    - type: text
      text: ' I will advertise thee what this people shall do to thy people in the latter days. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he took up his parable, and said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Balaam the son of Beor hath said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the man whose eyes are open hath said:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He hath said, which heard the words of God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And knew the knowledge of the Most High,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Which
    - type: text
      text: ' saw the vision of the Almighty,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Falling '
    - type: usfm
      marker: add
      children:
      - type: text
        text: into a trance
    - type: text
      text: ', but having his eyes open:'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I shall see him, but not now:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I shall behold him, but not nigh:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There shall come a Star out of Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a Sceptre shall rise out of Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And shall smite the corners of Moab,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And destroy all the children of Sheth.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Edom shall be a possession,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seir also shall be a possession for his enemies;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Israel shall do valiantly.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Out of Jacob shall come he that shall have dominion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And shall destroy him that remaineth of the city.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Balaam lifted up his eyes, and he saw Israel abiding '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in his tents
    - type: text
      text: ' according to their tribes; and the spirit of God came upon him. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And when he looked on Amalek, he took up his parable, and said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Amalek '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the first of the nations;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But his latter end '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' that he perish for ever.'
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And he looked on the Kenites, and took up his parable, and said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Strong is thy dwellingplace,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And thou puttest thy nest in a rock.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nevertheless the Kenite shall be wasted,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Until Asshur shall carry thee away captive.
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And he took up his parable, and said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alas, who shall live when God doeth this!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And ships '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall come
    - type: text
      text: ' from the coast of Chittim,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And shall afflict Asshur, and shall afflict Eber,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he also shall perish for ever.
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And Balaam rose up, and went and returned to his place: and Balak also went his way.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he took up his parable, and said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Balaam the son of Beor hath said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the man whose eyes are open hath said:'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He hath said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' heard the words of God,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which saw the vision of the Almighty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Falling '
    - type: usfm
      marker: add
      children:
      - type: text
        text: into a trance
    - type: text
      text: ', but having his eyes open:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How goodly are thy tents, O Jacob,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' thy tabernacles, O Israel!'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As the valleys are they spread forth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As gardens by the river's side,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'As the trees of lign aloes which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath planted,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' as cedar trees beside the waters.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He shall pour the water out of his buckets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And his seed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' in many waters,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his king shall be higher than Agag,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his kingdom shall be exalted.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God brought him forth out of Egypt;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He hath as it were the strength of an unicorn:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He shall eat up the nations his enemies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And shall break their bones,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And pierce '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' through with his arrows.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He couched, he lay down as a lion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And as a great lion: who shall stir him up?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' he that blesseth thee,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And cursed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' he that curseth thee.'
