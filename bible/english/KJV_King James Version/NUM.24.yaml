document_id: NUM.24,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'And when Balaam saw that it pleased the '
  - type: text
    content: LORD
  - type: text
    content: ' to bless Israel, he went not, as at other times, to seek for enchantments, but he set his face toward the wilderness. '
  '10':
  - type: text
    content: 'And Balak''s anger was kindled against Balaam, and he smote his hands together: and Balak said unto Balaam, I called thee to curse mine enemies, and, behold, thou hast altogether blessed '
  - type: text
    content: them
  - type: text
    content: ' these three times. '
  '11':
  - type: text
    content: 'Therefore now flee thou to thy place: I thought to promote thee unto great honour; but, lo, the '
  - type: text
    content: LORD
  - type: text
    content: ' hath kept thee back from honour. '
  '12':
  - type: text
    content: 'And Balaam said unto Balak, Spake I not also to thy messengers which thou sentest unto me, saying, '
  '13':
  - type: text
    content: 'If Balak would give me his house full of silver and gold, I cannot go beyond the commandment of the '
  - type: text
    content: LORD
  - type: text
    content: ', to do '
  - type: text
    content: either
  - type: text
    content: ' good or bad of mine own mind; '
  - type: text
    content: but
  - type: text
    content: ' what the '
  - type: text
    content: LORD
  - type: text
    content: ' saith, that will I speak? '
  '14':
  - type: text
    content: 'And now, behold, I go unto my people: come '
  - type: text
    content: therefore, and
  - type: text
    content: ' I will advertise thee what this people shall do to thy people in the latter days. '
  '15':
  - type: text
    content: And he took up his parable, and said,
  - type: text
    content: Balaam the son of Beor hath said,
  - type: text
    content: 'And the man whose eyes are open hath said:'
  '16':
  - type: text
    content: He hath said, which heard the words of God,
  - type: text
    content: And knew the knowledge of the Most High,
  - type: text
    content: Which
  - type: text
    content: ' saw the vision of the Almighty,'
  - type: text
    content: 'Falling '
  - type: text
    content: into a trance
  - type: text
    content: ', but having his eyes open:'
  '17':
  - type: text
    content: 'I shall see him, but not now:'
  - type: text
    content: 'I shall behold him, but not nigh:'
  - type: text
    content: There shall come a Star out of Jacob,
  - type: text
    content: And a Sceptre shall rise out of Israel,
  - type: text
    content: And shall smite the corners of Moab,
  - type: text
    content: And destroy all the children of Sheth.
  '18':
  - type: text
    content: And Edom shall be a possession,
  - type: text
    content: Seir also shall be a possession for his enemies;
  - type: text
    content: And Israel shall do valiantly.
  '19':
  - type: text
    content: Out of Jacob shall come he that shall have dominion,
  - type: text
    content: And shall destroy him that remaineth of the city.
  '2':
  - type: text
    content: 'And Balaam lifted up his eyes, and he saw Israel abiding '
  - type: text
    content: in his tents
  - type: text
    content: ' according to their tribes; and the spirit of God came upon him. '
  '20':
  - type: text
    content: And when he looked on Amalek, he took up his parable, and said,
  - type: text
    content: 'Amalek '
  - type: text
    content: was
  - type: text
    content: ' the first of the nations;'
  - type: text
    content: 'But his latter end '
  - type: text
    content: shall be
  - type: text
    content: ' that he perish for ever.'
  '21':
  - type: text
    content: And he looked on the Kenites, and took up his parable, and said,
  - type: text
    content: Strong is thy dwellingplace,
  - type: text
    content: And thou puttest thy nest in a rock.
  '22':
  - type: text
    content: Nevertheless the Kenite shall be wasted,
  - type: text
    content: Until Asshur shall carry thee away captive.
  '23':
  - type: text
    content: And he took up his parable, and said,
  - type: text
    content: Alas, who shall live when God doeth this!
  '24':
  - type: text
    content: 'And ships '
  - type: text
    content: shall come
  - type: text
    content: ' from the coast of Chittim,'
  - type: text
    content: And shall afflict Asshur, and shall afflict Eber,
  - type: text
    content: And he also shall perish for ever.
  '25':
  - type: text
    content: 'And Balaam rose up, and went and returned to his place: and Balak also went his way.'
  '3':
  - type: text
    content: And he took up his parable, and said,
  - type: text
    content: Balaam the son of Beor hath said,
  - type: text
    content: 'And the man whose eyes are open hath said:'
  '4':
  - type: text
    content: 'He hath said, '
  - type: text
    content: which
  - type: text
    content: ' heard the words of God,'
  - type: text
    content: Which saw the vision of the Almighty,
  - type: text
    content: 'Falling '
  - type: text
    content: into a trance
  - type: text
    content: ', but having his eyes open:'
  '5':
  - type: text
    content: How goodly are thy tents, O Jacob,
  - type: text
    content: And
  - type: text
    content: ' thy tabernacles, O Israel!'
  '6':
  - type: text
    content: As the valleys are they spread forth,
  - type: text
    content: As gardens by the river's side,
  - type: text
    content: 'As the trees of lign aloes which the '
  - type: text
    content: LORD
  - type: text
    content: ' hath planted,'
  - type: text
    content: And
  - type: text
    content: ' as cedar trees beside the waters.'
  '7':
  - type: text
    content: He shall pour the water out of his buckets,
  - type: text
    content: 'And his seed '
  - type: text
    content: shall be
  - type: text
    content: ' in many waters,'
  - type: text
    content: And his king shall be higher than Agag,
  - type: text
    content: And his kingdom shall be exalted.
  '8':
  - type: text
    content: God brought him forth out of Egypt;
  - type: text
    content: 'He hath as it were the strength of an unicorn:'
  - type: text
    content: He shall eat up the nations his enemies,
  - type: text
    content: And shall break their bones,
  - type: text
    content: 'And pierce '
  - type: text
    content: them
  - type: text
    content: ' through with his arrows.'
  '9':
  - type: text
    content: He couched, he lay down as a lion,
  - type: text
    content: 'And as a great lion: who shall stir him up?'
  - type: text
    content: 'Blessed '
  - type: text
    content: is
  - type: text
    content: ' he that blesseth thee,'
  - type: text
    content: 'And cursed '
  - type: text
    content: is
  - type: text
    content: ' he that curseth thee.'
