document_id: JOS.19
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the second lot came forth to Simeon, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' for the tribe of the children of Simeon according to their families: and their inheritance was within the inheritance of the children of Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And they had in their inheritance Beer-sheba, and Sheba, and Moladah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and Hazar-shual, and Balah, and Azem, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and Eltolad, and Bethul, and Hormah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and Ziklag, and Beth-marcaboth, and Hazar-susah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and Beth-lebaoth, and Sharuhen; thirteen cities and their villages: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ain, Remmon, and Ether, and Ashan; four cities and their villages: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and all the villages that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' round about these cities to Baalath-beer, Ramath of the south. This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the inheritance of the tribe of the children of Simeon according to their families. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Out of the portion of the children of Judah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the inheritance of the children of Simeon: for the part of the children of Judah was too much for them: therefore the children of Simeon had their inheritance within the inheritance of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the third lot came up for the children of Zebulun according to their families: and the border of their inheritance was unto Sarid: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and their border went up toward the sea, and Maralah, and reached to Dabbasheth, and reached to the river that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' before Jokneam; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and turned from Sarid eastward toward the sunrising unto the border of Chisloth-tabor, and then goeth out to Daberath, and goeth up to Japhia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and from thence passeth on along on the east to Gittah-hepher, to Ittah-kazin, and goeth out to Remmon-methoar to Neah; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and the border compasseth it on the north side to Hannathon: and the outgoings thereof are in the valley of Jiphthah-el: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and Kattath, and Nahallal, and Shimron, and Idalah, and Beth-lehem: twelve cities with their villages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the inheritance of the children of Zebulun according to their families, these cities with their villages.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' the fourth lot came out to Issachar, for the children of Issachar according to their families. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And their border was toward Jezreel, and Chesulloth, and Shunem, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and Haphraim, and Shihon, and Anaharath, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'and Rabbith, and Kishion, and Abez, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'and Remeth, and En-gannim, and En-haddah, and Beth-pazzez; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'and the coast reacheth to Tabor, and Shahazimah, and Beth-shemesh; and the outgoings of their border were at Jordan: sixteen cities with their villages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the inheritance of the tribe of the children of Issachar according to their families, the cities and their villages.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And the fifth lot came out for the tribe of the children of Asher according to their families. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And their border was Helkath, and Hali, and Beten, and Achshaph, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and Alammelech, and Amad, and Misheal; and reacheth to Carmel westward, and to Shihor-libnath; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'and turneth toward the sunrising to Beth-dagon, and reacheth to Zebulun, and to the valley of Jiphthah-el toward the north side of Beth-emek, and Neiel, and goeth out to Cabul on the left hand, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and Hebron, and Rehob, and Hammon, and Kanah, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' unto great Zidon; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' the coast turneth to Ramah, and to the strong city Tyre; and the coast turneth to Hosah; and the outgoings thereof are at the sea from the coast to Achzib: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ummah also, and Aphek, and Rehob: twenty and two cities with their villages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the inheritance of the tribe of the children of Asher according to their families, these cities with their villages.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'The sixth lot came out to the children of Naphtali, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' for the children of Naphtali according to their families. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And their coast was from Heleph, from Allon to Zaanannim, and Adami, Nekeb, and Jabneel, unto Lakum; and the outgoings thereof were at Jordan: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' the coast turneth westward to Aznoth-tabor, and goeth out from thence to Hukkok, and reacheth to Zebulun on the south side, and reacheth to Asher on the west side, and to Judah upon Jordan toward the sunrising. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And the fenced cities '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' Ziddim, Zer, and Hammath, Rakkath, and Chinnereth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'and Adamah, and Ramah, and Hazor, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'and Kedesh, and Edrei, and En-hazor, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'and Iron, and Migdal-el, Horem, and Beth-anath, and Beth-shemesh; nineteen cities with their villages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the inheritance of the tribe of the children of Naphtali according to their families, the cities and their villages.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' the seventh lot came out for the tribe of the children of Dan according to their families. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And the coast of their inheritance was Zorah, and Eshtaol, and Ir-shemesh, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'and Shaalabbin, and Ajalon, and Jethlah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'and Elon, and Thimnathah, and Ekron, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'and Eltekeh, and Gibbethon, and Baalath, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'and Jehud, and Bene-berak, and Gath-rimmon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'and Me-jarkon, and Rakkon, with the border before Japho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'And the coast of the children of Dan went out '
  - type: usfm
    marker: add
    children:
    - type: text
      text: too little
  - type: text
    text: ' for them: therefore the children of Dan went up to fight against Leshem, and took it, and smote it with the edge of the sword, and possessed it, and dwelt therein, and called Leshem, Dan, after the name of Dan their father. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the inheritance of the tribe of the children of Dan according to their families, these cities with their villages.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'When they had made an end of dividing the land for inheritance by their coasts, the children of Israel gave an inheritance to Joshua the son of Nun among them: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'according to the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' they gave him the city which he asked, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' Timnath-serah in mount Ephraim: and he built the city, and dwelt therein.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the inheritances, which Eleazar the priest, and Joshua the son of Nun, and the heads of the fathers of the tribes of the children of Israel, divided for an inheritance by lot in Shiloh before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', at the door of the tabernacle of the congregation. So they made an end of dividing the country.'
