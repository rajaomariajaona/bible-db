document_id: JOS.19,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'And the second lot came forth to Simeon, '
  - type: text
    content: even
  - type: text
    content: ' for the tribe of the children of Simeon according to their families: and their inheritance was within the inheritance of the children of Judah. '
  '10':
  - type: text
    content: 'And the third lot came up for the children of Zebulun according to their families: and the border of their inheritance was unto Sarid: '
  '11':
  - type: text
    content: 'and their border went up toward the sea, and Maralah, and reached to Dabbasheth, and reached to the river that '
  - type: text
    content: is
  - type: text
    content: ' before Jokneam; '
  '12':
  - type: text
    content: 'and turned from Sarid eastward toward the sunrising unto the border of Chisloth-tabor, and then goeth out to Daberath, and goeth up to Japhia, '
  '13':
  - type: text
    content: 'and from thence passeth on along on the east to Gittah-hepher, to Ittah-kazin, and goeth out to Remmon-methoar to Neah; '
  '14':
  - type: text
    content: 'and the border compasseth it on the north side to Hannathon: and the outgoings thereof are in the valley of Jiphthah-el: '
  '15':
  - type: text
    content: 'and Kattath, and Nahallal, and Shimron, and Idalah, and Beth-lehem: twelve cities with their villages. '
  '16':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the inheritance of the children of Zebulun according to their families, these cities with their villages.'
  '17':
  - type: text
    content: ' '
  - type: text
    content: And
  - type: text
    content: ' the fourth lot came out to Issachar, for the children of Issachar according to their families. '
  '18':
  - type: text
    content: 'And their border was toward Jezreel, and Chesulloth, and Shunem, '
  '19':
  - type: text
    content: 'and Haphraim, and Shihon, and Anaharath, '
  '2':
  - type: text
    content: 'And they had in their inheritance Beer-sheba, and Sheba, and Moladah, '
  '20':
  - type: text
    content: 'and Rabbith, and Kishion, and Abez, '
  '21':
  - type: text
    content: 'and Remeth, and En-gannim, and En-haddah, and Beth-pazzez; '
  '22':
  - type: text
    content: 'and the coast reacheth to Tabor, and Shahazimah, and Beth-shemesh; and the outgoings of their border were at Jordan: sixteen cities with their villages. '
  '23':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the inheritance of the tribe of the children of Issachar according to their families, the cities and their villages.'
  '24':
  - type: text
    content: 'And the fifth lot came out for the tribe of the children of Asher according to their families. '
  '25':
  - type: text
    content: 'And their border was Helkath, and Hali, and Beten, and Achshaph, '
  '26':
  - type: text
    content: 'and Alammelech, and Amad, and Misheal; and reacheth to Carmel westward, and to Shihor-libnath; '
  '27':
  - type: text
    content: 'and turneth toward the sunrising to Beth-dagon, and reacheth to Zebulun, and to the valley of Jiphthah-el toward the north side of Beth-emek, and Neiel, and goeth out to Cabul on the left hand, '
  '28':
  - type: text
    content: 'and Hebron, and Rehob, and Hammon, and Kanah, '
  - type: text
    content: even
  - type: text
    content: ' unto great Zidon; '
  '29':
  - type: text
    content: 'and '
  - type: text
    content: then
  - type: text
    content: ' the coast turneth to Ramah, and to the strong city Tyre; and the coast turneth to Hosah; and the outgoings thereof are at the sea from the coast to Achzib: '
  '3':
  - type: text
    content: 'and Hazar-shual, and Balah, and Azem, '
  '30':
  - type: text
    content: 'Ummah also, and Aphek, and Rehob: twenty and two cities with their villages. '
  '31':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the inheritance of the tribe of the children of Asher according to their families, these cities with their villages.'
  '32':
  - type: text
    content: 'The sixth lot came out to the children of Naphtali, '
  - type: text
    content: even
  - type: text
    content: ' for the children of Naphtali according to their families. '
  '33':
  - type: text
    content: 'And their coast was from Heleph, from Allon to Zaanannim, and Adami, Nekeb, and Jabneel, unto Lakum; and the outgoings thereof were at Jordan: '
  '34':
  - type: text
    content: 'and '
  - type: text
    content: then
  - type: text
    content: ' the coast turneth westward to Aznoth-tabor, and goeth out from thence to Hukkok, and reacheth to Zebulun on the south side, and reacheth to Asher on the west side, and to Judah upon Jordan toward the sunrising. '
  '35':
  - type: text
    content: 'And the fenced cities '
  - type: text
    content: are
  - type: text
    content: ' Ziddim, Zer, and Hammath, Rakkath, and Chinnereth, '
  '36':
  - type: text
    content: 'and Adamah, and Ramah, and Hazor, '
  '37':
  - type: text
    content: 'and Kedesh, and Edrei, and En-hazor, '
  '38':
  - type: text
    content: 'and Iron, and Migdal-el, Horem, and Beth-anath, and Beth-shemesh; nineteen cities with their villages. '
  '39':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the inheritance of the tribe of the children of Naphtali according to their families, the cities and their villages.'
  '4':
  - type: text
    content: 'and Eltolad, and Bethul, and Hormah, '
  '40':
  - type: text
    content: ' '
  - type: text
    content: And
  - type: text
    content: ' the seventh lot came out for the tribe of the children of Dan according to their families. '
  '41':
  - type: text
    content: 'And the coast of their inheritance was Zorah, and Eshtaol, and Ir-shemesh, '
  '42':
  - type: text
    content: 'and Shaalabbin, and Ajalon, and Jethlah, '
  '43':
  - type: text
    content: 'and Elon, and Thimnathah, and Ekron, '
  '44':
  - type: text
    content: 'and Eltekeh, and Gibbethon, and Baalath, '
  '45':
  - type: text
    content: 'and Jehud, and Bene-berak, and Gath-rimmon, '
  '46':
  - type: text
    content: 'and Me-jarkon, and Rakkon, with the border before Japho. '
  '47':
  - type: text
    content: 'And the coast of the children of Dan went out '
  - type: text
    content: too little
  - type: text
    content: ' for them: therefore the children of Dan went up to fight against Leshem, and took it, and smote it with the edge of the sword, and possessed it, and dwelt therein, and called Leshem, Dan, after the name of Dan their father. '
  '48':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the inheritance of the tribe of the children of Dan according to their families, these cities with their villages.'
  '49':
  - type: text
    content: 'When they had made an end of dividing the land for inheritance by their coasts, the children of Israel gave an inheritance to Joshua the son of Nun among them: '
  '5':
  - type: text
    content: 'and Ziklag, and Beth-marcaboth, and Hazar-susah, '
  '50':
  - type: text
    content: 'according to the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' they gave him the city which he asked, '
  - type: text
    content: even
  - type: text
    content: ' Timnath-serah in mount Ephraim: and he built the city, and dwelt therein.'
  '51':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the inheritances, which Eleazar the priest, and Joshua the son of Nun, and the heads of the fathers of the tribes of the children of Israel, divided for an inheritance by lot in Shiloh before the '
  - type: text
    content: LORD
  - type: text
    content: ', at the door of the tabernacle of the congregation. So they made an end of dividing the country.'
  '6':
  - type: text
    content: 'and Beth-lebaoth, and Sharuhen; thirteen cities and their villages: '
  '7':
  - type: text
    content: 'Ain, Remmon, and Ether, and Ashan; four cities and their villages: '
  '8':
  - type: text
    content: 'and all the villages that '
  - type: text
    content: were
  - type: text
    content: ' round about these cities to Baalath-beer, Ramath of the south. This '
  - type: text
    content: is
  - type: text
    content: ' the inheritance of the tribe of the children of Simeon according to their families. '
  '9':
  - type: text
    content: 'Out of the portion of the children of Judah '
  - type: text
    content: was
  - type: text
    content: ' the inheritance of the children of Simeon: for the part of the children of Judah was too much for them: therefore the children of Simeon had their inheritance within the inheritance of them.'
