document_id: DAN.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Den of Lions
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'It pleased Darius to set over the kingdom an hundred and twenty princes, which should be over the whole kingdom; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and over these three presidents; of whom Daniel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' first: that the princes might give accounts unto them, and the king should have no damage. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then this Daniel was preferred above the presidents and princes, because an excellent spirit '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in him; and the king thought to set him over the whole realm.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then the presidents and princes sought to find occasion against Daniel concerning the kingdom; but they could find none occasion nor fault; forasmuch as he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' faithful, neither was there any error or fault found in him. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then said these men, We shall not find any occasion against this Daniel, except we find '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' against him concerning the law of his God. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then these presidents and princes assembled together to the king, and said thus unto him, King Darius, live for ever. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'All the presidents of the kingdom, the governors, and the princes, the counsellors, and the captains, have consulted together to establish a royal statute, and to make a firm decree, that whosoever shall ask a petition of any God or man for thirty days, save of thee, O king, he shall be cast into the den of lions. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now, O king, establish the decree, and sign the writing, that it be not changed, according to the law of the Medes and Persians, which altereth not. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Wherefore king Darius signed the writing and the decree.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now when Daniel knew that the writing was signed, he went into his house; and his windows being open in his chamber toward Jerusalem, he kneeled upon his knees three times a day, and prayed, and gave thanks before his God, as he did aforetime. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then these men assembled, and found Daniel praying and making supplication before his God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then they came near, and spake before the king concerning the king''s decree; Hast thou not signed a decree, that every man that shall ask '
  - type: usfm
    marker: add
    children:
    - type: text
      text: a petition
  - type: text
    text: ' of any God or man within thirty days, save of thee, O king, shall be cast into the den of lions? The king answered and said, The thing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' true, according to the law of the Medes and Persians, which altereth not. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then answered they and said before the king, That Daniel, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' of the children of the captivity of Judah, regardeth not thee, O king, nor the decree that thou hast signed, but maketh his petition three times a day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then the king, when he heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: these
  - type: text
    text: ' words, was sore displeased with himself, and set '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' heart on Daniel to deliver him: and he laboured till the going down of the sun to deliver him. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then these men assembled unto the king, and said unto the king, Know, O king, that the law of the Medes and Persians '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ', That no decree nor statute which the king establisheth may be changed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then the king commanded, and they brought Daniel, and cast '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' into the den of lions. '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Now
  - type: text
    text: ' the king spake and said unto Daniel, Thy God whom thou servest continually, he will deliver thee. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And a stone was brought, and laid upon the mouth of the den; and the king sealed it with his own signet, and with the signet of his lords; that the purpose might not be changed concerning Daniel. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then the king went to his palace, and passed the night fasting: neither were instruments of musick brought before him: and his sleep went from him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then the king arose very early in the morning, and went in haste unto the den of lions. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And when he came to the den, he cried with a lamentable voice unto Daniel: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the king spake and said to Daniel, O Daniel, servant of the living God, is thy God, whom thou servest continually, able to deliver thee from the lions?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then said Daniel unto the king, O king, live for ever. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'My God hath sent his angel, and hath shut the lions'' mouths, that they have not hurt me: forasmuch as before him innocency was found in me; and also before thee, O king, have I done no hurt. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Then was the king exceeding glad for him, and commanded that they should take Daniel up out of the den. So Daniel was taken up out of the den, and no manner of hurt was found upon him, because he believed in his God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And the king commanded, and they brought those men which had accused Daniel, and they cast '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' into the den of lions, them, their children, and their wives; and the lions had the mastery of them, and brake all their bones in pieces or ever they came at the bottom of the den.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then king Darius wrote unto all people, nations, and languages, that dwell in all the earth; Peace be multiplied unto you. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'I make a decree, That in every dominion of my kingdom men tremble and fear before the God of Daniel: for he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the living God, and stedfast for ever, and his kingdom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' which shall not be destroyed, and his dominion '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be even
  - type: text
    text: ' unto the end. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: He delivereth and rescueth, and he worketh signs and wonders in heaven and in earth, who hath delivered Daniel from the power of the lions.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: So this Daniel prospered in the reign of Darius, and in the reign of Cyrus the Persian.
