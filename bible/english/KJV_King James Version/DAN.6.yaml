verses:
  '1':
  - type: heading
    content: The Den of Lions
  - type: text
    content: 'It pleased Darius to set over the kingdom an hundred and twenty princes, which should be over the whole kingdom; '
  '10':
  - type: text
    content: 'Now when Daniel knew that the writing was signed, he went into his house; and his windows being open in his chamber toward Jerusalem, he kneeled upon his knees three times a day, and prayed, and gave thanks before his God, as he did aforetime. '
  '11':
  - type: text
    content: Then these men assembled, and found Daniel praying and making supplication before his God.
  '12':
  - type: text
    content: 'Then they came near, and spake before the king concerning the king''s decree; Hast thou not signed a decree, that every man that shall ask '
  - type: text
    content: a petition
  - type: text
    content: ' of any God or man within thirty days, save of thee, O king, shall be cast into the den of lions? The king answered and said, The thing '
  - type: text
    content: is
  - type: text
    content: ' true, according to the law of the Medes and Persians, which altereth not. '
  '13':
  - type: text
    content: 'Then answered they and said before the king, That Daniel, which '
  - type: text
    content: is
  - type: text
    content: ' of the children of the captivity of Judah, regardeth not thee, O king, nor the decree that thou hast signed, but maketh his petition three times a day.'
  '14':
  - type: text
    content: 'Then the king, when he heard '
  - type: text
    content: these
  - type: text
    content: ' words, was sore displeased with himself, and set '
  - type: text
    content: his
  - type: text
    content: ' heart on Daniel to deliver him: and he laboured till the going down of the sun to deliver him. '
  '15':
  - type: text
    content: 'Then these men assembled unto the king, and said unto the king, Know, O king, that the law of the Medes and Persians '
  - type: text
    content: is
  - type: text
    content: ', That no decree nor statute which the king establisheth may be changed.'
  '16':
  - type: text
    content: 'Then the king commanded, and they brought Daniel, and cast '
  - type: text
    content: him
  - type: text
    content: ' into the den of lions. '
  - type: text
    content: Now
  - type: text
    content: ' the king spake and said unto Daniel, Thy God whom thou servest continually, he will deliver thee. '
  '17':
  - type: text
    content: 'And a stone was brought, and laid upon the mouth of the den; and the king sealed it with his own signet, and with the signet of his lords; that the purpose might not be changed concerning Daniel. '
  '18':
  - type: text
    content: 'Then the king went to his palace, and passed the night fasting: neither were instruments of musick brought before him: and his sleep went from him.'
  '19':
  - type: text
    content: 'Then the king arose very early in the morning, and went in haste unto the den of lions. '
  '2':
  - type: text
    content: 'and over these three presidents; of whom Daniel '
  - type: text
    content: was
  - type: text
    content: ' first: that the princes might give accounts unto them, and the king should have no damage. '
  '20':
  - type: text
    content: 'And when he came to the den, he cried with a lamentable voice unto Daniel: '
  - type: text
    content: and
  - type: text
    content: ' the king spake and said to Daniel, O Daniel, servant of the living God, is thy God, whom thou servest continually, able to deliver thee from the lions?'
  '21':
  - type: text
    content: 'Then said Daniel unto the king, O king, live for ever. '
  '22':
  - type: text
    content: 'My God hath sent his angel, and hath shut the lions'' mouths, that they have not hurt me: forasmuch as before him innocency was found in me; and also before thee, O king, have I done no hurt. '
  '23':
  - type: text
    content: Then was the king exceeding glad for him, and commanded that they should take Daniel up out of the den. So Daniel was taken up out of the den, and no manner of hurt was found upon him, because he believed in his God.
  '24':
  - type: text
    content: 'And the king commanded, and they brought those men which had accused Daniel, and they cast '
  - type: text
    content: them
  - type: text
    content: ' into the den of lions, them, their children, and their wives; and the lions had the mastery of them, and brake all their bones in pieces or ever they came at the bottom of the den.'
  '25':
  - type: text
    content: 'Then king Darius wrote unto all people, nations, and languages, that dwell in all the earth; Peace be multiplied unto you. '
  '26':
  - type: text
    content: 'I make a decree, That in every dominion of my kingdom men tremble and fear before the God of Daniel: for he '
  - type: text
    content: is
  - type: text
    content: ' the living God, and stedfast for ever, and his kingdom '
  - type: text
    content: that
  - type: text
    content: ' which shall not be destroyed, and his dominion '
  - type: text
    content: shall be even
  - type: text
    content: ' unto the end. '
  '27':
  - type: text
    content: He delivereth and rescueth, and he worketh signs and wonders in heaven and in earth, who hath delivered Daniel from the power of the lions.
  '28':
  - type: text
    content: So this Daniel prospered in the reign of Darius, and in the reign of Cyrus the Persian.
  '3':
  - type: text
    content: 'Then this Daniel was preferred above the presidents and princes, because an excellent spirit '
  - type: text
    content: was
  - type: text
    content: ' in him; and the king thought to set him over the whole realm.'
  '4':
  - type: text
    content: 'Then the presidents and princes sought to find occasion against Daniel concerning the kingdom; but they could find none occasion nor fault; forasmuch as he '
  - type: text
    content: was
  - type: text
    content: ' faithful, neither was there any error or fault found in him. '
  '5':
  - type: text
    content: 'Then said these men, We shall not find any occasion against this Daniel, except we find '
  - type: text
    content: it
  - type: text
    content: ' against him concerning the law of his God. '
  '6':
  - type: text
    content: 'Then these presidents and princes assembled together to the king, and said thus unto him, King Darius, live for ever. '
  '7':
  - type: text
    content: 'All the presidents of the kingdom, the governors, and the princes, the counsellors, and the captains, have consulted together to establish a royal statute, and to make a firm decree, that whosoever shall ask a petition of any God or man for thirty days, save of thee, O king, he shall be cast into the den of lions. '
  '8':
  - type: text
    content: 'Now, O king, establish the decree, and sign the writing, that it be not changed, according to the law of the Medes and Persians, which altereth not. '
  '9':
  - type: text
    content: Wherefore king Darius signed the writing and the decree.
