verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the chief Musician, A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The heavens declare the glory of God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the firmament sheweth his handywork.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'More to be desired '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are they
    - type: text
      text: ' than gold, yea, than much fine gold:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Sweeter also than honey and the honeycomb.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Moreover by them is thy servant warned:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' in keeping of them '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' great reward.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who can understand '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' errors?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Cleanse thou me from secret '
    - type: usfm
      marker: add
      children:
      - type: text
        text: faults
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Keep back thy servant also from presumptuous '
    - type: usfm
      marker: add
      children:
      - type: text
        text: sins
    - type: text
      text: '; Let them not have dominion over me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then shall I be upright, and I shall be innocent from the great transgression.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the words of my mouth, and the meditation of my heart, be acceptable in thy sight,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', my strength, and my redeemer.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Day unto day uttereth speech,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And night unto night sheweth knowledge. '
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: There is
    - type: text
      text: ' no speech nor language,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Where
    - type: text
      text: ' their voice is not heard.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their line is gone out through all the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their words to the end of the world.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In them hath he set a tabernacle for the sun,
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' as a bridegroom coming out of his chamber, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' rejoiceth as a strong man to run a race.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'His going forth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' from the end of the heaven, and his circuit unto the ends of it:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And there is nothing hid from the heat thereof.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The law of the '
    - type: usfm
      marker: nd
