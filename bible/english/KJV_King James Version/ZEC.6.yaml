document_id: ZEC.6
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Four Chariots
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And I turned, and lifted up mine eyes, and looked, and, behold, there came four chariots out from between two mountains; and the mountains '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' mountains of brass. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'In the first chariot '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' red horses; and in the second chariot black horses; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and in the third chariot white horses; and in the fourth chariot grisled and bay horses. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then I answered and said unto the angel that talked with me, What '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' these, my lord? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the angel answered and said unto me, These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the four spirits of the heavens, which go forth from standing before the Lord of all the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The black horses which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' therein go forth into the north country; and the white go forth after them; and the grisled go forth toward the south country. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the bay went forth, and sought to go that they might walk to and fro through the earth: and he said, Get you hence, walk to and fro through the earth. So they walked to and fro through the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then cried he upon me, and spake unto me, saying, Behold, these that go toward the north country have quieted my spirit in the north country.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The New Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: A Coronation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came unto me, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Take of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them of
  - type: text
    text: ' the captivity, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' of Heldai, of Tobijah, and of Jedaiah, which are come from Babylon, and come thou the same day, and go into the house of Josiah the son of Zephaniah; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'then take silver and gold, and make crowns, and set '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' upon the head of Joshua the son of Josedech, the high priest; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and speak unto him, saying, Thus speaketh the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, saying, Behold the man whose name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' The BRANCH; and he shall grow up out of his place, and he shall build the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'even he shall build the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and he shall bear the glory, and shall sit and rule upon his throne; and he shall be a priest upon his throne: and the counsel of peace shall be between them both. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And the crowns shall be to Helem, and to Tobijah, and to Jedaiah, and to Hen the son of Zephaniah, for a memorial in the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that are
  - type: text
    text: ' far off shall come and build in the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and ye shall know that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts hath sent me unto you. And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' shall come to pass, if ye will diligently obey the voice of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God.'
