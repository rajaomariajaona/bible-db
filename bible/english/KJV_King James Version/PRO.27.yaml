document_id: PRO.27,1
type_code: eng
verses:
  '1':
  - type: text
    content: Boast not thyself of to morrow;
  - type: text
    content: For thou knowest not what a day may bring forth.
  '10':
  - type: text
    content: Thine own friend, and thy father's friend, forsake not;
  - type: text
    content: 'Neither go into thy brother''s house in the day of thy calamity:'
  - type: text
    content: For
  - type: text
    content: ' better '
  - type: text
    content: is
  - type: text
    content: ' a neighbour '
  - type: text
    content: that is
  - type: text
    content: ' near than a brother far off.'
  '11':
  - type: text
    content: My son, be wise, and make my heart glad,
  - type: text
    content: That I may answer him that reproacheth me.
  '12':
  - type: text
    content: 'A prudent '
  - type: text
    content: man
  - type: text
    content: ' foreseeth the evil, '
  - type: text
    content: and
  - type: text
    content: ' hideth himself;'
  - type: text
    content: But
  - type: text
    content: ' the simple pass on, '
  - type: text
    content: and
  - type: text
    content: ' are punished.'
  '13':
  - type: text
    content: Take his garment that is surety for a stranger,
  - type: text
    content: And take a pledge of him for a strange woman.
  '14':
  - type: text
    content: He that blesseth his friend with a loud voice, rising early in the morning,
  - type: text
    content: It shall be counted a curse to him.
  '15':
  - type: text
    content: A continual dropping in a very rainy day
  - type: text
    content: And a contentious woman are alike.
  '16':
  - type: text
    content: Whosoever hideth her hideth the wind,
  - type: text
    content: 'And the ointment of his right hand, '
  - type: text
    content: which
  - type: text
    content: ' bewrayeth '
  - type: text
    content: itself
  - type: text
    content: .
  '17':
  - type: text
    content: Iron sharpeneth iron;
  - type: text
    content: So a man sharpeneth the countenance of his friend.
  '18':
  - type: text
    content: 'Whoso keepeth the fig tree shall eat the fruit thereof:'
  - type: text
    content: So he that waiteth on his master shall be honoured.
  '19':
  - type: text
    content: 'As in water face '
  - type: text
    content: answereth
  - type: text
    content: ' to face,'
  - type: text
    content: So the heart of man to man.
  '2':
  - type: text
    content: Let another man praise thee, and not thine own mouth;
  - type: text
    content: A stranger, and not thine own lips.
  '20':
  - type: text
    content: Hell and destruction are never full;
  - type: text
    content: So the eyes of man are never satisfied.
  '21':
  - type: text
    content: ' '
  - type: text
    content: As
  - type: text
    content: ' the fining pot for silver, and the furnace for gold;'
  - type: text
    content: 'So '
  - type: text
    content: is
  - type: text
    content: ' a man to his praise.'
  '22':
  - type: text
    content: Though thou shouldest bray a fool in a mortar among wheat with a pestle,
  - type: text
    content: Yet
  - type: text
    content: ' will not his foolishness depart from him.'
  '23':
  - type: text
    content: Be thou diligent to know the state of thy flocks,
  - type: text
    content: And
  - type: text
    content: ' look well to thy herds.'
  '24':
  - type: text
    content: 'For riches '
  - type: text
    content: are
  - type: text
    content: ' not for ever:'
  - type: text
    content: 'And doth the crown '
  - type: text
    content: endure
  - type: text
    content: ' to every generation?'
  '25':
  - type: text
    content: The hay appeareth, and the tender grass sheweth itself,
  - type: text
    content: And herbs of the mountains are gathered.
  '26':
  - type: text
    content: 'The lambs '
  - type: text
    content: are
  - type: text
    content: ' for thy clothing,'
  - type: text
    content: 'And the goats '
  - type: text
    content: are
  - type: text
    content: ' the price of the field.'
  '27':
  - type: text
    content: 'And '
  - type: text
    content: thou shalt have
  - type: text
    content: ' goats'' milk enough for thy food, for the food of thy household,'
  - type: text
    content: 'And '
  - type: text
    content: for
  - type: text
    content: ' the maintenance for thy maidens.'
  '3':
  - type: text
    content: 'A stone '
  - type: text
    content: is
  - type: text
    content: ' heavy, and the sand weighty;'
  - type: text
    content: 'But a fool''s wrath '
  - type: text
    content: is
  - type: text
    content: ' heavier than them both.'
  '4':
  - type: text
    content: 'Wrath '
  - type: text
    content: is
  - type: text
    content: ' cruel, and anger '
  - type: text
    content: is
  - type: text
    content: ' outrageous;'
  - type: text
    content: 'But who '
  - type: text
    content: is
  - type: text
    content: ' able to stand before envy?'
  '5':
  - type: text
    content: 'Open rebuke '
  - type: text
    content: is
  - type: text
    content: ' better'
  - type: text
    content: Than secret love.
  '6':
  - type: text
    content: 'Faithful '
  - type: text
    content: are
  - type: text
    content: ' the wounds of a friend;'
  - type: text
    content: 'But the kisses of an enemy '
  - type: text
    content: are
  - type: text
    content: ' deceitful.'
  '7':
  - type: text
    content: The full soul loatheth an honeycomb;
  - type: text
    content: But to the hungry soul every bitter thing is sweet.
  '8':
  - type: text
    content: As a bird that wandereth from her nest,
  - type: text
    content: 'So '
  - type: text
    content: is
  - type: text
    content: ' a man that wandereth from his place.'
  '9':
  - type: text
    content: 'Ointment and perfume rejoice the heart:'
  - type: text
    content: 'So '
  - type: text
    content: doth
  - type: text
    content: ' the sweetness of a man''s friend by hearty counsel.'
