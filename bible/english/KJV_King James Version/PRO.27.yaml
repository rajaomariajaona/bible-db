document_id: PRO.27,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Boast not thyself of to morrow;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For thou knowest not what a day may bring forth.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Thine own friend, and thy father's friend, forsake not;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Neither go into thy brother''s house in the day of thy calamity:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: For
    - type: text
      text: ' better '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a neighbour '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is
    - type: text
      text: ' near than a brother far off.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: My son, be wise, and make my heart glad,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That I may answer him that reproacheth me.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'A prudent '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' foreseeth the evil, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' hideth himself;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: But
    - type: text
      text: ' the simple pass on, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' are punished.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Take his garment that is surety for a stranger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And take a pledge of him for a strange woman.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: He that blesseth his friend with a loud voice, rising early in the morning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It shall be counted a curse to him.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: A continual dropping in a very rainy day
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a contentious woman are alike.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Whosoever hideth her hideth the wind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the ointment of his right hand, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' bewrayeth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: itself
    - type: text
      text: .
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Iron sharpeneth iron;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So a man sharpeneth the countenance of his friend.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Whoso keepeth the fig tree shall eat the fruit thereof:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So he that waiteth on his master shall be honoured.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'As in water face '
    - type: usfm
      marker: add
      children:
      - type: text
        text: answereth
    - type: text
      text: ' to face,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So the heart of man to man.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Let another man praise thee, and not thine own mouth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A stranger, and not thine own lips.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Hell and destruction are never full;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So the eyes of man are never satisfied.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: As
    - type: text
      text: ' the fining pot for silver, and the furnace for gold;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'So '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a man to his praise.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Though thou shouldest bray a fool in a mortar among wheat with a pestle,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Yet
    - type: text
      text: ' will not his foolishness depart from him.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Be thou diligent to know the state of thy flocks,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' look well to thy herds.'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'For riches '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' not for ever:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And doth the crown '
    - type: usfm
      marker: add
      children:
      - type: text
        text: endure
    - type: text
      text: ' to every generation?'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: The hay appeareth, and the tender grass sheweth itself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And herbs of the mountains are gathered.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'The lambs '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' for thy clothing,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the goats '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the price of the field.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thou shalt have
    - type: text
      text: ' goats'' milk enough for thy food, for the food of thy household,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' the maintenance for thy maidens.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'A stone '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' heavy, and the sand weighty;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But a fool''s wrath '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' heavier than them both.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Wrath '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' cruel, and anger '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' outrageous;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' able to stand before envy?'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Open rebuke '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' better'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Than secret love.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Faithful '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the wounds of a friend;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the kisses of an enemy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' deceitful.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The full soul loatheth an honeycomb;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But to the hungry soul every bitter thing is sweet.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: As a bird that wandereth from her nest,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'So '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a man that wandereth from his place.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ointment and perfume rejoice the heart:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'So '
    - type: usfm
      marker: add
      children:
      - type: text
        text: doth
    - type: text
      text: ' the sweetness of a man''s friend by hearty counsel.'
