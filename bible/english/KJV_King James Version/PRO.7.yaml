document_id: PRO.7,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: My son, keep my words,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And lay up my commandments with thee.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: And, behold, there met him a woman
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: With
    - type: text
      text: ' the attire of an harlot, and subtil of heart.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '(She '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' loud and stubborn;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Her feet abide not in her house:'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Now '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is she
    - type: text
      text: ' without, now in the streets,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And lieth in wait at every corner.)
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: So she caught him, and kissed him,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' with an impudent face said unto him,'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: I have
    - type: text
      text: ' peace offerings with me;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: This day have I payed my vows.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Therefore came I forth to meet thee,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Diligently to seek thy face, and I have found thee.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: I have decked my bed with coverings of tapestry,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'With carved '
    - type: usfm
      marker: add
      children:
      - type: text
        text: works
    - type: text
      text: ', with fine linen of Egypt.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: I have perfumed my bed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With myrrh, aloes, and cinnamon.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Come, let us take our fill of love until the morning:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let us solace ourselves with loves.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'For the goodman '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not at home,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He is gone a long journey:'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Keep my commandments, and live;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And my law as the apple of thine eye.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: He hath taken a bag of money with him,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' will come home at the day appointed.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: With her much fair speech she caused him to yield,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With the flattering of her lips she forced him.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: He goeth after her straightway,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As an ox goeth to the slaughter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or as a fool to the correction of the stocks;
  '23':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Till a dart strike through his liver;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As a bird hasteth to the snare,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And knoweth not that it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' for his life.'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Hearken unto me now therefore, O ye children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And attend to the words of my mouth.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Let not thine heart decline to her ways,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Go not astray in her paths.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'For she hath cast down many wounded:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yea, many strong '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' have been slain by her.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Her house '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the way to hell,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Going down to the chambers of death.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Bind them upon thy fingers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Write them upon the table of thine heart.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Say unto wisdom, Thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' my sister;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And call understanding '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thy
    - type: text
      text: ' kinswoman:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: That they may keep thee from the strange woman,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'From the stranger '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' flattereth with her words.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: For at the window of my house
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I looked through my casement,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: And beheld among the simple ones,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I discerned among the youths,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A young man void of understanding,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Passing through the street near her corner;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he went the way to her house,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: In the twilight, in the evening,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In the black and dark night:'
