document_id: PRO.7,1
type_code: eng
verses:
  '1':
  - type: text
    content: My son, keep my words,
  - type: text
    content: And lay up my commandments with thee.
  '10':
  - type: text
    content: And, behold, there met him a woman
  - type: text
    content: With
  - type: text
    content: ' the attire of an harlot, and subtil of heart.'
  '11':
  - type: text
    content: '(She '
  - type: text
    content: is
  - type: text
    content: ' loud and stubborn;'
  - type: text
    content: 'Her feet abide not in her house:'
  '12':
  - type: text
    content: 'Now '
  - type: text
    content: is she
  - type: text
    content: ' without, now in the streets,'
  - type: text
    content: And lieth in wait at every corner.)
  '13':
  - type: text
    content: So she caught him, and kissed him,
  - type: text
    content: And
  - type: text
    content: ' with an impudent face said unto him,'
  '14':
  - type: text
    content: ' '
  - type: text
    content: I have
  - type: text
    content: ' peace offerings with me;'
  - type: text
    content: This day have I payed my vows.
  '15':
  - type: text
    content: Therefore came I forth to meet thee,
  - type: text
    content: Diligently to seek thy face, and I have found thee.
  '16':
  - type: text
    content: I have decked my bed with coverings of tapestry,
  - type: text
    content: 'With carved '
  - type: text
    content: works
  - type: text
    content: ', with fine linen of Egypt.'
  '17':
  - type: text
    content: I have perfumed my bed
  - type: text
    content: With myrrh, aloes, and cinnamon.
  '18':
  - type: text
    content: 'Come, let us take our fill of love until the morning:'
  - type: text
    content: Let us solace ourselves with loves.
  '19':
  - type: text
    content: 'For the goodman '
  - type: text
    content: is
  - type: text
    content: ' not at home,'
  - type: text
    content: 'He is gone a long journey:'
  '2':
  - type: text
    content: Keep my commandments, and live;
  - type: text
    content: And my law as the apple of thine eye.
  '20':
  - type: text
    content: He hath taken a bag of money with him,
  - type: text
    content: And
  - type: text
    content: ' will come home at the day appointed.'
  '21':
  - type: text
    content: With her much fair speech she caused him to yield,
  - type: text
    content: With the flattering of her lips she forced him.
  '22':
  - type: text
    content: He goeth after her straightway,
  - type: text
    content: As an ox goeth to the slaughter,
  - type: text
    content: Or as a fool to the correction of the stocks;
  '23':
  - type: text
    content: Till a dart strike through his liver;
  - type: text
    content: As a bird hasteth to the snare,
  - type: text
    content: 'And knoweth not that it '
  - type: text
    content: is
  - type: text
    content: ' for his life.'
  '24':
  - type: text
    content: Hearken unto me now therefore, O ye children,
  - type: text
    content: And attend to the words of my mouth.
  '25':
  - type: text
    content: Let not thine heart decline to her ways,
  - type: text
    content: Go not astray in her paths.
  '26':
  - type: text
    content: 'For she hath cast down many wounded:'
  - type: text
    content: 'Yea, many strong '
  - type: text
    content: men
  - type: text
    content: ' have been slain by her.'
  '27':
  - type: text
    content: 'Her house '
  - type: text
    content: is
  - type: text
    content: ' the way to hell,'
  - type: text
    content: Going down to the chambers of death.
  '3':
  - type: text
    content: Bind them upon thy fingers,
  - type: text
    content: Write them upon the table of thine heart.
  '4':
  - type: text
    content: 'Say unto wisdom, Thou '
  - type: text
    content: art
  - type: text
    content: ' my sister;'
  - type: text
    content: 'And call understanding '
  - type: text
    content: thy
  - type: text
    content: ' kinswoman:'
  '5':
  - type: text
    content: That they may keep thee from the strange woman,
  - type: text
    content: 'From the stranger '
  - type: text
    content: which
  - type: text
    content: ' flattereth with her words.'
  '6':
  - type: text
    content: For at the window of my house
  - type: text
    content: I looked through my casement,
  '7':
  - type: text
    content: And beheld among the simple ones,
  - type: text
    content: I discerned among the youths,
  - type: text
    content: A young man void of understanding,
  '8':
  - type: text
    content: Passing through the street near her corner;
  - type: text
    content: And he went the way to her house,
  '9':
  - type: text
    content: In the twilight, in the evening,
  - type: text
    content: 'In the black and dark night:'
