document_id: ISA.29,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Woe to Ariel, to Ariel, the city '
    - type: usfm
      marker: add
      children:
      - type: text
        text: where
    - type: text
      text: ' David dwelt! add ye year to year; let them kill sacrifices. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath poured out upon you the spirit of deep sleep, and hath closed your eyes: the prophets and your rulers, the seers hath he covered. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And the vision of all is become unto you as the words of a book that is sealed, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' deliver to one that is learned, saying, Read this, I pray thee: and he saith, I cannot; for it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' sealed: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'and the book is delivered to him that is not learned, saying, Read this, I pray thee: and he saith, I am not learned.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Wherefore the Lord said, Forasmuch as this people draw near '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ' with their mouth, and with their lips do honour me, but have removed their heart far from me, and their fear toward me is taught by the precept of men: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'therefore, behold, I will proceed to do a marvellous work among this people, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' a marvellous work and a wonder: for the wisdom of their wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' shall perish, and the understanding of their prudent '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' shall be hid.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Woe unto them that seek deep to hide their counsel from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and their works are in the dark, and they say, Who seeth us? and who knoweth us? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Surely your turning of things upside down shall be esteemed as the potter''s clay: for shall the work say of him that made it, He made me not? or shall the thing framed say of him that framed it, He had no understanding?'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' it not yet a very little while, and Lebanon shall be turned into a fruitful field, and the fruitful field shall be esteemed as a forest? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And in that day shall the deaf hear the words of the book, and the eyes of the blind shall see out of obscurity, and out of darkness. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'The meek also shall increase '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' joy in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and the poor among men shall rejoice in the Holy One of Israel. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Yet I will distress Ariel, and there shall be heaviness and sorrow: and it shall be unto me as Ariel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'For the terrible one is brought to nought, and the scorner is consumed, and all that watch for iniquity are cut off: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: that make a man an offender for a word, and lay a snare for him that reproveth in the gate, and turn aside the just for a thing of nought.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Therefore thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', who redeemed Abraham, concerning the house of Jacob, Jacob shall not now be ashamed, neither shall his face now wax pale. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'But when he seeth his children, the work of mine hands, in the midst of him, they shall sanctify my name, and sanctify the Holy One of Jacob, and shall fear the God of Israel. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: They also that erred in spirit shall come to understanding, and they that murmured shall learn doctrine.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And I will camp against thee round about, and will lay siege against thee with a mount, and I will raise forts against thee. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And thou shalt be brought down, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' shalt speak out of the ground, and thy speech shall be low out of the dust, and thy voice shall be, as of one that hath a familiar spirit, out of the ground, and thy speech shall whisper out of the dust.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Moreover the multitude of thy strangers shall be like small dust, and the multitude of the terrible ones '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' as chaff that passeth away: yea, it shall be at an instant suddenly. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Thou shalt be visited of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts with thunder, and with earthquake, and great noise, with storm and tempest, and the flame of devouring fire. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And the multitude of all the nations that fight against Ariel, even all that fight against her and her munition, and that distress her, shall be as a dream of a night vision. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'It shall even be as when an hungry man dreameth, and, behold, he eateth; but he awaketh, and his soul is empty: or as when a thirsty man dreameth, and, behold, he drinketh; but he awaketh, and, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he is
    - type: text
      text: ' faint, and his soul hath appetite: so shall the multitude of all the nations be, that fight against mount Zion.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Stay yourselves, and wonder; cry ye out, and cry: they are drunken, but not with wine; they stagger, but not with strong drink. '
