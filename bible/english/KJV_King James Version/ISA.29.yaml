document_id: ISA.29,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem
  - type: text
    content: 'Woe to Ariel, to Ariel, the city '
  - type: text
    content: where
  - type: text
    content: ' David dwelt! add ye year to year; let them kill sacrifices. '
  '10':
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ' hath poured out upon you the spirit of deep sleep, and hath closed your eyes: the prophets and your rulers, the seers hath he covered. '
  '11':
  - type: text
    content: 'And the vision of all is become unto you as the words of a book that is sealed, which '
  - type: text
    content: men
  - type: text
    content: ' deliver to one that is learned, saying, Read this, I pray thee: and he saith, I cannot; for it '
  - type: text
    content: is
  - type: text
    content: ' sealed: '
  '12':
  - type: text
    content: 'and the book is delivered to him that is not learned, saying, Read this, I pray thee: and he saith, I am not learned.'
  '13':
  - type: text
    content: 'Wherefore the Lord said, Forasmuch as this people draw near '
  - type: text
    content: me
  - type: text
    content: ' with their mouth, and with their lips do honour me, but have removed their heart far from me, and their fear toward me is taught by the precept of men: '
  '14':
  - type: text
    content: 'therefore, behold, I will proceed to do a marvellous work among this people, '
  - type: text
    content: even
  - type: text
    content: ' a marvellous work and a wonder: for the wisdom of their wise '
  - type: text
    content: men
  - type: text
    content: ' shall perish, and the understanding of their prudent '
  - type: text
    content: men
  - type: text
    content: ' shall be hid.'
  '15':
  - type: text
    content: 'Woe unto them that seek deep to hide their counsel from the '
  - type: text
    content: LORD
  - type: text
    content: ', and their works are in the dark, and they say, Who seeth us? and who knoweth us? '
  '16':
  - type: text
    content: 'Surely your turning of things upside down shall be esteemed as the potter''s clay: for shall the work say of him that made it, He made me not? or shall the thing framed say of him that framed it, He had no understanding?'
  '17':
  - type: text
    content: ' '
  - type: text
    content: Is
  - type: text
    content: ' it not yet a very little while, and Lebanon shall be turned into a fruitful field, and the fruitful field shall be esteemed as a forest? '
  '18':
  - type: text
    content: 'And in that day shall the deaf hear the words of the book, and the eyes of the blind shall see out of obscurity, and out of darkness. '
  '19':
  - type: text
    content: 'The meek also shall increase '
  - type: text
    content: their
  - type: text
    content: ' joy in the '
  - type: text
    content: LORD
  - type: text
    content: ', and the poor among men shall rejoice in the Holy One of Israel. '
  '2':
  - type: text
    content: 'Yet I will distress Ariel, and there shall be heaviness and sorrow: and it shall be unto me as Ariel. '
  '20':
  - type: text
    content: 'For the terrible one is brought to nought, and the scorner is consumed, and all that watch for iniquity are cut off: '
  '21':
  - type: text
    content: that make a man an offender for a word, and lay a snare for him that reproveth in the gate, and turn aside the just for a thing of nought.
  '22':
  - type: text
    content: 'Therefore thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', who redeemed Abraham, concerning the house of Jacob, Jacob shall not now be ashamed, neither shall his face now wax pale. '
  '23':
  - type: text
    content: 'But when he seeth his children, the work of mine hands, in the midst of him, they shall sanctify my name, and sanctify the Holy One of Jacob, and shall fear the God of Israel. '
  '24':
  - type: text
    content: They also that erred in spirit shall come to understanding, and they that murmured shall learn doctrine.
  '3':
  - type: text
    content: 'And I will camp against thee round about, and will lay siege against thee with a mount, and I will raise forts against thee. '
  '4':
  - type: text
    content: 'And thou shalt be brought down, '
  - type: text
    content: and
  - type: text
    content: ' shalt speak out of the ground, and thy speech shall be low out of the dust, and thy voice shall be, as of one that hath a familiar spirit, out of the ground, and thy speech shall whisper out of the dust.'
  '5':
  - type: text
    content: 'Moreover the multitude of thy strangers shall be like small dust, and the multitude of the terrible ones '
  - type: text
    content: shall be
  - type: text
    content: ' as chaff that passeth away: yea, it shall be at an instant suddenly. '
  '6':
  - type: text
    content: 'Thou shalt be visited of the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts with thunder, and with earthquake, and great noise, with storm and tempest, and the flame of devouring fire. '
  '7':
  - type: text
    content: 'And the multitude of all the nations that fight against Ariel, even all that fight against her and her munition, and that distress her, shall be as a dream of a night vision. '
  '8':
  - type: text
    content: 'It shall even be as when an hungry man dreameth, and, behold, he eateth; but he awaketh, and his soul is empty: or as when a thirsty man dreameth, and, behold, he drinketh; but he awaketh, and, behold, '
  - type: text
    content: he is
  - type: text
    content: ' faint, and his soul hath appetite: so shall the multitude of all the nations be, that fight against mount Zion.'
  '9':
  - type: text
    content: 'Stay yourselves, and wonder; cry ye out, and cry: they are drunken, but not with wine; they stagger, but not with strong drink. '
