document_id: 2CH.20
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'It came to pass after this also, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' the children of Moab, and the children of Ammon, and with them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: other
  - type: text
    text: ' beside the Ammonites, came against Jehoshaphat to battle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then there came some that told Jehoshaphat, saying, There cometh a great multitude against thee from beyond the sea on this side Syria; and, behold, they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' in Hazazon-tamar, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Engedi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Jehoshaphat feared, and set himself to seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and proclaimed a fast throughout all Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Judah gathered themselves together, to ask '
  - type: usfm
    marker: add
    children:
    - type: text
      text: help
  - type: text
    text: ' of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': even out of all the cities of Judah they came to seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Jehoshaphat's Prayer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And Jehoshaphat stood in the congregation of Judah and Jerusalem, in the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', before the new court, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and said, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of our fathers, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' not thou God in heaven? and rulest '
  - type: usfm
    marker: add
    children:
    - type: text
      text: not
  - type: text
    text: ' thou over all the kingdoms of the heathen? and in thine hand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is there not
  - type: text
    text: ' power and might, so that none is able to withstand thee? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Art
  - type: text
    text: ' not thou our God, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: who
  - type: text
    text: ' didst drive out the inhabitants of this land before thy people Israel, and gavest it to the seed of Abraham thy friend for ever? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And they dwelt therein, and have built thee a sanctuary therein for thy name, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'If, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: when
  - type: text
    text: ' evil cometh upon us, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' the sword, judgment, or pestilence, or famine, we stand before this house, and in thy presence, (for thy name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in this house,) and cry unto thee in our affliction, then thou wilt hear and help. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And now, behold, the children of Ammon and Moab and mount Seir, whom thou wouldest not let Israel invade, when they came out of the land of Egypt, but they turned from them, and destroyed them not; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I say, how
  - type: text
    text: ' they reward us, to come to cast us out of thy possession, which thou hast given us to inherit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'O our God, wilt thou not judge them? for we have no might against this great company that cometh against us; neither know we what to do: but our eyes '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' upon thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And all Judah stood before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', with their little ones, their wives, and their children.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then upon Jahaziel the son of Zechariah, the son of Benaiah, the son of Jeiel, the son of Mattaniah, a Levite of the sons of Asaph, came the Spirit of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' in the midst of the congregation; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and he said, Hearken ye, all Judah, and ye inhabitants of Jerusalem, and thou king Jehoshaphat, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' unto you, Be not afraid nor dismayed by reason of this great multitude; for the battle '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not your''s, but God''s. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'To morrow go ye down against them: behold, they come up by the cliff of Ziz; and ye shall find them at the end of the brook, before the wilderness of Jeruel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ye shall not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: need
  - type: text
    text: ' to fight in this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'battle:'
  - type: text
    text: ' set yourselves, stand ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: still
  - type: text
    text: ', and see the salvation of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' with you, O Judah and Jerusalem: fear not, nor be dismayed; to morrow go out against them: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: will be
  - type: text
    text: ' with you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And Jehoshaphat bowed his head with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' face to the ground: and all Judah and the inhabitants of Jerusalem fell before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', worshipping the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And the Levites, of the children of the Kohathites, and of the children of the Korhites, stood up to praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel with a loud voice on high.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And they rose early in the morning, and went forth into the wilderness of Tekoa: and as they went forth, Jehoshaphat stood and said, Hear me, O Judah, and ye inhabitants of Jerusalem; Believe in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God, so shall ye be established; believe his prophets, so shall ye prosper. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And when he had consulted with the people, he appointed singers unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and that should praise the beauty of holiness, as they went out before the army, and to say, Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; for his mercy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: endureth
  - type: text
    text: ' for ever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And when they began to sing and to praise, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' set ambushments against the children of Ammon, Moab, and mount Seir, which were come against Judah; and they were smitten. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For the children of Ammon and Moab stood up against the inhabitants of mount Seir, utterly to slay and destroy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'them:'
  - type: text
    text: ' and when they had made an end of the inhabitants of Seir, every one helped to destroy another.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And when Judah came toward the watch tower in the wilderness, they looked unto the multitude, and, behold, they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' dead bodies fallen to the earth, and none escaped. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And when Jehoshaphat and his people came to take away the spoil of them, they found among them in abundance both riches with the dead bodies, and precious jewels, which they stripped off for themselves, more than they could carry away: and they were three days in gathering of the spoil, it was so much. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And on the fourth day they assembled themselves in the valley of Berachah; for there they blessed the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': therefore the name of the same place was called, The valley of Berachah, unto this day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then they returned, every man of Judah and Jerusalem, and Jehoshaphat in the forefront of them, to go again to Jerusalem with joy; for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had made them to rejoice over their enemies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And they came to Jerusalem with psalteries and harps and trumpets unto the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And the fear of God was on all the kingdoms of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: those
  - type: text
    text: ' countries, when they had heard that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' fought against the enemies of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'So the realm of Jehoshaphat was quiet: for his God gave him rest round about.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And Jehoshaphat reigned over Judah: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he was
  - type: text
    text: ' thirty and five years old when he began to reign, and he reigned twenty and five years in Jerusalem. And his mother''s name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Azubah the daughter of Shilhi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And he walked in the way of Asa his father, and departed not from it, doing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which was
  - type: text
    text: ' right in the sight of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Howbeit the high places were not taken away: for as yet the people had not prepared their hearts unto the God of their fathers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Now the rest of the acts of Jehoshaphat, first and last, behold, they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' written in the book of Jehu the son of Hanani, who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' mentioned in the book of the kings of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And after this did Jehoshaphat king of Judah join himself with Ahaziah king of Israel, who did very wickedly: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'and he joined himself with him to make ships to go to Tarshish: and they made the ships in Ezion-geber. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Then Eliezer the son of Dodavah of Mareshah prophesied against Jehoshaphat, saying, Because thou hast joined thyself with Ahaziah, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath broken thy works. And the ships were broken, that they were not able to go to Tarshish.'
