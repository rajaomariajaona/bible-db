document_id: EZK.11,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Abandoned by God
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Moreover the spirit lifted me up, and brought me unto the east gate of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '''s house, which looketh eastward: and behold at the door of the gate five and twenty men; among whom I saw Jaazaniah the son of Azur, and Pelatiah the son of Benaiah, princes of the people. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ye shall fall by the sword; I will judge you in the border of Israel; and ye shall know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: city
    - type: text
      text: ' shall not be your caldron, neither shall ye be the flesh in the midst thereof; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' I will judge you in the border of Israel: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'and ye shall know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': for ye have not walked in my statutes, neither executed my judgments, but have done after the manners of the heathen that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' round about you. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And it came to pass, when I prophesied, that Pelatiah the son of Benaiah died. Then fell I down upon my face, and cried with a loud voice, and said, Ah Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '! wilt thou make a full end of the remnant of Israel?'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Again the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came unto me, saying, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Son of man, thy brethren, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' thy brethren, the men of thy kindred, and all the house of Israel wholly, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' they unto whom the inhabitants of Jerusalem have said, Get you far from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': unto us is this land given in possession. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Therefore say, Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; Although I have cast them far off among the heathen, and although I have scattered them among the countries, yet will I be to them as a little sanctuary in the countries where they shall come. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Therefore say, Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; I will even gather you from the people, and assemble you out of the countries where ye have been scattered, and I will give you the land of Israel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And they shall come thither, and they shall take away all the detestable things thereof and all the abominations thereof from thence. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And I will give them one heart, and I will put a new spirit within you; and I will take the stony heart out of their flesh, and will give them an heart of flesh: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then said he unto me, Son of man, these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the men that devise mischief, and give wicked counsel in this city: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'that they may walk in my statutes, and keep mine ordinances, and do them: and they shall be my people, and I will be their God. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'But '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as for them
    - type: text
      text: ' whose heart walketh after the heart of their detestable things and their abominations, I will recompense their way upon their own heads, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: .
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Then did the cherubims lift up their wings, and the wheels beside them; and the glory of the God of Israel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' over them above. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' went up from the midst of the city, and stood upon the mountain which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' on the east side of the city. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Afterwards the spirit took me up, and brought me in a vision by the Spirit of God into Chaldea, to them of the captivity. So the vision that I had seen went up from me. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Then I spake unto them of the captivity all the things that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had shewed me.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'which say, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' not near: let us build houses: this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: city is
    - type: text
      text: ' the caldron, and we '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' the flesh. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Therefore prophesy against them, prophesy, O son of man.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' fell upon me, and said unto me, Speak; Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; Thus have ye said, O house of Israel: for I know the things that come into your mind, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: every one of
    - type: text
      text: ' them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ye have multiplied your slain in this city, and ye have filled the streets thereof with the slain. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Therefore thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; Your slain whom ye have laid in the midst of it, they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the flesh, and this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: city is
    - type: text
      text: ' the caldron: but I will bring you forth out of the midst of it. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ye have feared the sword; and I will bring a sword upon you, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And I will bring you out of the midst thereof, and deliver you into the hands of strangers, and will execute judgments among you. '
