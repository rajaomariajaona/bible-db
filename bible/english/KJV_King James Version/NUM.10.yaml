verses:
  '1':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '10':
  - type: text
    content: 'Also in the day of your gladness, and in your solemn days, and in the beginnings of your months, ye shall blow with the trumpets over your burnt offerings, and over the sacrifices of your peace offerings; that they may be to you for a memorial before your God: I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' your God.'
  '11':
  - type: text
    content: 'And it came to pass on the twentieth '
  - type: text
    content: day
  - type: text
    content: ' of the second month, in the second year, that the cloud was taken up from off the tabernacle of the testimony. '
  '12':
  - type: text
    content: 'And the children of Israel took their journeys out of the wilderness of Sinai; and the cloud rested in the wilderness of Paran. '
  '13':
  - type: text
    content: 'And they first took their journey according to the commandment of the '
  - type: text
    content: LORD
  - type: text
    content: ' by the hand of Moses.'
  - type: heading
    content: Order of the March
  '14':
  - type: text
    content: 'In the first '
  - type: text
    content: place
  - type: text
    content: ' went the standard of the camp of the children of Judah according to their armies: and over his host '
  - type: text
    content: was
  - type: text
    content: ' Nahshon the son of Amminadab. '
  '15':
  - type: text
    content: 'And over the host of the tribe of the children of Issachar '
  - type: text
    content: was
  - type: text
    content: ' Nethaneel the son of Zuar. '
  '16':
  - type: text
    content: 'And over the host of the tribe of the children of Zebulun '
  - type: text
    content: was
  - type: text
    content: ' Eliab the son of Helon.'
  '17':
  - type: text
    content: 'And the tabernacle was taken down; and the sons of Gershon and the sons of Merari set forward, bearing the tabernacle. '
  '18':
  - type: text
    content: 'And the standard of the camp of Reuben set forward according to their armies: and over his host '
  - type: text
    content: was
  - type: text
    content: ' Elizur the son of Shedeur. '
  '19':
  - type: text
    content: 'And over the host of the tribe of the children of Simeon '
  - type: text
    content: was
  - type: text
    content: ' Shelumiel the son of Zurishaddai. '
  '2':
  - type: text
    content: 'Make thee two trumpets of silver; of a whole piece shalt thou make them: that thou mayest use them for the calling of the assembly, and for the journeying of the camps. '
  '20':
  - type: text
    content: 'And over the host of the tribe of the children of Gad '
  - type: text
    content: was
  - type: text
    content: ' Eliasaph the son of Deuel.'
  '21':
  - type: text
    content: 'And the Kohathites set forward, bearing the sanctuary: and '
  - type: text
    content: the other
  - type: text
    content: ' did set up the tabernacle against they came. '
  '22':
  - type: text
    content: 'And the standard of the camp of the children of Ephraim set forward according to their armies: and over his host '
  - type: text
    content: was
  - type: text
    content: ' Elishama the son of Ammihud. '
  '23':
  - type: text
    content: 'And over the host of the tribe of the children of Manasseh '
  - type: text
    content: was
  - type: text
    content: ' Gamaliel the son of Pedahzur. '
  '24':
  - type: text
    content: 'And over the host of the tribe of the children of Benjamin '
  - type: text
    content: was
  - type: text
    content: ' Abidan the son of Gideoni.'
  '25':
  - type: text
    content: 'And the standard of the camp of the children of Dan set forward, '
  - type: text
    content: which was
  - type: text
    content: ' the rereward of all the camps throughout their hosts: and over his host '
  - type: text
    content: was
  - type: text
    content: ' Ahiezer the son of Ammishaddai. '
  '26':
  - type: text
    content: 'And over the host of the tribe of the children of Asher '
  - type: text
    content: was
  - type: text
    content: ' Pagiel the son of Ocran. '
  '27':
  - type: text
    content: 'And over the host of the tribe of the children of Naphtali '
  - type: text
    content: was
  - type: text
    content: ' Ahira the son of Enan. '
  '28':
  - type: text
    content: 'Thus '
  - type: text
    content: were
  - type: text
    content: ' the journeyings of the children of Israel according to their armies, when they set forward.'
  '29':
  - type: text
    content: 'And Moses said unto Hobab, the son of Raguel the Midianite, Moses'' father in law, We are journeying unto the place of which the '
  - type: text
    content: LORD
  - type: text
    content: ' said, I will give it you: come thou with us, and we will do thee good: for the '
  - type: text
    content: LORD
  - type: text
    content: ' hath spoken good concerning Israel. '
  '3':
  - type: text
    content: 'And when they shall blow with them, all the assembly shall assemble themselves to thee at the door of the tabernacle of the congregation. '
  '30':
  - type: text
    content: 'And he said unto him, I will not go; but I will depart to mine own land, and to my kindred. '
  '31':
  - type: text
    content: 'And he said, Leave us not, I pray thee; forasmuch as thou knowest how we are to encamp in the wilderness, and thou mayest be to us instead of eyes. '
  '32':
  - type: text
    content: 'And it shall be, if thou go with us, yea, it shall be, that what goodness the '
  - type: text
    content: LORD
  - type: text
    content: ' shall do unto us, the same will we do unto thee.'
  '33':
  - type: text
    content: 'And they departed from the mount of the '
  - type: text
    content: LORD
  - type: text
    content: ' three days'' journey: and the ark of the covenant of the '
  - type: text
    content: LORD
  - type: text
    content: ' went before them in the three days'' journey, to search out a resting place for them. '
  '34':
  - type: text
    content: 'And the cloud of the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' upon them by day, when they went out of the camp.'
  '35':
  - type: text
    content: 'And it came to pass, when the ark set forward, that Moses said, Rise up, '
  - type: text
    content: LORD
  - type: text
    content: ', and let thine enemies be scattered; and let them that hate thee flee before thee. '
  '36':
  - type: text
    content: 'And when it rested, he said, Return, O '
  - type: text
    content: LORD
  - type: text
    content: ', unto the many thousands of Israel.'
  '4':
  - type: text
    content: 'And if they blow '
  - type: text
    content: but
  - type: text
    content: ' with one '
  - type: text
    content: trumpet
  - type: text
    content: ', then the princes, '
  - type: text
    content: which are
  - type: text
    content: ' heads of the thousands of Israel, shall gather themselves unto thee. '
  '5':
  - type: text
    content: 'When ye blow an alarm, then the camps that lie on the east parts shall go forward. '
  '6':
  - type: text
    content: 'When ye blow an alarm the second time, then the camps that lie on the south side shall take their journey: they shall blow an alarm for their journeys. '
  '7':
  - type: text
    content: 'But when the congregation is to be gathered together, ye shall blow, but ye shall not sound an alarm. '
  '8':
  - type: text
    content: 'And the sons of Aaron, the priests, shall blow with the trumpets; and they shall be to you for an ordinance for ever throughout your generations. '
  '9':
  - type: text
    content: 'And if ye go to war in your land against the enemy that oppresseth you, then ye shall blow an alarm with the trumpets; and ye shall be remembered before the '
  - type: text
    content: LORD
  - type: text
    content: ' your God, and ye shall be saved from your enemies. '
