document_id: NUM.10
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Make thee two trumpets of silver; of a whole piece shalt thou make them: that thou mayest use them for the calling of the assembly, and for the journeying of the camps. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And when they shall blow with them, all the assembly shall assemble themselves to thee at the door of the tabernacle of the congregation. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And if they blow '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' with one '
  - type: usfm
    marker: add
    children:
    - type: text
      text: trumpet
  - type: text
    text: ', then the princes, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which are
  - type: text
    text: ' heads of the thousands of Israel, shall gather themselves unto thee. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When ye blow an alarm, then the camps that lie on the east parts shall go forward. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When ye blow an alarm the second time, then the camps that lie on the south side shall take their journey: they shall blow an alarm for their journeys. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But when the congregation is to be gathered together, ye shall blow, but ye shall not sound an alarm. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the sons of Aaron, the priests, shall blow with the trumpets; and they shall be to you for an ordinance for ever throughout your generations. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And if ye go to war in your land against the enemy that oppresseth you, then ye shall blow an alarm with the trumpets; and ye shall be remembered before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God, and ye shall be saved from your enemies. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Also in the day of your gladness, and in your solemn days, and in the beginnings of your months, ye shall blow with the trumpets over your burnt offerings, and over the sacrifices of your peace offerings; that they may be to you for a memorial before your God: I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And it came to pass on the twentieth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' of the second month, in the second year, that the cloud was taken up from off the tabernacle of the testimony. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And the children of Israel took their journeys out of the wilderness of Sinai; and the cloud rested in the wilderness of Paran. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And they first took their journey according to the commandment of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' by the hand of Moses.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Order of the March
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'In the first '
  - type: usfm
    marker: add
    children:
    - type: text
      text: place
  - type: text
    text: ' went the standard of the camp of the children of Judah according to their armies: and over his host '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Nahshon the son of Amminadab. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And over the host of the tribe of the children of Issachar '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Nethaneel the son of Zuar. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And over the host of the tribe of the children of Zebulun '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Eliab the son of Helon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the tabernacle was taken down; and the sons of Gershon and the sons of Merari set forward, bearing the tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And the standard of the camp of Reuben set forward according to their armies: and over his host '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Elizur the son of Shedeur. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And over the host of the tribe of the children of Simeon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Shelumiel the son of Zurishaddai. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And over the host of the tribe of the children of Gad '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Eliasaph the son of Deuel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And the Kohathites set forward, bearing the sanctuary: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the other
  - type: text
    text: ' did set up the tabernacle against they came. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And the standard of the camp of the children of Ephraim set forward according to their armies: and over his host '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Elishama the son of Ammihud. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And over the host of the tribe of the children of Manasseh '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Gamaliel the son of Pedahzur. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And over the host of the tribe of the children of Benjamin '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Abidan the son of Gideoni.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And the standard of the camp of the children of Dan set forward, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which was
  - type: text
    text: ' the rereward of all the camps throughout their hosts: and over his host '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Ahiezer the son of Ammishaddai. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And over the host of the tribe of the children of Asher '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Pagiel the son of Ocran. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And over the host of the tribe of the children of Naphtali '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Ahira the son of Enan. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Thus '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' the journeyings of the children of Israel according to their armies, when they set forward.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And Moses said unto Hobab, the son of Raguel the Midianite, Moses'' father in law, We are journeying unto the place of which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said, I will give it you: come thou with us, and we will do thee good: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath spoken good concerning Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And he said unto him, I will not go; but I will depart to mine own land, and to my kindred. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And he said, Leave us not, I pray thee; forasmuch as thou knowest how we are to encamp in the wilderness, and thou mayest be to us instead of eyes. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And it shall be, if thou go with us, yea, it shall be, that what goodness the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall do unto us, the same will we do unto thee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And they departed from the mount of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' three days'' journey: and the ark of the covenant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' went before them in the three days'' journey, to search out a resting place for them. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And the cloud of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' upon them by day, when they went out of the camp.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And it came to pass, when the ark set forward, that Moses said, Rise up, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and let thine enemies be scattered; and let them that hate thee flee before thee. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And when it rested, he said, Return, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', unto the many thousands of Israel.'
