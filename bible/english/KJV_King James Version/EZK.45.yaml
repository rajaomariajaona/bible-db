  '1':
  - type: text
    content: 'Moreover, when ye shall divide by lot the land for inheritance, ye shall offer an oblation unto the '
  - type: text
    content: LORD
  - type: text
    content: ', an holy portion of the land: the length '
  - type: text
    content: shall be
  - type: text
    content: ' the length of five and twenty thousand '
  - type: text
    content: reeds
  - type: text
    content: ', and the breadth '
  - type: text
    content: shall be
  - type: text
    content: ' ten thousand. This '
  - type: text
    content: shall be
  - type: text
    content: ' holy in all the borders thereof round about. '
  '10':
  - type: text
    content: 'Ye shall have just balances, and a just ephah, and a just bath. '
  '11':
  - type: text
    content: 'The ephah and the bath shall be of one measure, that the bath may contain the tenth part of an homer, and the ephah the tenth part of an homer: the measure thereof shall be after the homer. '
  '12':
  - type: text
    content: 'And the shekel '
  - type: text
    content: shall be
  - type: text
    content: ' twenty gerahs: twenty shekels, five and twenty shekels, fifteen shekels, shall be your maneh.'
  '13':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the oblation that ye shall offer; the sixth part of an ephah of an homer of wheat, and ye shall give the sixth part of an ephah of an homer of barley: '
  '14':
  - type: text
    content: 'concerning the ordinance of oil, the bath of oil, '
  - type: text
    content: ye shall offer
  - type: text
    content: ' the tenth part of a bath out of the cor, '
  - type: text
    content: which is
  - type: text
    content: ' an homer of ten baths; for ten baths '
  - type: text
    content: are
  - type: text
    content: ' an homer: '
  '15':
  - type: text
    content: 'and one lamb out of the flock, out of two hundred, out of the fat pastures of Israel; for a meat offering, and for a burnt offering, and for peace offerings, to make reconciliation for them, saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'All the people of the land shall give this oblation for the prince in Israel. '
  '17':
  - type: text
    content: 'And it shall be the prince''s part '
  - type: text
    content: to give
  - type: text
    content: ' burnt offerings, and meat offerings, and drink offerings, in the feasts, and in the new moons, and in the sabbaths, in all solemnities of the house of Israel: he shall prepare the sin offering, and the meat offering, and the burnt offering, and the peace offerings, to make reconciliation for the house of Israel.'
  - type: heading
    content: The Festivals
  '18':
  - type: text
    content: 'Thus saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: '; In the first '
  - type: text
    content: month
  - type: text
    content: ', in the first '
  - type: text
    content: day
  - type: text
    content: ' of the month, thou shalt take a young bullock without blemish, and cleanse the sanctuary: '
  '19':
  - type: text
    content: 'and the priest shall take of the blood of the sin offering, and put '
  - type: text
    content: it
  - type: text
    content: ' upon the posts of the house, and upon the four corners of the settle of the altar, and upon the posts of the gate of the inner court. '
  '2':
  - type: text
    content: 'Of this there shall be for the sanctuary five hundred '
  - type: text
    content: in length
  - type: text
    content: ', with five hundred '
  - type: text
    content: in breadth
  - type: text
    content: ', square round about; and fifty cubits round about for the suburbs thereof. '
  '20':
  - type: text
    content: 'And so thou shalt do the seventh '
  - type: text
    content: day
  - type: text
    content: ' of the month for every one that erreth, and for '
  - type: text
    content: him that is
  - type: text
    content: ' simple: so shall ye reconcile the house.'
  '21':
  - type: text
    content: 'In the first '
  - type: text
    content: month
  - type: text
    content: ', in the fourteenth day of the month, ye shall have the passover, a feast of seven days; unleavened bread shall be eaten. '
  '22':
  - type: text
    content: 'And upon that day shall the prince prepare for himself and for all the people of the land a bullock '
  - type: text
    content: for
  - type: text
    content: ' a sin offering. '
  '23':
  - type: text
    content: 'And seven days of the feast he shall prepare a burnt offering to the '
  - type: text
    content: LORD
  - type: text
    content: ', seven bullocks and seven rams without blemish daily the seven days; and a kid of the goats daily '
  - type: text
    content: for
  - type: text
    content: ' a sin offering. '
  '24':
  - type: text
    content: 'And he shall prepare a meat offering of an ephah for a bullock, and an ephah for a ram, and an hin of oil for an ephah. '
  '25':
  - type: text
    content: 'In the seventh '
  - type: text
    content: month
  - type: text
    content: ', in the fifteenth day of the month, shall he do the like in the feast of the seven days, according to the sin offering, according to the burnt offering, and according to the meat offering, and according to the oil.'
  '3':
  - type: text
    content: 'And of this measure shalt thou measure the length of five and twenty thousand, and the breadth of ten thousand: and in it shall be the sanctuary '
  - type: text
    content: and
  - type: text
    content: ' the most holy '
  - type: text
    content: place
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'The holy '
  - type: text
    content: portion
  - type: text
    content: ' of the land shall be for the priests the ministers of the sanctuary, which shall come near to minister unto the '
  - type: text
    content: LORD
  - type: text
    content: ': and it shall be a place for their houses, and an holy place for the sanctuary. '
  '5':
  - type: text
    content: 'And the five and twenty thousand of length, and the ten thousand of breadth, shall also the Levites, the ministers of the house, have for themselves, for a possession for twenty chambers. '
  '6':
  - type: text
    content: 'And ye shall appoint the possession of the city five thousand broad, and five and twenty thousand long, over against the oblation of the holy '
  - type: text
    content: 'portion:'
  - type: text
    content: ' it shall be for the whole house of Israel.'
  - type: heading
    content: The Prince's Portion
  '7':
  - type: text
    content: 'And '
  - type: text
    content: a portion shall be
  - type: text
    content: ' for the prince on the one side and on the other side of the oblation of the holy '
  - type: text
    content: portion
  - type: text
    content: ', and of the possession of the city, before the oblation of the holy '
  - type: text
    content: portion
  - type: text
    content: ', and before the possession of the city, from the west side westward, and from the east side eastward: and the length '
  - type: text
    content: shall be
  - type: text
    content: ' over against one of the portions, from the west border unto the east border. '
  '8':
  - type: text
    content: 'In the land shall be his possession in Israel: and my princes shall no more oppress my people; and '
  - type: text
    content: the rest of
  - type: text
    content: ' the land shall they give to the house of Israel according to their tribes.'
  '9':
  - type: text
    content: 'Thus saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: '; Let it suffice you, O princes of Israel: remove violence and spoil, and execute judgment and justice, take away your exactions from my people, saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: '. '
