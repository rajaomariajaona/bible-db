document_id: EZK.45,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover, when ye shall divide by lot the land for inheritance, ye shall offer an oblation unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', an holy portion of the land: the length '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' the length of five and twenty thousand '
    - type: usfm
      marker: add
      children:
      - type: text
        text: reeds
    - type: text
      text: ', and the breadth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' ten thousand. This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' holy in all the borders thereof round about. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ye shall have just balances, and a just ephah, and a just bath. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The ephah and the bath shall be of one measure, that the bath may contain the tenth part of an homer, and the ephah the tenth part of an homer: the measure thereof shall be after the homer. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the shekel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' twenty gerahs: twenty shekels, five and twenty shekels, fifteen shekels, shall be your maneh.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the oblation that ye shall offer; the sixth part of an ephah of an homer of wheat, and ye shall give the sixth part of an ephah of an homer of barley: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'concerning the ordinance of oil, the bath of oil, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ye shall offer
    - type: text
      text: ' the tenth part of a bath out of the cor, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which is
    - type: text
      text: ' an homer of ten baths; for ten baths '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' an homer: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and one lamb out of the flock, out of two hundred, out of the fat pastures of Israel; for a meat offering, and for a burnt offering, and for peace offerings, to make reconciliation for them, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the people of the land shall give this oblation for the prince in Israel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall be the prince''s part '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to give
    - type: text
      text: ' burnt offerings, and meat offerings, and drink offerings, in the feasts, and in the new moons, and in the sabbaths, in all solemnities of the house of Israel: he shall prepare the sin offering, and the meat offering, and the burnt offering, and the peace offerings, to make reconciliation for the house of Israel.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Festivals
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; In the first '
    - type: usfm
      marker: add
      children:
      - type: text
        text: month
    - type: text
      text: ', in the first '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the month, thou shalt take a young bullock without blemish, and cleanse the sanctuary: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the priest shall take of the blood of the sin offering, and put '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' upon the posts of the house, and upon the four corners of the settle of the altar, and upon the posts of the gate of the inner court. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of this there shall be for the sanctuary five hundred '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in length
    - type: text
      text: ', with five hundred '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in breadth
    - type: text
      text: ', square round about; and fifty cubits round about for the suburbs thereof. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And so thou shalt do the seventh '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the month for every one that erreth, and for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him that is
    - type: text
      text: ' simple: so shall ye reconcile the house.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the first '
    - type: usfm
      marker: add
      children:
      - type: text
        text: month
    - type: text
      text: ', in the fourteenth day of the month, ye shall have the passover, a feast of seven days; unleavened bread shall be eaten. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And upon that day shall the prince prepare for himself and for all the people of the land a bullock '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a sin offering. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And seven days of the feast he shall prepare a burnt offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', seven bullocks and seven rams without blemish daily the seven days; and a kid of the goats daily '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a sin offering. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he shall prepare a meat offering of an ephah for a bullock, and an ephah for a ram, and an hin of oil for an ephah. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the seventh '
    - type: usfm
      marker: add
      children:
      - type: text
        text: month
    - type: text
      text: ', in the fifteenth day of the month, shall he do the like in the feast of the seven days, according to the sin offering, according to the burnt offering, and according to the meat offering, and according to the oil.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And of this measure shalt thou measure the length of five and twenty thousand, and the breadth of ten thousand: and in it shall be the sanctuary '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the most holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: place
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: portion
    - type: text
      text: ' of the land shall be for the priests the ministers of the sanctuary, which shall come near to minister unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': and it shall be a place for their houses, and an holy place for the sanctuary. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the five and twenty thousand of length, and the ten thousand of breadth, shall also the Levites, the ministers of the house, have for themselves, for a possession for twenty chambers. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And ye shall appoint the possession of the city five thousand broad, and five and twenty thousand long, over against the oblation of the holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'portion:'
    - type: text
      text: ' it shall be for the whole house of Israel.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Prince's Portion
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: a portion shall be
    - type: text
      text: ' for the prince on the one side and on the other side of the oblation of the holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: portion
    - type: text
      text: ', and of the possession of the city, before the oblation of the holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: portion
    - type: text
      text: ', and before the possession of the city, from the west side westward, and from the east side eastward: and the length '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' over against one of the portions, from the west border unto the east border. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the land shall be his possession in Israel: and my princes shall no more oppress my people; and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the rest of
    - type: text
      text: ' the land shall they give to the house of Israel according to their tribes.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; Let it suffice you, O princes of Israel: remove violence and spoil, and execute judgment and justice, take away your exactions from my people, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '. '
