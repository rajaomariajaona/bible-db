document_id: 1SA.22
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'David therefore departed thence, and escaped to the cave Adullam: and when his brethren and all his father''s house heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', they went down thither to him. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And every one '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that was
  - type: text
    text: ' in distress, and every one that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in debt, and every one '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that was
  - type: text
    text: ' discontented, gathered themselves unto him; and he became a captain over them: and there were with him about four hundred men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And David went thence to Mizpeh of Moab: and he said unto the king of Moab, Let my father and my mother, I pray thee, come forth, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and be
  - type: text
    text: ' with you, till I know what God will do for me. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And he brought them before the king of Moab: and they dwelt with him all the while that David was in the hold. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: And the prophet Gad said unto David, Abide not in the hold; depart, and get thee into the land of Judah. Then David departed, and came into the forest of Hareth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When Saul heard that David was discovered, and the men that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with him, (now Saul abode in Gibeah under a tree in Ramah, having his spear in his hand, and all his servants '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' standing about him;) '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'then Saul said unto his servants that stood about him, Hear now, ye Benjamites; will the son of Jesse give every one of you fields and vineyards, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' make you all captains of thousands, and captains of hundreds; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'that all of you have conspired against me, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' none that sheweth me that my son hath made a league with the son of Jesse, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' none of you that is sorry for me, or sheweth unto me that my son hath stirred up my servant against me, to lie in wait, as at this day? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then answered Doeg the Edomite, which was set over the servants of Saul, and said, I saw the son of Jesse coming to Nob, to Ahimelech the son of Ahitub. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And he enquired of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' for him, and gave him victuals, and gave him the sword of Goliath the Philistine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then the king sent to call Ahimelech the priest, the son of Ahitub, and all his father''s house, the priests that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in Nob: and they came all of them to the king. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Saul said, Hear now, thou son of Ahitub. And he answered, Here I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ', my lord. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Saul said unto him, Why have ye conspired against me, thou and the son of Jesse, in that thou hast given him bread, and a sword, and hast enquired of God for him, that he should rise against me, to lie in wait, as at this day? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then Ahimelech answered the king, and said, And who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is so
  - type: text
    text: ' faithful among all thy servants as David, which is the king''s son in law, and goeth at thy bidding, and is honourable in thine house? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Did I then begin to enquire of God for him? be it far from me: let not the king impute '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' thing unto his servant, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: nor
  - type: text
    text: ' to all the house of my father: for thy servant knew nothing of all this, less or more. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the king said, Thou shalt surely die, Ahimelech, thou, and all thy father''s house. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the king said unto the footmen that stood about him, Turn, and slay the priests of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; because their hand also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with David, and because they knew when he fled, and did not shew it to me. But the servants of the king would not put forth their hand to fall upon the priests of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And the king said to Doeg, Turn thou, and fall upon the priests. And Doeg the Edomite turned, and he fell upon the priests, and slew on that day fourscore and five persons that did wear a linen ephod. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: And Nob, the city of the priests, smote he with the edge of the sword, both men and women, children and sucklings, and oxen, and asses, and sheep, with the edge of the sword.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And one of the sons of Ahimelech the son of Ahitub, named Abiathar, escaped, and fled after David. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And Abiathar shewed David that Saul had slain the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s priests. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And David said unto Abiathar, I knew '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' that day, when Doeg the Edomite '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' there, that he would surely tell Saul: I have occasioned '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the death
  - type: text
    text: ' of all the persons of thy father''s house. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Abide thou with me, fear not: for he that seeketh my life seeketh thy life: but with me thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shalt be
  - type: text
    text: ' in safeguard.'
