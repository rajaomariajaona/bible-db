document_id: PSA.82,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Psalm of Asaph.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God standeth in the congregation of the mighty;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He judgeth among the gods.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long will ye judge unjustly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And accept the persons of the wicked? '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Defend the poor and fatherless:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do justice to the afflicted and needy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Deliver the poor and needy:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Rid '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' out of the hand of the wicked.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They know not, neither will they understand; They walk on in darkness:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All the foundations of the earth are out of course.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I have said, Ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' gods;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And all of you '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' children of the most High.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But ye shall die like men,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And fall like one of the princes.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Arise, O God, judge the earth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For thou shalt inherit all nations.
