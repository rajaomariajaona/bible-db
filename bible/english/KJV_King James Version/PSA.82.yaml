document_id: PSA.82,1
type_code: eng
verses:
  '1':
  - type: text
    content: A Psalm of Asaph.
  - type: text
    content: God standeth in the congregation of the mighty;
  - type: text
    content: He judgeth among the gods.
  '2':
  - type: text
    content: How long will ye judge unjustly,
  - type: text
    content: 'And accept the persons of the wicked? '
  - type: text
    content: Selah.
  '3':
  - type: text
    content: 'Defend the poor and fatherless:'
  - type: text
    content: Do justice to the afflicted and needy.
  '4':
  - type: text
    content: 'Deliver the poor and needy:'
  - type: text
    content: 'Rid '
  - type: text
    content: them
  - type: text
    content: ' out of the hand of the wicked.'
  '5':
  - type: text
    content: 'They know not, neither will they understand; They walk on in darkness:'
  - type: text
    content: All the foundations of the earth are out of course.
  '6':
  - type: text
    content: 'I have said, Ye '
  - type: text
    content: are
  - type: text
    content: ' gods;'
  - type: text
    content: 'And all of you '
  - type: text
    content: are
  - type: text
    content: ' children of the most High.'
  '7':
  - type: text
    content: But ye shall die like men,
  - type: text
    content: And fall like one of the princes.
  '8':
  - type: text
    content: 'Arise, O God, judge the earth:'
  - type: text
    content: For thou shalt inherit all nations.
