document_id: PSA.82
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: A Psalm of Asaph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: God standeth in the congregation of the mighty;
- type: usfm
  marker: q2
  children:
  - type: text
    text: He judgeth among the gods.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: How long will ye judge unjustly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And accept the persons of the wicked? '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Defend the poor and fatherless:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do justice to the afflicted and needy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Deliver the poor and needy:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Rid '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' out of the hand of the wicked.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They know not, neither will they understand; They walk on in darkness:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: All the foundations of the earth are out of course.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I have said, Ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' gods;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And all of you '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' children of the most High.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But ye shall die like men,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And fall like one of the princes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Arise, O God, judge the earth:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: For thou shalt inherit all nations.
