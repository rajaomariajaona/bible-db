document_id: JOB.24,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Why, seeing times are not hidden from the Almighty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do they that know him not see his days?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'They cause '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' to go naked without clothing,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And they take away the sheaf '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from
    - type: text
      text: ' the hungry;'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Which
    - type: text
      text: ' make oil within their walls,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' tread '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' winepresses, and suffer thirst.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Men groan from out of the city,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the soul of the wounded crieth out:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yet God layeth not folly '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to them
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: They are of those that rebel against the light;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They know not the ways thereof,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor abide in the paths thereof.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The murderer rising with the light killeth the poor and needy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And in the night is as a thief.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The eye also of the adulterer waiteth for the twilight,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Saying, No eye shall see me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And disguiseth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' face.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: In the dark they dig through houses,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Which
    - type: text
      text: ' they had marked for themselves in the daytime:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They know not the light.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For the morning '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' to them even as the shadow of death:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'If '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' know '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them, they are in
    - type: text
      text: ' the terrors of the shadow of death.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'He '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' swift as the waters;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Their portion is cursed in the earth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He beholdeth not the way of the vineyards.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Drought and heat consume the snow waters:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: So doth
    - type: text
      text: ' the grave '
    - type: usfm
      marker: add
      children:
      - type: text
        text: those which
    - type: text
      text: ' have sinned.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Some
    - type: text
      text: ' remove the landmarks;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They violently take away flocks, and feed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thereof
    - type: text
      text: .
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: The womb shall forget him; the worm shall feed sweetly on him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shall be no more remembered;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And wickedness shall be broken as a tree.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'He evil entreateth the barren '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' beareth not:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And doeth not good to the widow.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'He draweth also the mighty with his power:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He riseth up, and no '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' is sure of life.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Though
    - type: text
      text: ' it be given him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' in safety, whereon he resteth;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yet his eyes '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' upon their ways.'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: They are exalted for a little while, but are gone
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And brought low; they are taken out of the way as all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: other
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And cut off as the tops of the ears of corn.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it be
    - type: text
      text: ' not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' now, who will make me a liar,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And make my speech nothing worth?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: They drive away the ass of the fatherless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They take the widow's ox for a pledge.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'They turn the needy out of the way:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The poor of the earth hide themselves together.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' wild asses in the desert,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Go they forth to their work; rising betimes for a prey:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The wilderness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yieldeth
    - type: text
      text: ' food for them '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' children.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'They reap '
    - type: usfm
      marker: add
      children:
      - type: text
        text: every one
    - type: text
      text: ' his corn in the field:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they gather the vintage of the wicked.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: They cause the naked to lodge without clothing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they have
    - type: text
      text: ' no covering in the cold.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: They are wet with the showers of the mountains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And embrace the rock for want of a shelter.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: They pluck the fatherless from the breast,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And take a pledge of the poor.
