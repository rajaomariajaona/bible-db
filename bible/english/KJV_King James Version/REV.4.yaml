verses:
  '1':
  - type: heading
    content: A Vision of Heaven
  - type: text
    content: 'After this I looked, and, behold, a door '
  - type: text
    content: was
  - type: text
    content: ' opened in heaven: and the first voice which I heard '
  - type: text
    content: was
  - type: text
    content: ' as it were of a trumpet talking with me; which said, '
  - type: text
    content: Come up hither, and I will shew thee things which must be hereafter.
  '10':
  - type: text
    content: 'the four and twenty elders fall down before him that sat on the throne, and worship him that liveth for ever and ever, and cast their crowns before the throne, saying, '
  '11':
  - type: text
    content: 'Thou art worthy, O Lord, to receive glory and honour and power: for thou hast created all things, and for thy pleasure they are and were created.'
  '2':
  - type: text
    content: 'And immediately I was in the spirit: and, behold, a throne was set in heaven, and '
  - type: text
    content: one
  - type: text
    content: ' sat on the throne. '
  '3':
  - type: text
    content: 'And he that sat was to look upon like a jasper and a sardine stone: and '
  - type: text
    content: there was
  - type: text
    content: ' a rainbow round about the throne, in sight like unto an emerald. '
  '4':
  - type: text
    content: 'And round about the throne '
  - type: text
    content: were
  - type: text
    content: ' four and twenty seats: and upon the seats I saw four and twenty elders sitting, clothed in white raiment; and they had on their heads crowns of gold. '
  '5':
  - type: text
    content: 'And out of the throne proceeded lightnings and thunderings and voices: and '
  - type: text
    content: there were
  - type: text
    content: ' seven lamps of fire burning before the throne, which are the seven Spirits of God. '
  '6':
  - type: text
    content: 'And before the throne '
  - type: text
    content: there was
  - type: text
    content: ' a sea of glass like unto crystal: and in the midst of the throne, and round about the throne, '
  - type: text
    content: were
  - type: text
    content: ' four beasts full of eyes before and behind. '
  '7':
  - type: text
    content: 'And the first beast '
  - type: text
    content: was
  - type: text
    content: ' like a lion, and the second beast like a calf, and the third beast had a face as a man, and the fourth beast '
  - type: text
    content: was
  - type: text
    content: ' like a flying eagle. '
  '8':
  - type: text
    content: 'And the four beasts had each of them six wings about '
  - type: text
    content: him
  - type: text
    content: '; and '
  - type: text
    content: they were
  - type: text
    content: ' full of eyes within: and they rest not day and night, saying, Holy, holy, holy, Lord God Almighty, which was, and is, and is to come. '
  '9':
  - type: text
    content: 'And when those beasts give glory and honour and thanks to him that sat on the throne, who liveth for ever and ever, '
