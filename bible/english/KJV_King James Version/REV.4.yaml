document_id: REV.4
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: A Vision of Heaven
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After this I looked, and, behold, a door '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' opened in heaven: and the first voice which I heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' as it were of a trumpet talking with me; which said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Come up hither, and I will shew thee things which must be hereafter.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And immediately I was in the spirit: and, behold, a throne was set in heaven, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' sat on the throne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And he that sat was to look upon like a jasper and a sardine stone: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' a rainbow round about the throne, in sight like unto an emerald. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And round about the throne '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' four and twenty seats: and upon the seats I saw four and twenty elders sitting, clothed in white raiment; and they had on their heads crowns of gold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And out of the throne proceeded lightnings and thunderings and voices: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there were
  - type: text
    text: ' seven lamps of fire burning before the throne, which are the seven Spirits of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And before the throne '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' a sea of glass like unto crystal: and in the midst of the throne, and round about the throne, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' four beasts full of eyes before and behind. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the first beast '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' like a lion, and the second beast like a calf, and the third beast had a face as a man, and the fourth beast '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' like a flying eagle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the four beasts had each of them six wings about '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: '; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they were
  - type: text
    text: ' full of eyes within: and they rest not day and night, saying, Holy, holy, holy, Lord God Almighty, which was, and is, and is to come. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And when those beasts give glory and honour and thanks to him that sat on the throne, who liveth for ever and ever, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'the four and twenty elders fall down before him that sat on the throne, and worship him that liveth for ever and ever, and cast their crowns before the throne, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Thou art worthy, O Lord, to receive glory and honour and power: for thou hast created all things, and for thy pleasure they are and were created.'
