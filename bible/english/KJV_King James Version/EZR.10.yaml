document_id: EZR.10,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when Ezra had prayed, and when he had confessed, weeping and casting himself down before the house of God, there assembled unto him out of Israel a very great congregation of men and women and children: for the people wept very sore. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Ezra the priest stood up, and said unto them, Ye have transgressed, and have taken strange wives, to increase the trespass of Israel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore make confession unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of your fathers, and do his pleasure: and separate yourselves from the people of the land, and from the strange wives. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all the congregation answered and said with a loud voice, As thou hast said, so must we do. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' many, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' a time of much rain, and we are not able to stand without, neither '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is this
    - type: text
      text: ' a work of one day or two: for we are many that have transgressed in this thing. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let now our rulers of all the congregation stand, and let all them which have taken strange wives in our cities come at appointed times, and with them the elders of every city, and the judges thereof, until the fierce wrath of our God for this matter be turned from us. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Only Jonathan the son of Asahel and Jahaziah the son of Tikvah were employed about this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'matter:'
    - type: text
      text: ' and Meshullam and Shabbethai the Levite helped them.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of the captivity did so. And Ezra the priest, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' certain chief of the fathers, after the house of their fathers, and all of them by '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' names, were separated, and sat down in the first day of the tenth month to examine the matter. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they made an end with all the men that had taken strange wives by the first day of the first month.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And among the sons of the priests there were found that had taken strange wives: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: namely
    - type: text
      text: ', of the sons of Jeshua the son of Jozadak, and his brethren; Maaseiah, and Eliezer, and Jarib, and Gedaliah. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they gave their hands that they would put away their wives; and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: being
    - type: text
      text: ' guilty, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they offered
    - type: text
      text: ' a ram of the flock for their trespass. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Shechaniah the son of Jehiel, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' of the sons of Elam, answered and said unto Ezra, We have trespassed against our God, and have taken strange wives of the people of the land: yet now there is hope in Israel concerning this thing. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And of the sons of Immer; Hanani, and Zebadiah. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And of the sons of Harim; Maaseiah, and Elijah, and Shemaiah, and Jehiel, and Uzziah. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And of the sons of Pashur; Elioenai, Maaseiah, Ishmael, Nethaneel, Jozabad, and Elasah.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also of the Levites; Jozabad, and Shimei, and Kelaiah, (the same '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Kelita,) Pethahiah, Judah, and Eliezer.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of the singers also; Eliashib: and of the porters; Shallum, and Telem, and Uri.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover of Israel: of the sons of Parosh; Ramiah, and Jeziah, and Malchiah, and Miamin, and Eleazar, and Malchijah, and Benaiah. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And of the sons of Elam; Mattaniah, Zechariah, and Jehiel, and Abdi, and Jeremoth, and Eliah. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And of the sons of Zattu; Elioenai, Eliashib, Mattaniah, and Jeremoth, and Zabad, and Aziza. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of the sons also of Bebai; Jehohanan, Hananiah, Zabbai, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' Athlai. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And of the sons of Bani; Meshullam, Malluch, and Adaiah, Jashub, and Sheal, and Ramoth. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore let us make a covenant with our God to put away all the wives, and such as are born of them, according to the counsel of my lord, and of those that tremble at the commandment of our God; and let it be done according to the law. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And of the sons of Pahath-moab; Adna, and Chelal, Benaiah, Maaseiah, Mattaniah, Bezaleel, and Binnui, and Manasseh. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' the sons of Harim; Eliezer, Ishijah, Malchiah, Shemaiah, Shimeon, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Benjamin, Malluch, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' Shemariah. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of the sons of Hashum; Mattenai, Mattathah, Zabad, Eliphelet, Jeremai, Manasseh, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' Shimei. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of the sons of Bani; Maadai, Amram, and Uel, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Benaiah, Bedeiah, Chelluh, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vaniah, Meremoth, Eliashib, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mattaniah, Mattenai, and Jaasau, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Bani, and Binnui, Shimei, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Shelemiah, and Nathan, and Adaiah, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Arise; for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ' matter '
    - type: usfm
      marker: add
      children:
      - type: text
        text: belongeth
    - type: text
      text: ' unto thee: we also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: will be
    - type: text
      text: ' with thee: be of good courage, and do '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: '. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Machnadebai, Shashai, Sharai, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Azareel, and Shelemiah, Shemariah, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shallum, Amariah, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' Joseph. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of the sons of Nebo; Jeiel, Mattithiah, Zabad, Zebina, Jadau, and Joel, Benaiah. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All these had taken strange wives: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: some
    - type: text
      text: ' of them had wives by whom they had children.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then arose Ezra, and made the chief priests, the Levites, and all Israel, to swear that they should do according to this word. And they sware.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: A Great Assembly
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Ezra rose up from before the house of God, and went into the chamber of Johanan the son of Eliashib: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: when
    - type: text
      text: ' he came thither, he did eat no bread, nor drink water: for he mourned because of the transgression of them that had been carried away. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they made proclamation throughout Judah and Jerusalem unto all the children of the captivity, that they should gather themselves together unto Jerusalem; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and that whosoever would not come within three days, according to the counsel of the princes and the elders, all his substance should be forfeited, and himself separated from the congregation of those that had been carried away.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all the men of Judah and Benjamin gathered themselves together unto Jerusalem within three days. It '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the ninth month, on the twentieth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the month; and all the people sat in the street of the house of God, trembling because of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ' matter, and for the great rain. '
