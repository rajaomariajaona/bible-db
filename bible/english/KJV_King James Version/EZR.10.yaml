verses:
  '1':
  - type: text
    content: 'Now when Ezra had prayed, and when he had confessed, weeping and casting himself down before the house of God, there assembled unto him out of Israel a very great congregation of men and women and children: for the people wept very sore. '
  '10':
  - type: text
    content: 'And Ezra the priest stood up, and said unto them, Ye have transgressed, and have taken strange wives, to increase the trespass of Israel. '
  '11':
  - type: text
    content: 'Now therefore make confession unto the '
  - type: text
    content: LORD
  - type: text
    content: ' God of your fathers, and do his pleasure: and separate yourselves from the people of the land, and from the strange wives. '
  '12':
  - type: text
    content: 'Then all the congregation answered and said with a loud voice, As thou hast said, so must we do. '
  '13':
  - type: text
    content: 'But the people '
  - type: text
    content: are
  - type: text
    content: ' many, and '
  - type: text
    content: it is
  - type: text
    content: ' a time of much rain, and we are not able to stand without, neither '
  - type: text
    content: is this
  - type: text
    content: ' a work of one day or two: for we are many that have transgressed in this thing. '
  '14':
  - type: text
    content: 'Let now our rulers of all the congregation stand, and let all them which have taken strange wives in our cities come at appointed times, and with them the elders of every city, and the judges thereof, until the fierce wrath of our God for this matter be turned from us. '
  '15':
  - type: text
    content: 'Only Jonathan the son of Asahel and Jahaziah the son of Tikvah were employed about this '
  - type: text
    content: 'matter:'
  - type: text
    content: ' and Meshullam and Shabbethai the Levite helped them.'
  '16':
  - type: text
    content: 'And the children of the captivity did so. And Ezra the priest, '
  - type: text
    content: with
  - type: text
    content: ' certain chief of the fathers, after the house of their fathers, and all of them by '
  - type: text
    content: their
  - type: text
    content: ' names, were separated, and sat down in the first day of the tenth month to examine the matter. '
  '17':
  - type: text
    content: And they made an end with all the men that had taken strange wives by the first day of the first month.
  '18':
  - type: text
    content: 'And among the sons of the priests there were found that had taken strange wives: '
  - type: text
    content: namely
  - type: text
    content: ', of the sons of Jeshua the son of Jozadak, and his brethren; Maaseiah, and Eliezer, and Jarib, and Gedaliah. '
  '19':
  - type: text
    content: 'And they gave their hands that they would put away their wives; and '
  - type: text
    content: being
  - type: text
    content: ' guilty, '
  - type: text
    content: they offered
  - type: text
    content: ' a ram of the flock for their trespass. '
  '2':
  - type: text
    content: 'And Shechaniah the son of Jehiel, '
  - type: text
    content: one
  - type: text
    content: ' of the sons of Elam, answered and said unto Ezra, We have trespassed against our God, and have taken strange wives of the people of the land: yet now there is hope in Israel concerning this thing. '
  '20':
  - type: text
    content: 'And of the sons of Immer; Hanani, and Zebadiah. '
  '21':
  - type: text
    content: 'And of the sons of Harim; Maaseiah, and Elijah, and Shemaiah, and Jehiel, and Uzziah. '
  '22':
  - type: text
    content: And of the sons of Pashur; Elioenai, Maaseiah, Ishmael, Nethaneel, Jozabad, and Elasah.
  '23':
  - type: text
    content: 'Also of the Levites; Jozabad, and Shimei, and Kelaiah, (the same '
  - type: text
    content: is
  - type: text
    content: ' Kelita,) Pethahiah, Judah, and Eliezer.'
  '24':
  - type: text
    content: 'Of the singers also; Eliashib: and of the porters; Shallum, and Telem, and Uri.'
  '25':
  - type: text
    content: 'Moreover of Israel: of the sons of Parosh; Ramiah, and Jeziah, and Malchiah, and Miamin, and Eleazar, and Malchijah, and Benaiah. '
  '26':
  - type: text
    content: 'And of the sons of Elam; Mattaniah, Zechariah, and Jehiel, and Abdi, and Jeremoth, and Eliah. '
  '27':
  - type: text
    content: 'And of the sons of Zattu; Elioenai, Eliashib, Mattaniah, and Jeremoth, and Zabad, and Aziza. '
  '28':
  - type: text
    content: 'Of the sons also of Bebai; Jehohanan, Hananiah, Zabbai, '
  - type: text
    content: and
  - type: text
    content: ' Athlai. '
  '29':
  - type: text
    content: 'And of the sons of Bani; Meshullam, Malluch, and Adaiah, Jashub, and Sheal, and Ramoth. '
  '3':
  - type: text
    content: 'Now therefore let us make a covenant with our God to put away all the wives, and such as are born of them, according to the counsel of my lord, and of those that tremble at the commandment of our God; and let it be done according to the law. '
  '30':
  - type: text
    content: 'And of the sons of Pahath-moab; Adna, and Chelal, Benaiah, Maaseiah, Mattaniah, Bezaleel, and Binnui, and Manasseh. '
  '31':
  - type: text
    content: 'And '
  - type: text
    content: of
  - type: text
    content: ' the sons of Harim; Eliezer, Ishijah, Malchiah, Shemaiah, Shimeon, '
  '32':
  - type: text
    content: 'Benjamin, Malluch, '
  - type: text
    content: and
  - type: text
    content: ' Shemariah. '
  '33':
  - type: text
    content: 'Of the sons of Hashum; Mattenai, Mattathah, Zabad, Eliphelet, Jeremai, Manasseh, '
  - type: text
    content: and
  - type: text
    content: ' Shimei. '
  '34':
  - type: text
    content: 'Of the sons of Bani; Maadai, Amram, and Uel, '
  '35':
  - type: text
    content: 'Benaiah, Bedeiah, Chelluh, '
  '36':
  - type: text
    content: 'Vaniah, Meremoth, Eliashib, '
  '37':
  - type: text
    content: 'Mattaniah, Mattenai, and Jaasau, '
  '38':
  - type: text
    content: 'and Bani, and Binnui, Shimei, '
  '39':
  - type: text
    content: 'and Shelemiah, and Nathan, and Adaiah, '
  '4':
  - type: text
    content: 'Arise; for '
  - type: text
    content: this
  - type: text
    content: ' matter '
  - type: text
    content: belongeth
  - type: text
    content: ' unto thee: we also '
  - type: text
    content: will be
  - type: text
    content: ' with thee: be of good courage, and do '
  - type: text
    content: it
  - type: text
    content: '. '
  '40':
  - type: text
    content: 'Machnadebai, Shashai, Sharai, '
  '41':
  - type: text
    content: 'Azareel, and Shelemiah, Shemariah, '
  '42':
  - type: text
    content: 'Shallum, Amariah, '
  - type: text
    content: and
  - type: text
    content: ' Joseph. '
  '43':
  - type: text
    content: 'Of the sons of Nebo; Jeiel, Mattithiah, Zabad, Zebina, Jadau, and Joel, Benaiah. '
  '44':
  - type: text
    content: 'All these had taken strange wives: and '
  - type: text
    content: some
  - type: text
    content: ' of them had wives by whom they had children.'
  '5':
  - type: text
    content: Then arose Ezra, and made the chief priests, the Levites, and all Israel, to swear that they should do according to this word. And they sware.
  - type: heading
    content: A Great Assembly
  '6':
  - type: text
    content: 'Then Ezra rose up from before the house of God, and went into the chamber of Johanan the son of Eliashib: and '
  - type: text
    content: when
  - type: text
    content: ' he came thither, he did eat no bread, nor drink water: for he mourned because of the transgression of them that had been carried away. '
  '7':
  - type: text
    content: 'And they made proclamation throughout Judah and Jerusalem unto all the children of the captivity, that they should gather themselves together unto Jerusalem; '
  '8':
  - type: text
    content: and that whosoever would not come within three days, according to the counsel of the princes and the elders, all his substance should be forfeited, and himself separated from the congregation of those that had been carried away.
  '9':
  - type: text
    content: 'Then all the men of Judah and Benjamin gathered themselves together unto Jerusalem within three days. It '
  - type: text
    content: was
  - type: text
    content: ' the ninth month, on the twentieth '
  - type: text
    content: day
  - type: text
    content: ' of the month; and all the people sat in the street of the house of God, trembling because of '
  - type: text
    content: this
  - type: text
    content: ' matter, and for the great rain. '
