document_id: LUK.14,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Round a Pharisee's Table
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, as he went into the house of one of the chief Pharisees to eat bread on the sabbath day, that they watched him. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But when thou art bidden, go and sit down in the lowest room; that when he that bade thee cometh, he may say unto thee, Friend, go up higher: then shalt thou have worship in the presence of them that sit at meat with thee.'
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For whosoever exalteth himself shall be abased; and he that humbleth himself shall be exalted.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said he also to him that bade him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'When thou makest a dinner or a supper, call not thy friends, nor thy brethren, neither thy kinsmen, nor '
      - type: usfm
        marker: add
        children:
        - type: text
          text: thy
      - type: text
        text: ' rich neighbours; lest they also bid thee again, and a recompence be made thee.'
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But when thou makest a feast, call the poor, the maimed, the lame, the blind:'
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and thou shalt be blessed; for they cannot recompense thee: for thou shalt be recompensed at the resurrection of the just.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when one of them that sat at meat with him heard these things, he said unto him, Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' he that shall eat bread in the kingdom of God. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said he unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'A certain man made a great supper, and bade many:'
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and sent his servant at supper time to say to them that were bidden, Come; for all things are now ready.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And they all with one '
      - type: usfm
        marker: add
        children:
        - type: text
          text: consent
      - type: text
        text: ' began to make excuse. The first said unto him, I have bought a piece of ground, and I must needs go and see it: I pray thee have me excused.'
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And another said, I have bought five yoke of oxen, and I go to prove them: I pray thee have me excused.'
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And, behold, there was a certain man before him which had the dropsy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And another said, I have married a wife, and therefore I cannot come.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So that servant came, and shewed his lord these things. Then the master of the house being angry said to his servant, Go out quickly into the streets and lanes of the city, and bring in hither the poor, and the maimed, and the halt, and the blind.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And the servant said, Lord, it is done as thou hast commanded, and yet there is room.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And the lord said unto the servant, Go out into the highways and hedges, and compel '
      - type: usfm
        marker: add
        children:
        - type: text
          text: them
      - type: text
        text: ' to come in, that my house may be filled.'
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For I say unto you, That none of those men which were bidden shall taste of my supper.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: To a Wayside Crowd
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there went great multitudes with him: and he turned, and said unto them, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'If any '
      - type: usfm
        marker: add
        children:
        - type: text
          text: man
      - type: text
        text: ' come to me, and hate not his father, and mother, and wife, and children, and brethren, and sisters, yea, and his own life also, he cannot be my disciple.'
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And whosoever doth not bear his cross, and come after me, cannot be my disciple.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For which of you, intending to build a tower, sitteth not down first, and counteth the cost, whether he have '
      - type: usfm
        marker: add
        children:
        - type: text
          text: sufficient
      - type: text
        text: ' to finish '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: '?'
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Lest haply, after he hath laid the foundation, and is not able to finish '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ', all that behold '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ' begin to mock him,'
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus answering spake unto the lawyers and Pharisees, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Is it lawful to heal on the sabbath day?
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: saying, This man began to build, and was not able to finish.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Or what king, going to make war against another king, sitteth not down first, and consulteth whether he be able with ten thousand to meet him that cometh against him with twenty thousand?
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Or else, while the other is yet a great way off, he sendeth an ambassage, and desireth conditions of peace
    - type: text
      text: '. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So likewise, whosoever he be of you that forsaketh not all that he hath, he cannot be my disciple.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Salt '
      - type: usfm
        marker: add
        children:
        - type: text
          text: is
      - type: text
        text: ' good: but if the salt have lost his savour, wherewith shall it be seasoned?'
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'It is neither fit for the land, nor yet for the dunghill; '
      - type: usfm
        marker: add
        children:
        - type: text
          text: but
      - type: text
        text: ' men cast it out. He that hath ears to hear, let him hear.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they held their peace. And he took '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', and healed him, and let him go; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and answered them, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Which of you shall have an ass or an ox fallen into a pit, and will not straightway pull him out on the sabbath day?
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they could not answer him again to these things.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he put forth a parable to those which were bidden, when he marked how they chose out the chief rooms; saying unto them, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'When thou art bidden of any '
      - type: usfm
        marker: add
        children:
        - type: text
          text: man
      - type: text
        text: ' to a wedding, sit not down in the highest room; lest a more honourable man than thou be bidden of him;'
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and he that bade thee and him come and say to thee, Give this man place; and thou begin with shame to take the lowest room.
    - type: text
      text: ' '
