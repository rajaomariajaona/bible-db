document_id: LUK.14,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Round a Pharisee's Table
  - type: text
    content: 'And it came to pass, as he went into the house of one of the chief Pharisees to eat bread on the sabbath day, that they watched him. '
  '10':
  - type: text
    content: 'But when thou art bidden, go and sit down in the lowest room; that when he that bade thee cometh, he may say unto thee, Friend, go up higher: then shalt thou have worship in the presence of them that sit at meat with thee.'
  - type: text
    content: ' '
  '11':
  - type: text
    content: For whosoever exalteth himself shall be abased; and he that humbleth himself shall be exalted.
  '12':
  - type: text
    content: 'Then said he also to him that bade him, '
  - type: text
    content: 'When thou makest a dinner or a supper, call not thy friends, nor thy brethren, neither thy kinsmen, nor '
  - type: text
    content: thy
  - type: text
    content: ' rich neighbours; lest they also bid thee again, and a recompence be made thee.'
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'But when thou makest a feast, call the poor, the maimed, the lame, the blind:'
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'and thou shalt be blessed; for they cannot recompense thee: for thou shalt be recompensed at the resurrection of the just.'
  '15':
  - type: text
    content: 'And when one of them that sat at meat with him heard these things, he said unto him, Blessed '
  - type: text
    content: is
  - type: text
    content: ' he that shall eat bread in the kingdom of God. '
  '16':
  - type: text
    content: 'Then said he unto him, '
  - type: text
    content: 'A certain man made a great supper, and bade many:'
  - type: text
    content: ' '
  '17':
  - type: text
    content: and sent his servant at supper time to say to them that were bidden, Come; for all things are now ready.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'And they all with one '
  - type: text
    content: consent
  - type: text
    content: ' began to make excuse. The first said unto him, I have bought a piece of ground, and I must needs go and see it: I pray thee have me excused.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'And another said, I have bought five yoke of oxen, and I go to prove them: I pray thee have me excused.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And, behold, there was a certain man before him which had the dropsy. '
  '20':
  - type: text
    content: And another said, I have married a wife, and therefore I cannot come.
  - type: text
    content: ' '
  '21':
  - type: text
    content: So that servant came, and shewed his lord these things. Then the master of the house being angry said to his servant, Go out quickly into the streets and lanes of the city, and bring in hither the poor, and the maimed, and the halt, and the blind.
  - type: text
    content: ' '
  '22':
  - type: text
    content: And the servant said, Lord, it is done as thou hast commanded, and yet there is room.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'And the lord said unto the servant, Go out into the highways and hedges, and compel '
  - type: text
    content: them
  - type: text
    content: ' to come in, that my house may be filled.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: For I say unto you, That none of those men which were bidden shall taste of my supper.
  - type: heading
    content: To a Wayside Crowd
  '25':
  - type: text
    content: 'And there went great multitudes with him: and he turned, and said unto them, '
  '26':
  - type: text
    content: 'If any '
  - type: text
    content: man
  - type: text
    content: ' come to me, and hate not his father, and mother, and wife, and children, and brethren, and sisters, yea, and his own life also, he cannot be my disciple.'
  - type: text
    content: ' '
  '27':
  - type: text
    content: And whosoever doth not bear his cross, and come after me, cannot be my disciple.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'For which of you, intending to build a tower, sitteth not down first, and counteth the cost, whether he have '
  - type: text
    content: sufficient
  - type: text
    content: ' to finish '
  - type: text
    content: it
  - type: text
    content: '?'
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Lest haply, after he hath laid the foundation, and is not able to finish '
  - type: text
    content: it
  - type: text
    content: ', all that behold '
  - type: text
    content: it
  - type: text
    content: ' begin to mock him,'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'And Jesus answering spake unto the lawyers and Pharisees, saying, '
  - type: text
    content: Is it lawful to heal on the sabbath day?
  - type: text
    content: ' '
  '30':
  - type: text
    content: saying, This man began to build, and was not able to finish.
  - type: text
    content: ' '
  '31':
  - type: text
    content: Or what king, going to make war against another king, sitteth not down first, and consulteth whether he be able with ten thousand to meet him that cometh against him with twenty thousand?
  - type: text
    content: ' '
  '32':
  - type: text
    content: Or else, while the other is yet a great way off, he sendeth an ambassage, and desireth conditions of peace
  - type: text
    content: '. '
  '33':
  - type: text
    content: So likewise, whosoever he be of you that forsaketh not all that he hath, he cannot be my disciple.
  '34':
  - type: text
    content: ' '
  - type: text
    content: 'Salt '
  - type: text
    content: is
  - type: text
    content: ' good: but if the salt have lost his savour, wherewith shall it be seasoned?'
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'It is neither fit for the land, nor yet for the dunghill; '
  - type: text
    content: but
  - type: text
    content: ' men cast it out. He that hath ears to hear, let him hear.'
  '4':
  - type: text
    content: 'And they held their peace. And he took '
  - type: text
    content: him
  - type: text
    content: ', and healed him, and let him go; '
  '5':
  - type: text
    content: 'and answered them, saying, '
  - type: text
    content: Which of you shall have an ass or an ox fallen into a pit, and will not straightway pull him out on the sabbath day?
  - type: text
    content: ' '
  '6':
  - type: text
    content: And they could not answer him again to these things.
  '7':
  - type: text
    content: 'And he put forth a parable to those which were bidden, when he marked how they chose out the chief rooms; saying unto them, '
  '8':
  - type: text
    content: 'When thou art bidden of any '
  - type: text
    content: man
  - type: text
    content: ' to a wedding, sit not down in the highest room; lest a more honourable man than thou be bidden of him;'
  - type: text
    content: ' '
  '9':
  - type: text
    content: and he that bade thee and him come and say to thee, Give this man place; and thou begin with shame to take the lowest room.
  - type: text
    content: ' '
