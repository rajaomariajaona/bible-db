document_id: GEN.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And God blessed Noah and his sons, and said unto them, Be fruitful, and multiply, and replenish the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the fear of you and the dread of you shall be upon every beast of the earth, and upon every fowl of the air, upon all that moveth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: upon
  - type: text
    text: ' the earth, and upon all the fishes of the sea; into your hand are they delivered. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Every moving thing that liveth shall be meat for you; even as the green herb have I given you all things. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But flesh with the life thereof, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which is
  - type: text
    text: ' the blood thereof, shall ye not eat. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And surely your blood of your lives will I require; at the hand of every beast will I require it, and at the hand of man; at the hand of every man''s brother will I require the life of man. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Whoso sheddeth man''s blood, by man shall his blood be shed: for in the image of God made he man. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And you, be ye fruitful, and multiply; bring forth abundantly in the earth, and multiply therein.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Rainbow
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And God spake unto Noah, and to his sons with him, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And I, behold, I establish my covenant with you, and with your seed after you; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and with every living creature that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with you, of the fowl, of the cattle, and of every beast of the earth with you; from all that go out of the ark, to every beast of the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And I will establish my covenant with you; neither shall all flesh be cut off any more by the waters of a flood; neither shall there any more be a flood to destroy the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And God said, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the token of the covenant which I make between me and you and every living creature that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with you, for perpetual generations: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I do set my bow in the cloud, and it shall be for a token of a covenant between me and the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And it shall come to pass, when I bring a cloud over the earth, that the bow shall be seen in the cloud: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and I will remember my covenant, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' between me and you and every living creature of all flesh; and the waters shall no more become a flood to destroy all flesh. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the bow shall be in the cloud; and I will look upon it, that I may remember the everlasting covenant between God and every living creature of all flesh that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And God said unto Noah, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the token of the covenant, which I have established between me and all flesh that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And the sons of Noah, that went forth of the ark, were Shem, and Ham, and Japheth: and Ham '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the father of Canaan. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the three sons of Noah: and of them was the whole earth overspread.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Noah began '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' an husbandman, and he planted a vineyard: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'and he drank of the wine, and was drunken; and he was uncovered within his tent. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And Ham, the father of Canaan, saw the nakedness of his father, and told his two brethren without. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And Shem and Japheth took a garment, and laid '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon both their shoulders, and went backward, and covered the nakedness of their father; and their faces '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' backward, and they saw not their father''s nakedness. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And Noah awoke from his wine, and knew what his younger son had done unto him. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: And he said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Cursed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' Canaan;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A servant of servants shall he be unto his brethren.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: And he said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Shem;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Canaan shall be his servant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: God shall enlarge Japheth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he shall dwell in the tents of Shem;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Canaan shall be his servant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And Noah lived after the flood three hundred and fifty years. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And all the days of Noah were nine hundred and fifty years: and he died.'
