document_id: ISA.60,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The New Jerusalem
  - type: text
    content: 'Arise, shine; for thy light is come, and the glory of the '
  - type: text
    content: LORD
  - type: text
    content: ' is risen upon thee. '
  '10':
  - type: text
    content: 'And the sons of strangers shall build up thy walls, and their kings shall minister unto thee: for in my wrath I smote thee, but in my favour have I had mercy on thee. '
  '11':
  - type: text
    content: 'Therefore thy gates shall be open continually; they shall not be shut day nor night; that '
  - type: text
    content: men
  - type: text
    content: ' may bring unto thee the forces of the Gentiles, and '
  - type: text
    content: that
  - type: text
    content: ' their kings '
  - type: text
    content: may be
  - type: text
    content: ' brought. '
  '12':
  - type: text
    content: 'For the nation and kingdom that will not serve thee shall perish; yea, '
  - type: text
    content: those
  - type: text
    content: ' nations shall be utterly wasted. '
  '13':
  - type: text
    content: 'The glory of Lebanon shall come unto thee, the fir tree, the pine tree, and the box together, to beautify the place of my sanctuary; and I will make the place of my feet glorious. '
  '14':
  - type: text
    content: 'The sons also of them that afflicted thee shall come bending unto thee; and all they that despised thee shall bow themselves down at the soles of thy feet; and they shall call thee, The city of the '
  - type: text
    content: LORD
  - type: text
    content: ', The Zion of the Holy One of Israel.'
  '15':
  - type: text
    content: 'Whereas thou hast been forsaken and hated, so that no man went through '
  - type: text
    content: thee
  - type: text
    content: ', I will make thee an eternal excellency, a joy of many generations. '
  '16':
  - type: text
    content: 'Thou shalt also suck the milk of the Gentiles, and shalt suck the breast of kings: and thou shalt know that I the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: am
  - type: text
    content: ' thy Saviour and thy Redeemer, the mighty One of Jacob. '
  '17':
  - type: text
    content: 'For brass I will bring gold, and for iron I will bring silver, and for wood brass, and for stones iron: I will also make thy officers peace, and thine exactors righteousness. '
  '18':
  - type: text
    content: Violence shall no more be heard in thy land, wasting nor destruction within thy borders; but thou shalt call thy walls Salvation, and thy gates Praise.
  '19':
  - type: text
    content: 'The sun shall be no more thy light by day; neither for brightness shall the moon give light unto thee: but the '
  - type: text
    content: LORD
  - type: text
    content: ' shall be unto thee an everlasting light, and thy God thy glory. '
  '2':
  - type: text
    content: 'For, behold, the darkness shall cover the earth, and gross darkness the people: but the '
  - type: text
    content: LORD
  - type: text
    content: ' shall arise upon thee, and his glory shall be seen upon thee. '
  '20':
  - type: text
    content: 'Thy sun shall no more go down; neither shall thy moon withdraw itself: for the '
  - type: text
    content: LORD
  - type: text
    content: ' shall be thine everlasting light, and the days of thy mourning shall be ended. '
  '21':
  - type: text
    content: 'Thy people also '
  - type: text
    content: shall be
  - type: text
    content: ' all righteous: they shall inherit the land for ever, the branch of my planting, the work of my hands, that I may be glorified. '
  '22':
  - type: text
    content: 'A little one shall become a thousand, and a small one a strong nation: I the '
  - type: text
    content: LORD
  - type: text
    content: ' will hasten it in his time.'
  '3':
  - type: text
    content: And the Gentiles shall come to thy light, and kings to the brightness of thy rising.
  '4':
  - type: text
    content: 'Lift up thine eyes round about, and see: all they gather themselves together, they come to thee: thy sons shall come from far, and thy daughters shall be nursed at '
  - type: text
    content: thy
  - type: text
    content: ' side. '
  '5':
  - type: text
    content: 'Then thou shalt see, and flow together, and thine heart shall fear, and be enlarged; because the abundance of the sea shall be converted unto thee, the forces of the Gentiles shall come unto thee. '
  '6':
  - type: text
    content: 'The multitude of camels shall cover thee, the dromedaries of Midian and Ephah; all they from Sheba shall come: they shall bring gold and incense; and they shall shew forth the praises of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'All the flocks of Kedar shall be gathered together unto thee, the rams of Nebaioth shall minister unto thee: they shall come up with acceptance on mine altar, and I will glorify the house of my glory. '
  '8':
  - type: text
    content: 'Who '
  - type: text
    content: are
  - type: text
    content: ' these '
  - type: text
    content: that
  - type: text
    content: ' fly as a cloud, and as the doves to their windows? '
  '9':
  - type: text
    content: 'Surely the isles shall wait for me, and the ships of Tarshish first, to bring thy sons from far, their silver and their gold with them, unto the name of the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God, and to the Holy One of Israel, because he hath glorified thee.'
