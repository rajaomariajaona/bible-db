document_id: JER.15,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' unto me, Though Moses and Samuel stood before me, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yet
    - type: text
      text: ' my mind '
    - type: usfm
      marker: add
      children:
      - type: text
        text: could
    - type: text
      text: ' not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' toward this people: cast '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' out of my sight, and let them go forth. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Woe is me, my mother, that thou hast borne me a man of strife and a man of contention to the whole earth! I have neither lent on usury, nor men have lent to me on usury; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yet
    - type: text
      text: ' every one of them doth curse me. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said, Verily it shall be well with thy remnant; verily I will cause the enemy to entreat thee '
    - type: usfm
      marker: add
      children:
      - type: text
        text: well
    - type: text
      text: ' in the time of evil and in the time of affliction. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shall iron break the northern iron and the steel? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thy substance and thy treasures will I give to the spoil without price, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' for all thy sins, even in all thy borders. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will make '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thee
    - type: text
      text: ' to pass with thine enemies into a land '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' thou knowest not: for a fire is kindled in mine anger, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' shall burn upon you.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', thou knowest: remember me, and visit me, and revenge me of my persecutors; take me not away in thy longsuffering: know that for thy sake I have suffered rebuke. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thy words were found, and I did eat them; and thy word was unto me the joy and rejoicing of mine heart: for I am called by thy name, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of hosts. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I sat not in the assembly of the mockers, nor rejoiced; I sat alone because of thy hand: for thou hast filled me with indignation. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Why is my pain perpetual, and my wound incurable, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' refuseth to be healed? wilt thou be altogether unto me as a liar, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and as
    - type: text
      text: ' waters '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' fail?'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', If thou return, then will I bring thee again, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' thou shalt stand before me: and if thou take forth the precious from the vile, thou shalt be as my mouth: let them return unto thee; but return not thou unto them. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass, if they say unto thee, Whither shall we go forth? then thou shalt tell them, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; Such as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' for death, to death; and such as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' for the sword, to the sword; and such as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' for the famine, to the famine; and such as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' for the captivity, to the captivity. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will make thee unto this people a fenced brasen wall: and they shall fight against thee, but they shall not prevail against thee: for I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' with thee to save thee and to deliver thee, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I will deliver thee out of the hand of the wicked, and I will redeem thee out of the hand of the terrible.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will appoint over them four kinds, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': the sword to slay, and the dogs to tear, and the fowls of the heaven, and the beasts of the earth, to devour and destroy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will cause them to be removed into all kingdoms of the earth, because of Manasseh the son of Hezekiah king of Judah, for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' which he did in Jerusalem.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For who shall have pity upon thee, O Jerusalem? or who shall bemoan thee? or who shall go aside to ask how thou doest? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou hast forsaken me, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', thou art gone backward: therefore will I stretch out my hand against thee, and destroy thee; I am weary with repenting. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will fan them with a fan in the gates of the land; I will bereave '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' of children, I will destroy my people, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: since
    - type: text
      text: ' they return not from their ways. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Their widows are increased to me above the sand of the seas: I have brought upon them against the mother of the young men a spoiler at noonday: I have caused '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' to fall upon it suddenly, and terrors upon the city. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She that hath borne seven languisheth: she hath given up the ghost; her sun is gone down while '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' yet day: she hath been ashamed and confounded: and the residue of them will I deliver to the sword before their enemies, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Prophet's Lament
    marker-yv: yv-h
