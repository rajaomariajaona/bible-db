document_id: JOB.35,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Elihu spake moreover, and said,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'But none saith, Where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' God my maker,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who giveth songs in the night;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Who teacheth us more than the beasts of the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And maketh us wiser than the fowls of heaven?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: There they cry, but none giveth answer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because of the pride of evil men.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Surely God will not hear vanity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Neither will the Almighty regard it.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Although thou sayest thou shalt not see him,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Yet
    - type: text
      text: ' judgment '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' before him; therefore trust thou in him.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But now, because '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ', he hath visited in his anger;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yet he knoweth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' not in great extremity:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Therefore doth Job open his mouth in vain;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He multiplieth words without knowledge.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Thinkest thou this to be right,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: That
    - type: text
      text: ' thou saidst, My righteousness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' more than God''s?'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For thou saidst, What advantage will it be unto thee?
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ', What profit shall I have, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: if I be cleansed
    - type: text
      text: ' from my sin?'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: I will answer thee,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thy companions with thee.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Look unto the heavens, and see;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And behold the clouds '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' are higher than thou.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: If thou sinnest, what doest thou against him?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Or '
    - type: usfm
      marker: add
      children:
      - type: text
        text: if
    - type: text
      text: ' thy transgressions be multiplied, what doest thou unto him?'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: If thou be righteous, what givest thou him?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or what receiveth he of thine hand?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Thy wickedness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: may hurt
    - type: text
      text: ' a man as thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And thy righteousness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: may profit
    - type: text
      text: ' the son of man.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'By reason of the multitude of oppressions they make '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the oppressed
    - type: text
      text: ' to cry:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They cry out by reason of the arm of the mighty.
