document_id: ISA.23,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The burden of Tyre.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Howl, ye ships of Tarshish; for it is laid waste, so that there is no house, no entering in: from the land of Chittim it is revealed to them. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pass through thy land as a river, O daughter of Tarshish: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no more strength. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He stretched out his hand over the sea, he shook the kingdoms: the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath given a commandment against the merchant '
    - type: usfm
      marker: add
      children:
      - type: text
        text: city
    - type: text
      text: ', to destroy the strong holds thereof. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, Thou shalt no more rejoice, O thou oppressed virgin, daughter of Zidon: arise, pass over to Chittim; there also shalt thou have no rest. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold the land of the Chaldeans; this people was not, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: till
    - type: text
      text: ' the Assyrian founded it for them that dwell in the wilderness: they set up the towers thereof, they raised up the palaces thereof; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' he brought it to ruin. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Howl, ye ships of Tarshish: for your strength is laid waste.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass in that day, that Tyre shall be forgotten seventy years, according to the days of one king: after the end of seventy years shall Tyre sing as an harlot. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Take an harp, go about the city, thou harlot that hast been forgotten; make sweet melody, sing many songs, that thou mayest be remembered.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass after the end of seventy years, that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will visit Tyre, and she shall turn to her hire, and shall commit fornication with all the kingdoms of the world upon the face of the earth. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And her merchandise and her hire shall be holiness to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': it shall not be treasured nor laid up; for her merchandise shall be for them that dwell before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', to eat sufficiently, and for durable clothing.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be still, ye inhabitants of the isle; thou whom the merchants of Zidon, that pass over the sea, have replenished. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And by great waters the seed of Sihor, the harvest of the river, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' her revenue; and she is a mart of nations. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be thou ashamed, O Zidon: for the sea hath spoken, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the strength of the sea, saying, I travail not, nor bring forth children, neither do I nourish up young men, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: nor
    - type: text
      text: ' bring up virgins. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As at the report concerning Egypt, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' shall they be sorely pained at the report of Tyre. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pass ye over to Tarshish; howl, ye inhabitants of the isle. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' this your joyous '
    - type: usfm
      marker: add
      children:
      - type: text
        text: city
    - type: text
      text: ', whose antiquity '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' of ancient days? her own feet shall carry her afar off to sojourn.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who hath taken this counsel against Tyre, the crowning '
    - type: usfm
      marker: add
      children:
      - type: text
        text: city
    - type: text
      text: ', whose merchants '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' princes, whose traffickers '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the honourable of the earth? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts hath purposed it, to stain the pride of all glory, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' to bring into contempt all the honourable of the earth.'
