document_id: ISA.23,1
type_code: eng
verses:
  '1':
  - type: text
    content: The burden of Tyre.
  - type: text
    content: 'Howl, ye ships of Tarshish; for it is laid waste, so that there is no house, no entering in: from the land of Chittim it is revealed to them. '
  '10':
  - type: text
    content: 'Pass through thy land as a river, O daughter of Tarshish: '
  - type: text
    content: there is
  - type: text
    content: ' no more strength. '
  '11':
  - type: text
    content: 'He stretched out his hand over the sea, he shook the kingdoms: the '
  - type: text
    content: LORD
  - type: text
    content: ' hath given a commandment against the merchant '
  - type: text
    content: city
  - type: text
    content: ', to destroy the strong holds thereof. '
  '12':
  - type: text
    content: 'And he said, Thou shalt no more rejoice, O thou oppressed virgin, daughter of Zidon: arise, pass over to Chittim; there also shalt thou have no rest. '
  '13':
  - type: text
    content: 'Behold the land of the Chaldeans; this people was not, '
  - type: text
    content: till
  - type: text
    content: ' the Assyrian founded it for them that dwell in the wilderness: they set up the towers thereof, they raised up the palaces thereof; '
  - type: text
    content: and
  - type: text
    content: ' he brought it to ruin. '
  '14':
  - type: text
    content: 'Howl, ye ships of Tarshish: for your strength is laid waste.'
  '15':
  - type: text
    content: 'And it shall come to pass in that day, that Tyre shall be forgotten seventy years, according to the days of one king: after the end of seventy years shall Tyre sing as an harlot. '
  '16':
  - type: text
    content: Take an harp, go about the city, thou harlot that hast been forgotten; make sweet melody, sing many songs, that thou mayest be remembered.
  '17':
  - type: text
    content: 'And it shall come to pass after the end of seventy years, that the '
  - type: text
    content: LORD
  - type: text
    content: ' will visit Tyre, and she shall turn to her hire, and shall commit fornication with all the kingdoms of the world upon the face of the earth. '
  '18':
  - type: text
    content: 'And her merchandise and her hire shall be holiness to the '
  - type: text
    content: LORD
  - type: text
    content: ': it shall not be treasured nor laid up; for her merchandise shall be for them that dwell before the '
  - type: text
    content: LORD
  - type: text
    content: ', to eat sufficiently, and for durable clothing.'
  '2':
  - type: text
    content: 'Be still, ye inhabitants of the isle; thou whom the merchants of Zidon, that pass over the sea, have replenished. '
  '3':
  - type: text
    content: 'And by great waters the seed of Sihor, the harvest of the river, '
  - type: text
    content: is
  - type: text
    content: ' her revenue; and she is a mart of nations. '
  '4':
  - type: text
    content: 'Be thou ashamed, O Zidon: for the sea hath spoken, '
  - type: text
    content: even
  - type: text
    content: ' the strength of the sea, saying, I travail not, nor bring forth children, neither do I nourish up young men, '
  - type: text
    content: nor
  - type: text
    content: ' bring up virgins. '
  '5':
  - type: text
    content: 'As at the report concerning Egypt, '
  - type: text
    content: so
  - type: text
    content: ' shall they be sorely pained at the report of Tyre. '
  '6':
  - type: text
    content: 'Pass ye over to Tarshish; howl, ye inhabitants of the isle. '
  '7':
  - type: text
    content: Is
  - type: text
    content: ' this your joyous '
  - type: text
    content: city
  - type: text
    content: ', whose antiquity '
  - type: text
    content: is
  - type: text
    content: ' of ancient days? her own feet shall carry her afar off to sojourn.'
  '8':
  - type: text
    content: 'Who hath taken this counsel against Tyre, the crowning '
  - type: text
    content: city
  - type: text
    content: ', whose merchants '
  - type: text
    content: are
  - type: text
    content: ' princes, whose traffickers '
  - type: text
    content: are
  - type: text
    content: ' the honourable of the earth? '
  '9':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts hath purposed it, to stain the pride of all glory, '
  - type: text
    content: and
  - type: text
    content: ' to bring into contempt all the honourable of the earth.'
