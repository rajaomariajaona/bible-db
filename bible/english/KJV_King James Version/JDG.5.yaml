document_id: JDG.5
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Song of Deborah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then sang Deborah and Barak the son of Abinoam on that day, saying,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Praise ye the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the avenging of Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: When the people willingly offered themselves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Hear, O ye kings; give ear, O ye princes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' I, will sing unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I will sing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: praise
  - type: text
    text: ' to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', when thou wentest out of Seir,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: When thou marchedst out of the field of Edom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The earth trembled, and the heavens dropped,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The clouds also dropped water.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The mountains melted from before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Even
  - type: text
    text: ' that Sinai from before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: In the days of Shamgar the son of Anath,
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the days of Jael, the highways were unoccupied,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the travellers walked through byways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: The inhabitants of
  - type: text
    text: ' the villages ceased, they ceased in Israel,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Until that I Deborah arose,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That I arose a mother in Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They chose new gods;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' war in the gates:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Was there a shield or spear seen
- type: usfm
  marker: q1
  children:
  - type: text
    text: Among forty thousand in Israel?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'My heart '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' toward the governors of Israel,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: That offered themselves willingly among the people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Bless ye the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Speak, ye that ride on white asses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ye that sit in judgment,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And walk by the way.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: They that are delivered
  - type: text
    text: ' from the noise of archers in the places of drawing water,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'There shall they rehearse the righteous acts of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Even
  - type: text
    text: ' the righteous acts '
  - type: usfm
    marker: add
    children:
    - type: text
      text: toward the inhabitants
  - type: text
    text: ' of his villages in Israel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then shall the people of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' go down to the gates.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Awake, awake, Deborah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Awake, awake, utter a song:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Arise, Barak, and lead thy captivity captive, thou son of Abinoam.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then he made him that remaineth have dominion over the nobles among the people:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' made me have dominion over the mighty.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Out of Ephraim '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was there
  - type: text
    text: ' a root of them against Amalek;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: After thee, Benjamin, among thy people;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Out of Machir came down governors,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And out of Zebulun they that handle the pen of the writer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the princes of Issachar '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with Deborah;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Even Issachar, and also Barak:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He was sent on foot into the valley.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the divisions of Reuben
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: There were
  - type: text
    text: ' great thoughts of heart.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Why abodest thou among the sheepfolds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To hear the bleatings of the flocks?
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the divisions of Reuben
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: There were
  - type: text
    text: ' great searchings of heart.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Gilead abode beyond Jordan:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And why did Dan remain in ships?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Asher continued on the sea shore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And abode in his breaches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Zebulun and Naphtali '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' a people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' jeoparded their lives unto the death'
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the high places of the field.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The kings came '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' fought,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then fought the kings of Canaan
- type: usfm
  marker: q1
  children:
  - type: text
    text: In Taanach by the waters of Megiddo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They took no gain of money.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: They fought from heaven;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The stars in their courses fought against Sisera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The river of Kishon swept them away,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That ancient river, the river Kishon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: O my soul, thou hast trodden down strength.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Then were the horsehoofs broken
- type: usfm
  marker: q1
  children:
  - type: text
    text: By the means of the pransings, the pransings of their mighty ones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Curse ye Meroz, said the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: Curse ye bitterly the inhabitants thereof;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Because they came not to the help of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'To the help of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' against the mighty.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Blessed above women shall Jael
- type: usfm
  marker: q1
  children:
  - type: text
    text: The wife of Heber the Kenite be,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Blessed shall she be above women in the tent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'He asked water, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' she gave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' milk;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: She brought forth butter in a lordly dish.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: She put her hand to the nail,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And her right hand to the workmen's hammer;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And with the hammer she smote Sisera, she smote off his head,
- type: usfm
  marker: q1
  children:
  - type: text
    text: When she had pierced and stricken through his temples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'At her feet he bowed, he fell, he lay down:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'At her feet he bowed, he fell:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Where he bowed, there he fell down dead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: The mother of Sisera looked out at a window,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And cried through the lattice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Why is his chariot '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' long in coming?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why tarry the wheels of his chariots?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Her wise ladies answered her,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yea, she returned answer to herself,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Have they not sped? have they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: not
  - type: text
    text: ' divided the prey;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'To every man a damsel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: or
  - type: text
    text: ' two;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: To Sisera a prey of divers colours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A prey of divers colours of needlework,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Of divers colours of needlework on both sides, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: meet
  - type: text
    text: ' for the necks of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them that take
  - type: text
    text: ' the spoil?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'So let all thine enemies perish, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But '
  - type: usfm
    marker: add
    children:
    - type: text
      text: let
  - type: text
    text: ' them that love him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' as the sun when he goeth forth in his might.'
- type: usfm
  marker: m
  children:
  - type: text
    text: And the land had rest forty years.
