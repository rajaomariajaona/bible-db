document_id: HEB.7,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Melchisedec
  - type: text
    content: 'For this Melchisedec, king of Salem, priest of the most high God, who met Abraham returning from the slaughter of the kings, and blessed him; '
  '10':
  - type: text
    content: For he was yet in the loins of his father, when Melchisedec met him.
  '11':
  - type: text
    content: 'If therefore perfection were by the Levitical priesthood, (for under it the people received the law,) what further need '
  - type: text
    content: was there
  - type: text
    content: ' that another priest should rise after the order of Melchisedec, and not be called after the order of Aaron? '
  '12':
  - type: text
    content: 'For the priesthood being changed, there is made of necessity a change also of the law. '
  '13':
  - type: text
    content: 'For he of whom these things are spoken pertaineth to another tribe, of which no man gave attendance at the altar. '
  '14':
  - type: text
    content: 'For '
  - type: text
    content: it is
  - type: text
    content: ' evident that our Lord sprang out of Juda; of which tribe Moses spake nothing concerning priesthood. '
  '15':
  - type: text
    content: 'And it is yet far more evident: for that after the similitude of Melchisedec there ariseth another priest, '
  '16':
  - type: text
    content: 'who is made, not after the law of a carnal commandment, but after the power of an endless life. '
  '17':
  - type: text
    content: For he testifieth,
  - type: text
    content: 'Thou '
  - type: text
    content: art
  - type: text
    content: ' a priest for ever'
  - type: text
    content: After the order of Melchisedec.
  '18':
  - type: text
    content: 'For there is verily a disannulling of the commandment going before for the weakness and unprofitableness thereof. '
  '19':
  - type: text
    content: 'For the law made nothing perfect, but the bringing in of a better hope '
  - type: text
    content: did
  - type: text
    content: '; by the which we draw nigh unto God. '
  '2':
  - type: text
    content: 'to whom also Abraham gave a tenth part of all; first being by interpretation King of righteousness, and after that also King of Salem, which is, King of peace; '
  '20':
  - type: text
    content: 'And inasmuch as not without an oath '
  - type: text
    content: he was made priest
  - type: text
    content: ': '
  '21':
  - type: text
    content: (for those priests were made without an oath; but this with an oath by him that said unto him,
  - type: text
    content: The Lord sware and will not repent,
  - type: text
    content: 'Thou '
  - type: text
    content: art
  - type: text
    content: ' a priest for ever'
  - type: text
    content: After the order of Melchisedec:)
  '22':
  - type: text
    content: 'By so much was Jesus made a surety of a better testament. '
  '23':
  - type: text
    content: 'And they truly were many priests, because they were not suffered to continue by reason of death: '
  '24':
  - type: text
    content: 'but this '
  - type: text
    content: man
  - type: text
    content: ', because he continueth ever, hath an unchangeable priesthood. '
  '25':
  - type: text
    content: Wherefore he is able also to save them to the uttermost that come unto God by him, seeing he ever liveth to make intercession for them.
  '26':
  - type: text
    content: 'For such an high priest became us, '
  - type: text
    content: who is
  - type: text
    content: ' holy, harmless, undefiled, separate from sinners, and made higher than the heavens; '
  '27':
  - type: text
    content: 'who needeth not daily, as those high priests, to offer up sacrifice, first for his own sins, and then for the people''s: for this he did once, when he offered up himself. '
  '28':
  - type: text
    content: 'For the law maketh men high priests which have infirmity; but the word of the oath, which was since the law, '
  - type: text
    content: maketh
  - type: text
    content: ' the Son, who is consecrated for evermore.'
  '3':
  - type: text
    content: without father, without mother, without descent, having neither beginning of days, nor end of life; but made like unto the Son of God; abideth a priest continually.
  '4':
  - type: text
    content: 'Now consider how great this man '
  - type: text
    content: was
  - type: text
    content: ', unto whom even the patriarch Abraham gave the tenth of the spoils. '
  '5':
  - type: text
    content: 'And verily they that are of the sons of Levi, who receive the office of the priesthood, have a commandment to take tithes of the people according to the law, that is, of their brethren, though they come out of the loins of Abraham: '
  '6':
  - type: text
    content: 'but he whose descent is not counted from them received tithes of Abraham, and blessed him that had the promises. '
  '7':
  - type: text
    content: 'And without all contradiction the less is blessed of the better. '
  '8':
  - type: text
    content: 'And here men that die receive tithes; but there he '
  - type: text
    content: receiveth them
  - type: text
    content: ', of whom it is witnessed that he liveth. '
  '9':
  - type: text
    content: 'And as I may so say, Levi also, who receiveth tithes, payed tithes in Abraham. '
