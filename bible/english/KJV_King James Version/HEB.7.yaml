document_id: HEB.7
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Melchisedec
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'For this Melchisedec, king of Salem, priest of the most high God, who met Abraham returning from the slaughter of the kings, and blessed him; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'to whom also Abraham gave a tenth part of all; first being by interpretation King of righteousness, and after that also King of Salem, which is, King of peace; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: without father, without mother, without descent, having neither beginning of days, nor end of life; but made like unto the Son of God; abideth a priest continually.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now consider how great this man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ', unto whom even the patriarch Abraham gave the tenth of the spoils. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And verily they that are of the sons of Levi, who receive the office of the priesthood, have a commandment to take tithes of the people according to the law, that is, of their brethren, though they come out of the loins of Abraham: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'but he whose descent is not counted from them received tithes of Abraham, and blessed him that had the promises. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And without all contradiction the less is blessed of the better. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And here men that die receive tithes; but there he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: receiveth them
  - type: text
    text: ', of whom it is witnessed that he liveth. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And as I may so say, Levi also, who receiveth tithes, payed tithes in Abraham. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For he was yet in the loins of his father, when Melchisedec met him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'If therefore perfection were by the Levitical priesthood, (for under it the people received the law,) what further need '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was there
  - type: text
    text: ' that another priest should rise after the order of Melchisedec, and not be called after the order of Aaron? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For the priesthood being changed, there is made of necessity a change also of the law. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For he of whom these things are spoken pertaineth to another tribe, of which no man gave attendance at the altar. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' evident that our Lord sprang out of Juda; of which tribe Moses spake nothing concerning priesthood. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And it is yet far more evident: for that after the similitude of Melchisedec there ariseth another priest, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'who is made, not after the law of a carnal commandment, but after the power of an endless life. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For he testifieth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' a priest for ever'
- type: usfm
  marker: q1
  children:
  - type: text
    text: After the order of Melchisedec.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For there is verily a disannulling of the commandment going before for the weakness and unprofitableness thereof. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For the law made nothing perfect, but the bringing in of a better hope '
  - type: usfm
    marker: add
    children:
    - type: text
      text: did
  - type: text
    text: '; by the which we draw nigh unto God. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And inasmuch as not without an oath '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he was made priest
  - type: text
    text: ': '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: (for those priests were made without an oath; but this with an oath by him that said unto him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Lord sware and will not repent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' a priest for ever'
- type: usfm
  marker: q1
  children:
  - type: text
    text: After the order of Melchisedec:)
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'By so much was Jesus made a surety of a better testament. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And they truly were many priests, because they were not suffered to continue by reason of death: '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'but this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ', because he continueth ever, hath an unchangeable priesthood. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Wherefore he is able also to save them to the uttermost that come unto God by him, seeing he ever liveth to make intercession for them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'For such an high priest became us, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: who is
  - type: text
    text: ' holy, harmless, undefiled, separate from sinners, and made higher than the heavens; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'who needeth not daily, as those high priests, to offer up sacrifice, first for his own sins, and then for the people''s: for this he did once, when he offered up himself. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'For the law maketh men high priests which have infirmity; but the word of the oath, which was since the law, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: maketh
  - type: text
    text: ' the Son, who is consecrated for evermore.'
