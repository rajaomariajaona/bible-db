  - type: text
    text: 'Now these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the names of the tribes. From the north end to the coast of the way of Hethlon, as one goeth to Hamath, Hazar-enan, the border of Damascus northward, to the coast of Hamath; for these are his sides east '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' west; a '
  - type: usfm
    marker: add
    children:
    - type: text
      text: portion for
  - type: text
    text: ' Dan. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And by the border of Dan, from the east side unto the west side, a '
  - type: usfm
    marker: add
    children:
    - type: text
      text: portion for
  - type: text
    text: ' Asher. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And by the border of Asher, from the east side even unto the west side, a '
  - type: usfm
    marker: add
    children:
    - type: text
      text: portion for
  - type: text
    text: ' Naphtali. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And by the border of Naphtali, from the east side unto the west side, a '
  - type: usfm
    marker: add
    children:
    - type: text
      text: portion for
  - type: text
    text: ' Manasseh. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And by the border of Manasseh, from the east side unto the west side, a '
  - type: usfm
    marker: add
    children:
    - type: text
      text: portion for
  - type: text
    text: ' Ephraim. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And by the border of Ephraim, from the east side even unto the west side, a '
  - type: usfm
    marker: add
    children:
    - type: text
      text: portion for
  - type: text
    text: ' Reuben. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And by the border of Reuben, from the east side unto the west side, a '
  - type: usfm
    marker: add
    children:
    - type: text
      text: portion for
  - type: text
    text: ' Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And by the border of Judah, from the east side unto the west side, shall be the offering which ye shall offer of five and twenty thousand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: reeds in
  - type: text
    text: ' breadth, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' length as one of the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: other
  - type: text
    text: ' parts, from the east side unto the west side: and the sanctuary shall be in the midst of it. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The oblation that ye shall offer unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' of five and twenty thousand in length, and of ten thousand in breadth. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And for them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' for the priests, shall be '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' holy oblation; toward the north five and twenty thousand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in length
  - type: text
    text: ', and toward the west ten thousand in breadth, and toward the east ten thousand in breadth, and toward the south five and twenty thousand in length: and the sanctuary of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall be in the midst thereof. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: add
    children:
    - type: text
      text: It shall be
  - type: text
    text: ' for the priests that are sanctified of the sons of Zadok; which have kept my charge, which went not astray when the children of Israel went astray, as the Levites went astray. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' oblation of the land that is offered shall be unto them a thing most holy by the border of the Levites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And over against the border of the priests the Levites '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall have
  - type: text
    text: ' five and twenty thousand in length, and ten thousand in breadth: all the length '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' five and twenty thousand, and the breadth ten thousand. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And they shall not sell of it, neither exchange, nor alienate the firstfruits of the land: for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' holy unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the five thousand, that are left in the breadth over against the five and twenty thousand, shall be a profane '
  - type: usfm
    marker: add
    children:
    - type: text
      text: place
  - type: text
    text: ' for the city, for dwelling, and for suburbs: and the city shall be in the midst thereof. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the measures thereof; the north side four thousand and five hundred, and the south side four thousand and five hundred, and on the east side four thousand and five hundred, and the west side four thousand and five hundred. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the suburbs of the city shall be toward the north two hundred and fifty, and toward the south two hundred and fifty, and toward the east two hundred and fifty, and toward the west two hundred and fifty. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And the residue in length over against the oblation of the holy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: portion shall be
  - type: text
    text: ' ten thousand eastward, and ten thousand westward: and it shall be over against the oblation of the holy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: portion
  - type: text
    text: '; and the increase thereof shall be for food unto them that serve the city. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And they that serve the city shall serve it out of all the tribes of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'All the oblation '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' five and twenty thousand by five and twenty thousand: ye shall offer the holy oblation foursquare, with the possession of the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And the residue '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' for the prince, on the one side and on the other of the holy oblation, and of the possession of the city, over against the five and twenty thousand of the oblation toward the east border, and westward over against the five and twenty thousand toward the west border, over against the portions for the prince: and it shall be the holy oblation; and the sanctuary of the house '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' in the midst thereof. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Moreover from the possession of the Levites, and from the possession of the city, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' in the midst '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of that
  - type: text
    text: ' which is the prince''s, between the border of Judah and the border of Benjamin, shall be for the prince. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'As for the rest of the tribes, from the east side unto the west side, Benjamin '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall have
  - type: text
    text: ' a '
  - type: usfm
    marker: add
    children:
    - type: text
      text: portion
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And by the border of Benjamin, from the east side unto the west side, Simeon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall have
  - type: text
    text: ' a '
  - type: usfm
    marker: add
    children:
    - type: text
      text: portion
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And by the border of Simeon, from the east side unto the west side, Issachar a '
  - type: usfm
    marker: add
    children:
    - type: text
      text: portion
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And by the border of Issachar, from the east side unto the west side, Zebulun a '
  - type: usfm
    marker: add
    children:
    - type: text
      text: portion
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And by the border of Zebulun, from the east side unto the west side, Gad a '
  - type: usfm
    marker: add
    children:
    - type: text
      text: portion
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And by the border of Gad, at the south side southward, the border shall be even from Tamar '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unto
  - type: text
    text: ' the waters of strife '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' Kadesh, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' to the river toward the great sea. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the land which ye shall divide by lot unto the tribes of Israel for inheritance, and these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' their portions, saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: .
- type: usfm
