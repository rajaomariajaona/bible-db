  - type: text
    text: The Gates of the City
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the goings out of the city on the north side, four thousand and five hundred measures. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And the gates of the city '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' after the names of the tribes of Israel: three gates northward; one gate of Reuben, one gate of Judah, one gate of Levi. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And at the east side four thousand and five hundred: and three gates; and one gate of Joseph, one gate of Benjamin, one gate of Dan. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And at the south side four thousand and five hundred measures: and three gates; one gate of Simeon, one gate of Issachar, one gate of Zebulun. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'At the west side four thousand and five hundred, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' their three gates; one gate of Gad, one gate of Asher, one gate of Naphtali. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: add
    children:
    - type: text
      text: It was
  - type: text
    text: ' round about eighteen thousand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'measures:'
  - type: text
    text: ' and the name of the city from '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' day '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ', The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' there.'
