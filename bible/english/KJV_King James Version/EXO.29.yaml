document_id: EXO.29
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the thing that thou shalt do unto them to hallow them, to minister unto me in the priest''s office: Take one young bullock, and two rams without blemish, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and unleavened bread, and cakes unleavened tempered with oil, and wafers unleavened anointed with oil: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' wheaten flour shalt thou make them. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And thou shalt put them into one basket, and bring them in the basket, with the bullock and the two rams. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Aaron and his sons thou shalt bring unto the door of the tabernacle of the congregation, and shalt wash them with water. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And thou shalt take the garments, and put upon Aaron the coat, and the robe of the ephod, and the ephod, and the breastplate, and gird him with the curious girdle of the ephod: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and thou shalt put the mitre upon his head, and put the holy crown upon the mitre. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then shalt thou take the anointing oil, and pour '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon his head, and anoint him. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And thou shalt bring his sons, and put coats upon them. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And thou shalt gird them with girdles, Aaron and his sons, and put the bonnets on them: and the priest''s office shall be their''s for a perpetual statute: and thou shalt consecrate Aaron and his sons.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sacrifices
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And thou shalt cause a bullock to be brought before the tabernacle of the congregation: and Aaron and his sons shall put their hands upon the head of the bullock. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And thou shalt kill the bullock before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: by
  - type: text
    text: ' the door of the tabernacle of the congregation. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And thou shalt take of the blood of the bullock, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon the horns of the altar with thy finger, and pour all the blood beside the bottom of the altar. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And thou shalt take all the fat that covereth the inwards, and the caul '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' above the liver, and the two kidneys, and the fat that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon them, and burn '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' upon the altar. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But the flesh of the bullock, and his skin, and his dung, shalt thou burn with fire without the camp: it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a sin offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Thou shalt also take one ram; and Aaron and his sons shall put their hands upon the head of the ram. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And thou shalt slay the ram, and thou shalt take his blood, and sprinkle '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' round about upon the altar. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And thou shalt cut the ram in pieces, and wash the inwards of him, and his legs, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' unto his pieces, and unto his head. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And thou shalt burn the whole ram upon the altar: it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a burnt offering unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a sweet savour, an offering made by fire unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And thou shalt take the other ram; and Aaron and his sons shall put their hands upon the head of the ram. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then shalt thou kill the ram, and take of his blood, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon the tip of the right ear of Aaron, and upon the tip of the right ear of his sons, and upon the thumb of their right hand, and upon the great toe of their right foot, and sprinkle the blood upon the altar round about. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And thou shalt take of the blood that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon the altar, and of the anointing oil, and sprinkle '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon Aaron, and upon his garments, and upon his sons, and upon the garments of his sons with him: and he shall be hallowed, and his garments, and his sons, and his sons'' garments with him. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Also thou shalt take of the ram the fat and the rump, and the fat that covereth the inwards, and the caul '
  - type: usfm
    marker: add
    children:
    - type: text
      text: above
  - type: text
    text: ' the liver, and the two kidneys, and the fat that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon them, and the right shoulder; for it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a ram of consecration: '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'and one loaf of bread, and one cake of oiled bread, and one wafer out of the basket of the unleavened bread that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and thou shalt put all in the hands of Aaron, and in the hands of his sons; and shalt wave them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' a wave offering before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And thou shalt receive them of their hands, and burn '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' upon the altar for a burnt offering, for a sweet savour before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' an offering made by fire unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And thou shalt take the breast of the ram of Aaron''s consecration, and wave it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' a wave offering before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': and it shall be thy part. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And thou shalt sanctify the breast of the wave offering, and the shoulder of the heave offering, which is waved, and which is heaved up, of the ram of the consecration, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' for Aaron, and of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' which is for his sons: '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and it shall be Aaron''s and his sons'' by a statute for ever from the children of Israel: for it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' an heave offering: and it shall be an heave offering from the children of Israel of the sacrifice of their peace offerings, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' their heave offering unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And the holy garments of Aaron shall be his sons'' after him, to be anointed therein, and to be consecrated in them. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' that son that is priest in his stead shall put them on seven days, when he cometh into the tabernacle of the congregation to minister in the holy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: place
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And thou shalt take the ram of the consecration, and seethe his flesh in the holy place. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And Aaron and his sons shall eat the flesh of the ram, and the bread that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the basket, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: by
  - type: text
    text: ' the door of the tabernacle of the congregation. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And they shall eat those things wherewith the atonement was made, to consecrate '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' to sanctify them: but a stranger shall not eat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thereof
  - type: text
    text: ', because they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' holy. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And if ought of the flesh of the consecrations, or of the bread, remain unto the morning, then thou shalt burn the remainder with fire: it shall not be eaten, because it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' holy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And thus shalt thou do unto Aaron, and to his sons, according to all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' which I have commanded thee: seven days shalt thou consecrate them. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And thou shalt offer every day a bullock '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' a sin offering for atonement: and thou shalt cleanse the altar, when thou hast made an atonement for it, and thou shalt anoint it, to sanctify it. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Seven days thou shalt make an atonement for the altar, and sanctify it; and it shall be an altar most holy: whatsoever toucheth the altar shall be holy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Now this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is that
  - type: text
    text: ' which thou shalt offer upon the altar; two lambs of the first year day by day continually. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'The one lamb thou shalt offer in the morning; and the other lamb thou shalt offer at even: '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'and with the one lamb a tenth deal of flour mingled with the fourth part of an hin of beaten oil; and the fourth part of an hin of wine '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' a drink offering. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And the other lamb thou shalt offer at even, and shalt do thereto according to the meat offering of the morning, and according to the drink offering thereof, for a sweet savour, an offering made by fire unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: add
    children:
    - type: text
      text: This shall be
  - type: text
    text: ' a continual burnt offering throughout your generations '
  - type: usfm
    marker: add
    children:
    - type: text
      text: at
  - type: text
    text: ' the door of the tabernacle of the congregation before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': where I will meet you, to speak there unto thee. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'And there I will meet with the children of Israel, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the tabernacle
  - type: text
    text: ' shall be sanctified by my glory. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'And I will sanctify the tabernacle of the congregation, and the altar: I will sanctify also both Aaron and his sons, to minister to me in the priest''s office. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'And I will dwell among the children of Israel, and will be their God. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'And they shall know that I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' their God, that brought them forth out of the land of Egypt, that I may dwell among them: I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' their God.'
