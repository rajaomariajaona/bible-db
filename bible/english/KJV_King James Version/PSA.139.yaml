  '18':
  - type: text
    content: ' '
  - type: text
    content: If
  - type: text
    content: ' I should count them, they are more in number than the sand:'
  - type: text
    content: When I awake, I am still with thee.
  '19':
  - type: text
    content: 'Surely thou wilt slay the wicked, O God:'
  - type: text
    content: Depart from me therefore, ye bloody men.
  '2':
  - type: text
    content: Thou knowest my downsitting and mine uprising, thou understandest my thought afar off.
  '20':
  - type: text
    content: For they speak against thee wickedly,
  - type: text
