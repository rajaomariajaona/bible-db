document_id: PSA.139,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the chief Musician, A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', thou hast searched me, and known '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Even there shall thy hand lead me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thy right hand shall hold me.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: If I say, Surely the darkness shall cover me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Even the night shall be light about me.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Yea, the darkness hideth not from thee; But the night shineth as the day:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The darkness and the light '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' both alike '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to thee
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'For thou hast possessed my reins:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou hast covered me in my mother's womb.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'I will praise thee; for I am fearfully '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' wonderfully made:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Marvellous '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' thy works; And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' my soul knoweth right well.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: My substance was not hid from thee,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When I was made in secret, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' curiously wrought in the lowest parts of the earth.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Thine eyes did see my substance, yet being unperfect;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And in thy book all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: my members
    - type: text
      text: ' were written,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Which
    - type: text
      text: ' in continuance were fashioned,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as yet there was
    - type: text
      text: ' none of them.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: How precious also are thy thoughts unto me, O God!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How great is the sum of them!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: If
    - type: text
      text: ' I should count them, they are more in number than the sand:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When I awake, I am still with thee.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Surely thou wilt slay the wicked, O God:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Depart from me therefore, ye bloody men.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Thou knowest my downsitting and mine uprising, thou understandest my thought afar off.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: For they speak against thee wickedly,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' thine enemies take '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thy name
    - type: text
      text: ' in vain.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Do not I hate them, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', that hate thee?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And am not I grieved with those that rise up against thee?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'I hate them with perfect hatred:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I count them mine enemies.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Search me, O God, and know my heart:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Try me, and know my thoughts:'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And see if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there be any
    - type: text
      text: ' wicked way in me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And lead me in the way everlasting.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Thou compassest my path and my lying down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And art acquainted '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' all my ways.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' not a word in my tongue,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: But
    - type: text
      text: ', lo, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', thou knowest it altogether.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Thou hast beset me behind and before,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And laid thine hand upon me.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Such
    - type: text
      text: ' knowledge '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' too wonderful for me;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'It is high, I cannot '
    - type: usfm
      marker: add
      children:
      - type: text
        text: attain
    - type: text
      text: ' unto it.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Whither shall I go from thy spirit?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or whither shall I flee from thy presence?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'If I ascend up into heaven, thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' there:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'If I make my bed in hell, behold, thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art there
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: If
    - type: text
      text: ' I take the wings of the morning,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' dwell in the uttermost parts of the sea;'
