verses:
  '1':
  - type: heading
    content: Adam's Descendants
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the book of the generations of Adam. In the day that God created man, in the likeness of God made he him; '
  '10':
  - type: text
    content: 'and Enos lived after he begat Cainan eight hundred and fifteen years, and begat sons and daughters: '
  '11':
  - type: text
    content: 'and all the days of Enos were nine hundred and five years: and he died.'
  '12':
  - type: text
    content: 'And Cainan lived seventy years, and begat Mahalaleel: '
  '13':
  - type: text
    content: 'and Cainan lived after he begat Mahalaleel eight hundred and forty years, and begat sons and daughters: '
  '14':
  - type: text
    content: 'and all the days of Cainan were nine hundred and ten years: and he died.'
  '15':
  - type: text
    content: 'And Mahalaleel lived sixty and five years, and begat Jared: '
  '16':
  - type: text
    content: 'and Mahalaleel lived after he begat Jared eight hundred and thirty years, and begat sons and daughters: '
  '17':
  - type: text
    content: 'and all the days of Mahalaleel were eight hundred ninety and five years: and he died.'
  '18':
  - type: text
    content: 'And Jared lived an hundred sixty and two years, and he begat Enoch: '
  '19':
  - type: text
    content: 'and Jared lived after he begat Enoch eight hundred years, and begat sons and daughters: '
  '2':
  - type: text
    content: male and female created he them; and blessed them, and called their name Adam, in the day when they were created.
  '20':
  - type: text
    content: 'and all the days of Jared were nine hundred sixty and two years: and he died.'
  '21':
  - type: text
    content: 'And Enoch lived sixty and five years, and begat Methuselah: '
  '22':
  - type: text
    content: 'and Enoch walked with God after he begat Methuselah three hundred years, and begat sons and daughters: '
  '23':
  - type: text
    content: 'and all the days of Enoch were three hundred sixty and five years: '
  '24':
  - type: text
    content: 'and Enoch walked with God: and he '
  - type: text
    content: was
  - type: text
    content: ' not; for God took him.'
  '25':
  - type: text
    content: 'And Methuselah lived an hundred eighty and seven years, and begat Lamech: '
  '26':
  - type: text
    content: 'and Methuselah lived after he begat Lamech seven hundred eighty and two years, and begat sons and daughters: '
  '27':
  - type: text
    content: 'and all the days of Methuselah were nine hundred sixty and nine years: and he died.'
  '28':
  - type: text
    content: 'And Lamech lived an hundred eighty and two years, and begat a son: '
  '29':
  - type: text
    content: 'and he called his name Noah, saying, This '
  - type: text
    content: same
  - type: text
    content: ' shall comfort us concerning our work and toil of our hands, because of the ground which the '
  - type: text
    content: LORD
  - type: text
    content: ' hath cursed. '
  '3':
  - type: text
    content: 'And Adam lived an hundred and thirty years, and begat '
  - type: text
    content: a son
  - type: text
    content: ' in his own likeness, after his image; and called his name Seth: '
  '30':
  - type: text
    content: 'And Lamech lived after he begat Noah five hundred ninety and five years, and begat sons and daughters: '
  '31':
  - type: text
    content: 'and all the days of Lamech were seven hundred seventy and seven years: and he died. '
  '32':
  - type: text
    content: 'And Noah was five hundred years old: and Noah begat Shem, Ham, and Japheth.'
  '4':
  - type: text
    content: 'and the days of Adam after he had begotten Seth were eight hundred years: and he begat sons and daughters: '
  '5':
  - type: text
    content: 'and all the days that Adam lived were nine hundred and thirty years: and he died.'
  '6':
  - type: text
    content: 'And Seth lived an hundred and five years, and begat Enos: '
  '7':
  - type: text
    content: 'and Seth lived after he begat Enos eight hundred and seven years, and begat sons and daughters: '
  '8':
  - type: text
    content: 'and all the days of Seth were nine hundred and twelve years: and he died.'
  '9':
  - type: text
    content: 'And Enos lived ninety years, and begat Cainan: '
