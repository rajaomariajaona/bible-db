document_id: GEN.5
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Adam's Descendants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the book of the generations of Adam. In the day that God created man, in the likeness of God made he him; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: male and female created he them; and blessed them, and called their name Adam, in the day when they were created.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Adam lived an hundred and thirty years, and begat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: a son
  - type: text
    text: ' in his own likeness, after his image; and called his name Seth: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and the days of Adam after he had begotten Seth were eight hundred years: and he begat sons and daughters: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and all the days that Adam lived were nine hundred and thirty years: and he died.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Seth lived an hundred and five years, and begat Enos: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and Seth lived after he begat Enos eight hundred and seven years, and begat sons and daughters: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and all the days of Seth were nine hundred and twelve years: and he died.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And Enos lived ninety years, and begat Cainan: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and Enos lived after he begat Cainan eight hundred and fifteen years, and begat sons and daughters: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and all the days of Enos were nine hundred and five years: and he died.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Cainan lived seventy years, and begat Mahalaleel: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and Cainan lived after he begat Mahalaleel eight hundred and forty years, and begat sons and daughters: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and all the days of Cainan were nine hundred and ten years: and he died.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Mahalaleel lived sixty and five years, and begat Jared: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and Mahalaleel lived after he begat Jared eight hundred and thirty years, and begat sons and daughters: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'and all the days of Mahalaleel were eight hundred ninety and five years: and he died.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And Jared lived an hundred sixty and two years, and he begat Enoch: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and Jared lived after he begat Enoch eight hundred years, and begat sons and daughters: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'and all the days of Jared were nine hundred sixty and two years: and he died.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And Enoch lived sixty and five years, and begat Methuselah: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'and Enoch walked with God after he begat Methuselah three hundred years, and begat sons and daughters: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'and all the days of Enoch were three hundred sixty and five years: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and Enoch walked with God: and he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' not; for God took him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And Methuselah lived an hundred eighty and seven years, and begat Lamech: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and Methuselah lived after he begat Lamech seven hundred eighty and two years, and begat sons and daughters: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'and all the days of Methuselah were nine hundred sixty and nine years: and he died.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And Lamech lived an hundred eighty and two years, and begat a son: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'and he called his name Noah, saying, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: same
  - type: text
    text: ' shall comfort us concerning our work and toil of our hands, because of the ground which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath cursed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And Lamech lived after he begat Noah five hundred ninety and five years, and begat sons and daughters: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'and all the days of Lamech were seven hundred seventy and seven years: and he died. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And Noah was five hundred years old: and Noah begat Shem, Ham, and Japheth.'
