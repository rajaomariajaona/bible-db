document_id: MAT.19
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Beyond Jordan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And it came to pass, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' when Jesus had finished these sayings, he departed from Galilee, and came into the coasts of Judæa beyond Jordan; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: And great multitudes followed him; and he healed them there.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The Pharisees also came unto him, tempting him, and saying unto him, Is it lawful for a man to put away his wife for every cause? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And he answered and said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Have ye not read, that he which made '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' at the beginning made them male and female,'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and said, For this cause shall a man leave father and mother, and shall cleave to his wife: and they twain shall be one flesh?'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Wherefore they are no more twain, but one flesh. What therefore God hath joined together, let not man put asunder.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'They say unto him, Why did Moses then command to give a writing of divorcement, and to put her away? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He saith unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Moses because of the hardness of your hearts suffered you to put away your wives: but from the beginning it was not so.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And I say unto you, Whosoever shall put away his wife, except '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it be
    - type: text
      text: ' for fornication, and shall marry another, committeth adultery: and whoso marrieth her which is put away doth commit adultery.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'His disciples say unto him, If the case of the man be so with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' wife, it is not good to marry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But he said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'All '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' cannot receive this saying, save '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they
    - type: text
      text: ' to whom it is given.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For there are some eunuchs, which were so born from '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' mother''s womb: and there are some eunuchs, which were made eunuchs of men: and there be eunuchs, which have made themselves eunuchs for the kingdom of heaven''s sake. He that is able to receive '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', let him receive '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then were there brought unto him little children, that he should put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' hands on them, and pray: and the disciples rebuked them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Suffer little children, and forbid them not, to come unto me: for of such is the kingdom of heaven.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And he laid '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' hands on them, and departed thence.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Rich Young Ruler
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And, behold, one came and said unto him, Good Master, what good thing shall I do, that I may have eternal life? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And he said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Why callest thou me good? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none good but one, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is
    - type: text
      text: ', God: but if thou wilt enter into life, keep the commandments.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'He saith unto him, Which? Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Thou shalt do no murder, Thou shalt not commit adultery, Thou shalt not steal, Thou shalt not bear false witness,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Honour thy father and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thy
    - type: text
      text: ' mother: and, Thou shalt love thy neighbour as thyself.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The young man saith unto him, All these things have I kept from my youth up: what lack I yet? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jesus said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'If thou wilt be perfect, go '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' sell that thou hast, and give to the poor, and thou shalt have treasure in heaven: and come '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' follow me.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But when the young man heard that saying, he went away sorrowful: for he had great possessions.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then said Jesus unto his disciples, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Verily I say unto you, That a rich man shall hardly enter into the kingdom of heaven.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And again I say unto you, It is easier for a camel to go through the eye of a needle, than for a rich man to enter into the kingdom of God.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'When his disciples heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', they were exceedingly amazed, saying, Who then can be saved? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But Jesus beheld '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ', and said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: With men this is impossible; but with God all things are possible.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then answered Peter and said unto him, Behold, we have forsaken all, and followed thee; what shall we have therefore? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And Jesus said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Verily I say unto you, That ye which have followed me, in the regeneration when the Son of man shall sit in the throne of his glory, ye also shall sit upon twelve thrones, judging the twelve tribes of Israel.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And every one that hath forsaken houses, or brethren, or sisters, or father, or mother, or wife, or children, or lands, for my name's sake, shall receive an hundredfold, and shall inherit everlasting life.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But many '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that are
    - type: text
      text: ' first shall be last; and the last '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' first'
  - type: text
    text: .
