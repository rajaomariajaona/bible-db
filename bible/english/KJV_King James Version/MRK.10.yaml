verses:
  '1':
  - type: heading
    content: Jesus in Judæa
  - type: heading
    content: Beyond Jordan
  - type: text
    content: 'And he arose from thence, and cometh into the coasts of Judæa by the farther side of Jordan: and the people resort unto him again; and, as he was wont, he taught them again.'
  '10':
  - type: text
    content: 'And in the house his disciples asked him again of the same '
  - type: text
    content: matter
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'And he saith unto them, '
  - type: text
    content: Whosoever shall put away his wife, and marry another, committeth adultery against her.
  - type: text
    content: ' '
  '12':
  - type: text
    content: And if a woman shall put away her husband, and be married to another, she committeth adultery.
  '13':
  - type: text
    content: 'And they brought young children to him, that he should touch them: and '
  - type: text
    content: his
  - type: text
    content: ' disciples rebuked those that brought '
  - type: text
    content: them
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'But when Jesus saw '
  - type: text
    content: it
  - type: text
    content: ', he was much displeased, and said unto them, '
  - type: text
    content: 'Suffer the little children to come unto me, and forbid them not: for of such is the kingdom of God.'
  - type: text
    content: ' '
  '15':
  - type: text
    content: Verily I say unto you, Whosoever shall not receive the kingdom of God as a little child, he shall not enter therein.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'And he took them up in his arms, put '
  - type: text
    content: his
  - type: text
    content: ' hands upon them, and blessed them.'
  '17':
  - type: text
    content: 'And when he was gone forth into the way, there came one running, and kneeled to him, and asked him, Good Master, what shall I do that I may inherit eternal life? '
  '18':
  - type: text
    content: 'And Jesus said unto him, '
  - type: text
    content: 'Why callest thou me good? '
  - type: text
    content: there is
  - type: text
    content: ' none good but one, '
  - type: text
    content: that is
  - type: text
    content: ', God.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: Thou knowest the commandments, Do not commit adultery, Do not kill, Do not steal, Do not bear false witness, Defraud not, Honour thy father and mother.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And the Pharisees came to him, and asked him, Is it lawful for a man to put away '
  - type: text
    content: his
  - type: text
    content: ' wife? tempting him. '
  '20':
  - type: text
    content: 'And he answered and said unto him, Master, all these have I observed from my youth. '
  '21':
  - type: text
    content: 'Then Jesus beholding him loved him, and said unto him, '
  - type: text
    content: 'One thing thou lackest: go thy way, sell whatsoever thou hast, and give to the poor, and thou shalt have treasure in heaven: and come, take up the cross, and follow me.'
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'And he was sad at that saying, and went away grieved: for he had great possessions.'
  '23':
  - type: text
    content: 'And Jesus looked round about, and saith unto his disciples, '
  - type: text
    content: How hardly shall they that have riches enter into the kingdom of God!
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'And the disciples were astonished at his words. But Jesus answereth again, and saith unto them, '
  - type: text
    content: Children, how hard is it for them that trust in riches to enter into the kingdom of God!
  - type: text
    content: ' '
  '25':
  - type: text
    content: It is easier for a camel to go through the eye of a needle, than for a rich man to enter into the kingdom of God.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'And they were astonished out of measure, saying among themselves, Who then can be saved? '
  '27':
  - type: text
    content: 'And Jesus looking upon them saith, '
  - type: text
    content: 'With men '
  - type: text
    content: it is
  - type: text
    content: ' impossible, but not with God: for with God all things are possible.'
  '28':
  - type: text
    content: 'Then Peter began to say unto him, Lo, we have left all, and have followed thee. '
  '29':
  - type: text
    content: 'And Jesus answered and said, '
  - type: text
    content: Verily I say unto you, There is no man that hath left house, or brethren, or sisters, or father, or mother, or wife, or children, or lands, for my sake, and the gospel's,
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'And he answered and said unto them, '
  - type: text
    content: What did Moses command you?
  - type: text
    content: ' '
  '30':
  - type: text
    content: but he shall receive an hundredfold now in this time, houses, and brethren, and sisters, and mothers, and children, and lands, with persecutions; and in the world to come eternal life.
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'But many '
  - type: text
    content: that are
  - type: text
    content: ' first shall be last; and the last first.'
  - type: heading
    content: On the Way to Jerusalem
  '32':
  - type: text
    content: 'And they were in the way going up to Jerusalem; and Jesus went before them: and they were amazed; and as they followed, they were afraid. And he took again the twelve, and began to tell them what things should happen unto him, '
  '33':
  - type: text
    content: saying
  - type: text
    content: ', '
  - type: text
    content: 'Behold, we go up to Jerusalem; and the Son of man shall be delivered unto the chief priests, and unto the scribes; and they shall condemn him to death, and shall deliver him to the Gentiles:'
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'and they shall mock him, and shall scourge him, and shall spit upon him, and shall kill him: and the third day he shall rise again.'
  - type: heading
    content: The Sons of Zebedee
  '35':
  - type: text
    content: 'And James and John, the sons of Zebedee, come unto him, saying, Master, we would that thou shouldest do for us whatsoever we shall desire. '
  '36':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: What would ye that I should do for you?
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'They said unto him, Grant unto us that we may sit, one on thy right hand, and the other on thy left hand, in thy glory. '
  '38':
  - type: text
    content: 'But Jesus said unto them, '
  - type: text
    content: 'Ye know not what ye ask: can ye drink of the cup that I drink of? and be baptized with the baptism that I am baptized with?'
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'And they said unto him, We can. And Jesus said unto them, '
  - type: text
    content: 'Ye shall indeed drink of the cup that I drink of; and with the baptism that I am baptized withal shall ye be baptized:'
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'And they said, Moses suffered to write a bill of divorcement, and to put '
  - type: text
    content: her
  - type: text
    content: ' away. '
  '40':
  - type: text
    content: 'but to sit on my right hand and on my left hand is not mine to give; but '
  - type: text
    content: it shall be given to them
  - type: text
    content: ' for whom it is prepared.'
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'And when the ten heard '
  - type: text
    content: it
  - type: text
    content: ', they began to be much displeased with James and John. '
  '42':
  - type: text
    content: 'But Jesus called them '
  - type: text
    content: to him
  - type: text
    content: ', and saith unto them, '
  - type: text
    content: Ye know that they which are accounted to rule over the Gentiles exercise lordship over them; and their great ones exercise authority upon them.
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'But so shall it not be among you: but whosoever will be great among you, shall be your minister:'
  - type: text
    content: ' '
  '44':
  - type: text
    content: and whosoever of you will be the chiefest, shall be servant of all.
  - type: text
    content: ' '
  '45':
  - type: text
    content: For even the Son of man came not to be ministered unto, but to minister, and to give his life a ransom for many.
  - type: heading
    content: Jericho
  '46':
  - type: text
    content: 'And they came to Jericho: and as he went out of Jericho with his disciples and a great number of people, blind Bartimæus, the son of Timæus, sat by the highway side begging. '
  '47':
  - type: text
    content: 'And when he heard that it was Jesus of Nazareth, he began to cry out, and say, Jesus, '
  - type: text
    content: thou
  - type: text
    content: ' Son of David, have mercy on me. '
  '48':
  - type: text
    content: 'And many charged him that he should hold his peace: but he cried the more a great deal, '
  - type: text
    content: Thou
  - type: text
    content: ' Son of David, have mercy on me. '
  '49':
  - type: text
    content: 'And Jesus stood still, and commanded him to be called. And they call the blind man, saying unto him, Be of good comfort, rise; he calleth thee. '
  '5':
  - type: text
    content: 'And Jesus answered and said unto them, '
  - type: text
    content: For the hardness of your heart he wrote you this precept.
  - type: text
    content: ' '
  '50':
  - type: text
    content: 'And he, casting away his garment, rose, and came to Jesus. '
  '51':
  - type: text
    content: 'And Jesus answered and said unto him, '
  - type: text
    content: What wilt thou that I should do unto thee?
  - type: text
    content: ' The blind man said unto him, Lord, that I might receive my sight. '
  '52':
  - type: text
    content: 'And Jesus said unto him, '
  - type: text
    content: Go thy way; thy faith hath made thee whole.
  - type: text
    content: ' And immediately he received his sight, and followed Jesus in the way.'
  '6':
  - type: text
    content: But from the beginning of the creation God made them male and female.
  - type: text
    content: ' '
  '7':
  - type: text
    content: For this cause shall a man leave his father and mother, and cleave to his wife;
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'and they twain shall be one flesh: so then they are no more twain, but one flesh.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: What therefore God hath joined together, let not man put asunder.
  - type: text
    content: ' '
