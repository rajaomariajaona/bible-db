document_id: MRK.10,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus in Judæa
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Beyond Jordan
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he arose from thence, and cometh into the coasts of Judæa by the farther side of Jordan: and the people resort unto him again; and, as he was wont, he taught them again.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in the house his disciples asked him again of the same '
    - type: usfm
      marker: add
      children:
      - type: text
        text: matter
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whosoever shall put away his wife, and marry another, committeth adultery against her.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And if a woman shall put away her husband, and be married to another, she committeth adultery.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they brought young children to him, that he should touch them: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' disciples rebuked those that brought '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when Jesus saw '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', he was much displeased, and said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Suffer the little children to come unto me, and forbid them not: for of such is the kingdom of God.'
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Verily I say unto you, Whosoever shall not receive the kingdom of God as a little child, he shall not enter therein.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he took them up in his arms, put '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' hands upon them, and blessed them.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he was gone forth into the way, there came one running, and kneeled to him, and asked him, Good Master, what shall I do that I may inherit eternal life? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus said unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Why callest thou me good? '
      - type: usfm
        marker: add
        children:
        - type: text
          text: there is
      - type: text
        text: ' none good but one, '
      - type: usfm
        marker: add
        children:
        - type: text
          text: that is
      - type: text
        text: ', God.'
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Thou knowest the commandments, Do not commit adultery, Do not kill, Do not steal, Do not bear false witness, Defraud not, Honour thy father and mother.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the Pharisees came to him, and asked him, Is it lawful for a man to put away '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' wife? tempting him. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he answered and said unto him, Master, all these have I observed from my youth. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus beholding him loved him, and said unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'One thing thou lackest: go thy way, sell whatsoever thou hast, and give to the poor, and thou shalt have treasure in heaven: and come, take up the cross, and follow me.'
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he was sad at that saying, and went away grieved: for he had great possessions.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus looked round about, and saith unto his disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: How hardly shall they that have riches enter into the kingdom of God!
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the disciples were astonished at his words. But Jesus answereth again, and saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Children, how hard is it for them that trust in riches to enter into the kingdom of God!
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It is easier for a camel to go through the eye of a needle, than for a rich man to enter into the kingdom of God.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they were astonished out of measure, saying among themselves, Who then can be saved? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus looking upon them saith, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'With men '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it is
      - type: text
        text: ' impossible, but not with God: for with God all things are possible.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Peter began to say unto him, Lo, we have left all, and have followed thee. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus answered and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Verily I say unto you, There is no man that hath left house, or brethren, or sisters, or father, or mother, or wife, or children, or lands, for my sake, and the gospel's,
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he answered and said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: What did Moses command you?
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but he shall receive an hundredfold now in this time, houses, and brethren, and sisters, and mothers, and children, and lands, with persecutions; and in the world to come eternal life.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But many '
      - type: usfm
        marker: add
        children:
        - type: text
          text: that are
      - type: text
        text: ' first shall be last; and the last first.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: On the Way to Jerusalem
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they were in the way going up to Jerusalem; and Jesus went before them: and they were amazed; and as they followed, they were afraid. And he took again the twelve, and began to tell them what things should happen unto him, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: saying
    - type: text
      text: ', '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Behold, we go up to Jerusalem; and the Son of man shall be delivered unto the chief priests, and unto the scribes; and they shall condemn him to death, and shall deliver him to the Gentiles:'
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and they shall mock him, and shall scourge him, and shall spit upon him, and shall kill him: and the third day he shall rise again.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Sons of Zebedee
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And James and John, the sons of Zebedee, come unto him, saying, Master, we would that thou shouldest do for us whatsoever we shall desire. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: What would ye that I should do for you?
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They said unto him, Grant unto us that we may sit, one on thy right hand, and the other on thy left hand, in thy glory. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ye know not what ye ask: can ye drink of the cup that I drink of? and be baptized with the baptism that I am baptized with?'
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said unto him, We can. And Jesus said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ye shall indeed drink of the cup that I drink of; and with the baptism that I am baptized withal shall ye be baptized:'
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said, Moses suffered to write a bill of divorcement, and to put '
    - type: usfm
      marker: add
      children:
      - type: text
        text: her
    - type: text
      text: ' away. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'but to sit on my right hand and on my left hand is not mine to give; but '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it shall be given to them
      - type: text
        text: ' for whom it is prepared.'
    - type: text
      text: ' '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the ten heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', they began to be much displeased with James and John. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus called them '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to him
    - type: text
      text: ', and saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ye know that they which are accounted to rule over the Gentiles exercise lordship over them; and their great ones exercise authority upon them.
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But so shall it not be among you: but whosoever will be great among you, shall be your minister:'
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and whosoever of you will be the chiefest, shall be servant of all.
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For even the Son of man came not to be ministered unto, but to minister, and to give his life a ransom for many.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jericho
    marker-yv: yv-h
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they came to Jericho: and as he went out of Jericho with his disciples and a great number of people, blind Bartimæus, the son of Timæus, sat by the highway side begging. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he heard that it was Jesus of Nazareth, he began to cry out, and say, Jesus, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thou
    - type: text
      text: ' Son of David, have mercy on me. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And many charged him that he should hold his peace: but he cried the more a great deal, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Thou
    - type: text
      text: ' Son of David, have mercy on me. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus stood still, and commanded him to be called. And they call the blind man, saying unto him, Be of good comfort, rise; he calleth thee. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus answered and said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For the hardness of your heart he wrote you this precept.
    - type: text
      text: ' '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he, casting away his garment, rose, and came to Jesus. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus answered and said unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: What wilt thou that I should do unto thee?
    - type: text
      text: ' The blind man said unto him, Lord, that I might receive my sight. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus said unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Go thy way; thy faith hath made thee whole.
    - type: text
      text: ' And immediately he received his sight, and followed Jesus in the way.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But from the beginning of the creation God made them male and female.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For this cause shall a man leave his father and mother, and cleave to his wife;
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and they twain shall be one flesh: so then they are no more twain, but one flesh.'
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: What therefore God hath joined together, let not man put asunder.
    - type: text
      text: ' '
