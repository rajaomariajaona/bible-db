document_id: EXO.34,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Covenant is Renewed
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Moses, Hew thee two tables of stone like unto the first: and I will write upon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: these
    - type: text
      text: ' tables the words that were in the first tables, which thou brakest. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, Behold, I make a covenant: before all thy people I will do marvels, such as have not been done in all the earth, nor in any nation: and all the people among which thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' shall see the work of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': for it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a terrible thing that I will do with thee. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Observe thou that which I command thee this day: behold, I drive out before thee the Amorite, and the Canaanite, and the Hittite, and the Perizzite, and the Hivite, and the Jebusite. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Take heed to thyself, lest thou make a covenant with the inhabitants of the land whither thou goest, lest it be for a snare in the midst of thee: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but ye shall destroy their altars, break their images, and cut down their groves: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for thou shalt worship no other god: for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', whose name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Jealous, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a jealous God: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'lest thou make a covenant with the inhabitants of the land, and they go a whoring after their gods, and do sacrifice unto their gods, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' call thee, and thou eat of his sacrifice; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and thou take of their daughters unto thy sons, and their daughters go a whoring after their gods, and make thy sons go a whoring after their gods. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thou shalt make thee no molten gods.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The feast of unleavened bread shalt thou keep. Seven days thou shalt eat unleavened bread, as I commanded thee, in the time of the month Abib: for in the month Abib thou camest out from Egypt. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All that openeth the matrix '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' mine; and every firstling among thy cattle, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whether
    - type: text
      text: ' ox or sheep, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is male
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And be ready in the morning, and come up in the morning unto mount Sinai, and present thyself there to me in the top of the mount. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the firstling of an ass thou shalt redeem with a lamb: and if thou redeem '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' not, then shalt thou break his neck. All the firstborn of thy sons thou shalt redeem. And none shall appear before me empty.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Six days thou shalt work, but on the seventh day thou shalt rest: in earing time and in harvest thou shalt rest. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And thou shalt observe the feast of weeks, of the firstfruits of wheat harvest, and the feast of ingathering at the year''s end. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thrice in the year shall all your menchildren appear before the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ', the God of Israel. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I will cast out the nations before thee, and enlarge thy borders: neither shall any man desire thy land, when thou shalt go up to appear before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God thrice in the year.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt not offer the blood of my sacrifice with leaven; neither shall the sacrifice of the feast of the passover be left unto the morning. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The first of the firstfruits of thy land thou shalt bring unto the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God. Thou shalt not seethe a kid in his mother''s milk.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Moses, Write thou these words: for after the tenor of these words I have made a covenant with thee and with Israel. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he was there with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' forty days and forty nights; he did neither eat bread, nor drink water. And he wrote upon the tables the words of the covenant, the ten commandments.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, when Moses came down from mount Sinai with the two tables of testimony in Moses'' hand, when he came down from the mount, that Moses wist not that the skin of his face shone while he talked with him. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And no man shall come up with thee, neither let any man be seen throughout all the mount; neither let the flocks nor herds feed before that mount.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Aaron and all the children of Israel saw Moses, behold, the skin of his face shone; and they were afraid to come nigh him. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses called unto them; and Aaron and all the rulers of the congregation returned unto him: and Moses talked with them. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And afterward all the children of Israel came nigh: and he gave them in commandment all that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had spoken with him in mount Sinai. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: till
    - type: text
      text: ' Moses had done speaking with them, he put a vail on his face. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when Moses went in before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' to speak with him, he took the vail off, until he came out. And he came out, and spake unto the children of Israel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' which he was commanded. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Israel saw the face of Moses, that the skin of Moses'' face shone: and Moses put the vail upon his face again, until he went in to speak with him.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he hewed two tables of stone like unto the first; and Moses rose up early in the morning, and went up unto mount Sinai, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had commanded him, and took in his hand the two tables of stone. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' descended in the cloud, and stood with him there, and proclaimed the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' passed by before him, and proclaimed, The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God, merciful and gracious, longsuffering, and abundant in goodness and truth, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'keeping mercy for thousands, forgiving iniquity and transgression and sin, and that will by no means clear '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the guilty
    - type: text
      text: '; visiting the iniquity of the fathers upon the children, and upon the children''s children, unto the third and to the fourth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: generation
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses made haste, and bowed his head toward the earth, and worshipped. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, If now I have found grace in thy sight, O Lord, let my Lord, I pray thee, go among us; for it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a stiffnecked people; and pardon our iniquity and our sin, and take us for thine inheritance.'
