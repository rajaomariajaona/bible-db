document_id: JER.52
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Zedekiah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' one and twenty years old when he began to reign, and he reigned eleven years in Jerusalem. And his mother''s name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Hamutal the daughter of Jeremiah of Libnah. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he did '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which was
  - type: text
    text: ' evil in the eyes of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', according to all that Jehoiakim had done. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For through the anger of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' it came to pass in Jerusalem and Judah, till he had cast them out from his presence, that Zedekiah rebelled against the king of Babylon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And it came to pass in the ninth year of his reign, in the tenth month, in the tenth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' of the month, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' Nebuchadrezzar king of Babylon came, he and all his army, against Jerusalem, and pitched against it, and built forts against it round about. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So the city was besieged unto the eleventh year of king Zedekiah. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And in the fourth month, in the ninth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' of the month, the famine was sore in the city, so that there was no bread for the people of the land. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then the city was broken up, and all the men of war fled, and went forth out of the city by night by the way of the gate between the two walls, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' by the king''s garden; (now the Chaldeans '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' by the city round about:) and they went by the way of the plain. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But the army of the Chaldeans pursued after the king, and overtook Zedekiah in the plains of Jericho; and all his army was scattered from him. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then they took the king, and carried him up unto the king of Babylon to Riblah in the land of Hamath; where he gave judgment upon him. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the king of Babylon slew the sons of Zedekiah before his eyes: he slew also all the princes of Judah in Riblah. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then he put out the eyes of Zedekiah; and the king of Babylon bound him in chains, and carried him to Babylon, and put him in prison till the day of his death.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now in the fifth month, in the tenth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' of the month, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the nineteenth year of Nebuchadrezzar king of Babylon, came Nebuzar-adan, captain of the guard, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' served the king of Babylon, into Jerusalem, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and burned the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and the king''s house; and all the houses of Jerusalem, and all the houses of the great '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ', burned he with fire: '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and all the army of the Chaldeans, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with the captain of the guard, brake down all the walls of Jerusalem round about. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then Nebuzar-adan the captain of the guard carried away captive '
  - type: usfm
    marker: add
    children:
    - type: text
      text: certain
  - type: text
    text: ' of the poor of the people, and the residue of the people that remained in the city, and those that fell away, that fell to the king of Babylon, and the rest of the multitude. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But Nebuzar-adan the captain of the guard left '
  - type: usfm
    marker: add
    children:
    - type: text
      text: certain
  - type: text
    text: ' of the poor of the land for vinedressers and for husbandmen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Also the pillars of brass that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and the bases, and the brasen sea that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the Chaldeans brake, and carried all the brass of them to Babylon. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The caldrons also, and the shovels, and the snuffers, and the bowls, and the spoons, and all the vessels of brass wherewith they ministered, took they away. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And the basons, and the firepans, and the bowls, and the caldrons, and the candlesticks, and the spoons, and the cups; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' of gold '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' gold, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' of silver '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' silver, took the captain of the guard away. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The two pillars, one sea, and twelve brasen bulls that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' under the bases, which king Solomon had made in the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': the brass of all these vessels was without weight. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: concerning
  - type: text
    text: ' the pillars, the height of one pillar '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' eighteen cubits; and a fillet of twelve cubits did compass it; and the thickness thereof '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' four fingers: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it was
  - type: text
    text: ' hollow. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And a chapiter of brass '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' upon it; and the height of one chapiter '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' five cubits, with network and pomegranates upon the chapiters round about, all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' brass. The second pillar also and the pomegranates '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' like unto these. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And there were ninety and six pomegranates on a side; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' all the pomegranates upon the network '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' an hundred round about.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And the captain of the guard took Seraiah the chief priest, and Zephaniah the second priest, and the three keepers of the door: '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'he took also out of the city an eunuch, which had the charge of the men of war; and seven men of them that were near the king''s person, which were found in the city; and the principal scribe of the host, who mustered the people of the land; and threescore men of the people of the land, that were found in the midst of the city. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'So Nebuzar-adan the captain of the guard took them, and brought them to the king of Babylon to Riblah. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: And the king of Babylon smote them, and put them to death in Riblah in the land of Hamath. Thus Judah was carried away captive out of his own land.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the people whom Nebuchadrezzar carried away captive: in the seventh year three thousand Jews and three and twenty: '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'in the eighteenth year of Nebuchadrezzar he carried away captive from Jerusalem eight hundred thirty and two persons: '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'in the three and twentieth year of Nebuchadrezzar, Nebuzar-adan the captain of the guard carried away captive of the Jews seven hundred forty and five persons: all the persons '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' four thousand and six hundred.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And it came to pass in the seven and thirtieth year of the captivity of Jehoiachin king of Judah, in the twelfth month, in the five and twentieth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' of the month, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' Evil-merodach king of Babylon in the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: first
  - type: text
    text: ' year of his reign lifted up the head of Jehoiachin king of Judah, and brought him forth out of prison, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'and spake kindly unto him, and set his throne above the throne of the kings that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with him in Babylon, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'and changed his prison garments: and he did continually eat bread before him all the days of his life. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' his diet, there was a continual diet given him of the king of Babylon, every day a portion until the day of his death, all the days of his life.'
