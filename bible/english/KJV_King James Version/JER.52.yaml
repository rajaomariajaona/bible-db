verses:
  '1':
  - type: text
    content: 'Zedekiah '
  - type: text
    content: was
  - type: text
    content: ' one and twenty years old when he began to reign, and he reigned eleven years in Jerusalem. And his mother''s name '
  - type: text
    content: was
  - type: text
    content: ' Hamutal the daughter of Jeremiah of Libnah. '
  '10':
  - type: text
    content: 'And the king of Babylon slew the sons of Zedekiah before his eyes: he slew also all the princes of Judah in Riblah. '
  '11':
  - type: text
    content: Then he put out the eyes of Zedekiah; and the king of Babylon bound him in chains, and carried him to Babylon, and put him in prison till the day of his death.
  '12':
  - type: text
    content: 'Now in the fifth month, in the tenth '
  - type: text
    content: day
  - type: text
    content: ' of the month, which '
  - type: text
    content: was
  - type: text
    content: ' the nineteenth year of Nebuchadrezzar king of Babylon, came Nebuzar-adan, captain of the guard, '
  - type: text
    content: which
  - type: text
    content: ' served the king of Babylon, into Jerusalem, '
  '13':
  - type: text
    content: 'and burned the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and the king''s house; and all the houses of Jerusalem, and all the houses of the great '
  - type: text
    content: men
  - type: text
    content: ', burned he with fire: '
  '14':
  - type: text
    content: 'and all the army of the Chaldeans, that '
  - type: text
    content: were
  - type: text
    content: ' with the captain of the guard, brake down all the walls of Jerusalem round about. '
  '15':
  - type: text
    content: 'Then Nebuzar-adan the captain of the guard carried away captive '
  - type: text
    content: certain
  - type: text
    content: ' of the poor of the people, and the residue of the people that remained in the city, and those that fell away, that fell to the king of Babylon, and the rest of the multitude. '
  '16':
  - type: text
    content: 'But Nebuzar-adan the captain of the guard left '
  - type: text
    content: certain
  - type: text
    content: ' of the poor of the land for vinedressers and for husbandmen.'
  '17':
  - type: text
    content: 'Also the pillars of brass that '
  - type: text
    content: were
  - type: text
    content: ' in the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and the bases, and the brasen sea that '
  - type: text
    content: was
  - type: text
    content: ' in the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', the Chaldeans brake, and carried all the brass of them to Babylon. '
  '18':
  - type: text
    content: 'The caldrons also, and the shovels, and the snuffers, and the bowls, and the spoons, and all the vessels of brass wherewith they ministered, took they away. '
  '19':
  - type: text
    content: 'And the basons, and the firepans, and the bowls, and the caldrons, and the candlesticks, and the spoons, and the cups; '
  - type: text
    content: that
  - type: text
    content: ' which '
  - type: text
    content: was
  - type: text
    content: ' of gold '
  - type: text
    content: in
  - type: text
    content: ' gold, and '
  - type: text
    content: that
  - type: text
    content: ' which '
  - type: text
    content: was
  - type: text
    content: ' of silver '
  - type: text
    content: in
  - type: text
    content: ' silver, took the captain of the guard away. '
  '2':
  - type: text
    content: 'And he did '
  - type: text
    content: that which was
  - type: text
    content: ' evil in the eyes of the '
  - type: text
    content: LORD
  - type: text
    content: ', according to all that Jehoiakim had done. '
  '20':
  - type: text
    content: 'The two pillars, one sea, and twelve brasen bulls that '
  - type: text
    content: were
  - type: text
    content: ' under the bases, which king Solomon had made in the house of the '
  - type: text
    content: LORD
  - type: text
    content: ': the brass of all these vessels was without weight. '
  '21':
  - type: text
    content: 'And '
  - type: text
    content: concerning
  - type: text
    content: ' the pillars, the height of one pillar '
  - type: text
    content: was
  - type: text
    content: ' eighteen cubits; and a fillet of twelve cubits did compass it; and the thickness thereof '
  - type: text
    content: was
  - type: text
    content: ' four fingers: '
  - type: text
    content: it was
  - type: text
    content: ' hollow. '
  '22':
  - type: text
    content: 'And a chapiter of brass '
  - type: text
    content: was
  - type: text
    content: ' upon it; and the height of one chapiter '
  - type: text
    content: was
  - type: text
    content: ' five cubits, with network and pomegranates upon the chapiters round about, all '
  - type: text
    content: of
  - type: text
    content: ' brass. The second pillar also and the pomegranates '
  - type: text
    content: were
  - type: text
    content: ' like unto these. '
  '23':
  - type: text
    content: 'And there were ninety and six pomegranates on a side; '
  - type: text
    content: and
  - type: text
    content: ' all the pomegranates upon the network '
  - type: text
    content: were
  - type: text
    content: ' an hundred round about.'
  '24':
  - type: text
    content: 'And the captain of the guard took Seraiah the chief priest, and Zephaniah the second priest, and the three keepers of the door: '
  '25':
  - type: text
    content: 'he took also out of the city an eunuch, which had the charge of the men of war; and seven men of them that were near the king''s person, which were found in the city; and the principal scribe of the host, who mustered the people of the land; and threescore men of the people of the land, that were found in the midst of the city. '
  '26':
  - type: text
    content: 'So Nebuzar-adan the captain of the guard took them, and brought them to the king of Babylon to Riblah. '
  '27':
  - type: text
    content: And the king of Babylon smote them, and put them to death in Riblah in the land of Hamath. Thus Judah was carried away captive out of his own land.
  '28':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the people whom Nebuchadrezzar carried away captive: in the seventh year three thousand Jews and three and twenty: '
  '29':
  - type: text
    content: 'in the eighteenth year of Nebuchadrezzar he carried away captive from Jerusalem eight hundred thirty and two persons: '
  '3':
  - type: text
    content: 'For through the anger of the '
  - type: text
    content: LORD
  - type: text
    content: ' it came to pass in Jerusalem and Judah, till he had cast them out from his presence, that Zedekiah rebelled against the king of Babylon.'
  '30':
  - type: text
    content: 'in the three and twentieth year of Nebuchadrezzar, Nebuzar-adan the captain of the guard carried away captive of the Jews seven hundred forty and five persons: all the persons '
  - type: text
    content: were
  - type: text
    content: ' four thousand and six hundred.'
  '31':
  - type: text
    content: 'And it came to pass in the seven and thirtieth year of the captivity of Jehoiachin king of Judah, in the twelfth month, in the five and twentieth '
  - type: text
    content: day
  - type: text
    content: ' of the month, '
  - type: text
    content: that
  - type: text
    content: ' Evil-merodach king of Babylon in the '
  - type: text
    content: first
  - type: text
    content: ' year of his reign lifted up the head of Jehoiachin king of Judah, and brought him forth out of prison, '
  '32':
  - type: text
    content: 'and spake kindly unto him, and set his throne above the throne of the kings that '
  - type: text
    content: were
  - type: text
    content: ' with him in Babylon, '
  '33':
  - type: text
    content: 'and changed his prison garments: and he did continually eat bread before him all the days of his life. '
  '34':
  - type: text
    content: 'And '
  - type: text
    content: for
  - type: text
    content: ' his diet, there was a continual diet given him of the king of Babylon, every day a portion until the day of his death, all the days of his life.'
  '4':
  - type: text
    content: 'And it came to pass in the ninth year of his reign, in the tenth month, in the tenth '
  - type: text
    content: day
  - type: text
    content: ' of the month, '
  - type: text
    content: that
  - type: text
    content: ' Nebuchadrezzar king of Babylon came, he and all his army, against Jerusalem, and pitched against it, and built forts against it round about. '
  '5':
  - type: text
    content: 'So the city was besieged unto the eleventh year of king Zedekiah. '
  '6':
  - type: text
    content: 'And in the fourth month, in the ninth '
  - type: text
    content: day
  - type: text
    content: ' of the month, the famine was sore in the city, so that there was no bread for the people of the land. '
  '7':
  - type: text
    content: 'Then the city was broken up, and all the men of war fled, and went forth out of the city by night by the way of the gate between the two walls, which '
  - type: text
    content: was
  - type: text
    content: ' by the king''s garden; (now the Chaldeans '
  - type: text
    content: were
  - type: text
    content: ' by the city round about:) and they went by the way of the plain. '
  '8':
  - type: text
    content: 'But the army of the Chaldeans pursued after the king, and overtook Zedekiah in the plains of Jericho; and all his army was scattered from him. '
  '9':
  - type: text
    content: 'Then they took the king, and carried him up unto the king of Babylon to Riblah in the land of Hamath; where he gave judgment upon him. '
