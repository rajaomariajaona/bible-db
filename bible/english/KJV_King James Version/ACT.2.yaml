document_id: ACT.2,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'And when the day of Pentecost was fully come, they were all with one accord in one place. '
  '10':
  - type: text
    content: 'Phrygia, and Pamphylia, in Egypt, and in the parts of Libya about Cyrene, and strangers of Rome, Jews and proselytes, '
  '11':
  - type: text
    content: 'Cretes and Arabians, we do hear them speak in our tongues the wonderful works of God. '
  '12':
  - type: text
    content: 'And they were all amazed, and were in doubt, saying one to another, What meaneth this? '
  '13':
  - type: text
    content: Others mocking said, These men are full of new wine.
  - type: heading
    content: Peter's Explanation
  '14':
  - type: text
    content: 'But Peter, standing up with the eleven, lifted up his voice, and said unto them, Ye men of Judæa, and all '
  - type: text
    content: ye
  - type: text
    content: ' that dwell at Jerusalem, be this known unto you, and hearken to my words: '
  '15':
  - type: text
    content: 'For these are not drunken, as ye suppose, seeing it is '
  - type: text
    content: but
  - type: text
    content: ' the third hour of the day. '
  '16':
  - type: text
    content: But this is that which was spoken by the prophet Joel;
  '17':
  - type: text
    content: And it shall come to pass in the last days, saith God,
  - type: text
    content: 'I will pour out of my Spirit upon all flesh:'
  - type: text
    content: And your sons and your daughters shall prophesy,
  - type: text
    content: And your young men shall see visions,
  - type: text
    content: 'And your old men shall dream dreams:'
  '18':
  - type: text
    content: And on my servants and on my handmaidens
  - type: text
    content: 'I will pour out in those days of my Spirit; and they shall prophesy:'
  '19':
  - type: text
    content: And I will shew wonders in heaven above,
  - type: text
    content: And signs in the earth beneath;
  - type: text
    content: 'Blood, and fire, and vapour of smoke:'
  '2':
  - type: text
    content: 'And suddenly there came a sound from heaven as of a rushing mighty wind, and it filled all the house where they were sitting. '
  '20':
  - type: text
    content: The sun shall be turned into darkness,
  - type: text
    content: And the moon into blood,
  - type: text
    content: Before that great and notable
  - type: text
    content: 'Day of the Lord come:'
  '21':
  - type: text
    content: 'And it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ' whosoever shall call on the name of the Lord shall be saved.'
  '22':
  - type: text
    content: 'Ye men of Israel, hear these words; Jesus of Nazareth, a man approved of God among you by miracles and wonders and signs, which God did by him in the midst of you, as ye yourselves also know: '
  '23':
  - type: text
    content: 'him, being delivered by the determinate counsel and foreknowledge of God, ye have taken, and by wicked hands have crucified and slain: '
  '24':
  - type: text
    content: 'whom God hath raised up, having loosed the pains of death: because it was not possible that he should be holden of it. '
  '25':
  - type: text
    content: For David speaketh concerning him,
  - type: text
    content: I foresaw the Lord always before my face,
  - type: text
    content: 'For he is on my right hand, that I should not be moved:'
  '26':
  - type: text
    content: Therefore did my heart rejoice, and my tongue was glad;
  - type: text
    content: 'Moreover also my flesh shall rest in hope:'
  '27':
  - type: text
    content: Because thou wilt not leave my soul in hell,
  - type: text
    content: Neither wilt thou suffer thine Holy One to see corruption.
  '28':
  - type: text
    content: Thou hast made known to me the ways of life;
  - type: text
    content: Thou shalt make me full of joy with thy countenance.
  '29':
  - type: text
    content: 'Men '
  - type: text
    content: and
  - type: text
    content: ' brethren, let me freely speak unto you of the patriarch David, that he is both dead and buried, and his sepulchre is with us unto this day. '
  '3':
  - type: text
    content: 'And there appeared unto them cloven tongues like as of fire, and it sat upon each of them. '
  '30':
  - type: text
    content: 'Therefore being a prophet, and knowing that God had sworn with an oath to him, that of the fruit of his loins, according to the flesh, he would raise up Christ to sit on his throne; '
  '31':
  - type: text
    content: 'he seeing this before spake of the resurrection of Christ, that his soul was not left in hell, neither his flesh did see corruption. '
  '32':
  - type: text
    content: 'This Jesus hath God raised up, whereof we all are witnesses. '
  '33':
  - type: text
    content: 'Therefore being by the right hand of God exalted, and having received of the Father the promise of the Holy Ghost, he hath shed forth this, which ye now see and hear. '
  '34':
  - type: text
    content: 'For David is not ascended into the heavens: but he saith himself,'
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' said unto my Lord, Sit thou on my right hand,'
  '35':
  - type: text
    content: Until I make thy foes thy footstool.
  '36':
  - type: text
    content: Therefore let all the house of Israel know assuredly, that God hath made that same Jesus, whom ye have crucified, both Lord and Christ.
  '37':
  - type: text
    content: 'Now when they heard '
  - type: text
    content: this
  - type: text
    content: ', they were pricked in their heart, and said unto Peter and to the rest of the apostles, Men '
  - type: text
    content: and
  - type: text
    content: ' brethren, what shall we do? '
  '38':
  - type: text
    content: 'Then Peter said unto them, Repent, and be baptized every one of you in the name of Jesus Christ for the remission of sins, and ye shall receive the gift of the Holy Ghost. '
  '39':
  - type: text
    content: 'For the promise is unto you, and to your children, and to all that are afar off, '
  - type: text
    content: even
  - type: text
    content: ' as many as the Lord our God shall call. '
  '4':
  - type: text
    content: And they were all filled with the Holy Ghost, and began to speak with other tongues, as the Spirit gave them utterance.
  '40':
  - type: text
    content: And with many other words did he testify and exhort, saying, Save yourselves from this untoward generation.
  '41':
  - type: text
    content: 'Then they that gladly received his word were baptized: and the same day there were added '
  - type: text
    content: unto them
  - type: text
    content: ' about three thousand souls. '
  '42':
  - type: text
    content: And they continued stedfastly in the apostles' doctrine and fellowship, and in breaking of bread, and in prayers.
  '43':
  - type: text
    content: 'And fear came upon every soul: and many wonders and signs were done by the apostles. '
  '44':
  - type: text
    content: 'And all that believed were together, and had all things common; '
  '45':
  - type: text
    content: 'and sold their possessions and goods, and parted them to all '
  - type: text
    content: men
  - type: text
    content: ', as every man had need. '
  '46':
  - type: text
    content: 'And they, continuing daily with one accord in the temple, and breaking bread from house to house, did eat their meat with gladness and singleness of heart, '
  '47':
  - type: text
    content: praising God, and having favour with all the people. And the Lord added to the church daily such as should be saved.
  '5':
  - type: text
    content: 'And there were dwelling at Jerusalem Jews, devout men, out of every nation under heaven. '
  '6':
  - type: text
    content: 'Now when this was noised abroad, the multitude came together, and were confounded, because that every man heard them speak in his own language. '
  '7':
  - type: text
    content: 'And they were all amazed and marvelled, saying one to another, Behold, are not all these which speak Galilæans? '
  '8':
  - type: text
    content: 'And how hear we every man in our own tongue, wherein we were born? '
  '9':
  - type: text
    content: 'Parthians, and Medes, and Elamites, and the dwellers in Mesopotamia, and in Judæa, and Cappadocia, in Pontus, and Asia, '
