document_id: ACT.2,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the day of Pentecost was fully come, they were all with one accord in one place. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Phrygia, and Pamphylia, in Egypt, and in the parts of Libya about Cyrene, and strangers of Rome, Jews and proselytes, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cretes and Arabians, we do hear them speak in our tongues the wonderful works of God. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they were all amazed, and were in doubt, saying one to another, What meaneth this? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Others mocking said, These men are full of new wine.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Peter's Explanation
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Peter, standing up with the eleven, lifted up his voice, and said unto them, Ye men of Judæa, and all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ye
    - type: text
      text: ' that dwell at Jerusalem, be this known unto you, and hearken to my words: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For these are not drunken, as ye suppose, seeing it is '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' the third hour of the day. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But this is that which was spoken by the prophet Joel;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And it shall come to pass in the last days, saith God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will pour out of my Spirit upon all flesh:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your sons and your daughters shall prophesy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your young men shall see visions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And your old men shall dream dreams:'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And on my servants and on my handmaidens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will pour out in those days of my Spirit; and they shall prophesy:'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will shew wonders in heaven above,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And signs in the earth beneath;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Blood, and fire, and vapour of smoke:'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And suddenly there came a sound from heaven as of a rushing mighty wind, and it filled all the house where they were sitting. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sun shall be turned into darkness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the moon into blood,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before that great and notable
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Day of the Lord come:'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And it shall come to pass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' whosoever shall call on the name of the Lord shall be saved.'
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ye men of Israel, hear these words; Jesus of Nazareth, a man approved of God among you by miracles and wonders and signs, which God did by him in the midst of you, as ye yourselves also know: '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'him, being delivered by the determinate counsel and foreknowledge of God, ye have taken, and by wicked hands have crucified and slain: '
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'whom God hath raised up, having loosed the pains of death: because it was not possible that he should be holden of it. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: For David speaketh concerning him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I foresaw the Lord always before my face,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For he is on my right hand, that I should not be moved:'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore did my heart rejoice, and my tongue was glad;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Moreover also my flesh shall rest in hope:'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because thou wilt not leave my soul in hell,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Neither wilt thou suffer thine Holy One to see corruption.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thou hast made known to me the ways of life;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thou shalt make me full of joy with thy countenance.
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Men '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' brethren, let me freely speak unto you of the patriarch David, that he is both dead and buried, and his sepulchre is with us unto this day. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there appeared unto them cloven tongues like as of fire, and it sat upon each of them. '
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Therefore being a prophet, and knowing that God had sworn with an oath to him, that of the fruit of his loins, according to the flesh, he would raise up Christ to sit on his throne; '
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'he seeing this before spake of the resurrection of Christ, that his soul was not left in hell, neither his flesh did see corruption. '
  '32':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This Jesus hath God raised up, whereof we all are witnesses. '
  '33':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Therefore being by the right hand of God exalted, and having received of the Father the promise of the Holy Ghost, he hath shed forth this, which ye now see and hear. '
  '34':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For David is not ascended into the heavens: but he saith himself,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto my Lord, Sit thou on my right hand,'
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Until I make thy foes thy footstool.
  '36':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Therefore let all the house of Israel know assuredly, that God hath made that same Jesus, whom ye have crucified, both Lord and Christ.
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when they heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ', they were pricked in their heart, and said unto Peter and to the rest of the apostles, Men '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' brethren, what shall we do? '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Peter said unto them, Repent, and be baptized every one of you in the name of Jesus Christ for the remission of sins, and ye shall receive the gift of the Holy Ghost. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the promise is unto you, and to your children, and to all that are afar off, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' as many as the Lord our God shall call. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they were all filled with the Holy Ghost, and began to speak with other tongues, as the Spirit gave them utterance.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And with many other words did he testify and exhort, saying, Save yourselves from this untoward generation.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they that gladly received his word were baptized: and the same day there were added '
    - type: usfm
      marker: add
      children:
      - type: text
        text: unto them
    - type: text
      text: ' about three thousand souls. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they continued stedfastly in the apostles' doctrine and fellowship, and in breaking of bread, and in prayers.
  '43':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And fear came upon every soul: and many wonders and signs were done by the apostles. '
  '44':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And all that believed were together, and had all things common; '
  '45':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'and sold their possessions and goods, and parted them to all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ', as every man had need. '
  '46':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And they, continuing daily with one accord in the temple, and breaking bread from house to house, did eat their meat with gladness and singleness of heart, '
  '47':
  - type: usfm
    marker: m
    children:
    - type: text
      text: praising God, and having favour with all the people. And the Lord added to the church daily such as should be saved.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there were dwelling at Jerusalem Jews, devout men, out of every nation under heaven. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when this was noised abroad, the multitude came together, and were confounded, because that every man heard them speak in his own language. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they were all amazed and marvelled, saying one to another, Behold, are not all these which speak Galilæans? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And how hear we every man in our own tongue, wherein we were born? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parthians, and Medes, and Elamites, and the dwellers in Mesopotamia, and in Judæa, and Cappadocia, in Pontus, and Asia, '
