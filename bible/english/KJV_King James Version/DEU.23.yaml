document_id: DEU.23,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He that is wounded in the stones, or hath his privy member cut off, shall not enter into the congregation of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If there be among you any man, that is not clean by reason of uncleanness that chanceth him by night, then shall he go abroad out of the camp, he shall not come within the camp: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but it shall be, when evening cometh on, he shall wash '
    - type: usfm
      marker: add
      children:
      - type: text
        text: himself
    - type: text
      text: ' with water: and when the sun is down, he shall come into the camp '
    - type: usfm
      marker: add
      children:
      - type: text
        text: again
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt have a place also without the camp, whither thou shalt go forth abroad: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and thou shalt have a paddle upon thy weapon; and it shall be, when thou wilt ease thyself abroad, thou shalt dig therewith, and shalt turn back and cover that which cometh from thee: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God walketh in the midst of thy camp, to deliver thee, and to give up thine enemies before thee; therefore shall thy camp be holy: that he see no unclean thing in thee, and turn away from thee.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt not deliver unto his master the servant which is escaped from his master unto thee: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'he shall dwell with thee, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' among you, in that place which he shall choose in one of thy gates, where it liketh him best: thou shalt not oppress him.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There shall be no whore of the daughters of Israel, nor a sodomite of the sons of Israel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt not bring the hire of a whore, or the price of a dog, into the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God for any vow: for even both these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' abomination unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt not lend upon usury to thy brother; usury of money, usury of victuals, usury of any thing that is lent upon usury: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A bastard shall not enter into the congregation of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; even to his tenth generation shall he not enter into the congregation of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'unto a stranger thou mayest lend upon usury; but unto thy brother thou shalt not lend upon usury: that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God may bless thee in all that thou settest thine hand to in the land whither thou goest to possess it.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When thou shalt vow a vow unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God, thou shalt not slack to pay it: for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God will surely require it of thee; and it would be sin in thee. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if thou shalt forbear to vow, it shall be no sin in thee. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That which is gone out of thy lips thou shalt keep and perform; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' a freewill offering, according as thou hast vowed unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God, which thou hast promised with thy mouth.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When thou comest into thy neighbour''s vineyard, then thou mayest eat grapes thy fill at thine own pleasure; but thou shalt not put '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' in thy vessel. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When thou comest into the standing corn of thy neighbour, then thou mayest pluck the ears with thine hand; but thou shalt not move a sickle unto thy neighbour's standing corn.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'An Ammonite or Moabite shall not enter into the congregation of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; even to their tenth generation shall they not enter into the congregation of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' for ever: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because they met you not with bread and with water in the way, when ye came forth out of Egypt; and because they hired against thee Balaam the son of Beor of Pethor of Mesopotamia, to curse thee. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nevertheless the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God would not hearken unto Balaam; but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God turned the curse into a blessing unto thee, because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God loved thee. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thou shalt not seek their peace nor their prosperity all thy days for ever.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt not abhor an Edomite; for he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy brother: thou shalt not abhor an Egyptian; because thou wast a stranger in his land. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The children that are begotten of them shall enter into the congregation of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in their third generation.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the host goeth forth against thine enemies, then keep thee from every wicked thing. '
