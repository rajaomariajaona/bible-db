verses:
  '1':
  - type: text
    content: 'He that is wounded in the stones, or hath his privy member cut off, shall not enter into the congregation of the '
  - type: text
    content: LORD
  - type: text
    content: .
  '10':
  - type: text
    content: 'If there be among you any man, that is not clean by reason of uncleanness that chanceth him by night, then shall he go abroad out of the camp, he shall not come within the camp: '
  '11':
  - type: text
    content: 'but it shall be, when evening cometh on, he shall wash '
  - type: text
    content: himself
  - type: text
    content: ' with water: and when the sun is down, he shall come into the camp '
  - type: text
    content: again
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Thou shalt have a place also without the camp, whither thou shalt go forth abroad: '
  '13':
  - type: text
    content: 'and thou shalt have a paddle upon thy weapon; and it shall be, when thou wilt ease thyself abroad, thou shalt dig therewith, and shalt turn back and cover that which cometh from thee: '
  '14':
  - type: text
    content: 'for the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God walketh in the midst of thy camp, to deliver thee, and to give up thine enemies before thee; therefore shall thy camp be holy: that he see no unclean thing in thee, and turn away from thee.'
  '15':
  - type: text
    content: 'Thou shalt not deliver unto his master the servant which is escaped from his master unto thee: '
  '16':
  - type: text
    content: 'he shall dwell with thee, '
  - type: text
    content: even
  - type: text
    content: ' among you, in that place which he shall choose in one of thy gates, where it liketh him best: thou shalt not oppress him.'
  '17':
  - type: text
    content: 'There shall be no whore of the daughters of Israel, nor a sodomite of the sons of Israel. '
  '18':
  - type: text
    content: 'Thou shalt not bring the hire of a whore, or the price of a dog, into the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God for any vow: for even both these '
  - type: text
    content: are
  - type: text
    content: ' abomination unto the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God.'
  '19':
  - type: text
    content: 'Thou shalt not lend upon usury to thy brother; usury of money, usury of victuals, usury of any thing that is lent upon usury: '
  '2':
  - type: text
    content: 'A bastard shall not enter into the congregation of the '
  - type: text
    content: LORD
  - type: text
    content: '; even to his tenth generation shall he not enter into the congregation of the '
  - type: text
    content: LORD
  - type: text
    content: .
  '20':
  - type: text
    content: 'unto a stranger thou mayest lend upon usury; but unto thy brother thou shalt not lend upon usury: that the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God may bless thee in all that thou settest thine hand to in the land whither thou goest to possess it.'
  '21':
  - type: text
    content: 'When thou shalt vow a vow unto the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God, thou shalt not slack to pay it: for the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God will surely require it of thee; and it would be sin in thee. '
  '22':
  - type: text
    content: 'But if thou shalt forbear to vow, it shall be no sin in thee. '
  '23':
  - type: text
    content: 'That which is gone out of thy lips thou shalt keep and perform; '
  - type: text
    content: even
  - type: text
    content: ' a freewill offering, according as thou hast vowed unto the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God, which thou hast promised with thy mouth.'
  '24':
  - type: text
    content: 'When thou comest into thy neighbour''s vineyard, then thou mayest eat grapes thy fill at thine own pleasure; but thou shalt not put '
  - type: text
    content: any
  - type: text
    content: ' in thy vessel. '
  '25':
  - type: text
    content: When thou comest into the standing corn of thy neighbour, then thou mayest pluck the ears with thine hand; but thou shalt not move a sickle unto thy neighbour's standing corn.
  '3':
  - type: text
    content: 'An Ammonite or Moabite shall not enter into the congregation of the '
  - type: text
    content: LORD
  - type: text
    content: '; even to their tenth generation shall they not enter into the congregation of the '
  - type: text
    content: LORD
  - type: text
    content: ' for ever: '
  '4':
  - type: text
    content: 'because they met you not with bread and with water in the way, when ye came forth out of Egypt; and because they hired against thee Balaam the son of Beor of Pethor of Mesopotamia, to curse thee. '
  '5':
  - type: text
    content: 'Nevertheless the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God would not hearken unto Balaam; but the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God turned the curse into a blessing unto thee, because the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God loved thee. '
  '6':
  - type: text
    content: Thou shalt not seek their peace nor their prosperity all thy days for ever.
  '7':
  - type: text
    content: 'Thou shalt not abhor an Edomite; for he '
  - type: text
    content: is
  - type: text
    content: ' thy brother: thou shalt not abhor an Egyptian; because thou wast a stranger in his land. '
  '8':
  - type: text
    content: 'The children that are begotten of them shall enter into the congregation of the '
  - type: text
    content: LORD
  - type: text
    content: ' in their third generation.'
  '9':
  - type: text
    content: 'When the host goeth forth against thine enemies, then keep thee from every wicked thing. '
