document_id: EZK.47,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The River of Life
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Afterward he brought me again unto the door of the house; and, behold, waters issued out from under the threshold of the house eastward: for the forefront of the house '
    - type: usfm
      marker: add
      children:
      - type: text
        text: stood toward
    - type: text
      text: ' the east, and the waters came down from under from the right side of the house, at the south '
    - type: usfm
      marker: add
      children:
      - type: text
        text: side
    - type: text
      text: ' of the altar. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And it shall come to pass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the fishers shall stand upon it from En-gedi even unto En-eglaim; they shall be a '
    - type: usfm
      marker: add
      children:
      - type: text
        text: place
    - type: text
      text: ' to spread forth nets; their fish shall be according to their kinds, as the fish of the great sea, exceeding many. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But the miry places thereof and the marishes thereof shall not be healed; they shall be given to salt. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And by the river upon the bank thereof, on this side and on that side, shall grow all trees for meat, whose leaf shall not fade, neither shall the fruit thereof be consumed: it shall bring forth new fruit according to his months, because their waters they issued out of the sanctuary: and the fruit thereof shall be for meat, and the leaf thereof for medicine.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Boundaries of the Land
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' the border, whereby ye shall inherit the land according to the twelve tribes of Israel: Joseph '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall have two
    - type: text
      text: ' portions. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And ye shall inherit it, one as well as another: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: concerning
    - type: text
      text: ' the which I lifted up mine hand to give it unto your fathers: and this land shall fall unto you for inheritance.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' the border of the land toward the north side, from the great sea, the way of Hethlon, as men go to Zedad; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Hamath, Berothah, Sibraim, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' between the border of Damascus and the border of Hamath; Hazar-hatticon, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' by the coast of Hauran. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And the border from the sea shall be Hazar-enan, the border of Damascus, and the north northward, and the border of Hamath. And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this is
    - type: text
      text: ' the north side. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And the east side ye shall measure from Hauran, and from Damascus, and from Gilead, and from the land of Israel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: by
    - type: text
      text: ' Jordan, from the border unto the east sea. And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this is
    - type: text
      text: ' the east side. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And the south side southward, from Tamar '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' to the waters of strife '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' Kadesh, the river to the great sea. And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this is
    - type: text
      text: ' the south side southward. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Then brought he me out of the way of the gate northward, and led me about the way without unto the utter gate by the way that looketh eastward; and, behold, there ran out waters on the right side.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The west side also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' the great sea from the border, till a man come over against Hamath. This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the west side.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'So shall ye divide this land unto you according to the tribes of Israel. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And it shall come to pass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' ye shall divide it by lot for an inheritance unto you, and to the strangers that sojourn among you, which shall beget children among you: and they shall be unto you as born in the country among the children of Israel; they shall have inheritance with you among the tribes of Israel. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And it shall come to pass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' in what tribe the stranger sojourneth, there shall ye give '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' his inheritance, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And when the man that had the line in his hand went forth eastward, he measured a thousand cubits, and he brought me through the waters; the waters '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' to the ankles. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Again he measured a thousand, and brought me through the waters; the waters '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' to the knees. Again he measured a thousand, and brought me through; the waters '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' to the loins. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Afterward he measured a thousand; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and it was
    - type: text
      text: ' a river that I could not pass over: for the waters were risen, waters to swim in, a river that could not be passed over.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And he said unto me, Son of man, hast thou seen '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this?
    - type: text
      text: ' Then he brought me, and caused me to return to the brink of the river. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Now when I had returned, behold, at the bank of the river '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' very many trees on the one side and on the other. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then said he unto me, These waters issue out toward the east country, and go down into the desert, and go into the sea: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which being
    - type: text
      text: ' brought forth into the sea, the waters shall be healed. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And it shall come to pass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' every thing that liveth, which moveth, whithersoever the rivers shall come, shall live: and there shall be a very great multitude of fish, because these waters shall come thither: for they shall be healed; and every thing shall live whither the river cometh. '
