verses:
  '1':
  - type: heading
    content: The River of Life
  - type: text
    content: 'Afterward he brought me again unto the door of the house; and, behold, waters issued out from under the threshold of the house eastward: for the forefront of the house '
  - type: text
    content: stood toward
  - type: text
    content: ' the east, and the waters came down from under from the right side of the house, at the south '
  - type: text
    content: side
  - type: text
    content: ' of the altar. '
  '10':
  - type: text
    content: 'And it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ' the fishers shall stand upon it from En-gedi even unto En-eglaim; they shall be a '
  - type: text
    content: place
  - type: text
    content: ' to spread forth nets; their fish shall be according to their kinds, as the fish of the great sea, exceeding many. '
  '11':
  - type: text
    content: 'But the miry places thereof and the marishes thereof shall not be healed; they shall be given to salt. '
  '12':
  - type: text
    content: 'And by the river upon the bank thereof, on this side and on that side, shall grow all trees for meat, whose leaf shall not fade, neither shall the fruit thereof be consumed: it shall bring forth new fruit according to his months, because their waters they issued out of the sanctuary: and the fruit thereof shall be for meat, and the leaf thereof for medicine.'
  - type: heading
    content: Boundaries of the Land
  '13':
  - type: text
    content: 'Thus saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: '; This '
  - type: text
    content: shall be
  - type: text
    content: ' the border, whereby ye shall inherit the land according to the twelve tribes of Israel: Joseph '
  - type: text
    content: shall have two
  - type: text
    content: ' portions. '
  '14':
  - type: text
    content: 'And ye shall inherit it, one as well as another: '
  - type: text
    content: concerning
  - type: text
    content: ' the which I lifted up mine hand to give it unto your fathers: and this land shall fall unto you for inheritance.'
  '15':
  - type: text
    content: 'And this '
  - type: text
    content: shall be
  - type: text
    content: ' the border of the land toward the north side, from the great sea, the way of Hethlon, as men go to Zedad; '
  '16':
  - type: text
    content: 'Hamath, Berothah, Sibraim, which '
  - type: text
    content: is
  - type: text
    content: ' between the border of Damascus and the border of Hamath; Hazar-hatticon, which '
  - type: text
    content: is
  - type: text
    content: ' by the coast of Hauran. '
  '17':
  - type: text
    content: 'And the border from the sea shall be Hazar-enan, the border of Damascus, and the north northward, and the border of Hamath. And '
  - type: text
    content: this is
  - type: text
    content: ' the north side. '
  '18':
  - type: text
    content: 'And the east side ye shall measure from Hauran, and from Damascus, and from Gilead, and from the land of Israel '
  - type: text
    content: by
  - type: text
    content: ' Jordan, from the border unto the east sea. And '
  - type: text
    content: this is
  - type: text
    content: ' the east side. '
  '19':
  - type: text
    content: 'And the south side southward, from Tamar '
  - type: text
    content: even
  - type: text
    content: ' to the waters of strife '
  - type: text
    content: in
  - type: text
    content: ' Kadesh, the river to the great sea. And '
  - type: text
    content: this is
  - type: text
    content: ' the south side southward. '
  '2':
  - type: text
    content: Then brought he me out of the way of the gate northward, and led me about the way without unto the utter gate by the way that looketh eastward; and, behold, there ran out waters on the right side.
  '20':
  - type: text
    content: 'The west side also '
  - type: text
    content: shall be
  - type: text
    content: ' the great sea from the border, till a man come over against Hamath. This '
  - type: text
    content: is
  - type: text
    content: ' the west side.'
  '21':
  - type: text
    content: 'So shall ye divide this land unto you according to the tribes of Israel. '
  '22':
  - type: text
    content: 'And it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ' ye shall divide it by lot for an inheritance unto you, and to the strangers that sojourn among you, which shall beget children among you: and they shall be unto you as born in the country among the children of Israel; they shall have inheritance with you among the tribes of Israel. '
  '23':
  - type: text
    content: 'And it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ' in what tribe the stranger sojourneth, there shall ye give '
  - type: text
    content: him
  - type: text
    content: ' his inheritance, saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: .
  '3':
  - type: text
    content: 'And when the man that had the line in his hand went forth eastward, he measured a thousand cubits, and he brought me through the waters; the waters '
  - type: text
    content: were
  - type: text
    content: ' to the ankles. '
  '4':
  - type: text
    content: 'Again he measured a thousand, and brought me through the waters; the waters '
  - type: text
    content: were
  - type: text
    content: ' to the knees. Again he measured a thousand, and brought me through; the waters '
  - type: text
    content: were
  - type: text
    content: ' to the loins. '
  '5':
  - type: text
    content: 'Afterward he measured a thousand; '
  - type: text
    content: and it was
  - type: text
    content: ' a river that I could not pass over: for the waters were risen, waters to swim in, a river that could not be passed over.'
  '6':
  - type: text
    content: 'And he said unto me, Son of man, hast thou seen '
  - type: text
    content: this?
  - type: text
    content: ' Then he brought me, and caused me to return to the brink of the river. '
  '7':
  - type: text
    content: 'Now when I had returned, behold, at the bank of the river '
  - type: text
    content: were
  - type: text
    content: ' very many trees on the one side and on the other. '
  '8':
  - type: text
    content: 'Then said he unto me, These waters issue out toward the east country, and go down into the desert, and go into the sea: '
  - type: text
    content: which being
  - type: text
    content: ' brought forth into the sea, the waters shall be healed. '
  '9':
  - type: text
    content: 'And it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ' every thing that liveth, which moveth, whithersoever the rivers shall come, shall live: and there shall be a very great multitude of fish, because these waters shall come thither: for they shall be healed; and every thing shall live whither the river cometh. '
