document_id: 1CH.17
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The House of the Lord
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now it came to pass, as David sat in his house, that David said to Nathan the prophet, Lo, I dwell in an house of cedars, but the ark of the covenant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: remaineth
  - type: text
    text: ' under curtains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then Nathan said unto David, Do all that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in thine heart; for God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with thee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And it came to pass the same night, that the word of God came to Nathan, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Go and tell David my servant, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Thou shalt not build me an house to dwell in: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'for I have not dwelt in an house since the day that I brought up Israel unto this day; but have gone from tent to tent, and from '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' tabernacle '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to another
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Wheresoever I have walked with all Israel, spake I a word to any of the judges of Israel, whom I commanded to feed my people, saying, Why have ye not built me an house of cedars? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now therefore thus shalt thou say unto my servant David, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, I took thee from the sheepcote, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' from following the sheep, that thou shouldest be ruler over my people Israel: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and I have been with thee whithersoever thou hast walked, and have cut off all thine enemies from before thee, and have made thee a name like the name of the great men that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' in the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Also I will ordain a place for my people Israel, and will plant them, and they shall dwell in their place, and shall be moved no more; neither shall the children of wickedness waste them any more, as at the beginning, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and since the time that I commanded judges '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' over my people Israel. Moreover I will subdue all thine enemies. Furthermore I tell thee that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will build thee an house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And it shall come to pass, when thy days be expired that thou must go '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' with thy fathers, that I will raise up thy seed after thee, which shall be of thy sons; and I will establish his kingdom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'He shall build me an house, and I will stablish his throne for ever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I will be his father, and he shall be my son: and I will not take my mercy away from him, as I took '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' from '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' that was before thee: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'but I will settle him in mine house and in my kingdom for ever: and his throne shall be established for evermore. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: According to all these words, and according to all this vision, so did Nathan speak unto David.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And David the king came and sat before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and said, Who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' I, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God, and what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' mine house, that thou hast brought me hitherto? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yet
  - type: text
    text: ' this was a small thing in thine eyes, O God; for thou hast '
  - type: usfm
    marker: add
    children:
    - type: text
      text: also
  - type: text
    text: ' spoken of thy servant''s house for a great while to come, and hast regarded me according to the estate of a man of high degree, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'What can David '
  - type: usfm
    marker: add
    children:
    - type: text
      text: speak
  - type: text
    text: ' more to thee for the honour of thy servant? for thou knowest thy servant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', for thy servant''s sake, and according to thine own heart, hast thou done all this greatness, in making known all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: these
  - type: text
    text: ' great things. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' none like thee, neither '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is there any
  - type: text
    text: ' God beside thee, according to all that we have heard with our ears. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And what one nation in the earth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' like thy people Israel, whom God went to redeem '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' his own people, to make thee a name of greatness and terribleness, by driving out nations from before thy people, whom thou hast redeemed out of Egypt? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'For thy people Israel didst thou make thine own people for ever; and thou, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', becamest their God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Therefore now, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', let the thing that thou hast spoken concerning thy servant and concerning his house be established for ever, and do as thou hast said. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Let it even be established, that thy name may be magnified for ever, saying, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the God of Israel, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' a God to Israel: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: let
  - type: text
    text: ' the house of David thy servant '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' established before thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'For thou, O my God, hast told thy servant that thou wilt build him an house: therefore thy servant hath found '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in his heart
  - type: text
    text: ' to pray before thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And now, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', thou art God, and hast promised this goodness unto thy servant: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'now therefore let it please thee to bless the house of thy servant, that it may be before thee for ever: for thou blessest, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it shall be
  - type: text
    text: ' blessed for ever.'
