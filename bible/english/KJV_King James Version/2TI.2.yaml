document_id: 2TI.2
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: God's Soldier and Workman
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Thou therefore, my son, be strong in the grace that is in Christ Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the things that thou hast heard of me among many witnesses, the same commit thou to faithful men, who shall be able to teach others also. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Thou therefore endure hardness, as a good soldier of Jesus Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'No man that warreth entangleth himself with the affairs of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' life; that he may please him who hath chosen him to be a soldier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And if a man also strive for masteries, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yet
  - type: text
    text: ' is he not crowned, except he strive lawfully. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The husbandman that laboureth must be first partaker of the fruits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Consider what I say; and the Lord give thee understanding in all things. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Remember that Jesus Christ of the seed of David was raised from the dead according to my gospel: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'wherein I suffer trouble, as an evil doer, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' unto bonds; but the word of God is not bound. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Therefore I endure all things for the elect''s sakes, that they may also obtain the salvation which is in Christ Jesus with eternal glory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' a faithful saying: For if we be dead with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', we shall also live with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'if we suffer, we shall also reign with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ': if we deny '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', he also will deny us: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'if we believe not, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yet
  - type: text
    text: ' he abideth faithful: he cannot deny himself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Of these things put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' in remembrance, charging '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' before the Lord that they strive not about words to no profit, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' to the subverting of the hearers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Study to shew thyself approved unto God, a workman that needeth not to be ashamed, rightly dividing the word of truth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But shun profane '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' vain babblings: for they will increase unto more ungodliness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And their word will eat as doth a canker: of whom is Hymenæus and Philetus; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'who concerning the truth have erred, saying that the resurrection is past already; and overthrow the faith of some. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nevertheless the foundation of God standeth sure, having this seal, The Lord knoweth them that are his. And, Let every one that nameth the name of Christ depart from iniquity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But in a great house there are not only vessels of gold and of silver, but also of wood and of earth; and some to honour, and some to dishonour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'If a man therefore purge himself from these, he shall be a vessel unto honour, sanctified, and meet for the master''s use, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' prepared unto every good work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Flee also youthful lusts: but follow righteousness, faith, charity, peace, with them that call on the Lord out of a pure heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But foolish and unlearned questions avoid, knowing that they do gender strifes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And the servant of the Lord must not strive; but be gentle unto all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ', apt to teach, patient, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'in meekness instructing those that oppose themselves; if God peradventure will give them repentance to the acknowledging of the truth; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' they may recover themselves out of the snare of the devil, who are taken captive by him at his will.'
