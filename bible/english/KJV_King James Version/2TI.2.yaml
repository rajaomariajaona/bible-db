document_id: 2TI.2,1
type_code: eng
verses:
  '1':
  - type: heading
    content: God's Soldier and Workman
  - type: text
    content: 'Thou therefore, my son, be strong in the grace that is in Christ Jesus. '
  '10':
  - type: text
    content: 'Therefore I endure all things for the elect''s sakes, that they may also obtain the salvation which is in Christ Jesus with eternal glory. '
  '11':
  - type: text
    content: It is
  - type: text
    content: ' a faithful saying: For if we be dead with '
  - type: text
    content: him
  - type: text
    content: ', we shall also live with '
  - type: text
    content: him
  - type: text
    content: ': '
  '12':
  - type: text
    content: 'if we suffer, we shall also reign with '
  - type: text
    content: him
  - type: text
    content: ': if we deny '
  - type: text
    content: him
  - type: text
    content: ', he also will deny us: '
  '13':
  - type: text
    content: 'if we believe not, '
  - type: text
    content: yet
  - type: text
    content: ' he abideth faithful: he cannot deny himself.'
  '14':
  - type: text
    content: 'Of these things put '
  - type: text
    content: them
  - type: text
    content: ' in remembrance, charging '
  - type: text
    content: them
  - type: text
    content: ' before the Lord that they strive not about words to no profit, '
  - type: text
    content: but
  - type: text
    content: ' to the subverting of the hearers. '
  '15':
  - type: text
    content: 'Study to shew thyself approved unto God, a workman that needeth not to be ashamed, rightly dividing the word of truth. '
  '16':
  - type: text
    content: 'But shun profane '
  - type: text
    content: and
  - type: text
    content: ' vain babblings: for they will increase unto more ungodliness. '
  '17':
  - type: text
    content: 'And their word will eat as doth a canker: of whom is Hymenæus and Philetus; '
  '18':
  - type: text
    content: 'who concerning the truth have erred, saying that the resurrection is past already; and overthrow the faith of some. '
  '19':
  - type: text
    content: 'Nevertheless the foundation of God standeth sure, having this seal, The Lord knoweth them that are his. And, Let every one that nameth the name of Christ depart from iniquity. '
  '2':
  - type: text
    content: 'And the things that thou hast heard of me among many witnesses, the same commit thou to faithful men, who shall be able to teach others also. '
  '20':
  - type: text
    content: 'But in a great house there are not only vessels of gold and of silver, but also of wood and of earth; and some to honour, and some to dishonour. '
  '21':
  - type: text
    content: 'If a man therefore purge himself from these, he shall be a vessel unto honour, sanctified, and meet for the master''s use, '
  - type: text
    content: and
  - type: text
    content: ' prepared unto every good work. '
  '22':
  - type: text
    content: 'Flee also youthful lusts: but follow righteousness, faith, charity, peace, with them that call on the Lord out of a pure heart. '
  '23':
  - type: text
    content: 'But foolish and unlearned questions avoid, knowing that they do gender strifes. '
  '24':
  - type: text
    content: 'And the servant of the Lord must not strive; but be gentle unto all '
  - type: text
    content: men
  - type: text
    content: ', apt to teach, patient, '
  '25':
  - type: text
    content: 'in meekness instructing those that oppose themselves; if God peradventure will give them repentance to the acknowledging of the truth; '
  '26':
  - type: text
    content: 'and '
  - type: text
    content: that
  - type: text
    content: ' they may recover themselves out of the snare of the devil, who are taken captive by him at his will.'
  '3':
  - type: text
    content: 'Thou therefore endure hardness, as a good soldier of Jesus Christ. '
  '4':
  - type: text
    content: 'No man that warreth entangleth himself with the affairs of '
  - type: text
    content: this
  - type: text
    content: ' life; that he may please him who hath chosen him to be a soldier. '
  '5':
  - type: text
    content: 'And if a man also strive for masteries, '
  - type: text
    content: yet
  - type: text
    content: ' is he not crowned, except he strive lawfully. '
  '6':
  - type: text
    content: 'The husbandman that laboureth must be first partaker of the fruits. '
  '7':
  - type: text
    content: 'Consider what I say; and the Lord give thee understanding in all things. '
  '8':
  - type: text
    content: 'Remember that Jesus Christ of the seed of David was raised from the dead according to my gospel: '
  '9':
  - type: text
    content: 'wherein I suffer trouble, as an evil doer, '
  - type: text
    content: even
  - type: text
    content: ' unto bonds; but the word of God is not bound. '
