document_id: 3JN.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The elder unto the wellbeloved Gaius, whom I love in the truth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Beloved, I wish above all things that thou mayest prosper and be in health, even as thy soul prospereth. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For I rejoiced greatly, when the brethren came and testified of the truth that is in thee, even as thou walkest in the truth. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I have no greater joy than to hear that my children walk in truth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Beloved, thou doest faithfully whatsoever thou doest to the brethren, and to strangers; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'which have borne witness of thy charity before the church: whom if thou bring forward on their journey after a godly sort, thou shalt do well: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'because that for his name''s sake they went forth, taking nothing of the Gentiles. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: We therefore ought to receive such, that we might be fellowhelpers to the truth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'I wrote unto the church: but Diotrephes, who loveth to have the preeminence among them, receiveth us not. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Wherefore, if I come, I will remember his deeds which he doeth, prating against us with malicious words: and not content therewith, neither doth he himself receive the brethren, and forbiddeth them that would, and casteth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' out of the church.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Beloved, follow not that which is evil, but that which is good. He that doeth good is of God: but he that doeth evil hath not seen God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Demetrius hath good report of all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ', and of the truth itself: yea, and we '
  - type: usfm
    marker: add
    children:
    - type: text
      text: also
  - type: text
    text: ' bear record; and ye know that our record is true.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I had many things to write, but I will not with ink and pen write unto thee: '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'but I trust I shall shortly see thee, and we shall speak face to face. Peace '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' to thee. '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Our
  - type: text
    text: ' friends salute thee. Greet the friends by name.'
