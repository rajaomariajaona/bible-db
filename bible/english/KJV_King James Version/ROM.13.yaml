document_id: ROM.13,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Civil and Social Duties
  - type: text
    content: 'Let every soul be subject unto the higher powers. For there is no power but of God: the powers that be are ordained of God. '
  '10':
  - type: text
    content: 'Love worketh no ill to his neighbour: therefore love '
  - type: text
    content: is
  - type: text
    content: ' the fulfilling of the law.'
  '11':
  - type: text
    content: 'And that, knowing the time, that now '
  - type: text
    content: it is
  - type: text
    content: ' high time to awake out of sleep: for now '
  - type: text
    content: is
  - type: text
    content: ' our salvation nearer than when we believed. '
  '12':
  - type: text
    content: 'The night is far spent, the day is at hand: let us therefore cast off the works of darkness, and let us put on the armour of light. '
  '13':
  - type: text
    content: 'Let us walk honestly, as in the day; not in rioting and drunkenness, not in chambering and wantonness, not in strife and envying. '
  '14':
  - type: text
    content: 'But put ye on the Lord Jesus Christ, and make not provision for the flesh, to '
  - type: text
    content: fulfil
  - type: text
    content: ' the lusts '
  - type: text
    content: thereof
  - type: text
    content: .
  '2':
  - type: text
    content: 'Whosoever therefore resisteth the power, resisteth the ordinance of God: and they that resist shall receive to themselves damnation. '
  '3':
  - type: text
    content: 'For rulers are not a terror to good works, but to the evil. Wilt thou then not be afraid of the power? do that which is good, and thou shalt have praise of the same: '
  '4':
  - type: text
    content: 'for he is the minister of God to thee for good. But if thou do that which is evil, be afraid; for he beareth not the sword in vain: for he is the minister of God, a revenger to '
  - type: text
    content: execute
  - type: text
    content: ' wrath upon him that doeth evil. '
  '5':
  - type: text
    content: 'Wherefore '
  - type: text
    content: ye
  - type: text
    content: ' must needs be subject, not only for wrath, but also for conscience sake. '
  '6':
  - type: text
    content: 'For for this cause pay ye tribute also: for they are God''s ministers, attending continually upon this very thing. '
  '7':
  - type: text
    content: 'Render therefore to all their dues: tribute to whom tribute '
  - type: text
    content: is due
  - type: text
    content: '; custom to whom custom; fear to whom fear; honour to whom honour. '
  '8':
  - type: text
    content: 'Owe no man any thing, but to love one another: for he that loveth another hath fulfilled the law. '
  '9':
  - type: text
    content: 'For this, Thou shalt not commit adultery, Thou shalt not kill, Thou shalt not steal, Thou shalt not bear false witness, Thou shalt not covet; and if '
  - type: text
    content: there be
  - type: text
    content: ' any other commandment, it is briefly comprehended in this saying, namely, Thou shalt love thy neighbour as thyself. '
