document_id: ROM.13
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Civil and Social Duties
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Let every soul be subject unto the higher powers. For there is no power but of God: the powers that be are ordained of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Whosoever therefore resisteth the power, resisteth the ordinance of God: and they that resist shall receive to themselves damnation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For rulers are not a terror to good works, but to the evil. Wilt thou then not be afraid of the power? do that which is good, and thou shalt have praise of the same: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'for he is the minister of God to thee for good. But if thou do that which is evil, be afraid; for he beareth not the sword in vain: for he is the minister of God, a revenger to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: execute
  - type: text
    text: ' wrath upon him that doeth evil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Wherefore '
  - type: usfm
    marker: add
    children:
    - type: text
      text: ye
  - type: text
    text: ' must needs be subject, not only for wrath, but also for conscience sake. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For for this cause pay ye tribute also: for they are God''s ministers, attending continually upon this very thing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Render therefore to all their dues: tribute to whom tribute '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is due
  - type: text
    text: '; custom to whom custom; fear to whom fear; honour to whom honour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Owe no man any thing, but to love one another: for he that loveth another hath fulfilled the law. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For this, Thou shalt not commit adultery, Thou shalt not kill, Thou shalt not steal, Thou shalt not bear false witness, Thou shalt not covet; and if '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there be
  - type: text
    text: ' any other commandment, it is briefly comprehended in this saying, namely, Thou shalt love thy neighbour as thyself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Love worketh no ill to his neighbour: therefore love '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the fulfilling of the law.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And that, knowing the time, that now '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' high time to awake out of sleep: for now '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' our salvation nearer than when we believed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The night is far spent, the day is at hand: let us therefore cast off the works of darkness, and let us put on the armour of light. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Let us walk honestly, as in the day; not in rioting and drunkenness, not in chambering and wantonness, not in strife and envying. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But put ye on the Lord Jesus Christ, and make not provision for the flesh, to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: fulfil
  - type: text
    text: ' the lusts '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thereof
  - type: text
    text: .
