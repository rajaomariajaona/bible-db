document_id: LEV.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'If a soul sin, and commit a trespass against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and lie unto his neighbour in that which was delivered him to keep, or in fellowship, or in a thing taken away by violence, or hath deceived his neighbour; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'or have found that which was lost, and lieth concerning it, and sweareth falsely; in any of all these that a man doeth, sinning therein: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'then it shall be, because he hath sinned, and is guilty, that he shall restore that which he took violently away, or the thing which he hath deceitfully gotten, or that which was delivered him to keep, or the lost thing which he found, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'or all that about which he hath sworn falsely; he shall even restore it in the principal, and shall add the fifth part more thereto, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' give it unto him to whom it appertaineth, in the day of his trespass offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he shall bring his trespass offering unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', a ram without blemish out of the flock, with thy estimation, for a trespass offering, unto the priest: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and the priest shall make an atonement for him before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': and it shall be forgiven him for any thing of all that he hath done in trespassing therein.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Directions to Priests
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Command Aaron and his sons, saying, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the law of the burnt offering: It '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the burnt offering, because of the burning upon the altar all night unto the morning, and the fire of the altar shall be burning in it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the priest shall put on his linen garment, and his linen breeches shall he put upon his flesh, and take up the ashes which the fire hath consumed with the burnt offering on the altar, and he shall put them beside the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And he shall put off his garments, and put on other garments, and carry forth the ashes without the camp unto a clean place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And the fire upon the altar shall be burning in it; it shall not be put out: and the priest shall burn wood on it every morning, and lay the burnt offering in order upon it; and he shall burn thereon the fat of the peace offerings. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The fire shall ever be burning upon the altar; it shall never go out.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the law of the meat offering: the sons of Aaron shall offer it before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', before the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And he shall take of it his handful, of the flour of the meat offering, and of the oil thereof, and all the frankincense which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon the meat offering, and shall burn '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon the altar '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' a sweet savour, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the memorial of it, unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the remainder thereof shall Aaron and his sons eat: with unleavened bread shall it be eaten in the holy place; in the court of the tabernacle of the congregation they shall eat it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'It shall not be baken with leaven. I have given it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unto them for
  - type: text
    text: ' their portion of my offerings made by fire; it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' most holy, as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the sin offering, and as the trespass offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'All the males among the children of Aaron shall eat of it. '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It shall be
  - type: text
    text: ' a statute for ever in your generations concerning the offerings of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' made by fire: every one that toucheth them shall be holy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the offering of Aaron and of his sons, which they shall offer unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' in the day when he is anointed; the tenth part of an ephah of fine flour for a meat offering perpetual, half of it in the morning, and half thereof at night. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'In a pan it shall be made with oil; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and when it is
  - type: text
    text: ' baken, thou shalt bring it in: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the baken pieces of the meat offering shalt thou offer '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' a sweet savour unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And the priest of his sons that is anointed in his stead shall offer it: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' a statute for ever unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; it shall be wholly burnt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For every meat offering for the priest shall be wholly burnt: it shall not be eaten.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Speak unto Aaron and to his sons, saying, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the law of the sin offering: In the place where the burnt offering is killed shall the sin offering be killed before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' most holy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The priest that offereth it for sin shall eat it: in the holy place shall it be eaten, in the court of the tabernacle of the congregation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Whatsoever shall touch the flesh thereof shall be holy: and when there is sprinkled of the blood thereof upon any garment, thou shalt wash that whereon it was sprinkled in the holy place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'But the earthen vessel wherein it is sodden shall be broken: and if it be sodden in a brasen pot, it shall be both scoured, and rinsed in water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'All the males among the priests shall eat thereof: it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' most holy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And no sin offering, whereof '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' of the blood is brought into the tabernacle of the congregation to reconcile '
  - type: usfm
    marker: add
    children:
    - type: text
      text: withal
  - type: text
    text: ' in the holy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: place
  - type: text
    text: ', shall be eaten: it shall be burnt in the fire.'
