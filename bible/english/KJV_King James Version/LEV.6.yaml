verses:
  '1':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '10':
  - type: text
    content: 'And the priest shall put on his linen garment, and his linen breeches shall he put upon his flesh, and take up the ashes which the fire hath consumed with the burnt offering on the altar, and he shall put them beside the altar. '
  '11':
  - type: text
    content: 'And he shall put off his garments, and put on other garments, and carry forth the ashes without the camp unto a clean place. '
  '12':
  - type: text
    content: 'And the fire upon the altar shall be burning in it; it shall not be put out: and the priest shall burn wood on it every morning, and lay the burnt offering in order upon it; and he shall burn thereon the fat of the peace offerings. '
  '13':
  - type: text
    content: The fire shall ever be burning upon the altar; it shall never go out.
  '14':
  - type: text
    content: 'And this '
  - type: text
    content: is
  - type: text
    content: ' the law of the meat offering: the sons of Aaron shall offer it before the '
  - type: text
    content: LORD
  - type: text
    content: ', before the altar. '
  '15':
  - type: text
    content: 'And he shall take of it his handful, of the flour of the meat offering, and of the oil thereof, and all the frankincense which '
  - type: text
    content: is
  - type: text
    content: ' upon the meat offering, and shall burn '
  - type: text
    content: it
  - type: text
    content: ' upon the altar '
  - type: text
    content: for
  - type: text
    content: ' a sweet savour, '
  - type: text
    content: even
  - type: text
    content: ' the memorial of it, unto the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'And the remainder thereof shall Aaron and his sons eat: with unleavened bread shall it be eaten in the holy place; in the court of the tabernacle of the congregation they shall eat it. '
  '17':
  - type: text
    content: 'It shall not be baken with leaven. I have given it '
  - type: text
    content: unto them for
  - type: text
    content: ' their portion of my offerings made by fire; it '
  - type: text
    content: is
  - type: text
    content: ' most holy, as '
  - type: text
    content: is
  - type: text
    content: ' the sin offering, and as the trespass offering. '
  '18':
  - type: text
    content: 'All the males among the children of Aaron shall eat of it. '
  - type: text
    content: It shall be
  - type: text
    content: ' a statute for ever in your generations concerning the offerings of the '
  - type: text
    content: LORD
  - type: text
    content: ' made by fire: every one that toucheth them shall be holy.'
  '19':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '2':
  - type: text
    content: 'If a soul sin, and commit a trespass against the '
  - type: text
    content: LORD
  - type: text
    content: ', and lie unto his neighbour in that which was delivered him to keep, or in fellowship, or in a thing taken away by violence, or hath deceived his neighbour; '
  '20':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the offering of Aaron and of his sons, which they shall offer unto the '
  - type: text
    content: LORD
  - type: text
    content: ' in the day when he is anointed; the tenth part of an ephah of fine flour for a meat offering perpetual, half of it in the morning, and half thereof at night. '
  '21':
  - type: text
    content: 'In a pan it shall be made with oil; '
  - type: text
    content: and when it is
  - type: text
    content: ' baken, thou shalt bring it in: '
  - type: text
    content: and
  - type: text
    content: ' the baken pieces of the meat offering shalt thou offer '
  - type: text
    content: for
  - type: text
    content: ' a sweet savour unto the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'And the priest of his sons that is anointed in his stead shall offer it: '
  - type: text
    content: it is
  - type: text
    content: ' a statute for ever unto the '
  - type: text
    content: LORD
  - type: text
    content: '; it shall be wholly burnt. '
  '23':
  - type: text
    content: 'For every meat offering for the priest shall be wholly burnt: it shall not be eaten.'
  '24':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '25':
  - type: text
    content: 'Speak unto Aaron and to his sons, saying, This '
  - type: text
    content: is
  - type: text
    content: ' the law of the sin offering: In the place where the burnt offering is killed shall the sin offering be killed before the '
  - type: text
    content: LORD
  - type: text
    content: ': it '
  - type: text
    content: is
  - type: text
    content: ' most holy. '
  '26':
  - type: text
    content: 'The priest that offereth it for sin shall eat it: in the holy place shall it be eaten, in the court of the tabernacle of the congregation. '
  '27':
  - type: text
    content: 'Whatsoever shall touch the flesh thereof shall be holy: and when there is sprinkled of the blood thereof upon any garment, thou shalt wash that whereon it was sprinkled in the holy place. '
  '28':
  - type: text
    content: 'But the earthen vessel wherein it is sodden shall be broken: and if it be sodden in a brasen pot, it shall be both scoured, and rinsed in water. '
  '29':
  - type: text
    content: 'All the males among the priests shall eat thereof: it '
  - type: text
    content: is
  - type: text
    content: ' most holy. '
  '3':
  - type: text
    content: 'or have found that which was lost, and lieth concerning it, and sweareth falsely; in any of all these that a man doeth, sinning therein: '
  '30':
  - type: text
    content: 'And no sin offering, whereof '
  - type: text
    content: any
  - type: text
    content: ' of the blood is brought into the tabernacle of the congregation to reconcile '
  - type: text
    content: withal
  - type: text
    content: ' in the holy '
  - type: text
    content: place
  - type: text
    content: ', shall be eaten: it shall be burnt in the fire.'
  '4':
  - type: text
    content: 'then it shall be, because he hath sinned, and is guilty, that he shall restore that which he took violently away, or the thing which he hath deceitfully gotten, or that which was delivered him to keep, or the lost thing which he found, '
  '5':
  - type: text
    content: 'or all that about which he hath sworn falsely; he shall even restore it in the principal, and shall add the fifth part more thereto, '
  - type: text
    content: and
  - type: text
    content: ' give it unto him to whom it appertaineth, in the day of his trespass offering. '
  '6':
  - type: text
    content: 'And he shall bring his trespass offering unto the '
  - type: text
    content: LORD
  - type: text
    content: ', a ram without blemish out of the flock, with thy estimation, for a trespass offering, unto the priest: '
  '7':
  - type: text
    content: 'and the priest shall make an atonement for him before the '
  - type: text
    content: LORD
  - type: text
    content: ': and it shall be forgiven him for any thing of all that he hath done in trespassing therein.'
  - type: heading
    content: Directions to Priests
  '8':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '9':
  - type: text
    content: 'Command Aaron and his sons, saying, This '
  - type: text
    content: is
  - type: text
    content: ' the law of the burnt offering: It '
  - type: text
    content: is
  - type: text
    content: ' the burnt offering, because of the burning upon the altar all night unto the morning, and the fire of the altar shall be burning in it. '
