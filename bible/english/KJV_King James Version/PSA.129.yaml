  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Song of degrees.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Many a time have they afflicted me from my youth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'May Israel now say:'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Many a time have they afflicted me from my youth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yet they have not prevailed against me.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The plowers plowed upon my back:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They made long their furrows.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' righteous:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He hath cut asunder the cords of the wicked.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Let them all be confounded and turned back
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That hate Zion.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Let them be as the grass '
    - type: usfm
      marker: add
      children:
      - type: text
        text: upon
    - type: text
      text: ' the housetops,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Which withereth afore it groweth up:'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Wherewith the mower filleth not his hand;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor he that bindeth sheaves his bosom.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Neither do they which go by say, the blessing of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' upon you:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'We bless you in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
