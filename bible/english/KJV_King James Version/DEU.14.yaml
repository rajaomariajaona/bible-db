document_id: DEU.14
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the children of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God: ye shall not cut yourselves, nor make any baldness between your eyes for the dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' an holy people unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath chosen thee to be a peculiar people unto himself, above all the nations that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' upon the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Thou shalt not eat any abominable thing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the beasts which ye shall eat: the ox, the sheep, and the goat, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'the hart, and the roebuck, and the fallow deer, and the wild goat, and the pygarg, and the wild ox, and the chamois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And every beast that parteth the hoof, and cleaveth the cleft into two claws, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' cheweth the cud among the beasts, that ye shall eat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nevertheless these ye shall not eat of them that chew the cud, or of them that divide the cloven hoof; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' the camel, and the hare, and the coney: for they chew the cud, but divide not the hoof; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: therefore
  - type: text
    text: ' they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' unclean unto you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the swine, because it divideth the hoof, yet cheweth not the cud, it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' unclean unto you: ye shall not eat of their flesh, nor touch their dead carcase. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'These ye shall eat of all that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' in the waters: all that have fins and scales shall ye eat: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and whatsoever hath not fins and scales ye may not eat; it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' unclean unto you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Of
  - type: text
    text: ' all clean birds ye shall eat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are they
  - type: text
    text: ' of which ye shall not eat: the eagle, and the ossifrage, and the ospray, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and the glede, and the kite, and the vulture after his kind, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and every raven after his kind, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and the owl, and the night hawk, and the cuckow, and the hawk after his kind, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'the little owl, and the great owl, and the swan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'and the pelican, and the gier eagle, and the cormorant, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and the stork, and the heron after her kind, and the lapwing, and the bat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And every creeping thing that flieth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' unclean unto you: they shall not be eaten. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: add
    children:
    - type: text
      text: But of
  - type: text
    text: ' all clean fowls ye may eat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ye shall not eat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' any thing that dieth of itself: thou shalt give it unto the stranger that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in thy gates, that he may eat it; or thou mayest sell it unto an alien: for thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' an holy people unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God. Thou shalt not seethe a kid in his mother''s milk.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Thou shalt truly tithe all the increase of thy seed, that the field bringeth forth year by year. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And thou shalt eat before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, in the place which he shall choose to place his name there, the tithe of thy corn, of thy wine, and of thine oil, and the firstlings of thy herds and of thy flocks; that thou mayest learn to fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God always. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And if the way be too long for thee, so that thou art not able to carry it; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: or
  - type: text
    text: ' if the place be too far from thee, which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God shall choose to set his name there, when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God hath blessed thee: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'then shalt thou turn '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' into money, and bind up the money in thine hand, and shalt go unto the place which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God shall choose: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and thou shalt bestow that money for whatsoever thy soul lusteth after, for oxen, or for sheep, or for wine, or for strong drink, or for whatsoever thy soul desireth: and thou shalt eat there before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, and thou shalt rejoice, thou, and thine household, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'and the Levite that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' within thy gates; thou shalt not forsake him; for he hath no part nor inheritance with thee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'At the end of three years thou shalt bring forth all the tithe of thine increase the same year, and shalt lay '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' up within thy gates: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'and the Levite, (because he hath no part nor inheritance with thee,) and the stranger, and the fatherless, and the widow, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' within thy gates, shall come, and shall eat and be satisfied; that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God may bless thee in all the work of thine hand which thou doest.'
