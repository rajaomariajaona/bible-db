document_id: ISA.21
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The burden of the desert of the sea.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'As whirlwinds in the south pass through; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' it cometh from the desert, from a terrible land. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'A grievous vision is declared unto me; the treacherous dealer dealeth treacherously, and the spoiler spoileth. Go up, O Elam: besiege, O Media; all the sighing thereof have I made to cease. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Therefore are my loins filled with pain: pangs have taken hold upon me, as the pangs of a woman that travaileth: I was bowed down at the hearing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of it
  - type: text
    text: '; I was dismayed at the seeing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of it
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'My heart panted, fearfulness affrighted me: the night of my pleasure hath he turned into fear unto me. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Prepare the table, watch in the watchtower, eat, drink: arise, ye princes, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' anoint the shield.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For thus hath the Lord said unto me, Go, set a watchman, let him declare what he seeth. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And he saw a chariot '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' a couple of horsemen, a chariot of asses, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' a chariot of camels; and he hearkened diligently with much heed: '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and he cried, A lion: My lord, I stand continually upon the watchtower in the daytime, and I am set in my ward whole nights: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and, behold, here cometh a chariot of men, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' a couple of horsemen. And he answered and said, Babylon is fallen, is fallen; and all the graven images of her gods he hath broken unto the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'O my threshing, and the corn of my floor: that which I have heard of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, the God of Israel, have I declared unto you.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Dumah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The burden of Dumah.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'He calleth to me out of Seir, Watchman, what of the night? Watchman, what of the night? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The watchman said, The morning cometh, and also the night: if ye will enquire, enquire ye: return, come.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Arabia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The burden upon Arabia.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'In the forest in Arabia shall ye lodge, O ye travelling companies of Dedanim. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The inhabitants of the land of Tema brought water to him that was thirsty, they prevented with their bread him that fled. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For they fled from the swords, from the drawn sword, and from the bent bow, and from the grievousness of war. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For thus hath the Lord said unto me, Within a year, according to the years of an hireling, and all the glory of Kedar shall fail: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'and the residue of the number of archers, the mighty men of the children of Kedar, shall be diminished: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel hath spoken '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: .
