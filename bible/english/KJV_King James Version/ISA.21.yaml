document_id: ISA.21,1
type_code: eng
verses:
  '1':
  - type: text
    content: The burden of the desert of the sea.
  - type: text
    content: 'As whirlwinds in the south pass through; '
  - type: text
    content: so
  - type: text
    content: ' it cometh from the desert, from a terrible land. '
  '10':
  - type: text
    content: 'O my threshing, and the corn of my floor: that which I have heard of the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, the God of Israel, have I declared unto you.'
  - type: heading
    content: Dumah
  '11':
  - type: text
    content: The burden of Dumah.
  - type: text
    content: 'He calleth to me out of Seir, Watchman, what of the night? Watchman, what of the night? '
  '12':
  - type: text
    content: 'The watchman said, The morning cometh, and also the night: if ye will enquire, enquire ye: return, come.'
  - type: heading
    content: Arabia
  '13':
  - type: text
    content: The burden upon Arabia.
  - type: text
    content: 'In the forest in Arabia shall ye lodge, O ye travelling companies of Dedanim. '
  '14':
  - type: text
    content: 'The inhabitants of the land of Tema brought water to him that was thirsty, they prevented with their bread him that fled. '
  '15':
  - type: text
    content: 'For they fled from the swords, from the drawn sword, and from the bent bow, and from the grievousness of war. '
  '16':
  - type: text
    content: 'For thus hath the Lord said unto me, Within a year, according to the years of an hireling, and all the glory of Kedar shall fail: '
  '17':
  - type: text
    content: 'and the residue of the number of archers, the mighty men of the children of Kedar, shall be diminished: for the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel hath spoken '
  - type: text
    content: it
  - type: text
    content: .
  '2':
  - type: text
    content: 'A grievous vision is declared unto me; the treacherous dealer dealeth treacherously, and the spoiler spoileth. Go up, O Elam: besiege, O Media; all the sighing thereof have I made to cease. '
  '3':
  - type: text
    content: 'Therefore are my loins filled with pain: pangs have taken hold upon me, as the pangs of a woman that travaileth: I was bowed down at the hearing '
  - type: text
    content: of it
  - type: text
    content: '; I was dismayed at the seeing '
  - type: text
    content: of it
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'My heart panted, fearfulness affrighted me: the night of my pleasure hath he turned into fear unto me. '
  '5':
  - type: text
    content: 'Prepare the table, watch in the watchtower, eat, drink: arise, ye princes, '
  - type: text
    content: and
  - type: text
    content: ' anoint the shield.'
  '6':
  - type: text
    content: 'For thus hath the Lord said unto me, Go, set a watchman, let him declare what he seeth. '
  '7':
  - type: text
    content: 'And he saw a chariot '
  - type: text
    content: with
  - type: text
    content: ' a couple of horsemen, a chariot of asses, '
  - type: text
    content: and
  - type: text
    content: ' a chariot of camels; and he hearkened diligently with much heed: '
  '8':
  - type: text
    content: 'and he cried, A lion: My lord, I stand continually upon the watchtower in the daytime, and I am set in my ward whole nights: '
  '9':
  - type: text
    content: 'and, behold, here cometh a chariot of men, '
  - type: text
    content: with
  - type: text
    content: ' a couple of horsemen. And he answered and said, Babylon is fallen, is fallen; and all the graven images of her gods he hath broken unto the ground.'
