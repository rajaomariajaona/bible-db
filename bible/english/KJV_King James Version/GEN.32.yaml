  - type: text
    content: 'And Jacob went on his way, and the angels of God met him. '
  '10':
  - type: text
    content: 'I am not worthy of the least of all the mercies, and of all the truth, which thou hast shewed unto thy servant; for with my staff I passed over this Jordan; and now I am become two bands. '
  '11':
