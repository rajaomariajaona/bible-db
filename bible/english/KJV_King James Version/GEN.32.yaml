document_id: GEN.32
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Jacob and Esau
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Jacob went on his way, and the angels of God met him. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And when Jacob saw them, he said, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' God''s host: and he called the name of that place Mahanaim.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Jacob sent messengers before him to Esau his brother unto the land of Seir, the country of Edom. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And he commanded them, saying, Thus shall ye speak unto my lord Esau; Thy servant Jacob saith thus, I have sojourned with Laban, and stayed there until now: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and I have oxen, and asses, flocks, and menservants, and womenservants: and I have sent to tell my lord, that I may find grace in thy sight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the messengers returned to Jacob, saying, We came to thy brother Esau, and also he cometh to meet thee, and four hundred men with him. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then Jacob was greatly afraid and distressed: and he divided the people that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' with him, and the flocks, and herds, and the camels, into two bands; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: and said, If Esau come to the one company, and smite it, then the other company which is left shall escape.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And Jacob said, O God of my father Abraham, and God of my father Isaac, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' which saidst unto me, Return unto thy country, and to thy kindred, and I will deal well with thee: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I am not worthy of the least of all the mercies, and of all the truth, which thou hast shewed unto thy servant; for with my staff I passed over this Jordan; and now I am become two bands. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Deliver me, I pray thee, from the hand of my brother, from the hand of Esau: for I fear him, lest he will come and smite me, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the mother with the children. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And thou saidst, I will surely do thee good, and make thy seed as the sand of the sea, which cannot be numbered for multitude.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And he lodged there that same night; and took of that which came to his hand a present for Esau his brother; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'two hundred she goats, and twenty he goats, two hundred ewes, and twenty rams, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'thirty milch camels with their colts, forty kine, and ten bulls, twenty she asses, and ten foals. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And he delivered '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' into the hand of his servants, every drove by themselves; and said unto his servants, Pass over before me, and put a space betwixt drove and drove. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And he commanded the foremost, saying, When Esau my brother meeteth thee, and asketh thee, saying, Whose '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' thou? and whither goest thou? and whose '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' these before thee? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then thou shalt say, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: They be
  - type: text
    text: ' thy servant Jacob''s; it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a present sent unto my lord Esau: and, behold, also he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' behind us. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And so commanded he the second, and the third, and all that followed the droves, saying, On this manner shall ye speak unto Esau, when ye find him. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And say ye moreover, Behold, thy servant Jacob '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' behind us. For he said, I will appease him with the present that goeth before me, and afterward I will see his face; peradventure he will accept of me. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So went the present over before him: and himself lodged that night in the company.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And he rose up that night, and took his two wives, and his two womenservants, and his eleven sons, and passed over the ford Jabbok. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And he took them, and sent them over the brook, and sent over that he had. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And Jacob was left alone; and there wrestled a man with him until the breaking of the day. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And when he saw that he prevailed not against him, he touched the hollow of his thigh; and the hollow of Jacob''s thigh was out of joint, as he wrestled with him. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And he said, Let me go, for the day breaketh. And he said, I will not let thee go, except thou bless me. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And he said unto him, What '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy name? And he said, Jacob. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And he said, Thy name shall be called no more Jacob, but Israel: for as a prince hast thou power with God and with men, and hast prevailed. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And Jacob asked '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', and said, Tell '
  - type: usfm
    marker: add
    children:
    - type: text
      text: me
  - type: text
    text: ', I pray thee, thy name. And he said, Wherefore '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' thou dost ask after my name? And he blessed him there. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And Jacob called the name of the place Peniel: for I have seen God face to face, and my life is preserved. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And as he passed over Penuel the sun rose upon him, and he halted upon his thigh. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Therefore the children of Israel eat not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' the sinew which shrank, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon the hollow of the thigh, unto this day: because he touched the hollow of Jacob''s thigh in the sinew that shrank.'
