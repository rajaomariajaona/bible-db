document_id: 2CH.18
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now Jehoshaphat had riches and honour in abundance, and joined affinity with Ahab. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And after '
  - type: usfm
    marker: add
    children:
    - type: text
      text: certain
  - type: text
    text: ' years he went down to Ahab to Samaria. And Ahab killed sheep and oxen for him in abundance, and for the people that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he had
  - type: text
    text: ' with him, and persuaded him to go up '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with him
  - type: text
    text: ' to Ramoth-gilead. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Ahab king of Israel said unto Jehoshaphat king of Judah, Wilt thou go with me to Ramoth-gilead? And he answered him, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' as thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ', and my people as thy people; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: we will be
  - type: text
    text: ' with thee in the war.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Prophecy of Micaiah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Jehoshaphat said unto the king of Israel, Enquire, I pray thee, at the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' to day. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Therefore the king of Israel gathered together of prophets four hundred men, and said unto them, Shall we go to Ramoth-gilead to battle, or shall I forbear? And they said, Go up; for God will deliver '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' into the king''s hand. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But Jehoshaphat said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is there
  - type: text
    text: ' not here a prophet of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' besides, that we might enquire of him? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the king of Israel said unto Jehoshaphat, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' yet one man, by whom we may enquire of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': but I hate him; for he never prophesied good unto me, but always evil: the same '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Micaiah the son of Imla. And Jehoshaphat said, Let not the king say so. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the king of Israel called for one '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of his
  - type: text
    text: ' officers, and said, Fetch quickly Micaiah the son of Imla. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the king of Israel and Jehoshaphat king of Judah sat either of them on his throne, clothed in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' robes, and they sat in a void place at the entering in of the gate of Samaria; and all the prophets prophesied before them. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Zedekiah the son of Chenaanah had made him horns of iron, and said, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', With these thou shalt push Syria until they be consumed. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And all the prophets prophesied so, saying, Go up to Ramoth-gilead, and prosper: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall deliver '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' into the hand of the king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And the messenger that went to call Micaiah spake to him, saying, Behold, the words of the prophets '
  - type: usfm
    marker: add
    children:
    - type: text
      text: declare
  - type: text
    text: ' good to the king with one assent; let thy word therefore, I pray thee, be like one of their''s, and speak thou good. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Micaiah said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' liveth, even what my God saith, that will I speak. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And when he was come to the king, the king said unto him, Micaiah, shall we go to Ramoth-gilead to battle, or shall I forbear? And he said, Go ye up, and prosper, and they shall be delivered into your hand. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the king said to him, How many times shall I adjure thee that thou say nothing but the truth to me in the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then he said, I did see all Israel scattered upon the mountains, as sheep that have no shepherd: and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said, These have no master; let them return '
  - type: usfm
    marker: add
    children:
    - type: text
      text: therefore
  - type: text
    text: ' every man to his house in peace. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the king of Israel said to Jehoshaphat, Did I not tell thee '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' he would not prophesy good unto me, but evil? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Again he said, Therefore hear the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; I saw the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' sitting upon his throne, and all the host of heaven standing on his right hand and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: on
  - type: text
    text: ' his left. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said, Who shall entice Ahab king of Israel, that he may go up and fall at Ramoth-gilead? And one spake saying after this manner, and another saying after that manner. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then there came out a spirit, and stood before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and said, I will entice him. And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto him, Wherewith? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And he said, I will go out, and be a lying spirit in the mouth of all his prophets. And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
  - type: text
    text: ' said, Thou shalt entice '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', and thou shalt also prevail: go out, and do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' so. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Now therefore, behold, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath put a lying spirit in the mouth of these thy prophets, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath spoken evil against thee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then Zedekiah the son of Chenaanah came near, and smote Micaiah upon the cheek, and said, Which way went the Spirit of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' from me to speak unto thee? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And Micaiah said, Behold, thou shalt see on that day when thou shalt go into an inner chamber to hide thyself. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then the king of Israel said, Take ye Micaiah, and carry him back to Amon the governor of the city, and to Joash the king''s son; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and say, Thus saith the king, Put this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: fellow
  - type: text
    text: ' in the prison, and feed him with bread of affliction and with water of affliction, until I return in peace. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And Micaiah said, If thou certainly return in peace, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' hath not the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spoken by me. And he said, Hearken, all ye people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'So the king of Israel and Jehoshaphat the king of Judah went up to Ramoth-gilead. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And the king of Israel said unto Jehoshaphat, I will disguise myself, and will go to the battle; but put thou on thy robes. So the king of Israel disguised himself; and they went to the battle. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Now the king of Syria had commanded the captains of the chariots that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with him, saying, Fight ye not with small or great, save only with the king of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And it came to pass, when the captains of the chariots saw Jehoshaphat, that they said, It '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the king of Israel. Therefore they compassed about him to fight: but Jehoshaphat cried out, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' helped him; and God moved them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to depart
  - type: text
    text: ' from him. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'For it came to pass, that, when the captains of the chariots perceived that it was not the king of Israel, they turned back again from pursuing him. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And a '
  - type: usfm
    marker: add
    children:
    - type: text
      text: certain
  - type: text
    text: ' man drew a bow at a venture, and smote the king of Israel between the joints of the harness: therefore he said to his chariot man, Turn thine hand, that thou mayest carry me out of the host; for I am wounded. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And the battle increased that day: howbeit the king of Israel stayed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: himself
  - type: text
    text: ' up in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' chariot against the Syrians until the even: and about the time of the sun going down he died.'
