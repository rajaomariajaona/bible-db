document_id: EZK.35,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Land to be Restored
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came unto me, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because thou hast said, These two nations and these two countries shall be mine, and we will possess it; whereas the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was there: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'therefore, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' I live, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ', I will even do according to thine anger, and according to thine envy which thou hast used out of thy hatred against them; and I will make myself known among them, when I have judged thee. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And thou shalt know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and that
    - type: text
      text: ' I have heard all thy blasphemies which thou hast spoken against the mountains of Israel, saying, They are laid desolate, they are given us to consume. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus with your mouth ye have boasted against me, and have multiplied your words against me: I have heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; When the whole earth rejoiceth, I will make thee desolate. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As thou didst rejoice at the inheritance of the house of Israel, because it was desolate, so will I do unto thee: thou shalt be desolate, O mount Seir, and all Idumea, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' all of it: and they shall know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Son of man, set thy face against mount Seir, and prophesy against it, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and say unto it, Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; Behold, O mount Seir, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' against thee, and I will stretch out mine hand against thee, and I will make thee most desolate. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will lay thy cities waste, and thou shalt be desolate, and thou shalt know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because thou hast had a perpetual hatred, and hast shed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the blood of
    - type: text
      text: ' the children of Israel by the force of the sword in the time of their calamity, in the time '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that their
    - type: text
      text: ' iniquity '
    - type: usfm
      marker: add
      children:
      - type: text
        text: had
    - type: text
      text: ' an end: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'therefore, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' I live, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ', I will prepare thee unto blood, and blood shall pursue thee: sith thou hast not hated blood, even blood shall pursue thee. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus will I make mount Seir most desolate, and cut off from it him that passeth out and him that returneth. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will fill his mountains with his slain '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'men:'
    - type: text
      text: ' in thy hills, and in thy valleys, and in all thy rivers, shall they fall that are slain with the sword. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will make thee perpetual desolations, and thy cities shall not return: and ye shall know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
