document_id: 1CH.22
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Plans for the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then David said, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God, and this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the altar of the burnt offering for Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And David commanded to gather together the strangers that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in the land of Israel; and he set masons to hew wrought stones to build the house of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And David prepared iron in abundance for the nails for the doors of the gates, and for the joinings; and brass in abundance without weight; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'also cedar trees in abundance: for the Zidonians and they of Tyre brought much cedar wood to David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And David said, Solomon my son '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' young and tender, and the house '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' to be builded for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: must be
  - type: text
    text: ' exceeding magnifical, of fame and of glory throughout all countries: I will '
  - type: usfm
    marker: add
    children:
    - type: text
      text: therefore
  - type: text
    text: ' now make preparation for it. So David prepared abundantly before his death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then he called for Solomon his son, and charged him to build an house for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And David said to Solomon, My son, as for me, it was in my mind to build an house unto the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' my God: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'but the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came to me, saying, Thou hast shed blood abundantly, and hast made great wars: thou shalt not build an house unto my name, because thou hast shed much blood upon the earth in my sight. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Behold, a son shall be born to thee, who shall be a man of rest; and I will give him rest from all his enemies round about: for his name shall be Solomon, and I will give peace and quietness unto Israel in his days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'He shall build an house for my name; and he shall be my son, and I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: will be
  - type: text
    text: ' his father; and I will establish the throne of his kingdom over Israel for ever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now, my son, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' be with thee; and prosper thou, and build the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, as he hath said of thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Only the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' give thee wisdom and understanding, and give thee charge concerning Israel, that thou mayest keep the law of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then shalt thou prosper, if thou takest heed to fulfil the statutes and judgments which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' charged Moses with concerning Israel: be strong, and of good courage; dread not, nor be dismayed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now, behold, in my trouble I have prepared for the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' an hundred thousand talents of gold, and a thousand thousand talents of silver; and of brass and iron without weight; for it is in abundance: timber also and stone have I prepared; and thou mayest add thereto. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Moreover '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there are
  - type: text
    text: ' workmen with thee in abundance, hewers and workers of stone and timber, and all manner of cunning men for every manner of work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Of the gold, the silver, and the brass, and the iron, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no number. Arise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: therefore
  - type: text
    text: ', and be doing, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' be with thee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'David also commanded all the princes of Israel to help Solomon his son, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saying
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' not the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God with you? and hath he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: not
  - type: text
    text: ' given you rest on every side? for he hath given the inhabitants of the land into mine hand; and the land is subdued before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and before his people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now set your heart and your soul to seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God; arise therefore, and build ye the sanctuary of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God, to bring the ark of the covenant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and the holy vessels of God, into the house that is to be built to the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
