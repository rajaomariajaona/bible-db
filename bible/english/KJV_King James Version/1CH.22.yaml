  - type: text
    content: 'Then David said, This '
  - type: text
    content: is
  - type: text
    content: ' the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' God, and this '
  - type: text
    content: is
  - type: text
    content: ' the altar of the burnt offering for Israel.'
  '10':
  - type: text
    content: 'He shall build an house for my name; and he shall be my son, and I '
  - type: text
    content: will be
  - type: text
    content: ' his father; and I will establish the throne of his kingdom over Israel for ever. '
  '11':
  - type: text
    content: 'Now, my son, the '
  - type: text
    content: LORD
  - type: text
    content: ' be with thee; and prosper thou, and build the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God, as he hath said of thee. '
  '12':
  - type: text
    content: 'Only the '
  - type: text
    content: LORD
  - type: text
    content: ' give thee wisdom and understanding, and give thee charge concerning Israel, that thou mayest keep the law of the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God. '
  '13':
  - type: text
    content: 'Then shalt thou prosper, if thou takest heed to fulfil the statutes and judgments which the '
  - type: text
    content: LORD
  - type: text
    content: ' charged Moses with concerning Israel: be strong, and of good courage; dread not, nor be dismayed. '
  '14':
  - type: text
    content: 'Now, behold, in my trouble I have prepared for the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' an hundred thousand talents of gold, and a thousand thousand talents of silver; and of brass and iron without weight; for it is in abundance: timber also and stone have I prepared; and thou mayest add thereto. '
  '15':
  - type: text
    content: 'Moreover '
  - type: text
    content: there are
  - type: text
    content: ' workmen with thee in abundance, hewers and workers of stone and timber, and all manner of cunning men for every manner of work. '
  '16':
  - type: text
    content: 'Of the gold, the silver, and the brass, and the iron, '
  - type: text
    content: there is
  - type: text
    content: ' no number. Arise '
  - type: text
    content: therefore
  - type: text
    content: ', and be doing, and the '
  - type: text
    content: LORD
  - type: text
    content: ' be with thee.'
  '17':
  - type: text
    content: 'David also commanded all the princes of Israel to help Solomon his son, '
  - type: text
    content: saying
  - type: text
    content: ', '
  '18':
  - type: text
    content: Is
  - type: text
    content: ' not the '
  - type: text
    content: LORD
  - type: text
    content: ' your God with you? and hath he '
  - type: text
    content: not
  - type: text
    content: ' given you rest on every side? for he hath given the inhabitants of the land into mine hand; and the land is subdued before the '
  - type: text
    content: LORD
  - type: text
    content: ', and before his people. '
  '19':
  - type: text
    content: 'Now set your heart and your soul to seek the '
  - type: text
    content: LORD
  - type: text
    content: ' your God; arise therefore, and build ye the sanctuary of the '
  - type: text
    content: LORD
  - type: text
    content: ' God, to bring the ark of the covenant of the '
  - type: text
    content: LORD
  - type: text
    content: ', and the holy vessels of God, into the house that is to be built to the name of the '
  - type: text
    content: LORD
  - type: text
    content: .
  '2':
  - type: text
    content: 'And David commanded to gather together the strangers that '
  - type: text
    content: were
  - type: text
    content: ' in the land of Israel; and he set masons to hew wrought stones to build the house of God. '
  '3':
  - type: text
    content: 'And David prepared iron in abundance for the nails for the doors of the gates, and for the joinings; and brass in abundance without weight; '
  '4':
  - type: text
    content: 'also cedar trees in abundance: for the Zidonians and they of Tyre brought much cedar wood to David. '
  '5':
  - type: text
    content: 'And David said, Solomon my son '
  - type: text
    content: is
  - type: text
    content: ' young and tender, and the house '
  - type: text
    content: that is
  - type: text
    content: ' to be builded for the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: must be
  - type: text
    content: ' exceeding magnifical, of fame and of glory throughout all countries: I will '
  - type: text
    content: therefore
  - type: text
    content: ' now make preparation for it. So David prepared abundantly before his death.'
  '6':
  - type: text
    content: 'Then he called for Solomon his son, and charged him to build an house for the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel. '
  '7':
  - type: text
    content: 'And David said to Solomon, My son, as for me, it was in my mind to build an house unto the name of the '
  - type: text
    content: LORD
  - type: text
    content: ' my God: '
  '8':
  - type: text
    content: 'but the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came to me, saying, Thou hast shed blood abundantly, and hast made great wars: thou shalt not build an house unto my name, because thou hast shed much blood upon the earth in my sight. '
  '9':
  - type: text
    content: 'Behold, a son shall be born to thee, who shall be a man of rest; and I will give him rest from all his enemies round about: for his name shall be Solomon, and I will give peace and quietness unto Israel in his days. '
