  - type: text
    content: is
  - type: text
    content: ' the house that ye build unto me? and where '
  - type: text
    content: is
  - type: text
    content: ' the place of my rest? '
  '10':
  - type: text
    content: 'Rejoice ye with Jerusalem, and be glad with her, all ye that love her: rejoice for joy with her, all ye that mourn for her: '
  '11':
  - type: text
    content: 'that ye may suck, and be satisfied with the breasts of her consolations; that ye may milk out, and be delighted with the abundance of her glory. '
  '12':
  - type: text
    content: 'For thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', Behold, I will extend peace to her like a river, and the glory of the Gentiles like a flowing stream: then shall ye suck, ye shall be borne upon '
  - type: text
    content: her
  - type: text
    content: ' sides, and be dandled upon '
  - type: text
    content: her
  - type: text
    content: ' knees. '
  '13':
  - type: text
    content: 'As one whom his mother comforteth, so will I comfort you; and ye shall be comforted in Jerusalem. '
  '14':
  - type: text
    content: 'And when ye see '
  - type: text
    content: this
  - type: text
    content: ', your heart shall rejoice, and your bones shall flourish like an herb: and the hand of the '
  - type: text
    content: LORD
  - type: text
    content: ' shall be known toward his servants, and '
  - type: text
    content: his
  - type: text
    content: ' indignation toward his enemies.'
  '15':
  - type: text
    content: 'For, behold, the '
  - type: text
    content: LORD
  - type: text
    content: ' will come with fire, and with his chariots like a whirlwind, to render his anger with fury, and his rebuke with flames of fire. '
  '16':
  - type: text
    content: 'For by fire and by his sword will the '
  - type: text
    content: LORD
  - type: text
    content: ' plead with all flesh: and the slain of the '
  - type: text
    content: LORD
  - type: text
    content: ' shall be many. '
  '17':
  - type: text
    content: 'They that sanctify themselves, and purify themselves in the gardens behind one '
  - type: text
    content: tree
  - type: text
    content: ' in the midst, eating swine''s flesh, and the abomination, and the mouse, shall be consumed together, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '18':
  - type: text
    content: 'For I '
  - type: text
