  '19':
  - type: text
    content: 'And I will set a sign among them, and I will send those that escape of them unto the nations, '
  - type: text
    content: to
  - type: text
    content: ' Tarshish, Pul, and Lud, that draw the bow, '
  - type: text
    content: to
  - type: text
    content: ' Tubal, and Javan, '
  - type: text
    content: to
  - type: text
    content: ' the isles afar off, that have not heard my fame, neither have seen my glory; and they shall declare my glory among the Gentiles. '
  '2':
  - type: text
    content: 'For all those '
  - type: text
    content: things
  - type: text
    content: ' hath mine hand made, and all those '
  - type: text
    content: things
  - type: text
    content: ' have been, saith the '
  - type: text
    content: LORD
  - type: text
    content: ': but to this '
  - type: text
    content: man
  - type: text
