document_id: ISA.66
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', The heaven '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my throne, and the earth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my footstool: where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the house that ye build unto me? and where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the place of my rest? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For all those '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' hath mine hand made, and all those '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' have been, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': but to this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' will I look, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him that is
  - type: text
    text: ' poor and of a contrite spirit, and trembleth at my word. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He that killeth an ox '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is as if
  - type: text
    text: ' he slew a man; he that sacrificeth a lamb, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as if
  - type: text
    text: ' he cut off a dog''s neck; he that offereth an oblation, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as if he offered
  - type: text
    text: ' swine''s blood; he that burneth incense, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as if
  - type: text
    text: ' he blessed an idol. Yea, they have chosen their own ways, and their soul delighteth in their abominations. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I also will choose their delusions, and will bring their fears upon them; because when I called, none did answer; when I spake, they did not hear: but they did evil before mine eyes, and chose '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' in which I delighted not.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hear the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', ye that tremble at his word; Your brethren that hated you, that cast you out for my name''s sake, said, Let the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' be glorified: but he shall appear to your joy, and they shall be ashamed. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'A voice of noise from the city, a voice from the temple, a voice of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' that rendereth recompence to his enemies. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Before she travailed, she brought forth; before her pain came, she was delivered of a man child. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Who hath heard such a thing? who hath seen such things? Shall the earth be made to bring forth in one day? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: or
  - type: text
    text: ' shall a nation be born at once? for as soon as Zion travailed, she brought forth her children. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Shall I bring to the birth, and not cause to bring forth? saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': shall I cause to bring forth, and shut '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the womb?
  - type: text
    text: ' saith thy God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Rejoice ye with Jerusalem, and be glad with her, all ye that love her: rejoice for joy with her, all ye that mourn for her: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'that ye may suck, and be satisfied with the breasts of her consolations; that ye may milk out, and be delighted with the abundance of her glory. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Behold, I will extend peace to her like a river, and the glory of the Gentiles like a flowing stream: then shall ye suck, ye shall be borne upon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her
  - type: text
    text: ' sides, and be dandled upon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her
  - type: text
    text: ' knees. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'As one whom his mother comforteth, so will I comfort you; and ye shall be comforted in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And when ye see '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ', your heart shall rejoice, and your bones shall flourish like an herb: and the hand of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall be known toward his servants, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' indignation toward his enemies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For, behold, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will come with fire, and with his chariots like a whirlwind, to render his anger with fury, and his rebuke with flames of fire. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For by fire and by his sword will the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' plead with all flesh: and the slain of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall be many. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'They that sanctify themselves, and purify themselves in the gardens behind one '
  - type: usfm
    marker: add
    children:
    - type: text
      text: tree
  - type: text
    text: ' in the midst, eating swine''s flesh, and the abomination, and the mouse, shall be consumed together, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: know
  - type: text
    text: ' their works and their thoughts: it shall come, that I will gather all nations and tongues; and they shall come, and see my glory. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And I will set a sign among them, and I will send those that escape of them unto the nations, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to
  - type: text
    text: ' Tarshish, Pul, and Lud, that draw the bow, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to
  - type: text
    text: ' Tubal, and Javan, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to
  - type: text
    text: ' the isles afar off, that have not heard my fame, neither have seen my glory; and they shall declare my glory among the Gentiles. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And they shall bring all your brethren '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' an offering unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' out of all nations upon horses, and in chariots, and in litters, and upon mules, and upon swift beasts, to my holy mountain Jerusalem, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', as the children of Israel bring an offering in a clean vessel into the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And I will also take of them for priests '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' for Levites, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'For as the new heavens and the new earth, which I will make, shall remain before me, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', so shall your seed and your name remain. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And it shall come to pass, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' from one new moon to another, and from one sabbath to another, shall all flesh come to worship before me, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And they shall go forth, and look upon the carcases of the men that have transgressed against me: for their worm shall not die, neither shall their fire be quenched; and they shall be an abhorring unto all flesh.'
