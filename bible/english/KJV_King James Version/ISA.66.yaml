  '20':
  - type: text
    content: 'And they shall bring all your brethren '
  - type: text
    content: for
  - type: text
    content: ' an offering unto the '
  - type: text
    content: LORD
  - type: text
    content: ' out of all nations upon horses, and in chariots, and in litters, and upon mules, and upon swift beasts, to my holy mountain Jerusalem, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', as the children of Israel bring an offering in a clean vessel into the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'And I will also take of them for priests '
  - type: text
    content: and
  - type: text
    content: ' for Levites, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '22':
  - type: text
    content: 'For as the new heavens and the new earth, which I will make, shall remain before me, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', so shall your seed and your name remain. '
  '23':
  - type: text
    content: 'And it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ' from one new moon to another, and from one sabbath to another, shall all flesh come to worship before me, saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'And they shall go forth, and look upon the carcases of the men that have transgressed against me: for their worm shall not die, neither shall their fire be quenched; and they shall be an abhorring unto all flesh.'
  '3':
  - type: text
    content: 'He that killeth an ox '
  - type: text
    content: is as if
  - type: text
    content: ' he slew a man; he that sacrificeth a lamb, '
  - type: text
    content: as if
  - type: text
    content: ' he cut off a dog''s neck; he that offereth an oblation, '
  - type: text
    content: as if he offered
  - type: text
    content: ' swine''s blood; he that burneth incense, '
  - type: text
    content: as if
  - type: text
    content: ' he blessed an idol. Yea, they have chosen their own ways, and their soul delighteth in their abominations. '
  '4':
  - type: text
    content: 'I also will choose their delusions, and will bring their fears upon them; because when I called, none did answer; when I spake, they did not hear: but they did evil before mine eyes, and chose '
  - type: text
    content: that
  - type: text
    content: ' in which I delighted not.'
  '5':
  - type: text
    content: 'Hear the word of the '
  - type: text
    content: LORD
  - type: text
    content: ', ye that tremble at his word; Your brethren that hated you, that cast you out for my name''s sake, said, Let the '
  - type: text
    content: LORD
  - type: text
    content: ' be glorified: but he shall appear to your joy, and they shall be ashamed. '
  '6':
  - type: text
    content: 'A voice of noise from the city, a voice from the temple, a voice of the '
  - type: text
    content: LORD
  - type: text
    content: ' that rendereth recompence to his enemies. '
  '7':
  - type: text
    content: 'Before she travailed, she brought forth; before her pain came, she was delivered of a man child. '
  '8':
  - type: text
    content: 'Who hath heard such a thing? who hath seen such things? Shall the earth be made to bring forth in one day? '
  - type: text
    content: or
  - type: text
    content: ' shall a nation be born at once? for as soon as Zion travailed, she brought forth her children. '
  '9':
  - type: text
    content: 'Shall I bring to the birth, and not cause to bring forth? saith the '
  - type: text
    content: LORD
  - type: text
    content: ': shall I cause to bring forth, and shut '
  - type: text
    content: the womb?
  - type: text
