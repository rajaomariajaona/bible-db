  '17':
  - type: text
    content: 'And I saw an angel standing in the sun; and he cried with a loud voice, saying to all the fowls that fly in the midst of heaven, Come and gather yourselves together unto the supper of the great God; '
  '18':
  - type: text
    content: 'that ye may eat the flesh of kings, and the flesh of captains, and the flesh of mighty men, and the flesh of horses, and of them that sit on them, and the flesh of all '
  - type: text
    content: men
  - type: text
    content: ', '
  - type: text
