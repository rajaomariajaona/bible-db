  - type: text
    content: ' in heaven followed him upon white horses, clothed in fine linen, white and clean. '
  '15':
  - type: text
    content: 'And out of his mouth goeth a sharp sword, that with it he should smite the nations: and he shall rule them with a rod of iron: and he treadeth the winepress of the fierceness and wrath of Almighty God. '
  '16':
  - type: text
    content: 'And he hath on '
  - type: text
    content: his
  - type: text
    content: ' vesture and on his thigh a name written, KING OF KINGS, AND '
  - type: text
    content: Lord
  - type: text
