  - type: text
    content: were
  - type: text
    content: ' many crowns; and he had a name written, that no man knew, but he himself. '
  '13':
  - type: text
    content: 'And he '
  - type: text
    content: was
  - type: text
    content: ' clothed with a vesture dipped in blood: and his name is called The Word of God. '
