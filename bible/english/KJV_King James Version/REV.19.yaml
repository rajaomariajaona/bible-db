  - type: text
    content: ' free and bond, both small and great.'
  '19':
  - type: text
    content: 'And I saw the beast, and the kings of the earth, and their armies, gathered together to make war against him that sat on the horse, and against his army. '
  '2':
  - type: text
    content: 'for true and righteous '
  - type: text
    content: are
  - type: text
    content: ' his judgments: for he hath judged the great whore, which did corrupt the earth with her fornication, and hath avenged the blood of his servants at her hand. '
  '20':
  - type: text
    content: 'And the beast was taken, and with him the false prophet that wrought miracles before him, with which he deceived them that had received the mark of the beast, and them that worshipped his image. These both were cast alive into a lake of fire burning with brimstone. '
  '21':
  - type: text
    content: 'And the remnant were slain with the sword of him that sat upon the horse, which '
  - type: text
    content: sword
  - type: text
    content: ' proceeded out of his mouth: and all the fowls were filled with their flesh.'
  '3':
  - type: text
    content: 'And again they said, Alleluia. And her smoke rose up for ever and ever. '
  '4':
  - type: text
    content: 'And the four and twenty elders and the four beasts fell down and worshipped God that sat on the throne, saying, Amen; Alleluia. '
  '5':
  - type: text
    content: 'And a voice came out of the throne, saying, Praise our God, all ye his servants, and ye that fear him, both small and great. '
  '6':
  - type: text
    content: 'And I heard as it were the voice of a great multitude, and as the voice of many waters, and as the voice of mighty thunderings, saying, Alleluia: for the Lord God omnipotent reigneth. '
  '7':
  - type: text
    content: 'Let us be glad and rejoice, and give honour to him: for the marriage of the Lamb is come, and his wife hath made herself ready. '
  '8':
  - type: text
    content: 'And to her was granted that she should be arrayed in fine linen, clean and white: for the fine linen is the righteousness of saints. '
  '9':
  - type: text
    content: 'And he saith unto me, Write, Blessed '
  - type: text
    content: are
  - type: text
    content: ' they which are called unto the marriage supper of the Lamb. And he saith unto me, These are the true sayings of God. '
