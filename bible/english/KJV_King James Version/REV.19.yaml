document_id: REV.19,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Songs of Deliverance
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And after these things I heard a great voice of much people in heaven, saying, Alleluia; Salvation, and glory, and honour, and power, unto the Lord our God: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I fell at his feet to worship him. And he said unto me, See '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thou do it
    - type: text
      text: ' not: I am thy fellowservant, and of thy brethren that have the testimony of Jesus: worship God: for the testimony of Jesus is the spirit of prophecy.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I saw heaven opened, and behold a white horse; and he that sat upon him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' called Faithful and True, and in righteousness he doth judge and make war. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His eyes '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' as a flame of fire, and on his head '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' many crowns; and he had a name written, that no man knew, but he himself. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' clothed with a vesture dipped in blood: and his name is called The Word of God. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the armies '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which were
    - type: text
      text: ' in heaven followed him upon white horses, clothed in fine linen, white and clean. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And out of his mouth goeth a sharp sword, that with it he should smite the nations: and he shall rule them with a rod of iron: and he treadeth the winepress of the fierceness and wrath of Almighty God. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he hath on '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' vesture and on his thigh a name written, KING OF KINGS, AND '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' OF LORDS.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I saw an angel standing in the sun; and he cried with a loud voice, saying to all the fowls that fly in the midst of heaven, Come and gather yourselves together unto the supper of the great God; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that ye may eat the flesh of kings, and the flesh of captains, and the flesh of mighty men, and the flesh of horses, and of them that sit on them, and the flesh of all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: both
    - type: text
      text: ' free and bond, both small and great.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I saw the beast, and the kings of the earth, and their armies, gathered together to make war against him that sat on the horse, and against his army. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for true and righteous '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' his judgments: for he hath judged the great whore, which did corrupt the earth with her fornication, and hath avenged the blood of his servants at her hand. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the beast was taken, and with him the false prophet that wrought miracles before him, with which he deceived them that had received the mark of the beast, and them that worshipped his image. These both were cast alive into a lake of fire burning with brimstone. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the remnant were slain with the sword of him that sat upon the horse, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: sword
    - type: text
      text: ' proceeded out of his mouth: and all the fowls were filled with their flesh.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And again they said, Alleluia. And her smoke rose up for ever and ever. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the four and twenty elders and the four beasts fell down and worshipped God that sat on the throne, saying, Amen; Alleluia. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And a voice came out of the throne, saying, Praise our God, all ye his servants, and ye that fear him, both small and great. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I heard as it were the voice of a great multitude, and as the voice of many waters, and as the voice of mighty thunderings, saying, Alleluia: for the Lord God omnipotent reigneth. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let us be glad and rejoice, and give honour to him: for the marriage of the Lamb is come, and his wife hath made herself ready. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And to her was granted that she should be arrayed in fine linen, clean and white: for the fine linen is the righteousness of saints. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he saith unto me, Write, Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' they which are called unto the marriage supper of the Lamb. And he saith unto me, These are the true sayings of God. '
