  '24':
  - type: text
    content: 'This is the disciple which testifieth of these things, and wrote these things: and we know that his testimony is true.'
  '25':
  - type: text
    content: And there are also many other things which Jesus did, the which, if they should be written every one, I suppose that even the world itself could not contain the books that should be written. Amen.
  '3':
  - type: text
    content: Simon Peter saith unto them, I go a fishing. They say unto him, We also go with thee. They went forth, and entered into a ship immediately; and that night they caught nothing.
  '4':
  - type: text
    content: 'But when the morning was now come, Jesus stood on the shore: but the disciples knew not that it was Jesus. '
  '5':
  - type: text
    content: 'Then Jesus saith unto them, '
  - type: text
    content: 'Children, have ye any meat? '
  - type: text
    content: 'They answered him, No. '
  '6':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: Cast the net on the right side of the ship, and ye shall find.
  - type: text
    content: ' They cast therefore, and now they were not able to draw it for the multitude of fishes. '
  '7':
  - type: text
    content: 'Therefore that disciple whom Jesus loved saith unto Peter, It is the Lord. Now when Simon Peter heard that it was the Lord, he girt '
  - type: text
