document_id: JHN.21
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After these things Jesus shewed himself again to the disciples at the sea of Tiberias; and on this wise shewed he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: himself
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'There were together Simon Peter, and Thomas called Didymus, and Nathanael of Cana in Galilee, and the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: sons
  - type: text
    text: ' of Zebedee, and two other of his disciples. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Simon Peter saith unto them, I go a fishing. They say unto him, We also go with thee. They went forth, and entered into a ship immediately; and that night they caught nothing.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But when the morning was now come, Jesus stood on the shore: but the disciples knew not that it was Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then Jesus saith unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Children, have ye any meat? '
  - type: text
    text: 'They answered him, No. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Cast the net on the right side of the ship, and ye shall find.
  - type: text
    text: ' They cast therefore, and now they were not able to draw it for the multitude of fishes. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Therefore that disciple whom Jesus loved saith unto Peter, It is the Lord. Now when Simon Peter heard that it was the Lord, he girt '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' fisher''s coat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unto him
  - type: text
    text: ', (for he was naked,) and did cast himself into the sea. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And the other disciples came in a little ship; (for they were not far from land, but as it were two hundred cubits,) dragging the net with fishes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'As soon then as they were come to land, they saw a fire of coals there, and fish laid thereon, and bread. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jesus saith unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Bring of the fish which ye have now caught.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Simon Peter went up, and drew the net to land full of great fishes, an hundred and fifty and three: and for all there were so many, yet was not the net broken. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jesus saith unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Come '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' dine.'
  - type: text
    text: ' And none of the disciples durst ask him, Who art thou? knowing that it was the Lord. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jesus then cometh, and taketh bread, and giveth them, and fish likewise. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: This is now the third time that Jesus shewed himself to his disciples, after that he was risen from the dead.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So when they had dined, Jesus saith to Simon Peter, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Simon, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: son
    - type: text
      text: ' of Jonas, lovest thou me more than these?'
  - type: text
    text: ' He saith unto him, Yea, Lord; thou knowest that I love thee. He saith unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Feed my lambs.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He saith to him again the second time, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Simon, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: son
    - type: text
      text: ' of Jonas, lovest thou me?'
  - type: text
    text: ' He saith unto him, Yea, Lord; thou knowest that I love thee. He saith unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Feed my sheep.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He saith unto him the third time, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Simon, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: son
    - type: text
      text: ' of Jonas, lovest thou me?'
  - type: text
    text: ' Peter was grieved because he said unto him the third time, Lovest thou me? And he said unto him, Lord, thou knowest all things; thou knowest that I love thee. Jesus saith unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Feed my sheep.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Verily, verily, I say unto thee, When thou wast young, thou girdedst thyself, and walkedst whither thou wouldest: but when thou shalt be old, thou shalt stretch forth thy hands, and another shall gird thee, and carry '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thee
    - type: text
      text: ' whither thou wouldest not.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'This spake he, signifying by what death he should glorify God. And when he had spoken this, he saith unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Follow me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then Peter, turning about, seeth the disciple whom Jesus loved following; which also leaned on his breast at supper, and said, Lord, which is he that betrayeth thee? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Peter seeing him saith to Jesus, Lord, and what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall
  - type: text
    text: ' this man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: do
  - type: text
    text: '? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jesus saith unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'If I will that he tarry till I come, what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is that
    - type: text
      text: ' to thee? follow thou me.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then went this saying abroad among the brethren, that that disciple should not die: yet Jesus said not unto him, He shall not die; but, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'If I will that he tarry till I come, what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is that
    - type: text
      text: ' to thee?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'This is the disciple which testifieth of these things, and wrote these things: and we know that his testimony is true.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: And there are also many other things which Jesus did, the which, if they should be written every one, I suppose that even the world itself could not contain the books that should be written. Amen.
