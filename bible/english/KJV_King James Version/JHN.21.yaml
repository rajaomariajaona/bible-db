  '8':
  - type: text
    content: And the other disciples came in a little ship; (for they were not far from land, but as it were two hundred cubits,) dragging the net with fishes.
  '9':
  - type: text
    content: 'As soon then as they were come to land, they saw a fire of coals there, and fish laid thereon, and bread. '
