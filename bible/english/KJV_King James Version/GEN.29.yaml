document_id: GEN.29
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Laban's Daughters
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Jacob went on his journey, and came into the land of the people of the east. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he looked, and behold a well in the field, and, lo, there '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' three flocks of sheep lying by it; for out of that well they watered the flocks: and a great stone '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' upon the well''s mouth. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And thither were all the flocks gathered: and they rolled the stone from the well''s mouth, and watered the sheep, and put the stone again upon the well''s mouth in his place. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Jacob said unto them, My brethren, whence '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' ye? And they said, Of Haran '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' we. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And he said unto them, Know ye Laban the son of Nahor? And they said, We know '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he said unto them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' he well? And they said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: He is
  - type: text
    text: ' well: and, behold, Rachel his daughter cometh with the sheep. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And he said, Lo, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' yet high day, neither '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is it
  - type: text
    text: ' time that the cattle should be gathered together: water ye the sheep, and go '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' feed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And they said, We cannot, until all the flocks be gathered together, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: till
  - type: text
    text: ' they roll the stone from the well''s mouth; then we water the sheep.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And while he yet spake with them, Rachel came with her father''s sheep: for she kept them. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And it came to pass, when Jacob saw Rachel the daughter of Laban his mother''s brother, and the sheep of Laban his mother''s brother, that Jacob went near, and rolled the stone from the well''s mouth, and watered the flock of Laban his mother''s brother. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Jacob kissed Rachel, and lifted up his voice, and wept. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Jacob told Rachel that he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' her father''s brother, and that he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Rebekah''s son: and she ran and told her father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And it came to pass, when Laban heard the tidings of Jacob his sister''s son, that he ran to meet him, and embraced him, and kissed him, and brought him to his house. And he told Laban all these things. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And Laban said to him, Surely thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' my bone and my flesh. And he abode with him the space of a month. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Laban said unto Jacob, Because thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' my brother, shouldest thou therefore serve me for nought? tell me, what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall
  - type: text
    text: ' thy wages '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: '? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And Laban had two daughters: the name of the elder '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Leah, and the name of the younger '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Rachel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Leah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' tender eyed; but Rachel was beautiful and well favoured. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And Jacob loved Rachel; and said, I will serve thee seven years for Rachel thy younger daughter. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And Laban said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' better that I give her to thee, than that I should give her to another man: abide with me. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Jacob served seven years for Rachel; and they seemed unto him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' a few days, for the love he had to her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And Jacob said unto Laban, Give '
  - type: usfm
    marker: add
    children:
    - type: text
      text: me
  - type: text
    text: ' my wife, for my days are fulfilled, that I may go in unto her. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And Laban gathered together all the men of the place, and made a feast. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And it came to pass in the evening, that he took Leah his daughter, and brought her to him; and he went in unto her. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And Laban gave unto his daughter Leah Zilpah his maid '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' an handmaid. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And it came to pass, that in the morning, behold, it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Leah: and he said to Laban, What '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this thou hast done unto me? did not I serve with thee for Rachel? wherefore then hast thou beguiled me? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And Laban said, It must not be so done in our country, to give the younger before the firstborn. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fulfil her week, and we will give thee this also for the service which thou shalt serve with me yet seven other years. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And Jacob did so, and fulfilled her week: and he gave him Rachel his daughter to wife also. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And Laban gave to Rachel his daughter Bilhah his handmaid to be her maid. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: And he went in also unto Rachel, and he loved also Rachel more than Leah, and served with him yet seven other years.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' saw that Leah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' hated, he opened her womb: but Rachel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' barren. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And Leah conceived, and bare a son, and she called his name Reuben: for she said, Surely the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath looked upon my affliction; now therefore my husband will love me. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And she conceived again, and bare a son; and said, Because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath heard that I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' hated, he hath therefore given me this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: son
  - type: text
    text: ' also: and she called his name Simeon. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And she conceived again, and bare a son; and said, Now this time will my husband be joined unto me, because I have born him three sons: therefore was his name called Levi. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And she conceived again, and bare a son: and she said, Now will I praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': therefore she called his name Judah; and left bearing.'
