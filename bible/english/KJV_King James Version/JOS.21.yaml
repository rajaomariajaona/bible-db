verses:
  '1':
  - type: heading
    content: Cities for Levites
  - type: text
    content: 'Then came near the heads of the fathers of the Levites unto Eleazar the priest, and unto Joshua the son of Nun, and unto the heads of the fathers of the tribes of the children of Israel; '
  '10':
  - type: text
    content: 'which the children of Aaron, '
  - type: text
    content: being
  - type: text
    content: ' of the families of the Kohathites, '
  - type: text
    content: who were
  - type: text
    content: ' of the children of Levi, had: for their''s was the first lot. '
  '11':
  - type: text
    content: 'And they gave them the city of Arba the father of Anak, which '
  - type: text
    content: city is
  - type: text
    content: ' Hebron, in the hill '
  - type: text
    content: country
  - type: text
    content: ' of Judah, with the suburbs thereof round about it. '
  '12':
  - type: text
    content: But the fields of the city, and the villages thereof, gave they to Caleb the son of Jephunneh for his possession.
  '13':
  - type: text
    content: 'Thus they gave to the children of Aaron the priest Hebron with her suburbs, '
  - type: text
    content: to be
  - type: text
    content: ' a city of refuge for the slayer; and Libnah with her suburbs, '
  '14':
  - type: text
    content: 'and Jattir with her suburbs, and Eshtemoa with her suburbs, '
  '15':
  - type: text
    content: 'and Holon with her suburbs, and Debir with her suburbs, '
  '16':
  - type: text
    content: 'and Ain with her suburbs, and Juttah with her suburbs, '
  - type: text
    content: and
  - type: text
    content: ' Beth-shemesh with her suburbs; nine cities out of those two tribes. '
  '17':
  - type: text
    content: 'And out of the tribe of Benjamin, Gibeon with her suburbs, Geba with her suburbs, '
  '18':
  - type: text
    content: 'Anathoth with her suburbs, and Almon with her suburbs; four cities. '
  '19':
  - type: text
    content: 'All the cities of the children of Aaron, the priests, '
  - type: text
    content: were
  - type: text
    content: ' thirteen cities with their suburbs.'
  '2':
  - type: text
    content: 'and they spake unto them at Shiloh in the land of Canaan, saying, The '
  - type: text
    content: LORD
  - type: text
    content: ' commanded by the hand of Moses to give us cities to dwell in, with the suburbs thereof for our cattle. '
  '20':
  - type: text
    content: 'And the families of the children of Kohath, the Levites which remained of the children of Kohath, even they had the cities of their lot out of the tribe of Ephraim. '
  '21':
  - type: text
    content: 'For they gave them Shechem with her suburbs in mount Ephraim, '
  - type: text
    content: to be
  - type: text
    content: ' a city of refuge for the slayer; and Gezer with her suburbs, '
  '22':
  - type: text
    content: 'and Kibzaim with her suburbs, and Beth-horon with her suburbs; four cities. '
  '23':
  - type: text
    content: 'And out of the tribe of Dan, Eltekeh with her suburbs, Gibbethon with her suburbs, '
  '24':
  - type: text
    content: 'Aijalon with her suburbs, Gath-rimmon with her suburbs; four cities. '
  '25':
  - type: text
    content: 'And out of the half tribe of Manasseh, Tanach with her suburbs, and Gath-rimmon with her suburbs; two cities. '
  '26':
  - type: text
    content: 'All the cities '
  - type: text
    content: were
  - type: text
    content: ' ten with their suburbs for the families of the children of Kohath that remained.'
  '27':
  - type: text
    content: 'And unto the children of Gershon, of the families of the Levites, out of the '
  - type: text
    content: other
  - type: text
    content: ' half tribe of Manasseh '
  - type: text
    content: they gave
  - type: text
    content: ' Golan in Bashan with her suburbs, '
  - type: text
    content: to be
  - type: text
    content: ' a city of refuge for the slayer; and Beeshterah with her suburbs; two cities. '
  '28':
  - type: text
    content: 'And out of the tribe of Issachar, Kishon with her suburbs, Dabareh with her suburbs, '
  '29':
  - type: text
    content: 'Jarmuth with her suburbs, En-gannim with her suburbs; four cities. '
  '3':
  - type: text
    content: 'And the children of Israel gave unto the Levites out of their inheritance, at the commandment of the '
  - type: text
    content: LORD
  - type: text
    content: ', these cities and their suburbs.'
  '30':
  - type: text
    content: 'And out of the tribe of Asher, Mishal with her suburbs, Abdon with her suburbs, '
  '31':
  - type: text
    content: 'Helkath with her suburbs, and Rehob with her suburbs; four cities. '
  '32':
  - type: text
    content: 'And out of the tribe of Naphtali, Kedesh in Galilee with her suburbs, '
  - type: text
    content: to be
  - type: text
    content: ' a city of refuge for the slayer; and Hammoth-dor with her suburbs, and Kartan with her suburbs; three cities. '
  '33':
  - type: text
    content: 'All the cities of the Gershonites according to their families '
  - type: text
    content: were
  - type: text
    content: ' thirteen cities with their suburbs.'
  '34':
  - type: text
    content: 'And unto the families of the children of Merari, the rest of the Levites, out of the tribe of Zebulun, Jokneam with her suburbs, and Kartah with her suburbs, '
  '35':
  - type: text
    content: 'Dimnah with her suburbs, Nahalal with her suburbs; four cities. '
  '36':
  - type: text
    content: 'And out of the tribe of Reuben, Bezer with her suburbs, and Jahazah with her suburbs, '
  '37':
  - type: text
    content: 'Kedemoth with her suburbs, and Mephaath with her suburbs; four cities. '
  '38':
  - type: text
    content: 'And out of the tribe of Gad, Ramoth in Gilead with her suburbs, '
  - type: text
    content: to be
  - type: text
    content: ' a city of refuge for the slayer; and Mahanaim with her suburbs, '
  '39':
  - type: text
    content: 'Heshbon with her suburbs, Jazer with her suburbs; four cities in all. '
  '4':
  - type: text
    content: 'And the lot came out for the families of the Kohathites: and the children of Aaron the priest, '
  - type: text
    content: which were
  - type: text
    content: ' of the Levites, had by lot out of the tribe of Judah, and out of the tribe of Simeon, and out of the tribe of Benjamin, thirteen cities. '
  '40':
  - type: text
    content: 'So all the cities for the children of Merari by their families, which were remaining of the families of the Levites, were '
  - type: text
    content: by
  - type: text
    content: ' their lot twelve cities.'
  '41':
  - type: text
    content: 'All the cities of the Levites within the possession of the children of Israel '
  - type: text
    content: were
  - type: text
    content: ' forty and eight cities with their suburbs. '
  '42':
  - type: text
    content: 'These cities were every one with their suburbs round about them: thus '
  - type: text
    content: were
  - type: text
    content: ' all these cities.'
  - type: heading
    content: Rest and Peace
  '43':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' gave unto Israel all the land which he sware to give unto their fathers; and they possessed it, and dwelt therein. '
  '44':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' gave them rest round about, according to all that he sware unto their fathers: and there stood not a man of all their enemies before them; the '
  - type: text
    content: LORD
  - type: text
    content: ' delivered all their enemies into their hand. '
  '45':
  - type: text
    content: 'There failed not ought of any good thing which the '
  - type: text
    content: LORD
  - type: text
    content: ' had spoken unto the house of Israel; all came to pass.'
  '5':
  - type: text
    content: 'And the rest of the children of Kohath '
  - type: text
    content: had
  - type: text
    content: ' by lot out of the families of the tribe of Ephraim, and out of the tribe of Dan, and out of the half tribe of Manasseh, ten cities. '
  '6':
  - type: text
    content: 'And the children of Gershon '
  - type: text
    content: had
  - type: text
    content: ' by lot out of the families of the tribe of Issachar, and out of the tribe of Asher, and out of the tribe of Naphtali, and out of the half tribe of Manasseh in Bashan, thirteen cities. '
  '7':
  - type: text
    content: 'The children of Merari by their families '
  - type: text
    content: had
  - type: text
    content: ' out of the tribe of Reuben, and out of the tribe of Gad, and out of the tribe of Zebulun, twelve cities.'
  '8':
  - type: text
    content: 'And the children of Israel gave by lot unto the Levites these cities with their suburbs, as the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded by the hand of Moses. '
  '9':
  - type: text
    content: 'And they gave out of the tribe of the children of Judah, and out of the tribe of the children of Simeon, these cities which are '
  - type: text
    content: here
  - type: text
    content: ' mentioned by name, '
