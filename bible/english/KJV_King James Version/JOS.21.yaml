document_id: JOS.21
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Cities for Levites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then came near the heads of the fathers of the Levites unto Eleazar the priest, and unto Joshua the son of Nun, and unto the heads of the fathers of the tribes of the children of Israel; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and they spake unto them at Shiloh in the land of Canaan, saying, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded by the hand of Moses to give us cities to dwell in, with the suburbs thereof for our cattle. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And the children of Israel gave unto the Levites out of their inheritance, at the commandment of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', these cities and their suburbs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And the lot came out for the families of the Kohathites: and the children of Aaron the priest, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which were
  - type: text
    text: ' of the Levites, had by lot out of the tribe of Judah, and out of the tribe of Simeon, and out of the tribe of Benjamin, thirteen cities. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the rest of the children of Kohath '
  - type: usfm
    marker: add
    children:
    - type: text
      text: had
  - type: text
    text: ' by lot out of the families of the tribe of Ephraim, and out of the tribe of Dan, and out of the half tribe of Manasseh, ten cities. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the children of Gershon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: had
  - type: text
    text: ' by lot out of the families of the tribe of Issachar, and out of the tribe of Asher, and out of the tribe of Naphtali, and out of the half tribe of Manasseh in Bashan, thirteen cities. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The children of Merari by their families '
  - type: usfm
    marker: add
    children:
    - type: text
      text: had
  - type: text
    text: ' out of the tribe of Reuben, and out of the tribe of Gad, and out of the tribe of Zebulun, twelve cities.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the children of Israel gave by lot unto the Levites these cities with their suburbs, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded by the hand of Moses. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And they gave out of the tribe of the children of Judah, and out of the tribe of the children of Simeon, these cities which are '
  - type: usfm
    marker: add
    children:
    - type: text
      text: here
  - type: text
    text: ' mentioned by name, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'which the children of Aaron, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' of the families of the Kohathites, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: who were
  - type: text
    text: ' of the children of Levi, had: for their''s was the first lot. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And they gave them the city of Arba the father of Anak, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: city is
  - type: text
    text: ' Hebron, in the hill '
  - type: usfm
    marker: add
    children:
    - type: text
      text: country
  - type: text
    text: ' of Judah, with the suburbs thereof round about it. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But the fields of the city, and the villages thereof, gave they to Caleb the son of Jephunneh for his possession.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Thus they gave to the children of Aaron the priest Hebron with her suburbs, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' a city of refuge for the slayer; and Libnah with her suburbs, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and Jattir with her suburbs, and Eshtemoa with her suburbs, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and Holon with her suburbs, and Debir with her suburbs, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and Ain with her suburbs, and Juttah with her suburbs, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' Beth-shemesh with her suburbs; nine cities out of those two tribes. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And out of the tribe of Benjamin, Gibeon with her suburbs, Geba with her suburbs, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Anathoth with her suburbs, and Almon with her suburbs; four cities. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'All the cities of the children of Aaron, the priests, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' thirteen cities with their suburbs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the families of the children of Kohath, the Levites which remained of the children of Kohath, even they had the cities of their lot out of the tribe of Ephraim. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For they gave them Shechem with her suburbs in mount Ephraim, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' a city of refuge for the slayer; and Gezer with her suburbs, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'and Kibzaim with her suburbs, and Beth-horon with her suburbs; four cities. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And out of the tribe of Dan, Eltekeh with her suburbs, Gibbethon with her suburbs, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Aijalon with her suburbs, Gath-rimmon with her suburbs; four cities. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And out of the half tribe of Manasseh, Tanach with her suburbs, and Gath-rimmon with her suburbs; two cities. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'All the cities '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' ten with their suburbs for the families of the children of Kohath that remained.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And unto the children of Gershon, of the families of the Levites, out of the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: other
  - type: text
    text: ' half tribe of Manasseh '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they gave
  - type: text
    text: ' Golan in Bashan with her suburbs, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' a city of refuge for the slayer; and Beeshterah with her suburbs; two cities. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And out of the tribe of Issachar, Kishon with her suburbs, Dabareh with her suburbs, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jarmuth with her suburbs, En-gannim with her suburbs; four cities. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And out of the tribe of Asher, Mishal with her suburbs, Abdon with her suburbs, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Helkath with her suburbs, and Rehob with her suburbs; four cities. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And out of the tribe of Naphtali, Kedesh in Galilee with her suburbs, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' a city of refuge for the slayer; and Hammoth-dor with her suburbs, and Kartan with her suburbs; three cities. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'All the cities of the Gershonites according to their families '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' thirteen cities with their suburbs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And unto the families of the children of Merari, the rest of the Levites, out of the tribe of Zebulun, Jokneam with her suburbs, and Kartah with her suburbs, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dimnah with her suburbs, Nahalal with her suburbs; four cities. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And out of the tribe of Reuben, Bezer with her suburbs, and Jahazah with her suburbs, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Kedemoth with her suburbs, and Mephaath with her suburbs; four cities. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And out of the tribe of Gad, Ramoth in Gilead with her suburbs, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' a city of refuge for the slayer; and Mahanaim with her suburbs, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Heshbon with her suburbs, Jazer with her suburbs; four cities in all. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'So all the cities for the children of Merari by their families, which were remaining of the families of the Levites, were '
  - type: usfm
    marker: add
    children:
    - type: text
      text: by
  - type: text
    text: ' their lot twelve cities.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'All the cities of the Levites within the possession of the children of Israel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' forty and eight cities with their suburbs. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'These cities were every one with their suburbs round about them: thus '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' all these cities.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rest and Peace
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' gave unto Israel all the land which he sware to give unto their fathers; and they possessed it, and dwelt therein. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' gave them rest round about, according to all that he sware unto their fathers: and there stood not a man of all their enemies before them; the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' delivered all their enemies into their hand. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'There failed not ought of any good thing which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had spoken unto the house of Israel; all came to pass.'
