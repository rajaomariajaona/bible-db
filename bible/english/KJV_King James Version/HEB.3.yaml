document_id: HEB.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jesus and Moses
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wherefore, holy brethren, partakers of the heavenly calling, consider the Apostle and High Priest of our profession, Christ Jesus; '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wherefore I was grieved with that generation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And said, They do alway err in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' heart;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they have not known my ways.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I sware in my wrath,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They shall not enter into my rest.)
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Take heed, brethren, lest there be in any of you an evil heart of unbelief, in departing from the living God. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But exhort one another daily, while it is called To day; lest any of you be hardened through the deceitfulness of sin. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For we are made partakers of Christ, if we hold the beginning of our confidence stedfast unto the end; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'while it is said, To day if ye will hear his voice, harden not your hearts, as in the provocation. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For some, when they had heard, did provoke: howbeit not all that came out of Egypt by Moses. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But with whom was he grieved forty years? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was it
    - type: text
      text: ' not with them that had sinned, whose carcases fell in the wilderness? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And to whom sware he that they should not enter into his rest, but to them that believed not? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So we see that they could not enter in because of unbelief.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'who was faithful to him that appointed him, as also Moses '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was faithful
    - type: text
      text: ' in all his house. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' was counted worthy of more glory than Moses, inasmuch as he who hath builded the house hath more honour than the house. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For every house is builded by some '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: '; but he that built all things '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' God. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses verily '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' faithful in all his house, as a servant, for a testimony of those things which were to be spoken after; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but Christ as a son over his own house; whose house are we, if we hold fast the confidence and the rejoicing of the hope firm unto the end. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Wherefore (as the Holy Ghost saith,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To day if ye will hear his voice,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Harden not your hearts, as in the provocation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In the day of temptation in the wilderness:'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When your fathers tempted me, proved me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And saw my works forty years.
