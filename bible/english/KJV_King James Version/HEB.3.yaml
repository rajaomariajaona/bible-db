verses:
  '1':
  - type: heading
    content: Jesus and Moses
  - type: text
    content: 'Wherefore, holy brethren, partakers of the heavenly calling, consider the Apostle and High Priest of our profession, Christ Jesus; '
  '10':
  - type: text
    content: Wherefore I was grieved with that generation,
  - type: text
    content: 'And said, They do alway err in '
  - type: text
    content: their
  - type: text
    content: ' heart;'
  - type: text
    content: And they have not known my ways.
  '11':
  - type: text
    content: So I sware in my wrath,
  - type: text
    content: They shall not enter into my rest.)
  '12':
  - type: text
    content: 'Take heed, brethren, lest there be in any of you an evil heart of unbelief, in departing from the living God. '
  '13':
  - type: text
    content: 'But exhort one another daily, while it is called To day; lest any of you be hardened through the deceitfulness of sin. '
  '14':
  - type: text
    content: 'For we are made partakers of Christ, if we hold the beginning of our confidence stedfast unto the end; '
  '15':
  - type: text
    content: 'while it is said, To day if ye will hear his voice, harden not your hearts, as in the provocation. '
  '16':
  - type: text
    content: 'For some, when they had heard, did provoke: howbeit not all that came out of Egypt by Moses. '
  '17':
  - type: text
    content: 'But with whom was he grieved forty years? '
  - type: text
    content: was it
  - type: text
    content: ' not with them that had sinned, whose carcases fell in the wilderness? '
  '18':
  - type: text
    content: 'And to whom sware he that they should not enter into his rest, but to them that believed not? '
  '19':
  - type: text
    content: So we see that they could not enter in because of unbelief.
  '2':
  - type: text
    content: 'who was faithful to him that appointed him, as also Moses '
  - type: text
    content: was faithful
  - type: text
    content: ' in all his house. '
  '3':
  - type: text
    content: 'For this '
  - type: text
    content: man
  - type: text
    content: ' was counted worthy of more glory than Moses, inasmuch as he who hath builded the house hath more honour than the house. '
  '4':
  - type: text
    content: 'For every house is builded by some '
  - type: text
    content: man
  - type: text
    content: '; but he that built all things '
  - type: text
    content: is
  - type: text
    content: ' God. '
  '5':
  - type: text
    content: 'And Moses verily '
  - type: text
    content: was
  - type: text
    content: ' faithful in all his house, as a servant, for a testimony of those things which were to be spoken after; '
  '6':
  - type: text
    content: 'but Christ as a son over his own house; whose house are we, if we hold fast the confidence and the rejoicing of the hope firm unto the end. '
  '7':
  - type: text
    content: Wherefore (as the Holy Ghost saith,
  - type: text
    content: To day if ye will hear his voice,
  '8':
