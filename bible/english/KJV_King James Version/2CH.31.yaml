document_id: 2CH.31
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Now when all this was finished, all Israel that were present went out to the cities of Judah, and brake the images in pieces, and cut down the groves, and threw down the high places and the altars out of all Judah and Benjamin, in Ephraim also and Manasseh, until they had utterly destroyed them all. Then all the children of Israel returned, every man to his possession, into their own cities.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Hezekiah appointed the courses of the priests and the Levites after their courses, every man according to his service, the priests and Levites for burnt offerings and for peace offerings, to minister, and to give thanks, and to praise in the gates of the tents of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: add
    children:
    - type: text
      text: He appointed
  - type: text
    text: ' also the king''s portion of his substance for the burnt offerings, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to wit
  - type: text
    text: ', for the morning and evening burnt offerings, and the burnt offerings for the sabbaths, and for the new moons, and for the set feasts, as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' written in the law of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Moreover he commanded the people that dwelt in Jerusalem to give the portion of the priests and the Levites, that they might be encouraged in the law of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Encouraged the People
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And as soon as the commandment came abroad, the children of Israel brought in abundance the firstfruits of corn, wine, and oil, and honey, and of all the increase of the field; and the tithe of all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' brought they in abundantly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: concerning
  - type: text
    text: ' the children of Israel and Judah, that dwelt in the cities of Judah, they also brought in the tithe of oxen and sheep, and the tithe of holy things which were consecrated unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' their God, and laid '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' by heaps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'In the third month they began to lay the foundation of the heaps, and finished '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' in the seventh month. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And when Hezekiah and the princes came and saw the heaps, they blessed the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and his people Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then Hezekiah questioned with the priests and the Levites concerning the heaps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Azariah the chief priest of the house of Zadok answered him, and said, Since '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the people
  - type: text
    text: ' began to bring the offerings into the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', we have had enough to eat, and have left plenty: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath blessed his people; and that which is left '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this great store.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then Hezekiah commanded to prepare chambers in the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and they prepared '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and brought in the offerings and the tithes and the dedicated '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' faithfully: over which Cononiah the Levite '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' ruler, and Shimei his brother '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the next. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Jehiel, and Azaziah, and Nahath, and Asahel, and Jerimoth, and Jozabad, and Eliel, and Ismachiah, and Mahath, and Benaiah, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' overseers under the hand of Cononiah and Shimei his brother, at the commandment of Hezekiah the king, and Azariah the ruler of the house of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And Kore the son of Imnah the Levite, the porter toward the east, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' over the freewill offerings of God, to distribute the oblations of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and the most holy things. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And next him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' Eden, and Miniamin, and Jeshua, and Shemaiah, Amariah, and Shecaniah, in the cities of the priests, in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' set office, to give to their brethren by courses, as well to the great as to the small: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'beside their genealogy of males, from three years old and upward, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' unto every one that entereth into the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', his daily portion for their service in their charges according to their courses; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'both to the genealogy of the priests by the house of their fathers, and the Levites from twenty years old and upward, in their charges by their courses; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and to the genealogy of all their little ones, their wives, and their sons, and their daughters, through all the congregation: for in their set office they sanctified themselves in holiness: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'also of the sons of Aaron the priests, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which were
  - type: text
    text: ' in the fields of the suburbs of their cities, in every several city, the men that were expressed by name, to give portions to all the males among the priests, and to all that were reckoned by genealogies among the Levites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And thus did Hezekiah throughout all Judah, and wrought '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which was
  - type: text
    text: ' good and right and truth before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' his God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And in every work that he began in the service of the house of God, and in the law, and in the commandments, to seek his God, he did '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' with all his heart, and prospered.'
