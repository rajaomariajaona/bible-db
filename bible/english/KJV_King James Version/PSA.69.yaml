document_id: PSA.69
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'To the chief Musician upon Shoshannim, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: A Psalm
  - type: text
    text: ' of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Save me, O God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For the waters are come in unto '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my
  - type: text
    text: ' soul.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I sink in deep mire, where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no standing:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am come into deep waters, where the floods overflow me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I am weary of my crying: my throat is dried:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Mine eyes fail while I wait for my God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'They that hate me without a cause are more than the hairs of mine head:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They that would destroy me, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' mine enemies wrongfully, are mighty:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then I restored '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' which I took not away.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: O God, thou knowest my foolishness; And my sins are not hid from thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Let not them that wait on thee, O Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' of hosts, be ashamed for my sake:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let not those that seek thee be confounded for my sake, O God of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Because for thy sake I have borne reproach;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Shame hath covered my face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I am become a stranger unto my brethren,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And an alien unto my mother's children.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For the zeal of thine house hath eaten me up;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the reproaches of them that reproached thee are fallen upon me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When I wept, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and chastened
  - type: text
    text: ' my soul with fasting,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: That was to my reproach.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I made sackcloth also my garment;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And I became a proverb to them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: They that sit in the gate speak against me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the song of the drunkards.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But as for me, my prayer
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' unto thee, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' an acceptable time:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: O God, in the multitude of thy mercy
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hear me, in the truth of thy salvation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Deliver me out of the mire, and let me not sink:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let me be delivered from them that hate me, and out of the deep waters.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Let not the waterflood overflow me, neither let the deep swallow me up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And let not the pit shut her mouth upon me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hear me, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; for thy lovingkindness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' good:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Turn unto me according to the multitude of thy tender mercies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And hide not thy face from thy servant; For I am in trouble:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hear me speedily.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Draw nigh unto my soul, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' redeem it:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Deliver me because of mine enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Thou hast known my reproach, and my shame, and my dishonour:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Mine adversaries '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' all before thee.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Reproach hath broken my heart; and I am full of heaviness:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And I looked '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for some
  - type: text
    text: ' to take pity, but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' none; And for comforters, but I found none.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: They gave me also gall for my meat;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And in my thirst they gave me vinegar to drink.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Let their table become a snare before them:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which should have been
  - type: text
    text: ' for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' welfare,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: let it become
  - type: text
    text: ' a trap.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Let their eyes be darkened, that they see not;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And make their loins continually to shake.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Pour out thine indignation upon them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And let thy wrathful anger take hold of them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Let their habitation be desolate;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' let none dwell in their tents.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'For they persecute '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' whom thou hast smitten;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And they talk to the grief of those whom thou hast wounded.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Add iniquity unto their iniquity:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And let them not come into thy righteousness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Let them be blotted out of the book of the living,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And not be written with the righteous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'But I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' poor and sorrowful:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let thy salvation, O God, set me up on high.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: I will praise the name of God with a song,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And will magnify him with thanksgiving.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: This
  - type: text
    text: ' also shall please the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Better than an ox '
  - type: usfm
    marker: add
    children:
    - type: text
      text: or
  - type: text
    text: ' bullock that hath horns and hoofs.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'The humble shall see '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this, and
  - type: text
    text: ' be glad:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And your heart shall live that seek God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' heareth the poor,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And despiseth not his prisoners.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Let the heaven and earth praise him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: The seas, and every thing that moveth therein.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'For God will save Zion, and will build the cities of Judah:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: That they may dwell there, and have it in possession.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'The seed also of his servants shall inherit it:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And they that love his name shall dwell therein.
