verses:
  '1':
  - type: text
    content: 'To the chief Musician upon Shoshannim, '
  - type: text
    content: A Psalm
  - type: text
    content: ' of David.'
  - type: text
    content: Save me, O God;
  - type: text
    content: 'For the waters are come in unto '
  - type: text
    content: my
  - type: text
    content: ' soul.'
  '10':
  - type: text
    content: 'When I wept, '
  - type: text
    content: and chastened
  - type: text
    content: ' my soul with fasting,'
  - type: text
    content: That was to my reproach.
  '11':
  - type: text
    content: I made sackcloth also my garment;
  - type: text
    content: And I became a proverb to them.
  '12':
  - type: text
    content: They that sit in the gate speak against me;
  - type: text
    content: 'And I '
  - type: text
    content: was
  - type: text
    content: ' the song of the drunkards.'
  '13':
  - type: text
    content: But as for me, my prayer
  - type: text
    content: Is
  - type: text
    content: ' unto thee, O '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: in
  - type: text
    content: ' an acceptable time:'
  - type: text
    content: O God, in the multitude of thy mercy
  - type: text
    content: Hear me, in the truth of thy salvation.
  '14':
  - type: text
    content: 'Deliver me out of the mire, and let me not sink:'
  - type: text
    content: Let me be delivered from them that hate me, and out of the deep waters.
  '15':
  - type: text
    content: Let not the waterflood overflow me, neither let the deep swallow me up,
  - type: text
    content: And let not the pit shut her mouth upon me.
  '16':
  - type: text
    content: 'Hear me, O '
  - type: text
    content: LORD
  - type: text
    content: '; for thy lovingkindness '
  - type: text
    content: is
  - type: text
    content: ' good:'
  - type: text
    content: Turn unto me according to the multitude of thy tender mercies.
  '17':
  - type: text
    content: 'And hide not thy face from thy servant; For I am in trouble:'
  - type: text
    content: Hear me speedily.
  '18':
  - type: text
    content: 'Draw nigh unto my soul, '
  - type: text
    content: and
  - type: text
    content: ' redeem it:'
  - type: text
    content: Deliver me because of mine enemies.
  '19':
  - type: text
    content: 'Thou hast known my reproach, and my shame, and my dishonour:'
  - type: text
    content: 'Mine adversaries '
  - type: text
    content: are
  - type: text
    content: ' all before thee.'
  '2':
  - type: text
    content: 'I sink in deep mire, where '
  - type: text
    content: there is
  - type: text
    content: ' no standing:'
  - type: text
    content: I am come into deep waters, where the floods overflow me.
  '20':
  - type: text
    content: 'Reproach hath broken my heart; and I am full of heaviness:'
  - type: text
    content: 'And I looked '
  - type: text
    content: for some
  - type: text
    content: ' to take pity, but '
  - type: text
    content: there was
  - type: text
    content: ' none; And for comforters, but I found none.'
  '21':
  - type: text
    content: They gave me also gall for my meat;
  - type: text
    content: And in my thirst they gave me vinegar to drink.
  '22':
  - type: text
    content: 'Let their table become a snare before them:'
  - type: text
    content: 'And '
  - type: text
    content: that which should have been
  - type: text
    content: ' for '
  - type: text
    content: their
  - type: text
    content: ' welfare,'
  - type: text
    content: let it become
  - type: text
    content: ' a trap.'
  '23':
  - type: text
    content: Let their eyes be darkened, that they see not;
  - type: text
    content: And make their loins continually to shake.
  '24':
  - type: text
    content: Pour out thine indignation upon them,
  - type: text
    content: And let thy wrathful anger take hold of them.
  '25':
  - type: text
    content: Let their habitation be desolate;
  - type: text
    content: And
  - type: text
    content: ' let none dwell in their tents.'
  '26':
  - type: text
    content: 'For they persecute '
  - type: text
    content: him
  - type: text
    content: ' whom thou hast smitten;'
  - type: text
    content: And they talk to the grief of those whom thou hast wounded.
  '27':
  - type: text
    content: 'Add iniquity unto their iniquity:'
  - type: text
    content: And let them not come into thy righteousness.
  '28':
  - type: text
    content: Let them be blotted out of the book of the living,
  - type: text
    content: And not be written with the righteous.
  '29':
  - type: text
    content: 'But I '
  - type: text
    content: am
  - type: text
    content: ' poor and sorrowful:'
  - type: text
    content: Let thy salvation, O God, set me up on high.
  '3':
  - type: text
    content: 'I am weary of my crying: my throat is dried:'
  - type: text
    content: Mine eyes fail while I wait for my God.
  '30':
  - type: text
    content: I will praise the name of God with a song,
  - type: text
    content: And will magnify him with thanksgiving.
  '31':
  - type: text
    content: ' '
  - type: text
    content: This
  - type: text
    content: ' also shall please the '
  - type: text
    content: LORD
  - type: text
    content: 'Better than an ox '
  - type: text
    content: or
  - type: text
    content: ' bullock that hath horns and hoofs.'
  '32':
  - type: text
    content: 'The humble shall see '
  - type: text
    content: this, and
  - type: text
    content: ' be glad:'
  - type: text
    content: And your heart shall live that seek God.
  '33':
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ' heareth the poor,'
  - type: text
    content: And despiseth not his prisoners.
  '34':
  - type: text
    content: Let the heaven and earth praise him,
  - type: text
    content: The seas, and every thing that moveth therein.
  '35':
  - type: text
    content: 'For God will save Zion, and will build the cities of Judah:'
  - type: text
    content: That they may dwell there, and have it in possession.
  '36':
  - type: text
    content: 'The seed also of his servants shall inherit it:'
  - type: text
    content: And they that love his name shall dwell therein.
  '4':
  - type: text
    content: 'They that hate me without a cause are more than the hairs of mine head:'
  - type: text
    content: 'They that would destroy me, '
  - type: text
    content: being
  - type: text
    content: ' mine enemies wrongfully, are mighty:'
  - type: text
    content: 'Then I restored '
  - type: text
    content: that
  - type: text
    content: ' which I took not away.'
  '5':
  - type: text
    content: O God, thou knowest my foolishness; And my sins are not hid from thee.
  '6':
  - type: text
    content: 'Let not them that wait on thee, O Lord '
  - type: text
    content: GOD
  - type: text
    content: ' of hosts, be ashamed for my sake:'
  - type: text
    content: Let not those that seek thee be confounded for my sake, O God of Israel.
  '7':
  - type: text
    content: Because for thy sake I have borne reproach;
  - type: text
    content: Shame hath covered my face.
  '8':
  - type: text
    content: I am become a stranger unto my brethren,
  - type: text
    content: And an alien unto my mother's children.
  '9':
  - type: text
    content: For the zeal of thine house hath eaten me up;
  - type: text
    content: And the reproaches of them that reproached thee are fallen upon me.
