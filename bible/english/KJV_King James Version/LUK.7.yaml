document_id: LUK.7
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: A Gentile Believer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now when he had ended all his sayings in the audience of the people, he entered into Capernaum. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And a certain centurion''s servant, who was dear unto him, was sick, and ready to die. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And when he heard of Jesus, he sent unto him the elders of the Jews, beseeching him that he would come and heal his servant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And when they came to Jesus, they besought him instantly, saying, That he was worthy for whom he should do this: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'for he loveth our nation, and he hath built us a synagogue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then Jesus went with them.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And when he was now not far from the house, the centurion sent friends to him, saying unto him, Lord, trouble not thyself: for I am not worthy that thou shouldest enter under my roof: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'wherefore neither thought I myself worthy to come unto thee: but say in a word, and my servant shall be healed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For I also am a man set under authority, having under me soldiers, and I say unto one, Go, and he goeth; and to another, Come, and he cometh; and to my servant, Do this, and he doeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When Jesus heard these things, he marvelled at him, and turned him about, and said unto the people that followed him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I say unto you, I have not found so great faith, no, not in Israel.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And they that were sent, returning to the house, found the servant whole that had been sick.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Widow of Nain
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And it came to pass the day after, that he went into a city called Nain; and many of his disciples went with him, and much people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now when he came nigh to the gate of the city, behold, there was a dead man carried out, the only son of his mother, and she was a widow: and much people of the city was with her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And when the Lord saw her, he had compassion on her, and said unto her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Weep not.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And he came and touched the bier: and they that bare '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' stood still. And he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Young man, I say unto thee, Arise.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And he that was dead sat up, and began to speak. And he delivered him to his mother. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And there came a fear on all: and they glorified God, saying, That a great prophet is risen up among us; and, That God hath visited his people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And this rumour of him went forth throughout all Judæa, and throughout all the region round about. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And the disciples of John shewed him of all these things.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Baptist's Question
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And John calling '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unto him
  - type: text
    text: ' two of his disciples sent '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' to Jesus, saying, Art thou he that should come? or look we for another? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'When the men were come unto him, they said, John Baptist hath sent us unto thee, saying, Art thou he that should come? or look we for another? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And in that same hour he cured many of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' infirmities and plagues, and of evil spirits; and unto many '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that were
  - type: text
    text: ' blind he gave sight. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then Jesus answering said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Go your way, and tell John what things ye have seen and heard; how that the blind see, the lame walk, the lepers are cleansed, the deaf hear, the dead are raised, to the poor the gospel is preached.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And blessed is '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he
    - type: text
      text: ', whosoever shall not be offended in me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And when the messengers of John were departed, he began to speak unto the people concerning John, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: What went ye out into the wilderness for to see? A reed shaken with the wind?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But what went ye out for to see? A man clothed in soft raiment? Behold, they which are gorgeously apparelled, and live delicately, are in kings' courts.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But what went ye out for to see? A prophet? Yea, I say unto you, and much more than a prophet.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'This is '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he
    - type: text
      text: ', of whom it is written, Behold, I send my messenger before thy face, which shall prepare thy way before thee.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For I say unto you, Among those that are born of women there is not a greater prophet than John the Baptist: but he that is least in the kingdom of God is greater than he.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And all the people that heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', and the publicans, justified God, being baptized with the baptism of John. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: But the Pharisees and lawyers rejected the counsel of God against themselves, being not baptized of him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And the Lord said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Whereunto then shall I liken the men of this generation? and to what are they like?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: They are like unto children sitting in the marketplace, and calling one to another, and saying, We have piped unto you, and ye have not danced; we have mourned to you, and ye have not wept.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For John the Baptist came neither eating bread nor drinking wine; and ye say, He hath a devil.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The Son of man is come eating and drinking; and ye say, Behold a gluttonous man, and a winebibber, a friend of publicans and sinners!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But wisdom is justified of all her children.
- type: usfm
  marker: s2
  children:
  - type: text
    text: In a Pharisee's House
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And one of the Pharisees desired him that he would eat with him. And he went into the Pharisee''s house, and sat down to meat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And, behold, a woman in the city, which was a sinner, when she knew that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Jesus
  - type: text
    text: ' sat at meat in the Pharisee''s house, brought an alabaster box of ointment, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'and stood at his feet behind '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' weeping, and began to wash his feet with tears, and did wipe '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' with the hairs of her head, and kissed his feet, and anointed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' with the ointment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Now when the Pharisee which had bidden him saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', he spake within himself, saying, This man, if he were a prophet, would have known who and what manner of woman '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this is
  - type: text
    text: ' that toucheth him: for she is a sinner. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And Jesus answering said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Simon, I have somewhat to say unto thee.
  - type: text
    text: ' And he saith, Master, say on.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'There was a certain creditor which had two debtors: the one owed five hundred pence, and the other fifty.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And when they had nothing to pay, he frankly forgave them both. Tell me therefore, which of them will love him most?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Simon answered and said, I suppose that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he
  - type: text
    text: ', to whom he forgave most. And he said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Thou hast rightly judged.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'And he turned to the woman, and said unto Simon, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Seest thou this woman? I entered into thine house, thou gavest me no water for my feet: but she hath washed my feet with tears, and wiped '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' with the hairs of her head.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Thou gavest me no kiss: but this woman since the time I came in hath not ceased to kiss my feet.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'My head with oil thou didst not anoint: but this woman hath anointed my feet with ointment.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Wherefore I say unto thee, Her sins, which are many, are forgiven; for she loved much: but to whom little is forgiven, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the same
    - type: text
      text: ' loveth little.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'And he said unto her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Thy sins are forgiven.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'And they that sat at meat with him began to say within themselves, Who is this that forgiveth sins also? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'And he said to the woman, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Thy faith hath saved thee; go in peace.
