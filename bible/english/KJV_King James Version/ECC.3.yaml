document_id: ECC.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'To every '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thing there is
  - type: text
    text: ' a season, and a time to every purpose under the heaven: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'a time to be born, and a time to die; a time to plant, and a time to pluck up '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which is
  - type: text
    text: ' planted; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'a time to kill, and a time to heal; a time to break down, and a time to build up; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'a time to weep, and a time to laugh; a time to mourn, and a time to dance; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'a time to cast away stones, and a time to gather stones together; a time to embrace, and a time to refrain from embracing; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'a time to get, and a time to lose; a time to keep, and a time to cast away; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'a time to rend, and a time to sew; a time to keep silence, and a time to speak; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'a time to love, and a time to hate; a time of war, and a time of peace. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'What profit hath he that worketh in that wherein he laboureth? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I have seen the travail, which God hath given to the sons of men to be exercised in it. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He hath made every '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thing
  - type: text
    text: ' beautiful in his time: also he hath set the world in their heart, so that no man can find out the work that God maketh from the beginning to the end. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I know that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no good in them, but for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: a man
  - type: text
    text: ' to rejoice, and to do good in his life. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And also that every man should eat and drink, and enjoy the good of all his labour, it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the gift of God. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I know that, whatsoever God doeth, it shall be for ever: nothing can be put to it, nor any thing taken from it: and God doeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' should fear before him. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: That which hath been is now; and that which is to be hath already been; and God requireth that which is past.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And moreover I saw under the sun the place of judgment, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' wickedness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' there; and the place of righteousness, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' iniquity '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' there. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'I said in mine heart, God shall judge the righteous and the wicked: for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' a time there for every purpose and for every work. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I said in mine heart concerning the estate of the sons of men, that God might manifest them, and that they might see that they themselves are beasts. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For that which befalleth the sons of men befalleth beasts; even one thing befalleth them: as the one dieth, so dieth the other; yea, they have all one breath; so that a man hath no preeminence above a beast: for all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' vanity. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'All go unto one place; all are of the dust, and all turn to dust again. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Who knoweth the spirit of man that goeth upward, and the spirit of the beast that goeth downward to the earth? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Wherefore I perceive that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' nothing better, than that a man should rejoice in his own works; for that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' his portion: for who shall bring him to see what shall be after him?'
