document_id: ECC.3,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'To every '
  - type: text
    content: thing there is
  - type: text
    content: ' a season, and a time to every purpose under the heaven: '
  '10':
  - type: text
    content: 'I have seen the travail, which God hath given to the sons of men to be exercised in it. '
  '11':
  - type: text
    content: 'He hath made every '
  - type: text
    content: thing
  - type: text
    content: ' beautiful in his time: also he hath set the world in their heart, so that no man can find out the work that God maketh from the beginning to the end. '
  '12':
  - type: text
    content: 'I know that '
  - type: text
    content: there is
  - type: text
    content: ' no good in them, but for '
  - type: text
    content: a man
  - type: text
    content: ' to rejoice, and to do good in his life. '
  '13':
  - type: text
    content: 'And also that every man should eat and drink, and enjoy the good of all his labour, it '
  - type: text
    content: is
  - type: text
    content: ' the gift of God. '
  '14':
  - type: text
    content: 'I know that, whatsoever God doeth, it shall be for ever: nothing can be put to it, nor any thing taken from it: and God doeth '
  - type: text
    content: it
  - type: text
    content: ', that '
  - type: text
    content: men
  - type: text
    content: ' should fear before him. '
  '15':
  - type: text
    content: That which hath been is now; and that which is to be hath already been; and God requireth that which is past.
  '16':
  - type: text
    content: 'And moreover I saw under the sun the place of judgment, '
  - type: text
    content: that
  - type: text
    content: ' wickedness '
  - type: text
    content: was
  - type: text
    content: ' there; and the place of righteousness, '
  - type: text
    content: that
  - type: text
    content: ' iniquity '
  - type: text
    content: was
  - type: text
    content: ' there. '
  '17':
  - type: text
    content: 'I said in mine heart, God shall judge the righteous and the wicked: for '
  - type: text
    content: there is
  - type: text
    content: ' a time there for every purpose and for every work. '
  '18':
  - type: text
    content: 'I said in mine heart concerning the estate of the sons of men, that God might manifest them, and that they might see that they themselves are beasts. '
  '19':
  - type: text
    content: 'For that which befalleth the sons of men befalleth beasts; even one thing befalleth them: as the one dieth, so dieth the other; yea, they have all one breath; so that a man hath no preeminence above a beast: for all '
  - type: text
    content: is
  - type: text
    content: ' vanity. '
  '2':
  - type: text
    content: 'a time to be born, and a time to die; a time to plant, and a time to pluck up '
  - type: text
    content: that which is
  - type: text
    content: ' planted; '
  '20':
  - type: text
    content: 'All go unto one place; all are of the dust, and all turn to dust again. '
  '21':
  - type: text
    content: 'Who knoweth the spirit of man that goeth upward, and the spirit of the beast that goeth downward to the earth? '
  '22':
  - type: text
    content: 'Wherefore I perceive that '
  - type: text
    content: there is
  - type: text
    content: ' nothing better, than that a man should rejoice in his own works; for that '
  - type: text
    content: is
  - type: text
    content: ' his portion: for who shall bring him to see what shall be after him?'
  '3':
  - type: text
    content: 'a time to kill, and a time to heal; a time to break down, and a time to build up; '
  '4':
  - type: text
    content: 'a time to weep, and a time to laugh; a time to mourn, and a time to dance; '
  '5':
  - type: text
    content: 'a time to cast away stones, and a time to gather stones together; a time to embrace, and a time to refrain from embracing; '
  '6':
  - type: text
    content: 'a time to get, and a time to lose; a time to keep, and a time to cast away; '
  '7':
  - type: text
    content: 'a time to rend, and a time to sew; a time to keep silence, and a time to speak; '
  '8':
  - type: text
    content: 'a time to love, and a time to hate; a time of war, and a time of peace. '
  '9':
  - type: text
    content: 'What profit hath he that worketh in that wherein he laboureth? '
