document_id: ISA.62,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'For Zion''s sake will I not hold my peace, and for Jerusalem''s sake I will not rest, until the righteousness thereof go forth as brightness, and the salvation thereof as a lamp '
  - type: text
    content: that
  - type: text
    content: ' burneth. '
  '10':
  - type: text
    content: 'Go through, go through the gates; prepare ye the way of the people; cast up, cast up the highway; gather out the stones; lift up a standard for the people. '
  '11':
  - type: text
    content: 'Behold, the '
  - type: text
    content: LORD
  - type: text
    content: ' hath proclaimed unto the end of the world, Say ye to the daughter of Zion, Behold, thy salvation cometh; behold, his reward '
  - type: text
    content: is
  - type: text
    content: ' with him, and his work before him. '
  '12':
  - type: text
    content: 'And they shall call them, The holy people, The redeemed of the '
  - type: text
    content: LORD
  - type: text
    content: ': and thou shalt be called, Sought out, A city not forsaken.'
  '2':
  - type: text
    content: 'And the Gentiles shall see thy righteousness, and all kings thy glory: and thou shalt be called by a new name, which the mouth of the '
  - type: text
    content: LORD
  - type: text
    content: ' shall name. '
  '3':
  - type: text
    content: 'Thou shalt also be a crown of glory in the hand of the '
  - type: text
    content: LORD
  - type: text
    content: ', and a royal diadem in the hand of thy God.'
  '4':
  - type: text
    content: 'Thou shalt no more be termed Forsaken; neither shall thy land any more be termed Desolate: but thou shalt be called Hephzibah, and thy land Beulah: for the '
  - type: text
    content: LORD
  - type: text
    content: ' delighteth in thee, and thy land shall be married. '
  '5':
  - type: text
    content: 'For '
  - type: text
    content: as
  - type: text
    content: ' a young man marrieth a virgin, '
  - type: text
    content: so
  - type: text
    content: ' shall thy sons marry thee: and '
  - type: text
    content: as
  - type: text
    content: ' the bridegroom rejoiceth over the bride, '
  - type: text
    content: so
  - type: text
    content: ' shall thy God rejoice over thee.'
  '6':
  - type: text
    content: 'I have set watchmen upon thy walls, O Jerusalem, '
  - type: text
    content: which
  - type: text
    content: ' shall never hold their peace day nor night: ye that make mention of the '
  - type: text
    content: LORD
  - type: text
    content: ', keep not silence, '
  '7':
  - type: text
    content: 'and give him no rest, till he establish, and till he make Jerusalem a praise in the earth. '
  '8':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' hath sworn by his right hand, and by the arm of his strength, Surely I will no more give thy corn '
  - type: text
    content: to be
  - type: text
    content: ' meat for thine enemies; and the sons of the stranger shall not drink thy wine, for the which thou hast laboured: '
  '9':
  - type: text
    content: 'but they that have gathered it shall eat it, and praise the '
  - type: text
    content: LORD
  - type: text
    content: ; and they that have brought it together shall drink it in the courts of my holiness.
