document_id: ISA.62,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For Zion''s sake will I not hold my peace, and for Jerusalem''s sake I will not rest, until the righteousness thereof go forth as brightness, and the salvation thereof as a lamp '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' burneth. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Go through, go through the gates; prepare ye the way of the people; cast up, cast up the highway; gather out the stones; lift up a standard for the people. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath proclaimed unto the end of the world, Say ye to the daughter of Zion, Behold, thy salvation cometh; behold, his reward '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' with him, and his work before him. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they shall call them, The holy people, The redeemed of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': and thou shalt be called, Sought out, A city not forsaken.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the Gentiles shall see thy righteousness, and all kings thy glory: and thou shalt be called by a new name, which the mouth of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall name. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt also be a crown of glory in the hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and a royal diadem in the hand of thy God.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt no more be termed Forsaken; neither shall thy land any more be termed Desolate: but thou shalt be called Hephzibah, and thy land Beulah: for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' delighteth in thee, and thy land shall be married. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' a young man marrieth a virgin, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' shall thy sons marry thee: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' the bridegroom rejoiceth over the bride, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' shall thy God rejoice over thee.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have set watchmen upon thy walls, O Jerusalem, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' shall never hold their peace day nor night: ye that make mention of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', keep not silence, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and give him no rest, till he establish, and till he make Jerusalem a praise in the earth. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath sworn by his right hand, and by the arm of his strength, Surely I will no more give thy corn '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' meat for thine enemies; and the sons of the stranger shall not drink thy wine, for the which thou hast laboured: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but they that have gathered it shall eat it, and praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ; and they that have brought it together shall drink it in the courts of my holiness.
