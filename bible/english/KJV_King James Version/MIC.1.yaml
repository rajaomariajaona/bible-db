document_id: MIC.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' that came to Micah the Morasthite in the days of Jotham, Ahaz, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' Hezekiah, kings of Judah, which he saw concerning Samaria and Jerusalem.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The House of Israel
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Declare ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' not at Gath, weep ye not at all: in the house of Aphrah roll thyself in the dust. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pass ye away, thou inhabitant of Saphir, having thy shame naked: the inhabitant of Zaanan came not forth in the mourning of Beth-ezel; he shall receive of you his standing. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the inhabitant of Maroth waited carefully for good: but evil came down from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' unto the gate of Jerusalem. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'O thou inhabitant of Lachish, bind the chariot to the swift beast: she '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the beginning of the sin to the daughter of Zion: for the transgressions of Israel were found in thee. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore shalt thou give presents to Moresheth-gath: the houses of Achzib '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' a lie to the kings of Israel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet will I bring an heir unto thee, O inhabitant of Mareshah: he shall come unto Adullam the glory of Israel. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Make thee bald, and poll thee for thy delicate children; enlarge thy baldness as the eagle; for they are gone into captivity from thee.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hear, all ye people; hearken, O earth, and all that therein is: and let the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ' be witness against you, the Lord from his holy temple. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For, behold, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' cometh forth out of his place, and will come down, and tread upon the high places of the earth. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the mountains shall be molten under him, and the valleys shall be cleft, as wax before the fire, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' as the waters '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that are
    - type: text
      text: ' poured down a steep place. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the transgression of Jacob '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' all this, and for the sins of the house of Israel. What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the transgression of Jacob? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is it
    - type: text
      text: ' not Samaria? and what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the high places of Judah? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are they
    - type: text
      text: ' not Jerusalem? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore I will make Samaria as an heap of the field, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' as plantings of a vineyard: and I will pour down the stones thereof into the valley, and I will discover the foundations thereof. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the graven images thereof shall be beaten to pieces, and all the hires thereof shall be burned with the fire, and all the idols thereof will I lay desolate: for she gathered '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' of the hire of an harlot, and they shall return to the hire of an harlot. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore I will wail and howl, I will go stripped and naked: I will make a wailing like the dragons, and mourning as the owls. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For her wound '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' incurable; for it is come unto Judah; he is come unto the gate of my people, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' to Jerusalem.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The House of Judah
    marker-yv: yv-h
