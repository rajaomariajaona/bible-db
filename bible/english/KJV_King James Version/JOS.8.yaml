document_id: JOS.8,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Joshua, Fear not, neither be thou dismayed: take all the people of war with thee, and arise, go up to Ai: see, I have given into thy hand the king of Ai, and his people, and his city, and his land: '
  '10':
  - type: text
    content: 'And Joshua rose up early in the morning, and numbered the people, and went up, he and the elders of Israel, before the people to Ai. '
  '11':
  - type: text
    content: 'And all the people, '
  - type: text
    content: even the people
  - type: text
    content: ' of war that '
  - type: text
    content: were
  - type: text
    content: ' with him, went up, and drew nigh, and came before the city, and pitched on the north side of Ai: now '
  - type: text
    content: there was
  - type: text
    content: ' a valley between them and Ai. '
  '12':
  - type: text
    content: 'And he took about five thousand men, and set them to lie in ambush between Beth-el and Ai, on the west side of the city. '
  '13':
  - type: text
    content: 'And when they had set the people, '
  - type: text
    content: even
  - type: text
    content: ' all the host that '
  - type: text
    content: was
  - type: text
    content: ' on the north of the city, and their liers in wait on the west of the city, Joshua went that night into the midst of the valley. '
  '14':
  - type: text
    content: 'And it came to pass, when the king of Ai saw '
  - type: text
    content: it
  - type: text
    content: ', that they hasted and rose up early, and the men of the city went out against Israel to battle, he and all his people, at a time appointed, before the plain; but he wist not that '
  - type: text
    content: there were
  - type: text
    content: ' liers in ambush against him behind the city. '
  '15':
  - type: text
    content: 'And Joshua and all Israel made as if they were beaten before them, and fled by the way of the wilderness. '
  '16':
  - type: text
    content: 'And all the people that '
  - type: text
    content: were
  - type: text
    content: ' in Ai were called together to pursue after them: and they pursued after Joshua, and were drawn away from the city. '
  '17':
  - type: text
    content: 'And there was not a man left in Ai or Beth-el, that went not out after Israel: and they left the city open, and pursued after Israel.'
  '18':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Joshua, Stretch out the spear that '
  - type: text
    content: is
  - type: text
    content: ' in thy hand toward Ai; for I will give it into thine hand. And Joshua stretched out the spear that '
  - type: text
    content: he had
  - type: text
    content: ' in his hand toward the city. '
  '19':
  - type: text
    content: 'And the ambush arose quickly out of their place, and they ran as soon as he had stretched out his hand: and they entered into the city, and took it, and hasted and set the city on fire. '
  '2':
  - type: text
    content: 'and thou shalt do to Ai and her king as thou didst unto Jericho and her king: only the spoil thereof, and the cattle thereof, shall ye take for a prey unto yourselves: lay thee an ambush for the city behind it.'
  '20':
  - type: text
    content: 'And when the men of Ai looked behind them, they saw, and, behold, the smoke of the city ascended up to heaven, and they had no power to flee this way or that way: and the people that fled to the wilderness turned back upon the pursuers. '
  '21':
  - type: text
    content: 'And when Joshua and all Israel saw that the ambush had taken the city, and that the smoke of the city ascended, then they turned again, and slew the men of Ai. '
  '22':
  - type: text
    content: 'And the other issued out of the city against them; so they were in the midst of Israel, some on this side, and some on that side: and they smote them, so that they let none of them remain or escape. '
  '23':
  - type: text
    content: And the king of Ai they took alive, and brought him to Joshua.
  '24':
  - type: text
    content: 'And it came to pass, when Israel had made an end of slaying all the inhabitants of Ai in the field, in the wilderness wherein they chased them, and when they were all fallen on the edge of the sword, until they were consumed, that all the Israelites returned unto Ai, and smote it with the edge of the sword. '
  '25':
  - type: text
    content: 'And '
  - type: text
    content: so
  - type: text
    content: ' it was, '
  - type: text
    content: that
  - type: text
    content: ' all that fell that day, both of men and women, '
  - type: text
    content: were
  - type: text
    content: ' twelve thousand, '
  - type: text
    content: even
  - type: text
    content: ' all the men of Ai. '
  '26':
  - type: text
    content: 'For Joshua drew not his hand back, wherewith he stretched out the spear, until he had utterly destroyed all the inhabitants of Ai. '
  '27':
  - type: text
    content: 'Only the cattle and the spoil of that city Israel took for a prey unto themselves, according unto the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' which he commanded Joshua. '
  '28':
  - type: text
    content: 'And Joshua burnt Ai, and made it an heap for ever, '
  - type: text
    content: even
  - type: text
    content: ' a desolation unto this day. '
  '29':
  - type: text
    content: 'And the king of Ai he hanged on a tree until eventide: and as soon as the sun was down, Joshua commanded that they should take his carcase down from the tree, and cast it at the entering of the gate of the city, and raise thereon a great heap of stones, '
  - type: text
    content: that remaineth
  - type: text
    content: ' unto this day.'
  '3':
  - type: text
    content: 'So Joshua arose, and all the people of war, to go up against Ai: and Joshua chose out thirty thousand mighty men of valour, and sent them away by night. '
  '30':
  - type: text
    content: 'Then Joshua built an altar unto the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel in mount Ebal, '
  '31':
  - type: text
    content: 'as Moses the servant of the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded the children of Israel, as it is written in the book of the law of Moses, an altar of whole stones, over which no man hath lift up '
  - type: text
    content: any
  - type: text
    content: ' iron: and they offered thereon burnt offerings unto the '
  - type: text
    content: LORD
  - type: text
    content: ', and sacrificed peace offerings. '
  '32':
  - type: text
    content: 'And he wrote there upon the stones a copy of the law of Moses, which he wrote in the presence of the children of Israel. '
  '33':
  - type: text
    content: 'And all Israel, and their elders, and officers, and their judges, stood on this side the ark and on that side before the priests the Levites, which bare the ark of the covenant of the '
  - type: text
    content: LORD
  - type: text
    content: ', as well the stranger, as he that was born among them; half of them over against mount Gerizim, and half of them over against mount Ebal; as Moses the servant of the '
  - type: text
    content: LORD
  - type: text
    content: ' had commanded before, that they should bless the people of Israel. '
  '34':
  - type: text
    content: 'And afterward he read all the words of the law, the blessings and cursings, according to all that is written in the book of the law. '
  '35':
  - type: text
    content: There was not a word of all that Moses commanded, which Joshua read not before all the congregation of Israel, with the women, and the little ones, and the strangers that were conversant among them.
  '4':
  - type: text
    content: 'And he commanded them, saying, Behold, ye shall lie in wait against the city, '
  - type: text
    content: even
  - type: text
    content: ' behind the city: go not very far from the city, but be ye all ready: '
  '5':
  - type: text
    content: 'and I, and all the people that '
  - type: text
    content: are
  - type: text
    content: ' with me, will approach unto the city: and it shall come to pass, when they come out against us, as at the first, that we will flee before them, '
  '6':
  - type: text
    content: '(for they will come out after us) till we have drawn them from the city; for they will say, They flee before us, as at the first: therefore we will flee before them. '
  '7':
  - type: text
    content: 'Then ye shall rise up from the ambush, and seize upon the city: for the '
  - type: text
    content: LORD
  - type: text
    content: ' your God will deliver it into your hand. '
  '8':
  - type: text
    content: 'And it shall be, when ye have taken the city, '
  - type: text
    content: that
  - type: text
    content: ' ye shall set the city on fire: according to the commandment of the '
  - type: text
    content: LORD
  - type: text
    content: ' shall ye do. See, I have commanded you. '
  '9':
  - type: text
    content: 'Joshua therefore sent them forth: and they went to lie in ambush, and abode between Beth-el and Ai, on the west side of Ai: but Joshua lodged that night among the people.'
