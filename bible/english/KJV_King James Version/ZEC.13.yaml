document_id: ZEC.13,1
type_code: eng
verses:
  '1':
  - type: heading
    content: A Cleansing Fountain
  - type: text
    content: 'In that day there shall be a fountain opened to the house of David and to the inhabitants of Jerusalem for sin and for uncleanness. '
  '2':
  - type: text
    content: 'And it shall come to pass in that day, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, '
  - type: text
    content: that
  - type: text
    content: ' I will cut off the names of the idols out of the land, and they shall no more be remembered: and also I will cause the prophets and the unclean spirit to pass out of the land. '
  '3':
  - type: text
    content: 'And it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ' when any shall yet prophesy, then his father and his mother that begat him shall say unto him, Thou shalt not live; for thou speakest lies in the name of the '
  - type: text
    content: LORD
  - type: text
    content: ': and his father and his mother that begat him shall thrust him through when he prophesieth.'
  '4':
  - type: text
    content: 'And it shall come to pass in that day, '
  - type: text
    content: that
  - type: text
    content: ' the prophets shall be ashamed every one of his vision, when he hath prophesied; neither shall they wear a rough garment to deceive: '
  '5':
  - type: text
    content: 'but he shall say, I '
  - type: text
    content: am
  - type: text
    content: ' no prophet, I '
  - type: text
    content: am
  - type: text
    content: ' an husbandman; for man taught me to keep cattle from my youth. '
  '6':
  - type: text
    content: 'And '
  - type: text
    content: one
  - type: text
    content: ' shall say unto him, What '
  - type: text
    content: are
  - type: text
    content: ' these wounds in thine hands? Then he shall answer, '
  - type: text
    content: Those
  - type: text
    content: ' with which I was wounded '
  - type: text
    content: in
  - type: text
    content: ' the house of my friends.'
  '7':
  - type: text
    content: 'Awake, O sword, against my shepherd, and against the man '
  - type: text
    content: that is
  - type: text
    content: ' my fellow, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts: smite the shepherd, and the sheep shall be scattered: and I will turn mine hand upon the little ones. '
  '8':
  - type: text
    content: 'And it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ' in all the land, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', two parts therein shall be cut off '
  - type: text
    content: and
  - type: text
    content: ' die; but the third shall be left therein. '
  '9':
  - type: text
    content: 'And I will bring the third part through the fire, and will refine them as silver is refined, and will try them as gold is tried: they shall call on my name, and I will hear them: I will say, It '
  - type: text
    content: is
  - type: text
    content: ' my people: and they shall say, The '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' my God.'
