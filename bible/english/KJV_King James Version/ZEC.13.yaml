document_id: ZEC.13
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: A Cleansing Fountain
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In that day there shall be a fountain opened to the house of David and to the inhabitants of Jerusalem for sin and for uncleanness. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And it shall come to pass in that day, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' I will cut off the names of the idols out of the land, and they shall no more be remembered: and also I will cause the prophets and the unclean spirit to pass out of the land. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And it shall come to pass, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' when any shall yet prophesy, then his father and his mother that begat him shall say unto him, Thou shalt not live; for thou speakest lies in the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': and his father and his mother that begat him shall thrust him through when he prophesieth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And it shall come to pass in that day, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' the prophets shall be ashamed every one of his vision, when he hath prophesied; neither shall they wear a rough garment to deceive: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'but he shall say, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' no prophet, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' an husbandman; for man taught me to keep cattle from my youth. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' shall say unto him, What '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' these wounds in thine hands? Then he shall answer, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Those
  - type: text
    text: ' with which I was wounded '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' the house of my friends.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Awake, O sword, against my shepherd, and against the man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' my fellow, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts: smite the shepherd, and the sheep shall be scattered: and I will turn mine hand upon the little ones. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And it shall come to pass, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' in all the land, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', two parts therein shall be cut off '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' die; but the third shall be left therein. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And I will bring the third part through the fire, and will refine them as silver is refined, and will try them as gold is tried: they shall call on my name, and I will hear them: I will say, It '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my people: and they shall say, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my God.'
