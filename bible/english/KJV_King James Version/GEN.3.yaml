  - type: text
    text: The Fall
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the serpent was more subtil than any beast of the field which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God had made. And he said unto the woman, Yea, hath God said, Ye shall not eat of every tree of the garden? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the woman said unto the serpent, We may eat of the fruit of the trees of the garden: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'but of the fruit of the tree which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the midst of the garden, God hath said, Ye shall not eat of it, neither shall ye touch it, lest ye die. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And the serpent said unto the woman, Ye shall not surely die: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'for God doth know that in the day ye eat thereof, then your eyes shall be opened, and ye shall be as gods, knowing good and evil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And when the woman saw that the tree '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' good for food, and that it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' pleasant to the eyes, and a tree to be desired to make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' wise, she took of the fruit thereof, and did eat, and gave also unto her husband with her; and he did eat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the eyes of them both were opened, and they knew that they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' naked; and they sewed fig leaves together, and made themselves aprons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And they heard the voice of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God walking in the garden in the cool of the day: and Adam and his wife hid themselves from the presence of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God amongst the trees of the garden. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God called unto Adam, and said unto him, Where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' thou? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And he said, I heard thy voice in the garden, and I was afraid, because I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' naked; and I hid myself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And he said, Who told thee that thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: wast
  - type: text
    text: ' naked? Hast thou eaten of the tree, whereof I commanded thee that thou shouldest not eat? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And the man said, The woman whom thou gavest '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' with me, she gave me of the tree, and I did eat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God said unto the woman, What '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' thou hast done? And the woman said, The serpent beguiled me, and I did eat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God said unto the serpent, Because thou hast done this, thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' cursed above all cattle, and above every beast of the field; upon thy belly shalt thou go, and dust shalt thou eat all the days of thy life: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and I will put enmity between thee and the woman, and between thy seed and her seed; it shall bruise thy head, and thou shalt bruise his heel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Unto the woman he said, I will greatly multiply thy sorrow and thy conception; in sorrow thou shalt bring forth children; and thy desire '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' to thy husband, and he shall rule over thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And unto Adam he said, Because thou hast hearkened unto the voice of thy wife, and hast eaten of the tree, of which I commanded thee, saying, Thou shalt not eat of it: cursed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the ground for thy sake; in sorrow shalt thou eat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' it all the days of thy life; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'thorns also and thistles shall it bring forth to thee; and thou shalt eat the herb of the field; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'in the sweat of thy face shalt thou eat bread, till thou return unto the ground; for out of it wast thou taken: for dust thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ', and unto dust shalt thou return. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Adam called his wife''s name Eve; because she was the mother of all living. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Unto Adam also and to his wife did the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God make coats of skins, and clothed them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God said, Behold, the man is become as one of us, to know good and evil: and now, lest he put forth his hand, and take also of the tree of life, and eat, and live for ever: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'therefore the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God sent him forth from the garden of Eden, to till the ground from whence he was taken. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: So he drove out the man; and he placed at the east of the garden of Eden Cherubims, and a flaming sword which turned every way, to keep the way of the tree of life.
