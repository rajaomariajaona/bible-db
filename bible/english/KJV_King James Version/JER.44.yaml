document_id: JER.44,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Prophet in Egypt
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The word that came to Jeremiah concerning all the Jews which dwell in the land of Egypt, which dwell at Migdol, and at Tahpanhes, and at Noph, and in the country of Pathros, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They are not humbled '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' unto this day, neither have they feared, nor walked in my law, nor in my statutes, that I set before you and before your fathers.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, the God of Israel; Behold, I will set my face against you for evil, and to cut off all Judah. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will take the remnant of Judah, that have set their faces to go into the land of Egypt to sojourn there, and they shall all be consumed, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' fall in the land of Egypt; they shall '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' be consumed by the sword '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' by the famine: they shall die, from the least even unto the greatest, by the sword and by the famine: and they shall be an execration, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' an astonishment, and a curse, and a reproach. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I will punish them that dwell in the land of Egypt, as I have punished Jerusalem, by the sword, by the famine, and by the pestilence: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so that none of the remnant of Judah, which are gone into the land of Egypt to sojourn there, shall escape or remain, that they should return into the land of Judah, to the which they have a desire to return to dwell there: for none shall return but such as shall escape.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: A Protest
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all the men which knew that their wives had burned incense unto other gods, and all the women that stood by, a great multitude, even all the people that dwelt in the land of Egypt, in Pathros, answered Jeremiah, saying, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: As for
    - type: text
      text: ' the word that thou hast spoken unto us in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', we will not hearken unto thee. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But we will certainly do whatsoever thing goeth forth out of our own mouth, to burn incense unto the queen of heaven, and to pour out drink offerings unto her, as we have done, we, and our fathers, our kings, and our princes, in the cities of Judah, and in the streets of Jerusalem: for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: then
    - type: text
      text: ' had we plenty of victuals, and were well, and saw no evil. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But since we left off to burn incense to the queen of heaven, and to pour out drink offerings unto her, we have wanted all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ', and have been consumed by the sword and by the famine. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when we burned incense to the queen of heaven, and poured out drink offerings unto her, did we make her cakes to worship her, and pour out drink offerings unto her, without our men?
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Prophet's Answer
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, the God of Israel; Ye have seen all the evil that I have brought upon Jerusalem, and upon all the cities of Judah; and, behold, this day they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' a desolation, and no man dwelleth therein, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jeremiah said unto all the people, to the men, and to the women, and to all the people which had given him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' answer, saying, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The incense that ye burned in the cities of Judah, and in the streets of Jerusalem, ye, and your fathers, your kings, and your princes, and the people of the land, did not the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' remember them, and came it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: not
    - type: text
      text: ' into his mind? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' could no longer bear, because of the evil of your doings, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' because of the abominations which ye have committed; therefore is your land a desolation, and an astonishment, and a curse, without an inhabitant, as at this day. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because ye have burned incense, and because ye have sinned against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and have not obeyed the voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', nor walked in his law, nor in his statutes, nor in his testimonies; therefore this evil is happened unto you, as at this day.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover Jeremiah said unto all the people, and to all the women, Hear the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', all Judah that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in the land of Egypt: '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, the God of Israel, saying; Ye and your wives have both spoken with your mouths, and fulfilled with your hand, saying, We will surely perform our vows that we have vowed, to burn incense to the queen of heaven, and to pour out drink offerings unto her: ye will surely accomplish your vows, and surely perform your vows. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore hear ye the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', all Judah that dwell in the land of Egypt; Behold, I have sworn by my great name, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', that my name shall no more be named in the mouth of any man of Judah in all the land of Egypt, saying, The Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ' liveth. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, I will watch over them for evil, and not for good: and all the men of Judah that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in the land of Egypt shall be consumed by the sword and by the famine, until there be an end of them. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet a small number that escape the sword shall return out of the land of Egypt into the land of Judah, and all the remnant of Judah, that are gone into the land of Egypt to sojourn there, shall know whose words shall stand, mine, or their''s. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' a sign unto you, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', that I will punish you in this place, that ye may know that my words shall surely stand against you for evil: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because of their wickedness which they have committed to provoke me to anger, in that they went to burn incense, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' to serve other gods, whom they knew not, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: neither
    - type: text
      text: ' they, ye, nor your fathers. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ; Behold, I will give Pharaoh-hophra king of Egypt into the hand of his enemies, and into the hand of them that seek his life; as I gave Zedekiah king of Judah into the hand of Nebuchadrezzar king of Babylon, his enemy, and that sought his life.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Howbeit I sent unto you all my servants the prophets, rising early and sending '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ', saying, Oh, do not this abominable thing that I hate. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they hearkened not, nor inclined their ear to turn from their wickedness, to burn no incense unto other gods. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wherefore my fury and mine anger was poured forth, and was kindled in the cities of Judah and in the streets of Jerusalem; and they are wasted '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' desolate, as at this day. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore now thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', the God of hosts, the God of Israel; Wherefore commit ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ' great evil against your souls, to cut off from you man and woman, child and suckling, out of Judah, to leave you none to remain; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'in that ye provoke me unto wrath with the works of your hands, burning incense unto other gods in the land of Egypt, whither ye be gone to dwell, that ye might cut yourselves off, and that ye might be a curse and a reproach among all the nations of the earth? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Have ye forgotten the wickedness of your fathers, and the wickedness of the kings of Judah, and the wickedness of their wives, and your own wickedness, and the wickedness of your wives, which they have committed in the land of Judah, and in the streets of Jerusalem? '
