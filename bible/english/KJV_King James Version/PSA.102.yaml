document_id: PSA.102
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'A Prayer of the afflicted, when he is overwhelmed, and poureth out his complaint before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hear my prayer, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: And let my cry come unto thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hide not thy face from me in the day '
  - type: usfm
    marker: add
    children:
    - type: text
      text: when
  - type: text
    text: ' I am in trouble;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Incline thine ear unto me: In the day '
  - type: usfm
    marker: add
    children:
    - type: text
      text: when
  - type: text
    text: ' I call answer me speedily.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For my days are consumed like smoke,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And my bones are burned as an hearth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: My heart is smitten, and withered like grass;
- type: usfm
  marker: q2
  children:
  - type: text
    text: So that I forget to eat my bread.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: By reason of the voice of my groaning
- type: usfm
  marker: q2
  children:
  - type: text
    text: My bones cleave to my skin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I am like a pelican of the wilderness:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am like an owl of the desert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I watch, and am as a sparrow
- type: usfm
  marker: q2
  children:
  - type: text
    text: Alone upon the house top.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mine enemies reproach me all the day;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' they that are mad against me are sworn against me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For I have eaten ashes like bread,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And mingled my drink with weeping,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Because of thine indignation and thy wrath:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: For thou hast lifted me up, and cast me down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'My days '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' like a shadow that declineth;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And I am withered like grass.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But thou, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', shalt endure for ever;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thy remembrance unto all generations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Thou shalt arise, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' have mercy upon Zion:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: For the time to favour her, yea, the set time, is come.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: For thy servants take pleasure in her stones,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And favour the dust thereof.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So the heathen shall fear the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: And all the kings of the earth thy glory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'When the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall build up Zion,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He shall appear in his glory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He will regard the prayer of the destitute,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And not despise their prayer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'This shall be written for the generation to come:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the people which shall be created shall praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: For he hath looked down from the height of his sanctuary;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'From heaven did the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' behold the earth;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: To hear the groaning of the prisoner;
- type: usfm
  marker: q2
  children:
  - type: text
    text: To loose those that are appointed to death;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'To declare the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' in Zion,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And his praise in Jerusalem;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: When the people are gathered together,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the kingdoms, to serve the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: He weakened my strength in the way;
- type: usfm
  marker: q2
  children:
  - type: text
    text: He shortened my days.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'I said, O my God, take me not away in the midst of my days:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Thy years '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' throughout all generations.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Of old hast thou laid the foundation of the earth:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the heavens '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the work of thy hands.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'They shall perish, but thou shalt endure:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yea, all of them shall wax old like a garment;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'As a vesture shalt thou change them, and they shall be changed:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'But thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' the same, and thy years shall have no end.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: The children of thy servants shall continue,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And their seed shall be established before thee.
