document_id: PSA.102,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'A Prayer of the afflicted, when he is overwhelmed, and poureth out his complaint before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hear my prayer, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let my cry come unto thee.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because of thine indignation and thy wrath:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For thou hast lifted me up, and cast me down.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My days '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' like a shadow that declineth;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I am withered like grass.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But thou, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', shalt endure for ever;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thy remembrance unto all generations.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou shalt arise, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' have mercy upon Zion:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For the time to favour her, yea, the set time, is come.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For thy servants take pleasure in her stones,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And favour the dust thereof.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So the heathen shall fear the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the kings of the earth thy glory.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall build up Zion,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shall appear in his glory.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will regard the prayer of the destitute,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And not despise their prayer.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This shall be written for the generation to come:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the people which shall be created shall praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he hath looked down from the height of his sanctuary;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'From heaven did the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' behold the earth;'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hide not thy face from me in the day '
    - type: usfm
      marker: add
      children:
      - type: text
        text: when
    - type: text
      text: ' I am in trouble;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Incline thine ear unto me: In the day '
    - type: usfm
      marker: add
      children:
      - type: text
        text: when
    - type: text
      text: ' I call answer me speedily.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To hear the groaning of the prisoner;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To loose those that are appointed to death;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'To declare the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in Zion,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his praise in Jerusalem;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the people are gathered together,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the kingdoms, to serve the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He weakened my strength in the way;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shortened my days.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I said, O my God, take me not away in the midst of my days:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Thy years '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' throughout all generations.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Of old hast thou laid the foundation of the earth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the heavens '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the work of thy hands.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They shall perish, but thou shalt endure:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yea, all of them shall wax old like a garment;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'As a vesture shalt thou change them, and they shall be changed:'
  '27':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' the same, and thy years shall have no end.'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The children of thy servants shall continue,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their seed shall be established before thee.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For my days are consumed like smoke,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And my bones are burned as an hearth.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heart is smitten, and withered like grass;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So that I forget to eat my bread.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By reason of the voice of my groaning
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My bones cleave to my skin.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I am like a pelican of the wilderness:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am like an owl of the desert.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I watch, and am as a sparrow
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Alone upon the house top.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mine enemies reproach me all the day;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' they that are mad against me are sworn against me.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I have eaten ashes like bread,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And mingled my drink with weeping,
