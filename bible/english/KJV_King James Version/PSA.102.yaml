document_id: PSA.102,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'A Prayer of the afflicted, when he is overwhelmed, and poureth out his complaint before the '
  - type: text
    content: LORD
  - type: text
    content: .
  - type: text
    content: 'Hear my prayer, O '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: And let my cry come unto thee.
  '10':
  - type: text
    content: 'Because of thine indignation and thy wrath:'
  - type: text
    content: For thou hast lifted me up, and cast me down.
  '11':
  - type: text
    content: 'My days '
  - type: text
    content: are
  - type: text
    content: ' like a shadow that declineth;'
  - type: text
    content: And I am withered like grass.
  '12':
  - type: text
    content: 'But thou, O '
  - type: text
    content: LORD
  - type: text
    content: ', shalt endure for ever;'
  - type: text
    content: And thy remembrance unto all generations.
  '13':
  - type: text
    content: 'Thou shalt arise, '
  - type: text
    content: and
  - type: text
    content: ' have mercy upon Zion:'
  - type: text
    content: For the time to favour her, yea, the set time, is come.
  '14':
  - type: text
    content: For thy servants take pleasure in her stones,
  - type: text
    content: And favour the dust thereof.
  '15':
  - type: text
    content: 'So the heathen shall fear the name of the '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: And all the kings of the earth thy glory.
  '16':
  - type: text
    content: 'When the '
  - type: text
    content: LORD
  - type: text
    content: ' shall build up Zion,'
  - type: text
    content: He shall appear in his glory.
  '17':
  - type: text
    content: He will regard the prayer of the destitute,
  - type: text
    content: And not despise their prayer.
  '18':
  - type: text
    content: 'This shall be written for the generation to come:'
  - type: text
    content: 'And the people which shall be created shall praise the '
  - type: text
    content: LORD
  - type: text
    content: .
  '19':
  - type: text
    content: For he hath looked down from the height of his sanctuary;
  - type: text
    content: 'From heaven did the '
  - type: text
    content: LORD
  - type: text
    content: ' behold the earth;'
  '2':
  - type: text
    content: 'Hide not thy face from me in the day '
  - type: text
    content: when
  - type: text
    content: ' I am in trouble;'
  - type: text
    content: 'Incline thine ear unto me: In the day '
  - type: text
    content: when
  - type: text
    content: ' I call answer me speedily.'
  '20':
  - type: text
    content: To hear the groaning of the prisoner;
  - type: text
    content: To loose those that are appointed to death;
  '21':
  - type: text
    content: 'To declare the name of the '
  - type: text
    content: LORD
  - type: text
    content: ' in Zion,'
  - type: text
    content: And his praise in Jerusalem;
  '22':
  - type: text
    content: When the people are gathered together,
  - type: text
    content: 'And the kingdoms, to serve the '
  - type: text
    content: LORD
  - type: text
    content: .
  '23':
  - type: text
    content: He weakened my strength in the way;
  - type: text
    content: He shortened my days.
  '24':
  - type: text
    content: 'I said, O my God, take me not away in the midst of my days:'
  - type: text
    content: 'Thy years '
  - type: text
    content: are
  - type: text
    content: ' throughout all generations.'
  '25':
  - type: text
    content: 'Of old hast thou laid the foundation of the earth:'
  - type: text
    content: 'And the heavens '
  - type: text
    content: are
  - type: text
    content: ' the work of thy hands.'
  '26':
  - type: text
    content: 'They shall perish, but thou shalt endure:'
  - type: text
    content: Yea, all of them shall wax old like a garment;
  - type: text
    content: 'As a vesture shalt thou change them, and they shall be changed:'
  '27':
  - type: text
    content: 'But thou '
  - type: text
    content: art
  - type: text
    content: ' the same, and thy years shall have no end.'
  '28':
  - type: text
    content: The children of thy servants shall continue,
  - type: text
    content: And their seed shall be established before thee.
  '3':
  - type: text
    content: For my days are consumed like smoke,
  - type: text
    content: And my bones are burned as an hearth.
  '4':
  - type: text
    content: My heart is smitten, and withered like grass;
  - type: text
    content: So that I forget to eat my bread.
  '5':
  - type: text
    content: By reason of the voice of my groaning
  - type: text
    content: My bones cleave to my skin.
  '6':
  - type: text
    content: 'I am like a pelican of the wilderness:'
  - type: text
    content: I am like an owl of the desert.
  '7':
  - type: text
    content: I watch, and am as a sparrow
  - type: text
    content: Alone upon the house top.
  '8':
  - type: text
    content: Mine enemies reproach me all the day;
  - type: text
    content: And
  - type: text
    content: ' they that are mad against me are sworn against me.'
  '9':
  - type: text
    content: For I have eaten ashes like bread,
  - type: text
    content: And mingled my drink with weeping,
