document_id: LEV.4
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Sin Offering
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Speak unto the children of Israel, saying, If a soul shall sin through ignorance against any of the commandments of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: concerning things
  - type: text
    text: ' which ought not to be done, and shall do against any of them:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'If the priest that is anointed do sin according to the sin of the people; then let him bring for his sin, which he hath sinned, a young bullock without blemish unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' for a sin offering. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And he shall bring the bullock unto the door of the tabernacle of the congregation before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and shall lay his hand upon the bullock''s head, and kill the bullock before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the priest that is anointed shall take of the bullock''s blood, and bring it to the tabernacle of the congregation: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and the priest shall dip his finger in the blood, and sprinkle of the blood seven times before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', before the vail of the sanctuary. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the priest shall put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' of the blood upon the horns of the altar of sweet incense before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the tabernacle of the congregation; and shall pour all the blood of the bullock at the bottom of the altar of the burnt offering, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is at
  - type: text
    text: ' the door of the tabernacle of the congregation. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And he shall take off from it all the fat of the bullock for the sin offering; the fat that covereth the inwards, and all the fat that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon the inwards, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and the two kidneys, and the fat that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon them, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' by the flanks, and the caul above the liver, with the kidneys, it shall he take away, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'as it was taken off from the bullock of the sacrifice of peace offerings: and the priest shall burn them upon the altar of the burnt offering. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the skin of the bullock, and all his flesh, with his head, and with his legs, and his inwards, and his dung, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'even the whole bullock shall he carry forth without the camp unto a clean place, where the ashes are poured out, and burn him on the wood with fire: where the ashes are poured out shall he be burnt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And if the whole congregation of Israel sin through ignorance, and the thing be hid from the eyes of the assembly, and they have done '
  - type: usfm
    marker: add
    children:
    - type: text
      text: somewhat against
  - type: text
    text: ' any of the commandments of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: concerning things
  - type: text
    text: ' which should not be done, and are guilty; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'when the sin, which they have sinned against it, is known, then the congregation shall offer a young bullock for the sin, and bring him before the tabernacle of the congregation. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the elders of the congregation shall lay their hands upon the head of the bullock before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': and the bullock shall be killed before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the priest that is anointed shall bring of the bullock''s blood to the tabernacle of the congregation: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'and the priest shall dip his finger '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in some
  - type: text
    text: ' of the blood, and sprinkle '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' seven times before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' before the vail. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And he shall put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' of the blood upon the horns of the altar which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the tabernacle of the congregation, and shall pour out all the blood at the bottom of the altar of the burnt offering, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is at
  - type: text
    text: ' the door of the tabernacle of the congregation. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And he shall take all his fat from him, and burn '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon the altar. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And he shall do with the bullock as he did with the bullock for a sin offering, so shall he do with this: and the priest shall make an atonement for them, and it shall be forgiven them. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And he shall carry forth the bullock without the camp, and burn him as he burned the first bullock: it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a sin offering for the congregation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'When a ruler hath sinned, and done '
  - type: usfm
    marker: add
    children:
    - type: text
      text: somewhat
  - type: text
    text: ' through ignorance '
  - type: usfm
    marker: add
    children:
    - type: text
      text: against
  - type: text
    text: ' any of the commandments of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' his God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: concerning things
  - type: text
    text: ' which should not be done, and is guilty; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'or if his sin, wherein he hath sinned, come to his knowledge; he shall bring his offering, a kid of the goats, a male without blemish: '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and he shall lay his hand upon the head of the goat, and kill it in the place where they kill the burnt offering before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a sin offering. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And the priest shall take of the blood of the sin offering with his finger, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon the horns of the altar of burnt offering, and shall pour out his blood at the bottom of the altar of burnt offering. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And he shall burn all his fat upon the altar, as the fat of the sacrifice of peace offerings: and the priest shall make an atonement for him as concerning his sin, and it shall be forgiven him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And if any one of the common people sin through ignorance, while he doeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: somewhat against
  - type: text
    text: ' any of the commandments of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: concerning things
  - type: text
    text: ' which ought not to be done, and be guilty; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'or if his sin, which he hath sinned, come to his knowledge: then he shall bring his offering, a kid of the goats, a female without blemish, for his sin which he hath sinned. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And he shall lay his hand upon the head of the sin offering, and slay the sin offering in the place of the burnt offering. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And the priest shall take of the blood thereof with his finger, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon the horns of the altar of burnt offering, and shall pour out all the blood thereof at the bottom of the altar. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And he shall take away all the fat thereof, as the fat is taken away from off the sacrifice of peace offerings; and the priest shall burn '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon the altar for a sweet savour unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and the priest shall make an atonement for him, and it shall be forgiven him. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And if he bring a lamb for a sin offering, he shall bring it a female without blemish. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And he shall lay his hand upon the head of the sin offering, and slay it for a sin offering in the place where they kill the burnt offering. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And the priest shall take of the blood of the sin offering with his finger, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon the horns of the altar of burnt offering, and shall pour out all the blood thereof at the bottom of the altar: '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'and he shall take away all the fat thereof, as the fat of the lamb is taken away from the sacrifice of the peace offerings; and the priest shall burn them upon the altar, according to the offerings made by fire unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': and the priest shall make an atonement for his sin that he hath committed, and it shall be forgiven him.'
