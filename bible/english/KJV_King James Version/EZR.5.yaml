document_id: EZR.5,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Work Resumed
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the prophets, Haggai the prophet, and Zechariah the son of Iddo, prophesied unto the Jews that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in Judah and Jerusalem in the name of the God of Israel, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' unto them. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We asked their names also, to certify thee, that we might write the names of the men that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' the chief of them. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And thus they returned us answer, saying, We are the servants of the God of heaven and earth, and build the house that was builded these many years ago, which a great king of Israel builded and set up. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But after that our fathers had provoked the God of heaven unto wrath, he gave them into the hand of Nebuchadnezzar the king of Babylon, the Chaldean, who destroyed this house, and carried the people away into Babylon. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But in the first year of Cyrus the king of Babylon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the same
    - type: text
      text: ' king Cyrus made a decree to build this house of God. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the vessels also of gold and silver of the house of God, which Nebuchadnezzar took out of the temple that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in Jerusalem, and brought them into the temple of Babylon, those did Cyrus the king take out of the temple of Babylon, and they were delivered unto '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ', whose name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Sheshbazzar, whom he had made governor; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said unto him, Take these vessels, go, carry them into the temple that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in Jerusalem, and let the house of God be builded in his place. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then came the same Sheshbazzar, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' laid the foundation of the house of God which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in Jerusalem: and since that time even until now hath it been in building, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yet
    - type: text
      text: ' it is not finished. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore, if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it seem
    - type: text
      text: ' good to the king, let there be search made in the king''s treasure house, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' there at Babylon, whether it be '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ', that a decree was made of Cyrus the king to build this house of God at Jerusalem, and let the king send his pleasure to us concerning this matter.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then rose up Zerubbabel the son of Shealtiel, and Jeshua the son of Jozadak, and began to build the house of God which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' at Jerusalem: and with them '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' the prophets of God helping them. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At the same time came to them Tatnai, governor on this side the river, and Shethar-boznai, and their companions, and said thus unto them, Who hath commanded you to build this house, and to make up this wall? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said we unto them after this manner, What are the names of the men that make this building? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the eye of their God was upon the elders of the Jews, that they could not cause them to cease, till the matter came to Darius: and then they returned answer by letter concerning this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: matter
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The copy of the letter that Tatnai, governor on this side the river, and Shethar-boznai, and his companions the Apharsachites, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' on this side the river, sent unto Darius the king: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'they sent a letter unto him, wherein was written thus; Unto Darius the king, all peace. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be it known unto the king, that we went into the province of Judea, to the house of the great God, which is builded with great stones, and timber is laid in the walls, and this work goeth fast on, and prospereth in their hands. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then asked we those elders, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' said unto them thus, Who commanded you to build this house, and to make up these walls? '
