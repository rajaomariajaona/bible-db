document_id: MAT.27
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When the morning was come, all the chief priests and elders of the people took counsel against Jesus to put him to death: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and when they had bound him, they led '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' away, and delivered him to Pontius Pilate the governor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Judas, which had betrayed him, when he saw that he was condemned, repented himself, and brought again the thirty pieces of silver to the chief priests and elders, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'saying, I have sinned in that I have betrayed the innocent blood. And they said, What '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is that
  - type: text
    text: ' to us? see thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to that
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And he cast down the pieces of silver in the temple, and departed, and went and hanged himself. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the chief priests took the silver pieces, and said, It is not lawful for to put them into the treasury, because it is the price of blood. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And they took counsel, and bought with them the potter''s field, to bury strangers in. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Wherefore that field was called, The field of blood, unto this day. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then was fulfilled that which was spoken by Jeremy the prophet, saying, And they took the thirty pieces of silver, the price of him that was valued, whom they of the children of Israel did value; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: and gave them for the potter's field, as the Lord appointed me.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Jesus Before Pilate
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Jesus stood before the governor: and the governor asked him, saying, Art thou the King of the Jews? And Jesus said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Thou sayest.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And when he was accused of the chief priests and elders, he answered nothing. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then said Pilate unto him, Hearest thou not how many things they witness against thee? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And he answered him to never a word; insomuch that the governor marvelled greatly. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Now at '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' feast the governor was wont to release unto the people a prisoner, whom they would. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And they had then a notable prisoner, called Barabbas. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Therefore when they were gathered together, Pilate said unto them, Whom will ye that I release unto you? Barabbas, or Jesus which is called Christ? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: For he knew that for envy they had delivered him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'When he was set down on the judgment seat, his wife sent unto him, saying, Have thou nothing to do with that just man: for I have suffered many things this day in a dream because of him. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But the chief priests and elders persuaded the multitude that they should ask Barabbas, and destroy Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The governor answered and said unto them, Whether of the twain will ye that I release unto you? They said, Barabbas. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Pilate saith unto them, What shall I do then with Jesus which is called Christ? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: They
  - type: text
    text: ' all say unto him, Let him be crucified. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: And the governor said, Why, what evil hath he done? But they cried out the more, saying, Let him be crucified.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'When Pilate saw that he could prevail nothing, but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' rather a tumult was made, he took water, and washed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' hands before the multitude, saying, I am innocent of the blood of this just person: see ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to it
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then answered all the people, and said, His blood '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' on us, and on our children.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then released he Barabbas unto them: and when he had scourged Jesus, he delivered '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' to be crucified. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then the soldiers of the governor took Jesus into the common hall, and gathered unto him the whole band '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of soldiers
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: And they stripped him, and put on him a scarlet robe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And when they had platted a crown of thorns, they put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon his head, and a reed in his right hand: and they bowed the knee before him, and mocked him, saying, Hail, King of the Jews! '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And they spit upon him, and took the reed, and smote him on the head. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And after that they had mocked him, they took the robe off from him, and put his own raiment on him, and led him away to crucify '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And as they came out, they found a man of Cyrene, Simon by name: him they compelled to bear his cross.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Crucifixion
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And when they were come unto a place called Golgotha, that is to say, a place of a skull, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'they gave him vinegar to drink mingled with gall: and when he had tasted '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thereof
  - type: text
    text: ', he would not drink. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And they crucified him, and parted his garments, casting lots: that it might be fulfilled which was spoken by the prophet, They parted my garments among them, and upon my vesture did they cast lots. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And sitting down they watched him there; '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'and set up over his head his accusation written, THIS IS JESUS THE KING OF THE JEWS. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Then were there two thieves crucified with him, one on the right hand, and another on the left.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And they that passed by reviled him, wagging their heads, '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'and saying, Thou that destroyest the temple, and buildest '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' in three days, save thyself. If thou be the Son of God, come down from the cross. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Likewise also the chief priests mocking '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', with the scribes and elders, said, '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'He saved others; himself he cannot save. If he be the King of Israel, let him now come down from the cross, and we will believe him. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'He trusted in God; let him deliver him now, if he will have him: for he said, I am the Son of God. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'The thieves also, which were crucified with him, cast the same in his teeth. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Now from the sixth hour there was darkness over all the land unto the ninth hour. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'And about the ninth hour Jesus cried with a loud voice, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Eli, Eli, lama sabachthani?
  - type: text
    text: ' that is to say, My God, my God, why hast thou forsaken me? '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Some of them that stood there, when they heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ', said, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' calleth for Elias. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'And straightway one of them ran, and took a spunge, and filled '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' with vinegar, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' on a reed, and gave him to drink. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: The rest said, Let be, let us see whether Elias will come to save him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Jesus, when he had cried again with a loud voice, yielded up the ghost. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'And, behold, the veil of the temple was rent in twain from the top to the bottom; and the earth did quake, and the rocks rent; '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'and the graves were opened; and many bodies of the saints which slept arose, '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: and came out of the graves after his resurrection, and went into the holy city, and appeared unto many.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Now when the centurion, and they that were with him, watching Jesus, saw the earthquake, and those things that were done, they feared greatly, saying, Truly this was the Son of God. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'And many women were there beholding afar off, which followed Jesus from Galilee, ministering unto him: '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: among which was Mary Magdalene, and Mary the mother of James and Joses, and the mother of Zebedee's children.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Burial
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'When the even was come, there came a rich man of Arimathæa, named Joseph, who also himself was Jesus'' disciple: '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'he went to Pilate, and begged the body of Jesus. Then Pilate commanded the body to be delivered. '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'And when Joseph had taken the body, he wrapped it in a clean linen cloth, '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'and laid it in his own new tomb, which he had hewn out in the rock: and he rolled a great stone to the door of the sepulchre, and departed. '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: And there was Mary Magdalene, and the other Mary, sitting over against the sepulchre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Now the next day, that followed the day of the preparation, the chief priests and Pharisees came together unto Pilate, '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'saying, Sir, we remember that that deceiver said, while he was yet alive, After three days I will rise again. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Command therefore that the sepulchre be made sure until the third day, lest his disciples come by night, and steal him away, and say unto the people, He is risen from the dead: so the last error shall be worse than the first. '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Pilate said unto them, Ye have a watch: go your way, make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' as sure as ye can. '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: So they went, and made the sepulchre sure, sealing the stone, and setting a watch.
