  '1':
  - type: text
    content: 'When the morning was come, all the chief priests and elders of the people took counsel against Jesus to put him to death: '
  '10':
  - type: text
    content: and gave them for the potter's field, as the Lord appointed me.
  - type: heading
    content: Jesus Before Pilate
  '11':
  - type: text
    content: 'And Jesus stood before the governor: and the governor asked him, saying, Art thou the King of the Jews? And Jesus said unto him, '
  - type: text
    content: Thou sayest.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'And when he was accused of the chief priests and elders, he answered nothing. '
  '13':
  - type: text
    content: 'Then said Pilate unto him, Hearest thou not how many things they witness against thee? '
  '14':
  - type: text
    content: 'And he answered him to never a word; insomuch that the governor marvelled greatly. '
  '15':
  - type: text
    content: 'Now at '
  - type: text
    content: that
  - type: text
    content: ' feast the governor was wont to release unto the people a prisoner, whom they would. '
  '16':
  - type: text
    content: 'And they had then a notable prisoner, called Barabbas. '
  '17':
  - type: text
    content: 'Therefore when they were gathered together, Pilate said unto them, Whom will ye that I release unto you? Barabbas, or Jesus which is called Christ? '
  '18':
  - type: text
    content: For he knew that for envy they had delivered him.
  '19':
  - type: text
    content: 'When he was set down on the judgment seat, his wife sent unto him, saying, Have thou nothing to do with that just man: for I have suffered many things this day in a dream because of him. '
  '2':
  - type: text
    content: 'and when they had bound him, they led '
  - type: text
    content: him
  - type: text
    content: ' away, and delivered him to Pontius Pilate the governor.'
  '20':
  - type: text
    content: 'But the chief priests and elders persuaded the multitude that they should ask Barabbas, and destroy Jesus. '
  '21':
  - type: text
    content: 'The governor answered and said unto them, Whether of the twain will ye that I release unto you? They said, Barabbas. '
  '22':
  - type: text
    content: 'Pilate saith unto them, What shall I do then with Jesus which is called Christ? '
  - type: text
    content: They
  - type: text
    content: ' all say unto him, Let him be crucified. '
  '23':
  - type: text
    content: And the governor said, Why, what evil hath he done? But they cried out the more, saying, Let him be crucified.
  '24':
  - type: text
    content: 'When Pilate saw that he could prevail nothing, but '
  - type: text
    content: that
  - type: text
    content: ' rather a tumult was made, he took water, and washed '
  - type: text
    content: his
  - type: text
    content: ' hands before the multitude, saying, I am innocent of the blood of this just person: see ye '
  - type: text
    content: to it
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Then answered all the people, and said, His blood '
  - type: text
    content: be
  - type: text
    content: ' on us, and on our children.'
  '26':
  - type: text
    content: 'Then released he Barabbas unto them: and when he had scourged Jesus, he delivered '
  - type: text
    content: him
  - type: text
    content: ' to be crucified. '
  '27':
  - type: text
    content: 'Then the soldiers of the governor took Jesus into the common hall, and gathered unto him the whole band '
  - type: text
    content: of soldiers
  - type: text
    content: '. '
  '28':
  - type: text
    content: And they stripped him, and put on him a scarlet robe.
  '29':
  - type: text
    content: 'And when they had platted a crown of thorns, they put '
  - type: text
    content: it
  - type: text
    content: ' upon his head, and a reed in his right hand: and they bowed the knee before him, and mocked him, saying, Hail, King of the Jews! '
  '3':
  - type: text
    content: 'Then Judas, which had betrayed him, when he saw that he was condemned, repented himself, and brought again the thirty pieces of silver to the chief priests and elders, '
  '30':
  - type: text
    content: 'And they spit upon him, and took the reed, and smote him on the head. '
  '31':
  - type: text
    content: 'And after that they had mocked him, they took the robe off from him, and put his own raiment on him, and led him away to crucify '
  - type: text
    content: him
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'And as they came out, they found a man of Cyrene, Simon by name: him they compelled to bear his cross.'
  - type: heading
    content: The Crucifixion
  '33':
  - type: text
    content: 'And when they were come unto a place called Golgotha, that is to say, a place of a skull, '
  '34':
  - type: text
    content: 'they gave him vinegar to drink mingled with gall: and when he had tasted '
  - type: text
    content: thereof
  - type: text
    content: ', he would not drink. '
  '35':
  - type: text
    content: 'And they crucified him, and parted his garments, casting lots: that it might be fulfilled which was spoken by the prophet, They parted my garments among them, and upon my vesture did they cast lots. '
  '36':
  - type: text
    content: 'And sitting down they watched him there; '
  '37':
  - type: text
    content: 'and set up over his head his accusation written, THIS IS JESUS THE KING OF THE JEWS. '
  '38':
  - type: text
    content: Then were there two thieves crucified with him, one on the right hand, and another on the left.
  '39':
  - type: text
    content: 'And they that passed by reviled him, wagging their heads, '
  '4':
  - type: text
    content: 'saying, I have sinned in that I have betrayed the innocent blood. And they said, What '
  - type: text
    content: is that
  - type: text
    content: ' to us? see thou '
  - type: text
    content: to that
  - type: text
    content: '. '
  '40':
  - type: text
    content: 'and saying, Thou that destroyest the temple, and buildest '
  - type: text
    content: it
  - type: text
    content: ' in three days, save thyself. If thou be the Son of God, come down from the cross. '
  '41':
  - type: text
    content: 'Likewise also the chief priests mocking '
  - type: text
    content: him
  - type: text
    content: ', with the scribes and elders, said, '
  '42':
  - type: text
    content: 'He saved others; himself he cannot save. If he be the King of Israel, let him now come down from the cross, and we will believe him. '
  '43':
  - type: text
    content: 'He trusted in God; let him deliver him now, if he will have him: for he said, I am the Son of God. '
  '44':
  - type: text
    content: 'The thieves also, which were crucified with him, cast the same in his teeth. '
  '45':
  - type: text
    content: 'Now from the sixth hour there was darkness over all the land unto the ninth hour. '
  '46':
  - type: text
    content: 'And about the ninth hour Jesus cried with a loud voice, saying, '
  - type: text
    content: Eli, Eli, lama sabachthani?
  - type: text
    content: ' that is to say, My God, my God, why hast thou forsaken me? '
  '47':
  - type: text
    content: 'Some of them that stood there, when they heard '
  - type: text
    content: that
  - type: text
    content: ', said, This '
  - type: text
    content: man
  - type: text
    content: ' calleth for Elias. '
  '48':
  - type: text
    content: 'And straightway one of them ran, and took a spunge, and filled '
  - type: text
    content: it
  - type: text
    content: ' with vinegar, and put '
  - type: text
    content: it
  - type: text
    content: ' on a reed, and gave him to drink. '
  '49':
  - type: text
    content: The rest said, Let be, let us see whether Elias will come to save him.
  '5':
  - type: text
    content: 'And he cast down the pieces of silver in the temple, and departed, and went and hanged himself. '
  '50':
  - type: text
    content: 'Jesus, when he had cried again with a loud voice, yielded up the ghost. '
  '51':
  - type: text
    content: 'And, behold, the veil of the temple was rent in twain from the top to the bottom; and the earth did quake, and the rocks rent; '
  '52':
  - type: text
    content: 'and the graves were opened; and many bodies of the saints which slept arose, '
  '53':
  - type: text
    content: and came out of the graves after his resurrection, and went into the holy city, and appeared unto many.
  '54':
  - type: text
    content: 'Now when the centurion, and they that were with him, watching Jesus, saw the earthquake, and those things that were done, they feared greatly, saying, Truly this was the Son of God. '
  '55':
  - type: text
    content: 'And many women were there beholding afar off, which followed Jesus from Galilee, ministering unto him: '
  '56':
  - type: text
    content: among which was Mary Magdalene, and Mary the mother of James and Joses, and the mother of Zebedee's children.
  - type: heading
    content: The Burial
  '57':
  - type: text
    content: 'When the even was come, there came a rich man of Arimathæa, named Joseph, who also himself was Jesus'' disciple: '
  '58':
  - type: text
    content: 'he went to Pilate, and begged the body of Jesus. Then Pilate commanded the body to be delivered. '
  '59':
  - type: text
    content: 'And when Joseph had taken the body, he wrapped it in a clean linen cloth, '
  '6':
  - type: text
    content: 'And the chief priests took the silver pieces, and said, It is not lawful for to put them into the treasury, because it is the price of blood. '
  '60':
  - type: text
    content: 'and laid it in his own new tomb, which he had hewn out in the rock: and he rolled a great stone to the door of the sepulchre, and departed. '
  '61':
  - type: text
    content: And there was Mary Magdalene, and the other Mary, sitting over against the sepulchre.
  '62':
  - type: text
    content: 'Now the next day, that followed the day of the preparation, the chief priests and Pharisees came together unto Pilate, '
  '63':
  - type: text
    content: 'saying, Sir, we remember that that deceiver said, while he was yet alive, After three days I will rise again. '
  '64':
  - type: text
    content: 'Command therefore that the sepulchre be made sure until the third day, lest his disciples come by night, and steal him away, and say unto the people, He is risen from the dead: so the last error shall be worse than the first. '
  '65':
  - type: text
    content: 'Pilate said unto them, Ye have a watch: go your way, make '
  - type: text
    content: it
  - type: text
    content: ' as sure as ye can. '
  '66':
  - type: text
    content: So they went, and made the sepulchre sure, sealing the stone, and setting a watch.
  '7':
  - type: text
    content: 'And they took counsel, and bought with them the potter''s field, to bury strangers in. '
  '8':
  - type: text
    content: 'Wherefore that field was called, The field of blood, unto this day. '
  '9':
  - type: text
    content: 'Then was fulfilled that which was spoken by Jeremy the prophet, saying, And they took the thirty pieces of silver, the price of him that was valued, whom they of the children of Israel did value; '
