  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the portion of mine inheritance and of my cup:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou maintainest my lot.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The lines are fallen unto me in pleasant '
  - type: usfm
    marker: add
    children:
    - type: text
      text: places
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yea, I have a goodly heritage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'I will bless the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', who hath given me counsel:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: My reins also instruct me in the night seasons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I have set the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' always before me:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Because '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he is
  - type: text
    text: ' at my right hand, I shall not be moved.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Therefore my heart is glad, and my glory rejoiceth:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: My flesh also shall rest in hope.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For thou wilt not leave my soul in hell;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Neither wilt thou suffer thine Holy One to see corruption.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Thou wilt shew me the path of life: In thy presence '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' fulness of joy;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'At thy right hand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there are
  - type: text
    text: ' pleasures for evermore.'
