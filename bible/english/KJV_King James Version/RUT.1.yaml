  - type: text
    content: ' hath testified against me, and the Almighty hath afflicted me? '
  '22':
  - type: text
    content: 'So Naomi returned, and Ruth the Moabitess, her daughter in law, with her, which returned out of the country of Moab: and they came to Beth-lehem in the beginning of barley harvest.'
  '3':
  - type: text
    content: 'And Elimelech Naomi''s husband died; and she was left, and her two sons. '
  '4':
  - type: text
    content: 'And they took them wives of the women of Moab; the name of the one '
  - type: text
    content: was
  - type: text
    content: ' Orpah, and the name of the other Ruth: and they dwelled there about ten years. '
  '5':
  - type: text
    content: And Mahlon and Chilion died also both of them; and the woman was left of her two sons and her husband.
  '6':
  - type: text
    content: 'Then she arose with her daughters in law, that she might return from the country of Moab: for she had heard in the country of Moab how that the '
  - type: text
    content: LORD
  - type: text
    content: ' had visited his people in giving them bread. '
  '7':
  - type: text
    content: 'Wherefore she went forth out of the place where she was, and her two daughters in law with her; and they went on the way to return unto the land of Judah. '
  '8':
  - type: text
    content: 'And Naomi said unto her two daughters in law, Go, return each to her mother''s house: the '
  - type: text
