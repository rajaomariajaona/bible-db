document_id: RUT.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now it came to pass in the days when the judges ruled, that there was a famine in the land. And a certain man of Beth-lehem-judah went to sojourn in the country of Moab, he, and his wife, and his two sons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the name of the man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Elimelech, and the name of his wife Naomi, and the name of his two sons Mahlon and Chilion, Ephrathites of Beth-lehem-judah. And they came into the country of Moab, and continued there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Elimelech Naomi''s husband died; and she was left, and her two sons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And they took them wives of the women of Moab; the name of the one '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Orpah, and the name of the other Ruth: and they dwelled there about ten years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: And Mahlon and Chilion died also both of them; and the woman was left of her two sons and her husband.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then she arose with her daughters in law, that she might return from the country of Moab: for she had heard in the country of Moab how that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had visited his people in giving them bread. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Wherefore she went forth out of the place where she was, and her two daughters in law with her; and they went on the way to return unto the land of Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Naomi said unto her two daughters in law, Go, return each to her mother''s house: the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' deal kindly with you, as ye have dealt with the dead, and with me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' grant you that ye may find rest, each '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of you
  - type: text
    text: ' in the house of her husband. Then she kissed them; and they lifted up their voice, and wept. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And they said unto her, Surely we will return with thee unto thy people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Naomi said, Turn again, my daughters: why will ye go with me? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' there yet '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any more
  - type: text
    text: ' sons in my womb, that they may be your husbands? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Turn again, my daughters, go '
  - type: usfm
    marker: add
    children:
    - type: text
      text: your way
  - type: text
    text: '; for I am too old to have an husband. If I should say, I have hope, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: if
  - type: text
    text: ' I should have an husband also to night, and should also bear sons; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'would ye tarry for them till they were grown? would ye stay for them from having husbands? nay, my daughters; for it grieveth me much for your sakes that the hand of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' is gone out against me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And they lifted up their voice, and wept again: and Orpah kissed her mother in law; but Ruth clave unto her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And she said, Behold, thy sister in law is gone back unto her people, and unto her gods: return thou after thy sister in law. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And Ruth said, Intreat me not to leave thee, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: or
  - type: text
    text: ' to return from following after thee: for whither thou goest, I will go; and where thou lodgest, I will lodge: thy people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' my people, and thy God my God: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'where thou diest, will I die, and there will I be buried: the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' do so to me, and more also, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: if ought
  - type: text
    text: ' but death part thee and me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: When she saw that she was stedfastly minded to go with her, then she left speaking unto her.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So they two went until they came to Beth-lehem. And it came to pass, when they were come to Beth-lehem, that all the city was moved about them, and they said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' this Naomi? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And she said unto them, Call me not Naomi, call me Mara: for the Almighty hath dealt very bitterly with me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'I went out full, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath brought me home again empty: why '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' call ye me Naomi, seeing the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath testified against me, and the Almighty hath afflicted me? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So Naomi returned, and Ruth the Moabitess, her daughter in law, with her, which returned out of the country of Moab: and they came to Beth-lehem in the beginning of barley harvest.'
