    content: 'And the name of the man '
  - type: text
    content: was
  - type: text
    content: ' Elimelech, and the name of his wife Naomi, and the name of his two sons Mahlon and Chilion, Ephrathites of Beth-lehem-judah. And they came into the country of Moab, and continued there. '
  '20':
  - type: text
    content: 'And she said unto them, Call me not Naomi, call me Mara: for the Almighty hath dealt very bitterly with me. '
  '21':
  - type: text
    content: 'I went out full, and the '
  - type: text
