  - type: text
    content: 'Now it came to pass in the days when the judges ruled, that there was a famine in the land. And a certain man of Beth-lehem-judah went to sojourn in the country of Moab, he, and his wife, and his two sons. '
  '10':
  - type: text
    content: 'And they said unto her, Surely we will return with thee unto thy people. '
