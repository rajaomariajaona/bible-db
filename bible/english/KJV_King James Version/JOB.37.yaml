document_id: JOB.37,1
type_code: eng
verses:
  '1':
  - type: text
    content: At this also my heart trembleth,
  - type: text
    content: And is moved out of his place.
  '10':
  - type: text
    content: 'By the breath of God frost is given:'
  - type: text
    content: And the breadth of the waters is straitened.
  '11':
  - type: text
    content: 'Also by watering he wearieth the thick cloud:'
  - type: text
    content: 'He scattereth his bright cloud:'
  '12':
  - type: text
    content: 'And it is turned round about by his counsels:'
  - type: text
    content: That they may do whatsoever he commandeth them
  - type: text
    content: Upon the face of the world in the earth.
  '13':
  - type: text
    content: He causeth it to come, whether for correction, or for his land, or for mercy.
  '14':
  - type: text
    content: 'Hearken unto this, O Job:'
  - type: text
    content: Stand still, and consider the wondrous works of God.
  '15':
  - type: text
    content: Dost thou know when God disposed them,
  - type: text
    content: And caused the light of his cloud to shine?
  '16':
  - type: text
    content: Dost thou know the balancings of the clouds,
  - type: text
    content: The wondrous works of him which is perfect in knowledge?
  '17':
  - type: text
    content: 'How thy garments '
  - type: text
    content: are
  - type: text
    content: ' warm,'
  - type: text
    content: 'When he quieteth the earth by the south '
  - type: text
    content: wind?
  '18':
  - type: text
    content: Hast thou with him spread out the sky,
  - type: text
    content: Which is
  - type: text
    content: ' strong, '
  - type: text
    content: and
  - type: text
    content: ' as a molten looking glass?'
  '19':
  - type: text
    content: Teach us what we shall say unto him;
  - type: text
    content: For
  - type: text
    content: ' we cannot order '
  - type: text
    content: our speech
  - type: text
    content: ' by reason of darkness.'
  '2':
  - type: text
    content: Hear attentively the noise of his voice,
  - type: text
    content: 'And the sound '
  - type: text
    content: that
  - type: text
    content: ' goeth out of his mouth.'
  '20':
  - type: text
    content: Shall it be told him that I speak?
  - type: text
    content: If a man speak, surely he shall be swallowed up.
  '21':
  - type: text
    content: 'And now '
  - type: text
    content: men
  - type: text
    content: ' see not the bright light'
  - type: text
    content: 'Which '
  - type: text
    content: is
  - type: text
    content: ' in the clouds:'
  - type: text
    content: But the wind passeth, and cleanseth them.
  '22':
  - type: text
    content: 'Fair weather cometh out of the north:'
  - type: text
    content: 'With God '
  - type: text
    content: is
  - type: text
    content: ' terrible majesty.'
  '23':
  - type: text
    content: ' '
  - type: text
    content: Touching
  - type: text
    content: ' the Almighty, we cannot find him out:'
  - type: text
    content: He is
  - type: text
    content: ' excellent in power, and in judgment,'
  - type: text
    content: 'And in plenty of justice: he will not afflict.'
  '24':
  - type: text
    content: 'Men do therefore fear him:'
  - type: text
    content: 'He respecteth not any '
  - type: text
    content: that are
  - type: text
    content: ' wise of heart.'
  '3':
  - type: text
    content: He directeth it under the whole heaven,
  - type: text
    content: And his lightning unto the ends of the earth.
  '4':
  - type: text
    content: 'After it a voice roareth:'
  - type: text
    content: He thundereth with the voice of his excellency;
  - type: text
    content: And he will not stay them when his voice is heard.
  '5':
  - type: text
    content: God thundereth marvellously with his voice;
  - type: text
    content: Great things doeth he, which we cannot comprehend.
  '6':
  - type: text
    content: 'For he saith to the snow, Be thou '
  - type: text
    content: on
  - type: text
    content: ' the earth;'
  - type: text
    content: Likewise to the small rain,
  - type: text
    content: And to the great rain of his strength.
  '7':
  - type: text
    content: He sealeth up the hand of every man;
  - type: text
    content: That all men may know his work.
  '8':
  - type: text
    content: Then the beasts go into dens,
  - type: text
    content: And remain in their places.
  '9':
  - type: text
    content: 'Out of the south cometh the whirlwind:'
  - type: text
    content: And cold out of the north.
