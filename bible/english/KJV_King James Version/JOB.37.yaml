document_id: JOB.37
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: At this also my heart trembleth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And is moved out of his place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hear attentively the noise of his voice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the sound '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' goeth out of his mouth.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He directeth it under the whole heaven,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And his lightning unto the ends of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'After it a voice roareth:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He thundereth with the voice of his excellency;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And he will not stay them when his voice is heard.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: God thundereth marvellously with his voice;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Great things doeth he, which we cannot comprehend.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For he saith to the snow, Be thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: on
  - type: text
    text: ' the earth;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Likewise to the small rain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And to the great rain of his strength.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He sealeth up the hand of every man;
- type: usfm
  marker: q2
  children:
  - type: text
    text: That all men may know his work.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then the beasts go into dens,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And remain in their places.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Out of the south cometh the whirlwind:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And cold out of the north.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'By the breath of God frost is given:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the breadth of the waters is straitened.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Also by watering he wearieth the thick cloud:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He scattereth his bright cloud:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And it is turned round about by his counsels:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: That they may do whatsoever he commandeth them
- type: usfm
  marker: q2
  children:
  - type: text
    text: Upon the face of the world in the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He causeth it to come, whether for correction, or for his land, or for mercy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hearken unto this, O Job:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Stand still, and consider the wondrous works of God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dost thou know when God disposed them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And caused the light of his cloud to shine?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dost thou know the balancings of the clouds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: The wondrous works of him which is perfect in knowledge?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'How thy garments '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' warm,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'When he quieteth the earth by the south '
  - type: usfm
    marker: add
    children:
    - type: text
      text: wind?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hast thou with him spread out the sky,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Which is
  - type: text
    text: ' strong, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' as a molten looking glass?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Teach us what we shall say unto him;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: For
  - type: text
    text: ' we cannot order '
  - type: usfm
    marker: add
    children:
    - type: text
      text: our speech
  - type: text
    text: ' by reason of darkness.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Shall it be told him that I speak?
- type: usfm
  marker: q2
  children:
  - type: text
    text: If a man speak, surely he shall be swallowed up.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And now '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' see not the bright light'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the clouds:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the wind passeth, and cleanseth them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fair weather cometh out of the north:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'With God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' terrible majesty.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Touching
  - type: text
    text: ' the Almighty, we cannot find him out:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: He is
  - type: text
    text: ' excellent in power, and in judgment,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And in plenty of justice: he will not afflict.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Men do therefore fear him:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He respecteth not any '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that are
  - type: text
    text: ' wise of heart.'
