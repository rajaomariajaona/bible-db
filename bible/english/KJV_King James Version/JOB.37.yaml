document_id: JOB.37,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At this also my heart trembleth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And is moved out of his place.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'By the breath of God frost is given:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the breadth of the waters is straitened.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Also by watering he wearieth the thick cloud:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He scattereth his bright cloud:'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And it is turned round about by his counsels:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That they may do whatsoever he commandeth them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Upon the face of the world in the earth.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He causeth it to come, whether for correction, or for his land, or for mercy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hearken unto this, O Job:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Stand still, and consider the wondrous works of God.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dost thou know when God disposed them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And caused the light of his cloud to shine?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dost thou know the balancings of the clouds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The wondrous works of him which is perfect in knowledge?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'How thy garments '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' warm,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When he quieteth the earth by the south '
    - type: usfm
      marker: add
      children:
      - type: text
        text: wind?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hast thou with him spread out the sky,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Which is
    - type: text
      text: ' strong, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' as a molten looking glass?'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teach us what we shall say unto him;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: For
    - type: text
      text: ' we cannot order '
    - type: usfm
      marker: add
      children:
      - type: text
        text: our speech
    - type: text
      text: ' by reason of darkness.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear attentively the noise of his voice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the sound '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' goeth out of his mouth.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shall it be told him that I speak?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If a man speak, surely he shall be swallowed up.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And now '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' see not the bright light'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the clouds:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the wind passeth, and cleanseth them.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fair weather cometh out of the north:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'With God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' terrible majesty.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Touching
    - type: text
      text: ' the Almighty, we cannot find him out:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: He is
    - type: text
      text: ' excellent in power, and in judgment,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And in plenty of justice: he will not afflict.'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Men do therefore fear him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He respecteth not any '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that are
    - type: text
      text: ' wise of heart.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He directeth it under the whole heaven,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his lightning unto the ends of the earth.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'After it a voice roareth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He thundereth with the voice of his excellency;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he will not stay them when his voice is heard.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God thundereth marvellously with his voice;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Great things doeth he, which we cannot comprehend.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For he saith to the snow, Be thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: on
    - type: text
      text: ' the earth;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Likewise to the small rain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And to the great rain of his strength.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sealeth up the hand of every man;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That all men may know his work.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then the beasts go into dens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And remain in their places.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Out of the south cometh the whirlwind:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And cold out of the north.
