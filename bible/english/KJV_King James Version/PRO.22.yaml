  '17':
  - type: text
    content: Bow down thine ear, and hear the words of the wise,
  - type: text
    content: And apply thine heart unto my knowledge.
  '18':
  - type: text
    content: 'For '
  - type: text
    content: it is
  - type: text
    content: ' a pleasant thing if thou keep them within thee;'
  - type: text
    content: They shall withal be fitted in thy lips.
  '19':
  - type: text
    content: 'That thy trust may be in the '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: I have made known to thee this day, even to thee.
  '2':
  - type: text
    content: 'The rich and poor meet together:'
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' the maker of them all.'
  '20':
  - type: text
    content: Have not I written to thee excellent things
  - type: text
    content: In counsels and knowledge,
  '21':
  - type: text
    content: That I might make thee know the certainty of the words of truth;
  - type: text
    content: That thou mightest answer the words of truth to them that send unto thee?
  '22':
  - type: text
    content: 'Rob not the poor, because he '
  - type: text
    content: is
  - type: text
    content: ' poor:'
  - type: text
    content: 'Neither oppress the afflicted in the gate:'
  '23':
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ' will plead their cause,'
  - type: text
    content: And spoil the soul of those that spoiled them.
  '24':
  - type: text
    content: Make no friendship with an angry man;
  - type: text
    content: 'And with a furious man thou shalt not go:'
  '25':
  - type: text
    content: Lest thou learn his ways,
  - type: text
    content: And get a snare to thy soul.
  '26':
  - type: text
    content: 'Be not thou '
  - type: text
    content: one
  - type: text
    content: ' of them that strike hands,'
  - type: text
    content: Or
  - type: text
    content: ' of them that are sureties for debts.'
  '27':
  - type: text
    content: If thou hast nothing to pay,
  - type: text
    content: Why should he take away thy bed from under thee?
  '28':
  - type: text
    content: Remove not the ancient landmark,
  - type: text
    content: Which thy fathers have set.
  '29':
  - type: text
    content: Seest thou a man diligent in his business? he shall stand before kings;
  - type: text
    content: 'He shall not stand before mean '
  - type: text
    content: men
  - type: text
    content: .
  '3':
  - type: text
    content: 'A prudent '
  - type: text
    content: man
  - type: text
    content: ' foreseeth the evil, and hideth himself:'
  - type: text
    content: But the simple pass on, and are punished.
  '4':
  - type: text
    content: 'By humility '
  - type: text
    content: and
  - type: text
    content: ' the fear of the '
  - type: text
    content: LORD
  - type: text
    content: Are
  - type: text
    content: ' riches, and honour, and life.'
  '5':
  - type: text
    content: 'Thorns '
  - type: text
    content: and
  - type: text
    content: ' snares '
  - type: text
    content: are
  - type: text
    content: ' in the way of the froward:'
  - type: text
    content: He that doth keep his soul shall be far from them.
  '6':
  - type: text
    content: 'Train up a child in the way he should go:'
  - type: text
    content: And when he is old, he will not depart from it.
  '7':
  - type: text
    content: The rich ruleth over the poor,
  - type: text
    content: 'And the borrower '
  - type: text
    content: is
  - type: text
    content: ' servant to the lender.'
  '8':
  - type: text
    content: 'He that soweth iniquity shall reap vanity:'
  - type: text
    content: And the rod of his anger shall fail.
  '9':
  - type: text
    content: He that hath a bountiful eye shall be blessed;
  - type: text
    content: For he giveth of his bread to the poor.
