document_id: PRO.22,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A '
    - type: usfm
      marker: add
      children:
      - type: text
        text: good
    - type: text
      text: ' name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' rather to be chosen than great riches,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' loving favour rather than silver and gold.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cast out the scorner, and contention shall go out;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yea, strife and reproach shall cease.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He that loveth pureness of heart,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: For
    - type: text
      text: ' the grace of his lips the king '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' his friend.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' preserve knowledge,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he overthroweth the words of the transgressor.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The slothful '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' saith, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: There is
    - type: text
      text: ' a lion without,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I shall be slain in the streets.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The mouth of strange women '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a deep pit:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He that is abhorred of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall fall therein.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Foolishness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' bound in the heart of a child;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: But
    - type: text
      text: ' the rod of correction shall drive it far from him.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He that oppresseth the poor to increase his '
    - type: usfm
      marker: add
      children:
      - type: text
        text: riches
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' he that giveth to the rich, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall
    - type: text
      text: ' surely '
    - type: usfm
      marker: add
      children:
      - type: text
        text: come
    - type: text
      text: ' to want.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Words of the Wise
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bow down thine ear, and hear the words of the wise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And apply thine heart unto my knowledge.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' a pleasant thing if thou keep them within thee;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They shall withal be fitted in thy lips.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'That thy trust may be in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have made known to thee this day, even to thee.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The rich and poor meet together:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the maker of them all.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Have not I written to thee excellent things
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In counsels and knowledge,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That I might make thee know the certainty of the words of truth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That thou mightest answer the words of truth to them that send unto thee?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Rob not the poor, because he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' poor:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Neither oppress the afflicted in the gate:'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will plead their cause,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And spoil the soul of those that spoiled them.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make no friendship with an angry man;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And with a furious man thou shalt not go:'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lest thou learn his ways,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And get a snare to thy soul.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Be not thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' of them that strike hands,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Or
    - type: text
      text: ' of them that are sureties for debts.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If thou hast nothing to pay,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why should he take away thy bed from under thee?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remove not the ancient landmark,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Which thy fathers have set.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seest thou a man diligent in his business? he shall stand before kings;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He shall not stand before mean '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A prudent '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' foreseeth the evil, and hideth himself:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the simple pass on, and are punished.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'By humility '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Are
    - type: text
      text: ' riches, and honour, and life.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thorns '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' snares '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in the way of the froward:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He that doth keep his soul shall be far from them.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Train up a child in the way he should go:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And when he is old, he will not depart from it.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The rich ruleth over the poor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the borrower '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' servant to the lender.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He that soweth iniquity shall reap vanity:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the rod of his anger shall fail.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He that hath a bountiful eye shall be blessed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For he giveth of his bread to the poor.
