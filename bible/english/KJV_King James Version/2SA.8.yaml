document_id: 2SA.8
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Enemies and Friends
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And after this it came to pass, that David smote the Philistines, and subdued them: and David took Metheg-ammah out of the hand of the Philistines. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he smote Moab, and measured them with a line, casting them down to the ground; even with two lines measured he to put to death, and with one full line to keep alive. And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' the Moabites became David''s servants, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' brought gifts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'David smote also Hadadezer, the son of Rehob, king of Zobah, as he went to recover his border at the river Euphrates. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And David took from him a thousand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: chariots
  - type: text
    text: ', and seven hundred horsemen, and twenty thousand footmen: and David houghed all the chariot '
  - type: usfm
    marker: add
    children:
    - type: text
      text: horses
  - type: text
    text: ', but reserved of them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' an hundred chariots. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And when the Syrians of Damascus came to succour Hadadezer king of Zobah, David slew of the Syrians two and twenty thousand men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then David put garrisons in Syria of Damascus: and the Syrians became servants to David, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' brought gifts. And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' preserved David whithersoever he went. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And David took the shields of gold that were on the servants of Hadadezer, and brought them to Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And from Betah, and from Berothai, cities of Hadadezer, king David took exceeding much brass.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When Toi king of Hamath heard that David had smitten all the host of Hadadezer, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'then Toi sent Joram his son unto king David, to salute him, and to bless him, because he had fought against Hadadezer, and smitten him: for Hadadezer had wars with Toi. And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Joram
  - type: text
    text: ' brought with him vessels of silver, and vessels of gold, and vessels of brass: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'which also king David did dedicate unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', with the silver and gold that he had dedicated of all nations which he subdued; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'of Syria, and of Moab, and of the children of Ammon, and of the Philistines, and of Amalek, and of the spoil of Hadadezer, son of Rehob, king of Zobah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And David gat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' a name when he returned from smiting of the Syrians in the valley of salt, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' eighteen thousand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And he put garrisons in Edom; throughout all Edom put he garrisons, and all they of Edom became David''s servants. And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' preserved David whithersoever he went.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And David reigned over all Israel; and David executed judgment and justice unto all his people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And Joab the son of Zeruiah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' over the host; and Jehoshaphat the son of Ahilud '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' recorder; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'and Zadok the son of Ahitub, and Ahimelech the son of Abiathar, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' the priests; and Seraiah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the scribe; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and Benaiah the son of Jehoiada '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was over
  - type: text
    text: ' both the Cherethites and the Pelethites; and David''s sons were chief rulers.'
