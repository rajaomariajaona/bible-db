document_id: JER.38
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Shephatiah the son of Mattan, and Gedaliah the son of Pashur, and Jucal the son of Shelemiah, and Pashur the son of Malchiah, heard the words that Jeremiah had spoken unto all the people, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', He that remaineth in this city shall die by the sword, by the famine, and by the pestilence: but he that goeth forth to the Chaldeans shall live; for he shall have his life for a prey, and shall live. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', This city shall surely be given into the hand of the king of Babylon''s army, which shall take it.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Condemned to Death
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Therefore the princes said unto the king, We beseech thee, let this man be put to death: for thus he weakeneth the hands of the men of war that remain in this city, and the hands of all the people, in speaking such words unto them: for this man seeketh not the welfare of this people, but the hurt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then Zedekiah the king said, Behold, he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in your hand: for the king '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he that
  - type: text
    text: ' can do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' thing against you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then took they Jeremiah, and cast him into the dungeon of Malchiah the son of Hammelech, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in the court of the prison: and they let down Jeremiah with cords. And in the dungeon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' no water, but mire: so Jeremiah sunk in the mire.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Rescued by an Ethiopian
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now when Ebed-melech the Ethiopian, one of the eunuchs which was in the king''s house, heard that they had put Jeremiah in the dungeon; the king then sitting in the gate of Benjamin; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ebed-melech went forth out of the king''s house, and spake to the king, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'My lord the king, these men have done evil in all that they have done to Jeremiah the prophet, whom they have cast into the dungeon; and he is like to die for hunger in the place where he is: for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no more bread in the city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then the king commanded Ebed-melech the Ethiopian, saying, Take from hence thirty men with thee, and take up Jeremiah the prophet out of the dungeon, before he die. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So Ebed-melech took the men with him, and went into the house of the king under the treasury, and took thence old cast clouts and old rotten rags, and let them down by cords into the dungeon to Jeremiah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Ebed-melech the Ethiopian said unto Jeremiah, Put now '
  - type: usfm
    marker: add
    children:
    - type: text
      text: these
  - type: text
    text: ' old cast clouts and rotten rags under thine armholes under the cords. And Jeremiah did so. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So they drew up Jeremiah with cords, and took him up out of the dungeon: and Jeremiah remained in the court of the prison.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: A Secret Interview
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then Zedekiah the king sent, and took Jeremiah the prophet unto him into the third entry that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': and the king said unto Jeremiah, I will ask thee a thing; hide nothing from me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then Jeremiah said unto Zedekiah, If I declare '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' unto thee, wilt thou not surely put me to death? and if I give thee counsel, wilt thou not hearken unto me? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So Zedekiah the king sware secretly unto Jeremiah, saying, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' liveth, that made us this soul, I will not put thee to death, neither will I give thee into the hand of these men that seek thy life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then said Jeremiah unto Zedekiah, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the God of hosts, the God of Israel; If thou wilt assuredly go forth unto the king of Babylon''s princes, then thy soul shall live, and this city shall not be burned with fire; and thou shalt live, and thine house: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: but if thou wilt not go forth to the king of Babylon's princes, then shall this city be given into the hand of the Chaldeans, and they shall burn it with fire, and thou shalt not escape out of their hand.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And Zedekiah the king said unto Jeremiah, I am afraid of the Jews that are fallen to the Chaldeans, lest they deliver me into their hand, and they mock me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But Jeremiah said, They shall not deliver '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thee
  - type: text
    text: '. Obey, I beseech thee, the voice of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', which I speak unto thee: so it shall be well unto thee, and thy soul shall live. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But if thou refuse to go forth, this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the word that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath shewed me: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'and, behold, all the women that are left in the king of Judah''s house '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' brought forth to the king of Babylon''s princes, and those '
  - type: usfm
    marker: add
    children:
    - type: text
      text: women
  - type: text
    text: ' shall say, Thy friends have set thee on, and have prevailed against thee: thy feet are sunk in the mire, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' they are turned away back. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So they shall bring out all thy wives and thy children to the Chaldeans: and thou shalt not escape out of their hand, but shalt be taken by the hand of the king of Babylon: and thou shalt cause this city to be burned with fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then said Zedekiah unto Jeremiah, Let no man know of these words, and thou shalt not die. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But if the princes hear that I have talked with thee, and they come unto thee, and say unto thee, Declare unto us now what thou hast said unto the king, hide it not from us, and we will not put thee to death; also what the king said unto thee: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'then thou shalt say unto them, I presented my supplication before the king, that he would not cause me to return to Jonathan''s house, to die there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then came all the princes unto Jeremiah, and asked him: and he told them according to all these words that the king had commanded. So they left off speaking with him; for the matter was not perceived. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'So Jeremiah abode in the court of the prison until the day that Jerusalem was taken: and he was '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there
  - type: text
    text: ' when Jerusalem was taken.'
