  '17':
  - type: text
    content: 'Then said Jeremiah unto Zedekiah, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', the God of hosts, the God of Israel; If thou wilt assuredly go forth unto the king of Babylon''s princes, then thy soul shall live, and this city shall not be burned with fire; and thou shalt live, and thine house: '
  '18':
  - type: text
    content: but if thou wilt not go forth to the king of Babylon's princes, then shall this city be given into the hand of the Chaldeans, and they shall burn it with fire, and thou shalt not escape out of their hand.
  '19':
  - type: text
    content: 'And Zedekiah the king said unto Jeremiah, I am afraid of the Jews that are fallen to the Chaldeans, lest they deliver me into their hand, and they mock me. '
  '2':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', He that remaineth in this city shall die by the sword, by the famine, and by the pestilence: but he that goeth forth to the Chaldeans shall live; for he shall have his life for a prey, and shall live. '
  '20':
  - type: text
    content: 'But Jeremiah said, They shall not deliver '
  - type: text
    content: thee
  - type: text
