  '1':
  - type: text
    content: 'Then Shephatiah the son of Mattan, and Gedaliah the son of Pashur, and Jucal the son of Shelemiah, and Pashur the son of Malchiah, heard the words that Jeremiah had spoken unto all the people, saying, '
  '10':
  - type: text
    content: 'Then the king commanded Ebed-melech the Ethiopian, saying, Take from hence thirty men with thee, and take up Jeremiah the prophet out of the dungeon, before he die. '
  '11':
  - type: text
    content: 'So Ebed-melech took the men with him, and went into the house of the king under the treasury, and took thence old cast clouts and old rotten rags, and let them down by cords into the dungeon to Jeremiah. '
  '12':
  - type: text
    content: 'And Ebed-melech the Ethiopian said unto Jeremiah, Put now '
  - type: text
    content: these
  - type: text
    content: ' old cast clouts and rotten rags under thine armholes under the cords. And Jeremiah did so. '
  '13':
  - type: text
    content: 'So they drew up Jeremiah with cords, and took him up out of the dungeon: and Jeremiah remained in the court of the prison.'
  - type: heading
    content: A Secret Interview
