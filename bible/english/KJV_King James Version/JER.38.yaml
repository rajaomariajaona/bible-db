  '7':
  - type: text
    content: 'Now when Ebed-melech the Ethiopian, one of the eunuchs which was in the king''s house, heard that they had put Jeremiah in the dungeon; the king then sitting in the gate of Benjamin; '
  '8':
  - type: text
    content: 'Ebed-melech went forth out of the king''s house, and spake to the king, saying, '
  '9':
  - type: text
    content: 'My lord the king, these men have done evil in all that they have done to Jeremiah the prophet, whom they have cast into the dungeon; and he is like to die for hunger in the place where he is: for '
  - type: text
