  - type: text
    content: 'So they shall bring out all thy wives and thy children to the Chaldeans: and thou shalt not escape out of their hand, but shalt be taken by the hand of the king of Babylon: and thou shalt cause this city to be burned with fire.'
  '24':
  - type: text
    content: 'Then said Zedekiah unto Jeremiah, Let no man know of these words, and thou shalt not die. '
  '25':
  - type: text
    content: 'But if the princes hear that I have talked with thee, and they come unto thee, and say unto thee, Declare unto us now what thou hast said unto the king, hide it not from us, and we will not put thee to death; also what the king said unto thee: '
  '26':
  - type: text
    content: 'then thou shalt say unto them, I presented my supplication before the king, that he would not cause me to return to Jonathan''s house, to die there. '
  '27':
  - type: text
    content: 'Then came all the princes unto Jeremiah, and asked him: and he told them according to all these words that the king had commanded. So they left off speaking with him; for the matter was not perceived. '
  '28':
  - type: text
    content: 'So Jeremiah abode in the court of the prison until the day that Jerusalem was taken: and he was '
  - type: text
