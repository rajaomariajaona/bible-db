document_id: GEN.43,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And the famine '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' sore in the land. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'for except we had lingered, surely now we had returned this second time. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And their father Israel said unto them, If '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it must be
    - type: text
      text: ' so now, do this; take of the best fruits in the land in your vessels, and carry down the man a present, a little balm, and a little honey, spices, and myrrh, nuts, and almonds: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'and take double money in your hand; and the money that was brought again in the mouth of your sacks, carry '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' again in your hand; peradventure it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' an oversight: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'take also your brother, and arise, go again unto the man: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'and God Almighty give you mercy before the man, that he may send away your other brother, and Benjamin. If I be bereaved '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of my children
    - type: text
      text: ', I am bereaved.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And the men took that present, and they took double money in their hand, and Benjamin; and rose up, and went down to Egypt, and stood before Joseph. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And when Joseph saw Benjamin with them, he said to the ruler of his house, Bring '
    - type: usfm
      marker: add
      children:
      - type: text
        text: these
    - type: text
      text: ' men home, and slay, and make ready; for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: these
    - type: text
      text: ' men shall dine with me at noon. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And the man did as Joseph bade; and the man brought the men into Joseph''s house. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And the men were afraid, because they were brought into Joseph''s house; and they said, Because of the money that was returned in our sacks at the first time are we brought in; that he may seek occasion against us, and fall upon us, and take us for bondmen, and our asses. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And they came near to the steward of Joseph''s house, and they communed with him at the door of the house, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And it came to pass, when they had eaten up the corn which they had brought out of Egypt, their father said unto them, Go again, buy us a little food. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'and said, O sir, we came indeed down at the first time to buy food: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'and it came to pass, when we came to the inn, that we opened our sacks, and, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: every
    - type: text
      text: ' man''s money '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in the mouth of his sack, our money in full weight: and we have brought it again in our hand. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And other money have we brought down in our hands to buy food: we cannot tell who put our money in our sacks. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And he said, Peace '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' to you, fear not: your God, and the God of your father, hath given you treasure in your sacks: I had your money. And he brought Simeon out unto them. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And the man brought the men into Joseph''s house, and gave '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' water, and they washed their feet; and he gave their asses provender. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And they made ready the present against Joseph came at noon: for they heard that they should eat bread there.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And when Joseph came home, they brought him the present which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in their hand into the house, and bowed themselves to him to the earth. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And he asked them of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' welfare, and said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' your father well, the old man of whom ye spake? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' he yet alive? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And they answered, Thy servant our father '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in good health, he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' yet alive. And they bowed down their heads, and made obeisance. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And he lifted up his eyes, and saw his brother Benjamin, his mother''s son, and said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' this your younger brother, of whom ye spake unto me? And he said, God be gracious unto thee, my son. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And Judah spake unto him, saying, The man did solemnly protest unto us, saying, Ye shall not see my face, except your brother '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' with you. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And Joseph made haste; for his bowels did yearn upon his brother: and he sought '
    - type: usfm
      marker: add
      children:
      - type: text
        text: where
    - type: text
      text: ' to weep; and he entered into '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' chamber, and wept there. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And he washed his face, and went out, and refrained himself, and said, Set on bread. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And they set on for him by himself, and for them by themselves, and for the Egyptians, which did eat with him, by themselves: because the Egyptians might not eat bread with the Hebrews; for that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' an abomination unto the Egyptians. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And they sat before him, the firstborn according to his birthright, and the youngest according to his youth: and the men marvelled one at another. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'And he took '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and sent
    - type: text
      text: ' messes unto them from before him: but Benjamin''s mess was five times so much as any of their''s. And they drank, and were merry with him.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'If thou wilt send our brother with us, we will go down and buy thee food: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'but if thou wilt not send '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', we will not go down: for the man said unto us, Ye shall not see my face, except your brother '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' with you. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And Israel said, Wherefore dealt ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' ill with me, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' to tell the man whether ye had yet a brother? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And they said, The man asked us straitly of our state, and of our kindred, saying, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' your father yet alive? have ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: another
    - type: text
      text: ' brother? and we told him according to the tenor of these words: could we certainly know that he would say, Bring your brother down? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And Judah said unto Israel his father, Send the lad with me, and we will arise and go; that we may live, and not die, both we, and thou, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' also our little ones. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'I will be surety for him; of my hand shalt thou require him: if I bring him not unto thee, and set him before thee, then let me bear the blame for ever: '
