document_id: LUK.6
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sabbath Problems
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And it came to pass on the second sabbath after the first, that he went through the corn fields; and his disciples plucked the ears of corn, and did eat, rubbing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' hands. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And certain of the Pharisees said unto them, Why do ye that which is not lawful to do on the sabbath days? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Jesus answering them said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Have ye not read so much as this, what David did, when himself was an hungred, and they which were with him;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: how he went into the house of God, and did take and eat the shewbread, and gave also to them that were with him; which it is not lawful to eat but for the priests alone?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And he said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: That the Son of man is Lord also of the sabbath.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And it came to pass also on another sabbath, that he entered into the synagogue and taught: and there was a man whose right hand was withered. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the scribes and Pharisees watched him, whether he would heal on the sabbath day; that they might find an accusation against him. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But he knew their thoughts, and said to the man which had the withered hand, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Rise up, and stand forth in the midst.
  - type: text
    text: ' And he arose and stood forth. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then said Jesus unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I will ask you one thing; Is it lawful on the sabbath days to do good, or to do evil? to save life, or to destroy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: '?'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And looking round about upon them all, he said unto the man, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Stretch forth thy hand.
  - type: text
    text: ' And he did so: and his hand was restored whole as the other. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And they were filled with madness; and communed one with another what they might do to Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And it came to pass in those days, that he went out into a mountain to pray, and continued all night in prayer to God.
- type: usfm
  marker: s2
  children:
  - type: text
    text: His Twelve Apostles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And when it was day, he called '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unto him
  - type: text
    text: ' his disciples: and of them he chose twelve, whom also he named apostles; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Simon, (whom he also named Peter,) and Andrew his brother, James and John, Philip and Bartholomew, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Matthew and Thomas, James the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: son
  - type: text
    text: ' of Alphæus, and Simon called Zelotes, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and Judas '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the brother
  - type: text
    text: ' of James, and Judas Iscariot, which also was the traitor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And he came down with them, and stood in the plain, and the company of his disciples, and a great multitude of people out of all Judæa and Jerusalem, and from the sea coast of Tyre and Sidon, which came to hear him, and to be healed of their diseases; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and they that were vexed with unclean spirits: and they were healed. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And the whole multitude sought to touch him: for there went virtue out of him, and healed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' all.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Addresses His Disciples
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And he lifted up his eyes on his disciples, and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be ye
    - type: text
      text: ' poor: for your''s is the kingdom of God.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are ye
    - type: text
      text: ' that hunger now: for ye shall be filled. Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are ye
    - type: text
      text: ' that weep now: for ye shall laugh.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Blessed are ye, when men shall hate you, and when they shall separate you '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from their company
    - type: text
      text: ', and shall reproach '
    - type: usfm
      marker: add
      children:
      - type: text
        text: you
    - type: text
      text: ', and cast out your name as evil, for the Son of man''s sake.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Rejoice ye in that day, and leap for joy: for, behold, your reward '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' great in heaven: for in the like manner did their fathers unto the prophets.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But woe unto you that are rich! for ye have received your consolation.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Woe unto you that are full! for ye shall hunger. Woe unto you that laugh now! for ye shall mourn and weep.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Woe unto you, when all men shall speak well of you! for so did their fathers to the false prophets.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But I say unto you which hear, Love your enemies, do good to them which hate you,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: bless them that curse you, and pray for them which despitefully use you.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And unto him that smiteth thee on the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' cheek offer also the other; and him that taketh away thy cloke forbid not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to take thy
    - type: text
      text: ' coat also.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Give to every man that asketh of thee; and of him that taketh away thy goods ask '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' not again.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And as ye would that men should do to you, do ye also to them likewise.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For if ye love them which love you, what thank have ye? for sinners also love those that love them.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And if ye do good to them which do good to you, what thank have ye? for sinners also do even the same.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And if ye lend '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to them
    - type: text
      text: ' of whom ye hope to receive, what thank have ye? for sinners also lend to sinners, to receive as much again.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But love ye your enemies, and do good, and lend, hoping for nothing again; and your reward shall be great, and ye shall be the children of the Highest: for he is kind unto the unthankful and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to
    - type: text
      text: ' the evil.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Be ye therefore merciful, as your Father also is merciful.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Judge not, and ye shall not be judged: condemn not, and ye shall not be condemned: forgive, and ye shall be forgiven:'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: give, and it shall be given unto you; good measure, pressed down, and shaken together, and running over, shall men give into your bosom. For with the same measure that ye mete withal it shall be measured to you again.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And he spake a parable unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Can the blind lead the blind? shall they not both fall into the ditch?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'The disciple is not above his master: but every one that is perfect shall be as his master.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And why beholdest thou the mote that is in thy brother's eye, but perceivest not the beam that is in thine own eye?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Either how canst thou say to thy brother, Brother, let me pull out the mote that is in thine eye, when thou thyself beholdest not the beam that is in thine own eye? Thou hypocrite, cast out first the beam out of thine own eye, and then shalt thou see clearly to pull out the mote that is in thy brother's eye.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For a good tree bringeth not forth corrupt fruit; neither doth a corrupt tree bring forth good fruit.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For every tree is known by his own fruit. For of thorns men do not gather figs, nor of a bramble bush gather they grapes.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'A good man out of the good treasure of his heart bringeth forth that which is good; and an evil man out of the evil treasure of his heart bringeth forth that which is evil: for of the abundance of the heart his mouth speaketh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And why call ye me, Lord, Lord, and do not the things which I say?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Whosoever cometh to me, and heareth my sayings, and doeth them, I will shew you to whom he is like:'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'he is like a man which built an house, and digged deep, and laid the foundation on a rock: and when the flood arose, the stream beat vehemently upon that house, and could not shake it: for it was founded upon a rock.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But he that heareth, and doeth not, is like a man that without a foundation built an house upon the earth; against which the stream did beat vehemently, and immediately it fell; and the ruin of that house was great.
