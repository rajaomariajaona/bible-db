  '1':
  - type: heading
    content: Sabbath Problems
  - type: text
    content: 'And it came to pass on the second sabbath after the first, that he went through the corn fields; and his disciples plucked the ears of corn, and did eat, rubbing '
  - type: text
    content: them
  - type: text
    content: ' in '
  - type: text
    content: their
  - type: text
    content: ' hands. '
  '10':
  - type: text
    content: 'And looking round about upon them all, he said unto the man, '
  - type: text
    content: Stretch forth thy hand.
  - type: text
    content: ' And he did so: and his hand was restored whole as the other. '
  '11':
  - type: text
    content: 'And they were filled with madness; and communed one with another what they might do to Jesus. '
  '12':
  - type: text
    content: And it came to pass in those days, that he went out into a mountain to pray, and continued all night in prayer to God.
  - type: heading
    content: His Twelve Apostles
  '13':
  - type: text
    content: 'And when it was day, he called '
  - type: text
    content: unto him
  - type: text
    content: ' his disciples: and of them he chose twelve, whom also he named apostles; '
  '14':
  - type: text
    content: 'Simon, (whom he also named Peter,) and Andrew his brother, James and John, Philip and Bartholomew, '
  '15':
  - type: text
    content: 'Matthew and Thomas, James the '
  - type: text
    content: son
  - type: text
    content: ' of Alphæus, and Simon called Zelotes, '
  '16':
  - type: text
    content: 'and Judas '
  - type: text
    content: the brother
  - type: text
    content: ' of James, and Judas Iscariot, which also was the traitor.'
  '17':
  - type: text
    content: 'And he came down with them, and stood in the plain, and the company of his disciples, and a great multitude of people out of all Judæa and Jerusalem, and from the sea coast of Tyre and Sidon, which came to hear him, and to be healed of their diseases; '
  '18':
  - type: text
    content: 'and they that were vexed with unclean spirits: and they were healed. '
  '19':
  - type: text
    content: 'And the whole multitude sought to touch him: for there went virtue out of him, and healed '
  - type: text
    content: them
  - type: text
    content: ' all.'
  - type: heading
    content: Addresses His Disciples
  '2':
  - type: text
    content: 'And certain of the Pharisees said unto them, Why do ye that which is not lawful to do on the sabbath days? '
  '20':
  - type: text
    content: 'And he lifted up his eyes on his disciples, and said, '
  - type: text
    content: 'Blessed '
  - type: text
    content: be ye
  - type: text
    content: ' poor: for your''s is the kingdom of God.'
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'Blessed '
  - type: text
    content: are ye
  - type: text
    content: ' that hunger now: for ye shall be filled. Blessed '
  - type: text
    content: are ye
  - type: text
    content: ' that weep now: for ye shall laugh.'
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Blessed are ye, when men shall hate you, and when they shall separate you '
  - type: text
    content: from their company
  - type: text
    content: ', and shall reproach '
  - type: text
    content: you
  - type: text
    content: ', and cast out your name as evil, for the Son of man''s sake.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'Rejoice ye in that day, and leap for joy: for, behold, your reward '
  - type: text
    content: is
  - type: text
    content: ' great in heaven: for in the like manner did their fathers unto the prophets.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: But woe unto you that are rich! for ye have received your consolation.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Woe unto you that are full! for ye shall hunger. Woe unto you that laugh now! for ye shall mourn and weep.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Woe unto you, when all men shall speak well of you! for so did their fathers to the false prophets.
  '27':
  - type: text
    content: ' '
  - type: text
    content: But I say unto you which hear, Love your enemies, do good to them which hate you,
  - type: text
    content: ' '
  '28':
  - type: text
    content: bless them that curse you, and pray for them which despitefully use you.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'And unto him that smiteth thee on the '
  - type: text
    content: one
  - type: text
    content: ' cheek offer also the other; and him that taketh away thy cloke forbid not '
  - type: text
    content: to take thy
  - type: text
    content: ' coat also.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'And Jesus answering them said, '
  - type: text
    content: Have ye not read so much as this, what David did, when himself was an hungred, and they which were with him;
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Give to every man that asketh of thee; and of him that taketh away thy goods ask '
  - type: text
    content: them
  - type: text
    content: ' not again.'
  - type: text
    content: ' '
  '31':
  - type: text
    content: And as ye would that men should do to you, do ye also to them likewise.
  - type: text
    content: ' '
  '32':
  - type: text
    content: For if ye love them which love you, what thank have ye? for sinners also love those that love them.
  - type: text
    content: ' '
  '33':
  - type: text
    content: And if ye do good to them which do good to you, what thank have ye? for sinners also do even the same.
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'And if ye lend '
  - type: text
    content: to them
  - type: text
    content: ' of whom ye hope to receive, what thank have ye? for sinners also lend to sinners, to receive as much again.'
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'But love ye your enemies, and do good, and lend, hoping for nothing again; and your reward shall be great, and ye shall be the children of the Highest: for he is kind unto the unthankful and '
  - type: text
    content: to
  - type: text
    content: ' the evil.'
  - type: text
    content: ' '
  '36':
  - type: text
    content: Be ye therefore merciful, as your Father also is merciful.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'Judge not, and ye shall not be judged: condemn not, and ye shall not be condemned: forgive, and ye shall be forgiven:'
  - type: text
    content: ' '
  '38':
  - type: text
    content: give, and it shall be given unto you; good measure, pressed down, and shaken together, and running over, shall men give into your bosom. For with the same measure that ye mete withal it shall be measured to you again.
  '39':
  - type: text
    content: 'And he spake a parable unto them, '
  - type: text
    content: Can the blind lead the blind? shall they not both fall into the ditch?
  - type: text
    content: ' '
  '4':
  - type: text
    content: how he went into the house of God, and did take and eat the shewbread, and gave also to them that were with him; which it is not lawful to eat but for the priests alone?
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'The disciple is not above his master: but every one that is perfect shall be as his master.'
  - type: text
    content: ' '
  '41':
  - type: text
    content: And why beholdest thou the mote that is in thy brother's eye, but perceivest not the beam that is in thine own eye?
  - type: text
    content: ' '
  '42':
  - type: text
    content: Either how canst thou say to thy brother, Brother, let me pull out the mote that is in thine eye, when thou thyself beholdest not the beam that is in thine own eye? Thou hypocrite, cast out first the beam out of thine own eye, and then shalt thou see clearly to pull out the mote that is in thy brother's eye.
  - type: text
    content: ' '
  '43':
  - type: text
    content: For a good tree bringeth not forth corrupt fruit; neither doth a corrupt tree bring forth good fruit.
  - type: text
    content: ' '
  '44':
  - type: text
    content: For every tree is known by his own fruit. For of thorns men do not gather figs, nor of a bramble bush gather they grapes.
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'A good man out of the good treasure of his heart bringeth forth that which is good; and an evil man out of the evil treasure of his heart bringeth forth that which is evil: for of the abundance of the heart his mouth speaketh.'
  '46':
  - type: text
    content: ' '
  - type: text
    content: And why call ye me, Lord, Lord, and do not the things which I say?
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'Whosoever cometh to me, and heareth my sayings, and doeth them, I will shew you to whom he is like:'
  - type: text
    content: ' '
  '48':
  - type: text
    content: 'he is like a man which built an house, and digged deep, and laid the foundation on a rock: and when the flood arose, the stream beat vehemently upon that house, and could not shake it: for it was founded upon a rock.'
  - type: text
    content: ' '
  '49':
  - type: text
    content: But he that heareth, and doeth not, is like a man that without a foundation built an house upon the earth; against which the stream did beat vehemently, and immediately it fell; and the ruin of that house was great.
  '5':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: That the Son of man is Lord also of the sabbath.
  '6':
  - type: text
    content: 'And it came to pass also on another sabbath, that he entered into the synagogue and taught: and there was a man whose right hand was withered. '
  '7':
  - type: text
    content: 'And the scribes and Pharisees watched him, whether he would heal on the sabbath day; that they might find an accusation against him. '
  '8':
  - type: text
    content: 'But he knew their thoughts, and said to the man which had the withered hand, '
  - type: text
    content: Rise up, and stand forth in the midst.
  - type: text
    content: ' And he arose and stood forth. '
  '9':
  - type: text
    content: 'Then said Jesus unto them, '
  - type: text
    content: 'I will ask you one thing; Is it lawful on the sabbath days to do good, or to do evil? to save life, or to destroy '
  - type: text
    content: it
  - type: text
    content: '?'
  - type: text
    content: ' '
