document_id: 2TH.1,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Paul, and Silvanus, and Timotheus, unto the church of the Thessalonians in God our Father and the Lord Jesus Christ: '
  '10':
  - type: text
    content: when he shall come to be glorified in his saints, and to be admired in all them that believe (because our testimony among you was believed) in that day.
  '11':
  - type: text
    content: 'Wherefore also we pray always for you, that our God would count you worthy of '
  - type: text
    content: this
  - type: text
    content: ' calling, and fulfil all the good pleasure of '
  - type: text
    content: his
  - type: text
    content: ' goodness, and the work of faith with power: '
  '12':
  - type: text
    content: that the name of our Lord Jesus Christ may be glorified in you, and ye in him, according to the grace of our God and the Lord Jesus Christ.
  '2':
  - type: text
    content: grace unto you, and peace, from God our Father and the Lord Jesus Christ.
  - type: heading
    content: Rejoicing in their Fidelity
  '3':
  - type: text
    content: 'We are bound to thank God always for you, brethren, as it is meet, because that your faith groweth exceedingly, and the charity of every one of you all toward each other aboundeth; '
  '4':
  - type: text
    content: 'so that we ourselves glory in you in the churches of God for your patience and faith in all your persecutions and tribulations that ye endure: '
  '5':
  - type: text
    content: which is
  - type: text
    content: ' a manifest token of the righteous judgment of God, that ye may be counted worthy of the kingdom of God, for which ye also suffer: '
  '6':
  - type: text
    content: 'seeing '
  - type: text
    content: it is
  - type: text
    content: ' a righteous thing with God to recompense tribulation to them that trouble you; '
  '7':
  - type: text
    content: 'and to you who are troubled rest with us, when the Lord Jesus shall be revealed from heaven with his mighty angels, '
  '8':
  - type: text
    content: 'in flaming fire taking vengeance on them that know not God, and that obey not the gospel of our Lord Jesus Christ: '
  '9':
  - type: text
    content: 'who shall be punished with everlasting destruction from the presence of the Lord, and from the glory of his power; '
