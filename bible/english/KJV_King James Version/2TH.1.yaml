document_id: 2TH.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Paul, and Silvanus, and Timotheus, unto the church of the Thessalonians in God our Father and the Lord Jesus Christ: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: when he shall come to be glorified in his saints, and to be admired in all them that believe (because our testimony among you was believed) in that day.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Wherefore also we pray always for you, that our God would count you worthy of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ' calling, and fulfil all the good pleasure of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' goodness, and the work of faith with power: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: that the name of our Lord Jesus Christ may be glorified in you, and ye in him, according to the grace of our God and the Lord Jesus Christ.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: grace unto you, and peace, from God our Father and the Lord Jesus Christ.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Rejoicing in their Fidelity
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'We are bound to thank God always for you, brethren, as it is meet, because that your faith groweth exceedingly, and the charity of every one of you all toward each other aboundeth; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'so that we ourselves glory in you in the churches of God for your patience and faith in all your persecutions and tribulations that ye endure: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: add
      children:
      - type: text
        text: which is
    - type: text
      text: ' a manifest token of the righteous judgment of God, that ye may be counted worthy of the kingdom of God, for which ye also suffer: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'seeing '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' a righteous thing with God to recompense tribulation to them that trouble you; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'and to you who are troubled rest with us, when the Lord Jesus shall be revealed from heaven with his mighty angels, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'in flaming fire taking vengeance on them that know not God, and that obey not the gospel of our Lord Jesus Christ: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'who shall be punished with everlasting destruction from the presence of the Lord, and from the glory of his power; '
