document_id: DAN.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Signs and Wonders
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nebuchadnezzar the king, unto all people, nations, and languages, that dwell in all the earth; Peace be multiplied unto you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I thought it good to shew the signs and wonders that the high God hath wrought toward me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'How great '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' his signs! and how mighty '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' his wonders! his kingdom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' an everlasting kingdom, and his dominion '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' from generation to generation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I Nebuchadnezzar was at rest in mine house, and flourishing in my palace: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I saw a dream which made me afraid, and the thoughts upon my bed and the visions of my head troubled me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Therefore made I a decree to bring in all the wise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' of Babylon before me, that they might make known unto me the interpretation of the dream. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then came in the magicians, the astrologers, the Chaldeans, and the soothsayers: and I told the dream before them; but they did not make known unto me the interpretation thereof.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But at the last Daniel came in before me, whose name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Belteshazzar, according to the name of my god, and in whom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the spirit of the holy gods: and before him I told the dream, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saying
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'O Belteshazzar, master of the magicians, because I know that the spirit of the holy gods '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in thee, and no secret troubleth thee, tell me the visions of my dream that I have seen, and the interpretation thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Thus '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' the visions of mine head in my bed; I saw, and behold a tree in the midst of the earth, and the height thereof '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' great. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The tree grew, and was strong, and the height thereof reached unto heaven, and the sight thereof to the end of all the earth: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'the leaves thereof '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' fair, and the fruit thereof much, and in it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' meat for all: the beasts of the field had shadow under it, and the fowls of the heaven dwelt in the boughs thereof, and all flesh was fed of it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I saw in the visions of my head upon my bed, and, behold, a watcher and an holy one came down from heaven; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'he cried aloud, and said thus, Hew down the tree, and cut off his branches, shake off his leaves, and scatter his fruit: let the beasts get away from under it, and the fowls from his branches: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'nevertheless leave the stump of his roots in the earth, even with a band of iron and brass, in the tender grass of the field; and let it be wet with the dew of heaven, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: let
  - type: text
    text: ' his portion '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' with the beasts in the grass of the earth: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'let his heart be changed from man''s, and let a beast''s heart be given unto him; and let seven times pass over him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'This matter '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' by the decree of the watchers, and the demand by the word of the holy ones: to the intent that the living may know that the most High ruleth in the kingdom of men, and giveth it to whomsoever he will, and setteth up over it the basest of men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'This dream I king Nebuchadnezzar have seen. Now thou, O Belteshazzar, declare the interpretation thereof, forasmuch as all the wise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' of my kingdom are not able to make known unto me the interpretation: but thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' able; for the spirit of the holy gods '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in thee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then Daniel, whose name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Belteshazzar, was astonied for one hour, and his thoughts troubled him. The king spake, and said, Belteshazzar, let not the dream, or the interpretation thereof, trouble thee. Belteshazzar answered and said, My lord, the dream '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' to them that hate thee, and the interpretation thereof to thine enemies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The tree that thou sawest, which grew, and was strong, whose height reached unto the heaven, and the sight thereof to all the earth; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'whose leaves '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' fair, and the fruit thereof much, and in it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' meat for all; under which the beasts of the field dwelt, and upon whose branches the fowls of the heaven had their habitation: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thou, O king, that art grown and become strong: for thy greatness is grown, and reacheth unto heaven, and thy dominion to the end of the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And whereas the king saw a watcher and an holy one coming down from heaven, and saying, Hew the tree down, and destroy it; yet leave the stump of the roots thereof in the earth, even with a band of iron and brass, in the tender grass of the field; and let it be wet with the dew of heaven, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: let
  - type: text
    text: ' his portion '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' with the beasts of the field, till seven times pass over him; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the interpretation, O king, and this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the decree of the most High, which is come upon my lord the king: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'that they shall drive thee from men, and thy dwelling shall be with the beasts of the field, and they shall make thee to eat grass as oxen, and they shall wet thee with the dew of heaven, and seven times shall pass over thee, till thou know that the most High ruleth in the kingdom of men, and giveth it to whomsoever he will. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And whereas they commanded to leave the stump of the tree roots; thy kingdom shall be sure unto thee, after that thou shalt have known that the heavens do rule. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Wherefore, O king, let my counsel be acceptable unto thee, and break off thy sins by righteousness, and thine iniquities by shewing mercy to the poor; if it may be a lengthening of thy tranquillity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'All this came upon the king Nebuchadnezzar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'At the end of twelve months he walked in the palace of the kingdom of Babylon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The king spake, and said, Is not this great Babylon, that I have built for the house of the kingdom by the might of my power, and for the honour of my majesty? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'While the word '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in the king''s mouth, there fell a voice from heaven, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saying
  - type: text
    text: ', O king Nebuchadnezzar, to thee it is spoken; The kingdom is departed from thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And they shall drive thee from men, and thy dwelling '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' with the beasts of the field: they shall make thee to eat grass as oxen, and seven times shall pass over thee, until thou know that the most High ruleth in the kingdom of men, and giveth it to whomsoever he will. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The same hour was the thing fulfilled upon Nebuchadnezzar: and he was driven from men, and did eat grass as oxen, and his body was wet with the dew of heaven, till his hairs were grown like eagles'' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: feathers
  - type: text
    text: ', and his nails like birds'' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: claws
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And at the end of the days I Nebuchadnezzar lifted up mine eyes unto heaven, and mine understanding returned unto me, and I blessed the most High, and I praised and honoured him that liveth for ever, whose dominion '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' an everlasting dominion, and his kingdom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' from generation to generation: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'and all the inhabitants of the earth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' reputed as nothing: and he doeth according to his will in the army of heaven, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: among
  - type: text
    text: ' the inhabitants of the earth: and none can stay his hand, or say unto him, What doest thou? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'At the same time my reason returned unto me; and for the glory of my kingdom, mine honour and brightness returned unto me; and my counsellors and my lords sought unto me; and I was established in my kingdom, and excellent majesty was added unto me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Now I Nebuchadnezzar praise and extol and honour the King of heaven, all whose works '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' truth, and his ways judgment: and those that walk in pride he is able to abase.'
