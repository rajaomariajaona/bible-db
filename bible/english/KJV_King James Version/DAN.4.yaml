  '1':
  - type: heading
    content: Signs and Wonders
  - type: text
    content: 'Nebuchadnezzar the king, unto all people, nations, and languages, that dwell in all the earth; Peace be multiplied unto you. '
  '10':
  - type: text
    content: 'Thus '
  - type: text
    content: were
  - type: text
    content: ' the visions of mine head in my bed; I saw, and behold a tree in the midst of the earth, and the height thereof '
  - type: text
    content: was
  - type: text
    content: ' great. '
  '11':
  - type: text
    content: 'The tree grew, and was strong, and the height thereof reached unto heaven, and the sight thereof to the end of all the earth: '
  '12':
  - type: text
    content: 'the leaves thereof '
  - type: text
    content: were
  - type: text
    content: ' fair, and the fruit thereof much, and in it '
  - type: text
    content: was
  - type: text
    content: ' meat for all: the beasts of the field had shadow under it, and the fowls of the heaven dwelt in the boughs thereof, and all flesh was fed of it. '
  '13':
  - type: text
    content: 'I saw in the visions of my head upon my bed, and, behold, a watcher and an holy one came down from heaven; '
  '14':
  - type: text
    content: 'he cried aloud, and said thus, Hew down the tree, and cut off his branches, shake off his leaves, and scatter his fruit: let the beasts get away from under it, and the fowls from his branches: '
  '15':
  - type: text
    content: 'nevertheless leave the stump of his roots in the earth, even with a band of iron and brass, in the tender grass of the field; and let it be wet with the dew of heaven, and '
  - type: text
    content: let
  - type: text
    content: ' his portion '
  - type: text
    content: be
  - type: text
    content: ' with the beasts in the grass of the earth: '
  '16':
  - type: text
    content: 'let his heart be changed from man''s, and let a beast''s heart be given unto him; and let seven times pass over him. '
  '17':
  - type: text
    content: 'This matter '
  - type: text
    content: is
  - type: text
    content: ' by the decree of the watchers, and the demand by the word of the holy ones: to the intent that the living may know that the most High ruleth in the kingdom of men, and giveth it to whomsoever he will, and setteth up over it the basest of men. '
  '18':
  - type: text
    content: 'This dream I king Nebuchadnezzar have seen. Now thou, O Belteshazzar, declare the interpretation thereof, forasmuch as all the wise '
  - type: text
    content: men
  - type: text
    content: ' of my kingdom are not able to make known unto me the interpretation: but thou '
  - type: text
    content: art
  - type: text
    content: ' able; for the spirit of the holy gods '
  - type: text
    content: is
  - type: text
    content: ' in thee.'
  '19':
  - type: text
    content: 'Then Daniel, whose name '
  - type: text
    content: was
  - type: text
    content: ' Belteshazzar, was astonied for one hour, and his thoughts troubled him. The king spake, and said, Belteshazzar, let not the dream, or the interpretation thereof, trouble thee. Belteshazzar answered and said, My lord, the dream '
  - type: text
    content: be
  - type: text
    content: ' to them that hate thee, and the interpretation thereof to thine enemies. '
  '2':
  - type: text
    content: 'I thought it good to shew the signs and wonders that the high God hath wrought toward me. '
  '20':
  - type: text
    content: 'The tree that thou sawest, which grew, and was strong, whose height reached unto the heaven, and the sight thereof to all the earth; '
  '21':
  - type: text
    content: 'whose leaves '
  - type: text
    content: were
  - type: text
    content: ' fair, and the fruit thereof much, and in it '
  - type: text
    content: was
  - type: text
    content: ' meat for all; under which the beasts of the field dwelt, and upon whose branches the fowls of the heaven had their habitation: '
  '22':
  - type: text
    content: 'it '
  - type: text
    content: is
  - type: text
    content: ' thou, O king, that art grown and become strong: for thy greatness is grown, and reacheth unto heaven, and thy dominion to the end of the earth. '
  '23':
  - type: text
    content: 'And whereas the king saw a watcher and an holy one coming down from heaven, and saying, Hew the tree down, and destroy it; yet leave the stump of the roots thereof in the earth, even with a band of iron and brass, in the tender grass of the field; and let it be wet with the dew of heaven, and '
  - type: text
    content: let
  - type: text
    content: ' his portion '
  - type: text
    content: be
  - type: text
    content: ' with the beasts of the field, till seven times pass over him; '
  '24':
  - type: text
    content: 'this '
  - type: text
    content: is
  - type: text
    content: ' the interpretation, O king, and this '
  - type: text
    content: is
  - type: text
    content: ' the decree of the most High, which is come upon my lord the king: '
  '25':
  - type: text
    content: 'that they shall drive thee from men, and thy dwelling shall be with the beasts of the field, and they shall make thee to eat grass as oxen, and they shall wet thee with the dew of heaven, and seven times shall pass over thee, till thou know that the most High ruleth in the kingdom of men, and giveth it to whomsoever he will. '
  '26':
  - type: text
    content: 'And whereas they commanded to leave the stump of the tree roots; thy kingdom shall be sure unto thee, after that thou shalt have known that the heavens do rule. '
  '27':
  - type: text
    content: Wherefore, O king, let my counsel be acceptable unto thee, and break off thy sins by righteousness, and thine iniquities by shewing mercy to the poor; if it may be a lengthening of thy tranquillity.
  '28':
  - type: text
    content: 'All this came upon the king Nebuchadnezzar. '
  '29':
  - type: text
    content: 'At the end of twelve months he walked in the palace of the kingdom of Babylon. '
  '3':
  - type: text
    content: 'How great '
  - type: text
    content: are
  - type: text
    content: ' his signs! and how mighty '
  - type: text
    content: are
  - type: text
    content: ' his wonders! his kingdom '
  - type: text
    content: is
  - type: text
    content: ' an everlasting kingdom, and his dominion '
  - type: text
    content: is
  - type: text
    content: ' from generation to generation.'
  '30':
  - type: text
    content: 'The king spake, and said, Is not this great Babylon, that I have built for the house of the kingdom by the might of my power, and for the honour of my majesty? '
  '31':
  - type: text
    content: 'While the word '
  - type: text
    content: was
  - type: text
    content: ' in the king''s mouth, there fell a voice from heaven, '
  - type: text
    content: saying
  - type: text
    content: ', O king Nebuchadnezzar, to thee it is spoken; The kingdom is departed from thee. '
  '32':
  - type: text
    content: 'And they shall drive thee from men, and thy dwelling '
  - type: text
    content: shall be
  - type: text
    content: ' with the beasts of the field: they shall make thee to eat grass as oxen, and seven times shall pass over thee, until thou know that the most High ruleth in the kingdom of men, and giveth it to whomsoever he will. '
  '33':
  - type: text
    content: 'The same hour was the thing fulfilled upon Nebuchadnezzar: and he was driven from men, and did eat grass as oxen, and his body was wet with the dew of heaven, till his hairs were grown like eagles'' '
  - type: text
    content: feathers
  - type: text
    content: ', and his nails like birds'' '
  - type: text
    content: claws
  - type: text
    content: .
  '34':
  - type: text
    content: 'And at the end of the days I Nebuchadnezzar lifted up mine eyes unto heaven, and mine understanding returned unto me, and I blessed the most High, and I praised and honoured him that liveth for ever, whose dominion '
  - type: text
    content: is
  - type: text
    content: ' an everlasting dominion, and his kingdom '
  - type: text
    content: is
  - type: text
    content: ' from generation to generation: '
  '35':
  - type: text
    content: 'and all the inhabitants of the earth '
  - type: text
    content: are
  - type: text
    content: ' reputed as nothing: and he doeth according to his will in the army of heaven, and '
  - type: text
    content: among
  - type: text
    content: ' the inhabitants of the earth: and none can stay his hand, or say unto him, What doest thou? '
  '36':
  - type: text
    content: 'At the same time my reason returned unto me; and for the glory of my kingdom, mine honour and brightness returned unto me; and my counsellors and my lords sought unto me; and I was established in my kingdom, and excellent majesty was added unto me. '
  '37':
  - type: text
    content: 'Now I Nebuchadnezzar praise and extol and honour the King of heaven, all whose works '
  - type: text
    content: are
  - type: text
    content: ' truth, and his ways judgment: and those that walk in pride he is able to abase.'
  '4':
  - type: text
    content: 'I Nebuchadnezzar was at rest in mine house, and flourishing in my palace: '
  '5':
  - type: text
    content: 'I saw a dream which made me afraid, and the thoughts upon my bed and the visions of my head troubled me. '
  '6':
  - type: text
    content: 'Therefore made I a decree to bring in all the wise '
  - type: text
    content: men
  - type: text
    content: ' of Babylon before me, that they might make known unto me the interpretation of the dream. '
  '7':
  - type: text
    content: 'Then came in the magicians, the astrologers, the Chaldeans, and the soothsayers: and I told the dream before them; but they did not make known unto me the interpretation thereof.'
  '8':
  - type: text
    content: 'But at the last Daniel came in before me, whose name '
  - type: text
    content: was
  - type: text
    content: ' Belteshazzar, according to the name of my god, and in whom '
  - type: text
    content: is
  - type: text
    content: ' the spirit of the holy gods: and before him I told the dream, '
  - type: text
    content: saying
  - type: text
    content: ', '
  '9':
  - type: text
    content: 'O Belteshazzar, master of the magicians, because I know that the spirit of the holy gods '
  - type: text
    content: is
  - type: text
    content: ' in thee, and no secret troubleth thee, tell me the visions of my dream that I have seen, and the interpretation thereof. '
