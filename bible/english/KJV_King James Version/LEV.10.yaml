document_id: LEV.10,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Exacting Service
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Nadab and Abihu, the sons of Aaron, took either of them his censer, and put fire therein, and put incense thereon, and offered strange fire before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', which he commanded them not. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and that ye may put difference between holy and unholy, and between unclean and clean; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and that ye may teach the children of Israel all the statutes which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath spoken unto them by the hand of Moses.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses spake unto Aaron, and unto Eleazar and unto Ithamar, his sons that were left, Take the meat offering that remaineth of the offerings of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' made by fire, and eat it without leaven beside the altar: for it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' most holy: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and ye shall eat it in the holy place, because it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy due, and thy sons'' due, of the sacrifices of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' made by fire: for so I am commanded. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the wave breast and heave shoulder shall ye eat in a clean place; thou, and thy sons, and thy daughters with thee: for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they be
    - type: text
      text: ' thy due, and thy sons'' due, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' are given out of the sacrifices of peace offerings of the children of Israel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The heave shoulder and the wave breast shall they bring with the offerings made by fire of the fat, to wave '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it for
    - type: text
      text: ' a wave offering before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; and it shall be thine, and thy sons'' with thee, by a statute for ever; as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath commanded.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses diligently sought the goat of the sin offering, and, behold, it was burnt: and he was angry with Eleazar and Ithamar, the sons of Aaron '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which were
    - type: text
      text: ' left '
    - type: usfm
      marker: add
      children:
      - type: text
        text: alive
    - type: text
      text: ', saying, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wherefore have ye not eaten the sin offering in the holy place, seeing it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' most holy, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: God
    - type: text
      text: ' hath given it you to bear the iniquity of the congregation, to make atonement for them before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, the blood of it was not brought in within the holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'place:'
    - type: text
      text: ' ye should indeed have eaten it in the holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: place
    - type: text
      text: ', as I commanded. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Aaron said unto Moses, Behold, this day have they offered their sin offering and their burnt offering before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; and such things have befallen me: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: if
    - type: text
      text: ' I had eaten the sin offering to day, should it have been accepted in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there went out fire from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and devoured them, and they died before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Moses heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ', he was content.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses said unto Aaron, This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is it
    - type: text
      text: ' that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake, saying, I will be sanctified in them that come nigh me, and before all the people I will be glorified. And Aaron held his peace. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses called Mishael and Elzaphan, the sons of Uzziel the uncle of Aaron, and said unto them, Come near, carry your brethren from before the sanctuary out of the camp. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they went near, and carried them in their coats out of the camp; as Moses had said. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses said unto Aaron, and unto Eleazar and unto Ithamar, his sons, Uncover not your heads, neither rend your clothes; lest ye die, and lest wrath come upon all the people: but let your brethren, the whole house of Israel, bewail the burning which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath kindled. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And ye shall not go out from the door of the tabernacle of the congregation, lest ye die: for the anointing oil of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' upon you. And they did according to the word of Moses.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Aaron, saying, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not drink wine nor strong drink, thou, nor thy sons with thee, when ye go into the tabernacle of the congregation, lest ye die: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it shall be
    - type: text
      text: ' a statute for ever throughout your generations: '
