document_id: 2CH.27,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Jotham
  - type: text
    content: 'Jotham '
  - type: text
    content: was
  - type: text
    content: ' twenty and five years old when he began to reign, and he reigned sixteen years in Jerusalem. His mother''s name also '
  - type: text
    content: was
  - type: text
    content: ' Jerushah, the daughter of Zadok. '
  '2':
  - type: text
    content: 'And he did '
  - type: text
    content: that which was
  - type: text
    content: ' right in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', according to all that his father Uzziah did: howbeit he entered not into the temple of the '
  - type: text
    content: LORD
  - type: text
    content: '. And the people did yet corruptly. '
  '3':
  - type: text
    content: 'He built the high gate of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and on the wall of Ophel he built much. '
  '4':
  - type: text
    content: 'Moreover he built cities in the mountains of Judah, and in the forests he built castles and towers. '
  '5':
  - type: text
    content: 'He fought also with the king of the Ammonites, and prevailed against them. And the children of Ammon gave him the same year an hundred talents of silver, and ten thousand measures of wheat, and ten thousand of barley. So much did the children of Ammon pay unto him, both the second year, and the third. '
  '6':
  - type: text
    content: 'So Jotham became mighty, because he prepared his ways before the '
  - type: text
    content: LORD
  - type: text
    content: ' his God.'
  '7':
  - type: text
    content: 'Now the rest of the acts of Jotham, and all his wars, and his ways, lo, they '
  - type: text
    content: are
  - type: text
    content: ' written in the book of the kings of Israel and Judah. '
  '8':
  - type: text
    content: 'He was five and twenty years old when he began to reign, and reigned sixteen years in Jerusalem. '
  '9':
  - type: text
    content: 'And Jotham slept with his fathers, and they buried him in the city of David: and Ahaz his son reigned in his stead.'
