document_id: 2CH.27,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jotham
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jotham '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' twenty and five years old when he began to reign, and he reigned sixteen years in Jerusalem. His mother''s name also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Jerushah, the daughter of Zadok. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And he did '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which was
    - type: text
      text: ' right in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', according to all that his father Uzziah did: howbeit he entered not into the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. And the people did yet corruptly. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'He built the high gate of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and on the wall of Ophel he built much. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Moreover he built cities in the mountains of Judah, and in the forests he built castles and towers. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'He fought also with the king of the Ammonites, and prevailed against them. And the children of Ammon gave him the same year an hundred talents of silver, and ten thousand measures of wheat, and ten thousand of barley. So much did the children of Ammon pay unto him, both the second year, and the third. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So Jotham became mighty, because he prepared his ways before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' his God.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Now the rest of the acts of Jotham, and all his wars, and his ways, lo, they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' written in the book of the kings of Israel and Judah. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'He was five and twenty years old when he began to reign, and reigned sixteen years in Jerusalem. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And Jotham slept with his fathers, and they buried him in the city of David: and Ahaz his son reigned in his stead.'
