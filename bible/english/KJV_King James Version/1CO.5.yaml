document_id: 1CO.5,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Moral Disorders
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'It is reported commonly '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that there is
    - type: text
      text: ' fornication among you, and such fornication as is not so much as named among the Gentiles, that one should have his father''s wife. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'yet not altogether with the fornicators of this world, or with the covetous, or extortioners, or with idolaters; for then must ye needs go out of the world. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But now I have written unto you not to keep company, if any man that is called a brother be a fornicator, or covetous, or an idolater, or a railer, or a drunkard, or an extortioner; with such an one no not to eat. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'For what have I to do to judge them also that are without? do not ye judge them that are within? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: But them that are without God judgeth. Therefore put away from among yourselves that wicked person.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And ye are puffed up, and have not rather mourned, that he that hath done this deed might be taken away from among you. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For I verily, as absent in body, but present in spirit, have judged already, as though I were present, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: concerning
    - type: text
      text: ' him that hath so done this deed, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'in the name of our Lord Jesus Christ, when ye are gathered together, and my spirit, with the power of our Lord Jesus Christ, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'to deliver such an one unto Satan for the destruction of the flesh, that the spirit may be saved in the day of the Lord Jesus. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Your glorying '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not good. Know ye not that a little leaven leaveneth the whole lump? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Purge out therefore the old leaven, that ye may be a new lump, as ye are unleavened. For even Christ our passover is sacrificed for us: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'therefore let us keep the feast, not with old leaven, neither with the leaven of malice and wickedness; but with the unleavened '
    - type: usfm
      marker: add
      children:
      - type: text
        text: bread
    - type: text
      text: ' of sincerity and truth.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'I wrote unto you in an epistle not to company with fornicators: '
