document_id: PSA.2,1
type_code: eng
verses:
  '1':
  - type: text
    content: Why do the heathen rage,
  - type: text
    content: And the people imagine a vain thing?
  '10':
  - type: text
    content: 'Be wise now therefore, O ye kings:'
  - type: text
    content: Be instructed, ye judges of the earth.
  '11':
  - type: text
    content: 'Serve the '
  - type: text
    content: LORD
  - type: text
    content: ' with fear,'
  - type: text
    content: And rejoice with trembling.
  '12':
  - type: text
    content: 'Kiss the Son, lest he be angry, and ye perish '
  - type: text
    content: from
  - type: text
    content: ' the way,'
  - type: text
    content: 'When his wrath is kindled but a little. Blessed '
  - type: text
    content: are
  - type: text
    content: ' all they that put their trust in him.'
  '2':
  - type: text
    content: The kings of the earth set themselves, and the rulers take counsel together,
  - type: text
    content: 'Against the '
  - type: text
    content: LORD
  - type: text
    content: ', and against his anointed, '
  - type: text
    content: saying
  - type: text
    content: ','
  '3':
  - type: text
    content: Let us break their bands asunder,
  - type: text
    content: And cast away their cords from us.
  '4':
  - type: text
    content: 'He that sitteth in the heavens shall laugh:'
  - type: text
    content: The Lord shall have them in derision.
  '5':
  - type: text
    content: Then shall he speak unto them in his wrath,
  - type: text
    content: And vex them in his sore displeasure.
  '6':
  - type: text
    content: Yet have I set my king upon my holy hill of Zion.
  '7':
  - type: text
    content: 'I will declare the decree: the '
  - type: text
    content: LORD
  - type: text
    content: ' hath said unto me,'
  - type: text
    content: 'Thou '
  - type: text
    content: art
  - type: text
    content: ' my Son; this day have I begotten thee.'
  '8':
  - type: text
    content: 'Ask of me, and I shall give '
  - type: text
    content: thee
  - type: text
    content: ' the heathen '
  - type: text
    content: for
  - type: text
    content: ' thine inheritance,'
  - type: text
    content: 'And the uttermost parts of the earth '
  - type: text
    content: for
  - type: text
    content: ' thy possession.'
  '9':
  - type: text
    content: Thou shalt break them with a rod of iron;
  - type: text
    content: Thou shalt dash them in pieces like a potter's vessel.
