document_id: PSA.2,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do the heathen rage,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the people imagine a vain thing?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Be wise now therefore, O ye kings:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Be instructed, ye judges of the earth.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Serve the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' with fear,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And rejoice with trembling.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Kiss the Son, lest he be angry, and ye perish '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from
    - type: text
      text: ' the way,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When his wrath is kindled but a little. Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' all they that put their trust in him.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The kings of the earth set themselves, and the rulers take counsel together,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and against his anointed, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: saying
    - type: text
      text: ','
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let us break their bands asunder,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And cast away their cords from us.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He that sitteth in the heavens shall laugh:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The Lord shall have them in derision.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then shall he speak unto them in his wrath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And vex them in his sore displeasure.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet have I set my king upon my holy hill of Zion.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will declare the decree: the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath said unto me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' my Son; this day have I begotten thee.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ask of me, and I shall give '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thee
    - type: text
      text: ' the heathen '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' thine inheritance,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the uttermost parts of the earth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' thy possession.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thou shalt break them with a rod of iron;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou shalt dash them in pieces like a potter's vessel.
