document_id: EZK.6,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Desolation of the Land
  - type: text
    content: 'And the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came unto me, saying, '
  '10':
  - type: text
    content: 'And they shall know that I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: and that
  - type: text
    content: ' I have not said in vain that I would do this evil unto them.'
  '11':
  - type: text
    content: 'Thus saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: '; Smite with thine hand, and stamp with thy foot, and say, Alas for all the evil abominations of the house of Israel! for they shall fall by the sword, by the famine, and by the pestilence. '
  '12':
  - type: text
    content: 'He that is far off shall die of the pestilence; and he that is near shall fall by the sword; and he that remaineth and is besieged shall die by the famine: thus will I accomplish my fury upon them. '
  '13':
  - type: text
    content: 'Then shall ye know that I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ', when their slain '
  - type: text
    content: men
  - type: text
    content: ' shall be among their idols round about their altars, upon every high hill, in all the tops of the mountains, and under every green tree, and under every thick oak, the place where they did offer sweet savour to all their idols. '
  '14':
  - type: text
    content: 'So will I stretch out my hand upon them, and make the land desolate, yea, more desolate than the wilderness toward Diblath, in all their habitations: and they shall know that I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: .
  '2':
  - type: text
    content: 'Son of man, set thy face toward the mountains of Israel, and prophesy against them, '
  '3':
  - type: text
    content: 'and say, Ye mountains of Israel, hear the word of the Lord '
  - type: text
    content: GOD
  - type: text
    content: '; Thus saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: ' to the mountains, and to the hills, to the rivers, and to the valleys; Behold, I, '
  - type: text
    content: even
  - type: text
    content: ' I, will bring a sword upon you, and I will destroy your high places. '
  '4':
  - type: text
    content: 'And your altars shall be desolate, and your images shall be broken: and I will cast down your slain '
  - type: text
    content: men
  - type: text
    content: ' before your idols. '
  '5':
  - type: text
    content: 'And I will lay the dead carcases of the children of Israel before their idols; and I will scatter your bones round about your altars. '
  '6':
  - type: text
    content: 'In all your dwellingplaces the cities shall be laid waste, and the high places shall be desolate; that your altars may be laid waste and made desolate, and your idols may be broken and cease, and your images may be cut down, and your works may be abolished. '
  '7':
  - type: text
    content: 'And the slain shall fall in the midst of you, and ye shall know that I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: .
  '8':
  - type: text
    content: 'Yet will I leave a remnant, that ye may have '
  - type: text
    content: some
  - type: text
    content: ' that shall escape the sword among the nations, when ye shall be scattered through the countries. '
  '9':
  - type: text
    content: 'And they that escape of you shall remember me among the nations whither they shall be carried captives, because I am broken with their whorish heart, which hath departed from me, and with their eyes, which go a whoring after their idols: and they shall lothe themselves for the evils which they have committed in all their abominations. '
