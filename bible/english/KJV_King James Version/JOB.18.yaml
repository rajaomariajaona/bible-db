document_id: JOB.18,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Bildad's Speech
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then answered Bildad the Shuhite, and said,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The snare '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' laid for him in the ground,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a trap for him in the way.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Terrors shall make him afraid on every side,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And shall drive him to his feet.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: His strength shall be hungerbitten,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And destruction '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' ready at his side.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'It shall devour the strength of his skin:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Even
    - type: text
      text: ' the firstborn of death shall devour his strength.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: His confidence shall be rooted out of his tabernacle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And it shall bring him to the king of terrors.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'It shall dwell in his tabernacle, because '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' none of his:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Brimstone shall be scattered upon his habitation.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: His roots shall be dried up beneath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And above shall his branch be cut off.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: His remembrance shall perish from the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he shall have no name in the street.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: He shall be driven from light into darkness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And chased out of the world.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: He shall neither have son nor nephew among his people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor any remaining in his dwellings.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'How long '
    - type: usfm
      marker: add
      children:
      - type: text
        text: will it be ere
    - type: text
      text: ' ye make an end of words?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Mark, and afterwards we will speak.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'They that come after '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' shall be astonied at his day,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As they that went before were affrighted.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Surely such '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the dwellings of the wicked,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the place '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of him that
    - type: text
      text: ' knoweth not God.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Wherefore are we counted as beasts,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' reputed vile in your sight?'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'He teareth himself in his anger:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shall the earth be forsaken for thee?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And shall the rock be removed out of his place?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Yea, the light of the wicked shall be put out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the spark of his fire shall not shine.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The light shall be dark in his tabernacle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his candle shall be put out with him.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The steps of his strength shall be straitened,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his own counsel shall cast him down.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: For he is cast into a net by his own feet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he walketh upon a snare.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The gin shall take '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' by the heel,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' the robber shall prevail against him.'
