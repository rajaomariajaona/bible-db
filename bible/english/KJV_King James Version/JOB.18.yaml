document_id: JOB.18,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Bildad's Speech
  - type: text
    content: Then answered Bildad the Shuhite, and said,
  '10':
  - type: text
    content: 'The snare '
  - type: text
    content: is
  - type: text
    content: ' laid for him in the ground,'
  - type: text
    content: And a trap for him in the way.
  '11':
  - type: text
    content: Terrors shall make him afraid on every side,
  - type: text
    content: And shall drive him to his feet.
  '12':
  - type: text
    content: His strength shall be hungerbitten,
  - type: text
    content: 'And destruction '
  - type: text
    content: shall be
  - type: text
    content: ' ready at his side.'
  '13':
  - type: text
    content: 'It shall devour the strength of his skin:'
  - type: text
    content: Even
  - type: text
    content: ' the firstborn of death shall devour his strength.'
  '14':
  - type: text
    content: His confidence shall be rooted out of his tabernacle,
  - type: text
    content: And it shall bring him to the king of terrors.
  '15':
  - type: text
    content: 'It shall dwell in his tabernacle, because '
  - type: text
    content: it is
  - type: text
    content: ' none of his:'
  - type: text
    content: Brimstone shall be scattered upon his habitation.
  '16':
  - type: text
    content: His roots shall be dried up beneath,
  - type: text
    content: And above shall his branch be cut off.
  '17':
  - type: text
    content: His remembrance shall perish from the earth,
  - type: text
    content: And he shall have no name in the street.
  '18':
  - type: text
    content: He shall be driven from light into darkness,
  - type: text
    content: And chased out of the world.
  '19':
  - type: text
    content: He shall neither have son nor nephew among his people,
  - type: text
    content: Nor any remaining in his dwellings.
  '2':
  - type: text
    content: 'How long '
  - type: text
    content: will it be ere
  - type: text
    content: ' ye make an end of words?'
  - type: text
    content: Mark, and afterwards we will speak.
  '20':
  - type: text
    content: 'They that come after '
  - type: text
    content: him
  - type: text
    content: ' shall be astonied at his day,'
  - type: text
    content: As they that went before were affrighted.
  '21':
  - type: text
    content: 'Surely such '
  - type: text
    content: are
  - type: text
    content: ' the dwellings of the wicked,'
  - type: text
    content: 'And this '
  - type: text
    content: is
  - type: text
    content: ' the place '
  - type: text
    content: of him that
  - type: text
    content: ' knoweth not God.'
  '3':
  - type: text
    content: Wherefore are we counted as beasts,
  - type: text
    content: And
  - type: text
    content: ' reputed vile in your sight?'
  '4':
  - type: text
    content: 'He teareth himself in his anger:'
  - type: text
    content: Shall the earth be forsaken for thee?
  - type: text
    content: And shall the rock be removed out of his place?
  '5':
  - type: text
    content: Yea, the light of the wicked shall be put out,
  - type: text
    content: And the spark of his fire shall not shine.
  '6':
  - type: text
    content: The light shall be dark in his tabernacle,
  - type: text
    content: And his candle shall be put out with him.
  '7':
  - type: text
    content: The steps of his strength shall be straitened,
  - type: text
    content: And his own counsel shall cast him down.
  '8':
  - type: text
    content: For he is cast into a net by his own feet,
  - type: text
    content: And he walketh upon a snare.
  '9':
  - type: text
    content: 'The gin shall take '
  - type: text
    content: him
  - type: text
    content: ' by the heel,'
  - type: text
    content: And
  - type: text
    content: ' the robber shall prevail against him.'
