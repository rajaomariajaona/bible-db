document_id: 2CH.30,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Renewed the Passover
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Hezekiah sent to all Israel and Judah, and wrote letters also to Ephraim and Manasseh, that they should come to the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' at Jerusalem, to keep the passover unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the posts passed from city to city through the country of Ephraim and Manasseh, even unto Zebulun: but they laughed them to scorn, and mocked them. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nevertheless divers of Asher and Manasseh and of Zebulun humbled themselves, and came to Jerusalem. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also in Judah the hand of God was to give them one heart to do the commandment of the king and of the princes, by the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there assembled at Jerusalem much people to keep the feast of unleavened bread in the second month, a very great congregation. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they arose and took away the altars that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in Jerusalem, and all the altars for incense took they away, and cast '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' into the brook Kidron. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they killed the passover on the fourteenth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the second month: and the priests and the Levites were ashamed, and sanctified themselves, and brought in the burnt offerings into the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they stood in their place after their manner, according to the law of Moses the man of God: the priests sprinkled the blood, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which they received
    - type: text
      text: ' of the hand of the Levites. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there were
    - type: text
      text: ' many in the congregation that were not sanctified: therefore the Levites had the charge of the killing of the passovers for every one '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that was
    - type: text
      text: ' not clean, to sanctify '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For a multitude of the people, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' many of Ephraim, and Manasseh, Issachar, and Zebulun, had not cleansed themselves, yet did they eat the passover otherwise than it was written. But Hezekiah prayed for them, saying, The good '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' pardon every one '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' prepareth his heart to seek God, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of his fathers, though '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he be
    - type: text
      text: ' not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: cleansed
    - type: text
      text: ' according to the purification of the sanctuary. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the king had taken counsel, and his princes, and all the congregation in Jerusalem, to keep the passover in the second month. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hearkened to Hezekiah, and healed the people. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Israel that were present at Jerusalem kept the feast of unleavened bread seven days with great gladness: and the Levites and the priests praised the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' day by day, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: singing
    - type: text
      text: ' with loud instruments unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Hezekiah spake comfortably unto all the Levites that taught the good knowledge of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': and they did eat throughout the feast seven days, offering peace offerings, and making confession to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of their fathers.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the whole assembly took counsel to keep other seven days: and they kept '
    - type: usfm
      marker: add
      children:
      - type: text
        text: other
    - type: text
      text: ' seven days with gladness. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For Hezekiah king of Judah did give to the congregation a thousand bullocks and seven thousand sheep; and the princes gave to the congregation a thousand bullocks and ten thousand sheep: and a great number of priests sanctified themselves. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the congregation of Judah, with the priests and the Levites, and all the congregation that came out of Israel, and the strangers that came out of the land of Israel, and that dwelt in Judah, rejoiced. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So there was great joy in Jerusalem: for since the time of Solomon the son of David king of Israel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' not the like in Jerusalem. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the priests the Levites arose and blessed the people: and their voice was heard, and their prayer came '
    - type: usfm
      marker: add
      children:
      - type: text
        text: up
    - type: text
      text: ' to his holy dwelling place, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' unto heaven.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For they could not keep it at that time, because the priests had not sanctified themselves sufficiently, neither had the people gathered themselves together to Jerusalem. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the thing pleased the king and all the congregation. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they established a decree to make proclamation throughout all Israel, from Beer-sheba even to Dan, that they should come to keep the passover unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel at Jerusalem: for they had not done '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' of a long '
    - type: usfm
      marker: add
      children:
      - type: text
        text: time in such sort
    - type: text
      text: ' as it was written. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the posts went with the letters from the king and his princes throughout all Israel and Judah, and according to the commandment of the king, saying, Ye children of Israel, turn again unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Abraham, Isaac, and Israel, and he will return to the remnant of you, that are escaped out of the hand of the kings of Assyria. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And be not ye like your fathers, and like your brethren, which trespassed against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of their fathers, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: who
    - type: text
      text: ' therefore gave them up to desolation, as ye see. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now be ye not stiffnecked, as your fathers '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were, but
    - type: text
      text: ' yield yourselves unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and enter into his sanctuary, which he hath sanctified for ever: and serve the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God, that the fierceness of his wrath may turn away from you. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if ye turn again unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', your brethren and your children '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall find
    - type: text
      text: ' compassion before them that lead them captive, so that they shall come again into this land: for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' gracious and merciful, and will not turn away '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' face from you, if ye return unto him.'
