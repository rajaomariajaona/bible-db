  '1':
  - type: heading
    content: Renewed the Passover
  - type: text
    content: 'And Hezekiah sent to all Israel and Judah, and wrote letters also to Ephraim and Manasseh, that they should come to the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' at Jerusalem, to keep the passover unto the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel. '
  '10':
  - type: text
    content: 'So the posts passed from city to city through the country of Ephraim and Manasseh, even unto Zebulun: but they laughed them to scorn, and mocked them. '
  '11':
  - type: text
    content: 'Nevertheless divers of Asher and Manasseh and of Zebulun humbled themselves, and came to Jerusalem. '
  '12':
  - type: text
    content: 'Also in Judah the hand of God was to give them one heart to do the commandment of the king and of the princes, by the word of the '
  - type: text
    content: LORD
  - type: text
    content: .
  '13':
  - type: text
    content: 'And there assembled at Jerusalem much people to keep the feast of unleavened bread in the second month, a very great congregation. '
  '14':
  - type: text
    content: 'And they arose and took away the altars that '
  - type: text
    content: were
  - type: text
    content: ' in Jerusalem, and all the altars for incense took they away, and cast '
  - type: text
    content: them
  - type: text
    content: ' into the brook Kidron. '
  '15':
  - type: text
    content: 'Then they killed the passover on the fourteenth '
  - type: text
    content: day
  - type: text
    content: ' of the second month: and the priests and the Levites were ashamed, and sanctified themselves, and brought in the burnt offerings into the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'And they stood in their place after their manner, according to the law of Moses the man of God: the priests sprinkled the blood, '
  - type: text
    content: which they received
  - type: text
    content: ' of the hand of the Levites. '
  '17':
  - type: text
    content: 'For '
  - type: text
    content: there were
  - type: text
    content: ' many in the congregation that were not sanctified: therefore the Levites had the charge of the killing of the passovers for every one '
  - type: text
    content: that was
  - type: text
    content: ' not clean, to sanctify '
  - type: text
    content: them
  - type: text
    content: ' unto the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'For a multitude of the people, '
  - type: text
    content: even
  - type: text
    content: ' many of Ephraim, and Manasseh, Issachar, and Zebulun, had not cleansed themselves, yet did they eat the passover otherwise than it was written. But Hezekiah prayed for them, saying, The good '
  - type: text
    content: LORD
  - type: text
    content: ' pardon every one '
  '19':
  - type: text
    content: that
  - type: text
    content: ' prepareth his heart to seek God, the '
  - type: text
    content: LORD
  - type: text
    content: ' God of his fathers, though '
  - type: text
    content: he be
  - type: text
    content: ' not '
  - type: text
    content: cleansed
  - type: text
    content: ' according to the purification of the sanctuary. '
  '2':
  - type: text
    content: 'For the king had taken counsel, and his princes, and all the congregation in Jerusalem, to keep the passover in the second month. '
  '20':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' hearkened to Hezekiah, and healed the people. '
  '21':
  - type: text
    content: 'And the children of Israel that were present at Jerusalem kept the feast of unleavened bread seven days with great gladness: and the Levites and the priests praised the '
  - type: text
    content: LORD
  - type: text
    content: ' day by day, '
  - type: text
    content: singing
  - type: text
    content: ' with loud instruments unto the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'And Hezekiah spake comfortably unto all the Levites that taught the good knowledge of the '
  - type: text
    content: LORD
  - type: text
    content: ': and they did eat throughout the feast seven days, offering peace offerings, and making confession to the '
  - type: text
    content: LORD
  - type: text
    content: ' God of their fathers.'
  '23':
  - type: text
    content: 'And the whole assembly took counsel to keep other seven days: and they kept '
  - type: text
    content: other
  - type: text
    content: ' seven days with gladness. '
  '24':
  - type: text
    content: 'For Hezekiah king of Judah did give to the congregation a thousand bullocks and seven thousand sheep; and the princes gave to the congregation a thousand bullocks and ten thousand sheep: and a great number of priests sanctified themselves. '
  '25':
  - type: text
    content: 'And all the congregation of Judah, with the priests and the Levites, and all the congregation that came out of Israel, and the strangers that came out of the land of Israel, and that dwelt in Judah, rejoiced. '
  '26':
  - type: text
    content: 'So there was great joy in Jerusalem: for since the time of Solomon the son of David king of Israel '
  - type: text
    content: there was
  - type: text
    content: ' not the like in Jerusalem. '
  '27':
  - type: text
    content: 'Then the priests the Levites arose and blessed the people: and their voice was heard, and their prayer came '
  - type: text
    content: up
  - type: text
    content: ' to his holy dwelling place, '
  - type: text
    content: even
  - type: text
    content: ' unto heaven.'
  '3':
  - type: text
    content: 'For they could not keep it at that time, because the priests had not sanctified themselves sufficiently, neither had the people gathered themselves together to Jerusalem. '
  '4':
  - type: text
    content: 'And the thing pleased the king and all the congregation. '
  '5':
  - type: text
    content: 'So they established a decree to make proclamation throughout all Israel, from Beer-sheba even to Dan, that they should come to keep the passover unto the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel at Jerusalem: for they had not done '
  - type: text
    content: it
  - type: text
    content: ' of a long '
  - type: text
    content: time in such sort
  - type: text
    content: ' as it was written. '
  '6':
  - type: text
    content: 'So the posts went with the letters from the king and his princes throughout all Israel and Judah, and according to the commandment of the king, saying, Ye children of Israel, turn again unto the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Abraham, Isaac, and Israel, and he will return to the remnant of you, that are escaped out of the hand of the kings of Assyria. '
  '7':
  - type: text
    content: 'And be not ye like your fathers, and like your brethren, which trespassed against the '
  - type: text
    content: LORD
  - type: text
    content: ' God of their fathers, '
  - type: text
    content: who
  - type: text
    content: ' therefore gave them up to desolation, as ye see. '
  '8':
  - type: text
    content: 'Now be ye not stiffnecked, as your fathers '
  - type: text
    content: were, but
  - type: text
    content: ' yield yourselves unto the '
  - type: text
    content: LORD
  - type: text
    content: ', and enter into his sanctuary, which he hath sanctified for ever: and serve the '
  - type: text
    content: LORD
  - type: text
    content: ' your God, that the fierceness of his wrath may turn away from you. '
  '9':
  - type: text
    content: 'For if ye turn again unto the '
  - type: text
    content: LORD
  - type: text
    content: ', your brethren and your children '
  - type: text
    content: shall find
  - type: text
    content: ' compassion before them that lead them captive, so that they shall come again into this land: for the '
  - type: text
    content: LORD
  - type: text
    content: ' your God '
  - type: text
    content: is
  - type: text
    content: ' gracious and merciful, and will not turn away '
  - type: text
    content: his
  - type: text
    content: ' face from you, if ye return unto him.'
