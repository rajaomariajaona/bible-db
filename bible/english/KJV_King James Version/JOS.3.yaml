verses:
  '1':
  - type: heading
    content: Crossing the Jordan
  - type: text
    content: 'And Joshua rose early in the morning; and they removed from Shittim, and came to Jordan, he and all the children of Israel, and lodged there before they passed over. '
  '10':
  - type: text
    content: 'And Joshua said, Hereby ye shall know that the living God '
  - type: text
    content: is
  - type: text
    content: ' among you, and '
  - type: text
    content: that
  - type: text
    content: ' he will without fail drive out from before you the Canaanites, and the Hittites, and the Hivites, and the Perizzites, and the Girgashites, and the Amorites, and the Jebusites. '
  '11':
  - type: text
    content: 'Behold, the ark of the covenant of the Lord of all the earth passeth over before you into Jordan. '
  '12':
  - type: text
    content: 'Now therefore take you twelve men out of the tribes of Israel, out of every tribe a man. '
  '13':
  - type: text
    content: 'And it shall come to pass, as soon as the soles of the feet of the priests that bear the ark of the '
  - type: text
    content: LORD
  - type: text
    content: ', the Lord of all the earth, shall rest in the waters of Jordan, '
  - type: text
    content: that
  - type: text
    content: ' the waters of Jordan shall be cut off '
  - type: text
    content: from
  - type: text
    content: ' the waters that come down from above; and they shall stand upon an heap.'
  '14':
  - type: text
    content: 'And it came to pass, when the people removed from their tents, to pass over Jordan, and the priests bearing the ark of the covenant before the people; '
  '15':
  - type: text
    content: 'and as they that bare the ark were come unto Jordan, and the feet of the priests that bare the ark were dipped in the brim of the water, (for Jordan overfloweth all his banks all the time of harvest,) '
  '16':
  - type: text
    content: 'that the waters which came down from above stood '
  - type: text
    content: and
  - type: text
    content: ' rose up upon an heap very far from the city Adam, that '
  - type: text
    content: is
  - type: text
    content: ' beside Zaretan: and those that came down toward the sea of the plain, '
  - type: text
    content: even
  - type: text
    content: ' the salt sea, failed, '
  - type: text
    content: and
  - type: text
    content: ' were cut off: and the people passed over right against Jericho. '
  '17':
  - type: text
    content: 'And the priests that bare the ark of the covenant of the '
  - type: text
    content: LORD
  - type: text
    content: ' stood firm on dry ground in the midst of Jordan, and all the Israelites passed over on dry ground, until all the people were passed clean over Jordan.'
  '2':
  - type: text
    content: 'And it came to pass after three days, that the officers went through the host; '
  '3':
  - type: text
    content: 'and they commanded the people, saying, When ye see the ark of the covenant of the '
  - type: text
    content: LORD
  - type: text
    content: ' your God, and the priests the Levites bearing it, then ye shall remove from your place, and go after it. '
  '4':
  - type: text
    content: 'Yet there shall be a space between you and it, about two thousand cubits by measure: come not near unto it, that ye may know the way by which ye must go: for ye have not passed '
  - type: text
    content: this
  - type: text
    content: ' way heretofore. '
  '5':
  - type: text
    content: 'And Joshua said unto the people, Sanctify yourselves: for to morrow the '
  - type: text
    content: LORD
  - type: text
    content: ' will do wonders among you. '
  '6':
  - type: text
    content: And Joshua spake unto the priests, saying, Take up the ark of the covenant, and pass over before the people. And they took up the ark of the covenant, and went before the people.
  '7':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Joshua, This day will I begin to magnify thee in the sight of all Israel, that they may know that, as I was with Moses, '
  - type: text
    content: so
  - type: text
    content: ' I will be with thee. '
  '8':
  - type: text
    content: 'And thou shalt command the priests that bear the ark of the covenant, saying, When ye are come to the brink of the water of Jordan, ye shall stand still in Jordan. '
  '9':
  - type: text
    content: 'And Joshua said unto the children of Israel, Come hither, and hear the words of the '
  - type: text
    content: LORD
  - type: text
    content: ' your God. '
