document_id: 2CH.11,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem the capital of Judah
  - type: heading
    content: Its Fortifications and Fenced Cities
  - type: text
    content: 'And when Rehoboam was come to Jerusalem, he gathered of the house of Judah and Benjamin an hundred and fourscore thousand chosen '
  - type: text
    content: men
  - type: text
    content: ', which were warriors, to fight against Israel, that he might bring the kingdom again to Rehoboam. '
  '10':
  - type: text
    content: 'and Zorah, and Aijalon, and Hebron, which '
  - type: text
    content: are
  - type: text
    content: ' in Judah and in Benjamin fenced cities. '
  '11':
  - type: text
    content: 'And he fortified the strong holds, and put captains in them, and store of victual, and of oil and wine. '
  '12':
  - type: text
    content: 'And in every several city '
  - type: text
    content: he put
  - type: text
    content: ' shields and spears, and made them exceeding strong, having Judah and Benjamin on his side.'
  '13':
  - type: text
    content: 'And the priests and the Levites that '
  - type: text
    content: were
  - type: text
    content: ' in all Israel resorted to him out of all their coasts. '
  '14':
  - type: text
    content: 'For the Levites left their suburbs and their possession, and came to Judah and Jerusalem: for Jeroboam and his sons had cast them off from executing the priest''s office unto the '
  - type: text
    content: LORD
  - type: text
    content: ': '
  '15':
  - type: text
    content: 'and he ordained him priests for the high places, and for the devils, and for the calves which he had made. '
  '16':
  - type: text
    content: 'And after them out of all the tribes of Israel such as set their hearts to seek the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel came to Jerusalem, to sacrifice unto the '
  - type: text
    content: LORD
  - type: text
    content: ' God of their fathers. '
  '17':
  - type: text
    content: 'So they strengthened the kingdom of Judah, and made Rehoboam the son of Solomon strong, three years: for three years they walked in the way of David and Solomon.'
  '18':
  - type: text
    content: 'And Rehoboam took him Mahalath the daughter of Jerimoth the son of David to wife, '
  - type: text
    content: and
  - type: text
    content: ' Abihail the daughter of Eliab the son of Jesse; '
  '19':
  - type: text
    content: 'which bare him children; Jeush, and Shemariah, and Zaham. '
  '2':
  - type: text
    content: 'But the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came to Shemaiah the man of God, saying, '
  '20':
  - type: text
    content: 'And after her he took Maachah the daughter of Absalom; which bare him Abijah, and Attai, and Ziza, and Shelomith. '
  '21':
  - type: text
    content: 'And Rehoboam loved Maachah the daughter of Absalom above all his wives and his concubines: (for he took eighteen wives, and threescore concubines; and begat twenty and eight sons, and threescore daughters.) '
  '22':
  - type: text
    content: 'And Rehoboam made Abijah the son of Maachah the chief, '
  - type: text
    content: to be
  - type: text
    content: ' ruler among his brethren: for '
  - type: text
    content: he thought
  - type: text
    content: ' to make him king. '
  '23':
  - type: text
    content: 'And he dealt wisely, and dispersed of all his children throughout all the countries of Judah and Benjamin, unto every fenced city: and he gave them victual in abundance. And he desired many wives.'
  '3':
  - type: text
    content: 'Speak unto Rehoboam the son of Solomon, king of Judah, and to all Israel in Judah and Benjamin, saying, '
  '4':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', Ye shall not go up, nor fight against your brethren: return every man to his house: for this thing is done of me. And they obeyed the words of the '
  - type: text
    content: LORD
  - type: text
    content: ', and returned from going against Jeroboam.'
  '5':
  - type: text
    content: 'And Rehoboam dwelt in Jerusalem, and built cities for defence in Judah. '
  '6':
  - type: text
    content: 'He built even Beth-lehem, and Etam, and Tekoa, '
  '7':
  - type: text
    content: 'and Beth-zur, and Shoco, and Adullam, '
  '8':
  - type: text
    content: 'and Gath, and Mareshah, and Ziph, '
  '9':
  - type: text
    content: 'and Adoraim, and Lachish, and Azekah, '
