document_id: ISA.55
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Divine Invitation to Return
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho, every one that thirsteth, come ye to the waters, and he that hath no money; come ye, buy, and eat; yea, come, buy wine and milk without money and without price. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Wherefore do ye spend money for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which is
  - type: text
    text: ' not bread? and your labour for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which
  - type: text
    text: ' satisfieth not? hearken diligently unto me, and eat ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which is
  - type: text
    text: ' good, and let your soul delight itself in fatness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Incline your ear, and come unto me: hear, and your soul shall live; and I will make an everlasting covenant with you, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the sure mercies of David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Behold, I have given him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' a witness to the people, a leader and commander to the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Behold, thou shalt call a nation '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' thou knowest not, and nations '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' knew not thee shall run unto thee because of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, and for the Holy One of Israel; for he hath glorified thee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Seek ye the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' while he may be found, call ye upon him while he is near: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'let the wicked forsake his way, and the unrighteous man his thoughts: and let him return unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and he will have mercy upon him; and to our God, for he will abundantly pardon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For my thoughts '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' not your thoughts, neither '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' your ways my ways, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' the heavens are higher than the earth, so are my ways higher than your ways, and my thoughts than your thoughts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For as the rain cometh down, and the snow from heaven, and returneth not thither, but watereth the earth, and maketh it bring forth and bud, that it may give seed to the sower, and bread to the eater: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'so shall my word be that goeth forth out of my mouth: it shall not return unto me void, but it shall accomplish that which I please, and it shall prosper '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in the thing
  - type: text
    text: ' whereto I sent it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For ye shall go out with joy, and be led forth with peace: the mountains and the hills shall break forth before you into singing, and all the trees of the field shall clap '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' hands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Instead of the thorn shall come up the fir tree, and instead of the brier shall come up the myrtle tree: and it shall be to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' for a name, for an everlasting sign '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' shall not be cut off.'
