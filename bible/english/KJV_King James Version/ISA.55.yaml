verses:
  '1':
  - type: heading
    content: Divine Invitation to Return
  - type: text
    content: 'Ho, every one that thirsteth, come ye to the waters, and he that hath no money; come ye, buy, and eat; yea, come, buy wine and milk without money and without price. '
  '10':
  - type: text
    content: 'For as the rain cometh down, and the snow from heaven, and returneth not thither, but watereth the earth, and maketh it bring forth and bud, that it may give seed to the sower, and bread to the eater: '
  '11':
  - type: text
    content: 'so shall my word be that goeth forth out of my mouth: it shall not return unto me void, but it shall accomplish that which I please, and it shall prosper '
  - type: text
    content: in the thing
  - type: text
    content: ' whereto I sent it. '
  '12':
  - type: text
    content: 'For ye shall go out with joy, and be led forth with peace: the mountains and the hills shall break forth before you into singing, and all the trees of the field shall clap '
  - type: text
    content: their
  - type: text
    content: ' hands. '
  '13':
  - type: text
    content: 'Instead of the thorn shall come up the fir tree, and instead of the brier shall come up the myrtle tree: and it shall be to the '
  - type: text
    content: LORD
  - type: text
    content: ' for a name, for an everlasting sign '
  - type: text
    content: that
  - type: text
    content: ' shall not be cut off.'
  '2':
  - type: text
    content: 'Wherefore do ye spend money for '
  - type: text
    content: that which is
  - type: text
    content: ' not bread? and your labour for '
  - type: text
    content: that which
  - type: text
    content: ' satisfieth not? hearken diligently unto me, and eat ye '
  - type: text
    content: that which is
  - type: text
    content: ' good, and let your soul delight itself in fatness. '
  '3':
  - type: text
    content: 'Incline your ear, and come unto me: hear, and your soul shall live; and I will make an everlasting covenant with you, '
  - type: text
    content: even
  - type: text
    content: ' the sure mercies of David. '
  '4':
  - type: text
    content: 'Behold, I have given him '
  - type: text
    content: for
  - type: text
    content: ' a witness to the people, a leader and commander to the people. '
  '5':
  - type: text
    content: 'Behold, thou shalt call a nation '
  - type: text
    content: that
  - type: text
    content: ' thou knowest not, and nations '
  - type: text
    content: that
  - type: text
    content: ' knew not thee shall run unto thee because of the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God, and for the Holy One of Israel; for he hath glorified thee.'
  '6':
  - type: text
    content: 'Seek ye the '
  - type: text
    content: LORD
  - type: text
    content: ' while he may be found, call ye upon him while he is near: '
  '7':
  - type: text
    content: 'let the wicked forsake his way, and the unrighteous man his thoughts: and let him return unto the '
  - type: text
    content: LORD
  - type: text
    content: ', and he will have mercy upon him; and to our God, for he will abundantly pardon. '
  '8':
  - type: text
    content: 'For my thoughts '
  - type: text
    content: are
  - type: text
    content: ' not your thoughts, neither '
  - type: text
    content: are
  - type: text
    content: ' your ways my ways, saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'For '
  - type: text
    content: as
  - type: text
    content: ' the heavens are higher than the earth, so are my ways higher than your ways, and my thoughts than your thoughts.'
