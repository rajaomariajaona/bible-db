document_id: 1CO.12
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Spiritual Gifts
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now concerning spiritual '
  - type: usfm
    marker: add
    children:
    - type: text
      text: gifts
  - type: text
    text: ', brethren, I would not have you ignorant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ye know that ye were Gentiles, carried away unto these dumb idols, even as ye were led. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Wherefore I give you to understand, that no man speaking by the Spirit of God calleth Jesus accursed: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' no man can say that Jesus is the Lord, but by the Holy Ghost.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now there are diversities of gifts, but the same Spirit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And there are differences of administrations, but the same Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And there are diversities of operations, but it is the same God which worketh all in all. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But the manifestation of the Spirit is given to every man to profit withal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For to one is given by the Spirit the word of wisdom; to another the word of knowledge by the same Spirit; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'to another faith by the same Spirit; to another the gifts of healing by the same Spirit; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'to another the working of miracles; to another prophecy; to another discerning of spirits; to another '
  - type: usfm
    marker: add
    children:
    - type: text
      text: divers
  - type: text
    text: ' kinds of tongues; to another the interpretation of tongues: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: but all these worketh that one and the selfsame Spirit, dividing to every man severally as he will.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For as the body is one, and hath many members, and all the members of that one body, being many, are one body: so also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For by one Spirit are we all baptized into one body, whether '
  - type: usfm
    marker: add
    children:
    - type: text
      text: we be
  - type: text
    text: ' Jews or Gentiles, whether '
  - type: usfm
    marker: add
    children:
    - type: text
      text: we be
  - type: text
    text: ' bond or free; and have been all made to drink into one Spirit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For the body is not one member, but many. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'If the foot shall say, Because I am not the hand, I am not of the body; is it therefore not of the body? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And if the ear shall say, Because I am not the eye, I am not of the body; is it therefore not of the body? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'If the whole body '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' an eye, where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' the hearing? If the whole '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' hearing, where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' the smelling? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But now hath God set the members every one of them in the body, as it hath pleased him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And if they were all one member, where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' the body? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But now '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are they
  - type: text
    text: ' many members, yet but one body. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And the eye cannot say unto the hand, I have no need of thee: nor again the head to the feet, I have no need of you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nay, much more those members of the body, which seem to be more feeble, are necessary: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'and those '
  - type: usfm
    marker: add
    children:
    - type: text
      text: members
  - type: text
    text: ' of the body, which we think to be less honourable, upon these we bestow more abundant honour; and our uncomely '
  - type: usfm
    marker: add
    children:
    - type: text
      text: parts
  - type: text
    text: ' have more abundant comeliness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'For our comely '
  - type: usfm
    marker: add
    children:
    - type: text
      text: parts
  - type: text
    text: ' have no need: but God hath tempered the body together, having given more abundant honour to that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: part
  - type: text
    text: ' which lacked: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'that there should be no schism in the body; but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' the members should have the same care one for another. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And whether one member suffer, all the members suffer with it; or one member be honoured, all the members rejoice with it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Now ye are the body of Christ, and members in particular. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And God hath set some in the church, first apostles, secondarily prophets, thirdly teachers, after that miracles, then gifts of healings, helps, governments, diversities of tongues. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Are
  - type: text
    text: ' all apostles? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' all prophets? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' all teachers? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' all workers of miracles? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Have all the gifts of healing? do all speak with tongues? do all interpret? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'But covet earnestly the best gifts: and yet shew I unto you a more excellent way.'
