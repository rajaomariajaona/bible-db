document_id: PSA.110,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto my Lord,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Sit thou at my right hand, until I make thine enemies thy footstool.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall send the rod of thy strength out of Zion:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Rule thou in the midst of thine enemies.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thy people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' willing in the day of thy power,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In the beauties of holiness from the womb of the morning: Thou hast the dew of thy youth.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath sworn, and will not repent,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' a priest for ever after the order of Melchizedek.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord at thy right hand
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shall strike through kings in the day of his wrath.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He shall judge among the heathen, he shall fill '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the places
    - type: text
      text: ' with the dead bodies;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shall wound the heads over many countries.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He shall drink of the brook in the way:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore shall he lift up the head.
