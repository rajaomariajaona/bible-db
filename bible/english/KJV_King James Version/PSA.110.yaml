document_id: PSA.110,1
type_code: eng
verses:
  '1':
  - type: text
    content: A Psalm of David.
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' said unto my Lord,'
  - type: text
    content: Sit thou at my right hand, until I make thine enemies thy footstool.
  '2':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' shall send the rod of thy strength out of Zion:'
  - type: text
    content: Rule thou in the midst of thine enemies.
  '3':
  - type: text
    content: 'Thy people '
  - type: text
    content: shall be
  - type: text
    content: ' willing in the day of thy power,'
  - type: text
    content: 'In the beauties of holiness from the womb of the morning: Thou hast the dew of thy youth.'
  '4':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' hath sworn, and will not repent,'
  - type: text
    content: 'Thou '
  - type: text
    content: art
  - type: text
    content: ' a priest for ever after the order of Melchizedek.'
  '5':
  - type: text
    content: The Lord at thy right hand
  - type: text
    content: Shall strike through kings in the day of his wrath.
  '6':
  - type: text
    content: 'He shall judge among the heathen, he shall fill '
  - type: text
    content: the places
  - type: text
    content: ' with the dead bodies;'
  - type: text
    content: He shall wound the heads over many countries.
  '7':
  - type: text
    content: 'He shall drink of the brook in the way:'
  - type: text
    content: Therefore shall he lift up the head.
