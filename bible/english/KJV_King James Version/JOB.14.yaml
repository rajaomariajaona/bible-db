document_id: JOB.14,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Man '
  - type: text
    content: that is
  - type: text
    content: ' born of a woman'
  - type: text
    content: Is
  - type: text
    content: ' of few days, and full of trouble.'
  '10':
  - type: text
    content: 'But man dieth, and wasteth away:'
  - type: text
    content: 'Yea, man giveth up the ghost, and where '
  - type: text
    content: is
  - type: text
    content: ' he?'
  '11':
  - type: text
    content: ' '
  - type: text
    content: As
  - type: text
    content: ' the waters fail from the sea,'
  - type: text
    content: 'And the flood decayeth and drieth up:'
  '12':
  - type: text
    content: 'So man lieth down, and riseth not:'
  - type: text
    content: 'Till the heavens '
  - type: text
    content: be
  - type: text
    content: ' no more, they shall not awake,'
  - type: text
    content: Nor be raised out of their sleep.
  '13':
  - type: text
    content: O that thou wouldest hide me in the grave,
  - type: text
    content: That thou wouldest keep me secret, until thy wrath be past,
  - type: text
    content: That thou wouldest appoint me a set time, and remember me!
  '14':
  - type: text
    content: 'If a man die, shall he live '
  - type: text
    content: again?
  - type: text
    content: All the days of my appointed time will I wait,
  - type: text
    content: Till my change come.
  '15':
  - type: text
    content: 'Thou shalt call, and I will answer thee:'
  - type: text
    content: Thou wilt have a desire to the work of thine hands.
  '16':
  - type: text
    content: 'For now thou numberest my steps:'
  - type: text
    content: Dost thou not watch over my sin?
  '17':
  - type: text
    content: 'My transgression '
  - type: text
    content: is
  - type: text
    content: ' sealed up in a bag,'
  - type: text
    content: And thou sewest up mine iniquity.
  '18':
  - type: text
    content: And surely the mountain falling cometh to nought,
  - type: text
    content: And the rock is removed out of his place.
  '19':
  - type: text
    content: 'The waters wear the stones:'
  - type: text
    content: 'Thou washest away the things which grow '
  - type: text
    content: out
  - type: text
    content: ' of the dust of the earth;'
  - type: text
    content: And thou destroyest the hope of man.
  '2':
  - type: text
    content: 'He cometh forth like a flower, and is cut down:'
  - type: text
    content: He fleeth also as a shadow, and continueth not.
  '20':
  - type: text
    content: 'Thou prevailest for ever against him, and he passeth:'
  - type: text
    content: Thou changest his countenance, and sendest him away.
  '21':
  - type: text
    content: 'His sons come to honour, and he knoweth '
  - type: text
    content: it
  - type: text
    content: ' not;'
  - type: text
    content: 'And they are brought low, but he perceiveth '
  - type: text
    content: it
  - type: text
    content: ' not of them.'
  '22':
  - type: text
    content: But his flesh upon him shall have pain,
  - type: text
    content: And his soul within him shall mourn.
  '3':
  - type: text
    content: And dost thou open thine eyes upon such an one,
  - type: text
    content: And bringest me into judgment with thee?
  '4':
  - type: text
    content: 'Who can bring a clean '
  - type: text
    content: thing
  - type: text
    content: ' out of an unclean?'
  - type: text
    content: Not one.
  '5':
  - type: text
    content: 'Seeing his days '
  - type: text
    content: are
  - type: text
    content: ' determined, the number of his months '
  - type: text
    content: are
  - type: text
    content: ' with thee,'
  - type: text
    content: Thou hast appointed his bounds that he cannot pass;
  '6':
  - type: text
    content: Turn from him, that he may rest,
  - type: text
    content: Till he shall accomplish, as an hireling, his day.
  '7':
  - type: text
    content: For there is hope of a tree,
  - type: text
    content: If it be cut down, that it will sprout again,
  - type: text
    content: And that the tender branch thereof will not cease.
  '8':
  - type: text
    content: Though the root thereof wax old in the earth,
  - type: text
    content: And the stock thereof die in the ground;
  '9':
  - type: text
    content: ' '
  - type: text
    content: Yet
  - type: text
    content: ' through the scent of water it will bud,'
  - type: text
    content: And bring forth boughs like a plant.
