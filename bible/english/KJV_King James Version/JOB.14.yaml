document_id: JOB.14
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' born of a woman'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' of few days, and full of trouble.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He cometh forth like a flower, and is cut down:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He fleeth also as a shadow, and continueth not.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: And dost thou open thine eyes upon such an one,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And bringest me into judgment with thee?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Who can bring a clean '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thing
  - type: text
    text: ' out of an unclean?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Not one.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Seeing his days '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' determined, the number of his months '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' with thee,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou hast appointed his bounds that he cannot pass;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Turn from him, that he may rest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Till he shall accomplish, as an hireling, his day.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: For there is hope of a tree,
- type: usfm
  marker: q2
  children:
  - type: text
    text: If it be cut down, that it will sprout again,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And that the tender branch thereof will not cease.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Though the root thereof wax old in the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the stock thereof die in the ground;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Yet
  - type: text
    text: ' through the scent of water it will bud,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And bring forth boughs like a plant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But man dieth, and wasteth away:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Yea, man giveth up the ghost, and where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' he?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' the waters fail from the sea,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the flood decayeth and drieth up:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So man lieth down, and riseth not:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Till the heavens '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' no more, they shall not awake,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nor be raised out of their sleep.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: O that thou wouldest hide me in the grave,
- type: usfm
  marker: q2
  children:
  - type: text
    text: That thou wouldest keep me secret, until thy wrath be past,
- type: usfm
  marker: q2
  children:
  - type: text
    text: That thou wouldest appoint me a set time, and remember me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'If a man die, shall he live '
  - type: usfm
    marker: add
    children:
    - type: text
      text: again?
- type: usfm
  marker: q2
  children:
  - type: text
    text: All the days of my appointed time will I wait,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Till my change come.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Thou shalt call, and I will answer thee:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou wilt have a desire to the work of thine hands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For now thou numberest my steps:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Dost thou not watch over my sin?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'My transgression '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' sealed up in a bag,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thou sewest up mine iniquity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And surely the mountain falling cometh to nought,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the rock is removed out of his place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The waters wear the stones:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Thou washest away the things which grow '
  - type: usfm
    marker: add
    children:
    - type: text
      text: out
  - type: text
    text: ' of the dust of the earth;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thou destroyest the hope of man.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Thou prevailest for ever against him, and he passeth:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou changest his countenance, and sendest him away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'His sons come to honour, and he knoweth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' not;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And they are brought low, but he perceiveth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' not of them.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: But his flesh upon him shall have pain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And his soul within him shall mourn.
