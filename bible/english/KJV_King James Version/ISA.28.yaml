  - type: text
    content: and
  - type: text
    content: ' doth teach him. '
  '27':
  - type: text
    content: 'For the fitches are not threshed with a threshing instrument, neither is a cart wheel turned about upon the cummin; but the fitches are beaten out with a staff, and the cummin with a rod. '
