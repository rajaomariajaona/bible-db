document_id: ISA.28,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Woe to the crown of pride, to the drunkards of Ephraim, whose glorious beauty '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a fading flower, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' on the head of the fat valleys of them that are overcome with wine! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For precept '
    - type: usfm
      marker: add
      children:
      - type: text
        text: must be
    - type: text
      text: ' upon precept, precept upon precept; line upon line, line upon line; here a little, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' there a little: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for with stammering lips and another tongue will he speak to this people. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To whom he said, This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the rest '
    - type: usfm
      marker: add
      children:
      - type: text
        text: wherewith
    - type: text
      text: ' ye may cause the weary to rest; and this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the refreshing: yet they would not hear. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was unto them precept upon precept, precept upon precept; line upon line, line upon line; here a little, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' there a little; that they might go, and fall backward, and be broken, and snared, and taken.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wherefore hear the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', ye scornful men, that rule this people which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in Jerusalem. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because ye have said, We have made a covenant with death, and with hell are we at agreement; when the overflowing scourge shall pass through, it shall not come unto us: for we have made lies our refuge, and under falsehood have we hid ourselves: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'therefore thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ', Behold, I lay in Zion for a foundation a stone, a tried stone, a precious corner '
    - type: usfm
      marker: add
      children:
      - type: text
        text: stone
    - type: text
      text: ', a sure foundation: he that believeth shall not make haste. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Judgment also will I lay to the line, and righteousness to the plummet: and the hail shall sweep away the refuge of lies, and the waters shall overflow the hiding place.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And your covenant with death shall be disannulled, and your agreement with hell shall not stand; when the overflowing scourge shall pass through, then ye shall be trodden down by it. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From the time that it goeth forth it shall take you: for morning by morning shall it pass over, by day and by night: and it shall be a vexation only '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to
    - type: text
      text: ' understand the report. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, the Lord hath a mighty and strong one, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' as a tempest of hail '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' a destroying storm, as a flood of mighty waters overflowing, shall cast down to the earth with the hand. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the bed is shorter than that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: a man
    - type: text
      text: ' can stretch himself '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'on it:'
    - type: text
      text: ' and the covering narrower than that he can wrap himself '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in it
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall rise up as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' mount Perazim, he shall be wroth as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' the valley of Gibeon, that he may do his work, his strange work; and bring to pass his act, his strange act. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore be ye not mockers, lest your bands be made strong: for I have heard from the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ' of hosts a consumption, even determined upon the whole earth.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Give ye ear, and hear my voice; hearken, and hear my speech. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Doth the plowman plow all day to sow? doth he open and break the clods of his ground? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he hath made plain the face thereof, doth he not cast abroad the fitches, and scatter the cummin, and cast in the principal wheat and the appointed barley and the rie in their place? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For his God doth instruct him to discretion, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' doth teach him. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the fitches are not threshed with a threshing instrument, neither is a cart wheel turned about upon the cummin; but the fitches are beaten out with a staff, and the cummin with a rod. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bread '
    - type: usfm
      marker: add
      children:
      - type: text
        text: corn
    - type: text
      text: ' is bruised; because he will not ever be threshing it, nor break '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it with
    - type: text
      text: ' the wheel of his cart, nor bruise it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' his horsemen. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This also cometh forth from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' is wonderful in counsel, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' excellent in working.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The crown of pride, the drunkards of Ephraim, shall be trodden under feet: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the glorious beauty, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' on the head of the fat valley, shall be a fading flower, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' as the hasty fruit before the summer; which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: when
    - type: text
      text: ' he that looketh upon it seeth, while it is yet in his hand he eateth it up. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In that day shall the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts be for a crown of glory, and for a diadem of beauty, unto the residue of his people, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and for a spirit of judgment to him that sitteth in judgment, and for strength to them that turn the battle to the gate.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they also have erred through wine, and through strong drink are out of the way; the priest and the prophet have erred through strong drink, they are swallowed up of wine, they are out of the way through strong drink; they err in vision, they stumble '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' judgment. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For all tables are full of vomit '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' filthiness, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so that there is
    - type: text
      text: ' no place '
    - type: usfm
      marker: add
      children:
      - type: text
        text: clean
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whom shall he teach knowledge? and whom shall he make to understand doctrine? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them that are
    - type: text
      text: ' weaned from the milk, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' drawn from the breasts. '
