    content: 'Give ye ear, and hear my voice; hearken, and hear my speech. '
  '24':
  - type: text
    content: 'Doth the plowman plow all day to sow? doth he open and break the clods of his ground? '
  '25':
  - type: text
    content: 'When he hath made plain the face thereof, doth he not cast abroad the fitches, and scatter the cummin, and cast in the principal wheat and the appointed barley and the rie in their place? '
  '26':
