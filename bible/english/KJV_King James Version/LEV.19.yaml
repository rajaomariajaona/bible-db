document_id: LEV.19,1
type_code: eng
verses:
  '1':
  - type: heading
    content: General Statutes
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '10':
  - type: text
    content: 'And thou shalt not glean thy vineyard, neither shalt thou gather '
  - type: text
    content: every
  - type: text
    content: ' grape of thy vineyard; thou shalt leave them for the poor and stranger: I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' your God.'
  '11':
  - type: text
    content: Ye shall not steal, neither deal falsely, neither lie one to another.
  '12':
  - type: text
    content: 'And ye shall not swear by my name falsely, neither shalt thou profane the name of thy God: I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: .
  '13':
  - type: text
    content: 'Thou shalt not defraud thy neighbour, neither rob '
  - type: text
    content: 'him:'
  - type: text
    content: ' the wages of him that is hired shall not abide with thee all night until the morning.'
  '14':
  - type: text
    content: 'Thou shalt not curse the deaf, nor put a stumblingblock before the blind, but shalt fear thy God: I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: .
  '15':
  - type: text
    content: 'Ye shall do no unrighteousness in judgment: thou shalt not respect the person of the poor, nor honour the person of the mighty: '
  - type: text
    content: but
  - type: text
    content: ' in righteousness shalt thou judge thy neighbour.'
  '16':
  - type: text
    content: 'Thou shalt not go up and down '
  - type: text
    content: as
  - type: text
    content: ' a talebearer among thy people: neither shalt thou stand against the blood of thy neighbour: I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: .
  '17':
  - type: text
    content: 'Thou shalt not hate thy brother in thine heart: thou shalt in any wise rebuke thy neighbour, and not suffer sin upon him.'
  '18':
  - type: text
    content: 'Thou shalt not avenge, nor bear any grudge against the children of thy people, but thou shalt love thy neighbour as thyself: I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: .
  '19':
  - type: text
    content: 'Ye shall keep my statutes. Thou shalt not let thy cattle gender with a diverse kind: thou shalt not sow thy field with mingled seed: neither shall a garment mingled of linen and woollen come upon thee.'
  '2':
  - type: text
    content: 'Speak unto all the congregation of the children of Israel, and say unto them, Ye shall be holy: for I the '
  - type: text
    content: LORD
  - type: text
    content: ' your God '
  - type: text
    content: am
  - type: text
    content: ' holy.'
  '20':
  - type: text
    content: 'And whosoever lieth carnally with a woman, that '
  - type: text
    content: is
  - type: text
    content: ' a bondmaid, betrothed to an husband, and not at all redeemed, nor freedom given her; she shall be scourged; they shall not be put to death, because she was not free. '
  '21':
  - type: text
    content: 'And he shall bring his trespass offering unto the '
  - type: text
    content: LORD
  - type: text
    content: ', unto the door of the tabernacle of the congregation, '
  - type: text
    content: even
  - type: text
    content: ' a ram for a trespass offering. '
  '22':
  - type: text
    content: 'And the priest shall make an atonement for him with the ram of the trespass offering before the '
  - type: text
    content: LORD
  - type: text
    content: ' for his sin which he hath done: and the sin which he hath done shall be forgiven him.'
  '23':
  - type: text
    content: 'And when ye shall come into the land, and shall have planted all manner of trees for food, then ye shall count the fruit thereof as uncircumcised: three years shall it be as uncircumcised unto you: it shall not be eaten of. '
  '24':
  - type: text
    content: 'But in the fourth year all the fruit thereof shall be holy to praise the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: withal
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'And in the fifth year shall ye eat of the fruit thereof, that it may yield unto you the increase thereof: I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' your God.'
  '26':
  - type: text
    content: 'Ye shall not eat '
  - type: text
    content: any thing
  - type: text
    content: ' with the blood: neither shall ye use enchantment, nor observe times. '
  '27':
  - type: text
    content: 'Ye shall not round the corners of your heads, neither shalt thou mar the corners of thy beard. '
  '28':
  - type: text
    content: 'Ye shall not make any cuttings in your flesh for the dead, nor print any marks upon you: I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: .
  '29':
  - type: text
    content: Do not prostitute thy daughter, to cause her to be a whore; lest the land fall to whoredom, and the land become full of wickedness.
  '3':
  - type: text
    content: 'Ye shall fear every man his mother, and his father, and keep my sabbaths: I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' your God.'
  '30':
  - type: text
    content: 'Ye shall keep my sabbaths, and reverence my sanctuary: I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: .
  '31':
  - type: text
    content: 'Regard not them that have familiar spirits, neither seek after wizards, to be defiled by them: I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' your God.'
  '32':
  - type: text
    content: 'Thou shalt rise up before the hoary head, and honour the face of the old man, and fear thy God: I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: .
  '33':
  - type: text
    content: 'And if a stranger sojourn with thee in your land, ye shall not vex him. '
  '34':
  - type: text
    content: But
  - type: text
    content: ' the stranger that dwelleth with you shall be unto you as one born among you, and thou shalt love him as thyself; for ye were strangers in the land of Egypt: I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' your God.'
  '35':
  - type: text
    content: 'Ye shall do no unrighteousness in judgment, in meteyard, in weight, or in measure. '
  '36':
  - type: text
    content: 'Just balances, just weights, a just ephah, and a just hin, shall ye have: I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' your God, which brought you out of the land of Egypt. '
  '37':
  - type: text
    content: 'Therefore shall ye observe all my statutes, and all my judgments, and do them: I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: .
  '4':
  - type: text
    content: 'Turn ye not unto idols, nor make to yourselves molten gods: I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' your God.'
  '5':
  - type: text
    content: 'And if ye offer a sacrifice of peace offerings unto the '
  - type: text
    content: LORD
  - type: text
    content: ', ye shall offer it at your own will. '
  '6':
  - type: text
    content: 'It shall be eaten the same day ye offer it, and on the morrow: and if ought remain until the third day, it shall be burnt in the fire. '
  '7':
  - type: text
    content: 'And if it be eaten at all on the third day, it '
  - type: text
    content: is
  - type: text
    content: ' abominable; it shall not be accepted. '
  '8':
  - type: text
    content: 'Therefore '
  - type: text
    content: every one
  - type: text
    content: ' that eateth it shall bear his iniquity, because he hath profaned the hallowed thing of the '
  - type: text
    content: LORD
  - type: text
    content: ': and that soul shall be cut off from among his people.'
  '9':
  - type: text
    content: 'And when ye reap the harvest of your land, thou shalt not wholly reap the corners of thy field, neither shalt thou gather the gleanings of thy harvest. '
