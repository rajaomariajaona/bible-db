document_id: HEB.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Therefore we ought to give the more earnest heed to the things which we have heard, lest at any time we should let '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' slip. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For if the word spoken by angels was stedfast, and every transgression and disobedience received a just recompence of reward; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'how shall we escape, if we neglect so great salvation; which at the first began to be spoken by the Lord, and was confirmed unto us by them that heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'God also bearing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' witness, both with signs and wonders, and with divers miracles, and gifts of the Holy Ghost, according to his own will?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For unto the angels hath he not put in subjection the world to come, whereof we speak. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: But one in a certain place testified, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: What is man, that thou art mindful of him?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or the son of man, that thou visitest him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Thou madest him a little lower than the angels;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Thou crownedst him with glory and honour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And didst set him over the works of thy hands:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Thou hast put all things in subjection under his feet.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'For in that he put all in subjection under him, he left nothing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' not put under him. But now we see not yet all things put under him. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But we see Jesus, who was made a little lower than the angels for the suffering of death, crowned with glory and honour; that he by the grace of God should taste death for every man. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For it became him, for whom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' all things, and by whom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' all things, in bringing many sons unto glory, to make the captain of their salvation perfect through sufferings. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For both he that sanctifieth and they who are sanctified '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' all of one: for which cause he is not ashamed to call them brethren, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will declare thy name unto my brethren,
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the midst of the church will I sing praise unto thee.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And again, I will put my trust in him. And again, Behold I and the children which God hath given me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Forasmuch then as the children are partakers of flesh and blood, he also himself likewise took part of the same; that through death he might destroy him that had the power of death, that is, the devil; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and deliver them who through fear of death were all their lifetime subject to bondage. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For verily he took not on '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him the nature of
  - type: text
    text: ' angels; but he took on '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' the seed of Abraham. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Wherefore in all things it behoved him to be made like unto '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' brethren, that he might be a merciful and faithful high priest in things '
  - type: usfm
    marker: add
    children:
    - type: text
      text: pertaining
  - type: text
    text: ' to God, to make reconciliation for the sins of the people. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: For in that he himself hath suffered being tempted, he is able to succour them that are tempted.
