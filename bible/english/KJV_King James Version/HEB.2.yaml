document_id: HEB.2,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Therefore we ought to give the more earnest heed to the things which we have heard, lest at any time we should let '
  - type: text
    content: them
  - type: text
    content: ' slip. '
  '10':
  - type: text
    content: 'For it became him, for whom '
  - type: text
    content: are
  - type: text
    content: ' all things, and by whom '
  - type: text
    content: are
  - type: text
    content: ' all things, in bringing many sons unto glory, to make the captain of their salvation perfect through sufferings. '
  '11':
  - type: text
    content: 'For both he that sanctifieth and they who are sanctified '
  - type: text
    content: are
  - type: text
    content: ' all of one: for which cause he is not ashamed to call them brethren, '
  '12':
  - type: text
    content: saying,
  - type: text
    content: I will declare thy name unto my brethren,
  - type: text
    content: In the midst of the church will I sing praise unto thee.
  '13':
  - type: text
    content: And again, I will put my trust in him. And again, Behold I and the children which God hath given me.
  '14':
  - type: text
    content: 'Forasmuch then as the children are partakers of flesh and blood, he also himself likewise took part of the same; that through death he might destroy him that had the power of death, that is, the devil; '
  '15':
  - type: text
    content: 'and deliver them who through fear of death were all their lifetime subject to bondage. '
  '16':
  - type: text
    content: 'For verily he took not on '
  - type: text
    content: him the nature of
  - type: text
    content: ' angels; but he took on '
  - type: text
    content: him
  - type: text
    content: ' the seed of Abraham. '
  '17':
  - type: text
    content: 'Wherefore in all things it behoved him to be made like unto '
  - type: text
    content: his
  - type: text
    content: ' brethren, that he might be a merciful and faithful high priest in things '
  - type: text
    content: pertaining
  - type: text
    content: ' to God, to make reconciliation for the sins of the people. '
  '18':
  - type: text
    content: For in that he himself hath suffered being tempted, he is able to succour them that are tempted.
  '2':
  - type: text
    content: 'For if the word spoken by angels was stedfast, and every transgression and disobedience received a just recompence of reward; '
  '3':
  - type: text
    content: 'how shall we escape, if we neglect so great salvation; which at the first began to be spoken by the Lord, and was confirmed unto us by them that heard '
  - type: text
    content: him
  - type: text
    content: '; '
  '4':
  - type: text
    content: 'God also bearing '
  - type: text
    content: them
  - type: text
    content: ' witness, both with signs and wonders, and with divers miracles, and gifts of the Holy Ghost, according to his own will?'
  '5':
  - type: text
    content: 'For unto the angels hath he not put in subjection the world to come, whereof we speak. '
  '6':
  - type: text
    content: But one in a certain place testified, saying,
  - type: text
    content: What is man, that thou art mindful of him?
  - type: text
    content: Or the son of man, that thou visitest him?
  '7':
  - type: text
    content: Thou madest him a little lower than the angels;
  - type: text
    content: Thou crownedst him with glory and honour,
  - type: text
    content: 'And didst set him over the works of thy hands:'
  '8':
  - type: text
    content: Thou hast put all things in subjection under his feet.
  - type: text
    content: 'For in that he put all in subjection under him, he left nothing '
  - type: text
    content: that is
  - type: text
    content: ' not put under him. But now we see not yet all things put under him. '
  '9':
  - type: text
    content: 'But we see Jesus, who was made a little lower than the angels for the suffering of death, crowned with glory and honour; that he by the grace of God should taste death for every man. '
