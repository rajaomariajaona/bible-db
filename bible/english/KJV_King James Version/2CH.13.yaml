document_id: 2CH.13
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Abijah's Reign
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now in the eighteenth year of king Jeroboam began Abijah to reign over Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He reigned three years in Jerusalem. His mother''s name also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Michaiah the daughter of Uriel of Gibeah. And there was war between Abijah and Jeroboam. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Abijah set the battle in array with an army of valiant men of war, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' four hundred thousand chosen men: Jeroboam also set the battle in array against him with eight hundred thousand chosen men, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' mighty men of valour.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Abijah stood up upon mount Zemaraim, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in mount Ephraim, and said, Hear me, thou Jeroboam, and all Israel; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ought ye not to know that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel gave the kingdom over Israel to David for ever, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to him and to his sons by a covenant of salt? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Yet Jeroboam the son of Nebat, the servant of Solomon the son of David, is risen up, and hath rebelled against his lord. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And there are gathered unto him vain men, the children of Belial, and have strengthened themselves against Rehoboam the son of Solomon, when Rehoboam was young and tenderhearted, and could not withstand them. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And now ye think to withstand the kingdom of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' in the hand of the sons of David; and ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' a great multitude, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there are
  - type: text
    text: ' with you golden calves, which Jeroboam made you for gods. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Have ye not cast out the priests of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the sons of Aaron, and the Levites, and have made you priests after the manner of the nations of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: other
  - type: text
    text: ' lands? so that whosoever cometh to consecrate himself with a young bullock and seven rams, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the same
  - type: text
    text: ' may be a priest of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them that are
  - type: text
    text: ' no gods. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But as for us, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' our God, and we have not forsaken him; and the priests, which minister unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the sons of Aaron, and the Levites '
  - type: usfm
    marker: add
    children:
    - type: text
      text: wait
  - type: text
    text: ' upon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' business: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and they burn unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' every morning and every evening burnt sacrifices and sweet incense: the shewbread also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: set they in order
  - type: text
    text: ' upon the pure table; and the candlestick of gold with the lamps thereof, to burn every evening: for we keep the charge of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' our God; but ye have forsaken him. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And, behold, God himself '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with us for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: our
  - type: text
    text: ' captain, and his priests with sounding trumpets to cry alarm against you. O children of Israel, fight ye not against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of your fathers; for ye shall not prosper.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But Jeroboam caused an ambushment to come about behind them: so they were before Judah, and the ambushment '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' behind them. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And when Judah looked back, behold, the battle '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' before and behind: and they cried unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and the priests sounded with the trumpets. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then the men of Judah gave a shout: and as the men of Judah shouted, it came to pass, that God smote Jeroboam and all Israel before Abijah and Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the children of Israel fled before Judah: and God delivered them into their hand. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And Abijah and his people slew them with a great slaughter: so there fell down slain of Israel five hundred thousand chosen men. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Thus the children of Israel were brought under at that time, and the children of Judah prevailed, because they relied upon the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of their fathers. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And Abijah pursued after Jeroboam, and took cities from him, Beth-el with the towns thereof, and Jeshanah with the towns thereof, and Ephrain with the towns thereof. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Neither did Jeroboam recover strength again in the days of Abijah: and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' struck him, and he died. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But Abijah waxed mighty, and married fourteen wives, and begat twenty and two sons, and sixteen daughters. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And the rest of the acts of Abijah, and his ways, and his sayings, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' written in the story of the prophet Iddo.'
