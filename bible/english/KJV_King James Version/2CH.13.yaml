    content: Abijah's Reign
  - type: text
    content: 'Now in the eighteenth year of king Jeroboam began Abijah to reign over Judah. '
  '10':
  - type: text
    content: 'But as for us, the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' our God, and we have not forsaken him; and the priests, which minister unto the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: are
  - type: text
    content: ' the sons of Aaron, and the Levites '
  - type: text
    content: wait
  - type: text
    content: ' upon '
  - type: text
    content: their
  - type: text
    content: ' business: '
  '11':
  - type: text
    content: 'and they burn unto the '
  - type: text
    content: LORD
  - type: text
    content: ' every morning and every evening burnt sacrifices and sweet incense: the shewbread also '
  - type: text
    content: set they in order
  - type: text
    content: ' upon the pure table; and the candlestick of gold with the lamps thereof, to burn every evening: for we keep the charge of the '
  - type: text
    content: LORD
  - type: text
    content: ' our God; but ye have forsaken him. '
  '12':
  - type: text
    content: 'And, behold, God himself '
  - type: text
    content: is
  - type: text
    content: ' with us for '
  - type: text
    content: our
  - type: text
    content: ' captain, and his priests with sounding trumpets to cry alarm against you. O children of Israel, fight ye not against the '
  - type: text
    content: LORD
  - type: text
    content: ' God of your fathers; for ye shall not prosper.'
  '13':
  - type: text
    content: 'But Jeroboam caused an ambushment to come about behind them: so they were before Judah, and the ambushment '
  - type: text
    content: was
  - type: text
    content: ' behind them. '
  '14':
  - type: text
    content: 'And when Judah looked back, behold, the battle '
  - type: text
    content: was
  - type: text
    content: ' before and behind: and they cried unto the '
  - type: text
    content: LORD
  - type: text
    content: ', and the priests sounded with the trumpets. '
  '15':
  - type: text
    content: 'Then the men of Judah gave a shout: and as the men of Judah shouted, it came to pass, that God smote Jeroboam and all Israel before Abijah and Judah. '
  '16':
  - type: text
    content: 'And the children of Israel fled before Judah: and God delivered them into their hand. '
  '17':
  - type: text
    content: 'And Abijah and his people slew them with a great slaughter: so there fell down slain of Israel five hundred thousand chosen men. '
  '18':
  - type: text
    content: 'Thus the children of Israel were brought under at that time, and the children of Judah prevailed, because they relied upon the '
  - type: text
    content: LORD
  - type: text
    content: ' God of their fathers. '
  '19':
  - type: text
    content: 'And Abijah pursued after Jeroboam, and took cities from him, Beth-el with the towns thereof, and Jeshanah with the towns thereof, and Ephrain with the towns thereof. '
  '2':
  - type: text
    content: 'He reigned three years in Jerusalem. His mother''s name also '
  - type: text
    content: was
  - type: text
    content: ' Michaiah the daughter of Uriel of Gibeah. And there was war between Abijah and Jeroboam. '
  '20':
  - type: text
    content: 'Neither did Jeroboam recover strength again in the days of Abijah: and the '
  - type: text
    content: LORD
  - type: text
    content: ' struck him, and he died. '
  '21':
  - type: text
    content: 'But Abijah waxed mighty, and married fourteen wives, and begat twenty and two sons, and sixteen daughters. '
  '22':
  - type: text
    content: 'And the rest of the acts of Abijah, and his ways, and his sayings, '
  - type: text
    content: are
  - type: text
    content: ' written in the story of the prophet Iddo.'
  '3':
  - type: text
    content: 'And Abijah set the battle in array with an army of valiant men of war, '
  - type: text
    content: even
  - type: text
    content: ' four hundred thousand chosen men: Jeroboam also set the battle in array against him with eight hundred thousand chosen men, '
  - type: text
    content: being
  - type: text
    content: ' mighty men of valour.'
  '4':
  - type: text
    content: 'And Abijah stood up upon mount Zemaraim, which '
  - type: text
    content: is
  - type: text
    content: ' in mount Ephraim, and said, Hear me, thou Jeroboam, and all Israel; '
  '5':
  - type: text
    content: 'ought ye not to know that the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel gave the kingdom over Israel to David for ever, '
  - type: text
    content: even
  - type: text
    content: ' to him and to his sons by a covenant of salt? '
  '6':
  - type: text
    content: 'Yet Jeroboam the son of Nebat, the servant of Solomon the son of David, is risen up, and hath rebelled against his lord. '
  '7':
  - type: text
    content: 'And there are gathered unto him vain men, the children of Belial, and have strengthened themselves against Rehoboam the son of Solomon, when Rehoboam was young and tenderhearted, and could not withstand them. '
  '8':
  - type: text
    content: 'And now ye think to withstand the kingdom of the '
  - type: text
    content: LORD
  - type: text
    content: ' in the hand of the sons of David; and ye '
  - type: text
    content: be
  - type: text
    content: ' a great multitude, and '
  - type: text
    content: there are
  - type: text
    content: ' with you golden calves, which Jeroboam made you for gods. '
  '9':
  - type: text
    content: 'Have ye not cast out the priests of the '
  - type: text
    content: LORD
  - type: text
    content: ', the sons of Aaron, and the Levites, and have made you priests after the manner of the nations of '
  - type: text
    content: other
  - type: text
    content: ' lands? so that whosoever cometh to consecrate himself with a young bullock and seven rams, '
  - type: text
    content: the same
  - type: text
    content: ' may be a priest of '
  - type: text
    content: them that are
  - type: text
