document_id: 1KI.5
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Building the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Hiram king of Tyre sent his servants unto Solomon; for he had heard that they had anointed him king in the room of his father: for Hiram was ever a lover of David. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Solomon sent to Hiram, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Thou knowest how that David my father could not build an house unto the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' his God for the wars which were about him on every side, until the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' put them under the soles of his feet. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But now the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' my God hath given me rest on every side, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so that there is
  - type: text
    text: ' neither adversary nor evil occurrent. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And, behold, I purpose to build an house unto the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' my God, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto David my father, saying, Thy son, whom I will set upon thy throne in thy room, he shall build an house unto my name. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now therefore command thou that they hew me cedar trees out of Lebanon; and my servants shall be with thy servants: and unto thee will I give hire for thy servants according to all that thou shalt appoint: for thou knowest that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' not among us any that can skill to hew timber like unto the Sidonians.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And it came to pass, when Hiram heard the words of Solomon, that he rejoiced greatly, and said, Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' this day, which hath given unto David a wise son over this great people. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Hiram sent to Solomon, saying, I have considered the things which thou sentest to me for: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' I will do all thy desire concerning timber of cedar, and concerning timber of fir. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'My servants shall bring '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' down from Lebanon unto the sea: and I will convey them by sea in floats unto the place that thou shalt appoint me, and will cause them to be discharged there, and thou shalt receive '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'them:'
  - type: text
    text: ' and thou shalt accomplish my desire, in giving food for my household. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So Hiram gave Solomon cedar trees and fir trees '
  - type: usfm
    marker: add
    children:
    - type: text
      text: according to
  - type: text
    text: ' all his desire. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Solomon gave Hiram twenty thousand measures of wheat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' food to his household, and twenty measures of pure oil: thus gave Solomon to Hiram year by year. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' gave Solomon wisdom, as he promised him: and there was peace between Hiram and Solomon; and they two made a league together.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And king Solomon raised a levy out of all Israel; and the levy was thirty thousand men. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And he sent them to Lebanon, ten thousand a month by courses: a month they were in Lebanon, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' two months at home: and Adoniram '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' over the levy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Solomon had threescore and ten thousand that bare burdens, and fourscore thousand hewers in the mountains; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'beside the chief of Solomon''s officers which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' over the work, three thousand and three hundred, which ruled over the people that wrought in the work. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the king commanded, and they brought great stones, costly stones, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' hewed stones, to lay the foundation of the house. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And Solomon''s builders and Hiram''s builders did hew '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ', and the stonesquarers: so they prepared timber and stones to build the house.'
