  '1':
  - type: heading
    content: Building the Temple
  - type: text
    content: 'And Hiram king of Tyre sent his servants unto Solomon; for he had heard that they had anointed him king in the room of his father: for Hiram was ever a lover of David. '
  '10':
  - type: text
    content: 'So Hiram gave Solomon cedar trees and fir trees '
  - type: text
    content: according to
  - type: text
    content: ' all his desire. '
  '11':
  - type: text
    content: 'And Solomon gave Hiram twenty thousand measures of wheat '
  - type: text
    content: for
  - type: text
    content: ' food to his household, and twenty measures of pure oil: thus gave Solomon to Hiram year by year. '
  '12':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' gave Solomon wisdom, as he promised him: and there was peace between Hiram and Solomon; and they two made a league together.'
  '13':
  - type: text
    content: 'And king Solomon raised a levy out of all Israel; and the levy was thirty thousand men. '
  '14':
  - type: text
    content: 'And he sent them to Lebanon, ten thousand a month by courses: a month they were in Lebanon, '
  - type: text
    content: and
  - type: text
    content: ' two months at home: and Adoniram '
  - type: text
    content: was
  - type: text
    content: ' over the levy. '
  '15':
  - type: text
    content: 'And Solomon had threescore and ten thousand that bare burdens, and fourscore thousand hewers in the mountains; '
  '16':
  - type: text
    content: 'beside the chief of Solomon''s officers which '
  - type: text
    content: were
  - type: text
    content: ' over the work, three thousand and three hundred, which ruled over the people that wrought in the work. '
  '17':
  - type: text
    content: 'And the king commanded, and they brought great stones, costly stones, '
  - type: text
    content: and
  - type: text
    content: ' hewed stones, to lay the foundation of the house. '
  '18':
  - type: text
    content: 'And Solomon''s builders and Hiram''s builders did hew '
  - type: text
    content: them
  - type: text
    content: ', and the stonesquarers: so they prepared timber and stones to build the house.'
  '2':
  - type: text
    content: 'And Solomon sent to Hiram, saying, '
  '3':
  - type: text
    content: 'Thou knowest how that David my father could not build an house unto the name of the '
  - type: text
    content: LORD
  - type: text
    content: ' his God for the wars which were about him on every side, until the '
  - type: text
    content: LORD
  - type: text
    content: ' put them under the soles of his feet. '
  '4':
  - type: text
    content: 'But now the '
  - type: text
    content: LORD
  - type: text
    content: ' my God hath given me rest on every side, '
  - type: text
    content: so that there is
  - type: text
    content: ' neither adversary nor evil occurrent. '
  '5':
  - type: text
    content: 'And, behold, I purpose to build an house unto the name of the '
  - type: text
    content: LORD
  - type: text
    content: ' my God, as the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto David my father, saying, Thy son, whom I will set upon thy throne in thy room, he shall build an house unto my name. '
  '6':
  - type: text
    content: 'Now therefore command thou that they hew me cedar trees out of Lebanon; and my servants shall be with thy servants: and unto thee will I give hire for thy servants according to all that thou shalt appoint: for thou knowest that '
  - type: text
    content: there is
  - type: text
    content: ' not among us any that can skill to hew timber like unto the Sidonians.'
  '7':
  - type: text
    content: 'And it came to pass, when Hiram heard the words of Solomon, that he rejoiced greatly, and said, Blessed '
  - type: text
    content: be
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' this day, which hath given unto David a wise son over this great people. '
  '8':
  - type: text
    content: 'And Hiram sent to Solomon, saying, I have considered the things which thou sentest to me for: '
  - type: text
    content: and
  - type: text
    content: ' I will do all thy desire concerning timber of cedar, and concerning timber of fir. '
  '9':
  - type: text
    content: 'My servants shall bring '
  - type: text
    content: them
  - type: text
    content: ' down from Lebanon unto the sea: and I will convey them by sea in floats unto the place that thou shalt appoint me, and will cause them to be discharged there, and thou shalt receive '
  - type: text
    content: 'them:'
  - type: text
    content: ' and thou shalt accomplish my desire, in giving food for my household. '
