document_id: EPH.6
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Domestic Relationships
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Children, obey your parents in the Lord: for this is right. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Honour thy father and mother; which is the first commandment with promise; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'that it may be well with thee, and thou mayest live long on the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And, ye fathers, provoke not your children to wrath: but bring them up in the nurture and admonition of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Servants, be obedient to them that are '
  - type: usfm
    marker: add
    children:
    - type: text
      text: your
  - type: text
    text: ' masters according to the flesh, with fear and trembling, in singleness of your heart, as unto Christ; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'not with eyeservice, as menpleasers; but as the servants of Christ, doing the will of God from the heart; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'with good will doing service, as to the Lord, and not to men: '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'knowing that whatsoever good thing any man doeth, the same shall he receive of the Lord, whether '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he be
  - type: text
    text: ' bond or free. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And, ye masters, do the same things unto them, forbearing threatening: knowing that your Master also is in heaven; neither is there respect of persons with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Finally, my brethren, be strong in the Lord, and in the power of his might. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Put on the whole armour of God, that ye may be able to stand against the wiles of the devil. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For we wrestle not against flesh and blood, but against principalities, against powers, against the rulers of the darkness of this world, against spiritual wickedness in high '
  - type: usfm
    marker: add
    children:
    - type: text
      text: places
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Wherefore take unto you the whole armour of God, that ye may be able to withstand in the evil day, and having done all, to stand. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Stand therefore, having your loins girt about with truth, and having on the breastplate of righteousness; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and your feet shod with the preparation of the gospel of peace; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'above all, taking the shield of faith, wherewith ye shall be able to quench all the fiery darts of the wicked. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And take the helmet of salvation, and the sword of the Spirit, which is the word of God: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'praying always with all prayer and supplication in the Spirit, and watching thereunto with all perseverance and supplication for all saints; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and for me, that utterance may be given unto me, that I may open my mouth boldly, to make known the mystery of the gospel, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'for which I am an ambassador in bonds: that therein I may speak boldly, as I ought to speak.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But that ye also may know my affairs, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' how I do, Tychicus, a beloved brother and faithful minister in the Lord, shall make known to you all things: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'whom I have sent unto you for the same purpose, that ye might know our affairs, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' he might comfort your hearts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Peace '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' to the brethren, and love with faith, from God the Father and the Lord Jesus Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Grace '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' with all them that love our Lord Jesus Christ in sincerity. Amen.'
- type: usfm
  marker: iex
  children:
  - type: text
    text: Written from Rome unto the Ephesians by Tychicus.
