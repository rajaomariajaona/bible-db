verses:
  '1':
  - type: heading
    content: Hezekiah
  - type: text
    content: 'Hezekiah began to reign '
  - type: text
    content: when he was
  - type: text
    content: ' five and twenty years old, and he reigned nine and twenty years in Jerusalem. And his mother''s name '
  - type: text
    content: was
  - type: text
    content: ' Abijah, the daughter of Zechariah. '
  '10':
  - type: text
    content: 'Now '
  - type: text
    content: it is
  - type: text
    content: ' in mine heart to make a covenant with the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel, that his fierce wrath may turn away from us. '
  '11':
  - type: text
    content: 'My sons, be not now negligent: for the '
  - type: text
    content: LORD
  - type: text
    content: ' hath chosen you to stand before him, to serve him, and that ye should minister unto him, and burn incense.'
  '12':
  - type: text
    content: 'Then the Levites arose, Mahath the son of Amasai, and Joel the son of Azariah, of the sons of the Kohathites: and of the sons of Merari, Kish the son of Abdi, and Azariah the son of Jehalelel: and of the Gershonites; Joah the son of Zimmah, and Eden the son of Joah: '
  '13':
  - type: text
    content: 'and of the sons of Elizaphan; Shimri, and Jeiel: and of the sons of Asaph; Zechariah, and Mattaniah: '
  '14':
  - type: text
    content: 'and of the sons of Heman; Jehiel, and Shimei: and of the sons of Jeduthun; Shemaiah, and Uzziel. '
  '15':
  - type: text
    content: 'And they gathered their brethren, and sanctified themselves, and came, according to the commandment of the king, by the words of the '
  - type: text
    content: LORD
  - type: text
    content: ', to cleanse the house of the '
  - type: text
    content: LORD
  - type: text
    content: .
  - type: heading
    content: Cleansed the Temple
  '16':
  - type: text
    content: 'And the priests went into the inner part of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', to cleanse '
  - type: text
    content: it
  - type: text
    content: ', and brought out all the uncleanness that they found in the temple of the '
  - type: text
    content: LORD
  - type: text
    content: ' into the court of the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. And the Levites took '
  - type: text
    content: it
  - type: text
    content: ', to carry '
  - type: text
    content: it
  - type: text
    content: ' out abroad into the brook Kidron. '
  '17':
  - type: text
    content: 'Now they began on the first '
  - type: text
    content: day
  - type: text
    content: ' of the first month to sanctify, and on the eighth day of the month came they to the porch of the '
  - type: text
    content: LORD
  - type: text
    content: ': so they sanctified the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' in eight days; and in the sixteenth day of the first month they made an end. '
  '18':
  - type: text
    content: 'Then they went in to Hezekiah the king, and said, We have cleansed all the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and the altar of burnt offering, with all the vessels thereof, and the shewbread table, with all the vessels thereof. '
  '19':
  - type: text
    content: 'Moreover all the vessels, which king Ahaz in his reign did cast away in his transgression, have we prepared and sanctified, and, behold, they '
  - type: text
    content: are
  - type: text
    content: ' before the altar of the '
  - type: text
    content: LORD
  - type: text
    content: .
  '2':
  - type: text
    content: 'And he did '
  - type: text
    content: that which was
  - type: text
    content: ' right in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', according to all that David his father had done.'
  '20':
  - type: text
    content: 'Then Hezekiah the king rose early, and gathered the rulers of the city, and went up to the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'And they brought seven bullocks, and seven rams, and seven lambs, and seven he goats, for a sin offering for the kingdom, and for the sanctuary, and for Judah. And he commanded the priests the sons of Aaron to offer '
  - type: text
    content: them
  - type: text
    content: ' on the altar of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'So they killed the bullocks, and the priests received the blood, and sprinkled '
  - type: text
    content: it
  - type: text
    content: ' on the altar: likewise, when they had killed the rams, they sprinkled the blood upon the altar: they killed also the lambs, and they sprinkled the blood upon the altar. '
  '23':
  - type: text
    content: 'And they brought forth the he goats '
  - type: text
    content: for
  - type: text
    content: ' the sin offering before the king and the congregation; and they laid their hands upon them: '
  '24':
  - type: text
    content: 'and the priests killed them, and they made reconciliation with their blood upon the altar, to make an atonement for all Israel: for the king commanded '
  - type: text
    content: that
  - type: text
    content: ' the burnt offering and the sin offering '
  - type: text
    content: should be made
  - type: text
    content: ' for all Israel.'
  '25':
  - type: text
    content: 'And he set the Levites in the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' with cymbals, with psalteries, and with harps, according to the commandment of David, and of Gad the king''s seer, and Nathan the prophet: for '
  - type: text
    content: so was
  - type: text
    content: ' the commandment of the '
  - type: text
    content: LORD
  - type: text
    content: ' by his prophets. '
  '26':
  - type: text
    content: 'And the Levites stood with the instruments of David, and the priests with the trumpets. '
  '27':
  - type: text
    content: 'And Hezekiah commanded to offer the burnt offering upon the altar. And when the burnt offering began, the song of the '
  - type: text
    content: LORD
  - type: text
    content: ' began '
  - type: text
    content: also
  - type: text
    content: ' with the trumpets, and with the instruments '
  - type: text
    content: ordained
  - type: text
    content: ' by David king of Israel. '
  '28':
  - type: text
    content: 'And all the congregation worshipped, and the singers sang, and the trumpeters sounded: '
  - type: text
    content: and
  - type: text
    content: ' all '
  - type: text
    content: this continued
  - type: text
    content: ' until the burnt offering was finished.'
  '29':
  - type: text
    content: 'And when they had made an end of offering, the king and all that were present with him bowed themselves, and worshipped. '
  '3':
  - type: text
    content: 'He in the first year of his reign, in the first month, opened the doors of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and repaired them. '
  '30':
  - type: text
    content: 'Moreover Hezekiah the king and the princes commanded the Levites to sing praise unto the '
  - type: text
    content: LORD
  - type: text
    content: ' with the words of David, and of Asaph the seer. And they sang praises with gladness, and they bowed their heads and worshipped.'
  '31':
  - type: text
    content: 'Then Hezekiah answered and said, Now ye have consecrated yourselves unto the '
  - type: text
    content: LORD
  - type: text
    content: ', come near and bring sacrifices and thank offerings into the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. And the congregation brought in sacrifices and thank offerings; and as many as were of a free heart burnt offerings. '
  '32':
  - type: text
    content: 'And the number of the burnt offerings, which the congregation brought, was threescore and ten bullocks, an hundred rams, '
  - type: text
    content: and
  - type: text
    content: ' two hundred lambs: all these '
  - type: text
    content: were
  - type: text
    content: ' for a burnt offering to the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'And the consecrated things '
  - type: text
    content: were
  - type: text
    content: ' six hundred oxen and three thousand sheep. '
  '34':
  - type: text
    content: 'But the priests were too few, so that they could not flay all the burnt offerings: wherefore their brethren the Levites did help them, till the work was ended, and until the '
  - type: text
    content: other
  - type: text
    content: ' priests had sanctified themselves: for the Levites '
  - type: text
    content: were
  - type: text
    content: ' more upright in heart to sanctify themselves than the priests. '
  '35':
  - type: text
    content: 'And also the burnt offerings '
  - type: text
    content: were
  - type: text
    content: ' in abundance, with the fat of the peace offerings, and the drink offerings for '
  - type: text
    content: every
  - type: text
    content: ' burnt offering. So the service of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' was set in order. '
  '36':
  - type: text
    content: 'And Hezekiah rejoiced, and all the people, that God had prepared the people: for the thing was '
  - type: text
    content: done
  - type: text
    content: ' suddenly.'
  '4':
  - type: text
    content: 'And he brought in the priests and the Levites, and gathered them together into the east street, '
  '5':
  - type: text
    content: 'and said unto them, Hear me, ye Levites, sanctify now yourselves, and sanctify the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' God of your fathers, and carry forth the filthiness out of the holy '
  - type: text
    content: place
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'For our fathers have trespassed, and done '
  - type: text
    content: that which was
  - type: text
    content: ' evil in the eyes of the '
  - type: text
    content: LORD
  - type: text
    content: ' our God, and have forsaken him, and have turned away their faces from the habitation of the '
  - type: text
    content: LORD
  - type: text
    content: ', and turned '
  - type: text
    content: their
  - type: text
    content: ' backs. '
  '7':
  - type: text
    content: 'Also they have shut up the doors of the porch, and put out the lamps, and have not burned incense nor offered burnt offerings in the holy '
  - type: text
    content: place
  - type: text
    content: ' unto the God of Israel. '
  '8':
  - type: text
    content: 'Wherefore the wrath of the '
  - type: text
    content: LORD
  - type: text
    content: ' was upon Judah and Jerusalem, and he hath delivered them to trouble, to astonishment, and to hissing, as ye see with your eyes. '
  '9':
  - type: text
    content: 'For, lo, our fathers have fallen by the sword, and our sons and our daughters and our wives '
  - type: text
    content: are
  - type: text
    content: ' in captivity for this. '
