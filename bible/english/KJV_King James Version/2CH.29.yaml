document_id: 2CH.29,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Hezekiah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Hezekiah began to reign '
    - type: usfm
      marker: add
      children:
      - type: text
        text: when he was
    - type: text
      text: ' five and twenty years old, and he reigned nine and twenty years in Jerusalem. And his mother''s name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Abijah, the daughter of Zechariah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Now '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' in mine heart to make a covenant with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel, that his fierce wrath may turn away from us. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'My sons, be not now negligent: for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath chosen you to stand before him, to serve him, and that ye should minister unto him, and burn incense.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then the Levites arose, Mahath the son of Amasai, and Joel the son of Azariah, of the sons of the Kohathites: and of the sons of Merari, Kish the son of Abdi, and Azariah the son of Jehalelel: and of the Gershonites; Joah the son of Zimmah, and Eden the son of Joah: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'and of the sons of Elizaphan; Shimri, and Jeiel: and of the sons of Asaph; Zechariah, and Mattaniah: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'and of the sons of Heman; Jehiel, and Shimei: and of the sons of Jeduthun; Shemaiah, and Uzziel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And they gathered their brethren, and sanctified themselves, and came, according to the commandment of the king, by the words of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', to cleanse the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Cleansed the Temple
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And the priests went into the inner part of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', to cleanse '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and brought out all the uncleanness that they found in the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' into the court of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. And the Levites took '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', to carry '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' out abroad into the brook Kidron. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Now they began on the first '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the first month to sanctify, and on the eighth day of the month came they to the porch of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': so they sanctified the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in eight days; and in the sixteenth day of the first month they made an end. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then they went in to Hezekiah the king, and said, We have cleansed all the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and the altar of burnt offering, with all the vessels thereof, and the shewbread table, with all the vessels thereof. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Moreover all the vessels, which king Ahaz in his reign did cast away in his transgression, have we prepared and sanctified, and, behold, they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' before the altar of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And he did '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which was
    - type: text
      text: ' right in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', according to all that David his father had done.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then Hezekiah the king rose early, and gathered the rulers of the city, and went up to the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And they brought seven bullocks, and seven rams, and seven lambs, and seven he goats, for a sin offering for the kingdom, and for the sanctuary, and for Judah. And he commanded the priests the sons of Aaron to offer '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' on the altar of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'So they killed the bullocks, and the priests received the blood, and sprinkled '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' on the altar: likewise, when they had killed the rams, they sprinkled the blood upon the altar: they killed also the lambs, and they sprinkled the blood upon the altar. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And they brought forth the he goats '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' the sin offering before the king and the congregation; and they laid their hands upon them: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'and the priests killed them, and they made reconciliation with their blood upon the altar, to make an atonement for all Israel: for the king commanded '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the burnt offering and the sin offering '
    - type: usfm
      marker: add
      children:
      - type: text
        text: should be made
    - type: text
      text: ' for all Israel.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And he set the Levites in the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' with cymbals, with psalteries, and with harps, according to the commandment of David, and of Gad the king''s seer, and Nathan the prophet: for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so was
    - type: text
      text: ' the commandment of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' by his prophets. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And the Levites stood with the instruments of David, and the priests with the trumpets. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And Hezekiah commanded to offer the burnt offering upon the altar. And when the burnt offering began, the song of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' began '
    - type: usfm
      marker: add
      children:
      - type: text
        text: also
    - type: text
      text: ' with the trumpets, and with the instruments '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ordained
    - type: text
      text: ' by David king of Israel. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And all the congregation worshipped, and the singers sang, and the trumpeters sounded: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this continued
    - type: text
      text: ' until the burnt offering was finished.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And when they had made an end of offering, the king and all that were present with him bowed themselves, and worshipped. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'He in the first year of his reign, in the first month, opened the doors of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and repaired them. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Moreover Hezekiah the king and the princes commanded the Levites to sing praise unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' with the words of David, and of Asaph the seer. And they sang praises with gladness, and they bowed their heads and worshipped.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Then Hezekiah answered and said, Now ye have consecrated yourselves unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', come near and bring sacrifices and thank offerings into the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. And the congregation brought in sacrifices and thank offerings; and as many as were of a free heart burnt offerings. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And the number of the burnt offerings, which the congregation brought, was threescore and ten bullocks, an hundred rams, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' two hundred lambs: all these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' for a burnt offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And the consecrated things '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' six hundred oxen and three thousand sheep. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'But the priests were too few, so that they could not flay all the burnt offerings: wherefore their brethren the Levites did help them, till the work was ended, and until the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: other
    - type: text
      text: ' priests had sanctified themselves: for the Levites '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' more upright in heart to sanctify themselves than the priests. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'And also the burnt offerings '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in abundance, with the fat of the peace offerings, and the drink offerings for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: every
    - type: text
      text: ' burnt offering. So the service of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was set in order. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'And Hezekiah rejoiced, and all the people, that God had prepared the people: for the thing was '
    - type: usfm
      marker: add
      children:
      - type: text
        text: done
    - type: text
      text: ' suddenly.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And he brought in the priests and the Levites, and gathered them together into the east street, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'and said unto them, Hear me, ye Levites, sanctify now yourselves, and sanctify the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of your fathers, and carry forth the filthiness out of the holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: place
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For our fathers have trespassed, and done '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which was
    - type: text
      text: ' evil in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God, and have forsaken him, and have turned away their faces from the habitation of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and turned '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' backs. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Also they have shut up the doors of the porch, and put out the lamps, and have not burned incense nor offered burnt offerings in the holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: place
    - type: text
      text: ' unto the God of Israel. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Wherefore the wrath of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was upon Judah and Jerusalem, and he hath delivered them to trouble, to astonishment, and to hissing, as ye see with your eyes. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For, lo, our fathers have fallen by the sword, and our sons and our daughters and our wives '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in captivity for this. '
