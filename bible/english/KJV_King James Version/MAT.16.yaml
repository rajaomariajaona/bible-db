  - type: heading
    content: The Great Confession
  '13':
  - type: text
    content: 'When Jesus came into the coasts of Cæsarea Philippi, he asked his disciples, saying, '
  - type: text
    content: Whom do men say that I the Son of man am?
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'And they said, Some '
  - type: text
    content: say that thou art
  - type: text
    content: ' John the Baptist: some, Elias; and others, Jeremias, or one of the prophets. '
  '15':
  - type: text
    content: 'He saith unto them, '
  - type: text
    content: But whom say ye that I am?
  '16':
  - type: text
    content: 'And Simon Peter answered and said, Thou art the Christ, the Son of the living God. '
  '17':
  - type: text
    content: 'And Jesus answered and said unto him, '
  - type: text
    content: 'Blessed art thou, Simon Bar-jona: for flesh and blood hath not revealed '
  - type: text
    content: it
  - type: text
    content: ' unto thee, but my Father which is in heaven.'
  - type: text
    content: ' '
  '18':
  - type: text
    content: And I say also unto thee, That thou art Peter, and upon this rock I will build my church; and the gates of hell shall not prevail against it.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'And I will give unto thee the keys of the kingdom of heaven: and whatsoever thou shalt bind on earth shall be bound in heaven: and whatsoever thou shalt loose on earth shall be loosed in heaven.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'He answered and said unto them, '
  - type: text
    content: 'When it is evening, ye say, '
  - type: text
    content: It will be
  - type: text
    content: ' fair weather: for the sky is red.'
  - type: text
    content: ' '
  '20':
  - type: text
    content: Then charged he his disciples that they should tell no man that he was Jesus the Christ.
  - type: heading
    content: True Discipleship
  '21':
  - type: text
    content: 'From that time forth began Jesus to shew unto his disciples, how that he must go unto Jerusalem, and suffer many things of the elders and chief priests and scribes, and be killed, and be raised again the third day. '
  '22':
  - type: text
    content: 'Then Peter took him, and began to rebuke him, saying, Be it far from thee, Lord: this shall not be unto thee. '
  '23':
  - type: text
    content: 'But he turned, and said unto Peter, '
  - type: text
    content: 'Get thee behind me, Satan: thou art an offence unto me: for thou savourest not the things that be of God, but those that be of men.'
  '24':
  - type: text
    content: 'Then said Jesus unto his disciples, '
  - type: text
    content: 'If any '
  - type: text
    content: man
  - type: text
    content: ' will come after me, let him deny himself, and take up his cross, and follow me.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'For whosoever will save his life shall lose it: and whosoever will lose his life for my sake shall find it.'
  - type: text
    content: ' '
  '26':
  - type: text
    content: For what is a man profited, if he shall gain the whole world, and lose his own soul? or what shall a man give in exchange for his soul?
  - type: text
    content: ' '
  '27':
  - type: text
    content: For the Son of man shall come in the glory of his Father with his angels; and then he shall reward every man according to his works.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Verily I say unto you, There be some standing here, which shall not taste of death, till they see the Son of man coming in his kingdom.
  '3':
  - type: text
    content: 'And in the morning, '
  - type: text
    content: It will be
  - type: text
    content: ' foul weather to day: for the sky is red and lowring. O '
  - type: text
    content: ye
  - type: text
    content: ' hypocrites, ye can discern the face of the sky; but can ye not '
  - type: text
    content: discern
  - type: text
    content: ' the signs of the times?'
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'A wicked and adulterous generation seeketh after a sign; and there shall no sign be given unto it, but the sign of the prophet Jonas. '
  - type: text
    content: 'And he left them, and departed. '
  '5':
  - type: text
    content: And when his disciples were come to the other side, they had forgotten to take bread.
  '6':
  - type: text
    content: 'Then Jesus said unto them, '
  - type: text
    content: Take heed and beware of the leaven of the Pharisees and of the Sadducees.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'And they reasoned among themselves, saying, '
  - type: text
    content: It is
  - type: text
    content: ' because we have taken no bread. '
  '8':
  - type: text
    content: Which
  - type: text
    content: ' when Jesus perceived, he said unto them, '
  - type: text
    content: O ye of little faith, why reason ye among yourselves, because ye have brought no bread?
  - type: text
    content: ' '
  '9':
