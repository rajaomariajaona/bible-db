document_id: MAT.16
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The Pharisees also with the Sadducees came, and tempting desired him that he would shew them a sign from heaven. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He answered and said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'When it is evening, ye say, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It will be
    - type: text
      text: ' fair weather: for the sky is red.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And in the morning, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It will be
    - type: text
      text: ' foul weather to day: for the sky is red and lowring. O '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ye
    - type: text
      text: ' hypocrites, ye can discern the face of the sky; but can ye not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: discern
    - type: text
      text: ' the signs of the times?'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'A wicked and adulterous generation seeketh after a sign; and there shall no sign be given unto it, but the sign of the prophet Jonas. '
  - type: text
    text: 'And he left them, and departed. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: And when his disciples were come to the other side, they had forgotten to take bread.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then Jesus said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Take heed and beware of the leaven of the Pharisees and of the Sadducees.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And they reasoned among themselves, saying, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' because we have taken no bread. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Which
  - type: text
    text: ' when Jesus perceived, he said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: O ye of little faith, why reason ye among yourselves, because ye have brought no bread?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Do ye not yet understand, neither remember the five loaves of the five thousand, and how many baskets ye took up?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Neither the seven loaves of the four thousand, and how many baskets ye took up?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'How is it that ye do not understand that I spake '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' not to you concerning bread, that ye should beware of the leaven of the Pharisees and of the Sadducees?'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then understood they how that he bade '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' not beware of the leaven of bread, but of the doctrine of the Pharisees and of the Sadducees.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Great Confession
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When Jesus came into the coasts of Cæsarea Philippi, he asked his disciples, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Whom do men say that I the Son of man am?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And they said, Some '
  - type: usfm
    marker: add
    children:
    - type: text
      text: say that thou art
  - type: text
    text: ' John the Baptist: some, Elias; and others, Jeremias, or one of the prophets. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He saith unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But whom say ye that I am?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And Simon Peter answered and said, Thou art the Christ, the Son of the living God. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And Jesus answered and said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Blessed art thou, Simon Bar-jona: for flesh and blood hath not revealed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' unto thee, but my Father which is in heaven.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And I say also unto thee, That thou art Peter, and upon this rock I will build my church; and the gates of hell shall not prevail against it.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And I will give unto thee the keys of the kingdom of heaven: and whatsoever thou shalt bind on earth shall be bound in heaven: and whatsoever thou shalt loose on earth shall be loosed in heaven.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Then charged he his disciples that they should tell no man that he was Jesus the Christ.
- type: usfm
  marker: s2
  children:
  - type: text
    text: True Discipleship
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'From that time forth began Jesus to shew unto his disciples, how that he must go unto Jerusalem, and suffer many things of the elders and chief priests and scribes, and be killed, and be raised again the third day. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then Peter took him, and began to rebuke him, saying, Be it far from thee, Lord: this shall not be unto thee. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But he turned, and said unto Peter, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Get thee behind me, Satan: thou art an offence unto me: for thou savourest not the things that be of God, but those that be of men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then said Jesus unto his disciples, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'If any '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' will come after me, let him deny himself, and take up his cross, and follow me.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For whosoever will save his life shall lose it: and whosoever will lose his life for my sake shall find it.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For what is a man profited, if he shall gain the whole world, and lose his own soul? or what shall a man give in exchange for his soul?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For the Son of man shall come in the glory of his Father with his angels; and then he shall reward every man according to his works.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Verily I say unto you, There be some standing here, which shall not taste of death, till they see the Son of man coming in his kingdom.
