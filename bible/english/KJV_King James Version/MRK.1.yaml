document_id: MRK.1,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'The beginning of the gospel of Jesus Christ, the Son of God; '
  '10':
  - type: text
    content: 'And straightway coming up out of the water, he saw the heavens opened, and the Spirit like a dove descending upon him: '
  '11':
  - type: text
    content: 'and there came a voice from heaven, '
  - type: text
    content: saying
  - type: text
    content: ', Thou art my beloved Son, in whom I am well pleased.'
  '12':
  - type: text
    content: 'And immediately the Spirit driveth him into the wilderness. '
  '13':
  - type: text
    content: And he was there in the wilderness forty days, tempted of Satan; and was with the wild beasts; and the angels ministered unto him.
  - type: heading
    content: Jesus in Galilee
  '14':
  - type: text
    content: 'Now after that John was put in prison, Jesus came into Galilee, preaching the gospel of the kingdom of God, '
  '15':
  - type: text
    content: 'and saying, '
  - type: text
    content: 'The time is fulfilled, and the kingdom of God is at hand: repent ye, and believe the gospel.'
  - type: heading
    content: His First Disciples
  '16':
  - type: text
    content: 'Now as he walked by the sea of Galilee, he saw Simon and Andrew his brother casting a net into the sea: for they were fishers. '
  '17':
  - type: text
    content: 'And Jesus said unto them, '
  - type: text
    content: Come ye after me, and I will make you to become fishers of men.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'And straightway they forsook their nets, and followed him. '
  '19':
  - type: text
    content: 'And when he had gone a little farther thence, he saw James the '
  - type: text
    content: son
  - type: text
    content: ' of Zebedee, and John his brother, who also were in the ship mending their nets. '
  '2':
  - type: text
    content: As it is written in the prophets,
  - type: text
    content: Behold, I send my messenger before thy face,
  - type: text
    content: Which shall prepare thy way before thee.
  '20':
  - type: text
    content: 'And straightway he called them: and they left their father Zebedee in the ship with the hired servants, and went after him.'
  - type: heading
    content: In Capernaum
  '21':
  - type: text
    content: 'And they went into Capernaum; and straightway on the sabbath day he entered into the synagogue, and taught. '
  '22':
  - type: text
    content: 'And they were astonished at his doctrine: for he taught them as one that had authority, and not as the scribes. '
  '23':
  - type: text
    content: 'And there was in their synagogue a man with an unclean spirit; and he cried out, '
  '24':
  - type: text
    content: 'saying, Let '
  - type: text
    content: us
  - type: text
    content: ' alone; what have we to do with thee, thou Jesus of Nazareth? art thou come to destroy us? I know thee who thou art, the Holy One of God. '
  '25':
  - type: text
    content: 'And Jesus rebuked him, saying, '
  - type: text
    content: Hold thy peace, and come out of him.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'And when the unclean spirit had torn him, and cried with a loud voice, he came out of him. '
  '27':
  - type: text
    content: 'And they were all amazed, insomuch that they questioned among themselves, saying, What thing is this? what new doctrine '
  - type: text
    content: is
  - type: text
    content: ' this? for with authority commandeth he even the unclean spirits, and they do obey him. '
  '28':
  - type: text
    content: And immediately his fame spread abroad throughout all the region round about Galilee.
  '29':
  - type: text
    content: 'And forthwith, when they were come out of the synagogue, they entered into the house of Simon and Andrew, with James and John. '
  '3':
  - type: text
    content: The voice of one crying in the wilderness,
  - type: text
    content: Prepare ye the way of the Lord,
  - type: text
    content: Make his paths straight.
  '30':
  - type: text
    content: 'But Simon''s wife''s mother lay sick of a fever, and anon they tell him of her. '
  '31':
  - type: text
    content: And he came and took her by the hand, and lifted her up; and immediately the fever left her, and she ministered unto them.
  '32':
  - type: text
    content: 'And at even, when the sun did set, they brought unto him all that were diseased, and them that were possessed with devils. '
  '33':
  - type: text
    content: 'And all the city was gathered together at the door. '
  '34':
  - type: text
    content: And he healed many that were sick of divers diseases, and cast out many devils; and suffered not the devils to speak, because they knew him.
  '35':
  - type: text
    content: 'And in the morning, rising up a great while before day, he went out, and departed into a solitary place, and there prayed. '
  '36':
  - type: text
    content: 'And Simon and they that were with him followed after him. '
  '37':
  - type: text
    content: 'And when they had found him, they said unto him, All '
  - type: text
    content: men
  - type: text
    content: ' seek for thee.'
  - type: heading
    content: A Preaching Tour
  '38':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: 'Let us go into the next towns, that I may preach there also: for therefore came I forth.'
  - type: text
    content: ' '
  '39':
  - type: text
    content: And he preached in their synagogues throughout all Galilee, and cast out devils.
  '4':
  - type: text
    content: 'John did baptize in the wilderness, and preach the baptism of repentance for the remission of sins. '
  '40':
  - type: text
    content: 'And there came a leper to him, beseeching him, and kneeling down to him, and saying unto him, If thou wilt, thou canst make me clean. '
  '41':
  - type: text
    content: 'And Jesus, moved with compassion, put forth '
  - type: text
    content: his
  - type: text
    content: ' hand, and touched him, and saith unto him, '
  - type: text
    content: I will; be thou clean.
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'And as soon as he had spoken, immediately the leprosy departed from him, and he was cleansed. '
  '43':
  - type: text
    content: 'And he straitly charged him, and forthwith sent him away; '
  '44':
  - type: text
    content: 'and saith unto him, '
  - type: text
    content: 'See thou say nothing to any man: but go thy way, shew thyself to the priest, and offer for thy cleansing those things which Moses commanded, for a testimony unto them.'
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'But he went out, and began to publish '
  - type: text
    content: it
  - type: text
    content: ' much, and to blaze abroad the matter, insomuch that Jesus could no more openly enter into the city, but was without in desert places: and they came to him from every quarter.'
  '5':
  - type: text
    content: 'And there went out unto him all the land of Judæa, and they of Jerusalem, and were all baptized of him in the river of Jordan, confessing their sins. '
  '6':
  - type: text
    content: 'And John was clothed with camel''s hair, and with a girdle of a skin about his loins; and he did eat locusts and wild honey; '
  '7':
  - type: text
    content: 'and preached, saying, There cometh one mightier than I after me, the latchet of whose shoes I am not worthy to stoop down and unloose. '
  '8':
  - type: text
    content: 'I indeed have baptized you with water: but he shall baptize you with the Holy Ghost.'
  '9':
  - type: text
    content: 'And it came to pass in those days, that Jesus came from Nazareth of Galilee, and was baptized of John in Jordan. '
