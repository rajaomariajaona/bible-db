document_id: MRK.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The beginning of the gospel of Jesus Christ, the Son of God; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And straightway coming up out of the water, he saw the heavens opened, and the Spirit like a dove descending upon him: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'and there came a voice from heaven, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: saying
    - type: text
      text: ', Thou art my beloved Son, in whom I am well pleased.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And immediately the Spirit driveth him into the wilderness. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: And he was there in the wilderness forty days, tempted of Satan; and was with the wild beasts; and the angels ministered unto him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus in Galilee
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Now after that John was put in prison, Jesus came into Galilee, preaching the gospel of the kingdom of God, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'and saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'The time is fulfilled, and the kingdom of God is at hand: repent ye, and believe the gospel.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: His First Disciples
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Now as he walked by the sea of Galilee, he saw Simon and Andrew his brother casting a net into the sea: for they were fishers. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And Jesus said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Come ye after me, and I will make you to become fishers of men.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And straightway they forsook their nets, and followed him. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And when he had gone a little farther thence, he saw James the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: son
    - type: text
      text: ' of Zebedee, and John his brother, who also were in the ship mending their nets. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: As it is written in the prophets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold, I send my messenger before thy face,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which shall prepare thy way before thee.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And straightway he called them: and they left their father Zebedee in the ship with the hired servants, and went after him.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: In Capernaum
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And they went into Capernaum; and straightway on the sabbath day he entered into the synagogue, and taught. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And they were astonished at his doctrine: for he taught them as one that had authority, and not as the scribes. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And there was in their synagogue a man with an unclean spirit; and he cried out, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'saying, Let '
    - type: usfm
      marker: add
      children:
      - type: text
        text: us
    - type: text
      text: ' alone; what have we to do with thee, thou Jesus of Nazareth? art thou come to destroy us? I know thee who thou art, the Holy One of God. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And Jesus rebuked him, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Hold thy peace, and come out of him.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And when the unclean spirit had torn him, and cried with a loud voice, he came out of him. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And they were all amazed, insomuch that they questioned among themselves, saying, What thing is this? what new doctrine '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' this? for with authority commandeth he even the unclean spirits, and they do obey him. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: And immediately his fame spread abroad throughout all the region round about Galilee.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And forthwith, when they were come out of the synagogue, they entered into the house of Simon and Andrew, with James and John. '
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The voice of one crying in the wilderness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prepare ye the way of the Lord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make his paths straight.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'But Simon''s wife''s mother lay sick of a fever, and anon they tell him of her. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: And he came and took her by the hand, and lifted her up; and immediately the fever left her, and she ministered unto them.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And at even, when the sun did set, they brought unto him all that were diseased, and them that were possessed with devils. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And all the city was gathered together at the door. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: And he healed many that were sick of divers diseases, and cast out many devils; and suffered not the devils to speak, because they knew him.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'And in the morning, rising up a great while before day, he went out, and departed into a solitary place, and there prayed. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'And Simon and they that were with him followed after him. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'And when they had found him, they said unto him, All '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' seek for thee.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: A Preaching Tour
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Let us go into the next towns, that I may preach there also: for therefore came I forth.'
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: And he preached in their synagogues throughout all Galilee, and cast out devils.
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'John did baptize in the wilderness, and preach the baptism of repentance for the remission of sins. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'And there came a leper to him, beseeching him, and kneeling down to him, and saying unto him, If thou wilt, thou canst make me clean. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'And Jesus, moved with compassion, put forth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' hand, and touched him, and saith unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I will; be thou clean.
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'And as soon as he had spoken, immediately the leprosy departed from him, and he was cleansed. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'And he straitly charged him, and forthwith sent him away; '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'and saith unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'See thou say nothing to any man: but go thy way, shew thyself to the priest, and offer for thy cleansing those things which Moses commanded, for a testimony unto them.'
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'But he went out, and began to publish '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' much, and to blaze abroad the matter, insomuch that Jesus could no more openly enter into the city, but was without in desert places: and they came to him from every quarter.'
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And there went out unto him all the land of Judæa, and they of Jerusalem, and were all baptized of him in the river of Jordan, confessing their sins. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And John was clothed with camel''s hair, and with a girdle of a skin about his loins; and he did eat locusts and wild honey; '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'and preached, saying, There cometh one mightier than I after me, the latchet of whose shoes I am not worthy to stoop down and unloose. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'I indeed have baptized you with water: but he shall baptize you with the Holy Ghost.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And it came to pass in those days, that Jesus came from Nazareth of Galilee, and was baptized of John in Jordan. '
