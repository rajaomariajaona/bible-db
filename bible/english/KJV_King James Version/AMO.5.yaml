document_id: AMO.5
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Worshippers of Beth-el
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hear ye this word which I take up against you, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' a lamentation, O house of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The virgin of Israel is fallen; she shall no more rise: she is forsaken upon her land; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' none to raise her up. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; The city that went out '
  - type: usfm
    marker: add
    children:
    - type: text
      text: by
  - type: text
    text: ' a thousand shall leave an hundred, and that which went forth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: by
  - type: text
    text: ' an hundred shall leave ten, to the house of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' unto the house of Israel, Seek ye me, and ye shall live: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'but seek not Beth-el, nor enter into Gilgal, and pass not to Beer-sheba: for Gilgal shall surely go into captivity, and Beth-el shall come to nought. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and ye shall live; lest he break out like fire in the house of Joseph, and devour '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there be
  - type: text
    text: ' none to quench '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' in Beth-el. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ye who turn judgment to wormwood, and leave off righteousness in the earth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: add
    children:
    - type: text
      text: seek him
  - type: text
    text: ' that maketh the seven stars and Orion, and turneth the shadow of death into the morning, and maketh the day dark with night: that calleth for the waters of the sea, and poureth them out upon the face of the earth: The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' his name: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: that strengtheneth the spoiled against the strong, so that the spoiled shall come against the fortress.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'They hate him that rebuketh in the gate, and they abhor him that speaketh uprightly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Forasmuch therefore as your treading '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon the poor, and ye take from him burdens of wheat: ye have built houses of hewn stone, but ye shall not dwell in them; ye have planted pleasant vineyards, but ye shall not drink wine of them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For I know your manifold transgressions and your mighty sins: they afflict the just, they take a bribe, and they turn aside the poor in the gate '
  - type: usfm
    marker: add
    children:
    - type: text
      text: from their right
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Therefore the prudent shall keep silence in that time; for it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' an evil time.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Seek good, and not evil, that ye may live: and so the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the God of hosts, shall be with you, as ye have spoken. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hate the evil, and love the good, and establish judgment in the gate: it may be that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of hosts will be gracious unto the remnant of Joseph.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Therefore the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the God of hosts, the Lord, saith thus; Wailing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' in all streets; and they shall say in all the highways, Alas! alas! and they shall call the husbandman to mourning, and such as are skilful of lamentation to wailing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And in all vineyards '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' wailing: for I will pass through thee, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Woe unto you that desire the day of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '! to what end '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' it for you? the day of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' darkness, and not light. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'As if a man did flee from a lion, and a bear met him; or went into the house, and leaned his hand on the wall, and a serpent bit him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Shall
  - type: text
    text: ' not the day of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' darkness, and not light? even very dark, and no brightness in it?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'I hate, I despise your feast days, and I will not smell in your solemn assemblies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Though ye offer me burnt offerings and your meat offerings, I will not accept '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'them:'
  - type: text
    text: ' neither will I regard the peace offerings of your fat beasts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Take thou away from me the noise of thy songs; for I will not hear the melody of thy viols. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: But let judgment run down as waters, and righteousness as a mighty stream.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Have ye offered unto me sacrifices and offerings in the wilderness forty years, O house of Israel? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But ye have borne the tabernacle of your Moloch and Chiun your images, the star of your god, which ye made to yourselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Therefore will I cause you to go into captivity beyond Damascus, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', whose name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' The God of hosts.'
