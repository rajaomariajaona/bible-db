document_id: AMO.5,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Worshippers of Beth-el
  - type: text
    content: 'Hear ye this word which I take up against you, '
  - type: text
    content: even
  - type: text
    content: ' a lamentation, O house of Israel. '
  '10':
  - type: text
    content: 'They hate him that rebuketh in the gate, and they abhor him that speaketh uprightly. '
  '11':
  - type: text
    content: 'Forasmuch therefore as your treading '
  - type: text
    content: is
  - type: text
    content: ' upon the poor, and ye take from him burdens of wheat: ye have built houses of hewn stone, but ye shall not dwell in them; ye have planted pleasant vineyards, but ye shall not drink wine of them. '
  '12':
  - type: text
    content: 'For I know your manifold transgressions and your mighty sins: they afflict the just, they take a bribe, and they turn aside the poor in the gate '
  - type: text
    content: from their right
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Therefore the prudent shall keep silence in that time; for it '
  - type: text
    content: is
  - type: text
    content: ' an evil time.'
  '14':
  - type: text
    content: 'Seek good, and not evil, that ye may live: and so the '
  - type: text
    content: LORD
  - type: text
    content: ', the God of hosts, shall be with you, as ye have spoken. '
  '15':
  - type: text
    content: 'Hate the evil, and love the good, and establish judgment in the gate: it may be that the '
  - type: text
    content: LORD
  - type: text
    content: ' God of hosts will be gracious unto the remnant of Joseph.'
  '16':
  - type: text
    content: 'Therefore the '
  - type: text
    content: LORD
  - type: text
    content: ', the God of hosts, the Lord, saith thus; Wailing '
  - type: text
    content: shall be
  - type: text
    content: ' in all streets; and they shall say in all the highways, Alas! alas! and they shall call the husbandman to mourning, and such as are skilful of lamentation to wailing. '
  '17':
  - type: text
    content: 'And in all vineyards '
  - type: text
    content: shall be
  - type: text
    content: ' wailing: for I will pass through thee, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '18':
  - type: text
    content: 'Woe unto you that desire the day of the '
  - type: text
    content: LORD
  - type: text
    content: '! to what end '
  - type: text
    content: is
  - type: text
    content: ' it for you? the day of the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' darkness, and not light. '
  '19':
  - type: text
    content: 'As if a man did flee from a lion, and a bear met him; or went into the house, and leaned his hand on the wall, and a serpent bit him. '
  '2':
  - type: text
    content: 'The virgin of Israel is fallen; she shall no more rise: she is forsaken upon her land; '
  - type: text
    content: there is
  - type: text
    content: ' none to raise her up. '
  '20':
  - type: text
    content: Shall
  - type: text
    content: ' not the day of the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' darkness, and not light? even very dark, and no brightness in it?'
  '21':
  - type: text
    content: 'I hate, I despise your feast days, and I will not smell in your solemn assemblies. '
  '22':
  - type: text
    content: 'Though ye offer me burnt offerings and your meat offerings, I will not accept '
  - type: text
    content: 'them:'
  - type: text
    content: ' neither will I regard the peace offerings of your fat beasts.'
  '23':
  - type: text
    content: 'Take thou away from me the noise of thy songs; for I will not hear the melody of thy viols. '
  '24':
  - type: text
    content: But let judgment run down as waters, and righteousness as a mighty stream.
  '25':
  - type: text
    content: 'Have ye offered unto me sacrifices and offerings in the wilderness forty years, O house of Israel? '
  '26':
  - type: text
    content: 'But ye have borne the tabernacle of your Moloch and Chiun your images, the star of your god, which ye made to yourselves. '
  '27':
  - type: text
    content: 'Therefore will I cause you to go into captivity beyond Damascus, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', whose name '
  - type: text
    content: is
  - type: text
    content: ' The God of hosts.'
  '3':
  - type: text
    content: 'For thus saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: '; The city that went out '
  - type: text
    content: by
  - type: text
    content: ' a thousand shall leave an hundred, and that which went forth '
  - type: text
    content: by
  - type: text
    content: ' an hundred shall leave ten, to the house of Israel.'
  '4':
  - type: text
    content: 'For thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' unto the house of Israel, Seek ye me, and ye shall live: '
  '5':
  - type: text
    content: 'but seek not Beth-el, nor enter into Gilgal, and pass not to Beer-sheba: for Gilgal shall surely go into captivity, and Beth-el shall come to nought. '
  '6':
  - type: text
    content: 'Seek the '
  - type: text
    content: LORD
  - type: text
    content: ', and ye shall live; lest he break out like fire in the house of Joseph, and devour '
  - type: text
    content: it
  - type: text
    content: ', and '
  - type: text
    content: there be
  - type: text
    content: ' none to quench '
  - type: text
    content: it
  - type: text
    content: ' in Beth-el. '
  '7':
  - type: text
    content: 'Ye who turn judgment to wormwood, and leave off righteousness in the earth, '
  '8':
  - type: text
    content: seek him
  - type: text
    content: ' that maketh the seven stars and Orion, and turneth the shadow of death into the morning, and maketh the day dark with night: that calleth for the waters of the sea, and poureth them out upon the face of the earth: The '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' his name: '
  '9':
  - type: text
    content: that strengtheneth the spoiled against the strong, so that the spoiled shall come against the fortress.
