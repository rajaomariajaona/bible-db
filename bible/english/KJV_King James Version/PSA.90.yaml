document_id: PSA.90
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: A Prayer of Moses the man of God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', thou hast been our dwelling place'
- type: usfm
  marker: q2
  children:
  - type: text
    text: In all generations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Before the mountains were brought forth, or ever thou hadst formed the earth and the world,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Even from everlasting to everlasting, thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' God.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Thou turnest man to destruction;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And sayest, Return, ye children of men.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For a thousand years in thy sight '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are but
  - type: text
    text: ' as yesterday'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'When it is past, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' a watch in the night.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Thou carriest them away as with a flood; they are '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' a sleep:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'In the morning '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they are
  - type: text
    text: ' like grass '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' groweth up.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: In the morning it flourisheth, and groweth up;
- type: usfm
  marker: q2
  children:
  - type: text
    text: In the evening it is cut down, and withereth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: For we are consumed by thine anger,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And by thy wrath are we troubled.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Thou hast set our iniquities before thee,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Our secret '
  - type: usfm
    marker: add
    children:
    - type: text
      text: sins
  - type: text
    text: ' in the light of thy countenance.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For all our days are passed away in thy wrath:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'We spend our years as a tale '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is told
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The days of our years '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' threescore years and ten; And if by reason of strength '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they be
  - type: text
    text: ' fourscore years,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Yet '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' their strength labour and sorrow; For it is soon cut off, and we fly away.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Who knoweth the power of thine anger?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Even according to thy fear, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so is
  - type: text
    text: ' thy wrath.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So teach '
  - type: usfm
    marker: add
    children:
    - type: text
      text: us
  - type: text
    text: ' to number our days,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'That we may apply '
  - type: usfm
    marker: add
    children:
    - type: text
      text: our
  - type: text
    text: ' hearts unto wisdom.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Return, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', how long?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And let it repent thee concerning thy servants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: O satisfy us early with thy mercy;
- type: usfm
  marker: q2
  children:
  - type: text
    text: That we may rejoice and be glad all our days.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Make us glad according to the days '
  - type: usfm
    marker: add
    children:
    - type: text
      text: wherein
  - type: text
    text: ' thou hast afflicted us,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' the years '
  - type: usfm
    marker: add
    children:
    - type: text
      text: wherein
  - type: text
    text: ' we have seen evil.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Let thy work appear unto thy servants,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thy glory unto their children.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And let the beauty of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' our God be upon us:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And establish thou the work of our hands upon us; Yea, the work of our hands establish thou it.
