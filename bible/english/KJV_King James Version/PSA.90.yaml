    content: A Prayer of Moses the man of God.
  - type: text
    content: ' '
  - type: text
    content: LORD
  - type: text
    content: ', thou hast been our dwelling place'
  - type: text
    content: In all generations.
  '10':
  - type: text
    content: 'The days of our years '
  - type: text
    content: are
  - type: text
    content: ' threescore years and ten; And if by reason of strength '
  - type: text
    content: they be
  - type: text
    content: ' fourscore years,'
  - type: text
    content: 'Yet '
  - type: text
    content: is
  - type: text
    content: ' their strength labour and sorrow; For it is soon cut off, and we fly away.'
  '11':
  - type: text
    content: Who knoweth the power of thine anger?
  - type: text
    content: 'Even according to thy fear, '
  - type: text
    content: so is
  - type: text
    content: ' thy wrath.'
  '12':
  - type: text
    content: 'So teach '
  - type: text
    content: us
  - type: text
    content: ' to number our days,'
  - type: text
    content: 'That we may apply '
  - type: text
    content: our
  - type: text
    content: ' hearts unto wisdom.'
  '13':
  - type: text
    content: 'Return, O '
  - type: text
    content: LORD
  - type: text
    content: ', how long?'
  - type: text
    content: And let it repent thee concerning thy servants.
  '14':
  - type: text
    content: O satisfy us early with thy mercy;
  - type: text
    content: That we may rejoice and be glad all our days.
  '15':
  - type: text
    content: 'Make us glad according to the days '
  - type: text
    content: wherein
  - type: text
    content: ' thou hast afflicted us,'
  - type: text
    content: And
  - type: text
    content: ' the years '
  - type: text
    content: wherein
  - type: text
    content: ' we have seen evil.'
  '16':
  - type: text
    content: Let thy work appear unto thy servants,
  - type: text
    content: And thy glory unto their children.
  '17':
  - type: text
    content: 'And let the beauty of the '
  - type: text
    content: LORD
  - type: text
    content: ' our God be upon us:'
  - type: text
    content: And establish thou the work of our hands upon us; Yea, the work of our hands establish thou it.
  '2':
  - type: text
    content: Before the mountains were brought forth, or ever thou hadst formed the earth and the world,
  - type: text
    content: 'Even from everlasting to everlasting, thou '
  - type: text
    content: art
  - type: text
    content: ' God.'
  '3':
  - type: text
    content: Thou turnest man to destruction;
  - type: text
    content: And sayest, Return, ye children of men.
  '4':
  - type: text
    content: 'For a thousand years in thy sight '
  - type: text
    content: are but
  - type: text
    content: ' as yesterday'
  - type: text
    content: 'When it is past, and '
  - type: text
    content: as
  - type: text
    content: ' a watch in the night.'
  '5':
  - type: text
    content: 'Thou carriest them away as with a flood; they are '
  - type: text
    content: as
  - type: text
    content: ' a sleep:'
  - type: text
    content: 'In the morning '
  - type: text
    content: they are
  - type: text
    content: ' like grass '
  - type: text
    content: which
  - type: text
    content: ' groweth up.'
  '6':
  - type: text
    content: In the morning it flourisheth, and groweth up;
  - type: text
    content: In the evening it is cut down, and withereth.
  '7':
  - type: text
    content: For we are consumed by thine anger,
  - type: text
    content: And by thy wrath are we troubled.
  '8':
  - type: text
    content: Thou hast set our iniquities before thee,
  - type: text
    content: 'Our secret '
  - type: text
    content: sins
  - type: text
    content: ' in the light of thy countenance.'
  '9':
  - type: text
    content: 'For all our days are passed away in thy wrath:'
  - type: text
    content: 'We spend our years as a tale '
  - type: text
    content: that is told
  - type: text
    content: .
