document_id: PSA.80,1
type_code: eng
verses:
  '1':
  - type: text
    content: To the chief Musician upon Shoshannim-eduth, A Psalm of Asaph.
  - type: text
    content: Give ear, O Shepherd of Israel, thou that leadest Joseph like a flock;
  - type: text
    content: 'Thou that dwellest '
  - type: text
    content: between
  - type: text
    content: ' the cherubims, shine forth.'
  '10':
  - type: text
    content: The hills were covered with the shadow of it,
  - type: text
    content: 'And the boughs thereof '
  - type: text
    content: were like
  - type: text
    content: ' the goodly cedars.'
  '11':
  - type: text
    content: She sent out her boughs unto the sea,
  - type: text
    content: And her branches unto the river.
  '12':
  - type: text
    content: 'Why hast thou '
  - type: text
    content: then
  - type: text
    content: ' broken down her hedges,'
  - type: text
    content: So that all they which pass by the way do pluck her?
  '13':
  - type: text
    content: The boar out of the wood doth waste it,
  - type: text
    content: And the wild beast of the field doth devour it.
  '14':
  - type: text
    content: 'Return, we beseech thee, O God of hosts: Look down from heaven,'
  - type: text
    content: And behold, and visit this vine;
  '15':
  - type: text
    content: And the vineyard which thy right hand hath planted,
  - type: text
    content: 'And the branch '
  - type: text
    content: that
  - type: text
    content: ' thou madest strong for thyself.'
  '16':
  - type: text
    content: ' '
  - type: text
    content: It is
  - type: text
    content: ' burned with fire, '
  - type: text
    content: it is
  - type: text
    content: ' cut down:'
  - type: text
    content: They perish at the rebuke of thy countenance.
  '17':
  - type: text
    content: Let thy hand be upon the man of thy right hand,
  - type: text
    content: 'Upon the son of man '
  - type: text
    content: whom
  - type: text
    content: ' thou madest strong for thyself.'
  '18':
  - type: text
    content: 'So will not we go back from thee:'
  - type: text
    content: Quicken us, and we will call upon thy name.
  '19':
  - type: text
    content: 'Turn us again, O '
  - type: text
    content: LORD
  - type: text
    content: ' God of hosts,'
  - type: text
    content: Cause thy face to shine; and we shall be saved.
  '2':
  - type: text
    content: Before Ephraim and Benjamin and Manasseh stir up thy strength,
  - type: text
    content: 'And come '
  - type: text
    content: and
  - type: text
    content: ' save us.'
  '3':
  - type: text
    content: Turn us again, O God,
  - type: text
    content: And cause thy face to shine; and we shall be saved.
  '4':
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ' God of hosts,'
  - type: text
    content: How long wilt thou be angry against the prayer of thy people?
  '5':
  - type: text
    content: Thou feedest them with the bread of tears;
  - type: text
    content: And givest them tears to drink in great measure.
  '6':
  - type: text
    content: 'Thou makest us a strife unto our neighbours:'
  - type: text
    content: And our enemies laugh among themselves.
  '7':
  - type: text
    content: Turn us again, O God of hosts,
  - type: text
    content: And cause thy face to shine; and we shall be saved.
  '8':
  - type: text
    content: 'Thou hast brought a vine out of Egypt:'
  - type: text
    content: Thou hast cast out the heathen, and planted it.
  '9':
  - type: text
    content: 'Thou preparedst '
  - type: text
    content: room
  - type: text
    content: ' before it,'
  - type: text
    content: And didst cause it to take deep root, and it filled the land.
