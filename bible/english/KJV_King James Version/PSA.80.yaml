document_id: PSA.80
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: To the chief Musician upon Shoshannim-eduth, A Psalm of Asaph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Give ear, O Shepherd of Israel, thou that leadest Joseph like a flock;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Thou that dwellest '
  - type: usfm
    marker: add
    children:
    - type: text
      text: between
  - type: text
    text: ' the cherubims, shine forth.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Before Ephraim and Benjamin and Manasseh stir up thy strength,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And come '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' save us.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Turn us again, O God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And cause thy face to shine; and we shall be saved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of hosts,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: How long wilt thou be angry against the prayer of thy people?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Thou feedest them with the bread of tears;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And givest them tears to drink in great measure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Thou makest us a strife unto our neighbours:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And our enemies laugh among themselves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Turn us again, O God of hosts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And cause thy face to shine; and we shall be saved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Thou hast brought a vine out of Egypt:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou hast cast out the heathen, and planted it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Thou preparedst '
  - type: usfm
    marker: add
    children:
    - type: text
      text: room
  - type: text
    text: ' before it,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And didst cause it to take deep root, and it filled the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The hills were covered with the shadow of it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the boughs thereof '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were like
  - type: text
    text: ' the goodly cedars.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: She sent out her boughs unto the sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And her branches unto the river.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Why hast thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' broken down her hedges,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: So that all they which pass by the way do pluck her?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The boar out of the wood doth waste it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the wild beast of the field doth devour it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Return, we beseech thee, O God of hosts: Look down from heaven,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And behold, and visit this vine;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And the vineyard which thy right hand hath planted,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the branch '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' thou madest strong for thyself.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' burned with fire, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' cut down:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They perish at the rebuke of thy countenance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Let thy hand be upon the man of thy right hand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Upon the son of man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: whom
  - type: text
    text: ' thou madest strong for thyself.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So will not we go back from thee:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Quicken us, and we will call upon thy name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Turn us again, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of hosts,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Cause thy face to shine; and we shall be saved.
