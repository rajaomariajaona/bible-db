document_id: PSA.64,1
type_code: eng
verses:
  '1':
  - type: text
    content: To the chief Musician, A Psalm of David.
  - type: text
    content: 'Hear my voice, O God, in my prayer:'
  - type: text
    content: Preserve my life from fear of the enemy.
  '10':
  - type: text
    content: 'The righteous shall be glad in the '
  - type: text
    content: LORD
  - type: text
    content: ', and shall trust in him;'
  - type: text
    content: And all the upright in heart shall glory.
  '2':
  - type: text
    content: Hide me from the secret counsel of the wicked;
  - type: text
    content: 'From the insurrection of the workers of iniquity:'
  '3':
  - type: text
    content: Who whet their tongue like a sword,
  - type: text
    content: And
  - type: text
    content: ' bend '
  - type: text
    content: their bows to shoot
  - type: text
    content: ' their arrows, '
  - type: text
    content: even
  - type: text
    content: ' bitter words:'
  '4':
  - type: text
    content: 'That they may shoot in secret at the perfect:'
  - type: text
    content: Suddenly do they shoot at him, and fear not.
  '5':
  - type: text
    content: 'They encourage themselves '
  - type: text
    content: in
  - type: text
    content: ' an evil matter:'
  - type: text
    content: They commune of laying snares privily; They say, Who shall see them?
  '6':
  - type: text
    content: 'They search out iniquities; they accomplish a diligent search:'
  - type: text
    content: 'Both the inward '
  - type: text
    content: thought
  - type: text
    content: ' of every one '
  - type: text
    content: of them
  - type: text
    content: ', and the heart, '
  - type: text
    content: is
  - type: text
    content: ' deep.'
  '7':
  - type: text
    content: But God shall shoot at them
  - type: text
    content: With
  - type: text
    content: ' an arrow; suddenly shall they be wounded.'
  '8':
  - type: text
    content: 'So they shall make their own tongue to fall upon themselves:'
  - type: text
    content: All that see them shall flee away.
  '9':
  - type: text
    content: And all men shall fear, and shall declare the work of God;
  - type: text
    content: For they shall wisely consider of his doing.
