document_id: PSA.64
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: To the chief Musician, A Psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hear my voice, O God, in my prayer:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Preserve my life from fear of the enemy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hide me from the secret counsel of the wicked;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'From the insurrection of the workers of iniquity:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Who whet their tongue like a sword,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' bend '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their bows to shoot
  - type: text
    text: ' their arrows, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' bitter words:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'That they may shoot in secret at the perfect:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Suddenly do they shoot at him, and fear not.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They encourage themselves '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' an evil matter:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They commune of laying snares privily; They say, Who shall see them?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'They search out iniquities; they accomplish a diligent search:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Both the inward '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thought
  - type: text
    text: ' of every one '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of them
  - type: text
    text: ', and the heart, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' deep.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But God shall shoot at them
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: With
  - type: text
    text: ' an arrow; suddenly shall they be wounded.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So they shall make their own tongue to fall upon themselves:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: All that see them shall flee away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: And all men shall fear, and shall declare the work of God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: For they shall wisely consider of his doing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The righteous shall be glad in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and shall trust in him;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And all the upright in heart shall glory.
