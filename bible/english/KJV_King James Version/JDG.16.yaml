document_id: JDG.16,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then went Samson to Gaza, and saw there an harlot, and went in unto her. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Delilah said unto Samson, Behold, thou hast mocked me, and told me lies: now tell me, I pray thee, wherewith thou mightest be bound. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto her, If they bind me fast with new ropes that never were occupied, then shall I be weak, and be as another man. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Delilah therefore took new ropes, and bound him therewith, and said unto him, The Philistines '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' upon thee, Samson. And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there were
    - type: text
      text: ' liers in wait abiding in the chamber. And he brake them from off his arms like a thread.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Delilah said unto Samson, Hitherto thou hast mocked me, and told me lies: tell me wherewith thou mightest be bound. And he said unto her, If thou weavest the seven locks of my head with the web. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And she fastened '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' with the pin, and said unto him, The Philistines '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' upon thee, Samson. And he awaked out of his sleep, and went away with the pin of the beam, and with the web.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And she said unto him, How canst thou say, I love thee, when thine heart '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not with me? Thou hast mocked me these three times, and hast not told me wherein thy great strength '
    - type: usfm
      marker: add
      children:
      - type: text
        text: lieth
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, when she pressed him daily with her words, and urged him, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' that his soul was vexed unto death; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that he told her all his heart, and said unto her, There hath not come a razor upon mine head; for I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: have been
    - type: text
      text: ' a Nazarite unto God from my mother''s womb: if I be shaven, then my strength will go from me, and I shall become weak, and be like any '
    - type: usfm
      marker: add
      children:
      - type: text
        text: other
    - type: text
      text: ' man.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Delilah saw that he had told her all his heart, she sent and called for the lords of the Philistines, saying, Come up this once, for he hath shewed me all his heart. Then the lords of the Philistines came up unto her, and brought money in their hand. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And she made him sleep upon her knees; and she called for a man, and she caused him to shave off the seven locks of his head; and she began to afflict him, and his strength went from him. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And it was told
    - type: text
      text: ' the Gazites, saying, Samson is come hither. And they compassed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' in, and laid wait for him all night in the gate of the city, and were quiet all the night, saying, In the morning, when it is day, we shall kill him. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And she said, The Philistines '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' upon thee, Samson. And he awoke out of his sleep, and said, I will go out as at other times before, and shake myself. And he wist not that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was departed from him. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the Philistines took him, and put out his eyes, and brought him down to Gaza, and bound him with fetters of brass; and he did grind in the prison house. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Howbeit the hair of his head began to grow again after he was shaven.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the lords of the Philistines gathered them together for to offer a great sacrifice unto Dagon their god, and to rejoice: for they said, Our god hath delivered Samson our enemy into our hand. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the people saw him, they praised their god: for they said, Our god hath delivered into our hands our enemy, and the destroyer of our country, which slew many of us. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, when their hearts were merry, that they said, Call for Samson, that he may make us sport. And they called for Samson out of the prison house; and he made them sport: and they set him between the pillars. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Samson said unto the lad that held him by the hand, Suffer me that I may feel the pillars whereupon the house standeth, that I may lean upon them. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the house was full of men and women; and all the lords of the Philistines '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' there; and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there were
    - type: text
      text: ' upon the roof about three thousand men and women, that beheld while Samson made sport.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Samson called unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and said, O Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ', remember me, I pray thee, and strengthen me, I pray thee, only this once, O God, that I may be at once avenged of the Philistines for my two eyes. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Samson took hold of the two middle pillars upon which the house stood, and on which it was borne up, of the one with his right hand, and of the other with his left. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Samson lay till midnight, and arose at midnight, and took the doors of the gate of the city, and the two posts, and went away with them, bar and all, and put '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' upon his shoulders, and carried them up to the top of an hill that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' before Hebron.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Delilah
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Samson said, Let me die with the Philistines. And he bowed himself with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: all his
    - type: text
      text: ' might; and the house fell upon the lords, and upon all the people that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' therein. So the dead which he slew at his death were more than '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they
    - type: text
      text: ' which he slew in his life. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then his brethren and all the house of his father came down, and took him, and brought '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' up, and buried him between Zorah and Eshtaol in the buryingplace of Manoah his father. And he judged Israel twenty years.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass afterward, that he loved a woman in the valley of Sorek, whose name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Delilah. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the lords of the Philistines came up unto her, and said unto her, Entice him, and see wherein his great strength '
    - type: usfm
      marker: add
      children:
      - type: text
        text: lieth
    - type: text
      text: ', and by what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: means
    - type: text
      text: ' we may prevail against him, that we may bind him to afflict him: and we will give thee every one of us eleven hundred '
    - type: usfm
      marker: add
      children:
      - type: text
        text: pieces
    - type: text
      text: ' of silver. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Delilah said to Samson, Tell me, I pray thee, wherein thy great strength '
    - type: usfm
      marker: add
      children:
      - type: text
        text: lieth
    - type: text
      text: ', and wherewith thou mightest be bound to afflict thee. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Samson said unto her, If they bind me with seven green withs that were never dried, then shall I be weak, and be as another man. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the lords of the Philistines brought up to her seven green withs which had not been dried, and she bound him with them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there were
    - type: text
      text: ' men lying in wait, abiding with her in the chamber. And she said unto him, The Philistines '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' upon thee, Samson. And he brake the withs, as a thread of tow is broken when it toucheth the fire. So his strength was not known.'
