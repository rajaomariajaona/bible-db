document_id: 1TH.4,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The New Life
  - type: text
    content: 'Furthermore then we beseech you, brethren, and exhort '
  - type: text
    content: you
  - type: text
    content: ' by the Lord Jesus, that as ye have received of us how ye ought to walk and to please God, '
  - type: text
    content: so
  - type: text
    content: ' ye would abound more and more. '
  '10':
  - type: text
    content: 'And indeed ye do it toward all the brethren which are in all Macedonia: but we beseech you, brethren, that ye increase more and more; '
  '11':
  - type: text
    content: 'and that ye study to be quiet, and to do your own business, and to work with your own hands, as we commanded you; '
  '12':
  - type: text
    content: 'that ye may walk honestly toward them that are without, and '
  - type: text
    content: that
  - type: text
    content: ' ye may have lack of nothing.'
  - type: heading
    content: The Coming of the Lord
  '13':
  - type: text
    content: 'But I would not have you to be ignorant, brethren, concerning them which are asleep, that ye sorrow not, even as others which have no hope. '
  '14':
  - type: text
    content: 'For if we believe that Jesus died and rose again, even so them also which sleep in Jesus will God bring with him. '
  '15':
  - type: text
    content: 'For this we say unto you by the word of the Lord, that we which are alive '
  - type: text
    content: and
  - type: text
    content: ' remain unto the coming of the Lord shall not prevent them which are asleep. '
  '16':
  - type: text
    content: 'For the Lord himself shall descend from heaven with a shout, with the voice of the archangel, and with the trump of God: and the dead in Christ shall rise first: '
  '17':
  - type: text
    content: 'then we which are alive '
  - type: text
    content: and
  - type: text
    content: ' remain shall be caught up together with them in the clouds, to meet the Lord in the air: and so shall we ever be with the Lord. '
  '18':
  - type: text
    content: Wherefore comfort one another with these words.
  '2':
  - type: text
    content: For ye know what commandments we gave you by the Lord Jesus.
  '3':
  - type: text
    content: 'For this is the will of God, '
  - type: text
    content: even
  - type: text
    content: ' your sanctification, that ye should abstain from fornication: '
  '4':
  - type: text
    content: 'that every one of you should know how to possess his vessel in sanctification and honour; '
  '5':
  - type: text
    content: 'not in the lust of concupiscence, even as the Gentiles which know not God: '
  '6':
  - type: text
    content: 'that no '
  - type: text
    content: man
  - type: text
    content: ' go beyond and defraud his brother in '
  - type: text
    content: any
  - type: text
    content: ' matter: because that the Lord '
  - type: text
    content: is
  - type: text
    content: ' the avenger of all such, as we also have forewarned you and testified. '
  '7':
  - type: text
    content: 'For God hath not called us unto uncleanness, but unto holiness. '
  '8':
  - type: text
    content: He therefore that despiseth, despiseth not man, but God, who hath also given unto us his holy Spirit.
  '9':
  - type: text
    content: 'But as touching brotherly love ye need not that I write unto you: for ye yourselves are taught of God to love one another. '
