document_id: 1TH.4
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The New Life
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Furthermore then we beseech you, brethren, and exhort '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: ' by the Lord Jesus, that as ye have received of us how ye ought to walk and to please God, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' ye would abound more and more. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For ye know what commandments we gave you by the Lord Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For this is the will of God, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' your sanctification, that ye should abstain from fornication: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'that every one of you should know how to possess his vessel in sanctification and honour; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'not in the lust of concupiscence, even as the Gentiles which know not God: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'that no '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' go beyond and defraud his brother in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' matter: because that the Lord '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the avenger of all such, as we also have forewarned you and testified. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For God hath not called us unto uncleanness, but unto holiness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He therefore that despiseth, despiseth not man, but God, who hath also given unto us his holy Spirit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But as touching brotherly love ye need not that I write unto you: for ye yourselves are taught of God to love one another. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And indeed ye do it toward all the brethren which are in all Macedonia: but we beseech you, brethren, that ye increase more and more; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and that ye study to be quiet, and to do your own business, and to work with your own hands, as we commanded you; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'that ye may walk honestly toward them that are without, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' ye may have lack of nothing.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Coming of the Lord
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But I would not have you to be ignorant, brethren, concerning them which are asleep, that ye sorrow not, even as others which have no hope. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For if we believe that Jesus died and rose again, even so them also which sleep in Jesus will God bring with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For this we say unto you by the word of the Lord, that we which are alive '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' remain unto the coming of the Lord shall not prevent them which are asleep. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For the Lord himself shall descend from heaven with a shout, with the voice of the archangel, and with the trump of God: and the dead in Christ shall rise first: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'then we which are alive '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' remain shall be caught up together with them in the clouds, to meet the Lord in the air: and so shall we ever be with the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Wherefore comfort one another with these words.
