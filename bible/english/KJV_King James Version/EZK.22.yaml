document_id: EZK.22
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The City of Blood
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moreover the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came unto me, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Now, thou son of man, wilt thou judge, wilt thou judge the bloody city? yea, thou shalt shew her all her abominations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then say thou, Thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ', The city sheddeth blood in the midst of it, that her time may come, and maketh idols against herself to defile herself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Thou art become guilty in thy blood that thou hast shed; and hast defiled thyself in thine idols which thou hast made; and thou hast caused thy days to draw near, and art come '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' unto thy years: therefore have I made thee a reproach unto the heathen, and a mocking to all countries. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Those that be
  - type: text
    text: ' near, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: those that be
  - type: text
    text: ' far from thee, shall mock thee, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which art
  - type: text
    text: ' infamous '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' much vexed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Behold, the princes of Israel, every one were in thee to their power to shed blood. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'In thee have they set light by father and mother: in the midst of thee have they dealt by oppression with the stranger: in thee have they vexed the fatherless and the widow. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Thou hast despised mine holy things, and hast profaned my sabbaths. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'In thee are men that carry tales to shed blood: and in thee they eat upon the mountains: in the midst of thee they commit lewdness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'In thee have they discovered their fathers'' nakedness: in thee have they humbled her that was set apart for pollution. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And one hath committed abomination with his neighbour''s wife; and another hath lewdly defiled his daughter in law; and another in thee hath humbled his sister, his father''s daughter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'In thee have they taken gifts to shed blood; thou hast taken usury and increase, and thou hast greedily gained of thy neighbours by extortion, and hast forgotten me, saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Behold, therefore I have smitten mine hand at thy dishonest gain which thou hast made, and at thy blood which hath been in the midst of thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Can thine heart endure, or can thine hands be strong, in the days that I shall deal with thee? I the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' have spoken '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and will do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And I will scatter thee among the heathen, and disperse thee in the countries, and will consume thy filthiness out of thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And thou shalt take thine inheritance in thyself in the sight of the heathen, and thou shalt know that I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came unto me, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Son of man, the house of Israel is to me become dross: all they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' brass, and tin, and iron, and lead, in the midst of the furnace; they are '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the dross of silver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Therefore thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; Because ye are all become dross, behold, therefore I will gather you into the midst of Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' they gather silver, and brass, and iron, and lead, and tin, into the midst of the furnace, to blow the fire upon it, to melt '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '; so will I gather '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: ' in mine anger and in my fury, and I will leave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you there
  - type: text
    text: ', and melt you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Yea, I will gather you, and blow upon you in the fire of my wrath, and ye shall be melted in the midst thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'As silver is melted in the midst of the furnace, so shall ye be melted in the midst thereof; and ye shall know that I the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' have poured out my fury upon you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came unto me, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Son of man, say unto her, Thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' the land that is not cleansed, nor rained upon in the day of indignation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' a conspiracy of her prophets in the midst thereof, like a roaring lion ravening the prey; they have devoured souls; they have taken the treasure and precious things; they have made her many widows in the midst thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Her priests have violated my law, and have profaned mine holy things: they have put no difference between the holy and profane, neither have they shewed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: difference
  - type: text
    text: ' between the unclean and the clean, and have hid their eyes from my sabbaths, and I am profaned among them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Her princes in the midst thereof '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' like wolves ravening the prey, to shed blood, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' to destroy souls, to get dishonest gain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And her prophets have daubed them with untempered '
  - type: usfm
    marker: add
    children:
    - type: text
      text: morter
  - type: text
    text: ', seeing vanity, and divining lies unto them, saying, Thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ', when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath not spoken. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'The people of the land have used oppression, and exercised robbery, and have vexed the poor and needy: yea, they have oppressed the stranger wrongfully. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And I sought for a man among them, that should make up the hedge, and stand in the gap before me for the land, that I should not destroy it: but I found none. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Therefore have I poured out mine indignation upon them; I have consumed them with the fire of my wrath: their own way have I recompensed upon their heads, saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: .
