document_id: 2TI.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: In Perilous Times
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This know also, that in the last days perilous times shall come. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But thou hast fully known my doctrine, manner of life, purpose, faith, longsuffering, charity, patience, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'persecutions, afflictions, which came unto me at Antioch, at Iconium, at Lystra; what persecutions I endured: but out of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' all the Lord delivered me. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yea, and all that will live godly in Christ Jesus shall suffer persecution. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But evil men and seducers shall wax worse and worse, deceiving, and being deceived. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But continue thou in the things which thou hast learned and hast been assured of, knowing of whom thou hast learned '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: '; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and that from a child thou hast known the holy scriptures, which are able to make thee wise unto salvation through faith which is in Christ Jesus. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All scripture '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' given by inspiration of God, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' profitable for doctrine, for reproof, for correction, for instruction in righteousness: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: that the man of God may be perfect, throughly furnished unto all good works.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For men shall be lovers of their own selves, covetous, boasters, proud, blasphemers, disobedient to parents, unthankful, unholy, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'without natural affection, trucebreakers, false accusers, incontinent, fierce, despisers of those that are good, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'traitors, heady, highminded, lovers of pleasures more than lovers of God; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'having a form of godliness, but denying the power thereof: from such turn away. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For of this sort are they which creep into houses, and lead captive silly women laden with sins, led away with divers lusts, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ever learning, and never able to come to the knowledge of the truth. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now as Jannes and Jambres withstood Moses, so do these also resist the truth: men of corrupt minds, reprobate concerning the faith. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they shall proceed no further: for their folly shall be manifest unto all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ', as theirs also was. '
