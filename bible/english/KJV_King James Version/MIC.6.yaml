- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hear ye now what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' saith; Arise, contend thou before the mountains, and let the hills hear thy voice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hear ye, O mountains, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s controversy, and ye strong foundations of the earth: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath a controversy with his people, and he will plead with Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'O my people, what have I done unto thee? and wherein have I wearied thee? testify against me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For I brought thee up out of the land of Egypt, and redeemed thee out of the house of servants; and I sent before thee Moses, Aaron, and Miriam. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'O my people, remember now what Balak king of Moab consulted, and what Balaam the son of Beor answered him from Shittim unto Gilgal; that ye may know the righteousness of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Wherewith shall I come before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' bow myself before the high God? shall I come before him with burnt offerings, with calves of a year old? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Will the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' be pleased with thousands of rams, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: or
  - type: text
    text: ' with ten thousands of rivers of oil? shall I give my firstborn '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' my transgression, the fruit of my body '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' the sin of my soul? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He hath shewed thee, O man, what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' good; and what doth the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' require of thee, but to do justly, and to love mercy, and to walk humbly with thy God?'
- type: usfm
  marker: s2
  children:
  - type: text
    text: His Call to the City
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s voice crieth unto the city, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the man of
  - type: text
    text: ' wisdom shall see thy name: hear ye the rod, and who hath appointed it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Are there yet the treasures of wickedness in the house of the wicked, and the scant measure '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' abominable? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Shall I count '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' pure with the wicked balances, and with the bag of deceitful weights? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For the rich men thereof are full of violence, and the inhabitants thereof have spoken lies, and their tongue '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' deceitful in their mouth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Therefore also will I make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thee
  - type: text
    text: ' sick in smiting thee, in making '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thee
  - type: text
    text: ' desolate because of thy sins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Thou shalt eat, but not be satisfied; and thy casting down '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' in the midst of thee; and thou shalt take hold, but shalt not deliver; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' which thou deliverest will I give up to the sword. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Thou shalt sow, but thou shalt not reap; thou shalt tread the olives, but thou shalt not anoint thee with oil; and sweet wine, but shalt not drink wine.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For the statutes of Omri are kept, and all the works of the house of Ahab, and ye walk in their counsels; that I should make thee a desolation, and the inhabitants thereof an hissing: therefore ye shall bear the reproach of my people.'
