    content: Uzziah
  - type: text
    content: 'Then all the people of Judah took Uzziah, who '
  - type: text
    content: was
  - type: text
    content: ' sixteen years old, and made him king in the room of his father Amaziah. '
  '10':
  - type: text
    content: 'Also he built towers in the desert, and digged many wells: for he had much cattle, both in the low country, and in the plains: husbandmen '
  - type: text
    content: also
  - type: text
    content: ', and vine dressers in the mountains, and in Carmel: for he loved husbandry. '
  '11':
  - type: text
    content: 'Moreover Uzziah had an host of fighting men, that went out to war by bands, according to the number of their account by the hand of Jeiel the scribe and Maaseiah the ruler, under the hand of Hananiah, '
  - type: text
    content: one
  - type: text
    content: ' of the king''s captains. '
  '12':
  - type: text
    content: 'The whole number of the chief of the fathers of the mighty men of valour '
  - type: text
    content: were
  - type: text
    content: ' two thousand and six hundred. '
  '13':
  - type: text
    content: 'And under their hand '
  - type: text
    content: was
  - type: text
    content: ' an army, three hundred thousand and seven thousand and five hundred, that made war with mighty power, to help the king against the enemy. '
  '14':
  - type: text
    content: 'And Uzziah prepared for them throughout all the host shields, and spears, and helmets, and habergeons, and bows, and slings '
  - type: text
    content: to cast
  - type: text
    content: ' stones. '
  '15':
  - type: text
    content: And he made in Jerusalem engines, invented by cunning men, to be on the towers and upon the bulwarks, to shoot arrows and great stones withal. And his name spread far abroad; for he was marvellously helped, till he was strong.
  '16':
  - type: text
    content: 'But when he was strong, his heart was lifted up to '
  - type: text
    content: his
  - type: text
    content: ' destruction: for he transgressed against the '
  - type: text
    content: LORD
  - type: text
    content: ' his God, and went into the temple of the '
  - type: text
    content: LORD
  - type: text
    content: ' to burn incense upon the altar of incense. '
  '17':
  - type: text
    content: 'And Azariah the priest went in after him, and with him fourscore priests of the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: that were
  - type: text
    content: ' valiant men: '
  '18':
  - type: text
    content: 'and they withstood Uzziah the king, and said unto him, '
  - type: text
    content: It appertaineth
  - type: text
    content: ' not unto thee, Uzziah, to burn incense unto the '
  - type: text
    content: LORD
  - type: text
    content: ', but to the priests the sons of Aaron, that are consecrated to burn incense: go out of the sanctuary; for thou hast trespassed; neither '
  - type: text
    content: shall it be
  - type: text
    content: ' for thine honour from the '
  - type: text
    content: LORD
  - type: text
    content: ' God. '
  '19':
  - type: text
    content: 'Then Uzziah was wroth, and '
  - type: text
    content: had
  - type: text
    content: ' a censer in his hand to burn incense: and while he was wroth with the priests, the leprosy even rose up in his forehead before the priests in the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', from beside the incense altar. '
  '2':
  - type: text
    content: 'He built Eloth, and restored it to Judah, after that the king slept with his fathers. '
  '20':
  - type: text
    content: 'And Azariah the chief priest, and all the priests, looked upon him, and, behold, he '
  - type: text
    content: was
  - type: text
    content: ' leprous in his forehead, and they thrust him out from thence; yea, himself hasted also to go out, because the '
  - type: text
    content: LORD
  - type: text
    content: ' had smitten him. '
  '21':
  - type: text
    content: 'And Uzziah the king was a leper unto the day of his death, and dwelt in a several house, '
  - type: text
    content: being
  - type: text
    content: ' a leper; for he was cut off from the house of the '
  - type: text
    content: LORD
  - type: text
    content: ': and Jotham his son '
  - type: text
    content: was
  - type: text
    content: ' over the king''s house, judging the people of the land.'
  '22':
  - type: text
    content: 'Now the rest of the acts of Uzziah, first and last, did Isaiah the prophet, the son of Amoz, write. '
  '23':
  - type: text
    content: 'So Uzziah slept with his fathers, and they buried him with his fathers in the field of the burial which '
  - type: text
    content: belonged
  - type: text
    content: ' to the kings; for they said, He '
  - type: text
    content: is
  - type: text
    content: ' a leper: and Jotham his son reigned in his stead.'
  '3':
  - type: text
    content: 'Sixteen years old '
  - type: text
    content: was
  - type: text
    content: ' Uzziah when he began to reign, and he reigned fifty and two years in Jerusalem. His mother''s name also '
  - type: text
    content: was
  - type: text
    content: ' Jecoliah of Jerusalem. '
  '4':
  - type: text
    content: 'And he did '
  - type: text
    content: that which was
  - type: text
    content: ' right in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', according to all that his father Amaziah did. '
  '5':
  - type: text
    content: 'And he sought God in the days of Zechariah, who had understanding in the visions of God: and as long as he sought the '
  - type: text
    content: LORD
  - type: text
    content: ', God made him to prosper.'
  '6':
  - type: text
    content: 'And he went forth and warred against the Philistines, and brake down the wall of Gath, and the wall of Jabneh, and the wall of Ashdod, and built cities about Ashdod, and among the Philistines. '
  '7':
  - type: text
    content: 'And God helped him against the Philistines, and against the Arabians that dwelt in Gur-baal, and the Mehunims. '
  '8':
  - type: text
    content: 'And the Ammonites gave gifts to Uzziah: and his name spread abroad '
  - type: text
    content: even
  - type: text
    content: ' to the entering in of Egypt; for he strengthened '
  - type: text
    content: himself
  - type: text
    content: ' exceedingly. '
  '9':
  - type: text
    content: 'Moreover Uzziah built towers in Jerusalem at the corner gate, and at the valley gate, and at the turning '
  - type: text
    content: of the wall
  - type: text
    content: ', and fortified them. '
