document_id: 2CH.26
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Uzziah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then all the people of Judah took Uzziah, who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' sixteen years old, and made him king in the room of his father Amaziah. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He built Eloth, and restored it to Judah, after that the king slept with his fathers. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Sixteen years old '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Uzziah when he began to reign, and he reigned fifty and two years in Jerusalem. His mother''s name also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Jecoliah of Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And he did '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which was
  - type: text
    text: ' right in the sight of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', according to all that his father Amaziah did. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And he sought God in the days of Zechariah, who had understanding in the visions of God: and as long as he sought the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', God made him to prosper.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he went forth and warred against the Philistines, and brake down the wall of Gath, and the wall of Jabneh, and the wall of Ashdod, and built cities about Ashdod, and among the Philistines. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And God helped him against the Philistines, and against the Arabians that dwelt in Gur-baal, and the Mehunims. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the Ammonites gave gifts to Uzziah: and his name spread abroad '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to the entering in of Egypt; for he strengthened '
  - type: usfm
    marker: add
    children:
    - type: text
      text: himself
  - type: text
    text: ' exceedingly. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Moreover Uzziah built towers in Jerusalem at the corner gate, and at the valley gate, and at the turning '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of the wall
  - type: text
    text: ', and fortified them. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Also he built towers in the desert, and digged many wells: for he had much cattle, both in the low country, and in the plains: husbandmen '
  - type: usfm
    marker: add
    children:
    - type: text
      text: also
  - type: text
    text: ', and vine dressers in the mountains, and in Carmel: for he loved husbandry. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Moreover Uzziah had an host of fighting men, that went out to war by bands, according to the number of their account by the hand of Jeiel the scribe and Maaseiah the ruler, under the hand of Hananiah, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' of the king''s captains. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The whole number of the chief of the fathers of the mighty men of valour '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' two thousand and six hundred. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And under their hand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' an army, three hundred thousand and seven thousand and five hundred, that made war with mighty power, to help the king against the enemy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And Uzziah prepared for them throughout all the host shields, and spears, and helmets, and habergeons, and bows, and slings '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to cast
  - type: text
    text: ' stones. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And he made in Jerusalem engines, invented by cunning men, to be on the towers and upon the bulwarks, to shoot arrows and great stones withal. And his name spread far abroad; for he was marvellously helped, till he was strong.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But when he was strong, his heart was lifted up to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' destruction: for he transgressed against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' his God, and went into the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' to burn incense upon the altar of incense. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And Azariah the priest went in after him, and with him fourscore priests of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that were
  - type: text
    text: ' valiant men: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and they withstood Uzziah the king, and said unto him, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It appertaineth
  - type: text
    text: ' not unto thee, Uzziah, to burn incense unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', but to the priests the sons of Aaron, that are consecrated to burn incense: go out of the sanctuary; for thou hast trespassed; neither '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall it be
  - type: text
    text: ' for thine honour from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then Uzziah was wroth, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: had
  - type: text
    text: ' a censer in his hand to burn incense: and while he was wroth with the priests, the leprosy even rose up in his forehead before the priests in the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', from beside the incense altar. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Azariah the chief priest, and all the priests, looked upon him, and, behold, he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' leprous in his forehead, and they thrust him out from thence; yea, himself hasted also to go out, because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had smitten him. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And Uzziah the king was a leper unto the day of his death, and dwelt in a several house, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' a leper; for he was cut off from the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': and Jotham his son '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' over the king''s house, judging the people of the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Now the rest of the acts of Uzziah, first and last, did Isaiah the prophet, the son of Amoz, write. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So Uzziah slept with his fathers, and they buried him with his fathers in the field of the burial which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: belonged
  - type: text
    text: ' to the kings; for they said, He '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a leper: and Jotham his son reigned in his stead.'
