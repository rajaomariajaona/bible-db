document_id: PSA.33,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Rejoice in the '
  - type: text
    content: LORD
  - type: text
    content: ', O ye righteous:'
  - type: text
    content: For
  - type: text
    content: ' praise is comely for the upright.'
  '10':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' bringeth the counsel of the heathen to nought:'
  - type: text
    content: He maketh the devices of the people of none effect.
  '11':
  - type: text
    content: 'The counsel of the '
  - type: text
    content: LORD
  - type: text
    content: ' standeth for ever,'
  - type: text
    content: The thoughts of his heart to all generations.
  '12':
  - type: text
    content: 'Blessed '
  - type: text
    content: is
  - type: text
    content: ' the nation whose God '
  - type: text
    content: is
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ;
  - type: text
    content: And
  - type: text
    content: ' the people '
  - type: text
    content: whom
  - type: text
    content: ' he hath chosen for his own inheritance.'
  '13':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' looketh from heaven; he beholdeth all the sons of men.'
  '14':
  - type: text
    content: From the place of his habitation he looketh upon all the inhabitants of the earth.
  '15':
  - type: text
    content: He fashioneth their hearts alike;
  - type: text
    content: He considereth all their works.
  '16':
  - type: text
    content: 'There is no king saved by the multitude of an host:'
  - type: text
    content: A mighty man is not delivered by much strength.
  '17':
  - type: text
    content: 'An horse '
  - type: text
    content: is
  - type: text
    content: ' a vain thing for safety:'
  - type: text
    content: 'Neither shall he deliver '
  - type: text
    content: any
  - type: text
    content: ' by his great strength.'
  '18':
  - type: text
    content: 'Behold, the eye of the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' upon them that fear him,'
  - type: text
    content: Upon them that hope in his mercy;
  '19':
  - type: text
    content: To deliver their soul from death,
  - type: text
    content: And to keep them alive in famine.
  '2':
  - type: text
    content: 'Praise the '
  - type: text
    content: LORD
  - type: text
    content: ' with harp:'
  - type: text
    content: 'Sing unto him with the psaltery '
  - type: text
    content: and
  - type: text
    content: ' an instrument of ten strings.'
  '20':
  - type: text
    content: 'Our soul waiteth for the '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: 'He '
  - type: text
    content: is
  - type: text
    content: ' our help and our shield.'
  '21':
  - type: text
    content: For our heart shall rejoice in him,
  - type: text
    content: Because we have trusted in his holy name.
  '22':
  - type: text
    content: 'Let thy mercy, O '
  - type: text
    content: LORD
  - type: text
    content: ', be upon us,'
  - type: text
    content: According as we hope in thee.
  '3':
  - type: text
    content: Sing unto him a new song;
  - type: text
    content: Play skilfully with a loud noise.
  '4':
  - type: text
    content: 'For the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' right;'
  - type: text
    content: 'And all his works '
  - type: text
    content: are done
  - type: text
    content: ' in truth.'
  '5':
  - type: text
    content: 'He loveth righteousness and judgment:'
  - type: text
    content: 'The earth is full of the goodness of the '
  - type: text
    content: LORD
  - type: text
    content: .
  '6':
  - type: text
    content: 'By the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' were the heavens made;'
  - type: text
    content: And all the host of them by the breath of his mouth.
  '7':
  - type: text
    content: 'He gathereth the waters of the sea together as an heap:'
  - type: text
    content: He layeth up the depth in storehouses.
  '8':
  - type: text
    content: 'Let all the earth fear the '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: Let all the inhabitants of the world stand in awe of him.
  '9':
  - type: text
    content: 'For he spake, and it was '
  - type: text
    content: done
  - type: text
    content: ;
  - type: text
    content: He commanded, and it stood fast.
