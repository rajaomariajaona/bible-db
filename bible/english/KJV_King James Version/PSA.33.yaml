      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rejoice in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', O ye righteous:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: For
  - type: text
    text: ' praise is comely for the upright.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' with harp:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Sing unto him with the psaltery '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' an instrument of ten strings.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Sing unto him a new song;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Play skilfully with a loud noise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' right;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And all his works '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are done
  - type: text
    text: ' in truth.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He loveth righteousness and judgment:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The earth is full of the goodness of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'By the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' were the heavens made;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And all the host of them by the breath of his mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He gathereth the waters of the sea together as an heap:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He layeth up the depth in storehouses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Let all the earth fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ':'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let all the inhabitants of the world stand in awe of him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For he spake, and it was '
  - type: usfm
    marker: add
    children:
    - type: text
      text: done
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: He commanded, and it stood fast.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' bringeth the counsel of the heathen to nought:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He maketh the devices of the people of none effect.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The counsel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' standeth for ever,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The thoughts of his heart to all generations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the nation whose God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' the people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: whom
  - type: text
    text: ' he hath chosen for his own inheritance.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' looketh from heaven; he beholdeth all the sons of men.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: From the place of his habitation he looketh upon all the inhabitants of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He fashioneth their hearts alike;
- type: usfm
  marker: q2
  children:
  - type: text
    text: He considereth all their works.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'There is no king saved by the multitude of an host:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: A mighty man is not delivered by much strength.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'An horse '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a vain thing for safety:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Neither shall he deliver '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' by his great strength.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Behold, the eye of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon them that fear him,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Upon them that hope in his mercy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: To deliver their soul from death,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And to keep them alive in famine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Our soul waiteth for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ':'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' our help and our shield.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: For our heart shall rejoice in him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Because we have trusted in his holy name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Let thy mercy, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', be upon us,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: According as we hope in thee.
