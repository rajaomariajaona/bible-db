document_id: 2CO.2
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Triumph in Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But I determined this with myself, that I would not come again to you in heaviness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For if I make you sorry, who is he then that maketh me glad, but the same which is made sorry by me? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And I wrote this same unto you, lest, when I came, I should have sorrow from them of whom I ought to rejoice; having confidence in you all, that my joy is '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the joy
  - type: text
    text: ' of you all. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For out of much affliction and anguish of heart I wrote unto you with many tears; not that ye should be grieved, but that ye might know the love which I have more abundantly unto you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But if any have caused grief, he hath not grieved me, but in part: that I may not overcharge you all. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Sufficient to such a man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this punishment, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was inflicted
  - type: text
    text: ' of many. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So that contrariwise ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: ought
  - type: text
    text: ' rather to forgive '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', and comfort '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', lest perhaps such a one should be swallowed up with overmuch sorrow. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Wherefore I beseech you that ye would confirm '
  - type: usfm
    marker: add
    children:
    - type: text
      text: your
  - type: text
    text: ' love toward him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For to this end also did I write, that I might know the proof of you, whether ye be obedient in all things. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'To whom ye forgive any thing, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: forgive
  - type: text
    text: ' also: for if I forgave any thing, to whom I forgave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', for your sakes '
  - type: usfm
    marker: add
    children:
    - type: text
      text: forgave I it
  - type: text
    text: ' in the person of Christ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'lest Satan should get an advantage of us: for we are not ignorant of his devices.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Furthermore, when I came to Troas to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: preach
  - type: text
    text: ' Christ''s gospel, and a door was opened unto me of the Lord, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I had no rest in my spirit, because I found not Titus my brother: but taking my leave of them, I went from thence into Macedonia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now thanks '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' unto God, which always causeth us to triumph in Christ, and maketh manifest the savour of his knowledge by us in every place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For we are unto God a sweet savour of Christ, in them that are saved, and in them that perish: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'to the one '
  - type: usfm
    marker: add
    children:
    - type: text
      text: we are
  - type: text
    text: ' the savour of death unto death; and to the other the savour of life unto life. And who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' sufficient for these things? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For we are not as many, which corrupt the word of God: but as of sincerity, but as of God, in the sight of God speak we in Christ.'
