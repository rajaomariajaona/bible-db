verses:
  '1':
  - type: heading
    content: Triumph in Christ
  - type: text
    content: 'But I determined this with myself, that I would not come again to you in heaviness. '
  '10':
  - type: text
    content: 'To whom ye forgive any thing, I '
  - type: text
    content: forgive
  - type: text
    content: ' also: for if I forgave any thing, to whom I forgave '
  - type: text
    content: it
  - type: text
    content: ', for your sakes '
  - type: text
    content: forgave I it
  - type: text
    content: ' in the person of Christ; '
  '11':
  - type: text
    content: 'lest Satan should get an advantage of us: for we are not ignorant of his devices.'
  '12':
  - type: text
    content: 'Furthermore, when I came to Troas to '
  - type: text
    content: preach
  - type: text
    content: ' Christ''s gospel, and a door was opened unto me of the Lord, '
  '13':
  - type: text
    content: 'I had no rest in my spirit, because I found not Titus my brother: but taking my leave of them, I went from thence into Macedonia. '
  '14':
  - type: text
    content: 'Now thanks '
  - type: text
    content: be
  - type: text
    content: ' unto God, which always causeth us to triumph in Christ, and maketh manifest the savour of his knowledge by us in every place.'
  '15':
  - type: text
    content: 'For we are unto God a sweet savour of Christ, in them that are saved, and in them that perish: '
  '16':
  - type: text
    content: 'to the one '
  - type: text
    content: we are
  - type: text
    content: ' the savour of death unto death; and to the other the savour of life unto life. And who '
  - type: text
    content: is
  - type: text
    content: ' sufficient for these things? '
  '17':
  - type: text
    content: 'For we are not as many, which corrupt the word of God: but as of sincerity, but as of God, in the sight of God speak we in Christ.'
  '2':
  - type: text
    content: 'For if I make you sorry, who is he then that maketh me glad, but the same which is made sorry by me? '
  '3':
  - type: text
    content: 'And I wrote this same unto you, lest, when I came, I should have sorrow from them of whom I ought to rejoice; having confidence in you all, that my joy is '
  - type: text
    content: the joy
  - type: text
    content: ' of you all. '
  '4':
  - type: text
    content: For out of much affliction and anguish of heart I wrote unto you with many tears; not that ye should be grieved, but that ye might know the love which I have more abundantly unto you.
  '5':
  - type: text
    content: 'But if any have caused grief, he hath not grieved me, but in part: that I may not overcharge you all. '
  '6':
  - type: text
    content: 'Sufficient to such a man '
  - type: text
    content: is
  - type: text
    content: ' this punishment, which '
  - type: text
    content: was inflicted
  - type: text
    content: ' of many. '
  '7':
  - type: text
    content: 'So that contrariwise ye '
  - type: text
    content: ought
  - type: text
    content: ' rather to forgive '
  - type: text
    content: him
  - type: text
    content: ', and comfort '
  - type: text
    content: him
  - type: text
    content: ', lest perhaps such a one should be swallowed up with overmuch sorrow. '
  '8':
  - type: text
    content: 'Wherefore I beseech you that ye would confirm '
  - type: text
    content: your
  - type: text
    content: ' love toward him. '
  '9':
  - type: text
    content: 'For to this end also did I write, that I might know the proof of you, whether ye be obedient in all things. '
