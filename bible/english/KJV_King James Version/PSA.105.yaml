document_id: PSA.105,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'O give thanks unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; call upon his name:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Make known his deeds among the people.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: And confirmed the same unto Jacob for a law,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' to Israel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' an everlasting covenant:'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Saying, Unto thee will I give the land of Canaan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The lot of your inheritance:'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'When they were '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' a few men in number;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yea, very few, and strangers in it.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: When they went from one nation to another,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'From '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' kingdom to another people;'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'He suffered no man to do them wrong:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yea, he reproved kings for their sakes;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Saying
    - type: text
      text: ', Touch not mine anointed,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And do my prophets no harm.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Moreover he called for a famine upon the land:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He brake the whole staff of bread.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: He sent a man before them,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Even
    - type: text
      text: ' Joseph, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: who
    - type: text
      text: ' was sold for a servant:'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Whose feet they hurt with fetters:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He was laid in iron:'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Until the time that his word came:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' tried him.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Sing unto him, sing psalms unto him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Talk ye of all his wondrous works.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: The king sent and loosed him;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Even
    - type: text
      text: ' the ruler of the people, and let him go free.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: He made him lord of his house,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And ruler of all his substance:'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: To bind his princes at his pleasure;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And teach his senators wisdom.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Israel also came into Egypt;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And Jacob sojourned in the land of Ham.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: And he increased his people greatly;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And made them stronger than their enemies.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: He turned their heart to hate his people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To deal subtilly with his servants.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: He sent Moses his servant;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' Aaron whom he had chosen.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: They shewed his signs among them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And wonders in the land of Ham.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: He sent darkness, and made it dark;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they rebelled not against his word.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: He turned their waters into blood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And slew their fish.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Glory ye in his holy name:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Let the heart of them rejoice that seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Their land brought forth frogs in abundance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the chambers of their kings.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: He spake, and there came divers sorts of flies,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' lice in all their coasts.'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: He gave them hail for rain,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' flaming fire in their land.'
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: He smote their vines also and their fig trees;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And brake the trees of their coasts.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: He spake, and the locusts came, and caterpillers, and that without number,
  '35':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: And did eat up all the herbs in their land, and devoured the fruit of their ground.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: He smote also all the firstborn in their land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The chief of all their strength.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'He brought them forth also with silver and gold:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' not one feeble '
    - type: usfm
      marker: add
      children:
      - type: text
        text: person
    - type: text
      text: ' among their tribes.'
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Egypt was glad when they departed:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For the fear of them fell upon them.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: He spread a cloud for a covering;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And fire to give light in the night.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and his strength:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Seek his face evermore.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: The people
    - type: text
      text: ' asked, and he brought quails,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And satisfied them with the bread of heaven.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: He opened the rock, and the waters gushed out;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They ran in the dry places '
    - type: usfm
      marker: add
      children:
      - type: text
        text: like
    - type: text
      text: ' a river.'
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: For he remembered his holy promise,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' Abraham his servant.'
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: And he brought forth his people with joy,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' his chosen with gladness:'
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'And gave them the lands of the heathen:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they inherited the labour of the people;
  '45':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: That they might observe his statutes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And keep his laws.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: 'Praise ye the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Remember his marvellous works that he hath done;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His wonders, and the judgments of his mouth;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: O ye seed of Abraham his servant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Ye children of Jacob his chosen.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'He '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'His judgments '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in all the earth.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: He hath remembered his covenant for ever,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The word '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' he commanded to a thousand generations.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: covenant
    - type: text
      text: ' he made with Abraham,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his oath unto Isaac;
