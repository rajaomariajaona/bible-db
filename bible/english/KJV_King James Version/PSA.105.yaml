  '1':
  - type: text
    content: 'O give thanks unto the '
  - type: text
    content: LORD
  - type: text
    content: '; call upon his name:'
  - type: text
    content: Make known his deeds among the people.
  '10':
  - type: text
    content: And confirmed the same unto Jacob for a law,
  - type: text
    content: And
  - type: text
    content: ' to Israel '
  - type: text
    content: for
  - type: text
    content: ' an everlasting covenant:'
  '11':
  - type: text
    content: Saying, Unto thee will I give the land of Canaan,
  - type: text
    content: 'The lot of your inheritance:'
  '12':
  - type: text
    content: 'When they were '
  - type: text
    content: but
  - type: text
    content: ' a few men in number;'
  - type: text
    content: Yea, very few, and strangers in it.
  '13':
  - type: text
    content: When they went from one nation to another,
  - type: text
    content: 'From '
  - type: text
    content: one
  - type: text
    content: ' kingdom to another people;'
  '14':
  - type: text
    content: 'He suffered no man to do them wrong:'
  - type: text
    content: Yea, he reproved kings for their sakes;
  '15':
  - type: text
    content: ' '
  - type: text
    content: Saying
  - type: text
    content: ', Touch not mine anointed,'
  - type: text
    content: And do my prophets no harm.
  '16':
  - type: text
    content: 'Moreover he called for a famine upon the land:'
  - type: text
    content: He brake the whole staff of bread.
  '17':
  - type: text
    content: He sent a man before them,
  - type: text
    content: Even
  - type: text
    content: ' Joseph, '
  - type: text
    content: who
  - type: text
    content: ' was sold for a servant:'
  '18':
  - type: text
    content: 'Whose feet they hurt with fetters:'
  - type: text
    content: 'He was laid in iron:'
  '19':
  - type: text
    content: 'Until the time that his word came:'
  - type: text
    content: 'The word of the '
  - type: text
    content: LORD
  - type: text
    content: ' tried him.'
  '2':
  - type: text
    content: 'Sing unto him, sing psalms unto him:'
  - type: text
    content: Talk ye of all his wondrous works.
  '20':
  - type: text
    content: The king sent and loosed him;
  - type: text
    content: Even
  - type: text
    content: ' the ruler of the people, and let him go free.'
  '21':
  - type: text
    content: He made him lord of his house,
  - type: text
    content: 'And ruler of all his substance:'
  '22':
  - type: text
    content: To bind his princes at his pleasure;
  - type: text
    content: And teach his senators wisdom.
  '23':
  - type: text
    content: Israel also came into Egypt;
  - type: text
    content: And Jacob sojourned in the land of Ham.
  '24':
  - type: text
    content: And he increased his people greatly;
  - type: text
    content: And made them stronger than their enemies.
  '25':
  - type: text
    content: He turned their heart to hate his people,
  - type: text
    content: To deal subtilly with his servants.
  '26':
  - type: text
    content: He sent Moses his servant;
  - type: text
    content: And
  - type: text
    content: ' Aaron whom he had chosen.'
  '27':
  - type: text
    content: They shewed his signs among them,
  - type: text
    content: And wonders in the land of Ham.
  '28':
  - type: text
    content: He sent darkness, and made it dark;
  - type: text
    content: And they rebelled not against his word.
  '29':
  - type: text
    content: He turned their waters into blood,
  - type: text
    content: And slew their fish.
  '3':
  - type: text
    content: 'Glory ye in his holy name:'
  - type: text
    content: 'Let the heart of them rejoice that seek the '
  - type: text
    content: LORD
  - type: text
    content: .
  '30':
  - type: text
    content: Their land brought forth frogs in abundance,
  - type: text
    content: In the chambers of their kings.
  '31':
  - type: text
    content: He spake, and there came divers sorts of flies,
  - type: text
    content: And
  - type: text
    content: ' lice in all their coasts.'
  '32':
  - type: text
    content: He gave them hail for rain,
  - type: text
    content: And
  - type: text
    content: ' flaming fire in their land.'
  '33':
  - type: text
    content: He smote their vines also and their fig trees;
  - type: text
    content: And brake the trees of their coasts.
  '34':
  - type: text
    content: He spake, and the locusts came, and caterpillers, and that without number,
  '35':
  - type: text
    content: And did eat up all the herbs in their land, and devoured the fruit of their ground.
  '36':
  - type: text
    content: He smote also all the firstborn in their land,
  - type: text
    content: The chief of all their strength.
  '37':
  - type: text
    content: 'He brought them forth also with silver and gold:'
  - type: text
    content: 'And '
  - type: text
    content: there was
  - type: text
    content: ' not one feeble '
  - type: text
    content: person
  - type: text
    content: ' among their tribes.'
  '38':
  - type: text
    content: 'Egypt was glad when they departed:'
  - type: text
    content: For the fear of them fell upon them.
  '39':
  - type: text
    content: He spread a cloud for a covering;
  - type: text
    content: And fire to give light in the night.
  '4':
  - type: text
    content: 'Seek the '
  - type: text
    content: LORD
  - type: text
    content: ', and his strength:'
  - type: text
    content: Seek his face evermore.
  '40':
  - type: text
    content: ' '
  - type: text
    content: The people
  - type: text
    content: ' asked, and he brought quails,'
  - type: text
    content: And satisfied them with the bread of heaven.
  '41':
  - type: text
    content: He opened the rock, and the waters gushed out;
  - type: text
    content: 'They ran in the dry places '
  - type: text
    content: like
  - type: text
    content: ' a river.'
  '42':
  - type: text
    content: For he remembered his holy promise,
  - type: text
    content: And
  - type: text
    content: ' Abraham his servant.'
  '43':
  - type: text
    content: And he brought forth his people with joy,
  - type: text
    content: And
  - type: text
    content: ' his chosen with gladness:'
  '44':
  - type: text
    content: 'And gave them the lands of the heathen:'
  - type: text
    content: And they inherited the labour of the people;
  '45':
  - type: text
    content: That they might observe his statutes,
  - type: text
    content: And keep his laws.
  - type: text
    content: 'Praise ye the '
  - type: text
    content: LORD
  - type: text
    content: .
  '5':
  - type: text
    content: Remember his marvellous works that he hath done;
  - type: text
    content: His wonders, and the judgments of his mouth;
  '6':
  - type: text
    content: O ye seed of Abraham his servant,
  - type: text
    content: Ye children of Jacob his chosen.
  '7':
  - type: text
    content: 'He '
  - type: text
    content: is
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' our God:'
  - type: text
    content: 'His judgments '
  - type: text
    content: are
  - type: text
    content: ' in all the earth.'
  '8':
  - type: text
    content: He hath remembered his covenant for ever,
  - type: text
    content: 'The word '
  - type: text
    content: which
  - type: text
    content: ' he commanded to a thousand generations.'
  '9':
  - type: text
    content: 'Which '
  - type: text
    content: covenant
  - type: text
    content: ' he made with Abraham,'
  - type: text
