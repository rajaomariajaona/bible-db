document_id: LAM.5,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Remember, O '
  - type: text
    content: LORD
  - type: text
    content: ', what is come upon us:'
  - type: text
    content: Consider, and behold our reproach.
  '10':
  - type: text
    content: Our skin was black like an oven
  - type: text
    content: Because of the terrible famine.
  '11':
  - type: text
    content: They ravished the women in Zion,
  - type: text
    content: And
  - type: text
    content: ' the maids in the cities of Judah.'
  '12':
  - type: text
    content: 'Princes are hanged up by their hand:'
  - type: text
    content: The faces of elders were not honoured.
  '13':
  - type: text
    content: They took the young men to grind,
  - type: text
    content: And the children fell under the wood.
  '14':
  - type: text
    content: The elders have ceased from the gate,
  - type: text
    content: The young men from their musick.
  '15':
  - type: text
    content: The joy of our heart is ceased;
  - type: text
    content: Our dance is turned into mourning.
  '16':
  - type: text
    content: 'The crown is fallen '
  - type: text
    content: from
  - type: text
    content: ' our head:'
  - type: text
    content: Woe unto us, that we have sinned!
  '17':
  - type: text
    content: For this our heart is faint;
  - type: text
    content: 'For these '
  - type: text
    content: things
  - type: text
    content: ' our eyes are dim.'
  '18':
  - type: text
    content: Because of the mountain of Zion, which is desolate,
  - type: text
    content: The foxes walk upon it.
  '19':
  - type: text
    content: 'Thou, O '
  - type: text
    content: LORD
  - type: text
    content: ', remainest for ever;'
  - type: text
    content: Thy throne from generation to generation.
  '2':
  - type: text
    content: Our inheritance is turned to strangers,
  - type: text
    content: Our houses to aliens.
  '20':
  - type: text
    content: Wherefore dost thou forget us for ever,
  - type: text
    content: And
  - type: text
    content: ' forsake us so long time?'
  '21':
  - type: text
    content: 'Turn thou us unto thee, O '
  - type: text
    content: LORD
  - type: text
    content: ', and we shall be turned;'
  - type: text
    content: Renew our days as of old.
  '22':
  - type: text
    content: But thou hast utterly rejected us;
  - type: text
    content: Thou art very wroth against us.
  '3':
  - type: text
    content: We are orphans and fatherless,
  - type: text
    content: 'Our mothers '
  - type: text
    content: are
  - type: text
    content: ' as widows.'
  '4':
  - type: text
    content: We have drunken our water for money;
  - type: text
    content: Our wood is sold unto us.
  '5':
  - type: text
    content: 'Our necks '
  - type: text
    content: are
  - type: text
    content: ' under persecution:'
  - type: text
    content: 'We labour, '
  - type: text
    content: and
  - type: text
    content: ' have no rest.'
  '6':
  - type: text
    content: 'We have given the hand '
  - type: text
    content: to
  - type: text
    content: ' the Egyptians,'
  - type: text
    content: And to
  - type: text
    content: ' the Assyrians, to be satisfied with bread.'
  '7':
  - type: text
    content: 'Our fathers have sinned, and '
  - type: text
    content: are
  - type: text
    content: ' not;'
  - type: text
    content: And we have borne their iniquities.
  '8':
  - type: text
    content: 'Servants have ruled over us:'
  - type: text
    content: There is
  - type: text
    content: ' none that doth deliver '
  - type: text
    content: us
  - type: text
    content: ' out of their hand.'
  '9':
  - type: text
    content: 'We gat our bread with '
  - type: text
    content: the peril of
  - type: text
    content: ' our lives'
  - type: text
    content: Because of the sword of the wilderness.
