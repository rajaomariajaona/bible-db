document_id: LAM.5
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Remember, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', what is come upon us:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Consider, and behold our reproach.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Our inheritance is turned to strangers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Our houses to aliens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: We are orphans and fatherless,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Our mothers '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' as widows.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: We have drunken our water for money;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Our wood is sold unto us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Our necks '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' under persecution:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'We labour, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' have no rest.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'We have given the hand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to
  - type: text
    text: ' the Egyptians,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And to
  - type: text
    text: ' the Assyrians, to be satisfied with bread.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Our fathers have sinned, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' not;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And we have borne their iniquities.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Servants have ruled over us:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' none that doth deliver '
  - type: usfm
    marker: add
    children:
    - type: text
      text: us
  - type: text
    text: ' out of their hand.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'We gat our bread with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the peril of
  - type: text
    text: ' our lives'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Because of the sword of the wilderness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Our skin was black like an oven
- type: usfm
  marker: q2
  children:
  - type: text
    text: Because of the terrible famine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They ravished the women in Zion,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' the maids in the cities of Judah.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Princes are hanged up by their hand:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The faces of elders were not honoured.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They took the young men to grind,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the children fell under the wood.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The elders have ceased from the gate,
- type: usfm
  marker: q2
  children:
  - type: text
    text: The young men from their musick.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The joy of our heart is ceased;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Our dance is turned into mourning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The crown is fallen '
  - type: usfm
    marker: add
    children:
    - type: text
      text: from
  - type: text
    text: ' our head:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Woe unto us, that we have sinned!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For this our heart is faint;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' our eyes are dim.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Because of the mountain of Zion, which is desolate,
- type: usfm
  marker: q2
  children:
  - type: text
    text: The foxes walk upon it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Thou, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', remainest for ever;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thy throne from generation to generation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Wherefore dost thou forget us for ever,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' forsake us so long time?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Turn thou us unto thee, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and we shall be turned;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Renew our days as of old.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: But thou hast utterly rejected us;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou art very wroth against us.
