document_id: 1KI.2,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: David's Charge to Solomon
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the days of David drew nigh that he should die; and he charged Solomon his son, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David slept with his fathers, and was buried in the city of David. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the days that David reigned over Israel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' forty years: seven years reigned he in Hebron, and thirty and three years reigned he in Jerusalem. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then sat Solomon upon the throne of David his father; and his kingdom was established greatly.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Adonijah the son of Haggith came to Bath-sheba the mother of Solomon. And she said, Comest thou peaceably? And he said, Peaceably. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said moreover, I have somewhat to say unto thee. And she said, Say on. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, Thou knowest that the kingdom was mine, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' all Israel set their faces on me, that I should reign: howbeit the kingdom is turned about, and is become my brother''s: for it was his from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now I ask one petition of thee, deny me not. And she said unto him, Say on. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, Speak, I pray thee, unto Solomon the king, (for he will not say thee nay,) that he give me Abishag the Shunammite to wife. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Bath-sheba said, Well; I will speak for thee unto the king.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bath-sheba therefore went unto king Solomon, to speak unto him for Adonijah. And the king rose up to meet her, and bowed himself unto her, and sat down on his throne, and caused a seat to be set for the king''s mother; and she sat on his right hand. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I go the way of all the earth: be thou strong therefore, and shew thyself a man; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then she said, I desire one small petition of thee; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: I pray thee
    - type: text
      text: ', say me not nay. And the king said unto her, Ask on, my mother: for I will not say thee nay. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And she said, Let Abishag the Shunammite be given to Adonijah thy brother to wife. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And king Solomon answered and said unto his mother, And why dost thou ask Abishag the Shunammite for Adonijah? ask for him the kingdom also; for he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' mine elder brother; even for him, and for Abiathar the priest, and for Joab the son of Zeruiah. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then king Solomon sware by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', saying, God do so to me, and more also, if Adonijah have not spoken this word against his own life. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' liveth, which hath established me, and set me on the throne of David my father, and who hath made me an house, as he promised, Adonijah shall be put to death this day. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And king Solomon sent by the hand of Benaiah the son of Jehoiada; and he fell upon him that he died.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And unto Abiathar the priest said the king, Get thee to Anathoth, unto thine own fields; for thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' worthy of death: but I will not at this time put thee to death, because thou barest the ark of the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ' before David my father, and because thou hast been afflicted in all wherein my father was afflicted. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Solomon thrust out Abiathar from being priest unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; that he might fulfil the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', which he spake concerning the house of Eli in Shiloh.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then tidings came to Joab: for Joab had turned after Adonijah, though he turned not after Absalom. And Joab fled unto the tabernacle of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and caught hold on the horns of the altar. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it was told king Solomon that Joab was fled unto the tabernacle of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; and, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he is
    - type: text
      text: ' by the altar. Then Solomon sent Benaiah the son of Jehoiada, saying, Go, fall upon him. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and keep the charge of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God, to walk in his ways, to keep his statutes, and his commandments, and his judgments, and his testimonies, as it is written in the law of Moses, that thou mayest prosper in all that thou doest, and whithersoever thou turnest thyself: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Benaiah came to the tabernacle of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and said unto him, Thus saith the king, Come forth. And he said, Nay; but I will die here. And Benaiah brought the king word again, saying, Thus said Joab, and thus he answered me. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king said unto him, Do as he hath said, and fall upon him, and bury him; that thou mayest take away the innocent blood, which Joab shed, from me, and from the house of my father. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall return his blood upon his own head, who fell upon two men more righteous and better than he, and slew them with the sword, my father David not knowing '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thereof, to wit
    - type: text
      text: ', Abner the son of Ner, captain of the host of Israel, and Amasa the son of Jether, captain of the host of Judah. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Their blood shall therefore return upon the head of Joab, and upon the head of his seed for ever: but upon David, and upon his seed, and upon his house, and upon his throne, shall there be peace for ever from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Benaiah the son of Jehoiada went up, and fell upon him, and slew him: and he was buried in his own house in the wilderness. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king put Benaiah the son of Jehoiada in his room over the host: and Zadok the priest did the king put in the room of Abiathar.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king sent and called for Shimei, and said unto him, Build thee an house in Jerusalem, and dwell there, and go not forth thence any whither. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For it shall be, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' on the day thou goest out, and passest over the brook Kidron, thou shalt know for certain that thou shalt surely die: thy blood shall be upon thine own head. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Shimei said unto the king, The saying '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' good: as my lord the king hath said, so will thy servant do. And Shimei dwelt in Jerusalem many days.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass at the end of three years, that two of the servants of Shimei ran away unto Achish son of Maachah king of Gath. And they told Shimei, saying, Behold, thy servants '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' in Gath. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' may continue his word which he spake concerning me, saying, If thy children take heed to their way, to walk before me in truth with all their heart and with all their soul, there shall not fail thee (said he) a man on the throne of Israel. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Shimei arose, and saddled his ass, and went to Gath to Achish to seek his servants: and Shimei went, and brought his servants from Gath. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it was told Solomon that Shimei had gone from Jerusalem to Gath, and was come again. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king sent and called for Shimei, and said unto him, Did I not make thee to swear by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and protested unto thee, saying, Know for a certain, on the day thou goest out, and walkest abroad any whither, that thou shalt surely die? and thou saidst unto me, The word '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' I have heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' good. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Why then hast thou not kept the oath of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and the commandment that I have charged thee with? '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The king said moreover to Shimei, Thou knowest all the wickedness which thine heart is privy to, that thou didst to David my father: therefore the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall return thy wickedness upon thine own head; '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and king Solomon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' blessed, and the throne of David shall be established before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' for ever. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the king commanded Benaiah the son of Jehoiada; which went out, and fell upon him, that he died. And the kingdom was established in the hand of Solomon.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover thou knowest also what Joab the son of Zeruiah did to me, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' what he did to the two captains of the hosts of Israel, unto Abner the son of Ner, and unto Amasa the son of Jether, whom he slew, and shed the blood of war in peace, and put the blood of war upon his girdle that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' about his loins, and in his shoes that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' on his feet. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do therefore according to thy wisdom, and let not his hoar head go down to the grave in peace. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But shew kindness unto the sons of Barzillai the Gileadite, and let them be of those that eat at thy table: for so they came to me when I fled because of Absalom thy brother. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thou hast
    - type: text
      text: ' with thee Shimei the son of Gera, a Benjamite of Bahurim, which cursed me with a grievous curse in the day when I went to Mahanaim: but he came down to meet me at Jordan, and I sware to him by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', saying, I will not put thee to death with the sword. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore hold him not guiltless: for thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' a wise man, and knowest what thou oughtest to do unto him; but his hoar head bring thou down to the grave with blood.'
