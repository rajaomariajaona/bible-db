type_code: eng
verses:
  '1':
  - type: text
    content: When thou sittest to eat with a ruler,
  - type: text
    content: 'Consider diligently what '
  - type: text
    content: is
  - type: text
    content: ' before thee:'
  '10':
  - type: text
    content: Remove not the old landmark;
  - type: text
    content: 'And enter not into the fields of the fatherless:'
  '11':
  - type: text
    content: 'For their redeemer '
  - type: text
    content: is
  - type: text
    content: ' mighty;'
  - type: text
    content: He shall plead their cause with thee.
  '12':
  - type: text
    content: Apply thine heart unto instruction,
  - type: text
    content: And thine ears to the words of knowledge.
  '13':
  - type: text
    content: 'Withhold not correction from the child:'
  - type: text
    content: 'For '
  - type: text
    content: if
  - type: text
    content: ' thou beatest him with the rod, he shall not die.'
  '14':
  - type: text
    content: Thou shalt beat him with the rod,
  - type: text
    content: And shalt deliver his soul from hell.
  '15':
  - type: text
    content: My son, if thine heart be wise,
  - type: text
    content: My heart shall rejoice, even mine.
  '16':
  - type: text
    content: Yea, my reins shall rejoice,
  - type: text
    content: When thy lips speak right things.
  '17':
  - type: text
    content: 'Let not thine heart envy sinners:'
  - type: text
    content: 'But '
  - type: text
    content: be thou
  - type: text
    content: ' in the fear of the '
  - type: text
    content: LORD
  - type: text
    content: ' all the day long.'
  '18':
  - type: text
    content: For surely there is an end;
  - type: text
    content: And thine expectation shall not be cut off.
  '19':
  - type: text
    content: Hear thou, my son, and be wise,
  - type: text
    content: And guide thine heart in the way.
  '2':
  - type: text
    content: And put a knife to thy throat,
  - type: text
    content: 'If thou '
  - type: text
    content: be
  - type: text
    content: ' a man given to appetite.'
  '20':
  - type: text
    content: Be not among winebibbers;
  - type: text
    content: 'Among riotous eaters of flesh:'
  '21':
  - type: text
    content: 'For the drunkard and the glutton shall come to poverty:'
  - type: text
    content: 'And drowsiness shall clothe '
  - type: text
    content: a man
  - type: text
    content: ' with rags.'
  '22':
  - type: text
    content: Hearken unto thy father that begat thee,
  - type: text
    content: And despise not thy mother when she is old.
  '23':
  - type: text
    content: 'Buy the truth, and sell '
  - type: text
    content: it
  - type: text
    content: ' not;'
  - type: text
    content: Also
  - type: text
    content: ' wisdom, and instruction, and understanding.'
  '24':
  - type: text
    content: 'The father of the righteous shall greatly rejoice:'
  - type: text
    content: 'And he that begetteth a wise '
  - type: text
    content: child
  - type: text
    content: ' shall have joy of him.'
  '25':
  - type: text
    content: Thy father and thy mother shall be glad,
  - type: text
    content: And she that bare thee shall rejoice.
  '26':
  - type: text
    content: My son, give me thine heart,
  - type: text
    content: And let thine eyes observe my ways.
  '27':
  - type: text
    content: 'For a whore '
  - type: text
    content: is
  - type: text
    content: ' a deep ditch;'
  - type: text
    content: 'And a strange woman '
  - type: text
    content: is
  - type: text
    content: ' a narrow pit.'
  '28':
  - type: text
    content: 'She also lieth in wait as '
  - type: text
    content: for
  - type: text
    content: ' a prey,'
  - type: text
    content: And increaseth the transgressors among men.
  '29':
  - type: text
    content: Who hath woe? Who hath sorrow?
  - type: text
    content: Who hath contentions? Who hath babbling?
  - type: text
    content: Who hath wounds without cause?
  - type: text
    content: Who hath redness of eyes?
  '3':
  - type: text
    content: 'Be not desirous of his dainties:'
  - type: text
    content: 'For they '
  - type: text
    content: are
  - type: text
    content: ' deceitful meat.'
  '30':
  - type: text
    content: They that tarry long at the wine;
  - type: text
    content: They that go to seek mixed wine.
  '31':
  - type: text
    content: Look not thou upon the wine when it is red,
  - type: text
    content: When it giveth his colour in the cup,
  - type: text
    content: When
  - type: text
    content: ' it moveth itself aright.'
  '32':
  - type: text
    content: At the last it biteth like a serpent,
  - type: text
    content: And stingeth like an adder.
  '33':
  - type: text
    content: Thine eyes shall behold strange women,
  - type: text
    content: And thine heart shall utter perverse things.
  '34':
  - type: text
    content: Yea, thou shalt be as he that lieth down in the midst of the sea,
  - type: text
    content: Or as he that lieth upon the top of a mast.
  '35':
  - type: text
    content: 'They have stricken me, '
  - type: text
    content: shalt thou say, and
  - type: text
    content: ' I was not sick;'
  - type: text
    content: 'They have beaten me, '
  - type: text
    content: and
  - type: text
    content: ' I felt '
  - type: text
    content: it
  - type: text
    content: ' not:'
  - type: text
    content: When shall I awake?
  - type: text
    content: I will seek it yet again.
  '4':
  - type: text
    content: 'Labour not to be rich:'
  - type: text
    content: Cease from thine own wisdom.
  '5':
  - type: text
    content: Wilt thou set thine eyes upon that which is not?
  - type: text
    content: 'For '
  - type: text
    content: riches
  - type: text
    content: ' certainly make themselves wings;'
  - type: text
    content: They fly away as an eagle toward heaven.
  '6':
  - type: text
    content: 'Eat thou not the bread of '
  - type: text
    content: him that hath
  - type: text
    content: ' an evil eye,'
  - type: text
    content: 'Neither desire thou his dainty meats:'
  '7':
  - type: text
    content: 'For as he thinketh in his heart, so '
  - type: text
    content: is
  - type: text
    content: ' he:'
  - type: text
    content: Eat and drink, saith he to thee;
  - type: text
    content: 'But his heart '
  - type: text
    content: is
  - type: text
    content: ' not with thee.'
  '8':
  - type: text
    content: 'The morsel '
  - type: text
    content: which
  - type: text
    content: ' thou hast eaten shalt thou vomit up,'
  - type: text
    content: And lose thy sweet words.
  '9':
  - type: text
    content: 'Speak not in the ears of a fool:'
  - type: text
    content: For he will despise the wisdom of thy words.
