document_id: PRO.23
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: When thou sittest to eat with a ruler,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Consider diligently what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' before thee:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: And put a knife to thy throat,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'If thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' a man given to appetite.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Be not desirous of his dainties:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' deceitful meat.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Labour not to be rich:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Cease from thine own wisdom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Wilt thou set thine eyes upon that which is not?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: riches
  - type: text
    text: ' certainly make themselves wings;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They fly away as an eagle toward heaven.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Eat thou not the bread of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him that hath
  - type: text
    text: ' an evil eye,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Neither desire thou his dainty meats:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For as he thinketh in his heart, so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' he:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Eat and drink, saith he to thee;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But his heart '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not with thee.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The morsel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' thou hast eaten shalt thou vomit up,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And lose thy sweet words.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Speak not in the ears of a fool:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: For he will despise the wisdom of thy words.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Remove not the old landmark;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And enter not into the fields of the fatherless:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For their redeemer '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' mighty;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He shall plead their cause with thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Apply thine heart unto instruction,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thine ears to the words of knowledge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Withhold not correction from the child:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: if
  - type: text
    text: ' thou beatest him with the rod, he shall not die.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Thou shalt beat him with the rod,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And shalt deliver his soul from hell.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: My son, if thine heart be wise,
- type: usfm
  marker: q2
  children:
  - type: text
    text: My heart shall rejoice, even mine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Yea, my reins shall rejoice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: When thy lips speak right things.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Let not thine heart envy sinners:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be thou
  - type: text
    text: ' in the fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' all the day long.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: For surely there is an end;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thine expectation shall not be cut off.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Hear thou, my son, and be wise,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And guide thine heart in the way.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Be not among winebibbers;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Among riotous eaters of flesh:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For the drunkard and the glutton shall come to poverty:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And drowsiness shall clothe '
  - type: usfm
    marker: add
    children:
    - type: text
      text: a man
  - type: text
    text: ' with rags.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Hearken unto thy father that begat thee,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And despise not thy mother when she is old.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Buy the truth, and sell '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' not;'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Also
  - type: text
    text: ' wisdom, and instruction, and understanding.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The father of the righteous shall greatly rejoice:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And he that begetteth a wise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: child
  - type: text
    text: ' shall have joy of him.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Thy father and thy mother shall be glad,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And she that bare thee shall rejoice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: My son, give me thine heart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And let thine eyes observe my ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'For a whore '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a deep ditch;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And a strange woman '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a narrow pit.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'She also lieth in wait as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' a prey,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And increaseth the transgressors among men.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Who hath woe? Who hath sorrow?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who hath contentions? Who hath babbling?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who hath wounds without cause?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who hath redness of eyes?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: They that tarry long at the wine;
- type: usfm
  marker: q2
  children:
  - type: text
    text: They that go to seek mixed wine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Look not thou upon the wine when it is red,
- type: usfm
  marker: q2
  children:
  - type: text
    text: When it giveth his colour in the cup,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: When
  - type: text
    text: ' it moveth itself aright.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: At the last it biteth like a serpent,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And stingeth like an adder.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Thine eyes shall behold strange women,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thine heart shall utter perverse things.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Yea, thou shalt be as he that lieth down in the midst of the sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or as he that lieth upon the top of a mast.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'They have stricken me, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shalt thou say, and
  - type: text
    text: ' I was not sick;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They have beaten me, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' I felt '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' not:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: When shall I awake?
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will seek it yet again.
