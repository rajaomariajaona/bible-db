  - type: text
    content: both
  - type: text
    content: ' of men and of beasts. '
  '12':
  - type: text
    content: 'And they brought the captives, and the prey, and the spoil, unto Moses, and Eleazar the priest, and unto the congregation of the children of Israel, unto the camp at the plains of Moab, which '
  - type: text
    content: are
  - type: text
    content: ' by Jordan '
  - type: text
    content: near
  - type: text
    content: ' Jericho.'
  '13':
  - type: text
    content: 'And Moses, and Eleazar the priest, and all the princes of the congregation, went forth to meet them without the camp. '
  '14':
  - type: text
    content: 'And Moses was wroth with the officers of the host, '
  - type: text
    content: with
  - type: text
    content: ' the captains over thousands, and captains over hundreds, which came from the battle. '
  '15':
  - type: text
    content: 'And Moses said unto them, Have ye saved all the women alive? '
  '16':
  - type: text
    content: 'Behold, these caused the children of Israel, through the counsel of Balaam, to commit trespass against the '
  - type: text
    content: LORD
  - type: text
    content: ' in the matter of Peor, and there was a plague among the congregation of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Now therefore kill every male among the little ones, and kill every woman that hath known man by lying with him. '
  '18':
  - type: text
    content: 'But all the women children, that have not known a man by lying with him, keep alive for yourselves. '
  '19':
  - type: text
    content: 'And do ye abide without the camp seven days: whosoever hath killed any person, and whosoever hath touched any slain, purify '
  - type: text
    content: both
  - type: text
    content: ' yourselves and your captives on the third day, and on the seventh day. '
  '2':
  - type: text
    content: 'Avenge the children of Israel of the Midianites: afterward shalt thou be gathered unto thy people. '
  '20':
  - type: text
    content: 'And purify all '
  - type: text
    content: your
  - type: text
    content: ' raiment, and all that is made of skins, and all work of goats'' '
  - type: text
    content: hair
  - type: text
