document_id: NUM.31
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Spoils of War
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Avenge the children of Israel of the Midianites: afterward shalt thou be gathered unto thy people. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Moses spake unto the people, saying, Arm some of yourselves unto the war, and let them go against the Midianites, and avenge the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of Midian. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Of every tribe a thousand, throughout all the tribes of Israel, shall ye send to the war. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So there were delivered out of the thousands of Israel, a thousand of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: every
  - type: text
    text: ' tribe, twelve thousand armed for war. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Moses sent them to the war, a thousand of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: every
  - type: text
    text: ' tribe, them and Phinehas the son of Eleazar the priest, to the war, with the holy instruments, and the trumpets to blow in his hand. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And they warred against the Midianites, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses; and they slew all the males. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And they slew the kings of Midian, beside the rest of them that were slain; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: namely
  - type: text
    text: ', Evi, and Rekem, and Zur, and Hur, and Reba, five kings of Midian: Balaam also the son of Beor they slew with the sword. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the children of Israel took '
  - type: usfm
    marker: add
    children:
    - type: text
      text: all
  - type: text
    text: ' the women of Midian captives, and their little ones, and took the spoil of all their cattle, and all their flocks, and all their goods. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And they burnt all their cities wherein they dwelt, and all their goodly castles, with fire. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And they took all the spoil, and all the prey, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: both
  - type: text
    text: ' of men and of beasts. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And they brought the captives, and the prey, and the spoil, unto Moses, and Eleazar the priest, and unto the congregation of the children of Israel, unto the camp at the plains of Moab, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' by Jordan '
  - type: usfm
    marker: add
    children:
    - type: text
      text: near
  - type: text
    text: ' Jericho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Moses, and Eleazar the priest, and all the princes of the congregation, went forth to meet them without the camp. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And Moses was wroth with the officers of the host, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' the captains over thousands, and captains over hundreds, which came from the battle. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Moses said unto them, Have ye saved all the women alive? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Behold, these caused the children of Israel, through the counsel of Balaam, to commit trespass against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' in the matter of Peor, and there was a plague among the congregation of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now therefore kill every male among the little ones, and kill every woman that hath known man by lying with him. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But all the women children, that have not known a man by lying with him, keep alive for yourselves. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And do ye abide without the camp seven days: whosoever hath killed any person, and whosoever hath touched any slain, purify '
  - type: usfm
    marker: add
    children:
    - type: text
      text: both
  - type: text
    text: ' yourselves and your captives on the third day, and on the seventh day. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And purify all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: your
  - type: text
    text: ' raiment, and all that is made of skins, and all work of goats'' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hair
  - type: text
    text: ', and all things made of wood.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And Eleazar the priest said unto the men of war which went to the battle, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the ordinance of the law which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'only the gold, and the silver, the brass, the iron, the tin, and the lead, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'every thing that may abide the fire, ye shall make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' go through the fire, and it shall be clean: nevertheless it shall be purified with the water of separation: and all that abideth not the fire ye shall make go through the water. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: And ye shall wash your clothes on the seventh day, and ye shall be clean, and afterward ye shall come into the camp.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Take the sum of the prey that was taken, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: both
  - type: text
    text: ' of man and of beast, thou, and Eleazar the priest, and the chief fathers of the congregation: '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'and divide the prey into two parts; between them that took the war upon them, who went out to battle, and between all the congregation: '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and levy a tribute unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of the men of war which went out to battle: one soul of five hundred, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: both
  - type: text
    text: ' of the persons, and of the beeves, and of the asses, and of the sheep: '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'take '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' of their half, and give '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' unto Eleazar the priest, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' an heave offering of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And of the children of Israel''s half, thou shalt take one portion of fifty, of the persons, of the beeves, of the asses, and of the flocks, of all manner of beasts, and give them unto the Levites, which keep the charge of the tabernacle of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And Moses and Eleazar the priest did as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And the booty, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' the rest of the prey which the men of war had caught, was six hundred thousand and seventy thousand and five thousand sheep, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'and threescore and twelve thousand beeves, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'and threescore and one thousand asses, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'and thirty and two thousand persons in all, of women that had not known man by lying with him. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And the half, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which was
  - type: text
    text: ' the portion of them that went out to war, was in number three hundred thousand and seven and thirty thousand and five hundred sheep: '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s tribute of the sheep was six hundred and threescore and fifteen. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And the beeves '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' thirty and six thousand; of which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s tribute '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' threescore and twelve. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And the asses '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' thirty thousand and five hundred; of which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s tribute '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' threescore and one. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And the persons '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' sixteen thousand; of which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s tribute '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' thirty and two persons. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And Moses gave the tribute, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which was
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s heave offering, unto Eleazar the priest, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And of the children of Israel''s half, which Moses divided from the men that warred, '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: '(now the half '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that pertained unto
  - type: text
    text: ' the congregation was three hundred thousand and thirty thousand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' seven thousand and five hundred sheep, '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'and thirty and six thousand beeves, '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'and thirty thousand asses and five hundred, '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'and sixteen thousand persons;) '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'even of the children of Israel''s half, Moses took one portion of fifty, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: both
  - type: text
    text: ' of man and of beast, and gave them unto the Levites, which kept the charge of the tabernacle of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'And the officers which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' over thousands of the host, the captains of thousands, and captains of hundreds, came near unto Moses: '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'and they said unto Moses, Thy servants have taken the sum of the men of war which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' under our charge, and there lacketh not one man of us. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'We have therefore brought an oblation for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', what every man hath gotten, of jewels of gold, chains, and bracelets, rings, earrings, and tablets, to make an atonement for our souls before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'And Moses and Eleazar the priest took the gold of them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' all wrought jewels. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'And all the gold of the offering that they offered up to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', of the captains of thousands, and of the captains of hundreds, was sixteen thousand seven hundred and fifty shekels. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
