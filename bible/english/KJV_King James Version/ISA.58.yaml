document_id: ISA.58,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Cry aloud, spare not, lift up thy voice like a trumpet, and shew my people their transgression, and the house of Jacob their sins. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: if
    - type: text
      text: ' thou draw out thy soul to the hungry, and satisfy the afflicted soul; then shall thy light rise in obscurity, and thy darkness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' as the noon day: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall guide thee continually, and satisfy thy soul in drought, and make fat thy bones: and thou shalt be like a watered garden, and like a spring of water, whose waters fail not. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they that shall be
    - type: text
      text: ' of thee shall build the old waste places: thou shalt raise up the foundations of many generations; and thou shalt be called, The repairer of the breach, The restorer of paths to dwell in.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'If thou turn away thy foot from the sabbath, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from
    - type: text
      text: ' doing thy pleasure on my holy day; and call the sabbath a delight, the holy of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', honourable; and shalt honour him, not doing thine own ways, nor finding thine own pleasure, nor speaking '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thine own
    - type: text
      text: ' words: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'then shalt thou delight thyself in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; and I will cause thee to ride upon the high places of the earth, and feed thee with the heritage of Jacob thy father: for the mouth of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath spoken '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Yet they seek me daily, and delight to know my ways, as a nation that did righteousness, and forsook not the ordinance of their God: they ask of me the ordinances of justice; they take delight in approaching to God. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Wherefore have we fasted, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: say they
    - type: text
      text: ', and thou seest not? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: wherefore
    - type: text
      text: ' have we afflicted our soul, and thou takest no knowledge? Behold, in the day of your fast ye find pleasure, and exact all your labours. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Behold, ye fast for strife and debate, and to smite with the fist of wickedness: ye shall not fast as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ye do this
    - type: text
      text: ' day, to make your voice to be heard on high. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Is it such a fast that I have chosen? a day for a man to afflict his soul? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is it
    - type: text
      text: ' to bow down his head as a bulrush, and to spread sackcloth and ashes '
    - type: usfm
      marker: add
      children:
      - type: text
        text: under him?
    - type: text
      text: ' wilt thou call this a fast, and an acceptable day to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '?'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' not this the fast that I have chosen? to loose the bands of wickedness, to undo the heavy burdens, and to let the oppressed go free, and that ye break every yoke? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is it
    - type: text
      text: ' not to deal thy bread to the hungry, and that thou bring the poor that are cast out to thy house? when thou seest the naked, that thou cover him; and that thou hide not thyself from thine own flesh? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then shall thy light break forth as the morning, and thine health shall spring forth speedily: and thy righteousness shall go before thee; the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall be thy rereward.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then shalt thou call, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall answer; thou shalt cry, and he shall say, Here I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: '. If thou take away from the midst of thee the yoke, the putting forth of the finger, and speaking vanity; '
