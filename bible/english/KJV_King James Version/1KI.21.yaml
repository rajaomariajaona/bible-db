document_id: 1KI.21,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Naboth's Vineyard
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And it came to pass after these things, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' Naboth the Jezreelite had a vineyard, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in Jezreel, hard by the palace of Ahab king of Samaria. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'and set two men, sons of Belial, before him, to bear witness against him, saying, Thou didst blaspheme God and the king. And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: then
    - type: text
      text: ' carry him out, and stone him, that he may die.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And the men of his city, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the elders and the nobles who were the inhabitants in his city, did as Jezebel had sent unto them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' as it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' written in the letters which she had sent unto them. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'They proclaimed a fast, and set Naboth on high among the people. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And there came in two men, children of Belial, and sat before him: and the men of Belial witnessed against him, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' against Naboth, in the presence of the people, saying, Naboth did blaspheme God and the king. Then they carried him forth out of the city, and stoned him with stones, that he died. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then they sent to Jezebel, saying, Naboth is stoned, and is dead. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And it came to pass, when Jezebel heard that Naboth was stoned, and was dead, that Jezebel said to Ahab, Arise, take possession of the vineyard of Naboth the Jezreelite, which he refused to give thee for money: for Naboth is not alive, but dead. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: And it came to pass, when Ahab heard that Naboth was dead, that Ahab rose up to go down to the vineyard of Naboth the Jezreelite, to take possession of it.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Elijah denounces Ahab
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came to Elijah the Tishbite, saying, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Arise, go down to meet Ahab king of Israel, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in Samaria: behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he is
    - type: text
      text: ' in the vineyard of Naboth, whither he is gone down to possess it. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And thou shalt speak unto him, saying, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', Hast thou killed, and also taken possession? And thou shalt speak unto him, saying, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', In the place where dogs licked the blood of Naboth shall dogs lick thy blood, even thine. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And Ahab spake unto Naboth, saying, Give me thy vineyard, that I may have it for a garden of herbs, because it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' near unto my house: and I will give thee for it a better vineyard than it; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: or
    - type: text
      text: ', if it seem good to thee, I will give thee the worth of it in money. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And Ahab said to Elijah, Hast thou found me, O mine enemy? And he answered, I have found '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'thee:'
    - type: text
      text: ' because thou hast sold thyself to work evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Behold, I will bring evil upon thee, and will take away thy posterity, and will cut off from Ahab him that pisseth against the wall, and him that is shut up and left in Israel, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'and will make thine house like the house of Jeroboam the son of Nebat, and like the house of Baasha the son of Ahijah, for the provocation wherewith thou hast provoked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ' to anger, and made Israel to sin. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And of Jezebel also spake the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', saying, The dogs shall eat Jezebel by the wall of Jezreel. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Him that dieth of Ahab in the city the dogs shall eat; and him that dieth in the field shall the fowls of the air eat. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'But there was none like unto Ahab, which did sell himself to work wickedness in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', whom Jezebel his wife stirred up. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And he did very abominably in following idols, according to all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' as did the Amorites, whom the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' cast out before the children of Israel.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And it came to pass, when Ahab heard those words, that he rent his clothes, and put sackcloth upon his flesh, and fasted, and lay in sackcloth, and went softly. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came to Elijah the Tishbite, saying, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Seest thou how Ahab humbleth himself before me? because he humbleth himself before me, I will not bring the evil in his days: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' in his son''s days will I bring the evil upon his house.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And Naboth said to Ahab, The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' forbid it me, that I should give the inheritance of my fathers unto thee. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And Ahab came into his house heavy and displeased because of the word which Naboth the Jezreelite had spoken to him: for he had said, I will not give thee the inheritance of my fathers. And he laid him down upon his bed, and turned away his face, and would eat no bread.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'But Jezebel his wife came to him, and said unto him, Why is thy spirit so sad, that thou eatest no bread? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And he said unto her, Because I spake unto Naboth the Jezreelite, and said unto him, Give me thy vineyard for money; or else, if it please thee, I will give thee '
    - type: usfm
      marker: add
      children:
      - type: text
        text: another
    - type: text
      text: ' vineyard for it: and he answered, I will not give thee my vineyard. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And Jezebel his wife said unto him, Dost thou now govern the kingdom of Israel? arise, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' eat bread, and let thine heart be merry: I will give thee the vineyard of Naboth the Jezreelite. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'So she wrote letters in Ahab''s name, and sealed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' with his seal, and sent the letters unto the elders and to the nobles that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in his city, dwelling with Naboth. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And she wrote in the letters, saying, Proclaim a fast, and set Naboth on high among the people: '
