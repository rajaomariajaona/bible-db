  - type: text
    content: LORD
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Behold, I will bring evil upon thee, and will take away thy posterity, and will cut off from Ahab him that pisseth against the wall, and him that is shut up and left in Israel, '
  '22':
  - type: text
    content: 'and will make thine house like the house of Jeroboam the son of Nebat, and like the house of Baasha the son of Ahijah, for the provocation wherewith thou hast provoked '
  - type: text
    content: me
  - type: text
    content: ' to anger, and made Israel to sin. '
  '23':
  - type: text
    content: 'And of Jezebel also spake the '
  - type: text
    content: LORD
  - type: text
    content: ', saying, The dogs shall eat Jezebel by the wall of Jezreel. '
  '24':
  - type: text
    content: 'Him that dieth of Ahab in the city the dogs shall eat; and him that dieth in the field shall the fowls of the air eat. '
  '25':
  - type: text
    content: 'But there was none like unto Ahab, which did sell himself to work wickedness in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', whom Jezebel his wife stirred up. '
  '26':
  - type: text
    content: 'And he did very abominably in following idols, according to all '
  - type: text
    content: things
  - type: text
    content: ' as did the Amorites, whom the '
  - type: text
    content: LORD
  - type: text
    content: ' cast out before the children of Israel.'
  '27':
  - type: text
    content: 'And it came to pass, when Ahab heard those words, that he rent his clothes, and put sackcloth upon his flesh, and fasted, and lay in sackcloth, and went softly. '
  '28':
  - type: text
    content: 'And the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came to Elijah the Tishbite, saying, '
  '29':
  - type: text
    content: 'Seest thou how Ahab humbleth himself before me? because he humbleth himself before me, I will not bring the evil in his days: '
  - type: text
    content: but
  - type: text
    content: ' in his son''s days will I bring the evil upon his house.'
  '3':
  - type: text
    content: 'And Naboth said to Ahab, The '
  - type: text
    content: LORD
  - type: text
    content: ' forbid it me, that I should give the inheritance of my fathers unto thee. '
  '4':
  - type: text
    content: 'And Ahab came into his house heavy and displeased because of the word which Naboth the Jezreelite had spoken to him: for he had said, I will not give thee the inheritance of my fathers. And he laid him down upon his bed, and turned away his face, and would eat no bread.'
  '5':
  - type: text
    content: 'But Jezebel his wife came to him, and said unto him, Why is thy spirit so sad, that thou eatest no bread? '
  '6':
  - type: text
    content: 'And he said unto her, Because I spake unto Naboth the Jezreelite, and said unto him, Give me thy vineyard for money; or else, if it please thee, I will give thee '
  - type: text
    content: another
  - type: text
    content: ' vineyard for it: and he answered, I will not give thee my vineyard. '
  '7':
  - type: text
    content: 'And Jezebel his wife said unto him, Dost thou now govern the kingdom of Israel? arise, '
  - type: text
    content: and
  - type: text
    content: ' eat bread, and let thine heart be merry: I will give thee the vineyard of Naboth the Jezreelite. '
  '8':
  - type: text
    content: 'So she wrote letters in Ahab''s name, and sealed '
  - type: text
    content: them
  - type: text
    content: ' with his seal, and sent the letters unto the elders and to the nobles that '
  - type: text
    content: were
  - type: text
    content: ' in his city, dwelling with Naboth. '
  '9':
  - type: text
    content: 'And she wrote in the letters, saying, Proclaim a fast, and set Naboth on high among the people: '
