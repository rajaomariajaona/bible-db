    content: 'They proclaimed a fast, and set Naboth on high among the people. '
  '13':
  - type: text
    content: 'And there came in two men, children of Belial, and sat before him: and the men of Belial witnessed against him, '
  - type: text
    content: even
  - type: text
    content: ' against Naboth, in the presence of the people, saying, Naboth did blaspheme God and the king. Then they carried him forth out of the city, and stoned him with stones, that he died. '
  '14':
  - type: text
    content: 'Then they sent to Jezebel, saying, Naboth is stoned, and is dead. '
  '15':
  - type: text
    content: 'And it came to pass, when Jezebel heard that Naboth was stoned, and was dead, that Jezebel said to Ahab, Arise, take possession of the vineyard of Naboth the Jezreelite, which he refused to give thee for money: for Naboth is not alive, but dead. '
  '16':
  - type: text
    content: And it came to pass, when Ahab heard that Naboth was dead, that Ahab rose up to go down to the vineyard of Naboth the Jezreelite, to take possession of it.
  - type: heading
    content: Elijah denounces Ahab
  '17':
  - type: text
    content: 'And the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came to Elijah the Tishbite, saying, '
  '18':
  - type: text
    content: 'Arise, go down to meet Ahab king of Israel, which '
  - type: text
    content: is
  - type: text
    content: ' in Samaria: behold, '
  - type: text
    content: he is
  - type: text
    content: ' in the vineyard of Naboth, whither he is gone down to possess it. '
  '19':
  - type: text
    content: 'And thou shalt speak unto him, saying, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', Hast thou killed, and also taken possession? And thou shalt speak unto him, saying, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', In the place where dogs licked the blood of Naboth shall dogs lick thy blood, even thine. '
  '2':
  - type: text
    content: 'And Ahab spake unto Naboth, saying, Give me thy vineyard, that I may have it for a garden of herbs, because it '
  - type: text
    content: is
  - type: text
    content: ' near unto my house: and I will give thee for it a better vineyard than it; '
  - type: text
    content: or
  - type: text
    content: ', if it seem good to thee, I will give thee the worth of it in money. '
  '20':
  - type: text
    content: 'And Ahab said to Elijah, Hast thou found me, O mine enemy? And he answered, I have found '
  - type: text
    content: 'thee:'
  - type: text
