  - type: text
    content: day
  - type: text
    content: ' of the month, '
  - type: text
    content: that
  - type: text
    content: ' one that had escaped out of Jerusalem came unto me, saying, The city is smitten. '
  '22':
  - type: text
    content: 'Now the hand of the '
  - type: text
    content: LORD
  - type: text
    content: ' was upon me in the evening, afore he that was escaped came; and had opened my mouth, until he came to me in the morning; and my mouth was opened, and I was no more dumb.'
  '23':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came unto me, saying, '
  '24':
  - type: text
    content: 'Son of man, they that inhabit those wastes of the land of Israel speak, saying, Abraham was one, and he inherited the land: but we '
  - type: text
    content: are
  - type: text
    content: ' many; the land is given us for inheritance. '
  '25':
  - type: text
    content: 'Wherefore say unto them, Thus saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: '; Ye eat with the blood, and lift up your eyes toward your idols, and shed blood: and shall ye possess the land? '
  '26':
  - type: text
    content: 'Ye stand upon your sword, ye work abomination, and ye defile every one his neighbour''s wife: and shall ye possess the land? '
  '27':
  - type: text
    content: 'Say thou thus unto them, Thus saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: '; '
  - type: text
    content: As
  - type: text
    content: ' I live, surely they that '
  - type: text
    content: are
  - type: text
    content: ' in the wastes shall fall by the sword, and him that '
  - type: text
    content: is
  - type: text
    content: ' in the open field will I give to the beasts to be devoured, and they that '
  - type: text
    content: be
  - type: text
    content: ' in the forts and in the caves shall die of the pestilence. '
  '28':
  - type: text
    content: 'For I will lay the land most desolate, and the pomp of her strength shall cease; and the mountains of Israel shall be desolate, that none shall pass through. '
  '29':
  - type: text
    content: 'Then shall they know that I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ', when I have laid the land most desolate because of all their abominations which they have committed.'
  '3':
  - type: text
    content: 'if when he seeth the sword come upon the land, he blow the trumpet, and warn the people; '
  '30':
  - type: text
    content: 'Also, thou son of man, the children of thy people still are talking against thee by the walls and in the doors of the houses, and speak one to another, every one to his brother, saying, Come, I pray you, and hear what is the word that cometh forth from the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'And they come unto thee as the people cometh, and they sit before thee '
  - type: text
    content: as
  - type: text
    content: ' my people, and they hear thy words, but they will not do them: for with their mouth they shew much love, '
  - type: text
    content: but
  - type: text
    content: ' their heart goeth after their covetousness. '
  '32':
  - type: text
    content: 'And, lo, thou '
  - type: text
    content: art
  - type: text
    content: ' unto them as a very lovely song of one that hath a pleasant voice, and can play well on an instrument: for they hear thy words, but they do them not. '
  '33':
  - type: text
    content: And when this cometh to pass, (lo, it will come,) then shall they know that a prophet hath been among them.
  '4':
  - type: text
    content: 'then whosoever heareth the sound of the trumpet, and taketh not warning; if the sword come, and take him away, his blood shall be upon his own head. '
  '5':
  - type: text
    content: 'He heard the sound of the trumpet, and took not warning; his blood shall be upon him. But he that taketh warning shall deliver his soul. '
  '6':
  - type: text
    content: 'But if the watchman see the sword come, and blow not the trumpet, and the people be not warned; if the sword come, and take '
  - type: text
    content: any
  - type: text
    content: ' person from among them, he is taken away in his iniquity; but his blood will I require at the watchman''s hand.'
  '7':
  - type: text
    content: 'So thou, O son of man, I have set thee a watchman unto the house of Israel; therefore thou shalt hear the word at my mouth, and warn them from me. '
  '8':
  - type: text
    content: 'When I say unto the wicked, O wicked '
  - type: text
    content: man
  - type: text
    content: ', thou shalt surely die; if thou dost not speak to warn the wicked from his way, that wicked '
  - type: text
    content: man
  - type: text
    content: ' shall die in his iniquity; but his blood will I require at thine hand. '
  '9':
  - type: text
    content: Nevertheless, if thou warn the wicked of his way to turn from it; if he do not turn from his way, he shall die in his iniquity; but thou hast delivered thy soul.
