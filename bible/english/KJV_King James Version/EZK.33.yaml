  '10':
  - type: text
    content: 'Therefore, O thou son of man, speak unto the house of Israel; Thus ye speak, saying, If our transgressions and our sins '
  - type: text
    content: be
  - type: text
    content: ' upon us, and we pine away in them, how should we then live? '
  '11':
  - type: text
    content: 'Say unto them, '
  - type: text
    content: As
  - type: text
    content: ' I live, saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: ', I have no pleasure in the death of the wicked; but that the wicked turn from his way and live: turn ye, turn ye from your evil ways; for why will ye die, O house of Israel?'
  '12':
  - type: text
    content: 'Therefore, thou son of man, say unto the children of thy people, The righteousness of the righteous shall not deliver him in the day of his transgression: as for the wickedness of the wicked, he shall not fall thereby in the day that he turneth from his wickedness; neither shall the righteous be able to live for his '
  - type: text
    content: righteousness
  - type: text
    content: ' in the day that he sinneth.'
  '13':
  - type: text
    content: 'When I shall say to the righteous, '
  - type: text
    content: that
  - type: text
    content: ' he shall surely live; if he trust to his own righteousness, and commit iniquity, all his righteousnesses shall not be remembered; but for his iniquity that he hath committed, he shall die for it. '
  '14':
  - type: text
    content: 'Again, when I say unto the wicked, Thou shalt surely die; if he turn from his sin, and do that which is lawful and right; '
  '15':
  - type: text
    content: if
  - type: text
    content: ' the wicked restore the pledge, give again that he had robbed, walk in the statutes of life, without committing iniquity; he shall surely live, he shall not die. '
  '16':
  - type: text
    content: 'None of his sins that he hath committed shall be mentioned unto him: he hath done that which is lawful and right; he shall surely live.'
  '17':
  - type: text
    content: 'Yet the children of thy people say, The way of the Lord is not equal: but as for them, their way is not equal. '
  '18':
  - type: text
    content: 'When the righteous turneth from his righteousness, and committeth iniquity, he shall even die thereby. '
  '19':
  - type: text
    content: 'But if the wicked turn from his wickedness, and do that which is lawful and right, he shall live thereby. '
  '2':
  - type: text
    content: 'Son of man, speak to the children of thy people, and say unto them, When I bring the sword upon a land, if the people of the land take a man of their coasts, and set him for their watchman: '
  '20':
  - type: text
    content: Yet ye say, The way of the Lord is not equal. O ye house of Israel, I will judge you every one after his ways.
  - type: heading
    content: News of Jerusalem
  '21':
  - type: text
    content: 'And it came to pass in the twelfth year of our captivity, in the tenth '
  - type: text
    content: month
  - type: text
