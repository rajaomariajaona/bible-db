document_id: DEU.19
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Criminal Law
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God hath cut off the nations, whose land the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God giveth thee, and thou succeedest them, and dwellest in their cities, and in their houses; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'thou shalt separate three cities for thee in the midst of thy land, which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God giveth thee to possess it. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Thou shalt prepare thee a way, and divide the coasts of thy land, which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God giveth thee to inherit, into three parts, that every slayer may flee thither.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the case of the slayer, which shall flee thither, that he may live: Whoso killeth his neighbour ignorantly, whom he hated not in time past; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'as when a man goeth into the wood with his neighbour to hew wood, and his hand fetcheth a stroke with the axe to cut down the tree, and the head slippeth from the helve, and lighteth upon his neighbour, that he die; he shall flee unto one of those cities, and live: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'lest the avenger of the blood pursue the slayer, while his heart is hot, and overtake him, because the way is long, and slay him; whereas he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' not worthy of death, inasmuch as he hated him not in time past. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Wherefore I command thee, saying, Thou shalt separate three cities for thee. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And if the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God enlarge thy coast, as he hath sworn unto thy fathers, and give thee all the land which he promised to give unto thy fathers; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'if thou shalt keep all these commandments to do them, which I command thee this day, to love the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, and to walk ever in his ways; then shalt thou add three cities more for thee, beside these three: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'that innocent blood be not shed in thy land, which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God giveth thee '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' an inheritance, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' blood be upon thee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But if any man hate his neighbour, and lie in wait for him, and rise up against him, and smite him mortally that he die, and fleeth into one of these cities: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'then the elders of his city shall send and fetch him thence, and deliver him into the hand of the avenger of blood, that he may die. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Thine eye shall not pity him, but thou shalt put away '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the guilt of
  - type: text
    text: ' innocent blood from Israel, that it may go well with thee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Thou shalt not remove thy neighbour''s landmark, which they of old time have set in thine inheritance, which thou shalt inherit in the land that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God giveth thee to possess it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'One witness shall not rise up against a man for any iniquity, or for any sin, in any sin that he sinneth: at the mouth of two witnesses, or at the mouth of three witnesses, shall the matter be established. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'If a false witness rise up against any man to testify against him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which is
  - type: text
    text: ' wrong; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'then both the men, between whom the controversy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ', shall stand before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', before the priests and the judges, which shall be in those days; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and the judges shall make diligent inquisition: and, behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: if
  - type: text
    text: ' the witness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' a false witness, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' hath testified falsely against his brother; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'then shall ye do unto him, as he had thought to have done unto his brother: so shalt thou put the evil away from among you. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And those which remain shall hear, and fear, and shall henceforth commit no more any such evil among you. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And thine eye shall not pity; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' life '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall go
  - type: text
    text: ' for life, eye for eye, tooth for tooth, hand for hand, foot for foot.'
