document_id: 2CH.12
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Attacked by Egypt
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And it came to pass, when Rehoboam had established the kingdom, and had strengthened himself, he forsook the law of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and all Israel with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And it came to pass, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' in the fifth year of king Rehoboam Shishak king of Egypt came up against Jerusalem, because they had transgressed against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'with twelve hundred chariots, and threescore thousand horsemen: and the people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' without number that came with him out of Egypt; the Lubims, the Sukkiims, and the Ethiopians. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And he took the fenced cities which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: pertained
  - type: text
    text: ' to Judah, and came to Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then came Shemaiah the prophet to Rehoboam, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to
  - type: text
    text: ' the princes of Judah, that were gathered together to Jerusalem because of Shishak, and said unto them, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Ye have forsaken me, and therefore have I also left you in the hand of Shishak. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Whereupon the princes of Israel and the king humbled themselves; and they said, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' righteous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' saw that they humbled themselves, the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came to Shemaiah, saying, They have humbled themselves; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: therefore
  - type: text
    text: ' I will not destroy them, but I will grant them some deliverance; and my wrath shall not be poured out upon Jerusalem by the hand of Shishak. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nevertheless they shall be his servants; that they may know my service, and the service of the kingdoms of the countries.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So Shishak king of Egypt came up against Jerusalem, and took away the treasures of the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and the treasures of the king''s house; he took all: he carried away also the shields of gold which Solomon had made. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Instead of which king Rehoboam made shields of brass, and committed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' to the hands of the chief of the guard, that kept the entrance of the king''s house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And when the king entered into the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the guard came and fetched them, and brought them again into the guard chamber. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And when he humbled himself, the wrath of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' turned from him, that he would not destroy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' altogether: and also in Judah things went well.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So king Rehoboam strengthened himself in Jerusalem, and reigned: for Rehoboam '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' one and forty years old when he began to reign, and he reigned seventeen years in Jerusalem, the city which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had chosen out of all the tribes of Israel, to put his name there. And his mother''s name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Naamah an Ammonitess. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And he did evil, because he prepared not his heart to seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Now the acts of Rehoboam, first and last, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' they not written in the book of Shemaiah the prophet, and of Iddo the seer concerning genealogies? And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there were
  - type: text
    text: ' wars between Rehoboam and Jeroboam continually. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And Rehoboam slept with his fathers, and was buried in the city of David: and Abijah his son reigned in his stead.'
