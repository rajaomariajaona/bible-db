verses:
  '1':
  - type: heading
    content: Attacked by Egypt
  - type: text
    content: 'And it came to pass, when Rehoboam had established the kingdom, and had strengthened himself, he forsook the law of the '
  - type: text
    content: LORD
  - type: text
    content: ', and all Israel with him. '
  '10':
  - type: text
    content: 'Instead of which king Rehoboam made shields of brass, and committed '
  - type: text
    content: them
  - type: text
    content: ' to the hands of the chief of the guard, that kept the entrance of the king''s house. '
  '11':
  - type: text
    content: 'And when the king entered into the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', the guard came and fetched them, and brought them again into the guard chamber. '
  '12':
  - type: text
    content: 'And when he humbled himself, the wrath of the '
  - type: text
    content: LORD
  - type: text
    content: ' turned from him, that he would not destroy '
  - type: text
    content: him
  - type: text
    content: ' altogether: and also in Judah things went well.'
  '13':
  - type: text
    content: 'So king Rehoboam strengthened himself in Jerusalem, and reigned: for Rehoboam '
  - type: text
    content: was
  - type: text
    content: ' one and forty years old when he began to reign, and he reigned seventeen years in Jerusalem, the city which the '
  - type: text
    content: LORD
  - type: text
    content: ' had chosen out of all the tribes of Israel, to put his name there. And his mother''s name '
  - type: text
    content: was
  - type: text
    content: ' Naamah an Ammonitess. '
  '14':
  - type: text
    content: 'And he did evil, because he prepared not his heart to seek the '
  - type: text
    content: LORD
  - type: text
    content: .
  '15':
  - type: text
    content: 'Now the acts of Rehoboam, first and last, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of Shemaiah the prophet, and of Iddo the seer concerning genealogies? And '
  - type: text
    content: there were
  - type: text
    content: ' wars between Rehoboam and Jeroboam continually. '
  '16':
  - type: text
    content: 'And Rehoboam slept with his fathers, and was buried in the city of David: and Abijah his son reigned in his stead.'
  '2':
  - type: text
    content: 'And it came to pass, '
  - type: text
    content: that
  - type: text
    content: ' in the fifth year of king Rehoboam Shishak king of Egypt came up against Jerusalem, because they had transgressed against the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  '3':
  - type: text
    content: 'with twelve hundred chariots, and threescore thousand horsemen: and the people '
  - type: text
    content: were
  - type: text
    content: ' without number that came with him out of Egypt; the Lubims, the Sukkiims, and the Ethiopians. '
  '4':
  - type: text
    content: 'And he took the fenced cities which '
  - type: text
    content: pertained
  - type: text
    content: ' to Judah, and came to Jerusalem.'
  '5':
  - type: text
    content: 'Then came Shemaiah the prophet to Rehoboam, and '
  - type: text
    content: to
  - type: text
    content: ' the princes of Judah, that were gathered together to Jerusalem because of Shishak, and said unto them, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', Ye have forsaken me, and therefore have I also left you in the hand of Shishak. '
  '6':
  - type: text
    content: 'Whereupon the princes of Israel and the king humbled themselves; and they said, The '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' righteous. '
  '7':
  - type: text
    content: 'And when the '
  - type: text
    content: LORD
  - type: text
    content: ' saw that they humbled themselves, the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came to Shemaiah, saying, They have humbled themselves; '
  - type: text
    content: therefore
  - type: text
    content: ' I will not destroy them, but I will grant them some deliverance; and my wrath shall not be poured out upon Jerusalem by the hand of Shishak. '
  '8':
  - type: text
    content: Nevertheless they shall be his servants; that they may know my service, and the service of the kingdoms of the countries.
  '9':
  - type: text
    content: 'So Shishak king of Egypt came up against Jerusalem, and took away the treasures of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and the treasures of the king''s house; he took all: he carried away also the shields of gold which Solomon had made. '
