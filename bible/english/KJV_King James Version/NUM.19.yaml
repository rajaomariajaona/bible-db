document_id: NUM.19
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Red Heifer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses and unto Aaron, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the ordinance of the law which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath commanded, saying, Speak unto the children of Israel, that they bring thee a red heifer without spot, wherein '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' no blemish, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' upon which never came yoke: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and ye shall give her unto Eleazar the priest, that he may bring her forth without the camp, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' shall slay her before his face: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and Eleazar the priest shall take of her blood with his finger, and sprinkle of her blood directly before the tabernacle of the congregation seven times: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' shall burn the heifer in his sight; her skin, and her flesh, and her blood, with her dung, shall he burn: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and the priest shall take cedar wood, and hyssop, and scarlet, and cast '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' into the midst of the burning of the heifer. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then the priest shall wash his clothes, and he shall bathe his flesh in water, and afterward he shall come into the camp, and the priest shall be unclean until the even. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And he that burneth her shall wash his clothes in water, and bathe his flesh in water, and shall be unclean until the even. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And a man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' clean shall gather up the ashes of the heifer, and lay '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' up without the camp in a clean place, and it shall be kept for the congregation of the children of Israel for a water of separation: it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a purification for sin. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And he that gathereth the ashes of the heifer shall wash his clothes, and be unclean until the even: and it shall be unto the children of Israel, and unto the stranger that sojourneth among them, for a statute for ever.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Purification
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He that toucheth the dead body of any man shall be unclean seven days. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'He shall purify himself with it on the third day, and on the seventh day he shall be clean: but if he purify not himself the third day, then the seventh day he shall not be clean. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Whosoever toucheth the dead body of any man that is dead, and purifieth not himself, defileth the tabernacle of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and that soul shall be cut off from Israel: because the water of separation was not sprinkled upon him, he shall be unclean; his uncleanness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' yet upon him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the law, when a man dieth in a tent: all that come into the tent, and all that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the tent, shall be unclean seven days. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And every open vessel, which hath no covering bound upon it, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' unclean. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And whosoever toucheth one that is slain with a sword in the open fields, or a dead body, or a bone of a man, or a grave, shall be unclean seven days. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And for an unclean '
  - type: usfm
    marker: add
    children:
    - type: text
      text: person
  - type: text
    text: ' they shall take of the ashes of the burnt heifer of purification for sin, and running water shall be put thereto in a vessel: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and a clean person shall take hyssop, and dip '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' in the water, and sprinkle '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon the tent, and upon all the vessels, and upon the persons that were there, and upon him that touched a bone, or one slain, or one dead, or a grave: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and the clean '
  - type: usfm
    marker: add
    children:
    - type: text
      text: person
  - type: text
    text: ' shall sprinkle upon the unclean on the third day, and on the seventh day: and on the seventh day he shall purify himself, and wash his clothes, and bathe himself in water, and shall be clean at even.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But the man that shall be unclean, and shall not purify himself, that soul shall be cut off from among the congregation, because he hath defiled the sanctuary of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': the water of separation hath not been sprinkled upon him; he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' unclean. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And it shall be a perpetual statute unto them, that he that sprinkleth the water of separation shall wash his clothes; and he that toucheth the water of separation shall be unclean until even. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And whatsoever the unclean '
  - type: usfm
    marker: add
    children:
    - type: text
      text: person
  - type: text
    text: ' toucheth shall be unclean; and the soul that toucheth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' shall be unclean until even.'
