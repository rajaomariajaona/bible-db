document_id: NUM.19,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Red Heifer
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses and unto Aaron, saying, '
  '10':
  - type: text
    content: 'And he that gathereth the ashes of the heifer shall wash his clothes, and be unclean until the even: and it shall be unto the children of Israel, and unto the stranger that sojourneth among them, for a statute for ever.'
  - type: heading
    content: Purification
  '11':
  - type: text
    content: 'He that toucheth the dead body of any man shall be unclean seven days. '
  '12':
  - type: text
    content: 'He shall purify himself with it on the third day, and on the seventh day he shall be clean: but if he purify not himself the third day, then the seventh day he shall not be clean. '
  '13':
  - type: text
    content: 'Whosoever toucheth the dead body of any man that is dead, and purifieth not himself, defileth the tabernacle of the '
  - type: text
    content: LORD
  - type: text
    content: '; and that soul shall be cut off from Israel: because the water of separation was not sprinkled upon him, he shall be unclean; his uncleanness '
  - type: text
    content: is
  - type: text
    content: ' yet upon him.'
  '14':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the law, when a man dieth in a tent: all that come into the tent, and all that '
  - type: text
    content: is
  - type: text
    content: ' in the tent, shall be unclean seven days. '
  '15':
  - type: text
    content: 'And every open vessel, which hath no covering bound upon it, '
  - type: text
    content: is
  - type: text
    content: ' unclean. '
  '16':
  - type: text
    content: 'And whosoever toucheth one that is slain with a sword in the open fields, or a dead body, or a bone of a man, or a grave, shall be unclean seven days. '
  '17':
  - type: text
    content: 'And for an unclean '
  - type: text
    content: person
  - type: text
    content: ' they shall take of the ashes of the burnt heifer of purification for sin, and running water shall be put thereto in a vessel: '
  '18':
  - type: text
    content: 'and a clean person shall take hyssop, and dip '
  - type: text
    content: it
  - type: text
    content: ' in the water, and sprinkle '
  - type: text
    content: it
  - type: text
    content: ' upon the tent, and upon all the vessels, and upon the persons that were there, and upon him that touched a bone, or one slain, or one dead, or a grave: '
  '19':
  - type: text
    content: 'and the clean '
  - type: text
    content: person
  - type: text
    content: ' shall sprinkle upon the unclean on the third day, and on the seventh day: and on the seventh day he shall purify himself, and wash his clothes, and bathe himself in water, and shall be clean at even.'
  '2':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the ordinance of the law which the '
  - type: text
    content: LORD
  - type: text
    content: ' hath commanded, saying, Speak unto the children of Israel, that they bring thee a red heifer without spot, wherein '
  - type: text
    content: is
  - type: text
    content: ' no blemish, '
  - type: text
    content: and
  - type: text
    content: ' upon which never came yoke: '
  '20':
  - type: text
    content: 'But the man that shall be unclean, and shall not purify himself, that soul shall be cut off from among the congregation, because he hath defiled the sanctuary of the '
  - type: text
    content: LORD
  - type: text
    content: ': the water of separation hath not been sprinkled upon him; he '
  - type: text
    content: is
  - type: text
    content: ' unclean. '
  '21':
  - type: text
    content: 'And it shall be a perpetual statute unto them, that he that sprinkleth the water of separation shall wash his clothes; and he that toucheth the water of separation shall be unclean until even. '
  '22':
  - type: text
    content: 'And whatsoever the unclean '
  - type: text
    content: person
  - type: text
    content: ' toucheth shall be unclean; and the soul that toucheth '
  - type: text
    content: it
  - type: text
    content: ' shall be unclean until even.'
  '3':
  - type: text
    content: 'and ye shall give her unto Eleazar the priest, that he may bring her forth without the camp, and '
  - type: text
    content: one
  - type: text
    content: ' shall slay her before his face: '
  '4':
  - type: text
    content: 'and Eleazar the priest shall take of her blood with his finger, and sprinkle of her blood directly before the tabernacle of the congregation seven times: '
  '5':
  - type: text
    content: 'and '
  - type: text
    content: one
  - type: text
    content: ' shall burn the heifer in his sight; her skin, and her flesh, and her blood, with her dung, shall he burn: '
  '6':
  - type: text
    content: 'and the priest shall take cedar wood, and hyssop, and scarlet, and cast '
  - type: text
    content: it
  - type: text
    content: ' into the midst of the burning of the heifer. '
  '7':
  - type: text
    content: 'Then the priest shall wash his clothes, and he shall bathe his flesh in water, and afterward he shall come into the camp, and the priest shall be unclean until the even. '
  '8':
  - type: text
    content: 'And he that burneth her shall wash his clothes in water, and bathe his flesh in water, and shall be unclean until the even. '
  '9':
  - type: text
    content: 'And a man '
  - type: text
    content: that is
  - type: text
    content: ' clean shall gather up the ashes of the heifer, and lay '
  - type: text
    content: them
  - type: text
    content: ' up without the camp in a clean place, and it shall be kept for the congregation of the children of Israel for a water of separation: it '
  - type: text
    content: is
  - type: text
    content: ' a purification for sin. '
