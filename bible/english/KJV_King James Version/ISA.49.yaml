document_id: ISA.49,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Servant's Commission
  - type: text
    content: 'Listen, O isles, unto me; and hearken, ye people, from far; The '
  - type: text
    content: LORD
  - type: text
    content: ' hath called me from the womb; from the bowels of my mother hath he made mention of my name. '
  '10':
  - type: text
    content: 'They shall not hunger nor thirst; neither shall the heat nor sun smite them: for he that hath mercy on them shall lead them, even by the springs of water shall he guide them. '
  '11':
  - type: text
    content: 'And I will make all my mountains a way, and my highways shall be exalted. '
  '12':
  - type: text
    content: 'Behold, these shall come from far: and, lo, these from the north and from the west; and these from the land of Sinim. '
  '13':
  - type: text
    content: 'Sing, O heavens; and be joyful, O earth; and break forth into singing, O mountains: for the '
  - type: text
    content: LORD
  - type: text
    content: ' hath comforted his people, and will have mercy upon his afflicted.'
  '14':
  - type: text
    content: 'But Zion said, The '
  - type: text
    content: LORD
  - type: text
    content: ' hath forsaken me, and my Lord hath forgotten me. '
  '15':
  - type: text
    content: 'Can a woman forget her sucking child, that she should not have compassion on the son of her womb? yea, they may forget, yet will I not forget thee. '
  '16':
  - type: text
    content: 'Behold, I have graven thee upon the palms of '
  - type: text
    content: my
  - type: text
    content: ' hands; thy walls '
  - type: text
    content: are
  - type: text
    content: ' continually before me. '
  '17':
  - type: text
    content: 'Thy children shall make haste; thy destroyers and they that made thee waste shall go forth of thee. '
  '18':
  - type: text
    content: 'Lift up thine eyes round about, and behold: all these gather themselves together, '
  - type: text
    content: and
  - type: text
    content: ' come to thee. '
  - type: text
    content: As
  - type: text
    content: ' I live, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', thou shalt surely clothe thee with them all, as with an ornament, and bind them '
  - type: text
    content: on thee
  - type: text
    content: ', as a bride '
  - type: text
    content: doeth
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'For thy waste and thy desolate places, and the land of thy destruction, shall even now be too narrow by reason of the inhabitants, and they that swallowed thee up shall be far away. '
  '2':
  - type: text
    content: 'And he hath made my mouth like a sharp sword; in the shadow of his hand hath he hid me, and made me a polished shaft; in his quiver hath he hid me; '
  '20':
  - type: text
    content: 'The children which thou shalt have, after thou hast lost the other, shall say again in thine ears, The place '
  - type: text
    content: is
  - type: text
    content: ' too strait for me: give place to me that I may dwell. '
  '21':
  - type: text
    content: 'Then shalt thou say in thine heart, Who hath begotten me these, seeing I have lost my children, and am desolate, a captive, and removing to and fro? and who hath brought up these? Behold, I was left alone; these, where '
  - type: text
    content: had
  - type: text
    content: ' they '
  - type: text
    content: been?
  '22':
  - type: text
    content: 'Thus saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: ', Behold, I will lift up mine hand to the Gentiles, and set up my standard to the people: and they shall bring thy sons in '
  - type: text
    content: their
  - type: text
    content: ' arms, and thy daughters shall be carried upon '
  - type: text
    content: their
  - type: text
    content: ' shoulders. '
  '23':
  - type: text
    content: 'And kings shall be thy nursing fathers, and their queens thy nursing mothers: they shall bow down to thee with '
  - type: text
    content: their
  - type: text
    content: ' face toward the earth, and lick up the dust of thy feet; and thou shalt know that I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ': for they shall not be ashamed that wait for me.'
  '24':
  - type: text
    content: 'Shall the prey be taken from the mighty, or the lawful captive delivered? '
  '25':
  - type: text
    content: 'But thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', Even the captives of the mighty shall be taken away, and the prey of the terrible shall be delivered: for I will contend with him that contendeth with thee, and I will save thy children. '
  '26':
  - type: text
    content: 'And I will feed them that oppress thee with their own flesh; and they shall be drunken with their own blood, as with sweet wine: and all flesh shall know that I the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: am
  - type: text
    content: ' thy Saviour and thy Redeemer, the Mighty One of Jacob.'
  '3':
  - type: text
    content: 'and said unto me, Thou '
  - type: text
    content: art
  - type: text
    content: ' my servant, O Israel, in whom I will be glorified. '
  '4':
  - type: text
    content: 'Then I said, I have laboured in vain, I have spent my strength for nought, and in vain: '
  - type: text
    content: yet
  - type: text
    content: ' surely my judgment '
  - type: text
    content: is
  - type: text
    content: ' with the '
  - type: text
    content: LORD
  - type: text
    content: ', and my work with my God.'
  '5':
  - type: text
    content: 'And now, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' that formed me from the womb '
  - type: text
    content: to be
  - type: text
    content: ' his servant, to bring Jacob again to him, Though Israel be not gathered, yet shall I be glorious in the eyes of the '
  - type: text
    content: LORD
  - type: text
    content: ', and my God shall be my strength. '
  '6':
  - type: text
    content: 'And he said, It is a light thing that thou shouldest be my servant to raise up the tribes of Jacob, and to restore the preserved of Israel: I will also give thee for a light to the Gentiles, that thou mayest be my salvation unto the end of the earth.'
  '7':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', the Redeemer of Israel, '
  - type: text
    content: and
  - type: text
    content: ' his Holy One, to him whom man despiseth, to him whom the nation abhorreth, to a servant of rulers, Kings shall see and arise, princes also shall worship, because of the '
  - type: text
    content: LORD
  - type: text
    content: ' that is faithful, '
  - type: text
    content: and
  - type: text
    content: ' the Holy One of Israel, and he shall choose thee.'
  '8':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', In an acceptable time have I heard thee, and in a day of salvation have I helped thee: and I will preserve thee, and give thee for a covenant of the people, to establish the earth, to cause to inherit the desolate heritages; '
  '9':
  - type: text
    content: 'that thou mayest say to the prisoners, Go forth; to them that '
  - type: text
    content: are
  - type: text
    content: ' in darkness, Shew yourselves. They shall feed in the ways, and their pastures '
  - type: text
    content: shall be
  - type: text
    content: ' in all high places. '
