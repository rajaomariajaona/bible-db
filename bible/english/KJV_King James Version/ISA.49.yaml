document_id: ISA.49
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Servant's Commission
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Listen, O isles, unto me; and hearken, ye people, from far; The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath called me from the womb; from the bowels of my mother hath he made mention of my name. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he hath made my mouth like a sharp sword; in the shadow of his hand hath he hid me, and made me a polished shaft; in his quiver hath he hid me; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and said unto me, Thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' my servant, O Israel, in whom I will be glorified. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then I said, I have laboured in vain, I have spent my strength for nought, and in vain: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yet
  - type: text
    text: ' surely my judgment '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and my work with my God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And now, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' that formed me from the womb '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' his servant, to bring Jacob again to him, Though Israel be not gathered, yet shall I be glorious in the eyes of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and my God shall be my strength. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he said, It is a light thing that thou shouldest be my servant to raise up the tribes of Jacob, and to restore the preserved of Israel: I will also give thee for a light to the Gentiles, that thou mayest be my salvation unto the end of the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the Redeemer of Israel, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' his Holy One, to him whom man despiseth, to him whom the nation abhorreth, to a servant of rulers, Kings shall see and arise, princes also shall worship, because of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' that is faithful, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the Holy One of Israel, and he shall choose thee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', In an acceptable time have I heard thee, and in a day of salvation have I helped thee: and I will preserve thee, and give thee for a covenant of the people, to establish the earth, to cause to inherit the desolate heritages; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'that thou mayest say to the prisoners, Go forth; to them that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' in darkness, Shew yourselves. They shall feed in the ways, and their pastures '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' in all high places. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'They shall not hunger nor thirst; neither shall the heat nor sun smite them: for he that hath mercy on them shall lead them, even by the springs of water shall he guide them. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And I will make all my mountains a way, and my highways shall be exalted. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Behold, these shall come from far: and, lo, these from the north and from the west; and these from the land of Sinim. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Sing, O heavens; and be joyful, O earth; and break forth into singing, O mountains: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath comforted his people, and will have mercy upon his afflicted.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But Zion said, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath forsaken me, and my Lord hath forgotten me. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Can a woman forget her sucking child, that she should not have compassion on the son of her womb? yea, they may forget, yet will I not forget thee. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Behold, I have graven thee upon the palms of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my
  - type: text
    text: ' hands; thy walls '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' continually before me. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Thy children shall make haste; thy destroyers and they that made thee waste shall go forth of thee. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Lift up thine eyes round about, and behold: all these gather themselves together, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' come to thee. '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' I live, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', thou shalt surely clothe thee with them all, as with an ornament, and bind them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: on thee
  - type: text
    text: ', as a bride '
  - type: usfm
    marker: add
    children:
    - type: text
      text: doeth
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For thy waste and thy desolate places, and the land of thy destruction, shall even now be too narrow by reason of the inhabitants, and they that swallowed thee up shall be far away. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The children which thou shalt have, after thou hast lost the other, shall say again in thine ears, The place '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' too strait for me: give place to me that I may dwell. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then shalt thou say in thine heart, Who hath begotten me these, seeing I have lost my children, and am desolate, a captive, and removing to and fro? and who hath brought up these? Behold, I was left alone; these, where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: had
  - type: text
    text: ' they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: been?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ', Behold, I will lift up mine hand to the Gentiles, and set up my standard to the people: and they shall bring thy sons in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' arms, and thy daughters shall be carried upon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' shoulders. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And kings shall be thy nursing fathers, and their queens thy nursing mothers: they shall bow down to thee with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' face toward the earth, and lick up the dust of thy feet; and thou shalt know that I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': for they shall not be ashamed that wait for me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Shall the prey be taken from the mighty, or the lawful captive delivered? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Even the captives of the mighty shall be taken away, and the prey of the terrible shall be delivered: for I will contend with him that contendeth with thee, and I will save thy children. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And I will feed them that oppress thee with their own flesh; and they shall be drunken with their own blood, as with sweet wine: and all flesh shall know that I the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' thy Saviour and thy Redeemer, the Mighty One of Jacob.'
