  - type: text
    content: 'How long wilt thou go about, O thou backsliding daughter? for the '
  - type: text
    content: LORD
  - type: text
    content: ' hath created a new thing in the earth, A woman shall compass a man.'
  '23':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, the God of Israel; As yet they shall use this speech in the land of Judah and in the cities thereof, when I shall bring again their captivity; The '
  - type: text
    content: LORD
  - type: text
    content: ' bless thee, O habitation of justice, '
  - type: text
    content: and
  - type: text
    content: ' mountain of holiness. '
  '24':
  - type: text
    content: 'And there shall dwell in Judah itself, and in all the cities thereof together, husbandmen, and they '
  - type: text
    content: that
  - type: text
    content: ' go forth with flocks. '
  '25':
  - type: text
    content: 'For I have satiated the weary soul, and I have replenished every sorrowful soul. '
  '26':
  - type: text
    content: Upon this I awaked, and beheld; and my sleep was sweet unto me.
  '27':
  - type: text
    content: 'Behold, the days come, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', that I will sow the house of Israel and the house of Judah with the seed of man, and with the seed of beast. '
  '28':
  - type: text
    content: 'And it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ' like as I have watched over them, to pluck up, and to break down, and to throw down, and to destroy, and to afflict; so will I watch over them, to build, and to plant, saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'In those days they shall say no more, The fathers have eaten a sour grape, and the children''s teeth are set on edge. '
  '3':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' hath appeared of old unto me, '
  - type: text
    content: saying
  - type: text
    content: ', Yea, I have loved thee with an everlasting love: therefore with lovingkindness have I drawn thee. '
  '30':
  - type: text
    content: 'But every one shall die for his own iniquity: every man that eateth the sour grape, his teeth shall be set on edge.'
  - type: heading
    content: The New Covenant
  '31':
  - type: text
    content: 'Behold, the days come, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', that I will make a new covenant with the house of Israel, and with the house of Judah: '
  '32':
  - type: text
    content: 'not according to the covenant that I made with their fathers in the day '
  - type: text
    content: that
  - type: text
    content: ' I took them by the hand to bring them out of the land of Egypt; which my covenant they brake, although I was an husband unto them, saith the '
  - type: text
    content: LORD
  - type: text
    content: ': '
  '33':
  - type: text
    content: 'but this '
  - type: text
    content: shall be
  - type: text
    content: ' the covenant that I will make with the house of Israel; After those days, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', I will put my law in their inward parts, and write it in their hearts; and will be their God, and they shall be my people. '
  '34':
  - type: text
    content: 'And they shall teach no more every man his neighbour, and every man his brother, saying, Know the '
  - type: text
    content: LORD
  - type: text
    content: ': for they shall all know me, from the least of them unto the greatest of them, saith the '
  - type: text
    content: LORD
  - type: text
    content: ': for I will forgive their iniquity, and I will remember their sin no more.'
  '35':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', which giveth the sun for a light by day, '
  - type: text
    content: and
  - type: text
    content: ' the ordinances of the moon and of the stars for a light by night, which divideth the sea when the waves thereof roar; The '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts '
  - type: text
    content: is
  - type: text
    content: ' his name: '
  '36':
  - type: text
    content: 'If those ordinances depart from before me, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: then
  - type: text
    content: ' the seed of Israel also shall cease from being a nation before me for ever. '
  '37':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; If heaven above can be measured, and the foundations of the earth searched out beneath, I will also cast off all the seed of Israel for all that they have done, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '38':
  - type: text
    content: 'Behold, the days come, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', that the city shall be built to the '
  - type: text
    content: LORD
  - type: text
    content: ' from the tower of Hananeel unto the gate of the corner. '
  '39':
  - type: text
    content: 'And the measuring line shall yet go forth over against it upon the hill Gareb, and shall compass about to Goath. '
  '4':
  - type: text
    content: 'Again I will build thee, and thou shalt be built, O virgin of Israel: thou shalt again be adorned with thy tabrets, and shalt go forth in the dances of them that make merry. '
  '40':
  - type: text
    content: 'And the whole valley of the dead bodies, and of the ashes, and all the fields unto the brook of Kidron, unto the corner of the horse gate toward the east, '
  - type: text
    content: shall be
  - type: text
    content: ' holy unto the '
  - type: text
    content: LORD
  - type: text
    content: ; it shall not be plucked up, nor thrown down any more for ever.
  '5':
  - type: text
    content: 'Thou shalt yet plant vines upon the mountains of Samaria: the planters shall plant, and shall eat '
  - type: text
    content: them
  - type: text
    content: ' as common things. '
  '6':
  - type: text
    content: 'For there shall be a day, '
  - type: text
    content: that
  - type: text
    content: ' the watchmen upon the mount Ephraim shall cry, Arise ye, and let us go up to Zion unto the '
  - type: text
    content: LORD
  - type: text
    content: ' our God.'
  '7':
  - type: text
    content: 'For thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Sing with gladness for Jacob, and shout among the chief of the nations: publish ye, praise ye, and say, O '
  - type: text
    content: LORD
  - type: text
    content: ', save thy people, the remnant of Israel. '
  '8':
  - type: text
    content: 'Behold, I will bring them from the north country, and gather them from the coasts of the earth, '
  - type: text
    content: and
  - type: text
    content: ' with them the blind and the lame, the woman with child and her that travaileth with child together: a great company shall return thither. '
  '9':
  - type: text
    content: 'They shall come with weeping, and with supplications will I lead them: I will cause them to walk by the rivers of waters in a straight way, wherein they shall not stumble: for I am a father to Israel, and Ephraim '
  - type: text
    content: is
  - type: text
    content: ' my firstborn.'
