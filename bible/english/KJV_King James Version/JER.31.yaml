document_id: JER.31,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At the same time, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', will I be the God of all the families of Israel, and they shall be my people. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hear the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', O ye nations, and declare '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' in the isles afar off, and say, He that scattered Israel will gather him, and keep him, as a shepherd '
    - type: usfm
      marker: add
      children:
      - type: text
        text: doth
    - type: text
      text: ' his flock. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath redeemed Jacob, and ransomed him from the hand of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him that was
    - type: text
      text: ' stronger than he. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore they shall come and sing in the height of Zion, and shall flow together to the goodness of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', for wheat, and for wine, and for oil, and for the young of the flock and of the herd: and their soul shall be as a watered garden; and they shall not sorrow any more at all. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then shall the virgin rejoice in the dance, both young men and old together: for I will turn their mourning into joy, and will comfort them, and make them rejoice from their sorrow. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will satiate the soul of the priests with fatness, and my people shall be satisfied with my goodness, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; A voice was heard in Ramah, lamentation, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' bitter weeping; Rahel weeping for her children refused to be comforted for her children, because they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' not. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; Refrain thy voice from weeping, and thine eyes from tears: for thy work shall be rewarded, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; and they shall come again from the land of the enemy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there is hope in thine end, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', that thy children shall come again to their own border.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have surely heard Ephraim bemoaning himself '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thus
    - type: text
      text: '; Thou hast chastised me, and I was chastised, as a bullock unaccustomed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'to the yoke:'
    - type: text
      text: ' turn thou me, and I shall be turned; for thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' my God. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Surely after that I was turned, I repented; and after that I was instructed, I smote upon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: my
    - type: text
      text: ' thigh: I was ashamed, yea, even confounded, because I did bear the reproach of my youth. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', The people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which were
    - type: text
      text: ' left of the sword found grace in the wilderness; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' Israel, when I went to cause him to rest. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' Ephraim my dear son? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is he
    - type: text
      text: ' a pleasant child? for since I spake against him, I do earnestly remember him still: therefore my bowels are troubled for him; I will surely have mercy upon him, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Set thee up waymarks, make thee high heaps: set thine heart toward the highway, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the way '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' thou wentest: turn again, O virgin of Israel, turn again to these thy cities. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'How long wilt thou go about, O thou backsliding daughter? for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath created a new thing in the earth, A woman shall compass a man.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, the God of Israel; As yet they shall use this speech in the land of Judah and in the cities thereof, when I shall bring again their captivity; The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' bless thee, O habitation of justice, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' mountain of holiness. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there shall dwell in Judah itself, and in all the cities thereof together, husbandmen, and they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' go forth with flocks. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I have satiated the weary soul, and I have replenished every sorrowful soul. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Upon this I awaked, and beheld; and my sleep was sweet unto me.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, the days come, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', that I will sow the house of Israel and the house of Judah with the seed of man, and with the seed of beast. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' like as I have watched over them, to pluck up, and to break down, and to throw down, and to destroy, and to afflict; so will I watch over them, to build, and to plant, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In those days they shall say no more, The fathers have eaten a sour grape, and the children''s teeth are set on edge. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath appeared of old unto me, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: saying
    - type: text
      text: ', Yea, I have loved thee with an everlasting love: therefore with lovingkindness have I drawn thee. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But every one shall die for his own iniquity: every man that eateth the sour grape, his teeth shall be set on edge.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The New Covenant
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, the days come, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', that I will make a new covenant with the house of Israel, and with the house of Judah: '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'not according to the covenant that I made with their fathers in the day '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' I took them by the hand to bring them out of the land of Egypt; which my covenant they brake, although I was an husband unto them, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' the covenant that I will make with the house of Israel; After those days, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', I will put my law in their inward parts, and write it in their hearts; and will be their God, and they shall be my people. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they shall teach no more every man his neighbour, and every man his brother, saying, Know the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': for they shall all know me, from the least of them unto the greatest of them, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': for I will forgive their iniquity, and I will remember their sin no more.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', which giveth the sun for a light by day, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the ordinances of the moon and of the stars for a light by night, which divideth the sea when the waves thereof roar; The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' his name: '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If those ordinances depart from before me, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: then
    - type: text
      text: ' the seed of Israel also shall cease from being a nation before me for ever. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; If heaven above can be measured, and the foundations of the earth searched out beneath, I will also cast off all the seed of Israel for all that they have done, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, the days come, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', that the city shall be built to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' from the tower of Hananeel unto the gate of the corner. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the measuring line shall yet go forth over against it upon the hill Gareb, and shall compass about to Goath. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Again I will build thee, and thou shalt be built, O virgin of Israel: thou shalt again be adorned with thy tabrets, and shalt go forth in the dances of them that make merry. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the whole valley of the dead bodies, and of the ashes, and all the fields unto the brook of Kidron, unto the corner of the horse gate toward the east, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' holy unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ; it shall not be plucked up, nor thrown down any more for ever.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt yet plant vines upon the mountains of Samaria: the planters shall plant, and shall eat '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' as common things. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For there shall be a day, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the watchmen upon the mount Ephraim shall cry, Arise ye, and let us go up to Zion unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; Sing with gladness for Jacob, and shout among the chief of the nations: publish ye, praise ye, and say, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', save thy people, the remnant of Israel. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, I will bring them from the north country, and gather them from the coasts of the earth, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' with them the blind and the lame, the woman with child and her that travaileth with child together: a great company shall return thither. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They shall come with weeping, and with supplications will I lead them: I will cause them to walk by the rivers of waters in a straight way, wherein they shall not stumble: for I am a father to Israel, and Ephraim '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my firstborn.'
