verses:
  '1':
  - type: text
    content: 'At the same time, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', will I be the God of all the families of Israel, and they shall be my people. '
  '10':
  - type: text
    content: 'Hear the word of the '
  - type: text
    content: LORD
  - type: text
    content: ', O ye nations, and declare '
  - type: text
    content: it
  - type: text
    content: ' in the isles afar off, and say, He that scattered Israel will gather him, and keep him, as a shepherd '
  - type: text
    content: doth
  - type: text
    content: ' his flock. '
  '11':
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ' hath redeemed Jacob, and ransomed him from the hand of '
  - type: text
    content: him that was
  - type: text
    content: ' stronger than he. '
  '12':
  - type: text
    content: 'Therefore they shall come and sing in the height of Zion, and shall flow together to the goodness of the '
  - type: text
    content: LORD
  - type: text
    content: ', for wheat, and for wine, and for oil, and for the young of the flock and of the herd: and their soul shall be as a watered garden; and they shall not sorrow any more at all. '
  '13':
  - type: text
    content: 'Then shall the virgin rejoice in the dance, both young men and old together: for I will turn their mourning into joy, and will comfort them, and make them rejoice from their sorrow. '
  '14':
  - type: text
    content: 'And I will satiate the soul of the priests with fatness, and my people shall be satisfied with my goodness, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '15':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; A voice was heard in Ramah, lamentation, '
  - type: text
    content: and
  - type: text
