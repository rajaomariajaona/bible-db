  - type: text
    content: were
  - type: text
    content: ' not. '
  '16':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Refrain thy voice from weeping, and thine eyes from tears: for thy work shall be rewarded, saith the '
  - type: text
    content: LORD
  - type: text
    content: '; and they shall come again from the land of the enemy. '
  '17':
  - type: text
    content: 'And there is hope in thine end, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', that thy children shall come again to their own border.'
  '18':
  - type: text
    content: 'I have surely heard Ephraim bemoaning himself '
  - type: text
    content: thus
  - type: text
    content: '; Thou hast chastised me, and I was chastised, as a bullock unaccustomed '
  - type: text
    content: 'to the yoke:'
  - type: text
    content: ' turn thou me, and I shall be turned; for thou '
  - type: text
    content: art
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' my God. '
  '19':
  - type: text
    content: 'Surely after that I was turned, I repented; and after that I was instructed, I smote upon '
  - type: text
    content: my
  - type: text
    content: ' thigh: I was ashamed, yea, even confounded, because I did bear the reproach of my youth. '
  '2':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', The people '
  - type: text
    content: which were
  - type: text
    content: ' left of the sword found grace in the wilderness; '
  - type: text
    content: even
  - type: text
    content: ' Israel, when I went to cause him to rest. '
  '20':
  - type: text
    content: Is
  - type: text
    content: ' Ephraim my dear son? '
  - type: text
    content: is he
  - type: text
    content: ' a pleasant child? for since I spake against him, I do earnestly remember him still: therefore my bowels are troubled for him; I will surely have mercy upon him, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '21':
  - type: text
    content: 'Set thee up waymarks, make thee high heaps: set thine heart toward the highway, '
  - type: text
    content: even
  - type: text
    content: ' the way '
  - type: text
    content: which
  - type: text
    content: ' thou wentest: turn again, O virgin of Israel, turn again to these thy cities. '
