document_id: JDG.2,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Angel of the LORD
  - type: text
    content: 'And an angel of the '
  - type: text
    content: LORD
  - type: text
    content: ' came up from Gilgal to Bochim, and said, I made you to go up out of Egypt, and have brought you unto the land which I sware unto your fathers; and I said, I will never break my covenant with you. '
  '10':
  - type: text
    content: 'And also all that generation were gathered unto their fathers: and there arose another generation after them, which knew not the '
  - type: text
    content: LORD
  - type: text
    content: ', nor yet the works which he had done for Israel.'
  '11':
  - type: text
    content: 'And the children of Israel did evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', and served Baalim: '
  '12':
  - type: text
    content: 'and they forsook the '
  - type: text
    content: LORD
  - type: text
    content: ' God of their fathers, which brought them out of the land of Egypt, and followed other gods, of the gods of the people that '
  - type: text
    content: were
  - type: text
    content: ' round about them, and bowed themselves unto them, and provoked the '
  - type: text
    content: LORD
  - type: text
    content: ' to anger. '
  '13':
  - type: text
    content: 'And they forsook the '
  - type: text
    content: LORD
  - type: text
    content: ', and served Baal and Ashtaroth. '
  '14':
  - type: text
    content: 'And the anger of the '
  - type: text
    content: LORD
  - type: text
    content: ' was hot against Israel, and he delivered them into the hands of spoilers that spoiled them, and he sold them into the hands of their enemies round about, so that they could not any longer stand before their enemies. '
  '15':
  - type: text
    content: 'Whithersoever they went out, the hand of the '
  - type: text
    content: LORD
  - type: text
    content: ' was against them for evil, as the '
  - type: text
    content: LORD
  - type: text
    content: ' had said, and as the '
  - type: text
    content: LORD
  - type: text
    content: ' had sworn unto them: and they were greatly distressed.'
  '16':
  - type: text
    content: 'Nevertheless the '
  - type: text
    content: LORD
  - type: text
    content: ' raised up judges, which delivered them out of the hand of those that spoiled them. '
  '17':
  - type: text
    content: 'And yet they would not hearken unto their judges, but they went a whoring after other gods, and bowed themselves unto them: they turned quickly out of the way which their fathers walked in, obeying the commandments of the '
  - type: text
    content: LORD
  - type: text
    content: '; '
  - type: text
    content: but
  - type: text
    content: ' they did not so. '
  '18':
  - type: text
    content: 'And when the '
  - type: text
    content: LORD
  - type: text
    content: ' raised them up judges, then the '
  - type: text
    content: LORD
  - type: text
    content: ' was with the judge, and delivered them out of the hand of their enemies all the days of the judge: for it repented the '
  - type: text
    content: LORD
  - type: text
    content: ' because of their groanings by reason of them that oppressed them and vexed them. '
  '19':
  - type: text
    content: 'And it came to pass, when the judge was dead, '
  - type: text
    content: that
  - type: text
    content: ' they returned, and corrupted '
  - type: text
    content: themselves
  - type: text
    content: ' more than their fathers, in following other gods to serve them, and to bow down unto them; they ceased not from their own doings, nor from their stubborn way. '
  '2':
  - type: text
    content: 'And ye shall make no league with the inhabitants of this land; ye shall throw down their altars: but ye have not obeyed my voice: why have ye done this? '
  '20':
  - type: text
    content: 'And the anger of the '
  - type: text
    content: LORD
  - type: text
    content: ' was hot against Israel; and he said, Because that this people hath transgressed my covenant which I commanded their fathers, and have not hearkened unto my voice; '
  '21':
  - type: text
    content: 'I also will not henceforth drive out any from before them of the nations which Joshua left when he died: '
  '22':
  - type: text
    content: 'that through them I may prove Israel, whether they will keep the way of the '
  - type: text
    content: LORD
  - type: text
    content: ' to walk therein, as their fathers did keep '
  - type: text
    content: it
  - type: text
    content: ', or not. '
  '23':
  - type: text
    content: 'Therefore the '
  - type: text
    content: LORD
  - type: text
    content: ' left those nations, without driving them out hastily; neither delivered he them into the hand of Joshua.'
  '3':
  - type: text
    content: 'Wherefore I also said, I will not drive them out from before you; but they shall be '
  - type: text
    content: as thorns
  - type: text
    content: ' in your sides, and their gods shall be a snare unto you. '
  '4':
  - type: text
    content: 'And it came to pass, when the angel of the '
  - type: text
    content: LORD
  - type: text
    content: ' spake these words unto all the children of Israel, that the people lifted up their voice, and wept. '
  '5':
  - type: text
    content: 'And they called the name of that place Bochim: and they sacrificed there unto the '
  - type: text
    content: LORD
  - type: text
    content: .
  '6':
  - type: text
    content: 'And when Joshua had let the people go, the children of Israel went every man unto his inheritance to possess the land. '
  '7':
  - type: text
    content: 'And the people served the '
  - type: text
    content: LORD
  - type: text
    content: ' all the days of Joshua, and all the days of the elders that outlived Joshua, who had seen all the great works of the '
  - type: text
    content: LORD
  - type: text
    content: ', that he did for Israel. '
  '8':
  - type: text
    content: 'And Joshua the son of Nun, the servant of the '
  - type: text
    content: LORD
  - type: text
    content: ', died, '
  - type: text
    content: being
  - type: text
    content: ' an hundred and ten years old. '
  '9':
  - type: text
    content: 'And they buried him in the border of his inheritance in Timnath-heres, in the mount of Ephraim, on the north side of the hill Gaash. '
