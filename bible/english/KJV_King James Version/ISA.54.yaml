document_id: ISA.54,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jerusalem's Future
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Sing, O barren, thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' didst not bear; break forth into singing, and cry aloud, thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' didst not travail with child: for more '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the children of the desolate than the children of the married wife, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For the mountains shall depart, and the hills be removed; but my kindness shall not depart from thee, neither shall the covenant of my peace be removed, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' that hath mercy on thee.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'O thou afflicted, tossed with tempest, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' not comforted, behold, I will lay thy stones with fair colours, and lay thy foundations with sapphires. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And I will make thy windows of agates, and thy gates of carbuncles, and all thy borders of pleasant stones. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And all thy children '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' taught of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; and great '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' the peace of thy children. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'In righteousness shalt thou be established: thou shalt be far from oppression; for thou shalt not fear: and from terror; for it shall not come near thee.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Behold, they shall surely gather together, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' not by me: whosoever shall gather together against thee shall fall for thy sake. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Behold, I have created the smith that bloweth the coals in the fire, and that bringeth forth an instrument for his work; and I have created the waster to destroy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'No weapon that is formed against thee shall prosper; and every tongue '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' shall rise against thee in judgment thou shalt condemn. This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the heritage of the servants of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and their righteousness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' of me, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Enlarge the place of thy tent, and let them stretch forth the curtains of thine habitations: spare not, lengthen thy cords, and strengthen thy stakes; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: for thou shalt break forth on the right hand and on the left; and thy seed shall inherit the Gentiles, and make the desolate cities to be inhabited.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fear not; for thou shalt not be ashamed: neither be thou confounded; for thou shalt not be put to shame: for thou shalt forget the shame of thy youth, and shalt not remember the reproach of thy widowhood any more. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For thy Maker '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thine husband; the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' his name; and thy Redeemer the Holy One of Israel; The God of the whole earth shall he be called. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath called thee as a woman forsaken and grieved in spirit, and a wife of youth, when thou wast refused, saith thy God.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For a small moment have I forsaken thee; but with great mercies will I gather thee. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'In a little wrath I hid my face from thee for a moment; but with everlasting kindness will I have mercy on thee, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy Redeemer. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is as
    - type: text
      text: ' the waters of Noah unto me: for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' I have sworn that the waters of Noah should no more go over the earth; so have I sworn that I would not be wroth with thee, nor rebuke thee. '
