  - type: text
    content: .
  '2':
  - type: text
    content: 'Enlarge the place of thy tent, and let them stretch forth the curtains of thine habitations: spare not, lengthen thy cords, and strengthen thy stakes; '
  '3':
  - type: text
    content: for thou shalt break forth on the right hand and on the left; and thy seed shall inherit the Gentiles, and make the desolate cities to be inhabited.
  '4':
  - type: text
    content: 'Fear not; for thou shalt not be ashamed: neither be thou confounded; for thou shalt not be put to shame: for thou shalt forget the shame of thy youth, and shalt not remember the reproach of thy widowhood any more. '
  '5':
  - type: text
    content: 'For thy Maker '
