  '16':
  - type: text
    content: 'Behold, I have created the smith that bloweth the coals in the fire, and that bringeth forth an instrument for his work; and I have created the waster to destroy. '
  '17':
  - type: text
    content: 'No weapon that is formed against thee shall prosper; and every tongue '
