  - type: text
    content: is
  - type: text
    content: ' his name; and thy Redeemer the Holy One of Israel; The God of the whole earth shall he be called. '
  '6':
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ' hath called thee as a woman forsaken and grieved in spirit, and a wife of youth, when thou wast refused, saith thy God.'
  '7':
  - type: text
    content: 'For a small moment have I forsaken thee; but with great mercies will I gather thee. '
  '8':
  - type: text
    content: 'In a little wrath I hid my face from thee for a moment; but with everlasting kindness will I have mercy on thee, saith the '
  - type: text
