  '1':
  - type: text
    content: A Prayer of David.
  - type: text
    content: 'Hear the right, O '
  - type: text
    content: LORD
  - type: text
    content: ', attend unto my cry,'
  - type: text
    content: 'Give ear unto my prayer, '
  - type: text
    content: that goeth
  - type: text
    content: ' not out of feigned lips.'
  '10':
  - type: text
    content: 'They are inclosed in their own fat:'
  - type: text
    content: With their mouth they speak proudly.
  '11':
  - type: text
    content: 'They have now compassed us in our steps:'
  - type: text
    content: They have set their eyes bowing down to the earth;
  '12':
  - type: text
    content: 'Like as a lion '
  - type: text
    content: that
  - type: text
    content: ' is greedy of his prey,'
  - type: text
    content: And as it were a young lion lurking in secret places.
  '13':
  - type: text
    content: 'Arise, O '
  - type: text
    content: LORD
  - type: text
    content: ', disappoint him, cast him down:'
  - type: text
    content: 'Deliver my soul from the wicked, '
  - type: text
    content: which is
  - type: text
    content: ' thy sword:'
  '14':
  - type: text
    content: 'From men '
  - type: text
    content: which are
  - type: text
    content: ' thy hand, O '
  - type: text
    content: LORD
  - type: text
    content: ', from men of the world,'
  - type: text
    content: Which have
  - type: text
    content: ' their portion in '
  - type: text
    content: this
  - type: text
    content: ' life, and whose belly thou fillest with thy hid '
  - type: text
    content: 'treasure:'
  - type: text
    content: They are full of children,
  - type: text
    content: 'And leave the rest of their '
  - type: text
    content: substance
  - type: text
    content: ' to their babes.'
  '15':
  - type: text
    content: 'As for me, I will behold thy face in righteousness:'
  - type: text
    content: I shall be satisfied, when I awake, with thy likeness.
  '2':
  - type: text
    content: Let my sentence come forth from thy presence;
  - type: text
    content: Let thine eyes behold the things that are equal.
  '3':
  - type: text
    content: 'Thou hast proved mine heart; thou hast visited '
  - type: text
    content: me
  - type: text
    content: ' in the night; Thou hast tried me, '
  - type: text
    content: and
  - type: text
    content: ' shalt find nothing;'
  - type: text
    content: 'I am purposed '
  - type: text
    content: that
  - type: text
    content: ' my mouth shall not transgress.'
  '4':
  - type: text
    content: Concerning the works of men, by the word of thy lips
  - type: text
    content: 'I have kept '
  - type: text
    content: me from
  - type: text
    content: ' the paths of the destroyer.'
  '5':
  - type: text
    content: 'Hold up my goings in thy paths, '
  - type: text
    content: that
  - type: text
    content: ' my footsteps slip not.'
  '6':
  - type: text
    content: 'I have called upon thee, for thou wilt hear me, O God:'
  - type: text
    content: 'Incline thine ear unto me, '
  - type: text
    content: and
  - type: text
    content: ' hear my speech.'
  '7':
  - type: text
    content: 'Shew thy marvellous lovingkindness, O thou that savest by thy right hand them which put their trust '
  - type: text
    content: in thee
  - type: text
    content: 'From those that rise up '
  - type: text
    content: against them
  - type: text
    content: .
  '8':
  - type: text
    content: Keep me as the apple of the eye,
  - type: text
    content: Hide me under the shadow of thy wings,
  '9':
  - type: text
    content: From the wicked that oppress me,
  - type: text
    content: From
  - type: text
    content: ' my deadly enemies, '
  - type: text
    content: who
  - type: text
    content: ' compass me about.'
