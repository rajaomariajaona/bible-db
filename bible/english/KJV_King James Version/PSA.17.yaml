document_id: PSA.17
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: A Prayer of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hear the right, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', attend unto my cry,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Give ear unto my prayer, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that goeth
  - type: text
    text: ' not out of feigned lips.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Let my sentence come forth from thy presence;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let thine eyes behold the things that are equal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Thou hast proved mine heart; thou hast visited '
  - type: usfm
    marker: add
    children:
    - type: text
      text: me
  - type: text
    text: ' in the night; Thou hast tried me, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' shalt find nothing;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I am purposed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' my mouth shall not transgress.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Concerning the works of men, by the word of thy lips
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I have kept '
  - type: usfm
    marker: add
    children:
    - type: text
      text: me from
  - type: text
    text: ' the paths of the destroyer.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hold up my goings in thy paths, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' my footsteps slip not.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I have called upon thee, for thou wilt hear me, O God:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Incline thine ear unto me, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' hear my speech.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Shew thy marvellous lovingkindness, O thou that savest by thy right hand them which put their trust '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in thee
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'From those that rise up '
  - type: usfm
    marker: add
    children:
    - type: text
      text: against them
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Keep me as the apple of the eye,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hide me under the shadow of thy wings,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: From the wicked that oppress me,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: From
  - type: text
    text: ' my deadly enemies, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: who
  - type: text
    text: ' compass me about.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'They are inclosed in their own fat:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: With their mouth they speak proudly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'They have now compassed us in our steps:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They have set their eyes bowing down to the earth;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Like as a lion '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' is greedy of his prey,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And as it were a young lion lurking in secret places.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Arise, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', disappoint him, cast him down:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Deliver my soul from the wicked, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which is
  - type: text
    text: ' thy sword:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'From men '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which are
  - type: text
    text: ' thy hand, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', from men of the world,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Which have
  - type: text
    text: ' their portion in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' life, and whose belly thou fillest with thy hid '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'treasure:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are full of children,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And leave the rest of their '
  - type: usfm
    marker: add
    children:
    - type: text
      text: substance
  - type: text
    text: ' to their babes.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'As for me, I will behold thy face in righteousness:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I shall be satisfied, when I awake, with thy likeness.
