document_id: PSA.17,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Prayer of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hear the right, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', attend unto my cry,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Give ear unto my prayer, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that goeth
    - type: text
      text: ' not out of feigned lips.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They are inclosed in their own fat:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With their mouth they speak proudly.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They have now compassed us in our steps:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They have set their eyes bowing down to the earth;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Like as a lion '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' is greedy of his prey,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And as it were a young lion lurking in secret places.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Arise, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', disappoint him, cast him down:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Deliver my soul from the wicked, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which is
    - type: text
      text: ' thy sword:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'From men '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which are
    - type: text
      text: ' thy hand, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', from men of the world,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Which have
    - type: text
      text: ' their portion in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ' life, and whose belly thou fillest with thy hid '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'treasure:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are full of children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And leave the rest of their '
    - type: usfm
      marker: add
      children:
      - type: text
        text: substance
    - type: text
      text: ' to their babes.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'As for me, I will behold thy face in righteousness:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I shall be satisfied, when I awake, with thy likeness.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let my sentence come forth from thy presence;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let thine eyes behold the things that are equal.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou hast proved mine heart; thou hast visited '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ' in the night; Thou hast tried me, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' shalt find nothing;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I am purposed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' my mouth shall not transgress.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Concerning the works of men, by the word of thy lips
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I have kept '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me from
    - type: text
      text: ' the paths of the destroyer.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hold up my goings in thy paths, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' my footsteps slip not.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I have called upon thee, for thou wilt hear me, O God:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Incline thine ear unto me, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' hear my speech.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Shew thy marvellous lovingkindness, O thou that savest by thy right hand them which put their trust '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in thee
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'From those that rise up '
    - type: usfm
      marker: add
      children:
      - type: text
        text: against them
    - type: text
      text: .
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Keep me as the apple of the eye,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Hide me under the shadow of thy wings,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the wicked that oppress me,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: From
    - type: text
      text: ' my deadly enemies, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: who
    - type: text
      text: ' compass me about.'
