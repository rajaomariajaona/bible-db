document_id: 2CO.12
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'It is not expedient for me doubtless to glory. I will come to visions and revelations of the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I knew a man in Christ above fourteen years ago, (whether in the body, I cannot tell; or whether out of the body, I cannot tell: God knoweth;) such an one caught up to the third heaven. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And I knew such a man, (whether in the body, or out of the body, I cannot tell: God knoweth;) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'how that he was caught up into paradise, and heard unspeakable words, which it is not lawful for a man to utter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Of such an one will I glory: yet of myself I will not glory, but in mine infirmities. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For though I would desire to glory, I shall not be a fool; for I will say the truth: but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: now
  - type: text
    text: ' I forbear, lest any man should think of me above that which he seeth me '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ', or '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' he heareth of me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And lest I should be exalted above measure through the abundance of the revelations, there was given to me a thorn in the flesh, the messenger of Satan to buffet me, lest I should be exalted above measure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For this thing I besought the Lord thrice, that it might depart from me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And he said unto me, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'My grace is sufficient for thee: for my strength is made perfect in weakness.'
  - type: text
    text: ' Most gladly therefore will I rather glory in my infirmities, that the power of Christ may rest upon me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Therefore I take pleasure in infirmities, in reproaches, in necessities, in persecutions, in distresses for Christ''s sake: for when I am weak, then am I strong.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I am become a fool in glorying; ye have compelled me: for I ought to have been commended of you: for in nothing am I behind the very chiefest apostles, though I be nothing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Truly the signs of an apostle were wrought among you in all patience, in signs, and wonders, and mighty deeds. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For what is it wherein ye were inferior to other churches, except '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it be
  - type: text
    text: ' that I myself was not burdensome to you? forgive me this wrong. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Behold, the third time I am ready to come to you; and I will not be burdensome to you: for I seek not your''s, but you: for the children ought not to lay up for the parents, but the parents for the children. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And I will very gladly spend and be spent for you; though the more abundantly I love you, the less I be loved. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But be it so, I did not burden you: nevertheless, being crafty, I caught you with guile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Did I make a gain of you by any of them whom I sent unto you? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I desired Titus, and with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' I sent a brother. Did Titus make a gain of you? walked we not in the same spirit? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: walked we
  - type: text
    text: ' not in the same steps?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Again, think ye that we excuse ourselves unto you? we speak before God in Christ: but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: we do
  - type: text
    text: ' all things, dearly beloved, for your edifying. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For I fear, lest, when I come, I shall not find you such as I would, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' I shall be found unto you such as ye would not: lest '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there be
  - type: text
    text: ' debates, envyings, wraths, strifes, backbitings, whisperings, swellings, tumults: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' lest, when I come again, my God will humble me among you, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' I shall bewail many which have sinned already, and have not repented of the uncleanness and fornication and lasciviousness which they have committed.'
