  '13':
  - type: text
    content: 'for Solomon had made a brasen scaffold, of five cubits long, and five cubits broad, and three cubits high, and had set it in the midst of the court: and upon it he stood, and kneeled down upon his knees before all the congregation of Israel, and spread forth his hands toward heaven, '
  '14':
  - type: text
    content: 'and said, O '
  - type: text
    content: LORD
  - type: text
