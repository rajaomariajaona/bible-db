  - type: text
    content: there is
  - type: text
    content: ' no God like thee in the heaven, nor in the earth; which keepest covenant, and '
  - type: text
    content: shewest
  - type: text
    content: ' mercy unto thy servants, that walk before thee with all their hearts: '
  '15':
  - type: text
    content: 'thou which hast kept with thy servant David my father that which thou hast promised him; and spakest with thy mouth, and hast fulfilled '
  - type: text
    content: it
  - type: text
    content: ' with thine hand, as '
  - type: text
    content: it is
  - type: text
    content: ' this day. '
  '16':
  - type: text
    content: 'Now therefore, O '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel, keep with thy servant David my father that which thou hast promised him, saying, There shall not fail thee a man in my sight to sit upon the throne of Israel; yet so that thy children take heed to their way to walk in my law, as thou hast walked before me. '
  '17':
  - type: text
    content: 'Now then, O '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel, let thy word be verified, which thou hast spoken unto thy servant David.'
  '18':
  - type: text
    content: 'But will God in very deed dwell with men on the earth? Behold, heaven and the heaven of heavens cannot contain thee; how much less this house which I have built! '
  '19':
  - type: text
    content: 'Have respect therefore to the prayer of thy servant, and to his supplication, O '
  - type: text
    content: LORD
  - type: text
    content: ' my God, to hearken unto the cry and the prayer which thy servant prayeth before thee: '
  '2':
  - type: text
    content: 'But I have built an house of habitation for thee, and a place for thy dwelling for ever. '
  '20':
  - type: text
    content: 'that thine eyes may be open upon this house day and night, upon the place whereof thou hast said that thou wouldest put thy name there; to hearken unto the prayer which thy servant prayeth toward this place. '
  '21':
  - type: text
    content: 'Hearken therefore unto the supplications of thy servant, and of thy people Israel, which they shall make toward this place: hear thou from thy dwelling place, '
  - type: text
    content: even
  - type: text
    content: ' from heaven; and when thou hearest, forgive.'
  '22':
  - type: text
    content: 'If a man sin against his neighbour, and an oath be laid upon him to make him swear, and the oath come before thine altar in this house; '
  '23':
  - type: text
    content: then hear thou from heaven, and do, and judge thy servants, by requiting the wicked, by recompensing his way upon his own head; and by justifying the righteous, by giving him according to his righteousness.
  '24':
  - type: text
    content: 'And if thy people Israel be put to the worse before the enemy, because they have sinned against thee; and shall return and confess thy name, and pray and make supplication before thee in this house; '
  '25':
  - type: text
    content: then hear thou from the heavens, and forgive the sin of thy people Israel, and bring them again unto the land which thou gavest to them and to their fathers.
  '26':
  - type: text
    content: 'When the heaven is shut up, and there is no rain, because they have sinned against thee; '
  - type: text
    content: yet
  - type: text
    content: ' if they pray toward this place, and confess thy name, and turn from their sin, when thou dost afflict them; '
  '27':
  - type: text
    content: then hear thou from heaven, and forgive the sin of thy servants, and of thy people Israel, when thou hast taught them the good way, wherein they should walk; and send rain upon thy land, which thou hast given unto thy people for an inheritance.
  '28':
  - type: text
    content: 'If there be dearth in the land, if there be pestilence, if there be blasting, or mildew, locusts, or caterpillers; if their enemies besiege them in the cities of their land; whatsoever sore or whatsoever sickness '
  - type: text
    content: 'there be:'
  - type: text
    content: ' '
  '29':
  - type: text
    content: then
  - type: text
    content: ' what prayer '
  - type: text
    content: or
  - type: text
    content: ' what supplication soever shall be made of any man, or of all thy people Israel, when every one shall know his own sore and his own grief, and shall spread forth his hands in this house: '
  '3':
  - type: text
    content: 'And the king turned his face, and blessed the whole congregation of Israel: and all the congregation of Israel stood.'
  '30':
  - type: text
    content: 'then hear thou from heaven thy dwelling place, and forgive, and render unto every man according unto all his ways, whose heart thou knowest; (for thou only knowest the hearts of the children of men:) '
  '31':
  - type: text
    content: that they may fear thee, to walk in thy ways, so long as they live in the land which thou gavest unto our fathers.
  '32':
  - type: text
    content: 'Moreover concerning the stranger, which is not of thy people Israel, but is come from a far country for thy great name''s sake, and thy mighty hand, and thy stretched out arm; if they come and pray in this house; '
  '33':
  - type: text
    content: 'then hear thou from the heavens, '
  - type: text
    content: even
  - type: text
    content: ' from thy dwelling place, and do according to all that the stranger calleth to thee for; that all people of the earth may know thy name, and fear thee, as '
  - type: text
    content: doth
  - type: text
    content: ' thy people Israel, and may know that this house which I have built is called by thy name.'
  '34':
  - type: text
    content: 'If thy people go out to war against their enemies by the way that thou shalt send them, and they pray unto thee toward this city which thou hast chosen, and the house which I have built for thy name; '
  '35':
  - type: text
    content: then hear thou from the heavens their prayer and their supplication, and maintain their cause.
  '36':
  - type: text
    content: 'If they sin against thee, (for '
  - type: text
    content: there is
  - type: text
    content: ' no man which sinneth not,) and thou be angry with them, and deliver them over before '
  - type: text
    content: their
  - type: text
    content: ' enemies, and they carry them away captives unto a land far off or near; '
  '37':
  - type: text
    content: 'yet '
  - type: text
    content: if
  - type: text
    content: ' they bethink themselves in the land whither they are carried captive, and turn and pray unto thee in the land of their captivity, saying, We have sinned, we have done amiss, and have dealt wickedly; '
  '38':
  - type: text
    content: 'if they return to thee with all their heart and with all their soul in the land of their captivity, whither they have carried them captives, and pray toward their land, which thou gavest unto their fathers, and '
  - type: text
    content: toward
  - type: text
    content: ' the city which thou hast chosen, and toward the house which I have built for thy name: '
  '39':
  - type: text
    content: 'then hear thou from the heavens, '
  - type: text
    content: even
  - type: text
    content: ' from thy dwelling place, their prayer and their supplications, and maintain their cause, and forgive thy people which have sinned against thee.'
  '4':
  - type: text
    content: 'And he said, Blessed '
  - type: text
    content: be
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel, who hath with his hands fulfilled '
  - type: text
    content: that
  - type: text
    content: ' which he spake with his mouth to my father David, saying, '
  '40':
  - type: text
    content: 'Now, my God, let, I beseech thee, thine eyes be open, and '
  - type: text
    content: let
  - type: text
    content: ' thine ears '
  - type: text
    content: be
  - type: text
    content: ' attent unto the prayer '
  - type: text
    content: that is made
  - type: text
    content: ' in this place. '
  '41':
  - type: text
    content: 'Now therefore arise, O '
  - type: text
    content: LORD
  - type: text
    content: ' God, into thy resting place, thou, and the ark of thy strength: let thy priests, O '
  - type: text
    content: LORD
  - type: text
    content: ' God, be clothed with salvation, and let thy saints rejoice in goodness. '
  '42':
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ' God, turn not away the face of thine anointed: remember the mercies of David thy servant.'
  '5':
  - type: text
    content: 'Since the day that I brought forth my people out of the land of Egypt I chose no city among all the tribes of Israel to build an house in, that my name might be there; neither chose I any man to be a ruler over my people Israel: '
  '6':
  - type: text
    content: 'but I have chosen Jerusalem, that my name might be there; and have chosen David to be over my people Israel. '
  '7':
  - type: text
    content: 'Now it was in the heart of David my father to build an house for the name of the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel. '
  '8':
  - type: text
    content: 'But the '
  - type: text
    content: LORD
  - type: text
    content: ' said to David my father, Forasmuch as it was in thine heart to build an house for my name, thou didst well in that it was in thine heart: '
  '9':
  - type: text
    content: 'notwithstanding thou shalt not build the house; but thy son which shall come forth out of thy loins, he shall build the house for my name. '
