document_id: 2CH.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then said Solomon, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath said that he would dwell in the thick darkness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'But I have built an house of habitation for thee, and a place for thy dwelling for ever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And the king turned his face, and blessed the whole congregation of Israel: and all the congregation of Israel stood.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And he said, Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel, who hath with his hands fulfilled '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' which he spake with his mouth to my father David, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Since the day that I brought forth my people out of the land of Egypt I chose no city among all the tribes of Israel to build an house in, that my name might be there; neither chose I any man to be a ruler over my people Israel: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'but I have chosen Jerusalem, that my name might be there; and have chosen David to be over my people Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now it was in the heart of David my father to build an house for the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said to David my father, Forasmuch as it was in thine heart to build an house for my name, thou didst well in that it was in thine heart: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'notwithstanding thou shalt not build the house; but thy son which shall come forth out of thy loins, he shall build the house for my name. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' therefore hath performed his word that he hath spoken: for I am risen up in the room of David my father, and am set on the throne of Israel, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' promised, and have built the house for the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And in it have I put the ark, wherein '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the covenant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that he made with the children of Israel.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Solomon's Prayer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And he stood before the altar of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' in the presence of all the congregation of Israel, and spread forth his hands: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'for Solomon had made a brasen scaffold, of five cubits long, and five cubits broad, and three cubits high, and had set it in the midst of the court: and upon it he stood, and kneeled down upon his knees before all the congregation of Israel, and spread forth his hands toward heaven, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and said, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no God like thee in the heaven, nor in the earth; which keepest covenant, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shewest
  - type: text
    text: ' mercy unto thy servants, that walk before thee with all their hearts: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'thou which hast kept with thy servant David my father that which thou hast promised him; and spakest with thy mouth, and hast fulfilled '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' with thine hand, as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' this day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Now therefore, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel, keep with thy servant David my father that which thou hast promised him, saying, There shall not fail thee a man in my sight to sit upon the throne of Israel; yet so that thy children take heed to their way to walk in my law, as thou hast walked before me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now then, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel, let thy word be verified, which thou hast spoken unto thy servant David.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But will God in very deed dwell with men on the earth? Behold, heaven and the heaven of heavens cannot contain thee; how much less this house which I have built! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Have respect therefore to the prayer of thy servant, and to his supplication, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' my God, to hearken unto the cry and the prayer which thy servant prayeth before thee: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'that thine eyes may be open upon this house day and night, upon the place whereof thou hast said that thou wouldest put thy name there; to hearken unto the prayer which thy servant prayeth toward this place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hearken therefore unto the supplications of thy servant, and of thy people Israel, which they shall make toward this place: hear thou from thy dwelling place, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' from heaven; and when thou hearest, forgive.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'If a man sin against his neighbour, and an oath be laid upon him to make him swear, and the oath come before thine altar in this house; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: then hear thou from heaven, and do, and judge thy servants, by requiting the wicked, by recompensing his way upon his own head; and by justifying the righteous, by giving him according to his righteousness.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And if thy people Israel be put to the worse before the enemy, because they have sinned against thee; and shall return and confess thy name, and pray and make supplication before thee in this house; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: then hear thou from the heavens, and forgive the sin of thy people Israel, and bring them again unto the land which thou gavest to them and to their fathers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'When the heaven is shut up, and there is no rain, because they have sinned against thee; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yet
  - type: text
    text: ' if they pray toward this place, and confess thy name, and turn from their sin, when thou dost afflict them; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: then hear thou from heaven, and forgive the sin of thy servants, and of thy people Israel, when thou hast taught them the good way, wherein they should walk; and send rain upon thy land, which thou hast given unto thy people for an inheritance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'If there be dearth in the land, if there be pestilence, if there be blasting, or mildew, locusts, or caterpillers; if their enemies besiege them in the cities of their land; whatsoever sore or whatsoever sickness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'there be:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' what prayer '
  - type: usfm
    marker: add
    children:
    - type: text
      text: or
  - type: text
    text: ' what supplication soever shall be made of any man, or of all thy people Israel, when every one shall know his own sore and his own grief, and shall spread forth his hands in this house: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'then hear thou from heaven thy dwelling place, and forgive, and render unto every man according unto all his ways, whose heart thou knowest; (for thou only knowest the hearts of the children of men:) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: that they may fear thee, to walk in thy ways, so long as they live in the land which thou gavest unto our fathers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Moreover concerning the stranger, which is not of thy people Israel, but is come from a far country for thy great name''s sake, and thy mighty hand, and thy stretched out arm; if they come and pray in this house; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'then hear thou from the heavens, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' from thy dwelling place, and do according to all that the stranger calleth to thee for; that all people of the earth may know thy name, and fear thee, as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: doth
  - type: text
    text: ' thy people Israel, and may know that this house which I have built is called by thy name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'If thy people go out to war against their enemies by the way that thou shalt send them, and they pray unto thee toward this city which thou hast chosen, and the house which I have built for thy name; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: then hear thou from the heavens their prayer and their supplication, and maintain their cause.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'If they sin against thee, (for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no man which sinneth not,) and thou be angry with them, and deliver them over before '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' enemies, and they carry them away captives unto a land far off or near; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'yet '
  - type: usfm
    marker: add
    children:
    - type: text
      text: if
  - type: text
    text: ' they bethink themselves in the land whither they are carried captive, and turn and pray unto thee in the land of their captivity, saying, We have sinned, we have done amiss, and have dealt wickedly; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'if they return to thee with all their heart and with all their soul in the land of their captivity, whither they have carried them captives, and pray toward their land, which thou gavest unto their fathers, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: toward
  - type: text
    text: ' the city which thou hast chosen, and toward the house which I have built for thy name: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'then hear thou from the heavens, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' from thy dwelling place, their prayer and their supplications, and maintain their cause, and forgive thy people which have sinned against thee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Now, my God, let, I beseech thee, thine eyes be open, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: let
  - type: text
    text: ' thine ears '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' attent unto the prayer '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is made
  - type: text
    text: ' in this place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Now therefore arise, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God, into thy resting place, thou, and the ark of thy strength: let thy priests, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God, be clothed with salvation, and let thy saints rejoice in goodness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God, turn not away the face of thine anointed: remember the mercies of David thy servant.'
