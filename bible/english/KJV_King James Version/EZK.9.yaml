document_id: EZK.9,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Slaughter of the People
  - type: text
    content: 'He cried also in mine ears with a loud voice, saying, Cause them that have charge over the city to draw near, even every man '
  - type: text
    content: with
  - type: text
    content: ' his destroying weapon in his hand. '
  '10':
  - type: text
    content: 'And as for me also, mine eye shall not spare, neither will I have pity, '
  - type: text
    content: but
  - type: text
    content: ' I will recompense their way upon their head. '
  '11':
  - type: text
    content: 'And, behold, the man clothed with linen, which '
  - type: text
    content: had
  - type: text
    content: ' the inkhorn by his side, reported the matter, saying, I have done as thou hast commanded me.'
  '2':
  - type: text
    content: 'And, behold, six men came from the way of the higher gate, which lieth toward the north, and every man a slaughter weapon in his hand; and one man among them '
  - type: text
    content: was
  - type: text
    content: ' clothed with linen, with a writer''s inkhorn by his side: and they went in, and stood beside the brasen altar. '
  '3':
  - type: text
    content: 'And the glory of the God of Israel was gone up from the cherub, whereupon he was, to the threshold of the house. And he called to the man clothed with linen, which '
  - type: text
    content: had
  - type: text
    content: ' the writer''s inkhorn by his side; '
  '4':
  - type: text
    content: 'and the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto him, Go through the midst of the city, through the midst of Jerusalem, and set a mark upon the foreheads of the men that sigh and that cry for all the abominations that be done in the midst thereof.'
  '5':
  - type: text
    content: 'And to the others he said in mine hearing, Go ye after him through the city, and smite: let not your eye spare, neither have ye pity: '
  '6':
  - type: text
    content: 'slay utterly old '
  - type: text
    content: and
  - type: text
    content: ' young, both maids, and little children, and women: but come not near any man upon whom '
  - type: text
    content: is
  - type: text
    content: ' the mark; and begin at my sanctuary. Then they began at the ancient men which '
  - type: text
    content: were
  - type: text
    content: ' before the house. '
  '7':
  - type: text
    content: 'And he said unto them, Defile the house, and fill the courts with the slain: go ye forth. And they went forth, and slew in the city. '
  '8':
  - type: text
    content: 'And it came to pass, while they were slaying them, and I was left, that I fell upon my face, and cried, and said, Ah Lord '
  - type: text
    content: GOD
  - type: text
    content: '! wilt thou destroy all the residue of Israel in thy pouring out of thy fury upon Jerusalem?'
  '9':
  - type: text
    content: 'Then said he unto me, The iniquity of the house of Israel and Judah '
  - type: text
    content: is
  - type: text
    content: ' exceeding great, and the land is full of blood, and the city full of perverseness: for they say, The '
  - type: text
    content: LORD
  - type: text
    content: ' hath forsaken the earth, and the '
  - type: text
    content: LORD
  - type: text
    content: ' seeth not.'
