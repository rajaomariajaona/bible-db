document_id: EZK.9
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Slaughter of the People
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'He cried also in mine ears with a loud voice, saying, Cause them that have charge over the city to draw near, even every man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' his destroying weapon in his hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And, behold, six men came from the way of the higher gate, which lieth toward the north, and every man a slaughter weapon in his hand; and one man among them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' clothed with linen, with a writer''s inkhorn by his side: and they went in, and stood beside the brasen altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And the glory of the God of Israel was gone up from the cherub, whereupon he was, to the threshold of the house. And he called to the man clothed with linen, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: had
  - type: text
    text: ' the writer''s inkhorn by his side; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto him, Go through the midst of the city, through the midst of Jerusalem, and set a mark upon the foreheads of the men that sigh and that cry for all the abominations that be done in the midst thereof.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And to the others he said in mine hearing, Go ye after him through the city, and smite: let not your eye spare, neither have ye pity: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'slay utterly old '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' young, both maids, and little children, and women: but come not near any man upon whom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the mark; and begin at my sanctuary. Then they began at the ancient men which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' before the house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And he said unto them, Defile the house, and fill the courts with the slain: go ye forth. And they went forth, and slew in the city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And it came to pass, while they were slaying them, and I was left, that I fell upon my face, and cried, and said, Ah Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '! wilt thou destroy all the residue of Israel in thy pouring out of thy fury upon Jerusalem?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then said he unto me, The iniquity of the house of Israel and Judah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' exceeding great, and the land is full of blood, and the city full of perverseness: for they say, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath forsaken the earth, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' seeth not.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And as for me also, mine eye shall not spare, neither will I have pity, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' I will recompense their way upon their head. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And, behold, the man clothed with linen, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: had
  - type: text
    text: ' the inkhorn by his side, reported the matter, saying, I have done as thou hast commanded me.'
