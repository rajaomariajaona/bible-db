document_id: 1CH.6
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sons of Levi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The sons of Levi; Gershon, Kohath, and Merari. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the sons of Kohath; Amram, Izhar, and Hebron, and Uzziel. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And the children of Amram; Aaron, and Moses, and Miriam. The sons also of Aaron; Nadab, and Abihu, Eleazar, and Ithamar. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Eleazar begat Phinehas, Phinehas begat Abishua, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and Abishua begat Bukki, and Bukki begat Uzzi, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and Uzzi begat Zerahiah, and Zerahiah begat Meraioth, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Meraioth begat Amariah, and Amariah begat Ahitub, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and Ahitub begat Zadok, and Zadok begat Ahimaaz, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and Ahimaaz begat Azariah, and Azariah begat Johanan, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and Johanan begat Azariah, (he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' that executed the priest''s office in the temple that Solomon built in Jerusalem:) '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and Azariah begat Amariah, and Amariah begat Ahitub, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and Ahitub begat Zadok, and Zadok begat Shallum, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and Shallum begat Hilkiah, and Hilkiah begat Azariah, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and Azariah begat Seraiah, and Seraiah begat Jehozadak, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and Jehozadak went '
  - type: usfm
    marker: add
    children:
    - type: text
      text: into captivity
  - type: text
    text: ', when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' carried away Judah and Jerusalem by the hand of Nebuchadnezzar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The sons of Levi; Gershom, Kohath, and Merari. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' the names of the sons of Gershom; Libni, and Shimei. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And the sons of Kohath '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ', Amram, and Izhar, and Hebron, and Uzziel. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The sons of Merari; Mahli, and Mushi. And these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the families of the Levites according to their fathers. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Of Gershom; Libni his son, Jahath his son, Zimmah his son, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Joah his son, Iddo his son, Zerah his son, Jeaterai his son. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The sons of Kohath; Amminadab his son, Korah his son, Assir his son, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Elkanah his son, and Ebiasaph his son, and Assir his son, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tahath his son, Uriel his son, Uzziah his son, and Shaul his son. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And the sons of Elkanah; Amasai, and Ahimoth. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: add
    children:
    - type: text
      text: As for
  - type: text
    text: ' Elkanah: the sons of Elkanah; Zophai his son, and Nahath his son, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Eliab his son, Jeroham his son, Elkanah his son. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And the sons of Samuel; the firstborn Vashni, and Abiah. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'The sons of Merari; Mahli, Libni his son, Shimei his son, Uzza his son, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Shimea his son, Haggiah his son, Asaiah his son.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are they
  - type: text
    text: ' whom David set over the service of song in the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', after that the ark had rest. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And they ministered before the dwelling place of the tabernacle of the congregation with singing, until Solomon had built the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' in Jerusalem: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' they waited on their office according to their order. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' they that waited with their children. Of the sons of the Kohathites: Heman a singer, the son of Joel, the son of Shemuel, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'the son of Elkanah, the son of Jeroham, the son of Eliel, the son of Toah, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'the son of Zuph, the son of Elkanah, the son of Mahath, the son of Amasai, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'the son of Elkanah, the son of Joel, the son of Azariah, the son of Zephaniah, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'the son of Tahath, the son of Assir, the son of Ebiasaph, the son of Korah, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'the son of Izhar, the son of Kohath, the son of Levi, the son of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And his brother Asaph, who stood on his right hand, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' Asaph the son of Berachiah, the son of Shimea, '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'the son of Michael, the son of Baaseiah, the son of Malchiah, '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'the son of Ethni, the son of Zerah, the son of Adaiah, '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'the son of Ethan, the son of Zimmah, the son of Shimei, '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'the son of Jahath, the son of Gershom, the son of Levi. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'And their brethren the sons of Merari '
  - type: usfm
    marker: add
    children:
    - type: text
      text: stood
  - type: text
    text: ' on the left hand: Ethan the son of Kishi, the son of Abdi, the son of Malluch, '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'the son of Hashabiah, the son of Amaziah, the son of Hilkiah, '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'the son of Amzi, the son of Bani, the son of Shamer, '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'the son of Mahli, the son of Mushi, the son of Merari, the son of Levi. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Their brethren also the Levites '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' appointed unto all manner of service of the tabernacle of the house of God.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sons of Aaron
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'But Aaron and his sons offered upon the altar of the burnt offering, and on the altar of incense, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and were appointed
  - type: text
    text: ' for all the work of the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: place
  - type: text
    text: ' most holy, and to make an atonement for Israel, according to all that Moses the servant of God had commanded. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'And these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the sons of Aaron; Eleazar his son, Phinehas his son, Abishua his son, '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Bukki his son, Uzzi his son, Zerahiah his son, '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Meraioth his son, Amariah his son, Ahitub his son, '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Zadok his son, Ahimaaz his son.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Now these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' their dwelling places throughout their castles in their coasts, of the sons of Aaron, of the families of the Kohathites: for their''s was the lot. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'And they gave them Hebron in the land of Judah, and the suburbs thereof round about it. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'But the fields of the city, and the villages thereof, they gave to Caleb the son of Jephunneh. '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'And to the sons of Aaron they gave the cities of Judah, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: namely
  - type: text
    text: ', Hebron, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the city
  - type: text
    text: ' of refuge, and Libnah with her suburbs, and Jattir, and Eshtemoa, with their suburbs, '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'and Hilen with her suburbs, Debir with her suburbs, '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'and Ashan with her suburbs, and Beth-shemesh with her suburbs: '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'and out of the tribe of Benjamin; Geba with her suburbs, and Alemeth with her suburbs, and Anathoth with her suburbs. All their cities throughout their families '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' thirteen cities.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'And unto the sons of Kohath, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which were
  - type: text
    text: ' left of the family of that tribe, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were cities given
  - type: text
    text: ' out of the half tribe, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: namely, out of
  - type: text
    text: ' the half '
  - type: usfm
    marker: add
    children:
    - type: text
      text: tribe
  - type: text
    text: ' of Manasseh, by lot, ten cities. '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'And to the sons of Gershom throughout their families out of the tribe of Issachar, and out of the tribe of Asher, and out of the tribe of Naphtali, and out of the tribe of Manasseh in Bashan, thirteen cities. '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Unto the sons of Merari '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were given
  - type: text
    text: ' by lot, throughout their families, out of the tribe of Reuben, and out of the tribe of Gad, and out of the tribe of Zebulun, twelve cities. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'And the children of Israel gave to the Levites '
  - type: usfm
    marker: add
    children:
    - type: text
      text: these
  - type: text
    text: ' cities with their suburbs. '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'And they gave by lot out of the tribe of the children of Judah, and out of the tribe of the children of Simeon, and out of the tribe of the children of Benjamin, these cities, which are called by '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' names.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
