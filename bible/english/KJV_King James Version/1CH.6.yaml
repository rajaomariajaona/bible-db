document_id: 1CH.6,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Sons of Levi
  - type: text
    content: 'The sons of Levi; Gershon, Kohath, and Merari. '
  '10':
  - type: text
    content: 'and Johanan begat Azariah, (he '
  - type: text
    content: it is
  - type: text
    content: ' that executed the priest''s office in the temple that Solomon built in Jerusalem:) '
  '11':
  - type: text
    content: 'and Azariah begat Amariah, and Amariah begat Ahitub, '
  '12':
  - type: text
    content: 'and Ahitub begat Zadok, and Zadok begat Shallum, '
  '13':
  - type: text
    content: 'and Shallum begat Hilkiah, and Hilkiah begat Azariah, '
  '14':
  - type: text
    content: 'and Azariah begat Seraiah, and Seraiah begat Jehozadak, '
  '15':
  - type: text
    content: 'and Jehozadak went '
  - type: text
    content: into captivity
  - type: text
    content: ', when the '
  - type: text
    content: LORD
  - type: text
    content: ' carried away Judah and Jerusalem by the hand of Nebuchadnezzar.'
  '16':
  - type: text
    content: 'The sons of Levi; Gershom, Kohath, and Merari. '
  '17':
  - type: text
    content: 'And these '
  - type: text
    content: be
  - type: text
    content: ' the names of the sons of Gershom; Libni, and Shimei. '
  '18':
  - type: text
    content: 'And the sons of Kohath '
  - type: text
    content: were
  - type: text
    content: ', Amram, and Izhar, and Hebron, and Uzziel. '
  '19':
  - type: text
    content: 'The sons of Merari; Mahli, and Mushi. And these '
  - type: text
    content: are
  - type: text
    content: ' the families of the Levites according to their fathers. '
  '2':
  - type: text
    content: 'And the sons of Kohath; Amram, Izhar, and Hebron, and Uzziel. '
  '20':
  - type: text
    content: 'Of Gershom; Libni his son, Jahath his son, Zimmah his son, '
  '21':
  - type: text
    content: 'Joah his son, Iddo his son, Zerah his son, Jeaterai his son. '
  '22':
  - type: text
    content: 'The sons of Kohath; Amminadab his son, Korah his son, Assir his son, '
  '23':
  - type: text
    content: 'Elkanah his son, and Ebiasaph his son, and Assir his son, '
  '24':
  - type: text
    content: 'Tahath his son, Uriel his son, Uzziah his son, and Shaul his son. '
  '25':
  - type: text
    content: 'And the sons of Elkanah; Amasai, and Ahimoth. '
  '26':
  - type: text
    content: As for
  - type: text
    content: ' Elkanah: the sons of Elkanah; Zophai his son, and Nahath his son, '
  '27':
  - type: text
    content: 'Eliab his son, Jeroham his son, Elkanah his son. '
  '28':
  - type: text
    content: 'And the sons of Samuel; the firstborn Vashni, and Abiah. '
  '29':
  - type: text
    content: 'The sons of Merari; Mahli, Libni his son, Shimei his son, Uzza his son, '
  '3':
  - type: text
    content: 'And the children of Amram; Aaron, and Moses, and Miriam. The sons also of Aaron; Nadab, and Abihu, Eleazar, and Ithamar. '
  '30':
  - type: text
    content: Shimea his son, Haggiah his son, Asaiah his son.
  '31':
  - type: text
    content: 'And these '
  - type: text
    content: are they
  - type: text
    content: ' whom David set over the service of song in the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', after that the ark had rest. '
  '32':
  - type: text
    content: 'And they ministered before the dwelling place of the tabernacle of the congregation with singing, until Solomon had built the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' in Jerusalem: and '
  - type: text
    content: then
  - type: text
    content: ' they waited on their office according to their order. '
  '33':
  - type: text
    content: 'And these '
  - type: text
    content: are
  - type: text
    content: ' they that waited with their children. Of the sons of the Kohathites: Heman a singer, the son of Joel, the son of Shemuel, '
  '34':
  - type: text
    content: 'the son of Elkanah, the son of Jeroham, the son of Eliel, the son of Toah, '
  '35':
  - type: text
    content: 'the son of Zuph, the son of Elkanah, the son of Mahath, the son of Amasai, '
  '36':
  - type: text
    content: 'the son of Elkanah, the son of Joel, the son of Azariah, the son of Zephaniah, '
  '37':
  - type: text
    content: 'the son of Tahath, the son of Assir, the son of Ebiasaph, the son of Korah, '
  '38':
  - type: text
    content: 'the son of Izhar, the son of Kohath, the son of Levi, the son of Israel. '
  '39':
  - type: text
    content: 'And his brother Asaph, who stood on his right hand, '
  - type: text
    content: even
  - type: text
    content: ' Asaph the son of Berachiah, the son of Shimea, '
  '4':
  - type: text
    content: 'Eleazar begat Phinehas, Phinehas begat Abishua, '
  '40':
  - type: text
    content: 'the son of Michael, the son of Baaseiah, the son of Malchiah, '
  '41':
  - type: text
    content: 'the son of Ethni, the son of Zerah, the son of Adaiah, '
  '42':
  - type: text
    content: 'the son of Ethan, the son of Zimmah, the son of Shimei, '
  '43':
  - type: text
    content: 'the son of Jahath, the son of Gershom, the son of Levi. '
  '44':
  - type: text
    content: 'And their brethren the sons of Merari '
  - type: text
    content: stood
  - type: text
    content: ' on the left hand: Ethan the son of Kishi, the son of Abdi, the son of Malluch, '
  '45':
  - type: text
    content: 'the son of Hashabiah, the son of Amaziah, the son of Hilkiah, '
  '46':
  - type: text
    content: 'the son of Amzi, the son of Bani, the son of Shamer, '
  '47':
  - type: text
    content: 'the son of Mahli, the son of Mushi, the son of Merari, the son of Levi. '
  '48':
  - type: text
    content: 'Their brethren also the Levites '
  - type: text
    content: were
  - type: text
    content: ' appointed unto all manner of service of the tabernacle of the house of God.'
  - type: heading
    content: Sons of Aaron
  '49':
  - type: text
    content: 'But Aaron and his sons offered upon the altar of the burnt offering, and on the altar of incense, '
  - type: text
    content: and were appointed
  - type: text
    content: ' for all the work of the '
  - type: text
    content: place
  - type: text
    content: ' most holy, and to make an atonement for Israel, according to all that Moses the servant of God had commanded. '
  '5':
  - type: text
    content: 'and Abishua begat Bukki, and Bukki begat Uzzi, '
  '50':
  - type: text
    content: 'And these '
  - type: text
    content: are
  - type: text
    content: ' the sons of Aaron; Eleazar his son, Phinehas his son, Abishua his son, '
  '51':
  - type: text
    content: 'Bukki his son, Uzzi his son, Zerahiah his son, '
  '52':
  - type: text
    content: 'Meraioth his son, Amariah his son, Ahitub his son, '
  '53':
  - type: text
    content: Zadok his son, Ahimaaz his son.
  '54':
  - type: text
    content: 'Now these '
  - type: text
    content: are
  - type: text
    content: ' their dwelling places throughout their castles in their coasts, of the sons of Aaron, of the families of the Kohathites: for their''s was the lot. '
  '55':
  - type: text
    content: 'And they gave them Hebron in the land of Judah, and the suburbs thereof round about it. '
  '56':
  - type: text
    content: 'But the fields of the city, and the villages thereof, they gave to Caleb the son of Jephunneh. '
  '57':
  - type: text
    content: 'And to the sons of Aaron they gave the cities of Judah, '
  - type: text
    content: namely
  - type: text
    content: ', Hebron, '
  - type: text
    content: the city
  - type: text
    content: ' of refuge, and Libnah with her suburbs, and Jattir, and Eshtemoa, with their suburbs, '
  '58':
  - type: text
    content: 'and Hilen with her suburbs, Debir with her suburbs, '
  '59':
  - type: text
    content: 'and Ashan with her suburbs, and Beth-shemesh with her suburbs: '
  '6':
  - type: text
    content: 'and Uzzi begat Zerahiah, and Zerahiah begat Meraioth, '
  '60':
  - type: text
    content: 'and out of the tribe of Benjamin; Geba with her suburbs, and Alemeth with her suburbs, and Anathoth with her suburbs. All their cities throughout their families '
  - type: text
    content: were
  - type: text
    content: ' thirteen cities.'
  '61':
  - type: text
    content: 'And unto the sons of Kohath, '
  - type: text
    content: which were
  - type: text
    content: ' left of the family of that tribe, '
  - type: text
    content: were cities given
  - type: text
    content: ' out of the half tribe, '
  - type: text
    content: namely, out of
  - type: text
    content: ' the half '
  - type: text
    content: tribe
  - type: text
    content: ' of Manasseh, by lot, ten cities. '
  '62':
  - type: text
    content: 'And to the sons of Gershom throughout their families out of the tribe of Issachar, and out of the tribe of Asher, and out of the tribe of Naphtali, and out of the tribe of Manasseh in Bashan, thirteen cities. '
  '63':
  - type: text
    content: 'Unto the sons of Merari '
  - type: text
    content: were given
  - type: text
    content: ' by lot, throughout their families, out of the tribe of Reuben, and out of the tribe of Gad, and out of the tribe of Zebulun, twelve cities. '
  '64':
  - type: text
    content: 'And the children of Israel gave to the Levites '
  - type: text
    content: these
  - type: text
    content: ' cities with their suburbs. '
  '65':
  - type: text
    content: 'And they gave by lot out of the tribe of the children of Judah, and out of the tribe of the children of Simeon, and out of the tribe of the children of Benjamin, these cities, which are called by '
  - type: text
    content: their
  - type: text
    content: ' names.'
  '66':
  - type: text
    content: 'And '
  - type: text
    content: the residue
  - type: text
    content: ' of the families of the sons of Kohath had cities of their coasts out of the tribe of Ephraim. '
  '67':
  - type: text
    content: 'And they gave unto them, '
  - type: text
    content: of
  - type: text
    content: ' the cities of refuge, Shechem in mount Ephraim with her suburbs; '
  - type: text
    content: they gave
  - type: text
    content: ' also Gezer with her suburbs, '
  '68':
  - type: text
    content: 'and Jokmeam with her suburbs, and Beth-horon with her suburbs, '
  '69':
  - type: text
    content: 'and Aijalon with her suburbs, and Gath-rimmon with her suburbs: '
  '7':
  - type: text
    content: 'Meraioth begat Amariah, and Amariah begat Ahitub, '
  '70':
  - type: text
    content: and out of the half tribe of Manasseh; Aner with her suburbs, and Bileam with her suburbs, for the family of the remnant of the sons of Kohath.
  '71':
  - type: text
    content: 'Unto the sons of Gershom '
  - type: text
    content: were given
  - type: text
    content: ' out of the family of the half tribe of Manasseh, Golan in Bashan with her suburbs, and Ashtaroth with her suburbs: '
  '72':
  - type: text
    content: 'and out of the tribe of Issachar; Kedesh with her suburbs, Daberath with her suburbs, '
  '73':
  - type: text
    content: 'and Ramoth with her suburbs, and Anem with her suburbs: '
  '74':
  - type: text
    content: 'and out of the tribe of Asher; Mashal with her suburbs, and Abdon with her suburbs, '
  '75':
  - type: text
    content: 'and Hukok with her suburbs, and Rehob with her suburbs: '
  '76':
  - type: text
    content: and out of the tribe of Naphtali; Kedesh in Galilee with her suburbs, and Hammon with her suburbs, and Kirjathaim with her suburbs.
  '77':
  - type: text
    content: 'Unto the rest of the children of Merari '
  - type: text
    content: were given
  - type: text
    content: ' out of the tribe of Zebulun, Rimmon with her suburbs, Tabor with her suburbs: '
  '78':
  - type: text
    content: 'and on the other side Jordan by Jericho, on the east side of Jordan, '
  - type: text
    content: were given them
  - type: text
    content: ' out of the tribe of Reuben, Bezer in the wilderness with her suburbs, and Jahzah with her suburbs, '
  '79':
  - type: text
    content: 'Kedemoth also with her suburbs, and Mephaath with her suburbs: '
  '8':
  - type: text
    content: 'and Ahitub begat Zadok, and Zadok begat Ahimaaz, '
  '80':
  - type: text
    content: 'and out of the tribe of Gad; Ramoth in Gilead with her suburbs, and Mahanaim with her suburbs, '
  '81':
  - type: text
    content: and Heshbon with her suburbs, and Jazer with her suburbs.
  '9':
  - type: text
    content: 'and Ahimaaz begat Azariah, and Azariah begat Johanan, '
