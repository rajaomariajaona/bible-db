document_id: ISA.36
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Isaiah and Hezekiah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now it came to pass in the fourteenth year of king Hezekiah, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' Sennacherib king of Assyria came up against all the defenced cities of Judah, and took them. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the king of Assyria sent Rabshakeh from Lachish to Jerusalem unto king Hezekiah with a great army. And he stood by the conduit of the upper pool in the highway of the fuller''s field. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Then came forth unto him Eliakim, Hilkiah's son, which was over the house, and Shebna the scribe, and Joah, Asaph's son, the recorder.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Assyrian Threat
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Rabshakeh said unto them, Say ye now to Hezekiah, Thus saith the great king, the king of Assyria, What confidence '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this wherein thou trustest? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I say, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: sayest thou
  - type: text
    text: ', (but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they are but
  - type: text
    text: ' vain words) '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I have
  - type: text
    text: ' counsel and strength for war: now on whom dost thou trust, that thou rebellest against me? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Lo, thou trustest in the staff of this broken reed, on Egypt; whereon if a man lean, it will go into his hand, and pierce it: so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Pharaoh king of Egypt to all that trust in him. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But if thou say to me, We trust in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' our God: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is it
  - type: text
    text: ' not he, whose high places and whose altars Hezekiah hath taken away, and said to Judah and to Jerusalem, Ye shall worship before this altar? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now therefore give pledges, I pray thee, to my master the king of Assyria, and I will give thee two thousand horses, if thou be able on thy part to set riders upon them. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'How then wilt thou turn away the face of one captain of the least of my master''s servants, and put thy trust on Egypt for chariots and for horsemen? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And am I now come up without the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' against this land to destroy it? the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto me, Go up against this land, and destroy it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then said Eliakim and Shebna and Joah unto Rabshakeh, Speak, I pray thee, unto thy servants in the Syrian language; for we understand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'it:'
  - type: text
    text: ' and speak not to us in the Jews'' language, in the ears of the people that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' on the wall. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But Rabshakeh said, Hath my master sent me to thy master and to thee to speak these words? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hath he
  - type: text
    text: ' not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: sent me
  - type: text
    text: ' to the men that sit upon the wall, that they may eat their own dung, and drink their own piss with you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Rabshakeh stood, and cried with a loud voice in the Jews'' language, and said, Hear ye the words of the great king, the king of Assyria. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Thus saith the king, Let not Hezekiah deceive you: for he shall not be able to deliver you. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Neither let Hezekiah make you trust in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', saying, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will surely deliver us: this city shall not be delivered into the hand of the king of Assyria. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hearken not to Hezekiah: for thus saith the king of Assyria, Make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: an agreement
  - type: text
    text: ' with me '
  - type: usfm
    marker: add
    children:
    - type: text
      text: by
  - type: text
    text: ' a present, and come out to me: and eat ye every one of his vine, and every one of his fig tree, and drink ye every one the waters of his own cistern; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'until I come and take you away to a land like your own land, a land of corn and wine, a land of bread and vineyards. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Beware
  - type: text
    text: ' lest Hezekiah persuade you, saying, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will deliver us. Hath any of the gods of the nations delivered his land out of the hand of the king of Assyria? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the gods of Hamath and Arphad? where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the gods of Sepharvaim? and have they delivered Samaria out of my hand? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are they
  - type: text
    text: ' among all the gods of these lands, that have delivered their land out of my hand, that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' should deliver Jerusalem out of my hand?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But they held their peace, and answered him not a word: for the king''s commandment was, saying, Answer him not.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then came Eliakim, the son of Hilkiah, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' over the household, and Shebna the scribe, and Joah, the son of Asaph, the recorder, to Hezekiah with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' clothes rent, and told him the words of Rabshakeh.'
