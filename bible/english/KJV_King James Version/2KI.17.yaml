document_id: 2KI.17,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Fall of Samaria
  - type: text
    content: 'In the twelfth year of Ahaz king of Judah began Hoshea the son of Elah to reign in Samaria over Israel nine years. '
  '10':
  - type: text
    content: 'And they set them up images and groves in every high hill, and under every green tree: '
  '11':
  - type: text
    content: 'and there they burnt incense in all the high places, as '
  - type: text
    content: did
  - type: text
    content: ' the heathen whom the '
  - type: text
    content: LORD
  - type: text
    content: ' carried away before them; and wrought wicked things to provoke the '
  - type: text
    content: LORD
  - type: text
    content: ' to anger: '
  '12':
  - type: text
    content: 'for they served idols, whereof the '
  - type: text
    content: LORD
  - type: text
    content: ' had said unto them, Ye shall not do this thing. '
  '13':
  - type: text
    content: 'Yet the '
  - type: text
    content: LORD
  - type: text
    content: ' testified against Israel, and against Judah, by all the prophets, '
  - type: text
    content: and by
  - type: text
    content: ' all the seers, saying, Turn ye from your evil ways, and keep my commandments '
  - type: text
    content: and
  - type: text
    content: ' my statutes, according to all the law which I commanded your fathers, and which I sent to you by my servants the prophets. '
  '14':
  - type: text
    content: 'Notwithstanding they would not hear, but hardened their necks, like to the neck of their fathers, that did not believe in the '
  - type: text
    content: LORD
  - type: text
    content: ' their God. '
  '15':
  - type: text
    content: 'And they rejected his statutes, and his covenant that he made with their fathers, and his testimonies which he testified against them; and they followed vanity, and became vain, and went after the heathen that '
  - type: text
    content: were
  - type: text
    content: ' round about them, '
  - type: text
    content: concerning
  - type: text
    content: ' whom the '
  - type: text
    content: LORD
  - type: text
    content: ' had charged them, that they should not do like them. '
  '16':
  - type: text
    content: 'And they left all the commandments of the '
  - type: text
    content: LORD
  - type: text
    content: ' their God, and made them molten images, '
  - type: text
    content: even
  - type: text
    content: ' two calves, and made a grove, and worshipped all the host of heaven, and served Baal. '
  '17':
  - type: text
    content: 'And they caused their sons and their daughters to pass through the fire, and used divination and enchantments, and sold themselves to do evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', to provoke him to anger. '
  '18':
  - type: text
    content: 'Therefore the '
  - type: text
    content: LORD
  - type: text
    content: ' was very angry with Israel, and removed them out of his sight: there was none left but the tribe of Judah only.'
  '19':
  - type: text
    content: 'Also Judah kept not the commandments of the '
  - type: text
    content: LORD
  - type: text
    content: ' their God, but walked in the statutes of Israel which they made. '
  '2':
  - type: text
    content: 'And he did '
  - type: text
    content: that which was
  - type: text
    content: ' evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', but not as the kings of Israel that were before him. '
  '20':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' rejected all the seed of Israel, and afflicted them, and delivered them into the hand of spoilers, until he had cast them out of his sight. '
  '21':
  - type: text
    content: 'For he rent Israel from the house of David; and they made Jeroboam the son of Nebat king: and Jeroboam drave Israel from following the '
  - type: text
    content: LORD
  - type: text
    content: ', and made them sin a great sin. '
  '22':
  - type: text
    content: 'For the children of Israel walked in all the sins of Jeroboam which he did; they departed not from them; '
  '23':
  - type: text
    content: 'until the '
  - type: text
    content: LORD
  - type: text
    content: ' removed Israel out of his sight, as he had said by all his servants the prophets. So was Israel carried away out of their own land to Assyria unto this day.'
  '24':
  - type: text
    content: 'And the king of Assyria brought '
  - type: text
    content: men
  - type: text
    content: ' from Babylon, and from Cuthah, and from Ava, and from Hamath, and from Sepharvaim, and placed '
  - type: text
    content: them
  - type: text
    content: ' in the cities of Samaria instead of the children of Israel: and they possessed Samaria, and dwelt in the cities thereof. '
  '25':
  - type: text
    content: 'And '
  - type: text
    content: so
  - type: text
    content: ' it was at the beginning of their dwelling there, '
  - type: text
    content: that
  - type: text
    content: ' they feared not the '
  - type: text
    content: LORD
  - type: text
    content: ': therefore the '
  - type: text
    content: LORD
  - type: text
    content: ' sent lions among them, which slew '
  - type: text
    content: some
  - type: text
    content: ' of them. '
  '26':
  - type: text
    content: 'Wherefore they spake to the king of Assyria, saying, The nations which thou hast removed, and placed in the cities of Samaria, know not the manner of the God of the land: therefore he hath sent lions among them, and, behold, they slay them, because they know not the manner of the God of the land.'
  '27':
  - type: text
    content: 'Then the king of Assyria commanded, saying, Carry thither one of the priests whom ye brought from thence; and let them go and dwell there, and let him teach them the manner of the God of the land. '
  '28':
  - type: text
    content: 'Then one of the priests whom they had carried away from Samaria came and dwelt in Beth-el, and taught them how they should fear the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'Howbeit every nation made gods of their own, and put '
  - type: text
    content: them
  - type: text
    content: ' in the houses of the high places which the Samaritans had made, every nation in their cities wherein they dwelt. '
  '3':
  - type: text
    content: 'Against him came up Shalmaneser king of Assyria; and Hoshea became his servant, and gave him presents. '
  '30':
  - type: text
    content: 'And the men of Babylon made Succoth-benoth, and the men of Cuth made Nergal, and the men of Hamath made Ashima, '
  '31':
  - type: text
    content: 'and the Avites made Nibhaz and Tartak, and the Sepharvites burnt their children in fire to Adrammelech and Anammelech, the gods of Sepharvaim. '
  '32':
  - type: text
    content: 'So they feared the '
  - type: text
    content: LORD
  - type: text
    content: ', and made unto themselves of the lowest of them priests of the high places, which sacrificed for them in the houses of the high places. '
  '33':
  - type: text
    content: 'They feared the '
  - type: text
    content: LORD
  - type: text
    content: ', and served their own gods, after the manner of the nations whom they carried away from thence.'
  '34':
  - type: text
    content: 'Unto this day they do after the former manners: they fear not the '
  - type: text
    content: LORD
  - type: text
    content: ', neither do they after their statutes, or after their ordinances, or after the law and commandment which the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded the children of Jacob, whom he named Israel; '
  '35':
  - type: text
    content: 'with whom the '
  - type: text
    content: LORD
  - type: text
    content: ' had made a covenant, and charged them, saying, Ye shall not fear other gods, nor bow yourselves to them, nor serve them, nor sacrifice to them: '
  '36':
  - type: text
    content: 'but the '
  - type: text
    content: LORD
  - type: text
    content: ', who brought you up out of the land of Egypt with great power and a stretched out arm, him shall ye fear, and him shall ye worship, and to him shall ye do sacrifice. '
  '37':
  - type: text
    content: 'And the statutes, and the ordinances, and the law, and the commandment, which he wrote for you, ye shall observe to do for evermore; and ye shall not fear other gods. '
  '38':
  - type: text
    content: 'And the covenant that I have made with you ye shall not forget; neither shall ye fear other gods. '
  '39':
  - type: text
    content: 'But the '
  - type: text
    content: LORD
  - type: text
    content: ' your God ye shall fear; and he shall deliver you out of the hand of all your enemies. '
  '4':
  - type: text
    content: 'And the king of Assyria found conspiracy in Hoshea: for he had sent messengers to So king of Egypt, and brought no present to the king of Assyria, as '
  - type: text
    content: he had done
  - type: text
    content: ' year by year: therefore the king of Assyria shut him up, and bound him in prison. '
  '40':
  - type: text
    content: 'Howbeit they did not hearken, but they did after their former manner. '
  '41':
  - type: text
    content: 'So these nations feared the '
  - type: text
    content: LORD
  - type: text
    content: ', and served their graven images, both their children, and their children''s children: as did their fathers, so do they unto this day.'
  '5':
  - type: text
    content: 'Then the king of Assyria came up throughout all the land, and went up to Samaria, and besieged it three years. '
  '6':
  - type: text
    content: 'In the ninth year of Hoshea the king of Assyria took Samaria, and carried Israel away into Assyria, and placed them in Halah and in Habor '
  - type: text
    content: by
  - type: text
    content: ' the river of Gozan, and in the cities of the Medes.'
  '7':
  - type: text
    content: 'For '
  - type: text
    content: so
  - type: text
    content: ' it was, that the children of Israel had sinned against the '
  - type: text
    content: LORD
  - type: text
    content: ' their God, which had brought them up out of the land of Egypt, from under the hand of Pharaoh king of Egypt, and had feared other gods, '
  '8':
  - type: text
    content: 'and walked in the statutes of the heathen, whom the '
  - type: text
    content: LORD
  - type: text
    content: ' cast out from before the children of Israel, and of the kings of Israel, which they had made. '
  '9':
  - type: text
    content: 'And the children of Israel did secretly '
  - type: text
    content: those
  - type: text
    content: ' things that '
  - type: text
    content: were
  - type: text
    content: ' not right against the '
  - type: text
    content: LORD
  - type: text
    content: ' their God, and they built them high places in all their cities, from the tower of the watchmen to the fenced city. '
