document_id: 2KI.17
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fall of Samaria
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the twelfth year of Ahaz king of Judah began Hoshea the son of Elah to reign in Samaria over Israel nine years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he did '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which was
  - type: text
    text: ' evil in the sight of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', but not as the kings of Israel that were before him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Against him came up Shalmaneser king of Assyria; and Hoshea became his servant, and gave him presents. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And the king of Assyria found conspiracy in Hoshea: for he had sent messengers to So king of Egypt, and brought no present to the king of Assyria, as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he had done
  - type: text
    text: ' year by year: therefore the king of Assyria shut him up, and bound him in prison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the king of Assyria came up throughout all the land, and went up to Samaria, and besieged it three years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'In the ninth year of Hoshea the king of Assyria took Samaria, and carried Israel away into Assyria, and placed them in Halah and in Habor '
  - type: usfm
    marker: add
    children:
    - type: text
      text: by
  - type: text
    text: ' the river of Gozan, and in the cities of the Medes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' it was, that the children of Israel had sinned against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' their God, which had brought them up out of the land of Egypt, from under the hand of Pharaoh king of Egypt, and had feared other gods, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and walked in the statutes of the heathen, whom the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' cast out from before the children of Israel, and of the kings of Israel, which they had made. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the children of Israel did secretly '
  - type: usfm
    marker: add
    children:
    - type: text
      text: those
  - type: text
    text: ' things that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' not right against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' their God, and they built them high places in all their cities, from the tower of the watchmen to the fenced city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And they set them up images and groves in every high hill, and under every green tree: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and there they burnt incense in all the high places, as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: did
  - type: text
    text: ' the heathen whom the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' carried away before them; and wrought wicked things to provoke the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' to anger: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'for they served idols, whereof the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had said unto them, Ye shall not do this thing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Yet the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' testified against Israel, and against Judah, by all the prophets, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and by
  - type: text
    text: ' all the seers, saying, Turn ye from your evil ways, and keep my commandments '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' my statutes, according to all the law which I commanded your fathers, and which I sent to you by my servants the prophets. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Notwithstanding they would not hear, but hardened their necks, like to the neck of their fathers, that did not believe in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' their God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And they rejected his statutes, and his covenant that he made with their fathers, and his testimonies which he testified against them; and they followed vanity, and became vain, and went after the heathen that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' round about them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: concerning
  - type: text
    text: ' whom the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had charged them, that they should not do like them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And they left all the commandments of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' their God, and made them molten images, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' two calves, and made a grove, and worshipped all the host of heaven, and served Baal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And they caused their sons and their daughters to pass through the fire, and used divination and enchantments, and sold themselves to do evil in the sight of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', to provoke him to anger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Therefore the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' was very angry with Israel, and removed them out of his sight: there was none left but the tribe of Judah only.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Also Judah kept not the commandments of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' their God, but walked in the statutes of Israel which they made. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' rejected all the seed of Israel, and afflicted them, and delivered them into the hand of spoilers, until he had cast them out of his sight. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For he rent Israel from the house of David; and they made Jeroboam the son of Nebat king: and Jeroboam drave Israel from following the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and made them sin a great sin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'For the children of Israel walked in all the sins of Jeroboam which he did; they departed not from them; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'until the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' removed Israel out of his sight, as he had said by all his servants the prophets. So was Israel carried away out of their own land to Assyria unto this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And the king of Assyria brought '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' from Babylon, and from Cuthah, and from Ava, and from Hamath, and from Sepharvaim, and placed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' in the cities of Samaria instead of the children of Israel: and they possessed Samaria, and dwelt in the cities thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' it was at the beginning of their dwelling there, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' they feared not the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': therefore the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' sent lions among them, which slew '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' of them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Wherefore they spake to the king of Assyria, saying, The nations which thou hast removed, and placed in the cities of Samaria, know not the manner of the God of the land: therefore he hath sent lions among them, and, behold, they slay them, because they know not the manner of the God of the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then the king of Assyria commanded, saying, Carry thither one of the priests whom ye brought from thence; and let them go and dwell there, and let him teach them the manner of the God of the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then one of the priests whom they had carried away from Samaria came and dwelt in Beth-el, and taught them how they should fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Howbeit every nation made gods of their own, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' in the houses of the high places which the Samaritans had made, every nation in their cities wherein they dwelt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And the men of Babylon made Succoth-benoth, and the men of Cuth made Nergal, and the men of Hamath made Ashima, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'and the Avites made Nibhaz and Tartak, and the Sepharvites burnt their children in fire to Adrammelech and Anammelech, the gods of Sepharvaim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'So they feared the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and made unto themselves of the lowest of them priests of the high places, which sacrificed for them in the houses of the high places. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'They feared the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and served their own gods, after the manner of the nations whom they carried away from thence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Unto this day they do after the former manners: they fear not the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', neither do they after their statutes, or after their ordinances, or after the law and commandment which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded the children of Jacob, whom he named Israel; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'with whom the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had made a covenant, and charged them, saying, Ye shall not fear other gods, nor bow yourselves to them, nor serve them, nor sacrifice to them: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'but the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', who brought you up out of the land of Egypt with great power and a stretched out arm, him shall ye fear, and him shall ye worship, and to him shall ye do sacrifice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And the statutes, and the ordinances, and the law, and the commandment, which he wrote for you, ye shall observe to do for evermore; and ye shall not fear other gods. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And the covenant that I have made with you ye shall not forget; neither shall ye fear other gods. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God ye shall fear; and he shall deliver you out of the hand of all your enemies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Howbeit they did not hearken, but they did after their former manner. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'So these nations feared the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and served their graven images, both their children, and their children''s children: as did their fathers, so do they unto this day.'
