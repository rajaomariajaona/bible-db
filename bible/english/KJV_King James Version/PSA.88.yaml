document_id: PSA.88,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'A Song '
  - type: text
    content: or
  - type: text
    content: ' Psalm for the sons of Korah, to the chief Musician upon Mahalath Leannoth, Maschil of Heman the Ezrahite.'
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ' God of my salvation, I have cried day '
  - type: text
    content: and
  - type: text
    content: ' night before thee:'
  '10':
  - type: text
    content: Wilt thou shew wonders to the dead?
  - type: text
    content: 'Shall the dead arise '
  - type: text
    content: and
  - type: text
    content: ' praise thee? '
  - type: text
    content: Selah.
  '11':
  - type: text
    content: Shall thy lovingkindness be declared in the grave?
  - type: text
    content: Or
  - type: text
    content: ' thy faithfulness in destruction?'
  '12':
  - type: text
    content: Shall thy wonders be known in the dark?
  - type: text
    content: And thy righteousness in the land of forgetfulness?
  '13':
  - type: text
    content: 'But unto thee have I cried, O '
  - type: text
    content: LORD
  - type: text
    content: ;
  - type: text
    content: And in the morning shall my prayer prevent thee.
  '14':
  - type: text
    content: ' '
  - type: text
    content: LORD
  - type: text
    content: ', why castest thou off my soul?'
  - type: text
    content: Why
  - type: text
    content: ' hidest thou thy face from me?'
  '15':
  - type: text
    content: 'I '
  - type: text
    content: am
  - type: text
    content: ' afflicted and ready to die'
  - type: text
    content: 'From '
  - type: text
    content: my
  - type: text
    content: ' youth up: '
  - type: text
    content: While
  - type: text
    content: ' I suffer thy terrors I am distracted.'
  '16':
  - type: text
    content: Thy fierce wrath goeth over me;
  - type: text
    content: Thy terrors have cut me off.
  '17':
  - type: text
    content: They came round about me daily like water;
  - type: text
    content: They compassed me about together.
  '18':
  - type: text
    content: Lover and friend hast thou put far from me,
  - type: text
    content: And
  - type: text
    content: ' mine acquaintance into darkness.'
  '2':
  - type: text
    content: 'Let my prayer come before thee: Incline thine ear unto my cry;'
  '3':
  - type: text
    content: 'For my soul is full of troubles:'
  - type: text
    content: And my life draweth nigh unto the grave.
  '4':
  - type: text
    content: 'I am counted with them that go down into the pit:'
  - type: text
    content: 'I am as a man '
  - type: text
    content: that hath
  - type: text
    content: ' no strength:'
  '5':
  - type: text
    content: Free among the dead, like the slain that lie in the grave,
  - type: text
    content: 'Whom thou rememberest no more: And they are cut off from thy hand.'
  '6':
  - type: text
    content: Thou hast laid me in the lowest pit,
  - type: text
    content: In darkness, in the deeps.
  '7':
  - type: text
    content: Thy wrath lieth hard upon me,
  - type: text
    content: 'And thou hast afflicted '
  - type: text
    content: me
  - type: text
    content: ' with all thy waves. '
  - type: text
    content: Selah.
  '8':
  - type: text
    content: Thou hast put away mine acquaintance far from me;
  - type: text
    content: 'Thou hast made me an abomination unto them:'
  - type: text
    content: I am
  - type: text
    content: ' shut up,'
  - type: text
    content: And I cannot come forth.
  '9':
  - type: text
    content: 'Mine eye mourneth by reason of affliction:'
  - type: text
    content: LORD
  - type: text
    content: ', I have called daily upon thee, I have stretched out my hands unto thee.'
