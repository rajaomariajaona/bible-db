document_id: PSA.88,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'A Song '
    - type: usfm
      marker: add
      children:
      - type: text
        text: or
    - type: text
      text: ' Psalm for the sons of Korah, to the chief Musician upon Mahalath Leannoth, Maschil of Heman the Ezrahite.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of my salvation, I have cried day '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' night before thee:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wilt thou shew wonders to the dead?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Shall the dead arise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' praise thee? '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shall thy lovingkindness be declared in the grave?
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Or
    - type: text
      text: ' thy faithfulness in destruction?'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shall thy wonders be known in the dark?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thy righteousness in the land of forgetfulness?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But unto thee have I cried, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And in the morning shall my prayer prevent thee.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', why castest thou off my soul?'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Why
    - type: text
      text: ' hidest thou thy face from me?'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' afflicted and ready to die'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'From '
    - type: usfm
      marker: add
      children:
      - type: text
        text: my
    - type: text
      text: ' youth up: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: While
    - type: text
      text: ' I suffer thy terrors I am distracted.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thy fierce wrath goeth over me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thy terrors have cut me off.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They came round about me daily like water;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They compassed me about together.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lover and friend hast thou put far from me,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' mine acquaintance into darkness.'
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Let my prayer come before thee: Incline thine ear unto my cry;'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For my soul is full of troubles:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And my life draweth nigh unto the grave.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I am counted with them that go down into the pit:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I am as a man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that hath
    - type: text
      text: ' no strength:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Free among the dead, like the slain that lie in the grave,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Whom thou rememberest no more: And they are cut off from thy hand.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thou hast laid me in the lowest pit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In darkness, in the deeps.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thy wrath lieth hard upon me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And thou hast afflicted '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ' with all thy waves. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thou hast put away mine acquaintance far from me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Thou hast made me an abomination unto them:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: I am
    - type: text
      text: ' shut up,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I cannot come forth.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mine eye mourneth by reason of affliction:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', I have called daily upon thee, I have stretched out my hands unto thee.'
