document_id: 1SA.21
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: David and Saul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then came David to Nob to Ahimelech the priest: and Ahimelech was afraid at the meeting of David, and said unto him, Why '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' thou alone, and no man with thee? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And David said unto Ahimelech the priest, The king hath commanded me a business, and hath said unto me, Let no man know any thing of the business whereabout I send thee, and what I have commanded thee: and I have appointed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my
  - type: text
    text: ' servants to such and such a place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Now therefore what is under thine hand? give '
  - type: usfm
    marker: add
    children:
    - type: text
      text: me
  - type: text
    text: ' five '
  - type: usfm
    marker: add
    children:
    - type: text
      text: loaves of
  - type: text
    text: ' bread in mine hand, or what there is present. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And the priest answered David, and said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' no common bread under mine hand, but there is hallowed bread; if the young men have kept themselves at least from women. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And David answered the priest, and said unto him, Of a truth women '
  - type: usfm
    marker: add
    children:
    - type: text
      text: have been
  - type: text
    text: ' kept from us about these three days, since I came out, and the vessels of the young men are holy, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the bread is
  - type: text
    text: ' in a manner common, yea, though it were sanctified this day in the vessel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So the priest gave him hallowed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'bread:'
  - type: text
    text: ' for there was no bread there but the shewbread, that was taken from before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', to put hot bread in the day when it was taken away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now a certain man of the servants of Saul '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' there that day, detained before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and his name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Doeg, an Edomite, the chiefest of the herdmen that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: belonged
  - type: text
    text: ' to Saul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And David said unto Ahimelech, And is there not here under thine hand spear or sword? for I have neither brought my sword nor my weapons with me, because the king''s business required haste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the priest said, The sword of Goliath the Philistine, whom thou slewest in the valley of Elah, behold, it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is here
  - type: text
    text: ' wrapped in a cloth behind the ephod: if thou wilt take that, take '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'it:'
  - type: text
    text: ' for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no other save that here. And David said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' none like that; give it me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And David arose, and fled that day for fear of Saul, and went to Achish the king of Gath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the servants of Achish said unto him, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is not
  - type: text
    text: ' this David the king of the land? did they not sing one to another of him in dances, saying,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Saul hath slain his thousands,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And David his ten thousands?
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And David laid up these words in his heart, and was sore afraid of Achish the king of Gath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And he changed his behaviour before them, and feigned himself mad in their hands, and scrabbled on the doors of the gate, and let his spittle fall down upon his beard. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then said Achish unto his servants, Lo, ye see the man is mad: wherefore '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' have ye brought him to me? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Have I need of mad men, that ye have brought this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: fellow
  - type: text
    text: ' to play the mad man in my presence? shall this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: fellow
  - type: text
    text: ' come into my house?'
