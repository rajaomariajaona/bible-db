document_id: 1CO.4,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Let a man so account of us, as of the ministers of Christ, and stewards of the mysteries of God. '
  '10':
  - type: text
    content: 'We '
  - type: text
    content: are
  - type: text
    content: ' fools for Christ''s sake, but ye '
  - type: text
    content: are
  - type: text
    content: ' wise in Christ; we '
  - type: text
    content: are
  - type: text
    content: ' weak, but ye '
  - type: text
    content: are
  - type: text
    content: ' strong; ye '
  - type: text
    content: are
  - type: text
    content: ' honourable, but we '
  - type: text
    content: are
  - type: text
    content: ' despised. '
  '11':
  - type: text
    content: 'Even unto this present hour we both hunger, and thirst, and are naked, and are buffeted, and have no certain dwellingplace; '
  '12':
  - type: text
    content: 'and labour, working with our own hands: being reviled, we bless; being persecuted, we suffer it: '
  '13':
  - type: text
    content: 'being defamed, we intreat: we are made as the filth of the world, '
  - type: text
    content: and are
  - type: text
    content: ' the offscouring of all things unto this day.'
  '14':
  - type: text
    content: 'I write not these things to shame you, but as my beloved sons I warn '
  - type: text
    content: you
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'For though ye have ten thousand instructors in Christ, yet '
  - type: text
    content: have ye
  - type: text
    content: ' not many fathers: for in Christ Jesus I have begotten you through the gospel. '
  '16':
  - type: text
    content: 'Wherefore I beseech you, be ye followers of me. '
  '17':
  - type: text
    content: For this cause have I sent unto you Timotheus, who is my beloved son, and faithful in the Lord, who shall bring you into remembrance of my ways which be in Christ, as I teach every where in every church.
  - type: heading
    content: I Will Come to You
  '18':
  - type: text
    content: 'Now some are puffed up, as though I would not come to you. '
  '19':
  - type: text
    content: 'But I will come to you shortly, if the Lord will, and will know, not the speech of them which are puffed up, but the power. '
  '2':
  - type: text
    content: 'Moreover it is required in stewards, that a man be found faithful. '
  '20':
  - type: text
    content: 'For the kingdom of God '
  - type: text
    content: is
  - type: text
    content: ' not in word, but in power. '
  '21':
  - type: text
    content: 'What will ye? shall I come unto you with a rod, or in love, and '
  - type: text
    content: in
  - type: text
    content: ' the spirit of meekness?'
  '3':
  - type: text
    content: 'But with me it is a very small thing that I should be judged of you, or of man''s judgment: yea, I judge not mine own self. '
  '4':
  - type: text
    content: 'For I know nothing by myself; yet am I not hereby justified: but he that judgeth me is the Lord. '
  '5':
  - type: text
    content: 'Therefore judge nothing before the time, until the Lord come, who both will bring to light the hidden things of darkness, and will make manifest the counsels of the hearts: and then shall every man have praise of God.'
  '6':
  - type: text
    content: 'And these things, brethren, I have in a figure transferred to myself and '
  - type: text
    content: to
  - type: text
    content: ' Apollos for your sakes; that ye might learn in us not to think '
  - type: text
    content: of men
  - type: text
    content: ' above that which is written, that no one of you be puffed up for one against another. '
  '7':
  - type: text
    content: 'For who maketh thee to differ '
  - type: text
    content: from another
  - type: text
    content: '? and what hast thou that thou didst not receive? now if thou didst receive '
  - type: text
    content: it
  - type: text
    content: ', why dost thou glory, as if thou hadst not received '
  - type: text
    content: it
  - type: text
    content: '? '
  '8':
  - type: text
    content: 'Now ye are full, now ye are rich, ye have reigned as kings without us: and I would to God ye did reign, that we also might reign with you. '
  '9':
  - type: text
    content: 'For I think that God hath set forth us the apostles last, as it were appointed to death: for we are made a spectacle unto the world, and to angels, and to men. '
