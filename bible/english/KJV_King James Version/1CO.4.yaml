document_id: 1CO.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Let a man so account of us, as of the ministers of Christ, and stewards of the mysteries of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Moreover it is required in stewards, that a man be found faithful. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But with me it is a very small thing that I should be judged of you, or of man''s judgment: yea, I judge not mine own self. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For I know nothing by myself; yet am I not hereby justified: but he that judgeth me is the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Therefore judge nothing before the time, until the Lord come, who both will bring to light the hidden things of darkness, and will make manifest the counsels of the hearts: and then shall every man have praise of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And these things, brethren, I have in a figure transferred to myself and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to
  - type: text
    text: ' Apollos for your sakes; that ye might learn in us not to think '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of men
  - type: text
    text: ' above that which is written, that no one of you be puffed up for one against another. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For who maketh thee to differ '
  - type: usfm
    marker: add
    children:
    - type: text
      text: from another
  - type: text
    text: '? and what hast thou that thou didst not receive? now if thou didst receive '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', why dost thou glory, as if thou hadst not received '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now ye are full, now ye are rich, ye have reigned as kings without us: and I would to God ye did reign, that we also might reign with you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For I think that God hath set forth us the apostles last, as it were appointed to death: for we are made a spectacle unto the world, and to angels, and to men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'We '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' fools for Christ''s sake, but ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' wise in Christ; we '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' weak, but ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' strong; ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' honourable, but we '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' despised. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Even unto this present hour we both hunger, and thirst, and are naked, and are buffeted, and have no certain dwellingplace; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and labour, working with our own hands: being reviled, we bless; being persecuted, we suffer it: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'being defamed, we intreat: we are made as the filth of the world, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and are
  - type: text
    text: ' the offscouring of all things unto this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I write not these things to shame you, but as my beloved sons I warn '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For though ye have ten thousand instructors in Christ, yet '
  - type: usfm
    marker: add
    children:
    - type: text
      text: have ye
  - type: text
    text: ' not many fathers: for in Christ Jesus I have begotten you through the gospel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Wherefore I beseech you, be ye followers of me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For this cause have I sent unto you Timotheus, who is my beloved son, and faithful in the Lord, who shall bring you into remembrance of my ways which be in Christ, as I teach every where in every church.
- type: usfm
  marker: s2
  children:
  - type: text
    text: I Will Come to You
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Now some are puffed up, as though I would not come to you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But I will come to you shortly, if the Lord will, and will know, not the speech of them which are puffed up, but the power. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For the kingdom of God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not in word, but in power. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'What will ye? shall I come unto you with a rod, or in love, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' the spirit of meekness?'
