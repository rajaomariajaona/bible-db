document_id: JER.28,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'And it came to pass the same year, in the beginning of the reign of Zedekiah king of Judah, in the fourth year, '
  - type: text
    content: and
  - type: text
    content: ' in the fifth month, '
  - type: text
    content: that
  - type: text
    content: ' Hananiah the son of Azur the prophet, which '
  - type: text
    content: was
  - type: text
    content: ' of Gibeon, spake unto me in the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', in the presence of the priests and of all the people, saying, '
  '10':
  - type: text
    content: 'Then Hananiah the prophet took the yoke from off the prophet Jeremiah''s neck, and brake it. '
  '11':
  - type: text
    content: 'And Hananiah spake in the presence of all the people, saying, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ; Even so will I break the yoke of Nebuchadnezzar king of Babylon from the neck of all nations within the space of two full years. And the prophet Jeremiah went his way.
  '12':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came unto Jeremiah '
  - type: text
    content: the prophet
  - type: text
    content: ', after that Hananiah the prophet had broken the yoke from off the neck of the prophet Jeremiah, saying, '
  '13':
  - type: text
    content: 'Go and tell Hananiah, saying, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Thou hast broken the yokes of wood; but thou shalt make for them yokes of iron. '
  '14':
  - type: text
    content: 'For thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, the God of Israel; I have put a yoke of iron upon the neck of all these nations, that they may serve Nebuchadnezzar king of Babylon; and they shall serve him: and I have given him the beasts of the field also. '
  '15':
  - type: text
    content: 'Then said the prophet Jeremiah unto Hananiah the prophet, Hear now, Hananiah; The '
  - type: text
    content: LORD
  - type: text
    content: ' hath not sent thee; but thou makest this people to trust in a lie. '
  '16':
  - type: text
    content: 'Therefore thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Behold, I will cast thee from off the face of the earth: this year thou shalt die, because thou hast taught rebellion against the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '17':
  - type: text
    content: So Hananiah the prophet died the same year in the seventh month.
  '2':
  - type: text
    content: 'Thus speaketh the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, the God of Israel, saying, I have broken the yoke of the king of Babylon. '
  '3':
  - type: text
    content: 'Within two full years will I bring again into this place all the vessels of the '
  - type: text
    content: LORD
  - type: text
    content: '''s house, that Nebuchadnezzar king of Babylon took away from this place, and carried them to Babylon: '
  '4':
  - type: text
    content: 'and I will bring again to this place Jeconiah the son of Jehoiakim king of Judah, with all the captives of Judah, that went into Babylon, saith the '
  - type: text
    content: LORD
  - type: text
    content: ': for I will break the yoke of the king of Babylon.'
  '5':
  - type: text
    content: 'Then the prophet Jeremiah said unto the prophet Hananiah in the presence of the priests, and in the presence of all the people that stood in the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  '6':
  - type: text
    content: 'even the prophet Jeremiah said, Amen: the '
  - type: text
    content: LORD
  - type: text
    content: ' do so: the '
  - type: text
    content: LORD
  - type: text
    content: ' perform thy words which thou hast prophesied, to bring again the vessels of the '
  - type: text
    content: LORD
  - type: text
    content: '''s house, and all that is carried away captive, from Babylon into this place. '
  '7':
  - type: text
    content: 'Nevertheless hear thou now this word that I speak in thine ears, and in the ears of all the people; '
  '8':
  - type: text
    content: 'the prophets that have been before me and before thee of old prophesied both against many countries, and against great kingdoms, of war, and of evil, and of pestilence. '
  '9':
  - type: text
    content: 'The prophet which prophesieth of peace, when the word of the prophet shall come to pass, '
  - type: text
    content: then
  - type: text
    content: ' shall the prophet be known, that the '
  - type: text
    content: LORD
  - type: text
    content: ' hath truly sent him. '
