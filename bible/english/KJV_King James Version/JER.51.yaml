  - type: text
    content: is
  - type: text
    content: ' The '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts. '
  '58':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; The broad walls of Babylon shall be utterly broken, and her high gates shall be burned with fire; and the people shall labour in vain, and the folk in the fire, and they shall be weary.'
  '59':
  - type: text
    content: 'The word which Jeremiah the prophet commanded Seraiah the son of Neriah, the son of Maaseiah, when he went with Zedekiah the king of Judah into Babylon in the fourth year of his reign. And '
  - type: text
    content: this
  - type: text
    content: ' Seraiah '
  - type: text
    content: was
  - type: text
    content: ' a quiet prince. '
  '6':
  - type: text
    content: 'Flee out of the midst of Babylon, and deliver every man his soul: be not cut off in her iniquity; for this '
  - type: text
    content: is
  - type: text
    content: ' the time of the '
  - type: text
    content: LORD
  - type: text
    content: '''s vengeance; he will render unto her a recompence. '
  '60':
  - type: text
    content: 'So Jeremiah wrote in a book all the evil that should come upon Babylon, '
  - type: text
    content: even
  - type: text
    content: ' all these words that are written against Babylon. '
  '61':
  - type: text
    content: 'And Jeremiah said to Seraiah, When thou comest to Babylon, and shalt see, and shalt read all these words; '
  '62':
  - type: text
    content: 'then shalt thou say, O '
  - type: text
    content: LORD
  - type: text
    content: ', thou hast spoken against this place, to cut it off, that none shall remain in it, neither man nor beast, but that it shall be desolate for ever. '
  '63':
  - type: text
    content: 'And it shall be, when thou hast made an end of reading this book, '
  - type: text
    content: that
  - type: text
    content: ' thou shalt bind a stone to it, and cast it into the midst of Euphrates: '
  '64':
  - type: text
    content: 'and thou shalt say, Thus shall Babylon sink, and shall not rise from the evil that I will bring upon her: and they shall be weary.'
  - type: text
    content: 'Thus far '
  - type: text
    content: are
  - type: text
    content: ' the words of Jeremiah.'
  '7':
  - type: text
    content: 'Babylon '
  - type: text
    content: hath been
  - type: text
    content: ' a golden cup in the '
  - type: text
    content: LORD
  - type: text
    content: '''s hand, that made all the earth drunken: the nations have drunken of her wine; therefore the nations are mad. '
  '8':
  - type: text
    content: 'Babylon is suddenly fallen and destroyed: howl for her; take balm for her pain, if so be she may be healed. '
  '9':
  - type: text
    content: 'We would have healed Babylon, but she is not healed: forsake her, and let us go every one into his own country: for her judgment reacheth unto heaven, and is lifted up '
  - type: text
