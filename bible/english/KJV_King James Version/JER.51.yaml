document_id: JER.51
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; Behold, I will raise up against Babylon, and against them that dwell in the midst of them that rise up against me, a destroying wind; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and will send unto Babylon fanners, that shall fan her, and shall empty her land: for in the day of trouble they shall be against her round about. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Against '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him that
  - type: text
    text: ' bendeth let the archer bend his bow, and against '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him that
  - type: text
    text: ' lifteth himself up in his brigandine: and spare ye not her young men; destroy ye utterly all her host. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Thus the slain shall fall in the land of the Chaldeans, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they that are
  - type: text
    text: ' thrust through in her streets. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For Israel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hath
  - type: text
    text: ' not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: been
  - type: text
    text: ' forsaken, nor Judah of his God, of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts; though their land was filled with sin against the Holy One of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Flee out of the midst of Babylon, and deliver every man his soul: be not cut off in her iniquity; for this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the time of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s vengeance; he will render unto her a recompence. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Babylon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hath been
  - type: text
    text: ' a golden cup in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s hand, that made all the earth drunken: the nations have drunken of her wine; therefore the nations are mad. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Babylon is suddenly fallen and destroyed: howl for her; take balm for her pain, if so be she may be healed. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'We would have healed Babylon, but she is not healed: forsake her, and let us go every one into his own country: for her judgment reacheth unto heaven, and is lifted up '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to the skies. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath brought forth our righteousness: come, and let us declare in Zion the work of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' our God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Make bright the arrows; gather the shields: the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath raised up the spirit of the kings of the Medes: for his device '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' against Babylon, to destroy it; because it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the vengeance of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the vengeance of his temple. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Set up the standard upon the walls of Babylon, make the watch strong, set up the watchmen, prepare the ambushes: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath both devised and done that which he spake against the inhabitants of Babylon. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'O thou that dwellest upon many waters, abundant in treasures, thine end is come, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the measure of thy covetousness. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts hath sworn by himself, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saying
  - type: text
    text: ', Surely I will fill thee with men, as with caterpillers; and they shall lift up a shout against thee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He hath made the earth by his power, he hath established the world by his wisdom, and hath stretched out the heaven by his understanding. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'When he uttereth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' voice, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' a multitude of waters in the heavens; and he causeth the vapours to ascend from the ends of the earth: he maketh lightnings with rain, and bringeth forth the wind out of his treasures. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Every man is brutish by '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' knowledge; every founder is confounded by the graven image: for his molten image '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' falsehood, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no breath in them. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'They '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' vanity, the work of errors: in the time of their visitation they shall perish. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The portion of Jacob '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not like them; for he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the former of all things: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Israel is
  - type: text
    text: ' the rod of his inheritance: the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' his name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' my battle axe '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' weapons of war: for with thee will I break in pieces the nations, and with thee will I destroy kingdoms; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'and with thee will I break in pieces the horse and his rider; and with thee will I break in pieces the chariot and his rider; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'with thee also will I break in pieces man and woman; and with thee will I break in pieces old and young; and with thee will I break in pieces the young man and the maid; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'I will also break in pieces with thee the shepherd and his flock; and with thee will I break in pieces the husbandman and his yoke of oxen; and with thee will I break in pieces captains and rulers. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And I will render unto Babylon and to all the inhabitants of Chaldea all their evil that they have done in Zion in your sight, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Behold, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' against thee, O destroying mountain, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', which destroyest all the earth: and I will stretch out mine hand upon thee, and roll thee down from the rocks, and will make thee a burnt mountain. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And they shall not take of thee a stone for a corner, nor a stone for foundations; but thou shalt be desolate for ever, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Set ye up a standard in the land, blow the trumpet among the nations, prepare the nations against her, call together against her the kingdoms of Ararat, Minni, and Ashchenaz; appoint a captain against her; cause the horses to come up as the rough caterpillers. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Prepare against her the nations with the kings of the Medes, the captains thereof, and all the rulers thereof, and all the land of his dominion. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And the land shall tremble and sorrow: for every purpose of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall be performed against Babylon, to make the land of Babylon a desolation without an inhabitant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The mighty men of Babylon have forborn to fight, they have remained in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' holds: their might hath failed; they became as women: they have burned her dwellingplaces; her bars are broken. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'One post shall run to meet another, and one messenger to meet another, to shew the king of Babylon that his city is taken at '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' end, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'and that the passages are stopped, and the reeds they have burned with fire, and the men of war are affrighted. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'For thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, the God of Israel; The daughter of Babylon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' like a threshingfloor, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' time to thresh her: yet a little while, and the time of her harvest shall come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Nebuchadrezzar the king of Babylon hath devoured me, he hath crushed me, he hath made me an empty vessel, he hath swallowed me up like a dragon, he hath filled his belly with my delicates, he hath cast me out. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'The violence done to me and to my flesh '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' upon Babylon, shall the inhabitant of Zion say; and my blood upon the inhabitants of Chaldea, shall Jerusalem say. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Therefore thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; Behold, I will plead thy cause, and take vengeance for thee; and I will dry up her sea, and make her springs dry. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: And Babylon shall become heaps, a dwellingplace for dragons, an astonishment, and an hissing, without an inhabitant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'They shall roar together like lions: they shall yell as lions'' whelps. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'In their heat I will make their feasts, and I will make them drunken, that they may rejoice, and sleep a perpetual sleep, and not wake, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: I will bring them down like lambs to the slaughter, like rams with he goats.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'How is Sheshach taken! and how is the praise of the whole earth surprised! how is Babylon become an astonishment among the nations! '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'The sea is come up upon Babylon: she is covered with the multitude of the waves thereof. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Her cities are a desolation, a dry land, and a wilderness, a land wherein no man dwelleth, neither doth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' son of man pass thereby. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'And I will punish Bel in Babylon, and I will bring forth out of his mouth that which he hath swallowed up: and the nations shall not flow together any more unto him: yea, the wall of Babylon shall fall.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'My people, go ye out of the midst of her, and deliver ye every man his soul from the fierce anger of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'And lest your heart faint, and ye fear for the rumour that shall be heard in the land; a rumour shall both come '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' year, and after that in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: another
  - type: text
    text: ' year '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall come
  - type: text
    text: ' a rumour, and violence in the land, ruler against ruler. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Therefore, behold, the days come, that I will do judgment upon the graven images of Babylon: and her whole land shall be confounded, and all her slain shall fall in the midst of her. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Then the heaven and the earth, and all that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' therein, shall sing for Babylon: for the spoilers shall come unto her from the north, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'As Babylon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hath caused
  - type: text
    text: ' the slain of Israel to fall, so at Babylon shall fall the slain of all the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Ye that have escaped the sword, go away, stand not still: remember the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' afar off, and let Jerusalem come into your mind. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'We are confounded, because we have heard reproach: shame hath covered our faces: for strangers are come into the sanctuaries of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s house. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Wherefore, behold, the days come, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that I will do judgment upon her graven images: and through all her land the wounded shall groan. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Though Babylon should mount up to heaven, and though she should fortify the height of her strength, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yet
  - type: text
    text: ' from me shall spoilers come unto her, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'A sound of a cry '
  - type: usfm
    marker: add
    children:
    - type: text
      text: cometh
  - type: text
    text: ' from Babylon, and great destruction from the land of the Chaldeans: '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath spoiled Babylon, and destroyed out of her the great voice; when her waves do roar like great waters, a noise of their voice is uttered: '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'because the spoiler is come upon her, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' upon Babylon, and her mighty men are taken, every one of their bows is broken: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of recompences shall surely requite. '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'And I will make drunk her princes, and her wise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ', her captains, and her rulers, and her mighty men: and they shall sleep a perpetual sleep, and not wake, saith the King, whose name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts; The broad walls of Babylon shall be utterly broken, and her high gates shall be burned with fire; and the people shall labour in vain, and the folk in the fire, and they shall be weary.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'The word which Jeremiah the prophet commanded Seraiah the son of Neriah, the son of Maaseiah, when he went with Zedekiah the king of Judah into Babylon in the fourth year of his reign. And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' Seraiah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' a quiet prince. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'So Jeremiah wrote in a book all the evil that should come upon Babylon, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' all these words that are written against Babylon. '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'And Jeremiah said to Seraiah, When thou comest to Babylon, and shalt see, and shalt read all these words; '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'then shalt thou say, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', thou hast spoken against this place, to cut it off, that none shall remain in it, neither man nor beast, but that it shall be desolate for ever. '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'And it shall be, when thou hast made an end of reading this book, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' thou shalt bind a stone to it, and cast it into the midst of Euphrates: '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'and thou shalt say, Thus shall Babylon sink, and shall not rise from the evil that I will bring upon her: and they shall be weary.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Thus far '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the words of Jeremiah.'
