  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts hath sworn by himself, '
  - type: text
    content: saying
  - type: text
    content: ', Surely I will fill thee with men, as with caterpillers; and they shall lift up a shout against thee.'
  '15':
  - type: text
    content: 'He hath made the earth by his power, he hath established the world by his wisdom, and hath stretched out the heaven by his understanding. '
  '16':
  - type: text
    content: 'When he uttereth '
  - type: text
    content: his
  - type: text
    content: ' voice, '
  - type: text
    content: there is
  - type: text
    content: ' a multitude of waters in the heavens; and he causeth the vapours to ascend from the ends of the earth: he maketh lightnings with rain, and bringeth forth the wind out of his treasures. '
  '17':
  - type: text
    content: 'Every man is brutish by '
  - type: text
    content: his
  - type: text
    content: ' knowledge; every founder is confounded by the graven image: for his molten image '
  - type: text
    content: is
  - type: text
    content: ' falsehood, and '
  - type: text
    content: there is
  - type: text
    content: ' no breath in them. '
  '18':
  - type: text
    content: 'They '
  - type: text
    content: are
  - type: text
    content: ' vanity, the work of errors: in the time of their visitation they shall perish. '
  '19':
  - type: text
    content: 'The portion of Jacob '
  - type: text
    content: is
  - type: text
    content: ' not like them; for he '
  - type: text
    content: is
  - type: text
    content: ' the former of all things: and '
  - type: text
    content: Israel is
  - type: text
    content: ' the rod of his inheritance: the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts '
  - type: text
    content: is
  - type: text
    content: ' his name.'
  '2':
  - type: text
    content: 'and will send unto Babylon fanners, that shall fan her, and shall empty her land: for in the day of trouble they shall be against her round about. '
  '20':
  - type: text
    content: 'Thou '
  - type: text
    content: art
  - type: text
    content: ' my battle axe '
  - type: text
    content: and
  - type: text
    content: ' weapons of war: for with thee will I break in pieces the nations, and with thee will I destroy kingdoms; '
  '21':
  - type: text
    content: 'and with thee will I break in pieces the horse and his rider; and with thee will I break in pieces the chariot and his rider; '
  '22':
  - type: text
    content: 'with thee also will I break in pieces man and woman; and with thee will I break in pieces old and young; and with thee will I break in pieces the young man and the maid; '
  '23':
  - type: text
    content: 'I will also break in pieces with thee the shepherd and his flock; and with thee will I break in pieces the husbandman and his yoke of oxen; and with thee will I break in pieces captains and rulers. '
  '24':
  - type: text
    content: 'And I will render unto Babylon and to all the inhabitants of Chaldea all their evil that they have done in Zion in your sight, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '25':
  - type: text
    content: 'Behold, I '
  - type: text
    content: am
  - type: text
    content: ' against thee, O destroying mountain, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', which destroyest all the earth: and I will stretch out mine hand upon thee, and roll thee down from the rocks, and will make thee a burnt mountain. '
  '26':
  - type: text
    content: 'And they shall not take of thee a stone for a corner, nor a stone for foundations; but thou shalt be desolate for ever, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '27':
  - type: text
    content: 'Set ye up a standard in the land, blow the trumpet among the nations, prepare the nations against her, call together against her the kingdoms of Ararat, Minni, and Ashchenaz; appoint a captain against her; cause the horses to come up as the rough caterpillers. '
  '28':
  - type: text
    content: 'Prepare against her the nations with the kings of the Medes, the captains thereof, and all the rulers thereof, and all the land of his dominion. '
  '29':
  - type: text
    content: 'And the land shall tremble and sorrow: for every purpose of the '
  - type: text
    content: LORD
  - type: text
    content: ' shall be performed against Babylon, to make the land of Babylon a desolation without an inhabitant.'
  '3':
  - type: text
    content: 'Against '
  - type: text
    content: him that
  - type: text
    content: ' bendeth let the archer bend his bow, and against '
  - type: text
    content: him that
  - type: text
    content: ' lifteth himself up in his brigandine: and spare ye not her young men; destroy ye utterly all her host. '
  '30':
  - type: text
    content: 'The mighty men of Babylon have forborn to fight, they have remained in '
  - type: text
    content: their
  - type: text
    content: ' holds: their might hath failed; they became as women: they have burned her dwellingplaces; her bars are broken. '
  '31':
  - type: text
    content: 'One post shall run to meet another, and one messenger to meet another, to shew the king of Babylon that his city is taken at '
  - type: text
    content: one
  - type: text
    content: ' end, '
  '32':
  - type: text
    content: 'and that the passages are stopped, and the reeds they have burned with fire, and the men of war are affrighted. '
  '33':
  - type: text
    content: 'For thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, the God of Israel; The daughter of Babylon '
  - type: text
    content: is
  - type: text
    content: ' like a threshingfloor, '
  - type: text
    content: it is
  - type: text
    content: ' time to thresh her: yet a little while, and the time of her harvest shall come.'
  '34':
  - type: text
    content: 'Nebuchadrezzar the king of Babylon hath devoured me, he hath crushed me, he hath made me an empty vessel, he hath swallowed me up like a dragon, he hath filled his belly with my delicates, he hath cast me out. '
  '35':
  - type: text
    content: 'The violence done to me and to my flesh '
  - type: text
    content: be
  - type: text
    content: ' upon Babylon, shall the inhabitant of Zion say; and my blood upon the inhabitants of Chaldea, shall Jerusalem say. '
  '36':
  - type: text
    content: 'Therefore thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Behold, I will plead thy cause, and take vengeance for thee; and I will dry up her sea, and make her springs dry. '
  '37':
  - type: text
    content: And Babylon shall become heaps, a dwellingplace for dragons, an astonishment, and an hissing, without an inhabitant.
  '38':
  - type: text
    content: 'They shall roar together like lions: they shall yell as lions'' whelps. '
  '39':
  - type: text
    content: 'In their heat I will make their feasts, and I will make them drunken, that they may rejoice, and sleep a perpetual sleep, and not wake, saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Thus the slain shall fall in the land of the Chaldeans, and '
  - type: text
    content: they that are
  - type: text
    content: ' thrust through in her streets. '
  '40':
  - type: text
    content: I will bring them down like lambs to the slaughter, like rams with he goats.
  '41':
  - type: text
    content: 'How is Sheshach taken! and how is the praise of the whole earth surprised! how is Babylon become an astonishment among the nations! '
  '42':
  - type: text
    content: 'The sea is come up upon Babylon: she is covered with the multitude of the waves thereof. '
  '43':
  - type: text
    content: 'Her cities are a desolation, a dry land, and a wilderness, a land wherein no man dwelleth, neither doth '
  - type: text
    content: any
  - type: text
    content: ' son of man pass thereby. '
  '44':
  - type: text
    content: 'And I will punish Bel in Babylon, and I will bring forth out of his mouth that which he hath swallowed up: and the nations shall not flow together any more unto him: yea, the wall of Babylon shall fall.'
  '45':
  - type: text
    content: 'My people, go ye out of the midst of her, and deliver ye every man his soul from the fierce anger of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '46':
  - type: text
    content: 'And lest your heart faint, and ye fear for the rumour that shall be heard in the land; a rumour shall both come '
  - type: text
    content: one
  - type: text
    content: ' year, and after that in '
  - type: text
    content: another
  - type: text
    content: ' year '
  - type: text
    content: shall come
  - type: text
    content: ' a rumour, and violence in the land, ruler against ruler. '
  '47':
  - type: text
    content: 'Therefore, behold, the days come, that I will do judgment upon the graven images of Babylon: and her whole land shall be confounded, and all her slain shall fall in the midst of her. '
  '48':
  - type: text
    content: 'Then the heaven and the earth, and all that '
  - type: text
    content: is
  - type: text
    content: ' therein, shall sing for Babylon: for the spoilers shall come unto her from the north, saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '49':
  - type: text
    content: 'As Babylon '
  - type: text
    content: hath caused
  - type: text
    content: ' the slain of Israel to fall, so at Babylon shall fall the slain of all the earth.'
  '5':
  - type: text
    content: 'For Israel '
  - type: text
    content: hath
  - type: text
    content: ' not '
  - type: text
    content: been
  - type: text
    content: ' forsaken, nor Judah of his God, of the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; though their land was filled with sin against the Holy One of Israel.'
  '50':
  - type: text
    content: 'Ye that have escaped the sword, go away, stand not still: remember the '
  - type: text
    content: LORD
  - type: text
    content: ' afar off, and let Jerusalem come into your mind. '
  '51':
  - type: text
    content: 'We are confounded, because we have heard reproach: shame hath covered our faces: for strangers are come into the sanctuaries of the '
  - type: text
    content: LORD
  - type: text
    content: '''s house. '
  '52':
  - type: text
    content: 'Wherefore, behold, the days come, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', that I will do judgment upon her graven images: and through all her land the wounded shall groan. '
  '53':
  - type: text
    content: 'Though Babylon should mount up to heaven, and though she should fortify the height of her strength, '
  - type: text
    content: yet
  - type: text
    content: ' from me shall spoilers come unto her, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '54':
  - type: text
    content: 'A sound of a cry '
  - type: text
    content: cometh
  - type: text
    content: ' from Babylon, and great destruction from the land of the Chaldeans: '
  '55':
  - type: text
    content: 'because the '
  - type: text
    content: LORD
  - type: text
    content: ' hath spoiled Babylon, and destroyed out of her the great voice; when her waves do roar like great waters, a noise of their voice is uttered: '
  '56':
  - type: text
    content: 'because the spoiler is come upon her, '
  - type: text
