document_id: NEH.7
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now it came to pass, when the wall was built, and I had set up the doors, and the porters and the singers and the Levites were appointed, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'that I gave my brother Hanani, and Hananiah the ruler of the palace, charge over Jerusalem: for he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' a faithful man, and feared God above many. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And I said unto them, Let not the gates of Jerusalem be opened until the sun be hot; and while they stand by, let them shut the doors, and bar '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'them:'
  - type: text
    text: ' and appoint watches of the inhabitants of Jerusalem, every one in his watch, and every one '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' over against his house. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now the city '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' large and great: but the people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' few therein, and the houses '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' not builded.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Register of the Exiles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And my God put into mine heart to gather together the nobles, and the rulers, and the people, that they might be reckoned by genealogy. And I found a register of the genealogy of them which came up at the first, and found written therein, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the children of the province, that went up out of the captivity, of those that had been carried away, whom Nebuchadnezzar the king of Babylon had carried away, and came again to Jerusalem and to Judah, every one unto his city; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: who came with Zerubbabel, Jeshua, Nehemiah, Azariah, Raamiah, Nahamani, Mordecai, Bilshan, Mispereth, Bigvai, Nehum, Baanah.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The number, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I say
  - type: text
    text: ', of the men of the people of Israel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was this
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'the children of Parosh, two thousand an hundred seventy and two. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The children of Shephatiah, three hundred seventy and two. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The children of Arah, six hundred fifty and two. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The children of Pahath-moab, of the children of Jeshua and Joab, two thousand and eight hundred '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' eighteen. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The children of Elam, a thousand two hundred fifty and four. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The children of Zattu, eight hundred forty and five. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The children of Zaccai, seven hundred and threescore. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The children of Binnui, six hundred forty and eight. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The children of Bebai, six hundred twenty and eight. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The children of Azgad, two thousand three hundred twenty and two. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The children of Adonikam, six hundred threescore and seven. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The children of Bigvai, two thousand threescore and seven. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The children of Adin, six hundred fifty and five. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The children of Ater of Hezekiah, ninety and eight. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The children of Hashum, three hundred twenty and eight. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The children of Bezai, three hundred twenty and four. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The children of Hariph, an hundred and twelve. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The children of Gibeon, ninety and five. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The men of Beth-lehem and Netophah, an hundred fourscore and eight. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The men of Anathoth, an hundred twenty and eight. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'The men of Beth-azmaveth, forty and two. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'The men of Kirjath-jearim, Chephirah, and Beeroth, seven hundred forty and three. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The men of Ramah and Gaba, six hundred twenty and one. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'The men of Michmas, an hundred and twenty and two. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'The men of Beth-el and Ai, an hundred twenty and three. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The men of the other Nebo, fifty and two. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'The children of the other Elam, a thousand two hundred fifty and four. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'The children of Harim, three hundred and twenty. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'The children of Jericho, three hundred forty and five. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'The children of Lod, Hadid, and Ono, seven hundred twenty and one. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: The children of Senaah, three thousand nine hundred and thirty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'The priests: the children of Jedaiah, of the house of Jeshua, nine hundred seventy and three. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'The children of Immer, a thousand fifty and two. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'The children of Pashur, a thousand two hundred forty and seven. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: The children of Harim, a thousand and seventeen.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'The Levites: the children of Jeshua, of Kadmiel, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' of the children of Hodevah, seventy and four. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'The singers: the children of Asaph, an hundred forty and eight. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'The porters: the children of Shallum, the children of Ater, the children of Talmon, the children of Akkub, the children of Hatita, the children of Shobai, an hundred thirty and eight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'The Nethinims: the children of Ziha, the children of Hashupha, the children of Tabbaoth, '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'the children of Keros, the children of Sia, the children of Padon, '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'the children of Lebana, the children of Hagaba, the children of Shalmai, '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'the children of Hanan, the children of Giddel, the children of Gahar, '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'the children of Reaiah, the children of Rezin, the children of Nekoda, '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'the children of Gazzam, the children of Uzza, the children of Phaseah, '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'the children of Besai, the children of Meunim, the children of Nephishesim, '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'the children of Bakbuk, the children of Hakupha, the children of Harhur, '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'the children of Bazlith, the children of Mehida, the children of Harsha, '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'the children of Barkos, the children of Sisera, the children of Tamah, '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: the children of Neziah, the children of Hatipha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'The children of Solomon''s servants: the children of Sotai, the children of Sophereth, the children of Perida, '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'the children of Jaala, the children of Darkon, the children of Giddel, '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'the children of Shephatiah, the children of Hattil, the children of Pochereth of Zebaim, the children of Amon. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'All the Nethinims, and the children of Solomon''s servants, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' three hundred ninety and two.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'And these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' they which went up '
  - type: usfm
    marker: add
    children:
    - type: text
      text: also
  - type: text
    text: ' from Tel-melah, Tel-haresha, Cherub, Addon, and Immer: but they could not shew their father''s house, nor their seed, whether they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'The children of Delaiah, the children of Tobiah, the children of Nekoda, six hundred forty and two. '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'And of the priests: the children of Habaiah, the children of Koz, the children of Barzillai, which took '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' of the daughters of Barzillai the Gileadite to wife, and was called after their name. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'These sought their register '
  - type: usfm
    marker: add
    children:
    - type: text
      text: among
  - type: text
    text: ' those that were reckoned by genealogy, but it was not found: therefore were they, as polluted, put from the priesthood. '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'And the Tirshatha said unto them, that they should not eat of the most holy things, till there stood '
  - type: usfm
    marker: add
    children:
    - type: text
      text: up
  - type: text
    text: ' a priest with Urim and Thummim.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'The whole congregation together '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' forty and two thousand three hundred and threescore, '
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'beside their manservants and their maidservants, of whom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there were
  - type: text
    text: ' seven thousand three hundred thirty and seven: and they had two hundred forty and five singing men and singing women. '
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'Their horses, seven hundred thirty and six: their mules, two hundred forty and five: '
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' camels, four hundred thirty and five: six thousand seven hundred and twenty asses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: 'And some of the chief of the fathers gave unto the work. The Tirshatha gave to the treasure a thousand drams of gold, fifty basons, five hundred and thirty priests'' garments. '
  - type: usfm
    marker: v
    metadata:
      v: '71'
