document_id: NUM.21,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: when
    - type: text
      text: ' king Arad the Canaanite, which dwelt in the south, heard tell that Israel came by the way of the spies; then he fought against Israel, and took '
    - type: usfm
      marker: add
      children:
      - type: text
        text: some
    - type: text
      text: ' of them prisoners. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And the children of Israel set forward, and pitched in Oboth. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And they journeyed from Oboth, and pitched at Ije-abarim, in the wilderness which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' before Moab, toward the sunrising. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'From thence they removed, and pitched in the valley of Zared. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'From thence they removed, and pitched on the other side of Arnon, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the wilderness that cometh out of the coasts of the Amorites: for Arnon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the border of Moab, between Moab and the Amorites. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Wherefore it is said in the book of the wars of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What he did in the Red sea,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in the brooks of Arnon,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: And at the stream of the brooks
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That goeth down to the dwelling of Ar,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And lieth upon the border of Moab.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And from thence '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they went
    - type: text
      text: ' to Beer: that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the well whereof the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, Gather the people together, and I will give them water.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Then Israel sang this song,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Spring up, O well; sing ye unto it:'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: The princes digged the well,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The nobles of the people digged it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'By '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the direction of
    - type: text
      text: ' the lawgiver, with their staves.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And from the wilderness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they went
    - type: text
      text: ' to Mattanah: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'and from Mattanah to Nahaliel: and from Nahaliel to Bamoth: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And Israel vowed a vow unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and said, If thou wilt indeed deliver this people into my hand, then I will utterly destroy their cities. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'and from Bamoth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' the valley, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the country of Moab, to the top of Pisgah, which looketh toward Jeshimon.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And Israel sent messengers unto Sihon king of the Amorites, saying, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Let me pass through thy land: we will not turn into the fields, or into the vineyards; we will not drink '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' the waters of the well: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' we will go along by the king''s '
    - type: usfm
      marker: add
      children:
      - type: text
        text: high
    - type: text
      text: ' way, until we be past thy borders. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And Sihon would not suffer Israel to pass through his border: but Sihon gathered all his people together, and went out against Israel into the wilderness: and he came to Jahaz, and fought against Israel. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And Israel smote him with the edge of the sword, and possessed his land from Arnon unto Jabbok, even unto the children of Ammon: for the border of the children of Ammon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' strong. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And Israel took all these cities: and Israel dwelt in all the cities of the Amorites, in Heshbon, and in all the villages thereof. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'For Heshbon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the city of Sihon the king of the Amorites, who had fought against the former king of Moab, and taken all his land out of his hand, even unto Arnon. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Wherefore they that speak in proverbs say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come into Heshbon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let the city of Sihon be built and prepared:'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: For there is a fire gone out of Heshbon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A flame from the city of Sihon:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It hath consumed Ar of Moab,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' the lords of the high places of Arnon.'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Woe to thee, Moab!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou art undone, O people of Chemosh:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He hath given his sons that escaped,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his daughters, into captivity
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Unto Sihon king of the Amorites.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hearkened to the voice of Israel, and delivered up the Canaanites; and they utterly destroyed them and their cities: and he called the name of the place Hormah.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Brasen Serpent
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: We have shot at them; Heshbon is perished even unto Dibon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And we have laid them waste even unto Nophah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: reacheth
    - type: text
      text: ' unto Medeba.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Thus Israel dwelt in the land of the Amorites. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And Moses sent to spy out Jaazer, and they took the villages thereof, and drove out the Amorites that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' there.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And they turned and went up by the way of Bashan: and Og the king of Bashan went out against them, he, and all his people, to the battle at Edrei. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Moses, Fear him not: for I have delivered him into thy hand, and all his people, and his land; and thou shalt do to him as thou didst unto Sihon king of the Amorites, which dwelt at Heshbon. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'So they smote him, and his sons, and all his people, until there was none left him alive: and they possessed his land.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And they journeyed from mount Hor by the way of the Red sea, to compass the land of Edom: and the soul of the people was much discouraged because of the way. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And the people spake against God, and against Moses, Wherefore have ye brought us up out of Egypt to die in the wilderness? for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no bread, neither '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is there any
    - type: text
      text: ' water; and our soul loatheth this light bread. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' sent fiery serpents among the people, and they bit the people; and much people of Israel died. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Therefore the people came to Moses, and said, We have sinned, for we have spoken against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and against thee; pray unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', that he take away the serpents from us. And Moses prayed for the people. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Moses, Make thee a fiery serpent, and set it upon a pole: and it shall come to pass, that every one that is bitten, when he looketh upon it, shall live. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: And Moses made a serpent of brass, and put it upon a pole, and it came to pass, that if a serpent had bitten any man, when he beheld the serpent of brass, he lived.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: To the Plains of Moab
    marker-yv: yv-h
