  '1':
  - type: text
    content: 'And '
  - type: text
    content: when
  - type: text
    content: ' king Arad the Canaanite, which dwelt in the south, heard tell that Israel came by the way of the spies; then he fought against Israel, and took '
  - type: text
    content: some
  - type: text
    content: ' of them prisoners. '
  '10':
  - type: text
    content: 'And the children of Israel set forward, and pitched in Oboth. '
  '11':
  - type: text
    content: 'And they journeyed from Oboth, and pitched at Ije-abarim, in the wilderness which '
  - type: text
    content: is
  - type: text
    content: ' before Moab, toward the sunrising. '
  '12':
  - type: text
    content: 'From thence they removed, and pitched in the valley of Zared. '
  '13':
  - type: text
    content: 'From thence they removed, and pitched on the other side of Arnon, which '
  - type: text
    content: is
  - type: text
    content: ' in the wilderness that cometh out of the coasts of the Amorites: for Arnon '
  - type: text
    content: is
  - type: text
    content: ' the border of Moab, between Moab and the Amorites. '
  '14':
  - type: text
    content: 'Wherefore it is said in the book of the wars of the '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: What he did in the Red sea,
  - type: text
    content: And in the brooks of Arnon,
  '15':
  - type: text
    content: And at the stream of the brooks
  - type: text
    content: That goeth down to the dwelling of Ar,
  - type: text
    content: And lieth upon the border of Moab.
  '16':
  - type: text
    content: 'And from thence '
  - type: text
    content: they went
  - type: text
    content: ' to Beer: that '
  - type: text
    content: is
  - type: text
    content: ' the well whereof the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, Gather the people together, and I will give them water.'
  '17':
  - type: text
    content: Then Israel sang this song,
  - type: text
    content: 'Spring up, O well; sing ye unto it:'
  '18':
  - type: text
    content: The princes digged the well,
  - type: text
    content: The nobles of the people digged it,
  - type: text
    content: 'By '
  - type: text
    content: the direction of
  - type: text
    content: ' the lawgiver, with their staves.'
  - type: text
    content: 'And from the wilderness '
  - type: text
    content: they went
  - type: text
    content: ' to Mattanah: '
  '19':
  - type: text
    content: 'and from Mattanah to Nahaliel: and from Nahaliel to Bamoth: '
  '2':
  - type: text
    content: 'And Israel vowed a vow unto the '
  - type: text
    content: LORD
  - type: text
    content: ', and said, If thou wilt indeed deliver this people into my hand, then I will utterly destroy their cities. '
  '20':
  - type: text
    content: 'and from Bamoth '
  - type: text
    content: in
  - type: text
    content: ' the valley, that '
  - type: text
    content: is
  - type: text
    content: ' in the country of Moab, to the top of Pisgah, which looketh toward Jeshimon.'
  '21':
  - type: text
    content: 'And Israel sent messengers unto Sihon king of the Amorites, saying, '
  '22':
  - type: text
    content: 'Let me pass through thy land: we will not turn into the fields, or into the vineyards; we will not drink '
  - type: text
    content: of
  - type: text
    content: ' the waters of the well: '
  - type: text
    content: but
  - type: text
    content: ' we will go along by the king''s '
  - type: text
    content: high
  - type: text
    content: ' way, until we be past thy borders. '
  '23':
  - type: text
    content: 'And Sihon would not suffer Israel to pass through his border: but Sihon gathered all his people together, and went out against Israel into the wilderness: and he came to Jahaz, and fought against Israel. '
  '24':
  - type: text
    content: 'And Israel smote him with the edge of the sword, and possessed his land from Arnon unto Jabbok, even unto the children of Ammon: for the border of the children of Ammon '
  - type: text
    content: was
  - type: text
    content: ' strong. '
  '25':
  - type: text
    content: 'And Israel took all these cities: and Israel dwelt in all the cities of the Amorites, in Heshbon, and in all the villages thereof. '
  '26':
  - type: text
    content: 'For Heshbon '
  - type: text
    content: was
  - type: text
    content: ' the city of Sihon the king of the Amorites, who had fought against the former king of Moab, and taken all his land out of his hand, even unto Arnon. '
  '27':
  - type: text
    content: Wherefore they that speak in proverbs say,
  - type: text
    content: Come into Heshbon,
  - type: text
    content: 'Let the city of Sihon be built and prepared:'
  '28':
  - type: text
    content: For there is a fire gone out of Heshbon,
  - type: text
    content: 'A flame from the city of Sihon:'
  - type: text
    content: It hath consumed Ar of Moab,
  - type: text
    content: And
  - type: text
    content: ' the lords of the high places of Arnon.'
  '29':
  - type: text
    content: Woe to thee, Moab!
  - type: text
    content: 'Thou art undone, O people of Chemosh:'
  - type: text
    content: He hath given his sons that escaped,
  - type: text
    content: And his daughters, into captivity
  - type: text
    content: Unto Sihon king of the Amorites.
  '3':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' hearkened to the voice of Israel, and delivered up the Canaanites; and they utterly destroyed them and their cities: and he called the name of the place Hormah.'
  - type: heading
    content: Brasen Serpent
  '30':
  - type: text
    content: We have shot at them; Heshbon is perished even unto Dibon,
  - type: text
    content: And we have laid them waste even unto Nophah,
  - type: text
    content: 'Which '
  - type: text
    content: reacheth
  - type: text
    content: ' unto Medeba.'
  '31':
  - type: text
    content: 'Thus Israel dwelt in the land of the Amorites. '
  '32':
  - type: text
    content: 'And Moses sent to spy out Jaazer, and they took the villages thereof, and drove out the Amorites that '
  - type: text
    content: were
  - type: text
    content: ' there.'
  '33':
  - type: text
    content: 'And they turned and went up by the way of Bashan: and Og the king of Bashan went out against them, he, and all his people, to the battle at Edrei. '
  '34':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Moses, Fear him not: for I have delivered him into thy hand, and all his people, and his land; and thou shalt do to him as thou didst unto Sihon king of the Amorites, which dwelt at Heshbon. '
  '35':
  - type: text
    content: 'So they smote him, and his sons, and all his people, until there was none left him alive: and they possessed his land.'
  '4':
  - type: text
    content: 'And they journeyed from mount Hor by the way of the Red sea, to compass the land of Edom: and the soul of the people was much discouraged because of the way. '
  '5':
  - type: text
    content: 'And the people spake against God, and against Moses, Wherefore have ye brought us up out of Egypt to die in the wilderness? for '
  - type: text
    content: there is
  - type: text
    content: ' no bread, neither '
  - type: text
    content: is there any
  - type: text
    content: ' water; and our soul loatheth this light bread. '
  '6':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' sent fiery serpents among the people, and they bit the people; and much people of Israel died. '
  '7':
  - type: text
    content: 'Therefore the people came to Moses, and said, We have sinned, for we have spoken against the '
  - type: text
    content: LORD
  - type: text
    content: ', and against thee; pray unto the '
  - type: text
    content: LORD
  - type: text
    content: ', that he take away the serpents from us. And Moses prayed for the people. '
  '8':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Moses, Make thee a fiery serpent, and set it upon a pole: and it shall come to pass, that every one that is bitten, when he looketh upon it, shall live. '
  '9':
  - type: text
    content: And Moses made a serpent of brass, and put it upon a pole, and it came to pass, that if a serpent had bitten any man, when he beheld the serpent of brass, he lived.
  - type: heading
    content: To the Plains of Moab
