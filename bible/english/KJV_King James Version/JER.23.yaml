document_id: JER.23,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Woe be unto the pastors that destroy and scatter the sheep of my pasture! saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'For the land is full of adulterers; for because of swearing the land mourneth; the pleasant places of the wilderness are dried up, and their course is evil, and their force '
  - type: text
    content: is
  - type: text
    content: ' not right. '
  '11':
  - type: text
    content: 'For both prophet and priest are profane; yea, in my house have I found their wickedness, saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Wherefore their way shall be unto them as slippery '
  - type: text
    content: ways
  - type: text
    content: ' in the darkness: they shall be driven on, and fall therein: for I will bring evil upon them, '
  - type: text
    content: even
  - type: text
    content: ' the year of their visitation, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '13':
  - type: text
    content: 'And I have seen folly in the prophets of Samaria; they prophesied in Baal, and caused my people Israel to err. '
  '14':
  - type: text
    content: 'I have seen also in the prophets of Jerusalem an horrible thing: they commit adultery, and walk in lies: they strengthen also the hands of evildoers, that none doth return from his wickedness: they are all of them unto me as Sodom, and the inhabitants thereof as Gomorrah. '
  '15':
  - type: text
    content: 'Therefore thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts concerning the prophets; Behold, I will feed them with wormwood, and make them drink the water of gall: for from the prophets of Jerusalem is profaneness gone forth into all the land.'
  '16':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, Hearken not unto the words of the prophets that prophesy unto you: they make you vain: they speak a vision of their own heart, '
  - type: text
    content: and
  - type: text
    content: ' not out of the mouth of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'They say still unto them that despise me, The '
  - type: text
    content: LORD
  - type: text
    content: ' hath said, Ye shall have peace; and they say unto every one that walketh after the imagination of his own heart, No evil shall come upon you. '
  '18':
  - type: text
    content: 'For who hath stood in the counsel of the '
  - type: text
    content: LORD
  - type: text
    content: ', and hath perceived and heard his word? who hath marked his word, and heard '
  - type: text
    content: it?
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Behold, a whirlwind of the '
  - type: text
    content: LORD
  - type: text
    content: ' is gone forth in fury, even a grievous whirlwind: it shall fall grievously upon the head of the wicked. '
  '2':
  - type: text
    content: 'Therefore thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel against the pastors that feed my people; Ye have scattered my flock, and driven them away, and have not visited them: behold, I will visit upon you the evil of your doings, saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'The anger of the '
  - type: text
    content: LORD
  - type: text
    content: ' shall not return, until he have executed, and till he have performed the thoughts of his heart: in the latter days ye shall consider it perfectly. '
  '21':
  - type: text
    content: 'I have not sent these prophets, yet they ran: I have not spoken to them, yet they prophesied. '
  '22':
  - type: text
    content: But if they had stood in my counsel, and had caused my people to hear my words, then they should have turned them from their evil way, and from the evil of their doings.
  '23':
  - type: text
    content: ' '
  - type: text
    content: Am
  - type: text
    content: ' I a God at hand, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', and not a God afar off? '
  '24':
  - type: text
    content: 'Can any hide himself in secret places that I shall not see him? saith the '
  - type: text
    content: LORD
  - type: text
    content: '. Do not I fill heaven and earth? saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'I have heard what the prophets said, that prophesy lies in my name, saying, I have dreamed, I have dreamed. '
  '26':
  - type: text
    content: 'How long shall '
  - type: text
    content: this
  - type: text
    content: ' be in the heart of the prophets that prophesy lies? yea, '
  - type: text
    content: they are
  - type: text
    content: ' prophets of the deceit of their own heart; '
  '27':
  - type: text
    content: 'which think to cause my people to forget my name by their dreams which they tell every man to his neighbour, as their fathers have forgotten my name for Baal. '
  '28':
  - type: text
    content: 'The prophet that hath a dream, let him tell a dream; and he that hath my word, let him speak my word faithfully. What '
  - type: text
    content: is
  - type: text
    content: ' the chaff to the wheat? saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '29':
  - type: text
    content: Is
  - type: text
    content: ' not my word like as a fire? saith the '
  - type: text
    content: LORD
  - type: text
    content: '; and like a hammer '
  - type: text
    content: that
  - type: text
    content: ' breaketh the rock in pieces? '
  '3':
  - type: text
    content: 'And I will gather the remnant of my flock out of all countries whither I have driven them, and will bring them again to their folds; and they shall be fruitful and increase. '
  '30':
  - type: text
    content: 'Therefore, behold, I '
  - type: text
    content: am
  - type: text
    content: ' against the prophets, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', that steal my words every one from his neighbour. '
  '31':
  - type: text
    content: 'Behold, I '
  - type: text
    content: am
  - type: text
    content: ' against the prophets, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', that use their tongues, and say, He saith.'
  '32':
  - type: text
    content: 'Behold, I '
  - type: text
    content: am
  - type: text
    content: ' against them that prophesy false dreams, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', and do tell them, and cause my people to err by their lies, and by their lightness; yet I sent them not, nor commanded them: therefore they shall not profit this people at all, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '33':
  - type: text
    content: 'And when this people, or the prophet, or a priest, shall ask thee, saying, What '
  - type: text
    content: is
  - type: text
    content: ' the burden of the '
  - type: text
    content: LORD
  - type: text
    content: '? thou shalt then say unto them, What burden? I will even forsake you, saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '34':
  - type: text
    content: 'And '
  - type: text
    content: as for
  - type: text
    content: ' the prophet, and the priest, and the people, that shall say, The burden of the '
  - type: text
    content: LORD
  - type: text
    content: ', I will even punish that man and his house. '
  '35':
  - type: text
    content: 'Thus shall ye say every one to his neighbour, and every one to his brother, What hath the '
  - type: text
    content: LORD
  - type: text
    content: ' answered? and, What hath the '
  - type: text
    content: LORD
  - type: text
    content: ' spoken? '
  '36':
  - type: text
    content: 'And the burden of the '
  - type: text
    content: LORD
  - type: text
    content: ' shall ye mention no more: for every man''s word shall be his burden; for ye have perverted the words of the living God, of the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts our God. '
  '37':
  - type: text
    content: 'Thus shalt thou say to the prophet, What hath the '
  - type: text
    content: LORD
  - type: text
    content: ' answered thee? and, What hath the '
  - type: text
    content: LORD
  - type: text
    content: ' spoken? '
  '38':
  - type: text
    content: 'But since ye say, The burden of the '
  - type: text
    content: LORD
  - type: text
    content: '; therefore thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Because ye say this word, The burden of the '
  - type: text
    content: LORD
  - type: text
    content: ', and I have sent unto you, saying, Ye shall not say, The burden of the '
  - type: text
    content: LORD
  - type: text
    content: '; '
  '39':
  - type: text
    content: 'therefore, behold, I, even I, will utterly forget you, and I will forsake you, and the city that I gave you and your fathers, '
  - type: text
    content: and cast you
  - type: text
    content: ' out of my presence: '
  '4':
  - type: text
    content: 'And I will set up shepherds over them which shall feed them: and they shall fear no more, nor be dismayed, neither shall they be lacking, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '40':
  - type: text
    content: and I will bring an everlasting reproach upon you, and a perpetual shame, which shall not be forgotten.
  '5':
  - type: text
    content: 'Behold, the days come, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', that I will raise unto David a righteous Branch, and a King shall reign and prosper, and shall execute judgment and justice in the earth. '
  '6':
  - type: text
    content: 'In his days Judah shall be saved, and Israel shall dwell safely: and this '
  - type: text
    content: is
  - type: text
    content: ' his name whereby he shall be called, THE '
  - type: text
    content: Lord
  - type: text
    content: ' OUR RIGHTEOUSNESS. '
  '7':
  - type: text
    content: 'Therefore, behold, the days come, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', that they shall no more say, The '
  - type: text
    content: LORD
  - type: text
    content: ' liveth, which brought up the children of Israel out of the land of Egypt; '
  '8':
  - type: text
    content: 'but, The '
  - type: text
    content: LORD
  - type: text
    content: ' liveth, which brought up and which led the seed of the house of Israel out of the north country, and from all countries whither I had driven them; and they shall dwell in their own land.'
  - type: heading
    content: Unworthy Prophets and Priests
  '9':
  - type: text
    content: 'Mine heart within me is broken because of the prophets; all my bones shake; I am like a drunken man, and like a man whom wine hath overcome, because of the '
  - type: text
    content: LORD
  - type: text
    content: ', and because of the words of his holiness. '
