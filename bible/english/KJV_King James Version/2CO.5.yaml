document_id: 2CO.5
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: A House Not Made With Hands
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'For we know that if our earthly house of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' tabernacle were dissolved, we have a building of God, an house not made with hands, eternal in the heavens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For in this we groan, earnestly desiring to be clothed upon with our house which is from heaven: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'if so be that being clothed we shall not be found naked. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For we that are in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' tabernacle do groan, being burdened: not for that we would be unclothed, but clothed upon, that mortality might be swallowed up of life. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now he that hath wrought us for the selfsame thing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' God, who also hath given unto us the earnest of the Spirit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Therefore '
  - type: usfm
    marker: add
    children:
    - type: text
      text: we are
  - type: text
    text: ' always confident, knowing that, whilst we are at home in the body, we are absent from the Lord: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '(for we walk by faith, not by sight:) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'we are confident, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I say
  - type: text
    text: ', and willing rather to be absent from the body, and to be present with the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Wherefore we labour, that, whether present or absent, we may be accepted of him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For we must all appear before the judgment seat of Christ; that every one may receive the things '
  - type: usfm
    marker: add
    children:
    - type: text
      text: done
  - type: text
    text: ' in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' body, according to that he hath done, whether '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it be
  - type: text
    text: ' good or bad.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: For the Glory of God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Knowing therefore the terror of the Lord, we persuade men; but we are made manifest unto God; and I trust also are made manifest in your consciences. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For we commend not ourselves again unto you, but give you occasion to glory on our behalf, that ye may have somewhat to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: answer
  - type: text
    text: ' them which glory in appearance, and not in heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For whether we be beside ourselves, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' to God: or whether we be sober, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' for your cause. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For the love of Christ constraineth us; because we thus judge, that if one died for all, then were all dead: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' he died for all, that they which live should not henceforth live unto themselves, but unto him which died for them, and rose again.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: A New Creature
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Wherefore henceforth know we no man after the flesh: yea, though we have known Christ after the flesh, yet now henceforth know we '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' no more. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Therefore if any man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' in Christ, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he is
  - type: text
    text: ' a new creature: old things are passed away; behold, all things are become new. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And all things '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' of God, who hath reconciled us to himself by Jesus Christ, and hath given to us the ministry of reconciliation; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: to wit, that God was in Christ, reconciling the world unto himself, not imputing their trespasses unto them; and hath committed unto us the word of reconciliation.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ambassadors for Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Now then we are ambassadors for Christ, as though God did beseech '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: ' by us: we pray '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: ' in Christ''s stead, be ye reconciled to God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For he hath made him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' sin for us, who knew no sin; that we might be made the righteousness of God in him.'
