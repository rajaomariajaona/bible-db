document_id: 2CO.5,1
type_code: eng
verses:
  '1':
  - type: heading
    content: A House Not Made With Hands
  - type: text
    content: 'For we know that if our earthly house of '
  - type: text
    content: this
  - type: text
    content: ' tabernacle were dissolved, we have a building of God, an house not made with hands, eternal in the heavens. '
  '10':
  - type: text
    content: 'For we must all appear before the judgment seat of Christ; that every one may receive the things '
  - type: text
    content: done
  - type: text
    content: ' in '
  - type: text
    content: his
  - type: text
    content: ' body, according to that he hath done, whether '
  - type: text
    content: it be
  - type: text
    content: ' good or bad.'
  - type: heading
    content: For the Glory of God
  '11':
  - type: text
    content: 'Knowing therefore the terror of the Lord, we persuade men; but we are made manifest unto God; and I trust also are made manifest in your consciences. '
  '12':
  - type: text
    content: 'For we commend not ourselves again unto you, but give you occasion to glory on our behalf, that ye may have somewhat to '
  - type: text
    content: answer
  - type: text
    content: ' them which glory in appearance, and not in heart. '
  '13':
  - type: text
    content: 'For whether we be beside ourselves, '
  - type: text
    content: it is
  - type: text
    content: ' to God: or whether we be sober, '
  - type: text
    content: it is
  - type: text
    content: ' for your cause. '
  '14':
  - type: text
    content: 'For the love of Christ constraineth us; because we thus judge, that if one died for all, then were all dead: '
  '15':
  - type: text
    content: 'and '
  - type: text
    content: that
  - type: text
    content: ' he died for all, that they which live should not henceforth live unto themselves, but unto him which died for them, and rose again.'
  - type: heading
    content: A New Creature
  '16':
  - type: text
    content: 'Wherefore henceforth know we no man after the flesh: yea, though we have known Christ after the flesh, yet now henceforth know we '
  - type: text
    content: him
  - type: text
    content: ' no more. '
  '17':
  - type: text
    content: 'Therefore if any man '
  - type: text
    content: be
  - type: text
    content: ' in Christ, '
  - type: text
    content: he is
  - type: text
    content: ' a new creature: old things are passed away; behold, all things are become new. '
  '18':
  - type: text
    content: 'And all things '
  - type: text
    content: are
  - type: text
    content: ' of God, who hath reconciled us to himself by Jesus Christ, and hath given to us the ministry of reconciliation; '
  '19':
  - type: text
    content: to wit, that God was in Christ, reconciling the world unto himself, not imputing their trespasses unto them; and hath committed unto us the word of reconciliation.
  - type: heading
    content: Ambassadors for Christ
  '2':
  - type: text
    content: 'For in this we groan, earnestly desiring to be clothed upon with our house which is from heaven: '
  '20':
  - type: text
    content: 'Now then we are ambassadors for Christ, as though God did beseech '
  - type: text
    content: you
  - type: text
    content: ' by us: we pray '
  - type: text
    content: you
  - type: text
    content: ' in Christ''s stead, be ye reconciled to God. '
  '21':
  - type: text
    content: 'For he hath made him '
  - type: text
    content: to be
  - type: text
    content: ' sin for us, who knew no sin; that we might be made the righteousness of God in him.'
  '3':
  - type: text
    content: 'if so be that being clothed we shall not be found naked. '
  '4':
  - type: text
    content: 'For we that are in '
  - type: text
    content: this
  - type: text
    content: ' tabernacle do groan, being burdened: not for that we would be unclothed, but clothed upon, that mortality might be swallowed up of life. '
  '5':
  - type: text
    content: 'Now he that hath wrought us for the selfsame thing '
  - type: text
    content: is
  - type: text
    content: ' God, who also hath given unto us the earnest of the Spirit.'
  '6':
  - type: text
    content: 'Therefore '
  - type: text
    content: we are
  - type: text
    content: ' always confident, knowing that, whilst we are at home in the body, we are absent from the Lord: '
  '7':
  - type: text
    content: '(for we walk by faith, not by sight:) '
  '8':
  - type: text
    content: 'we are confident, '
  - type: text
    content: I say
  - type: text
    content: ', and willing rather to be absent from the body, and to be present with the Lord. '
  '9':
  - type: text
    content: 'Wherefore we labour, that, whether present or absent, we may be accepted of him. '
