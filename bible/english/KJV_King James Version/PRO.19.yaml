document_id: PRO.19,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Better '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the poor that walketh in his integrity,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Than '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he that is
    - type: text
      text: ' perverse in his lips, and is a fool.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Delight is not seemly for a fool;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Much less for a servant to have rule over princes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The discretion of a man deferreth his anger;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' his glory to pass over a transgression.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'The king''s wrath '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' as the roaring of a lion;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But his favour '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' as dew upon the grass.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'A foolish son '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the calamity of his father:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the contentions of a wife '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' a continual dropping.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'House and riches '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the inheritance of fathers:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And a prudent wife '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Slothfulness casteth into a deep sleep;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And an idle soul shall suffer hunger.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: He that keepeth the commandment keepeth his own soul;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: But
    - type: text
      text: ' he that despiseth his ways shall die.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'He that hath pity upon the poor lendeth unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And that which he hath given will he pay him again.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Chasten thy son while there is hope,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let not thy soul spare for his crying.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'A man of great wrath shall suffer punishment:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For if thou deliver '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', yet thou must do it again.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Also, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the soul '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' without knowledge, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' not good;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And he that hasteth with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' feet sinneth.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Hear counsel, and receive instruction,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That thou mayest be wise in thy latter end.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: There are
    - type: text
      text: ' many devices in a man''s heart;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Nevertheless the counsel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', that shall stand.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'The desire of a man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' his kindness:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And a poor man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' better than a liar.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'The fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: tendeth
    - type: text
      text: ' to life:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he that hath it
    - type: text
      text: ' shall abide satisfied;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shall not be visited with evil.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'A slothful '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' hideth his hand in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' bosom,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And will not so much as bring it to his mouth again.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Smite a scorner, and the simple will beware:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And reprove one that hath understanding, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' he will understand knowledge.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'He that wasteth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' father, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' chaseth away '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' mother,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' a son that causeth shame, and bringeth reproach.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Cease, my son, to hear the instruction
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: That causeth
    - type: text
      text: ' to err from the words of knowledge.'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'An ungodly witness scorneth judgment:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the mouth of the wicked devoureth iniquity.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Judgments are prepared for scorners,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And stripes for the back of fools.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The foolishness of man perverteth his way:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And his heart fretteth against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Wealth maketh many friends;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the poor is separated from his neighbour.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: A false witness shall not be unpunished,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he that
    - type: text
      text: ' speaketh lies shall not escape.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Many will intreat the favour of the prince:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And every man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a friend to him that giveth gifts.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'All the brethren of the poor do hate him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How much more do his friends go far from him?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He pursueth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them with
    - type: text
      text: ' words, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yet
    - type: text
      text: ' they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' wanting '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to him
    - type: text
      text: .
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'He that getteth wisdom loveth his own soul:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He that keepeth understanding shall find good.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: A false witness shall not be unpunished,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he that
    - type: text
      text: ' speaketh lies shall perish.'
