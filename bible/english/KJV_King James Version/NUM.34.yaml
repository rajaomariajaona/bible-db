document_id: NUM.34,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '10':
  - type: text
    content: 'And ye shall point out your east border from Hazar-enan to Shepham: '
  '11':
  - type: text
    content: 'and the coast shall go down from Shepham to Riblah, on the east side of Ain; and the border shall descend, and shall reach unto the side of the sea of Chinnereth eastward: '
  '12':
  - type: text
    content: 'and the border shall go down to Jordan, and the goings out of it shall be at the salt sea: this shall be your land with the coasts thereof round about.'
  '13':
  - type: text
    content: 'And Moses commanded the children of Israel, saying, This '
  - type: text
    content: is
  - type: text
    content: ' the land which ye shall inherit by lot, which the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded to give unto the nine tribes, and to the half tribe: '
  '14':
  - type: text
    content: 'for the tribe of the children of Reuben according to the house of their fathers, and the tribe of the children of Gad according to the house of their fathers, have received '
  - type: text
    content: their inheritance
  - type: text
    content: '; and half the tribe of Manasseh have received their inheritance: '
  '15':
  - type: text
    content: 'the two tribes and the half tribe have received their inheritance on this side Jordan '
  - type: text
    content: near
  - type: text
    content: ' Jericho eastward, toward the sunrising.'
  '16':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '17':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the names of the men which shall divide the land unto you: Eleazar the priest, and Joshua the son of Nun. '
  '18':
  - type: text
    content: 'And ye shall take one prince of every tribe, to divide the land by inheritance. '
  '19':
  - type: text
    content: 'And the names of the men '
  - type: text
    content: are
  - type: text
    content: ' these: Of the tribe of Judah, Caleb the son of Jephunneh. '
  '2':
  - type: text
    content: 'Command the children of Israel, and say unto them, When ye come into the land of Canaan; (this '
  - type: text
    content: is
  - type: text
    content: ' the land that shall fall unto you for an inheritance, '
  - type: text
    content: even
  - type: text
    content: ' the land of Canaan with the coasts thereof:) '
  '20':
  - type: text
    content: 'And of the tribe of the children of Simeon, Shemuel the son of Ammihud. '
  '21':
  - type: text
    content: 'Of the tribe of Benjamin, Elidad the son of Chislon. '
  '22':
  - type: text
    content: 'And the prince of the tribe of the children of Dan, Bukki the son of Jogli. '
  '23':
  - type: text
    content: 'The prince of the children of Joseph, for the tribe of the children of Manasseh, Hanniel the son of Ephod. '
  '24':
  - type: text
    content: 'And the prince of the tribe of the children of Ephraim, Kemuel the son of Shiphtan. '
  '25':
  - type: text
    content: 'And the prince of the tribe of the children of Zebulun, Elizaphan the son of Parnach. '
  '26':
  - type: text
    content: 'And the prince of the tribe of the children of Issachar, Paltiel the son of Azzan. '
  '27':
  - type: text
    content: 'And the prince of the tribe of the children of Asher, Ahihud the son of Shelomi. '
  '28':
  - type: text
    content: 'And the prince of the tribe of the children of Naphtali, Pedahel the son of Ammihud. '
  '29':
  - type: text
    content: 'These '
  - type: text
    content: are they
  - type: text
    content: ' whom the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded to divide the inheritance unto the children of Israel in the land of Canaan.'
  '3':
  - type: text
    content: 'then your south quarter shall be from the wilderness of Zin along by the coast of Edom, and your south border shall be the outmost coast of the salt sea eastward: '
  '4':
  - type: text
    content: 'and your border shall turn from the south to the ascent of Akrabbim, and pass on to Zin: and the going forth thereof shall be from the south to Kadesh-barnea, and shall go on to Hazar-addar, and pass on to Azmon: '
  '5':
  - type: text
    content: and the border shall fetch a compass from Azmon unto the river of Egypt, and the goings out of it shall be at the sea.
  '6':
  - type: text
    content: 'And '
  - type: text
    content: as for
  - type: text
    content: ' the western border, ye shall even have the great sea for a border: this shall be your west border.'
  '7':
  - type: text
    content: 'And this shall be your north border: from the great sea ye shall point out for you mount Hor: '
  '8':
  - type: text
    content: 'from mount Hor ye shall point out '
  - type: text
    content: your border
  - type: text
    content: ' unto the entrance of Hamath; and the goings forth of the border shall be to Zedad: '
  '9':
  - type: text
    content: 'and the border shall go on to Ziphron, and the goings out of it shall be at Hazar-enan: this shall be your north border.'
