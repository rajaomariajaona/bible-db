  '1':
  - type: heading
    content: Judah's Kings
  - type: text
    content: 'In the twenty and seventh year of Jeroboam king of Israel began Azariah son of Amaziah king of Judah to reign. '
  '10':
  - type: text
    content: 'And Shallum the son of Jabesh conspired against him, and smote him before the people, and slew him, and reigned in his stead. '
  '11':
  - type: text
    content: 'And the rest of the acts of Zachariah, behold, they '
  - type: text
    content: are
  - type: text
    content: ' written in the book of the chronicles of the kings of Israel. '
  '12':
  - type: text
    content: 'This '
  - type: text
    content: was
  - type: text
    content: ' the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' which he spake unto Jehu, saying, Thy sons shall sit on the throne of Israel unto the fourth '
  - type: text
    content: generation
  - type: text
    content: . And so it came to pass.
  '13':
  - type: text
    content: 'Shallum the son of Jabesh began to reign in the nine and thirtieth year of Uzziah king of Judah; and he reigned a full month in Samaria. '
  '14':
  - type: text
    content: 'For Menahem the son of Gadi went up from Tirzah, and came to Samaria, and smote Shallum the son of Jabesh in Samaria, and slew him, and reigned in his stead. '
  '15':
  - type: text
    content: 'And the rest of the acts of Shallum, and his conspiracy which he made, behold, they '
  - type: text
    content: are
  - type: text
    content: ' written in the book of the chronicles of the kings of Israel. '
  '16':
  - type: text
    content: 'Then Menahem smote Tiphsah, and all that '
  - type: text
    content: were
  - type: text
    content: ' therein, and the coasts thereof from Tirzah: because they opened not '
  - type: text
    content: to him
  - type: text
    content: ', therefore he smote '
  - type: text
    content: it; and
  - type: text
    content: ' all the women therein that were with child he ripped up.'
  '17':
  - type: text
    content: 'In the nine and thirtieth year of Azariah king of Judah began Menahem the son of Gadi to reign over Israel, '
  - type: text
    content: and reigned
  - type: text
    content: ' ten years in Samaria. '
  '18':
  - type: text
    content: 'And he did '
  - type: text
    content: that which was
  - type: text
    content: ' evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ': he departed not all his days from the sins of Jeroboam the son of Nebat, who made Israel to sin. '
  '19':
  - type: text
    content: And
  - type: text
    content: ' Pul the king of Assyria came against the land: and Menahem gave Pul a thousand talents of silver, that his hand might be with him to confirm the kingdom in his hand. '
  '2':
  - type: text
    content: 'Sixteen years old was he when he began to reign, and he reigned two and fifty years in Jerusalem. And his mother''s name '
  - type: text
    content: was
  - type: text
    content: ' Jecholiah of Jerusalem. '
  '20':
  - type: text
    content: 'And Menahem exacted the money of Israel, '
  - type: text
    content: even
  - type: text
    content: ' of all the mighty men of wealth, of each man fifty shekels of silver, to give to the king of Assyria. So the king of Assyria turned back, and stayed not there in the land. '
  '21':
  - type: text
    content: 'And the rest of the acts of Menahem, and all that he did, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Israel? '
  '22':
  - type: text
    content: And Menahem slept with his fathers; and Pekahiah his son reigned in his stead.
  '23':
  - type: text
    content: 'In the fiftieth year of Azariah king of Judah Pekahiah the son of Menahem began to reign over Israel in Samaria, '
  - type: text
    content: and reigned
  - type: text
    content: ' two years. '
  '24':
  - type: text
    content: 'And he did '
  - type: text
    content: that which was
  - type: text
    content: ' evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ': he departed not from the sins of Jeroboam the son of Nebat, who made Israel to sin. '
  '25':
  - type: text
    content: 'But Pekah the son of Remaliah, a captain of his, conspired against him, and smote him in Samaria, in the palace of the king''s house, with Argob and Arieh, and with him fifty men of the Gileadites: and he killed him, and reigned in his room. '
  '26':
  - type: text
    content: 'And the rest of the acts of Pekahiah, and all that he did, behold, they '
  - type: text
    content: are
  - type: text
    content: ' written in the book of the chronicles of the kings of Israel.'
  '27':
  - type: text
    content: 'In the two and fiftieth year of Azariah king of Judah Pekah the son of Remaliah began to reign over Israel in Samaria, '
  - type: text
    content: and reigned
  - type: text
    content: ' twenty years. '
  '28':
  - type: text
    content: 'And he did '
  - type: text
    content: that which was
  - type: text
    content: ' evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ': he departed not from the sins of Jeroboam the son of Nebat, who made Israel to sin. '
  '29':
  - type: text
    content: 'In the days of Pekah king of Israel came Tiglath-pileser king of Assyria, and took Ijon, and Abel-beth-maachah, and Janoah, and Kedesh, and Hazor, and Gilead, and Galilee, all the land of Naphtali, and carried them captive to Assyria. '
  '3':
  - type: text
    content: 'And he did '
  - type: text
    content: that which was
  - type: text
    content: ' right in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', according to all that his father Amaziah had done; '
  '30':
  - type: text
    content: 'And Hoshea the son of Elah made a conspiracy against Pekah the son of Remaliah, and smote him, and slew him, and reigned in his stead, in the twentieth year of Jotham the son of Uzziah. '
  '31':
  - type: text
    content: 'And the rest of the acts of Pekah, and all that he did, behold, they '
  - type: text
    content: are
  - type: text
    content: ' written in the book of the chronicles of the kings of Israel.'
  - type: heading
    content: Jotham
  '32':
  - type: text
    content: 'In the second year of Pekah the son of Remaliah king of Israel began Jotham the son of Uzziah king of Judah to reign. '
  '33':
  - type: text
    content: 'Five and twenty years old was he when he began to reign, and he reigned sixteen years in Jerusalem. And his mother''s name '
  - type: text
    content: was
  - type: text
    content: ' Jerusha, the daughter of Zadok. '
  '34':
  - type: text
    content: 'And he did '
  - type: text
    content: that which was
  - type: text
    content: ' right in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ': he did according to all that his father Uzziah had done. '
  '35':
  - type: text
    content: 'Howbeit the high places were not removed: the people sacrificed and burned incense still in the high places. He built the higher gate of the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '36':
  - type: text
    content: 'Now the rest of the acts of Jotham, and all that he did, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Judah? '
  '37':
  - type: text
    content: 'In those days the '
  - type: text
    content: LORD
  - type: text
    content: ' began to send against Judah Rezin the king of Syria, and Pekah the son of Remaliah. '
  '38':
  - type: text
    content: 'And Jotham slept with his fathers, and was buried with his fathers in the city of David his father: and Ahaz his son reigned in his stead.'
  '4':
  - type: text
    content: 'save that the high places were not removed: the people sacrificed and burnt incense still on the high places. '
  '5':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' smote the king, so that he was a leper unto the day of his death, and dwelt in a several house. And Jotham the king''s son '
  - type: text
    content: was
  - type: text
    content: ' over the house, judging the people of the land. '
  '6':
  - type: text
    content: 'And the rest of the acts of Azariah, and all that he did, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Judah? '
  '7':
  - type: text
    content: 'So Azariah slept with his fathers; and they buried him with his fathers in the city of David: and Jotham his son reigned in his stead.'
  - type: heading
    content: Israel's Last Kings
  '8':
  - type: text
    content: 'In the thirty and eighth year of Azariah king of Judah did Zachariah the son of Jeroboam reign over Israel in Samaria six months. '
  '9':
  - type: text
    content: 'And he did '
  - type: text
    content: that which was
  - type: text
    content: ' evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', as his fathers had done: he departed not from the sins of Jeroboam the son of Nebat, who made Israel to sin. '
