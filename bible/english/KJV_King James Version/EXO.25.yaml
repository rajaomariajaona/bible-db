document_id: EXO.25
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Speak unto the children of Israel, that they bring me an offering: of every man that giveth it willingly with his heart ye shall take my offering. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the offering which ye shall take of them; gold, and silver, and brass, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and blue, and purple, and scarlet, and fine linen, and goats'' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hair
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and rams'' skins dyed red, and badgers'' skins, and shittim wood, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'oil for the light, spices for anointing oil, and for sweet incense, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'onyx stones, and stones to be set in the ephod, and in the breastplate. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And let them make me a sanctuary; that I may dwell among them. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'According to all that I shew thee, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: after
  - type: text
    text: ' the pattern of the tabernacle, and the pattern of all the instruments thereof, even so shall ye make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Pattern of the Tabernacle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And they shall make an ark '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' shittim wood: two cubits and a half '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the length thereof, and a cubit and a half the breadth thereof, and a cubit and a half the height thereof. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And thou shalt overlay it with pure gold, within and without shalt thou overlay it, and shalt make upon it a crown of gold round about. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And thou shalt cast four rings of gold for it, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' in the four corners thereof; and two rings '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' in the one side of it, and two rings in the other side of it. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And thou shalt make staves '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' shittim wood, and overlay them with gold. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And thou shalt put the staves into the rings by the sides of the ark, that the ark may be borne with them. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The staves shall be in the rings of the ark: they shall not be taken from it. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And thou shalt put into the ark the testimony which I shall give thee. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And thou shalt make a mercy seat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' pure gold: two cubits and a half '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the length thereof, and a cubit and a half the breadth thereof. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And thou shalt make two cherubims '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' gold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' beaten work shalt thou make them, in the two ends of the mercy seat. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And make one cherub on the one end, and the other cherub on the other end: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' of the mercy seat shall ye make the cherubims on the two ends thereof. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the cherubims shall stretch forth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' wings on high, covering the mercy seat with their wings, and their faces '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall look
  - type: text
    text: ' one to another; toward the mercy seat shall the faces of the cherubims be. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And thou shalt put the mercy seat above upon the ark; and in the ark thou shalt put the testimony that I shall give thee. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And there I will meet with thee, and I will commune with thee from above the mercy seat, from between the two cherubims which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' upon the ark of the testimony, of all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' which I will give thee in commandment unto the children of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Thou shalt also make a table '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' shittim wood: two cubits '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the length thereof, and a cubit the breadth thereof, and a cubit and a half the height thereof. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And thou shalt overlay it with pure gold, and make thereto a crown of gold round about. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And thou shalt make unto it a border of an hand breadth round about, and thou shalt make a golden crown to the border thereof round about. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And thou shalt make for it four rings of gold, and put the rings in the four corners that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' on the four feet thereof. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Over against the border shall the rings be for places of the staves to bear the table. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And thou shalt make the staves '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' shittim wood, and overlay them with gold, that the table may be borne with them. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And thou shalt make the dishes thereof, and spoons thereof, and covers thereof, and bowls thereof, to cover withal: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' pure gold shalt thou make them. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: And thou shalt set upon the table shewbread before me alway.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And thou shalt make a candlestick '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' pure gold: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' beaten work shall the candlestick be made: his shaft, and his branches, his bowls, his knops, and his flowers, shall be of the same. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And six branches shall come out of the sides of it; three branches of the candlestick out of the one side, and three branches of the candlestick out of the other side: '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'three bowls made like unto almonds, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' a knop and a flower in one branch; and three bowls made like almonds in the other branch, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' a knop and a flower: so in the six branches that come out of the candlestick. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And in the candlestick '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' four bowls made like unto almonds, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' their knops and their flowers. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there shall be
  - type: text
    text: ' a knop under two branches of the same, and a knop under two branches of the same, and a knop under two branches of the same, according to the six branches that proceed out of the candlestick. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Their knops and their branches shall be of the same: all it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' one beaten work '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' pure gold. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And thou shalt make the seven lamps thereof: and they shall light the lamps thereof, that they may give light over against it. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And the tongs thereof, and the snuffdishes thereof, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be of
  - type: text
    text: ' pure gold. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Of
  - type: text
    text: ' a talent of pure gold shall he make it, with all these vessels. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And look that thou make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' after their pattern, which was shewed thee in the mount.'
