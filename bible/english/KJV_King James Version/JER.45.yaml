document_id: JER.45,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: A Word for Baruch
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The word that Jeremiah the prophet spake unto Baruch the son of Neriah, when he had written these words in a book at the mouth of Jeremiah, in the fourth year of Jehoiakim the son of Josiah king of Judah, saying, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', the God of Israel, unto thee, O Baruch; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou didst say, Woe is me now! for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath added grief to my sorrow; I fainted in my sighing, and I find no rest. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus shalt thou say unto him, The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' saith thus; Behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' which I have built will I break down, and that which I have planted I will pluck up, even this whole land. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And seekest thou great things for thyself? seek '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' not: for, behold, I will bring evil upon all flesh, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': but thy life will I give unto thee for a prey in all places whither thou goest.'
