document_id: JER.45,1
type_code: eng
verses:
  '1':
  - type: heading
    content: A Word for Baruch
  - type: text
    content: 'The word that Jeremiah the prophet spake unto Baruch the son of Neriah, when he had written these words in a book at the mouth of Jeremiah, in the fourth year of Jehoiakim the son of Josiah king of Judah, saying, '
  '2':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', the God of Israel, unto thee, O Baruch; '
  '3':
  - type: text
    content: 'Thou didst say, Woe is me now! for the '
  - type: text
    content: LORD
  - type: text
    content: ' hath added grief to my sorrow; I fainted in my sighing, and I find no rest. '
  '4':
  - type: text
    content: 'Thus shalt thou say unto him, The '
  - type: text
    content: LORD
  - type: text
    content: ' saith thus; Behold, '
  - type: text
    content: that
  - type: text
    content: ' which I have built will I break down, and that which I have planted I will pluck up, even this whole land. '
  '5':
  - type: text
    content: 'And seekest thou great things for thyself? seek '
  - type: text
    content: them
  - type: text
    content: ' not: for, behold, I will bring evil upon all flesh, saith the '
  - type: text
    content: LORD
  - type: text
    content: ': but thy life will I give unto thee for a prey in all places whither thou goest.'
