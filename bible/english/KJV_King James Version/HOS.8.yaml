verses:
  '1':
  - type: heading
    content: Reaping the Whirlwind
  - type: text
    content: ' '
  - type: text
    content: Set
  - type: text
    content: ' the trumpet to thy mouth. '
  - type: text
    content: He shall come
  - type: text
    content: ' as an eagle against the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', because they have transgressed my covenant, and trespassed against my law. '
  '10':
  - type: text
    content: Yea, though they have hired among the nations, now will I gather them, and they shall sorrow a little for the burden of the king of princes.
  '11':
  - type: text
    content: 'Because Ephraim hath made many altars to sin, altars shall be unto him to sin. '
  '12':
  - type: text
    content: 'I have written to him the great things of my law, '
  - type: text
    content: but
  - type: text
    content: ' they were counted as a strange thing. '
  '13':
  - type: text
    content: 'They sacrifice flesh '
  - type: text
    content: for
  - type: text
    content: ' the sacrifices of mine offerings, and eat '
  - type: text
    content: it; but
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' accepteth them not; now will he remember their iniquity, and visit their sins: they shall return to Egypt. '
  '14':
  - type: text
    content: 'For Israel hath forgotten his Maker, and buildeth temples; and Judah hath multiplied fenced cities: but I will send a fire upon his cities, and it shall devour the palaces thereof.'
  '2':
  - type: text
    content: Israel shall cry unto me, My God, we know thee.
  '3':
  - type: text
    content: 'Israel hath cast off '
  - type: text
    content: the thing that is
  - type: text
    content: ' good: the enemy shall pursue him. '
  '4':
  - type: text
    content: 'They have set up kings, but not by me: they have made princes, and I knew '
  - type: text
    content: it
  - type: text
    content: ' not: of their silver and their gold have they made them idols, that they may be cut off.'
  '5':
  - type: text
    content: 'Thy calf, O Samaria, hath cast '
  - type: text
    content: thee
  - type: text
    content: ' off; mine anger is kindled against them: how long '
  - type: text
    content: will it be
  - type: text
    content: ' ere they attain to innocency? '
  '6':
  - type: text
    content: 'For from Israel '
  - type: text
    content: was
  - type: text
    content: ' it also: the workman made it; therefore it '
  - type: text
    content: is
  - type: text
    content: ' not God: but the calf of Samaria shall be broken in pieces.'
  '7':
  - type: text
    content: 'For they have sown the wind, and they shall reap the whirlwind: it hath no stalk: the bud shall yield no meal: if so be it yield, the strangers shall swallow it up. '
  '8':
  - type: text
    content: 'Israel is swallowed up: now shall they be among the Gentiles as a vessel wherein '
  - type: text
    content: is
  - type: text
    content: ' no pleasure. '
  '9':
  - type: text
    content: 'For they are gone up to Assyria, a wild ass alone by himself: Ephraim hath hired lovers. '
