document_id: HOS.8,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Reaping the Whirlwind
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Set
    - type: text
      text: ' the trumpet to thy mouth. '
    - type: usfm
      marker: add
      children:
      - type: text
        text: He shall come
    - type: text
      text: ' as an eagle against the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', because they have transgressed my covenant, and trespassed against my law. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Yea, though they have hired among the nations, now will I gather them, and they shall sorrow a little for the burden of the king of princes.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Because Ephraim hath made many altars to sin, altars shall be unto him to sin. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'I have written to him the great things of my law, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' they were counted as a strange thing. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'They sacrifice flesh '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' the sacrifices of mine offerings, and eat '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it; but
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' accepteth them not; now will he remember their iniquity, and visit their sins: they shall return to Egypt. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For Israel hath forgotten his Maker, and buildeth temples; and Judah hath multiplied fenced cities: but I will send a fire upon his cities, and it shall devour the palaces thereof.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Israel shall cry unto me, My God, we know thee.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Israel hath cast off '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the thing that is
    - type: text
      text: ' good: the enemy shall pursue him. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'They have set up kings, but not by me: they have made princes, and I knew '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' not: of their silver and their gold have they made them idols, that they may be cut off.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Thy calf, O Samaria, hath cast '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thee
    - type: text
      text: ' off; mine anger is kindled against them: how long '
    - type: usfm
      marker: add
      children:
      - type: text
        text: will it be
    - type: text
      text: ' ere they attain to innocency? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For from Israel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' it also: the workman made it; therefore it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not God: but the calf of Samaria shall be broken in pieces.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For they have sown the wind, and they shall reap the whirlwind: it hath no stalk: the bud shall yield no meal: if so be it yield, the strangers shall swallow it up. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Israel is swallowed up: now shall they be among the Gentiles as a vessel wherein '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' no pleasure. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For they are gone up to Assyria, a wild ass alone by himself: Ephraim hath hired lovers. '
