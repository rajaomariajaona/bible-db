verses:
  '1':
  - type: text
    content: 'In the eighth month, in the second year of Darius, came the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' unto Zechariah, the son of Berechiah, the son of Iddo the prophet, saying, '
  '10':
  - type: text
    content: 'And the man that stood among the myrtle trees answered and said, These '
  - type: text
    content: are they
  - type: text
    content: ' whom the '
  - type: text
    content: LORD
  - type: text
    content: ' hath sent to walk to and fro through the earth. '
  '11':
  - type: text
    content: 'And they answered the angel of the '
  - type: text
    content: LORD
  - type: text
    content: ' that stood among the myrtle trees, and said, We have walked to and fro through the earth, and, behold, all the earth sitteth still, and is at rest.'
  '12':
  - type: text
    content: 'Then the angel of the '
  - type: text
    content: LORD
  - type: text
    content: ' answered and said, O '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, how long wilt thou not have mercy on Jerusalem and on the cities of Judah, against which thou hast had indignation these threescore and ten years? '
  '13':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' answered the angel that talked with me '
  - type: text
    content: with
  - type: text
    content: ' good words '
  - type: text
    content: and
  - type: text
    content: ' comfortable words. '
  '14':
  - type: text
    content: 'So the angel that communed with me said unto me, Cry thou, saying, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; I am jealous for Jerusalem and for Zion with a great jealousy. '
  '15':
  - type: text
    content: 'And I am very sore displeased with the heathen '
  - type: text
    content: that are
  - type: text
    content: ' at ease: for I was but a little displeased, and they helped forward the affliction. '
  '16':
  - type: text
    content: 'Therefore thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; I am returned to Jerusalem with mercies: my house shall be built in it, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, and a line shall be stretched forth upon Jerusalem. '
  '17':
  - type: text
    content: 'Cry yet, saying, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; My cities through prosperity shall yet be spread abroad; and the '
  - type: text
    content: LORD
  - type: text
    content: ' shall yet comfort Zion, and shall yet choose Jerusalem.'
  - type: heading
    content: Four Horns
  '18':
  - type: text
    content: 'Then lifted I up mine eyes, and saw, and behold four horns. '
  '19':
  - type: text
    content: 'And I said unto the angel that talked with me, What '
  - type: text
    content: be
  - type: text
    content: ' these? And he answered me, These '
  - type: text
    content: are
  - type: text
    content: ' the horns which have scattered Judah, Israel, and Jerusalem. '
  '2':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' hath been sore displeased with your fathers.'
  - type: heading
    content: Call to Repentance
  '20':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' shewed me four carpenters. '
  '21':
  - type: text
    content: 'Then said I, What come these to do? And he spake, saying, These '
  - type: text
    content: are
  - type: text
    content: ' the horns which have scattered Judah, so that no man did lift up his head: but these are come to fray them, to cast out the horns of the Gentiles, which lifted up '
  - type: text
    content: their
  - type: text
    content: ' horn over the land of Judah to scatter it.'
  '3':
  - type: text
    content: 'Therefore say thou unto them, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; Turn ye unto me, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, and I will turn unto you, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts. '
  '4':
  - type: text
    content: 'Be ye not as your fathers, unto whom the former prophets have cried, saying, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; Turn ye now from your evil ways, and '
  - type: text
    content: from
  - type: text
    content: ' your evil doings: but they did not hear, nor hearken unto me, saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Your fathers, where '
  - type: text
    content: are
  - type: text
    content: ' they? and the prophets, do they live for ever? '
  '6':
  - type: text
    content: 'But my words and my statutes, which I commanded my servants the prophets, did they not take hold of your fathers? and they returned and said, Like as the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts thought to do unto us, according to our ways, and according to our doings, so hath he dealt with us.'
  - type: heading
    content: Visions of the Night
  - type: heading
    content: Among the Myrtle Trees
  '7':
  - type: text
    content: 'Upon the four and twentieth day of the eleventh month, which '
  - type: text
    content: is
  - type: text
    content: ' the month Sebat, in the second year of Darius, came the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' unto Zechariah, the son of Berechiah, the son of Iddo the prophet, saying, '
  '8':
  - type: text
    content: 'I saw by night, and behold a man riding upon a red horse, and he stood among the myrtle trees that '
  - type: text
    content: were
  - type: text
    content: ' in the bottom; and behind him '
  - type: text
    content: were there
  - type: text
    content: ' red horses, speckled, and white. '
  '9':
  - type: text
    content: 'Then said I, O my lord, what '
  - type: text
    content: are
  - type: text
    content: ' these? And the angel that talked with me said unto me, I will shew thee what these '
  - type: text
