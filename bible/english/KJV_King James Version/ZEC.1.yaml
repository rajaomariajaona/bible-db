document_id: ZEC.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In the eighth month, in the second year of Darius, came the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' unto Zechariah, the son of Berechiah, the son of Iddo the prophet, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And the man that stood among the myrtle trees answered and said, These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are they
    - type: text
      text: ' whom the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath sent to walk to and fro through the earth. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And they answered the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' that stood among the myrtle trees, and said, We have walked to and fro through the earth, and, behold, all the earth sitteth still, and is at rest.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' answered and said, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, how long wilt thou not have mercy on Jerusalem and on the cities of Judah, against which thou hast had indignation these threescore and ten years? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' answered the angel that talked with me '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' good words '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' comfortable words. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'So the angel that communed with me said unto me, Cry thou, saying, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts; I am jealous for Jerusalem and for Zion with a great jealousy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And I am very sore displeased with the heathen '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that are
    - type: text
      text: ' at ease: for I was but a little displeased, and they helped forward the affliction. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Therefore thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; I am returned to Jerusalem with mercies: my house shall be built in it, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, and a line shall be stretched forth upon Jerusalem. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Cry yet, saying, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts; My cities through prosperity shall yet be spread abroad; and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall yet comfort Zion, and shall yet choose Jerusalem.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Four Horns
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then lifted I up mine eyes, and saw, and behold four horns. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And I said unto the angel that talked with me, What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' these? And he answered me, These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the horns which have scattered Judah, Israel, and Jerusalem. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath been sore displeased with your fathers.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Call to Repentance
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shewed me four carpenters. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then said I, What come these to do? And he spake, saying, These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the horns which have scattered Judah, so that no man did lift up his head: but these are come to fray them, to cast out the horns of the Gentiles, which lifted up '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' horn over the land of Judah to scatter it.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Therefore say thou unto them, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts; Turn ye unto me, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, and I will turn unto you, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Be ye not as your fathers, unto whom the former prophets have cried, saying, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts; Turn ye now from your evil ways, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from
    - type: text
      text: ' your evil doings: but they did not hear, nor hearken unto me, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Your fathers, where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' they? and the prophets, do they live for ever? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But my words and my statutes, which I commanded my servants the prophets, did they not take hold of your fathers? and they returned and said, Like as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts thought to do unto us, according to our ways, and according to our doings, so hath he dealt with us.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Visions of the Night
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Among the Myrtle Trees
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Upon the four and twentieth day of the eleventh month, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the month Sebat, in the second year of Darius, came the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' unto Zechariah, the son of Berechiah, the son of Iddo the prophet, saying, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'I saw by night, and behold a man riding upon a red horse, and he stood among the myrtle trees that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in the bottom; and behind him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were there
    - type: text
      text: ' red horses, speckled, and white. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then said I, O my lord, what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' these? And the angel that talked with me said unto me, I will shew thee what these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: '. '
