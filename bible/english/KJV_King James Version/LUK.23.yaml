document_id: LUK.23
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Jesus before Pilate
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the whole multitude of them arose, and led him unto Pilate. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And they began to accuse him, saying, We found this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: fellow
  - type: text
    text: ' perverting the nation, and forbidding to give tribute to Cæsar, saying that he himself is Christ a King. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Pilate asked him, saying, Art thou the King of the Jews? And he answered him and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Thou sayest '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then said Pilate to the chief priests and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to
  - type: text
    text: ' the people, I find no fault in this man. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And they were the more fierce, saying, He stirreth up the people, teaching throughout all Jewry, beginning from Galilee to this place. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When Pilate heard of Galilee, he asked whether the man were a Galilæan. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And as soon as he knew that he belonged unto Herod's jurisdiction, he sent him to Herod, who himself also was at Jerusalem at that time.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Before Herod
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And when Herod saw Jesus, he was exceeding glad: for he was desirous to see him of a long '
  - type: usfm
    marker: add
    children:
    - type: text
      text: season
  - type: text
    text: ', because he had heard many things of him; and he hoped to have seen some miracle done by him. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then he questioned with him in many words; but he answered him nothing. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the chief priests and scribes stood and vehemently accused him. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Herod with his men of war set him at nought, and mocked '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', and arrayed him in a gorgeous robe, and sent him again to Pilate.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And the same day Pilate and Herod were made friends together: for before they were at enmity between themselves.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Pilate's Judgement
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Pilate, when he had called together the chief priests and the rulers and the people, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'said unto them, Ye have brought this man unto me, as one that perverteth the people: and, behold, I, having examined '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' before you, have found no fault in this man touching those things whereof ye accuse him: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'No, nor yet Herod: for I sent you to him; and, lo, nothing worthy of death is done unto him. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I will therefore chastise him, and release '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '(For of necessity he must release one unto them at the feast.) '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And they cried out all at once, saying, Away with this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ', and release unto us Barabbas: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '(who for a certain sedition made in the city, and for murder, was cast into prison.) '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Pilate therefore, willing to release Jesus, spake again to them. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But they cried, saying, Crucify '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', crucify him. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And he said unto them the third time, Why, what evil hath he done? I have found no cause of death in him: I will therefore chastise him, and let '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' go. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And they were instant with loud voices, requiring that he might be crucified. And the voices of them and of the chief priests prevailed. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And Pilate gave sentence that it should be as they required. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: And he released unto them him that for sedition and murder was cast into prison, whom they had desired; but he delivered Jesus to their will.
- type: usfm
  marker: s2
  children:
  - type: text
    text: On the Way to the Cross
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And as they led him away, they laid hold upon one Simon, a Cyrenian, coming out of the country, and on him they laid the cross, that he might bear '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' after Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And there followed him a great company of people, and of women, which also bewailed and lamented him. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'But Jesus turning unto them said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Daughters of Jerusalem, weep not for me, but weep for yourselves, and for your children.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For, behold, the days are coming, in the which they shall say, Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the barren, and the wombs that never bare, and the paps which never gave suck.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then shall they begin to say to the mountains, Fall on us; and to the hills, Cover us.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For if they do these things in a green tree, what shall be done in the dry?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: And there were also two other, malefactors, led with him to be put to death.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Calvary
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And when they were come to the place, which is called Calvary, there they crucified him, and the malefactors, one on the right hand, and the other on the left. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Then said Jesus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Father, forgive them; for they know not what they do.
  - type: text
    text: ' And they parted his raiment, and cast lots. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And the people stood beholding. And the rulers also with them derided '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', saying, He saved others; let him save himself, if he be Christ, the chosen of God. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And the soldiers also mocked him, coming to him, and offering him vinegar, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'and saying, If thou be the king of the Jews, save thyself. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: And a superscription also was written over him in letters of Greek, and Latin, and Hebrew, THIS IS THE KING OF THE JEWS.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Penitent Thief
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And one of the malefactors which were hanged railed on him, saying, If thou be Christ, save thyself and us. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'But the other answering rebuked him, saying, Dost not thou fear God, seeing thou art in the same condemnation? '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And we indeed justly; for we receive the due reward of our deeds: but this man hath done nothing amiss. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And he said unto Jesus, Lord, remember me when thou comest into thy kingdom. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'And Jesus said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Verily I say unto thee, To day shalt thou be with me in paradise.
- type: usfm
  marker: s2
  children:
  - type: text
    text: After the Crucifixion
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'And it was about the sixth hour, and there was a darkness over all the earth until the ninth hour. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'And the sun was darkened, and the veil of the temple was rent in the midst. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'And when Jesus had cried with a loud voice, he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Father, into thy hands I commend my spirit:'
  - type: text
    text: ' and having said thus, he gave up the ghost. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Now when the centurion saw what was done, he glorified God, saying, Certainly this was a righteous man. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'And all the people that came together to that sight, beholding the things which were done, smote their breasts, and returned. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: And all his acquaintance, and the women that followed him from Galilee, stood afar off, beholding these things.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Burial
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'And, behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' a man named Joseph, a counsellor; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and he was
  - type: text
    text: ' a good man, and a just: '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: '(the same had not consented to the counsel and deed of them;) '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he was
  - type: text
    text: ' of Arimathæa, a city of the Jews: who also himself waited for the kingdom of God. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' went unto Pilate, and begged the body of Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'And he took it down, and wrapped it in linen, and laid it in a sepulchre that was hewn in stone, wherein never man before was laid. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'And that day was the preparation, and the sabbath drew on. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'And the women also, which came with him from Galilee, followed after, and beheld the sepulchre, and how his body was laid. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: And they returned, and prepared spices and ointments; and rested the sabbath day according to the commandment.
