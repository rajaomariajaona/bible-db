document_id: LUK.23,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus before Pilate
  - type: text
    content: 'And the whole multitude of them arose, and led him unto Pilate. '
  '10':
  - type: text
    content: 'And the chief priests and scribes stood and vehemently accused him. '
  '11':
  - type: text
    content: 'And Herod with his men of war set him at nought, and mocked '
  - type: text
    content: him
  - type: text
    content: ', and arrayed him in a gorgeous robe, and sent him again to Pilate.'
  '12':
  - type: text
    content: 'And the same day Pilate and Herod were made friends together: for before they were at enmity between themselves.'
  - type: heading
    content: Pilate's Judgement
  '13':
  - type: text
    content: 'And Pilate, when he had called together the chief priests and the rulers and the people, '
  '14':
  - type: text
    content: 'said unto them, Ye have brought this man unto me, as one that perverteth the people: and, behold, I, having examined '
  - type: text
    content: him
  - type: text
    content: ' before you, have found no fault in this man touching those things whereof ye accuse him: '
  '15':
  - type: text
    content: 'No, nor yet Herod: for I sent you to him; and, lo, nothing worthy of death is done unto him. '
  '16':
  - type: text
    content: 'I will therefore chastise him, and release '
  - type: text
    content: him
  - type: text
    content: '. '
  '17':
  - type: text
    content: '(For of necessity he must release one unto them at the feast.) '
  '18':
  - type: text
    content: 'And they cried out all at once, saying, Away with this '
  - type: text
    content: man
  - type: text
    content: ', and release unto us Barabbas: '
  '19':
  - type: text
    content: '(who for a certain sedition made in the city, and for murder, was cast into prison.) '
  '2':
  - type: text
    content: 'And they began to accuse him, saying, We found this '
  - type: text
    content: fellow
  - type: text
    content: ' perverting the nation, and forbidding to give tribute to Cæsar, saying that he himself is Christ a King. '
  '20':
  - type: text
    content: 'Pilate therefore, willing to release Jesus, spake again to them. '
  '21':
  - type: text
    content: 'But they cried, saying, Crucify '
  - type: text
    content: him
  - type: text
    content: ', crucify him. '
  '22':
  - type: text
    content: 'And he said unto them the third time, Why, what evil hath he done? I have found no cause of death in him: I will therefore chastise him, and let '
  - type: text
    content: him
  - type: text
    content: ' go. '
  '23':
  - type: text
    content: 'And they were instant with loud voices, requiring that he might be crucified. And the voices of them and of the chief priests prevailed. '
  '24':
  - type: text
    content: 'And Pilate gave sentence that it should be as they required. '
  '25':
  - type: text
    content: And he released unto them him that for sedition and murder was cast into prison, whom they had desired; but he delivered Jesus to their will.
  - type: heading
    content: On the Way to the Cross
  '26':
  - type: text
    content: 'And as they led him away, they laid hold upon one Simon, a Cyrenian, coming out of the country, and on him they laid the cross, that he might bear '
  - type: text
    content: it
  - type: text
    content: ' after Jesus.'
  '27':
  - type: text
    content: 'And there followed him a great company of people, and of women, which also bewailed and lamented him. '
  '28':
  - type: text
    content: 'But Jesus turning unto them said, '
  - type: text
    content: Daughters of Jerusalem, weep not for me, but weep for yourselves, and for your children.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'For, behold, the days are coming, in the which they shall say, Blessed '
  - type: text
    content: are
  - type: text
    content: ' the barren, and the wombs that never bare, and the paps which never gave suck.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'And Pilate asked him, saying, Art thou the King of the Jews? And he answered him and said, '
  - type: text
    content: 'Thou sayest '
  - type: text
    content: it
  - type: text
    content: .
  - type: text
    content: ' '
  '30':
  - type: text
    content: Then shall they begin to say to the mountains, Fall on us; and to the hills, Cover us.
  - type: text
    content: ' '
  '31':
  - type: text
    content: For if they do these things in a green tree, what shall be done in the dry?
  - type: text
    content: ' '
  '32':
  - type: text
    content: And there were also two other, malefactors, led with him to be put to death.
  - type: heading
    content: Calvary
  '33':
  - type: text
    content: 'And when they were come to the place, which is called Calvary, there they crucified him, and the malefactors, one on the right hand, and the other on the left. '
  '34':
  - type: text
    content: 'Then said Jesus, '
  - type: text
    content: Father, forgive them; for they know not what they do.
  - type: text
    content: ' And they parted his raiment, and cast lots. '
  '35':
  - type: text
    content: 'And the people stood beholding. And the rulers also with them derided '
  - type: text
    content: him
  - type: text
    content: ', saying, He saved others; let him save himself, if he be Christ, the chosen of God. '
  '36':
  - type: text
    content: 'And the soldiers also mocked him, coming to him, and offering him vinegar, '
  '37':
  - type: text
    content: 'and saying, If thou be the king of the Jews, save thyself. '
  '38':
  - type: text
    content: And a superscription also was written over him in letters of Greek, and Latin, and Hebrew, THIS IS THE KING OF THE JEWS.
  - type: heading
    content: The Penitent Thief
  '39':
  - type: text
    content: 'And one of the malefactors which were hanged railed on him, saying, If thou be Christ, save thyself and us. '
  '4':
  - type: text
    content: 'Then said Pilate to the chief priests and '
  - type: text
    content: to
  - type: text
    content: ' the people, I find no fault in this man. '
  '40':
  - type: text
    content: 'But the other answering rebuked him, saying, Dost not thou fear God, seeing thou art in the same condemnation? '
  '41':
  - type: text
    content: 'And we indeed justly; for we receive the due reward of our deeds: but this man hath done nothing amiss. '
  '42':
  - type: text
    content: 'And he said unto Jesus, Lord, remember me when thou comest into thy kingdom. '
  '43':
  - type: text
    content: 'And Jesus said unto him, '
  - type: text
    content: Verily I say unto thee, To day shalt thou be with me in paradise.
  - type: heading
    content: After the Crucifixion
  '44':
  - type: text
    content: 'And it was about the sixth hour, and there was a darkness over all the earth until the ninth hour. '
  '45':
  - type: text
    content: 'And the sun was darkened, and the veil of the temple was rent in the midst. '
  '46':
  - type: text
    content: 'And when Jesus had cried with a loud voice, he said, '
  - type: text
    content: 'Father, into thy hands I commend my spirit:'
  - type: text
    content: ' and having said thus, he gave up the ghost. '
  '47':
  - type: text
    content: 'Now when the centurion saw what was done, he glorified God, saying, Certainly this was a righteous man. '
  '48':
  - type: text
    content: 'And all the people that came together to that sight, beholding the things which were done, smote their breasts, and returned. '
  '49':
  - type: text
    content: And all his acquaintance, and the women that followed him from Galilee, stood afar off, beholding these things.
  - type: heading
    content: The Burial
  '5':
  - type: text
    content: 'And they were the more fierce, saying, He stirreth up the people, teaching throughout all Jewry, beginning from Galilee to this place. '
  '50':
  - type: text
    content: 'And, behold, '
  - type: text
    content: there was
  - type: text
    content: ' a man named Joseph, a counsellor; '
  - type: text
    content: and he was
  - type: text
    content: ' a good man, and a just: '
  '51':
  - type: text
    content: '(the same had not consented to the counsel and deed of them;) '
  - type: text
    content: he was
  - type: text
    content: ' of Arimathæa, a city of the Jews: who also himself waited for the kingdom of God. '
  '52':
  - type: text
    content: 'This '
  - type: text
    content: man
  - type: text
    content: ' went unto Pilate, and begged the body of Jesus. '
  '53':
  - type: text
    content: 'And he took it down, and wrapped it in linen, and laid it in a sepulchre that was hewn in stone, wherein never man before was laid. '
  '54':
  - type: text
    content: 'And that day was the preparation, and the sabbath drew on. '
  '55':
  - type: text
    content: 'And the women also, which came with him from Galilee, followed after, and beheld the sepulchre, and how his body was laid. '
  '56':
  - type: text
    content: And they returned, and prepared spices and ointments; and rested the sabbath day according to the commandment.
  '6':
  - type: text
    content: 'When Pilate heard of Galilee, he asked whether the man were a Galilæan. '
  '7':
  - type: text
    content: And as soon as he knew that he belonged unto Herod's jurisdiction, he sent him to Herod, who himself also was at Jerusalem at that time.
  - type: heading
    content: Before Herod
  '8':
  - type: text
    content: 'And when Herod saw Jesus, he was exceeding glad: for he was desirous to see him of a long '
  - type: text
    content: season
  - type: text
    content: ', because he had heard many things of him; and he hoped to have seen some miracle done by him. '
  '9':
  - type: text
    content: 'Then he questioned with him in many words; but he answered him nothing. '
