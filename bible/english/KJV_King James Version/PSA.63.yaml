document_id: PSA.63
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: A Psalm of David, when he was in the wilderness of Judah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'O God, thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'My God; early will I seek thee:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: My soul thirsteth for thee, my flesh longeth for thee
- type: usfm
  marker: q2
  children:
  - type: text
    text: In a dry and thirsty land, where no water is;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: To see thy power and thy glory,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'So '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' I have seen thee in the sanctuary.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Because thy lovingkindness
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' better than life,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: My lips shall praise thee.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Thus will I bless thee while I live: I will lift up my hands in thy name.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'My soul shall be satisfied as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' marrow and fatness;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And my mouth shall praise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thee
  - type: text
    text: ' with joyful lips:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: When I remember thee upon my bed,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' meditate on thee in the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: night
  - type: text
    text: ' watches.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Because thou hast been my help,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Therefore in the shadow of thy wings will I rejoice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'My soul followeth hard after thee:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thy right hand upholdeth me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But those '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' seek my soul, to destroy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: Shall go into the lower parts of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'They shall fall by the sword:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They shall be a portion for foxes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But the king shall rejoice in God; Every one that sweareth by him shall glory:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the mouth of them that speak lies shall be stopped.
