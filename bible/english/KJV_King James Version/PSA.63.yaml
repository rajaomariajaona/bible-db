type_code: eng
verses:
  '1':
  - type: text
    content: A Psalm of David, when he was in the wilderness of Judah.
  - type: text
    content: 'O God, thou '
  - type: text
    content: art
  - type: text
    content: 'My God; early will I seek thee:'
  - type: text
    content: My soul thirsteth for thee, my flesh longeth for thee
  - type: text
    content: In a dry and thirsty land, where no water is;
  '10':
  - type: text
    content: 'They shall fall by the sword:'
  - type: text
    content: They shall be a portion for foxes.
  '11':
  - type: text
    content: 'But the king shall rejoice in God; Every one that sweareth by him shall glory:'
  - type: text
    content: But the mouth of them that speak lies shall be stopped.
  '2':
  - type: text
    content: To see thy power and thy glory,
  - type: text
    content: 'So '
  - type: text
    content: as
  - type: text
    content: ' I have seen thee in the sanctuary.'
  '3':
  - type: text
    content: Because thy lovingkindness
  - type: text
    content: Is
  - type: text
    content: ' better than life,'
  - type: text
    content: My lips shall praise thee.
  '4':
  - type: text
    content: 'Thus will I bless thee while I live: I will lift up my hands in thy name.'
  '5':
  - type: text
    content: 'My soul shall be satisfied as '
  - type: text
    content: with
  - type: text
    content: ' marrow and fatness;'
  - type: text
    content: 'And my mouth shall praise '
  - type: text
    content: thee
  - type: text
    content: ' with joyful lips:'
  '6':
  - type: text
    content: When I remember thee upon my bed,
  - type: text
    content: And
  - type: text
    content: ' meditate on thee in the '
  - type: text
    content: night
  - type: text
    content: ' watches.'
  '7':
  - type: text
    content: Because thou hast been my help,
  - type: text
    content: Therefore in the shadow of thy wings will I rejoice.
  '8':
  - type: text
    content: 'My soul followeth hard after thee:'
  - type: text
    content: Thy right hand upholdeth me.
  '9':
  - type: text
    content: 'But those '
  - type: text
    content: that
  - type: text
    content: ' seek my soul, to destroy '
  - type: text
    content: it
  - type: text
    content: ','
  - type: text
    content: Shall go into the lower parts of the earth.
