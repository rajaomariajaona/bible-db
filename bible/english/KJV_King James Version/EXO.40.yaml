document_id: EXO.40,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '10':
  - type: text
    content: 'And thou shalt anoint the altar of the burnt offering, and all his vessels, and sanctify the altar: and it shall be an altar most holy. '
  '11':
  - type: text
    content: 'And thou shalt anoint the laver and his foot, and sanctify it. '
  '12':
  - type: text
    content: 'And thou shalt bring Aaron and his sons unto the door of the tabernacle of the congregation, and wash them with water. '
  '13':
  - type: text
    content: 'And thou shalt put upon Aaron the holy garments, and anoint him, and sanctify him; that he may minister unto me in the priest''s office. '
  '14':
  - type: text
    content: 'And thou shalt bring his sons, and clothe them with coats: '
  '15':
  - type: text
    content: 'and thou shalt anoint them, as thou didst anoint their father, that they may minister unto me in the priest''s office: for their anointing shall surely be an everlasting priesthood throughout their generations. '
  '16':
  - type: text
    content: 'Thus did Moses: according to all that the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded him, so did he.'
  '17':
  - type: text
    content: 'And it came to pass in the first month in the second year, on the first '
  - type: text
    content: day
  - type: text
    content: ' of the month, '
  - type: text
    content: that
  - type: text
    content: ' the tabernacle was reared up. '
  '18':
  - type: text
    content: 'And Moses reared up the tabernacle, and fastened his sockets, and set up the boards thereof, and put in the bars thereof, and reared up his pillars. '
  '19':
  - type: text
    content: 'And he spread abroad the tent over the tabernacle, and put the covering of the tent above upon it; as the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses. '
  '2':
  - type: text
    content: 'On the first day of the first month shalt thou set up the tabernacle of the tent of the congregation. '
  '20':
  - type: text
    content: 'And he took and put the testimony into the ark, and set the staves on the ark, and put the mercy seat above upon the ark: '
  '21':
  - type: text
    content: 'and he brought the ark into the tabernacle, and set up the vail of the covering, and covered the ark of the testimony; as the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses. '
  '22':
  - type: text
    content: 'And he put the table in the tent of the congregation, upon the side of the tabernacle northward, without the vail. '
  '23':
  - type: text
    content: 'And he set the bread in order upon it before the '
  - type: text
    content: LORD
  - type: text
    content: '; as the '
  - type: text
    content: LORD
  - type: text
    content: ' had commanded Moses. '
  '24':
  - type: text
    content: 'And he put the candlestick in the tent of the congregation, over against the table, on the side of the tabernacle southward. '
  '25':
  - type: text
    content: 'And he lighted the lamps before the '
  - type: text
    content: LORD
  - type: text
    content: '; as the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses. '
  '26':
  - type: text
    content: 'And he put the golden altar in the tent of the congregation before the vail: '
  '27':
  - type: text
    content: 'and he burnt sweet incense thereon; as the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses. '
  '28':
  - type: text
    content: 'And he set up the hanging '
  - type: text
    content: at
  - type: text
    content: ' the door of the tabernacle. '
  '29':
  - type: text
    content: 'And he put the altar of burnt offering '
  - type: text
    content: by
  - type: text
    content: ' the door of the tabernacle of the tent of the congregation, and offered upon it the burnt offering and the meat offering; as the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses. '
  '3':
  - type: text
    content: 'And thou shalt put therein the ark of the testimony, and cover the ark with the vail. '
  '30':
  - type: text
    content: 'And he set the laver between the tent of the congregation and the altar, and put water there, to wash '
  - type: text
    content: withal
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'And Moses and Aaron and his sons washed their hands and their feet thereat: '
  '32':
  - type: text
    content: 'when they went into the tent of the congregation, and when they came near unto the altar, they washed; as the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses. '
  '33':
  - type: text
    content: And he reared up the court round about the tabernacle and the altar, and set up the hanging of the court gate. So Moses finished the work.
  '34':
  - type: text
    content: 'Then a cloud covered the tent of the congregation, and the glory of the '
  - type: text
    content: LORD
  - type: text
    content: ' filled the tabernacle. '
  '35':
  - type: text
    content: 'And Moses was not able to enter into the tent of the congregation, because the cloud abode thereon, and the glory of the '
  - type: text
    content: LORD
  - type: text
    content: ' filled the tabernacle. '
  '36':
  - type: text
    content: 'And when the cloud was taken up from over the tabernacle, the children of Israel went onward in all their journeys: '
  '37':
  - type: text
    content: 'but if the cloud were not taken up, then they journeyed not till the day that it was taken up. '
  '38':
  - type: text
    content: 'For the cloud of the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' upon the tabernacle by day, and fire was on it by night, in the sight of all the house of Israel, throughout all their journeys.'
  '4':
  - type: text
    content: 'And thou shalt bring in the table, and set in order the things that are to be set in order upon it; and thou shalt bring in the candlestick, and light the lamps thereof. '
  '5':
  - type: text
    content: 'And thou shalt set the altar of gold for the incense before the ark of the testimony, and put the hanging of the door to the tabernacle. '
  '6':
  - type: text
    content: 'And thou shalt set the altar of the burnt offering before the door of the tabernacle of the tent of the congregation. '
  '7':
  - type: text
    content: 'And thou shalt set the laver between the tent of the congregation and the altar, and shalt put water therein. '
  '8':
  - type: text
    content: 'And thou shalt set up the court round about, and hang up the hanging at the court gate. '
  '9':
  - type: text
    content: 'And thou shalt take the anointing oil, and anoint the tabernacle, and all that '
  - type: text
    content: is
  - type: text
    content: ' therein, and shalt hallow it, and all the vessels thereof: and it shall be holy. '
