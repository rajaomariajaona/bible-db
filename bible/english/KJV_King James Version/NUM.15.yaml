document_id: NUM.15
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Supplementary Laws
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Speak unto the children of Israel, and say unto them, When ye be come into the land of your habitations, which I give unto you, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and will make an offering by fire unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', a burnt offering, or a sacrifice in performing a vow, or in a freewill offering, or in your solemn feasts, to make a sweet savour unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', of the herd, or of the flock: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'then shall he that offereth his offering unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' bring a meat offering of a tenth deal of flour mingled with the fourth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: part
  - type: text
    text: ' of an hin of oil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the fourth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: part
  - type: text
    text: ' of an hin of wine for a drink offering shalt thou prepare with the burnt offering or sacrifice, for one lamb. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Or for a ram, thou shalt prepare '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' a meat offering two tenth deals of flour mingled with the third '
  - type: usfm
    marker: add
    children:
    - type: text
      text: part
  - type: text
    text: ' of an hin of oil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And for a drink offering thou shalt offer the third '
  - type: usfm
    marker: add
    children:
    - type: text
      text: part
  - type: text
    text: ' of an hin of wine, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' a sweet savour unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And when thou preparest a bullock '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' a burnt offering, or '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' a sacrifice in performing a vow, or peace offerings unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'then shall he bring with a bullock a meat offering of three tenth deals of flour mingled with half an hin of oil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And thou shalt bring for a drink offering half an hin of wine, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' an offering made by fire, of a sweet savour unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Thus shall it be done for one bullock, or for one ram, or for a lamb, or a kid. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'According to the number that ye shall prepare, so shall ye do to every one according to their number. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'All that are born of the country shall do these things after this manner, in offering an offering made by fire, of a sweet savour unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And if a stranger sojourn with you, or whosoever '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' among you in your generations, and will offer an offering made by fire, of a sweet savour unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; as ye do, so he shall do. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'One ordinance '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be both
  - type: text
    text: ' for you of the congregation, and also for the stranger that sojourneth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with you
  - type: text
    text: ', an ordinance for ever in your generations: as ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ', so shall the stranger be before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: One law and one manner shall be for you, and for the stranger that sojourneth with you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Speak unto the children of Israel, and say unto them, When ye come into the land whither I bring you, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'then it shall be, that, when ye eat of the bread of the land, ye shall offer up an heave offering unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ye shall offer up a cake of the first of your dough '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' an heave offering: as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: ye do
  - type: text
    text: ' the heave offering of the threshingfloor, so shall ye heave it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Of the first of your dough ye shall give unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' an heave offering in your generations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And if ye have erred, and not observed all these commandments, which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath spoken unto Moses, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' all that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath commanded you by the hand of Moses, from the day that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Moses
  - type: text
    text: ', and henceforward among your generations; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'then it shall be, if '
  - type: usfm
    marker: add
    children:
    - type: text
      text: ought
  - type: text
    text: ' be committed by ignorance without the knowledge of the congregation, that all the congregation shall offer one young bullock for a burnt offering, for a sweet savour unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', with his meat offering, and his drink offering, according to the manner, and one kid of the goats for a sin offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And the priest shall make an atonement for all the congregation of the children of Israel, and it shall be forgiven them; for it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' ignorance: and they shall bring their offering, a sacrifice made by fire unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and their sin offering before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', for their ignorance: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and it shall be forgiven all the congregation of the children of Israel, and the stranger that sojourneth among them; seeing all the people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in ignorance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And if any soul sin through ignorance, then he shall bring a she goat of the first year for a sin offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And the priest shall make an atonement for the soul that sinneth ignorantly, when he sinneth by ignorance before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', to make an atonement for him; and it shall be forgiven him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ye shall have one law for him that sinneth through ignorance, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: both for
  - type: text
    text: ' him that is born among the children of Israel, and for the stranger that sojourneth among them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'But the soul that doeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: ought
  - type: text
    text: ' presumptuously, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: whether he be
  - type: text
    text: ' born in the land, or a stranger, the same reproacheth the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and that soul shall be cut off from among his people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Because he hath despised the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and hath broken his commandment, that soul shall utterly be cut off; his iniquity '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' upon him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And while the children of Israel were in the wilderness, they found a man that gathered sticks upon the sabbath day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And they that found him gathering sticks brought him unto Moses and Aaron, and unto all the congregation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And they put him in ward, because it was not declared what should be done to him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Moses, The man shall be surely put to death: all the congregation shall stone him with stones without the camp. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And all the congregation brought him without the camp, and stoned him with stones, and he died; as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Speak unto the children of Israel, and bid them that they make them fringes in the borders of their garments throughout their generations, and that they put upon the fringe of the borders a ribband of blue: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'and it shall be unto you for a fringe, that ye may look upon it, and remember all the commandments of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and do them; and that ye seek not after your own heart and your own eyes, after which ye use to go a whoring: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'that ye may remember, and do all my commandments, and be holy unto your God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God, which brought you out of the land of Egypt, to be your God: I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God.'
