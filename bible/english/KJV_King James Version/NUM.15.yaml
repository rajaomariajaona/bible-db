document_id: NUM.15,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Supplementary Laws
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '10':
  - type: text
    content: 'And thou shalt bring for a drink offering half an hin of wine, '
  - type: text
    content: for
  - type: text
    content: ' an offering made by fire, of a sweet savour unto the '
  - type: text
    content: LORD
  - type: text
    content: .
  '11':
  - type: text
    content: 'Thus shall it be done for one bullock, or for one ram, or for a lamb, or a kid. '
  '12':
  - type: text
    content: 'According to the number that ye shall prepare, so shall ye do to every one according to their number. '
  '13':
  - type: text
    content: 'All that are born of the country shall do these things after this manner, in offering an offering made by fire, of a sweet savour unto the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'And if a stranger sojourn with you, or whosoever '
  - type: text
    content: be
  - type: text
    content: ' among you in your generations, and will offer an offering made by fire, of a sweet savour unto the '
  - type: text
    content: LORD
  - type: text
    content: '; as ye do, so he shall do. '
  '15':
  - type: text
    content: 'One ordinance '
  - type: text
    content: shall be both
  - type: text
    content: ' for you of the congregation, and also for the stranger that sojourneth '
  - type: text
    content: with you
  - type: text
    content: ', an ordinance for ever in your generations: as ye '
  - type: text
    content: are
  - type: text
    content: ', so shall the stranger be before the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '16':
  - type: text
    content: One law and one manner shall be for you, and for the stranger that sojourneth with you.
  '17':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '18':
  - type: text
    content: 'Speak unto the children of Israel, and say unto them, When ye come into the land whither I bring you, '
  '19':
  - type: text
    content: 'then it shall be, that, when ye eat of the bread of the land, ye shall offer up an heave offering unto the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Speak unto the children of Israel, and say unto them, When ye be come into the land of your habitations, which I give unto you, '
  '20':
  - type: text
    content: 'Ye shall offer up a cake of the first of your dough '
  - type: text
    content: for
  - type: text
    content: ' an heave offering: as '
  - type: text
    content: ye do
  - type: text
    content: ' the heave offering of the threshingfloor, so shall ye heave it. '
  '21':
  - type: text
    content: 'Of the first of your dough ye shall give unto the '
  - type: text
    content: LORD
  - type: text
    content: ' an heave offering in your generations.'
  '22':
  - type: text
    content: 'And if ye have erred, and not observed all these commandments, which the '
  - type: text
    content: LORD
  - type: text
    content: ' hath spoken unto Moses, '
  '23':
  - type: text
    content: even
  - type: text
    content: ' all that the '
  - type: text
    content: LORD
  - type: text
    content: ' hath commanded you by the hand of Moses, from the day that the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded '
  - type: text
    content: Moses
  - type: text
    content: ', and henceforward among your generations; '
  '24':
  - type: text
    content: 'then it shall be, if '
  - type: text
    content: ought
  - type: text
    content: ' be committed by ignorance without the knowledge of the congregation, that all the congregation shall offer one young bullock for a burnt offering, for a sweet savour unto the '
  - type: text
    content: LORD
  - type: text
    content: ', with his meat offering, and his drink offering, according to the manner, and one kid of the goats for a sin offering. '
  '25':
  - type: text
    content: 'And the priest shall make an atonement for all the congregation of the children of Israel, and it shall be forgiven them; for it '
  - type: text
    content: is
  - type: text
    content: ' ignorance: and they shall bring their offering, a sacrifice made by fire unto the '
  - type: text
    content: LORD
  - type: text
    content: ', and their sin offering before the '
  - type: text
    content: LORD
  - type: text
    content: ', for their ignorance: '
  '26':
  - type: text
    content: 'and it shall be forgiven all the congregation of the children of Israel, and the stranger that sojourneth among them; seeing all the people '
  - type: text
    content: were
  - type: text
    content: ' in ignorance.'
  '27':
  - type: text
    content: 'And if any soul sin through ignorance, then he shall bring a she goat of the first year for a sin offering. '
  '28':
  - type: text
    content: 'And the priest shall make an atonement for the soul that sinneth ignorantly, when he sinneth by ignorance before the '
  - type: text
    content: LORD
  - type: text
    content: ', to make an atonement for him; and it shall be forgiven him. '
  '29':
  - type: text
    content: 'Ye shall have one law for him that sinneth through ignorance, '
  - type: text
    content: both for
  - type: text
    content: ' him that is born among the children of Israel, and for the stranger that sojourneth among them. '
  '3':
  - type: text
    content: 'and will make an offering by fire unto the '
  - type: text
    content: LORD
  - type: text
    content: ', a burnt offering, or a sacrifice in performing a vow, or in a freewill offering, or in your solemn feasts, to make a sweet savour unto the '
  - type: text
    content: LORD
  - type: text
    content: ', of the herd, or of the flock: '
  '30':
  - type: text
    content: 'But the soul that doeth '
  - type: text
    content: ought
  - type: text
    content: ' presumptuously, '
  - type: text
    content: whether he be
  - type: text
    content: ' born in the land, or a stranger, the same reproacheth the '
  - type: text
    content: LORD
  - type: text
    content: '; and that soul shall be cut off from among his people. '
  '31':
  - type: text
    content: 'Because he hath despised the word of the '
  - type: text
    content: LORD
  - type: text
    content: ', and hath broken his commandment, that soul shall utterly be cut off; his iniquity '
  - type: text
    content: shall be
  - type: text
    content: ' upon him.'
  '32':
  - type: text
    content: 'And while the children of Israel were in the wilderness, they found a man that gathered sticks upon the sabbath day. '
  '33':
  - type: text
    content: 'And they that found him gathering sticks brought him unto Moses and Aaron, and unto all the congregation. '
  '34':
  - type: text
    content: 'And they put him in ward, because it was not declared what should be done to him. '
  '35':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Moses, The man shall be surely put to death: all the congregation shall stone him with stones without the camp. '
  '36':
  - type: text
    content: 'And all the congregation brought him without the camp, and stoned him with stones, and he died; as the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses.'
  '37':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '38':
  - type: text
    content: 'Speak unto the children of Israel, and bid them that they make them fringes in the borders of their garments throughout their generations, and that they put upon the fringe of the borders a ribband of blue: '
  '39':
  - type: text
    content: 'and it shall be unto you for a fringe, that ye may look upon it, and remember all the commandments of the '
  - type: text
    content: LORD
  - type: text
    content: ', and do them; and that ye seek not after your own heart and your own eyes, after which ye use to go a whoring: '
  '4':
  - type: text
    content: 'then shall he that offereth his offering unto the '
  - type: text
    content: LORD
  - type: text
    content: ' bring a meat offering of a tenth deal of flour mingled with the fourth '
  - type: text
    content: part
  - type: text
    content: ' of an hin of oil. '
  '40':
  - type: text
    content: 'that ye may remember, and do all my commandments, and be holy unto your God. '
  '41':
  - type: text
    content: 'I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' your God, which brought you out of the land of Egypt, to be your God: I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' your God.'
  '5':
  - type: text
    content: 'And the fourth '
  - type: text
    content: part
  - type: text
    content: ' of an hin of wine for a drink offering shalt thou prepare with the burnt offering or sacrifice, for one lamb. '
  '6':
  - type: text
    content: 'Or for a ram, thou shalt prepare '
  - type: text
    content: for
  - type: text
    content: ' a meat offering two tenth deals of flour mingled with the third '
  - type: text
    content: part
  - type: text
    content: ' of an hin of oil. '
  '7':
  - type: text
    content: 'And for a drink offering thou shalt offer the third '
  - type: text
    content: part
  - type: text
    content: ' of an hin of wine, '
  - type: text
    content: for
  - type: text
    content: ' a sweet savour unto the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'And when thou preparest a bullock '
  - type: text
    content: for
  - type: text
    content: ' a burnt offering, or '
  - type: text
    content: for
  - type: text
    content: ' a sacrifice in performing a vow, or peace offerings unto the '
  - type: text
    content: LORD
  - type: text
    content: ': '
  '9':
  - type: text
    content: 'then shall he bring with a bullock a meat offering of three tenth deals of flour mingled with half an hin of oil. '
