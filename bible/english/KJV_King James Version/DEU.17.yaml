document_id: DEU.17
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Thou shalt not sacrifice unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' bullock, or sheep, wherein is blemish, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: or
  - type: text
    text: ' any evilfavouredness: for that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' an abomination unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'If there be found among you, within any of thy gates which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God giveth thee, man or woman, that hath wrought wickedness in the sight of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, in transgressing his covenant, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and hath gone and served other gods, and worshipped them, either the sun, or moon, or any of the host of heaven, which I have not commanded; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and it be told thee, and thou hast heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of it
  - type: text
    text: ', and enquired diligently, and, behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it be
  - type: text
    text: ' true, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the thing certain, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' such abomination is wrought in Israel: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'then shalt thou bring forth that man or that woman, which have committed that wicked thing, unto thy gates, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' that man or that woman, and shalt stone them with stones, till they die. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'At the mouth of two witnesses, or three witnesses, shall he that is worthy of death be put to death; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' at the mouth of one witness he shall not be put to death. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The hands of the witnesses shall be first upon him to put him to death, and afterward the hands of all the people. So thou shalt put the evil away from among you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'If there arise a matter too hard for thee in judgment, between blood and blood, between plea and plea, and between stroke and stroke, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' matters of controversy within thy gates: then shalt thou arise, and get thee up into the place which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God shall choose; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and thou shalt come unto the priests the Levites, and unto the judge that shall be in those days, and enquire; and they shall shew thee the sentence of judgment: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and thou shalt do according to the sentence, which they of that place which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall choose shall shew thee; and thou shalt observe to do according to all that they inform thee: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'according to the sentence of the law which they shall teach thee, and according to the judgment which they shall tell thee, thou shalt do: thou shalt not decline from the sentence which they shall shew thee, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to
  - type: text
    text: ' the right hand, nor '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to
  - type: text
    text: ' the left. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And the man that will do presumptuously, and will not hearken unto the priest that standeth to minister there before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, or unto the judge, even that man shall die: and thou shalt put away the evil from Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And all the people shall hear, and fear, and do no more presumptuously.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When thou art come unto the land which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God giveth thee, and shalt possess it, and shalt dwell therein, and shalt say, I will set a king over me, like as all the nations that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' about me; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'thou shalt in any wise set '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' king over thee, whom the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God shall choose: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' from among thy brethren shalt thou set king over thee: thou mayest not set a stranger over thee, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not thy brother. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But he shall not multiply horses to himself, nor cause the people to return to Egypt, to the end that he should multiply horses: forasmuch as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath said unto you, Ye shall henceforth return no more that way. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Neither shall he multiply wives to himself, that his heart turn not away: neither shall he greatly multiply to himself silver and gold.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And it shall be, when he sitteth upon the throne of his kingdom, that he shall write him a copy of this law in a book out of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which is
  - type: text
    text: ' before the priests the Levites: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and it shall be with him, and he shall read therein all the days of his life: that he may learn to fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' his God, to keep all the words of this law and these statutes, to do them: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'that his heart be not lifted up above his brethren, and that he turn not aside from the commandment, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to
  - type: text
    text: ' the right hand, or '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to
  - type: text
    text: ' the left: to the end that he may prolong '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' days in his kingdom, he, and his children, in the midst of Israel.'
