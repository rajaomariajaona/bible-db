  '10':
  - type: text
    content: 'Then Amaziah the priest of Beth-el sent to Jeroboam king of Israel, saying, Amos hath conspired against thee in the midst of the house of Israel: the land is not able to bear all his words. '
  '11':
  - type: text
    content: 'For thus Amos saith, Jeroboam shall die by the sword, and Israel shall surely be led away captive out of their own land. '
  '12':
  - type: text
    content: 'Also Amaziah said unto Amos, O thou seer, go, flee thee away into the land of Judah, and there eat bread, and prophesy there: '
  '13':
  - type: text
    content: 'but prophesy not again any more at Beth-el: for it '
  - type: text
    content: is
