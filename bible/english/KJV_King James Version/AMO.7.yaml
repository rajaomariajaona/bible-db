  '7':
  - type: text
    content: 'Thus he shewed me: and, behold, the Lord stood upon a wall '
  - type: text
    content: made
  - type: text
    content: ' by a plumbline, with a plumbline in his hand. '
  '8':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto me, Amos, what seest thou? And I said, A plumbline. Then said the Lord, Behold, I will set a plumbline in the midst of my people Israel: I will not again pass by them any more: '
  '9':
  - type: text
    content: and the high places of Isaac shall be desolate, and the sanctuaries of Israel shall be laid waste; and I will rise against the house of Jeroboam with the sword.
