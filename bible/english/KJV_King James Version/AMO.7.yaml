document_id: AMO.7,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Visions of Judgement
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Locusts
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus hath the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ' shewed unto me; and, behold, he formed grasshoppers in the beginning of the shooting up of the latter growth; and, lo, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' the latter growth after the king''s mowings. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Amaziah the priest of Beth-el sent to Jeroboam king of Israel, saying, Amos hath conspired against thee in the midst of the house of Israel: the land is not able to bear all his words. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For thus Amos saith, Jeroboam shall die by the sword, and Israel shall surely be led away captive out of their own land. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also Amaziah said unto Amos, O thou seer, go, flee thee away into the land of Judah, and there eat bread, and prophesy there: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but prophesy not again any more at Beth-el: for it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the king''s chapel, and it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the king''s court.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then answered Amos, and said to Amaziah, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' no prophet, neither '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' I a prophet''s son; but I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' an herdman, and a gatherer of sycomore fruit: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' took me as I followed the flock, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto me, Go, prophesy unto my people Israel. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore hear thou the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': Thou sayest, Prophesy not against Israel, and drop not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thy word
    - type: text
      text: ' against the house of Isaac. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; Thy wife shall be an harlot in the city, and thy sons and thy daughters shall fall by the sword, and thy land shall be divided by line; and thou shalt die in a polluted land: and Israel shall surely go into captivity forth of his land.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' when they had made an end of eating the grass of the land, then I said, O Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ', forgive, I beseech thee: by whom shall Jacob arise? for he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' small. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' repented for this: It shall not be, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fire
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus hath the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ' shewed unto me: and, behold, the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ' called to contend by fire, and it devoured the great deep, and did eat up a part. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said I, O Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ', cease, I beseech thee: by whom shall Jacob arise? for he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' small. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' repented for this: This also shall not be, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Plumbline
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus he shewed me: and, behold, the Lord stood upon a wall '
    - type: usfm
      marker: add
      children:
      - type: text
        text: made
    - type: text
      text: ' by a plumbline, with a plumbline in his hand. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto me, Amos, what seest thou? And I said, A plumbline. Then said the Lord, Behold, I will set a plumbline in the midst of my people Israel: I will not again pass by them any more: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and the high places of Isaac shall be desolate, and the sanctuaries of Israel shall be laid waste; and I will rise against the house of Jeroboam with the sword.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Amos at Beth-el
    marker-yv: yv-h
