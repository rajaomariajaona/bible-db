document_id: MIC.7,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Woe is me! for I am as when they have gathered the summer fruits, as the grapegleanings of the vintage: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no cluster to eat: my soul desired the firstripe fruit. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then '
    - type: usfm
      marker: add
      children:
      - type: text
        text: she that is
    - type: text
      text: ' mine enemy shall see '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and shame shall cover her which said unto me, Where is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God? mine eyes shall behold her: now shall she be trodden down as the mire of the streets.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: In
    - type: text
      text: ' the day that thy walls are to be built, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' that day shall the decree be far removed. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: add
      children:
      - type: text
        text: In
    - type: text
      text: ' that day '
    - type: usfm
      marker: add
      children:
      - type: text
        text: also
    - type: text
      text: ' he shall come even to thee from Assyria, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from
    - type: text
      text: ' the fortified cities, and from the fortress even to the river, and from sea to sea, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from
    - type: text
      text: ' mountain to mountain. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Notwithstanding the land shall be desolate because of them that dwell therein, for the fruit of their doings.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Feed thy people with thy rod, the flock of thine heritage, which dwell solitarily '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' the wood, in the midst of Carmel: let them feed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' Bashan and Gilead, as in the days of old. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'According to the days of thy coming out of the land of Egypt will I shew unto him marvellous '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The nations shall see and be confounded at all their might: they shall lay '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' hand upon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' mouth, their ears shall be deaf. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'They shall lick the dust like a serpent, they shall move out of their holes like worms of the earth: they shall be afraid of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God, and shall fear because of thee.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a God like unto thee, that pardoneth iniquity, and passeth by the transgression of the remnant of his heritage? he retaineth not his anger for ever, because he delighteth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' mercy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'He will turn again, he will have compassion upon us; he will subdue our iniquities; and thou wilt cast all their sins into the depths of the sea. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The good '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' is perished out of the earth: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none upright among men: they all lie in wait for blood; they hunt every man his brother with a net. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Thou wilt perform the truth to Jacob, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the mercy to Abraham, which thou hast sworn unto our fathers from the days of old.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'That they may do evil with both hands earnestly, the prince asketh, and the judge '
    - type: usfm
      marker: add
      children:
      - type: text
        text: asketh
    - type: text
      text: ' for a reward; and the great '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ', he uttereth his mischievous desire: so they wrap it up. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The best of them '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' as a brier: the most upright '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is sharper
    - type: text
      text: ' than a thorn hedge: the day of thy watchmen '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' thy visitation cometh; now shall be their perplexity. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Trust ye not in a friend, put ye not confidence in a guide: keep the doors of thy mouth from her that lieth in thy bosom. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For the son dishonoureth the father, the daughter riseth up against her mother, the daughter in law against her mother in law; a man''s enemies '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the men of his own house.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Her Trust in God
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Therefore I will look unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; I will wait for the God of my salvation: my God will hear me. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Rejoice not against me, O mine enemy: when I fall, I shall arise; when I sit in darkness, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' a light unto me. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'I will bear the indignation of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', because I have sinned against him, until he plead my cause, and execute judgment for me: he will bring me forth to the light, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' I shall behold his righteousness. '
