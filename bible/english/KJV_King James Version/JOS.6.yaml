  - type: text
    content: 'And Joshua had commanded the people, saying, Ye shall not shout, nor make any noise with your voice, neither shall '
  - type: text
    content: any
  - type: text
    content: ' word proceed out of your mouth, until the day I bid you shout; then shall ye shout. '
  '11':
  - type: text
    content: 'So the ark of the '
  - type: text
    content: LORD
  - type: text
    content: ' compassed the city, going about '
  - type: text
    content: it
  - type: text
    content: ' once: and they came into the camp, and lodged in the camp.'
  '12':
  - type: text
    content: 'And Joshua rose early in the morning, and the priests took up the ark of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'And seven priests bearing seven trumpets of rams'' horns before the ark of the '
  - type: text
    content: LORD
  - type: text
