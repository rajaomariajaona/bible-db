  - type: text
    content: the priests
  - type: text
    content: ' going on, and blowing with the trumpets. '
  '14':
  - type: text
    content: 'And the second day they compassed the city once, and returned into the camp: so they did six days.'
  '15':
  - type: text
    content: 'And it came to pass on the seventh day, that they rose early about the dawning of the day, and compassed the city after the same manner seven times: only on that day they compassed the city seven times. '
  '16':
  - type: text
    content: 'And it came to pass at the seventh time, when the priests blew with the trumpets, Joshua said unto the people, Shout; for the '
  - type: text
    content: LORD
  - type: text
    content: ' hath given you the city. '
  '17':
  - type: text
    content: 'And the city shall be accursed, '
  - type: text
    content: even
  - type: text
    content: ' it, and all that '
  - type: text
    content: are
  - type: text
    content: ' therein, to the '
  - type: text
    content: LORD
  - type: text
    content: ': only Rahab the harlot shall live, she and all that '
  - type: text
    content: are
  - type: text
    content: ' with her in the house, because she hid the messengers that we sent. '
  '18':
  - type: text
    content: 'And ye, in any wise keep '
  - type: text
    content: yourselves
  - type: text
    content: ' from the accursed thing, lest ye make '
  - type: text
    content: yourselves
  - type: text
    content: ' accursed, when ye take of the accursed thing, and make the camp of Israel a curse, and trouble it. '
  '19':
  - type: text
    content: 'But all the silver, and gold, and vessels of brass and iron, '
  - type: text
    content: are
  - type: text
    content: ' consecrated unto the '
  - type: text
    content: LORD
  - type: text
    content: ': they shall come into the treasury of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Joshua, See, I have given into thine hand Jericho, and the king thereof, '
  - type: text
    content: and
  - type: text
    content: ' the mighty men of valour. '
  '20':
  - type: text
    content: 'So the people shouted when '
  - type: text
    content: the priests
  - type: text
    content: ' blew with the trumpets: and it came to pass, when the people heard the sound of the trumpet, and the people shouted with a great shout, that the wall fell down flat, so that the people went up into the city, every man straight before him, and they took the city. '
  '21':
  - type: text
    content: 'And they utterly destroyed all that '
  - type: text
    content: was
  - type: text
    content: ' in the city, both man and woman, young and old, and ox, and sheep, and ass, with the edge of the sword.'
  '22':
  - type: text
    content: 'But Joshua had said unto the two men that had spied out the country, Go into the harlot''s house, and bring out thence the woman, and all that she hath, as ye sware unto her. '
  '23':
  - type: text
    content: 'And the young men that were spies went in, and brought out Rahab, and her father, and her mother, and her brethren, and all that she had; and they brought out all her kindred, and left them without the camp of Israel. '
  '24':
  - type: text
    content: 'And they burnt the city with fire, and all that '
  - type: text
    content: was
  - type: text
    content: ' therein: only the silver, and the gold, and the vessels of brass and of iron, they put into the treasury of the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'And Joshua saved Rahab the harlot alive, and her father''s household, and all that she had; and she dwelleth in Israel '
  - type: text
    content: even
  - type: text
    content: ' unto this day; because she hid the messengers, which Joshua sent to spy out Jericho. '
  '26':
  - type: text
    content: 'And Joshua adjured '
  - type: text
    content: them
  - type: text
    content: ' at that time, saying, Cursed '
  - type: text
    content: be
  - type: text
    content: ' the man before the '
  - type: text
    content: LORD
  - type: text
    content: ', that riseth up and buildeth this city Jericho: he shall lay the foundation thereof in his firstborn, and in his youngest '
  - type: text
    content: son
  - type: text
    content: ' shall he set up the gates of it. '
  '27':
  - type: text
    content: 'So the '
  - type: text
    content: LORD
  - type: text
    content: ' was with Joshua; and his fame was '
  - type: text
    content: noised
  - type: text
    content: ' throughout all the country.'
  '3':
  - type: text
    content: 'And ye shall compass the city, all '
  - type: text
    content: ye
  - type: text
    content: ' men of war, '
  - type: text
    content: and
  - type: text
    content: ' go round about the city once. Thus shalt thou do six days. '
  '4':
  - type: text
    content: 'And seven priests shall bear before the ark seven trumpets of rams'' horns: and the seventh day ye shall compass the city seven times, and the priests shall blow with the trumpets. '
  '5':
  - type: text
    content: 'And it shall come to pass, that when they make a long '
  - type: text
    content: blast
  - type: text
    content: ' with the ram''s horn, '
  - type: text
    content: and
  - type: text
    content: ' when ye hear the sound of the trumpet, all the people shall shout with a great shout; and the wall of the city shall fall down flat, and the people shall ascend up every man straight before him. '
  '6':
  - type: text
    content: 'And Joshua the son of Nun called the priests, and said unto them, Take up the ark of the covenant, and let seven priests bear seven trumpets of rams'' horns before the ark of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'And he said unto the people, Pass on, and compass the city, and let him that is armed pass on before the ark of the '
  - type: text
    content: LORD
  - type: text
    content: .
  '8':
  - type: text
    content: 'And it came to pass, when Joshua had spoken unto the people, that the seven priests bearing the seven trumpets of rams'' horns passed on before the '
  - type: text
    content: LORD
  - type: text
    content: ', and blew with the trumpets: and the ark of the covenant of the '
  - type: text
    content: LORD
  - type: text
    content: ' followed them. '
  '9':
  - type: text
    content: 'And the armed men went before the priests that blew with the trumpets, and the rereward came after the ark, '
  - type: text
