document_id: JOS.6,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Jericho was straitly shut up because of the children of Israel: none went out, and none came in. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joshua had commanded the people, saying, Ye shall not shout, nor make any noise with your voice, neither shall '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' word proceed out of your mouth, until the day I bid you shout; then shall ye shout. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' compassed the city, going about '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' once: and they came into the camp, and lodged in the camp.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joshua rose early in the morning, and the priests took up the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And seven priests bearing seven trumpets of rams'' horns before the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' went on continually, and blew with the trumpets: and the armed men went before them; but the rereward came after the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the priests
    - type: text
      text: ' going on, and blowing with the trumpets. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the second day they compassed the city once, and returned into the camp: so they did six days.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass on the seventh day, that they rose early about the dawning of the day, and compassed the city after the same manner seven times: only on that day they compassed the city seven times. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass at the seventh time, when the priests blew with the trumpets, Joshua said unto the people, Shout; for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath given you the city. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the city shall be accursed, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' it, and all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' therein, to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': only Rahab the harlot shall live, she and all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' with her in the house, because she hid the messengers that we sent. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And ye, in any wise keep '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yourselves
    - type: text
      text: ' from the accursed thing, lest ye make '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yourselves
    - type: text
      text: ' accursed, when ye take of the accursed thing, and make the camp of Israel a curse, and trouble it. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But all the silver, and gold, and vessels of brass and iron, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' consecrated unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': they shall come into the treasury of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Joshua, See, I have given into thine hand Jericho, and the king thereof, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the mighty men of valour. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the people shouted when '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the priests
    - type: text
      text: ' blew with the trumpets: and it came to pass, when the people heard the sound of the trumpet, and the people shouted with a great shout, that the wall fell down flat, so that the people went up into the city, every man straight before him, and they took the city. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they utterly destroyed all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in the city, both man and woman, young and old, and ox, and sheep, and ass, with the edge of the sword.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Joshua had said unto the two men that had spied out the country, Go into the harlot''s house, and bring out thence the woman, and all that she hath, as ye sware unto her. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the young men that were spies went in, and brought out Rahab, and her father, and her mother, and her brethren, and all that she had; and they brought out all her kindred, and left them without the camp of Israel. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they burnt the city with fire, and all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' therein: only the silver, and the gold, and the vessels of brass and of iron, they put into the treasury of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joshua saved Rahab the harlot alive, and her father''s household, and all that she had; and she dwelleth in Israel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' unto this day; because she hid the messengers, which Joshua sent to spy out Jericho. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joshua adjured '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' at that time, saying, Cursed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' the man before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', that riseth up and buildeth this city Jericho: he shall lay the foundation thereof in his firstborn, and in his youngest '
    - type: usfm
      marker: add
      children:
      - type: text
        text: son
    - type: text
      text: ' shall he set up the gates of it. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was with Joshua; and his fame was '
    - type: usfm
      marker: add
      children:
      - type: text
        text: noised
    - type: text
      text: ' throughout all the country.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And ye shall compass the city, all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ye
    - type: text
      text: ' men of war, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' go round about the city once. Thus shalt thou do six days. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And seven priests shall bear before the ark seven trumpets of rams'' horns: and the seventh day ye shall compass the city seven times, and the priests shall blow with the trumpets. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass, that when they make a long '
    - type: usfm
      marker: add
      children:
      - type: text
        text: blast
    - type: text
      text: ' with the ram''s horn, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' when ye hear the sound of the trumpet, all the people shall shout with a great shout; and the wall of the city shall fall down flat, and the people shall ascend up every man straight before him. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joshua the son of Nun called the priests, and said unto them, Take up the ark of the covenant, and let seven priests bear seven trumpets of rams'' horns before the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto the people, Pass on, and compass the city, and let him that is armed pass on before the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, when Joshua had spoken unto the people, that the seven priests bearing the seven trumpets of rams'' horns passed on before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and blew with the trumpets: and the ark of the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' followed them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the armed men went before the priests that blew with the trumpets, and the rereward came after the ark, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the priests
    - type: text
      text: ' going on, and blowing with the trumpets. '
