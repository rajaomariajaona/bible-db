document_id: JOB.6,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Job's Answer
  - type: text
    content: But Job answered and said,
  '10':
  - type: text
    content: Then should I yet have comfort;
  - type: text
    content: 'Yea, I would harden myself in sorrow: let him not spare;'
  - type: text
    content: For I have not concealed the words of the Holy One.
  '11':
  - type: text
    content: 'What '
  - type: text
    content: is
  - type: text
    content: ' my strength, that I should hope?'
  - type: text
    content: 'And what '
  - type: text
    content: is
  - type: text
    content: ' mine end, that I should prolong my life?'
  '12':
  - type: text
    content: ' '
  - type: text
    content: Is
  - type: text
    content: ' my strength the strength of stones?'
  - type: text
    content: 'Or '
  - type: text
    content: is
  - type: text
    content: ' my flesh of brass?'
  '13':
  - type: text
    content: ' '
  - type: text
    content: Is
  - type: text
    content: ' not my help in me?'
  - type: text
    content: And is wisdom driven quite from me?
  '14':
  - type: text
    content: 'To him that is afflicted pity '
  - type: text
    content: should be shewed
  - type: text
    content: ' from his friend;'
  - type: text
    content: But he forsaketh the fear of the Almighty.
  '15':
  - type: text
    content: My brethren have dealt deceitfully as a brook,
  - type: text
    content: And
  - type: text
    content: ' as the stream of brooks they pass away;'
  '16':
  - type: text
    content: Which are blackish by reason of the ice,
  - type: text
    content: And
  - type: text
    content: ' wherein the snow is hid:'
  '17':
  - type: text
    content: 'What time they wax warm, they vanish:'
  - type: text
    content: When it is hot, they are consumed out of their place.
  '18':
  - type: text
    content: The paths of their way are turned aside;
  - type: text
    content: They go to nothing, and perish.
  '19':
  - type: text
    content: The troops of Tema looked,
  - type: text
    content: The companies of Sheba waited for them.
  '2':
  - type: text
    content: Oh that my grief were throughly weighed,
  - type: text
    content: And my calamity laid in the balances together!
  '20':
  - type: text
    content: They were confounded because they had hoped;
  - type: text
    content: They came thither, and were ashamed.
  '21':
  - type: text
    content: For now ye are nothing;
  - type: text
    content: 'Ye see '
  - type: text
    content: my
  - type: text
    content: ' casting down, and are afraid.'
  '22':
  - type: text
    content: Did I say, Bring unto me?
  - type: text
    content: Or, Give a reward for me of your substance?
  '23':
  - type: text
    content: Or, Deliver me from the enemy's hand?
  - type: text
    content: Or, Redeem me from the hand of the mighty?
  '24':
  - type: text
    content: 'Teach me, and I will hold my tongue:'
  - type: text
    content: And cause me to understand wherein I have erred.
  '25':
  - type: text
    content: How forcible are right words!
  - type: text
    content: But what doth your arguing reprove?
  '26':
  - type: text
    content: Do ye imagine to reprove words,
  - type: text
    content: 'And the speeches of one that is desperate, '
  - type: text
    content: which are
  - type: text
    content: ' as wind?'
  '27':
  - type: text
    content: Yea, ye overwhelm the fatherless,
  - type: text
    content: 'And ye dig '
  - type: text
    content: a pit
  - type: text
    content: ' for your friend.'
  '28':
  - type: text
    content: Now therefore be content, look upon me;
  - type: text
    content: 'For '
  - type: text
    content: it is
  - type: text
    content: ' evident unto you if I lie.'
  '29':
  - type: text
    content: Return, I pray you, let it not be iniquity;
  - type: text
    content: 'Yea, return again, my righteousness '
  - type: text
    content: is
  - type: text
    content: ' in it.'
  '3':
  - type: text
    content: 'For now it would be heavier than the sand of the sea:'
  - type: text
    content: Therefore my words are swallowed up.
  '30':
  - type: text
    content: Is there iniquity in my tongue?
  - type: text
    content: Cannot my taste discern perverse things?
  '4':
  - type: text
    content: 'For the arrows of the Almighty '
  - type: text
    content: are
  - type: text
    content: ' within me,'
  - type: text
    content: 'The poison whereof drinketh up my spirit:'
  - type: text
    content: The terrors of God do set themselves in array against me.
  '5':
  - type: text
    content: Doth the wild ass bray when he hath grass?
  - type: text
    content: Or loweth the ox over his fodder?
  '6':
  - type: text
    content: Can that which is unsavoury be eaten without salt?
  - type: text
    content: 'Or is there '
  - type: text
    content: any
  - type: text
    content: ' taste in the white of an egg?'
  '7':
  - type: text
    content: 'The things '
  - type: text
    content: that
  - type: text
    content: ' my soul refused to touch'
  - type: text
    content: Are
  - type: text
    content: ' as my sorrowful meat.'
  '8':
  - type: text
    content: Oh that I might have my request;
  - type: text
    content: 'And that God would grant '
  - type: text
    content: me
  - type: text
    content: ' the thing that I long for!'
  '9':
  - type: text
    content: Even that it would please God to destroy me;
  - type: text
    content: That he would let loose his hand, and cut me off!
