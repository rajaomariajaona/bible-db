document_id: JOB.6,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Job's Answer
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: But Job answered and said,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Then should I yet have comfort;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yea, I would harden myself in sorrow: let him not spare;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For I have not concealed the words of the Holy One.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my strength, that I should hope?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' mine end, that I should prolong my life?'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' my strength the strength of stones?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Or '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my flesh of brass?'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' not my help in me?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And is wisdom driven quite from me?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'To him that is afflicted pity '
    - type: usfm
      marker: add
      children:
      - type: text
        text: should be shewed
    - type: text
      text: ' from his friend;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But he forsaketh the fear of the Almighty.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: My brethren have dealt deceitfully as a brook,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' as the stream of brooks they pass away;'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Which are blackish by reason of the ice,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' wherein the snow is hid:'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'What time they wax warm, they vanish:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When it is hot, they are consumed out of their place.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: The paths of their way are turned aside;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They go to nothing, and perish.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: The troops of Tema looked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The companies of Sheba waited for them.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Oh that my grief were throughly weighed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And my calamity laid in the balances together!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: They were confounded because they had hoped;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They came thither, and were ashamed.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: For now ye are nothing;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Ye see '
    - type: usfm
      marker: add
      children:
      - type: text
        text: my
    - type: text
      text: ' casting down, and are afraid.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Did I say, Bring unto me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or, Give a reward for me of your substance?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Or, Deliver me from the enemy's hand?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or, Redeem me from the hand of the mighty?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Teach me, and I will hold my tongue:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And cause me to understand wherein I have erred.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: How forcible are right words!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But what doth your arguing reprove?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Do ye imagine to reprove words,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the speeches of one that is desperate, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which are
    - type: text
      text: ' as wind?'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Yea, ye overwhelm the fatherless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And ye dig '
    - type: usfm
      marker: add
      children:
      - type: text
        text: a pit
    - type: text
      text: ' for your friend.'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Now therefore be content, look upon me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' evident unto you if I lie.'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Return, I pray you, let it not be iniquity;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yea, return again, my righteousness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in it.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For now it would be heavier than the sand of the sea:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore my words are swallowed up.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Is there iniquity in my tongue?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Cannot my taste discern perverse things?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For the arrows of the Almighty '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' within me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The poison whereof drinketh up my spirit:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The terrors of God do set themselves in array against me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Doth the wild ass bray when he hath grass?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or loweth the ox over his fodder?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Can that which is unsavoury be eaten without salt?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Or is there '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' taste in the white of an egg?'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The things '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' my soul refused to touch'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Are
    - type: text
      text: ' as my sorrowful meat.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Oh that I might have my request;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And that God would grant '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ' the thing that I long for!'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Even that it would please God to destroy me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That he would let loose his hand, and cut me off!
