document_id: JOB.6
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Job's Answer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: But Job answered and said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Oh that my grief were throughly weighed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And my calamity laid in the balances together!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For now it would be heavier than the sand of the sea:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Therefore my words are swallowed up.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For the arrows of the Almighty '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' within me,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The poison whereof drinketh up my spirit:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The terrors of God do set themselves in array against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Doth the wild ass bray when he hath grass?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or loweth the ox over his fodder?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Can that which is unsavoury be eaten without salt?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Or is there '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' taste in the white of an egg?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The things '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' my soul refused to touch'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Are
  - type: text
    text: ' as my sorrowful meat.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Oh that I might have my request;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And that God would grant '
  - type: usfm
    marker: add
    children:
    - type: text
      text: me
  - type: text
    text: ' the thing that I long for!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Even that it would please God to destroy me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: That he would let loose his hand, and cut me off!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then should I yet have comfort;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Yea, I would harden myself in sorrow: let him not spare;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: For I have not concealed the words of the Holy One.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'What '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my strength, that I should hope?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' mine end, that I should prolong my life?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' my strength the strength of stones?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Or '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my flesh of brass?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' not my help in me?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And is wisdom driven quite from me?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'To him that is afflicted pity '
  - type: usfm
    marker: add
    children:
    - type: text
      text: should be shewed
  - type: text
    text: ' from his friend;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But he forsaketh the fear of the Almighty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: My brethren have dealt deceitfully as a brook,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' as the stream of brooks they pass away;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Which are blackish by reason of the ice,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' wherein the snow is hid:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'What time they wax warm, they vanish:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: When it is hot, they are consumed out of their place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The paths of their way are turned aside;
- type: usfm
  marker: q2
  children:
  - type: text
    text: They go to nothing, and perish.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The troops of Tema looked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: The companies of Sheba waited for them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: They were confounded because they had hoped;
- type: usfm
  marker: q2
  children:
  - type: text
    text: They came thither, and were ashamed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: For now ye are nothing;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Ye see '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my
  - type: text
    text: ' casting down, and are afraid.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Did I say, Bring unto me?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or, Give a reward for me of your substance?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Or, Deliver me from the enemy's hand?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or, Redeem me from the hand of the mighty?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Teach me, and I will hold my tongue:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And cause me to understand wherein I have erred.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: How forcible are right words!
- type: usfm
  marker: q2
  children:
  - type: text
    text: But what doth your arguing reprove?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Do ye imagine to reprove words,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the speeches of one that is desperate, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which are
  - type: text
    text: ' as wind?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Yea, ye overwhelm the fatherless,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And ye dig '
  - type: usfm
    marker: add
    children:
    - type: text
      text: a pit
  - type: text
    text: ' for your friend.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Now therefore be content, look upon me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' evident unto you if I lie.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Return, I pray you, let it not be iniquity;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Yea, return again, my righteousness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in it.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Is there iniquity in my tongue?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Cannot my taste discern perverse things?
