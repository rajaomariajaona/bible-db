document_id: TIT.3,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Social Service
  - type: text
    content: 'Put them in mind to be subject to principalities and powers, to obey magistrates, to be ready to every good work, '
  '10':
  - type: text
    content: 'A man that is an heretick after the first and second admonition reject; '
  '11':
  - type: text
    content: knowing that he that is such is subverted, and sinneth, being condemned of himself.
  '12':
  - type: text
    content: 'When I shall send Artemas unto thee, or Tychicus, be diligent to come unto me to Nicopolis: for I have determined there to winter. '
  '13':
  - type: text
    content: 'Bring Zenas the lawyer and Apollos on their journey diligently, that nothing be wanting unto them. '
  '14':
  - type: text
    content: And let our's also learn to maintain good works for necessary uses, that they be not unfruitful.
  '15':
  - type: text
    content: 'All that are with me salute thee. Greet them that love us in the faith. Grace '
  - type: text
    content: be
  - type: text
    content: ' with you all. Amen.'
  - type: text
    content: It was written to Titus, ordained the first bishop of the church of the Cretians, from Nicopolis of Macedonia.
  '2':
  - type: text
    content: 'to speak evil of no man, to be no brawlers, '
  - type: text
    content: but
  - type: text
    content: ' gentle, shewing all meekness unto all men. '
  '3':
  - type: text
    content: 'For we ourselves also were sometimes foolish, disobedient, deceived, serving divers lusts and pleasures, living in malice and envy, hateful, '
  - type: text
    content: and
  - type: text
    content: ' hating one another. '
  '4':
  - type: text
    content: 'But after that the kindness and love of God our Saviour toward man appeared, '
  '5':
  - type: text
    content: 'not by works of righteousness which we have done, but according to his mercy he saved us, by the washing of regeneration, and renewing of the Holy Ghost; '
  '6':
  - type: text
    content: 'which he shed on us abundantly through Jesus Christ our Saviour; '
  '7':
  - type: text
    content: 'that being justified by his grace, we should be made heirs according to the hope of eternal life. '
  '8':
  - type: text
    content: This is
  - type: text
    content: ' a faithful saying, and these things I will that thou affirm constantly, that they which have believed in God might be careful to maintain good works. These things are good and profitable unto men. '
  '9':
  - type: text
    content: 'But avoid foolish questions, and genealogies, and contentions, and strivings about the law; for they are unprofitable and vain. '
