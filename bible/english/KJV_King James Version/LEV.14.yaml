document_id: LEV.14,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And on the eighth day he shall take two he lambs without blemish, and one ewe lamb of the first year without blemish, and three tenth deals of fine flour '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a meat offering, mingled with oil, and one log of oil. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And the priest that maketh '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' clean shall present the man that is to be made clean, and those things, before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: at
    - type: text
      text: ' the door of the tabernacle of the congregation: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'and the priest shall take one he lamb, and offer him for a trespass offering, and the log of oil, and wave them '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a wave offering before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'and he shall slay the lamb in the place where he shall kill the sin offering and the burnt offering, in the holy place: for as the sin offering '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the priest''s, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so is
    - type: text
      text: ' the trespass offering: it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' most holy: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'and the priest shall take '
    - type: usfm
      marker: add
      children:
      - type: text
        text: some
    - type: text
      text: ' of the blood of the trespass offering, and the priest shall put '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' upon the tip of the right ear of him that is to be cleansed, and upon the thumb of his right hand, and upon the great toe of his right foot: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'and the priest shall take '
    - type: usfm
      marker: add
      children:
      - type: text
        text: some
    - type: text
      text: ' of the log of oil, and pour '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' into the palm of his own left hand: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'and the priest shall dip his right finger in the oil that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in his left hand, and shall sprinkle of the oil with his finger seven times before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'and of the rest of the oil that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in his hand shall the priest put upon the tip of the right ear of him that is to be cleansed, and upon the thumb of his right hand, and upon the great toe of his right foot, upon the blood of the trespass offering: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'and the remnant of the oil that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the priest''s hand he shall pour upon the head of him that is to be cleansed: and the priest shall make an atonement for him before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And the priest shall offer the sin offering, and make an atonement for him that is to be cleansed from his uncleanness; and afterward he shall kill the burnt offering: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'This shall be the law of the leper in the day of his cleansing: He shall be brought unto the priest: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'and the priest shall offer the burnt offering and the meat offering upon the altar: and the priest shall make an atonement for him, and he shall be clean. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And if he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' poor, and cannot get so much; then he shall take one lamb '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a trespass offering to be waved, to make an atonement for him, and one tenth deal of fine flour mingled with oil for a meat offering, and a log of oil; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'and two turtledoves, or two young pigeons, such as he is able to get; and the one shall be a sin offering, and the other a burnt offering. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And he shall bring them on the eighth day for his cleansing unto the priest, unto the door of the tabernacle of the congregation, before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And the priest shall take the lamb of the trespass offering, and the log of oil, and the priest shall wave them '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a wave offering before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'and he shall kill the lamb of the trespass offering, and the priest shall take '
    - type: usfm
      marker: add
      children:
      - type: text
        text: some
    - type: text
      text: ' of the blood of the trespass offering, and put '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' upon the tip of the right ear of him that is to be cleansed, and upon the thumb of his right hand, and upon the great toe of his right foot: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'and the priest shall pour of the oil into the palm of his own left hand: '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'and the priest shall sprinkle with his right finger '
    - type: usfm
      marker: add
      children:
      - type: text
        text: some
    - type: text
      text: ' of the oil that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in his left hand seven times before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'and the priest shall put of the oil that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in his hand upon the tip of the right ear of him that is to be cleansed, and upon the thumb of his right hand, and upon the great toe of his right foot, upon the place of the blood of the trespass offering: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'and the rest of the oil that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the priest''s hand he shall put upon the head of him that is to be cleansed, to make an atonement for him before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'and the priest shall go forth out of the camp; and the priest shall look, and, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: if
    - type: text
      text: ' the plague of leprosy be healed in the leper; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And he shall offer the one of the turtledoves, or of the young pigeons, such as he can get; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' such as he is able to get, the one '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a sin offering, and the other '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a burnt offering, with the meat offering: and the priest shall make an atonement for him that is to be cleansed before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the law '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of him
    - type: text
      text: ' in whom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the plague of leprosy, whose hand is not able to get '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which pertaineth
    - type: text
      text: ' to his cleansing.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses and unto Aaron, saying, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'When ye be come into the land of Canaan, which I give to you for a possession, and I put the plague of leprosy in a house of the land of your possession; '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'and he that owneth the house shall come and tell the priest, saying, It seemeth to me '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' as it were a plague in the house: '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'then the priest shall command that they empty the house, before the priest go '
    - type: usfm
      marker: add
      children:
      - type: text
        text: into it
    - type: text
      text: ' to see the plague, that all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the house be not made unclean: and afterward the priest shall go in to see the house: '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'and he shall look on the plague, and, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: if
    - type: text
      text: ' the plague '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' in the walls of the house with hollow strakes, greenish or reddish, which in sight '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' lower than the wall; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'then the priest shall go out of the house to the door of the house, and shut up the house seven days: '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'and the priest shall come again the seventh day, and shall look: and, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: if
    - type: text
      text: ' the plague be spread in the walls of the house; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'then shall the priest command to take for him that is to be cleansed two birds alive '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' clean, and cedar wood, and scarlet, and hyssop: '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'then the priest shall command that they take away the stones in which the plague '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ', and they shall cast them into an unclean place without the city: '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'and he shall cause the house to be scraped within round about, and they shall pour out the dust that they scrape off without the city into an unclean place: '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'and they shall take other stones, and put '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' in the place of those stones; and he shall take other morter, and shall plaister the house. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'And if the plague come again, and break out in the house, after that he hath taken away the stones, and after he hath scraped the house, and after it is plaistered; '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'then the priest shall come and look, and, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: if
    - type: text
      text: ' the plague be spread in the house, it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a fretting leprosy in the house: it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' unclean. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'And he shall break down the house, the stones of it, and the timber thereof, and all the morter of the house; and he shall carry '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' forth out of the city into an unclean place. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Moreover he that goeth into the house all the while that it is shut up shall be unclean until the even. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'And he that lieth in the house shall wash his clothes; and he that eateth in the house shall wash his clothes. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'And if the priest shall come in, and look '
    - type: usfm
      marker: add
      children:
      - type: text
        text: upon it
    - type: text
      text: ', and, behold, the plague hath not spread in the house, after the house was plaistered: then the priest shall pronounce the house clean, because the plague is healed. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'And he shall take to cleanse the house two birds, and cedar wood, and scarlet, and hyssop: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'and the priest shall command that one of the birds be killed in an earthen vessel over running water: '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'and he shall kill the one of the birds in an earthen vessel over running water: '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'and he shall take the cedar wood, and the hyssop, and the scarlet, and the living bird, and dip them in the blood of the slain bird, and in the running water, and sprinkle the house seven times: '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'and he shall cleanse the house with the blood of the bird, and with the running water, and with the living bird, and with the cedar wood, and with the hyssop, and with the scarlet: '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'but he shall let go the living bird out of the city into the open fields, and make an atonement for the house: and it shall be clean. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the law for all manner of plague of leprosy, and scall, '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'and for the leprosy of a garment, and of a house, '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: 'and for a rising, and for a scab, and for a bright spot: '
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'to teach when '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' unclean, and when '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' clean: this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the law of leprosy.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'as for the living bird, he shall take it, and the cedar wood, and the scarlet, and the hyssop, and shall dip them and the living bird in the blood of the bird '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that was
    - type: text
      text: ' killed over the running water: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'and he shall sprinkle upon him that is to be cleansed from the leprosy seven times, and shall pronounce him clean, and shall let the living bird loose into the open field. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And he that is to be cleansed shall wash his clothes, and shave off all his hair, and wash himself in water, that he may be clean: and after that he shall come into the camp, and shall tarry abroad out of his tent seven days. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But it shall be on the seventh day, that he shall shave all his hair off his head and his beard and his eyebrows, even all his hair he shall shave off: and he shall wash his clothes, also he shall wash his flesh in water, and he shall be clean. '
