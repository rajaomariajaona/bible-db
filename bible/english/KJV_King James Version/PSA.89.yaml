document_id: PSA.89
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: Maschil of Ethan the Ezrahite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I will sing of the mercies of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' for ever:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: With my mouth will I make known thy faithfulness to all generations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For I have said, Mercy shall be built up for ever:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thy faithfulness shalt thou establish in the very heavens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I have made a covenant with my chosen,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have sworn unto David my servant,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Thy seed will I establish for ever,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And build up thy throne to all generations. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the heavens shall praise thy wonders, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ':'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thy faithfulness also in the congregation of the saints.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For who in the heaven
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Can be compared unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Who
  - type: text
    text: ' among the sons of the mighty'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Can be likened unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: God is greatly to be feared in the assembly of the saints,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And to be had in reverence of all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them that are
  - type: text
    text: ' about him.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of hosts, who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a strong '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' like unto thee?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or to thy faithfulness round about thee?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Thou rulest the raging of the sea:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: When the waves thereof arise, thou stillest them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Thou hast broken Rahab in pieces, as one that is slain;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou hast scattered thine enemies with thy strong arm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The heavens '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' thine, the earth also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thine:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: As for
  - type: text
    text: ' the world and the fulness thereof, thou hast founded them.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The north and the south thou hast created them:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Tabor and Hermon shall rejoice in thy name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Thou hast a mighty arm:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Strong is thy hand, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' high is thy right hand.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Justice and judgment '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the habitation of thy throne:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Mercy and truth shall go before thy face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the people that know the joyful sound:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They shall walk, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', in the light of thy countenance.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'In thy name shall they rejoice all the day:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And in thy righteousness shall they be exalted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' the glory of their strength:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And in thy favour our horn shall be exalted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' our defence;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the Holy One of Israel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' our King.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then thou spakest in vision to thy holy one, and saidst,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I have laid help upon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one that is
  - type: text
    text: ' mighty; I have exalted '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' chosen out of the people.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I have found David my servant;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'With my holy oil have I anointed him:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'With whom my hand shall be established:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Mine arm also shall strengthen him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The enemy shall not exact upon him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nor the son of wickedness afflict him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: And I will beat down his foes before his face,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And plague them that hate him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'But my faithfulness and my mercy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' with him:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And in my name shall his horn be exalted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: I will set his hand also in the sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And his right hand in the rivers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'He shall cry unto me, Thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' my father,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: My God, and the rock of my salvation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Also I will make him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my
  - type: text
    text: ' firstborn,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Higher than the kings of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: My mercy will I keep for him for evermore,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And my covenant shall stand fast with him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'His seed also will I make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to endure
  - type: text
    text: ' for ever,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And his throne as the days of heaven.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: If his children forsake my law,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And walk not in my judgments;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: If they break my statutes, and keep not my commandments;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Then will I visit their transgression with the rod, and their iniquity with stripes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Nevertheless my lovingkindness will I not utterly take from him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nor suffer my faithfulness to fail.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: My covenant will I not break, nor alter the thing that is gone out of my lips.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Once have I sworn by my holiness that I will not lie unto David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: His seed shall endure for ever,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And his throne as the sun before me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: It shall be established for ever as the moon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' a faithful witness in heaven. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: But thou hast cast off and abhorred,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou hast been wroth with thine anointed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Thou hast made void the covenant of thy servant:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Thou hast profaned his crown '
  - type: usfm
    marker: add
    children:
    - type: text
      text: by casting it
  - type: text
    text: ' to the ground.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Thou hast broken down all his hedges;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou hast brought his strong holds to ruin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'All that pass by the way spoil him:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He is a reproach to his neighbours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Thou hast set up the right hand of his adversaries;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou hast made all his enemies to rejoice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Thou hast also turned the edge of his sword,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And hast not made him to stand in the battle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Thou hast made his glory to cease,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And cast his throne down to the ground.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'The days of his youth hast thou shortened:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Thou hast covered him with shame. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'How long, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '? wilt thou hide thyself for ever?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Shall thy wrath burn like fire?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Remember how short my time is:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Wherefore hast thou made all men in vain?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'What man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is he that
  - type: text
    text: ' liveth, and shall not see death?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Shall he deliver his soul from the hand of the grave? '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Lord, where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' thy former lovingkindnesses,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Which
  - type: text
    text: ' thou swarest unto David in thy truth?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Remember, Lord, the reproach of thy servants;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: How
  - type: text
    text: ' I do bear in my bosom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the reproach of
  - type: text
    text: ' all the mighty people;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Wherewith thine enemies have reproached, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Wherewith they have reproached the footsteps of thine anointed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' for evermore.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Amen, and Amen.
