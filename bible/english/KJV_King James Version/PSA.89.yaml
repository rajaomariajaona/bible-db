document_id: PSA.89,1
type_code: eng
verses:
  '1':
  - type: text
    content: Maschil of Ethan the Ezrahite.
  - type: text
    content: 'I will sing of the mercies of the '
  - type: text
    content: LORD
  - type: text
    content: ' for ever:'
  - type: text
    content: With my mouth will I make known thy faithfulness to all generations.
  '10':
  - type: text
    content: Thou hast broken Rahab in pieces, as one that is slain;
  - type: text
    content: Thou hast scattered thine enemies with thy strong arm.
  '11':
  - type: text
    content: 'The heavens '
  - type: text
    content: are
  - type: text
    content: ' thine, the earth also '
  - type: text
    content: is
  - type: text
    content: ' thine:'
  - type: text
    content: As for
  - type: text
    content: ' the world and the fulness thereof, thou hast founded them.'
  '12':
  - type: text
    content: 'The north and the south thou hast created them:'
  - type: text
    content: Tabor and Hermon shall rejoice in thy name.
  '13':
  - type: text
    content: 'Thou hast a mighty arm:'
  - type: text
    content: 'Strong is thy hand, '
  - type: text
    content: and
  - type: text
    content: ' high is thy right hand.'
  '14':
  - type: text
    content: 'Justice and judgment '
  - type: text
    content: are
  - type: text
    content: ' the habitation of thy throne:'
  - type: text
    content: Mercy and truth shall go before thy face.
  '15':
  - type: text
    content: 'Blessed '
  - type: text
    content: is
  - type: text
    content: ' the people that know the joyful sound:'
  - type: text
    content: 'They shall walk, O '
  - type: text
    content: LORD
  - type: text
    content: ', in the light of thy countenance.'
  '16':
  - type: text
    content: 'In thy name shall they rejoice all the day:'
  - type: text
    content: And in thy righteousness shall they be exalted.
  '17':
  - type: text
    content: 'For thou '
  - type: text
    content: art
  - type: text
    content: ' the glory of their strength:'
  - type: text
    content: And in thy favour our horn shall be exalted.
  '18':
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' our defence;'
  - type: text
    content: 'And the Holy One of Israel '
  - type: text
    content: is
  - type: text
    content: ' our King.'
  '19':
  - type: text
    content: Then thou spakest in vision to thy holy one, and saidst,
  - type: text
    content: 'I have laid help upon '
  - type: text
    content: one that is
  - type: text
    content: ' mighty; I have exalted '
  - type: text
    content: one
  - type: text
    content: ' chosen out of the people.'
  '2':
  - type: text
    content: 'For I have said, Mercy shall be built up for ever:'
  - type: text
    content: Thy faithfulness shalt thou establish in the very heavens.
  '20':
  - type: text
    content: I have found David my servant;
  - type: text
    content: 'With my holy oil have I anointed him:'
  '21':
  - type: text
    content: 'With whom my hand shall be established:'
  - type: text
    content: Mine arm also shall strengthen him.
  '22':
  - type: text
    content: The enemy shall not exact upon him;
  - type: text
    content: Nor the son of wickedness afflict him.
  '23':
  - type: text
    content: And I will beat down his foes before his face,
  - type: text
    content: And plague them that hate him.
  '24':
  - type: text
    content: 'But my faithfulness and my mercy '
  - type: text
    content: shall be
  - type: text
    content: ' with him:'
  - type: text
    content: And in my name shall his horn be exalted.
  '25':
  - type: text
    content: I will set his hand also in the sea,
  - type: text
    content: And his right hand in the rivers.
  '26':
  - type: text
    content: 'He shall cry unto me, Thou '
  - type: text
    content: art
  - type: text
    content: ' my father,'
  - type: text
    content: My God, and the rock of my salvation.
  '27':
  - type: text
    content: 'Also I will make him '
  - type: text
    content: my
  - type: text
    content: ' firstborn,'
  - type: text
    content: Higher than the kings of the earth.
  '28':
  - type: text
    content: My mercy will I keep for him for evermore,
  - type: text
    content: And my covenant shall stand fast with him.
  '29':
  - type: text
    content: 'His seed also will I make '
  - type: text
    content: to endure
  - type: text
    content: ' for ever,'
  - type: text
    content: And his throne as the days of heaven.
  '3':
  - type: text
    content: I have made a covenant with my chosen,
  - type: text
    content: I have sworn unto David my servant,
  '30':
  - type: text
    content: If his children forsake my law,
  - type: text
    content: And walk not in my judgments;
  '31':
  - type: text
    content: If they break my statutes, and keep not my commandments;
  '32':
  - type: text
    content: Then will I visit their transgression with the rod, and their iniquity with stripes.
  '33':
  - type: text
    content: Nevertheless my lovingkindness will I not utterly take from him,
  - type: text
    content: Nor suffer my faithfulness to fail.
  '34':
  - type: text
    content: My covenant will I not break, nor alter the thing that is gone out of my lips.
  '35':
  - type: text
    content: Once have I sworn by my holiness that I will not lie unto David.
  '36':
  - type: text
    content: His seed shall endure for ever,
  - type: text
    content: And his throne as the sun before me.
  '37':
  - type: text
    content: It shall be established for ever as the moon,
  - type: text
    content: 'And '
  - type: text
    content: as
  - type: text
    content: ' a faithful witness in heaven. '
  - type: text
    content: Selah.
  '38':
  - type: text
    content: But thou hast cast off and abhorred,
  - type: text
    content: Thou hast been wroth with thine anointed.
  '39':
  - type: text
    content: 'Thou hast made void the covenant of thy servant:'
  - type: text
    content: 'Thou hast profaned his crown '
  - type: text
    content: by casting it
  - type: text
    content: ' to the ground.'
  '4':
  - type: text
    content: Thy seed will I establish for ever,
  - type: text
    content: 'And build up thy throne to all generations. '
  - type: text
    content: Selah.
  '40':
  - type: text
    content: Thou hast broken down all his hedges;
  - type: text
    content: Thou hast brought his strong holds to ruin.
  '41':
  - type: text
    content: 'All that pass by the way spoil him:'
  - type: text
    content: He is a reproach to his neighbours.
  '42':
  - type: text
    content: Thou hast set up the right hand of his adversaries;
  - type: text
    content: Thou hast made all his enemies to rejoice.
  '43':
  - type: text
    content: Thou hast also turned the edge of his sword,
  - type: text
    content: And hast not made him to stand in the battle.
  '44':
  - type: text
    content: Thou hast made his glory to cease,
  - type: text
    content: And cast his throne down to the ground.
  '45':
  - type: text
    content: 'The days of his youth hast thou shortened:'
  - type: text
    content: 'Thou hast covered him with shame. '
  - type: text
    content: Selah.
  '46':
  - type: text
    content: 'How long, '
  - type: text
    content: LORD
  - type: text
    content: '? wilt thou hide thyself for ever?'
  - type: text
    content: Shall thy wrath burn like fire?
  '47':
  - type: text
    content: 'Remember how short my time is:'
  - type: text
    content: Wherefore hast thou made all men in vain?
  '48':
  - type: text
    content: 'What man '
  - type: text
    content: is he that
  - type: text
    content: ' liveth, and shall not see death?'
  - type: text
    content: 'Shall he deliver his soul from the hand of the grave? '
  - type: text
    content: Selah.
  '49':
  - type: text
    content: 'Lord, where '
  - type: text
    content: are
  - type: text
    content: ' thy former lovingkindnesses,'
  - type: text
    content: Which
  - type: text
    content: ' thou swarest unto David in thy truth?'
  '5':
  - type: text
    content: 'And the heavens shall praise thy wonders, O '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: Thy faithfulness also in the congregation of the saints.
  '50':
  - type: text
    content: Remember, Lord, the reproach of thy servants;
  - type: text
    content: How
  - type: text
    content: ' I do bear in my bosom '
  - type: text
    content: the reproach of
  - type: text
    content: ' all the mighty people;'
  '51':
  - type: text
    content: 'Wherewith thine enemies have reproached, O '
  - type: text
    content: LORD
  - type: text
    content: ;
  - type: text
    content: Wherewith they have reproached the footsteps of thine anointed.
  '52':
  - type: text
    content: 'Blessed '
  - type: text
    content: be
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' for evermore.'
  - type: text
    content: Amen, and Amen.
  '6':
  - type: text
    content: For who in the heaven
  - type: text
    content: 'Can be compared unto the '
  - type: text
    content: LORD
  - type: text
    content: '?'
  - type: text
    content: Who
  - type: text
    content: ' among the sons of the mighty'
  - type: text
    content: 'Can be likened unto the '
  - type: text
    content: LORD
  - type: text
    content: '?'
  '7':
  - type: text
    content: God is greatly to be feared in the assembly of the saints,
  - type: text
    content: 'And to be had in reverence of all '
  - type: text
    content: them that are
  - type: text
    content: ' about him.'
  '8':
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ' God of hosts, who '
  - type: text
    content: is
  - type: text
    content: ' a strong '
  - type: text
    content: LORD
  - type: text
    content: ' like unto thee?'
  - type: text
    content: Or to thy faithfulness round about thee?
  '9':
  - type: text
    content: 'Thou rulest the raging of the sea:'
  - type: text
    content: When the waves thereof arise, thou stillest them.
