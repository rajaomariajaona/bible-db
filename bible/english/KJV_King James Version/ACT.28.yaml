verses:
  '1':
  - type: heading
    content: Malta
  - type: text
    content: 'And when they were escaped, then they knew that the island was called Melita. '
  '10':
  - type: text
    content: 'who also honoured us with many honours; and when we departed, they laded '
  - type: text
    content: us
  - type: text
    content: ' with such things as were necessary.'
  '11':
  - type: text
    content: 'And after three months we departed in a ship of Alexandria, which had wintered in the isle, whose sign was Castor and Pollux. '
  '12':
  - type: text
    content: 'And landing at Syracuse, we tarried '
  - type: text
    content: there
  - type: text
    content: ' three days. '
  '13':
  - type: text
    content: 'And from thence we fetched a compass, and came to Rhegium: and after one day the south wind blew, and we came the next day to Puteoli: '
  '14':
  - type: text
    content: 'where we found brethren, and were desired to tarry with them seven days: and so we went toward Rome. '
  '15':
  - type: text
    content: 'And from thence, when the brethren heard of us, they came to meet us as far as Appii forum, and The three taverns: whom when Paul saw, he thanked God, and took courage.'
  - type: heading
    content: Paul in Rome
  '16':
  - type: text
    content: 'And when we came to Rome, the centurion delivered the prisoners to the captain of the guard: but Paul was suffered to dwell by himself with a soldier that kept him. '
  '17':
  - type: text
    content: 'And it came to pass, that after three days Paul called the chief of the Jews together: and when they were come together, he said unto them, Men '
  - type: text
    content: and
  - type: text
    content: ' brethren, though I have committed nothing against the people, or customs of our fathers, yet was I delivered prisoner from Jerusalem into the hands of the Romans. '
  '18':
  - type: text
    content: 'Who, when they had examined me, would have let '
  - type: text
    content: me
  - type: text
    content: ' go, because there was no cause of death in me. '
  '19':
  - type: text
    content: 'But when the Jews spake against '
  - type: text
    content: it
  - type: text
    content: ', I was constrained to appeal unto Cæsar; not that I had ought to accuse my nation of. '
  '2':
  - type: text
    content: 'And the barbarous people shewed us no little kindness: for they kindled a fire, and received us every one, because of the present rain, and because of the cold.'
  '20':
  - type: text
    content: 'For this cause therefore have I called for you, to see '
  - type: text
    content: you
  - type: text
    content: ', and to speak with '
  - type: text
    content: you
  - type: text
    content: ': because that for the hope of Israel I am bound with this chain. '
  '21':
  - type: text
    content: 'And they said unto him, We neither received letters out of Judæa concerning thee, neither any of the brethren that came shewed or spake any harm of thee. '
  '22':
  - type: text
    content: 'But we desire to hear of thee what thou thinkest: for as concerning this sect, we know that every where it is spoken against.'
  '23':
  - type: text
    content: 'And when they had appointed him a day, there came many to him into '
  - type: text
    content: his
  - type: text
    content: ' lodging; to whom he expounded and testified the kingdom of God, persuading them concerning Jesus, both out of the law of Moses, and '
  - type: text
    content: out of
  - type: text
    content: ' the prophets, from morning till evening. '
  '24':
  - type: text
    content: 'And some believed the things which were spoken, and some believed not. '
  '25':
  - type: text
    content: 'And when they agreed not among themselves, they departed, after that Paul had spoken one word, Well spake the Holy Ghost by Esaias the prophet unto our fathers, '
  '26':
  - type: text
    content: saying,
  - type: text
    content: Go unto this people, and say,
  - type: text
    content: Hearing ye shall hear, and shall not understand;
  - type: text
    content: 'And seeing ye shall see, and not perceive:'
  '27':
  - type: text
    content: For the heart of this people is waxed gross,
  - type: text
    content: And their ears are dull of hearing,
  - type: text
    content: And their eyes have they closed;
  - type: text
    content: 'Lest they should see with '
  - type: text
    content: their
  - type: text
    content: ' eyes,'
  - type: text
    content: 'And hear with '
  - type: text
    content: their
  - type: text
    content: ' ears,'
  - type: text
    content: 'And understand with '
  - type: text
    content: their
  - type: text
    content: ' heart,'
  - type: text
    content: And should be converted,
  - type: text
    content: And I should heal them.
  '28':
  - type: text
    content: 'Be it known therefore unto you, that the salvation of God is sent unto the Gentiles, and '
  - type: text
    content: that
  - type: text
    content: ' they will hear it. '
  '29':
  - type: text
    content: And when he had said these words, the Jews departed, and had great reasoning among themselves.
  '3':
  - type: text
    content: 'And when Paul had gathered a bundle of sticks, and laid '
  - type: text
    content: them
  - type: text
    content: ' on the fire, there came a viper out of the heat, and fastened on his hand. '
  '30':
  - type: text
    content: 'And Paul dwelt two whole years in his own hired house, and received all that came in unto him, '
  '31':
  - type: text
    content: preaching the kingdom of God, and teaching those things which concern the Lord Jesus Christ, with all confidence, no man forbidding him.
  '4':
  - type: text
    content: 'And when the barbarians saw the '
  - type: text
    content: venomous
  - type: text
    content: ' beast hang on his hand, they said among themselves, No doubt this man is a murderer, whom, though he hath escaped the sea, yet vengeance suffereth not to live. '
  '5':
  - type: text
    content: 'And he shook off the beast into the fire, and felt no harm. '
  '6':
  - type: text
    content: 'Howbeit they looked when he should have swollen, or fallen down dead suddenly: but after they had looked a great while, and saw no harm come to him, they changed their minds, and said that he was a god.'
  '7':
  - type: text
    content: 'In the same quarters were possessions of the chief man of the island, whose name was Publius; who received us, and lodged us three days courteously. '
  '8':
  - type: text
    content: 'And it came to pass, that the father of Publius lay sick of a fever and of a bloody flux: to whom Paul entered in, and prayed, and laid his hands on him, and healed him. '
  '9':
  - type: text
    content: 'So when this was done, others also, which had diseases in the island, came, and were healed: '
