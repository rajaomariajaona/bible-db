document_id: ACT.28,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Malta
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And when they were escaped, then they knew that the island was called Melita. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'who also honoured us with many honours; and when we departed, they laded '
    - type: usfm
      marker: add
      children:
      - type: text
        text: us
    - type: text
      text: ' with such things as were necessary.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And after three months we departed in a ship of Alexandria, which had wintered in the isle, whose sign was Castor and Pollux. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And landing at Syracuse, we tarried '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there
    - type: text
      text: ' three days. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And from thence we fetched a compass, and came to Rhegium: and after one day the south wind blew, and we came the next day to Puteoli: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'where we found brethren, and were desired to tarry with them seven days: and so we went toward Rome. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And from thence, when the brethren heard of us, they came to meet us as far as Appii forum, and The three taverns: whom when Paul saw, he thanked God, and took courage.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Paul in Rome
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And when we came to Rome, the centurion delivered the prisoners to the captain of the guard: but Paul was suffered to dwell by himself with a soldier that kept him. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And it came to pass, that after three days Paul called the chief of the Jews together: and when they were come together, he said unto them, Men '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' brethren, though I have committed nothing against the people, or customs of our fathers, yet was I delivered prisoner from Jerusalem into the hands of the Romans. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Who, when they had examined me, would have let '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ' go, because there was no cause of death in me. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'But when the Jews spake against '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', I was constrained to appeal unto Cæsar; not that I had ought to accuse my nation of. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And the barbarous people shewed us no little kindness: for they kindled a fire, and received us every one, because of the present rain, and because of the cold.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'For this cause therefore have I called for you, to see '
    - type: usfm
      marker: add
      children:
      - type: text
        text: you
    - type: text
      text: ', and to speak with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: you
    - type: text
      text: ': because that for the hope of Israel I am bound with this chain. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And they said unto him, We neither received letters out of Judæa concerning thee, neither any of the brethren that came shewed or spake any harm of thee. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'But we desire to hear of thee what thou thinkest: for as concerning this sect, we know that every where it is spoken against.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And when they had appointed him a day, there came many to him into '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' lodging; to whom he expounded and testified the kingdom of God, persuading them concerning Jesus, both out of the law of Moses, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: out of
    - type: text
      text: ' the prophets, from morning till evening. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And some believed the things which were spoken, and some believed not. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And when they agreed not among themselves, they departed, after that Paul had spoken one word, Well spake the Holy Ghost by Esaias the prophet unto our fathers, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go unto this people, and say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hearing ye shall hear, and shall not understand;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And seeing ye shall see, and not perceive:'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: For the heart of this people is waxed gross,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their ears are dull of hearing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their eyes have they closed;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lest they should see with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' eyes,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And hear with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' ears,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And understand with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' heart,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And should be converted,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I should heal them.
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Be it known therefore unto you, that the salvation of God is sent unto the Gentiles, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' they will hear it. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: And when he had said these words, the Jews departed, and had great reasoning among themselves.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And when Paul had gathered a bundle of sticks, and laid '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' on the fire, there came a viper out of the heat, and fastened on his hand. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And Paul dwelt two whole years in his own hired house, and received all that came in unto him, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: preaching the kingdom of God, and teaching those things which concern the Lord Jesus Christ, with all confidence, no man forbidding him.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And when the barbarians saw the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: venomous
    - type: text
      text: ' beast hang on his hand, they said among themselves, No doubt this man is a murderer, whom, though he hath escaped the sea, yet vengeance suffereth not to live. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And he shook off the beast into the fire, and felt no harm. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Howbeit they looked when he should have swollen, or fallen down dead suddenly: but after they had looked a great while, and saw no harm come to him, they changed their minds, and said that he was a god.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'In the same quarters were possessions of the chief man of the island, whose name was Publius; who received us, and lodged us three days courteously. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And it came to pass, that the father of Publius lay sick of a fever and of a bloody flux: to whom Paul entered in, and prayed, and laid his hands on him, and healed him. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'So when this was done, others also, which had diseases in the island, came, and were healed: '
