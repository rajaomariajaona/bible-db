verses:
  '1':
  - type: heading
    content: Ananias and Sapphira
  - type: text
    content: 'But a certain man named Ananias, with Sapphira his wife, sold a possession, '
  '10':
  - type: text
    content: 'Then fell she down straightway at his feet, and yielded up the ghost: and the young men came in, and found her dead, and, carrying '
  - type: text
    content: her
  - type: text
    content: ' forth, buried '
  - type: text
    content: her
  - type: text
    content: ' by her husband. '
  '11':
  - type: text
    content: And great fear came upon all the church, and upon as many as heard these things.
  '12':
  - type: text
    content: 'And by the hands of the apostles were many signs and wonders wrought among the people; (and they were all with one accord in Solomon''s porch. '
  '13':
  - type: text
    content: 'And of the rest durst no man join himself to them: but the people magnified them. '
  '14':
  - type: text
    content: 'And believers were the more added to the Lord, multitudes both of men and women.) '
  '15':
  - type: text
    content: 'Insomuch that they brought forth the sick into the streets, and laid '
  - type: text
    content: them
  - type: text
    content: ' on beds and couches, that at the least the shadow of Peter passing by might overshadow some of them. '
  '16':
  - type: text
    content: 'There came also a multitude '
  - type: text
    content: out
  - type: text
    content: ' of the cities round about unto Jerusalem, bringing sick folks, and them which were vexed with unclean spirits: and they were healed every one.'
  - type: heading
    content: The Apostles Imprisoned
  '17':
  - type: text
    content: 'Then the high priest rose up, and all they that were with him, (which is the sect of the Sadducees,) and were filled with indignation, '
  '18':
  - type: text
    content: 'and laid their hands on the apostles, and put them in the common prison. '
  '19':
  - type: text
    content: 'But the angel of the Lord by night opened the prison doors, and brought them forth, and said, '
  '2':
  - type: text
    content: 'and kept back '
  - type: text
    content: part
  - type: text
    content: ' of the price, his wife also being privy '
  - type: text
    content: to it
  - type: text
    content: ', and brought a certain part, and laid '
  - type: text
    content: it
  - type: text
    content: ' at the apostles'' feet. '
  '20':
  - type: text
    content: 'Go, stand and speak in the temple to the people all the words of this life. '
  '21':
  - type: text
    content: 'And when they heard '
  - type: text
    content: that
  - type: text
    content: ', they entered into the temple early in the morning, and taught. But the high priest came, and they that were with him, and called the council together, and all the senate of the children of Israel, and sent to the prison to have them brought. '
  '22':
  - type: text
    content: 'But when the officers came, and found them not in the prison, they returned, and told, '
  '23':
  - type: text
    content: 'saying, The prison truly found we shut with all safety, and the keepers standing without before the doors: but when we had opened, we found no man within. '
  '24':
  - type: text
    content: Now when the high priest and the captain of the temple and the chief priests heard these things, they doubted of them whereunto this would grow.
  '25':
  - type: text
    content: 'Then came one and told them, saying, Behold, the men whom ye put in prison are standing in the temple, and teaching the people. '
  '26':
  - type: text
    content: 'Then went the captain with the officers, and brought them without violence: for they feared the people, lest they should have been stoned. '
  '27':
  - type: text
    content: 'And when they had brought them, they set '
  - type: text
    content: them
  - type: text
    content: ' before the council: and the high priest asked them, '
  '28':
  - type: text
    content: saying, Did not we straitly command you that ye should not teach in this name? and, behold, ye have filled Jerusalem with your doctrine, and intend to bring this man's blood upon us.
  '29':
  - type: text
    content: 'Then Peter and the '
  - type: text
    content: other
  - type: text
    content: ' apostles answered and said, We ought to obey God rather than men. '
  '3':
  - type: text
    content: 'But Peter said, Ananias, why hath Satan filled thine heart to lie to the Holy Ghost, and to keep back '
  - type: text
    content: part
  - type: text
    content: ' of the price of the land? '
  '30':
  - type: text
    content: 'The God of our fathers raised up Jesus, whom ye slew and hanged on a tree. '
  '31':
  - type: text
    content: 'Him hath God exalted with his right hand '
  - type: text
    content: to be
  - type: text
    content: ' a Prince and a Saviour, for to give repentance to Israel, and forgiveness of sins. '
  '32':
  - type: text
    content: 'And we are his witnesses of these things; and '
  - type: text
    content: so is
  - type: text
    content: ' also the Holy Ghost, whom God hath given to them that obey him. '
  '33':
  - type: text
    content: 'When they heard '
  - type: text
    content: that
  - type: text
    content: ', they were cut '
  - type: text
    content: to the heart
  - type: text
    content: ', and took counsel to slay them.'
  - type: heading
    content: Gamaliel's Speech
  '34':
  - type: text
    content: 'Then stood there up one in the council, a Pharisee, named Gamaliel, a doctor of the law, had in reputation among all the people, and commanded to put the apostles forth a little space; '
  '35':
  - type: text
    content: 'and said unto them, Ye men of Israel, take heed to yourselves what ye intend to do as touching these men. '
  '36':
  - type: text
    content: 'For before these days rose up Theudas, boasting himself to be somebody; to whom a number of men, about four hundred, joined themselves: who was slain; and all, as many as obeyed him, were scattered, and brought to nought. '
  '37':
  - type: text
    content: 'After this man rose up Judas of Galilee in the days of the taxing, and drew away much people after him: he also perished; and all, '
  - type: text
    content: even
  - type: text
    content: ' as many as obeyed him, were dispersed. '
  '38':
  - type: text
    content: 'And now I say unto you, Refrain from these men, and let them alone: for if this counsel or this work be of men, it will come to nought: '
  '39':
  - type: text
    content: 'but if it be of God, ye cannot overthrow it; lest haply ye be found even to fight against God. '
  '4':
  - type: text
    content: 'Whiles it remained, was it not thine own? and after it was sold, was it not in thine own power? why hast thou conceived this thing in thine heart? thou hast not lied unto men, but unto God. '
  '40':
  - type: text
    content: 'And to him they agreed: and when they had called the apostles, and beaten '
  - type: text
    content: them
  - type: text
    content: ', they commanded that they should not speak in the name of Jesus, and let them go.'
  '41':
  - type: text
    content: 'And they departed from the presence of the council, rejoicing that they were counted worthy to suffer shame for his name. '
  '42':
  - type: text
    content: And daily in the temple, and in every house, they ceased not to teach and preach Jesus Christ.
  '5':
  - type: text
    content: 'And Ananias hearing these words fell down, and gave up the ghost: and great fear came on all them that heard these things. '
  '6':
  - type: text
    content: 'And the young men arose, wound him up, and carried '
  - type: text
    content: him
  - type: text
    content: ' out, and buried '
  - type: text
    content: him
  - type: text
    content: .
  '7':
  - type: text
    content: 'And it was about the space of three hours after, when his wife, not knowing what was done, came in. '
  '8':
  - type: text
    content: 'And Peter answered unto her, Tell me whether ye sold the land for so much? And she said, Yea, for so much. '
  '9':
  - type: text
    content: 'Then Peter said unto her, How is it that ye have agreed together to tempt the Spirit of the Lord? behold, the feet of them which have buried thy husband '
  - type: text
    content: are
  - type: text
    content: ' at the door, and shall carry thee out. '
