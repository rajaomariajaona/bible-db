document_id: ACT.5
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ananias and Sapphira
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But a certain man named Ananias, with Sapphira his wife, sold a possession, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and kept back '
  - type: usfm
    marker: add
    children:
    - type: text
      text: part
  - type: text
    text: ' of the price, his wife also being privy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to it
  - type: text
    text: ', and brought a certain part, and laid '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' at the apostles'' feet. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But Peter said, Ananias, why hath Satan filled thine heart to lie to the Holy Ghost, and to keep back '
  - type: usfm
    marker: add
    children:
    - type: text
      text: part
  - type: text
    text: ' of the price of the land? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Whiles it remained, was it not thine own? and after it was sold, was it not in thine own power? why hast thou conceived this thing in thine heart? thou hast not lied unto men, but unto God. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And Ananias hearing these words fell down, and gave up the ghost: and great fear came on all them that heard these things. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the young men arose, wound him up, and carried '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' out, and buried '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And it was about the space of three hours after, when his wife, not knowing what was done, came in. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Peter answered unto her, Tell me whether ye sold the land for so much? And she said, Yea, for so much. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then Peter said unto her, How is it that ye have agreed together to tempt the Spirit of the Lord? behold, the feet of them which have buried thy husband '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' at the door, and shall carry thee out. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then fell she down straightway at his feet, and yielded up the ghost: and the young men came in, and found her dead, and, carrying '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her
  - type: text
    text: ' forth, buried '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her
  - type: text
    text: ' by her husband. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And great fear came upon all the church, and upon as many as heard these things.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And by the hands of the apostles were many signs and wonders wrought among the people; (and they were all with one accord in Solomon''s porch. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And of the rest durst no man join himself to them: but the people magnified them. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And believers were the more added to the Lord, multitudes both of men and women.) '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Insomuch that they brought forth the sick into the streets, and laid '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' on beds and couches, that at the least the shadow of Peter passing by might overshadow some of them. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'There came also a multitude '
  - type: usfm
    marker: add
    children:
    - type: text
      text: out
  - type: text
    text: ' of the cities round about unto Jerusalem, bringing sick folks, and them which were vexed with unclean spirits: and they were healed every one.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Apostles Imprisoned
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then the high priest rose up, and all they that were with him, (which is the sect of the Sadducees,) and were filled with indignation, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and laid their hands on the apostles, and put them in the common prison. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But the angel of the Lord by night opened the prison doors, and brought them forth, and said, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Go, stand and speak in the temple to the people all the words of this life. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And when they heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ', they entered into the temple early in the morning, and taught. But the high priest came, and they that were with him, and called the council together, and all the senate of the children of Israel, and sent to the prison to have them brought. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But when the officers came, and found them not in the prison, they returned, and told, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'saying, The prison truly found we shut with all safety, and the keepers standing without before the doors: but when we had opened, we found no man within. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Now when the high priest and the captain of the temple and the chief priests heard these things, they doubted of them whereunto this would grow.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then came one and told them, saying, Behold, the men whom ye put in prison are standing in the temple, and teaching the people. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then went the captain with the officers, and brought them without violence: for they feared the people, lest they should have been stoned. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And when they had brought them, they set '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' before the council: and the high priest asked them, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: saying, Did not we straitly command you that ye should not teach in this name? and, behold, ye have filled Jerusalem with your doctrine, and intend to bring this man's blood upon us.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then Peter and the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: other
  - type: text
    text: ' apostles answered and said, We ought to obey God rather than men. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The God of our fathers raised up Jesus, whom ye slew and hanged on a tree. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Him hath God exalted with his right hand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' a Prince and a Saviour, for to give repentance to Israel, and forgiveness of sins. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And we are his witnesses of these things; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so is
  - type: text
    text: ' also the Holy Ghost, whom God hath given to them that obey him. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'When they heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ', they were cut '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to the heart
  - type: text
    text: ', and took counsel to slay them.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Gamaliel's Speech
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Then stood there up one in the council, a Pharisee, named Gamaliel, a doctor of the law, had in reputation among all the people, and commanded to put the apostles forth a little space; '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'and said unto them, Ye men of Israel, take heed to yourselves what ye intend to do as touching these men. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'For before these days rose up Theudas, boasting himself to be somebody; to whom a number of men, about four hundred, joined themselves: who was slain; and all, as many as obeyed him, were scattered, and brought to nought. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'After this man rose up Judas of Galilee in the days of the taxing, and drew away much people after him: he also perished; and all, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' as many as obeyed him, were dispersed. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And now I say unto you, Refrain from these men, and let them alone: for if this counsel or this work be of men, it will come to nought: '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'but if it be of God, ye cannot overthrow it; lest haply ye be found even to fight against God. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And to him they agreed: and when they had called the apostles, and beaten '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ', they commanded that they should not speak in the name of Jesus, and let them go.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And they departed from the presence of the council, rejoicing that they were counted worthy to suffer shame for his name. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: And daily in the temple, and in every house, they ceased not to teach and preach Jesus Christ.
