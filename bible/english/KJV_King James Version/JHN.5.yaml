document_id: JHN.5,1
type_code: eng
verses:
  '1':
  - type: heading
    content: At Another Festival
  - type: text
    content: 'After this there was a feast of the Jews; and Jesus went up to Jerusalem. '
  '10':
  - type: text
    content: 'The Jews therefore said unto him that was cured, It is the sabbath day: it is not lawful for thee to carry '
  - type: text
    content: thy
  - type: text
    content: ' bed. '
  '11':
  - type: text
    content: 'He answered them, He that made me whole, the same said unto me, Take up thy bed, and walk. '
  '12':
  - type: text
    content: 'Then asked they him, What man is that which said unto thee, Take up thy bed, and walk? '
  '13':
  - type: text
    content: 'And he that was healed wist not who it was: for Jesus had conveyed himself away, a multitude being in '
  - type: text
    content: that
  - type: text
    content: ' place. '
  '14':
  - type: text
    content: 'Afterward Jesus findeth him in the temple, and said unto him, '
  - type: text
    content: 'Behold, thou art made whole: sin no more, lest a worse thing come unto thee.'
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'The man departed, and told the Jews that it was Jesus, which had made him whole. '
  '16':
  - type: text
    content: And therefore did the Jews persecute Jesus, and sought to slay him, because he had done these things on the sabbath day.
  '17':
  - type: text
    content: 'But Jesus answered them, '
  - type: text
    content: My Father worketh hitherto, and I work.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Therefore the Jews sought the more to kill him, because he not only had broken the sabbath, but said also that God was his Father, making himself equal with God. '
  '19':
  - type: text
    content: 'Then answered Jesus and said unto them, '
  - type: text
    content: 'Verily, verily, I say unto you, The Son can do nothing of himself, but what he seeth the Father do: for what things soever he doeth, these also doeth the Son likewise.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Now there is at Jerusalem by the sheep '
  - type: text
    content: market
  - type: text
    content: ' a pool, which is called in the Hebrew tongue Bethesda, having five porches. '
  '20':
  - type: text
    content: 'For the Father loveth the Son, and sheweth him all things that himself doeth: and he will shew him greater works than these, that ye may marvel.'
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'For as the Father raiseth up the dead, and quickeneth '
  - type: text
    content: them
  - type: text
    content: ; even so the Son quickeneth whom he will.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'For the Father judgeth no man, but hath committed all judgment unto the Son:'
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'that all '
  - type: text
    content: men
  - type: text
    content: ' should honour the Son, even as they honour the Father. He that honoureth not the Son honoureth not the Father which hath sent him.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: Verily, verily, I say unto you, He that heareth my word, and believeth on him that sent me, hath everlasting life, and shall not come into condemnation; but is passed from death unto life.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Verily, verily, I say unto you, The hour is coming, and now is, when the dead shall hear the voice of the Son of God: and they that hear shall live.'
  - type: text
    content: ' '
  '26':
  - type: text
    content: For as the Father hath life in himself; so hath he given to the Son to have life in himself;
  - type: text
    content: ' '
  '27':
  - type: text
    content: and hath given him authority to execute judgment also, because he is the Son of man.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Marvel not at this: for the hour is coming, in the which all that are in the graves shall hear his voice,'
  - type: text
    content: ' '
  '29':
  - type: text
    content: and shall come forth; they that have done good, unto the resurrection of life; and they that have done evil, unto the resurrection of damnation.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'In these lay a great multitude of impotent folk, of blind, halt, withered, waiting for the moving of the water. '
  '30':
  - type: text
    content: 'I can of mine own self do nothing: as I hear, I judge: and my judgment is just; because I seek not mine own will, but the will of the Father which hath sent me.'
  - type: text
    content: ' '
  '31':
  - type: text
    content: If I bear witness of myself, my witness is not true.
  '32':
  - type: text
    content: ' '
  - type: text
    content: There is another that beareth witness of me; and I know that the witness which he witnesseth of me is true.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Ye sent unto John, and he bare witness unto the truth.
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'But I receive not testimony from man: but these things I say, that ye might be saved.'
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'He was a burning and a shining light: and ye were willing for a season to rejoice in his light.'
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'But I have greater witness than '
  - type: text
    content: that
  - type: text
    content: ' of John: for the works which the Father hath given me to finish, the same works that I do, bear witness of me, that the Father hath sent me.'
  - type: text
    content: ' '
  '37':
  - type: text
    content: And the Father himself, which hath sent me, hath borne witness of me. Ye have neither heard his voice at any time, nor seen his shape.
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'And ye have not his word abiding in you: for whom he hath sent, him ye believe not.'
  '39':
  - type: text
    content: ' '
  - type: text
    content: 'Search the scriptures; for in them ye think ye have eternal life: and they are they which testify of me.'
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'For an angel went down at a certain season into the pool, and troubled the water: whosoever then first after the troubling of the water stepped in was made whole of whatsoever disease he had. '
  '40':
  - type: text
    content: And ye will not come to me, that ye might have life.
  - type: text
    content: ' '
  '41':
  - type: text
    content: I receive not honour from men.
  - type: text
    content: ' '
  '42':
  - type: text
    content: But I know you, that ye have not the love of God in you.
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'I am come in my Father''s name, and ye receive me not: if another shall come in his own name, him ye will receive.'
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'How can ye believe, which receive honour one of another, and seek not the honour that '
  - type: text
    content: cometh
  - type: text
    content: ' from God only?'
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'Do not think that I will accuse you to the Father: there is '
  - type: text
    content: one
  - type: text
    content: ' that accuseth you, '
  - type: text
    content: even
  - type: text
    content: ' Moses, in whom ye trust.'
  - type: text
    content: ' '
  '46':
  - type: text
    content: 'For had ye believed Moses, ye would have believed me: for he wrote of me.'
  - type: text
    content: ' '
  '47':
  - type: text
    content: But if ye believe not his writings, how shall ye believe my words?
  '5':
  - type: text
    content: 'And a certain man was there, which had an infirmity thirty and eight years. '
  '6':
  - type: text
    content: 'When Jesus saw him lie, and knew that he had been now a long time '
  - type: text
    content: in that case
  - type: text
    content: ', he saith unto him, '
  - type: text
    content: Wilt thou be made whole?
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'The impotent man answered him, Sir, I have no man, when the water is troubled, to put me into the pool: but while I am coming, another steppeth down before me. '
  '8':
  - type: text
    content: 'Jesus saith unto him, '
  - type: text
    content: Rise, take up thy bed, and walk.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'And immediately the man was made whole, and took up his bed, and walked: and on the same day was the sabbath.'
