  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came unto me again, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Also, thou son of man, appoint thee two ways, that the sword of the king of Babylon may come: both twain shall come forth out of one land: and choose thou a place, choose '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' at the head of the way to the city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Appoint a way, that the sword may come to Rabbath of the Ammonites, and to Judah in Jerusalem the defenced. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For the king of Babylon stood at the parting of the way, at the head of the two ways, to use divination: he made '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' arrows bright, he consulted with images, he looked in the liver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'At his right hand was the divination for Jerusalem, to appoint captains, to open the mouth in the slaughter, to lift up the voice with shouting, to appoint '
  - type: usfm
    marker: add
    children:
    - type: text
      text: battering
  - type: text
    text: ' rams against the gates, to cast a mount, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' to build a fort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And it shall be unto them as a false divination in their sight, to them that have sworn oaths: but he will call to remembrance the iniquity, that they may be taken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Therefore thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; Because ye have made your iniquity to be remembered, in that your transgressions are discovered, so that in all your doings your sins do appear; because, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I say
  - type: text
    text: ', that ye are come to remembrance, ye shall be taken with the hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And thou, profane wicked prince of Israel, whose day is come, when iniquity '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall have
  - type: text
    text: ' an end, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; Remove the diadem, and take off the crown: this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall
  - type: text
    text: ' not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' the same: exalt '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him that is
  - type: text
    text: ' low, and abase '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him that is
  - type: text
    text: ' high. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'I will overturn, overturn, overturn, it: and it shall be no '
  - type: usfm
    marker: add
    children:
    - type: text
      text: more
  - type: text
    text: ', until he come whose right it is; and I will give it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And thou, son of man, prophesy and say, Thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' concerning the Ammonites, and concerning their reproach; even say thou, The sword, the sword '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' drawn: for the slaughter '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' furbished, to consume because of the glittering: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'whiles they see vanity unto thee, whiles they divine a lie unto thee, to bring thee upon the necks of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them that are
  - type: text
    text: ' slain, of the wicked, whose day is come, when their iniquity '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall have
  - type: text
    text: ' an end. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Shall I cause '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to return into his sheath? I will judge thee in the place where thou wast created, in the land of thy nativity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And I will pour out mine indignation upon thee, I will blow against thee in the fire of my wrath, and deliver thee into the hand of brutish men, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' skilful to destroy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Thou shalt be for fuel to the fire; thy blood shall be in the midst of the land; thou shalt be no '
  - type: usfm
    marker: add
    children:
    - type: text
      text: more
  - type: text
    text: ' remembered: for I the '
  - type: usfm
