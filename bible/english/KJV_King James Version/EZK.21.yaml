    - type: text
      text: '1'
  - type: text
    text: 'And the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came unto me, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Son of man, set thy face toward Jerusalem, and drop '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thy word
  - type: text
    text: ' toward the holy places, and prophesy against the land of Israel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and say to the land of Israel, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; Behold, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' against thee, and will draw forth my sword out of his sheath, and will cut off from thee the righteous and the wicked. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Seeing then that I will cut off from thee the righteous and the wicked, therefore shall my sword go forth out of his sheath against all flesh from the south to the north: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'that all flesh may know that I the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' have drawn forth my sword out of his sheath: it shall not return any more. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Sigh therefore, thou son of man, with the breaking of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thy
  - type: text
    text: ' loins; and with bitterness sigh before their eyes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And it shall be, when they say unto thee, Wherefore sighest thou? that thou shalt answer, For the tidings; because it cometh: and every heart shall melt, and all hands shall be feeble, and every spirit shall faint, and all knees shall be weak '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' water: behold, it cometh, and shall be brought to pass, saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Again the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came unto me, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Son of man, prophesy, and say, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; Say, A sword, a sword is sharpened, and also furbished: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'it is sharpened to make a sore slaughter; it is furbished that it may glitter: should we then make mirth? it contemneth the rod of my son, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' every tree. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And he hath given it to be furbished, that it may be handled: this sword is sharpened, and it is furbished, to give it into the hand of the slayer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Cry and howl, son of man: for it shall be upon my people, it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' upon all the princes of Israel: terrors by reason of the sword shall be upon my people: smite therefore upon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thy
  - type: text
    text: ' thigh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Because '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' a trial, and what if '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the sword
  - type: text
    text: ' contemn even the rod? it shall be no '
  - type: usfm
    marker: add
    children:
    - type: text
      text: more
  - type: text
    text: ', saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Thou therefore, son of man, prophesy, and smite '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thine
  - type: text
    text: ' hands together, and let the sword be doubled the third time, the sword of the slain: it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the sword of the great '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men that are
  - type: text
    text: ' slain, which entereth into their privy chambers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I have set the point of the sword against all their gates, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' heart may faint, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' ruins be multiplied: ah! '
