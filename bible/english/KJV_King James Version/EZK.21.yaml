    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' made bright, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' wrapped up for the slaughter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Go thee one way or other, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: either
  - type: text
    text: ' on the right hand, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: or
  - type: text
    text: ' on the left, whithersoever thy face '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' set. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'I will also smite mine hands together, and I will cause my fury to rest: I the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' have said '
  - type: usfm
    marker: add
    children:
    - type: text
