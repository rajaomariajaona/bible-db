verses:
  '1':
  - type: heading
    content: Nicodemus
  - type: text
    content: 'There was a man of the Pharisees, named Nicodemus, a ruler of the Jews: '
  '10':
  - type: text
    content: 'Jesus answered and said unto him, '
  - type: text
    content: Art thou a master of Israel, and knowest not these things?
  - type: text
    content: ' '
  '11':
  - type: text
    content: Verily, verily, I say unto thee, We speak that we do know, and testify that we have seen; and ye receive not our witness.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'If I have told you earthly things, and ye believe not, how shall ye believe, if I tell you '
  - type: text
    content: of
  - type: text
    content: ' heavenly things?'
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'And no man hath ascended up to heaven, but he that came down from heaven, '
  - type: text
    content: even
  - type: text
    content: ' the Son of man which is in heaven.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'And as Moses lifted up the serpent in the wilderness, even so must the Son of man be lifted up:'
  - type: text
    content: ' '
  '15':
  - type: text
    content: that whosoever believeth in him should not perish, but have eternal life.
  - type: text
    content: ' '
  '16':
  - type: text
    content: For God so loved the world, that he gave his only begotten Son, that whosoever believeth in him should not perish, but have everlasting life.
  - type: text
    content: ' '
  '17':
  - type: text
    content: For God sent not his Son into the world to condemn the world; but that the world through him might be saved.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'He that believeth on him is not condemned: but he that believeth not is condemned already, because he hath not believed in the name of the only begotten Son of God.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: And this is the condemnation, that light is come into the world, and men loved darkness rather than light, because their deeds were evil.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'the same came to Jesus by night, and said unto him, Rabbi, we know that thou art a teacher come from God: for no man can do these miracles that thou doest, except God be with him. '
  '20':
  - type: text
    content: For every one that doeth evil hateth the light, neither cometh to the light, lest his deeds should be reproved.
  - type: text
    content: ' '
  '21':
  - type: text
    content: But he that doeth truth cometh to the light, that his deeds may be made manifest, that they are wrought in God.
  - type: heading
    content: John the Baptist
  '22':
  - type: text
    content: 'After these things came Jesus and his disciples into the land of Judæa; and there he tarried with them, and baptized. '
  '23':
  - type: text
    content: 'And John also was baptizing in Ænon near to Salim, because there was much water there: and they came, and were baptized. '
  '24':
  - type: text
    content: For John was not yet cast into prison.
  '25':
  - type: text
    content: 'Then there arose a question between '
  - type: text
    content: some
  - type: text
    content: ' of John''s disciples and the Jews about purifying. '
  '26':
  - type: text
    content: 'And they came unto John, and said unto him, Rabbi, he that was with thee beyond Jordan, to whom thou barest witness, behold, the same baptizeth, and all '
  - type: text
    content: men
  - type: text
    content: ' come to him.'
  '27':
  - type: text
    content: 'John answered and said, A man can receive nothing, except it be given him from heaven. '
  '28':
  - type: text
    content: 'Ye yourselves bear me witness, that I said, I am not the Christ, but that I am sent before him. '
  '29':
  - type: text
    content: 'He that hath the bride is the bridegroom: but the friend of the bridegroom, which standeth and heareth him, rejoiceth greatly because of the bridegroom''s voice: this my joy therefore is fulfilled. '
  '3':
  - type: text
    content: 'Jesus answered and said unto him, '
  - type: text
    content: Verily, verily, I say unto thee, Except a man be born again, he cannot see the kingdom of God.
  '30':
  - type: text
    content: 'He must increase, but I '
  - type: text
    content: must
  - type: text
    content: ' decrease. '
  '31':
  - type: text
    content: 'He that cometh from above is above all: he that is of the earth is earthly, and speaketh of the earth: he that cometh from heaven is above all. '
  '32':
  - type: text
    content: 'And what he hath seen and heard, that he testifieth; and no man receiveth his testimony. '
  '33':
  - type: text
    content: 'He that hath received his testimony hath set to his seal that God is true. '
  '34':
  - type: text
    content: 'For he whom God hath sent speaketh the words of God: for God giveth not the Spirit by measure '
  - type: text
    content: unto him
  - type: text
    content: '. '
  '35':
  - type: text
    content: 'The Father loveth the Son, and hath given all things into his hand. '
  '36':
  - type: text
    content: 'He that believeth on the Son hath everlasting life: and he that believeth not the Son shall not see life; but the wrath of God abideth on him.'
  '4':
  - type: text
    content: 'Nicodemus saith unto him, How can a man be born when he is old? can he enter the second time into his mother''s womb, and be born? '
  '5':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: 'Verily, verily, I say unto thee, Except a man be born of water and '
  - type: text
    content: of
  - type: text
    content: ' the Spirit, he cannot enter into the kingdom of God.'
  - type: text
    content: ' '
  '6':
  - type: text
    content: That which is born of the flesh is flesh; and that which is born of the Spirit is spirit.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Marvel not that I said unto thee, Ye must be born again.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'The wind bloweth where it listeth, and thou hearest the sound thereof, but canst not tell whence it cometh, and whither it goeth: so is every one that is born of the Spirit.'
  '9':
  - type: text
    content: 'Nicodemus answered and said unto him, How can these things be? '
