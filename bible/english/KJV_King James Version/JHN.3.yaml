document_id: JHN.3
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Nicodemus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'There was a man of the Pharisees, named Nicodemus, a ruler of the Jews: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'the same came to Jesus by night, and said unto him, Rabbi, we know that thou art a teacher come from God: for no man can do these miracles that thou doest, except God be with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jesus answered and said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Verily, verily, I say unto thee, Except a man be born again, he cannot see the kingdom of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nicodemus saith unto him, How can a man be born when he is old? can he enter the second time into his mother''s womb, and be born? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Verily, verily, I say unto thee, Except a man be born of water and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' the Spirit, he cannot enter into the kingdom of God.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: That which is born of the flesh is flesh; and that which is born of the Spirit is spirit.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Marvel not that I said unto thee, Ye must be born again.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'The wind bloweth where it listeth, and thou hearest the sound thereof, but canst not tell whence it cometh, and whither it goeth: so is every one that is born of the Spirit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nicodemus answered and said unto him, How can these things be? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jesus answered and said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Art thou a master of Israel, and knowest not these things?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Verily, verily, I say unto thee, We speak that we do know, and testify that we have seen; and ye receive not our witness.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'If I have told you earthly things, and ye believe not, how shall ye believe, if I tell you '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' heavenly things?'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And no man hath ascended up to heaven, but he that came down from heaven, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the Son of man which is in heaven.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And as Moses lifted up the serpent in the wilderness, even so must the Son of man be lifted up:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: that whosoever believeth in him should not perish, but have eternal life.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For God so loved the world, that he gave his only begotten Son, that whosoever believeth in him should not perish, but have everlasting life.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For God sent not his Son into the world to condemn the world; but that the world through him might be saved.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'He that believeth on him is not condemned: but he that believeth not is condemned already, because he hath not believed in the name of the only begotten Son of God.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And this is the condemnation, that light is come into the world, and men loved darkness rather than light, because their deeds were evil.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For every one that doeth evil hateth the light, neither cometh to the light, lest his deeds should be reproved.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But he that doeth truth cometh to the light, that his deeds may be made manifest, that they are wrought in God.
- type: usfm
  marker: s2
  children:
  - type: text
    text: John the Baptist
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'After these things came Jesus and his disciples into the land of Judæa; and there he tarried with them, and baptized. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And John also was baptizing in Ænon near to Salim, because there was much water there: and they came, and were baptized. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: For John was not yet cast into prison.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then there arose a question between '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' of John''s disciples and the Jews about purifying. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And they came unto John, and said unto him, Rabbi, he that was with thee beyond Jordan, to whom thou barest witness, behold, the same baptizeth, and all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' come to him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'John answered and said, A man can receive nothing, except it be given him from heaven. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ye yourselves bear me witness, that I said, I am not the Christ, but that I am sent before him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'He that hath the bride is the bridegroom: but the friend of the bridegroom, which standeth and heareth him, rejoiceth greatly because of the bridegroom''s voice: this my joy therefore is fulfilled. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'He must increase, but I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: must
  - type: text
    text: ' decrease. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'He that cometh from above is above all: he that is of the earth is earthly, and speaketh of the earth: he that cometh from heaven is above all. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And what he hath seen and heard, that he testifieth; and no man receiveth his testimony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'He that hath received his testimony hath set to his seal that God is true. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'For he whom God hath sent speaketh the words of God: for God giveth not the Spirit by measure '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unto him
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'The Father loveth the Son, and hath given all things into his hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'He that believeth on the Son hath everlasting life: and he that believeth not the Son shall not see life; but the wrath of God abideth on him.'
