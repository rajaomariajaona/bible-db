document_id: 2KI.6
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Borrowed Axe
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the sons of the prophets said unto Elisha, Behold now, the place where we dwell with thee is too strait for us. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Let us go, we pray thee, unto Jordan, and take thence every man a beam, and let us make us a place there, where we may dwell. And he answered, Go ye. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And one said, Be content, I pray thee, and go with thy servants. And he answered, I will go. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So he went with them. And when they came to Jordan, they cut down wood. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But as one was felling a beam, the axe head fell into the water: and he cried, and said, Alas, master! for it was borrowed. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the man of God said, Where fell it? And he shewed him the place. And he cut down a stick, and cast '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' in thither; and the iron did swim. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Therefore said he, Take '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' up to thee. And he put out his hand, and took it.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Elisha and the Syrians
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the king of Syria warred against Israel, and took counsel with his servants, saying, In such and such a place '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' my camp. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the man of God sent unto the king of Israel, saying, Beware that thou pass not such a place; for thither the Syrians are come down. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the king of Israel sent to the place which the man of God told him and warned him of, and saved himself there, not once nor twice. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Therefore the heart of the king of Syria was sore troubled for this thing; and he called his servants, and said unto them, Will ye not shew me which of us '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' for the king of Israel? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And one of his servants said, None, my lord, O king: but Elisha, the prophet that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in Israel, telleth the king of Israel the words that thou speakest in thy bedchamber. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And he said, Go and spy where he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ', that I may send and fetch him. And it was told him, saying, Behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he is
  - type: text
    text: ' in Dothan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Therefore sent he thither horses, and chariots, and a great host: and they came by night, and compassed the city about. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And when the servant of the man of God was risen early, and gone forth, behold, an host compassed the city both with horses and chariots. And his servant said unto him, Alas, my master! how shall we do? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And he answered, Fear not: for they that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' with us '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' more than they that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' with them. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And Elisha prayed, and said, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', I pray thee, open his eyes, that he may see. And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' opened the eyes of the young man; and he saw: and, behold, the mountain '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' full of horses and chariots of fire round about Elisha. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And when they came down to him, Elisha prayed unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and said, Smite this people, I pray thee, with blindness. And he smote them with blindness according to the word of Elisha. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And Elisha said unto them, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not the way, neither '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this the city: follow me, and I will bring you to the man whom ye seek. But he led them to Samaria.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And it came to pass, when they were come into Samaria, that Elisha said, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', open the eyes of these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ', that they may see. And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' opened their eyes, and they saw; and, behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they were
  - type: text
    text: ' in the midst of Samaria. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And the king of Israel said unto Elisha, when he saw them, My father, shall I smite '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them?
  - type: text
    text: ' shall I smite '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And he answered, Thou shalt not smite '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'them:'
  - type: text
    text: ' wouldest thou smite those whom thou hast taken captive with thy sword and with thy bow? set bread and water before them, that they may eat and drink, and go to their master. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And he prepared great provision for them: and when they had eaten and drunk, he sent them away, and they went to their master. So the bands of Syria came no more into the land of Israel.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Siege of Samaria
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And it came to pass after this, that Ben-hadad king of Syria gathered all his host, and went up, and besieged Samaria. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And there was a great famine in Samaria: and, behold, they besieged it, until an ass''s head was '
  - type: usfm
    marker: add
    children:
    - type: text
      text: sold
  - type: text
    text: ' for fourscore '
  - type: usfm
    marker: add
    children:
    - type: text
      text: pieces
  - type: text
    text: ' of silver, and the fourth part of a cab of dove''s dung for five '
  - type: usfm
    marker: add
    children:
    - type: text
      text: pieces
  - type: text
    text: ' of silver. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And as the king of Israel was passing by upon the wall, there cried a woman unto him, saying, Help, my lord, O king. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And he said, If the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' do not help thee, whence shall I help thee? out of the barnfloor, or out of the winepress? '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And the king said unto her, What aileth thee? And she answered, This woman said unto me, Give thy son, that we may eat him to day, and we will eat my son to morrow. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'So we boiled my son, and did eat him: and I said unto her on the next day, Give thy son, that we may eat him: and she hath hid her son. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And it came to pass, when the king heard the words of the woman, that he rent his clothes; and he passed by upon the wall, and the people looked, and, behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he had
  - type: text
    text: ' sackcloth within upon his flesh. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Then he said, God do so and more also to me, if the head of Elisha the son of Shaphat shall stand on him this day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'But Elisha sat in his house, and the elders sat with him; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the king
  - type: text
    text: ' sent a man from before him: but ere the messenger came to him, he said to the elders, See ye how this son of a murderer hath sent to take away mine head? look, when the messenger cometh, shut the door, and hold him fast at the door: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not the sound of his master''s feet behind him? '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And while he yet talked with them, behold, the messenger came down unto him: and he said, Behold, this evil '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; what should I wait for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' any longer?'
