  children:
  - type: text
    text: On Mount Horeb
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Ahab told Jezebel all that Elijah had done, and withal how he had slain all the prophets with the sword. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then Jezebel sent a messenger unto Elijah, saying, So let the gods do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to me
  - type: text
    text: ', and more also, if I make not thy life as the life of one of them by to morrow about this time. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And when he saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ', he arose, and went for his life, and came to Beer-sheba, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: belongeth
  - type: text
    text: ' to Judah, and left his servant there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But he himself went a day''s journey into the wilderness, and came and sat down under a juniper tree: and he requested for himself that he might die; and said, It is enough; now, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', take away my life; for I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' not better than my fathers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And as he lay and slept under a juniper tree, behold, then an angel touched him, and said unto him, Arise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' eat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he looked, and, behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' a cake baken on the coals, and a cruse of water at his head. And he did eat and drink, and laid him down again. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came again the second time, and touched him, and said, Arise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' eat; because the journey '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' too great for thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And he arose, and did eat and drink, and went in the strength of that meat forty days and forty nights unto Horeb the mount of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And he came thither unto a cave, and lodged there; and, behold, the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: came
  - type: text
    text: ' to him, and he said unto him, What doest thou here, Elijah? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And he said, I have been very jealous for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of hosts: for the children of Israel have forsaken thy covenant, thrown down thine altars, and slain thy prophets with the sword; and I, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' I only, am left; and they seek my life, to take it away. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And he said, Go forth, and stand upon the mount before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. And, behold, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' passed by, and a great and strong wind rent the mountains, and brake in pieces the rocks before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' not in the wind: and after the wind an earthquake; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' not in the earthquake: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and after the earthquake a fire; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' not in the fire: and after the fire a still small voice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And it was '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ', when Elijah heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', that he wrapped his face in his mantle, and went out, and stood in the entering in of the cave. And, behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there came
  - type: text
    text: ' a voice unto him, and said, What doest thou here, Elijah? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And he said, I have been very jealous for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of hosts: because the children of Israel have forsaken thy covenant, thrown down thine altars, and slain thy prophets with the sword; and I, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' I only, am left; and they seek my life, to take it away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto him, Go, return on thy way to the wilderness of Damascus: and when thou comest, anoint Hazael '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' king over Syria: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and Jehu the son of Nimshi shalt thou anoint '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' king over Israel: and Elisha the son of Shaphat of Abel-meholah shalt thou anoint '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' prophet in thy room. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And it shall come to pass, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' him that escapeth the sword of Hazael shall Jehu slay: and him that escapeth from the sword of Jehu shall Elisha slay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Yet I have left '
  - type: usfm
    marker: add
    children:
    - type: text
      text: me
  - type: text
    text: ' seven thousand in Israel, all the knees which have not bowed unto Baal, and every mouth which hath not kissed him.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Call of Elisha
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So he departed thence, and found Elisha the son of Shaphat, who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' plowing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' twelve yoke '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of oxen
  - type: text
    text: ' before him, and he with the twelfth: and Elijah passed by him, and cast his mantle upon him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And he left the oxen, and ran after Elijah, and said, Let me, I pray thee, kiss my father and my mother, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' I will follow thee. And he said unto him, Go back again: for what have I done to thee? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: And he returned back from him, and took a yoke of oxen, and slew them, and boiled their flesh with the instruments of the oxen, and gave unto the people, and they did eat. Then he arose, and went after Elijah, and ministered unto him.
