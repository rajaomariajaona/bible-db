document_id: GEN.11,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the whole earth was of one language, and of one speech. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the generations of Shem: Shem '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' an hundred years old, and begat Arphaxad two years after the flood: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Shem lived after he begat Arphaxad five hundred years, and begat sons and daughters. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Arphaxad lived five and thirty years, and begat Salah: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Arphaxad lived after he begat Salah four hundred and three years, and begat sons and daughters. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Salah lived thirty years, and begat Eber: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Salah lived after he begat Eber four hundred and three years, and begat sons and daughters. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Eber lived four and thirty years, and begat Peleg: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Eber lived after he begat Peleg four hundred and thirty years, and begat sons and daughters. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Peleg lived thirty years, and begat Reu: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Peleg lived after he begat Reu two hundred and nine years, and begat sons and daughters. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, as they journeyed from the east, that they found a plain in the land of Shinar; and they dwelt there. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Reu lived two and thirty years, and begat Serug: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Reu lived after he begat Serug two hundred and seven years, and begat sons and daughters. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Serug lived thirty years, and begat Nahor: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Serug lived after he begat Nahor two hundred years, and begat sons and daughters. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Nahor lived nine and twenty years, and begat Terah: '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Nahor lived after he begat Terah an hundred and nineteen years, and begat sons and daughters. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Terah lived seventy years, and begat Abram, Nahor, and Haran.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the generations of Terah: Terah begat Abram, Nahor, and Haran; and Haran begat Lot. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Haran died before his father Terah in the land of his nativity, in Ur of the Chaldees. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Abram and Nahor took them wives: the name of Abram''s wife '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Sarai; and the name of Nahor''s wife, Milcah, the daughter of Haran, the father of Milcah, and the father of Iscah. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said one to another, Go to, let us make brick, and burn them throughly. And they had brick for stone, and slime had they for morter. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Sarai was barren; she '
    - type: usfm
      marker: add
      children:
      - type: text
        text: had
    - type: text
      text: ' no child. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Terah took Abram his son, and Lot the son of Haran his son''s son, and Sarai his daughter in law, his son Abram''s wife; and they went forth with them from Ur of the Chaldees, to go into the land of Canaan; and they came unto Haran, and dwelt there. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the days of Terah were two hundred and five years: and Terah died in Haran.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said, Go to, let us build us a city and a tower, whose top '
    - type: usfm
      marker: add
      children:
      - type: text
        text: may reach
    - type: text
      text: ' unto heaven; and let us make us a name, lest we be scattered abroad upon the face of the whole earth. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came down to see the city and the tower, which the children of men builded. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said, Behold, the people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' one, and they have all one language; and this they begin to do: and now nothing will be restrained from them, which they have imagined to do. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Go to, let us go down, and there confound their language, that they may not understand one another''s speech. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' scattered them abroad from thence upon the face of all the earth: and they left off to build the city. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore is the name of it called Babel; because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' did there confound the language of all the earth: and from thence did the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' scatter them abroad upon the face of all the earth.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ancestors of Abraham
    marker-yv: yv-h
