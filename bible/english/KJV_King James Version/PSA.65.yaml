document_id: PSA.65,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'To the chief Musician, A Psalm '
  - type: text
    content: and
  - type: text
    content: ' Song of David.'
  - type: text
    content: 'Praise waiteth for thee, O God, in Zion:'
  - type: text
    content: And unto thee shall the vow be performed.
  '10':
  - type: text
    content: 'Thou waterest the ridges thereof abundantly: Thou settlest the furrows thereof:'
  - type: text
    content: 'Thou makest it soft with showers: Thou blessest the springing thereof.'
  '11':
  - type: text
    content: Thou crownest the year with thy goodness;
  - type: text
    content: And thy paths drop fatness.
  '12':
  - type: text
    content: 'They drop '
  - type: text
    content: upon
  - type: text
    content: ' the pastures of the wilderness:'
  - type: text
    content: And the little hills rejoice on every side.
  '13':
  - type: text
    content: The pastures are clothed with flocks;
  - type: text
    content: The valleys also are covered over with corn; They shout for joy, they also sing.
  '2':
  - type: text
    content: O thou that hearest prayer,
  - type: text
    content: Unto thee shall all flesh come.
  '3':
  - type: text
    content: 'Iniquities prevail against me:'
  - type: text
    content: As for
  - type: text
    content: ' our transgressions, thou shalt purge them away.'
  '4':
  - type: text
    content: 'Blessed '
  - type: text
    content: is the man whom
  - type: text
    content: ' thou choosest, and causest to approach '
  - type: text
    content: unto thee
  - type: text
    content: ','
  - type: text
    content: That
  - type: text
    content: ' he may dwell in thy courts: We shall be satisfied with the goodness of thy house, '
  - type: text
    content: even
  - type: text
    content: ' of thy holy temple.'
  '5':
  - type: text
    content: ' '
  - type: text
    content: By
  - type: text
    content: ' terrible things in righteousness wilt thou answer us, O God of our salvation;'
  - type: text
    content: Who art
  - type: text
    content: ' the confidence of all the ends of the earth, and of them that are afar off '
  - type: text
    content: upon
  - type: text
    content: ' the sea:'
  '6':
  - type: text
    content: Which by his strength setteth fast the mountains;
  - type: text
    content: Being
  - type: text
    content: ' girded with power:'
  '7':
  - type: text
    content: Which stilleth the noise of the seas,
  - type: text
    content: the noise of their waves, and the tumult of the people.
  '8':
  - type: text
    content: 'They also that dwell in the uttermost parts are afraid at thy tokens:'
  - type: text
    content: Thou makest the outgoings of the morning and evening to rejoice.
  '9':
  - type: text
    content: 'Thou visitest the earth, and waterest it:'
  - type: text
    content: Thou greatly enrichest it
  - type: text
    content: 'With the river of God, '
  - type: text
    content: which
  - type: text
    content: ' is full of water:'
  - type: text
    content: Thou preparest them corn, when thou hast so provided for it.
