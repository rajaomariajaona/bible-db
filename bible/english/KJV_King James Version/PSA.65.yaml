document_id: PSA.65
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'To the chief Musician, A Psalm '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' Song of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Praise waiteth for thee, O God, in Zion:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And unto thee shall the vow be performed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: O thou that hearest prayer,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Unto thee shall all flesh come.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Iniquities prevail against me:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: As for
  - type: text
    text: ' our transgressions, thou shalt purge them away.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is the man whom
  - type: text
    text: ' thou choosest, and causest to approach '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unto thee
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: That
  - type: text
    text: ' he may dwell in thy courts: We shall be satisfied with the goodness of thy house, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' of thy holy temple.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: By
  - type: text
    text: ' terrible things in righteousness wilt thou answer us, O God of our salvation;'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Who art
  - type: text
    text: ' the confidence of all the ends of the earth, and of them that are afar off '
  - type: usfm
    marker: add
    children:
    - type: text
      text: upon
  - type: text
    text: ' the sea:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Which by his strength setteth fast the mountains;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Being
  - type: text
    text: ' girded with power:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Which stilleth the noise of the seas,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the noise of their waves, and the tumult of the people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'They also that dwell in the uttermost parts are afraid at thy tokens:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou makest the outgoings of the morning and evening to rejoice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Thou visitest the earth, and waterest it:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou greatly enrichest it
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'With the river of God, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' is full of water:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou preparest them corn, when thou hast so provided for it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Thou waterest the ridges thereof abundantly: Thou settlest the furrows thereof:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Thou makest it soft with showers: Thou blessest the springing thereof.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Thou crownest the year with thy goodness;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thy paths drop fatness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'They drop '
  - type: usfm
    marker: add
    children:
    - type: text
      text: upon
  - type: text
    text: ' the pastures of the wilderness:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the little hills rejoice on every side.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The pastures are clothed with flocks;
- type: usfm
  marker: q2
  children:
  - type: text
    text: The valleys also are covered over with corn; They shout for joy, they also sing.
