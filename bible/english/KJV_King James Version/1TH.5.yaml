  '3':
  - type: text
    content: 'For when they shall say, Peace and safety; then sudden destruction cometh upon them, as travail upon a woman with child; and they shall not escape. '
  '4':
  - type: text
    content: 'But ye, brethren, are not in darkness, that that day should overtake you as a thief. '
  '5':
  - type: text
    content: 'Ye are all the children of light, and the children of the day: we are not of the night, nor of darkness. '
  '6':
  - type: text
    content: 'Therefore let us not sleep, as '
  - type: text
    content: do
  - type: text
    content: ' others; but let us watch and be sober. '
  '7':
  - type: text
    content: 'For they that sleep, sleep in the night; and they that be drunken are drunken in the night. '
  '8':
  - type: text
    content: 'But let us, who are of the day, be sober, putting on the breastplate of faith and love; and for an helmet, the hope of salvation. '
  '9':
  - type: text
    content: 'For God hath not appointed us to wrath, but to obtain salvation by our Lord Jesus Christ, '
