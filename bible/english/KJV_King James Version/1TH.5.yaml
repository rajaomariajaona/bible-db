document_id: 1TH.5,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But of the times and the seasons, brethren, ye have no need that I write unto you. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'who died for us, that, whether we wake or sleep, we should live together with him. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Wherefore comfort yourselves together, and edify one another, even as also ye do.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Be at Peace
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And we beseech you, brethren, to know them which labour among you, and are over you in the Lord, and admonish you; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and to esteem them very highly in love for their work''s sake. '
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' be at peace among yourselves. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now we exhort you, brethren, warn them that are unruly, comfort the feebleminded, support the weak, be patient toward all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'See that none render evil for evil unto any '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: '; but ever follow that which is good, both among yourselves, and to all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rejoice evermore. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pray without ceasing. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In every thing give thanks: for this is the will of God in Christ Jesus concerning you. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quench not the Spirit. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For yourselves know perfectly that the day of the Lord so cometh as a thief in the night. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Despise not prophesyings. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Prove all things; hold fast that which is good. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abstain from all appearance of evil.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the very God of peace sanctify you wholly; and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: I pray God
    - type: text
      text: ' your whole spirit and soul and body be preserved blameless unto the coming of our Lord Jesus Christ. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Faithful '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' he that calleth you, who also will do '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Brethren, pray for us.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Greet all the brethren with an holy kiss. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I charge you by the Lord that this epistle be read unto all the holy brethren.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The grace of our Lord Jesus Christ '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' with you. Amen.'
  - type: usfm
    marker: iex
    children:
    - type: text
      text: The first epistle unto the Thessalonians was written from Athens.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For when they shall say, Peace and safety; then sudden destruction cometh upon them, as travail upon a woman with child; and they shall not escape. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But ye, brethren, are not in darkness, that that day should overtake you as a thief. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ye are all the children of light, and the children of the day: we are not of the night, nor of darkness. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore let us not sleep, as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: do
    - type: text
      text: ' others; but let us watch and be sober. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For they that sleep, sleep in the night; and they that be drunken are drunken in the night. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But let us, who are of the day, be sober, putting on the breastplate of faith and love; and for an helmet, the hope of salvation. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For God hath not appointed us to wrath, but to obtain salvation by our Lord Jesus Christ, '
