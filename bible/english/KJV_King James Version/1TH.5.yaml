    content: 'Pray without ceasing. '
  '18':
  - type: text
    content: 'In every thing give thanks: for this is the will of God in Christ Jesus concerning you. '
  '19':
  - type: text
    content: 'Quench not the Spirit. '
  '2':
  - type: text
    content: 'For yourselves know perfectly that the day of the Lord so cometh as a thief in the night. '
  '20':
  - type: text
    content: 'Despise not prophesyings. '
  '21':
  - type: text
    content: 'Prove all things; hold fast that which is good. '
  '22':
  - type: text
    content: Abstain from all appearance of evil.
  '23':
