document_id: GEN.18
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' appeared unto him in the plains of Mamre: and he sat in the tent door in the heat of the day; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and he lift up his eyes and looked, and, lo, three men stood by him: and when he saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ', he ran to meet them from the tent door, and bowed himself toward the ground, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and said, My Lord, if now I have found favour in thy sight, pass not away, I pray thee, from thy servant: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'let a little water, I pray you, be fetched, and wash your feet, and rest yourselves under the tree: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and I will fetch a morsel of bread, and comfort ye your hearts; after that ye shall pass on: for therefore are ye come to your servant. And they said, So do, as thou hast said. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Abraham hastened into the tent unto Sarah, and said, Make ready quickly three measures of fine meal, knead '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and make cakes upon the hearth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And Abraham ran unto the herd, and fetcht a calf tender and good, and gave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' unto a young man; and he hasted to dress it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And he took butter, and milk, and the calf which he had dressed, and set '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' before them; and he stood by them under the tree, and they did eat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And they said unto him, Where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Sarah thy wife? And he said, Behold, in the tent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And he said, I will certainly return unto thee according to the time of life; and, lo, Sarah thy wife shall have a son. And Sarah heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' in the tent door, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' behind him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now Abraham and Sarah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' old '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' well stricken in age; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' it ceased to be with Sarah after the manner of women. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Therefore Sarah laughed within herself, saying, After I am waxed old shall I have pleasure, my lord being old also? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Abraham, Wherefore did Sarah laugh, saying, Shall I of a surety bear a child, which am old? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Is any thing too hard for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '? At the time appointed I will return unto thee, according to the time of life, and Sarah shall have a son. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then Sarah denied, saying, I laughed not; for she was afraid. And he said, Nay; but thou didst laugh.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Cities of the Plain
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the men rose up from thence, and looked toward Sodom: and Abraham went with them to bring them on the way. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said, Shall I hide from Abraham that thing which I do; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'seeing that Abraham shall surely become a great and mighty nation, and all the nations of the earth shall be blessed in him? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For I know him, that he will command his children and his household after him, and they shall keep the way of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', to do justice and judgment; that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' may bring upon Abraham that which he hath spoken of him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said, Because the cry of Sodom and Gomorrah is great, and because their sin is very grievous; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'I will go down now, and see whether they have done altogether according to the cry of it, which is come unto me; and if not, I will know. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And the men turned their faces from thence, and went toward Sodom: but Abraham stood yet before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And Abraham drew near, and said, Wilt thou also destroy the righteous with the wicked? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Peradventure there be fifty righteous within the city: wilt thou also destroy and not spare the place for the fifty righteous that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' therein? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'That be far from thee to do after this manner, to slay the righteous with the wicked: and that the righteous should be as the wicked, that be far from thee: Shall not the Judge of all the earth do right? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said, If I find in Sodom fifty righteous within the city, then I will spare all the place for their sakes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And Abraham answered and said, Behold now, I have taken upon me to speak unto the Lord, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am but
  - type: text
    text: ' dust and ashes: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'peradventure there shall lack five of the fifty righteous: wilt thou destroy all the city for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: lack of
  - type: text
    text: ' five? And he said, If I find there forty and five, I will not destroy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And he spake unto him yet again, and said, Peradventure there shall be forty found there. And he said, I will not do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' for forty''s sake. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And he said '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unto him
  - type: text
    text: ', Oh let not the Lord be angry, and I will speak: Peradventure there shall thirty be found there. And he said, I will not do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', if I find thirty there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And he said, Behold now, I have taken upon me to speak unto the Lord: Peradventure there shall be twenty found there. And he said, I will not destroy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' for twenty''s sake. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And he said, Oh let not the Lord be angry, and I will speak yet but this once: Peradventure ten shall be found there. And he said, I will not destroy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' for ten''s sake. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' went his way, as soon as he had left communing with Abraham: and Abraham returned unto his place.'
