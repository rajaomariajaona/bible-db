document_id: 1CO.8,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Social Questions
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now as touching things offered unto idols, we know that we all have knowledge. Knowledge puffeth up, but charity edifieth. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For if any man see thee which hast knowledge sit at meat in the idol''s temple, shall not the conscience of him which is weak be emboldened to eat those things which are offered to idols; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'and through thy knowledge shall the weak brother perish, for whom Christ died? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'But when ye sin so against the brethren, and wound their weak conscience, ye sin against Christ. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Wherefore, if meat make my brother to offend, I will eat no flesh while the world standeth, lest I make my brother to offend.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And if any man think that he knoweth any thing, he knoweth nothing yet as he ought to know. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But if any man love God, the same is known of him. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'As concerning therefore the eating of those things that are offered in sacrifice unto idols, we know that an idol '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' nothing in the world, and that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none other God but one. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For though there be that are called gods, whether in heaven or in earth, (as there be gods many, and lords many,) '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'but to us '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is but
    - type: text
      text: ' one God, the Father, of whom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' all things, and we in him; and one Lord Jesus Christ, by whom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' all things, and we by him. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Howbeit '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' not in every man that knowledge: for some with conscience of the idol unto this hour eat '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' as a thing offered unto an idol; and their conscience being weak is defiled. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But meat commendeth us not to God: for neither, if we eat, are we the better; neither, if we eat not, are we the worse. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But take heed lest by any means this liberty of your''s become a stumblingblock to them that are weak. '
