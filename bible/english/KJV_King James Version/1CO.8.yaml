document_id: 1CO.8,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Social Questions
  - type: text
    content: 'Now as touching things offered unto idols, we know that we all have knowledge. Knowledge puffeth up, but charity edifieth. '
  '10':
  - type: text
    content: 'For if any man see thee which hast knowledge sit at meat in the idol''s temple, shall not the conscience of him which is weak be emboldened to eat those things which are offered to idols; '
  '11':
  - type: text
    content: 'and through thy knowledge shall the weak brother perish, for whom Christ died? '
  '12':
  - type: text
    content: 'But when ye sin so against the brethren, and wound their weak conscience, ye sin against Christ. '
  '13':
  - type: text
    content: Wherefore, if meat make my brother to offend, I will eat no flesh while the world standeth, lest I make my brother to offend.
  '2':
  - type: text
    content: 'And if any man think that he knoweth any thing, he knoweth nothing yet as he ought to know. '
  '3':
  - type: text
    content: 'But if any man love God, the same is known of him. '
  '4':
  - type: text
    content: 'As concerning therefore the eating of those things that are offered in sacrifice unto idols, we know that an idol '
  - type: text
    content: is
  - type: text
    content: ' nothing in the world, and that '
  - type: text
    content: there is
  - type: text
    content: ' none other God but one. '
  '5':
  - type: text
    content: 'For though there be that are called gods, whether in heaven or in earth, (as there be gods many, and lords many,) '
  '6':
  - type: text
    content: 'but to us '
  - type: text
    content: there is but
  - type: text
    content: ' one God, the Father, of whom '
  - type: text
    content: are
  - type: text
    content: ' all things, and we in him; and one Lord Jesus Christ, by whom '
  - type: text
    content: are
  - type: text
    content: ' all things, and we by him. '
  '7':
  - type: text
    content: 'Howbeit '
  - type: text
    content: there is
  - type: text
    content: ' not in every man that knowledge: for some with conscience of the idol unto this hour eat '
  - type: text
    content: it
  - type: text
    content: ' as a thing offered unto an idol; and their conscience being weak is defiled. '
  '8':
  - type: text
    content: 'But meat commendeth us not to God: for neither, if we eat, are we the better; neither, if we eat not, are we the worse. '
  '9':
  - type: text
    content: 'But take heed lest by any means this liberty of your''s become a stumblingblock to them that are weak. '
