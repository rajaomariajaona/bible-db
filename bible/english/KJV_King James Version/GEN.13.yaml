document_id: GEN.13,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Abraham and Lot
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Abram went up out of Egypt, he, and his wife, and all that he had, and Lot with him, into the south. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Lot lifted up his eyes, and beheld all the plain of Jordan, that it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' well watered every where, before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' destroyed Sodom and Gomorrah, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' as the garden of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', like the land of Egypt, as thou comest unto Zoar. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Lot chose him all the plain of Jordan; and Lot journeyed east: and they separated themselves the one from the other. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abram dwelled in the land of Canaan, and Lot dwelled in the cities of the plain, and pitched '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' tent toward Sodom. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the men of Sodom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' wicked and sinners before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' exceedingly.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Abram, after that Lot was separated from him, Lift up now thine eyes, and look from the place where thou art northward, and southward, and eastward, and westward: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for all the land which thou seest, to thee will I give it, and to thy seed for ever. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will make thy seed as the dust of the earth: so that if a man can number the dust of the earth, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: then
    - type: text
      text: ' shall thy seed also be numbered. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Arise, walk through the land in the length of it and in the breadth of it; for I will give it unto thee. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Abram removed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' tent, and came and dwelt in the plain of Mamre, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in Hebron, and built there an altar unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Abram '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' very rich in cattle, in silver, and in gold. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he went on his journeys from the south even to Beth-el, unto the place where his tent had been at the beginning, between Beth-el and Hai; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'unto the place of the altar, which he had made there at the first: and there Abram called on the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Lot also, which went with Abram, had flocks, and herds, and tents. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the land was not able to bear them, that they might dwell together: for their substance was great, so that they could not dwell together. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there was a strife between the herdmen of Abram''s cattle and the herdmen of Lot''s cattle: and the Canaanite and the Perizzite dwelled then in the land. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Abram said unto Lot, Let there be no strife, I pray thee, between me and thee, and between my herdmen and thy herdmen; for we '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' brethren. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' not the whole land before thee? separate thyself, I pray thee, from me: if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thou wilt take
    - type: text
      text: ' the left hand, then I will go to the right; or if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thou depart
    - type: text
      text: ' to the right hand, then I will go to the left. '
