    content: 'And Lot also, which went with Abram, had flocks, and herds, and tents. '
  '6':
  - type: text
    content: 'And the land was not able to bear them, that they might dwell together: for their substance was great, so that they could not dwell together. '
  '7':
  - type: text
    content: 'And there was a strife between the herdmen of Abram''s cattle and the herdmen of Lot''s cattle: and the Canaanite and the Perizzite dwelled then in the land. '
  '8':
  - type: text
    content: 'And Abram said unto Lot, Let there be no strife, I pray thee, between me and thee, and between my herdmen and thy herdmen; for we '
  - type: text
