document_id: ACT.15
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Council at Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And certain men which came down from Judæa taught the brethren, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and said
  - type: text
    text: ', Except ye be circumcised after the manner of Moses, ye cannot be saved. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'When therefore Paul and Barnabas had no small dissension and disputation with them, they determined that Paul and Barnabas, and certain other of them, should go up to Jerusalem unto the apostles and elders about this question. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And being brought on their way by the church, they passed through Phenice and Samaria, declaring the conversion of the Gentiles: and they caused great joy unto all the brethren.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And when they were come to Jerusalem, they were received of the church, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' the apostles and elders, and they declared all things that God had done with them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But there rose up certain of the sect of the Pharisees which believed, saying, That it was needful to circumcise them, and to command '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' to keep the law of Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the apostles and elders came together for to consider of this matter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And when there had been much disputing, Peter rose up, and said unto them, Men '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' brethren, ye know how that a good while ago God made choice among us, that the Gentiles by my mouth should hear the word of the gospel, and believe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And God, which knoweth the hearts, bare them witness, giving them the Holy Ghost, even as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he did
  - type: text
    text: ' unto us; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and put no difference between us and them, purifying their hearts by faith. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now therefore why tempt ye God, to put a yoke upon the neck of the disciples, which neither our fathers nor we were able to bear? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But we believe that through the grace of the Lord Jesus Christ we shall be saved, even as they.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then all the multitude kept silence, and gave audience to Barnabas and Paul, declaring what miracles and wonders God had wrought among the Gentiles by them.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Judgement of James
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And after they had held their peace, James answered, saying, Men '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' brethren, hearken unto me: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Simeon hath declared how God at the first did visit the Gentiles, to take out of them a people for his name. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And to this agree the words of the prophets; as it is written,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: After this I will return,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And will build again the tabernacle of David, which is fallen down;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will build again the ruins thereof,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And I will set it up:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: That the residue of men might seek after the Lord,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all the Gentiles, upon whom my name is called,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Saith the Lord, who doeth all these things.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Known unto God are all his works from the beginning of the world.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Wherefore my sentence is, that we trouble not them, which from among the Gentiles are turned to God: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'but that we write unto them, that they abstain from pollutions of idols, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: from
  - type: text
    text: ' fornication, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: from
  - type: text
    text: ' things strangled, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: from
  - type: text
    text: ' blood. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: For Moses of old time hath in every city them that preach him, being read in the synagogues every sabbath day.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Letter to the Churches
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then pleased it the apostles and elders, with the whole church, to send chosen men of their own company to Antioch with Paul and Barnabas; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: namely
  - type: text
    text: ', Judas surnamed Barsabas, and Silas, chief men among the brethren: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'and they wrote '
  - type: usfm
    marker: add
    children:
    - type: text
      text: letters
  - type: text
    text: ' by them after this manner; The apostles and elders and brethren '
  - type: usfm
    marker: add
    children:
    - type: text
      text: send
  - type: text
    text: ' greeting unto the brethren which are of the Gentiles in Antioch and Syria and Cilicia: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'forasmuch as we have heard, that certain which went out from us have troubled you with words, subverting your souls, saying, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Ye must
  - type: text
    text: ' be circumcised, and keep the law: to whom we gave no '
  - type: usfm
    marker: add
    children:
    - type: text
      text: such
  - type: text
    text: ' commandment: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'it seemed good unto us, being assembled with one accord, to send chosen men unto you with our beloved Barnabas and Paul, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'men that have hazarded their lives for the name of our Lord Jesus Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'We have sent therefore Judas and Silas, who shall also tell '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: ' the same things by mouth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'For it seemed good to the Holy Ghost, and to us, to lay upon you no greater burden than these necessary things; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'that ye abstain from meats offered to idols, and from blood, and from things strangled, and from fornication: from which if ye keep yourselves, ye shall do well. Fare ye well.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'So when they were dismissed, they came to Antioch: and when they had gathered the multitude together, they delivered the epistle: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' when they had read, they rejoiced for the consolation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And Judas and Silas, being prophets also themselves, exhorted the brethren with many words, and confirmed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And after they had tarried '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there
  - type: text
    text: ' a space, they were let go in peace from the brethren unto the apostles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Notwithstanding it pleased Silas to abide there still. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Paul also and Barnabas continued in Antioch, teaching and preaching the word of the Lord, with many others also.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Second Missionary Journey
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And some days after Paul said unto Barnabas, Let us go again and visit our brethren in every city where we have preached the word of the Lord, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and see
  - type: text
    text: ' how they do. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And Barnabas determined to take with them John, whose surname was Mark. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'But Paul thought not good to take him with them, who departed from them from Pamphylia, and went not with them to the work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And the contention was so sharp between them, that they departed asunder one from the other: and so Barnabas took Mark, and sailed unto Cyprus; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: and Paul chose Silas, and departed, being recommended by the brethren unto the grace of God.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Churches Revisited
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: And he went through Syria and Cilicia, confirming the churches.
