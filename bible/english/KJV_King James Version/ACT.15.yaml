document_id: ACT.15,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Council at Jerusalem
  - type: text
    content: 'And certain men which came down from Judæa taught the brethren, '
  - type: text
    content: and said
  - type: text
    content: ', Except ye be circumcised after the manner of Moses, ye cannot be saved. '
  '10':
  - type: text
    content: 'Now therefore why tempt ye God, to put a yoke upon the neck of the disciples, which neither our fathers nor we were able to bear? '
  '11':
  - type: text
    content: But we believe that through the grace of the Lord Jesus Christ we shall be saved, even as they.
  '12':
  - type: text
    content: Then all the multitude kept silence, and gave audience to Barnabas and Paul, declaring what miracles and wonders God had wrought among the Gentiles by them.
  - type: heading
    content: Judgement of James
  '13':
  - type: text
    content: 'And after they had held their peace, James answered, saying, Men '
  - type: text
    content: and
  - type: text
    content: ' brethren, hearken unto me: '
  '14':
  - type: text
    content: 'Simeon hath declared how God at the first did visit the Gentiles, to take out of them a people for his name. '
  '15':
  - type: text
    content: And to this agree the words of the prophets; as it is written,
  '16':
  - type: text
    content: After this I will return,
  - type: text
    content: And will build again the tabernacle of David, which is fallen down;
  - type: text
    content: And I will build again the ruins thereof,
  - type: text
    content: 'And I will set it up:'
  '17':
  - type: text
    content: That the residue of men might seek after the Lord,
  - type: text
    content: And all the Gentiles, upon whom my name is called,
  - type: text
    content: Saith the Lord, who doeth all these things.
  '18':
  - type: text
    content: Known unto God are all his works from the beginning of the world.
  '19':
  - type: text
    content: 'Wherefore my sentence is, that we trouble not them, which from among the Gentiles are turned to God: '
  '2':
  - type: text
    content: 'When therefore Paul and Barnabas had no small dissension and disputation with them, they determined that Paul and Barnabas, and certain other of them, should go up to Jerusalem unto the apostles and elders about this question. '
  '20':
  - type: text
    content: 'but that we write unto them, that they abstain from pollutions of idols, and '
  - type: text
    content: from
  - type: text
    content: ' fornication, and '
  - type: text
    content: from
  - type: text
    content: ' things strangled, and '
  - type: text
    content: from
  - type: text
    content: ' blood. '
  '21':
  - type: text
    content: For Moses of old time hath in every city them that preach him, being read in the synagogues every sabbath day.
  - type: heading
    content: Letter to the Churches
  '22':
  - type: text
    content: 'Then pleased it the apostles and elders, with the whole church, to send chosen men of their own company to Antioch with Paul and Barnabas; '
  - type: text
    content: namely
  - type: text
    content: ', Judas surnamed Barsabas, and Silas, chief men among the brethren: '
  '23':
  - type: text
    content: 'and they wrote '
  - type: text
    content: letters
  - type: text
    content: ' by them after this manner; The apostles and elders and brethren '
  - type: text
    content: send
  - type: text
    content: ' greeting unto the brethren which are of the Gentiles in Antioch and Syria and Cilicia: '
  '24':
  - type: text
    content: 'forasmuch as we have heard, that certain which went out from us have troubled you with words, subverting your souls, saying, '
  - type: text
    content: Ye must
  - type: text
    content: ' be circumcised, and keep the law: to whom we gave no '
  - type: text
    content: such
  - type: text
    content: ' commandment: '
  '25':
  - type: text
    content: 'it seemed good unto us, being assembled with one accord, to send chosen men unto you with our beloved Barnabas and Paul, '
  '26':
  - type: text
    content: 'men that have hazarded their lives for the name of our Lord Jesus Christ. '
  '27':
  - type: text
    content: 'We have sent therefore Judas and Silas, who shall also tell '
  - type: text
    content: you
  - type: text
    content: ' the same things by mouth. '
  '28':
  - type: text
    content: 'For it seemed good to the Holy Ghost, and to us, to lay upon you no greater burden than these necessary things; '
  '29':
  - type: text
    content: 'that ye abstain from meats offered to idols, and from blood, and from things strangled, and from fornication: from which if ye keep yourselves, ye shall do well. Fare ye well.'
  '3':
  - type: text
    content: 'And being brought on their way by the church, they passed through Phenice and Samaria, declaring the conversion of the Gentiles: and they caused great joy unto all the brethren.'
  '30':
  - type: text
    content: 'So when they were dismissed, they came to Antioch: and when they had gathered the multitude together, they delivered the epistle: '
  '31':
  - type: text
    content: which
  - type: text
    content: ' when they had read, they rejoiced for the consolation. '
  '32':
  - type: text
    content: 'And Judas and Silas, being prophets also themselves, exhorted the brethren with many words, and confirmed '
  - type: text
    content: them
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'And after they had tarried '
  - type: text
    content: there
  - type: text
    content: ' a space, they were let go in peace from the brethren unto the apostles. '
  '34':
  - type: text
    content: 'Notwithstanding it pleased Silas to abide there still. '
  '35':
  - type: text
    content: Paul also and Barnabas continued in Antioch, teaching and preaching the word of the Lord, with many others also.
  - type: heading
    content: Second Missionary Journey
  '36':
  - type: text
    content: 'And some days after Paul said unto Barnabas, Let us go again and visit our brethren in every city where we have preached the word of the Lord, '
  - type: text
    content: and see
  - type: text
    content: ' how they do. '
  '37':
  - type: text
    content: 'And Barnabas determined to take with them John, whose surname was Mark. '
  '38':
  - type: text
    content: 'But Paul thought not good to take him with them, who departed from them from Pamphylia, and went not with them to the work. '
  '39':
  - type: text
    content: 'And the contention was so sharp between them, that they departed asunder one from the other: and so Barnabas took Mark, and sailed unto Cyprus; '
  '4':
  - type: text
    content: 'And when they were come to Jerusalem, they were received of the church, and '
  - type: text
    content: of
  - type: text
    content: ' the apostles and elders, and they declared all things that God had done with them. '
  '40':
  - type: text
    content: and Paul chose Silas, and departed, being recommended by the brethren unto the grace of God.
  - type: heading
    content: Churches Revisited
  '41':
  - type: text
    content: And he went through Syria and Cilicia, confirming the churches.
  '5':
  - type: text
    content: 'But there rose up certain of the sect of the Pharisees which believed, saying, That it was needful to circumcise them, and to command '
  - type: text
    content: them
  - type: text
    content: ' to keep the law of Moses.'
  '6':
  - type: text
    content: 'And the apostles and elders came together for to consider of this matter. '
  '7':
  - type: text
    content: 'And when there had been much disputing, Peter rose up, and said unto them, Men '
  - type: text
    content: and
  - type: text
    content: ' brethren, ye know how that a good while ago God made choice among us, that the Gentiles by my mouth should hear the word of the gospel, and believe. '
  '8':
  - type: text
    content: 'And God, which knoweth the hearts, bare them witness, giving them the Holy Ghost, even as '
  - type: text
    content: he did
  - type: text
    content: ' unto us; '
  '9':
  - type: text
    content: 'and put no difference between us and them, purifying their hearts by faith. '
