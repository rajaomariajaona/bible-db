document_id: HOS.9
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Days of Recompence
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rejoice not, O Israel, for joy, as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: other
  - type: text
    text: ' people: for thou hast gone a whoring from thy God, thou hast loved a reward upon every cornfloor. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The floor and the winepress shall not feed them, and the new wine shall fail in her. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'They shall not dwell in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s land; but Ephraim shall return to Egypt, and they shall eat unclean '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' in Assyria. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'They shall not offer wine '
  - type: usfm
    marker: add
    children:
    - type: text
      text: offerings
  - type: text
    text: ' to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', neither shall they be pleasing unto him: their sacrifices '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' unto them as the bread of mourners; all that eat thereof shall be polluted: for their bread for their soul shall not come into the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'What will ye do in the solemn day, and in the day of the feast of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For, lo, they are gone because of destruction: Egypt shall gather them up, Memphis shall bury them: the pleasant '
  - type: usfm
    marker: add
    children:
    - type: text
      text: places
  - type: text
    text: ' for their silver, nettles shall possess them: thorns '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' in their tabernacles. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The days of visitation are come, the days of recompence are come; Israel shall know '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'it:'
  - type: text
    text: ' the prophet '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a fool, the spiritual man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' mad, for the multitude of thine iniquity, and the great hatred. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The watchman of Ephraim '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' with my God: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' the prophet '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a snare of a fowler in all his ways, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' hatred in the house of his God. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'They have deeply corrupted '
  - type: usfm
    marker: add
    children:
    - type: text
      text: themselves
  - type: text
    text: ', as in the days of Gibeah: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: therefore
  - type: text
    text: ' he will remember their iniquity, he will visit their sins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I found Israel like grapes in the wilderness; I saw your fathers as the firstripe in the fig tree at her first time: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' they went to Baal-peor, and separated themselves unto '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' shame; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' abominations were according as they loved. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: add
    children:
    - type: text
      text: As for
  - type: text
    text: ' Ephraim, their glory shall fly away like a bird, from the birth, and from the womb, and from the conception. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Though they bring up their children, yet will I bereave them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that there shall
  - type: text
    text: ' not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' a man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'left:'
  - type: text
    text: ' yea, woe also to them when I depart from them! '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ephraim, as I saw Tyrus, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' planted in a pleasant place: but Ephraim shall bring forth his children to the murderer. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Give them, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': what wilt thou give? give them a miscarrying womb and dry breasts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'All their wickedness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in Gilgal: for there I hated them: for the wickedness of their doings I will drive them out of mine house, I will love them no more: all their princes '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' revolters. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ephraim is smitten, their root is dried up, they shall bear no fruit: yea, though they bring forth, yet will I slay '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the beloved '
  - type: usfm
    marker: add
    children:
    - type: text
      text: fruit
  - type: text
    text: ' of their womb. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'My God will cast them away, because they did not hearken unto him: and they shall be wanderers among the nations.'
