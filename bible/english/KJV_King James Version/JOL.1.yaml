  '10':
  - type: text
    content: 'The field is wasted, the land mourneth; for the corn is wasted: the new wine is dried up, the oil languisheth. '
  '11':
  - type: text
    content: 'Be ye ashamed, O ye husbandmen; howl, O ye vinedressers, for the wheat and for the barley; because the harvest of the field is perished. '
  '12':
  - type: text
    content: 'The vine is dried up, and the fig tree languisheth; the pomegranate tree, the palm tree also, and the apple tree, '
  - type: text
    content: even
  - type: text
    content: ' all the trees of the field, are withered: because joy is withered away from the sons of men.'
  - type: heading
    content: The Day of the Lord
  '13':
  - type: text
    content: 'Gird yourselves, and lament, ye priests: howl, ye ministers of the altar: come, lie all night in sackcloth, ye ministers of my God: for the meat offering and the drink offering is withholden from the house of your God. '
  '14':
  - type: text
    content: 'Sanctify ye a fast, call a solemn assembly, gather the elders '
  - type: text
    content: and
  - type: text
