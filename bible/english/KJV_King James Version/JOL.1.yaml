document_id: JOL.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' that came to Joel the son of Pethuel.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The field is wasted, the land mourneth; for the corn is wasted: the new wine is dried up, the oil languisheth. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be ye ashamed, O ye husbandmen; howl, O ye vinedressers, for the wheat and for the barley; because the harvest of the field is perished. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The vine is dried up, and the fig tree languisheth; the pomegranate tree, the palm tree also, and the apple tree, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' all the trees of the field, are withered: because joy is withered away from the sons of men.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Day of the Lord
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gird yourselves, and lament, ye priests: howl, ye ministers of the altar: come, lie all night in sackcloth, ye ministers of my God: for the meat offering and the drink offering is withholden from the house of your God. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sanctify ye a fast, call a solemn assembly, gather the elders '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' all the inhabitants of the land '
    - type: usfm
      marker: add
      children:
      - type: text
        text: into
    - type: text
      text: ' the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God, and cry unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alas for the day! for the day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' at hand, and as a destruction from the Almighty shall it come. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Is not the meat cut off before our eyes, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yea
    - type: text
      text: ', joy and gladness from the house of our God? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The seed is rotten under their clods, the garners are laid desolate, the barns are broken down; for the corn is withered. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'How do the beasts groan! the herds of cattle are perplexed, because they have no pasture; yea, the flocks of sheep are made desolate. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', to thee will I cry: for the fire hath devoured the pastures of the wilderness, and the flame hath burned all the trees of the field. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hear this, ye old men, and give ear, all ye inhabitants of the land. Hath this been in your days, or even in the days of your fathers? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The beasts of the field cry also unto thee: for the rivers of waters are dried up, and the fire hath devoured the pastures of the wilderness.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tell ye your children of it, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: let
    - type: text
      text: ' your children '
    - type: usfm
      marker: add
      children:
      - type: text
        text: tell
    - type: text
      text: ' their children, and their children another generation.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That which the palmerworm hath left hath the locust eaten; and that which the locust hath left hath the cankerworm eaten; and that which the cankerworm hath left hath the caterpiller eaten.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Awake, ye drunkards, and weep; and howl, all ye drinkers of wine, because of the new wine; for it is cut off from your mouth. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For a nation is come up upon my land, strong, and without number, whose teeth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the teeth of a lion, and he hath the cheek teeth of a great lion. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He hath laid my vine waste, and barked my fig tree: he hath made it clean bare, and cast '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' away; the branches thereof are made white.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lament like a virgin girded with sackcloth for the husband of her youth. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The meat offering and the drink offering is cut off from the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; the priests, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '''s ministers, mourn. '
