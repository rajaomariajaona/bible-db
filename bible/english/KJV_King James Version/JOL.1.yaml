  - type: text
    content: is
  - type: text
    content: ' at hand, and as a destruction from the Almighty shall it come. '
  '16':
  - type: text
    content: 'Is not the meat cut off before our eyes, '
  - type: text
    content: yea
  - type: text
    content: ', joy and gladness from the house of our God? '
  '17':
  - type: text
    content: 'The seed is rotten under their clods, the garners are laid desolate, the barns are broken down; for the corn is withered. '
  '18':
  - type: text
    content: 'How do the beasts groan! the herds of cattle are perplexed, because they have no pasture; yea, the flocks of sheep are made desolate. '
  '19':
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ', to thee will I cry: for the fire hath devoured the pastures of the wilderness, and the flame hath burned all the trees of the field. '
  '2':
  - type: text
    content: 'Hear this, ye old men, and give ear, all ye inhabitants of the land. Hath this been in your days, or even in the days of your fathers? '
  '20':
  - type: text
    content: 'The beasts of the field cry also unto thee: for the rivers of waters are dried up, and the fire hath devoured the pastures of the wilderness.'
  '3':
  - type: text
    content: 'Tell ye your children of it, and '
  - type: text
    content: let
  - type: text
    content: ' your children '
  - type: text
    content: tell
  - type: text
    content: ' their children, and their children another generation.'
  '4':
  - type: text
    content: That which the palmerworm hath left hath the locust eaten; and that which the locust hath left hath the cankerworm eaten; and that which the cankerworm hath left hath the caterpiller eaten.
  '5':
  - type: text
    content: 'Awake, ye drunkards, and weep; and howl, all ye drinkers of wine, because of the new wine; for it is cut off from your mouth. '
  '6':
  - type: text
    content: 'For a nation is come up upon my land, strong, and without number, whose teeth '
  - type: text
    content: are
  - type: text
    content: ' the teeth of a lion, and he hath the cheek teeth of a great lion. '
  '7':
  - type: text
    content: 'He hath laid my vine waste, and barked my fig tree: he hath made it clean bare, and cast '
  - type: text
