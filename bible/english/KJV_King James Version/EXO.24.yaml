    content: The Covenant Confirmed
  - type: text
    content: 'And he said unto Moses, Come up unto the '
  - type: text
    content: LORD
  - type: text
    content: ', thou, and Aaron, Nadab, and Abihu, and seventy of the elders of Israel; and worship ye afar off. '
  '10':
  - type: text
    content: 'and they saw the God of Israel: and '
  - type: text
    content: there was
  - type: text
    content: ' under his feet as it were a paved work of a sapphire stone, and as it were the body of heaven in '
  - type: text
    content: his
  - type: text
    content: ' clearness. '
  '11':
  - type: text
    content: 'And upon the nobles of the children of Israel he laid not his hand: also they saw God, and did eat and drink.'
  '12':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Moses, Come up to me into the mount, and be there: and I will give thee tables of stone, and a law, and commandments which I have written; that thou mayest teach them. '
  '13':
  - type: text
    content: 'And Moses rose up, and his minister Joshua: and Moses went up into the mount of God. '
  '14':
  - type: text
    content: 'And he said unto the elders, Tarry ye here for us, until we come again unto you: and, behold, Aaron and Hur '
  - type: text
    content: are
  - type: text
    content: ' with you: if any man have any matters to do, let him come unto them. '
  '15':
  - type: text
    content: 'And Moses went up into the mount, and a cloud covered the mount. '
  '16':
  - type: text
    content: 'And the glory of the '
  - type: text
    content: LORD
  - type: text
    content: ' abode upon mount Sinai, and the cloud covered it six days: and the seventh day he called unto Moses out of the midst of the cloud. '
  '17':
  - type: text
    content: 'And the sight of the glory of the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' like devouring fire on the top of the mount in the eyes of the children of Israel. '
  '18':
  - type: text
    content: 'And Moses went into the midst of the cloud, and gat him up into the mount: and Moses was in the mount forty days and forty nights.'
  '2':
  - type: text
    content: 'And Moses alone shall come near the '
  - type: text
    content: LORD
  - type: text
    content: ': but they shall not come nigh; neither shall the people go up with him.'
  '3':
  - type: text
    content: 'And Moses came and told the people all the words of the '
  - type: text
    content: LORD
  - type: text
    content: ', and all the judgments: and all the people answered with one voice, and said, All the words which the '
  - type: text
    content: LORD
  - type: text
    content: ' hath said will we do. '
  '4':
  - type: text
    content: 'And Moses wrote all the words of the '
  - type: text
    content: LORD
  - type: text
    content: ', and rose up early in the morning, and builded an altar under the hill, and twelve pillars, according to the twelve tribes of Israel. '
  '5':
  - type: text
    content: 'And he sent young men of the children of Israel, which offered burnt offerings, and sacrificed peace offerings of oxen unto the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'And Moses took half of the blood, and put '
  - type: text
    content: it
  - type: text
    content: ' in basons; and half of the blood he sprinkled on the altar. '
  '7':
  - type: text
    content: 'And he took the book of the covenant, and read in the audience of the people: and they said, All that the '
  - type: text
    content: LORD
  - type: text
    content: ' hath said will we do, and be obedient. '
  '8':
  - type: text
    content: 'And Moses took the blood, and sprinkled '
  - type: text
    content: it
  - type: text
    content: ' on the people, and said, Behold the blood of the covenant, which the '
  - type: text
    content: LORD
  - type: text
    content: ' hath made with you concerning all these words.'
  '9':
  - type: text
    content: 'Then went up Moses, and Aaron, Nadab, and Abihu, and seventy of the elders of Israel: '
