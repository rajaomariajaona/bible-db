document_id: ISA.6,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Isaiah's Vision and Call
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In the year that king Uzziah died I saw also the Lord sitting upon a throne, high and lifted up, and his train filled the temple. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Make the heart of this people fat, and make their ears heavy, and shut their eyes; lest they see with their eyes, and hear with their ears, and understand with their heart, and convert, and be healed. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then said I, Lord, how long? And he answered, Until the cities be wasted without inhabitant, and the houses without man, and the land be utterly desolate, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' have removed men far away, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there be
    - type: text
      text: ' a great forsaking in the midst of the land. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But yet in it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' a tenth, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' shall return, and shall be eaten: as a teil tree, and as an oak, whose substance '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in them, when they cast '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'their leaves: so'
    - type: text
      text: ' the holy seed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' the substance thereof.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Above it stood the seraphims: each one had six wings; with twain he covered his face, and with twain he covered his feet, and with twain he did fly. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And one cried unto another, and said, Holy, holy, holy, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts: the whole earth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' full of his glory. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: And the posts of the door moved at the voice of him that cried, and the house was filled with smoke.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then said I, Woe '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' me! for I am undone; because I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' a man of unclean lips, and I dwell in the midst of a people of unclean lips: for mine eyes have seen the King, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then flew one of the seraphims unto me, having a live coal in his hand, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' he had taken with the tongs from off the altar: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'and he laid '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' upon my mouth, and said, Lo, this hath touched thy lips; and thine iniquity is taken away, and thy sin purged. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Also I heard the voice of the Lord, saying, Whom shall I send, and who will go for us? Then said I, Here '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' I; send me.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And he said, Go, and tell this people, Hear ye indeed, but understand not; and see ye indeed, but perceive not. '
