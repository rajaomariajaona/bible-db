document_id: 2KI.12,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jehoash
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the seventh year of Jehu Jehoash began to reign; and forty years reigned he in Jerusalem. And his mother''s name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Zibiah of Beer-sheba. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it was '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ', when they saw that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' much money in the chest, that the king''s scribe and the high priest came up, and they put up in bags, and told the money that was found in the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they gave the money, being told, into the hands of them that did the work, that had the oversight of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': and they laid it out to the carpenters and builders, that wrought upon the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and to masons, and hewers of stone, and to buy timber and hewed stone to repair the breaches of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and for all that was laid out for the house to repair '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Howbeit there were not made for the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' bowls of silver, snuffers, basons, trumpets, any vessels of gold, or vessels of silver, of the money '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that was
    - type: text
      text: ' brought into the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but they gave that to the workmen, and repaired therewith the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover they reckoned not with the men, into whose hand they delivered the money to be bestowed on workmen: for they dealt faithfully. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The trespass money and sin money was not brought into the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': it was the priests''.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Hazael king of Syria went up, and fought against Gath, and took it: and Hazael set his face to go up to Jerusalem. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jehoash king of Judah took all the hallowed things that Jehoshaphat, and Jehoram, and Ahaziah, his fathers, kings of Judah, had dedicated, and his own hallowed things, and all the gold that was found in the treasures of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and in the king''s house, and sent '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to Hazael king of Syria: and he went away from Jerusalem.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the rest of the acts of Joash, and all that he did, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Judah? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jehoash did '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which was
    - type: text
      text: ' right in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' all his days wherein Jehoiada the priest instructed him. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And his servants arose, and made a conspiracy, and slew Joash in the house of Millo, which goeth down to Silla. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For Jozachar the son of Shimeath, and Jehozabad the son of Shomer, his servants, smote him, and he died; and they buried him with his fathers in the city of David: and Amaziah his son reigned in his stead.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the high places were not taken away: the people still sacrificed and burnt incense in the high places.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jehoash said to the priests, All the money of the dedicated things that is brought into the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the money of every one that passeth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the account
    - type: text
      text: ', the money that every man is set at, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' all the money that cometh into any man''s heart to bring into the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'let the priests take '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to them, every man of his acquaintance: and let them repair the breaches of the house, wheresoever any breach shall be found. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But it was '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so, that
    - type: text
      text: ' in the three and twentieth year of king Jehoash the priests had not repaired the breaches of the house. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then king Jehoash called for Jehoiada the priest, and the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: other
    - type: text
      text: ' priests, and said unto them, Why repair ye not the breaches of the house? now therefore receive no '
    - type: usfm
      marker: add
      children:
      - type: text
        text: more
    - type: text
      text: ' money of your acquaintance, but deliver it for the breaches of the house. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the priests consented to receive no '
    - type: usfm
      marker: add
      children:
      - type: text
        text: more
    - type: text
      text: ' money of the people, neither to repair the breaches of the house.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jehoiada the priest took a chest, and bored a hole in the lid of it, and set it beside the altar, on the right side as one cometh into the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': and the priests that kept the door put therein all the money '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that was
    - type: text
      text: ' brought into the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
