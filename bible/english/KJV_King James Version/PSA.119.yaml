document_id: PSA.119,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: qa
    children:
    - type: text
      text: א Aleph
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the undefiled in the way,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Who walk in the law of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'With my whole heart have I sought thee:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O let me not wander from thy commandments.
  '100':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '100'
    - type: text
      text: I understand more than the ancients,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because I keep thy precepts.
  '101':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '101'
    - type: text
      text: I have refrained my feet from every evil way,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That I might keep thy word.
  '102':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '102'
    - type: text
      text: I have not departed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'From thy judgments: For thou hast taught me.'
  '103':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '103'
    - type: text
      text: How sweet are thy words unto my taste!
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Yea, sweeter
    - type: text
      text: ' than honey to my mouth!'
  '104':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '104'
    - type: text
      text: 'Through thy precepts I get understanding:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore I hate every false way.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: נ Nun
    marker-yv: yv-h
  '105':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '105'
    - type: text
      text: 'Thy word '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a lamp unto my feet,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a light unto my path.
  '106':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '106'
    - type: text
      text: 'I have sworn, and I will perform '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That I will keep thy righteous judgments.
  '107':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '107'
    - type: text
      text: 'I am afflicted very much:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Quicken me, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', according unto thy word.'
  '108':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '108'
    - type: text
      text: 'Accept, I beseech thee, the freewill offerings of my mouth, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And teach me thy judgments.
  '109':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '109'
    - type: text
      text: 'My soul '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' continually in my hand:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yet do I not forget thy law.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Thy word have I hid in mine heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That I might not sin against thee.
  '110':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '110'
    - type: text
      text: 'The wicked have laid a snare for me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yet I erred not from thy precepts.
  '111':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '111'
    - type: text
      text: 'Thy testimonies have I taken as an heritage for ever:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the rejoicing of my heart.'
  '112':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '112'
    - type: text
      text: I have inclined mine heart to perform thy statutes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Alway, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even unto
    - type: text
      text: ' the end.'
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ס Samek
    marker-yv: yv-h
  '113':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '113'
    - type: text
      text: 'I hate '
    - type: usfm
      marker: add
      children:
      - type: text
        text: vain
    - type: text
      text: ' thoughts:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But thy law do I love.
  '114':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '114'
    - type: text
      text: 'Thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' my hiding place and my shield:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I hope in thy word.
  '115':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '115'
    - type: text
      text: 'Depart from me, ye evildoers:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For I will keep the commandments of my God.
  '116':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '116'
    - type: text
      text: 'Uphold me according unto thy word, that I may live:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let me not be ashamed of my hope.
  '117':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '117'
    - type: text
      text: 'Hold thou me up, and I shall be safe:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I will have respect unto thy statutes continually.
  '118':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '118'
    - type: text
      text: 'Thou hast trodden down all them that err from thy statutes:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For their deceit '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' falsehood.'
  '119':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '119'
    - type: text
      text: 'Thou puttest away all the wicked of the earth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: like
    - type: text
      text: ' dross:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore I love thy testimonies.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' thou, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ':'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Teach me thy statutes.
  '120':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '120'
    - type: text
      text: My flesh trembleth for fear of thee;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I am afraid of thy judgments.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ע Ain
    marker-yv: yv-h
  '121':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '121'
    - type: text
      text: 'I have done judgment and justice:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Leave me not to mine oppressors.
  '122':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '122'
    - type: text
      text: 'Be surety for thy servant for good:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let not the proud oppress me.
  '123':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '123'
    - type: text
      text: Mine eyes fail for thy salvation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And for the word of thy righteousness.
  '124':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '124'
    - type: text
      text: Deal with thy servant according unto thy mercy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And teach me thy statutes.
  '125':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '125'
    - type: text
      text: 'I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' thy servant; give me understanding,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That I may know thy testimonies.
  '126':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '126'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' time for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'thee, '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: LORD
    - type: text
      text: ', to work:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: For
    - type: text
      text: ' they have made void thy law.'
  '127':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '127'
    - type: text
      text: Therefore I love thy commandments
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Above gold; yea, above fine gold.
  '128':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '128'
    - type: text
      text: 'Therefore I esteem all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thy
    - type: text
      text: ' precepts '
    - type: usfm
      marker: add
      children:
      - type: text
        text: concerning
    - type: text
      text: ' all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things to be
    - type: text
      text: ' right;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' I hate every false way.'
  - type: usfm
    marker: qa
    children:
    - type: text
      text: פ Pe
    marker-yv: yv-h
  '129':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '129'
    - type: text
      text: 'Thy testimonies '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' wonderful:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore doth my soul keep them.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: With my lips have I declared
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All the judgments of thy mouth.
  '130':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '130'
    - type: text
      text: The entrance of thy words giveth light;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It giveth understanding unto the simple.
  '131':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '131'
    - type: text
      text: 'I opened my mouth, and panted:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For I longed for thy commandments.
  '132':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '132'
    - type: text
      text: Look thou upon me, and be merciful unto me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As thou usest to do unto those that love thy name.
  '133':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '133'
    - type: text
      text: 'Order my steps in thy word:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let not any iniquity have dominion over me.
  '134':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '134'
    - type: text
      text: 'Deliver me from the oppression of man:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So will I keep thy precepts.
  '135':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '135'
    - type: text
      text: Make thy face to shine upon thy servant;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And teach me thy statutes.
  '136':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '136'
    - type: text
      text: Rivers of waters run down mine eyes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because they keep not thy law.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: צ Zade
    marker-yv: yv-h
  '137':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '137'
    - type: text
      text: 'Righteous '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' thou, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And upright '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' thy judgments.'
  '138':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '138'
    - type: text
      text: 'Thy testimonies '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' thou hast commanded'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' righteous and very faithful.'
  '139':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '139'
    - type: text
      text: My zeal hath consumed me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because mine enemies have forgotten thy words.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I have rejoiced in the way of thy testimonies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'As '
    - type: usfm
      marker: add
      children:
      - type: text
        text: much as
    - type: text
      text: ' in all riches.'
  '140':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '140'
    - type: text
      text: 'Thy word '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' very pure:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore thy servant loveth it.
  '141':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '141'
    - type: text
      text: 'I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' small and despised:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Yet
    - type: text
      text: ' do not I forget thy precepts.'
  '142':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '142'
    - type: text
      text: 'Thy righteousness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' an everlasting righteousness,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And thy law '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the truth.'
  '143':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '143'
    - type: text
      text: 'Trouble and anguish have taken hold on me:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Yet
    - type: text
      text: ' thy commandments '
    - type: usfm
      marker: add
      children:
