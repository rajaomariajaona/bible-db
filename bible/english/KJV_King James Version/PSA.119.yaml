  - type: text
    content: 'Who walk in the law of the '
  - type: text
    content: LORD
  - type: text
    content: .
  '10':
  - type: text
    content: 'With my whole heart have I sought thee:'
  - type: text
    content: O let me not wander from thy commandments.
  '100':
  - type: text
    content: I understand more than the ancients,
  - type: text
    content: Because I keep thy precepts.
  '101':
  - type: text
    content: I have refrained my feet from every evil way,
  - type: text
    content: That I might keep thy word.
  '102':
  - type: text
    content: I have not departed
  - type: text
    content: 'From thy judgments: For thou hast taught me.'
  '103':
  - type: text
    content: How sweet are thy words unto my taste!
  - type: text
    content: Yea, sweeter
  - type: text
    content: ' than honey to my mouth!'
  '104':
  - type: text
    content: 'Through thy precepts I get understanding:'
  - type: text
    content: Therefore I hate every false way.
  - type: heading
    content: נ Nun
  '105':
  - type: text
    content: 'Thy word '
  - type: text
    content: is
  - type: text
    content: ' a lamp unto my feet,'
  - type: text
    content: And a light unto my path.
  '106':
  - type: text
    content: 'I have sworn, and I will perform '
  - type: text
    content: it
  - type: text
    content: ','
  - type: text
    content: That I will keep thy righteous judgments.
  '107':
  - type: text
    content: 'I am afflicted very much:'
  - type: text
    content: 'Quicken me, O '
  - type: text
    content: LORD
  - type: text
    content: ', according unto thy word.'
  '108':
  - type: text
    content: 'Accept, I beseech thee, the freewill offerings of my mouth, O '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: And teach me thy judgments.
  '109':
  - type: text
    content: 'My soul '
  - type: text
    content: is
  - type: text
    content: ' continually in my hand:'
  - type: text
    content: Yet do I not forget thy law.
  '11':
  - type: text
    content: Thy word have I hid in mine heart,
  - type: text
    content: That I might not sin against thee.
  '110':
  - type: text
    content: 'The wicked have laid a snare for me:'
  - type: text
    content: Yet I erred not from thy precepts.
  '111':
  - type: text
    content: 'Thy testimonies have I taken as an heritage for ever:'
  - type: text
    content: 'For they '
  - type: text
    content: are
  - type: text
    content: ' the rejoicing of my heart.'
  '112':
  - type: text
    content: I have inclined mine heart to perform thy statutes
  - type: text
    content: 'Alway, '
  - type: text
    content: even unto
  - type: text
    content: ' the end.'
  - type: heading
    content: ס Samek
  '113':
  - type: text
    content: 'I hate '
  - type: text
    content: vain
  - type: text
    content: ' thoughts:'
  - type: text
    content: But thy law do I love.
  '114':
  - type: text
    content: 'Thou '
  - type: text
    content: art
  - type: text
    content: ' my hiding place and my shield:'
  - type: text
    content: I hope in thy word.
  '115':
  - type: text
    content: 'Depart from me, ye evildoers:'
  - type: text
    content: For I will keep the commandments of my God.
  '116':
  - type: text
    content: 'Uphold me according unto thy word, that I may live:'
  - type: text
    content: And let me not be ashamed of my hope.
  '117':
  - type: text
    content: 'Hold thou me up, and I shall be safe:'
  - type: text
    content: And I will have respect unto thy statutes continually.
  '118':
  - type: text
    content: 'Thou hast trodden down all them that err from thy statutes:'
  - type: text
    content: 'For their deceit '
  - type: text
    content: is
  - type: text
    content: ' falsehood.'
  '119':
  - type: text
    content: 'Thou puttest away all the wicked of the earth '
  - type: text
    content: like
  - type: text
    content: ' dross:'
  - type: text
    content: Therefore I love thy testimonies.
  '12':
  - type: text
    content: 'Blessed '
  - type: text
    content: art
  - type: text
    content: ' thou, O '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: Teach me thy statutes.
  '120':
  - type: text
    content: My flesh trembleth for fear of thee;
  - type: text
    content: And I am afraid of thy judgments.
  - type: heading
    content: ע Ain
  '121':
  - type: text
    content: 'I have done judgment and justice:'
  - type: text
    content: Leave me not to mine oppressors.
  '122':
  - type: text
    content: 'Be surety for thy servant for good:'
  - type: text
    content: Let not the proud oppress me.
  '123':
  - type: text
    content: Mine eyes fail for thy salvation,
  - type: text
    content: And for the word of thy righteousness.
  '124':
  - type: text
    content: Deal with thy servant according unto thy mercy,
  - type: text
    content: And teach me thy statutes.
  '125':
  - type: text
    content: 'I '
  - type: text
    content: am
  - type: text
    content: ' thy servant; give me understanding,'
  - type: text
    content: That I may know thy testimonies.
  '126':
  - type: text
    content: ' '
  - type: text
    content: It is
  - type: text
    content: ' time for '
  - type: text
    content: 'thee, '
  - type: text
    content: LORD
  - type: text
    content: ', to work:'
  - type: text
    content: For
  - type: text
    content: ' they have made void thy law.'
  '127':
  - type: text
    content: Therefore I love thy commandments
  - type: text
    content: Above gold; yea, above fine gold.
  '128':
  - type: text
    content: 'Therefore I esteem all '
  - type: text
    content: thy
  - type: text
    content: ' precepts '
  - type: text
    content: concerning
  - type: text
    content: ' all '
  - type: text
    content: things to be
  - type: text
    content: ' right;'
  - type: text
    content: And
  - type: text
    content: ' I hate every false way.'
  - type: heading
    content: פ Pe
  '129':
  - type: text
    content: 'Thy testimonies '
  - type: text
    content: are
  - type: text
    content: ' wonderful:'
  - type: text
    content: Therefore doth my soul keep them.
  '13':
  - type: text
    content: With my lips have I declared
  - type: text
    content: All the judgments of thy mouth.
  '130':
  - type: text
    content: The entrance of thy words giveth light;
  - type: text
    content: It giveth understanding unto the simple.
  '131':
  - type: text
    content: 'I opened my mouth, and panted:'
  - type: text
    content: For I longed for thy commandments.
  '132':
  - type: text
    content: Look thou upon me, and be merciful unto me,
  - type: text
    content: As thou usest to do unto those that love thy name.
  '133':
  - type: text
    content: 'Order my steps in thy word:'
  - type: text
    content: And let not any iniquity have dominion over me.
  '134':
  - type: text
    content: 'Deliver me from the oppression of man:'
  - type: text
    content: So will I keep thy precepts.
  '135':
  - type: text
    content: Make thy face to shine upon thy servant;
  - type: text
    content: And teach me thy statutes.
  '136':
  - type: text
    content: Rivers of waters run down mine eyes,
  - type: text
    content: Because they keep not thy law.
  - type: heading
    content: צ Zade
  '137':
  - type: text
    content: 'Righteous '
  - type: text
    content: art
  - type: text
    content: ' thou, O '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: 'And upright '
  - type: text
    content: are
  - type: text
    content: ' thy judgments.'
  '138':
  - type: text
    content: 'Thy testimonies '
  - type: text
    content: that
  - type: text
    content: ' thou hast commanded'
  - type: text
    content: are
  - type: text
    content: ' righteous and very faithful.'
  '139':
  - type: text
    content: My zeal hath consumed me,
  - type: text
    content: Because mine enemies have forgotten thy words.
  '14':
  - type: text
    content: I have rejoiced in the way of thy testimonies,
  - type: text
    content: 'As '
  - type: text
    content: much as
  - type: text
    content: ' in all riches.'
  '140':
  - type: text
    content: 'Thy word '
  - type: text
    content: is
  - type: text
    content: ' very pure:'
  - type: text
    content: Therefore thy servant loveth it.
  '141':
  - type: text
    content: 'I '
  - type: text
    content: am
  - type: text
    content: ' small and despised:'
  - type: text
    content: Yet
  - type: text
    content: ' do not I forget thy precepts.'
  '142':
  - type: text
    content: 'Thy righteousness '
  - type: text
    content: is
  - type: text
    content: ' an everlasting righteousness,'
  - type: text
    content: 'And thy law '
  - type: text
    content: is
  - type: text
    content: ' the truth.'
  '143':
  - type: text
    content: 'Trouble and anguish have taken hold on me:'
  - type: text
    content: Yet
  - type: text
    content: ' thy commandments '
  - type: text
    content: are
  - type: text
    content: ' my delights.'
  '144':
  - type: text
    content: 'The righteousness of thy testimonies '
  - type: text
    content: is
  - type: text
    content: ' everlasting:'
  - type: text
    content: Give me understanding, and I shall live.
  - type: heading
    content: ק Qoph
  '145':
  - type: text
    content: 'I cried with '
  - type: text
    content: my
  - type: text
    content: ' whole heart;'
  - type: text
    content: 'hear me, O '
  - type: text
    content: LORD
  - type: text
    content: ': I will keep thy statutes.'
  '146':
  - type: text
    content: I cried unto thee;
  - type: text
    content: save me, and I shall keep thy testimonies.
  '147':
  - type: text
    content: 'I prevented the dawning of the morning, and cried:'
  - type: text
    content: I hoped in thy word.
  '148':
  - type: text
    content: 'Mine eyes prevent the '
  - type: text
    content: night
  - type: text
    content: ' watches,'
  - type: text
    content: That I might meditate in thy word.
  '149':
  - type: text
    content: 'Hear my voice according unto thy lovingkindness:'
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ', quicken me according to thy judgment.'
  '15':
  - type: text
    content: I will meditate in thy precepts,
  - type: text
    content: And have respect unto thy ways.
  '150':
  - type: text
    content: 'They draw nigh that follow after mischief:'
  - type: text
    content: They are far from thy law.
  '151':
  - type: text
    content: 'Thou '
  - type: text
    content: art
  - type: text
    content: ' near, O '
  - type: text
    content: LORD
  - type: text
    content: ;
  - type: text
    content: 'And all thy commandments '
  - type: text
    content: are
  - type: text
    content: ' truth.'
  '152':
  - type: text
    content: Concerning thy testimonies, I have known of old
  - type: text
    content: That thou hast founded them for ever.
  - type: heading
    content: ר Resh
  '153':
  - type: text
    content: 'Consider mine affliction, and deliver me:'
  - type: text
    content: For I do not forget thy law.
  '154':
  - type: text
    content: 'Plead my cause, and deliver me:'
  - type: text
    content: Quicken me according to thy word.
  '155':
  - type: text
    content: 'Salvation '
  - type: text
    content: is
  - type: text
    content: ' far from the wicked:'
  - type: text
    content: For they seek not thy statutes.
  '156':
  - type: text
    content: 'Great '
  - type: text
    content: are
  - type: text
    content: ' thy tender mercies, O '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: Quicken me according to thy judgments.
  '157':
  - type: text
    content: 'Many '
  - type: text
    content: are
  - type: text
    content: ' my persecutors and mine enemies;'
  - type: text
    content: Yet
  - type: text
    content: ' do I not decline from thy testimonies.'
  '158':
  - type: text
    content: I beheld the transgressors, and was grieved;
  - type: text
    content: Because they kept not thy word.
  '159':
  - type: text
    content: 'Consider how I love thy precepts:'
  - type: text
    content: 'Quicken me, O '
  - type: text
    content: LORD
  - type: text
    content: ', according to thy lovingkindness.'
  '16':
  - type: text
    content: 'I will delight myself in thy statutes:'
  - type: text
    content: I will not forget thy word.
  - type: heading
    content: ג Gimel
  '160':
  - type: text
    content: 'Thy word '
  - type: text
    content: is
  - type: text
    content: ' true '
  - type: text
    content: from
  - type: text
    content: ' the beginning:'
  - type: text
    content: 'And every one of thy righteous judgments '
  - type: text
    content: endureth
  - type: text
    content: ' for ever.'
  - type: heading
    content: ש Shin
  '161':
  - type: text
    content: 'Princes have persecuted me without a cause:'
  - type: text
    content: But my heart standeth in awe of thy word.
  '162':
  - type: text
    content: I rejoice at thy word,
  - type: text
    content: As one that findeth great spoil.
  '163':
  - type: text
    content: 'I hate and abhor lying:'
  - type: text
    content: But
  - type: text
    content: ' thy law do I love.'
  '164':
  - type: text
    content: Seven times a day do I praise thee
  - type: text
    content: Because of thy righteous judgments.
  '165':
  - type: text
    content: 'Great peace have they which love thy law:'
  - type: text
    content: And nothing shall offend them.
  '166':
  - type: text
    content: ' '
  - type: text
    content: LORD
  - type: text
    content: ', I have hoped for thy salvation,'
  - type: text
    content: And done thy commandments.
  '167':
  - type: text
    content: My soul hath kept thy testimonies;
  - type: text
    content: And I love them exceedingly.
  '168':
  - type: text
    content: 'I have kept thy precepts and thy testimonies:'
  - type: text
    content: 'For all my ways '
  - type: text
    content: are
  - type: text
    content: ' before thee.'
  - type: heading
    content: ת Taw
  '169':
  - type: text
    content: 'Let my cry come near before thee, O '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: Give me understanding according to thy word.
  '17':
  - type: text
    content: Deal bountifully with thy servant,
  - type: text
    content: That
  - type: text
    content: ' I may live, and keep thy word.'
  '170':
  - type: text
    content: 'Let my supplication come before thee:'
  - type: text
    content: Deliver me according to thy word.
  '171':
  - type: text
    content: My lips shall utter praise,
  - type: text
    content: When thou hast taught me thy statutes.
  '172':
  - type: text
    content: 'My tongue shall speak of thy word:'
  - type: text
    content: 'For all thy commandments '
  - type: text
    content: are
  - type: text
    content: ' righteousness.'
  '173':
  - type: text
    content: Let thine hand help me;
  - type: text
    content: For I have chosen thy precepts.
  '174':
  - type: text
    content: 'I have longed for thy salvation, O '
  - type: text
    content: LORD
  - type: text
    content: ;
  - type: text
    content: 'And thy law '
  - type: text
    content: is
  - type: text
    content: ' my delight.'
  '175':
  - type: text
    content: Let my soul live, and it shall praise thee;
  - type: text
    content: And let thy judgments help me.
  '176':
  - type: text
    content: I have gone astray like a lost sheep;
  - type: text
    content: seek thy servant; For I do not forget thy commandments.
  '18':
  - type: text
    content: Open thou mine eyes,
  - type: text
    content: That I may behold wondrous things out of thy law.
  '19':
  - type: text
    content: 'I '
  - type: text
    content: am
  - type: text
    content: ' a stranger in the earth:'
  - type: text
    content: Hide not thy commandments from me.
  '2':
  - type: text
    content: 'Blessed '
  - type: text
    content: are
  - type: text
    content: ' they that keep his testimonies,'
  - type: text
    content: And that
  - type: text
    content: ' seek him with the whole heart.'
  '20':
  - type: text
    content: My soul breaketh for the longing
  - type: text
    content: That it hath
  - type: text
    content: ' unto thy judgments at all times.'
  '21':
  - type: text
    content: Thou hast rebuked the proud
  - type: text
    content: That are
  - type: text
    content: ' cursed, which do err from thy commandments.'
  '22':
  - type: text
    content: 'Remove from me reproach and contempt:'
  - type: text
    content: For I have kept thy testimonies.
  '23':
  - type: text
    content: 'Princes also did sit '
  - type: text
    content: and
  - type: text
    content: ' speak against me:'
  - type: text
    content: But
  - type: text
    content: ' thy servant did meditate in thy statutes.'
  '24':
  - type: text
    content: 'Thy testimonies also '
  - type: text
    content: are
  - type: text
    content: 'My delight '
  - type: text
    content: and
  - type: text
    content: ' my counsellors.'
  - type: heading
    content: ד Dalet
  '25':
  - type: text
    content: 'My soul cleaveth unto the dust:'
  - type: text
    content: Quicken thou me according to thy word.
  '26':
  - type: text
    content: 'I have declared my ways, and thou heardest me:'
  - type: text
    content: Teach me thy statutes.
  '27':
  - type: text
    content: 'Make me to understand the way of thy precepts:'
  - type: text
    content: So shall I talk of thy wondrous works.
  '28':
  - type: text
    content: 'My soul melteth for heaviness:'
  - type: text
    content: Strengthen thou me according unto thy word.
  '29':
  - type: text
    content: 'Remove from me the way of lying:'
  - type: text
    content: And grant me thy law graciously.
  '3':
  - type: text
    content: 'They also do no iniquity:'
  - type: text
    content: They walk in his ways.
  '30':
  - type: text
    content: 'I have chosen the way of truth:'
  - type: text
    content: 'Thy judgments have I laid '
  - type: text
    content: before me
  - type: text
    content: .
  '31':
  - type: text
    content: 'I have stuck unto thy testimonies:'
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ', put me not to shame.'
  '32':
  - type: text
    content: I will run the way of thy commandments,
  - type: text
    content: When thou shalt enlarge my heart.
  - type: heading
    content: ה He
  '33':
  - type: text
    content: 'Teach me, O '
  - type: text
    content: LORD
  - type: text
    content: ', the way of thy statutes;'
  - type: text
    content: 'And I shall keep it '
  - type: text
    content: unto
  - type: text
    content: ' the end.'
  '34':
  - type: text
    content: Give me understanding, and I shall keep thy law;
  - type: text
    content: 'Yea, I shall observe it with '
  - type: text
    content: my
  - type: text
    content: ' whole heart.'
  '35':
  - type: text
    content: Make me to go in the path of thy commandments;
  - type: text
    content: For therein do I delight.
  '36':
  - type: text
    content: Incline my heart unto thy testimonies,
  - type: text
    content: And not to covetousness.
  '37':
  - type: text
    content: Turn away mine eyes from beholding vanity;
  - type: text
    content: And
  - type: text
    content: ' quicken thou me in thy way.'
  '38':
  - type: text
    content: Stablish thy word
  - type: text
    content: 'Unto thy servant, who '
  - type: text
    content: is devoted
  - type: text
    content: ' to thy fear.'
  '39':
  - type: text
    content: 'Turn away my reproach which I fear:'
  - type: text
    content: 'For thy judgments '
  - type: text
    content: are
  - type: text
    content: ' good.'
  '4':
  - type: text
    content: 'Thou hast commanded '
  - type: text
    content: us
  - type: text
    content: To keep thy precepts diligently.
  '40':
  - type: text
    content: 'Behold, I have longed after thy precepts:'
  - type: text
    content: Quicken me in thy righteousness.
  - type: heading
    content: ו Waw
  '41':
  - type: text
    content: 'Let thy mercies come also unto me, O '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: Even
  - type: text
    content: ' thy salvation, according to thy word.'
  '42':
  - type: text
    content: 'So shall I have wherewith to answer him that reproacheth me:'
  - type: text
    content: For I trust in thy word.
  '43':
  - type: text
    content: And take not the word of truth utterly out of my mouth;
  - type: text
    content: For I have hoped in thy judgments.
  '44':
  - type: text
    content: So shall I keep
  - type: text
    content: thy law continually for ever and ever.
  '45':
  - type: text
    content: 'And I will walk at liberty:'
  - type: text
    content: For I seek thy precepts.
  '46':
  - type: text
    content: I will speak of thy testimonies also before kings,
  - type: text
    content: And will not be ashamed.
  '47':
  - type: text
    content: And I will delight myself
  - type: text
    content: In thy commandments, which I have loved.
  '48':
  - type: text
    content: My hands also will I lift up unto thy commandments, which I have loved;
  - type: text
    content: And I will meditate in thy statutes.
  - type: heading
    content: ז Zain
  '49':
  - type: text
    content: Remember the word unto thy servant,
  - type: text
    content: Upon which thou hast caused me to hope.
  '5':
  - type: text
    content: O that my ways were directed
  - type: text
    content: To keep thy statutes!
  '50':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
