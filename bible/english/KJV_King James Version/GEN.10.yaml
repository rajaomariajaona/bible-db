document_id: GEN.10
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Noah's Descendants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the generations of the sons of Noah, Shem, Ham, and Japheth: and unto them were sons born after the flood.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The sons of Japheth; Gomer, and Magog, and Madai, and Javan, and Tubal, and Meshech, and Tiras. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And the sons of Gomer; Ashkenaz, and Riphath, and Togarmah. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And the sons of Javan; Elishah, and Tarshish, Kittim, and Dodanim. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: By these were the isles of the Gentiles divided in their lands; every one after his tongue, after their families, in their nations.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the sons of Ham; Cush, and Mizraim, and Phut, and Canaan. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the sons of Cush; Seba, and Havilah, and Sabtah, and Raamah, and Sabtechah: and the sons of Raamah; Sheba, and Dedan. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Cush begat Nimrod: he began to be a mighty one in the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He was a mighty hunter before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': wherefore it is said, Even as Nimrod the mighty hunter before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the beginning of his kingdom was Babel, and Erech, and Accad, and Calneh, in the land of Shinar. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Out of that land went forth Asshur, and builded Nineveh, and the city Rehoboth, and Calah, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and Resen between Nineveh and Calah: the same '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a great city. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Mizraim begat Ludim, and Anamim, and Lehabim, and Naphtuhim, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: and Pathrusim, and Casluhim, (out of whom came Philistim,) and Caphtorim.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Canaan begat Sidon his firstborn, and Heth, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and the Jebusite, and the Amorite, and the Girgasite, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'and the Hivite, and the Arkite, and the Sinite, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and the Arvadite, and the Zemarite, and the Hamathite: and afterward were the families of the Canaanites spread abroad. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And the border of the Canaanites was from Sidon, as thou comest to Gerar, unto Gaza; as thou goest, unto Sodom, and Gomorrah, and Admah, and Zeboim, even unto Lasha. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the sons of Ham, after their families, after their tongues, in their countries, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' in their nations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Unto Shem also, the father of all the children of Eber, the brother of Japheth the elder, even to him were '
  - type: usfm
    marker: add
    children:
    - type: text
      text: children
  - type: text
    text: ' born. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The children of Shem; Elam, and Asshur, and Arphaxad, and Lud, and Aram. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And the children of Aram; Uz, and Hul, and Gether, and Mash. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And Arphaxad begat Salah; and Salah begat Eber. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And unto Eber were born two sons: the name of one '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Peleg; for in his days was the earth divided; and his brother''s name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Joktan. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And Joktan begat Almodad, and Sheleph, and Hazarmaveth, and Jerah, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'and Hadoram, and Uzal, and Diklah, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and Obal, and Abimael, and Sheba, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'and Ophir, and Havilah, and Jobab: all these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' the sons of Joktan. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And their dwelling was from Mesha, as thou goest unto Sephar a mount of the east. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the sons of Shem, after their families, after their tongues, in their lands, after their nations. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the families of the sons of Noah, after their generations, in their nations: and by these were the nations divided in the earth after the flood.'
