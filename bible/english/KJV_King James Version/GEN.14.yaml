verses:
  '1':
  - type: text
    content: 'And it came to pass in the days of Amraphel king of Shinar, Arioch king of Ellasar, Chedorlaomer king of Elam, and Tidal king of nations; '
  '10':
  - type: text
    content: 'And the vale of Siddim '
  - type: text
    content: was full of
  - type: text
    content: ' slimepits; and the kings of Sodom and Gomorrah fled, and fell there; and they that remained fled to the mountain. '
  '11':
  - type: text
    content: 'And they took all the goods of Sodom and Gomorrah, and all their victuals, and went their way. '
  '12':
  - type: text
    content: And they took Lot, Abram's brother's son, who dwelt in Sodom, and his goods, and departed.
  '13':
  - type: text
    content: 'And there came one that had escaped, and told Abram the Hebrew; for he dwelt in the plain of Mamre the Amorite, brother of Eshcol, and brother of Aner: and these '
  - type: text
    content: were
  - type: text
    content: ' confederate with Abram. '
  '14':
  - type: text
    content: 'And when Abram heard that his brother was taken captive, he armed his trained '
  - type: text
    content: servants
  - type: text
    content: ', born in his own house, three hundred and eighteen, and pursued '
  - type: text
    content: them
  - type: text
    content: ' unto Dan. '
  '15':
  - type: text
    content: 'And he divided himself against them, he and his servants, by night, and smote them, and pursued them unto Hobah, which '
  - type: text
    content: is
  - type: text
    content: ' on the left hand of Damascus. '
  '16':
  - type: text
    content: And he brought back all the goods, and also brought again his brother Lot, and his goods, and the women also, and the people.
  '17':
  - type: text
    content: 'And the king of Sodom went out to meet him after his return from the slaughter of Chedorlaomer, and of the kings that '
  - type: text
    content: were
  - type: text
    content: ' with him, at the valley of Shaveh, which '
  - type: text
    content: is
  - type: text
    content: ' the king''s dale. '
  '18':
  - type: text
    content: 'And Melchizedek king of Salem brought forth bread and wine: and he '
  - type: text
    content: was
  - type: text
    content: ' the priest of the most high God. '
  '19':
  - type: text
    content: 'And he blessed him, and said, Blessed be Abram of the most high God, possessor of heaven and earth: '
  '2':
  - type: text
    content: that these
  - type: text
    content: ' made war with Bera king of Sodom, and with Birsha king of Gomorrah, Shinab king of Admah, and Shemeber king of Zeboiim, and the king of Bela, which is Zoar. '
  '20':
  - type: text
    content: 'and blessed be the most high God, which hath delivered thine enemies into thy hand. And he gave him tithes of all. '
  '21':
  - type: text
    content: 'And the king of Sodom said unto Abram, Give me the persons, and take the goods to thyself. '
  '22':
  - type: text
    content: 'And Abram said to the king of Sodom, I have lift up mine hand unto the '
  - type: text
    content: LORD
  - type: text
    content: ', the most high God, the possessor of heaven and earth, '
  '23':
  - type: text
    content: 'that I will not '
  - type: text
    content: take
  - type: text
    content: ' from a thread even to a shoelatchet, and that I will not take any thing that '
  - type: text
    content: is
  - type: text
    content: ' thine, lest thou shouldest say, I have made Abram rich: '
  '24':
  - type: text
    content: save only that which the young men have eaten, and the portion of the men which went with me, Aner, Eshcol, and Mamre; let them take their portion.
  '3':
  - type: text
    content: 'All these were joined together in the vale of Siddim, which is the salt sea. '
  '4':
  - type: text
    content: 'Twelve years they served Chedorlaomer, and in the thirteenth year they rebelled. '
  '5':
  - type: text
    content: 'And in the fourteenth year came Chedorlaomer, and the kings that '
  - type: text
    content: were
  - type: text
    content: ' with him, and smote the Rephaims in Ashteroth Karnaim, and the Zuzims in Ham, and the Emims in Shaveh Kiriathaim, '
  '6':
  - type: text
    content: 'and the Horites in their mount Seir, unto El-paran, which '
  - type: text
    content: is
  - type: text
    content: ' by the wilderness. '
  '7':
  - type: text
    content: 'And they returned, and came to En-mishpat, which '
  - type: text
    content: is
  - type: text
    content: ' Kadesh, and smote all the country of the Amalekites, and also the Amorites, that dwelt in Hazezon-tamar. '
  '8':
  - type: text
    content: 'And there went out the king of Sodom, and the king of Gomorrah, and the king of Admah, and the king of Zeboiim, and the king of Bela (the same '
  - type: text
    content: is
  - type: text
    content: ' Zoar;) and they joined battle with them in the vale of Siddim; '
  '9':
  - type: text
    content: 'with Chedorlaomer the king of Elam, and with Tidal king of nations, and Amraphel king of Shinar, and Arioch king of Ellasar; four kings with five. '
