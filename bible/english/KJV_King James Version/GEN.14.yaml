document_id: GEN.14,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And it came to pass in the days of Amraphel king of Shinar, Arioch king of Ellasar, Chedorlaomer king of Elam, and Tidal king of nations; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And the vale of Siddim '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was full of
    - type: text
      text: ' slimepits; and the kings of Sodom and Gomorrah fled, and fell there; and they that remained fled to the mountain. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And they took all the goods of Sodom and Gomorrah, and all their victuals, and went their way. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: And they took Lot, Abram's brother's son, who dwelt in Sodom, and his goods, and departed.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And there came one that had escaped, and told Abram the Hebrew; for he dwelt in the plain of Mamre the Amorite, brother of Eshcol, and brother of Aner: and these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' confederate with Abram. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And when Abram heard that his brother was taken captive, he armed his trained '
    - type: usfm
      marker: add
      children:
      - type: text
        text: servants
    - type: text
      text: ', born in his own house, three hundred and eighteen, and pursued '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' unto Dan. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And he divided himself against them, he and his servants, by night, and smote them, and pursued them unto Hobah, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' on the left hand of Damascus. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: And he brought back all the goods, and also brought again his brother Lot, and his goods, and the women also, and the people.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And the king of Sodom went out to meet him after his return from the slaughter of Chedorlaomer, and of the kings that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with him, at the valley of Shaveh, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the king''s dale. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And Melchizedek king of Salem brought forth bread and wine: and he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the priest of the most high God. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And he blessed him, and said, Blessed be Abram of the most high God, possessor of heaven and earth: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: add
      children:
      - type: text
        text: that these
    - type: text
      text: ' made war with Bera king of Sodom, and with Birsha king of Gomorrah, Shinab king of Admah, and Shemeber king of Zeboiim, and the king of Bela, which is Zoar. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'and blessed be the most high God, which hath delivered thine enemies into thy hand. And he gave him tithes of all. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And the king of Sodom said unto Abram, Give me the persons, and take the goods to thyself. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And Abram said to the king of Sodom, I have lift up mine hand unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', the most high God, the possessor of heaven and earth, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'that I will not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: take
    - type: text
      text: ' from a thread even to a shoelatchet, and that I will not take any thing that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thine, lest thou shouldest say, I have made Abram rich: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: save only that which the young men have eaten, and the portion of the men which went with me, Aner, Eshcol, and Mamre; let them take their portion.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'All these were joined together in the vale of Siddim, which is the salt sea. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Twelve years they served Chedorlaomer, and in the thirteenth year they rebelled. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And in the fourteenth year came Chedorlaomer, and the kings that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with him, and smote the Rephaims in Ashteroth Karnaim, and the Zuzims in Ham, and the Emims in Shaveh Kiriathaim, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'and the Horites in their mount Seir, unto El-paran, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' by the wilderness. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And they returned, and came to En-mishpat, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Kadesh, and smote all the country of the Amalekites, and also the Amorites, that dwelt in Hazezon-tamar. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And there went out the king of Sodom, and the king of Gomorrah, and the king of Admah, and the king of Zeboiim, and the king of Bela (the same '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Zoar;) and they joined battle with them in the vale of Siddim; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'with Chedorlaomer the king of Elam, and with Tidal king of nations, and Amraphel king of Shinar, and Arioch king of Ellasar; four kings with five. '
