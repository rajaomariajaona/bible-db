document_id: 2SA.2,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: King of Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And it came to pass after this, that David enquired of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', saying, Shall I go up into any of the cities of Judah? And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto him, Go up. And David said, Whither shall I go up? And he said, Unto Hebron. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ish-bosheth Saul''s son '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' forty years old when he began to reign over Israel, and reigned two years. But the house of Judah followed David. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: And the time that David was king in Hebron over the house of Judah was seven years and six months.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And Abner the son of Ner, and the servants of Ish-bosheth the son of Saul, went out from Mahanaim to Gibeon. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And Joab the son of Zeruiah, and the servants of David, went out, and met together by the pool of Gibeon: and they sat down, the one on the one side of the pool, and the other on the other side of the pool. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And Abner said to Joab, Let the young men now arise, and play before us. And Joab said, Let them arise. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then there arose and went over by number twelve of Benjamin, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: pertained
    - type: text
      text: ' to Ish-bosheth the son of Saul, and twelve of the servants of David. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And they caught every one his fellow by the head, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thrust
    - type: text
      text: ' his sword in his fellow''s side; so they fell down together: wherefore that place was called Helkath-hazzurim, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in Gibeon. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: And there was a very sore battle that day; and Abner was beaten, and the men of Israel, before the servants of David.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And there were three sons of Zeruiah there, Joab, and Abishai, and Asahel: and Asahel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was as
    - type: text
      text: ' light of foot as a wild roe. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And Asahel pursued after Abner; and in going he turned not to the right hand nor to the left from following Abner. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'So David went up thither, and his two wives also, Ahinoam the Jezreelitess, and Abigail Nabal''s wife the Carmelite. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then Abner looked behind him, and said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Art
    - type: text
      text: ' thou Asahel? And he answered, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And Abner said to him, Turn thee aside to thy right hand or to thy left, and lay thee hold on one of the young men, and take thee his armour. But Asahel would not turn aside from following of him. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And Abner said again to Asahel, Turn thee aside from following me: wherefore should I smite thee to the ground? how then should I hold up my face to Joab thy brother? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Howbeit he refused to turn aside: wherefore Abner with the hinder end of the spear smote him under the fifth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: rib
    - type: text
      text: ', that the spear came out behind him; and he fell down there, and died in the same place: and it came to pass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' as many as came to the place where Asahel fell down and died stood still.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Joab also and Abishai pursued after Abner: and the sun went down when they were come to the hill of Ammah, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: lieth
    - type: text
      text: ' before Giah by the way of the wilderness of Gibeon. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And the children of Benjamin gathered themselves together after Abner, and became one troop, and stood on the top of an hill. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Then Abner called to Joab, and said, Shall the sword devour for ever? knowest thou not that it will be bitterness in the latter end? how long shall it be then, ere thou bid the people return from following their brethren? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And Joab said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: As
    - type: text
      text: ' God liveth, unless thou hadst spoken, surely then in the morning the people had gone up every one from following his brother. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'So Joab blew a trumpet, and all the people stood still, and pursued after Israel no more, neither fought they any more. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: And Abner and his men walked all that night through the plain, and passed over Jordan, and went through all Bithron, and they came to Mahanaim.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And his men that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with him did David bring up, every man with his household: and they dwelt in the cities of Hebron. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And Joab returned from following Abner: and when he had gathered all the people together, there lacked of David''s servants nineteen men and Asahel. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'But the servants of David had smitten of Benjamin, and of Abner''s men, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so that
    - type: text
      text: ' three hundred and threescore men died. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And they took up Asahel, and buried him in the sepulchre of his father, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was in
    - type: text
      text: ' Beth-lehem. And Joab and his men went all night, and they came to Hebron at break of day.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: And the men of Judah came, and there they anointed David king over the house of Judah.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they told David, saying, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: That
    - type: text
      text: ' the men of Jabesh-gilead '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were they
    - type: text
      text: ' that buried Saul. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And David sent messengers unto the men of Jabesh-gilead, and said unto them, Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' ye of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', that ye have shewed this kindness unto your lord, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' unto Saul, and have buried him. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And now the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shew kindness and truth unto you: and I also will requite you this kindness, because ye have done this thing. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Therefore now let your hands be strengthened, and be ye valiant: for your master Saul is dead, and also the house of Judah have anointed me king over them.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The End of Saul's House
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But Abner the son of Ner, captain of Saul''s host, took Ish-bosheth the son of Saul, and brought him over to Mahanaim; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'and made him king over Gilead, and over the Ashurites, and over Jezreel, and over Ephraim, and over Benjamin, and over all Israel. '
