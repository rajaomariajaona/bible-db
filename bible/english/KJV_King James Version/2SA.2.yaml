    content: King of Judah
  - type: text
    content: 'And it came to pass after this, that David enquired of the '
  - type: text
    content: LORD
  - type: text
    content: ', saying, Shall I go up into any of the cities of Judah? And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto him, Go up. And David said, Whither shall I go up? And he said, Unto Hebron. '
  '10':
  - type: text
    content: 'Ish-bosheth Saul''s son '
  - type: text
    content: was
  - type: text
    content: ' forty years old when he began to reign over Israel, and reigned two years. But the house of Judah followed David. '
  '11':
  - type: text
    content: And the time that David was king in Hebron over the house of Judah was seven years and six months.
  '12':
  - type: text
    content: 'And Abner the son of Ner, and the servants of Ish-bosheth the son of Saul, went out from Mahanaim to Gibeon. '
  '13':
  - type: text
    content: 'And Joab the son of Zeruiah, and the servants of David, went out, and met together by the pool of Gibeon: and they sat down, the one on the one side of the pool, and the other on the other side of the pool. '
  '14':
  - type: text
    content: 'And Abner said to Joab, Let the young men now arise, and play before us. And Joab said, Let them arise. '
  '15':
  - type: text
    content: 'Then there arose and went over by number twelve of Benjamin, which '
  - type: text
    content: pertained
  - type: text
    content: ' to Ish-bosheth the son of Saul, and twelve of the servants of David. '
  '16':
  - type: text
    content: 'And they caught every one his fellow by the head, and '
  - type: text
    content: thrust
  - type: text
    content: ' his sword in his fellow''s side; so they fell down together: wherefore that place was called Helkath-hazzurim, which '
  - type: text
    content: is
  - type: text
    content: ' in Gibeon. '
  '17':
  - type: text
    content: And there was a very sore battle that day; and Abner was beaten, and the men of Israel, before the servants of David.
  '18':
  - type: text
    content: 'And there were three sons of Zeruiah there, Joab, and Abishai, and Asahel: and Asahel '
  - type: text
    content: was as
  - type: text
    content: ' light of foot as a wild roe. '
  '19':
  - type: text
    content: 'And Asahel pursued after Abner; and in going he turned not to the right hand nor to the left from following Abner. '
  '2':
  - type: text
    content: 'So David went up thither, and his two wives also, Ahinoam the Jezreelitess, and Abigail Nabal''s wife the Carmelite. '
  '20':
  - type: text
    content: 'Then Abner looked behind him, and said, '
  - type: text
    content: Art
  - type: text
    content: ' thou Asahel? And he answered, I '
  - type: text
    content: am
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'And Abner said to him, Turn thee aside to thy right hand or to thy left, and lay thee hold on one of the young men, and take thee his armour. But Asahel would not turn aside from following of him. '
  '22':
  - type: text
    content: 'And Abner said again to Asahel, Turn thee aside from following me: wherefore should I smite thee to the ground? how then should I hold up my face to Joab thy brother? '
  '23':
  - type: text
    content: 'Howbeit he refused to turn aside: wherefore Abner with the hinder end of the spear smote him under the fifth '
  - type: text
    content: rib
  - type: text
    content: ', that the spear came out behind him; and he fell down there, and died in the same place: and it came to pass, '
  - type: text
    content: that
  - type: text
    content: ' as many as came to the place where Asahel fell down and died stood still.'
  '24':
  - type: text
    content: 'Joab also and Abishai pursued after Abner: and the sun went down when they were come to the hill of Ammah, that '
  - type: text
    content: lieth
  - type: text
    content: ' before Giah by the way of the wilderness of Gibeon. '
  '25':
  - type: text
    content: 'And the children of Benjamin gathered themselves together after Abner, and became one troop, and stood on the top of an hill. '
  '26':
  - type: text
    content: 'Then Abner called to Joab, and said, Shall the sword devour for ever? knowest thou not that it will be bitterness in the latter end? how long shall it be then, ere thou bid the people return from following their brethren? '
  '27':
  - type: text
    content: 'And Joab said, '
  - type: text
    content: As
  - type: text
    content: ' God liveth, unless thou hadst spoken, surely then in the morning the people had gone up every one from following his brother. '
  '28':
  - type: text
    content: 'So Joab blew a trumpet, and all the people stood still, and pursued after Israel no more, neither fought they any more. '
  '29':
  - type: text
    content: And Abner and his men walked all that night through the plain, and passed over Jordan, and went through all Bithron, and they came to Mahanaim.
  '3':
  - type: text
    content: 'And his men that '
  - type: text
    content: were
  - type: text
    content: ' with him did David bring up, every man with his household: and they dwelt in the cities of Hebron. '
  '30':
  - type: text
    content: 'And Joab returned from following Abner: and when he had gathered all the people together, there lacked of David''s servants nineteen men and Asahel. '
  '31':
  - type: text
    content: 'But the servants of David had smitten of Benjamin, and of Abner''s men, '
  - type: text
    content: so that
  - type: text
    content: ' three hundred and threescore men died. '
  '32':
  - type: text
    content: 'And they took up Asahel, and buried him in the sepulchre of his father, which '
  - type: text
    content: was in
  - type: text
    content: ' Beth-lehem. And Joab and his men went all night, and they came to Hebron at break of day.'
  '4':
  - type: text
    content: And the men of Judah came, and there they anointed David king over the house of Judah.
  - type: text
    content: 'And they told David, saying, '
  - type: text
    content: That
  - type: text
    content: ' the men of Jabesh-gilead '
  - type: text
    content: were they
  - type: text
    content: ' that buried Saul. '
  '5':
  - type: text
    content: 'And David sent messengers unto the men of Jabesh-gilead, and said unto them, Blessed '
  - type: text
    content: be
  - type: text
    content: ' ye of the '
  - type: text
    content: LORD
  - type: text
    content: ', that ye have shewed this kindness unto your lord, '
  - type: text
    content: even
  - type: text
    content: ' unto Saul, and have buried him. '
  '6':
  - type: text
    content: 'And now the '
  - type: text
    content: LORD
  - type: text
    content: ' shew kindness and truth unto you: and I also will requite you this kindness, because ye have done this thing. '
  '7':
  - type: text
    content: 'Therefore now let your hands be strengthened, and be ye valiant: for your master Saul is dead, and also the house of Judah have anointed me king over them.'
  - type: heading
    content: The End of Saul's House
  '8':
  - type: text
    content: 'But Abner the son of Ner, captain of Saul''s host, took Ish-bosheth the son of Saul, and brought him over to Mahanaim; '
  '9':
  - type: text
    content: 'and made him king over Gilead, and over the Ashurites, and over Jezreel, and over Ephraim, and over Benjamin, and over all Israel. '
