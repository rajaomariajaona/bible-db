document_id: 2CH.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And Solomon the son of David was strengthened in his kingdom, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' his God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' with him, and magnified him exceedingly. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Give me now wisdom and knowledge, that I may go out and come in before this people: for who can judge this thy people, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is so
    - type: text
      text: ' great? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And God said to Solomon, Because this was in thine heart, and thou hast not asked riches, wealth, or honour, nor the life of thine enemies, neither yet hast asked long life; but hast asked wisdom and knowledge for thyself, that thou mayest judge my people, over whom I have made thee king: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'wisdom and knowledge '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' granted unto thee; and I will give thee riches, and wealth, and honour, such as none of the kings have had that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: have been
    - type: text
      text: ' before thee, neither shall there any after thee have the like. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then Solomon came '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from his journey
    - type: text
      text: ' to the high place that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' at Gibeon to Jerusalem, from before the tabernacle of the congregation, and reigned over Israel.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And Solomon gathered chariots and horsemen: and he had a thousand and four hundred chariots, and twelve thousand horsemen, which he placed in the chariot cities, and with the king at Jerusalem. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And the king made silver and gold at Jerusalem '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as plenteous
    - type: text
      text: ' as stones, and cedar trees made he as the sycomore trees that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in the vale for abundance. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And Solomon had horses brought out of Egypt, and linen yarn: the king''s merchants received the linen yarn at a price. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And they fetched up, and brought forth out of Egypt a chariot for six hundred '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shekels
    - type: text
      text: ' of silver, and an horse for an hundred and fifty: and so brought they out '
    - type: usfm
      marker: add
      children:
      - type: text
        text: horses
    - type: text
      text: ' for all the kings of the Hittites, and for the kings of Syria, by their means.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then Solomon spake unto all Israel, to the captains of thousands and of hundreds, and to the judges, and to every governor in all Israel, the chief of the fathers. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So Solomon, and all the congregation with him, went to the high place that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' at Gibeon; for there was the tabernacle of the congregation of God, which Moses the servant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had made in the wilderness. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'But the ark of God had David brought up from Kirjath-jearim to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the place which
    - type: text
      text: ' David had prepared for it: for he had pitched a tent for it at Jerusalem. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Moreover the brasen altar, that Bezaleel the son of Uri, the son of Hur, had made, he put before the tabernacle of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': and Solomon and the congregation sought unto it. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And Solomon went up thither to the brasen altar before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' at the tabernacle of the congregation, and offered a thousand burnt offerings upon it.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'In that night did God appear unto Solomon, and said unto him, Ask what I shall give thee. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And Solomon said unto God, Thou hast shewed great mercy unto David my father, and hast made me to reign in his stead. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Now, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God, let thy promise unto David my father be established: for thou hast made me king over a people like the dust of the earth in multitude. '
