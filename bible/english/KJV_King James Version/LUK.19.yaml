document_id: LUK.19,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Zacchæus
  - type: text
    content: 'And '
  - type: text
    content: Jesus
  - type: text
    content: ' entered and passed through Jericho. '
  '10':
  - type: text
    content: For the Son of man is come to seek and to save that which was lost.
  - type: text
    content: ' '
  '11':
  - type: text
    content: And as they heard these things, he added and spake a parable, because he was nigh to Jerusalem, and because they thought that the kingdom of God should immediately appear.
  - type: heading
    content: Parable of the Pounds
  '12':
  - type: text
    content: 'He said therefore, '
  - type: text
    content: A certain nobleman went into a far country to receive for himself a kingdom, and to return.
  - type: text
    content: ' '
  '13':
  - type: text
    content: And he called his ten servants, and delivered them ten pounds, and said unto them, Occupy till I come.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'But his citizens hated him, and sent a message after him, saying, We will not have this '
  - type: text
    content: man
  - type: text
    content: ' to reign over us.'
  - type: text
    content: ' '
  '15':
  - type: text
    content: And it came to pass, that when he was returned, having received the kingdom, then he commanded these servants to be called unto him, to whom he had given the money, that he might know how much every man had gained by trading.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Then came the first, saying, Lord, thy pound hath gained ten pounds.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'And he said unto him, Well, thou good servant: because thou hast been faithful in a very little, have thou authority over ten cities.'
  - type: text
    content: ' '
  '18':
  - type: text
    content: And the second came, saying, Lord, thy pound hath gained five pounds.
  - type: text
    content: ' '
  '19':
  - type: text
    content: And he said likewise to him, Be thou also over five cities.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And, behold, '
  - type: text
    content: there was
  - type: text
    content: ' a man named Zacchæus, which was the chief among the publicans, and he was rich. '
  '20':
  - type: text
    content: 'And another came, saying, Lord, behold, '
  - type: text
    content: here is
  - type: text
    content: ' thy pound, which I have kept laid up in a napkin:'
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'for I feared thee, because thou art an austere man: thou takest up that thou layedst not down, and reapest that thou didst not sow.'
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'And he saith unto him, Out of thine own mouth will I judge thee, '
  - type: text
    content: thou
  - type: text
    content: ' wicked servant. Thou knewest that I was an austere man, taking up that I laid not down, and reaping that I did not sow:'
  - type: text
    content: ' '
  '23':
  - type: text
    content: wherefore then gavest not thou my money into the bank, that at my coming I might have required mine own with usury?
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'And he said unto them that stood by, Take from him the pound, and give '
  - type: text
    content: it
  - type: text
    content: ' to him that hath ten pounds.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: (And they said unto him, Lord, he hath ten pounds.)
  - type: text
    content: ' '
  '26':
  - type: text
    content: For I say unto you, That unto every one which hath shall be given; and from him that hath not, even that he hath shall be taken away from him.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'But those mine enemies, which would not that I should reign over them, bring hither, and slay '
  - type: text
    content: them
  - type: text
    content: ' before me.'
  - type: heading
    content: In Jerusalem
  - type: heading
    content: Triumphal Entry
  '28':
  - type: text
    content: 'And when he had thus spoken, he went before, ascending up to Jerusalem. '
  '29':
  - type: text
    content: 'And it came to pass, when he was come nigh to Bethphage and Bethany, at the mount called '
  - type: text
    content: the mount
  - type: text
    content: ' of Olives, he sent two of his disciples, '
  '3':
  - type: text
    content: 'And he sought to see Jesus who he was; and could not for the press, because he was little of stature. '
  '30':
  - type: text
    content: 'saying, '
  - type: text
    content: 'Go ye into the village over against '
  - type: text
    content: you
  - type: text
    content: '; in the which at your entering ye shall find a colt tied, whereon yet never man sat: loose him, and bring '
  - type: text
    content: him hither
  - type: text
    content: .
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'And if any man ask you, Why do ye loose '
  - type: text
    content: him
  - type: text
    content: '? thus shall ye say unto him, Because the Lord hath need of him.'
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'And they that were sent went their way, and found even as he had said unto them. '
  '33':
  - type: text
    content: 'And as they were loosing the colt, the owners thereof said unto them, Why loose ye the colt? '
  '34':
  - type: text
    content: 'And they said, The Lord hath need of him. '
  '35':
  - type: text
    content: 'And they brought him to Jesus: and they cast their garments upon the colt, and they set Jesus thereon. '
  '36':
  - type: text
    content: 'And as he went, they spread their clothes in the way. '
  '37':
  - type: text
    content: 'And when he was come nigh, even now at the descent of the mount of Olives, the whole multitude of the disciples began to rejoice and praise God with a loud voice for all the mighty works that they had seen; '
  '38':
  - type: text
    content: 'saying, Blessed '
  - type: text
    content: be
  - type: text
    content: ' the King that cometh in the name of the Lord: peace in heaven, and glory in the highest. '
  '39':
  - type: text
    content: 'And some of the Pharisees from among the multitude said unto him, Master, rebuke thy disciples. '
  '4':
  - type: text
    content: 'And he ran before, and climbed up into a sycomore tree to see him: for he was to pass that '
  - type: text
    content: way
  - type: text
    content: .
  '40':
  - type: text
    content: 'And he answered and said unto them, '
  - type: text
    content: I tell you that, if these should hold their peace, the stones would immediately cry out.
  '41':
  - type: text
    content: 'And when he was come near, he beheld the city, and wept over it, '
  '42':
  - type: text
    content: 'saying, '
  - type: text
    content: 'If thou hadst known, even thou, at least in this thy day, the things '
  - type: text
    content: which belong
  - type: text
    content: ' unto thy peace! but now they are hid from thine eyes.'
  - type: text
    content: ' '
  '43':
  - type: text
    content: For the days shall come upon thee, that thine enemies shall cast a trench about thee, and compass thee round, and keep thee in on every side,
  - type: text
    content: ' '
  '44':
  - type: text
    content: and shall lay thee even with the ground, and thy children within thee; and they shall not leave in thee one stone upon another; because thou knewest not the time of thy visitation.
  - type: heading
    content: Jesus in the Temple
  '45':
  - type: text
    content: 'And he went into the temple, and began to cast out them that sold therein, and them that bought; '
  '46':
  - type: text
    content: 'saying unto them, '
  - type: text
    content: It is written, My house is the house of prayer; but ye have made it a den of thieves.
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'And he taught daily in the temple. But the chief priests and the scribes and the chief of the people sought to destroy him, '
  '48':
  - type: text
    content: 'and could not find what they might do: for all the people were very attentive to hear him.'
  '5':
  - type: text
    content: 'And when Jesus came to the place, he looked up, and saw him, and said unto him, '
  - type: text
    content: Zacchæus, make haste, and come down; for to day I must abide at thy house.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'And he made haste, and came down, and received him joyfully. '
  '7':
  - type: text
    content: 'And when they saw '
  - type: text
    content: it
  - type: text
    content: ', they all murmured, saying, That he was gone to be guest with a man that is a sinner. '
  '8':
  - type: text
    content: 'And Zacchæus stood, and said unto the Lord; Behold, Lord, the half of my goods I give to the poor; and if I have taken any thing from any man by false accusation, I restore '
  - type: text
    content: him
  - type: text
    content: ' fourfold. '
  '9':
  - type: text
    content: 'And Jesus said unto him, '
  - type: text
    content: This day is salvation come to this house, forsomuch as he also is a son of Abraham.
  - type: text
    content: ' '
