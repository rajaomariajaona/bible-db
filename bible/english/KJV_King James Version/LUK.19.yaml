document_id: LUK.19
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Zacchæus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Jesus
  - type: text
    text: ' entered and passed through Jericho. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And, behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' a man named Zacchæus, which was the chief among the publicans, and he was rich. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And he sought to see Jesus who he was; and could not for the press, because he was little of stature. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And he ran before, and climbed up into a sycomore tree to see him: for he was to pass that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: way
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And when Jesus came to the place, he looked up, and saw him, and said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Zacchæus, make haste, and come down; for to day I must abide at thy house.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he made haste, and came down, and received him joyfully. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And when they saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', they all murmured, saying, That he was gone to be guest with a man that is a sinner. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Zacchæus stood, and said unto the Lord; Behold, Lord, the half of my goods I give to the poor; and if I have taken any thing from any man by false accusation, I restore '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' fourfold. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And Jesus said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: This day is salvation come to this house, forsomuch as he also is a son of Abraham.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For the Son of man is come to seek and to save that which was lost.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And as they heard these things, he added and spake a parable, because he was nigh to Jerusalem, and because they thought that the kingdom of God should immediately appear.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Parable of the Pounds
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'He said therefore, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: A certain nobleman went into a far country to receive for himself a kingdom, and to return.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And he called his ten servants, and delivered them ten pounds, and said unto them, Occupy till I come.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But his citizens hated him, and sent a message after him, saying, We will not have this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' to reign over us.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And it came to pass, that when he was returned, having received the kingdom, then he commanded these servants to be called unto him, to whom he had given the money, that he might know how much every man had gained by trading.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then came the first, saying, Lord, thy pound hath gained ten pounds.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And he said unto him, Well, thou good servant: because thou hast been faithful in a very little, have thou authority over ten cities.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And the second came, saying, Lord, thy pound hath gained five pounds.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And he said likewise to him, Be thou also over five cities.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And another came, saying, Lord, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: here is
    - type: text
      text: ' thy pound, which I have kept laid up in a napkin:'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'for I feared thee, because thou art an austere man: thou takest up that thou layedst not down, and reapest that thou didst not sow.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And he saith unto him, Out of thine own mouth will I judge thee, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thou
    - type: text
      text: ' wicked servant. Thou knewest that I was an austere man, taking up that I laid not down, and reaping that I did not sow:'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: wherefore then gavest not thou my money into the bank, that at my coming I might have required mine own with usury?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And he said unto them that stood by, Take from him the pound, and give '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to him that hath ten pounds.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: (And they said unto him, Lord, he hath ten pounds.)
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For I say unto you, That unto every one which hath shall be given; and from him that hath not, even that he hath shall be taken away from him.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But those mine enemies, which would not that I should reign over them, bring hither, and slay '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' before me.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: In Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Triumphal Entry
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And when he had thus spoken, he went before, ascending up to Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And it came to pass, when he was come nigh to Bethphage and Bethany, at the mount called '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the mount
  - type: text
    text: ' of Olives, he sent two of his disciples, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Go ye into the village over against '
    - type: usfm
      marker: add
      children:
      - type: text
        text: you
    - type: text
      text: '; in the which at your entering ye shall find a colt tied, whereon yet never man sat: loose him, and bring '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him hither
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And if any man ask you, Why do ye loose '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: '? thus shall ye say unto him, Because the Lord hath need of him.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And they that were sent went their way, and found even as he had said unto them. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And as they were loosing the colt, the owners thereof said unto them, Why loose ye the colt? '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And they said, The Lord hath need of him. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And they brought him to Jesus: and they cast their garments upon the colt, and they set Jesus thereon. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And as he went, they spread their clothes in the way. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And when he was come nigh, even now at the descent of the mount of Olives, the whole multitude of the disciples began to rejoice and praise God with a loud voice for all the mighty works that they had seen; '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'saying, Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' the King that cometh in the name of the Lord: peace in heaven, and glory in the highest. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And some of the Pharisees from among the multitude said unto him, Master, rebuke thy disciples. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And he answered and said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I tell you that, if these should hold their peace, the stones would immediately cry out.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And when he was come near, he beheld the city, and wept over it, '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'If thou hadst known, even thou, at least in this thy day, the things '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which belong
    - type: text
      text: ' unto thy peace! but now they are hid from thine eyes.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For the days shall come upon thee, that thine enemies shall cast a trench about thee, and compass thee round, and keep thee in on every side,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and shall lay thee even with the ground, and thy children within thee; and they shall not leave in thee one stone upon another; because thou knewest not the time of thy visitation.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Jesus in the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'And he went into the temple, and began to cast out them that sold therein, and them that bought; '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'saying unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: It is written, My house is the house of prayer; but ye have made it a den of thieves.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'And he taught daily in the temple. But the chief priests and the scribes and the chief of the people sought to destroy him, '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'and could not find what they might do: for all the people were very attentive to hear him.'
