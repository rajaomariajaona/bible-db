verses:
  '1':
  - type: heading
    content: The Ark of the Lord is brought to Jerusalem
  - type: heading
    content: A Solemn Journey
  - type: text
    content: 'And David consulted with the captains of thousands and hundreds, '
  - type: text
    content: and
  - type: text
    content: ' with every leader. '
  '10':
  - type: text
    content: 'And the anger of the '
  - type: text
    content: LORD
  - type: text
    content: ' was kindled against Uzza, and he smote him, because he put his hand to the ark: and there he died before God. '
  '11':
  - type: text
    content: 'And David was displeased, because the '
  - type: text
    content: LORD
  - type: text
    content: ' had made a breach upon Uzza: wherefore that place is called Perez-uzza to this day. '
  '12':
  - type: text
    content: 'And David was afraid of God that day, saying, How shall I bring the ark of God '
  - type: text
    content: home
  - type: text
    content: ' to me? '
  '13':
  - type: text
    content: 'So David brought not the ark '
  - type: text
    content: home
  - type: text
    content: ' to himself to the city of David, but carried it aside into the house of Obed-edom the Gittite. '
  '14':
  - type: text
    content: 'And the ark of God remained with the family of Obed-edom in his house three months. And the '
  - type: text
    content: LORD
  - type: text
    content: ' blessed the house of Obed-edom, and all that he had.'
  '2':
  - type: text
    content: 'And David said unto all the congregation of Israel, If '
  - type: text
    content: it seem
  - type: text
    content: ' good unto you, and '
  - type: text
    content: that it be
  - type: text
    content: ' of the '
  - type: text
    content: LORD
  - type: text
    content: ' our God, let us send abroad unto our brethren every where, '
  - type: text
    content: that are
  - type: text
    content: ' left in all the land of Israel, and with them '
  - type: text
    content: also
  - type: text
    content: ' to the priests and Levites '
  - type: text
    content: which are
  - type: text
    content: ' in their cities '
  - type: text
    content: and
  - type: text
    content: ' suburbs, that they may gather themselves unto us: '
  '3':
  - type: text
    content: 'and let us bring again the ark of our God to us: for we enquired not at it in the days of Saul. '
  '4':
  - type: text
    content: 'And all the congregation said that they would do so: for the thing was right in the eyes of all the people. '
  '5':
  - type: text
    content: 'So David gathered all Israel together, from Shihor of Egypt even unto the entering of Hemath, to bring the ark of God from Kirjath-jearim. '
  '6':
  - type: text
    content: 'And David went up, and all Israel, to Baalah, '
  - type: text
    content: that is
  - type: text
    content: ', to Kirjath-jearim, which '
  - type: text
    content: belonged
  - type: text
    content: ' to Judah, to bring up thence the ark of God the '
  - type: text
    content: LORD
  - type: text
    content: ', that dwelleth '
  - type: text
    content: between
  - type: text
    content: ' the cherubims, whose name is called '
  - type: text
    content: on it
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'And they carried the ark of God in a new cart out of the house of Abinadab: and Uzza and Ahio drave the cart. '
  '8':
  - type: text
    content: 'And David and all Israel played before God with all '
  - type: text
    content: their
  - type: text
    content: ' might, and with singing, and with harps, and with psalteries, and with timbrels, and with cymbals, and with trumpets.'
  '9':
  - type: text
    content: 'And when they came unto the threshingfloor of Chidon, Uzza put forth his hand to hold the ark; for the oxen stumbled. '
