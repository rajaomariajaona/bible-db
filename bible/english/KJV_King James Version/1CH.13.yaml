document_id: 1CH.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Ark of the Lord is brought to Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: A Solemn Journey
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And David consulted with the captains of thousands and hundreds, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' with every leader. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And David said unto all the congregation of Israel, If '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it seem
  - type: text
    text: ' good unto you, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that it be
  - type: text
    text: ' of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' our God, let us send abroad unto our brethren every where, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that are
  - type: text
    text: ' left in all the land of Israel, and with them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: also
  - type: text
    text: ' to the priests and Levites '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which are
  - type: text
    text: ' in their cities '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' suburbs, that they may gather themselves unto us: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and let us bring again the ark of our God to us: for we enquired not at it in the days of Saul. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And all the congregation said that they would do so: for the thing was right in the eyes of all the people. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So David gathered all Israel together, from Shihor of Egypt even unto the entering of Hemath, to bring the ark of God from Kirjath-jearim. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And David went up, and all Israel, to Baalah, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ', to Kirjath-jearim, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: belonged
  - type: text
    text: ' to Judah, to bring up thence the ark of God the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that dwelleth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: between
  - type: text
    text: ' the cherubims, whose name is called '
  - type: usfm
    marker: add
    children:
    - type: text
      text: on it
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And they carried the ark of God in a new cart out of the house of Abinadab: and Uzza and Ahio drave the cart. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And David and all Israel played before God with all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' might, and with singing, and with harps, and with psalteries, and with timbrels, and with cymbals, and with trumpets.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And when they came unto the threshingfloor of Chidon, Uzza put forth his hand to hold the ark; for the oxen stumbled. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the anger of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' was kindled against Uzza, and he smote him, because he put his hand to the ark: and there he died before God. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And David was displeased, because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had made a breach upon Uzza: wherefore that place is called Perez-uzza to this day. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And David was afraid of God that day, saying, How shall I bring the ark of God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: home
  - type: text
    text: ' to me? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So David brought not the ark '
  - type: usfm
    marker: add
    children:
    - type: text
      text: home
  - type: text
    text: ' to himself to the city of David, but carried it aside into the house of Obed-edom the Gittite. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And the ark of God remained with the family of Obed-edom in his house three months. And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' blessed the house of Obed-edom, and all that he had.'
