  - type: text
    content: hath
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Therefore take unto you now seven bullocks and seven rams, and go to my servant Job, and offer up for yourselves a burnt offering; and my servant Job shall pray for you: for him will I accept: lest I deal with you '
  - type: text
    content: after your
  - type: text
    content: ' folly, in that ye have not spoken of me '
  - type: text
