  '7':
  - type: text
    content: 'And it was '
  - type: text
    content: so
  - type: text
    content: ', that after the '
  - type: text
    content: LORD
  - type: text
    content: ' had spoken these words unto Job, the '
  - type: text
    content: LORD
  - type: text
    content: ' said to Eliphaz the Temanite, My wrath is kindled against thee, and against thy two friends: for ye have not spoken of me '
  - type: text
