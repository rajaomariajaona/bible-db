document_id: JOB.42,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Job's Reply
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then Job answered the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and said,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' turned the captivity of Job, when he prayed for his friends: also the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' gave Job twice as much as he had before. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then came there unto him all his brethren, and all his sisters, and all they that had been of his acquaintance before, and did eat bread with him in his house: and they bemoaned him, and comforted him over all the evil that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had brought upon him: every man also gave him a piece of money, and every one an earring of gold. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' blessed the latter end of Job more than his beginning: for he had fourteen thousand sheep, and six thousand camels, and a thousand yoke of oxen, and a thousand she asses. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'He had also seven sons and three daughters. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And he called the name of the first, Jemima; and the name of the second, Kezia; and the name of the third, Keren-happuch. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And in all the land were no women found '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' fair as the daughters of Job: and their father gave them inheritance among their brethren. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'After this lived Job an hundred and forty years, and saw his sons, and his sons'' sons, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' four generations. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'So Job died, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: being
    - type: text
      text: ' old and full of days.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'I know that thou canst do every '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thing
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' no thought can be withholden from thee.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' he that hideth counsel without knowledge?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore have I uttered that I understood not;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Things too wonderful for me, which I knew not.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Hear, I beseech thee, and I will speak:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will demand of thee, and declare thou unto me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'I have heard of thee by the hearing of the ear:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But now mine eye seeth thee.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Wherefore I abhor '
    - type: usfm
      marker: add
      children:
      - type: text
        text: myself
    - type: text
      text: ', and repent'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In dust and ashes.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Epilogue
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And it was '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ', that after the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had spoken these words unto Job, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said to Eliphaz the Temanite, My wrath is kindled against thee, and against thy two friends: for ye have not spoken of me '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the thing that is
    - type: text
      text: ' right, as my servant Job '
    - type: usfm
      marker: add
      children:
      - type: text
        text: hath
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Therefore take unto you now seven bullocks and seven rams, and go to my servant Job, and offer up for yourselves a burnt offering; and my servant Job shall pray for you: for him will I accept: lest I deal with you '
    - type: usfm
      marker: add
      children:
      - type: text
        text: after your
    - type: text
      text: ' folly, in that ye have not spoken of me '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the thing which is
    - type: text
      text: ' right, like my servant Job. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'So Eliphaz the Temanite and Bildad the Shuhite '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' Zophar the Naamathite went, and did according as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commanded them: the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' also accepted Job. '
