    content: Job's Reply
  - type: text
    content: 'Then Job answered the '
  - type: text
    content: LORD
  - type: text
    content: ', and said,'
  '10':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' turned the captivity of Job, when he prayed for his friends: also the '
  - type: text
    content: LORD
  - type: text
    content: ' gave Job twice as much as he had before. '
  '11':
  - type: text
    content: 'Then came there unto him all his brethren, and all his sisters, and all they that had been of his acquaintance before, and did eat bread with him in his house: and they bemoaned him, and comforted him over all the evil that the '
  - type: text
    content: LORD
  - type: text
    content: ' had brought upon him: every man also gave him a piece of money, and every one an earring of gold. '
  '12':
  - type: text
    content: 'So the '
  - type: text
    content: LORD
  - type: text
    content: ' blessed the latter end of Job more than his beginning: for he had fourteen thousand sheep, and six thousand camels, and a thousand yoke of oxen, and a thousand she asses. '
  '13':
  - type: text
    content: 'He had also seven sons and three daughters. '
  '14':
  - type: text
    content: 'And he called the name of the first, Jemima; and the name of the second, Kezia; and the name of the third, Keren-happuch. '
  '15':
  - type: text
    content: 'And in all the land were no women found '
  - type: text
    content: so
  - type: text
    content: ' fair as the daughters of Job: and their father gave them inheritance among their brethren. '
  '16':
  - type: text
    content: 'After this lived Job an hundred and forty years, and saw his sons, and his sons'' sons, '
  - type: text
    content: even
  - type: text
    content: ' four generations. '
  '17':
  - type: text
    content: 'So Job died, '
  - type: text
    content: being
  - type: text
    content: ' old and full of days.'
  '2':
  - type: text
    content: 'I know that thou canst do every '
  - type: text
    content: thing
  - type: text
    content: ','
  - type: text
    content: 'And '
  - type: text
    content: that
  - type: text
    content: ' no thought can be withholden from thee.'
  '3':
  - type: text
    content: 'Who '
  - type: text
    content: is
  - type: text
    content: ' he that hideth counsel without knowledge?'
  - type: text
    content: Therefore have I uttered that I understood not;
  - type: text
    content: Things too wonderful for me, which I knew not.
  '4':
  - type: text
    content: 'Hear, I beseech thee, and I will speak:'
  - type: text
    content: I will demand of thee, and declare thou unto me.
  '5':
  - type: text
    content: 'I have heard of thee by the hearing of the ear:'
  - type: text
    content: But now mine eye seeth thee.
  '6':
  - type: text
    content: 'Wherefore I abhor '
  - type: text
    content: myself
  - type: text
