document_id: REV.11,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Angel and the Temple
  - type: text
    content: 'And there was given me a reed like unto a rod: and the angel stood, saying, Rise, and measure the temple of God, and the altar, and them that worship therein. '
  '10':
  - type: text
    content: 'And they that dwell upon the earth shall rejoice over them, and make merry, and shall send gifts one to another; because these two prophets tormented them that dwelt on the earth. '
  '11':
  - type: text
    content: 'And after three days and an half the spirit of life from God entered into them, and they stood upon their feet; and great fear fell upon them which saw them. '
  '12':
  - type: text
    content: 'And they heard a great voice from heaven saying unto them, Come up hither. And they ascended up to heaven in a cloud; and their enemies beheld them. '
  '13':
  - type: text
    content: 'And the same hour was there a great earthquake, and the tenth part of the city fell, and in the earthquake were slain of men seven thousand: and the remnant were affrighted, and gave glory to the God of heaven.'
  '14':
  - type: text
    content: 'The second woe is past; '
  - type: text
    content: and
  - type: text
    content: ', behold, the third woe cometh quickly.'
  - type: heading
    content: The Last Trumpet's Peal
  '15':
  - type: text
    content: 'And the seventh angel sounded; and there were great voices in heaven, saying, The kingdoms of this world are become '
  - type: text
    content: the kingdoms
  - type: text
    content: ' of our Lord, and of his Christ; and he shall reign for ever and ever. '
  '16':
  - type: text
    content: 'And the four and twenty elders, which sat before God on their seats, fell upon their faces, and worshipped God, '
  '17':
  - type: text
    content: 'saying, We give thee thanks, O Lord God Almighty, which art, and wast, and art to come; because thou hast taken to thee thy great power, and hast reigned. '
  '18':
  - type: text
    content: And the nations were angry, and thy wrath is come, and the time of the dead, that they should be judged, and that thou shouldest give reward unto thy servants the prophets, and to the saints, and them that fear thy name, small and great; and shouldest destroy them which destroy the earth.
  '19':
  - type: text
    content: 'And the temple of God was opened in heaven, and there was seen in his temple the ark of his testament: and there were lightnings, and voices, and thunderings, and an earthquake, and great hail.'
  '2':
  - type: text
    content: 'But the court which is without the temple leave out, and measure it not; for it is given unto the Gentiles: and the holy city shall they tread under foot forty '
  - type: text
    content: and
  - type: text
    content: ' two months. '
  '3':
  - type: text
    content: 'And I will give '
  - type: text
    content: power
  - type: text
    content: ' unto my two witnesses, and they shall prophesy a thousand two hundred '
  - type: text
    content: and
  - type: text
    content: ' threescore days, clothed in sackcloth. '
  '4':
  - type: text
    content: 'These are the two olive trees, and the two candlesticks standing before the God of the earth. '
  '5':
  - type: text
    content: 'And if any man will hurt them, fire proceedeth out of their mouth, and devoureth their enemies: and if any man will hurt them, he must in this manner be killed. '
  '6':
  - type: text
    content: 'These have power to shut heaven, that it rain not in the days of their prophecy: and have power over waters to turn them to blood, and to smite the earth with all plagues, as often as they will. '
  '7':
  - type: text
    content: 'And when they shall have finished their testimony, the beast that ascendeth out of the bottomless pit shall make war against them, and shall overcome them, and kill them. '
  '8':
  - type: text
    content: 'And their dead bodies '
  - type: text
    content: shall lie
  - type: text
    content: ' in the street of the great city, which spiritually is called Sodom and Egypt, where also our Lord was crucified. '
  '9':
  - type: text
    content: 'And they of the people and kindreds and tongues and nations shall see their dead bodies three days and an half, and shall not suffer their dead bodies to be put in graves. '
