  '12':
  - type: text
    content: 'I will praise thee, O Lord my God, with all my heart:'
  - type: text
    content: And I will glorify thy name for evermore.
  '13':
  - type: text
    content: 'For great '
  - type: text
    content: is
  - type: text
    content: ' thy mercy toward me:'
  - type: text
    content: And thou hast delivered my soul from the lowest hell.
  '14':
  - type: text
    content: O God, the proud are risen against me,
  - type: text
    content: 'And the assemblies of violent '
  - type: text
    content: men
  - type: text
    content: ' have sought after my soul; And have not set thee before them.'
  '15':
  - type: text
    content: 'But thou, O Lord, '
  - type: text
    content: art
  - type: text
    content: ' a God full of compassion, and gracious,'
  - type: text
    content: Longsuffering, and plenteous in mercy and truth.
  '16':
  - type: text
    content: O turn unto me, and have mercy upon me;
  - type: text
    content: Give thy strength unto thy servant, and save the son of thine handmaid.
  '17':
  - type: text
    content: 'Shew me a token for good; That they which hate me may see '
  - type: text
    content: it
  - type: text
    content: ', and be ashamed:'
  - type: text
    content: 'Because thou, '
  - type: text
    content: LORD
  - type: text
    content: ', hast holpen me, and comforted me.'
  '2':
  - type: text
    content: 'Preserve my soul; for I '
  - type: text
    content: am
  - type: text
    content: ' holy:'
  - type: text
    content: O thou my God, save thy servant that trusteth in thee.
  '3':
  - type: text
    content: 'Be merciful unto me, O Lord:'
  - type: text
    content: For I cry unto thee daily.
  '4':
  - type: text
    content: 'Rejoice the soul of thy servant:'
  - type: text
    content: For unto thee, O Lord, do I lift up my soul.
  '5':
  - type: text
    content: 'For thou, Lord, '
  - type: text
    content: art
  - type: text
    content: ' good, and ready to forgive;'
  - type: text
    content: And plenteous in mercy unto all them that call upon thee.
  '6':
  - type: text
    content: 'Give ear, O '
  - type: text
    content: LORD
  - type: text
    content: ', unto my prayer;'
  - type: text
    content: And attend to the voice of my supplications.
  '7':
  - type: text
    content: 'In the day of my trouble I will call upon thee:'
  - type: text
    content: For thou wilt answer me.
  '8':
  - type: text
    content: 'Among the gods '
  - type: text
    content: there is
  - type: text
    content: ' none like unto thee, O Lord;'
  - type: text
    content: 'Neither '
  - type: text
    content: are there any works
  - type: text
    content: ' like unto thy works.'
  '9':
  - type: text
    content: All nations whom thou hast made shall come and worship before thee, O Lord;
  - type: text
    content: And shall glorify thy name.
