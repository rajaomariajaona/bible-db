document_id: PSA.86,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Prayer of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Bow down thine ear, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', hear me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' poor and needy.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' great, and doest wondrous things:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' God alone.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Teach me thy way, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; I will walk in thy truth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Unite my heart to fear thy name.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will praise thee, O Lord my God, with all my heart:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I will glorify thy name for evermore.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For great '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy mercy toward me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thou hast delivered my soul from the lowest hell.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O God, the proud are risen against me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the assemblies of violent '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' have sought after my soul; And have not set thee before them.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But thou, O Lord, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' a God full of compassion, and gracious,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Longsuffering, and plenteous in mercy and truth.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O turn unto me, and have mercy upon me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Give thy strength unto thy servant, and save the son of thine handmaid.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Shew me a token for good; That they which hate me may see '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and be ashamed:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Because thou, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', hast holpen me, and comforted me.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Preserve my soul; for I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' holy:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O thou my God, save thy servant that trusteth in thee.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Be merciful unto me, O Lord:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For I cry unto thee daily.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Rejoice the soul of thy servant:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For unto thee, O Lord, do I lift up my soul.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For thou, Lord, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' good, and ready to forgive;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And plenteous in mercy unto all them that call upon thee.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Give ear, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', unto my prayer;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And attend to the voice of my supplications.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In the day of my trouble I will call upon thee:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For thou wilt answer me.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Among the gods '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none like unto thee, O Lord;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Neither '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are there any works
    - type: text
      text: ' like unto thy works.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All nations whom thou hast made shall come and worship before thee, O Lord;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And shall glorify thy name.
