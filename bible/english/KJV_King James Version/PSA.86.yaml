  - type: text
    content: 'Thou '
  - type: text
    content: art
  - type: text
    content: ' God alone.'
  '11':
  - type: text
    content: 'Teach me thy way, O '
  - type: text
    content: LORD
  - type: text
    content: '; I will walk in thy truth:'
  - type: text
