document_id: JER.47,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Philistia
  - type: text
    content: 'The word of the '
  - type: text
    content: LORD
  - type: text
    content: ' that came to Jeremiah the prophet against the Philistines, before that Pharaoh smote Gaza. '
  '2':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Behold, waters rise up out of the north, and shall be an overflowing flood, and shall overflow the land, and all that is therein; the city, and them that dwell therein: then the men shall cry, and all the inhabitants of the land shall howl. '
  '3':
  - type: text
    content: 'At the noise of the stamping of the hoofs of his strong '
  - type: text
    content: horses
  - type: text
    content: ', at the rushing of his chariots, '
  - type: text
    content: and at
  - type: text
    content: ' the rumbling of his wheels, the fathers shall not look back to '
  - type: text
    content: their
  - type: text
    content: ' children for feebleness of hands; '
  '4':
  - type: text
    content: 'because of the day that cometh to spoil all the Philistines, '
  - type: text
    content: and
  - type: text
    content: ' to cut off from Tyrus and Zidon every helper that remaineth: for the '
  - type: text
    content: LORD
  - type: text
    content: ' will spoil the Philistines, the remnant of the country of Caphtor. '
  '5':
  - type: text
    content: 'Baldness is come upon Gaza; Ashkelon is cut off '
  - type: text
    content: with
  - type: text
    content: ' the remnant of their valley: how long wilt thou cut thyself? '
  '6':
  - type: text
    content: 'O thou sword of the '
  - type: text
    content: LORD
  - type: text
    content: ', how long '
  - type: text
    content: will it be
  - type: text
    content: ' ere thou be quiet? put up thyself into thy scabbard, rest, and be still. '
  '7':
  - type: text
    content: 'How can it be quiet, seeing the '
  - type: text
    content: LORD
  - type: text
    content: ' hath given it a charge against Ashkelon, and against the sea shore? there hath he appointed it.'
