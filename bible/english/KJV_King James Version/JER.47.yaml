document_id: JER.47,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Philistia
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' that came to Jeremiah the prophet against the Philistines, before that Pharaoh smote Gaza. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; Behold, waters rise up out of the north, and shall be an overflowing flood, and shall overflow the land, and all that is therein; the city, and them that dwell therein: then the men shall cry, and all the inhabitants of the land shall howl. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'At the noise of the stamping of the hoofs of his strong '
    - type: usfm
      marker: add
      children:
      - type: text
        text: horses
    - type: text
      text: ', at the rushing of his chariots, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and at
    - type: text
      text: ' the rumbling of his wheels, the fathers shall not look back to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' children for feebleness of hands; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'because of the day that cometh to spoil all the Philistines, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' to cut off from Tyrus and Zidon every helper that remaineth: for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will spoil the Philistines, the remnant of the country of Caphtor. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Baldness is come upon Gaza; Ashkelon is cut off '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' the remnant of their valley: how long wilt thou cut thyself? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'O thou sword of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', how long '
    - type: usfm
      marker: add
      children:
      - type: text
        text: will it be
    - type: text
      text: ' ere thou be quiet? put up thyself into thy scabbard, rest, and be still. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'How can it be quiet, seeing the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath given it a charge against Ashkelon, and against the sea shore? there hath he appointed it.'
