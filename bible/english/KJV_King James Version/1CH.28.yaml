document_id: 1CH.28
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: David's Last Words
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And David assembled all the princes of Israel, the princes of the tribes, and the captains of the companies that ministered to the king by course, and the captains over the thousands, and captains over the hundreds, and the stewards over all the substance and possession of the king, and of his sons, with the officers, and with the mighty men, and with all the valiant men, unto Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then David the king stood up upon his feet, and said, Hear me, my brethren, and my people: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As for me
  - type: text
    text: ', I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: had
  - type: text
    text: ' in mine heart to build an house of rest for the ark of the covenant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and for the footstool of our God, and had made ready for the building: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'but God said unto me, Thou shalt not build an house for my name, because thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hast been
  - type: text
    text: ' a man of war, and hast shed blood. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Howbeit the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel chose me before all the house of my father to be king over Israel for ever: for he hath chosen Judah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' the ruler; and of the house of Judah, the house of my father; and among the sons of my father he liked me to make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: me
  - type: text
    text: ' king over all Israel: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and of all my sons, (for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath given me many sons,) he hath chosen Solomon my son to sit upon the throne of the kingdom of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' over Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he said unto me, Solomon thy son, he shall build my house and my courts: for I have chosen him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' my son, and I will be his father. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Moreover I will establish his kingdom for ever, if he be constant to do my commandments and my judgments, as at this day. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now therefore in the sight of all Israel the congregation of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and in the audience of our God, keep and seek for all the commandments of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God: that ye may possess this good land, and leave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' for an inheritance for your children after you for ever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And thou, Solomon my son, know thou the God of thy father, and serve him with a perfect heart and with a willing mind: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' searcheth all hearts, and understandeth all the imaginations of the thoughts: if thou seek him, he will be found of thee; but if thou forsake him, he will cast thee off for ever. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Take heed now; for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath chosen thee to build an house for the sanctuary: be strong, and do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then David gave to Solomon his son the pattern of the porch, and of the houses thereof, and of the treasuries thereof, and of the upper chambers thereof, and of the inner parlours thereof, and of the place of the mercy seat, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and the pattern of all that he had by the spirit, of the courts of the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and of all the chambers round about, of the treasuries of the house of God, and of the treasuries of the dedicated things: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'also for the courses of the priests and the Levites, and for all the work of the service of the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and for all the vessels of service in the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: add
    children:
    - type: text
      text: He gave
  - type: text
    text: ' of gold by weight for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' of gold, for all instruments of all manner of service; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: silver also
  - type: text
    text: ' for all instruments of silver by weight, for all instruments of every kind of service: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'even the weight for the candlesticks of gold, and for their lamps of gold, by weight for every candlestick, and for the lamps thereof: and for the candlesticks of silver by weight, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: both
  - type: text
    text: ' for the candlestick, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: also
  - type: text
    text: ' for the lamps thereof, according to the use of every candlestick. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And by weight '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he gave
  - type: text
    text: ' gold for the tables of shewbread, for every table; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: likewise
  - type: text
    text: ' silver for the tables of silver: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'also pure gold for the fleshhooks, and the bowls, and the cups: and for the golden basons '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he gave gold
  - type: text
    text: ' by weight for every bason; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: likewise silver
  - type: text
    text: ' by weight for every bason of silver: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and for the altar of incense refined gold by weight; and gold for the pattern of the chariot of the cherubims, that spread out '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their wings
  - type: text
    text: ', and covered the ark of the covenant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'All '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this, said David
  - type: text
    text: ', the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' made me understand in writing by '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' hand upon me, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' all the works of this pattern.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And David said to Solomon his son, Be strong and of good courage, and do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'it:'
  - type: text
    text: ' fear not, nor be dismayed: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' my God, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: will be
  - type: text
    text: ' with thee; he will not fail thee, nor forsake thee, until thou hast finished all the work for the service of the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And, behold, the courses of the priests and the Levites, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even they shall be with thee
  - type: text
    text: ' for all the service of the house of God: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there shall be
  - type: text
    text: ' with thee for all manner of workmanship every willing skilful man, for any manner of service: also the princes and all the people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: will be
  - type: text
    text: ' wholly at thy commandment.'
