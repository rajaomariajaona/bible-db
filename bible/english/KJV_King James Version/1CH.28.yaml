verses:
  '1':
  - type: heading
    content: David's Last Words
  - type: text
    content: 'And David assembled all the princes of Israel, the princes of the tribes, and the captains of the companies that ministered to the king by course, and the captains over the thousands, and captains over the hundreds, and the stewards over all the substance and possession of the king, and of his sons, with the officers, and with the mighty men, and with all the valiant men, unto Jerusalem. '
  '10':
  - type: text
    content: 'Take heed now; for the '
  - type: text
    content: LORD
  - type: text
    content: ' hath chosen thee to build an house for the sanctuary: be strong, and do '
  - type: text
    content: it
  - type: text
    content: .
  '11':
  - type: text
    content: 'Then David gave to Solomon his son the pattern of the porch, and of the houses thereof, and of the treasuries thereof, and of the upper chambers thereof, and of the inner parlours thereof, and of the place of the mercy seat, '
  '12':
  - type: text
    content: 'and the pattern of all that he had by the spirit, of the courts of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and of all the chambers round about, of the treasuries of the house of God, and of the treasuries of the dedicated things: '
  '13':
  - type: text
    content: 'also for the courses of the priests and the Levites, and for all the work of the service of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and for all the vessels of service in the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '14':
  - type: text
    content: He gave
  - type: text
    content: ' of gold by weight for '
  - type: text
    content: things
  - type: text
    content: ' of gold, for all instruments of all manner of service; '
  - type: text
    content: silver also
  - type: text
    content: ' for all instruments of silver by weight, for all instruments of every kind of service: '
  '15':
  - type: text
    content: 'even the weight for the candlesticks of gold, and for their lamps of gold, by weight for every candlestick, and for the lamps thereof: and for the candlesticks of silver by weight, '
  - type: text
    content: both
  - type: text
    content: ' for the candlestick, and '
  - type: text
    content: also
  - type: text
    content: ' for the lamps thereof, according to the use of every candlestick. '
  '16':
  - type: text
    content: 'And by weight '
  - type: text
    content: he gave
  - type: text
    content: ' gold for the tables of shewbread, for every table; and '
  - type: text
    content: likewise
  - type: text
    content: ' silver for the tables of silver: '
  '17':
  - type: text
    content: 'also pure gold for the fleshhooks, and the bowls, and the cups: and for the golden basons '
  - type: text
    content: he gave gold
  - type: text
    content: ' by weight for every bason; and '
  - type: text
    content: likewise silver
  - type: text
    content: ' by weight for every bason of silver: '
  '18':
  - type: text
    content: 'and for the altar of incense refined gold by weight; and gold for the pattern of the chariot of the cherubims, that spread out '
  - type: text
    content: their wings
  - type: text
    content: ', and covered the ark of the covenant of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'All '
  - type: text
    content: this, said David
  - type: text
    content: ', the '
  - type: text
    content: LORD
  - type: text
    content: ' made me understand in writing by '
  - type: text
    content: his
  - type: text
    content: ' hand upon me, '
  - type: text
    content: even
  - type: text
    content: ' all the works of this pattern.'
  '2':
  - type: text
    content: 'Then David the king stood up upon his feet, and said, Hear me, my brethren, and my people: '
  - type: text
    content: As for me
  - type: text
    content: ', I '
  - type: text
    content: had
  - type: text
    content: ' in mine heart to build an house of rest for the ark of the covenant of the '
  - type: text
    content: LORD
  - type: text
    content: ', and for the footstool of our God, and had made ready for the building: '
  '20':
  - type: text
    content: 'And David said to Solomon his son, Be strong and of good courage, and do '
  - type: text
    content: 'it:'
  - type: text
    content: ' fear not, nor be dismayed: for the '
  - type: text
    content: LORD
  - type: text
    content: ' God, '
  - type: text
    content: even
  - type: text
    content: ' my God, '
  - type: text
    content: will be
  - type: text
    content: ' with thee; he will not fail thee, nor forsake thee, until thou hast finished all the work for the service of the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'And, behold, the courses of the priests and the Levites, '
  - type: text
    content: even they shall be with thee
  - type: text
    content: ' for all the service of the house of God: and '
  - type: text
    content: there shall be
  - type: text
    content: ' with thee for all manner of workmanship every willing skilful man, for any manner of service: also the princes and all the people '
  - type: text
    content: will be
  - type: text
    content: ' wholly at thy commandment.'
  '3':
  - type: text
    content: 'but God said unto me, Thou shalt not build an house for my name, because thou '
  - type: text
    content: hast been
  - type: text
    content: ' a man of war, and hast shed blood. '
  '4':
  - type: text
    content: 'Howbeit the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel chose me before all the house of my father to be king over Israel for ever: for he hath chosen Judah '
  - type: text
    content: to be
  - type: text
    content: ' the ruler; and of the house of Judah, the house of my father; and among the sons of my father he liked me to make '
  - type: text
    content: me
  - type: text
    content: ' king over all Israel: '
  '5':
  - type: text
    content: 'and of all my sons, (for the '
  - type: text
    content: LORD
  - type: text
    content: ' hath given me many sons,) he hath chosen Solomon my son to sit upon the throne of the kingdom of the '
  - type: text
    content: LORD
  - type: text
    content: ' over Israel. '
  '6':
  - type: text
    content: 'And he said unto me, Solomon thy son, he shall build my house and my courts: for I have chosen him '
  - type: text
    content: to be
  - type: text
    content: ' my son, and I will be his father. '
  '7':
  - type: text
    content: 'Moreover I will establish his kingdom for ever, if he be constant to do my commandments and my judgments, as at this day. '
  '8':
  - type: text
    content: 'Now therefore in the sight of all Israel the congregation of the '
  - type: text
    content: LORD
  - type: text
    content: ', and in the audience of our God, keep and seek for all the commandments of the '
  - type: text
    content: LORD
  - type: text
    content: ' your God: that ye may possess this good land, and leave '
  - type: text
    content: it
  - type: text
    content: ' for an inheritance for your children after you for ever.'
  '9':
  - type: text
    content: 'And thou, Solomon my son, know thou the God of thy father, and serve him with a perfect heart and with a willing mind: for the '
  - type: text
    content: LORD
  - type: text
    content: ' searcheth all hearts, and understandeth all the imaginations of the thoughts: if thou seek him, he will be found of thee; but if thou forsake him, he will cast thee off for ever. '
