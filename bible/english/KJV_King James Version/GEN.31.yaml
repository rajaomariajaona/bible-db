document_id: GEN.31,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he heard the words of Laban''s sons, saying, Jacob hath taken away all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' our father''s; and of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' our father''s hath he gotten all this glory. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass at the time that the cattle conceived, that I lifted up mine eyes, and saw in a dream, and, behold, the rams which leaped upon the cattle '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' ringstraked, speckled, and grisled. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the angel of God spake unto me in a dream, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: saying
    - type: text
      text: ', Jacob: And I said, Here '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' I. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, Lift up now thine eyes, and see, all the rams which leap upon the cattle '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' ringstraked, speckled, and grisled: for I have seen all that Laban doeth unto thee. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the God of Beth-el, where thou anointedst the pillar, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' where thou vowedst a vow unto me: now arise, get thee out from this land, and return unto the land of thy kindred. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Rachel and Leah answered and said unto him, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is there
    - type: text
      text: ' yet any portion or inheritance for us in our father''s house? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Are we not counted of him strangers? for he hath sold us, and hath quite devoured also our money. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For all the riches which God hath taken from our father, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' our''s, and our children''s: now then, whatsoever God hath said unto thee, do.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jacob rose up, and set his sons and his wives upon camels; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he carried away all his cattle, and all his goods which he had gotten, the cattle of his getting, which he had gotten in Padan-aram, for to go to Isaac his father in the land of Canaan. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Laban went to shear his sheep: and Rachel had stolen the images that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' her father''s. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jacob beheld the countenance of Laban, and, behold, it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' not toward him as before. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jacob stole away unawares to Laban the Syrian, in that he told him not that he fled. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he fled with all that he had; and he rose up, and passed over the river, and set his face '
    - type: usfm
      marker: add
      children:
      - type: text
        text: toward
    - type: text
      text: ' the mount Gilead.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it was told Laban on the third day that Jacob was fled. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he took his brethren with him, and pursued after him seven days'' journey; and they overtook him in the mount Gilead. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And God came to Laban the Syrian in a dream by night, and said unto him, Take heed that thou speak not to Jacob either good or bad.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Laban overtook Jacob. Now Jacob had pitched his tent in the mount: and Laban with his brethren pitched in the mount of Gilead. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Laban said to Jacob, What hast thou done, that thou hast stolen away unawares to me, and carried away my daughters, as captives '
    - type: usfm
      marker: add
      children:
      - type: text
        text: taken
    - type: text
      text: ' with the sword? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wherefore didst thou flee away secretly, and steal away from me; and didst not tell me, that I might have sent thee away with mirth, and with songs, with tabret, and with harp? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And hast not suffered me to kiss my sons and my daughters? thou hast now done foolishly in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' doing. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It is in the power of my hand to do you hurt: but the God of your father spake unto me yesternight, saying, Take thou heed that thou speak not to Jacob either good or bad. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Jacob, Return unto the land of thy fathers, and to thy kindred; and I will be with thee.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: though
    - type: text
      text: ' thou wouldest needs be gone, because thou sore longedst after thy father''s house, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yet
    - type: text
      text: ' wherefore hast thou stolen my gods? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jacob answered and said to Laban, Because I was afraid: for I said, Peradventure thou wouldest take by force thy daughters from me. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'With whomsoever thou findest thy gods, let him not live: before our brethren discern thou what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thine with me, and take '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to thee. For Jacob knew not that Rachel had stolen them.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Laban went into Jacob''s tent, and into Leah''s tent, and into the two maidservants'' tents; but he found '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' not. Then went he out of Leah''s tent, and entered into Rachel''s tent. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Rachel had taken the images, and put them in the camel''s furniture, and sat upon them. And Laban searched all the tent, but found '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' not. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And she said to her father, Let it not displease my lord that I cannot rise up before thee; for the custom of women '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' upon me. And he searched, but found not the images.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jacob was wroth, and chode with Laban: and Jacob answered and said to Laban, What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my trespass? what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my sin, that thou hast so hotly pursued after me? '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whereas thou hast searched all my stuff, what hast thou found of all thy household stuff? set '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' here before my brethren and thy brethren, that they may judge betwixt us both. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This twenty years '
    - type: usfm
      marker: add
      children:
      - type: text
        text: have
    - type: text
      text: ' I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: been
    - type: text
      text: ' with thee; thy ewes and thy she goats have not cast their young, and the rams of thy flock have I not eaten. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That which was torn '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of beasts
    - type: text
      text: ' I brought not unto thee; I bare the loss of it; of my hand didst thou require it, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whether
    - type: text
      text: ' stolen by day, or stolen by night. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jacob sent and called Rachel and Leah to the field unto his flock, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Thus
    - type: text
      text: ' I was; in the day the drought consumed me, and the frost by night; and my sleep departed from mine eyes. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus have I been twenty years in thy house; I served thee fourteen years for thy two daughters, and six years for thy cattle: and thou hast changed my wages ten times. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Except the God of my father, the God of Abraham, and the fear of Isaac, had been with me, surely thou hadst sent me away now empty. God hath seen mine affliction and the labour of my hands, and rebuked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thee
    - type: text
      text: ' yesternight.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Laban answered and said unto Jacob, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: These
    - type: text
      text: ' daughters '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' my daughters, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: these
    - type: text
      text: ' children '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' my children, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: these
    - type: text
      text: ' cattle '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' my cattle, and all that thou seest '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' mine: and what can I do this day unto these my daughters, or unto their children which they have born? '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now therefore come thou, let us make a covenant, I and thou; and let it be for a witness between me and thee.
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jacob took a stone, and set it up '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a pillar. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jacob said unto his brethren, Gather stones; and they took stones, and made an heap: and they did eat there upon the heap. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Laban called it Jegar-sahadutha: but Jacob called it Galeed. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Laban said, This heap '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a witness between me and thee this day. Therefore was the name of it called Galeed; '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Mizpah; for he said, The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' watch between me and thee, when we are absent one from another. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said unto them, I see your father''s countenance, that it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not toward me as before; but the God of my father hath been with me. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If thou shalt afflict my daughters, or if thou shalt take '
    - type: usfm
      marker: add
      children:
      - type: text
        text: other
    - type: text
      text: ' wives beside my daughters, no man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' with us; see, God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' witness betwixt me and thee. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Laban said to Jacob, Behold this heap, and behold '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ' pillar, which I have cast betwixt me and thee; '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'this heap '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' witness, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ' pillar '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' witness, that I will not pass over this heap to thee, and that thou shalt not pass over this heap and this pillar unto me, for harm. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The God of Abraham, and the God of Nahor, the God of their father, judge betwixt us. And Jacob sware by the fear of his father Isaac.
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jacob offered sacrifice upon the mount, and called his brethren to eat bread: and they did eat bread, and tarried all night in the mount. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And early in the morning Laban rose up, and kissed his sons and his daughters, and blessed them: and Laban departed, and returned unto his place.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And ye know that with all my power I have served your father. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And your father hath deceived me, and changed my wages ten times; but God suffered him not to hurt me. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If he said thus, The speckled shall be thy wages; then all the cattle bare speckled: and if he said thus, The ringstraked shall be thy hire; then bare all the cattle ringstraked. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus God hath taken away the cattle of your father, and given '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' to me. '
