document_id: HEB.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Let us therefore fear, lest, a promise being left '
  - type: usfm
    marker: add
    children:
    - type: text
      text: us
  - type: text
    text: ' of entering into his rest, any of you should seem to come short of it. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For unto us was the gospel preached, as well as unto them: but the word preached did not profit them, not being mixed with faith in them that heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For we which have believed do enter into rest, as he said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: As I have sworn in my wrath,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'If they shall enter into my rest:'
- type: usfm
  marker: m
  children:
  - type: text
    text: 'although the works were finished from the foundation of the world. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For he spake in a certain place of the seventh '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' on this wise, And God did rest the seventh day from all his works. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And in this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: place
  - type: text
    text: ' again,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: If they shall enter into my rest.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Seeing therefore it remaineth that some must enter therein, and they to whom it was first preached entered not in because of unbelief: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: again, he limiteth a certain day, saying in David, To day, after so long a time; as it is said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To day if ye will hear his voice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Harden not your hearts.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For if Jesus had given them rest, then would he not afterward have spoken of another day. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'There remaineth therefore a rest to the people of God. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For he that is entered into his rest, he also hath ceased from his own works, as God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: did
  - type: text
    text: ' from his. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Let us labour therefore to enter into that rest, lest any man fall after the same example of unbelief. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For the word of God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' quick, and powerful, and sharper than any twoedged sword, piercing even to the dividing asunder of soul and spirit, and of the joints and marrow, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a discerner of the thoughts and intents of the heart. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Neither is there any creature that is not manifest in his sight: but all things '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' naked and opened unto the eyes of him with whom we have to do.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Jesus our Great High Priest
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Seeing then that we have a great high priest, that is passed into the heavens, Jesus the Son of God, let us hold fast '
  - type: usfm
    marker: add
    children:
    - type: text
      text: our
  - type: text
    text: ' profession. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For we have not an high priest which cannot be touched with the feeling of our infirmities; but was in all points tempted like as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: we are, yet
  - type: text
    text: ' without sin. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Let us therefore come boldly unto the throne of grace, that we may obtain mercy, and find grace to help in time of need.
