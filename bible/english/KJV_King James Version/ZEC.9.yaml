document_id: ZEC.9,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The City of God
  - type: heading
    content: Look to the Lord
  - type: text
    content: 'The burden of the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' in the land of Hadrach, and Damascus '
  - type: text
    content: shall be
  - type: text
    content: ' the rest thereof: when the eyes of man, as of all the tribes of Israel, '
  - type: text
    content: shall be
  - type: text
    content: ' toward the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'And I will cut off the chariot from Ephraim, and the horse from Jerusalem, and the battle bow shall be cut off: and he shall speak peace unto the heathen: and his dominion '
  - type: text
    content: shall be
  - type: text
    content: ' from sea '
  - type: text
    content: even
  - type: text
    content: ' to sea, and from the river '
  - type: text
    content: even
  - type: text
    content: ' to the ends of the earth.'
  '11':
  - type: text
    content: 'As for thee also, by the blood of thy covenant I have sent forth thy prisoners out of the pit wherein '
  - type: text
    content: is
  - type: text
    content: ' no water. '
  '12':
  - type: text
    content: 'Turn you to the strong hold, ye prisoners of hope: even to day do I declare '
  - type: text
    content: that
  - type: text
    content: ' I will render double unto thee; '
  '13':
  - type: text
    content: 'when I have bent Judah for me, filled the bow with Ephraim, and raised up thy sons, O Zion, against thy sons, O Greece, and made thee as the sword of a mighty man. '
  '14':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' shall be seen over them, and his arrow shall go forth as the lightning: and the Lord '
  - type: text
    content: GOD
  - type: text
    content: ' shall blow the trumpet, and shall go with whirlwinds of the south.'
  - type: heading
    content: He Will Save His People
  '15':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts shall defend them; and they shall devour, and subdue with sling stones; and they shall drink, '
  - type: text
    content: and
  - type: text
    content: ' make a noise as through wine; and they shall be filled like bowls, '
  - type: text
    content: and
  - type: text
    content: ' as the corners of the altar. '
  '16':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' their God shall save them in that day as the flock of his people: for '
  - type: text
    content: they shall be as
  - type: text
    content: ' the stones of a crown, lifted up as an ensign upon his land. '
  '17':
  - type: text
    content: 'For how great '
  - type: text
    content: is
  - type: text
    content: ' his goodness, and how great '
  - type: text
    content: is
  - type: text
    content: ' his beauty! corn shall make the young men cheerful, and new wine the maids.'
  '2':
  - type: text
    content: 'And Hamath also shall border thereby; Tyrus, and Zidon, though it be very wise. '
  '3':
  - type: text
    content: 'And Tyrus did build herself a strong hold, and heaped up silver as the dust, and fine gold as the mire of the streets. '
  '4':
  - type: text
    content: Behold, the Lord will cast her out, and he will smite her power in the sea; and she shall be devoured with fire.
  '5':
  - type: text
    content: 'Ashkelon shall see '
  - type: text
    content: it
  - type: text
    content: ', and fear; Gaza also '
  - type: text
    content: shall see it
  - type: text
    content: ', and be very sorrowful, and Ekron; for her expectation shall be ashamed; and the king shall perish from Gaza, and Ashkelon shall not be inhabited. '
  '6':
  - type: text
    content: 'And a bastard shall dwell in Ashdod, and I will cut off the pride of the Philistines. '
  '7':
  - type: text
    content: 'And I will take away his blood out of his mouth, and his abominations from between his teeth: but he that remaineth, even he, '
  - type: text
    content: shall be
  - type: text
    content: ' for our God, and he shall be as a governor in Judah, and Ekron as a Jebusite.'
  '8':
  - type: text
    content: 'And I will encamp about mine house because of the army, because of him that passeth by, and because of him that returneth: and no oppressor shall pass through them any more: for now have I seen with mine eyes.'
  - type: heading
    content: The King of Peace
  '9':
  - type: text
    content: 'Rejoice greatly, O daughter of Zion; shout, O daughter of Jerusalem: behold, thy King cometh unto thee: he '
  - type: text
    content: is
  - type: text
    content: ' just, and having salvation; lowly, and riding upon an ass, and upon a colt the foal of an ass. '
