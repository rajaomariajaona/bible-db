document_id: ZEC.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The City of God
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Look to the Lord
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The burden of the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' in the land of Hadrach, and Damascus '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the rest thereof: when the eyes of man, as of all the tribes of Israel, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' toward the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Hamath also shall border thereby; Tyrus, and Zidon, though it be very wise. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Tyrus did build herself a strong hold, and heaped up silver as the dust, and fine gold as the mire of the streets. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Behold, the Lord will cast her out, and he will smite her power in the sea; and she shall be devoured with fire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ashkelon shall see '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and fear; Gaza also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall see it
  - type: text
    text: ', and be very sorrowful, and Ekron; for her expectation shall be ashamed; and the king shall perish from Gaza, and Ashkelon shall not be inhabited. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And a bastard shall dwell in Ashdod, and I will cut off the pride of the Philistines. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And I will take away his blood out of his mouth, and his abominations from between his teeth: but he that remaineth, even he, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' for our God, and he shall be as a governor in Judah, and Ekron as a Jebusite.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And I will encamp about mine house because of the army, because of him that passeth by, and because of him that returneth: and no oppressor shall pass through them any more: for now have I seen with mine eyes.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The King of Peace
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Rejoice greatly, O daughter of Zion; shout, O daughter of Jerusalem: behold, thy King cometh unto thee: he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' just, and having salvation; lowly, and riding upon an ass, and upon a colt the foal of an ass. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And I will cut off the chariot from Ephraim, and the horse from Jerusalem, and the battle bow shall be cut off: and he shall speak peace unto the heathen: and his dominion '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' from sea '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to sea, and from the river '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to the ends of the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'As for thee also, by the blood of thy covenant I have sent forth thy prisoners out of the pit wherein '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' no water. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Turn you to the strong hold, ye prisoners of hope: even to day do I declare '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' I will render double unto thee; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'when I have bent Judah for me, filled the bow with Ephraim, and raised up thy sons, O Zion, against thy sons, O Greece, and made thee as the sword of a mighty man. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall be seen over them, and his arrow shall go forth as the lightning: and the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' shall blow the trumpet, and shall go with whirlwinds of the south.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: He Will Save His People
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts shall defend them; and they shall devour, and subdue with sling stones; and they shall drink, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' make a noise as through wine; and they shall be filled like bowls, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' as the corners of the altar. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' their God shall save them in that day as the flock of his people: for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they shall be as
  - type: text
    text: ' the stones of a crown, lifted up as an ensign upon his land. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For how great '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' his goodness, and how great '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' his beauty! corn shall make the young men cheerful, and new wine the maids.'
