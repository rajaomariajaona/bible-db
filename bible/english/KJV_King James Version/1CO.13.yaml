document_id: 1CO.13,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The More Excellent Way
  - type: text
    content: 'Though I speak with the tongues of men and of angels, and have not charity, I am become '
  - type: text
    content: as
  - type: text
    content: ' sounding brass, or a tinkling cymbal. '
  '10':
  - type: text
    content: 'But when that which is perfect is come, then that which is in part shall be done away. '
  '11':
  - type: text
    content: 'When I was a child, I spake as a child, I understood as a child, I thought as a child: but when I became a man, I put away childish things. '
  '12':
  - type: text
    content: 'For now we see through a glass, darkly; but then face to face: now I know in part; but then shall I know even as also I am known. '
  '13':
  - type: text
    content: 'And now abideth faith, hope, charity, these three; but the greatest of these '
  - type: text
    content: is
  - type: text
    content: ' charity.'
  '2':
  - type: text
    content: 'And though I have '
  - type: text
    content: the gift of
  - type: text
    content: ' prophecy, and understand all mysteries, and all knowledge; and though I have all faith, so that I could remove mountains, and have not charity, I am nothing. '
  '3':
  - type: text
    content: 'And though I bestow all my goods to feed '
  - type: text
    content: the poor
  - type: text
    content: ', and though I give my body to be burned, and have not charity, it profiteth me nothing. '
  '4':
  - type: text
    content: 'Charity suffereth long, '
  - type: text
    content: and
  - type: text
    content: ' is kind; charity envieth not; charity vaunteth not itself, is not puffed up, '
  '5':
  - type: text
    content: 'doth not behave itself unseemly, seeketh not her own, is not easily provoked, thinketh no evil; '
  '6':
  - type: text
    content: 'rejoiceth not in iniquity, but rejoiceth in the truth; '
  '7':
  - type: text
    content: 'beareth all things, believeth all things, hopeth all things, endureth all things. '
  '8':
  - type: text
    content: 'Charity never faileth: but whether '
  - type: text
    content: there be
  - type: text
    content: ' prophecies, they shall fail; whether '
  - type: text
    content: there be
  - type: text
    content: ' tongues, they shall cease; whether '
  - type: text
    content: there be
  - type: text
    content: ' knowledge, it shall vanish away. '
  '9':
  - type: text
    content: 'For we know in part, and we prophesy in part. '
