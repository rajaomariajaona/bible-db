document_id: 1CO.13,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The More Excellent Way
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Though I speak with the tongues of men and of angels, and have not charity, I am become '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' sounding brass, or a tinkling cymbal. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when that which is perfect is come, then that which is in part shall be done away. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When I was a child, I spake as a child, I understood as a child, I thought as a child: but when I became a man, I put away childish things. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For now we see through a glass, darkly; but then face to face: now I know in part; but then shall I know even as also I am known. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now abideth faith, hope, charity, these three; but the greatest of these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' charity.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And though I have '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the gift of
    - type: text
      text: ' prophecy, and understand all mysteries, and all knowledge; and though I have all faith, so that I could remove mountains, and have not charity, I am nothing. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And though I bestow all my goods to feed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the poor
    - type: text
      text: ', and though I give my body to be burned, and have not charity, it profiteth me nothing. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Charity suffereth long, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' is kind; charity envieth not; charity vaunteth not itself, is not puffed up, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'doth not behave itself unseemly, seeketh not her own, is not easily provoked, thinketh no evil; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'rejoiceth not in iniquity, but rejoiceth in the truth; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'beareth all things, believeth all things, hopeth all things, endureth all things. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Charity never faileth: but whether '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there be
    - type: text
      text: ' prophecies, they shall fail; whether '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there be
    - type: text
      text: ' tongues, they shall cease; whether '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there be
    - type: text
      text: ' knowledge, it shall vanish away. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For we know in part, and we prophesy in part. '
