document_id: 1CO.11
type_code: eng
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Be ye followers of me, even as I also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' of Christ.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Christian Worship
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Now I praise you, brethren, that ye remember me in all things, and keep the ordinances, as I delivered '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But I would have you know, that the head of every man is Christ; and the head of the woman '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the man; and the head of Christ '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' God. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Every man praying or prophesying, having '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' head covered, dishonoureth his head. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But every woman that prayeth or prophesieth with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her
  - type: text
    text: ' head uncovered dishonoureth her head: for that is even all one as if she were shaven. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For if the woman be not covered, let her also be shorn: but if it be a shame for a woman to be shorn or shaven, let her be covered. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For a man indeed ought not to cover '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' head, forasmuch as he is the image and glory of God: but the woman is the glory of the man. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For the man is not of the woman; but the woman of the man. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Neither was the man created for the woman; but the woman for the man. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For this cause ought the woman to have power on '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her
  - type: text
    text: ' head because of the angels. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nevertheless neither is the man without the woman, neither the woman without the man, in the Lord. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For as the woman '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' of the man, even so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the man also by the woman; but all things of God. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Judge in yourselves: is it comely that a woman pray unto God uncovered? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Doth not even nature itself teach you, that, if a man have long hair, it is a shame unto him? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But if a woman have long hair, it is a glory to her: for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her
  - type: text
    text: ' hair is given her for a covering. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But if any man seem to be contentious, we have no such custom, neither the churches of God.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Lord's Supper
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now in this that I declare '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unto you
  - type: text
    text: ' I praise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: ' not, that ye come together not for the better, but for the worse. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For first of all, when ye come together in the church, I hear that there be divisions among you; and I partly believe it. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For there must be also heresies among you, that they which are approved may be made manifest among you. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'When ye come together therefore into one place, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' is not to eat the Lord''s supper. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For in eating every one taketh before '
  - type: usfm
    marker: add
    children:
    - type: text
      text: other
  - type: text
    text: ' his own supper: and one is hungry, and another is drunken. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'What? have ye not houses to eat and to drink in? or despise ye the church of God, and shame them that have not? What shall I say to you? shall I praise you in this? I praise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: ' not. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For I have received of the Lord that which also I delivered unto you, That the Lord Jesus the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: same
  - type: text
    text: ' night in which he was betrayed took bread: '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and when he had given thanks, he brake '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Take, eat: this is my body, which is broken for you: this do in remembrance of me.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'After the same manner also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he took
  - type: text
    text: ' the cup, when he had supped, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'This cup is the new testament in my blood: this do ye, as oft as ye drink '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', in remembrance of me.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'For as often as ye eat this bread, and drink this cup, ye do shew the Lord''s death till he come. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Wherefore whosoever shall eat this bread, and drink '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' cup of the Lord, unworthily, shall be guilty of the body and blood of the Lord. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'But let a man examine himself, and so let him eat of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' bread, and drink of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' cup. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'For he that eateth and drinketh unworthily, eateth and drinketh damnation to himself, not discerning the Lord''s body. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'For this cause many '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' weak and sickly among you, and many sleep. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'For if we would judge ourselves, we should not be judged. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'But when we are judged, we are chastened of the Lord, that we should not be condemned with the world. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Wherefore, my brethren, when ye come together to eat, tarry one for another. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: And if any man hunger, let him eat at home; that ye come not together unto condemnation. And the rest will I set in order when I come.
