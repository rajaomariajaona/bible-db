  '31':
  - type: text
    content: 'For if we would judge ourselves, we should not be judged. '
  '32':
  - type: text
    content: 'But when we are judged, we are chastened of the Lord, that we should not be condemned with the world. '
  '33':
  - type: text
    content: 'Wherefore, my brethren, when ye come together to eat, tarry one for another. '
  '34':
  - type: text
    content: And if any man hunger, let him eat at home; that ye come not together unto condemnation. And the rest will I set in order when I come.
