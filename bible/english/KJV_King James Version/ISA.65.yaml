document_id: ISA.65,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'I am sought of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them that
    - type: text
      text: ' asked not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for me
    - type: text
      text: '; I am found of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them that
    - type: text
      text: ' sought me not: I said, Behold me, behold me, unto a nation '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' was not called by my name. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And Sharon shall be a fold of flocks, and the valley of Achor a place for the herds to lie down in, for my people that have sought me. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' they that forsake the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', that forget my holy mountain, that prepare a table for that troop, and that furnish the drink offering unto that number. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Therefore will I number you to the sword, and ye shall all bow down to the slaughter: because when I called, ye did not answer; when I spake, ye did not hear; but did evil before mine eyes, and did choose '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' wherein I delighted not.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Therefore thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ', Behold, my servants shall eat, but ye shall be hungry: behold, my servants shall drink, but ye shall be thirsty: behold, my servants shall rejoice, but ye shall be ashamed: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'behold, my servants shall sing for joy of heart, but ye shall cry for sorrow of heart, and shall howl for vexation of spirit. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And ye shall leave your name for a curse unto my chosen: for the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ' shall slay thee, and call his servants by another name: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: that he who blesseth himself in the earth shall bless himself in the God of truth; and he that sweareth in the earth shall swear by the God of truth; because the former troubles are forgotten, and because they are hid from mine eyes.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For, behold, I create new heavens and a new earth: and the former shall not be remembered, nor come into mind. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'But be ye glad and rejoice for ever '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in that
    - type: text
      text: ' which I create: for, behold, I create Jerusalem a rejoicing, and her people a joy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And I will rejoice in Jerusalem, and joy in my people: and the voice of weeping shall be no more heard in her, nor the voice of crying. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'I have spread out my hands all the day unto a rebellious people, which walketh in a way '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that was
    - type: text
      text: ' not good, after their own thoughts; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'There shall be no more thence an infant of days, nor an old man that hath not filled his days: for the child shall die an hundred years old; but the sinner '
    - type: usfm
      marker: add
      children:
      - type: text
        text: being
    - type: text
      text: ' an hundred years old shall be accursed. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And they shall build houses, and inhabit '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: '; and they shall plant vineyards, and eat the fruit of them. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'They shall not build, and another inhabit; they shall not plant, and another eat: for as the days of a tree '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the days of my people, and mine elect shall long enjoy the work of their hands. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'They shall not labour in vain, nor bring forth for trouble; for they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the seed of the blessed of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and their offspring with them. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And it shall come to pass, that before they call, I will answer; and while they are yet speaking, I will hear. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'The wolf and the lamb shall feed together, and the lion shall eat straw like the bullock: and dust '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' the serpent''s meat. They shall not hurt nor destroy in all my holy mountain, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'a people that provoketh me to anger continually to my face; that sacrificeth in gardens, and burneth incense upon altars of brick; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'which remain among the graves, and lodge in the monuments, which eat swine''s flesh, and broth of abominable '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things is in
    - type: text
      text: ' their vessels; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'which say, Stand by thyself, come not near to me; for I am holier than thou. These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' a smoke in my nose, a fire that burneth all the day. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' written before me: I will not keep silence, but will recompense, even recompense into their bosom, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'your iniquities, and the iniquities of your fathers together, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', which have burned incense upon the mountains, and blasphemed me upon the hills: therefore will I measure their former work into their bosom.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', As the new wine is found in the cluster, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' saith, Destroy it not; for a blessing '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in it: so will I do for my servants'' sakes, that I may not destroy them all. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And I will bring forth a seed out of Jacob, and out of Judah an inheritor of my mountains: and mine elect shall inherit it, and my servants shall dwell there. '
