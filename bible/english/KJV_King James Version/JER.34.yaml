document_id: JER.34,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Rebukes the King
  - type: text
    content: 'The word which came unto Jeremiah from the '
  - type: text
    content: LORD
  - type: text
    content: ', when Nebuchadnezzar king of Babylon, and all his army, and all the kingdoms of the earth of his dominion, and all the people, fought against Jerusalem, and against all the cities thereof, saying, '
  '10':
  - type: text
    content: 'Now when all the princes, and all the people, which had entered into the covenant, heard that every one should let his manservant, and every one his maidservant, go free, that none should serve themselves of them any more, then they obeyed, and let '
  - type: text
    content: them
  - type: text
    content: ' go. '
  '11':
  - type: text
    content: But afterward they turned, and caused the servants and the handmaids, whom they had let go free, to return, and brought them into subjection for servants and for handmaids.
  '12':
  - type: text
    content: 'Therefore the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came to Jeremiah from the '
  - type: text
    content: LORD
  - type: text
    content: ', saying, '
  '13':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', the God of Israel; I made a covenant with your fathers in the day that I brought them forth out of the land of Egypt, out of the house of bondmen, saying, '
  '14':
  - type: text
    content: 'at the end of seven years let ye go every man his brother an Hebrew, which hath been sold unto thee; and when he hath served thee six years, thou shalt let him go free from thee: but your fathers hearkened not unto me, neither inclined their ear. '
  '15':
  - type: text
    content: 'And ye were now turned, and had done right in my sight, in proclaiming liberty every man to his neighbour; and ye had made a covenant before me in the house which is called by my name: '
  '16':
  - type: text
    content: but ye turned and polluted my name, and caused every man his servant, and every man his handmaid, whom he had set at liberty at their pleasure, to return, and brought them into subjection, to be unto you for servants and for handmaids.
  '17':
  - type: text
    content: 'Therefore thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Ye have not hearkened unto me, in proclaiming liberty, every one to his brother, and every man to his neighbour: behold, I proclaim a liberty for you, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', to the sword, to the pestilence, and to the famine; and I will make you to be removed into all the kingdoms of the earth. '
  '18':
  - type: text
    content: 'And I will give the men that have transgressed my covenant, which have not performed the words of the covenant which they had made before me, when they cut the calf in twain, and passed between the parts thereof, '
  '19':
  - type: text
    content: 'the princes of Judah, and the princes of Jerusalem, the eunuchs, and the priests, and all the people of the land, which passed between the parts of the calf; '
  '2':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', the God of Israel; Go and speak to Zedekiah king of Judah, and tell him, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Behold, I will give this city into the hand of the king of Babylon, and he shall burn it with fire: '
  '20':
  - type: text
    content: 'I will even give them into the hand of their enemies, and into the hand of them that seek their life: and their dead bodies shall be for meat unto the fowls of the heaven, and to the beasts of the earth. '
  '21':
  - type: text
    content: 'And Zedekiah king of Judah and his princes will I give into the hand of their enemies, and into the hand of them that seek their life, and into the hand of the king of Babylon''s army, which are gone up from you. '
  '22':
  - type: text
    content: 'Behold, I will command, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', and cause them to return to this city; and they shall fight against it, and take it, and burn it with fire: and I will make the cities of Judah a desolation without an inhabitant.'
  '3':
  - type: text
    content: 'and thou shalt not escape out of his hand, but shalt surely be taken, and delivered into his hand; and thine eyes shall behold the eyes of the king of Babylon, and he shall speak with thee mouth to mouth, and thou shalt go to Babylon. '
  '4':
  - type: text
    content: 'Yet hear the word of the '
  - type: text
    content: LORD
  - type: text
    content: ', O Zedekiah king of Judah; Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of thee, Thou shalt not die by the sword: '
  '5':
  - type: text
    content: but
  - type: text
    content: ' thou shalt die in peace: and with the burnings of thy fathers, the former kings which were before thee, so shall they burn '
  - type: text
    content: odours
  - type: text
    content: ' for thee; and they will lament thee, '
  - type: text
    content: saying
  - type: text
    content: ', Ah lord! for I have pronounced the word, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '6':
  - type: text
    content: 'Then Jeremiah the prophet spake all these words unto Zedekiah king of Judah in Jerusalem, '
  '7':
  - type: text
    content: 'when the king of Babylon''s army fought against Jerusalem, and against all the cities of Judah that were left, against Lachish, and against Azekah: for these defenced cities remained of the cities of Judah.'
  '8':
  - type: text
    content: ' '
  - type: text
    content: This is
  - type: text
    content: ' the word that came unto Jeremiah from the '
  - type: text
    content: LORD
  - type: text
    content: ', after that the king Zedekiah had made a covenant with all the people which '
  - type: text
    content: were
  - type: text
    content: ' at Jerusalem, to proclaim liberty unto them; '
  '9':
  - type: text
    content: 'that every man should let his manservant, and every man his maidservant, '
  - type: text
    content: being
  - type: text
    content: ' an Hebrew or an Hebrewess, go free; that none should serve himself of them, '
  - type: text
    content: to wit
  - type: text
    content: ', of a Jew his brother. '
