document_id: 1SA.11,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then Nahash the Ammonite came up, and encamped against Jabesh-gilead: and all the men of Jabesh said unto Nahash, Make a covenant with us, and we will serve thee. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Therefore the men of Jabesh said, To morrow we will come out unto you, and ye shall do with us all that seemeth good unto you. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And it was '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' on the morrow, that Saul put the people in three companies; and they came into the midst of the host in the morning watch, and slew the Ammonites until the heat of the day: and it came to pass, that they which remained were scattered, so that two of them were not left together.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And the people said unto Samuel, Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' he that said, Shall Saul reign over us? bring the men, that we may put them to death. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And Saul said, There shall not a man be put to death this day: for to day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath wrought salvation in Israel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then said Samuel to the people, Come, and let us go to Gilgal, and renew the kingdom there. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And all the people went to Gilgal; and there they made Saul king before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in Gilgal; and there they sacrificed sacrifices of peace offerings before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ; and there Saul and all the men of Israel rejoiced greatly.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And Nahash the Ammonite answered them, On this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: condition
    - type: text
      text: ' will I make '
    - type: usfm
      marker: add
      children:
      - type: text
        text: a covenant
    - type: text
      text: ' with you, that I may thrust out all your right eyes, and lay it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a reproach upon all Israel. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And the elders of Jabesh said unto him, Give us seven days'' respite, that we may send messengers unto all the coasts of Israel: and then, if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there be
    - type: text
      text: ' no man to save us, we will come out to thee.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then came the messengers to Gibeah of Saul, and told the tidings in the ears of the people: and all the people lifted up their voices, and wept. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And, behold, Saul came after the herd out of the field; and Saul said, What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: aileth
    - type: text
      text: ' the people that they weep? And they told him the tidings of the men of Jabesh.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And the Spirit of God came upon Saul when he heard those tidings, and his anger was kindled greatly. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And he took a yoke of oxen, and hewed them in pieces, and sent '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' throughout all the coasts of Israel by the hands of messengers, saying, Whosoever cometh not forth after Saul and after Samuel, so shall it be done unto his oxen. And the fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' fell on the people, and they came out with one consent. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And when he numbered them in Bezek, the children of Israel were three hundred thousand, and the men of Judah thirty thousand. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And they said unto the messengers that came, Thus shall ye say unto the men of Jabesh-gilead, To morrow, by '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that time
    - type: text
      text: ' the sun be hot, ye shall have help. And the messengers came and shewed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to the men of Jabesh; and they were glad. '
