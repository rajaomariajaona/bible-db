document_id: 1TH.3,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Timothy's Visit
  - type: text
    content: 'Wherefore when we could no longer forbear, we thought it good to be left at Athens alone; '
  '10':
  - type: text
    content: night and day praying exceedingly that we might see your face, and might perfect that which is lacking in your faith?
  '11':
  - type: text
    content: 'Now God himself and our Father, and our Lord Jesus Christ, direct our way unto you. '
  '12':
  - type: text
    content: 'And the Lord make you to increase and abound in love one toward another, and toward all '
  - type: text
    content: men
  - type: text
    content: ', even as we '
  - type: text
    content: do
  - type: text
    content: ' toward you: '
  '13':
  - type: text
    content: to the end he may stablish your hearts unblameable in holiness before God, even our Father, at the coming of our Lord Jesus Christ with all his saints.
  '2':
  - type: text
    content: 'and sent Timotheus, our brother, and minister of God, and our fellowlabourer in the gospel of Christ, to establish you, and to comfort you concerning your faith: '
  '3':
  - type: text
    content: 'that no man should be moved by these afflictions: for yourselves know that we are appointed thereunto. '
  '4':
  - type: text
    content: 'For verily, when we were with you, we told you before that we should suffer tribulation; even as it came to pass, and ye know. '
  '5':
  - type: text
    content: 'For this cause, when I could no longer forbear, I sent to know your faith, lest by some means the tempter have tempted you, and our labour be in vain. '
  '6':
  - type: text
    content: 'But now when Timotheus came from you unto us, and brought us good tidings of your faith and charity, and that ye have good remembrance of us always, desiring greatly to see us, as we also '
  - type: text
    content: to see
  - type: text
    content: ' you: '
  '7':
  - type: text
    content: 'therefore, brethren, we were comforted over you in all our affliction and distress by your faith: '
  '8':
  - type: text
    content: 'for now we live, if ye stand fast in the Lord. '
  '9':
  - type: text
    content: 'For what thanks can we render to God again for you, for all the joy wherewith we joy for your sakes before our God; '
