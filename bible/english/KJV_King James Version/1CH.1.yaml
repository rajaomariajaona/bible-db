document_id: 1CH.1,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Official Lists
  - type: heading
    content: Adam's Descendants
  - type: text
    content: 'Adam, Sheth, Enosh, '
  '10':
  - type: text
    content: 'And Cush begat Nimrod: he began to be mighty upon the earth. '
  '11':
  - type: text
    content: 'And Mizraim begat Ludim, and Anamim, and Lehabim, and Naphtuhim, '
  '12':
  - type: text
    content: 'and Pathrusim, and Casluhim, (of whom came the Philistines,) and Caphtorim. '
  '13':
  - type: text
    content: 'And Canaan begat Zidon his firstborn, and Heth, '
  '14':
  - type: text
    content: 'the Jebusite also, and the Amorite, and the Girgashite, '
  '15':
  - type: text
    content: 'and the Hivite, and the Arkite, and the Sinite, '
  '16':
  - type: text
    content: and the Arvadite, and the Zemarite, and the Hamathite.
  '17':
  - type: text
    content: 'The sons of Shem; Elam, and Asshur, and Arphaxad, and Lud, and Aram, and Uz, and Hul, and Gether, and Meshech. '
  '18':
  - type: text
    content: 'And Arphaxad begat Shelah, and Shelah begat Eber. '
  '19':
  - type: text
    content: 'And unto Eber were born two sons: the name of the one '
  - type: text
    content: was
  - type: text
    content: ' Peleg; because in his days the earth was divided: and his brother''s name '
  - type: text
    content: was
  - type: text
    content: ' Joktan. '
  '2':
  - type: text
    content: 'Kenan, Mahalaleel, Jered, '
  '20':
  - type: text
    content: 'And Joktan begat Almodad, and Sheleph, and Hazarmaveth, and Jerah, '
  '21':
  - type: text
    content: 'Hadoram also, and Uzal, and Diklah, '
  '22':
  - type: text
    content: 'and Ebal, and Abimael, and Sheba, '
  '23':
  - type: text
    content: 'and Ophir, and Havilah, and Jobab. All these '
  - type: text
    content: were
  - type: text
    content: ' the sons of Joktan. '
  '24':
  - type: text
    content: 'Shem, Arphaxad, Shelah, '
  '25':
  - type: text
    content: 'Eber, Peleg, Reu, '
  '26':
  - type: text
    content: 'Serug, Nahor, Terah, '
  '27':
  - type: text
    content: 'Abram; the same '
  - type: text
    content: is
  - type: text
    content: ' Abraham.'
  '28':
  - type: text
    content: 'The sons of Abraham; Isaac, and Ishmael. '
  '29':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' their generations: the firstborn of Ishmael, Nebaioth; then Kedar, and Adbeel, and Mibsam, '
  '3':
  - type: text
    content: 'Henoch, Methuselah, Lamech, '
  '30':
  - type: text
    content: 'Mishma, and Dumah, Massa, Hadad, and Tema, '
  '31':
  - type: text
    content: Jetur, Naphish, and Kedemah. These are the sons of Ishmael.
  '32':
  - type: text
    content: 'Now the sons of Keturah, Abraham''s concubine: she bare Zimran, and Jokshan, and Medan, and Midian, and Ishbak, and Shuah. And the sons of Jokshan; Sheba, and Dedan. '
  '33':
  - type: text
    content: 'And the sons of Midian; Ephah, and Epher, and Henoch, and Abida, and Eldaah. All these '
  - type: text
    content: are
  - type: text
    content: ' the sons of Keturah.'
  '34':
  - type: text
    content: And Abraham begat Isaac. The sons of Isaac; Esau and Israel.
  '35':
  - type: text
    content: 'The sons of Esau; Eliphaz, Reuel, and Jeush, and Jaalam, and Korah. '
  '36':
  - type: text
    content: 'The sons of Eliphaz; Teman, and Omar, Zephi, and Gatam, Kenaz, and Timna, and Amalek. '
  '37':
  - type: text
    content: The sons of Reuel; Nahath, Zerah, Shammah, and Mizzah.
  '38':
  - type: text
    content: 'And the sons of Seir; Lotan, and Shobal, and Zibeon, and Anah, and Dishon, and Ezar, and Dishan. '
  '39':
  - type: text
    content: 'And the sons of Lotan; Hori, and Homam: and Timna '
  - type: text
    content: was
  - type: text
    content: ' Lotan''s sister. '
  '4':
  - type: text
    content: Noah, Shem, Ham, and Japheth.
  '40':
  - type: text
    content: 'The sons of Shobal; Alian, and Manahath, and Ebal, Shephi, and Onam. And the sons of Zibeon; Aiah, and Anah. '
  '41':
  - type: text
    content: 'The sons of Anah; Dishon. And the sons of Dishon; Amram, and Eshban, and Ithran, and Cheran. '
  '42':
  - type: text
    content: 'The sons of Ezer; Bilhan, and Zavan, '
  - type: text
    content: and
  - type: text
    content: ' Jakan. The sons of Dishan; Uz, and Aran.'
  - type: heading
    content: Kings of Edom
  '43':
  - type: text
    content: 'Now these '
  - type: text
    content: are
  - type: text
    content: ' the kings that reigned in the land of Edom before '
  - type: text
    content: any
  - type: text
    content: ' king reigned over the children of Israel; Bela the son of Beor: and the name of his city '
  - type: text
    content: was
  - type: text
    content: ' Dinhabah. '
  '44':
  - type: text
    content: 'And when Bela was dead, Jobab the son of Zerah of Bozrah reigned in his stead. '
  '45':
  - type: text
    content: 'And when Jobab was dead, Husham of the land of the Temanites reigned in his stead. '
  '46':
  - type: text
    content: 'And when Husham was dead, Hadad the son of Bedad, which smote Midian in the field of Moab, reigned in his stead: and the name of his city '
  - type: text
    content: was
  - type: text
    content: ' Avith. '
  '47':
  - type: text
    content: 'And when Hadad was dead, Samlah of Masrekah reigned in his stead. '
  '48':
  - type: text
    content: 'And when Samlah was dead, Shaul of Rehoboth by the river reigned in his stead. '
  '49':
  - type: text
    content: 'And when Shaul was dead, Baal-hanan the son of Achbor reigned in his stead. '
  '5':
  - type: text
    content: 'The sons of Japheth; Gomer, and Magog, and Madai, and Javan, and Tubal, and Meshech, and Tiras. '
  '50':
  - type: text
    content: 'And when Baal-hanan was dead, Hadad reigned in his stead: and the name of his city '
  - type: text
    content: was
  - type: text
    content: ' Pai; and his wife''s name '
  - type: text
    content: was
  - type: text
    content: ' Mehetabel, the daughter of Matred, the daughter of Mezahab. '
  '51':
  - type: text
    content: Hadad died also.
  - type: text
    content: 'And the dukes of Edom were; duke Timnah, duke Aliah, duke Jetheth, '
  '52':
  - type: text
    content: 'duke Aholibamah, duke Elah, duke Pinon, '
  '53':
  - type: text
    content: 'duke Kenaz, duke Teman, duke Mibzar, '
  '54':
  - type: text
    content: 'duke Magdiel, duke Iram. These '
  - type: text
    content: are
  - type: text
    content: ' the dukes of Edom.'
  '6':
  - type: text
    content: 'And the sons of Gomer; Ashchenaz, and Riphath, and Togarmah. '
  '7':
  - type: text
    content: And the sons of Javan; Elishah, and Tarshish, Kittim, and Dodanim.
  '8':
  - type: text
    content: 'The sons of Ham; Cush, and Mizraim, Put, and Canaan. '
  '9':
  - type: text
    content: 'And the sons of Cush; Seba, and Havilah, and Sabta, and Raamah, and Sabtecha. And the sons of Raamah; Sheba, and Dedan. '
