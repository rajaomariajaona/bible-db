document_id: REV.12,1
type_code: eng
verses:
  '1':
  - type: heading
    content: War in Heaven
  - type: text
    content: 'And there appeared a great wonder in heaven; a woman clothed with the sun, and the moon under her feet, and upon her head a crown of twelve stars: '
  '10':
  - type: text
    content: 'And I heard a loud voice saying in heaven, Now is come salvation, and strength, and the kingdom of our God, and the power of his Christ: for the accuser of our brethren is cast down, which accused them before our God day and night. '
  '11':
  - type: text
    content: 'And they overcame him by the blood of the Lamb, and by the word of their testimony; and they loved not their lives unto the death. '
  '12':
  - type: text
    content: 'Therefore rejoice, '
  - type: text
    content: ye
  - type: text
    content: ' heavens, and ye that dwell in them. Woe to the inhabiters of the earth and of the sea! for the devil is come down unto you, having great wrath, because he knoweth that he hath but a short time.'
  '13':
  - type: text
    content: 'And when the dragon saw that he was cast unto the earth, he persecuted the woman which brought forth the man '
  - type: text
    content: child
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'And to the woman were given two wings of a great eagle, that she might fly into the wilderness, into her place, where she is nourished for a time, and times, and half a time, from the face of the serpent. '
  '15':
  - type: text
    content: 'And the serpent cast out of his mouth water as a flood after the woman, that he might cause her to be carried away of the flood. '
  '16':
  - type: text
    content: 'And the earth helped the woman, and the earth opened her mouth, and swallowed up the flood which the dragon cast out of his mouth. '
  '17':
  - type: text
    content: And the dragon was wroth with the woman, and went to make war with the remnant of her seed, which keep the commandments of God, and have the testimony of Jesus Christ.
  '2':
  - type: text
    content: 'and she being with child cried, travailing in birth, and pained to be delivered. '
  '3':
  - type: text
    content: 'And there appeared another wonder in heaven; and behold a great red dragon, having seven heads and ten horns, and seven crowns upon his heads. '
  '4':
  - type: text
    content: 'And his tail drew the third part of the stars of heaven, and did cast them to the earth: and the dragon stood before the woman which was ready to be delivered, for to devour her child as soon as it was born. '
  '5':
  - type: text
    content: 'And she brought forth a man child, who was to rule all nations with a rod of iron: and her child was caught up unto God, and '
  - type: text
    content: to
  - type: text
    content: ' his throne. '
  '6':
  - type: text
    content: 'And the woman fled into the wilderness, where she hath a place prepared of God, that they should feed her there a thousand two hundred '
  - type: text
    content: and
  - type: text
    content: ' threescore days.'
  '7':
  - type: text
    content: 'And there was war in heaven: Michael and his angels fought against the dragon; and the dragon fought and his angels, '
  '8':
  - type: text
    content: 'and prevailed not; neither was their place found any more in heaven. '
  '9':
  - type: text
    content: 'And the great dragon was cast out, that old serpent, called the Devil, and Satan, which deceiveth the whole world: he was cast out into the earth, and his angels were cast out with him. '
