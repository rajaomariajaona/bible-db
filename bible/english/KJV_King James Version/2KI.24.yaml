document_id: 2KI.24,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jehoiakim
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In his days Nebuchadnezzar king of Babylon came up, and Jehoiakim became his servant three years: then he turned and rebelled against him. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'At that time the servants of Nebuchadnezzar king of Babylon came up against Jerusalem, and the city was besieged. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And Nebuchadnezzar king of Babylon came against the city, and his servants did besiege it. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And Jehoiachin the king of Judah went out to the king of Babylon, he, and his mother, and his servants, and his princes, and his officers: and the king of Babylon took him in the eighth year of his reign. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And he carried out thence all the treasures of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and the treasures of the king''s house, and cut in pieces all the vessels of gold which Solomon king of Israel had made in the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had said. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And he carried away all Jerusalem, and all the princes, and all the mighty men of valour, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' ten thousand captives, and all the craftsmen and smiths: none remained, save the poorest sort of the people of the land. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And he carried away Jehoiachin to Babylon, and the king''s mother, and the king''s wives, and his officers, and the mighty of the land, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: those
    - type: text
      text: ' carried he into captivity from Jerusalem to Babylon. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And all the men of might, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' seven thousand, and craftsmen and smiths a thousand, all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that were
    - type: text
      text: ' strong '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' apt for war, even them the king of Babylon brought captive to Babylon. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: And the king of Babylon made Mattaniah his father's brother king in his stead, and changed his name to Zedekiah.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Zedekiah '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' twenty and one years old when he began to reign, and he reigned eleven years in Jerusalem. And his mother''s name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Hamutal, the daughter of Jeremiah of Libnah. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And he did '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which was
    - type: text
      text: ' evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', according to all that Jehoiakim had done. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' sent against him bands of the Chaldees, and bands of the Syrians, and bands of the Moabites, and bands of the children of Ammon, and sent them against Judah to destroy it, according to the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', which he spake by his servants the prophets. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'For through the anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' it came to pass in Jerusalem and Judah, until he had cast them out from his presence, that Zedekiah rebelled against the king of Babylon.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Surely at the commandment of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ' upon Judah, to remove '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' out of his sight, for the sins of Manasseh, according to all that he did; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'and also for the innocent blood that he shed: for he filled Jerusalem with innocent blood; which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' would not pardon. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Now the rest of the acts of Jehoiakim, and all that he did, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Judah? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So Jehoiakim slept with his fathers: and Jehoiachin his son reigned in his stead. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And the king of Egypt came not again any more out of his land: for the king of Babylon had taken from the river of Egypt unto the river Euphrates all that pertained to the king of Egypt.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jehoiachin
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Jehoiachin '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' eighteen years old when he began to reign, and he reigned in Jerusalem three months. And his mother''s name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Nehushta, the daughter of Elnathan of Jerusalem. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And he did '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which was
    - type: text
      text: ' evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', according to all that his father had done.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fall of Jerusalem
    marker-yv: yv-h
