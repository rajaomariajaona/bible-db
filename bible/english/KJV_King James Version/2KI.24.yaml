document_id: 2KI.24,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehoiakim
  - type: text
    content: 'In his days Nebuchadnezzar king of Babylon came up, and Jehoiakim became his servant three years: then he turned and rebelled against him. '
  '10':
  - type: text
    content: 'At that time the servants of Nebuchadnezzar king of Babylon came up against Jerusalem, and the city was besieged. '
  '11':
  - type: text
    content: 'And Nebuchadnezzar king of Babylon came against the city, and his servants did besiege it. '
  '12':
  - type: text
    content: 'And Jehoiachin the king of Judah went out to the king of Babylon, he, and his mother, and his servants, and his princes, and his officers: and the king of Babylon took him in the eighth year of his reign. '
  '13':
  - type: text
    content: 'And he carried out thence all the treasures of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and the treasures of the king''s house, and cut in pieces all the vessels of gold which Solomon king of Israel had made in the temple of the '
  - type: text
    content: LORD
  - type: text
    content: ', as the '
  - type: text
    content: LORD
  - type: text
    content: ' had said. '
  '14':
  - type: text
    content: 'And he carried away all Jerusalem, and all the princes, and all the mighty men of valour, '
  - type: text
    content: even
  - type: text
    content: ' ten thousand captives, and all the craftsmen and smiths: none remained, save the poorest sort of the people of the land. '
  '15':
  - type: text
    content: 'And he carried away Jehoiachin to Babylon, and the king''s mother, and the king''s wives, and his officers, and the mighty of the land, '
  - type: text
    content: those
  - type: text
    content: ' carried he into captivity from Jerusalem to Babylon. '
  '16':
  - type: text
    content: 'And all the men of might, '
  - type: text
    content: even
  - type: text
    content: ' seven thousand, and craftsmen and smiths a thousand, all '
  - type: text
    content: that were
  - type: text
    content: ' strong '
  - type: text
    content: and
  - type: text
    content: ' apt for war, even them the king of Babylon brought captive to Babylon. '
  '17':
  - type: text
    content: And the king of Babylon made Mattaniah his father's brother king in his stead, and changed his name to Zedekiah.
  '18':
  - type: text
    content: 'Zedekiah '
  - type: text
    content: was
  - type: text
    content: ' twenty and one years old when he began to reign, and he reigned eleven years in Jerusalem. And his mother''s name '
  - type: text
    content: was
  - type: text
    content: ' Hamutal, the daughter of Jeremiah of Libnah. '
  '19':
  - type: text
    content: 'And he did '
  - type: text
    content: that which was
  - type: text
    content: ' evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', according to all that Jehoiakim had done. '
  '2':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' sent against him bands of the Chaldees, and bands of the Syrians, and bands of the Moabites, and bands of the children of Ammon, and sent them against Judah to destroy it, according to the word of the '
  - type: text
    content: LORD
  - type: text
    content: ', which he spake by his servants the prophets. '
  '20':
  - type: text
    content: 'For through the anger of the '
  - type: text
    content: LORD
  - type: text
    content: ' it came to pass in Jerusalem and Judah, until he had cast them out from his presence, that Zedekiah rebelled against the king of Babylon.'
  '3':
  - type: text
    content: 'Surely at the commandment of the '
  - type: text
    content: LORD
  - type: text
    content: ' came '
  - type: text
    content: this
  - type: text
    content: ' upon Judah, to remove '
  - type: text
    content: them
  - type: text
    content: ' out of his sight, for the sins of Manasseh, according to all that he did; '
  '4':
  - type: text
    content: 'and also for the innocent blood that he shed: for he filled Jerusalem with innocent blood; which the '
  - type: text
    content: LORD
  - type: text
    content: ' would not pardon. '
  '5':
  - type: text
    content: 'Now the rest of the acts of Jehoiakim, and all that he did, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Judah? '
  '6':
  - type: text
    content: 'So Jehoiakim slept with his fathers: and Jehoiachin his son reigned in his stead. '
  '7':
  - type: text
    content: 'And the king of Egypt came not again any more out of his land: for the king of Babylon had taken from the river of Egypt unto the river Euphrates all that pertained to the king of Egypt.'
  - type: heading
    content: Jehoiachin
  '8':
  - type: text
    content: 'Jehoiachin '
  - type: text
    content: was
  - type: text
    content: ' eighteen years old when he began to reign, and he reigned in Jerusalem three months. And his mother''s name '
  - type: text
    content: was
  - type: text
    content: ' Nehushta, the daughter of Elnathan of Jerusalem. '
  '9':
  - type: text
    content: 'And he did '
  - type: text
    content: that which was
  - type: text
    content: ' evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', according to all that his father had done.'
  - type: heading
    content: Fall of Jerusalem
