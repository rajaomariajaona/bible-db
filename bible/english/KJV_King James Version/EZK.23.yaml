  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And the names of them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' Aholah the elder, and Aholibah her sister: and they were mine, and they bare sons and daughters. Thus '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' their names; Samaria '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Aholah, and Jerusalem Aholibah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And Aholah played the harlot when she was mine; and she doted on her lovers, on the Assyrians '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her
  - type: text
    text: ' neighbours, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: add
    children:
    - type: text
      text: which were
  - type: text
    text: ' clothed with blue, captains and rulers, all of them desirable young men, horsemen riding upon horses. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Thus she committed her whoredoms with them, with all them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that were
  - type: text
    text: ' the chosen men of Assyria, and with all on whom she doted: with all their idols she defiled herself. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Neither left she her whoredoms '
  - type: usfm
    marker: add
    children:
    - type: text
      text: brought
  - type: text
    text: ' from Egypt: for in her youth they lay with her, and they bruised the breasts of her virginity, and poured their whoredom upon her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Wherefore I have delivered her into the hand of her lovers, into the hand of the Assyrians, upon whom she doted. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'These discovered her nakedness: they took her sons and her daughters, and slew her with the sword: and she became famous among women; for they had executed judgment upon her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And when her sister Aholibah saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ', she was more corrupt in her inordinate love than she, and in her whoredoms more than her sister in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her
  - type: text
    text: ' whoredoms. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'She doted upon the Assyrians '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her
  - type: text
    text: ' neighbours, captains and rulers clothed most gorgeously, horsemen riding upon horses, all of them desirable young men. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then I saw that she was defiled, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: took
  - type: text
    text: ' both one way, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' she increased her whoredoms: for when she saw men pourtrayed upon the wall, the images of the Chaldeans pourtrayed with vermilion, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'girded with girdles upon their loins, exceeding in dyed attire upon their heads, all of them princes to look to, after the manner of the Babylonians of Chaldea, the land of their nativity: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and as soon as she saw them with her eyes, she doted upon them, and sent messengers unto them into Chaldea. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the Babylonians came to her into the bed of love, and they defiled her with their whoredom, and she was polluted with them, and her mind was alienated from them. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So she discovered her whoredoms, and discovered her nakedness: then my mind was alienated from her, like as my mind was alienated from her sister. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Yet she multiplied her whoredoms, in calling to remembrance the days of her youth, wherein she had played the harlot in the land of Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For she doted upon their paramours, whose flesh '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is as
  - type: text
    text: ' the flesh of asses, and whose issue '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is like
  - type: text
    text: ' the issue of horses. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Thus thou calledst to remembrance the lewdness of thy youth, in bruising thy teats by the Egyptians for the paps of thy youth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Therefore, O Aholibah, thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; Behold, I will raise up thy lovers against thee, from whom thy mind is alienated, and I will bring them against thee on every side; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'the Babylonians, and all the Chaldeans, Pekod, and Shoa, and Koa, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' all the Assyrians with them: all of them desirable young men, captains and rulers, great lords and renowned, all of them riding upon horses. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And they shall come against thee with chariots, wagons, and wheels, and with an assembly of people, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' shall set against thee buckler and shield and helmet round about: and I will set judgment before them, and they shall judge thee according to their judgments. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And I will set my jealousy against thee, and they shall deal furiously with thee: they shall take away thy nose and thine ears; and thy remnant shall fall by the sword: they shall take thy sons and thy daughters; and thy residue shall be devoured by the fire. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'They shall also strip thee out of thy clothes, and take away thy fair jewels. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Thus will I make thy lewdness to cease from thee, and thy whoredom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: brought
  - type: text
    text: ' from the land of Egypt: so that thou shalt not lift up thine eyes unto them, nor remember Egypt any more.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'For thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; Behold, I will deliver thee into the hand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of them
  - type: text
    text: ' whom thou hatest, into the hand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of them
  - type: text
    text: ' from whom thy mind is alienated: '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'and they shall deal with thee hatefully, and shall take away all thy labour, and shall leave thee naked and bare: and the nakedness of thy whoredoms shall be discovered, both thy lewdness and thy whoredoms.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'I will do these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' unto thee, because thou hast gone a whoring after the heathen, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' because thou art polluted with their idols. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Thou hast walked in the way of thy sister; therefore will I give her cup into thine hand. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; Thou shalt drink of thy sister''s cup deep and large: thou shalt be laughed to scorn and had in derision; it containeth much. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Thou shalt be filled with drunkenness and sorrow, with the cup of astonishment and desolation, with the cup of thy sister Samaria. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Thou shalt even drink it and suck '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' out, and thou shalt break the sherds thereof, and pluck off thine own breasts: for I have spoken '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Therefore thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ; Because thou hast forgotten me, and cast me behind thy back, therefore bear thou also thy lewdness and thy whoredoms.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said moreover unto me; Son of man, wilt thou judge Aholah and Aholibah? yea, declare unto them their abominations; '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'that they have committed adultery, and blood '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in their hands, and with their idols have they committed adultery, and have also caused their sons, whom they bare unto me, to pass for them through '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the fire
  - type: text
    text: ', to devour '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Moreover this they have done unto me: they have defiled my sanctuary in the same day, and have profaned my sabbaths. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'For when they had slain their children to their idols, then they came the same day into my sanctuary to profane it; and, lo, thus have they done in the midst of mine house. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
