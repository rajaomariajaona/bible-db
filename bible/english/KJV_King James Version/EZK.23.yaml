    text: 'And furthermore, that ye have sent for men to come from far, unto whom a messenger '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' sent; and, lo, they came: for whom thou didst wash thyself, paintedst thy eyes, and deckedst thyself with ornaments, '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'and satest upon a stately bed, and a table prepared before it, whereupon thou hast set mine incense and mine oil. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And a voice of a multitude being at ease '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' with her: and with the men of the common sort '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' brought Sabeans from the wilderness, which put bracelets upon their hands, and beautiful crowns upon their heads. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Then said I unto '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her that was
  - type: text
    text: ' old in adulteries, Will they now commit whoredoms with her, and she '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with them?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Yet they went in unto her, as they go in unto a woman that playeth the harlot: so went they in unto Aholah and unto Aholibah, the lewd women. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'And the righteous men, they shall judge them after the manner of adulteresses, and after the manner of women that shed blood; because they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' adulteresses, and blood '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in their hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
