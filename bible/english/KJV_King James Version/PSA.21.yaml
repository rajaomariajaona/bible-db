verses:
  '1':
  - type: text
    content: To the chief Musician, A Psalm of David.
  - type: text
    content: 'The king shall joy in thy strength, O '
  - type: text
    content: LORD
  - type: text
    content: ;
  - type: text
    content: And in thy salvation how greatly shall he rejoice!
  '10':
  - type: text
    content: Their fruit shalt thou destroy from the earth,
  - type: text
    content: And their seed from among the children of men.
  '11':
  - type: text
    content: 'For they intended evil against thee:'
  - type: text
    content: 'They imagined a mischievous device, '
  - type: text
    content: which
  - type: text
    content: ' they are not able '
  - type: text
    content: to perform
  - type: text
    content: .
  '12':
  - type: text
    content: Therefore shalt thou make them turn their back,
  - type: text
    content: When
  - type: text
    content: ' thou shalt make ready '
  - type: text
    content: thine arrows
  - type: text
    content: ' upon thy strings against the face of them.'
  '13':
  - type: text
    content: 'Be thou exalted, '
  - type: text
    content: LORD
  - type: text
    content: ', in thine own strength:'
  - type: text
    content: So
  - type: text
    content: ' will we sing and praise thy power.'
  '2':
  - type: text
    content: Thou hast given him his heart's desire,
  - type: text
    content: 'And hast not withholden the request of his lips. '
  - type: text
    content: Selah.
  '3':
  - type: text
    content: 'For thou preventest him with the blessings of goodness:'
  - type: text
    content: Thou settest a crown of pure gold on his head.
  '4':
  - type: text
    content: 'He asked life of thee, '
  - type: text
    content: and
  - type: text
    content: ' thou gavest '
  - type: text
    content: it
  - type: text
    content: ' him,'
  - type: text
    content: Even
  - type: text
    content: ' length of days for ever and ever.'
  '5':
  - type: text
    content: 'His glory '
  - type: text
    content: is
  - type: text
    content: ' great in thy salvation:'
  - type: text
    content: Honour and majesty hast thou laid upon him.
  '6':
  - type: text
    content: 'For thou hast made him most blessed for ever:'
  - type: text
    content: Thou hast made him exceeding glad with thy countenance.
  '7':
  - type: text
    content: 'For the king trusteth in the '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: And through the mercy of the Most High he shall not be moved.
  '8':
  - type: text
    content: 'Thine hand shall find out all thine enemies:'
  - type: text
    content: Thy right hand shall find out those that hate thee.
  '9':
  - type: text
    content: 'Thou shalt make them as a fiery oven in the time of thine anger:'
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' shall swallow them up in his wrath, and the fire shall devour them.'
