document_id: PSA.21,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the chief Musician, A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The king shall joy in thy strength, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And in thy salvation how greatly shall he rejoice!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Their fruit shalt thou destroy from the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their seed from among the children of men.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For they intended evil against thee:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They imagined a mischievous device, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' they are not able '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to perform
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Therefore shalt thou make them turn their back,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: When
    - type: text
      text: ' thou shalt make ready '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thine arrows
    - type: text
      text: ' upon thy strings against the face of them.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Be thou exalted, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', in thine own strength:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: So
    - type: text
      text: ' will we sing and praise thy power.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Thou hast given him his heart's desire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And hast not withholden the request of his lips. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For thou preventest him with the blessings of goodness:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou settest a crown of pure gold on his head.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'He asked life of thee, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' thou gavest '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' him,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Even
    - type: text
      text: ' length of days for ever and ever.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'His glory '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' great in thy salvation:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Honour and majesty hast thou laid upon him.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For thou hast made him most blessed for ever:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou hast made him exceeding glad with thy countenance.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For the king trusteth in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And through the mercy of the Most High he shall not be moved.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Thine hand shall find out all thine enemies:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thy right hand shall find out those that hate thee.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Thou shalt make them as a fiery oven in the time of thine anger:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall swallow them up in his wrath, and the fire shall devour them.'
