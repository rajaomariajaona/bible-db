document_id: HAB.2,1
type_code: eng
verses:
  '1':
  - type: heading
    content: His Watchtower
  - type: text
    content: 'I will stand upon my watch, and set me upon the tower, and will watch to see what he will say unto me, and what I shall answer when I am reproved. '
  '10':
  - type: text
    content: 'Thou hast consulted shame to thy house by cutting off many people, and hast sinned '
  - type: text
    content: against
  - type: text
    content: ' thy soul. '
  '11':
  - type: text
    content: For the stone shall cry out of the wall, and the beam out of the timber shall answer it.
  '12':
  - type: text
    content: 'Woe to him that buildeth a town with blood, and stablisheth a city by iniquity! '
  '13':
  - type: text
    content: 'Behold, '
  - type: text
    content: is it
  - type: text
    content: ' not of the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts that the people shall labour in the very fire, and the people shall weary themselves for very vanity? '
  '14':
  - type: text
    content: 'For the earth shall be filled with the knowledge of the glory of the '
  - type: text
    content: LORD
  - type: text
    content: ', as the waters cover the sea.'
  '15':
  - type: text
    content: 'Woe unto him that giveth his neighbour drink, that puttest thy bottle to '
  - type: text
    content: him
  - type: text
    content: ', and makest '
  - type: text
    content: him
  - type: text
    content: ' drunken also, that thou mayest look on their nakedness! '
  '16':
  - type: text
    content: 'Thou art filled with shame for glory: drink thou also, and let thy foreskin be uncovered: the cup of the '
  - type: text
    content: LORD
  - type: text
    content: '''s right hand shall be turned unto thee, and shameful spewing '
  - type: text
    content: shall be
  - type: text
    content: ' on thy glory. '
  '17':
  - type: text
    content: 'For the violence of Lebanon shall cover thee, and the spoil of beasts, '
  - type: text
    content: which
  - type: text
    content: ' made them afraid, because of men''s blood, and for the violence of the land, of the city, and of all that dwell therein.'
  '18':
  - type: text
    content: 'What profiteth the graven image that the maker thereof hath graven it; the molten image, and a teacher of lies, that the maker of his work trusteth therein, to make dumb idols? '
  '19':
  - type: text
    content: 'Woe unto him that saith to the wood, Awake; to the dumb stone, Arise, it shall teach! Behold, it '
  - type: text
    content: is
  - type: text
    content: ' laid over with gold and silver, and '
  - type: text
    content: there is
  - type: text
    content: ' no breath at all in the midst of it. '
  '2':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' answered me, and said, Write the vision, and make '
  - type: text
    content: it
  - type: text
    content: ' plain upon tables, that he may run that readeth it. '
  '20':
  - type: text
    content: 'But the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' in his holy temple: let all the earth keep silence before him.'
  '3':
  - type: text
    content: 'For the vision '
  - type: text
    content: is
  - type: text
    content: ' yet for an appointed time, but at the end it shall speak, and not lie: though it tarry, wait for it; because it will surely come, it will not tarry. '
  '4':
  - type: text
    content: 'Behold, his soul '
  - type: text
    content: which
  - type: text
    content: ' is lifted up is not upright in him: but the just shall live by his faith.'
  '5':
  - type: text
    content: 'Yea also, because he transgresseth by wine, '
  - type: text
    content: he is
  - type: text
    content: ' a proud man, neither keepeth at home, who enlargeth his desire as hell, and '
  - type: text
    content: is
  - type: text
    content: ' as death, and cannot be satisfied, but gathereth unto him all nations, and heapeth unto him all people: '
  '6':
  - type: text
    content: 'shall not all these take up a parable against him, and a taunting proverb against him, and say, Woe to him that increaseth '
  - type: text
    content: that which is
  - type: text
    content: ' not his! how long? and to him that ladeth himself with thick clay! '
  '7':
  - type: text
    content: 'Shall they not rise up suddenly that shall bite thee, and awake that shall vex thee, and thou shalt be for booties unto them? '
  '8':
  - type: text
    content: 'Because thou hast spoiled many nations, all the remnant of the people shall spoil thee; because of men''s blood, and '
  - type: text
    content: for
  - type: text
    content: ' the violence of the land, of the city, and of all that dwell therein.'
  '9':
  - type: text
    content: 'Woe to him that coveteth an evil covetousness to his house, that he may set his nest on high, that he may be delivered from the power of evil! '
