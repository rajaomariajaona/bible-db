document_id: HAB.2
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: His Watchtower
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I will stand upon my watch, and set me upon the tower, and will watch to see what he will say unto me, and what I shall answer when I am reproved. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' answered me, and said, Write the vision, and make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' plain upon tables, that he may run that readeth it. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For the vision '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' yet for an appointed time, but at the end it shall speak, and not lie: though it tarry, wait for it; because it will surely come, it will not tarry. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Behold, his soul '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' is lifted up is not upright in him: but the just shall live by his faith.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Yea also, because he transgresseth by wine, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he is
  - type: text
    text: ' a proud man, neither keepeth at home, who enlargeth his desire as hell, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' as death, and cannot be satisfied, but gathereth unto him all nations, and heapeth unto him all people: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'shall not all these take up a parable against him, and a taunting proverb against him, and say, Woe to him that increaseth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which is
  - type: text
    text: ' not his! how long? and to him that ladeth himself with thick clay! '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Shall they not rise up suddenly that shall bite thee, and awake that shall vex thee, and thou shalt be for booties unto them? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Because thou hast spoiled many nations, all the remnant of the people shall spoil thee; because of men''s blood, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' the violence of the land, of the city, and of all that dwell therein.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Woe to him that coveteth an evil covetousness to his house, that he may set his nest on high, that he may be delivered from the power of evil! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Thou hast consulted shame to thy house by cutting off many people, and hast sinned '
  - type: usfm
    marker: add
    children:
    - type: text
      text: against
  - type: text
    text: ' thy soul. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For the stone shall cry out of the wall, and the beam out of the timber shall answer it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Woe to him that buildeth a town with blood, and stablisheth a city by iniquity! '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is it
  - type: text
    text: ' not of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts that the people shall labour in the very fire, and the people shall weary themselves for very vanity? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For the earth shall be filled with the knowledge of the glory of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', as the waters cover the sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Woe unto him that giveth his neighbour drink, that puttest thy bottle to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', and makest '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' drunken also, that thou mayest look on their nakedness! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Thou art filled with shame for glory: drink thou also, and let thy foreskin be uncovered: the cup of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s right hand shall be turned unto thee, and shameful spewing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' on thy glory. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For the violence of Lebanon shall cover thee, and the spoil of beasts, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' made them afraid, because of men''s blood, and for the violence of the land, of the city, and of all that dwell therein.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'What profiteth the graven image that the maker thereof hath graven it; the molten image, and a teacher of lies, that the maker of his work trusteth therein, to make dumb idols? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Woe unto him that saith to the wood, Awake; to the dumb stone, Arise, it shall teach! Behold, it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' laid over with gold and silver, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no breath at all in the midst of it. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in his holy temple: let all the earth keep silence before him.'
