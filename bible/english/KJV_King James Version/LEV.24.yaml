verses:
  '1':
  - type: heading
    content: Holy Things
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '10':
  - type: text
    content: 'And the son of an Israelitish woman, whose father '
  - type: text
    content: was
  - type: text
    content: ' an Egyptian, went out among the children of Israel: and this son of the Israelitish '
  - type: text
    content: woman
  - type: text
    content: ' and a man of Israel strove together in the camp; '
  '11':
  - type: text
    content: 'and the Israelitish woman''s son blasphemed the name '
  - type: text
    content: 'of the '
  - type: text
    content: LORD
  - type: text
    content: ', and cursed. And they brought him unto Moses: (and his mother''s name '
  - type: text
    content: was
  - type: text
    content: ' Shelomith, the daughter of Dibri, of the tribe of Dan:) '
  '12':
  - type: text
    content: 'and they put him in ward, that the mind of the '
  - type: text
    content: LORD
  - type: text
    content: ' might be shewed them. '
  '13':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '14':
  - type: text
    content: 'Bring forth him that hath cursed without the camp; and let all that heard '
  - type: text
    content: him
  - type: text
    content: ' lay their hands upon his head, and let all the congregation stone him. '
  '15':
  - type: text
    content: 'And thou shalt speak unto the children of Israel, saying, Whosoever curseth his God shall bear his sin. '
  '16':
  - type: text
    content: 'And he that blasphemeth the name of the '
  - type: text
    content: LORD
  - type: text
    content: ', he shall surely be put to death, '
  - type: text
    content: and
  - type: text
    content: ' all the congregation shall certainly stone him: as well the stranger, as he that is born in the land, when he blasphemeth the name '
  - type: text
    content: 'of the '
  - type: text
    content: LORD
  - type: text
    content: ', shall be put to death.'
  '17':
  - type: text
    content: 'And he that killeth any man shall surely be put to death. '
  '18':
  - type: text
    content: 'And he that killeth a beast shall make it good; beast for beast. '
  '19':
  - type: text
    content: 'And if a man cause a blemish in his neighbour; as he hath done, so shall it be done to him; '
  '2':
  - type: text
    content: 'Command the children of Israel, that they bring unto thee pure oil olive beaten for the light, to cause the lamps to burn continually. '
  '20':
  - type: text
    content: 'breach for breach, eye for eye, tooth for tooth: as he hath caused a blemish in a man, so shall it be done to him '
  - type: text
    content: again
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'And he that killeth a beast, he shall restore it: and he that killeth a man, he shall be put to death. '
  '22':
  - type: text
    content: 'Ye shall have one manner of law, as well for the stranger, as for one of your own country: for I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' your God.'
  '23':
  - type: text
    content: 'And Moses spake to the children of Israel, that they should bring forth him that had cursed out of the camp, and stone him with stones. And the children of Israel did as the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses.'
  '3':
  - type: text
    content: 'Without the vail of the testimony, in the tabernacle of the congregation, shall Aaron order it from the evening unto the morning before the '
  - type: text
    content: LORD
  - type: text
    content: ' continually: '
  - type: text
    content: it shall be
  - type: text
    content: ' a statute for ever in your generations. '
  '4':
  - type: text
    content: 'He shall order the lamps upon the pure candlestick before the '
  - type: text
    content: LORD
  - type: text
    content: ' continually.'
  '5':
  - type: text
    content: 'And thou shalt take fine flour, and bake twelve cakes thereof: two tenth deals shall be in one cake. '
  '6':
  - type: text
    content: 'And thou shalt set them in two rows, six on a row, upon the pure table before the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'And thou shalt put pure frankincense upon '
  - type: text
    content: each
  - type: text
    content: ' row, that it may be on the bread for a memorial, '
  - type: text
    content: even
  - type: text
    content: ' an offering made by fire unto the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Every sabbath he shall set it in order before the '
  - type: text
    content: LORD
  - type: text
    content: ' continually, '
  - type: text
    content: being taken
  - type: text
    content: ' from the children of Israel by an everlasting covenant. '
  '9':
  - type: text
    content: 'And it shall be Aaron''s and his sons''; and they shall eat it in the holy place: for it '
  - type: text
    content: is
  - type: text
    content: ' most holy unto him of the offerings of the '
  - type: text
    content: LORD
  - type: text
    content: ' made by fire by a perpetual statute.'
