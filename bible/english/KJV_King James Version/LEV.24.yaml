document_id: LEV.24
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Holy Things
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Command the children of Israel, that they bring unto thee pure oil olive beaten for the light, to cause the lamps to burn continually. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Without the vail of the testimony, in the tabernacle of the congregation, shall Aaron order it from the evening unto the morning before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' continually: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it shall be
  - type: text
    text: ' a statute for ever in your generations. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He shall order the lamps upon the pure candlestick before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' continually.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And thou shalt take fine flour, and bake twelve cakes thereof: two tenth deals shall be in one cake. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And thou shalt set them in two rows, six on a row, upon the pure table before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And thou shalt put pure frankincense upon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: each
  - type: text
    text: ' row, that it may be on the bread for a memorial, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' an offering made by fire unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Every sabbath he shall set it in order before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' continually, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being taken
  - type: text
    text: ' from the children of Israel by an everlasting covenant. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And it shall be Aaron''s and his sons''; and they shall eat it in the holy place: for it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' most holy unto him of the offerings of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' made by fire by a perpetual statute.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the son of an Israelitish woman, whose father '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' an Egyptian, went out among the children of Israel: and this son of the Israelitish '
  - type: usfm
    marker: add
    children:
    - type: text
      text: woman
  - type: text
    text: ' and a man of Israel strove together in the camp; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and the Israelitish woman''s son blasphemed the name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
  - type: text
    text: ', and cursed. And they brought him unto Moses: (and his mother''s name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Shelomith, the daughter of Dibri, of the tribe of Dan:) '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and they put him in ward, that the mind of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' might be shewed them. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Bring forth him that hath cursed without the camp; and let all that heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' lay their hands upon his head, and let all the congregation stone him. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And thou shalt speak unto the children of Israel, saying, Whosoever curseth his God shall bear his sin. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And he that blasphemeth the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', he shall surely be put to death, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' all the congregation shall certainly stone him: as well the stranger, as he that is born in the land, when he blasphemeth the name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
  - type: text
    text: ', shall be put to death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And he that killeth any man shall surely be put to death. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And he that killeth a beast shall make it good; beast for beast. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And if a man cause a blemish in his neighbour; as he hath done, so shall it be done to him; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'breach for breach, eye for eye, tooth for tooth: as he hath caused a blemish in a man, so shall it be done to him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: again
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And he that killeth a beast, he shall restore it: and he that killeth a man, he shall be put to death. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ye shall have one manner of law, as well for the stranger, as for one of your own country: for I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And Moses spake to the children of Israel, that they should bring forth him that had cursed out of the camp, and stone him with stones. And the children of Israel did as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses.'
