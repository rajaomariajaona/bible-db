  '4':
  - type: text
    content: 'And Mesha king of Moab was a sheepmaster, and rendered unto the king of Israel an hundred thousand lambs, and an hundred thousand rams, with the wool. '
  '5':
  - type: text
    content: 'But it came to pass, when Ahab was dead, that the king of Moab rebelled against the king of Israel. '
  '6':
  - type: text
    content: 'And king Jehoram went out of Samaria the same time, and numbered all Israel. '
  '7':
  - type: text
    content: 'And he went and sent to Jehoshaphat the king of Judah, saying, The king of Moab hath rebelled against me: wilt thou go with me against Moab to battle? And he said, I will go up: I '
  - type: text
    content: am
  - type: text
