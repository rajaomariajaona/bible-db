  - type: text
    content: and
  - type: text
    content: ' my horses as thy horses. '
  '8':
  - type: text
    content: 'And he said, Which way shall we go up? And he answered, The way through the wilderness of Edom. '
  '9':
  - type: text
    content: 'So the king of Israel went, and the king of Judah, and the king of Edom: and they fetched a compass of seven days'' journey: and there was no water for the host, and for the cattle that followed them. '
