document_id: 2KI.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Jehoram the son of Ahab began to reign over Israel in Samaria the eighteenth year of Jehoshaphat king of Judah, and reigned twelve years. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king of Israel said, Alas! that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath called these three kings together, to deliver them into the hand of Moab! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jehoshaphat said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is there
    - type: text
      text: ' not here a prophet of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', that we may enquire of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' by him? And one of the king of Israel''s servants answered and said, Here '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Elisha the son of Shaphat, which poured water on the hands of Elijah. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jehoshaphat said, The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' is with him. So the king of Israel and Jehoshaphat and the king of Edom went down to him.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Elisha said unto the king of Israel, What have I to do with thee? get thee to the prophets of thy father, and to the prophets of thy mother. And the king of Israel said unto him, Nay: for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath called these three kings together, to deliver them into the hand of Moab. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Elisha said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: As
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts liveth, before whom I stand, surely, were it not that I regard the presence of Jehoshaphat the king of Judah, I would not look toward thee, nor see thee. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But now bring me a minstrel. And it came to pass, when the minstrel played, that the hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came upon him. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', Make this valley full of ditches. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', Ye shall not see wind, neither shall ye see rain; yet that valley shall be filled with water, that ye may drink, both ye, and your cattle, and your beasts. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And this is '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' a light thing in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': he will deliver the Moabites also into your hand. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And ye shall smite every fenced city, and every choice city, and shall fell every good tree, and stop all wells of water, and mar every good piece of land with stones. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he wrought evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; but not like his father, and like his mother: for he put away the image of Baal that his father had made. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And it came to pass in the morning, when the meat offering was offered, that, behold, there came water by the way of Edom, and the country was filled with water.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when all the Moabites heard that the kings were come up to fight against them, they gathered all that were able to put on armour, and upward, and stood in the border. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they rose up early in the morning, and the sun shone upon the water, and the Moabites saw the water on the other side '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' red as blood: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they said, This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' blood: the kings are surely slain, and they have smitten one another: now therefore, Moab, to the spoil. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they came to the camp of Israel, the Israelites rose up and smote the Moabites, so that they fled before them: but they went forward smiting the Moabites, even in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' country. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they beat down the cities, and on every good piece of land cast every man his stone, and filled it; and they stopped all the wells of water, and felled all the good trees: only in Kir-hareseth left they the stones thereof; howbeit the slingers went about '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and smote it. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the king of Moab saw that the battle was too sore for him, he took with him seven hundred men that drew swords, to break through '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' unto the king of Edom: but they could not. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he took his eldest son that should have reigned in his stead, and offered him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a burnt offering upon the wall. And there was great indignation against Israel: and they departed from him, and returned to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their own
    - type: text
      text: ' land.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nevertheless he cleaved unto the sins of Jeroboam the son of Nebat, which made Israel to sin; he departed not therefrom.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fills the Water Trenches
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Mesha king of Moab was a sheepmaster, and rendered unto the king of Israel an hundred thousand lambs, and an hundred thousand rams, with the wool. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But it came to pass, when Ahab was dead, that the king of Moab rebelled against the king of Israel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And king Jehoram went out of Samaria the same time, and numbered all Israel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he went and sent to Jehoshaphat the king of Judah, saying, The king of Moab hath rebelled against me: wilt thou go with me against Moab to battle? And he said, I will go up: I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' as thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ', my people as thy people, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' my horses as thy horses. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, Which way shall we go up? And he answered, The way through the wilderness of Edom. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the king of Israel went, and the king of Judah, and the king of Edom: and they fetched a compass of seven days'' journey: and there was no water for the host, and for the cattle that followed them. '
