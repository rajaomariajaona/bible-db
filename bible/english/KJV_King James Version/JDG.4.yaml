document_id: JDG.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Deborah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the children of Israel again did evil in the sight of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', when Ehud was dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' sold them into the hand of Jabin king of Canaan, that reigned in Hazor; the captain of whose host '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Sisera, which dwelt in Harosheth of the Gentiles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And the children of Israel cried unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': for he had nine hundred chariots of iron; and twenty years he mightily oppressed the children of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Deborah, a prophetess, the wife of Lapidoth, she judged Israel at that time. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And she dwelt under the palm tree of Deborah between Ramah and Beth-el in mount Ephraim: and the children of Israel came up to her for judgment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And she sent and called Barak the son of Abinoam out of Kedesh-naphtali, and said unto him, Hath not the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel commanded, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saying
  - type: text
    text: ', Go and draw toward mount Tabor, and take with thee ten thousand men of the children of Naphtali and of the children of Zebulun? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And I will draw unto thee to the river Kishon Sisera, the captain of Jabin''s army, with his chariots and his multitude; and I will deliver him into thine hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Barak said unto her, If thou wilt go with me, then I will go: but if thou wilt not go with me, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' I will not go. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And she said, I will surely go with thee: notwithstanding the journey that thou takest shall not be for thine honour; for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall sell Sisera into the hand of a woman. And Deborah arose, and went with Barak to Kedesh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Barak called Zebulun and Naphtali to Kedesh; and he went up with ten thousand men at his feet: and Deborah went up with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now Heber the Kenite, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which was
  - type: text
    text: ' of the children of Hobab the father in law of Moses, had severed himself from the Kenites, and pitched his tent unto the plain of Zaanaim, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' by Kedesh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And they shewed Sisera that Barak the son of Abinoam was gone up to mount Tabor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Sisera gathered together all his chariots, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' nine hundred chariots of iron, and all the people that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with him, from Harosheth of the Gentiles unto the river of Kishon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And Deborah said unto Barak, Up; for this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the day in which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath delivered Sisera into thine hand: is not the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' gone out before thee? So Barak went down from mount Tabor, and ten thousand men after him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' discomfited Sisera, and all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' chariots, and all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' host, with the edge of the sword before Barak; so that Sisera lighted down off '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' chariot, and fled away on his feet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But Barak pursued after the chariots, and after the host, unto Harosheth of the Gentiles: and all the host of Sisera fell upon the edge of the sword; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' there was not a man left.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Howbeit Sisera fled away on his feet to the tent of Jael the wife of Heber the Kenite: for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' peace between Jabin the king of Hazor and the house of Heber the Kenite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And Jael went out to meet Sisera, and said unto him, Turn in, my lord, turn in to me; fear not. And when he had turned in unto her into the tent, she covered him with a mantle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And he said unto her, Give me, I pray thee, a little water to drink; for I am thirsty. And she opened a bottle of milk, and gave him drink, and covered him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Again he said unto her, Stand in the door of the tent, and it shall be, when any man doth come and enquire of thee, and say, Is there any man here? that thou shalt say, No. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then Jael Heber''s wife took a nail of the tent, and took an hammer in her hand, and went softly unto him, and smote the nail into his temples, and fastened it into the ground: for he was fast asleep and weary. So he died. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And, behold, as Barak pursued Sisera, Jael came out to meet him, and said unto him, Come, and I will shew thee the man whom thou seekest. And when he came into her '
  - type: usfm
    marker: add
    children:
    - type: text
      text: tent
  - type: text
    text: ', behold, Sisera lay dead, and the nail '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in his temples.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So God subdued on that day Jabin the king of Canaan before the children of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: And the hand of the children of Israel prospered, and prevailed against Jabin the king of Canaan, until they had destroyed Jabin king of Canaan.
