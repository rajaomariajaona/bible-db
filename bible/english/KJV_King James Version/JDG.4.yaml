verses:
  '1':
  - type: heading
    content: Deborah
  - type: text
    content: 'And the children of Israel again did evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', when Ehud was dead. '
  '10':
  - type: text
    content: 'And Barak called Zebulun and Naphtali to Kedesh; and he went up with ten thousand men at his feet: and Deborah went up with him.'
  '11':
  - type: text
    content: 'Now Heber the Kenite, '
  - type: text
    content: which was
  - type: text
    content: ' of the children of Hobab the father in law of Moses, had severed himself from the Kenites, and pitched his tent unto the plain of Zaanaim, which '
  - type: text
    content: is
  - type: text
    content: ' by Kedesh.'
  '12':
  - type: text
    content: 'And they shewed Sisera that Barak the son of Abinoam was gone up to mount Tabor. '
  '13':
  - type: text
    content: 'And Sisera gathered together all his chariots, '
  - type: text
    content: even
  - type: text
    content: ' nine hundred chariots of iron, and all the people that '
  - type: text
    content: were
  - type: text
    content: ' with him, from Harosheth of the Gentiles unto the river of Kishon. '
  '14':
  - type: text
    content: 'And Deborah said unto Barak, Up; for this '
  - type: text
    content: is
  - type: text
    content: ' the day in which the '
  - type: text
    content: LORD
  - type: text
    content: ' hath delivered Sisera into thine hand: is not the '
  - type: text
    content: LORD
  - type: text
    content: ' gone out before thee? So Barak went down from mount Tabor, and ten thousand men after him. '
  '15':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' discomfited Sisera, and all '
  - type: text
    content: his
  - type: text
    content: ' chariots, and all '
  - type: text
    content: his
  - type: text
    content: ' host, with the edge of the sword before Barak; so that Sisera lighted down off '
  - type: text
    content: his
  - type: text
    content: ' chariot, and fled away on his feet. '
  '16':
  - type: text
    content: 'But Barak pursued after the chariots, and after the host, unto Harosheth of the Gentiles: and all the host of Sisera fell upon the edge of the sword; '
  - type: text
    content: and
  - type: text
    content: ' there was not a man left.'
  '17':
  - type: text
    content: 'Howbeit Sisera fled away on his feet to the tent of Jael the wife of Heber the Kenite: for '
  - type: text
    content: there was
  - type: text
    content: ' peace between Jabin the king of Hazor and the house of Heber the Kenite. '
  '18':
  - type: text
    content: 'And Jael went out to meet Sisera, and said unto him, Turn in, my lord, turn in to me; fear not. And when he had turned in unto her into the tent, she covered him with a mantle. '
  '19':
  - type: text
    content: 'And he said unto her, Give me, I pray thee, a little water to drink; for I am thirsty. And she opened a bottle of milk, and gave him drink, and covered him. '
  '2':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' sold them into the hand of Jabin king of Canaan, that reigned in Hazor; the captain of whose host '
  - type: text
    content: was
  - type: text
    content: ' Sisera, which dwelt in Harosheth of the Gentiles. '
  '20':
  - type: text
    content: 'Again he said unto her, Stand in the door of the tent, and it shall be, when any man doth come and enquire of thee, and say, Is there any man here? that thou shalt say, No. '
  '21':
  - type: text
    content: 'Then Jael Heber''s wife took a nail of the tent, and took an hammer in her hand, and went softly unto him, and smote the nail into his temples, and fastened it into the ground: for he was fast asleep and weary. So he died. '
  '22':
  - type: text
    content: 'And, behold, as Barak pursued Sisera, Jael came out to meet him, and said unto him, Come, and I will shew thee the man whom thou seekest. And when he came into her '
  - type: text
    content: tent
  - type: text
    content: ', behold, Sisera lay dead, and the nail '
  - type: text
    content: was
  - type: text
    content: ' in his temples.'
  '23':
  - type: text
    content: 'So God subdued on that day Jabin the king of Canaan before the children of Israel. '
  '24':
  - type: text
    content: And the hand of the children of Israel prospered, and prevailed against Jabin the king of Canaan, until they had destroyed Jabin king of Canaan.
  '3':
  - type: text
    content: 'And the children of Israel cried unto the '
  - type: text
    content: LORD
  - type: text
    content: ': for he had nine hundred chariots of iron; and twenty years he mightily oppressed the children of Israel.'
  '4':
  - type: text
    content: 'And Deborah, a prophetess, the wife of Lapidoth, she judged Israel at that time. '
  '5':
  - type: text
    content: 'And she dwelt under the palm tree of Deborah between Ramah and Beth-el in mount Ephraim: and the children of Israel came up to her for judgment. '
  '6':
  - type: text
    content: 'And she sent and called Barak the son of Abinoam out of Kedesh-naphtali, and said unto him, Hath not the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel commanded, '
  - type: text
    content: saying
  - type: text
    content: ', Go and draw toward mount Tabor, and take with thee ten thousand men of the children of Naphtali and of the children of Zebulun? '
  '7':
  - type: text
    content: 'And I will draw unto thee to the river Kishon Sisera, the captain of Jabin''s army, with his chariots and his multitude; and I will deliver him into thine hand. '
  '8':
  - type: text
    content: 'And Barak said unto her, If thou wilt go with me, then I will go: but if thou wilt not go with me, '
  - type: text
    content: then
  - type: text
    content: ' I will not go. '
  '9':
  - type: text
    content: 'And she said, I will surely go with thee: notwithstanding the journey that thou takest shall not be for thine honour; for the '
  - type: text
    content: LORD
  - type: text
    content: ' shall sell Sisera into the hand of a woman. And Deborah arose, and went with Barak to Kedesh. '
