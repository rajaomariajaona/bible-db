document_id: PSA.81,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'To the chief Musician upon Gittith, '
  - type: text
    content: A Psalm
  - type: text
    content: ' of Asaph.'
  - type: text
    content: 'Sing aloud unto God our strength:'
  - type: text
    content: Make a joyful noise unto the God of Jacob.
  '10':
  - type: text
    content: 'I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God, which brought thee out of the land of Egypt:'
  - type: text
    content: Open thy mouth wide, and I will fill it.
  '11':
  - type: text
    content: But my people would not hearken to my voice;
  - type: text
    content: And Israel would none of me.
  '12':
  - type: text
    content: 'So I gave them up unto their own hearts'' lust:'
  - type: text
    content: And
  - type: text
    content: ' they walked in their own counsels.'
  '13':
  - type: text
    content: Oh that my people had hearkened unto me,
  - type: text
    content: And
  - type: text
    content: ' Israel had walked in my ways!'
  '14':
  - type: text
    content: I should soon have subdued their enemies,
  - type: text
    content: And turned my hand against their adversaries.
  '15':
  - type: text
    content: 'The haters of the '
  - type: text
    content: LORD
  - type: text
    content: ' should have submitted themselves unto him:'
  - type: text
    content: But their time should have endured for ever.
  '16':
  - type: text
    content: 'He should have fed them also with the finest of the wheat:'
  - type: text
    content: And with honey out of the rock should I have satisfied thee.
  '2':
  - type: text
    content: Take a psalm, and bring hither the timbrel,
  - type: text
    content: The pleasant harp with the psaltery.
  '3':
  - type: text
    content: Blow up the trumpet in the new moon,
  - type: text
    content: In the time appointed, on our solemn feast day.
  '4':
  - type: text
    content: 'For this '
  - type: text
    content: was
  - type: text
    content: ' a statute for Israel,'
  - type: text
    content: And
  - type: text
    content: ' a law of the God of Jacob.'
  '5':
  - type: text
    content: 'This he ordained in Joseph '
  - type: text
    content: for
  - type: text
    content: ' a testimony,'
  - type: text
    content: 'When he went out through the land of Egypt:'
  - type: text
    content: Where
  - type: text
    content: ' I heard a language '
  - type: text
    content: that
  - type: text
    content: ' I understood not.'
  '6':
  - type: text
    content: 'I removed his shoulder from the burden:'
  - type: text
    content: His hands were delivered from the pots.
  '7':
  - type: text
    content: Thou calledst in trouble, and I delivered thee;
  - type: text
    content: 'I answered thee in the secret place of thunder:'
  - type: text
    content: I proved thee
  - type: text
    content: 'At the waters of Meribah. '
  - type: text
    content: Selah.
  '8':
  - type: text
    content: 'Hear, O my people, and I will testify unto thee:'
  - type: text
    content: O Israel, if thou wilt hearken unto me;
  '9':
  - type: text
    content: There shall no strange god be in thee;
  - type: text
    content: Neither shalt thou worship any strange god.
