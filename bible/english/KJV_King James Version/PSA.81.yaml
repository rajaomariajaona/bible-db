document_id: PSA.81,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the chief Musician upon Gittith, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: A Psalm
    - type: text
      text: ' of Asaph.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sing aloud unto God our strength:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Make a joyful noise unto the God of Jacob.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God, which brought thee out of the land of Egypt:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Open thy mouth wide, and I will fill it.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But my people would not hearken to my voice;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And Israel would none of me.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So I gave them up unto their own hearts'' lust:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' they walked in their own counsels.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh that my people had hearkened unto me,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' Israel had walked in my ways!'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I should soon have subdued their enemies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And turned my hand against their adversaries.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The haters of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' should have submitted themselves unto him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But their time should have endured for ever.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He should have fed them also with the finest of the wheat:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And with honey out of the rock should I have satisfied thee.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take a psalm, and bring hither the timbrel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The pleasant harp with the psaltery.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blow up the trumpet in the new moon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the time appointed, on our solemn feast day.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' a statute for Israel,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' a law of the God of Jacob.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This he ordained in Joseph '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a testimony,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When he went out through the land of Egypt:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Where
    - type: text
      text: ' I heard a language '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' I understood not.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I removed his shoulder from the burden:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His hands were delivered from the pots.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thou calledst in trouble, and I delivered thee;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I answered thee in the secret place of thunder:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I proved thee
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'At the waters of Meribah. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hear, O my people, and I will testify unto thee:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O Israel, if thou wilt hearken unto me;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There shall no strange god be in thee;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Neither shalt thou worship any strange god.
