document_id: JER.25,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Fall of Judah
  - type: text
    content: 'The word that came to Jeremiah concerning all the people of Judah in the fourth year of Jehoiakim the son of Josiah king of Judah, that '
  - type: text
    content: was
  - type: text
    content: ' the first year of Nebuchadrezzar king of Babylon; '
  '10':
  - type: text
    content: 'Moreover I will take from them the voice of mirth, and the voice of gladness, the voice of the bridegroom, and the voice of the bride, the sound of the millstones, and the light of the candle. '
  '11':
  - type: text
    content: 'And this whole land shall be a desolation, '
  - type: text
    content: and
  - type: text
    content: ' an astonishment; and these nations shall serve the king of Babylon seventy years.'
  '12':
  - type: text
    content: 'And it shall come to pass, when seventy years are accomplished, '
  - type: text
    content: that
  - type: text
    content: ' I will punish the king of Babylon, and that nation, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', for their iniquity, and the land of the Chaldeans, and will make it perpetual desolations. '
  '13':
  - type: text
    content: 'And I will bring upon that land all my words which I have pronounced against it, '
  - type: text
    content: even
  - type: text
    content: ' all that is written in this book, which Jeremiah hath prophesied against all the nations. '
  '14':
  - type: text
    content: 'For many nations and great kings shall serve themselves of them also: and I will recompense them according to their deeds, and according to the works of their own hands.'
  - type: heading
    content: The Doom of the Nations
  '15':
  - type: text
    content: 'For thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel unto me; Take the wine cup of this fury at my hand, and cause all the nations, to whom I send thee, to drink it. '
  '16':
  - type: text
    content: 'And they shall drink, and be moved, and be mad, because of the sword that I will send among them. '
  '17':
  - type: text
    content: 'Then took I the cup at the '
  - type: text
    content: LORD
  - type: text
    content: '''s hand, and made all the nations to drink, unto whom the '
  - type: text
    content: LORD
  - type: text
    content: ' had sent me: '
  '18':
  - type: text
    content: to wit
  - type: text
    content: ', Jerusalem, and the cities of Judah, and the kings thereof, and the princes thereof, to make them a desolation, an astonishment, an hissing, and a curse; as '
  - type: text
    content: it is
  - type: text
    content: ' this day; '
  '19':
  - type: text
    content: 'Pharaoh king of Egypt, and his servants, and his princes, and all his people; '
  '2':
  - type: text
    content: 'the which Jeremiah the prophet spake unto all the people of Judah, and to all the inhabitants of Jerusalem, saying, '
  '20':
  - type: text
    content: 'and all the mingled people, and all the kings of the land of Uz, and all the kings of the land of the Philistines, and Ashkelon, and Azzah, and Ekron, and the remnant of Ashdod, '
  '21':
  - type: text
    content: 'Edom, and Moab, and the children of Ammon, '
  '22':
  - type: text
    content: 'and all the kings of Tyrus, and all the kings of Zidon, and the kings of the isles which '
  - type: text
    content: are
  - type: text
    content: ' beyond the sea, '
  '23':
  - type: text
    content: 'Dedan, and Tema, and Buz, and all '
  - type: text
    content: that are
  - type: text
    content: ' in the utmost corners, '
  '24':
  - type: text
    content: 'and all the kings of Arabia, and all the kings of the mingled people that dwell in the desert, '
  '25':
  - type: text
    content: 'and all the kings of Zimri, and all the kings of Elam, and all the kings of the Medes, '
  '26':
  - type: text
    content: 'and all the kings of the north, far and near, one with another, and all the kingdoms of the world, which '
  - type: text
    content: are
  - type: text
    content: ' upon the face of the earth: and the king of Sheshach shall drink after them.'
  '27':
  - type: text
    content: 'Therefore thou shalt say unto them, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, the God of Israel; Drink ye, and be drunken, and spue, and fall, and rise no more, because of the sword which I will send among you. '
  '28':
  - type: text
    content: 'And it shall be, if they refuse to take the cup at thine hand to drink, then shalt thou say unto them, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; Ye shall certainly drink. '
  '29':
  - type: text
    content: 'For, lo, I begin to bring evil on the city which is called by my name, and should ye be utterly unpunished? Ye shall not be unpunished: for I will call for a sword upon all the inhabitants of the earth, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts.'
  '3':
  - type: text
    content: 'From the thirteenth year of Josiah the son of Amon king of Judah, even unto this day, that '
  - type: text
    content: is
  - type: text
    content: ' the three and twentieth year, the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' hath come unto me, and I have spoken unto you, rising early and speaking; but ye have not hearkened. '
  '30':
  - type: text
    content: 'Therefore prophesy thou against them all these words, and say unto them, The '
  - type: text
    content: LORD
  - type: text
    content: ' shall roar from on high, and utter his voice from his holy habitation; he shall mightily roar upon his habitation; he shall give a shout, as they that tread '
  - type: text
    content: the grapes
  - type: text
    content: ', against all the inhabitants of the earth. '
  '31':
  - type: text
    content: 'A noise shall come '
  - type: text
    content: even
  - type: text
    content: ' to the ends of the earth; for the '
  - type: text
    content: LORD
  - type: text
    content: ' hath a controversy with the nations, he will plead with all flesh; he will give them '
  - type: text
    content: that are
  - type: text
    content: ' wicked to the sword, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '32':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, Behold, evil shall go forth from nation to nation, and a great whirlwind shall be raised up from the coasts of the earth. '
  '33':
  - type: text
    content: 'And the slain of the '
  - type: text
    content: LORD
  - type: text
    content: ' shall be at that day from '
  - type: text
    content: one
  - type: text
    content: ' end of the earth even unto the '
  - type: text
    content: other
  - type: text
    content: ' end of the earth: they shall not be lamented, neither gathered, nor buried; they shall be dung upon the ground.'
  '34':
  - type: text
    content: 'Howl, ye shepherds, and cry; and wallow yourselves '
  - type: text
    content: in the ashes
  - type: text
    content: ', ye principal of the flock: for the days of your slaughter and of your dispersions are accomplished; and ye shall fall like a pleasant vessel. '
  '35':
  - type: text
    content: 'And the shepherds shall have no way to flee, nor the principal of the flock to escape. '
  '36':
  - type: text
    content: 'A voice of the cry of the shepherds, and an howling of the principal of the flock, '
  - type: text
    content: 'shall be heard:'
  - type: text
    content: ' for the '
  - type: text
    content: LORD
  - type: text
    content: ' hath spoiled their pasture. '
  '37':
  - type: text
    content: 'And the peaceable habitations are cut down because of the fierce anger of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '38':
  - type: text
    content: 'He hath forsaken his covert, as the lion: for their land is desolate because of the fierceness of the oppressor, and because of his fierce anger.'
  '4':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' hath sent unto you all his servants the prophets, rising early and sending '
  - type: text
    content: them
  - type: text
    content: '; but ye have not hearkened, nor inclined your ear to hear. '
  '5':
  - type: text
    content: 'They said, Turn ye again now every one from his evil way, and from the evil of your doings, and dwell in the land that the '
  - type: text
    content: LORD
  - type: text
    content: ' hath given unto you and to your fathers for ever and ever: '
  '6':
  - type: text
    content: 'and go not after other gods to serve them, and to worship them, and provoke me not to anger with the works of your hands; and I will do you no hurt. '
  '7':
  - type: text
    content: 'Yet ye have not hearkened unto me, saith the '
  - type: text
    content: LORD
  - type: text
    content: '; that ye might provoke me to anger with the works of your hands to your own hurt. '
  '8':
  - type: text
    content: 'Therefore thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts; Because ye have not heard my words, '
  '9':
  - type: text
    content: 'behold, I will send and take all the families of the north, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', and Nebuchadrezzar the king of Babylon, my servant, and will bring them against this land, and against the inhabitants thereof, and against all these nations round about, and will utterly destroy them, and make them an astonishment, and an hissing, and perpetual desolations. '
