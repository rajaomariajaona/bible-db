document_id: JER.35,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Commends the Rechabites
  - type: text
    content: 'The word which came unto Jeremiah from the '
  - type: text
    content: LORD
  - type: text
    content: ' in the days of Jehoiakim the son of Josiah king of Judah, saying, '
  '10':
  - type: text
    content: 'but we have dwelt in tents, and have obeyed, and done according to all that Jonadab our father commanded us. '
  '11':
  - type: text
    content: 'But it came to pass, when Nebuchadrezzar king of Babylon came up into the land, that we said, Come, and let us go to Jerusalem for fear of the army of the Chaldeans, and for fear of the army of the Syrians: so we dwell at Jerusalem.'
  '12':
  - type: text
    content: 'Then came the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' unto Jeremiah, saying, '
  '13':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, the God of Israel; Go and tell the men of Judah and the inhabitants of Jerusalem, Will ye not receive instruction to hearken to my words? saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'The words of Jonadab the son of Rechab, that he commanded his sons not to drink wine, are performed; for unto this day they drink none, but obey their father''s commandment: notwithstanding I have spoken unto you, rising early and speaking; but ye hearkened not unto me. '
  '15':
  - type: text
    content: 'I have sent also unto you all my servants the prophets, rising up early and sending '
  - type: text
    content: them
  - type: text
    content: ', saying, Return ye now every man from his evil way, and amend your doings, and go not after other gods to serve them, and ye shall dwell in the land which I have given to you and to your fathers: but ye have not inclined your ear, nor hearkened unto me. '
  '16':
  - type: text
    content: 'Because the sons of Jonadab the son of Rechab have performed the commandment of their father, which he commanded them; but this people hath not hearkened unto me: '
  '17':
  - type: text
    content: 'therefore thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' God of hosts, the God of Israel; Behold, I will bring upon Judah and upon all the inhabitants of Jerusalem all the evil that I have pronounced against them: because I have spoken unto them, but they have not heard; and I have called unto them, but they have not answered.'
  '18':
  - type: text
    content: 'And Jeremiah said unto the house of the Rechabites, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, the God of Israel; Because ye have obeyed the commandment of Jonadab your father, and kept all his precepts, and done according unto all that he hath commanded you: '
  '19':
  - type: text
    content: 'therefore thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, the God of Israel; Jonadab the son of Rechab shall not want a man to stand before me for ever.'
  '2':
  - type: text
    content: 'Go unto the house of the Rechabites, and speak unto them, and bring them into the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', into one of the chambers, and give them wine to drink.'
  '3':
  - type: text
    content: 'Then I took Jaazaniah the son of Jeremiah, the son of Habaziniah, and his brethren, and all his sons, and the whole house of the Rechabites; '
  '4':
  - type: text
    content: 'and I brought them into the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', into the chamber of the sons of Hanan, the son of Igdaliah, a man of God, which '
  - type: text
    content: was
  - type: text
    content: ' by the chamber of the princes, which '
  - type: text
    content: was
  - type: text
    content: ' above the chamber of Maaseiah the son of Shallum, the keeper of the door: '
  '5':
  - type: text
    content: and I set before the sons of the house of the Rechabites pots full of wine, and cups, and I said unto them, Drink ye wine.
  '6':
  - type: text
    content: 'But they said, We will drink no wine: for Jonadab the son of Rechab our father commanded us, saying, Ye shall drink no wine, '
  - type: text
    content: neither
  - type: text
    content: ' ye, nor your sons for ever: '
  '7':
  - type: text
    content: 'neither shall ye build house, nor sow seed, nor plant vineyard, nor have '
  - type: text
    content: 'any:'
  - type: text
    content: ' but all your days ye shall dwell in tents; that ye may live many days in the land where ye '
  - type: text
    content: be
  - type: text
    content: ' strangers. '
  '8':
  - type: text
    content: 'Thus have we obeyed the voice of Jonadab the son of Rechab our father in all that he hath charged us, to drink no wine all our days, we, our wives, our sons, nor our daughters; '
  '9':
  - type: text
    content: 'nor to build houses for us to dwell in: neither have we vineyard, nor field, nor seed: '
