  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Samuel, How long wilt thou mourn for Saul, seeing I have rejected him from reigning over Israel? fill thine horn with oil, and go, I will send thee to Jesse the Beth-lehemite: for I have provided me a king among his sons. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Samuel said, How can I go? if Saul hear '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', he will kill me. And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said, Take an heifer with thee, and say, I am come to sacrifice to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And call Jesse to the sacrifice, and I will shew thee what thou shalt do: and thou shalt anoint unto me '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' whom I name unto thee. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Samuel did that which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake, and came to Beth-lehem. And the elders of the town trembled at his coming, and said, Comest thou peaceably? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And he said, Peaceably: I am come to sacrifice unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': sanctify yourselves, and come with me to the sacrifice. And he sanctified Jesse and his sons, and called them to the sacrifice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And it came to pass, when they were come, that he looked on Eliab, and said, Surely the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s anointed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' before him. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Samuel, Look not on his countenance, or on the height of his stature; because I have refused him: for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' seeth'
  - type: text
    text: ' not as man seeth; for man looketh on the outward appearance, but the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' looketh on the heart. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then Jesse called Abinadab, and made him pass before Samuel. And he said, Neither hath the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' chosen this. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then Jesse made Shammah to pass by. And he said, Neither hath the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' chosen this. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Again, Jesse made seven of his sons to pass before Samuel. And Samuel said unto Jesse, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath not chosen these. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Samuel said unto Jesse, Are here all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thy
  - type: text
    text: ' children? And he said, There remaineth yet the youngest, and, behold, he keepeth the sheep. And Samuel said unto Jesse, Send and fetch him: for we will not sit down till he come hither. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And he sent, and brought him in. Now he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' ruddy, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' withal of a beautiful countenance, and goodly to look to. And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said, Arise, anoint him: for this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' he. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Samuel took the horn of oil, and anointed him in the midst of his brethren: and the Spirit of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came upon David from that day forward. So Samuel rose up, and went to Ramah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But the Spirit of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' departed from Saul, and an evil spirit from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' troubled him. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Saul''s servants said unto him, Behold now, an evil spirit from God troubleth thee. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Let our lord now command thy servants, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which are
  - type: text
    text: ' before thee, to seek out a man, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: who is
  - type: text
    text: ' a cunning player on an harp: and it shall come to pass, when the evil spirit from God is upon thee, that he shall play with his hand, and thou shalt be well. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And Saul said unto his servants, Provide me now a man that can play well, and bring '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' to me. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then answered one of the servants, and said, Behold, I have seen a son of Jesse the Beth-lehemite, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' cunning in playing, and a mighty valiant man, and a man of war, and prudent in matters, and a comely person, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with him. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Wherefore Saul sent messengers unto Jesse, and said, Send me David thy son, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with the sheep. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Jesse took an ass '
  - type: usfm
    marker: add
    children:
    - type: text
      text: laden
  - type: text
    text: ' with bread, and a bottle of wine, and a kid, and sent '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' by David his son unto Saul. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And David came to Saul, and stood before him: and he loved him greatly; and he became his armourbearer. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And Saul sent to Jesse, saying, Let David, I pray thee, stand before me; for he hath found favour in my sight. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And it came to pass, when the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: evil
  - type: text
    text: ' spirit from God was upon Saul, that David took an harp, and played with his hand: so Saul was refreshed, and was well, and the evil spirit departed from him.'
