document_id: ZEC.12,1
type_code: eng
verses:
  '1':
  - type: heading
    content: A Trembling City
  - type: text
    content: 'The burden of the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' for Israel, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', which stretcheth forth the heavens, and layeth the foundation of the earth, and formeth the spirit of man within him.'
  '10':
  - type: text
    content: 'And I will pour upon the house of David, and upon the inhabitants of Jerusalem, the spirit of grace and of supplications: and they shall look upon me whom they have pierced, and they shall mourn for him, as one mourneth for '
  - type: text
    content: his
  - type: text
    content: ' only '
  - type: text
    content: son
  - type: text
    content: ', and shall be in bitterness for him, as one that is in bitterness for '
  - type: text
    content: his
  - type: text
    content: ' firstborn. '
  '11':
  - type: text
    content: 'In that day shall there be a great mourning in Jerusalem, as the mourning of Hadadrimmon in the valley of Megiddon. '
  '12':
  - type: text
    content: 'And the land shall mourn, every family apart; the family of the house of David apart, and their wives apart; the family of the house of Nathan apart, and their wives apart; '
  '13':
  - type: text
    content: 'the family of the house of Levi apart, and their wives apart; the family of Shimei apart, and their wives apart; '
  '14':
  - type: text
    content: all the families that remain, every family apart, and their wives apart.
  '2':
  - type: text
    content: 'Behold, I will make Jerusalem a cup of trembling unto all the people round about, when they shall be in the siege both against Judah '
  - type: text
    content: and
  - type: text
    content: ' against Jerusalem. '
  '3':
  - type: text
    content: 'And in that day will I make Jerusalem a burdensome stone for all people: all that burden themselves with it shall be cut in pieces, though all the people of the earth be gathered together against it. '
  '4':
  - type: text
    content: 'In that day, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', I will smite every horse with astonishment, and his rider with madness: and I will open mine eyes upon the house of Judah, and will smite every horse of the people with blindness. '
  '5':
  - type: text
    content: 'And the governors of Judah shall say in their heart, The inhabitants of Jerusalem '
  - type: text
    content: shall be
  - type: text
    content: ' my strength in the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts their God.'
  '6':
  - type: text
    content: 'In that day will I make the governors of Judah like an hearth of fire among the wood, and like a torch of fire in a sheaf; and they shall devour all the people round about, on the right hand and on the left: and Jerusalem shall be inhabited again in her own place, '
  - type: text
    content: even
  - type: text
    content: ' in Jerusalem. '
  '7':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' also shall save the tents of Judah first, that the glory of the house of David and the glory of the inhabitants of Jerusalem do not magnify '
  - type: text
    content: themselves
  - type: text
    content: ' against Judah.'
  '8':
  - type: text
    content: 'In that day shall the '
  - type: text
    content: LORD
  - type: text
    content: ' defend the inhabitants of Jerusalem; and he that is feeble among them at that day shall be as David; and the house of David '
  - type: text
    content: shall be
  - type: text
    content: ' as God, as the angel of the '
  - type: text
    content: LORD
  - type: text
    content: ' before them. '
  '9':
  - type: text
    content: 'And it shall come to pass in that day, '
  - type: text
    content: that
  - type: text
    content: ' I will seek to destroy all the nations that come against Jerusalem.'
  - type: heading
    content: A Day of Mourning
