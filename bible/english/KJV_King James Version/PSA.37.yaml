document_id: PSA.37,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: A Psalm
    - type: text
      text: ' of David.'
  - type: usfm
    marker: qa
    children:
    - type: text
      text: א Aleph
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Fret not thyself because of evildoers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Neither be thou envious against the workers of iniquity.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For yet a little while, and the wicked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall
    - type: text
      text: ' not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'be:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yea, thou shalt diligently consider his place, and it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall
    - type: text
      text: ' not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: But the meek shall inherit the earth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And shall delight themselves in the abundance of peace.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ז Zain
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The wicked plotteth against the just,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And gnasheth upon him with his teeth.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'The Lord shall laugh at him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For he seeth that his day is coming.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ח Het
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The wicked have drawn out the sword, and have bent their bow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To cast down the poor and needy, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' to slay such as be of upright conversation.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Their sword shall enter into their own heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their bows shall be broken.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ט Tet
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'A little that a righteous man hath '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' better'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Than the riches of many wicked.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For the arms of the wicked shall be broken:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' upholdeth the righteous.'
  - type: usfm
    marker: qa
    children:
    - type: text
      text: י Yod
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' knoweth the days of the upright:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their inheritance shall be for ever.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'They shall not be ashamed in the evil time:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And in the days of famine they shall be satisfied.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: כ Kaph
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: For they shall soon be cut down like the grass,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And wither as the green herb.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ב Bet
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: But the wicked shall perish,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the enemies of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' as the fat of lambs:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They shall consume; into smoke shall they consume away.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ל Lamed
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'The wicked borroweth, and payeth not again:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the righteous sheweth mercy, and giveth.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'For '
    - type: usfm
      marker: add
      children:
      - type: text
        text: such as be
    - type: text
      text: ' blessed of him shall inherit the earth;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they that be
    - type: text
      text: ' cursed of him shall be cut off.'
  - type: usfm
    marker: qa
    children:
    - type: text
      text: מ Mem
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'The steps of a '
    - type: usfm
      marker: add
      children:
      - type: text
        text: good
    - type: text
      text: ' man are ordered by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ':'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he delighteth in his way.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Though he fall, he shall not be utterly cast down:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' upholdeth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him with
    - type: text
      text: ' his hand.'
  - type: usfm
    marker: qa
    children:
    - type: text
      text: נ Nun
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'I have been young, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: now
    - type: text
      text: ' am old;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yet have I not seen the righteous forsaken, nor his seed begging bread.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: He is
    - type: text
      text: ' ever merciful, and lendeth;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And his seed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' blessed.'
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ס Samek
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Depart from evil, and do good;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And dwell for evermore.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' loveth judgment,'
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ע Ain
    marker-yv: yv-h
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And forsaketh not his saints; they are preserved for ever:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the seed of the wicked shall be cut off.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: The righteous shall inherit the land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And dwell therein for ever.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: פ Pe
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Trust in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and do good;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: So
    - type: text
      text: ' shalt thou dwell in the land, and verily thou shalt be fed.'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: The mouth of the righteous speaketh wisdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his tongue talketh of judgment.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'The law of his God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in his heart;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: None of his steps shall slide.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: צ Zade
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: The wicked watcheth the righteous,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And seeketh to slay him.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will not leave him in his hand,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor condemn him when he is judged.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ק Qoph
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Wait on the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and keep his way, and he shall exalt thee to inherit the land:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When the wicked are cut off, thou shalt see '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ר Resh
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: I have seen the wicked in great power,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And spreading himself like a green bay tree.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Yet he passed away, and, lo, he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' not:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yea, I sought him, but he could not be found.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ש Shin
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Mark the perfect '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ', and behold the upright:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the end of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' peace.'
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'But the transgressors shall be destroyed together:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The end of the wicked shall be cut off.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ת Taw
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'But the salvation of the righteous '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ':'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: He is
    - type: text
      text: ' their strength in the time of trouble.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Delight thyself also in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he shall give thee the desires of thine heart.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ג Gimel
    marker-yv: yv-h
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall help them, and deliver them:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shall deliver them from the wicked, and save them, because they trust in him.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Commit thy way unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ; Trust also in him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And he shall bring '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to pass.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: And he shall bring forth thy righteousness as the light,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thy judgment as the noonday.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ד Dalet
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Rest in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and wait patiently for him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Fret not thyself because of him who prospereth in his way, because of the man who bringeth wicked devices to pass.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ה He
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Cease from anger, and forsake wrath:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Fret not thyself in any wise to do evil.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For evildoers shall be cut off:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But those that wait upon the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', they shall inherit the earth.'
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ו Waw
    marker-yv: yv-h
