document_id: LUK.1,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Forasmuch as many have taken in hand to set forth in order a declaration of those things which are most surely believed among us, '
  '10':
  - type: text
    content: And the whole multitude of the people were praying without at the time of incense.
  '11':
  - type: text
    content: 'And there appeared unto him an angel of the Lord standing on the right side of the altar of incense. '
  '12':
  - type: text
    content: 'And when Zacharias saw '
  - type: text
    content: him
  - type: text
    content: ', he was troubled, and fear fell upon him. '
  '13':
  - type: text
    content: 'But the angel said unto him, Fear not, Zacharias: for thy prayer is heard; and thy wife Elisabeth shall bear thee a son, and thou shalt call his name John. '
  '14':
  - type: text
    content: 'And thou shalt have joy and gladness; and many shall rejoice at his birth. '
  '15':
  - type: text
    content: 'For he shall be great in the sight of the Lord, and shall drink neither wine nor strong drink; and he shall be filled with the Holy Ghost, even from his mother''s womb. '
  '16':
  - type: text
    content: 'And many of the children of Israel shall he turn to the Lord their God. '
  '17':
  - type: text
    content: 'And he shall go before him in the spirit and power of Elias, to turn the hearts of the fathers to the children, and the disobedient to the wisdom of the just; to make ready a people prepared for the Lord. '
  '18':
  - type: text
    content: 'And Zacharias said unto the angel, Whereby shall I know this? for I am an old man, and my wife well stricken in years. '
  '19':
  - type: text
    content: 'And the angel answering said unto him, I am Gabriel, that stand in the presence of God; and am sent to speak unto thee, and to shew thee these glad tidings. '
  '2':
  - type: text
    content: 'even as they delivered them unto us, which from the beginning were eyewitnesses, and ministers of the word; '
  '20':
  - type: text
    content: And, behold, thou shalt be dumb, and not able to speak, until the day that these things shall be performed, because thou believest not my words, which shall be fulfilled in their season.
  '21':
  - type: text
    content: 'And the people waited for Zacharias, and marvelled that he tarried so long in the temple. '
  '22':
  - type: text
    content: 'And when he came out, he could not speak unto them: and they perceived that he had seen a vision in the temple: for he beckoned unto them, and remained speechless.'
  '23':
  - type: text
    content: 'And it came to pass, that, as soon as the days of his ministration were accomplished, he departed to his own house. '
  '24':
  - type: text
    content: 'And after those days his wife Elisabeth conceived, and hid herself five months, saying, '
  '25':
  - type: text
    content: 'Thus hath the Lord dealt with me in the days wherein he looked on '
  - type: text
    content: me
  - type: text
    content: ', to take away my reproach among men.'
  - type: heading
    content: The Annunciation
  '26':
  - type: text
    content: 'And in the sixth month the angel Gabriel was sent from God unto a city of Galilee, named Nazareth, '
  '27':
  - type: text
    content: 'to a virgin espoused to a man whose name was Joseph, of the house of David; and the virgin''s name '
  - type: text
    content: was
  - type: text
    content: ' Mary. '
  '28':
  - type: text
    content: 'And the angel came in unto her, and said, Hail, '
  - type: text
    content: thou that art
  - type: text
    content: ' highly favoured, the Lord '
  - type: text
    content: is
  - type: text
    content: ' with thee: blessed '
  - type: text
    content: art
  - type: text
    content: ' thou among women. '
  '29':
  - type: text
    content: 'And when she saw '
  - type: text
    content: him
  - type: text
    content: ', she was troubled at his saying, and cast in her mind what manner of salutation this should be. '
  '3':
  - type: text
    content: 'it seemed good to me also, having had perfect understanding of all things from the very first, to write unto thee in order, most excellent Theophilus, '
  '30':
  - type: text
    content: 'And the angel said unto her, Fear not, Mary: for thou hast found favour with God. '
  '31':
  - type: text
    content: 'And, behold, thou shalt conceive in thy womb, and bring forth a son, and shalt call his name JESUS. '
  '32':
  - type: text
    content: 'He shall be great, and shall be called the Son of the Highest: and the Lord God shall give unto him the throne of his father David: '
  '33':
  - type: text
    content: 'and he shall reign over the house of Jacob for ever; and of his kingdom there shall be no end. '
  '34':
  - type: text
    content: 'Then said Mary unto the angel, How shall this be, seeing I know not a man? '
  '35':
  - type: text
    content: 'And the angel answered and said unto her, The Holy Ghost shall come upon thee, and the power of the Highest shall overshadow thee: therefore also that holy thing which shall be born of thee shall be called the Son of God. '
  '36':
  - type: text
    content: 'And, behold, thy cousin Elisabeth, she hath also conceived a son in her old age: and this is the sixth month with her, who was called barren. '
  '37':
  - type: text
    content: 'For with God nothing shall be impossible. '
  '38':
  - type: text
    content: And Mary said, Behold the handmaid of the Lord; be it unto me according to thy word. And the angel departed from her.
  '39':
  - type: text
    content: 'And Mary arose in those days, and went into the hill country with haste, into a city of Juda; '
  '4':
  - type: text
    content: that thou mightest know the certainty of those things, wherein thou hast been instructed.
  - type: heading
    content: The Birth and Boyhood of Jesus
  '40':
  - type: text
    content: 'and entered into the house of Zacharias, and saluted Elisabeth. '
  '41':
  - type: text
    content: 'And it came to pass, that, when Elisabeth heard the salutation of Mary, the babe leaped in her womb; and Elisabeth was filled with the Holy Ghost: '
  '42':
  - type: text
    content: 'and she spake out with a loud voice, and said, Blessed '
  - type: text
    content: art
  - type: text
    content: ' thou among women, and blessed '
  - type: text
    content: is
  - type: text
    content: ' the fruit of thy womb. '
  '43':
  - type: text
    content: 'And whence '
  - type: text
    content: is
  - type: text
    content: ' this to me, that the mother of my Lord should come to me? '
  '44':
  - type: text
    content: 'For, lo, as soon as the voice of thy salutation sounded in mine ears, the babe leaped in my womb for joy. '
  '45':
  - type: text
    content: 'And blessed '
  - type: text
    content: is
  - type: text
    content: ' she that believed: for there shall be a performance of those things which were told her from the Lord.'
  - type: heading
    content: The Magnificat
  '46':
  - type: text
    content: And Mary said,
  - type: text
    content: My soul doth magnify the Lord,
  '47':
  - type: text
    content: And my spirit hath rejoiced in God my Saviour.
  '48':
  - type: text
    content: 'For he hath regarded the low estate of his handmaiden:'
  - type: text
    content: For, behold, from henceforth all generations shall call me blessed.
  '49':
  - type: text
    content: For he that is mighty hath done to me great things;
  - type: text
    content: 'And holy '
  - type: text
    content: is
  - type: text
    content: ' his name.'
  '5':
  - type: text
    content: 'There was in the days of Herod, the king of Judæa, a certain priest named Zacharias, of the course of Abia: and his wife '
  - type: text
    content: was
  - type: text
    content: ' of the daughters of Aaron, and her name '
  - type: text
    content: was
  - type: text
    content: ' Elisabeth. '
  '50':
  - type: text
    content: 'And his mercy '
  - type: text
    content: is
  - type: text
    content: ' on them that fear him'
  - type: text
    content: From generation to generation.
  '51':
  - type: text
    content: He hath shewed strength with his arm;
  - type: text
    content: He hath scattered the proud in the imagination of their hearts.
  '52':
  - type: text
    content: 'He hath put down the mighty from '
  - type: text
    content: their
  - type: text
    content: ' seats,'
  - type: text
    content: And exalted them of low degree.
  '53':
  - type: text
    content: He hath filled the hungry with good things;
  - type: text
    content: And the rich he hath sent empty away.
  '54':
  - type: text
    content: He hath holpen his servant Israel,
  - type: text
    content: 'In remembrance of '
  - type: text
    content: his
  - type: text
    content: ' mercy;'
  '55':
  - type: text
    content: As he spake to our fathers,
  - type: text
    content: To Abraham, and to his seed for ever.
  '56':
  - type: text
    content: And Mary abode with her about three months, and returned to her own house.
  '57':
  - type: text
    content: 'Now Elisabeth''s full time came that she should be delivered; and she brought forth a son. '
  '58':
  - type: text
    content: 'And her neighbours and her cousins heard how the Lord had shewed great mercy upon her; and they rejoiced with her. '
  '59':
  - type: text
    content: 'And it came to pass, that on the eighth day they came to circumcise the child; and they called him Zacharias, after the name of his father. '
  '6':
  - type: text
    content: 'And they were both righteous before God, walking in all the commandments and ordinances of the Lord blameless. '
  '60':
  - type: text
    content: 'And his mother answered and said, Not '
  - type: text
    content: so
  - type: text
    content: '; but he shall be called John. '
  '61':
  - type: text
    content: 'And they said unto her, There is none of thy kindred that is called by this name. '
  '62':
  - type: text
    content: 'And they made signs to his father, how he would have him called. '
  '63':
  - type: text
    content: 'And he asked for a writing table, and wrote, saying, His name is John. And they marvelled all. '
  '64':
  - type: text
    content: 'And his mouth was opened immediately, and his tongue '
  - type: text
    content: loosed
  - type: text
    content: ', and he spake, and praised God. '
  '65':
  - type: text
    content: 'And fear came on all that dwelt round about them: and all these sayings were noised abroad throughout all the hill country of Judæa. '
  '66':
  - type: text
    content: 'And all they that heard '
  - type: text
    content: them
  - type: text
    content: ' laid '
  - type: text
    content: them
  - type: text
    content: ' up in their hearts, saying, What manner of child shall this be! And the hand of the Lord was with him.'
  - type: heading
    content: The Benedictus
  '67':
  - type: text
    content: And his father Zacharias was filled with the Holy Ghost, and prophesied, saying,
  '68':
  - type: text
    content: 'Blessed '
  - type: text
    content: be
  - type: text
    content: ' the Lord God of Israel;'
  - type: text
    content: For he hath visited and redeemed his people,
  '69':
  - type: text
    content: And hath raised up an horn of salvation for us
  - type: text
    content: In the house of his servant David;
  '7':
  - type: text
    content: 'And they had no child, because that Elisabeth was barren, and they both were '
  - type: text
    content: now
  - type: text
    content: ' well stricken in years.'
  '70':
  - type: text
    content: 'As he spake by the mouth of his holy prophets, which have been since the world began:'
  '71':
  - type: text
    content: That we should be saved from our enemies, and from the hand of all that hate us;
  '72':
  - type: text
    content: 'To perform the mercy '
  - type: text
    content: promised
  - type: text
    content: ' to our fathers,'
  - type: text
    content: And to remember his holy covenant;
  '73':
  - type: text
    content: The oath which he sware to our father Abraham,
  '74':
  - type: text
    content: That he would grant unto us, that we being delivered out of the hand of our enemies
  - type: text
    content: Might serve him without fear,
  '75':
  - type: text
    content: In holiness and righteousness before him, all the days of our life.
  '76':
  - type: text
    content: 'And thou, child, shalt be called the prophet of the Highest:'
  - type: text
    content: For thou shalt go before the face of the Lord to prepare his ways;
  '77':
  - type: text
    content: To give knowledge of salvation unto his people
  - type: text
    content: By the remission of their sins,
  '78':
  - type: text
    content: Through the tender mercy of our God;
  - type: text
    content: Whereby the dayspring from on high hath visited us,
  '79':
  - type: text
    content: 'To give light to them that sit in darkness and '
  - type: text
    content: in
  - type: text
    content: ' the shadow of death,'
  - type: text
    content: To guide our feet into the way of peace.
  '8':
  - type: text
    content: 'And it came to pass, that while he executed the priest''s office before God in the order of his course, '
  '80':
  - type: text
    content: And the child grew, and waxed strong in spirit, and was in the deserts till the day of his shewing unto Israel.
  '9':
  - type: text
    content: 'according to the custom of the priest''s office, his lot was to burn incense when he went into the temple of the Lord. '
