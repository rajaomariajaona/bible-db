document_id: LUK.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Forasmuch as many have taken in hand to set forth in order a declaration of those things which are most surely believed among us, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: And the whole multitude of the people were praying without at the time of incense.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And there appeared unto him an angel of the Lord standing on the right side of the altar of incense. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And when Zacharias saw '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', he was troubled, and fear fell upon him. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But the angel said unto him, Fear not, Zacharias: for thy prayer is heard; and thy wife Elisabeth shall bear thee a son, and thou shalt call his name John. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And thou shalt have joy and gladness; and many shall rejoice at his birth. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'For he shall be great in the sight of the Lord, and shall drink neither wine nor strong drink; and he shall be filled with the Holy Ghost, even from his mother''s womb. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And many of the children of Israel shall he turn to the Lord their God. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And he shall go before him in the spirit and power of Elias, to turn the hearts of the fathers to the children, and the disobedient to the wisdom of the just; to make ready a people prepared for the Lord. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And Zacharias said unto the angel, Whereby shall I know this? for I am an old man, and my wife well stricken in years. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And the angel answering said unto him, I am Gabriel, that stand in the presence of God; and am sent to speak unto thee, and to shew thee these glad tidings. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'even as they delivered them unto us, which from the beginning were eyewitnesses, and ministers of the word; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: And, behold, thou shalt be dumb, and not able to speak, until the day that these things shall be performed, because thou believest not my words, which shall be fulfilled in their season.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And the people waited for Zacharias, and marvelled that he tarried so long in the temple. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And when he came out, he could not speak unto them: and they perceived that he had seen a vision in the temple: for he beckoned unto them, and remained speechless.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And it came to pass, that, as soon as the days of his ministration were accomplished, he departed to his own house. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And after those days his wife Elisabeth conceived, and hid herself five months, saying, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Thus hath the Lord dealt with me in the days wherein he looked on '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ', to take away my reproach among men.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Annunciation
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And in the sixth month the angel Gabriel was sent from God unto a city of Galilee, named Nazareth, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'to a virgin espoused to a man whose name was Joseph, of the house of David; and the virgin''s name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Mary. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And the angel came in unto her, and said, Hail, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thou that art
    - type: text
      text: ' highly favoured, the Lord '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' with thee: blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' thou among women. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And when she saw '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', she was troubled at his saying, and cast in her mind what manner of salutation this should be. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'it seemed good to me also, having had perfect understanding of all things from the very first, to write unto thee in order, most excellent Theophilus, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And the angel said unto her, Fear not, Mary: for thou hast found favour with God. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And, behold, thou shalt conceive in thy womb, and bring forth a son, and shalt call his name JESUS. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'He shall be great, and shall be called the Son of the Highest: and the Lord God shall give unto him the throne of his father David: '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'and he shall reign over the house of Jacob for ever; and of his kingdom there shall be no end. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Then said Mary unto the angel, How shall this be, seeing I know not a man? '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'And the angel answered and said unto her, The Holy Ghost shall come upon thee, and the power of the Highest shall overshadow thee: therefore also that holy thing which shall be born of thee shall be called the Son of God. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'And, behold, thy cousin Elisabeth, she hath also conceived a son in her old age: and this is the sixth month with her, who was called barren. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'For with God nothing shall be impossible. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: And Mary said, Behold the handmaid of the Lord; be it unto me according to thy word. And the angel departed from her.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'And Mary arose in those days, and went into the hill country with haste, into a city of Juda; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: that thou mightest know the certainty of those things, wherein thou hast been instructed.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Birth and Boyhood of Jesus
    marker-yv: yv-h
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'and entered into the house of Zacharias, and saluted Elisabeth. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'And it came to pass, that, when Elisabeth heard the salutation of Mary, the babe leaped in her womb; and Elisabeth was filled with the Holy Ghost: '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'and she spake out with a loud voice, and said, Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' thou among women, and blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the fruit of thy womb. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'And whence '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' this to me, that the mother of my Lord should come to me? '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'For, lo, as soon as the voice of thy salutation sounded in mine ears, the babe leaped in my womb for joy. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'And blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' she that believed: for there shall be a performance of those things which were told her from the Lord.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Magnificat
    marker-yv: yv-h
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: And Mary said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My soul doth magnify the Lord,
  '47':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: And my spirit hath rejoiced in God my Saviour.
  '48':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'For he hath regarded the low estate of his handmaiden:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For, behold, from henceforth all generations shall call me blessed.
  '49':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: For he that is mighty hath done to me great things;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' his name.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'There was in the days of Herod, the king of Judæa, a certain priest named Zacharias, of the course of Abia: and his wife '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' of the daughters of Aaron, and her name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Elisabeth. '
  '50':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'And his mercy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' on them that fear him'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From generation to generation.
  '51':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: He hath shewed strength with his arm;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He hath scattered the proud in the imagination of their hearts.
  '52':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'He hath put down the mighty from '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' seats,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And exalted them of low degree.
  '53':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: He hath filled the hungry with good things;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the rich he hath sent empty away.
  '54':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: He hath holpen his servant Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In remembrance of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' mercy;'
  '55':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: As he spake to our fathers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To Abraham, and to his seed for ever.
  '56':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: And Mary abode with her about three months, and returned to her own house.
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'Now Elisabeth''s full time came that she should be delivered; and she brought forth a son. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: 'And her neighbours and her cousins heard how the Lord had shewed great mercy upon her; and they rejoiced with her. '
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: 'And it came to pass, that on the eighth day they came to circumcise the child; and they called him Zacharias, after the name of his father. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And they were both righteous before God, walking in all the commandments and ordinances of the Lord blameless. '
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: 'And his mother answered and said, Not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: '; but he shall be called John. '
  '61':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: 'And they said unto her, There is none of thy kindred that is called by this name. '
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: 'And they made signs to his father, how he would have him called. '
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: 'And he asked for a writing table, and wrote, saying, His name is John. And they marvelled all. '
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: 'And his mouth was opened immediately, and his tongue '
    - type: usfm
      marker: add
      children:
      - type: text
        text: loosed
    - type: text
      text: ', and he spake, and praised God. '
  '65':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: 'And fear came on all that dwelt round about them: and all these sayings were noised abroad throughout all the hill country of Judæa. '
  '66':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: 'And all they that heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' laid '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' up in their hearts, saying, What manner of child shall this be! And the hand of the Lord was with him.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Benedictus
    marker-yv: yv-h
  '67':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '67'
    - type: text
      text: And his father Zacharias was filled with the Holy Ghost, and prophesied, saying,
  '68':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '68'
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' the Lord God of Israel;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he hath visited and redeemed his people,
  '69':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '69'
    - type: text
      text: And hath raised up an horn of salvation for us
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the house of his servant David;
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And they had no child, because that Elisabeth was barren, and they both were '
    - type: usfm
      marker: add
      children:
      - type: text
        text: now
    - type: text
      text: ' well stricken in years.'
  '70':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '70'
    - type: text
      text: 'As he spake by the mouth of his holy prophets, which have been since the world began:'
  '71':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '71'
    - type: text
      text: That we should be saved from our enemies, and from the hand of all that hate us;
  '72':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '72'
    - type: text
      text: 'To perform the mercy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: promised
    - type: text
      text: ' to our fathers,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to remember his holy covenant;
  '73':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '73'
    - type: text
      text: The oath which he sware to our father Abraham,
  '74':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '74'
    - type: text
      text: That he would grant unto us, that we being delivered out of the hand of our enemies
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Might serve him without fear,
  '75':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '75'
    - type: text
      text: In holiness and righteousness before him, all the days of our life.
  '76':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '76'
    - type: text
      text: 'And thou, child, shalt be called the prophet of the Highest:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For thou shalt go before the face of the Lord to prepare his ways;
  '77':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '77'
    - type: text
      text: To give knowledge of salvation unto his people
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By the remission of their sins,
  '78':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '78'
    - type: text
      text: Through the tender mercy of our God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whereby the dayspring from on high hath visited us,
  '79':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '79'
    - type: text
      text: 'To give light to them that sit in darkness and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' the shadow of death,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To guide our feet into the way of peace.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And it came to pass, that while he executed the priest''s office before God in the order of his course, '
  '80':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '80'
    - type: text
      text: And the child grew, and waxed strong in spirit, and was in the deserts till the day of his shewing unto Israel.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'according to the custom of the priest''s office, his lot was to burn incense when he went into the temple of the Lord. '
