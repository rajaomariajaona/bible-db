document_id: EXO.33
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Moses, Depart, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' go up hence, thou and the people which thou hast brought up out of the land of Egypt, unto the land which I sware unto Abraham, to Isaac, and to Jacob, saying, Unto thy seed will I give it: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and I will send an angel before thee; and I will drive out the Canaanite, the Amorite, and the Hittite, and the Perizzite, the Hivite, and the Jebusite: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'unto a land flowing with milk and honey: for I will not go up in the midst of thee; for thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' a stiffnecked people: lest I consume thee in the way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And when the people heard these evil tidings, they mourned: and no man did put on him his ornaments. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had said unto Moses, Say unto the children of Israel, Ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' a stiffnecked people: I will come up into the midst of thee in a moment, and consume thee: therefore now put off thy ornaments from thee, that I may know what to do unto thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And the children of Israel stripped themselves of their ornaments by the mount Horeb.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And Moses took the tabernacle, and pitched it without the camp, afar off from the camp, and called it the Tabernacle of the congregation. And it came to pass, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' every one which sought the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' went out unto the tabernacle of the congregation, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' without the camp. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And it came to pass, when Moses went out unto the tabernacle, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' all the people rose up, and stood every man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: at
  - type: text
    text: ' his tent door, and looked after Moses, until he was gone into the tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And it came to pass, as Moses entered into the tabernacle, the cloudy pillar descended, and stood '
  - type: usfm
    marker: add
    children:
    - type: text
      text: at
  - type: text
    text: ' the door of the tabernacle, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
  - type: text
    text: ' talked with Moses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And all the people saw the cloudy pillar stand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: at
  - type: text
    text: ' the tabernacle door: and all the people rose up and worshipped, every man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' his tent door. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses face to face, as a man speaketh unto his friend. And he turned again into the camp: but his servant Joshua, the son of Nun, a young man, departed not out of the tabernacle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Moses said unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', See, thou sayest unto me, Bring up this people: and thou hast not let me know whom thou wilt send with me. Yet thou hast said, I know thee by name, and thou hast also found grace in my sight. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now therefore, I pray thee, if I have found grace in thy sight, shew me now thy way, that I may know thee, that I may find grace in thy sight: and consider that this nation '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And he said, My presence shall go '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with thee
  - type: text
    text: ', and I will give thee rest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And he said unto him, If thy presence go not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with me
  - type: text
    text: ', carry us not up hence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For wherein shall it be known here that I and thy people have found grace in thy sight? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is it
  - type: text
    text: ' not in that thou goest with us? so shall we be separated, I and thy people, from all the people that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' upon the face of the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Moses, I will do this thing also that thou hast spoken: for thou hast found grace in my sight, and I know thee by name. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And he said, I beseech thee, shew me thy glory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And he said, I will make all my goodness pass before thee, and I will proclaim the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' before thee; and will be gracious to whom I will be gracious, and will shew mercy on whom I will shew mercy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And he said, Thou canst not see my face: for there shall no man see me, and live. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said, Behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' a place by me, and thou shalt stand upon a rock: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'and it shall come to pass, while my glory passeth by, that I will put thee in a clift of the rock, and will cover thee with my hand while I pass by: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'and I will take away mine hand, and thou shalt see my back parts: but my face shall not be seen.'
