    - type: text
      text: ' in the earth beneath, or that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the water under the earth: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'thou shalt not bow down thyself to them, nor serve them: for I the '
    - type: usfm
