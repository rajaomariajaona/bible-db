    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' maketh the hinds to calve, and discovereth the forests:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And in his temple doth every one speak of '
    - type: usfm
