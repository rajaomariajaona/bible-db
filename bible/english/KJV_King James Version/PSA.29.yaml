      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' upon the waters:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The God of glory thundereth:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' upon many waters. '
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' powerful;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
