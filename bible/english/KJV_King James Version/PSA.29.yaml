document_id: PSA.29,1
type_code: eng
verses:
  '1':
  - type: text
    content: A Psalm of David.
  - type: text
    content: 'Give unto the '
  - type: text
    content: LORD
  - type: text
    content: ', O ye mighty, give unto the '
  - type: text
    content: LORD
  - type: text
    content: ' glory and strength.'
  '10':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' sitteth upon the flood;'
  - type: text
    content: 'Yea, the '
  - type: text
    content: LORD
  - type: text
    content: ' sitteth King for ever.'
  '11':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' will give strength unto his people;'
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' will bless his people with peace.'
  '2':
  - type: text
    content: 'Give unto the '
  - type: text
    content: LORD
  - type: text
    content: ' the glory due unto his name;'
  - type: text
    content: 'Worship the '
  - type: text
    content: LORD
  - type: text
    content: ' in the beauty of holiness.'
  '3':
  - type: text
    content: 'The voice of the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' upon the waters:'
  - type: text
    content: 'The God of glory thundereth:'
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' upon many waters. '
  '4':
  - type: text
    content: 'The voice of the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' powerful;'
  - type: text
    content: 'The voice of the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' full of majesty.'
  '5':
  - type: text
    content: 'The voice of the '
  - type: text
    content: LORD
  - type: text
    content: ' breaketh the cedars;'
  - type: text
    content: 'Yea, the '
  - type: text
    content: LORD
  - type: text
    content: ' breaketh the cedars of Lebanon.'
  '6':
  - type: text
    content: He maketh them also to skip like a calf;
  - type: text
    content: Lebanon and Sirion like a young unicorn.
  '7':
  - type: text
    content: 'The voice of the '
  - type: text
    content: LORD
  - type: text
    content: ' divideth the flames of fire.'
  '8':
  - type: text
    content: 'The voice of the '
  - type: text
    content: LORD
  - type: text
    content: ' shaketh the wilderness; the '
  - type: text
    content: LORD
  - type: text
    content: ' shaketh the wilderness of Kadesh.'
  '9':
  - type: text
    content: 'The voice of the '
  - type: text
    content: LORD
  - type: text
    content: ' maketh the hinds to calve, and discovereth the forests:'
  - type: text
    content: 'And in his temple doth every one speak of '
  - type: text
    content: his
  - type: text
    content: ' glory.'
