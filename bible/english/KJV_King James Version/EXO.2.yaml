document_id: EXO.2,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moses
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there went a man of the house of Levi, and took '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to wife
    - type: text
      text: ' a daughter of Levi. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the child grew, and she brought him unto Pharaoh''s daughter, and he became her son. And she called his name Moses: and she said, Because I drew him out of the water.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass in those days, when Moses was grown, that he went out unto his brethren, and looked on their burdens: and he spied an Egyptian smiting an Hebrew, one of his brethren. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he looked this way and that way, and when he saw that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' no man, he slew the Egyptian, and hid him in the sand. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he went out the second day, behold, two men of the Hebrews strove together: and he said to him that did the wrong, Wherefore smitest thou thy fellow? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, Who made thee a prince and a judge over us? intendest thou to kill me, as thou killedst the Egyptian? And Moses feared, and said, Surely this thing is known. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when Pharaoh heard this thing, he sought to slay Moses. But Moses fled from the face of Pharaoh, and dwelt in the land of Midian: and he sat down by a well.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the priest of Midian had seven daughters: and they came and drew '
    - type: usfm
      marker: add
      children:
      - type: text
        text: water
    - type: text
      text: ', and filled the troughs to water their father''s flock. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the shepherds came and drove them away: but Moses stood up and helped them, and watered their flock. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they came to Reuel their father, he said, How '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is it that
    - type: text
      text: ' ye are come so soon to day? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said, An Egyptian delivered us out of the hand of the shepherds, and also drew '
    - type: usfm
      marker: add
      children:
      - type: text
        text: water
    - type: text
      text: ' enough for us, and watered the flock. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the woman conceived, and bare a son: and when she saw him that he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' a goodly '
    - type: usfm
      marker: add
      children:
      - type: text
        text: child
    - type: text
      text: ', she hid him three months. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto his daughters, And where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' he? why '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' ye have left the man? call him, that he may eat bread. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses was content to dwell with the man: and he gave Moses Zipporah his daughter. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And she bare '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' a son, and he called his name Gershom: for he said, I have been a stranger in a strange land.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass in process of time, that the king of Egypt died: and the children of Israel sighed by reason of the bondage, and they cried, and their cry came up unto God by reason of the bondage. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And God heard their groaning, and God remembered his covenant with Abraham, with Isaac, and with Jacob. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And God looked upon the children of Israel, and God had respect unto '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when she could not longer hide him, she took for him an ark of bulrushes, and daubed it with slime and with pitch, and put the child therein; and she laid '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' in the flags by the river''s brink. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And his sister stood afar off, to wit what would be done to him.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the daughter of Pharaoh came down to wash '
    - type: usfm
      marker: add
      children:
      - type: text
        text: herself
    - type: text
      text: ' at the river; and her maidens walked along by the river''s side; and when she saw the ark among the flags, she sent her maid to fetch it. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when she had opened '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', she saw the child: and, behold, the babe wept. And she had compassion on him, and said, This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is one
    - type: text
      text: ' of the Hebrews'' children. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said his sister to Pharaoh''s daughter, Shall I go and call to thee a nurse of the Hebrew women, that she may nurse the child for thee? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Pharaoh''s daughter said to her, Go. And the maid went and called the child''s mother. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Pharaoh''s daughter said unto her, Take this child away, and nurse it for me, and I will give '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thee
    - type: text
      text: ' thy wages. And the woman took the child, and nursed it. '
