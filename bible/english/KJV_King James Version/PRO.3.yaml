verses:
  '1':
  - type: text
    content: My son, forget not my law;
  - type: text
    content: 'But let thine heart keep my commandments:'
  '10':
  - type: text
    content: So shall thy barns be filled with plenty,
  - type: text
    content: And thy presses shall burst out with new wine.
  '11':
  - type: text
    content: 'My son, despise not the chastening of the '
  - type: text
    content: LORD
  - type: text
    content: ;
  - type: text
    content: 'Neither be weary of his correction:'
  '12':
  - type: text
    content: 'For whom the '
  - type: text
    content: LORD
  - type: text
    content: ' loveth he correcteth;'
  - type: text
    content: 'Even as a father the son '
  - type: text
    content: in whom
  - type: text
    content: ' he delighteth.'
  '13':
  - type: text
    content: 'Happy '
  - type: text
    content: is
  - type: text
    content: ' the man '
  - type: text
    content: that
  - type: text
    content: ' findeth wisdom,'
  - type: text
    content: 'And the man '
  - type: text
    content: that
  - type: text
    content: ' getteth understanding.'
  '14':
  - type: text
    content: 'For the merchandise of it '
  - type: text
    content: is
  - type: text
    content: ' better than the merchandise of silver,'
  - type: text
    content: And the gain thereof than fine gold.
  '15':
  - type: text
    content: 'She '
  - type: text
    content: is
  - type: text
    content: ' more precious than rubies:'
  - type: text
    content: And all the things thou canst desire are not to be compared unto her.
  '16':
  - type: text
    content: 'Length of days '
  - type: text
    content: is
  - type: text
    content: ' in her right hand;'
  - type: text
    content: And
  - type: text
    content: ' in her left hand riches and honour.'
  '17':
  - type: text
    content: 'Her ways '
  - type: text
    content: are
  - type: text
    content: ' ways of pleasantness,'
  - type: text
    content: 'And all her paths '
  - type: text
    content: are
  - type: text
    content: ' peace.'
  '18':
  - type: text
    content: 'She '
  - type: text
    content: is
  - type: text
    content: ' a tree of life to them that lay hold upon her:'
  - type: text
    content: 'And happy '
  - type: text
    content: is every one
  - type: text
    content: ' that retaineth her.'
  '19':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' by wisdom hath founded the earth;'
  - type: text
    content: By understanding hath he established the heavens.
  '2':
  - type: text
    content: For length of days, and long life,
  - type: text
    content: And peace, shall they add to thee.
  '20':
  - type: text
    content: By his knowledge the depths are broken up,
  - type: text
    content: And the clouds drop down the dew.
  '21':
  - type: text
    content: 'My son, let not them depart from thine eyes:'
  - type: text
    content: 'Keep sound wisdom and discretion:'
  '22':
  - type: text
    content: So shall they be life unto thy soul,
  - type: text
    content: And grace to thy neck.
  '23':
  - type: text
    content: Then shalt thou walk in thy way safely,
  - type: text
    content: And thy foot shall not stumble.
  '24':
  - type: text
    content: 'When thou liest down, thou shalt not be afraid:'
  - type: text
    content: Yea, thou shalt lie down, and thy sleep shall be sweet.
  '25':
  - type: text
    content: Be not afraid of sudden fear,
  - type: text
    content: Neither of the desolation of the wicked, when it cometh.
  '26':
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ' shall be thy confidence,'
  - type: text
    content: And shall keep thy foot from being taken.
  '27':
  - type: text
    content: Withhold not good from them to whom it is due,
  - type: text
    content: 'When it is in the power of thine hand to do '
  - type: text
    content: it
  - type: text
    content: .
  '28':
  - type: text
    content: Say not unto thy neighbour, Go, and come again,
  - type: text
    content: And to morrow I will give; when thou hast it by thee.
  '29':
  - type: text
    content: Devise not evil against thy neighbour,
  - type: text
    content: Seeing he dwelleth securely by thee.
  '3':
  - type: text
    content: 'Let not mercy and truth forsake thee:'
  - type: text
    content: Bind them about thy neck;
  - type: text
    content: 'Write them upon the table of thine heart:'
  '30':
  - type: text
    content: Strive not with a man without cause,
  - type: text
    content: If he have done thee no harm.
  '31':
  - type: text
    content: Envy thou not the oppressor,
  - type: text
    content: And choose none of his ways.
  '32':
  - type: text
    content: 'For the froward '
  - type: text
    content: is
  - type: text
    content: ' abomination to the '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: 'But his secret '
  - type: text
    content: is
  - type: text
    content: ' with the righteous.'
  '33':
  - type: text
    content: 'The curse of the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' in the house of the wicked:'
  - type: text
    content: But he blesseth the habitation of the just.
  '34':
  - type: text
    content: 'Surely he scorneth the scorners:'
  - type: text
    content: But he giveth grace unto the lowly.
  '35':
  - type: text
    content: 'The wise shall inherit glory:'
  - type: text
    content: But shame shall be the promotion of fools.
  '4':
  - type: text
    content: So shalt thou find favour and good understanding
  - type: text
    content: In the sight of God and man.
  '5':
  - type: text
    content: 'Trust in the '
  - type: text
    content: LORD
  - type: text
    content: ' with all thine heart;'
  - type: text
    content: And lean not unto thine own understanding.
  '6':
  - type: text
    content: In all thy ways acknowledge him,
  - type: text
    content: And he shall direct thy paths.
  '7':
  - type: text
    content: 'Be not wise in thine own eyes:'
  - type: text
    content: 'Fear the '
  - type: text
    content: LORD
  - type: text
    content: ', and depart from evil.'
  '8':
  - type: text
    content: It shall be health to thy navel,
  - type: text
    content: And marrow to thy bones.
  '9':
  - type: text
    content: 'Honour the '
  - type: text
    content: LORD
  - type: text
    content: ' with thy substance,'
  - type: text
    content: 'And with the firstfruits of all thine increase:'
