document_id: PRO.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My son, forget not my law;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But let thine heart keep my commandments:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So shall thy barns be filled with plenty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thy presses shall burst out with new wine.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My son, despise not the chastening of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Neither be weary of his correction:'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For whom the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' loveth he correcteth;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Even as a father the son '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in whom
    - type: text
      text: ' he delighteth.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Happy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' findeth wisdom,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' getteth understanding.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the merchandise of it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' better than the merchandise of silver,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the gain thereof than fine gold.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'She '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' more precious than rubies:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the things thou canst desire are not to be compared unto her.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Length of days '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in her right hand;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' in her left hand riches and honour.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Her ways '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' ways of pleasantness,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And all her paths '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' peace.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'She '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a tree of life to them that lay hold upon her:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And happy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is every one
    - type: text
      text: ' that retaineth her.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' by wisdom hath founded the earth;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: By understanding hath he established the heavens.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For length of days, and long life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And peace, shall they add to thee.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By his knowledge the depths are broken up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the clouds drop down the dew.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My son, let not them depart from thine eyes:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Keep sound wisdom and discretion:'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So shall they be life unto thy soul,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And grace to thy neck.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then shalt thou walk in thy way safely,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thy foot shall not stumble.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When thou liest down, thou shalt not be afraid:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yea, thou shalt lie down, and thy sleep shall be sweet.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be not afraid of sudden fear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Neither of the desolation of the wicked, when it cometh.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall be thy confidence,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And shall keep thy foot from being taken.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Withhold not good from them to whom it is due,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When it is in the power of thine hand to do '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Say not unto thy neighbour, Go, and come again,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And to morrow I will give; when thou hast it by thee.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devise not evil against thy neighbour,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Seeing he dwelleth securely by thee.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let not mercy and truth forsake thee:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Bind them about thy neck;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Write them upon the table of thine heart:'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Strive not with a man without cause,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If he have done thee no harm.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Envy thou not the oppressor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And choose none of his ways.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the froward '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' abomination to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ':'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But his secret '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' with the righteous.'
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The curse of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the house of the wicked:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But he blesseth the habitation of the just.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Surely he scorneth the scorners:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But he giveth grace unto the lowly.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The wise shall inherit glory:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But shame shall be the promotion of fools.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So shalt thou find favour and good understanding
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the sight of God and man.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Trust in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' with all thine heart;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And lean not unto thine own understanding.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In all thy ways acknowledge him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he shall direct thy paths.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Be not wise in thine own eyes:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and depart from evil.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It shall be health to thy navel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And marrow to thy bones.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Honour the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' with thy substance,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And with the firstfruits of all thine increase:'
