document_id: PSA.58,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the chief Musician, Al-taschith, Michtam of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Do ye indeed speak righteousness, O congregation?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do ye judge uprightly, O ye sons of men?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The righteous shall rejoice when he seeth the vengeance:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shall wash his feet in the blood of the wicked.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'So that a man shall say, Verily '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' a reward for the righteous:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Verily he is a God that judgeth in the earth.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Yea, in heart ye work wickedness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Ye weigh the violence of your hands in the earth.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The wicked are estranged from the womb:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They go astray as soon as they be born, speaking lies.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Their poison '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' like the poison of a serpent:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: They are
    - type: text
      text: ' like the deaf adder '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' stoppeth her ear;'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Which will not hearken to the voice of charmers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Charming never so wisely.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Break their teeth, O God, in their mouth: Break out the great teeth of the young lions, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Let them melt away as waters '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' run continually: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: when
    - type: text
      text: ' he bendeth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his bow to shoot
    - type: text
      text: ' his arrows, let them be as cut in pieces.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'As a snail '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' melteth, let '
    - type: usfm
      marker: add
      children:
      - type: text
        text: every one of them
    - type: text
      text: ' pass away: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Like
    - type: text
      text: ' the untimely birth of a woman,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: That
    - type: text
      text: ' they may not see the sun.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Before your pots can feel the thorns,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He shall take them away as with a whirlwind, both living, and in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' wrath.'
