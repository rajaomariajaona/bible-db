document_id: PSA.58,1
type_code: eng
verses:
  '1':
  - type: text
    content: To the chief Musician, Al-taschith, Michtam of David.
  - type: text
    content: Do ye indeed speak righteousness, O congregation?
  - type: text
    content: Do ye judge uprightly, O ye sons of men?
  '10':
  - type: text
    content: 'The righteous shall rejoice when he seeth the vengeance:'
  - type: text
    content: He shall wash his feet in the blood of the wicked.
  '11':
  - type: text
    content: 'So that a man shall say, Verily '
  - type: text
    content: there is
  - type: text
    content: ' a reward for the righteous:'
  - type: text
    content: Verily he is a God that judgeth in the earth.
  '2':
  - type: text
    content: Yea, in heart ye work wickedness;
  - type: text
    content: Ye weigh the violence of your hands in the earth.
  '3':
  - type: text
    content: 'The wicked are estranged from the womb:'
  - type: text
    content: They go astray as soon as they be born, speaking lies.
  '4':
  - type: text
    content: 'Their poison '
  - type: text
    content: is
  - type: text
    content: ' like the poison of a serpent:'
  - type: text
    content: They are
  - type: text
    content: ' like the deaf adder '
  - type: text
    content: that
  - type: text
    content: ' stoppeth her ear;'
  '5':
  - type: text
    content: Which will not hearken to the voice of charmers,
  - type: text
    content: Charming never so wisely.
  '6':
  - type: text
    content: 'Break their teeth, O God, in their mouth: Break out the great teeth of the young lions, O '
  - type: text
    content: LORD
  - type: text
    content: .
  '7':
  - type: text
    content: 'Let them melt away as waters '
  - type: text
    content: which
  - type: text
    content: ' run continually: '
  - type: text
    content: when
  - type: text
    content: ' he bendeth '
  - type: text
    content: his bow to shoot
  - type: text
    content: ' his arrows, let them be as cut in pieces.'
  '8':
  - type: text
    content: 'As a snail '
  - type: text
    content: which
  - type: text
    content: ' melteth, let '
  - type: text
    content: every one of them
  - type: text
    content: ' pass away: '
  - type: text
    content: Like
  - type: text
    content: ' the untimely birth of a woman,'
  - type: text
    content: That
  - type: text
    content: ' they may not see the sun.'
  '9':
  - type: text
    content: Before your pots can feel the thorns,
  - type: text
    content: 'He shall take them away as with a whirlwind, both living, and in '
  - type: text
    content: his
  - type: text
    content: ' wrath.'
