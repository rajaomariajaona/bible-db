document_id: MAT.17,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Transfiguration
  - type: text
    content: 'And after six days Jesus taketh Peter, James, and John his brother, and bringeth them up into an high mountain apart, '
  '10':
  - type: text
    content: 'And his disciples asked him, saying, Why then say the scribes that Elias must first come? '
  '11':
  - type: text
    content: 'And Jesus answered and said unto them, '
  - type: text
    content: Elias truly shall first come, and restore all things.
  - type: text
    content: ' '
  '12':
  - type: text
    content: But I say unto you, That Elias is come already, and they knew him not, but have done unto him whatsoever they listed. Likewise shall also the Son of man suffer of them.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Then the disciples understood that he spake unto them of John the Baptist.
  - type: heading
    content: Cures an Afflicted Boy
  '14':
  - type: text
    content: 'And when they were come to the multitude, there came to him a '
  - type: text
    content: certain
  - type: text
    content: ' man, kneeling down to him, and saying, '
  '15':
  - type: text
    content: 'Lord, have mercy on my son: for he is lunatick, and sore vexed: for ofttimes he falleth into the fire, and oft into the water. '
  '16':
  - type: text
    content: 'And I brought him to thy disciples, and they could not cure him. '
  '17':
  - type: text
    content: 'Then Jesus answered and said, '
  - type: text
    content: O faithless and perverse generation, how long shall I be with you? how long shall I suffer you? bring him hither to me.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'And Jesus rebuked the devil; and he departed out of him: and the child was cured from that very hour.'
  '19':
  - type: text
    content: 'Then came the disciples to Jesus apart, and said, Why could not we cast him out? '
  '2':
  - type: text
    content: 'and was transfigured before them: and his face did shine as the sun, and his raiment was white as the light. '
  '20':
  - type: text
    content: 'And Jesus said unto them, '
  - type: text
    content: 'Because of your unbelief: for verily I say unto you, If ye have faith as a grain of mustard seed, ye shall say unto this mountain, Remove hence to yonder place; and it shall remove; and nothing shall be impossible unto you.'
  - type: text
    content: ' '
  '21':
  - type: text
    content: Howbeit this kind goeth not out but by prayer and fasting.
  - type: heading
    content: In Galilee
  '22':
  - type: text
    content: 'And while they abode in Galilee, Jesus said unto them, '
  - type: text
    content: 'The Son of man shall be betrayed into the hands of men:'
  - type: text
    content: ' '
  '23':
  - type: text
    content: and they shall kill him, and the third day he shall be raised again.
  - type: text
    content: ' And they were exceeding sorry.'
  '24':
  - type: text
    content: 'And when they were come to Capernaum, they that received tribute '
  - type: text
    content: money
  - type: text
    content: ' came to Peter, and said, Doth not your master pay tribute? '
  '25':
  - type: text
    content: 'He saith, Yes. And when he was come into the house, Jesus prevented him, saying, '
  - type: text
    content: What thinkest thou, Simon? of whom do the kings of the earth take custom or tribute? of their own children, or of strangers?
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Peter saith unto him, Of strangers. Jesus saith unto him, '
  - type: text
    content: Then are the children free.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Notwithstanding, lest we should offend them, go thou to the sea, and cast an hook, and take up the fish that first cometh up; and when thou hast opened his mouth, thou shalt find a piece of money: that take, and give unto them for me and thee.'
  '3':
  - type: text
    content: 'And, behold, there appeared unto them Moses and Elias talking with him. '
  '4':
  - type: text
    content: 'Then answered Peter, and said unto Jesus, Lord, it is good for us to be here: if thou wilt, let us make here three tabernacles; one for thee, and one for Moses, and one for Elias. '
  '5':
  - type: text
    content: 'While he yet spake, behold, a bright cloud overshadowed them: and behold a voice out of the cloud, which said, This is my beloved Son, in whom I am well pleased; hear ye him. '
  '6':
  - type: text
    content: 'And when the disciples heard '
  - type: text
    content: it
  - type: text
    content: ', they fell on their face, and were sore afraid. '
  '7':
  - type: text
    content: 'And Jesus came and touched them, and said, '
  - type: text
    content: Arise, and be not afraid.
  - type: text
    content: ' '
  '8':
  - type: text
    content: And when they had lifted up their eyes, they saw no man, save Jesus only.
  '9':
  - type: text
    content: 'And as they came down from the mountain, Jesus charged them, saying, '
  - type: text
    content: Tell the vision to no man, until the Son of man be risen again from the dead.
  - type: text
    content: ' '
