document_id: MAT.17,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Transfiguration
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And after six days Jesus taketh Peter, James, and John his brother, and bringeth them up into an high mountain apart, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And his disciples asked him, saying, Why then say the scribes that Elias must first come? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus answered and said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Elias truly shall first come, and restore all things.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But I say unto you, That Elias is come already, and they knew him not, but have done unto him whatsoever they listed. Likewise shall also the Son of man suffer of them.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the disciples understood that he spake unto them of John the Baptist.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Cures an Afflicted Boy
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they were come to the multitude, there came to him a '
    - type: usfm
      marker: add
      children:
      - type: text
        text: certain
    - type: text
      text: ' man, kneeling down to him, and saying, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lord, have mercy on my son: for he is lunatick, and sore vexed: for ofttimes he falleth into the fire, and oft into the water. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I brought him to thy disciples, and they could not cure him. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus answered and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: O faithless and perverse generation, how long shall I be with you? how long shall I suffer you? bring him hither to me.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus rebuked the devil; and he departed out of him: and the child was cured from that very hour.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then came the disciples to Jesus apart, and said, Why could not we cast him out? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and was transfigured before them: and his face did shine as the sun, and his raiment was white as the light. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Because of your unbelief: for verily I say unto you, If ye have faith as a grain of mustard seed, ye shall say unto this mountain, Remove hence to yonder place; and it shall remove; and nothing shall be impossible unto you.'
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Howbeit this kind goeth not out but by prayer and fasting.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: In Galilee
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And while they abode in Galilee, Jesus said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'The Son of man shall be betrayed into the hands of men:'
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and they shall kill him, and the third day he shall be raised again.
    - type: text
      text: ' And they were exceeding sorry.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they were come to Capernaum, they that received tribute '
    - type: usfm
      marker: add
      children:
      - type: text
        text: money
    - type: text
      text: ' came to Peter, and said, Doth not your master pay tribute? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He saith, Yes. And when he was come into the house, Jesus prevented him, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: What thinkest thou, Simon? of whom do the kings of the earth take custom or tribute? of their own children, or of strangers?
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peter saith unto him, Of strangers. Jesus saith unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Then are the children free.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Notwithstanding, lest we should offend them, go thou to the sea, and cast an hook, and take up the fish that first cometh up; and when thou hast opened his mouth, thou shalt find a piece of money: that take, and give unto them for me and thee.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And, behold, there appeared unto them Moses and Elias talking with him. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then answered Peter, and said unto Jesus, Lord, it is good for us to be here: if thou wilt, let us make here three tabernacles; one for thee, and one for Moses, and one for Elias. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While he yet spake, behold, a bright cloud overshadowed them: and behold a voice out of the cloud, which said, This is my beloved Son, in whom I am well pleased; hear ye him. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the disciples heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', they fell on their face, and were sore afraid. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus came and touched them, and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Arise, and be not afraid.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when they had lifted up their eyes, they saw no man, save Jesus only.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as they came down from the mountain, Jesus charged them, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tell the vision to no man, until the Son of man be risen again from the dead.
    - type: text
      text: ' '
