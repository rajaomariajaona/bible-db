  '10':
  - type: text
    content: 'When they were past the first and the second ward, they came unto the iron gate that leadeth unto the city; which opened to them of his own accord: and they went out, and passed on through one street; and forthwith the angel departed from him. '
  '11':
  - type: text
    content: 'And when Peter was come to himself, he said, Now I know of a surety, that the Lord hath sent his angel, and hath delivered me out of the hand of Herod, and '
  - type: text
    content: from
  - type: text
    content: ' all the expectation of the people of the Jews.'
  '12':
  - type: text
    content: 'And when he had considered '
  - type: text
    content: the thing
  - type: text
    content: ', he came to the house of Mary the mother of John, whose surname was Mark; where many were gathered together praying. '
  '13':
  - type: text
    content: 'And as Peter knocked at the door of the gate, a damsel came to hearken, named Rhoda. '
  '14':
  - type: text
    content: 'And when she knew Peter''s voice, she opened not the gate for gladness, but ran in, and told how Peter stood before the gate. '
  '15':
  - type: text
    content: 'And they said unto her, Thou art mad. But she constantly affirmed that it was even so. Then said they, It is his angel. '
  '16':
  - type: text
    content: 'But Peter continued knocking: and when they had opened '
  - type: text
    content: the door
  - type: text
    content: ', and saw him, they were astonished. '
  '17':
  - type: text
    content: But he, beckoning unto them with the hand to hold their peace, declared unto them how the Lord had brought him out of the prison. And he said, Go shew these things unto James, and to the brethren. And he departed, and went into another place.
  '18':
  - type: text
    content: 'Now as soon as it was day, there was no small stir among the soldiers, what was become of Peter. '
  '19':
  - type: text
    content: 'And when Herod had sought for him, and found him not, he examined the keepers, and commanded that '
  - type: text
    content: they
  - type: text
    content: ' should be put to death. And he went down from Judæa to Cæsarea, and '
  - type: text
    content: there
  - type: text
    content: ' abode.'
  '2':
  - type: text
    content: 'And he killed James the brother of John with the sword. '
  '20':
  - type: text
    content: 'And Herod was highly displeased with them of Tyre and Sidon: but they came with one accord to him, and, having made Blastus the king''s chamberlain their friend, desired peace; because their country was nourished by the king''s '
  - type: text
    content: country
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'And upon a set day Herod, arrayed in royal apparel, sat upon his throne, and made an oration unto them. '
  '22':
  - type: text
    content: 'And the people gave a shout, '
  - type: text
    content: saying, It is
  - type: text
    content: ' the voice of a god, and not of a man. '
  '23':
  - type: text
    content: 'And immediately the angel of the Lord smote him, because he gave not God the glory: and he was eaten of worms, and gave up the ghost.'
  - type: heading
    content: The Call of Barnabus and Saul
  '24':
  - type: text
    content: 'But the word of God grew and multiplied. '
  '25':
  - type: text
    content: 'And Barnabas and Saul returned from Jerusalem, when they had fulfilled '
  - type: text
    content: their
  - type: text
    content: ' ministry, and took with them John, whose surname was Mark.'
  '3':
  - type: text
    content: 'And because he saw it pleased the Jews, he proceeded further to take Peter also. (Then were the days of unleavened bread.) '
  '4':
  - type: text
    content: 'And when he had apprehended him, he put '
  - type: text
    content: him
  - type: text
    content: ' in prison, and delivered '
  - type: text
    content: him
  - type: text
    content: ' to four quaternions of soldiers to keep him; intending after Easter to bring him forth to the people. '
  '5':
  - type: text
    content: 'Peter therefore was kept in prison: but prayer was made without ceasing of the church unto God for him.'
  '6':
  - type: text
    content: 'And when Herod would have brought him forth, the same night Peter was sleeping between two soldiers, bound with two chains: and the keepers before the door kept the prison. '
  '7':
  - type: text
    content: 'And, behold, the angel of the Lord came upon '
  - type: text
    content: him
  - type: text
    content: ', and a light shined in the prison: and he smote Peter on the side, and raised him up, saying, Arise up quickly. And his chains fell off from '
  - type: text
    content: his
  - type: text
    content: ' hands. '
  '8':
  - type: text
    content: 'And the angel said unto him, Gird thyself, and bind on thy sandals. And so he did. And he saith unto him, Cast thy garment about thee, and follow me. '
  '9':
  - type: text
    content: And he went out, and followed him; and wist not that it was true which was done by the angel; but thought he saw a vision.
