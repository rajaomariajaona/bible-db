document_id: ACT.12,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Peter Imprisoned in Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now about that time Herod the king stretched forth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' hands to vex certain of the church. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'When they were past the first and the second ward, they came unto the iron gate that leadeth unto the city; which opened to them of his own accord: and they went out, and passed on through one street; and forthwith the angel departed from him. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And when Peter was come to himself, he said, Now I know of a surety, that the Lord hath sent his angel, and hath delivered me out of the hand of Herod, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from
    - type: text
      text: ' all the expectation of the people of the Jews.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And when he had considered '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the thing
    - type: text
      text: ', he came to the house of Mary the mother of John, whose surname was Mark; where many were gathered together praying. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And as Peter knocked at the door of the gate, a damsel came to hearken, named Rhoda. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And when she knew Peter''s voice, she opened not the gate for gladness, but ran in, and told how Peter stood before the gate. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And they said unto her, Thou art mad. But she constantly affirmed that it was even so. Then said they, It is his angel. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'But Peter continued knocking: and when they had opened '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the door
    - type: text
      text: ', and saw him, they were astonished. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: But he, beckoning unto them with the hand to hold their peace, declared unto them how the Lord had brought him out of the prison. And he said, Go shew these things unto James, and to the brethren. And he departed, and went into another place.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Now as soon as it was day, there was no small stir among the soldiers, what was become of Peter. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And when Herod had sought for him, and found him not, he examined the keepers, and commanded that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they
    - type: text
      text: ' should be put to death. And he went down from Judæa to Cæsarea, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there
    - type: text
      text: ' abode.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And he killed James the brother of John with the sword. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And Herod was highly displeased with them of Tyre and Sidon: but they came with one accord to him, and, having made Blastus the king''s chamberlain their friend, desired peace; because their country was nourished by the king''s '
    - type: usfm
      marker: add
      children:
      - type: text
        text: country
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And upon a set day Herod, arrayed in royal apparel, sat upon his throne, and made an oration unto them. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And the people gave a shout, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: saying, It is
    - type: text
      text: ' the voice of a god, and not of a man. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And immediately the angel of the Lord smote him, because he gave not God the glory: and he was eaten of worms, and gave up the ghost.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Call of Barnabus and Saul
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'But the word of God grew and multiplied. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And Barnabas and Saul returned from Jerusalem, when they had fulfilled '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' ministry, and took with them John, whose surname was Mark.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And because he saw it pleased the Jews, he proceeded further to take Peter also. (Then were the days of unleavened bread.) '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And when he had apprehended him, he put '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' in prison, and delivered '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' to four quaternions of soldiers to keep him; intending after Easter to bring him forth to the people. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Peter therefore was kept in prison: but prayer was made without ceasing of the church unto God for him.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And when Herod would have brought him forth, the same night Peter was sleeping between two soldiers, bound with two chains: and the keepers before the door kept the prison. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And, behold, the angel of the Lord came upon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', and a light shined in the prison: and he smote Peter on the side, and raised him up, saying, Arise up quickly. And his chains fell off from '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' hands. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And the angel said unto him, Gird thyself, and bind on thy sandals. And so he did. And he saith unto him, Cast thy garment about thee, and follow me. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: And he went out, and followed him; and wist not that it was true which was done by the angel; but thought he saw a vision.
