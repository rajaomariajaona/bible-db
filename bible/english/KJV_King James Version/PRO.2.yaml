document_id: PRO.2,1
type_code: eng
verses:
  '1':
  - type: text
    content: My son, if thou wilt receive my words,
  - type: text
    content: And hide my commandments with thee;
  '10':
  - type: text
    content: When wisdom entereth into thine heart,
  - type: text
    content: And knowledge is pleasant unto thy soul;
  '11':
  - type: text
    content: Discretion shall preserve thee,
  - type: text
    content: 'Understanding shall keep thee:'
  '12':
  - type: text
    content: 'To deliver thee from the way of the evil '
  - type: text
    content: man
  - type: text
    content: ','
  - type: text
    content: From the man that speaketh froward things;
  '13':
  - type: text
    content: Who leave the paths of uprightness,
  - type: text
    content: To walk in the ways of darkness;
  '14':
  - type: text
    content: Who rejoice to do evil,
  - type: text
    content: And
  - type: text
    content: ' delight in the frowardness of the wicked;'
  '15':
  - type: text
    content: 'Whose ways '
  - type: text
    content: are
  - type: text
    content: ' crooked,'
  - type: text
    content: 'And '
  - type: text
    content: they
  - type: text
    content: ' froward in their paths:'
  '16':
  - type: text
    content: To deliver thee from the strange woman,
  - type: text
    content: Even
  - type: text
    content: ' from the stranger '
  - type: text
    content: which
  - type: text
    content: ' flattereth with her words;'
  '17':
  - type: text
    content: Which forsaketh the guide of her youth,
  - type: text
    content: And forgetteth the covenant of her God.
  '18':
  - type: text
    content: For her house inclineth unto death,
  - type: text
    content: And her paths unto the dead.
  '19':
  - type: text
    content: None that go unto her return again,
  - type: text
    content: Neither take they hold of the paths of life.
  '2':
  - type: text
    content: So that thou incline thine ear unto wisdom,
  - type: text
    content: And
  - type: text
    content: ' apply thine heart to understanding;'
  '20':
  - type: text
    content: 'That thou mayest walk in the way of good '
  - type: text
    content: men
  - type: text
    content: ','
  - type: text
    content: And keep the paths of the righteous.
  '21':
  - type: text
    content: For the upright shall dwell in the land,
  - type: text
    content: And the perfect shall remain in it.
  '22':
  - type: text
    content: But the wicked shall be cut off from the earth,
  - type: text
    content: And the transgressors shall be rooted out of it.
  '3':
  - type: text
    content: Yea, if thou criest after knowledge,
  - type: text
    content: And
  - type: text
    content: ' liftest up thy voice for understanding;'
  '4':
  - type: text
    content: If thou seekest her as silver,
  - type: text
    content: 'And searchest for her as '
  - type: text
    content: for
  - type: text
    content: ' hid treasures;'
  '5':
  - type: text
    content: 'Then shalt thou understand the fear of the '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: And find the knowledge of God.
  '6':
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ' giveth wisdom:'
  - type: text
    content: 'Out of his mouth '
  - type: text
    content: cometh
  - type: text
    content: ' knowledge and understanding.'
  '7':
  - type: text
    content: 'He layeth up sound wisdom for the righteous:'
  - type: text
    content: He is
  - type: text
    content: ' a buckler to them that walk uprightly.'
  '8':
  - type: text
    content: He keepeth the paths of judgment,
  - type: text
    content: And preserveth the way of his saints.
  '9':
  - type: text
    content: Then shalt thou understand righteousness, and judgment,
  - type: text
    content: 'And equity; '
  - type: text
    content: yea
  - type: text
    content: ', every good path.'
