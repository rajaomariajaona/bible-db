document_id: PRO.2,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: My son, if thou wilt receive my words,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And hide my commandments with thee;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: When wisdom entereth into thine heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And knowledge is pleasant unto thy soul;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Discretion shall preserve thee,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Understanding shall keep thee:'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'To deliver thee from the way of the evil '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: From the man that speaketh froward things;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Who leave the paths of uprightness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To walk in the ways of darkness;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Who rejoice to do evil,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' delight in the frowardness of the wicked;'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Whose ways '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' crooked,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they
    - type: text
      text: ' froward in their paths:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: To deliver thee from the strange woman,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Even
    - type: text
      text: ' from the stranger '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' flattereth with her words;'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Which forsaketh the guide of her youth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And forgetteth the covenant of her God.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: For her house inclineth unto death,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And her paths unto the dead.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: None that go unto her return again,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Neither take they hold of the paths of life.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: So that thou incline thine ear unto wisdom,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' apply thine heart to understanding;'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'That thou mayest walk in the way of good '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And keep the paths of the righteous.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: For the upright shall dwell in the land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the perfect shall remain in it.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: But the wicked shall be cut off from the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the transgressors shall be rooted out of it.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Yea, if thou criest after knowledge,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' liftest up thy voice for understanding;'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: If thou seekest her as silver,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And searchest for her as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' hid treasures;'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then shalt thou understand the fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And find the knowledge of God.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' giveth wisdom:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Out of his mouth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: cometh
    - type: text
      text: ' knowledge and understanding.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'He layeth up sound wisdom for the righteous:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: He is
    - type: text
      text: ' a buckler to them that walk uprightly.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: He keepeth the paths of judgment,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And preserveth the way of his saints.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Then shalt thou understand righteousness, and judgment,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And equity; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yea
    - type: text
      text: ', every good path.'
