verses:
  '1':
  - type: heading
    content: The Ark
  - type: text
    content: 'And Bezaleel made the ark '
  - type: text
    content: of
  - type: text
    content: ' shittim wood: two cubits and a half '
  - type: text
    content: was
  - type: text
    content: ' the length of it, and a cubit and a half the breadth of it, and a cubit and a half the height of it: '
  '10':
  - type: text
    content: 'And he made the table '
  - type: text
    content: of
  - type: text
    content: ' shittim wood: two cubits '
  - type: text
    content: was
  - type: text
    content: ' the length thereof, and a cubit the breadth thereof, and a cubit and a half the height thereof: '
  '11':
  - type: text
    content: 'and he overlaid it with pure gold, and made thereunto a crown of gold round about. '
  '12':
  - type: text
    content: 'Also he made thereunto a border of an handbreadth round about; and made a crown of gold for the border thereof round about. '
  '13':
  - type: text
    content: 'And he cast for it four rings of gold, and put the rings upon the four corners that '
  - type: text
    content: were
  - type: text
    content: ' in the four feet thereof. '
  '14':
  - type: text
    content: 'Over against the border were the rings, the places for the staves to bear the table. '
  '15':
  - type: text
    content: 'And he made the staves '
  - type: text
    content: of
  - type: text
    content: ' shittim wood, and overlaid them with gold, to bear the table. '
  '16':
  - type: text
    content: 'And he made the vessels which '
  - type: text
    content: were
  - type: text
    content: ' upon the table, his dishes, and his spoons, and his bowls, and his covers to cover withal, '
  - type: text
    content: of
  - type: text
    content: ' pure gold.'
  '17':
  - type: text
    content: 'And he made the candlestick '
  - type: text
    content: of
  - type: text
    content: ' pure gold: '
  - type: text
    content: of
  - type: text
    content: ' beaten work made he the candlestick; his shaft, and his branch, his bowls, his knops, and his flowers, were of the same: '
  '18':
  - type: text
    content: 'and six branches going out of the sides thereof; three branches of the candlestick out of the one side thereof, and three branches of the candlestick out of the other side thereof: '
  '19':
  - type: text
    content: 'three bowls made after the fashion of almonds in one branch, a knop and a flower; and three bowls made like almonds in another branch, a knop and a flower: so throughout the six branches going out of the candlestick. '
  '2':
  - type: text
    content: 'and he overlaid it with pure gold within and without, and made a crown of gold to it round about. '
  '20':
  - type: text
    content: 'And in the candlestick '
  - type: text
    content: were
  - type: text
    content: ' four bowls made like almonds, his knops, and his flowers: '
  '21':
  - type: text
    content: 'and a knop under two branches of the same, and a knop under two branches of the same, and a knop under two branches of the same, according to the six branches going out of it. '
  '22':
  - type: text
    content: 'Their knops and their branches were of the same: all of it '
  - type: text
    content: was
  - type: text
    content: ' one beaten work '
  - type: text
    content: of
  - type: text
    content: ' pure gold. '
  '23':
  - type: text
    content: 'And he made his seven lamps, and his snuffers, and his snuffdishes, '
  - type: text
    content: of
  - type: text
    content: ' pure gold. '
  '24':
  - type: text
    content: Of
  - type: text
    content: ' a talent of pure gold made he it, and all the vessels thereof.'
  - type: heading
    content: The Altars
  '25':
  - type: text
    content: 'And he made the incense altar '
  - type: text
    content: of
  - type: text
    content: ' shittim wood: the length of it '
  - type: text
    content: was
  - type: text
    content: ' a cubit, and the breadth of it a cubit; '
  - type: text
    content: it was
  - type: text
    content: ' foursquare; and two cubits '
  - type: text
    content: was
  - type: text
    content: ' the height of it; the horns thereof were of the same. '
  '26':
  - type: text
    content: 'And he overlaid it with pure gold, '
  - type: text
    content: both
  - type: text
    content: ' the top of it, and the sides thereof round about, and the horns of it: also he made unto it a crown of gold round about. '
  '27':
  - type: text
    content: 'And he made two rings of gold for it under the crown thereof, by the two corners of it, upon the two sides thereof, to be places for the staves to bear it withal. '
  '28':
  - type: text
    content: 'And he made the staves '
  - type: text
    content: of
  - type: text
    content: ' shittim wood, and overlaid them with gold.'
  '29':
  - type: text
    content: And he made the holy anointing oil, and the pure incense of sweet spices, according to the work of the apothecary.
  '3':
  - type: text
    content: 'And he cast for it four rings of gold, '
  - type: text
    content: to be set
  - type: text
    content: ' by the four corners of it; even two rings upon the one side of it, and two rings upon the other side of it. '
  '4':
  - type: text
    content: 'And he made staves '
  - type: text
    content: of
  - type: text
    content: ' shittim wood, and overlaid them with gold. '
  '5':
  - type: text
    content: And he put the staves into the rings by the sides of the ark, to bear the ark.
  '6':
  - type: text
    content: 'And he made the mercy seat '
  - type: text
    content: of
  - type: text
    content: ' pure gold: two cubits and a half '
  - type: text
    content: was
  - type: text
    content: ' the length thereof, and one cubit and a half the breadth thereof. '
  '7':
  - type: text
    content: 'And he made two cherubims '
  - type: text
    content: of
  - type: text
    content: ' gold, beaten out of one piece made he them, on the two ends of the mercy seat; '
  '8':
  - type: text
    content: 'one cherub on the end on this side, and another cherub on the '
  - type: text
    content: other
  - type: text
    content: ' end on that side: out of the mercy seat made he the cherubims on the two ends thereof. '
  '9':
  - type: text
    content: 'And the cherubims spread out '
  - type: text
    content: their
  - type: text
    content: ' wings on high, '
  - type: text
    content: and
  - type: text
    content: ' covered with their wings over the mercy seat, with their faces one to another; '
  - type: text
    content: even
  - type: text
    content: ' to the mercy seatward were the faces of the cherubims.'
