document_id: EXO.37,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Ark
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Bezaleel made the ark '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' shittim wood: two cubits and a half '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the length of it, and a cubit and a half the breadth of it, and a cubit and a half the height of it: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he made the table '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' shittim wood: two cubits '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the length thereof, and a cubit the breadth thereof, and a cubit and a half the height thereof: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he overlaid it with pure gold, and made thereunto a crown of gold round about. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also he made thereunto a border of an handbreadth round about; and made a crown of gold for the border thereof round about. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he cast for it four rings of gold, and put the rings upon the four corners that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in the four feet thereof. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Over against the border were the rings, the places for the staves to bear the table. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he made the staves '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' shittim wood, and overlaid them with gold, to bear the table. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he made the vessels which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' upon the table, his dishes, and his spoons, and his bowls, and his covers to cover withal, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' pure gold.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he made the candlestick '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' pure gold: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' beaten work made he the candlestick; his shaft, and his branch, his bowls, his knops, and his flowers, were of the same: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and six branches going out of the sides thereof; three branches of the candlestick out of the one side thereof, and three branches of the candlestick out of the other side thereof: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'three bowls made after the fashion of almonds in one branch, a knop and a flower; and three bowls made like almonds in another branch, a knop and a flower: so throughout the six branches going out of the candlestick. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he overlaid it with pure gold within and without, and made a crown of gold to it round about. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in the candlestick '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' four bowls made like almonds, his knops, and his flowers: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and a knop under two branches of the same, and a knop under two branches of the same, and a knop under two branches of the same, according to the six branches going out of it. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Their knops and their branches were of the same: all of it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' one beaten work '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' pure gold. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he made his seven lamps, and his snuffers, and his snuffdishes, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' pure gold. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Of
    - type: text
      text: ' a talent of pure gold made he it, and all the vessels thereof.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Altars
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he made the incense altar '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' shittim wood: the length of it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' a cubit, and the breadth of it a cubit; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' foursquare; and two cubits '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the height of it; the horns thereof were of the same. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he overlaid it with pure gold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: both
    - type: text
      text: ' the top of it, and the sides thereof round about, and the horns of it: also he made unto it a crown of gold round about. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he made two rings of gold for it under the crown thereof, by the two corners of it, upon the two sides thereof, to be places for the staves to bear it withal. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he made the staves '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' shittim wood, and overlaid them with gold.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he made the holy anointing oil, and the pure incense of sweet spices, according to the work of the apothecary.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he cast for it four rings of gold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be set
    - type: text
      text: ' by the four corners of it; even two rings upon the one side of it, and two rings upon the other side of it. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he made staves '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' shittim wood, and overlaid them with gold. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he put the staves into the rings by the sides of the ark, to bear the ark.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he made the mercy seat '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' pure gold: two cubits and a half '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the length thereof, and one cubit and a half the breadth thereof. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he made two cherubims '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' gold, beaten out of one piece made he them, on the two ends of the mercy seat; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'one cherub on the end on this side, and another cherub on the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: other
    - type: text
      text: ' end on that side: out of the mercy seat made he the cherubims on the two ends thereof. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the cherubims spread out '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' wings on high, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' covered with their wings over the mercy seat, with their faces one to another; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' to the mercy seatward were the faces of the cherubims.'
