document_id: NUM.9,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Keeping the Passover
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses in the wilderness of Sinai, in the first month of the second year after they were come out of the land of Egypt, saying, '
  '10':
  - type: text
    content: 'Speak unto the children of Israel, saying, If any man of you or of your posterity shall be unclean by reason of a dead body, or '
  - type: text
    content: be
  - type: text
    content: ' in a journey afar off, yet he shall keep the passover unto the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'The fourteenth day of the second month at even they shall keep it, '
  - type: text
    content: and
  - type: text
    content: ' eat it with unleavened bread and bitter '
  - type: text
    content: herbs
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'They shall leave none of it unto the morning, nor break any bone of it: according to all the ordinances of the passover they shall keep it. '
  '13':
  - type: text
    content: 'But the man that '
  - type: text
    content: is
  - type: text
    content: ' clean, and is not in a journey, and forbeareth to keep the passover, even the same soul shall be cut off from among his people: because he brought not the offering of the '
  - type: text
    content: LORD
  - type: text
    content: ' in his appointed season, that man shall bear his sin. '
  '14':
  - type: text
    content: 'And if a stranger shall sojourn among you, and will keep the passover unto the '
  - type: text
    content: LORD
  - type: text
    content: '; according to the ordinance of the passover, and according to the manner thereof, so shall he do: ye shall have one ordinance, both for the stranger, and for him that was born in the land.'
  - type: heading
    content: Leaving Sinai
  '15':
  - type: text
    content: 'And on the day that the tabernacle was reared up the cloud covered the tabernacle, '
  - type: text
    content: namely
  - type: text
    content: ', the tent of the testimony: and at even there was upon the tabernacle as it were the appearance of fire, until the morning. '
  '16':
  - type: text
    content: 'So it was alway: the cloud covered it '
  - type: text
    content: by day
  - type: text
    content: ', and the appearance of fire by night. '
  '17':
  - type: text
    content: 'And when the cloud was taken up from the tabernacle, then after that the children of Israel journeyed: and in the place where the cloud abode, there the children of Israel pitched their tents. '
  '18':
  - type: text
    content: 'At the commandment of the '
  - type: text
    content: LORD
  - type: text
    content: ' the children of Israel journeyed, and at the commandment of the '
  - type: text
    content: LORD
  - type: text
    content: ' they pitched: as long as the cloud abode upon the tabernacle they rested in their tents. '
  '19':
  - type: text
    content: 'And when the cloud tarried long upon the tabernacle many days, then the children of Israel kept the charge of the '
  - type: text
    content: LORD
  - type: text
    content: ', and journeyed not. '
  '2':
  - type: text
    content: 'Let the children of Israel also keep the passover at his appointed season. '
  '20':
  - type: text
    content: 'And '
  - type: text
    content: so
  - type: text
    content: ' it was, when the cloud was a few days upon the tabernacle; according to the commandment of the '
  - type: text
    content: LORD
  - type: text
    content: ' they abode in their tents, and according to the commandment of the '
  - type: text
    content: LORD
  - type: text
    content: ' they journeyed. '
  '21':
  - type: text
    content: 'And '
  - type: text
    content: so
  - type: text
    content: ' it was, when the cloud abode from even unto the morning, and '
  - type: text
    content: that
  - type: text
    content: ' the cloud was taken up in the morning, then they journeyed: whether '
  - type: text
    content: it was
  - type: text
    content: ' by day or by night that the cloud was taken up, they journeyed. '
  '22':
  - type: text
    content: 'Or '
  - type: text
    content: whether it were
  - type: text
    content: ' two days, or a month, or a year, that the cloud tarried upon the tabernacle, remaining thereon, the children of Israel abode in their tents, and journeyed not: but when it was taken up, they journeyed. '
  '23':
  - type: text
    content: 'At the commandment of the '
  - type: text
    content: LORD
  - type: text
    content: ' they rested in the tents, and at the commandment of the '
  - type: text
    content: LORD
  - type: text
    content: ' they journeyed: they kept the charge of the '
  - type: text
    content: LORD
  - type: text
    content: ', at the commandment of the '
  - type: text
    content: LORD
  - type: text
    content: ' by the hand of Moses.'
  '3':
  - type: text
    content: 'In the fourteenth day of this month, at even, ye shall keep it in his appointed season: according to all the rites of it, and according to all the ceremonies thereof, shall ye keep it. '
  '4':
  - type: text
    content: 'And Moses spake unto the children of Israel, that they should keep the passover. '
  '5':
  - type: text
    content: 'And they kept the passover on the fourteenth day of the first month at even in the wilderness of Sinai: according to all that the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses, so did the children of Israel. '
  '6':
  - type: text
    content: 'And there were certain men, who were defiled by the dead body of a man, that they could not keep the passover on that day: and they came before Moses and before Aaron on that day: '
  '7':
  - type: text
    content: 'and those men said unto him, We '
  - type: text
    content: are
  - type: text
    content: ' defiled by the dead body of a man: wherefore are we kept back, that we may not offer an offering of the '
  - type: text
    content: LORD
  - type: text
    content: ' in his appointed season among the children of Israel? '
  '8':
  - type: text
    content: 'And Moses said unto them, Stand still, and I will hear what the '
  - type: text
    content: LORD
  - type: text
    content: ' will command concerning you.'
  - type: heading
    content: Special Cases
  '9':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
