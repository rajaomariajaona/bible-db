document_id: NUM.9,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Keeping the Passover
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses in the wilderness of Sinai, in the first month of the second year after they were come out of the land of Egypt, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Speak unto the children of Israel, saying, If any man of you or of your posterity shall be unclean by reason of a dead body, or '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' in a journey afar off, yet he shall keep the passover unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The fourteenth day of the second month at even they shall keep it, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' eat it with unleavened bread and bitter '
    - type: usfm
      marker: add
      children:
      - type: text
        text: herbs
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They shall leave none of it unto the morning, nor break any bone of it: according to all the ordinances of the passover they shall keep it. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the man that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' clean, and is not in a journey, and forbeareth to keep the passover, even the same soul shall be cut off from among his people: because he brought not the offering of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in his appointed season, that man shall bear his sin. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if a stranger shall sojourn among you, and will keep the passover unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; according to the ordinance of the passover, and according to the manner thereof, so shall he do: ye shall have one ordinance, both for the stranger, and for him that was born in the land.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Leaving Sinai
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And on the day that the tabernacle was reared up the cloud covered the tabernacle, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: namely
    - type: text
      text: ', the tent of the testimony: and at even there was upon the tabernacle as it were the appearance of fire, until the morning. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So it was alway: the cloud covered it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: by day
    - type: text
      text: ', and the appearance of fire by night. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the cloud was taken up from the tabernacle, then after that the children of Israel journeyed: and in the place where the cloud abode, there the children of Israel pitched their tents. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At the commandment of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' the children of Israel journeyed, and at the commandment of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' they pitched: as long as the cloud abode upon the tabernacle they rested in their tents. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the cloud tarried long upon the tabernacle many days, then the children of Israel kept the charge of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and journeyed not. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let the children of Israel also keep the passover at his appointed season. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' it was, when the cloud was a few days upon the tabernacle; according to the commandment of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' they abode in their tents, and according to the commandment of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' they journeyed. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' it was, when the cloud abode from even unto the morning, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the cloud was taken up in the morning, then they journeyed: whether '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' by day or by night that the cloud was taken up, they journeyed. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whether it were
    - type: text
      text: ' two days, or a month, or a year, that the cloud tarried upon the tabernacle, remaining thereon, the children of Israel abode in their tents, and journeyed not: but when it was taken up, they journeyed. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At the commandment of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' they rested in the tents, and at the commandment of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' they journeyed: they kept the charge of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', at the commandment of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' by the hand of Moses.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the fourteenth day of this month, at even, ye shall keep it in his appointed season: according to all the rites of it, and according to all the ceremonies thereof, shall ye keep it. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses spake unto the children of Israel, that they should keep the passover. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they kept the passover on the fourteenth day of the first month at even in the wilderness of Sinai: according to all that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commanded Moses, so did the children of Israel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there were certain men, who were defiled by the dead body of a man, that they could not keep the passover on that day: and they came before Moses and before Aaron on that day: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and those men said unto him, We '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' defiled by the dead body of a man: wherefore are we kept back, that we may not offer an offering of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in his appointed season among the children of Israel? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses said unto them, Stand still, and I will hear what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will command concerning you.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Special Cases
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
