document_id: EZK.13
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Woe to the False Prophets
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came unto me, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Son of man, prophesy against the prophets of Israel that prophesy, and say thou unto them that prophesy out of their own hearts, Hear ye the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; Woe unto the foolish prophets, that follow their own spirit, and have seen nothing! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'O Israel, thy prophets are like the foxes in the deserts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ye have not gone up into the gaps, neither made up the hedge for the house of Israel to stand in the battle in the day of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'They have seen vanity and lying divination, saying, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' saith: and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath not sent them: and they have made '
  - type: usfm
    marker: add
    children:
    - type: text
      text: others
  - type: text
    text: ' to hope that they would confirm the word. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Have ye not seen a vain vision, and have ye not spoken a lying divination, whereas ye say, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' saith '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ; albeit I have not spoken?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Therefore thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; Because ye have spoken vanity, and seen lies, therefore, behold, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' against you, saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And mine hand shall be upon the prophets that see vanity, and that divine lies: they shall not be in the assembly of my people, neither shall they be written in the writing of the house of Israel, neither shall they enter into the land of Israel; and ye shall know that I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Because, even because they have seduced my people, saying, Peace; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' no peace; and one built up a wall, and, lo, others daubed it with untempered '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'morter:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'say unto them which daub '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' with untempered '
  - type: usfm
    marker: add
    children:
    - type: text
      text: morter
  - type: text
    text: ', that it shall fall: there shall be an overflowing shower; and ye, O great hailstones, shall fall; and a stormy wind shall rend '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lo, when the wall is fallen, shall it not be said unto you, Where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the daubing wherewith ye have daubed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Therefore thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; I will even rend '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' with a stormy wind in my fury; and there shall be an overflowing shower in mine anger, and great hailstones in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my
  - type: text
    text: ' fury to consume '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So will I break down the wall that ye have daubed with untempered '
  - type: usfm
    marker: add
    children:
    - type: text
      text: morter
  - type: text
    text: ', and bring it down to the ground, so that the foundation thereof shall be discovered, and it shall fall, and ye shall be consumed in the midst thereof: and ye shall know that I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Thus will I accomplish my wrath upon the wall, and upon them that have daubed it with untempered '
  - type: usfm
    marker: add
    children:
    - type: text
      text: morter
  - type: text
    text: ', and will say unto you, The wall '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' no '
  - type: usfm
    marker: add
    children:
    - type: text
      text: more
  - type: text
    text: ', neither they that daubed it; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: add
    children:
    - type: text
      text: to wit
  - type: text
    text: ', the prophets of Israel which prophesy concerning Jerusalem, and which see visions of peace for her, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no peace, saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Likewise, thou son of man, set thy face against the daughters of thy people, which prophesy out of their own heart; and prophesy thou against them, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and say, Thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; Woe to the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: women
  - type: text
    text: ' that sew pillows to all armholes, and make kerchiefs upon the head of every stature to hunt souls! Will ye hunt the souls of my people, and will ye save the souls alive '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that come
  - type: text
    text: ' unto you? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And will ye pollute me among my people for handfuls of barley and for pieces of bread, to slay the souls that should not die, and to save the souls alive that should not live, by your lying to my people that hear '
  - type: usfm
    marker: add
    children:
    - type: text
      text: your
  - type: text
    text: ' lies?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Wherefore thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; Behold, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' against your pillows, wherewith ye there hunt the souls to make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' fly, and I will tear them from your arms, and will let the souls go, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the souls that ye hunt to make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' fly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Your kerchiefs also will I tear, and deliver my people out of your hand, and they shall be no more in your hand to be hunted; and ye shall know that I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Because with lies ye have made the heart of the righteous sad, whom I have not made sad; and strengthened the hands of the wicked, that he should not return from his wicked way, by promising him life: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'therefore ye shall see no more vanity, nor divine divinations: for I will deliver my people out of your hand: and ye shall know that I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
