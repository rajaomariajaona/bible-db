document_id: JER.48,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Against Moab thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, the God of Israel; Woe unto Nebo! for it is spoiled: Kiriathaim is confounded '
  - type: text
    content: and
  - type: text
    content: ' taken: Misgab is confounded and dismayed. '
  '10':
  - type: text
    content: 'Cursed '
  - type: text
    content: be
  - type: text
    content: ' he that doeth the work of the '
  - type: text
    content: LORD
  - type: text
    content: ' deceitfully, and cursed '
  - type: text
    content: be
  - type: text
    content: ' he that keepeth back his sword from blood.'
  '11':
  - type: text
    content: 'Moab hath been at ease from his youth, and he hath settled on his lees, and hath not been emptied from vessel to vessel, neither hath he gone into captivity: therefore his taste remained in him, and his scent is not changed. '
  '12':
  - type: text
    content: 'Therefore, behold, the days come, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', that I will send unto him wanderers, that shall cause him to wander, and shall empty his vessels, and break their bottles. '
  '13':
  - type: text
    content: And Moab shall be ashamed of Chemosh, as the house of Israel was ashamed of Beth-el their confidence.
  '14':
  - type: text
    content: 'How say ye, We '
  - type: text
    content: are
  - type: text
    content: ' mighty and strong men for the war? '
  '15':
  - type: text
    content: 'Moab is spoiled, and gone up '
  - type: text
    content: out of
  - type: text
    content: ' her cities, and his chosen young men are gone down to the slaughter, saith the King, whose name '
  - type: text
    content: is
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts. '
  '16':
  - type: text
    content: 'The calamity of Moab '
  - type: text
    content: is
  - type: text
    content: ' near to come, and his affliction hasteth fast. '
  '17':
  - type: text
    content: 'All ye that are about him, bemoan him; and all ye that know his name, say, How is the strong staff broken, '
  - type: text
    content: and
  - type: text
    content: ' the beautiful rod!'
  '18':
  - type: text
    content: 'Thou daughter that dost inhabit Dibon, come down from '
  - type: text
    content: thy
  - type: text
    content: ' glory, and sit in thirst; for the spoiler of Moab shall come upon thee, '
  - type: text
    content: and
  - type: text
    content: ' he shall destroy thy strong holds. '
  '19':
  - type: text
    content: 'O inhabitant of Aroer, stand by the way, and espy; ask him that fleeth, and her that escapeth, '
  - type: text
    content: and
  - type: text
    content: ' say, What is done? '
  '2':
  - type: text
    content: There shall be
  - type: text
    content: ' no more praise of Moab: in Heshbon they have devised evil against it; come, and let us cut it off from '
  - type: text
    content: being
  - type: text
    content: ' a nation. Also thou shalt be cut down, O Madmen; the sword shall pursue thee.'
  '20':
  - type: text
    content: 'Moab is confounded; for it is broken down: howl and cry; tell ye it in Arnon, that Moab is spoiled, '
  '21':
  - type: text
    content: 'and judgment is come upon the plain country; upon Holon, and upon Jahazah, and upon Mephaath, '
  '22':
  - type: text
    content: 'and upon Dibon, and upon Nebo, and upon Beth-diblathaim, '
  '23':
  - type: text
    content: 'and upon Kiriathaim, and upon Beth-gamul, and upon Beth-meon, '
  '24':
  - type: text
    content: and upon Kerioth, and upon Bozrah, and upon all the cities of the land of Moab, far or near.
  '25':
  - type: text
    content: 'The horn of Moab is cut off, and his arm is broken, saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'Make ye him drunken: for he magnified '
  - type: text
    content: himself
  - type: text
    content: ' against the '
  - type: text
    content: LORD
  - type: text
    content: ': Moab also shall wallow in his vomit, and he also shall be in derision. '
  '27':
  - type: text
    content: 'For was not Israel a derision unto thee? was he found among thieves? for since thou spakest of him, thou skippedst for joy. '
  '28':
  - type: text
    content: 'O ye that dwell in Moab, leave the cities, and dwell in the rock, and be like the dove '
  - type: text
    content: that
  - type: text
    content: ' maketh her nest in the sides of the hole''s mouth.'
  '29':
  - type: text
    content: 'We have heard the pride of Moab, (he is exceeding proud) his loftiness, and his arrogancy, and his pride, and the haughtiness of his heart. '
  '3':
  - type: text
    content: 'A voice of crying '
  - type: text
    content: shall be
  - type: text
    content: ' from Horonaim, spoiling and great destruction. '
  '30':
  - type: text
    content: 'I know his wrath, saith the '
  - type: text
    content: LORD
  - type: text
    content: '; but '
  - type: text
    content: it shall
  - type: text
    content: ' not '
  - type: text
    content: be
  - type: text
    content: ' so; his lies shall not so effect '
  - type: text
    content: it
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'Therefore will I howl for Moab, and I will cry out for all Moab; '
  - type: text
    content: mine heart
  - type: text
    content: ' shall mourn for the men of Kir-heres. '
  '32':
  - type: text
    content: 'O vine of Sibmah, I will weep for thee with the weeping of Jazer: thy plants are gone over the sea, they reach '
  - type: text
    content: even
  - type: text
    content: ' to the sea of Jazer: the spoiler is fallen upon thy summer fruits and upon thy vintage. '
  '33':
  - type: text
    content: 'And joy and gladness is taken from the plentiful field, and from the land of Moab; and I have caused wine to fail from the winepresses: none shall tread with shouting; '
  - type: text
    content: their
  - type: text
    content: ' shouting '
  - type: text
    content: shall be
  - type: text
    content: ' no shouting.'
  '34':
  - type: text
    content: 'From the cry of Heshbon '
  - type: text
    content: even
  - type: text
    content: ' unto Elealeh, '
  - type: text
    content: and even
  - type: text
    content: ' unto Jahaz, have they uttered their voice, from Zoar '
  - type: text
    content: even
  - type: text
    content: ' unto Horonaim, '
  - type: text
    content: as
  - type: text
    content: ' an heifer of three years old: for the waters also of Nimrim shall be desolate. '
  '35':
  - type: text
    content: 'Moreover I will cause to cease in Moab, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', him that offereth in the high places, and him that burneth incense to his gods. '
  '36':
  - type: text
    content: 'Therefore mine heart shall sound for Moab like pipes, and mine heart shall sound like pipes for the men of Kir-heres: because the riches '
  - type: text
    content: that
  - type: text
    content: ' he hath gotten are perished.'
  '37':
  - type: text
    content: 'For every head '
  - type: text
    content: shall be
  - type: text
    content: ' bald, and every beard clipped: upon all the hands '
  - type: text
    content: shall be
  - type: text
    content: ' cuttings, and upon the loins sackcloth. '
  '38':
  - type: text
    content: There shall be
  - type: text
    content: ' lamentation generally upon all the housetops of Moab, and in the streets thereof: for I have broken Moab like a vessel wherein '
  - type: text
    content: is
  - type: text
    content: ' no pleasure, saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '39':
  - type: text
    content: 'They shall howl, '
  - type: text
    content: saying
  - type: text
    content: ', How is it broken down! how hath Moab turned the back with shame! so shall Moab be a derision and a dismaying to all them about him.'
  '4':
  - type: text
    content: 'Moab is destroyed; her little ones have caused a cry to be heard. '
  '40':
  - type: text
    content: 'For thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Behold, he shall fly as an eagle, and shall spread his wings over Moab. '
  '41':
  - type: text
    content: 'Kerioth is taken, and the strong holds are surprised, and the mighty men''s hearts in Moab at that day shall be as the heart of a woman in her pangs. '
  '42':
  - type: text
    content: 'And Moab shall be destroyed from '
  - type: text
    content: being
  - type: text
    content: ' a people, because he hath magnified '
  - type: text
    content: himself
  - type: text
    content: ' against the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '43':
  - type: text
    content: 'Fear, and the pit, and the snare, '
  - type: text
    content: shall be
  - type: text
    content: ' upon thee, O inhabitant of Moab, saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '44':
  - type: text
    content: 'He that fleeth from the fear shall fall into the pit; and he that getteth up out of the pit shall be taken in the snare: for I will bring upon it, '
  - type: text
    content: even
  - type: text
    content: ' upon Moab, the year of their visitation, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '45':
  - type: text
    content: 'They that fled stood under the shadow of Heshbon because of the force: but a fire shall come forth out of Heshbon, and a flame from the midst of Sihon, and shall devour the corner of Moab, and the crown of the head of the tumultuous ones. '
  '46':
  - type: text
    content: 'Woe be unto thee, O Moab! the people of Chemosh perisheth: for thy sons are taken captives, and thy daughters captives. '
  '47':
  - type: text
    content: 'Yet will I bring again the captivity of Moab in the latter days, saith the '
  - type: text
    content: LORD
  - type: text
    content: '. Thus far '
  - type: text
    content: is
  - type: text
    content: ' the judgment of Moab.'
  '5':
  - type: text
    content: 'For in the going up of Luhith continual weeping shall go up; for in the going down of Horonaim the enemies have heard a cry of destruction. '
  '6':
  - type: text
    content: Flee, save your lives, and be like the heath in the wilderness.
  '7':
  - type: text
    content: 'For because thou hast trusted in thy works and in thy treasures, thou shalt also be taken: and Chemosh shall go forth into captivity '
  - type: text
    content: with
  - type: text
    content: ' his priests and his princes together. '
  '8':
  - type: text
    content: 'And the spoiler shall come upon every city, and no city shall escape: the valley also shall perish, and the plain shall be destroyed, as the '
  - type: text
    content: LORD
  - type: text
    content: ' hath spoken. '
  '9':
  - type: text
    content: 'Give wings unto Moab, that it may flee and get away: for the cities thereof shall be desolate, without any to dwell therein. '
