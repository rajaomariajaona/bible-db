document_id: JER.48,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Against Moab thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, the God of Israel; Woe unto Nebo! for it is spoiled: Kiriathaim is confounded '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' taken: Misgab is confounded and dismayed. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Cursed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' he that doeth the work of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' deceitfully, and cursed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' he that keepeth back his sword from blood.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Moab hath been at ease from his youth, and he hath settled on his lees, and hath not been emptied from vessel to vessel, neither hath he gone into captivity: therefore his taste remained in him, and his scent is not changed. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Therefore, behold, the days come, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', that I will send unto him wanderers, that shall cause him to wander, and shall empty his vessels, and break their bottles. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: And Moab shall be ashamed of Chemosh, as the house of Israel was ashamed of Beth-el their confidence.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'How say ye, We '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' mighty and strong men for the war? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Moab is spoiled, and gone up '
    - type: usfm
      marker: add
      children:
      - type: text
        text: out of
    - type: text
      text: ' her cities, and his chosen young men are gone down to the slaughter, saith the King, whose name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The calamity of Moab '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' near to come, and his affliction hasteth fast. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'All ye that are about him, bemoan him; and all ye that know his name, say, How is the strong staff broken, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the beautiful rod!'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Thou daughter that dost inhabit Dibon, come down from '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thy
    - type: text
      text: ' glory, and sit in thirst; for the spoiler of Moab shall come upon thee, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' he shall destroy thy strong holds. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'O inhabitant of Aroer, stand by the way, and espy; ask him that fleeth, and her that escapeth, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' say, What is done? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: add
      children:
      - type: text
        text: There shall be
    - type: text
      text: ' no more praise of Moab: in Heshbon they have devised evil against it; come, and let us cut it off from '
    - type: usfm
      marker: add
      children:
      - type: text
        text: being
    - type: text
      text: ' a nation. Also thou shalt be cut down, O Madmen; the sword shall pursue thee.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Moab is confounded; for it is broken down: howl and cry; tell ye it in Arnon, that Moab is spoiled, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'and judgment is come upon the plain country; upon Holon, and upon Jahazah, and upon Mephaath, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'and upon Dibon, and upon Nebo, and upon Beth-diblathaim, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'and upon Kiriathaim, and upon Beth-gamul, and upon Beth-meon, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: and upon Kerioth, and upon Bozrah, and upon all the cities of the land of Moab, far or near.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'The horn of Moab is cut off, and his arm is broken, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Make ye him drunken: for he magnified '
    - type: usfm
      marker: add
      children:
      - type: text
        text: himself
    - type: text
      text: ' against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': Moab also shall wallow in his vomit, and he also shall be in derision. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'For was not Israel a derision unto thee? was he found among thieves? for since thou spakest of him, thou skippedst for joy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'O ye that dwell in Moab, leave the cities, and dwell in the rock, and be like the dove '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' maketh her nest in the sides of the hole''s mouth.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'We have heard the pride of Moab, (he is exceeding proud) his loftiness, and his arrogancy, and his pride, and the haughtiness of his heart. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'A voice of crying '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' from Horonaim, spoiling and great destruction. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'I know his wrath, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; but '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it shall
    - type: text
      text: ' not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' so; his lies shall not so effect '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: '. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Therefore will I howl for Moab, and I will cry out for all Moab; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: mine heart
    - type: text
      text: ' shall mourn for the men of Kir-heres. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'O vine of Sibmah, I will weep for thee with the weeping of Jazer: thy plants are gone over the sea, they reach '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' to the sea of Jazer: the spoiler is fallen upon thy summer fruits and upon thy vintage. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And joy and gladness is taken from the plentiful field, and from the land of Moab; and I have caused wine to fail from the winepresses: none shall tread with shouting; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' shouting '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' no shouting.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'From the cry of Heshbon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' unto Elealeh, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and even
    - type: text
      text: ' unto Jahaz, have they uttered their voice, from Zoar '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' unto Horonaim, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' an heifer of three years old: for the waters also of Nimrim shall be desolate. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Moreover I will cause to cease in Moab, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', him that offereth in the high places, and him that burneth incense to his gods. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Therefore mine heart shall sound for Moab like pipes, and mine heart shall sound like pipes for the men of Kir-heres: because the riches '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' he hath gotten are perished.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'For every head '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' bald, and every beard clipped: upon all the hands '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' cuttings, and upon the loins sackcloth. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: add
      children:
      - type: text
        text: There shall be
    - type: text
      text: ' lamentation generally upon all the housetops of Moab, and in the streets thereof: for I have broken Moab like a vessel wherein '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' no pleasure, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'They shall howl, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: saying
    - type: text
      text: ', How is it broken down! how hath Moab turned the back with shame! so shall Moab be a derision and a dismaying to all them about him.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Moab is destroyed; her little ones have caused a cry to be heard. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'For thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; Behold, he shall fly as an eagle, and shall spread his wings over Moab. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Kerioth is taken, and the strong holds are surprised, and the mighty men''s hearts in Moab at that day shall be as the heart of a woman in her pangs. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'And Moab shall be destroyed from '
    - type: usfm
      marker: add
      children:
      - type: text
        text: being
    - type: text
      text: ' a people, because he hath magnified '
    - type: usfm
      marker: add
      children:
      - type: text
        text: himself
    - type: text
      text: ' against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Fear, and the pit, and the snare, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' upon thee, O inhabitant of Moab, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'He that fleeth from the fear shall fall into the pit; and he that getteth up out of the pit shall be taken in the snare: for I will bring upon it, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' upon Moab, the year of their visitation, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'They that fled stood under the shadow of Heshbon because of the force: but a fire shall come forth out of Heshbon, and a flame from the midst of Sihon, and shall devour the corner of Moab, and the crown of the head of the tumultuous ones. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Woe be unto thee, O Moab! the people of Chemosh perisheth: for thy sons are taken captives, and thy daughters captives. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Yet will I bring again the captivity of Moab in the latter days, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. Thus far '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the judgment of Moab.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For in the going up of Luhith continual weeping shall go up; for in the going down of Horonaim the enemies have heard a cry of destruction. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Flee, save your lives, and be like the heath in the wilderness.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For because thou hast trusted in thy works and in thy treasures, thou shalt also be taken: and Chemosh shall go forth into captivity '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' his priests and his princes together. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And the spoiler shall come upon every city, and no city shall escape: the valley also shall perish, and the plain shall be destroyed, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath spoken. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Give wings unto Moab, that it may flee and get away: for the cities thereof shall be desolate, without any to dwell therein. '
