  '1':
  - type: heading
    content: Paul before Felix
  - type: text
    content: 'And after five days Ananias the high priest descended with the elders, and '
  - type: text
    content: with
  - type: text
    content: ' a certain orator '
  - type: text
    content: named
  - type: text
    content: ' Tertullus, who informed the governor against Paul. '
  '10':
  - type: text
    content: 'Then Paul, after that the governor had beckoned unto him to speak, answered, Forasmuch as I know that thou hast been of many years a judge unto this nation, I do the more cheerfully answer for myself: '
  '11':
  - type: text
    content: 'because that thou mayest understand, that there are yet but twelve days since I went up to Jerusalem for to worship. '
  '12':
  - type: text
    content: 'And they neither found me in the temple disputing with any man, neither raising up the people, neither in the synagogues, nor in the city: '
  '13':
  - type: text
    content: 'neither can they prove the things whereof they now accuse me. '
  '14':
  - type: text
    content: 'But this I confess unto thee, that after the way which they call heresy, so worship I the God of my fathers, believing all things which are written in the law and in the prophets: '
  '15':
  - type: text
    content: 'and have hope toward God, which they themselves also allow, that there shall be a resurrection of the dead, both of the just and unjust. '
  '16':
  - type: text
    content: 'And herein do I exercise myself, to have always a conscience void of offence toward God, and '
  - type: text
    content: toward
  - type: text
    content: ' men. '
  '17':
  - type: text
    content: 'Now after many years I came to bring alms to my nation, and offerings. '
  '18':
  - type: text
    content: 'Whereupon certain Jews from Asia found me purified in the temple, neither with multitude, nor with tumult. '
  '19':
  - type: text
    content: 'Who ought to have been here before thee, and object, if they had ought against me. '
  '2':
  - type: text
    content: 'And when he was called forth, Tertullus began to accuse '
  - type: text
    content: him
  - type: text
    content: ', saying, Seeing that by thee we enjoy great quietness, and that very worthy deeds are done unto this nation by thy providence, '
  '20':
  - type: text
    content: 'Or else let these same '
  - type: text
    content: here
  - type: text
    content: ' say, if they have found any evil doing in me, while I stood before the council, '
  '21':
  - type: text
    content: except it be for this one voice, that I cried standing among them, Touching the resurrection of the dead I am called in question by you this day.
  '22':
  - type: text
    content: 'And when Felix heard these things, having more perfect knowledge of '
  - type: text
    content: that
  - type: text
    content: ' way, he deferred them, and said, When Lysias the chief captain shall come down, I will know the uttermost of your matter. '
  '23':
  - type: text
    content: 'And he commanded a centurion to keep Paul, and to let '
  - type: text
    content: him
  - type: text
    content: ' have liberty, and that he should forbid none of his acquaintance to minister or come unto him.'
  '24':
  - type: text
    content: 'And after certain days, when Felix came with his wife Drusilla, which was a Jewess, he sent for Paul, and heard him concerning the faith in Christ. '
  '25':
  - type: text
    content: 'And as he reasoned of righteousness, temperance, and judgment to come, Felix trembled, and answered, Go thy way for this time; when I have a convenient season, I will call for thee. '
  '26':
  - type: text
    content: 'He hoped also that money should have been given him of Paul, that he might loose him: wherefore he sent for him the oftener, and communed with him. '
  '27':
  - type: text
    content: 'But after two years Porcius Festus came into Felix'' room: and Felix, willing to shew the Jews a pleasure, left Paul bound.'
  '3':
  - type: text
    content: 'we accept '
  - type: text
    content: it
  - type: text
    content: ' always, and in all places, most noble Felix, with all thankfulness. '
  '4':
  - type: text
    content: 'Notwithstanding, that I be not further tedious unto thee, I pray thee that thou wouldest hear us of thy clemency a few words. '
  '5':
  - type: text
    content: 'For we have found this man '
  - type: text
    content: a
  - type: text
    content: ' pestilent '
  - type: text
    content: fellow
  - type: text
    content: ', and a mover of sedition among all the Jews throughout the world, and a ringleader of the sect of the Nazarenes: '
  '6':
  - type: text
    content: 'who also hath gone about to profane the temple: whom we took, and would have judged according to our law. '
  '7':
  - type: text
    content: 'But the chief captain Lysias came '
  - type: text
    content: upon us
  - type: text
    content: ', and with great violence took '
  - type: text
    content: him
  - type: text
    content: ' away out of our hands, '
  '8':
  - type: text
    content: 'commanding his accusers to come unto thee: by examining of whom thyself mayest take knowledge of all these things, whereof we accuse him. '
  '9':
  - type: text
    content: And the Jews also assented, saying that these things were so.
