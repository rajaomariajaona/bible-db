document_id: ACT.24
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Paul before Felix
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And after five days Ananias the high priest descended with the elders, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' a certain orator '
  - type: usfm
    marker: add
    children:
    - type: text
      text: named
  - type: text
    text: ' Tertullus, who informed the governor against Paul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And when he was called forth, Tertullus began to accuse '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', saying, Seeing that by thee we enjoy great quietness, and that very worthy deeds are done unto this nation by thy providence, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'we accept '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' always, and in all places, most noble Felix, with all thankfulness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Notwithstanding, that I be not further tedious unto thee, I pray thee that thou wouldest hear us of thy clemency a few words. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For we have found this man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: a
  - type: text
    text: ' pestilent '
  - type: usfm
    marker: add
    children:
    - type: text
      text: fellow
  - type: text
    text: ', and a mover of sedition among all the Jews throughout the world, and a ringleader of the sect of the Nazarenes: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'who also hath gone about to profane the temple: whom we took, and would have judged according to our law. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But the chief captain Lysias came '
  - type: usfm
    marker: add
    children:
    - type: text
      text: upon us
  - type: text
    text: ', and with great violence took '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' away out of our hands, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'commanding his accusers to come unto thee: by examining of whom thyself mayest take knowledge of all these things, whereof we accuse him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: And the Jews also assented, saying that these things were so.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Paul, after that the governor had beckoned unto him to speak, answered, Forasmuch as I know that thou hast been of many years a judge unto this nation, I do the more cheerfully answer for myself: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'because that thou mayest understand, that there are yet but twelve days since I went up to Jerusalem for to worship. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And they neither found me in the temple disputing with any man, neither raising up the people, neither in the synagogues, nor in the city: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'neither can they prove the things whereof they now accuse me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But this I confess unto thee, that after the way which they call heresy, so worship I the God of my fathers, believing all things which are written in the law and in the prophets: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and have hope toward God, which they themselves also allow, that there shall be a resurrection of the dead, both of the just and unjust. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And herein do I exercise myself, to have always a conscience void of offence toward God, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: toward
  - type: text
    text: ' men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now after many years I came to bring alms to my nation, and offerings. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Whereupon certain Jews from Asia found me purified in the temple, neither with multitude, nor with tumult. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Who ought to have been here before thee, and object, if they had ought against me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Or else let these same '
  - type: usfm
    marker: add
    children:
    - type: text
      text: here
  - type: text
    text: ' say, if they have found any evil doing in me, while I stood before the council, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: except it be for this one voice, that I cried standing among them, Touching the resurrection of the dead I am called in question by you this day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And when Felix heard these things, having more perfect knowledge of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' way, he deferred them, and said, When Lysias the chief captain shall come down, I will know the uttermost of your matter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And he commanded a centurion to keep Paul, and to let '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' have liberty, and that he should forbid none of his acquaintance to minister or come unto him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And after certain days, when Felix came with his wife Drusilla, which was a Jewess, he sent for Paul, and heard him concerning the faith in Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And as he reasoned of righteousness, temperance, and judgment to come, Felix trembled, and answered, Go thy way for this time; when I have a convenient season, I will call for thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'He hoped also that money should have been given him of Paul, that he might loose him: wherefore he sent for him the oftener, and communed with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'But after two years Porcius Festus came into Felix'' room: and Felix, willing to shew the Jews a pleasure, left Paul bound.'
