document_id: GAL.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then fourteen years after I went up again to Jerusalem with Barnabas, and took Titus with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: me
  - type: text
    text: ' also. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And I went up by revelation, and communicated unto them that gospel which I preach among the Gentiles, but privately to them which were of reputation, lest by any means I should run, or had run, in vain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But neither Titus, who was with me, being a Greek, was compelled to be circumcised: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and that because of false brethren unawares brought in, who came in privily to spy out our liberty which we have in Christ Jesus, that they might bring us into bondage: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'to whom we gave place by subjection, no, not for an hour; that the truth of the gospel might continue with you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But of these who seemed to be somewhat, (whatsoever they were, it maketh no matter to me: God accepteth no man''s person:) for they who seemed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be somewhat
  - type: text
    text: ' in conference added nothing to me: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'but contrariwise, when they saw that the gospel of the uncircumcision was committed unto me, as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the gospel
  - type: text
    text: ' of the circumcision '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' unto Peter; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '(for he that wrought effectually in Peter to the apostleship of the circumcision, the same was mighty in me toward the Gentiles:) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and when James, Cephas, and John, who seemed to be pillars, perceived the grace that was given unto me, they gave to me and Barnabas the right hands of fellowship; that we '
  - type: usfm
    marker: add
    children:
    - type: text
      text: should go
  - type: text
    text: ' unto the heathen, and they unto the circumcision. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Only '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they would
  - type: text
    text: ' that we should remember the poor; the same which I also was forward to do. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But when Peter was come to Antioch, I withstood him to the face, because he was to be blamed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For before that certain came from James, he did eat with the Gentiles: but when they were come, he withdrew and separated himself, fearing them which were of the circumcision. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And the other Jews dissembled likewise with him; insomuch that Barnabas also was carried away with their dissimulation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But when I saw that they walked not uprightly according to the truth of the gospel, I said unto Peter before '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' all, If thou, being a Jew, livest after the manner of Gentiles, and not as do the Jews, why compellest thou the Gentiles to live as do the Jews?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'We '
  - type: usfm
    marker: add
    children:
    - type: text
      text: who are
  - type: text
    text: ' Jews by nature, and not sinners of the Gentiles, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'knowing that a man is not justified by the works of the law, but by the faith of Jesus Christ, even we have believed in Jesus Christ, that we might be justified by the faith of Christ, and not by the works of the law: for by the works of the law shall no flesh be justified. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But if, while we seek to be justified by Christ, we ourselves also are found sinners, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' therefore Christ the minister of sin? God forbid. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For if I build again the things which I destroyed, I make myself a transgressor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For I through the law am dead to the law, that I might live unto God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'I am crucified with Christ: nevertheless I live; yet not I, but Christ liveth in me: and the life which I now live in the flesh I live by the faith of the Son of God, who loved me, and gave himself for me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'I do not frustrate the grace of God: for if righteousness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: come
  - type: text
    text: ' by the law, then Christ is dead in vain.'
