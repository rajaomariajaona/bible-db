document_id: GAL.2,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then fourteen years after I went up again to Jerusalem with Barnabas, and took Titus with '
  - type: text
    content: me
  - type: text
    content: ' also. '
  '10':
  - type: text
    content: 'Only '
  - type: text
    content: they would
  - type: text
    content: ' that we should remember the poor; the same which I also was forward to do. '
  '11':
  - type: text
    content: 'But when Peter was come to Antioch, I withstood him to the face, because he was to be blamed. '
  '12':
  - type: text
    content: 'For before that certain came from James, he did eat with the Gentiles: but when they were come, he withdrew and separated himself, fearing them which were of the circumcision. '
  '13':
  - type: text
    content: 'And the other Jews dissembled likewise with him; insomuch that Barnabas also was carried away with their dissimulation. '
  '14':
  - type: text
    content: 'But when I saw that they walked not uprightly according to the truth of the gospel, I said unto Peter before '
  - type: text
    content: them
  - type: text
    content: ' all, If thou, being a Jew, livest after the manner of Gentiles, and not as do the Jews, why compellest thou the Gentiles to live as do the Jews?'
  '15':
  - type: text
    content: 'We '
  - type: text
    content: who are
  - type: text
    content: ' Jews by nature, and not sinners of the Gentiles, '
  '16':
  - type: text
    content: 'knowing that a man is not justified by the works of the law, but by the faith of Jesus Christ, even we have believed in Jesus Christ, that we might be justified by the faith of Christ, and not by the works of the law: for by the works of the law shall no flesh be justified. '
  '17':
  - type: text
    content: 'But if, while we seek to be justified by Christ, we ourselves also are found sinners, '
  - type: text
    content: is
  - type: text
    content: ' therefore Christ the minister of sin? God forbid. '
  '18':
  - type: text
    content: 'For if I build again the things which I destroyed, I make myself a transgressor. '
  '19':
  - type: text
    content: 'For I through the law am dead to the law, that I might live unto God. '
  '2':
  - type: text
    content: 'And I went up by revelation, and communicated unto them that gospel which I preach among the Gentiles, but privately to them which were of reputation, lest by any means I should run, or had run, in vain. '
  '20':
  - type: text
    content: 'I am crucified with Christ: nevertheless I live; yet not I, but Christ liveth in me: and the life which I now live in the flesh I live by the faith of the Son of God, who loved me, and gave himself for me. '
  '21':
  - type: text
    content: 'I do not frustrate the grace of God: for if righteousness '
  - type: text
    content: come
  - type: text
    content: ' by the law, then Christ is dead in vain.'
  '3':
  - type: text
    content: 'But neither Titus, who was with me, being a Greek, was compelled to be circumcised: '
  '4':
  - type: text
    content: 'and that because of false brethren unawares brought in, who came in privily to spy out our liberty which we have in Christ Jesus, that they might bring us into bondage: '
  '5':
  - type: text
    content: 'to whom we gave place by subjection, no, not for an hour; that the truth of the gospel might continue with you. '
  '6':
  - type: text
    content: 'But of these who seemed to be somewhat, (whatsoever they were, it maketh no matter to me: God accepteth no man''s person:) for they who seemed '
  - type: text
    content: to be somewhat
  - type: text
    content: ' in conference added nothing to me: '
  '7':
  - type: text
    content: 'but contrariwise, when they saw that the gospel of the uncircumcision was committed unto me, as '
  - type: text
    content: the gospel
  - type: text
    content: ' of the circumcision '
  - type: text
    content: was
  - type: text
    content: ' unto Peter; '
  '8':
  - type: text
    content: '(for he that wrought effectually in Peter to the apostleship of the circumcision, the same was mighty in me toward the Gentiles:) '
  '9':
  - type: text
    content: 'and when James, Cephas, and John, who seemed to be pillars, perceived the grace that was given unto me, they gave to me and Barnabas the right hands of fellowship; that we '
  - type: text
    content: should go
  - type: text
    content: ' unto the heathen, and they unto the circumcision. '
