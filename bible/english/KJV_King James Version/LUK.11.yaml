document_id: LUK.11
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Lord's Prayer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And it came to pass, that, as he was praying in a certain place, when he ceased, one of his disciples said unto him, Lord, teach us to pray, as John also taught his disciples. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: When ye pray, say, Our Father which art in heaven, Hallowed be thy name. Thy kingdom come. Thy will be done, as in heaven, so in earth.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Give us day by day our daily bread.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And forgive us our sins; for we also forgive every one that is indebted to us. And lead us not into temptation; but deliver us from evil.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And he said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Which of you shall have a friend, and shall go unto him at midnight, and say unto him, Friend, lend me three loaves;
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for a friend of mine in his journey is come to me, and I have nothing to set before him?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And he from within shall answer and say, Trouble me not: the door is now shut, and my children are with me in bed; I cannot rise and give thee.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I say unto you, Though he will not rise and give him, because he is his friend, yet because of his importunity he will rise and give him as many as he needeth.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And I say unto you, Ask, and it shall be given you; seek, and ye shall find; knock, and it shall be opened unto you.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For every one that asketh receiveth; and he that seeketh findeth; and to him that knocketh it shall be opened.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'If a son shall ask bread of any of you that is a father, will he give him a stone? or if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he ask
    - type: text
      text: ' a fish, will he for a fish give him a serpent?'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Or if he shall ask an egg, will he offer him a scorpion?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'If ye then, being evil, know how to give good gifts unto your children: how much more shall '
    - type: usfm
      marker: add
      children:
      - type: text
        text: your
    - type: text
      text: ' heavenly Father give the Holy Spirit to them that ask him?'
- type: usfm
  marker: s2
  children:
  - type: text
    text: An Evil Generation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And he was casting out a devil, and it was dumb. And it came to pass, when the devil was gone out, the dumb spake; and the people wondered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But some of them said, He casteth out devils through Beelzebub the chief of the devils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And others, tempting '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', sought of him a sign from heaven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But he, knowing their thoughts, said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Every kingdom divided against itself is brought to desolation; and a house '
    - type: usfm
      marker: add
      children:
      - type: text
        text: divided
    - type: text
      text: ' against an house falleth.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If Satan also be divided against himself, how shall his kingdom stand? because ye say that I cast out devils through Beelzebub.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And if I by Beelzebub cast out devils, by whom do your sons cast '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' out? therefore shall they be your judges.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But if I with the finger of God cast out devils, no doubt the kingdom of God is come upon you.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'When a strong man armed keepeth his palace, his goods are in peace:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: but when a stronger than he shall come upon him, and overcome him, he taketh from him all his armour wherein he trusted, and divideth his spoils.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'He that is not with me is against me: and he that gathereth not with me scattereth.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: When the unclean spirit is gone out of a man, he walketh through dry places, seeking rest; and finding none, he saith, I will return unto my house whence I came out.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And when he cometh, he findeth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' swept and garnished.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Then goeth he, and taketh '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to him
    - type: text
      text: ' seven other spirits more wicked than himself; and they enter in, and dwell there: and the last '
    - type: usfm
      marker: add
      children:
      - type: text
        text: state
    - type: text
      text: ' of that man is worse than the first.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And it came to pass, as he spake these things, a certain woman of the company lifted up her voice, and said unto him, Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the womb that bare thee, and the paps which thou hast sucked. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'But he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Yea rather, blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' they that hear the word of God, and keep it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And when the people were gathered thick together, he began to say, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'This is an evil generation: they seek a sign; and there shall no sign be given it, but the sign of Jonas the prophet.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For as Jonas was a sign unto the Ninevites, so shall also the Son of man be to this generation.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'The queen of the south shall rise up in the judgment with the men of this generation, and condemn them: for she came from the utmost parts of the earth to hear the wisdom of Solomon; and, behold, a greater than Solomon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' here.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'The men of Nineve shall rise up in the judgment with this generation, and shall condemn it: for they repented at the preaching of Jonas; and, behold, a greater than Jonas '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' here.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'No man, when he hath lighted a candle, putteth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' in a secret place, neither under a bushel, but on a candlestick, that they which come in may see the light.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'The light of the body is the eye: therefore when thine eye is single, thy whole body also is full of light; but when '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thine eye
    - type: text
      text: ' is evil, thy body also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' full of darkness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Take heed therefore that the light which is in thee be not darkness.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'If thy whole body therefore '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' full of light, having no part dark, the whole shall be full of light, as when the bright shining of a candle doth give thee light.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: In a Pharisee's House
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And as he spake, a certain Pharisee besought him to dine with him: and he went in, and sat down to meat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And when the Pharisee saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', he marvelled that he had not first washed before dinner. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And the Lord said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Now do ye Pharisees make clean the outside of the cup and the platter; but your inward part is full of ravening and wickedness.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Ye
    - type: text
      text: ' fools, did not he that made that which is without make that which is within also?'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But rather give alms of such things as ye have; and, behold, all things are clean unto you.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But woe unto you, Pharisees! for ye tithe mint and rue and all manner of herbs, and pass over judgment and the love of God: these ought ye to have done, and not to leave the other undone.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Woe unto you, Pharisees! for ye love the uppermost seats in the synagogues, and greetings in the markets.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Woe unto you, scribes and Pharisees, hypocrites! for ye are as graves which appear not, and the men that walk over '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' are not aware '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of them
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Then answered one of the lawyers, and said unto him, Master, thus saying thou reproachest us also. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'And he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Woe unto you also, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ye
    - type: text
      text: ' lawyers! for ye lade men with burdens grievous to be borne, and ye yourselves touch not the burdens with one of your fingers.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Woe unto you! for ye build the sepulchres of the prophets, and your fathers killed them.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Truly ye bear witness that ye allow the deeds of your fathers: for they indeed killed them, and ye build their sepulchres.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Therefore also said the wisdom of God, I will send them prophets and apostles, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: some
    - type: text
      text: ' of them they shall slay and persecute:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: that the blood of all the prophets, which was shed from the foundation of the world, may be required of this generation;
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'from the blood of Abel unto the blood of Zacharias, which perished between the altar and the temple: verily I say unto you, It shall be required of this generation.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Woe unto you, lawyers! for ye have taken away the key of knowledge: ye entered not in yourselves, and them that were entering in ye hindered.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'And as he said these things unto them, the scribes and the Pharisees began to urge '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' vehemently, and to provoke him to speak of many things: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: laying wait for him, and seeking to catch something out of his mouth, that they might accuse him.
