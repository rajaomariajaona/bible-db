document_id: LUK.11,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord's Prayer
  - type: text
    content: 'And it came to pass, that, as he was praying in a certain place, when he ceased, one of his disciples said unto him, Lord, teach us to pray, as John also taught his disciples. '
  '10':
  - type: text
    content: For every one that asketh receiveth; and he that seeketh findeth; and to him that knocketh it shall be opened.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'If a son shall ask bread of any of you that is a father, will he give him a stone? or if '
  - type: text
    content: he ask
  - type: text
    content: ' a fish, will he for a fish give him a serpent?'
  - type: text
    content: ' '
  '12':
  - type: text
    content: Or if he shall ask an egg, will he offer him a scorpion?
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'If ye then, being evil, know how to give good gifts unto your children: how much more shall '
  - type: text
    content: your
  - type: text
    content: ' heavenly Father give the Holy Spirit to them that ask him?'
  - type: heading
    content: An Evil Generation
  '14':
  - type: text
    content: 'And he was casting out a devil, and it was dumb. And it came to pass, when the devil was gone out, the dumb spake; and the people wondered. '
  '15':
  - type: text
    content: 'But some of them said, He casteth out devils through Beelzebub the chief of the devils. '
  '16':
  - type: text
    content: 'And others, tempting '
  - type: text
    content: him
  - type: text
    content: ', sought of him a sign from heaven.'
  '17':
  - type: text
    content: 'But he, knowing their thoughts, said unto them, '
  - type: text
    content: 'Every kingdom divided against itself is brought to desolation; and a house '
  - type: text
    content: divided
  - type: text
    content: ' against an house falleth.'
  - type: text
    content: ' '
  '18':
  - type: text
    content: If Satan also be divided against himself, how shall his kingdom stand? because ye say that I cast out devils through Beelzebub.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'And if I by Beelzebub cast out devils, by whom do your sons cast '
  - type: text
    content: them
  - type: text
    content: ' out? therefore shall they be your judges.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: When ye pray, say, Our Father which art in heaven, Hallowed be thy name. Thy kingdom come. Thy will be done, as in heaven, so in earth.
  - type: text
    content: ' '
  '20':
  - type: text
    content: But if I with the finger of God cast out devils, no doubt the kingdom of God is come upon you.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'When a strong man armed keepeth his palace, his goods are in peace:'
  - type: text
    content: ' '
  '22':
  - type: text
    content: but when a stronger than he shall come upon him, and overcome him, he taketh from him all his armour wherein he trusted, and divideth his spoils.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'He that is not with me is against me: and he that gathereth not with me scattereth.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: When the unclean spirit is gone out of a man, he walketh through dry places, seeking rest; and finding none, he saith, I will return unto my house whence I came out.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'And when he cometh, he findeth '
  - type: text
    content: it
  - type: text
    content: ' swept and garnished.'
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Then goeth he, and taketh '
  - type: text
    content: to him
  - type: text
    content: ' seven other spirits more wicked than himself; and they enter in, and dwell there: and the last '
  - type: text
    content: state
  - type: text
    content: ' of that man is worse than the first.'
  '27':
  - type: text
    content: 'And it came to pass, as he spake these things, a certain woman of the company lifted up her voice, and said unto him, Blessed '
  - type: text
    content: is
  - type: text
    content: ' the womb that bare thee, and the paps which thou hast sucked. '
  '28':
  - type: text
    content: 'But he said, '
  - type: text
    content: 'Yea rather, blessed '
  - type: text
    content: are
  - type: text
    content: ' they that hear the word of God, and keep it.'
  '29':
  - type: text
    content: 'And when the people were gathered thick together, he began to say, '
  - type: text
    content: 'This is an evil generation: they seek a sign; and there shall no sign be given it, but the sign of Jonas the prophet.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: Give us day by day our daily bread.
  - type: text
    content: ' '
  '30':
  - type: text
    content: For as Jonas was a sign unto the Ninevites, so shall also the Son of man be to this generation.
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'The queen of the south shall rise up in the judgment with the men of this generation, and condemn them: for she came from the utmost parts of the earth to hear the wisdom of Solomon; and, behold, a greater than Solomon '
  - type: text
    content: is
  - type: text
    content: ' here.'
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'The men of Nineve shall rise up in the judgment with this generation, and shall condemn it: for they repented at the preaching of Jonas; and, behold, a greater than Jonas '
  - type: text
    content: is
  - type: text
    content: ' here.'
  '33':
  - type: text
    content: ' '
  - type: text
    content: 'No man, when he hath lighted a candle, putteth '
  - type: text
    content: it
  - type: text
    content: ' in a secret place, neither under a bushel, but on a candlestick, that they which come in may see the light.'
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'The light of the body is the eye: therefore when thine eye is single, thy whole body also is full of light; but when '
  - type: text
    content: thine eye
  - type: text
    content: ' is evil, thy body also '
  - type: text
    content: is
  - type: text
    content: ' full of darkness.'
  '35':
  - type: text
    content: ' '
  - type: text
    content: Take heed therefore that the light which is in thee be not darkness.
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'If thy whole body therefore '
  - type: text
    content: be
  - type: text
    content: ' full of light, having no part dark, the whole shall be full of light, as when the bright shining of a candle doth give thee light.'
  - type: heading
    content: In a Pharisee's House
  '37':
  - type: text
    content: 'And as he spake, a certain Pharisee besought him to dine with him: and he went in, and sat down to meat. '
  '38':
  - type: text
    content: 'And when the Pharisee saw '
  - type: text
    content: it
  - type: text
    content: ', he marvelled that he had not first washed before dinner. '
  '39':
  - type: text
    content: 'And the Lord said unto him, '
  - type: text
    content: Now do ye Pharisees make clean the outside of the cup and the platter; but your inward part is full of ravening and wickedness.
  - type: text
    content: ' '
  '4':
  - type: text
    content: And forgive us our sins; for we also forgive every one that is indebted to us. And lead us not into temptation; but deliver us from evil.
  '40':
  - type: text
    content: Ye
  - type: text
    content: ' fools, did not he that made that which is without make that which is within also?'
  - type: text
    content: ' '
  '41':
  - type: text
    content: But rather give alms of such things as ye have; and, behold, all things are clean unto you.
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'But woe unto you, Pharisees! for ye tithe mint and rue and all manner of herbs, and pass over judgment and the love of God: these ought ye to have done, and not to leave the other undone.'
  - type: text
    content: ' '
  '43':
  - type: text
    content: Woe unto you, Pharisees! for ye love the uppermost seats in the synagogues, and greetings in the markets.
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'Woe unto you, scribes and Pharisees, hypocrites! for ye are as graves which appear not, and the men that walk over '
  - type: text
    content: them
  - type: text
    content: ' are not aware '
  - type: text
    content: of them
  - type: text
    content: .
  '45':
  - type: text
    content: 'Then answered one of the lawyers, and said unto him, Master, thus saying thou reproachest us also. '
  '46':
  - type: text
    content: 'And he said, '
  - type: text
    content: 'Woe unto you also, '
  - type: text
    content: ye
  - type: text
    content: ' lawyers! for ye lade men with burdens grievous to be borne, and ye yourselves touch not the burdens with one of your fingers.'
  - type: text
    content: ' '
  '47':
  - type: text
    content: Woe unto you! for ye build the sepulchres of the prophets, and your fathers killed them.
  - type: text
    content: ' '
  '48':
  - type: text
    content: 'Truly ye bear witness that ye allow the deeds of your fathers: for they indeed killed them, and ye build their sepulchres.'
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'Therefore also said the wisdom of God, I will send them prophets and apostles, and '
  - type: text
    content: some
  - type: text
    content: ' of them they shall slay and persecute:'
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: Which of you shall have a friend, and shall go unto him at midnight, and say unto him, Friend, lend me three loaves;
  - type: text
    content: ' '
  '50':
  - type: text
    content: that the blood of all the prophets, which was shed from the foundation of the world, may be required of this generation;
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'from the blood of Abel unto the blood of Zacharias, which perished between the altar and the temple: verily I say unto you, It shall be required of this generation.'
  - type: text
    content: ' '
  '52':
  - type: text
    content: 'Woe unto you, lawyers! for ye have taken away the key of knowledge: ye entered not in yourselves, and them that were entering in ye hindered.'
  '53':
  - type: text
    content: 'And as he said these things unto them, the scribes and the Pharisees began to urge '
  - type: text
    content: him
  - type: text
    content: ' vehemently, and to provoke him to speak of many things: '
  '54':
  - type: text
    content: laying wait for him, and seeking to catch something out of his mouth, that they might accuse him.
  '6':
  - type: text
    content: for a friend of mine in his journey is come to me, and I have nothing to set before him?
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'And he from within shall answer and say, Trouble me not: the door is now shut, and my children are with me in bed; I cannot rise and give thee.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: I say unto you, Though he will not rise and give him, because he is his friend, yet because of his importunity he will rise and give him as many as he needeth.
  - type: text
    content: ' '
  '9':
  - type: text
    content: And I say unto you, Ask, and it shall be given you; seek, and ye shall find; knock, and it shall be opened unto you.
  - type: text
    content: ' '
