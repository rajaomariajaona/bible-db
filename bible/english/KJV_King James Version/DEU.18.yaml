document_id: DEU.18,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'The priests the Levites, '
  - type: text
    content: and
  - type: text
    content: ' all the tribe of Levi, shall have no part nor inheritance with Israel: they shall eat the offerings of the '
  - type: text
    content: LORD
  - type: text
    content: ' made by fire, and his inheritance. '
  '10':
  - type: text
    content: 'There shall not be found among you '
  - type: text
    content: any one
  - type: text
    content: ' that maketh his son or his daughter to pass through the fire, '
  - type: text
    content: or
  - type: text
    content: ' that useth divination, '
  - type: text
    content: or
  - type: text
    content: ' an observer of times, or an enchanter, or a witch, '
  '11':
  - type: text
    content: 'or a charmer, or a consulter with familiar spirits, or a wizard, or a necromancer. '
  '12':
  - type: text
    content: 'For all that do these things '
  - type: text
    content: are
  - type: text
    content: ' an abomination unto the '
  - type: text
    content: LORD
  - type: text
    content: ': and because of these abominations the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God doth drive them out from before thee. '
  '13':
  - type: text
    content: 'Thou shalt be perfect with the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God. '
  '14':
  - type: text
    content: 'For these nations, which thou shalt possess, hearkened unto observers of times, and unto diviners: but as for thee, the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God hath not suffered thee so '
  - type: text
    content: to do
  - type: text
    content: .
  '15':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' thy God will raise up unto thee a Prophet from the midst of thee, of thy brethren, like unto me; unto him ye shall hearken; '
  '16':
  - type: text
    content: 'according to all that thou desiredst of the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God in Horeb in the day of the assembly, saying, Let me not hear again the voice of the '
  - type: text
    content: LORD
  - type: text
    content: ' my God, neither let me see this great fire any more, that I die not. '
  '17':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto me, They have well '
  - type: text
    content: spoken that
  - type: text
    content: ' which they have spoken. '
  '18':
  - type: text
    content: 'I will raise them up a Prophet from among their brethren, like unto thee, and will put my words in his mouth; and he shall speak unto them all that I shall command him. '
  '19':
  - type: text
    content: 'And it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ' whosoever will not hearken unto my words which he shall speak in my name, I will require '
  - type: text
    content: it
  - type: text
    content: ' of him.'
  '2':
  - type: text
    content: 'Therefore shall they have no inheritance among their brethren: the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' their inheritance, as he hath said unto them. '
  '20':
  - type: text
    content: 'But the prophet, which shall presume to speak a word in my name, which I have not commanded him to speak, or that shall speak in the name of other gods, even that prophet shall die. '
  '21':
  - type: text
    content: 'And if thou say in thine heart, How shall we know the word which the '
  - type: text
    content: LORD
  - type: text
    content: ' hath not spoken? '
  '22':
  - type: text
    content: 'When a prophet speaketh in the name of the '
  - type: text
    content: LORD
  - type: text
    content: ', if the thing follow not, nor come to pass, that '
  - type: text
    content: is
  - type: text
    content: ' the thing which the '
  - type: text
    content: LORD
  - type: text
    content: ' hath not spoken, '
  - type: text
    content: but
  - type: text
    content: ' the prophet hath spoken it presumptuously: thou shalt not be afraid of him.'
  '3':
  - type: text
    content: 'And this shall be the priest''s due from the people, from them that offer a sacrifice, whether '
  - type: text
    content: it be
  - type: text
    content: ' ox or sheep; and they shall give unto the priest the shoulder, and the two cheeks, and the maw. '
  '4':
  - type: text
    content: 'The firstfruit '
  - type: text
    content: also
  - type: text
    content: ' of thy corn, of thy wine, and of thine oil, and the first of the fleece of thy sheep, shalt thou give him. '
  '5':
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God hath chosen him out of all thy tribes, to stand to minister in the name of the '
  - type: text
    content: LORD
  - type: text
    content: ', him and his sons for ever.'
  '6':
  - type: text
    content: 'And if a Levite come from any of thy gates out of all Israel, where he sojourned, and come with all the desire of his mind unto the place which the '
  - type: text
    content: LORD
  - type: text
    content: ' shall choose; '
  '7':
  - type: text
    content: 'then he shall minister in the name of the '
  - type: text
    content: LORD
  - type: text
    content: ' his God, as all his brethren the Levites '
  - type: text
    content: do
  - type: text
    content: ', which stand there before the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '8':
  - type: text
    content: They shall have like portions to eat, beside that which cometh of the sale of his patrimony.
  '9':
  - type: text
    content: 'When thou art come into the land which the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God giveth thee, thou shalt not learn to do after the abominations of those nations. '
