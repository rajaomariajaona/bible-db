document_id: DEU.18,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The priests the Levites, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' all the tribe of Levi, shall have no part nor inheritance with Israel: they shall eat the offerings of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' made by fire, and his inheritance. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There shall not be found among you '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any one
    - type: text
      text: ' that maketh his son or his daughter to pass through the fire, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: or
    - type: text
      text: ' that useth divination, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: or
    - type: text
      text: ' an observer of times, or an enchanter, or a witch, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'or a charmer, or a consulter with familiar spirits, or a wizard, or a necromancer. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For all that do these things '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' an abomination unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': and because of these abominations the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God doth drive them out from before thee. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt be perfect with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For these nations, which thou shalt possess, hearkened unto observers of times, and unto diviners: but as for thee, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God hath not suffered thee so '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to do
    - type: text
      text: .
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God will raise up unto thee a Prophet from the midst of thee, of thy brethren, like unto me; unto him ye shall hearken; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'according to all that thou desiredst of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God in Horeb in the day of the assembly, saying, Let me not hear again the voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' my God, neither let me see this great fire any more, that I die not. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto me, They have well '
    - type: usfm
      marker: add
      children:
      - type: text
        text: spoken that
    - type: text
      text: ' which they have spoken. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will raise them up a Prophet from among their brethren, like unto thee, and will put my words in his mouth; and he shall speak unto them all that I shall command him. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' whosoever will not hearken unto my words which he shall speak in my name, I will require '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' of him.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore shall they have no inheritance among their brethren: the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' their inheritance, as he hath said unto them. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the prophet, which shall presume to speak a word in my name, which I have not commanded him to speak, or that shall speak in the name of other gods, even that prophet shall die. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if thou say in thine heart, How shall we know the word which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath not spoken? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When a prophet speaketh in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', if the thing follow not, nor come to pass, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the thing which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath not spoken, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' the prophet hath spoken it presumptuously: thou shalt not be afraid of him.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And this shall be the priest''s due from the people, from them that offer a sacrifice, whether '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it be
    - type: text
      text: ' ox or sheep; and they shall give unto the priest the shoulder, and the two cheeks, and the maw. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The firstfruit '
    - type: usfm
      marker: add
      children:
      - type: text
        text: also
    - type: text
      text: ' of thy corn, of thy wine, and of thine oil, and the first of the fleece of thy sheep, shalt thou give him. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God hath chosen him out of all thy tribes, to stand to minister in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', him and his sons for ever.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if a Levite come from any of thy gates out of all Israel, where he sojourned, and come with all the desire of his mind unto the place which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall choose; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then he shall minister in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' his God, as all his brethren the Levites '
    - type: usfm
      marker: add
      children:
      - type: text
        text: do
    - type: text
      text: ', which stand there before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They shall have like portions to eat, beside that which cometh of the sale of his patrimony.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When thou art come into the land which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God giveth thee, thou shalt not learn to do after the abominations of those nations. '
