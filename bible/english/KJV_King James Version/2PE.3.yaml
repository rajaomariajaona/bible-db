document_id: 2PE.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This second epistle, beloved, I now write unto you; in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: both
    - type: text
      text: ' which I stir up your pure minds by way of remembrance: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the day of the Lord will come as a thief in the night; in the which the heavens shall pass away with a great noise, and the elements shall melt with fervent heat, the earth also and the works that are therein shall be burned up. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Seeing
    - type: text
      text: ' then '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' all these things shall be dissolved, what manner '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of persons
    - type: text
      text: ' ought ye to be in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: all
    - type: text
      text: ' holy conversation and godliness, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'looking for and hasting unto the coming of the day of God, wherein the heavens being on fire shall be dissolved, and the elements shall melt with fervent heat? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nevertheless we, according to his promise, look for new heavens and a new earth, wherein dwelleth righteousness.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wherefore, beloved, seeing that ye look for such things, be diligent that ye may be found of him in peace, without spot, and blameless. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And account '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the longsuffering of our Lord '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' salvation; even as our beloved brother Paul also according to the wisdom given unto him hath written unto you; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'as also in all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' epistles, speaking in them of these things; in which are some things hard to be understood, which they that are unlearned and unstable wrest, as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they do
    - type: text
      text: ' also the other scriptures, unto their own destruction.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ye therefore, beloved, seeing ye know '
    - type: usfm
      marker: add
      children:
      - type: text
        text: these things
    - type: text
      text: ' before, beware lest ye also, being led away with the error of the wicked, fall from your own stedfastness. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But grow in grace, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' the knowledge of our Lord and Saviour Jesus Christ. To him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' glory both now and for ever. Amen.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that ye may be mindful of the words which were spoken before by the holy prophets, and of the commandment of us the apostles of the Lord and Saviour: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'knowing this first, that there shall come in the last days scoffers, walking after their own lusts, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and saying, Where is the promise of his coming? for since the fathers fell asleep, all things continue as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they were
    - type: text
      text: ' from the beginning of the creation. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this they willingly are ignorant of, that by the word of God the heavens were of old, and the earth standing out of the water and in the water: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'whereby the world that then was, being overflowed with water, perished: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but the heavens and the earth, which are now, by the same word are kept in store, reserved unto fire against the day of judgment and perdition of ungodly men.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But, beloved, be not ignorant of this one thing, that one day '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' with the Lord as a thousand years, and a thousand years as one day. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Lord is not slack concerning his promise, as some men count slackness; but is longsuffering to us-ward, not willing that any should perish, but that all should come to repentance. '
