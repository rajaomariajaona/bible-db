document_id: 1SA.6,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was in the country of the Philistines seven months. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And the men did so; and took two milch kine, and tied them to the cart, and shut up their calves at home: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'and they laid the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' upon the cart, and the coffer with the mice of gold and the images of their emerods. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And the kine took the straight way to the way of Beth-shemesh, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' went along the highway, lowing as they went, and turned not aside '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to
    - type: text
      text: ' the right hand or '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to
    - type: text
      text: ' the left; and the lords of the Philistines went after them unto the border of Beth-shemesh. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they of
    - type: text
      text: ' Beth-shemesh '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' reaping their wheat harvest in the valley: and they lifted up their eyes, and saw the ark, and rejoiced to see '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And the cart came into the field of Joshua, a Beth-shemite, and stood there, where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' a great stone: and they clave the wood of the cart, and offered the kine a burnt offering unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And the Levites took down the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and the coffer that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' with it, wherein the jewels of gold '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ', and put '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' on the great stone: and the men of Beth-shemesh offered burnt offerings and sacrificed sacrifices the same day unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And when the five lords of the Philistines had seen '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', they returned to Ekron the same day.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the golden emerods which the Philistines returned '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a trespass offering unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; for Ashdod one, for Gaza one, for Askelon one, for Gath one, for Ekron one; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'and the golden mice, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: according to
    - type: text
      text: ' the number of all the cities of the Philistines '
    - type: usfm
      marker: add
      children:
      - type: text
        text: belonging
    - type: text
      text: ' to the five lords, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: both
    - type: text
      text: ' of fenced cities, and of country villages, even unto the great '
    - type: usfm
      marker: add
      children:
      - type: text
        text: stone of
    - type: text
      text: ' Abel, whereon they set down the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which stone remaineth
    - type: text
      text: ' unto this day in the field of Joshua, the Beth-shemite.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And he smote the men of Beth-shemesh, because they had looked into the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', even he smote of the people fifty thousand and threescore and ten men: and the people lamented, because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had smitten '
    - type: usfm
      marker: add
      children:
      - type: text
        text: many
    - type: text
      text: ' of the people with a great slaughter. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And the Philistines called for the priests and the diviners, saying, What shall we do to the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '? tell us wherewith we shall send it to his place. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And the men of Beth-shemesh said, Who is able to stand before this holy '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God? and to whom shall he go up from us? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And they sent messengers to the inhabitants of Kirjath-jearim, saying, The Philistines have brought again the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; come ye down, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' fetch it up to you.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And they said, If ye send away the ark of the God of Israel, send it not empty; but in any wise return him a trespass offering: then ye shall be healed, and it shall be known to you why his hand is not removed from you. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then said they, What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' the trespass offering which we shall return to him? They answered, Five golden emerods, and five golden mice, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: according to
    - type: text
      text: ' the number of the lords of the Philistines: for one plague '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' on you all, and on your lords. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Wherefore ye shall make images of your emerods, and images of your mice that mar the land; and ye shall give glory unto the God of Israel: peradventure he will lighten his hand from off you, and from off your gods, and from off your land. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Wherefore then do ye harden your hearts, as the Egyptians and Pharaoh hardened their hearts? when he had wrought wonderfully among them, did they not let the people go, and they departed? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Now therefore make a new cart, and take two milch kine, on which there hath come no yoke, and tie the kine to the cart, and bring their calves home from them: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'and take the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and lay it upon the cart; and put the jewels of gold, which ye return him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a trespass offering, in a coffer by the side thereof; and send it away, that it may go. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And see, if it goeth up by the way of his own coast to Beth-shemesh, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: then
    - type: text
      text: ' he hath done us this great evil: but if not, then we shall know that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' not his hand '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' smote us: it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' a chance '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' happened to us.'
