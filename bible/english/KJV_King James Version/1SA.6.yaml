  '1':
  - type: text
    content: 'And the ark of the '
  - type: text
    content: LORD
  - type: text
    content: ' was in the country of the Philistines seven months. '
  '10':
  - type: text
    content: 'And the men did so; and took two milch kine, and tied them to the cart, and shut up their calves at home: '
  '11':
  - type: text
    content: 'and they laid the ark of the '
  - type: text
    content: LORD
  - type: text
    content: ' upon the cart, and the coffer with the mice of gold and the images of their emerods. '
  '12':
  - type: text
    content: 'And the kine took the straight way to the way of Beth-shemesh, '
  - type: text
    content: and
  - type: text
    content: ' went along the highway, lowing as they went, and turned not aside '
  - type: text
    content: to
  - type: text
    content: ' the right hand or '
  - type: text
    content: to
  - type: text
    content: ' the left; and the lords of the Philistines went after them unto the border of Beth-shemesh. '
  '13':
  - type: text
    content: 'And '
  - type: text
    content: they of
  - type: text
    content: ' Beth-shemesh '
  - type: text
    content: were
  - type: text
    content: ' reaping their wheat harvest in the valley: and they lifted up their eyes, and saw the ark, and rejoiced to see '
  - type: text
    content: it
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'And the cart came into the field of Joshua, a Beth-shemite, and stood there, where '
  - type: text
    content: there was
  - type: text
    content: ' a great stone: and they clave the wood of the cart, and offered the kine a burnt offering unto the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'And the Levites took down the ark of the '
  - type: text
    content: LORD
  - type: text
    content: ', and the coffer that '
  - type: text
    content: was
  - type: text
    content: ' with it, wherein the jewels of gold '
  - type: text
    content: were
  - type: text
    content: ', and put '
  - type: text
    content: them
  - type: text
    content: ' on the great stone: and the men of Beth-shemesh offered burnt offerings and sacrificed sacrifices the same day unto the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'And when the five lords of the Philistines had seen '
  - type: text
    content: it
  - type: text
    content: ', they returned to Ekron the same day.'
  '17':
  - type: text
    content: 'And these '
  - type: text
    content: are
  - type: text
    content: ' the golden emerods which the Philistines returned '
  - type: text
    content: for
  - type: text
    content: ' a trespass offering unto the '
  - type: text
    content: LORD
  - type: text
    content: '; for Ashdod one, for Gaza one, for Askelon one, for Gath one, for Ekron one; '
  '18':
  - type: text
    content: 'and the golden mice, '
  - type: text
    content: according to
  - type: text
    content: ' the number of all the cities of the Philistines '
  - type: text
    content: belonging
  - type: text
    content: ' to the five lords, '
  - type: text
    content: both
  - type: text
    content: ' of fenced cities, and of country villages, even unto the great '
  - type: text
    content: stone of
  - type: text
    content: ' Abel, whereon they set down the ark of the '
  - type: text
    content: LORD
  - type: text
    content: ': '
  - type: text
    content: which stone remaineth
  - type: text
    content: ' unto this day in the field of Joshua, the Beth-shemite.'
  '19':
  - type: text
    content: 'And he smote the men of Beth-shemesh, because they had looked into the ark of the '
  - type: text
    content: LORD
  - type: text
    content: ', even he smote of the people fifty thousand and threescore and ten men: and the people lamented, because the '
  - type: text
    content: LORD
  - type: text
    content: ' had smitten '
  - type: text
    content: many
  - type: text
    content: ' of the people with a great slaughter. '
  '2':
  - type: text
    content: 'And the Philistines called for the priests and the diviners, saying, What shall we do to the ark of the '
  - type: text
    content: LORD
  - type: text
    content: '? tell us wherewith we shall send it to his place. '
  '20':
  - type: text
    content: 'And the men of Beth-shemesh said, Who is able to stand before this holy '
  - type: text
    content: LORD
  - type: text
    content: ' God? and to whom shall he go up from us? '
  '21':
  - type: text
    content: 'And they sent messengers to the inhabitants of Kirjath-jearim, saying, The Philistines have brought again the ark of the '
  - type: text
    content: LORD
  - type: text
    content: '; come ye down, '
  - type: text
    content: and
  - type: text
    content: ' fetch it up to you.'
  '3':
  - type: text
    content: 'And they said, If ye send away the ark of the God of Israel, send it not empty; but in any wise return him a trespass offering: then ye shall be healed, and it shall be known to you why his hand is not removed from you. '
  '4':
  - type: text
    content: 'Then said they, What '
  - type: text
    content: shall be
  - type: text
    content: ' the trespass offering which we shall return to him? They answered, Five golden emerods, and five golden mice, '
  - type: text
    content: according to
  - type: text
    content: ' the number of the lords of the Philistines: for one plague '
  - type: text
    content: was
  - type: text
    content: ' on you all, and on your lords. '
  '5':
  - type: text
    content: 'Wherefore ye shall make images of your emerods, and images of your mice that mar the land; and ye shall give glory unto the God of Israel: peradventure he will lighten his hand from off you, and from off your gods, and from off your land. '
  '6':
  - type: text
    content: 'Wherefore then do ye harden your hearts, as the Egyptians and Pharaoh hardened their hearts? when he had wrought wonderfully among them, did they not let the people go, and they departed? '
  '7':
  - type: text
    content: 'Now therefore make a new cart, and take two milch kine, on which there hath come no yoke, and tie the kine to the cart, and bring their calves home from them: '
  '8':
  - type: text
    content: 'and take the ark of the '
  - type: text
    content: LORD
  - type: text
    content: ', and lay it upon the cart; and put the jewels of gold, which ye return him '
  - type: text
    content: for
  - type: text
    content: ' a trespass offering, in a coffer by the side thereof; and send it away, that it may go. '
  '9':
  - type: text
    content: 'And see, if it goeth up by the way of his own coast to Beth-shemesh, '
  - type: text
    content: then
  - type: text
    content: ' he hath done us this great evil: but if not, then we shall know that '
  - type: text
    content: it is
  - type: text
    content: ' not his hand '
  - type: text
    content: that
  - type: text
    content: ' smote us: it '
  - type: text
    content: was
  - type: text
    content: ' a chance '
  - type: text
    content: that
  - type: text
    content: ' happened to us.'
