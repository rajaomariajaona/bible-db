document_id: JDG.10,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Minor Judges
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And after Abimelech there arose to defend Israel Tola the son of Puah, the son of Dodo, a man of Issachar; and he dwelt in Shamir in mount Ephraim. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Israel cried unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', saying, We have sinned against thee, both because we have forsaken our God, and also served Baalim. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto the children of Israel, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Did
    - type: text
      text: ' not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: I deliver you
    - type: text
      text: ' from the Egyptians, and from the Amorites, from the children of Ammon, and from the Philistines? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Zidonians also, and the Amalekites, and the Maonites, did oppress you; and ye cried to me, and I delivered you out of their hand. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet ye have forsaken me, and served other gods: wherefore I will deliver you no more. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Go and cry unto the gods which ye have chosen; let them deliver you in the time of your tribulation. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Israel said unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', We have sinned: do thou unto us whatsoever seemeth good unto thee; deliver us only, we pray thee, this day. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they put away the strange gods from among them, and served the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': and his soul was grieved for the misery of Israel.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Ammonites
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the children of Ammon were gathered together, and encamped in Gilead. And the children of Israel assembled themselves together, and encamped in Mizpeh. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' princes of Gilead said one to another, What man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is he
    - type: text
      text: ' that will begin to fight against the children of Ammon? he shall be head over all the inhabitants of Gilead.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he judged Israel twenty and three years, and died, and was buried in Shamir.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And after him arose Jair, a Gileadite, and judged Israel twenty and two years. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he had thirty sons that rode on thirty ass colts, and they had thirty cities, which are called Havoth-jair unto this day, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in the land of Gilead. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Jair died, and was buried in Camon.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Serving other Gods
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Israel did evil again in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and served Baalim, and Ashtaroth, and the gods of Syria, and the gods of Zidon, and the gods of Moab, and the gods of the children of Ammon, and the gods of the Philistines, and forsook the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and served not him. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was hot against Israel, and he sold them into the hands of the Philistines, and into the hands of the children of Ammon. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And that year they vexed and oppressed the children of Israel: eighteen years, all the children of Israel that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' on the other side Jordan in the land of the Amorites, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in Gilead. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moreover the children of Ammon passed over Jordan to fight also against Judah, and against Benjamin, and against the house of Ephraim; so that Israel was sore distressed.
