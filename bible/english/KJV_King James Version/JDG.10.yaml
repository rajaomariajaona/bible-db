document_id: JDG.10,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Minor Judges
  - type: text
    content: 'And after Abimelech there arose to defend Israel Tola the son of Puah, the son of Dodo, a man of Issachar; and he dwelt in Shamir in mount Ephraim. '
  '10':
  - type: text
    content: 'And the children of Israel cried unto the '
  - type: text
    content: LORD
  - type: text
    content: ', saying, We have sinned against thee, both because we have forsaken our God, and also served Baalim. '
  '11':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto the children of Israel, '
  - type: text
    content: Did
  - type: text
    content: ' not '
  - type: text
    content: I deliver you
  - type: text
    content: ' from the Egyptians, and from the Amorites, from the children of Ammon, and from the Philistines? '
  '12':
  - type: text
    content: 'The Zidonians also, and the Amalekites, and the Maonites, did oppress you; and ye cried to me, and I delivered you out of their hand. '
  '13':
  - type: text
    content: 'Yet ye have forsaken me, and served other gods: wherefore I will deliver you no more. '
  '14':
  - type: text
    content: 'Go and cry unto the gods which ye have chosen; let them deliver you in the time of your tribulation. '
  '15':
  - type: text
    content: 'And the children of Israel said unto the '
  - type: text
    content: LORD
  - type: text
    content: ', We have sinned: do thou unto us whatsoever seemeth good unto thee; deliver us only, we pray thee, this day. '
  '16':
  - type: text
    content: 'And they put away the strange gods from among them, and served the '
  - type: text
    content: LORD
  - type: text
    content: ': and his soul was grieved for the misery of Israel.'
  - type: heading
    content: The Ammonites
  '17':
  - type: text
    content: 'Then the children of Ammon were gathered together, and encamped in Gilead. And the children of Israel assembled themselves together, and encamped in Mizpeh. '
  '18':
  - type: text
    content: 'And the people '
  - type: text
    content: and
  - type: text
    content: ' princes of Gilead said one to another, What man '
  - type: text
    content: is he
  - type: text
    content: ' that will begin to fight against the children of Ammon? he shall be head over all the inhabitants of Gilead.'
  '2':
  - type: text
    content: And he judged Israel twenty and three years, and died, and was buried in Shamir.
  '3':
  - type: text
    content: 'And after him arose Jair, a Gileadite, and judged Israel twenty and two years. '
  '4':
  - type: text
    content: 'And he had thirty sons that rode on thirty ass colts, and they had thirty cities, which are called Havoth-jair unto this day, which '
  - type: text
    content: are
  - type: text
    content: ' in the land of Gilead. '
  '5':
  - type: text
    content: And Jair died, and was buried in Camon.
  - type: heading
    content: Serving other Gods
  '6':
  - type: text
    content: 'And the children of Israel did evil again in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', and served Baalim, and Ashtaroth, and the gods of Syria, and the gods of Zidon, and the gods of Moab, and the gods of the children of Ammon, and the gods of the Philistines, and forsook the '
  - type: text
    content: LORD
  - type: text
    content: ', and served not him. '
  '7':
  - type: text
    content: 'And the anger of the '
  - type: text
    content: LORD
  - type: text
    content: ' was hot against Israel, and he sold them into the hands of the Philistines, and into the hands of the children of Ammon. '
  '8':
  - type: text
    content: 'And that year they vexed and oppressed the children of Israel: eighteen years, all the children of Israel that '
  - type: text
    content: were
  - type: text
    content: ' on the other side Jordan in the land of the Amorites, which '
  - type: text
    content: is
  - type: text
    content: ' in Gilead. '
  '9':
  - type: text
    content: Moreover the children of Ammon passed over Jordan to fight also against Judah, and against Benjamin, and against the house of Ephraim; so that Israel was sore distressed.
