document_id: 2SA.23
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: David's Last Words
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' the last words of David.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: David the son of Jesse said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: who was
  - type: text
    text: ' raised up on high,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The anointed of the God of Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the sweet psalmist of Israel, said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The Spirit of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake by me,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And his word '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in my tongue.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The God of Israel said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Rock of Israel spake to me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He that ruleth over men '
  - type: usfm
    marker: add
    children:
    - type: text
      text: must be
  - type: text
    text: ' just,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ruling in the fear of God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he shall be
  - type: text
    text: ' as the light of the morning, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: when
  - type: text
    text: ' the sun riseth,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Even
  - type: text
    text: ' a morning without clouds;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' the tender grass '
  - type: usfm
    marker: add
    children:
    - type: text
      text: springing
  - type: text
    text: ' out of the earth'
- type: usfm
  marker: q1
  children:
  - type: text
    text: By clear shining after rain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Although my house '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' not so with God;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet he hath made with me an everlasting covenant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ordered in all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ', and sure:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this is
  - type: text
    text: ' all my salvation, and all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my
  - type: text
    text: ' desire,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Although he make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' not to grow.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the sons
  - type: text
    text: ' of Belial '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' all of them as thorns thrust away,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Because they cannot be taken with hands:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But the man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' shall touch them'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Must be fenced with iron and the staff of a spear;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And they shall be utterly burned with fire in the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: same
  - type: text
    text: ' place.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: His Mighty Men
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' the names of the mighty men whom David had: the Tachmonite that sat in the seat, chief among the captains; the same '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Adino the Eznite: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he lift up his spear
  - type: text
    text: ' against eight hundred, whom he slew at one time.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And after him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Eleazar the son of Dodo the Ahohite, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' of the three mighty men with David, when they defied the Philistines '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' were there gathered together to battle, and the men of Israel were gone away: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'he arose, and smote the Philistines until his hand was weary, and his hand clave unto the sword: and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' wrought a great victory that day; and the people returned after him only to spoil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And after him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Shammah the son of Agee the Hararite. And the Philistines were gathered together into a troop, where was a piece of ground full of lentiles: and the people fled from the Philistines. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But he stood in the midst of the ground, and defended it, and slew the Philistines: and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' wrought a great victory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And three of the thirty chief went down, and came to David in the harvest time unto the cave of Adullam: and the troop of the Philistines pitched in the valley of Rephaim. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And David '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' then in an hold, and the garrison of the Philistines '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' then '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' Beth-lehem. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And David longed, and said, Oh that one would give me drink of the water of the well of Beth-lehem, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' by the gate! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the three mighty men brake through the host of the Philistines, and drew water out of the well of Beth-lehem, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' by the gate, and took '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and brought '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to David: nevertheless he would not drink thereof, but poured it out unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And he said, Be it far from me, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that I should do this: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is not this
  - type: text
    text: ' the blood of the men that went in jeopardy of their lives? therefore he would not drink it. These things did these three mighty men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And Abishai, the brother of Joab, the son of Zeruiah, was chief among three. And he lifted up his spear against three hundred, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' slew '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ', and had the name among three. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Was he not most honourable of three? therefore he was their captain: howbeit he attained not unto the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: first
  - type: text
    text: ' three. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Benaiah the son of Jehoiada, the son of a valiant man, of Kabzeel, who had done many acts, he slew two lionlike men of Moab: he went down also and slew a lion in the midst of a pit in time of snow: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'and he slew an Egyptian, a goodly man: and the Egyptian had a spear in his hand; but he went down to him with a staff, and plucked the spear out of the Egyptian''s hand, and slew him with his own spear. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' did Benaiah the son of Jehoiada, and had the name among three mighty men. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'He was more honourable than the thirty, but he attained not to the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: first
  - type: text
    text: ' three. And David set him over his guard.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Asahel the brother of Joab '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' one of the thirty; Elhanan the son of Dodo of Beth-lehem, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Shammah the Harodite, Elika the Harodite, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Helez the Paltite, Ira the son of Ikkesh the Tekoite, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Abiezer the Anethothite, Mebunnai the Hushathite, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Zalmon the Ahohite, Maharai the Netophathite, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Heleb the son of Baanah, a Netophathite, Ittai the son of Ribai out of Gibeah of the children of Benjamin, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Benaiah the Pirathonite, Hiddai of the brooks of Gaash, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Abi-albon the Arbathite, Azmaveth the Barhumite, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Eliahba the Shaalbonite, of the sons of Jashen, Jonathan, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Shammah the Hararite, Ahiam the son of Sharar the Hararite, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Eliphelet the son of Ahasbai, the son of the Maachathite, Eliam the son of Ahithophel the Gilonite, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Hezrai the Carmelite, Paarai the Arbite, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Igal the son of Nathan of Zobah, Bani the Gadite, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Zelek the Ammonite, Nahari the Beerothite, armourbearer to Joab the son of Zeruiah, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ira an Ithrite, Gareb an Ithrite, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Uriah the Hittite: thirty and seven in all.'
