document_id: 1SA.8
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Demand for a King
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And it came to pass, when Samuel was old, that he made his sons judges over Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Now the name of his firstborn was Joel; and the name of his second, Abiah: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they were
  - type: text
    text: ' judges in Beer-sheba. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: And his sons walked not in his ways, but turned aside after lucre, and took bribes, and perverted judgment.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then all the elders of Israel gathered themselves together, and came to Samuel unto Ramah, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and said unto him, Behold, thou art old, and thy sons walk not in thy ways: now make us a king to judge us like all the nations. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But the thing displeased Samuel, when they said, Give us a king to judge us. And Samuel prayed unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Samuel, Hearken unto the voice of the people in all that they say unto thee: for they have not rejected thee, but they have rejected me, that I should not reign over them. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'According to all the works which they have done since the day that I brought them up out of Egypt even unto this day, wherewith they have forsaken me, and served other gods, so do they also unto thee. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now therefore hearken unto their voice: howbeit yet protest solemnly unto them, and shew them the manner of the king that shall reign over them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Samuel told all the words of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' unto the people that asked of him a king. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And he said, This will be the manner of the king that shall reign over you: He will take your sons, and appoint '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' for himself, for his chariots, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' his horsemen; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' shall run before his chariots. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And he will appoint him captains over thousands, and captains over fifties; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: will set them
  - type: text
    text: ' to ear his ground, and to reap his harvest, and to make his instruments of war, and instruments of his chariots. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And he will take your daughters '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' confectionaries, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' cooks, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' bakers. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And he will take your fields, and your vineyards, and your oliveyards, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the best '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of them
  - type: text
    text: ', and give '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' to his servants. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And he will take the tenth of your seed, and of your vineyards, and give to his officers, and to his servants. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And he will take your menservants, and your maidservants, and your goodliest young men, and your asses, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' to his work. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He will take the tenth of your sheep: and ye shall be his servants. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And ye shall cry out in that day because of your king which ye shall have chosen you; and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will not hear you in that day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nevertheless the people refused to obey the voice of Samuel; and they said, Nay; but we will have a king over us; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'that we also may be like all the nations; and that our king may judge us, and go out before us, and fight our battles. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And Samuel heard all the words of the people, and he rehearsed them in the ears of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said to Samuel, Hearken unto their voice, and make them a king. And Samuel said unto the men of Israel, Go ye every man unto his city.'
