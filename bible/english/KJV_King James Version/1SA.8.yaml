verses:
  '1':
  - type: heading
    content: Demand for a King
  - type: text
    content: 'And it came to pass, when Samuel was old, that he made his sons judges over Israel. '
  '10':
  - type: text
    content: 'And Samuel told all the words of the '
  - type: text
    content: LORD
  - type: text
    content: ' unto the people that asked of him a king. '
  '11':
  - type: text
    content: 'And he said, This will be the manner of the king that shall reign over you: He will take your sons, and appoint '
  - type: text
    content: them
  - type: text
    content: ' for himself, for his chariots, and '
  - type: text
    content: to be
  - type: text
    content: ' his horsemen; and '
  - type: text
    content: some
  - type: text
    content: ' shall run before his chariots. '
  '12':
  - type: text
    content: 'And he will appoint him captains over thousands, and captains over fifties; and '
  - type: text
    content: will set them
  - type: text
    content: ' to ear his ground, and to reap his harvest, and to make his instruments of war, and instruments of his chariots. '
  '13':
  - type: text
    content: 'And he will take your daughters '
  - type: text
    content: to be
  - type: text
    content: ' confectionaries, and '
  - type: text
    content: to be
  - type: text
    content: ' cooks, and '
  - type: text
    content: to be
  - type: text
    content: ' bakers. '
  '14':
  - type: text
    content: 'And he will take your fields, and your vineyards, and your oliveyards, '
  - type: text
    content: even
  - type: text
    content: ' the best '
  - type: text
    content: of them
  - type: text
    content: ', and give '
  - type: text
    content: them
  - type: text
    content: ' to his servants. '
  '15':
  - type: text
    content: 'And he will take the tenth of your seed, and of your vineyards, and give to his officers, and to his servants. '
  '16':
  - type: text
    content: 'And he will take your menservants, and your maidservants, and your goodliest young men, and your asses, and put '
  - type: text
    content: them
  - type: text
    content: ' to his work. '
  '17':
  - type: text
    content: 'He will take the tenth of your sheep: and ye shall be his servants. '
  '18':
  - type: text
    content: 'And ye shall cry out in that day because of your king which ye shall have chosen you; and the '
  - type: text
    content: LORD
  - type: text
    content: ' will not hear you in that day.'
  '19':
  - type: text
    content: 'Nevertheless the people refused to obey the voice of Samuel; and they said, Nay; but we will have a king over us; '
  '2':
  - type: text
    content: 'Now the name of his firstborn was Joel; and the name of his second, Abiah: '
  - type: text
    content: they were
  - type: text
    content: ' judges in Beer-sheba. '
  '20':
  - type: text
    content: 'that we also may be like all the nations; and that our king may judge us, and go out before us, and fight our battles. '
  '21':
  - type: text
    content: 'And Samuel heard all the words of the people, and he rehearsed them in the ears of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said to Samuel, Hearken unto their voice, and make them a king. And Samuel said unto the men of Israel, Go ye every man unto his city.'
  '3':
  - type: text
    content: And his sons walked not in his ways, but turned aside after lucre, and took bribes, and perverted judgment.
  '4':
  - type: text
    content: 'Then all the elders of Israel gathered themselves together, and came to Samuel unto Ramah, '
  '5':
  - type: text
    content: 'and said unto him, Behold, thou art old, and thy sons walk not in thy ways: now make us a king to judge us like all the nations. '
  '6':
  - type: text
    content: 'But the thing displeased Samuel, when they said, Give us a king to judge us. And Samuel prayed unto the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Samuel, Hearken unto the voice of the people in all that they say unto thee: for they have not rejected thee, but they have rejected me, that I should not reign over them. '
  '8':
  - type: text
    content: 'According to all the works which they have done since the day that I brought them up out of Egypt even unto this day, wherewith they have forsaken me, and served other gods, so do they also unto thee. '
  '9':
  - type: text
    content: 'Now therefore hearken unto their voice: howbeit yet protest solemnly unto them, and shew them the manner of the king that shall reign over them.'
