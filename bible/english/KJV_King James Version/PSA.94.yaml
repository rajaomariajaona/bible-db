  - type: text
    content: Neither will he forsake his inheritance.
  '15':
  - type: text
    content: 'But judgment shall return unto righteousness:'
  - type: text
    content: And all the upright in heart shall follow it.
  '16':
  - type: text
    content: Who will rise up for me against the evildoers?
  - type: text
    content: Or
  - type: text
