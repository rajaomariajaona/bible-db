document_id: PSA.94,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God, to whom vengeance belongeth;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O God, to whom vengeance belongeth, shew thyself.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He that chastiseth the heathen, shall not he correct?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He that teacheth man knowledge, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall not he know?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' knoweth the thoughts of man,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' vanity.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the man whom thou chastenest, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And teachest him out of thy law;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That thou mayest give him rest from the days of adversity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Until the pit be digged for the wicked.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will not cast off his people,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Neither will he forsake his inheritance.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But judgment shall return unto righteousness:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the upright in heart shall follow it.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who will rise up for me against the evildoers?
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Or
    - type: text
      text: ' who will stand up for me against the workers of iniquity?'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Unless the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: had been
    - type: text
      text: ' my help,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My soul had almost dwelt in silence.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I said, My foot slippeth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Thy mercy, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', held me up.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the multitude of my thoughts within me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thy comforts delight my soul.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lift up thyself, thou judge of the earth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Render a reward to the proud.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shall the throne of iniquity have fellowship with thee,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Which frameth mischief by a law?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They gather themselves together against the soul of the righteous,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And condemn the innocent blood.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' is my defence;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And my God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the rock of my refuge.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he shall bring upon them their own iniquity, and shall cut them off in their own wickedness;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Yea
    - type: text
      text: ', the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God shall cut them off.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', how long shall the wicked,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long shall the wicked triumph?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: How long
    - type: text
      text: ' shall they utter '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' speak hard things?'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' all the workers of iniquity boast themselves?'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They break in pieces thy people, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And afflict thine heritage.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They slay the widow and the stranger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And murder the fatherless.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yet they say, The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall not see,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Neither shall the God of Jacob regard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Understand, ye brutish among the people:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ye
    - type: text
      text: ' fools, when will ye be wise?'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He that planted the ear, shall he not hear?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He that formed the eye, shall he not see?
