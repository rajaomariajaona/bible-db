    content: When I said, My foot slippeth;
  - type: text
    content: 'Thy mercy, O '
  - type: text
    content: LORD
  - type: text
    content: ', held me up.'
  '19':
  - type: text
    content: In the multitude of my thoughts within me
  - type: text
