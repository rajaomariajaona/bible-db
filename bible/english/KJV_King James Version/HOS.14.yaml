document_id: HOS.14,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Return, O Israel!
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'O Israel, return unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God; for thou hast fallen by thine iniquity. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Take with you words, and turn to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': say unto him, Take away all iniquity, and receive '
    - type: usfm
      marker: add
      children:
      - type: text
        text: us
    - type: text
      text: ' graciously: so will we render the calves of our lips. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Asshur shall not save us; we will not ride upon horses: neither will we say any more to the work of our hands, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Ye are
    - type: text
      text: ' our gods: for in thee the fatherless findeth mercy.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I will heal their backsliding, I will love them freely: for mine anger is turned away from him. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'I will be as the dew unto Israel: he shall grow as the lily, and cast forth his roots as Lebanon. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'His branches shall spread, and his beauty shall be as the olive tree, and his smell as Lebanon. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'They that dwell under his shadow shall return; they shall revive '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' the corn, and grow as the vine: the scent thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' as the wine of Lebanon. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ephraim '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall say
    - type: text
      text: ', What have I to do any more with idols? I have heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', and observed him: I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' like a green fir tree. From me is thy fruit found.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' wise, and he shall understand these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things?
    - type: text
      text: ' prudent, and he shall know them? for the ways of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' right, and the just shall walk in them: but the transgressors shall fall therein.'
