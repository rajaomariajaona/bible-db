  '1':
  - type: heading
    content: Return, O Israel!
  - type: text
    content: 'O Israel, return unto the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God; for thou hast fallen by thine iniquity. '
  '2':
  - type: text
    content: 'Take with you words, and turn to the '
  - type: text
    content: LORD
  - type: text
    content: ': say unto him, Take away all iniquity, and receive '
  - type: text
    content: us
  - type: text
    content: ' graciously: so will we render the calves of our lips. '
  '3':
  - type: text
    content: 'Asshur shall not save us; we will not ride upon horses: neither will we say any more to the work of our hands, '
  - type: text
    content: Ye are
  - type: text
    content: ' our gods: for in thee the fatherless findeth mercy.'
  '4':
  - type: text
    content: 'I will heal their backsliding, I will love them freely: for mine anger is turned away from him. '
  '5':
  - type: text
    content: 'I will be as the dew unto Israel: he shall grow as the lily, and cast forth his roots as Lebanon. '
  '6':
  - type: text
    content: 'His branches shall spread, and his beauty shall be as the olive tree, and his smell as Lebanon. '
  '7':
  - type: text
    content: 'They that dwell under his shadow shall return; they shall revive '
  - type: text
    content: as
  - type: text
    content: ' the corn, and grow as the vine: the scent thereof '
  - type: text
    content: shall be
  - type: text
    content: ' as the wine of Lebanon. '
  '8':
  - type: text
    content: 'Ephraim '
  - type: text
    content: shall say
  - type: text
    content: ', What have I to do any more with idols? I have heard '
  - type: text
    content: him
  - type: text
    content: ', and observed him: I '
  - type: text
    content: am
  - type: text
    content: ' like a green fir tree. From me is thy fruit found.'
  '9':
  - type: text
    content: 'Who '
  - type: text
    content: is
  - type: text
    content: ' wise, and he shall understand these '
  - type: text
    content: things?
  - type: text
    content: ' prudent, and he shall know them? for the ways of the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' right, and the just shall walk in them: but the transgressors shall fall therein.'
