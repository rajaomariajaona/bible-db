document_id: PSA.93,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' reigneth, he is clothed with majesty;'
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' is clothed with strength, '
  - type: text
    content: wherewith
  - type: text
    content: ' he hath girded himself:'
  - type: text
    content: The world also is stablished,
  - type: text
    content: That it cannot be moved.
  '2':
  - type: text
    content: 'Thy throne '
  - type: text
    content: is
  - type: text
    content: ' established of old:'
  - type: text
    content: 'Thou '
  - type: text
    content: art
  - type: text
    content: ' from everlasting.'
  '3':
  - type: text
    content: 'The floods have lifted up, O '
  - type: text
    content: LORD
  - type: text
    content: ', the floods have lifted up their voice;'
  - type: text
    content: The floods lift up their waves.
  '4':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' on high '
  - type: text
    content: is
  - type: text
    content: ' mightier than the noise of many waters,'
  - type: text
    content: Yea, than
  - type: text
    content: ' the mighty waves of the sea.'
  '5':
  - type: text
    content: 'Thy testimonies are very sure:'
  - type: text
    content: 'Holiness becometh thine house, O '
  - type: text
    content: LORD
  - type: text
    content: ', for ever.'
