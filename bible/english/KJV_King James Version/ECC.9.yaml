document_id: ECC.9,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'For all this I considered in my heart even to declare all this, that the righteous, and the wise, and their works, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in the hand of God: no man knoweth either love or hatred '
    - type: usfm
      marker: add
      children:
      - type: text
        text: by
    - type: text
      text: ' all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is
    - type: text
      text: ' before them.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Whatsoever thy hand findeth to do, do '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' with thy might; for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no work, nor device, nor knowledge, nor wisdom, in the grave, whither thou goest.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'I returned, and saw under the sun, that the race '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not to the swift, nor the battle to the strong, neither yet bread to the wise, nor yet riches to men of understanding, nor yet favour to men of skill; but time and chance happeneth to them all. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'For man also knoweth not his time: as the fishes that are taken in an evil net, and as the birds that are caught in the snare; so '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the sons of men snared in an evil time, when it falleth suddenly upon them.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'This wisdom have I seen also under the sun, and it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: seemed
    - type: text
      text: ' great unto me: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' a little city, and few men within it; and there came a great king against it, and besieged it, and built great bulwarks against it: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'now there was found in it a poor wise man, and he by his wisdom delivered the city; yet no man remembered that same poor man. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then said I, Wisdom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' better than strength: nevertheless the poor man''s wisdom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' despised, and his words are not heard. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The words of wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men are
    - type: text
      text: ' heard in quiet more than the cry of him that ruleth among fools. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Wisdom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' better than weapons of war: but one sinner destroyeth much good.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'All '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things come
    - type: text
      text: ' alike to all: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' one event to the righteous, and to the wicked; to the good and to the clean, and to the unclean; to him that sacrificeth, and to him that sacrificeth not: as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the good, so '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the sinner; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' he that sweareth, as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he
    - type: text
      text: ' that feareth an oath. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' an evil among all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' that are done under the sun, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' one event unto all: yea, also the heart of the sons of men is full of evil, and madness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in their heart while they live, and after that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they go
    - type: text
      text: ' to the dead.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For to him that is joined to all the living there is hope: for a living dog is better than a dead lion. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For the living know that they shall die: but the dead know not any thing, neither have they any more a reward; for the memory of them is forgotten. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Also their love, and their hatred, and their envy, is now perished; neither have they any more a portion for ever in any '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thing
    - type: text
      text: ' that is done under the sun.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Go thy way, eat thy bread with joy, and drink thy wine with a merry heart; for God now accepteth thy works. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Let thy garments be always white; and let thy head lack no ointment. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Live joyfully with the wife whom thou lovest all the days of the life of thy vanity, which he hath given thee under the sun, all the days of thy vanity: for that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy portion in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ' life, and in thy labour which thou takest under the sun. '
