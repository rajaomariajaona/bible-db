  '4':
  - type: text
    content: 'For to him that is joined to all the living there is hope: for a living dog is better than a dead lion. '
  '5':
  - type: text
    content: 'For the living know that they shall die: but the dead know not any thing, neither have they any more a reward; for the memory of them is forgotten. '
  '6':
  - type: text
    content: 'Also their love, and their hatred, and their envy, is now perished; neither have they any more a portion for ever in any '
  - type: text
    content: thing
  - type: text
    content: ' that is done under the sun.'
  '7':
  - type: text
    content: 'Go thy way, eat thy bread with joy, and drink thy wine with a merry heart; for God now accepteth thy works. '
  '8':
  - type: text
    content: 'Let thy garments be always white; and let thy head lack no ointment. '
  '9':
  - type: text
    content: 'Live joyfully with the wife whom thou lovest all the days of the life of thy vanity, which he hath given thee under the sun, all the days of thy vanity: for that '
  - type: text
