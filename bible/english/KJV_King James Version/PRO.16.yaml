      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'By mercy and truth iniquity is purged:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And by the fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
