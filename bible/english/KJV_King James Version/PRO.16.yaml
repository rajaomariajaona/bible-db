- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'An ungodly man diggeth up evil:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And in his lips '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' as a burning fire.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'A froward man soweth strife:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And a whisperer separateth chief friends.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: A violent man enticeth his neighbour,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And leadeth him into the way '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' not good.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'He shutteth his eyes to devise froward things:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Moving his lips he bringeth evil to pass.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'The hoary head '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a crown of glory,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: If
  - type: text
    text: ' it be found in the way of righteousness.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: He that is
  - type: text
    text: ' slow to anger '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' better than the mighty;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And he that ruleth his spirit than he that taketh a city.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
