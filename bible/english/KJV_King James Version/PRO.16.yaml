- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Better '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a little with righteousness'
- type: usfm
  marker: q2
  children:
  - type: text
