document_id: EZK.12,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The March of Exiles
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' also came unto me, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Say thou unto them, Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; This burden '
    - type: usfm
      marker: add
      children:
      - type: text
        text: concerneth
    - type: text
      text: ' the prince in Jerusalem, and all the house of Israel that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' among them. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Say, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' your sign: like as I have done, so shall it be done unto them: they shall remove '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' go into captivity. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And the prince that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' among them shall bear upon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' shoulder in the twilight, and shall go forth: they shall dig through the wall to carry out thereby: he shall cover his face, that he see not the ground with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' eyes. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'My net also will I spread upon him, and he shall be taken in my snare: and I will bring him to Babylon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to
    - type: text
      text: ' the land of the Chaldeans; yet shall he not see it, though he shall die there. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And I will scatter toward every wind all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' about him to help him, and all his bands; and I will draw out the sword after them. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And they shall know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', when I shall scatter them among the nations, and disperse them in the countries. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'But I will leave a few men of them from the sword, from the famine, and from the pestilence; that they may declare all their abominations among the heathen whither they come; and they shall know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Moreover the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came to me, saying, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Son of man, eat thy bread with quaking, and drink thy water with trembling and with carefulness; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'and say unto the people of the land, Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ' of the inhabitants of Jerusalem, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' of the land of Israel; They shall eat their bread with carefulness, and drink their water with astonishment, that her land may be desolate from all that is therein, because of the violence of all them that dwell therein. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Son of man, thou dwellest in the midst of a rebellious house, which have eyes to see, and see not; they have ears to hear, and hear not: for they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' a rebellious house. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And the cities that are inhabited shall be laid waste, and the land shall be desolate; and ye shall know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came unto me, saying, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Son of man, what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' that proverb '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' ye have in the land of Israel, saying, The days are prolonged, and every vision faileth? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Tell them therefore, Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; I will make this proverb to cease, and they shall no more use it as a proverb in Israel; but say unto them, The days are at hand, and the effect of every vision. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'For there shall be no more any vain vision nor flattering divination within the house of Israel. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'For I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': I will speak, and the word that I shall speak shall come to pass; it shall be no more prolonged: for in your days, O rebellious house, will I say the word, and will perform it, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: .
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Again the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came to me, saying, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Son of man, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they of
    - type: text
      text: ' the house of Israel say, The vision that he seeth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' for many days '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to come
    - type: text
      text: ', and he prophesieth of the times '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that are
    - type: text
      text: ' far off. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Therefore say unto them, Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; There shall none of my words be prolonged any more, but the word which I have spoken shall be done, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Therefore, thou son of man, prepare thee stuff for removing, and remove by day in their sight; and thou shalt remove from thy place to another place in their sight: it may be they will consider, though they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' a rebellious house. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then shalt thou bring forth thy stuff by day in their sight, as stuff for removing: and thou shalt go forth at even in their sight, as they that go forth into captivity. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dig thou through the wall in their sight, and carry out thereby. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'In their sight shalt thou bear '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' upon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thy
    - type: text
      text: ' shoulders, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' carry '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' forth in the twilight: thou shalt cover thy face, that thou see not the ground: for I have set thee '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a sign unto the house of Israel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And I did so as I was commanded: I brought forth my stuff by day, as stuff for captivity, and in the even I digged through the wall with mine hand; I brought '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' forth in the twilight, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' I bare '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' upon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: my
    - type: text
      text: ' shoulder in their sight.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And in the morning came the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' unto me, saying, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Son of man, hath not the house of Israel, the rebellious house, said unto thee, What doest thou? '
