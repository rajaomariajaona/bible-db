document_id: MRK.7,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Growing Opposition
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then came together unto him the Pharisees, and certain of the scribes, which came from Jerusalem. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For Moses said, Honour thy father and thy mother; and, Whoso curseth father or mother, let him die the death:'
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'but ye say, If a man shall say to his father or mother, '
      - type: usfm
        marker: add
        children:
        - type: text
          text: It is
      - type: text
        text: ' Corban, that is to say, a gift, by whatsoever thou mightest be profited by me; '
      - type: usfm
        marker: add
        children:
        - type: text
          text: he shall be free
      - type: text
        text: .
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And ye suffer him no more to do ought for his father or his mother;
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'making the word of God of none effect through your tradition, which ye have delivered: and many such like things do ye.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he had called all the people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: unto him
    - type: text
      text: ', he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Hearken unto me every one '
      - type: usfm
        marker: add
        children:
        - type: text
          text: of you
      - type: text
        text: ', and understand:'
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'there is nothing from without a man, that entering into him can defile him: but the things which come out of him, those are they that defile the man.'
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If any man have ears to hear, let him hear.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he was entered into the house from the people, his disciples asked him concerning the parable. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Are ye so without understanding also? Do ye not perceive, that whatsoever thing from without entereth into the man, '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ' cannot defile him;'
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: because it entereth not into his heart, but into the belly, and goeth out into the draught, purging all meats?
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they saw some of his disciples eat bread with defiled, that is to say, with unwashen, hands, they found fault. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: That which cometh out of the man, that defileth the man.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For from within, out of the heart of men, proceed evil thoughts, adulteries, fornications, murders,
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'thefts, covetousness, wickedness, deceit, lasciviousness, an evil eye, blasphemy, pride, foolishness:'
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: all these evil things come from within, and defile the man.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Tyre and Sidon
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And from thence he arose, and went into the borders of Tyre and Sidon, and entered into an house, and would have no man know '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ': but he could not be hid. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For a '
    - type: usfm
      marker: add
      children:
      - type: text
        text: certain
    - type: text
      text: ' woman, whose young daughter had an unclean spirit, heard of him, and came and fell at his feet: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the woman was a Greek, a Syrophenician by nation; and she besought him that he would cast forth the devil out of her daughter. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus said unto her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Let the children first be filled: for it is not meet to take the children''s bread, and to cast '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ' unto the dogs.'
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And she answered and said unto him, Yes, Lord: yet the dogs under the table eat of the children''s crumbs. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For this saying go thy way; the devil is gone out of thy daughter.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the Pharisees, and all the Jews, except they wash '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' hands oft, eat not, holding the tradition of the elders. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when she was come to her house, she found the devil gone out, and her daughter laid upon the bed.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Coasts of Decapolis
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And again, departing from the coasts of Tyre and Sidon, he came unto the sea of Galilee, through the midst of the coasts of Decapolis. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they bring unto him one that was deaf, and had an impediment in his speech; and they beseech him to put his hand upon him. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he took him aside from the multitude, and put his fingers into his ears, and he spit, and touched his tongue; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and looking up to heaven, he sighed, and saith unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ephphatha,
    - type: text
      text: ' that is, Be opened. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And straightway his ears were opened, and the string of his tongue was loosed, and he spake plain. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he charged them that they should tell no man: but the more he charged them, so much the more a great deal they published '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: '; '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and were beyond measure astonished, saying, He hath done all things well: he maketh both the deaf to hear, and the dumb to speak.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: when they come
    - type: text
      text: ' from the market, except they wash, they eat not. And many other things there be, which they have received to hold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' the washing of cups, and pots, brasen vessels, and of tables.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Pharisees and scribes asked him, Why walk not thy disciples according to the tradition of the elders, but eat bread with unwashen hands? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He answered and said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Well hath Esaias prophesied of you hypocrites, as it is written,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'This people honoureth me with '
      - type: usfm
        marker: add
        children:
        - type: text
          text: their
      - type: text
        text: ' lips,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But their heart is far from me.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Howbeit in vain do they worship me,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Teaching '
      - type: usfm
        marker: add
        children:
        - type: text
          text: for
      - type: text
        text: ' doctrines the commandments of men.'
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For laying aside the commandment of God, ye hold the tradition of men, '
      - type: usfm
        marker: add
        children:
        - type: text
          text: as
      - type: text
        text: ' the washing of pots and cups: and many other such like things ye do.'
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Full well ye reject the commandment of God, that ye may keep your own tradition.
    - type: text
      text: ' '
