document_id: EZK.27,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came again unto me, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'They of Persia and of Lud and of Phut were in thine army, thy men of war: they hanged the shield and helmet in thee; they set forth thy comeliness. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The men of Arvad with thine army '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' upon thy walls round about, and the Gammadims were in thy towers: they hanged their shields upon thy walls round about; they have made thy beauty perfect.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tarshish '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' thy merchant by reason of the multitude of all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: kind of
    - type: text
      text: ' riches; with silver, iron, tin, and lead, they traded in thy fairs. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Javan, Tubal, and Meshech, they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' thy merchants: they traded the persons of men and vessels of brass in thy market. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'They of the house of Togarmah traded in thy fairs with horses and horsemen and mules. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The men of Dedan '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' thy merchants; many isles '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' the merchandise of thine hand: they brought thee '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a present horns of ivory and ebony. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Syria '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' thy merchant by reason of the multitude of the wares of thy making: they occupied in thy fairs with emeralds, purple, and broidered work, and fine linen, and coral, and agate. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Judah, and the land of Israel, they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' thy merchants: they traded in thy market wheat of Minnith, and Pannag, and honey, and oil, and balm. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Damascus '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' thy merchant in the multitude of the wares of thy making, for the multitude of all riches; in the wine of Helbon, and white wool. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dan also and Javan going to and fro occupied in thy fairs: bright iron, cassia, and calamus, were in thy market. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Now, thou son of man, take up a lamentation for Tyrus; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dedan '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' thy merchant in precious clothes for chariots. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Arabia, and all the princes of Kedar, they occupied with thee in lambs, and rams, and goats: in these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were they
    - type: text
      text: ' thy merchants. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'The merchants of Sheba and Raamah: they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' thy merchants: they occupied in thy fairs with chief of all spices, and with all precious stones, and gold. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Haran, and Canneh, and Eden, the merchants of Sheba, Asshur, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' Chilmad, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' thy merchants. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' thy merchants in all sorts '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of things
    - type: text
      text: ', in blue clothes, and broidered work, and in chests of rich apparel, bound with cords, and made of cedar, among thy merchandise. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'The ships of Tarshish did sing of thee in thy market: and thou wast replenished, and made very glorious in the midst of the seas.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Thy rowers have brought thee into great waters: the east wind hath broken thee in the midst of the seas. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Thy riches, and thy fairs, thy merchandise, thy mariners, and thy pilots, thy calkers, and the occupiers of thy merchandise, and all thy men of war, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in thee, and in all thy company which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the midst of thee, shall fall into the midst of the seas in the day of thy ruin. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'The suburbs shall shake at the sound of the cry of thy pilots. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And all that handle the oar, the mariners, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' all the pilots of the sea, shall come down from their ships, they shall stand upon the land; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'and say unto Tyrus, O thou that art situate at the entry of the sea, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which art
    - type: text
      text: ' a merchant of the people for many isles, Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; O Tyrus, thou hast said, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' of perfect beauty. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'and shall cause their voice to be heard against thee, and shall cry bitterly, and shall cast up dust upon their heads, they shall wallow themselves in the ashes: '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'and they shall make themselves utterly bald for thee, and gird them with sackcloth, and they shall weep for thee with bitterness of heart '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' bitter wailing. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And in their wailing they shall take up a lamentation for thee, and lament over thee, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: saying
    - type: text
      text: ', What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: city is
    - type: text
      text: ' like Tyrus, like the destroyed in the midst of the sea? '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'When thy wares went forth out of the seas, thou filledst many people; thou didst enrich the kings of the earth with the multitude of thy riches and of thy merchandise. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'In the time '
    - type: usfm
      marker: add
      children:
      - type: text
        text: when
    - type: text
      text: ' thou shalt be broken by the seas in the depths of the waters thy merchandise and all thy company in the midst of thee shall fall. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'All the inhabitants of the isles shall be astonished at thee, and their kings shall be sore afraid, they shall be troubled in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' countenance. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'The merchants among the people shall hiss at thee; thou shalt be a terror, and never '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shalt be
    - type: text
      text: ' any more.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Thy borders '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in the midst of the seas, thy builders have perfected thy beauty. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'They have made all thy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ship
    - type: text
      text: ' boards of fir trees of Senir: they have taken cedars from Lebanon to make masts for thee. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: add
      children:
      - type: text
        text: Of
    - type: text
      text: ' the oaks of Bashan have they made thine oars; the company of the Ashurites have made thy benches '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' ivory, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: brought
    - type: text
      text: ' out of the isles of Chittim. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fine linen with broidered work from Egypt was that which thou spreadest forth to be thy sail; blue and purple from the isles of Elishah was that which covered thee. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The inhabitants of Zidon and Arvad were thy mariners: thy wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ', O Tyrus, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' were in thee, were thy pilots. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The ancients of Gebal and the wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' thereof were in thee thy calkers: all the ships of the sea with their mariners were in thee to occupy thy merchandise. '
