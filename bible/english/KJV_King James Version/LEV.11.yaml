document_id: LEV.11,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Things Clean and Unclean
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses and to Aaron, saying unto them, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And all that have not fins and scales in the seas, and in the rivers, of all that move in the waters, and of any living thing which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the waters, they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' an abomination unto you: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'they shall be even an abomination unto you; ye shall not eat of their flesh, but ye shall have their carcases in abomination. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Whatsoever hath no fins nor scales in the waters, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' an abomination unto you.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are they which
    - type: text
      text: ' ye shall have in abomination among the fowls; they shall not be eaten, they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' an abomination: the eagle, and the ossifrage, and the ospray, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'and the vulture, and the kite after his kind; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'every raven after his kind; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'and the owl, and the night hawk, and the cuckow, and the hawk after his kind, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'and the little owl, and the cormorant, and the great owl, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'and the swan, and the pelican, and the gier eagle, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'and the stork, the heron after her kind, and the lapwing, and the bat. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Speak unto the children of Israel, saying, These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the beasts which ye shall eat among all the beasts that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' on the earth.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Food
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'All fowls that creep, going upon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: all
    - type: text
      text: ' four, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' an abomination unto you. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Yet these may ye eat of every flying creeping thing that goeth upon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: all
    - type: text
      text: ' four, which have legs above their feet, to leap withal upon the earth; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' these of them ye may eat; the locust after his kind, and the bald locust after his kind, and the beetle after his kind, and the grasshopper after his kind. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'But all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: other
    - type: text
      text: ' flying creeping things, which have four feet, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' an abomination unto you. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And for these ye shall be unclean: whosoever toucheth the carcase of them shall be unclean until the even. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And whosoever beareth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ought
    - type: text
      text: ' of the carcase of them shall wash his clothes, and be unclean until the even. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: add
      children:
      - type: text
        text: The carcases
    - type: text
      text: ' of every beast which divideth the hoof, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not clovenfooted, nor cheweth the cud, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' unclean unto you: every one that toucheth them shall be unclean. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And whatsoever goeth upon his paws, among all manner of beasts that go on '
    - type: usfm
      marker: add
      children:
      - type: text
        text: all
    - type: text
      text: ' four, those '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' unclean unto you: whoso toucheth their carcase shall be unclean until the even. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And he that beareth the carcase of them shall wash his clothes, and be unclean until the even: they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' unclean unto you.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'These also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' unclean unto you among the creeping things that creep upon the earth; the weasel, and the mouse, and the tortoise after his kind, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Whatsoever parteth the hoof, and is clovenfooted, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' cheweth the cud, among the beasts, that shall ye eat. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'and the ferret, and the chameleon, and the lizard, and the snail, and the mole. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' unclean to you among all that creep: whosoever doth touch them, when they be dead, shall be unclean until the even. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And upon whatsoever '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' of them, when they are dead, doth fall, it shall be unclean; whether '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it be
    - type: text
      text: ' any vessel of wood, or raiment, or skin, or sack, whatsoever vessel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it be
    - type: text
      text: ', wherein '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' work is done, it must be put into water, and it shall be unclean until the even; so it shall be cleansed. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And every earthen vessel, whereinto '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' of them falleth, whatsoever '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in it shall be unclean; and ye shall break it. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Of all meat which may be eaten, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' on which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: such
    - type: text
      text: ' water cometh shall be unclean: and all drink that may be drunk in every '
    - type: usfm
      marker: add
      children:
      - type: text
        text: such
    - type: text
      text: ' vessel shall be unclean. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'And every '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thing
    - type: text
      text: ' whereupon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any part
    - type: text
      text: ' of their carcase falleth shall be unclean; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whether it be
    - type: text
      text: ' oven, or ranges for pots, they shall be broken down: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' unclean, and shall be unclean unto you. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Nevertheless a fountain or pit, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: wherein there is
    - type: text
      text: ' plenty of water, shall be clean: but that which toucheth their carcase shall be unclean. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'And if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any part
    - type: text
      text: ' of their carcase fall upon any sowing seed which is to be sown, it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' clean. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'But if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' water be put upon the seed, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any part
    - type: text
      text: ' of their carcase fall thereon, it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' unclean unto you. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'And if any beast, of which ye may eat, die; he that toucheth the carcase thereof shall be unclean until the even. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Nevertheless these shall ye not eat of them that chew the cud, or of them that divide the hoof: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' the camel, because he cheweth the cud, but divideth not the hoof; he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' unclean unto you. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'And he that eateth of the carcase of it shall wash his clothes, and be unclean until the even: he also that beareth the carcase of it shall wash his clothes, and be unclean until the even. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'And every creeping thing that creepeth upon the earth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' an abomination; it shall not be eaten. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Whatsoever goeth upon the belly, and whatsoever goeth upon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: all
    - type: text
      text: ' four, or whatsoever hath more feet among all creeping things that creep upon the earth, them ye shall not eat; for they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' an abomination. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Ye shall not make yourselves abominable with any creeping thing that creepeth, neither shall ye make yourselves unclean with them, that ye should be defiled thereby. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'For I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God: ye shall therefore sanctify yourselves, and ye shall be holy; for I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' holy: neither shall ye defile yourselves with any manner of creeping thing that creepeth upon the earth. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'For I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' that bringeth you up out of the land of Egypt, to be your God: ye shall therefore be holy, for I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' holy. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the law of the beasts, and of the fowl, and of every living creature that moveth in the waters, and of every creature that creepeth upon the earth: '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: to make a difference between the unclean and the clean, and between the beast that may be eaten and the beast that may not be eaten.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And the coney, because he cheweth the cud, but divideth not the hoof; he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' unclean unto you. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And the hare, because he cheweth the cud, but divideth not the hoof; he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' unclean unto you. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And the swine, though he divide the hoof, and be clovenfooted, yet he cheweth not the cud; he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' unclean to you. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Of their flesh shall ye not eat, and their carcase shall ye not touch; they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' unclean to you.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'These shall ye eat of all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in the waters: whatsoever hath fins and scales in the waters, in the seas, and in the rivers, them shall ye eat. '
