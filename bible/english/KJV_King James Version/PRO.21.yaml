document_id: PRO.21,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The king''s heart '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: As
    - type: text
      text: ' the rivers of water: he turneth it whithersoever he will.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The soul of the wicked desireth evil:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His neighbour findeth no favour in his eyes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'When the scorner is punished, the simple is made wise:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And when the wise is instructed, he receiveth knowledge.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'The righteous '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' wisely considereth the house of the wicked:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: But God
    - type: text
      text: ' overthroweth the wicked for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' wickedness.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Whoso stoppeth his ears at the cry of the poor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He also shall cry himself, but shall not be heard.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'A gift in secret pacifieth anger:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a reward in the bosom strong wrath.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' joy to the just to do judgment:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But destruction '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' to the workers of iniquity.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: The man that wandereth out of the way of understanding
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shall remain in the congregation of the dead.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'He that loveth pleasure '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' a poor man:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He that loveth wine and oil shall not be rich.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The wicked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' a ransom for the righteous,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the transgressor for the upright.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' better to dwell in the wilderness,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Than with a contentious and an angry woman.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Every way of a man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' right in his own eyes:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' pondereth the hearts.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: There is
    - type: text
      text: ' treasure to be desired and oil in the dwelling of the wise;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But a foolish man spendeth it up.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: He that followeth after righteousness and mercy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Findeth life, righteousness, and honour.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'A wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' scaleth the city of the mighty,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And casteth down the strength of the confidence thereof.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Whoso keepeth his mouth and his tongue
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Keepeth his soul from troubles.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Proud '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' haughty scorner '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' his name,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who dealeth in proud wrath.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: The desire of the slothful killeth him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For his hands refuse to labour.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'He coveteth greedily all the day long:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the righteous giveth and spareth not.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'The sacrifice of the wicked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' abomination:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'How much more, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: when
    - type: text
      text: ' he bringeth it with a wicked mind?'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'A false witness shall perish:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the man that heareth speaketh constantly.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'A wicked man hardeneth his face:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as for
    - type: text
      text: ' the upright, he directeth his way.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: To do justice and judgment
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' more acceptable to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' than sacrifice.'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: There is
    - type: text
      text: ' no wisdom nor understanding'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Nor counsel against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'The horse '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' prepared against the day of battle:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But safety '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: An high look, and a proud heart,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' the plowing of the wicked, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' sin.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The thoughts of the diligent '
    - type: usfm
      marker: add
      children:
      - type: text
        text: tend
    - type: text
      text: ' only to plenteousness;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But of every one '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is
    - type: text
      text: ' hasty only to want.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The getting of treasures by a lying tongue
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' a vanity tossed to and fro of them that seek death.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The robbery of the wicked shall destroy them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because they refuse to do judgment.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The way of man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' froward and strange:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as for
    - type: text
      text: ' the pure, his work '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' right.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' better to dwell in a corner of the housetop,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Than with a brawling woman in a wide house.
