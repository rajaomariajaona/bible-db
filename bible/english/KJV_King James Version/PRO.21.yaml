verses:
  '1':
  - type: text
    content: 'The king''s heart '
  - type: text
    content: is
  - type: text
    content: ' in the hand of the '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: As
  - type: text
    content: ' the rivers of water: he turneth it whithersoever he will.'
  '10':
  - type: text
    content: 'The soul of the wicked desireth evil:'
  - type: text
    content: His neighbour findeth no favour in his eyes.
  '11':
  - type: text
    content: 'When the scorner is punished, the simple is made wise:'
  - type: text
    content: And when the wise is instructed, he receiveth knowledge.
  '12':
  - type: text
    content: 'The righteous '
  - type: text
    content: man
  - type: text
    content: ' wisely considereth the house of the wicked:'
  - type: text
    content: But God
  - type: text
    content: ' overthroweth the wicked for '
  - type: text
    content: their
  - type: text
    content: ' wickedness.'
  '13':
  - type: text
    content: Whoso stoppeth his ears at the cry of the poor,
  - type: text
    content: He also shall cry himself, but shall not be heard.
  '14':
  - type: text
    content: 'A gift in secret pacifieth anger:'
  - type: text
    content: And a reward in the bosom strong wrath.
  '15':
  - type: text
    content: ' '
  - type: text
    content: It is
  - type: text
    content: ' joy to the just to do judgment:'
  - type: text
    content: 'But destruction '
  - type: text
    content: shall be
  - type: text
    content: ' to the workers of iniquity.'
  '16':
  - type: text
    content: The man that wandereth out of the way of understanding
  - type: text
    content: Shall remain in the congregation of the dead.
  '17':
  - type: text
    content: 'He that loveth pleasure '
  - type: text
    content: shall be
  - type: text
    content: ' a poor man:'
  - type: text
    content: He that loveth wine and oil shall not be rich.
  '18':
  - type: text
    content: 'The wicked '
  - type: text
    content: shall be
  - type: text
    content: ' a ransom for the righteous,'
  - type: text
    content: And the transgressor for the upright.
  '19':
  - type: text
    content: ' '
  - type: text
    content: It is
  - type: text
    content: ' better to dwell in the wilderness,'
  - type: text
    content: Than with a contentious and an angry woman.
  '2':
  - type: text
    content: 'Every way of a man '
  - type: text
    content: is
  - type: text
    content: ' right in his own eyes:'
  - type: text
    content: 'But the '
  - type: text
    content: LORD
  - type: text
    content: ' pondereth the hearts.'
  '20':
  - type: text
    content: ' '
  - type: text
    content: There is
  - type: text
    content: ' treasure to be desired and oil in the dwelling of the wise;'
  - type: text
    content: But a foolish man spendeth it up.
  '21':
  - type: text
    content: He that followeth after righteousness and mercy
  - type: text
    content: Findeth life, righteousness, and honour.
  '22':
  - type: text
    content: 'A wise '
  - type: text
    content: man
  - type: text
    content: ' scaleth the city of the mighty,'
  - type: text
    content: And casteth down the strength of the confidence thereof.
  '23':
  - type: text
    content: Whoso keepeth his mouth and his tongue
  - type: text
    content: Keepeth his soul from troubles.
  '24':
  - type: text
    content: 'Proud '
  - type: text
    content: and
  - type: text
    content: ' haughty scorner '
  - type: text
    content: is
  - type: text
    content: ' his name,'
  - type: text
    content: Who dealeth in proud wrath.
  '25':
  - type: text
    content: The desire of the slothful killeth him;
  - type: text
    content: For his hands refuse to labour.
  '26':
  - type: text
    content: 'He coveteth greedily all the day long:'
  - type: text
    content: But the righteous giveth and spareth not.
  '27':
  - type: text
    content: 'The sacrifice of the wicked '
  - type: text
    content: is
  - type: text
    content: ' abomination:'
  - type: text
    content: 'How much more, '
  - type: text
    content: when
  - type: text
    content: ' he bringeth it with a wicked mind?'
  '28':
  - type: text
    content: 'A false witness shall perish:'
  - type: text
    content: But the man that heareth speaketh constantly.
  '29':
  - type: text
    content: 'A wicked man hardeneth his face:'
  - type: text
    content: 'But '
  - type: text
    content: as for
  - type: text
    content: ' the upright, he directeth his way.'
  '3':
  - type: text
    content: To do justice and judgment
  - type: text
    content: Is
  - type: text
    content: ' more acceptable to the '
  - type: text
    content: LORD
  - type: text
    content: ' than sacrifice.'
  '30':
  - type: text
    content: ' '
  - type: text
    content: There is
  - type: text
    content: ' no wisdom nor understanding'
  - type: text
    content: 'Nor counsel against the '
  - type: text
    content: LORD
  - type: text
    content: .
  '31':
  - type: text
    content: 'The horse '
  - type: text
    content: is
  - type: text
    content: ' prepared against the day of battle:'
  - type: text
    content: 'But safety '
  - type: text
    content: is
  - type: text
    content: ' of the '
  - type: text
    content: LORD
  - type: text
    content: .
  '4':
  - type: text
    content: An high look, and a proud heart,
  - type: text
    content: And
  - type: text
    content: ' the plowing of the wicked, '
  - type: text
    content: is
  - type: text
    content: ' sin.'
  '5':
  - type: text
    content: 'The thoughts of the diligent '
  - type: text
    content: tend
  - type: text
    content: ' only to plenteousness;'
  - type: text
    content: 'But of every one '
  - type: text
    content: that is
  - type: text
    content: ' hasty only to want.'
  '6':
  - type: text
    content: The getting of treasures by a lying tongue
  - type: text
    content: Is
  - type: text
    content: ' a vanity tossed to and fro of them that seek death.'
  '7':
  - type: text
    content: The robbery of the wicked shall destroy them;
  - type: text
    content: Because they refuse to do judgment.
  '8':
  - type: text
    content: 'The way of man '
  - type: text
    content: is
  - type: text
    content: ' froward and strange:'
  - type: text
    content: 'But '
  - type: text
    content: as for
  - type: text
    content: ' the pure, his work '
  - type: text
    content: is
  - type: text
    content: ' right.'
  '9':
  - type: text
    content: ' '
  - type: text
    content: It is
  - type: text
    content: ' better to dwell in a corner of the housetop,'
  - type: text
    content: Than with a brawling woman in a wide house.
