document_id: 1SA.25
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: David and Abigail
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: And Samuel died; and all the Israelites were gathered together, and lamented him, and buried him in his house at Ramah. And David arose, and went down to the wilderness of Paran.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' a man in Maon, whose possessions '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in Carmel; and the man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' very great, and he had three thousand sheep, and a thousand goats: and he was shearing his sheep in Carmel. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Now the name of the man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Nabal; and the name of his wife Abigail: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: she was
  - type: text
    text: ' a woman of good understanding, and of a beautiful countenance: but the man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' churlish and evil in his doings; and he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' of the house of Caleb. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And David heard in the wilderness that Nabal did shear his sheep. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And David sent out ten young men, and David said unto the young men, Get you up to Carmel, and go to Nabal, and greet him in my name: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and thus shall ye say to him that liveth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in prosperity
  - type: text
    text: ', Peace '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' both to thee, and peace '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' to thine house, and peace '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' unto all that thou hast. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And now I have heard that thou hast shearers: now thy shepherds which were with us, we hurt them not, neither was there ought missing unto them, all the while they were in Carmel. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ask thy young men, and they will shew thee. Wherefore let the young men find favour in thine eyes: for we come in a good day: give, I pray thee, whatsoever cometh to thine hand unto thy servants, and to thy son David.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And when David''s young men came, they spake to Nabal according to all those words in the name of David, and ceased. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Nabal answered David''s servants, and said, Who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' David? and who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the son of Jesse? there be many servants now a days that break away every man from his master. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Shall I then take my bread, and my water, and my flesh that I have killed for my shearers, and give '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' unto men, whom I know not whence they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So David''s young men turned their way, and went again, and came and told him all those sayings. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And David said unto his men, Gird ye on every man his sword. And they girded on every man his sword; and David also girded on his sword: and there went up after David about four hundred men; and two hundred abode by the stuff.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But one of the young men told Abigail, Nabal''s wife, saying, Behold, David sent messengers out of the wilderness to salute our master; and he railed on them. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But the men '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' very good unto us, and we were not hurt, neither missed we any thing, as long as we were conversant with them, when we were in the fields: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'they were a wall unto us both by night and day, all the while we were with them keeping the sheep. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now therefore know and consider what thou wilt do; for evil is determined against our master, and against all his household: for he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is such
  - type: text
    text: ' a son of Belial, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: a man
  - type: text
    text: ' cannot speak to him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then Abigail made haste, and took two hundred loaves, and two bottles of wine, and five sheep ready dressed, and five measures of parched '
  - type: usfm
    marker: add
    children:
    - type: text
      text: corn
  - type: text
    text: ', and an hundred clusters of raisins, and two hundred cakes of figs, and laid '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' on asses. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And she said unto her servants, Go on before me; behold, I come after you. But she told not her husband Nabal. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And it was '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so, as
  - type: text
    text: ' she rode on the ass, that she came down by the covert of the hill, and, behold, David and his men came down against her; and she met them. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Now David had said, Surely in vain have I kept all that this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: fellow
  - type: text
    text: ' hath in the wilderness, so that nothing was missed of all that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: pertained
  - type: text
    text: ' unto him: and he hath requited me evil for good. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So and more also do God unto the enemies of David, if I leave of all that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: pertain
  - type: text
    text: ' to him by the morning light any that pisseth against the wall.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And when Abigail saw David, she hasted, and lighted off the ass, and fell before David on her face, and bowed herself to the ground, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and fell at his feet, and said, Upon me, my lord, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: upon
  - type: text
    text: ' me '
  - type: usfm
    marker: add
    children:
    - type: text
      text: let this
  - type: text
    text: ' iniquity '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'be:'
  - type: text
    text: ' and let thine handmaid, I pray thee, speak in thine audience, and hear the words of thine handmaid. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Let not my lord, I pray thee, regard this man of Belial, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' Nabal: for as his name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ', so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' he; Nabal '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' his name, and folly '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with him: but I thine handmaid saw not the young men of my lord, whom thou didst send. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Now therefore, my lord, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' liveth, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' thy soul liveth, seeing the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath withholden thee from coming to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shed
  - type: text
    text: ' blood, and from avenging thyself with thine own hand, now let thine enemies, and they that seek evil to my lord, be as Nabal. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And now this blessing which thine handmaid hath brought unto my lord, let it even be given unto the young men that follow my lord. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'I pray thee, forgive the trespass of thine handmaid: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will certainly make my lord a sure house; because my lord fighteth the battles of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and evil hath not been found in thee '
  - type: usfm
    marker: add
    children:
    - type: text
      text: all
  - type: text
    text: ' thy days. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Yet a man is risen to pursue thee, and to seek thy soul: but the soul of my lord shall be bound in the bundle of life with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God; and the souls of thine enemies, them shall he sling out, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as out
  - type: text
    text: ' of the middle of a sling. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And it shall come to pass, when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall have done to my lord according to all the good that he hath spoken concerning thee, and shall have appointed thee ruler over Israel; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'that this shall be no grief unto thee, nor offence of heart unto my lord, either that thou hast shed blood causeless, or that my lord hath avenged himself: but when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall have dealt well with my lord, then remember thine handmaid.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And David said to Abigail, Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel, which sent thee this day to meet me: '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'and blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' thy advice, and blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' thou, which hast kept me this day from coming to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shed
  - type: text
    text: ' blood, and from avenging myself with mine own hand. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'For in very deed, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel liveth, which hath kept me back from hurting thee, except thou hadst hasted and come to meet me, surely there had not been left unto Nabal by the morning light any that pisseth against the wall. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'So David received of her hand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' which she had brought him, and said unto her, Go up in peace to thine house; see, I have hearkened to thy voice, and have accepted thy person.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And Abigail came to Nabal; and, behold, he held a feast in his house, like the feast of a king; and Nabal''s heart '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' merry within him, for he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' very drunken: wherefore she told him nothing, less or more, until the morning light. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'But it came to pass in the morning, when the wine was gone out of Nabal, and his wife had told him these things, that his heart died within him, and he became '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' a stone. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And it came to pass about ten days '
  - type: usfm
    marker: add
    children:
    - type: text
      text: after
  - type: text
    text: ', that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' smote Nabal, that he died.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And when David heard that Nabal was dead, he said, Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that hath pleaded the cause of my reproach from the hand of Nabal, and hath kept his servant from evil: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath returned the wickedness of Nabal upon his own head. And David sent and communed with Abigail, to take her to him to wife. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And when the servants of David were come to Abigail to Carmel, they spake unto her, saying, David sent us unto thee, to take thee to him to wife. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And she arose, and bowed herself on '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her
  - type: text
    text: ' face to the earth, and said, Behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: let
  - type: text
    text: ' thine handmaid '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' a servant to wash the feet of the servants of my lord. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: And Abigail hasted, and arose, and rode upon an ass, with five damsels of her's that went after her; and she went after the messengers of David, and became his wife.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'David also took Ahinoam of Jezreel; and they were also both of them his wives. '
