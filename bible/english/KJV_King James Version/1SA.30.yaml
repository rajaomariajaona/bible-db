document_id: 1SA.30,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And it came to pass, when David and his men were come to Ziklag on the third day, that the Amalekites had invaded the south, and Ziklag, and smitten Ziklag, and burned it with fire; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'But David pursued, he and four hundred men: for two hundred abode behind, which were so faint that they could not go over the brook Besor.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And they found an Egyptian in the field, and brought him to David, and gave him bread, and he did eat; and they made him drink water; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'and they gave him a piece of a cake of figs, and two clusters of raisins: and when he had eaten, his spirit came again to him: for he had eaten no bread, nor drunk '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' water, three days and three nights. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And David said unto him, To whom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: belongest
    - type: text
      text: ' thou? and whence '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' thou? And he said, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' a young man of Egypt, servant to an Amalekite; and my master left me, because three days agone I fell sick. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'We made an invasion '
    - type: usfm
      marker: add
      children:
      - type: text
        text: upon
    - type: text
      text: ' the south of the Cherethites, and upon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the coast
    - type: text
      text: ' which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: belongeth
    - type: text
      text: ' to Judah, and upon the south of Caleb; and we burned Ziklag with fire. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: And David said to him, Canst thou bring me down to this company? And he said, Swear unto me by God, that thou wilt neither kill me, nor deliver me into the hands of my master, and I will bring thee down to this company.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And when he had brought him down, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they were
    - type: text
      text: ' spread abroad upon all the earth, eating and drinking, and dancing, because of all the great spoil that they had taken out of the land of the Philistines, and out of the land of Judah. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And David smote them from the twilight even unto the evening of the next day: and there escaped not a man of them, save four hundred young men, which rode upon camels, and fled. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And David recovered all that the Amalekites had carried away: and David rescued his two wives. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And there was nothing lacking to them, neither small nor great, neither sons nor daughters, neither spoil, nor any '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thing
    - type: text
      text: ' that they had taken to them: David recovered all. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'and had taken the women captives, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' therein: they slew not any, either great or small, but carried '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' away, and went on their way. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And David took all the flocks and the herds, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' they drave before those '
    - type: usfm
      marker: add
      children:
      - type: text
        text: other
    - type: text
      text: ' cattle, and said, This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' David''s spoil.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Dividing the Spoil
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And David came to the two hundred men, which were so faint that they could not follow David, whom they had made also to abide at the brook Besor: and they went forth to meet David, and to meet the people that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with him: and when David came near to the people, he saluted them. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Then answered all the wicked men and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' of Belial, of those that went with David, and said, Because they went not with us, we will not give them '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ought
    - type: text
      text: ' of the spoil that we have recovered, save to every man his wife and his children, that they may lead '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' away, and depart. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Then said David, Ye shall not do so, my brethren, with that which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath given us, who hath preserved us, and delivered the company that came against us into our hand. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'For who will hearken unto you in this matter? but as his part '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' that goeth down to the battle, so '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall
    - type: text
      text: ' his part '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' that tarrieth by the stuff: they shall part alike. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And it was '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' from that day forward, that he made it a statute and an ordinance for Israel unto this day.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And when David came to Ziklag, he sent of the spoil unto the elders of Judah, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' to his friends, saying, Behold a present for you of the spoil of the enemies of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in Beth-el, and to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in south Ramoth, and to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in Jattir, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'and to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in Aroer, and to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in Siphmoth, and to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in Eshtemoa, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'and to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in Rachal, and to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in the cities of the Jerahmeelites, and to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in the cities of the Kenites, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So David and his men came to the city, and, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' burned with fire; and their wives, and their sons, and their daughters, were taken captives. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'and to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in Hormah, and to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in Chor-ashan, and to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in Athach, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'and to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in Hebron, and to all the places where David himself and his men were wont to haunt.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then David and the people that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with him lifted up their voice and wept, until they had no more power to weep. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And David''s two wives were taken captives, Ahinoam the Jezreelitess, and Abigail the wife of Nabal the Carmelite. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And David was greatly distressed; for the people spake of stoning him, because the soul of all the people was grieved, every man for his sons and for his daughters: but David encouraged himself in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' his God.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And David said to Abiathar the priest, Ahimelech''s son, I pray thee, bring me hither the ephod. And Abiathar brought thither the ephod to David. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And David enquired at the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', saying, Shall I pursue after this troop? shall I overtake them? And he answered him, Pursue: for thou shalt surely overtake '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ', and without fail recover '
    - type: usfm
      marker: add
      children:
      - type: text
        text: all
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'So David went, he and the six hundred men that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with him, and came to the brook Besor, where those that were left behind stayed. '
