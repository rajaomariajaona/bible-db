document_id: GEN.34
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Jacob's Children
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Dinah the daughter of Leah, which she bare unto Jacob, went out to see the daughters of the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And when Shechem the son of Hamor the Hivite, prince of the country, saw her, he took her, and lay with her, and defiled her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And his soul clave unto Dinah the daughter of Jacob, and he loved the damsel, and spake kindly unto the damsel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Shechem spake unto his father Hamor, saying, Get me this damsel to wife. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And Jacob heard that he had defiled Dinah his daughter: now his sons were with his cattle in the field: and Jacob held his peace until they were come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Hamor the father of Shechem went out unto Jacob to commune with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the sons of Jacob came out of the field when they heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'it:'
  - type: text
    text: ' and the men were grieved, and they were very wroth, because he had wrought folly in Israel in lying with Jacob''s daughter; which thing ought not to be done. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Hamor communed with them, saying, The soul of my son Shechem longeth for your daughter: I pray you give her him to wife. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And make ye marriages with us, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' give your daughters unto us, and take our daughters unto you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And ye shall dwell with us: and the land shall be before you; dwell and trade ye therein, and get you possessions therein. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Shechem said unto her father and unto her brethren, Let me find grace in your eyes, and what ye shall say unto me I will give. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ask me never so much dowry and gift, and I will give according as ye shall say unto me: but give me the damsel to wife. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And the sons of Jacob answered Shechem and Hamor his father deceitfully, and said, because he had defiled Dinah their sister: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and they said unto them, We cannot do this thing, to give our sister to one that is uncircumcised; for that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' a reproach unto us: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'but in this will we consent unto you: If ye will be as we '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ', that every male of you be circumcised; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'then will we give our daughters unto you, and we will take your daughters to us, and we will dwell with you, and we will become one people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But if ye will not hearken unto us, to be circumcised; then will we take our daughter, and we will be gone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And their words pleased Hamor, and Shechem Hamor''s son. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And the young man deferred not to do the thing, because he had delight in Jacob''s daughter: and he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' more honourable than all the house of his father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Hamor and Shechem his son came unto the gate of their city, and communed with the men of their city, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'These men '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' peaceable with us; therefore let them dwell in the land, and trade therein; for the land, behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' large enough for them; let us take their daughters to us for wives, and let us give them our daughters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Only herein will the men consent unto us for to dwell with us, to be one people, if every male among us be circumcised, as they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' circumcised. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Shall
  - type: text
    text: ' not their cattle and their substance and every beast of their''s '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' our''s? only let us consent unto them, and they will dwell with us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: And unto Hamor and unto Shechem his son hearkened all that went out of the gate of his city; and every male was circumcised, all that went out of the gate of his city.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And it came to pass on the third day, when they were sore, that two of the sons of Jacob, Simeon and Levi, Dinah''s brethren, took each man his sword, and came upon the city boldly, and slew all the males. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And they slew Hamor and Shechem his son with the edge of the sword, and took Dinah out of Shechem''s house, and went out. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The sons of Jacob came upon the slain, and spoiled the city, because they had defiled their sister. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'They took their sheep, and their oxen, and their asses, and that which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in the city, and that which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in the field, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'and all their wealth, and all their little ones, and their wives took they captive, and spoiled even all that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in the house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And Jacob said to Simeon and Levi, Ye have troubled me to make me to stink among the inhabitants of the land, among the Canaanites and the Perizzites: and I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' few in number, they shall gather themselves together against me, and slay me; and I shall be destroyed, I and my house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: And they said, Should he deal with our sister as with an harlot?
