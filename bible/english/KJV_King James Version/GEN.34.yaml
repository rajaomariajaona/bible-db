verses:
  '1':
  - type: heading
    content: Jacob's Children
  - type: text
    content: 'And Dinah the daughter of Leah, which she bare unto Jacob, went out to see the daughters of the land. '
  '10':
  - type: text
    content: 'And ye shall dwell with us: and the land shall be before you; dwell and trade ye therein, and get you possessions therein. '
  '11':
  - type: text
    content: 'And Shechem said unto her father and unto her brethren, Let me find grace in your eyes, and what ye shall say unto me I will give. '
  '12':
  - type: text
    content: 'Ask me never so much dowry and gift, and I will give according as ye shall say unto me: but give me the damsel to wife. '
  '13':
  - type: text
    content: 'And the sons of Jacob answered Shechem and Hamor his father deceitfully, and said, because he had defiled Dinah their sister: '
  '14':
  - type: text
    content: 'and they said unto them, We cannot do this thing, to give our sister to one that is uncircumcised; for that '
  - type: text
    content: were
  - type: text
    content: ' a reproach unto us: '
  '15':
  - type: text
    content: 'but in this will we consent unto you: If ye will be as we '
  - type: text
    content: be
  - type: text
    content: ', that every male of you be circumcised; '
  '16':
  - type: text
    content: 'then will we give our daughters unto you, and we will take your daughters to us, and we will dwell with you, and we will become one people. '
  '17':
  - type: text
    content: 'But if ye will not hearken unto us, to be circumcised; then will we take our daughter, and we will be gone. '
  '18':
  - type: text
    content: 'And their words pleased Hamor, and Shechem Hamor''s son. '
  '19':
  - type: text
    content: 'And the young man deferred not to do the thing, because he had delight in Jacob''s daughter: and he '
  - type: text
    content: was
  - type: text
    content: ' more honourable than all the house of his father.'
  '2':
  - type: text
    content: 'And when Shechem the son of Hamor the Hivite, prince of the country, saw her, he took her, and lay with her, and defiled her. '
  '20':
  - type: text
    content: 'And Hamor and Shechem his son came unto the gate of their city, and communed with the men of their city, saying, '
  '21':
  - type: text
    content: 'These men '
  - type: text
    content: are
  - type: text
    content: ' peaceable with us; therefore let them dwell in the land, and trade therein; for the land, behold, '
  - type: text
    content: it is
  - type: text
    content: ' large enough for them; let us take their daughters to us for wives, and let us give them our daughters. '
  '22':
  - type: text
    content: 'Only herein will the men consent unto us for to dwell with us, to be one people, if every male among us be circumcised, as they '
  - type: text
    content: are
  - type: text
    content: ' circumcised. '
  '23':
  - type: text
    content: Shall
  - type: text
    content: ' not their cattle and their substance and every beast of their''s '
  - type: text
    content: be
  - type: text
    content: ' our''s? only let us consent unto them, and they will dwell with us. '
  '24':
  - type: text
    content: And unto Hamor and unto Shechem his son hearkened all that went out of the gate of his city; and every male was circumcised, all that went out of the gate of his city.
  '25':
  - type: text
    content: 'And it came to pass on the third day, when they were sore, that two of the sons of Jacob, Simeon and Levi, Dinah''s brethren, took each man his sword, and came upon the city boldly, and slew all the males. '
  '26':
  - type: text
    content: 'And they slew Hamor and Shechem his son with the edge of the sword, and took Dinah out of Shechem''s house, and went out. '
  '27':
  - type: text
    content: 'The sons of Jacob came upon the slain, and spoiled the city, because they had defiled their sister. '
  '28':
  - type: text
    content: 'They took their sheep, and their oxen, and their asses, and that which '
  - type: text
    content: was
  - type: text
    content: ' in the city, and that which '
  - type: text
    content: was
  - type: text
    content: ' in the field, '
  '29':
  - type: text
    content: 'and all their wealth, and all their little ones, and their wives took they captive, and spoiled even all that '
  - type: text
    content: was
  - type: text
    content: ' in the house. '
  '3':
  - type: text
    content: 'And his soul clave unto Dinah the daughter of Jacob, and he loved the damsel, and spake kindly unto the damsel. '
  '30':
  - type: text
    content: 'And Jacob said to Simeon and Levi, Ye have troubled me to make me to stink among the inhabitants of the land, among the Canaanites and the Perizzites: and I '
  - type: text
    content: being
  - type: text
    content: ' few in number, they shall gather themselves together against me, and slay me; and I shall be destroyed, I and my house. '
  '31':
  - type: text
    content: And they said, Should he deal with our sister as with an harlot?
  '4':
  - type: text
    content: 'And Shechem spake unto his father Hamor, saying, Get me this damsel to wife. '
  '5':
  - type: text
    content: 'And Jacob heard that he had defiled Dinah his daughter: now his sons were with his cattle in the field: and Jacob held his peace until they were come.'
  '6':
  - type: text
    content: 'And Hamor the father of Shechem went out unto Jacob to commune with him. '
  '7':
  - type: text
    content: 'And the sons of Jacob came out of the field when they heard '
  - type: text
    content: 'it:'
  - type: text
    content: ' and the men were grieved, and they were very wroth, because he had wrought folly in Israel in lying with Jacob''s daughter; which thing ought not to be done. '
  '8':
  - type: text
    content: 'And Hamor communed with them, saying, The soul of my son Shechem longeth for your daughter: I pray you give her him to wife. '
  '9':
  - type: text
    content: 'And make ye marriages with us, '
  - type: text
    content: and
  - type: text
    content: ' give your daughters unto us, and take our daughters unto you. '
