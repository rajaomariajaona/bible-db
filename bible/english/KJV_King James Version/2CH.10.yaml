document_id: 2CH.10,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Kingdom of Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And Rehoboam went to Shechem: for to Shechem were all Israel come to make him king. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And the young men that were brought up with him spake unto him, saying, Thus shalt thou answer the people that spake unto thee, saying, Thy father made our yoke heavy, but make thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' somewhat lighter for us; thus shalt thou say unto them, My little '
    - type: usfm
      marker: add
      children:
      - type: text
        text: finger
    - type: text
      text: ' shall be thicker than my father''s loins. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For whereas my father put a heavy yoke upon you, I will put more to your yoke: my father chastised you with whips, but I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: will chastise you
    - type: text
      text: ' with scorpions.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'So Jeroboam and all the people came to Rehoboam on the third day, as the king bade, saying, Come again to me on the third day. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And the king answered them roughly; and king Rehoboam forsook the counsel of the old men, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'and answered them after the advice of the young men, saying, My father made your yoke heavy, but I will add thereto: my father chastised you with whips, but I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: will chastise you
    - type: text
      text: ' with scorpions. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So the king hearkened not unto the people: for the cause was of God, that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' might perform his word, which he spake by the hand of Ahijah the Shilonite to Jeroboam the son of Nebat.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Revolt of Ten Tribes
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And when all Israel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: saw
    - type: text
      text: ' that the king would not hearken unto them, the people answered the king, saying, What portion have we in David? and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: we have
    - type: text
      text: ' none inheritance in the son of Jesse: every man to your tents, O Israel: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' now, David, see to thine own house. So all Israel went to their tents. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'But '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as for
    - type: text
      text: ' the children of Israel that dwelt in the cities of Judah, Rehoboam reigned over them. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then king Rehoboam sent Hadoram that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' over the tribute; and the children of Israel stoned him with stones, that he died. But king Rehoboam made speed to get him up to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' chariot, to flee to Jerusalem. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: And Israel rebelled against the house of David unto this day.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And it came to pass, when Jeroboam the son of Nebat, who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in Egypt, whither he had fled from the presence of Solomon the king, heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', that Jeroboam returned out of Egypt. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And they sent and called him. So Jeroboam and all Israel came and spake to Rehoboam, saying, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Thy father made our yoke grievous: now therefore ease thou somewhat the grievous servitude of thy father, and his heavy yoke that he put upon us, and we will serve thee. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: And he said unto them, Come again unto me after three days. And the people departed.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: King Rehoboam
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And king Rehoboam took counsel with the old men that had stood before Solomon his father while he yet lived, saying, What counsel give ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ' to return answer to this people? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And they spake unto him, saying, If thou be kind to this people, and please them, and speak good words to them, they will be thy servants for ever. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But he forsook the counsel which the old men gave him, and took counsel with the young men that were brought up with him, that stood before him. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And he said unto them, What advice give ye that we may return answer to this people, which have spoken to me, saying, Ease somewhat the yoke that thy father did put upon us? '
