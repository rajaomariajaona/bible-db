verses:
  '1':
  - type: text
    content: My son, attend unto my wisdom,
  - type: text
    content: And
  - type: text
    content: ' bow thine ear to my understanding:'
  '10':
  - type: text
    content: Lest strangers be filled with thy wealth;
  - type: text
    content: 'And thy labours '
  - type: text
    content: be
  - type: text
    content: ' in the house of a stranger;'
  '11':
  - type: text
    content: And thou mourn at the last,
  - type: text
    content: When thy flesh and thy body are consumed,
  '12':
  - type: text
    content: And say, How have I hated instruction,
  - type: text
    content: And my heart despised reproof;
  '13':
  - type: text
    content: And have not obeyed the voice of my teachers,
  - type: text
    content: Nor inclined mine ear to them that instructed me!
  '14':
  - type: text
    content: I was almost in all evil
  - type: text
    content: In the midst of the congregation and assembly.
  '15':
  - type: text
    content: Drink waters out of thine own cistern,
  - type: text
    content: And running waters out of thine own well.
  '16':
  - type: text
    content: Let thy fountains be dispersed abroad,
  - type: text
    content: And
  - type: text
    content: ' rivers of waters in the streets.'
  '17':
  - type: text
    content: Let them be only thine own,
  - type: text
    content: And not strangers' with thee.
  '18':
  - type: text
    content: 'Let thy fountain be blessed:'
  - type: text
    content: And rejoice with the wife of thy youth.
  '19':
  - type: text
    content: ' '
  - type: text
    content: Let her be as
  - type: text
    content: ' the loving hind and pleasant roe;'
  - type: text
    content: Let her breasts satisfy thee at all times;
  - type: text
    content: And be thou ravished always with her love.
  '2':
  - type: text
    content: That thou mayest regard discretion,
  - type: text
    content: 'And '
  - type: text
    content: that
  - type: text
    content: ' thy lips may keep knowledge.'
  '20':
  - type: text
    content: And why wilt thou, my son, be ravished with a strange woman,
  - type: text
    content: And embrace the bosom of a stranger?
  '21':
  - type: text
    content: 'For the ways of man '
  - type: text
    content: are
  - type: text
    content: ' before the eyes of the '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: And he pondereth all his goings.
  '22':
  - type: text
    content: His own iniquities shall take the wicked himself,
  - type: text
    content: And he shall be holden with the cords of his sins.
  '23':
  - type: text
    content: He shall die without instruction;
  - type: text
    content: And in the greatness of his folly he shall go astray.
  '3':
  - type: text
    content: 'For the lips of a strange woman drop '
  - type: text
    content: as
  - type: text
    content: ' an honeycomb,'
  - type: text
    content: 'And her mouth '
  - type: text
    content: is
  - type: text
    content: ' smoother than oil:'
  '4':
  - type: text
    content: But her end is bitter as wormwood,
  - type: text
    content: Sharp as a twoedged sword.
  '5':
  - type: text
    content: Her feet go down to death;
  - type: text
    content: Her steps take hold on hell.
  '6':
  - type: text
    content: Lest thou shouldest ponder the path of life,
  - type: text
    content: 'Her ways are moveable, '
  - type: text
    content: that
  - type: text
    content: ' thou canst not know '
  - type: text
    content: them
  - type: text
    content: .
  '7':
  - type: text
    content: Hear me now therefore, O ye children,
  - type: text
    content: And depart not from the words of my mouth.
  '8':
  - type: text
    content: Remove thy way far from her,
  - type: text
    content: 'And come not nigh the door of her house:'
  '9':
  - type: text
    content: Lest thou give thine honour unto others,
  - type: text
    content: 'And thy years unto the cruel:'
