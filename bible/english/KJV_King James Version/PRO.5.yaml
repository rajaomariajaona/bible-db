document_id: PRO.5
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: My son, attend unto my wisdom,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' bow thine ear to my understanding:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: That thou mayest regard discretion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' thy lips may keep knowledge.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For the lips of a strange woman drop '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' an honeycomb,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And her mouth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' smoother than oil:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But her end is bitter as wormwood,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Sharp as a twoedged sword.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Her feet go down to death;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Her steps take hold on hell.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Lest thou shouldest ponder the path of life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Her ways are moveable, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' thou canst not know '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hear me now therefore, O ye children,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And depart not from the words of my mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Remove thy way far from her,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And come not nigh the door of her house:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Lest thou give thine honour unto others,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And thy years unto the cruel:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Lest strangers be filled with thy wealth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And thy labours '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' in the house of a stranger;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And thou mourn at the last,
- type: usfm
  marker: q2
  children:
  - type: text
    text: When thy flesh and thy body are consumed,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And say, How have I hated instruction,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And my heart despised reproof;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And have not obeyed the voice of my teachers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nor inclined mine ear to them that instructed me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I was almost in all evil
- type: usfm
  marker: q2
  children:
  - type: text
    text: In the midst of the congregation and assembly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Drink waters out of thine own cistern,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And running waters out of thine own well.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Let thy fountains be dispersed abroad,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' rivers of waters in the streets.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Let them be only thine own,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And not strangers' with thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Let thy fountain be blessed:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And rejoice with the wife of thy youth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Let her be as
  - type: text
    text: ' the loving hind and pleasant roe;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let her breasts satisfy thee at all times;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And be thou ravished always with her love.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: And why wilt thou, my son, be ravished with a strange woman,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And embrace the bosom of a stranger?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For the ways of man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' before the eyes of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: And he pondereth all his goings.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: His own iniquities shall take the wicked himself,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And he shall be holden with the cords of his sins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: He shall die without instruction;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And in the greatness of his folly he shall go astray.
