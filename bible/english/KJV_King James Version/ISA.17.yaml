  '1':
  - type: text
    content: The burden of Damascus.
  - type: text
    content: 'Behold, Damascus is taken away from '
  - type: text
    content: being
  - type: text
    content: ' a city, and it shall be a ruinous heap. '
  '10':
  - type: text
    content: 'Because thou hast forgotten the God of thy salvation, and hast not been mindful of the rock of thy strength, therefore shalt thou plant pleasant plants, and shalt set it with strange slips: '
  '11':
  - type: text
    content: 'in the day shalt thou make thy plant to grow, and in the morning shalt thou make thy seed to flourish: '
  - type: text
    content: but
  - type: text
    content: ' the harvest '
  - type: text
    content: shall be
  - type: text
    content: ' a heap in the day of grief and of desperate sorrow.'
  '12':
  - type: text
    content: 'Woe to the multitude of many people, '
  - type: text
    content: which
  - type: text
    content: ' make a noise like the noise of the seas; and to the rushing of nations, '
  - type: text
    content: that
  - type: text
    content: ' make a rushing like the rushing of mighty waters! '
  '13':
  - type: text
    content: 'The nations shall rush like the rushing of many waters: but '
  - type: text
    content: God
  - type: text
    content: ' shall rebuke them, and they shall flee far off, and shall be chased as the chaff of the mountains before the wind, and like a rolling thing before the whirlwind. '
  '14':
  - type: text
    content: 'And behold at eveningtide trouble; '
  - type: text
    content: and
  - type: text
    content: ' before the morning he '
  - type: text
    content: is
  - type: text
    content: ' not. This '
  - type: text
    content: is
  - type: text
    content: ' the portion of them that spoil us, and the lot of them that rob us.'
  '2':
  - type: text
    content: 'The cities of Aroer '
  - type: text
    content: are
  - type: text
    content: ' forsaken: they shall be for flocks, which shall lie down, and none shall make '
  - type: text
    content: them
  - type: text
    content: ' afraid. '
  '3':
  - type: text
    content: 'The fortress also shall cease from Ephraim, and the kingdom from Damascus, and the remnant of Syria: they shall be as the glory of the children of Israel, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts.'
  '4':
  - type: text
    content: 'And in that day it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ' the glory of Jacob shall be made thin, and the fatness of his flesh shall wax lean. '
  '5':
  - type: text
    content: 'And it shall be as when the harvestman gathereth the corn, and reapeth the ears with his arm; and it shall be as he that gathereth ears in the valley of Rephaim. '
  '6':
  - type: text
    content: 'Yet gleaning grapes shall be left in it, as the shaking of an olive tree, two '
  - type: text
    content: or
  - type: text
    content: ' three berries in the top of the uppermost bough, four '
  - type: text
    content: or
  - type: text
    content: ' five in the outmost fruitful branches thereof, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel.'
  '7':
  - type: text
    content: 'At that day shall a man look to his Maker, and his eyes shall have respect to the Holy One of Israel. '
  '8':
  - type: text
    content: 'And he shall not look to the altars, the work of his hands, neither shall respect '
  - type: text
    content: that
  - type: text
    content: ' which his fingers have made, either the groves, or the images. '
  '9':
  - type: text
    content: 'In that day shall his strong cities be as a forsaken bough, and an uppermost branch, which they left because of the children of Israel: and there shall be desolation.'
