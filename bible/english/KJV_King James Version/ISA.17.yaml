document_id: ISA.17
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The burden of Damascus.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Behold, Damascus is taken away from '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' a city, and it shall be a ruinous heap. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The cities of Aroer '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' forsaken: they shall be for flocks, which shall lie down, and none shall make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' afraid. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The fortress also shall cease from Ephraim, and the kingdom from Damascus, and the remnant of Syria: they shall be as the glory of the children of Israel, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And in that day it shall come to pass, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' the glory of Jacob shall be made thin, and the fatness of his flesh shall wax lean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And it shall be as when the harvestman gathereth the corn, and reapeth the ears with his arm; and it shall be as he that gathereth ears in the valley of Rephaim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Yet gleaning grapes shall be left in it, as the shaking of an olive tree, two '
  - type: usfm
    marker: add
    children:
    - type: text
      text: or
  - type: text
    text: ' three berries in the top of the uppermost bough, four '
  - type: usfm
    marker: add
    children:
    - type: text
      text: or
  - type: text
    text: ' five in the outmost fruitful branches thereof, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'At that day shall a man look to his Maker, and his eyes shall have respect to the Holy One of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And he shall not look to the altars, the work of his hands, neither shall respect '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' which his fingers have made, either the groves, or the images. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'In that day shall his strong cities be as a forsaken bough, and an uppermost branch, which they left because of the children of Israel: and there shall be desolation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Because thou hast forgotten the God of thy salvation, and hast not been mindful of the rock of thy strength, therefore shalt thou plant pleasant plants, and shalt set it with strange slips: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'in the day shalt thou make thy plant to grow, and in the morning shalt thou make thy seed to flourish: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' the harvest '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' a heap in the day of grief and of desperate sorrow.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Woe to the multitude of many people, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' make a noise like the noise of the seas; and to the rushing of nations, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' make a rushing like the rushing of mighty waters! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The nations shall rush like the rushing of many waters: but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: God
  - type: text
    text: ' shall rebuke them, and they shall flee far off, and shall be chased as the chaff of the mountains before the wind, and like a rolling thing before the whirlwind. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And behold at eveningtide trouble; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' before the morning he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not. This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the portion of them that spoil us, and the lot of them that rob us.'
