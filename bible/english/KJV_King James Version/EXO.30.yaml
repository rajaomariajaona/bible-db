document_id: EXO.30
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And thou shalt make an altar to burn incense upon: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' shittim wood shalt thou make it. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'A cubit '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the length thereof, and a cubit the breadth thereof; foursquare shall it be: and two cubits '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the height thereof: the horns thereof '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' of the same. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And thou shalt overlay it with pure gold, the top thereof, and the sides thereof round about, and the horns thereof; and thou shalt make unto it a crown of gold round about. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And two golden rings shalt thou make to it under the crown of it, by the two corners thereof, upon the two sides of it shalt thou make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '; and they shall be for places for the staves to bear it withal. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And thou shalt make the staves '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' shittim wood, and overlay them with gold. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And thou shalt put it before the vail that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' by the ark of the testimony, before the mercy seat that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' over the testimony, where I will meet with thee. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And Aaron shall burn thereon sweet incense every morning: when he dresseth the lamps, he shall burn incense upon it. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And when Aaron lighteth the lamps at even, he shall burn incense upon it, a perpetual incense before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' throughout your generations. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ye shall offer no strange incense thereon, nor burnt sacrifice, nor meat offering; neither shall ye pour drink offering thereon. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Aaron shall make an atonement upon the horns of it once in a year with the blood of the sin offering of atonements: once in the year shall he make atonement upon it throughout your generations: it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' most holy unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When thou takest the sum of the children of Israel after their number, then shall they give every man a ransom for his soul unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', when thou numberest them; that there be no plague among them, when '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thou
  - type: text
    text: ' numberest them. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'This they shall give, every one that passeth among them that are numbered, half a shekel after the shekel of the sanctuary: (a shekel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' twenty gerahs:) an half shekel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the offering of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Every one that passeth among them that are numbered, from twenty years old and above, shall give an offering unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The rich shall not give more, and the poor shall not give less than half a shekel, when '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they
  - type: text
    text: ' give an offering unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', to make an atonement for your souls. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And thou shalt take the atonement money of the children of Israel, and shalt appoint it for the service of the tabernacle of the congregation; that it may be a memorial unto the children of Israel before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', to make an atonement for your souls.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Thou shalt also make a laver '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' brass, and his foot '
  - type: usfm
    marker: add
    children:
    - type: text
      text: also of
  - type: text
    text: ' brass, to wash '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'withal:'
  - type: text
    text: ' and thou shalt put it between the tabernacle of the congregation and the altar, and thou shalt put water therein. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For Aaron and his sons shall wash their hands and their feet thereat: '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'when they go into the tabernacle of the congregation, they shall wash with water, that they die not; or when they come near to the altar to minister, to burn offering made by fire unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'so they shall wash their hands and their feet, that they die not: and it shall be a statute for ever to them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to him and to his seed throughout their generations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Moreover the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Take thou also unto thee principal spices, of pure myrrh five hundred '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shekels
  - type: text
    text: ', and of sweet cinnamon half so much, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' two hundred and fifty '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shekels
  - type: text
    text: ', and of sweet calamus two hundred and fifty '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shekels
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and of cassia five hundred '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shekels
  - type: text
    text: ', after the shekel of the sanctuary, and of oil olive an hin: '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'and thou shalt make it an oil of holy ointment, an ointment compound after the art of the apothecary: it shall be an holy anointing oil. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And thou shalt anoint the tabernacle of the congregation therewith, and the ark of the testimony, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'and the table and all his vessels, and the candlestick and his vessels, and the altar of incense, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and the altar of burnt offering with all his vessels, and the laver and his foot. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And thou shalt sanctify them, that they may be most holy: whatsoever toucheth them shall be holy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And thou shalt anoint Aaron and his sons, and consecrate them, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they
  - type: text
    text: ' may minister unto me in the priest''s office. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And thou shalt speak unto the children of Israel, saying, This shall be an holy anointing oil unto me throughout your generations. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Upon man''s flesh shall it not be poured, neither shall ye make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any other
  - type: text
    text: ' like it, after the composition of it: it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' holy, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' it shall be holy unto you. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Whosoever compoundeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' like it, or whosoever putteth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' of it upon a stranger, shall even be cut off from his people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Moses, Take unto thee sweet spices, stacte, and onycha, and galbanum; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: these
  - type: text
    text: ' sweet spices with pure frankincense: of each shall there be a like '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'weight:'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'and thou shalt make it a perfume, a confection after the art of the apothecary, tempered together, pure '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' holy: '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'and thou shalt beat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' of it very small, and put of it before the testimony in the tabernacle of the congregation, where I will meet with thee: it shall be unto you most holy. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as for
  - type: text
    text: ' the perfume which thou shalt make, ye shall not make to yourselves according to the composition thereof: it shall be unto thee holy for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Whosoever shall make like unto that, to smell thereto, shall even be cut off from his people.
