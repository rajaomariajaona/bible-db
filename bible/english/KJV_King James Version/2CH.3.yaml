document_id: 2CH.3,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Temple Building
  - type: text
    content: 'Then Solomon began to build the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' at Jerusalem in mount Moriah, where '
  - type: text
    content: 'the '
  - type: text
    content: LORD
  - type: text
    content: ' appeared unto David his father, in the place that David had prepared in the threshingfloor of Ornan the Jebusite. '
  '10':
  - type: text
    content: 'And in the most holy house he made two cherubims of image work, and overlaid them with gold. '
  '11':
  - type: text
    content: 'And the wings of the cherubims '
  - type: text
    content: were
  - type: text
    content: ' twenty cubits long: one wing '
  - type: text
    content: of the one cherub was
  - type: text
    content: ' five cubits, reaching to the wall of the house: and the other wing '
  - type: text
    content: was likewise
  - type: text
    content: ' five cubits, reaching to the wing of the other cherub. '
  '12':
  - type: text
    content: 'And '
  - type: text
    content: one
  - type: text
    content: ' wing of the other cherub '
  - type: text
    content: was
  - type: text
    content: ' five cubits, reaching to the wall of the house: and the other wing '
  - type: text
    content: was
  - type: text
    content: ' five cubits '
  - type: text
    content: also
  - type: text
    content: ', joining to the wing of the other cherub. '
  '13':
  - type: text
    content: 'The wings of these cherubims spread themselves forth twenty cubits: and they stood on their feet, and their faces '
  - type: text
    content: were
  - type: text
    content: ' inward. '
  '14':
  - type: text
    content: 'And he made the vail '
  - type: text
    content: of
  - type: text
    content: ' blue, and purple, and crimson, and fine linen, and wrought cherubims thereon.'
  '15':
  - type: text
    content: 'Also he made before the house two pillars of thirty and five cubits high, and the chapiter that '
  - type: text
    content: was
  - type: text
    content: ' on the top of each of them '
  - type: text
    content: was
  - type: text
    content: ' five cubits. '
  '16':
  - type: text
    content: 'And he made chains, '
  - type: text
    content: as
  - type: text
    content: ' in the oracle, and put '
  - type: text
    content: them
  - type: text
    content: ' on the heads of the pillars; and made an hundred pomegranates, and put '
  - type: text
    content: them
  - type: text
    content: ' on the chains. '
  '17':
  - type: text
    content: And he reared up the pillars before the temple, one on the right hand, and the other on the left; and called the name of that on the right hand Jachin, and the name of that on the left Boaz.
  '2':
  - type: text
    content: 'And he began to build in the second '
  - type: text
    content: day
  - type: text
    content: ' of the second month, in the fourth year of his reign.'
  '3':
  - type: text
    content: 'Now these '
  - type: text
    content: are the things wherein
  - type: text
    content: ' Solomon was instructed for the building of the house of God. The length by cubits after the first measure '
  - type: text
    content: was
  - type: text
    content: ' threescore cubits, and the breadth twenty cubits. '
  '4':
  - type: text
    content: 'And the porch that '
  - type: text
    content: was
  - type: text
    content: ' in the front '
  - type: text
    content: of the house
  - type: text
    content: ', the length '
  - type: text
    content: of it was
  - type: text
    content: ' according to the breadth of the house, twenty cubits, and the height '
  - type: text
    content: was
  - type: text
    content: ' an hundred and twenty: and he overlaid it within with pure gold. '
  '5':
  - type: text
    content: 'And the greater house he cieled with fir tree, which he overlaid with fine gold, and set thereon palm trees and chains. '
  '6':
  - type: text
    content: 'And he garnished the house with precious stones for beauty: and the gold '
  - type: text
    content: was
  - type: text
    content: ' gold of Parvaim. '
  '7':
  - type: text
    content: He overlaid also the house, the beams, the posts, and the walls thereof, and the doors thereof, with gold; and graved cherubims on the walls.
  '8':
  - type: text
    content: 'And he made the most holy house, the length whereof '
  - type: text
    content: was
  - type: text
    content: ' according to the breadth of the house, twenty cubits, and the breadth thereof twenty cubits: and he overlaid it with fine gold, '
  - type: text
    content: amounting
  - type: text
    content: ' to six hundred talents. '
  '9':
  - type: text
    content: 'And the weight of the nails '
  - type: text
    content: was
  - type: text
    content: ' fifty shekels of gold. And he overlaid the upper chambers with gold.'
