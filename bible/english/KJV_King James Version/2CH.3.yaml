document_id: 2CH.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Temple Building
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Solomon began to build the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' at Jerusalem in mount Moriah, where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
  - type: text
    text: ' appeared unto David his father, in the place that David had prepared in the threshingfloor of Ornan the Jebusite. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he began to build in the second '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' of the second month, in the fourth year of his reign.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Now these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are the things wherein
  - type: text
    text: ' Solomon was instructed for the building of the house of God. The length by cubits after the first measure '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' threescore cubits, and the breadth twenty cubits. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And the porch that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in the front '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of the house
  - type: text
    text: ', the length '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of it was
  - type: text
    text: ' according to the breadth of the house, twenty cubits, and the height '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' an hundred and twenty: and he overlaid it within with pure gold. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the greater house he cieled with fir tree, which he overlaid with fine gold, and set thereon palm trees and chains. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he garnished the house with precious stones for beauty: and the gold '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' gold of Parvaim. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He overlaid also the house, the beams, the posts, and the walls thereof, and the doors thereof, with gold; and graved cherubims on the walls.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And he made the most holy house, the length whereof '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' according to the breadth of the house, twenty cubits, and the breadth thereof twenty cubits: and he overlaid it with fine gold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: amounting
  - type: text
    text: ' to six hundred talents. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the weight of the nails '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' fifty shekels of gold. And he overlaid the upper chambers with gold.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And in the most holy house he made two cherubims of image work, and overlaid them with gold. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the wings of the cherubims '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' twenty cubits long: one wing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of the one cherub was
  - type: text
    text: ' five cubits, reaching to the wall of the house: and the other wing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was likewise
  - type: text
    text: ' five cubits, reaching to the wing of the other cherub. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' wing of the other cherub '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' five cubits, reaching to the wall of the house: and the other wing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' five cubits '
  - type: usfm
    marker: add
    children:
    - type: text
      text: also
  - type: text
    text: ', joining to the wing of the other cherub. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The wings of these cherubims spread themselves forth twenty cubits: and they stood on their feet, and their faces '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' inward. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And he made the vail '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' blue, and purple, and crimson, and fine linen, and wrought cherubims thereon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Also he made before the house two pillars of thirty and five cubits high, and the chapiter that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' on the top of each of them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' five cubits. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And he made chains, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' in the oracle, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' on the heads of the pillars; and made an hundred pomegranates, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' on the chains. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And he reared up the pillars before the temple, one on the right hand, and the other on the left; and called the name of that on the right hand Jachin, and the name of that on the left Boaz.
