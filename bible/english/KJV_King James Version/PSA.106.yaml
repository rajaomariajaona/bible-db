document_id: PSA.106,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Praise ye the '
  - type: text
    content: LORD
  - type: text
    content: '. O give thanks unto the '
  - type: text
    content: LORD
  - type: text
    content: '; for '
  - type: text
    content: he is
  - type: text
    content: ' good:'
  - type: text
    content: 'For his mercy '
  - type: text
    content: endureth
  - type: text
    content: ' for ever.'
  '10':
  - type: text
    content: 'And he saved them from the hand of him that hated '
  - type: text
    content: them
  - type: text
    content: ','
  - type: text
    content: And redeemed them from the hand of the enemy.
  '11':
  - type: text
    content: 'And the waters covered their enemies:'
  - type: text
    content: There was not one of them left.
  '12':
  - type: text
    content: Then believed they his words;
  - type: text
    content: They sang his praise.
  '13':
  - type: text
    content: They soon forgat his works;
  - type: text
    content: 'They waited not for his counsel:'
  '14':
  - type: text
    content: But lusted exceedingly in the wilderness,
  - type: text
    content: And tempted God in the desert.
  '15':
  - type: text
    content: And he gave them their request;
  - type: text
    content: But sent leanness into their soul.
  '16':
  - type: text
    content: They envied Moses also in the camp,
  - type: text
    content: And
  - type: text
    content: ' Aaron the saint of the '
  - type: text
    content: LORD
  - type: text
    content: .
  '17':
  - type: text
    content: The earth opened and swallowed up Dathan,
  - type: text
    content: And covered the company of Abiram.
  '18':
  - type: text
    content: And a fire was kindled in their company;
  - type: text
    content: The flame burned up the wicked.
  '19':
  - type: text
    content: They made a calf in Horeb,
  - type: text
    content: And worshipped the molten image.
  '2':
  - type: text
    content: 'Who can utter the mighty acts of the '
  - type: text
    content: LORD
  - type: text
    content: '?'
  - type: text
    content: Who
  - type: text
    content: ' can shew forth all his praise?'
  '20':
  - type: text
    content: Thus they changed their glory
  - type: text
    content: Into the similitude of an ox that eateth grass.
  '21':
  - type: text
    content: They forgat God their saviour,
  - type: text
    content: Which had done great things in Egypt;
  '22':
  - type: text
    content: Wondrous works in the land of Ham,
  - type: text
    content: And
  - type: text
    content: ' terrible things by the Red sea.'
  '23':
  - type: text
    content: Therefore he said that he would destroy them, had not Moses his chosen stood before him in the breach,
  - type: text
    content: 'To turn away his wrath, lest he should destroy '
  - type: text
    content: them
  - type: text
    content: .
  '24':
  - type: text
    content: Yea, they despised the pleasant land,
  - type: text
    content: 'They believed not his word:'
  '25':
  - type: text
    content: But murmured in their tents,
  - type: text
    content: And
  - type: text
    content: ' hearkened not unto the voice of the '
  - type: text
    content: LORD
  - type: text
    content: .
  '26':
  - type: text
    content: Therefore he lifted up his hand against them,
  - type: text
    content: 'To overthrow them in the wilderness:'
  '27':
  - type: text
    content: To overthrow their seed also among the nations,
  - type: text
    content: And to scatter them in the lands.
  '28':
  - type: text
    content: They joined themselves also unto Baalpeor,
  - type: text
    content: And ate the sacrifices of the dead.
  '29':
  - type: text
    content: 'Thus they provoked '
  - type: text
    content: him
  - type: text
    content: ' to anger with their inventions:'
  - type: text
    content: And the plague brake in upon them.
  '3':
  - type: text
    content: 'Blessed '
  - type: text
    content: are
  - type: text
    content: ' they that keep judgment,'
  - type: text
    content: And
  - type: text
    content: ' he that doeth righteousness at all times.'
  '30':
  - type: text
    content: 'Then stood up Phinehas, and executed judgment:'
  - type: text
    content: 'And '
  - type: text
    content: so
  - type: text
    content: ' the plague was stayed.'
  '31':
  - type: text
    content: And that was counted unto him for righteousness
  - type: text
    content: Unto all generations for evermore.
  '32':
  - type: text
    content: 'They angered '
  - type: text
    content: him
  - type: text
    content: ' also at the waters of strife,'
  - type: text
    content: 'So that it went ill with Moses for their sakes:'
  '33':
  - type: text
    content: Because they provoked his spirit,
  - type: text
    content: So that he spake unadvisedly with his lips.
  '34':
  - type: text
    content: They did not destroy the nations,
  - type: text
    content: 'Concerning whom the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded them:'
  '35':
  - type: text
    content: But were mingled among
  - type: text
    content: the heathen, and learned their works.
  '36':
  - type: text
    content: 'And they served their idols: Which were a snare unto them.'
  '37':
  - type: text
    content: Yea, they sacrificed their sons and their daughters unto devils,
  '38':
  - type: text
    content: 'And shed innocent blood, '
  - type: text
    content: Even
  - type: text
    content: ' the blood of their sons and of their daughters,'
  - type: text
    content: 'Whom they sacrificed unto the idols of Canaan: And the land was polluted with blood.'
  '39':
  - type: text
    content: Thus were they defiled with their own works,
  - type: text
    content: And went a whoring with their own inventions.
  '4':
  - type: text
    content: 'Remember me, O '
  - type: text
    content: LORD
  - type: text
    content: ', with the favour '
  - type: text
    content: that thou bearest unto
  - type: text
    content: ' thy people:'
  - type: text
    content: O visit me with thy salvation;
  '40':
  - type: text
    content: 'Therefore was the wrath of the '
  - type: text
    content: LORD
  - type: text
    content: ' kindled against his people,'
  - type: text
    content: Insomuch that he abhorred his own inheritance.
  '41':
  - type: text
    content: And he gave them into the hand of the heathen;
  - type: text
    content: And they that hated them ruled over them.
  '42':
  - type: text
    content: Their enemies also oppressed them,
  - type: text
    content: And they were brought into subjection under their hand.
  '43':
  - type: text
    content: Many times did he deliver them;
  - type: text
    content: 'But they provoked '
  - type: text
    content: him
  - type: text
    content: ' with their counsel, and were brought low for their iniquity.'
  '44':
  - type: text
    content: Nevertheless he regarded their affliction,
  - type: text
    content: 'When he heard their cry:'
  '45':
  - type: text
    content: And he remembered for them his covenant, and repented according to the multitude of his mercies.
  '46':
  - type: text
    content: He made them also to be pitied of all those that carried them captives.
  '47':
  - type: text
    content: 'Save us, O '
  - type: text
    content: LORD
  - type: text
    content: ' our God, and gather us from among the heathen,'
  - type: text
    content: 'To give thanks unto thy holy name, '
  - type: text
    content: and
  - type: text
    content: ' to triumph in thy praise.'
  '48':
  - type: text
    content: 'Blessed '
  - type: text
    content: be
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel from everlasting to everlasting:'
  - type: text
    content: And let all the people say, Amen.
  - type: text
    content: 'Praise ye the '
  - type: text
    content: LORD
  - type: text
    content: .
  '5':
  - type: text
    content: That I may see the good of thy chosen,
  - type: text
    content: That I may rejoice in the gladness of thy nation, that I may glory with thine inheritance.
  '6':
  - type: text
    content: We have sinned with our fathers,
  - type: text
    content: We have committed iniquity, we have done wickedly.
  '7':
  - type: text
    content: Our fathers understood not thy wonders in Egypt; They remembered not the multitude of thy mercies;
  - type: text
    content: 'But provoked '
  - type: text
    content: him
  - type: text
    content: ' at the sea, '
  - type: text
    content: even
  - type: text
    content: ' at the Red sea.'
  '8':
  - type: text
    content: Nevertheless he saved them for his name's sake,
  - type: text
    content: That he might make his mighty power to be known.
  '9':
  - type: text
    content: 'He rebuked the Red sea also, and it was dried up:'
  - type: text
    content: So he led them through the depths, as through the wilderness.
