document_id: PSA.106,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Praise ye the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. O give thanks unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he is
    - type: text
      text: ' good:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For his mercy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: endureth
    - type: text
      text: ' for ever.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And he saved them from the hand of him that hated '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And redeemed them from the hand of the enemy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And the waters covered their enemies:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There was not one of them left.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Then believed they his words;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They sang his praise.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: They soon forgat his works;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They waited not for his counsel:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: But lusted exceedingly in the wilderness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And tempted God in the desert.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: And he gave them their request;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But sent leanness into their soul.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: They envied Moses also in the camp,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' Aaron the saint of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: The earth opened and swallowed up Dathan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And covered the company of Abiram.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: And a fire was kindled in their company;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The flame burned up the wicked.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: They made a calf in Horeb,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And worshipped the molten image.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Who can utter the mighty acts of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '?'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Who
    - type: text
      text: ' can shew forth all his praise?'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Thus they changed their glory
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Into the similitude of an ox that eateth grass.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: They forgat God their saviour,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Which had done great things in Egypt;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Wondrous works in the land of Ham,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' terrible things by the Red sea.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Therefore he said that he would destroy them, had not Moses his chosen stood before him in the breach,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To turn away his wrath, lest he should destroy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: .
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Yea, they despised the pleasant land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They believed not his word:'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: But murmured in their tents,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' hearkened not unto the voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Therefore he lifted up his hand against them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To overthrow them in the wilderness:'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: To overthrow their seed also among the nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And to scatter them in the lands.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: They joined themselves also unto Baalpeor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And ate the sacrifices of the dead.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Thus they provoked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' to anger with their inventions:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the plague brake in upon them.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' they that keep judgment,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' he that doeth righteousness at all times.'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Then stood up Phinehas, and executed judgment:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' the plague was stayed.'
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: And that was counted unto him for righteousness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Unto all generations for evermore.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'They angered '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' also at the waters of strife,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'So that it went ill with Moses for their sakes:'
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Because they provoked his spirit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So that he spake unadvisedly with his lips.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: They did not destroy the nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Concerning whom the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commanded them:'
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: But were mingled among
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the heathen, and learned their works.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'And they served their idols: Which were a snare unto them.'
  '37':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Yea, they sacrificed their sons and their daughters unto devils,
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'And shed innocent blood, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Even
    - type: text
      text: ' the blood of their sons and of their daughters,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Whom they sacrificed unto the idols of Canaan: And the land was polluted with blood.'
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Thus were they defiled with their own works,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And went a whoring with their own inventions.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Remember me, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', with the favour '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that thou bearest unto
    - type: text
      text: ' thy people:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O visit me with thy salvation;
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Therefore was the wrath of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' kindled against his people,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Insomuch that he abhorred his own inheritance.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: And he gave them into the hand of the heathen;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they that hated them ruled over them.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Their enemies also oppressed them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they were brought into subjection under their hand.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Many times did he deliver them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But they provoked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' with their counsel, and were brought low for their iniquity.'
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Nevertheless he regarded their affliction,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When he heard their cry:'
  '45':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: And he remembered for them his covenant, and repented according to the multitude of his mercies.
  '46':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: He made them also to be pitied of all those that carried them captives.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Save us, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God, and gather us from among the heathen,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To give thanks unto thy holy name, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' to triumph in thy praise.'
  '48':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel from everlasting to everlasting:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let all the people say, Amen.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: 'Praise ye the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: That I may see the good of thy chosen,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That I may rejoice in the gladness of thy nation, that I may glory with thine inheritance.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: We have sinned with our fathers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We have committed iniquity, we have done wickedly.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Our fathers understood not thy wonders in Egypt; They remembered not the multitude of thy mercies;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But provoked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' at the sea, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' at the Red sea.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Nevertheless he saved them for his name's sake,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That he might make his mighty power to be known.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'He rebuked the Red sea also, and it was dried up:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So he led them through the depths, as through the wilderness.
