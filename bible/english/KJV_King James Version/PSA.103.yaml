  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: So
  - type: text
    text: ' great is his mercy toward them that fear him.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
