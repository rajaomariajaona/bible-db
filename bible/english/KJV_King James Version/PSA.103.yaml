- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: For he knoweth our frame;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He remembereth that we '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' dust.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As for
  - type: text
    text: ' man, his days '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' as grass:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: As a flower of the field, so he flourisheth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
