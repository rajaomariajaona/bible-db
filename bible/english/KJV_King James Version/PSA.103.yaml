  - type: text
    text: ' for ever.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He hath not dealt with us after our sins;
- type: usfm
  marker: q2
  children:
