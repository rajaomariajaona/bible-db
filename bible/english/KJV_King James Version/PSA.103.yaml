- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' merciful and gracious,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Slow to anger, and plenteous in mercy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He will not always chide:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Neither will he keep '
