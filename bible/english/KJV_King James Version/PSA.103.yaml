document_id: PSA.103,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: A Psalm
    - type: text
      text: ' of David.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Bless the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', O my soul:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And all that is within me, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: bless
    - type: text
      text: ' his holy name.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: He hath not dealt with us after our sins;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor rewarded us according to our iniquities.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: For as the heaven is high above the earth,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: So
    - type: text
      text: ' great is his mercy toward them that fear him.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: As far as the east is from the west,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: So
    - type: text
      text: ' far hath he removed our transgressions from us.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Like as a father pitieth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' children,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: So
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' pitieth them that fear him.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: For he knoweth our frame;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He remembereth that we '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' dust.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: As for
    - type: text
      text: ' man, his days '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' as grass:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As a flower of the field, so he flourisheth.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: For the wind passeth over it, and it is gone;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the place thereof shall know it no more.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'But the mercy of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' from everlasting to everlasting upon them that fear him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his righteousness unto children's children;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: To such as keep his covenant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And to those that remember his commandments to do them.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath prepared his throne in the heavens;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his kingdom ruleth over all.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Bless the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', O my soul,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And forget not all his benefits:'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Bless the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', ye his angels, that excel in strength,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That do his commandments, hearkening unto the voice of his word.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Bless ye the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ye
    - type: text
      text: ' his hosts;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Ye
    - type: text
      text: ' ministers of his, that do his pleasure.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Bless the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', all his works in all places of his dominion:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Bless the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', O my soul.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Who forgiveth all thine iniquities;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who healeth all thy diseases;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Who redeemeth thy life from destruction;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who crowneth thee with lovingkindness and tender mercies;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Who satisfieth thy mouth with good '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: So that
    - type: text
      text: ' thy youth is renewed like the eagle''s.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' executeth righteousness and judgment'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For all that are oppressed.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: He made known his ways unto Moses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His acts unto the children of Israel.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' merciful and gracious,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Slow to anger, and plenteous in mercy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'He will not always chide:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Neither will he keep '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his anger
    - type: text
      text: ' for ever.'
