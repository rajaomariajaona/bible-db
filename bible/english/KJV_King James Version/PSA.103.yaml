  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Ye
  - type: text
    text: ' ministers of his, that do his pleasure.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
