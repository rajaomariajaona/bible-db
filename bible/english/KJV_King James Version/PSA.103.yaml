- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: So
  - type: text
    text: ' far hath he removed our transgressions from us.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Like as a father pitieth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' children,'
