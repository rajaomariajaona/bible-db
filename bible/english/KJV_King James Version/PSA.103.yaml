    children:
    - type: text
      text: '6'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' executeth righteousness and judgment'
- type: usfm
  marker: q2
  children:
