document_id: PSA.43
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Judge me, O God, and plead my cause against an ungodly nation:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: O deliver me from the deceitful and unjust man.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' the God of my strength: why dost thou cast me off?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why go I mourning because of the oppression of the enemy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'O send out thy light and thy truth: Let them lead me;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let them bring me unto thy holy hill, and to thy tabernacles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then will I go unto the altar of God, unto God my exceeding joy:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yea, upon the harp will I praise thee, O God my God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Why art thou cast down, O my soul?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And why art thou disquieted within me?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hope in God:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For I shall yet praise him, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Who is
  - type: text
    text: ' the health of my countenance, and my God.'
