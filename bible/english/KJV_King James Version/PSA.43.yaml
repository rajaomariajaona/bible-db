document_id: PSA.43,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Judge me, O God, and plead my cause against an ungodly nation:'
  - type: text
    content: O deliver me from the deceitful and unjust man.
  '2':
  - type: text
    content: 'For thou '
  - type: text
    content: art
  - type: text
    content: ' the God of my strength: why dost thou cast me off?'
  - type: text
    content: Why go I mourning because of the oppression of the enemy?
  '3':
  - type: text
    content: 'O send out thy light and thy truth: Let them lead me;'
  - type: text
    content: Let them bring me unto thy holy hill, and to thy tabernacles.
  '4':
  - type: text
    content: 'Then will I go unto the altar of God, unto God my exceeding joy:'
  - type: text
    content: Yea, upon the harp will I praise thee, O God my God.
  '5':
  - type: text
    content: Why art thou cast down, O my soul?
  - type: text
    content: And why art thou disquieted within me?
  - type: text
    content: 'Hope in God:'
  - type: text
    content: 'For I shall yet praise him, '
  - type: text
    content: Who is
  - type: text
    content: ' the health of my countenance, and my God.'
