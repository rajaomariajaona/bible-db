document_id: JHN.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Jesus
  - type: text
    text: ' passed by, he saw a man which was blind from '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' birth. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And his disciples asked him, saying, Master, who did sin, this man, or his parents, that he was born blind? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Neither hath this man sinned, nor his parents: but that the works of God should be made manifest in him.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I must work the works of him that sent me, while it is day: the night cometh, when no man can work.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: As long as I am in the world, I am the light of the world.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When he had thus spoken, he spat on the ground, and made clay of the spittle, and he anointed the eyes of the blind man with the clay, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Go, wash in the pool of Siloam,
  - type: text
    text: ' (which is by interpretation, Sent.) He went his way therefore, and washed, and came seeing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The neighbours therefore, and they which before had seen him that he was blind, said, Is not this he that sat and begged? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Some said, This is he: others '
  - type: usfm
    marker: add
    children:
    - type: text
      text: said
  - type: text
    text: ', He is like him: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' he said, I am '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Therefore said they unto him, How were thine eyes opened? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He answered and said, A man that is called Jesus made clay, and anointed mine eyes, and said unto me, Go to the pool of Siloam, and wash: and I went and washed, and I received sight. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then said they unto him, Where is he? He said, I know not.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'They brought to the Pharisees him that aforetime was blind. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And it was the sabbath day when Jesus made the clay, and opened his eyes. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then again the Pharisees also asked him how he had received his sight. He said unto them, He put clay upon mine eyes, and I washed, and do see. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Therefore said some of the Pharisees, This man is not of God, because he keepeth not the sabbath day. Others said, How can a man that is a sinner do such miracles? And there was a division among them. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: They say unto the blind man again, What sayest thou of him, that he hath opened thine eyes? He said, He is a prophet.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But the Jews did not believe concerning him, that he had been blind, and received his sight, until they called the parents of him that had received his sight. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And they asked them, saying, Is this your son, who ye say was born blind? how then doth he now see? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'His parents answered them and said, We know that this is our son, and that he was born blind: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'but by what means he now seeth, we know not; or who hath opened his eyes, we know not: he is of age; ask him: he shall speak for himself. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: words
  - type: text
    text: ' spake his parents, because they feared the Jews: for the Jews had agreed already, that if any man did confess that he was Christ, he should be put out of the synagogue. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Therefore said his parents, He is of age; ask him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then again called they the man that was blind, and said unto him, Give God the praise: we know that this man is a sinner. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'He answered and said, Whether he be a sinner '
  - type: usfm
    marker: add
    children:
    - type: text
      text: or no
  - type: text
    text: ', I know not: one thing I know, that, whereas I was blind, now I see. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then said they to him again, What did he to thee? how opened he thine eyes? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'He answered them, I have told you already, and ye did not hear: wherefore would ye hear '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' again? will ye also be his disciples? '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then they reviled him, and said, Thou art his disciple; but we are Moses'' disciples. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'We know that God spake unto Moses: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as for
  - type: text
    text: ' this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: fellow
  - type: text
    text: ', we know not from whence he is. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The man answered and said unto them, Why herein is a marvellous thing, that ye know not from whence he is, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yet
  - type: text
    text: ' he hath opened mine eyes. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Now we know that God heareth not sinners: but if any man be a worshipper of God, and doeth his will, him he heareth. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Since the world began was it not heard that any man opened the eyes of one that was born blind. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'If this man were not of God, he could do nothing. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'They answered and said unto him, Thou wast altogether born in sins, and dost thou teach us? And they cast him out. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jesus heard that they had cast him out; and when he had found him, he said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Dost thou believe on the Son of God?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'He answered and said, Who is he, Lord, that I might believe on him? '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And Jesus said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Thou hast both seen him, and it is he that talketh with thee.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: And he said, Lord, I believe. And he worshipped him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For judgment I am come into this world, that they which see not might see; and that they which see might be made blind.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' of the Pharisees which were with him heard these words, and said unto him, Are we blind also? '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Jesus said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'If ye were blind, ye should have no sin: but now ye say, We see; therefore your sin remaineth.'
