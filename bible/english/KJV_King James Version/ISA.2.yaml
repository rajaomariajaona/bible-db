document_id: ISA.2
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The word that Isaiah the son of Amoz saw concerning Judah and Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And it shall come to pass in the last days, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' the mountain of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s house shall be established in the top of the mountains, and shall be exalted above the hills; and all nations shall flow unto it. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And many people shall go and say, Come ye, and let us go up to the mountain of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', to the house of the God of Jacob; and he will teach us of his ways, and we will walk in his paths: for out of Zion shall go forth the law, and the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' from Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And he shall judge among the nations, and shall rebuke many people: and they shall beat their swords into plowshares, and their spears into pruninghooks: nation shall not lift up sword against nation, neither shall they learn war any more.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'O house of Jacob, come ye, and let us walk in the light of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Therefore thou hast forsaken thy people the house of Jacob, because they be replenished from the east, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' soothsayers like the Philistines, and they please themselves in the children of strangers. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Their land also is full of silver and gold, neither '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is there any
  - type: text
    text: ' end of their treasures; their land is also full of horses, neither '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is there any
  - type: text
    text: ' end of their chariots: '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'their land also is full of idols; they worship the work of their own hands, that which their own fingers have made: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and the mean man boweth down, and the great man humbleth himself: therefore forgive them not.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Enter into the rock, and hide thee in the dust, for fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and for the glory of his majesty. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The lofty looks of man shall be humbled, and the haughtiness of men shall be bowed down, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' alone shall be exalted in that day. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For the day of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' upon every '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one that is
  - type: text
    text: ' proud and lofty, and upon every '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one that is
  - type: text
    text: ' lifted up; and he shall be brought low: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and upon all the cedars of Lebanon, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that are
  - type: text
    text: ' high and lifted up, and upon all the oaks of Bashan, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and upon all the high mountains, and upon all the hills '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that are
  - type: text
    text: ' lifted up, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and upon every high tower, and upon every fenced wall, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and upon all the ships of Tarshish, and upon all pleasant pictures. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the loftiness of man shall be bowed down, and the haughtiness of men shall be made low: and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' alone shall be exalted in that day. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And the idols he shall utterly abolish.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And they shall go into the holes of the rocks, and into the caves of the earth, for fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and for the glory of his majesty, when he ariseth to shake terribly the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'In that day a man shall cast his idols of silver, and his idols of gold, which they made '
  - type: usfm
    marker: add
    children:
    - type: text
      text: each one
  - type: text
    text: ' for himself to worship, to the moles and to the bats; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'to go into the clefts of the rocks, and into the tops of the ragged rocks, for fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and for the glory of his majesty, when he ariseth to shake terribly the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Cease ye from man, whose breath '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in his nostrils: for wherein is he to be accounted of?'
