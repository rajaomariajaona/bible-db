document_id: ISA.2,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem
  - type: text
    content: The word that Isaiah the son of Amoz saw concerning Judah and Jerusalem.
  '10':
  - type: text
    content: 'Enter into the rock, and hide thee in the dust, for fear of the '
  - type: text
    content: LORD
  - type: text
    content: ', and for the glory of his majesty. '
  '11':
  - type: text
    content: 'The lofty looks of man shall be humbled, and the haughtiness of men shall be bowed down, and the '
  - type: text
    content: LORD
  - type: text
    content: ' alone shall be exalted in that day. '
  '12':
  - type: text
    content: 'For the day of the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts '
  - type: text
    content: shall be
  - type: text
    content: ' upon every '
  - type: text
    content: one that is
  - type: text
    content: ' proud and lofty, and upon every '
  - type: text
    content: one that is
  - type: text
    content: ' lifted up; and he shall be brought low: '
  '13':
  - type: text
    content: 'and upon all the cedars of Lebanon, '
  - type: text
    content: that are
  - type: text
    content: ' high and lifted up, and upon all the oaks of Bashan, '
  '14':
  - type: text
    content: 'and upon all the high mountains, and upon all the hills '
  - type: text
    content: that are
  - type: text
    content: ' lifted up, '
  '15':
  - type: text
    content: 'and upon every high tower, and upon every fenced wall, '
  '16':
  - type: text
    content: 'and upon all the ships of Tarshish, and upon all pleasant pictures. '
  '17':
  - type: text
    content: 'And the loftiness of man shall be bowed down, and the haughtiness of men shall be made low: and the '
  - type: text
    content: LORD
  - type: text
    content: ' alone shall be exalted in that day. '
  '18':
  - type: text
    content: And the idols he shall utterly abolish.
  '19':
  - type: text
    content: 'And they shall go into the holes of the rocks, and into the caves of the earth, for fear of the '
  - type: text
    content: LORD
  - type: text
    content: ', and for the glory of his majesty, when he ariseth to shake terribly the earth. '
  '2':
  - type: text
    content: 'And it shall come to pass in the last days, '
  - type: text
    content: that
  - type: text
    content: ' the mountain of the '
  - type: text
    content: LORD
  - type: text
    content: '''s house shall be established in the top of the mountains, and shall be exalted above the hills; and all nations shall flow unto it. '
  '20':
  - type: text
    content: 'In that day a man shall cast his idols of silver, and his idols of gold, which they made '
  - type: text
    content: each one
  - type: text
    content: ' for himself to worship, to the moles and to the bats; '
  '21':
  - type: text
    content: 'to go into the clefts of the rocks, and into the tops of the ragged rocks, for fear of the '
  - type: text
    content: LORD
  - type: text
    content: ', and for the glory of his majesty, when he ariseth to shake terribly the earth. '
  '22':
  - type: text
    content: 'Cease ye from man, whose breath '
  - type: text
    content: is
  - type: text
    content: ' in his nostrils: for wherein is he to be accounted of?'
  '3':
  - type: text
    content: 'And many people shall go and say, Come ye, and let us go up to the mountain of the '
  - type: text
    content: LORD
  - type: text
    content: ', to the house of the God of Jacob; and he will teach us of his ways, and we will walk in his paths: for out of Zion shall go forth the law, and the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' from Jerusalem. '
  '4':
  - type: text
    content: 'And he shall judge among the nations, and shall rebuke many people: and they shall beat their swords into plowshares, and their spears into pruninghooks: nation shall not lift up sword against nation, neither shall they learn war any more.'
  '5':
  - type: text
    content: 'O house of Jacob, come ye, and let us walk in the light of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Therefore thou hast forsaken thy people the house of Jacob, because they be replenished from the east, and '
  - type: text
    content: are
  - type: text
    content: ' soothsayers like the Philistines, and they please themselves in the children of strangers. '
  '7':
  - type: text
    content: 'Their land also is full of silver and gold, neither '
  - type: text
    content: is there any
  - type: text
    content: ' end of their treasures; their land is also full of horses, neither '
  - type: text
    content: is there any
  - type: text
    content: ' end of their chariots: '
  '8':
  - type: text
    content: 'their land also is full of idols; they worship the work of their own hands, that which their own fingers have made: '
  '9':
  - type: text
    content: 'and the mean man boweth down, and the great man humbleth himself: therefore forgive them not.'
