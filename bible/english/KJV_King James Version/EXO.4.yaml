document_id: EXO.4,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And Moses answered and said, But, behold, they will not believe me, nor hearken unto my voice: for they will say, The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath not appeared unto thee. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And Moses said unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', O my Lord, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' not eloquent, neither heretofore, nor since thou hast spoken unto thy servant: but I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' slow of speech, and of a slow tongue. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto him, Who hath made man''s mouth? or who maketh the dumb, or deaf, or the seeing, or the blind? have not I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Now therefore go, and I will be with thy mouth, and teach thee what thou shalt say. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And he said, O my Lord, send, I pray thee, by the hand '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of him whom
    - type: text
      text: ' thou wilt send. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And the anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was kindled against Moses, and he said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' not Aaron the Levite thy brother? I know that he can speak well. And also, behold, he cometh forth to meet thee: and when he seeth thee, he will be glad in his heart. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And thou shalt speak unto him, and put words in his mouth: and I will be with thy mouth, and with his mouth, and will teach you what ye shall do. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And he shall be thy spokesman unto the people: and he shall be, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' he shall be to thee instead of a mouth, and thou shalt be to him instead of God. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: And thou shalt take this rod in thine hand, wherewith thou shalt do signs.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Return to Egypt
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And Moses went and returned to Jethro his father in law, and said unto him, Let me go, I pray thee, and return unto my brethren which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in Egypt, and see whether they be yet alive. And Jethro said to Moses, Go in peace. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Moses in Midian, Go, return into Egypt: for all the men are dead which sought thy life. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto him, What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' that in thine hand? And he said, A rod. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And Moses took his wife and his sons, and set them upon an ass, and he returned to the land of Egypt: and Moses took the rod of God in his hand. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Moses, When thou goest to return into Egypt, see that thou do all those wonders before Pharaoh, which I have put in thine hand: but I will harden his heart, that he shall not let the people go. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And thou shalt say unto Pharaoh, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', Israel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my son, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' my firstborn: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'and I say unto thee, Let my son go, that he may serve me: and if thou refuse to let him go, behold, I will slay thy son, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' thy firstborn.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And it came to pass by the way in the inn, that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' met him, and sought to kill him. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Then Zipporah took a sharp stone, and cut off the foreskin of her son, and cast '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' at his feet, and said, Surely a bloody husband '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' thou to me. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'So he let him go: then she said, A bloody husband '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thou art
    - type: text
      text: ', because of the circumcision.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said to Aaron, Go into the wilderness to meet Moses. And he went, and met him in the mount of God, and kissed him. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And Moses told Aaron all the words of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' who had sent him, and all the signs which he had commanded him.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And Moses and Aaron went and gathered together all the elders of the children of Israel: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And he said, Cast it on the ground. And he cast it on the ground, and it became a serpent; and Moses fled from before it. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'and Aaron spake all the words which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had spoken unto Moses, and did the signs in the sight of the people. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And the people believed: and when they heard that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had visited the children of Israel, and that he had looked upon their affliction, then they bowed their heads and worshipped.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Moses, Put forth thine hand, and take it by the tail. And he put forth his hand, and caught it, and it became a rod in his hand: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'that they may believe that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of their fathers, the God of Abraham, the God of Isaac, and the God of Jacob, hath appeared unto thee.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said furthermore unto him, Put now thine hand into thy bosom. And he put his hand into his bosom: and when he took it out, behold, his hand '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' leprous as snow. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And he said, Put thine hand into thy bosom again. And he put his hand into his bosom again; and plucked it out of his bosom, and, behold, it was turned again as his '
    - type: usfm
      marker: add
      children:
      - type: text
        text: other
    - type: text
      text: ' flesh. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And it shall come to pass, if they will not believe thee, neither hearken to the voice of the first sign, that they will believe the voice of the latter sign. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And it shall come to pass, if they will not believe also these two signs, neither hearken unto thy voice, that thou shalt take of the water of the river, and pour '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' upon the dry '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'land:'
    - type: text
      text: ' and the water which thou takest out of the river shall become blood upon the dry '
    - type: usfm
      marker: add
      children:
      - type: text
        text: land
    - type: text
      text: .
