document_id: HEB.6,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Therefore leaving the principles of the doctrine of Christ, let us go on unto perfection; not laying again the foundation of repentance from dead works, and of faith toward God, '
  '10':
  - type: text
    content: 'For God '
  - type: text
    content: is
  - type: text
    content: ' not unrighteous to forget your work and labour of love, which ye have shewed toward his name, in that ye have ministered to the saints, and do minister. '
  '11':
  - type: text
    content: 'And we desire that every one of you do shew the same diligence to the full assurance of hope unto the end: '
  '12':
  - type: text
    content: that ye be not slothful, but followers of them who through faith and patience inherit the promises.
  '13':
  - type: text
    content: 'For when God made promise to Abraham, because he could swear by no greater, he sware by himself, '
  '14':
  - type: text
    content: 'saying, Surely blessing I will bless thee, and multiplying I will multiply thee. '
  '15':
  - type: text
    content: 'And so, after he had patiently endured, he obtained the promise. '
  '16':
  - type: text
    content: 'For men verily swear by the greater: and an oath for confirmation '
  - type: text
    content: is
  - type: text
    content: ' to them an end of all strife. '
  '17':
  - type: text
    content: 'Wherein God, willing more abundantly to shew unto the heirs of promise the immutability of his counsel, confirmed '
  - type: text
    content: it
  - type: text
    content: ' by an oath: '
  '18':
  - type: text
    content: 'that by two immutable things, in which '
  - type: text
    content: it was
  - type: text
    content: ' impossible for God to lie, we might have a strong consolation, who have fled for refuge to lay hold upon the hope set before us: '
  '19':
  - type: text
    content: 'which '
  - type: text
    content: hope
  - type: text
    content: ' we have as an anchor of the soul, both sure and stedfast, and which entereth into that within the veil; '
  '2':
  - type: text
    content: 'of the doctrine of baptisms, and of laying on of hands, and of resurrection of the dead, and of eternal judgment. '
  '20':
  - type: text
    content: 'whither the forerunner is for us entered, '
  - type: text
    content: even
  - type: text
    content: ' Jesus, made an high priest for ever after the order of Melchisedec.'
  '3':
  - type: text
    content: 'And this will we do, if God permit. '
  '4':
  - type: text
    content: 'For '
  - type: text
    content: it is
  - type: text
    content: ' impossible for those who were once enlightened, and have tasted of the heavenly gift, and were made partakers of the Holy Ghost, '
  '5':
  - type: text
    content: 'and have tasted the good word of God, and the powers of the world to come, '
  '6':
  - type: text
    content: 'if they shall fall away, to renew them again unto repentance; seeing they crucify to themselves the Son of God afresh, and put '
  - type: text
    content: him
  - type: text
    content: ' to an open shame. '
  '7':
  - type: text
    content: 'For the earth which drinketh in the rain that cometh oft upon it, and bringeth forth herbs meet for them by whom it is dressed, receiveth blessing from God: '
  '8':
  - type: text
    content: 'but that which beareth thorns and briers '
  - type: text
    content: is
  - type: text
    content: ' rejected, and '
  - type: text
    content: is
  - type: text
    content: ' nigh unto cursing; whose end '
  - type: text
    content: is
  - type: text
    content: ' to be burned.'
  '9':
  - type: text
    content: 'But, beloved, we are persuaded better things of you, and things that accompany salvation, though we thus speak. '
