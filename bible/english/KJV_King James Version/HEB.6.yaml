document_id: HEB.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Therefore leaving the principles of the doctrine of Christ, let us go on unto perfection; not laying again the foundation of repentance from dead works, and of faith toward God, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'of the doctrine of baptisms, and of laying on of hands, and of resurrection of the dead, and of eternal judgment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And this will we do, if God permit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' impossible for those who were once enlightened, and have tasted of the heavenly gift, and were made partakers of the Holy Ghost, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and have tasted the good word of God, and the powers of the world to come, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'if they shall fall away, to renew them again unto repentance; seeing they crucify to themselves the Son of God afresh, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' to an open shame. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For the earth which drinketh in the rain that cometh oft upon it, and bringeth forth herbs meet for them by whom it is dressed, receiveth blessing from God: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'but that which beareth thorns and briers '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' rejected, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' nigh unto cursing; whose end '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' to be burned.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But, beloved, we are persuaded better things of you, and things that accompany salvation, though we thus speak. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not unrighteous to forget your work and labour of love, which ye have shewed toward his name, in that ye have ministered to the saints, and do minister. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And we desire that every one of you do shew the same diligence to the full assurance of hope unto the end: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: that ye be not slothful, but followers of them who through faith and patience inherit the promises.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For when God made promise to Abraham, because he could swear by no greater, he sware by himself, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'saying, Surely blessing I will bless thee, and multiplying I will multiply thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And so, after he had patiently endured, he obtained the promise. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For men verily swear by the greater: and an oath for confirmation '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' to them an end of all strife. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Wherein God, willing more abundantly to shew unto the heirs of promise the immutability of his counsel, confirmed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' by an oath: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'that by two immutable things, in which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it was
  - type: text
    text: ' impossible for God to lie, we might have a strong consolation, who have fled for refuge to lay hold upon the hope set before us: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hope
  - type: text
    text: ' we have as an anchor of the soul, both sure and stedfast, and which entereth into that within the veil; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'whither the forerunner is for us entered, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' Jesus, made an high priest for ever after the order of Melchisedec.'
