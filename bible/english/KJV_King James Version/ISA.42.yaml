document_id: ISA.42,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Behold my Servant
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Behold my servant, whom I uphold; mine elect, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in whom
    - type: text
      text: ' my soul delighteth; I have put my spirit upon him: he shall bring forth judgment to the Gentiles. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Sing unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' a new song, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' his praise from the end of the earth, ye that go down to the sea, and all that is therein; the isles, and the inhabitants thereof. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Let the wilderness and the cities thereof lift up '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their voice
    - type: text
      text: ', the villages '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' Kedar doth inhabit: let the inhabitants of the rock sing, let them shout from the top of the mountains. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Let them give glory unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and declare his praise in the islands. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall go forth as a mighty man, he shall stir up jealousy like a man of war: he shall cry, yea, roar; he shall prevail against his enemies.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'I have long time holden my peace; I have been still, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' refrained myself: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: now
    - type: text
      text: ' will I cry like a travailing woman; I will destroy and devour at once. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'I will make waste mountains and hills, and dry up all their herbs; and I will make the rivers islands, and I will dry up the pools. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And I will bring the blind by a way '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' they knew not; I will lead them in paths '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' they have not known: I will make darkness light before them, and crooked things straight. These things will I do unto them, and not forsake them. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'They shall be turned back, they shall be greatly ashamed, that trust in graven images, that say to the molten images, Ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' our gods.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Hear, ye deaf; and look, ye blind, that ye may see. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' blind, but my servant? or deaf, as my messenger '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' I sent? who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' blind as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he that is
    - type: text
      text: ' perfect, and blind as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '''s servant? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He shall not cry, nor lift up, nor cause his voice to be heard in the street. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Seeing many things, but thou observest not; opening the ears, but he heareth not. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' is well pleased for his righteousness'' sake; he will magnify the law, and make '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' honourable. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'But this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a people robbed and spoiled; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they are
    - type: text
      text: ' all of them snared in holes, and they are hid in prison houses: they are for a prey, and none delivereth; for a spoil, and none saith, Restore.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Who among you will give ear to this? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: who
    - type: text
      text: ' will hearken and hear for the time to come? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Who gave Jacob for a spoil, and Israel to the robbers? did not the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', he against whom we have sinned? for they would not walk in his ways, neither were they obedient unto his law. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Therefore he hath poured upon him the fury of his anger, and the strength of battle: and it hath set him on fire round about, yet he knew not; and it burned him, yet he laid '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' not to heart.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'A bruised reed shall he not break, and the smoking flax shall he not quench: he shall bring forth judgment unto truth. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'He shall not fail nor be discouraged, till he have set judgment in the earth: and the isles shall wait for his law.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Thus saith God the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', he that created the heavens, and stretched them out; he that spread forth the earth, and that which cometh out of it; he that giveth breath unto the people upon it, and spirit to them that walk therein: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' have called thee in righteousness, and will hold thine hand, and will keep thee, and give thee for a covenant of the people, for a light of the Gentiles; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'to open the blind eyes, to bring out the prisoners from the prison, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' them that sit in darkness out of the prison house. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my name: and my glory will I not give to another, neither my praise to graven images. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Behold, the former things are come to pass, and new things do I declare: before they spring forth I tell you of them.'
