verses:
  '1':
  - type: heading
    content: Behold my Servant
  - type: text
    content: 'Behold my servant, whom I uphold; mine elect, '
  - type: text
    content: in whom
  - type: text
    content: ' my soul delighteth; I have put my spirit upon him: he shall bring forth judgment to the Gentiles. '
  '10':
  - type: text
    content: 'Sing unto the '
  - type: text
    content: LORD
  - type: text
    content: ' a new song, '
  - type: text
    content: and
  - type: text
    content: ' his praise from the end of the earth, ye that go down to the sea, and all that is therein; the isles, and the inhabitants thereof. '
  '11':
  - type: text
    content: 'Let the wilderness and the cities thereof lift up '
  - type: text
    content: their voice
  - type: text
    content: ', the villages '
  - type: text
    content: that
  - type: text
    content: ' Kedar doth inhabit: let the inhabitants of the rock sing, let them shout from the top of the mountains. '
  '12':
  - type: text
    content: 'Let them give glory unto the '
  - type: text
    content: LORD
  - type: text
    content: ', and declare his praise in the islands. '
  '13':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' shall go forth as a mighty man, he shall stir up jealousy like a man of war: he shall cry, yea, roar; he shall prevail against his enemies.'
  '14':
  - type: text
    content: 'I have long time holden my peace; I have been still, '
  - type: text
    content: and
  - type: text
    content: ' refrained myself: '
  - type: text
    content: now
  - type: text
    content: ' will I cry like a travailing woman; I will destroy and devour at once. '
  '15':
  - type: text
    content: 'I will make waste mountains and hills, and dry up all their herbs; and I will make the rivers islands, and I will dry up the pools. '
  '16':
  - type: text
    content: 'And I will bring the blind by a way '
  - type: text
    content: that
  - type: text
    content: ' they knew not; I will lead them in paths '
  - type: text
    content: that
  - type: text
    content: ' they have not known: I will make darkness light before them, and crooked things straight. These things will I do unto them, and not forsake them. '
  '17':
  - type: text
    content: 'They shall be turned back, they shall be greatly ashamed, that trust in graven images, that say to the molten images, Ye '
  - type: text
    content: are
  - type: text
    content: ' our gods.'
  '18':
  - type: text
    content: 'Hear, ye deaf; and look, ye blind, that ye may see. '
  '19':
  - type: text
    content: 'Who '
  - type: text
    content: is
  - type: text
    content: ' blind, but my servant? or deaf, as my messenger '
  - type: text
    content: that
  - type: text
    content: ' I sent? who '
  - type: text
    content: is
  - type: text
    content: ' blind as '
  - type: text
    content: he that is
  - type: text
    content: ' perfect, and blind as the '
  - type: text
    content: LORD
  - type: text
    content: '''s servant? '
  '2':
  - type: text
    content: 'He shall not cry, nor lift up, nor cause his voice to be heard in the street. '
  '20':
  - type: text
    content: 'Seeing many things, but thou observest not; opening the ears, but he heareth not. '
  '21':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' is well pleased for his righteousness'' sake; he will magnify the law, and make '
  - type: text
    content: it
  - type: text
    content: ' honourable. '
  '22':
  - type: text
    content: 'But this '
  - type: text
    content: is
  - type: text
    content: ' a people robbed and spoiled; '
  - type: text
    content: they are
  - type: text
    content: ' all of them snared in holes, and they are hid in prison houses: they are for a prey, and none delivereth; for a spoil, and none saith, Restore.'
  '23':
  - type: text
    content: 'Who among you will give ear to this? '
  - type: text
    content: who
  - type: text
    content: ' will hearken and hear for the time to come? '
  '24':
  - type: text
    content: 'Who gave Jacob for a spoil, and Israel to the robbers? did not the '
  - type: text
    content: LORD
  - type: text
    content: ', he against whom we have sinned? for they would not walk in his ways, neither were they obedient unto his law. '
  '25':
  - type: text
    content: 'Therefore he hath poured upon him the fury of his anger, and the strength of battle: and it hath set him on fire round about, yet he knew not; and it burned him, yet he laid '
  - type: text
    content: it
  - type: text
    content: ' not to heart.'
  '3':
  - type: text
    content: 'A bruised reed shall he not break, and the smoking flax shall he not quench: he shall bring forth judgment unto truth. '
  '4':
  - type: text
    content: 'He shall not fail nor be discouraged, till he have set judgment in the earth: and the isles shall wait for his law.'
  '5':
  - type: text
    content: 'Thus saith God the '
  - type: text
    content: LORD
  - type: text
    content: ', he that created the heavens, and stretched them out; he that spread forth the earth, and that which cometh out of it; he that giveth breath unto the people upon it, and spirit to them that walk therein: '
  '6':
  - type: text
    content: 'I the '
  - type: text
    content: LORD
  - type: text
    content: ' have called thee in righteousness, and will hold thine hand, and will keep thee, and give thee for a covenant of the people, for a light of the Gentiles; '
  '7':
  - type: text
    content: 'to open the blind eyes, to bring out the prisoners from the prison, '
  - type: text
    content: and
  - type: text
    content: ' them that sit in darkness out of the prison house. '
  '8':
  - type: text
    content: 'I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ': that '
  - type: text
    content: is
  - type: text
    content: ' my name: and my glory will I not give to another, neither my praise to graven images. '
  '9':
  - type: text
    content: 'Behold, the former things are come to pass, and new things do I declare: before they spring forth I tell you of them.'
