document_id: ISA.44
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Yet now hear, O Jacob my servant; and Israel, whom I have chosen: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' that made thee, and formed thee from the womb, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' will help thee; Fear not, O Jacob, my servant; and thou, Jesurun, whom I have chosen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For I will pour water upon him that is thirsty, and floods upon the dry ground: I will pour my spirit upon thy seed, and my blessing upon thine offspring: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and they shall spring up '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' among the grass, as willows by the water courses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'One shall say, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s; and another shall call '
  - type: usfm
    marker: add
    children:
    - type: text
      text: himself
  - type: text
    text: ' by the name of Jacob; and another shall subscribe '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' his hand unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and surname '
  - type: usfm
    marker: add
    children:
    - type: text
      text: himself
  - type: text
    text: ' by the name of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' the King of Israel, and his redeemer the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts; I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the first, and I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the last; and beside me '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And who, as I, shall call, and shall declare it, and set it in order for me, since I appointed the ancient people? and the things that are coming, and shall come, let them shew unto them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fear ye not, neither be afraid: have not I told thee from that time, and have declared '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it?
  - type: text
    text: ' ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' even my witnesses. Is there a God beside me? yea, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no God; I know not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Vanity of Idols
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'They that make a graven image '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' all of them vanity; and their delectable things shall not profit; and they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' their own witnesses; they see not, nor know; that they may be ashamed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Who hath formed a god, or molten a graven image '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' is profitable for nothing? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Behold, all his fellows shall be ashamed: and the workmen, they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' of men: let them all be gathered together, let them stand up; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yet
  - type: text
    text: ' they shall fear, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' they shall be ashamed together.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The smith with the tongs both worketh in the coals, and fashioneth it with hammers, and worketh it with the strength of his arms: yea, he is hungry, and his strength faileth: he drinketh no water, and is faint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The carpenter stretcheth out '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' rule; he marketh it out with a line; he fitteth it with planes, and he marketh it out with the compass, and maketh it after the figure of a man, according to the beauty of a man; that it may remain in the house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He heweth him down cedars, and taketh the cypress and the oak, which he strengtheneth for himself among the trees of the forest: he planteth an ash, and the rain doth nourish '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then shall it be for a man to burn: for he will take thereof, and warm himself; yea, he kindleth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and baketh bread; yea, he maketh a god, and worshippeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '; he maketh it a graven image, and falleth down thereto. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He burneth part thereof in the fire; with part thereof he eateth flesh; he roasteth roast, and is satisfied: yea, he warmeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: himself
  - type: text
    text: ', and saith, Aha, I am warm, I have seen the fire: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'and the residue thereof he maketh a god, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' his graven image: he falleth down unto it, and worshippeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and prayeth unto it, and saith, Deliver me; for thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' my god.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'They have not known nor understood: for he hath shut their eyes, that they cannot see; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' their hearts, that they cannot understand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And none considereth in his heart, neither '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is there
  - type: text
    text: ' knowledge nor understanding to say, I have burned part of it in the fire; yea, also I have baked bread upon the coals thereof; I have roasted flesh, and eaten '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'it:'
  - type: text
    text: ' and shall I make the residue thereof an abomination? shall I fall down to the stock of a tree? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'He feedeth on ashes: a deceived heart hath turned him aside, that he cannot deliver his soul, nor say, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is there
  - type: text
    text: ' not a lie in my right hand?'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Let the Universe Rejoice
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Remember these, O Jacob and Israel; for thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' my servant: I have formed thee; thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' my servant: O Israel, thou shalt not be forgotten of me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'I have blotted out, as a thick cloud, thy transgressions, and, as a cloud, thy sins: return unto me; for I have redeemed thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Sing, O ye heavens; for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath done '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'it:'
  - type: text
    text: ' shout, ye lower parts of the earth: break forth into singing, ye mountains, O forest, and every tree therein: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath redeemed Jacob, and glorified himself in Israel.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Choice of Cyrus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', thy redeemer, and he that formed thee from the womb, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' that maketh all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: '; that stretcheth forth the heavens alone; that spreadeth abroad the earth by myself; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'that frustrateth the tokens of the liars, and maketh diviners mad; that turneth wise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' backward, and maketh their knowledge foolish; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'that confirmeth the word of his servant, and performeth the counsel of his messengers; that saith to Jerusalem, Thou shalt be inhabited; and to the cities of Judah, Ye shall be built, and I will raise up the decayed places thereof: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'that saith to the deep, Be dry, and I will dry up thy rivers: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'that saith of Cyrus, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: He is
  - type: text
    text: ' my shepherd, and shall perform all my pleasure: even saying to Jerusalem, Thou shalt be built; and to the temple, Thy foundation shall be laid.'
