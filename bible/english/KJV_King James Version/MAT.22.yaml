    content: The Wedding Garment
  - type: text
    content: 'And Jesus answered and spake unto them again by parables, and said, '
  '10':
  - type: text
    content: 'So those servants went out into the highways, and gathered together all as many as they found, both bad and good: and the wedding was furnished with guests.'
  '11':
  - type: text
    content: ' '
  - type: text
    content: 'And when the king came in to see the guests, he saw there a man which had not on a wedding garment:'
  - type: text
    content: ' '
  '12':
  - type: text
    content: and he saith unto him, Friend, how camest thou in hither not having a wedding garment? And he was speechless.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Then said the king to the servants, Bind him hand and foot, and take him away, and cast '
  - type: text
    content: him
  - type: text
    content: ' into outer darkness; there shall be weeping and gnashing of teeth.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'For many are called, but few '
  - type: text
    content: are
  - type: text
    content: ' chosen.'
  - type: heading
    content: Tribute to Cæsar
  '15':
  - type: text
    content: 'Then went the Pharisees, and took counsel how they might entangle him in '
  - type: text
    content: his
  - type: text
    content: ' talk. '
  '16':
  - type: text
    content: 'And they sent out unto him their disciples with the Herodians, saying, Master, we know that thou art true, and teachest the way of God in truth, neither carest thou for any '
  - type: text
    content: man
  - type: text
    content: ': for thou regardest not the person of men. '
  '17':
  - type: text
    content: 'Tell us therefore, What thinkest thou? Is it lawful to give tribute unto Cæsar, or not? '
  '18':
  - type: text
    content: 'But Jesus perceived their wickedness, and said, '
  - type: text
    content: 'Why tempt ye me, '
  - type: text
    content: ye
  - type: text
    content: ' hypocrites?'
  - type: text
    content: ' '
  '19':
  - type: text
    content: Shew me the tribute money.
  - type: text
    content: ' And they brought unto him a penny. '
  '2':
  - type: text
    content: The kingdom of heaven is like unto a certain king, which made a marriage for his son,
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'And he saith unto them, '
  - type: text
    content: 'Whose '
  - type: text
    content: is
  - type: text
    content: ' this image and superscription?'
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'They say unto him, Cæsar''s. Then saith he unto them, '
  - type: text
    content: Render therefore unto Cæsar the things which are Cæsar's; and unto God the things that are God's.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'When they had heard '
  - type: text
    content: these words
  - type: text
    content: ', they marvelled, and left him, and went their way.'
  - type: heading
    content: Silencing the Sadducees
  '23':
  - type: text
    content: 'The same day came to him the Sadducees, which say that there is no resurrection, and asked him, '
  '24':
  - type: text
    content: 'saying, Master, Moses said, If a man die, having no children, his brother shall marry his wife, and raise up seed unto his brother. '
  '25':
  - type: text
    content: 'Now there were with us seven brethren: and the first, when he had married a wife, deceased, and, having no issue, left his wife unto his brother: '
  '26':
  - type: text
    content: 'likewise the second also, and the third, unto the seventh. '
  '27':
  - type: text
    content: 'And last of all the woman died also. '
  '28':
  - type: text
    content: 'Therefore in the resurrection whose wife shall she be of the seven? for they all had her. '
  '29':
  - type: text
    content: 'Jesus answered and said unto them, '
  - type: text
    content: Ye do err, not knowing the scriptures, nor the power of God.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'and sent forth his servants to call them that were bidden to the wedding: and they would not come.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: For in the resurrection they neither marry, nor are given in marriage, but are as the angels of God in heaven.
  - type: text
    content: ' '
  '31':
  - type: text
    content: But as touching the resurrection of the dead, have ye not read that which was spoken unto you by God, saying,
  - type: text
    content: ' '
  '32':
  - type: text
    content: I am the God of Abraham, and the God of Isaac, and the God of Jacob? God is not the God of the dead, but of the living.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'And when the multitude heard '
  - type: text
    content: this
  - type: text
    content: ', they were astonished at his doctrine.'
  - type: heading
    content: Reproving the Pharisees
  '34':
  - type: text
    content: 'But when the Pharisees had heard that he had put the Sadducees to silence, they were gathered together. '
  '35':
  - type: text
    content: 'Then one of them, '
  - type: text
    content: which was
  - type: text
    content: ' a lawyer, asked '
  - type: text
    content: him a question
  - type: text
    content: ', tempting him, and saying, '
  '36':
  - type: text
    content: 'Master, which '
  - type: text
    content: is
  - type: text
    content: ' the great commandment in the law? '
  '37':
  - type: text
    content: 'Jesus said unto him, '
  - type: text
    content: Thou shalt love the Lord thy God with all thy heart, and with all thy soul, and with all thy mind.
  - type: text
    content: ' '
  '38':
  - type: text
    content: This is the first and great commandment.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'And the second '
  - type: text
    content: is
  - type: text
    content: ' like unto it, Thou shalt love thy neighbour as thyself.'
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Again, he sent forth other servants, saying, Tell them which are bidden, Behold, I have prepared my dinner: my oxen and '
  - type: text
    content: my
  - type: text
    content: ' fatlings '
  - type: text
    content: are
  - type: text
    content: ' killed, and all things '
  - type: text
    content: are
  - type: text
    content: ' ready: come unto the marriage.'
  - type: text
    content: ' '
  '40':
  - type: text
    content: On these two commandments hang all the law and the prophets.
  '41':
  - type: text
    content: 'While the Pharisees were gathered together, Jesus asked them, '
  '42':
  - type: text
    content: 'saying, '
  - type: text
    content: What think ye of Christ? whose son is he?
  - type: text
    content: ' They say unto him, '
  - type: text
    content: The son
  - type: text
    content: ' of David. '
  '43':
  - type: text
    content: 'He saith unto them, '
  - type: text
    content: How then doth David in spirit call him Lord, saying,
  '44':
  - type: text
    content: ' '
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' said unto my Lord,'
  - type: text
    content: Sit thou on my right hand,
  - type: text
    content: Till I make thine enemies thy footstool?
  '45':
  - type: text
    content: ' '
  - type: text
    content: If David then call him Lord, how is he his son?
  - type: text
    content: ' '
  '46':
  - type: text
    content: 'And no man was able to answer him a word, neither durst any '
  - type: text
    content: man
  - type: text
    content: ' from that day forth ask him any more '
  - type: text
    content: questions
  - type: text
    content: .
  '5':
  - type: text
    content: 'But they made light of '
  - type: text
    content: it
  - type: text
