document_id: MAT.22,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Wedding Garment
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus answered and spake unto them again by parables, and said, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'So those servants went out into the highways, and gathered together all as many as they found, both bad and good: and the wedding was furnished with guests.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And when the king came in to see the guests, he saw there a man which had not on a wedding garment:'
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and he saith unto him, Friend, how camest thou in hither not having a wedding garment? And he was speechless.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Then said the king to the servants, Bind him hand and foot, and take him away, and cast '
      - type: usfm
        marker: add
        children:
        - type: text
          text: him
      - type: text
        text: ' into outer darkness; there shall be weeping and gnashing of teeth.'
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For many are called, but few '
      - type: usfm
        marker: add
        children:
        - type: text
          text: are
      - type: text
        text: ' chosen.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Tribute to Cæsar
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then went the Pharisees, and took counsel how they might entangle him in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' talk. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they sent out unto him their disciples with the Herodians, saying, Master, we know that thou art true, and teachest the way of God in truth, neither carest thou for any '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ': for thou regardest not the person of men. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tell us therefore, What thinkest thou? Is it lawful to give tribute unto Cæsar, or not? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus perceived their wickedness, and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Why tempt ye me, '
      - type: usfm
        marker: add
        children:
        - type: text
          text: ye
      - type: text
        text: ' hypocrites?'
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Shew me the tribute money.
    - type: text
      text: ' And they brought unto him a penny. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The kingdom of heaven is like unto a certain king, which made a marriage for his son,
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Whose '
      - type: usfm
        marker: add
        children:
        - type: text
          text: is
      - type: text
        text: ' this image and superscription?'
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They say unto him, Cæsar''s. Then saith he unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Render therefore unto Cæsar the things which are Cæsar's; and unto God the things that are God's.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they had heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: these words
    - type: text
      text: ', they marvelled, and left him, and went their way.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Silencing the Sadducees
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The same day came to him the Sadducees, which say that there is no resurrection, and asked him, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'saying, Master, Moses said, If a man die, having no children, his brother shall marry his wife, and raise up seed unto his brother. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now there were with us seven brethren: and the first, when he had married a wife, deceased, and, having no issue, left his wife unto his brother: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'likewise the second also, and the third, unto the seventh. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And last of all the woman died also. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore in the resurrection whose wife shall she be of the seven? for they all had her. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered and said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ye do err, not knowing the scriptures, nor the power of God.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and sent forth his servants to call them that were bidden to the wedding: and they would not come.'
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For in the resurrection they neither marry, nor are given in marriage, but are as the angels of God in heaven.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But as touching the resurrection of the dead, have ye not read that which was spoken unto you by God, saying,
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I am the God of Abraham, and the God of Isaac, and the God of Jacob? God is not the God of the dead, but of the living.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the multitude heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ', they were astonished at his doctrine.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Reproving the Pharisees
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when the Pharisees had heard that he had put the Sadducees to silence, they were gathered together. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then one of them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which was
    - type: text
      text: ' a lawyer, asked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him a question
    - type: text
      text: ', tempting him, and saying, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Master, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the great commandment in the law? '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Thou shalt love the Lord thy God with all thy heart, and with all thy soul, and with all thy mind.
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: This is the first and great commandment.
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And the second '
      - type: usfm
        marker: add
        children:
        - type: text
          text: is
      - type: text
        text: ' like unto it, Thou shalt love thy neighbour as thyself.'
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Again, he sent forth other servants, saying, Tell them which are bidden, Behold, I have prepared my dinner: my oxen and '
      - type: usfm
        marker: add
        children:
        - type: text
          text: my
      - type: text
        text: ' fatlings '
      - type: usfm
        marker: add
        children:
        - type: text
          text: are
      - type: text
        text: ' killed, and all things '
      - type: usfm
        marker: add
        children:
        - type: text
          text: are
      - type: text
        text: ' ready: come unto the marriage.'
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: On these two commandments hang all the law and the prophets.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While the Pharisees were gathered together, Jesus asked them, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: What think ye of Christ? whose son is he?
    - type: text
      text: ' They say unto him, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: The son
    - type: text
      text: ' of David. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: How then doth David in spirit call him Lord, saying,
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'The '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: LORD
      - type: text
        text: ' said unto my Lord,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Sit thou on my right hand,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Till I make thine enemies thy footstool?
  '45':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If David then call him Lord, how is he his son?
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And no man was able to answer him a word, neither durst any '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' from that day forth ask him any more '
    - type: usfm
      marker: add
      children:
      - type: text
        text: questions
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But they made light of '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ', and went their ways, one to his farm, another to his merchandise:'
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and the remnant took his servants, and entreated '
      - type: usfm
        marker: add
        children:
        - type: text
          text: them
      - type: text
        text: ' spitefully, and slew '
      - type: usfm
        marker: add
        children:
        - type: text
          text: them
      - type: text
        text: .
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But when the king heard '
      - type: usfm
        marker: add
        children:
        - type: text
          text: thereof
      - type: text
        text: ', he was wroth: and he sent forth his armies, and destroyed those murderers, and burned up their city.'
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Then saith he to his servants, The wedding is ready, but they which were bidden were not worthy.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Go ye therefore into the highways, and as many as ye shall find, bid to the marriage.
    - type: text
      text: ' '
