document_id: ECC.7,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Vanity of Fame
  - type: text
    content: 'A good name '
  - type: text
    content: is
  - type: text
    content: ' better than precious ointment; and the day of death than the day of one''s birth. '
  '10':
  - type: text
    content: 'Say not thou, What is '
  - type: text
    content: the cause
  - type: text
    content: ' that the former days were better than these? for thou dost not enquire wisely concerning this.'
  '11':
  - type: text
    content: 'Wisdom '
  - type: text
    content: is
  - type: text
    content: ' good with an inheritance: and '
  - type: text
    content: by it there is
  - type: text
    content: ' profit to them that see the sun. '
  '12':
  - type: text
    content: 'For wisdom '
  - type: text
    content: is
  - type: text
    content: ' a defence, '
  - type: text
    content: and
  - type: text
    content: ' money '
  - type: text
    content: is
  - type: text
    content: ' a defence: but the excellency of knowledge '
  - type: text
    content: is, that
  - type: text
    content: ' wisdom giveth life to them that have it. '
  '13':
  - type: text
    content: 'Consider the work of God: for who can make '
  - type: text
    content: that
  - type: text
    content: ' straight, which he hath made crooked? '
  '14':
  - type: text
    content: 'In the day of prosperity be joyful, but in the day of adversity consider: God also hath set the one over against the other, to the end that man should find nothing after him.'
  '15':
  - type: text
    content: 'All '
  - type: text
    content: things
  - type: text
    content: ' have I seen in the days of my vanity: there is a just '
  - type: text
    content: man
  - type: text
    content: ' that perisheth in his righteousness, and there is a wicked '
  - type: text
    content: man
  - type: text
    content: ' that prolongeth '
  - type: text
    content: his life
  - type: text
    content: ' in his wickedness. '
  '16':
  - type: text
    content: 'Be not righteous over much; neither make thyself over wise: why shouldest thou destroy thyself? '
  '17':
  - type: text
    content: 'Be not over much wicked, neither be thou foolish: why shouldest thou die before thy time? '
  '18':
  - type: text
    content: It is
  - type: text
    content: ' good that thou shouldest take hold of this; yea, also from this withdraw not thine hand: for he that feareth God shall come forth of them all.'
  '19':
  - type: text
    content: 'Wisdom strengtheneth the wise more than ten mighty '
  - type: text
    content: men
  - type: text
    content: ' which are in the city. '
  '2':
  - type: text
    content: It is
  - type: text
    content: ' better to go to the house of mourning, than to go to the house of feasting: for that '
  - type: text
    content: is
  - type: text
    content: ' the end of all men; and the living will lay '
  - type: text
    content: it
  - type: text
    content: ' to his heart. '
  '20':
  - type: text
    content: 'For '
  - type: text
    content: there is
  - type: text
    content: ' not a just man upon earth, that doeth good, and sinneth not. '
  '21':
  - type: text
    content: 'Also take no heed unto all words that are spoken; lest thou hear thy servant curse thee: '
  '22':
  - type: text
    content: for oftentimes also thine own heart knoweth that thou thyself likewise hast cursed others.
  - type: heading
    content: The Quest for Wisdom
  '23':
  - type: text
    content: 'All this have I proved by wisdom: I said, I will be wise; but it '
  - type: text
    content: was
  - type: text
    content: ' far from me. '
  '24':
  - type: text
    content: 'That which is far off, and exceeding deep, who can find it out? '
  '25':
  - type: text
    content: 'I applied mine heart to know, and to search, and to seek out wisdom, and the reason '
  - type: text
    content: of things
  - type: text
    content: ', and to know the wickedness of folly, even of foolishness '
  - type: text
    content: and
  - type: text
    content: ' madness: '
  '26':
  - type: text
    content: 'and I find more bitter than death the woman, whose heart '
  - type: text
    content: is
  - type: text
    content: ' snares and nets, '
  - type: text
    content: and
  - type: text
    content: ' her hands '
  - type: text
    content: as
  - type: text
    content: ' bands: whoso pleaseth God shall escape from her; but the sinner shall be taken by her. '
  '27':
  - type: text
    content: 'Behold, this have I found, saith the Preacher, '
  - type: text
    content: counting
  - type: text
    content: ' one by one, to find out the account: '
  '28':
  - type: text
    content: 'which yet my soul seeketh, but I find not: one man among a thousand have I found; but a woman among all those have I not found. '
  '29':
  - type: text
    content: Lo, this only have I found, that God hath made man upright; but they have sought out many inventions.
  '3':
  - type: text
    content: 'Sorrow '
  - type: text
    content: is
  - type: text
    content: ' better than laughter: for by the sadness of the countenance the heart is made better. '
  '4':
  - type: text
    content: 'The heart of the wise '
  - type: text
    content: is
  - type: text
    content: ' in the house of mourning; but the heart of fools '
  - type: text
    content: is
  - type: text
    content: ' in the house of mirth.'
  '5':
  - type: text
    content: ' '
  - type: text
    content: It is
  - type: text
    content: ' better to hear the rebuke of the wise, than for a man to hear the song of fools. '
  '6':
  - type: text
    content: 'For as the crackling of thorns under a pot, so '
  - type: text
    content: is
  - type: text
    content: ' the laughter of the fool: this also '
  - type: text
    content: is
  - type: text
    content: ' vanity. '
  '7':
  - type: text
    content: Surely oppression maketh a wise man mad; and a gift destroyeth the heart.
  '8':
  - type: text
    content: 'Better '
  - type: text
    content: is
  - type: text
    content: ' the end of a thing than the beginning thereof: '
  - type: text
    content: and
  - type: text
    content: ' the patient in spirit '
  - type: text
    content: is
  - type: text
    content: ' better than the proud in spirit. '
  '9':
  - type: text
    content: 'Be not hasty in thy spirit to be angry: for anger resteth in the bosom of fools. '
