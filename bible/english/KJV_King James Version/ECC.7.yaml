document_id: ECC.7
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Vanity of Fame
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A good name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' better than precious ointment; and the day of death than the day of one''s birth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' better to go to the house of mourning, than to go to the house of feasting: for that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the end of all men; and the living will lay '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to his heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Sorrow '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' better than laughter: for by the sadness of the countenance the heart is made better. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The heart of the wise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the house of mourning; but the heart of fools '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the house of mirth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' better to hear the rebuke of the wise, than for a man to hear the song of fools. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For as the crackling of thorns under a pot, so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the laughter of the fool: this also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' vanity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Surely oppression maketh a wise man mad; and a gift destroyeth the heart.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Better '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the end of a thing than the beginning thereof: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the patient in spirit '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' better than the proud in spirit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Be not hasty in thy spirit to be angry: for anger resteth in the bosom of fools. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Say not thou, What is '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the cause
  - type: text
    text: ' that the former days were better than these? for thou dost not enquire wisely concerning this.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Wisdom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' good with an inheritance: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: by it there is
  - type: text
    text: ' profit to them that see the sun. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For wisdom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a defence, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' money '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a defence: but the excellency of knowledge '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is, that
  - type: text
    text: ' wisdom giveth life to them that have it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Consider the work of God: for who can make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' straight, which he hath made crooked? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'In the day of prosperity be joyful, but in the day of adversity consider: God also hath set the one over against the other, to the end that man should find nothing after him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'All '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' have I seen in the days of my vanity: there is a just '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' that perisheth in his righteousness, and there is a wicked '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' that prolongeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his life
  - type: text
    text: ' in his wickedness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Be not righteous over much; neither make thyself over wise: why shouldest thou destroy thyself? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Be not over much wicked, neither be thou foolish: why shouldest thou die before thy time? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' good that thou shouldest take hold of this; yea, also from this withdraw not thine hand: for he that feareth God shall come forth of them all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Wisdom strengtheneth the wise more than ten mighty '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' which are in the city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' not a just man upon earth, that doeth good, and sinneth not. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Also take no heed unto all words that are spoken; lest thou hear thy servant curse thee: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: for oftentimes also thine own heart knoweth that thou thyself likewise hast cursed others.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Quest for Wisdom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'All this have I proved by wisdom: I said, I will be wise; but it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' far from me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'That which is far off, and exceeding deep, who can find it out? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'I applied mine heart to know, and to search, and to seek out wisdom, and the reason '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of things
  - type: text
    text: ', and to know the wickedness of folly, even of foolishness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' madness: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and I find more bitter than death the woman, whose heart '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' snares and nets, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' her hands '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' bands: whoso pleaseth God shall escape from her; but the sinner shall be taken by her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Behold, this have I found, saith the Preacher, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: counting
  - type: text
    text: ' one by one, to find out the account: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'which yet my soul seeketh, but I find not: one man among a thousand have I found; but a woman among all those have I not found. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Lo, this only have I found, that God hath made man upright; but they have sought out many inventions.
