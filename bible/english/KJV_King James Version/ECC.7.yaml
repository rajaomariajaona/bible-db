document_id: ECC.7,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Vanity of Fame
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A good name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' better than precious ointment; and the day of death than the day of one''s birth. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Say not thou, What is '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the cause
    - type: text
      text: ' that the former days were better than these? for thou dost not enquire wisely concerning this.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wisdom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' good with an inheritance: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: by it there is
    - type: text
      text: ' profit to them that see the sun. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For wisdom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a defence, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' money '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a defence: but the excellency of knowledge '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is, that
    - type: text
      text: ' wisdom giveth life to them that have it. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Consider the work of God: for who can make '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' straight, which he hath made crooked? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the day of prosperity be joyful, but in the day of adversity consider: God also hath set the one over against the other, to the end that man should find nothing after him.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' have I seen in the days of my vanity: there is a just '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' that perisheth in his righteousness, and there is a wicked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' that prolongeth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his life
    - type: text
      text: ' in his wickedness. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be not righteous over much; neither make thyself over wise: why shouldest thou destroy thyself? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be not over much wicked, neither be thou foolish: why shouldest thou die before thy time? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' good that thou shouldest take hold of this; yea, also from this withdraw not thine hand: for he that feareth God shall come forth of them all.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wisdom strengtheneth the wise more than ten mighty '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' which are in the city. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' better to go to the house of mourning, than to go to the house of feasting: for that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the end of all men; and the living will lay '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to his heart. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' not a just man upon earth, that doeth good, and sinneth not. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also take no heed unto all words that are spoken; lest thou hear thy servant curse thee: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: for oftentimes also thine own heart knoweth that thou thyself likewise hast cursed others.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Quest for Wisdom
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All this have I proved by wisdom: I said, I will be wise; but it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' far from me. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That which is far off, and exceeding deep, who can find it out? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I applied mine heart to know, and to search, and to seek out wisdom, and the reason '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of things
    - type: text
      text: ', and to know the wickedness of folly, even of foolishness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' madness: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and I find more bitter than death the woman, whose heart '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' snares and nets, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' her hands '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' bands: whoso pleaseth God shall escape from her; but the sinner shall be taken by her. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, this have I found, saith the Preacher, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: counting
    - type: text
      text: ' one by one, to find out the account: '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'which yet my soul seeketh, but I find not: one man among a thousand have I found; but a woman among all those have I not found. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lo, this only have I found, that God hath made man upright; but they have sought out many inventions.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sorrow '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' better than laughter: for by the sadness of the countenance the heart is made better. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The heart of the wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the house of mourning; but the heart of fools '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the house of mirth.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' better to hear the rebuke of the wise, than for a man to hear the song of fools. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For as the crackling of thorns under a pot, so '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the laughter of the fool: this also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' vanity. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Surely oppression maketh a wise man mad; and a gift destroyeth the heart.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Better '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the end of a thing than the beginning thereof: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the patient in spirit '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' better than the proud in spirit. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be not hasty in thy spirit to be angry: for anger resteth in the bosom of fools. '
