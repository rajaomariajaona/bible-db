document_id: PSA.23,1
type_code: eng
verses:
  '1':
  - type: text
    content: A Psalm of David.
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' my shepherd; I shall not want.'
  '2':
  - type: text
    content: 'He maketh me to lie down in green pastures:'
  - type: text
    content: He leadeth me beside the still waters.
  '3':
  - type: text
    content: 'He restoreth my soul:'
  - type: text
    content: He leadeth me in the paths of righteousness for his name's sake.
  '4':
  - type: text
    content: 'Yea, though I walk through the valley of the shadow of death, I will fear no evil:'
  - type: text
    content: 'for thou '
  - type: text
    content: art
  - type: text
    content: ' with me; Thy rod and thy staff they comfort me.'
  '5':
  - type: text
    content: 'Thou preparest a table before me in the presence of mine enemies:'
  - type: text
    content: Thou anointest my head with oil; my cup runneth over.
  '6':
  - type: text
    content: 'Surely goodness and mercy shall follow me all the days of my life:'
  - type: text
    content: 'And I will dwell in the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' for ever.'
