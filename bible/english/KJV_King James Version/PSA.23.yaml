document_id: PSA.23,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my shepherd; I shall not want.'
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He maketh me to lie down in green pastures:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He leadeth me beside the still waters.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He restoreth my soul:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He leadeth me in the paths of righteousness for his name's sake.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yea, though I walk through the valley of the shadow of death, I will fear no evil:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' with me; Thy rod and thy staff they comfort me.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou preparest a table before me in the presence of mine enemies:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou anointest my head with oil; my cup runneth over.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Surely goodness and mercy shall follow me all the days of my life:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And I will dwell in the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' for ever.'
