segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: A Psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my shepherd; I shall not want.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He maketh me to lie down in green pastures:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He leadeth me beside the still waters.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He restoreth my soul:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He leadeth me in the paths of righteousness for his name's sake.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Yea, though I walk through the valley of the shadow of death, I will fear no evil:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' with me; Thy rod and thy staff they comfort me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Thou preparest a table before me in the presence of mine enemies:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou anointest my head with oil; my cup runneth over.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Surely goodness and mercy shall follow me all the days of my life:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And I will dwell in the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' for ever.'
