document_id: MAT.3,1
type_code: eng
verses:
  '1':
  - type: heading
    content: His Baptism and Temptation
  - type: heading
    content: John the Baptist
  - type: text
    content: 'In those days came John the Baptist, preaching in the wilderness of Judæa, '
  '10':
  - type: text
    content: 'And now also the axe is laid unto the root of the trees: therefore every tree which bringeth not forth good fruit is hewn down, and cast into the fire. '
  '11':
  - type: text
    content: 'I indeed baptize you with water unto repentance: but he that cometh after me is mightier than I, whose shoes I am not worthy to bear: he shall baptize you with the Holy Ghost, and '
  - type: text
    content: with
  - type: text
    content: ' fire: '
  '12':
  - type: text
    content: 'whose fan '
  - type: text
    content: is
  - type: text
    content: ' in his hand, and he will throughly purge his floor, and gather his wheat into the garner; but he will burn up the chaff with unquenchable fire.'
  - type: heading
    content: The Baptism of Jesus
  '13':
  - type: text
    content: 'Then cometh Jesus from Galilee to Jordan unto John, to be baptized of him. '
  '14':
  - type: text
    content: 'But John forbad him, saying, I have need to be baptized of thee, and comest thou to me? '
  '15':
  - type: text
    content: 'And Jesus answering said unto him, '
  - type: text
    content: 'Suffer '
  - type: text
    content: it to be so
  - type: text
    content: ' now: for thus it becometh us to fulfil all righteousness.'
  - type: text
    content: ' Then he suffered him. '
  '16':
  - type: text
    content: 'And Jesus, when he was baptized, went up straightway out of the water: and, lo, the heavens were opened unto him, and he saw the Spirit of God descending like a dove, and lighting upon him: '
  '17':
  - type: text
    content: and lo a voice from heaven, saying, This is my beloved Son, in whom I am well pleased.
  '2':
  - type: text
    content: 'and saying, Repent ye: for the kingdom of heaven is at hand. '
  '3':
  - type: text
    content: For this is he that was spoken of by the prophet Esaias, saying,
  - type: text
    content: The voice of one crying in the wilderness,
  - type: text
    content: Prepare ye the way of the Lord,
  - type: text
    content: Make his paths straight.
  '4':
  - type: text
    content: 'And the same John had his raiment of camel''s hair, and a leathern girdle about his loins; and his meat was locusts and wild honey. '
  '5':
  - type: text
    content: 'Then went out to him Jerusalem, and all Judæa, and all the region round about Jordan, '
  '6':
  - type: text
    content: and were baptized of him in Jordan, confessing their sins.
  '7':
  - type: text
    content: 'But when he saw many of the Pharisees and Sadducees come to his baptism, he said unto them, O generation of vipers, who hath warned you to flee from the wrath to come? '
  '8':
  - type: text
    content: 'Bring forth therefore fruits meet for repentance: '
  '9':
  - type: text
    content: 'and think not to say within yourselves, We have Abraham to '
  - type: text
    content: our
  - type: text
    content: ' father: for I say unto you, that God is able of these stones to raise up children unto Abraham. '
