document_id: MAT.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: His Baptism and Temptation
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: John the Baptist
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In those days came John the Baptist, preaching in the wilderness of Judæa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and saying, Repent ye: for the kingdom of heaven is at hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For this is he that was spoken of by the prophet Esaias, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The voice of one crying in the wilderness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prepare ye the way of the Lord,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Make his paths straight.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And the same John had his raiment of camel''s hair, and a leathern girdle about his loins; and his meat was locusts and wild honey. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then went out to him Jerusalem, and all Judæa, and all the region round about Jordan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: and were baptized of him in Jordan, confessing their sins.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But when he saw many of the Pharisees and Sadducees come to his baptism, he said unto them, O generation of vipers, who hath warned you to flee from the wrath to come? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Bring forth therefore fruits meet for repentance: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and think not to say within yourselves, We have Abraham to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: our
  - type: text
    text: ' father: for I say unto you, that God is able of these stones to raise up children unto Abraham. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And now also the axe is laid unto the root of the trees: therefore every tree which bringeth not forth good fruit is hewn down, and cast into the fire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I indeed baptize you with water unto repentance: but he that cometh after me is mightier than I, whose shoes I am not worthy to bear: he shall baptize you with the Holy Ghost, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' fire: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'whose fan '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in his hand, and he will throughly purge his floor, and gather his wheat into the garner; but he will burn up the chaff with unquenchable fire.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Baptism of Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then cometh Jesus from Galilee to Jordan unto John, to be baptized of him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But John forbad him, saying, I have need to be baptized of thee, and comest thou to me? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Jesus answering said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Suffer '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it to be so
    - type: text
      text: ' now: for thus it becometh us to fulfil all righteousness.'
  - type: text
    text: ' Then he suffered him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And Jesus, when he was baptized, went up straightway out of the water: and, lo, the heavens were opened unto him, and he saw the Spirit of God descending like a dove, and lighting upon him: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: and lo a voice from heaven, saying, This is my beloved Son, in whom I am well pleased.
