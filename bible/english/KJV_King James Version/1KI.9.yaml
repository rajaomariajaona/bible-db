document_id: 1KI.9,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: God's Covenant
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, when Solomon had finished the building of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and the king''s house, and all Solomon''s desire which he was pleased to do, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass at the end of twenty years, when Solomon had built the two houses, the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and the king''s house, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: (
    - type: usfm
      marker: add
      children:
      - type: text
        text: now
    - type: text
      text: ' Hiram the king of Tyre had furnished Solomon with cedar trees and fir trees, and with gold, according to all his desire,) that then king Solomon gave Hiram twenty cities in the land of Galilee. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Hiram came out from Tyre to see the cities which Solomon had given him; and they pleased him not. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, What cities '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' these which thou hast given me, my brother? And he called them the land of Cabul unto this day. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Hiram sent to the king sixscore talents of gold.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the reason of the levy which king Solomon raised; for to build the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and his own house, and Millo, and the wall of Jerusalem, and Hazor, and Megiddo, and Gezer. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: For
    - type: text
      text: ' Pharaoh king of Egypt had gone up, and taken Gezer, and burnt it with fire, and slain the Canaanites that dwelt in the city, and given it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a present unto his daughter, Solomon''s wife. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Solomon built Gezer, and Beth-horon the nether, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Baalath, and Tadmor in the wilderness, in the land, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and all the cities of store that Solomon had, and cities for his chariots, and cities for his horsemen, and that which Solomon desired to build in Jerusalem, and in Lebanon, and in all the land of his dominion. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' appeared to Solomon the second time, as he had appeared unto him at Gibeon. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' all the people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that were
    - type: text
      text: ' left of the Amorites, Hittites, Perizzites, Hivites, and Jebusites, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' not of the children of Israel, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'their children that were left after them in the land, whom the children of Israel also were not able utterly to destroy, upon those did Solomon levy a tribute of bondservice unto this day. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But of the children of Israel did Solomon make no bondmen: but they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' men of war, and his servants, and his princes, and his captains, and rulers of his chariots, and his horsemen. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' the chief of the officers that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' over Solomon''s work, five hundred and fifty, which bare rule over the people that wrought in the work.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Pharaoh''s daughter came up out of the city of David unto her house which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Solomon
    - type: text
      text: ' had built for her: then did he build Millo.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And three times in a year did Solomon offer burnt offerings and peace offerings upon the altar which he built unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and he burnt incense upon the altar that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: . So he finished the house.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And king Solomon made a navy of ships in Ezion-geber, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' beside Eloth, on the shore of the Red sea, in the land of Edom. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Hiram sent in the navy his servants, shipmen that had knowledge of the sea, with the servants of Solomon. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they came to Ophir, and fetched from thence gold, four hundred and twenty talents, and brought '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to king Solomon.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto him, I have heard thy prayer and thy supplication, that thou hast made before me: I have hallowed this house, which thou hast built, to put my name there for ever; and mine eyes and mine heart shall be there perpetually. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if thou wilt walk before me, as David thy father walked, in integrity of heart, and in uprightness, to do according to all that I have commanded thee, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' wilt keep my statutes and my judgments: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then I will establish the throne of thy kingdom upon Israel for ever, as I promised to David thy father, saying, There shall not fail thee a man upon the throne of Israel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: But
    - type: text
      text: ' if ye shall at all turn from following me, ye or your children, and will not keep my commandments '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' my statutes which I have set before you, but go and serve other gods, and worship them: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then will I cut off Israel out of the land which I have given them; and this house, which I have hallowed for my name, will I cast out of my sight; and Israel shall be a proverb and a byword among all people: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and at this house, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' is high, every one that passeth by it shall be astonished, and shall hiss; and they shall say, Why hath the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' done thus unto this land, and to this house? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they shall answer, Because they forsook the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' their God, who brought forth their fathers out of the land of Egypt, and have taken hold upon other gods, and have worshipped them, and served them: therefore hath the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' brought upon them all this evil.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Cities and Ships
    marker-yv: yv-h
