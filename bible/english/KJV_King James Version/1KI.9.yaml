  - type: text
    content: 'And it came to pass, when Solomon had finished the building of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and the king''s house, and all Solomon''s desire which he was pleased to do, '
  '10':
  - type: text
    content: 'And it came to pass at the end of twenty years, when Solomon had built the two houses, the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and the king''s house, '
  '11':
  - type: text
    content: (
  - type: text
    content: now
  - type: text
    content: ' Hiram the king of Tyre had furnished Solomon with cedar trees and fir trees, and with gold, according to all his desire,) that then king Solomon gave Hiram twenty cities in the land of Galilee. '
  '12':
  - type: text
    content: 'And Hiram came out from Tyre to see the cities which Solomon had given him; and they pleased him not. '
  '13':
  - type: text
    content: 'And he said, What cities '
  - type: text
    content: are
  - type: text
    content: ' these which thou hast given me, my brother? And he called them the land of Cabul unto this day. '
  '14':
  - type: text
    content: And Hiram sent to the king sixscore talents of gold.
  '15':
  - type: text
    content: 'And this '
  - type: text
    content: is
  - type: text
    content: ' the reason of the levy which king Solomon raised; for to build the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and his own house, and Millo, and the wall of Jerusalem, and Hazor, and Megiddo, and Gezer. '
  '16':
  - type: text
    content: For
  - type: text
    content: ' Pharaoh king of Egypt had gone up, and taken Gezer, and burnt it with fire, and slain the Canaanites that dwelt in the city, and given it '
  - type: text
    content: for
  - type: text
    content: ' a present unto his daughter, Solomon''s wife. '
  '17':
  - type: text
    content: 'And Solomon built Gezer, and Beth-horon the nether, '
  '18':
  - type: text
    content: 'and Baalath, and Tadmor in the wilderness, in the land, '
  '19':
  - type: text
    content: 'and all the cities of store that Solomon had, and cities for his chariots, and cities for his horsemen, and that which Solomon desired to build in Jerusalem, and in Lebanon, and in all the land of his dominion. '
  '2':
  - type: text
    content: 'that the '
  - type: text
    content: LORD
  - type: text
    content: ' appeared to Solomon the second time, as he had appeared unto him at Gibeon. '
  '20':
  - type: text
    content: And
  - type: text
    content: ' all the people '
  - type: text
    content: that were
  - type: text
    content: ' left of the Amorites, Hittites, Perizzites, Hivites, and Jebusites, which '
  - type: text
    content: were
  - type: text
    content: ' not of the children of Israel, '
  '21':
  - type: text
    content: 'their children that were left after them in the land, whom the children of Israel also were not able utterly to destroy, upon those did Solomon levy a tribute of bondservice unto this day. '
  '22':
  - type: text
    content: 'But of the children of Israel did Solomon make no bondmen: but they '
  - type: text
    content: were
  - type: text
    content: ' men of war, and his servants, and his princes, and his captains, and rulers of his chariots, and his horsemen. '
  '23':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' the chief of the officers that '
  - type: text
    content: were
  - type: text
    content: ' over Solomon''s work, five hundred and fifty, which bare rule over the people that wrought in the work.'
  '24':
  - type: text
    content: 'But Pharaoh''s daughter came up out of the city of David unto her house which '
  - type: text
    content: Solomon
  - type: text
    content: ' had built for her: then did he build Millo.'
  '25':
  - type: text
    content: 'And three times in a year did Solomon offer burnt offerings and peace offerings upon the altar which he built unto the '
  - type: text
    content: LORD
  - type: text
    content: ', and he burnt incense upon the altar that '
  - type: text
    content: was
  - type: text
    content: ' before the '
  - type: text
    content: LORD
  - type: text
    content: . So he finished the house.
  '26':
  - type: text
    content: 'And king Solomon made a navy of ships in Ezion-geber, which '
  - type: text
    content: is
  - type: text
    content: ' beside Eloth, on the shore of the Red sea, in the land of Edom. '
  '27':
  - type: text
    content: 'And Hiram sent in the navy his servants, shipmen that had knowledge of the sea, with the servants of Solomon. '
  '28':
  - type: text
    content: 'And they came to Ophir, and fetched from thence gold, four hundred and twenty talents, and brought '
  - type: text
    content: it
  - type: text
    content: ' to king Solomon.'
  '3':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto him, I have heard thy prayer and thy supplication, that thou hast made before me: I have hallowed this house, which thou hast built, to put my name there for ever; and mine eyes and mine heart shall be there perpetually. '
  '4':
  - type: text
    content: 'And if thou wilt walk before me, as David thy father walked, in integrity of heart, and in uprightness, to do according to all that I have commanded thee, '
  - type: text
    content: and
  - type: text
    content: ' wilt keep my statutes and my judgments: '
  '5':
  - type: text
    content: 'then I will establish the throne of thy kingdom upon Israel for ever, as I promised to David thy father, saying, There shall not fail thee a man upon the throne of Israel. '
  '6':
  - type: text
    content: But
  - type: text
    content: ' if ye shall at all turn from following me, ye or your children, and will not keep my commandments '
  - type: text
    content: and
  - type: text
    content: ' my statutes which I have set before you, but go and serve other gods, and worship them: '
  '7':
  - type: text
    content: 'then will I cut off Israel out of the land which I have given them; and this house, which I have hallowed for my name, will I cast out of my sight; and Israel shall be a proverb and a byword among all people: '
  '8':
  - type: text
    content: 'and at this house, '
  - type: text
    content: which
  - type: text
    content: ' is high, every one that passeth by it shall be astonished, and shall hiss; and they shall say, Why hath the '
  - type: text
    content: LORD
  - type: text
    content: ' done thus unto this land, and to this house? '
  '9':
  - type: text
    content: 'And they shall answer, Because they forsook the '
  - type: text
    content: LORD
  - type: text
    content: ' their God, who brought forth their fathers out of the land of Egypt, and have taken hold upon other gods, and have worshipped them, and served them: therefore hath the '
  - type: text
    content: LORD
  - type: text
    content: ' brought upon them all this evil.'
