document_id: PSA.53
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'To the chief Musician upon Mahalath, Maschil, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: A Psalm
  - type: text
    text: ' of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The fool hath said in his heart,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' no God.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Corrupt are they, and have done abominable iniquity:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' none that doeth good.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: God looked down from heaven upon the children of men,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'To see if there were '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' that did understand, that did seek God.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Every one of them is gone back: they are altogether become filthy;'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' none that doeth good, no, not one.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Have the workers of iniquity no knowledge?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Who eat up my people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' they eat bread: They have not called upon God.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'There were they in great fear, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: where
  - type: text
    text: ' no fear was:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For God hath scattered the bones of him that encampeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: against
  - type: text
    text: ' thee:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Thou hast put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' to shame,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: because God hath despised them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Oh that the salvation of Israel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were come
  - type: text
    text: ' out of Zion!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: When God bringeth back the captivity of his people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jacob shall rejoice,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' Israel shall be glad.'
