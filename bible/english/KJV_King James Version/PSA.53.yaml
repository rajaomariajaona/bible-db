document_id: PSA.53,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'To the chief Musician upon Mahalath, Maschil, '
  - type: text
    content: A Psalm
  - type: text
    content: ' of David.'
  - type: text
    content: The fool hath said in his heart,
  - type: text
    content: There is
  - type: text
    content: ' no God.'
  - type: text
    content: 'Corrupt are they, and have done abominable iniquity:'
  - type: text
    content: There is
  - type: text
    content: ' none that doeth good.'
  '2':
  - type: text
    content: God looked down from heaven upon the children of men,
  - type: text
    content: 'To see if there were '
  - type: text
    content: any
  - type: text
    content: ' that did understand, that did seek God.'
  '3':
  - type: text
    content: 'Every one of them is gone back: they are altogether become filthy;'
  - type: text
    content: There is
  - type: text
    content: ' none that doeth good, no, not one.'
  '4':
  - type: text
    content: Have the workers of iniquity no knowledge?
  - type: text
    content: 'Who eat up my people '
  - type: text
    content: as
  - type: text
    content: ' they eat bread: They have not called upon God.'
  '5':
  - type: text
    content: 'There were they in great fear, '
  - type: text
    content: where
  - type: text
    content: ' no fear was:'
  - type: text
    content: 'For God hath scattered the bones of him that encampeth '
  - type: text
    content: against
  - type: text
    content: ' thee:'
  - type: text
    content: 'Thou hast put '
  - type: text
    content: them
  - type: text
    content: ' to shame,'
  - type: text
    content: because God hath despised them.
  '6':
  - type: text
    content: 'Oh that the salvation of Israel '
  - type: text
    content: were come
  - type: text
    content: ' out of Zion!'
  - type: text
    content: When God bringeth back the captivity of his people,
  - type: text
    content: Jacob shall rejoice,
  - type: text
    content: And
  - type: text
    content: ' Israel shall be glad.'
