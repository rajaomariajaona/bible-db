document_id: LUK.10,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Seventy Evangelists
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'After these things the Lord appointed other seventy also, and sent them two and two before his face into every city and place, whither he himself would come. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But into whatsoever city ye enter, and they receive you not, go your ways out into the streets of the same, and say,
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Even the very dust of your city, which cleaveth on us, we do wipe off against you: notwithstanding be ye sure of this, that the kingdom of God is come nigh unto you.'
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But I say unto you, that it shall be more tolerable in that day for Sodom, than for that city.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Woe unto thee, Chorazin! woe unto thee, Bethsaida! for if the mighty works had been done in Tyre and Sidon, which have been done in you, they had a great while ago repented, sitting in sackcloth and ashes.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But it shall be more tolerable for Tyre and Sidon at the judgment, than for you.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And thou, Capernaum, which art exalted to heaven, shalt be thrust down to hell.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He that heareth you heareth me; and he that despiseth you despiseth me; and he that despiseth me despiseth him that sent me.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Their Return
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And the seventy returned again with joy, saying, Lord, even the devils are subject unto us through thy name. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I beheld Satan as lightning fall from heaven.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Behold, I give unto you power to tread on serpents and scorpions, and over all the power of the enemy: and nothing shall by any means hurt you.'
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Therefore said he unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'The harvest truly '
      - type: usfm
        marker: add
        children:
        - type: text
          text: is
      - type: text
        text: ' great, but the labourers '
      - type: usfm
        marker: add
        children:
        - type: text
          text: are
      - type: text
        text: ' few: pray ye therefore the Lord of the harvest, that he would send forth labourers into his harvest.'
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Notwithstanding in this rejoice not, that the spirits are subject unto you; but rather rejoice, because your names are written in heaven.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Thanksgiving
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'In that hour Jesus rejoiced in spirit, and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I thank thee, O Father, Lord of heaven and earth, that thou hast hid these things from the wise and prudent, and hast revealed them unto babes: even so, Father; for so it seemed good in thy sight.'
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'All things are delivered to me of my Father: and no man knoweth who the Son is, but the Father; and who the Father is, but the Son, and '
      - type: usfm
        marker: add
        children:
        - type: text
          text: he
      - type: text
        text: ' to whom the Son will reveal '
      - type: usfm
        marker: add
        children:
        - type: text
          text: him
      - type: text
        text: .
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And he turned him unto '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' disciples, and said privately, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Blessed '
      - type: usfm
        marker: add
        children:
        - type: text
          text: are
      - type: text
        text: ' the eyes which see the things that ye see:'
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'for I tell you, that many prophets and kings have desired to see those things which ye see, and have not seen '
      - type: usfm
        marker: add
        children:
        - type: text
          text: them
      - type: text
        text: '; and to hear those things which ye hear, and have not heard '
      - type: usfm
        marker: add
        children:
        - type: text
          text: them
      - type: text
        text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Good Samaritan
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And, behold, a certain lawyer stood up, and tempted him, saying, Master, what shall I do to inherit eternal life? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'He said unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: What is written in the law? how readest thou?
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And he answering said, Thou shalt love the Lord thy God with all thy heart, and with all thy soul, and with all thy strength, and with all thy mind; and thy neighbour as thyself. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And he said unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Thou hast answered right: this do, and thou shalt live.'
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: But he, willing to justify himself, said unto Jesus, And who is my neighbour?
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Go your ways: behold, I send you forth as lambs among wolves.'
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And Jesus answering said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'A certain '
      - type: usfm
        marker: add
        children:
        - type: text
          text: man
      - type: text
        text: ' went down from Jerusalem to Jericho, and fell among thieves, which stripped him of his raiment, and wounded '
      - type: usfm
        marker: add
        children:
        - type: text
          text: him
      - type: text
        text: ', and departed, leaving '
      - type: usfm
        marker: add
        children:
        - type: text
          text: him
      - type: text
        text: ' half dead.'
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And by chance there came down a certain priest that way: and when he saw him, he passed by on the other side.'
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And likewise a Levite, when he was at the place, came and looked '
      - type: usfm
        marker: add
        children:
        - type: text
          text: on him
      - type: text
        text: ', and passed by on the other side.'
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But a certain Samaritan, as he journeyed, came where he was: and when he saw him, he had compassion '
      - type: usfm
        marker: add
        children:
        - type: text
          text: on him
      - type: text
        text: ','
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and went to '
      - type: usfm
        marker: add
        children:
        - type: text
          text: him
      - type: text
        text: ', and bound up his wounds, pouring in oil and wine, and set him on his own beast, and brought him to an inn, and took care of him.'
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And on the morrow when he departed, he took out two pence, and gave '
      - type: usfm
        marker: add
        children:
        - type: text
          text: them
      - type: text
        text: ' to the host, and said unto him, Take care of him; and whatsoever thou spendest more, when I come again, I will repay thee.'
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Which now of these three, thinkest thou, was neighbour unto him that fell among the thieves?
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'And he said, He that shewed mercy on him. Then said Jesus unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Go, and do thou likewise.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Martha and Mary
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Now it came to pass, as they went, that he entered into a certain village: and a certain woman named Martha received him into her house. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'And she had a sister called Mary, which also sat at Jesus'' feet, and heard his word. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Carry neither purse, nor scrip, nor shoes: and salute no man by the way.'
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'But Martha was cumbered about much serving, and came to him, and said, Lord, dost thou not care that my sister hath left me to serve alone? bid her therefore that she help me. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'And Jesus answered and said unto her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Martha, Martha, thou art careful and troubled about many things:'
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'but one thing is needful: and Mary hath chosen that good part, which shall not be taken away from her.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And into whatsoever house ye enter, first say, Peace '
      - type: usfm
        marker: add
        children:
        - type: text
          text: be
      - type: text
        text: ' to this house.'
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And if the son of peace be there, your peace shall rest upon it: if not, it shall turn to you again.'
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And in the same house remain, eating and drinking such things as they give: for the labourer is worthy of his hire. Go not from house to house.'
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And into whatsoever city ye enter, and they receive you, eat such things as are set before you:'
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and heal the sick that are therein, and say unto them, The kingdom of God is come nigh unto you.
    - type: text
      text: ' '
