document_id: LUK.10,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Seventy Evangelists
  - type: text
    content: 'After these things the Lord appointed other seventy also, and sent them two and two before his face into every city and place, whither he himself would come. '
  '10':
  - type: text
    content: But into whatsoever city ye enter, and they receive you not, go your ways out into the streets of the same, and say,
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Even the very dust of your city, which cleaveth on us, we do wipe off against you: notwithstanding be ye sure of this, that the kingdom of God is come nigh unto you.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: But I say unto you, that it shall be more tolerable in that day for Sodom, than for that city.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Woe unto thee, Chorazin! woe unto thee, Bethsaida! for if the mighty works had been done in Tyre and Sidon, which have been done in you, they had a great while ago repented, sitting in sackcloth and ashes.
  - type: text
    content: ' '
  '14':
  - type: text
    content: But it shall be more tolerable for Tyre and Sidon at the judgment, than for you.
  - type: text
    content: ' '
  '15':
  - type: text
    content: And thou, Capernaum, which art exalted to heaven, shalt be thrust down to hell.
  - type: text
    content: ' '
  '16':
  - type: text
    content: He that heareth you heareth me; and he that despiseth you despiseth me; and he that despiseth me despiseth him that sent me.
  - type: heading
    content: Their Return
  '17':
  - type: text
    content: 'And the seventy returned again with joy, saying, Lord, even the devils are subject unto us through thy name. '
  '18':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: I beheld Satan as lightning fall from heaven.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Behold, I give unto you power to tread on serpents and scorpions, and over all the power of the enemy: and nothing shall by any means hurt you.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Therefore said he unto them, '
  - type: text
    content: 'The harvest truly '
  - type: text
    content: is
  - type: text
    content: ' great, but the labourers '
  - type: text
    content: are
  - type: text
    content: ' few: pray ye therefore the Lord of the harvest, that he would send forth labourers into his harvest.'
  - type: text
    content: ' '
  '20':
  - type: text
    content: Notwithstanding in this rejoice not, that the spirits are subject unto you; but rather rejoice, because your names are written in heaven.
  - type: heading
    content: Thanksgiving
  '21':
  - type: text
    content: 'In that hour Jesus rejoiced in spirit, and said, '
  - type: text
    content: 'I thank thee, O Father, Lord of heaven and earth, that thou hast hid these things from the wise and prudent, and hast revealed them unto babes: even so, Father; for so it seemed good in thy sight.'
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'All things are delivered to me of my Father: and no man knoweth who the Son is, but the Father; and who the Father is, but the Son, and '
  - type: text
    content: he
  - type: text
    content: ' to whom the Son will reveal '
  - type: text
    content: him
  - type: text
    content: .
  '23':
  - type: text
    content: 'And he turned him unto '
  - type: text
    content: his
  - type: text
    content: ' disciples, and said privately, '
  - type: text
    content: 'Blessed '
  - type: text
    content: are
  - type: text
    content: ' the eyes which see the things that ye see:'
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'for I tell you, that many prophets and kings have desired to see those things which ye see, and have not seen '
  - type: text
    content: them
  - type: text
    content: '; and to hear those things which ye hear, and have not heard '
  - type: text
    content: them
  - type: text
    content: .
  - type: heading
    content: The Good Samaritan
  '25':
  - type: text
    content: 'And, behold, a certain lawyer stood up, and tempted him, saying, Master, what shall I do to inherit eternal life? '
  '26':
  - type: text
    content: 'He said unto him, '
  - type: text
    content: What is written in the law? how readest thou?
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'And he answering said, Thou shalt love the Lord thy God with all thy heart, and with all thy soul, and with all thy strength, and with all thy mind; and thy neighbour as thyself. '
  '28':
  - type: text
    content: 'And he said unto him, '
  - type: text
    content: 'Thou hast answered right: this do, and thou shalt live.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: But he, willing to justify himself, said unto Jesus, And who is my neighbour?
  '3':
  - type: text
    content: 'Go your ways: behold, I send you forth as lambs among wolves.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'And Jesus answering said, '
  - type: text
    content: 'A certain '
  - type: text
    content: man
  - type: text
    content: ' went down from Jerusalem to Jericho, and fell among thieves, which stripped him of his raiment, and wounded '
  - type: text
    content: him
  - type: text
    content: ', and departed, leaving '
  - type: text
    content: him
  - type: text
    content: ' half dead.'
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'And by chance there came down a certain priest that way: and when he saw him, he passed by on the other side.'
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'And likewise a Levite, when he was at the place, came and looked '
  - type: text
    content: on him
  - type: text
    content: ', and passed by on the other side.'
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'But a certain Samaritan, as he journeyed, came where he was: and when he saw him, he had compassion '
  - type: text
    content: on him
  - type: text
    content: ','
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'and went to '
  - type: text
    content: him
  - type: text
    content: ', and bound up his wounds, pouring in oil and wine, and set him on his own beast, and brought him to an inn, and took care of him.'
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'And on the morrow when he departed, he took out two pence, and gave '
  - type: text
    content: them
  - type: text
    content: ' to the host, and said unto him, Take care of him; and whatsoever thou spendest more, when I come again, I will repay thee.'
  - type: text
    content: ' '
  '36':
  - type: text
    content: Which now of these three, thinkest thou, was neighbour unto him that fell among the thieves?
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'And he said, He that shewed mercy on him. Then said Jesus unto him, '
  - type: text
    content: Go, and do thou likewise.
  - type: heading
    content: Martha and Mary
  '38':
  - type: text
    content: 'Now it came to pass, as they went, that he entered into a certain village: and a certain woman named Martha received him into her house. '
  '39':
  - type: text
    content: 'And she had a sister called Mary, which also sat at Jesus'' feet, and heard his word. '
  '4':
  - type: text
    content: 'Carry neither purse, nor scrip, nor shoes: and salute no man by the way.'
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'But Martha was cumbered about much serving, and came to him, and said, Lord, dost thou not care that my sister hath left me to serve alone? bid her therefore that she help me. '
  '41':
  - type: text
    content: 'And Jesus answered and said unto her, '
  - type: text
    content: 'Martha, Martha, thou art careful and troubled about many things:'
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'but one thing is needful: and Mary hath chosen that good part, which shall not be taken away from her.'
  '5':
  - type: text
    content: 'And into whatsoever house ye enter, first say, Peace '
  - type: text
    content: be
  - type: text
    content: ' to this house.'
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'And if the son of peace be there, your peace shall rest upon it: if not, it shall turn to you again.'
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'And in the same house remain, eating and drinking such things as they give: for the labourer is worthy of his hire. Go not from house to house.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'And into whatsoever city ye enter, and they receive you, eat such things as are set before you:'
  - type: text
    content: ' '
  '9':
  - type: text
    content: and heal the sick that are therein, and say unto them, The kingdom of God is come nigh unto you.
  - type: text
    content: ' '
