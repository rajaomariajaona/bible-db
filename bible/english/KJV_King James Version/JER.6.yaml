document_id: JER.6,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The City is Besieged
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'O ye children of Benjamin, gather yourselves to flee out of the midst of Jerusalem, and blow the trumpet in Tekoa, and set up a sign of fire in Beth-haccerem: for evil appeareth out of the north, and great destruction. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'To whom shall I speak, and give warning, that they may hear? behold, their ear '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' uncircumcised, and they cannot hearken: behold, the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' is unto them a reproach; they have no delight in it. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Therefore I am full of the fury of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; I am weary with holding in: I will pour it out upon the children abroad, and upon the assembly of young men together: for even the husband with the wife shall be taken, the aged with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him that is
    - type: text
      text: ' full of days. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And their houses shall be turned unto others, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with their
    - type: text
      text: ' fields and wives together: for I will stretch out my hand upon the inhabitants of the land, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'For from the least of them even unto the greatest of them every one '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' given to covetousness; and from the prophet even unto the priest every one dealeth falsely. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'They have healed also the hurt of the daughter of my people slightly, saying, Peace, peace; when '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no peace. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Were they ashamed when they had committed abomination? nay, they were not at all ashamed, neither could they blush: therefore they shall fall among them that fall: at the time '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' I visit them they shall be cast down, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', Stand ye in the ways, and see, and ask for the old paths, where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the good way, and walk therein, and ye shall find rest for your souls. But they said, We will not walk '
    - type: usfm
      marker: add
      children:
      - type: text
        text: therein
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Also I set watchmen over you, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: saying
    - type: text
      text: ', Hearken to the sound of the trumpet. But they said, We will not hearken. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Therefore hear, ye nations, and know, O congregation, what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' among them. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Hear, O earth: behold, I will bring evil upon this people, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the fruit of their thoughts, because they have not hearkened unto my words, nor to my law, but rejected it. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'I have likened the daughter of Zion to a comely and delicate '
    - type: usfm
      marker: add
      children:
      - type: text
        text: woman
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'To what purpose cometh there to me incense from Sheba, and the sweet cane from a far country? your burnt offerings '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' not acceptable, nor your sacrifices sweet unto me. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Therefore thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', Behold, I will lay stumblingblocks before this people, and the fathers and the sons together shall fall upon them; the neighbour and his friend shall perish.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', Behold, a people cometh from the north country, and a great nation shall be raised from the sides of the earth. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'They shall lay hold on bow and spear; they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' cruel, and have no mercy; their voice roareth like the sea; and they ride upon horses, set in array as men for war against thee, O daughter of Zion.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'We have heard the fame thereof: our hands wax feeble: anguish hath taken hold of us, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' pain, as of a woman in travail. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Go not forth into the field, nor walk by the way; for the sword of the enemy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' fear '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' on every side. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'O daughter of my people, gird '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thee
    - type: text
      text: ' with sackcloth, and wallow thyself in ashes: make thee mourning, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as for
    - type: text
      text: ' an only son, most bitter lamentation: for the spoiler shall suddenly come upon us. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'I have set thee '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a tower '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' a fortress among my people, that thou mayest know and try their way. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'They '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' all grievous revolters, walking with slanders: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they are
    - type: text
      text: ' brass and iron; they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' all corrupters. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'The bellows are burned, the lead is consumed of the fire; the founder melteth in vain: for the wicked are not plucked away. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The shepherds with their flocks shall come unto her; they shall pitch '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' tents against her round about; they shall feed every one in his place. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Reprobate silver shall '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' call them, because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath rejected them.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Prepare ye war against her; arise, and let us go up at noon. Woe unto us! for the day goeth away, for the shadows of the evening are stretched out. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Arise, and let us go by night, and let us destroy her palaces.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For thus hath the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts said, Hew ye down trees, and cast a mount against Jerusalem: this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the city to be visited; she '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' wholly oppression in the midst of her. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'As a fountain casteth out her waters, so she casteth out her wickedness: violence and spoil is heard in her; before me continually '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' grief and wounds. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Be thou instructed, O Jerusalem, lest my soul depart from thee; lest I make thee desolate, a land not inhabited.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, They shall throughly glean the remnant of Israel as a vine: turn back thine hand as a grapegatherer into the baskets. '
