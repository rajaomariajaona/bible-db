document_id: GEN.46,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: God's Assurance
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Israel took his journey with all that he had, and came to Beer-sheba, and offered sacrifices unto the God of his father Isaac. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Simeon; Jemuel, and Jamin, and Ohad, and Jachin, and Zohar, and Shaul the son of a Canaanitish woman. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Levi; Gershon, Kohath, and Merari. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Judah; Er, and Onan, and Shelah, and Pharez, and Zarah: but Er and Onan died in the land of Canaan. And the sons of Pharez were Hezron and Hamul. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Issachar; Tola, and Phuvah, and Job, and Shimron. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Zebulun; Sered, and Elon, and Jahleel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' the sons of Leah, which she bare unto Jacob in Padan-aram, with his daughter Dinah: all the souls of his sons and his daughters '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' thirty and three. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Gad; Ziphion, and Haggi, Shuni, and Ezbon, Eri, and Arodi, and Areli. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Asher; Jimnah, and Ishuah, and Isui, and Beriah, and Serah their sister: and the sons of Beriah; Heber, and Malchiel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the sons of Zilpah, whom Laban gave to Leah his daughter, and these she bare unto Jacob, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' sixteen souls. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Rachel Jacob''s wife; Joseph, and Benjamin. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And God spake unto Israel in the visions of the night, and said, Jacob, Jacob. And he said, Here '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' I. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And unto Joseph in the land of Egypt were born Manasseh and Ephraim, which Asenath the daughter of Poti-pherah priest of On bare unto him. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Benjamin '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' Belah, and Becher, and Ashbel, Gera, and Naaman, Ehi, and Rosh, Muppim, and Huppim, and Ard. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the sons of Rachel, which were born to Jacob: all the souls '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' fourteen. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Dan; Hushim. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Naphtali; Jahzeel, and Guni, and Jezer, and Shillem. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the sons of Bilhah, which Laban gave unto Rachel his daughter, and she bare these unto Jacob: all the souls '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' seven. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the souls that came with Jacob into Egypt, which came out of his loins, besides Jacob''s sons'' wives, all the souls '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' threescore and six; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the sons of Joseph, which were born him in Egypt, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' two souls: all the souls of the house of Jacob, which came into Egypt, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' threescore and ten.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jacob Goes to Egypt
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he sent Judah before him unto Joseph, to direct his face unto Goshen; and they came into the land of Goshen. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joseph made ready his chariot, and went up to meet Israel his father, to Goshen, and presented himself unto him; and he fell on his neck, and wept on his neck a good while. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' God, the God of thy father: fear not to go down into Egypt; for I will there make of thee a great nation: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Israel said unto Joseph, Now let me die, since I have seen thy face, because thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' yet alive. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joseph said unto his brethren, and unto his father''s house, I will go up, and shew Pharaoh, and say unto him, My brethren, and my father''s house, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in the land of Canaan, are come unto me; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the men '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' shepherds, for their trade hath been to feed cattle; and they have brought their flocks, and their herds, and all that they have. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass, when Pharaoh shall call you, and shall say, What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' your occupation? '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That ye shall say, Thy servants'' trade hath been about cattle from our youth even until now, both we, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' also our fathers: that ye may dwell in the land of Goshen; for every shepherd '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' an abomination unto the Egyptians.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will go down with thee into Egypt; and I will also surely bring thee up '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'again:'
    - type: text
      text: ' and Joseph shall put his hand upon thine eyes. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jacob rose up from Beer-sheba: and the sons of Israel carried Jacob their father, and their little ones, and their wives, in the wagons which Pharaoh had sent to carry him. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they took their cattle, and their goods, which they had gotten in the land of Canaan, and came into Egypt, Jacob, and all his seed with him: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: his sons, and his sons' sons with him, his daughters, and his sons' daughters, and all his seed brought he with him into Egypt.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jacob's Descendants
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the names of the children of Israel, which came into Egypt, Jacob and his sons: Reuben, Jacob''s firstborn. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Reuben; Hanoch, and Phallu, and Hezron, and Carmi. '
