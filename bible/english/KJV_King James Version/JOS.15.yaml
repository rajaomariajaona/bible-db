document_id: JOS.15,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: This
    - type: text
      text: ' then was the lot of the tribe of the children of Judah by their families; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' to the border of Edom the wilderness of Zin southward '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the uttermost part of the south coast. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the border compassed from Baalah westward unto mount Seir, and passed along unto the side of mount Jearim, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Chesalon, on the north side, and went down to Beth-shemesh, and passed on to Timnah: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the border went out unto the side of Ekron northward: and the border was drawn to Shicron, and passed along to mount Baalah, and went out unto Jabneel; and the goings out of the border were at the sea. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the west border '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' to the great sea, and the coast '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thereof
    - type: text
      text: '. This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the coast of the children of Judah round about according to their families.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And unto Caleb the son of Jephunneh he gave a part among the children of Judah, according to the commandment of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' to Joshua, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the city of Arba the father of Anak, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: city is
    - type: text
      text: ' Hebron. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Caleb drove thence the three sons of Anak, Sheshai, and Ahiman, and Talmai, the children of Anak. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he went up thence to the inhabitants of Debir: and the name of Debir before '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Kirjath-sepher. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Caleb said, He that smiteth Kirjath-sepher, and taketh it, to him will I give Achsah my daughter to wife. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Othniel the son of Kenaz, the brother of Caleb, took it: and he gave him Achsah his daughter to wife. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, as she came '
    - type: usfm
      marker: add
      children:
      - type: text
        text: unto him
    - type: text
      text: ', that she moved him to ask of her father a field: and she lighted off '
    - type: usfm
      marker: add
      children:
      - type: text
        text: her
    - type: text
      text: ' ass; and Caleb said unto her, What wouldest thou? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Who answered, Give me a blessing; for thou hast given me a south land; give me also springs of water. And he gave her the upper springs, and the nether springs.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And their south border was from the shore of the salt sea, from the bay that looketh southward: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the inheritance of the tribe of the children of Judah according to their families.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the uttermost cities of the tribe of the children of Judah toward the coast of Edom southward were Kabzeel, and Eder, and Jagur, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Kinah, and Dimonah, and Adadah, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Kedesh, and Hazor, and Ithnan, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ziph, and Telem, and Bealoth, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Hazor, Hadattah, and Kerioth, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' Hezron, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Hazor, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amam, and Shema, and Moladah, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Hazar-gaddah, and Heshmon, and Beth-palet, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Hazar-shual, and Beer-sheba, and Bizjothjah, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Baalah, and Iim, and Azem, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and it went out to the south side to Maaleh-acrabbim, and passed along to Zin, and ascended up on the south side unto Kadesh-barnea, and passed along to Hezron, and went up to Adar, and fetched a compass to Karkaa: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Eltolad, and Chesil, and Hormah, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Ziklag, and Madmannah, and Sansannah, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Lebaoth, and Shilhim, and Ain, and Rimmon: all the cities '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' twenty and nine, with their villages: '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' in the valley, Eshtaol, and Zoreah, and Ashnah, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Zanoah, and En-gannim, Tappuah, and Enam, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jarmuth, and Adullam, Socoh, and Azekah, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Sharaim, and Adithaim, and Gederah, and Gederothaim; fourteen cities with their villages: '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zenan, and Hadashah, and Migdal-gad, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Dilean, and Mizpeh, and Joktheel, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lachish, and Bozkath, and Eglon, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: from thence
    - type: text
      text: ' it passed toward Azmon, and went out unto the river of Egypt; and the goings out of that coast were at the sea: this shall be your south coast. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Cabbon, and Lahmam, and Kithlish, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Gederoth, Beth-dagon, and Naamah, and Makkedah; sixteen cities with their villages: '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Libnah, and Ether, and Ashan, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Jiphtah, and Ashnah, and Nezib, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Keilah, and Achzib, and Mareshah; nine cities with their villages: '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ekron, with her towns and her villages: '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from Ekron even unto the sea, all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: lay
    - type: text
      text: ' near Ashdod, with their villages: '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ashdod with her towns and her villages, Gaza with her towns and her villages, unto the river of Egypt, and the great sea, and the border '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'thereof:'
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in the mountains, Shamir, and Jattir, and Socoh, '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Dannah, and Kirjath-sannah, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Debir, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the east border '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the salt sea, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' unto the end of Jordan. And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' border in the north quarter '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' from the bay of the sea at the uttermost part of Jordan: '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Anab, and Eshtemoh, and Anim, '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Goshen, and Holon, and Giloh; eleven cities with their villages: '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Arab, and Dumah, and Eshean, '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Janum, and Beth-tappuah, and Aphekah, '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Humtah, and Kirjath-arba, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Hebron, and Zior; nine cities with their villages: '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maon, Carmel, and Ziph, and Juttah, '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Jezreel, and Jokdeam, and Zanoah, '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cain, Gibeah, and Timnah; ten cities with their villages: '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Halhul, Beth-zur, and Gedor, '
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Maarath, and Beth-anoth, and Eltekon; six cities with their villages: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the border went up to Beth-hogla, and passed along by the north of Beth-arabah; and the border went up to the stone of Bohan the son of Reuben: '
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kirjath-baal, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Kirjath-jearim, and Rabbah; two cities with their villages: '
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'in the wilderness, Beth-arabah, Middin, and Secacah, '
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and Nibshan, and the city of Salt, and En-gedi; six cities with their villages.
  '63':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for the Jebusites the inhabitants of Jerusalem, the children of Judah could not drive them out: but the Jebusites dwell with the children of Judah at Jerusalem unto this day.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the border went up toward Debir from the valley of Achor, and so northward, looking toward Gilgal, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' before the going up to Adummim, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' on the south side of the river: and the border passed toward the waters of En-shemesh, and the goings out thereof were at En-rogel: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the border went up by the valley of the son of Hinnom unto the south side of the Jebusite; the same '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Jerusalem: and the border went up to the top of the mountain that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: lieth
    - type: text
      text: ' before the valley of Hinnom westward, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' at the end of the valley of the giants northward: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the border was drawn from the top of the hill unto the fountain of the water of Nephtoah, and went out to the cities of mount Ephron; and the border was drawn to Baalah, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Kirjath-jearim: '
