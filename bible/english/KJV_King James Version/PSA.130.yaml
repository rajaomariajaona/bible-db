document_id: PSA.130,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Song of degrees.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Out of the depths have I cried unto thee, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Lord, hear my voice:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let thine ears be attentive
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To the voice of my supplications.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'If thou, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', shouldest mark iniquities,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O Lord, who shall stand?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' forgiveness with thee,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That thou mayest be feared.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I wait for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', my soul doth wait,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And in his word do I hope.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My soul '
    - type: usfm
      marker: add
      children:
      - type: text
        text: waiteth
    - type: text
      text: ' for the Lord'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'More than they that watch for the morning: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: I say, more than
    - type: text
      text: ' they that watch for the morning.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let Israel hope in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': For with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' mercy,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And with him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' plenteous redemption.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he shall redeem Israel from all his iniquities.
