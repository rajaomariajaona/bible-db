document_id: JDG.19,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Benjamites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And it came to pass in those days, when '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' no king in Israel, that there was a certain Levite sojourning on the side of mount Ephraim, who took to him a concubine out of Beth-lehem-judah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'But the man would not tarry that night, but he rose up and departed, and came over against Jebus, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Jerusalem; and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there were
    - type: text
      text: ' with him two asses saddled, his concubine also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' with him. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' when they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' by Jebus, the day was far spent; and the servant said unto his master, Come, I pray thee, and let us turn in into this city of the Jebusites, and lodge in it. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And his master said unto him, We will not turn aside hither into the city of a stranger, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not of the children of Israel; we will pass over to Gibeah. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And he said unto his servant, Come, and let us draw near to one of these places to lodge all night, in Gibeah, or in Ramah. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And they passed on and went their way; and the sun went down upon them '
    - type: usfm
      marker: add
      children:
      - type: text
        text: when they were
    - type: text
      text: ' by Gibeah, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: belongeth
    - type: text
      text: ' to Benjamin. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And they turned aside thither, to go in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' to lodge in Gibeah: and when he went in, he sat him down in a street of the city: for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' no man that took them into his house to lodging.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And, behold, there came an old man from his work out of the field at even, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' also of mount Ephraim; and he sojourned in Gibeah: but the men of the place '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' Benjamites. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And when he had lifted up his eyes, he saw a wayfaring man in the street of the city: and the old man said, Whither goest thou? and whence comest thou? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And he said unto him, We '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' passing from Beth-lehem-judah toward the side of mount Ephraim; from thence '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' I: and I went to Beth-lehem-judah, but I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am now
    - type: text
      text: ' going to the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; and there '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' no man that receiveth me to house. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Yet there is both straw and provender for our asses; and there is bread and wine also for me, and for thy handmaid, and for the young man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which is
    - type: text
      text: ' with thy servants: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no want of any thing. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And his concubine played the whore against him, and went away from him unto her father''s house to Beth-lehem-judah, and was there four whole months. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And the old man said, Peace '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' with thee; howsoever '
    - type: usfm
      marker: add
      children:
      - type: text
        text: let
    - type: text
      text: ' all thy wants '
    - type: usfm
      marker: add
      children:
      - type: text
        text: lie
    - type: text
      text: ' upon me; only lodge not in the street. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'So he brought him into his house, and gave provender unto the asses: and they washed their feet, and did eat and drink.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Now
    - type: text
      text: ' as they were making their hearts merry, behold, the men of the city, certain sons of Belial, beset the house round about, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' beat at the door, and spake to the master of the house, the old man, saying, Bring forth the man that came into thine house, that we may know him. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And the man, the master of the house, went out unto them, and said unto them, Nay, my brethren, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: nay
    - type: text
      text: ', I pray you, do not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' wickedly; seeing that this man is come into mine house, do not this folly. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: here is
    - type: text
      text: ' my daughter a maiden, and his concubine; them I will bring out now, and humble ye them, and do with them what seemeth good unto you: but unto this man do not so vile a thing. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'But the men would not hearken to him: so the man took his concubine, and brought her forth unto them; and they knew her, and abused her all the night until the morning: and when the day began to spring, they let her go. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Then came the woman in the dawning of the day, and fell down at the door of the man''s house where her lord '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ', till it was light.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And her lord rose up in the morning, and opened the doors of the house, and went out to go his way: and, behold, the woman his concubine was fallen down '
    - type: usfm
      marker: add
      children:
      - type: text
        text: at
    - type: text
      text: ' the door of the house, and her hands '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' upon the threshold. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And he said unto her, Up, and let us be going. But none answered. Then the man took her '
    - type: usfm
      marker: add
      children:
      - type: text
        text: up
    - type: text
      text: ' upon an ass, and the man rose up, and gat him unto his place. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And when he was come into his house, he took a knife, and laid hold on his concubine, and divided her, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: together
    - type: text
      text: ' with her bones, into twelve pieces, and sent her into all the coasts of Israel. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And her husband arose, and went after her, to speak friendly unto her, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' to bring her again, having his servant with him, and a couple of asses: and she brought him into her father''s house: and when the father of the damsel saw him, he rejoiced to meet him. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And it was so, that all that saw it said, There was no such deed done nor seen from the day that the children of Israel came up out of the land of Egypt unto this day: consider of it, take advice, and speak '
    - type: usfm
      marker: add
      children:
      - type: text
        text: your minds
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And his father in law, the damsel''s father, retained him; and he abode with him three days: so they did eat and drink, and lodged there.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And it came to pass on the fourth day, when they arose early in the morning, that he rose up to depart: and the damsel''s father said unto his son in law, Comfort thine heart with a morsel of bread, and afterward go your way. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And they sat down, and did eat and drink both of them together: for the damsel''s father had said unto the man, Be content, I pray thee, and tarry all night, and let thine heart be merry. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And when the man rose up to depart, his father in law urged him: therefore he lodged there again. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And he arose early in the morning on the fifth day to depart: and the damsel''s father said, Comfort thine heart, I pray thee. And they tarried until afternoon, and they did eat both of them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And when the man rose up to depart, he, and his concubine, and his servant, his father in law, the damsel''s father, said unto him, Behold, now the day draweth toward evening, I pray you tarry all night: behold, the day groweth to an end, lodge here, that thine heart may be merry; and to morrow get you early on your way, that thou mayest go home.'
