document_id: GEN.15
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Covenant
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After these things the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came unto Abram in a vision, saying, Fear not, Abram: I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' thy shield, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' thy exceeding great reward. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Abram said, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ', what wilt thou give me, seeing I go childless, and the steward of my house '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this Eliezer of Damascus? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Abram said, Behold, to me thou hast given no seed: and, lo, one born in my house is mine heir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And, behold, the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: came
  - type: text
    text: ' unto him, saying, This shall not be thine heir; but he that shall come forth out of thine own bowels shall be thine heir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And he brought him forth abroad, and said, Look now toward heaven, and tell the stars, if thou be able to number them: and he said unto him, So shall thy seed be. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he believed in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and he counted it to him for righteousness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And he said unto him, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' that brought thee out of Ur of the Chaldees, to give thee this land to inherit it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And he said, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ', whereby shall I know that I shall inherit it? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And he said unto him, Take me an heifer of three years old, and a she goat of three years old, and a ram of three years old, and a turtledove, and a young pigeon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And he took unto him all these, and divided them in the midst, and laid each piece one against another: but the birds divided he not. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And when the fowls came down upon the carcases, Abram drove them away.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And when the sun was going down, a deep sleep fell upon Abram; and, lo, an horror of great darkness fell upon him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And he said unto Abram, Know of a surety that thy seed shall be a stranger in a land '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' not their''s, and shall serve them; and they shall afflict them four hundred years; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and also that nation, whom they shall serve, will I judge: and afterward shall they come out with great substance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And thou shalt go to thy fathers in peace; thou shalt be buried in a good old age. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But in the fourth generation they shall come hither again: for the iniquity of the Amorites '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not yet full. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And it came to pass, that, when the sun went down, and it was dark, behold a smoking furnace, and a burning lamp that passed between those pieces. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'In the same day the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' made a covenant with Abram, saying, Unto thy seed have I given this land, from the river of Egypt unto the great river, the river Euphrates: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'the Kenites, and the Kenizzites, and the Kadmonites, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'and the Hittites, and the Perizzites, and the Rephaims, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: and the Amorites, and the Canaanites, and the Girgashites, and the Jebusites.
