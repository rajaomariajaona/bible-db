document_id: ECC.6,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'There is an evil which I have seen under the sun, and it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' common among men: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'That which hath been is named already, and it is known that it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' man: neither may he contend with him that is mightier than he. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Seeing there be many things that increase vanity, what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' man the better? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'For who knoweth what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' good for man in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ' life, all the days of his vain life which he spendeth as a shadow? for who can tell a man what shall be after him under the sun?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'a man to whom God hath given riches, wealth, and honour, so that he wanteth nothing for his soul of all that he desireth, yet God giveth him not power to eat thereof, but a stranger eateth it: this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' vanity, and it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' an evil disease. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'If a man beget an hundred '
    - type: usfm
      marker: add
      children:
      - type: text
        text: children
    - type: text
      text: ', and live many years, so that the days of his years be many, and his soul be not filled with good, and also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' he have no burial; I say, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' an untimely birth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' better than he. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For he cometh in with vanity, and departeth in darkness, and his name shall be covered with darkness. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Moreover he hath not seen the sun, nor known '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'any thing:'
    - type: text
      text: ' this hath more rest than the other. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Yea, though he live a thousand years twice '
    - type: usfm
      marker: add
      children:
      - type: text
        text: told
    - type: text
      text: ', yet hath he seen no good: do not all go to one place?'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'All the labour of man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' for his mouth, and yet the appetite is not filled. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'For what hath the wise more than the fool? what hath the poor, that knoweth to walk before the living? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Better '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the sight of the eyes than the wandering of the desire: this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' also vanity and vexation of spirit.'
