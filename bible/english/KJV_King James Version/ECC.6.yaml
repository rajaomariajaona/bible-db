  '1':
  - type: text
    content: 'There is an evil which I have seen under the sun, and it '
  - type: text
    content: is
  - type: text
    content: ' common among men: '
  '10':
  - type: text
    content: 'That which hath been is named already, and it is known that it '
  - type: text
    content: is
  - type: text
    content: ' man: neither may he contend with him that is mightier than he. '
  '11':
  - type: text
    content: 'Seeing there be many things that increase vanity, what '
  - type: text
    content: is
  - type: text
    content: ' man the better? '
  '12':
  - type: text
    content: 'For who knoweth what '
  - type: text
    content: is
  - type: text
    content: ' good for man in '
  - type: text
    content: this
  - type: text
    content: ' life, all the days of his vain life which he spendeth as a shadow? for who can tell a man what shall be after him under the sun?'
  '2':
  - type: text
    content: 'a man to whom God hath given riches, wealth, and honour, so that he wanteth nothing for his soul of all that he desireth, yet God giveth him not power to eat thereof, but a stranger eateth it: this '
  - type: text
    content: is
  - type: text
    content: ' vanity, and it '
  - type: text
    content: is
  - type: text
    content: ' an evil disease. '
  '3':
  - type: text
    content: 'If a man beget an hundred '
  - type: text
    content: children
  - type: text
    content: ', and live many years, so that the days of his years be many, and his soul be not filled with good, and also '
  - type: text
    content: that
  - type: text
    content: ' he have no burial; I say, '
  - type: text
    content: that
  - type: text
    content: ' an untimely birth '
  - type: text
    content: is
  - type: text
    content: ' better than he. '
  '4':
  - type: text
    content: 'For he cometh in with vanity, and departeth in darkness, and his name shall be covered with darkness. '
  '5':
  - type: text
    content: 'Moreover he hath not seen the sun, nor known '
  - type: text
    content: 'any thing:'
  - type: text
    content: ' this hath more rest than the other. '
  '6':
  - type: text
    content: 'Yea, though he live a thousand years twice '
  - type: text
    content: told
  - type: text
    content: ', yet hath he seen no good: do not all go to one place?'
  '7':
  - type: text
    content: 'All the labour of man '
  - type: text
    content: is
  - type: text
    content: ' for his mouth, and yet the appetite is not filled. '
  '8':
  - type: text
    content: 'For what hath the wise more than the fool? what hath the poor, that knoweth to walk before the living? '
  '9':
  - type: text
    content: 'Better '
  - type: text
    content: is
  - type: text
    content: ' the sight of the eyes than the wandering of the desire: this '
  - type: text
    content: is
  - type: text
    content: ' also vanity and vexation of spirit.'
