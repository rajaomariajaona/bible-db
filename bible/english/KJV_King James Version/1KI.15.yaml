document_id: 1KI.15,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Abijam
  - type: text
    content: 'Now in the eighteenth year of king Jeroboam the son of Nebat reigned Abijam over Judah. '
  '10':
  - type: text
    content: 'And forty and one years reigned he in Jerusalem. And his mother''s name '
  - type: text
    content: was
  - type: text
    content: ' Maachah, the daughter of Abishalom. '
  '11':
  - type: text
    content: 'And Asa did '
  - type: text
    content: that which was
  - type: text
    content: ' right in the eyes of the '
  - type: text
    content: LORD
  - type: text
    content: ', as '
  - type: text
    content: did
  - type: text
    content: ' David his father. '
  '12':
  - type: text
    content: 'And he took away the sodomites out of the land, and removed all the idols that his fathers had made. '
  '13':
  - type: text
    content: 'And also Maachah his mother, even her he removed from '
  - type: text
    content: being
  - type: text
    content: ' queen, because she had made an idol in a grove; and Asa destroyed her idol, and burnt '
  - type: text
    content: it
  - type: text
    content: ' by the brook Kidron. '
  '14':
  - type: text
    content: 'But the high places were not removed: nevertheless Asa''s heart was perfect with the '
  - type: text
    content: LORD
  - type: text
    content: ' all his days. '
  '15':
  - type: text
    content: 'And he brought in the things which his father had dedicated, and the things which himself had dedicated, into the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', silver, and gold, and vessels.'
  '16':
  - type: text
    content: 'And there was war between Asa and Baasha king of Israel all their days. '
  '17':
  - type: text
    content: 'And Baasha king of Israel went up against Judah, and built Ramah, that he might not suffer any to go out or come in to Asa king of Judah. '
  '18':
  - type: text
    content: 'Then Asa took all the silver and the gold '
  - type: text
    content: that were
  - type: text
    content: ' left in the treasures of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and the treasures of the king''s house, and delivered them into the hand of his servants: and king Asa sent them to Ben-hadad, the son of Tabrimon, the son of Hezion, king of Syria, that dwelt at Damascus, saying, '
  '19':
  - type: text
    content: There is
  - type: text
    content: ' a league between me and thee, '
  - type: text
    content: and
  - type: text
    content: ' between my father and thy father: behold, I have sent unto thee a present of silver and gold; come and break thy league with Baasha king of Israel, that he may depart from me. '
  '2':
  - type: text
    content: 'Three years reigned he in Jerusalem. And his mother''s name '
  - type: text
    content: was
  - type: text
    content: ' Maachah, the daughter of Abishalom. '
  '20':
  - type: text
    content: 'So Ben-hadad hearkened unto king Asa, and sent the captains of the hosts which he had against the cities of Israel, and smote Ijon, and Dan, and Abel-beth-maachah, and all Cinneroth, with all the land of Naphtali. '
  '21':
  - type: text
    content: 'And it came to pass, when Baasha heard '
  - type: text
    content: thereof
  - type: text
    content: ', that he left off building of Ramah, and dwelt in Tirzah. '
  '22':
  - type: text
    content: 'Then king Asa made a proclamation throughout all Judah; none '
  - type: text
    content: was
  - type: text
    content: ' exempted: and they took away the stones of Ramah, and the timber thereof, wherewith Baasha had builded; and king Asa built with them Geba of Benjamin, and Mizpah.'
  '23':
  - type: text
    content: 'The rest of all the acts of Asa, and all his might, and all that he did, and the cities which he built, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Judah? Nevertheless in the time of his old age he was diseased in his feet. '
  '24':
  - type: text
    content: 'And Asa slept with his fathers, and was buried with his fathers in the city of David his father: and Jehoshaphat his son reigned in his stead.'
  - type: heading
    content: Israel
  - type: heading
    content: Nadab
  '25':
  - type: text
    content: 'And Nadab the son of Jeroboam began to reign over Israel in the second year of Asa king of Judah, and reigned over Israel two years. '
  '26':
  - type: text
    content: 'And he did evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', and walked in the way of his father, and in his sin wherewith he made Israel to sin.'
  - type: heading
    content: Baasha
  '27':
  - type: text
    content: 'And Baasha the son of Ahijah, of the house of Issachar, conspired against him; and Baasha smote him at Gibbethon, which '
  - type: text
    content: belonged
  - type: text
    content: ' to the Philistines; for Nadab and all Israel laid siege to Gibbethon. '
  '28':
  - type: text
    content: 'Even in the third year of Asa king of Judah did Baasha slay him, and reigned in his stead. '
  '29':
  - type: text
    content: 'And it came to pass, when he reigned, '
  - type: text
    content: that
  - type: text
    content: ' he smote all the house of Jeroboam; he left not to Jeroboam any that breathed, until he had destroyed him, according unto the saying of the '
  - type: text
    content: LORD
  - type: text
    content: ', which he spake by his servant Ahijah the Shilonite: '
  '3':
  - type: text
    content: 'And he walked in all the sins of his father, which he had done before him: and his heart was not perfect with the '
  - type: text
    content: LORD
  - type: text
    content: ' his God, as the heart of David his father. '
  '30':
  - type: text
    content: 'because of the sins of Jeroboam which he sinned, and which he made Israel sin, by his provocation wherewith he provoked the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel to anger.'
  '31':
  - type: text
    content: 'Now the rest of the acts of Nadab, and all that he did, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Israel? '
  '32':
  - type: text
    content: And there was war between Asa and Baasha king of Israel all their days.
  '33':
  - type: text
    content: 'In the third year of Asa king of Judah began Baasha the son of Ahijah to reign over all Israel in Tirzah, twenty and four years. '
  '34':
  - type: text
    content: 'And he did evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', and walked in the way of Jeroboam, and in his sin wherewith he made Israel to sin.'
  '4':
  - type: text
    content: 'Nevertheless for David''s sake did the '
  - type: text
    content: LORD
  - type: text
    content: ' his God give him a lamp in Jerusalem, to set up his son after him, and to establish Jerusalem: '
  '5':
  - type: text
    content: 'because David did '
  - type: text
    content: that which was
  - type: text
    content: ' right in the eyes of the '
  - type: text
    content: LORD
  - type: text
    content: ', and turned not aside from any '
  - type: text
    content: thing
  - type: text
    content: ' that he commanded him all the days of his life, save only in the matter of Uriah the Hittite. '
  '6':
  - type: text
    content: And there was war between Rehoboam and Jeroboam all the days of his life.
  '7':
  - type: text
    content: 'Now the rest of the acts of Abijam, and all that he did, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Judah? And there was war between Abijam and Jeroboam. '
  '8':
  - type: text
    content: 'And Abijam slept with his fathers; and they buried him in the city of David: and Asa his son reigned in his stead.'
  - type: heading
    content: Asa
  '9':
  - type: text
    content: 'And in the twentieth year of Jeroboam king of Israel reigned Asa over Judah. '
