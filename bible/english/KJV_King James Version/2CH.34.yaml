  - type: heading
    content: The Covenant Renewed
  '29':
  - type: text
    content: 'Then the king sent and gathered together all the elders of Judah and Jerusalem. '
  '3':
  - type: text
    content: 'For in the eighth year of his reign, while he was yet young, he began to seek after the God of David his father: and in the twelfth year he began to purge Judah and Jerusalem from the high places, and the groves, and the carved images, and the molten images. '
  '30':
  - type: text
    content: 'And the king went up into the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and all the men of Judah, and the inhabitants of Jerusalem, and the priests, and the Levites, and all the people, great and small: and he read in their ears all the words of the book of the covenant that was found in the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'And the king stood in his place, and made a covenant before the '
  - type: text
    content: LORD
  - type: text
    content: ', to walk after the '
  - type: text
    content: LORD
  - type: text
    content: ', and to keep his commandments, and his testimonies, and his statutes, with all his heart, and with all his soul, to perform the words of the covenant which are written in this book. '
  '32':
  - type: text
    content: 'And he caused all that were present in Jerusalem and Benjamin to stand '
  - type: text
    content: to it
  - type: text
    content: '. And the inhabitants of Jerusalem did according to the covenant of God, the God of their fathers. '
  '33':
  - type: text
    content: 'And Josiah took away all the abominations out of all the countries that '
  - type: text
    content: pertained
  - type: text
    content: ' to the children of Israel, and made all that were present in Israel to serve, '
  - type: text
    content: even
  - type: text
