  - type: text
    content: LORD
  - type: text
    content: ' their God. '
  - type: text
    content: And
  - type: text
    content: ' all his days they departed not from following the '
  - type: text
    content: LORD
  - type: text
    content: ', the God of their fathers.'
  '4':
  - type: text
    content: 'And they brake down the altars of Baalim in his presence; and the images, that '
  - type: text
    content: were
  - type: text
