    content: 'And he burnt the bones of the priests upon their altars, and cleansed Judah and Jerusalem. '
  '6':
  - type: text
    content: 'And '
  - type: text
    content: so did he
  - type: text
    content: ' in the cities of Manasseh, and Ephraim, and Simeon, even unto Naphtali, with their mattocks round about. '
  '7':
