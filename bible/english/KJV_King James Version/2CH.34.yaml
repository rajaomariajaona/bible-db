document_id: 2CH.34
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Josiah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Josiah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' eight years old when he began to reign, and he reigned in Jerusalem one and thirty years. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he did '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which was
  - type: text
    text: ' right in the sight of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and walked in the ways of David his father, and declined '
  - type: usfm
    marker: add
    children:
    - type: text
      text: neither
  - type: text
    text: ' to the right hand, nor to the left.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For in the eighth year of his reign, while he was yet young, he began to seek after the God of David his father: and in the twelfth year he began to purge Judah and Jerusalem from the high places, and the groves, and the carved images, and the molten images. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And they brake down the altars of Baalim in his presence; and the images, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' on high above them, he cut down; and the groves, and the carved images, and the molten images, he brake in pieces, and made dust '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of them
  - type: text
    text: ', and strowed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon the graves of them that had sacrificed unto them. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And he burnt the bones of the priests upon their altars, and cleansed Judah and Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so did he
  - type: text
    text: ' in the cities of Manasseh, and Ephraim, and Simeon, even unto Naphtali, with their mattocks round about. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And when he had broken down the altars and the groves, and had beaten the graven images into powder, and cut down all the idols throughout all the land of Israel, he returned to Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now in the eighteenth year of his reign, when he had purged the land, and the house, he sent Shaphan the son of Azaliah, and Maaseiah the governor of the city, and Joah the son of Joahaz the recorder, to repair the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' his God. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And when they came to Hilkiah the high priest, they delivered the money that was brought into the house of God, which the Levites that kept the doors had gathered of the hand of Manasseh and Ephraim, and of all the remnant of Israel, and of all Judah and Benjamin; and they returned to Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And they put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' in the hand of the workmen that had the oversight of the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and they gave it to the workmen that wrought in the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', to repair and amend the house: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'even to the artificers and builders gave they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', to buy hewn stone, and timber for couplings, and to floor the houses which the kings of Judah had destroyed. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And the men did the work faithfully: and the overseers of them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' Jahath and Obadiah, the Levites, of the sons of Merari; and Zechariah and Meshullam, of the sons of the Kohathites, to set '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' forward; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: other of
  - type: text
    text: ' the Levites, all that could skill of instruments of musick. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they were
  - type: text
    text: ' over the bearers of burdens, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' overseers of all that wrought the work in any manner of service: and of the Levites '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there were
  - type: text
    text: ' scribes, and officers, and porters.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Book of the Law Found
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And when they brought out the money that was brought into the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Hilkiah the priest found a book of the law of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: given
  - type: text
    text: ' by Moses. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Hilkiah answered and said to Shaphan the scribe, I have found the book of the law in the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. And Hilkiah delivered the book to Shaphan. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And Shaphan carried the book to the king, and brought the king word back again, saying, All that was committed to thy servants, they do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And they have gathered together the money that was found in the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and have delivered it into the hand of the overseers, and to the hand of the workmen. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then Shaphan the scribe told the king, saying, Hilkiah the priest hath given me a book. And Shaphan read it before the king. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And it came to pass, when the king had heard the words of the law, that he rent his clothes. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the king commanded Hilkiah, and Ahikam the son of Shaphan, and Abdon the son of Micah, and Shaphan the scribe, and Asaiah a servant of the king''s, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Go, enquire of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' for me, and for them that are left in Israel and in Judah, concerning the words of the book that is found: for great '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the wrath of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' that is poured out upon us, because our fathers have not kept the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', to do after all that is written in this book.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And Hilkiah, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they
  - type: text
    text: ' that the king '
  - type: usfm
    marker: add
    children:
    - type: text
      text: had appointed
  - type: text
    text: ', went to Huldah the prophetess, the wife of Shallum the son of Tikvath, the son of Hasrah, keeper of the wardrobe; (now she dwelt in Jerusalem in the college:) and they spake to her to that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: effect
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And she answered them, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel, Tell ye the man that sent you to me, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Behold, I will bring evil upon this place, and upon the inhabitants thereof, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' all the curses that are written in the book which they have read before the king of Judah: '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'because they have forsaken me, and have burned incense unto other gods, that they might provoke me to anger with all the works of their hands; therefore my wrath shall be poured out upon this place, and shall not be quenched. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And as for the king of Judah, who sent you to enquire of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', so shall ye say unto him, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: concerning
  - type: text
    text: ' the words which thou hast heard; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'because thine heart was tender, and thou didst humble thyself before God, when thou heardest his words against this place, and against the inhabitants thereof, and humbledst thyself before me, and didst rend thy clothes, and weep before me; I have even heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thee
  - type: text
    text: ' also, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Behold, I will gather thee to thy fathers, and thou shalt be gathered to thy grave in peace, neither shall thine eyes see all the evil that I will bring upon this place, and upon the inhabitants of the same. So they brought the king word again.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Covenant Renewed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then the king sent and gathered together all the elders of Judah and Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And the king went up into the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and all the men of Judah, and the inhabitants of Jerusalem, and the priests, and the Levites, and all the people, great and small: and he read in their ears all the words of the book of the covenant that was found in the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And the king stood in his place, and made a covenant before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', to walk after the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and to keep his commandments, and his testimonies, and his statutes, with all his heart, and with all his soul, to perform the words of the covenant which are written in this book. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And he caused all that were present in Jerusalem and Benjamin to stand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to it
  - type: text
    text: '. And the inhabitants of Jerusalem did according to the covenant of God, the God of their fathers. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And Josiah took away all the abominations out of all the countries that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: pertained
  - type: text
    text: ' to the children of Israel, and made all that were present in Israel to serve, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to serve the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' their God. '
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' all his days they departed not from following the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the God of their fathers.'
