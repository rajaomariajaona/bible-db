document_id: 1KI.13,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: At Beth-el's Altar
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And, behold, there came a man of God out of Judah by the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' unto Beth-el: and Jeroboam stood by the altar to burn incense. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: So he went another way, and returned not by the way that he came to Beth-el.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Now there dwelt an old prophet in Beth-el; and his sons came and told him all the works that the man of God had done that day in Beth-el: the words which he had spoken unto the king, them they told also to their father. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And their father said unto them, What way went he? For his sons had seen what way the man of God went, which came from Judah. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And he said unto his sons, Saddle me the ass. So they saddled him the ass: and he rode thereon, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'and went after the man of God, and found him sitting under an oak: and he said unto him, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Art
    - type: text
      text: ' thou the man of God that camest from Judah? And he said, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then he said unto him, Come home with me, and eat bread. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And he said, I may not return with thee, nor go in with thee: neither will I eat bread nor drink water with thee in this place: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'for it was said to me by the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', Thou shalt eat no bread nor drink water there, nor turn again to go by the way that thou camest. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'He said unto him, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' a prophet also as thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: '; and an angel spake unto me by the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', saying, Bring him back with thee into thine house, that he may eat bread and drink water. '
    - type: usfm
      marker: add
      children:
      - type: text
        text: But
    - type: text
      text: ' he lied unto him. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: So he went back with him, and did eat bread in his house, and drank water.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And he cried against the altar in the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and said, O altar, altar, thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; Behold, a child shall be born unto the house of David, Josiah by name; and upon thee shall he offer the priests of the high places that burn incense upon thee, and men''s bones shall be burnt upon thee. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And it came to pass, as they sat at the table, that the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came unto the prophet that brought him back: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'and he cried unto the man of God that came from Judah, saying, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', Forasmuch as thou hast disobeyed the mouth of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and hast not kept the commandment which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God commanded thee, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'but camest back, and hast eaten bread and drunk water in the place, of the which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: LORD
    - type: text
      text: ' did say to thee, Eat no bread, and drink no water; thy carcase shall not come unto the sepulchre of thy fathers. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And it came to pass, after he had eaten bread, and after he had drunk, that he saddled for him the ass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to wit
    - type: text
      text: ', for the prophet whom he had brought back. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And when he was gone, a lion met him by the way, and slew him: and his carcase was cast in the way, and the ass stood by it, the lion also stood by the carcase. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And, behold, men passed by, and saw the carcase cast in the way, and the lion standing by the carcase: and they came and told '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' in the city where the old prophet dwelt.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And when the prophet that brought him back from the way heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thereof
    - type: text
      text: ', he said, It '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the man of God, who was disobedient unto the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': therefore the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath delivered him unto the lion, which hath torn him, and slain him, according to the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', which he spake unto him. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And he spake to his sons, saying, Saddle me the ass. And they saddled '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And he went and found his carcase cast in the way, and the ass and the lion standing by the carcase: the lion had not eaten the carcase, nor torn the ass. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And the prophet took up the carcase of the man of God, and laid it upon the ass, and brought it back: and the old prophet came to the city, to mourn and to bury him. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And he gave a sign the same day, saying, This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the sign which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath spoken; Behold, the altar shall be rent, and the ashes that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' upon it shall be poured out. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And he laid his carcase in his own grave; and they mourned over him, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: saying
    - type: text
      text: ', Alas, my brother! '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And it came to pass, after he had buried him, that he spake to his sons, saying, When I am dead, then bury me in the sepulchre wherein the man of God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' buried; lay my bones beside his bones: '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'for the saying which he cried by the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' against the altar in Beth-el, and against all the houses of the high places which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in the cities of Samaria, shall surely come to pass.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'After this thing Jeroboam returned not from his evil way, but made again of the lowest of the people priests of the high places: whosoever would, he consecrated him, and he became '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' of the priests of the high places. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'And this thing became sin unto the house of Jeroboam, even to cut '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' off, and to destroy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' from off the face of the earth.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And it came to pass, when king Jeroboam heard the saying of the man of God, which had cried against the altar in Beth-el, that he put forth his hand from the altar, saying, Lay hold on him. And his hand, which he put forth against him, dried up, so that he could not pull it in again to him. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The altar also was rent, and the ashes poured out from the altar, according to the sign which the man of God had given by the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And the king answered and said unto the man of God, Intreat now the face of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God, and pray for me, that my hand may be restored me again. And the man of God besought the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and the king''s hand was restored him again, and became as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' before. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And the king said unto the man of God, Come home with me, and refresh thyself, and I will give thee a reward. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And the man of God said unto the king, If thou wilt give me half thine house, I will not go in with thee, neither will I eat bread nor drink water in this place: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'for so was it charged me by the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', saying, Eat no bread, nor drink water, nor turn again by the same way that thou camest. '
