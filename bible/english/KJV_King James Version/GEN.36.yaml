  '1':
  - type: heading
    content: Esau's Descendants
  - type: text
    content: 'Now these '
  - type: text
    content: are
  - type: text
    content: ' the generations of Esau, who '
  - type: text
    content: is
  - type: text
    content: ' Edom. '
  '10':
  - type: text
    content: 'these '
  - type: text
    content: are
  - type: text
    content: ' the names of Esau''s sons; Eliphaz the son of Adah the wife of Esau, Reuel the son of Bashemath the wife of Esau. '
  '11':
  - type: text
    content: 'And the sons of Eliphaz were Teman, Omar, Zepho, and Gatam, and Kenaz. '
  '12':
  - type: text
    content: 'And Timna was concubine to Eliphaz Esau''s son; and she bare to Eliphaz Amalek: these '
  - type: text
    content: were
  - type: text
    content: ' the sons of Adah Esau''s wife. '
  '13':
  - type: text
    content: 'And these '
  - type: text
    content: are
  - type: text
    content: ' the sons of Reuel; Nahath, and Zerah, Shammah, and Mizzah: these were the sons of Bashemath Esau''s wife. '
  '14':
  - type: text
    content: 'And these were the sons of Aholibamah, the daughter of Anah the daughter of Zibeon, Esau''s wife: and she bare to Esau Jeush, and Jaalam, and Korah.'
  '15':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' dukes of the sons of Esau: the sons of Eliphaz the firstborn '
  - type: text
    content: son
  - type: text
    content: ' of Esau; duke Teman, duke Omar, duke Zepho, duke Kenaz, '
  '16':
  - type: text
    content: 'duke Korah, duke Gatam, '
  - type: text
    content: and
  - type: text
    content: ' duke Amalek: these '
  - type: text
    content: are
  - type: text
    content: ' the dukes '
  - type: text
    content: that came
  - type: text
    content: ' of Eliphaz in the land of Edom; these '
  - type: text
    content: were
  - type: text
    content: ' the sons of Adah. '
  '17':
  - type: text
    content: 'And these '
  - type: text
    content: are
  - type: text
    content: ' the sons of Reuel Esau''s son; duke Nahath, duke Zerah, duke Shammah, duke Mizzah: these '
  - type: text
    content: are
  - type: text
    content: ' the dukes '
  - type: text
    content: that came
  - type: text
    content: ' of Reuel in the land of Edom; these '
  - type: text
    content: are
  - type: text
    content: ' the sons of Bashemath Esau''s wife. '
  '18':
  - type: text
    content: 'And these '
  - type: text
    content: are
  - type: text
    content: ' the sons of Aholibamah Esau''s wife; duke Jeush, duke Jaalam, duke Korah: these '
  - type: text
    content: were
  - type: text
    content: ' the dukes '
  - type: text
    content: that came
  - type: text
    content: ' of Aholibamah the daughter of Anah, Esau''s wife. '
  '19':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the sons of Esau, who '
  - type: text
    content: is
  - type: text
    content: ' Edom, and these '
  - type: text
    content: are
  - type: text
    content: ' their dukes.'
  '2':
  - type: text
    content: 'Esau took his wives of the daughters of Canaan; Adah the daughter of Elon the Hittite, and Aholibamah the daughter of Anah the daughter of Zibeon the Hivite; '
  '20':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the sons of Seir the Horite, who inhabited the land; Lotan, and Shobal, and Zibeon, and Anah, '
  '21':
  - type: text
    content: 'and Dishon, and Ezer, and Dishan: these '
  - type: text
    content: are
  - type: text
    content: ' the dukes of the Horites, the children of Seir in the land of Edom. '
  '22':
  - type: text
    content: 'And the children of Lotan were Hori and Hemam; and Lotan''s sister '
  - type: text
    content: was
  - type: text
    content: ' Timna. '
  '23':
  - type: text
    content: 'And the children of Shobal '
  - type: text
    content: were
  - type: text
    content: ' these; Alvan, and Manahath, and Ebal, Shepho, and Onam. '
  '24':
  - type: text
    content: 'And these '
  - type: text
    content: are
  - type: text
    content: ' the children of Zibeon; both Ajah, and Anah: this '
  - type: text
    content: was that
  - type: text
    content: ' Anah that found the mules in the wilderness, as he fed the asses of Zibeon his father. '
  '25':
  - type: text
    content: 'And the children of Anah '
  - type: text
    content: were
  - type: text
    content: ' these; Dishon, and Aholibamah the daughter of Anah. '
  '26':
  - type: text
    content: 'And these '
  - type: text
    content: are
  - type: text
    content: ' the children of Dishon; Hemdan, and Eshban, and Ithran, and Cheran. '
  '27':
  - type: text
    content: 'The children of Ezer '
  - type: text
    content: are
  - type: text
    content: ' these; Bilhan, and Zaavan, and Akan. '
  '28':
  - type: text
    content: 'The children of Dishan '
  - type: text
    content: are
  - type: text
    content: ' these; Uz, and Aran. '
  '29':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the dukes '
  - type: text
    content: that came
  - type: text
    content: ' of the Horites; duke Lotan, duke Shobal, duke Zibeon, duke Anah, '
  '3':
  - type: text
    content: 'and Bashemath Ishmael''s daughter, sister of Nebajoth. '
  '30':
  - type: text
    content: 'duke Dishon, duke Ezer, duke Dishan: these '
  - type: text
    content: are
  - type: text
    content: ' the dukes '
  - type: text
    content: that came
  - type: text
    content: ' of Hori, among their dukes in the land of Seir.'
  '31':
  - type: text
    content: 'And these '
  - type: text
    content: are
  - type: text
    content: ' the kings that reigned in the land of Edom, before there reigned any king over the children of Israel. '
  '32':
  - type: text
    content: 'And Bela the son of Beor reigned in Edom: and the name of his city '
  - type: text
    content: was
  - type: text
    content: ' Dinhabah. '
  '33':
  - type: text
    content: 'And Bela died, and Jobab the son of Zerah of Bozrah reigned in his stead. '
  '34':
  - type: text
    content: 'And Jobab died, and Husham of the land of Temani reigned in his stead. '
  '35':
  - type: text
    content: 'And Husham died, and Hadad the son of Bedad, who smote Midian in the field of Moab, reigned in his stead: and the name of his city '
  - type: text
    content: was
  - type: text
    content: ' Avith. '
  '36':
  - type: text
    content: 'And Hadad died, and Samlah of Masrekah reigned in his stead. '
  '37':
  - type: text
    content: 'And Samlah died, and Saul of Rehoboth '
  - type: text
    content: by
  - type: text
    content: ' the river reigned in his stead. '
  '38':
  - type: text
    content: 'And Saul died, and Baal-hanan the son of Achbor reigned in his stead. '
  '39':
  - type: text
    content: 'And Baal-hanan the son of Achbor died, and Hadar reigned in his stead: and the name of his city '
  - type: text
    content: was
  - type: text
    content: ' Pau; and his wife''s name '
  - type: text
    content: was
  - type: text
    content: ' Mehetabel, the daughter of Matred, the daughter of Mezahab.'
  '4':
  - type: text
    content: 'And Adah bare to Esau Eliphaz; and Bashemath bare Reuel; '
  '40':
  - type: text
    content: 'And these '
  - type: text
    content: are
  - type: text
    content: ' the names of the dukes '
  - type: text
    content: that came
  - type: text
    content: ' of Esau, according to their families, after their places, by their names; duke Timnah, duke Alvah, duke Jetheth, '
  '41':
  - type: text
    content: 'duke Aholibamah, duke Elah, duke Pinon, '
  '42':
  - type: text
    content: 'duke Kenaz, duke Teman, duke Mibzar, '
  '43':
  - type: text
    content: 'duke Magdiel, duke Iram: these '
  - type: text
    content: be
  - type: text
    content: ' the dukes of Edom, according to their habitations in the land of their possession: he '
  - type: text
    content: is
  - type: text
    content: ' Esau the father of the Edomites.'
  '5':
  - type: text
    content: 'and Aholibamah bare Jeush, and Jaalam, and Korah: these '
  - type: text
    content: are
  - type: text
    content: ' the sons of Esau, which were born unto him in the land of Canaan. '
  '6':
  - type: text
    content: 'And Esau took his wives, and his sons, and his daughters, and all the persons of his house, and his cattle, and all his beasts, and all his substance, which he had got in the land of Canaan; and went into the country from the face of his brother Jacob. '
  '7':
  - type: text
    content: 'For their riches were more than that they might dwell together; and the land wherein they were strangers could not bear them because of their cattle. '
  '8':
  - type: text
    content: 'Thus dwelt Esau in mount Seir: Esau '
  - type: text
    content: is
  - type: text
    content: ' Edom.'
  '9':
  - type: text
    content: 'And these '
  - type: text
    content: are
  - type: text
    content: ' the generations of Esau the father of the Edomites in mount Seir: '
