document_id: GEN.36,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Esau's Descendants
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the generations of Esau, who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Edom. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the names of Esau''s sons; Eliphaz the son of Adah the wife of Esau, Reuel the son of Bashemath the wife of Esau. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And the sons of Eliphaz were Teman, Omar, Zepho, and Gatam, and Kenaz. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And Timna was concubine to Eliphaz Esau''s son; and she bare to Eliphaz Amalek: these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' the sons of Adah Esau''s wife. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the sons of Reuel; Nahath, and Zerah, Shammah, and Mizzah: these were the sons of Bashemath Esau''s wife. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And these were the sons of Aholibamah, the daughter of Anah the daughter of Zibeon, Esau''s wife: and she bare to Esau Jeush, and Jaalam, and Korah.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' dukes of the sons of Esau: the sons of Eliphaz the firstborn '
    - type: usfm
      marker: add
      children:
      - type: text
        text: son
    - type: text
      text: ' of Esau; duke Teman, duke Omar, duke Zepho, duke Kenaz, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'duke Korah, duke Gatam, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' duke Amalek: these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the dukes '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that came
    - type: text
      text: ' of Eliphaz in the land of Edom; these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' the sons of Adah. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the sons of Reuel Esau''s son; duke Nahath, duke Zerah, duke Shammah, duke Mizzah: these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the dukes '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that came
    - type: text
      text: ' of Reuel in the land of Edom; these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the sons of Bashemath Esau''s wife. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the sons of Aholibamah Esau''s wife; duke Jeush, duke Jaalam, duke Korah: these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' the dukes '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that came
    - type: text
      text: ' of Aholibamah the daughter of Anah, Esau''s wife. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the sons of Esau, who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Edom, and these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' their dukes.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Esau took his wives of the daughters of Canaan; Adah the daughter of Elon the Hittite, and Aholibamah the daughter of Anah the daughter of Zibeon the Hivite; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the sons of Seir the Horite, who inhabited the land; Lotan, and Shobal, and Zibeon, and Anah, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'and Dishon, and Ezer, and Dishan: these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the dukes of the Horites, the children of Seir in the land of Edom. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And the children of Lotan were Hori and Hemam; and Lotan''s sister '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Timna. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And the children of Shobal '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' these; Alvan, and Manahath, and Ebal, Shepho, and Onam. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the children of Zibeon; both Ajah, and Anah: this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was that
    - type: text
      text: ' Anah that found the mules in the wilderness, as he fed the asses of Zibeon his father. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And the children of Anah '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' these; Dishon, and Aholibamah the daughter of Anah. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the children of Dishon; Hemdan, and Eshban, and Ithran, and Cheran. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'The children of Ezer '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' these; Bilhan, and Zaavan, and Akan. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'The children of Dishan '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' these; Uz, and Aran. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the dukes '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that came
    - type: text
      text: ' of the Horites; duke Lotan, duke Shobal, duke Zibeon, duke Anah, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'and Bashemath Ishmael''s daughter, sister of Nebajoth. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'duke Dishon, duke Ezer, duke Dishan: these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the dukes '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that came
    - type: text
      text: ' of Hori, among their dukes in the land of Seir.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the kings that reigned in the land of Edom, before there reigned any king over the children of Israel. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And Bela the son of Beor reigned in Edom: and the name of his city '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Dinhabah. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And Bela died, and Jobab the son of Zerah of Bozrah reigned in his stead. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'And Jobab died, and Husham of the land of Temani reigned in his stead. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'And Husham died, and Hadad the son of Bedad, who smote Midian in the field of Moab, reigned in his stead: and the name of his city '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Avith. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'And Hadad died, and Samlah of Masrekah reigned in his stead. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'And Samlah died, and Saul of Rehoboth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: by
    - type: text
      text: ' the river reigned in his stead. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'And Saul died, and Baal-hanan the son of Achbor reigned in his stead. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'And Baal-hanan the son of Achbor died, and Hadar reigned in his stead: and the name of his city '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Pau; and his wife''s name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Mehetabel, the daughter of Matred, the daughter of Mezahab.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And Adah bare to Esau Eliphaz; and Bashemath bare Reuel; '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'And these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the names of the dukes '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that came
    - type: text
      text: ' of Esau, according to their families, after their places, by their names; duke Timnah, duke Alvah, duke Jetheth, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'duke Aholibamah, duke Elah, duke Pinon, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'duke Kenaz, duke Teman, duke Mibzar, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'duke Magdiel, duke Iram: these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' the dukes of Edom, according to their habitations in the land of their possession: he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Esau the father of the Edomites.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'and Aholibamah bare Jeush, and Jaalam, and Korah: these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the sons of Esau, which were born unto him in the land of Canaan. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And Esau took his wives, and his sons, and his daughters, and all the persons of his house, and his cattle, and all his beasts, and all his substance, which he had got in the land of Canaan; and went into the country from the face of his brother Jacob. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For their riches were more than that they might dwell together; and the land wherein they were strangers could not bear them because of their cattle. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Thus dwelt Esau in mount Seir: Esau '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Edom.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the generations of Esau the father of the Edomites in mount Seir: '
