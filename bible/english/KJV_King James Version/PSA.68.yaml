document_id: PSA.68,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the chief Musician, A Psalm '
    - type: usfm
      marker: add
      children:
      - type: text
        text: or
    - type: text
      text: ' Song of David.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let God arise, let his enemies be scattered:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them also that hate him flee before him.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thy congregation hath dwelt therein:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou, O God, hast prepared of thy goodness for the poor.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Lord gave the word:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Great '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the company of those that published '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Kings of armies did flee apace:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And she that tarried at home divided the spoil.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Though ye have lien among the pots, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yet shall ye be as
    - type: text
      text: ' the wings of a dove'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Covered with silver, and her feathers with yellow gold.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the Almighty scattered kings in it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'It was '
    - type: usfm
      marker: add
      children:
      - type: text
        text: white
    - type: text
      text: ' as snow in Salmon.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The hill of God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is as
    - type: text
      text: ' the hill of Bashan;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'An high hill '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' the hill of Bashan.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Why leap ye, ye high hills? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: This is
    - type: text
      text: ' the hill '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' God desireth to dwell in;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yea, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will dwell '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in it
    - type: text
      text: ' for ever.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The chariots of God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' twenty thousand, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' thousands of angels:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The Lord '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' among them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as in
    - type: text
      text: ' Sinai, in the holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: place
    - type: text
      text: .
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou hast ascended on high, thou hast led captivity captive: Thou hast received gifts for men;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yea, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' the rebellious also, that the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ' might dwell '
    - type: usfm
      marker: add
      children:
      - type: text
        text: among them
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' the Lord,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Who
    - type: text
      text: ' daily loadeth us '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with benefits
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the God of our salvation. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'As smoke is driven away, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' drive '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' away:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'As wax melteth before the fire, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' let the wicked perish at the presence of God.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: He that is
    - type: text
      text: ' our God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the God of salvation;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And unto '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ' the Lord '
    - type: usfm
      marker: add
      children:
      - type: text
        text: belong
    - type: text
      text: ' the issues from death.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But God shall wound the head of his enemies,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' the hairy scalp of such an one as goeth on still in his trespasses.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Lord said, I will bring again from Bashan, I will bring '
    - type: usfm
      marker: add
      children:
      - type: text
        text: my people
    - type: text
      text: ' again'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'from the depths of the sea:'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'That thy foot may be dipped in the blood of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thine
    - type: text
      text: ' enemies,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' the tongue of thy dogs in the same.'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have seen thy goings, O God;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Even
    - type: text
      text: ' the goings of my God, my King, in the sanctuary.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The singers went before, the players on instruments '
    - type: usfm
      marker: add
      children:
      - type: text
        text: followed
    - type: text
      text: ' after;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Among '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them were
    - type: text
      text: ' the damsels playing with timbrels.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bless ye God in the congregations,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Even
    - type: text
      text: ' the Lord, from the fountain of Israel.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' little Benjamin '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' their ruler, the princes of Judah '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' their council,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The princes of Zebulun, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the princes of Naphtali.'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thy God hath commanded thy strength:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Strengthen, O God, that which thou hast wrought for us.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of thy temple at Jerusalem
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shall kings bring presents unto thee.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But let the righteous be glad; let them rejoice before God:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yea, let them exceedingly rejoice.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rebuke the company of spearmen,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The multitude of the bulls, with the calves of the people,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Till every one
    - type: text
      text: ' submit himself with pieces of silver:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Scatter thou the people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' delight in war.'
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Princes shall come out of Egypt;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Ethiopia shall soon stretch out her hands unto God.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sing unto God, ye kingdoms of the earth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O sing praises unto the Lord; '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: 'Selah:'
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'To him that rideth upon the heavens of heavens, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which were
    - type: text
      text: ' of old;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Lo, he doth send out his voice, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and that
    - type: text
      text: ' a mighty voice.'
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ascribe ye strength unto God: His excellency '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' over Israel,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And his strength '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the clouds.'
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O God, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thou art
    - type: text
      text: ' terrible out of thy holy places:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The God of Israel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' he that giveth strength and power unto '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' people. Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' God.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sing unto God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Sing praises to his name:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Extol him that rideth upon the heavens
  - type: usfm
    marker: q2
    children:
    - type: text
      text: By his name JAH, and rejoice before him.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A father of the fatherless, and a judge of the widows,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' God in his holy habitation.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'God setteth the solitary in families: He bringeth out those which are bound with chains:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the rebellious dwell in a dry '
    - type: usfm
      marker: add
      children:
      - type: text
        text: land
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O God, when thou wentest forth before thy people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When thou didst march through the wilderness; '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: 'Selah:'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The earth shook, the heavens also dropped at the presence of God:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Even
    - type: text
      text: ' Sinai itself '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was moved
  - type: usfm
    marker: q2
    children:
    - type: text
      text: At the presence of God, the God of Israel.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thou, O God, didst send a plentiful rain, whereby thou didst confirm thine inheritance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When it was weary.
