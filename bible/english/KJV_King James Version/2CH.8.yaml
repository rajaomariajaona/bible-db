document_id: 2CH.8,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon's Reign
  - type: text
    content: 'And it came to pass at the end of twenty years, wherein Solomon had built the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and his own house, '
  '10':
  - type: text
    content: 'And these '
  - type: text
    content: were
  - type: text
    content: ' the chief of king Solomon''s officers, '
  - type: text
    content: even
  - type: text
    content: ' two hundred and fifty, that bare rule over the people.'
  '11':
  - type: text
    content: 'And Solomon brought up the daughter of Pharaoh out of the city of David unto the house that he had built for her: for he said, My wife shall not dwell in the house of David king of Israel, because '
  - type: text
    content: the places are
  - type: text
    content: ' holy, whereunto the ark of the '
  - type: text
    content: LORD
  - type: text
    content: ' hath come.'
  '12':
  - type: text
    content: 'Then Solomon offered burnt offerings unto the '
  - type: text
    content: LORD
  - type: text
    content: ' on the altar of the '
  - type: text
    content: LORD
  - type: text
    content: ', which he had built before the porch, '
  '13':
  - type: text
    content: 'even after a certain rate every day, offering according to the commandment of Moses, on the sabbaths, and on the new moons, and on the solemn feasts, three times in the year, '
  - type: text
    content: even
  - type: text
    content: ' in the feast of unleavened bread, and in the feast of weeks, and in the feast of tabernacles.'
  '14':
  - type: text
    content: 'And he appointed, according to the order of David his father, the courses of the priests to their service, and the Levites to their charges, to praise and minister before the priests, as the duty of every day required: the porters also by their courses at every gate: for so had David the man of God commanded. '
  '15':
  - type: text
    content: And they departed not from the commandment of the king unto the priests and Levites concerning any matter, or concerning the treasures.
  '16':
  - type: text
    content: 'Now all the work of Solomon was prepared unto the day of the foundation of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and until it was finished. '
  - type: text
    content: So
  - type: text
    content: ' the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' was perfected.'
  '17':
  - type: text
    content: 'Then went Solomon to Ezion-geber, and to Eloth, at the sea side in the land of Edom. '
  '18':
  - type: text
    content: 'And Huram sent him by the hands of his servants ships, and servants that had knowledge of the sea; and they went with the servants of Solomon to Ophir, and took thence four hundred and fifty talents of gold, and brought '
  - type: text
    content: them
  - type: text
    content: ' to king Solomon.'
  '2':
  - type: text
    content: that the cities which Huram had restored to Solomon, Solomon built them, and caused the children of Israel to dwell there.
  '3':
  - type: text
    content: 'And Solomon went to Hamath-zobah, and prevailed against it. '
  '4':
  - type: text
    content: 'And he built Tadmor in the wilderness, and all the store cities, which he built in Hamath. '
  '5':
  - type: text
    content: 'Also he built Beth-horon the upper, and Beth-horon the nether, fenced cities, with walls, gates, and bars; '
  '6':
  - type: text
    content: and Baalath, and all the store cities that Solomon had, and all the chariot cities, and the cities of the horsemen, and all that Solomon desired to build in Jerusalem, and in Lebanon, and throughout all the land of his dominion.
  '7':
  - type: text
    content: ' '
  - type: text
    content: As for
  - type: text
    content: ' all the people '
  - type: text
    content: that were
  - type: text
    content: ' left of the Hittites, and the Amorites, and the Perizzites, and the Hivites, and the Jebusites, which '
  - type: text
    content: were
  - type: text
    content: ' not of Israel, '
  '8':
  - type: text
    content: but
  - type: text
    content: ' of their children, who were left after them in the land, whom the children of Israel consumed not, them did Solomon make to pay tribute until this day. '
  '9':
  - type: text
    content: 'But of the children of Israel did Solomon make no servants for his work; but they '
  - type: text
    content: were
  - type: text
    content: ' men of war, and chief of his captains, and captains of his chariots and horsemen. '
