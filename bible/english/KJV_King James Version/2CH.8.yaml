document_id: 2CH.8,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Solomon's Reign
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass at the end of twenty years, wherein Solomon had built the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and his own house, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' the chief of king Solomon''s officers, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' two hundred and fifty, that bare rule over the people.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Solomon brought up the daughter of Pharaoh out of the city of David unto the house that he had built for her: for he said, My wife shall not dwell in the house of David king of Israel, because '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the places are
    - type: text
      text: ' holy, whereunto the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath come.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Solomon offered burnt offerings unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' on the altar of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', which he had built before the porch, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'even after a certain rate every day, offering according to the commandment of Moses, on the sabbaths, and on the new moons, and on the solemn feasts, three times in the year, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' in the feast of unleavened bread, and in the feast of weeks, and in the feast of tabernacles.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he appointed, according to the order of David his father, the courses of the priests to their service, and the Levites to their charges, to praise and minister before the priests, as the duty of every day required: the porters also by their courses at every gate: for so had David the man of God commanded. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they departed not from the commandment of the king unto the priests and Levites concerning any matter, or concerning the treasures.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now all the work of Solomon was prepared unto the day of the foundation of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and until it was finished. '
    - type: usfm
      marker: add
      children:
      - type: text
        text: So
    - type: text
      text: ' the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was perfected.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then went Solomon to Ezion-geber, and to Eloth, at the sea side in the land of Edom. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Huram sent him by the hands of his servants ships, and servants that had knowledge of the sea; and they went with the servants of Solomon to Ophir, and took thence four hundred and fifty talents of gold, and brought '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' to king Solomon.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: that the cities which Huram had restored to Solomon, Solomon built them, and caused the children of Israel to dwell there.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Solomon went to Hamath-zobah, and prevailed against it. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he built Tadmor in the wilderness, and all the store cities, which he built in Hamath. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also he built Beth-horon the upper, and Beth-horon the nether, fenced cities, with walls, gates, and bars; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and Baalath, and all the store cities that Solomon had, and all the chariot cities, and the cities of the horsemen, and all that Solomon desired to build in Jerusalem, and in Lebanon, and throughout all the land of his dominion.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: As for
    - type: text
      text: ' all the people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that were
    - type: text
      text: ' left of the Hittites, and the Amorites, and the Perizzites, and the Hivites, and the Jebusites, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' not of Israel, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' of their children, who were left after them in the land, whom the children of Israel consumed not, them did Solomon make to pay tribute until this day. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But of the children of Israel did Solomon make no servants for his work; but they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' men of war, and chief of his captains, and captains of his chariots and horsemen. '
