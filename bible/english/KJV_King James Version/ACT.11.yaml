document_id: ACT.11,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Peter Interviewed by Council
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the apostles and brethren that were in Judæa heard that the Gentiles had also received the word of God. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And this was done three times: and all were drawn up again into heaven. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And, behold, immediately there were three men already come unto the house where I was, sent from Cæsarea unto me. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the Spirit bade me go with them, nothing doubting. Moreover these six brethren accompanied me, and we entered into the man''s house: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he shewed us how he had seen an angel in his house, which stood and said unto him, Send men to Joppa, and call for Simon, whose surname is Peter; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'who shall tell thee words, whereby thou and all thy house shall be saved. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as I began to speak, the Holy Ghost fell on them, as on us at the beginning. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then remembered I the word of the Lord, how that he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: John indeed baptized with water; but ye shall be baptized with the Holy Ghost.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Forasmuch then as God gave them the like gift as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he did
    - type: text
      text: ' unto us, who believed on the Lord Jesus Christ; what was I, that I could withstand God? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When they heard these things, they held their peace, and glorified God, saying, Then hath God also to the Gentiles granted repentance unto life.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Church in Antioch
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now they which were scattered abroad upon the persecution that arose about Stephen travelled as far as Phenice, and Cyprus, and Antioch, preaching the word to none but unto the Jews only. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Peter was come up to Jerusalem, they that were of the circumcision contended with him, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And some of them were men of Cyprus and Cyrene, which, when they were come to Antioch, spake unto the Grecians, preaching the Lord Jesus. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the hand of the Lord was with them: and a great number believed, and turned unto the Lord.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then tidings of these things came unto the ears of the church which was in Jerusalem: and they sent forth Barnabas, that he should go as far as Antioch. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who, when he came, and had seen the grace of God, was glad, and exhorted them all, that with purpose of heart they would cleave unto the Lord. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For he was a good man, and full of the Holy Ghost and of faith: and much people was added unto the Lord. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then departed Barnabas to Tarsus, for to seek Saul: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and when he had found him, he brought him unto Antioch. And it came to pass, that a whole year they assembled themselves with the church, and taught much people. And the disciples were called Christians first in Antioch.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in these days came prophets from Jerusalem unto Antioch. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there stood up one of them named Agabus, and signified by the Spirit that there should be great dearth throughout all the world: which came to pass in the days of Claudius Cæsar. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the disciples, every man according to his ability, determined to send relief unto the brethren which dwelt in Judæa: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'saying, Thou wentest in to men uncircumcised, and didst eat with them. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Which also they did, and sent it to the elders by the hands of Barnabas and Saul.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Peter rehearsed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the matter
    - type: text
      text: ' from the beginning, and expounded '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' by order unto them, saying, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I was in the city of Joppa praying: and in a trance I saw a vision, A certain vessel descend, as it had been a great sheet, let down from heaven by four corners; and it came even to me: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'upon the which when I had fastened mine eyes, I considered, and saw fourfooted beasts of the earth, and wild beasts, and creeping things, and fowls of the air. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I heard a voice saying unto me, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Arise, Peter; slay and eat.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I said, Not so, Lord: for nothing common or unclean hath at any time entered into my mouth. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the voice answered me again from heaven, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'What God hath cleansed, '
      - type: usfm
        marker: add
        children:
        - type: text
          text: that
      - type: text
        text: ' call not thou common.'
    - type: text
      text: ' '
