document_id: ACT.11,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Peter Interviewed by Council
  - type: text
    content: 'And the apostles and brethren that were in Judæa heard that the Gentiles had also received the word of God. '
  '10':
  - type: text
    content: 'And this was done three times: and all were drawn up again into heaven. '
  '11':
  - type: text
    content: 'And, behold, immediately there were three men already come unto the house where I was, sent from Cæsarea unto me. '
  '12':
  - type: text
    content: 'And the Spirit bade me go with them, nothing doubting. Moreover these six brethren accompanied me, and we entered into the man''s house: '
  '13':
  - type: text
    content: 'and he shewed us how he had seen an angel in his house, which stood and said unto him, Send men to Joppa, and call for Simon, whose surname is Peter; '
  '14':
  - type: text
    content: 'who shall tell thee words, whereby thou and all thy house shall be saved. '
  '15':
  - type: text
    content: 'And as I began to speak, the Holy Ghost fell on them, as on us at the beginning. '
  '16':
  - type: text
    content: 'Then remembered I the word of the Lord, how that he said, '
  - type: text
    content: John indeed baptized with water; but ye shall be baptized with the Holy Ghost.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Forasmuch then as God gave them the like gift as '
  - type: text
    content: he did
  - type: text
    content: ' unto us, who believed on the Lord Jesus Christ; what was I, that I could withstand God? '
  '18':
  - type: text
    content: When they heard these things, they held their peace, and glorified God, saying, Then hath God also to the Gentiles granted repentance unto life.
  - type: heading
    content: The Church in Antioch
  '19':
  - type: text
    content: 'Now they which were scattered abroad upon the persecution that arose about Stephen travelled as far as Phenice, and Cyprus, and Antioch, preaching the word to none but unto the Jews only. '
  '2':
  - type: text
    content: 'And when Peter was come up to Jerusalem, they that were of the circumcision contended with him, '
  '20':
  - type: text
    content: 'And some of them were men of Cyprus and Cyrene, which, when they were come to Antioch, spake unto the Grecians, preaching the Lord Jesus. '
  '21':
  - type: text
    content: 'And the hand of the Lord was with them: and a great number believed, and turned unto the Lord.'
  '22':
  - type: text
    content: 'Then tidings of these things came unto the ears of the church which was in Jerusalem: and they sent forth Barnabas, that he should go as far as Antioch. '
  '23':
  - type: text
    content: 'Who, when he came, and had seen the grace of God, was glad, and exhorted them all, that with purpose of heart they would cleave unto the Lord. '
  '24':
  - type: text
    content: 'For he was a good man, and full of the Holy Ghost and of faith: and much people was added unto the Lord. '
  '25':
  - type: text
    content: 'Then departed Barnabas to Tarsus, for to seek Saul: '
  '26':
  - type: text
    content: and when he had found him, he brought him unto Antioch. And it came to pass, that a whole year they assembled themselves with the church, and taught much people. And the disciples were called Christians first in Antioch.
  '27':
  - type: text
    content: 'And in these days came prophets from Jerusalem unto Antioch. '
  '28':
  - type: text
    content: 'And there stood up one of them named Agabus, and signified by the Spirit that there should be great dearth throughout all the world: which came to pass in the days of Claudius Cæsar. '
  '29':
  - type: text
    content: 'Then the disciples, every man according to his ability, determined to send relief unto the brethren which dwelt in Judæa: '
  '3':
  - type: text
    content: 'saying, Thou wentest in to men uncircumcised, and didst eat with them. '
  '30':
  - type: text
    content: Which also they did, and sent it to the elders by the hands of Barnabas and Saul.
  '4':
  - type: text
    content: 'But Peter rehearsed '
  - type: text
    content: the matter
  - type: text
    content: ' from the beginning, and expounded '
  - type: text
    content: it
  - type: text
    content: ' by order unto them, saying, '
  '5':
  - type: text
    content: 'I was in the city of Joppa praying: and in a trance I saw a vision, A certain vessel descend, as it had been a great sheet, let down from heaven by four corners; and it came even to me: '
  '6':
  - type: text
    content: 'upon the which when I had fastened mine eyes, I considered, and saw fourfooted beasts of the earth, and wild beasts, and creeping things, and fowls of the air. '
  '7':
  - type: text
    content: 'And I heard a voice saying unto me, '
  - type: text
    content: Arise, Peter; slay and eat.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'But I said, Not so, Lord: for nothing common or unclean hath at any time entered into my mouth. '
  '9':
  - type: text
    content: 'But the voice answered me again from heaven, '
  - type: text
    content: 'What God hath cleansed, '
  - type: text
    content: that
  - type: text
    content: ' call not thou common.'
  - type: text
    content: ' '
