document_id: 2KI.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then Moab rebelled against Israel after the death of Ahab. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And Elijah answered and said to the captain of fifty, If I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' a man of God, then let fire come down from heaven, and consume thee and thy fifty. And there came down fire from heaven, and consumed him and his fifty. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Again also he sent unto him another captain of fifty with his fifty. And he answered and said unto him, O man of God, thus hath the king said, Come down quickly. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And Elijah answered and said unto them, If I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' a man of God, let fire come down from heaven, and consume thee and thy fifty. And the fire of God came down from heaven, and consumed him and his fifty.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And he sent again a captain of the third fifty with his fifty. And the third captain of fifty went up, and came and fell on his knees before Elijah, and besought him, and said unto him, O man of God, I pray thee, let my life, and the life of these fifty thy servants, be precious in thy sight. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Behold, there came fire down from heaven, and burnt up the two captains of the former fifties with their fifties: therefore let my life now be precious in thy sight. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Elijah, Go down with him: be not afraid of him. And he arose, and went down with him unto the king. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And he said unto him, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', Forasmuch as thou hast sent messengers to enquire of Baal-zebub the god of Ekron, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is it
    - type: text
      text: ' not because '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no God in Israel to enquire of his word? therefore thou shalt not come down off that bed on which thou art gone up, but shalt surely die.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'So he died according to the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' which Elijah had spoken. And Jehoram reigned in his stead in the second year of Jehoram the son of Jehoshaphat king of Judah; because he had no son. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Now the rest of the acts of Ahaziah which he did, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Israel?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And Ahaziah fell down through a lattice in his upper chamber that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in Samaria, and was sick: and he sent messengers, and said unto them, Go, enquire of Baal-zebub the god of Ekron whether I shall recover of this disease.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Elijah and the Messengers
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said to Elijah the Tishbite, Arise, go up to meet the messengers of the king of Samaria, and say unto them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is it
    - type: text
      text: ' not because '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' not a God in Israel, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' ye go to enquire of Baal-zebub the god of Ekron? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Now therefore thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', Thou shalt not come down from that bed on which thou art gone up, but shalt surely die. And Elijah departed.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And when the messengers turned back unto him, he said unto them, Why are ye now turned back? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And they said unto him, There came a man up to meet us, and said unto us, Go, turn again unto the king that sent you, and say unto him, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is it
    - type: text
      text: ' not because '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' not a God in Israel, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' thou sendest to enquire of Baal-zebub the god of Ekron? therefore thou shalt not come down from that bed on which thou art gone up, but shalt surely die. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And he said unto them, What manner of man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was he
    - type: text
      text: ' which came up to meet you, and told you these words? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And they answered him, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: He was
    - type: text
      text: ' an hairy man, and girt with a girdle of leather about his loins. And he said, It '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Elijah the Tishbite.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then the king sent unto him a captain of fifty with his fifty. And he went up to him: and, behold, he sat on the top of an hill. And he spake unto him, Thou man of God, the king hath said, Come down. '
