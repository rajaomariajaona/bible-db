document_id: EZK.5,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And thou, son of man, take thee a sharp knife, take thee a barber''s razor, and cause '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to pass upon thine head and upon thy beard: then take thee balances to weigh, and divide the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: hair
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Therefore the fathers shall eat the sons in the midst of thee, and the sons shall eat their fathers; and I will execute judgments in thee, and the whole remnant of thee will I scatter into all the winds. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Wherefore, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' I live, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; Surely, because thou hast defiled my sanctuary with all thy detestable things, and with all thine abominations, therefore will I also diminish '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thee
    - type: text
      text: '; neither shall mine eye spare, neither will I have any pity. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'A third part of thee shall die with the pestilence, and with famine shall they be consumed in the midst of thee: and a third part shall fall by the sword round about thee; and I will scatter a third part into all the winds, and I will draw out a sword after them. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Thus shall mine anger be accomplished, and I will cause my fury to rest upon them, and I will be comforted: and they shall know that I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' have spoken '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' in my zeal, when I have accomplished my fury in them.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Moreover I will make thee waste, and a reproach among the nations that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' round about thee, in the sight of all that pass by. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So it shall be a reproach and a taunt, an instruction and an astonishment unto the nations that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' round about thee, when I shall execute judgments in thee in anger and in fury and in furious rebukes. I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' have spoken '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'When I shall send upon them the evil arrows of famine, which shall be for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' destruction, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' which I will send to destroy you: and I will increase the famine upon you, and will break your staff of bread: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'so will I send upon you famine and evil beasts, and they shall bereave thee; and pestilence and blood shall pass through thee; and I will bring the sword upon thee. I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' have spoken '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Thou shalt burn with fire a third part in the midst of the city, when the days of the siege are fulfilled: and thou shalt take a third part, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' smite about it with a knife: and a third part thou shalt scatter in the wind; and I will draw out a sword after them. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Thou shalt also take thereof a few in number, and bind them in thy skirts. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then take of them again, and cast them into the midst of the fire, and burn them in the fire; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' thereof shall a fire come forth into all the house of Israel.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The City's Destruction
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Jerusalem: I have set it in the midst of the nations and countries '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that are
    - type: text
      text: ' round about her. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And she hath changed my judgments into wickedness more than the nations, and my statutes more than the countries that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' round about her: for they have refused my judgments and my statutes, they have not walked in them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Therefore thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; Because ye multiplied more than the nations that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' round about you, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' have not walked in my statutes, neither have kept my judgments, neither have done according to the judgments of the nations that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' round about you; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'therefore thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; Behold, I, even I, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' against thee, and will execute judgments in the midst of thee in the sight of the nations. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And I will do in thee that which I have not done, and whereunto I will not do any more the like, because of all thine abominations. '
