document_id: NUM.26
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Census of the People
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And it came to pass after the plague, that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses and unto Eleazar the son of Aaron the priest, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Take the sum of all the congregation of the children of Israel, from twenty years old and upward, throughout their fathers'' house, all that are able to go to war in Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Moses and Eleazar the priest spake with them in the plains of Moab by Jordan '
  - type: usfm
    marker: add
    children:
    - type: text
      text: near
  - type: text
    text: ' Jericho, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Take the sum of the people
  - type: text
    text: ', from twenty years old and upward; as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses and the children of Israel, which went forth out of the land of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Reuben, the eldest son of Israel: the children of Reuben; Hanoch, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of whom cometh
  - type: text
    text: ' the family of the Hanochites: of Pallu, the family of the Palluites: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'of Hezron, the family of the Hezronites: of Carmi, the family of the Carmites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the families of the Reubenites: and they that were numbered of them were forty and three thousand and seven hundred and thirty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the sons of Pallu; Eliab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the sons of Eliab; Nemuel, and Dathan, and Abiram. This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is that
  - type: text
    text: ' Dathan and Abiram, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which were
  - type: text
    text: ' famous in the congregation, who strove against Moses and against Aaron in the company of Korah, when they strove against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and the earth opened her mouth, and swallowed them up together with Korah, when that company died, what time the fire devoured two hundred and fifty men: and they became a sign. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Notwithstanding the children of Korah died not.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The sons of Simeon after their families: of Nemuel, the family of the Nemuelites: of Jamin, the family of the Jaminites: of Jachin, the family of the Jachinites: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'of Zerah, the family of the Zarhites: of Shaul, the family of the Shaulites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the families of the Simeonites, twenty and two thousand and two hundred.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The children of Gad after their families: of Zephon, the family of the Zephonites: of Haggi, the family of the Haggites: of Shuni, the family of the Shunites: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'of Ozni, the family of the Oznites: of Eri, the family of the Erites: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'of Arod, the family of the Arodites: of Areli, the family of the Arelites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the families of the children of Gad according to those that were numbered of them, forty thousand and five hundred.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The sons of Judah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' Er and Onan: and Er and Onan died in the land of Canaan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the sons of Judah after their families were; of Shelah, the family of the Shelanites: of Pharez, the family of the Pharzites: of Zerah, the family of the Zarhites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And the sons of Pharez were; of Hezron, the family of the Hezronites: of Hamul, the family of the Hamulites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the families of Judah according to those that were numbered of them, threescore and sixteen thousand and five hundred.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Of
  - type: text
    text: ' the sons of Issachar after their families: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' Tola, the family of the Tolaites: of Pua, the family of the Punites: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'of Jashub, the family of the Jashubites: of Shimron, the family of the Shimronites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the families of Issachar according to those that were numbered of them, threescore and four thousand and three hundred.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Of
  - type: text
    text: ' the sons of Zebulun after their families: of Sered, the family of the Sardites: of Elon, the family of the Elonites: of Jahleel, the family of the Jahleelites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the families of the Zebulunites according to those that were numbered of them, threescore thousand and five hundred.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'The sons of Joseph after their families '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' Manasseh and Ephraim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Of the sons of Manasseh: of Machir, the family of the Machirites: and Machir begat Gilead: of Gilead '
  - type: usfm
    marker: add
    children:
    - type: text
      text: come
  - type: text
    text: ' the family of the Gileadites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the sons of Gilead: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' Jeezer, the family of the Jeezerites: of Helek, the family of the Helekites: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' Asriel, the family of the Asrielites: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' Shechem, the family of the Shechemites: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' Shemida, the family of the Shemidaites: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' Hepher, the family of the Hepherites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And Zelophehad the son of Hepher had no sons, but daughters: and the names of the daughters of Zelophehad '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' Mahlah, and Noah, Hoglah, Milcah, and Tirzah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the families of Manasseh, and those that were numbered of them, fifty and two thousand and seven hundred.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the sons of Ephraim after their families: of Shuthelah, the family of the Shuthalhites: of Becher, the family of the Bachrites: of Tahan, the family of the Tahanites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the sons of Shuthelah: of Eran, the family of the Eranites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the families of the sons of Ephraim according to those that were numbered of them, thirty and two thousand and five hundred. These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the sons of Joseph after their families.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'The sons of Benjamin after their families: of Bela, the family of the Belaites: of Ashbel, the family of the Ashbelites: of Ahiram, the family of the Ahiramites: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'of Shupham, the family of the Shuphamites: of Hupham, the family of the Huphamites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And the sons of Bela were Ard and Naaman: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of Ard
  - type: text
    text: ', the family of the Ardites: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' of Naaman, the family of the Naamites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the sons of Benjamin after their families: and they that were numbered of them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' forty and five thousand and six hundred.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the sons of Dan after their families: of Shuham, the family of the Shuhamites. These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the families of Dan after their families. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'All the families of the Shuhamites, according to those that were numbered of them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' threescore and four thousand and four hundred.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Of
  - type: text
    text: ' the children of Asher after their families: of Jimna, the family of the Jimnites: of Jesui, the family of the Jesuites: of Beriah, the family of the Beriites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Of the sons of Beriah: of Heber, the family of the Heberites: of Malchiel, the family of the Malchielites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'And the name of the daughter of Asher '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Sarah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the families of the sons of Asher according to those that were numbered of them; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: who were
  - type: text
    text: ' fifty and three thousand and four hundred.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Of
  - type: text
    text: ' the sons of Naphtali after their families: of Jahzeel, the family of the Jahzeelites: of Guni, the family of the Gunites: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'of Jezer, the family of the Jezerites: of Shillem, the family of the Shillemites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the families of Naphtali according to their families: and they that were numbered of them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' forty and five thousand and four hundred. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' the numbered of the children of Israel, six hundred thousand and a thousand seven hundred and thirty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Unto these the land shall be divided for an inheritance according to the number of names. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'To many thou shalt give the more inheritance, and to few thou shalt give the less inheritance: to every one shall his inheritance be given according to those that were numbered of him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Notwithstanding the land shall be divided by lot: according to the names of the tribes of their fathers they shall inherit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: According to the lot shall the possession thereof be divided between many and few.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'And these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' they that were numbered of the Levites after their families: of Gershon, the family of the Gershonites: of Kohath, the family of the Kohathites: of Merari, the family of the Merarites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the families of the Levites: the family of the Libnites, the family of the Hebronites, the family of the Mahlites, the family of the Mushites, the family of the Korathites. And Kohath begat Amram. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'And the name of Amram''s wife '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Jochebed, the daughter of Levi, whom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her mother
  - type: text
    text: ' bare to Levi in Egypt: and she bare unto Amram Aaron and Moses, and Miriam their sister. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'And unto Aaron was born Nadab, and Abihu, Eleazar, and Ithamar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'And Nadab and Abihu died, when they offered strange fire before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'And those that were numbered of them were twenty and three thousand, all males from a month old and upward: for they were not numbered among the children of Israel, because there was no inheritance given them among the children of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' they that were numbered by Moses and Eleazar the priest, who numbered the children of Israel in the plains of Moab by Jordan '
  - type: usfm
    marker: add
    children:
    - type: text
      text: near
  - type: text
    text: ' Jericho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'But among these there was not a man of them whom Moses and Aaron the priest numbered, when they numbered the children of Israel in the wilderness of Sinai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had said of them, They shall surely die in the wilderness. And there was not left a man of them, save Caleb the son of Jephunneh, and Joshua the son of Nun.'
