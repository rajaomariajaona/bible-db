document_id: NUM.26,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Census of the People
  - type: text
    content: 'And it came to pass after the plague, that the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses and unto Eleazar the son of Aaron the priest, saying, '
  '10':
  - type: text
    content: 'and the earth opened her mouth, and swallowed them up together with Korah, when that company died, what time the fire devoured two hundred and fifty men: and they became a sign. '
  '11':
  - type: text
    content: Notwithstanding the children of Korah died not.
  '12':
  - type: text
    content: 'The sons of Simeon after their families: of Nemuel, the family of the Nemuelites: of Jamin, the family of the Jaminites: of Jachin, the family of the Jachinites: '
  '13':
  - type: text
    content: 'of Zerah, the family of the Zarhites: of Shaul, the family of the Shaulites. '
  '14':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the families of the Simeonites, twenty and two thousand and two hundred.'
  '15':
  - type: text
    content: 'The children of Gad after their families: of Zephon, the family of the Zephonites: of Haggi, the family of the Haggites: of Shuni, the family of the Shunites: '
  '16':
  - type: text
    content: 'of Ozni, the family of the Oznites: of Eri, the family of the Erites: '
  '17':
  - type: text
    content: 'of Arod, the family of the Arodites: of Areli, the family of the Arelites. '
  '18':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the families of the children of Gad according to those that were numbered of them, forty thousand and five hundred.'
  '19':
  - type: text
    content: 'The sons of Judah '
  - type: text
    content: were
  - type: text
    content: ' Er and Onan: and Er and Onan died in the land of Canaan. '
  '2':
  - type: text
    content: 'Take the sum of all the congregation of the children of Israel, from twenty years old and upward, throughout their fathers'' house, all that are able to go to war in Israel. '
  '20':
  - type: text
    content: 'And the sons of Judah after their families were; of Shelah, the family of the Shelanites: of Pharez, the family of the Pharzites: of Zerah, the family of the Zarhites. '
  '21':
  - type: text
    content: 'And the sons of Pharez were; of Hezron, the family of the Hezronites: of Hamul, the family of the Hamulites. '
  '22':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the families of Judah according to those that were numbered of them, threescore and sixteen thousand and five hundred.'
  '23':
  - type: text
    content: ' '
  - type: text
    content: Of
  - type: text
    content: ' the sons of Issachar after their families: '
  - type: text
    content: of
  - type: text
    content: ' Tola, the family of the Tolaites: of Pua, the family of the Punites: '
  '24':
  - type: text
    content: 'of Jashub, the family of the Jashubites: of Shimron, the family of the Shimronites. '
  '25':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the families of Issachar according to those that were numbered of them, threescore and four thousand and three hundred.'
  '26':
  - type: text
    content: ' '
  - type: text
    content: Of
  - type: text
    content: ' the sons of Zebulun after their families: of Sered, the family of the Sardites: of Elon, the family of the Elonites: of Jahleel, the family of the Jahleelites. '
  '27':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the families of the Zebulunites according to those that were numbered of them, threescore thousand and five hundred.'
  '28':
  - type: text
    content: 'The sons of Joseph after their families '
  - type: text
    content: were
  - type: text
    content: ' Manasseh and Ephraim. '
  '29':
  - type: text
    content: 'Of the sons of Manasseh: of Machir, the family of the Machirites: and Machir begat Gilead: of Gilead '
  - type: text
    content: come
  - type: text
    content: ' the family of the Gileadites. '
  '3':
  - type: text
    content: 'And Moses and Eleazar the priest spake with them in the plains of Moab by Jordan '
  - type: text
    content: near
  - type: text
    content: ' Jericho, saying, '
  '30':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the sons of Gilead: '
  - type: text
    content: of
  - type: text
    content: ' Jeezer, the family of the Jeezerites: of Helek, the family of the Helekites: '
  '31':
  - type: text
    content: 'and '
  - type: text
    content: of
  - type: text
    content: ' Asriel, the family of the Asrielites: and '
  - type: text
    content: of
  - type: text
    content: ' Shechem, the family of the Shechemites: '
  '32':
  - type: text
    content: 'and '
  - type: text
    content: of
  - type: text
    content: ' Shemida, the family of the Shemidaites: and '
  - type: text
    content: of
  - type: text
    content: ' Hepher, the family of the Hepherites. '
  '33':
  - type: text
    content: 'And Zelophehad the son of Hepher had no sons, but daughters: and the names of the daughters of Zelophehad '
  - type: text
    content: were
  - type: text
    content: ' Mahlah, and Noah, Hoglah, Milcah, and Tirzah. '
  '34':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the families of Manasseh, and those that were numbered of them, fifty and two thousand and seven hundred.'
  '35':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the sons of Ephraim after their families: of Shuthelah, the family of the Shuthalhites: of Becher, the family of the Bachrites: of Tahan, the family of the Tahanites. '
  '36':
  - type: text
    content: 'And these '
  - type: text
    content: are
  - type: text
    content: ' the sons of Shuthelah: of Eran, the family of the Eranites. '
  '37':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the families of the sons of Ephraim according to those that were numbered of them, thirty and two thousand and five hundred. These '
  - type: text
    content: are
  - type: text
    content: ' the sons of Joseph after their families.'
  '38':
  - type: text
    content: 'The sons of Benjamin after their families: of Bela, the family of the Belaites: of Ashbel, the family of the Ashbelites: of Ahiram, the family of the Ahiramites: '
  '39':
  - type: text
    content: 'of Shupham, the family of the Shuphamites: of Hupham, the family of the Huphamites. '
  '4':
  - type: text
    content: Take the sum of the people
  - type: text
    content: ', from twenty years old and upward; as the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses and the children of Israel, which went forth out of the land of Egypt.'
  '40':
  - type: text
    content: 'And the sons of Bela were Ard and Naaman: '
  - type: text
    content: of Ard
  - type: text
    content: ', the family of the Ardites: '
  - type: text
    content: and
  - type: text
    content: ' of Naaman, the family of the Naamites. '
  '41':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the sons of Benjamin after their families: and they that were numbered of them '
  - type: text
    content: were
  - type: text
    content: ' forty and five thousand and six hundred.'
  '42':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the sons of Dan after their families: of Shuham, the family of the Shuhamites. These '
  - type: text
    content: are
  - type: text
    content: ' the families of Dan after their families. '
  '43':
  - type: text
    content: 'All the families of the Shuhamites, according to those that were numbered of them, '
  - type: text
    content: were
  - type: text
    content: ' threescore and four thousand and four hundred.'
  '44':
  - type: text
    content: ' '
  - type: text
    content: Of
  - type: text
    content: ' the children of Asher after their families: of Jimna, the family of the Jimnites: of Jesui, the family of the Jesuites: of Beriah, the family of the Beriites. '
  '45':
  - type: text
    content: 'Of the sons of Beriah: of Heber, the family of the Heberites: of Malchiel, the family of the Malchielites. '
  '46':
  - type: text
    content: 'And the name of the daughter of Asher '
  - type: text
    content: was
  - type: text
    content: ' Sarah. '
  '47':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the families of the sons of Asher according to those that were numbered of them; '
  - type: text
    content: who were
  - type: text
    content: ' fifty and three thousand and four hundred.'
  '48':
  - type: text
    content: ' '
  - type: text
    content: Of
  - type: text
    content: ' the sons of Naphtali after their families: of Jahzeel, the family of the Jahzeelites: of Guni, the family of the Gunites: '
  '49':
  - type: text
    content: 'of Jezer, the family of the Jezerites: of Shillem, the family of the Shillemites.'
  '5':
  - type: text
    content: 'Reuben, the eldest son of Israel: the children of Reuben; Hanoch, '
  - type: text
    content: of whom cometh
  - type: text
    content: ' the family of the Hanochites: of Pallu, the family of the Palluites: '
  '50':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the families of Naphtali according to their families: and they that were numbered of them '
  - type: text
    content: were
  - type: text
    content: ' forty and five thousand and four hundred. '
  '51':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' the numbered of the children of Israel, six hundred thousand and a thousand seven hundred and thirty.'
  '52':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '53':
  - type: text
    content: 'Unto these the land shall be divided for an inheritance according to the number of names. '
  '54':
  - type: text
    content: 'To many thou shalt give the more inheritance, and to few thou shalt give the less inheritance: to every one shall his inheritance be given according to those that were numbered of him. '
  '55':
  - type: text
    content: 'Notwithstanding the land shall be divided by lot: according to the names of the tribes of their fathers they shall inherit. '
  '56':
  - type: text
    content: According to the lot shall the possession thereof be divided between many and few.
  '57':
  - type: text
    content: 'And these '
  - type: text
    content: are
  - type: text
    content: ' they that were numbered of the Levites after their families: of Gershon, the family of the Gershonites: of Kohath, the family of the Kohathites: of Merari, the family of the Merarites. '
  '58':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the families of the Levites: the family of the Libnites, the family of the Hebronites, the family of the Mahlites, the family of the Mushites, the family of the Korathites. And Kohath begat Amram. '
  '59':
  - type: text
    content: 'And the name of Amram''s wife '
  - type: text
    content: was
  - type: text
    content: ' Jochebed, the daughter of Levi, whom '
  - type: text
    content: her mother
  - type: text
    content: ' bare to Levi in Egypt: and she bare unto Amram Aaron and Moses, and Miriam their sister. '
  '6':
  - type: text
    content: 'of Hezron, the family of the Hezronites: of Carmi, the family of the Carmites. '
  '60':
  - type: text
    content: 'And unto Aaron was born Nadab, and Abihu, Eleazar, and Ithamar. '
  '61':
  - type: text
    content: 'And Nadab and Abihu died, when they offered strange fire before the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '62':
  - type: text
    content: 'And those that were numbered of them were twenty and three thousand, all males from a month old and upward: for they were not numbered among the children of Israel, because there was no inheritance given them among the children of Israel.'
  '63':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' they that were numbered by Moses and Eleazar the priest, who numbered the children of Israel in the plains of Moab by Jordan '
  - type: text
    content: near
  - type: text
    content: ' Jericho. '
  '64':
  - type: text
    content: 'But among these there was not a man of them whom Moses and Aaron the priest numbered, when they numbered the children of Israel in the wilderness of Sinai. '
  '65':
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ' had said of them, They shall surely die in the wilderness. And there was not left a man of them, save Caleb the son of Jephunneh, and Joshua the son of Nun.'
  '7':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the families of the Reubenites: and they that were numbered of them were forty and three thousand and seven hundred and thirty. '
  '8':
  - type: text
    content: 'And the sons of Pallu; Eliab. '
  '9':
  - type: text
    content: 'And the sons of Eliab; Nemuel, and Dathan, and Abiram. This '
  - type: text
    content: is that
  - type: text
    content: ' Dathan and Abiram, '
  - type: text
    content: which were
  - type: text
    content: ' famous in the congregation, who strove against Moses and against Aaron in the company of Korah, when they strove against the '
  - type: text
    content: LORD
  - type: text
    content: ': '
