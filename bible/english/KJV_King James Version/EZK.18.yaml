document_id: EZK.18,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Personal Responsibility
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came unto me again, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If he beget a son '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is
    - type: text
      text: ' a robber, a shedder of blood, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' doeth the like to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' one of these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ', '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and that doeth not any of those '
    - type: usfm
      marker: add
      children:
      - type: text
        text: duties
    - type: text
      text: ', but even hath eaten upon the mountains, and defiled his neighbour''s wife, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hath oppressed the poor and needy, hath spoiled by violence, hath not restored the pledge, and hath lifted up his eyes to the idols, hath committed abomination, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hath given forth upon usury, and hath taken increase: shall he then live? he shall not live: he hath done all these abominations; he shall surely die; his blood shall be upon him.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now, lo, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: if
    - type: text
      text: ' he beget a son, that seeth all his father''s sins which he hath done, and considereth, and doeth not such like, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' hath not eaten upon the mountains, neither hath lifted up his eyes to the idols of the house of Israel, hath not defiled his neighbour''s wife, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'neither hath oppressed any, hath not withholden the pledge, neither hath spoiled by violence, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' hath given his bread to the hungry, and hath covered the naked with a garment, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' hath taken off his hand from the poor, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' hath not received usury nor increase, hath executed my judgments, hath walked in my statutes; he shall not die for the iniquity of his father, he shall surely live. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: As for
    - type: text
      text: ' his father, because he cruelly oppressed, spoiled his brother by violence, and did '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not good among his people, lo, even he shall die in his iniquity.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet say ye, Why? doth not the son bear the iniquity of the father? When the son hath done that which is lawful and right, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' hath kept all my statutes, and hath done them, he shall surely live. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What mean ye, that ye use this proverb concerning the land of Israel, saying, The fathers have eaten sour grapes, and the children''s teeth are set on edge? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The soul that sinneth, it shall die. The son shall not bear the iniquity of the father, neither shall the father bear the iniquity of the son: the righteousness of the righteous shall be upon him, and the wickedness of the wicked shall be upon him.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if the wicked will turn from all his sins that he hath committed, and keep all my statutes, and do that which is lawful and right, he shall surely live, he shall not die. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All his transgressions that he hath committed, they shall not be mentioned unto him: in his righteousness that he hath done he shall live. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Have I any pleasure at all that the wicked should die? saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ': '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' not that he should return from his ways, and live?'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when the righteous turneth away from his righteousness, and committeth iniquity, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' doeth according to all the abominations that the wicked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' doeth, shall he live? All his righteousness that he hath done shall not be mentioned: in his trespass that he hath trespassed, and in his sin that he hath sinned, in them shall he die. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet ye say, The way of the Lord is not equal. Hear now, O house of Israel; Is not my way equal? are not your ways unequal? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When a righteous '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' turneth away from his righteousness, and committeth iniquity, and dieth in them; for his iniquity that he hath done shall he die. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Again, when the wicked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' turneth away from his wickedness that he hath committed, and doeth that which is lawful and right, he shall save his soul alive. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because he considereth, and turneth away from all his transgressions that he hath committed, he shall surely live, he shall not die. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet saith the house of Israel, The way of the Lord is not equal. O house of Israel, are not my ways equal? are not your ways unequal? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: As
    - type: text
      text: ' I live, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ', ye shall not have '
    - type: usfm
      marker: add
      children:
      - type: text
        text: occasion
    - type: text
      text: ' any more to use this proverb in Israel. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore I will judge you, O house of Israel, every one according to his ways, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '. Repent, and turn '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yourselves
    - type: text
      text: ' from all your transgressions; so iniquity shall not be your ruin. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cast away from you all your transgressions, whereby ye have transgressed; and make you a new heart and a new spirit: for why will ye die, O house of Israel? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I have no pleasure in the death of him that dieth, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ': wherefore turn '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yourselves
    - type: text
      text: ', and live ye.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, all souls are mine; as the soul of the father, so also the soul of the son is mine: the soul that sinneth, it shall die.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if a man be just, and do that which is lawful and right, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' hath not eaten upon the mountains, neither hath lifted up his eyes to the idols of the house of Israel, neither hath defiled his neighbour''s wife, neither hath come near to a menstruous woman, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and hath not oppressed any, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' hath restored to the debtor his pledge, hath spoiled none by violence, hath given his bread to the hungry, and hath covered the naked with a garment; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' hath not given forth upon usury, neither hath taken any increase, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' hath withdrawn his hand from iniquity, hath executed true judgment between man and man, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hath walked in my statutes, and hath kept my judgments, to deal truly; he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' just, he shall surely live, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: .
