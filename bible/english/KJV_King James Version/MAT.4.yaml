document_id: MAT.4,1
type_code: eng
verses:
  '1':
  - type: heading
    content: His Temptation
  - type: text
    content: 'Then was Jesus led up of the Spirit into the wilderness to be tempted of the devil. '
  '10':
  - type: text
    content: 'Then saith Jesus unto him, '
  - type: text
    content: 'Get thee hence, Satan: for it is written, Thou shalt worship the Lord thy God, and him only shalt thou serve.'
  - type: text
    content: ' '
  '11':
  - type: text
    content: Then the devil leaveth him, and, behold, angels came and ministered unto him.
  - type: heading
    content: His Work in Galilee
  '12':
  - type: text
    content: 'Now when Jesus had heard that John was cast into prison, he departed into Galilee; '
  '13':
  - type: text
    content: 'and leaving Nazareth, he came and dwelt in Capernaum, which is upon the sea coast, in the borders of Zabulon and Nephthalim: '
  '14':
  - type: text
    content: that it might be fulfilled which was spoken by Esaias the prophet, saying,
  '15':
  - type: text
    content: The land of Zabulon, and the land of Nephthalim,
  - type: text
    content: By
  - type: text
    content: ' the way of the sea, beyond Jordan,'
  - type: text
    content: Galilee of the Gentiles;
  '16':
  - type: text
    content: The people which sat in darkness
  - type: text
    content: Saw great light;
  - type: text
    content: And to them which sat in the region and shadow of death
  - type: text
    content: Light is sprung up.
  '17':
  - type: text
    content: 'From that time Jesus began to preach, and to say, '
  - type: text
    content: 'Repent: for the kingdom of heaven is at hand.'
  - type: heading
    content: His First Disciples
  '18':
  - type: text
    content: 'And Jesus, walking by the sea of Galilee, saw two brethren, Simon called Peter, and Andrew his brother, casting a net into the sea: for they were fishers. '
  '19':
  - type: text
    content: 'And he saith unto them, '
  - type: text
    content: Follow me, and I will make you fishers of men.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And when he had fasted forty days and forty nights, he was afterward an hungred. '
  '20':
  - type: text
    content: 'And they straightway left '
  - type: text
    content: their
  - type: text
    content: ' nets, and followed him. '
  '21':
  - type: text
    content: 'And going on from thence, he saw other two brethren, James '
  - type: text
    content: the son
  - type: text
    content: ' of Zebedee, and John his brother, in a ship with Zebedee their father, mending their nets; and he called them. '
  '22':
  - type: text
    content: And they immediately left the ship and their father, and followed him.
  - type: heading
    content: Begins His Ministry
  '23':
  - type: text
    content: 'And Jesus went about all Galilee, teaching in their synagogues, and preaching the gospel of the kingdom, and healing all manner of sickness and all manner of disease among the people. '
  '24':
  - type: text
    content: 'And his fame went throughout all Syria: and they brought unto him all sick people that were taken with divers diseases and torments, and those which were possessed with devils, and those which were lunatick, and those that had the palsy; and he healed them. '
  '25':
  - type: text
    content: 'And there followed him great multitudes of people from Galilee, and '
  - type: text
    content: from
  - type: text
    content: ' Decapolis, and '
  - type: text
    content: from
  - type: text
    content: ' Jerusalem, and '
  - type: text
    content: from
  - type: text
    content: ' Judæa, and '
  - type: text
    content: from
  - type: text
    content: ' beyond Jordan.'
  '3':
  - type: text
    content: 'And when the tempter came to him, he said, If thou be the Son of God, command that these stones be made bread. '
  '4':
  - type: text
    content: 'But he answered and said, '
  - type: text
    content: It is written, Man shall not live by bread alone, but by every word that proceedeth out of the mouth of God.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Then the devil taketh him up into the holy city, and setteth him on a pinnacle of the temple, '
  '6':
  - type: text
    content: 'and saith unto him, If thou be the Son of God, cast thyself down: for it is written,'
  - type: text
    content: 'He shall give his angels charge concerning thee:'
  - type: text
    content: 'And in '
  - type: text
    content: their
  - type: text
    content: ' hands they shall bear thee up,'
  - type: text
    content: Lest at any time thou dash thy foot against a stone.
  '7':
  - type: text
    content: 'Jesus said unto him, '
  - type: text
    content: It is written again, Thou shalt not tempt the Lord thy God.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Again, the devil taketh him up into an exceeding high mountain, and sheweth him all the kingdoms of the world, and the glory of them; '
  '9':
  - type: text
    content: 'and saith unto him, All these things will I give thee, if thou wilt fall down and worship me. '
