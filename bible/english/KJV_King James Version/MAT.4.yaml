document_id: MAT.4
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: His Temptation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then was Jesus led up of the Spirit into the wilderness to be tempted of the devil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And when he had fasted forty days and forty nights, he was afterward an hungred. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And when the tempter came to him, he said, If thou be the Son of God, command that these stones be made bread. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But he answered and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: It is written, Man shall not live by bread alone, but by every word that proceedeth out of the mouth of God.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the devil taketh him up into the holy city, and setteth him on a pinnacle of the temple, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and saith unto him, If thou be the Son of God, cast thyself down: for it is written,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He shall give his angels charge concerning thee:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' hands they shall bear thee up,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lest at any time thou dash thy foot against a stone.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jesus said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: It is written again, Thou shalt not tempt the Lord thy God.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Again, the devil taketh him up into an exceeding high mountain, and sheweth him all the kingdoms of the world, and the glory of them; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and saith unto him, All these things will I give thee, if thou wilt fall down and worship me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then saith Jesus unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Get thee hence, Satan: for it is written, Thou shalt worship the Lord thy God, and him only shalt thou serve.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then the devil leaveth him, and, behold, angels came and ministered unto him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: His Work in Galilee
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now when Jesus had heard that John was cast into prison, he departed into Galilee; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and leaving Nazareth, he came and dwelt in Capernaum, which is upon the sea coast, in the borders of Zabulon and Nephthalim: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: that it might be fulfilled which was spoken by Esaias the prophet, saying,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The land of Zabulon, and the land of Nephthalim,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: By
  - type: text
    text: ' the way of the sea, beyond Jordan,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Galilee of the Gentiles;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The people which sat in darkness
- type: usfm
  marker: q1
  children:
  - type: text
    text: Saw great light;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to them which sat in the region and shadow of death
- type: usfm
  marker: q1
  children:
  - type: text
    text: Light is sprung up.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'From that time Jesus began to preach, and to say, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Repent: for the kingdom of heaven is at hand.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: His First Disciples
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And Jesus, walking by the sea of Galilee, saw two brethren, Simon called Peter, and Andrew his brother, casting a net into the sea: for they were fishers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And he saith unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Follow me, and I will make you fishers of men.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And they straightway left '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' nets, and followed him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And going on from thence, he saw other two brethren, James '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the son
  - type: text
    text: ' of Zebedee, and John his brother, in a ship with Zebedee their father, mending their nets; and he called them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: And they immediately left the ship and their father, and followed him.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Begins His Ministry
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And Jesus went about all Galilee, teaching in their synagogues, and preaching the gospel of the kingdom, and healing all manner of sickness and all manner of disease among the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And his fame went throughout all Syria: and they brought unto him all sick people that were taken with divers diseases and torments, and those which were possessed with devils, and those which were lunatick, and those that had the palsy; and he healed them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And there followed him great multitudes of people from Galilee, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: from
  - type: text
    text: ' Decapolis, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: from
  - type: text
    text: ' Jerusalem, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: from
  - type: text
    text: ' Judæa, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: from
  - type: text
    text: ' beyond Jordan.'
