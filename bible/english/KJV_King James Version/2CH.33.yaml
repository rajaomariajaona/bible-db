document_id: 2CH.33,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Manasseh
  - type: text
    content: 'Manasseh '
  - type: text
    content: was
  - type: text
    content: ' twelve years old when he began to reign, and he reigned fifty and five years in Jerusalem: '
  '10':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake to Manasseh, and to his people: but they would not hearken. '
  '11':
  - type: text
    content: 'Wherefore the '
  - type: text
    content: LORD
  - type: text
    content: ' brought upon them the captains of the host of the king of Assyria, which took Manasseh among the thorns, and bound him with fetters, and carried him to Babylon. '
  '12':
  - type: text
    content: 'And when he was in affliction, he besought the '
  - type: text
    content: LORD
  - type: text
    content: ' his God, and humbled himself greatly before the God of his fathers, '
  '13':
  - type: text
    content: 'and prayed unto him: and he was intreated of him, and heard his supplication, and brought him again to Jerusalem into his kingdom. Then Manasseh knew that the '
  - type: text
    content: LORD
  - type: text
    content: ' he '
  - type: text
    content: was
  - type: text
    content: ' God.'
  '14':
  - type: text
    content: 'Now after this he built a wall without the city of David, on the west side of Gihon, in the valley, even to the entering in at the fish gate, and compassed about Ophel, and raised it up a very great height, and put captains of war in all the fenced cities of Judah. '
  '15':
  - type: text
    content: 'And he took away the strange gods, and the idol out of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and all the altars that he had built in the mount of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and in Jerusalem, and cast '
  - type: text
    content: them
  - type: text
    content: ' out of the city. '
  '16':
  - type: text
    content: 'And he repaired the altar of the '
  - type: text
    content: LORD
  - type: text
    content: ', and sacrificed thereon peace offerings and thank offerings, and commanded Judah to serve the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel. '
  '17':
  - type: text
    content: 'Nevertheless the people did sacrifice still in the high places, '
  - type: text
    content: yet
  - type: text
    content: ' unto the '
  - type: text
    content: LORD
  - type: text
    content: ' their God only.'
  '18':
  - type: text
    content: 'Now the rest of the acts of Manasseh, and his prayer unto his God, and the words of the seers that spake to him in the name of the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel, behold, they '
  - type: text
    content: are written
  - type: text
    content: ' in the book of the kings of Israel. '
  '19':
  - type: text
    content: 'His prayer also, and '
  - type: text
    content: how God
  - type: text
    content: ' was intreated of him, and all his sins, and his trespass, and the places wherein he built high places, and set up groves and graven images, before he was humbled: behold, they '
  - type: text
    content: are
  - type: text
    content: ' written among the sayings of the seers. '
  '2':
  - type: text
    content: 'but did '
  - type: text
    content: that which was
  - type: text
    content: ' evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', like unto the abominations of the heathen, whom the '
  - type: text
    content: LORD
  - type: text
    content: ' had cast out before the children of Israel.'
  '20':
  - type: text
    content: 'So Manasseh slept with his fathers, and they buried him in his own house: and Amon his son reigned in his stead.'
  - type: heading
    content: Amon
  '21':
  - type: text
    content: 'Amon '
  - type: text
    content: was
  - type: text
    content: ' two and twenty years old when he began to reign, and reigned two years in Jerusalem. '
  '22':
  - type: text
    content: 'But he did '
  - type: text
    content: that which was
  - type: text
    content: ' evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', as did Manasseh his father: for Amon sacrificed unto all the carved images which Manasseh his father had made, and served them; '
  '23':
  - type: text
    content: 'and humbled not himself before the '
  - type: text
    content: LORD
  - type: text
    content: ', as Manasseh his father had humbled himself; but Amon trespassed more and more. '
  '24':
  - type: text
    content: 'And his servants conspired against him, and slew him in his own house. '
  '25':
  - type: text
    content: But the people of the land slew all them that had conspired against king Amon; and the people of the land made Josiah his son king in his stead.
  '3':
  - type: text
    content: 'For he built again the high places which Hezekiah his father had broken down, and he reared up altars for Baalim, and made groves, and worshipped all the host of heaven, and served them. '
  '4':
  - type: text
    content: 'Also he built altars in the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', whereof the '
  - type: text
    content: LORD
  - type: text
    content: ' had said, In Jerusalem shall my name be for ever. '
  '5':
  - type: text
    content: 'And he built altars for all the host of heaven in the two courts of the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'And he caused his children to pass through the fire in the valley of the son of Hinnom: also he observed times, and used enchantments, and used witchcraft, and dealt with a familiar spirit, and with wizards: he wrought much evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', to provoke him to anger. '
  '7':
  - type: text
    content: 'And he set a carved image, the idol which he had made, in the house of God, of which God had said to David and to Solomon his son, In this house, and in Jerusalem, which I have chosen before all the tribes of Israel, will I put my name for ever: '
  '8':
  - type: text
    content: 'neither will I any more remove the foot of Israel from out of the land which I have appointed for your fathers; so that they will take heed to do all that I have commanded them, according to the whole law and the statutes and the ordinances by the hand of Moses. '
  '9':
  - type: text
    content: 'So Manasseh made Judah and the inhabitants of Jerusalem to err, '
  - type: text
    content: and
  - type: text
    content: ' to do worse than the heathen, whom the '
  - type: text
    content: LORD
  - type: text
    content: ' had destroyed before the children of Israel.'
