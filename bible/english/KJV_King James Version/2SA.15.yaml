document_id: 2SA.15
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Absalom's Revolt
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And it came to pass after this, that Absalom prepared him chariots and horses, and fifty men to run before him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Absalom rose up early, and stood beside the way of the gate: and it was '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ', that when any man that had a controversy came to the king for judgment, then Absalom called unto him, and said, Of what city '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' thou? And he said, Thy servant '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' of one of the tribes of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Absalom said unto him, See, thy matters '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' good and right; but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: deputed
  - type: text
    text: ' of the king to hear thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Absalom said moreover, Oh that I were made judge in the land, that every man which hath any suit or cause might come unto me, and I would do him justice! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And it was '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ', that when any man came nigh '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to him
  - type: text
    text: ' to do him obeisance, he put forth his hand, and took him, and kissed him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And on this manner did Absalom to all Israel that came to the king for judgment: so Absalom stole the hearts of the men of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And it came to pass after forty years, that Absalom said unto the king, I pray thee, let me go and pay my vow, which I have vowed unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', in Hebron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For thy servant vowed a vow while I abode at Geshur in Syria, saying, If the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall bring me again indeed to Jerusalem, then I will serve the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the king said unto him, Go in peace. So he arose, and went to Hebron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But Absalom sent spies throughout all the tribes of Israel, saying, As soon as ye hear the sound of the trumpet, then ye shall say, Absalom reigneth in Hebron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And with Absalom went two hundred men out of Jerusalem, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that were
  - type: text
    text: ' called; and they went in their simplicity, and they knew not any thing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Absalom sent for Ahithophel the Gilonite, David''s counsellor, from his city, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' from Giloh, while he offered sacrifices. And the conspiracy was strong; for the people increased continually with Absalom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And there came a messenger to David, saying, The hearts of the men of Israel are after Absalom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And David said unto all his servants that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with him at Jerusalem, Arise, and let us flee; for we shall not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: else
  - type: text
    text: ' escape from Absalom: make speed to depart, lest he overtake us suddenly, and bring evil upon us, and smite the city with the edge of the sword. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the king''s servants said unto the king, Behold, thy servants '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are ready to do
  - type: text
    text: ' whatsoever my lord the king shall appoint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the king went forth, and all his household after him. And the king left ten women, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which were
  - type: text
    text: ' concubines, to keep the house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the king went forth, and all the people after him, and tarried in a place that was far off. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And all his servants passed on beside him; and all the Cherethites, and all the Pelethites, and all the Gittites, six hundred men which came after him from Gath, passed on before the king.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then said the king to Ittai the Gittite, Wherefore goest thou also with us? return to thy place, and abide with the king: for thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' a stranger, and also an exile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Whereas thou camest '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' yesterday, should I this day make thee go up and down with us? seeing I go whither I may, return thou, and take back thy brethren: mercy and truth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' with thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And Ittai answered the king, and said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' liveth, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' my lord the king liveth, surely in what place my lord the king shall be, whether in death or life, even there also will thy servant be. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And David said to Ittai, Go and pass over. And Ittai the Gittite passed over, and all his men, and all the little ones that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And all the country wept with a loud voice, and all the people passed over: the king also himself passed over the brook Kidron, and all the people passed over, toward the way of the wilderness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And lo Zadok also, and all the Levites '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with him, bearing the ark of the covenant of God: and they set down the ark of God; and Abiathar went up, until all the people had done passing out of the city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And the king said unto Zadok, Carry back the ark of God into the city: if I shall find favour in the eyes of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', he will bring me again, and shew me '
  - type: usfm
    marker: add
    children:
    - type: text
      text: both
  - type: text
    text: ' it, and his habitation: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'but if he thus say, I have no delight in thee; behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: here am
  - type: text
    text: ' I, let him do to me as seemeth good unto him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The king said also unto Zadok the priest, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Art not
  - type: text
    text: ' thou a seer? return into the city in peace, and your two sons with you, Ahimaaz thy son, and Jonathan the son of Abiathar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'See, I will tarry in the plain of the wilderness, until there come word from you to certify me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Zadok therefore and Abiathar carried the ark of God again to Jerusalem: and they tarried there.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: David's Flight
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And David went up by the ascent of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: mount
  - type: text
    text: ' Olivet, and wept as he went up, and had his head covered, and he went barefoot: and all the people that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' with him covered every man his head, and they went up, weeping as they went up. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' told David, saying, Ahithophel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' among the conspirators with Absalom. And David said, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', I pray thee, turn the counsel of Ahithophel into foolishness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And it came to pass, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: when
  - type: text
    text: ' David was come to the top '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of the mount
  - type: text
    text: ', where he worshipped God, behold, Hushai the Archite came to meet him with his coat rent, and earth upon his head: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'unto whom David said, If thou passest on with me, then thou shalt be a burden unto me: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'but if thou return to the city, and say unto Absalom, I will be thy servant, O king; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: have been
  - type: text
    text: ' thy father''s servant hitherto, so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: will
  - type: text
    text: ' I now also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' thy servant: then mayest thou for me defeat the counsel of Ahithophel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hast thou
  - type: text
    text: ' not there with thee Zadok and Abiathar the priests? therefore it shall be, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' what thing soever thou shalt hear out of the king''s house, thou shalt tell '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to Zadok and Abiathar the priests. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they have
  - type: text
    text: ' there with them their two sons, Ahimaaz Zadok''s '
  - type: usfm
    marker: add
    children:
    - type: text
      text: son
  - type: text
    text: ', and Jonathan Abiathar''s '
  - type: usfm
    marker: add
    children:
    - type: text
      text: son
  - type: text
    text: '; and by them ye shall send unto me every thing that ye can hear. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: So Hushai David's friend came into the city, and Absalom came into Jerusalem.
