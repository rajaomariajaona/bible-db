document_id: EZK.19,1
type_code: eng
verses:
  '1':
  - type: heading
    content: A Lamentation
  - type: text
    content: 'Moreover take thou up a lamentation for the princes of Israel, '
  '10':
  - type: text
    content: 'Thy mother '
  - type: text
    content: is
  - type: text
    content: ' like a vine in thy blood, planted by the waters: she was fruitful and full of branches by reason of many waters. '
  '11':
  - type: text
    content: 'And she had strong rods for the sceptres of them that bare rule, and her stature was exalted among the thick branches, and she appeared in her height with the multitude of her branches. '
  '12':
  - type: text
    content: 'But she was plucked up in fury, she was cast down to the ground, and the east wind dried up her fruit: her strong rods were broken and withered; the fire consumed them. '
  '13':
  - type: text
    content: 'And now she '
  - type: text
    content: is
  - type: text
    content: ' planted in the wilderness, in a dry and thirsty ground. '
  '14':
  - type: text
    content: 'And fire is gone out of a rod of her branches, '
  - type: text
    content: which
  - type: text
    content: ' hath devoured her fruit, so that she hath no strong rod '
  - type: text
    content: to be
  - type: text
    content: ' a sceptre to rule. This '
  - type: text
    content: is
  - type: text
    content: ' a lamentation, and shall be for a lamentation.'
  '2':
  - type: text
    content: 'and say, What '
  - type: text
    content: is
  - type: text
    content: ' thy mother? A lioness: she lay down among lions, she nourished her whelps among young lions. '
  '3':
  - type: text
    content: 'And she brought up one of her whelps: it became a young lion, and it learned to catch the prey; it devoured men. '
  '4':
  - type: text
    content: 'The nations also heard of him; he was taken in their pit, and they brought him with chains unto the land of Egypt. '
  '5':
  - type: text
    content: 'Now when she saw that she had waited, '
  - type: text
    content: and
  - type: text
    content: ' her hope was lost, then she took another of her whelps, '
  - type: text
    content: and
  - type: text
    content: ' made him a young lion. '
  '6':
  - type: text
    content: 'And he went up and down among the lions, he became a young lion, and learned to catch the prey, '
  - type: text
    content: and
  - type: text
    content: ' devoured men. '
  '7':
  - type: text
    content: 'And he knew their desolate palaces, and he laid waste their cities; and the land was desolate, and the fulness thereof, by the noise of his roaring. '
  '8':
  - type: text
    content: 'Then the nations set against him on every side from the provinces, and spread their net over him: he was taken in their pit. '
  '9':
  - type: text
    content: 'And they put him in ward in chains, and brought him to the king of Babylon: they brought him into holds, that his voice should no more be heard upon the mountains of Israel.'
