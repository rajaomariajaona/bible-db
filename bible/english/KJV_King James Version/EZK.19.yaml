document_id: EZK.19,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: A Lamentation
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Moreover take thou up a lamentation for the princes of Israel, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Thy mother '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' like a vine in thy blood, planted by the waters: she was fruitful and full of branches by reason of many waters. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And she had strong rods for the sceptres of them that bare rule, and her stature was exalted among the thick branches, and she appeared in her height with the multitude of her branches. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'But she was plucked up in fury, she was cast down to the ground, and the east wind dried up her fruit: her strong rods were broken and withered; the fire consumed them. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And now she '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' planted in the wilderness, in a dry and thirsty ground. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And fire is gone out of a rod of her branches, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' hath devoured her fruit, so that she hath no strong rod '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' a sceptre to rule. This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a lamentation, and shall be for a lamentation.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'and say, What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy mother? A lioness: she lay down among lions, she nourished her whelps among young lions. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And she brought up one of her whelps: it became a young lion, and it learned to catch the prey; it devoured men. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The nations also heard of him; he was taken in their pit, and they brought him with chains unto the land of Egypt. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Now when she saw that she had waited, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' her hope was lost, then she took another of her whelps, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' made him a young lion. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And he went up and down among the lions, he became a young lion, and learned to catch the prey, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' devoured men. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And he knew their desolate palaces, and he laid waste their cities; and the land was desolate, and the fulness thereof, by the noise of his roaring. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then the nations set against him on every side from the provinces, and spread their net over him: he was taken in their pit. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And they put him in ward in chains, and brought him to the king of Babylon: they brought him into holds, that his voice should no more be heard upon the mountains of Israel.'
