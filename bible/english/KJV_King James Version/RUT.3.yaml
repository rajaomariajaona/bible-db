document_id: RUT.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Naomi's Advice
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Naomi her mother in law said unto her, My daughter, shall I not seek rest for thee, that it may be well with thee? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' thou of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', my daughter: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' thou hast shewed more kindness in the latter end than at the beginning, inasmuch as thou followedst not young men, whether poor or rich. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now, my daughter, fear not; I will do to thee all that thou requirest: for all the city of my people doth know that thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' a virtuous woman. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now it is true that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am thy
    - type: text
      text: ' near kinsman: howbeit there is a kinsman nearer than I. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tarry this night, and it shall be in the morning, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' if he will perform unto thee the part of a kinsman, well; let him do the kinsman''s part: but if he will not do the part of a kinsman to thee, then will I do the part of a kinsman to thee, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' liveth: lie down until the morning.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And she lay at his feet until the morning: and she rose up before one could know another. And he said, Let it not be known that a woman came into the floor. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also he said, Bring the vail that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thou hast
    - type: text
      text: ' upon thee, and hold it. And when she held it, he measured six '
    - type: usfm
      marker: add
      children:
      - type: text
        text: measures
    - type: text
      text: ' of barley, and laid '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' on her: and she went into the city. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when she came to her mother in law, she said, Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' thou, my daughter? And she told her all that the man had done to her. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And she said, These six '
    - type: usfm
      marker: add
      children:
      - type: text
        text: measures
    - type: text
      text: ' of barley gave he me; for he said to me, Go not empty unto thy mother in law. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said she, Sit still, my daughter, until thou know how the matter will fall: for the man will not be in rest, until he have finished the thing this day.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not Boaz of our kindred, with whose maidens thou wast? Behold, he winnoweth barley to night in the threshingfloor. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wash thyself therefore, and anoint thee, and put thy raiment upon thee, and get thee down to the floor: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' make not thyself known unto the man, until he shall have done eating and drinking. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall be, when he lieth down, that thou shalt mark the place where he shall lie, and thou shalt go in, and uncover his feet, and lay thee down; and he will tell thee what thou shalt do. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And she said unto her, All that thou sayest unto me I will do.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And she went down unto the floor, and did according to all that her mother in law bade her. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Boaz had eaten and drunk, and his heart was merry, he went to lie down at the end of the heap of corn: and she came softly, and uncovered his feet, and laid her down. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass at midnight, that the man was afraid, and turned himself: and, behold, a woman lay at his feet. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' thou? And she answered, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' Ruth thine handmaid: spread therefore thy skirt over thine handmaid; for thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' a near kinsman. '
