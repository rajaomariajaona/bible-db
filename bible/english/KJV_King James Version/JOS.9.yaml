document_id: JOS.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And it came to pass, when all the kings which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' on this side Jordan, in the hills, and in the valleys, and in all the coasts of the great sea over against Lebanon, the Hittite, and the Amorite, the Canaanite, the Perizzite, the Hivite, and the Jebusite, heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thereof
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: that they gathered themselves together, to fight with Joshua and with Israel, with one accord.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Gibeonites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And when the inhabitants of Gibeon heard what Joshua had done unto Jericho and to Ai, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'they did work wilily, and went and made as if they had been ambassadors, and took old sacks upon their asses, and wine bottles, old, and rent, and bound up; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and old shoes and clouted upon their feet, and old garments upon them; and all the bread of their provision was dry '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' mouldy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And they went to Joshua unto the camp at Gilgal, and said unto him, and to the men of Israel, We be come from a far country: now therefore make ye a league with us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the men of Israel said unto the Hivites, Peradventure ye dwell among us; and how shall we make a league with you? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And they said unto Joshua, We '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' thy servants. And Joshua said unto them, Who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' ye? and from whence come ye? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And they said unto him, From a very far country thy servants are come because of the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God: for we have heard the fame of him, and all that he did in Egypt, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and all that he did to the two kings of the Amorites, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' beyond Jordan, to Sihon king of Heshbon, and to Og king of Bashan, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' at Ashtaroth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Wherefore our elders and all the inhabitants of our country spake to us, saying, Take victuals with you for the journey, and go to meet them, and say unto them, We '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' your servants: therefore now make ye a league with us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'This our bread we took hot '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' our provision out of our houses on the day we came forth to go unto you; but now, behold, it is dry, and it is mouldy: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and these bottles of wine, which we filled, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' new; and, behold, they be rent: and these our garments and our shoes are become old by reason of the very long journey. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And the men took of their victuals, and asked not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: counsel
  - type: text
    text: ' at the mouth of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Joshua made peace with them, and made a league with them, to let them live: and the princes of the congregation sware unto them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And it came to pass at the end of three days after they had made a league with them, that they heard that they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' their neighbours, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' they dwelt among them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the children of Israel journeyed, and came unto their cities on the third day. Now their cities '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' Gibeon, and Chephirah, and Beeroth, and Kirjath-jearim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And the children of Israel smote them not, because the princes of the congregation had sworn unto them by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel. And all the congregation murmured against the princes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But all the princes said unto all the congregation, We have sworn unto them by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel: now therefore we may not touch them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'This we will do to them; we will even let them live, lest wrath be upon us, because of the oath which we sware unto them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: And the princes said unto them, Let them live; but let them be hewers of wood and drawers of water unto all the congregation; as the princes had promised them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And Joshua called for them, and he spake unto them, saying, Wherefore have ye beguiled us, saying, We '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' very far from you; when ye dwell among us? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Now therefore ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' cursed, and there shall none of you be freed from being bondmen, and hewers of wood and drawers of water for the house of my God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And they answered Joshua, and said, Because it was certainly told thy servants, how that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God commanded his servant Moses to give you all the land, and to destroy all the inhabitants of the land from before you, therefore we were sore afraid of our lives because of you, and have done this thing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And now, behold, we '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' in thine hand: as it seemeth good and right unto thee to do unto us, do. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And so did he unto them, and delivered them out of the hand of the children of Israel, that they slew them not. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And Joshua made them that day hewers of wood and drawers of water for the congregation, and for the altar of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', even unto this day, in the place which he should choose.'
