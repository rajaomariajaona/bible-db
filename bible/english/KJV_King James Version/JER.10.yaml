document_id: JER.10
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Only True God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hear ye the word which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' speaketh unto you, O house of Israel: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Learn not the way of the heathen, and be not dismayed at the signs of heaven; for the heathen are dismayed at them. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For the customs of the people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' vain: for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' cutteth a tree out of the forest, the work of the hands of the workman, with the axe. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'They deck it with silver and with gold; they fasten it with nails and with hammers, that it move not. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' upright as the palm tree, but speak not: they must needs be borne, because they cannot go. Be not afraid of them; for they cannot do evil, neither also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is it
  - type: text
    text: ' in them to do good.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Forasmuch as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' none like unto thee, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' great, and thy name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' great in might. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Who would not fear thee, O King of nations? for to thee doth it appertain: forasmuch as among all the wise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' of the nations, and in all their kingdoms, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' none like unto thee. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But they are altogether brutish and foolish: the stock '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a doctrine of vanities. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Silver spread into plates is brought from Tarshish, and gold from Uphaz, the work of the workman, and of the hands of the founder: blue and purple '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' their clothing: they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' all the work of cunning '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the true God, he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the living God, and an everlasting king: at his wrath the earth shall tremble, and the nations shall not be able to abide his indignation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Thus shall ye say unto them, The gods that have not made the heavens and the earth, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' they shall perish from the earth, and from under these heavens.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'He hath made the earth by his power, he hath established the world by his wisdom, and hath stretched out the heavens by his discretion. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When he uttereth his voice, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' a multitude of waters in the heavens, and he causeth the vapours to ascend from the ends of the earth; he maketh lightnings with rain, and bringeth forth the wind out of his treasures. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Every man is brutish in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' knowledge: every founder is confounded by the graven image: for his molten image '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' falsehood, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no breath in them. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'They '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' vanity, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the work of errors: in the time of their visitation they shall perish. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The portion of Jacob '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not like them: for he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the former of all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: '; and Israel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the rod of his inheritance: The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' his name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Gather up thy wares out of the land, O inhabitant of the fortress. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Behold, I will sling out the inhabitants of the land at this once, and will distress them, that they may find '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it so
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Woe is me for my hurt! my wound is grievous: but I said, Truly this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a grief, and I must bear it. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'My tabernacle is spoiled, and all my cords are broken: my children are gone forth of me, and they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' not: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' none to stretch forth my tent any more, and to set up my curtains. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For the pastors are become brutish, and have not sought the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': therefore they shall not prosper, and all their flocks shall be scattered. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Behold, the noise of the bruit is come, and a great commotion out of the north country, to make the cities of Judah desolate, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' a den of dragons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', I know that the way of man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not in himself: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' not in man that walketh to direct his steps. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', correct me, but with judgment; not in thine anger, lest thou bring me to nothing. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Pour out thy fury upon the heathen that know thee not, and upon the families that call not on thy name: for they have eaten up Jacob, and devoured him, and consumed him, and have made his habitation desolate.'
