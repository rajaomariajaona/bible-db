document_id: JER.10,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Only True God
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hear ye the word which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' speaketh unto you, O house of Israel: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the true God, he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the living God, and an everlasting king: at his wrath the earth shall tremble, and the nations shall not be able to abide his indignation.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus shall ye say unto them, The gods that have not made the heavens and the earth, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' they shall perish from the earth, and from under these heavens.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He hath made the earth by his power, he hath established the world by his wisdom, and hath stretched out the heavens by his discretion. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he uttereth his voice, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' a multitude of waters in the heavens, and he causeth the vapours to ascend from the ends of the earth; he maketh lightnings with rain, and bringeth forth the wind out of his treasures. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Every man is brutish in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' knowledge: every founder is confounded by the graven image: for his molten image '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' falsehood, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no breath in them. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' vanity, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the work of errors: in the time of their visitation they shall perish. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The portion of Jacob '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not like them: for he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the former of all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: '; and Israel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the rod of his inheritance: The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' his name.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gather up thy wares out of the land, O inhabitant of the fortress. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', Behold, I will sling out the inhabitants of the land at this once, and will distress them, that they may find '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it so
    - type: text
      text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Woe is me for my hurt! my wound is grievous: but I said, Truly this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a grief, and I must bear it. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', Learn not the way of the heathen, and be not dismayed at the signs of heaven; for the heathen are dismayed at them. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My tabernacle is spoiled, and all my cords are broken: my children are gone forth of me, and they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' not: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none to stretch forth my tent any more, and to set up my curtains. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the pastors are become brutish, and have not sought the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': therefore they shall not prosper, and all their flocks shall be scattered. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, the noise of the bruit is come, and a great commotion out of the north country, to make the cities of Judah desolate, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' a den of dragons.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', I know that the way of man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not in himself: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' not in man that walketh to direct his steps. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', correct me, but with judgment; not in thine anger, lest thou bring me to nothing. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour out thy fury upon the heathen that know thee not, and upon the families that call not on thy name: for they have eaten up Jacob, and devoured him, and consumed him, and have made his habitation desolate.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the customs of the people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' vain: for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' cutteth a tree out of the forest, the work of the hands of the workman, with the axe. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They deck it with silver and with gold; they fasten it with nails and with hammers, that it move not. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' upright as the palm tree, but speak not: they must needs be borne, because they cannot go. Be not afraid of them; for they cannot do evil, neither also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is it
    - type: text
      text: ' in them to do good.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Forasmuch as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none like unto thee, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' great, and thy name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' great in might. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who would not fear thee, O King of nations? for to thee doth it appertain: forasmuch as among all the wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' of the nations, and in all their kingdoms, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none like unto thee. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they are altogether brutish and foolish: the stock '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a doctrine of vanities. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Silver spread into plates is brought from Tarshish, and gold from Uphaz, the work of the workman, and of the hands of the founder: blue and purple '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' their clothing: they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' all the work of cunning '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: '. '
