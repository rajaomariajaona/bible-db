document_id: ECC.12
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Remember now thy Creator in the days of thy youth, while the evil days come not, nor the years draw nigh, when thou shalt say, I have no pleasure in them; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'while the sun, or the light, or the moon, or the stars, be not darkened, nor the clouds return after the rain: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'in the day when the keepers of the house shall tremble, and the strong men shall bow themselves, and the grinders cease because they are few, and those that look out of the windows be darkened, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and the doors shall be shut in the streets, when the sound of the grinding is low, and he shall rise up at the voice of the bird, and all the daughters of musick shall be brought low; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: when
  - type: text
    text: ' they shall be afraid of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which is
  - type: text
    text: ' high, and fears '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' in the way, and the almond tree shall flourish, and the grasshopper shall be a burden, and desire shall fail: because man goeth to his long home, and the mourners go about the streets: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'or ever the silver cord be loosed, or the golden bowl be broken, or the pitcher be broken at the fountain, or the wheel broken at the cistern. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then shall the dust return to the earth as it was: and the spirit shall return unto God who gave it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Vanity of vanities, saith the Preacher; all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' vanity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And moreover, because the preacher was wise, he still taught the people knowledge; yea, he gave good heed, and sought out, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' set in order many proverbs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The preacher sought to find out acceptable words: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which was
  - type: text
    text: ' written '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' upright, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' words of truth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The words of the wise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' as goads, and as nails fastened '
  - type: usfm
    marker: add
    children:
    - type: text
      text: by
  - type: text
    text: ' the masters of assemblies, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' are given from one shepherd. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And further, by these, my son, be admonished: of making many books '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no end; and much study '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a weariness of the flesh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Let us hear the conclusion of the whole matter: Fear God, and keep his commandments: for this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the whole '
  - type: usfm
    marker: add
    children:
    - type: text
      text: duty
  - type: text
    text: ' of man. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For God shall bring every work into judgment, with every secret thing, whether '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it be
  - type: text
    text: ' good, or whether '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it be
  - type: text
    text: ' evil.'
