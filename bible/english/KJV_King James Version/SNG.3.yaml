document_id: SNG.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'By night on my bed I sought him whom my soul loveth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I sought him, but I found him not.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'He made the pillars thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' silver,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The bottom thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' gold, the covering of it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' purple,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The midst thereof being paved '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' love,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For the daughters of Jerusalem.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Go forth, O ye daughters of Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And behold king Solomon
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the crown wherewith his mother crowned him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the day of his espousals,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And in the day of the gladness of his heart.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: I will rise now, and go about the city
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the streets, and in the broad ways
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will seek him whom my soul loveth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I sought him, but I found him not.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The watchmen that go about the city found me:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: To whom I said
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saw ye him whom my soul loveth?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It was
    - type: text
      text: ' but a little that I passed from them,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But I found him whom my soul loveth:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I held him, and would not let him go,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Until I had brought him into my mother's house,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And into the chamber of her that conceived me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: I charge you, O ye daughters of Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: By the roes, and by the hinds of the field,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'That ye stir not up, nor awake '
    - type: usfm
      marker: add
      children:
      - type: text
        text: my
    - type: text
      text: ' love,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Till he please.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' this that cometh out of the wilderness'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like pillars of smoke,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Perfumed with myrrh and frankincense,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With all powders of the merchant?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Behold his bed, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Solomon''s;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Threescore valiant men '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' about it,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Of the valiant of Israel.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: They all hold swords,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Being
    - type: text
      text: ' expert in war:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Every man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: hath
    - type: text
      text: ' his sword upon his thigh'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because of fear in the night.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: King Solomon made himself a chariot
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Of the wood of Lebanon.
