document_id: HOS.6
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: A Brief Repentance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Come, and let us return unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': for he hath torn, and he will heal us; he hath smitten, and he will bind us up. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'After two days will he revive us: in the third day he will raise us up, and we shall live in his sight. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then shall we know, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: if
  - type: text
    text: ' we follow on to know the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': his going forth is prepared as the morning; and he shall come unto us as the rain, as the latter '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' former rain unto the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'O Ephraim, what shall I do unto thee? O Judah, what shall I do unto thee? for your goodness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' as a morning cloud, and as the early dew it goeth away. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Therefore have I hewed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' by the prophets; I have slain them by the words of my mouth: and thy judgments '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are as
  - type: text
    text: ' the light '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' goeth forth. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For I desired mercy, and not sacrifice; and the knowledge of God more than burnt offerings.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But they like men have transgressed the covenant: there have they dealt treacherously against me. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Gilead '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a city of them that work iniquity, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and is
  - type: text
    text: ' polluted with blood. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And as troops of robbers wait for a man, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' the company of priests murder in the way by consent: for they commit lewdness. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I have seen an horrible thing in the house of Israel: there '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the whoredom of Ephraim, Israel is defiled.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Also, O Judah, he hath set an harvest for thee, when I returned the captivity of my people.
