document_id: HOS.6,1
type_code: eng
verses:
  '1':
  - type: heading
    content: A Brief Repentance
  - type: text
    content: 'Come, and let us return unto the '
  - type: text
    content: LORD
  - type: text
    content: ': for he hath torn, and he will heal us; he hath smitten, and he will bind us up. '
  '10':
  - type: text
    content: 'I have seen an horrible thing in the house of Israel: there '
  - type: text
    content: is
  - type: text
    content: ' the whoredom of Ephraim, Israel is defiled.'
  '11':
  - type: text
    content: Also, O Judah, he hath set an harvest for thee, when I returned the captivity of my people.
  '2':
  - type: text
    content: 'After two days will he revive us: in the third day he will raise us up, and we shall live in his sight. '
  '3':
  - type: text
    content: 'Then shall we know, '
  - type: text
    content: if
  - type: text
    content: ' we follow on to know the '
  - type: text
    content: LORD
  - type: text
    content: ': his going forth is prepared as the morning; and he shall come unto us as the rain, as the latter '
  - type: text
    content: and
  - type: text
    content: ' former rain unto the earth.'
  '4':
  - type: text
    content: 'O Ephraim, what shall I do unto thee? O Judah, what shall I do unto thee? for your goodness '
  - type: text
    content: is
  - type: text
    content: ' as a morning cloud, and as the early dew it goeth away. '
  '5':
  - type: text
    content: 'Therefore have I hewed '
  - type: text
    content: them
  - type: text
    content: ' by the prophets; I have slain them by the words of my mouth: and thy judgments '
  - type: text
    content: are as
  - type: text
    content: ' the light '
  - type: text
    content: that
  - type: text
    content: ' goeth forth. '
  '6':
  - type: text
    content: For I desired mercy, and not sacrifice; and the knowledge of God more than burnt offerings.
  '7':
  - type: text
    content: 'But they like men have transgressed the covenant: there have they dealt treacherously against me. '
  '8':
  - type: text
    content: 'Gilead '
  - type: text
    content: is
  - type: text
    content: ' a city of them that work iniquity, '
  - type: text
    content: and is
  - type: text
    content: ' polluted with blood. '
  '9':
  - type: text
    content: 'And as troops of robbers wait for a man, '
  - type: text
    content: so
  - type: text
    content: ' the company of priests murder in the way by consent: for they commit lewdness. '
