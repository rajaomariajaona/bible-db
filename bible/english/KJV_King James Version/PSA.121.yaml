document_id: PSA.121,1
type_code: eng
verses:
  '1':
  - type: text
    content: A Song of degrees.
  - type: text
    content: I will lift up mine eyes unto the hills,
  - type: text
    content: From whence cometh my help.
  '2':
  - type: text
    content: 'My help '
  - type: text
    content: cometh
  - type: text
    content: ' from the '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: Which made heaven and earth.
  '3':
  - type: text
    content: 'He will not suffer thy foot to be moved:'
  - type: text
    content: He that keepeth thee will not slumber.
  '4':
  - type: text
    content: Behold, he that keepeth Israel
  - type: text
    content: Shall neither slumber nor sleep.
  '5':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' thy keeper:'
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' thy shade upon thy right hand.'
  '6':
  - type: text
    content: The sun shall not smite thee by day,
  - type: text
    content: Nor the moon by night.
  '7':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' shall preserve thee from all evil:'
  - type: text
    content: He shall preserve thy soul.
  '8':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' shall preserve thy going out and thy coming in'
  - type: text
    content: From this time forth, and even for evermore.
