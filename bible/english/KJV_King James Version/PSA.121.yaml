    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I will lift up mine eyes unto the hills,
- type: usfm
  marker: q2
  children:
  - type: text
    text: From whence cometh my help.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'My help '
  - type: usfm
    marker: add
    children:
    - type: text
      text: cometh
  - type: text
    text: ' from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: Which made heaven and earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He will not suffer thy foot to be moved:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He that keepeth thee will not slumber.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Behold, he that keepeth Israel
- type: usfm
  marker: q2
  children:
  - type: text
    text: Shall neither slumber nor sleep.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy keeper:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy shade upon thy right hand.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The sun shall not smite thee by day,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nor the moon by night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall preserve thee from all evil:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He shall preserve thy soul.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall preserve thy going out and thy coming in'
- type: usfm
  marker: q2
  children:
  - type: text
    text: From this time forth, and even for evermore.
