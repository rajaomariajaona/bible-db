document_id: JDG.17
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Danites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And there was a man of mount Ephraim, whose name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Micah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he said unto his mother, The eleven hundred '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shekels
  - type: text
    text: ' of silver that were taken from thee, about which thou cursedst, and spakest of also in mine ears, behold, the silver '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with me; I took it. And his mother said, Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be thou
  - type: text
    text: ' of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', my son. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And when he had restored the eleven hundred '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shekels
  - type: text
    text: ' of silver to his mother, his mother said, I had wholly dedicated the silver unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' from my hand for my son, to make a graven image and a molten image: now therefore I will restore it unto thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Yet he restored the money unto his mother; and his mother took two hundred '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shekels
  - type: text
    text: ' of silver, and gave them to the founder, who made thereof a graven image and a molten image: and they were in the house of Micah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the man Micah had an house of gods, and made an ephod, and teraphim, and consecrated one of his sons, who became his priest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'In those days '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' no king in Israel, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' every man did '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which was
  - type: text
    text: ' right in his own eyes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And there was a young man out of Beth-lehem-judah of the family of Judah, who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' a Levite, and he sojourned there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the man departed out of the city from Beth-lehem-judah to sojourn where he could find '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'a place:'
  - type: text
    text: ' and he came to mount Ephraim to the house of Micah, as he journeyed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And Micah said unto him, Whence comest thou? And he said unto him, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' a Levite of Beth-lehem-judah, and I go to sojourn where I may find '
  - type: usfm
    marker: add
    children:
    - type: text
      text: a place
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Micah said unto him, Dwell with me, and be unto me a father and a priest, and I will give thee ten '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shekels
  - type: text
    text: ' of silver by the year, and a suit of apparel, and thy victuals. So the Levite went in. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the Levite was content to dwell with the man; and the young man was unto him as one of his sons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Micah consecrated the Levite; and the young man became his priest, and was in the house of Micah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then said Micah, Now know I that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will do me good, seeing I have a Levite to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my
  - type: text
    text: ' priest.'
