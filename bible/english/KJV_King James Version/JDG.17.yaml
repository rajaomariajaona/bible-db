    content: 'And Micah said unto him, Dwell with me, and be unto me a father and a priest, and I will give thee ten '
  - type: text
    content: shekels
  - type: text
    content: ' of silver by the year, and a suit of apparel, and thy victuals. So the Levite went in. '
  '11':
  - type: text
    content: 'And the Levite was content to dwell with the man; and the young man was unto him as one of his sons. '
  '12':
  - type: text
    content: 'And Micah consecrated the Levite; and the young man became his priest, and was in the house of Micah. '
  '13':
  - type: text
    content: 'Then said Micah, Now know I that the '
  - type: text
    content: LORD
  - type: text
