document_id: EXO.31
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'See, I have called by name Bezaleel the son of Uri, the son of Hur, of the tribe of Judah: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and I have filled him with the spirit of God, in wisdom, and in understanding, and in knowledge, and in all manner of workmanship, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'to devise cunning works, to work in gold, and in silver, and in brass, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and in cutting of stones, to set '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ', and in carving of timber, to work in all manner of workmanship. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And I, behold, I have given with him Aholiab, the son of Ahisamach, of the tribe of Dan: and in the hearts of all that are wise hearted I have put wisdom, that they may make all that I have commanded thee; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'the tabernacle of the congregation, and the ark of the testimony, and the mercy seat that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thereupon, and all the furniture of the tabernacle, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and the table and his furniture, and the pure candlestick with all his furniture, and the altar of incense, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and the altar of burnt offering with all his furniture, and the laver and his foot, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and the cloths of service, and the holy garments for Aaron the priest, and the garments of his sons, to minister in the priest''s office, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and the anointing oil, and sweet incense for the holy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'place:'
  - type: text
    text: ' according to all that I have commanded thee shall they do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Speak thou also unto the children of Israel, saying, Verily my sabbaths ye shall keep: for it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a sign between me and you throughout your generations; that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: ye
  - type: text
    text: ' may know that I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' that doth sanctify you. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ye shall keep the sabbath therefore; for it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' holy unto you: every one that defileth it shall surely be put to death: for whosoever doeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' work therein, that soul shall be cut off from among his people. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Six days may work be done; but in the seventh '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the sabbath of rest, holy to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': whosoever doeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' work in the sabbath day, he shall surely be put to death. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Wherefore the children of Israel shall keep the sabbath, to observe the sabbath throughout their generations, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' a perpetual covenant. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'It '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a sign between me and the children of Israel for ever: for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' six days the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' made heaven and earth, and on the seventh day he rested, and was refreshed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And he gave unto Moses, when he had made an end of communing with him upon mount Sinai, two tables of testimony, tables of stone, written with the finger of God.
