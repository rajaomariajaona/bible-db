    content: 'The words of the Preacher, the son of David, king in Jerusalem. '
  '10':
  - type: text
    content: 'Is there '
  - type: text
    content: any
  - type: text
    content: ' thing whereof it may be said, See, this '
  - type: text
    content: is
  - type: text
    content: ' new? it hath been already of old time, which was before us. '
  '11':
  - type: text
    content: There is
  - type: text
    content: ' no remembrance of former '
  - type: text
    content: things
  - type: text
    content: '; neither shall there be '
  - type: text
    content: any
  - type: text
    content: ' remembrance of '
  - type: text
    content: things
  - type: text
    content: ' that are to come with '
  - type: text
