  - type: text
    content: ' that shall come after.'
  - type: heading
    content: The Vanity of Knowledge
  '12':
  - type: text
    content: 'I the Preacher was king over Israel in Jerusalem. '
  '13':
  - type: text
    content: 'And I gave my heart to seek and search out by wisdom concerning all '
  - type: text
    content: things
  - type: text
    content: ' that are done under heaven: this sore travail hath God given to the sons of man to be exercised therewith. '
  '14':
  - type: text
    content: 'I have seen all the works that are done under the sun; and, behold, all '
  - type: text
    content: is
  - type: text
    content: ' vanity and vexation of spirit. '
  '15':
  - type: text
    content: That which is
  - type: text
    content: ' crooked cannot be made straight: and that which is wanting cannot be numbered. '
  '16':
  - type: text
    content: 'I communed with mine own heart, saying, Lo, I am come to great estate, and have gotten more wisdom than all '
  - type: text
    content: they
  - type: text
    content: ' that have been before me in Jerusalem: yea, my heart had great experience of wisdom and knowledge. '
  '17':
  - type: text
    content: 'And I gave my heart to know wisdom, and to know madness and folly: I perceived that this also is vexation of spirit. '
  '18':
  - type: text
    content: 'For in much wisdom '
  - type: text
    content: is
  - type: text
    content: ' much grief: and he that increaseth knowledge increaseth sorrow.'
  '2':
  - type: text
    content: 'Vanity of vanities, saith the Preacher, vanity of vanities; all '
  - type: text
    content: is
  - type: text
    content: ' vanity. '
  '3':
  - type: text
    content: 'What profit hath a man of all his labour which he taketh under the sun? '
  '4':
  - type: text
    content: One
  - type: text
    content: ' generation passeth away, and '
  - type: text
    content: another
  - type: text
    content: ' generation cometh: but the earth abideth for ever. '
  '5':
  - type: text
    content: 'The sun also ariseth, and the sun goeth down, and hasteth to his place where he arose. '
  '6':
  - type: text
    content: 'The wind goeth toward the south, and turneth about unto the north; it whirleth about continually, and the wind returneth again according to his circuits. '
  '7':
  - type: text
    content: 'All the rivers run into the sea; yet the sea '
  - type: text
    content: is
  - type: text
    content: ' not full; unto the place from whence the rivers come, thither they return again. '
  '8':
  - type: text
    content: 'All things '
  - type: text
    content: are
  - type: text
    content: ' full of labour; man cannot utter '
  - type: text
    content: 'it:'
  - type: text
    content: ' the eye is not satisfied with seeing, nor the ear filled with hearing. '
  '9':
  - type: text
    content: 'The thing that hath been, it '
  - type: text
    content: is that
  - type: text
    content: ' which shall be; and that which is done '
  - type: text
    content: is
  - type: text
    content: ' that which shall be done: and '
  - type: text
    content: there is
  - type: text
    content: ' no new '
  - type: text
    content: thing
  - type: text
    content: ' under the sun. '
