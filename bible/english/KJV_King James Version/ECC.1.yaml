document_id: ECC.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The words of the Preacher, the son of David, king in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Vanity of vanities, saith the Preacher, vanity of vanities; all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' vanity. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'What profit hath a man of all his labour which he taketh under the sun? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: add
    children:
    - type: text
      text: One
  - type: text
    text: ' generation passeth away, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: another
  - type: text
    text: ' generation cometh: but the earth abideth for ever. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The sun also ariseth, and the sun goeth down, and hasteth to his place where he arose. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The wind goeth toward the south, and turneth about unto the north; it whirleth about continually, and the wind returneth again according to his circuits. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'All the rivers run into the sea; yet the sea '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not full; unto the place from whence the rivers come, thither they return again. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'All things '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' full of labour; man cannot utter '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'it:'
  - type: text
    text: ' the eye is not satisfied with seeing, nor the ear filled with hearing. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The thing that hath been, it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is that
  - type: text
    text: ' which shall be; and that which is done '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' that which shall be done: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no new '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thing
  - type: text
    text: ' under the sun. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Is there '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' thing whereof it may be said, See, this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' new? it hath been already of old time, which was before us. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' no remembrance of former '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: '; neither shall there be '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' remembrance of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' that are to come with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: those
  - type: text
    text: ' that shall come after.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Vanity of Knowledge
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I the Preacher was king over Israel in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And I gave my heart to seek and search out by wisdom concerning all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' that are done under heaven: this sore travail hath God given to the sons of man to be exercised therewith. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I have seen all the works that are done under the sun; and, behold, all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' vanity and vexation of spirit. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: add
    children:
    - type: text
      text: That which is
  - type: text
    text: ' crooked cannot be made straight: and that which is wanting cannot be numbered. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I communed with mine own heart, saying, Lo, I am come to great estate, and have gotten more wisdom than all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they
  - type: text
    text: ' that have been before me in Jerusalem: yea, my heart had great experience of wisdom and knowledge. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And I gave my heart to know wisdom, and to know madness and folly: I perceived that this also is vexation of spirit. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For in much wisdom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' much grief: and he that increaseth knowledge increaseth sorrow.'
