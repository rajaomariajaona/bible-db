document_id: JER.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'They say, If a man put away his wife, and she go from him, and become another man''s, shall he return unto her again? shall not that land be greatly polluted? but thou hast played the harlot with many lovers; yet return again to me, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Lift up thine eyes unto the high places, and see where thou hast not been lien with. In the ways hast thou sat for them, as the Arabian in the wilderness; and thou hast polluted the land with thy whoredoms and with thy wickedness. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Therefore the showers have been withholden, and there hath been no latter rain; and thou hadst a whore''s forehead, thou refusedst to be ashamed. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Wilt thou not from this time cry unto me, My father, thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' the guide of my youth? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Will he reserve '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his anger
  - type: text
    text: ' for ever? will he keep '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to the end? Behold, thou hast spoken and done evil things as thou couldest.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Israel and Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said also unto me in the days of Josiah the king, Hast thou seen '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' which backsliding Israel hath done? she is gone up upon every high mountain and under every green tree, and there hath played the harlot. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And I said after she had done all these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ', Turn thou unto me. But she returned not. And her treacherous sister Judah saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And I saw, when for all the causes whereby backsliding Israel committed adultery I had put her away, and given her a bill of divorce; yet her treacherous sister Judah feared not, but went and played the harlot also. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And it came to pass through the lightness of her whoredom, that she defiled the land, and committed adultery with stones and with stocks. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And yet for all this her treacherous sister Judah hath not turned unto me with her whole heart, but feignedly, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto me, The backsliding Israel hath justified herself more than treacherous Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Go and proclaim these words toward the north, and say, Return, thou backsliding Israel, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' I will not cause mine anger to fall upon you: for I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' merciful, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' I will not keep '
  - type: usfm
    marker: add
    children:
    - type: text
      text: anger
  - type: text
    text: ' for ever. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Only acknowledge thine iniquity, that thou hast transgressed against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, and hast scattered thy ways to the strangers under every green tree, and ye have not obeyed my voice, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Turn, O backsliding children, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; for I am married unto you: and I will take you one of a city, and two of a family, and I will bring you to Zion: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and I will give you pastors according to mine heart, which shall feed you with knowledge and understanding. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And it shall come to pass, when ye be multiplied and increased in the land, in those days, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', they shall say no more, The ark of the covenant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': neither shall it come to mind: neither shall they remember it; neither shall they visit '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '; neither shall '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' be done any more. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'At that time they shall call Jerusalem the throne of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and all the nations shall be gathered unto it, to the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', to Jerusalem: neither shall they walk any more after the imagination of their evil heart. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: In those days the house of Judah shall walk with the house of Israel, and they shall come together out of the land of the north to the land that I have given for an inheritance unto your fathers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But I said, How shall I put thee among the children, and give thee a pleasant land, a goodly heritage of the hosts of nations? and I said, Thou shalt call me, My father; and shalt not turn away from me. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Surely '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' a wife treacherously departeth from her husband, so have ye dealt treacherously with me, O house of Israel, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'A voice was heard upon the high places, weeping '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' supplications of the children of Israel: for they have perverted their way, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' they have forgotten the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' their God. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Return, ye backsliding children, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' I will heal your backslidings.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Behold, we come unto thee; for thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' our God. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Truly in vain '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is salvation hoped for
  - type: text
    text: ' from the hills, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and from
  - type: text
    text: ' the multitude of mountains: truly in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' our God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the salvation of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'For shame hath devoured the labour of our fathers from our youth; their flocks and their herds, their sons and their daughters. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'We lie down in our shame, and our confusion covereth us: for we have sinned against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' our God, we and our fathers, from our youth even unto this day, and have not obeyed the voice of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' our God.'
