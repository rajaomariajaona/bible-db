document_id: 1SA.29,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: David and His Men
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now the Philistines gathered together all their armies to Aphek: and the Israelites pitched by a fountain which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in Jezreel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Wherefore now rise up early in the morning with thy master''s servants that are come with thee: and as soon as ye be up early in the morning, and have light, depart. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: So David and his men rose up early to depart in the morning, to return into the land of the Philistines. And the Philistines went up to Jezreel.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And the lords of the Philistines passed on by hundreds, and by thousands: but David and his men passed on in the rereward with Achish. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then said the princes of the Philistines, What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: do
    - type: text
      text: ' these Hebrews '
    - type: usfm
      marker: add
      children:
      - type: text
        text: here?
    - type: text
      text: ' And Achish said unto the princes of the Philistines, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' not this David, the servant of Saul the king of Israel, which hath been with me these days, or these years, and I have found no fault in him since he fell '
    - type: usfm
      marker: add
      children:
      - type: text
        text: unto me
    - type: text
      text: ' unto this day? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And the princes of the Philistines were wroth with him; and the princes of the Philistines said unto him, Make this fellow return, that he may go again to his place which thou hast appointed him, and let him not go down with us to battle, lest in the battle he be an adversary to us: for wherewith should he reconcile himself unto his master? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: should it
    - type: text
      text: ' not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' with the heads of these men? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' not this David, of whom they sang one to another in dances, saying,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saul slew his thousands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And David his ten thousands?
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then Achish called David, and said unto him, Surely, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' liveth, thou hast been upright, and thy going out and thy coming in with me in the host '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' good in my sight: for I have not found evil in thee since the day of thy coming unto me unto this day: nevertheless the lords favour thee not. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Wherefore now return, and go in peace, that thou displease not the lords of the Philistines. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And David said unto Achish, But what have I done? and what hast thou found in thy servant so long as I have been with thee unto this day, that I may not go fight against the enemies of my lord the king? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And Achish answered and said to David, I know that thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' good in my sight, as an angel of God: notwithstanding the princes of the Philistines have said, He shall not go up with us to the battle. '
