document_id: 1CH.21
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: A Cause of Trespass
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Satan stood up against Israel, and provoked David to number Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And David said to Joab and to the rulers of the people, Go, number Israel from Beer-sheba even to Dan; and bring the number of them to me, that I may know '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Joab answered, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' make his people an hundred times so many more as they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'be:'
  - type: text
    text: ' but, my lord the king, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' they not all my lord''s servants? why then doth my lord require this thing? why will he be a cause of trespass to Israel? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nevertheless the king''s word prevailed against Joab. Wherefore Joab departed, and went throughout all Israel, and came to Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And Joab gave the sum of the number of the people unto David. And all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they of
  - type: text
    text: ' Israel were a thousand thousand and an hundred thousand men that drew sword: and Judah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' four hundred threescore and ten thousand men that drew sword. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But Levi and Benjamin counted he not among them: for the king''s word was abominable to Joab. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And God was displeased with this thing; therefore he smote Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And David said unto God, I have sinned greatly, because I have done this thing: but now, I beseech thee, do away the iniquity of thy servant; for I have done very foolishly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Gad, David''s seer, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Go and tell David, saying, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', I offer thee three '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'things:'
  - type: text
    text: ' choose thee one of them, that I may do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' unto thee. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So Gad came to David, and said unto him, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Choose thee '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'either three years'' famine; or three months to be destroyed before thy foes, while that the sword of thine enemies overtaketh '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thee
  - type: text
    text: '; or else three days the sword of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', even the pestilence, in the land, and the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' destroying throughout all the coasts of Israel. Now therefore advise thyself what word I shall bring again to him that sent me. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And David said unto Gad, I am in a great strait: let me fall now into the hand of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; for very great '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' his mercies: but let me not fall into the hand of man. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' sent pestilence upon Israel: and there fell of Israel seventy thousand men. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And God sent an angel unto Jerusalem to destroy it: and as he was destroying, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' beheld, and he repented him of the evil, and said to the angel that destroyed, It is enough, stay now thine hand. And the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' stood by the threshingfloor of Ornan the Jebusite. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And David lifted up his eyes, and saw the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' stand between the earth and the heaven, having a drawn sword in his hand stretched out over Jerusalem. Then David and the elders '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of Israel, who were
  - type: text
    text: ' clothed in sackcloth, fell upon their faces. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And David said unto God, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is it
  - type: text
    text: ' not I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' commanded the people to be numbered? even I it is that have sinned and done evil indeed; but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as for
  - type: text
    text: ' these sheep, what have they done? let thine hand, I pray thee, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' my God, be on me, and on my father''s house; but not on thy people, that they should be plagued.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: An Altar unto the Lord
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Gad to say to David, that David should go up, and set up an altar unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' in the threshingfloor of Ornan the Jebusite. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And David went up at the saying of Gad, which he spake in the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Ornan turned back, and saw the angel; and his four sons with him hid themselves. Now Ornan was threshing wheat. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And as David came to Ornan, Ornan looked and saw David, and went out of the threshingfloor, and bowed himself to David with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' face to the ground. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then David said to Ornan, Grant me the place of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' threshingfloor, that I may build an altar therein unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': thou shalt grant it me for the full price: that the plague may be stayed from the people. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And Ornan said unto David, Take '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to thee, and let my lord the king do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which is
  - type: text
    text: ' good in his eyes: lo, I give '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thee
  - type: text
    text: ' the oxen '
  - type: usfm
    marker: add
    children:
    - type: text
      text: also
  - type: text
    text: ' for burnt offerings, and the threshing instruments for wood, and the wheat for the meat offering; I give it all. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And king David said to Ornan, Nay; but I will verily buy it for the full price: for I will not take '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thine for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', nor offer burnt offerings without cost. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'So David gave to Ornan for the place six hundred shekels of gold by weight. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And David built there an altar unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and offered burnt offerings and peace offerings, and called upon the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and he answered him from heaven by fire upon the altar of burnt offering. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded the angel; and he put up his sword again into the sheath thereof.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'At that time when David saw that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had answered him in the threshingfloor of Ornan the Jebusite, then he sacrificed there. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'For the tabernacle of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', which Moses made in the wilderness, and the altar of the burnt offering, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' at that season in the high place at Gibeon. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'But David could not go before it to enquire of God: for he was afraid because of the sword of the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
