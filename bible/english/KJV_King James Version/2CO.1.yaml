document_id: 2CO.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Paul, an apostle of Jesus Christ by the will of God, and Timothy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: our
  - type: text
    text: ' brother, unto the church of God which is at Corinth, with all the saints which are in all Achaia: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'grace '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' to you and peace from God our Father, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: from
  - type: text
    text: ' the Lord Jesus Christ.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Comfort in Tribulation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' God, even the Father of our Lord Jesus Christ, the Father of mercies, and the God of all comfort; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'who comforteth us in all our tribulation, that we may be able to comfort them which are in any trouble, by the comfort wherewith we ourselves are comforted of God. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For as the sufferings of Christ abound in us, so our consolation also aboundeth by Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And whether we be afflicted, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' for your consolation and salvation, which is effectual in the enduring of the same sufferings which we also suffer: or whether we be comforted, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' for your consolation and salvation. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And our hope of you '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' stedfast, knowing, that as ye are partakers of the sufferings, so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall ye be
  - type: text
    text: ' also of the consolation. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For we would not, brethren, have you ignorant of our trouble which came to us in Asia, that we were pressed out of measure, above strength, insomuch that we despaired even of life: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'but we had the sentence of death in ourselves, that we should not trust in ourselves, but in God which raiseth the dead: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'who delivered us from so great a death, and doth deliver: in whom we trust that he will yet deliver '
  - type: usfm
    marker: add
    children:
    - type: text
      text: us
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ye also helping together by prayer for us, that for the gift '
  - type: usfm
    marker: add
    children:
    - type: text
      text: bestowed
  - type: text
    text: ' upon us by the means of many persons thanks may be given by many on our behalf.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For our rejoicing is this, the testimony of our conscience, that in simplicity and godly sincerity, not with fleshly wisdom, but by the grace of God, we have had our conversation in the world, and more abundantly to you-ward. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For we write none other things unto you, than what ye read or acknowledge; and I trust ye shall acknowledge even to the end; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'as also ye have acknowledged us in part, that we are your rejoicing, even as ye also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' our''s in the day of the Lord Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And in this confidence I was minded to come unto you before, that ye might have a second benefit; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and to pass by you into Macedonia, and to come again out of Macedonia unto you, and of you to be brought on my way toward Judæa. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'When I therefore was thus minded, did I use lightness? or the things that I purpose, do I purpose according to the flesh, that with me there should be yea yea, and nay nay? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' true, our word toward you was not yea and nay. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For the Son of God, Jesus Christ, who was preached among you by us, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' by me and Silvanus and Timotheus, was not yea and nay, but in him was yea. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For all the promises of God in him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' yea, and in him Amen, unto the glory of God by us. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Now he which stablisheth us with you in Christ, and hath anointed us, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' God; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: who hath also sealed us, and given the earnest of the Spirit in our hearts.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Moreover I call God for a record upon my soul, that to spare you I came not as yet unto Corinth. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Not for that we have dominion over your faith, but are helpers of your joy: for by faith ye stand.'
