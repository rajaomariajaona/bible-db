  '1':
  - type: text
    content: 'Paul, an apostle of Jesus Christ by the will of God, and Timothy '
  - type: text
    content: our
  - type: text
    content: ' brother, unto the church of God which is at Corinth, with all the saints which are in all Achaia: '
  '10':
  - type: text
    content: 'who delivered us from so great a death, and doth deliver: in whom we trust that he will yet deliver '
  - type: text
    content: us
  - type: text
    content: '; '
  '11':
  - type: text
    content: 'ye also helping together by prayer for us, that for the gift '
  - type: text
    content: bestowed
  - type: text
    content: ' upon us by the means of many persons thanks may be given by many on our behalf.'
  '12':
  - type: text
    content: 'For our rejoicing is this, the testimony of our conscience, that in simplicity and godly sincerity, not with fleshly wisdom, but by the grace of God, we have had our conversation in the world, and more abundantly to you-ward. '
  '13':
  - type: text
    content: 'For we write none other things unto you, than what ye read or acknowledge; and I trust ye shall acknowledge even to the end; '
  '14':
  - type: text
    content: 'as also ye have acknowledged us in part, that we are your rejoicing, even as ye also '
  - type: text
    content: are
  - type: text
    content: ' our''s in the day of the Lord Jesus.'
  '15':
  - type: text
    content: 'And in this confidence I was minded to come unto you before, that ye might have a second benefit; '
  '16':
  - type: text
    content: 'and to pass by you into Macedonia, and to come again out of Macedonia unto you, and of you to be brought on my way toward Judæa. '
  '17':
  - type: text
    content: 'When I therefore was thus minded, did I use lightness? or the things that I purpose, do I purpose according to the flesh, that with me there should be yea yea, and nay nay? '
  '18':
  - type: text
    content: 'But '
  - type: text
    content: as
  - type: text
    content: ' God '
  - type: text
    content: is
  - type: text
    content: ' true, our word toward you was not yea and nay. '
  '19':
  - type: text
    content: 'For the Son of God, Jesus Christ, who was preached among you by us, '
  - type: text
    content: even
  - type: text
    content: ' by me and Silvanus and Timotheus, was not yea and nay, but in him was yea. '
  '2':
  - type: text
    content: 'grace '
  - type: text
    content: be
  - type: text
    content: ' to you and peace from God our Father, and '
  - type: text
    content: from
  - type: text
    content: ' the Lord Jesus Christ.'
  - type: heading
    content: Comfort in Tribulation
  '20':
  - type: text
    content: 'For all the promises of God in him '
  - type: text
    content: are
  - type: text
    content: ' yea, and in him Amen, unto the glory of God by us. '
  '21':
  - type: text
    content: 'Now he which stablisheth us with you in Christ, and hath anointed us, '
  - type: text
    content: is
  - type: text
    content: ' God; '
  '22':
  - type: text
    content: who hath also sealed us, and given the earnest of the Spirit in our hearts.
  '23':
  - type: text
    content: 'Moreover I call God for a record upon my soul, that to spare you I came not as yet unto Corinth. '
  '24':
  - type: text
    content: 'Not for that we have dominion over your faith, but are helpers of your joy: for by faith ye stand.'
  '3':
  - type: text
    content: 'Blessed '
  - type: text
    content: be
  - type: text
    content: ' God, even the Father of our Lord Jesus Christ, the Father of mercies, and the God of all comfort; '
  '4':
  - type: text
    content: 'who comforteth us in all our tribulation, that we may be able to comfort them which are in any trouble, by the comfort wherewith we ourselves are comforted of God. '
  '5':
  - type: text
    content: 'For as the sufferings of Christ abound in us, so our consolation also aboundeth by Christ. '
  '6':
  - type: text
    content: 'And whether we be afflicted, '
  - type: text
    content: it is
  - type: text
    content: ' for your consolation and salvation, which is effectual in the enduring of the same sufferings which we also suffer: or whether we be comforted, '
  - type: text
    content: it is
  - type: text
    content: ' for your consolation and salvation. '
  '7':
  - type: text
    content: 'And our hope of you '
  - type: text
    content: is
  - type: text
    content: ' stedfast, knowing, that as ye are partakers of the sufferings, so '
  - type: text
    content: shall ye be
  - type: text
    content: ' also of the consolation. '
  '8':
  - type: text
    content: 'For we would not, brethren, have you ignorant of our trouble which came to us in Asia, that we were pressed out of measure, above strength, insomuch that we despaired even of life: '
  '9':
  - type: text
    content: 'but we had the sentence of death in ourselves, that we should not trust in ourselves, but in God which raiseth the dead: '
