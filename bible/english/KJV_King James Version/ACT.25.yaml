document_id: ACT.25,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Appeal to Cæsar
  - type: text
    content: 'Now when Festus was come into the province, after three days he ascended from Cæsarea to Jerusalem. '
  '10':
  - type: text
    content: 'Then said Paul, I stand at Cæsar''s judgment seat, where I ought to be judged: to the Jews have I done no wrong, as thou very well knowest. '
  '11':
  - type: text
    content: 'For if I be an offender, or have committed any thing worthy of death, I refuse not to die: but if there be none of these things whereof these accuse me, no man may deliver me unto them. I appeal unto Cæsar. '
  '12':
  - type: text
    content: Then Festus, when he had conferred with the council, answered, Hast thou appealed unto Cæsar? unto Cæsar shalt thou go.
  '13':
  - type: text
    content: 'And after certain days king Agrippa and Bernice came unto Cæsarea to salute Festus. '
  '14':
  - type: text
    content: 'And when they had been there many days, Festus declared Paul''s cause unto the king, saying, There is a certain man left in bonds by Felix: '
  '15':
  - type: text
    content: 'about whom, when I was at Jerusalem, the chief priests and the elders of the Jews informed '
  - type: text
    content: me
  - type: text
    content: ', desiring '
  - type: text
    content: to have
  - type: text
    content: ' judgment against him. '
  '16':
  - type: text
    content: 'To whom I answered, It is not the manner of the Romans to deliver any man to die, before that he which is accused have the accusers face to face, and have licence to answer for himself concerning the crime laid against him. '
  '17':
  - type: text
    content: 'Therefore, when they were come hither, without any delay on the morrow I sat on the judgment seat, and commanded the man to be brought forth. '
  '18':
  - type: text
    content: 'Against whom when the accusers stood up, they brought none accusation of such things as I supposed: '
  '19':
  - type: text
    content: 'but had certain questions against him of their own superstition, and of one Jesus, which was dead, whom Paul affirmed to be alive. '
  '2':
  - type: text
    content: 'Then the high priest and the chief of the Jews informed him against Paul, and besought him, '
  '20':
  - type: text
    content: 'And because I doubted of such manner of questions, I asked '
  - type: text
    content: him
  - type: text
    content: ' whether he would go to Jerusalem, and there be judged of these matters. '
  '21':
  - type: text
    content: 'But when Paul had appealed to be reserved unto the hearing of Augustus, I commanded him to be kept till I might send him to Cæsar. '
  '22':
  - type: text
    content: Then Agrippa said unto Festus, I would also hear the man myself. To morrow, said he, thou shalt hear him.
  - type: heading
    content: Paul before Agrippa
  '23':
  - type: text
    content: 'And on the morrow, when Agrippa was come, and Bernice, with great pomp, and was entered into the place of hearing, with the chief captains, and principal men of the city, at Festus'' commandment Paul was brought forth. '
  '24':
  - type: text
    content: 'And Festus said, King Agrippa, and all men which are here present with us, ye see this man, about whom all the multitude of the Jews have dealt with me, both at Jerusalem, and '
  - type: text
    content: also
  - type: text
    content: ' here, crying that he ought not to live any longer. '
  '25':
  - type: text
    content: 'But when I found that he had committed nothing worthy of death, and that he himself hath appealed to Augustus, I have determined to send him. '
  '26':
  - type: text
    content: 'Of whom I have no certain thing to write unto my lord. Wherefore I have brought him forth before you, and specially before thee, O king Agrippa, that, after examination had, I might have somewhat to write. '
  '27':
  - type: text
    content: 'For it seemeth to me unreasonable to send a prisoner, and not withal to signify the crimes '
  - type: text
    content: laid
  - type: text
    content: ' against him.'
  '3':
  - type: text
    content: 'and desired favour against him, that he would send for him to Jerusalem, laying wait in the way to kill him. '
  '4':
  - type: text
    content: 'But Festus answered, that Paul should be kept at Cæsarea, and that he himself would depart shortly '
  - type: text
    content: thither
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Let them therefore, said he, which among you are able, go down with '
  - type: text
    content: me
  - type: text
    content: ', and accuse this man, if there be any wickedness in him.'
  '6':
  - type: text
    content: 'And when he had tarried among them more than ten days, he went down unto Cæsarea; and the next day sitting on the judgment seat commanded Paul to be brought. '
  '7':
  - type: text
    content: 'And when he was come, the Jews which came down from Jerusalem stood round about, and laid many and grievous complaints against Paul, which they could not prove. '
  '8':
  - type: text
    content: 'While he answered for himself, Neither against the law of the Jews, neither against the temple, nor yet against Cæsar, have I offended any thing at all. '
  '9':
  - type: text
    content: 'But Festus, willing to do the Jews a pleasure, answered Paul, and said, Wilt thou go up to Jerusalem, and there be judged of these things before me? '
