document_id: ISA.63
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: A Day of Judgement
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this that cometh from Edom, with dyed garments from Bozrah? this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' glorious in his apparel, travelling in the greatness of his strength? I that speak in righteousness, mighty to save. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Wherefore '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art thou
  - type: text
    text: ' red in thine apparel, and thy garments like him that treadeth in the winefat? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I have trodden the winepress alone; and of the people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' none with me: for I will tread them in mine anger, and trample them in my fury; and their blood shall be sprinkled upon my garments, and I will stain all my raiment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For the day of vengeance '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in mine heart, and the year of my redeemed is come. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And I looked, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' none to help; and I wondered that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' none to uphold: therefore mine own arm brought salvation unto me; and my fury, it upheld me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And I will tread down the people in mine anger, and make them drunk in my fury, and I will bring down their strength to the earth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'I will mention the lovingkindnesses of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the praises of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', according to all that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath bestowed on us, and the great goodness toward the house of Israel, which he hath bestowed on them according to his mercies, and according to the multitude of his lovingkindnesses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For he said, Surely they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' my people, children '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' will not lie: so he was their Saviour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'In all their affliction he was afflicted, and the angel of his presence saved them: in his love and in his pity he redeemed them; and he bare them, and carried them all the days of old. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But they rebelled, and vexed his holy Spirit: therefore he was turned to be their enemy, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' he fought against them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then he remembered the days of old, Moses, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' his people, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saying
  - type: text
    text: ', Where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' he that brought them up out of the sea with the shepherd of his flock? where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' he that put his holy Spirit within him? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'That led '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' by the right hand of Moses with his glorious arm, dividing the water before them, to make himself an everlasting name? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'That led them through the deep, as an horse in the wilderness, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' they should not stumble? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'As a beast goeth down into the valley, the Spirit of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' caused him to rest: so didst thou lead thy people, to make thyself a glorious name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Look down from heaven, and behold from the habitation of thy holiness and of thy glory: where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy zeal and thy strength, the sounding of thy bowels and of thy mercies toward me? are they restrained? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Doubtless thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' our Father, though Abraham be ignorant of us, and Israel acknowledge us not: thou, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' our Father, our redeemer; thy name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' from everlasting. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', why hast thou made us to err from thy ways, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' hardened our heart from thy fear? Return for thy servants'' sake, the tribes of thine inheritance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The people of thy holiness have possessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' but a little while: our adversaries have trodden down thy sanctuary. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'We are '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'thine:'
  - type: text
    text: ' thou never barest rule over them; they were not called by thy name.'
