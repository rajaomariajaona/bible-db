    content: A Day of Judgement
  - type: text
    content: 'Who '
  - type: text
    content: is
  - type: text
    content: ' this that cometh from Edom, with dyed garments from Bozrah? this '
  - type: text
    content: that is
  - type: text
    content: ' glorious in his apparel, travelling in the greatness of his strength? I that speak in righteousness, mighty to save. '
  '10':
  - type: text
    content: 'But they rebelled, and vexed his holy Spirit: therefore he was turned to be their enemy, '
  - type: text
    content: and
  - type: text
    content: ' he fought against them.'
  '11':
  - type: text
    content: 'Then he remembered the days of old, Moses, '
  - type: text
    content: and
  - type: text
    content: ' his people, '
  - type: text
    content: saying
  - type: text
    content: ', Where '
  - type: text
    content: is
  - type: text
    content: ' he that brought them up out of the sea with the shepherd of his flock? where '
  - type: text
    content: is
  - type: text
    content: ' he that put his holy Spirit within him? '
  '12':
  - type: text
    content: 'That led '
  - type: text
    content: them
  - type: text
    content: ' by the right hand of Moses with his glorious arm, dividing the water before them, to make himself an everlasting name? '
  '13':
  - type: text
    content: 'That led them through the deep, as an horse in the wilderness, '
  - type: text
    content: that
  - type: text
    content: ' they should not stumble? '
  '14':
  - type: text
    content: 'As a beast goeth down into the valley, the Spirit of the '
  - type: text
    content: LORD
  - type: text
    content: ' caused him to rest: so didst thou lead thy people, to make thyself a glorious name.'
  '15':
  - type: text
    content: 'Look down from heaven, and behold from the habitation of thy holiness and of thy glory: where '
  - type: text
    content: is
  - type: text
    content: ' thy zeal and thy strength, the sounding of thy bowels and of thy mercies toward me? are they restrained? '
  '16':
  - type: text
    content: 'Doubtless thou '
  - type: text
    content: art
  - type: text
    content: ' our Father, though Abraham be ignorant of us, and Israel acknowledge us not: thou, O '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: art
  - type: text
    content: ' our Father, our redeemer; thy name '
  - type: text
    content: is
  - type: text
    content: ' from everlasting. '
  '17':
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ', why hast thou made us to err from thy ways, '
  - type: text
    content: and
  - type: text
    content: ' hardened our heart from thy fear? Return for thy servants'' sake, the tribes of thine inheritance. '
  '18':
  - type: text
    content: 'The people of thy holiness have possessed '
  - type: text
    content: it
  - type: text
    content: ' but a little while: our adversaries have trodden down thy sanctuary. '
  '19':
  - type: text
    content: 'We are '
  - type: text
    content: 'thine:'
  - type: text
    content: ' thou never barest rule over them; they were not called by thy name.'
  '2':
  - type: text
    content: 'Wherefore '
  - type: text
    content: art thou
  - type: text
    content: ' red in thine apparel, and thy garments like him that treadeth in the winefat? '
  '3':
  - type: text
    content: 'I have trodden the winepress alone; and of the people '
  - type: text
    content: there was
  - type: text
    content: ' none with me: for I will tread them in mine anger, and trample them in my fury; and their blood shall be sprinkled upon my garments, and I will stain all my raiment. '
  '4':
  - type: text
    content: 'For the day of vengeance '
  - type: text
    content: is
  - type: text
    content: ' in mine heart, and the year of my redeemed is come. '
  '5':
  - type: text
    content: 'And I looked, and '
  - type: text
    content: there was
  - type: text
    content: ' none to help; and I wondered that '
  - type: text
    content: there was
  - type: text
    content: ' none to uphold: therefore mine own arm brought salvation unto me; and my fury, it upheld me. '
  '6':
  - type: text
    content: And I will tread down the people in mine anger, and make them drunk in my fury, and I will bring down their strength to the earth.
  '7':
  - type: text
    content: 'I will mention the lovingkindnesses of the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: and
  - type: text
    content: ' the praises of the '
  - type: text
    content: LORD
  - type: text
    content: ', according to all that the '
  - type: text
    content: LORD
  - type: text
    content: ' hath bestowed on us, and the great goodness toward the house of Israel, which he hath bestowed on them according to his mercies, and according to the multitude of his lovingkindnesses. '
  '8':
  - type: text
    content: 'For he said, Surely they '
  - type: text
    content: are
  - type: text
    content: ' my people, children '
  - type: text
    content: that
  - type: text
    content: ' will not lie: so he was their Saviour. '
  '9':
  - type: text
    content: 'In all their affliction he was afflicted, and the angel of his presence saved them: in his love and in his pity he redeemed them; and he bare them, and carried them all the days of old. '
