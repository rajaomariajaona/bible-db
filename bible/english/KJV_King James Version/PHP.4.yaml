document_id: PHP.4,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Paul and the Philippians
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, my brethren dearly beloved and longed for, my joy and crown, so stand fast in the Lord, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: my
    - type: text
      text: ' dearly beloved.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I rejoiced in the Lord greatly, that now at the last your care of me hath flourished again; wherein ye were also careful, but ye lacked opportunity. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Not that I speak in respect of want: for I have learned, in whatsoever state I am, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: therewith
    - type: text
      text: ' to be content. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I know both how to be abased, and I know how to abound: every where and in all things I am instructed both to be full and to be hungry, both to abound and to suffer need. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I can do all things through Christ which strengtheneth me. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Notwithstanding ye have well done, that ye did communicate with my affliction. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now ye Philippians know also, that in the beginning of the gospel, when I departed from Macedonia, no church communicated with me as concerning giving and receiving, but ye only. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For even in Thessalonica ye sent once and again unto my necessity. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Not because I desire a gift: but I desire fruit that may abound to your account. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I have all, and abound: I am full, having received of Epaphroditus the things '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which were sent
    - type: text
      text: ' from you, an odour of a sweet smell, a sacrifice acceptable, wellpleasing to God. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But my God shall supply all your need according to his riches in glory by Christ Jesus. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I beseech Euodias, and beseech Syntyche, that they be of the same mind in the Lord. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now unto God and our Father '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' glory for ever and ever. Amen.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salute every saint in Christ Jesus. The brethren which are with me greet you. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All the saints salute you, chiefly they that are of Cæsar's household.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The grace of our Lord Jesus Christ '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' with you all. Amen.'
  - type: usfm
    marker: iex
    children:
    - type: text
      text: It was written to the Philippians from Rome by Epaphroditus.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I intreat thee also, true yokefellow, help those women which laboured with me in the gospel, with Clement also, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' other my fellowlabourers, whose names '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in the book of life.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rejoice in the Lord alway: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' again I say, Rejoice. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let your moderation be known unto all men. The Lord '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' at hand. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be careful for nothing; but in every thing by prayer and supplication with thanksgiving let your requests be made known unto God. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the peace of God, which passeth all understanding, shall keep your hearts and minds through Christ Jesus.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Think on These Things
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finally, brethren, whatsoever things are true, whatsoever things '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' honest, whatsoever things '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' just, whatsoever things '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' pure, whatsoever things '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' lovely, whatsoever things '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' of good report; if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there be
    - type: text
      text: ' any virtue, and if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there be
    - type: text
      text: ' any praise, think on these things. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Those things, which ye have both learned, and received, and heard, and seen in me, do: and the God of peace shall be with you.'
