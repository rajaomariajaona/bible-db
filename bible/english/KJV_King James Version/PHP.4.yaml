document_id: PHP.4,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul and the Philippians
  - type: text
    content: 'Therefore, my brethren dearly beloved and longed for, my joy and crown, so stand fast in the Lord, '
  - type: text
    content: my
  - type: text
    content: ' dearly beloved.'
  '10':
  - type: text
    content: 'But I rejoiced in the Lord greatly, that now at the last your care of me hath flourished again; wherein ye were also careful, but ye lacked opportunity. '
  '11':
  - type: text
    content: 'Not that I speak in respect of want: for I have learned, in whatsoever state I am, '
  - type: text
    content: therewith
  - type: text
    content: ' to be content. '
  '12':
  - type: text
    content: 'I know both how to be abased, and I know how to abound: every where and in all things I am instructed both to be full and to be hungry, both to abound and to suffer need. '
  '13':
  - type: text
    content: 'I can do all things through Christ which strengtheneth me. '
  '14':
  - type: text
    content: 'Notwithstanding ye have well done, that ye did communicate with my affliction. '
  '15':
  - type: text
    content: 'Now ye Philippians know also, that in the beginning of the gospel, when I departed from Macedonia, no church communicated with me as concerning giving and receiving, but ye only. '
  '16':
  - type: text
    content: 'For even in Thessalonica ye sent once and again unto my necessity. '
  '17':
  - type: text
    content: 'Not because I desire a gift: but I desire fruit that may abound to your account. '
  '18':
  - type: text
    content: 'But I have all, and abound: I am full, having received of Epaphroditus the things '
  - type: text
    content: which were sent
  - type: text
    content: ' from you, an odour of a sweet smell, a sacrifice acceptable, wellpleasing to God. '
  '19':
  - type: text
    content: 'But my God shall supply all your need according to his riches in glory by Christ Jesus. '
  '2':
  - type: text
    content: 'I beseech Euodias, and beseech Syntyche, that they be of the same mind in the Lord. '
  '20':
  - type: text
    content: 'Now unto God and our Father '
  - type: text
    content: be
  - type: text
    content: ' glory for ever and ever. Amen.'
  '21':
  - type: text
    content: 'Salute every saint in Christ Jesus. The brethren which are with me greet you. '
  '22':
  - type: text
    content: All the saints salute you, chiefly they that are of Cæsar's household.
  '23':
  - type: text
    content: 'The grace of our Lord Jesus Christ '
  - type: text
    content: be
  - type: text
    content: ' with you all. Amen.'
  - type: text
    content: It was written to the Philippians from Rome by Epaphroditus.
  '3':
  - type: text
    content: 'And I intreat thee also, true yokefellow, help those women which laboured with me in the gospel, with Clement also, and '
  - type: text
    content: with
  - type: text
    content: ' other my fellowlabourers, whose names '
  - type: text
    content: are
  - type: text
    content: ' in the book of life.'
  '4':
  - type: text
    content: 'Rejoice in the Lord alway: '
  - type: text
    content: and
  - type: text
    content: ' again I say, Rejoice. '
  '5':
  - type: text
    content: 'Let your moderation be known unto all men. The Lord '
  - type: text
    content: is
  - type: text
    content: ' at hand. '
  '6':
  - type: text
    content: 'Be careful for nothing; but in every thing by prayer and supplication with thanksgiving let your requests be made known unto God. '
  '7':
  - type: text
    content: And the peace of God, which passeth all understanding, shall keep your hearts and minds through Christ Jesus.
  - type: heading
    content: Think on These Things
  '8':
  - type: text
    content: 'Finally, brethren, whatsoever things are true, whatsoever things '
  - type: text
    content: are
  - type: text
    content: ' honest, whatsoever things '
  - type: text
    content: are
  - type: text
    content: ' just, whatsoever things '
  - type: text
    content: are
  - type: text
    content: ' pure, whatsoever things '
  - type: text
    content: are
  - type: text
    content: ' lovely, whatsoever things '
  - type: text
    content: are
  - type: text
    content: ' of good report; if '
  - type: text
    content: there be
  - type: text
    content: ' any virtue, and if '
  - type: text
    content: there be
  - type: text
    content: ' any praise, think on these things. '
  '9':
  - type: text
    content: 'Those things, which ye have both learned, and received, and heard, and seen in me, do: and the God of peace shall be with you.'
