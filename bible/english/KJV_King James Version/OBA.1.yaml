document_id: OBA.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The vision of Obadiah. Thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' concerning Edom; We have heard a rumour from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and an ambassador is sent among the heathen, Arise ye, and let us rise up against her in battle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Behold, I have made thee small among the heathen: thou art greatly despised. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The pride of thine heart hath deceived thee, thou that dwellest in the clefts of the rock, whose habitation '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' high; that saith in his heart, Who shall bring me down to the ground? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Though thou exalt '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thyself
  - type: text
    text: ' as the eagle, and though thou set thy nest among the stars, thence will I bring thee down, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'If thieves came to thee, if robbers by night, (how art thou cut off!) would they not have stolen till they had enough? if the grapegatherers came to thee, would they not leave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' grapes? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'How are '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the things
  - type: text
    text: ' of Esau searched out! '
  - type: usfm
    marker: add
    children:
    - type: text
      text: how
  - type: text
    text: ' are his hidden things sought up! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'All the men of thy confederacy have brought thee '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to the border: the men that were at peace with thee have deceived thee, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' prevailed against thee; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they that eat
  - type: text
    text: ' thy bread have laid a wound under thee: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' none understanding in him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Shall I not in that day, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', even destroy the wise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' out of Edom, and understanding out of the mount of Esau? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And thy mighty '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ', O Teman, shall be dismayed, to the end that every one of the mount of Esau may be cut off by slaughter.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Edom's Violence
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thy
  - type: text
    text: ' violence against thy brother Jacob shame shall cover thee, and thou shalt be cut off for ever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'In the day that thou stoodest on the other side, in the day that the strangers carried away captive his forces, and foreigners entered into his gates, and cast lots upon Jerusalem, even thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: wast
  - type: text
    text: ' as one of them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But thou shouldest not have looked on the day of thy brother in the day that he became a stranger; neither shouldest thou have rejoiced over the children of Judah in the day of their destruction; neither shouldest thou have spoken proudly in the day of distress. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Thou shouldest not have entered into the gate of my people in the day of their calamity; yea, thou shouldest not have looked on their affliction in the day of their calamity, nor have laid '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hands
  - type: text
    text: ' on their substance in the day of their calamity; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: neither shouldest thou have stood in the crossway, to cut off those of his that did escape; neither shouldest thou have delivered up those of his that did remain in the day of distress.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For the day of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' near upon all the heathen: as thou hast done, it shall be done unto thee: thy reward shall return upon thine own head. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For as ye have drunk upon my holy mountain, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' shall all the heathen drink continually, yea, they shall drink, and they shall swallow down, and they shall be as though they had not been.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But upon mount Zion shall be deliverance, and there shall be holiness; and the house of Jacob shall possess their possessions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And the house of Jacob shall be a fire, and the house of Joseph a flame, and the house of Esau for stubble, and they shall kindle in them, and devour them; and there shall not be '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' remaining of the house of Esau; for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath spoken '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they of
  - type: text
    text: ' the south shall possess the mount of Esau; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they of
  - type: text
    text: ' the plain the Philistines: and they shall possess the fields of Ephraim, and the fields of Samaria: and Benjamin '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall possess
  - type: text
    text: ' Gilead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the captivity of this host of the children of Israel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall possess
  - type: text
    text: ' that of the Canaanites, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' unto Zarephath; and the captivity of Jerusalem, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in Sepharad, shall possess the cities of the south. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And saviours shall come up on mount Zion to judge the mount of Esau; and the kingdom shall be the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s.'
