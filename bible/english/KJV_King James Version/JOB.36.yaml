document_id: JOB.36
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Elihu also proceeded, and said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Suffer me a little, and I will shew thee
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'That '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I have
  - type: text
    text: ' yet to speak on God''s behalf.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I will fetch my knowledge from afar,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And will ascribe righteousness to my Maker.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For truly my words '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall
  - type: text
    text: ' not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' false:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He that is perfect in knowledge '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with thee.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Behold, God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' mighty, and despiseth not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ':'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: He is
  - type: text
    text: ' mighty in strength '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' wisdom.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He preserveth not the life of the wicked:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But giveth right to the poor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He withdraweth not his eyes from the righteous:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But with kings '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are they
  - type: text
    text: ' on the throne;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yea, he doth establish them for ever, and they are exalted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And if '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they be
  - type: text
    text: ' bound in fetters,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' be holden in cords of affliction;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then he sheweth them their work,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And their transgressions that they have exceeded.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He openeth also their ear to discipline,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And commandeth that they return from iniquity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'If they obey and serve '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: They shall spend their days in prosperity,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And their years in pleasures.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But if they obey not, they shall perish by the sword,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And they shall die without knowledge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But the hypocrites in heart heap up wrath:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They cry not when he bindeth them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: They die in youth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And their life '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' among the unclean.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He delivereth the poor in his affliction,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And openeth their ears in oppression.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Even so would he have removed thee out of the strait
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Into
  - type: text
    text: ' a broad place, where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no straitness;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And that which should be set on thy table '
  - type: usfm
    marker: add
    children:
    - type: text
      text: should be
  - type: text
    text: ' full of fatness.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But thou hast fulfilled the judgment of the wicked:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Judgment and justice take hold '
  - type: usfm
    marker: add
    children:
    - type: text
      text: on thee
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Because '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' wrath, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: beware
  - type: text
    text: ' lest he take thee away with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' stroke:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Then a great ransom cannot deliver thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Will he esteem thy riches? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: no
  - type: text
    text: ', not gold,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nor all the forces of strength.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Desire not the night,
- type: usfm
  marker: q2
  children:
  - type: text
    text: When people are cut off in their place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Take heed, regard not iniquity:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: For this hast thou chosen rather than affliction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Behold, God exalteth by his power:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who teacheth like him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Who hath enjoined him his way?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or who can say, Thou hast wrought iniquity?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Remember that thou magnify his work,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Which men behold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Every man may see it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Man may behold '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' afar off.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Behold, God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' great, and we know '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' not,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Neither can the number of his years be searched out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'For he maketh small the drops of water:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They pour down rain according to the vapour thereof:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Which the clouds do drop
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' distil upon man abundantly.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Also can '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' understand the spreadings of the clouds,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Or
  - type: text
    text: ' the noise of his tabernacle?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Behold, he spreadeth his light upon it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And covereth the bottom of the sea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: For by them judgeth he the people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: He giveth meat in abundance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: With clouds he covereth the light;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And commandeth it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: not to shine
  - type: text
    text: ' by '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the cloud
  - type: text
    text: ' that cometh betwixt.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: The noise thereof sheweth concerning it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: The cattle also concerning the vapour.
