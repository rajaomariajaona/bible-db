verses:
  '1':
  - type: text
    content: Elihu also proceeded, and said,
  '10':
  - type: text
    content: He openeth also their ear to discipline,
  - type: text
    content: And commandeth that they return from iniquity.
  '11':
  - type: text
    content: 'If they obey and serve '
  - type: text
    content: him
  - type: text
    content: ','
  - type: text
    content: They shall spend their days in prosperity,
  - type: text
    content: And their years in pleasures.
  '12':
  - type: text
    content: But if they obey not, they shall perish by the sword,
  - type: text
    content: And they shall die without knowledge.
  '13':
  - type: text
    content: 'But the hypocrites in heart heap up wrath:'
  - type: text
    content: They cry not when he bindeth them.
  '14':
  - type: text
    content: They die in youth,
  - type: text
    content: 'And their life '
  - type: text
    content: is
  - type: text
    content: ' among the unclean.'
  '15':
  - type: text
    content: He delivereth the poor in his affliction,
  - type: text
    content: And openeth their ears in oppression.
  '16':
  - type: text
    content: Even so would he have removed thee out of the strait
  - type: text
    content: Into
  - type: text
    content: ' a broad place, where '
  - type: text
    content: there is
  - type: text
    content: ' no straitness;'
  - type: text
    content: 'And that which should be set on thy table '
  - type: text
    content: should be
  - type: text
    content: ' full of fatness.'
  '17':
  - type: text
    content: 'But thou hast fulfilled the judgment of the wicked:'
  - type: text
    content: 'Judgment and justice take hold '
  - type: text
    content: on thee
  - type: text
    content: .
  '18':
  - type: text
    content: 'Because '
  - type: text
    content: there is
  - type: text
    content: ' wrath, '
  - type: text
    content: beware
  - type: text
    content: ' lest he take thee away with '
  - type: text
    content: his
  - type: text
    content: ' stroke:'
  - type: text
    content: Then a great ransom cannot deliver thee.
  '19':
  - type: text
    content: 'Will he esteem thy riches? '
  - type: text
    content: no
  - type: text
    content: ', not gold,'
  - type: text
    content: Nor all the forces of strength.
  '2':
  - type: text
    content: Suffer me a little, and I will shew thee
  - type: text
    content: 'That '
  - type: text
    content: I have
  - type: text
    content: ' yet to speak on God''s behalf.'
  '20':
  - type: text
    content: Desire not the night,
  - type: text
    content: When people are cut off in their place.
  '21':
  - type: text
    content: 'Take heed, regard not iniquity:'
  - type: text
    content: For this hast thou chosen rather than affliction.
  '22':
  - type: text
    content: 'Behold, God exalteth by his power:'
  - type: text
    content: Who teacheth like him?
  '23':
  - type: text
    content: Who hath enjoined him his way?
  - type: text
    content: Or who can say, Thou hast wrought iniquity?
  '24':
  - type: text
    content: Remember that thou magnify his work,
  - type: text
    content: Which men behold.
  '25':
  - type: text
    content: Every man may see it;
  - type: text
    content: 'Man may behold '
  - type: text
    content: it
  - type: text
    content: ' afar off.'
  '26':
  - type: text
    content: 'Behold, God '
  - type: text
    content: is
  - type: text
    content: ' great, and we know '
  - type: text
    content: him
  - type: text
    content: ' not,'
  - type: text
    content: Neither can the number of his years be searched out.
  '27':
  - type: text
    content: 'For he maketh small the drops of water:'
  - type: text
    content: 'They pour down rain according to the vapour thereof:'
  '28':
  - type: text
    content: Which the clouds do drop
  - type: text
    content: And
  - type: text
    content: ' distil upon man abundantly.'
  '29':
  - type: text
    content: 'Also can '
  - type: text
    content: any
  - type: text
    content: ' understand the spreadings of the clouds,'
  - type: text
    content: Or
  - type: text
    content: ' the noise of his tabernacle?'
  '3':
  - type: text
    content: I will fetch my knowledge from afar,
  - type: text
    content: And will ascribe righteousness to my Maker.
  '30':
  - type: text
    content: Behold, he spreadeth his light upon it,
  - type: text
    content: And covereth the bottom of the sea.
  '31':
  - type: text
    content: For by them judgeth he the people;
  - type: text
    content: He giveth meat in abundance.
  '32':
  - type: text
    content: With clouds he covereth the light;
  - type: text
    content: 'And commandeth it '
  - type: text
    content: not to shine
  - type: text
    content: ' by '
  - type: text
    content: the cloud
  - type: text
    content: ' that cometh betwixt.'
  '33':
  - type: text
    content: The noise thereof sheweth concerning it,
  - type: text
    content: The cattle also concerning the vapour.
  '4':
  - type: text
    content: 'For truly my words '
  - type: text
    content: shall
  - type: text
    content: ' not '
  - type: text
    content: be
  - type: text
    content: ' false:'
  - type: text
    content: 'He that is perfect in knowledge '
  - type: text
    content: is
  - type: text
    content: ' with thee.'
  '5':
  - type: text
    content: 'Behold, God '
  - type: text
    content: is
  - type: text
    content: ' mighty, and despiseth not '
  - type: text
    content: any
  - type: text
    content: ':'
  - type: text
    content: He is
  - type: text
    content: ' mighty in strength '
  - type: text
    content: and
  - type: text
    content: ' wisdom.'
  '6':
  - type: text
    content: 'He preserveth not the life of the wicked:'
  - type: text
    content: But giveth right to the poor.
  '7':
  - type: text
    content: 'He withdraweth not his eyes from the righteous:'
  - type: text
    content: 'But with kings '
  - type: text
    content: are they
  - type: text
    content: ' on the throne;'
  - type: text
    content: Yea, he doth establish them for ever, and they are exalted.
  '8':
  - type: text
    content: 'And if '
  - type: text
    content: they be
  - type: text
    content: ' bound in fetters,'
  - type: text
    content: And
  - type: text
    content: ' be holden in cords of affliction;'
  '9':
  - type: text
    content: Then he sheweth them their work,
  - type: text
    content: And their transgressions that they have exceeded.
