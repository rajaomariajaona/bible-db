document_id: 1PE.2,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Wherefore laying aside all malice, and all guile, and hypocrisies, and envies, and all evil speakings, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'which in time past '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' not a people, but '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' now the people of God: which had not obtained mercy, but now have obtained mercy.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dearly beloved, I beseech '
    - type: usfm
      marker: add
      children:
      - type: text
        text: you
    - type: text
      text: ' as strangers and pilgrims, abstain from fleshly lusts, which war against the soul; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'having your conversation honest among the Gentiles: that, whereas they speak against you as evildoers, they may by '
    - type: usfm
      marker: add
      children:
      - type: text
        text: your
    - type: text
      text: ' good works, which they shall behold, glorify God in the day of visitation.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Submit yourselves to every ordinance of man for the Lord''s sake: whether it be to the king, as supreme; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'or unto governors, as unto them that are sent by him for the punishment of evildoers, and for the praise of them that do well. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'For so is the will of God, that with well doing ye may put to silence the ignorance of foolish men: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'as free, and not using '
    - type: usfm
      marker: add
      children:
      - type: text
        text: your
    - type: text
      text: ' liberty for a cloke of maliciousness, but as the servants of God. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Honour all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: . Love the brotherhood. Fear God. Honour the king.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Servants, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' subject to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: your
    - type: text
      text: ' masters with all fear; not only to the good and gentle, but also to the froward. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'For this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thankworthy, if a man for conscience toward God endure grief, suffering wrongfully. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'as newborn babes, desire the sincere milk of the word, that ye may grow thereby: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'For what glory '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is it
    - type: text
      text: ', if, when ye be buffeted for your faults, ye shall take it patiently? but if, when ye do well, and suffer '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for it
    - type: text
      text: ', ye take it patiently, this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' acceptable with God. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'For even hereunto were ye called: because Christ also suffered for us, leaving us an example, that ye should follow his steps: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'who did no sin, neither was guile found in his mouth: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'who, when he was reviled, reviled not again; when he suffered, he threatened not; but committed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: himself
    - type: text
      text: ' to him that judgeth righteously: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'who his own self bare our sins in his own body on the tree, that we, being dead to sins, should live unto righteousness: by whose stripes ye were healed. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: For ye were as sheep going astray; but are now returned unto the Shepherd and Bishop of your souls.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'if so be ye have tasted that the Lord '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' gracious. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'To whom coming, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as unto
    - type: text
      text: ' a living stone, disallowed indeed of men, but chosen of God, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' precious, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'ye also, as lively stones, are built up a spiritual house, an holy priesthood, to offer up spiritual sacrifices, acceptable to God by Jesus Christ. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Wherefore also it is contained in the scripture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Behold, I lay in Sion a chief corner stone, elect, precious:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he that believeth on him shall not be confounded.
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Unto you therefore which believe '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he is
    - type: text
      text: ' precious: but unto them which be disobedient,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The stone which the builders disallowed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The same is made the head of the corner,
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: and
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A stone of stumbling, and a rock of offence,
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: even to them
    - type: text
      text: ' which stumble at the word, being disobedient: whereunto also they were appointed.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' a chosen generation, a royal priesthood, an holy nation, a peculiar people; that ye should shew forth the praises of him who hath called you out of darkness into his marvellous light: '
