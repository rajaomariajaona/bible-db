    content: 'And Jehoshaphat the king of Judah returned to his house in peace to Jerusalem. '
  '10':
  - type: text
    content: 'And what cause soever shall come to you of your brethren that dwell in their cities, between blood and blood, between law and commandment, statutes and judgments, ye shall even warn them that they trespass not against the '
  - type: text
    content: LORD
  - type: text
    content: ', and '
  - type: text
    content: so
  - type: text
    content: ' wrath come upon you, and upon your brethren: this do, and ye shall not trespass. '
