document_id: 2CH.19
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Jehoshaphat the king of Judah returned to his house in peace to Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Jehu the son of Hanani the seer went out to meet him, and said to king Jehoshaphat, Shouldest thou help the ungodly, and love them that hate the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '? therefore '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' wrath upon thee from before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nevertheless there are good things found in thee, in that thou hast taken away the groves out of the land, and hast prepared thine heart to seek God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Jehoshaphat dwelt at Jerusalem: and he went out again through the people from Beer-sheba to mount Ephraim, and brought them back unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of their fathers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And he set judges in the land throughout all the fenced cities of Judah, city by city, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and said to the judges, Take heed what ye do: for ye judge not for man, but for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with you in the judgment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Wherefore now let the fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' be upon you; take heed and do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'it:'
  - type: text
    text: ' for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no iniquity with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' our God, nor respect of persons, nor taking of gifts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Moreover in Jerusalem did Jehoshaphat set of the Levites, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' the priests, and of the chief of the fathers of Israel, for the judgment of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and for controversies, when they returned to Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And he charged them, saying, Thus shall ye do in the fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', faithfully, and with a perfect heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And what cause soever shall come to you of your brethren that dwell in their cities, between blood and blood, between law and commandment, statutes and judgments, ye shall even warn them that they trespass not against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' wrath come upon you, and upon your brethren: this do, and ye shall not trespass. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And, behold, Amariah the chief priest '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' over you in all matters of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and Zebadiah the son of Ishmael, the ruler of the house of Judah, for all the king''s matters: also the Levites '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' officers before you. Deal courageously, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall be with the good.'
