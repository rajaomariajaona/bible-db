  - type: text
    content: LORD
  - type: text
    content: '. '
  '3':
  - type: text
    content: Nevertheless there are good things found in thee, in that thou hast taken away the groves out of the land, and hast prepared thine heart to seek God.
  '4':
  - type: text
    content: 'And Jehoshaphat dwelt at Jerusalem: and he went out again through the people from Beer-sheba to mount Ephraim, and brought them back unto the '
  - type: text
    content: LORD
  - type: text
    content: ' God of their fathers. '
  '5':
  - type: text
    content: 'And he set judges in the land throughout all the fenced cities of Judah, city by city, '
  '6':
  - type: text
    content: 'and said to the judges, Take heed what ye do: for ye judge not for man, but for the '
  - type: text
    content: LORD
  - type: text
