document_id: 2KI.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Elisha the prophet called one of the children of the prophets, and said unto him, Gird up thy loins, and take this box of oil in thine hand, and go to Ramoth-gilead: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and when thou comest thither, look out there Jehu the son of Jehoshaphat the son of Nimshi, and go in, and make him arise up from among his brethren, and carry him to an inner chamber; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'then take the box of oil, and pour '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' on his head, and say, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', I have anointed thee king over Israel. Then open the door, and flee, and tarry not. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So the young man, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the young man the prophet, went to Ramoth-gilead. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And when he came, behold, the captains of the host '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' sitting; and he said, I have an errand to thee, O captain. And Jehu said, Unto which of all us? And he said, To thee, O captain. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he arose, and went into the house; and he poured the oil on his head, and said unto him, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel, I have anointed thee king over the people of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' over Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And thou shalt smite the house of Ahab thy master, that I may avenge the blood of my servants the prophets, and the blood of all the servants of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', at the hand of Jezebel. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For the whole house of Ahab shall perish: and I will cut off from Ahab him that pisseth against the wall, and him that is shut up and left in Israel: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and I will make the house of Ahab like the house of Jeroboam the son of Nebat, and like the house of Baasha the son of Ahijah: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and the dogs shall eat Jezebel in the portion of Jezreel, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there shall be
  - type: text
    text: ' none to bury '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her
  - type: text
    text: . And he opened the door, and fled.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then Jehu came forth to the servants of his lord: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' said unto him, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' all well? wherefore came this mad '
  - type: usfm
    marker: add
    children:
    - type: text
      text: fellow
  - type: text
    text: ' to thee? And he said unto them, Ye know the man, and his communication. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And they said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' false; tell us now. And he said, Thus and thus spake he to me, saying, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', I have anointed thee king over Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then they hasted, and took every man his garment, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' under him on the top of the stairs, and blew with trumpets, saying, Jehu is king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So Jehu the son of Jehoshaphat the son of Nimshi conspired against Joram. (Now Joram had kept Ramoth-gilead, he and all Israel, because of Hazael king of Syria. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But king Joram was returned to be healed in Jezreel of the wounds which the Syrians had given him, when he fought with Hazael king of Syria.) And Jehu said, If it be your minds, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' let none go forth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: nor
  - type: text
    text: ' escape out of the city to go to tell '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' in Jezreel. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So Jehu rode in a chariot, and went to Jezreel; for Joram lay there. And Ahaziah king of Judah was come down to see Joram.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And there stood a watchman on the tower in Jezreel, and he spied the company of Jehu as he came, and said, I see a company. And Joram said, Take an horseman, and send to meet them, and let him say, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is it
  - type: text
    text: ' peace? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So there went one on horseback to meet him, and said, Thus saith the king, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is it
  - type: text
    text: ' peace? And Jehu said, What hast thou to do with peace? turn thee behind me. And the watchman told, saying, The messenger came to them, but he cometh not again. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then he sent out a second on horseback, which came to them, and said, Thus saith the king, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is it
  - type: text
    text: ' peace? And Jehu answered, What hast thou to do with peace? turn thee behind me. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the watchman told, saying, He came even unto them, and cometh not again: and the driving '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' like the driving of Jehu the son of Nimshi; for he driveth furiously.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And Joram said, Make ready. And his chariot was made ready. And Joram king of Israel and Ahaziah king of Judah went out, each in his chariot, and they went out against Jehu, and met him in the portion of Naboth the Jezreelite. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And it came to pass, when Joram saw Jehu, that he said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is it
  - type: text
    text: ' peace, Jehu? And he answered, What peace, so long as the whoredoms of thy mother Jezebel and her witchcrafts '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are so
  - type: text
    text: ' many? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And Joram turned his hands, and fled, and said to Ahaziah, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' treachery, O Ahaziah. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And Jehu drew a bow with his full strength, and smote Jehoram between his arms, and the arrow went out at his heart, and he sunk down in his chariot. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then said '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Jehu
  - type: text
    text: ' to Bidkar his captain, Take up, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' cast him in the portion of the field of Naboth the Jezreelite: for remember how that, when I and thou rode together after Ahab his father, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' laid this burden upon him; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'surely I have seen yesterday the blood of Naboth, and the blood of his sons, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and I will requite thee in this plat, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. Now therefore take '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' cast him into the plat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of ground
  - type: text
    text: ', according to the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'But when Ahaziah the king of Judah saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ', he fled by the way of the garden house. And Jehu followed after him, and said, Smite him also in the chariot. '
  - type: usfm
    marker: add
    children:
    - type: text
      text: And they did so
  - type: text
    text: ' at the going up to Gur, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' by Ibleam. And he fled to Megiddo, and died there. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: And his servants carried him in a chariot to Jerusalem, and buried him in his sepulchre with his fathers in the city of David.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: And in the eleventh year of Joram the son of Ahab began Ahaziah to reign over Judah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And when Jehu was come to Jezreel, Jezebel heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of it
  - type: text
    text: '; and she painted her face, and tired her head, and looked out at a window. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And as Jehu entered in at the gate, she said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Had
  - type: text
    text: ' Zimri peace, who slew his master? '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And he lifted up his face to the window, and said, Who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' on my side? who? And there looked out to him two '
  - type: usfm
    marker: add
    children:
    - type: text
      text: or
  - type: text
    text: ' three eunuchs. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And he said, Throw her down. So they threw her down: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' of her blood was sprinkled on the wall, and on the horses: and he trode her under foot. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And when he was come in, he did eat and drink, and said, Go, see now this cursed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: woman
  - type: text
    text: ', and bury her: for she '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a king''s daughter. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And they went to bury her: but they found no more of her than the skull, and the feet, and the palms of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her
  - type: text
    text: ' hands. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Wherefore they came again, and told him. And he said, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', which he spake by his servant Elijah the Tishbite, saying, In the portion of Jezreel shall dogs eat the flesh of Jezebel: '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And the carcase of Jezebel shall be as dung upon the face of the field in the portion of Jezreel; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' that they shall not say, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Jezebel.'
