document_id: PRO.12
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Whoso loveth instruction loveth knowledge:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But he that hateth reproof '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' brutish.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'A good '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' obtaineth favour of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ':'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But a man of wicked devices will he condemn.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'A man shall not be established by wickedness:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the root of the righteous shall not be moved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'A virtuous woman '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a crown to her husband:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But she that maketh ashamed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' as rottenness in his bones.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The thoughts of the righteous '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' right:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: But
  - type: text
    text: ' the counsels of the wicked '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' deceit.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The words of the wicked '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' to lie in wait for blood:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the mouth of the upright shall deliver them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The wicked are overthrown, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' not:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the house of the righteous shall stand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'A man shall be commended according to his wisdom:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But he that is of a perverse heart shall be despised.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: He that is
  - type: text
    text: ' despised, and hath a servant, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' better'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Than he that honoureth himself, and lacketh bread.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'A righteous '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' regardeth the life of his beast:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But the tender mercies of the wicked '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' cruel.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He that tilleth his land shall be satisfied with bread:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But he that followeth vain '
  - type: usfm
    marker: add
    children:
    - type: text
      text: persons is
  - type: text
    text: ' void of understanding.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The wicked desireth the net of evil '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'men:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But the root of the righteous yieldeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: fruit
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The wicked is snared by the transgression of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' lips:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the just shall come out of trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'A man shall be satisfied with good by the fruit of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' mouth:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the recompence of a man's hands shall be rendered unto him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The way of a fool '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' right in his own eyes:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But he that hearkeneth unto counsel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' wise.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'A fool''s wrath is presently known:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But a prudent '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' covereth shame.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: He that
  - type: text
    text: ' speaketh truth sheweth forth righteousness:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But a false witness deceit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'There is that speaketh like the piercings of a sword:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But the tongue of the wise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' health.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The lip of truth shall be established for ever:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But a lying tongue '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' but for a moment.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Deceit '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the heart of them that imagine evil:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But to the counsellors of peace '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' joy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'There shall no evil happen to the just:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the wicked shall be filled with mischief.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Lying lips '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' abomination to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ':'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But they that deal truly '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' his delight.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'A prudent man concealeth knowledge:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the heart of fools proclaimeth foolishness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The hand of the diligent shall bear rule:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the slothful shall be under tribute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Heaviness in the heart of man maketh it stoop:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But a good word maketh it glad.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The righteous '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' more excellent than his neighbour:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the way of the wicked seduceth them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The slothful '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' roasteth not that which he took in hunting:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But the substance of a diligent man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' precious.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'In the way of righteousness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' life;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' the pathway '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thereof there is
  - type: text
    text: ' no death.'
