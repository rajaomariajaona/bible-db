document_id: PRO.12,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Whoso loveth instruction loveth knowledge:'
  - type: text
    content: 'But he that hateth reproof '
  - type: text
    content: is
  - type: text
    content: ' brutish.'
  '10':
  - type: text
    content: 'A righteous '
  - type: text
    content: man
  - type: text
    content: ' regardeth the life of his beast:'
  - type: text
    content: 'But the tender mercies of the wicked '
  - type: text
    content: are
  - type: text
    content: ' cruel.'
  '11':
  - type: text
    content: 'He that tilleth his land shall be satisfied with bread:'
  - type: text
    content: 'But he that followeth vain '
  - type: text
    content: persons is
  - type: text
    content: ' void of understanding.'
  '12':
  - type: text
    content: 'The wicked desireth the net of evil '
  - type: text
    content: 'men:'
  - type: text
    content: 'But the root of the righteous yieldeth '
  - type: text
    content: fruit
  - type: text
    content: .
  '13':
  - type: text
    content: 'The wicked is snared by the transgression of '
  - type: text
    content: his
  - type: text
    content: ' lips:'
  - type: text
    content: But the just shall come out of trouble.
  '14':
  - type: text
    content: 'A man shall be satisfied with good by the fruit of '
  - type: text
    content: his
  - type: text
    content: ' mouth:'
  - type: text
    content: And the recompence of a man's hands shall be rendered unto him.
  '15':
  - type: text
    content: 'The way of a fool '
  - type: text
    content: is
  - type: text
    content: ' right in his own eyes:'
  - type: text
    content: 'But he that hearkeneth unto counsel '
  - type: text
    content: is
  - type: text
    content: ' wise.'
  '16':
  - type: text
    content: 'A fool''s wrath is presently known:'
  - type: text
    content: 'But a prudent '
  - type: text
    content: man
  - type: text
    content: ' covereth shame.'
  '17':
  - type: text
    content: ' '
  - type: text
    content: He that
  - type: text
    content: ' speaketh truth sheweth forth righteousness:'
  - type: text
    content: But a false witness deceit.
  '18':
  - type: text
    content: 'There is that speaketh like the piercings of a sword:'
  - type: text
    content: 'But the tongue of the wise '
  - type: text
    content: is
  - type: text
    content: ' health.'
  '19':
  - type: text
    content: 'The lip of truth shall be established for ever:'
  - type: text
    content: 'But a lying tongue '
  - type: text
    content: is
  - type: text
    content: ' but for a moment.'
  '2':
  - type: text
    content: 'A good '
  - type: text
    content: man
  - type: text
    content: ' obtaineth favour of the '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: But a man of wicked devices will he condemn.
  '20':
  - type: text
    content: 'Deceit '
  - type: text
    content: is
  - type: text
    content: ' in the heart of them that imagine evil:'
  - type: text
    content: 'But to the counsellors of peace '
  - type: text
    content: is
  - type: text
    content: ' joy.'
  '21':
  - type: text
    content: 'There shall no evil happen to the just:'
  - type: text
    content: But the wicked shall be filled with mischief.
  '22':
  - type: text
    content: 'Lying lips '
  - type: text
    content: are
  - type: text
    content: ' abomination to the '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: 'But they that deal truly '
  - type: text
    content: are
  - type: text
    content: ' his delight.'
  '23':
  - type: text
    content: 'A prudent man concealeth knowledge:'
  - type: text
    content: But the heart of fools proclaimeth foolishness.
  '24':
  - type: text
    content: 'The hand of the diligent shall bear rule:'
  - type: text
    content: But the slothful shall be under tribute.
  '25':
  - type: text
    content: 'Heaviness in the heart of man maketh it stoop:'
  - type: text
    content: But a good word maketh it glad.
  '26':
  - type: text
    content: 'The righteous '
  - type: text
    content: is
  - type: text
    content: ' more excellent than his neighbour:'
  - type: text
    content: But the way of the wicked seduceth them.
  '27':
  - type: text
    content: 'The slothful '
  - type: text
    content: man
  - type: text
    content: ' roasteth not that which he took in hunting:'
  - type: text
    content: 'But the substance of a diligent man '
  - type: text
    content: is
  - type: text
    content: ' precious.'
  '28':
  - type: text
    content: 'In the way of righteousness '
  - type: text
    content: is
  - type: text
    content: ' life;'
  - type: text
    content: 'And '
  - type: text
    content: in
  - type: text
    content: ' the pathway '
  - type: text
    content: thereof there is
  - type: text
    content: ' no death.'
  '3':
  - type: text
    content: 'A man shall not be established by wickedness:'
  - type: text
    content: But the root of the righteous shall not be moved.
  '4':
  - type: text
    content: 'A virtuous woman '
  - type: text
    content: is
  - type: text
    content: ' a crown to her husband:'
  - type: text
    content: 'But she that maketh ashamed '
  - type: text
    content: is
  - type: text
    content: ' as rottenness in his bones.'
  '5':
  - type: text
    content: 'The thoughts of the righteous '
  - type: text
    content: are
  - type: text
    content: ' right:'
  - type: text
    content: But
  - type: text
    content: ' the counsels of the wicked '
  - type: text
    content: are
  - type: text
    content: ' deceit.'
  '6':
  - type: text
    content: 'The words of the wicked '
  - type: text
    content: are
  - type: text
    content: ' to lie in wait for blood:'
  - type: text
    content: But the mouth of the upright shall deliver them.
  '7':
  - type: text
    content: 'The wicked are overthrown, and '
  - type: text
    content: are
  - type: text
    content: ' not:'
  - type: text
    content: But the house of the righteous shall stand.
  '8':
  - type: text
    content: 'A man shall be commended according to his wisdom:'
  - type: text
    content: But he that is of a perverse heart shall be despised.
  '9':
  - type: text
    content: ' '
  - type: text
    content: He that is
  - type: text
    content: ' despised, and hath a servant, '
  - type: text
    content: is
  - type: text
    content: ' better'
  - type: text
    content: Than he that honoureth himself, and lacketh bread.
