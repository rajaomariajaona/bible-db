document_id: PRO.12,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Whoso loveth instruction loveth knowledge:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But he that hateth reproof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' brutish.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A righteous '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' regardeth the life of his beast:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the tender mercies of the wicked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' cruel.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He that tilleth his land shall be satisfied with bread:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But he that followeth vain '
    - type: usfm
      marker: add
      children:
      - type: text
        text: persons is
    - type: text
      text: ' void of understanding.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The wicked desireth the net of evil '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'men:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the root of the righteous yieldeth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: fruit
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The wicked is snared by the transgression of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' lips:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the just shall come out of trouble.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A man shall be satisfied with good by the fruit of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' mouth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the recompence of a man's hands shall be rendered unto him.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The way of a fool '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' right in his own eyes:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But he that hearkeneth unto counsel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' wise.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A fool''s wrath is presently known:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But a prudent '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' covereth shame.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: He that
    - type: text
      text: ' speaketh truth sheweth forth righteousness:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But a false witness deceit.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There is that speaketh like the piercings of a sword:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the tongue of the wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' health.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The lip of truth shall be established for ever:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But a lying tongue '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' but for a moment.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A good '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' obtaineth favour of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ':'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But a man of wicked devices will he condemn.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Deceit '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the heart of them that imagine evil:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But to the counsellors of peace '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' joy.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There shall no evil happen to the just:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the wicked shall be filled with mischief.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lying lips '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' abomination to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ':'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But they that deal truly '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' his delight.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A prudent man concealeth knowledge:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the heart of fools proclaimeth foolishness.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The hand of the diligent shall bear rule:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the slothful shall be under tribute.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Heaviness in the heart of man maketh it stoop:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But a good word maketh it glad.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The righteous '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' more excellent than his neighbour:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the way of the wicked seduceth them.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The slothful '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' roasteth not that which he took in hunting:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But the substance of a diligent man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' precious.'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In the way of righteousness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' life;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' the pathway '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thereof there is
    - type: text
      text: ' no death.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A man shall not be established by wickedness:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the root of the righteous shall not be moved.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A virtuous woman '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a crown to her husband:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But she that maketh ashamed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' as rottenness in his bones.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The thoughts of the righteous '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' right:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: But
    - type: text
      text: ' the counsels of the wicked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' deceit.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The words of the wicked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' to lie in wait for blood:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the mouth of the upright shall deliver them.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The wicked are overthrown, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' not:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the house of the righteous shall stand.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A man shall be commended according to his wisdom:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But he that is of a perverse heart shall be despised.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: He that is
    - type: text
      text: ' despised, and hath a servant, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' better'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Than he that honoureth himself, and lacketh bread.
