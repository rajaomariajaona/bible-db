document_id: JOB.8,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Bildad's Speech
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then answered Bildad the Shuhite, and said,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Shall not they teach thee, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' tell thee,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And utter words out of their heart?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can the rush grow up without mire?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can the flag grow without water?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Whilst it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' yet in his greenness, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' not cut down,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'It withereth before any '
    - type: usfm
      marker: add
      children:
      - type: text
        text: other
    - type: text
      text: ' herb.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the paths of all that forget God;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the hypocrite''s hope shall perish:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whose hope shall be cut off,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And whose trust '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' a spider''s web.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He shall lean upon his house, but it shall not stand:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shall hold it fast, but it shall not endure.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' green before the sun,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his branch shooteth forth in his garden.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His roots are wrapped about the heap,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' seeth the place of stones.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If he destroy him from his place,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' shall deny him, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: saying
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have not seen thee.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Behold, this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the joy of his way,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And out of the earth shall others grow.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'How long wilt thou speak these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: how long shall
    - type: text
      text: ' the words of thy mouth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be like
    - type: text
      text: ' a strong wind?'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold, God will not cast away a perfect man,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Neither will he help the evil doers:'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Till he fill thy mouth with laughing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thy lips with rejoicing.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They that hate thee shall be clothed with shame;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the dwelling place of the wicked shall come to nought.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Doth God pervert judgment?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or doth the Almighty pervert justice?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If thy children have sinned against him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he have cast them away for their transgression;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If thou wouldest seek unto God betimes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And make thy supplication to the Almighty;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'If thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: wert
    - type: text
      text: ' pure and upright;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Surely now he would awake for thee,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And make the habitation of thy righteousness prosperous.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though thy beginning was small,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yet thy latter end should greatly increase.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For enquire, I pray thee, of the former age,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And prepare thyself to the search of their fathers:'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '(For we '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are but of
    - type: text
      text: ' yesterday, and know nothing,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Because our days upon earth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' a shadow:)'
