    content: Bildad's Speech
  - type: text
    content: Then answered Bildad the Shuhite, and said,
  '10':
  - type: text
    content: 'Shall not they teach thee, '
  - type: text
    content: and
  - type: text
    content: ' tell thee,'
  - type: text
    content: And utter words out of their heart?
  '11':
  - type: text
    content: Can the rush grow up without mire?
  - type: text
    content: Can the flag grow without water?
  '12':
  - type: text
    content: 'Whilst it '
  - type: text
    content: is
  - type: text
    content: ' yet in his greenness, '
  - type: text
    content: and
  - type: text
    content: ' not cut down,'
  - type: text
    content: 'It withereth before any '
  - type: text
    content: other
  - type: text
    content: ' herb.'
  '13':
  - type: text
    content: 'So '
  - type: text
    content: are
  - type: text
    content: ' the paths of all that forget God;'
  - type: text
    content: 'And the hypocrite''s hope shall perish:'
  '14':
  - type: text
    content: Whose hope shall be cut off,
  - type: text
    content: 'And whose trust '
  - type: text
    content: shall be
  - type: text
    content: ' a spider''s web.'
  '15':
  - type: text
    content: 'He shall lean upon his house, but it shall not stand:'
  - type: text
    content: He shall hold it fast, but it shall not endure.
  '16':
  - type: text
    content: 'He '
  - type: text
    content: is
  - type: text
    content: ' green before the sun,'
  - type: text
    content: And his branch shooteth forth in his garden.
  '17':
  - type: text
    content: His roots are wrapped about the heap,
  - type: text
    content: And
  - type: text
    content: ' seeth the place of stones.'
  '18':
  - type: text
    content: If he destroy him from his place,
  - type: text
    content: 'Then '
  - type: text
    content: it
  - type: text
    content: ' shall deny him, '
  - type: text
    content: saying
  - type: text
    content: ','
  - type: text
    content: I have not seen thee.
  '19':
  - type: text
    content: 'Behold, this '
  - type: text
    content: is
  - type: text
    content: ' the joy of his way,'
  - type: text
    content: And out of the earth shall others grow.
  '2':
  - type: text
    content: 'How long wilt thou speak these '
  - type: text
    content: things?
  - type: text
    content: 'And '
  - type: text
    content: how long shall
  - type: text
    content: ' the words of thy mouth '
  - type: text
    content: be like
  - type: text
    content: ' a strong wind?'
  '20':
  - type: text
    content: Behold, God will not cast away a perfect man,
  - type: text
    content: 'Neither will he help the evil doers:'
  '21':
  - type: text
    content: Till he fill thy mouth with laughing,
  - type: text
    content: And thy lips with rejoicing.
  '22':
  - type: text
    content: They that hate thee shall be clothed with shame;
  - type: text
    content: And the dwelling place of the wicked shall come to nought.
  '3':
  - type: text
    content: Doth God pervert judgment?
  - type: text
    content: Or doth the Almighty pervert justice?
  '4':
  - type: text
    content: If thy children have sinned against him,
  - type: text
    content: And he have cast them away for their transgression;
  '5':
  - type: text
    content: If thou wouldest seek unto God betimes,
  - type: text
    content: And make thy supplication to the Almighty;
  '6':
  - type: text
    content: 'If thou '
  - type: text
    content: wert
  - type: text
    content: ' pure and upright;'
  - type: text
    content: Surely now he would awake for thee,
  - type: text
    content: And make the habitation of thy righteousness prosperous.
  '7':
  - type: text
    content: Though thy beginning was small,
  - type: text
    content: Yet thy latter end should greatly increase.
  '8':
  - type: text
    content: For enquire, I pray thee, of the former age,
  - type: text
    content: 'And prepare thyself to the search of their fathers:'
  '9':
  - type: text
    content: '(For we '
  - type: text
    content: are but of
  - type: text
    content: ' yesterday, and know nothing,'
  - type: text
    content: 'Because our days upon earth '
  - type: text
    content: are
  - type: text
    content: ' a shadow:)'
