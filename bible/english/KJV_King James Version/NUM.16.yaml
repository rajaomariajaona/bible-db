document_id: NUM.16,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Moses and Aaron Challenged
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Korah, the son of Izhar, the son of Kohath, the son of Levi, and Dathan and Abiram, the sons of Eliab, and On, the son of Peleth, sons of Reuben, took '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'men:'
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he hath brought thee near '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to him
    - type: text
      text: ', and all thy brethren the sons of Levi with thee: and seek ye the priesthood also? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For which cause '
    - type: usfm
      marker: add
      children:
      - type: text
        text: both
    - type: text
      text: ' thou and all thy company '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' gathered together against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': and what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Aaron, that ye murmur against him?'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses sent to call Dathan and Abiram, the sons of Eliab: which said, We will not come up: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: is it
    - type: text
      text: ' a small thing that thou hast brought us up out of a land that floweth with milk and honey, to kill us in the wilderness, except thou make thyself altogether a prince over us? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover thou hast not brought us into a land that floweth with milk and honey, or given us inheritance of fields and vineyards: wilt thou put out the eyes of these men? we will not come up.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses was very wroth, and said unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', Respect not thou their offering: I have not taken one ass from them, neither have I hurt one of them. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses said unto Korah, Be thou and all thy company before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', thou, and they, and Aaron, to morrow: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and take every man his censer, and put incense in them, and bring ye before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' every man his censer, two hundred and fifty censers; thou also, and Aaron, each '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of you
    - type: text
      text: ' his censer. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they took every man his censer, and put fire in them, and laid incense thereon, and stood in the door of the tabernacle of the congregation with Moses and Aaron. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Korah gathered all the congregation against them unto the door of the tabernacle of the congregation: and the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' appeared unto all the congregation.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they rose up before Moses, with certain of the children of Israel, two hundred and fifty princes of the assembly, famous in the congregation, men of renown: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses and unto Aaron, saying, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Separate yourselves from among this congregation, that I may consume them in a moment. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they fell upon their faces, and said, O God, the God of the spirits of all flesh, shall one man sin, and wilt thou be wroth with all the congregation? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Speak unto the congregation, saying, Get you up from about the tabernacle of Korah, Dathan, and Abiram.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses rose up and went unto Dathan and Abiram; and the elders of Israel followed him. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he spake unto the congregation, saying, Depart, I pray you, from the tents of these wicked men, and touch nothing of their''s, lest ye be consumed in all their sins. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they gat up from the tabernacle of Korah, Dathan, and Abiram, on every side: and Dathan and Abiram came out, and stood in the door of their tents, and their wives, and their sons, and their little children. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses said, Hereby ye shall know that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath sent me to do all these works; for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: I have
    - type: text
      text: ' not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: done them
    - type: text
      text: ' of mine own mind. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If these men die the common death of all men, or if they be visited after the visitation of all men; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: then
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath not sent me. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they gathered themselves together against Moses and against Aaron, and said unto them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Ye take
    - type: text
      text: ' too much upon you, seeing all the congregation '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' holy, every one of them, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' among them: wherefore then lift ye up yourselves above the congregation of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '?'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' make a new thing, and the earth open her mouth, and swallow them up, with all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: appertain
    - type: text
      text: ' unto them, and they go down quick into the pit; then ye shall understand that these men have provoked the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, as he had made an end of speaking all these words, that the ground clave asunder that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' under them: '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the earth opened her mouth, and swallowed them up, and their houses, and all the men that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: appertained
    - type: text
      text: ' unto Korah, and all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' goods. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They, and all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: appertained
    - type: text
      text: ' to them, went down alive into the pit, and the earth closed upon them: and they perished from among the congregation. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all Israel that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' round about them fled at the cry of them: for they said, Lest the earth swallow us up '
    - type: usfm
      marker: add
      children:
      - type: text
        text: also
    - type: text
      text: '. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there came out a fire from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and consumed the two hundred and fifty men that offered incense.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Speak unto Eleazar the son of Aaron the priest, that he take up the censers out of the burning, and scatter thou the fire yonder; for they are hallowed. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The censers of these sinners against their own souls, let them make them broad plates '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a covering of the altar: for they offered them before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', therefore they are hallowed: and they shall be a sign unto the children of Israel. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Eleazar the priest took the brasen censers, wherewith they that were burnt had offered; and they were made broad '
    - type: usfm
      marker: add
      children:
      - type: text
        text: plates for
    - type: text
      text: ' a covering of the altar: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Moses heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', he fell upon his face: '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' a memorial unto the children of Israel, that no stranger, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not of the seed of Aaron, come near to offer incense before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; that he be not as Korah, and as his company: as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said to him by the hand of Moses.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But on the morrow all the congregation of the children of Israel murmured against Moses and against Aaron, saying, Ye have killed the people of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, when the congregation was gathered against Moses and against Aaron, that they looked toward the tabernacle of the congregation: and, behold, the cloud covered it, and the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' appeared. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses and Aaron came before the tabernacle of the congregation. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Get you up from among this congregation, that I may consume them as in a moment. And they fell upon their faces. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses said unto Aaron, Take a censer, and put fire therein from off the altar, and put on incense, and go quickly unto the congregation, and make an atonement for them: for there is wrath gone out from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; the plague is begun. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Aaron took as Moses commanded, and ran into the midst of the congregation; and, behold, the plague was begun among the people: and he put on incense, and made an atonement for the people. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he stood between the dead and the living; and the plague was stayed. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now they that died in the plague were fourteen thousand and seven hundred, beside them that died about the matter of Korah. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he spake unto Korah and unto all his company, saying, Even to morrow the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will shew who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' his, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: who is
    - type: text
      text: ' holy; and will cause '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' to come near unto him: even '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' whom he hath chosen will he cause to come near unto him. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Aaron returned unto Moses unto the door of the tabernacle of the congregation: and the plague was stayed.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This do; Take you censers, Korah, and all his company; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and put fire therein, and put incense in them before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' to morrow: and it shall be '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the man whom the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' doth choose, he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' holy: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ye take
    - type: text
      text: ' too much upon you, ye sons of Levi. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses said unto Korah, Hear, I pray you, ye sons of Levi: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: seemeth it but
    - type: text
      text: ' a small thing unto you, that the God of Israel hath separated you from the congregation of Israel, to bring you near to himself to do the service of the tabernacle of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and to stand before the congregation to minister unto them? '
