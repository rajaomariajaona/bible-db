document_id: LUK.24,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Resurrection
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now upon the first '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the week, very early in the morning, they came unto the sepulchre, bringing the spices which they had prepared, and certain '
    - type: usfm
      marker: add
      children:
      - type: text
        text: others
    - type: text
      text: ' with them. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'It was Mary Magdalene, and Joanna, and Mary '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the mother
    - type: text
      text: ' of James, and other '
    - type: usfm
      marker: add
      children:
      - type: text
        text: women that were
    - type: text
      text: ' with them, which told these things unto the apostles. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And their words seemed to them as idle tales, and they believed them not. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Then arose Peter, and ran unto the sepulchre; and stooping down, he beheld the linen clothes laid by themselves, and departed, wondering in himself at that which was come to pass.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: On the Way to Emmaus
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And, behold, two of them went that same day to a village called Emmaus, which was from Jerusalem '
    - type: usfm
      marker: add
      children:
      - type: text
        text: about
    - type: text
      text: ' threescore furlongs. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And they talked together of all these things which had happened. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And it came to pass, that, while they communed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: together
    - type: text
      text: ' and reasoned, Jesus himself drew near, and went with them. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: But their eyes were holden that they should not know him.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'What manner of communications '
      - type: usfm
        marker: add
        children:
        - type: text
          text: are
      - type: text
        text: ' these that ye have one to another, as ye walk, and are sad?'
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And the one of them, whose name was Cleopas, answering said unto him, Art thou only a stranger in Jerusalem, and hast not known the things which are come to pass there in these days? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: What things?
    - type: text
      text: ' And they said unto him, Concerning Jesus of Nazareth, which was a prophet mighty in deed and word before God and all the people: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And they found the stone rolled away from the sepulchre. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'and how the chief priests and our rulers delivered him to be condemned to death, and have crucified him. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'But we trusted that it had been he which should have redeemed Israel: and beside all this, to day is the third day since these things were done. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Yea, and certain women also of our company made us astonished, which were early at the sepulchre; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'and when they found not his body, they came, saying, that they had also seen a vision of angels, which said that he was alive. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And certain of them which were with us went to the sepulchre, and found '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' even so as the women had said: but him they saw not.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Then he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'O fools, and slow of heart to believe all that the prophets have spoken:'
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ought not Christ to have suffered these things, and to enter into his glory?
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And beginning at Moses and all the prophets, he expounded unto them in all the scriptures the things concerning himself. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And they drew nigh unto the village, whither they went: and he made as though he would have gone further. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'But they constrained him, saying, Abide with us: for it is toward evening, and the day is far spent. And he went in to tarry with them.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Evening Meal
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And they entered in, and found not the body of the Lord Jesus. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And it came to pass, as he sat at meat with them, he took bread, and blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and brake, and gave to them. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And their eyes were opened, and they knew him; and he vanished out of their sight. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: And they said one to another, Did not our heart burn within us, while he talked with us by the way, and while he opened to us the scriptures?
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Return to Jerusalem
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And they rose up the same hour, and returned to Jerusalem, and found the eleven gathered together, and them that were with them, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'saying, The Lord is risen indeed, and hath appeared to Simon. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'And they told what things '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were done
    - type: text
      text: ' in the way, and how he was known of them in breaking of bread.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Peace be unto you
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'And as they thus spake, Jesus himself stood in the midst of them, and saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Peace '
      - type: usfm
        marker: add
        children:
        - type: text
          text: be
      - type: text
        text: ' unto you.'
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'But they were terrified and affrighted, and supposed that they had seen a spirit. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Why are ye troubled? and why do thoughts arise in your hearts?
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Behold my hands and my feet, that it is I myself: handle me, and see; for a spirit hath not flesh and bones, as ye see me have.'
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And it came to pass, as they were much perplexed thereabout, behold, two men stood by them in shining garments: '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'And when he had thus spoken, he shewed them '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' hands and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' feet.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'And while they yet believed not for joy, and wondered, he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Have ye here any meat?
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'And they gave him a piece of a broiled fish, and of an honeycomb. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'And he took '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and did eat before them.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ye are my witnesses
    marker-yv: yv-h
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'These '
      - type: usfm
        marker: add
        children:
        - type: text
          text: are
      - type: text
        text: ' the words which I spake unto you, while I was yet with you, that all things must be fulfilled, which were written in the law of Moses, and '
      - type: usfm
        marker: add
        children:
        - type: text
          text: in
      - type: text
        text: ' the prophets, and '
      - type: usfm
        marker: add
        children:
        - type: text
          text: in
      - type: text
        text: ' the psalms, concerning me.'
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Then opened he their understanding, that they might understand the scriptures, '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'and said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Thus it is written, and thus it behoved Christ to suffer, and to rise from the dead the third day:'
    - type: text
      text: ' '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and that repentance and remission of sins should be preached in his name among all nations, beginning at Jerusalem.
    - type: text
      text: ' '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And ye are witnesses of these things.
    - type: text
      text: ' '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And, behold, I send the promise of my Father upon you: but tarry ye in the city of Jerusalem, until ye be endued with power from on high.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Ascension
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'and as they were afraid, and bowed down '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' faces to the earth, they said unto them, Why seek ye the living among the dead? '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'And he led them out as far as to Bethany, and he lifted up his hands, and blessed them. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'And it came to pass, while he blessed them, he was parted from them, and carried up into heaven. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'And they worshipped him, and returned to Jerusalem with great joy: '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: and were continually in the temple, praising and blessing God. Amen.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'He is not here, but is risen: remember how he spake unto you when he was yet in Galilee, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'saying, The Son of man must be delivered into the hands of sinful men, and be crucified, and the third day rise again. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And they remembered his words, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'and returned from the sepulchre, and told all these things unto the eleven, and to all the rest. '
