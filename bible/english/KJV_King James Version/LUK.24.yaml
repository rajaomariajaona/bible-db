document_id: LUK.24,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Resurrection
  - type: text
    content: 'Now upon the first '
  - type: text
    content: day
  - type: text
    content: ' of the week, very early in the morning, they came unto the sepulchre, bringing the spices which they had prepared, and certain '
  - type: text
    content: others
  - type: text
    content: ' with them. '
  '10':
  - type: text
    content: 'It was Mary Magdalene, and Joanna, and Mary '
  - type: text
    content: the mother
  - type: text
    content: ' of James, and other '
  - type: text
    content: women that were
  - type: text
    content: ' with them, which told these things unto the apostles. '
  '11':
  - type: text
    content: 'And their words seemed to them as idle tales, and they believed them not. '
  '12':
  - type: text
    content: Then arose Peter, and ran unto the sepulchre; and stooping down, he beheld the linen clothes laid by themselves, and departed, wondering in himself at that which was come to pass.
  - type: heading
    content: On the Way to Emmaus
  '13':
  - type: text
    content: 'And, behold, two of them went that same day to a village called Emmaus, which was from Jerusalem '
  - type: text
    content: about
  - type: text
    content: ' threescore furlongs. '
  '14':
  - type: text
    content: 'And they talked together of all these things which had happened. '
  '15':
  - type: text
    content: 'And it came to pass, that, while they communed '
  - type: text
    content: together
  - type: text
    content: ' and reasoned, Jesus himself drew near, and went with them. '
  '16':
  - type: text
    content: But their eyes were holden that they should not know him.
  '17':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: 'What manner of communications '
  - type: text
    content: are
  - type: text
    content: ' these that ye have one to another, as ye walk, and are sad?'
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'And the one of them, whose name was Cleopas, answering said unto him, Art thou only a stranger in Jerusalem, and hast not known the things which are come to pass there in these days? '
  '19':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: What things?
  - type: text
    content: ' And they said unto him, Concerning Jesus of Nazareth, which was a prophet mighty in deed and word before God and all the people: '
  '2':
  - type: text
    content: 'And they found the stone rolled away from the sepulchre. '
  '20':
  - type: text
    content: 'and how the chief priests and our rulers delivered him to be condemned to death, and have crucified him. '
  '21':
  - type: text
    content: 'But we trusted that it had been he which should have redeemed Israel: and beside all this, to day is the third day since these things were done. '
  '22':
  - type: text
    content: 'Yea, and certain women also of our company made us astonished, which were early at the sepulchre; '
  '23':
  - type: text
    content: 'and when they found not his body, they came, saying, that they had also seen a vision of angels, which said that he was alive. '
  '24':
  - type: text
    content: 'And certain of them which were with us went to the sepulchre, and found '
  - type: text
    content: it
  - type: text
    content: ' even so as the women had said: but him they saw not.'
  '25':
  - type: text
    content: 'Then he said unto them, '
  - type: text
    content: 'O fools, and slow of heart to believe all that the prophets have spoken:'
  - type: text
    content: ' '
  '26':
  - type: text
    content: ought not Christ to have suffered these things, and to enter into his glory?
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'And beginning at Moses and all the prophets, he expounded unto them in all the scriptures the things concerning himself. '
  '28':
  - type: text
    content: 'And they drew nigh unto the village, whither they went: and he made as though he would have gone further. '
  '29':
  - type: text
    content: 'But they constrained him, saying, Abide with us: for it is toward evening, and the day is far spent. And he went in to tarry with them.'
  - type: heading
    content: The Evening Meal
  '3':
  - type: text
    content: 'And they entered in, and found not the body of the Lord Jesus. '
  '30':
  - type: text
    content: 'And it came to pass, as he sat at meat with them, he took bread, and blessed '
  - type: text
    content: it
  - type: text
    content: ', and brake, and gave to them. '
  '31':
  - type: text
    content: 'And their eyes were opened, and they knew him; and he vanished out of their sight. '
  '32':
  - type: text
    content: And they said one to another, Did not our heart burn within us, while he talked with us by the way, and while he opened to us the scriptures?
  - type: heading
    content: Return to Jerusalem
  '33':
  - type: text
    content: 'And they rose up the same hour, and returned to Jerusalem, and found the eleven gathered together, and them that were with them, '
  '34':
  - type: text
    content: 'saying, The Lord is risen indeed, and hath appeared to Simon. '
  '35':
  - type: text
    content: 'And they told what things '
  - type: text
    content: were done
  - type: text
    content: ' in the way, and how he was known of them in breaking of bread.'
  - type: heading
    content: Peace be unto you
  '36':
  - type: text
    content: 'And as they thus spake, Jesus himself stood in the midst of them, and saith unto them, '
  - type: text
    content: 'Peace '
  - type: text
    content: be
  - type: text
    content: ' unto you.'
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'But they were terrified and affrighted, and supposed that they had seen a spirit. '
  '38':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: Why are ye troubled? and why do thoughts arise in your hearts?
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'Behold my hands and my feet, that it is I myself: handle me, and see; for a spirit hath not flesh and bones, as ye see me have.'
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'And it came to pass, as they were much perplexed thereabout, behold, two men stood by them in shining garments: '
  '40':
  - type: text
    content: 'And when he had thus spoken, he shewed them '
  - type: text
    content: his
  - type: text
    content: ' hands and '
  - type: text
    content: his
  - type: text
    content: ' feet.'
  '41':
  - type: text
    content: 'And while they yet believed not for joy, and wondered, he said unto them, '
  - type: text
    content: Have ye here any meat?
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'And they gave him a piece of a broiled fish, and of an honeycomb. '
  '43':
  - type: text
    content: 'And he took '
  - type: text
    content: it
  - type: text
    content: ', and did eat before them.'
  - type: heading
    content: Ye are my witnesses
  '44':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the words which I spake unto you, while I was yet with you, that all things must be fulfilled, which were written in the law of Moses, and '
  - type: text
    content: in
  - type: text
    content: ' the prophets, and '
  - type: text
    content: in
  - type: text
    content: ' the psalms, concerning me.'
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'Then opened he their understanding, that they might understand the scriptures, '
  '46':
  - type: text
    content: 'and said unto them, '
  - type: text
    content: 'Thus it is written, and thus it behoved Christ to suffer, and to rise from the dead the third day:'
  - type: text
    content: ' '
  '47':
  - type: text
    content: and that repentance and remission of sins should be preached in his name among all nations, beginning at Jerusalem.
  - type: text
    content: ' '
  '48':
  - type: text
    content: And ye are witnesses of these things.
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'And, behold, I send the promise of my Father upon you: but tarry ye in the city of Jerusalem, until ye be endued with power from on high.'
  - type: heading
    content: The Ascension
  '5':
  - type: text
    content: 'and as they were afraid, and bowed down '
  - type: text
    content: their
  - type: text
    content: ' faces to the earth, they said unto them, Why seek ye the living among the dead? '
  '50':
  - type: text
    content: 'And he led them out as far as to Bethany, and he lifted up his hands, and blessed them. '
  '51':
  - type: text
    content: 'And it came to pass, while he blessed them, he was parted from them, and carried up into heaven. '
  '52':
  - type: text
    content: 'And they worshipped him, and returned to Jerusalem with great joy: '
  '53':
  - type: text
    content: and were continually in the temple, praising and blessing God. Amen.
  '6':
  - type: text
    content: 'He is not here, but is risen: remember how he spake unto you when he was yet in Galilee, '
  '7':
  - type: text
    content: 'saying, The Son of man must be delivered into the hands of sinful men, and be crucified, and the third day rise again. '
  '8':
  - type: text
    content: 'And they remembered his words, '
  '9':
  - type: text
    content: 'and returned from the sepulchre, and told all these things unto the eleven, and to all the rest. '
