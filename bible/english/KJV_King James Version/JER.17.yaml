    content: A Pen of Iron
  - type: text
    content: 'The sin of Judah '
  - type: text
    content: is
  - type: text
    content: ' written with a pen of iron, '
  - type: text
    content: and
  - type: text
    content: ' with the point of a diamond: '
  - type: text
    content: it is
  - type: text
    content: ' graven upon the table of their heart, and upon the horns of your altars; '
  '10':
  - type: text
    content: 'I the '
  - type: text
    content: LORD
  - type: text
    content: ' search the heart, '
  - type: text
    content: I
  - type: text
    content: ' try the reins, even to give every man according to his ways, '
  - type: text
    content: and
  - type: text
    content: ' according to the fruit of his doings. '
  '11':
  - type: text
    content: As
  - type: text
    content: ' the partridge sitteth '
  - type: text
    content: on eggs
  - type: text
    content: ', and hatcheth '
  - type: text
    content: them
  - type: text
    content: ' not; '
  - type: text
    content: so
  - type: text
    content: ' he that getteth riches, and not by right, shall leave them in the midst of his days, and at his end shall be a fool.'
  '12':
  - type: text
    content: 'A glorious high throne from the beginning '
  - type: text
    content: is
  - type: text
    content: ' the place of our sanctuary. '
  '13':
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ', the hope of Israel, all that forsake thee shall be ashamed, '
  - type: text
    content: and
  - type: text
    content: ' they that depart from me shall be written in the earth, because they have forsaken the '
  - type: text
    content: LORD
  - type: text
    content: ', the fountain of living waters. '
  '14':
  - type: text
    content: 'Heal me, O '
  - type: text
    content: LORD
  - type: text
    content: ', and I shall be healed; save me, and I shall be saved: for thou '
  - type: text
    content: art
  - type: text
    content: ' my praise. '
  '15':
  - type: text
    content: 'Behold, they say unto me, Where '
  - type: text
    content: is
  - type: text
    content: ' the word of the '
  - type: text
    content: LORD
  - type: text
    content: '? let it come now. '
  '16':
  - type: text
    content: 'As for me, I have not hastened from '
  - type: text
    content: being
  - type: text
    content: ' a pastor to follow thee: neither have I desired the woeful day; thou knowest: that which came out of my lips was '
  - type: text
    content: right
  - type: text
    content: ' before thee. '
  '17':
  - type: text
    content: 'Be not a terror unto me: thou '
  - type: text
    content: art
  - type: text
    content: ' my hope in the day of evil. '
  '18':
  - type: text
    content: 'Let them be confounded that persecute me, but let not me be confounded: let them be dismayed, but let not me be dismayed: bring upon them the day of evil, and destroy them with double destruction.'
  - type: heading
    content: Keep the Sabbath
  '19':
  - type: text
    content: 'Thus said the '
  - type: text
    content: LORD
  - type: text
    content: ' unto me; Go and stand in the gate of the children of the people, whereby the kings of Judah come in, and by the which they go out, and in all the gates of Jerusalem; '
  '2':
  - type: text
    content: 'whilst their children remember their altars and their groves by the green trees upon the high hills. '
  '20':
  - type: text
    content: 'and say unto them, Hear ye the word of the '
  - type: text
    content: LORD
  - type: text
    content: ', ye kings of Judah, and all Judah, and all the inhabitants of Jerusalem, that enter in by these gates: '
  '21':
  - type: text
    content: 'thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Take heed to yourselves, and bear no burden on the sabbath day, nor bring '
  - type: text
    content: it
  - type: text
    content: ' in by the gates of Jerusalem; '
  '22':
  - type: text
    content: 'neither carry forth a burden out of your houses on the sabbath day, neither do ye any work, but hallow ye the sabbath day, as I commanded your fathers. '
  '23':
  - type: text
    content: But they obeyed not, neither inclined their ear, but made their neck stiff, that they might not hear, nor receive instruction.
  '24':
  - type: text
    content: 'And it shall come to pass, if ye diligently hearken unto me, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', to bring in no burden through the gates of this city on the sabbath day, but hallow the sabbath day, to do no work therein; '
  '25':
  - type: text
    content: 'then shall there enter into the gates of this city kings and princes sitting upon the throne of David, riding in chariots and on horses, they, and their princes, the men of Judah, and the inhabitants of Jerusalem: and this city shall remain for ever. '
  '26':
  - type: text
    content: 'And they shall come from the cities of Judah, and from the places about Jerusalem, and from the land of Benjamin, and from the plain, and from the mountains, and from the south, bringing burnt offerings, and sacrifices, and meat offerings, and incense, and bringing sacrifices of praise, unto the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '27':
  - type: text
    content: But if ye will not hearken unto me to hallow the sabbath day, and not to bear a burden, even entering in at the gates of Jerusalem on the sabbath day; then will I kindle a fire in the gates thereof, and it shall devour the palaces of Jerusalem, and it shall not be quenched.
  '3':
  - type: text
    content: 'O my mountain in the field, I will give thy substance '
  - type: text
    content: and
  - type: text
    content: ' all thy treasures to the spoil, '
  - type: text
    content: and
  - type: text
    content: ' thy high places for sin, throughout all thy borders.'
  '4':
  - type: text
    content: 'And thou, even thyself, shalt discontinue from thine heritage that I gave thee; and I will cause thee to serve thine enemies in the land which thou knowest not: for ye have kindled a fire in mine anger, '
  - type: text
    content: which
  - type: text
    content: ' shall burn for ever.'
  - type: heading
    content: Trust in the Lord
  '5':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Cursed '
  - type: text
    content: be
  - type: text
    content: ' the man that trusteth in man, and maketh flesh his arm, and whose heart departeth from the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'For he shall be like the heath in the desert, and shall not see when good cometh; but shall inhabit the parched places in the wilderness, '
  - type: text
    content: in
  - type: text
    content: ' a salt land and not inhabited. '
  '7':
  - type: text
    content: 'Blessed '
  - type: text
    content: is
  - type: text
    content: ' the man that trusteth in the '
  - type: text
    content: LORD
  - type: text
    content: ', and whose hope the '
  - type: text
    content: LORD
  - type: text
    content: ' is. '
  '8':
  - type: text
    content: 'For he shall be as a tree planted by the waters, and '
  - type: text
    content: that
  - type: text
    content: ' spreadeth out her roots by the river, and shall not see when heat cometh, but her leaf shall be green; and shall not be careful in the year of drought, neither shall cease from yielding fruit.'
  '9':
  - type: text
    content: 'The heart '
  - type: text
    content: is
  - type: text
    content: ' deceitful above all '
  - type: text
    content: things
  - type: text
    content: ', and desperately wicked: who can know it? '
