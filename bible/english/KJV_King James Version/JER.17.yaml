document_id: JER.17
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: A Pen of Iron
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The sin of Judah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' written with a pen of iron, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' with the point of a diamond: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' graven upon the table of their heart, and upon the horns of your altars; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'whilst their children remember their altars and their groves by the green trees upon the high hills. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'O my mountain in the field, I will give thy substance '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' all thy treasures to the spoil, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' thy high places for sin, throughout all thy borders.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And thou, even thyself, shalt discontinue from thine heritage that I gave thee; and I will cause thee to serve thine enemies in the land which thou knowest not: for ye have kindled a fire in mine anger, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' shall burn for ever.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Trust in the Lord
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; Cursed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' the man that trusteth in man, and maketh flesh his arm, and whose heart departeth from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For he shall be like the heath in the desert, and shall not see when good cometh; but shall inhabit the parched places in the wilderness, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' a salt land and not inhabited. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the man that trusteth in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and whose hope the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' is. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For he shall be as a tree planted by the waters, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' spreadeth out her roots by the river, and shall not see when heat cometh, but her leaf shall be green; and shall not be careful in the year of drought, neither shall cease from yielding fruit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The heart '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' deceitful above all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ', and desperately wicked: who can know it? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' search the heart, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I
  - type: text
    text: ' try the reins, even to give every man according to his ways, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' according to the fruit of his doings. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' the partridge sitteth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: on eggs
  - type: text
    text: ', and hatcheth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' not; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' he that getteth riches, and not by right, shall leave them in the midst of his days, and at his end shall be a fool.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'A glorious high throne from the beginning '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the place of our sanctuary. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the hope of Israel, all that forsake thee shall be ashamed, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' they that depart from me shall be written in the earth, because they have forsaken the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the fountain of living waters. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Heal me, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and I shall be healed; save me, and I shall be saved: for thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' my praise. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Behold, they say unto me, Where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '? let it come now. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'As for me, I have not hastened from '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' a pastor to follow thee: neither have I desired the woeful day; thou knowest: that which came out of my lips was '
  - type: usfm
    marker: add
    children:
    - type: text
      text: right
  - type: text
    text: ' before thee. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Be not a terror unto me: thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' my hope in the day of evil. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Let them be confounded that persecute me, but let not me be confounded: let them be dismayed, but let not me be dismayed: bring upon them the day of evil, and destroy them with double destruction.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Keep the Sabbath
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Thus said the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' unto me; Go and stand in the gate of the children of the people, whereby the kings of Judah come in, and by the which they go out, and in all the gates of Jerusalem; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'and say unto them, Hear ye the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', ye kings of Judah, and all Judah, and all the inhabitants of Jerusalem, that enter in by these gates: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; Take heed to yourselves, and bear no burden on the sabbath day, nor bring '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' in by the gates of Jerusalem; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'neither carry forth a burden out of your houses on the sabbath day, neither do ye any work, but hallow ye the sabbath day, as I commanded your fathers. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: But they obeyed not, neither inclined their ear, but made their neck stiff, that they might not hear, nor receive instruction.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And it shall come to pass, if ye diligently hearken unto me, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', to bring in no burden through the gates of this city on the sabbath day, but hallow the sabbath day, to do no work therein; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'then shall there enter into the gates of this city kings and princes sitting upon the throne of David, riding in chariots and on horses, they, and their princes, the men of Judah, and the inhabitants of Jerusalem: and this city shall remain for ever. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And they shall come from the cities of Judah, and from the places about Jerusalem, and from the land of Benjamin, and from the plain, and from the mountains, and from the south, bringing burnt offerings, and sacrifices, and meat offerings, and incense, and bringing sacrifices of praise, unto the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: But if ye will not hearken unto me to hallow the sabbath day, and not to bear a burden, even entering in at the gates of Jerusalem on the sabbath day; then will I kindle a fire in the gates thereof, and it shall devour the palaces of Jerusalem, and it shall not be quenched.
