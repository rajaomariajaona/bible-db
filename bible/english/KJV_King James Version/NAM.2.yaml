document_id: NAM.2,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He that dasheth in pieces is come up before thy face: keep the munition, watch the way, make '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thy
    - type: text
      text: ' loins strong, fortify '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thy
    - type: text
      text: ' power mightily. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She is empty, and void, and waste: and the heart melteth, and the knees smite together, and much pain '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in all loins, and the faces of them all gather blackness. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the dwelling of the lions, and the feedingplace of the young lions, where the lion, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the old lion, walked, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the lion''s whelp, and none made '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' afraid? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The lion did tear in pieces enough for his whelps, and strangled for his lionesses, and filled his holes with prey, and his dens with ravin. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' against thee, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, and I will burn her chariots in the smoke, and the sword shall devour thy young lions: and I will cut off thy prey from the earth, and the voice of thy messengers shall no more be heard.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath turned away the excellency of Jacob, as the excellency of Israel: for the emptiers have emptied them out, and marred their vine branches.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Attack on Nineveh
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The shield of his mighty men is made red, the valiant men '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in scarlet: the chariots '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' with flaming torches in the day of his preparation, and the fir trees shall be terribly shaken. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The chariots shall rage in the streets, they shall justle one against another in the broad ways: they shall seem like torches, they shall run like the lightnings. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He shall recount his worthies: they shall stumble in their walk; they shall make haste to the wall thereof, and the defence shall be prepared. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The gates of the rivers shall be opened, and the palace shall be dissolved. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Huzzab shall be led away captive, she shall be brought up, and her maids shall lead '
    - type: usfm
      marker: add
      children:
      - type: text
        text: her
    - type: text
      text: ' as with the voice of doves, tabering upon their breasts.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Nineveh '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' of old like a pool of water: yet they shall flee away. Stand, stand, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall they cry
    - type: text
      text: '; but none shall look back. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Take ye the spoil of silver, take the spoil of gold: for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none end of the store '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' glory out of all the pleasant furniture. '
