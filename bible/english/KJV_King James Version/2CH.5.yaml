document_id: 2CH.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Thus all the work that Solomon made for the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' was finished: and Solomon brought in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: all
  - type: text
    text: ' the things that David his father had dedicated; and the silver, and the gold, and all the instruments, put he among the treasures of the house of God.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Dedication
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then Solomon assembled the elders of Israel, and all the heads of the tribes, the chief of the fathers of the children of Israel, unto Jerusalem, to bring up the ark of the covenant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' out of the city of David, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Zion. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Wherefore all the men of Israel assembled themselves unto the king in the feast which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in the seventh month. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And all the elders of Israel came; and the Levites took up the ark. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And they brought up the ark, and the tabernacle of the congregation, and all the holy vessels that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in the tabernacle, these did the priests '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the Levites bring up. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Also king Solomon, and all the congregation of Israel that were assembled unto him before the ark, sacrificed sheep and oxen, which could not be told nor numbered for multitude. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the priests brought in the ark of the covenant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' unto his place, to the oracle of the house, into the most holy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: place, even
  - type: text
    text: ' under the wings of the cherubims: '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'for the cherubims spread forth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' wings over the place of the ark, and the cherubims covered the ark and the staves thereof above. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And they drew out the staves '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of the ark
  - type: text
    text: ', that the ends of the staves were seen from the ark before the oracle; but they were not seen without. And there it is unto this day. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: add
    children:
    - type: text
      text: There was
  - type: text
    text: ' nothing in the ark save the two tables which Moses put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: therein
  - type: text
    text: ' at Horeb, when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' made '
  - type: usfm
    marker: add
    children:
    - type: text
      text: a covenant
  - type: text
    text: ' with the children of Israel, when they came out of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And it came to pass, when the priests were come out of the holy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'place:'
  - type: text
    text: ' (for all the priests '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that were
  - type: text
    text: ' present were sanctified, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' did not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' wait by course: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'also the Levites '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which were
  - type: text
    text: ' the singers, all of them of Asaph, of Heman, of Jeduthun, with their sons and their brethren, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' arrayed in white linen, having cymbals and psalteries and harps, stood at the east end of the altar, and with them an hundred and twenty priests sounding with trumpets:) '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'it came even to pass, as the trumpeters and singers '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' as one, to make one sound to be heard in praising and thanking the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and when they lifted up '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' voice with the trumpets and cymbals and instruments of musick, and praised the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saying
  - type: text
    text: ', For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he is
  - type: text
    text: ' good; for his mercy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: endureth
  - type: text
    text: ' for ever: that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' the house was filled with a cloud, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'so that the priests could not stand to minister by reason of the cloud: for the glory of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had filled the house of God.'
