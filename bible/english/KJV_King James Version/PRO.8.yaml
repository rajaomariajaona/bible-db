document_id: PRO.8
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Wisdom and Folly
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Doth not wisdom cry?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And understanding put forth her voice?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: She standeth in the top of high places, by the way
- type: usfm
  marker: q2
  children:
  - type: text
    text: In the places of the paths.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: She crieth at the gates, at the entry of the city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: At the coming in at the doors.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Unto you, O men, I call;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And my voice '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' to the sons of man.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'O ye simple, understand wisdom:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And, ye fools, be ye of an understanding heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hear; for I will speak of excellent things;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the opening of my lips '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' right things.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: For my mouth shall speak truth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And wickedness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' an abomination to my lips.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'All the words of my mouth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' in righteousness;'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' nothing froward or perverse in them.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'They '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' all plain to him that understandeth,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And right to them that find knowledge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Receive my instruction, and not silver;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And knowledge rather than choice gold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For wisdom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' better than rubies;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And all the things that may be desired are not to be compared to it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I wisdom dwell with prudence,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And find out knowledge of witty inventions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' to hate evil:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pride, and arrogancy, and the evil way,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the froward mouth, do I hate.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Counsel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' mine, and sound wisdom:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' understanding; I have strength.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: By me kings reign,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And princes decree justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: By me princes rule,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And nobles, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' all the judges of the earth.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I love them that love me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And those that seek me early shall find me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Riches and honour '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' with me;'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Yea
  - type: text
    text: ', durable riches and righteousness.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'My fruit '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' better than gold, yea, than fine gold;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And my revenue than choice silver.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I lead in the way of righteousness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'In the midst of the paths of judgment:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: That I may cause those that love me to inherit substance;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And I will fill their treasures.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' possessed me in the beginning of his way,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Before his works of old.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: I was set up from everlasting, from the beginning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or ever the earth was.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'When '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there were
  - type: text
    text: ' no depths, I was brought forth;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'When '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there were
  - type: text
    text: ' no fountains abounding with water.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Before the mountains were settled,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Before the hills was I brought forth:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: While as yet he had not made the earth, nor the fields,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nor the highest part of the dust of the world.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'When he prepared the heavens, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' there:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'When he set a compass upon the face of the depth:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'When he established the clouds above:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'When he strengthened the fountains of the deep:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: When he gave to the sea his decree,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'That the waters should not pass his commandment:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'When he appointed the foundations of the earth:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Then I was by him, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' one brought up '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'with him:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And I was daily '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' delight,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Rejoicing always before him;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Rejoicing in the habitable part of his earth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And my delights '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with the sons of men.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Now therefore hearken unto me, O ye children:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are they that
  - type: text
    text: ' keep my ways.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Hear instruction, and be wise,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And refuse it not.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the man that heareth me,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Watching daily at my gates,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Waiting at the posts of my doors.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: For whoso findeth me findeth life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And shall obtain favour of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'But he that sinneth against me wrongeth his own soul:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: All they that hate me love death.
