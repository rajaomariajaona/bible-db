document_id: PRO.8,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Wisdom and Folly
  - type: text
    content: Doth not wisdom cry?
  - type: text
    content: And understanding put forth her voice?
  '10':
  - type: text
    content: Receive my instruction, and not silver;
  - type: text
    content: And knowledge rather than choice gold.
  '11':
  - type: text
    content: 'For wisdom '
  - type: text
    content: is
  - type: text
    content: ' better than rubies;'
  - type: text
    content: And all the things that may be desired are not to be compared to it.
  '12':
  - type: text
    content: I wisdom dwell with prudence,
  - type: text
    content: And find out knowledge of witty inventions.
  '13':
  - type: text
    content: 'The fear of the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' to hate evil:'
  - type: text
    content: Pride, and arrogancy, and the evil way,
  - type: text
    content: And the froward mouth, do I hate.
  '14':
  - type: text
    content: 'Counsel '
  - type: text
    content: is
  - type: text
    content: ' mine, and sound wisdom:'
  - type: text
    content: 'I '
  - type: text
    content: am
  - type: text
    content: ' understanding; I have strength.'
  '15':
  - type: text
    content: By me kings reign,
  - type: text
    content: And princes decree justice.
  '16':
  - type: text
    content: By me princes rule,
  - type: text
    content: 'And nobles, '
  - type: text
    content: even
  - type: text
    content: ' all the judges of the earth.'
  '17':
  - type: text
    content: I love them that love me;
  - type: text
    content: And those that seek me early shall find me.
  '18':
  - type: text
    content: 'Riches and honour '
  - type: text
    content: are
  - type: text
    content: ' with me;'
  - type: text
    content: Yea
  - type: text
    content: ', durable riches and righteousness.'
  '19':
  - type: text
    content: 'My fruit '
  - type: text
    content: is
  - type: text
    content: ' better than gold, yea, than fine gold;'
  - type: text
    content: And my revenue than choice silver.
  '2':
  - type: text
    content: She standeth in the top of high places, by the way
  - type: text
    content: In the places of the paths.
  '20':
  - type: text
    content: I lead in the way of righteousness,
  - type: text
    content: 'In the midst of the paths of judgment:'
  '21':
  - type: text
    content: That I may cause those that love me to inherit substance;
  - type: text
    content: And I will fill their treasures.
  '22':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' possessed me in the beginning of his way,'
  - type: text
    content: Before his works of old.
  '23':
  - type: text
    content: I was set up from everlasting, from the beginning,
  - type: text
    content: Or ever the earth was.
  '24':
  - type: text
    content: 'When '
  - type: text
    content: there were
  - type: text
    content: ' no depths, I was brought forth;'
  - type: text
    content: 'When '
  - type: text
    content: there were
  - type: text
    content: ' no fountains abounding with water.'
  '25':
  - type: text
    content: Before the mountains were settled,
  - type: text
    content: 'Before the hills was I brought forth:'
  '26':
  - type: text
    content: While as yet he had not made the earth, nor the fields,
  - type: text
    content: Nor the highest part of the dust of the world.
  '27':
  - type: text
    content: 'When he prepared the heavens, I '
  - type: text
    content: was
  - type: text
    content: ' there:'
  - type: text
    content: 'When he set a compass upon the face of the depth:'
  '28':
  - type: text
    content: 'When he established the clouds above:'
  - type: text
    content: 'When he strengthened the fountains of the deep:'
  '29':
  - type: text
    content: When he gave to the sea his decree,
  - type: text
    content: 'That the waters should not pass his commandment:'
  - type: text
    content: 'When he appointed the foundations of the earth:'
  '3':
  - type: text
    content: She crieth at the gates, at the entry of the city,
  - type: text
    content: At the coming in at the doors.
  '30':
  - type: text
    content: 'Then I was by him, '
  - type: text
    content: as
  - type: text
    content: ' one brought up '
  - type: text
    content: 'with him:'
  - type: text
    content: 'And I was daily '
  - type: text
    content: his
  - type: text
    content: ' delight,'
  - type: text
    content: Rejoicing always before him;
  '31':
  - type: text
    content: Rejoicing in the habitable part of his earth;
  - type: text
    content: 'And my delights '
  - type: text
    content: were
  - type: text
    content: ' with the sons of men.'
  '32':
  - type: text
    content: 'Now therefore hearken unto me, O ye children:'
  - type: text
    content: 'For blessed '
  - type: text
    content: are they that
  - type: text
    content: ' keep my ways.'
  '33':
  - type: text
    content: Hear instruction, and be wise,
  - type: text
    content: And refuse it not.
  '34':
  - type: text
    content: 'Blessed '
  - type: text
    content: is
  - type: text
    content: ' the man that heareth me,'
  - type: text
    content: Watching daily at my gates,
  - type: text
    content: Waiting at the posts of my doors.
  '35':
  - type: text
    content: For whoso findeth me findeth life,
  - type: text
    content: 'And shall obtain favour of the '
  - type: text
    content: LORD
  - type: text
    content: .
  '36':
  - type: text
    content: 'But he that sinneth against me wrongeth his own soul:'
  - type: text
    content: All they that hate me love death.
  '4':
  - type: text
    content: Unto you, O men, I call;
  - type: text
    content: 'And my voice '
  - type: text
    content: is
  - type: text
    content: ' to the sons of man.'
  '5':
  - type: text
    content: 'O ye simple, understand wisdom:'
  - type: text
    content: And, ye fools, be ye of an understanding heart.
  '6':
  - type: text
    content: Hear; for I will speak of excellent things;
  - type: text
    content: 'And the opening of my lips '
  - type: text
    content: shall be
  - type: text
    content: ' right things.'
  '7':
  - type: text
    content: For my mouth shall speak truth;
  - type: text
    content: 'And wickedness '
  - type: text
    content: is
  - type: text
    content: ' an abomination to my lips.'
  '8':
  - type: text
    content: 'All the words of my mouth '
  - type: text
    content: are
  - type: text
    content: ' in righteousness;'
  - type: text
    content: There is
  - type: text
    content: ' nothing froward or perverse in them.'
  '9':
  - type: text
    content: 'They '
  - type: text
    content: are
  - type: text
    content: ' all plain to him that understandeth,'
  - type: text
    content: And right to them that find knowledge.
