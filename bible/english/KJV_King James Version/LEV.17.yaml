document_id: LEV.17,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Law of Holiness
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And whatsoever man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there be
    - type: text
      text: ' of the house of Israel, or of the strangers that sojourn among you, that eateth any manner of blood; I will even set my face against that soul that eateth blood, and will cut him off from among his people. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For the life of the flesh '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the blood: and I have given it to you upon the altar to make an atonement for your souls: for it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the blood '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' maketh an atonement for the soul. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Therefore I said unto the children of Israel, No soul of you shall eat blood, neither shall any stranger that sojourneth among you eat blood. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And whatsoever man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there be
    - type: text
      text: ' of the children of Israel, or of the strangers that sojourn among you, which hunteth and catcheth any beast or fowl that may be eaten; he shall even pour out the blood thereof, and cover it with dust. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' the life of all flesh; the blood of it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' for the life thereof; therefore I said unto the children of Israel, Ye shall eat the blood of no manner of flesh: for the life of all flesh '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the blood thereof: whosoever eateth it shall be cut off. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And every soul that eateth that which died '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of itself
    - type: text
      text: ', or that which was torn '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with beasts, whether it be
    - type: text
      text: ' one of your own country, or a stranger, he shall both wash his clothes, and bathe '
    - type: usfm
      marker: add
      children:
      - type: text
        text: himself
    - type: text
      text: ' in water, and be unclean until the even: then shall he be clean. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'But if he wash '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' not, nor bathe his flesh; then he shall bear his iniquity.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Speak unto Aaron, and unto his sons, and unto all the children of Israel, and say unto them;
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Sacrifices
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the thing which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath commanded, saying, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'What man soever '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there be
    - type: text
      text: ' of the house of Israel, that killeth an ox, or lamb, or goat, in the camp, or that killeth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' out of the camp, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'and bringeth it not unto the door of the tabernacle of the congregation, to offer an offering unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' before the tabernacle of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; blood shall be imputed unto that man; he hath shed blood; and that man shall be cut off from among his people: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'to the end that the children of Israel may bring their sacrifices, which they offer in the open field, even that they may bring them unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', unto the door of the tabernacle of the congregation, unto the priest, and offer them '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' peace offerings unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And the priest shall sprinkle the blood upon the altar of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: at
    - type: text
      text: ' the door of the tabernacle of the congregation, and burn the fat for a sweet savour unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: And they shall no more offer their sacrifices unto devils, after whom they have gone a whoring. This shall be a statute for ever unto them throughout their generations.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And thou shalt say unto them, Whatsoever man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there be
    - type: text
      text: ' of the house of Israel, or of the strangers which sojourn among you, that offereth a burnt offering or sacrifice, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'and bringeth it not unto the door of the tabernacle of the congregation, to offer it unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ; even that man shall be cut off from among his people.
