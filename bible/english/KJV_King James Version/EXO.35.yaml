document_id: EXO.35,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Building of the Tabernacle
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And Moses gathered all the congregation of the children of Israel together, and said unto them, These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the words which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath commanded, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ye
    - type: text
      text: ' should do them. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And every wise hearted among you shall come, and make all that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath commanded; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'the tabernacle, his tent, and his covering, his taches, and his boards, his bars, his pillars, and his sockets, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'the ark, and the staves thereof, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' the mercy seat, and the vail of the covering, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'the table, and his staves, and all his vessels, and the shewbread, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'the candlestick also for the light, and his furniture, and his lamps, with the oil for the light, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'and the incense altar, and his staves, and the anointing oil, and the sweet incense, and the hanging for the door at the entering in of the tabernacle, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'the altar of burnt offering, with his brasen grate, his staves, and all his vessels, the laver and his foot, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'the hangings of the court, his pillars, and their sockets, and the hanging for the door of the court, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'the pins of the tabernacle, and the pins of the court, and their cords, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'the cloths of service, to do service in the holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: place
    - type: text
      text: ', the holy garments for Aaron the priest, and the garments of his sons, to minister in the priest''s office.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Six days shall work be done, but on the seventh day there shall be to you an holy day, a sabbath of rest to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': whosoever doeth work therein shall be put to death. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And all the congregation of the children of Israel departed from the presence of Moses. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And they came, every one whose heart stirred him up, and every one whom his spirit made willing, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' they brought the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '''s offering to the work of the tabernacle of the congregation, and for all his service, and for the holy garments. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And they came, both men and women, as many as were willing hearted, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' brought bracelets, and earrings, and rings, and tablets, all jewels of gold: and every man that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: offered
    - type: text
      text: ' an offering of gold unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And every man, with whom was found blue, and purple, and scarlet, and fine linen, and goats'' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: hair
    - type: text
      text: ', and red skins of rams, and badgers'' skins, brought '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Every one that did offer an offering of silver and brass brought the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '''s offering: and every man, with whom was found shittim wood for any work of the service, brought '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And all the women that were wise hearted did spin with their hands, and brought that which they had spun, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: both
    - type: text
      text: ' of blue, and of purple, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' of scarlet, and of fine linen. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And all the women whose heart stirred them up in wisdom spun goats'' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: hair
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And the rulers brought onyx stones, and stones to be set, for the ephod, and for the breastplate; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'and spice, and oil for the light, and for the anointing oil, and for the sweet incense. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'The children of Israel brought a willing offering unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', every man and woman, whose heart made them willing to bring for all manner of work, which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had commanded to be made by the hand of Moses.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ye shall kindle no fire throughout your habitations upon the sabbath day.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And Moses said unto the children of Israel, See, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath called by name Bezaleel the son of Uri, the son of Hur, of the tribe of Judah; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'and he hath filled him with the spirit of God, in wisdom, in understanding, and in knowledge, and in all manner of workmanship; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'and to devise curious works, to work in gold, and in silver, and in brass, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'and in the cutting of stones, to set '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ', and in carving of wood, to make any manner of cunning work. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'And he hath put in his heart that he may teach, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: both
    - type: text
      text: ' he, and Aholiab, the son of Ahisamach, of the tribe of Dan. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Them hath he filled with wisdom of heart, to work all manner of work, of the engraver, and of the cunning workman, and of the embroiderer, in blue, and in purple, in scarlet, and in fine linen, and of the weaver, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' of them that do any work, and of those that devise cunning work.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And Moses spake unto all the congregation of the children of Israel, saying, This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the thing which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commanded, saying, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Take ye from among you an offering unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': whosoever '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' of a willing heart, let him bring it, an offering of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; gold, and silver, and brass, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'and blue, and purple, and scarlet, and fine linen, and goats'' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: hair
    - type: text
      text: ', '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'and rams'' skins dyed red, and badgers'' skins, and shittim wood, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'and oil for the light, and spices for anointing oil, and for the sweet incense, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: and onyx stones, and stones to be set for the ephod, and for the breastplate.
