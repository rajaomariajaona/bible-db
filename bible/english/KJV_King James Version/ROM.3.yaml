document_id: ROM.3
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: They Are All Under Sin
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'What advantage then hath the Jew? or what profit '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is there
  - type: text
    text: ' of circumcision? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Much every way: chiefly, because that unto them were committed the oracles of God. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For what if some did not believe? shall their unbelief make the faith of God without effect? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'God forbid: yea, let God be true, but every man a liar; as it is written,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: That thou mightest be justified in thy sayings,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And mightest overcome when thou art judged.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But if our unrighteousness commend the righteousness of God, what shall we say? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' God unrighteous who taketh vengeance? (I speak as a man) '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'God forbid: for then how shall God judge the world? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For if the truth of God hath more abounded through my lie unto his glory; why yet am I also judged as a sinner? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: rather
  - type: text
    text: ', (as we be slanderously reported, and as some affirm that we say,) Let us do evil, that good may come? whose damnation is just.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'What then? are we better '
  - type: usfm
    marker: add
    children:
    - type: text
      text: than they
  - type: text
    text: '? No, in no wise: for we have before proved both Jews and Gentiles, that they are all under sin; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: as it is written,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'There is none righteous, no, not one:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: There is none that understandeth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: There is none that seeketh after God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: They are all gone out of the way, they are together become unprofitable;
- type: usfm
  marker: q1
  children:
  - type: text
    text: There is none that doeth good, no, not one.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Their throat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' an open sepulchre;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: With their tongues they have used deceit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The poison of asps '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' under their lips:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Whose mouth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' full of cursing and bitterness:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Their feet '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' swift to shed blood:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Destruction and misery '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' in their ways:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the way of peace have they not known:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: There is no fear of God before their eyes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now we know that what things soever the law saith, it saith to them who are under the law: that every mouth may be stopped, and all the world may become guilty before God. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Therefore by the deeds of the law there shall no flesh be justified in his sight: for by the law '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the knowledge of sin.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: God's Saving Gift
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But now the righteousness of God without the law is manifested, being witnessed by the law and the prophets; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'even the righteousness of God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which is
  - type: text
    text: ' by faith of Jesus Christ unto all and upon all them that believe: for there is no difference: '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'for all have sinned, and come short of the glory of God; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'being justified freely by his grace through the redemption that is in Christ Jesus: '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'whom God hath set forth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' a propitiation through faith in his blood, to declare his righteousness for the remission of sins that are past, through the forbearance of God; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'to declare, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I say
  - type: text
    text: ', at this time his righteousness: that he might be just, and the justifier of him which believeth in Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' boasting then? It is excluded. By what law? of works? Nay: but by the law of faith. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Therefore we conclude that a man is justified by faith without the deeds of the law. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is he
  - type: text
    text: ' the God of the Jews only? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is he
  - type: text
    text: ' not also of the Gentiles? Yes, of the Gentiles also: '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'seeing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' one God, which shall justify the circumcision by faith, and uncircumcision through faith. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Do we then make void the law through faith? God forbid: yea, we establish the law.'
