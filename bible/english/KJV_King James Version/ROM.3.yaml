document_id: ROM.3,1
type_code: eng
verses:
  '1':
  - type: heading
    content: They Are All Under Sin
  - type: text
    content: 'What advantage then hath the Jew? or what profit '
  - type: text
    content: is there
  - type: text
    content: ' of circumcision? '
  '10':
  - type: text
    content: as it is written,
  - type: text
    content: 'There is none righteous, no, not one:'
  '11':
  - type: text
    content: There is none that understandeth,
  - type: text
    content: There is none that seeketh after God.
  '12':
  - type: text
    content: They are all gone out of the way, they are together become unprofitable;
  - type: text
    content: There is none that doeth good, no, not one.
  '13':
  - type: text
    content: 'Their throat '
  - type: text
    content: is
  - type: text
    content: ' an open sepulchre;'
  - type: text
    content: With their tongues they have used deceit;
  - type: text
    content: 'The poison of asps '
  - type: text
    content: is
  - type: text
    content: ' under their lips:'
  '14':
  - type: text
    content: 'Whose mouth '
  - type: text
    content: is
  - type: text
    content: ' full of cursing and bitterness:'
  '15':
  - type: text
    content: 'Their feet '
  - type: text
    content: are
  - type: text
    content: ' swift to shed blood:'
  '16':
  - type: text
    content: 'Destruction and misery '
  - type: text
    content: are
  - type: text
    content: ' in their ways:'
  '17':
  - type: text
    content: 'And the way of peace have they not known:'
  '18':
  - type: text
    content: There is no fear of God before their eyes.
  '19':
  - type: text
    content: 'Now we know that what things soever the law saith, it saith to them who are under the law: that every mouth may be stopped, and all the world may become guilty before God. '
  '2':
  - type: text
    content: 'Much every way: chiefly, because that unto them were committed the oracles of God. '
  '20':
  - type: text
    content: 'Therefore by the deeds of the law there shall no flesh be justified in his sight: for by the law '
  - type: text
    content: is
  - type: text
    content: ' the knowledge of sin.'
  - type: heading
    content: God's Saving Gift
  '21':
  - type: text
    content: 'But now the righteousness of God without the law is manifested, being witnessed by the law and the prophets; '
  '22':
  - type: text
    content: 'even the righteousness of God '
  - type: text
    content: which is
  - type: text
    content: ' by faith of Jesus Christ unto all and upon all them that believe: for there is no difference: '
  '23':
  - type: text
    content: 'for all have sinned, and come short of the glory of God; '
  '24':
  - type: text
    content: 'being justified freely by his grace through the redemption that is in Christ Jesus: '
  '25':
  - type: text
    content: 'whom God hath set forth '
  - type: text
    content: to be
  - type: text
    content: ' a propitiation through faith in his blood, to declare his righteousness for the remission of sins that are past, through the forbearance of God; '
  '26':
  - type: text
    content: 'to declare, '
  - type: text
    content: I say
  - type: text
    content: ', at this time his righteousness: that he might be just, and the justifier of him which believeth in Jesus.'
  '27':
  - type: text
    content: 'Where '
  - type: text
    content: is
  - type: text
    content: ' boasting then? It is excluded. By what law? of works? Nay: but by the law of faith. '
  '28':
  - type: text
    content: 'Therefore we conclude that a man is justified by faith without the deeds of the law. '
  '29':
  - type: text
    content: Is he
  - type: text
    content: ' the God of the Jews only? '
  - type: text
    content: is he
  - type: text
    content: ' not also of the Gentiles? Yes, of the Gentiles also: '
  '3':
  - type: text
    content: 'For what if some did not believe? shall their unbelief make the faith of God without effect? '
  '30':
  - type: text
    content: 'seeing '
  - type: text
    content: it is
  - type: text
    content: ' one God, which shall justify the circumcision by faith, and uncircumcision through faith. '
  '31':
  - type: text
    content: 'Do we then make void the law through faith? God forbid: yea, we establish the law.'
  '4':
  - type: text
    content: 'God forbid: yea, let God be true, but every man a liar; as it is written,'
  - type: text
    content: That thou mightest be justified in thy sayings,
  - type: text
    content: And mightest overcome when thou art judged.
  '5':
  - type: text
    content: 'But if our unrighteousness commend the righteousness of God, what shall we say? '
  - type: text
    content: Is
  - type: text
    content: ' God unrighteous who taketh vengeance? (I speak as a man) '
  '6':
  - type: text
    content: 'God forbid: for then how shall God judge the world? '
  '7':
  - type: text
    content: 'For if the truth of God hath more abounded through my lie unto his glory; why yet am I also judged as a sinner? '
  '8':
  - type: text
    content: 'And not '
  - type: text
    content: rather
  - type: text
    content: ', (as we be slanderously reported, and as some affirm that we say,) Let us do evil, that good may come? whose damnation is just.'
  '9':
  - type: text
    content: 'What then? are we better '
  - type: text
    content: than they
  - type: text
    content: '? No, in no wise: for we have before proved both Jews and Gentiles, that they are all under sin; '
