document_id: HEB.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'For every high priest taken from among men is ordained for men in things '
  - type: usfm
    marker: add
    children:
    - type: text
      text: pertaining
  - type: text
    text: ' to God, that he may offer both gifts and sacrifices for sins: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'who can have compassion on the ignorant, and on them that are out of the way; for that he himself also is compassed with infirmity. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And by reason hereof he ought, as for the people, so also for himself, to offer for sins. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And no man taketh this honour unto himself, but he that is called of God, as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Aaron. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: So also Christ glorified not himself to be made an high priest; but he that said unto him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Thou art my Son,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To day have I begotten thee.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'As he saith also in another '
  - type: usfm
    marker: add
    children:
    - type: text
      text: place
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' a priest for ever'
- type: usfm
  marker: q1
  children:
  - type: text
    text: After the order of Melchisedec.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Who in the days of his flesh, when he had offered up prayers and supplications with strong crying and tears unto him that was able to save him from death, and was heard in that he feared; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'though he were a Son, yet learned he obedience by the things which he suffered; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and being made perfect, he became the author of eternal salvation unto all them that obey him; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: called of God an high priest after the order of Melchisedec.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Of whom we have many things to say, and hard to be uttered, seeing ye are dull of hearing. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For when for the time ye ought to be teachers, ye have need that one teach you again which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' the first principles of the oracles of God; and are become such as have need of milk, and not of strong meat. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For every one that useth milk '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' unskilful in the word of righteousness: for he is a babe. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But strong meat belongeth to them that are of full age, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' those who by reason of use have their senses exercised to discern both good and evil.'
