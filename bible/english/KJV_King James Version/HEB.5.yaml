document_id: HEB.5,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'For every high priest taken from among men is ordained for men in things '
  - type: text
    content: pertaining
  - type: text
    content: ' to God, that he may offer both gifts and sacrifices for sins: '
  '10':
  - type: text
    content: called of God an high priest after the order of Melchisedec.
  '11':
  - type: text
    content: 'Of whom we have many things to say, and hard to be uttered, seeing ye are dull of hearing. '
  '12':
  - type: text
    content: 'For when for the time ye ought to be teachers, ye have need that one teach you again which '
  - type: text
    content: be
  - type: text
    content: ' the first principles of the oracles of God; and are become such as have need of milk, and not of strong meat. '
  '13':
  - type: text
    content: 'For every one that useth milk '
  - type: text
    content: is
  - type: text
    content: ' unskilful in the word of righteousness: for he is a babe. '
  '14':
  - type: text
    content: 'But strong meat belongeth to them that are of full age, '
  - type: text
    content: even
  - type: text
    content: ' those who by reason of use have their senses exercised to discern both good and evil.'
  '2':
  - type: text
    content: 'who can have compassion on the ignorant, and on them that are out of the way; for that he himself also is compassed with infirmity. '
  '3':
  - type: text
    content: 'And by reason hereof he ought, as for the people, so also for himself, to offer for sins. '
  '4':
  - type: text
    content: 'And no man taketh this honour unto himself, but he that is called of God, as '
  - type: text
    content: was
  - type: text
    content: ' Aaron. '
  '5':
  - type: text
    content: So also Christ glorified not himself to be made an high priest; but he that said unto him,
  - type: text
    content: Thou art my Son,
  - type: text
    content: To day have I begotten thee.
  '6':
  - type: text
    content: 'As he saith also in another '
  - type: text
    content: place
  - type: text
    content: ','
  - type: text
    content: 'Thou '
  - type: text
    content: art
  - type: text
    content: ' a priest for ever'
  - type: text
    content: After the order of Melchisedec.
  '7':
  - type: text
    content: 'Who in the days of his flesh, when he had offered up prayers and supplications with strong crying and tears unto him that was able to save him from death, and was heard in that he feared; '
  '8':
  - type: text
    content: 'though he were a Son, yet learned he obedience by the things which he suffered; '
  '9':
  - type: text
    content: 'and being made perfect, he became the author of eternal salvation unto all them that obey him; '
