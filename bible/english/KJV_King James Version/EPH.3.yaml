document_id: EPH.3
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Apostle of this Gospel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'For this cause I Paul, the prisoner of Jesus Christ for you Gentiles, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'if ye have heard of the dispensation of the grace of God which is given me to you-ward: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'how that by revelation he made known unto me the mystery; (as I wrote afore in few words, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'whereby, when ye read, ye may understand my knowledge in the mystery of Christ) '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'which in other ages was not made known unto the sons of men, as it is now revealed unto his holy apostles and prophets by the Spirit; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'that the Gentiles should be fellowheirs, and of the same body, and partakers of his promise in Christ by the gospel: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'whereof I was made a minister, according to the gift of the grace of God given unto me by the effectual working of his power. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Unto me, who am less than the least of all saints, is this grace given, that I should preach among the Gentiles the unsearchable riches of Christ; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and to make all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' see what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the fellowship of the mystery, which from the beginning of the world hath been hid in God, who created all things by Jesus Christ: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'to the intent that now unto the principalities and powers in heavenly '
  - type: usfm
    marker: add
    children:
    - type: text
      text: places
  - type: text
    text: ' might be known by the church the manifold wisdom of God, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'according to the eternal purpose which he purposed in Christ Jesus our Lord: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'in whom we have boldness and access with confidence by the faith of him. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Wherefore I desire that ye faint not at my tribulations for you, which is your glory.
- type: usfm
  marker: s2
  children:
  - type: text
    text: His Prayer and Appeal
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For this cause I bow my knees unto the Father of our Lord Jesus Christ, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'of whom the whole family in heaven and earth is named, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'that he would grant you, according to the riches of his glory, to be strengthened with might by his Spirit in the inner man; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'that Christ may dwell in your hearts by faith; that ye, being rooted and grounded in love, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'may be able to comprehend with all saints what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the breadth, and length, and depth, and height; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and to know the love of Christ, which passeth knowledge, that ye might be filled with all the fulness of God. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Now unto him that is able to do exceeding abundantly above all that we ask or think, according to the power that worketh in us, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'unto him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' glory in the church by Christ Jesus throughout all ages, world without end. Amen.'
