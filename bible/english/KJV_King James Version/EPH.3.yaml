document_id: EPH.3,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Apostle of this Gospel
  - type: text
    content: 'For this cause I Paul, the prisoner of Jesus Christ for you Gentiles, '
  '10':
  - type: text
    content: 'to the intent that now unto the principalities and powers in heavenly '
  - type: text
    content: places
  - type: text
    content: ' might be known by the church the manifold wisdom of God, '
  '11':
  - type: text
    content: 'according to the eternal purpose which he purposed in Christ Jesus our Lord: '
  '12':
  - type: text
    content: 'in whom we have boldness and access with confidence by the faith of him. '
  '13':
  - type: text
    content: Wherefore I desire that ye faint not at my tribulations for you, which is your glory.
  - type: heading
    content: His Prayer and Appeal
  '14':
  - type: text
    content: 'For this cause I bow my knees unto the Father of our Lord Jesus Christ, '
  '15':
  - type: text
    content: 'of whom the whole family in heaven and earth is named, '
  '16':
  - type: text
    content: 'that he would grant you, according to the riches of his glory, to be strengthened with might by his Spirit in the inner man; '
  '17':
  - type: text
    content: 'that Christ may dwell in your hearts by faith; that ye, being rooted and grounded in love, '
  '18':
  - type: text
    content: 'may be able to comprehend with all saints what '
  - type: text
    content: is
  - type: text
    content: ' the breadth, and length, and depth, and height; '
  '19':
  - type: text
    content: 'and to know the love of Christ, which passeth knowledge, that ye might be filled with all the fulness of God. '
  '2':
  - type: text
    content: 'if ye have heard of the dispensation of the grace of God which is given me to you-ward: '
  '20':
  - type: text
    content: 'Now unto him that is able to do exceeding abundantly above all that we ask or think, according to the power that worketh in us, '
  '21':
  - type: text
    content: 'unto him '
  - type: text
    content: be
  - type: text
    content: ' glory in the church by Christ Jesus throughout all ages, world without end. Amen.'
  '3':
  - type: text
    content: 'how that by revelation he made known unto me the mystery; (as I wrote afore in few words, '
  '4':
  - type: text
    content: 'whereby, when ye read, ye may understand my knowledge in the mystery of Christ) '
  '5':
  - type: text
    content: 'which in other ages was not made known unto the sons of men, as it is now revealed unto his holy apostles and prophets by the Spirit; '
  '6':
  - type: text
    content: 'that the Gentiles should be fellowheirs, and of the same body, and partakers of his promise in Christ by the gospel: '
  '7':
  - type: text
    content: 'whereof I was made a minister, according to the gift of the grace of God given unto me by the effectual working of his power. '
  '8':
  - type: text
    content: 'Unto me, who am less than the least of all saints, is this grace given, that I should preach among the Gentiles the unsearchable riches of Christ; '
  '9':
  - type: text
    content: 'and to make all '
  - type: text
    content: men
  - type: text
    content: ' see what '
  - type: text
    content: is
  - type: text
    content: ' the fellowship of the mystery, which from the beginning of the world hath been hid in God, who created all things by Jesus Christ: '
