document_id: JOS.13,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Division of the Land
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Joshua was old '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' stricken in years; and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto him, Thou art old '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' stricken in years, and there remaineth yet very much land to be possessed. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and all the cities of Sihon king of the Amorites, which reigned in Heshbon, unto the border of the children of Ammon; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Gilead, and the border of the Geshurites and Maachathites, and all mount Hermon, and all Bashan unto Salcah; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'all the kingdom of Og in Bashan, which reigned in Ashtaroth and in Edrei, who remained of the remnant of the giants: for these did Moses smite, and cast them out. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nevertheless the children of Israel expelled not the Geshurites, nor the Maachathites: but the Geshurites and the Maachathites dwell among the Israelites until this day. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Only unto the tribe of Levi he gave none inheritance; the sacrifices of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel made by fire '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' their inheritance, as he said unto them.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: In the East
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses gave unto the tribe of the children of Reuben '
    - type: usfm
      marker: add
      children:
      - type: text
        text: inheritance
    - type: text
      text: ' according to their families. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And their coast was from Aroer, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' on the bank of the river Arnon, and the city that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the midst of the river, and all the plain by Medeba; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Heshbon, and all her cities that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in the plain; Dibon, and Bamoth-baal, and Beth-baal-meon, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Jahaza, and Kedemoth, and Mephaath, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Kirjathaim, and Sibmah, and Zareth-shahar in the mount of the valley, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the land that yet remaineth: all the borders of the Philistines, and all Geshuri, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Beth-peor, and Ashdoth-pisgah, and Beth-jeshimoth, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and all the cities of the plain, and all the kingdom of Sihon king of the Amorites, which reigned in Heshbon, whom Moses smote with the princes of Midian, Evi, and Rekem, and Zur, and Hur, and Reba, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which were
    - type: text
      text: ' dukes of Sihon, dwelling in the country. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Balaam also the son of Beor, the soothsayer, did the children of Israel slay with the sword among them that were slain by them. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the border of the children of Reuben was Jordan, and the border '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thereof
    - type: text
      text: '. This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the inheritance of the children of Reuben after their families, the cities and the villages thereof.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses gave '
    - type: usfm
      marker: add
      children:
      - type: text
        text: inheritance
    - type: text
      text: ' unto the tribe of Gad, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' unto the children of Gad according to their families. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And their coast was Jazer, and all the cities of Gilead, and half the land of the children of Ammon, unto Aroer that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' before Rabbah; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and from Heshbon unto Ramath-mizpeh, and Betonim; and from Mahanaim unto the border of Debir; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and in the valley, Beth-aram, and Beth-nimrah, and Succoth, and Zaphon, the rest of the kingdom of Sihon king of Heshbon, Jordan and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' border, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' unto the edge of the sea of Chinnereth on the other side Jordan eastward. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the inheritance of the children of Gad after their families, the cities, and their villages.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses gave '
    - type: usfm
      marker: add
      children:
      - type: text
        text: inheritance
    - type: text
      text: ' unto the half tribe of Manasseh: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ' was '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the possession
    - type: text
      text: ' of the half tribe of the children of Manasseh by their families. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from Sihor, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' before Egypt, even unto the borders of Ekron northward, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' is counted to the Canaanite: five lords of the Philistines; the Gazathites, and the Ashdothites, the Eshkalonites, the Gittites, and the Ekronites; also the Avites: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And their coast was from Mahanaim, all Bashan, all the kingdom of Og king of Bashan, and all the towns of Jair, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in Bashan, threescore cities: '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and half Gilead, and Ashtaroth, and Edrei, cities of the kingdom of Og in Bashan, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were pertaining
    - type: text
      text: ' unto the children of Machir the son of Manasseh, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' to the one half of the children of Machir by their families.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are the countries
    - type: text
      text: ' which Moses did distribute for inheritance in the plains of Moab, on the other side Jordan, by Jericho, eastward. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But unto the tribe of Levi Moses gave not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' inheritance: the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' their inheritance, as he said unto them.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from the south, all the land of the Canaanites, and Mearah that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' beside the Sidonians, unto Aphek, to the borders of the Amorites: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the land of the Giblites, and all Lebanon, toward the sunrising, from Baal-gad under mount Hermon unto the entering into Hamath. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the inhabitants of the hill country from Lebanon unto Misrephoth-maim, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' all the Sidonians, them will I drive out from before the children of Israel: only divide thou it by lot unto the Israelites for an inheritance, as I have commanded thee. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore divide this land for an inheritance unto the nine tribes, and the half tribe of Manasseh, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'with whom the Reubenites and the Gadites have received their inheritance, which Moses gave them, beyond Jordan eastward, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' as Moses the servant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' gave them; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from Aroer, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' upon the bank of the river Arnon, and the city that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the midst of the river, and all the plain of Medeba unto Dibon; '
