    children:
    - type: text
      text: '1'
  - type: text
    text: 'Wine '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a mocker, strong drink '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' raging:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And whosoever is deceived thereby is not wise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The fear of a king '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' as the roaring of a lion:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Whoso
  - type: text
    text: ' provoketh him to anger sinneth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: against
  - type: text
    text: ' his own soul.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' an honour for a man to cease from strife:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But every fool will be meddling.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The sluggard will not plow by reason of the cold;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Therefore
  - type: text
    text: ' shall he beg in harvest, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: have
  - type: text
    text: ' nothing.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Counsel in the heart of man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is like
  - type: text
    text: ' deep water;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But a man of understanding will draw it out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Most men will proclaim every one his own goodness:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But a faithful man who can find?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The just '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' walketh in his integrity:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'His children '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' blessed after him.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: A king that sitteth in the throne of judgment
- type: usfm
  marker: q2
  children:
  - type: text
    text: Scattereth away all evil with his eyes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Who can say, I have made my heart clean,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am pure from my sin?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Divers weights, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' divers measures,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Both of them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' alike abomination to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Even a child is known by his doings,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Whether his work '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' pure, and whether '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it be
  - type: text
    text: ' right.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The hearing ear, and the seeing eye,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath made even both of them.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Love not sleep, lest thou come to poverty;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Open thine eyes, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' thou shalt be satisfied with bread.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' naught, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' naught, saith the buyer:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But when he is gone his way, then he boasteth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'There is gold, and a multitude of rubies:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But the lips of knowledge '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' a precious jewel.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Take his garment that is surety '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' a stranger:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And take a pledge of him for a strange woman.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Bread of deceit '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' sweet to a man;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But afterwards his mouth shall be filled with gravel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Every
  - type: text
    text: ' purpose is established by counsel:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And with good advice make war.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'He that goeth about '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' a talebearer revealeth secrets:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Therefore meddle not with him that flattereth with his lips.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Whoso curseth his father or his mother,
- type: usfm
  marker: q2
  children:
  - type: text
    text: His lamp shall be put out in obscure darkness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'An inheritance '
  - type: usfm
    marker: add
    children:
    - type: text
      text: may be
  - type: text
    text: ' gotten hastily at the beginning;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the end thereof shall not be blessed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Say not thou, I will recompense evil;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: But
  - type: text
    text: ' wait on the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and he shall save thee.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Divers weights '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' an abomination unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And a false balance '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not good.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Man''s goings '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: How can a man then understand his own way?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' a snare to the man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: who
  - type: text
    text: ' devoureth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which is
  - type: text
    text: ' holy,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And after vows to make enquiry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: A wise king scattereth the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And bringeth the wheel over them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The spirit of man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the candle of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: Searching all the inward parts of the belly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Mercy and truth preserve the king:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And his throne is upholden by mercy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'The glory of young men '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' their strength:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the beauty of old men '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the grey head.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The blueness of a wound cleanseth away evil:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'So '
  - type: usfm
    marker: add
    children:
    - type: text
      text: do
  - type: text
    text: ' stripes the inward parts of the belly.'
