document_id: JHN.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In the beginning was the Word, and the Word was with God, and the Word was God. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'He was in the world, and the world was made by him, and the world knew him not. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'He came unto his own, and his own received him not. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'But as many as received him, to them gave he power to become the sons of God, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' to them that believe on his name: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'which were born, not of blood, nor of the will of the flesh, nor of the will of man, but of God. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: And the Word was made flesh, and dwelt among us, (and we beheld his glory, the glory as of the only begotten of the Father,) full of grace and truth.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: John the Baptist's Testimony
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'John bare witness of him, and cried, saying, This was he of whom I spake, He that cometh after me is preferred before me: for he was before me. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And of his fulness have all we received, and grace for grace. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For the law was given by Moses, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' grace and truth came by Jesus Christ. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'No man hath seen God at any time; the only begotten Son, which is in the bosom of the Father, he hath declared '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And this is the record of John, when the Jews sent priests and Levites from Jerusalem to ask him, Who art thou? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The same was in the beginning with God. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And he confessed, and denied not; but confessed, I am not the Christ. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And they asked him, What then? Art thou Elias? And he saith, I am not. Art thou that prophet? And he answered, No. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Then said they unto him, Who art thou? that we may give an answer to them that sent us. What sayest thou of thyself? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'He said, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the voice of one crying in the wilderness, Make straight the way of the Lord, as said the prophet Esaias.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And they which were sent were of the Pharisees. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And they asked him, and said unto him, Why baptizest thou then, if thou be not that Christ, nor Elias, neither that prophet? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'John answered them, saying, I baptize with water: but there standeth one among you, whom ye know not; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'he it is, who coming after me is preferred before me, whose shoe''s latchet I am not worthy to unloose. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: These things were done in Bethabara beyond Jordan, where John was baptizing.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Behold the Lamb of God
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'The next day John seeth Jesus coming unto him, and saith, Behold the Lamb of God, which taketh away the sin of the world. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'All things were made by him; and without him was not any thing made that was made. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'This is he of whom I said, After me cometh a man which is preferred before me: for he was before me. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And I knew him not: but that he should be made manifest to Israel, therefore am I come baptizing with water. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And John bare record, saying, I saw the Spirit descending from heaven like a dove, and it abode upon him. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And I knew him not: but he that sent me to baptize with water, the same said unto me, Upon whom thou shalt see the Spirit descending, and remaining on him, the same is he which baptizeth with the Holy Ghost. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: And I saw, and bare record that this is the Son of God.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: His First Disciples
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Again the next day after John stood, and two of his disciples; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'and looking upon Jesus as he walked, he saith, Behold the Lamb of God! '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'And the two disciples heard him speak, and they followed Jesus. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Then Jesus turned, and saw them following, and saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: What seek ye?
    - type: text
      text: ' They said unto him, Rabbi, (which is to say, being interpreted, Master,) where dwellest thou? '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'He saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Come and see.
    - type: text
      text: ' They came and saw where he dwelt, and abode with him that day: for it was about the tenth hour. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'In him was life; and the life was the light of men. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'One of the two which heard John '
    - type: usfm
      marker: add
      children:
      - type: text
        text: speak
    - type: text
      text: ', and followed him, was Andrew, Simon Peter''s brother. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'He first findeth his own brother Simon, and saith unto him, We have found the Messias, which is, being interpreted, the Christ. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'And he brought him to Jesus. And when Jesus beheld him, he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Thou art Simon the son of Jona: thou shalt be called Cephas,'
    - type: text
      text: ' which is by interpretation, A stone.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'The day following Jesus would go forth into Galilee, and findeth Philip, and saith unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Follow me.
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Now Philip was of Bethsaida, the city of Andrew and Peter.
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Philip findeth Nathanael, and saith unto him, We have found him, of whom Moses in the law, and the prophets, did write, Jesus of Nazareth, the son of Joseph. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'And Nathanael said unto him, Can there any good thing come out of Nazareth? Philip saith unto him, Come and see. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Jesus saw Nathanael coming to him, and saith of him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Behold an Israelite indeed, in whom is no guile!
    - type: text
      text: ' '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Nathanael saith unto him, Whence knowest thou me? Jesus answered and said unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Before that Philip called thee, when thou wast under the fig tree, I saw thee.
    - type: text
      text: ' '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Nathanael answered and saith unto him, Rabbi, thou art the Son of God; thou art the King of Israel.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: And the light shineth in darkness; and the darkness comprehended it not.
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Jesus answered and said unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Because I said unto thee, I saw thee under the fig tree, believest thou? thou shalt see greater things than these.
    - type: text
      text: ' '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'And he saith unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Verily, verily, I say unto you, Hereafter ye shall see heaven open, and the angels of God ascending and descending upon the Son of man.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'There was a man sent from God, whose name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' John. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The same came for a witness, to bear witness of the Light, that all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' through him might believe. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'He was not that Light, but '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was sent
    - type: text
      text: ' to bear witness of that Light. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: add
      children:
      - type: text
        text: That
    - type: text
      text: ' was the true Light, which lighteth every man that cometh into the world. '
