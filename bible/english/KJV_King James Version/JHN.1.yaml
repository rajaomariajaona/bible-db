document_id: JHN.1,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'In the beginning was the Word, and the Word was with God, and the Word was God. '
  '10':
  - type: text
    content: 'He was in the world, and the world was made by him, and the world knew him not. '
  '11':
  - type: text
    content: 'He came unto his own, and his own received him not. '
  '12':
  - type: text
    content: 'But as many as received him, to them gave he power to become the sons of God, '
  - type: text
    content: even
  - type: text
    content: ' to them that believe on his name: '
  '13':
  - type: text
    content: 'which were born, not of blood, nor of the will of the flesh, nor of the will of man, but of God. '
  '14':
  - type: text
    content: And the Word was made flesh, and dwelt among us, (and we beheld his glory, the glory as of the only begotten of the Father,) full of grace and truth.
  - type: heading
    content: John the Baptist's Testimony
  '15':
  - type: text
    content: 'John bare witness of him, and cried, saying, This was he of whom I spake, He that cometh after me is preferred before me: for he was before me. '
  '16':
  - type: text
    content: 'And of his fulness have all we received, and grace for grace. '
  '17':
  - type: text
    content: 'For the law was given by Moses, '
  - type: text
    content: but
  - type: text
    content: ' grace and truth came by Jesus Christ. '
  '18':
  - type: text
    content: 'No man hath seen God at any time; the only begotten Son, which is in the bosom of the Father, he hath declared '
  - type: text
    content: him
  - type: text
    content: .
  '19':
  - type: text
    content: 'And this is the record of John, when the Jews sent priests and Levites from Jerusalem to ask him, Who art thou? '
  '2':
  - type: text
    content: 'The same was in the beginning with God. '
  '20':
  - type: text
    content: 'And he confessed, and denied not; but confessed, I am not the Christ. '
  '21':
  - type: text
    content: 'And they asked him, What then? Art thou Elias? And he saith, I am not. Art thou that prophet? And he answered, No. '
  '22':
  - type: text
    content: 'Then said they unto him, Who art thou? that we may give an answer to them that sent us. What sayest thou of thyself? '
  '23':
  - type: text
    content: 'He said, I '
  - type: text
    content: am
  - type: text
    content: ' the voice of one crying in the wilderness, Make straight the way of the Lord, as said the prophet Esaias.'
  '24':
  - type: text
    content: 'And they which were sent were of the Pharisees. '
  '25':
  - type: text
    content: 'And they asked him, and said unto him, Why baptizest thou then, if thou be not that Christ, nor Elias, neither that prophet? '
  '26':
  - type: text
    content: 'John answered them, saying, I baptize with water: but there standeth one among you, whom ye know not; '
  '27':
  - type: text
    content: 'he it is, who coming after me is preferred before me, whose shoe''s latchet I am not worthy to unloose. '
  '28':
  - type: text
    content: These things were done in Bethabara beyond Jordan, where John was baptizing.
  - type: heading
    content: Behold the Lamb of God
  '29':
  - type: text
    content: 'The next day John seeth Jesus coming unto him, and saith, Behold the Lamb of God, which taketh away the sin of the world. '
  '3':
  - type: text
    content: 'All things were made by him; and without him was not any thing made that was made. '
  '30':
  - type: text
    content: 'This is he of whom I said, After me cometh a man which is preferred before me: for he was before me. '
  '31':
  - type: text
    content: 'And I knew him not: but that he should be made manifest to Israel, therefore am I come baptizing with water. '
  '32':
  - type: text
    content: 'And John bare record, saying, I saw the Spirit descending from heaven like a dove, and it abode upon him. '
  '33':
  - type: text
    content: 'And I knew him not: but he that sent me to baptize with water, the same said unto me, Upon whom thou shalt see the Spirit descending, and remaining on him, the same is he which baptizeth with the Holy Ghost. '
  '34':
  - type: text
    content: And I saw, and bare record that this is the Son of God.
  - type: heading
    content: His First Disciples
  '35':
  - type: text
    content: 'Again the next day after John stood, and two of his disciples; '
  '36':
  - type: text
    content: 'and looking upon Jesus as he walked, he saith, Behold the Lamb of God! '
  '37':
  - type: text
    content: 'And the two disciples heard him speak, and they followed Jesus. '
  '38':
  - type: text
    content: 'Then Jesus turned, and saw them following, and saith unto them, '
  - type: text
    content: What seek ye?
  - type: text
    content: ' They said unto him, Rabbi, (which is to say, being interpreted, Master,) where dwellest thou? '
  '39':
  - type: text
    content: 'He saith unto them, '
  - type: text
    content: Come and see.
  - type: text
    content: ' They came and saw where he dwelt, and abode with him that day: for it was about the tenth hour. '
  '4':
  - type: text
    content: 'In him was life; and the life was the light of men. '
  '40':
  - type: text
    content: 'One of the two which heard John '
  - type: text
    content: speak
  - type: text
    content: ', and followed him, was Andrew, Simon Peter''s brother. '
  '41':
  - type: text
    content: 'He first findeth his own brother Simon, and saith unto him, We have found the Messias, which is, being interpreted, the Christ. '
  '42':
  - type: text
    content: 'And he brought him to Jesus. And when Jesus beheld him, he said, '
  - type: text
    content: 'Thou art Simon the son of Jona: thou shalt be called Cephas,'
  - type: text
    content: ' which is by interpretation, A stone.'
  '43':
  - type: text
    content: 'The day following Jesus would go forth into Galilee, and findeth Philip, and saith unto him, '
  - type: text
    content: Follow me.
  - type: text
    content: ' '
  '44':
  - type: text
    content: Now Philip was of Bethsaida, the city of Andrew and Peter.
  '45':
  - type: text
    content: 'Philip findeth Nathanael, and saith unto him, We have found him, of whom Moses in the law, and the prophets, did write, Jesus of Nazareth, the son of Joseph. '
  '46':
  - type: text
    content: 'And Nathanael said unto him, Can there any good thing come out of Nazareth? Philip saith unto him, Come and see. '
  '47':
  - type: text
    content: 'Jesus saw Nathanael coming to him, and saith of him, '
  - type: text
    content: Behold an Israelite indeed, in whom is no guile!
  - type: text
    content: ' '
  '48':
  - type: text
    content: 'Nathanael saith unto him, Whence knowest thou me? Jesus answered and said unto him, '
  - type: text
    content: Before that Philip called thee, when thou wast under the fig tree, I saw thee.
  - type: text
    content: ' '
  '49':
  - type: text
    content: Nathanael answered and saith unto him, Rabbi, thou art the Son of God; thou art the King of Israel.
  '5':
  - type: text
    content: And the light shineth in darkness; and the darkness comprehended it not.
  '50':
  - type: text
    content: 'Jesus answered and said unto him, '
  - type: text
    content: Because I said unto thee, I saw thee under the fig tree, believest thou? thou shalt see greater things than these.
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'And he saith unto him, '
  - type: text
    content: Verily, verily, I say unto you, Hereafter ye shall see heaven open, and the angels of God ascending and descending upon the Son of man.
  '6':
  - type: text
    content: 'There was a man sent from God, whose name '
  - type: text
    content: was
  - type: text
    content: ' John. '
  '7':
  - type: text
    content: 'The same came for a witness, to bear witness of the Light, that all '
  - type: text
    content: men
  - type: text
    content: ' through him might believe. '
  '8':
  - type: text
    content: 'He was not that Light, but '
  - type: text
    content: was sent
  - type: text
    content: ' to bear witness of that Light. '
  '9':
  - type: text
    content: That
  - type: text
    content: ' was the true Light, which lighteth every man that cometh into the world. '
