document_id: MAT.11,1
type_code: eng
verses:
  '1':
  - type: text
    content: And it came to pass, when Jesus had made an end of commanding his twelve disciples, he departed thence to teach and to preach in their cities.
  - type: heading
    content: Jesus and the Baptist
  '10':
  - type: text
    content: 'For this is '
  - type: text
    content: he
  - type: text
    content: ', of whom it is written,'
  - type: text
    content: Behold, I send my messenger before thy face,
  - type: text
    content: Which shall prepare thy way before thee.
  '11':
  - type: text
    content: ' '
  - type: text
    content: 'Verily I say unto you, Among them that are born of women there hath not risen a greater than John the Baptist: notwithstanding he that is least in the kingdom of heaven is greater than he.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: And from the days of John the Baptist until now the kingdom of heaven suffereth violence, and the violent take it by force.
  - type: text
    content: ' '
  '13':
  - type: text
    content: For all the prophets and the law prophesied until John.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'And if ye will receive '
  - type: text
    content: it
  - type: text
    content: ', this is Elias, which was for to come.'
  - type: text
    content: ' '
  '15':
  - type: text
    content: He that hath ears to hear, let him hear.
  '16':
  - type: text
    content: ' '
  - type: text
    content: But whereunto shall I liken this generation? It is like unto children sitting in the markets, and calling unto their fellows,
  - type: text
    content: ' '
  '17':
  - type: text
    content: and saying, We have piped unto you, and ye have not danced; we have mourned unto you, and ye have not lamented.
  - type: text
    content: ' '
  '18':
  - type: text
    content: For John came neither eating nor drinking, and they say, He hath a devil.
  - type: text
    content: ' '
  '19':
  - type: text
    content: The Son of man came eating and drinking, and they say, Behold a man gluttonous, and a winebibber, a friend of publicans and sinners. But wisdom is justified of her children.
  - type: heading
    content: Jesus and His Opponents
  '2':
  - type: text
    content: 'Now when John had heard in the prison the works of Christ, he sent two of his disciples, '
  '20':
  - type: text
    content: 'Then began he to upbraid the cities wherein most of his mighty works were done, because they repented not: '
  '21':
  - type: text
    content: Woe unto thee, Chorazin! woe unto thee, Bethsaida! for if the mighty works, which were done in you, had been done in Tyre and Sidon, they would have repented long ago in sackcloth and ashes.
  - type: text
    content: ' '
  '22':
  - type: text
    content: But I say unto you, It shall be more tolerable for Tyre and Sidon at the day of judgment, than for you.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'And thou, Capernaum, which art exalted unto heaven, shalt be brought down to hell: for if the mighty works, which have been done in thee, had been done in Sodom, it would have remained until this day.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: But I say unto you, That it shall be more tolerable for the land of Sodom in the day of judgment, than for thee.
  - type: heading
    content: The Hidden Revelation
  '25':
  - type: text
    content: 'At that time Jesus answered and said, '
  - type: text
    content: I thank thee, O Father, Lord of heaven and earth, because thou hast hid these things from the wise and prudent, and hast revealed them unto babes.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Even so, Father: for so it seemed good in thy sight.'
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'All things are delivered unto me of my Father: and no man knoweth the Son, but the Father; neither knoweth any man the Father, save the Son, and '
  - type: text
    content: he
  - type: text
    content: ' to whomsoever the Son will reveal '
  - type: text
    content: him
  - type: text
    content: .
  '28':
  - type: text
    content: ' '
  - type: text
    content: 'Come unto me, all '
  - type: text
    content: ye
  - type: text
    content: ' that labour and are heavy laden, and I will give you rest.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Take my yoke upon you, and learn of me; for I am meek and lowly in heart: and ye shall find rest unto your souls.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'and said unto him, Art thou he that should come, or do we look for another? '
  '30':
  - type: text
    content: 'For my yoke '
  - type: text
    content: is
  - type: text
    content: ' easy, and my burden is light.'
  '4':
  - type: text
    content: 'Jesus answered and said unto them, '
  - type: text
    content: 'Go and shew John again those things which ye do hear and see:'
  - type: text
    content: ' '
  '5':
  - type: text
    content: the blind receive their sight, and the lame walk, the lepers are cleansed, and the deaf hear, the dead are raised up, and the poor have the gospel preached to them.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'And blessed is '
  - type: text
    content: he
  - type: text
    content: ', whosoever shall not be offended in me.'
  '7':
  - type: text
    content: 'And as they departed, Jesus began to say unto the multitudes concerning John, '
  - type: text
    content: What went ye out into the wilderness to see? A reed shaken with the wind?
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'But what went ye out for to see? A man clothed in soft raiment? behold, they that wear soft '
  - type: text
    content: clothing
  - type: text
    content: ' are in kings'' houses.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: But what went ye out for to see? A prophet? yea, I say unto you, and more than a prophet.
  - type: text
    content: ' '
