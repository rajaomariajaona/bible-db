document_id: MAT.11,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And it came to pass, when Jesus had made an end of commanding his twelve disciples, he departed thence to teach and to preach in their cities.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus and the Baptist
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For this is '
      - type: usfm
        marker: add
        children:
        - type: text
          text: he
      - type: text
        text: ', of whom it is written,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Behold, I send my messenger before thy face,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Which shall prepare thy way before thee.
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Verily I say unto you, Among them that are born of women there hath not risen a greater than John the Baptist: notwithstanding he that is least in the kingdom of heaven is greater than he.'
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And from the days of John the Baptist until now the kingdom of heaven suffereth violence, and the violent take it by force.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For all the prophets and the law prophesied until John.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And if ye will receive '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ', this is Elias, which was for to come.'
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He that hath ears to hear, let him hear.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But whereunto shall I liken this generation? It is like unto children sitting in the markets, and calling unto their fellows,
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and saying, We have piped unto you, and ye have not danced; we have mourned unto you, and ye have not lamented.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For John came neither eating nor drinking, and they say, He hath a devil.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The Son of man came eating and drinking, and they say, Behold a man gluttonous, and a winebibber, a friend of publicans and sinners. But wisdom is justified of her children.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus and His Opponents
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when John had heard in the prison the works of Christ, he sent two of his disciples, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then began he to upbraid the cities wherein most of his mighty works were done, because they repented not: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Woe unto thee, Chorazin! woe unto thee, Bethsaida! for if the mighty works, which were done in you, had been done in Tyre and Sidon, they would have repented long ago in sackcloth and ashes.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But I say unto you, It shall be more tolerable for Tyre and Sidon at the day of judgment, than for you.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And thou, Capernaum, which art exalted unto heaven, shalt be brought down to hell: for if the mighty works, which have been done in thee, had been done in Sodom, it would have remained until this day.'
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But I say unto you, That it shall be more tolerable for the land of Sodom in the day of judgment, than for thee.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Hidden Revelation
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time Jesus answered and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I thank thee, O Father, Lord of heaven and earth, because thou hast hid these things from the wise and prudent, and hast revealed them unto babes.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Even so, Father: for so it seemed good in thy sight.'
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'All things are delivered unto me of my Father: and no man knoweth the Son, but the Father; neither knoweth any man the Father, save the Son, and '
      - type: usfm
        marker: add
        children:
        - type: text
          text: he
      - type: text
        text: ' to whomsoever the Son will reveal '
      - type: usfm
        marker: add
        children:
        - type: text
          text: him
      - type: text
        text: .
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Come unto me, all '
      - type: usfm
        marker: add
        children:
        - type: text
          text: ye
      - type: text
        text: ' that labour and are heavy laden, and I will give you rest.'
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Take my yoke upon you, and learn of me; for I am meek and lowly in heart: and ye shall find rest unto your souls.'
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said unto him, Art thou he that should come, or do we look for another? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For my yoke '
      - type: usfm
        marker: add
        children:
        - type: text
          text: is
      - type: text
        text: ' easy, and my burden is light.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered and said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Go and shew John again those things which ye do hear and see:'
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the blind receive their sight, and the lame walk, the lepers are cleansed, and the deaf hear, the dead are raised up, and the poor have the gospel preached to them.
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And blessed is '
      - type: usfm
        marker: add
        children:
        - type: text
          text: he
      - type: text
        text: ', whosoever shall not be offended in me.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as they departed, Jesus began to say unto the multitudes concerning John, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: What went ye out into the wilderness to see? A reed shaken with the wind?
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But what went ye out for to see? A man clothed in soft raiment? behold, they that wear soft '
      - type: usfm
        marker: add
        children:
        - type: text
          text: clothing
      - type: text
        text: ' are in kings'' houses.'
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But what went ye out for to see? A prophet? yea, I say unto you, and more than a prophet.
    - type: text
      text: ' '
