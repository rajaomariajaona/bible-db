document_id: EST.10,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'And the king Ahasuerus laid a tribute upon the land, and '
  - type: text
    content: upon
  - type: text
    content: ' the isles of the sea. '
  '2':
  - type: text
    content: 'And all the acts of his power and of his might, and the declaration of the greatness of Mordecai, whereunto the king advanced him, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Media and Persia? '
  '3':
  - type: text
    content: 'For Mordecai the Jew '
  - type: text
    content: was
  - type: text
    content: ' next unto king Ahasuerus, and great among the Jews, and accepted of the multitude of his brethren, seeking the wealth of his people, and speaking peace to all his seed.'
