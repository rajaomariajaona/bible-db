    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the king Ahasuerus laid a tribute upon the land, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: upon
  - type: text
    text: ' the isles of the sea. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And all the acts of his power and of his might, and the declaration of the greatness of Mordecai, whereunto the king advanced him, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' they not written in the book of the chronicles of the kings of Media and Persia? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For Mordecai the Jew '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' next unto king Ahasuerus, and great among the Jews, and accepted of the multitude of his brethren, seeking the wealth of his people, and speaking peace to all his seed.'
