document_id: NUM.11
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Discontent
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: when
  - type: text
    text: ' the people complained, it displeased the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '; and his anger was kindled; and the fire of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' burnt among them, and consumed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them that were
  - type: text
    text: ' in the uttermost parts of the camp. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the people cried unto Moses; and when Moses prayed unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the fire was quenched. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And he called the name of the place Taberah: because the fire of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' burnt among them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And the mixt multitude that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' among them fell a lusting: and the children of Israel also wept again, and said, Who shall give us flesh to eat? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'We remember the fish, which we did eat in Egypt freely; the cucumbers, and the melons, and the leeks, and the onions, and the garlick: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'but now our soul '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' dried away: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' nothing at all, beside this manna, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: before
  - type: text
    text: ' our eyes. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the manna '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' as coriander seed, and the colour thereof as the colour of bdellium. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' the people went about, and gathered '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and ground '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' in mills, or beat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' in a mortar, and baked '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' in pans, and made cakes of it: and the taste of it was as the taste of fresh oil. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: And when the dew fell upon the camp in the night, the manna fell upon it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Moses heard the people weep throughout their families, every man in the door of his tent: and the anger of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' was kindled greatly; Moses also was displeased. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Moses said unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Wherefore hast thou afflicted thy servant? and wherefore have I not found favour in thy sight, that thou layest the burden of all this people upon me? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Have I conceived all this people? have I begotten them, that thou shouldest say unto me, Carry them in thy bosom, as a nursing father beareth the sucking child, unto the land which thou swarest unto their fathers? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Whence should I have flesh to give unto all this people? for they weep unto me, saying, Give us flesh, that we may eat. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I am not able to bear all this people alone, because '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' too heavy for me. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And if thou deal thus with me, kill me, I pray thee, out of hand, if I have found favour in thy sight; and let me not see my wretchedness.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Moses, Gather unto me seventy men of the elders of Israel, whom thou knowest to be the elders of the people, and officers over them; and bring them unto the tabernacle of the congregation, that they may stand there with thee. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And I will come down and talk with thee there: and I will take of the spirit which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon thee, and will put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon them; and they shall bear the burden of the people with thee, that thou bear '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' not thyself alone. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And say thou unto the people, Sanctify yourselves against to morrow, and ye shall eat flesh: for ye have wept in the ears of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', saying, Who shall give us flesh to eat? for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it was
  - type: text
    text: ' well with us in Egypt: therefore the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will give you flesh, and ye shall eat. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ye shall not eat one day, nor two days, nor five days, neither ten days, nor twenty days; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' even a whole month, until it come out at your nostrils, and it be loathsome unto you: because that ye have despised the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' among you, and have wept before him, saying, Why came we forth out of Egypt? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And Moses said, The people, among whom I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am, are
  - type: text
    text: ' six hundred thousand footmen; and thou hast said, I will give them flesh, that they may eat a whole month. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Shall the flocks and the herds be slain for them, to suffice them? or shall all the fish of the sea be gathered together for them, to suffice them? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Moses, Is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s hand waxed short? thou shalt see now whether my word shall come to pass unto thee or not.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And Moses went out, and told the people the words of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and gathered the seventy men of the elders of the people, and set them round about the tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came down in a cloud, and spake unto him, and took of the spirit that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' upon him, and gave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' unto the seventy elders: and it came to pass, that, when the spirit rested upon them, they prophesied, and did not cease.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But there remained two '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of the
  - type: text
    text: ' men in the camp, the name of the one '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Eldad, and the name of the other Medad: and the spirit rested upon them; and they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' of them that were written, but went not out unto the tabernacle: and they prophesied in the camp. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And there ran a young man, and told Moses, and said, Eldad and Medad do prophesy in the camp. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And Joshua the son of Nun, the servant of Moses, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' of his young men, answered and said, My lord Moses, forbid them. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And Moses said unto him, Enviest thou for my sake? would God that all the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s people were prophets, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' would put his spirit upon them! '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: And Moses gat him into the camp, he and the elders of Israel.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Quails from the Sea
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And there went forth a wind from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and brought quails from the sea, and let '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' fall by the camp, as it were a day''s journey on this side, and as it were a day''s journey on the other side, round about the camp, and as it were two cubits '
  - type: usfm
    marker: add
    children:
    - type: text
      text: high
  - type: text
    text: ' upon the face of the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And the people stood up all that day, and all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' night, and all the next day, and they gathered the quails: he that gathered least gathered ten homers: and they spread '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' all abroad for themselves round about the camp. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And while the flesh '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' yet between their teeth, ere it was chewed, the wrath of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' was kindled against the people, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' smote the people with a very great plague. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And he called the name of that place Kibroth-hattaavah: because there they buried the people that lusted. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' the people journeyed from Kibroth-hattaavah unto Hazeroth; and abode at Hazeroth.'
