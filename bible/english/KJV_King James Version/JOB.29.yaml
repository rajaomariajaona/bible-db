document_id: JOB.29,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moreover Job continued his parable, and said,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The nobles held their peace,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their tongue cleaved to the roof of their mouth.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When the ear heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ', then it blessed me;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And when the eye saw '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ', it gave witness to me:'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because I delivered the poor that cried,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the fatherless, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him that had
    - type: text
      text: ' none to help him.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The blessing of him that was ready to perish came upon me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I caused the widow's heart to sing for joy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I put on righteousness, and it clothed me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'My judgment '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' as a robe and a diadem.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was eyes to the blind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And feet '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' I to the lame.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' a father to the poor:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the cause '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' I knew not I searched out.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I brake the jaws of the wicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And plucked the spoil out of his teeth.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I said, I shall die in my nest,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And I shall multiply '
    - type: usfm
      marker: add
      children:
      - type: text
        text: my
    - type: text
      text: ' days as the sand.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My root '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' spread out by the waters,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the dew lay all night upon my branch.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oh that I were as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' months past,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'As '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' the days '
    - type: usfm
      marker: add
      children:
      - type: text
        text: when
    - type: text
      text: ' God preserved me;'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My glory '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' fresh in me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And my bow was renewed in my hand.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Unto me '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' gave ear, and waited,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And kept silence at my counsel.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: After my words they spake not again;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And my speech dropped upon them.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they waited for me as for the rain;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And they opened their mouth wide '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' for the latter rain.'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: If
    - type: text
      text: ' I laughed on them, they believed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' not;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the light of my countenance they cast not down.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I chose out their way, and sat chief,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And dwelt as a king in the army,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'As one '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' comforteth the mourners.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When his candle shined upon my head,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And when
    - type: text
      text: ' by his light I walked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: through
    - type: text
      text: ' darkness;'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As I was in the days of my youth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When the secret of God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' upon my tabernacle;'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When the Almighty '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' yet with me,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: When
    - type: text
      text: ' my children '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' about me;'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I washed my steps with butter,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the rock poured me out rivers of oil;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I went out to the gate through the city,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: When
    - type: text
      text: ' I prepared my seat in the street!'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The young men saw me, and hid themselves:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the aged arose, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' stood up.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The princes refrained talking,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And laid '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' hand on their mouth.'
