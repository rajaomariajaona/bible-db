  - type: usfm
    marker: add
    children:
    - type: text
      text: is it
  - type: text
    text: ' not in your eyes in comparison of it as nothing? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Yet now be strong, O Zerubbabel, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and be strong, O Joshua, son of Josedech, the high priest; and be strong, all ye people of the land, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and work: for I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' with you, saith the '
  - type: usfm
    marker: nd
    children:
