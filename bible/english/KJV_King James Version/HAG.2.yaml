      text: concerning
  - type: text
    text: ' the law, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'If one bear holy flesh in the skirt of his garment, and with his skirt do touch bread, or pottage, or wine, or oil, or any meat, shall it be holy? And the priests answered and said, No. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then said Haggai, If '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one that is
  - type: text
    text: ' unclean by a dead body touch any of these, shall it be unclean? And the priests answered and said, It shall be unclean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then answered Haggai, and said, So '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this people, and so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this nation before me, saith the '
  - type: usfm
    marker: nd
