  - type: text
    text: 'since those '
  - type: usfm
    marker: add
    children:
    - type: text
      text: days
  - type: text
    text: ' were, when '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' came to an heap of twenty '
  - type: usfm
    marker: add
    children:
    - type: text
