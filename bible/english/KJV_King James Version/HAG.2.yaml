    - type: text
      text: LORD
  - type: text
    text: '; and so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' every work of their hands; and that which they offer there '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' unclean.'
