  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And now, I pray you, consider from this day and upward, from before a stone was laid upon a stone in the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
