  - type: text
    text: ' ten: when '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' came to the pressfat for to draw out fifty '
  - type: usfm
    marker: add
    children:
    - type: text
      text: vessels
  - type: text
    text: ' out of the press, there were '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' twenty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'I smote you with blasting and with mildew and with hail in all the labours of your hands; yet ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: turned
  - type: text
    text: ' not to me, saith the '
