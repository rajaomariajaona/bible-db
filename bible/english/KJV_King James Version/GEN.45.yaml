document_id: GEN.45
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Joseph could not refrain himself before all them that stood by him; and he cried, Cause every man to go out from me. And there stood no man with him, while Joseph made himself known unto his brethren. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he wept aloud: and the Egyptians and the house of Pharaoh heard. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Joseph said unto his brethren, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' Joseph; doth my father yet live? And his brethren could not answer him; for they were troubled at his presence. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Joseph said unto his brethren, Come near to me, I pray you. And they came near. And he said, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' Joseph your brother, whom ye sold into Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now therefore be not grieved, nor angry with yourselves, that ye sold me hither: for God did send me before you to preserve life. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For these two years '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hath
  - type: text
    text: ' the famine '
  - type: usfm
    marker: add
    children:
    - type: text
      text: been
  - type: text
    text: ' in the land: and yet '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there are
  - type: text
    text: ' five years, in the which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there shall
  - type: text
    text: ' neither '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' earing nor harvest. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And God sent me before you to preserve you a posterity in the earth, and to save your lives by a great deliverance. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So now '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it was
  - type: text
    text: ' not you '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' sent me hither, but God: and he hath made me a father to Pharaoh, and lord of all his house, and a ruler throughout all the land of Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Haste ye, and go up to my father, and say unto him, Thus saith thy son Joseph, God hath made me lord of all Egypt: come down unto me, tarry not: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and thou shalt dwell in the land of Goshen, and thou shalt be near unto me, thou, and thy children, and thy children''s children, and thy flocks, and thy herds, and all that thou hast: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and there will I nourish thee; for yet '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there are
  - type: text
    text: ' five years of famine; lest thou, and thy household, and all that thou hast, come to poverty. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And, behold, your eyes see, and the eyes of my brother Benjamin, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' my mouth that speaketh unto you. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And ye shall tell my father of all my glory in Egypt, and of all that ye have seen; and ye shall haste and bring down my father hither. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And he fell upon his brother Benjamin''s neck, and wept; and Benjamin wept upon his neck. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Moreover he kissed all his brethren, and wept upon them: and after that his brethren talked with him.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Pharaoh's Invitation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the fame thereof was heard in Pharaoh''s house, saying, Joseph''s brethren are come: and it pleased Pharaoh well, and his servants. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And Pharaoh said unto Joseph, Say unto thy brethren, This do ye; lade your beasts, and go, get you unto the land of Canaan; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and take your father and your households, and come unto me: and I will give you the good of the land of Egypt, and ye shall eat the fat of the land. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now thou art commanded, this do ye; take you wagons out of the land of Egypt for your little ones, and for your wives, and bring your father, and come. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Also regard not your stuff; for the good of all the land of Egypt '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' your''s. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And the children of Israel did so: and Joseph gave them wagons, according to the commandment of Pharaoh, and gave them provision for the way. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'To all of them he gave each man changes of raiment; but to Benjamin he gave three hundred '
  - type: usfm
    marker: add
    children:
    - type: text
      text: pieces
  - type: text
    text: ' of silver, and five changes of raiment. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And to his father he sent after this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: manner
  - type: text
    text: '; ten asses laden with the good things of Egypt, and ten she asses laden with corn and bread and meat for his father by the way. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So he sent his brethren away, and they departed: and he said unto them, See that ye fall not out by the way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And they went up out of Egypt, and came into the land of Canaan unto Jacob their father, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and told him, saying, Joseph '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' yet alive, and he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' governor over all the land of Egypt. And Jacob''s heart fainted, for he believed them not. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And they told him all the words of Joseph, which he had said unto them: and when he saw the wagons which Joseph had sent to carry him, the spirit of Jacob their father revived: '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and Israel said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' enough; Joseph my son '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' yet alive: I will go and see him before I die.'
