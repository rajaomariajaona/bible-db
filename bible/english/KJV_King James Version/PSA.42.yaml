document_id: PSA.42,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the chief Musician, Maschil, for the sons of Korah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As the hart panteth after the water brooks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So panteth my soul after thee, O God.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: As
    - type: text
      text: ' with a sword in my bones,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Mine enemies reproach me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: While they say daily unto me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy God?'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why art thou cast down, O my soul?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And why art thou disquieted within me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hope thou in God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For I shall yet praise him, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: who is
    - type: text
      text: ' the health of my countenance, and my God.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My soul thirsteth for God, for the living God:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When shall I come and appear before God?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My tears have been my meat day and night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'While they continually say unto me, Where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy God?'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When I remember these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ', I pour out my soul in me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For I had gone with the multitude, I went with them to the house of God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the voice of joy and praise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With a multitude that kept holyday.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why art thou cast down, O my soul?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: why
    - type: text
      text: ' art thou disquieted in me?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hope thou in God:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For I shall yet praise him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: For
    - type: text
      text: ' the help of his countenance.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O my God, my soul is cast down within me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore will I remember thee from the land of Jordan, and of the Hermonites, from the hill Mizar.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Deep calleth unto deep at the noise of thy waterspouts:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All thy waves and thy billows are gone over me.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Yet
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will command his lovingkindness in the daytime,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And in the night his song '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' with me, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' my prayer unto the God of my life.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will say unto God my rock, why hast thou forgotten me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why go I mourning because of the oppression of the enemy?
