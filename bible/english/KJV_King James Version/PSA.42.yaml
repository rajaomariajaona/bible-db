document_id: PSA.42,1
type_code: eng
verses:
  '1':
  - type: text
    content: To the chief Musician, Maschil, for the sons of Korah.
  - type: text
    content: As the hart panteth after the water brooks,
  - type: text
    content: So panteth my soul after thee, O God.
  '10':
  - type: text
    content: ' '
  - type: text
    content: As
  - type: text
    content: ' with a sword in my bones,'
  - type: text
    content: Mine enemies reproach me;
  - type: text
    content: While they say daily unto me,
  - type: text
    content: 'Where '
  - type: text
    content: is
  - type: text
    content: ' thy God?'
  '11':
  - type: text
    content: Why art thou cast down, O my soul?
  - type: text
    content: And why art thou disquieted within me?
  - type: text
    content: Hope thou in God;
  - type: text
    content: 'For I shall yet praise him, '
  - type: text
    content: who is
  - type: text
    content: ' the health of my countenance, and my God.'
  '2':
  - type: text
    content: 'My soul thirsteth for God, for the living God:'
  - type: text
    content: When shall I come and appear before God?
  '3':
  - type: text
    content: My tears have been my meat day and night,
  - type: text
    content: 'While they continually say unto me, Where '
  - type: text
    content: is
  - type: text
    content: ' thy God?'
  '4':
  - type: text
    content: 'When I remember these '
  - type: text
    content: things
  - type: text
    content: ', I pour out my soul in me:'
  - type: text
    content: For I had gone with the multitude, I went with them to the house of God,
  - type: text
    content: With the voice of joy and praise,
  - type: text
    content: With a multitude that kept holyday.
  '5':
  - type: text
    content: Why art thou cast down, O my soul?
  - type: text
    content: 'And '
  - type: text
    content: why
  - type: text
    content: ' art thou disquieted in me?'
  - type: text
    content: 'Hope thou in God:'
  - type: text
    content: 'For I shall yet praise him '
  - type: text
    content: For
  - type: text
    content: ' the help of his countenance.'
  '6':
  - type: text
    content: 'O my God, my soul is cast down within me:'
  - type: text
    content: Therefore will I remember thee from the land of Jordan, and of the Hermonites, from the hill Mizar.
  '7':
  - type: text
    content: 'Deep calleth unto deep at the noise of thy waterspouts:'
  - type: text
    content: All thy waves and thy billows are gone over me.
  '8':
  - type: text
    content: ' '
  - type: text
    content: Yet
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' will command his lovingkindness in the daytime,'
  - type: text
    content: 'And in the night his song '
  - type: text
    content: shall be
  - type: text
    content: ' with me, '
  - type: text
    content: and
  - type: text
    content: ' my prayer unto the God of my life.'
  '9':
  - type: text
    content: I will say unto God my rock, why hast thou forgotten me?
  - type: text
    content: Why go I mourning because of the oppression of the enemy?
