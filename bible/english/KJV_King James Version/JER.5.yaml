document_id: JER.5
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: A Hopeless Outlook
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Run ye to and fro through the streets of Jerusalem, and see now, and know, and seek in the broad places thereof, if ye can find a man, if there be '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' that executeth judgment, that seeketh the truth; and I will pardon it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And though they say, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' liveth; surely they swear falsely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' not thine eyes upon the truth? thou hast stricken them, but they have not grieved; thou hast consumed them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' they have refused to receive correction: they have made their faces harder than a rock; they have refused to return.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Therefore I said, Surely these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' poor; they are foolish: for they know not the way of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: nor
  - type: text
    text: ' the judgment of their God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I will get me unto the great men, and will speak unto them; for they have known the way of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the judgment of their God: but these have altogether broken the yoke, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' burst the bonds. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Wherefore a lion out of the forest shall slay them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' a wolf of the evenings shall spoil them, a leopard shall watch over their cities: every one that goeth out thence shall be torn in pieces: because their transgressions are many, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' their backslidings are increased.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'How shall I pardon thee for this? thy children have forsaken me, and sworn by '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them that are
  - type: text
    text: ' no gods: when I had fed them to the full, they then committed adultery, and assembled themselves by troops in the harlots'' houses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'They were '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' fed horses in the morning: every one neighed after his neighbour''s wife. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Shall I not visit for these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things?
  - type: text
    text: ' saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': and shall not my soul be avenged on such a nation as this?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Go ye up upon her walls, and destroy; but make not a full end: take away her battlements; for they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' not the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For the house of Israel and the house of Judah have dealt very treacherously against me, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'They have belied the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' not he; neither shall evil come upon us; neither shall we see sword nor famine: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and the prophets shall become wind, and the word '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not in them: thus shall it be done unto them.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Lord's Agents
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Wherefore thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of hosts, Because ye speak this word, behold, I will make my words in thy mouth fire, and this people wood, and it shall devour them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Lo, I will bring a nation upon you from far, O house of Israel, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a mighty nation, it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' an ancient nation, a nation whose language thou knowest not, neither understandest what they say. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Their quiver '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' as an open sepulchre, they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' all mighty men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And they shall eat up thine harvest, and thy bread, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' thy sons and thy daughters should eat: they shall eat up thy flocks and thine herds: they shall eat up thy vines and thy fig trees: they shall impoverish thy fenced cities, wherein thou trustedst, with the sword.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nevertheless in those days, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', I will not make a full end with you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And it shall come to pass, when ye shall say, Wherefore doeth the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' our God all these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' unto us? then shalt thou answer them, Like as ye have forsaken me, and served strange gods in your land, so shall ye serve strangers in a land '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' not yours.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Declare this in the house of Jacob, and publish it in Judah, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hear now this, O foolish people, and without understanding; which have eyes, and see not; which have ears, and hear not: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fear ye not me? saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': will ye not tremble at my presence, which have placed the sand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' the bound of the sea by a perpetual decree, that it cannot pass it: and though the waves thereof toss themselves, yet can they not prevail; though they roar, yet can they not pass over it? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But this people hath a revolting and a rebellious heart; they are revolted and gone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Neither say they in their heart, Let us now fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' our God, that giveth rain, both the former and the latter, in his season: he reserveth unto us the appointed weeks of the harvest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Your iniquities have turned away these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ', and your sins have withholden good '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' from you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'For among my people are found wicked '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'men:'
  - type: text
    text: ' they lay wait, as he that setteth snares; they set a trap, they catch men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'As a cage is full of birds, so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' their houses full of deceit: therefore they are become great, and waxen rich. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'They are waxen fat, they shine: yea, they overpass the deeds of the wicked: they judge not the cause, the cause of the fatherless, yet they prosper; and the right of the needy do they not judge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Shall I not visit for these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things?
  - type: text
    text: ' saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': shall not my soul be avenged on such a nation as this?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'A wonderful and horrible thing is committed in the land; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'the prophets prophesy falsely, and the priests bear rule by their means; and my people love '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to have it
  - type: text
    text: ' so: and what will ye do in the end thereof?'
