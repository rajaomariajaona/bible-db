document_id: 1KI.6,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass in the four hundred and eightieth year after the children of Israel were come out of the land of Egypt, in the fourth year of Solomon''s reign over Israel, in the month Zif, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the second month, that he began to build the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The House of the Lord
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: then
    - type: text
      text: ' he built chambers against all the house, five cubits high: and they rested on the house with timber of cedar.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came to Solomon, saying, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Concerning
    - type: text
      text: ' this house which thou art in building, if thou wilt walk in my statutes, and execute my judgments, and keep all my commandments to walk in them; then will I perform my word with thee, which I spake unto David thy father: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and I will dwell among the children of Israel, and will not forsake my people Israel.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Solomon built the house, and finished it. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he built the walls of the house within with boards of cedar, both the floor of the house, and the walls of the cieling: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' he covered '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' on the inside with wood, and covered the floor of the house with planks of fir. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he built twenty cubits on the sides of the house, both the floor and the walls with boards of cedar: he even built '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' for it within, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' for the oracle, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' for the most holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: place
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the house, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ', the temple before it, was forty cubits '
    - type: usfm
      marker: add
      children:
      - type: text
        text: long
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the cedar of the house within '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' carved with knops and open flowers: all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' cedar; there was no stone seen. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the oracle he prepared in the house within, to set there the ark of the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the house which king Solomon built for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', the length thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' threescore cubits, and the breadth thereof twenty '
    - type: usfm
      marker: add
      children:
      - type: text
        text: cubits
    - type: text
      text: ', and the height thereof thirty cubits. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the oracle in the forepart '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' twenty cubits in length, and twenty cubits in breadth, and twenty cubits in the height thereof: and he overlaid it with pure gold; and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' covered the altar '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which was of
    - type: text
      text: ' cedar. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Solomon overlaid the house within with pure gold: and he made a partition by the chains of gold before the oracle; and he overlaid it with gold. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the whole house he overlaid with gold, until he had finished all the house: also the whole altar that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' by the oracle he overlaid with gold.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And within the oracle he made two cherubims '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' olive tree, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: each
    - type: text
      text: ' ten cubits high. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And five cubits '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the one wing of the cherub, and five cubits the other wing of the cherub: from the uttermost part of the one wing unto the uttermost part of the other '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' ten cubits. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the other cherub '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' ten cubits: both the cherubims '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' of one measure and one size. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The height of the one cherub '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' ten cubits, and so '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was it
    - type: text
      text: ' of the other cherub. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he set the cherubims within the inner house: and they stretched forth the wings of the cherubims, so that the wing of the one touched the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' wall, and the wing of the other cherub touched the other wall; and their wings touched one another in the midst of the house. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he overlaid the cherubims with gold.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he carved all the walls of the house round about with carved figures of cherubims and palm trees and open flowers, within and without. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the porch before the temple of the house, twenty cubits '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the length thereof, according to the breadth of the house; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' ten cubits '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the breadth thereof before the house. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the floor of the house he overlaid with gold, within and without. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And for the entering of the oracle he made doors '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' olive tree: the lintel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' side posts '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' a fifth part '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of the wall
    - type: text
      text: '. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The two doors also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were of
    - type: text
      text: ' olive tree; and he carved upon them carvings of cherubims and palm trees and open flowers, and overlaid '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' with gold, and spread gold upon the cherubims, and upon the palm trees. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So also made he for the door of the temple posts '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' olive tree, a fourth part '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of the wall
    - type: text
      text: '. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the two doors '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were of
    - type: text
      text: ' fir tree: the two leaves of the one door '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' folding, and the two leaves of the other door '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' folding. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he carved '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thereon
    - type: text
      text: ' cherubims and palm trees and open flowers: and covered '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' with gold fitted upon the carved work. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he built the inner court with three rows of hewed stone, and a row of cedar beams.
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the fourth year was the foundation of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' laid, in the month Zif: '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and in the eleventh year, in the month Bul, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the eighth month, was the house finished throughout all the parts thereof, and according to all the fashion of it. So was he seven years in building it.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And for the house he made windows of narrow lights. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And against the wall of the house he built chambers round about, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: against
    - type: text
      text: ' the walls of the house round about, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: both
    - type: text
      text: ' of the temple and of the oracle: and he made chambers round about: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the nethermost chamber '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' five cubits broad, and the middle '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' six cubits broad, and the third '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' seven cubits broad: for without '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in the wall
    - type: text
      text: ' of the house he made narrowed rests round about, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the beams
    - type: text
      text: ' should not be fastened in the walls of the house. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the house, when it was in building, was built of stone made ready before it was brought thither: so that there was neither hammer nor axe '
    - type: usfm
      marker: add
      children:
      - type: text
        text: nor
    - type: text
      text: ' any tool of iron heard in the house, while it was in building. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The door for the middle chamber '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in the right side of the house: and they went up with winding stairs into the middle '
    - type: usfm
      marker: add
      children:
      - type: text
        text: chamber
    - type: text
      text: ', and out of the middle into the third. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he built the house, and finished it; and covered the house with beams and boards of cedar. '
