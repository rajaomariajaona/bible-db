document_id: LUK.12,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Leaven of the Pharisees
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the mean time, when there were gathered together an innumerable multitude of people, insomuch that they trode one upon another, he began to say unto his disciples first of all, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Beware ye of the leaven of the Pharisees, which is hypocrisy.
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And whosoever shall speak a word against the Son of man, it shall be forgiven him: but unto him that blasphemeth against the Holy Ghost it shall not be forgiven.'
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And when they bring you unto the synagogues, and '
      - type: usfm
        marker: add
        children:
        - type: text
          text: unto
      - type: text
        text: ' magistrates, and powers, take ye no thought how or what thing ye shall answer, or what ye shall say:'
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for the Holy Ghost shall teach you in the same hour what ye ought to say.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And one of the company said unto him, Master, speak to my brother, that he divide the inheritance with me. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Man, who made me a judge or a divider over you?
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Take heed, and beware of covetousness: for a man''s life consisteth not in the abundance of the things which he possesseth.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he spake a parable unto them, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'The ground of a certain rich man brought forth plentifully:'
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and he thought within himself, saying, What shall I do, because I have no room where to bestow my fruits?
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And he said, This will I do: I will pull down my barns, and build greater; and there will I bestow all my fruits and my goods.'
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And I will say to my soul, Soul, thou hast much goods laid up for many years; take thine ease, eat, drink, '
      - type: usfm
        marker: add
        children:
        - type: text
          text: and
      - type: text
        text: ' be merry.'
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For there is nothing covered, that shall not be revealed; neither hid, that shall not be known.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But God said unto him, '
      - type: usfm
        marker: add
        children:
        - type: text
          text: Thou
      - type: text
        text: ' fool, this night thy soul shall be required of thee: then whose shall those things be, which thou hast provided?'
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'So '
      - type: usfm
        marker: add
        children:
        - type: text
          text: is
      - type: text
        text: ' he that layeth up treasure for himself, and is not rich toward God.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Lilies and Ravens
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto his disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Therefore I say unto you, Take no thought for your life, what ye shall eat; neither for the body, what ye shall put on.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'The life is more than meat, and the body '
      - type: usfm
        marker: add
        children:
        - type: text
          text: is more
      - type: text
        text: ' than raiment.'
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Consider the ravens: for they neither sow nor reap; which neither have storehouse nor barn; and God feedeth them: how much more are ye better than the fowls?'
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And which of you with taking thought can add to his stature one cubit?
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If ye then be not able to do that thing which is least, why take ye thought for the rest?
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Consider the lilies how they grow: they toil not, they spin not; and yet I say unto you, that Solomon in all his glory was not arrayed like one of these.'
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'If then God so clothe the grass, which is to day in the field, and to morrow is cast into the oven; how much more '
      - type: usfm
        marker: add
        children:
        - type: text
          text: will he clothe
      - type: text
        text: ' you, O ye of little faith?'
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And seek not ye what ye shall eat, or what ye shall drink, neither be ye of doubtful mind.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Therefore whatsoever ye have spoken in darkness shall be heard in the light; and that which ye have spoken in the ear in closets shall be proclaimed upon the housetops.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For all these things do the nations of the world seek after: and your Father knoweth that ye have need of these things.'
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But rather seek ye the kingdom of God; and all these things shall be added unto you.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Little Flock
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Fear not, little flock; for it is your Father's good pleasure to give you the kingdom.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Sell that ye have, and give alms; provide yourselves bags which wax not old, a treasure in the heavens that faileth not, where no thief approacheth, neither moth corrupteth.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For where your treasure is, there will your heart be also.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Let your loins be girded about, and '
      - type: usfm
        marker: add
        children:
        - type: text
          text: your
      - type: text
        text: ' lights burning;'
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and ye yourselves like unto men that wait for their lord, when he will return from the wedding; that when he cometh and knocketh, they may open unto him immediately.
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Blessed '
      - type: usfm
        marker: add
        children:
        - type: text
          text: are
      - type: text
        text: ' those servants, whom the lord when he cometh shall find watching: verily I say unto you, that he shall gird himself, and make them to sit down to meat, and will come forth and serve them.'
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And if he shall come in the second watch, or come in the third watch, and find '
      - type: usfm
        marker: add
        children:
        - type: text
          text: them
      - type: text
        text: ' so, blessed are those servants.'
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And this know, that if the goodman of the house had known what hour the thief would come, he would have watched, and not have suffered his house to be broken through.
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And I say unto you my friends, Be not afraid of them that kill the body, and after that have no more that they can do.
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Be ye therefore ready also: for the Son of man cometh at an hour when ye think not.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Peter said unto him, Lord, speakest thou this parable unto us, or even to all? '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the Lord said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Who then is that faithful and wise steward, whom '
      - type: usfm
        marker: add
        children:
        - type: text
          text: his
      - type: text
        text: ' lord shall make ruler over his household, to give '
      - type: usfm
        marker: add
        children:
        - type: text
          text: them their
      - type: text
        text: ' portion of meat in due season?'
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Blessed '
      - type: usfm
        marker: add
        children:
        - type: text
          text: is
      - type: text
        text: ' that servant, whom his lord when he cometh shall find so doing.'
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Of a truth I say unto you, that he will make him ruler over all that he hath.
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But and if that servant say in his heart, My lord delayeth his coming; and shall begin to beat the menservants and maidens, and to eat and drink, and to be drunken;
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'the lord of that servant will come in a day when he looketh not for '
      - type: usfm
        marker: add
        children:
        - type: text
          text: him
      - type: text
        text: ', and at an hour when he is not aware, and will cut him in sunder, and will appoint him his portion with the unbelievers.'
    - type: text
      text: ' '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And that servant, which knew his lord''s will, and prepared not '
      - type: usfm
        marker: add
        children:
        - type: text
          text: himself
      - type: text
        text: ', neither did according to his will, shall be beaten with many '
      - type: usfm
        marker: add
        children:
        - type: text
          text: stripes
      - type: text
        text: .
    - type: text
      text: ' '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But he that knew not, and did commit things worthy of stripes, shall be beaten with few '
      - type: usfm
        marker: add
        children:
        - type: text
          text: stripes
      - type: text
        text: '. For unto whomsoever much is given, of him shall be much required: and to whom men have committed much, of him they will ask the more.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I am come to send fire on the earth; and what will I, if it be already kindled?
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But I will forewarn you whom ye shall fear: Fear him, which after he hath killed hath power to cast into hell; yea, I say unto you, Fear him.'
    - type: text
      text: ' '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But I have a baptism to be baptized with; and how am I straitened till it be accomplished!
    - type: text
      text: ' '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Suppose ye that I am come to give peace on earth? I tell you, Nay; but rather division:'
    - type: text
      text: ' '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for from henceforth there shall be five in one house divided, three against two, and two against three.
    - type: text
      text: ' '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The father shall be divided against the son, and the son against the father; the mother against the daughter, and the daughter against the mother; the mother in law against her daughter in law, and the daughter in law against her mother in law.
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said also to the people, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: When ye see a cloud rise out of the west, straightway ye say, There cometh a shower; and so it is.
    - type: text
      text: ' '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And when '
      - type: usfm
        marker: add
        children:
        - type: text
          text: ye see
      - type: text
        text: ' the south wind blow, ye say, There will be heat; and it cometh to pass.'
    - type: text
      text: ' '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: add
        children:
        - type: text
          text: Ye
      - type: text
        text: ' hypocrites, ye can discern the face of the sky and of the earth; but how is it that ye do not discern this time?'
    - type: text
      text: ' '
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Yea, and why even of yourselves judge ye not what is right?
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'When thou goest with thine adversary to the magistrate, '
      - type: usfm
        marker: add
        children:
        - type: text
          text: as thou art
      - type: text
        text: ' in the way, give diligence that thou mayest be delivered from him; lest he hale thee to the judge, and the judge deliver thee to the officer, and the officer cast thee into prison.'
    - type: text
      text: ' '
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I tell thee, thou shalt not depart thence, till thou hast paid the very last mite.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Are not five sparrows sold for two farthings, and not one of them is forgotten before God?
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But even the very hairs of your head are all numbered. Fear not therefore: ye are of more value than many sparrows.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Also I say unto you, Whosoever shall confess me before men, him shall the Son of man also confess before the angels of God:'
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but he that denieth me before men shall be denied before the angels of God.
    - type: text
      text: ' '
