document_id: LUK.12,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Leaven of the Pharisees
  - type: text
    content: 'In the mean time, when there were gathered together an innumerable multitude of people, insomuch that they trode one upon another, he began to say unto his disciples first of all, '
  - type: text
    content: Beware ye of the leaven of the Pharisees, which is hypocrisy.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'And whosoever shall speak a word against the Son of man, it shall be forgiven him: but unto him that blasphemeth against the Holy Ghost it shall not be forgiven.'
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'And when they bring you unto the synagogues, and '
  - type: text
    content: unto
  - type: text
    content: ' magistrates, and powers, take ye no thought how or what thing ye shall answer, or what ye shall say:'
  - type: text
    content: ' '
  '12':
  - type: text
    content: for the Holy Ghost shall teach you in the same hour what ye ought to say.
  '13':
  - type: text
    content: 'And one of the company said unto him, Master, speak to my brother, that he divide the inheritance with me. '
  '14':
  - type: text
    content: 'And he said unto him, '
  - type: text
    content: Man, who made me a judge or a divider over you?
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: 'Take heed, and beware of covetousness: for a man''s life consisteth not in the abundance of the things which he possesseth.'
  '16':
  - type: text
    content: 'And he spake a parable unto them, saying, '
  - type: text
    content: 'The ground of a certain rich man brought forth plentifully:'
  - type: text
    content: ' '
  '17':
  - type: text
    content: and he thought within himself, saying, What shall I do, because I have no room where to bestow my fruits?
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'And he said, This will I do: I will pull down my barns, and build greater; and there will I bestow all my fruits and my goods.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'And I will say to my soul, Soul, thou hast much goods laid up for many years; take thine ease, eat, drink, '
  - type: text
    content: and
  - type: text
    content: ' be merry.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: For there is nothing covered, that shall not be revealed; neither hid, that shall not be known.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'But God said unto him, '
  - type: text
    content: Thou
  - type: text
    content: ' fool, this night thy soul shall be required of thee: then whose shall those things be, which thou hast provided?'
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'So '
  - type: text
    content: is
  - type: text
    content: ' he that layeth up treasure for himself, and is not rich toward God.'
  - type: heading
    content: The Lilies and Ravens
  '22':
  - type: text
    content: 'And he said unto his disciples, '
  - type: text
    content: Therefore I say unto you, Take no thought for your life, what ye shall eat; neither for the body, what ye shall put on.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'The life is more than meat, and the body '
  - type: text
    content: is more
  - type: text
    content: ' than raiment.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Consider the ravens: for they neither sow nor reap; which neither have storehouse nor barn; and God feedeth them: how much more are ye better than the fowls?'
  - type: text
    content: ' '
  '25':
  - type: text
    content: And which of you with taking thought can add to his stature one cubit?
  - type: text
    content: ' '
  '26':
  - type: text
    content: If ye then be not able to do that thing which is least, why take ye thought for the rest?
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Consider the lilies how they grow: they toil not, they spin not; and yet I say unto you, that Solomon in all his glory was not arrayed like one of these.'
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'If then God so clothe the grass, which is to day in the field, and to morrow is cast into the oven; how much more '
  - type: text
    content: will he clothe
  - type: text
    content: ' you, O ye of little faith?'
  - type: text
    content: ' '
  '29':
  - type: text
    content: And seek not ye what ye shall eat, or what ye shall drink, neither be ye of doubtful mind.
  - type: text
    content: ' '
  '3':
  - type: text
    content: Therefore whatsoever ye have spoken in darkness shall be heard in the light; and that which ye have spoken in the ear in closets shall be proclaimed upon the housetops.
  '30':
  - type: text
    content: 'For all these things do the nations of the world seek after: and your Father knoweth that ye have need of these things.'
  - type: text
    content: ' '
  '31':
  - type: text
    content: But rather seek ye the kingdom of God; and all these things shall be added unto you.
  - type: heading
    content: The Little Flock
  '32':
  - type: text
    content: ' '
  - type: text
    content: Fear not, little flock; for it is your Father's good pleasure to give you the kingdom.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Sell that ye have, and give alms; provide yourselves bags which wax not old, a treasure in the heavens that faileth not, where no thief approacheth, neither moth corrupteth.
  - type: text
    content: ' '
  '34':
  - type: text
    content: For where your treasure is, there will your heart be also.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Let your loins be girded about, and '
  - type: text
    content: your
  - type: text
    content: ' lights burning;'
  - type: text
    content: ' '
  '36':
  - type: text
    content: and ye yourselves like unto men that wait for their lord, when he will return from the wedding; that when he cometh and knocketh, they may open unto him immediately.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'Blessed '
  - type: text
    content: are
  - type: text
    content: ' those servants, whom the lord when he cometh shall find watching: verily I say unto you, that he shall gird himself, and make them to sit down to meat, and will come forth and serve them.'
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'And if he shall come in the second watch, or come in the third watch, and find '
  - type: text
    content: them
  - type: text
    content: ' so, blessed are those servants.'
  - type: text
    content: ' '
  '39':
  - type: text
    content: And this know, that if the goodman of the house had known what hour the thief would come, he would have watched, and not have suffered his house to be broken through.
  - type: text
    content: ' '
  '4':
  - type: text
    content: ' '
  - type: text
    content: And I say unto you my friends, Be not afraid of them that kill the body, and after that have no more that they can do.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Be ye therefore ready also: for the Son of man cometh at an hour when ye think not.'
  '41':
  - type: text
    content: 'Then Peter said unto him, Lord, speakest thou this parable unto us, or even to all? '
  '42':
  - type: text
    content: 'And the Lord said, '
  - type: text
    content: 'Who then is that faithful and wise steward, whom '
  - type: text
    content: his
  - type: text
    content: ' lord shall make ruler over his household, to give '
  - type: text
    content: them their
  - type: text
    content: ' portion of meat in due season?'
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'Blessed '
  - type: text
    content: is
  - type: text
    content: ' that servant, whom his lord when he cometh shall find so doing.'
  - type: text
    content: ' '
  '44':
  - type: text
    content: Of a truth I say unto you, that he will make him ruler over all that he hath.
  - type: text
    content: ' '
  '45':
  - type: text
    content: But and if that servant say in his heart, My lord delayeth his coming; and shall begin to beat the menservants and maidens, and to eat and drink, and to be drunken;
  - type: text
    content: ' '
  '46':
  - type: text
    content: 'the lord of that servant will come in a day when he looketh not for '
  - type: text
    content: him
  - type: text
    content: ', and at an hour when he is not aware, and will cut him in sunder, and will appoint him his portion with the unbelievers.'
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'And that servant, which knew his lord''s will, and prepared not '
  - type: text
    content: himself
  - type: text
    content: ', neither did according to his will, shall be beaten with many '
  - type: text
    content: stripes
  - type: text
    content: .
  - type: text
    content: ' '
  '48':
  - type: text
    content: 'But he that knew not, and did commit things worthy of stripes, shall be beaten with few '
  - type: text
    content: stripes
  - type: text
    content: '. For unto whomsoever much is given, of him shall be much required: and to whom men have committed much, of him they will ask the more.'
  '49':
  - type: text
    content: ' '
  - type: text
    content: I am come to send fire on the earth; and what will I, if it be already kindled?
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'But I will forewarn you whom ye shall fear: Fear him, which after he hath killed hath power to cast into hell; yea, I say unto you, Fear him.'
  - type: text
    content: ' '
  '50':
  - type: text
    content: But I have a baptism to be baptized with; and how am I straitened till it be accomplished!
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'Suppose ye that I am come to give peace on earth? I tell you, Nay; but rather division:'
  - type: text
    content: ' '
  '52':
  - type: text
    content: for from henceforth there shall be five in one house divided, three against two, and two against three.
  - type: text
    content: ' '
  '53':
  - type: text
    content: The father shall be divided against the son, and the son against the father; the mother against the daughter, and the daughter against the mother; the mother in law against her daughter in law, and the daughter in law against her mother in law.
  '54':
  - type: text
    content: 'And he said also to the people, '
  - type: text
    content: When ye see a cloud rise out of the west, straightway ye say, There cometh a shower; and so it is.
  - type: text
    content: ' '
  '55':
  - type: text
    content: 'And when '
  - type: text
    content: ye see
  - type: text
    content: ' the south wind blow, ye say, There will be heat; and it cometh to pass.'
  - type: text
    content: ' '
  '56':
  - type: text
    content: Ye
  - type: text
    content: ' hypocrites, ye can discern the face of the sky and of the earth; but how is it that ye do not discern this time?'
  - type: text
    content: ' '
  '57':
  - type: text
    content: Yea, and why even of yourselves judge ye not what is right?
  '58':
  - type: text
    content: ' '
  - type: text
    content: 'When thou goest with thine adversary to the magistrate, '
  - type: text
    content: as thou art
  - type: text
    content: ' in the way, give diligence that thou mayest be delivered from him; lest he hale thee to the judge, and the judge deliver thee to the officer, and the officer cast thee into prison.'
  - type: text
    content: ' '
  '59':
  - type: text
    content: I tell thee, thou shalt not depart thence, till thou hast paid the very last mite.
  '6':
  - type: text
    content: Are not five sparrows sold for two farthings, and not one of them is forgotten before God?
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'But even the very hairs of your head are all numbered. Fear not therefore: ye are of more value than many sparrows.'
  '8':
  - type: text
    content: ' '
  - type: text
    content: 'Also I say unto you, Whosoever shall confess me before men, him shall the Son of man also confess before the angels of God:'
  - type: text
    content: ' '
  '9':
  - type: text
    content: but he that denieth me before men shall be denied before the angels of God.
  - type: text
    content: ' '
