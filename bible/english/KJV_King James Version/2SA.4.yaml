  '1':
  - type: text
    content: 'And when Saul''s son heard that Abner was dead in Hebron, his hands were feeble, and all the Israelites were troubled. '
  '10':
  - type: text
    content: 'when one told me, saying, Behold, Saul is dead, thinking to have brought good tidings, I took hold of him, and slew him in Ziklag, who '
  - type: text
    content: thought
  - type: text
    content: ' that I would have given him a reward for his tidings: '
  '11':
  - type: text
    content: 'how much more, when wicked men have slain a righteous person in his own house upon his bed? shall I not therefore now require his blood of your hand, and take you away from the earth? '
  '12':
  - type: text
    content: 'And David commanded his young men, and they slew them, and cut off their hands and their feet, and hanged '
  - type: text
    content: them
  - type: text
    content: ' up over the pool in Hebron. But they took the head of Ish-bosheth, and buried '
  - type: text
    content: it
  - type: text
    content: ' in the sepulchre of Abner in Hebron.'
