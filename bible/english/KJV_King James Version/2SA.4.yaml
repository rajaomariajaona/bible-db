  '5':
  - type: text
    content: 'And the sons of Rimmon the Beerothite, Rechab and Baanah, went, and came about the heat of the day to the house of Ish-bosheth, who lay on a bed at noon. '
  '6':
  - type: text
    content: 'And they came thither into the midst of the house, '
  - type: text
    content: as though
  - type: text
    content: ' they would have fetched wheat; and they smote him under the fifth '
  - type: text
    content: 'rib:'
  - type: text
    content: ' and Rechab and Baanah his brother escaped. '
  '7':
  - type: text
    content: 'For when they came into the house, he lay on his bed in his bedchamber, and they smote him, and slew him, and beheaded him, and took his head, and gat them away through the plain all night. '
  '8':
  - type: text
    content: 'And they brought the head of Ish-bosheth unto David to Hebron, and said to the king, Behold the head of Ish-bosheth the son of Saul thine enemy, which sought thy life; and the '
  - type: text
    content: LORD
  - type: text
    content: ' hath avenged my lord the king this day of Saul, and of his seed. '
  '9':
  - type: text
    content: 'And David answered Rechab and Baanah his brother, the sons of Rimmon the Beerothite, and said unto them, '
