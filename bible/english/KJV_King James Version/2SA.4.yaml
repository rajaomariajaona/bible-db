document_id: 2SA.4,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And when Saul''s son heard that Abner was dead in Hebron, his hands were feeble, and all the Israelites were troubled. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'when one told me, saying, Behold, Saul is dead, thinking to have brought good tidings, I took hold of him, and slew him in Ziklag, who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thought
    - type: text
      text: ' that I would have given him a reward for his tidings: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'how much more, when wicked men have slain a righteous person in his own house upon his bed? shall I not therefore now require his blood of your hand, and take you away from the earth? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And David commanded his young men, and they slew them, and cut off their hands and their feet, and hanged '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' up over the pool in Hebron. But they took the head of Ish-bosheth, and buried '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' in the sepulchre of Abner in Hebron.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And Saul''s son had two men '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that were
    - type: text
      text: ' captains of bands: the name of the one '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Baanah, and the name of the other Rechab, the sons of Rimmon a Beerothite, of the children of Benjamin: (for Beeroth also was reckoned to Benjamin: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: and the Beerothites fled to Gittaim, and were sojourners there until this day.)
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And Jonathan, Saul''s son, had a son '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that was
    - type: text
      text: ' lame of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' feet. He was five years old when the tidings came of Saul and Jonathan out of Jezreel, and his nurse took him up, and fled: and it came to pass, as she made haste to flee, that he fell, and became lame. And his name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Mephibosheth.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And the sons of Rimmon the Beerothite, Rechab and Baanah, went, and came about the heat of the day to the house of Ish-bosheth, who lay on a bed at noon. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And they came thither into the midst of the house, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as though
    - type: text
      text: ' they would have fetched wheat; and they smote him under the fifth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'rib:'
    - type: text
      text: ' and Rechab and Baanah his brother escaped. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For when they came into the house, he lay on his bed in his bedchamber, and they smote him, and slew him, and beheaded him, and took his head, and gat them away through the plain all night. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And they brought the head of Ish-bosheth unto David to Hebron, and said to the king, Behold the head of Ish-bosheth the son of Saul thine enemy, which sought thy life; and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath avenged my lord the king this day of Saul, and of his seed. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And David answered Rechab and Baanah his brother, the sons of Rimmon the Beerothite, and said unto them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: As
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' liveth, who hath redeemed my soul out of all adversity, '
