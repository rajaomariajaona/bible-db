document_id: NUM.25,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Israel and Moab
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And Israel abode in Shittim, and the people began to commit whoredom with the daughters of Moab. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Phinehas, the son of Eleazar, the son of Aaron the priest, hath turned my wrath away from the children of Israel, while he was zealous for my sake among them, that I consumed not the children of Israel in my jealousy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Wherefore say, Behold, I give unto him my covenant of peace: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'and he shall have it, and his seed after him, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the covenant of an everlasting priesthood; because he was zealous for his God, and made an atonement for the children of Israel.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Now the name of the Israelite that was slain, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' that was slain with the Midianitish woman, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Zimri, the son of Salu, a prince of a chief house among the Simeonites. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And the name of the Midianitish woman that was slain '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Cozbi, the daughter of Zur; he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' head over a people, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' of a chief house in Midian.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Vex the Midianites, and smite them: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: for they vex you with their wiles, wherewith they have beguiled you in the matter of Peor, and in the matter of Cozbi, the daughter of a prince of Midian, their sister, which was slain in the day of the plague for Peor's sake.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And they called the people unto the sacrifices of their gods: and the people did eat, and bowed down to their gods. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And Israel joined himself unto Baal-peor: and the anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was kindled against Israel. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Moses, Take all the heads of the people, and hang them up before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' against the sun, that the fierce anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' may be turned away from Israel. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: And Moses said unto the judges of Israel, Slay ye every one his men that were joined unto Baal-peor.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Midianites
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And, behold, one of the children of Israel came and brought unto his brethren a Midianitish woman in the sight of Moses, and in the sight of all the congregation of the children of Israel, who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' weeping '
    - type: usfm
      marker: add
      children:
      - type: text
        text: before
    - type: text
      text: ' the door of the tabernacle of the congregation. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And when Phinehas, the son of Eleazar, the son of Aaron the priest, saw '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', he rose up from among the congregation, and took a javelin in his hand; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'and he went after the man of Israel into the tent, and thrust both of them through, the man of Israel, and the woman through her belly. So the plague was stayed from the children of Israel. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: And those that died in the plague were twenty and four thousand.
