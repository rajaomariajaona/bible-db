document_id: JOB.21
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Job's Reply
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: But Job answered and said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hear diligently my speech,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And let this be your consolations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Suffer me that I may speak;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And after that I have spoken, mock on.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'As for me, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my complaint to man?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And if '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it were so
  - type: text
    text: ', why should not my spirit be troubled?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mark me, and be astonished,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And lay '
  - type: usfm
    marker: add
    children:
    - type: text
      text: your
  - type: text
    text: ' hand upon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: your
  - type: text
    text: ' mouth.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Even when I remember I am afraid,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And trembling taketh hold on my flesh.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Wherefore do the wicked live,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Become old, yea, are mighty in power?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Their seed is established in their sight with them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And their offspring before their eyes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Their houses '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' safe from fear,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Neither '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the rod of God upon them.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Their bull gendereth, and faileth not;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Their cow calveth, and casteth not her calf.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They send forth their little ones like a flock,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And their children dance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: They take the timbrel and harp,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And rejoice at the sound of the organ.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They spend their days in wealth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And in a moment go down to the grave.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Therefore they say unto God, Depart from us;
- type: usfm
  marker: q2
  children:
  - type: text
    text: For we desire not the knowledge of thy ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'What '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the Almighty, that we should serve him?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And what profit should we have, if we pray unto him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Lo, their good '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not in their hand:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The counsel of the wicked is far from me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: How oft is the candle of the wicked put out!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: how oft
  - type: text
    text: ' cometh their destruction upon them!'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: God
  - type: text
    text: ' distributeth sorrows in his anger.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: They are as stubble before the wind,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And as chaff that the storm carrieth away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'God layeth up his iniquity for his children:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He rewardeth him, and he shall know '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: His eyes shall see his destruction,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And he shall drink of the wrath of the Almighty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For what pleasure '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hath
  - type: text
    text: ' he in his house after him,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: When the number of his months is cut off in the midst?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Shall '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' teach God knowledge?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Seeing he judgeth those that are high.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: One dieth in his full strength,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Being wholly at ease and quiet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: His breasts are full of milk,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And his bones are moistened with marrow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: And another dieth in the bitterness of his soul,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And never eateth with pleasure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: They shall lie down alike in the dust,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the worms shall cover them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Behold, I know your thoughts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the devices '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' ye wrongfully imagine against me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'For ye say, Where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the house of the prince?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the dwelling places of the wicked?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Have ye not asked them that go by the way?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And do ye not know their tokens,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: That the wicked is reserved to the day of destruction?
- type: usfm
  marker: q2
  children:
  - type: text
    text: They shall be brought forth to the day of wrath.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Who shall declare his way to his face?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And who shall repay him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: what
  - type: text
    text: ' he hath done?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Yet shall he be brought to the grave,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And shall remain in the tomb.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: The clods of the valley shall be sweet unto him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And every man shall draw after him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'As '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there are
  - type: text
    text: ' innumerable before him.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: How then comfort ye me in vain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Seeing in your answers there remaineth falsehood?
