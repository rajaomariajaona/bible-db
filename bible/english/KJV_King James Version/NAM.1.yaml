segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The burden of Nineveh. The book of the vision of Nahum the Elkoshite.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Wrath of God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' jealous, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' revengeth; the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' revengeth, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' furious; the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will take vengeance on his adversaries, and he reserveth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: wrath
  - type: text
    text: ' for his enemies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' slow to anger, and great in power, and will not at all acquit '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'the wicked:'
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hath
  - type: text
    text: ' his way in the whirlwind and in the storm, and the clouds '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the dust of his feet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He rebuketh the sea, and maketh it dry, and drieth up all the rivers: Bashan languisheth, and Carmel, and the flower of Lebanon languisheth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The mountains quake at him, and the hills melt, and the earth is burned at his presence, yea, the world, and all that dwell therein. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Who can stand before his indignation? and who can abide in the fierceness of his anger? his fury is poured out like fire, and the rocks are thrown down by him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' good, a strong hold in the day of trouble; and he knoweth them that trust in him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But with an overrunning flood he will make an utter end of the place thereof, and darkness shall pursue his enemies.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'What do ye imagine against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '? he will make an utter end: affliction shall not rise up the second time. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For while '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they be
  - type: text
    text: ' folden together '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' thorns, and while they are drunken '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' drunkards, they shall be devoured as stubble fully dry.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'There is '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' come out of thee, that imagineth evil against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', a wicked counsellor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; Though '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they be
  - type: text
    text: ' quiet, and likewise many, yet thus shall they be cut down, when he shall pass through. Though I have afflicted thee, I will afflict thee no more. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: For now will I break his yoke from off thee, and will burst thy bonds in sunder.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath given a commandment concerning thee, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' no more of thy name be sown: out of the house of thy gods will I cut off the graven image and the molten image: I will make thy grave; for thou art vile.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Behold upon the mountains the feet of him that bringeth good tidings, that publisheth peace! O Judah, keep thy solemn feasts, perform thy vows: for the wicked shall no more pass through thee; he is utterly cut off.'
