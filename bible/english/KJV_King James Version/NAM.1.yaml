  '1':
  - type: text
    content: The burden of Nineveh. The book of the vision of Nahum the Elkoshite.
  - type: heading
    content: The Wrath of God
  '10':
  - type: text
    content: 'For while '
  - type: text
    content: they be
  - type: text
    content: ' folden together '
  - type: text
    content: as
  - type: text
    content: ' thorns, and while they are drunken '
  - type: text
    content: as
  - type: text
    content: ' drunkards, they shall be devoured as stubble fully dry.'
  '11':
  - type: text
    content: 'There is '
  - type: text
    content: one
  - type: text
    content: ' come out of thee, that imagineth evil against the '
  - type: text
    content: LORD
  - type: text
    content: ', a wicked counsellor. '
  '12':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; Though '
  - type: text
    content: they be
  - type: text
    content: ' quiet, and likewise many, yet thus shall they be cut down, when he shall pass through. Though I have afflicted thee, I will afflict thee no more. '
  '13':
  - type: text
    content: For now will I break his yoke from off thee, and will burst thy bonds in sunder.
  '14':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' hath given a commandment concerning thee, '
  - type: text
    content: that
  - type: text
    content: ' no more of thy name be sown: out of the house of thy gods will I cut off the graven image and the molten image: I will make thy grave; for thou art vile.'
  '15':
  - type: text
    content: 'Behold upon the mountains the feet of him that bringeth good tidings, that publisheth peace! O Judah, keep thy solemn feasts, perform thy vows: for the wicked shall no more pass through thee; he is utterly cut off.'
  '2':
  - type: text
    content: 'God '
  - type: text
    content: is
  - type: text
    content: ' jealous, and the '
  - type: text
    content: LORD
  - type: text
    content: ' revengeth; the '
  - type: text
    content: LORD
  - type: text
    content: ' revengeth, and '
  - type: text
    content: is
  - type: text
    content: ' furious; the '
  - type: text
    content: LORD
  - type: text
    content: ' will take vengeance on his adversaries, and he reserveth '
  - type: text
    content: wrath
  - type: text
    content: ' for his enemies. '
  '3':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' slow to anger, and great in power, and will not at all acquit '
  - type: text
    content: 'the wicked:'
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: hath
  - type: text
    content: ' his way in the whirlwind and in the storm, and the clouds '
  - type: text
    content: are
  - type: text
    content: ' the dust of his feet. '
  '4':
  - type: text
    content: 'He rebuketh the sea, and maketh it dry, and drieth up all the rivers: Bashan languisheth, and Carmel, and the flower of Lebanon languisheth. '
  '5':
  - type: text
    content: 'The mountains quake at him, and the hills melt, and the earth is burned at his presence, yea, the world, and all that dwell therein. '
  '6':
  - type: text
    content: 'Who can stand before his indignation? and who can abide in the fierceness of his anger? his fury is poured out like fire, and the rocks are thrown down by him. '
  '7':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' good, a strong hold in the day of trouble; and he knoweth them that trust in him. '
  '8':
  - type: text
    content: But with an overrunning flood he will make an utter end of the place thereof, and darkness shall pursue his enemies.
  '9':
  - type: text
    content: 'What do ye imagine against the '
  - type: text
    content: LORD
  - type: text
    content: '? he will make an utter end: affliction shall not rise up the second time. '
