document_id: JOB.2,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Again there was a day when the sons of God came to present themselves before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and Satan came also among them to present himself before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: But he said unto her, Thou speakest as one of the foolish women speaketh. What? shall we receive good at the hand of God, and shall we not receive evil? In all this did not Job sin with his lips.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: His Friends
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Now when Job''s three friends heard of all this evil that was come upon him, they came every one from his own place; Eliphaz the Temanite, and Bildad the Shuhite, and Zophar the Naamathite: for they had made an appointment together to come to mourn with him and to comfort him. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And when they lifted up their eyes afar off, and knew him not, they lifted up their voice, and wept; and they rent every one his mantle, and sprinkled dust upon their heads toward heaven. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'So they sat down with him upon the ground seven days and seven nights, and none spake a word unto him: for they saw that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' grief was very great.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Satan, From whence comest thou? And Satan answered the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and said, From going to and fro in the earth, and from walking up and down in it. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Satan, Hast thou considered my servant Job, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none like him in the earth, a perfect and an upright man, one that feareth God, and escheweth evil? and still he holdeth fast his integrity, although thou movedst me against him, to destroy him without cause. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And Satan answered the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and said, Skin for skin, yea, all that a man hath will he give for his life. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'But put forth thine hand now, and touch his bone and his flesh, and he will curse thee to thy face. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Satan, Behold, he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in thine hand; but save his life.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So went Satan forth from the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and smote Job with sore boils from the sole of his foot unto his crown. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And he took him a potsherd to scrape himself withal; and he sat down among the ashes. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then said his wife unto him, Dost thou still retain thine integrity? curse God, and die. '
