document_id: JOB.15,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Eliphaz Speaks
  - type: text
    content: Then answered Eliphaz the Temanite, and said,
  '10':
  - type: text
    content: 'With us '
  - type: text
    content: are
  - type: text
    content: ' both the grayheaded and very aged men,'
  - type: text
    content: Much elder than thy father.
  '11':
  - type: text
    content: ' '
  - type: text
    content: Are
  - type: text
    content: ' the consolations of God small with thee?'
  - type: text
    content: Is there any secret thing with thee?
  '12':
  - type: text
    content: Why doth thine heart carry thee away?
  - type: text
    content: And what do thy eyes wink at,
  '13':
  - type: text
    content: That thou turnest thy spirit against God,
  - type: text
    content: 'And lettest '
  - type: text
    content: such
  - type: text
    content: ' words go out of thy mouth?'
  '14':
  - type: text
    content: 'What '
  - type: text
    content: is
  - type: text
    content: ' man, that he should be clean?'
  - type: text
    content: 'And '
  - type: text
    content: he which is
  - type: text
    content: ' born of a woman, that he should be righteous?'
  '15':
  - type: text
    content: Behold, he putteth no trust in his saints;
  - type: text
    content: Yea, the heavens are not clean in his sight.
  '16':
  - type: text
    content: 'How much more abominable and filthy '
  - type: text
    content: is
  - type: text
    content: ' man,'
  - type: text
    content: Which drinketh iniquity like water?
  '17':
  - type: text
    content: I will shew thee, hear me;
  - type: text
    content: 'And that '
  - type: text
    content: which
  - type: text
    content: ' I have seen I will declare;'
  '18':
  - type: text
    content: Which wise men have told
  - type: text
    content: 'From their fathers, and have not hid '
  - type: text
    content: 'it:'
  '19':
  - type: text
    content: Unto whom alone the earth was given,
  - type: text
    content: And no stranger passed among them.
  '2':
  - type: text
    content: Should a wise man utter vain knowledge,
  - type: text
    content: And fill his belly with the east wind?
  '20':
  - type: text
    content: 'The wicked man travaileth with pain all '
  - type: text
    content: his
  - type: text
    content: ' days,'
  - type: text
    content: And the number of years is hidden to the oppressor.
  '21':
  - type: text
    content: 'A dreadful sound '
  - type: text
    content: is
  - type: text
    content: ' in his ears:'
  - type: text
    content: In prosperity the destroyer shall come upon him.
  '22':
  - type: text
    content: He believeth not that he shall return out of darkness,
  - type: text
    content: And he is waited for of the sword.
  '23':
  - type: text
    content: 'He wandereth abroad for bread, '
  - type: text
    content: saying
  - type: text
    content: ', Where '
  - type: text
    content: is it?
  - type: text
    content: He knoweth that the day of darkness is ready at his hand.
  '24':
  - type: text
    content: Trouble and anguish shall make him afraid;
  - type: text
    content: They shall prevail against him, as a king ready to the battle.
  '25':
  - type: text
    content: For he stretcheth out his hand against God,
  - type: text
    content: And strengtheneth himself against the Almighty.
  '26':
  - type: text
    content: 'He runneth upon him, '
  - type: text
    content: even
  - type: text
    content: ' on '
  - type: text
    content: his
  - type: text
    content: ' neck,'
  - type: text
    content: 'Upon the thick bosses of his bucklers:'
  '27':
  - type: text
    content: Because he covereth his face with his fatness,
  - type: text
    content: 'And maketh collops of fat on '
  - type: text
    content: his
  - type: text
    content: ' flanks.'
  '28':
  - type: text
    content: And he dwelleth in desolate cities,
  - type: text
    content: And
  - type: text
    content: ' in houses which no man inhabiteth,'
  - type: text
    content: Which are ready to become heaps.
  '29':
  - type: text
    content: He shall not be rich, neither shall his substance continue,
  - type: text
    content: Neither shall he prolong the perfection thereof upon the earth.
  '3':
  - type: text
    content: Should he reason with unprofitable talk?
  - type: text
    content: Or with speeches wherewith he can do no good?
  '30':
  - type: text
    content: He shall not depart out of darkness;
  - type: text
    content: The flame shall dry up his branches,
  - type: text
    content: And by the breath of his mouth shall he go away.
  '31':
  - type: text
    content: 'Let not him that is deceived trust in vanity:'
  - type: text
    content: For vanity shall be his recompence.
  '32':
  - type: text
    content: It shall be accomplished before his time,
  - type: text
    content: And his branch shall not be green.
  '33':
  - type: text
    content: He shall shake off his unripe grape as the vine,
  - type: text
    content: And shall cast off his flower as the olive.
  '34':
  - type: text
    content: 'For the congregation of hypocrites '
  - type: text
    content: shall be
  - type: text
    content: ' desolate,'
  - type: text
    content: And fire shall consume the tabernacles of bribery.
  '35':
  - type: text
    content: They conceive mischief, and bring forth vanity,
  - type: text
    content: And their belly prepareth deceit.
  '4':
  - type: text
    content: Yea, thou castest off fear,
  - type: text
    content: And restrainest prayer before God.
  '5':
  - type: text
    content: For thy mouth uttereth thine iniquity,
  - type: text
    content: And thou choosest the tongue of the crafty.
  '6':
  - type: text
    content: 'Thine own mouth condemneth thee, and not I:'
  - type: text
    content: Yea, thine own lips testify against thee.
  '7':
  - type: text
    content: ' '
  - type: text
    content: Art
  - type: text
    content: ' thou the first man '
  - type: text
    content: that
  - type: text
    content: ' was born?'
  - type: text
    content: Or wast thou made before the hills?
  '8':
  - type: text
    content: Hast thou heard the secret of God?
  - type: text
    content: And dost thou restrain wisdom to thyself?
  '9':
  - type: text
    content: What knowest thou, that we know not?
  - type: text
    content: What
  - type: text
    content: ' understandest thou, which '
  - type: text
    content: is
  - type: text
    content: ' not in us?'
