document_id: JOB.15,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Eliphaz Speaks
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then answered Eliphaz the Temanite, and said,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'With us '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' both the grayheaded and very aged men,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Much elder than thy father.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Are
    - type: text
      text: ' the consolations of God small with thee?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Is there any secret thing with thee?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why doth thine heart carry thee away?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And what do thy eyes wink at,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That thou turnest thy spirit against God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And lettest '
    - type: usfm
      marker: add
      children:
      - type: text
        text: such
    - type: text
      text: ' words go out of thy mouth?'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' man, that he should be clean?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he which is
    - type: text
      text: ' born of a woman, that he should be righteous?'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold, he putteth no trust in his saints;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yea, the heavens are not clean in his sight.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'How much more abominable and filthy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' man,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Which drinketh iniquity like water?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will shew thee, hear me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' I have seen I will declare;'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which wise men have told
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'From their fathers, and have not hid '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'it:'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Unto whom alone the earth was given,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And no stranger passed among them.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Should a wise man utter vain knowledge,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And fill his belly with the east wind?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The wicked man travaileth with pain all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' days,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the number of years is hidden to the oppressor.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A dreadful sound '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in his ears:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In prosperity the destroyer shall come upon him.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He believeth not that he shall return out of darkness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he is waited for of the sword.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He wandereth abroad for bread, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: saying
    - type: text
      text: ', Where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is it?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He knoweth that the day of darkness is ready at his hand.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Trouble and anguish shall make him afraid;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They shall prevail against him, as a king ready to the battle.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he stretcheth out his hand against God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And strengtheneth himself against the Almighty.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He runneth upon him, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' on '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' neck,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Upon the thick bosses of his bucklers:'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because he covereth his face with his fatness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And maketh collops of fat on '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' flanks.'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he dwelleth in desolate cities,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' in houses which no man inhabiteth,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Which are ready to become heaps.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He shall not be rich, neither shall his substance continue,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Neither shall he prolong the perfection thereof upon the earth.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Should he reason with unprofitable talk?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or with speeches wherewith he can do no good?
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He shall not depart out of darkness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The flame shall dry up his branches,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And by the breath of his mouth shall he go away.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let not him that is deceived trust in vanity:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For vanity shall be his recompence.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It shall be accomplished before his time,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his branch shall not be green.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He shall shake off his unripe grape as the vine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And shall cast off his flower as the olive.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the congregation of hypocrites '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' desolate,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And fire shall consume the tabernacles of bribery.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They conceive mischief, and bring forth vanity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their belly prepareth deceit.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yea, thou castest off fear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And restrainest prayer before God.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For thy mouth uttereth thine iniquity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thou choosest the tongue of the crafty.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thine own mouth condemneth thee, and not I:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yea, thine own lips testify against thee.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Art
    - type: text
      text: ' thou the first man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' was born?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or wast thou made before the hills?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hast thou heard the secret of God?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And dost thou restrain wisdom to thyself?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What knowest thou, that we know not?
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: What
    - type: text
      text: ' understandest thou, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not in us?'
