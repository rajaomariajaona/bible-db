document_id: PSA.26,1
type_code: eng
verses:
  '1':
  - type: text
    content: A Psalm
  - type: text
    content: ' of David.'
  - type: text
    content: 'Judge me, O '
  - type: text
    content: LORD
  - type: text
    content: '; for I have walked in mine integrity:'
  - type: text
    content: 'I have trusted also in the '
  - type: text
    content: LORD
  - type: text
    content: '; '
  - type: text
    content: therefore
  - type: text
    content: ' I shall not slide.'
  '10':
  - type: text
    content: 'In whose hands '
  - type: text
    content: is
  - type: text
    content: ' mischief,'
  - type: text
    content: And their right hand is full of bribes.
  '11':
  - type: text
    content: 'But as for me, I will walk in mine integrity:'
  - type: text
    content: Redeem me, and be merciful unto me.
  '12':
  - type: text
    content: 'My foot standeth in an even place:'
  - type: text
    content: 'In the congregations will I bless the '
  - type: text
    content: LORD
  - type: text
    content: .
  '2':
  - type: text
    content: 'Examine me, O '
  - type: text
    content: LORD
  - type: text
    content: ', and prove me;'
  - type: text
    content: Try my reins and my heart.
  '3':
  - type: text
    content: 'For thy lovingkindness '
  - type: text
    content: is
  - type: text
    content: ' before mine eyes:'
  - type: text
    content: And I have walked in thy truth.
  '4':
  - type: text
    content: I have not sat with vain persons,
  - type: text
    content: Neither will I go in with dissemblers.
  '5':
  - type: text
    content: I have hated the congregation of evil doers;
  - type: text
    content: And will not sit with the wicked.
  '6':
  - type: text
    content: 'I will wash mine hands in innocency:'
  - type: text
    content: 'So will I compass thine altar, O '
  - type: text
    content: LORD
  - type: text
    content: ':'
  '7':
  - type: text
    content: That I may publish with the voice of thanksgiving,
  - type: text
    content: And tell of all thy wondrous works.
  '8':
  - type: text
    content: ' '
  - type: text
    content: LORD
  - type: text
    content: ', I have loved the habitation of thy house,'
  - type: text
    content: And the place where thine honour dwelleth.
  '9':
  - type: text
    content: Gather not my soul with sinners,
  - type: text
    content: 'Nor my life with bloody men:'
