document_id: PSA.26,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: A Psalm
    - type: text
      text: ' of David.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Judge me, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; for I have walked in mine integrity:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I have trusted also in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: therefore
    - type: text
      text: ' I shall not slide.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In whose hands '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' mischief,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their right hand is full of bribes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But as for me, I will walk in mine integrity:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Redeem me, and be merciful unto me.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My foot standeth in an even place:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In the congregations will I bless the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Examine me, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and prove me;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Try my reins and my heart.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For thy lovingkindness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' before mine eyes:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I have walked in thy truth.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have not sat with vain persons,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Neither will I go in with dissemblers.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have hated the congregation of evil doers;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And will not sit with the wicked.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will wash mine hands in innocency:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'So will I compass thine altar, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ':'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That I may publish with the voice of thanksgiving,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And tell of all thy wondrous works.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', I have loved the habitation of thy house,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the place where thine honour dwelleth.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gather not my soul with sinners,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Nor my life with bloody men:'
