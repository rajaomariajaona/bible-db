document_id: DEU.13,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If there arise among you a prophet, or a dreamer of dreams, and giveth thee a sign or a wonder, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And thou shalt stone him with stones, that he die; because he hath sought to thrust thee away from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God, which brought thee out of the land of Egypt, from the house of bondage. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And all Israel shall hear, and fear, and shall do no more any such wickedness as this is among you.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If thou shalt hear '
    - type: usfm
      marker: add
      children:
      - type: text
        text: say
    - type: text
      text: ' in one of thy cities, which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God hath given thee to dwell there, saying, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Certain
    - type: text
      text: ' men, the children of Belial, are gone out from among you, and have withdrawn the inhabitants of their city, saying, Let us go and serve other gods, which ye have not known; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then shalt thou enquire, and make search, and ask diligently; and, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: if it be
    - type: text
      text: ' truth, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the thing certain, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' such abomination is wrought among you; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'thou shalt surely smite the inhabitants of that city with the edge of the sword, destroying it utterly, and all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' therein, and the cattle thereof, with the edge of the sword. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And thou shalt gather all the spoil of it into the midst of the street thereof, and shalt burn with fire the city, and all the spoil thereof every whit, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God: and it shall be an heap for ever; it shall not be built again. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there shall cleave nought of the cursed thing to thine hand: that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' may turn from the fierceness of his anger, and shew thee mercy, and have compassion upon thee, and multiply thee, as he hath sworn unto thy fathers; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'when thou shalt hearken to the voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God, to keep all his commandments which I command thee this day, to do '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which is
    - type: text
      text: ' right in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the sign or the wonder come to pass, whereof he spake unto thee, saying, Let us go after other gods, which thou hast not known, and let us serve them; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'thou shalt not hearken unto the words of that prophet, or that dreamer of dreams: for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God proveth you, to know whether ye love the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God with all your heart and with all your soul. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ye shall walk after the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God, and fear him, and keep his commandments, and obey his voice, and ye shall serve him, and cleave unto him. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And that prophet, or that dreamer of dreams, shall be put to death; because he hath spoken to turn '
    - type: usfm
      marker: add
      children:
      - type: text
        text: you
    - type: text
      text: ' away from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God, which brought you out of the land of Egypt, and redeemed you out of the house of bondage, to thrust thee out of the way which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God commanded thee to walk in. So shalt thou put the evil away from the midst of thee.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If thy brother, the son of thy mother, or thy son, or thy daughter, or the wife of thy bosom, or thy friend, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' as thine own soul, entice thee secretly, saying, Let us go and serve other gods, which thou hast not known, thou, nor thy fathers; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: namely
    - type: text
      text: ', of the gods of the people which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' round about you, nigh unto thee, or far off from thee, from the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' end of the earth even unto the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: other
    - type: text
      text: ' end of the earth; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'thou shalt not consent unto him, nor hearken unto him; neither shall thine eye pity him, neither shalt thou spare, neither shalt thou conceal him: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but thou shalt surely kill him; thine hand shall be first upon him to put him to death, and afterwards the hand of all the people. '
