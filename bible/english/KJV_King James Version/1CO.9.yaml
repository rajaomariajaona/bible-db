document_id: 1CO.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Am I not an apostle? am I not free? have I not seen Jesus Christ our Lord? are not ye my work in the Lord? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'If I be not an apostle unto others, yet doubtless I am to you: for the seal of mine apostleship are ye in the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mine answer to them that do examine me is this, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Have we not power to eat and to drink? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Have we not power to lead about a sister, a wife, as well as other apostles, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' the brethren of the Lord, and Cephas? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Or I only and Barnabas, have not we power to forbear working? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Who goeth a warfare any time at his own charges? who planteth a vineyard, and eateth not of the fruit thereof? or who feedeth a flock, and eateth not of the milk of the flock? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Say I these things as a man? or saith not the law the same also? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For it is written in the law of Moses, Thou shalt not muzzle the mouth of the ox that treadeth out the corn. Doth God take care for oxen? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Or saith he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' altogether for our sakes? For our sakes, no doubt, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' is written: that he that ploweth should plow in hope; and that he that thresheth in hope should be partaker of his hope. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'If we have sown unto you spiritual things, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is it
  - type: text
    text: ' a great thing if we shall reap your carnal things? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'If others be partakers of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' power over you, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' not we rather? Nevertheless we have not used this power; but suffer all things, lest we should hinder the gospel of Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Do ye not know that they which minister about holy things live '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of the things
  - type: text
    text: ' of the temple? and they which wait at the altar are partakers with the altar? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Even so hath the Lord ordained that they which preach the gospel should live of the gospel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But I have used none of these things: neither have I written these things, that it should be so done unto me: for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it were
  - type: text
    text: ' better for me to die, than that any man should make my glorying void. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For though I preach the gospel, I have nothing to glory of: for necessity is laid upon me; yea, woe is unto me, if I preach not the gospel! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For if I do this thing willingly, I have a reward: but if against my will, a dispensation '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of the gospel
  - type: text
    text: ' is committed unto me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'What is my reward then? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Verily
  - type: text
    text: ' that, when I preach the gospel, I may make the gospel of Christ without charge, that I abuse not my power in the gospel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For though I be free from all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ', yet have I made myself servant unto all, that I might gain the more. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And unto the Jews I became as a Jew, that I might gain the Jews; to them that are under the law, as under the law, that I might gain them that are under the law; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'to them that are without law, as without law, (being not without law to God, but under the law to Christ,) that I might gain them that are without law. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'To the weak became I as weak, that I might gain the weak: I am made all things to all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ', that I might by all means save some. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And this I do for the gospel''s sake, that I might be partaker thereof with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Know ye not that they which run in a race run all, but one receiveth the prize? So run, that ye may obtain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And every man that striveth for the mastery is temperate in all things. Now they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: do it
  - type: text
    text: ' to obtain a corruptible crown; but we an incorruptible. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'I therefore so run, not as uncertainly; so fight I, not as one that beateth the air: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'but I keep under my body, and bring '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' into subjection: lest that by any means, when I have preached to others, I myself should be a castaway.'
