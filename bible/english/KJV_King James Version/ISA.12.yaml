segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And in that day thou shalt say, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', I will praise thee: though thou wast angry with me, thine anger is turned away, and thou comfortedst me. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Behold, God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my salvation; I will trust, and not be afraid: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' JEHOVAH '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my strength and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my
  - type: text
    text: ' song; he also is become my salvation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Therefore with joy shall ye draw water out of the wells of salvation. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And in that day shall ye say, Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', call upon his name, declare his doings among the people, make mention that his name is exalted. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Sing unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; for he hath done excellent things: this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' known in all the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Cry out and shout, thou inhabitant of Zion: for great '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the Holy One of Israel in the midst of thee.'
