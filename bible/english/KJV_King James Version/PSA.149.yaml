    - type: usfm
      marker: add
      children:
      - type: text
        text: Let
    - type: text
      text: ' the high '
    - type: usfm
      marker: add
      children:
      - type: text
        text: praises
    - type: text
      text: ' of God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' in their mouth,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a twoedged sword in their hand;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: To execute vengeance upon the heathen,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' punishments upon the people;'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: To bind their kings with chains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their nobles with fetters of iron;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
