    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Let Israel rejoice in him that made him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let the children of Zion be joyful in their King.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Let them praise his name in the dance:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them sing praises unto him with the timbrel and harp.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' taketh pleasure in his people:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will beautify the meek with salvation.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Let the saints be joyful in glory:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them sing aloud upon their beds.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
