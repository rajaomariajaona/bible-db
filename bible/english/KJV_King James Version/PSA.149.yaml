  '2':
  - type: text
    content: 'Let Israel rejoice in him that made him:'
  - type: text
    content: Let the children of Zion be joyful in their King.
  '3':
  - type: text
    content: 'Let them praise his name in the dance:'
  - type: text
    content: Let them sing praises unto him with the timbrel and harp.
  '4':
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ' taketh pleasure in his people:'
  - type: text
    content: He will beautify the meek with salvation.
  '5':
  - type: text
    content: 'Let the saints be joyful in glory:'
  - type: text
    content: Let them sing aloud upon their beds.
  '6':
  - type: text
    content: ' '
  - type: text
