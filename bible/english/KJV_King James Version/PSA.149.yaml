  - type: text
    content: ' in their mouth,'
  - type: text
    content: And a twoedged sword in their hand;
  '7':
  - type: text
    content: To execute vengeance upon the heathen,
  - type: text
    content: And
  - type: text
    content: ' punishments upon the people;'
  '8':
  - type: text
    content: To bind their kings with chains,
  - type: text
    content: And their nobles with fetters of iron;
  '9':
  - type: text
