document_id: 1CH.18
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: David's Conquests
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now after this it came to pass, that David smote the Philistines, and subdued them, and took Gath and her towns out of the hand of the Philistines. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he smote Moab; and the Moabites became David''s servants, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' brought gifts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And David smote Hadarezer king of Zobah unto Hamath, as he went to stablish his dominion by the river Euphrates. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And David took from him a thousand chariots, and seven thousand horsemen, and twenty thousand footmen: David also houghed all the chariot '
  - type: usfm
    marker: add
    children:
    - type: text
      text: horses
  - type: text
    text: ', but reserved of them an hundred chariots.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And when the Syrians of Damascus came to help Hadarezer king of Zobah, David slew of the Syrians two and twenty thousand men. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then David put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: garrisons
  - type: text
    text: ' in Syria-damascus; and the Syrians became David''s servants, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' brought gifts. Thus the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' preserved David whithersoever he went. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And David took the shields of gold that were on the servants of Hadarezer, and brought them to Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Likewise from Tibhath, and from Chun, cities of Hadarezer, brought David very much brass, wherewith Solomon made the brasen sea, and the pillars, and the vessels of brass.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now when Tou king of Hamath heard how David had smitten all the host of Hadarezer king of Zobah; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'he sent Hadoram his son to king David, to enquire of his welfare, and to congratulate him, because he had fought against Hadarezer, and smitten him; (for Hadarezer had war with Tou;) and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with him
  - type: text
    text: ' all manner of vessels of gold and silver and brass. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Them also king David dedicated unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', with the silver and the gold that he brought from all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: these
  - type: text
    text: ' nations; from Edom, and from Moab, and from the children of Ammon, and from the Philistines, and from Amalek.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Moreover Abishai the son of Zeruiah slew of the Edomites in the valley of salt eighteen thousand. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And he put garrisons in Edom; and all the Edomites became David''s servants. Thus the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' preserved David whithersoever he went.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So David reigned over all Israel, and executed judgment and justice among all his people. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Joab the son of Zeruiah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' over the host; and Jehoshaphat the son of Ahilud, recorder. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And Zadok the son of Ahitub, and Abimelech the son of Abiathar, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' the priests; and Shavsha was scribe; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'and Benaiah the son of Jehoiada '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' over the Cherethites and the Pelethites; and the sons of David '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' chief about the king.'
