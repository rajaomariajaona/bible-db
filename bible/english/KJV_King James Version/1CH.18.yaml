document_id: 1CH.18,1
type_code: eng
verses:
  '1':
  - type: heading
    content: David's Conquests
  - type: text
    content: 'Now after this it came to pass, that David smote the Philistines, and subdued them, and took Gath and her towns out of the hand of the Philistines. '
  '10':
  - type: text
    content: 'he sent Hadoram his son to king David, to enquire of his welfare, and to congratulate him, because he had fought against Hadarezer, and smitten him; (for Hadarezer had war with Tou;) and '
  - type: text
    content: with him
  - type: text
    content: ' all manner of vessels of gold and silver and brass. '
  '11':
  - type: text
    content: 'Them also king David dedicated unto the '
  - type: text
    content: LORD
  - type: text
    content: ', with the silver and the gold that he brought from all '
  - type: text
    content: these
  - type: text
    content: ' nations; from Edom, and from Moab, and from the children of Ammon, and from the Philistines, and from Amalek.'
  '12':
  - type: text
    content: 'Moreover Abishai the son of Zeruiah slew of the Edomites in the valley of salt eighteen thousand. '
  '13':
  - type: text
    content: 'And he put garrisons in Edom; and all the Edomites became David''s servants. Thus the '
  - type: text
    content: LORD
  - type: text
    content: ' preserved David whithersoever he went.'
  '14':
  - type: text
    content: 'So David reigned over all Israel, and executed judgment and justice among all his people. '
  '15':
  - type: text
    content: 'And Joab the son of Zeruiah '
  - type: text
    content: was
  - type: text
    content: ' over the host; and Jehoshaphat the son of Ahilud, recorder. '
  '16':
  - type: text
    content: 'And Zadok the son of Ahitub, and Abimelech the son of Abiathar, '
  - type: text
    content: were
  - type: text
    content: ' the priests; and Shavsha was scribe; '
  '17':
  - type: text
    content: 'and Benaiah the son of Jehoiada '
  - type: text
    content: was
  - type: text
    content: ' over the Cherethites and the Pelethites; and the sons of David '
  - type: text
    content: were
  - type: text
    content: ' chief about the king.'
  '2':
  - type: text
    content: 'And he smote Moab; and the Moabites became David''s servants, '
  - type: text
    content: and
  - type: text
    content: ' brought gifts.'
  '3':
  - type: text
    content: 'And David smote Hadarezer king of Zobah unto Hamath, as he went to stablish his dominion by the river Euphrates. '
  '4':
  - type: text
    content: 'And David took from him a thousand chariots, and seven thousand horsemen, and twenty thousand footmen: David also houghed all the chariot '
  - type: text
    content: horses
  - type: text
    content: ', but reserved of them an hundred chariots.'
  '5':
  - type: text
    content: 'And when the Syrians of Damascus came to help Hadarezer king of Zobah, David slew of the Syrians two and twenty thousand men. '
  '6':
  - type: text
    content: 'Then David put '
  - type: text
    content: garrisons
  - type: text
    content: ' in Syria-damascus; and the Syrians became David''s servants, '
  - type: text
    content: and
  - type: text
    content: ' brought gifts. Thus the '
  - type: text
    content: LORD
  - type: text
    content: ' preserved David whithersoever he went. '
  '7':
  - type: text
    content: 'And David took the shields of gold that were on the servants of Hadarezer, and brought them to Jerusalem. '
  '8':
  - type: text
    content: Likewise from Tibhath, and from Chun, cities of Hadarezer, brought David very much brass, wherewith Solomon made the brasen sea, and the pillars, and the vessels of brass.
  '9':
  - type: text
    content: 'Now when Tou king of Hamath heard how David had smitten all the host of Hadarezer king of Zobah; '
