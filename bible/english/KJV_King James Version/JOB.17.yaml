document_id: JOB.17,1
type_code: eng
verses:
  '1':
  - type: text
    content: My breath is corrupt, my days are extinct,
  - type: text
    content: 'The graves '
  - type: text
    content: are ready
  - type: text
    content: ' for me.'
  '10':
  - type: text
    content: 'But as for you all, do ye return, and come now:'
  - type: text
    content: 'For I cannot find '
  - type: text
    content: one
  - type: text
    content: ' wise '
  - type: text
    content: man
  - type: text
    content: ' among you.'
  '11':
  - type: text
    content: My days are past, my purposes are broken off,
  - type: text
    content: Even
  - type: text
    content: ' the thoughts of my heart.'
  '12':
  - type: text
    content: 'They change the night into day:'
  - type: text
    content: 'The light '
  - type: text
    content: is
  - type: text
    content: ' short because of darkness.'
  '13':
  - type: text
    content: 'If I wait, the grave '
  - type: text
    content: is
  - type: text
    content: ' mine house:'
  - type: text
    content: I have made my bed in the darkness.
  '14':
  - type: text
    content: 'I have said to corruption, Thou '
  - type: text
    content: art
  - type: text
    content: ' my father:'
  - type: text
    content: 'To the worm, '
  - type: text
    content: Thou art
  - type: text
    content: ' my mother, and my sister.'
  '15':
  - type: text
    content: 'And where '
  - type: text
    content: is
  - type: text
    content: ' now my hope?'
  - type: text
    content: As for my hope, who shall see it?
  '16':
  - type: text
    content: They shall go down to the bars of the pit,
  - type: text
    content: 'When '
  - type: text
    content: our
  - type: text
    content: ' rest together '
  - type: text
    content: is
  - type: text
    content: ' in the dust.'
  '2':
  - type: text
    content: ' '
  - type: text
    content: Are there
  - type: text
    content: ' not mockers with me?'
  - type: text
    content: And doth not mine eye continue in their provocation?
  '3':
  - type: text
    content: Lay down now, put me in a surety with thee;
  - type: text
    content: 'Who '
  - type: text
    content: is
  - type: text
    content: ' he '
  - type: text
    content: that
  - type: text
    content: ' will strike hands with me?'
  '4':
  - type: text
    content: 'For thou hast hid their heart from understanding:'
  - type: text
    content: 'Therefore shalt thou not exalt '
  - type: text
    content: them
  - type: text
    content: .
  '5':
  - type: text
    content: 'He that speaketh flattery to '
  - type: text
    content: his
  - type: text
    content: ' friends,'
  - type: text
    content: Even the eyes of his children shall fail.
  '6':
  - type: text
    content: He hath made me also a byword of the people;
  - type: text
    content: And aforetime I was as a tabret.
  '7':
  - type: text
    content: Mine eye also is dim by reason of sorrow,
  - type: text
    content: 'And all my members '
  - type: text
    content: are
  - type: text
    content: ' as a shadow.'
  '8':
  - type: text
    content: 'Upright '
  - type: text
    content: men
  - type: text
    content: ' shall be astonied at this,'
  - type: text
    content: And the innocent shall stir up himself against the hypocrite.
  '9':
  - type: text
    content: The righteous also shall hold on his way,
  - type: text
    content: And he that hath clean hands shall be stronger and stronger.
