document_id: JOB.17,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: My breath is corrupt, my days are extinct,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The graves '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are ready
    - type: text
      text: ' for me.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'But as for you all, do ye return, and come now:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For I cannot find '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' among you.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: My days are past, my purposes are broken off,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Even
    - type: text
      text: ' the thoughts of my heart.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'They change the night into day:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The light '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' short because of darkness.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'If I wait, the grave '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' mine house:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have made my bed in the darkness.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'I have said to corruption, Thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' my father:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To the worm, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Thou art
    - type: text
      text: ' my mother, and my sister.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' now my hope?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As for my hope, who shall see it?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: They shall go down to the bars of the pit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When '
    - type: usfm
      marker: add
      children:
      - type: text
        text: our
    - type: text
      text: ' rest together '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the dust.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Are there
    - type: text
      text: ' not mockers with me?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And doth not mine eye continue in their provocation?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Lay down now, put me in a surety with thee;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' will strike hands with me?'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For thou hast hid their heart from understanding:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Therefore shalt thou not exalt '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'He that speaketh flattery to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' friends,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Even the eyes of his children shall fail.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: He hath made me also a byword of the people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And aforetime I was as a tabret.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mine eye also is dim by reason of sorrow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And all my members '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' as a shadow.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Upright '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' shall be astonied at this,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the innocent shall stir up himself against the hypocrite.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: The righteous also shall hold on his way,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he that hath clean hands shall be stronger and stronger.
