document_id: GEN.38
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Tribal History
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And it came to pass at that time, that Judah went down from his brethren, and turned in to a certain Adullamite, whose name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Hirah. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Judah saw there a daughter of a certain Canaanite, whose name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Shuah; and he took her, and went in unto her. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And she conceived, and bare a son; and he called his name Er. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And she conceived again, and bare a son; and she called his name Onan. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And she yet again conceived, and bare a son; and called his name Shelah: and he was at Chezib, when she bare him. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Judah took a wife for Er his firstborn, whose name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Tamar. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And Er, Judah''s firstborn, was wicked in the sight of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' slew him. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Judah said unto Onan, Go in unto thy brother''s wife, and marry her, and raise up seed to thy brother. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And Onan knew that the seed should not be his; and it came to pass, when he went in unto his brother''s wife, that he spilled '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' on the ground, lest that he should give seed to his brother. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the thing which he did displeased the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': wherefore he slew him also. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then said Judah to Tamar his daughter in law, Remain a widow at thy father''s house, till Shelah my son be grown: for he said, Lest peradventure he die also, as his brethren '
  - type: usfm
    marker: add
    children:
    - type: text
      text: did
  - type: text
    text: . And Tamar went and dwelt in her father's house.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And in process of time the daughter of Shuah Judah''s wife died; and Judah was comforted, and went up unto his sheepshearers to Timnath, he and his friend Hirah the Adullamite. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And it was told Tamar, saying, Behold thy father in law goeth up to Timnath to shear his sheep. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And she put her widow''s garments off from her, and covered her with a vail, and wrapped herself, and sat in an open place, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' by the way to Timnath; for she saw that Shelah was grown, and she was not given unto him to wife. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'When Judah saw her, he thought her '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' an harlot; because she had covered her face. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And he turned unto her by the way, and said, Go to, I pray thee, let me come in unto thee; (for he knew not that she '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' his daughter in law.) And she said, What wilt thou give me, that thou mayest come in unto me? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And he said, I will send '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thee
  - type: text
    text: ' a kid from the flock. And she said, Wilt thou give '
  - type: usfm
    marker: add
    children:
    - type: text
      text: me
  - type: text
    text: ' a pledge, till thou send '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And he said, What pledge shall I give thee? And she said, Thy signet, and thy bracelets, and thy staff that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in thine hand. And he gave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' her, and came in unto her, and she conceived by him. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And she arose, and went away, and laid by her vail from her, and put on the garments of her widowhood. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Judah sent the kid by the hand of his friend the Adullamite, to receive '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' pledge from the woman''s hand: but he found her not. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then he asked the men of that place, saying, Where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the harlot, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' openly by the way side? And they said, There was no harlot in this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: place
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And he returned to Judah, and said, I cannot find her; and also the men of the place said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' there was no harlot in this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: place
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And Judah said, Let her take '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to her, lest we be shamed: behold, I sent this kid, and thou hast not found her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And it came to pass about three months after, that it was told Judah, saying, Tamar thy daughter in law hath played the harlot; and also, behold, she '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with child by whoredom. And Judah said, Bring her forth, and let her be burnt. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'When she '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' brought forth, she sent to her father in law, saying, By the man, whose these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are, am
  - type: text
    text: ' I with child: and she said, Discern, I pray thee, whose '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' these, the signet, and bracelets, and staff. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And Judah acknowledged '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ', and said, She hath been more righteous than I; because that I gave her not to Shelah my son. And he knew her again no more.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And it came to pass in the time of her travail, that, behold, twins '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in her womb. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And it came to pass, when she travailed, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the one
  - type: text
    text: ' put out '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' hand: and the midwife took and bound upon his hand a scarlet thread, saying, This came out first. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And it came to pass, as he drew back his hand, that, behold, his brother came out: and she said, How hast thou broken forth? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' breach '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' upon thee: therefore his name was called Pharez. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And afterward came out his brother, that had the scarlet thread upon his hand: and his name was called Zarah.'
