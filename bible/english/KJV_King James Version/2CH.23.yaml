verses:
  '1':
  - type: text
    content: 'And in the seventh year Jehoiada strengthened himself, and took the captains of hundreds, Azariah the son of Jeroham, and Ishmael the son of Jehohanan, and Azariah the son of Obed, and Maaseiah the son of Adaiah, and Elishaphat the son of Zichri, into covenant with him. '
  '10':
  - type: text
    content: 'And he set all the people, every man having his weapon in his hand, from the right side of the temple to the left side of the temple, along by the altar and the temple, by the king round about. '
  '11':
  - type: text
    content: 'Then they brought out the king''s son, and put upon him the crown, and '
  - type: text
    content: gave him
  - type: text
    content: ' the testimony, and made him king. And Jehoiada and his sons anointed him, and said, God save the king.'
  '12':
  - type: text
    content: 'Now when Athaliah heard the noise of the people running and praising the king, she came to the people into the house of the '
  - type: text
    content: LORD
  - type: text
    content: ': '
  '13':
  - type: text
    content: 'and she looked, and, behold, the king stood at his pillar at the entering in, and the princes and the trumpets by the king: and all the people of the land rejoiced, and sounded with trumpets, also the singers with instruments of musick, and such as taught to sing praise. Then Athaliah rent her clothes, and said, Treason, Treason. '
  '14':
  - type: text
    content: 'Then Jehoiada the priest brought out the captains of hundreds that were set over the host, and said unto them, Have her forth of the ranges: and whoso followeth her, let him be slain with the sword. For the priest said, Slay her not in the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '15':
  - type: text
    content: So they laid hands on her; and when she was come to the entering of the horse gate by the king's house, they slew her there.
  '16':
  - type: text
    content: 'And Jehoiada made a covenant between him, and between all the people, and between the king, that they should be the '
  - type: text
    content: LORD
  - type: text
    content: '''s people. '
  '17':
  - type: text
    content: 'Then all the people went to the house of Baal, and brake it down, and brake his altars and his images in pieces, and slew Mattan the priest of Baal before the altars. '
  '18':
  - type: text
    content: 'Also Jehoiada appointed the offices of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' by the hand of the priests the Levites, whom David had distributed in the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', to offer the burnt offerings of the '
  - type: text
    content: LORD
  - type: text
    content: ', as '
  - type: text
    content: it is
  - type: text
    content: ' written in the law of Moses, with rejoicing and with singing, '
  - type: text
    content: as it was ordained
  - type: text
    content: ' by David. '
  '19':
  - type: text
    content: 'And he set the porters at the gates of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', that none '
  - type: text
    content: which was
  - type: text
    content: ' unclean in any thing should enter in. '
  '2':
  - type: text
    content: 'And they went about in Judah, and gathered the Levites out of all the cities of Judah, and the chief of the fathers of Israel, and they came to Jerusalem. '
  '20':
  - type: text
    content: 'And he took the captains of hundreds, and the nobles, and the governors of the people, and all the people of the land, and brought down the king from the house of the '
  - type: text
    content: LORD
  - type: text
    content: ': and they came through the high gate into the king''s house, and set the king upon the throne of the kingdom. '
  '21':
  - type: text
    content: 'And all the people of the land rejoiced: and the city was quiet, after that they had slain Athaliah with the sword.'
  '3':
  - type: text
    content: 'And all the congregation made a covenant with the king in the house of God. And he said unto them, Behold, the king''s son shall reign, as the '
  - type: text
    content: LORD
  - type: text
    content: ' hath said of the sons of David. '
  '4':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the thing that ye shall do; A third part of you entering on the sabbath, of the priests and of the Levites, '
  - type: text
    content: shall be
  - type: text
    content: ' porters of the doors; '
  '5':
