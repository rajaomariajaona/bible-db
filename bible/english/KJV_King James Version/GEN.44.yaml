document_id: GEN.44
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And he commanded the steward of his house, saying, Fill the men''s sacks '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' food, as much as they can carry, and put every man''s money in his sack''s mouth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And put my cup, the silver cup, in the sack''s mouth of the youngest, and his corn money. And he did according to the word that Joseph had spoken. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'As soon as the morning was light, the men were sent away, they and their asses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' when they were gone out of the city, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yet
  - type: text
    text: ' far off, Joseph said unto his steward, Up, follow after the men; and when thou dost overtake them, say unto them, Wherefore have ye rewarded evil for good? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' not this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' in which my lord drinketh, and whereby indeed he divineth? ye have done evil in so doing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he overtook them, and he spake unto them these same words. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And they said unto him, Wherefore saith my lord these words? God forbid that thy servants should do according to this thing: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'behold, the money, which we found in our sacks'' mouths, we brought again unto thee out of the land of Canaan: how then should we steal out of thy lord''s house silver or gold? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'With whomsoever of thy servants it be found, both let him die, and we also will be my lord''s bondmen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And he said, Now also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: let
  - type: text
    text: ' it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' according unto your words: he with whom it is found shall be my servant; and ye shall be blameless. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then they speedily took down every man his sack to the ground, and opened every man his sack. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And he searched, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' began at the eldest, and left at the youngest: and the cup was found in Benjamin''s sack. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then they rent their clothes, and laded every man his ass, and returned to the city.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And Judah and his brethren came to Joseph''s house; for he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' yet there: and they fell before him on the ground. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Joseph said unto them, What deed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this that ye have done? wot ye not that such a man as I can certainly divine? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And Judah said, What shall we say unto my lord? what shall we speak? or how shall we clear ourselves? God hath found out the iniquity of thy servants: behold, we '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' my lord''s servants, both we, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he
  - type: text
    text: ' also with whom the cup is found. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And he said, God forbid that I should do so: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' the man in whose hand the cup is found, he shall be my servant; and as for you, get you up in peace unto your father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then Judah came near unto him, and said, Oh my lord, let thy servant, I pray thee, speak a word in my lord''s ears, and let not thine anger burn against thy servant: for thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' even as Pharaoh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'My lord asked his servants, saying, Have ye a father, or a brother? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And we said unto my lord, We have a father, an old man, and a child of his old age, a little one; and his brother is dead, and he alone is left of his mother, and his father loveth him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And thou saidst unto thy servants, Bring him down unto me, that I may set mine eyes upon him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And we said unto my lord, The lad cannot leave his father: for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: if
  - type: text
    text: ' he should leave his father, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his father
  - type: text
    text: ' would die. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And thou saidst unto thy servants, Except your youngest brother come down with you, ye shall see my face no more. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And it came to pass when we came up unto thy servant my father, we told him the words of my lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And our father said, Go again, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' buy us a little food. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And we said, We cannot go down: if our youngest brother be with us, then will we go down: for we may not see the man''s face, except our youngest brother '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' with us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And thy servant my father said unto us, Ye know that my wife bare me two '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'sons:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and the one went out from me, and I said, Surely he is torn in pieces; and I saw him not since: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'and if ye take this also from me, and mischief befall him, ye shall bring down my gray hairs with sorrow to the grave. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Now therefore when I come to thy servant my father, and the lad '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' not with us; seeing that his life is bound up in the lad''s life; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'it shall come to pass, when he seeth that the lad '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with us
  - type: text
    text: ', that he will die: and thy servants shall bring down the gray hairs of thy servant our father with sorrow to the grave. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'For thy servant became surety for the lad unto my father, saying, If I bring him not unto thee, then I shall bear the blame to my father for ever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Now therefore, I pray thee, let thy servant abide instead of the lad a bondman to my lord; and let the lad go up with his brethren. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'For how shall I go up to my father, and the lad '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' not with me? lest peradventure I see the evil that shall come on my father.'
