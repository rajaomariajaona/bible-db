document_id: HOS.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Her Purchase Price
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' unto me, Go yet, love a woman beloved of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: her
    - type: text
      text: ' friend, yet an adulteress, according to the love of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' toward the children of Israel, who look to other gods, and love flagons of wine. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I bought her to me for fifteen '
    - type: usfm
      marker: add
      children:
      - type: text
        text: pieces
    - type: text
      text: ' of silver, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' an homer of barley, and an half homer of barley: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and I said unto her, Thou shalt abide for me many days; thou shalt not play the harlot, and thou shalt not be for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: another
    - type: text
      text: ' man: so '
    - type: usfm
      marker: add
      children:
      - type: text
        text: will
    - type: text
      text: ' I also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' for thee.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Israel's Return
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the children of Israel shall abide many days without a king, and without a prince, and without a sacrifice, and without an image, and without an ephod, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: without
    - type: text
      text: ' teraphim: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'afterward shall the children of Israel return, and seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' their God, and David their king; and shall fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' and his goodness in the latter days.'
