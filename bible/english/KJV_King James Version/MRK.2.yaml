document_id: MRK.2,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Forgives Sin
  - type: text
    content: 'And again he entered into Capernaum after '
  - type: text
    content: some
  - type: text
    content: ' days; and it was noised that he was in the house. '
  '10':
  - type: text
    content: 'But that ye may know that the Son of man hath power on earth to forgive sins, '
  - type: text
    content: '(he saith to the sick of the palsy,) '
  '11':
  - type: text
    content: I say unto thee, Arise, and take up thy bed, and go thy way into thine house.
  - type: text
    content: ' '
  '12':
  - type: text
    content: And immediately he arose, took up the bed, and went forth before them all; insomuch that they were all amazed, and glorified God, saying, We never saw it on this fashion.
  '13':
  - type: text
    content: 'And he went forth again by the sea side; and all the multitude resorted unto him, and he taught them. '
  '14':
  - type: text
    content: 'And as he passed by, he saw Levi the '
  - type: text
    content: son
  - type: text
    content: ' of Alphæus sitting at the receipt of custom, and said unto him, Follow me. And he arose and followed him.'
  - type: heading
    content: Eats With Sinners
  '15':
  - type: text
    content: 'And it came to pass, that, as Jesus sat at meat in his house, many publicans and sinners sat also together with Jesus and his disciples: for there were many, and they followed him. '
  '16':
  - type: text
    content: 'And when the scribes and Pharisees saw him eat with publicans and sinners, they said unto his disciples, How is it that he eateth and drinketh with publicans and sinners? '
  '17':
  - type: text
    content: 'When Jesus heard '
  - type: text
    content: it
  - type: text
    content: ', he saith unto them, '
  - type: text
    content: 'They that are whole have no need of the physician, but they that are sick: I came not to call the righteous, but sinners to repentance.'
  '18':
  - type: text
    content: 'And the disciples of John and of the Pharisees used to fast: and they come and say unto him, Why do the disciples of John and of the Pharisees fast, but thy disciples fast not? '
  '19':
  - type: text
    content: 'And Jesus said unto them, '
  - type: text
    content: Can the children of the bridechamber fast, while the bridegroom is with them? as long as they have the bridegroom with them, they cannot fast.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And straightway many were gathered together, insomuch that there was no room to receive '
  - type: text
    content: them
  - type: text
    content: ', no, not so much as about the door: and he preached the word unto them. '
  '20':
  - type: text
    content: But the days will come, when the bridegroom shall be taken away from them, and then shall they fast in those days.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'No man also seweth a piece of new cloth on an old garment: else the new piece that filled it up taketh away from the old, and the rent is made worse.'
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'And no man putteth new wine into old bottles: else the new wine doth burst the bottles, and the wine is spilled, and the bottles will be marred: but new wine must be put into new bottles.'
  - type: heading
    content: In the Cornfields
  '23':
  - type: text
    content: 'And it came to pass, that he went through the corn fields on the sabbath day; and his disciples began, as they went, to pluck the ears of corn. '
  '24':
  - type: text
    content: 'And the Pharisees said unto him, Behold, why do they on the sabbath day that which is not lawful? '
  '25':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: Have ye never read what David did, when he had need, and was an hungred, he, and they that were with him?
  - type: text
    content: ' '
  '26':
  - type: text
    content: How he went into the house of God in the days of Abiathar the high priest, and did eat the shewbread, which is not lawful to eat but for the priests, and gave also to them which were with him?
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: 'The sabbath was made for man, and not man for the sabbath:'
  - type: text
    content: ' '
  '28':
  - type: text
    content: therefore the Son of man is Lord also of the sabbath.
  '3':
  - type: text
    content: 'And they come unto him, bringing one sick of the palsy, which was borne of four. '
  '4':
  - type: text
    content: 'And when they could not come nigh unto him for the press, they uncovered the roof where he was: and when they had broken '
  - type: text
    content: it
  - type: text
    content: ' up, they let down the bed wherein the sick of the palsy lay. '
  '5':
  - type: text
    content: 'When Jesus saw their faith, he said unto the sick of the palsy, '
  - type: text
    content: Son, thy sins be forgiven thee.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'But there were certain of the scribes sitting there, and reasoning in their hearts, '
  '7':
  - type: text
    content: 'Why doth this '
  - type: text
    content: man
  - type: text
    content: ' thus speak blasphemies? who can forgive sins but God only? '
  '8':
  - type: text
    content: 'And immediately when Jesus perceived in his spirit that they so reasoned within themselves, he said unto them, '
  - type: text
    content: Why reason ye these things in your hearts?
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Whether is it easier to say to the sick of the palsy, '
  - type: text
    content: Thy
  - type: text
    content: ' sins be forgiven thee; or to say, Arise, and take up thy bed, and walk?'
  - type: text
    content: ' '
