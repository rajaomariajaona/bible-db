verses:
  '1':
  - type: heading
    content: Wandering in the Wilderness
  - type: text
    content: 'Then came the children of Israel, '
  - type: text
    content: even
  - type: text
    content: ' the whole congregation, into the desert of Zin in the first month: and the people abode in Kadesh; and Miriam died there, and was buried there.'
  - type: heading
    content: Water from the Rock
  '10':
  - type: text
    content: 'And Moses and Aaron gathered the congregation together before the rock, and he said unto them, Hear now, ye rebels; must we fetch you water out of this rock? '
  '11':
  - type: text
    content: 'And Moses lifted up his hand, and with his rod he smote the rock twice: and the water came out abundantly, and the congregation drank, and their beasts '
  - type: text
    content: also
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses and Aaron, Because ye believed me not, to sanctify me in the eyes of the children of Israel, therefore ye shall not bring this congregation into the land which I have given them. '
  '13':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the water of Meribah; because the children of Israel strove with the '
  - type: text
    content: LORD
  - type: text
    content: ', and he was sanctified in them.'
  - type: heading
    content: Israel and Edom
  '14':
  - type: text
    content: 'And Moses sent messengers from Kadesh unto the king of Edom, Thus saith thy brother Israel, Thou knowest all the travail that hath befallen us: '
  '15':
  - type: text
    content: 'how our fathers went down into Egypt, and we have dwelt in Egypt a long time; and the Egyptians vexed us, and our fathers: '
  '16':
  - type: text
    content: 'and when we cried unto the '
  - type: text
    content: LORD
  - type: text
    content: ', he heard our voice, and sent an angel, and hath brought us forth out of Egypt: and, behold, we '
  - type: text
    content: are
  - type: text
    content: ' in Kadesh, a city in the uttermost of thy border: '
  '17':
  - type: text
    content: 'let us pass, I pray thee, through thy country: we will not pass through the fields, or through the vineyards, neither will we drink '
  - type: text
    content: of
  - type: text
    content: ' the water of the wells: we will go by the king''s '
  - type: text
    content: high
  - type: text
    content: ' way, we will not turn to the right hand nor to the left, until we have passed thy borders. '
  '18':
  - type: text
    content: 'And Edom said unto him, Thou shalt not pass by me, lest I come out against thee with the sword. '
  '19':
  - type: text
    content: 'And the children of Israel said unto him, We will go by the high way: and if I and my cattle drink of thy water, then I will pay for it: I will only, without '
  - type: text
    content: doing
  - type: text
    content: ' any thing '
  - type: text
    content: else
  - type: text
    content: ', go through on my feet. '
  '2':
  - type: text
    content: 'And there was no water for the congregation: and they gathered themselves together against Moses and against Aaron. '
  '20':
  - type: text
    content: 'And he said, Thou shalt not go through. And Edom came out against him with much people, and with a strong hand. '
  '21':
  - type: text
    content: 'Thus Edom refused to give Israel passage through his border: wherefore Israel turned away from him.'
  - type: heading
    content: Death of Aaron
  '22':
  - type: text
    content: 'And the children of Israel, '
  - type: text
    content: even
  - type: text
    content: ' the whole congregation, journeyed from Kadesh, and came unto mount Hor. '
  '23':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses and Aaron in mount Hor, by the coast of the land of Edom, saying, '
  '24':
  - type: text
    content: 'Aaron shall be gathered unto his people: for he shall not enter into the land which I have given unto the children of Israel, because ye rebelled against my word at the water of Meribah. '
  '25':
  - type: text
    content: 'Take Aaron and Eleazar his son, and bring them up unto mount Hor: '
  '26':
  - type: text
    content: 'and strip Aaron of his garments, and put them upon Eleazar his son: and Aaron shall be gathered '
  - type: text
    content: unto his people
  - type: text
    content: ', and shall die there. '
  '27':
  - type: text
    content: 'And Moses did as the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded: and they went up into mount Hor in the sight of all the congregation. '
  '28':
  - type: text
    content: 'And Moses stripped Aaron of his garments, and put them upon Eleazar his son; and Aaron died there in the top of the mount: and Moses and Eleazar came down from the mount. '
  '29':
  - type: text
    content: 'And when all the congregation saw that Aaron was dead, they mourned for Aaron thirty days, '
  - type: text
    content: even
  - type: text
    content: ' all the house of Israel.'
  '3':
  - type: text
    content: 'And the people chode with Moses, and spake, saying, Would God that we had died when our brethren died before the '
  - type: text
    content: LORD
  - type: text
    content: '! '
  '4':
  - type: text
    content: 'And why have ye brought up the congregation of the '
  - type: text
    content: LORD
  - type: text
    content: ' into this wilderness, that we and our cattle should die there? '
  '5':
  - type: text
    content: 'And wherefore have ye made us to come up out of Egypt, to bring us in unto this evil place? it '
  - type: text
    content: is
  - type: text
    content: ' no place of seed, or of figs, or of vines, or of pomegranates; neither '
  - type: text
    content: is
  - type: text
    content: ' there any water to drink. '
  '6':
  - type: text
    content: 'And Moses and Aaron went from the presence of the assembly unto the door of the tabernacle of the congregation, and they fell upon their faces: and the glory of the '
  - type: text
    content: LORD
  - type: text
    content: ' appeared unto them. '
  '7':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses, saying, '
  '8':
  - type: text
    content: 'Take the rod, and gather thou the assembly together, thou, and Aaron thy brother, and speak ye unto the rock before their eyes; and it shall give forth his water, and thou shalt bring forth to them water out of the rock: so thou shalt give the congregation and their beasts drink. '
  '9':
  - type: text
    content: 'And Moses took the rod from before the '
  - type: text
    content: LORD
  - type: text
    content: ', as he commanded him.'
