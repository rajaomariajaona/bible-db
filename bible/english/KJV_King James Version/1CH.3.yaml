document_id: 1CH.3,1
type_code: eng
verses:
  '1':
  - type: heading
    content: House of David
  - type: text
    content: 'Now these were the sons of David, which were born unto him in Hebron; the firstborn Amnon, of Ahinoam the Jezreelitess; the second Daniel, of Abigail the Carmelitess: '
  '10':
  - type: text
    content: 'And Solomon''s son '
  - type: text
    content: was
  - type: text
    content: ' Rehoboam, Abia his son, Asa his son, Jehoshaphat his son, '
  '11':
  - type: text
    content: 'Joram his son, Ahaziah his son, Joash his son, '
  '12':
  - type: text
    content: 'Amaziah his son, Azariah his son, Jotham his son, '
  '13':
  - type: text
    content: 'Ahaz his son, Hezekiah his son, Manasseh his son, '
  '14':
  - type: text
    content: 'Amon his son, Josiah his son. '
  '15':
  - type: text
    content: 'And the sons of Josiah '
  - type: text
    content: were
  - type: text
    content: ', the firstborn Johanan, the second Jehoiakim, the third Zedekiah, the fourth Shallum. '
  '16':
  - type: text
    content: 'And the sons of Jehoiakim: Jeconiah his son, Zedekiah his son. '
  '17':
  - type: text
    content: 'And the sons of Jeconiah; Assir, Salathiel his son, '
  '18':
  - type: text
    content: 'Malchiram also, and Pedaiah, and Shenazar, Jecamiah, Hoshama, and Nedabiah. '
  '19':
  - type: text
    content: 'And the sons of Pedaiah '
  - type: text
    content: were
  - type: text
    content: ', Zerubbabel, and Shimei: and the sons of Zerubbabel; Meshullam, and Hananiah, and Shelomith their sister: '
  '2':
  - type: text
    content: 'the third, Absalom the son of Maachah the daughter of Talmai king of Geshur: the fourth, Adonijah the son of Haggith: '
  '20':
  - type: text
    content: 'and Hashubah, and Ohel, and Berechiah, and Hasadiah, Jushab-hesed, five. '
  '21':
  - type: text
    content: 'And the sons of Hananiah; Pelatiah, and Jesaiah: the sons of Rephaiah, the sons of Arnan, the sons of Obadiah, the sons of Shechaniah. '
  '22':
  - type: text
    content: 'And the sons of Shechaniah; Shemaiah: and the sons of Shemaiah; Hattush, and Igeal, and Bariah, and Neariah, and Shaphat, six. '
  '23':
  - type: text
    content: 'And the sons of Neariah; Elioenai, and Hezekiah, and Azrikam, three. '
  '24':
  - type: text
    content: 'And the sons of Elioenai '
  - type: text
    content: were
  - type: text
    content: ', Hodaiah, and Eliashib, and Pelaiah, and Akkub, and Johanan, and Dalaiah, and Anani, seven.'
  '3':
  - type: text
    content: 'the fifth, Shephatiah of Abital: the sixth, Ithream by Eglah his wife. '
  '4':
  - type: text
    content: These
  - type: text
    content: ' six were born unto him in Hebron; and there he reigned seven years and six months: and in Jerusalem he reigned thirty and three years. '
  '5':
  - type: text
    content: 'And these were born unto him in Jerusalem; Shimea, and Shobab, and Nathan, and Solomon, four, of Bath-shua the daughter of Ammiel: '
  '6':
  - type: text
    content: 'Ibhar also, and Elishama, and Eliphelet, '
  '7':
  - type: text
    content: 'and Nogah, and Nepheg, and Japhia, '
  '8':
  - type: text
    content: 'and Elishama, and Eliada, and Eliphelet, nine. '
  '9':
  - type: text
    content: These were
  - type: text
    content: ' all the sons of David, beside the sons of the concubines, and Tamar their sister.'
