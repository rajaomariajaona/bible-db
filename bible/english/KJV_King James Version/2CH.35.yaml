document_id: 2CH.35
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moreover Josiah kept a passover unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' in Jerusalem: and they killed the passover on the fourteenth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ' of the first month. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he set the priests in their charges, and encouraged them to the service of the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and said unto the Levites that taught all Israel, which were holy unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Put the holy ark in the house which Solomon the son of David king of Israel did build; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it shall
  - type: text
    text: ' not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' a burden upon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: your
  - type: text
    text: ' shoulders: serve now the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God, and his people Israel, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and prepare '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yourselves
  - type: text
    text: ' by the houses of your fathers, after your courses, according to the writing of David king of Israel, and according to the writing of Solomon his son. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And stand in the holy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: place
  - type: text
    text: ' according to the divisions of the families of the fathers of your brethren the people, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: after
  - type: text
    text: ' the division of the families of the Levites. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So kill the passover, and sanctify yourselves, and prepare your brethren, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they
  - type: text
    text: ' may do according to the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' by the hand of Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And Josiah gave to the people, of the flock, lambs and kids, all for the passover offerings, for all that were present, to the number of thirty thousand, and three thousand bullocks: these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' of the king''s substance. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And his princes gave willingly unto the people, to the priests, and to the Levites: Hilkiah and Zechariah and Jehiel, rulers of the house of God, gave unto the priests for the passover offerings two thousand and six hundred '
  - type: usfm
    marker: add
    children:
    - type: text
      text: small cattle
  - type: text
    text: ', and three hundred oxen. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Conaniah also, and Shemaiah and Nethaneel, his brethren, and Hashabiah and Jeiel and Jozabad, chief of the Levites, gave unto the Levites for passover offerings five thousand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: small cattle
  - type: text
    text: ', and five hundred oxen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So the service was prepared, and the priests stood in their place, and the Levites in their courses, according to the king''s commandment. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And they killed the passover, and the priests sprinkled '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the blood
  - type: text
    text: ' from their hands, and the Levites flayed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And they removed the burnt offerings, that they might give according to the divisions of the families of the people, to offer unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' written in the book of Moses. And so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: did they
  - type: text
    text: ' with the oxen. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And they roasted the passover with fire according to the ordinance: but the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: other
  - type: text
    text: ' holy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: offerings
  - type: text
    text: ' sod they in pots, and in caldrons, and in pans, and divided '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' speedily among all the people. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And afterward they made ready for themselves, and for the priests: because the priests the sons of Aaron '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were busied
  - type: text
    text: ' in offering of burnt offerings and the fat until night; therefore the Levites prepared for themselves, and for the priests the sons of Aaron. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the singers the sons of Asaph '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in their place, according to the commandment of David, and Asaph, and Heman, and Jeduthun the king''s seer; and the porters '
  - type: usfm
    marker: add
    children:
    - type: text
      text: waited
  - type: text
    text: ' at every gate; they might not depart from their service; for their brethren the Levites prepared for them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So all the service of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' was prepared the same day, to keep the passover, and to offer burnt offerings upon the altar of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', according to the commandment of king Josiah. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the children of Israel that were present kept the passover at that time, and the feast of unleavened bread seven days. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And there was no passover like to that kept in Israel from the days of Samuel the prophet; neither did all the kings of Israel keep such a passover as Josiah kept, and the priests, and the Levites, and all Judah and Israel that were present, and the inhabitants of Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: In the eighteenth year of the reign of Josiah was this passover kept.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Death of Josiah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'After all this, when Josiah had prepared the temple, Necho king of Egypt came up to fight against Carchemish by Euphrates: and Josiah went out against him. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But he sent ambassadors to him, saying, What have I to do with thee, thou king of Judah? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I come
  - type: text
    text: ' not against thee this day, but against the house wherewith I have war: for God commanded me to make haste: forbear thee from '
  - type: usfm
    marker: add
    children:
    - type: text
      text: meddling with
  - type: text
    text: ' God, who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with me, that he destroy thee not. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nevertheless Josiah would not turn his face from him, but disguised himself, that he might fight with him, and hearkened not unto the words of Necho from the mouth of God, and came to fight in the valley of Megiddo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And the archers shot at king Josiah; and the king said to his servants, Have me away; for I am sore wounded. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'His servants therefore took him out of that chariot, and put him in the second chariot that he had; and they brought him to Jerusalem, and he died, and was buried in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one of
  - type: text
    text: ' the sepulchres of his fathers. And all Judah and Jerusalem mourned for Josiah. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And Jeremiah lamented for Josiah: and all the singing men and the singing women spake of Josiah in their lamentations to this day, and made them an ordinance in Israel: and, behold, they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' written in the lamentations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Now the rest of the acts of Josiah, and his goodness, according to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which was
  - type: text
    text: ' written in the law of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'and his deeds, first and last, behold, they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' written in the book of the kings of Israel and Judah.'
