document_id: 1JN.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'That which was from the beginning, which we have heard, which we have seen with our eyes, which we have looked upon, and our hands have handled, of the Word of life; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '(for the life was manifested, and we have seen '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and bear witness, and shew unto you that eternal life, which was with the Father, and was manifested unto us;) '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'that which we have seen and heard declare we unto you, that ye also may have fellowship with us: and truly our fellowship '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with the Father, and with his Son Jesus Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And these things write we unto you, that your joy may be full.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: This then is the message which we have heard of him, and declare unto you, that God is light, and in him is no darkness at all.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'If we say that we have fellowship with him, and walk in darkness, we lie, and do not the truth: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'but if we walk in the light, as he is in the light, we have fellowship one with another, and the blood of Jesus Christ his Son cleanseth us from all sin. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'If we say that we have no sin, we deceive ourselves, and the truth is not in us. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'If we confess our sins, he is faithful and just to forgive us '
  - type: usfm
    marker: add
    children:
    - type: text
      text: our
  - type: text
    text: ' sins, and to cleanse us from all unrighteousness. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: If we say that we have not sinned, we make him a liar, and his word is not in us.
