document_id: ISA.35,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Glory of the Lord
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The wilderness and the solitary place shall be glad for them; and the desert shall rejoice, and blossom as the rose. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the ransomed of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall return, and come to Zion with songs and everlasting joy upon their heads: they shall obtain joy and gladness, and sorrow and sighing shall flee away.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It shall blossom abundantly, and rejoice even with joy and singing: the glory of Lebanon shall be given unto it, the excellency of Carmel and Sharon, they shall see the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the excellency of our God.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Strengthen ye the weak hands, and confirm the feeble knees. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Say to them '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that are
    - type: text
      text: ' of a fearful heart, Be strong, fear not: behold, your God will come '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' vengeance, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' a recompence; he will come and save you.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the eyes of the blind shall be opened, and the ears of the deaf shall be unstopped. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then shall the lame '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' leap as an hart, and the tongue of the dumb sing: for in the wilderness shall waters break out, and streams in the desert. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the parched ground shall become a pool, and the thirsty land springs of water: in the habitation of dragons, where each lay, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' grass with reeds and rushes.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And an highway shall be there, and a way, and it shall be called The way of holiness; the unclean shall not pass over it; but it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' for those: the wayfaring men, though fools, shall not err '
    - type: usfm
      marker: add
      children:
      - type: text
        text: therein
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'No lion shall be there, nor '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' ravenous beast shall go up thereon, it shall not be found there; but the redeemed shall walk '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'there:'
    - type: text
      text: ' '
