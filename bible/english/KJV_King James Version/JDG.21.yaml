document_id: JDG.21,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the men of Israel had sworn in Mizpeh, saying, There shall not any of us give his daughter unto Benjamin to wife. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the congregation sent thither twelve thousand men of the valiantest, and commanded them, saying, Go and smite the inhabitants of Jabesh-gilead with the edge of the sword, with the women and the children. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the thing that ye shall do, Ye shall utterly destroy every male, and every woman that hath lain by man. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they found among the inhabitants of Jabesh-gilead four hundred young virgins, that had known no man by lying with any male: and they brought them unto the camp to Shiloh, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the land of Canaan.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the whole congregation sent '
    - type: usfm
      marker: add
      children:
      - type: text
        text: some
    - type: text
      text: ' to speak to the children of Benjamin that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in the rock Rimmon, and to call peaceably unto them. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Benjamin came again at that time; and they gave them wives which they had saved alive of the women of Jabesh-gilead: and yet so they sufficed them not. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people repented them for Benjamin, because that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had made a breach in the tribes of Israel.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the elders of the congregation said, How shall we do for wives for them that remain, seeing the women are destroyed out of Benjamin? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: There must be
    - type: text
      text: ' an inheritance for them that be escaped of Benjamin, that a tribe be not destroyed out of Israel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Howbeit we may not give them wives of our daughters: for the children of Israel have sworn, saying, Cursed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' he that giveth a wife to Benjamin. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they said, Behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' a feast of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in Shiloh yearly '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in a place
    - type: text
      text: ' which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' on the north side of Beth-el, on the east side of the highway that goeth up from Beth-el to Shechem, and on the south of Lebonah. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people came to the house of God, and abode there till even before God, and lifted up their voices, and wept sore; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore they commanded the children of Benjamin, saying, Go and lie in wait in the vineyards; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and see, and, behold, if the daughters of Shiloh come out to dance in dances, then come ye out of the vineyards, and catch you every man his wife of the daughters of Shiloh, and go to the land of Benjamin. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall be, when their fathers or their brethren come unto us to complain, that we will say unto them, Be favourable unto them for our sakes: because we reserved not to each man his wife in the war: for ye did not give unto them at this time, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' ye should be guilty. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Benjamin did so, and took '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' wives, according to their number, of them that danced, whom they caught: and they went and returned unto their inheritance, and repaired the cities, and dwelt in them. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the children of Israel departed thence at that time, every man to his tribe and to his family, and they went out from thence every man to his inheritance.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In those days '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' no king in Israel: every man did '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which was
    - type: text
      text: ' right in his own eyes.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel, why is this come to pass in Israel, that there should be to day one tribe lacking in Israel? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass on the morrow, that the people rose early, and built there an altar, and offered burnt offerings and peace offerings. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Israel said, Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is there
    - type: text
      text: ' among all the tribes of Israel that came not up with the congregation unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '? For they had made a great oath concerning him that came not up to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' to Mizpeh, saying, He shall surely be put to death. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Israel repented them for Benjamin their brother, and said, There is one tribe cut off from Israel this day. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'How shall we do for wives for them that remain, seeing we have sworn by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' that we will not give them of our daughters to wives?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said, What one '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is there
    - type: text
      text: ' of the tribes of Israel that came not up to Mizpeh to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '? And, behold, there came none to the camp from Jabesh-gilead to the assembly. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the people were numbered, and, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there were
    - type: text
      text: ' none of the inhabitants of Jabesh-gilead there. '
