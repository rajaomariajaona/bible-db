verses:
  '1':
  - type: text
    content: 'Now the men of Israel had sworn in Mizpeh, saying, There shall not any of us give his daughter unto Benjamin to wife. '
  '10':
  - type: text
    content: 'And the congregation sent thither twelve thousand men of the valiantest, and commanded them, saying, Go and smite the inhabitants of Jabesh-gilead with the edge of the sword, with the women and the children. '
  '11':
  - type: text
    content: 'And this '
  - type: text
    content: is
  - type: text
    content: ' the thing that ye shall do, Ye shall utterly destroy every male, and every woman that hath lain by man. '
  '12':
  - type: text
    content: 'And they found among the inhabitants of Jabesh-gilead four hundred young virgins, that had known no man by lying with any male: and they brought them unto the camp to Shiloh, which '
  - type: text
    content: is
  - type: text
    content: ' in the land of Canaan.'
  '13':
  - type: text
    content: 'And the whole congregation sent '
  - type: text
    content: some
  - type: text
    content: ' to speak to the children of Benjamin that '
  - type: text
    content: were
  - type: text
    content: ' in the rock Rimmon, and to call peaceably unto them. '
  '14':
  - type: text
    content: 'And Benjamin came again at that time; and they gave them wives which they had saved alive of the women of Jabesh-gilead: and yet so they sufficed them not. '
  '15':
  - type: text
    content: 'And the people repented them for Benjamin, because that the '
  - type: text
    content: LORD
  - type: text
    content: ' had made a breach in the tribes of Israel.'
  '16':
  - type: text
    content: 'Then the elders of the congregation said, How shall we do for wives for them that remain, seeing the women are destroyed out of Benjamin? '
  '17':
  - type: text
    content: 'And they said, '
  - type: text
    content: There must be
  - type: text
    content: ' an inheritance for them that be escaped of Benjamin, that a tribe be not destroyed out of Israel. '
  '18':
  - type: text
    content: 'Howbeit we may not give them wives of our daughters: for the children of Israel have sworn, saying, Cursed '
  - type: text
    content: be
  - type: text
    content: ' he that giveth a wife to Benjamin. '
  '19':
  - type: text
    content: 'Then they said, Behold, '
  - type: text
    content: there is
  - type: text
    content: ' a feast of the '
  - type: text
    content: LORD
  - type: text
    content: ' in Shiloh yearly '
  - type: text
    content: in a place
  - type: text
    content: ' which '
  - type: text
    content: is
  - type: text
    content: ' on the north side of Beth-el, on the east side of the highway that goeth up from Beth-el to Shechem, and on the south of Lebonah. '
  '2':
  - type: text
    content: 'And the people came to the house of God, and abode there till even before God, and lifted up their voices, and wept sore; '
  '20':
  - type: text
    content: 'Therefore they commanded the children of Benjamin, saying, Go and lie in wait in the vineyards; '
  '21':
  - type: text
    content: 'and see, and, behold, if the daughters of Shiloh come out to dance in dances, then come ye out of the vineyards, and catch you every man his wife of the daughters of Shiloh, and go to the land of Benjamin. '
  '22':
  - type: text
    content: 'And it shall be, when their fathers or their brethren come unto us to complain, that we will say unto them, Be favourable unto them for our sakes: because we reserved not to each man his wife in the war: for ye did not give unto them at this time, '
  - type: text
    content: that
  - type: text
    content: ' ye should be guilty. '
  '23':
  - type: text
    content: 'And the children of Benjamin did so, and took '
  - type: text
    content: them
  - type: text
    content: ' wives, according to their number, of them that danced, whom they caught: and they went and returned unto their inheritance, and repaired the cities, and dwelt in them. '
  '24':
  - type: text
    content: And the children of Israel departed thence at that time, every man to his tribe and to his family, and they went out from thence every man to his inheritance.
  '25':
  - type: text
    content: 'In those days '
  - type: text
    content: there was
  - type: text
    content: ' no king in Israel: every man did '
  - type: text
    content: that which was
  - type: text
    content: ' right in his own eyes.'
  '3':
  - type: text
    content: 'and said, O '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel, why is this come to pass in Israel, that there should be to day one tribe lacking in Israel? '
  '4':
  - type: text
    content: 'And it came to pass on the morrow, that the people rose early, and built there an altar, and offered burnt offerings and peace offerings. '
  '5':
  - type: text
    content: 'And the children of Israel said, Who '
  - type: text
    content: is there
  - type: text
    content: ' among all the tribes of Israel that came not up with the congregation unto the '
  - type: text
    content: LORD
  - type: text
    content: '? For they had made a great oath concerning him that came not up to the '
  - type: text
    content: LORD
  - type: text
    content: ' to Mizpeh, saying, He shall surely be put to death. '
  '6':
  - type: text
    content: 'And the children of Israel repented them for Benjamin their brother, and said, There is one tribe cut off from Israel this day. '
  '7':
  - type: text
    content: 'How shall we do for wives for them that remain, seeing we have sworn by the '
  - type: text
    content: LORD
  - type: text
    content: ' that we will not give them of our daughters to wives?'
  '8':
  - type: text
    content: 'And they said, What one '
  - type: text
    content: is there
  - type: text
    content: ' of the tribes of Israel that came not up to Mizpeh to the '
  - type: text
    content: LORD
  - type: text
    content: '? And, behold, there came none to the camp from Jabesh-gilead to the assembly. '
  '9':
  - type: text
    content: 'For the people were numbered, and, behold, '
  - type: text
    content: there were
  - type: text
    content: ' none of the inhabitants of Jabesh-gilead there. '
