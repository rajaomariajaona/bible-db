document_id: ECC.8
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' as the wise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man?
  - type: text
    text: ' and who knoweth the interpretation of a thing? a man''s wisdom maketh his face to shine, and the boldness of his face shall be changed. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: counsel thee
  - type: text
    text: ' to keep the king''s commandment, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' in regard of the oath of God. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Be not hasty to go out of his sight: stand not in an evil thing; for he doeth whatsoever pleaseth him. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Where the word of a king '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is, there is
  - type: text
    text: ' power: and who may say unto him, What doest thou? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Whoso keepeth the commandment shall feel no evil thing: and a wise man''s heart discerneth both time and judgment. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Because to every purpose there is time and judgment, therefore the misery of man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' great upon him. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For he knoweth not that which shall be: for who can tell him when it shall be? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' no man that hath power over the spirit to retain the spirit; neither '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hath he
  - type: text
    text: ' power in the day of death: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no discharge in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' war; neither shall wickedness deliver those that are given to it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'All this have I seen, and applied my heart unto every work that is done under the sun: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' a time wherein one man ruleth over another to his own hurt. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And so I saw the wicked buried, who had come and gone from the place of the holy, and they were forgotten in the city where they had so done: this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' also vanity. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Because sentence against an evil work is not executed speedily, therefore the heart of the sons of men is fully set in them to do evil. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Though a sinner do evil an hundred times, and his '
  - type: usfm
    marker: add
    children:
    - type: text
      text: days
  - type: text
    text: ' be prolonged, yet surely I know that it shall be well with them that fear God, which fear before him: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'but it shall not be well with the wicked, neither shall he prolong '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' days, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which are
  - type: text
    text: ' as a shadow; because he feareth not before God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'There is a vanity which is done upon the earth; that there be just '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ', unto whom it happeneth according to the work of the wicked; again, there be wicked '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ', to whom it happeneth according to the work of the righteous: I said that this also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' vanity. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then I commended mirth, because a man hath no better thing under the sun, than to eat, and to drink, and to be merry: for that shall abide with him of his labour the days of his life, which God giveth him under the sun.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'When I applied mine heart to know wisdom, and to see the business that is done upon the earth: (for also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is that
  - type: text
    text: ' neither day nor night seeth sleep with his eyes:) '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'then I beheld all the work of God, that a man cannot find out the work that is done under the sun: because though a man labour to seek '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' out, yet he shall not find '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '; yea farther; though a wise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' think to know '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', yet shall he not be able to find '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: .
