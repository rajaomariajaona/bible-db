document_id: EPH.4,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Prisoner of the Lord
  - type: text
    content: 'I therefore, the prisoner of the Lord, beseech you that ye walk worthy of the vocation wherewith ye are called, '
  '10':
  - type: text
    content: 'He that descended is the same also that ascended up far above all heavens, that he might fill all things.) '
  '11':
  - type: text
    content: 'And he gave some, apostles; and some, prophets; and some, evangelists; and some, pastors and teachers; '
  '12':
  - type: text
    content: 'for the perfecting of the saints, for the work of the ministry, for the edifying of the body of Christ: '
  '13':
  - type: text
    content: 'till we all come in the unity of the faith, and of the knowledge of the Son of God, unto a perfect man, unto the measure of the stature of the fulness of Christ: '
  '14':
  - type: text
    content: 'that we '
  - type: text
    content: henceforth
  - type: text
    content: ' be no more children, tossed to and fro, and carried about with every wind of doctrine, by the sleight of men, '
  - type: text
    content: and
  - type: text
    content: ' cunning craftiness, whereby they lie in wait to deceive; '
  '15':
  - type: text
    content: 'but speaking the truth in love, may grow up into him in all things, which is the head, '
  - type: text
    content: even
  - type: text
    content: ' Christ: '
  '16':
  - type: text
    content: from whom the whole body fitly joined together and compacted by that which every joint supplieth, according to the effectual working in the measure of every part, maketh increase of the body unto the edifying of itself in love.
  - type: heading
    content: Christian Living
  '17':
  - type: text
    content: 'This I say therefore, and testify in the Lord, that ye henceforth walk not as other Gentiles walk, in the vanity of their mind, '
  '18':
  - type: text
    content: 'having the understanding darkened, being alienated from the life of God through the ignorance that is in them, because of the blindness of their heart: '
  '19':
  - type: text
    content: 'who being past feeling have given themselves over unto lasciviousness, to work all uncleanness with greediness. '
  '2':
  - type: text
    content: 'with all lowliness and meekness, with longsuffering, forbearing one another in love; '
  '20':
  - type: text
    content: 'But ye have not so learned Christ; '
  '21':
  - type: text
    content: 'if so be that ye have heard him, and have been taught by him, as the truth is in Jesus: '
  '22':
  - type: text
    content: 'that ye put off concerning the former conversation the old man, which is corrupt according to the deceitful lusts; '
  '23':
  - type: text
    content: 'and be renewed in the spirit of your mind; '
  '24':
  - type: text
    content: and that ye put on the new man, which after God is created in righteousness and true holiness.
  '25':
  - type: text
    content: 'Wherefore putting away lying, speak every man truth with his neighbour: for we are members one of another. '
  '26':
  - type: text
    content: 'Be ye angry, and sin not: let not the sun go down upon your wrath: '
  '27':
  - type: text
    content: 'neither give place to the devil. '
  '28':
  - type: text
    content: 'Let him that stole steal no more: but rather let him labour, working with '
  - type: text
    content: his
  - type: text
    content: ' hands the thing which is good, that he may have to give to him that needeth. '
  '29':
  - type: text
    content: 'Let no corrupt communication proceed out of your mouth, but that which is good to the use of edifying, that it may minister grace unto the hearers. '
  '3':
  - type: text
    content: 'endeavouring to keep the unity of the Spirit in the bond of peace. '
  '30':
  - type: text
    content: 'And grieve not the holy Spirit of God, whereby ye are sealed unto the day of redemption. '
  '31':
  - type: text
    content: 'Let all bitterness, and wrath, and anger, and clamour, and evil speaking, be put away from you, with all malice: '
  '32':
  - type: text
    content: and be ye kind one to another, tenderhearted, forgiving one another, even as God for Christ's sake hath forgiven you.
  '4':
  - type: text
    content: There is
  - type: text
    content: ' one body, and one Spirit, even as ye are called in one hope of your calling; '
  '5':
  - type: text
    content: 'one Lord, one faith, one baptism, '
  '6':
  - type: text
    content: 'one God and Father of all, who '
  - type: text
    content: is
  - type: text
    content: ' above all, and through all, and in you all. '
  '7':
  - type: text
    content: 'But unto every one of us is given grace according to the measure of the gift of Christ. '
  '8':
  - type: text
    content: Wherefore he saith,
  - type: text
    content: When he ascended up on high, he led captivity captive,
  - type: text
    content: And gave gifts unto men.
  '9':
  - type: text
    content: '(Now that he ascended, what is it but that he also descended first into the lower parts of the earth? '
