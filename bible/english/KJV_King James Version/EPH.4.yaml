document_id: EPH.4
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Prisoner of the Lord
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I therefore, the prisoner of the Lord, beseech you that ye walk worthy of the vocation wherewith ye are called, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'with all lowliness and meekness, with longsuffering, forbearing one another in love; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'endeavouring to keep the unity of the Spirit in the bond of peace. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' one body, and one Spirit, even as ye are called in one hope of your calling; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'one Lord, one faith, one baptism, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'one God and Father of all, who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' above all, and through all, and in you all. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But unto every one of us is given grace according to the measure of the gift of Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Wherefore he saith,
- type: usfm
  marker: q1
  children:
  - type: text
    text: When he ascended up on high, he led captivity captive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And gave gifts unto men.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '(Now that he ascended, what is it but that he also descended first into the lower parts of the earth? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'He that descended is the same also that ascended up far above all heavens, that he might fill all things.) '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And he gave some, apostles; and some, prophets; and some, evangelists; and some, pastors and teachers; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'for the perfecting of the saints, for the work of the ministry, for the edifying of the body of Christ: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'till we all come in the unity of the faith, and of the knowledge of the Son of God, unto a perfect man, unto the measure of the stature of the fulness of Christ: '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'that we '
  - type: usfm
    marker: add
    children:
    - type: text
      text: henceforth
  - type: text
    text: ' be no more children, tossed to and fro, and carried about with every wind of doctrine, by the sleight of men, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' cunning craftiness, whereby they lie in wait to deceive; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'but speaking the truth in love, may grow up into him in all things, which is the head, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' Christ: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: from whom the whole body fitly joined together and compacted by that which every joint supplieth, according to the effectual working in the measure of every part, maketh increase of the body unto the edifying of itself in love.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Christian Living
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'This I say therefore, and testify in the Lord, that ye henceforth walk not as other Gentiles walk, in the vanity of their mind, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'having the understanding darkened, being alienated from the life of God through the ignorance that is in them, because of the blindness of their heart: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'who being past feeling have given themselves over unto lasciviousness, to work all uncleanness with greediness. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But ye have not so learned Christ; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'if so be that ye have heard him, and have been taught by him, as the truth is in Jesus: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'that ye put off concerning the former conversation the old man, which is corrupt according to the deceitful lusts; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'and be renewed in the spirit of your mind; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: and that ye put on the new man, which after God is created in righteousness and true holiness.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Wherefore putting away lying, speak every man truth with his neighbour: for we are members one of another. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Be ye angry, and sin not: let not the sun go down upon your wrath: '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'neither give place to the devil. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Let him that stole steal no more: but rather let him labour, working with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' hands the thing which is good, that he may have to give to him that needeth. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Let no corrupt communication proceed out of your mouth, but that which is good to the use of edifying, that it may minister grace unto the hearers. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And grieve not the holy Spirit of God, whereby ye are sealed unto the day of redemption. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Let all bitterness, and wrath, and anger, and clamour, and evil speaking, be put away from you, with all malice: '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: and be ye kind one to another, tenderhearted, forgiving one another, even as God for Christ's sake hath forgiven you.
