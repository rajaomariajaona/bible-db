    content: 'And he said unto him, See, I have accepted thee concerning this thing also, that I will not overthrow this city, for the which thou hast spoken. '
  '22':
  - type: text
    content: Haste thee, escape thither; for I cannot do any thing till thou be come thither. Therefore the name of the city was called Zoar.
  '23':
  - type: text
    content: 'The sun was risen upon the earth when Lot entered into Zoar. '
