document_id: GEN.19
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And there came two angels to Sodom at even; and Lot sat in the gate of Sodom: and Lot seeing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' rose up to meet them; and he bowed himself with his face toward the ground; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and he said, Behold now, my lords, turn in, I pray you, into your servant''s house, and tarry all night, and wash your feet, and ye shall rise up early, and go on your ways. And they said, Nay; but we will abide in the street all night. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: And he pressed upon them greatly; and they turned in unto him, and entered into his house; and he made them a feast, and did bake unleavened bread, and they did eat.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But before they lay down, the men of the city, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the men of Sodom, compassed the house round, both old and young, all the people from every quarter: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and they called unto Lot, and said unto him, Where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the men which came in to thee this night? bring them out unto us, that we may know them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Lot went out at the door unto them, and shut the door after him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and said, I pray you, brethren, do not so wickedly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Behold now, I have two daughters which have not known man; let me, I pray you, bring them out unto you, and do ye to them as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' good in your eyes: only unto these men do nothing; for therefore came they under the shadow of my roof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And they said, Stand back. And they said '
  - type: usfm
    marker: add
    children:
    - type: text
      text: again
  - type: text
    text: ', This one '
  - type: usfm
    marker: add
    children:
    - type: text
      text: fellow
  - type: text
    text: ' came in to sojourn, and he will needs be a judge: now will we deal worse with thee, than with them. And they pressed sore upon the man, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' Lot, and came near to break the door. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But the men put forth their hand, and pulled Lot into the house to them, and shut to the door. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And they smote the men that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' at the door of the house with blindness, both small and great: so that they wearied themselves to find the door.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And the men said unto Lot, Hast thou here any besides? son in law, and thy sons, and thy daughters, and whatsoever thou hast in the city, bring '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' out of this place: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'for we will destroy this place, because the cry of them is waxen great before the face of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath sent us to destroy it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And Lot went out, and spake unto his sons in law, which married his daughters, and said, Up, get you out of this place; for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will destroy this city. But he seemed as one that mocked unto his sons in law.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And when the morning arose, then the angels hastened Lot, saying, Arise, take thy wife, and thy two daughters, which are here; lest thou be consumed in the iniquity of the city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And while he lingered, the men laid hold upon his hand, and upon the hand of his wife, and upon the hand of his two daughters; the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' being merciful unto him: and they brought him forth, and set him without the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And it came to pass, when they had brought them forth abroad, that he said, Escape for thy life; look not behind thee, neither stay thou in all the plain; escape to the mountain, lest thou be consumed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And Lot said unto them, Oh, not so, my Lord: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'behold now, thy servant hath found grace in thy sight, and thou hast magnified thy mercy, which thou hast shewed unto me in saving my life; and I cannot escape to the mountain, lest some evil take me, and I die: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'behold now, this city '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' near to flee unto, and it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a little one: Oh, let me escape thither, ('
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' it not a little one?) and my soul shall live. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And he said unto him, See, I have accepted thee concerning this thing also, that I will not overthrow this city, for the which thou hast spoken. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Haste thee, escape thither; for I cannot do any thing till thou be come thither. Therefore the name of the city was called Zoar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The sun was risen upon the earth when Lot entered into Zoar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' rained upon Sodom and upon Gomorrah brimstone and fire from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' out of heaven; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'and he overthrew those cities, and all the plain, and all the inhabitants of the cities, and that which grew upon the ground. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But his wife looked back from behind him, and she became a pillar of salt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And Abraham gat up early in the morning to the place where he stood before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: and he looked toward Sodom and Gomorrah, and toward all the land of the plain, and beheld, and, lo, the smoke of the country went up as the smoke of a furnace.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: And it came to pass, when God destroyed the cities of the plain, that God remembered Abraham, and sent Lot out of the midst of the overthrow, when he overthrew the cities in the which Lot dwelt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And Lot went up out of Zoar, and dwelt in the mountain, and his two daughters with him; for he feared to dwell in Zoar: and he dwelt in a cave, he and his two daughters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And the firstborn said unto the younger, Our father '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' old, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' not a man in the earth to come in unto us after the manner of all the earth: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'come, let us make our father drink wine, and we will lie with him, that we may preserve seed of our father. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And they made their father drink wine that night: and the firstborn went in, and lay with her father; and he perceived not when she lay down, nor when she arose. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And it came to pass on the morrow, that the firstborn said unto the younger, Behold, I lay yesternight with my father: let us make him drink wine this night also; and go thou in, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' lie with him, that we may preserve seed of our father. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And they made their father drink wine that night also: and the younger arose, and lay with him; and he perceived not when she lay down, nor when she arose. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Thus were both the daughters of Lot with child by their father. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And the firstborn bare a son, and called his name Moab: the same '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the father of the Moabites unto this day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And the younger, she also bare a son, and called his name Ben-ammi: the same '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the father of the children of Ammon unto this day.'
