  '35':
  - type: text
    content: 'And they made their father drink wine that night also: and the younger arose, and lay with him; and he perceived not when she lay down, nor when she arose. '
  '36':
  - type: text
    content: 'Thus were both the daughters of Lot with child by their father. '
  '37':
  - type: text
    content: 'And the firstborn bare a son, and called his name Moab: the same '
  - type: text
