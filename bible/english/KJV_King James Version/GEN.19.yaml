  '26':
  - type: text
    content: 'But his wife looked back from behind him, and she became a pillar of salt. '
  '27':
  - type: text
    content: 'And Abraham gat up early in the morning to the place where he stood before the '
  - type: text
    content: LORD
  - type: text
    content: ': '
  '28':
  - type: text
    content: and he looked toward Sodom and Gomorrah, and toward all the land of the plain, and beheld, and, lo, the smoke of the country went up as the smoke of a furnace.
  '29':
  - type: text
    content: And it came to pass, when God destroyed the cities of the plain, that God remembered Abraham, and sent Lot out of the midst of the overthrow, when he overthrew the cities in the which Lot dwelt.
  '3':
  - type: text
    content: And he pressed upon them greatly; and they turned in unto him, and entered into his house; and he made them a feast, and did bake unleavened bread, and they did eat.
  '30':
  - type: text
    content: 'And Lot went up out of Zoar, and dwelt in the mountain, and his two daughters with him; for he feared to dwell in Zoar: and he dwelt in a cave, he and his two daughters. '
  '31':
  - type: text
    content: 'And the firstborn said unto the younger, Our father '
