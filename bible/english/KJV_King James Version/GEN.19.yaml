  '17':
  - type: text
    content: 'And it came to pass, when they had brought them forth abroad, that he said, Escape for thy life; look not behind thee, neither stay thou in all the plain; escape to the mountain, lest thou be consumed. '
  '18':
  - type: text
    content: 'And Lot said unto them, Oh, not so, my Lord: '
  '19':
  - type: text
    content: 'behold now, thy servant hath found grace in thy sight, and thou hast magnified thy mercy, which thou hast shewed unto me in saving my life; and I cannot escape to the mountain, lest some evil take me, and I die: '
  '2':
  - type: text
    content: 'and he said, Behold now, my lords, turn in, I pray you, into your servant''s house, and tarry all night, and wash your feet, and ye shall rise up early, and go on your ways. And they said, Nay; but we will abide in the street all night. '
  '20':
