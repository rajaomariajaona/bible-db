document_id: PSA.85,1
type_code: eng
verses:
  '1':
  - type: text
    content: To the chief Musician, A Psalm for the sons of Korah.
  - type: text
    content: ' '
  - type: text
    content: LORD
  - type: text
    content: ', thou hast been favourable unto thy land:'
  - type: text
    content: Thou hast brought back the captivity of Jacob.
  '10':
  - type: text
    content: Mercy and truth are met together;
  - type: text
    content: 'Righteousness and peace have kissed '
  - type: text
    content: each other
  - type: text
    content: .
  '11':
  - type: text
    content: Truth shall spring out of the earth;
  - type: text
    content: And righteousness shall look down from heaven.
  '12':
  - type: text
    content: 'Yea, the '
  - type: text
    content: LORD
  - type: text
    content: ' shall give '
  - type: text
    content: that which is
  - type: text
    content: ' good;'
  - type: text
    content: And our land shall yield her increase.
  '13':
  - type: text
    content: Righteousness shall go before him;
  - type: text
    content: 'And shall set '
  - type: text
    content: us
  - type: text
    content: ' in the way of his steps.'
  '2':
  - type: text
    content: Thou hast forgiven the iniquity of thy people,
  - type: text
    content: 'Thou hast covered all their sin. '
  - type: text
    content: Selah.
  '3':
  - type: text
    content: 'Thou hast taken away all thy wrath:'
  - type: text
    content: 'Thou hast turned '
  - type: text
    content: thyself
  - type: text
    content: ' from the fierceness of thine anger.'
  '4':
  - type: text
    content: Turn us, O God of our salvation,
  - type: text
    content: And cause thine anger toward us to cease.
  '5':
  - type: text
    content: Wilt thou be angry with us for ever?
  - type: text
    content: Wilt thou draw out thine anger to all generations?
  '6':
  - type: text
    content: 'Wilt thou not revive us again:'
  - type: text
    content: That thy people may rejoice in thee?
  '7':
  - type: text
    content: 'Shew us thy mercy, O '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: And grant us thy salvation.
  '8':
  - type: text
    content: 'I will hear what God the '
  - type: text
    content: LORD
  - type: text
    content: ' will speak:'
  - type: text
    content: 'For he will speak peace unto his people, and to his saints: But let them not turn again to folly.'
  '9':
  - type: text
    content: 'Surely his salvation '
  - type: text
    content: is
  - type: text
    content: ' nigh them that fear him;'
  - type: text
    content: That glory may dwell in our land.
