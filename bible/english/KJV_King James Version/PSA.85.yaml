document_id: PSA.85
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: To the chief Musician, A Psalm for the sons of Korah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', thou hast been favourable unto thy land:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou hast brought back the captivity of Jacob.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Thou hast forgiven the iniquity of thy people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Thou hast covered all their sin. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Thou hast taken away all thy wrath:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Thou hast turned '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thyself
  - type: text
    text: ' from the fierceness of thine anger.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Turn us, O God of our salvation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And cause thine anger toward us to cease.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Wilt thou be angry with us for ever?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Wilt thou draw out thine anger to all generations?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Wilt thou not revive us again:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: That thy people may rejoice in thee?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Shew us thy mercy, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: And grant us thy salvation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I will hear what God the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will speak:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For he will speak peace unto his people, and to his saints: But let them not turn again to folly.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Surely his salvation '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' nigh them that fear him;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: That glory may dwell in our land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mercy and truth are met together;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Righteousness and peace have kissed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: each other
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Truth shall spring out of the earth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And righteousness shall look down from heaven.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Yea, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall give '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which is
  - type: text
    text: ' good;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And our land shall yield her increase.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Righteousness shall go before him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And shall set '
  - type: usfm
    marker: add
    children:
    - type: text
      text: us
  - type: text
    text: ' in the way of his steps.'
