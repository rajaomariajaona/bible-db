document_id: GEN.28
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: His Flight and Vision
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Isaac called Jacob, and blessed him, and charged him, and said unto him, Thou shalt not take a wife of the daughters of Canaan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Arise, go to Padan-aram, to the house of Bethuel thy mother''s father; and take thee a wife from thence of the daughters of Laban thy mother''s brother. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And God Almighty bless thee, and make thee fruitful, and multiply thee, that thou mayest be a multitude of people; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and give thee the blessing of Abraham, to thee, and to thy seed with thee; that thou mayest inherit the land wherein thou art a stranger, which God gave unto Abraham. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And Isaac sent away Jacob: and he went to Padan-aram unto Laban, son of Bethuel the Syrian, the brother of Rebekah, Jacob''s and Esau''s mother.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When Esau saw that Isaac had blessed Jacob, and sent him away to Padan-aram, to take him a wife from thence; and that as he blessed him he gave him a charge, saying, Thou shalt not take a wife of the daughters of Canaan; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and that Jacob obeyed his father and his mother, and was gone to Padan-aram; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and Esau seeing that the daughters of Canaan pleased not Isaac his father; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: then went Esau unto Ishmael, and took unto the wives which he had Mahalath the daughter of Ishmael Abraham's son, the sister of Nebajoth, to be his wife.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Jacob went out from Beer-sheba, and went toward Haran. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And he lighted upon a certain place, and tarried there all night, because the sun was set; and he took of the stones of that place, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them for
  - type: text
    text: ' his pillows, and lay down in that place to sleep. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And he dreamed, and behold a ladder set up on the earth, and the top of it reached to heaven: and behold the angels of God ascending and descending on it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And, behold, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' stood above it, and said, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Abraham thy father, and the God of Isaac: the land whereon thou liest, to thee will I give it, and to thy seed; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and thy seed shall be as the dust of the earth, and thou shalt spread abroad to the west, and to the east, and to the north, and to the south: and in thee and in thy seed shall all the families of the earth be blessed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And, behold, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' with thee, and will keep thee in all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: places
  - type: text
    text: ' whither thou goest, and will bring thee again into this land; for I will not leave thee, until I have done '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' which I have spoken to thee of. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And Jacob awaked out of his sleep, and he said, Surely the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' is in this place; and I knew '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' not. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And he was afraid, and said, How dreadful '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this place! this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' none other but the house of God, and this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the gate of heaven.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Beth-el
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And Jacob rose up early in the morning, and took the stone that he had put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' his pillows, and set it up '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' a pillar, and poured oil upon the top of it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And he called the name of that place Beth-el: but the name of that city '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was called
  - type: text
    text: ' Luz at the first. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Jacob vowed a vow, saying, If God will be with me, and will keep me in this way that I go, and will give me bread to eat, and raiment to put on, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'so that I come again to my father''s house in peace; then shall the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' be my God: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'and this stone, which I have set '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' a pillar, shall be God''s house: and of all that thou shalt give me I will surely give the tenth unto thee.'
