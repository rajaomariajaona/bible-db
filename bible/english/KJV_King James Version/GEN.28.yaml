  '1':
  - type: heading
    content: His Flight and Vision
  - type: text
    content: 'And Isaac called Jacob, and blessed him, and charged him, and said unto him, Thou shalt not take a wife of the daughters of Canaan. '
  '10':
  - type: text
    content: 'And Jacob went out from Beer-sheba, and went toward Haran. '
  '11':
  - type: text
    content: 'And he lighted upon a certain place, and tarried there all night, because the sun was set; and he took of the stones of that place, and put '
  - type: text
    content: them for
  - type: text
    content: ' his pillows, and lay down in that place to sleep. '
  '12':
  - type: text
    content: 'And he dreamed, and behold a ladder set up on the earth, and the top of it reached to heaven: and behold the angels of God ascending and descending on it. '
  '13':
  - type: text
    content: 'And, behold, the '
  - type: text
    content: LORD
  - type: text
    content: ' stood above it, and said, I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Abraham thy father, and the God of Isaac: the land whereon thou liest, to thee will I give it, and to thy seed; '
  '14':
  - type: text
    content: 'and thy seed shall be as the dust of the earth, and thou shalt spread abroad to the west, and to the east, and to the north, and to the south: and in thee and in thy seed shall all the families of the earth be blessed. '
  '15':
  - type: text
    content: 'And, behold, I '
  - type: text
    content: am
  - type: text
    content: ' with thee, and will keep thee in all '
  - type: text
    content: places
  - type: text
    content: ' whither thou goest, and will bring thee again into this land; for I will not leave thee, until I have done '
  - type: text
    content: that
  - type: text
    content: ' which I have spoken to thee of. '
  '16':
  - type: text
    content: 'And Jacob awaked out of his sleep, and he said, Surely the '
  - type: text
    content: LORD
  - type: text
    content: ' is in this place; and I knew '
  - type: text
    content: it
  - type: text
    content: ' not. '
  '17':
  - type: text
    content: 'And he was afraid, and said, How dreadful '
  - type: text
    content: is
  - type: text
    content: ' this place! this '
  - type: text
    content: is
  - type: text
    content: ' none other but the house of God, and this '
  - type: text
    content: is
  - type: text
    content: ' the gate of heaven.'
  - type: heading
    content: Beth-el
  '18':
  - type: text
    content: 'And Jacob rose up early in the morning, and took the stone that he had put '
  - type: text
    content: for
  - type: text
    content: ' his pillows, and set it up '
  - type: text
    content: for
  - type: text
    content: ' a pillar, and poured oil upon the top of it. '
  '19':
  - type: text
    content: 'And he called the name of that place Beth-el: but the name of that city '
  - type: text
    content: was called
  - type: text
    content: ' Luz at the first. '
  '2':
  - type: text
    content: 'Arise, go to Padan-aram, to the house of Bethuel thy mother''s father; and take thee a wife from thence of the daughters of Laban thy mother''s brother. '
  '20':
  - type: text
    content: 'And Jacob vowed a vow, saying, If God will be with me, and will keep me in this way that I go, and will give me bread to eat, and raiment to put on, '
  '21':
  - type: text
    content: 'so that I come again to my father''s house in peace; then shall the '
  - type: text
    content: LORD
  - type: text
    content: ' be my God: '
  '22':
  - type: text
    content: 'and this stone, which I have set '
  - type: text
    content: for
  - type: text
    content: ' a pillar, shall be God''s house: and of all that thou shalt give me I will surely give the tenth unto thee.'
  '3':
  - type: text
    content: 'And God Almighty bless thee, and make thee fruitful, and multiply thee, that thou mayest be a multitude of people; '
  '4':
  - type: text
    content: 'and give thee the blessing of Abraham, to thee, and to thy seed with thee; that thou mayest inherit the land wherein thou art a stranger, which God gave unto Abraham. '
  '5':
  - type: text
    content: 'And Isaac sent away Jacob: and he went to Padan-aram unto Laban, son of Bethuel the Syrian, the brother of Rebekah, Jacob''s and Esau''s mother.'
  '6':
  - type: text
    content: 'When Esau saw that Isaac had blessed Jacob, and sent him away to Padan-aram, to take him a wife from thence; and that as he blessed him he gave him a charge, saying, Thou shalt not take a wife of the daughters of Canaan; '
  '7':
  - type: text
    content: 'and that Jacob obeyed his father and his mother, and was gone to Padan-aram; '
  '8':
  - type: text
    content: 'and Esau seeing that the daughters of Canaan pleased not Isaac his father; '
  '9':
  - type: text
    content: then went Esau unto Ishmael, and took unto the wives which he had Mahalath the daughter of Ishmael Abraham's son, the sister of Nebajoth, to be his wife.
