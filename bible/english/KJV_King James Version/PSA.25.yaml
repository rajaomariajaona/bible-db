    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Unto thee, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', do I lift up my soul. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'All the paths of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' mercy and truth'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Unto such as keep his covenant and his testimonies.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ל Lamed
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For thy name''s sake, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Pardon mine iniquity; for it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' great.'
  - type: usfm
    marker: qa
    children:
    - type: text
      text: מ Mem
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'What man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' he that feareth the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Him shall he teach in the way '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' he shall choose.'
  - type: usfm
    marker: qa
    children:
    - type: text
      text: נ Nun
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: His soul shall dwell at ease;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his seed shall inherit the earth.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ס Samek
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The secret of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' with them that fear him;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he will shew them his covenant.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ע Ain
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Mine eyes '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' ever toward the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For he shall pluck my feet out of the net.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: פ Pe
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Turn thee unto me, and have mercy upon me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' desolate and afflicted.'
  - type: usfm
    marker: qa
    children:
    - type: text
      text: צ Zade
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The troubles of my heart are enlarged:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: O
    - type: text
      text: ' bring thou me out of my distresses.'
  - type: usfm
    marker: qa
    children:
    - type: text
      text: (ק Qoph)
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Look upon mine affliction and my pain;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And forgive all my sins.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ר Resh
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Consider mine enemies; for they are many;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they hate me with cruel hatred.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ש Shin
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'O my God, I trust in thee:'
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ב Bet
    marker-yv: yv-h
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let me not be ashamed, let not mine enemies triumph over me.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ג Gimel
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'O keep my soul, and deliver me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let me not be ashamed; for I put my trust in thee.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ת Taw
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Let integrity and uprightness preserve me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For I wait on thee.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Redeem Israel, O God, out of all his troubles.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Yea, let none that wait on thee be ashamed:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them be ashamed which transgress without cause.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ד Dalet
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Shew me thy ways, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Teach me thy paths.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ה He
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Lead me in thy truth, and teach me:'
  - type: usfm
    marker: qa
    children:
    - type: text
      text: (ו Waw)
    marker-yv: yv-h
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' the God of my salvation; on thee do I wait all the day.'
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ז Zain
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Remember, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', thy tender mercies and thy lovingkindnesses;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: have been
    - type: text
      text: ' ever of old.'
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ח Het
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Remember not the sins of my youth, nor my transgressions:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'According to thy mercy remember thou me for thy goodness'' sake, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ט Tet
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Good and upright '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ':'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore will he teach sinners in the way.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: י Yod
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The meek will he guide in judgment:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the meek will he teach his way.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: כ Kaph
    marker-yv: yv-h
