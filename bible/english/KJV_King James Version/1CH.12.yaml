document_id: 1CH.12,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' they that came to David to Ziklag, while he yet kept himself close because of Saul the son of Kish: and they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' among the mighty men, helpers of the war. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mishmannah the fourth, Jeremiah the fifth, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Attai the sixth, Eliel the seventh, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Johanan the eighth, Elzabad the ninth, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jeremiah the tenth, Machbanai the eleventh. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' of the sons of Gad, captains of the host: one of the least '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' over an hundred, and the greatest over a thousand. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' they that went over Jordan in the first month, when it had overflown all his banks; and they put to flight all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' of the valleys, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: both
    - type: text
      text: ' toward the east, and toward the west.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there came of the children of Benjamin and Judah to the hold unto David. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David went out to meet them, and answered and said unto them, If ye be come peaceably unto me to help me, mine heart shall be knit unto you: but if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ye be come
    - type: text
      text: ' to betray me to mine enemies, seeing '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no wrong in mine hands, the God of our fathers look '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thereon
    - type: text
      text: ', and rebuke '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the spirit came upon Amasai, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: who was
    - type: text
      text: ' chief of the captains, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and he said
    - type: text
      text: ', Thine '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are we
    - type: text
      text: ', David, and on thy side, thou son of Jesse: peace, peace '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' unto thee, and peace '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' to thine helpers; for thy God helpeth thee. Then David received them, and made them captains of the band.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there fell '
    - type: usfm
      marker: add
      children:
      - type: text
        text: some
    - type: text
      text: ' of Manasseh to David, when he came with the Philistines against Saul to battle: but they helped them not: for the lords of the Philistines upon advisement sent him away, saying, He will fall to his master Saul to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the jeopardy of
    - type: text
      text: ' our heads. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: They were
    - type: text
      text: ' armed with bows, and could use both the right hand and the left in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: hurling
    - type: text
      text: ' stones and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shooting
    - type: text
      text: ' arrows out of a bow, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' of Saul''s brethren of Benjamin. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As he went to Ziklag, there fell to him of Manasseh, Adnah, and Jozabad, and Jediael, and Michael, and Jozabad, and Elihu, and Zilthai, captains of the thousands that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' of Manasseh. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they helped David against the band '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'of the rovers:'
    - type: text
      text: ' for they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' all mighty men of valour, and were captains in the host. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For at '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' time day by day there came to David to help him, until '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' a great host, like the host of God.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the numbers of the bands '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that were
    - type: text
      text: ' ready armed to the war, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' came to David to Hebron, to turn the kingdom of Saul to him, according to the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The children of Judah that bare shield and spear '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' six thousand and eight hundred, ready armed to the war. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of the children of Simeon, mighty men of valour for the war, seven thousand and one hundred. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of the children of Levi four thousand and six hundred. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jehoiada '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the leader of the Aaronites, and with him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' three thousand and seven hundred; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Zadok, a young man mighty of valour, and of his father''s house twenty and two captains. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And of the children of Benjamin, the kindred of Saul, three thousand: for hitherto the greatest part of them had kept the ward of the house of Saul. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The chief '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Ahiezer, then Joash, the sons of Shemaah the Gibeathite; and Jeziel, and Pelet, the sons of Azmaveth; and Berachah, and Jehu the Antothite, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And of the children of Ephraim twenty thousand and eight hundred, mighty men of valour, famous throughout the house of their fathers. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And of the half tribe of Manasseh eighteen thousand, which were expressed by name, to come and make David king. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And of the children of Issachar, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which were men
    - type: text
      text: ' that had understanding of the times, to know what Israel ought to do; the heads of them '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' two hundred; and all their brethren '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' at their commandment. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of Zebulun, such as went forth to battle, expert in war, with all instruments of war, fifty thousand, which could keep rank: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they were
    - type: text
      text: ' not of double heart. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And of Naphtali a thousand captains, and with them with shield and spear thirty and seven thousand. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And of the Danites expert in war twenty and eight thousand and six hundred. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And of Asher, such as went forth to battle, expert in war, forty thousand. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And on the other side of Jordan, of the Reubenites, and the Gadites, and of the half tribe of Manasseh, with all manner of instruments of war for the battle, an hundred and twenty thousand.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All these men of war, that could keep rank, came with a perfect heart to Hebron, to make David king over all Israel: and all the rest also of Israel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' of one heart to make David king. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there they were with David three days, eating and drinking: for their brethren had prepared for them. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Ismaiah the Gibeonite, a mighty man among the thirty, and over the thirty; and Jeremiah, and Jahaziel, and Johanan, and Josabad the Gederathite, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover they that were nigh them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' unto Issachar and Zebulun and Naphtali, brought bread on asses, and on camels, and on mules, and on oxen, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' meat, meal, cakes of figs, and bunches of raisins, and wine, and oil, and oxen, and sheep abundantly: for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' joy in Israel.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eluzai, and Jerimoth, and Bealiah, and Shemariah, and Shephatiah the Haruphite, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elkanah, and Jesiah, and Azareel, and Joezer, and Jashobeam, the Korhites, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and Joelah, and Zebadiah, the sons of Jeroham of Gedor.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And of the Gadites there separated themselves unto David into the hold to the wilderness men of might, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' men of war '
    - type: usfm
      marker: add
      children:
      - type: text
        text: fit
    - type: text
      text: ' for the battle, that could handle shield and buckler, whose faces '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were like
    - type: text
      text: ' the faces of lions, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' as swift as the roes upon the mountains; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ezer the first, Obadiah the second, Eliab the third, '
