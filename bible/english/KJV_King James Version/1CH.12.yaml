  '1':
  - type: text
    content: 'Now these '
  - type: text
    content: are
  - type: text
    content: ' they that came to David to Ziklag, while he yet kept himself close because of Saul the son of Kish: and they '
  - type: text
    content: were
  - type: text
    content: ' among the mighty men, helpers of the war. '
  '10':
  - type: text
    content: 'Mishmannah the fourth, Jeremiah the fifth, '
  '11':
  - type: text
    content: 'Attai the sixth, Eliel the seventh, '
  '12':
  - type: text
    content: 'Johanan the eighth, Elzabad the ninth, '
  '13':
  - type: text
    content: 'Jeremiah the tenth, Machbanai the eleventh. '
  '14':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' of the sons of Gad, captains of the host: one of the least '
  - type: text
    content: was
  - type: text
    content: ' over an hundred, and the greatest over a thousand. '
  '15':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' they that went over Jordan in the first month, when it had overflown all his banks; and they put to flight all '
  - type: text
    content: them
  - type: text
    content: ' of the valleys, '
  - type: text
    content: both
  - type: text
    content: ' toward the east, and toward the west.'
  '16':
  - type: text
    content: 'And there came of the children of Benjamin and Judah to the hold unto David. '
  '17':
  - type: text
    content: 'And David went out to meet them, and answered and said unto them, If ye be come peaceably unto me to help me, mine heart shall be knit unto you: but if '
  - type: text
    content: ye be come
  - type: text
    content: ' to betray me to mine enemies, seeing '
  - type: text
    content: there is
  - type: text
    content: ' no wrong in mine hands, the God of our fathers look '
  - type: text
    content: thereon
  - type: text
    content: ', and rebuke '
  - type: text
    content: it
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Then the spirit came upon Amasai, '
  - type: text
    content: who was
  - type: text
    content: ' chief of the captains, '
  - type: text
    content: and he said
  - type: text
    content: ', Thine '
  - type: text
    content: are we
  - type: text
    content: ', David, and on thy side, thou son of Jesse: peace, peace '
  - type: text
    content: be
  - type: text
    content: ' unto thee, and peace '
  - type: text
    content: be
  - type: text
    content: ' to thine helpers; for thy God helpeth thee. Then David received them, and made them captains of the band.'
  '19':
  - type: text
    content: 'And there fell '
  - type: text
    content: some
  - type: text
    content: ' of Manasseh to David, when he came with the Philistines against Saul to battle: but they helped them not: for the lords of the Philistines upon advisement sent him away, saying, He will fall to his master Saul to '
  - type: text
    content: the jeopardy of
  - type: text
    content: ' our heads. '
  '2':
  - type: text
    content: They were
  - type: text
    content: ' armed with bows, and could use both the right hand and the left in '
  - type: text
    content: hurling
  - type: text
    content: ' stones and '
  - type: text
    content: shooting
  - type: text
    content: ' arrows out of a bow, '
  - type: text
    content: even
  - type: text
    content: ' of Saul''s brethren of Benjamin. '
  '20':
  - type: text
    content: 'As he went to Ziklag, there fell to him of Manasseh, Adnah, and Jozabad, and Jediael, and Michael, and Jozabad, and Elihu, and Zilthai, captains of the thousands that '
  - type: text
    content: were
  - type: text
    content: ' of Manasseh. '
  '21':
  - type: text
    content: 'And they helped David against the band '
  - type: text
    content: 'of the rovers:'
  - type: text
    content: ' for they '
  - type: text
    content: were
  - type: text
    content: ' all mighty men of valour, and were captains in the host. '
  '22':
  - type: text
    content: 'For at '
  - type: text
    content: that
  - type: text
    content: ' time day by day there came to David to help him, until '
  - type: text
    content: it was
  - type: text
    content: ' a great host, like the host of God.'
  '23':
  - type: text
    content: 'And these '
  - type: text
    content: are
  - type: text
    content: ' the numbers of the bands '
  - type: text
    content: that were
  - type: text
    content: ' ready armed to the war, '
  - type: text
    content: and
  - type: text
    content: ' came to David to Hebron, to turn the kingdom of Saul to him, according to the word of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'The children of Judah that bare shield and spear '
  - type: text
    content: were
  - type: text
    content: ' six thousand and eight hundred, ready armed to the war. '
  '25':
  - type: text
    content: 'Of the children of Simeon, mighty men of valour for the war, seven thousand and one hundred. '
  '26':
  - type: text
    content: 'Of the children of Levi four thousand and six hundred. '
  '27':
  - type: text
    content: 'And Jehoiada '
  - type: text
    content: was
  - type: text
    content: ' the leader of the Aaronites, and with him '
  - type: text
    content: were
  - type: text
    content: ' three thousand and seven hundred; '
  '28':
  - type: text
    content: 'and Zadok, a young man mighty of valour, and of his father''s house twenty and two captains. '
  '29':
  - type: text
    content: 'And of the children of Benjamin, the kindred of Saul, three thousand: for hitherto the greatest part of them had kept the ward of the house of Saul. '
  '3':
  - type: text
    content: 'The chief '
  - type: text
    content: was
  - type: text
    content: ' Ahiezer, then Joash, the sons of Shemaah the Gibeathite; and Jeziel, and Pelet, the sons of Azmaveth; and Berachah, and Jehu the Antothite, '
  '30':
  - type: text
    content: 'And of the children of Ephraim twenty thousand and eight hundred, mighty men of valour, famous throughout the house of their fathers. '
  '31':
  - type: text
    content: 'And of the half tribe of Manasseh eighteen thousand, which were expressed by name, to come and make David king. '
  '32':
  - type: text
    content: 'And of the children of Issachar, '
  - type: text
    content: which were men
  - type: text
    content: ' that had understanding of the times, to know what Israel ought to do; the heads of them '
  - type: text
    content: were
  - type: text
    content: ' two hundred; and all their brethren '
  - type: text
    content: were
  - type: text
    content: ' at their commandment. '
  '33':
  - type: text
    content: 'Of Zebulun, such as went forth to battle, expert in war, with all instruments of war, fifty thousand, which could keep rank: '
  - type: text
    content: they were
  - type: text
    content: ' not of double heart. '
  '34':
  - type: text
    content: 'And of Naphtali a thousand captains, and with them with shield and spear thirty and seven thousand. '
  '35':
  - type: text
    content: 'And of the Danites expert in war twenty and eight thousand and six hundred. '
  '36':
  - type: text
    content: 'And of Asher, such as went forth to battle, expert in war, forty thousand. '
  '37':
  - type: text
    content: And on the other side of Jordan, of the Reubenites, and the Gadites, and of the half tribe of Manasseh, with all manner of instruments of war for the battle, an hundred and twenty thousand.
  '38':
  - type: text
    content: 'All these men of war, that could keep rank, came with a perfect heart to Hebron, to make David king over all Israel: and all the rest also of Israel '
  - type: text
    content: were
  - type: text
    content: ' of one heart to make David king. '
  '39':
  - type: text
    content: 'And there they were with David three days, eating and drinking: for their brethren had prepared for them. '
  '4':
  - type: text
    content: 'and Ismaiah the Gibeonite, a mighty man among the thirty, and over the thirty; and Jeremiah, and Jahaziel, and Johanan, and Josabad the Gederathite, '
  '40':
  - type: text
    content: 'Moreover they that were nigh them, '
  - type: text
    content: even
  - type: text
    content: ' unto Issachar and Zebulun and Naphtali, brought bread on asses, and on camels, and on mules, and on oxen, '
  - type: text
    content: and
  - type: text
    content: ' meat, meal, cakes of figs, and bunches of raisins, and wine, and oil, and oxen, and sheep abundantly: for '
  - type: text
    content: there was
  - type: text
    content: ' joy in Israel.'
  '5':
  - type: text
    content: 'Eluzai, and Jerimoth, and Bealiah, and Shemariah, and Shephatiah the Haruphite, '
  '6':
  - type: text
    content: 'Elkanah, and Jesiah, and Azareel, and Joezer, and Jashobeam, the Korhites, '
  '7':
  - type: text
    content: and Joelah, and Zebadiah, the sons of Jeroham of Gedor.
  '8':
  - type: text
    content: 'And of the Gadites there separated themselves unto David into the hold to the wilderness men of might, '
  - type: text
    content: and
  - type: text
    content: ' men of war '
  - type: text
    content: fit
  - type: text
    content: ' for the battle, that could handle shield and buckler, whose faces '
  - type: text
    content: were like
  - type: text
    content: ' the faces of lions, and '
  - type: text
    content: were
  - type: text
    content: ' as swift as the roes upon the mountains; '
  '9':
  - type: text
    content: 'Ezer the first, Obadiah the second, Eliab the third, '
