  '34':
  - type: text
    content: 'And '
  - type: text
    content: there were
  - type: text
    content: ' four undersetters to the four corners of one base: '
  - type: text
    content: and
  - type: text
    content: ' the undersetters '
  - type: text
    content: were
  - type: text
    content: ' of the very base itself. '
  '35':
  - type: text
    content: 'And in the top of the base '
  - type: text
    content: was there
  - type: text
    content: ' a round compass of half a cubit high: and on the top of the base the ledges thereof and the borders thereof '
  - type: text
    content: were
  - type: text
    content: ' of the same. '
  '36':
  - type: text
    content: 'For on the plates of the ledges thereof, and on the borders thereof, he graved cherubims, lions, and palm trees, according to the proportion of every one, and additions round about. '
  '37':
  - type: text
    content: 'After this '
  - type: text
    content: manner
  - type: text
    content: ' he made the ten bases: all of them had one casting, one measure, '
  - type: text
    content: and
  - type: text
    content: ' one size.'
  '38':
  - type: text
    content: 'Then made he ten lavers of brass: one laver contained forty baths: '
  - type: text
    content: and
  - type: text
    content: ' every laver was four cubits: '
  - type: text
    content: and
  - type: text
    content: ' upon every one of the ten bases one laver. '
  '39':
  - type: text
    content: 'And he put five bases on the right side of the house, and five on the left side of the house: and he set the sea on the right side of the house eastward over against the south.'
  '4':
  - type: text
