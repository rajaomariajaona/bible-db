document_id: 1KI.7
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Solomon's House
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But Solomon was building his own house thirteen years, and he finished all his house. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He built also the house of the forest of Lebanon; the length thereof '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' an hundred cubits, and the breadth thereof fifty cubits, and the height thereof thirty cubits, upon four rows of cedar pillars, with cedar beams upon the pillars. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it was
  - type: text
    text: ' covered with cedar above upon the beams, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: lay
  - type: text
    text: ' on forty five pillars, fifteen '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' a row. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there were
  - type: text
    text: ' windows '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' three rows, and light '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' against light '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' three ranks. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And all the doors and posts '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' square, with the windows: and light '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' against light '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' three ranks. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he made a porch of pillars; the length thereof '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' fifty cubits, and the breadth thereof thirty cubits: and the porch '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' before them: and the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: other
  - type: text
    text: ' pillars and the thick beam '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' before them. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then he made a porch for the throne where he might judge, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the porch of judgment: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it was
  - type: text
    text: ' covered with cedar from one side of the floor to the other. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And his house where he dwelt '
  - type: usfm
    marker: add
    children:
    - type: text
      text: had
  - type: text
    text: ' another court within the porch, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' was of the like work. Solomon made also an house for Pharaoh''s daughter, whom he had taken '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to wife
  - type: text
    text: ', like unto this porch.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'All these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were of
  - type: text
    text: ' costly stones, according to the measures of hewed stones, sawed with saws, within and without, even from the foundation unto the coping, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' on the outside toward the great court. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the foundation '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was of
  - type: text
    text: ' costly stones, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' great stones, stones of ten cubits, and stones of eight cubits. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And above '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' costly stones, after the measures of hewed stones, and cedars. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And the great court round about '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' with three rows of hewed stones, and a row of cedar beams, both for the inner court of the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and for the porch of the house.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Temple Furniture
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And king Solomon sent and fetched Hiram out of Tyre. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' a widow''s son of the tribe of Naphtali, and his father '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' a man of Tyre, a worker in brass: and he was filled with wisdom, and understanding, and cunning to work all works in brass. And he came to king Solomon, and wrought all his work. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For he cast two pillars of brass, of eighteen cubits high apiece: and a line of twelve cubits did compass either of them about. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And he made two chapiters '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' molten brass, to set upon the tops of the pillars: the height of the one chapiter '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' five cubits, and the height of the other chapiter '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' five cubits: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' nets of checker work, and wreaths of chain work, for the chapiters which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' upon the top of the pillars; seven for the one chapiter, and seven for the other chapiter. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And he made the pillars, and two rows round about upon the one network, to cover the chapiters that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' upon the top, with pomegranates: and so did he for the other chapiter. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And the chapiters that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' upon the top of the pillars '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' of lily work in the porch, four cubits. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the chapiters upon the two pillars '
  - type: usfm
    marker: add
    children:
    - type: text
      text: had pomegranates
  - type: text
    text: ' also above, over against the belly which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' by the network: and the pomegranates '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' two hundred in rows round about upon the other chapiter. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And he set up the pillars in the porch of the temple: and he set up the right pillar, and called the name thereof Jachin: and he set up the left pillar, and called the name thereof Boaz. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And upon the top of the pillars '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' lily work: so was the work of the pillars finished.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And he made a molten sea, ten cubits from the one brim to the other: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it was
  - type: text
    text: ' round all about, and his height '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' five cubits: and a line of thirty cubits did compass it round about. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And under the brim of it round about '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there were
  - type: text
    text: ' knops compassing it, ten in a cubit, compassing the sea round about: the knops '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' cast in two rows, when it was cast. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'It stood upon twelve oxen, three looking toward the north, and three looking toward the west, and three looking toward the south, and three looking toward the east: and the sea '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was set
  - type: text
    text: ' above upon them, and all their hinder parts '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' inward. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' an hand breadth thick, and the brim thereof was wrought like the brim of a cup, with flowers of lilies: it contained two thousand baths.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And he made ten bases of brass; four cubits '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the length of one base, and four cubits the breadth thereof, and three cubits the height of it. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And the work of the bases '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' on this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'manner:'
  - type: text
    text: ' they had borders, and the borders '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' between the ledges: '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'and on the borders that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' between the ledges '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' lions, oxen, and cherubims: and upon the ledges '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' a base above: and beneath the lions and oxen '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' certain additions made of thin work. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And every base had four brasen wheels, and plates of brass: and the four corners thereof had undersetters: under the laver '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' undersetters molten, at the side of every addition. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And the mouth of it within the chapiter and above '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' a cubit: but the mouth thereof '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' round '
  - type: usfm
    marker: add
    children:
    - type: text
      text: after
  - type: text
    text: ' the work of the base, a cubit and an half: and also upon the mouth of it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' gravings with their borders, foursquare, not round. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And under the borders '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' four wheels; and the axletrees of the wheels '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were joined
  - type: text
    text: ' to the base: and the height of a wheel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' a cubit and half a cubit. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And the work of the wheels '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' like the work of a chariot wheel: their axletrees, and their naves, and their felloes, and their spokes, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' all molten. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there were
  - type: text
    text: ' four undersetters to the four corners of one base: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the undersetters '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' of the very base itself. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And in the top of the base '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was there
  - type: text
    text: ' a round compass of half a cubit high: and on the top of the base the ledges thereof and the borders thereof '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' of the same. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'For on the plates of the ledges thereof, and on the borders thereof, he graved cherubims, lions, and palm trees, according to the proportion of every one, and additions round about. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'After this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: manner
  - type: text
    text: ' he made the ten bases: all of them had one casting, one measure, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' one size.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Then made he ten lavers of brass: one laver contained forty baths: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' every laver was four cubits: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' upon every one of the ten bases one laver. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And he put five bases on the right side of the house, and five on the left side of the house: and he set the sea on the right side of the house eastward over against the south.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And Hiram made the lavers, and the shovels, and the basons. So Hiram made an end of doing all the work that he made king Solomon for the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': '
