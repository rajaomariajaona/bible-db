  - type: text
    content: ' on forty five pillars, fifteen '
  - type: text
    content: in
  - type: text
    content: ' a row. '
  '30':
  - type: text
    content: 'And every base had four brasen wheels, and plates of brass: and the four corners thereof had undersetters: under the laver '
  - type: text
    content: were
  - type: text
    content: ' undersetters molten, at the side of every addition. '
  '31':
  - type: text
    content: 'And the mouth of it within the chapiter and above '
  - type: text
