  '1':
  - type: heading
    content: Solomon's House
  - type: text
    content: 'But Solomon was building his own house thirteen years, and he finished all his house. '
  '10':
  - type: text
    content: 'And the foundation '
  - type: text
    content: was of
  - type: text
    content: ' costly stones, '
  - type: text
    content: even
  - type: text
    content: ' great stones, stones of ten cubits, and stones of eight cubits. '
  '11':
  - type: text
    content: 'And above '
  - type: text
    content: were
  - type: text
    content: ' costly stones, after the measures of hewed stones, and cedars. '
  '12':
  - type: text
    content: 'And the great court round about '
  - type: text
    content: was
  - type: text
    content: ' with three rows of hewed stones, and a row of cedar beams, both for the inner court of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and for the porch of the house.'
  - type: heading
    content: Temple Furniture
  '13':
  - type: text
    content: 'And king Solomon sent and fetched Hiram out of Tyre. '
  '14':
  - type: text
    content: 'He '
  - type: text
    content: was
  - type: text
    content: ' a widow''s son of the tribe of Naphtali, and his father '
  - type: text
    content: was
  - type: text
    content: ' a man of Tyre, a worker in brass: and he was filled with wisdom, and understanding, and cunning to work all works in brass. And he came to king Solomon, and wrought all his work. '
  '15':
  - type: text
    content: 'For he cast two pillars of brass, of eighteen cubits high apiece: and a line of twelve cubits did compass either of them about. '
  '16':
  - type: text
    content: 'And he made two chapiters '
  - type: text
    content: of
  - type: text
    content: ' molten brass, to set upon the tops of the pillars: the height of the one chapiter '
  - type: text
    content: was
  - type: text
    content: ' five cubits, and the height of the other chapiter '
  - type: text
    content: was
  - type: text
    content: ' five cubits: '
  '17':
  - type: text
    content: and
  - type: text
    content: ' nets of checker work, and wreaths of chain work, for the chapiters which '
  - type: text
    content: were
  - type: text
    content: ' upon the top of the pillars; seven for the one chapiter, and seven for the other chapiter. '
  '18':
  - type: text
    content: 'And he made the pillars, and two rows round about upon the one network, to cover the chapiters that '
  - type: text
    content: were
  - type: text
    content: ' upon the top, with pomegranates: and so did he for the other chapiter. '
  '19':
  - type: text
    content: 'And the chapiters that '
  - type: text
    content: were
  - type: text
    content: ' upon the top of the pillars '
  - type: text
    content: were
  - type: text
    content: ' of lily work in the porch, four cubits. '
  '2':
  - type: text
    content: 'He built also the house of the forest of Lebanon; the length thereof '
  - type: text
    content: was
  - type: text
    content: ' an hundred cubits, and the breadth thereof fifty cubits, and the height thereof thirty cubits, upon four rows of cedar pillars, with cedar beams upon the pillars. '
  '20':
  - type: text
    content: 'And the chapiters upon the two pillars '
  - type: text
    content: had pomegranates
  - type: text
    content: ' also above, over against the belly which '
  - type: text
    content: was
  - type: text
    content: ' by the network: and the pomegranates '
  - type: text
    content: were
  - type: text
    content: ' two hundred in rows round about upon the other chapiter. '
  '21':
  - type: text
    content: 'And he set up the pillars in the porch of the temple: and he set up the right pillar, and called the name thereof Jachin: and he set up the left pillar, and called the name thereof Boaz. '
  '22':
  - type: text
    content: 'And upon the top of the pillars '
  - type: text
    content: was
  - type: text
    content: ' lily work: so was the work of the pillars finished.'
  '23':
  - type: text
    content: 'And he made a molten sea, ten cubits from the one brim to the other: '
  - type: text
    content: it was
  - type: text
    content: ' round all about, and his height '
  - type: text
    content: was
  - type: text
    content: ' five cubits: and a line of thirty cubits did compass it round about. '
  '24':
  - type: text
    content: 'And under the brim of it round about '
  - type: text
    content: there were
  - type: text
    content: ' knops compassing it, ten in a cubit, compassing the sea round about: the knops '
  - type: text
    content: were
  - type: text
    content: ' cast in two rows, when it was cast. '
  '25':
  - type: text
    content: 'It stood upon twelve oxen, three looking toward the north, and three looking toward the west, and three looking toward the south, and three looking toward the east: and the sea '
  - type: text
    content: was set
  - type: text
    content: ' above upon them, and all their hinder parts '
  - type: text
    content: were
  - type: text
    content: ' inward. '
  '26':
  - type: text
    content: 'And it '
  - type: text
    content: was
  - type: text
    content: ' an hand breadth thick, and the brim thereof was wrought like the brim of a cup, with flowers of lilies: it contained two thousand baths.'
  '27':
  - type: text
    content: 'And he made ten bases of brass; four cubits '
  - type: text
    content: was
  - type: text
    content: ' the length of one base, and four cubits the breadth thereof, and three cubits the height of it. '
  '28':
  - type: text
    content: 'And the work of the bases '
  - type: text
    content: was
  - type: text
    content: ' on this '
  - type: text
    content: 'manner:'
  - type: text
    content: ' they had borders, and the borders '
  - type: text
    content: were
  - type: text
    content: ' between the ledges: '
