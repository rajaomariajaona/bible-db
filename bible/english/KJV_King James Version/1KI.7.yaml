  - type: text
    content: ' gravings with their borders, foursquare, not round. '
  '32':
  - type: text
    content: 'And under the borders '
  - type: text
    content: were
  - type: text
    content: ' four wheels; and the axletrees of the wheels '
  - type: text
    content: were joined
  - type: text
    content: ' to the base: and the height of a wheel '
  - type: text
    content: was
  - type: text
    content: ' a cubit and half a cubit. '
  '33':
  - type: text
    content: 'And the work of the wheels '
  - type: text
    content: was
  - type: text
    content: ' like the work of a chariot wheel: their axletrees, and their naves, and their felloes, and their spokes, '
  - type: text
    content: were
  - type: text
