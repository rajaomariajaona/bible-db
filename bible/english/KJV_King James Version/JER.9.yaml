  '18':
  - type: text
    content: 'and let them make haste, and take up a wailing for us, that our eyes may run down with tears, and our eyelids gush out with waters. '
  '19':
  - type: text
    content: 'For a voice of wailing is heard out of Zion, How are we spoiled! we are greatly confounded, because we have forsaken the land, because our dwellings have cast '
  - type: text
    content: us
  - type: text
    content: ' out. '
  '2':
  - type: text
    content: 'Oh that I had in the wilderness a lodging place of wayfaring men; that I might leave my people, and go from them! for they '
  - type: text
    content: be
  - type: text
    content: ' all adulterers, an assembly of treacherous men. '
  '20':
  - type: text
    content: 'Yet hear the word of the '
  - type: text
    content: LORD
  - type: text
    content: ', O ye women, and let your ear receive the word of his mouth, and teach your daughters wailing, and every one her neighbour lamentation. '
  '21':
  - type: text
    content: 'For death is come up into our windows, '
  - type: text
