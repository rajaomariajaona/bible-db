  '16':
  - type: text
    content: 'I will scatter them also among the heathen, whom neither they nor their fathers have known: and I will send a sword after them, till I have consumed them.'
  '17':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, Consider ye, and call for the mourning women, that they may come; and send for cunning '
  - type: text
    content: women
  - type: text
