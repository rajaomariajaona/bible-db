document_id: JER.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Oh that my head were waters, and mine eyes a fountain of tears, that I might weep day and night for the slain of the daughter of my people! '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Oh that I had in the wilderness a lodging place of wayfaring men; that I might leave my people, and go from them! for they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' all adulterers, an assembly of treacherous men. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And they bend their tongues '
  - type: usfm
    marker: add
    children:
    - type: text
      text: like
  - type: text
    text: ' their bow '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' lies: but they are not valiant for the truth upon the earth; for they proceed from evil to evil, and they know not me, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Take ye heed every one of his neighbour, and trust ye not in any brother: for every brother will utterly supplant, and every neighbour will walk with slanders. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And they will deceive every one his neighbour, and will not speak the truth: they have taught their tongue to speak lies, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' weary themselves to commit iniquity. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Thine habitation '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the midst of deceit; through deceit they refuse to know me, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Therefore thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, Behold, I will melt them, and try them; for how shall I do for the daughter of my people? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Their tongue '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is as
  - type: text
    text: ' an arrow shot out; it speaketh deceit: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' speaketh peaceably to his neighbour with his mouth, but in heart he layeth his wait. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Shall I not visit them for these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things?
  - type: text
    text: ' saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': shall not my soul be avenged on such a nation as this?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For the mountains will I take up a weeping and wailing, and for the habitations of the wilderness a lamentation, because they are burned up, so that none can pass through '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: '; neither can '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' hear the voice of the cattle; both the fowl of the heavens and the beast are fled; they are gone. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And I will make Jerusalem heaps, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' a den of dragons; and I will make the cities of Judah desolate, without an inhabitant. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the wise man, that may understand this? and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: who is he
  - type: text
    text: ' to whom the mouth of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath spoken, that he may declare it, for what the land perisheth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' is burned up like a wilderness, that none passeth through?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' saith, Because they have forsaken my law which I set before them, and have not obeyed my voice, neither walked therein; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'but have walked after the imagination of their own heart, and after Baalim, which their fathers taught them: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'therefore thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, the God of Israel; Behold, I will feed them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' this people, with wormwood, and give them water of gall to drink. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I will scatter them also among the heathen, whom neither they nor their fathers have known: and I will send a sword after them, till I have consumed them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, Consider ye, and call for the mourning women, that they may come; and send for cunning '
  - type: usfm
    marker: add
    children:
    - type: text
      text: women
  - type: text
    text: ', that they may come: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and let them make haste, and take up a wailing for us, that our eyes may run down with tears, and our eyelids gush out with waters. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For a voice of wailing is heard out of Zion, How are we spoiled! we are greatly confounded, because we have forsaken the land, because our dwellings have cast '
  - type: usfm
    marker: add
    children:
    - type: text
      text: us
  - type: text
    text: ' out. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Yet hear the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', O ye women, and let your ear receive the word of his mouth, and teach your daughters wailing, and every one her neighbour lamentation. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For death is come up into our windows, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' is entered into our palaces, to cut off the children from without, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the young men from the streets. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Speak, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Even the carcases of men shall fall as dung upon the open field, and as the handful after the harvestman, and none shall gather '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Let not the wise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' glory in his wisdom, neither let the mighty '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' glory in his might, let not the rich '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' glory in his riches: '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'but let him that glorieth glory in this, that he understandeth and knoweth me, that I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' which exercise lovingkindness, judgment, and righteousness, in the earth: for in these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' I delight, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Behold, the days come, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that I will punish all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them which are
  - type: text
    text: ' circumcised with the uncircumcised; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Egypt, and Judah, and Edom, and the children of Ammon, and Moab, and all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that are
  - type: text
    text: ' in the utmost corners, that dwell in the wilderness: for all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: these
  - type: text
    text: ' nations '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' uncircumcised, and all the house of Israel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' uncircumcised in the heart.'
