verses:
  '1':
  - type: text
    content: 'Oh that my head were waters, and mine eyes a fountain of tears, that I might weep day and night for the slain of the daughter of my people! '
  '10':
  - type: text
    content: 'For the mountains will I take up a weeping and wailing, and for the habitations of the wilderness a lamentation, because they are burned up, so that none can pass through '
  - type: text
    content: them
  - type: text
    content: '; neither can '
  - type: text
    content: men
  - type: text
    content: ' hear the voice of the cattle; both the fowl of the heavens and the beast are fled; they are gone. '
  '11':
  - type: text
    content: 'And I will make Jerusalem heaps, '
  - type: text
    content: and
  - type: text
    content: ' a den of dragons; and I will make the cities of Judah desolate, without an inhabitant. '
