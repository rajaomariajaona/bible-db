document_id: JHN.6,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Second Passover
  - type: text
    content: 'After these things Jesus went over the sea of Galilee, which is '
  - type: text
    content: the sea
  - type: text
    content: ' of Tiberias. '
  '10':
  - type: text
    content: 'And Jesus said, '
  - type: text
    content: Make the men sit down.
  - type: text
    content: ' Now there was much grass in the place. So the men sat down, in number about five thousand. '
  '11':
  - type: text
    content: 'And Jesus took the loaves; and when he had given thanks, he distributed to the disciples, and the disciples to them that were set down; and likewise of the fishes as much as they would. '
  '12':
  - type: text
    content: 'When they were filled, he said unto his disciples, '
  - type: text
    content: Gather up the fragments that remain, that nothing be lost.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Therefore they gathered '
  - type: text
    content: them
  - type: text
    content: ' together, and filled twelve baskets with the fragments of the five barley loaves, which remained over and above unto them that had eaten. '
  '14':
  - type: text
    content: Then those men, when they had seen the miracle that Jesus did, said, This is of a truth that prophet that should come into the world.
  '15':
  - type: text
    content: 'When Jesus therefore perceived that they would come and take him by force, to make him a king, he departed again into a mountain himself alone. '
  '16':
  - type: text
    content: 'And when even was '
  - type: text
    content: now
  - type: text
    content: ' come, his disciples went down unto the sea, '
  '17':
  - type: text
    content: 'and entered into a ship, and went over the sea toward Capernaum. And it was now dark, and Jesus was not come to them. '
  '18':
  - type: text
    content: 'And the sea arose by reason of a great wind that blew. '
  '19':
  - type: text
    content: 'So when they had rowed about five and twenty or thirty furlongs, they see Jesus walking on the sea, and drawing nigh unto the ship: and they were afraid. '
  '2':
  - type: text
    content: 'And a great multitude followed him, because they saw his miracles which he did on them that were diseased. '
  '20':
  - type: text
    content: 'But he saith unto them, '
  - type: text
    content: It is I; be not afraid.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'Then they willingly received him into the ship: and immediately the ship was at the land whither they went.'
  '22':
  - type: text
    content: 'The day following, when the people which stood on the other side of the sea saw that there was none other boat there, save that one whereinto his disciples were entered, and that Jesus went not with his disciples into the boat, but '
  - type: text
    content: that
  - type: text
    content: ' his disciples were gone away alone; '
  '23':
  - type: text
    content: '(howbeit there came other boats from Tiberias nigh unto the place where they did eat bread, after that the Lord had given thanks:) '
  '24':
  - type: text
    content: when the people therefore saw that Jesus was not there, neither his disciples, they also took shipping, and came to Capernaum, seeking for Jesus.
  '25':
  - type: text
    content: 'And when they had found him on the other side of the sea, they said unto him, Rabbi, when camest thou hither? '
  '26':
  - type: text
    content: 'Jesus answered them and said, '
  - type: text
    content: Verily, verily, I say unto you, Ye seek me, not because ye saw the miracles, but because ye did eat of the loaves, and were filled.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Labour not for the meat which perisheth, but for that meat which endureth unto everlasting life, which the Son of man shall give unto you: for him hath God the Father sealed.'
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Then said they unto him, What shall we do, that we might work the works of God? '
  '29':
  - type: text
    content: 'Jesus answered and said unto them, '
  - type: text
    content: This is the work of God, that ye believe on him whom he hath sent.
  '3':
  - type: text
    content: 'And Jesus went up into a mountain, and there he sat with his disciples. '
  '30':
  - type: text
    content: 'They said therefore unto him, What sign shewest thou then, that we may see, and believe thee? what dost thou work? '
  '31':
  - type: text
    content: 'Our fathers did eat manna in the desert; as it is written, He gave them bread from heaven to eat. '
  '32':
  - type: text
    content: 'Then Jesus said unto them, '
  - type: text
    content: Verily, verily, I say unto you, Moses gave you not that bread from heaven; but my Father giveth you the true bread from heaven.
  - type: text
    content: ' '
  '33':
  - type: text
    content: For the bread of God is he which cometh down from heaven, and giveth life unto the world.
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'Then said they unto him, Lord, evermore give us this bread. '
  '35':
  - type: text
    content: 'And Jesus said unto them, '
  - type: text
    content: 'I am the bread of life: he that cometh to me shall never hunger; and he that believeth on me shall never thirst.'
  - type: text
    content: ' '
  '36':
  - type: text
    content: But I said unto you, That ye also have seen me, and believe not.
  - type: text
    content: ' '
  '37':
  - type: text
    content: All that the Father giveth me shall come to me; and him that cometh to me I will in no wise cast out.
  - type: text
    content: ' '
  '38':
  - type: text
    content: For I came down from heaven, not to do mine own will, but the will of him that sent me.
  - type: text
    content: ' '
  '39':
  - type: text
    content: And this is the Father's will which hath sent me, that of all which he hath given me I should lose nothing, but should raise it up again at the last day.
  - type: text
    content: ' '
  '4':
  - type: text
    content: And the passover, a feast of the Jews, was nigh.
  - type: heading
    content: The Bread of Life
  '40':
  - type: text
    content: 'And this is the will of him that sent me, that every one which seeth the Son, and believeth on him, may have everlasting life: and I will raise him up at the last day.'
  '41':
  - type: text
    content: 'The Jews then murmured at him, because he said, I am the bread which came down from heaven. '
  '42':
  - type: text
    content: 'And they said, Is not this Jesus, the son of Joseph, whose father and mother we know? how is it then that he saith, I came down from heaven? '
  '43':
  - type: text
    content: 'Jesus therefore answered and said unto them, '
  - type: text
    content: Murmur not among yourselves.
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'No man can come to me, except the Father which hath sent me draw him: and I will raise him up at the last day.'
  - type: text
    content: ' '
  '45':
  - type: text
    content: It is written in the prophets, And they shall be all taught of God. Every man therefore that hath heard, and hath learned of the Father, cometh unto me.
  - type: text
    content: ' '
  '46':
  - type: text
    content: Not that any man hath seen the Father, save he which is of God, he hath seen the Father.
  '47':
  - type: text
    content: ' '
  - type: text
    content: Verily, verily, I say unto you, He that believeth on me hath everlasting life.
  - type: text
    content: ' '
  '48':
  - type: text
    content: I am that bread of life.
  - type: text
    content: ' '
  '49':
  - type: text
    content: Your fathers did eat manna in the wilderness, and are dead.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'When Jesus then lifted up '
  - type: text
    content: his
  - type: text
    content: ' eyes, and saw a great company come unto him, he saith unto Philip, '
  - type: text
    content: Whence shall we buy bread, that these may eat?
  - type: text
    content: ' '
  '50':
  - type: text
    content: This is the bread which cometh down from heaven, that a man may eat thereof, and not die.
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'I am the living bread which came down from heaven: if any man eat of this bread, he shall live for ever: and the bread that I will give is my flesh, which I will give for the life of the world.'
  '52':
  - type: text
    content: 'The Jews therefore strove among themselves, saying, How can this man give us '
  - type: text
    content: his
  - type: text
    content: ' flesh to eat? '
  '53':
  - type: text
    content: 'Then Jesus said unto them, '
  - type: text
    content: Verily, verily, I say unto you, Except ye eat the flesh of the Son of man, and drink his blood, ye have no life in you.
  - type: text
    content: ' '
  '54':
  - type: text
    content: Whoso eateth my flesh, and drinketh my blood, hath eternal life; and I will raise him up at the last day.
  - type: text
    content: ' '
  '55':
  - type: text
    content: For my flesh is meat indeed, and my blood is drink indeed.
  - type: text
    content: ' '
  '56':
  - type: text
    content: He that eateth my flesh, and drinketh my blood, dwelleth in me, and I in him.
  - type: text
    content: ' '
  '57':
  - type: text
    content: 'As the living Father hath sent me, and I live by the Father: so he that eateth me, even he shall live by me.'
  - type: text
    content: ' '
  '58':
  - type: text
    content: 'This is that bread which came down from heaven: not as your fathers did eat manna, and are dead: he that eateth of this bread shall live for ever.'
  - type: text
    content: ' '
  '59':
  - type: text
    content: These things said he in the synagogue, as he taught in Capernaum.
  '6':
  - type: text
    content: 'And this he said to prove him: for he himself knew what he would do. '
  '60':
  - type: text
    content: 'Many therefore of his disciples, when they had heard '
  - type: text
    content: this
  - type: text
    content: ', said, This is an hard saying; who can hear it? '
  '61':
  - type: text
    content: 'When Jesus knew in himself that his disciples murmured at it, he said unto them, '
  - type: text
    content: Doth this offend you?
  - type: text
    content: ' '
  '62':
  - type: text
    content: What
  - type: text
    content: ' and if ye shall see the Son of man ascend up where he was before?'
  - type: text
    content: ' '
  '63':
  - type: text
    content: 'It is the spirit that quickeneth; the flesh profiteth nothing: the words that I speak unto you, '
  - type: text
    content: they
  - type: text
    content: ' are spirit, and '
  - type: text
    content: they
  - type: text
    content: ' are life.'
  - type: text
    content: ' '
  '64':
  - type: text
    content: But there are some of you that believe not.
  - type: text
    content: ' For Jesus knew from the beginning who they were that believed not, and who should betray him. '
  '65':
  - type: text
    content: 'And he said, '
  - type: text
    content: Therefore said I unto you, that no man can come unto me, except it were given unto him of my Father.
  '66':
  - type: text
    content: 'From that '
  - type: text
    content: time
  - type: text
    content: ' many of his disciples went back, and walked no more with him. '
  '67':
  - type: text
    content: 'Then said Jesus unto the twelve, '
  - type: text
    content: Will ye also go away?
  - type: text
    content: ' '
  '68':
  - type: text
    content: 'Then Simon Peter answered him, Lord, to whom shall we go? thou hast the words of eternal life. '
  '69':
  - type: text
    content: 'And we believe and are sure that thou art that Christ, the Son of the living God. '
  '7':
  - type: text
    content: 'Philip answered him, Two hundred pennyworth of bread is not sufficient for them, that every one of them may take a little. '
  '70':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: Have not I chosen you twelve, and one of you is a devil?
  - type: text
    content: ' '
  '71':
  - type: text
    content: 'He spake of Judas Iscariot '
  - type: text
    content: the son
  - type: text
    content: ' of Simon: for he it was that should betray him, being one of the twelve.'
  '8':
  - type: text
    content: 'One of his disciples, Andrew, Simon Peter''s brother, saith unto him, '
  '9':
  - type: text
    content: 'There is a lad here, which hath five barley loaves, and two small fishes: but what are they among so many? '
