document_id: JHN.6,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Second Passover
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After these things Jesus went over the sea of Galilee, which is '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the sea
    - type: text
      text: ' of Tiberias. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Make the men sit down.
    - type: text
      text: ' Now there was much grass in the place. So the men sat down, in number about five thousand. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus took the loaves; and when he had given thanks, he distributed to the disciples, and the disciples to them that were set down; and likewise of the fishes as much as they would. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they were filled, he said unto his disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Gather up the fragments that remain, that nothing be lost.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore they gathered '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' together, and filled twelve baskets with the fragments of the five barley loaves, which remained over and above unto them that had eaten. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then those men, when they had seen the miracle that Jesus did, said, This is of a truth that prophet that should come into the world.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus therefore perceived that they would come and take him by force, to make him a king, he departed again into a mountain himself alone. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when even was '
    - type: usfm
      marker: add
      children:
      - type: text
        text: now
    - type: text
      text: ' come, his disciples went down unto the sea, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and entered into a ship, and went over the sea toward Capernaum. And it was now dark, and Jesus was not come to them. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sea arose by reason of a great wind that blew. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So when they had rowed about five and twenty or thirty furlongs, they see Jesus walking on the sea, and drawing nigh unto the ship: and they were afraid. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And a great multitude followed him, because they saw his miracles which he did on them that were diseased. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It is I; be not afraid.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they willingly received him into the ship: and immediately the ship was at the land whither they went.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The day following, when the people which stood on the other side of the sea saw that there was none other boat there, save that one whereinto his disciples were entered, and that Jesus went not with his disciples into the boat, but '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' his disciples were gone away alone; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(howbeit there came other boats from Tiberias nigh unto the place where they did eat bread, after that the Lord had given thanks:) '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: when the people therefore saw that Jesus was not there, neither his disciples, they also took shipping, and came to Capernaum, seeking for Jesus.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they had found him on the other side of the sea, they said unto him, Rabbi, when camest thou hither? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered them and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Verily, verily, I say unto you, Ye seek me, not because ye saw the miracles, but because ye did eat of the loaves, and were filled.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Labour not for the meat which perisheth, but for that meat which endureth unto everlasting life, which the Son of man shall give unto you: for him hath God the Father sealed.'
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said they unto him, What shall we do, that we might work the works of God? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered and said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: This is the work of God, that ye believe on him whom he hath sent.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus went up into a mountain, and there he sat with his disciples. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They said therefore unto him, What sign shewest thou then, that we may see, and believe thee? what dost thou work? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Our fathers did eat manna in the desert; as it is written, He gave them bread from heaven to eat. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Verily, verily, I say unto you, Moses gave you not that bread from heaven; but my Father giveth you the true bread from heaven.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For the bread of God is he which cometh down from heaven, and giveth life unto the world.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said they unto him, Lord, evermore give us this bread. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I am the bread of life: he that cometh to me shall never hunger; and he that believeth on me shall never thirst.'
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But I said unto you, That ye also have seen me, and believe not.
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: All that the Father giveth me shall come to me; and him that cometh to me I will in no wise cast out.
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For I came down from heaven, not to do mine own will, but the will of him that sent me.
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And this is the Father's will which hath sent me, that of all which he hath given me I should lose nothing, but should raise it up again at the last day.
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the passover, a feast of the Jews, was nigh.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Bread of Life
    marker-yv: yv-h
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And this is the will of him that sent me, that every one which seeth the Son, and believeth on him, may have everlasting life: and I will raise him up at the last day.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Jews then murmured at him, because he said, I am the bread which came down from heaven. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said, Is not this Jesus, the son of Joseph, whose father and mother we know? how is it then that he saith, I came down from heaven? '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus therefore answered and said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Murmur not among yourselves.
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'No man can come to me, except the Father which hath sent me draw him: and I will raise him up at the last day.'
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It is written in the prophets, And they shall be all taught of God. Every man therefore that hath heard, and hath learned of the Father, cometh unto me.
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Not that any man hath seen the Father, save he which is of God, he hath seen the Father.
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Verily, verily, I say unto you, He that believeth on me hath everlasting life.
    - type: text
      text: ' '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I am that bread of life.
    - type: text
      text: ' '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Your fathers did eat manna in the wilderness, and are dead.
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus then lifted up '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' eyes, and saw a great company come unto him, he saith unto Philip, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whence shall we buy bread, that these may eat?
    - type: text
      text: ' '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: This is the bread which cometh down from heaven, that a man may eat thereof, and not die.
    - type: text
      text: ' '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I am the living bread which came down from heaven: if any man eat of this bread, he shall live for ever: and the bread that I will give is my flesh, which I will give for the life of the world.'
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Jews therefore strove among themselves, saying, How can this man give us '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' flesh to eat? '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Verily, verily, I say unto you, Except ye eat the flesh of the Son of man, and drink his blood, ye have no life in you.
    - type: text
      text: ' '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whoso eateth my flesh, and drinketh my blood, hath eternal life; and I will raise him up at the last day.
    - type: text
      text: ' '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For my flesh is meat indeed, and my blood is drink indeed.
    - type: text
      text: ' '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He that eateth my flesh, and drinketh my blood, dwelleth in me, and I in him.
    - type: text
      text: ' '
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'As the living Father hath sent me, and I live by the Father: so he that eateth me, even he shall live by me.'
    - type: text
      text: ' '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'This is that bread which came down from heaven: not as your fathers did eat manna, and are dead: he that eateth of this bread shall live for ever.'
    - type: text
      text: ' '
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These things said he in the synagogue, as he taught in Capernaum.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And this he said to prove him: for he himself knew what he would do. '
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Many therefore of his disciples, when they had heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ', said, This is an hard saying; who can hear it? '
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus knew in himself that his disciples murmured at it, he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Doth this offend you?
    - type: text
      text: ' '
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: add
        children:
        - type: text
          text: What
      - type: text
        text: ' and if ye shall see the Son of man ascend up where he was before?'
    - type: text
      text: ' '
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'It is the spirit that quickeneth; the flesh profiteth nothing: the words that I speak unto you, '
      - type: usfm
        marker: add
        children:
        - type: text
          text: they
      - type: text
        text: ' are spirit, and '
      - type: usfm
        marker: add
        children:
        - type: text
          text: they
      - type: text
        text: ' are life.'
    - type: text
      text: ' '
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But there are some of you that believe not.
    - type: text
      text: ' For Jesus knew from the beginning who they were that believed not, and who should betray him. '
  '65':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Therefore said I unto you, that no man can come unto me, except it were given unto him of my Father.
  '66':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: time
    - type: text
      text: ' many of his disciples went back, and walked no more with him. '
  '67':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said Jesus unto the twelve, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Will ye also go away?
    - type: text
      text: ' '
  '68':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Simon Peter answered him, Lord, to whom shall we go? thou hast the words of eternal life. '
  '69':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And we believe and are sure that thou art that Christ, the Son of the living God. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Philip answered him, Two hundred pennyworth of bread is not sufficient for them, that every one of them may take a little. '
  '70':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Have not I chosen you twelve, and one of you is a devil?
    - type: text
      text: ' '
  '71':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He spake of Judas Iscariot '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the son
    - type: text
      text: ' of Simon: for he it was that should betray him, being one of the twelve.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One of his disciples, Andrew, Simon Peter''s brother, saith unto him, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There is a lad here, which hath five barley loaves, and two small fishes: but what are they among so many? '
