document_id: ISA.57
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The righteous perisheth, and no man layeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to heart: and merciful men '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' taken away, none considering that the righteous is taken away from the evil '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to come
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He shall enter into peace: they shall rest in their beds, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: each one
  - type: text
    text: ' walking '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' his uprightness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But draw near hither, ye sons of the sorceress, the seed of the adulterer and the whore. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Against whom do ye sport yourselves? against whom make ye a wide mouth, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' draw out the tongue? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' ye not children of transgression, a seed of falsehood, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'enflaming yourselves with idols under every green tree, slaying the children in the valleys under the clifts of the rocks? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Among the smooth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: stones
  - type: text
    text: ' of the stream '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy portion; they, they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' thy lot: even to them hast thou poured a drink offering, thou hast offered a meat offering. Should I receive comfort in these? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Upon a lofty and high mountain hast thou set thy bed: even thither wentest thou up to offer sacrifice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Behind the doors also and the posts hast thou set up thy remembrance: for thou hast discovered '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thyself to another
  - type: text
    text: ' than me, and art gone up; thou hast enlarged thy bed, and made thee '
  - type: usfm
    marker: add
    children:
    - type: text
      text: a covenant
  - type: text
    text: ' with them; thou lovedst their bed where thou sawest '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And thou wentest to the king with ointment, and didst increase thy perfumes, and didst send thy messengers far off, and didst debase '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thyself even
  - type: text
    text: ' unto hell. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Thou art wearied in the greatness of thy way; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yet
  - type: text
    text: ' saidst thou not, There is no hope: thou hast found the life of thine hand; therefore thou wast not grieved.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And of whom hast thou been afraid or feared, that thou hast lied, and hast not remembered me, nor laid '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to thy heart? have not I held my peace even of old, and thou fearest me not? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I will declare thy righteousness, and thy works; for they shall not profit thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When thou criest, let thy companies deliver thee; but the wind shall carry them all away; vanity shall take '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'them:'
  - type: text
    text: ' but he that putteth his trust in me shall possess the land, and shall inherit my holy mountain; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: and shall say, Cast ye up, cast ye up, prepare the way, take up the stumblingblock out of the way of my people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For thus saith the high and lofty One that inhabiteth eternity, whose name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Holy; I dwell in the high and holy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: place
  - type: text
    text: ', with him also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' of a contrite and humble spirit, to revive the spirit of the humble, and to revive the heart of the contrite ones. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For I will not contend for ever, neither will I be always wroth: for the spirit should fail before me, and the souls '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' I have made. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For the iniquity of his covetousness was I wroth, and smote him: I hid me, and was wroth, and he went on frowardly in the way of his heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I have seen his ways, and will heal him: I will lead him also, and restore comforts unto him and to his mourners. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'I create the fruit of the lips; Peace, peace to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him that is
  - type: text
    text: ' far off, and to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him that is
  - type: text
    text: ' near, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and I will heal him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But the wicked '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' like the troubled sea, when it cannot rest, whose waters cast up mire and dirt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' no peace, saith my God, to the wicked.'
