document_id: LEV.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sacrifices
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' called unto Moses, and spake unto him out of the tabernacle of the congregation, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if his offering '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' of the flocks, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: namely
    - type: text
      text: ', of the sheep, or of the goats, for a burnt sacrifice; he shall bring it a male without blemish. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he shall kill it on the side of the altar northward before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': and the priests, Aaron''s sons, shall sprinkle his blood round about upon the altar. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he shall cut it into his pieces, with his head and his fat: and the priest shall lay them in order on the wood that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' on the fire which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' upon the altar: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but he shall wash the inwards and the legs with water: and the priest shall bring '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' all, and burn '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' upon the altar: it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a burnt sacrifice, an offering made by fire, of a sweet savour unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if the burnt sacrifice for his offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' of fowls, then he shall bring his offering of turtledoves, or of young pigeons. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the priest shall bring it unto the altar, and wring off his head, and burn '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' on the altar; and the blood thereof shall be wrung out at the side of the altar: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he shall pluck away his crop with his feathers, and cast it beside the altar on the east part, by the place of the ashes: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he shall cleave it with the wings thereof, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' shall not divide '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' asunder: and the priest shall burn it upon the altar, upon the wood that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' upon the fire: it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a burnt sacrifice, an offering made by fire, of a sweet savour unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Speak unto the children of Israel, and say unto them, If any man of you bring an offering unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', ye shall bring your offering of the cattle, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' of the herd, and of the flock.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Burnt Offering
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If his offering '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' a burnt sacrifice of the herd, let him offer a male without blemish: he shall offer it of his own voluntary will at the door of the tabernacle of the congregation before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he shall put his hand upon the head of the burnt offering; and it shall be accepted for him to make atonement for him. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he shall kill the bullock before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': and the priests, Aaron''s sons, shall bring the blood, and sprinkle the blood round about upon the altar that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is by
    - type: text
      text: ' the door of the tabernacle of the congregation. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he shall flay the burnt offering, and cut it into his pieces. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Aaron the priest shall put fire upon the altar, and lay the wood in order upon the fire: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the priests, Aaron''s sons, shall lay the parts, the head, and the fat, in order upon the wood that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' on the fire which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' upon the altar: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but his inwards and his legs shall he wash in water: and the priest shall burn all on the altar, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' a burnt sacrifice, an offering made by fire, of a sweet savour unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
