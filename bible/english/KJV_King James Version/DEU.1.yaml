document_id: DEU.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' the words which Moses spake unto all Israel on this side Jordan in the wilderness, in the plain over against the Red '
    - type: usfm
      marker: add
      children:
      - type: text
        text: sea
    - type: text
      text: ', between Paran, and Tophel, and Laban, and Hazeroth, and Dizahab. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God hath multiplied you, and, behold, ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' this day as the stars of heaven for multitude. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '(The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of your fathers make you a thousand times so many more as ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ', and bless you, as he hath promised you!) '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'How can I myself alone bear your cumbrance, and your burden, and your strife? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Take you wise men, and understanding, and known among your tribes, and I will make them rulers over you. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And ye answered me, and said, The thing which thou hast spoken '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' good '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for us
    - type: text
      text: ' to do. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So I took the chief of your tribes, wise men, and known, and made them heads over you, captains over thousands, and captains over hundreds, and captains over fifties, and captains over tens, and officers among your tribes. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And I charged your judges at that time, saying, Hear '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the causes
    - type: text
      text: ' between your brethren, and judge righteously between '
    - type: usfm
      marker: add
      children:
      - type: text
        text: every
    - type: text
      text: ' man and his brother, and the stranger '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is
    - type: text
      text: ' with him. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ye shall not respect persons in judgment; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' ye shall hear the small as well as the great; ye shall not be afraid of the face of man; for the judgment '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' God''s: and the cause that is too hard for you, bring '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' unto me, and I will hear it. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: And I commanded you at that time all the things which ye should do.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And when we departed from Horeb, we went through all that great and terrible wilderness, which ye saw by the way of the mountain of the Amorites, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God commanded us; and we came to Kadesh-barnea. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: (
    - type: usfm
      marker: add
      children:
      - type: text
        text: There are
    - type: text
      text: ' eleven days'' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: journey
    - type: text
      text: ' from Horeb by the way of mount Seir unto Kadesh-barnea.) '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And I said unto you, Ye are come unto the mountain of the Amorites, which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God doth give unto us. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Behold, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God hath set the land before thee: go up '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' possess '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of thy fathers hath said unto thee; fear not, neither be discouraged. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And ye came near unto me every one of you, and said, We will send men before us, and they shall search us out the land, and bring us word again by what way we must go up, and into what cities we shall come. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And the saying pleased me well: and I took twelve men of you, one of a tribe: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'and they turned and went up into the mountain, and came unto the valley of Eshcol, and searched it out. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And they took of the fruit of the land in their hands, and brought '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' down unto us, and brought us word again, and said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' a good land which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God doth give us.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Notwithstanding ye would not go up, but rebelled against the commandment of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God: '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'and ye murmured in your tents, and said, Because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hated us, he hath brought us forth out of the land of Egypt, to deliver us into the hand of the Amorites, to destroy us. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Whither shall we go up? our brethren have discouraged our heart, saying, The people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' greater and taller than we; the cities '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' great and walled up to heaven; and moreover we have seen the sons of the Anakims there. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Then I said unto you, Dread not, neither be afraid of them. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And it came to pass in the fortieth year, in the eleventh month, on the first '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the month, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' Moses spake unto the children of Israel, according unto all that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had given him in commandment unto them; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God which goeth before you, he shall fight for you, according to all that he did for you in Egypt before your eyes; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'and in the wilderness, where thou hast seen how that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God bare thee, as a man doth bear his son, in all the way that ye went, until ye came into this place. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Yet in this thing ye did not believe the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'who went in the way before you, to search you out a place to pitch your tents '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ', fire by night, to shew you by what way ye should go, and in a cloud by day.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' heard the voice of your words, and was wroth, and sware, saying, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Surely there shall not one of these men of this evil generation see that good land, which I sware to give unto your fathers, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'save Caleb the son of Jephunneh; he shall see it, and to him will I give the land that he hath trodden upon, and to his children, because he hath wholly followed the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Also the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was angry with me for your sakes, saying, Thou also shalt not go in thither. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: add
      children:
      - type: text
        text: But
    - type: text
      text: ' Joshua the son of Nun, which standeth before thee, he shall go in thither: encourage him: for he shall cause Israel to inherit it. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Moreover your little ones, which ye said should be a prey, and your children, which in that day had no knowledge between good and evil, they shall go in thither, and unto them will I give it, and they shall possess it. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'after he had slain Sihon the king of the Amorites, which dwelt in Heshbon, and Og the king of Bashan, which dwelt at Astaroth in Edrei: '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'But '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as for
    - type: text
      text: ' you, turn you, and take your journey into the wilderness by the way of the Red sea.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Then ye answered and said unto me, We have sinned against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', we will go up and fight, according to all that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God commanded us. And when ye had girded on every man his weapons of war, ye were ready to go up into the hill. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto me, Say unto them, Go not up, neither fight; for I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' not among you; lest ye be smitten before your enemies. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'So I spake unto you; and ye would not hear, but rebelled against the commandment of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and went presumptuously up into the hill. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'And the Amorites, which dwelt in that mountain, came out against you, and chased you, as bees do, and destroyed you in Seir, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' unto Hormah. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'And ye returned and wept before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' would not hearken to your voice, nor give ear unto you. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'So ye abode in Kadesh many days, according unto the days that ye abode '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'on this side Jordan, in the land of Moab, began Moses to declare this law, saying, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God spake unto us in Horeb, saying, Ye have dwelt long enough in this mount: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'turn you, and take your journey, and go to the mount of the Amorites, and unto all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the places
    - type: text
      text: ' nigh thereunto, in the plain, in the hills, and in the vale, and in the south, and by the sea side, to the land of the Canaanites, and unto Lebanon, unto the great river, the river Euphrates. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Behold, I have set the land before you: go in and possess the land which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' sware unto your fathers, Abraham, Isaac, and Jacob, to give unto them and to their seed after them.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And I spake unto you at that time, saying, I am not able to bear you myself alone: '
