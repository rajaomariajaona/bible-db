document_id: MAT.5,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sermon on the Mount
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And seeing the multitudes, he went up into a mountain: and when he was set, his disciples came unto him: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Blessed '
      - type: usfm
        marker: add
        children:
        - type: text
          text: are
      - type: text
        text: ' they which are persecuted for righteousness'' sake: for their''s is the kingdom of heaven.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Blessed are ye, when '
      - type: usfm
        marker: add
        children:
        - type: text
          text: men
      - type: text
        text: ' shall revile you, and persecute '
      - type: usfm
        marker: add
        children:
        - type: text
          text: you
      - type: text
        text: ', and shall say all manner of evil against you falsely, for my sake.'
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Rejoice, and be exceeding glad: for great '
      - type: usfm
        marker: add
        children:
        - type: text
          text: is
      - type: text
        text: ' your reward in heaven: for so persecuted they the prophets which were before you.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ye are the salt of the earth: but if the salt have lost his savour, wherewith shall it be salted? it is thenceforth good for nothing, but to be cast out, and to be trodden under foot of men.'
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ye are the light of the world. A city that is set on an hill cannot be hid.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Neither do men light a candle, and put it under a bushel, but on a candlestick; and it giveth light unto all that are in the house.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Let your light so shine before men, that they may see your good works, and glorify your Father which is in heaven.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Think not that I am come to destroy the law, or the prophets: I am not come to destroy, but to fulfil.'
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For verily I say unto you, Till heaven and earth pass, one jot or one tittle shall in no wise pass from the law, till all be fulfilled.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Whosoever therefore shall break one of these least commandments, and shall teach men so, he shall be called the least in the kingdom of heaven: but whosoever shall do and teach '
      - type: usfm
        marker: add
        children:
        - type: text
          text: them
      - type: text
        text: ', the same shall be called great in the kingdom of heaven.'
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and he opened his mouth, and taught them, saying,
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For I say unto you, That except your righteousness shall exceed '
      - type: usfm
        marker: add
        children:
        - type: text
          text: the righteousness
      - type: text
        text: ' of the scribes and Pharisees, ye shall in no case enter into the kingdom of heaven.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The New Law
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ye have heard that it was said by them of old time, Thou shalt not kill; and whosoever shall kill shall be in danger of the judgment:'
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'but I say unto you, That whosoever is angry with his brother without a cause shall be in danger of the judgment: and whosoever shall say to his brother, Raca, shall be in danger of the council: but whosoever shall say, Thou fool, shall be in danger of hell fire.'
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Therefore if thou bring thy gift to the altar, and there rememberest that thy brother hath ought against thee;
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: leave there thy gift before the altar, and go thy way; first be reconciled to thy brother, and then come and offer thy gift.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Agree with thine adversary quickly, whiles thou art in the way with him; lest at any time the adversary deliver thee to the judge, and the judge deliver thee to the officer, and thou be cast into prison.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Verily I say unto thee, Thou shalt by no means come out thence, till thou hast paid the uttermost farthing.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ye have heard that it was said by them of old time, Thou shalt not commit adultery:'
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but I say unto you, That whosoever looketh on a woman to lust after her hath committed adultery with her already in his heart.
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And if thy right eye offend thee, pluck it out, and cast '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ' from thee: for it is profitable for thee that one of thy members should perish, and not '
      - type: usfm
        marker: add
        children:
        - type: text
          text: that
      - type: text
        text: ' thy whole body should be cast into hell.'
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Blessed '
      - type: usfm
        marker: add
        children:
        - type: text
          text: are
      - type: text
        text: ' the poor in spirit: for their''s is the kingdom of heaven.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And if thy right hand offend thee, cut it off, and cast '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ' from thee: for it is profitable for thee that one of thy members should perish, and not '
      - type: usfm
        marker: add
        children:
        - type: text
          text: that
      - type: text
        text: ' thy whole body should be cast into hell.'
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'It hath been said, Whosoever shall put away his wife, let him give her a writing of divorcement:'
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'but I say unto you, That whosoever shall put away his wife, saving for the cause of fornication, causeth her to commit adultery: and whosoever shall marry her that is divorced committeth adultery.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Again, ye have heard that it hath been said by them of old time, Thou shalt not forswear thyself, but shalt perform unto the Lord thine oaths:'
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'but I say unto you, Swear not at all; neither by heaven; for it is God''s throne:'
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'nor by the earth; for it is his footstool: neither by Jerusalem; for it is the city of the great King.'
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Neither shalt thou swear by thy head, because thou canst not make one hair white or black.
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But let your communication be, Yea, yea; Nay, nay: for whatsoever is more than these cometh of evil.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ye have heard that it hath been said, An eye for an eye, and a tooth for a tooth:'
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'but I say unto you, That ye resist not evil: but whosoever shall smite thee on thy right cheek, turn to him the other also.'
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Blessed '
      - type: usfm
        marker: add
        children:
        - type: text
          text: are
      - type: text
        text: ' they that mourn: for they shall be comforted.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And if any man will sue thee at the law, and take away thy coat, let him have '
      - type: usfm
        marker: add
        children:
        - type: text
          text: thy
      - type: text
        text: ' cloke also.'
    - type: text
      text: ' '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And whosoever shall compel thee to go a mile, go with him twain.
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Give to him that asketh thee, and from him that would borrow of thee turn not thou away.
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ye have heard that it hath been said, Thou shalt love thy neighbour, and hate thine enemy.
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But I say unto you, Love your enemies, bless them that curse you, do good to them that hate you, and pray for them which despitefully use you, and persecute you;
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'that ye may be the children of your Father which is in heaven: for he maketh his sun to rise on the evil and on the good, and sendeth rain on the just and on the unjust.'
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For if ye love them which love you, what reward have ye? do not even the publicans the same?
    - type: text
      text: ' '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And if ye salute your brethren only, what do ye more '
      - type: usfm
        marker: add
        children:
        - type: text
          text: than others
      - type: text
        text: '? do not even the publicans so?'
    - type: text
      text: ' '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Be ye therefore perfect, even as your Father which is in heaven is perfect.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Blessed '
      - type: usfm
        marker: add
        children:
        - type: text
          text: are
      - type: text
        text: ' the meek: for they shall inherit the earth.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Blessed '
      - type: usfm
        marker: add
        children:
        - type: text
          text: are
      - type: text
        text: ' they which do hunger and thirst after righteousness: for they shall be filled.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Blessed '
      - type: usfm
        marker: add
        children:
        - type: text
          text: are
      - type: text
        text: ' the merciful: for they shall obtain mercy.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Blessed '
      - type: usfm
        marker: add
        children:
        - type: text
          text: are
      - type: text
        text: ' the pure in heart: for they shall see God.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Blessed '
      - type: usfm
        marker: add
        children:
        - type: text
          text: are
      - type: text
        text: ' the peacemakers: for they shall be called the children of God.'
