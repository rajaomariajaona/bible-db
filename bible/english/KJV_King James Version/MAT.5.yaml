document_id: MAT.5,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Sermon on the Mount
  - type: text
    content: 'And seeing the multitudes, he went up into a mountain: and when he was set, his disciples came unto him: '
  '10':
  - type: text
    content: ' '
  - type: text
    content: 'Blessed '
  - type: text
    content: are
  - type: text
    content: ' they which are persecuted for righteousness'' sake: for their''s is the kingdom of heaven.'
  '11':
  - type: text
    content: ' '
  - type: text
    content: 'Blessed are ye, when '
  - type: text
    content: men
  - type: text
    content: ' shall revile you, and persecute '
  - type: text
    content: you
  - type: text
    content: ', and shall say all manner of evil against you falsely, for my sake.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Rejoice, and be exceeding glad: for great '
  - type: text
    content: is
  - type: text
    content: ' your reward in heaven: for so persecuted they the prophets which were before you.'
  '13':
  - type: text
    content: ' '
  - type: text
    content: 'Ye are the salt of the earth: but if the salt have lost his savour, wherewith shall it be salted? it is thenceforth good for nothing, but to be cast out, and to be trodden under foot of men.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: Ye are the light of the world. A city that is set on an hill cannot be hid.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Neither do men light a candle, and put it under a bushel, but on a candlestick; and it giveth light unto all that are in the house.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Let your light so shine before men, that they may see your good works, and glorify your Father which is in heaven.
  '17':
  - type: text
    content: ' '
  - type: text
    content: 'Think not that I am come to destroy the law, or the prophets: I am not come to destroy, but to fulfil.'
  - type: text
    content: ' '
  '18':
  - type: text
    content: For verily I say unto you, Till heaven and earth pass, one jot or one tittle shall in no wise pass from the law, till all be fulfilled.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Whosoever therefore shall break one of these least commandments, and shall teach men so, he shall be called the least in the kingdom of heaven: but whosoever shall do and teach '
  - type: text
    content: them
  - type: text
    content: ', the same shall be called great in the kingdom of heaven.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: and he opened his mouth, and taught them, saying,
  '20':
  - type: text
    content: 'For I say unto you, That except your righteousness shall exceed '
  - type: text
    content: the righteousness
  - type: text
    content: ' of the scribes and Pharisees, ye shall in no case enter into the kingdom of heaven.'
  - type: heading
    content: The New Law
  '21':
  - type: text
    content: ' '
  - type: text
    content: 'Ye have heard that it was said by them of old time, Thou shalt not kill; and whosoever shall kill shall be in danger of the judgment:'
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'but I say unto you, That whosoever is angry with his brother without a cause shall be in danger of the judgment: and whosoever shall say to his brother, Raca, shall be in danger of the council: but whosoever shall say, Thou fool, shall be in danger of hell fire.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: Therefore if thou bring thy gift to the altar, and there rememberest that thy brother hath ought against thee;
  - type: text
    content: ' '
  '24':
  - type: text
    content: leave there thy gift before the altar, and go thy way; first be reconciled to thy brother, and then come and offer thy gift.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Agree with thine adversary quickly, whiles thou art in the way with him; lest at any time the adversary deliver thee to the judge, and the judge deliver thee to the officer, and thou be cast into prison.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Verily I say unto thee, Thou shalt by no means come out thence, till thou hast paid the uttermost farthing.
  '27':
  - type: text
    content: ' '
  - type: text
    content: 'Ye have heard that it was said by them of old time, Thou shalt not commit adultery:'
  - type: text
    content: ' '
  '28':
  - type: text
    content: but I say unto you, That whosoever looketh on a woman to lust after her hath committed adultery with her already in his heart.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'And if thy right eye offend thee, pluck it out, and cast '
  - type: text
    content: it
  - type: text
    content: ' from thee: for it is profitable for thee that one of thy members should perish, and not '
  - type: text
    content: that
  - type: text
    content: ' thy whole body should be cast into hell.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: ' '
  - type: text
    content: 'Blessed '
  - type: text
    content: are
  - type: text
    content: ' the poor in spirit: for their''s is the kingdom of heaven.'
  '30':
  - type: text
    content: 'And if thy right hand offend thee, cut it off, and cast '
  - type: text
    content: it
  - type: text
    content: ' from thee: for it is profitable for thee that one of thy members should perish, and not '
  - type: text
    content: that
  - type: text
    content: ' thy whole body should be cast into hell.'
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'It hath been said, Whosoever shall put away his wife, let him give her a writing of divorcement:'
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'but I say unto you, That whosoever shall put away his wife, saving for the cause of fornication, causeth her to commit adultery: and whosoever shall marry her that is divorced committeth adultery.'
  '33':
  - type: text
    content: ' '
  - type: text
    content: 'Again, ye have heard that it hath been said by them of old time, Thou shalt not forswear thyself, but shalt perform unto the Lord thine oaths:'
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'but I say unto you, Swear not at all; neither by heaven; for it is God''s throne:'
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'nor by the earth; for it is his footstool: neither by Jerusalem; for it is the city of the great King.'
  - type: text
    content: ' '
  '36':
  - type: text
    content: Neither shalt thou swear by thy head, because thou canst not make one hair white or black.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'But let your communication be, Yea, yea; Nay, nay: for whatsoever is more than these cometh of evil.'
  '38':
  - type: text
    content: ' '
  - type: text
    content: 'Ye have heard that it hath been said, An eye for an eye, and a tooth for a tooth:'
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'but I say unto you, That ye resist not evil: but whosoever shall smite thee on thy right cheek, turn to him the other also.'
  - type: text
    content: ' '
  '4':
  - type: text
    content: ' '
  - type: text
    content: 'Blessed '
  - type: text
    content: are
  - type: text
    content: ' they that mourn: for they shall be comforted.'
  '40':
  - type: text
    content: 'And if any man will sue thee at the law, and take away thy coat, let him have '
  - type: text
    content: thy
  - type: text
    content: ' cloke also.'
  - type: text
    content: ' '
  '41':
  - type: text
    content: And whosoever shall compel thee to go a mile, go with him twain.
  - type: text
    content: ' '
  '42':
  - type: text
    content: Give to him that asketh thee, and from him that would borrow of thee turn not thou away.
  '43':
  - type: text
    content: ' '
  - type: text
    content: Ye have heard that it hath been said, Thou shalt love thy neighbour, and hate thine enemy.
  - type: text
    content: ' '
  '44':
  - type: text
    content: But I say unto you, Love your enemies, bless them that curse you, do good to them that hate you, and pray for them which despitefully use you, and persecute you;
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'that ye may be the children of your Father which is in heaven: for he maketh his sun to rise on the evil and on the good, and sendeth rain on the just and on the unjust.'
  - type: text
    content: ' '
  '46':
  - type: text
    content: For if ye love them which love you, what reward have ye? do not even the publicans the same?
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'And if ye salute your brethren only, what do ye more '
  - type: text
    content: than others
  - type: text
    content: '? do not even the publicans so?'
  - type: text
    content: ' '
  '48':
  - type: text
    content: Be ye therefore perfect, even as your Father which is in heaven is perfect.
  '5':
  - type: text
    content: ' '
  - type: text
    content: 'Blessed '
  - type: text
    content: are
  - type: text
    content: ' the meek: for they shall inherit the earth.'
  '6':
  - type: text
    content: ' '
  - type: text
    content: 'Blessed '
  - type: text
    content: are
  - type: text
    content: ' they which do hunger and thirst after righteousness: for they shall be filled.'
  '7':
  - type: text
    content: ' '
  - type: text
    content: 'Blessed '
  - type: text
    content: are
  - type: text
    content: ' the merciful: for they shall obtain mercy.'
  '8':
  - type: text
    content: ' '
  - type: text
    content: 'Blessed '
  - type: text
    content: are
  - type: text
    content: ' the pure in heart: for they shall see God.'
  '9':
  - type: text
    content: ' '
  - type: text
    content: 'Blessed '
  - type: text
    content: are
  - type: text
    content: ' the peacemakers: for they shall be called the children of God.'
