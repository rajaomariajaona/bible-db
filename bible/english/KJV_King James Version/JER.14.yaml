document_id: JER.14,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: A Great Drought
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' that came to Jeremiah concerning the dearth.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' unto this people, Thus have they loved to wander, they have not refrained their feet, therefore the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' doth not accept them; he will now remember their iniquity, and visit their sins. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then said the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' unto me, Pray not for this people for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' good. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'When they fast, I will not hear their cry; and when they offer burnt offering and an oblation, I will not accept them: but I will consume them by the sword, and by the famine, and by the pestilence.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then said I, Ah, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '! behold, the prophets say unto them, Ye shall not see the sword, neither shall ye have famine; but I will give you assured peace in this place. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto me, The prophets prophesy lies in my name: I sent them not, neither have I commanded them, neither spake unto them: they prophesy unto you a false vision and divination, and a thing of nought, and the deceit of their heart. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Therefore thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' concerning the prophets that prophesy in my name, and I sent them not, yet they say, Sword and famine shall not be in this land; By sword and famine shall those prophets be consumed. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And the people to whom they prophesy shall be cast out in the streets of Jerusalem because of the famine and the sword; and they shall have none to bury them, them, their wives, nor their sons, nor their daughters: for I will pour their wickedness upon them. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Therefore thou shalt say this word unto them; Let mine eyes run down with tears night and day, and let them not cease: for the virgin daughter of my people is broken with a great breach, with a very grievous blow. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: If I go forth into the field, then behold the slain with the sword! and if I enter into the city, then behold them that are sick with famine! yea, both the prophet and the priest go about into a land that they know not.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Hast thou utterly rejected Judah? hath thy soul lothed Zion? why hast thou smitten us, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no healing for us? we looked for peace, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no good; and for the time of healing, and behold trouble! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Judah mourneth, and the gates thereof languish; they are black unto the ground; and the cry of Jerusalem is gone up. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'We acknowledge, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', our wickedness, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the iniquity of our fathers: for we have sinned against thee. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Do not abhor '
    - type: usfm
      marker: add
      children:
      - type: text
        text: us
    - type: text
      text: ', for thy name''s sake, do not disgrace the throne of thy glory: remember, break not thy covenant with us. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Are there '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' among the vanities of the Gentiles that can cause rain? or can the heavens give showers? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Art
    - type: text
      text: ' not thou he, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God? therefore we will wait upon thee: for thou hast made all these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And their nobles have sent their little ones to the waters: they came to the pits, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' found no water; they returned with their vessels empty; they were ashamed and confounded, and covered their heads. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Because the ground is chapt, for there was no rain in the earth, the plowmen were ashamed, they covered their heads. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Yea, the hind also calved in the field, and forsook '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', because there was no grass. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And the wild asses did stand in the high places, they snuffed up the wind like dragons; their eyes did fail, because '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' no grass.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', though our iniquities testify against us, do thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' for thy name''s sake; for our backslidings are many; we have sinned against thee. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'O the hope of Israel, the saviour thereof in time of trouble, why shouldest thou be as a stranger in the land, and as a wayfaring man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' turneth aside to tarry for a night? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Why shouldest thou be as a man astonied, as a mighty man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' cannot save? yet thou, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' in the midst of us, and we are called by thy name; leave us not.'
