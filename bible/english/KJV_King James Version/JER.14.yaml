  '1':
  - type: heading
    content: A Great Drought
  - type: text
    content: 'The word of the '
  - type: text
    content: LORD
  - type: text
    content: ' that came to Jeremiah concerning the dearth.'
  '10':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' unto this people, Thus have they loved to wander, they have not refrained their feet, therefore the '
  - type: text
    content: LORD
  - type: text
    content: ' doth not accept them; he will now remember their iniquity, and visit their sins. '
  '11':
  - type: text
    content: 'Then said the '
  - type: text
    content: LORD
  - type: text
    content: ' unto me, Pray not for this people for '
  - type: text
    content: their
  - type: text
    content: ' good. '
  '12':
  - type: text
    content: 'When they fast, I will not hear their cry; and when they offer burnt offering and an oblation, I will not accept them: but I will consume them by the sword, and by the famine, and by the pestilence.'
  '13':
  - type: text
    content: 'Then said I, Ah, Lord '
  - type: text
    content: GOD
  - type: text
    content: '! behold, the prophets say unto them, Ye shall not see the sword, neither shall ye have famine; but I will give you assured peace in this place. '
  '14':
  - type: text
    content: 'Then the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto me, The prophets prophesy lies in my name: I sent them not, neither have I commanded them, neither spake unto them: they prophesy unto you a false vision and divination, and a thing of nought, and the deceit of their heart. '
  '15':
  - type: text
    content: 'Therefore thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' concerning the prophets that prophesy in my name, and I sent them not, yet they say, Sword and famine shall not be in this land; By sword and famine shall those prophets be consumed. '
  '16':
  - type: text
    content: 'And the people to whom they prophesy shall be cast out in the streets of Jerusalem because of the famine and the sword; and they shall have none to bury them, them, their wives, nor their sons, nor their daughters: for I will pour their wickedness upon them. '
  '17':
  - type: text
    content: 'Therefore thou shalt say this word unto them; Let mine eyes run down with tears night and day, and let them not cease: for the virgin daughter of my people is broken with a great breach, with a very grievous blow. '
  '18':
  - type: text
    content: If I go forth into the field, then behold the slain with the sword! and if I enter into the city, then behold them that are sick with famine! yea, both the prophet and the priest go about into a land that they know not.
  '19':
  - type: text
    content: 'Hast thou utterly rejected Judah? hath thy soul lothed Zion? why hast thou smitten us, and '
  - type: text
    content: there is
  - type: text
    content: ' no healing for us? we looked for peace, and '
  - type: text
    content: there is
  - type: text
    content: ' no good; and for the time of healing, and behold trouble! '
  '2':
  - type: text
    content: 'Judah mourneth, and the gates thereof languish; they are black unto the ground; and the cry of Jerusalem is gone up. '
  '20':
  - type: text
    content: 'We acknowledge, O '
  - type: text
    content: LORD
  - type: text
    content: ', our wickedness, '
  - type: text
    content: and
  - type: text
    content: ' the iniquity of our fathers: for we have sinned against thee. '
  '21':
  - type: text
    content: 'Do not abhor '
  - type: text
    content: us
  - type: text
    content: ', for thy name''s sake, do not disgrace the throne of thy glory: remember, break not thy covenant with us. '
  '22':
  - type: text
    content: 'Are there '
  - type: text
    content: any
  - type: text
    content: ' among the vanities of the Gentiles that can cause rain? or can the heavens give showers? '
  - type: text
    content: Art
  - type: text
    content: ' not thou he, O '
  - type: text
    content: LORD
  - type: text
    content: ' our God? therefore we will wait upon thee: for thou hast made all these '
  - type: text
    content: things
  - type: text
    content: .
  '3':
  - type: text
    content: 'And their nobles have sent their little ones to the waters: they came to the pits, '
  - type: text
    content: and
  - type: text
    content: ' found no water; they returned with their vessels empty; they were ashamed and confounded, and covered their heads. '
  '4':
  - type: text
    content: 'Because the ground is chapt, for there was no rain in the earth, the plowmen were ashamed, they covered their heads. '
  '5':
  - type: text
    content: 'Yea, the hind also calved in the field, and forsook '
  - type: text
    content: it
  - type: text
    content: ', because there was no grass. '
  '6':
  - type: text
    content: 'And the wild asses did stand in the high places, they snuffed up the wind like dragons; their eyes did fail, because '
  - type: text
    content: there was
  - type: text
    content: ' no grass.'
  '7':
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ', though our iniquities testify against us, do thou '
  - type: text
    content: it
  - type: text
    content: ' for thy name''s sake; for our backslidings are many; we have sinned against thee. '
  '8':
  - type: text
    content: 'O the hope of Israel, the saviour thereof in time of trouble, why shouldest thou be as a stranger in the land, and as a wayfaring man '
  - type: text
    content: that
  - type: text
    content: ' turneth aside to tarry for a night? '
  '9':
  - type: text
    content: 'Why shouldest thou be as a man astonied, as a mighty man '
  - type: text
    content: that
  - type: text
    content: ' cannot save? yet thou, O '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: art
  - type: text
    content: ' in the midst of us, and we are called by thy name; leave us not.'
