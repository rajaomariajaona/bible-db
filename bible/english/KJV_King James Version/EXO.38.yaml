    content: of
  - type: text
    content: ' silver, and the overlaying of their chapiters and their fillets '
  - type: text
    content: of
  - type: text
    content: ' silver. '
  '2':
  - type: text
    content: 'And he made the horns thereof on the four corners of it; the horns thereof were of the same: and he overlaid it with brass. '
  '20':
  - type: text
    content: 'And all the pins of the tabernacle, and of the court round about, '
  - type: text
    content: were of
  - type: text
    content: ' brass.'
  '21':
  - type: text
    content: 'This is the sum of the tabernacle, '
  - type: text
    content: even
  - type: text
    content: ' of the tabernacle of testimony, as it was counted, according to the commandment of Moses, '
  - type: text
    content: for
  - type: text
    content: ' the service of the Levites, by the hand of Ithamar, son to Aaron the priest. '
  '22':
  - type: text
    content: 'And Bezaleel the son of Uri, the son of Hur, of the tribe of Judah, made all that the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses. '
  '23':
  - type: text
    content: 'And with him '
  - type: text
    content: was
  - type: text
    content: ' Aholiab, son of Ahisamach, of the tribe of Dan, an engraver, and a cunning workman, and an embroiderer in blue, and in purple, and in scarlet, and fine linen.'
  '24':
  - type: text
    content: 'All the gold that was occupied for the work in all the work of the holy '
  - type: text
    content: place
  - type: text
    content: ', even the gold of the offering, was twenty and nine talents, and seven hundred and thirty shekels, after the shekel of the sanctuary. '
  '25':
  - type: text
    content: 'And the silver of them that were numbered of the congregation '
  - type: text
    content: was
  - type: text
    content: ' an hundred talents, and a thousand seven hundred and threescore and fifteen shekels, after the shekel of the sanctuary: '
  '26':
  - type: text
    content: 'a bekah for every man, '
  - type: text
    content: that is
  - type: text
    content: ', half a shekel, after the shekel of the sanctuary, for every one that went to be numbered, from twenty years old and upward, for six hundred thousand and three thousand and five hundred and fifty '
  - type: text
    content: men
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'And of the hundred talents of silver were cast the sockets of the sanctuary, and the sockets of the vail; an hundred sockets of the hundred talents, a talent for a socket. '
  '28':
  - type: text
    content: 'And of the thousand seven hundred seventy and five '
  - type: text
    content: shekels
  - type: text
    content: ' he made hooks for the pillars, and overlaid their chapiters, and filleted them. '
  '29':
  - type: text
    content: 'And the brass of the offering '
  - type: text
    content: was
  - type: text
    content: ' seventy talents, and two thousand and four hundred shekels. '
  '3':
  - type: text
    content: 'And he made all the vessels of the altar, the pots, and the shovels, and the basons, '
  - type: text
    content: and
  - type: text
    content: ' the fleshhooks, and the firepans: all the vessels thereof made he '
  - type: text
    content: of
  - type: text
    content: ' brass. '
  '30':
  - type: text
    content: 'And therewith he made the sockets to the door of the tabernacle of the congregation, and the brasen altar, and the brasen grate for it, and all the vessels of the altar, '
  '31':
  - type: text
    content: and the sockets of the court round about, and the sockets of the court gate, and all the pins of the tabernacle, and all the pins of the court round about.
  '4':
  - type: text
    content: 'And he made for the altar a brasen grate of network under the compass thereof beneath unto the midst of it. '
  '5':
  - type: text
    content: 'And he cast four rings for the four ends of the grate of brass, '
  - type: text
    content: to be
  - type: text
    content: ' places for the staves. '
  '6':
  - type: text
    content: 'And he made the staves '
  - type: text
    content: of
  - type: text
    content: ' shittim wood, and overlaid them with brass. '
  '7':
  - type: text
    content: And he put the staves into the rings on the sides of the altar, to bear it withal; he made the altar hollow with boards.
  '8':
  - type: text
    content: 'And he made the laver '
  - type: text
    content: of
  - type: text
    content: ' brass, and the foot of it '
  - type: text
    content: of
  - type: text
    content: ' brass, of the lookingglasses of '
  - type: text
    content: the women
  - type: text
    content: ' assembling, which assembled '
  - type: text
    content: at
  - type: text
    content: ' the door of the tabernacle of the congregation.'
  '9':
  - type: text
    content: 'And he made the court: on the south side southward the hangings of the court '
  - type: text
    content: were of
  - type: text
    content: ' fine twined linen, an hundred cubits: '
