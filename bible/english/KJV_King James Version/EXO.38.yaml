  - type: text
    content: 'And the hanging for the gate of the court '
  - type: text
    content: was
  - type: text
    content: ' needlework, '
  - type: text
    content: of
  - type: text
    content: ' blue, and purple, and scarlet, and fine twined linen: and twenty cubits '
  - type: text
    content: was
  - type: text
    content: ' the length, and the height in the breadth '
  - type: text
    content: was
  - type: text
    content: ' five cubits, answerable to the hangings of the court. '
  '19':
  - type: text
    content: 'And their pillars '
  - type: text
