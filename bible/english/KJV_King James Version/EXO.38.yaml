document_id: EXO.38
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And he made the altar of burnt offering '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' shittim wood: five cubits '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the length thereof, and five cubits the breadth thereof; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it was
  - type: text
    text: ' foursquare; and three cubits the height thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he made the horns thereof on the four corners of it; the horns thereof were of the same: and he overlaid it with brass. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And he made all the vessels of the altar, the pots, and the shovels, and the basons, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the fleshhooks, and the firepans: all the vessels thereof made he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' brass. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And he made for the altar a brasen grate of network under the compass thereof beneath unto the midst of it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And he cast four rings for the four ends of the grate of brass, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' places for the staves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he made the staves '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' shittim wood, and overlaid them with brass. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And he put the staves into the rings on the sides of the altar, to bear it withal; he made the altar hollow with boards.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And he made the laver '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' brass, and the foot of it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' brass, of the lookingglasses of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the women
  - type: text
    text: ' assembling, which assembled '
  - type: usfm
    marker: add
    children:
    - type: text
      text: at
  - type: text
    text: ' the door of the tabernacle of the congregation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And he made the court: on the south side southward the hangings of the court '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were of
  - type: text
    text: ' fine twined linen, an hundred cubits: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'their pillars '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' twenty, and their brasen sockets twenty; the hooks of the pillars and their fillets '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were of
  - type: text
    text: ' silver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And for the north side '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the hangings were
  - type: text
    text: ' an hundred cubits, their pillars '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' twenty, and their sockets of brass twenty; the hooks of the pillars and their fillets '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' silver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And for the west side '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' hangings of fifty cubits, their pillars ten, and their sockets ten; the hooks of the pillars and their fillets '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' silver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And for the east side eastward fifty cubits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The hangings of the one side '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of the gate were
  - type: text
    text: ' fifteen cubits; their pillars three, and their sockets three. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And for the other side of the court gate, on this hand and that hand, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' hangings of fifteen cubits; their pillars three, and their sockets three. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'All the hangings of the court round about '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' of fine twined linen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the sockets for the pillars '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were of
  - type: text
    text: ' brass; the hooks of the pillars and their fillets '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' silver; and the overlaying of their chapiters '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' silver; and all the pillars of the court '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' filleted with silver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And the hanging for the gate of the court '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' needlework, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' blue, and purple, and scarlet, and fine twined linen: and twenty cubits '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the length, and the height in the breadth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' five cubits, answerable to the hangings of the court. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And their pillars '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' four, and their sockets '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' brass four; their hooks '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' silver, and the overlaying of their chapiters and their fillets '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' silver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And all the pins of the tabernacle, and of the court round about, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were of
  - type: text
    text: ' brass.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'This is the sum of the tabernacle, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' of the tabernacle of testimony, as it was counted, according to the commandment of Moses, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' the service of the Levites, by the hand of Ithamar, son to Aaron the priest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And Bezaleel the son of Uri, the son of Hur, of the tribe of Judah, made all that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And with him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Aholiab, son of Ahisamach, of the tribe of Dan, an engraver, and a cunning workman, and an embroiderer in blue, and in purple, and in scarlet, and fine linen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'All the gold that was occupied for the work in all the work of the holy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: place
  - type: text
    text: ', even the gold of the offering, was twenty and nine talents, and seven hundred and thirty shekels, after the shekel of the sanctuary. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And the silver of them that were numbered of the congregation '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' an hundred talents, and a thousand seven hundred and threescore and fifteen shekels, after the shekel of the sanctuary: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'a bekah for every man, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ', half a shekel, after the shekel of the sanctuary, for every one that went to be numbered, from twenty years old and upward, for six hundred thousand and three thousand and five hundred and fifty '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And of the hundred talents of silver were cast the sockets of the sanctuary, and the sockets of the vail; an hundred sockets of the hundred talents, a talent for a socket. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And of the thousand seven hundred seventy and five '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shekels
  - type: text
    text: ' he made hooks for the pillars, and overlaid their chapiters, and filleted them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And the brass of the offering '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' seventy talents, and two thousand and four hundred shekels. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And therewith he made the sockets to the door of the tabernacle of the congregation, and the brasen altar, and the brasen grate for it, and all the vessels of the altar, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: and the sockets of the court round about, and the sockets of the court gate, and all the pins of the tabernacle, and all the pins of the court round about.
