    content: 'And he made the altar of burnt offering '
  - type: text
    content: of
  - type: text
    content: ' shittim wood: five cubits '
  - type: text
    content: was
  - type: text
    content: ' the length thereof, and five cubits the breadth thereof; '
  - type: text
    content: it was
  - type: text
    content: ' foursquare; and three cubits the height thereof. '
