  - type: text
    content: 'their pillars '
  - type: text
    content: were
  - type: text
    content: ' twenty, and their brasen sockets twenty; the hooks of the pillars and their fillets '
  - type: text
    content: were of
  - type: text
    content: ' silver. '
  '11':
  - type: text
    content: 'And for the north side '
  - type: text
    content: the hangings were
  - type: text
