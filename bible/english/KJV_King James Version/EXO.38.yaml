  - type: text
    content: of
  - type: text
    content: ' silver. '
  '12':
  - type: text
    content: 'And for the west side '
  - type: text
    content: were
  - type: text
    content: ' hangings of fifty cubits, their pillars ten, and their sockets ten; the hooks of the pillars and their fillets '
  - type: text
    content: of
  - type: text
    content: ' silver. '
  '13':
  - type: text
    content: 'And for the east side eastward fifty cubits. '
  '14':
  - type: text
    content: 'The hangings of the one side '
  - type: text
    content: of the gate were
  - type: text
    content: ' fifteen cubits; their pillars three, and their sockets three. '
