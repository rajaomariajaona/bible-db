verses:
  '1':
  - type: heading
    content: The Word of the Lord to Judah
  - type: text
    content: 'Moreover the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came to me, saying, '
  '10':
  - type: text
    content: 'For pass over the isles of Chittim, and see; and send unto Kedar, and consider diligently, and see if there be such a thing. '
  '11':
  - type: text
    content: 'Hath a nation changed '
  - type: text
    content: their
  - type: text
    content: ' gods, which '
  - type: text
    content: are
  - type: text
    content: ' yet no gods? but my people have changed their glory for '
  - type: text
    content: that which
  - type: text
    content: ' doth not profit. '
  '12':
  - type: text
    content: 'Be astonished, O ye heavens, at this, and be horribly afraid, be ye very desolate, saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'For my people have committed two evils; they have forsaken me the fountain of living waters, '
  - type: text
    content: and
  - type: text
    content: ' hewed them out cisterns, broken cisterns, that can hold no water.'
  '14':
  - type: text
    content: ' '
  - type: text
    content: Is
  - type: text
    content: ' Israel a servant? '
  - type: text
    content: is
  - type: text
    content: ' he a homeborn '
  - type: text
    content: slave?
  - type: text
    content: ' why is he spoiled? '
  '15':
  - type: text
    content: 'The young lions roared upon him, '
  - type: text
    content: and
  - type: text
    content: ' yelled, and they made his land waste: his cities are burned without inhabitant. '
  '16':
  - type: text
    content: 'Also the children of Noph and Tahapanes have broken the crown of thy head. '
  '17':
  - type: text
    content: 'Hast thou not procured this unto thyself, in that thou hast forsaken the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God, when he led thee by the way? '
  '18':
  - type: text
    content: 'And now what hast thou to do in the way of Egypt, to drink the waters of Sihor? or what hast thou to do in the way of Assyria, to drink the waters of the river? '
  '19':
  - type: text
    content: 'Thine own wickedness shall correct thee, and thy backslidings shall reprove thee: know therefore and see that '
  - type: text
    content: it is
  - type: text
    content: ' an evil '
  - type: text
    content: thing
  - type: text
    content: ' and bitter, that thou hast forsaken the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God, and that my fear '
  - type: text
    content: is
  - type: text
    content: ' not in thee, saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: ' of hosts.'
  '2':
  - type: text
    content: 'Go and cry in the ears of Jerusalem, saying, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; I remember thee, the kindness of thy youth, the love of thine espousals, when thou wentest after me in the wilderness, in a land '
  - type: text
    content: that was
  - type: text
    content: ' not sown. '
  '20':
  - type: text
    content: 'For of old time I have broken thy yoke, '
  - type: text
    content: and
  - type: text
    content: ' burst thy bands; and thou saidst, I will not transgress; when upon every high hill and under every green tree thou wanderest, playing the harlot. '
  '21':
  - type: text
    content: 'Yet I had planted thee a noble vine, wholly a right seed: how then art thou turned into the degenerate plant of a strange vine unto me? '
  '22':
  - type: text
    content: 'For though thou wash thee with nitre, and take thee much soap, '
  - type: text
    content: yet
  - type: text
    content: ' thine iniquity is marked before me, saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'How canst thou say, I am not polluted, I have not gone after Baalim? see thy way in the valley, know what thou hast done: '
  - type: text
    content: thou art
  - type: text
    content: ' a swift dromedary traversing her ways; '
  '24':
  - type: text
    content: 'a wild ass used to the wilderness, '
  - type: text
    content: that
  - type: text
    content: ' snuffeth up the wind at her pleasure; in her occasion who can turn her away? all they that seek her will not weary themselves; in her month they shall find her. '
  '25':
  - type: text
    content: 'Withhold thy foot from being unshod, and thy throat from thirst: but thou saidst, There is no hope: no; for I have loved strangers, and after them will I go.'
  '26':
  - type: text
    content: 'As the thief is ashamed when he is found, so is the house of Israel ashamed; they, their kings, their princes, and their priests, and their prophets, '
  '27':
  - type: text
    content: 'saying to a stock, Thou '
  - type: text
    content: art
  - type: text
    content: ' my father; and to a stone, Thou hast brought me forth: for they have turned '
  - type: text
    content: their
  - type: text
    content: ' back unto me, and not '
  - type: text
    content: their
  - type: text
    content: ' face: but in the time of their trouble they will say, Arise, and save us. '
  '28':
  - type: text
    content: 'But where '
  - type: text
    content: are
  - type: text
    content: ' thy gods that thou hast made thee? let them arise, if they can save thee in the time of thy trouble: for '
  - type: text
    content: according to
  - type: text
    content: ' the number of thy cities are thy gods, O Judah.'
  '29':
  - type: text
    content: 'Wherefore will ye plead with me? ye all have transgressed against me, saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Israel '
  - type: text
    content: was
  - type: text
    content: ' holiness unto the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: and
  - type: text
    content: ' the firstfruits of his increase: all that devour him shall offend; evil shall come upon them, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '30':
  - type: text
    content: 'In vain have I smitten your children; they received no correction: your own sword hath devoured your prophets, like a destroying lion. '
  '31':
  - type: text
    content: 'O generation, see ye the word of the '
  - type: text
    content: LORD
  - type: text
    content: '. Have I been a wilderness unto Israel? a land of darkness? wherefore say my people, We are lords; we will come no more unto thee? '
  '32':
  - type: text
    content: 'Can a maid forget her ornaments, '
  - type: text
    content: or
  - type: text
    content: ' a bride her attire? yet my people have forgotten me days without number.'
  '33':
  - type: text
    content: 'Why trimmest thou thy way to seek love? therefore hast thou also taught the wicked ones thy ways. '
  '34':
  - type: text
    content: 'Also in thy skirts is found the blood of the souls of the poor innocents: I have not found it by secret search, but upon all these. '
  '35':
  - type: text
    content: 'Yet thou sayest, Because I am innocent, surely his anger shall turn from me. Behold, I will plead with thee, because thou sayest, I have not sinned. '
  '36':
  - type: text
    content: 'Why gaddest thou about so much to change thy way? thou also shalt be ashamed of Egypt, as thou wast ashamed of Assyria. '
  '37':
  - type: text
    content: 'Yea, thou shalt go forth from him, and thine hands upon thine head: for the '
  - type: text
    content: LORD
  - type: text
    content: ' hath rejected thy confidences, and thou shalt not prosper in them.'
  '4':
  - type: text
    content: 'Hear ye the word of the '
  - type: text
    content: LORD
  - type: text
    content: ', O house of Jacob, and all the families of the house of Israel: '
  '5':
  - type: text
    content: 'thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', What iniquity have your fathers found in me, that they are gone far from me, and have walked after vanity, and are become vain? '
  '6':
  - type: text
    content: 'Neither said they, Where '
  - type: text
    content: is
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' that brought us up out of the land of Egypt, that led us through the wilderness, through a land of deserts and of pits, through a land of drought, and of the shadow of death, through a land that no man passed through, and where no man dwelt? '
  '7':
  - type: text
    content: 'And I brought you into a plentiful country, to eat the fruit thereof and the goodness thereof; but when ye entered, ye defiled my land, and made mine heritage an abomination. '
  '8':
  - type: text
    content: 'The priests said not, Where '
  - type: text
    content: is
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: '? and they that handle the law knew me not: the pastors also transgressed against me, and the prophets prophesied by Baal, and walked after '
  - type: text
    content: things that
  - type: text
    content: ' do not profit.'
  - type: heading
    content: The Divine Appeal
  '9':
  - type: text
    content: 'Wherefore I will yet plead with you, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', and with your children''s children will I plead. '
