document_id: JER.2,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Word of the Lord to Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came to me, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For pass over the isles of Chittim, and see; and send unto Kedar, and consider diligently, and see if there be such a thing. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hath a nation changed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' gods, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' yet no gods? but my people have changed their glory for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which
    - type: text
      text: ' doth not profit. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be astonished, O ye heavens, at this, and be horribly afraid, be ye very desolate, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For my people have committed two evils; they have forsaken me the fountain of living waters, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' hewed them out cisterns, broken cisterns, that can hold no water.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' Israel a servant? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' he a homeborn '
    - type: usfm
      marker: add
      children:
      - type: text
        text: slave?
    - type: text
      text: ' why is he spoiled? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The young lions roared upon him, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' yelled, and they made his land waste: his cities are burned without inhabitant. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also the children of Noph and Tahapanes have broken the crown of thy head. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hast thou not procured this unto thyself, in that thou hast forsaken the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God, when he led thee by the way? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now what hast thou to do in the way of Egypt, to drink the waters of Sihor? or what hast thou to do in the way of Assyria, to drink the waters of the river? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thine own wickedness shall correct thee, and thy backslidings shall reprove thee: know therefore and see that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' an evil '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thing
    - type: text
      text: ' and bitter, that thou hast forsaken the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God, and that my fear '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not in thee, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ' of hosts.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Go and cry in the ears of Jerusalem, saying, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; I remember thee, the kindness of thy youth, the love of thine espousals, when thou wentest after me in the wilderness, in a land '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that was
    - type: text
      text: ' not sown. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For of old time I have broken thy yoke, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' burst thy bands; and thou saidst, I will not transgress; when upon every high hill and under every green tree thou wanderest, playing the harlot. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet I had planted thee a noble vine, wholly a right seed: how then art thou turned into the degenerate plant of a strange vine unto me? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For though thou wash thee with nitre, and take thee much soap, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yet
    - type: text
      text: ' thine iniquity is marked before me, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'How canst thou say, I am not polluted, I have not gone after Baalim? see thy way in the valley, know what thou hast done: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thou art
    - type: text
      text: ' a swift dromedary traversing her ways; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'a wild ass used to the wilderness, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' snuffeth up the wind at her pleasure; in her occasion who can turn her away? all they that seek her will not weary themselves; in her month they shall find her. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Withhold thy foot from being unshod, and thy throat from thirst: but thou saidst, There is no hope: no; for I have loved strangers, and after them will I go.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As the thief is ashamed when he is found, so is the house of Israel ashamed; they, their kings, their princes, and their priests, and their prophets, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'saying to a stock, Thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' my father; and to a stone, Thou hast brought me forth: for they have turned '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' back unto me, and not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' face: but in the time of their trouble they will say, Arise, and save us. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' thy gods that thou hast made thee? let them arise, if they can save thee in the time of thy trouble: for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: according to
    - type: text
      text: ' the number of thy cities are thy gods, O Judah.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wherefore will ye plead with me? ye all have transgressed against me, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Israel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' holiness unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the firstfruits of his increase: all that devour him shall offend; evil shall come upon them, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In vain have I smitten your children; they received no correction: your own sword hath devoured your prophets, like a destroying lion. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'O generation, see ye the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. Have I been a wilderness unto Israel? a land of darkness? wherefore say my people, We are lords; we will come no more unto thee? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Can a maid forget her ornaments, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: or
    - type: text
      text: ' a bride her attire? yet my people have forgotten me days without number.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Why trimmest thou thy way to seek love? therefore hast thou also taught the wicked ones thy ways. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also in thy skirts is found the blood of the souls of the poor innocents: I have not found it by secret search, but upon all these. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet thou sayest, Because I am innocent, surely his anger shall turn from me. Behold, I will plead with thee, because thou sayest, I have not sinned. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Why gaddest thou about so much to change thy way? thou also shalt be ashamed of Egypt, as thou wast ashamed of Assyria. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yea, thou shalt go forth from him, and thine hands upon thine head: for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath rejected thy confidences, and thou shalt not prosper in them.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hear ye the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', O house of Jacob, and all the families of the house of Israel: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', What iniquity have your fathers found in me, that they are gone far from me, and have walked after vanity, and are become vain? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Neither said they, Where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' that brought us up out of the land of Egypt, that led us through the wilderness, through a land of deserts and of pits, through a land of drought, and of the shadow of death, through a land that no man passed through, and where no man dwelt? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I brought you into a plentiful country, to eat the fruit thereof and the goodness thereof; but when ye entered, ye defiled my land, and made mine heritage an abomination. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The priests said not, Where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '? and they that handle the law knew me not: the pastors also transgressed against me, and the prophets prophesied by Baal, and walked after '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things that
    - type: text
      text: ' do not profit.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Divine Appeal
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wherefore I will yet plead with you, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and with your children''s children will I plead. '
