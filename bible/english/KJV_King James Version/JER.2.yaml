document_id: JER.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Word of the Lord to Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moreover the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came to me, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Go and cry in the ears of Jerusalem, saying, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; I remember thee, the kindness of thy youth, the love of thine espousals, when thou wentest after me in the wilderness, in a land '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that was
  - type: text
    text: ' not sown. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Israel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' holiness unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the firstfruits of his increase: all that devour him shall offend; evil shall come upon them, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hear ye the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', O house of Jacob, and all the families of the house of Israel: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', What iniquity have your fathers found in me, that they are gone far from me, and have walked after vanity, and are become vain? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Neither said they, Where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' that brought us up out of the land of Egypt, that led us through the wilderness, through a land of deserts and of pits, through a land of drought, and of the shadow of death, through a land that no man passed through, and where no man dwelt? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And I brought you into a plentiful country, to eat the fruit thereof and the goodness thereof; but when ye entered, ye defiled my land, and made mine heritage an abomination. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The priests said not, Where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '? and they that handle the law knew me not: the pastors also transgressed against me, and the prophets prophesied by Baal, and walked after '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things that
  - type: text
    text: ' do not profit.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Divine Appeal
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Wherefore I will yet plead with you, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and with your children''s children will I plead. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For pass over the isles of Chittim, and see; and send unto Kedar, and consider diligently, and see if there be such a thing. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hath a nation changed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' gods, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' yet no gods? but my people have changed their glory for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which
  - type: text
    text: ' doth not profit. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Be astonished, O ye heavens, at this, and be horribly afraid, be ye very desolate, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For my people have committed two evils; they have forsaken me the fountain of living waters, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' hewed them out cisterns, broken cisterns, that can hold no water.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' Israel a servant? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' he a homeborn '
  - type: usfm
    marker: add
    children:
    - type: text
      text: slave?
  - type: text
    text: ' why is he spoiled? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The young lions roared upon him, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' yelled, and they made his land waste: his cities are burned without inhabitant. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Also the children of Noph and Tahapanes have broken the crown of thy head. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hast thou not procured this unto thyself, in that thou hast forsaken the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, when he led thee by the way? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And now what hast thou to do in the way of Egypt, to drink the waters of Sihor? or what hast thou to do in the way of Assyria, to drink the waters of the river? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Thine own wickedness shall correct thee, and thy backslidings shall reprove thee: know therefore and see that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' an evil '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thing
  - type: text
    text: ' and bitter, that thou hast forsaken the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, and that my fear '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not in thee, saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' of hosts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For of old time I have broken thy yoke, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' burst thy bands; and thou saidst, I will not transgress; when upon every high hill and under every green tree thou wanderest, playing the harlot. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Yet I had planted thee a noble vine, wholly a right seed: how then art thou turned into the degenerate plant of a strange vine unto me? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'For though thou wash thee with nitre, and take thee much soap, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yet
  - type: text
    text: ' thine iniquity is marked before me, saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'How canst thou say, I am not polluted, I have not gone after Baalim? see thy way in the valley, know what thou hast done: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thou art
  - type: text
    text: ' a swift dromedary traversing her ways; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'a wild ass used to the wilderness, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' snuffeth up the wind at her pleasure; in her occasion who can turn her away? all they that seek her will not weary themselves; in her month they shall find her. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Withhold thy foot from being unshod, and thy throat from thirst: but thou saidst, There is no hope: no; for I have loved strangers, and after them will I go.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'As the thief is ashamed when he is found, so is the house of Israel ashamed; they, their kings, their princes, and their priests, and their prophets, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'saying to a stock, Thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' my father; and to a stone, Thou hast brought me forth: for they have turned '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' back unto me, and not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' face: but in the time of their trouble they will say, Arise, and save us. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'But where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' thy gods that thou hast made thee? let them arise, if they can save thee in the time of thy trouble: for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: according to
  - type: text
    text: ' the number of thy cities are thy gods, O Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Wherefore will ye plead with me? ye all have transgressed against me, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'In vain have I smitten your children; they received no correction: your own sword hath devoured your prophets, like a destroying lion. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'O generation, see ye the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. Have I been a wilderness unto Israel? a land of darkness? wherefore say my people, We are lords; we will come no more unto thee? '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Can a maid forget her ornaments, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: or
  - type: text
    text: ' a bride her attire? yet my people have forgotten me days without number.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Why trimmest thou thy way to seek love? therefore hast thou also taught the wicked ones thy ways. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Also in thy skirts is found the blood of the souls of the poor innocents: I have not found it by secret search, but upon all these. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Yet thou sayest, Because I am innocent, surely his anger shall turn from me. Behold, I will plead with thee, because thou sayest, I have not sinned. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Why gaddest thou about so much to change thy way? thou also shalt be ashamed of Egypt, as thou wast ashamed of Assyria. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Yea, thou shalt go forth from him, and thine hands upon thine head: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath rejected thy confidences, and thou shalt not prosper in them.'
