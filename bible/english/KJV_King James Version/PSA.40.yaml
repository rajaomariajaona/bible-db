document_id: PSA.40
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: To the chief Musician, A Psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I waited patiently for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And he inclined unto me, and heard my cry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He brought me up also out of an horrible pit, out of the miry clay,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And set my feet upon a rock, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' established my goings.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And he hath put a new song in my mouth, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'praise unto our God:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Many shall see '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and fear,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And shall trust in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' that man that maketh the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' his trust,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And respecteth not the proud, nor such as turn aside to lies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Many, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' my God,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Are
  - type: text
    text: ' thy wonderful works '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' thou hast done,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And thy thoughts '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which are
  - type: text
    text: ' to us-ward:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They cannot be reckoned up in order unto thee:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: If
  - type: text
    text: ' I would declare and speak '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of them
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: They are more than can be numbered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Sacrifice and offering thou didst not desire;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Mine ears hast thou opened:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Burnt offering and sin offering hast thou not required.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then said I, Lo, I come:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'In the volume of the book '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' written of me, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I delight to do thy will, O my God:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Yea, thy law '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' within my heart.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'I have preached righteousness in the great congregation:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Lo, I have not refrained my lips, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', thou knowest.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I have not hid thy righteousness within my heart;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I have declared thy faithfulness and thy salvation:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have not concealed thy lovingkindness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thy truth from the great congregation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Withhold not thou thy tender mercies from me, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ':'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let thy lovingkindness and thy truth continually preserve me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For innumerable evils have compassed me about:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Mine iniquities have taken hold upon me, so that I am not able to look up;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They are more than the hairs of mine head:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Therefore my heart faileth me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Be pleased, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', to deliver me:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', make haste to help me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Let them be ashamed and confounded together
- type: usfm
  marker: q2
  children:
  - type: text
    text: That seek after my soul to destroy it;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them be driven backward
- type: usfm
  marker: q2
  children:
  - type: text
    text: and put to shame that wish me evil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Let them be desolate for a reward of their shame
- type: usfm
  marker: q2
  children:
  - type: text
    text: That say unto me, Aha, aha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Let all those that seek thee rejoice and be glad in thee:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Let such as love thy salvation say continually, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' be magnified.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' poor and needy; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Yet
  - type: text
    text: ' the Lord thinketh upon me:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' my help and my deliverer; Make no tarrying, O my God.'
