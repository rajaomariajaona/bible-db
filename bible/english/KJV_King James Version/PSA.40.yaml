    content: To the chief Musician, A Psalm of David.
  - type: text
    content: 'I waited patiently for the '
  - type: text
    content: LORD
  - type: text
    content: ;
  - type: text
    content: And he inclined unto me, and heard my cry.
  '10':
  - type: text
    content: I have not hid thy righteousness within my heart;
  - type: text
    content: 'I have declared thy faithfulness and thy salvation:'
  - type: text
    content: I have not concealed thy lovingkindness,
  - type: text
    content: And thy truth from the great congregation.
  '11':
  - type: text
    content: 'Withhold not thou thy tender mercies from me, O '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: Let thy lovingkindness and thy truth continually preserve me.
  '12':
  - type: text
    content: 'For innumerable evils have compassed me about:'
  - type: text
    content: Mine iniquities have taken hold upon me, so that I am not able to look up;
  - type: text
    content: 'They are more than the hairs of mine head:'
  - type: text
    content: Therefore my heart faileth me.
  '13':
  - type: text
    content: 'Be pleased, O '
  - type: text
    content: LORD
  - type: text
    content: ', to deliver me:'
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ', make haste to help me.'
  '14':
  - type: text
    content: Let them be ashamed and confounded together
  - type: text
    content: That seek after my soul to destroy it;
  - type: text
    content: Let them be driven backward
  - type: text
    content: and put to shame that wish me evil.
  '15':
  - type: text
    content: Let them be desolate for a reward of their shame
  - type: text
    content: That say unto me, Aha, aha.
  '16':
  - type: text
    content: 'Let all those that seek thee rejoice and be glad in thee:'
  - type: text
