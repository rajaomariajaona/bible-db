document_id: MAT.6,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Real Religion
  - type: text
    content: ' '
  - type: text
    content: 'Take heed that ye do not your alms before men, to be seen of them: otherwise ye have no reward of your Father which is in heaven.'
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Thy kingdom come. Thy will be done in earth, as '
  - type: text
    content: it is
  - type: text
    content: ' in heaven.'
  - type: text
    content: ' '
  '11':
  - type: text
    content: Give us this day our daily bread.
  - type: text
    content: ' '
  '12':
  - type: text
    content: And forgive us our debts, as we forgive our debtors.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'And lead us not into temptation, but deliver us from evil: For thine is the kingdom, and the power, and the glory, for ever. Amen.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'For if ye forgive men their trespasses, your heavenly Father will also forgive you:'
  - type: text
    content: ' '
  '15':
  - type: text
    content: but if ye forgive not men their trespasses, neither will your Father forgive your trespasses.
  '16':
  - type: text
    content: ' '
  - type: text
    content: 'Moreover when ye fast, be not, as the hypocrites, of a sad countenance: for they disfigure their faces, that they may appear unto men to fast. Verily I say unto you, They have their reward.'
  - type: text
    content: ' '
  '17':
  - type: text
    content: But thou, when thou fastest, anoint thine head, and wash thy face;
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'that thou appear not unto men to fast, but unto thy Father which is in secret: and thy Father, which seeth in secret, shall reward thee openly.'
  '19':
  - type: text
    content: ' '
  - type: text
    content: 'Lay not up for yourselves treasures upon earth, where moth and rust doth corrupt, and where thieves break through and steal:'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Therefore when thou doest '
  - type: text
    content: thine
  - type: text
    content: ' alms, do not sound a trumpet before thee, as the hypocrites do in the synagogues and in the streets, that they may have glory of men. Verily I say unto you, They have their reward.'
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'but lay up for yourselves treasures in heaven, where neither moth nor rust doth corrupt, and where thieves do not break through nor steal:'
  - type: text
    content: ' '
  '21':
  - type: text
    content: for where your treasure is, there will your heart be also.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'The light of the body is the eye: if therefore thine eye be single, thy whole body shall be full of light.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'But if thine eye be evil, thy whole body shall be full of darkness. If therefore the light that is in thee be darkness, how great '
  - type: text
    content: is
  - type: text
    content: ' that darkness!'
  - type: heading
    content: True Wisdom
  '24':
  - type: text
    content: ' '
  - type: text
    content: 'No man can serve two masters: for either he will hate the one, and love the other; or else he will hold to the one, and despise the other. Ye cannot serve God and mammon.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: Therefore I say unto you, Take no thought for your life, what ye shall eat, or what ye shall drink; nor yet for your body, what ye shall put on. Is not the life more than meat, and the body than raiment?
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Behold the fowls of the air: for they sow not, neither do they reap, nor gather into barns; yet your heavenly Father feedeth them. Are ye not much better than they?'
  - type: text
    content: ' '
  '27':
  - type: text
    content: Which of you by taking thought can add one cubit unto his stature?
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'And why take ye thought for raiment? Consider the lilies of the field, how they grow; they toil not, neither do they spin:'
  - type: text
    content: ' '
  '29':
  - type: text
    content: and yet I say unto you, That even Solomon in all his glory was not arrayed like one of these.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'But when thou doest alms, let not thy left hand know what thy right hand doeth:'
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Wherefore, if God so clothe the grass of the field, which to day is, and to morrow is cast into the oven, '
  - type: text
    content: shall he
  - type: text
    content: ' not much more '
  - type: text
    content: clothe
  - type: text
    content: ' you, O ye of little faith?'
  - type: text
    content: ' '
  '31':
  - type: text
    content: Therefore take no thought, saying, What shall we eat? or, What shall we drink? or, Wherewithal shall we be clothed?
  - type: text
    content: ' '
  '32':
  - type: text
    content: (For after all these things do the Gentiles seek:) for your heavenly Father knoweth that ye have need of all these things.
  - type: text
    content: ' '
  '33':
  - type: text
    content: But seek ye first the kingdom of God, and his righteousness; and all these things shall be added unto you.
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'Take therefore no thought for the morrow: for the morrow shall take thought for the things of itself. Sufficient unto the day '
  - type: text
    content: is
  - type: text
    content: ' the evil thereof.'
  '4':
  - type: text
    content: 'that thine alms may be in secret: and thy Father which seeth in secret himself shall reward thee openly.'
  '5':
  - type: text
    content: ' '
  - type: text
    content: 'And when thou prayest, thou shalt not be as the hypocrites '
  - type: text
    content: are
  - type: text
    content: ': for they love to pray standing in the synagogues and in the corners of the streets, that they may be seen of men. Verily I say unto you, They have their reward.'
  - type: text
    content: ' '
  '6':
  - type: text
    content: But thou, when thou prayest, enter into thy closet, and when thou hast shut thy door, pray to thy Father which is in secret; and thy Father which seeth in secret shall reward thee openly.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'But when ye pray, use not vain repetitions, as the heathen '
  - type: text
    content: do
  - type: text
    content: ': for they think that they shall be heard for their much speaking.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Be not ye therefore like unto them: for your Father knoweth what things ye have need of, before ye ask him.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'After this manner therefore pray ye: Our Father which art in heaven, Hallowed be thy name.'
  - type: text
    content: ' '
