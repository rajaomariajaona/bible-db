document_id: JER.8,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', they shall bring out the bones of the kings of Judah, and the bones of his princes, and the bones of the priests, and the bones of the prophets, and the bones of the inhabitants of Jerusalem, out of their graves: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore will I give their wives unto others, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' their fields to them that shall inherit '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'them:'
    - type: text
      text: ' for every one from the least even unto the greatest is given to covetousness, from the prophet even unto the priest every one dealeth falsely. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For they have healed the hurt of the daughter of my people slightly, saying, Peace, peace; when '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no peace. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Were they ashamed when they had committed abomination? nay, they were not at all ashamed, neither could they blush: therefore shall they fall among them that fall: in the time of their visitation they shall be cast down, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will surely consume them, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there shall be
    - type: text
      text: ' no grapes on the vine, nor figs on the fig tree, and the leaf shall fade; and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the things that
    - type: text
      text: ' I have given them shall pass away from them.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Why do we sit still? assemble yourselves, and let us enter into the defenced cities, and let us be silent there: for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' our God hath put us to silence, and given us water of gall to drink, because we have sinned against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We looked for peace, but no good '
    - type: usfm
      marker: add
      children:
      - type: text
        text: came; and
    - type: text
      text: ' for a time of health, and behold trouble! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The snorting of his horses was heard from Dan: the whole land trembled at the sound of the neighing of his strong ones; for they are come, and have devoured the land, and all that is in it; the city, and those that dwell therein. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For, behold, I will send serpents, cockatrices, among you, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: will
    - type: text
      text: ' not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' charmed, and they shall bite you, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Prophet's Sorrow
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: When
    - type: text
      text: ' I would comfort myself against sorrow, my heart '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' faint in me. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold the voice of the cry of the daughter of my people because of them that dwell in a far country: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' not the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in Zion? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not her king in her? Why have they provoked me to anger with their graven images, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' with strange vanities? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they shall spread them before the sun, and the moon, and all the host of heaven, whom they have loved, and whom they have served, and after whom they have walked, and whom they have sought, and whom they have worshipped: they shall not be gathered, nor be buried; they shall be for dung upon the face of the earth. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The harvest is past, the summer is ended, and we are not saved. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the hurt of the daughter of my people am I hurt; I am black; astonishment hath taken hold on me. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is there
    - type: text
      text: ' no balm in Gilead; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is there
    - type: text
      text: ' no physician there? why then is not the health of the daughter of my people recovered?'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And death shall be chosen rather than life by all the residue of them that remain of this evil family, which remain in all the places whither I have driven them, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: No Man Repented
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover thou shalt say unto them, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; Shall they fall, and not arise? shall he turn away, and not return? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Why '
    - type: usfm
      marker: add
      children:
      - type: text
        text: then
    - type: text
      text: ' is this people of Jerusalem slidden back by a perpetual backsliding? they hold fast deceit, they refuse to return. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I hearkened and heard, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' they spake not aright: no man repented him of his wickedness, saying, What have I done? every one turned to his course, as the horse rusheth into the battle. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yea, the stork in the heaven knoweth her appointed times; and the turtle and the crane and the swallow observe the time of their coming; but my people know not the judgment of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'How do ye say, We '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' wise, and the law of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' with us? Lo, certainly in vain made he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: '; the pen of the scribes '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in vain. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' are ashamed, they are dismayed and taken: lo, they have rejected the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; and what wisdom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in them? '
