verses:
  '1':
  - type: text
    content: 'Now these '
  - type: text
    content: are
  - type: text
    content: ' the names of the children of Israel, which came into Egypt; every man and his household came with Jacob. '
  '10':
  - type: text
    content: 'come on, let us deal wisely with them; lest they multiply, and it come to pass, that, when there falleth out any war, they join also unto our enemies, and fight against us, and '
  - type: text
    content: so
  - type: text
    content: ' get them up out of the land. '
  '11':
  - type: text
    content: 'Therefore they did set over them taskmasters to afflict them with their burdens. And they built for Pharaoh treasure cities, Pithom and Raamses. '
  '12':
  - type: text
    content: 'But the more they afflicted them, the more they multiplied and grew. And they were grieved because of the children of Israel. '
  '13':
  - type: text
    content: 'And the Egyptians made the children of Israel to serve with rigour: '
  '14':
  - type: text
    content: 'and they made their lives bitter with hard bondage, in morter, and in brick, and in all manner of service in the field: all their service, wherein they made them serve, '
  - type: text
    content: was
  - type: text
    content: ' with rigour.'
  '15':
  - type: text
    content: 'And the king of Egypt spake to the Hebrew midwives, of which the name of the one '
  - type: text
    content: was
  - type: text
    content: ' Shiphrah, and the name of the other Puah: '
  '16':
  - type: text
    content: 'and he said, When ye do the office of a midwife to the Hebrew women, and see '
  - type: text
    content: them
  - type: text
    content: ' upon the stools; if it '
  - type: text
    content: be
  - type: text
    content: ' a son, then ye shall kill him: but if it '
  - type: text
    content: be
  - type: text
    content: ' a daughter, then she shall live. '
  '17':
  - type: text
    content: 'But the midwives feared God, and did not as the king of Egypt commanded them, but saved the men children alive. '
  '18':
  - type: text
    content: 'And the king of Egypt called for the midwives, and said unto them, Why have ye done this thing, and have saved the men children alive? '
  '19':
  - type: text
    content: 'And the midwives said unto Pharaoh, Because the Hebrew women '
  - type: text
    content: are
  - type: text
    content: ' not as the Egyptian women; for they '
  - type: text
    content: are
  - type: text
    content: ' lively, and are delivered ere the midwives come in unto them. '
  '2':
  - type: text
    content: 'Reuben, Simeon, Levi, and Judah, '
  '20':
  - type: text
    content: 'Therefore God dealt well with the midwives: and the people multiplied, and waxed very mighty. '
  '21':
  - type: text
    content: 'And it came to pass, because the midwives feared God, that he made them houses. '
  '22':
  - type: text
    content: And Pharaoh charged all his people, saying, Every son that is born ye shall cast into the river, and every daughter ye shall save alive.
  '3':
  - type: text
    content: 'Issachar, Zebulun, and Benjamin, '
  '4':
  - type: text
    content: 'Dan, and Naphtali, Gad, and Asher. '
  '5':
  - type: text
    content: 'And all the souls that came out of the loins of Jacob were seventy souls: for Joseph was in Egypt '
  - type: text
    content: already
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'And Joseph died, and all his brethren, and all that generation. '
  '7':
  - type: text
    content: And the children of Israel were fruitful, and increased abundantly, and multiplied, and waxed exceeding mighty; and the land was filled with them.
  '8':
  - type: text
    content: 'Now there arose up a new king over Egypt, which knew not Joseph. '
  '9':
  - type: text
    content: 'And he said unto his people, Behold, the people of the children of Israel '
  - type: text
    content: are
  - type: text
    content: ' more and mightier than we: '
