document_id: EXO.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the names of the children of Israel, which came into Egypt; every man and his household came with Jacob. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Reuben, Simeon, Levi, and Judah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Issachar, Zebulun, and Benjamin, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dan, and Naphtali, Gad, and Asher. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And all the souls that came out of the loins of Jacob were seventy souls: for Joseph was in Egypt '
  - type: usfm
    marker: add
    children:
    - type: text
      text: already
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Joseph died, and all his brethren, and all that generation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And the children of Israel were fruitful, and increased abundantly, and multiplied, and waxed exceeding mighty; and the land was filled with them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now there arose up a new king over Egypt, which knew not Joseph. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And he said unto his people, Behold, the people of the children of Israel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' more and mightier than we: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'come on, let us deal wisely with them; lest they multiply, and it come to pass, that, when there falleth out any war, they join also unto our enemies, and fight against us, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' get them up out of the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Therefore they did set over them taskmasters to afflict them with their burdens. And they built for Pharaoh treasure cities, Pithom and Raamses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But the more they afflicted them, the more they multiplied and grew. And they were grieved because of the children of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And the Egyptians made the children of Israel to serve with rigour: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and they made their lives bitter with hard bondage, in morter, and in brick, and in all manner of service in the field: all their service, wherein they made them serve, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' with rigour.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the king of Egypt spake to the Hebrew midwives, of which the name of the one '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Shiphrah, and the name of the other Puah: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and he said, When ye do the office of a midwife to the Hebrew women, and see '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' upon the stools; if it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' a son, then ye shall kill him: but if it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' a daughter, then she shall live. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But the midwives feared God, and did not as the king of Egypt commanded them, but saved the men children alive. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And the king of Egypt called for the midwives, and said unto them, Why have ye done this thing, and have saved the men children alive? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And the midwives said unto Pharaoh, Because the Hebrew women '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' not as the Egyptian women; for they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' lively, and are delivered ere the midwives come in unto them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Therefore God dealt well with the midwives: and the people multiplied, and waxed very mighty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And it came to pass, because the midwives feared God, that he made them houses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: And Pharaoh charged all his people, saying, Every son that is born ye shall cast into the river, and every daughter ye shall save alive.
