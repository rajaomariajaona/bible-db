document_id: JOS.5,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'And it came to pass, when all the kings of the Amorites, which '
  - type: text
    content: were
  - type: text
    content: ' on the side of Jordan westward, and all the kings of the Canaanites, which '
  - type: text
    content: were
  - type: text
    content: ' by the sea, heard that the '
  - type: text
    content: LORD
  - type: text
    content: ' had dried up the waters of Jordan from before the children of Israel, until we were passed over, that their heart melted, neither was there spirit in them any more, because of the children of Israel.'
  '10':
  - type: text
    content: 'And the children of Israel encamped in Gilgal, and kept the passover on the fourteenth day of the month at even in the plains of Jericho. '
  '11':
  - type: text
    content: 'And they did eat of the old corn of the land on the morrow after the passover, unleavened cakes, and parched '
  - type: text
    content: corn
  - type: text
    content: ' in the selfsame day. '
  '12':
  - type: text
    content: And the manna ceased on the morrow after they had eaten of the old corn of the land; neither had the children of Israel manna any more; but they did eat of the fruit of the land of Canaan that year.
  - type: heading
    content: Fall of Jericho
  '13':
  - type: text
    content: 'And it came to pass, when Joshua was by Jericho, that he lifted up his eyes and looked, and, behold, there stood a man over against him with his sword drawn in his hand: and Joshua went unto him, and said unto him, '
  - type: text
    content: Art
  - type: text
    content: ' thou for us, or for our adversaries? '
  '14':
  - type: text
    content: 'And he said, Nay; but '
  - type: text
    content: as
  - type: text
    content: ' captain of the host of the '
  - type: text
    content: LORD
  - type: text
    content: ' am I now come. And Joshua fell on his face to the earth, and did worship, and said unto him, What saith my lord unto his servant? '
  '15':
  - type: text
    content: 'And the captain of the '
  - type: text
    content: LORD
  - type: text
    content: '''s host said unto Joshua, Loose thy shoe from off thy foot; for the place whereon thou standest '
  - type: text
    content: is
  - type: text
    content: ' holy. And Joshua did so.'
  '2':
  - type: text
    content: 'At that time the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Joshua, Make thee sharp knives, and circumcise again the children of Israel the second time. '
  '3':
  - type: text
    content: 'And Joshua made him sharp knives, and circumcised the children of Israel at the hill of the foreskins. '
  '4':
  - type: text
    content: 'And this '
  - type: text
    content: is
  - type: text
    content: ' the cause why Joshua did circumcise: All the people that came out of Egypt, '
  - type: text
    content: that were
  - type: text
    content: ' males, '
  - type: text
    content: even
  - type: text
    content: ' all the men of war, died in the wilderness by the way, after they came out of Egypt. '
  '5':
  - type: text
    content: 'Now all the people that came out were circumcised: but all the people '
  - type: text
    content: that were
  - type: text
    content: ' born in the wilderness by the way as they came forth out of Egypt, '
  - type: text
    content: them
  - type: text
    content: ' they had not circumcised. '
  '6':
  - type: text
    content: 'For the children of Israel walked forty years in the wilderness, till all the people '
  - type: text
    content: that were
  - type: text
    content: ' men of war, which came out of Egypt, were consumed, because they obeyed not the voice of the '
  - type: text
    content: LORD
  - type: text
    content: ': unto whom the '
  - type: text
    content: LORD
  - type: text
    content: ' sware that he would not shew them the land, which the '
  - type: text
    content: LORD
  - type: text
    content: ' sware unto their fathers that he would give us, a land that floweth with milk and honey. '
  '7':
  - type: text
    content: 'And their children, '
  - type: text
    content: whom
  - type: text
    content: ' he raised up in their stead, them Joshua circumcised: for they were uncircumcised, because they had not circumcised them by the way. '
  '8':
  - type: text
    content: 'And it came to pass, when they had done circumcising all the people, that they abode in their places in the camp, till they were whole. '
  '9':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Joshua, This day have I rolled away the reproach of Egypt from off you. Wherefore the name of the place is called Gilgal unto this day.'
