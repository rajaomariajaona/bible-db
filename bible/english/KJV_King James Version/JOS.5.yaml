document_id: JOS.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And it came to pass, when all the kings of the Amorites, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' on the side of Jordan westward, and all the kings of the Canaanites, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' by the sea, heard that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had dried up the waters of Jordan from before the children of Israel, until we were passed over, that their heart melted, neither was there spirit in them any more, because of the children of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'At that time the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Joshua, Make thee sharp knives, and circumcise again the children of Israel the second time. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Joshua made him sharp knives, and circumcised the children of Israel at the hill of the foreskins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the cause why Joshua did circumcise: All the people that came out of Egypt, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that were
  - type: text
    text: ' males, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' all the men of war, died in the wilderness by the way, after they came out of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now all the people that came out were circumcised: but all the people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that were
  - type: text
    text: ' born in the wilderness by the way as they came forth out of Egypt, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' they had not circumcised. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For the children of Israel walked forty years in the wilderness, till all the people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that were
  - type: text
    text: ' men of war, which came out of Egypt, were consumed, because they obeyed not the voice of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': unto whom the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' sware that he would not shew them the land, which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' sware unto their fathers that he would give us, a land that floweth with milk and honey. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And their children, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: whom
  - type: text
    text: ' he raised up in their stead, them Joshua circumcised: for they were uncircumcised, because they had not circumcised them by the way. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And it came to pass, when they had done circumcising all the people, that they abode in their places in the camp, till they were whole. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Joshua, This day have I rolled away the reproach of Egypt from off you. Wherefore the name of the place is called Gilgal unto this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the children of Israel encamped in Gilgal, and kept the passover on the fourteenth day of the month at even in the plains of Jericho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And they did eat of the old corn of the land on the morrow after the passover, unleavened cakes, and parched '
  - type: usfm
    marker: add
    children:
    - type: text
      text: corn
  - type: text
    text: ' in the selfsame day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And the manna ceased on the morrow after they had eaten of the old corn of the land; neither had the children of Israel manna any more; but they did eat of the fruit of the land of Canaan that year.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fall of Jericho
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And it came to pass, when Joshua was by Jericho, that he lifted up his eyes and looked, and, behold, there stood a man over against him with his sword drawn in his hand: and Joshua went unto him, and said unto him, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Art
  - type: text
    text: ' thou for us, or for our adversaries? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And he said, Nay; but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' captain of the host of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' am I now come. And Joshua fell on his face to the earth, and did worship, and said unto him, What saith my lord unto his servant? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the captain of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s host said unto Joshua, Loose thy shoe from off thy foot; for the place whereon thou standest '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' holy. And Joshua did so.'
