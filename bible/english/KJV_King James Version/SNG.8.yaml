document_id: SNG.8,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O that thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: wert
    - type: text
      text: ' as my brother,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That sucked the breasts of my mother!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: When
    - type: text
      text: ' I should find thee without, I would kiss thee;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yea, I should not be despised.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' a wall,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And my breasts like towers:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then was I in his eyes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As one that found favour.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Solomon had a vineyard at Baalhamon;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He let out the vineyard unto keepers;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Every one for the fruit thereof was to bring a thousand '
    - type: usfm
      marker: add
      children:
      - type: text
        text: pieces
    - type: text
      text: ' of silver.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My vineyard, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' mine, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' before me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Thou, O Solomon, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: must have
    - type: text
      text: ' a thousand,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And those that keep the fruit thereof two hundred.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thou that dwellest in the gardens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The companions hearken to thy voice:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Cause me to hear '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make haste, my beloved,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And be thou like to a roe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or to a young hart
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Upon the mountains of spices.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I would lead thee,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' bring thee into my mother''s house,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Who
    - type: text
      text: ' would instruct me:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I would cause thee to drink of spiced wine
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Of the juice of my pomegranate.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'His left hand '
    - type: usfm
      marker: add
      children:
      - type: text
        text: should be
    - type: text
      text: ' under my head,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his right hand should embrace me.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I charge you, O daughters of Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That ye stir not up, nor awake '
    - type: usfm
      marker: add
      children:
      - type: text
        text: my
    - type: text
      text: ' love,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Until he please.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' this that cometh up from the wilderness,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Leaning upon her beloved?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I raised thee up under the apple tree:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There thy mother brought thee forth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'There she brought thee forth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' bare thee.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Set me as a seal upon thine heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'As a seal upon thine arm:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For love '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' strong as death;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Jealousy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' cruel as the grave:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The coals thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' coals of fire,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Which hath
    - type: text
      text: ' a most vehement flame.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Many waters cannot quench love,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Neither can the floods drown it:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If a man would give all the substance of his house for love,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It would utterly be contemned.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We have a little sister,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And she hath no breasts:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What shall we do for our sister
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the day when she shall be spoken for?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'If she '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' a wall,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'We will build upon her a palace of silver:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And if she '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' a door,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We will inclose her with boards of cedar.
