document_id: NUM.36,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Inheritance of Daughters
  - type: text
    content: 'And the chief fathers of the families of the children of Gilead, the son of Machir, the son of Manasseh, of the families of the sons of Joseph, came near, and spake before Moses, and before the princes, the chief fathers of the children of Israel: '
  '10':
  - type: text
    content: 'Even as the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses, so did the daughters of Zelophehad: '
  '11':
  - type: text
    content: 'for Mahlah, Tirzah, and Hoglah, and Milcah, and Noah, the daughters of Zelophehad, were married unto their father''s brothers'' sons: '
  '12':
  - type: text
    content: and
  - type: text
    content: ' they were married into the families of the sons of Manasseh the son of Joseph, and their inheritance remained in the tribe of the family of their father.'
  '13':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the commandments and the judgments, which the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded by the hand of Moses unto the children of Israel in the plains of Moab by Jordan '
  - type: text
    content: near
  - type: text
    content: ' Jericho.'
  '2':
  - type: text
    content: 'and they said, The '
  - type: text
    content: LORD
  - type: text
    content: ' commanded my lord to give the land for an inheritance by lot to the children of Israel: and my lord was commanded by the '
  - type: text
    content: LORD
  - type: text
    content: ' to give the inheritance of Zelophehad our brother unto his daughters. '
  '3':
  - type: text
    content: 'And if they be married to any of the sons of the '
  - type: text
    content: other
  - type: text
    content: ' tribes of the children of Israel, then shall their inheritance be taken from the inheritance of our fathers, and shall be put to the inheritance of the tribe whereunto they are received: so shall it be taken from the lot of our inheritance. '
  '4':
  - type: text
    content: 'And when the jubile of the children of Israel shall be, then shall their inheritance be put unto the inheritance of the tribe whereunto they are received: so shall their inheritance be taken away from the inheritance of the tribe of our fathers.'
  '5':
  - type: text
    content: 'And Moses commanded the children of Israel according to the word of the '
  - type: text
    content: LORD
  - type: text
    content: ', saying, The tribe of the sons of Joseph hath said well. '
  '6':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the thing which the '
  - type: text
    content: LORD
  - type: text
    content: ' doth command concerning the daughters of Zelophehad, saying, Let them marry to whom they think best; only to the family of the tribe of their father shall they marry. '
  '7':
  - type: text
    content: 'So shall not the inheritance of the children of Israel remove from tribe to tribe: for every one of the children of Israel shall keep himself to the inheritance of the tribe of his fathers. '
  '8':
  - type: text
    content: 'And every daughter, that possesseth an inheritance in any tribe of the children of Israel, shall be wife unto one of the family of the tribe of her father, that the children of Israel may enjoy every man the inheritance of his fathers. '
  '9':
  - type: text
    content: 'Neither shall the inheritance remove from '
  - type: text
    content: one
  - type: text
    content: ' tribe to another tribe; but every one of the tribes of the children of Israel shall keep himself to his own inheritance.'
