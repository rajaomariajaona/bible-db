document_id: MRK.9,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: Verily I say unto you, That there be some of them that stand here, which shall not taste of death, till they have seen the kingdom of God come with power.
  - type: heading
    content: Mount of Transfiguration
  '10':
  - type: text
    content: And they kept that saying with themselves, questioning one with another what the rising from the dead should mean.
  '11':
  - type: text
    content: 'And they asked him, saying, Why say the scribes that Elias must first come? '
  '12':
  - type: text
    content: 'And he answered and told them, '
  - type: text
    content: Elias verily cometh first, and restoreth all things; and how it is written of the Son of man, that he must suffer many things, and be set at nought.
  - type: text
    content: ' '
  '13':
  - type: text
    content: But I say unto you, That Elias is indeed come, and they have done unto him whatsoever they listed, as it is written of him.
  '14':
  - type: text
    content: 'And when he came to '
  - type: text
    content: his
  - type: text
    content: ' disciples, he saw a great multitude about them, and the scribes questioning with them. '
  '15':
  - type: text
    content: 'And straightway all the people, when they beheld him, were greatly amazed, and running to '
  - type: text
    content: him
  - type: text
    content: ' saluted him. '
  '16':
  - type: text
    content: 'And he asked the scribes, '
  - type: text
    content: What question ye with them?
  '17':
  - type: text
    content: 'And one of the multitude answered and said, Master, I have brought unto thee my son, which hath a dumb spirit; '
  '18':
  - type: text
    content: 'and wheresoever he taketh him, he teareth him: and he foameth, and gnasheth with his teeth, and pineth away: and I spake to thy disciples that they should cast him out; and they could not. '
  '19':
  - type: text
    content: 'He answereth him, and saith, '
  - type: text
    content: O faithless generation, how long shall I be with you? how long shall I suffer you? bring him unto me.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And after six days Jesus taketh '
  - type: text
    content: with him
  - type: text
    content: ' Peter, and James, and John, and leadeth them up into an high mountain apart by themselves: and he was transfigured before them. '
  '20':
  - type: text
    content: 'And they brought him unto him: and when he saw him, straightway the spirit tare him; and he fell on the ground, and wallowed foaming. '
  '21':
  - type: text
    content: 'And he asked his father, '
  - type: text
    content: How long is it ago since this came unto him?
  - type: text
    content: ' And he said, Of a child. '
  '22':
  - type: text
    content: 'And ofttimes it hath cast him into the fire, and into the waters, to destroy him: but if thou canst do any thing, have compassion on us, and help us. '
  '23':
  - type: text
    content: 'Jesus said unto him, '
  - type: text
    content: 'If thou canst believe, all things '
  - type: text
    content: are
  - type: text
    content: ' possible to him that believeth.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'And straightway the father of the child cried out, and said with tears, Lord, I believe; help thou mine unbelief. '
  '25':
  - type: text
    content: 'When Jesus saw that the people came running together, he rebuked the foul spirit, saying unto him, '
  - type: text
    content: Thou
  - type: text
    content: ' dumb and deaf spirit, I charge thee, come out of him, and enter no more into him.'
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'And '
  - type: text
    content: the spirit
  - type: text
    content: ' cried, and rent him sore, and came out of him: and he was as one dead; insomuch that many said, He is dead. '
  '27':
  - type: text
    content: 'But Jesus took him by the hand, and lifted him up; and he arose. '
  '28':
  - type: text
    content: 'And when he was come into the house, his disciples asked him privately, Why could not we cast him out? '
  '29':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: This kind can come forth by nothing, but by prayer and fasting.
  '3':
  - type: text
    content: 'And his raiment became shining, exceeding white as snow; so as no fuller on earth can white them. '
  '30':
  - type: text
    content: 'And they departed thence, and passed through Galilee; and he would not that any man should know '
  - type: text
    content: it
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'For he taught his disciples, and said unto them, '
  - type: text
    content: The Son of man is delivered into the hands of men, and they shall kill him; and after that he is killed, he shall rise the third day.
  - type: text
    content: ' '
  '32':
  - type: text
    content: But they understood not that saying, and were afraid to ask him.
  - type: heading
    content: Capernaum
  '33':
  - type: text
    content: 'And he came to Capernaum: and being in the house he asked them, '
  - type: text
    content: What was it that ye disputed among yourselves by the way?
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'But they held their peace: for by the way they had disputed among themselves, who '
  - type: text
    content: should be
  - type: text
    content: ' the greatest. '
  '35':
  - type: text
    content: 'And he sat down, and called the twelve, and saith unto them, '
  - type: text
    content: 'If any man desire to be first, '
  - type: text
    content: the same
  - type: text
    content: ' shall be last of all, and servant of all.'
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'And he took a child, and set him in the midst of them: and when he had taken him in his arms, he said unto them, '
  '37':
  - type: text
    content: 'Whosoever shall receive one of such children in my name, receiveth me: and whosoever shall receive me, receiveth not me, but him that sent me.'
  '38':
  - type: text
    content: 'And John answered him, saying, Master, we saw one casting out devils in thy name, and he followeth not us: and we forbad him, because he followeth not us. '
  '39':
  - type: text
    content: 'But Jesus said, '
  - type: text
    content: 'Forbid him not: for there is no man which shall do a miracle in my name, that can lightly speak evil of me.'
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'And there appeared unto them Elias with Moses: and they were talking with Jesus. '
  '40':
  - type: text
    content: For he that is not against us is on our part.
  - type: text
    content: ' '
  '41':
  - type: text
    content: For whosoever shall give you a cup of water to drink in my name, because ye belong to Christ, verily I say unto you, he shall not lose his reward.
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'And whosoever shall offend one of '
  - type: text
    content: these
  - type: text
    content: ' little ones that believe in me, it is better for him that a millstone were hanged about his neck, and he were cast into the sea.'
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'And if thy hand offend thee, cut it off: it is better for thee to enter into life maimed, than having two hands to go into hell, into the fire that never shall be quenched:'
  - type: text
    content: ' '
  '44':
  - type: text
    content: where their worm dieth not, and the fire is not quenched.
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'And if thy foot offend thee, cut it off: it is better for thee to enter halt into life, than having two feet to be cast into hell, into the fire that never shall be quenched:'
  - type: text
    content: ' '
  '46':
  - type: text
    content: where their worm dieth not, and the fire is not quenched.
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'And if thine eye offend thee, pluck it out: it is better for thee to enter into the kingdom of God with one eye, than having two eyes to be cast into hell fire:'
  - type: text
    content: ' '
  '48':
  - type: text
    content: where their worm dieth not, and the fire is not quenched.
  - type: text
    content: ' '
  '49':
  - type: text
    content: For every one shall be salted with fire, and every sacrifice shall be salted with salt.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'And Peter answered and said to Jesus, Master, it is good for us to be here: and let us make three tabernacles; one for thee, and one for Moses, and one for Elias. '
  '50':
  - type: text
    content: 'Salt '
  - type: text
    content: is
  - type: text
    content: ' good: but if the salt have lost his saltness, wherewith will ye season it? Have salt in yourselves, and have peace one with another.'
  '6':
  - type: text
    content: 'For he wist not what to say; for they were sore afraid. '
  '7':
  - type: text
    content: 'And there was a cloud that overshadowed them: and a voice came out of the cloud, saying, This is my beloved Son: hear him. '
  '8':
  - type: text
    content: And suddenly, when they had looked round about, they saw no man any more, save Jesus only with themselves.
  '9':
  - type: text
    content: 'And as they came down from the mountain, he charged them that they should tell no man what things they had seen, till the Son of man were risen from the dead. '
