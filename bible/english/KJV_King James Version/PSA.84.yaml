  '2':
  - type: text
    content: 'My soul longeth, yea, even fainteth for the courts of the '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: My heart and my flesh crieth out for the living God.
  '3':
  - type: text
    content: Yea, the sparrow hath found an house, and the swallow a nest for herself, where she may lay her young,
  - type: text
    content: Even
  - type: text
