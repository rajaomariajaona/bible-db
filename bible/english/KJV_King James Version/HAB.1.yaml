document_id: HAB.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The burden which Habakkuk the prophet did see. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', how long shall I cry, and thou wilt not hear! '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' cry out unto thee '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' violence, and thou wilt not save! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Why dost thou shew me iniquity, and cause '
  - type: usfm
    marker: add
    children:
    - type: text
      text: me
  - type: text
    text: ' to behold grievance? for spoiling and violence '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' before me: and there are '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' raise up strife and contention. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Therefore the law is slacked, and judgment doth never go forth: for the wicked doth compass about the righteous; therefore wrong judgment proceedeth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Behold ye among the heathen, and regard, and wonder marvellously: for I will work a work in your days, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' ye will not believe, though it be told '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For, lo, I raise up the Chaldeans, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' bitter and hasty nation, which shall march through the breadth of the land, to possess the dwellingplaces '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that are
  - type: text
    text: ' not their''s. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'They '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' terrible and dreadful: their judgment and their dignity shall proceed of themselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Their horses also are swifter than the leopards, and are more fierce than the evening wolves: and their horsemen shall spread themselves, and their horsemen shall come from far; they shall fly as the eagle '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' hasteth to eat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'They shall come all for violence: their faces shall sup up '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' the east wind, and they shall gather the captivity as the sand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And they shall scoff at the kings, and the princes shall be a scorn unto them: they shall deride every strong hold; for they shall heap dust, and take it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then shall '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' mind change, and he shall pass over, and offend, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: imputing
  - type: text
    text: ' this his power unto his god.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Art
  - type: text
    text: ' thou not from everlasting, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' my God, mine Holy One? we shall not die. O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', thou hast ordained them for judgment; and, O mighty God, thou hast established them for correction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Thou art
  - type: text
    text: ' of purer eyes than to behold evil, and canst not look on iniquity: wherefore lookest thou upon them that deal treacherously, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' holdest thy tongue when the wicked devoureth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the man that is
  - type: text
    text: ' more righteous than he? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And makest men as the fishes of the sea, as the creeping things, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that have
  - type: text
    text: ' no ruler over them?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'They take up all of them with the angle, they catch them in their net, and gather them in their drag: therefore they rejoice and are glad. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Therefore they sacrifice unto their net, and burn incense unto their drag; because by them their portion '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' fat, and their meat plenteous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Shall they therefore empty their net, and not spare continually to slay the nations?
