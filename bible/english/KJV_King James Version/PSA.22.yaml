document_id: PSA.22
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: To the chief Musician upon Aijeleth Shahar, A Psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: My God, my God, why hast thou forsaken me?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Why art thou so
  - type: text
    text: ' far from helping me, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and from
  - type: text
    text: ' the words of my roaring?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: O my God, I cry in the daytime, but thou hearest not;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And in the night season, and am not silent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' holy,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: O thou
  - type: text
    text: ' that inhabitest the praises of Israel.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Our fathers trusted in thee:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They trusted, and thou didst deliver them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They cried unto thee, and were delivered:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They trusted in thee, and were not confounded.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' a worm, and no man;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: A reproach of men, and despised of the people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'All they that see me laugh me to scorn:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They shoot out the lip, they shake the head, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saying
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He trusted on the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' he would deliver him:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let him deliver him, seeing he delighted in him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' he that took me out of the womb:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Thou didst make me hope '
  - type: usfm
    marker: add
    children:
    - type: text
      text: when I was
  - type: text
    text: ' upon my mother''s breasts.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I was cast upon thee from the womb:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' my God from my mother''s belly.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Be not far from me; for trouble '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' near;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' none to help.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Many bulls have compassed me:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Strong '
  - type: usfm
    marker: add
    children:
    - type: text
      text: bulls
  - type: text
    text: ' of Bashan have beset me round.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'They gaped upon me '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' their mouths,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' a ravening and a roaring lion.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I am poured out like water, and all my bones are out of joint:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: My heart is like wax; It is melted in the midst of my bowels.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: My strength is dried up like a potsherd; And my tongue cleaveth to my jaws;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thou hast brought me into the dust of death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For dogs have compassed me:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The assembly of the wicked have inclosed me:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They pierced my hands and my feet. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'I may tell all my bones:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They look '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' stare upon me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: They part my garments among them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And cast lots upon my vesture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But be not thou far from me, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ':'
- type: usfm
  marker: q2
  children:
  - type: text
    text: O my strength, haste thee to help me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Deliver my soul from the sword;
- type: usfm
  marker: q2
  children:
  - type: text
    text: My darling from the power of the dog.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Save me from the lion''s mouth:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: For thou hast heard me from the horns of the unicorns.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'I will declare thy name unto my brethren:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: In the midst of the congregation will I praise thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ye that fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', praise him;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: All ye the seed of Jacob, glorify him; And fear him, all ye the seed of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: For he hath not despised nor abhorred the affliction of the afflicted;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Neither hath he hid his face from him; But when he cried unto him, he heard.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'My praise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' of thee in the great congregation:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will pay my vows before them that fear him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The meek shall eat and be satisfied:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They shall praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' that seek him: Your heart shall live for ever.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'All the ends of the world shall remember and turn unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ':'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And all the kindreds of the nations shall worship before thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'For the kingdom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the governor among the nations.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'All '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they that be
  - type: text
    text: ' fat upon earth shall eat and worship:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'All they that go down to the dust shall bow before him:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And none can keep alive his own soul.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: A seed shall serve him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'It shall be accounted to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' for a generation.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: They shall come, and shall declare his righteousness
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Unto a people that shall be born, that he hath done '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: .
