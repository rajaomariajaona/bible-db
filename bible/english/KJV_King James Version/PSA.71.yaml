document_id: PSA.71,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In thee, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', do I put my trust: Let me never be put to confusion.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For mine enemies speak against me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And they that lay wait for my soul take counsel together, '
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: saying,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'God hath forsaken him: Persecute and take him; for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none to deliver '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O God, be not far from me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O my God, make haste for my help.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let them be confounded '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' consumed that are adversaries to my soul;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Let them be covered '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' reproach and dishonour that seek my hurt.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I will hope continually,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And will yet praise thee more and more.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My mouth shall shew forth thy righteousness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' thy salvation all the day;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For I know not the numbers '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thereof
    - type: text
      text: .
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will go in the strength of the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ':'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will make mention of thy righteousness, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' of thine only.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O God, thou hast taught me from my youth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And hitherto have I declared thy wondrous works.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now also when I am old and greyheaded, O God, forsake me not;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Until I have shewed thy strength unto '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ' generation, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' thy power to every one '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' is to come.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thy righteousness also, O God, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' very high,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Who hast done great things: O God, who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' like unto thee!'
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Deliver me in thy righteousness, and cause me to escape: Incline thine ear unto me, and save me.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Thou
    - type: text
      text: ', which hast shewed me great and sore troubles, shalt quicken me again,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And shalt bring me up again from the depths of the earth.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thou shalt increase my greatness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And comfort me on every side.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will also praise thee with the psaltery, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' thy truth, O my God:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Unto thee will I sing with the harp, O thou Holy One of Israel.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My lips shall greatly rejoice when I sing unto thee;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And my soul, which thou hast redeemed.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My tongue also shall talk of thy righteousness all the day long:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For they are confounded, for they are brought unto shame, that seek my hurt.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Be thou my strong habitation, whereunto I may continually resort:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Thou hast given commandment to save me; For thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' my rock and my fortress.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Deliver me, O my God, out of the hand of the wicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Out of the hand of the unrighteous and cruel man.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' my hope, O Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ':'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Thou art
    - type: text
      text: ' my trust from my youth.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'By thee have I been holden up from the womb:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Thou art he that took me out of my mother''s bowels: My praise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' continually of thee.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am as a wonder unto many;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' my strong refuge.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let my mouth be filled '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' thy praise'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And with
    - type: text
      text: ' thy honour all the day.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cast me not off in the time of old age;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Forsake me not when my strength faileth.
