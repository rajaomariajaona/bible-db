verses:
  '1':
  - type: text
    content: 'In thee, O '
  - type: text
    content: LORD
  - type: text
    content: ', do I put my trust: Let me never be put to confusion.'
  '10':
  - type: text
    content: For mine enemies speak against me;
  - type: text
    content: 'And they that lay wait for my soul take counsel together, '
  '11':
  - type: text
    content: saying,
  - type: text
    content: 'God hath forsaken him: Persecute and take him; for '
  - type: text
    content: there is
  - type: text
    content: ' none to deliver '
  - type: text
    content: him
  - type: text
    content: .
  '12':
  - type: text
    content: 'O God, be not far from me:'
  - type: text
    content: O my God, make haste for my help.
  '13':
  - type: text
    content: 'Let them be confounded '
  - type: text
    content: and
  - type: text
    content: ' consumed that are adversaries to my soul;'
  - type: text
    content: 'Let them be covered '
  - type: text
    content: with
  - type: text
    content: ' reproach and dishonour that seek my hurt.'
  '14':
  - type: text
    content: But I will hope continually,
  - type: text
    content: And will yet praise thee more and more.
  '15':
  - type: text
    content: 'My mouth shall shew forth thy righteousness '
  - type: text
    content: and
  - type: text
    content: ' thy salvation all the day;'
  - type: text
    content: 'For I know not the numbers '
  - type: text
    content: thereof
  - type: text
    content: .
  '16':
  - type: text
    content: 'I will go in the strength of the Lord '
  - type: text
    content: GOD
  - type: text
    content: ':'
  - type: text
    content: 'I will make mention of thy righteousness, '
  - type: text
    content: even
  - type: text
    content: ' of thine only.'
  '17':
  - type: text
    content: 'O God, thou hast taught me from my youth:'
  - type: text
    content: And hitherto have I declared thy wondrous works.
  '18':
  - type: text
    content: Now also when I am old and greyheaded, O God, forsake me not;
  - type: text
    content: 'Until I have shewed thy strength unto '
  - type: text
    content: this
  - type: text
    content: ' generation, '
  - type: text
    content: and
  - type: text
    content: ' thy power to every one '
  - type: text
    content: that
  - type: text
    content: ' is to come.'
  '19':
  - type: text
    content: 'Thy righteousness also, O God, '
  - type: text
    content: is
  - type: text
    content: ' very high,'
  - type: text
    content: 'Who hast done great things: O God, who '
  - type: text
    content: is
  - type: text
    content: ' like unto thee!'
  '2':
  - type: text
    content: 'Deliver me in thy righteousness, and cause me to escape: Incline thine ear unto me, and save me.'
  '20':
  - type: text
    content: ' '
  - type: text
    content: Thou
  - type: text
    content: ', which hast shewed me great and sore troubles, shalt quicken me again,'
  - type: text
    content: And shalt bring me up again from the depths of the earth.
  '21':
  - type: text
    content: Thou shalt increase my greatness,
  - type: text
    content: And comfort me on every side.
  '22':
  - type: text
    content: 'I will also praise thee with the psaltery, '
  - type: text
    content: even
  - type: text
    content: ' thy truth, O my God:'
  - type: text
    content: Unto thee will I sing with the harp, O thou Holy One of Israel.
  '23':
  - type: text
    content: My lips shall greatly rejoice when I sing unto thee;
  - type: text
    content: And my soul, which thou hast redeemed.
  '24':
  - type: text
    content: 'My tongue also shall talk of thy righteousness all the day long:'
  - type: text
    content: For they are confounded, for they are brought unto shame, that seek my hurt.
  '3':
  - type: text
    content: 'Be thou my strong habitation, whereunto I may continually resort:'
  - type: text
    content: 'Thou hast given commandment to save me; For thou '
  - type: text
    content: art
  - type: text
    content: ' my rock and my fortress.'
  '4':
  - type: text
    content: Deliver me, O my God, out of the hand of the wicked,
  - type: text
    content: Out of the hand of the unrighteous and cruel man.
  '5':
  - type: text
    content: 'For thou '
  - type: text
    content: art
  - type: text
    content: ' my hope, O Lord '
  - type: text
    content: GOD
  - type: text
    content: ':'
  - type: text
    content: Thou art
  - type: text
    content: ' my trust from my youth.'
  '6':
  - type: text
    content: 'By thee have I been holden up from the womb:'
  - type: text
    content: 'Thou art he that took me out of my mother''s bowels: My praise '
  - type: text
    content: shall be
  - type: text
    content: ' continually of thee.'
  '7':
  - type: text
    content: I am as a wonder unto many;
  - type: text
    content: 'But thou '
  - type: text
    content: art
  - type: text
    content: ' my strong refuge.'
  '8':
  - type: text
    content: 'Let my mouth be filled '
  - type: text
    content: with
  - type: text
    content: ' thy praise'
  - type: text
    content: And with
  - type: text
    content: ' thy honour all the day.'
  '9':
  - type: text
    content: Cast me not off in the time of old age;
  - type: text
    content: Forsake me not when my strength faileth.
