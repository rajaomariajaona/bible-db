document_id: ACT.1,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'The former treatise have I made, O Theophilus, of all that Jesus began both to do and teach, '
  '10':
  - type: text
    content: 'And while they looked stedfastly toward heaven as he went up, behold, two men stood by them in white apparel; '
  '11':
  - type: text
    content: which also said, Ye men of Galilee, why stand ye gazing up into heaven? this same Jesus, which is taken up from you into heaven, shall so come in like manner as ye have seen him go into heaven.
  - type: heading
    content: The Church in Jerusalem
  '12':
  - type: text
    content: 'Then returned they unto Jerusalem from the mount called Olivet, which is from Jerusalem a sabbath day''s journey. '
  '13':
  - type: text
    content: 'And when they were come in, they went up into an upper room, where abode both Peter, and James, and John, and Andrew, Philip, and Thomas, Bartholomew, and Matthew, James '
  - type: text
    content: the son
  - type: text
    content: ' of Alphæus, and Simon Zelotes, and Judas '
  - type: text
    content: the brother
  - type: text
    content: ' of James. '
  '14':
  - type: text
    content: These all continued with one accord in prayer and supplication, with the women, and Mary the mother of Jesus, and with his brethren.
  - type: heading
    content: Peter's Speech
  '15':
  - type: text
    content: And in those days Peter stood up in the midst of the disciples, and said, (the number of names together were about an hundred and twenty,)
  '16':
  - type: text
    content: 'Men '
  - type: text
    content: and
  - type: text
    content: ' brethren, this scripture must needs have been fulfilled, which the Holy Ghost by the mouth of David spake before concerning Judas, which was guide to them that took Jesus. '
  '17':
  - type: text
    content: 'For he was numbered with us, and had obtained part of this ministry. '
  '18':
  - type: text
    content: 'Now this man purchased a field with the reward of iniquity; and falling headlong, he burst asunder in the midst, and all his bowels gushed out. '
  '19':
  - type: text
    content: 'And it was known unto all the dwellers at Jerusalem; insomuch as that field is called in their proper tongue, Aceldama, that is to say, The field of blood. '
  '2':
  - type: text
    content: 'until the day in which he was taken up, after that he through the Holy Ghost had given commandments unto the apostles whom he had chosen: '
  '20':
  - type: text
    content: For it is written in the book of Psalms,
  - type: text
    content: Let his habitation be desolate,
  - type: text
    content: 'And let no man dwell therein:'
  - type: text
    content: and
  - type: text
    content: His bishoprick let another take.
  '21':
  - type: text
    content: 'Wherefore of these men which have companied with us all the time that the Lord Jesus went in and out among us, '
  '22':
  - type: text
    content: 'beginning from the baptism of John, unto that same day that he was taken up from us, must one be ordained to be a witness with us of his resurrection. '
  '23':
  - type: text
    content: 'And they appointed two, Joseph called Barsabas, who was surnamed Justus, and Matthias. '
  '24':
  - type: text
    content: 'And they prayed, and said, Thou, Lord, which knowest the hearts of all '
  - type: text
    content: men
  - type: text
    content: ', shew whether of these two thou hast chosen, '
  '25':
  - type: text
    content: 'that he may take part of this ministry and apostleship, from which Judas by transgression fell, that he might go to his own place. '
  '26':
  - type: text
    content: And they gave forth their lots; and the lot fell upon Matthias; and he was numbered with the eleven apostles.
  '3':
  - type: text
    content: 'to whom also he shewed himself alive after his passion by many infallible proofs, being seen of them forty days, and speaking of the things pertaining to the kingdom of God: '
  '4':
  - type: text
    content: 'and, being assembled together with '
  - type: text
    content: them
  - type: text
    content: ', commanded them that they should not depart from Jerusalem, but '
  - type: text
    content: wait for the promise of the Father, which,
  - type: text
    content: ' '
  - type: text
    content: saith he
  - type: text
    content: ', '
  - type: text
    content: ye have heard of me.
  - type: text
    content: ' '
  '5':
  - type: text
    content: For John truly baptized with water; but ye shall be baptized with the Holy Ghost not many days hence.
  '6':
  - type: text
    content: 'When they therefore were come together, they asked of him, saying, Lord, wilt thou at this time restore again the kingdom to Israel? '
  '7':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: It is not for you to know the times or the seasons, which the Father hath put in his own power.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'But ye shall receive power, after that the Holy Ghost is come upon you: and ye shall be witnesses unto me both in Jerusalem, and in all Judæa, and in Samaria, and unto the uttermost part of the earth.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'And when he had spoken these things, while they beheld, he was taken up; and a cloud received him out of their sight. '
