verses:
  '1':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' reigneth; let the earth rejoice;'
  - type: text
    content: 'Let the multitude of isles be glad '
  - type: text
    content: thereof
  - type: text
    content: .
  '10':
  - type: text
    content: 'Ye that love the '
  - type: text
    content: LORD
  - type: text
    content: ', hate evil:'
  - type: text
    content: He preserveth the souls of his saints; He delivereth them out of the hand of the wicked.
  '11':
  - type: text
    content: Light is sown for the righteous,
  - type: text
    content: And gladness for the upright in heart.
  '12':
  - type: text
    content: 'Rejoice in the '
  - type: text
    content: LORD
  - type: text
    content: ', ye righteous;'
  - type: text
    content: And give thanks at the remembrance of his holiness.
  '2':
  - type: text
    content: 'Clouds and darkness '
  - type: text
    content: are
  - type: text
    content: ' round about him:'
  - type: text
    content: 'Righteousness and judgment '
  - type: text
    content: are
  - type: text
    content: ' the habitation of his throne.'
  '3':
  - type: text
    content: A fire goeth before him,
  - type: text
    content: And burneth up his enemies round about.
  '4':
  - type: text
    content: 'His lightnings enlightened the world:'
  - type: text
    content: The earth saw, and trembled.
  '5':
  - type: text
    content: 'The hills melted like wax at the presence of the '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: At the presence of the Lord of the whole earth.
  '6':
  - type: text
    content: The heavens declare his righteousness,
  - type: text
    content: And all the people see his glory.
  '7':
  - type: text
    content: Confounded be all they that serve graven images,
  - type: text
    content: 'That boast themselves of idols: Worship him, all '
  - type: text
    content: ye
  - type: text
    content: ' gods.'
  '8':
  - type: text
    content: Zion heard, and was glad;
  - type: text
    content: 'And the daughters of Judah rejoiced because of thy judgments, O '
  - type: text
    content: LORD
  - type: text
    content: .
  '9':
  - type: text
    content: 'For thou, '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: art
  - type: text
    content: ' high above all the earth:'
  - type: text
    content: Thou art exalted far above all gods.
