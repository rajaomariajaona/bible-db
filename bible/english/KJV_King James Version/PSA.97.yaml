document_id: PSA.97,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' reigneth; let the earth rejoice;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Let the multitude of isles be glad '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thereof
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ye that love the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', hate evil:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He preserveth the souls of his saints; He delivereth them out of the hand of the wicked.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Light is sown for the righteous,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And gladness for the upright in heart.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Rejoice in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', ye righteous;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And give thanks at the remembrance of his holiness.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Clouds and darkness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' round about him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Righteousness and judgment '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the habitation of his throne.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: A fire goeth before him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And burneth up his enemies round about.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'His lightnings enlightened the world:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The earth saw, and trembled.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The hills melted like wax at the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: At the presence of the Lord of the whole earth.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The heavens declare his righteousness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the people see his glory.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Confounded be all they that serve graven images,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That boast themselves of idols: Worship him, all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ye
    - type: text
      text: ' gods.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Zion heard, and was glad;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the daughters of Judah rejoiced because of thy judgments, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For thou, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' high above all the earth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou art exalted far above all gods.
