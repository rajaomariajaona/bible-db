document_id: NUM.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Camp at Sinai
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses in the wilderness of Sinai, in the tabernacle of the congregation, on the first '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the second month, in the second year after they were come out of the land of Egypt, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Of the children of Joseph: of Ephraim; Elishama the son of Ammihud: of Manasseh; Gamaliel the son of Pedahzur. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Of Benjamin; Abidan the son of Gideoni. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Of Dan; Ahiezer the son of Ammishaddai. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Of Asher; Pagiel the son of Ocran. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Of Gad; Eliasaph the son of Deuel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Of Naphtali; Ahira the son of Enan. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' the renowned of the congregation, princes of the tribes of their fathers, heads of thousands in Israel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And Moses and Aaron took these men which are expressed by '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' names: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'and they assembled all the congregation together on the first '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the second month, and they declared their pedigrees after their families, by the house of their fathers, according to the number of the names, from twenty years old and upward, by their polls. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'As the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commanded Moses, so he numbered them in the wilderness of Sinai.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Take ye the sum of all the congregation of the children of Israel, after their families, by the house of their fathers, with the number of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' names, every male by their polls; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And the children of Reuben, Israel''s eldest son, by their generations, after their families, by the house of their fathers, according to the number of the names, by their polls, every male from twenty years old and upward, all that were able to go forth to war; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'those that were numbered of them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' of the tribe of Reuben, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' forty and six thousand and five hundred.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Of the children of Simeon, by their generations, after their families, by the house of their fathers, those that were numbered of them, according to the number of the names, by their polls, every male from twenty years old and upward, all that were able to go forth to war; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'those that were numbered of them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' of the tribe of Simeon, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' fifty and nine thousand and three hundred.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Of the children of Gad, by their generations, after their families, by the house of their fathers, according to the number of the names, from twenty years old and upward, all that were able to go forth to war; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'those that were numbered of them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' of the tribe of Gad, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' forty and five thousand six hundred and fifty.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Of the children of Judah, by their generations, after their families, by the house of their fathers, according to the number of the names, from twenty years old and upward, all that were able to go forth to war; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'those that were numbered of them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' of the tribe of Judah, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' threescore and fourteen thousand and six hundred.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Of the children of Issachar, by their generations, after their families, by the house of their fathers, according to the number of the names, from twenty years old and upward, all that were able to go forth to war; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'those that were numbered of them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' of the tribe of Issachar, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' fifty and four thousand and four hundred.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'from twenty years old and upward, all that are able to go forth to war in Israel: thou and Aaron shall number them by their armies. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Of the children of Zebulun, by their generations, after their families, by the house of their fathers, according to the number of the names, from twenty years old and upward, all that were able to go forth to war; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'those that were numbered of them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' of the tribe of Zebulun, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' fifty and seven thousand and four hundred.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Of the children of Joseph, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: namely
    - type: text
      text: ', of the children of Ephraim, by their generations, after their families, by the house of their fathers, according to the number of the names, from twenty years old and upward, all that were able to go forth to war; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'those that were numbered of them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' of the tribe of Ephraim, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' forty thousand and five hundred.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Of the children of Manasseh, by their generations, after their families, by the house of their fathers, according to the number of the names, from twenty years old and upward, all that were able to go forth to war; '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'those that were numbered of them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' of the tribe of Manasseh, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' thirty and two thousand and two hundred.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Of the children of Benjamin, by their generations, after their families, by the house of their fathers, according to the number of the names, from twenty years old and upward, all that were able to go forth to war; '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'those that were numbered of them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' of the tribe of Benjamin, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' thirty and five thousand and four hundred.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Of the children of Dan, by their generations, after their families, by the house of their fathers, according to the number of the names, from twenty years old and upward, all that were able to go forth to war; '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'those that were numbered of them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' of the tribe of Dan, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' threescore and two thousand and seven hundred.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And with you there shall be a man of every tribe; every one head of the house of his fathers. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Of the children of Asher, by their generations, after their families, by the house of their fathers, according to the number of the names, from twenty years old and upward, all that were able to go forth to war; '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'those that were numbered of them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' of the tribe of Asher, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' forty and one thousand and five hundred.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Of the children of Naphtali, throughout their generations, after their families, by the house of their fathers, according to the number of the names, from twenty years old and upward, all that were able to go forth to war; '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'those that were numbered of them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' of the tribe of Naphtali, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' fifty and three thousand and four hundred.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' those that were numbered, which Moses and Aaron numbered, and the princes of Israel, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: being
    - type: text
      text: ' twelve men: each one was for the house of his fathers. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'So were all those that were numbered of the children of Israel, by the house of their fathers, from twenty years old and upward, all that were able to go forth to war in Israel; '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: even all they that were numbered were six hundred thousand and three thousand and five hundred and fifty.
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'But the Levites after the tribe of their fathers were not numbered among them. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had spoken unto Moses, saying, '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Only thou shalt not number the tribe of Levi, neither take the sum of them among the children of Israel: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the names of the men that shall stand with you: of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the tribe of
    - type: text
      text: ' Reuben; Elizur the son of Shedeur. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'but thou shalt appoint the Levites over the tabernacle of testimony, and over all the vessels thereof, and over all things that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: belong
    - type: text
      text: ' to it: they shall bear the tabernacle, and all the vessels thereof; and they shall minister unto it, and shall encamp round about the tabernacle. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'And when the tabernacle setteth forward, the Levites shall take it down: and when the tabernacle is to be pitched, the Levites shall set it up: and the stranger that cometh nigh shall be put to death. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'And the children of Israel shall pitch their tents, every man by his own camp, and every man by his own standard, throughout their hosts. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'But the Levites shall pitch round about the tabernacle of testimony, that there be no wrath upon the congregation of the children of Israel: and the Levites shall keep the charge of the tabernacle of testimony. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'And the children of Israel did according to all that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commanded Moses, so did they.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Of Simeon; Shelumiel the son of Zurishaddai. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Of Judah; Nahshon the son of Amminadab. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Of Issachar; Nethaneel the son of Zuar. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Of Zebulun; Eliab the son of Helon. '
