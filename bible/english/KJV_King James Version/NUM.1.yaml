document_id: NUM.1,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Camp at Sinai
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses in the wilderness of Sinai, in the tabernacle of the congregation, on the first '
  - type: text
    content: day
  - type: text
    content: ' of the second month, in the second year after they were come out of the land of Egypt, saying, '
  '10':
  - type: text
    content: 'Of the children of Joseph: of Ephraim; Elishama the son of Ammihud: of Manasseh; Gamaliel the son of Pedahzur. '
  '11':
  - type: text
    content: 'Of Benjamin; Abidan the son of Gideoni. '
  '12':
  - type: text
    content: 'Of Dan; Ahiezer the son of Ammishaddai. '
  '13':
  - type: text
    content: 'Of Asher; Pagiel the son of Ocran. '
  '14':
  - type: text
    content: 'Of Gad; Eliasaph the son of Deuel. '
  '15':
  - type: text
    content: 'Of Naphtali; Ahira the son of Enan. '
  '16':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' the renowned of the congregation, princes of the tribes of their fathers, heads of thousands in Israel. '
  '17':
  - type: text
    content: 'And Moses and Aaron took these men which are expressed by '
  - type: text
    content: their
  - type: text
    content: ' names: '
  '18':
  - type: text
    content: 'and they assembled all the congregation together on the first '
  - type: text
    content: day
  - type: text
    content: ' of the second month, and they declared their pedigrees after their families, by the house of their fathers, according to the number of the names, from twenty years old and upward, by their polls. '
  '19':
  - type: text
    content: 'As the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses, so he numbered them in the wilderness of Sinai.'
  '2':
  - type: text
    content: 'Take ye the sum of all the congregation of the children of Israel, after their families, by the house of their fathers, with the number of '
  - type: text
    content: their
  - type: text
    content: ' names, every male by their polls; '
  '20':
  - type: text
    content: 'And the children of Reuben, Israel''s eldest son, by their generations, after their families, by the house of their fathers, according to the number of the names, by their polls, every male from twenty years old and upward, all that were able to go forth to war; '
  '21':
  - type: text
    content: 'those that were numbered of them, '
  - type: text
    content: even
  - type: text
    content: ' of the tribe of Reuben, '
  - type: text
    content: were
  - type: text
    content: ' forty and six thousand and five hundred.'
  '22':
  - type: text
    content: 'Of the children of Simeon, by their generations, after their families, by the house of their fathers, those that were numbered of them, according to the number of the names, by their polls, every male from twenty years old and upward, all that were able to go forth to war; '
  '23':
  - type: text
    content: 'those that were numbered of them, '
  - type: text
    content: even
  - type: text
    content: ' of the tribe of Simeon, '
  - type: text
    content: were
  - type: text
    content: ' fifty and nine thousand and three hundred.'
  '24':
  - type: text
    content: 'Of the children of Gad, by their generations, after their families, by the house of their fathers, according to the number of the names, from twenty years old and upward, all that were able to go forth to war; '
  '25':
  - type: text
    content: 'those that were numbered of them, '
  - type: text
    content: even
  - type: text
    content: ' of the tribe of Gad, '
  - type: text
    content: were
  - type: text
    content: ' forty and five thousand six hundred and fifty.'
  '26':
  - type: text
    content: 'Of the children of Judah, by their generations, after their families, by the house of their fathers, according to the number of the names, from twenty years old and upward, all that were able to go forth to war; '
  '27':
  - type: text
    content: 'those that were numbered of them, '
  - type: text
    content: even
  - type: text
    content: ' of the tribe of Judah, '
  - type: text
    content: were
  - type: text
    content: ' threescore and fourteen thousand and six hundred.'
  '28':
  - type: text
    content: 'Of the children of Issachar, by their generations, after their families, by the house of their fathers, according to the number of the names, from twenty years old and upward, all that were able to go forth to war; '
  '29':
  - type: text
    content: 'those that were numbered of them, '
  - type: text
    content: even
  - type: text
    content: ' of the tribe of Issachar, '
  - type: text
    content: were
  - type: text
    content: ' fifty and four thousand and four hundred.'
  '3':
  - type: text
    content: 'from twenty years old and upward, all that are able to go forth to war in Israel: thou and Aaron shall number them by their armies. '
  '30':
  - type: text
    content: 'Of the children of Zebulun, by their generations, after their families, by the house of their fathers, according to the number of the names, from twenty years old and upward, all that were able to go forth to war; '
  '31':
  - type: text
    content: 'those that were numbered of them, '
  - type: text
    content: even
  - type: text
    content: ' of the tribe of Zebulun, '
  - type: text
    content: were
  - type: text
    content: ' fifty and seven thousand and four hundred.'
  '32':
  - type: text
    content: 'Of the children of Joseph, '
  - type: text
    content: namely
  - type: text
    content: ', of the children of Ephraim, by their generations, after their families, by the house of their fathers, according to the number of the names, from twenty years old and upward, all that were able to go forth to war; '
  '33':
  - type: text
    content: 'those that were numbered of them, '
  - type: text
    content: even
  - type: text
    content: ' of the tribe of Ephraim, '
  - type: text
    content: were
  - type: text
    content: ' forty thousand and five hundred.'
  '34':
  - type: text
    content: 'Of the children of Manasseh, by their generations, after their families, by the house of their fathers, according to the number of the names, from twenty years old and upward, all that were able to go forth to war; '
  '35':
  - type: text
    content: 'those that were numbered of them, '
  - type: text
    content: even
  - type: text
    content: ' of the tribe of Manasseh, '
  - type: text
    content: were
  - type: text
    content: ' thirty and two thousand and two hundred.'
  '36':
  - type: text
    content: 'Of the children of Benjamin, by their generations, after their families, by the house of their fathers, according to the number of the names, from twenty years old and upward, all that were able to go forth to war; '
  '37':
  - type: text
    content: 'those that were numbered of them, '
  - type: text
    content: even
  - type: text
    content: ' of the tribe of Benjamin, '
  - type: text
    content: were
  - type: text
    content: ' thirty and five thousand and four hundred.'
  '38':
  - type: text
    content: 'Of the children of Dan, by their generations, after their families, by the house of their fathers, according to the number of the names, from twenty years old and upward, all that were able to go forth to war; '
  '39':
  - type: text
    content: 'those that were numbered of them, '
  - type: text
    content: even
  - type: text
    content: ' of the tribe of Dan, '
  - type: text
    content: were
  - type: text
    content: ' threescore and two thousand and seven hundred.'
  '4':
  - type: text
    content: 'And with you there shall be a man of every tribe; every one head of the house of his fathers. '
  '40':
  - type: text
    content: 'Of the children of Asher, by their generations, after their families, by the house of their fathers, according to the number of the names, from twenty years old and upward, all that were able to go forth to war; '
  '41':
  - type: text
    content: 'those that were numbered of them, '
  - type: text
    content: even
  - type: text
    content: ' of the tribe of Asher, '
  - type: text
    content: were
  - type: text
    content: ' forty and one thousand and five hundred.'
  '42':
  - type: text
    content: 'Of the children of Naphtali, throughout their generations, after their families, by the house of their fathers, according to the number of the names, from twenty years old and upward, all that were able to go forth to war; '
  '43':
  - type: text
    content: 'those that were numbered of them, '
  - type: text
    content: even
  - type: text
    content: ' of the tribe of Naphtali, '
  - type: text
    content: were
  - type: text
    content: ' fifty and three thousand and four hundred.'
  '44':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' those that were numbered, which Moses and Aaron numbered, and the princes of Israel, '
  - type: text
    content: being
  - type: text
    content: ' twelve men: each one was for the house of his fathers. '
  '45':
  - type: text
    content: 'So were all those that were numbered of the children of Israel, by the house of their fathers, from twenty years old and upward, all that were able to go forth to war in Israel; '
  '46':
  - type: text
    content: even all they that were numbered were six hundred thousand and three thousand and five hundred and fifty.
  '47':
  - type: text
    content: 'But the Levites after the tribe of their fathers were not numbered among them. '
  '48':
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ' had spoken unto Moses, saying, '
  '49':
  - type: text
    content: 'Only thou shalt not number the tribe of Levi, neither take the sum of them among the children of Israel: '
  '5':
  - type: text
    content: 'And these '
  - type: text
    content: are
  - type: text
    content: ' the names of the men that shall stand with you: of '
  - type: text
    content: the tribe of
  - type: text
    content: ' Reuben; Elizur the son of Shedeur. '
  '50':
  - type: text
    content: 'but thou shalt appoint the Levites over the tabernacle of testimony, and over all the vessels thereof, and over all things that '
  - type: text
    content: belong
  - type: text
    content: ' to it: they shall bear the tabernacle, and all the vessels thereof; and they shall minister unto it, and shall encamp round about the tabernacle. '
  '51':
  - type: text
    content: 'And when the tabernacle setteth forward, the Levites shall take it down: and when the tabernacle is to be pitched, the Levites shall set it up: and the stranger that cometh nigh shall be put to death. '
  '52':
  - type: text
    content: 'And the children of Israel shall pitch their tents, every man by his own camp, and every man by his own standard, throughout their hosts. '
  '53':
  - type: text
    content: 'But the Levites shall pitch round about the tabernacle of testimony, that there be no wrath upon the congregation of the children of Israel: and the Levites shall keep the charge of the tabernacle of testimony. '
  '54':
  - type: text
    content: 'And the children of Israel did according to all that the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses, so did they.'
  '6':
  - type: text
    content: 'Of Simeon; Shelumiel the son of Zurishaddai. '
  '7':
  - type: text
    content: 'Of Judah; Nahshon the son of Amminadab. '
  '8':
  - type: text
    content: 'Of Issachar; Nethaneel the son of Zuar. '
  '9':
  - type: text
    content: 'Of Zebulun; Eliab the son of Helon. '
