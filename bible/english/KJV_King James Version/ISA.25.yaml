document_id: ISA.25
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Songs of Deliverance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' my God; I will exalt thee, I will praise thy name; for thou hast done wonderful '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things; thy
  - type: text
    text: ' counsels of old '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' faithfulness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' truth. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For thou hast made of a city an heap; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' a defenced city a ruin: a palace of strangers to be no city; it shall never be built. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Therefore shall the strong people glorify thee, the city of the terrible nations shall fear thee. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For thou hast been a strength to the poor, a strength to the needy in his distress, a refuge from the storm, a shadow from the heat, when the blast of the terrible ones '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' as a storm '
  - type: usfm
    marker: add
    children:
    - type: text
      text: against
  - type: text
    text: ' the wall. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Thou shalt bring down the noise of strangers, as the heat in a dry place; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the heat with the shadow of a cloud: the branch of the terrible ones shall be brought low.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And in this mountain shall the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts make unto all people a feast of fat things, a feast of wines on the lees, of fat things full of marrow, of wines on the lees well refined. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And he will destroy in this mountain the face of the covering cast over all people, and the vail that is spread over all nations. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He will swallow up death in victory; and the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' will wipe away tears from off all faces; and the rebuke of his people shall he take away from off all the earth: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath spoken '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And it shall be said in that day, Lo, this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' our God; we have waited for him, and he will save us: this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; we have waited for him, we will be glad and rejoice in his salvation. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For in this mountain shall the hand of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' rest, and Moab shall be trodden down under him, even as straw is trodden down for the dunghill. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And he shall spread forth his hands in the midst of them, as he that swimmeth spreadeth forth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his hands
  - type: text
    text: ' to swim: and he shall bring down their pride together with the spoils of their hands. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And the fortress of the high fort of thy walls shall he bring down, lay low, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' bring to the ground, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to the dust.'
