document_id: EZK.40,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Temple of the Holy City
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In the five and twentieth year of our captivity, in the beginning of the year, in the tenth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the month, in the fourteenth year after that the city was smitten, in the selfsame day the hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was upon me, and brought me thither. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And the little chambers of the gate eastward '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' three on this side, and three on that side; they three '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' of one measure: and the posts had one measure on this side and on that side. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And he measured the breadth of the entry of the gate, ten cubits; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the length of the gate, thirteen cubits. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'The space also before the little chambers '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' one cubit '
    - type: usfm
      marker: add
      children:
      - type: text
        text: on this side
    - type: text
      text: ', and the space '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' one cubit on that side: and the little chambers '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' six cubits on this side, and six cubits on that side. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'He measured then the gate from the roof of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' little chamber to the roof of another: the breadth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' five and twenty cubits, door against door. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'He made also posts of threescore cubits, even unto the post of the court round about the gate. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And from the face of the gate of the entrance unto the face of the porch of the inner gate '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' fifty cubits. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there were
    - type: text
      text: ' narrow windows to the little chambers, and to their posts within the gate round about, and likewise to the arches: and windows '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' round about inward: and upon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: each
    - type: text
      text: ' post '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' palm trees.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then brought he me into the outward court, and, lo, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there were
    - type: text
      text: ' chambers, and a pavement made for the court round about: thirty chambers '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' upon the pavement. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And the pavement by the side of the gates over against the length of the gates '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the lower pavement. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Then he measured the breadth from the forefront of the lower gate unto the forefront of the inner court without, an hundred cubits eastward and northward.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'In the visions of God brought he me into the land of Israel, and set me upon a very high mountain, by which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' as the frame of a city on the south. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And the gate of the outward court that looked toward the north, he measured the length thereof, and the breadth thereof. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And the little chambers thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' three on this side and three on that side; and the posts thereof and the arches thereof were after the measure of the first gate: the length thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' fifty cubits, and the breadth five and twenty cubits. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And their windows, and their arches, and their palm trees, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' after the measure of the gate that looketh toward the east; and they went up unto it by seven steps; and the arches thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' before them. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And the gate of the inner court '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' over against the gate toward the north, and toward the east; and he measured from gate to gate an hundred cubits.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'After that he brought me toward the south, and behold a gate toward the south: and he measured the posts thereof and the arches thereof according to these measures. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there were
    - type: text
      text: ' windows in it and in the arches thereof round about, like those windows: the length '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' fifty cubits, and the breadth five and twenty cubits. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there were
    - type: text
      text: ' seven steps to go up to it, and the arches thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' before them: and it had palm trees, one on this side, and another on that side, upon the posts thereof. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' a gate in the inner court toward the south: and he measured from gate to gate toward the south an hundred cubits.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And he brought me to the inner court by the south gate: and he measured the south gate according to these measures; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'and the little chambers thereof, and the posts thereof, and the arches thereof, according to these measures: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there were
    - type: text
      text: ' windows in it and in the arches thereof round about: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' fifty cubits long, and five and twenty cubits broad. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And he brought me thither, and, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' a man, whose appearance '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' like the appearance of brass, with a line of flax in his hand, and a measuring reed; and he stood in the gate. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And the arches round about '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' five and twenty cubits long, and five cubits broad. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And the arches thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' toward the utter court; and palm trees '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' upon the posts thereof: and the going up to it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: had
    - type: text
      text: ' eight steps.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And he brought me into the inner court toward the east: and he measured the gate according to these measures. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And the little chambers thereof, and the posts thereof, and the arches thereof, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' according to these measures: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there were
    - type: text
      text: ' windows therein and in the arches thereof round about: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' fifty cubits long, and five and twenty cubits broad. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'And the arches thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' toward the outward court; and palm trees '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' upon the posts thereof, on this side, and on that side: and the going up to it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: had
    - type: text
      text: ' eight steps.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'And he brought me to the north gate, and measured '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' according to these measures; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'the little chambers thereof, the posts thereof, and the arches thereof, and the windows to it round about: the length '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' fifty cubits, and the breadth five and twenty cubits. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'And the posts thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' toward the utter court; and palm trees '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' upon the posts thereof, on this side, and on that side: and the going up to it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: had
    - type: text
      text: ' eight steps.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'And the chambers and the entries thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' by the posts of the gates, where they washed the burnt offering.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Its Tables
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'And in the porch of the gate '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' two tables on this side, and two tables on that side, to slay thereon the burnt offering and the sin offering and the trespass offering. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And the man said unto me, Son of man, behold with thine eyes, and hear with thine ears, and set thine heart upon all that I shall shew thee; for to the intent that I might shew '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' unto thee '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' thou brought hither: declare all that thou seest to the house of Israel.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Temple Buildings
    marker-yv: yv-h
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'And at the side without, as one goeth up to the entry of the north gate, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' two tables; and on the other side, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' at the porch of the gate, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' two tables. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Four tables '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' on this side, and four tables on that side, by the side of the gate; eight tables, whereupon they slew '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their sacrifices
    - type: text
      text: .
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'And the four tables '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' of hewn stone for the burnt offering, of a cubit and an half long, and a cubit and an half broad, and one cubit high: whereupon also they laid the instruments wherewith they slew the burnt offering and the sacrifice. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'And within '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' hooks, an hand broad, fastened round about: and upon the tables '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the flesh of the offering.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'And without the inner gate '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' the chambers of the singers in the inner court, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' at the side of the north gate; and their prospect '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' toward the south: one at the side of the east gate '
    - type: usfm
      marker: add
      children:
      - type: text
        text: having
    - type: text
      text: ' the prospect toward the north. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'And he said unto me, This chamber, whose prospect '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' toward the south, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' for the priests, the keepers of the charge of the house. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'And the chamber whose prospect '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' toward the north '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' for the priests, the keepers of the charge of the altar: these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the sons of Zadok among the sons of Levi, which come near to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' to minister unto him. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'So he measured the court, an hundred cubits long, and an hundred cubits broad, foursquare; and the altar '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that was
    - type: text
      text: ' before the house.'
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'And he brought me to the porch of the house, and measured '
    - type: usfm
      marker: add
      children:
      - type: text
        text: each
    - type: text
