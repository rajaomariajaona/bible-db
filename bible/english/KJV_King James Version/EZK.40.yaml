type_code: eng
verses:
  '1':
  - type: heading
    content: The Temple of the Holy City
  - type: text
    content: 'In the five and twentieth year of our captivity, in the beginning of the year, in the tenth '
  - type: text
    content: day
  - type: text
    content: ' of the month, in the fourteenth year after that the city was smitten, in the selfsame day the hand of the '
  - type: text
    content: LORD
  - type: text
    content: ' was upon me, and brought me thither. '
  '10':
  - type: text
    content: 'And the little chambers of the gate eastward '
  - type: text
    content: were
  - type: text
    content: ' three on this side, and three on that side; they three '
  - type: text
    content: were
  - type: text
    content: ' of one measure: and the posts had one measure on this side and on that side. '
  '11':
  - type: text
    content: 'And he measured the breadth of the entry of the gate, ten cubits; '
  - type: text
    content: and
  - type: text
    content: ' the length of the gate, thirteen cubits. '
  '12':
  - type: text
    content: 'The space also before the little chambers '
  - type: text
    content: was
  - type: text
    content: ' one cubit '
  - type: text
    content: on this side
  - type: text
    content: ', and the space '
  - type: text
    content: was
  - type: text
    content: ' one cubit on that side: and the little chambers '
  - type: text
    content: were
  - type: text
    content: ' six cubits on this side, and six cubits on that side. '
  '13':
  - type: text
    content: 'He measured then the gate from the roof of '
  - type: text
    content: one
  - type: text
    content: ' little chamber to the roof of another: the breadth '
  - type: text
    content: was
  - type: text
    content: ' five and twenty cubits, door against door. '
  '14':
  - type: text
    content: 'He made also posts of threescore cubits, even unto the post of the court round about the gate. '
  '15':
  - type: text
    content: 'And from the face of the gate of the entrance unto the face of the porch of the inner gate '
  - type: text
    content: were
  - type: text
    content: ' fifty cubits. '
  '16':
  - type: text
    content: 'And '
  - type: text
    content: there were
  - type: text
    content: ' narrow windows to the little chambers, and to their posts within the gate round about, and likewise to the arches: and windows '
  - type: text
    content: were
  - type: text
    content: ' round about inward: and upon '
  - type: text
    content: each
  - type: text
    content: ' post '
  - type: text
    content: were
  - type: text
    content: ' palm trees.'
  '17':
  - type: text
    content: 'Then brought he me into the outward court, and, lo, '
  - type: text
    content: there were
  - type: text
    content: ' chambers, and a pavement made for the court round about: thirty chambers '
  - type: text
    content: were
  - type: text
    content: ' upon the pavement. '
  '18':
  - type: text
    content: 'And the pavement by the side of the gates over against the length of the gates '
  - type: text
    content: was
  - type: text
    content: ' the lower pavement. '
  '19':
  - type: text
    content: Then he measured the breadth from the forefront of the lower gate unto the forefront of the inner court without, an hundred cubits eastward and northward.
  '2':
  - type: text
    content: 'In the visions of God brought he me into the land of Israel, and set me upon a very high mountain, by which '
  - type: text
    content: was
  - type: text
    content: ' as the frame of a city on the south. '
  '20':
  - type: text
    content: 'And the gate of the outward court that looked toward the north, he measured the length thereof, and the breadth thereof. '
  '21':
  - type: text
    content: 'And the little chambers thereof '
  - type: text
    content: were
  - type: text
    content: ' three on this side and three on that side; and the posts thereof and the arches thereof were after the measure of the first gate: the length thereof '
  - type: text
    content: was
  - type: text
    content: ' fifty cubits, and the breadth five and twenty cubits. '
  '22':
  - type: text
    content: 'And their windows, and their arches, and their palm trees, '
  - type: text
    content: were
  - type: text
    content: ' after the measure of the gate that looketh toward the east; and they went up unto it by seven steps; and the arches thereof '
  - type: text
    content: were
  - type: text
    content: ' before them. '
  '23':
  - type: text
    content: 'And the gate of the inner court '
  - type: text
    content: was
  - type: text
    content: ' over against the gate toward the north, and toward the east; and he measured from gate to gate an hundred cubits.'
  '24':
  - type: text
    content: 'After that he brought me toward the south, and behold a gate toward the south: and he measured the posts thereof and the arches thereof according to these measures. '
  '25':
  - type: text
    content: 'And '
  - type: text
    content: there were
  - type: text
    content: ' windows in it and in the arches thereof round about, like those windows: the length '
  - type: text
    content: was
  - type: text
    content: ' fifty cubits, and the breadth five and twenty cubits. '
  '26':
  - type: text
    content: 'And '
  - type: text
    content: there were
  - type: text
    content: ' seven steps to go up to it, and the arches thereof '
  - type: text
    content: were
  - type: text
    content: ' before them: and it had palm trees, one on this side, and another on that side, upon the posts thereof. '
  '27':
  - type: text
    content: 'And '
  - type: text
    content: there was
  - type: text
    content: ' a gate in the inner court toward the south: and he measured from gate to gate toward the south an hundred cubits.'
  '28':
  - type: text
    content: 'And he brought me to the inner court by the south gate: and he measured the south gate according to these measures; '
  '29':
  - type: text
    content: 'and the little chambers thereof, and the posts thereof, and the arches thereof, according to these measures: and '
  - type: text
    content: there were
  - type: text
    content: ' windows in it and in the arches thereof round about: '
  - type: text
    content: it was
  - type: text
    content: ' fifty cubits long, and five and twenty cubits broad. '
  '3':
  - type: text
    content: 'And he brought me thither, and, behold, '
  - type: text
    content: there was
  - type: text
    content: ' a man, whose appearance '
  - type: text
    content: was
  - type: text
    content: ' like the appearance of brass, with a line of flax in his hand, and a measuring reed; and he stood in the gate. '
  '30':
  - type: text
    content: 'And the arches round about '
  - type: text
    content: were
  - type: text
    content: ' five and twenty cubits long, and five cubits broad. '
  '31':
  - type: text
    content: 'And the arches thereof '
  - type: text
    content: were
  - type: text
    content: ' toward the utter court; and palm trees '
  - type: text
    content: were
  - type: text
    content: ' upon the posts thereof: and the going up to it '
  - type: text
    content: had
  - type: text
    content: ' eight steps.'
  '32':
  - type: text
    content: 'And he brought me into the inner court toward the east: and he measured the gate according to these measures. '
  '33':
  - type: text
    content: 'And the little chambers thereof, and the posts thereof, and the arches thereof, '
  - type: text
    content: were
  - type: text
    content: ' according to these measures: and '
  - type: text
    content: there were
  - type: text
    content: ' windows therein and in the arches thereof round about: '
  - type: text
    content: it was
  - type: text
    content: ' fifty cubits long, and five and twenty cubits broad. '
  '34':
  - type: text
    content: 'And the arches thereof '
  - type: text
    content: were
  - type: text
    content: ' toward the outward court; and palm trees '
  - type: text
    content: were
  - type: text
    content: ' upon the posts thereof, on this side, and on that side: and the going up to it '
  - type: text
    content: had
  - type: text
    content: ' eight steps.'
  '35':
  - type: text
    content: 'And he brought me to the north gate, and measured '
  - type: text
    content: it
  - type: text
    content: ' according to these measures; '
  '36':
  - type: text
    content: 'the little chambers thereof, the posts thereof, and the arches thereof, and the windows to it round about: the length '
  - type: text
    content: was
  - type: text
    content: ' fifty cubits, and the breadth five and twenty cubits. '
  '37':
  - type: text
    content: 'And the posts thereof '
  - type: text
    content: were
  - type: text
    content: ' toward the utter court; and palm trees '
  - type: text
    content: were
  - type: text
    content: ' upon the posts thereof, on this side, and on that side: and the going up to it '
  - type: text
    content: had
  - type: text
    content: ' eight steps.'
  '38':
  - type: text
    content: 'And the chambers and the entries thereof '
  - type: text
    content: were
  - type: text
    content: ' by the posts of the gates, where they washed the burnt offering.'
  - type: heading
    content: Its Tables
  '39':
  - type: text
    content: 'And in the porch of the gate '
  - type: text
    content: were
  - type: text
    content: ' two tables on this side, and two tables on that side, to slay thereon the burnt offering and the sin offering and the trespass offering. '
  '4':
  - type: text
    content: 'And the man said unto me, Son of man, behold with thine eyes, and hear with thine ears, and set thine heart upon all that I shall shew thee; for to the intent that I might shew '
  - type: text
    content: them
  - type: text
    content: ' unto thee '
  - type: text
    content: art
  - type: text
    content: ' thou brought hither: declare all that thou seest to the house of Israel.'
  - type: heading
    content: The Temple Buildings
  '40':
  - type: text
    content: 'And at the side without, as one goeth up to the entry of the north gate, '
  - type: text
    content: were
  - type: text
    content: ' two tables; and on the other side, which '
  - type: text
    content: was
  - type: text
    content: ' at the porch of the gate, '
  - type: text
    content: were
  - type: text
    content: ' two tables. '
  '41':
  - type: text
    content: 'Four tables '
  - type: text
    content: were
  - type: text
    content: ' on this side, and four tables on that side, by the side of the gate; eight tables, whereupon they slew '
  - type: text
    content: their sacrifices
  - type: text
    content: .
  '42':
  - type: text
    content: 'And the four tables '
  - type: text
    content: were
  - type: text
    content: ' of hewn stone for the burnt offering, of a cubit and an half long, and a cubit and an half broad, and one cubit high: whereupon also they laid the instruments wherewith they slew the burnt offering and the sacrifice. '
  '43':
  - type: text
    content: 'And within '
  - type: text
    content: were
  - type: text
    content: ' hooks, an hand broad, fastened round about: and upon the tables '
  - type: text
    content: was
  - type: text
    content: ' the flesh of the offering.'
  '44':
  - type: text
    content: 'And without the inner gate '
  - type: text
    content: were
  - type: text
    content: ' the chambers of the singers in the inner court, which '
  - type: text
    content: was
  - type: text
    content: ' at the side of the north gate; and their prospect '
  - type: text
    content: was
  - type: text
    content: ' toward the south: one at the side of the east gate '
  - type: text
    content: having
  - type: text
    content: ' the prospect toward the north. '
  '45':
  - type: text
    content: 'And he said unto me, This chamber, whose prospect '
  - type: text
    content: is
  - type: text
    content: ' toward the south, '
  - type: text
    content: is
  - type: text
    content: ' for the priests, the keepers of the charge of the house. '
  '46':
  - type: text
    content: 'And the chamber whose prospect '
  - type: text
    content: is
  - type: text
    content: ' toward the north '
  - type: text
    content: is
  - type: text
    content: ' for the priests, the keepers of the charge of the altar: these '
  - type: text
    content: are
  - type: text
    content: ' the sons of Zadok among the sons of Levi, which come near to the '
  - type: text
    content: LORD
  - type: text
    content: ' to minister unto him. '
  '47':
  - type: text
    content: 'So he measured the court, an hundred cubits long, and an hundred cubits broad, foursquare; and the altar '
  - type: text
    content: that was
  - type: text
    content: ' before the house.'
  '48':
  - type: text
    content: 'And he brought me to the porch of the house, and measured '
  - type: text
    content: each
  - type: text
    content: ' post of the porch, five cubits on this side, and five cubits on that side: and the breadth of the gate '
  - type: text
    content: was
  - type: text
    content: ' three cubits on this side, and three cubits on that side. '
  '49':
  - type: text
    content: 'The length of the porch '
  - type: text
    content: was
  - type: text
    content: ' twenty cubits, and the breadth eleven cubits; and '
  - type: text
    content: he brought me
  - type: text
    content: ' by the steps whereby they went up to it: and '
  - type: text
    content: there were
  - type: text
    content: ' pillars by the posts, one on this side, and another on that side.'
  '5':
  - type: text
    content: 'And behold a wall on the outside of the house round about, and in the man''s hand a measuring reed of six cubits '
  - type: text
    content: long
  - type: text
    content: ' by the cubit and an hand breadth: so he measured the breadth of the building, one reed; and the height, one reed.'
  '6':
  - type: text
    content: 'Then came he unto the gate which looketh toward the east, and went up the stairs thereof, and measured the threshold of the gate, '
  - type: text
    content: which was
  - type: text
    content: ' one reed broad; and the other threshold '
  - type: text
    content: of the gate, which was
  - type: text
    content: ' one reed broad. '
  '7':
  - type: text
    content: 'And '
  - type: text
    content: every
  - type: text
    content: ' little chamber '
  - type: text
    content: was
  - type: text
    content: ' one reed long, and one reed broad; and between the little chambers '
  - type: text
    content: were
  - type: text
    content: ' five cubits; and the threshold of the gate by the porch of the gate within '
  - type: text
    content: was
  - type: text
    content: ' one reed. '
  '8':
  - type: text
    content: 'He measured also the porch of the gate within, one reed. '
  '9':
  - type: text
    content: 'Then measured he the porch of the gate, eight cubits; and the posts thereof, two cubits; and the porch of the gate '
  - type: text
    content: was
  - type: text
    content: ' inward. '
