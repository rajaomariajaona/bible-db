document_id: HOS.12
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: His Past Mercies
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ephraim feedeth on wind, and followeth after the east wind: he daily increaseth lies and desolation; and they do make a covenant with the Assyrians, and oil is carried into Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath also a controversy with Judah, and will punish Jacob according to his ways; according to his doings will he recompense him. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He took his brother by the heel in the womb, and by his strength he had power with God: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'yea, he had power over the angel, and prevailed: he wept, and made supplication unto him: he found him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' Beth-el, and there he spake with us; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'even the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of hosts; the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' his memorial. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Therefore turn thou to thy God: keep mercy and judgment, and wait on thy God continually.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: He is
  - type: text
    text: ' a merchant, the balances of deceit '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' in his hand: he loveth to oppress. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Ephraim said, Yet I am become rich, I have found me out substance: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' all my labours they shall find none iniquity in me that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' sin. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God from the land of Egypt will yet make thee to dwell in tabernacles, as in the days of the solemn feast.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I have also spoken by the prophets, and I have multiplied visions, and used similitudes, by the ministry of the prophets. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is there
  - type: text
    text: ' iniquity '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' Gilead? surely they are vanity: they sacrifice bullocks in Gilgal; yea, their altars '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' as heaps in the furrows of the fields. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Jacob fled into the country of Syria, and Israel served for a wife, and for a wife he kept '
  - type: usfm
    marker: add
    children:
    - type: text
      text: sheep
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And by a prophet the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' brought Israel out of Egypt, and by a prophet was he preserved. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ephraim provoked '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' to anger most bitterly: therefore shall he leave his blood upon him, and his reproach shall his Lord return unto him.'
