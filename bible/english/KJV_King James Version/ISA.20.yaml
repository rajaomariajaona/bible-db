document_id: ISA.20,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'In the year that Tartan came unto Ashdod, (when Sargon the king of Assyria sent him,) and fought against Ashdod, and took it; '
  '2':
  - type: text
    content: 'at the same time spake the '
  - type: text
    content: LORD
  - type: text
    content: ' by Isaiah the son of Amoz, saying, Go and loose the sackcloth from off thy loins, and put off thy shoe from thy foot. And he did so, walking naked and barefoot. '
  '3':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said, Like as my servant Isaiah hath walked naked and barefoot three years '
  - type: text
    content: for
  - type: text
    content: ' a sign and wonder upon Egypt and upon Ethiopia; '
  '4':
  - type: text
    content: 'so shall the king of Assyria lead away the Egyptians prisoners, and the Ethiopians captives, young and old, naked and barefoot, even with '
  - type: text
    content: their
  - type: text
    content: ' buttocks uncovered, to the shame of Egypt. '
  '5':
  - type: text
    content: 'And they shall be afraid and ashamed of Ethiopia their expectation, and of Egypt their glory. '
  '6':
  - type: text
    content: 'And the inhabitant of this isle shall say in that day, Behold, such '
  - type: text
    content: is
  - type: text
    content: ' our expectation, whither we flee for help to be delivered from the king of Assyria: and how shall we escape?'
