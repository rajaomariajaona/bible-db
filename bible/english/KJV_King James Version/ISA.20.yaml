document_id: ISA.20
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the year that Tartan came unto Ashdod, (when Sargon the king of Assyria sent him,) and fought against Ashdod, and took it; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'at the same time spake the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' by Isaiah the son of Amoz, saying, Go and loose the sackcloth from off thy loins, and put off thy shoe from thy foot. And he did so, walking naked and barefoot. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said, Like as my servant Isaiah hath walked naked and barefoot three years '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' a sign and wonder upon Egypt and upon Ethiopia; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'so shall the king of Assyria lead away the Egyptians prisoners, and the Ethiopians captives, young and old, naked and barefoot, even with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' buttocks uncovered, to the shame of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And they shall be afraid and ashamed of Ethiopia their expectation, and of Egypt their glory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the inhabitant of this isle shall say in that day, Behold, such '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' our expectation, whither we flee for help to be delivered from the king of Assyria: and how shall we escape?'
