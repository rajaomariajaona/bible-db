document_id: AMO.8,1
type_code: eng
verses:
  '1':
  - type: heading
    content: A Basket of Fruit
  - type: text
    content: 'Thus hath the Lord '
  - type: text
    content: GOD
  - type: text
    content: ' shewed unto me: and behold a basket of summer fruit. '
  '10':
  - type: text
    content: 'and I will turn your feasts into mourning, and all your songs into lamentation; and I will bring up sackcloth upon all loins, and baldness upon every head; and I will make it as the mourning of an only '
  - type: text
    content: son
  - type: text
    content: ', and the end thereof as a bitter day.'
  '11':
  - type: text
    content: 'Behold, the days come, saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: ', that I will send a famine in the land, not a famine of bread, nor a thirst for water, but of hearing the words of the '
  - type: text
    content: LORD
  - type: text
    content: ': '
  '12':
  - type: text
    content: 'and they shall wander from sea to sea, and from the north even to the east, they shall run to and fro to seek the word of the '
  - type: text
    content: LORD
  - type: text
    content: ', and shall not find '
  - type: text
    content: it
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'In that day shall the fair virgins and young men faint for thirst. '
  '14':
  - type: text
    content: They that swear by the sin of Samaria, and say, Thy god, O Dan, liveth; and, The manner of Beer-sheba liveth; even they shall fall, and never rise up again.
  '2':
  - type: text
    content: 'And he said, Amos, what seest thou? And I said, A basket of summer fruit. Then said the '
  - type: text
    content: LORD
  - type: text
    content: ' unto me, The end is come upon my people of Israel; I will not again pass by them any more. '
  '3':
  - type: text
    content: 'And the songs of the temple shall be howlings in that day, saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: ': '
  - type: text
    content: there shall be
  - type: text
    content: ' many dead bodies in every place; they shall cast '
  - type: text
    content: them
  - type: text
    content: ' forth with silence.'
  '4':
  - type: text
    content: 'Hear this, O ye that swallow up the needy, even to make the poor of the land to fail, '
  '5':
  - type: text
    content: 'saying, When will the new moon be gone, that we may sell corn? and the sabbath, that we may set forth wheat, making the ephah small, and the shekel great, and falsifying the balances by deceit? '
  '6':
  - type: text
    content: 'That we may buy the poor for silver, and the needy for a pair of shoes; '
  - type: text
    content: yea
  - type: text
    content: ', and sell the refuse of the wheat? '
  '7':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' hath sworn by the excellency of Jacob, Surely I will never forget any of their works. '
  '8':
  - type: text
    content: 'Shall not the land tremble for this, and every one mourn that dwelleth therein? and it shall rise up wholly as a flood; and it shall be cast out and drowned, as '
  - type: text
    content: by
  - type: text
    content: ' the flood of Egypt. '
  '9':
  - type: text
    content: 'And it shall come to pass in that day, saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: ', that I will cause the sun to go down at noon, and I will darken the earth in the clear day: '
