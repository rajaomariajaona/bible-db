document_id: AMO.8,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: A Basket of Fruit
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus hath the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ' shewed unto me: and behold a basket of summer fruit. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and I will turn your feasts into mourning, and all your songs into lamentation; and I will bring up sackcloth upon all loins, and baldness upon every head; and I will make it as the mourning of an only '
    - type: usfm
      marker: add
      children:
      - type: text
        text: son
    - type: text
      text: ', and the end thereof as a bitter day.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, the days come, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ', that I will send a famine in the land, not a famine of bread, nor a thirst for water, but of hearing the words of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they shall wander from sea to sea, and from the north even to the east, they shall run to and fro to seek the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and shall not find '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In that day shall the fair virgins and young men faint for thirst. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They that swear by the sin of Samaria, and say, Thy god, O Dan, liveth; and, The manner of Beer-sheba liveth; even they shall fall, and never rise up again.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, Amos, what seest thou? And I said, A basket of summer fruit. Then said the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' unto me, The end is come upon my people of Israel; I will not again pass by them any more. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the songs of the temple shall be howlings in that day, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ': '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there shall be
    - type: text
      text: ' many dead bodies in every place; they shall cast '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' forth with silence.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hear this, O ye that swallow up the needy, even to make the poor of the land to fail, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'saying, When will the new moon be gone, that we may sell corn? and the sabbath, that we may set forth wheat, making the ephah small, and the shekel great, and falsifying the balances by deceit? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That we may buy the poor for silver, and the needy for a pair of shoes; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yea
    - type: text
      text: ', and sell the refuse of the wheat? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath sworn by the excellency of Jacob, Surely I will never forget any of their works. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shall not the land tremble for this, and every one mourn that dwelleth therein? and it shall rise up wholly as a flood; and it shall be cast out and drowned, as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: by
    - type: text
      text: ' the flood of Egypt. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass in that day, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ', that I will cause the sun to go down at noon, and I will darken the earth in the clear day: '
