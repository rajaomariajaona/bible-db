document_id: ISA.31
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Woe to them that go down to Egypt for help; and stay on horses, and trust in chariots, because '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they are
  - type: text
    text: ' many; and in horsemen, because they are very strong; but they look not unto the Holy One of Israel, neither seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Yet he also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' wise, and will bring evil, and will not call back his words: but will arise against the house of the evildoers, and against the help of them that work iniquity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Now the Egyptians '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' men, and not God; and their horses flesh, and not spirit. When the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall stretch out his hand, both he that helpeth shall fall, and he that is holpen shall fall down, and they all shall fail together.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For thus hath the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spoken unto me, Like as the lion and the young lion roaring on his prey, when a multitude of shepherds is called forth against him, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he
  - type: text
    text: ' will not be afraid of their voice, nor abase himself for the noise of them: so shall the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts come down to fight for mount Zion, and for the hill thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'As birds flying, so will the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts defend Jerusalem; defending also he will deliver '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it; and
  - type: text
    text: ' passing over he will preserve '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Turn ye unto '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him from
  - type: text
    text: ' whom the children of Israel have deeply revolted. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For in that day every man shall cast away his idols of silver, and his idols of gold, which your own hands have made unto you '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' a sin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then shall the Assyrian fall with the sword, not of a mighty man; and the sword, not of a mean man, shall devour him: but he shall flee from the sword, and his young men shall be discomfited. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And he shall pass over to his strong hold for fear, and his princes shall be afraid of the ensign, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', whose fire '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in Zion, and his furnace in Jerusalem.'
