  - type: text
    content: ' whom the children of Israel have deeply revolted. '
  '7':
  - type: text
    content: 'For in that day every man shall cast away his idols of silver, and his idols of gold, which your own hands have made unto you '
  - type: text
    content: for
  - type: text
    content: ' a sin. '
  '8':
  - type: text
    content: 'Then shall the Assyrian fall with the sword, not of a mighty man; and the sword, not of a mean man, shall devour him: but he shall flee from the sword, and his young men shall be discomfited. '
  '9':
  - type: text
    content: 'And he shall pass over to his strong hold for fear, and his princes shall be afraid of the ensign, saith the '
  - type: text
