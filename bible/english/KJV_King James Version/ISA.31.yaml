  '1':
  - type: text
    content: 'Woe to them that go down to Egypt for help; and stay on horses, and trust in chariots, because '
  - type: text
    content: they are
  - type: text
    content: ' many; and in horsemen, because they are very strong; but they look not unto the Holy One of Israel, neither seek the '
  - type: text
    content: LORD
  - type: text
    content: '! '
  '2':
  - type: text
    content: 'Yet he also '
  - type: text
    content: is
  - type: text
    content: ' wise, and will bring evil, and will not call back his words: but will arise against the house of the evildoers, and against the help of them that work iniquity. '
  '3':
  - type: text
    content: 'Now the Egyptians '
  - type: text
    content: are
  - type: text
