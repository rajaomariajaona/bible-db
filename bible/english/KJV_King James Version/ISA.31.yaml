  - type: text
    content: LORD
  - type: text
    content: ' shall stretch out his hand, both he that helpeth shall fall, and he that is holpen shall fall down, and they all shall fail together.'
  '4':
  - type: text
    content: 'For thus hath the '
  - type: text
    content: LORD
  - type: text
    content: ' spoken unto me, Like as the lion and the young lion roaring on his prey, when a multitude of shepherds is called forth against him, '
  - type: text
