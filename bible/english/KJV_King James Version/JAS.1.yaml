verses:
  '1':
  - type: text
    content: James, a servant of God and of the Lord Jesus Christ, to the twelve tribes which are scattered abroad, greeting.
  '10':
  - type: text
    content: 'but the rich, in that he is made low: because as the flower of the grass he shall pass away. '
  '11':
  - type: text
    content: 'For the sun is no sooner risen with a burning heat, but it withereth the grass, and the flower thereof falleth, and the grace of the fashion of it perisheth: so also shall the rich man fade away in his ways.'
  '12':
  - type: text
    content: 'Blessed '
  - type: text
    content: is
  - type: text
    content: ' the man that endureth temptation: for when he is tried, he shall receive the crown of life, which the Lord hath promised to them that love him. '
  '13':
  - type: text
    content: 'Let no man say when he is tempted, I am tempted of God: for God cannot be tempted with evil, neither tempteth he any man: '
  '14':
  - type: text
    content: 'but every man is tempted, when he is drawn away of his own lust, and enticed. '
  '15':
  - type: text
    content: 'Then when lust hath conceived, it bringeth forth sin: and sin, when it is finished, bringeth forth death. '
  '16':
  - type: text
    content: 'Do not err, my beloved brethren. '
  '17':
  - type: text
    content: 'Every good gift and every perfect gift is from above, and cometh down from the Father of lights, with whom is no variableness, neither shadow of turning. '
  '18':
  - type: text
    content: Of his own will begat he us with the word of truth, that we should be a kind of firstfruits of his creatures.
  '19':
  - type: text
    content: 'Wherefore, my beloved brethren, let every man be swift to hear, slow to speak, slow to wrath: '
  '2':
  - type: text
    content: 'My brethren, count it all joy when ye fall into divers temptations; '
  '20':
  - type: text
    content: 'for the wrath of man worketh not the righteousness of God. '
  '21':
  - type: text
    content: 'Wherefore lay apart all filthiness and superfluity of naughtiness, and receive with meekness the engrafted word, which is able to save your souls. '
  '22':
  - type: text
    content: 'But be ye doers of the word, and not hearers only, deceiving your own selves. '
  '23':
  - type: text
    content: 'For if any be a hearer of the word, and not a doer, he is like unto a man beholding his natural face in a glass: '
  '24':
  - type: text
    content: 'for he beholdeth himself, and goeth his way, and straightway forgetteth what manner of man he was. '
  '25':
  - type: text
    content: 'But whoso looketh into the perfect law of liberty, and continueth '
  - type: text
    content: therein
  - type: text
    content: ', he being not a forgetful hearer, but a doer of the work, this man shall be blessed in his deed. '
  '26':
  - type: text
    content: 'If any man among you seem to be religious, and bridleth not his tongue, but deceiveth his own heart, this man''s religion '
  - type: text
    content: is
  - type: text
    content: ' vain. '
  '27':
  - type: text
    content: 'Pure religion and undefiled before God and the Father is this, To visit the fatherless and widows in their affliction, '
  - type: text
    content: and
  - type: text
    content: ' to keep himself unspotted from the world.'
  '3':
  - type: text
    content: 'knowing '
  - type: text
    content: this
  - type: text
    content: ', that the trying of your faith worketh patience. '
  '4':
  - type: text
    content: 'But let patience have '
  - type: text
    content: her
  - type: text
    content: ' perfect work, that ye may be perfect and entire, wanting nothing.'
  '5':
  - type: text
    content: 'If any of you lack wisdom, let him ask of God, that giveth to all '
  - type: text
    content: men
  - type: text
    content: ' liberally, and upbraideth not; and it shall be given him. '
  '6':
  - type: text
    content: 'But let him ask in faith, nothing wavering. For he that wavereth is like a wave of the sea driven with the wind and tossed. '
  '7':
  - type: text
    content: 'For let not that man think that he shall receive any thing of the Lord. '
  '8':
  - type: text
    content: 'A double minded man '
  - type: text
    content: is
  - type: text
    content: ' unstable in all his ways. '
  '9':
  - type: text
    content: 'Let the brother of low degree rejoice in that he is exalted: '
