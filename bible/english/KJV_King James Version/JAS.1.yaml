document_id: JAS.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: James, a servant of God and of the Lord Jesus Christ, to the twelve tribes which are scattered abroad, greeting.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'My brethren, count it all joy when ye fall into divers temptations; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'knowing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ', that the trying of your faith worketh patience. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But let patience have '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her
  - type: text
    text: ' perfect work, that ye may be perfect and entire, wanting nothing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'If any of you lack wisdom, let him ask of God, that giveth to all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' liberally, and upbraideth not; and it shall be given him. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But let him ask in faith, nothing wavering. For he that wavereth is like a wave of the sea driven with the wind and tossed. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For let not that man think that he shall receive any thing of the Lord. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'A double minded man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' unstable in all his ways. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Let the brother of low degree rejoice in that he is exalted: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'but the rich, in that he is made low: because as the flower of the grass he shall pass away. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For the sun is no sooner risen with a burning heat, but it withereth the grass, and the flower thereof falleth, and the grace of the fashion of it perisheth: so also shall the rich man fade away in his ways.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the man that endureth temptation: for when he is tried, he shall receive the crown of life, which the Lord hath promised to them that love him. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Let no man say when he is tempted, I am tempted of God: for God cannot be tempted with evil, neither tempteth he any man: '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'but every man is tempted, when he is drawn away of his own lust, and enticed. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then when lust hath conceived, it bringeth forth sin: and sin, when it is finished, bringeth forth death. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Do not err, my beloved brethren. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Every good gift and every perfect gift is from above, and cometh down from the Father of lights, with whom is no variableness, neither shadow of turning. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Of his own will begat he us with the word of truth, that we should be a kind of firstfruits of his creatures.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Wherefore, my beloved brethren, let every man be swift to hear, slow to speak, slow to wrath: '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'for the wrath of man worketh not the righteousness of God. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Wherefore lay apart all filthiness and superfluity of naughtiness, and receive with meekness the engrafted word, which is able to save your souls. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But be ye doers of the word, and not hearers only, deceiving your own selves. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For if any be a hearer of the word, and not a doer, he is like unto a man beholding his natural face in a glass: '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'for he beholdeth himself, and goeth his way, and straightway forgetteth what manner of man he was. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But whoso looketh into the perfect law of liberty, and continueth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: therein
  - type: text
    text: ', he being not a forgetful hearer, but a doer of the work, this man shall be blessed in his deed. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'If any man among you seem to be religious, and bridleth not his tongue, but deceiveth his own heart, this man''s religion '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' vain. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Pure religion and undefiled before God and the Father is this, To visit the fatherless and widows in their affliction, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' to keep himself unspotted from the world.'
