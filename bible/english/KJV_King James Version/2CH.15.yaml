document_id: 2CH.15,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Prophecy of Oded
  - type: text
    content: 'And the Spirit of God came upon Azariah the son of Oded: '
  '10':
  - type: text
    content: 'So they gathered themselves together at Jerusalem in the third month, in the fifteenth year of the reign of Asa. '
  '11':
  - type: text
    content: 'And they offered unto the '
  - type: text
    content: LORD
  - type: text
    content: ' the same time, of the spoil '
  - type: text
    content: which
  - type: text
    content: ' they had brought, seven hundred oxen and seven thousand sheep. '
  '12':
  - type: text
    content: 'And they entered into a covenant to seek the '
  - type: text
    content: LORD
  - type: text
    content: ' God of their fathers with all their heart and with all their soul; '
  '13':
  - type: text
    content: 'that whosoever would not seek the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel should be put to death, whether small or great, whether man or woman. '
  '14':
  - type: text
    content: 'And they sware unto the '
  - type: text
    content: LORD
  - type: text
    content: ' with a loud voice, and with shouting, and with trumpets, and with cornets. '
  '15':
  - type: text
    content: 'And all Judah rejoiced at the oath: for they had sworn with all their heart, and sought him with their whole desire; and he was found of them: and the '
  - type: text
    content: LORD
  - type: text
    content: ' gave them rest round about.'
  '16':
  - type: text
    content: 'And also '
  - type: text
    content: concerning
  - type: text
    content: ' Maachah the mother of Asa the king, he removed her from '
  - type: text
    content: being
  - type: text
    content: ' queen, because she had made an idol in a grove: and Asa cut down her idol, and stamped '
  - type: text
    content: it
  - type: text
    content: ', and burnt '
  - type: text
    content: it
  - type: text
    content: ' at the brook Kidron. '
  '17':
  - type: text
    content: 'But the high places were not taken away out of Israel: nevertheless the heart of Asa was perfect all his days. '
  '18':
  - type: text
    content: 'And he brought into the house of God the things that his father had dedicated, and that he himself had dedicated, silver, and gold, and vessels. '
  '19':
  - type: text
    content: 'And there was no '
  - type: text
    content: more
  - type: text
    content: ' war unto the five and thirtieth year of the reign of Asa.'
  '2':
  - type: text
    content: 'and he went out to meet Asa, and said unto him, Hear ye me, Asa, and all Judah and Benjamin; The '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' with you, while ye be with him; and if ye seek him, he will be found of you; but if ye forsake him, he will forsake you. '
  '3':
  - type: text
    content: 'Now for a long season Israel '
  - type: text
    content: hath been
  - type: text
    content: ' without the true God, and without a teaching priest, and without law. '
  '4':
  - type: text
    content: 'But when they in their trouble did turn unto the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel, and sought him, he was found of them. '
  '5':
  - type: text
    content: 'And in those times '
  - type: text
    content: there was
  - type: text
    content: ' no peace to him that went out, nor to him that came in, but great vexations '
  - type: text
    content: were
  - type: text
    content: ' upon all the inhabitants of the countries. '
  '6':
  - type: text
    content: 'And nation was destroyed of nation, and city of city: for God did vex them with all adversity. '
  '7':
  - type: text
    content: 'Be ye strong therefore, and let not your hands be weak: for your work shall be rewarded.'
  '8':
  - type: text
    content: 'And when Asa heard these words, and the prophecy of Oded the prophet, he took courage, and put away the abominable idols out of all the land of Judah and Benjamin, and out of the cities which he had taken from mount Ephraim, and renewed the altar of the '
  - type: text
    content: LORD
  - type: text
    content: ', that '
  - type: text
    content: was
  - type: text
    content: ' before the porch of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'And he gathered all Judah and Benjamin, and the strangers with them out of Ephraim and Manasseh, and out of Simeon: for they fell to him out of Israel in abundance, when they saw that the '
  - type: text
    content: LORD
  - type: text
    content: ' his God '
  - type: text
    content: was
  - type: text
    content: ' with him. '
