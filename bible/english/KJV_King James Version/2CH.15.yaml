document_id: 2CH.15
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Prophecy of Oded
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the Spirit of God came upon Azariah the son of Oded: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and he went out to meet Asa, and said unto him, Hear ye me, Asa, and all Judah and Benjamin; The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with you, while ye be with him; and if ye seek him, he will be found of you; but if ye forsake him, he will forsake you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Now for a long season Israel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hath been
  - type: text
    text: ' without the true God, and without a teaching priest, and without law. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But when they in their trouble did turn unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel, and sought him, he was found of them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And in those times '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' no peace to him that went out, nor to him that came in, but great vexations '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' upon all the inhabitants of the countries. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And nation was destroyed of nation, and city of city: for God did vex them with all adversity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Be ye strong therefore, and let not your hands be weak: for your work shall be rewarded.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And when Asa heard these words, and the prophecy of Oded the prophet, he took courage, and put away the abominable idols out of all the land of Judah and Benjamin, and out of the cities which he had taken from mount Ephraim, and renewed the altar of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' before the porch of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And he gathered all Judah and Benjamin, and the strangers with them out of Ephraim and Manasseh, and out of Simeon: for they fell to him out of Israel in abundance, when they saw that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' his God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So they gathered themselves together at Jerusalem in the third month, in the fifteenth year of the reign of Asa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And they offered unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' the same time, of the spoil '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' they had brought, seven hundred oxen and seven thousand sheep. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And they entered into a covenant to seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of their fathers with all their heart and with all their soul; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'that whosoever would not seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel should be put to death, whether small or great, whether man or woman. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And they sware unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' with a loud voice, and with shouting, and with trumpets, and with cornets. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And all Judah rejoiced at the oath: for they had sworn with all their heart, and sought him with their whole desire; and he was found of them: and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' gave them rest round about.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: concerning
  - type: text
    text: ' Maachah the mother of Asa the king, he removed her from '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' queen, because she had made an idol in a grove: and Asa cut down her idol, and stamped '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and burnt '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' at the brook Kidron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But the high places were not taken away out of Israel: nevertheless the heart of Asa was perfect all his days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And he brought into the house of God the things that his father had dedicated, and that he himself had dedicated, silver, and gold, and vessels. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And there was no '
  - type: usfm
    marker: add
    children:
    - type: text
      text: more
  - type: text
    text: ' war unto the five and thirtieth year of the reign of Asa.'
