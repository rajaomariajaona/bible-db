document_id: ZEP.3,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem's Danger
  - type: text
    content: 'Woe to her that is filthy and polluted, to the oppressing city! '
  '10':
  - type: text
    content: 'From beyond the rivers of Ethiopia my suppliants, '
  - type: text
    content: even
  - type: text
    content: ' the daughter of my dispersed, shall bring mine offering. '
  '11':
  - type: text
    content: 'In that day shalt thou not be ashamed for all thy doings, wherein thou hast transgressed against me: for then I will take away out of the midst of thee them that rejoice in thy pride, and thou shalt no more be haughty because of my holy mountain. '
  '12':
  - type: text
    content: 'I will also leave in the midst of thee an afflicted and poor people, and they shall trust in the name of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'The remnant of Israel shall not do iniquity, nor speak lies; neither shall a deceitful tongue be found in their mouth: for they shall feed and lie down, and none shall make '
  - type: text
    content: them
  - type: text
    content: ' afraid.'
  '14':
  - type: text
    content: 'Sing, O daughter of Zion; shout, O Israel; be glad and rejoice with all the heart, O daughter of Jerusalem. '
  '15':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' hath taken away thy judgments, he hath cast out thine enemy: the king of Israel, '
  - type: text
    content: even
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: is
  - type: text
    content: ' in the midst of thee: thou shalt not see evil any more. '
  '16':
  - type: text
    content: 'In that day it shall be said to Jerusalem, Fear thou not: '
  - type: text
    content: and to
  - type: text
    content: ' Zion, Let not thine hands be slack. '
  '17':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' thy God in the midst of thee '
  - type: text
    content: is
  - type: text
    content: ' mighty; he will save, he will rejoice over thee with joy; he will rest in his love, he will joy over thee with singing. '
  '18':
  - type: text
    content: 'I will gather '
  - type: text
    content: them that are
  - type: text
    content: ' sorrowful for the solemn assembly, '
  - type: text
    content: who
  - type: text
    content: ' are of thee, '
  - type: text
    content: to whom
  - type: text
    content: ' the reproach of it '
  - type: text
    content: was
  - type: text
    content: ' a burden. '
  '19':
  - type: text
    content: 'Behold, at that time I will undo all that afflict thee: and I will save her that halteth, and gather her that was driven out; and I will get them praise and fame in every land where they have been put to shame. '
  '2':
  - type: text
    content: 'She obeyed not the voice; she received not correction; she trusted not in the '
  - type: text
    content: LORD
  - type: text
    content: '; she drew not near to her God. '
  '20':
  - type: text
    content: 'At that time will I bring you '
  - type: text
    content: again
  - type: text
    content: ', even in the time that I gather you: for I will make you a name and a praise among all people of the earth, when I turn back your captivity before your eyes, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '3':
  - type: text
    content: 'Her princes within her '
  - type: text
    content: are
  - type: text
    content: ' roaring lions; her judges '
  - type: text
    content: are
  - type: text
    content: ' evening wolves; they gnaw not the bones till the morrow. '
  '4':
  - type: text
    content: 'Her prophets '
  - type: text
    content: are
  - type: text
    content: ' light '
  - type: text
    content: and
  - type: text
    content: ' treacherous persons: her priests have polluted the sanctuary, they have done violence to the law.'
  '5':
  - type: text
    content: 'The just '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' in the midst thereof; he will not do iniquity: every morning doth he bring his judgment to light, he faileth not; but the unjust knoweth no shame. '
  '6':
  - type: text
    content: 'I have cut off the nations: their towers are desolate; I made their streets waste, that none passeth by: their cities are destroyed, so that there is no man, that there is none inhabitant. '
  '7':
  - type: text
    content: 'I said, Surely thou wilt fear me, thou wilt receive instruction; so their dwelling should not be cut off, howsoever I punished them: but they rose early, '
  - type: text
    content: and
  - type: text
    content: ' corrupted all their doings.'
  - type: heading
    content: Jerusalem's Deliverance
  '8':
  - type: text
    content: 'Therefore wait ye upon me, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', until the day that I rise up to the prey: for my determination '
  - type: text
    content: is
  - type: text
    content: ' to gather the nations, that I may assemble the kingdoms, to pour upon them mine indignation, '
  - type: text
    content: even
  - type: text
    content: ' all my fierce anger: for all the earth shall be devoured with the fire of my jealousy.'
  '9':
  - type: text
    content: 'For then will I turn to the people a pure language, that they may all call upon the name of the '
  - type: text
    content: LORD
  - type: text
    content: ', to serve him with one consent. '
