document_id: ZEP.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jerusalem's Danger
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Woe to her that is filthy and polluted, to the oppressing city! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'From beyond the rivers of Ethiopia my suppliants, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the daughter of my dispersed, shall bring mine offering. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'In that day shalt thou not be ashamed for all thy doings, wherein thou hast transgressed against me: for then I will take away out of the midst of thee them that rejoice in thy pride, and thou shalt no more be haughty because of my holy mountain. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'I will also leave in the midst of thee an afflicted and poor people, and they shall trust in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'The remnant of Israel shall not do iniquity, nor speak lies; neither shall a deceitful tongue be found in their mouth: for they shall feed and lie down, and none shall make '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' afraid.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Sing, O daughter of Zion; shout, O Israel; be glad and rejoice with all the heart, O daughter of Jerusalem. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath taken away thy judgments, he hath cast out thine enemy: the king of Israel, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the midst of thee: thou shalt not see evil any more. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'In that day it shall be said to Jerusalem, Fear thou not: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and to
    - type: text
      text: ' Zion, Let not thine hands be slack. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God in the midst of thee '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' mighty; he will save, he will rejoice over thee with joy; he will rest in his love, he will joy over thee with singing. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'I will gather '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them that are
    - type: text
      text: ' sorrowful for the solemn assembly, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: who
    - type: text
      text: ' are of thee, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to whom
    - type: text
      text: ' the reproach of it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' a burden. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Behold, at that time I will undo all that afflict thee: and I will save her that halteth, and gather her that was driven out; and I will get them praise and fame in every land where they have been put to shame. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'She obeyed not the voice; she received not correction; she trusted not in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; she drew not near to her God. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'At that time will I bring you '
    - type: usfm
      marker: add
      children:
      - type: text
        text: again
    - type: text
      text: ', even in the time that I gather you: for I will make you a name and a praise among all people of the earth, when I turn back your captivity before your eyes, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Her princes within her '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' roaring lions; her judges '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' evening wolves; they gnaw not the bones till the morrow. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Her prophets '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' light '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' treacherous persons: her priests have polluted the sanctuary, they have done violence to the law.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The just '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the midst thereof; he will not do iniquity: every morning doth he bring his judgment to light, he faileth not; but the unjust knoweth no shame. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'I have cut off the nations: their towers are desolate; I made their streets waste, that none passeth by: their cities are destroyed, so that there is no man, that there is none inhabitant. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'I said, Surely thou wilt fear me, thou wilt receive instruction; so their dwelling should not be cut off, howsoever I punished them: but they rose early, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' corrupted all their doings.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jerusalem's Deliverance
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Therefore wait ye upon me, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', until the day that I rise up to the prey: for my determination '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' to gather the nations, that I may assemble the kingdoms, to pour upon them mine indignation, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' all my fierce anger: for all the earth shall be devoured with the fire of my jealousy.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For then will I turn to the people a pure language, that they may all call upon the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', to serve him with one consent. '
