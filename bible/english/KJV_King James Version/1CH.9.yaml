document_id: 1CH.9
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Inhabitants of Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So all Israel were reckoned by genealogies; and, behold, they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' written in the book of the kings of Israel and Judah, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: who
  - type: text
    text: ' were carried away to Babylon for their transgression. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Now the first inhabitants that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: dwelt
  - type: text
    text: ' in their possessions in their cities '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ', the Israelites, the priests, Levites, and the Nethinims. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And in Jerusalem dwelt of the children of Judah, and of the children of Benjamin, and of the children of Ephraim, and Manasseh; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Uthai the son of Ammihud, the son of Omri, the son of Imri, the son of Bani, of the children of Pharez the son of Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And of the Shilonites; Asaiah the firstborn, and his sons. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And of the sons of Zerah; Jeuel, and their brethren, six hundred and ninety. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And of the sons of Benjamin; Sallu the son of Meshullam, the son of Hodaviah, the son of Hasenuah, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and Ibneiah the son of Jeroham, and Elah the son of Uzzi, the son of Michri, and Meshullam the son of Shephathiah, the son of Reuel, the son of Ibnijah; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and their brethren, according to their generations, nine hundred and fifty and six. All these men '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' chief of the fathers in the house of their fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And of the priests; Jedaiah, and Jehoiarib, and Jachin, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and Azariah the son of Hilkiah, the son of Meshullam, the son of Zadok, the son of Meraioth, the son of Ahitub, the ruler of the house of God; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and Adaiah the son of Jeroham, the son of Pashur, the son of Malchijah, and Maasiai the son of Adiel, the son of Jahzerah, the son of Meshullam, the son of Meshillemith, the son of Immer; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: and their brethren, heads of the house of their fathers, a thousand and seven hundred and threescore; very able men for the work of the service of the house of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And of the Levites; Shemaiah the son of Hasshub, the son of Azrikam, the son of Hashabiah, of the sons of Merari; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and Bakbakkar, Heresh, and Galal, and Mattaniah the son of Micah, the son of Zichri, the son of Asaph; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: and Obadiah the son of Shemaiah, the son of Galal, the son of Jeduthun, and Berechiah the son of Asa, the son of Elkanah, that dwelt in the villages of the Netophathites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the porters '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ', Shallum, and Akkub, and Talmon, and Ahiman, and their brethren: Shallum '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the chief; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'who hitherto '
  - type: usfm
    marker: add
    children:
    - type: text
      text: waited
  - type: text
    text: ' in the king''s gate eastward: they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' porters in the companies of the children of Levi. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And Shallum the son of Kore, the son of Ebiasaph, the son of Korah, and his brethren, of the house of his father, the Korahites, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' over the work of the service, keepers of the gates of the tabernacle: and their fathers, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' over the host of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' keepers of the entry. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Phinehas the son of Eleazar was the ruler over them in time past, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' with him. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' Zechariah the son of Meshelemiah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' porter of the door of the tabernacle of the congregation. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'All these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which were
  - type: text
    text: ' chosen to be porters in the gates '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' two hundred and twelve. These were reckoned by their genealogy in their villages, whom David and Samuel the seer did ordain in their set office. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So they and their children '
  - type: usfm
    marker: add
    children:
    - type: text
      text: had
  - type: text
    text: ' the oversight of the gates of the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: namely
  - type: text
    text: ', the house of the tabernacle, by wards. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'In four quarters were the porters, toward the east, west, north, and south. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And their brethren, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which were
  - type: text
    text: ' in their villages, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' to come after seven days from time to time with them. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'For these Levites, the four chief porters, were in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' set office, and were over the chambers and treasuries of the house of God. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And they lodged round about the house of God, because the charge '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' upon them, and the opening thereof every morning '
  - type: usfm
    marker: add
    children:
    - type: text
      text: pertained
  - type: text
    text: ' to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: certain
  - type: text
    text: ' of them had the charge of the ministering vessels, that they should bring them in and out by tale. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Some
  - type: text
    text: ' of them also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' appointed to oversee the vessels, and all the instruments of the sanctuary, and the fine flour, and the wine, and the oil, and the frankincense, and the spices. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' of the sons of the priests made the ointment of the spices. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And Mattithiah, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' of the Levites, who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the firstborn of Shallum the Korahite, had the set office over the things that were made in the pans. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: other
  - type: text
    text: ' of their brethren, of the sons of the Kohathites, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' over the shewbread, to prepare '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' every sabbath. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the singers, chief of the fathers of the Levites, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: who remaining
  - type: text
    text: ' in the chambers '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' free: for they were employed in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' work day and night. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'These chief fathers of the Levites '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' chief throughout their generations; these dwelt at Jerusalem.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: In Gibeon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And in Gibeon dwelt the father of Gibeon, Jehiel, whose wife''s name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Maachah: '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'and his firstborn son Abdon, then Zur, and Kish, and Baal, and Ner, and Nadab, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'and Gedor, and Ahio, and Zechariah, and Mikloth. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And Mikloth begat Shimeam. And they also dwelt with their brethren at Jerusalem, over against their brethren. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And Ner begat Kish; and Kish begat Saul; and Saul begat Jonathan, and Malchi-shua, and Abinadab, and Eshbaal. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And the son of Jonathan '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Merib-baal: and Merib-baal begat Micah. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And the sons of Micah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ', Pithon, and Melech, and Tahrea, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and Ahaz
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And Ahaz begat Jarah; and Jarah begat Alemeth, and Azmaveth, and Zimri; and Zimri begat Moza; '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'and Moza begat Binea; and Rephaiah his son, Eleasah his son, Azel his son. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'And Azel had six sons, whose names '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' these, Azrikam, Bocheru, and Ishmael, and Sheariah, and Obadiah, and Hanan: these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' the sons of Azel.'
