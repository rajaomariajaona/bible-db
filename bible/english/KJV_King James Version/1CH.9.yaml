verses:
  '1':
  - type: heading
    content: Inhabitants of Jerusalem
  - type: text
    content: 'So all Israel were reckoned by genealogies; and, behold, they '
  - type: text
    content: were
  - type: text
    content: ' written in the book of the kings of Israel and Judah, '
  - type: text
    content: who
  - type: text
    content: ' were carried away to Babylon for their transgression. '
  '10':
  - type: text
    content: 'And of the priests; Jedaiah, and Jehoiarib, and Jachin, '
  '11':
  - type: text
    content: 'and Azariah the son of Hilkiah, the son of Meshullam, the son of Zadok, the son of Meraioth, the son of Ahitub, the ruler of the house of God; '
  '12':
  - type: text
    content: 'and Adaiah the son of Jeroham, the son of Pashur, the son of Malchijah, and Maasiai the son of Adiel, the son of Jahzerah, the son of Meshullam, the son of Meshillemith, the son of Immer; '
  '13':
  - type: text
    content: and their brethren, heads of the house of their fathers, a thousand and seven hundred and threescore; very able men for the work of the service of the house of God.
  '14':
  - type: text
    content: 'And of the Levites; Shemaiah the son of Hasshub, the son of Azrikam, the son of Hashabiah, of the sons of Merari; '
  '15':
  - type: text
    content: 'and Bakbakkar, Heresh, and Galal, and Mattaniah the son of Micah, the son of Zichri, the son of Asaph; '
  '16':
  - type: text
    content: and Obadiah the son of Shemaiah, the son of Galal, the son of Jeduthun, and Berechiah the son of Asa, the son of Elkanah, that dwelt in the villages of the Netophathites.
  '17':
  - type: text
    content: 'And the porters '
  - type: text
    content: were
  - type: text
    content: ', Shallum, and Akkub, and Talmon, and Ahiman, and their brethren: Shallum '
  - type: text
    content: was
  - type: text
    content: ' the chief; '
  '18':
  - type: text
    content: 'who hitherto '
  - type: text
    content: waited
  - type: text
    content: ' in the king''s gate eastward: they '
  - type: text
    content: were
  - type: text
    content: ' porters in the companies of the children of Levi. '
  '19':
  - type: text
    content: 'And Shallum the son of Kore, the son of Ebiasaph, the son of Korah, and his brethren, of the house of his father, the Korahites, '
  - type: text
    content: were
  - type: text
    content: ' over the work of the service, keepers of the gates of the tabernacle: and their fathers, '
  - type: text
    content: being
  - type: text
    content: ' over the host of the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: were
  - type: text
    content: ' keepers of the entry. '
  '2':
  - type: text
    content: 'Now the first inhabitants that '
  - type: text
    content: dwelt
  - type: text
    content: ' in their possessions in their cities '
  - type: text
    content: were
  - type: text
    content: ', the Israelites, the priests, Levites, and the Nethinims. '
  '20':
  - type: text
    content: 'And Phinehas the son of Eleazar was the ruler over them in time past, '
  - type: text
    content: and
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' with him. '
  '21':
  - type: text
    content: And
  - type: text
    content: ' Zechariah the son of Meshelemiah '
  - type: text
    content: was
  - type: text
    content: ' porter of the door of the tabernacle of the congregation. '
  '22':
  - type: text
    content: 'All these '
  - type: text
    content: which were
  - type: text
    content: ' chosen to be porters in the gates '
  - type: text
    content: were
  - type: text
    content: ' two hundred and twelve. These were reckoned by their genealogy in their villages, whom David and Samuel the seer did ordain in their set office. '
  '23':
  - type: text
    content: 'So they and their children '
  - type: text
    content: had
  - type: text
    content: ' the oversight of the gates of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: namely
  - type: text
    content: ', the house of the tabernacle, by wards. '
  '24':
  - type: text
    content: 'In four quarters were the porters, toward the east, west, north, and south. '
  '25':
  - type: text
    content: 'And their brethren, '
  - type: text
    content: which were
  - type: text
    content: ' in their villages, '
  - type: text
    content: were
  - type: text
    content: ' to come after seven days from time to time with them. '
  '26':
  - type: text
    content: 'For these Levites, the four chief porters, were in '
  - type: text
    content: their
  - type: text
    content: ' set office, and were over the chambers and treasuries of the house of God. '
  '27':
  - type: text
    content: 'And they lodged round about the house of God, because the charge '
  - type: text
    content: was
  - type: text
    content: ' upon them, and the opening thereof every morning '
  - type: text
    content: pertained
  - type: text
    content: ' to them.'
  '28':
  - type: text
    content: 'And '
  - type: text
    content: certain
  - type: text
    content: ' of them had the charge of the ministering vessels, that they should bring them in and out by tale. '
  '29':
  - type: text
    content: Some
  - type: text
    content: ' of them also '
  - type: text
    content: were
  - type: text
    content: ' appointed to oversee the vessels, and all the instruments of the sanctuary, and the fine flour, and the wine, and the oil, and the frankincense, and the spices. '
  '3':
  - type: text
    content: 'And in Jerusalem dwelt of the children of Judah, and of the children of Benjamin, and of the children of Ephraim, and Manasseh; '
  '30':
  - type: text
    content: 'And '
  - type: text
    content: some
  - type: text
    content: ' of the sons of the priests made the ointment of the spices. '
  '31':
  - type: text
    content: 'And Mattithiah, '
  - type: text
    content: one
  - type: text
    content: ' of the Levites, who '
  - type: text
    content: was
  - type: text
    content: ' the firstborn of Shallum the Korahite, had the set office over the things that were made in the pans. '
  '32':
  - type: text
    content: 'And '
  - type: text
    content: other
  - type: text
    content: ' of their brethren, of the sons of the Kohathites, '
  - type: text
    content: were
  - type: text
    content: ' over the shewbread, to prepare '
  - type: text
    content: it
  - type: text
    content: ' every sabbath. '
  '33':
  - type: text
    content: 'And these '
  - type: text
    content: are
  - type: text
    content: ' the singers, chief of the fathers of the Levites, '
  - type: text
    content: who remaining
  - type: text
    content: ' in the chambers '
  - type: text
    content: were
  - type: text
    content: ' free: for they were employed in '
  - type: text
    content: that
  - type: text
    content: ' work day and night. '
  '34':
  - type: text
    content: 'These chief fathers of the Levites '
  - type: text
    content: were
  - type: text
    content: ' chief throughout their generations; these dwelt at Jerusalem.'
  - type: heading
    content: In Gibeon
  '35':
  - type: text
    content: 'And in Gibeon dwelt the father of Gibeon, Jehiel, whose wife''s name '
  - type: text
    content: was
  - type: text
    content: ' Maachah: '
  '36':
  - type: text
    content: 'and his firstborn son Abdon, then Zur, and Kish, and Baal, and Ner, and Nadab, '
  '37':
  - type: text
    content: 'and Gedor, and Ahio, and Zechariah, and Mikloth. '
  '38':
  - type: text
    content: 'And Mikloth begat Shimeam. And they also dwelt with their brethren at Jerusalem, over against their brethren. '
  '39':
  - type: text
    content: 'And Ner begat Kish; and Kish begat Saul; and Saul begat Jonathan, and Malchi-shua, and Abinadab, and Eshbaal. '
  '4':
  - type: text
    content: 'Uthai the son of Ammihud, the son of Omri, the son of Imri, the son of Bani, of the children of Pharez the son of Judah. '
  '40':
  - type: text
    content: 'And the son of Jonathan '
  - type: text
    content: was
  - type: text
    content: ' Merib-baal: and Merib-baal begat Micah. '
  '41':
  - type: text
    content: 'And the sons of Micah '
  - type: text
    content: were
  - type: text
    content: ', Pithon, and Melech, and Tahrea, '
  - type: text
    content: and Ahaz
  - type: text
    content: '. '
  '42':
  - type: text
    content: 'And Ahaz begat Jarah; and Jarah begat Alemeth, and Azmaveth, and Zimri; and Zimri begat Moza; '
  '43':
  - type: text
    content: 'and Moza begat Binea; and Rephaiah his son, Eleasah his son, Azel his son. '
  '44':
  - type: text
    content: 'And Azel had six sons, whose names '
  - type: text
    content: are
  - type: text
    content: ' these, Azrikam, Bocheru, and Ishmael, and Sheariah, and Obadiah, and Hanan: these '
  - type: text
    content: were
  - type: text
    content: ' the sons of Azel.'
  '5':
  - type: text
    content: 'And of the Shilonites; Asaiah the firstborn, and his sons. '
  '6':
  - type: text
    content: 'And of the sons of Zerah; Jeuel, and their brethren, six hundred and ninety. '
  '7':
  - type: text
    content: 'And of the sons of Benjamin; Sallu the son of Meshullam, the son of Hodaviah, the son of Hasenuah, '
  '8':
  - type: text
    content: 'and Ibneiah the son of Jeroham, and Elah the son of Uzzi, the son of Michri, and Meshullam the son of Shephathiah, the son of Reuel, the son of Ibnijah; '
  '9':
  - type: text
    content: 'and their brethren, according to their generations, nine hundred and fifty and six. All these men '
  - type: text
    content: were
  - type: text
    content: ' chief of the fathers in the house of their fathers.'
