document_id: PSA.87,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'A Psalm '
  - type: text
    content: or
  - type: text
    content: ' Song for the sons of Korah.'
  - type: text
    content: 'His foundation '
  - type: text
    content: is
  - type: text
    content: ' in the holy mountains.'
  '2':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' loveth the gates of Zion more than all the dwellings of Jacob.'
  '3':
  - type: text
    content: Glorious things are spoken of thee,
  - type: text
    content: 'O city of God. '
  - type: text
    content: Selah.
  '4':
  - type: text
    content: 'I will make mention of Rahab and Babylon to them that know me:'
  - type: text
    content: Behold Philistia, and Tyre, with Ethiopia;
  - type: text
    content: 'This '
  - type: text
    content: man
  - type: text
    content: ' was born there.'
  '5':
  - type: text
    content: 'And of Zion it shall be said, This and that man was born in her:'
  - type: text
    content: And the highest himself shall establish her.
  '6':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' shall count, when he writeth up the people,'
  - type: text
    content: That
  - type: text
    content: ' this '
  - type: text
    content: man
  - type: text
    content: ' was born there. '
  - type: text
    content: Selah.
  '7':
  - type: text
    content: 'As well the singers as the players on instruments '
  - type: text
    content: 'shall be there:'
  - type: text
    content: 'All my springs '
  - type: text
    content: are
  - type: text
    content: ' in thee.'
