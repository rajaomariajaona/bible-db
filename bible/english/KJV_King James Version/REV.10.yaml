document_id: REV.10
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Angel and the Book
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And I saw another mighty angel come down from heaven, clothed with a cloud: and a rainbow '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' upon his head, and his face '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' as it were the sun, and his feet as pillars of fire: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and he had in his hand a little book open: and he set his right foot upon the sea, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' left '
  - type: usfm
    marker: add
    children:
    - type: text
      text: foot
  - type: text
    text: ' on the earth, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and cried with a loud voice, as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: when
  - type: text
    text: ' a lion roareth: and when he had cried, seven thunders uttered their voices. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And when the seven thunders had uttered their voices, I was about to write: and I heard a voice from heaven saying unto me, Seal up those things which the seven thunders uttered, and write them not. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the angel which I saw stand upon the sea and upon the earth lifted up his hand to heaven, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and sware by him that liveth for ever and ever, who created heaven, and the things that therein are, and the earth, and the things that therein are, and the sea, and the things which are therein, that there should be time no longer: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'but in the days of the voice of the seventh angel, when he shall begin to sound, the mystery of God should be finished, as he hath declared to his servants the prophets. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the voice which I heard from heaven spake unto me again, and said, Go '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' take the little book which is open in the hand of the angel which standeth upon the sea and upon the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And I went unto the angel, and said unto him, Give me the little book. And he said unto me, Take '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and eat it up; and it shall make thy belly bitter, but it shall be in thy mouth sweet as honey. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And I took the little book out of the angel''s hand, and ate it up; and it was in my mouth sweet as honey: and as soon as I had eaten it, my belly was bitter. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And he said unto me, Thou must prophesy again before many peoples, and nations, and tongues, and kings.
