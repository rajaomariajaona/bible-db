document_id: PSA.39,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the chief Musician, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' to Jeduthun, A Psalm of David.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: I said, I will take heed to my ways,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That I sin not with my tongue:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will keep my mouth with a bridle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: While the wicked is before me.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Remove thy stroke away from me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am consumed by the blow of thine hand.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: When thou with rebukes dost correct man for iniquity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Thou makest his beauty to consume away like a moth:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Surely every man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' vanity. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Hear my prayer, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and give ear unto my cry;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Hold not thy peace at my tears:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' a stranger with thee,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' a sojourner, as all my fathers '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: O spare me, that I may recover strength,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Before I go hence, and be no more.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'I was dumb with silence, I held my peace, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' from good;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And my sorrow was stirred.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'My heart was hot within me, while I was musing the fire burned:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Then
    - type: text
      text: ' spake I with my tongue.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', make me to know mine end, and the measure of my days, what it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: That
    - type: text
      text: ' I may know how frail I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Behold, thou hast made my days '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' an handbreadth;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And mine age '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' as nothing before thee: Verily every man at his best state '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' altogether vanity. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Surely every man walketh in a vain shew: Surely they are disquieted in vain:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He heapeth up '
    - type: usfm
      marker: add
      children:
      - type: text
        text: riches
    - type: text
      text: ', and knoweth not who shall gather them.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: And now, Lord, what wait I for?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'My hope '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in thee.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Deliver me from all my transgressions:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Make me not the reproach of the foolish.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: I was dumb, I opened not my mouth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because thou didst '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: '. '
