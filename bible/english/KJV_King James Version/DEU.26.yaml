document_id: DEU.26
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Promised Land
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And it shall be, when thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' come in unto the land which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God giveth thee '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' an inheritance, and possessest it, and dwellest therein; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'that thou shalt take of the first of all the fruit of the earth, which thou shalt bring of thy land that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God giveth thee, and shalt put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' in a basket, and shalt go unto the place which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God shall choose to place his name there. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And thou shalt go unto the priest that shall be in those days, and say unto him, I profess this day unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, that I am come unto the country which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' sware unto our fathers for to give us. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And the priest shall take the basket out of thine hand, and set it down before the altar of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And thou shalt speak and say before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, A Syrian ready to perish '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' my father, and he went down into Egypt, and sojourned there with a few, and became there a nation, great, mighty, and populous: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and the Egyptians evil entreated us, and afflicted us, and laid upon us hard bondage: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and when we cried unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of our fathers, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' heard our voice, and looked on our affliction, and our labour, and our oppression: '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' brought us forth out of Egypt with a mighty hand, and with an outstretched arm, and with great terribleness, and with signs, and with wonders: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and he hath brought us into this place, and hath given us this land, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' a land that floweth with milk and honey. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And now, behold, I have brought the firstfruits of the land, which thou, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', hast given me. And thou shalt set it before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, and worship before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and thou shalt rejoice in every good '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thing
  - type: text
    text: ' which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God hath given unto thee, and unto thine house, thou, and the Levite, and the stranger that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' among you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When thou hast made an end of tithing all the tithes of thine increase the third year, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which is
  - type: text
    text: ' the year of tithing, and hast given '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' unto the Levite, the stranger, the fatherless, and the widow, that they may eat within thy gates, and be filled; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'then thou shalt say before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, I have brought away the hallowed things out of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: mine
  - type: text
    text: ' house, and also have given them unto the Levite, and unto the stranger, to the fatherless, and to the widow, according to all thy commandments which thou hast commanded me: I have not transgressed thy commandments, neither have I forgotten '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'them:'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I have not eaten thereof in my mourning, neither have I taken away '
  - type: usfm
    marker: add
    children:
    - type: text
      text: ought
  - type: text
    text: ' thereof for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' unclean '
  - type: usfm
    marker: add
    children:
    - type: text
      text: use
  - type: text
    text: ', nor given '
  - type: usfm
    marker: add
    children:
    - type: text
      text: ought
  - type: text
    text: ' thereof for the dead: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' I have hearkened to the voice of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' my God, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' have done according to all that thou hast commanded me. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Look down from thy holy habitation, from heaven, and bless thy people Israel, and the land which thou hast given us, as thou swarest unto our fathers, a land that floweth with milk and honey.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'This day the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God hath commanded thee to do these statutes and judgments: thou shalt therefore keep and do them with all thine heart, and with all thy soul. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Thou hast avouched the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' this day to be thy God, and to walk in his ways, and to keep his statutes, and his commandments, and his judgments, and to hearken unto his voice: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath avouched thee this day to be his peculiar people, as he hath promised thee, and that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thou
  - type: text
    text: ' shouldest keep all his commandments; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and to make thee high above all nations which he hath made, in praise, and in name, and in honour; and that thou mayest be an holy people unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, as he hath spoken.'
