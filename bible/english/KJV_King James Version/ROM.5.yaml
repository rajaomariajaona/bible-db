document_id: ROM.5,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Peace with God
  - type: text
    content: 'Therefore being justified by faith, we have peace with God through our Lord Jesus Christ: '
  '10':
  - type: text
    content: 'For if, when we were enemies, we were reconciled to God by the death of his Son, much more, being reconciled, we shall be saved by his life. '
  '11':
  - type: text
    content: 'And not only '
  - type: text
    content: so
  - type: text
    content: ', but we also joy in God through our Lord Jesus Christ, by whom we have now received the atonement.'
  '12':
  - type: text
    content: 'Wherefore, as by one man sin entered into the world, and death by sin; and so death passed upon all men, for that all have sinned: '
  '13':
  - type: text
    content: '(for until the law sin was in the world: but sin is not imputed when there is no law. '
  '14':
  - type: text
    content: 'Nevertheless death reigned from Adam to Moses, even over them that had not sinned after the similitude of Adam''s transgression, who is the figure of him that was to come. '
  '15':
  - type: text
    content: 'But not as the offence, so also '
  - type: text
    content: is
  - type: text
    content: ' the free gift. For if through the offence of one many be dead, much more the grace of God, and the gift by grace, '
  - type: text
    content: which is
  - type: text
    content: ' by one man, Jesus Christ, hath abounded unto many. '
  '16':
  - type: text
    content: 'And not as '
  - type: text
    content: it was
  - type: text
    content: ' by one that sinned, '
  - type: text
    content: so is
  - type: text
    content: ' the gift: for the judgment '
  - type: text
    content: was
  - type: text
    content: ' by one to condemnation, but the free gift '
  - type: text
    content: is
  - type: text
    content: ' of many offences unto justification. '
  '17':
  - type: text
    content: For if by one man's offence death reigned by one; much more they which receive abundance of grace and of the gift of righteousness shall reign in life by one, Jesus Christ.)
  '18':
  - type: text
    content: 'Therefore as by the offence of one '
  - type: text
    content: judgment came
  - type: text
    content: ' upon all men to condemnation; even so by the righteousness of one '
  - type: text
    content: the free gift came
  - type: text
    content: ' upon all men unto justification of life. '
  '19':
  - type: text
    content: 'For as by one man''s disobedience many were made sinners, so by the obedience of one shall many be made righteous. '
  '2':
  - type: text
    content: 'by whom also we have access by faith into this grace wherein we stand, and rejoice in hope of the glory of God. '
  '20':
  - type: text
    content: 'Moreover the law entered, that the offence might abound. But where sin abounded, grace did much more abound: '
  '21':
  - type: text
    content: that as sin hath reigned unto death, even so might grace reign through righteousness unto eternal life by Jesus Christ our Lord.
  '3':
  - type: text
    content: 'And not only '
  - type: text
    content: so
  - type: text
    content: ', but we glory in tribulations also: knowing that tribulation worketh patience; '
  '4':
  - type: text
    content: 'and patience, experience; and experience, hope: '
  '5':
  - type: text
    content: 'and hope maketh not ashamed; because the love of God is shed abroad in our hearts by the Holy Ghost which is given unto us. '
  '6':
  - type: text
    content: 'For when we were yet without strength, in due time Christ died for the ungodly. '
  '7':
  - type: text
    content: 'For scarcely for a righteous man will one die: yet peradventure for a good man some would even dare to die. '
  '8':
  - type: text
    content: 'But God commendeth his love toward us, in that, while we were yet sinners, Christ died for us. '
  '9':
  - type: text
    content: 'Much more then, being now justified by his blood, we shall be saved from wrath through him. '
