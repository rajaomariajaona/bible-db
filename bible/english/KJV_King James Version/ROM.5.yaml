document_id: ROM.5,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Peace with God
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Therefore being justified by faith, we have peace with God through our Lord Jesus Christ: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For if, when we were enemies, we were reconciled to God by the death of his Son, much more, being reconciled, we shall be saved by his life. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And not only '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ', but we also joy in God through our Lord Jesus Christ, by whom we have now received the atonement.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Wherefore, as by one man sin entered into the world, and death by sin; and so death passed upon all men, for that all have sinned: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '(for until the law sin was in the world: but sin is not imputed when there is no law. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Nevertheless death reigned from Adam to Moses, even over them that had not sinned after the similitude of Adam''s transgression, who is the figure of him that was to come. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But not as the offence, so also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the free gift. For if through the offence of one many be dead, much more the grace of God, and the gift by grace, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which is
    - type: text
      text: ' by one man, Jesus Christ, hath abounded unto many. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And not as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' by one that sinned, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so is
    - type: text
      text: ' the gift: for the judgment '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' by one to condemnation, but the free gift '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' of many offences unto justification. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: For if by one man's offence death reigned by one; much more they which receive abundance of grace and of the gift of righteousness shall reign in life by one, Jesus Christ.)
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Therefore as by the offence of one '
    - type: usfm
      marker: add
      children:
      - type: text
        text: judgment came
    - type: text
      text: ' upon all men to condemnation; even so by the righteousness of one '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the free gift came
    - type: text
      text: ' upon all men unto justification of life. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'For as by one man''s disobedience many were made sinners, so by the obedience of one shall many be made righteous. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'by whom also we have access by faith into this grace wherein we stand, and rejoice in hope of the glory of God. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Moreover the law entered, that the offence might abound. But where sin abounded, grace did much more abound: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: that as sin hath reigned unto death, even so might grace reign through righteousness unto eternal life by Jesus Christ our Lord.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And not only '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ', but we glory in tribulations also: knowing that tribulation worketh patience; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'and patience, experience; and experience, hope: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'and hope maketh not ashamed; because the love of God is shed abroad in our hearts by the Holy Ghost which is given unto us. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For when we were yet without strength, in due time Christ died for the ungodly. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For scarcely for a righteous man will one die: yet peradventure for a good man some would even dare to die. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But God commendeth his love toward us, in that, while we were yet sinners, Christ died for us. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Much more then, being now justified by his blood, we shall be saved from wrath through him. '
