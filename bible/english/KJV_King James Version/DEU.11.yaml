  - type: text
    content: ' hath destroyed them unto this day; '
  '5':
  - type: text
    content: 'and what he did unto you in the wilderness, until ye came into this place; '
  '6':
  - type: text
    content: 'and what he did unto Dathan and Abiram, the sons of Eliab, the son of Reuben: how the earth opened her mouth, and swallowed them up, and their households, and their tents, and all the substance that '
  - type: text
    content: was
  - type: text
    content: ' in their possession, in the midst of all Israel: '
  '7':
  - type: text
    content: 'but your eyes have seen all the great acts of the '
  - type: text
