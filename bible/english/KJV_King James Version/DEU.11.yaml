  - type: text
    content: 'And it shall come to pass, when the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God hath brought thee in unto the land whither thou goest to possess it, that thou shalt put the blessing upon mount Gerizim, and the curse upon mount Ebal. '
  '3':
  - type: text
    content: 'and his miracles, and his acts, which he did in the midst of Egypt unto Pharaoh the king of Egypt, and unto all his land; '
  '30':
  - type: text
    content: Are
  - type: text
    content: ' they not on the other side Jordan, by the way where the sun goeth down, in the land of the Canaanites, which dwell in the champaign over against Gilgal, beside the plains of Moreh? '
  '31':
  - type: text
    content: 'For ye shall pass over Jordan to go in to possess the land which the '
  - type: text
    content: LORD
  - type: text
    content: ' your God giveth you, and ye shall possess it, and dwell therein. '
  '32':
  - type: text
    content: And ye shall observe to do all the statutes and judgments which I set before you this day.
  '4':
  - type: text
    content: 'and what he did unto the army of Egypt, unto their horses, and to their chariots; how he made the water of the Red sea to overflow them as they pursued after you, and '
  - type: text
