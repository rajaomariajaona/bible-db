document_id: DEU.11
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Therefore thou shalt love the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, and keep his charge, and his statutes, and his judgments, and his commandments, alway. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And know ye this day: for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I speak
  - type: text
    text: ' not with your children which have not known, and which have not seen the chastisement of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God, his greatness, his mighty hand, and his stretched out arm, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and his miracles, and his acts, which he did in the midst of Egypt unto Pharaoh the king of Egypt, and unto all his land; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and what he did unto the army of Egypt, unto their horses, and to their chariots; how he made the water of the Red sea to overflow them as they pursued after you, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: how
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath destroyed them unto this day; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and what he did unto you in the wilderness, until ye came into this place; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and what he did unto Dathan and Abiram, the sons of Eliab, the son of Reuben: how the earth opened her mouth, and swallowed them up, and their households, and their tents, and all the substance that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in their possession, in the midst of all Israel: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'but your eyes have seen all the great acts of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' which he did.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Therefore shall ye keep all the commandments which I command you this day, that ye may be strong, and go in and possess the land, whither ye go to possess it; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and that ye may prolong '
  - type: usfm
    marker: add
    children:
    - type: text
      text: your
  - type: text
    text: ' days in the land, which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' sware unto your fathers to give unto them and to their seed, a land that floweth with milk and honey. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For the land, whither thou goest in to possess it, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not as the land of Egypt, from whence ye came out, where thou sowedst thy seed, and wateredst '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' with thy foot, as a garden of herbs: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'but the land, whither ye go to possess it, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a land of hills and valleys, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' drinketh water of the rain of heaven: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'a land which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God careth for: the eyes of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' always upon it, from the beginning of the year even unto the end of the year.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And it shall come to pass, if ye shall hearken diligently unto my commandments which I command you this day, to love the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God, and to serve him with all your heart and with all your soul, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'that I will give '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: ' the rain of your land in his due season, the first rain and the latter rain, that thou mayest gather in thy corn, and thy wine, and thine oil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And I will send grass in thy fields for thy cattle, that thou mayest eat and be full. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Take heed to yourselves, that your heart be not deceived, and ye turn aside, and serve other gods, and worship them; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s wrath be kindled against you, and he shut up the heaven, that there be no rain, and that the land yield not her fruit; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: lest
  - type: text
    text: ' ye perish quickly from off the good land which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' giveth you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Therefore shall ye lay up these my words in your heart and in your soul, and bind them for a sign upon your hand, that they may be as frontlets between your eyes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And ye shall teach them your children, speaking of them when thou sittest in thine house, and when thou walkest by the way, when thou liest down, and when thou risest up. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And thou shalt write them upon the door posts of thine house, and upon thy gates: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'that your days may be multiplied, and the days of your children, in the land which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' sware unto your fathers to give them, as the days of heaven upon the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'For if ye shall diligently keep all these commandments which I command you, to do them, to love the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God, to walk in all his ways, and to cleave unto him; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'then will the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' drive out all these nations from before you, and ye shall possess greater nations and mightier than yourselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Every place whereon the soles of your feet shall tread shall be your''s: from the wilderness and Lebanon, from the river, the river Euphrates, even unto the uttermost sea shall your coast be. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'There shall no man be able to stand before you: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God shall lay the fear of you and the dread of you upon all the land that ye shall tread upon, as he hath said unto you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Behold, I set before you this day a blessing and a curse; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'a blessing, if ye obey the commandments of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God, which I command you this day: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and a curse, if ye will not obey the commandments of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God, but turn aside out of the way which I command you this day, to go after other gods, which ye have not known. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And it shall come to pass, when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God hath brought thee in unto the land whither thou goest to possess it, that thou shalt put the blessing upon mount Gerizim, and the curse upon mount Ebal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Are
  - type: text
    text: ' they not on the other side Jordan, by the way where the sun goeth down, in the land of the Canaanites, which dwell in the champaign over against Gilgal, beside the plains of Moreh? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'For ye shall pass over Jordan to go in to possess the land which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God giveth you, and ye shall possess it, and dwell therein. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: And ye shall observe to do all the statutes and judgments which I set before you this day.
