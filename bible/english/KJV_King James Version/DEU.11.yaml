  - type: text
    content: LORD
  - type: text
    content: ' giveth you.'
  '18':
  - type: text
    content: 'Therefore shall ye lay up these my words in your heart and in your soul, and bind them for a sign upon your hand, that they may be as frontlets between your eyes. '
  '19':
  - type: text
    content: 'And ye shall teach them your children, speaking of them when thou sittest in thine house, and when thou walkest by the way, when thou liest down, and when thou risest up. '
  '2':
  - type: text
    content: 'And know ye this day: for '
  - type: text
    content: I speak
  - type: text
    content: ' not with your children which have not known, and which have not seen the chastisement of the '
  - type: text
    content: LORD
  - type: text
    content: ' your God, his greatness, his mighty hand, and his stretched out arm, '
  '20':
  - type: text
    content: 'And thou shalt write them upon the door posts of thine house, and upon thy gates: '
  '21':
  - type: text
    content: 'that your days may be multiplied, and the days of your children, in the land which the '
  - type: text
    content: LORD
  - type: text
    content: ' sware unto your fathers to give them, as the days of heaven upon the earth. '
  '22':
  - type: text
    content: 'For if ye shall diligently keep all these commandments which I command you, to do them, to love the '
  - type: text
    content: LORD
  - type: text
    content: ' your God, to walk in all his ways, and to cleave unto him; '
  '23':
  - type: text
    content: 'then will the '
  - type: text
    content: LORD
  - type: text
    content: ' drive out all these nations from before you, and ye shall possess greater nations and mightier than yourselves. '
  '24':
  - type: text
    content: 'Every place whereon the soles of your feet shall tread shall be your''s: from the wilderness and Lebanon, from the river, the river Euphrates, even unto the uttermost sea shall your coast be. '
  '25':
  - type: text
    content: 'There shall no man be able to stand before you: '
  - type: text
    content: for
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' your God shall lay the fear of you and the dread of you upon all the land that ye shall tread upon, as he hath said unto you.'
  '26':
  - type: text
    content: 'Behold, I set before you this day a blessing and a curse; '
  '27':
  - type: text
    content: 'a blessing, if ye obey the commandments of the '
  - type: text
    content: LORD
  - type: text
    content: ' your God, which I command you this day: '
  '28':
  - type: text
