document_id: HOS.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' that came unto Hosea, the son of Beeri, in the days of Uzziah, Jotham, Ahaz, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' Hezekiah, kings of Judah, and in the days of Jeroboam the son of Joash, king of Israel.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet the number of the children of Israel shall be as the sand of the sea, which cannot be measured nor numbered; and it shall come to pass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' in the place where it was said unto them, Ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' not my people, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there
    - type: text
      text: ' it shall be said unto them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Ye are
    - type: text
      text: ' the sons of the living God. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then shall the children of Judah and the children of Israel be gathered together, and appoint themselves one head, and they shall come up out of the land: for great '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' the day of Jezreel.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The beginning of the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' by Hosea. And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said to Hosea, Go, take unto thee a wife of whoredoms and children of whoredoms: for the land hath committed great whoredom, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: departing
    - type: text
      text: ' from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he went and took Gomer the daughter of Diblaim; which conceived, and bare him a son. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto him, Call his name Jezreel; for yet a little '
    - type: usfm
      marker: add
      children:
      - type: text
        text: while
    - type: text
      text: ', and I will avenge the blood of Jezreel upon the house of Jehu, and will cause to cease the kingdom of the house of Israel. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass at that day, that I will break the bow of Israel in the valley of Jezreel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And she conceived again, and bare a daughter. And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: God
    - type: text
      text: ' said unto him, Call her name Lo-ruhamah: for I will no more have mercy upon the house of Israel; but I will utterly take them away. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I will have mercy upon the house of Judah, and will save them by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' their God, and will not save them by bow, nor by sword, nor by battle, by horses, nor by horsemen. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when she had weaned Lo-ruhamah, she conceived, and bare a son. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said '
    - type: usfm
      marker: add
      children:
      - type: text
        text: God
    - type: text
      text: ', Call his name Lo-ammi: for ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' not my people, and I will not be your '
    - type: usfm
      marker: add
      children:
      - type: text
        text: God
    - type: text
      text: .
