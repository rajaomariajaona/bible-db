document_id: 2SA.16
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And when David was a little past the top '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of the hill
  - type: text
    text: ', behold, Ziba the servant of Mephibosheth met him, with a couple of asses saddled, and upon them two hundred '
  - type: usfm
    marker: add
    children:
    - type: text
      text: loaves
  - type: text
    text: ' of bread, and an hundred bunches of raisins, and an hundred of summer fruits, and a bottle of wine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the king said unto Ziba, What meanest thou by these? And Ziba said, The asses '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' for the king''s household to ride on; and the bread and summer fruit for the young men to eat; and the wine, that such as be faint in the wilderness may drink. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And the king said, And where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy master''s son? And Ziba said unto the king, Behold, he abideth at Jerusalem: for he said, To day shall the house of Israel restore me the kingdom of my father. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then said the king to Ziba, Behold, thine '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' all that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: pertained
  - type: text
    text: ' unto Mephibosheth. And Ziba said, I humbly beseech thee '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' I may find grace in thy sight, my lord, O king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And when king David came to Bahurim, behold, thence came out a man of the family of the house of Saul, whose name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Shimei, the son of Gera: he came forth, and cursed still as he came. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he cast stones at David, and at all the servants of king David: and all the people and all the mighty men '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' on his right hand and on his left. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And thus said Shimei when he cursed, Come out, come out, thou bloody man, and thou man of Belial: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath returned upon thee all the blood of the house of Saul, in whose stead thou hast reigned; and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath delivered the kingdom into the hand of Absalom thy son: and, behold, thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art taken
  - type: text
    text: ' in thy mischief, because thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' a bloody man.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then said Abishai the son of Zeruiah unto the king, Why should this dead dog curse my lord the king? let me go over, I pray thee, and take off his head. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the king said, What have I to do with you, ye sons of Zeruiah? so let him curse, because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath said unto him, Curse David. Who shall then say, Wherefore hast thou done so? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And David said to Abishai, and to all his servants, Behold, my son, which came forth of my bowels, seeketh my life: how much more now '
  - type: usfm
    marker: add
    children:
    - type: text
      text: may this
  - type: text
    text: ' Benjamite '
  - type: usfm
    marker: add
    children:
    - type: text
      text: do it?
  - type: text
    text: ' let him alone, and let him curse; for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath bidden him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'It may be that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will look on mine affliction, and that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will requite me good for his cursing this day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And as David and his men went by the way, Shimei went along on the hill''s side over against him, and cursed as he went, and threw stones at him, and cast dust. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And the king, and all the people that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with him, came weary, and refreshed themselves there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Absalom, and all the people the men of Israel, came to Jerusalem, and Ahithophel with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And it came to pass, when Hushai the Archite, David''s friend, was come unto Absalom, that Hushai said unto Absalom, God save the king, God save the king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And Absalom said to Hushai, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' this thy kindness to thy friend? why wentest thou not with thy friend? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And Hushai said unto Absalom, Nay; but whom the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and this people, and all the men of Israel, choose, his will I be, and with him will I abide. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And again, whom should I serve? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: should I
  - type: text
    text: ' not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: serve
  - type: text
    text: ' in the presence of his son? as I have served in thy father''s presence, so will I be in thy presence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then said Absalom to Ahithophel, Give counsel among you what we shall do. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And Ahithophel said unto Absalom, Go in unto thy father''s concubines, which he hath left to keep the house; and all Israel shall hear that thou art abhorred of thy father: then shall the hands of all that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' with thee be strong. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So they spread Absalom a tent upon the top of the house; and Absalom went in unto his father''s concubines in the sight of all Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And the counsel of Ahithophel, which he counselled in those days, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' as if a man had enquired at the oracle of God: so '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' all the counsel of Ahithophel both with David and with Absalom.'
