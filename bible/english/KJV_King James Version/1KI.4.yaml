  '2':
  - type: text
    content: 'And these '
  - type: text
    content: were
  - type: text
    content: ' the princes which he had; Azariah the son of Zadok the priest, '
  '20':
  - type: text
    content: 'Judah and Israel '
  - type: text
    content: were
  - type: text
    content: ' many, as the sand which '
  - type: text
    content: is
  - type: text
    content: ' by the sea in multitude, eating and drinking, and making merry. '
  '21':
  - type: text
    content: 'And Solomon reigned over all kingdoms from the river unto the land of the Philistines, and unto the border of Egypt: they brought presents, and served Solomon all the days of his life. '
  '22':
  - type: text
    content: 'And Solomon''s provision for one day was thirty measures of fine flour, and threescore measures of meal, '
  '23':
  - type: text
    content: 'ten fat oxen, and twenty oxen out of the pastures, and an hundred sheep, beside harts, and roebucks, and fallow deer, and fatted fowl. '
  '24':
  - type: text
    content: 'For he had dominion over all '
  - type: text
    content: the region
  - type: text
    content: ' on this side the river, from Tiphsah even to Azzah, over all the kings on this side the river: and he had peace on all sides round about him. '
  '25':
  - type: text
    content: 'And Judah and Israel dwelt safely, every man under his vine and under his fig tree, from Dan even to Beer-sheba, all the days of Solomon. '
  '26':
  - type: text
    content: 'And Solomon had forty thousand stalls of horses for his chariots, and twelve thousand horsemen. '
  '27':
  - type: text
    content: 'And those officers provided victual for king Solomon, and for all that came unto king Solomon''s table, every man in his month: they lacked nothing. '
  '28':
  - type: text
    content: 'Barley also and straw for the horses and dromedaries brought they unto the place where '
  - type: text
    content: the officers
  - type: text
    content: ' were, every man according to his charge.'
  '29':
  - type: text
    content: 'And God gave Solomon wisdom and understanding exceeding much, and largeness of heart, even as the sand that '
  - type: text
    content: is
  - type: text
    content: ' on the sea shore. '
  '3':
  - type: text
    content: 'Elihoreph and Ahiah, the sons of Shisha, scribes; Jehoshaphat the son of Ahilud, the recorder. '
  '30':
  - type: text
    content: 'And Solomon''s wisdom excelled the wisdom of all the children of the east country, and all the wisdom of Egypt. '
  '31':
  - type: text
    content: 'For he was wiser than all men; than Ethan the Ezrahite, and Heman, and Chalcol, and Darda, the sons of Mahol: and his fame was in all nations round about. '
  '32':
  - type: text
    content: 'And he spake three thousand proverbs: and his songs were a thousand and five. '
  '33':
  - type: text
    content: 'And he spake of trees, from the cedar tree that '
  - type: text
    content: is
  - type: text
    content: ' in Lebanon even unto the hyssop that springeth out of the wall: he spake also of beasts, and of fowl, and of creeping things, and of fishes. '
  '34':
  - type: text
    content: And there came of all people to hear the wisdom of Solomon, from all kings of the earth, which had heard of his wisdom.
  '4':
  - type: text
    content: 'And Benaiah the son of Jehoiada '
  - type: text
    content: was
  - type: text
    content: ' over the host: and Zadok and Abiathar '
  - type: text
    content: were
  - type: text
    content: ' the priests: '
  '5':
  - type: text
    content: 'and Azariah the son of Nathan '
  - type: text
    content: was
  - type: text
    content: ' over the officers: and Zabud the son of Nathan '
  - type: text
    content: was
  - type: text
    content: ' principal officer, '
  - type: text
    content: and
  - type: text
    content: ' the king''s friend: '
  '6':
  - type: text
    content: 'and Ahishar '
  - type: text
    content: was
  - type: text
    content: ' over the household: and Adoniram the son of Abda '
  - type: text
    content: was
  - type: text
    content: ' over the tribute.'
  '7':
  - type: text
    content: 'And Solomon had twelve officers over all Israel, which provided victuals for the king and his household: each man his month in a year made provision. '
  '8':
  - type: text
    content: 'And these '
  - type: text
    content: are
  - type: text
    content: ' their names: The son of Hur, in mount Ephraim: '
  '9':
  - type: text
    content: 'the son of Dekar, in Makaz, and in Shaalbim, and Beth-shemesh, and Elon-beth-hanan: '
