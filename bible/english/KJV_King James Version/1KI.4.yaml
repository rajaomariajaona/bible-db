document_id: 1KI.4
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: His Princes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So king Solomon was king over all Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' the princes which he had; Azariah the son of Zadok the priest, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Elihoreph and Ahiah, the sons of Shisha, scribes; Jehoshaphat the son of Ahilud, the recorder. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Benaiah the son of Jehoiada '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' over the host: and Zadok and Abiathar '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' the priests: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and Azariah the son of Nathan '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' over the officers: and Zabud the son of Nathan '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' principal officer, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the king''s friend: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and Ahishar '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' over the household: and Adoniram the son of Abda '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' over the tribute.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And Solomon had twelve officers over all Israel, which provided victuals for the king and his household: each man his month in a year made provision. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' their names: The son of Hur, in mount Ephraim: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'the son of Dekar, in Makaz, and in Shaalbim, and Beth-shemesh, and Elon-beth-hanan: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'the son of Hesed, in Aruboth; to him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: pertained
  - type: text
    text: ' Sochoh, and all the land of Hepher: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'the son of Abinadab, in all the region of Dor; which had Taphath the daughter of Solomon to wife: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Baana the son of Ahilud; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to him pertained
  - type: text
    text: ' Taanach and Megiddo, and all Beth-shean, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' by Zartanah beneath Jezreel, from Beth-shean to Abel-meholah, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' unto '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the place that is
  - type: text
    text: ' beyond Jokneam: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'the son of Geber, in Ramoth-gilead; to him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: pertained
  - type: text
    text: ' the towns of Jair the son of Manasseh, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' in Gilead; to him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: also pertained
  - type: text
    text: ' the region of Argob, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in Bashan, threescore great cities with walls and brasen bars: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ahinadab the son of Iddo '
  - type: usfm
    marker: add
    children:
    - type: text
      text: had
  - type: text
    text: ' Mahanaim: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ahimaaz '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in Naphtali; he also took Basmath the daughter of Solomon to wife: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Baanah the son of Hushai '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in Asher and in Aloth: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jehoshaphat the son of Paruah, in Issachar: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Shimei the son of Elah, in Benjamin: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Geber the son of Uri '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in the country of Gilead, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' the country of Sihon king of the Amorites, and of Og king of Bashan; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he was
  - type: text
    text: ' the only officer which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Judah and Israel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' many, as the sand which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' by the sea in multitude, eating and drinking, and making merry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And Solomon reigned over all kingdoms from the river unto the land of the Philistines, and unto the border of Egypt: they brought presents, and served Solomon all the days of his life. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And Solomon''s provision for one day was thirty measures of fine flour, and threescore measures of meal, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ten fat oxen, and twenty oxen out of the pastures, and an hundred sheep, beside harts, and roebucks, and fallow deer, and fatted fowl. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'For he had dominion over all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the region
  - type: text
    text: ' on this side the river, from Tiphsah even to Azzah, over all the kings on this side the river: and he had peace on all sides round about him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And Judah and Israel dwelt safely, every man under his vine and under his fig tree, from Dan even to Beer-sheba, all the days of Solomon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And Solomon had forty thousand stalls of horses for his chariots, and twelve thousand horsemen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And those officers provided victual for king Solomon, and for all that came unto king Solomon''s table, every man in his month: they lacked nothing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Barley also and straw for the horses and dromedaries brought they unto the place where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the officers
  - type: text
    text: ' were, every man according to his charge.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And God gave Solomon wisdom and understanding exceeding much, and largeness of heart, even as the sand that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' on the sea shore. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And Solomon''s wisdom excelled the wisdom of all the children of the east country, and all the wisdom of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'For he was wiser than all men; than Ethan the Ezrahite, and Heman, and Chalcol, and Darda, the sons of Mahol: and his fame was in all nations round about. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And he spake three thousand proverbs: and his songs were a thousand and five. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And he spake of trees, from the cedar tree that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in Lebanon even unto the hyssop that springeth out of the wall: he spake also of beasts, and of fowl, and of creeping things, and of fishes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: And there came of all people to hear the wisdom of Solomon, from all kings of the earth, which had heard of his wisdom.
