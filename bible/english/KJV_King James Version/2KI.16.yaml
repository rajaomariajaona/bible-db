    content: Ahaz
  - type: text
    content: 'In the seventeenth year of Pekah the son of Remaliah Ahaz the son of Jotham king of Judah began to reign. '
  '10':
  - type: text
    content: 'And king Ahaz went to Damascus to meet Tiglath-pileser king of Assyria, and saw an altar that '
  - type: text
    content: was
  - type: text
    content: ' at Damascus: and king Ahaz sent to Urijah the priest the fashion of the altar, and the pattern of it, according to all the workmanship thereof. '
  '11':
  - type: text
    content: 'And Urijah the priest built an altar according to all that king Ahaz had sent from Damascus: so Urijah the priest made '
  - type: text
    content: it
  - type: text
    content: ' against king Ahaz came from Damascus. '
  '12':
  - type: text
    content: 'And when the king was come from Damascus, the king saw the altar: and the king approached to the altar, and offered thereon. '
  '13':
  - type: text
    content: 'And he burnt his burnt offering and his meat offering, and poured his drink offering, and sprinkled the blood of his peace offerings, upon the altar. '
  '14':
  - type: text
    content: 'And he brought also the brasen altar, which '
  - type: text
    content: was
  - type: text
    content: ' before the '
  - type: text
    content: LORD
  - type: text
    content: ', from the forefront of the house, from between the altar and the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and put it on the north side of the altar. '
  '15':
  - type: text
    content: 'And king Ahaz commanded Urijah the priest, saying, Upon the great altar burn the morning burnt offering, and the evening meat offering, and the king''s burnt sacrifice, and his meat offering, with the burnt offering of all the people of the land, and their meat offering, and their drink offerings; and sprinkle upon it all the blood of the burnt offering, and all the blood of the sacrifice: and the brasen altar shall be for me to enquire '
  - type: text
    content: by
  - type: text
    content: '. '
  '16':
  - type: text
    content: Thus did Urijah the priest, according to all that king Ahaz commanded.
  '17':
  - type: text
    content: 'And king Ahaz cut off the borders of the bases, and removed the laver from off them; and took down the sea from off the brasen oxen that '
  - type: text
    content: were
  - type: text
    content: ' under it, and put it upon a pavement of stones. '
  '18':
  - type: text
    content: 'And the covert for the sabbath that they had built in the house, and the king''s entry without, turned he from the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' for the king of Assyria. '
  '19':
  - type: text
    content: 'Now the rest of the acts of Ahaz which he did, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Judah? '
  '2':
  - type: text
    content: 'Twenty years old '
  - type: text
    content: was
  - type: text
    content: ' Ahaz when he began to reign, and reigned sixteen years in Jerusalem, and did not '
  - type: text
    content: that which was
  - type: text
    content: ' right in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ' his God, like David his father. '
  '20':
  - type: text
    content: 'And Ahaz slept with his fathers, and was buried with his fathers in the city of David: and Hezekiah his son reigned in his stead.'
  '3':
  - type: text
    content: 'But he walked in the way of the kings of Israel, yea, and made his son to pass through the fire, according to the abominations of the heathen, whom the '
  - type: text
    content: LORD
  - type: text
    content: ' cast out from before the children of Israel. '
  '4':
  - type: text
    content: And he sacrificed and burnt incense in the high places, and on the hills, and under every green tree.
  '5':
  - type: text
    content: 'Then Rezin king of Syria and Pekah son of Remaliah king of Israel came up to Jerusalem to war: and they besieged Ahaz, but could not overcome '
  - type: text
    content: him
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'At that time Rezin king of Syria recovered Elath to Syria, and drave the Jews from Elath: and the Syrians came to Elath, and dwelt there unto this day.'
  '7':
  - type: text
    content: 'So Ahaz sent messengers to Tiglath-pileser king of Assyria, saying, I '
  - type: text
    content: am
  - type: text
    content: ' thy servant and thy son: come up, and save me out of the hand of the king of Syria, and out of the hand of the king of Israel, which rise up against me. '
  '8':
  - type: text
    content: 'And Ahaz took the silver and gold that was found in the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and in the treasures of the king''s house, and sent '
  - type: text
    content: it for
  - type: text
    content: ' a present to the king of Assyria. '
  '9':
  - type: text
    content: 'And the king of Assyria hearkened unto him: for the king of Assyria went up against Damascus, and took it, and carried '
  - type: text
    content: the people of
  - type: text
    content: ' it captive to Kir, and slew Rezin.'
