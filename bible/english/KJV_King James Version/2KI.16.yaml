document_id: 2KI.16,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ahaz
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the seventeenth year of Pekah the son of Remaliah Ahaz the son of Jotham king of Judah began to reign. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And king Ahaz went to Damascus to meet Tiglath-pileser king of Assyria, and saw an altar that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' at Damascus: and king Ahaz sent to Urijah the priest the fashion of the altar, and the pattern of it, according to all the workmanship thereof. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Urijah the priest built an altar according to all that king Ahaz had sent from Damascus: so Urijah the priest made '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' against king Ahaz came from Damascus. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the king was come from Damascus, the king saw the altar: and the king approached to the altar, and offered thereon. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he burnt his burnt offering and his meat offering, and poured his drink offering, and sprinkled the blood of his peace offerings, upon the altar. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he brought also the brasen altar, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', from the forefront of the house, from between the altar and the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and put it on the north side of the altar. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And king Ahaz commanded Urijah the priest, saying, Upon the great altar burn the morning burnt offering, and the evening meat offering, and the king''s burnt sacrifice, and his meat offering, with the burnt offering of all the people of the land, and their meat offering, and their drink offerings; and sprinkle upon it all the blood of the burnt offering, and all the blood of the sacrifice: and the brasen altar shall be for me to enquire '
    - type: usfm
      marker: add
      children:
      - type: text
        text: by
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thus did Urijah the priest, according to all that king Ahaz commanded.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And king Ahaz cut off the borders of the bases, and removed the laver from off them; and took down the sea from off the brasen oxen that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' under it, and put it upon a pavement of stones. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the covert for the sabbath that they had built in the house, and the king''s entry without, turned he from the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' for the king of Assyria. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the acts of Ahaz which he did, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' they not written in the book of the chronicles of the kings of Judah? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Twenty years old '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Ahaz when he began to reign, and reigned sixteen years in Jerusalem, and did not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which was
    - type: text
      text: ' right in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' his God, like David his father. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Ahaz slept with his fathers, and was buried with his fathers in the city of David: and Hezekiah his son reigned in his stead.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he walked in the way of the kings of Israel, yea, and made his son to pass through the fire, according to the abominations of the heathen, whom the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' cast out from before the children of Israel. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he sacrificed and burnt incense in the high places, and on the hills, and under every green tree.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Rezin king of Syria and Pekah son of Remaliah king of Israel came up to Jerusalem to war: and they besieged Ahaz, but could not overcome '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time Rezin king of Syria recovered Elath to Syria, and drave the Jews from Elath: and the Syrians came to Elath, and dwelt there unto this day.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Ahaz sent messengers to Tiglath-pileser king of Assyria, saying, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' thy servant and thy son: come up, and save me out of the hand of the king of Syria, and out of the hand of the king of Israel, which rise up against me. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Ahaz took the silver and gold that was found in the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and in the treasures of the king''s house, and sent '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it for
    - type: text
      text: ' a present to the king of Assyria. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king of Assyria hearkened unto him: for the king of Assyria went up against Damascus, and took it, and carried '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the people of
    - type: text
      text: ' it captive to Kir, and slew Rezin.'
