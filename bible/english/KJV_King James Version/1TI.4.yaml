document_id: 1TI.4,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Good Minister
  - type: text
    content: 'Now the Spirit speaketh expressly, that in the latter times some shall depart from the faith, giving heed to seducing spirits, and doctrines of devils; '
  '10':
  - type: text
    content: For therefore we both labour and suffer reproach, because we trust in the living God, who is the Saviour of all men, specially of those that believe.
  '11':
  - type: text
    content: 'These things command and teach. '
  '12':
  - type: text
    content: 'Let no man despise thy youth; but be thou an example of the believers, in word, in conversation, in charity, in spirit, in faith, in purity. '
  '13':
  - type: text
    content: 'Till I come, give attendance to reading, to exhortation, to doctrine. '
  '14':
  - type: text
    content: 'Neglect not the gift that is in thee, which was given thee by prophecy, with the laying on of the hands of the presbytery. '
  '15':
  - type: text
    content: 'Meditate upon these things; give thyself wholly to them; that thy profiting may appear to all. '
  '16':
  - type: text
    content: 'Take heed unto thyself, and unto the doctrine; continue in them: for in doing this thou shalt both save thyself, and them that hear thee.'
  '2':
  - type: text
    content: 'speaking lies in hypocrisy; having their conscience seared with a hot iron; '
  '3':
  - type: text
    content: 'forbidding to marry, '
  - type: text
    content: and commanding
  - type: text
    content: ' to abstain from meats, which God hath created to be received with thanksgiving of them which believe and know the truth. '
  '4':
  - type: text
    content: 'For every creature of God '
  - type: text
    content: is
  - type: text
    content: ' good, and nothing to be refused, if it be received with thanksgiving: '
  '5':
  - type: text
    content: for it is sanctified by the word of God and prayer.
  '6':
  - type: text
    content: 'If thou put the brethren in remembrance of these things, thou shalt be a good minister of Jesus Christ, nourished up in the words of faith and of good doctrine, whereunto thou hast attained. '
  '7':
  - type: text
    content: 'But refuse profane and old wives'' fables, and exercise thyself '
  - type: text
    content: rather
  - type: text
    content: ' unto godliness. '
  '8':
  - type: text
    content: 'For bodily exercise profiteth little: but godliness is profitable unto all things, having promise of the life that now is, and of that which is to come. '
  '9':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' a faithful saying and worthy of all acceptation. '
