    content: 'If any man speak, '
  - type: text
    content: let him speak
  - type: text
    content: ' as the oracles of God; if any man minister, '
  - type: text
    content: let him do it
  - type: text
    content: ' as of the ability which God giveth: that God in all things may be glorified through Jesus Christ to whom be praise and dominion for ever and ever. Amen.'
