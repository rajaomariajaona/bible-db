document_id: 1PE.4,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Forasmuch then as Christ hath suffered for us in the flesh, arm yourselves likewise with the same mind: for he that hath suffered in the flesh hath ceased from sin; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As every man hath received the gift, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even so
    - type: text
      text: ' minister the same one to another, as good stewards of the manifold grace of God. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If any man speak, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: let him speak
    - type: text
      text: ' as the oracles of God; if any man minister, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: let him do it
    - type: text
      text: ' as of the ability which God giveth: that God in all things may be glorified through Jesus Christ to whom be praise and dominion for ever and ever. Amen.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beloved, think it not strange concerning the fiery trial which is to try you, as though some strange thing happened unto you: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but rejoice, inasmuch as ye are partakers of Christ''s sufferings; that, when his glory shall be revealed, ye may be glad also with exceeding joy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If ye be reproached for the name of Christ, happy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are ye
    - type: text
      text: '; for the spirit of glory and of God resteth upon you: on their part he is evil spoken of, but on your part he is glorified. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But let none of you suffer as a murderer, or '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' a thief, or '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' an evildoer, or as a busybody in other men''s matters. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any man suffer
    - type: text
      text: ' as a Christian, let him not be ashamed; but let him glorify God on this behalf. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the time '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is come
    - type: text
      text: ' that judgment must begin at the house of God: and if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' first '
    - type: usfm
      marker: add
      children:
      - type: text
        text: begin
    - type: text
      text: ' at us, what shall the end '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' of them that obey not the gospel of God? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if the righteous scarcely be saved, where shall the ungodly and the sinner appear? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wherefore let them that suffer according to the will of God commit the keeping of their souls '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to him
    - type: text
      text: ' in well doing, as unto a faithful Creator.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that he no longer should live the rest of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' time in the flesh to the lusts of men, but to the will of God. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the time past of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: our
    - type: text
      text: ' life may suffice us to have wrought the will of the Gentiles, when we walked in lasciviousness, lusts, excess of wine, revellings, banquetings, and abominable idolatries: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'wherein they think it strange that ye run not with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' to the same excess of riot, speaking evil of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: you
    - type: text
      text: ': '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'who shall give account to him that is ready to judge the quick and the dead. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For for this cause was the gospel preached also to them that are dead, that they might be judged according to men in the flesh, but live according to God in the spirit.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the end of all things is at hand: be ye therefore sober, and watch unto prayer. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And above all things have fervent charity among yourselves: for charity shall cover the multitude of sins. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Use hospitality one to another without grudging. '
