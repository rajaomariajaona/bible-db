    content: 'Yet if '
  - type: text
    content: any man suffer
  - type: text
    content: ' as a Christian, let him not be ashamed; but let him glorify God on this behalf. '
  '17':
  - type: text
    content: 'For the time '
  - type: text
    content: is come
  - type: text
