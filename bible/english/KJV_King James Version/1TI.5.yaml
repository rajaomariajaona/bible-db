document_id: 1TI.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rebuke not an elder, but intreat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' as a father; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the younger men as brethren; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'the elder women as mothers; the younger as sisters, with all purity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Honour widows that are widows indeed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But if any widow have children or nephews, let them learn first to shew piety at home, and to requite their parents: for that is good and acceptable before God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now she that is a widow indeed, and desolate, trusteth in God, and continueth in supplications and prayers night and day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But she that liveth in pleasure is dead while she liveth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And these things give in charge, that they may be blameless. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But if any provide not for his own, and specially for those of his own house, he hath denied the faith, and is worse than an infidel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Let not a widow be taken into the number under threescore years old, having been the wife of one man, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'well reported of for good works; if she have brought up children, if she have lodged strangers, if she have washed the saints'' feet, if she have relieved the afflicted, if she have diligently followed every good work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But the younger widows refuse: for when they have begun to wax wanton against Christ, they will marry; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'having damnation, because they have cast off their first faith. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And withal they learn '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' idle, wandering about from house to house; and not only idle, but tattlers also and busybodies, speaking things which they ought not. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I will therefore that the younger women marry, bear children, guide the house, give none occasion to the adversary to speak reproachfully. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For some are already turned aside after Satan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: If any man or woman that believeth have widows, let them relieve them, and let not the church be charged; that it may relieve them that are widows indeed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Let the elders that rule well be counted worthy of double honour, especially they who labour in the word and doctrine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For the scripture saith, Thou shalt not muzzle the ox that treadeth out the corn. And, The labourer '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' worthy of his reward. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Against an elder receive not an accusation, but before two or three witnesses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Them that sin rebuke before all, that others also may fear. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'I charge '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thee
  - type: text
    text: ' before God, and the Lord Jesus Christ, and the elect angels, that thou observe these things without preferring one before another, doing nothing by partiality. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Lay hands suddenly on no man, neither be partaker of other men''s sins: keep thyself pure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Drink no longer water, but use a little wine for thy stomach''s sake and thine often infirmities. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Some men''s sins are open beforehand, going before to judgment; and some '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' they follow after. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Likewise also the good works '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of some
  - type: text
    text: ' are manifest beforehand; and they that are otherwise cannot be hid.'
