document_id: 1TI.5,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Rebuke not an elder, but intreat '
  - type: text
    content: him
  - type: text
    content: ' as a father; '
  - type: text
    content: and
  - type: text
    content: ' the younger men as brethren; '
  '10':
  - type: text
    content: 'well reported of for good works; if she have brought up children, if she have lodged strangers, if she have washed the saints'' feet, if she have relieved the afflicted, if she have diligently followed every good work. '
  '11':
  - type: text
    content: 'But the younger widows refuse: for when they have begun to wax wanton against Christ, they will marry; '
  '12':
  - type: text
    content: 'having damnation, because they have cast off their first faith. '
  '13':
  - type: text
    content: 'And withal they learn '
  - type: text
    content: to be
  - type: text
    content: ' idle, wandering about from house to house; and not only idle, but tattlers also and busybodies, speaking things which they ought not. '
  '14':
  - type: text
    content: 'I will therefore that the younger women marry, bear children, guide the house, give none occasion to the adversary to speak reproachfully. '
  '15':
  - type: text
    content: 'For some are already turned aside after Satan. '
  '16':
  - type: text
    content: If any man or woman that believeth have widows, let them relieve them, and let not the church be charged; that it may relieve them that are widows indeed.
  '17':
  - type: text
    content: 'Let the elders that rule well be counted worthy of double honour, especially they who labour in the word and doctrine. '
  '18':
  - type: text
    content: 'For the scripture saith, Thou shalt not muzzle the ox that treadeth out the corn. And, The labourer '
  - type: text
    content: is
  - type: text
    content: ' worthy of his reward. '
  '19':
  - type: text
    content: 'Against an elder receive not an accusation, but before two or three witnesses. '
  '2':
  - type: text
    content: 'the elder women as mothers; the younger as sisters, with all purity. '
  '20':
  - type: text
    content: 'Them that sin rebuke before all, that others also may fear. '
  '21':
  - type: text
    content: 'I charge '
  - type: text
    content: thee
  - type: text
    content: ' before God, and the Lord Jesus Christ, and the elect angels, that thou observe these things without preferring one before another, doing nothing by partiality. '
  '22':
  - type: text
    content: 'Lay hands suddenly on no man, neither be partaker of other men''s sins: keep thyself pure. '
  '23':
  - type: text
    content: 'Drink no longer water, but use a little wine for thy stomach''s sake and thine often infirmities. '
  '24':
  - type: text
    content: 'Some men''s sins are open beforehand, going before to judgment; and some '
  - type: text
    content: men
  - type: text
    content: ' they follow after. '
  '25':
  - type: text
    content: 'Likewise also the good works '
  - type: text
    content: of some
  - type: text
    content: ' are manifest beforehand; and they that are otherwise cannot be hid.'
  '3':
  - type: text
    content: 'Honour widows that are widows indeed. '
  '4':
  - type: text
    content: 'But if any widow have children or nephews, let them learn first to shew piety at home, and to requite their parents: for that is good and acceptable before God. '
  '5':
  - type: text
    content: 'Now she that is a widow indeed, and desolate, trusteth in God, and continueth in supplications and prayers night and day. '
  '6':
  - type: text
    content: 'But she that liveth in pleasure is dead while she liveth. '
  '7':
  - type: text
    content: 'And these things give in charge, that they may be blameless. '
  '8':
  - type: text
    content: 'But if any provide not for his own, and specially for those of his own house, he hath denied the faith, and is worse than an infidel. '
  '9':
  - type: text
    content: 'Let not a widow be taken into the number under threescore years old, having been the wife of one man, '
