document_id: PSA.11,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the chief Musician, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: A Psalm
    - type: text
      text: ' of David.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' put I my trust:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'How say ye to my soul, flee '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' a bird to your mountain?'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For, lo, the wicked bend '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' bow, they make ready their arrow upon the string,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That they may privily shoot at the upright in heart.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: If the foundations be destroyed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What can the righteous do?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in his holy temple,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '''s throne '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in heaven:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His eyes behold, his eyelids try, the children of men.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' trieth the righteous:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the wicked and him that loveth violence his soul hateth.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Upon the wicked he shall rain snares, fire and brimstone, and an horrible tempest:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: This shall be
    - type: text
      text: ' the portion of their cup.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For the righteous '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' loveth righteousness;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His countenance doth behold the upright.
