    content: 'To the chief Musician, '
  - type: text
    content: A Psalm
  - type: text
    content: ' of David.'
  - type: text
    content: 'In the '
  - type: text
    content: LORD
  - type: text
    content: ' put I my trust:'
  - type: text
    content: 'How say ye to my soul, flee '
  - type: text
    content: as
  - type: text
    content: ' a bird to your mountain?'
  '2':
  - type: text
    content: 'For, lo, the wicked bend '
  - type: text
    content: their
  - type: text
    content: ' bow, they make ready their arrow upon the string,'
  - type: text
    content: That they may privily shoot at the upright in heart.
  '3':
  - type: text
    content: If the foundations be destroyed,
  - type: text
    content: What can the righteous do?
  '4':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' in his holy temple,'
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: '''s throne '
  - type: text
    content: is
  - type: text
    content: ' in heaven:'
  - type: text
    content: His eyes behold, his eyelids try, the children of men.
  '5':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' trieth the righteous:'
  - type: text
    content: But the wicked and him that loveth violence his soul hateth.
  '6':
  - type: text
    content: 'Upon the wicked he shall rain snares, fire and brimstone, and an horrible tempest:'
  - type: text
    content: This shall be
  - type: text
    content: ' the portion of their cup.'
  '7':
  - type: text
    content: 'For the righteous '
  - type: text
    content: LORD
  - type: text
    content: ' loveth righteousness;'
  - type: text
    content: His countenance doth behold the upright.
