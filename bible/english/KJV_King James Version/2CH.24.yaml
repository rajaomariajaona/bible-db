document_id: 2CH.24,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Joash
  - type: text
    content: 'Joash '
  - type: text
    content: was
  - type: text
    content: ' seven years old when he began to reign, and he reigned forty years in Jerusalem. His mother''s name also '
  - type: text
    content: was
  - type: text
    content: ' Zibiah of Beer-sheba. '
  '10':
  - type: text
    content: 'And all the princes and all the people rejoiced, and brought in, and cast into the chest, until they had made an end. '
  '11':
  - type: text
    content: 'Now it came to pass, that at what time the chest was brought unto the king''s office by the hand of the Levites, and when they saw that '
  - type: text
    content: there was
  - type: text
    content: ' much money, the king''s scribe and the high priest''s officer came and emptied the chest, and took it, and carried it to his place again. Thus they did day by day, and gathered money in abundance. '
  '12':
  - type: text
    content: 'And the king and Jehoiada gave it to such as did the work of the service of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and hired masons and carpenters to repair the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and also such as wrought iron and brass to mend the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'So the workmen wrought, and the work was perfected by them, and they set the house of God in his state, and strengthened it. '
  '14':
  - type: text
    content: 'And when they had finished '
  - type: text
    content: it
  - type: text
    content: ', they brought the rest of the money before the king and Jehoiada, whereof were made vessels for the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: even
  - type: text
    content: ' vessels to minister, and to offer '
  - type: text
    content: withal
  - type: text
    content: ', and spoons, and vessels of gold and silver. And they offered burnt offerings in the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' continually all the days of Jehoiada.'
  '15':
  - type: text
    content: 'But Jehoiada waxed old, and was full of days when he died; an hundred and thirty years old '
  - type: text
    content: was he
  - type: text
    content: ' when he died. '
  '16':
  - type: text
    content: 'And they buried him in the city of David among the kings, because he had done good in Israel, both toward God, and toward his house. '
  '17':
  - type: text
    content: 'Now after the death of Jehoiada came the princes of Judah, and made obeisance to the king. Then the king hearkened unto them. '
  '18':
  - type: text
    content: 'And they left the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' God of their fathers, and served groves and idols: and wrath came upon Judah and Jerusalem for this their trespass. '
  '19':
  - type: text
    content: 'Yet he sent prophets to them, to bring them again unto the '
  - type: text
    content: LORD
  - type: text
    content: '; and they testified against them: but they would not give ear.'
  '2':
  - type: text
    content: 'And Joash did '
  - type: text
    content: that which was
  - type: text
    content: ' right in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ' all the days of Jehoiada the priest. '
  '20':
  - type: text
    content: 'And the Spirit of God came upon Zechariah the son of Jehoiada the priest, which stood above the people, and said unto them, Thus saith God, Why transgress ye the commandments of the '
  - type: text
    content: LORD
  - type: text
    content: ', that ye cannot prosper? because ye have forsaken the '
  - type: text
    content: LORD
  - type: text
    content: ', he hath also forsaken you. '
  '21':
  - type: text
    content: 'And they conspired against him, and stoned him with stones at the commandment of the king in the court of the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Thus Joash the king remembered not the kindness which Jehoiada his father had done to him, but slew his son. And when he died, he said, The '
  - type: text
    content: LORD
  - type: text
    content: ' look upon '
  - type: text
    content: it
  - type: text
    content: ', and require '
  - type: text
    content: it
  - type: text
    content: .
  '23':
  - type: text
    content: 'And it came to pass at the end of the year, '
  - type: text
    content: that
  - type: text
    content: ' the host of Syria came up against him: and they came to Judah and Jerusalem, and destroyed all the princes of the people from among the people, and sent all the spoil of them unto the king of Damascus. '
  '24':
  - type: text
    content: 'For the army of the Syrians came with a small company of men, and the '
  - type: text
    content: LORD
  - type: text
    content: ' delivered a very great host into their hand, because they had forsaken the '
  - type: text
    content: LORD
  - type: text
    content: ' God of their fathers. So they executed judgment against Joash.'
  '25':
  - type: text
    content: 'And when they were departed from him, (for they left him in great diseases,) his own servants conspired against him for the blood of the sons of Jehoiada the priest, and slew him on his bed, and he died: and they buried him in the city of David, but they buried him not in the sepulchres of the kings. '
  '26':
  - type: text
    content: 'And these are they that conspired against him; Zabad the son of Shimeath an Ammonitess, and Jehozabad the son of Shimrith a Moabitess. '
  '27':
  - type: text
    content: 'Now '
  - type: text
    content: concerning
  - type: text
    content: ' his sons, and the greatness of the burdens '
  - type: text
    content: laid
  - type: text
    content: ' upon him, and the repairing of the house of God, behold, they '
  - type: text
    content: are
  - type: text
    content: ' written in the story of the book of the kings. And Amaziah his son reigned in his stead.'
  '3':
  - type: text
    content: And Jehoiada took for him two wives; and he begat sons and daughters.
  '4':
  - type: text
    content: 'And it came to pass after this, '
  - type: text
    content: that
  - type: text
    content: ' Joash was minded to repair the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'And he gathered together the priests and the Levites, and said to them, Go out unto the cities of Judah, and gather of all Israel money to repair the house of your God from year to year, and see that ye hasten the matter. Howbeit the Levites hastened '
  - type: text
    content: it
  - type: text
    content: ' not. '
  '6':
  - type: text
    content: 'And the king called for Jehoiada the chief, and said unto him, Why hast thou not required of the Levites to bring in out of Judah and out of Jerusalem the collection, '
  - type: text
    content: according to the commandment
  - type: text
    content: ' of Moses the servant of the '
  - type: text
    content: LORD
  - type: text
    content: ', and of the congregation of Israel, for the tabernacle of witness? '
  '7':
  - type: text
    content: 'For the sons of Athaliah, that wicked woman, had broken up the house of God; and also all the dedicated things of the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' did they bestow upon Baalim.'
  '8':
  - type: text
    content: 'And at the king''s commandment they made a chest, and set it without at the gate of the house of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'And they made a proclamation through Judah and Jerusalem, to bring in to the '
  - type: text
    content: LORD
  - type: text
    content: ' the collection '
  - type: text
    content: that
  - type: text
    content: ' Moses the servant of God '
  - type: text
    content: laid
  - type: text
    content: ' upon Israel in the wilderness. '
