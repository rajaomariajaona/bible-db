document_id: 2CH.24
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Joash
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Joash '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' seven years old when he began to reign, and he reigned forty years in Jerusalem. His mother''s name also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Zibiah of Beer-sheba. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Joash did '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that which was
  - type: text
    text: ' right in the sight of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' all the days of Jehoiada the priest. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: And Jehoiada took for him two wives; and he begat sons and daughters.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And it came to pass after this, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' Joash was minded to repair the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And he gathered together the priests and the Levites, and said to them, Go out unto the cities of Judah, and gather of all Israel money to repair the house of your God from year to year, and see that ye hasten the matter. Howbeit the Levites hastened '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' not. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the king called for Jehoiada the chief, and said unto him, Why hast thou not required of the Levites to bring in out of Judah and out of Jerusalem the collection, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: according to the commandment
  - type: text
    text: ' of Moses the servant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and of the congregation of Israel, for the tabernacle of witness? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For the sons of Athaliah, that wicked woman, had broken up the house of God; and also all the dedicated things of the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' did they bestow upon Baalim.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And at the king''s commandment they made a chest, and set it without at the gate of the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And they made a proclamation through Judah and Jerusalem, to bring in to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' the collection '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' Moses the servant of God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: laid
  - type: text
    text: ' upon Israel in the wilderness. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And all the princes and all the people rejoiced, and brought in, and cast into the chest, until they had made an end. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now it came to pass, that at what time the chest was brought unto the king''s office by the hand of the Levites, and when they saw that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' much money, the king''s scribe and the high priest''s officer came and emptied the chest, and took it, and carried it to his place again. Thus they did day by day, and gathered money in abundance. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And the king and Jehoiada gave it to such as did the work of the service of the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and hired masons and carpenters to repair the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and also such as wrought iron and brass to mend the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So the workmen wrought, and the work was perfected by them, and they set the house of God in his state, and strengthened it. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And when they had finished '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', they brought the rest of the money before the king and Jehoiada, whereof were made vessels for the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' vessels to minister, and to offer '
  - type: usfm
    marker: add
    children:
    - type: text
      text: withal
  - type: text
    text: ', and spoons, and vessels of gold and silver. And they offered burnt offerings in the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' continually all the days of Jehoiada.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But Jehoiada waxed old, and was full of days when he died; an hundred and thirty years old '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was he
  - type: text
    text: ' when he died. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And they buried him in the city of David among the kings, because he had done good in Israel, both toward God, and toward his house. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now after the death of Jehoiada came the princes of Judah, and made obeisance to the king. Then the king hearkened unto them. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And they left the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of their fathers, and served groves and idols: and wrath came upon Judah and Jerusalem for this their trespass. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Yet he sent prophets to them, to bring them again unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; and they testified against them: but they would not give ear.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the Spirit of God came upon Zechariah the son of Jehoiada the priest, which stood above the people, and said unto them, Thus saith God, Why transgress ye the commandments of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that ye cannot prosper? because ye have forsaken the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', he hath also forsaken you. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And they conspired against him, and stoned him with stones at the commandment of the king in the court of the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Thus Joash the king remembered not the kindness which Jehoiada his father had done to him, but slew his son. And when he died, he said, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' look upon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and require '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And it came to pass at the end of the year, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' the host of Syria came up against him: and they came to Judah and Jerusalem, and destroyed all the princes of the people from among the people, and sent all the spoil of them unto the king of Damascus. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'For the army of the Syrians came with a small company of men, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' delivered a very great host into their hand, because they had forsaken the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of their fathers. So they executed judgment against Joash.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And when they were departed from him, (for they left him in great diseases,) his own servants conspired against him for the blood of the sons of Jehoiada the priest, and slew him on his bed, and he died: and they buried him in the city of David, but they buried him not in the sepulchres of the kings. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And these are they that conspired against him; Zabad the son of Shimeath an Ammonitess, and Jehozabad the son of Shimrith a Moabitess. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Now '
  - type: usfm
    marker: add
    children:
    - type: text
      text: concerning
  - type: text
    text: ' his sons, and the greatness of the burdens '
  - type: usfm
    marker: add
    children:
    - type: text
      text: laid
  - type: text
    text: ' upon him, and the repairing of the house of God, behold, they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' written in the story of the book of the kings. And Amaziah his son reigned in his stead.'
