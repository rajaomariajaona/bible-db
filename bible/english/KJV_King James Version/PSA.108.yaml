verses:
  '1':
  - type: text
    content: 'A Song '
  - type: text
    content: or
  - type: text
    content: ' Psalm of David.'
  - type: text
    content: O God, my heart is fixed;
  - type: text
    content: I will sing and give praise, even with my glory.
  '10':
  - type: text
    content: Who will bring me into the strong city?
  - type: text
    content: Who will lead me into Edom?
  '11':
  - type: text
    content: ' '
  - type: text
    content: Wilt
  - type: text
    content: ' not '
  - type: text
    content: thou
  - type: text
    content: ', O God, '
  - type: text
    content: who
  - type: text
    content: ' hast cast us off?'
  - type: text
    content: And wilt not thou, O God, go forth with our hosts?
  '12':
  - type: text
    content: 'Give us help from trouble:'
  - type: text
    content: 'For vain '
  - type: text
    content: is
  - type: text
    content: ' the help of man.'
  '13':
  - type: text
    content: 'Through God we shall do valiantly:'
  - type: text
    content: 'For he '
  - type: text
    content: it is that
  - type: text
    content: ' shall tread down our enemies.'
  '2':
  - type: text
    content: 'Awake, psaltery and harp:'
  - type: text
    content: 'I '
  - type: text
    content: myself
  - type: text
    content: ' will awake early.'
  '3':
  - type: text
    content: 'I will praise thee, O '
  - type: text
    content: LORD
  - type: text
    content: ', among the people:'
  - type: text
    content: And I will sing praises unto thee among the nations.
  '4':
  - type: text
    content: 'For thy mercy '
  - type: text
    content: is
  - type: text
    content: ' great above the heavens:'
  - type: text
    content: 'And thy truth '
  - type: text
    content: reacheth
  - type: text
    content: ' unto the clouds.'
  '5':
  - type: text
    content: 'Be thou exalted, O God, above the heavens:'
  - type: text
    content: And thy glory above all the earth;
  '6':
  - type: text
    content: 'That thy beloved may be delivered:'
  - type: text
    content: 'Save '
  - type: text
    content: with
  - type: text
    content: ' thy right hand, and answer me.'
  '7':
  - type: text
    content: God hath spoken in his holiness;
  - type: text
    content: I will rejoice, I will divide Shechem, and mete out the valley of Succoth.
  '8':
  - type: text
    content: 'Gilead '
  - type: text
    content: is
  - type: text
    content: ' mine; Manasseh '
  - type: text
    content: is
  - type: text
    content: ' mine;'
  - type: text
    content: 'Ephraim also '
  - type: text
    content: is
  - type: text
    content: ' the strength of mine head;'
  - type: text
    content: 'Judah '
  - type: text
    content: is
  - type: text
    content: ' my lawgiver; '
  '9':
  - type: text
    content: 'Moab '
  - type: text
    content: is
  - type: text
    content: ' my washpot;'
  - type: text
    content: Over Edom will I cast out my shoe; Over Philistia will I triumph.
