segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'A Song '
  - type: usfm
    marker: add
    children:
    - type: text
      text: or
  - type: text
    text: ' Psalm of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O God, my heart is fixed;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will sing and give praise, even with my glory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Awake, psaltery and harp:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: myself
  - type: text
    text: ' will awake early.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I will praise thee, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', among the people:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And I will sing praises unto thee among the nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For thy mercy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' great above the heavens:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And thy truth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: reacheth
  - type: text
    text: ' unto the clouds.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Be thou exalted, O God, above the heavens:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thy glory above all the earth;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'That thy beloved may be delivered:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Save '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' thy right hand, and answer me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: God hath spoken in his holiness;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will rejoice, I will divide Shechem, and mete out the valley of Succoth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Gilead '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' mine; Manasseh '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' mine;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Ephraim also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the strength of mine head;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Judah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my lawgiver; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Moab '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my washpot;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Over Edom will I cast out my shoe; Over Philistia will I triumph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Who will bring me into the strong city?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who will lead me into Edom?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Wilt
  - type: text
    text: ' not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thou
  - type: text
    text: ', O God, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: who
  - type: text
    text: ' hast cast us off?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And wilt not thou, O God, go forth with our hosts?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Give us help from trouble:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For vain '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the help of man.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Through God we shall do valiantly:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is that
  - type: text
    text: ' shall tread down our enemies.'
