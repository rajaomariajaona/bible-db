document_id: NUM.22
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the children of Israel set forward, and pitched in the plains of Moab on this side Jordan '
  - type: usfm
    marker: add
    children:
    - type: text
      text: by
  - type: text
    text: ' Jericho.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Balak and Balaam
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Balak the son of Zippor saw all that Israel had done to the Amorites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Moab was sore afraid of the people, because they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' many: and Moab was distressed because of the children of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Moab said unto the elders of Midian, Now shall this company lick up all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that are
  - type: text
    text: ' round about us, as the ox licketh up the grass of the field. And Balak the son of Zippor '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' king of the Moabites at that time. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He sent messengers therefore unto Balaam the son of Beor to Pethor, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' by the river of the land of the children of his people, to call him, saying, Behold, there is a people come out from Egypt: behold, they cover the face of the earth, and they abide over against me: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'come now therefore, I pray thee, curse me this people; for they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' too mighty for me: peradventure I shall prevail, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' we may smite them, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' I may drive them out of the land: for I wot that he whom thou blessest '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' blessed, and he whom thou cursest is cursed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the elders of Moab and the elders of Midian departed with the rewards of divination in their hand; and they came unto Balaam, and spake unto him the words of Balak. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And he said unto them, Lodge here this night, and I will bring you word again, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall speak unto me: and the princes of Moab abode with Balaam. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And God came unto Balaam, and said, What men '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' these with thee? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Balaam said unto God, Balak the son of Zippor, king of Moab, hath sent unto me, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saying
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' a people come out of Egypt, which covereth the face of the earth: come now, curse me them; peradventure I shall be able to overcome them, and drive them out. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And God said unto Balaam, Thou shalt not go with them; thou shalt not curse the people: for they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' blessed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Balaam rose up in the morning, and said unto the princes of Balak, Get you into your land: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' refuseth to give me leave to go with you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And the princes of Moab rose up, and they went unto Balak, and said, Balaam refuseth to come with us.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Balak sent yet again princes, more, and more honourable than they. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And they came to Balaam, and said to him, Thus saith Balak the son of Zippor, Let nothing, I pray thee, hinder thee from coming unto me: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'for I will promote thee unto very great honour, and I will do whatsoever thou sayest unto me: come therefore, I pray thee, curse me this people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And Balaam answered and said unto the servants of Balak, If Balak would give me his house full of silver and gold, I cannot go beyond the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' my God, to do less or more. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now therefore, I pray you, tarry ye also here this night, that I may know what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will say unto me more. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And God came unto Balaam at night, and said unto him, If the men come to call thee, rise up, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' go with them; but yet the word which I shall say unto thee, that shalt thou do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And Balaam rose up in the morning, and saddled his ass, and went with the princes of Moab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And God''s anger was kindled because he went: and the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' stood in the way for an adversary against him. Now he was riding upon his ass, and his two servants '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And the ass saw the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' standing in the way, and his sword drawn in his hand: and the ass turned aside out of the way, and went into the field: and Balaam smote the ass, to turn her into the way. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'But the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' stood in a path of the vineyards, a wall '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' on this side, and a wall on that side. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And when the ass saw the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', she thrust herself unto the wall, and crushed Balaam''s foot against the wall: and he smote her again. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' went further, and stood in a narrow place, where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' no way to turn either to the right hand or to the left. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And when the ass saw the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', she fell down under Balaam: and Balaam''s anger was kindled, and he smote the ass with a staff. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' opened the mouth of the ass, and she said unto Balaam, What have I done unto thee, that thou hast smitten me these three times? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And Balaam said unto the ass, Because thou hast mocked me: I would there were a sword in mine hand, for now would I kill thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And the ass said unto Balaam, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Am
  - type: text
    text: ' not I thine ass, upon which thou hast ridden ever since '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I was
  - type: text
    text: ' thine unto this day? was I ever wont to do so unto thee? And he said, Nay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' opened the eyes of Balaam, and he saw the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' standing in the way, and his sword drawn in his hand: and he bowed down his head, and fell flat on his face. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto him, Wherefore hast thou smitten thine ass these three times? behold, I went out to withstand thee, because '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thy
  - type: text
    text: ' way is perverse before me: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'and the ass saw me, and turned from me these three times: unless she had turned from me, surely now also I had slain thee, and saved her alive. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And Balaam said unto the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', I have sinned; for I knew not that thou stoodest in the way against me: now therefore, if it displease thee, I will get me back again. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Balaam, Go with the men: but only the word that I shall speak unto thee, that thou shalt speak. So Balaam went with the princes of Balak.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And when Balak heard that Balaam was come, he went out to meet him unto a city of Moab, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the border of Arnon, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the utmost coast. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And Balak said unto Balaam, Did I not earnestly send unto thee to call thee? wherefore camest thou not unto me? am I not able indeed to promote thee to honour? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And Balaam said unto Balak, Lo, I am come unto thee: have I now any power at all to say any thing? the word that God putteth in my mouth, that shall I speak. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And Balaam went with Balak, and they came unto Kirjath-huzoth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And Balak offered oxen and sheep, and sent to Balaam, and to the princes that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And it came to pass on the morrow, that Balak took Balaam, and brought him up into the high places of Baal, that thence he might see the utmost '
  - type: usfm
    marker: add
    children:
    - type: text
      text: part
  - type: text
    text: ' of the people.'
