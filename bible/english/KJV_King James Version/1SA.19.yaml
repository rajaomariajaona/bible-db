verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Saul spake to Jonathan his son, and to all his servants, that they should kill David. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Saul sought to smite David even to the wall with the javelin; but he slipped away out of Saul''s presence, and he smote the javelin into the wall: and David fled, and escaped that night. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul also sent messengers unto David''s house, to watch him, and to slay him in the morning: and Michal David''s wife told him, saying, If thou save not thy life to night, to morrow thou shalt be slain. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Michal let David down through a window: and he went, and fled, and escaped. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Michal took an image, and laid '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' in the bed, and put a pillow of goats'' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: hair
    - type: text
      text: ' for his bolster, and covered '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' with a cloth. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Saul sent messengers to take David, she said, He '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' sick. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Saul sent the messengers '
    - type: usfm
      marker: add
      children:
      - type: text
        text: again
    - type: text
      text: ' to see David, saying, Bring him up to me in the bed, that I may slay him. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the messengers were come in, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' an image in the bed, with a pillow of goats'' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: hair
    - type: text
      text: ' for his bolster. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Saul said unto Michal, Why hast thou deceived me so, and sent away mine enemy, that he is escaped? And Michal answered Saul, He said unto me, Let me go; why should I kill thee?
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David fled, and escaped, and came to Samuel to Ramah, and told him all that Saul had done to him. And he and Samuel went and dwelt in Naioth. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it was told Saul, saying, Behold, David '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' at Naioth in Ramah. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jonathan Saul''s son delighted much in David: and Jonathan told David, saying, Saul my father seeketh to kill thee: now therefore, I pray thee, take heed to thyself until the morning, and abide in a secret place, and hide thyself: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Saul sent messengers to take David: and when they saw the company of the prophets prophesying, and Samuel standing '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' appointed over them, the Spirit of God was upon the messengers of Saul, and they also prophesied. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when it was told Saul, he sent other messengers, and they prophesied likewise. And Saul sent messengers again the third time, and they prophesied also. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then went he also to Ramah, and came to a great well that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in Sechu: and he asked and said, Where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' Samuel and David? And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' said, Behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they be
    - type: text
      text: ' at Naioth in Ramah. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he went thither to Naioth in Ramah: and the Spirit of God was upon him also, and he went on, and prophesied, until he came to Naioth in Ramah. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he stripped off his clothes also, and prophesied before Samuel in like manner, and lay down naked all that day and all that night. Wherefore they say, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' Saul also among the prophets?'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and I will go out and stand beside my father in the field where thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ', and I will commune with my father of thee; and what I see, that I will tell thee. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jonathan spake good of David unto Saul his father, and said unto him, Let not the king sin against his servant, against David; because he hath not sinned against thee, and because his works '
    - type: usfm
      marker: add
      children:
      - type: text
        text: have been
    - type: text
      text: ' to thee-ward very good: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for he did put his life in his hand, and slew the Philistine, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' wrought a great salvation for all Israel: thou sawest '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and didst rejoice: wherefore then wilt thou sin against innocent blood, to slay David without a cause? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Saul hearkened unto the voice of Jonathan: and Saul sware, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: As
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' liveth, he shall not be slain. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Jonathan called David, and Jonathan shewed him all those things. And Jonathan brought David to Saul, and he was in his presence, as in times past.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there was war again: and David went out, and fought with the Philistines, and slew them with a great slaughter; and they fled from him. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the evil spirit from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was upon Saul, as he sat in his house with his javelin in his hand: and David played with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' hand. '
