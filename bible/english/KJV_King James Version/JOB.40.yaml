document_id: JOB.40,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Moreover the '
  - type: text
    content: LORD
  - type: text
    content: ' answered Job, and said,'
  '10':
  - type: text
    content: 'Deck thyself now '
  - type: text
    content: with
  - type: text
    content: ' majesty and excellency;'
  - type: text
    content: And array thyself with glory and beauty.
  '11':
  - type: text
    content: 'Cast abroad the rage of thy wrath:'
  - type: text
    content: 'And behold every one '
  - type: text
    content: that is
  - type: text
    content: ' proud, and abase him.'
  '12':
  - type: text
    content: 'Look on every one '
  - type: text
    content: that is
  - type: text
    content: ' proud, '
  - type: text
    content: and
  - type: text
    content: ' bring him low;'
  - type: text
    content: And tread down the wicked in their place.
  '13':
  - type: text
    content: Hide them in the dust together;
  - type: text
    content: And
  - type: text
    content: ' bind their faces in secret.'
  '14':
  - type: text
    content: Then will I also confess unto thee
  - type: text
    content: That thine own right hand can save thee.
  '15':
  - type: text
    content: Behold now behemoth,
  - type: text
    content: Which I made with thee;
  - type: text
    content: He eateth grass as an ox.
  '16':
  - type: text
    content: 'Lo now, his strength '
  - type: text
    content: is
  - type: text
    content: ' in his loins,'
  - type: text
    content: 'And his force '
  - type: text
    content: is
  - type: text
    content: ' in the navel of his belly.'
  '17':
  - type: text
    content: 'He moveth his tail like a cedar:'
  - type: text
    content: The sinews of his stones are wrapped together.
  '18':
  - type: text
    content: 'His bones '
  - type: text
    content: are
  - type: text
    content: ' as strong pieces of brass;'
  - type: text
    content: 'His bones '
  - type: text
    content: are
  - type: text
    content: ' like bars of iron.'
  '19':
  - type: text
    content: 'He '
  - type: text
    content: is
  - type: text
    content: ' the chief of the ways of God:'
  - type: text
    content: 'He that made him can make his sword to approach '
  - type: text
    content: unto him
  - type: text
    content: .
  '2':
  - type: text
    content: 'Shall he that contendeth with the Almighty instruct '
  - type: text
    content: him?
  - type: text
    content: He that reproveth God, let him answer it.
  - type: heading
    content: Job's Reply
  '20':
  - type: text
    content: Surely the mountains bring him forth food,
  - type: text
    content: Where all the beasts of the field play.
  '21':
  - type: text
    content: He lieth under the shady trees,
  - type: text
    content: In the covert of the reed, and fens.
  '22':
  - type: text
    content: 'The shady trees cover him '
  - type: text
    content: with
  - type: text
    content: ' their shadow;'
  - type: text
    content: The willows of the brook compass him about.
  '23':
  - type: text
    content: 'Behold, he drinketh up a river, '
  - type: text
    content: and
  - type: text
    content: ' hasteth not:'
  - type: text
    content: He trusteth that he can draw up Jordan into his mouth.
  '24':
  - type: text
    content: 'He taketh it with his eyes:'
  - type: text
    content: His
  - type: text
    content: ' nose pierceth through snares.'
  '3':
  - type: text
    content: 'Then Job answered the '
  - type: text
    content: LORD
  - type: text
    content: ', and said,'
  '4':
  - type: text
    content: Behold, I am vile; what shall I answer thee?
  - type: text
    content: I will lay mine hand upon my mouth.
  '5':
  - type: text
    content: 'Once have I spoken; but I will not answer:'
  - type: text
    content: Yea, twice; but I will proceed no further.
  - type: heading
    content: The Lord's Answer
  '6':
  - type: text
    content: 'Then answered the '
  - type: text
    content: LORD
  - type: text
    content: ' unto Job out of the whirlwind, and said,'
  '7':
  - type: text
    content: 'Gird up thy loins now like a man:'
  - type: text
    content: I will demand of thee, and declare thou unto me.
  '8':
  - type: text
    content: Wilt thou also disannul my judgment?
  - type: text
    content: Wilt thou condemn me, that thou mayest be righteous?
  '9':
  - type: text
    content: Hast thou an arm like God?
  - type: text
    content: Or canst thou thunder with a voice like him?
