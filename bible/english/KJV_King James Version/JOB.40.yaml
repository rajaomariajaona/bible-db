document_id: JOB.40
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moreover the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' answered Job, and said,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Shall he that contendeth with the Almighty instruct '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him?
- type: usfm
  marker: q2
  children:
  - type: text
    text: He that reproveth God, let him answer it.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Job's Reply
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Job answered the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and said,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Behold, I am vile; what shall I answer thee?
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will lay mine hand upon my mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Once have I spoken; but I will not answer:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yea, twice; but I will proceed no further.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Lord's Answer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then answered the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' unto Job out of the whirlwind, and said,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Gird up thy loins now like a man:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will demand of thee, and declare thou unto me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Wilt thou also disannul my judgment?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Wilt thou condemn me, that thou mayest be righteous?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hast thou an arm like God?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or canst thou thunder with a voice like him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Deck thyself now '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' majesty and excellency;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And array thyself with glory and beauty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Cast abroad the rage of thy wrath:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And behold every one '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' proud, and abase him.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Look on every one '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' proud, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' bring him low;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And tread down the wicked in their place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hide them in the dust together;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' bind their faces in secret.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then will I also confess unto thee
- type: usfm
  marker: q2
  children:
  - type: text
    text: That thine own right hand can save thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Behold now behemoth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Which I made with thee;
- type: usfm
  marker: q2
  children:
  - type: text
    text: He eateth grass as an ox.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Lo now, his strength '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in his loins,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And his force '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the navel of his belly.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He moveth his tail like a cedar:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The sinews of his stones are wrapped together.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'His bones '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' as strong pieces of brass;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'His bones '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' like bars of iron.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'He '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the chief of the ways of God:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He that made him can make his sword to approach '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unto him
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Surely the mountains bring him forth food,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Where all the beasts of the field play.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: He lieth under the shady trees,
- type: usfm
  marker: q2
  children:
  - type: text
    text: In the covert of the reed, and fens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The shady trees cover him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' their shadow;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The willows of the brook compass him about.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Behold, he drinketh up a river, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' hasteth not:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He trusteth that he can draw up Jordan into his mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'He taketh it with his eyes:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: His
  - type: text
    text: ' nose pierceth through snares.'
