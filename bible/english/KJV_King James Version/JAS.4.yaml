document_id: JAS.4,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'From whence '
    - type: usfm
      marker: add
      children:
      - type: text
        text: come
    - type: text
      text: ' wars and fightings among you? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: come they
    - type: text
      text: ' not hence, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' of your lusts that war in your members? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Humble yourselves in the sight of the Lord, and he shall lift you up.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Speak not evil one of another, brethren. He that speaketh evil of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' brother, and judgeth his brother, speaketh evil of the law, and judgeth the law: but if thou judge the law, thou art not a doer of the law, but a judge. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'There is one lawgiver, who is able to save and to destroy: who art thou that judgest another?'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Go to now, ye that say, To day or to morrow we will go into such a city, and continue there a year, and buy and sell, and get gain: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'whereas ye know not what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' on the morrow. For what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' your life? It is even a vapour, that appeareth for a little time, and then vanisheth away. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'For that ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ought
    - type: text
      text: ' to say, If the Lord will, we shall live, and do this, or that. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'But now ye rejoice in your boastings: all such rejoicing is evil. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Therefore to him that knoweth to do good, and doeth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' not, to him it is sin.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ye lust, and have not: ye kill, and desire to have, and cannot obtain: ye fight and war, yet ye have not, because ye ask not. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ye ask, and receive not, because ye ask amiss, that ye may consume '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' upon your lusts. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ye adulterers and adulteresses, know ye not that the friendship of the world is enmity with God? whosoever therefore will be a friend of the world is the enemy of God. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Do ye think that the scripture saith in vain, The spirit that dwelleth in us lusteth to envy? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But he giveth more grace. Wherefore he saith, God resisteth the proud, but giveth grace unto the humble. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Submit yourselves therefore to God. Resist the devil, and he will flee from you. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Draw nigh to God, and he will draw nigh to you. Cleanse '
    - type: usfm
      marker: add
      children:
      - type: text
        text: your
    - type: text
      text: ' hands, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ye
    - type: text
      text: ' sinners; and purify '
    - type: usfm
      marker: add
      children:
      - type: text
        text: your
    - type: text
      text: ' hearts, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ye
    - type: text
      text: ' double minded. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Be afflicted, and mourn, and weep: let your laughter be turned to mourning, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: your
    - type: text
      text: ' joy to heaviness. '
