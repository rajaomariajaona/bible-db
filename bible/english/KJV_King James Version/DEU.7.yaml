  - type: text
    content: ' thy God shall keep unto thee the covenant and the mercy which he sware unto thy fathers: '
  '13':
  - type: text
    content: 'and he will love thee, and bless thee, and multiply thee: he will also bless the fruit of thy womb, and the fruit of thy land, thy corn, and thy wine, and thine oil, the increase of thy kine, and the flocks of thy sheep, in the land which he sware unto thy fathers to give thee. '
  '14':
  - type: text
    content: 'Thou shalt be blessed above all people: there shall not be male or female barren among you, or among your cattle. '
  '15':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
