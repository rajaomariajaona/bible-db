  - type: text
    content: ' thy God shall bring thee into the land whither thou goest to possess it, and hath cast out many nations before thee, the Hittites, and the Girgashites, and the Amorites, and the Canaanites, and the Perizzites, and the Hivites, and the Jebusites, seven nations greater and mightier than thou; '
  '10':
  - type: text
    content: 'and repayeth them that hate him to their face, to destroy them: he will not be slack to him that hateth him, he will repay him to his face. '
  '11':
  - type: text
    content: Thou shalt therefore keep the commandments, and the statutes, and the judgments, which I command thee this day, to do them.
  '12':
  - type: text
