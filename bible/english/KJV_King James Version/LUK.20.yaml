document_id: LUK.20,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And it came to pass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' on one of those days, as he taught the people in the temple, and preached the gospel, the chief priests and the scribes came upon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' with the elders, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And at the season he sent a servant to the husbandmen, that they should give him of the fruit of the vineyard: but the husbandmen beat him, and sent '
      - type: usfm
        marker: add
        children:
        - type: text
          text: him
      - type: text
        text: ' away empty.'
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And again he sent another servant: and they beat him also, and entreated '
      - type: usfm
        marker: add
        children:
        - type: text
          text: him
      - type: text
        text: ' shamefully, and sent '
      - type: usfm
        marker: add
        children:
        - type: text
          text: him
      - type: text
        text: ' away empty.'
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And again he sent a third: and they wounded him also, and cast '
      - type: usfm
        marker: add
        children:
        - type: text
          text: him
      - type: text
        text: ' out.'
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Then said the lord of the vineyard, What shall I do? I will send my beloved son: it may be they will reverence '
      - type: usfm
        marker: add
        children:
        - type: text
          text: him
      - type: text
        text: ' when they see him.'
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But when the husbandmen saw him, they reasoned among themselves, saying, This is the heir: come, let us kill him, that the inheritance may be our''s.'
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'So they cast him out of the vineyard, and killed '
      - type: usfm
        marker: add
        children:
        - type: text
          text: him
      - type: text
        text: . What therefore shall the lord of the vineyard do unto them?
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He shall come and destroy these husbandmen, and shall give the vineyard to others.
    - type: text
      text: ' And when they heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', they said, God forbid. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And he beheld them, and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: What is this then that is written,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The stone which the builders rejected,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The same is become the head of the corner?
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whosoever shall fall upon that stone shall be broken; but on whomsoever it shall fall, it will grind him to powder.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Chief Priests and Scribes
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And the chief priests and the scribes the same hour sought to lay hands on him; and they feared the people: for they perceived that he had spoken this parable against them. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'and spake unto him, saying, Tell us, by what authority doest thou these things? or who is he that gave thee this authority? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And they watched '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', and sent forth spies, which should feign themselves just men, that they might take hold of his words, that so they might deliver him unto the power and authority of the governor. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And they asked him, saying, Master, we know that thou sayest and teachest rightly, neither acceptest thou the person '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of any
    - type: text
      text: ', but teachest the way of God truly: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Is it lawful for us to give tribute unto Cæsar, or no? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'But he perceived their craftiness, and said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Why tempt ye me?
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Shew me a penny. Whose image and superscription hath it?
    - type: text
      text: ' They answered and said, Cæsar''s. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Render therefore unto Cæsar the things which be Cæsar's, and unto God the things which be God's.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And they could not take hold of his words before the people: and they marvelled at his answer, and held their peace.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Sadducees
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Then came to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' certain of the Sadducees, which deny that there is any resurrection; and they asked him, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'saying, Master, Moses wrote unto us, If any man''s brother die, having a wife, and he die without children, that his brother should take his wife, and raise up seed unto his brother. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'There were therefore seven brethren: and the first took a wife, and died without children. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And he answered and said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I will also ask you one thing; and answer me:'
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And the second took her to wife, and he died childless. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And the third took her; and in like manner the seven also: and they left no children, and died. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Last of all the woman died also. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Therefore in the resurrection whose wife of them is she? for seven had her to wife.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'And Jesus answering said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'The children of this world marry, and are given in marriage:'
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'but they which shall be accounted worthy to obtain that world, and the resurrection from the dead, neither marry, nor are given in marriage:'
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'neither can they die any more: for they are equal unto the angels; and are the children of God, being the children of the resurrection.'
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Now that the dead are raised, even Moses shewed at the bush, when he calleth the Lord the God of Abraham, and the God of Isaac, and the God of Jacob.
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For he is not a God of the dead, but of the living: for all live unto him.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: David's Son
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Then certain of the scribes answering said, Master, thou hast well said. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The baptism of John, was it from heaven, or of men?
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'And after that they durst not ask him any '
    - type: usfm
      marker: add
      children:
      - type: text
        text: question at all
    - type: text
      text: '. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: How say they that Christ is David's son?
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And David himself saith in the book of Psalms,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'The '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: LORD
      - type: text
        text: ' said unto my Lord,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Sit thou on my right hand,
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Till I make thine enemies thy footstool.
  '44':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: David therefore calleth him Lord, how is he then his son?
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Then in the audience of all the people he said unto his disciples, '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Beware of the scribes, which desire to walk in long robes, and love greetings in the markets, and the highest seats in the synagogues, and the chief rooms at feasts;
    - type: text
      text: ' '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'which devour widows'' houses, and for a shew make long prayers: the same shall receive greater damnation.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And they reasoned with themselves, saying, If we shall say, From heaven; he will say, Why then believed ye him not? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But and if we say, Of men; all the people will stone us: for they be persuaded that John was a prophet. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And they answered, that they could not tell whence '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And Jesus said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Neither tell I you by what authority I do these things.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Wicked Husbandmen
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then began he to speak to the people this parable; '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: A certain man planted a vineyard, and let it forth to husbandmen, and went into a far country for a long time.
    - type: text
      text: ' '
