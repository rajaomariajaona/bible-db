document_id: LUK.20,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'And it came to pass, '
  - type: text
    content: that
  - type: text
    content: ' on one of those days, as he taught the people in the temple, and preached the gospel, the chief priests and the scribes came upon '
  - type: text
    content: him
  - type: text
    content: ' with the elders, '
  '10':
  - type: text
    content: 'And at the season he sent a servant to the husbandmen, that they should give him of the fruit of the vineyard: but the husbandmen beat him, and sent '
  - type: text
    content: him
  - type: text
    content: ' away empty.'
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'And again he sent another servant: and they beat him also, and entreated '
  - type: text
    content: him
  - type: text
    content: ' shamefully, and sent '
  - type: text
    content: him
  - type: text
    content: ' away empty.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'And again he sent a third: and they wounded him also, and cast '
  - type: text
    content: him
  - type: text
    content: ' out.'
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Then said the lord of the vineyard, What shall I do? I will send my beloved son: it may be they will reverence '
  - type: text
    content: him
  - type: text
    content: ' when they see him.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'But when the husbandmen saw him, they reasoned among themselves, saying, This is the heir: come, let us kill him, that the inheritance may be our''s.'
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'So they cast him out of the vineyard, and killed '
  - type: text
    content: him
  - type: text
    content: . What therefore shall the lord of the vineyard do unto them?
  - type: text
    content: ' '
  '16':
  - type: text
    content: He shall come and destroy these husbandmen, and shall give the vineyard to others.
  - type: text
    content: ' And when they heard '
  - type: text
    content: it
  - type: text
    content: ', they said, God forbid. '
  '17':
  - type: text
    content: 'And he beheld them, and said, '
  - type: text
    content: What is this then that is written,
  - type: text
    content: The stone which the builders rejected,
  - type: text
    content: The same is become the head of the corner?
  '18':
  - type: text
    content: ' '
  - type: text
    content: Whosoever shall fall upon that stone shall be broken; but on whomsoever it shall fall, it will grind him to powder.
  - type: heading
    content: Chief Priests and Scribes
  '19':
  - type: text
    content: 'And the chief priests and the scribes the same hour sought to lay hands on him; and they feared the people: for they perceived that he had spoken this parable against them. '
  '2':
  - type: text
    content: 'and spake unto him, saying, Tell us, by what authority doest thou these things? or who is he that gave thee this authority? '
  '20':
  - type: text
    content: 'And they watched '
  - type: text
    content: him
  - type: text
    content: ', and sent forth spies, which should feign themselves just men, that they might take hold of his words, that so they might deliver him unto the power and authority of the governor. '
  '21':
  - type: text
    content: 'And they asked him, saying, Master, we know that thou sayest and teachest rightly, neither acceptest thou the person '
  - type: text
    content: of any
  - type: text
    content: ', but teachest the way of God truly: '
  '22':
  - type: text
    content: 'Is it lawful for us to give tribute unto Cæsar, or no? '
  '23':
  - type: text
    content: 'But he perceived their craftiness, and said unto them, '
  - type: text
    content: Why tempt ye me?
  - type: text
    content: ' '
  '24':
  - type: text
    content: Shew me a penny. Whose image and superscription hath it?
  - type: text
    content: ' They answered and said, Cæsar''s. '
  '25':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: Render therefore unto Cæsar the things which be Cæsar's, and unto God the things which be God's.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'And they could not take hold of his words before the people: and they marvelled at his answer, and held their peace.'
  - type: heading
    content: Sadducees
  '27':
  - type: text
    content: 'Then came to '
  - type: text
    content: him
  - type: text
    content: ' certain of the Sadducees, which deny that there is any resurrection; and they asked him, '
  '28':
  - type: text
    content: 'saying, Master, Moses wrote unto us, If any man''s brother die, having a wife, and he die without children, that his brother should take his wife, and raise up seed unto his brother. '
  '29':
  - type: text
    content: 'There were therefore seven brethren: and the first took a wife, and died without children. '
  '3':
  - type: text
    content: 'And he answered and said unto them, '
  - type: text
    content: 'I will also ask you one thing; and answer me:'
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'And the second took her to wife, and he died childless. '
  '31':
  - type: text
    content: 'And the third took her; and in like manner the seven also: and they left no children, and died. '
  '32':
  - type: text
    content: 'Last of all the woman died also. '
  '33':
  - type: text
    content: Therefore in the resurrection whose wife of them is she? for seven had her to wife.
  '34':
  - type: text
    content: 'And Jesus answering said unto them, '
  - type: text
    content: 'The children of this world marry, and are given in marriage:'
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'but they which shall be accounted worthy to obtain that world, and the resurrection from the dead, neither marry, nor are given in marriage:'
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'neither can they die any more: for they are equal unto the angels; and are the children of God, being the children of the resurrection.'
  - type: text
    content: ' '
  '37':
  - type: text
    content: Now that the dead are raised, even Moses shewed at the bush, when he calleth the Lord the God of Abraham, and the God of Isaac, and the God of Jacob.
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'For he is not a God of the dead, but of the living: for all live unto him.'
  - type: heading
    content: David's Son
  '39':
  - type: text
    content: 'Then certain of the scribes answering said, Master, thou hast well said. '
  '4':
  - type: text
    content: The baptism of John, was it from heaven, or of men?
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'And after that they durst not ask him any '
  - type: text
    content: question at all
  - type: text
    content: '. '
  '41':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: How say they that Christ is David's son?
  - type: text
    content: ' '
  '42':
  - type: text
    content: And David himself saith in the book of Psalms,
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' said unto my Lord,'
  - type: text
    content: Sit thou on my right hand,
  '43':
  - type: text
    content: ' '
  - type: text
    content: Till I make thine enemies thy footstool.
  '44':
  - type: text
    content: ' '
  - type: text
    content: David therefore calleth him Lord, how is he then his son?
  '45':
  - type: text
    content: 'Then in the audience of all the people he said unto his disciples, '
  '46':
  - type: text
    content: Beware of the scribes, which desire to walk in long robes, and love greetings in the markets, and the highest seats in the synagogues, and the chief rooms at feasts;
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'which devour widows'' houses, and for a shew make long prayers: the same shall receive greater damnation.'
  '5':
  - type: text
    content: 'And they reasoned with themselves, saying, If we shall say, From heaven; he will say, Why then believed ye him not? '
  '6':
  - type: text
    content: 'But and if we say, Of men; all the people will stone us: for they be persuaded that John was a prophet. '
  '7':
  - type: text
    content: 'And they answered, that they could not tell whence '
  - type: text
    content: it was
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'And Jesus said unto them, '
  - type: text
    content: Neither tell I you by what authority I do these things.
  - type: heading
    content: Wicked Husbandmen
  '9':
  - type: text
    content: 'Then began he to speak to the people this parable; '
  - type: text
    content: A certain man planted a vineyard, and let it forth to husbandmen, and went into a far country for a long time.
  - type: text
    content: ' '
