document_id: GEN.50
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Joseph fell upon his father''s face, and wept upon him, and kissed him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Joseph commanded his servants the physicians to embalm his father: and the physicians embalmed Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And forty days were fulfilled for him; for so are fulfilled the days of those which are embalmed: and the Egyptians mourned for him threescore and ten days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And when the days of his mourning were past, Joseph spake unto the house of Pharaoh, saying, If now I have found grace in your eyes, speak, I pray you, in the ears of Pharaoh, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'My father made me swear, saying, Lo, I die: in my grave which I have digged for me in the land of Canaan, there shalt thou bury me. Now therefore let me go up, I pray thee, and bury my father, and I will come again. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And Pharaoh said, Go up, and bury thy father, according as he made thee swear.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And Joseph went up to bury his father: and with him went up all the servants of Pharaoh, the elders of his house, and all the elders of the land of Egypt, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and all the house of Joseph, and his brethren, and his father''s house: only their little ones, and their flocks, and their herds, they left in the land of Goshen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And there went up with him both chariots and horsemen: and it was a very great company. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And they came to the threshingfloor of Atad, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' beyond Jordan, and there they mourned with a great and very sore lamentation: and he made a mourning for his father seven days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And when the inhabitants of the land, the Canaanites, saw the mourning in the floor of Atad, they said, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a grievous mourning to the Egyptians: wherefore the name of it was called Abel-mizraim, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' beyond Jordan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And his sons did unto him according as he commanded them: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'for his sons carried him into the land of Canaan, and buried him in the cave of the field of Machpelah, which Abraham bought with the field for a possession of a buryingplace of Ephron the Hittite, before Mamre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And Joseph returned into Egypt, he, and his brethren, and all that went up with him to bury his father, after he had buried his father.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Death of Joseph
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And when Joseph''s brethren saw that their father was dead, they said, Joseph will peradventure hate us, and will certainly requite us all the evil which we did unto him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And they sent a messenger unto Joseph, saying, Thy father did command before he died, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So shall ye say unto Joseph, Forgive, I pray thee now, the trespass of thy brethren, and their sin; for they did unto thee evil: and now, we pray thee, forgive the trespass of the servants of the God of thy father. And Joseph wept when they spake unto him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And his brethren also went and fell down before his face; and they said, Behold, we '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' thy servants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And Joseph said unto them, Fear not: for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' I in the place of God? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But as for you, ye thought evil against me; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' God meant it unto good, to bring to pass, as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' this day, to save much people alive. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Now therefore fear ye not: I will nourish you, and your little ones. And he comforted them, and spake kindly unto them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And Joseph dwelt in Egypt, he, and his father''s house: and Joseph lived an hundred and ten years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And Joseph saw Ephraim''s children of the third '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'generation:'
  - type: text
    text: ' the children also of Machir the son of Manasseh were brought up upon Joseph''s knees. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And Joseph said unto his brethren, I die: and God will surely visit you, and bring you out of this land unto the land which he sware to Abraham, to Isaac, and to Jacob. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And Joseph took an oath of the children of Israel, saying, God will surely visit you, and ye shall carry up my bones from hence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'So Joseph died, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' an hundred and ten years old: and they embalmed him, and he was put in a coffin in Egypt.'
