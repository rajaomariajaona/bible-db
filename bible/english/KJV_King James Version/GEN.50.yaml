verses:
  '1':
  - type: text
    content: 'And Joseph fell upon his father''s face, and wept upon him, and kissed him. '
  '10':
  - type: text
    content: 'And they came to the threshingfloor of Atad, which '
  - type: text
    content: is
  - type: text
    content: ' beyond Jordan, and there they mourned with a great and very sore lamentation: and he made a mourning for his father seven days. '
  '11':
  - type: text
    content: 'And when the inhabitants of the land, the Canaanites, saw the mourning in the floor of Atad, they said, This '
  - type: text
    content: is
  - type: text
    content: ' a grievous mourning to the Egyptians: wherefore the name of it was called Abel-mizraim, which '
  - type: text
    content: is
  - type: text
    content: ' beyond Jordan. '
  '12':
  - type: text
    content: 'And his sons did unto him according as he commanded them: '
  '13':
  - type: text
    content: 'for his sons carried him into the land of Canaan, and buried him in the cave of the field of Machpelah, which Abraham bought with the field for a possession of a buryingplace of Ephron the Hittite, before Mamre. '
  '14':
  - type: text
    content: And Joseph returned into Egypt, he, and his brethren, and all that went up with him to bury his father, after he had buried his father.
  - type: heading
    content: Death of Joseph
  '15':
  - type: text
    content: 'And when Joseph''s brethren saw that their father was dead, they said, Joseph will peradventure hate us, and will certainly requite us all the evil which we did unto him. '
  '16':
  - type: text
    content: 'And they sent a messenger unto Joseph, saying, Thy father did command before he died, saying, '
  '17':
  - type: text
    content: 'So shall ye say unto Joseph, Forgive, I pray thee now, the trespass of thy brethren, and their sin; for they did unto thee evil: and now, we pray thee, forgive the trespass of the servants of the God of thy father. And Joseph wept when they spake unto him. '
  '18':
  - type: text
    content: 'And his brethren also went and fell down before his face; and they said, Behold, we '
  - type: text
    content: be
  - type: text
    content: ' thy servants. '
  '19':
  - type: text
    content: 'And Joseph said unto them, Fear not: for '
  - type: text
    content: am
  - type: text
    content: ' I in the place of God? '
  '2':
  - type: text
    content: 'And Joseph commanded his servants the physicians to embalm his father: and the physicians embalmed Israel. '
  '20':
  - type: text
    content: 'But as for you, ye thought evil against me; '
  - type: text
    content: but
  - type: text
    content: ' God meant it unto good, to bring to pass, as '
  - type: text
    content: it is
  - type: text
    content: ' this day, to save much people alive. '
  '21':
  - type: text
    content: 'Now therefore fear ye not: I will nourish you, and your little ones. And he comforted them, and spake kindly unto them.'
  '22':
  - type: text
    content: 'And Joseph dwelt in Egypt, he, and his father''s house: and Joseph lived an hundred and ten years. '
  '23':
  - type: text
    content: 'And Joseph saw Ephraim''s children of the third '
  - type: text
    content: 'generation:'
  - type: text
    content: ' the children also of Machir the son of Manasseh were brought up upon Joseph''s knees. '
  '24':
  - type: text
    content: 'And Joseph said unto his brethren, I die: and God will surely visit you, and bring you out of this land unto the land which he sware to Abraham, to Isaac, and to Jacob. '
  '25':
  - type: text
    content: 'And Joseph took an oath of the children of Israel, saying, God will surely visit you, and ye shall carry up my bones from hence. '
  '26':
  - type: text
    content: 'So Joseph died, '
  - type: text
    content: being
  - type: text
    content: ' an hundred and ten years old: and they embalmed him, and he was put in a coffin in Egypt.'
  '3':
  - type: text
    content: 'And forty days were fulfilled for him; for so are fulfilled the days of those which are embalmed: and the Egyptians mourned for him threescore and ten days.'
  '4':
  - type: text
    content: 'And when the days of his mourning were past, Joseph spake unto the house of Pharaoh, saying, If now I have found grace in your eyes, speak, I pray you, in the ears of Pharaoh, saying, '
  '5':
  - type: text
    content: 'My father made me swear, saying, Lo, I die: in my grave which I have digged for me in the land of Canaan, there shalt thou bury me. Now therefore let me go up, I pray thee, and bury my father, and I will come again. '
  '6':
  - type: text
    content: And Pharaoh said, Go up, and bury thy father, according as he made thee swear.
  '7':
  - type: text
    content: 'And Joseph went up to bury his father: and with him went up all the servants of Pharaoh, the elders of his house, and all the elders of the land of Egypt, '
  '8':
  - type: text
    content: 'and all the house of Joseph, and his brethren, and his father''s house: only their little ones, and their flocks, and their herds, they left in the land of Goshen. '
  '9':
  - type: text
    content: 'And there went up with him both chariots and horsemen: and it was a very great company. '
