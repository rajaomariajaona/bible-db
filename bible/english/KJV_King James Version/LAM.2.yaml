- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he hath violently taken away his tabernacle, as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: if it were of
  - type: text
    text: ' a garden:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He hath destroyed his places of the assembly:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath caused the solemn feasts'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And sabbaths to be forgotten in Zion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And hath despised in the indignation of his anger
- type: usfm
  marker: q2
  children:
  - type: text
    text: The king and the priest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The Lord hath cast off his altar,
- type: usfm
  marker: q2
  children:
  - type: text
    text: He hath abhorred his sanctuary,
- type: usfm
  marker: q1
  children:
  - type: text
    text: He hath given up into the hand of the enemy
- type: usfm
  marker: q2
  children:
  - type: text
    text: The walls of her palaces;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They have made a noise in the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: As in the day of a solemn feast.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath purposed to destroy'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The wall of the daughter of Zion:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He hath stretched out a line,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He hath not withdrawn his hand from destroying:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore he made the rampart and the wall to lament;
- type: usfm
  marker: q2
  children:
  - type: text
    text: They languished together.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Her gates are sunk into the ground;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He hath destroyed and broken her bars:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Her king and her princes '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' among the Gentiles:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The law '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' no '
  - type: usfm
    marker: add
    children:
    - type: text
      text: more
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her prophets also find
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'No vision from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The elders of the daughter of Zion
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Sit upon the ground, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' keep silence:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have cast up dust upon their heads;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They have girded themselves with sackcloth:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The virgins of Jerusalem
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hang down their heads to the ground.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mine eyes do fail with tears,
- type: usfm
  marker: q2
  children:
  - type: text
    text: My bowels are troubled,
- type: usfm
  marker: q1
  children:
  - type: text
    text: My liver is poured upon the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: For the destruction of the daughter of my people;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because the children and the sucklings swoon
- type: usfm
  marker: q2
  children:
  - type: text
    text: In the streets of the city.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: They say to their mothers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' corn and wine?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: When they swooned as the wounded
- type: usfm
  marker: q2
  children:
  - type: text
    text: In the streets of the city,
- type: usfm
  marker: q1
  children:
  - type: text
    text: When their soul was poured out
- type: usfm
  marker: q2
  children:
  - type: text
    text: Into their mothers' bosom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: What thing shall I take to witness for thee? what thing shall I liken to thee,
- type: usfm
  marker: q2
  children:
  - type: text
    text: O daughter of Jerusalem?
- type: usfm
  marker: q1
  children:
  - type: text
    text: What shall I equal to thee, that I may comfort thee,
- type: usfm
  marker: q2
  children:
  - type: text
    text: O virgin daughter of Zion?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For thy breach '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' great like the sea:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who can heal thee?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Thy prophets have seen vain
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And foolish things for thee:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they have not discovered thine iniquity,
- type: usfm
  marker: q2
  children:
  - type: text
    text: To turn away thy captivity;
- type: usfm
  marker: q1
  children:
  - type: text
    text: But have seen for thee false burdens
- type: usfm
  marker: q2
  children:
  - type: text
    text: And causes of banishment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: All that pass by clap
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Their
  - type: text
    text: ' hands at thee;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They hiss and wag their head
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'At the daughter of Jerusalem, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saying
  - type: text
    text: ','
