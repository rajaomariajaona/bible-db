- type: usfm
  marker: q2
  children:
  - type: text
    text: 'All the habitations of Jacob, and hath not pitied:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He hath thrown down in his wrath
- type: usfm
  marker: q2
  children:
  - type: text
    text: The strong holds of the daughter of Judah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He hath brought '
