  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is
  - type: text
    text: ' this the city that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' call'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The perfection of beauty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: The joy of the whole earth?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: All thine enemies
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Have opened their mouth against thee:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They hiss and gnash the teeth:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They say, We have swallowed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her
  - type: text
    text: ' up:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Certainly this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the day that we looked for;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'We have found, we have seen '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: .
