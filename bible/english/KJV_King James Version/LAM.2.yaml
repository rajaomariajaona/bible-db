  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath done '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' which he had devised;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He hath fulfilled his word
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'That he had commanded in the days of old:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He hath thrown down, and hath not pitied:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And he hath caused '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thine
  - type: text
    text: ' enemy to rejoice over thee,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He hath set up the horn of thine adversaries.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Their heart cried unto the Lord,
- type: usfm
  marker: q2
  children:
  - type: text
    text: O wall of the daughter of Zion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let tears run down like a river
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Day and night:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Give thyself no rest;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let not the apple of thine eye cease.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Arise, cry out in the night:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: In the beginning of the watches
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour out thine heart like water
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Before the face of the Lord:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lift up thy hands toward him for the life
- type: usfm
  marker: q2
  children:
  - type: text
    text: Of thy young children,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That faint for hunger
- type: usfm
  marker: q2
  children:
  - type: text
    text: In the top of every street.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Behold, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: And consider to whom thou hast done this.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shall the women eat their fruit,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' children of a span long?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shall the priest and the prophet be slain
- type: usfm
  marker: q2
  children:
  - type: text
    text: In the sanctuary of the Lord?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The young and the old lie
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'On the ground in the streets:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: My virgins and my young men
- type: usfm
  marker: q2
  children:
  - type: text
    text: Are fallen by the sword;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Thou hast slain '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' in the day of thine anger;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Thou hast killed, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' not pitied.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Thou hast called as in a solemn day
- type: usfm
  marker: q2
  children:
  - type: text
    text: My terrors round about,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'So that in the day of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s anger'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'None escaped nor remained:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those that I have swaddled and brought up hath
- type: usfm
  marker: q2
  children:
  - type: text
    text: Mine enemy consumed.
