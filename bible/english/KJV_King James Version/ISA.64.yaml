document_id: ISA.64,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Oh that thou wouldest rend the heavens, that thou wouldest come down, that the mountains might flow down at thy presence, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thy holy cities are a wilderness, Zion is a wilderness, Jerusalem a desolation. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Our holy and our beautiful house, where our fathers praised thee, is burned up with fire: and all our pleasant things are laid waste. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wilt thou refrain thyself for these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ', O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '? wilt thou hold thy peace, and afflict us very sore?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: when
    - type: text
      text: ' the melting fire burneth, the fire causeth the waters to boil, to make thy name known to thine adversaries, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the nations may tremble at thy presence! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When thou didst terrible things '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' we looked not for, thou camest down, the mountains flowed down at thy presence. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For since the beginning of the world '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' have not heard, nor perceived by the ear, neither hath the eye seen, O God, beside thee, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: what
    - type: text
      text: ' he hath prepared for him that waiteth for him.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou meetest him that rejoiceth and worketh righteousness, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: those that
    - type: text
      text: ' remember thee in thy ways: behold, thou art wroth; for we have sinned: in those is continuance, and we shall be saved. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But we are all as an unclean '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thing
    - type: text
      text: ', and all our righteousnesses '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' as filthy rags; and we all do fade as a leaf; and our iniquities, like the wind, have taken us away. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none that calleth upon thy name, that stirreth up himself to take hold of thee: for thou hast hid thy face from us, and hast consumed us, because of our iniquities.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But now, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' our father; we '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the clay, and thou our potter; and we all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the work of thy hand. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be not wroth very sore, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', neither remember iniquity for ever: behold, see, we beseech thee, we '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' all thy people. '
