document_id: JER.40,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Stays with the Remnant
  - type: text
    content: 'The word that came to Jeremiah from the '
  - type: text
    content: LORD
  - type: text
    content: ', after that Nebuzar-adan the captain of the guard had let him go from Ramah, when he had taken him being bound in chains among all that were carried away captive of Jerusalem and Judah, which were carried away captive unto Babylon. '
  '10':
  - type: text
    content: 'As for me, behold, I will dwell at Mizpah to serve the Chaldeans, which will come unto us: but ye, gather ye wine, and summer fruits, and oil, and put '
  - type: text
    content: them
  - type: text
    content: ' in your vessels, and dwell in your cities that ye have taken.'
  '11':
  - type: text
    content: 'Likewise when all the Jews that '
  - type: text
    content: were
  - type: text
    content: ' in Moab, and among the Ammonites, and in Edom, and that '
  - type: text
    content: were
  - type: text
    content: ' in all the countries, heard that the king of Babylon had left a remnant of Judah, and that he had set over them Gedaliah the son of Ahikam the son of Shaphan; '
  '12':
  - type: text
    content: even all the Jews returned out of all places whither they were driven, and came to the land of Judah, to Gedaliah, unto Mizpah, and gathered wine and summer fruits very much.
  - type: heading
    content: Murder of the Governor
  '13':
  - type: text
    content: 'Moreover Johanan the son of Kareah, and all the captains of the forces that '
  - type: text
    content: were
  - type: text
    content: ' in the fields, came to Gedaliah to Mizpah, '
  '14':
  - type: text
    content: 'and said unto him, Dost thou certainly know that Baalis the king of the Ammonites hath sent Ishmael the son of Nethaniah to slay thee? But Gedaliah the son of Ahikam believed them not. '
  '15':
  - type: text
    content: 'Then Johanan the son of Kareah spake to Gedaliah in Mizpah secretly, saying, Let me go, I pray thee, and I will slay Ishmael the son of Nethaniah, and no man shall know '
  - type: text
    content: 'it:'
  - type: text
    content: ' wherefore should he slay thee, that all the Jews which are gathered unto thee should be scattered, and the remnant in Judah perish?'
  '16':
  - type: text
    content: 'But Gedaliah the son of Ahikam said unto Johanan the son of Kareah, Thou shalt not do this thing: for thou speakest falsely of Ishmael.'
  '2':
  - type: text
    content: 'And the captain of the guard took Jeremiah, and said unto him, The '
  - type: text
    content: LORD
  - type: text
    content: ' thy God hath pronounced this evil upon this place. '
  '3':
  - type: text
    content: 'Now the '
  - type: text
    content: LORD
  - type: text
    content: ' hath brought '
  - type: text
    content: it
  - type: text
    content: ', and done according as he hath said: because ye have sinned against the '
  - type: text
    content: LORD
  - type: text
    content: ', and have not obeyed his voice, therefore this thing is come upon you. '
  '4':
  - type: text
    content: 'And now, behold, I loose thee this day from the chains which '
  - type: text
    content: were
  - type: text
    content: ' upon thine hand. If it seem good unto thee to come with me into Babylon, come; and I will look well unto thee: but if it seem ill unto thee to come with me into Babylon, forbear: behold, all the land '
  - type: text
    content: is
  - type: text
    content: ' before thee: whither it seemeth good and convenient for thee to go, thither go. '
  '5':
  - type: text
    content: 'Now while he was not yet gone back, '
  - type: text
    content: he said
  - type: text
    content: ', Go back also to Gedaliah the son of Ahikam the son of Shaphan, whom the king of Babylon hath made governor over the cities of Judah, and dwell with him among the people: or go wheresoever it seemeth convenient unto thee to go. So the captain of the guard gave him victuals and a reward, and let him go. '
  '6':
  - type: text
    content: Then went Jeremiah unto Gedaliah the son of Ahikam to Mizpah; and dwelt with him among the people that were left in the land.
  '7':
  - type: text
    content: 'Now when all the captains of the forces which '
  - type: text
    content: were
  - type: text
    content: ' in the fields, '
  - type: text
    content: even
  - type: text
    content: ' they and their men, heard that the king of Babylon had made Gedaliah the son of Ahikam governor in the land, and had committed unto him men, and women, and children, and of the poor of the land, of them that were not carried away captive to Babylon; '
  '8':
  - type: text
    content: 'then they came to Gedaliah to Mizpah, even Ishmael the son of Nethaniah, and Johanan and Jonathan the sons of Kareah, and Seraiah the son of Tanhumeth, and the sons of Ephai the Netophathite, and Jezaniah the son of a Maachathite, they and their men. '
  '9':
  - type: text
    content: 'And Gedaliah the son of Ahikam the son of Shaphan sware unto them and to their men, saying, Fear not to serve the Chaldeans: dwell in the land, and serve the king of Babylon, and it shall be well with you. '
