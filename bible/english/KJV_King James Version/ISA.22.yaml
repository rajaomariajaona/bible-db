document_id: ISA.22
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The burden of the valley of vision.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'What aileth thee now, that thou art wholly gone up to the housetops? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Thou that art full of stirs, a tumultuous city, a joyous city: thy slain '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men are
  - type: text
    text: ' not slain with the sword, nor dead in battle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'All thy rulers are fled together, they are bound by the archers: all that are found in thee are bound together, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' have fled from far. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Therefore said I, Look away from me; I will weep bitterly, labour not to comfort me, because of the spoiling of the daughter of my people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' a day of trouble, and of treading down, and of perplexity by the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' of hosts in the valley of vision, breaking down the walls, and of crying to the mountains.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Elam bare the quiver with chariots of men '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' horsemen, and Kir uncovered the shield. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And it shall come to pass, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' thy choicest valleys shall be full of chariots, and the horsemen shall set themselves in array at the gate. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And he discovered the covering of Judah, and thou didst look in that day to the armour of the house of the forest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ye have seen also the breaches of the city of David, that they are many: and ye gathered together the waters of the lower pool. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And ye have numbered the houses of Jerusalem, and the houses have ye broken down to fortify the wall. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ye made also a ditch between the two walls for the water of the old pool: but ye have not looked unto the maker thereof, neither had respect unto him that fashioned it long ago.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And in that day did the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' of hosts call to weeping, and to mourning, and to baldness, and to girding with sackcloth: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and behold joy and gladness, slaying oxen, and killing sheep, eating flesh, and drinking wine: let us eat and drink; for to morrow we shall die. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And it was revealed in mine ears by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, Surely this iniquity shall not be purged from you till ye die, saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' of hosts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' of hosts, Go, get thee unto this treasurer, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' unto Shebna, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' over the house, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and say
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'What hast thou here? and whom hast thou here, that thou hast hewed thee out a sepulchre here, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' he that heweth him out a sepulchre on high, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' that graveth an habitation for himself in a rock? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Behold, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will carry thee away with a mighty captivity, and will surely cover thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'He will surely violently turn and toss thee '
  - type: usfm
    marker: add
    children:
    - type: text
      text: like
  - type: text
    text: ' a ball into a large country: there shalt thou die, and there the chariots of thy glory '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the shame of thy lord''s house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And I will drive thee from thy station, and from thy state shall he pull thee down. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And it shall come to pass in that day, that I will call my servant Eliakim the son of Hilkiah: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'and I will clothe him with thy robe, and strengthen him with thy girdle, and I will commit thy government into his hand: and he shall be a father to the inhabitants of Jerusalem, and to the house of Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And the key of the house of David will I lay upon his shoulder; so he shall open, and none shall shut; and he shall shut, and none shall open. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And I will fasten him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' a nail in a sure place; and he shall be for a glorious throne to his father''s house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And they shall hang upon him all the glory of his father''s house, the offspring and the issue, all vessels of small quantity, from the vessels of cups, even to all the vessels of flagons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'In that day, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, shall the nail that is fastened in the sure place be removed, and be cut down, and fall; and the burden that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' upon it shall be cut off: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath spoken '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: .
