document_id: ISA.22,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem
  - type: text
    content: The burden of the valley of vision.
  - type: text
    content: 'What aileth thee now, that thou art wholly gone up to the housetops? '
  '10':
  - type: text
    content: 'And ye have numbered the houses of Jerusalem, and the houses have ye broken down to fortify the wall. '
  '11':
  - type: text
    content: 'Ye made also a ditch between the two walls for the water of the old pool: but ye have not looked unto the maker thereof, neither had respect unto him that fashioned it long ago.'
  '12':
  - type: text
    content: 'And in that day did the Lord '
  - type: text
    content: GOD
  - type: text
    content: ' of hosts call to weeping, and to mourning, and to baldness, and to girding with sackcloth: '
  '13':
  - type: text
    content: 'and behold joy and gladness, slaying oxen, and killing sheep, eating flesh, and drinking wine: let us eat and drink; for to morrow we shall die. '
  '14':
  - type: text
    content: 'And it was revealed in mine ears by the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, Surely this iniquity shall not be purged from you till ye die, saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: ' of hosts.'
  '15':
  - type: text
    content: 'Thus saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: ' of hosts, Go, get thee unto this treasurer, '
  - type: text
    content: even
  - type: text
    content: ' unto Shebna, which '
  - type: text
    content: is
  - type: text
    content: ' over the house, '
  - type: text
    content: and say
  - type: text
    content: ', '
  '16':
  - type: text
    content: 'What hast thou here? and whom hast thou here, that thou hast hewed thee out a sepulchre here, '
  - type: text
    content: as
  - type: text
    content: ' he that heweth him out a sepulchre on high, '
  - type: text
    content: and
  - type: text
    content: ' that graveth an habitation for himself in a rock? '
  '17':
  - type: text
    content: 'Behold, the '
  - type: text
    content: LORD
  - type: text
    content: ' will carry thee away with a mighty captivity, and will surely cover thee. '
  '18':
  - type: text
    content: 'He will surely violently turn and toss thee '
  - type: text
    content: like
  - type: text
    content: ' a ball into a large country: there shalt thou die, and there the chariots of thy glory '
  - type: text
    content: shall be
  - type: text
    content: ' the shame of thy lord''s house. '
  '19':
  - type: text
    content: 'And I will drive thee from thy station, and from thy state shall he pull thee down. '
  '2':
  - type: text
    content: 'Thou that art full of stirs, a tumultuous city, a joyous city: thy slain '
  - type: text
    content: men are
  - type: text
    content: ' not slain with the sword, nor dead in battle. '
  '20':
  - type: text
    content: 'And it shall come to pass in that day, that I will call my servant Eliakim the son of Hilkiah: '
  '21':
  - type: text
    content: 'and I will clothe him with thy robe, and strengthen him with thy girdle, and I will commit thy government into his hand: and he shall be a father to the inhabitants of Jerusalem, and to the house of Judah. '
  '22':
  - type: text
    content: 'And the key of the house of David will I lay upon his shoulder; so he shall open, and none shall shut; and he shall shut, and none shall open. '
  '23':
  - type: text
    content: 'And I will fasten him '
  - type: text
    content: as
  - type: text
    content: ' a nail in a sure place; and he shall be for a glorious throne to his father''s house. '
  '24':
  - type: text
    content: 'And they shall hang upon him all the glory of his father''s house, the offspring and the issue, all vessels of small quantity, from the vessels of cups, even to all the vessels of flagons. '
  '25':
  - type: text
    content: 'In that day, saith the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, shall the nail that is fastened in the sure place be removed, and be cut down, and fall; and the burden that '
  - type: text
    content: was
  - type: text
    content: ' upon it shall be cut off: for the '
  - type: text
    content: LORD
  - type: text
    content: ' hath spoken '
  - type: text
    content: it
  - type: text
    content: .
  '3':
  - type: text
    content: 'All thy rulers are fled together, they are bound by the archers: all that are found in thee are bound together, '
  - type: text
    content: which
  - type: text
    content: ' have fled from far. '
  '4':
  - type: text
    content: 'Therefore said I, Look away from me; I will weep bitterly, labour not to comfort me, because of the spoiling of the daughter of my people. '
  '5':
  - type: text
    content: 'For '
  - type: text
    content: it is
  - type: text
    content: ' a day of trouble, and of treading down, and of perplexity by the Lord '
  - type: text
    content: GOD
  - type: text
    content: ' of hosts in the valley of vision, breaking down the walls, and of crying to the mountains.'
  '6':
  - type: text
    content: 'And Elam bare the quiver with chariots of men '
  - type: text
    content: and
  - type: text
    content: ' horsemen, and Kir uncovered the shield. '
  '7':
  - type: text
    content: 'And it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ' thy choicest valleys shall be full of chariots, and the horsemen shall set themselves in array at the gate. '
  '8':
  - type: text
    content: 'And he discovered the covering of Judah, and thou didst look in that day to the armour of the house of the forest. '
  '9':
  - type: text
    content: 'Ye have seen also the breaches of the city of David, that they are many: and ye gathered together the waters of the lower pool. '
