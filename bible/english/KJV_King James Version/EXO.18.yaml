document_id: EXO.18
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Jethro
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When Jethro, the priest of Midian, Moses'' father in law, heard of all that God had done for Moses, and for Israel his people, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had brought Israel out of Egypt; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'then Jethro, Moses'' father in law, took Zipporah, Moses'' wife, after he had sent her back, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and her two sons; of which the name of the one '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Gershom; for he said, I have been an alien in a strange land: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and the name of the other '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Eliezer; for the God of my father, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: said he, was
  - type: text
    text: ' mine help, and delivered me from the sword of Pharaoh: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and Jethro, Moses'' father in law, came with his sons and his wife unto Moses into the wilderness, where he encamped at the mount of God: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: and he said unto Moses, I thy father in law Jethro am come unto thee, and thy wife, and her two sons with her.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And Moses went out to meet his father in law, and did obeisance, and kissed him; and they asked each other of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' welfare; and they came into the tent. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Moses told his father in law all that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had done unto Pharaoh and to the Egyptians for Israel''s sake, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' all the travail that had come upon them by the way, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: how
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' delivered them. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And Jethro rejoiced for all the goodness which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had done to Israel, whom he had delivered out of the hand of the Egyptians. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Jethro said, Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', who hath delivered you out of the hand of the Egyptians, and out of the hand of Pharaoh, who hath delivered the people from under the hand of the Egyptians. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now I know that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' greater than all gods: for in the thing wherein they dealt proudly '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he was
  - type: text
    text: ' above them. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Jethro, Moses'' father in law, took a burnt offering and sacrifices for God: and Aaron came, and all the elders of Israel, to eat bread with Moses'' father in law before God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And it came to pass on the morrow, that Moses sat to judge the people: and the people stood by Moses from the morning unto the evening. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And when Moses'' father in law saw all that he did to the people, he said, What '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this thing that thou doest to the people? why sittest thou thyself alone, and all the people stand by thee from morning unto even? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Moses said unto his father in law, Because the people come unto me to enquire of God: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'when they have a matter, they come unto me; and I judge between one and another, and I do make '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' know the statutes of God, and his laws.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And Moses'' father in law said unto him, The thing that thou doest '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not good. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Thou wilt surely wear away, both thou, and this people that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with thee: for this thing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' too heavy for thee; thou art not able to perform it thyself alone. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hearken now unto my voice, I will give thee counsel, and God shall be with thee: Be thou for the people to God-ward, that thou mayest bring the causes unto God: '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'and thou shalt teach them ordinances and laws, and shalt shew them the way wherein they must walk, and the work that they must do. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Moreover thou shalt provide out of all the people able men, such as fear God, men of truth, hating covetousness; and place '
  - type: usfm
    marker: add
    children:
    - type: text
      text: such
  - type: text
    text: ' over them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' rulers of thousands, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' rulers of hundreds, rulers of fifties, and rulers of tens: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'and let them judge the people at all seasons: and it shall be, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' every great matter they shall bring unto thee, but every small matter they shall judge: so shall it be easier for thyself, and they shall bear '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the burden
  - type: text
    text: ' with thee. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'If thou shalt do this thing, and God command thee '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ', then thou shalt be able to endure, and all this people shall also go to their place in peace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So Moses hearkened to the voice of his father in law, and did all that he had said. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And Moses chose able men out of all Israel, and made them heads over the people, rulers of thousands, rulers of hundreds, rulers of fifties, and rulers of tens. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And they judged the people at all seasons: the hard causes they brought unto Moses, but every small matter they judged themselves. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: And Moses let his father in law depart; and he went his way into his own land.
