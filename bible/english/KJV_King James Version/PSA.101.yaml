document_id: PSA.101,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will sing of mercy and judgment:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Unto thee, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', will I sing.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will behave myself wisely
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In a perfect way.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O when wilt thou come unto me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will walk within my house with a perfect heart.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will set no wicked thing before mine eyes: I hate the work of them that turn aside;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: It
    - type: text
      text: ' shall not cleave to me.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A froward heart shall depart from me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will not know a wicked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: person
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whoso privily slandereth his neighbour,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Him will I cut off:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Him that hath an high look
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a proud heart will not I suffer.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mine eyes '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' upon the faithful'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Of the land, that they may dwell with me:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He that walketh in a perfect way,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shall serve me.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He that worketh deceit shall not dwell within my house:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He that telleth lies shall not tarry in my sight.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will early destroy all the wicked of the land; That I may cut off
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'All wicked doers from the city of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
