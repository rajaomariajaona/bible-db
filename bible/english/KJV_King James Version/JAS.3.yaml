document_id: JAS.3,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'My brethren, be not many masters, knowing that we shall receive the greater condemnation. '
  '10':
  - type: text
    content: 'Out of the same mouth proceedeth blessing and cursing. My brethren, these things ought not so to be. '
  '11':
  - type: text
    content: 'Doth a fountain send forth at the same place sweet '
  - type: text
    content: water
  - type: text
    content: ' and bitter? '
  '12':
  - type: text
    content: 'Can the fig tree, my brethren, bear olive berries? either a vine, figs? so '
  - type: text
    content: can
  - type: text
    content: ' no fountain both yield salt water and fresh.'
  '13':
  - type: text
    content: 'Who '
  - type: text
    content: is
  - type: text
    content: ' a wise man and endued with knowledge among you? let him shew out of a good conversation his works with meekness of wisdom. '
  '14':
  - type: text
    content: 'But if ye have bitter envying and strife in your hearts, glory not, and lie not against the truth. '
  '15':
  - type: text
    content: 'This wisdom descendeth not from above, but '
  - type: text
    content: is
  - type: text
    content: ' earthly, sensual, devilish. '
  '16':
  - type: text
    content: 'For where envying and strife '
  - type: text
    content: is
  - type: text
    content: ', there '
  - type: text
    content: is
  - type: text
    content: ' confusion and every evil work. '
  '17':
  - type: text
    content: 'But the wisdom that is from above is first pure, then peaceable, gentle, '
  - type: text
    content: and
  - type: text
    content: ' easy to be intreated, full of mercy and good fruits, without partiality, and without hypocrisy. '
  '18':
  - type: text
    content: And the fruit of righteousness is sown in peace of them that make peace.
  '2':
  - type: text
    content: 'For in many things we offend all. If any man offend not in word, the same '
  - type: text
    content: is
  - type: text
    content: ' a perfect man, '
  - type: text
    content: and
  - type: text
    content: ' able also to bridle the whole body. '
  '3':
  - type: text
    content: 'Behold, we put bits in the horses'' mouths, that they may obey us; and we turn about their whole body. '
  '4':
  - type: text
    content: 'Behold also the ships, which though '
  - type: text
    content: they be
  - type: text
    content: ' so great, and '
  - type: text
    content: are
  - type: text
    content: ' driven of fierce winds, yet are they turned about with a very small helm, whithersoever the governor listeth. '
  '5':
  - type: text
    content: 'Even so the tongue is a little member, and boasteth great things. Behold, how great a matter a little fire kindleth! '
  '6':
  - type: text
    content: 'And the tongue '
  - type: text
    content: is
  - type: text
    content: ' a fire, a world of iniquity: so is the tongue among our members, that it defileth the whole body, and setteth on fire the course of nature; and it is set on fire of hell. '
  '7':
  - type: text
    content: 'For every kind of beasts, and of birds, and of serpents, and of things in the sea, is tamed, and hath been tamed of mankind: '
  '8':
  - type: text
    content: 'but the tongue can no man tame; '
  - type: text
    content: it is
  - type: text
    content: ' an unruly evil, full of deadly poison. '
  '9':
  - type: text
    content: 'Therewith bless we God, even the Father; and therewith curse we men, which are made after the similitude of God. '
