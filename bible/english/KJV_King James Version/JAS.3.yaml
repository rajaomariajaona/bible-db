document_id: JAS.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My brethren, be not many masters, knowing that we shall receive the greater condemnation. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Out of the same mouth proceedeth blessing and cursing. My brethren, these things ought not so to be. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Doth a fountain send forth at the same place sweet '
    - type: usfm
      marker: add
      children:
      - type: text
        text: water
    - type: text
      text: ' and bitter? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Can the fig tree, my brethren, bear olive berries? either a vine, figs? so '
    - type: usfm
      marker: add
      children:
      - type: text
        text: can
    - type: text
      text: ' no fountain both yield salt water and fresh.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a wise man and endued with knowledge among you? let him shew out of a good conversation his works with meekness of wisdom. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if ye have bitter envying and strife in your hearts, glory not, and lie not against the truth. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This wisdom descendeth not from above, but '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' earthly, sensual, devilish. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For where envying and strife '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ', there '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' confusion and every evil work. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the wisdom that is from above is first pure, then peaceable, gentle, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' easy to be intreated, full of mercy and good fruits, without partiality, and without hypocrisy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the fruit of righteousness is sown in peace of them that make peace.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For in many things we offend all. If any man offend not in word, the same '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a perfect man, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' able also to bridle the whole body. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, we put bits in the horses'' mouths, that they may obey us; and we turn about their whole body. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold also the ships, which though '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they be
    - type: text
      text: ' so great, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' driven of fierce winds, yet are they turned about with a very small helm, whithersoever the governor listeth. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Even so the tongue is a little member, and boasteth great things. Behold, how great a matter a little fire kindleth! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the tongue '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a fire, a world of iniquity: so is the tongue among our members, that it defileth the whole body, and setteth on fire the course of nature; and it is set on fire of hell. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For every kind of beasts, and of birds, and of serpents, and of things in the sea, is tamed, and hath been tamed of mankind: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but the tongue can no man tame; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' an unruly evil, full of deadly poison. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therewith bless we God, even the Father; and therewith curse we men, which are made after the similitude of God. '
