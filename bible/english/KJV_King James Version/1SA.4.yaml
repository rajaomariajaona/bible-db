  '1':
  - type: text
    content: 'And the word of Samuel came to all Israel. Now Israel went out against the Philistines to battle, and pitched beside Eben-ezer: and the Philistines pitched in Aphek. '
  '10':
  - type: text
    content: 'And the Philistines fought, and Israel was smitten, and they fled every man into his tent: and there was a very great slaughter; for there fell of Israel thirty thousand footmen. '
  '11':
  - type: text
    content: And the ark of God was taken; and the two sons of Eli, Hophni and Phinehas, were slain.
  '12':
  - type: text
    content: 'And there ran a man of Benjamin out of the army, and came to Shiloh the same day with his clothes rent, and with earth upon his head. '
  '13':
  - type: text
    content: 'And when he came, lo, Eli sat upon a seat by the wayside watching: for his heart trembled for the ark of God. And when the man came into the city, and told '
  - type: text
    content: it
  - type: text
    content: ', all the city cried out. '
