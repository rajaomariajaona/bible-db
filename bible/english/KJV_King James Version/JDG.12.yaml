document_id: JDG.12,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Shibboleth
  - type: text
    content: 'And the men of Ephraim gathered themselves together, and went northward, and said unto Jephthah, Wherefore passedst thou over to fight against the children of Ammon, and didst not call us to go with thee? we will burn thine house upon thee with fire. '
  '10':
  - type: text
    content: Then died Ibzan, and was buried at Beth-lehem.
  '11':
  - type: text
    content: 'And after him Elon, a Zebulonite, judged Israel; and he judged Israel ten years. '
  '12':
  - type: text
    content: And Elon the Zebulonite died, and was buried in Aijalon in the country of Zebulun.
  '13':
  - type: text
    content: 'And after him Abdon the son of Hillel, a Pirathonite, judged Israel. '
  '14':
  - type: text
    content: 'And he had forty sons and thirty nephews, that rode on threescore and ten ass colts: and he judged Israel eight years. '
  '15':
  - type: text
    content: And Abdon the son of Hillel the Pirathonite died, and was buried in Pirathon in the land of Ephraim, in the mount of the Amalekites.
  '2':
  - type: text
    content: 'And Jephthah said unto them, I and my people were at great strife with the children of Ammon; and when I called you, ye delivered me not out of their hands. '
  '3':
  - type: text
    content: 'And when I saw that ye delivered '
  - type: text
    content: me
  - type: text
    content: ' not, I put my life in my hands, and passed over against the children of Ammon, and the '
  - type: text
    content: LORD
  - type: text
    content: ' delivered them into my hand: wherefore then are ye come up unto me this day, to fight against me? '
  '4':
  - type: text
    content: 'Then Jephthah gathered together all the men of Gilead, and fought with Ephraim: and the men of Gilead smote Ephraim, because they said, Ye Gileadites '
  - type: text
    content: are
  - type: text
    content: ' fugitives of Ephraim among the Ephraimites, '
  - type: text
    content: and
  - type: text
    content: ' among the Manassites. '
  '5':
  - type: text
    content: 'And the Gileadites took the passages of Jordan before the Ephraimites: and it was '
  - type: text
    content: so
  - type: text
    content: ', that when those Ephraimites which were escaped said, Let me go over; that the men of Gilead said unto him, '
  - type: text
    content: Art
  - type: text
    content: ' thou an Ephraimite? If he said, Nay; '
  '6':
  - type: text
    content: 'then said they unto him, Say now Shibboleth: and he said Sibboleth: for he could not frame to pronounce '
  - type: text
    content: it
  - type: text
    content: ' right. Then they took him, and slew him at the passages of Jordan: and there fell at that time of the Ephraimites forty and two thousand.'
  '7':
  - type: text
    content: 'And Jephthah judged Israel six years. Then died Jephthah the Gileadite, and was buried in '
  - type: text
    content: one of
  - type: text
    content: ' the cities of Gilead.'
  - type: heading
    content: Minor Judges
  '8':
  - type: text
    content: 'And after him Ibzan of Beth-lehem judged Israel. '
  '9':
  - type: text
    content: 'And he had thirty sons, and thirty daughters, '
  - type: text
    content: whom
  - type: text
    content: ' he sent abroad, and took in thirty daughters from abroad for his sons. And he judged Israel seven years. '
