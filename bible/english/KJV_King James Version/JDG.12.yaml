document_id: JDG.12,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Shibboleth
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the men of Ephraim gathered themselves together, and went northward, and said unto Jephthah, Wherefore passedst thou over to fight against the children of Ammon, and didst not call us to go with thee? we will burn thine house upon thee with fire. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then died Ibzan, and was buried at Beth-lehem.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And after him Elon, a Zebulonite, judged Israel; and he judged Israel ten years. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Elon the Zebulonite died, and was buried in Aijalon in the country of Zebulun.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And after him Abdon the son of Hillel, a Pirathonite, judged Israel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he had forty sons and thirty nephews, that rode on threescore and ten ass colts: and he judged Israel eight years. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Abdon the son of Hillel the Pirathonite died, and was buried in Pirathon in the land of Ephraim, in the mount of the Amalekites.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jephthah said unto them, I and my people were at great strife with the children of Ammon; and when I called you, ye delivered me not out of their hands. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when I saw that ye delivered '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ' not, I put my life in my hands, and passed over against the children of Ammon, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' delivered them into my hand: wherefore then are ye come up unto me this day, to fight against me? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jephthah gathered together all the men of Gilead, and fought with Ephraim: and the men of Gilead smote Ephraim, because they said, Ye Gileadites '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' fugitives of Ephraim among the Ephraimites, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' among the Manassites. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the Gileadites took the passages of Jordan before the Ephraimites: and it was '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ', that when those Ephraimites which were escaped said, Let me go over; that the men of Gilead said unto him, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Art
    - type: text
      text: ' thou an Ephraimite? If he said, Nay; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then said they unto him, Say now Shibboleth: and he said Sibboleth: for he could not frame to pronounce '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' right. Then they took him, and slew him at the passages of Jordan: and there fell at that time of the Ephraimites forty and two thousand.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jephthah judged Israel six years. Then died Jephthah the Gileadite, and was buried in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one of
    - type: text
      text: ' the cities of Gilead.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Minor Judges
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And after him Ibzan of Beth-lehem judged Israel. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he had thirty sons, and thirty daughters, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whom
    - type: text
      text: ' he sent abroad, and took in thirty daughters from abroad for his sons. And he judged Israel seven years. '
