document_id: DAN.8
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: A Ram and Goat
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the third year of the reign of king Belshazzar a vision appeared unto me, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even unto
  - type: text
    text: ' me Daniel, after that which appeared unto me at the first. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And I saw in a vision; and it came to pass, when I saw, that I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' at Shushan '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' the palace, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the province of Elam; and I saw in a vision, and I was by the river of Ulai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then I lifted up mine eyes, and saw, and, behold, there stood before the river a ram which had '
  - type: usfm
    marker: add
    children:
    - type: text
      text: two
  - type: text
    text: ' horns: and the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: two
  - type: text
    text: ' horns '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' high; but one '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' higher than the other, and the higher came up last. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I saw the ram pushing westward, and northward, and southward; so that no beasts might stand before him, neither '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was there any
  - type: text
    text: ' that could deliver out of his hand; but he did according to his will, and became great.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And as I was considering, behold, an he goat came from the west on the face of the whole earth, and touched not the ground: and the goat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: had
  - type: text
    text: ' a notable horn between his eyes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he came to the ram that had '
  - type: usfm
    marker: add
    children:
    - type: text
      text: two
  - type: text
    text: ' horns, which I had seen standing before the river, and ran unto him in the fury of his power. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And I saw him come close unto the ram, and he was moved with choler against him, and smote the ram, and brake his two horns: and there was no power in the ram to stand before him, but he cast him down to the ground, and stamped upon him: and there was none that could deliver the ram out of his hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Therefore the he goat waxed very great: and when he was strong, the great horn was broken; and for it came up four notable ones toward the four winds of heaven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And out of one of them came forth a little horn, which waxed exceeding great, toward the south, and toward the east, and toward the pleasant '
  - type: usfm
    marker: add
    children:
    - type: text
      text: land
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And it waxed great, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to the host of heaven; and it cast down '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' of the host and of the stars to the ground, and stamped upon them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Yea, he magnified '
  - type: usfm
    marker: add
    children:
    - type: text
      text: himself
  - type: text
    text: ' even to the prince of the host, and by him the daily '
  - type: usfm
    marker: add
    children:
    - type: text
      text: sacrifice
  - type: text
    text: ' was taken away, and the place of his sanctuary was cast down. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And an host was given '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' against the daily '
  - type: usfm
    marker: add
    children:
    - type: text
      text: sacrifice
  - type: text
    text: ' by reason of transgression, and it cast down the truth to the ground; and it practised, and prospered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then I heard one saint speaking, and another saint said unto that certain '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saint
  - type: text
    text: ' which spake, How long '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the vision '
  - type: usfm
    marker: add
    children:
    - type: text
      text: concerning
  - type: text
    text: ' the daily '
  - type: usfm
    marker: add
    children:
    - type: text
      text: sacrifice
  - type: text
    text: ', and the transgression of desolation, to give both the sanctuary and the host to be trodden under foot? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And he said unto me, Unto two thousand and three hundred days; then shall the sanctuary be cleansed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And it came to pass, when I, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' I Daniel, had seen the vision, and sought for the meaning, then, behold, there stood before me as the appearance of a man. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And I heard a man''s voice between '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the banks of
  - type: text
    text: ' Ulai, which called, and said, Gabriel, make this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' to understand the vision. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So he came near where I stood: and when he came, I was afraid, and fell upon my face: but he said unto me, Understand, O son of man: for at the time of the end '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the vision.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Now as he was speaking with me, I was in a deep sleep on my face toward the ground: but he touched me, and set me upright. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And he said, Behold, I will make thee know what shall be in the last end of the indignation: for at the time appointed the end '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The ram which thou sawest having '
  - type: usfm
    marker: add
    children:
    - type: text
      text: two
  - type: text
    text: ' horns '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the kings of Media and Persia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And the rough goat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the king of Grecia: and the great horn that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' between his eyes '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the first king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Now that being broken, whereas four stood up for it, four kingdoms shall stand up out of the nation, but not in his power. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And in the latter time of their kingdom, when the transgressors are come to the full, a king of fierce countenance, and understanding dark sentences, shall stand up. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And his power shall be mighty, but not by his own power: and he shall destroy wonderfully, and shall prosper, and practise, and shall destroy the mighty and the holy people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And through his policy also he shall cause craft to prosper in his hand; and he shall magnify '
  - type: usfm
    marker: add
    children:
    - type: text
      text: himself
  - type: text
    text: ' in his heart, and by peace shall destroy many: he shall also stand up against the Prince of princes; but he shall be broken without hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And the vision of the evening and the morning which was told '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' true: wherefore shut thou up the vision; for it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' for many days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And I Daniel fainted, and was sick '
  - type: usfm
    marker: add
    children:
    - type: text
      text: certain
  - type: text
    text: ' days; afterward I rose up, and did the king''s business; and I was astonished at the vision, but none understood '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: .
