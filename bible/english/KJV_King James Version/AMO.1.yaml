document_id: AMO.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God and the Nations
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The words of Amos, who was among the herdmen of Tekoa, which he saw concerning Israel in the days of Uzziah king of Judah, and in the days of Jeroboam the son of Joash king of Israel, two years before the earthquake. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but I will send a fire on the wall of Tyrus, which shall devour the palaces thereof.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Edom
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; For three transgressions of Edom, and for four, I will not turn away '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the punishment
    - type: text
      text: ' thereof; because he did pursue his brother with the sword, and did cast off all pity, and his anger did tear perpetually, and he kept his wrath for ever: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but I will send a fire upon Teman, which shall devour the palaces of Bozrah.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ammon
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; For three transgressions of the children of Ammon, and for four, I will not turn away '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the punishment
    - type: text
      text: ' thereof; because they have ripped up the women with child of Gilead, that they might enlarge their border: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but I will kindle a fire in the wall of Rabbah, and it shall devour the palaces thereof, with shouting in the day of battle, with a tempest in the day of the whirlwind: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and their king shall go into captivity, he and his princes together, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will roar from Zion, and utter his voice from Jerusalem; and the habitations of the shepherds shall mourn, and the top of Carmel shall wither.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Damascus
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; For three transgressions of Damascus, and for four, I will not turn away '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the punishment
    - type: text
      text: ' thereof; because they have threshed Gilead with threshing instruments of iron: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but I will send a fire into the house of Hazael, which shall devour the palaces of Ben-hadad. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will break also the bar of Damascus, and cut off the inhabitant from the plain of Aven, and him that holdeth the sceptre from the house of Eden: and the people of Syria shall go into captivity unto Kir, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Gaza
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; For three transgressions of Gaza, and for four, I will not turn away '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the punishment
    - type: text
      text: ' thereof; because they carried away captive the whole captivity, to deliver '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' up to Edom: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but I will send a fire on the wall of Gaza, which shall devour the palaces thereof: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and I will cut off the inhabitant from Ashdod, and him that holdeth the sceptre from Ashkelon, and I will turn mine hand against Ekron: and the remnant of the Philistines shall perish, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Tyre
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; For three transgressions of Tyrus, and for four, I will not turn away '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the punishment
    - type: text
      text: ' thereof; because they delivered up the whole captivity to Edom, and remembered not the brotherly covenant: '
