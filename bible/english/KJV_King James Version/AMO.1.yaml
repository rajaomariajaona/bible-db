document_id: AMO.1,1
type_code: eng
verses:
  '1':
  - type: heading
    content: God and the Nations
  - type: text
    content: 'The words of Amos, who was among the herdmen of Tekoa, which he saw concerning Israel in the days of Uzziah king of Judah, and in the days of Jeroboam the son of Joash king of Israel, two years before the earthquake. '
  '10':
  - type: text
    content: but I will send a fire on the wall of Tyrus, which shall devour the palaces thereof.
  - type: heading
    content: Edom
  '11':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; For three transgressions of Edom, and for four, I will not turn away '
  - type: text
    content: the punishment
  - type: text
    content: ' thereof; because he did pursue his brother with the sword, and did cast off all pity, and his anger did tear perpetually, and he kept his wrath for ever: '
  '12':
  - type: text
    content: but I will send a fire upon Teman, which shall devour the palaces of Bozrah.
  - type: heading
    content: Ammon
  '13':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; For three transgressions of the children of Ammon, and for four, I will not turn away '
  - type: text
    content: the punishment
  - type: text
    content: ' thereof; because they have ripped up the women with child of Gilead, that they might enlarge their border: '
  '14':
  - type: text
    content: 'but I will kindle a fire in the wall of Rabbah, and it shall devour the palaces thereof, with shouting in the day of battle, with a tempest in the day of the whirlwind: '
  '15':
  - type: text
    content: 'and their king shall go into captivity, he and his princes together, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '2':
  - type: text
    content: 'And he said, The '
  - type: text
    content: LORD
  - type: text
    content: ' will roar from Zion, and utter his voice from Jerusalem; and the habitations of the shepherds shall mourn, and the top of Carmel shall wither.'
  - type: heading
    content: Damascus
  '3':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; For three transgressions of Damascus, and for four, I will not turn away '
  - type: text
    content: the punishment
  - type: text
    content: ' thereof; because they have threshed Gilead with threshing instruments of iron: '
  '4':
  - type: text
    content: 'but I will send a fire into the house of Hazael, which shall devour the palaces of Ben-hadad. '
  '5':
  - type: text
    content: 'I will break also the bar of Damascus, and cut off the inhabitant from the plain of Aven, and him that holdeth the sceptre from the house of Eden: and the people of Syria shall go into captivity unto Kir, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  - type: heading
    content: Gaza
  '6':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; For three transgressions of Gaza, and for four, I will not turn away '
  - type: text
    content: the punishment
  - type: text
    content: ' thereof; because they carried away captive the whole captivity, to deliver '
  - type: text
    content: them
  - type: text
    content: ' up to Edom: '
  '7':
  - type: text
    content: 'but I will send a fire on the wall of Gaza, which shall devour the palaces thereof: '
  '8':
  - type: text
    content: 'and I will cut off the inhabitant from Ashdod, and him that holdeth the sceptre from Ashkelon, and I will turn mine hand against Ekron: and the remnant of the Philistines shall perish, saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: .
  - type: heading
    content: Tyre
  '9':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: '; For three transgressions of Tyrus, and for four, I will not turn away '
  - type: text
    content: the punishment
  - type: text
    content: ' thereof; because they delivered up the whole captivity to Edom, and remembered not the brotherly covenant: '
