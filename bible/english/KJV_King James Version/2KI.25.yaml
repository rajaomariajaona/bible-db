document_id: 2KI.25,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass in the ninth year of his reign, in the tenth month, in the tenth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the month, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' Nebuchadnezzar king of Babylon came, he, and all his host, against Jerusalem, and pitched against it; and they built forts against it round about. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the army of the Chaldees, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were with
    - type: text
      text: ' the captain of the guard, brake down the walls of Jerusalem round about. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the people that were left in the city, and the fugitives that fell away to the king of Babylon, with the remnant of the multitude, did Nebuzar-adan the captain of the guard carry away. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the captain of the guard left of the poor of the land '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' vinedressers and husbandmen.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the pillars of brass that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and the bases, and the brasen sea that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', did the Chaldees break in pieces, and carried the brass of them to Babylon. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the pots, and the shovels, and the snuffers, and the spoons, and all the vessels of brass wherewith they ministered, took they away. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the firepans, and the bowls, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' such things as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' of gold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' gold, and of silver, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' silver, the captain of the guard took away. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The two pillars, one sea, and the bases which Solomon had made for the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; the brass of all these vessels was without weight. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The height of the one pillar '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' eighteen cubits, and the chapiter upon it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' brass: and the height of the chapiter three cubits; and the wreathen work, and pomegranates upon the chapiter round about, all of brass: and like unto these had the second pillar with wreathen work.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the captain of the guard took Seraiah the chief priest, and Zephaniah the second priest, and the three keepers of the door: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and out of the city he took an officer that was set over the men of war, and five men of them that were in the king''s presence, which were found in the city, and the principal scribe of the host, which mustered the people of the land, and threescore men of the people of the land '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that were
    - type: text
      text: ' found in the city: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the city was besieged unto the eleventh year of king Zedekiah. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Nebuzar-adan captain of the guard took these, and brought them to the king of Babylon to Riblah: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and the king of Babylon smote them, and slew them at Riblah in the land of Hamath. So Judah was carried away out of their land.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as for
    - type: text
      text: ' the people that remained in the land of Judah, whom Nebuchadnezzar king of Babylon had left, even over them he made Gedaliah the son of Ahikam, the son of Shaphan, ruler. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when all the captains of the armies, they and their men, heard that the king of Babylon had made Gedaliah governor, there came to Gedaliah to Mizpah, even Ishmael the son of Nethaniah, and Johanan the son of Careah, and Seraiah the son of Tanhumeth the Netophathite, and Jaazaniah the son of a Maachathite, they and their men. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Gedaliah sware to them, and to their men, and said unto them, Fear not to be the servants of the Chaldees: dwell in the land, and serve the king of Babylon; and it shall be well with you. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But it came to pass in the seventh month, that Ishmael the son of Nethaniah, the son of Elishama, of the seed royal, came, and ten men with him, and smote Gedaliah, that he died, and the Jews and the Chaldees that were with him at Mizpah. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the people, both small and great, and the captains of the armies, arose, and came to Egypt: for they were afraid of the Chaldees.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass in the seven and thirtieth year of the captivity of Jehoiachin king of Judah, in the twelfth month, on the seven and twentieth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the month, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' Evil-merodach king of Babylon in the year that he began to reign did lift up the head of Jehoiachin king of Judah out of prison; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he spake kindly to him, and set his throne above the throne of the kings that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with him in Babylon; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and changed his prison garments: and he did eat bread continually before him all the days of his life. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And on the ninth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: fourth
    - type: text
      text: ' month the famine prevailed in the city, and there was no bread for the people of the land. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And his allowance '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' a continual allowance given him of the king, a daily rate for every day, all the days of his life.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the city was broken up, and all the men of war '
    - type: usfm
      marker: add
      children:
      - type: text
        text: fled
    - type: text
      text: ' by night by the way of the gate between two walls, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' by the king''s garden: (now the Chaldees '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' against the city round about:) and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the king
    - type: text
      text: ' went the way toward the plain. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the army of the Chaldees pursued after the king, and overtook him in the plains of Jericho: and all his army were scattered from him. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they took the king, and brought him up to the king of Babylon to Riblah; and they gave judgment upon him. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they slew the sons of Zedekiah before his eyes, and put out the eyes of Zedekiah, and bound him with fetters of brass, and carried him to Babylon.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in the fifth month, on the seventh '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the month, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the nineteenth year of king Nebuchadnezzar king of Babylon, came Nebuzar-adan, captain of the guard, a servant of the king of Babylon, unto Jerusalem: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he burnt the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and the king''s house, and all the houses of Jerusalem, and every great '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man's
    - type: text
      text: ' house burnt he with fire. '
