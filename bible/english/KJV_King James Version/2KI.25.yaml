  '1':
  - type: text
    content: 'And it came to pass in the ninth year of his reign, in the tenth month, in the tenth '
  - type: text
    content: day
  - type: text
    content: ' of the month, '
  - type: text
    content: that
  - type: text
    content: ' Nebuchadnezzar king of Babylon came, he, and all his host, against Jerusalem, and pitched against it; and they built forts against it round about. '
  '10':
  - type: text
    content: 'And all the army of the Chaldees, that '
  - type: text
    content: were with
  - type: text
    content: ' the captain of the guard, brake down the walls of Jerusalem round about. '
  '11':
  - type: text
    content: 'Now the rest of the people that were left in the city, and the fugitives that fell away to the king of Babylon, with the remnant of the multitude, did Nebuzar-adan the captain of the guard carry away. '
  '12':
  - type: text
    content: 'But the captain of the guard left of the poor of the land '
  - type: text
    content: to be
  - type: text
    content: ' vinedressers and husbandmen.'
  '13':
  - type: text
    content: 'And the pillars of brass that '
  - type: text
    content: were
  - type: text
    content: ' in the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and the bases, and the brasen sea that '
  - type: text
    content: was
  - type: text
    content: ' in the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', did the Chaldees break in pieces, and carried the brass of them to Babylon. '
  '14':
  - type: text
    content: 'And the pots, and the shovels, and the snuffers, and the spoons, and all the vessels of brass wherewith they ministered, took they away. '
  '15':
  - type: text
    content: 'And the firepans, and the bowls, '
  - type: text
    content: and
  - type: text
    content: ' such things as '
  - type: text
    content: were
  - type: text
    content: ' of gold, '
  - type: text
    content: in
  - type: text
    content: ' gold, and of silver, '
  - type: text
    content: in
  - type: text
    content: ' silver, the captain of the guard took away. '
  '16':
  - type: text
    content: 'The two pillars, one sea, and the bases which Solomon had made for the house of the '
  - type: text
    content: LORD
  - type: text
    content: '; the brass of all these vessels was without weight. '
  '17':
  - type: text
    content: 'The height of the one pillar '
  - type: text
    content: was
  - type: text
    content: ' eighteen cubits, and the chapiter upon it '
  - type: text
    content: was
  - type: text
    content: ' brass: and the height of the chapiter three cubits; and the wreathen work, and pomegranates upon the chapiter round about, all of brass: and like unto these had the second pillar with wreathen work.'
  '18':
  - type: text
    content: 'And the captain of the guard took Seraiah the chief priest, and Zephaniah the second priest, and the three keepers of the door: '
  '19':
  - type: text
    content: 'and out of the city he took an officer that was set over the men of war, and five men of them that were in the king''s presence, which were found in the city, and the principal scribe of the host, which mustered the people of the land, and threescore men of the people of the land '
  - type: text
    content: that were
  - type: text
    content: ' found in the city: '
  '2':
  - type: text
    content: 'And the city was besieged unto the eleventh year of king Zedekiah. '
  '20':
  - type: text
    content: 'and Nebuzar-adan captain of the guard took these, and brought them to the king of Babylon to Riblah: '
  '21':
  - type: text
    content: and the king of Babylon smote them, and slew them at Riblah in the land of Hamath. So Judah was carried away out of their land.
  '22':
  - type: text
    content: 'And '
  - type: text
    content: as for
  - type: text
    content: ' the people that remained in the land of Judah, whom Nebuchadnezzar king of Babylon had left, even over them he made Gedaliah the son of Ahikam, the son of Shaphan, ruler. '
  '23':
  - type: text
    content: 'And when all the captains of the armies, they and their men, heard that the king of Babylon had made Gedaliah governor, there came to Gedaliah to Mizpah, even Ishmael the son of Nethaniah, and Johanan the son of Careah, and Seraiah the son of Tanhumeth the Netophathite, and Jaazaniah the son of a Maachathite, they and their men. '
  '24':
  - type: text
    content: 'And Gedaliah sware to them, and to their men, and said unto them, Fear not to be the servants of the Chaldees: dwell in the land, and serve the king of Babylon; and it shall be well with you. '
  '25':
  - type: text
    content: 'But it came to pass in the seventh month, that Ishmael the son of Nethaniah, the son of Elishama, of the seed royal, came, and ten men with him, and smote Gedaliah, that he died, and the Jews and the Chaldees that were with him at Mizpah. '
  '26':
  - type: text
    content: 'And all the people, both small and great, and the captains of the armies, arose, and came to Egypt: for they were afraid of the Chaldees.'
  '27':
  - type: text
    content: 'And it came to pass in the seven and thirtieth year of the captivity of Jehoiachin king of Judah, in the twelfth month, on the seven and twentieth '
  - type: text
    content: day
  - type: text
    content: ' of the month, '
  - type: text
    content: that
  - type: text
    content: ' Evil-merodach king of Babylon in the year that he began to reign did lift up the head of Jehoiachin king of Judah out of prison; '
  '28':
  - type: text
    content: 'and he spake kindly to him, and set his throne above the throne of the kings that '
  - type: text
    content: were
  - type: text
    content: ' with him in Babylon; '
  '29':
  - type: text
    content: 'and changed his prison garments: and he did eat bread continually before him all the days of his life. '
  '3':
  - type: text
    content: 'And on the ninth '
  - type: text
    content: day
  - type: text
    content: ' of the '
  - type: text
    content: fourth
  - type: text
    content: ' month the famine prevailed in the city, and there was no bread for the people of the land. '
  '30':
  - type: text
    content: 'And his allowance '
  - type: text
    content: was
  - type: text
    content: ' a continual allowance given him of the king, a daily rate for every day, all the days of his life.'
  '4':
  - type: text
    content: 'And the city was broken up, and all the men of war '
  - type: text
    content: fled
  - type: text
    content: ' by night by the way of the gate between two walls, which '
  - type: text
    content: is
  - type: text
    content: ' by the king''s garden: (now the Chaldees '
  - type: text
    content: were
  - type: text
    content: ' against the city round about:) and '
  - type: text
    content: the king
  - type: text
    content: ' went the way toward the plain. '
  '5':
  - type: text
    content: 'And the army of the Chaldees pursued after the king, and overtook him in the plains of Jericho: and all his army were scattered from him. '
  '6':
  - type: text
    content: 'So they took the king, and brought him up to the king of Babylon to Riblah; and they gave judgment upon him. '
  '7':
  - type: text
    content: And they slew the sons of Zedekiah before his eyes, and put out the eyes of Zedekiah, and bound him with fetters of brass, and carried him to Babylon.
  '8':
  - type: text
    content: 'And in the fifth month, on the seventh '
  - type: text
    content: day
  - type: text
    content: ' of the month, which '
  - type: text
    content: is
  - type: text
    content: ' the nineteenth year of king Nebuchadnezzar king of Babylon, came Nebuzar-adan, captain of the guard, a servant of the king of Babylon, unto Jerusalem: '
  '9':
  - type: text
    content: 'and he burnt the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', and the king''s house, and all the houses of Jerusalem, and every great '
  - type: text
    content: man's
  - type: text
    content: ' house burnt he with fire. '
