verses:
  '1':
  - type: heading
    content: Jehoram
  - type: text
    content: 'Now Jehoshaphat slept with his fathers, and was buried with his fathers in the city of David. And Jehoram his son reigned in his stead. '
  '10':
  - type: text
    content: 'So the Edomites revolted from under the hand of Judah unto this day. The same time '
  - type: text
    content: also
  - type: text
    content: ' did Libnah revolt from under his hand; because he had forsaken the '
  - type: text
    content: LORD
  - type: text
    content: ' God of his fathers.'
  '11':
  - type: text
    content: 'Moreover he made high places in the mountains of Judah, and caused the inhabitants of Jerusalem to commit fornication, and compelled Judah '
  - type: text
    content: thereto
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'And there came a writing to him from Elijah the prophet, saying, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' God of David thy father, Because thou hast not walked in the ways of Jehoshaphat thy father, nor in the ways of Asa king of Judah, '
  '13':
  - type: text
    content: 'but hast walked in the way of the kings of Israel, and hast made Judah and the inhabitants of Jerusalem to go a whoring, like to the whoredoms of the house of Ahab, and also hast slain thy brethren of thy father''s house, '
  - type: text
    content: which were
  - type: text
    content: ' better than thyself: '
  '14':
  - type: text
    content: 'behold, with a great plague will the '
  - type: text
    content: LORD
  - type: text
    content: ' smite thy people, and thy children, and thy wives, and all thy goods: '
  '15':
  - type: text
    content: 'and thou '
  - type: text
    content: shalt have
  - type: text
    content: ' great sickness by disease of thy bowels, until thy bowels fall out by reason of the sickness day by day.'
  '16':
  - type: text
    content: 'Moreover the '
  - type: text
    content: LORD
  - type: text
    content: ' stirred up against Jehoram the spirit of the Philistines, and of the Arabians, that '
  - type: text
    content: were
  - type: text
    content: ' near the Ethiopians: '
  '17':
  - type: text
    content: and they came up into Judah, and brake into it, and carried away all the substance that was found in the king's house, and his sons also, and his wives; so that there was never a son left him, save Jehoahaz, the youngest of his sons.
  '18':
  - type: text
    content: 'And after all this the '
  - type: text
    content: LORD
  - type: text
    content: ' smote him in his bowels with an incurable disease. '
  '19':
  - type: text
    content: 'And it came to pass, that in process of time, after the end of two years, his bowels fell out by reason of his sickness: so he died of sore diseases. And his people made no burning for him, like the burning of his fathers. '
  '2':
  - type: text
    content: 'And he had brethren the sons of Jehoshaphat, Azariah, and Jehiel, and Zechariah, and Azariah, and Michael, and Shephatiah: all these '
  - type: text
    content: were
  - type: text
    content: ' the sons of Jehoshaphat king of Israel. '
  '20':
  - type: text
    content: Thirty and two years old was he when he began to reign, and he reigned in Jerusalem eight years, and departed without being desired. Howbeit they buried him in the city of David, but not in the sepulchres of the kings.
  '3':
  - type: text
    content: 'And their father gave them great gifts of silver, and of gold, and of precious things, with fenced cities in Judah: but the kingdom gave he to Jehoram; because he '
  - type: text
    content: was
  - type: text
    content: ' the firstborn. '
  '4':
  - type: text
    content: 'Now when Jehoram was risen up to the kingdom of his father, he strengthened himself, and slew all his brethren with the sword, and '
  - type: text
    content: divers
  - type: text
    content: ' also of the princes of Israel. '
  '5':
  - type: text
    content: 'Jehoram '
  - type: text
    content: was
  - type: text
    content: ' thirty and two years old when he began to reign, and he reigned eight years in Jerusalem. '
  '6':
  - type: text
    content: 'And he walked in the way of the kings of Israel, like as did the house of Ahab: for he had the daughter of Ahab to wife: and he wrought '
  - type: text
    content: that which was
  - type: text
    content: ' evil in the eyes of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Howbeit the '
  - type: text
    content: LORD
  - type: text
    content: ' would not destroy the house of David, because of the covenant that he had made with David, and as he promised to give a light to him and to his sons for ever.'
  '8':
  - type: text
    content: 'In his days the Edomites revolted from under the dominion of Judah, and made themselves a king. '
  '9':
  - type: text
    content: 'Then Jehoram went forth with his princes, and all his chariots with him: and he rose up by night, and smote the Edomites which compassed him in, and the captains of the chariots. '
