document_id: PSA.60,1
type_code: eng
verses:
  '1':
  - type: text
    content: To the chief Musician upon Shushan-eduth, Michtam of David, to teach; when he strove with Aram-naharaim and with Aram-zobah, when Joab returned, and smote of Edom in the valley of salt twelve thousand.
  - type: text
    content: O God, thou hast cast us off, thou has scattered us,
  - type: text
    content: Thou hast been displeased; O turn thyself to us again.
  '10':
  - type: text
    content: ' '
  - type: text
    content: Wilt
  - type: text
    content: ' not thou, O God, '
  - type: text
    content: which
  - type: text
    content: ' hadst cast us off?'
  - type: text
    content: 'And '
  - type: text
    content: thou
  - type: text
    content: ', O God, '
  - type: text
    content: which
  - type: text
    content: ' didst not go out with our armies?'
  '11':
  - type: text
    content: 'Give us help from trouble:'
  - type: text
    content: 'For vain '
  - type: text
    content: is
  - type: text
    content: ' the help of man.'
  '12':
  - type: text
    content: 'Through God we shall do valiantly:'
  - type: text
    content: 'For he '
  - type: text
    content: it is that
  - type: text
    content: ' shall tread down our enemies.'
  '2':
  - type: text
    content: 'Thou hast made the earth to tremble; thou hast broken it:'
  - type: text
    content: Heal the breaches thereof; for it shaketh.
  '3':
  - type: text
    content: 'Thou hast shewed thy people hard things:'
  - type: text
    content: Thou hast made us to drink the wine of astonishment.
  '4':
  - type: text
    content: Thou hast given a banner to them that fear thee,
  - type: text
    content: 'That it may be displayed because of the truth. '
  - type: text
    content: Selah.
  '5':
  - type: text
    content: That thy beloved may be delivered;
  - type: text
    content: 'Save '
  - type: text
    content: with
  - type: text
    content: ' thy right hand, and hear me.'
  '6':
  - type: text
    content: God hath spoken in his holiness; I will rejoice, I will divide Shechem,
  - type: text
    content: And mete out the valley of Succoth.
  '7':
  - type: text
    content: 'Gilead '
  - type: text
    content: is
  - type: text
    content: ' mine, and Manasseh '
  - type: text
    content: is
  - type: text
    content: ' mine;'
  - type: text
    content: 'Ephraim also '
  - type: text
    content: is
  - type: text
    content: ' the strength of mine head; Judah '
  - type: text
    content: is
  - type: text
    content: ' my lawgiver;'
  '8':
  - type: text
    content: 'Moab '
  - type: text
    content: is
  - type: text
    content: ' my washpot; Over Edom will I cast out my shoe:'
  - type: text
    content: Philistia, triumph thou because of me.
  '9':
  - type: text
    content: 'Who will bring me '
  - type: text
    content: into
  - type: text
    content: ' the strong city?'
  - type: text
    content: Who will lead me into Edom?
