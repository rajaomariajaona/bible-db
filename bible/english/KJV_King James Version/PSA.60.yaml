document_id: PSA.60,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the chief Musician upon Shushan-eduth, Michtam of David, to teach; when he strove with Aram-naharaim and with Aram-zobah, when Joab returned, and smote of Edom in the valley of salt twelve thousand.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: O God, thou hast cast us off, thou has scattered us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou hast been displeased; O turn thyself to us again.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Wilt
    - type: text
      text: ' not thou, O God, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' hadst cast us off?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thou
    - type: text
      text: ', O God, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' didst not go out with our armies?'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Give us help from trouble:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For vain '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the help of man.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Through God we shall do valiantly:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is that
    - type: text
      text: ' shall tread down our enemies.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Thou hast made the earth to tremble; thou hast broken it:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Heal the breaches thereof; for it shaketh.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Thou hast shewed thy people hard things:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou hast made us to drink the wine of astonishment.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Thou hast given a banner to them that fear thee,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That it may be displayed because of the truth. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: That thy beloved may be delivered;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Save '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' thy right hand, and hear me.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: God hath spoken in his holiness; I will rejoice, I will divide Shechem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And mete out the valley of Succoth.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Gilead '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' mine, and Manasseh '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' mine;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Ephraim also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the strength of mine head; Judah '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my lawgiver;'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Moab '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my washpot; Over Edom will I cast out my shoe:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Philistia, triumph thou because of me.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Who will bring me '
    - type: usfm
      marker: add
      children:
      - type: text
        text: into
    - type: text
      text: ' the strong city?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who will lead me into Edom?
