document_id: ROM.6
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Complete Renewal
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'What shall we say then? Shall we continue in sin, that grace may abound? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'God forbid. How shall we, that are dead to sin, live any longer therein? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Know ye not, that so many of us as were baptized into Jesus Christ were baptized into his death? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Therefore we are buried with him by baptism into death: that like as Christ was raised up from the dead by the glory of the Father, even so we also should walk in newness of life. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For if we have been planted together in the likeness of his death, we shall be also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in the likeness
  - type: text
    text: ' of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' resurrection: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'knowing this, that our old man is crucified with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', that the body of sin might be destroyed, that henceforth we should not serve sin. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For he that is dead is freed from sin. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now if we be dead with Christ, we believe that we shall also live with him: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'knowing that Christ being raised from the dead dieth no more; death hath no more dominion over him. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For in that he died, he died unto sin once: but in that he liveth, he liveth unto God. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Likewise reckon ye also yourselves to be dead indeed unto sin, but alive unto God through Jesus Christ our Lord.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Let not sin therefore reign in your mortal body, that ye should obey it in the lusts thereof. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Neither yield ye your members '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' instruments of unrighteousness unto sin: but yield yourselves unto God, as those that are alive from the dead, and your members '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' instruments of righteousness unto God. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For sin shall not have dominion over you: for ye are not under the law, but under grace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'What then? shall we sin, because we are not under the law, but under grace? God forbid. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Know ye not, that to whom ye yield yourselves servants to obey, his servants ye are to whom ye obey; whether of sin unto death, or of obedience unto righteousness? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But God be thanked, that ye were the servants of sin, but ye have obeyed from the heart that form of doctrine which was delivered you. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Being then made free from sin, ye became the servants of righteousness. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'I speak after the manner of men because of the infirmity of your flesh: for as ye have yielded your members servants to uncleanness and to iniquity unto iniquity; even so now yield your members servants to righteousness unto holiness. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For when ye were the servants of sin, ye were free from righteousness. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'What fruit had ye then in those things whereof ye are now ashamed? for the end of those things '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' death. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But now being made free from sin, and become servants to God, ye have your fruit unto holiness, and the end everlasting life. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For the wages of sin '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' death; but the gift of God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' eternal life through Jesus Christ our Lord.'
