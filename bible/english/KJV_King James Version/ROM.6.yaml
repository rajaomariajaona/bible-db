document_id: ROM.6,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Complete Renewal
  - type: text
    content: 'What shall we say then? Shall we continue in sin, that grace may abound? '
  '10':
  - type: text
    content: 'For in that he died, he died unto sin once: but in that he liveth, he liveth unto God. '
  '11':
  - type: text
    content: Likewise reckon ye also yourselves to be dead indeed unto sin, but alive unto God through Jesus Christ our Lord.
  '12':
  - type: text
    content: 'Let not sin therefore reign in your mortal body, that ye should obey it in the lusts thereof. '
  '13':
  - type: text
    content: 'Neither yield ye your members '
  - type: text
    content: as
  - type: text
    content: ' instruments of unrighteousness unto sin: but yield yourselves unto God, as those that are alive from the dead, and your members '
  - type: text
    content: as
  - type: text
    content: ' instruments of righteousness unto God. '
  '14':
  - type: text
    content: 'For sin shall not have dominion over you: for ye are not under the law, but under grace.'
  '15':
  - type: text
    content: 'What then? shall we sin, because we are not under the law, but under grace? God forbid. '
  '16':
  - type: text
    content: 'Know ye not, that to whom ye yield yourselves servants to obey, his servants ye are to whom ye obey; whether of sin unto death, or of obedience unto righteousness? '
  '17':
  - type: text
    content: 'But God be thanked, that ye were the servants of sin, but ye have obeyed from the heart that form of doctrine which was delivered you. '
  '18':
  - type: text
    content: 'Being then made free from sin, ye became the servants of righteousness. '
  '19':
  - type: text
    content: 'I speak after the manner of men because of the infirmity of your flesh: for as ye have yielded your members servants to uncleanness and to iniquity unto iniquity; even so now yield your members servants to righteousness unto holiness. '
  '2':
  - type: text
    content: 'God forbid. How shall we, that are dead to sin, live any longer therein? '
  '20':
  - type: text
    content: 'For when ye were the servants of sin, ye were free from righteousness. '
  '21':
  - type: text
    content: 'What fruit had ye then in those things whereof ye are now ashamed? for the end of those things '
  - type: text
    content: is
  - type: text
    content: ' death. '
  '22':
  - type: text
    content: 'But now being made free from sin, and become servants to God, ye have your fruit unto holiness, and the end everlasting life. '
  '23':
  - type: text
    content: 'For the wages of sin '
  - type: text
    content: is
  - type: text
    content: ' death; but the gift of God '
  - type: text
    content: is
  - type: text
    content: ' eternal life through Jesus Christ our Lord.'
  '3':
  - type: text
    content: 'Know ye not, that so many of us as were baptized into Jesus Christ were baptized into his death? '
  '4':
  - type: text
    content: 'Therefore we are buried with him by baptism into death: that like as Christ was raised up from the dead by the glory of the Father, even so we also should walk in newness of life. '
  '5':
  - type: text
    content: 'For if we have been planted together in the likeness of his death, we shall be also '
  - type: text
    content: in the likeness
  - type: text
    content: ' of '
  - type: text
    content: his
  - type: text
    content: ' resurrection: '
  '6':
  - type: text
    content: 'knowing this, that our old man is crucified with '
  - type: text
    content: him
  - type: text
    content: ', that the body of sin might be destroyed, that henceforth we should not serve sin. '
  '7':
  - type: text
    content: 'For he that is dead is freed from sin. '
  '8':
  - type: text
    content: 'Now if we be dead with Christ, we believe that we shall also live with him: '
  '9':
  - type: text
    content: 'knowing that Christ being raised from the dead dieth no more; death hath no more dominion over him. '
