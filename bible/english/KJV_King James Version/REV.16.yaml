document_id: REV.16
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Visions of Judgement
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: And I heard a great voice out of the temple saying to the seven angels, Go your ways, and pour out the vials of the wrath of God upon the earth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the first went, and poured out his vial upon the earth; and there fell a noisome and grievous sore upon the men which had the mark of the beast, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: upon
  - type: text
    text: ' them which worshipped his image.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And the second angel poured out his vial upon the sea; and it became as the blood of a dead '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ': and every living soul died in the sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And the third angel poured out his vial upon the rivers and fountains of waters; and they became blood. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And I heard the angel of the waters say, Thou art righteous, O Lord, which art, and wast, and shalt be, because thou hast judged thus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For they have shed the blood of saints and prophets, and thou hast given them blood to drink; for they are worthy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And I heard another out of the altar say, Even so, Lord God Almighty, true and righteous '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' thy judgments.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the fourth angel poured out his vial upon the sun; and power was given unto him to scorch men with fire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And men were scorched with great heat, and blasphemed the name of God, which hath power over these plagues: and they repented not to give him glory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the fifth angel poured out his vial upon the seat of the beast; and his kingdom was full of darkness; and they gnawed their tongues for pain, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: and blasphemed the God of heaven because of their pains and their sores, and repented not of their deeds.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And the sixth angel poured out his vial upon the great river Euphrates; and the water thereof was dried up, that the way of the kings of the east might be prepared. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And I saw three unclean spirits like frogs '
  - type: usfm
    marker: add
    children:
    - type: text
      text: come
  - type: text
    text: ' out of the mouth of the dragon, and out of the mouth of the beast, and out of the mouth of the false prophet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For they are the spirits of devils, working miracles, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' go forth unto the kings of the earth and of the whole world, to gather them to the battle of that great day of God Almighty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Behold, I come as a thief. Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' he that watcheth, and keepeth his garments, lest he walk naked, and they see his shame.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And he gathered them together into a place called in the Hebrew tongue Armageddon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the seventh angel poured out his vial into the air; and there came a great voice out of the temple of heaven, from the throne, saying, It is done. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And there were voices, and thunders, and lightnings; and there was a great earthquake, such as was not since men were upon the earth, so mighty an earthquake, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' so great. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And the great city was divided into three parts, and the cities of the nations fell: and great Babylon came in remembrance before God, to give unto her the cup of the wine of the fierceness of his wrath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And every island fled away, and the mountains were not found. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And there fell upon men a great hail out of heaven, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: every stone
  - type: text
    text: ' about the weight of a talent: and men blasphemed God because of the plague of the hail; for the plague thereof was exceeding great.'
