document_id: EZK.29,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Egypt
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the tenth year, in the tenth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: month
    - type: text
      text: ', in the twelfth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the month, the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came unto me, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, therefore I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' against thee, and against thy rivers, and I will make the land of Egypt utterly waste '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' desolate, from the tower of Syene even unto the border of Ethiopia. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'No foot of man shall pass through it, nor foot of beast shall pass through it, neither shall it be inhabited forty years. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will make the land of Egypt desolate in the midst of the countries '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that are
    - type: text
      text: ' desolate, and her cities among the cities '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that are
    - type: text
      text: ' laid waste shall be desolate forty years: and I will scatter the Egyptians among the nations, and will disperse them through the countries.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; At the end of forty years will I gather the Egyptians from the people whither they were scattered: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and I will bring again the captivity of Egypt, and will cause them to return '
    - type: usfm
      marker: add
      children:
      - type: text
        text: into
    - type: text
      text: ' the land of Pathros, into the land of their habitation; and they shall be there a base kingdom. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It shall be the basest of the kingdoms; neither shall it exalt itself any more above the nations: for I will diminish them, that they shall no more rule over the nations. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall be no more the confidence of the house of Israel, which bringeth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' iniquity to remembrance, when they shall look after them: but they shall know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass in the seven and twentieth year, in the first '
    - type: usfm
      marker: add
      children:
      - type: text
        text: month
    - type: text
      text: ', in the first '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the month, the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came unto me, saying, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Son of man, Nebuchadrezzar king of Babylon caused his army to serve a great service against Tyrus: every head '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' made bald, and every shoulder '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' peeled: yet had he no wages, nor his army, for Tyrus, for the service that he had served against it: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'therefore thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; Behold, I will give the land of Egypt unto Nebuchadrezzar king of Babylon; and he shall take her multitude, and take her spoil, and take her prey; and it shall be the wages for his army. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Son of man, set thy face against Pharaoh king of Egypt, and prophesy against him, and against all Egypt: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have given him the land of Egypt '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' his labour wherewith he served against it, because they wrought for me, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: .
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In that day will I cause the horn of the house of Israel to bud forth, and I will give thee the opening of the mouth in the midst of them; and they shall know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'speak, and say, Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; Behold, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' against thee, Pharaoh king of Egypt, the great dragon that lieth in the midst of his rivers, which hath said, My river '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' mine own, and I have made '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' for myself. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I will put hooks in thy jaws, and I will cause the fish of thy rivers to stick unto thy scales, and I will bring thee up out of the midst of thy rivers, and all the fish of thy rivers shall stick unto thy scales. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will leave thee '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thrown
    - type: text
      text: ' into the wilderness, thee and all the fish of thy rivers: thou shalt fall upon the open fields; thou shalt not be brought together, nor gathered: I have given thee for meat to the beasts of the field and to the fowls of the heaven. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the inhabitants of Egypt shall know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', because they have been a staff of reed to the house of Israel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they took hold of thee by thy hand, thou didst break, and rend all their shoulder: and when they leaned upon thee, thou brakest, and madest all their loins to be at a stand.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; Behold, I will bring a sword upon thee, and cut off man and beast out of thee. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the land of Egypt shall be desolate and waste; and they shall know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': because he hath said, The river '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' mine, and I have made '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: '. '
