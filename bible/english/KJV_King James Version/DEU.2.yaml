document_id: DEU.2,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then we turned, and took our journey into the wilderness by the way of the Red sea, as the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto me: and we compassed mount Seir many days. '
  '10':
  - type: text
    content: 'The Emims dwelt therein in times past, a people great, and many, and tall, as the Anakims; '
  '11':
  - type: text
    content: 'which also were accounted giants, as the Anakims; but the Moabites call them Emims. '
  '12':
  - type: text
    content: 'The Horims also dwelt in Seir beforetime; but the children of Esau succeeded them, when they had destroyed them from before them, and dwelt in their stead; as Israel did unto the land of his possession, which the '
  - type: text
    content: LORD
  - type: text
    content: ' gave unto them. '
  '13':
  - type: text
    content: 'Now rise up, '
  - type: text
    content: said I
  - type: text
    content: ', and get you over the brook Zered. And we went over the brook Zered. '
  '14':
  - type: text
    content: 'And the space in which we came from Kadesh-barnea, until we were come over the brook Zered, '
  - type: text
    content: was
  - type: text
    content: ' thirty and eight years; until all the generation of the men of war were wasted out from among the host, as the '
  - type: text
    content: LORD
  - type: text
    content: ' sware unto them. '
  '15':
  - type: text
    content: 'For indeed the hand of the '
  - type: text
    content: LORD
  - type: text
    content: ' was against them, to destroy them from among the host, until they were consumed.'
  '16':
  - type: text
    content: 'So it came to pass, when all the men of war were consumed and dead from among the people, '
  '17':
  - type: text
    content: 'that the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto me, saying, '
  '18':
  - type: text
    content: 'Thou art to pass over through Ar, the coast of Moab, this day: '
  '19':
  - type: text
    content: 'and '
  - type: text
    content: when
  - type: text
    content: ' thou comest nigh over against the children of Ammon, distress them not, nor meddle with them: for I will not give thee of the land of the children of Ammon '
  - type: text
    content: any
  - type: text
    content: ' possession; because I have given it unto the children of Lot '
  - type: text
    content: for
  - type: text
    content: ' a possession. '
  '2':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto me, saying, '
  '20':
  - type: text
    content: '(That also was accounted a land of giants: giants dwelt therein in old time; and the Ammonites call them Zamzummims; '
  '21':
  - type: text
    content: 'a people great, and many, and tall, as the Anakims; but the '
  - type: text
    content: LORD
  - type: text
    content: ' destroyed them before them; and they succeeded them, and dwelt in their stead: '
  '22':
  - type: text
    content: 'as he did to the children of Esau, which dwelt in Seir, when he destroyed the Horims from before them; and they succeeded them, and dwelt in their stead even unto this day: '
  '23':
  - type: text
    content: 'and the Avims which dwelt in Hazerim, '
  - type: text
    content: even
  - type: text
    content: ' unto Azzah, the Caphtorims, which came forth out of Caphtor, destroyed them, and dwelt in their stead.) '
  '24':
  - type: text
    content: 'Rise ye up, take your journey, and pass over the river Arnon: behold, I have given into thine hand Sihon the Amorite, king of Heshbon, and his land: begin to possess '
  - type: text
    content: it
  - type: text
    content: ', and contend with him in battle. '
  '25':
  - type: text
    content: 'This day will I begin to put the dread of thee and the fear of thee upon the nations '
  - type: text
    content: that are
  - type: text
    content: ' under the whole heaven, who shall hear report of thee, and shall tremble, and be in anguish because of thee.'
  '26':
  - type: text
    content: 'And I sent messengers out of the wilderness of Kedemoth unto Sihon king of Heshbon with words of peace, saying, '
  '27':
  - type: text
    content: 'Let me pass through thy land: I will go along by the high way, I will neither turn unto the right hand nor to the left. '
  '28':
  - type: text
    content: 'Thou shalt sell me meat for money, that I may eat; and give me water for money, that I may drink: only I will pass through on my feet; '
  '29':
  - type: text
    content: '(as the children of Esau which dwell in Seir, and the Moabites which dwell in Ar, did unto me;) until I shall pass over Jordan into the land which the '
  - type: text
    content: LORD
  - type: text
    content: ' our God giveth us. '
  '3':
  - type: text
    content: 'Ye have compassed this mountain long enough: turn you northward. '
  '30':
  - type: text
    content: 'But Sihon king of Heshbon would not let us pass by him: for the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God hardened his spirit, and made his heart obstinate, that he might deliver him into thy hand, as '
  - type: text
    content: appeareth
  - type: text
    content: ' this day. '
  '31':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto me, Behold, I have begun to give Sihon and his land before thee: begin to possess, that thou mayest inherit his land. '
  '32':
  - type: text
    content: 'Then Sihon came out against us, he and all his people, to fight at Jahaz. '
  '33':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' our God delivered him before us; and we smote him, and his sons, and all his people. '
  '34':
  - type: text
    content: 'And we took all his cities at that time, and utterly destroyed the men, and the women, and the little ones, of every city, we left none to remain: '
  '35':
  - type: text
    content: 'only the cattle we took for a prey unto ourselves, and the spoil of the cities which we took. '
  '36':
  - type: text
    content: 'From Aroer, which '
  - type: text
    content: is
  - type: text
    content: ' by the brink of the river of Arnon, and '
  - type: text
    content: from
  - type: text
    content: ' the city that '
  - type: text
    content: is
  - type: text
    content: ' by the river, even unto Gilead, there was not one city too strong for us: the '
  - type: text
    content: LORD
  - type: text
    content: ' our God delivered all unto us: '
  '37':
  - type: text
    content: 'only unto the land of the children of Ammon thou camest not, '
  - type: text
    content: nor
  - type: text
    content: ' unto any place of the river Jabbok, nor unto the cities in the mountains, nor unto whatsoever the '
  - type: text
    content: LORD
  - type: text
    content: ' our God forbad us.'
  '4':
  - type: text
    content: 'And command thou the people, saying, Ye '
  - type: text
    content: are
  - type: text
    content: ' to pass through the coast of your brethren the children of Esau, which dwell in Seir; and they shall be afraid of you: take ye good heed unto yourselves therefore: '
  '5':
  - type: text
    content: 'meddle not with them; for I will not give you of their land, no, not so much as a foot breadth; because I have given mount Seir unto Esau '
  - type: text
    content: for
  - type: text
    content: ' a possession. '
  '6':
  - type: text
    content: 'Ye shall buy meat of them for money, that ye may eat; and ye shall also buy water of them for money, that ye may drink. '
  '7':
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God hath blessed thee in all the works of thy hand: he knoweth thy walking through this great wilderness: these forty years the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God '
  - type: text
    content: hath been
  - type: text
    content: ' with thee; thou hast lacked nothing.'
  '8':
  - type: text
    content: 'And when we passed by from our brethren the children of Esau, which dwelt in Seir, through the way of the plain from Elath, and from Ezion-gaber, we turned and passed by the way of the wilderness of Moab. '
  '9':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto me, Distress not the Moabites, neither contend with them in battle: for I will not give thee of their land '
  - type: text
    content: for
  - type: text
    content: ' a possession; because I have given Ar unto the children of Lot '
  - type: text
    content: for
  - type: text
    content: ' a possession. '
