document_id: PRO.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The proverbs of Solomon the son of David, king of Israel;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: To know wisdom and instruction;
- type: usfm
  marker: q2
  children:
  - type: text
    text: To perceive the words of understanding;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: To receive the instruction of wisdom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Justice, and judgment, and equity;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: To give subtilty to the simple,
- type: usfm
  marker: q2
  children:
  - type: text
    text: To the young man knowledge and discretion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'A wise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' will hear, and will increase learning;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And a man of understanding shall attain unto wise counsels:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: To understand a proverb, and the interpretation;
- type: usfm
  marker: q2
  children:
  - type: text
    text: The words of the wise, and their dark sayings.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the beginning of knowledge:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: But
  - type: text
    text: ' fools despise wisdom and instruction.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: My son, hear the instruction of thy father,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And forsake not the law of thy mother:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' an ornament of grace unto thy head,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And chains about thy neck.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: My son, if sinners entice thee,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Consent thou not.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: If they say, Come with us, let us lay wait for blood,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Let us lurk privily for the innocent without cause:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Let us swallow them up alive as the grave;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And whole, as those that go down into the pit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: We shall find all precious substance,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'We shall fill our houses with spoil:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Cast in thy lot among us;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Let us all have one purse:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: My son, walk not thou in the way with them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Refrain thy foot from their path:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For their feet run to evil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And make haste to shed blood.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Surely in vain the net is spread
- type: usfm
  marker: q2
  children:
  - type: text
    text: In the sight of any bird.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And they lay wait for their '
  - type: usfm
    marker: add
    children:
    - type: text
      text: own
  - type: text
    text: ' blood;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They lurk privily for their '
  - type: usfm
    marker: add
    children:
    - type: text
      text: own
  - type: text
    text: ' lives.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the ways of every one that is greedy of gain;'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Which
  - type: text
    text: ' taketh away the life of the owners thereof.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Cry of Wisdom
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Wisdom crieth without;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'She uttereth her voice in the streets:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'She crieth in the chief place of concourse, in the openings of the gates:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'In the city she uttereth her words, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saying
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: How long, ye simple ones, will ye love simplicity?
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the scorners delight in their scorning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And fools hate knowledge?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Turn you at my reproof:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Behold, I will pour out my spirit unto you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will make known my words unto you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Because I have called, and ye refused;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have stretched out my hand, and no man regarded;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: But ye have set at nought all my counsel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And would none of my reproof:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: I also will laugh at your calamity;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will mock when your fear cometh;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: When your fear cometh as desolation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And your destruction cometh as a whirlwind;
- type: usfm
  marker: q2
  children:
  - type: text
    text: When distress and anguish cometh upon you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Then shall they call upon me, but I will not answer;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They shall seek me early, but they shall not find me:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: For that they hated knowledge,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And did not choose the fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'They would none of my counsel:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They despised all my reproof.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Therefore shall they eat of the fruit of their own way,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And be filled with their own devices.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: For the turning away of the simple shall slay them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the prosperity of fools shall destroy them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: But whoso hearkeneth unto me shall dwell safely,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And shall be quiet from fear of evil.
