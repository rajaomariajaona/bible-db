document_id: PRO.1,1
type_code: eng
verses:
  '1':
  - type: text
    content: The proverbs of Solomon the son of David, king of Israel;
  '10':
  - type: text
    content: My son, if sinners entice thee,
  - type: text
    content: Consent thou not.
  '11':
  - type: text
    content: If they say, Come with us, let us lay wait for blood,
  - type: text
    content: 'Let us lurk privily for the innocent without cause:'
  '12':
  - type: text
    content: Let us swallow them up alive as the grave;
  - type: text
    content: 'And whole, as those that go down into the pit:'
  '13':
  - type: text
    content: We shall find all precious substance,
  - type: text
    content: 'We shall fill our houses with spoil:'
  '14':
  - type: text
    content: Cast in thy lot among us;
  - type: text
    content: 'Let us all have one purse:'
  '15':
  - type: text
    content: My son, walk not thou in the way with them;
  - type: text
    content: 'Refrain thy foot from their path:'
  '16':
  - type: text
    content: For their feet run to evil,
  - type: text
    content: And make haste to shed blood.
  '17':
  - type: text
    content: Surely in vain the net is spread
  - type: text
    content: In the sight of any bird.
  '18':
  - type: text
    content: 'And they lay wait for their '
  - type: text
    content: own
  - type: text
    content: ' blood;'
  - type: text
    content: 'They lurk privily for their '
  - type: text
    content: own
  - type: text
    content: ' lives.'
  '19':
  - type: text
    content: 'So '
  - type: text
    content: are
  - type: text
    content: ' the ways of every one that is greedy of gain;'
  - type: text
    content: Which
  - type: text
    content: ' taketh away the life of the owners thereof.'
  - type: heading
    content: The Cry of Wisdom
  '2':
  - type: text
    content: To know wisdom and instruction;
  - type: text
    content: To perceive the words of understanding;
  '20':
  - type: text
    content: Wisdom crieth without;
  - type: text
    content: 'She uttereth her voice in the streets:'
  '21':
  - type: text
    content: 'She crieth in the chief place of concourse, in the openings of the gates:'
  - type: text
    content: 'In the city she uttereth her words, '
  - type: text
    content: saying
  - type: text
    content: ','
  '22':
  - type: text
    content: How long, ye simple ones, will ye love simplicity?
  - type: text
    content: And the scorners delight in their scorning,
  - type: text
    content: And fools hate knowledge?
  '23':
  - type: text
    content: 'Turn you at my reproof:'
  - type: text
    content: Behold, I will pour out my spirit unto you,
  - type: text
    content: I will make known my words unto you.
  '24':
  - type: text
    content: Because I have called, and ye refused;
  - type: text
    content: I have stretched out my hand, and no man regarded;
  '25':
  - type: text
    content: But ye have set at nought all my counsel,
  - type: text
    content: 'And would none of my reproof:'
  '26':
  - type: text
    content: I also will laugh at your calamity;
  - type: text
    content: I will mock when your fear cometh;
  '27':
  - type: text
    content: When your fear cometh as desolation,
  - type: text
    content: And your destruction cometh as a whirlwind;
  - type: text
    content: When distress and anguish cometh upon you.
  '28':
  - type: text
    content: Then shall they call upon me, but I will not answer;
  - type: text
    content: 'They shall seek me early, but they shall not find me:'
  '29':
  - type: text
    content: For that they hated knowledge,
  - type: text
    content: 'And did not choose the fear of the '
  - type: text
    content: LORD
  - type: text
    content: ':'
  '3':
  - type: text
    content: To receive the instruction of wisdom,
  - type: text
    content: Justice, and judgment, and equity;
  '30':
  - type: text
    content: 'They would none of my counsel:'
  - type: text
    content: They despised all my reproof.
  '31':
  - type: text
    content: Therefore shall they eat of the fruit of their own way,
  - type: text
    content: And be filled with their own devices.
  '32':
  - type: text
    content: For the turning away of the simple shall slay them,
  - type: text
    content: And the prosperity of fools shall destroy them.
  '33':
  - type: text
    content: But whoso hearkeneth unto me shall dwell safely,
  - type: text
    content: And shall be quiet from fear of evil.
  '4':
  - type: text
    content: To give subtilty to the simple,
  - type: text
    content: To the young man knowledge and discretion.
  '5':
  - type: text
    content: 'A wise '
  - type: text
    content: man
  - type: text
    content: ' will hear, and will increase learning;'
  - type: text
    content: 'And a man of understanding shall attain unto wise counsels:'
  '6':
  - type: text
    content: To understand a proverb, and the interpretation;
  - type: text
    content: The words of the wise, and their dark sayings.
  '7':
  - type: text
    content: 'The fear of the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' the beginning of knowledge:'
  - type: text
    content: But
  - type: text
    content: ' fools despise wisdom and instruction.'
  '8':
  - type: text
    content: My son, hear the instruction of thy father,
  - type: text
    content: 'And forsake not the law of thy mother:'
  '9':
  - type: text
    content: 'For they '
  - type: text
    content: shall be
  - type: text
    content: ' an ornament of grace unto thy head,'
  - type: text
    content: And chains about thy neck.
