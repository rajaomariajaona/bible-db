document_id: PSA.51,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the chief Musician, A Psalm of David, when Nathan the prophet came unto him, after he had gone in to Bath-sheba.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Have mercy upon me, O God, according to thy lovingkindness:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: According unto the multitude of thy tender mercies blot out my transgressions.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Create in me a clean heart, O God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And renew a right spirit within me.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cast me not away from thy presence;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And take not thy holy spirit from me.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Restore unto me the joy of thy salvation;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And uphold me '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with thy
    - type: text
      text: ' free spirit.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Then
    - type: text
      text: ' will I teach transgressors thy ways;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And sinners shall be converted unto thee.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Deliver me from bloodguiltiness, O God, thou God of my salvation:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' my tongue shall sing aloud of thy righteousness.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Lord, open thou my lips;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And my mouth shall shew forth thy praise.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For thou desirest not sacrifice; else would I give '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'it:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou delightest not in burnt offering.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The sacrifices of God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' a broken spirit:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A broken and a contrite heart, O God, thou wilt not despise.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Do good in thy good pleasure unto Zion:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Build thou the walls of Jerusalem.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then shalt thou be pleased with the sacrifices of righteousness, with burnt offering and whole burnt offering:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then shall they offer bullocks upon thine altar.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wash me throughly from mine iniquity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And cleanse me from my sin.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For I acknowledge my transgressions:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And my sin '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' ever before me.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Against thee, thee only, have I sinned, and done '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ' evil in thy sight:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That thou mightest be justified when thou speakest, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' be clear when thou judgest.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold, I was shapen in iniquity;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And in sin did my mother conceive me.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Behold, thou desirest truth in the inward parts:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And in the hidden '
    - type: usfm
      marker: add
      children:
      - type: text
        text: part
    - type: text
      text: ' thou shalt make me to know wisdom.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Purge me with hyssop, and I shall be clean:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Wash me, and I shall be whiter than snow.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make me to hear joy and gladness;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: That
    - type: text
      text: ' the bones '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' thou hast broken may rejoice.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hide thy face from my sins,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And blot out all mine iniquities.
