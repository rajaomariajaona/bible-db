document_id: PSA.51,1
type_code: eng
verses:
  '1':
  - type: text
    content: To the chief Musician, A Psalm of David, when Nathan the prophet came unto him, after he had gone in to Bath-sheba.
  - type: text
    content: 'Have mercy upon me, O God, according to thy lovingkindness:'
  - type: text
    content: According unto the multitude of thy tender mercies blot out my transgressions.
  '10':
  - type: text
    content: Create in me a clean heart, O God;
  - type: text
    content: And renew a right spirit within me.
  '11':
  - type: text
    content: Cast me not away from thy presence;
  - type: text
    content: And take not thy holy spirit from me.
  '12':
  - type: text
    content: Restore unto me the joy of thy salvation;
  - type: text
    content: 'And uphold me '
  - type: text
    content: with thy
  - type: text
    content: ' free spirit.'
  '13':
  - type: text
    content: ' '
  - type: text
    content: Then
  - type: text
    content: ' will I teach transgressors thy ways;'
  - type: text
    content: And sinners shall be converted unto thee.
  '14':
  - type: text
    content: 'Deliver me from bloodguiltiness, O God, thou God of my salvation:'
  - type: text
    content: And
  - type: text
    content: ' my tongue shall sing aloud of thy righteousness.'
  '15':
  - type: text
    content: O Lord, open thou my lips;
  - type: text
    content: And my mouth shall shew forth thy praise.
  '16':
  - type: text
    content: 'For thou desirest not sacrifice; else would I give '
  - type: text
    content: 'it:'
  - type: text
    content: Thou delightest not in burnt offering.
  '17':
  - type: text
    content: 'The sacrifices of God '
  - type: text
    content: are
  - type: text
    content: ' a broken spirit:'
  - type: text
    content: A broken and a contrite heart, O God, thou wilt not despise.
  '18':
  - type: text
    content: 'Do good in thy good pleasure unto Zion:'
  - type: text
    content: Build thou the walls of Jerusalem.
  '19':
  - type: text
    content: 'Then shalt thou be pleased with the sacrifices of righteousness, with burnt offering and whole burnt offering:'
  - type: text
    content: Then shall they offer bullocks upon thine altar.
  '2':
  - type: text
    content: Wash me throughly from mine iniquity,
  - type: text
    content: And cleanse me from my sin.
  '3':
  - type: text
    content: 'For I acknowledge my transgressions:'
  - type: text
    content: 'And my sin '
  - type: text
    content: is
  - type: text
    content: ' ever before me.'
  '4':
  - type: text
    content: 'Against thee, thee only, have I sinned, and done '
  - type: text
    content: this
  - type: text
    content: ' evil in thy sight:'
  - type: text
    content: 'That thou mightest be justified when thou speakest, '
  - type: text
    content: and
  - type: text
    content: ' be clear when thou judgest.'
  '5':
  - type: text
    content: Behold, I was shapen in iniquity;
  - type: text
    content: And in sin did my mother conceive me.
  '6':
  - type: text
    content: 'Behold, thou desirest truth in the inward parts:'
  - type: text
    content: 'And in the hidden '
  - type: text
    content: part
  - type: text
    content: ' thou shalt make me to know wisdom.'
  '7':
  - type: text
    content: 'Purge me with hyssop, and I shall be clean:'
  - type: text
    content: Wash me, and I shall be whiter than snow.
  '8':
  - type: text
    content: Make me to hear joy and gladness;
  - type: text
    content: That
  - type: text
    content: ' the bones '
  - type: text
    content: which
  - type: text
    content: ' thou hast broken may rejoice.'
  '9':
  - type: text
    content: Hide thy face from my sins,
  - type: text
    content: And blot out all mine iniquities.
