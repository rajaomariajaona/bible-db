document_id: PSA.51
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: To the chief Musician, A Psalm of David, when Nathan the prophet came unto him, after he had gone in to Bath-sheba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Have mercy upon me, O God, according to thy lovingkindness:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: According unto the multitude of thy tender mercies blot out my transgressions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Wash me throughly from mine iniquity,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And cleanse me from my sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For I acknowledge my transgressions:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And my sin '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' ever before me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Against thee, thee only, have I sinned, and done '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' evil in thy sight:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'That thou mightest be justified when thou speakest, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' be clear when thou judgest.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Behold, I was shapen in iniquity;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And in sin did my mother conceive me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Behold, thou desirest truth in the inward parts:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And in the hidden '
  - type: usfm
    marker: add
    children:
    - type: text
      text: part
  - type: text
    text: ' thou shalt make me to know wisdom.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Purge me with hyssop, and I shall be clean:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Wash me, and I shall be whiter than snow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Make me to hear joy and gladness;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: That
  - type: text
    text: ' the bones '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' thou hast broken may rejoice.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hide thy face from my sins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And blot out all mine iniquities.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Create in me a clean heart, O God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And renew a right spirit within me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Cast me not away from thy presence;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And take not thy holy spirit from me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Restore unto me the joy of thy salvation;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And uphold me '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with thy
  - type: text
    text: ' free spirit.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Then
  - type: text
    text: ' will I teach transgressors thy ways;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And sinners shall be converted unto thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Deliver me from bloodguiltiness, O God, thou God of my salvation:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' my tongue shall sing aloud of thy righteousness.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: O Lord, open thou my lips;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And my mouth shall shew forth thy praise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For thou desirest not sacrifice; else would I give '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'it:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou delightest not in burnt offering.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The sacrifices of God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' a broken spirit:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: A broken and a contrite heart, O God, thou wilt not despise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Do good in thy good pleasure unto Zion:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Build thou the walls of Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then shalt thou be pleased with the sacrifices of righteousness, with burnt offering and whole burnt offering:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Then shall they offer bullocks upon thine altar.
