document_id: JOS.18
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Tabernacle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the whole congregation of the children of Israel assembled together at Shiloh, and set up the tabernacle of the congregation there. And the land was subdued before them. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And there remained among the children of Israel seven tribes, which had not yet received their inheritance. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Joshua said unto the children of Israel, How long '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' ye slack to go to possess the land, which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of your fathers hath given you? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Give out from among you three men for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: each
  - type: text
    text: ' tribe: and I will send them, and they shall rise, and go through the land, and describe it according to the inheritance of them; and they shall come '
  - type: usfm
    marker: add
    children:
    - type: text
      text: again
  - type: text
    text: ' to me. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And they shall divide it into seven parts: Judah shall abide in their coast on the south, and the house of Joseph shall abide in their coasts on the north. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ye shall therefore describe the land '
  - type: usfm
    marker: add
    children:
    - type: text
      text: into
  - type: text
    text: ' seven parts, and bring '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the description
  - type: text
    text: ' hither to me, that I may cast lots for you here before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' our God. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But the Levites have no part among you; for the priesthood of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' their inheritance: and Gad, and Reuben, and half the tribe of Manasseh, have received their inheritance beyond Jordan on the east, which Moses the servant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' gave them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the men arose, and went away: and Joshua charged them that went to describe the land, saying, Go and walk through the land, and describe it, and come again to me, that I may here cast lots for you before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' in Shiloh. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the men went and passed through the land, and described it by cities into seven parts in a book, and came '
  - type: usfm
    marker: add
    children:
    - type: text
      text: again
  - type: text
    text: ' to Joshua to the host at Shiloh. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Joshua cast lots for them in Shiloh before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': and there Joshua divided the land unto the children of Israel according to their divisions.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the lot of the tribe of the children of Benjamin came up according to their families: and the coast of their lot came forth between the children of Judah and the children of Joseph. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And their border on the north side was from Jordan; and the border went up to the side of Jericho on the north side, and went up through the mountains westward; and the goings out thereof were at the wilderness of Beth-aven. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And the border went over from thence toward Luz, to the side of Luz, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Beth-el, southward; and the border descended to Ataroth-addar, near the hill that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: lieth
  - type: text
    text: ' on the south side of the nether Beth-horon. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And the border was drawn '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thence
  - type: text
    text: ', and compassed the corner of the sea southward, from the hill that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: lieth
  - type: text
    text: ' before Beth-horon southward; and the goings out thereof were at Kirjath-baal, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Kirjath-jearim, a city of the children of Judah: this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the west quarter. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the south quarter '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' from the end of Kirjath-jearim, and the border went out on the west, and went out to the well of waters of Nephtoah: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and the border came down to the end of the mountain that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: lieth
  - type: text
    text: ' before the valley of the son of Hinnom, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the valley of the giants on the north, and descended to the valley of Hinnom, to the side of Jebusi on the south, and descended to En-rogel, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'and was drawn from the north, and went forth to En-shemesh, and went forth toward Geliloth, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' over against the going up of Adummim, and descended to the stone of Bohan the son of Reuben, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and passed along toward the side over against Arabah northward, and went down unto Arabah: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and the border passed along to the side of Beth-hoglah northward: and the outgoings of the border were at the north bay of the salt sea at the south end of Jordan: this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the south coast. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Jordan was the border of it on the east side. This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the inheritance of the children of Benjamin, by the coasts thereof round about, according to their families.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Now the cities of the tribe of the children of Benjamin according to their families were Jericho, and Beth-hoglah, and the valley of Keziz, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'and Beth-arabah, and Zemaraim, and Beth-el, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'and Avim, and Parah, and Ophrah, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and Chephar-haammonai, and Ophni, and Gaba; twelve cities with their villages: '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Gibeon, and Ramah, and Beeroth, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and Mizpeh, and Chephirah, and Mozah, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'and Rekem, and Irpeel, and Taralah, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and Zelah, Eleph, and Jebusi, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Jerusalem, Gibeath, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' Kirjath; fourteen cities with their villages. This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the inheritance of the children of Benjamin according to their families.'
