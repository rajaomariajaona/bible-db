verses:
  '1':
  - type: text
    content: 'When therefore the Lord knew how the Pharisees had heard that Jesus made and baptized more disciples than John, '
  '10':
  - type: text
    content: 'Jesus answered and said unto her, '
  - type: text
    content: If thou knewest the gift of God, and who it is that saith to thee, Give me to drink; thou wouldest have asked of him, and he would have given thee living water.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'The woman saith unto him, Sir, thou hast nothing to draw with, and the well is deep: from whence then hast thou that living water? '
  '12':
  - type: text
    content: 'Art thou greater than our father Jacob, which gave us the well, and drank thereof himself, and his children, and his cattle? '
  '13':
  - type: text
    content: 'Jesus answered and said unto her, '
  - type: text
    content: 'Whosoever drinketh of this water shall thirst again:'
  - type: text
    content: ' '
  '14':
  - type: text
    content: but whosoever drinketh of the water that I shall give him shall never thirst; but the water that I shall give him shall be in him a well of water springing up into everlasting life.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'The woman saith unto him, Sir, give me this water, that I thirst not, neither come hither to draw. '
  '16':
  - type: text
    content: 'Jesus saith unto her, '
  - type: text
    content: Go, call thy husband, and come hither.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'The woman answered and said, I have no husband. Jesus said unto her, '
  - type: text
    content: 'Thou hast well said, I have no husband:'
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'for thou hast had five husbands; and he whom thou now hast is not thy husband: in that saidst thou truly.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'The woman saith unto him, Sir, I perceive that thou art a prophet. '
  '2':
  - type: text
    content: '(though Jesus himself baptized not, but his disciples,) '
  '20':
  - type: text
    content: Our fathers worshipped in this mountain; and ye say, that in Jerusalem is the place where men ought to worship.
  '21':
  - type: text
    content: 'Jesus saith unto her, '
  - type: text
    content: Woman, believe me, the hour cometh, when ye shall neither in this mountain, nor yet at Jerusalem, worship the Father.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Ye worship ye know not what: we know what we worship: for salvation is of the Jews.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'But the hour cometh, and now is, when the true worshippers shall worship the Father in spirit and in truth: for the Father seeketh such to worship him.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'God '
  - type: text
    content: is
  - type: text
    content: ' a Spirit: and they that worship him must worship '
  - type: text
    content: him
  - type: text
    content: ' in spirit and in truth.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'The woman saith unto him, I know that Messias cometh, which is called Christ: when he is come, he will tell us all things. '
  '26':
  - type: text
    content: 'Jesus saith unto her, '
  - type: text
    content: 'I that speak unto thee am '
  - type: text
    content: he
  - type: text
    content: .
  '27':
  - type: text
    content: 'And upon this came his disciples, and marvelled that he talked with the woman: yet no man said, What seekest thou? or, Why talkest thou with her? '
  '28':
  - type: text
    content: 'The woman then left her waterpot, and went her way into the city, and saith to the men, '
  '29':
  - type: text
    content: 'Come, see a man, which told me all things that ever I did: is not this the Christ? '
  '3':
  - type: text
    content: 'he left Judæa, and departed again into Galilee. '
  '30':
  - type: text
    content: Then they went out of the city, and came unto him.
  '31':
  - type: text
    content: 'In the mean while his disciples prayed him, saying, Master, eat. '
  '32':
  - type: text
    content: 'But he said unto them, '
  - type: text
    content: I have meat to eat that ye know not of.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'Therefore said the disciples one to another, Hath any man brought him '
  - type: text
    content: ought
  - type: text
    content: ' to eat? '
  '34':
  - type: text
    content: 'Jesus saith unto them, '
  - type: text
    content: My meat is to do the will of him that sent me, and to finish his work.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Say not ye, There are yet four months, and '
  - type: text
    content: then
  - type: text
    content: ' cometh harvest? behold, I say unto you, Lift up your eyes, and look on the fields; for they are white already to harvest.'
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'And he that reapeth receiveth wages, and gathereth fruit unto life eternal: that both he that soweth and he that reapeth may rejoice together.'
  - type: text
    content: ' '
  '37':
  - type: text
    content: And herein is that saying true, One soweth, and another reapeth.
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'I sent you to reap that whereon ye bestowed no labour: other men laboured, and ye are entered into their labours.'
  '39':
  - type: text
    content: 'And many of the Samaritans of that city believed on him for the saying of the woman, which testified, He told me all that ever I did. '
  '4':
  - type: text
    content: And he must needs go through Samaria.
  - type: heading
    content: The Woman of Samaria
  '40':
  - type: text
    content: 'So when the Samaritans were come unto him, they besought him that he would tarry with them: and he abode there two days. '
  '41':
  - type: text
    content: 'And many more believed because of his own word; '
  '42':
  - type: text
    content: 'and said unto the woman, Now we believe, not because of thy saying: for we have heard '
  - type: text
    content: him
  - type: text
    content: ' ourselves, and know that this is indeed the Christ, the Saviour of the world.'
  '43':
  - type: text
    content: 'Now after two days he departed thence, and went into Galilee. '
  '44':
  - type: text
    content: 'For Jesus himself testified, that a prophet hath no honour in his own country. '
  '45':
  - type: text
    content: 'Then when he was come into Galilee, the Galilæans received him, having seen all the things that he did at Jerusalem at the feast: for they also went unto the feast.'
  '46':
  - type: text
    content: 'So Jesus came again into Cana of Galilee, where he made the water wine. And there was a certain nobleman, whose son was sick at Capernaum. '
  '47':
  - type: text
    content: 'When he heard that Jesus was come out of Judæa into Galilee, he went unto him, and besought him that he would come down, and heal his son: for he was at the point of death. '
  '48':
  - type: text
    content: 'Then said Jesus unto him, '
  - type: text
    content: Except ye see signs and wonders, ye will not believe.
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'The nobleman saith unto him, Sir, come down ere my child die. '
  '5':
  - type: text
    content: 'Then cometh he to a city of Samaria, which is called Sychar, near to the parcel of ground that Jacob gave to his son Joseph. '
  '50':
  - type: text
    content: 'Jesus saith unto him, '
  - type: text
    content: Go thy way; thy son liveth.
  - type: text
    content: ' And the man believed the word that Jesus had spoken unto him, and he went his way. '
  '51':
  - type: text
    content: 'And as he was now going down, his servants met him, and told '
  - type: text
    content: him
  - type: text
    content: ', saying, Thy son liveth. '
  '52':
  - type: text
    content: 'Then enquired he of them the hour when he began to amend. And they said unto him, Yesterday at the seventh hour the fever left him. '
  '53':
  - type: text
    content: 'So the father knew that '
  - type: text
    content: it was
  - type: text
    content: ' at the same hour, in the which Jesus said unto him, '
  - type: text
    content: Thy son liveth
  - type: text
    content: ': and himself believed, and his whole house. '
  '54':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' again the second miracle '
  - type: text
    content: that
  - type: text
    content: ' Jesus did, when he was come out of Judæa into Galilee.'
  '6':
  - type: text
    content: 'Now Jacob''s well was there. Jesus therefore, being wearied with '
  - type: text
    content: his
  - type: text
    content: ' journey, sat thus on the well: '
  - type: text
    content: and
  - type: text
    content: ' it was about the sixth hour.'
  '7':
  - type: text
    content: 'There cometh a woman of Samaria to draw water: Jesus saith unto her, '
  - type: text
    content: Give me to drink.
  - type: text
    content: ' '
  '8':
  - type: text
    content: (For his disciples were gone away unto the city to buy meat.)
  '9':
  - type: text
    content: 'Then saith the woman of Samaria unto him, How is it that thou, being a Jew, askest drink of me, which am a woman of Samaria? for the Jews have no dealings with the Samaritans. '
