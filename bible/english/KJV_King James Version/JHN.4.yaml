document_id: JHN.4,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'When therefore the Lord knew how the Pharisees had heard that Jesus made and baptized more disciples than John, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Jesus answered and said unto her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If thou knewest the gift of God, and who it is that saith to thee, Give me to drink; thou wouldest have asked of him, and he would have given thee living water.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The woman saith unto him, Sir, thou hast nothing to draw with, and the well is deep: from whence then hast thou that living water? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Art thou greater than our father Jacob, which gave us the well, and drank thereof himself, and his children, and his cattle? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Jesus answered and said unto her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Whosoever drinketh of this water shall thirst again:'
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but whosoever drinketh of the water that I shall give him shall never thirst; but the water that I shall give him shall be in him a well of water springing up into everlasting life.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The woman saith unto him, Sir, give me this water, that I thirst not, neither come hither to draw. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Jesus saith unto her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Go, call thy husband, and come hither.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The woman answered and said, I have no husband. Jesus said unto her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Thou hast well said, I have no husband:'
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'for thou hast had five husbands; and he whom thou now hast is not thy husband: in that saidst thou truly.'
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'The woman saith unto him, Sir, I perceive that thou art a prophet. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '(though Jesus himself baptized not, but his disciples,) '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Our fathers worshipped in this mountain; and ye say, that in Jerusalem is the place where men ought to worship.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Jesus saith unto her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Woman, believe me, the hour cometh, when ye shall neither in this mountain, nor yet at Jerusalem, worship the Father.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ye worship ye know not what: we know what we worship: for salvation is of the Jews.'
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But the hour cometh, and now is, when the true worshippers shall worship the Father in spirit and in truth: for the Father seeketh such to worship him.'
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'God '
      - type: usfm
        marker: add
        children:
        - type: text
          text: is
      - type: text
        text: ' a Spirit: and they that worship him must worship '
      - type: usfm
        marker: add
        children:
        - type: text
          text: him
      - type: text
        text: ' in spirit and in truth.'
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'The woman saith unto him, I know that Messias cometh, which is called Christ: when he is come, he will tell us all things. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Jesus saith unto her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I that speak unto thee am '
      - type: usfm
        marker: add
        children:
        - type: text
          text: he
      - type: text
        text: .
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And upon this came his disciples, and marvelled that he talked with the woman: yet no man said, What seekest thou? or, Why talkest thou with her? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'The woman then left her waterpot, and went her way into the city, and saith to the men, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Come, see a man, which told me all things that ever I did: is not this the Christ? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'he left Judæa, and departed again into Galilee. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Then they went out of the city, and came unto him.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'In the mean while his disciples prayed him, saying, Master, eat. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'But he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I have meat to eat that ye know not of.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Therefore said the disciples one to another, Hath any man brought him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ought
    - type: text
      text: ' to eat? '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Jesus saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: My meat is to do the will of him that sent me, and to finish his work.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Say not ye, There are yet four months, and '
      - type: usfm
        marker: add
        children:
        - type: text
          text: then
      - type: text
        text: ' cometh harvest? behold, I say unto you, Lift up your eyes, and look on the fields; for they are white already to harvest.'
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And he that reapeth receiveth wages, and gathereth fruit unto life eternal: that both he that soweth and he that reapeth may rejoice together.'
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And herein is that saying true, One soweth, and another reapeth.
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I sent you to reap that whereon ye bestowed no labour: other men laboured, and ye are entered into their labours.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'And many of the Samaritans of that city believed on him for the saying of the woman, which testified, He told me all that ever I did. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: And he must needs go through Samaria.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Woman of Samaria
    marker-yv: yv-h
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'So when the Samaritans were come unto him, they besought him that he would tarry with them: and he abode there two days. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'And many more believed because of his own word; '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'and said unto the woman, Now we believe, not because of thy saying: for we have heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' ourselves, and know that this is indeed the Christ, the Saviour of the world.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Now after two days he departed thence, and went into Galilee. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'For Jesus himself testified, that a prophet hath no honour in his own country. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Then when he was come into Galilee, the Galilæans received him, having seen all the things that he did at Jerusalem at the feast: for they also went unto the feast.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'So Jesus came again into Cana of Galilee, where he made the water wine. And there was a certain nobleman, whose son was sick at Capernaum. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'When he heard that Jesus was come out of Judæa into Galilee, he went unto him, and besought him that he would come down, and heal his son: for he was at the point of death. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Then said Jesus unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Except ye see signs and wonders, ye will not believe.
    - type: text
      text: ' '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'The nobleman saith unto him, Sir, come down ere my child die. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then cometh he to a city of Samaria, which is called Sychar, near to the parcel of ground that Jacob gave to his son Joseph. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Jesus saith unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Go thy way; thy son liveth.
    - type: text
      text: ' And the man believed the word that Jesus had spoken unto him, and he went his way. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'And as he was now going down, his servants met him, and told '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', saying, Thy son liveth. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Then enquired he of them the hour when he began to amend. And they said unto him, Yesterday at the seventh hour the fever left him. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'So the father knew that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it was
    - type: text
      text: ' at the same hour, in the which Jesus said unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Thy son liveth
    - type: text
      text: ': and himself believed, and his whole house. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' again the second miracle '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' Jesus did, when he was come out of Judæa into Galilee.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Now Jacob''s well was there. Jesus therefore, being wearied with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' journey, sat thus on the well: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' it was about the sixth hour.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'There cometh a woman of Samaria to draw water: Jesus saith unto her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Give me to drink.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: (For his disciples were gone away unto the city to buy meat.)
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then saith the woman of Samaria unto him, How is it that thou, being a Jew, askest drink of me, which am a woman of Samaria? for the Jews have no dealings with the Samaritans. '
