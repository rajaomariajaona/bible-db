document_id: MRK.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Holy Week
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sunday
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And when they came nigh to Jerusalem, unto Bethphage and Bethany, at the mount of Olives, he sendeth forth two of his disciples, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and saith unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Go your way into the village over against you: and as soon as ye be entered into it, ye shall find a colt tied, whereon never man sat; loose him, and bring '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And if any man say unto you, Why do ye this? say ye that the Lord hath need of him; and straightway he will send him hither.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And they went their way, and found the colt tied by the door without in a place where two ways met; and they loose him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And certain of them that stood there said unto them, What do ye, loosing the colt? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And they said unto them even as Jesus had commanded: and they let them go. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And they brought the colt to Jesus, and cast their garments on him; and he sat upon him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And many spread their garments in the way: and others cut down branches off the trees, and strawed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' in the way. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And they that went before, and they that followed, cried, saying, Hosanna; Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' he that cometh in the name of the Lord: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' the kingdom of our father David, that cometh in the name of the Lord: Hosanna in the highest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Jesus entered into Jerusalem, and into the temple: and when he had looked round about upon all things, and now the eventide was come, he went out unto Bethany with the twelve.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Monday
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And on the morrow, when they were come from Bethany, he was hungry: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and seeing a fig tree afar off having leaves, he came, if haply he might find any thing thereon: and when he came to it, he found nothing but leaves; for the time of figs was not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yet
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And Jesus answered and said unto it, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: No man eat fruit of thee hereafter for ever.
  - type: text
    text: ' And his disciples heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And they come to Jerusalem: and Jesus went into the temple, and began to cast out them that sold and bought in the temple, and overthrew the tables of the moneychangers, and the seats of them that sold doves; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and would not suffer that any man should carry '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' vessel through the temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And he taught, saying unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Is it not written, My house shall be called of all nations the house of prayer? but ye have made it a den of thieves.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And the scribes and chief priests heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and sought how they might destroy him: for they feared him, because all the people was astonished at his doctrine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: And when even was come, he went out of the city.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Tuesday
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And in the morning, as they passed by, they saw the fig tree dried up from the roots. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And Peter calling to remembrance saith unto him, Master, behold, the fig tree which thou cursedst is withered away. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And Jesus answering saith unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Have faith in God.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For verily I say unto you, That whosoever shall say unto this mountain, Be thou removed, and be thou cast into the sea; and shall not doubt in his heart, but shall believe that those things which he saith shall come to pass; he shall have whatsoever he saith.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Therefore I say unto you, What things soever ye desire, when ye pray, believe that ye receive '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ', and ye shall have '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And when ye stand praying, forgive, if ye have ought against any: that your Father also which is in heaven may forgive you your trespasses.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But if ye do not forgive, neither will your Father which is in heaven forgive your trespasses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And they come again to Jerusalem: and as he was walking in the temple, there come to him the chief priests, and the scribes, and the elders, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and say unto him, By what authority doest thou these things? and who gave thee this authority to do these things? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And Jesus answered and said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I will also ask of you one question, and answer me, and I will tell you by what authority I do these things.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'The baptism of John, was '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' from heaven, or of men? answer me.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And they reasoned with themselves, saying, If we shall say, From heaven; he will say, Why then did ye not believe him? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'But if we shall say, Of men; they feared the people: for all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' counted John, that he was a prophet indeed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And they answered and said unto Jesus, We cannot tell. And Jesus answering saith unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Neither do I tell you by what authority I do these things.
