verses:
  '1':
  - type: text
    content: 'Thou shalt not raise a false report: put not thine hand with the wicked to be an unrighteous witness. '
  '10':
  - type: text
    content: 'And six years thou shalt sow thy land, and shalt gather in the fruits thereof: '
  '11':
  - type: text
    content: 'but the seventh '
  - type: text
    content: year
  - type: text
    content: ' thou shalt let it rest and lie still; that the poor of thy people may eat: and what they leave the beasts of the field shall eat. In like manner thou shalt deal with thy vineyard, '
  - type: text
    content: and
  - type: text
    content: ' with thy oliveyard. '
  '12':
  - type: text
    content: 'Six days thou shalt do thy work, and on the seventh day thou shalt rest: that thine ox and thine ass may rest, and the son of thy handmaid, and the stranger, may be refreshed. '
  '13':
  - type: text
    content: 'And in all '
  - type: text
    content: things
  - type: text
    content: ' that I have said unto you be circumspect: and make no mention of the name of other gods, neither let it be heard out of thy mouth.'
  '14':
  - type: text
    content: 'Three times thou shalt keep a feast unto me in the year. '
  '15':
  - type: text
    content: 'Thou shalt keep the feast of unleavened bread: (thou shalt eat unleavened bread seven days, as I commanded thee, in the time appointed of the month Abib; for in it thou camest out from Egypt: and none shall appear before me empty:) '
  '16':
  - type: text
    content: 'and the feast of harvest, the firstfruits of thy labours, which thou hast sown in the field: and the feast of ingathering, '
  - type: text
    content: which is
  - type: text
    content: ' in the end of the year, when thou hast gathered in thy labours out of the field. '
  '17':
  - type: text
    content: 'Three times in the year all thy males shall appear before the Lord '
  - type: text
    content: GOD
  - type: text
    content: .
  '18':
  - type: text
    content: 'Thou shalt not offer the blood of my sacrifice with leavened bread; neither shall the fat of my sacrifice remain until the morning. '
  '19':
  - type: text
    content: 'The first of the firstfruits of thy land thou shalt bring into the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God. Thou shalt not seethe a kid in his mother''s milk.'
  '2':
  - type: text
    content: 'Thou shalt not follow a multitude to '
  - type: text
    content: do
  - type: text
    content: ' evil; neither shalt thou speak in a cause to decline after many to wrest '
  - type: text
    content: 'judgment:'
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Behold, I send an Angel before thee, to keep thee in the way, and to bring thee into the place which I have prepared. '
  '21':
  - type: text
    content: 'Beware of him, and obey his voice, provoke him not; for he will not pardon your transgressions: for my name '
  - type: text
    content: is
  - type: text
    content: ' in him. '
  '22':
  - type: text
    content: 'But if thou shalt indeed obey his voice, and do all that I speak; then I will be an enemy unto thine enemies, and an adversary unto thine adversaries. '
  '23':
  - type: text
    content: 'For mine Angel shall go before thee, and bring thee in unto the Amorites, and the Hittites, and the Perizzites, and the Canaanites, the Hivites, and the Jebusites: and I will cut them off. '
  '24':
  - type: text
    content: 'Thou shalt not bow down to their gods, nor serve them, nor do after their works: but thou shalt utterly overthrow them, and quite break down their images. '
  '25':
  - type: text
    content: 'And ye shall serve the '
  - type: text
    content: LORD
  - type: text
    content: ' your God, and he shall bless thy bread, and thy water; and I will take sickness away from the midst of thee. '
  '26':
  - type: text
    content: 'There shall nothing cast their young, nor be barren, in thy land: the number of thy days I will fulfil. '
  '27':
  - type: text
    content: 'I will send my fear before thee, and will destroy all the people to whom thou shalt come, and I will make all thine enemies turn their backs unto thee. '
  '28':
  - type: text
    content: 'And I will send hornets before thee, which shall drive out the Hivite, the Canaanite, and the Hittite, from before thee. '
  '29':
  - type: text
    content: 'I will not drive them out from before thee in one year; lest the land become desolate, and the beast of the field multiply against thee. '
  '3':
  - type: text
    content: neither shalt thou countenance a poor man in his cause.
  '30':
  - type: text
    content: 'By little and little I will drive them out from before thee, until thou be increased, and inherit the land. '
  '31':
  - type: text
    content: 'And I will set thy bounds from the Red sea even unto the sea of the Philistines, and from the desert unto the river: for I will deliver the inhabitants of the land into your hand; and thou shalt drive them out before thee. '
  '32':
  - type: text
    content: 'Thou shalt make no covenant with them, nor with their gods. '
  '33':
  - type: text
    content: 'They shall not dwell in thy land, lest they make thee sin against me: for if thou serve their gods, it will surely be a snare unto thee.'
  '4':
  - type: text
    content: 'If thou meet thine enemy''s ox or his ass going astray, thou shalt surely bring it back to him again. '
  '5':
  - type: text
    content: If thou see the ass of him that hateth thee lying under his burden, and wouldest forbear to help him, thou shalt surely help with him.
  '6':
  - type: text
    content: 'Thou shalt not wrest the judgment of thy poor in his cause. '
  '7':
  - type: text
    content: 'Keep thee far from a false matter; and the innocent and righteous slay thou not: for I will not justify the wicked. '
  '8':
  - type: text
    content: 'And thou shalt take no gift: for the gift blindeth the wise, and perverteth the words of the righteous. '
  '9':
  - type: text
    content: 'Also thou shalt not oppress a stranger: for ye know the heart of a stranger, seeing ye were strangers in the land of Egypt.'
