document_id: DAN.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In the third year of the reign of Jehoiakim king of Judah came Nebuchadnezzar king of Babylon unto Jerusalem, and besieged it. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And the prince of the eunuchs said unto Daniel, I fear my lord the king, who hath appointed your meat and your drink: for why should he see your faces worse liking than the children which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' of your sort? then shall ye make '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ' endanger my head to the king.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then said Daniel to Melzar, whom the prince of the eunuchs had set over Daniel, Hananiah, Mishael, and Azariah, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Prove thy servants, I beseech thee, ten days; and let them give us pulse to eat, and water to drink. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then let our countenances be looked upon before thee, and the countenance of the children that eat of the portion of the king''s meat: and as thou seest, deal with thy servants.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'So he consented to them in this matter, and proved them ten days. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And at the end of ten days their countenances appeared fairer and fatter in flesh than all the children which did eat the portion of the king''s meat. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Thus Melzar took away the portion of their meat, and the wine that they should drink; and gave them pulse.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'As for these four children, God gave them knowledge and skill in all learning and wisdom: and Daniel had understanding in all visions and dreams. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Now at the end of the days that the king had said he should bring them in, then the prince of the eunuchs brought them in before Nebuchadnezzar. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And the king communed with them; and among them all was found none like Daniel, Hananiah, Mishael, and Azariah: therefore stood they before the king. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And the Lord gave Jehoiakim king of Judah into his hand, with part of the vessels of the house of God: which he carried into the land of Shinar to the house of his god; and he brought the vessels into the treasure house of his god.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And in all matters of wisdom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' understanding, that the king enquired of them, he found them ten times better than all the magicians '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' astrologers that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in all his realm. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And Daniel continued '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' unto the first year of king Cyrus.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And the king spake unto Ashpenaz the master of his eunuchs, that he should bring '
    - type: usfm
      marker: add
      children:
      - type: text
        text: certain
    - type: text
      text: ' of the children of Israel, and of the king''s seed, and of the princes; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'children in whom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' no blemish, but well favoured, and skilful in all wisdom, and cunning in knowledge, and understanding science, and such as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: had
    - type: text
      text: ' ability in them to stand in the king''s palace, and whom they might teach the learning and the tongue of the Chaldeans. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And the king appointed them a daily provision of the king''s meat, and of the wine which he drank: so nourishing them three years, that at the end thereof they might stand before the king. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Now among these were of the children of Judah, Daniel, Hananiah, Mishael, and Azariah: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'unto whom the prince of the eunuchs gave names: for he gave unto Daniel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the name
    - type: text
      text: ' of Belteshazzar; and to Hananiah, of Shadrach; and to Mishael, of Meshach; and to Azariah, of Abed-nego.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But Daniel purposed in his heart that he would not defile himself with the portion of the king''s meat, nor with the wine which he drank: therefore he requested of the prince of the eunuchs that he might not defile himself. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Now God had brought Daniel into favour and tender love with the prince of the eunuchs. '
