document_id: JOS.12,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Conquered Kings
  - type: text
    content: 'Now these '
  - type: text
    content: are
  - type: text
    content: ' the kings of the land, which the children of Israel smote, and possessed their land on the other side Jordan toward the rising of the sun, from the river Arnon unto mount Hermon, and all the plain on the east: '
  '10':
  - type: text
    content: 'the king of Jerusalem, one; the king of Hebron, one; '
  '11':
  - type: text
    content: 'the king of Jarmuth, one; the king of Lachish, one; '
  '12':
  - type: text
    content: 'the king of Eglon, one; the king of Gezer, one; '
  '13':
  - type: text
    content: 'the king of Debir, one; the king of Geder, one; '
  '14':
  - type: text
    content: 'the king of Hormah, one; the king of Arad, one; '
  '15':
  - type: text
    content: 'the king of Libnah, one; the king of Adullam, one; '
  '16':
  - type: text
    content: 'the king of Makkedah, one; the king of Beth-el, one; '
  '17':
  - type: text
    content: 'the king of Tappuah, one; the king of Hepher, one; '
  '18':
  - type: text
    content: 'the king of Aphek, one; the king of Lasharon, one; '
  '19':
  - type: text
    content: 'the king of Madon, one; the king of Hazor, one; '
  '2':
  - type: text
    content: 'Sihon king of the Amorites, who dwelt in Heshbon, '
  - type: text
    content: and
  - type: text
    content: ' ruled from Aroer, which '
  - type: text
    content: is
  - type: text
    content: ' upon the bank of the river Arnon, and from the middle of the river, and from half Gilead, even unto the river Jabbok, '
  - type: text
    content: which is
  - type: text
    content: ' the border of the children of Ammon; '
  '20':
  - type: text
    content: 'the king of Shimron-meron, one; the king of Achshaph, one; '
  '21':
  - type: text
    content: 'the king of Taanach, one; the king of Megiddo, one; '
  '22':
  - type: text
    content: 'the king of Kedesh, one; the king of Jokneam of Carmel, one; '
  '23':
  - type: text
    content: 'the king of Dor in the coast of Dor, one; the king of the nations of Gilgal, one; '
  '24':
  - type: text
    content: 'the king of Tirzah, one: all the kings thirty and one.'
  '3':
  - type: text
    content: 'and from the plain to the sea of Chinneroth on the east, and unto the sea of the plain, '
  - type: text
    content: even
  - type: text
    content: ' the salt sea on the east, the way to Beth-jeshimoth; and from the south, under Ashdoth-pisgah: '
  '4':
  - type: text
    content: 'and the coast of Og king of Bashan, '
  - type: text
    content: which was
  - type: text
    content: ' of the remnant of the giants, that dwelt at Ashtaroth and at Edrei, '
  '5':
  - type: text
    content: 'and reigned in mount Hermon, and in Salcah, and in all Bashan, unto the border of the Geshurites and the Maachathites, and half Gilead, the border of Sihon king of Heshbon. '
  '6':
  - type: text
    content: 'Them did Moses the servant of the '
  - type: text
    content: LORD
  - type: text
    content: ' and the children of Israel smite: and Moses the servant of the '
  - type: text
    content: LORD
  - type: text
    content: ' gave it '
  - type: text
    content: for
  - type: text
    content: ' a possession unto the Reubenites, and the Gadites, and the half tribe of Manasseh.'
  '7':
  - type: text
    content: 'And these '
  - type: text
    content: are
  - type: text
    content: ' the kings of the country which Joshua and the children of Israel smote on this side Jordan on the west, from Baal-gad in the valley of Lebanon even unto the mount Halak, that goeth up to Seir; which Joshua gave unto the tribes of Israel '
  - type: text
    content: for
  - type: text
    content: ' a possession according to their divisions; '
  '8':
  - type: text
    content: 'in the mountains, and in the valleys, and in the plains, and in the springs, and in the wilderness, and in the south country; the Hittites, the Amorites, and the Canaanites, the Perizzites, the Hivites, and the Jebusites: '
  '9':
  - type: text
    content: 'the king of Jericho, one; the king of Ai, which '
  - type: text
    content: is
  - type: text
    content: ' beside Beth-el, one; '
