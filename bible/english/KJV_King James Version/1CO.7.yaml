document_id: 1CO.7,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Questions Regarding Marriage
  - type: text
    content: 'Now concerning the things whereof ye wrote unto me: '
  - type: text
    content: It is
  - type: text
    content: ' good for a man not to touch a woman. '
  '10':
  - type: text
    content: 'And unto the married I command, '
  - type: text
    content: yet
  - type: text
    content: ' not I, but the Lord, Let not the wife depart from '
  - type: text
    content: her
  - type: text
    content: ' husband: '
  '11':
  - type: text
    content: 'but and if she depart, let her remain unmarried, or be reconciled to '
  - type: text
    content: her
  - type: text
    content: ' husband: and let not the husband put away '
  - type: text
    content: his
  - type: text
    content: ' wife. '
  '12':
  - type: text
    content: 'But to the rest speak I, not the Lord: If any brother hath a wife that believeth not, and she be pleased to dwell with him, let him not put her away. '
  '13':
  - type: text
    content: 'And the woman which hath an husband that believeth not, and if he be pleased to dwell with her, let her not leave him. '
  '14':
  - type: text
    content: 'For the unbelieving husband is sanctified by the wife, and the unbelieving wife is sanctified by the husband: else were your children unclean; but now are they holy. '
  '15':
  - type: text
    content: 'But if the unbelieving depart, let him depart. A brother or a sister is not under bondage in such '
  - type: text
    content: cases
  - type: text
    content: ': but God hath called us to peace. '
  '16':
  - type: text
    content: 'For what knowest thou, O wife, whether thou shalt save '
  - type: text
    content: thy
  - type: text
    content: ' husband? or how knowest thou, O man, whether thou shalt save '
  - type: text
    content: thy
  - type: text
    content: ' wife?'
  '17':
  - type: text
    content: 'But as God hath distributed to every man, as the Lord hath called every one, so let him walk. And so ordain I in all churches. '
  '18':
  - type: text
    content: 'Is any man called being circumcised? let him not become uncircumcised. Is any called in uncircumcision? let him not be circumcised. '
  '19':
  - type: text
    content: 'Circumcision is nothing, and uncircumcision is nothing, but the keeping of the commandments of God. '
  '2':
  - type: text
    content: 'Nevertheless, '
  - type: text
    content: to avoid
  - type: text
    content: ' fornication, let every man have his own wife, and let every woman have her own husband. '
  '20':
  - type: text
    content: 'Let every man abide in the same calling wherein he was called. '
  '21':
  - type: text
    content: 'Art thou called '
  - type: text
    content: being
  - type: text
    content: ' a servant? care not for it: but if thou mayest be made free, use '
  - type: text
    content: it
  - type: text
    content: ' rather. '
  '22':
  - type: text
    content: 'For he that is called in the Lord, '
  - type: text
    content: being
  - type: text
    content: ' a servant, is the Lord''s freeman: likewise also he that is called, '
  - type: text
    content: being
  - type: text
    content: ' free, is Christ''s servant. '
  '23':
  - type: text
    content: 'Ye are bought with a price; be not ye the servants of men. '
  '24':
  - type: text
    content: Brethren, let every man, wherein he is called, therein abide with God.
  '25':
  - type: text
    content: 'Now concerning virgins I have no commandment of the Lord: yet I give my judgment, as one that hath obtained mercy of the Lord to be faithful.'
  '26':
  - type: text
    content: 'I suppose therefore that this is good for the present distress, '
  - type: text
    content: I say
  - type: text
    content: ', that '
  - type: text
    content: it is
  - type: text
    content: ' good for a man so to be. '
  '27':
  - type: text
    content: 'Art thou bound unto a wife? seek not to be loosed. Art thou loosed from a wife? seek not a wife. '
  '28':
  - type: text
    content: 'But and if thou marry, thou hast not sinned; and if a virgin marry, she hath not sinned. Nevertheless such shall have trouble in the flesh: but I spare you. '
  '29':
  - type: text
    content: 'But this I say, brethren, the time '
  - type: text
    content: is
  - type: text
    content: ' short: it remaineth, that both they that have wives be as though they had none; '
  '3':
  - type: text
    content: 'Let the husband render unto the wife due benevolence: and likewise also the wife unto the husband. '
  '30':
  - type: text
    content: 'and they that weep, as though they wept not; and they that rejoice, as though they rejoiced not; and they that buy, as though they possessed not; '
  '31':
  - type: text
    content: 'and they that use this world, as not abusing '
  - type: text
    content: it
  - type: text
    content: ': for the fashion of this world passeth away. '
  '32':
  - type: text
    content: 'But I would have you without carefulness. He that is unmarried careth for the things that belong to the Lord, how he may please the Lord: '
  '33':
  - type: text
    content: 'but he that is married careth for the things that are of the world, how he may please '
  - type: text
    content: his
  - type: text
    content: ' wife. '
  '34':
  - type: text
    content: 'There is difference '
  - type: text
    content: also
  - type: text
    content: ' between a wife and a virgin. The unmarried woman careth for the things of the Lord, that she may be holy both in body and in spirit: but she that is married careth for the things of the world, how she may please '
  - type: text
    content: her
  - type: text
    content: ' husband. '
  '35':
  - type: text
    content: And this I speak for your own profit; not that I may cast a snare upon you, but for that which is comely, and that ye may attend upon the Lord without distraction.
  '36':
  - type: text
    content: 'But if any man think that he behaveth himself uncomely toward his virgin, if she pass the flower of '
  - type: text
    content: her age
  - type: text
    content: ', and need so require, let him do what he will, he sinneth not: let them marry. '
  '37':
  - type: text
    content: 'Nevertheless he that standeth stedfast in his heart, having no necessity, but hath power over his own will, and hath so decreed in his heart that he will keep his virgin, doeth well. '
  '38':
  - type: text
    content: 'So then he that giveth '
  - type: text
    content: her
  - type: text
    content: ' in marriage doeth well; but he that giveth '
  - type: text
    content: her
  - type: text
    content: ' not in marriage doeth better.'
  '39':
  - type: text
    content: 'The wife is bound by the law as long as her husband liveth; but if her husband be dead, she is at liberty to be married to whom she will; only in the Lord. '
  '4':
  - type: text
    content: 'The wife hath not power of her own body, but the husband: and likewise also the husband hath not power of his own body, but the wife. '
  '40':
  - type: text
    content: 'But she is happier if she so abide, after my judgment: and I think also that I have the Spirit of God.'
  '5':
  - type: text
    content: 'Defraud ye not one the other, except '
  - type: text
    content: it be
  - type: text
    content: ' with consent for a time, that ye may give yourselves to fasting and prayer; and come together again, that Satan tempt you not for your incontinency. '
  '6':
  - type: text
    content: 'But I speak this by permission, '
  - type: text
    content: and
  - type: text
    content: ' not of commandment. '
  '7':
  - type: text
    content: For I would that all men were even as I myself. But every man hath his proper gift of God, one after this manner, and another after that.
  '8':
  - type: text
    content: 'I say therefore to the unmarried and widows, It is good for them if they abide even as I. '
  '9':
  - type: text
    content: 'But if they cannot contain, let them marry: for it is better to marry than to burn. '
