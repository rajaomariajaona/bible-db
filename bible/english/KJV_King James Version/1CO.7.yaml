document_id: 1CO.7,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Questions Regarding Marriage
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now concerning the things whereof ye wrote unto me: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' good for a man not to touch a woman. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And unto the married I command, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yet
    - type: text
      text: ' not I, but the Lord, Let not the wife depart from '
    - type: usfm
      marker: add
      children:
      - type: text
        text: her
    - type: text
      text: ' husband: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'but and if she depart, let her remain unmarried, or be reconciled to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: her
    - type: text
      text: ' husband: and let not the husband put away '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' wife. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'But to the rest speak I, not the Lord: If any brother hath a wife that believeth not, and she be pleased to dwell with him, let him not put her away. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And the woman which hath an husband that believeth not, and if he be pleased to dwell with her, let her not leave him. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For the unbelieving husband is sanctified by the wife, and the unbelieving wife is sanctified by the husband: else were your children unclean; but now are they holy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But if the unbelieving depart, let him depart. A brother or a sister is not under bondage in such '
    - type: usfm
      marker: add
      children:
      - type: text
        text: cases
    - type: text
      text: ': but God hath called us to peace. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'For what knowest thou, O wife, whether thou shalt save '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thy
    - type: text
      text: ' husband? or how knowest thou, O man, whether thou shalt save '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thy
    - type: text
      text: ' wife?'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'But as God hath distributed to every man, as the Lord hath called every one, so let him walk. And so ordain I in all churches. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Is any man called being circumcised? let him not become uncircumcised. Is any called in uncircumcision? let him not be circumcised. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Circumcision is nothing, and uncircumcision is nothing, but the keeping of the commandments of God. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nevertheless, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to avoid
    - type: text
      text: ' fornication, let every man have his own wife, and let every woman have her own husband. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Let every man abide in the same calling wherein he was called. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Art thou called '
    - type: usfm
      marker: add
      children:
      - type: text
        text: being
    - type: text
      text: ' a servant? care not for it: but if thou mayest be made free, use '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' rather. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'For he that is called in the Lord, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: being
    - type: text
      text: ' a servant, is the Lord''s freeman: likewise also he that is called, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: being
    - type: text
      text: ' free, is Christ''s servant. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ye are bought with a price; be not ye the servants of men. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Brethren, let every man, wherein he is called, therein abide with God.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Now concerning virgins I have no commandment of the Lord: yet I give my judgment, as one that hath obtained mercy of the Lord to be faithful.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'I suppose therefore that this is good for the present distress, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: I say
    - type: text
      text: ', that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' good for a man so to be. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Art thou bound unto a wife? seek not to be loosed. Art thou loosed from a wife? seek not a wife. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'But and if thou marry, thou hast not sinned; and if a virgin marry, she hath not sinned. Nevertheless such shall have trouble in the flesh: but I spare you. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'But this I say, brethren, the time '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' short: it remaineth, that both they that have wives be as though they had none; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Let the husband render unto the wife due benevolence: and likewise also the wife unto the husband. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'and they that weep, as though they wept not; and they that rejoice, as though they rejoiced not; and they that buy, as though they possessed not; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'and they that use this world, as not abusing '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ': for the fashion of this world passeth away. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'But I would have you without carefulness. He that is unmarried careth for the things that belong to the Lord, how he may please the Lord: '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'but he that is married careth for the things that are of the world, how he may please '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' wife. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'There is difference '
    - type: usfm
      marker: add
      children:
      - type: text
        text: also
    - type: text
      text: ' between a wife and a virgin. The unmarried woman careth for the things of the Lord, that she may be holy both in body and in spirit: but she that is married careth for the things of the world, how she may please '
    - type: usfm
      marker: add
      children:
      - type: text
        text: her
    - type: text
      text: ' husband. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: And this I speak for your own profit; not that I may cast a snare upon you, but for that which is comely, and that ye may attend upon the Lord without distraction.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'But if any man think that he behaveth himself uncomely toward his virgin, if she pass the flower of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: her age
    - type: text
      text: ', and need so require, let him do what he will, he sinneth not: let them marry. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Nevertheless he that standeth stedfast in his heart, having no necessity, but hath power over his own will, and hath so decreed in his heart that he will keep his virgin, doeth well. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'So then he that giveth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: her
    - type: text
      text: ' in marriage doeth well; but he that giveth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: her
    - type: text
      text: ' not in marriage doeth better.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'The wife is bound by the law as long as her husband liveth; but if her husband be dead, she is at liberty to be married to whom she will; only in the Lord. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The wife hath not power of her own body, but the husband: and likewise also the husband hath not power of his own body, but the wife. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'But she is happier if she so abide, after my judgment: and I think also that I have the Spirit of God.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Defraud ye not one the other, except '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it be
    - type: text
      text: ' with consent for a time, that ye may give yourselves to fasting and prayer; and come together again, that Satan tempt you not for your incontinency. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But I speak this by permission, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' not of commandment. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: For I would that all men were even as I myself. But every man hath his proper gift of God, one after this manner, and another after that.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'I say therefore to the unmarried and widows, It is good for them if they abide even as I. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But if they cannot contain, let them marry: for it is better to marry than to burn. '
