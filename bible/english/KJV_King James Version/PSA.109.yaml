document_id: PSA.109,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the chief Musician, A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Hold not thy peace, O God of my praise;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Let his children be continually vagabonds, and beg:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Let them seek '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their bread
    - type: text
      text: ' also out of their desolate places.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Let the extortioner catch all that he hath;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let the strangers spoil his labour.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Let there be none to extend mercy unto him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Neither let there be any to favour his fatherless children.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Let his posterity be cut off;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' in the generation following let their name be blotted out.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Let the iniquity of his fathers be remembered with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let not the sin of his mother be blotted out.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Let them be before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' continually,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That he may cut off the memory of them from the earth.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Because that he remembered not to shew mercy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But persecuted the poor and needy man, That he might even slay the broken in heart.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'As he loved cursing, so let it come unto him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As he delighted not in blessing, so let it be far from him.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: As he clothed himself with cursing like as with his garment,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So let it come into his bowels like water, and like oil into his bones.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Let it be unto him as the garment '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' covereth him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And for a girdle wherewith he is girded continually.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For the mouth of the wicked and the mouth of the deceitful are opened against me:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have spoken against me with a lying tongue.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Let
    - type: text
      text: ' this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' the reward of mine adversaries from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And of them that speak evil against my soul.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'But do thou for me, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ' the Lord, for thy name''s sake:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Because thy mercy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' good, deliver thou me.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'For I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' poor and needy,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And my heart is wounded within me.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'I am gone like the shadow when it declineth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am tossed up and down as the locust.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: My knees are weak through fasting;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And my flesh faileth of fatness.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'I became also a reproach unto them:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: When
    - type: text
      text: ' they looked upon me they shaked their heads.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Help me, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' my God:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O save me according to thy mercy:'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'That they may know that this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy hand;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: That
    - type: text
      text: ' thou, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', hast done it.'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Let them curse, but bless thou:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When they arise, let them be ashamed; but let thy servant rejoice.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Let mine adversaries be clothed with shame,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let them cover themselves with their own confusion, as with a mantle.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: They compassed me about also with words of hatred; And fought against me without a cause.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'I will greatly praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' with my mouth;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yea, I will praise him among the multitude.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: For he shall stand at the right hand of the poor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To save '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' from those that condemn his soul.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For my love they are my adversaries:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: give myself unto
    - type: text
      text: ' prayer.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: And they have rewarded me evil for good,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And hatred for my love.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Set thou a wicked man over him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let Satan stand at his right hand.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'When he shall be judged, let him be condemned:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let his prayer become sin.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Let his days be few;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' let another take his office.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Let his children be fatherless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his wife a widow.
