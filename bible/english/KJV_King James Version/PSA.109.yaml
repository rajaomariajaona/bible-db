document_id: PSA.109,1
type_code: eng
verses:
  '1':
  - type: text
    content: To the chief Musician, A Psalm of David.
  - type: text
    content: Hold not thy peace, O God of my praise;
  '10':
  - type: text
    content: 'Let his children be continually vagabonds, and beg:'
  - type: text
    content: 'Let them seek '
  - type: text
    content: their bread
  - type: text
    content: ' also out of their desolate places.'
  '11':
  - type: text
    content: Let the extortioner catch all that he hath;
  - type: text
    content: And let the strangers spoil his labour.
  '12':
  - type: text
    content: 'Let there be none to extend mercy unto him:'
  - type: text
    content: Neither let there be any to favour his fatherless children.
  '13':
  - type: text
    content: Let his posterity be cut off;
  - type: text
    content: And
  - type: text
    content: ' in the generation following let their name be blotted out.'
  '14':
  - type: text
    content: 'Let the iniquity of his fathers be remembered with the '
  - type: text
    content: LORD
  - type: text
    content: ;
  - type: text
    content: And let not the sin of his mother be blotted out.
  '15':
  - type: text
    content: 'Let them be before the '
  - type: text
    content: LORD
  - type: text
    content: ' continually,'
  - type: text
    content: That he may cut off the memory of them from the earth.
  '16':
  - type: text
    content: Because that he remembered not to shew mercy,
  - type: text
    content: But persecuted the poor and needy man, That he might even slay the broken in heart.
  '17':
  - type: text
    content: 'As he loved cursing, so let it come unto him:'
  - type: text
    content: As he delighted not in blessing, so let it be far from him.
  '18':
  - type: text
    content: As he clothed himself with cursing like as with his garment,
  - type: text
    content: So let it come into his bowels like water, and like oil into his bones.
  '19':
  - type: text
    content: 'Let it be unto him as the garment '
  - type: text
    content: which
  - type: text
    content: ' covereth him,'
  - type: text
    content: And for a girdle wherewith he is girded continually.
  '2':
  - type: text
    content: 'For the mouth of the wicked and the mouth of the deceitful are opened against me:'
  - type: text
    content: They have spoken against me with a lying tongue.
  '20':
  - type: text
    content: ' '
  - type: text
    content: Let
  - type: text
    content: ' this '
  - type: text
    content: be
  - type: text
    content: ' the reward of mine adversaries from the '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: And of them that speak evil against my soul.
  '21':
  - type: text
    content: 'But do thou for me, O '
  - type: text
    content: GOD
  - type: text
    content: ' the Lord, for thy name''s sake:'
  - type: text
    content: 'Because thy mercy '
  - type: text
    content: is
  - type: text
    content: ' good, deliver thou me.'
  '22':
  - type: text
    content: 'For I '
  - type: text
    content: am
  - type: text
    content: ' poor and needy,'
  - type: text
    content: And my heart is wounded within me.
  '23':
  - type: text
    content: 'I am gone like the shadow when it declineth:'
  - type: text
    content: I am tossed up and down as the locust.
  '24':
  - type: text
    content: My knees are weak through fasting;
  - type: text
    content: And my flesh faileth of fatness.
  '25':
  - type: text
    content: 'I became also a reproach unto them:'
  - type: text
    content: When
  - type: text
    content: ' they looked upon me they shaked their heads.'
  '26':
  - type: text
    content: 'Help me, O '
  - type: text
    content: LORD
  - type: text
    content: ' my God:'
  - type: text
    content: 'O save me according to thy mercy:'
  '27':
  - type: text
    content: 'That they may know that this '
  - type: text
    content: is
  - type: text
    content: ' thy hand;'
  - type: text
    content: That
  - type: text
    content: ' thou, '
  - type: text
    content: LORD
  - type: text
    content: ', hast done it.'
  '28':
  - type: text
    content: 'Let them curse, but bless thou:'
  - type: text
    content: When they arise, let them be ashamed; but let thy servant rejoice.
  '29':
  - type: text
    content: Let mine adversaries be clothed with shame,
  - type: text
    content: And let them cover themselves with their own confusion, as with a mantle.
  '3':
  - type: text
    content: They compassed me about also with words of hatred; And fought against me without a cause.
  '30':
  - type: text
    content: 'I will greatly praise the '
  - type: text
    content: LORD
  - type: text
    content: ' with my mouth;'
  - type: text
    content: Yea, I will praise him among the multitude.
  '31':
  - type: text
    content: For he shall stand at the right hand of the poor,
  - type: text
    content: 'To save '
  - type: text
    content: him
  - type: text
    content: ' from those that condemn his soul.'
  '4':
  - type: text
    content: 'For my love they are my adversaries:'
  - type: text
    content: 'But I '
  - type: text
    content: give myself unto
  - type: text
    content: ' prayer.'
  '5':
  - type: text
    content: And they have rewarded me evil for good,
  - type: text
    content: And hatred for my love.
  '6':
  - type: text
    content: 'Set thou a wicked man over him:'
  - type: text
    content: And let Satan stand at his right hand.
  '7':
  - type: text
    content: 'When he shall be judged, let him be condemned:'
  - type: text
    content: And let his prayer become sin.
  '8':
  - type: text
    content: Let his days be few;
  - type: text
    content: And
  - type: text
    content: ' let another take his office.'
  '9':
  - type: text
    content: Let his children be fatherless,
  - type: text
    content: And his wife a widow.
