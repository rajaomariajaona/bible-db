document_id: NUM.13
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Spies Sent Out
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Send thou men, that they may search the land of Canaan, which I give unto the children of Israel: of every tribe of their fathers shall ye send a man, every one a ruler among them. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Moses by the commandment of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' sent them from the wilderness of Paran: all those men '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' heads of the children of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' their names: of the tribe of Reuben, Shammua the son of Zaccur. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Of the tribe of Simeon, Shaphat the son of Hori. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Of the tribe of Judah, Caleb the son of Jephunneh. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Of the tribe of Issachar, Igal the son of Joseph. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Of the tribe of Ephraim, Oshea the son of Nun. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Of the tribe of Benjamin, Palti the son of Raphu. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Of the tribe of Zebulun, Gaddiel the son of Sodi. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Of the tribe of Joseph, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: namely
  - type: text
    text: ', of the tribe of Manasseh, Gaddi the son of Susi. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Of the tribe of Dan, Ammiel the son of Gemalli. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Of the tribe of Asher, Sethur the son of Michael. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Of the tribe of Naphtali, Nahbi the son of Vophsi. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Of the tribe of Gad, Geuel the son of Machi. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the names of the men which Moses sent to spy out the land. And Moses called Oshea the son of Nun Jehoshua.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And Moses sent them to spy out the land of Canaan, and said unto them, Get you up this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: way
  - type: text
    text: ' southward, and go up into the mountain: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and see the land, what it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: '; and the people that dwelleth therein, whether they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' strong or weak, few or many; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and what the land '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' that they dwell in, whether it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' good or bad; and what cities '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they be
  - type: text
    text: ' that they dwell in, whether in tents, or in strong holds; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'and what the land '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ', whether it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' fat or lean, whether there be wood therein, or not. And be ye of good courage, and bring of the fruit of the land. Now the time '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the time of the firstripe grapes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So they went up, and searched the land from the wilderness of Zin unto Rehob, as men come to Hamath. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And they ascended by the south, and came unto Hebron; where Ahiman, Sheshai, and Talmai, the children of Anak, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: '. (Now Hebron was built seven years before Zoan in Egypt.) '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And they came unto the brook of Eshcol, and cut down from thence a branch with one cluster of grapes, and they bare it between two upon a staff; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they brought
  - type: text
    text: ' of the pomegranates, and of the figs. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The place was called the brook Eshcol, because of the cluster of grapes which the children of Israel cut down from thence.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And they returned from searching of the land after forty days. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And they went and came to Moses, and to Aaron, and to all the congregation of the children of Israel, unto the wilderness of Paran, to Kadesh; and brought back word unto them, and unto all the congregation, and shewed them the fruit of the land. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And they told him, and said, We came unto the land whither thou sentest us, and surely it floweth with milk and honey; and this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the fruit of it. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nevertheless the people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' strong that dwell in the land, and the cities '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' walled, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' very great: and moreover we saw the children of Anak there. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'The Amalekites dwell in the land of the south: and the Hittites, and the Jebusites, and the Amorites, dwell in the mountains: and the Canaanites dwell by the sea, and by the coast of Jordan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And Caleb stilled the people before Moses, and said, Let us go up at once, and possess it; for we are well able to overcome it. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'But the men that went up with him said, We be not able to go up against the people; for they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' stronger than we. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And they brought up an evil report of the land which they had searched unto the children of Israel, saying, The land, through which we have gone to search it, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a land that eateth up the inhabitants thereof; and all the people that we saw in it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' men of a great stature. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And there we saw the giants, the sons of Anak, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which come
  - type: text
    text: ' of the giants: and we were in our own sight as grasshoppers, and so we were in their sight.'
