document_id: JUD.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jude, the servant of Jesus Christ, and brother of James, to them that are sanctified by God the Father, and preserved in Jesus Christ, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' called: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: mercy unto you, and peace, and love, be multiplied.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Beloved, when I gave all diligence to write unto you of the common salvation, it was needful for me to write unto you, and exhort '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: ' that ye should earnestly contend for the faith which was once delivered unto the saints. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For there are certain men crept in unawares, who were before of old ordained to this condemnation, ungodly men, turning the grace of our God into lasciviousness, and denying the only Lord God, and our Lord Jesus Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I will therefore put you in remembrance, though ye once knew this, how that the Lord, having saved the people out of the land of Egypt, afterward destroyed them that believed not. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the angels which kept not their first estate, but left their own habitation, he hath reserved in everlasting chains under darkness unto the judgment of the great day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Even as Sodom and Gomorrha, and the cities about them in like manner, giving themselves over to fornication, and going after strange flesh, are set forth for an example, suffering the vengeance of eternal fire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Likewise also these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: filthy
  - type: text
    text: ' dreamers defile the flesh, despise dominion, and speak evil of dignities. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Yet Michael the archangel, when contending with the devil he disputed about the body of Moses, durst not bring against him a railing accusation, but said, The Lord rebuke thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But these speak evil of those things which they know not: but what they know naturally, as brute beasts, in those things they corrupt themselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Woe unto them! for they have gone in the way of Cain, and ran greedily after the error of Balaam for reward, and perished in the gainsaying of Core. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'These are spots in your feasts of charity, when they feast with you, feeding themselves without fear: clouds '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they are
  - type: text
    text: ' without water, carried about of winds; trees whose fruit withereth, without fruit, twice dead, plucked up by the roots; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: raging waves of the sea, foaming out their own shame; wandering stars, to whom is reserved the blackness of darkness for ever.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And Enoch also, the seventh from Adam, prophesied of these, saying, Behold, the Lord cometh with ten thousands of his saints, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'to execute judgment upon all, and to convince all that are ungodly among them of all their ungodly deeds which they have ungodly committed, and of all their hard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: speeches
  - type: text
    text: ' which ungodly sinners have spoken against him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'These are murmurers, complainers, walking after their own lusts; and their mouth speaketh great swelling '
  - type: usfm
    marker: add
    children:
    - type: text
      text: words
  - type: text
    text: ', having men''s persons in admiration because of advantage.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But, beloved, remember ye the words which were spoken before of the apostles of our Lord Jesus Christ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'how that they told you there should be mockers in the last time, who should walk after their own ungodly lusts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'These be they who separate themselves, sensual, having not the Spirit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But ye, beloved, building up yourselves on your most holy faith, praying in the Holy Ghost, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'keep yourselves in the love of God, looking for the mercy of our Lord Jesus Christ unto eternal life. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And of some have compassion, making a difference: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'and others save with fear, pulling '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' out of the fire; hating even the garment spotted by the flesh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Now unto him that is able to keep you from falling, and to present '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: ' faultless before the presence of his glory with exceeding joy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'to the only wise God our Saviour, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' glory and majesty, dominion and power, both now and ever. Amen.'
