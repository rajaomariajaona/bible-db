    content: 'And Jacob came out of the field in the evening, and Leah went out to meet him, and said, Thou must come in unto me; for surely I have hired thee with my son''s mandrakes. And he lay with her that night. '
  '17':
  - type: text
    content: 'And God hearkened unto Leah, and she conceived, and bare Jacob the fifth son. '
  '18':
