    content: 'And when Rachel saw that she bare Jacob no children, Rachel envied her sister; and said unto Jacob, Give me children, or else I die. '
  '10':
  - type: text
    content: 'And Zilpah Leah''s maid bare Jacob a son. '
  '11':
  - type: text
    content: 'And Leah said, A troop cometh: and she called his name Gad. '
  '12':
