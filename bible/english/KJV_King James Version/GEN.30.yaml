document_id: GEN.30
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And when Rachel saw that she bare Jacob no children, Rachel envied her sister; and said unto Jacob, Give me children, or else I die. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Jacob''s anger was kindled against Rachel: and he said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Am
  - type: text
    text: ' I in God''s stead, who hath withheld from thee the fruit of the womb? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And she said, Behold my maid Bilhah, go in unto her; and she shall bear upon my knees, that I may also have children by her. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And she gave him Bilhah her handmaid to wife: and Jacob went in unto her. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And Bilhah conceived, and bare Jacob a son. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Rachel said, God hath judged me, and hath also heard my voice, and hath given me a son: therefore called she his name Dan. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And Bilhah Rachel''s maid conceived again, and bare Jacob a second son. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Rachel said, With great wrestlings have I wrestled with my sister, and I have prevailed: and she called his name Naphtali.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When Leah saw that she had left bearing, she took Zilpah her maid, and gave her Jacob to wife. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Zilpah Leah''s maid bare Jacob a son. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Leah said, A troop cometh: and she called his name Gad. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Zilpah Leah''s maid bare Jacob a second son. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Leah said, Happy am I, for the daughters will call me blessed: and she called his name Asher.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And Reuben went in the days of wheat harvest, and found mandrakes in the field, and brought them unto his mother Leah. Then Rachel said to Leah, Give me, I pray thee, of thy son''s mandrakes. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And she said unto her, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is it
  - type: text
    text: ' a small matter that thou hast taken my husband? and wouldest thou take away my son''s mandrakes also? And Rachel said, Therefore he shall lie with thee to night for thy son''s mandrakes. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And Jacob came out of the field in the evening, and Leah went out to meet him, and said, Thou must come in unto me; for surely I have hired thee with my son''s mandrakes. And he lay with her that night. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And God hearkened unto Leah, and she conceived, and bare Jacob the fifth son. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And Leah said, God hath given me my hire, because I have given my maiden to my husband: and she called his name Issachar. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And Leah conceived again, and bare Jacob the sixth son. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Leah said, God hath endued me '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' a good dowry; now will my husband dwell with me, because I have born him six sons: and she called his name Zebulun. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: And afterwards she bare a daughter, and called her name Dinah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And God remembered Rachel, and God hearkened to her, and opened her womb. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And she conceived, and bare a son; and said, God hath taken away my reproach: '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and she called his name Joseph; and said, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall add to me another son.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Jacob and Laban
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And it came to pass, when Rachel had born Joseph, that Jacob said unto Laban, Send me away, that I may go unto mine own place, and to my country. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Give '
  - type: usfm
    marker: add
    children:
    - type: text
      text: me
  - type: text
    text: ' my wives and my children, for whom I have served thee, and let me go: for thou knowest my service which I have done thee. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And Laban said unto him, I pray thee, if I have found favour in thine eyes, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'tarry: for'
  - type: text
    text: ' I have learned by experience that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath blessed me for thy sake. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And he said, Appoint me thy wages, and I will give '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And he said unto him, Thou knowest how I have served thee, and how thy cattle was with me. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'For '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it was
  - type: text
    text: ' little which thou hadst before I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: came
  - type: text
    text: ', and it is '
  - type: usfm
    marker: add
    children:
    - type: text
      text: now
  - type: text
    text: ' increased unto a multitude; and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath blessed thee since my coming: and now when shall I provide for mine own house also? '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And he said, What shall I give thee? And Jacob said, Thou shalt not give me any thing: if thou wilt do this thing for me, I will again feed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' keep thy flock. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'I will pass through all thy flock to day, removing from thence all the speckled and spotted cattle, and all the brown cattle among the sheep, and the spotted and speckled among the goats: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of such
  - type: text
    text: ' shall be my hire. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'So shall my righteousness answer for me in time to come, when it shall come for my hire before thy face: every one that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not speckled and spotted among the goats, and brown among the sheep, that shall be counted stolen with me. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And Laban said, Behold, I would it might be according to thy word. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And he removed that day the he goats that were ringstraked and spotted, and all the she goats that were speckled and spotted, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' every one that had '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' white in it, and all the brown among the sheep, and gave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' into the hand of his sons. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And he set three days'' journey betwixt himself and Jacob: and Jacob fed the rest of Laban''s flocks.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And Jacob took him rods of green poplar, and of the hazel and chesnut tree; and pilled white strakes in them, and made the white appear which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in the rods. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And he set the rods which he had pilled before the flocks in the gutters in the watering troughs when the flocks came to drink, that they should conceive when they came to drink. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And the flocks conceived before the rods, and brought forth cattle ringstraked, speckled, and spotted. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And Jacob did separate the lambs, and set the faces of the flocks toward the ringstraked, and all the brown in the flock of Laban; and he put his own flocks by themselves, and put them not unto Laban''s cattle. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And it came to pass, whensoever the stronger cattle did conceive, that Jacob laid the rods before the eyes of the cattle in the gutters, that they might conceive among the rods. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'But when the cattle were feeble, he put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' not in: so the feebler were Laban''s, and the stronger Jacob''s. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: And the man increased exceedingly, and had much cattle, and maidservants, and menservants, and camels, and asses.
