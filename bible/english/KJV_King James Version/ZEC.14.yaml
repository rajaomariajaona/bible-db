verses:
  '1':
  - type: heading
    content: The City Saved
  - type: text
    content: 'Behold, the day of the '
  - type: text
    content: LORD
  - type: text
    content: ' cometh, and thy spoil shall be divided in the midst of thee. '
  '10':
  - type: text
    content: 'All the land shall be turned as a plain from Geba to Rimmon south of Jerusalem: and it shall be lifted up, and inhabited in her place, from Benjamin''s gate unto the place of the first gate, unto the corner gate, and '
  - type: text
    content: from
  - type: text
    content: ' the tower of Hananeel unto the king''s winepresses. '
  '11':
  - type: text
    content: 'And '
  - type: text
    content: men
  - type: text
    content: ' shall dwell in it, and there shall be no more utter destruction; but Jerusalem shall be safely inhabited.'
  '12':
  - type: text
    content: 'And this shall be the plague wherewith the '
  - type: text
    content: LORD
  - type: text
    content: ' will smite all the people that have fought against Jerusalem; Their flesh shall consume away while they stand upon their feet, and their eyes shall consume away in their holes, and their tongue shall consume away in their mouth. '
  '13':
  - type: text
    content: 'And it shall come to pass in that day, '
  - type: text
    content: that
  - type: text
    content: ' a great tumult from the '
  - type: text
    content: LORD
  - type: text
    content: ' shall be among them; and they shall lay hold every one on the hand of his neighbour, and his hand shall rise up against the hand of his neighbour. '
  '14':
  - type: text
    content: 'And Judah also shall fight at Jerusalem; and the wealth of all the heathen round about shall be gathered together, gold, and silver, and apparel, in great abundance. '
  '15':
  - type: text
    content: And so shall be the plague of the horse, of the mule, of the camel, and of the ass, and of all the beasts that shall be in these tents, as this plague.
  - type: heading
    content: Universal Worship
  '16':
  - type: text
    content: 'And it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ' every one that is left of all the nations which came against Jerusalem shall even go up from year to year to worship the King, the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, and to keep the feast of tabernacles. '
  '17':
  - type: text
    content: 'And it shall be, '
  - type: text
    content: that
  - type: text
    content: ' whoso will not come up of '
  - type: text
    content: all
  - type: text
    content: ' the families of the earth unto Jerusalem to worship the King, the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, even upon them shall be no rain. '
  '18':
  - type: text
    content: 'And if the family of Egypt go not up, and come not, that '
  - type: text
    content: have
  - type: text
    content: ' no '
  - type: text
    content: rain
  - type: text
    content: '; there shall be the plague, wherewith the '
  - type: text
    content: LORD
  - type: text
    content: ' will smite the heathen that come not up to keep the feast of tabernacles. '
  '19':
  - type: text
    content: This shall be the punishment of Egypt, and the punishment of all nations that come not up to keep the feast of tabernacles.
  - type: heading
    content: An Age of Holiness
  '2':
  - type: text
    content: 'For I will gather all nations against Jerusalem to battle; and the city shall be taken, and the houses rifled, and the women ravished; and half of the city shall go forth into captivity, and the residue of the people shall not be cut off from the city. '
  '20':
  - type: text
    content: 'In that day shall there be upon the bells of the horses, HOLINESS UNTO THE '
  - type: text
    content: Lord
  - type: text
    content: '; and the pots in the '
  - type: text
    content: LORD
  - type: text
    content: '''s house shall be like the bowls before the altar. '
  '21':
  - type: text
    content: 'Yea, every pot in Jerusalem and in Judah shall be holiness unto the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts: and all they that sacrifice shall come and take of them, and seethe therein: and in that day there shall be no more the Canaanite in the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts.'
  '3':
  - type: text
    content: 'Then shall the '
  - type: text
    content: LORD
  - type: text
    content: ' go forth, and fight against those nations, as when he fought in the day of battle.'
  '4':
  - type: text
    content: 'And his feet shall stand in that day upon the mount of Olives, which '
  - type: text
    content: is
  - type: text
    content: ' before Jerusalem on the east, and the mount of Olives shall cleave in the midst thereof toward the east and toward the west, '
  - type: text
    content: and there shall be
  - type: text
    content: ' a very great valley; and half of the mountain shall remove toward the north, and half of it toward the south. '
  '5':
  - type: text
    content: 'And ye shall flee '
  - type: text
    content: to
  - type: text
    content: ' the valley of the mountains; for the valley of the mountains shall reach unto Azal: yea, ye shall flee, like as ye fled from before the earthquake in the days of Uzziah king of Judah: and the '
  - type: text
    content: LORD
  - type: text
    content: ' my God shall come, '
  - type: text
    content: and
  - type: text
    content: ' all the saints with thee. '
  '6':
  - type: text
    content: 'And it shall come to pass in that day, '
  - type: text
    content: that
  - type: text
    content: ' the light shall not be clear, '
  - type: text
    content: nor
  - type: text
    content: ' dark: '
  '7':
  - type: text
    content: 'but it shall be one day which shall be known to the '
  - type: text
    content: LORD
  - type: text
    content: ', not day, nor night: but it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ' at evening time it shall be light. '
  '8':
  - type: text
    content: 'And it shall be in that day, '
  - type: text
    content: that
  - type: text
    content: ' living waters shall go out from Jerusalem; half of them toward the former sea, and half of them toward the hinder sea: in summer and in winter shall it be.'
  - type: heading
    content: Lord of All
  '9':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' shall be king over all the earth: in that day shall there be one '
  - type: text
    content: LORD
  - type: text
    content: ', and his name one. '
