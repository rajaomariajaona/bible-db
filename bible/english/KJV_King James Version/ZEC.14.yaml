document_id: ZEC.14
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The City Saved
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Behold, the day of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' cometh, and thy spoil shall be divided in the midst of thee. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For I will gather all nations against Jerusalem to battle; and the city shall be taken, and the houses rifled, and the women ravished; and half of the city shall go forth into captivity, and the residue of the people shall not be cut off from the city. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then shall the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' go forth, and fight against those nations, as when he fought in the day of battle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And his feet shall stand in that day upon the mount of Olives, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' before Jerusalem on the east, and the mount of Olives shall cleave in the midst thereof toward the east and toward the west, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and there shall be
  - type: text
    text: ' a very great valley; and half of the mountain shall remove toward the north, and half of it toward the south. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And ye shall flee '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to
  - type: text
    text: ' the valley of the mountains; for the valley of the mountains shall reach unto Azal: yea, ye shall flee, like as ye fled from before the earthquake in the days of Uzziah king of Judah: and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' my God shall come, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' all the saints with thee. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And it shall come to pass in that day, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' the light shall not be clear, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: nor
  - type: text
    text: ' dark: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'but it shall be one day which shall be known to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', not day, nor night: but it shall come to pass, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' at evening time it shall be light. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And it shall be in that day, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' living waters shall go out from Jerusalem; half of them toward the former sea, and half of them toward the hinder sea: in summer and in winter shall it be.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Lord of All
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall be king over all the earth: in that day shall there be one '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and his name one. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'All the land shall be turned as a plain from Geba to Rimmon south of Jerusalem: and it shall be lifted up, and inhabited in her place, from Benjamin''s gate unto the place of the first gate, unto the corner gate, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: from
  - type: text
    text: ' the tower of Hananeel unto the king''s winepresses. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' shall dwell in it, and there shall be no more utter destruction; but Jerusalem shall be safely inhabited.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And this shall be the plague wherewith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will smite all the people that have fought against Jerusalem; Their flesh shall consume away while they stand upon their feet, and their eyes shall consume away in their holes, and their tongue shall consume away in their mouth. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And it shall come to pass in that day, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' a great tumult from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall be among them; and they shall lay hold every one on the hand of his neighbour, and his hand shall rise up against the hand of his neighbour. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And Judah also shall fight at Jerusalem; and the wealth of all the heathen round about shall be gathered together, gold, and silver, and apparel, in great abundance. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And so shall be the plague of the horse, of the mule, of the camel, and of the ass, and of all the beasts that shall be in these tents, as this plague.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Universal Worship
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And it shall come to pass, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' every one that is left of all the nations which came against Jerusalem shall even go up from year to year to worship the King, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, and to keep the feast of tabernacles. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And it shall be, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' whoso will not come up of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: all
  - type: text
    text: ' the families of the earth unto Jerusalem to worship the King, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts, even upon them shall be no rain. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And if the family of Egypt go not up, and come not, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: have
  - type: text
    text: ' no '
  - type: usfm
    marker: add
    children:
    - type: text
      text: rain
  - type: text
    text: '; there shall be the plague, wherewith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will smite the heathen that come not up to keep the feast of tabernacles. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: This shall be the punishment of Egypt, and the punishment of all nations that come not up to keep the feast of tabernacles.
- type: usfm
  marker: s2
  children:
  - type: text
    text: An Age of Holiness
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'In that day shall there be upon the bells of the horses, HOLINESS UNTO THE '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '; and the pots in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s house shall be like the bowls before the altar. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Yea, every pot in Jerusalem and in Judah shall be holiness unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts: and all they that sacrifice shall come and take of them, and seethe therein: and in that day there shall be no more the Canaanite in the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts.'
