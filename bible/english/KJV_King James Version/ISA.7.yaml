verses:
  '1':
  - type: heading
    content: Isaiah and Ahaz
  - type: text
    content: 'And it came to pass in the days of Ahaz the son of Jotham, the son of Uzziah, king of Judah, '
  - type: text
    content: that
  - type: text
    content: ' Rezin the king of Syria, and Pekah the son of Remaliah, king of Israel, went up toward Jerusalem to war against it, but could not prevail against it. '
  '10':
  - type: text
    content: 'Moreover the '
  - type: text
    content: LORD
  - type: text
    content: ' spake again unto Ahaz, saying, '
  '11':
  - type: text
    content: 'Ask thee a sign of the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God; ask it either in the depth, or in the height above. '
  '12':
  - type: text
    content: 'But Ahaz said, I will not ask, neither will I tempt the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'And he said, Hear ye now, O house of David; '
  - type: text
    content: Is it
  - type: text
    content: ' a small thing for you to weary men, but will ye weary my God also? '
  '14':
  - type: text
    content: 'Therefore the Lord himself shall give you a sign; Behold, a virgin shall conceive, and bear a son, and shall call his name Immanuel. '
  '15':
  - type: text
    content: 'Butter and honey shall he eat, that he may know to refuse the evil, and choose the good. '
  '16':
  - type: text
    content: 'For before the child shall know to refuse the evil, and choose the good, the land that thou abhorrest shall be forsaken of both her kings. '
  '17':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' shall bring upon thee, and upon thy people, and upon thy father''s house, days that have not come, from the day that Ephraim departed from Judah; '
  - type: text
    content: even
  - type: text
    content: ' the king of Assyria.'
  '18':
  - type: text
    content: 'And it shall come to pass in that day, '
  - type: text
    content: that
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' shall hiss for the fly that '
  - type: text
    content: is
  - type: text
    content: ' in the uttermost part of the rivers of Egypt, and for the bee that '
  - type: text
    content: is
  - type: text
    content: ' in the land of Assyria. '
  '19':
  - type: text
    content: And they shall come, and shall rest all of them in the desolate valleys, and in the holes of the rocks, and upon all thorns, and upon all bushes.
  '2':
  - type: text
    content: And it was told the house of David, saying, Syria is confederate with Ephraim. And his heart was moved, and the heart of his people, as the trees of the wood are moved with the wind.
  '20':
  - type: text
    content: 'In the same day shall the Lord shave with a razor that is hired, '
  - type: text
    content: namely
  - type: text
    content: ', by them beyond the river, by the king of Assyria, the head, and the hair of the feet: and it shall also consume the beard.'
  '21':
  - type: text
    content: 'And it shall come to pass in that day, '
  - type: text
    content: that
  - type: text
    content: ' a man shall nourish a young cow, and two sheep; '
  '22':
  - type: text
    content: 'and it shall come to pass, for the abundance of milk '
  - type: text
    content: that
  - type: text
    content: ' they shall give he shall eat butter: for butter and honey shall every one eat that is left in the land.'
  '23':
  - type: text
    content: 'And it shall come to pass in that day, '
  - type: text
    content: that
  - type: text
    content: ' every place shall be, where there were a thousand vines at a thousand silverlings, it shall '
  - type: text
    content: even
  - type: text
    content: ' be for briers and thorns. '
  '24':
  - type: text
    content: 'With arrows and with bows shall '
  - type: text
    content: men
  - type: text
    content: ' come thither; because all the land shall become briers and thorns. '
  '25':
  - type: text
    content: 'And '
  - type: text
    content: on
  - type: text
    content: ' all hills that shall be digged with the mattock, there shall not come thither the fear of briers and thorns: but it shall be for the sending forth of oxen, and for the treading of lesser cattle.'
  '3':
  - type: text
    content: 'Then said the '
  - type: text
    content: LORD
  - type: text
    content: ' unto Isaiah, Go forth now to meet Ahaz, thou, and Shearjashub thy son, at the end of the conduit of the upper pool in the highway of the fuller''s field; '
  '4':
  - type: text
    content: 'and say unto him, Take heed, and be quiet; fear not, neither be fainthearted for the two tails of these smoking firebrands, for the fierce anger of Rezin with Syria, and of the son of Remaliah. '
  '5':
  - type: text
    content: 'Because Syria, Ephraim, and the son of Remaliah, have taken evil counsel against thee, saying, '
  '6':
  - type: text
    content: 'Let us go up against Judah, and vex it, and let us make a breach therein for us, and set a king in the midst of it, '
  - type: text
    content: even
  - type: text
    content: ' the son of Tabeal: '
  '7':
  - type: text
    content: 'thus saith the Lord '
  - type: text
    content: GOD
  - type: text
    content: ', It shall not stand, neither shall it come to pass. '
  '8':
  - type: text
    content: 'For the head of Syria '
  - type: text
    content: is
  - type: text
    content: ' Damascus, and the head of Damascus '
  - type: text
    content: is
  - type: text
    content: ' Rezin; and within threescore and five years shall Ephraim be broken, that it be not a people. '
  '9':
  - type: text
    content: 'And the head of Ephraim '
  - type: text
    content: is
  - type: text
    content: ' Samaria, and the head of Samaria '
  - type: text
    content: is
  - type: text
    content: ' Remaliah''s son. If ye will not believe, surely ye shall not be established.'
  - type: heading
    content: The Sign Immanuel
