document_id: ISA.7,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Isaiah and Ahaz
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass in the days of Ahaz the son of Jotham, the son of Uzziah, king of Judah, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' Rezin the king of Syria, and Pekah the son of Remaliah, king of Israel, went up toward Jerusalem to war against it, but could not prevail against it. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake again unto Ahaz, saying, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ask thee a sign of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God; ask it either in the depth, or in the height above. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Ahaz said, I will not ask, neither will I tempt the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, Hear ye now, O house of David; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is it
    - type: text
      text: ' a small thing for you to weary men, but will ye weary my God also? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore the Lord himself shall give you a sign; Behold, a virgin shall conceive, and bear a son, and shall call his name Immanuel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Butter and honey shall he eat, that he may know to refuse the evil, and choose the good. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For before the child shall know to refuse the evil, and choose the good, the land that thou abhorrest shall be forsaken of both her kings. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall bring upon thee, and upon thy people, and upon thy father''s house, days that have not come, from the day that Ephraim departed from Judah; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the king of Assyria.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass in that day, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall hiss for the fly that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the uttermost part of the rivers of Egypt, and for the bee that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the land of Assyria. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they shall come, and shall rest all of them in the desolate valleys, and in the holes of the rocks, and upon all thorns, and upon all bushes.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And it was told the house of David, saying, Syria is confederate with Ephraim. And his heart was moved, and the heart of his people, as the trees of the wood are moved with the wind.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the same day shall the Lord shave with a razor that is hired, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: namely
    - type: text
      text: ', by them beyond the river, by the king of Assyria, the head, and the hair of the feet: and it shall also consume the beard.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass in that day, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' a man shall nourish a young cow, and two sheep; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and it shall come to pass, for the abundance of milk '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' they shall give he shall eat butter: for butter and honey shall every one eat that is left in the land.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass in that day, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' every place shall be, where there were a thousand vines at a thousand silverlings, it shall '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' be for briers and thorns. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'With arrows and with bows shall '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' come thither; because all the land shall become briers and thorns. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: on
    - type: text
      text: ' all hills that shall be digged with the mattock, there shall not come thither the fear of briers and thorns: but it shall be for the sending forth of oxen, and for the treading of lesser cattle.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' unto Isaiah, Go forth now to meet Ahaz, thou, and Shearjashub thy son, at the end of the conduit of the upper pool in the highway of the fuller''s field; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and say unto him, Take heed, and be quiet; fear not, neither be fainthearted for the two tails of these smoking firebrands, for the fierce anger of Rezin with Syria, and of the son of Remaliah. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because Syria, Ephraim, and the son of Remaliah, have taken evil counsel against thee, saying, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let us go up against Judah, and vex it, and let us make a breach therein for us, and set a king in the midst of it, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the son of Tabeal: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ', It shall not stand, neither shall it come to pass. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the head of Syria '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Damascus, and the head of Damascus '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Rezin; and within threescore and five years shall Ephraim be broken, that it be not a people. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the head of Ephraim '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Samaria, and the head of Samaria '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Remaliah''s son. If ye will not believe, surely ye shall not be established.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Sign Immanuel
    marker-yv: yv-h
