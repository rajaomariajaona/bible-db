document_id: JDG.18,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In those days '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' no king in Israel: and in those days the tribe of the Danites sought them an inheritance to dwell in; for unto that day '
    - type: usfm
      marker: add
      children:
      - type: text
        text: all their
    - type: text
      text: ' inheritance had not fallen unto them among the tribes of Israel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When ye go, ye shall come unto a people secure, and to a large land: for God hath given it into your hands; a place where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no want of any thing that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the earth.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there went from thence of the family of the Danites, out of Zorah and out of Eshtaol, six hundred men appointed with weapons of war. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they went up, and pitched in Kirjath-jearim, in Judah: wherefore they called that place Mahaneh-dan unto this day: behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' behind Kirjath-jearim. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they passed thence unto mount Ephraim, and came unto the house of Micah.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then answered the five men that went to spy out the country of Laish, and said unto their brethren, Do ye know that there is in these houses an ephod, and teraphim, and a graven image, and a molten image? now therefore consider what ye have to do. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they turned thitherward, and came to the house of the young man the Levite, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' unto the house of Micah, and saluted him. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the six hundred men appointed with their weapons of war, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' of the children of Dan, stood by the entering of the gate. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the five men that went to spy out the land went up, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' came in thither, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' took the graven image, and the ephod, and the teraphim, and the molten image: and the priest stood in the entering of the gate with the six hundred men '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that were
    - type: text
      text: ' appointed with weapons of war. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And these went into Micah''s house, and fetched the carved image, the ephod, and the teraphim, and the molten image. Then said the priest unto them, What do ye? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said unto him, Hold thy peace, lay thine hand upon thy mouth, and go with us, and be to us a father and a priest: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is it
    - type: text
      text: ' better for thee to be a priest unto the house of one man, or that thou be a priest unto a tribe and a family in Israel? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Dan sent of their family five men from their coasts, men of valour, from Zorah, and from Eshtaol, to spy out the land, and to search it; and they said unto them, Go, search the land: who when they came to mount Ephraim, to the house of Micah, they lodged there. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the priest's heart was glad, and he took the ephod, and the teraphim, and the graven image, and went in the midst of the people.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they turned and departed, and put the little ones and the cattle and the carriage before them. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' when they were a good way from the house of Micah, the men that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in the houses near to Micah''s house were gathered together, and overtook the children of Dan. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they cried unto the children of Dan. And they turned their faces, and said unto Micah, What aileth thee, that thou comest with such a company? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, Ye have taken away my gods which I made, and the priest, and ye are gone away: and what have I more? and what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' ye say unto me, What aileth thee? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Dan said unto him, Let not thy voice be heard among us, lest angry fellows run upon thee, and thou lose thy life, with the lives of thy household. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Dan went their way: and when Micah saw that they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' too strong for him, he turned and went back unto his house.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they took '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the things
    - type: text
      text: ' which Micah had made, and the priest which he had, and came unto Laish, unto a people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that were
    - type: text
      text: ' at quiet and secure: and they smote them with the edge of the sword, and burnt the city with fire. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' no deliverer, because it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' far from Zidon, and they had no business with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' man; and it was in the valley that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: lieth
    - type: text
      text: ' by Beth-rehob. And they built a city, and dwelt therein. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they called the name of the city Dan, after the name of Dan their father, who was born unto Israel: howbeit the name of the city '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Laish at the first.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' by the house of Micah, they knew the voice of the young man the Levite: and they turned in thither, and said unto him, Who brought thee hither? and what makest thou in this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: place?
    - type: text
      text: ' and what hast thou here? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Dan set up the graven image: and Jonathan, the son of Gershom, the son of Manasseh, he and his sons were priests to the tribe of Dan until the day of the captivity of the land. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they set them up Micah's graven image, which he made, all the time that the house of God was in Shiloh.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto them, Thus and thus dealeth Micah with me, and hath hired me, and I am his priest. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said unto him, Ask counsel, we pray thee, of God, that we may know whether our way which we go shall be prosperous. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the priest said unto them, Go in peace: before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' your way wherein ye go.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the five men departed, and came to Laish, and saw the people that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' therein, how they dwelt careless, after the manner of the Zidonians, quiet and secure; and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' no magistrate in the land, that might put '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' to shame in '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' thing; and they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' far from the Zidonians, and had no business with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' man. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they came unto their brethren to Zorah and Eshtaol: and their brethren said unto them, What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: say
    - type: text
      text: ' ye? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said, Arise, that we may go up against them: for we have seen the land, and, behold, it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' very good: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' ye still? be not slothful to go, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' to enter to possess the land. '
