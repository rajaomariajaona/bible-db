document_id: EXO.16,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Manna
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they took their journey from Elim, and all the congregation of the children of Israel came unto the wilderness of Sin, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' between Elim and Sinai, on the fifteenth day of the second month after their departing out of the land of Egypt. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, as Aaron spake unto the whole congregation of the children of Israel, that they looked toward the wilderness, and, behold, the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' appeared in the cloud.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have heard the murmurings of the children of Israel: speak unto them, saying, At even ye shall eat flesh, and in the morning ye shall be filled with bread; and ye shall know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' your God. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, that at even the quails came up, and covered the camp: and in the morning the dew lay round about the host. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the dew that lay was gone up, behold, upon the face of the wilderness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there lay
    - type: text
      text: ' a small round thing, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' small as the hoar frost on the ground.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the children of Israel saw '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', they said one to another, It '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' manna: for they wist not what it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: '. And Moses said unto them, This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the bread which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath given you to eat. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the thing which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath commanded, Gather of it every man according to his eating, an omer for every man, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: according to
    - type: text
      text: ' the number of your persons; take ye every man for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in his tents. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Israel did so, and gathered, some more, some less. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they did mete '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' with an omer, he that gathered much had nothing over, and he that gathered little had no lack; they gathered every man according to his eating. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses said, Let no man leave of it till the morning. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the whole congregation of the children of Israel murmured against Moses and Aaron in the wilderness: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Notwithstanding they hearkened not unto Moses; but some of them left of it until the morning, and it bred worms, and stank: and Moses was wroth with them. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they gathered it every morning, every man according to his eating: and when the sun waxed hot, it melted.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' on the sixth day they gathered twice as much bread, two omers for one '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'man:'
    - type: text
      text: ' and all the rulers of the congregation came and told Moses. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto them, This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is that
    - type: text
      text: ' which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath said, To morrow '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the rest of the holy sabbath unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': bake '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' which ye will bake '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to day
    - type: text
      text: ', and seethe that ye will seethe; and that which remaineth over lay up for you to be kept until the morning. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they laid it up till the morning, as Moses bade: and it did not stink, neither was there any worm therein. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses said, Eat that to day; for to day '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a sabbath unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': to day ye shall not find it in the field. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Six days ye shall gather it; but on the seventh day, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which is
    - type: text
      text: ' the sabbath, in it there shall be none.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' there went out '
    - type: usfm
      marker: add
      children:
      - type: text
        text: some
    - type: text
      text: ' of the people on the seventh day for to gather, and they found none. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Moses, How long refuse ye to keep my commandments and my laws? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'See, for that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath given you the sabbath, therefore he giveth you on the sixth day the bread of two days; abide ye every man in his place, let no man go out of his place on the seventh day. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the children of Israel said unto them, Would to God we had died by the hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in the land of Egypt, when we sat by the flesh pots, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' when we did eat bread to the full; for ye have brought us forth into this wilderness, to kill this whole assembly with hunger.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the people rested on the seventh day. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the house of Israel called the name thereof Manna: and it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' like coriander seed, white; and the taste of it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' like wafers '
    - type: usfm
      marker: add
      children:
      - type: text
        text: made
    - type: text
      text: ' with honey.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses said, This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the thing which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commandeth, Fill an omer of it to be kept for your generations; that they may see the bread wherewith I have fed you in the wilderness, when I brought you forth from the land of Egypt. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses said unto Aaron, Take a pot, and put an omer full of manna therein, and lay it up before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', to be kept for your generations. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commanded Moses, so Aaron laid it up before the Testimony, to be kept. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Israel did eat manna forty years, until they came to a land inhabited; they did eat manna, until they came unto the borders of the land of Canaan. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now an omer '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the tenth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: part
    - type: text
      text: ' of an ephah.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' unto Moses, Behold, I will rain bread from heaven for you; and the people shall go out and gather a certain rate every day, that I may prove them, whether they will walk in my law, or no. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come to pass, that on the sixth day they shall prepare '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' which they bring in; and it shall be twice as much as they gather daily. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses and Aaron said unto all the children of Israel, At even, then ye shall know that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath brought you out from the land of Egypt: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and in the morning, then ye shall see the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; for that he heareth your murmurings against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': and what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' we, that ye murmur against us? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: This shall be
    - type: text
      text: ', when the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall give you in the evening flesh to eat, and in the morning bread to the full; for that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' heareth your murmurings which ye murmur against him: and what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' we? your murmurings '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' not against us, but against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses spake unto Aaron, Say unto all the congregation of the children of Israel, Come near before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': for he hath heard your murmurings. '
