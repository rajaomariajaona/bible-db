document_id: ISA.15,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'The burden of Moab. Because in the night Ar of Moab is laid waste, '
  - type: text
    content: and
  - type: text
    content: ' brought to silence;'
  - type: text
    content: 'Because in the night Kir of Moab is laid waste, '
  - type: text
    content: and
  - type: text
    content: ' brought to silence; '
  '2':
  - type: text
    content: 'He is gone up to Bajith, and to Dibon, the high places, to weep: Moab shall howl over Nebo, and over Medeba: on all their heads '
  - type: text
    content: shall be
  - type: text
    content: ' baldness, '
  - type: text
    content: and
  - type: text
    content: ' every beard cut off. '
  '3':
  - type: text
    content: 'In their streets they shall gird themselves with sackcloth: on the tops of their houses, and in their streets, every one shall howl, weeping abundantly.'
  '4':
  - type: text
    content: 'And Heshbon shall cry, and Elealeh: their voice shall be heard '
  - type: text
    content: even
  - type: text
    content: ' unto Jahaz: therefore the armed soldiers of Moab shall cry out; his life shall be grievous unto him. '
  '5':
  - type: text
    content: 'My heart shall cry out for Moab; his fugitives '
  - type: text
    content: shall flee
  - type: text
    content: ' unto Zoar, an heifer of three years old: for by the mounting up of Luhith with weeping shall they go it up; for in the way of Horonaim they shall raise up a cry of destruction. '
  '6':
  - type: text
    content: 'For the waters of Nimrim shall be desolate: for the hay is withered away, the grass faileth, there is no green thing.'
  '7':
  - type: text
    content: 'Therefore the abundance they have gotten, and that which they have laid up, shall they carry away to the brook of the willows. '
  '8':
  - type: text
    content: 'For the cry is gone round about the borders of Moab; the howling thereof unto Eglaim, and the howling thereof unto Beerelim. '
  '9':
  - type: text
    content: 'For the waters of Dimon shall be full of blood: for I will bring more upon Dimon, lions upon him that escapeth of Moab, and upon the remnant of the land.'
