document_id: ISA.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The burden of Moab. Because in the night Ar of Moab is laid waste, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' brought to silence;'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Because in the night Kir of Moab is laid waste, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' brought to silence; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He is gone up to Bajith, and to Dibon, the high places, to weep: Moab shall howl over Nebo, and over Medeba: on all their heads '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' baldness, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' every beard cut off. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'In their streets they shall gird themselves with sackcloth: on the tops of their houses, and in their streets, every one shall howl, weeping abundantly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Heshbon shall cry, and Elealeh: their voice shall be heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' unto Jahaz: therefore the armed soldiers of Moab shall cry out; his life shall be grievous unto him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'My heart shall cry out for Moab; his fugitives '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall flee
  - type: text
    text: ' unto Zoar, an heifer of three years old: for by the mounting up of Luhith with weeping shall they go it up; for in the way of Horonaim they shall raise up a cry of destruction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For the waters of Nimrim shall be desolate: for the hay is withered away, the grass faileth, there is no green thing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Therefore the abundance they have gotten, and that which they have laid up, shall they carry away to the brook of the willows. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For the cry is gone round about the borders of Moab; the howling thereof unto Eglaim, and the howling thereof unto Beerelim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For the waters of Dimon shall be full of blood: for I will bring more upon Dimon, lions upon him that escapeth of Moab, and upon the remnant of the land.'
