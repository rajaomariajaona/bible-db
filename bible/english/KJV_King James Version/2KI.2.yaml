segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Elijah's Translation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And it came to pass, when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' would take up Elijah into heaven by a whirlwind, that Elijah went with Elisha from Gilgal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Elijah said unto Elisha, Tarry here, I pray thee; for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath sent me to Beth-el. And Elisha said '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unto him
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' liveth, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' thy soul liveth, I will not leave thee. So they went down to Beth-el. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And the sons of the prophets that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' at Beth-el came forth to Elisha, and said unto him, Knowest thou that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will take away thy master from thy head to day? And he said, Yea, I know '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '; hold ye your peace. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Elijah said unto him, Elisha, tarry here, I pray thee; for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath sent me to Jericho. And he said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' liveth, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' thy soul liveth, I will not leave thee. So they came to Jericho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the sons of the prophets that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' at Jericho came to Elisha, and said unto him, Knowest thou that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will take away thy master from thy head to day? And he answered, Yea, I know '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '; hold ye your peace. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Elijah said unto him, Tarry, I pray thee, here; for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath sent me to Jordan. And he said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' liveth, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' thy soul liveth, I will not leave thee. And they two went on. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And fifty men of the sons of the prophets went, and stood to view afar off: and they two stood by Jordan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Elijah took his mantle, and wrapped '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' together, and smote the waters, and they were divided hither and thither, so that they two went over on dry ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And it came to pass, when they were gone over, that Elijah said unto Elisha, Ask what I shall do for thee, before I be taken away from thee. And Elisha said, I pray thee, let a double portion of thy spirit be upon me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And he said, Thou hast asked a hard thing: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: nevertheless
  - type: text
    text: ', if thou see me '
  - type: usfm
    marker: add
    children:
    - type: text
      text: when I am
  - type: text
    text: ' taken from thee, it shall be so unto thee; but if not, it shall not be '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And it came to pass, as they still went on, and talked, that, behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there appeared
  - type: text
    text: ' a chariot of fire, and horses of fire, and parted them both asunder; and Elijah went up by a whirlwind into heaven. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Elisha saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and he cried, My father, my father, the chariot of Israel, and the horsemen thereof. And he saw him no more: and he took hold of his own clothes, and rent them in two pieces. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He took up also the mantle of Elijah that fell from him, and went back, and stood by the bank of Jordan; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and he took the mantle of Elijah that fell from him, and smote the waters, and said, Where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Elijah? and when he also had smitten the waters, they parted hither and thither: and Elisha went over.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elisha
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And when the sons of the prophets which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' to view at Jericho saw him, they said, The spirit of Elijah doth rest on Elisha. And they came to meet him, and bowed themselves to the ground before him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And they said unto him, Behold now, there be with thy servants fifty strong men; let them go, we pray thee, and seek thy master: lest peradventure the Spirit of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath taken him up, and cast him upon some mountain, or into some valley. And he said, Ye shall not send. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And when they urged him till he was ashamed, he said, Send. They sent therefore fifty men; and they sought three days, but found him not. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And when they came again to him, (for he tarried at Jericho,) he said unto them, Did I not say unto you, Go not?
- type: usfm
  marker: s2
  children:
  - type: text
    text: Healed the Waters
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And the men of the city said unto Elisha, Behold, I pray thee, the situation of this city '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' pleasant, as my lord seeth: but the water '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' naught, and the ground barren. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And he said, Bring me a new cruse, and put salt therein. And they brought '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And he went forth unto the spring of the waters, and cast the salt in there, and said, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', I have healed these waters; there shall not be from thence any more death or barren '
  - type: usfm
    marker: add
    children:
    - type: text
      text: land
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: So the waters were healed unto this day, according to the saying of Elisha which he spake.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And he went up from thence unto Beth-el: and as he was going up by the way, there came forth little children out of the city, and mocked him, and said unto him, Go up, thou bald head; go up, thou bald head. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And he turned back, and looked on them, and cursed them in the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. And there came forth two she bears out of the wood, and tare forty and two children of them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: And he went from thence to mount Carmel, and from thence he returned to Samaria.
