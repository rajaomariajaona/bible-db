verses:
  '1':
  - type: heading
    content: Day of Atonement
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses after the death of the two sons of Aaron, when they offered before the '
  - type: text
    content: LORD
  - type: text
    content: ', and died; '
  '10':
  - type: text
    content: 'But the goat, on which the lot fell to be the scapegoat, shall be presented alive before the '
  - type: text
    content: LORD
  - type: text
    content: ', to make an atonement with him, '
  - type: text
    content: and
  - type: text
    content: ' to let him go for a scapegoat into the wilderness. '
  '11':
  - type: text
    content: 'And Aaron shall bring the bullock of the sin offering, which '
  - type: text
    content: is
  - type: text
    content: ' for himself, and shall make an atonement for himself, and for his house, and shall kill the bullock of the sin offering which '
  - type: text
    content: is
  - type: text
    content: ' for himself: '
  '12':
  - type: text
    content: 'and he shall take a censer full of burning coals of fire from off the altar before the '
  - type: text
    content: LORD
  - type: text
    content: ', and his hands full of sweet incense beaten small, and bring '
  - type: text
    content: it
  - type: text
    content: ' within the vail: '
  '13':
  - type: text
    content: 'and he shall put the incense upon the fire before the '
  - type: text
    content: LORD
  - type: text
    content: ', that the cloud of the incense may cover the mercy seat that '
  - type: text
    content: is
  - type: text
    content: ' upon the testimony, that he die not: '
  '14':
  - type: text
    content: 'and he shall take of the blood of the bullock, and sprinkle '
  - type: text
    content: it
  - type: text
    content: ' with his finger upon the mercy seat eastward; and before the mercy seat shall he sprinkle of the blood with his finger seven times.'
  '15':
  - type: text
    content: 'Then shall he kill the goat of the sin offering, that '
  - type: text
    content: is
  - type: text
    content: ' for the people, and bring his blood within the vail, and do with that blood as he did with the blood of the bullock, and sprinkle it upon the mercy seat, and before the mercy seat: '
  '16':
  - type: text
    content: 'and he shall make an atonement for the holy '
  - type: text
    content: place
  - type: text
    content: ', because of the uncleanness of the children of Israel, and because of their transgressions in all their sins: and so shall he do for the tabernacle of the congregation, that remaineth among them in the midst of their uncleanness. '
  '17':
  - type: text
    content: 'And there shall be no man in the tabernacle of the congregation when he goeth in to make an atonement in the holy '
  - type: text
    content: place
  - type: text
    content: ', until he come out, and have made an atonement for himself, and for his household, and for all the congregation of Israel. '
  '18':
  - type: text
    content: 'And he shall go out unto the altar that '
  - type: text
    content: is
  - type: text
    content: ' before the '
  - type: text
    content: LORD
  - type: text
    content: ', and make an atonement for it; and shall take of the blood of the bullock, and of the blood of the goat, and put '
  - type: text
    content: it
  - type: text
    content: ' upon the horns of the altar round about. '
  '19':
  - type: text
    content: And he shall sprinkle of the blood upon it with his finger seven times, and cleanse it, and hallow it from the uncleanness of the children of Israel.
  '2':
  - type: text
    content: 'and the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Moses, Speak unto Aaron thy brother, that he come not at all times into the holy '
  - type: text
    content: place
  - type: text
    content: ' within the vail before the mercy seat, which '
  - type: text
    content: is
  - type: text
    content: ' upon the ark; that he die not: for I will appear in the cloud upon the mercy seat. '
  '20':
  - type: text
    content: 'And when he hath made an end of reconciling the holy '
  - type: text
    content: place
  - type: text
    content: ', and the tabernacle of the congregation, and the altar, he shall bring the live goat: '
  '21':
  - type: text
    content: 'and Aaron shall lay both his hands upon the head of the live goat, and confess over him all the iniquities of the children of Israel, and all their transgressions in all their sins, putting them upon the head of the goat, and shall send '
  - type: text
    content: him
  - type: text
    content: ' away by the hand of a fit man into the wilderness: '
  '22':
  - type: text
    content: 'and the goat shall bear upon him all their iniquities unto a land not inhabited: and he shall let go the goat in the wilderness. '
  '23':
  - type: text
    content: 'And Aaron shall come into the tabernacle of the congregation, and shall put off the linen garments, which he put on when he went into the holy '
  - type: text
    content: place
  - type: text
    content: ', and shall leave them there: '
  '24':
  - type: text
    content: 'and he shall wash his flesh with water in the holy place, and put on his garments, and come forth, and offer his burnt offering, and the burnt offering of the people, and make an atonement for himself, and for the people. '
  '25':
  - type: text
    content: 'And the fat of the sin offering shall he burn upon the altar. '
  '26':
  - type: text
    content: 'And he that let go the goat for the scapegoat shall wash his clothes, and bathe his flesh in water, and afterward come into the camp. '
  '27':
  - type: text
    content: 'And the bullock '
  - type: text
    content: for
  - type: text
    content: ' the sin offering, and the goat '
  - type: text
    content: for
  - type: text
    content: ' the sin offering, whose blood was brought in to make atonement in the holy '
  - type: text
    content: place
  - type: text
    content: ', shall '
  - type: text
    content: one
  - type: text
    content: ' carry forth without the camp; and they shall burn in the fire their skins, and their flesh, and their dung. '
  '28':
  - type: text
    content: And he that burneth them shall wash his clothes, and bathe his flesh in water, and afterward he shall come into the camp.
  '29':
  - type: text
    content: 'And '
  - type: text
    content: this
  - type: text
    content: ' shall be a statute for ever unto you: '
  - type: text
    content: that
  - type: text
    content: ' in the seventh month, on the tenth '
  - type: text
    content: day
  - type: text
    content: ' of the month, ye shall afflict your souls, and do no work at all, '
  - type: text
    content: whether it be
  - type: text
    content: ' one of your own country, or a stranger that sojourneth among you: '
  '3':
  - type: text
    content: 'Thus shall Aaron come into the holy '
  - type: text
    content: 'place:'
  - type: text
    content: ' with a young bullock for a sin offering, and a ram for a burnt offering. '
  '30':
  - type: text
    content: 'for on that day shall '
  - type: text
    content: the priest
  - type: text
    content: ' make an atonement for you, to cleanse you, '
  - type: text
    content: that
  - type: text
    content: ' ye may be clean from all your sins before the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'It '
  - type: text
    content: shall be
  - type: text
    content: ' a sabbath of rest unto you, and ye shall afflict your souls, by a statute for ever. '
  '32':
  - type: text
    content: 'And the priest, whom he shall anoint, and whom he shall consecrate to minister in the priest''s office in his father''s stead, shall make the atonement, and shall put on the linen clothes, '
  - type: text
    content: even
  - type: text
    content: ' the holy garments: '
  '33':
  - type: text
    content: 'and he shall make an atonement for the holy sanctuary, and he shall make an atonement for the tabernacle of the congregation, and for the altar, and he shall make an atonement for the priests, and for all the people of the congregation. '
  '34':
  - type: text
    content: 'And this shall be an everlasting statute unto you, to make an atonement for the children of Israel for all their sins once a year. And he did as the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses.'
  '4':
  - type: text
    content: 'He shall put on the holy linen coat, and he shall have the linen breeches upon his flesh, and shall be girded with a linen girdle, and with the linen mitre shall he be attired: these '
  - type: text
    content: are
  - type: text
    content: ' holy garments; therefore shall he wash his flesh in water, and '
  - type: text
    content: so
  - type: text
    content: ' put them on. '
  '5':
  - type: text
    content: 'And he shall take of the congregation of the children of Israel two kids of the goats for a sin offering, and one ram for a burnt offering. '
  '6':
  - type: text
    content: 'And Aaron shall offer his bullock of the sin offering, which '
  - type: text
    content: is
  - type: text
    content: ' for himself, and make an atonement for himself, and for his house. '
  '7':
  - type: text
    content: 'And he shall take the two goats, and present them before the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: at
  - type: text
    content: ' the door of the tabernacle of the congregation. '
  '8':
  - type: text
    content: 'And Aaron shall cast lots upon the two goats; one lot for the '
  - type: text
    content: LORD
  - type: text
    content: ', and the other lot for the scapegoat. '
  '9':
  - type: text
    content: 'And Aaron shall bring the goat upon which the '
  - type: text
    content: LORD
  - type: text
    content: '''s lot fell, and offer him '
  - type: text
