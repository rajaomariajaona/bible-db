document_id: LEV.16,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Day of Atonement
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses after the death of the two sons of Aaron, when they offered before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and died; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'But the goat, on which the lot fell to be the scapegoat, shall be presented alive before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', to make an atonement with him, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' to let him go for a scapegoat into the wilderness. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And Aaron shall bring the bullock of the sin offering, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' for himself, and shall make an atonement for himself, and for his house, and shall kill the bullock of the sin offering which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' for himself: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'and he shall take a censer full of burning coals of fire from off the altar before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and his hands full of sweet incense beaten small, and bring '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' within the vail: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'and he shall put the incense upon the fire before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', that the cloud of the incense may cover the mercy seat that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' upon the testimony, that he die not: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'and he shall take of the blood of the bullock, and sprinkle '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' with his finger upon the mercy seat eastward; and before the mercy seat shall he sprinkle of the blood with his finger seven times.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then shall he kill the goat of the sin offering, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' for the people, and bring his blood within the vail, and do with that blood as he did with the blood of the bullock, and sprinkle it upon the mercy seat, and before the mercy seat: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'and he shall make an atonement for the holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: place
    - type: text
      text: ', because of the uncleanness of the children of Israel, and because of their transgressions in all their sins: and so shall he do for the tabernacle of the congregation, that remaineth among them in the midst of their uncleanness. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And there shall be no man in the tabernacle of the congregation when he goeth in to make an atonement in the holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: place
    - type: text
      text: ', until he come out, and have made an atonement for himself, and for his household, and for all the congregation of Israel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And he shall go out unto the altar that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and make an atonement for it; and shall take of the blood of the bullock, and of the blood of the goat, and put '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' upon the horns of the altar round about. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: And he shall sprinkle of the blood upon it with his finger seven times, and cleanse it, and hallow it from the uncleanness of the children of Israel.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Moses, Speak unto Aaron thy brother, that he come not at all times into the holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: place
    - type: text
      text: ' within the vail before the mercy seat, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' upon the ark; that he die not: for I will appear in the cloud upon the mercy seat. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And when he hath made an end of reconciling the holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: place
    - type: text
      text: ', and the tabernacle of the congregation, and the altar, he shall bring the live goat: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'and Aaron shall lay both his hands upon the head of the live goat, and confess over him all the iniquities of the children of Israel, and all their transgressions in all their sins, putting them upon the head of the goat, and shall send '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' away by the hand of a fit man into the wilderness: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'and the goat shall bear upon him all their iniquities unto a land not inhabited: and he shall let go the goat in the wilderness. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And Aaron shall come into the tabernacle of the congregation, and shall put off the linen garments, which he put on when he went into the holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: place
    - type: text
      text: ', and shall leave them there: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'and he shall wash his flesh with water in the holy place, and put on his garments, and come forth, and offer his burnt offering, and the burnt offering of the people, and make an atonement for himself, and for the people. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And the fat of the sin offering shall he burn upon the altar. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And he that let go the goat for the scapegoat shall wash his clothes, and bathe his flesh in water, and afterward come into the camp. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And the bullock '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' the sin offering, and the goat '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' the sin offering, whose blood was brought in to make atonement in the holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: place
    - type: text
      text: ', shall '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' carry forth without the camp; and they shall burn in the fire their skins, and their flesh, and their dung. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: And he that burneth them shall wash his clothes, and bathe his flesh in water, and afterward he shall come into the camp.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ' shall be a statute for ever unto you: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' in the seventh month, on the tenth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the month, ye shall afflict your souls, and do no work at all, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whether it be
    - type: text
      text: ' one of your own country, or a stranger that sojourneth among you: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Thus shall Aaron come into the holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'place:'
    - type: text
      text: ' with a young bullock for a sin offering, and a ram for a burnt offering. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'for on that day shall '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the priest
    - type: text
      text: ' make an atonement for you, to cleanse you, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' ye may be clean from all your sins before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'It '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' a sabbath of rest unto you, and ye shall afflict your souls, by a statute for ever. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And the priest, whom he shall anoint, and whom he shall consecrate to minister in the priest''s office in his father''s stead, shall make the atonement, and shall put on the linen clothes, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the holy garments: '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'and he shall make an atonement for the holy sanctuary, and he shall make an atonement for the tabernacle of the congregation, and for the altar, and he shall make an atonement for the priests, and for all the people of the congregation. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'And this shall be an everlasting statute unto you, to make an atonement for the children of Israel for all their sins once a year. And he did as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commanded Moses.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'He shall put on the holy linen coat, and he shall have the linen breeches upon his flesh, and shall be girded with a linen girdle, and with the linen mitre shall he be attired: these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' holy garments; therefore shall he wash his flesh in water, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' put them on. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And he shall take of the congregation of the children of Israel two kids of the goats for a sin offering, and one ram for a burnt offering. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And Aaron shall offer his bullock of the sin offering, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' for himself, and make an atonement for himself, and for his house. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And he shall take the two goats, and present them before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: at
    - type: text
      text: ' the door of the tabernacle of the congregation. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And Aaron shall cast lots upon the two goats; one lot for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and the other lot for the scapegoat. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And Aaron shall bring the goat upon which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '''s lot fell, and offer him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a sin offering. '
