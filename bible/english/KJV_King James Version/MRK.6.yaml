  '39':
  - type: text
    content: 'And he commanded them to make all sit down by companies upon the green grass. '
  '4':
  - type: text
    content: 'But Jesus said unto them, '
  - type: text
    content: A prophet is not without honour, but in his own country, and among his own kin, and in his own house.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'And they sat down in ranks, by hundreds, and by fifties. '
  '41':
  - type: text
    content: 'And when he had taken the five loaves and the two fishes, he looked up to heaven, and blessed, and brake the loaves, and gave '
  - type: text
    content: them
  - type: text
    content: ' to his disciples to set before them; and the two fishes divided he among them all. '
  '42':
  - type: text
    content: 'And they did all eat, and were filled. '
  '43':
  - type: text
    content: 'And they took up twelve baskets full of the fragments, and of the fishes. '
  '44':
  - type: text
    content: And they that did eat of the loaves were about five thousand men.
  - type: heading
    content: Across the Lake
  '45':
  - type: text
    content: 'And straightway he constrained his disciples to get into the ship, and to go to the other side before unto Bethsaida, while he sent away the people. '
  '46':
  - type: text
    content: 'And when he had sent them away, he departed into a mountain to pray. '
  '47':
  - type: text
    content: 'And when even was come, the ship was in the midst of the sea, and he alone on the land. '
  '48':
  - type: text
    content: 'And he saw them toiling in rowing; for the wind was contrary unto them: and about the fourth watch of the night he cometh unto them, walking upon the sea, and would have passed by them. '
  '49':
  - type: text
    content: 'But when they saw him walking upon the sea, they supposed it had been a spirit, and cried out: '
  '5':
  - type: text
    content: 'And he could there do no mighty work, save that he laid his hands upon a few sick folk, and healed '
  - type: text
    content: them
  - type: text
    content: '. '
  '50':
  - type: text
    content: 'for they all saw him, and were troubled. And immediately he talked with them, and saith unto them, '
  - type: text
    content: 'Be of good cheer: it is I; be not afraid.'
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'And he went up unto them into the ship; and the wind ceased: and they were sore amazed in themselves beyond measure, and wondered. '
  '52':
  - type: text
    content: 'For they considered not '
  - type: text
    content: the miracle
  - type: text
    content: ' of the loaves: for their heart was hardened.'
  '53':
  - type: text
    content: 'And when they had passed over, they came into the land of Gennesaret, and drew to the shore. '
  '54':
  - type: text
    content: 'And when they were come out of the ship, straightway they knew him, '
  '55':
  - type: text
    content: 'and ran through that whole region round about, and began to carry about in beds those that were sick, where they heard he was. '
  '56':
  - type: text
    content: 'And whithersoever he entered, into villages, or cities, or country, they laid the sick in the streets, and besought him that they might touch if it were but the border of his garment: and as many as touched him were made whole.'
  '6':
  - type: text
    content: And he marvelled because of their unbelief. And he went round about the villages, teaching.
