  - type: heading
    content: In a Desert Place
  '3':
  - type: text
    content: 'Is not this the carpenter, the son of Mary, the brother of James, and Joses, and of Juda, and Simon? and are not his sisters here with us? And they were offended at him. '
  '30':
  - type: text
    content: 'And the apostles gathered themselves together unto Jesus, and told him all things, both what they had done, and what they had taught. '
  '31':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: 'Come ye yourselves apart into a desert place, and rest a while:'
  - type: text
    content: ' for there were many coming and going, and they had no leisure so much as to eat. '
  '32':
  - type: text
    content: 'And they departed into a desert place by ship privately. '
  '33':
  - type: text
    content: 'And the people saw them departing, and many knew him, and ran afoot thither out of all cities, and outwent them, and came together unto him. '
  '34':
  - type: text
    content: 'And Jesus, when he came out, saw much people, and was moved with compassion toward them, because they were as sheep not having a shepherd: and he began to teach them many things.'
  '35':
  - type: text
    content: 'And when the day was now far spent, his disciples came unto him, and said, This is a desert place, and now the time '
  - type: text
    content: is
  - type: text
    content: ' far passed: '
  '36':
  - type: text
    content: 'send them away, that they may go into the country round about, and into the villages, and buy themselves bread: for they have nothing to eat. '
  '37':
  - type: text
    content: 'He answered and said unto them, '
  - type: text
    content: Give ye them to eat.
  - type: text
    content: ' And they say unto him, Shall we go and buy two hundred pennyworth of bread, and give them to eat? '
  '38':
  - type: text
    content: 'He saith unto them, '
  - type: text
    content: How many loaves have ye? go and see.
  - type: text
