document_id: MRK.6
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Rejection at Nazareth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And he went out from thence, and came into his own country; and his disciples follow him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And when the sabbath day was come, he began to teach in the synagogue: and many hearing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' were astonished, saying, From whence hath this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' these things? and what wisdom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this which is given unto him, that even such mighty works are wrought by his hands? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Is not this the carpenter, the son of Mary, the brother of James, and Joses, and of Juda, and Simon? and are not his sisters here with us? And they were offended at him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But Jesus said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: A prophet is not without honour, but in his own country, and among his own kin, and in his own house.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And he could there do no mighty work, save that he laid his hands upon a few sick folk, and healed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And he marvelled because of their unbelief. And he went round about the villages, teaching.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sends Out Apostles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And he called '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unto him
  - type: text
    text: ' the twelve, and began to send them forth by two and two; and gave them power over unclean spirits; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and commanded them that they should take nothing for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' journey, save a staff only; no scrip, no bread, no money in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' purse: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' shod with sandals; and not put on two coats. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And he said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: In what place soever ye enter into an house, there abide till ye depart from that place.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And whosoever shall not receive you, nor hear you, when ye depart thence, shake off the dust under your feet for a testimony against them. Verily I say unto you, It shall be more tolerable for Sodom and Gomorrha in the day of judgment, than for that city.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And they went out, and preached that men should repent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And they cast out many devils, and anointed with oil many that were sick, and healed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Herod's Alarm
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And king Herod heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of him
  - type: text
    text: '; (for his name was spread abroad:) and he said, That John the Baptist was risen from the dead, and therefore mighty works do shew forth themselves in him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Others said, That it is Elias. And others said, That it is a prophet, or as one of the prophets. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But when Herod heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thereof
  - type: text
    text: ', he said, It is John, whom I beheaded: he is risen from the dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For Herod himself had sent forth and laid hold upon John, and bound him in prison for Herodias'' sake, his brother Philip''s wife: for he had married her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For John had said unto Herod, It is not lawful for thee to have thy brother''s wife. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Therefore Herodias had a quarrel against him, and would have killed him; but she could not: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: for Herod feared John, knowing that he was a just man and an holy, and observed him; and when he heard him, he did many things, and heard him gladly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And when a convenient day was come, that Herod on his birthday made a supper to his lords, high captains, and chief '
  - type: usfm
    marker: add
    children:
    - type: text
      text: estates
  - type: text
    text: ' of Galilee; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'and when the daughter of the said Herodias came in, and danced, and pleased Herod and them that sat with him, the king said unto the damsel, Ask of me whatsoever thou wilt, and I will give '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And he sware unto her, Whatsoever thou shalt ask of me, I will give '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' thee, unto the half of my kingdom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And she went forth, and said unto her mother, What shall I ask? And she said, The head of John the Baptist. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And she came in straightway with haste unto the king, and asked, saying, I will that thou give me by and by in a charger the head of John the Baptist. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And the king was exceeding sorry; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yet
  - type: text
    text: ' for his oath''s sake, and for their sakes which sat with him, he would not reject her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And immediately the king sent an executioner, and commanded his head to be brought: and he went and beheaded him in the prison, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and brought his head in a charger, and gave it to the damsel: and the damsel gave it to her mother. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And when his disciples heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of it
  - type: text
    text: ', they came and took up his corpse, and laid it in a tomb.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: In a Desert Place
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And the apostles gathered themselves together unto Jesus, and told him all things, both what they had done, and what they had taught. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And he said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Come ye yourselves apart into a desert place, and rest a while:'
  - type: text
    text: ' for there were many coming and going, and they had no leisure so much as to eat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And they departed into a desert place by ship privately. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And the people saw them departing, and many knew him, and ran afoot thither out of all cities, and outwent them, and came together unto him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And Jesus, when he came out, saw much people, and was moved with compassion toward them, because they were as sheep not having a shepherd: and he began to teach them many things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And when the day was now far spent, his disciples came unto him, and said, This is a desert place, and now the time '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' far passed: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'send them away, that they may go into the country round about, and into the villages, and buy themselves bread: for they have nothing to eat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'He answered and said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Give ye them to eat.
  - type: text
    text: ' And they say unto him, Shall we go and buy two hundred pennyworth of bread, and give them to eat? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'He saith unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: How many loaves have ye? go and see.
  - type: text
    text: ' And when they knew, they say, Five, and two fishes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And he commanded them to make all sit down by companies upon the green grass. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And they sat down in ranks, by hundreds, and by fifties. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And when he had taken the five loaves and the two fishes, he looked up to heaven, and blessed, and brake the loaves, and gave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' to his disciples to set before them; and the two fishes divided he among them all. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And they did all eat, and were filled. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'And they took up twelve baskets full of the fragments, and of the fishes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: And they that did eat of the loaves were about five thousand men.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Across the Lake
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'And straightway he constrained his disciples to get into the ship, and to go to the other side before unto Bethsaida, while he sent away the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'And when he had sent them away, he departed into a mountain to pray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'And when even was come, the ship was in the midst of the sea, and he alone on the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'And he saw them toiling in rowing; for the wind was contrary unto them: and about the fourth watch of the night he cometh unto them, walking upon the sea, and would have passed by them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'But when they saw him walking upon the sea, they supposed it had been a spirit, and cried out: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'for they all saw him, and were troubled. And immediately he talked with them, and saith unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Be of good cheer: it is I; be not afraid.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'And he went up unto them into the ship; and the wind ceased: and they were sore amazed in themselves beyond measure, and wondered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'For they considered not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the miracle
  - type: text
    text: ' of the loaves: for their heart was hardened.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'And when they had passed over, they came into the land of Gennesaret, and drew to the shore. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'And when they were come out of the ship, straightway they knew him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'and ran through that whole region round about, and began to carry about in beds those that were sick, where they heard he was. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'And whithersoever he entered, into villages, or cities, or country, they laid the sick in the streets, and besought him that they might touch if it were but the border of his garment: and as many as touched him were made whole.'
