document_id: PSA.56,1
type_code: eng
verses:
  '1':
  - type: text
    content: To the chief Musician upon Jonath-elem-rechokim, Michtam of David, when the Philistines took him in Gath.
  - type: text
    content: 'Be merciful unto me, O God: for man would swallow me up;'
  - type: text
    content: He fighting daily oppresseth me.
  '10':
  - type: text
    content: 'In God will I praise '
  - type: text
    content: his
  - type: text
    content: ' word:'
  - type: text
    content: 'In the '
  - type: text
    content: LORD
  - type: text
    content: ' will I praise '
  - type: text
    content: his
  - type: text
    content: ' word.'
  '11':
  - type: text
    content: 'In God have I put my trust:'
  - type: text
    content: I will not be afraid what man can do unto me.
  '12':
  - type: text
    content: 'Thy vows '
  - type: text
    content: are
  - type: text
    content: ' upon me, O God:'
  - type: text
    content: I will render praises unto thee.
  '13':
  - type: text
    content: 'For thou hast delivered my soul from death: '
  - type: text
    content: wilt
  - type: text
    content: ' not '
  - type: text
    content: thou deliver
  - type: text
    content: ' my feet from falling,'
  - type: text
    content: That I may walk before God in the light of the living?
  '2':
  - type: text
    content: 'Mine enemies would daily swallow '
  - type: text
    content: me
  - type: text
    content: ' up:'
  - type: text
    content: 'For '
  - type: text
    content: they be
  - type: text
    content: ' many that fight against me, O thou most High.'
  '3':
  - type: text
    content: What time I am afraid,
  - type: text
    content: I will trust in thee.
  '4':
  - type: text
    content: In God I will praise his word,
  - type: text
    content: In God I have put my trust; I will not fear what flesh can do unto me.
  '5':
  - type: text
    content: 'Every day they wrest my words:'
  - type: text
    content: 'All their thoughts '
  - type: text
    content: are
  - type: text
    content: ' against me for evil.'
  '6':
  - type: text
    content: They gather themselves together, they hide themselves,
  - type: text
    content: They mark my steps, when they wait for my soul.
  '7':
  - type: text
    content: Shall they escape by iniquity?
  - type: text
    content: 'In '
  - type: text
    content: thine
  - type: text
    content: ' anger cast down the people, O God.'
  '8':
  - type: text
    content: 'Thou tellest my wanderings: Put thou my tears into thy bottle:'
  - type: text
    content: Are they
  - type: text
    content: ' not in thy book?'
  '9':
  - type: text
    content: 'When I cry '
  - type: text
    content: unto thee
  - type: text
    content: ', then shall mine enemies turn back:'
  - type: text
    content: 'This I know; for God '
  - type: text
    content: is
  - type: text
    content: ' for me.'
