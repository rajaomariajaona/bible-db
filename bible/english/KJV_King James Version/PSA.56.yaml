document_id: PSA.56,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the chief Musician upon Jonath-elem-rechokim, Michtam of David, when the Philistines took him in Gath.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Be merciful unto me, O God: for man would swallow me up;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He fighting daily oppresseth me.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'In God will I praise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' word:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will I praise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' word.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'In God have I put my trust:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will not be afraid what man can do unto me.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Thy vows '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' upon me, O God:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will render praises unto thee.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'For thou hast delivered my soul from death: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: wilt
    - type: text
      text: ' not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thou deliver
    - type: text
      text: ' my feet from falling,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That I may walk before God in the light of the living?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mine enemies would daily swallow '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ' up:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they be
    - type: text
      text: ' many that fight against me, O thou most High.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: What time I am afraid,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will trust in thee.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: In God I will praise his word,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In God I have put my trust; I will not fear what flesh can do unto me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Every day they wrest my words:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'All their thoughts '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' against me for evil.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: They gather themselves together, they hide themselves,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They mark my steps, when they wait for my soul.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Shall they escape by iniquity?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thine
    - type: text
      text: ' anger cast down the people, O God.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Thou tellest my wanderings: Put thou my tears into thy bottle:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Are they
    - type: text
      text: ' not in thy book?'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'When I cry '
    - type: usfm
      marker: add
      children:
      - type: text
        text: unto thee
    - type: text
      text: ', then shall mine enemies turn back:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'This I know; for God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' for me.'
