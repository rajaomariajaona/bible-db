  '1':
  - type: heading
    content: Take Heed to Yourselves
  - type: text
    content: 'Then said he unto the disciples, '
  - type: text
    content: 'It is impossible but that offences will come: but woe '
  - type: text
    content: unto him
  - type: text
    content: ', through whom they come!'
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'So likewise ye, when ye shall have done all those things which are commanded you, say, We are unprofitable servants: we have done that which was our duty to do.'
  - type: heading
    content: A Grateful Samaritan
  '11':
  - type: text
    content: 'And it came to pass, as he went to Jerusalem, that he passed through the midst of Samaria and Galilee. '
  '12':
  - type: text
    content: 'And as he entered into a certain village, there met him ten men that were lepers, which stood afar off: '
  '13':
  - type: text
    content: 'and they lifted up '
  - type: text
    content: their
  - type: text
    content: ' voices, and said, Jesus, Master, have mercy on us. '
  '14':
  - type: text
    content: 'And when he saw '
  - type: text
    content: them
  - type: text
    content: ', he said unto them, '
  - type: text
    content: Go shew yourselves unto the priests.
  - type: text
    content: ' And it came to pass, that, as they went, they were cleansed. '
  '15':
  - type: text
    content: 'And one of them, when he saw that he was healed, turned back, and with a loud voice glorified God, '
  '16':
  - type: text
    content: 'and fell down on '
  - type: text
    content: his
  - type: text
