document_id: LUK.17,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Take Heed to Yourselves
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said he unto the disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'It is impossible but that offences will come: but woe '
      - type: usfm
        marker: add
        children:
        - type: text
          text: unto him
      - type: text
        text: ', through whom they come!'
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'So likewise ye, when ye shall have done all those things which are commanded you, say, We are unprofitable servants: we have done that which was our duty to do.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: A Grateful Samaritan
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, as he went to Jerusalem, that he passed through the midst of Samaria and Galilee. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as he entered into a certain village, there met him ten men that were lepers, which stood afar off: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they lifted up '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' voices, and said, Jesus, Master, have mercy on us. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he saw '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ', he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Go shew yourselves unto the priests.
    - type: text
      text: ' And it came to pass, that, as they went, they were cleansed. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And one of them, when he saw that he was healed, turned back, and with a loud voice glorified God, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and fell down on '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' face at his feet, giving him thanks: and he was a Samaritan.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus answering said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Were there not ten cleansed? but where '
      - type: usfm
        marker: add
        children:
        - type: text
          text: are
      - type: text
        text: ' the nine?'
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: There are not found that returned to give glory to God, save this stranger
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Arise, go thy way: thy faith hath made thee whole.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Days of the Son of Man
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It were better for him that a millstone were hanged about his neck, and he cast into the sea, than that he should offend one of these little ones.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he was demanded of the Pharisees, when the kingdom of God should come, he answered them and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'The kingdom of God cometh not with observation:'
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: neither shall they say, Lo here! or, lo there! for, behold, the kingdom of God is within you.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto the disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'The days will come, when ye shall desire to see one of the days of the Son of man, and ye shall not see '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: .
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And they shall say to you, See here; or, see there: go not after '
      - type: usfm
        marker: add
        children:
        - type: text
          text: them
      - type: text
        text: ', nor follow '
      - type: usfm
        marker: add
        children:
        - type: text
          text: them
      - type: text
        text: .
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For as the lightning, that lighteneth out of the one '
      - type: usfm
        marker: add
        children:
        - type: text
          text: part
      - type: text
        text: ' under heaven, shineth unto the other '
      - type: usfm
        marker: add
        children:
        - type: text
          text: part
      - type: text
        text: ' under heaven; so shall also the Son of man be in his day.'
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But first must he suffer many things, and be rejected of this generation.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And as it was in the days of Noe, so shall it be also in the days of the Son of man.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: They did eat, they drank, they married wives, they were given in marriage, until the day that Noe entered into the ark, and the flood came, and destroyed them all.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Likewise also as it was in the days of Lot; they did eat, they drank, they bought, they sold, they planted, they builded;
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'but the same day that Lot went out of Sodom it rained fire and brimstone from heaven, and destroyed '
      - type: usfm
        marker: add
        children:
        - type: text
          text: them
      - type: text
        text: ' all.'
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Take heed to yourselves: If thy brother trespass against thee, rebuke him; and if he repent, forgive him.'
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Even thus shall it be in the day when the Son of man is revealed.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'In that day, he which shall be upon the housetop, and his stuff in the house, let him not come down to take it away: and he that is in the field, let him likewise not return back.'
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Remember Lot's wife.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whosoever shall seek to save his life shall lose it; and whosoever shall lose his life shall preserve it.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I tell you, in that night there shall be two '
      - type: usfm
        marker: add
        children:
        - type: text
          text: men
      - type: text
        text: ' in one bed; the one shall be taken, and the other shall be left.'
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Two '
      - type: usfm
        marker: add
        children:
        - type: text
          text: women
      - type: text
        text: ' shall be grinding together; the one shall be taken, and the other left.'
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Two '
      - type: usfm
        marker: add
        children:
        - type: text
          text: men
      - type: text
        text: ' shall be in the field; the one shall be taken, and the other left.'
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they answered and said unto him, Where, Lord? And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Wheresoever the body '
      - type: usfm
        marker: add
        children:
        - type: text
          text: is
      - type: text
        text: ', thither will the eagles be gathered together.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And if he trespass against thee seven times in a day, and seven times in a day turn again to thee, saying, I repent; thou shalt forgive him.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the apostles said unto the Lord, Increase our faith. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the Lord said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If ye had faith as a grain of mustard seed, ye might say unto this sycamine tree, Be thou plucked up by the root, and be thou planted in the sea; and it should obey you.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But which of you, having a servant plowing or feeding cattle, will say unto him by and by, when he is come from the field, Go and sit down to meat?
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And will not rather say unto him, Make ready wherewith I may sup, and gird thyself, and serve me, till I have eaten and drunken; and afterward thou shalt eat and drink?
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Doth he thank that servant because he did the things that were commanded him? I trow not.
    - type: text
      text: ' '
