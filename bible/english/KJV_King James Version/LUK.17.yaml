  - type: text
    content: are
  - type: text
    content: ' the nine?'
  - type: text
    content: ' '
  '18':
  - type: text
    content: There are not found that returned to give glory to God, save this stranger
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'And he said unto him, '
  - type: text
    content: 'Arise, go thy way: thy faith hath made thee whole.'
  - type: heading
    content: The Days of the Son of Man
  '2':
  - type: text
    content: It were better for him that a millstone were hanged about his neck, and he cast into the sea, than that he should offend one of these little ones.
  '20':
  - type: text
    content: 'And when he was demanded of the Pharisees, when the kingdom of God should come, he answered them and said, '
  - type: text
    content: 'The kingdom of God cometh not with observation:'
  - type: text
    content: ' '
  '21':
  - type: text
    content: neither shall they say, Lo here! or, lo there! for, behold, the kingdom of God is within you.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'And he said unto the disciples, '
  - type: text
    content: 'The days will come, when ye shall desire to see one of the days of the Son of man, and ye shall not see '
  - type: text
    content: it
  - type: text
    content: .
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'And they shall say to you, See here; or, see there: go not after '
  - type: text
    content: them
  - type: text
    content: ', nor follow '
  - type: text
    content: them
  - type: text
    content: .
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'For as the lightning, that lighteneth out of the one '
  - type: text
    content: part
  - type: text
    content: ' under heaven, shineth unto the other '
  - type: text
    content: part
  - type: text
    content: ' under heaven; so shall also the Son of man be in his day.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: But first must he suffer many things, and be rejected of this generation.
  '26':
  - type: text
    content: ' '
  - type: text
    content: And as it was in the days of Noe, so shall it be also in the days of the Son of man.
  - type: text
    content: ' '
  '27':
  - type: text
    content: They did eat, they drank, they married wives, they were given in marriage, until the day that Noe entered into the ark, and the flood came, and destroyed them all.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Likewise also as it was in the days of Lot; they did eat, they drank, they bought, they sold, they planted, they builded;
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'but the same day that Lot went out of Sodom it rained fire and brimstone from heaven, and destroyed '
  - type: text
    content: them
  - type: text
    content: ' all.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: ' '
  - type: text
    content: 'Take heed to yourselves: If thy brother trespass against thee, rebuke him; and if he repent, forgive him.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: Even thus shall it be in the day when the Son of man is revealed.
  '31':
  - type: text
    content: ' '
  - type: text
    content: 'In that day, he which shall be upon the housetop, and his stuff in the house, let him not come down to take it away: and he that is in the field, let him likewise not return back.'
  - type: text
    content: ' '
  '32':
  - type: text
    content: Remember Lot's wife.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Whosoever shall seek to save his life shall lose it; and whosoever shall lose his life shall preserve it.
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'I tell you, in that night there shall be two '
  - type: text
    content: men
  - type: text
    content: ' in one bed; the one shall be taken, and the other shall be left.'
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Two '
  - type: text
    content: women
  - type: text
    content: ' shall be grinding together; the one shall be taken, and the other left.'
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'Two '
  - type: text
    content: men
  - type: text
    content: ' shall be in the field; the one shall be taken, and the other left.'
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'And they answered and said unto him, Where, Lord? And he said unto them, '
  - type: text
    content: 'Wheresoever the body '
  - type: text
    content: is
  - type: text
    content: ', thither will the eagles be gathered together.'
  '4':
  - type: text
    content: And if he trespass against thee seven times in a day, and seven times in a day turn again to thee, saying, I repent; thou shalt forgive him.
  '5':
  - type: text
    content: 'And the apostles said unto the Lord, Increase our faith. '
  '6':
  - type: text
    content: 'And the Lord said, '
  - type: text
    content: If ye had faith as a grain of mustard seed, ye might say unto this sycamine tree, Be thou plucked up by the root, and be thou planted in the sea; and it should obey you.
  - type: text
    content: ' '
  '7':
  - type: text
    content: But which of you, having a servant plowing or feeding cattle, will say unto him by and by, when he is come from the field, Go and sit down to meat?
  - type: text
    content: ' '
  '8':
  - type: text
    content: And will not rather say unto him, Make ready wherewith I may sup, and gird thyself, and serve me, till I have eaten and drunken; and afterward thou shalt eat and drink?
  - type: text
    content: ' '
  '9':
  - type: text
    content: Doth he thank that servant because he did the things that were commanded him? I trow not.
  - type: text
    content: ' '
