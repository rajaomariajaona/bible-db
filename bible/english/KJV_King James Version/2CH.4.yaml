document_id: 2CH.4,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Temple Furniture
  - type: text
    content: Moreover he made an altar of brass, twenty cubits the length thereof, and twenty cubits the breadth thereof, and ten cubits the height thereof.
  '10':
  - type: text
    content: 'And he set the sea on the right side of the east end, over against the south. '
  '11':
  - type: text
    content: And Huram made the pots, and the shovels, and the basons.
  - type: text
    content: 'And Huram finished the work that he was to make for king Solomon for the house of God; '
  '12':
  - type: text
    content: to wit
  - type: text
    content: ', the two pillars, and the pommels, and the chapiters '
  - type: text
    content: which were
  - type: text
    content: ' on the top of the two pillars, and the two wreaths to cover the two pommels of the chapiters which '
  - type: text
    content: were
  - type: text
    content: ' on the top of the pillars; '
  '13':
  - type: text
    content: 'and four hundred pomegranates on the two wreaths; two rows of pomegranates on each wreath, to cover the two pommels of the chapiters which '
  - type: text
    content: were
  - type: text
    content: ' upon the pillars. '
  '14':
  - type: text
    content: 'He made also bases, and lavers made he upon the bases; '
  '15':
  - type: text
    content: 'one sea, and twelve oxen under it. '
  '16':
  - type: text
    content: 'The pots also, and the shovels, and the fleshhooks, and all their instruments, did Huram his father make to king Solomon for the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' of bright brass. '
  '17':
  - type: text
    content: In the plain of Jordan did the king cast them, in the clay ground between Succoth and Zeredathah.
  '18':
  - type: text
    content: 'Thus Solomon made all these vessels in great abundance: for the weight of the brass could not be found out. '
  '19':
  - type: text
    content: 'And Solomon made all the vessels that '
  - type: text
    content: were for
  - type: text
    content: ' the house of God, the golden altar also, and the tables whereon the shewbread '
  - type: text
    content: was set
  - type: text
    content: '; '
  '2':
  - type: text
    content: 'Also he made a molten sea of ten cubits from brim to brim, round in compass, and five cubits the height thereof; and a line of thirty cubits did compass it round about. '
  '20':
  - type: text
    content: 'moreover the candlesticks with their lamps, that they should burn after the manner before the oracle, of pure gold; '
  '21':
  - type: text
    content: 'and the flowers, and the lamps, and the tongs, '
  - type: text
    content: made he of
  - type: text
    content: ' gold, '
  - type: text
    content: and
  - type: text
    content: ' that perfect gold; '
  '22':
  - type: text
    content: 'and the snuffers, and the basons, and the spoons, and the censers, '
  - type: text
    content: of
  - type: text
    content: ' pure gold: and the entry of the house, the inner doors thereof for the most holy '
  - type: text
    content: place
  - type: text
    content: ', and the doors of the house of the temple, '
  - type: text
    content: were of
  - type: text
    content: ' gold.'
  '3':
  - type: text
    content: 'And under it '
  - type: text
    content: was
  - type: text
    content: ' the similitude of oxen, which did compass it round about: ten in a cubit, compassing the sea round about. Two rows of oxen '
  - type: text
    content: were
  - type: text
    content: ' cast, when it was cast. '
  '4':
  - type: text
    content: 'It stood upon twelve oxen, three looking toward the north, and three looking toward the west, and three looking toward the south, and three looking toward the east: and the sea '
  - type: text
    content: was set
  - type: text
    content: ' above upon them, and all their hinder parts '
  - type: text
    content: were inward
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'And the thickness of it '
  - type: text
    content: was
  - type: text
    content: ' an handbreadth, and the brim of it like the work of the brim of a cup, with flowers of lilies; '
  - type: text
    content: and
  - type: text
    content: ' it received and held three thousand baths. '
  '6':
  - type: text
    content: 'He made also ten lavers, and put five on the right hand, and five on the left, to wash in them: such things as they offered for the burnt offering they washed in them; but the sea '
  - type: text
    content: was
  - type: text
    content: ' for the priests to wash in.'
  '7':
  - type: text
    content: 'And he made ten candlesticks of gold according to their form, and set '
  - type: text
    content: them
  - type: text
    content: ' in the temple, five on the right hand, and five on the left. '
  '8':
  - type: text
    content: 'He made also ten tables, and placed '
  - type: text
    content: them
  - type: text
    content: ' in the temple, five on the right side, and five on the left. And he made an hundred basons of gold. '
  '9':
  - type: text
    content: 'Furthermore he made the court of the priests, and the great court, and doors for the court, and overlaid the doors of them with brass. '
