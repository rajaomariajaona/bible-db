document_id: 2CH.4
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Temple Furniture
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Moreover he made an altar of brass, twenty cubits the length thereof, and twenty cubits the breadth thereof, and ten cubits the height thereof.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Also he made a molten sea of ten cubits from brim to brim, round in compass, and five cubits the height thereof; and a line of thirty cubits did compass it round about. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And under it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the similitude of oxen, which did compass it round about: ten in a cubit, compassing the sea round about. Two rows of oxen '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' cast, when it was cast. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'It stood upon twelve oxen, three looking toward the north, and three looking toward the west, and three looking toward the south, and three looking toward the east: and the sea '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was set
  - type: text
    text: ' above upon them, and all their hinder parts '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were inward
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the thickness of it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' an handbreadth, and the brim of it like the work of the brim of a cup, with flowers of lilies; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' it received and held three thousand baths. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He made also ten lavers, and put five on the right hand, and five on the left, to wash in them: such things as they offered for the burnt offering they washed in them; but the sea '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' for the priests to wash in.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And he made ten candlesticks of gold according to their form, and set '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' in the temple, five on the right hand, and five on the left. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He made also ten tables, and placed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' in the temple, five on the right side, and five on the left. And he made an hundred basons of gold. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Furthermore he made the court of the priests, and the great court, and doors for the court, and overlaid the doors of them with brass. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And he set the sea on the right side of the east end, over against the south. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And Huram made the pots, and the shovels, and the basons.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And Huram finished the work that he was to make for king Solomon for the house of God; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: add
    children:
    - type: text
      text: to wit
  - type: text
    text: ', the two pillars, and the pommels, and the chapiters '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which were
  - type: text
    text: ' on the top of the two pillars, and the two wreaths to cover the two pommels of the chapiters which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' on the top of the pillars; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and four hundred pomegranates on the two wreaths; two rows of pomegranates on each wreath, to cover the two pommels of the chapiters which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' upon the pillars. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He made also bases, and lavers made he upon the bases; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'one sea, and twelve oxen under it. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The pots also, and the shovels, and the fleshhooks, and all their instruments, did Huram his father make to king Solomon for the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of bright brass. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: In the plain of Jordan did the king cast them, in the clay ground between Succoth and Zeredathah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Thus Solomon made all these vessels in great abundance: for the weight of the brass could not be found out. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And Solomon made all the vessels that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were for
  - type: text
    text: ' the house of God, the golden altar also, and the tables whereon the shewbread '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was set
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'moreover the candlesticks with their lamps, that they should burn after the manner before the oracle, of pure gold; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'and the flowers, and the lamps, and the tongs, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: made he of
  - type: text
    text: ' gold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' that perfect gold; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'and the snuffers, and the basons, and the spoons, and the censers, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' pure gold: and the entry of the house, the inner doors thereof for the most holy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: place
  - type: text
    text: ', and the doors of the house of the temple, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were of
  - type: text
    text: ' gold.'
