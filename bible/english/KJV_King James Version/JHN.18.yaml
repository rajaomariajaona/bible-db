verses:
  '1':
  - type: heading
    content: The Betrayal
  - type: text
    content: 'When Jesus had spoken these words, he went forth with his disciples over the brook Cedron, where was a garden, into the which he entered, and his disciples. '
  '10':
  - type: text
    content: 'Then Simon Peter having a sword drew it, and smote the high priest''s servant, and cut off his right ear. The servant''s name was Malchus. '
  '11':
  - type: text
    content: 'Then said Jesus unto Peter, '
  - type: text
    content: 'Put up thy sword into the sheath: the cup which my Father hath given me, shall I not drink it?'
  '12':
  - type: text
    content: 'Then the band and the captain and officers of the Jews took Jesus, and bound him, '
  '13':
  - type: text
    content: 'and led him away to Annas first; for he was father in law to Caiaphas, which was the high priest that same year. '
  '14':
  - type: text
    content: Now Caiaphas was he, which gave counsel to the Jews, that it was expedient that one man should die for the people.
  '15':
  - type: text
    content: 'And Simon Peter followed Jesus, and '
  - type: text
    content: so did
  - type: text
    content: ' another disciple: that disciple was known unto the high priest, and went in with Jesus into the palace of the high priest. '
  '16':
  - type: text
    content: But Peter stood at the door without. Then went out that other disciple, which was known unto the high priest, and spake unto her that kept the door, and brought in Peter.
  '17':
  - type: text
    content: 'Then saith the damsel that kept the door unto Peter, Art not thou also '
  - type: text
    content: one
  - type: text
    content: ' of this man''s disciples? He saith, I am not. '
  '18':
  - type: text
    content: 'And the servants and officers stood there, who had made a fire of coals; for it was cold: and they warmed themselves: and Peter stood with them, and warmed himself.'
  '19':
  - type: text
    content: 'The high priest then asked Jesus of his disciples, and of his doctrine. '
  '2':
  - type: text
    content: 'And Judas also, which betrayed him, knew the place: for Jesus ofttimes resorted thither with his disciples. '
  '20':
  - type: text
    content: 'Jesus answered him, '
  - type: text
    content: I spake openly to the world; I ever taught in the synagogue, and in the temple, whither the Jews always resort; and in secret have I said nothing.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'Why askest thou me? ask them which heard me, what I have said unto them: behold, they know what I said.'
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'And when he had thus spoken, one of the officers which stood by struck Jesus with the palm of his hand, saying, Answerest thou the high priest so? '
  '23':
  - type: text
    content: 'Jesus answered him, '
  - type: text
    content: 'If I have spoken evil, bear witness of the evil: but if well, why smitest thou me?'
  - type: text
    content: ' '
  '24':
  - type: text
    content: Now Annas had sent him bound unto Caiaphas the high priest.
  '25':
  - type: text
    content: 'And Simon Peter stood and warmed himself. They said therefore unto him, Art not thou also '
  - type: text
    content: one
  - type: text
    content: ' of his disciples? He denied '
  - type: text
    content: it
  - type: text
    content: ', and said, I am not. '
  '26':
  - type: text
    content: 'One of the servants of the high priest, being '
  - type: text
    content: his
  - type: text
    content: ' kinsman whose ear Peter cut off, saith, Did not I see thee in the garden with him? '
  '27':
  - type: text
    content: 'Peter then denied again: and immediately the cock crew.'
  - type: heading
    content: The Trial
  '28':
  - type: text
    content: 'Then led they Jesus from Caiaphas unto the hall of judgment: and it was early; and they themselves went not into the judgment hall, lest they should be defiled; but that they might eat the passover. '
  '29':
  - type: text
    content: 'Pilate then went out unto them, and said, What accusation bring ye against this man? '
  '3':
  - type: text
    content: 'Judas then, having received a band '
  - type: text
    content: of men
  - type: text
    content: ' and officers from the chief priests and Pharisees, cometh thither with lanterns and torches and weapons. '
  '30':
  - type: text
    content: 'They answered and said unto him, If he were not a malefactor, we would not have delivered him up unto thee. '
  '31':
  - type: text
    content: 'Then said Pilate unto them, Take ye him, and judge him according to your law. The Jews therefore said unto him, It is not lawful for us to put any man to death: '
  '32':
  - type: text
    content: that the saying of Jesus might be fulfilled, which he spake, signifying what death he should die.
  '33':
  - type: text
    content: 'Then Pilate entered into the judgment hall again, and called Jesus, and said unto him, Art thou the King of the Jews? '
  '34':
  - type: text
    content: 'Jesus answered him, '
  - type: text
    content: Sayest thou this thing of thyself, or did others tell it thee of me?
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Pilate answered, Am I a Jew? Thine own nation and the chief priests have delivered thee unto me: what hast thou done? '
  '36':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: 'My kingdom is not of this world: if my kingdom were of this world, then would my servants fight, that I should not be delivered to the Jews: but now is my kingdom not from hence.'
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'Pilate therefore said unto him, Art thou a king then? Jesus answered, '
  - type: text
    content: Thou sayest that I am a king. To this end was I born, and for this cause came I into the world, that I should bear witness unto the truth. Every one that is of the truth heareth my voice.
  - type: text
    content: ' '
  '38':
  - type: text
    content: Pilate saith unto him, What is truth?
  - type: text
    content: 'And when he had said this, he went out again unto the Jews, and saith unto them, I find in him no fault '
  - type: text
    content: at all
  - type: text
    content: '. '
  '39':
  - type: text
    content: 'But ye have a custom, that I should release unto you one at the passover: will ye therefore that I release unto you the King of the Jews? '
  '4':
  - type: text
    content: 'Jesus therefore, knowing all things that should come upon him, went forth, and said unto them, '
  - type: text
    content: Whom seek ye?
  - type: text
    content: ' '
  '40':
  - type: text
    content: Then cried they all again, saying, Not this man, but Barabbas. Now Barabbas was a robber.
  '5':
  - type: text
    content: 'They answered him, Jesus of Nazareth. Jesus saith unto them, '
  - type: text
    content: 'I am '
  - type: text
    content: he
  - type: text
    content: .
  - type: text
    content: ' And Judas also, which betrayed him, stood with them. '
  '6':
  - type: text
    content: 'As soon then as he had said unto them, I am '
  - type: text
    content: he
  - type: text
    content: ', they went backward, and fell to the ground. '
  '7':
  - type: text
    content: 'Then asked he them again, '
  - type: text
    content: Whom seek ye?
  - type: text
    content: ' And they said, Jesus of Nazareth. '
  '8':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: 'I have told you that I am '
  - type: text
    content: he
  - type: text
    content: ': if therefore ye seek me, let these go their way:'
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'that the saying might be fulfilled, which he spake, '
  - type: text
    content: Of them which thou gavest me have I lost none.
