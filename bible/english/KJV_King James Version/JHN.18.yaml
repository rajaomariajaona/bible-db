document_id: JHN.18
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Betrayal
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When Jesus had spoken these words, he went forth with his disciples over the brook Cedron, where was a garden, into the which he entered, and his disciples. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Judas also, which betrayed him, knew the place: for Jesus ofttimes resorted thither with his disciples. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Judas then, having received a band '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of men
  - type: text
    text: ' and officers from the chief priests and Pharisees, cometh thither with lanterns and torches and weapons. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jesus therefore, knowing all things that should come upon him, went forth, and said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Whom seek ye?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They answered him, Jesus of Nazareth. Jesus saith unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I am '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he
    - type: text
      text: .
  - type: text
    text: ' And Judas also, which betrayed him, stood with them. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'As soon then as he had said unto them, I am '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he
  - type: text
    text: ', they went backward, and fell to the ground. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then asked he them again, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Whom seek ye?
  - type: text
    text: ' And they said, Jesus of Nazareth. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I have told you that I am '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he
    - type: text
      text: ': if therefore ye seek me, let these go their way:'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'that the saying might be fulfilled, which he spake, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Of them which thou gavest me have I lost none.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Simon Peter having a sword drew it, and smote the high priest''s servant, and cut off his right ear. The servant''s name was Malchus. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then said Jesus unto Peter, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Put up thy sword into the sheath: the cup which my Father hath given me, shall I not drink it?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then the band and the captain and officers of the Jews took Jesus, and bound him, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and led him away to Annas first; for he was father in law to Caiaphas, which was the high priest that same year. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Now Caiaphas was he, which gave counsel to the Jews, that it was expedient that one man should die for the people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Simon Peter followed Jesus, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so did
  - type: text
    text: ' another disciple: that disciple was known unto the high priest, and went in with Jesus into the palace of the high priest. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But Peter stood at the door without. Then went out that other disciple, which was known unto the high priest, and spake unto her that kept the door, and brought in Peter.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then saith the damsel that kept the door unto Peter, Art not thou also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' of this man''s disciples? He saith, I am not. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And the servants and officers stood there, who had made a fire of coals; for it was cold: and they warmed themselves: and Peter stood with them, and warmed himself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The high priest then asked Jesus of his disciples, and of his doctrine. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jesus answered him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I spake openly to the world; I ever taught in the synagogue, and in the temple, whither the Jews always resort; and in secret have I said nothing.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Why askest thou me? ask them which heard me, what I have said unto them: behold, they know what I said.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And when he had thus spoken, one of the officers which stood by struck Jesus with the palm of his hand, saying, Answerest thou the high priest so? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jesus answered him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'If I have spoken evil, bear witness of the evil: but if well, why smitest thou me?'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Now Annas had sent him bound unto Caiaphas the high priest.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And Simon Peter stood and warmed himself. They said therefore unto him, Art not thou also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' of his disciples? He denied '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and said, I am not. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'One of the servants of the high priest, being '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' kinsman whose ear Peter cut off, saith, Did not I see thee in the garden with him? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Peter then denied again: and immediately the cock crew.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Trial
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then led they Jesus from Caiaphas unto the hall of judgment: and it was early; and they themselves went not into the judgment hall, lest they should be defiled; but that they might eat the passover. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Pilate then went out unto them, and said, What accusation bring ye against this man? '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'They answered and said unto him, If he were not a malefactor, we would not have delivered him up unto thee. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then said Pilate unto them, Take ye him, and judge him according to your law. The Jews therefore said unto him, It is not lawful for us to put any man to death: '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: that the saying of Jesus might be fulfilled, which he spake, signifying what death he should die.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Then Pilate entered into the judgment hall again, and called Jesus, and said unto him, Art thou the King of the Jews? '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jesus answered him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Sayest thou this thing of thyself, or did others tell it thee of me?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Pilate answered, Am I a Jew? Thine own nation and the chief priests have delivered thee unto me: what hast thou done? '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'My kingdom is not of this world: if my kingdom were of this world, then would my servants fight, that I should not be delivered to the Jews: but now is my kingdom not from hence.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Pilate therefore said unto him, Art thou a king then? Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Thou sayest that I am a king. To this end was I born, and for this cause came I into the world, that I should bear witness unto the truth. Every one that is of the truth heareth my voice.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Pilate saith unto him, What is truth?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And when he had said this, he went out again unto the Jews, and saith unto them, I find in him no fault '
  - type: usfm
    marker: add
    children:
    - type: text
      text: at all
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'But ye have a custom, that I should release unto you one at the passover: will ye therefore that I release unto you the King of the Jews? '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Then cried they all again, saying, Not this man, but Barabbas. Now Barabbas was a robber.
