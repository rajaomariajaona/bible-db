document_id: MAT.10,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Names of the Twelve
  - type: text
    content: 'And when he had called unto '
  - type: text
    content: him
  - type: text
    content: ' his twelve disciples, he gave them power '
  - type: text
    content: against
  - type: text
    content: ' unclean spirits, to cast them out, and to heal all manner of sickness and all manner of disease. '
  '10':
  - type: text
    content: 'nor scrip for '
  - type: text
    content: your
  - type: text
    content: ' journey, neither two coats, neither shoes, nor yet staves: for the workman is worthy of his meat.'
  - type: text
    content: ' '
  '11':
  - type: text
    content: And into whatsoever city or town ye shall enter, enquire who in it is worthy; and there abide till ye go thence.
  - type: text
    content: ' '
  '12':
  - type: text
    content: And when ye come into an house, salute it.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'And if the house be worthy, let your peace come upon it: but if it be not worthy, let your peace return to you.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: And whosoever shall not receive you, nor hear your words, when ye depart out of that house or city, shake off the dust of your feet.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Verily I say unto you, It shall be more tolerable for the land of Sodom and Gomorrha in the day of judgment, than for that city.
  '16':
  - type: text
    content: ' '
  - type: text
    content: 'Behold, I send you forth as sheep in the midst of wolves: be ye therefore wise as serpents, and harmless as doves.'
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'But beware of men: for they will deliver you up to the councils, and they will scourge you in their synagogues;'
  - type: text
    content: ' '
  '18':
  - type: text
    content: and ye shall be brought before governors and kings for my sake, for a testimony against them and the Gentiles.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'But when they deliver you up, take no thought how or what ye shall speak: for it shall be given you in that same hour what ye shall speak.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Now the names of the twelve apostles are these; The first, Simon, who is called Peter, and Andrew his brother; James '
  - type: text
    content: the son
  - type: text
    content: ' of Zebedee, and John his brother; '
  '20':
  - type: text
    content: For it is not ye that speak, but the Spirit of your Father which speaketh in you.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'And the brother shall deliver up the brother to death, and the father the child: and the children shall rise up against '
  - type: text
    content: their
  - type: text
    content: ' parents, and cause them to be put to death.'
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'And ye shall be hated of all '
  - type: text
    content: men
  - type: text
    content: ' for my name''s sake: but he that endureth to the end shall be saved.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'But when they persecute you in this city, flee ye into another: for verily I say unto you, Ye shall not have gone over the cities of Israel, till the Son of man be come.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'The disciple is not above '
  - type: text
    content: his
  - type: text
    content: ' master, nor the servant above his lord.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'It is enough for the disciple that he be as his master, and the servant as his lord. If they have called the master of the house Beelzebub, how much more '
  - type: text
    content: shall they call
  - type: text
    content: ' them of his household?'
  '26':
  - type: text
    content: ' '
  - type: text
    content: 'Fear them not therefore: for there is nothing covered, that shall not be revealed; and hid, that shall not be known.'
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'What I tell you in darkness, '
  - type: text
    content: that
  - type: text
    content: ' speak ye in light: and what ye hear in the ear, '
  - type: text
    content: that
  - type: text
    content: ' preach ye upon the housetops.'
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'And fear not them which kill the body, but are not able to kill the soul: but rather fear him which is able to destroy both soul and body in hell.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: Are not two sparrows sold for a farthing? and one of them shall not fall on the ground without your Father.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Philip, and Bartholomew; Thomas, and Matthew the publican; James '
  - type: text
    content: the son
  - type: text
    content: ' of Alphæus, and Lebbæus, whose surname was Thaddæus; '
  '30':
  - type: text
    content: But the very hairs of your head are all numbered.
  - type: text
    content: ' '
  '31':
  - type: text
    content: Fear ye not therefore, ye are of more value than many sparrows.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Whosoever therefore shall confess me before men, him will I confess also before my Father which is in heaven.
  - type: text
    content: ' '
  '33':
  - type: text
    content: But whosoever shall deny me before men, him will I also deny before my Father which is in heaven.
  '34':
  - type: text
    content: ' '
  - type: text
    content: 'Think not that I am come to send peace on earth: I came not to send peace, but a sword.'
  - type: text
    content: ' '
  '35':
  - type: text
    content: For I am come to set a man at variance against his father, and the daughter against her mother, and the daughter in law against her mother in law.
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'And a man''s foes '
  - type: text
    content: shall be
  - type: text
    content: ' they of his own household.'
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'He that loveth father or mother more than me is not worthy of me: and he that loveth son or daughter more than me is not worthy of me.'
  - type: text
    content: ' '
  '38':
  - type: text
    content: And he that taketh not his cross, and followeth after me, is not worthy of me.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'He that findeth his life shall lose it: and he that loseth his life for my sake shall find it.'
  '4':
  - type: text
    content: Simon the Canaanite, and Judas Iscariot, who also betrayed him.
  - type: heading
    content: Their Work Outlined
  '40':
  - type: text
    content: ' '
  - type: text
    content: He that receiveth you receiveth me, and he that receiveth me receiveth him that sent me.
  - type: text
    content: ' '
  '41':
  - type: text
    content: He that receiveth a prophet in the name of a prophet shall receive a prophet's reward; and he that receiveth a righteous man in the name of a righteous man shall receive a righteous man's reward.
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'And whosoever shall give to drink unto one of these little ones a cup of cold '
  - type: text
    content: water
  - type: text
    content: ' only in the name of a disciple, verily I say unto you, he shall in no wise lose his reward.'
  '5':
  - type: text
    content: 'These twelve Jesus sent forth, and commanded them, saying, '
  - type: text
    content: 'Go not into the way of the Gentiles, and into '
  - type: text
    content: any
  - type: text
    content: ' city of the Samaritans enter ye not:'
  - type: text
    content: ' '
  '6':
  - type: text
    content: but go rather to the lost sheep of the house of Israel.
  - type: text
    content: ' '
  '7':
  - type: text
    content: And as ye go, preach, saying, The kingdom of heaven is at hand.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Heal the sick, cleanse the lepers, raise the dead, cast out devils: freely ye have received, freely give.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: Provide neither gold, nor silver, nor brass in your purses,
  - type: text
    content: ' '
