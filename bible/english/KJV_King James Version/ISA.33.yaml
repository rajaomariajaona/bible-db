  - type: text
    content: shall be
  - type: text
    content: ' sure.'
  '17':
  - type: text
    content: 'Thine eyes shall see the king in his beauty: they shall behold the land that is very far off. '
  '18':
  - type: text
    content: 'Thine heart shall meditate terror. Where '
  - type: text
    content: is
  - type: text
    content: ' the scribe? where '
  - type: text
    content: is
  - type: text
    content: ' the receiver? where '
  - type: text
    content: is
  - type: text
    content: ' he that counted the towers? '
  '19':
  - type: text
    content: 'Thou shalt not see a fierce people, a people of a deeper speech than thou canst perceive; of a stammering tongue, '
  - type: text
    content: that thou canst
  - type: text
    content: ' not understand. '
  '2':
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ', be gracious unto us; we have waited for thee: be thou their arm every morning, our salvation also in the time of trouble.'
  '20':
  - type: text
    content: 'Look upon Zion, the city of our solemnities: thine eyes shall see Jerusalem a quiet habitation, a tabernacle '
  - type: text
    content: that
  - type: text
    content: ' shall not be taken down; not one of the stakes thereof shall ever be removed, neither shall any of the cords thereof be broken. '
  '21':
  - type: text
    content: 'But there the glorious '
  - type: text
