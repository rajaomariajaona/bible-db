  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' his treasure.'
  '7':
  - type: text
    content: 'Behold, their valiant ones shall cry without: the ambassadors of peace shall weep bitterly. '
  '8':
  - type: text
    content: 'The highways lie waste, the wayfaring man ceaseth: he hath broken the covenant, he hath despised the cities, he regardeth no man. '
