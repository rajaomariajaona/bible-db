  - type: text
    content: ' iniquity.'
  '3':
  - type: text
    content: 'At the noise of the tumult the people fled; at the lifting up of thyself the nations were scattered. '
  '4':
  - type: text
    content: 'And your spoil shall be gathered '
  - type: text
    content: like
  - type: text
    content: ' the gathering of the caterpiller: as the running to and fro of locusts shall he run upon them.'
  '5':
  - type: text
    content: 'The '
