  '23':
  - type: text
    content: 'Thy tacklings are loosed; they could not well strengthen their mast, they could not spread the sail: then is the prey of a great spoil divided; the lame take the prey. '
  '24':
  - type: text
    content: 'And the inhabitant shall not say, I am sick: the people that dwell therein '
  - type: text
