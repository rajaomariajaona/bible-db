  '14':
  - type: text
    content: 'The sinners in Zion are afraid; fearfulness hath surprised the hypocrites. Who among us shall dwell with the devouring fire? who among us shall dwell with everlasting burnings? '
  '15':
  - type: text
    content: 'He that walketh righteously, and speaketh uprightly; he that despiseth the gain of oppressions, that shaketh his hands from holding of bribes, that stoppeth his ears from hearing of blood, and shutteth his eyes from seeing evil; '
  '16':
  - type: text
    content: 'he shall dwell on high: his place of defence '
  - type: text
    content: shall be
  - type: text
