document_id: ISA.33,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Woe to thee that spoilest, and thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: wast
    - type: text
      text: ' not spoiled; and dealest treacherously, and they dealt not treacherously with thee! when thou shalt cease to spoil, thou shalt be spoiled; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' when thou shalt make an end to deal treacherously, they shall deal treacherously with thee. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now will I rise, saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; now will I be exalted; now will I lift up myself. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ye shall conceive chaff, ye shall bring forth stubble: your breath, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' fire, shall devour you. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people shall be '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' the burnings of lime: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' thorns cut up shall they be burned in the fire.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hear, ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that are
    - type: text
      text: ' far off, what I have done; and, ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that are
    - type: text
      text: ' near, acknowledge my might. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sinners in Zion are afraid; fearfulness hath surprised the hypocrites. Who among us shall dwell with the devouring fire? who among us shall dwell with everlasting burnings? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He that walketh righteously, and speaketh uprightly; he that despiseth the gain of oppressions, that shaketh his hands from holding of bribes, that stoppeth his ears from hearing of blood, and shutteth his eyes from seeing evil; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'he shall dwell on high: his place of defence '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' the munitions of rocks: bread shall be given him; his waters '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' sure.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thine eyes shall see the king in his beauty: they shall behold the land that is very far off. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thine heart shall meditate terror. Where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the scribe? where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the receiver? where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' he that counted the towers? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thou shalt not see a fierce people, a people of a deeper speech than thou canst perceive; of a stammering tongue, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that thou canst
    - type: text
      text: ' not understand. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', be gracious unto us; we have waited for thee: be thou their arm every morning, our salvation also in the time of trouble.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Look upon Zion, the city of our solemnities: thine eyes shall see Jerusalem a quiet habitation, a tabernacle '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' shall not be taken down; not one of the stakes thereof shall ever be removed, neither shall any of the cords thereof be broken. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But there the glorious '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: will be
    - type: text
      text: ' unto us a place of broad rivers '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' streams; wherein shall go no galley with oars, neither shall gallant ship pass thereby. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' our judge, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' our lawgiver, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' our king; he will save us. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thy tacklings are loosed; they could not well strengthen their mast, they could not spread the sail: then is the prey of a great spoil divided; the lame take the prey. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the inhabitant shall not say, I am sick: the people that dwell therein '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' forgiven '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' iniquity.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At the noise of the tumult the people fled; at the lifting up of thyself the nations were scattered. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And your spoil shall be gathered '
    - type: usfm
      marker: add
      children:
      - type: text
        text: like
    - type: text
      text: ' the gathering of the caterpiller: as the running to and fro of locusts shall he run upon them.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' is exalted; for he dwelleth on high: he hath filled Zion with judgment and righteousness. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And wisdom and knowledge shall be the stability of thy times, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' strength of salvation: the fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' his treasure.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, their valiant ones shall cry without: the ambassadors of peace shall weep bitterly. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The highways lie waste, the wayfaring man ceaseth: he hath broken the covenant, he hath despised the cities, he regardeth no man. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The earth mourneth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' languisheth: Lebanon is ashamed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' hewn down: Sharon is like a wilderness; and Bashan and Carmel shake off '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their fruits
    - type: text
      text: .
