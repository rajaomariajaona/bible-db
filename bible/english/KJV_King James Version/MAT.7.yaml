document_id: MAT.7,1
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: Judge not, that ye be not judged.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Or if he ask a fish, will he give him a serpent?
  - type: text
    content: ' '
  '11':
  - type: text
    content: If ye then, being evil, know how to give good gifts unto your children, how much more shall your Father which is in heaven give good things to them that ask him?
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Therefore all things whatsoever ye would that men should do to you, do ye even so to them: for this is the law and the prophets.'
  '13':
  - type: text
    content: ' '
  - type: text
    content: 'Enter ye in at the strait gate: for wide '
  - type: text
    content: is
  - type: text
    content: ' the gate, and broad '
  - type: text
    content: is
  - type: text
    content: ' the way, that leadeth to destruction, and many there be which go in thereat:'
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'because strait '
  - type: text
    content: is
  - type: text
    content: ' the gate, and narrow '
  - type: text
    content: is
  - type: text
    content: ' the way, which leadeth unto life, and few there be that find it.'
  '15':
  - type: text
    content: ' '
  - type: text
    content: Beware of false prophets, which come to you in sheep's clothing, but inwardly they are ravening wolves.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Ye shall know them by their fruits. Do men gather grapes of thorns, or figs of thistles?
  - type: text
    content: ' '
  '17':
  - type: text
    content: Even so every good tree bringeth forth good fruit; but a corrupt tree bringeth forth evil fruit.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'A good tree cannot bring forth evil fruit, neither '
  - type: text
    content: can
  - type: text
    content: ' a corrupt tree bring forth good fruit.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: Every tree that bringeth not forth good fruit is hewn down, and cast into the fire.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'For with what judgment ye judge, ye shall be judged: and with what measure ye mete, it shall be measured to you again.'
  - type: text
    content: ' '
  '20':
  - type: text
    content: Wherefore by their fruits ye shall know them.
  '21':
  - type: text
    content: ' '
  - type: text
    content: Not every one that saith unto me, Lord, Lord, shall enter into the kingdom of heaven; but he that doeth the will of my Father which is in heaven.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Many will say to me in that day, Lord, Lord, have we not prophesied in thy name? and in thy name have cast out devils? and in thy name done many wonderful works?
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'And then will I profess unto them, I never knew you: depart from me, ye that work iniquity.'
  '24':
  - type: text
    content: ' '
  - type: text
    content: 'Therefore whosoever heareth these sayings of mine, and doeth them, I will liken him unto a wise man, which built his house upon a rock:'
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'and the rain descended, and the floods came, and the winds blew, and beat upon that house; and it fell not: for it was founded upon a rock.'
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'And every one that heareth these sayings of mine, and doeth them not, shall be likened unto a foolish man, which built his house upon the sand:'
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'and the rain descended, and the floods came, and the winds blew, and beat upon that house; and it fell: and great was the fall of it.'
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'And it came to pass, when Jesus had ended these sayings, the people were astonished at his doctrine: '
  '29':
  - type: text
    content: 'For he taught them as '
  - type: text
    content: one
  - type: text
    content: ' having authority, and not as the scribes.'
  '3':
  - type: text
    content: And why beholdest thou the mote that is in thy brother's eye, but considerest not the beam that is in thine own eye?
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Or how wilt thou say to thy brother, Let me pull out the mote out of thine eye; and, behold, a beam '
  - type: text
    content: is
  - type: text
    content: ' in thine own eye?'
  - type: text
    content: ' '
  '5':
  - type: text
    content: Thou hypocrite, first cast out the beam out of thine own eye; and then shalt thou see clearly to cast out the mote out of thy brother's eye.
  '6':
  - type: text
    content: ' '
  - type: text
    content: Give not that which is holy unto the dogs, neither cast ye your pearls before swine, lest they trample them under their feet, and turn again and rend you.
  '7':
  - type: text
    content: ' '
  - type: text
    content: 'Ask, and it shall be given you; seek, and ye shall find; knock, and it shall be opened unto you:'
  - type: text
    content: ' '
  '8':
  - type: text
    content: for every one that asketh receiveth; and he that seeketh findeth; and to him that knocketh it shall be opened.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Or what man is there of you, whom if his son ask bread, will he give him a stone?
  - type: text
    content: ' '
