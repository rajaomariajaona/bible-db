  '1':
  - type: text
    content: To the chief Musician, A Psalm of David.
  - type: text
    content: 'In thee, O '
  - type: text
    content: LORD
  - type: text
    content: ', do I put my trust;'
  - type: text
    content: 'Let me never be ashamed: deliver me in thy righteousness.'
  '10':
  - type: text
    content: For my life is spent with grief,
  - type: text
    content: 'And my years with sighing:'
  - type: text
    content: My strength faileth because of mine iniquity,
  - type: text
    content: And my bones are consumed.
  '11':
  - type: text
    content: I was a reproach among all mine enemies, but especially among my neighbours,
  - type: text
    content: 'And a fear to mine acquaintance: they that did see me without fled from me.'
  '12':
  - type: text
    content: 'I am forgotten as a dead man out of mind:'
  - type: text
    content: I am like a broken vessel.
  '13':
  - type: text
    content: 'For I have heard the slander of many:'
  - type: text
    content: 'Fear '
  - type: text
    content: was
  - type: text
    content: ' on every side: while they took counsel together against me, They devised to take away my life.'
  '14':
  - type: text
    content: 'But I trusted in thee, O '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: 'I said, Thou '
  - type: text
    content: art
  - type: text
    content: ' my God.'
  '15':
  - type: text
    content: 'My times '
  - type: text
    content: are
  - type: text
    content: ' in thy hand:'
  - type: text
    content: Deliver me from the hand of mine enemies, and from them that persecute me.
  '16':
  - type: text
    content: 'Make thy face to shine upon thy servant:'
  - type: text
    content: Save me for thy mercies' sake.
  '17':
  - type: text
    content: 'Let me not be ashamed, O '
  - type: text
    content: LORD
  - type: text
    content: '; for I have called upon thee:'
  - type: text
    content: 'Let the wicked be ashamed, '
  - type: text
    content: and
  - type: text
    content: ' let them be silent in the grave.'
  '18':
  - type: text
    content: Let the lying lips be put to silence;
  - type: text
    content: Which speak grievous things proudly and contemptuously against the righteous.
  '19':
  - type: text
    content: ' '
  - type: text
    content: Oh
  - type: text
    content: ' how great '
  - type: text
    content: is
  - type: text
    content: ' thy goodness, which thou hast laid up for them that fear thee;'
  - type: text
    content: Which
  - type: text
    content: ' thou hast wrought for them that trust in thee before the sons of men!'
  '2':
  - type: text
    content: 'Bow down thine ear to me; deliver me speedily:'
  - type: text
    content: Be thou my strong rock, for an house of defence to save me.
  '20':
  - type: text
    content: 'Thou shalt hide them in the secret of thy presence from the pride of man:'
  - type: text
    content: Thou shalt keep them secretly in a pavilion from the strife of tongues.
  '21':
  - type: text
    content: 'Blessed '
  - type: text
    content: be
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: For he hath shewed me his marvellous kindness in a strong city.
  '22':
  - type: text
    content: For I said in my haste,
  - type: text
    content: 'I am cut off from before thine eyes:'
  - type: text
    content: Nevertheless thou heardest the voice of
  - type: text
    content: My supplications when I cried unto thee.
  '23':
  - type: text
    content: 'O love the '
  - type: text
    content: LORD
  - type: text
    content: ', all ye his saints:'
  - type: text
    content: For
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' preserveth the faithful, and plentifully rewardeth the proud doer.'
  '24':
  - type: text
    content: Be of good courage, and he shall strengthen your heart,
  - type: text
    content: 'All ye that hope in the '
  - type: text
    content: LORD
  - type: text
    content: .
  '3':
  - type: text
    content: 'For thou '
  - type: text
    content: art
  - type: text
    content: ' my rock and my fortress;'
  - type: text
    content: Therefore for thy name's sake lead me, and guide me.
  '4':
  - type: text
    content: 'Pull me out of the net that they have laid privily for me:'
  - type: text
    content: 'For thou '
  - type: text
    content: art
  - type: text
    content: ' my strength.'
  '5':
  - type: text
    content: 'Into thine hand I commit my spirit:'
  - type: text
    content: 'Thou hast redeemed me, O '
  - type: text
    content: LORD
  - type: text
    content: ' God of truth.'
  '6':
  - type: text
    content: 'I have hated them that regard lying vanities:'
  - type: text
    content: 'But I trust in the '
  - type: text
    content: LORD
  - type: text
    content: .
  '7':
  - type: text
    content: 'I will be glad and rejoice in thy mercy:'
  - type: text
    content: For thou hast considered my trouble; thou hast known my soul in adversities;
  '8':
  - type: text
    content: 'And hast not shut me up into the hand of the enemy:'
  - type: text
    content: Thou hast set my feet in a large room.
  '9':
  - type: text
    content: 'Have mercy upon me, O '
  - type: text
    content: LORD
  - type: text
    content: ', for I am in trouble:'
  - type: text
    content: 'Mine eye is consumed with grief, '
  - type: text
    content: yea
  - type: text
    content: ', my soul and my belly.'
