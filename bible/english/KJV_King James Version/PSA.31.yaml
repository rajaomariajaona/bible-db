document_id: PSA.31,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the chief Musician, A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In thee, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', do I put my trust;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Let me never be ashamed: deliver me in thy righteousness.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: For my life is spent with grief,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And my years with sighing:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My strength faileth because of mine iniquity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my bones are consumed.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: I was a reproach among all mine enemies, but especially among my neighbours,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And a fear to mine acquaintance: they that did see me without fled from me.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'I am forgotten as a dead man out of mind:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am like a broken vessel.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'For I have heard the slander of many:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Fear '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' on every side: while they took counsel together against me, They devised to take away my life.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But I trusted in thee, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ':'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I said, Thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' my God.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'My times '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in thy hand:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Deliver me from the hand of mine enemies, and from them that persecute me.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Make thy face to shine upon thy servant:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Save me for thy mercies' sake.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Let me not be ashamed, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; for I have called upon thee:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Let the wicked be ashamed, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' let them be silent in the grave.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Let the lying lips be put to silence;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Which speak grievous things proudly and contemptuously against the righteous.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Oh
    - type: text
      text: ' how great '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy goodness, which thou hast laid up for them that fear thee;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Which
    - type: text
      text: ' thou hast wrought for them that trust in thee before the sons of men!'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Bow down thine ear to me; deliver me speedily:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Be thou my strong rock, for an house of defence to save me.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Thou shalt hide them in the secret of thy presence from the pride of man:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou shalt keep them secretly in a pavilion from the strife of tongues.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ':'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For he hath shewed me his marvellous kindness in a strong city.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: For I said in my haste,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I am cut off from before thine eyes:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nevertheless thou heardest the voice of
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My supplications when I cried unto thee.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'O love the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', all ye his saints:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: For
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' preserveth the faithful, and plentifully rewardeth the proud doer.'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Be of good courage, and he shall strengthen your heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'All ye that hope in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' my rock and my fortress;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore for thy name's sake lead me, and guide me.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Pull me out of the net that they have laid privily for me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' my strength.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Into thine hand I commit my spirit:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Thou hast redeemed me, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of truth.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'I have hated them that regard lying vanities:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But I trust in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'I will be glad and rejoice in thy mercy:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For thou hast considered my trouble; thou hast known my soul in adversities;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And hast not shut me up into the hand of the enemy:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou hast set my feet in a large room.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Have mercy upon me, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', for I am in trouble:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Mine eye is consumed with grief, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yea
    - type: text
      text: ', my soul and my belly.'
