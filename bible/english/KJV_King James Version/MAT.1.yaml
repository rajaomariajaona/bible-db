document_id: MAT.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The book of the generation of Jesus Christ, the son of David, the son of Abraham.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Abraham begat Isaac; and Isaac begat Jacob; and Jacob begat Judas and his brethren; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and Judas begat Phares and Zara of Thamar; and Phares begat Esrom; and Esrom begat Aram; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and Aram begat Aminadab; and Aminadab begat Naasson; and Naasson begat Salmon; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and Salmon begat Booz of Rachab; and Booz begat Obed of Ruth; and Obed begat Jesse; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and Jesse begat David the king; and David the king begat Solomon of her '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that had been the wife
  - type: text
    text: ' of Urias; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and Solomon begat Roboam; and Roboam begat Abia; and Abia begat Asa; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and Asa begat Josaphat; and Josaphat begat Joram; and Joram begat Ozias; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and Ozias begat Joatham; and Joatham begat Achaz; and Achaz begat Ezekias; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and Ezekias begat Manasses; and Manasses begat Amon; and Amon begat Josias; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and Josias begat Jechonias and his brethren, about the time they were carried away to Babylon: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and after they were brought to Babylon, Jechonias begat Salathiel; and Salathiel begat Zorobabel; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and Zorobabel begat Abiud; and Abiud begat Eliakim; and Eliakim begat Azor; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and Azor begat Sadoc; and Sadoc begat Achim; and Achim begat Eliud; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and Eliud begat Eleazar; and Eleazar begat Matthan; and Matthan begat Jacob; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: and Jacob begat Joseph the husband of Mary, of whom was born Jesus, who is called Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So all the generations from Abraham to David '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' fourteen generations; and from David until the carrying away into Babylon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' fourteen generations; and from the carrying away into Babylon unto Christ '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' fourteen generations.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Birth of Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Now the birth of Jesus Christ was on this wise: When as his mother Mary was espoused to Joseph, before they came together, she was found with child of the Holy Ghost. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then Joseph her husband, being a just '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ', and not willing to make her a publick example, was minded to put her away privily. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But while he thought on these things, behold, the angel of the Lord appeared unto him in a dream, saying, Joseph, thou son of David, fear not to take unto thee Mary thy wife: for that which is conceived in her is of the Holy Ghost. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And she shall bring forth a son, and thou shalt call his name JESUS: for he shall save his people from their sins. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Now all this was done, that it might be fulfilled which was spoken of the Lord by the prophet, saying,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Behold, a virgin shall be with child, and shall bring forth a son,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they shall call his name Emmanuel,
- type: usfm
  marker: m
  children:
  - type: text
    text: 'which being interpreted is, God with us. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then Joseph being raised from sleep did as the angel of the Lord had bidden him, and took unto him his wife: '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'and knew her not till she had brought forth her firstborn son: and he called his name JESUS.'
