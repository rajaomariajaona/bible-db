document_id: MIC.2
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: To Men in Power
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Woe to them that devise iniquity, and work evil upon their beds! when the morning is light, they practise it, because it is in the power of their hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And they covet fields, and take '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' by violence; and houses, and take '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' away: so they oppress a man and his house, even a man and his heritage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Therefore thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; Behold, against this family do I devise an evil, from which ye shall not remove your necks; neither shall ye go haughtily: for this time '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' evil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'In that day shall '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' take up a parable against you, and lament with a doleful lamentation, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' say, We be utterly spoiled: he hath changed the portion of my people: how hath he removed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' from me! turning away he hath divided our fields. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Therefore thou shalt have none that shall cast a cord by lot in the congregation of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Prophesy ye not, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: say they to them that
  - type: text
    text: ' prophesy: they shall not prophesy to them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' they shall not take shame.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'O '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thou that art
  - type: text
    text: ' named the house of Jacob, is the spirit of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' straitened? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' these his doings? do not my words do good to him that walketh uprightly? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Even of late my people is risen up as an enemy: ye pull off the robe with the garment from them that pass by securely as men averse from war. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The women of my people have ye cast out from their pleasant houses; from their children have ye taken away my glory for ever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Arise ye, and depart; for this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: your
  - type: text
    text: ' rest: because it is polluted, it shall destroy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: ', even with a sore destruction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'If a man walking in the spirit and falsehood do lie, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saying
  - type: text
    text: ', I will prophesy unto thee of wine and of strong drink; he shall even be the prophet of this people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I will surely assemble, O Jacob, all of thee; I will surely gather the remnant of Israel; I will put them together as the sheep of Bozrah, as the flock in the midst of their fold: they shall make great noise by reason of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the multitude of
  - type: text
    text: ' men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The breaker is come up before them: they have broken up, and have passed through the gate, and are gone out by it: and their king shall pass before them, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' on the head of them.'
