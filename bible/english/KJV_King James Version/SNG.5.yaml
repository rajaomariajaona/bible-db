document_id: SNG.5,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'I am come into my garden, my sister, '
  - type: text
    content: my
  - type: text
    content: ' spouse:'
  - type: text
    content: I have gathered my myrrh with my spice;
  - type: text
    content: I have eaten my honeycomb with my honey;
  - type: text
    content: 'I have drunk my wine with my milk:'
  - type: text
    content: Eat, O friends;
  - type: text
    content: Drink, yea, drink abundantly, O beloved.
  '10':
  - type: text
    content: 'My beloved '
  - type: text
    content: is
  - type: text
    content: ' white and ruddy,'
  - type: text
    content: The chiefest among ten thousand.
  '11':
  - type: text
    content: 'His head '
  - type: text
    content: is as
  - type: text
    content: ' the most fine gold,'
  - type: text
    content: 'His locks '
  - type: text
    content: are
  - type: text
    content: ' bushy,'
  - type: text
    content: And
  - type: text
    content: ' black as a raven.'
  '12':
  - type: text
    content: 'His eyes '
  - type: text
    content: are
  - type: text
    content: ' as '
  - type: text
    content: the eyes
  - type: text
    content: ' of doves by the rivers of waters,'
  - type: text
    content: 'Washed with milk, '
  - type: text
    content: and
  - type: text
    content: ' fitly set.'
  '13':
  - type: text
    content: 'His cheeks '
  - type: text
    content: are
  - type: text
    content: ' as a bed of spices, '
  - type: text
    content: as
  - type: text
    content: ' sweet flowers:'
  - type: text
    content: 'His lips '
  - type: text
    content: like
  - type: text
    content: ' lilies, dropping sweet smelling myrrh.'
  '14':
  - type: text
    content: 'His hands '
  - type: text
    content: are as
  - type: text
    content: ' gold rings set with the beryl:'
  - type: text
    content: 'His belly '
  - type: text
    content: is as
  - type: text
    content: ' bright ivory overlaid '
  - type: text
    content: with
  - type: text
    content: ' sapphires.'
  '15':
  - type: text
    content: 'His legs '
  - type: text
    content: are as
  - type: text
    content: ' pillars of marble, set upon sockets of fine gold:'
  - type: text
    content: 'His countenance '
  - type: text
    content: is
  - type: text
    content: ' as Lebanon, excellent as the cedars.'
  '16':
  - type: text
    content: 'His mouth '
  - type: text
    content: is
  - type: text
    content: ' most sweet:'
  - type: text
    content: 'Yea, he '
  - type: text
    content: is
  - type: text
    content: ' altogether lovely.'
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' my beloved, and this '
  - type: text
    content: is
  - type: text
    content: ' my friend,'
  - type: text
    content: O daughters of Jerusalem.
  '2':
  - type: text
    content: 'I sleep, but my heart waketh:'
  - type: text
    content: It is
  - type: text
    content: ' the voice of my beloved that knocketh, '
  - type: text
    content: saying
  - type: text
    content: ','
  - type: text
    content: Open to me, my sister, my love,
  - type: text
    content: 'My dove, my undefiled:'
  - type: text
    content: For my head is filled with dew,
  - type: text
    content: And
  - type: text
    content: ' my locks with the drops of the night.'
  '3':
  - type: text
    content: I have put off my coat;
  - type: text
    content: How shall I put it on?
  - type: text
    content: I have washed my feet;
  - type: text
    content: How shall I defile them?
  '4':
  - type: text
    content: 'My beloved put in his hand by the hole '
  - type: text
    content: of the door
  - type: text
    content: ','
  - type: text
    content: And my bowels were moved for him.
  '5':
  - type: text
    content: I rose up to open to my beloved;
  - type: text
    content: 'And my hands dropped '
  - type: text
    content: with
  - type: text
    content: ' myrrh,'
  - type: text
    content: 'And my fingers '
  - type: text
    content: with
  - type: text
    content: ' sweet smelling myrrh,'
  - type: text
    content: Upon the handles of the lock.
  '6':
  - type: text
    content: I opened to my beloved;
  - type: text
    content: 'But my beloved had withdrawn himself, '
  - type: text
    content: and
  - type: text
    content: ' was gone:'
  - type: text
    content: 'My soul failed when he spake:'
  - type: text
    content: I sought him, but I could not find him;
  - type: text
    content: I called him, but he gave me no answer.
  '7':
  - type: text
    content: The watchmen that went about the city found me,
  - type: text
    content: They smote me, they wounded me;
  - type: text
    content: The keepers of the walls took away my veil from me.
  '8':
  - type: text
    content: I charge you, O daughters of Jerusalem,
  - type: text
    content: If ye find my beloved,
  - type: text
    content: That ye tell him,
  - type: text
    content: 'that I '
  - type: text
    content: am
  - type: text
    content: ' sick of love.'
  '9':
  - type: text
    content: 'What '
  - type: text
    content: is
  - type: text
    content: ' thy beloved more than '
  - type: text
    content: another
  - type: text
    content: ' beloved,'
  - type: text
    content: O thou fairest among women?
  - type: text
    content: 'What '
  - type: text
    content: is
  - type: text
    content: ' thy beloved more than '
  - type: text
    content: another
  - type: text
    content: ' beloved,'
  - type: text
    content: That thou dost so charge us?
