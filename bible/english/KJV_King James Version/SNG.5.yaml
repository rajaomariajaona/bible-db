document_id: SNG.5,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I am come into my garden, my sister, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: my
    - type: text
      text: ' spouse:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have gathered my myrrh with my spice;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have eaten my honeycomb with my honey;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I have drunk my wine with my milk:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eat, O friends;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Drink, yea, drink abundantly, O beloved.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My beloved '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' white and ruddy,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The chiefest among ten thousand.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'His head '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is as
    - type: text
      text: ' the most fine gold,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'His locks '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' bushy,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' black as a raven.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'His eyes '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the eyes
    - type: text
      text: ' of doves by the rivers of waters,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Washed with milk, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' fitly set.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'His cheeks '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' as a bed of spices, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' sweet flowers:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'His lips '
    - type: usfm
      marker: add
      children:
      - type: text
        text: like
    - type: text
      text: ' lilies, dropping sweet smelling myrrh.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'His hands '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are as
    - type: text
      text: ' gold rings set with the beryl:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'His belly '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is as
    - type: text
      text: ' bright ivory overlaid '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' sapphires.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'His legs '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are as
    - type: text
      text: ' pillars of marble, set upon sockets of fine gold:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'His countenance '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' as Lebanon, excellent as the cedars.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'His mouth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' most sweet:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yea, he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' altogether lovely.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my beloved, and this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my friend,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O daughters of Jerusalem.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I sleep, but my heart waketh:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' the voice of my beloved that knocketh, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: saying
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Open to me, my sister, my love,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'My dove, my undefiled:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For my head is filled with dew,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' my locks with the drops of the night.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have put off my coat;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How shall I put it on?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have washed my feet;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How shall I defile them?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My beloved put in his hand by the hole '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of the door
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And my bowels were moved for him.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I rose up to open to my beloved;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And my hands dropped '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' myrrh,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And my fingers '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' sweet smelling myrrh,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Upon the handles of the lock.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I opened to my beloved;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But my beloved had withdrawn himself, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' was gone:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My soul failed when he spake:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I sought him, but I could not find him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I called him, but he gave me no answer.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The watchmen that went about the city found me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They smote me, they wounded me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The keepers of the walls took away my veil from me.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I charge you, O daughters of Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If ye find my beloved,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That ye tell him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' sick of love.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy beloved more than '
    - type: usfm
      marker: add
      children:
      - type: text
        text: another
    - type: text
      text: ' beloved,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O thou fairest among women?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy beloved more than '
    - type: usfm
      marker: add
      children:
      - type: text
        text: another
    - type: text
      text: ' beloved,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That thou dost so charge us?
