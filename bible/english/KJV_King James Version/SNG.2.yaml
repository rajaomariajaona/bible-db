- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the rose of Sharon,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' the lily of the valleys.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: As the lily among thorns,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'So '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my love among the daughters.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: As the apple tree among the trees of the wood,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'So '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my beloved among the sons.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I sat down under his shadow with great delight,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And his fruit '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' sweet to my taste.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He brought me to the banqueting house,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And his banner over me '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' love.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Stay me with flagons,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Comfort me with apples:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' sick of love.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'His left hand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' under my head,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And his right hand doth embrace me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I charge you, O ye daughters of Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: By the roes, and by the hinds of the field,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'That ye stir not up, nor awake '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my
  - type: text
    text: ' love,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Till he please.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The voice of my beloved!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Behold, he cometh
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leaping upon the mountains,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Skipping upon the hills.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: My beloved is like a roe
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Or a young hart:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Behold, he standeth
- type: usfm
  marker: q2
  children:
  - type: text
    text: Behind our wall,
- type: usfm
  marker: q1
  children:
  - type: text
    text: He looketh forth at the windows,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Shewing himself through the lattice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: My beloved spake, and said unto me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rise up, my love, my fair one,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And come away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For, lo, the winter is past,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The rain is over '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' gone;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The flowers appear on the earth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The time of the singing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of birds
  - type: text
    text: ' is come,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the voice of the turtle
- type: usfm
  marker: q2
  children:
  - type: text
    text: Is heard in our land;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The fig tree putteth forth her green figs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the vines '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' the tender grape'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Give a '
  - type: usfm
    marker: add
    children:
    - type: text
      text: good
  - type: text
    text: ' smell.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Arise, my love, my fair one,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and come away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'O my dove, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that art
  - type: text
    text: ' in the clefts of the rock,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'In the secret '
  - type: usfm
    marker: add
    children:
    - type: text
      text: places
  - type: text
    text: ' of the stairs,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let me see thy countenance,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let me hear thy voice;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For sweet '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy voice,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And thy countenance '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' comely.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Take us the foxes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: The little foxes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'That spoil the vines:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For our vines '
  - type: usfm
    marker: add
    children:
    - type: text
      text: have
  - type: text
    text: ' tender grapes.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'My beloved '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' mine, and I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' his:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He feedeth among the lilies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Until the day break,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the shadows flee away,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Turn, my beloved, and be thou like a roe or a young hart
- type: usfm
  marker: q2
  children:
  - type: text
    text: Upon the mountains of Bether.
