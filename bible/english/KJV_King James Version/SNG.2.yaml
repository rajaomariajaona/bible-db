  '1':
  - type: text
    content: 'I '
  - type: text
    content: am
  - type: text
    content: ' the rose of Sharon,'
  - type: text
    content: And
  - type: text
    content: ' the lily of the valleys.'
  '10':
  - type: text
    content: My beloved spake, and said unto me,
  - type: text
    content: Rise up, my love, my fair one,
  - type: text
    content: And come away.
  '11':
  - type: text
    content: For, lo, the winter is past,
  - type: text
    content: 'The rain is over '
  - type: text
    content: and
  - type: text
    content: ' gone;'
  '12':
  - type: text
    content: The flowers appear on the earth;
  - type: text
    content: 'The time of the singing '
  - type: text
    content: of birds
  - type: text
    content: ' is come,'
  - type: text
    content: And the voice of the turtle
  - type: text
    content: Is heard in our land;
  '13':
  - type: text
    content: The fig tree putteth forth her green figs,
  - type: text
    content: 'And the vines '
  - type: text
    content: with
  - type: text
    content: ' the tender grape'
  - type: text
    content: 'Give a '
  - type: text
    content: good
  - type: text
    content: ' smell.'
  - type: text
    content: Arise, my love, my fair one,
  - type: text
    content: and come away.
  '14':
  - type: text
    content: 'O my dove, '
  - type: text
    content: that art
  - type: text
    content: ' in the clefts of the rock,'
  - type: text
    content: 'In the secret '
  - type: text
    content: places
  - type: text
    content: ' of the stairs,'
  - type: text
    content: Let me see thy countenance,
  - type: text
    content: Let me hear thy voice;
  - type: text
    content: 'For sweet '
  - type: text
    content: is
  - type: text
    content: ' thy voice,'
  - type: text
    content: 'And thy countenance '
  - type: text
    content: is
  - type: text
    content: ' comely.'
  '15':
  - type: text
    content: Take us the foxes,
  - type: text
    content: The little foxes,
  - type: text
    content: 'That spoil the vines:'
  - type: text
    content: 'For our vines '
  - type: text
    content: have
  - type: text
    content: ' tender grapes.'
  '16':
  - type: text
    content: 'My beloved '
  - type: text
    content: is
  - type: text
    content: ' mine, and I '
  - type: text
    content: am
  - type: text
    content: ' his:'
  - type: text
    content: He feedeth among the lilies.
  '17':
  - type: text
    content: Until the day break,
  - type: text
    content: And the shadows flee away,
  - type: text
    content: Turn, my beloved, and be thou like a roe or a young hart
  - type: text
    content: Upon the mountains of Bether.
  '2':
  - type: text
    content: As the lily among thorns,
  - type: text
    content: 'So '
  - type: text
    content: is
  - type: text
    content: ' my love among the daughters.'
  '3':
  - type: text
    content: As the apple tree among the trees of the wood,
  - type: text
    content: 'So '
  - type: text
    content: is
  - type: text
    content: ' my beloved among the sons.'
  - type: text
    content: I sat down under his shadow with great delight,
  - type: text
    content: 'And his fruit '
  - type: text
    content: was
  - type: text
    content: ' sweet to my taste.'
  '4':
  - type: text
    content: He brought me to the banqueting house,
  - type: text
    content: 'And his banner over me '
  - type: text
    content: was
  - type: text
    content: ' love.'
  '5':
  - type: text
    content: Stay me with flagons,
  - type: text
    content: 'Comfort me with apples:'
  - type: text
    content: 'For I '
  - type: text
    content: am
  - type: text
    content: ' sick of love.'
  '6':
  - type: text
    content: 'His left hand '
  - type: text
    content: is
  - type: text
    content: ' under my head,'
  - type: text
    content: And his right hand doth embrace me.
  '7':
  - type: text
    content: I charge you, O ye daughters of Jerusalem,
  - type: text
    content: By the roes, and by the hinds of the field,
  - type: text
    content: 'That ye stir not up, nor awake '
  - type: text
    content: my
  - type: text
    content: ' love,'
  - type: text
    content: Till he please.
  '8':
  - type: text
    content: The voice of my beloved!
  - type: text
    content: Behold, he cometh
  - type: text
    content: Leaping upon the mountains,
  - type: text
    content: Skipping upon the hills.
  '9':
  - type: text
    content: My beloved is like a roe
  - type: text
    content: 'Or a young hart:'
  - type: text
    content: Behold, he standeth
  - type: text
    content: Behind our wall,
  - type: text
    content: He looketh forth at the windows,
  - type: text
    content: Shewing himself through the lattice.
