document_id: DEU.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now therefore hearken, O Israel, unto the statutes and unto the judgments, which I teach you, for to do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ', that ye may live, and go in and possess the land which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of your fathers giveth you. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ye shall not add unto the word which I command you, neither shall ye diminish '
  - type: usfm
    marker: add
    children:
    - type: text
      text: ought
  - type: text
    text: ' from it, that ye may keep the commandments of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God which I command you. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Your eyes have seen what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' did because of Baal-peor: for all the men that followed Baal-peor, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God hath destroyed them from among you. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But ye that did cleave unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' alive every one of you this day. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Behold, I have taught you statutes and judgments, even as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' my God commanded me, that ye should do so in the land whither ye go to possess it. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Keep therefore and do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: '; for this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' your wisdom and your understanding in the sight of the nations, which shall hear all these statutes, and say, Surely this great nation '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a wise and understanding people. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For what nation '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is there so
  - type: text
    text: ' great, who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hath
  - type: text
    text: ' God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' nigh unto them, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' our God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things that
  - type: text
    text: ' we call upon him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And what nation '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is there so
  - type: text
    text: ' great, that hath statutes and judgments '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' righteous as all this law, which I set before you this day?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Only take heed to thyself, and keep thy soul diligently, lest thou forget the things which thine eyes have seen, and lest they depart from thy heart all the days of thy life: but teach them thy sons, and thy sons'' sons; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: add
    children:
    - type: text
      text: specially
  - type: text
    text: ' the day that thou stoodest before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God in Horeb, when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto me, Gather me the people together, and I will make them hear my words, that they may learn to fear me all the days that they shall live upon the earth, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' they may teach their children. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And ye came near and stood under the mountain; and the mountain burned with fire unto the midst of heaven, with darkness, clouds, and thick darkness. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto you out of the midst of the fire: ye heard the voice of the words, but saw no similitude; only '
  - type: usfm
    marker: add
    children:
    - type: text
      text: ye heard
  - type: text
    text: ' a voice. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And he declared unto you his covenant, which he commanded you to perform, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' ten commandments; and he wrote them upon two tables of stone. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded me at that time to teach you statutes and judgments, that ye might do them in the land whither ye go over to possess it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Take ye therefore good heed unto yourselves; for ye saw no manner of similitude on the day '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto you in Horeb out of the midst of the fire: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'lest ye corrupt '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yourselves
  - type: text
    text: ', and make you a graven image, the similitude of any figure, the likeness of male or female, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'the likeness of any beast that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' on the earth, the likeness of any winged fowl that flieth in the air, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'the likeness of any thing that creepeth on the ground, the likeness of any fish that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the waters beneath the earth: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and lest thou lift up thine eyes unto heaven, and when thou seest the sun, and the moon, and the stars, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' all the host of heaven, shouldest be driven to worship them, and serve them, which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God hath divided unto all nations under the whole heaven. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath taken you, and brought you forth out of the iron furnace, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' out of Egypt, to be unto him a people of inheritance, as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: ye are
  - type: text
    text: ' this day. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Furthermore the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' was angry with me for your sakes, and sware that I should not go over Jordan, and that I should not go in unto that good land, which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God giveth thee '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' an inheritance: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'but I must die in this land, I must not go over Jordan: but ye shall go over, and possess that good land. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Take heed unto yourselves, lest ye forget the covenant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God, which he made with you, and make you a graven image, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: or
  - type: text
    text: ' the likeness of any '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thing
  - type: text
    text: ', which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God hath forbidden thee. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a consuming fire, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' a jealous God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'When thou shalt beget children, and children''s children, and ye shall have remained long in the land, and shall corrupt '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yourselves
  - type: text
    text: ', and make a graven image, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: or
  - type: text
    text: ' the likeness of any '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thing
  - type: text
    text: ', and shall do evil in the sight of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, to provoke him to anger: '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'I call heaven and earth to witness against you this day, that ye shall soon utterly perish from off the land whereunto ye go over Jordan to possess it; ye shall not prolong '
  - type: usfm
    marker: add
    children:
    - type: text
      text: your
  - type: text
    text: ' days upon it, but shall utterly be destroyed. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall scatter you among the nations, and ye shall be left few in number among the heathen, whither the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall lead you. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And there ye shall serve gods, the work of men''s hands, wood and stone, which neither see, nor hear, nor eat, nor smell. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'But if from thence thou shalt seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, thou shalt find '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', if thou seek him with all thy heart and with all thy soul. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'When thou art in tribulation, and all these things are come upon thee, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' in the latter days, if thou turn to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God, and shalt be obedient unto his voice; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '(for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a merciful God;) he will not forsake thee, neither destroy thee, nor forget the covenant of thy fathers which he sware unto them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'For ask now of the days that are past, which were before thee, since the day that God created man upon the earth, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: ask
  - type: text
    text: ' from the one side of heaven unto the other, whether there hath been '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any such thing
  - type: text
    text: ' as this great thing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ', or hath been heard like it? '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Did '
  - type: usfm
    marker: add
    children:
    - type: text
      text: ever
  - type: text
    text: ' people hear the voice of God speaking out of the midst of the fire, as thou hast heard, and live? '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Or hath God assayed to go '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' take him a nation from the midst of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: another
  - type: text
    text: ' nation, by temptations, by signs, and by wonders, and by war, and by a mighty hand, and by a stretched out arm, and by great terrors, according to all that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God did for you in Egypt before your eyes? '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Unto thee it was shewed, that thou mightest know that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' God; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' none else beside him. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Out of heaven he made thee to hear his voice, that he might instruct thee: and upon earth he shewed thee his great fire; and thou heardest his words out of the midst of the fire. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And because he loved thy fathers, therefore he chose their seed after them, and brought thee out in his sight with his mighty power out of Egypt; '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'to drive out nations from before thee greater and mightier than thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ', to bring thee in, to give thee their land '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' an inheritance, as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' this day. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Know therefore this day, and consider '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' in thine heart, that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' God in heaven above, and upon the earth beneath: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' none else. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Thou shalt keep therefore his statutes, and his commandments, which I command thee this day, that it may go well with thee, and with thy children after thee, and that thou mayest prolong '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thy
  - type: text
    text: ' days upon the earth, which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God giveth thee, for ever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Then Moses severed three cities on this side Jordan toward the sun rising; '
