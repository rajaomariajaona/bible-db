    text: 'these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the testimonies, and the statutes, and the judgments, which Moses spake unto the children of Israel, after they came forth out of Egypt, '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'on this side Jordan, in the valley over against Beth-peor, in the land of Sihon king of the Amorites, who dwelt at Heshbon, whom Moses and the children of Israel smote, after they were come forth out of Egypt: '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'and they possessed his land, and the land of Og king of Bashan, two kings of the Amorites, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' on this side Jordan toward the sun rising; '
  - type: usfm
