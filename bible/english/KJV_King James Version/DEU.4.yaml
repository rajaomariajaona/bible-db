  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'And this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the law which Moses set before the children of Israel: '
  - type: usfm
