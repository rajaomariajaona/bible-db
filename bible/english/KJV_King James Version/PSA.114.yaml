document_id: PSA.114,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When Israel went out of Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The house of Jacob from a people of strange language;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Judah was his sanctuary,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' Israel his dominion.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The sea saw '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and fled:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Jordan was driven back.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The mountains skipped like rams,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' the little hills like lambs.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ailed
    - type: text
      text: ' thee, O thou sea, that thou fleddest?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Thou Jordan, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' thou wast driven back?'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ye mountains, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' ye skipped like rams;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' ye little hills, like lambs?'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tremble, thou earth, at the presence of the Lord,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: At the presence of the God of Jacob;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Which turned the rock '
    - type: usfm
      marker: add
      children:
      - type: text
        text: into
    - type: text
      text: ' a standing water,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The flint into a fountain of waters.
