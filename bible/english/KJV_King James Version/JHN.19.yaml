document_id: JHN.19
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Crucifixion
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Pilate therefore took Jesus, and scourged '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the soldiers platted a crown of thorns, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' on his head, and they put on him a purple robe, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and said, Hail, King of the Jews! and they smote him with their hands. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pilate therefore went forth again, and saith unto them, Behold, I bring him forth to you, that ye may know that I find no fault in him. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then came Jesus forth, wearing the crown of thorns, and the purple robe. And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Pilate
  - type: text
    text: ' saith unto them, Behold the man! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When the chief priests therefore and officers saw him, they cried out, saying, Crucify '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', crucify '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: '. Pilate saith unto them, Take ye him, and crucify '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ': for I find no fault in him. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The Jews answered him, We have a law, and by our law he ought to die, because he made himself the Son of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'When Pilate therefore heard that saying, he was the more afraid; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and went again into the judgment hall, and saith unto Jesus, Whence art thou? But Jesus gave him no answer. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then saith Pilate unto him, Speakest thou not unto me? knowest thou not that I have power to crucify thee, and have power to release thee? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Thou couldest have no power '
    - type: usfm
      marker: add
      children:
      - type: text
        text: at all
    - type: text
      text: ' against me, except it were given thee from above: therefore he that delivered me unto thee hath the greater sin.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And from thenceforth Pilate sought to release him: but the Jews cried out, saying, If thou let this man go, thou art not Cæsar''s friend: whosoever maketh himself a king speaketh against Cæsar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When Pilate therefore heard that saying, he brought Jesus forth, and sat down in the judgment seat in a place that is called the Pavement, but in the Hebrew, Gabbatha. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And it was the preparation of the passover, and about the sixth hour: and he saith unto the Jews, Behold your King! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But they cried out, Away with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', away with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', crucify him. Pilate saith unto them, Shall I crucify your King? The chief priests answered, We have no king but Cæsar. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Then delivered he him therefore unto them to be crucified.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And they took Jesus, and led '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' away. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And he bearing his cross went forth into a place called '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the place
  - type: text
    text: ' of a skull, which is called in the Hebrew Golgotha: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: where they crucified him, and two other with him, on either side one, and Jesus in the midst.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And Pilate wrote a title, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' on the cross. And the writing was, JESUS OF NAZARETH THE KING OF THE JEWS. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'This title then read many of the Jews: for the place where Jesus was crucified was nigh to the city: and it was written in Hebrew, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' Greek, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' Latin. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then said the chief priests of the Jews to Pilate, Write not, The King of the Jews; but that he said, I am King of the Jews. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Pilate answered, What I have written I have written.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then the soldiers, when they had crucified Jesus, took his garments, and made four parts, to every soldier a part; and also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' coat: now the coat was without seam, woven from the top throughout. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'They said therefore among themselves, Let us not rend it, but cast lots for it, whose it shall be: that the scripture might be fulfilled, which saith, They parted my raiment among them, and for my vesture they did cast lots. These things therefore the soldiers did.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Now there stood by the cross of Jesus his mother, and his mother''s sister, Mary the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: wife
  - type: text
    text: ' of Cleophas, and Mary Magdalene. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'When Jesus therefore saw his mother, and the disciple standing by, whom he loved, he saith unto his mother, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Woman, behold thy son!
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then saith he to the disciple, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Behold thy mother!
  - type: text
    text: ' And from that hour that disciple took her unto his own '
  - type: usfm
    marker: add
    children:
    - type: text
      text: home
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'After this, Jesus knowing that all things were now accomplished, that the scripture might be fulfilled, saith, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I thirst.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Now there was set a vessel full of vinegar: and they filled a spunge with vinegar, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon hyssop, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to his mouth. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'When Jesus therefore had received the vinegar, he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'It is finished:'
  - type: text
    text: ' and he bowed his head, and gave up the ghost.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'The Jews therefore, because it was the preparation, that the bodies should not remain upon the cross on the sabbath day, (for that sabbath day was an high day,) besought Pilate that their legs might be broken, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' they might be taken away. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Then came the soldiers, and brake the legs of the first, and of the other which was crucified with him. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'But when they came to Jesus, and saw that he was dead already, they brake not his legs: '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'but one of the soldiers with a spear pierced his side, and forthwith came there out blood and water. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And he that saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' bare record, and his record is true: and he knoweth that he saith true, that ye might believe. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'For these things were done, that the scripture should be fulfilled, A bone of him shall not be broken. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: And again another scripture saith, They shall look on him whom they pierced.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And after this Joseph of Arimathæa, being a disciple of Jesus, but secretly for fear of the Jews, besought Pilate that he might take away the body of Jesus: and Pilate gave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' leave. He came therefore, and took the body of Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And there came also Nicodemus, which at the first came to Jesus by night, and brought a mixture of myrrh and aloes, about an hundred pound '
  - type: usfm
    marker: add
    children:
    - type: text
      text: weight
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Then took they the body of Jesus, and wound it in linen clothes with the spices, as the manner of the Jews is to bury. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Now in the place where he was crucified there was a garden; and in the garden a new sepulchre, wherein was never man yet laid. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'There laid they Jesus therefore because of the Jews'' preparation '
  - type: usfm
    marker: add
    children:
    - type: text
      text: day
  - type: text
    text: ; for the sepulchre was nigh at hand.
