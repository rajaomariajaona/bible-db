verses:
  '1':
  - type: heading
    content: The Crucifixion
  - type: text
    content: 'Then Pilate therefore took Jesus, and scourged '
  - type: text
    content: him
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Then saith Pilate unto him, Speakest thou not unto me? knowest thou not that I have power to crucify thee, and have power to release thee? '
  '11':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: 'Thou couldest have no power '
  - type: text
    content: at all
  - type: text
    content: ' against me, except it were given thee from above: therefore he that delivered me unto thee hath the greater sin.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'And from thenceforth Pilate sought to release him: but the Jews cried out, saying, If thou let this man go, thou art not Cæsar''s friend: whosoever maketh himself a king speaketh against Cæsar.'
  '13':
  - type: text
    content: 'When Pilate therefore heard that saying, he brought Jesus forth, and sat down in the judgment seat in a place that is called the Pavement, but in the Hebrew, Gabbatha. '
  '14':
  - type: text
    content: 'And it was the preparation of the passover, and about the sixth hour: and he saith unto the Jews, Behold your King! '
  '15':
  - type: text
    content: 'But they cried out, Away with '
  - type: text
    content: him
  - type: text
    content: ', away with '
  - type: text
    content: him
  - type: text
    content: ', crucify him. Pilate saith unto them, Shall I crucify your King? The chief priests answered, We have no king but Cæsar. '
  '16':
  - type: text
    content: Then delivered he him therefore unto them to be crucified.
  - type: text
    content: 'And they took Jesus, and led '
  - type: text
    content: him
  - type: text
    content: ' away. '
  '17':
  - type: text
    content: 'And he bearing his cross went forth into a place called '
  - type: text
    content: the place
  - type: text
    content: ' of a skull, which is called in the Hebrew Golgotha: '
  '18':
  - type: text
    content: where they crucified him, and two other with him, on either side one, and Jesus in the midst.
  '19':
  - type: text
    content: 'And Pilate wrote a title, and put '
  - type: text
    content: it
  - type: text
    content: ' on the cross. And the writing was, JESUS OF NAZARETH THE KING OF THE JEWS. '
  '2':
  - type: text
    content: 'And the soldiers platted a crown of thorns, and put '
  - type: text
    content: it
  - type: text
    content: ' on his head, and they put on him a purple robe, '
  '20':
  - type: text
    content: 'This title then read many of the Jews: for the place where Jesus was crucified was nigh to the city: and it was written in Hebrew, '
  - type: text
    content: and
  - type: text
    content: ' Greek, '
  - type: text
    content: and
  - type: text
    content: ' Latin. '
  '21':
  - type: text
    content: 'Then said the chief priests of the Jews to Pilate, Write not, The King of the Jews; but that he said, I am King of the Jews. '
  '22':
  - type: text
    content: Pilate answered, What I have written I have written.
  '23':
  - type: text
    content: 'Then the soldiers, when they had crucified Jesus, took his garments, and made four parts, to every soldier a part; and also '
  - type: text
    content: his
  - type: text
    content: ' coat: now the coat was without seam, woven from the top throughout. '
  '24':
  - type: text
    content: 'They said therefore among themselves, Let us not rend it, but cast lots for it, whose it shall be: that the scripture might be fulfilled, which saith, They parted my raiment among them, and for my vesture they did cast lots. These things therefore the soldiers did.'
  '25':
  - type: text
    content: 'Now there stood by the cross of Jesus his mother, and his mother''s sister, Mary the '
  - type: text
    content: wife
  - type: text
    content: ' of Cleophas, and Mary Magdalene. '
  '26':
  - type: text
    content: 'When Jesus therefore saw his mother, and the disciple standing by, whom he loved, he saith unto his mother, '
  - type: text
    content: Woman, behold thy son!
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Then saith he to the disciple, '
  - type: text
    content: Behold thy mother!
  - type: text
    content: ' And from that hour that disciple took her unto his own '
  - type: text
    content: home
  - type: text
    content: .
  '28':
  - type: text
    content: 'After this, Jesus knowing that all things were now accomplished, that the scripture might be fulfilled, saith, '
  - type: text
    content: I thirst.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Now there was set a vessel full of vinegar: and they filled a spunge with vinegar, and put '
  - type: text
    content: it
  - type: text
    content: ' upon hyssop, and put '
  - type: text
    content: it
  - type: text
    content: ' to his mouth. '
  '3':
  - type: text
    content: 'and said, Hail, King of the Jews! and they smote him with their hands. '
  '30':
  - type: text
    content: 'When Jesus therefore had received the vinegar, he said, '
  - type: text
    content: 'It is finished:'
  - type: text
    content: ' and he bowed his head, and gave up the ghost.'
  '31':
  - type: text
    content: 'The Jews therefore, because it was the preparation, that the bodies should not remain upon the cross on the sabbath day, (for that sabbath day was an high day,) besought Pilate that their legs might be broken, and '
  - type: text
    content: that
  - type: text
    content: ' they might be taken away. '
  '32':
  - type: text
    content: 'Then came the soldiers, and brake the legs of the first, and of the other which was crucified with him. '
  '33':
  - type: text
    content: 'But when they came to Jesus, and saw that he was dead already, they brake not his legs: '
  '34':
  - type: text
    content: 'but one of the soldiers with a spear pierced his side, and forthwith came there out blood and water. '
  '35':
  - type: text
    content: 'And he that saw '
  - type: text
    content: it
  - type: text
    content: ' bare record, and his record is true: and he knoweth that he saith true, that ye might believe. '
  '36':
  - type: text
    content: 'For these things were done, that the scripture should be fulfilled, A bone of him shall not be broken. '
  '37':
  - type: text
    content: And again another scripture saith, They shall look on him whom they pierced.
  '38':
  - type: text
    content: 'And after this Joseph of Arimathæa, being a disciple of Jesus, but secretly for fear of the Jews, besought Pilate that he might take away the body of Jesus: and Pilate gave '
  - type: text
    content: him
  - type: text
    content: ' leave. He came therefore, and took the body of Jesus. '
  '39':
  - type: text
    content: 'And there came also Nicodemus, which at the first came to Jesus by night, and brought a mixture of myrrh and aloes, about an hundred pound '
  - type: text
    content: weight
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Pilate therefore went forth again, and saith unto them, Behold, I bring him forth to you, that ye may know that I find no fault in him. '
  '40':
  - type: text
    content: 'Then took they the body of Jesus, and wound it in linen clothes with the spices, as the manner of the Jews is to bury. '
  '41':
  - type: text
    content: 'Now in the place where he was crucified there was a garden; and in the garden a new sepulchre, wherein was never man yet laid. '
  '42':
  - type: text
    content: 'There laid they Jesus therefore because of the Jews'' preparation '
  - type: text
    content: day
  - type: text
    content: ; for the sepulchre was nigh at hand.
  '5':
  - type: text
    content: 'Then came Jesus forth, wearing the crown of thorns, and the purple robe. And '
  - type: text
    content: Pilate
  - type: text
    content: ' saith unto them, Behold the man! '
  '6':
  - type: text
    content: 'When the chief priests therefore and officers saw him, they cried out, saying, Crucify '
  - type: text
    content: him
  - type: text
    content: ', crucify '
  - type: text
    content: him
  - type: text
    content: '. Pilate saith unto them, Take ye him, and crucify '
  - type: text
    content: him
  - type: text
    content: ': for I find no fault in him. '
  '7':
  - type: text
    content: The Jews answered him, We have a law, and by our law he ought to die, because he made himself the Son of God.
  '8':
  - type: text
    content: 'When Pilate therefore heard that saying, he was the more afraid; '
  '9':
  - type: text
    content: 'and went again into the judgment hall, and saith unto Jesus, Whence art thou? But Jesus gave him no answer. '
