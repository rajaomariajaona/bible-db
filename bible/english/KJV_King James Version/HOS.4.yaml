document_id: HOS.4,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The LORD's Controversy
  - type: text
    content: 'Hear the word of the '
  - type: text
    content: LORD
  - type: text
    content: ', ye children of Israel: for the '
  - type: text
    content: LORD
  - type: text
    content: ' hath a controversy with the inhabitants of the land, because '
  - type: text
    content: there is
  - type: text
    content: ' no truth, nor mercy, nor knowledge of God in the land. '
  '10':
  - type: text
    content: 'For they shall eat, and not have enough: they shall commit whoredom, and shall not increase: because they have left off to take heed to the '
  - type: text
    content: LORD
  - type: text
    content: .
  '11':
  - type: text
    content: 'Whoredom and wine and new wine take away the heart. '
  '12':
  - type: text
    content: 'My people ask counsel at their stocks, and their staff declareth unto them: for the spirit of whoredoms hath caused '
  - type: text
    content: them
  - type: text
    content: ' to err, and they have gone a whoring from under their God. '
  '13':
  - type: text
    content: 'They sacrifice upon the tops of the mountains, and burn incense upon the hills, under oaks and poplars and elms, because the shadow thereof '
  - type: text
    content: is
  - type: text
    content: ' good: therefore your daughters shall commit whoredom, and your spouses shall commit adultery. '
  '14':
  - type: text
    content: 'I will not punish your daughters when they commit whoredom, nor your spouses when they commit adultery: for themselves are separated with whores, and they sacrifice with harlots: therefore the people '
  - type: text
    content: that
  - type: text
    content: ' doth not understand shall fall.'
  '15':
  - type: text
    content: 'Though thou, Israel, play the harlot, '
  - type: text
    content: yet
  - type: text
    content: ' let not Judah offend; and come not ye unto Gilgal, neither go ye up to Beth-aven, nor swear, The '
  - type: text
    content: LORD
  - type: text
    content: ' liveth. '
  '16':
  - type: text
    content: 'For Israel slideth back as a backsliding heifer: now the '
  - type: text
    content: LORD
  - type: text
    content: ' will feed them as a lamb in a large place. '
  '17':
  - type: text
    content: 'Ephraim '
  - type: text
    content: is
  - type: text
    content: ' joined to idols: let him alone. '
  '18':
  - type: text
    content: 'Their drink is sour: they have committed whoredom continually: her rulers '
  - type: text
    content: with
  - type: text
    content: ' shame do love, Give ye. '
  '19':
  - type: text
    content: The wind hath bound her up in her wings, and they shall be ashamed because of their sacrifices.
  '2':
  - type: text
    content: 'By swearing, and lying, and killing, and stealing, and committing adultery, they break out, and blood toucheth blood. '
  '3':
  - type: text
    content: 'Therefore shall the land mourn, and every one that dwelleth therein shall languish, with the beasts of the field, and with the fowls of heaven; yea, the fishes of the sea also shall be taken away. '
  '4':
  - type: text
    content: 'Yet let no man strive, nor reprove another: for thy people '
  - type: text
    content: are
  - type: text
    content: ' as they that strive with the priest. '
  '5':
  - type: text
    content: Therefore shalt thou fall in the day, and the prophet also shall fall with thee in the night, and I will destroy thy mother.
  '6':
  - type: text
    content: 'My people are destroyed for lack of knowledge: because thou hast rejected knowledge, I will also reject thee, that thou shalt be no priest to me: seeing thou hast forgotten the law of thy God, I will also forget thy children. '
  '7':
  - type: text
    content: 'As they were increased, so they sinned against me: '
  - type: text
    content: therefore
  - type: text
    content: ' will I change their glory into shame. '
  '8':
  - type: text
    content: 'They eat up the sin of my people, and they set their heart on their iniquity. '
  '9':
  - type: text
    content: 'And there shall be, like people, like priest: and I will punish them for their ways, and reward them their doings. '
