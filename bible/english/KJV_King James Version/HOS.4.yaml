document_id: HOS.4
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '''s Controversy'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hear the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', ye children of Israel: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath a controversy with the inhabitants of the land, because '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no truth, nor mercy, nor knowledge of God in the land. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'By swearing, and lying, and killing, and stealing, and committing adultery, they break out, and blood toucheth blood. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Therefore shall the land mourn, and every one that dwelleth therein shall languish, with the beasts of the field, and with the fowls of heaven; yea, the fishes of the sea also shall be taken away. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Yet let no man strive, nor reprove another: for thy people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' as they that strive with the priest. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Therefore shalt thou fall in the day, and the prophet also shall fall with thee in the night, and I will destroy thy mother.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'My people are destroyed for lack of knowledge: because thou hast rejected knowledge, I will also reject thee, that thou shalt be no priest to me: seeing thou hast forgotten the law of thy God, I will also forget thy children. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'As they were increased, so they sinned against me: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: therefore
  - type: text
    text: ' will I change their glory into shame. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'They eat up the sin of my people, and they set their heart on their iniquity. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And there shall be, like people, like priest: and I will punish them for their ways, and reward them their doings. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For they shall eat, and not have enough: they shall commit whoredom, and shall not increase: because they have left off to take heed to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Whoredom and wine and new wine take away the heart. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'My people ask counsel at their stocks, and their staff declareth unto them: for the spirit of whoredoms hath caused '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' to err, and they have gone a whoring from under their God. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'They sacrifice upon the tops of the mountains, and burn incense upon the hills, under oaks and poplars and elms, because the shadow thereof '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' good: therefore your daughters shall commit whoredom, and your spouses shall commit adultery. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I will not punish your daughters when they commit whoredom, nor your spouses when they commit adultery: for themselves are separated with whores, and they sacrifice with harlots: therefore the people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' doth not understand shall fall.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Though thou, Israel, play the harlot, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yet
  - type: text
    text: ' let not Judah offend; and come not ye unto Gilgal, neither go ye up to Beth-aven, nor swear, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' liveth. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For Israel slideth back as a backsliding heifer: now the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will feed them as a lamb in a large place. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ephraim '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' joined to idols: let him alone. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Their drink is sour: they have committed whoredom continually: her rulers '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' shame do love, Give ye. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The wind hath bound her up in her wings, and they shall be ashamed because of their sacrifices.
