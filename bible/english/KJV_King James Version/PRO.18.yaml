  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' a strong tower:'
  - type: text
    content: The righteous runneth into it, and is safe.
  '11':
  - type: text
    content: 'The rich man''s wealth '
  - type: text
    content: is
  - type: text
    content: ' his strong city,'
  - type: text
    content: And as an high wall in his own conceit.
  '12':
  - type: text
    content: Before destruction the heart of man is haughty,
  - type: text
    content: 'And before honour '
  - type: text
    content: is
  - type: text
    content: ' humility.'
  '13':
  - type: text
    content: 'He that answereth a matter before he heareth '
  - type: text
    content: it
  - type: text
    content: ','
  - type: text
    content: 'It '
  - type: text
    content: is
  - type: text
    content: ' folly and shame unto him.'
  '14':
  - type: text
    content: The spirit of a man will sustain his infirmity;
  - type: text
    content: But a wounded spirit who can bear?
  '15':
  - type: text
    content: The heart of the prudent getteth knowledge;
  - type: text
    content: And the ear of the wise seeketh knowledge.
  '16':
  - type: text
    content: A man's gift maketh room for him,
  - type: text
    content: And bringeth him before great men.
  '17':
  - type: text
    content: ' '
  - type: text
    content: He that is
  - type: text
    content: ' first in his own cause '
  - type: text
    content: seemeth
  - type: text
    content: ' just;'
  - type: text
    content: But his neighbour cometh and searcheth him.
  '18':
  - type: text
    content: The lot causeth contentions to cease,
  - type: text
    content: And parteth between the mighty.
  '19':
  - type: text
    content: 'A brother offended '
  - type: text
    content: is harder to be won
  - type: text
    content: ' than a strong city:'
  - type: text
    content: 'And '
  - type: text
    content: their
  - type: text
    content: ' contentions '
  - type: text
    content: are
  - type: text
    content: ' like the bars of a castle.'
  '2':
  - type: text
    content: A fool hath no delight in understanding,
  - type: text
    content: But that his heart may discover itself.
  '20':
  - type: text
    content: A man's belly shall be satisfied with the fruit of his mouth;
  - type: text
    content: And
  - type: text
    content: ' with the increase of his lips shall he be filled.'
  '21':
  - type: text
    content: 'Death and life '
  - type: text
    content: are
  - type: text
    content: ' in the power of the tongue:'
  - type: text
    content: And they that love it shall eat the fruit thereof.
  '22':
  - type: text
    content: ' '
  - type: text
    content: Whoso
  - type: text
    content: ' findeth a wife findeth a good '
  - type: text
    content: thing
  - type: text
    content: ','
  - type: text
    content: 'And obtaineth favour of the '
  - type: text
    content: LORD
  - type: text
    content: .
  '23':
  - type: text
    content: The poor useth intreaties;
  - type: text
    content: But the rich answereth roughly.
  '24':
  - type: text
    content: 'A man '
  - type: text
    content: that hath
  - type: text
    content: ' friends must shew himself friendly:'
  - type: text
    content: 'And there is a friend '
  - type: text
    content: that
  - type: text
    content: ' sticketh closer than a brother.'
  '3':
  - type: text
    content: 'When the wicked cometh, '
  - type: text
    content: then
  - type: text
    content: ' cometh also contempt,'
  - type: text
    content: And with ignominy reproach.
  '4':
  - type: text
    content: 'The words of a man''s mouth '
  - type: text
    content: are as
  - type: text
    content: ' deep waters,'
  - type: text
    content: And
  - type: text
    content: ' the wellspring of wisdom '
  - type: text
    content: as
  - type: text
    content: ' a flowing brook.'
  '5':
  - type: text
    content: ' '
  - type: text
    content: It is
  - type: text
    content: ' not good to accept the person of the wicked,'
  - type: text
    content: To overthrow the righteous in judgment.
  '6':
  - type: text
    content: A fool's lips enter into contention,
  - type: text
    content: And his mouth calleth for strokes.
  '7':
  - type: text
    content: 'A fool''s mouth '
  - type: text
    content: is
  - type: text
    content: ' his destruction,'
  - type: text
    content: 'And his lips '
  - type: text
    content: are
  - type: text
    content: ' the snare of his soul.'
  '8':
  - type: text
    content: 'The words of a talebearer '
  - type: text
    content: are
  - type: text
    content: ' as wounds,'
  - type: text
    content: And they go down into the innermost parts of the belly.
  '9':
  - type: text
    content: He also that is slothful in his work
  - type: text
    content: Is brother to him that is a great waster.
