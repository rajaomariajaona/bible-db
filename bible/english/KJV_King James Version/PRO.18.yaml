document_id: PRO.18,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Through desire a man, having separated himself, seeketh
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' intermeddleth with all wisdom.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a strong tower:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The righteous runneth into it, and is safe.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The rich man''s wealth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' his strong city,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And as an high wall in his own conceit.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Before destruction the heart of man is haughty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And before honour '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' humility.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'He that answereth a matter before he heareth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'It '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' folly and shame unto him.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The spirit of a man will sustain his infirmity;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But a wounded spirit who can bear?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The heart of the prudent getteth knowledge;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the ear of the wise seeketh knowledge.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: A man's gift maketh room for him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And bringeth him before great men.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: He that is
    - type: text
      text: ' first in his own cause '
    - type: usfm
      marker: add
      children:
      - type: text
        text: seemeth
    - type: text
      text: ' just;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But his neighbour cometh and searcheth him.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: The lot causeth contentions to cease,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And parteth between the mighty.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'A brother offended '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is harder to be won
    - type: text
      text: ' than a strong city:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' contentions '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' like the bars of a castle.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: A fool hath no delight in understanding,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But that his heart may discover itself.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: A man's belly shall be satisfied with the fruit of his mouth;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' with the increase of his lips shall he be filled.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Death and life '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in the power of the tongue:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they that love it shall eat the fruit thereof.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Whoso
    - type: text
      text: ' findeth a wife findeth a good '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thing
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And obtaineth favour of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: The poor useth intreaties;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the rich answereth roughly.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'A man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that hath
    - type: text
      text: ' friends must shew himself friendly:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And there is a friend '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' sticketh closer than a brother.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'When the wicked cometh, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: then
    - type: text
      text: ' cometh also contempt,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And with ignominy reproach.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The words of a man''s mouth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are as
    - type: text
      text: ' deep waters,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' the wellspring of wisdom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' a flowing brook.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' not good to accept the person of the wicked,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To overthrow the righteous in judgment.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: A fool's lips enter into contention,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his mouth calleth for strokes.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'A fool''s mouth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' his destruction,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And his lips '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the snare of his soul.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The words of a talebearer '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' as wounds,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they go down into the innermost parts of the belly.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: He also that is slothful in his work
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Is brother to him that is a great waster.
