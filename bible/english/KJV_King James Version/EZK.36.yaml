  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Prophesy therefore concerning the land of Israel, and say unto the mountains, and to the hills, to the rivers, and to the valleys, Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; Behold, I have spoken in my jealousy and in my fury, because ye have borne the shame of the heathen: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'therefore thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; I have lifted up mine hand, Surely the heathen that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' about you, they shall bear their shame.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But ye, O mountains of Israel, ye shall shoot forth your branches, and yield your fruit to my people of Israel; for they are at hand to come. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For, behold, I '
    - type: usfm
