document_id: EZK.36
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Also, thou son of man, prophesy unto the mountains of Israel, and say, Ye mountains of Israel, hear the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; Because the enemy hath said against you, Aha, even the ancient high places are our''s in possession: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'therefore prophesy and say, Thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; Because they have made '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: ' desolate, and swallowed you up on every side, that ye might be a possession unto the residue of the heathen, and ye are taken up in the lips of talkers, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' an infamy of the people: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'therefore, ye mountains of Israel, hear the word of the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; Thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' to the mountains, and to the hills, to the rivers, and to the valleys, to the desolate wastes, and to the cities that are forsaken, which became a prey and derision to the residue of the heathen that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' round about; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'therefore thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; Surely in the fire of my jealousy have I spoken against the residue of the heathen, and against all Idumea, which have appointed my land into their possession with the joy of all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' heart, with despiteful minds, to cast it out for a prey. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Prophesy therefore concerning the land of Israel, and say unto the mountains, and to the hills, to the rivers, and to the valleys, Thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; Behold, I have spoken in my jealousy and in my fury, because ye have borne the shame of the heathen: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'therefore thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; I have lifted up mine hand, Surely the heathen that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' about you, they shall bear their shame.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But ye, O mountains of Israel, ye shall shoot forth your branches, and yield your fruit to my people of Israel; for they are at hand to come. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For, behold, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' for you, and I will turn unto you, and ye shall be tilled and sown: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and I will multiply men upon you, all the house of Israel, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' all of it: and the cities shall be inhabited, and the wastes shall be builded: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and I will multiply upon you man and beast; and they shall increase and bring fruit: and I will settle you after your old estates, and will do better '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unto you
  - type: text
    text: ' than at your beginnings: and ye shall know that I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Yea, I will cause men to walk upon you, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' my people Israel; and they shall possess thee, and thou shalt be their inheritance, and thou shalt no more henceforth bereave them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of men
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; Because they say unto you, Thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: land
  - type: text
    text: ' devourest up men, and hast bereaved thy nations; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'therefore thou shalt devour men no more, neither bereave thy nations any more, saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Neither will I cause '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' to hear in thee the shame of the heathen any more, neither shalt thou bear the reproach of the people any more, neither shalt thou cause thy nations to fall any more, saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: People to be Renewed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Moreover the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came unto me, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Son of man, when the house of Israel dwelt in their own land, they defiled it by their own way and by their doings: their way was before me as the uncleanness of a removed woman. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Wherefore I poured my fury upon them for the blood that they had shed upon the land, and for their idols '
  - type: usfm
    marker: add
    children:
    - type: text
      text: wherewith
  - type: text
    text: ' they had polluted it: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and I scattered them among the heathen, and they were dispersed through the countries: according to their way and according to their doings I judged them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And when they entered unto the heathen, whither they went, they profaned my holy name, when they said to them, These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the people of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and are gone forth out of his land. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: But I had pity for mine holy name, which the house of Israel had profaned among the heathen, whither they went.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Therefore say unto the house of Israel, Thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; I do not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' for your sakes, O house of Israel, but for mine holy name''s sake, which ye have profaned among the heathen, whither ye went. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And I will sanctify my great name, which was profaned among the heathen, which ye have profaned in the midst of them; and the heathen shall know that I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ', when I shall be sanctified in you before their eyes. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'For I will take you from among the heathen, and gather you out of all countries, and will bring you into your own land. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then will I sprinkle clean water upon you, and ye shall be clean: from all your filthiness, and from all your idols, will I cleanse you. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'A new heart also will I give you, and a new spirit will I put within you: and I will take away the stony heart out of your flesh, and I will give you an heart of flesh. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And I will put my spirit within you, and cause you to walk in my statutes, and ye shall keep my judgments, and do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And ye shall dwell in the land that I gave to your fathers; and ye shall be my people, and I will be your God. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'I will also save you from all your uncleannesses: and I will call for the corn, and will increase it, and lay no famine upon you. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And I will multiply the fruit of the tree, and the increase of the field, that ye shall receive no more reproach of famine among the heathen. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then shall ye remember your own evil ways, and your doings that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' not good, and shall lothe yourselves in your own sight for your iniquities and for your abominations. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Not for your sakes do I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ', saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ', be it known unto you: be ashamed and confounded for your own ways, O house of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; In the day that I shall have cleansed you from all your iniquities I will also cause '
  - type: usfm
    marker: add
    children:
    - type: text
      text: you
  - type: text
    text: ' to dwell in the cities, and the wastes shall be builded. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And the desolate land shall be tilled, whereas it lay desolate in the sight of all that passed by. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And they shall say, This land that was desolate is become like the garden of Eden; and the waste and desolate and ruined cities '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are become
  - type: text
    text: ' fenced, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' are inhabited. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Then the heathen that are left round about you shall know that I the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' build the ruined '
  - type: usfm
    marker: add
    children:
    - type: text
      text: places, and
  - type: text
    text: ' plant that that was desolate: I the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' have spoken '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', and I will do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; I will yet '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' this be enquired of by the house of Israel, to do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' for them; I will increase them with men like a flock. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'As the holy flock, as the flock of Jerusalem in her solemn feasts; so shall the waste cities be filled with flocks of men: and they shall know that I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
