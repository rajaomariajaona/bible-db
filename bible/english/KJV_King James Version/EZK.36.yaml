    - type: usfm
      marker: add
      children:
      - type: text
        text: land
    - type: text
      text: ' devourest up men, and hast bereaved thy nations; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'therefore thou shalt devour men no more, neither bereave thy nations any more, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Neither will I cause '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' to hear in thee the shame of the heathen any more, neither shalt thou bear the reproach of the people any more, neither shalt thou cause thy nations to fall any more, saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: People to be Renewed
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came unto me, saying, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Son of man, when the house of Israel dwelt in their own land, they defiled it by their own way and by their doings: their way was before me as the uncleanness of a removed woman. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wherefore I poured my fury upon them for the blood that they had shed upon the land, and for their idols '
    - type: usfm
      marker: add
      children:
      - type: text
        text: wherewith
    - type: text
      text: ' they had polluted it: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and I scattered them among the heathen, and they were dispersed through the countries: according to their way and according to their doings I judged them.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; Because the enemy hath said against you, Aha, even the ancient high places are our''s in possession: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they entered unto the heathen, whither they went, they profaned my holy name, when they said to them, These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the people of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and are gone forth out of his land. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But I had pity for mine holy name, which the house of Israel had profaned among the heathen, whither they went.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore say unto the house of Israel, Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; I do not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ' for your sakes, O house of Israel, but for mine holy name''s sake, which ye have profaned among the heathen, whither ye went. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will sanctify my great name, which was profaned among the heathen, which ye have profaned in the midst of them; and the heathen shall know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ', when I shall be sanctified in you before their eyes. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I will take you from among the heathen, and gather you out of all countries, and will bring you into your own land. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then will I sprinkle clean water upon you, and ye shall be clean: from all your filthiness, and from all your idols, will I cleanse you. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A new heart also will I give you, and a new spirit will I put within you: and I will take away the stony heart out of your flesh, and I will give you an heart of flesh. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will put my spirit within you, and cause you to walk in my statutes, and ye shall keep my judgments, and do '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And ye shall dwell in the land that I gave to your fathers; and ye shall be my people, and I will be your God. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will also save you from all your uncleannesses: and I will call for the corn, and will increase it, and lay no famine upon you. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'therefore prophesy and say, Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; Because they have made '
    - type: usfm
      marker: add
      children:
      - type: text
        text: you
    - type: text
      text: ' desolate, and swallowed you up on every side, that ye might be a possession unto the residue of the heathen, and ye are taken up in the lips of talkers, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' an infamy of the people: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will multiply the fruit of the tree, and the increase of the field, that ye shall receive no more reproach of famine among the heathen. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then shall ye remember your own evil ways, and your doings that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' not good, and shall lothe yourselves in your own sight for your iniquities and for your abominations. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Not for your sakes do I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ', saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ', be it known unto you: be ashamed and confounded for your own ways, O house of Israel.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; In the day that I shall have cleansed you from all your iniquities I will also cause '
    - type: usfm
      marker: add
      children:
      - type: text
        text: you
    - type: text
      text: ' to dwell in the cities, and the wastes shall be builded. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the desolate land shall be tilled, whereas it lay desolate in the sight of all that passed by. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they shall say, This land that was desolate is become like the garden of Eden; and the waste and desolate and ruined cities '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are become
    - type: text
      text: ' fenced, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' are inhabited. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the heathen that are left round about you shall know that I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' build the ruined '
    - type: usfm
      marker: add
      children:
      - type: text
        text: places, and
    - type: text
      text: ' plant that that was desolate: I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' have spoken '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and I will do '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; I will yet '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' this be enquired of by the house of Israel, to do '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' for them; I will increase them with men like a flock. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As the holy flock, as the flock of Jerusalem in her solemn feasts; so shall the waste cities be filled with flocks of men: and they shall know that I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'therefore, ye mountains of Israel, hear the word of the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: ' to the mountains, and to the hills, to the rivers, and to the valleys, to the desolate wastes, and to the cities that are forsaken, which became a prey and derision to the residue of the heathen that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' round about; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'therefore thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: GOD
    - type: text
      text: '; Surely in the fire of my jealousy have I spoken against the residue of the heathen, and against all Idumea, which have appointed my land into their possession with the joy of all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
