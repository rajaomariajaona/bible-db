    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yea, I will cause men to walk upon you, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' my people Israel; and they shall possess thee, and thou shalt be their inheritance, and thou shalt no more henceforth bereave them '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of men
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus saith the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
