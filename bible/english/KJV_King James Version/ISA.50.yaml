document_id: ISA.50,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', Where '
  - type: text
    content: is
  - type: text
    content: ' the bill of your mother''s divorcement, whom I have put away? or which of my creditors '
  - type: text
    content: is it
  - type: text
    content: ' to whom I have sold you? Behold, for your iniquities have ye sold yourselves, and for your transgressions is your mother put away. '
  '10':
  - type: text
    content: 'Who '
  - type: text
    content: is
  - type: text
    content: ' among you that feareth the '
  - type: text
    content: LORD
  - type: text
    content: ', that obeyeth the voice of his servant, that walketh '
  - type: text
    content: in
  - type: text
    content: ' darkness, and hath no light? let him trust in the name of the '
  - type: text
    content: LORD
  - type: text
    content: ', and stay upon his God. '
  '11':
  - type: text
    content: 'Behold, all ye that kindle a fire, that compass '
  - type: text
    content: yourselves
  - type: text
    content: ' about with sparks: walk in the light of your fire, and in the sparks '
  - type: text
    content: that
  - type: text
    content: ' ye have kindled. This shall ye have of mine hand; ye shall lie down in sorrow.'
  '2':
  - type: text
    content: 'Wherefore, when I came, '
  - type: text
    content: was there
  - type: text
    content: ' no man? when I called, '
  - type: text
    content: was there
  - type: text
    content: ' none to answer? Is my hand shortened at all, that it cannot redeem? or have I no power to deliver? behold, at my rebuke I dry up the sea, I make the rivers a wilderness: their fish stinketh, because '
  - type: text
    content: there is
  - type: text
    content: ' no water, and dieth for thirst. '
  '3':
  - type: text
    content: I clothe the heavens with blackness, and I make sackcloth their covering.
  - type: heading
    content: The Servant's Endowment
  '4':
  - type: text
    content: 'The Lord '
  - type: text
    content: GOD
  - type: text
    content: ' hath given me the tongue of the learned, that I should know how to speak a word in season to '
  - type: text
    content: him that is
  - type: text
    content: ' weary: he wakeneth morning by morning, he wakeneth mine ear to hear as the learned. '
  '5':
  - type: text
    content: 'The Lord '
  - type: text
    content: GOD
  - type: text
    content: ' hath opened mine ear, and I was not rebellious, neither turned away back. '
  '6':
  - type: text
    content: 'I gave my back to the smiters, and my cheeks to them that plucked off the hair: I hid not my face from shame and spitting. '
  '7':
  - type: text
    content: 'For the Lord '
  - type: text
    content: GOD
  - type: text
    content: ' will help me; therefore shall I not be confounded: therefore have I set my face like a flint, and I know that I shall not be ashamed. '
  '8':
  - type: text
    content: He is
  - type: text
    content: ' near that justifieth me; who will contend with me? let us stand together: who '
  - type: text
    content: is
  - type: text
    content: ' mine adversary? let him come near to me. '
  '9':
  - type: text
    content: 'Behold, the Lord '
  - type: text
    content: GOD
  - type: text
    content: ' will help me; who '
  - type: text
    content: is
  - type: text
    content: ' he '
  - type: text
    content: that
  - type: text
    content: ' shall condemn me? lo, they all shall wax old as a garment; the moth shall eat them up.'
