document_id: ISA.50
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the bill of your mother''s divorcement, whom I have put away? or which of my creditors '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is it
  - type: text
    text: ' to whom I have sold you? Behold, for your iniquities have ye sold yourselves, and for your transgressions is your mother put away. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Wherefore, when I came, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was there
  - type: text
    text: ' no man? when I called, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was there
  - type: text
    text: ' none to answer? Is my hand shortened at all, that it cannot redeem? or have I no power to deliver? behold, at my rebuke I dry up the sea, I make the rivers a wilderness: their fish stinketh, because '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no water, and dieth for thirst. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I clothe the heavens with blackness, and I make sackcloth their covering.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Servant's Endowment
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' hath given me the tongue of the learned, that I should know how to speak a word in season to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him that is
  - type: text
    text: ' weary: he wakeneth morning by morning, he wakeneth mine ear to hear as the learned. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' hath opened mine ear, and I was not rebellious, neither turned away back. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I gave my back to the smiters, and my cheeks to them that plucked off the hair: I hid not my face from shame and spitting. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' will help me; therefore shall I not be confounded: therefore have I set my face like a flint, and I know that I shall not be ashamed. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: add
    children:
    - type: text
      text: He is
  - type: text
    text: ' near that justifieth me; who will contend with me? let us stand together: who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' mine adversary? let him come near to me. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Behold, the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' will help me; who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' shall condemn me? lo, they all shall wax old as a garment; the moth shall eat them up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' among you that feareth the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that obeyeth the voice of his servant, that walketh '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' darkness, and hath no light? let him trust in the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and stay upon his God. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Behold, all ye that kindle a fire, that compass '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yourselves
  - type: text
    text: ' about with sparks: walk in the light of your fire, and in the sparks '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' ye have kindled. This shall ye have of mine hand; ye shall lie down in sorrow.'
