document_id: JOS.17
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'There was also a lot for the tribe of Manasseh; for he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the firstborn of Joseph; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to wit
  - type: text
    text: ', for Machir the firstborn of Manasseh, the father of Gilead: because he was a man of war, therefore he had Gilead and Bashan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'There was also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: a lot
  - type: text
    text: ' for the rest of the children of Manasseh by their families; for the children of Abiezer, and for the children of Helek, and for the children of Asriel, and for the children of Shechem, and for the children of Hepher, and for the children of Shemida: these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' the male children of Manasseh the son of Joseph by their families. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But Zelophehad, the son of Hepher, the son of Gilead, the son of Machir, the son of Manasseh, had no sons, but daughters: and these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the names of his daughters, Mahlah, and Noah, Hoglah, Milcah, and Tirzah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And they came near before Eleazar the priest, and before Joshua the son of Nun, and before the princes, saying, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses to give us an inheritance among our brethren. Therefore according to the commandment of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' he gave them an inheritance among the brethren of their father. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And there fell ten portions to Manasseh, beside the land of Gilead and Bashan, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' on the other side Jordan; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'because the daughters of Manasseh had an inheritance among his sons: and the rest of Manasseh''s sons had the land of Gilead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the coast of Manasseh was from Asher to Michmethah, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: lieth
  - type: text
    text: ' before Shechem; and the border went along on the right hand unto the inhabitants of En-tappuah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Now
  - type: text
    text: ' Manasseh had the land of Tappuah: but Tappuah on the border of Manasseh '
  - type: usfm
    marker: add
    children:
    - type: text
      text: belonged
  - type: text
    text: ' to the children of Ephraim; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and the coast descended unto the river Kanah, southward of the river: these cities of Ephraim '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' among the cities of Manasseh: the coast of Manasseh also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' on the north side of the river, and the outgoings of it were at the sea: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'southward '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it was
  - type: text
    text: ' Ephraim''s, and northward '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it was
  - type: text
    text: ' Manasseh''s, and the sea is his border; and they met together in Asher on the north, and in Issachar on the east. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Manasseh had in Issachar and in Asher Beth-shean and her towns, and Ibleam and her towns, and the inhabitants of Dor and her towns, and the inhabitants of Endor and her towns, and the inhabitants of Taanach and her towns, and the inhabitants of Megiddo and her towns, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' three countries. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Yet the children of Manasseh could not drive out '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the inhabitants of
  - type: text
    text: ' those cities; but the Canaanites would dwell in that land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Yet it came to pass, when the children of Israel were waxen strong, that they put the Canaanites to tribute; but did not utterly drive them out.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And the children of Joseph spake unto Joshua, saying, Why hast thou given me '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' one lot and one portion to inherit, seeing I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' a great people, forasmuch as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath blessed me hitherto? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Joshua answered them, If thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' a great people, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' get thee up to the wood '
  - type: usfm
    marker: add
    children:
    - type: text
      text: country
  - type: text
    text: ', and cut down for thyself there in the land of the Perizzites and of the giants, if mount Ephraim be too narrow for thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the children of Joseph said, The hill is not enough for us: and all the Canaanites that dwell in the land of the valley have chariots of iron, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: both they
  - type: text
    text: ' who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' of Beth-shean and her towns, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they
  - type: text
    text: ' who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' of the valley of Jezreel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And Joshua spake unto the house of Joseph, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' to Ephraim and to Manasseh, saying, Thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' a great people, and hast great power: thou shalt not have one lot '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'only:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'but the mountain shall be thine; for it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a wood, and thou shalt cut it down: and the outgoings of it shall be thine: for thou shalt drive out the Canaanites, though they have iron chariots, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' though they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' strong.'
