verses:
  '1':
  - type: text
    content: 'In those days the multitude being very great, and having nothing to eat, Jesus called his disciples '
  - type: text
    content: unto him
  - type: text
    content: ', and saith unto them, '
  '10':
  - type: text
    content: 'And straightway he entered into a ship with his disciples, and came into the parts of Dalmanutha. '
  '11':
  - type: text
    content: 'And the Pharisees came forth, and began to question with him, seeking of him a sign from heaven, tempting him. '
  '12':
  - type: text
    content: 'And he sighed deeply in his spirit, and saith, '
  - type: text
    content: Why doth this generation seek after a sign? verily I say unto you, There shall no sign be given unto this generation.
  - type: text
    content: ' '
  '13':
  - type: text
    content: And he left them, and entering into the ship again departed to the other side.
  '14':
  - type: text
    content: 'Now '
  - type: text
    content: the disciples
  - type: text
    content: ' had forgotten to take bread, neither had they in the ship with them more than one loaf. '
  '15':
  - type: text
    content: 'And he charged them, saying, '
  - type: text
    content: 'Take heed, beware of the leaven of the Pharisees, and '
  - type: text
    content: of
  - type: text
    content: ' the leaven of Herod.'
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'And they reasoned among themselves, saying, '
  - type: text
    content: It is
  - type: text
    content: ' because we have no bread. '
  '17':
  - type: text
    content: 'And when Jesus knew '
  - type: text
    content: it
  - type: text
    content: ', he saith unto them, '
  - type: text
    content: Why reason ye, because ye have no bread? perceive ye not yet, neither understand? have ye your heart yet hardened?
  - type: text
    content: ' '
  '18':
  - type: text
    content: Having eyes, see ye not? and having ears, hear ye not? and do ye not remember?
  - type: text
    content: ' '
  '19':
  - type: text
    content: When I brake the five loaves among five thousand, how many baskets full of fragments took ye up?
  - type: text
    content: ' They say unto him, Twelve. '
  '2':
  - type: text
    content: 'I have compassion on the multitude, because they have now been with me three days, and have nothing to eat:'
  - type: text
    content: ' '
  '20':
  - type: text
    content: And when the seven among four thousand, how many baskets full of fragments took ye up?
  - type: text
    content: ' And they said, Seven. '
  '21':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: How is it that ye do not understand?
  - type: heading
    content: Bethsaida
  '22':
  - type: text
    content: 'And he cometh to Bethsaida; and they bring a blind man unto him, and besought him to touch him. '
  '23':
  - type: text
    content: 'And he took the blind man by the hand, and led him out of the town; and when he had spit on his eyes, and put his hands upon him, he asked him if he saw ought. '
  '24':
  - type: text
    content: 'And he looked up, and said, I see men as trees, walking. '
  '25':
  - type: text
    content: 'After that he put '
  - type: text
    content: his
  - type: text
    content: ' hands again upon his eyes, and made him look up: and he was restored, and saw every man clearly. '
  '26':
  - type: text
    content: 'And he sent him away to his house, saying, '
  - type: text
    content: 'Neither go into the town, nor tell '
  - type: text
    content: it
  - type: text
    content: ' to any in the town.'
  - type: heading
    content: Cæsarea Philippi
  '27':
  - type: text
    content: 'And Jesus went out, and his disciples, into the towns of Cæsarea Philippi: and by the way he asked his disciples, saying unto them, '
  - type: text
    content: Whom do men say that I am?
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'And they answered, John the Baptist: but some '
  - type: text
    content: say
  - type: text
    content: ', Elias; and others, One of the prophets. '
  '29':
  - type: text
    content: 'And he saith unto them, '
  - type: text
    content: But whom say ye that I am?
  - type: text
    content: ' And Peter answereth and saith unto him, Thou art the Christ. '
  '3':
  - type: text
    content: 'and if I send them away fasting to their own houses, they will faint by the way: for divers of them came from far.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: And he charged them that they should tell no man of him.
  '31':
  - type: text
    content: 'And he began to teach them, that the Son of man must suffer many things, and be rejected of the elders, and '
  - type: text
    content: of
  - type: text
    content: ' the chief priests, and scribes, and be killed, and after three days rise again. '
  '32':
  - type: text
    content: 'And he spake that saying openly. And Peter took him, and began to rebuke him. '
  '33':
  - type: text
    content: 'But when he had turned about and looked on his disciples, he rebuked Peter, saying, '
  - type: text
    content: 'Get thee behind me, Satan: for thou savourest not the things that be of God, but the things that be of men'
  - type: text
    content: .
  '34':
  - type: text
    content: 'And when he had called the people '
  - type: text
    content: unto him
  - type: text
    content: ' with his disciples also, he said unto them, '
  - type: text
    content: Whosoever will come after me, let him deny himself, and take up his cross, and follow me.
  - type: text
    content: ' '
  '35':
  - type: text
    content: For whosoever will save his life shall lose it; but whosoever shall lose his life for my sake and the gospel's, the same shall save it.
  - type: text
    content: ' '
  '36':
  - type: text
    content: For what shall it profit a man, if he shall gain the whole world, and lose his own soul?
  - type: text
    content: ' '
  '37':
  - type: text
    content: Or what shall a man give in exchange for his soul?
  - type: text
    content: ' '
  '38':
  - type: text
    content: Whosoever therefore shall be ashamed of me and of my words in this adulterous and sinful generation; of him also shall the Son of man be ashamed, when he cometh in the glory of his Father with the holy angels.
  '4':
  - type: text
    content: 'And his disciples answered him, From whence can a man satisfy these '
  - type: text
    content: men
  - type: text
    content: ' with bread here in the wilderness? '
  '5':
  - type: text
    content: 'And he asked them, '
  - type: text
    content: How many loaves have ye?
  - type: text
    content: ' And they said, Seven. '
  '6':
  - type: text
    content: 'And he commanded the people to sit down on the ground: and he took the seven loaves, and gave thanks, and brake, and gave to his disciples to set before '
  - type: text
    content: them
  - type: text
    content: '; and they did set '
  - type: text
    content: them
  - type: text
    content: ' before the people. '
  '7':
  - type: text
    content: 'And they had a few small fishes: and he blessed, and commanded to set them also before '
  - type: text
    content: them
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'So they did eat, and were filled: and they took up of the broken '
  - type: text
    content: meat
  - type: text
    content: ' that was left seven baskets. '
  '9':
  - type: text
    content: 'And they that had eaten were about four thousand: and he sent them away.'
  - type: heading
    content: Dalmanutha
