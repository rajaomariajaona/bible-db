document_id: MRK.8
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In those days the multitude being very great, and having nothing to eat, Jesus called his disciples '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unto him
  - type: text
    text: ', and saith unto them, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I have compassion on the multitude, because they have now been with me three days, and have nothing to eat:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and if I send them away fasting to their own houses, they will faint by the way: for divers of them came from far.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And his disciples answered him, From whence can a man satisfy these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men
  - type: text
    text: ' with bread here in the wilderness? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And he asked them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: How many loaves have ye?
  - type: text
    text: ' And they said, Seven. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he commanded the people to sit down on the ground: and he took the seven loaves, and gave thanks, and brake, and gave to his disciples to set before '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: '; and they did set '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' before the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And they had a few small fishes: and he blessed, and commanded to set them also before '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So they did eat, and were filled: and they took up of the broken '
  - type: usfm
    marker: add
    children:
    - type: text
      text: meat
  - type: text
    text: ' that was left seven baskets. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And they that had eaten were about four thousand: and he sent them away.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Dalmanutha
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And straightway he entered into a ship with his disciples, and came into the parts of Dalmanutha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the Pharisees came forth, and began to question with him, seeking of him a sign from heaven, tempting him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And he sighed deeply in his spirit, and saith, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Why doth this generation seek after a sign? verily I say unto you, There shall no sign be given unto this generation.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And he left them, and entering into the ship again departed to the other side.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the disciples
  - type: text
    text: ' had forgotten to take bread, neither had they in the ship with them more than one loaf. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And he charged them, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Take heed, beware of the leaven of the Pharisees, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' the leaven of Herod.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And they reasoned among themselves, saying, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' because we have no bread. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And when Jesus knew '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', he saith unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Why reason ye, because ye have no bread? perceive ye not yet, neither understand? have ye your heart yet hardened?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Having eyes, see ye not? and having ears, hear ye not? and do ye not remember?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: When I brake the five loaves among five thousand, how many baskets full of fragments took ye up?
  - type: text
    text: ' They say unto him, Twelve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And when the seven among four thousand, how many baskets full of fragments took ye up?
  - type: text
    text: ' And they said, Seven. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And he said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: How is it that ye do not understand?
- type: usfm
  marker: s2
  children:
  - type: text
    text: Bethsaida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And he cometh to Bethsaida; and they bring a blind man unto him, and besought him to touch him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And he took the blind man by the hand, and led him out of the town; and when he had spit on his eyes, and put his hands upon him, he asked him if he saw ought. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And he looked up, and said, I see men as trees, walking. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'After that he put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' hands again upon his eyes, and made him look up: and he was restored, and saw every man clearly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And he sent him away to his house, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Neither go into the town, nor tell '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' to any in the town.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Cæsarea Philippi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And Jesus went out, and his disciples, into the towns of Cæsarea Philippi: and by the way he asked his disciples, saying unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Whom do men say that I am?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And they answered, John the Baptist: but some '
  - type: usfm
    marker: add
    children:
    - type: text
      text: say
  - type: text
    text: ', Elias; and others, One of the prophets. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And he saith unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But whom say ye that I am?
  - type: text
    text: ' And Peter answereth and saith unto him, Thou art the Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: And he charged them that they should tell no man of him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And he began to teach them, that the Son of man must suffer many things, and be rejected of the elders, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' the chief priests, and scribes, and be killed, and after three days rise again. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And he spake that saying openly. And Peter took him, and began to rebuke him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'But when he had turned about and looked on his disciples, he rebuked Peter, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Get thee behind me, Satan: for thou savourest not the things that be of God, but the things that be of men'
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And when he had called the people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unto him
  - type: text
    text: ' with his disciples also, he said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Whosoever will come after me, let him deny himself, and take up his cross, and follow me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For whosoever will save his life shall lose it; but whosoever shall lose his life for my sake and the gospel's, the same shall save it.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For what shall it profit a man, if he shall gain the whole world, and lose his own soul?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Or what shall a man give in exchange for his soul?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Whosoever therefore shall be ashamed of me and of my words in this adulterous and sinful generation; of him also shall the Son of man be ashamed, when he cometh in the glory of his Father with the holy angels.
