document_id: JHN.8,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jesus went unto the mount of Olives. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'When Jesus had lifted up himself, and saw none but the woman, he said unto her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Woman, where are those thine accusers? hath no man condemned thee?
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'She said, No man, Lord. And Jesus said unto her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Neither do I condemn thee: go, and sin no more.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Light of the World
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then spake Jesus again unto them, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I am the light of the world: he that followeth me shall not walk in darkness, but shall have the light of life.'
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'The Pharisees therefore said unto him, Thou bearest record of thyself; thy record is not true. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Jesus answered and said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Though I bear record of myself, '
      - type: usfm
        marker: add
        children:
        - type: text
          text: yet
      - type: text
        text: ' my record is true: for I know whence I came, and whither I go; but ye cannot tell whence I come, and whither I go.'
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ye judge after the flesh; I judge no man.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And yet if I judge, my judgment is true: for I am not alone, but I and the Father that sent me.'
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It is also written in your law, that the testimony of two men is true.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I am one that bear witness of myself, and the Father that sent me beareth witness of me.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then said they unto him, Where is thy Father? Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ye neither know me, nor my Father: if ye had known me, ye should have known my Father also.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And early in the morning he came again into the temple, and all the people came unto him; and he sat down, and taught them. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'These words spake Jesus in the treasury, as he taught in the temple: and no man laid hands on him; for his hour was not yet come.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then said Jesus again unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I go my way, and ye shall seek me, and shall die in your sins: whither I go, ye cannot come.'
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Then said the Jews, Will he kill himself? because he saith, Whither I go, ye cannot come. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And he said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ye are from beneath; I am from above: ye are of this world; I am not of this world.'
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I said therefore unto you, that ye shall die in your sins: for if ye believe not that I am '
      - type: usfm
        marker: add
        children:
        - type: text
          text: he
      - type: text
        text: ', ye shall die in your sins.'
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Then said they unto him, Who art thou? And Jesus saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Even '
      - type: usfm
        marker: add
        children:
        - type: text
          text: the same
      - type: text
        text: ' that I said unto you from the beginning.'
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I have many things to say and to judge of you: but he that sent me is true; and I speak to the world those things which I have heard of him.'
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'They understood not that he spake to them of the Father. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Then said Jesus unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'When ye have lifted up the Son of man, then shall ye know that I am '
      - type: usfm
        marker: add
        children:
        - type: text
          text: he
      - type: text
        text: ', and '
      - type: usfm
        marker: add
        children:
        - type: text
          text: that
      - type: text
        text: ' I do nothing of myself; but as my Father hath taught me, I speak these things.'
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And he that sent me is with me: the Father hath not left me alone; for I do always those things that please him.'
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And the scribes and Pharisees brought unto him a woman taken in adultery; and when they had set her in the midst, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: As he spake these words, many believed on him.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Then said Jesus to those Jews which believed on him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'If ye continue in my word, '
      - type: usfm
        marker: add
        children:
        - type: text
          text: then
      - type: text
        text: ' are ye my disciples indeed;'
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and ye shall know the truth, and the truth shall make you free.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'They answered him, We be Abraham''s seed, and were never in bondage to any man: how sayest thou, Ye shall be made free? '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Jesus answered them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Verily, verily, I say unto you, Whosoever committeth sin is the servant of sin.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And the servant abideth not in the house for ever: '
      - type: usfm
        marker: add
        children:
        - type: text
          text: but
      - type: text
        text: ' the Son abideth ever.'
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If the Son therefore shall make you free, ye shall be free indeed.
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I know that ye are Abraham's seed; but ye seek to kill me, because my word hath no place in you.
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I speak that which I have seen with my Father: and ye do that which ye have seen with your father.'
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'They answered and said unto him, Abraham is our father. Jesus saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If ye were Abraham's children, ye would do the works of Abraham.
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'they say unto him, Master, this woman was taken in adultery, in the very act. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But now ye seek to kill me, a man that hath told you the truth, which I have heard of God: this did not Abraham.'
    - type: text
      text: ' '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ye do the deeds of your father.
    - type: text
      text: ' Then said they to him, We be not born of fornication; we have one Father, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' God.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Jesus said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'If God were your Father, ye would love me: for I proceeded forth and came from God; neither came I of myself, but he sent me.'
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Why do ye not understand my speech? '
      - type: usfm
        marker: add
        children:
        - type: text
          text: even
      - type: text
        text: ' because ye cannot hear my word.'
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ye are of '
      - type: usfm
        marker: add
        children:
        - type: text
          text: your
      - type: text
        text: ' father the devil, and the lusts of your father ye will do. He was a murderer from the beginning, and abode not in the truth, because there is no truth in him. When he speaketh a lie, he speaketh of his own: for he is a liar, and the father of it.'
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And because I tell '
      - type: usfm
        marker: add
        children:
        - type: text
          text: you
      - type: text
        text: ' the truth, ye believe me not.'
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Which of you convinceth me of sin? And if I say the truth, why do ye not believe me?
    - type: text
      text: ' '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'He that is of God heareth God''s words: ye therefore hear '
      - type: usfm
        marker: add
        children:
        - type: text
          text: them
      - type: text
        text: ' not, because ye are not of God.'
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Then answered the Jews, and said unto him, Say we not well that thou art a Samaritan, and hast a devil? '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I have not a devil; but I honour my Father, and ye do dishonour me.
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Now Moses in the law commanded us, that such should be stoned: but what sayest thou? '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And I seek not mine own glory: there is one that seeketh and judgeth.'
    - type: text
      text: ' '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Verily, verily, I say unto you, If a man keep my saying, he shall never see death.
    - type: text
      text: ' '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Then said the Jews unto him, Now we know that thou hast a devil. Abraham is dead, and the prophets; and thou sayest, If a man keep my saying, he shall never taste of death. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'Art thou greater than our father Abraham, which is dead? and the prophets are dead: whom makest thou thyself? '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'If I honour myself, my honour is nothing: it is my Father that honoureth me; of whom ye say, that he is your God:'
    - type: text
      text: ' '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'yet ye have not known him; but I know him: and if I should say, I know him not, I shall be a liar like unto you: but I know him, and keep his saying.'
    - type: text
      text: ' '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Your father Abraham rejoiced to see my day: and he saw '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ', and was glad.'
    - type: text
      text: ' '
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'Then said the Jews unto him, Thou art not yet fifty years old, and hast thou seen Abraham? '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: 'Jesus said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Verily, verily, I say unto you, Before Abraham was, I am.
    - type: text
      text: ' '
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: 'Then took they up stones to cast at him: but Jesus hid himself, and went out of the temple, going through the midst of them, and so passed by.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'This they said, tempting him, that they might have to accuse him. But Jesus stooped down, and with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' finger wrote on the ground, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as though he heard them not
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So when they continued asking him, he lifted up himself, and said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He that is without sin among you, let him first cast a stone at her.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And again he stooped down, and wrote on the ground. '
  '9':
  - type: usfm
