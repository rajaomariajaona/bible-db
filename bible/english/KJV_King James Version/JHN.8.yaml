document_id: JHN.8,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Jesus went unto the mount of Olives. '
  '10':
  - type: text
    content: 'When Jesus had lifted up himself, and saw none but the woman, he said unto her, '
  - type: text
    content: Woman, where are those thine accusers? hath no man condemned thee?
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'She said, No man, Lord. And Jesus said unto her, '
  - type: text
    content: 'Neither do I condemn thee: go, and sin no more.'
  - type: heading
    content: The Light of the World
  '12':
  - type: text
    content: 'Then spake Jesus again unto them, saying, '
  - type: text
    content: 'I am the light of the world: he that followeth me shall not walk in darkness, but shall have the light of life.'
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'The Pharisees therefore said unto him, Thou bearest record of thyself; thy record is not true. '
  '14':
  - type: text
    content: 'Jesus answered and said unto them, '
  - type: text
    content: 'Though I bear record of myself, '
  - type: text
    content: yet
  - type: text
    content: ' my record is true: for I know whence I came, and whither I go; but ye cannot tell whence I come, and whither I go.'
  - type: text
    content: ' '
  '15':
  - type: text
    content: Ye judge after the flesh; I judge no man.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'And yet if I judge, my judgment is true: for I am not alone, but I and the Father that sent me.'
  - type: text
    content: ' '
  '17':
  - type: text
    content: It is also written in your law, that the testimony of two men is true.
  - type: text
    content: ' '
  '18':
  - type: text
    content: I am one that bear witness of myself, and the Father that sent me beareth witness of me.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Then said they unto him, Where is thy Father? Jesus answered, '
  - type: text
    content: 'Ye neither know me, nor my Father: if ye had known me, ye should have known my Father also.'
  '2':
  - type: text
    content: 'And early in the morning he came again into the temple, and all the people came unto him; and he sat down, and taught them. '
  '20':
  - type: text
    content: 'These words spake Jesus in the treasury, as he taught in the temple: and no man laid hands on him; for his hour was not yet come.'
  '21':
  - type: text
    content: 'Then said Jesus again unto them, '
  - type: text
    content: 'I go my way, and ye shall seek me, and shall die in your sins: whither I go, ye cannot come.'
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Then said the Jews, Will he kill himself? because he saith, Whither I go, ye cannot come. '
  '23':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: 'Ye are from beneath; I am from above: ye are of this world; I am not of this world.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'I said therefore unto you, that ye shall die in your sins: for if ye believe not that I am '
  - type: text
    content: he
  - type: text
    content: ', ye shall die in your sins.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Then said they unto him, Who art thou? And Jesus saith unto them, '
  - type: text
    content: 'Even '
  - type: text
    content: the same
  - type: text
    content: ' that I said unto you from the beginning.'
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'I have many things to say and to judge of you: but he that sent me is true; and I speak to the world those things which I have heard of him.'
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'They understood not that he spake to them of the Father. '
  '28':
  - type: text
    content: 'Then said Jesus unto them, '
  - type: text
    content: 'When ye have lifted up the Son of man, then shall ye know that I am '
  - type: text
    content: he
  - type: text
    content: ', and '
  - type: text
    content: that
  - type: text
    content: ' I do nothing of myself; but as my Father hath taught me, I speak these things.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'And he that sent me is with me: the Father hath not left me alone; for I do always those things that please him.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'And the scribes and Pharisees brought unto him a woman taken in adultery; and when they had set her in the midst, '
  '30':
  - type: text
    content: As he spake these words, many believed on him.
  '31':
  - type: text
    content: 'Then said Jesus to those Jews which believed on him, '
  - type: text
    content: 'If ye continue in my word, '
  - type: text
    content: then
  - type: text
    content: ' are ye my disciples indeed;'
  - type: text
    content: ' '
  '32':
  - type: text
    content: and ye shall know the truth, and the truth shall make you free.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'They answered him, We be Abraham''s seed, and were never in bondage to any man: how sayest thou, Ye shall be made free? '
  '34':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: Verily, verily, I say unto you, Whosoever committeth sin is the servant of sin.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'And the servant abideth not in the house for ever: '
  - type: text
    content: but
  - type: text
    content: ' the Son abideth ever.'
  - type: text
    content: ' '
  '36':
  - type: text
    content: If the Son therefore shall make you free, ye shall be free indeed.
  - type: text
    content: ' '
  '37':
  - type: text
    content: I know that ye are Abraham's seed; but ye seek to kill me, because my word hath no place in you.
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'I speak that which I have seen with my Father: and ye do that which ye have seen with your father.'
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'They answered and said unto him, Abraham is our father. Jesus saith unto them, '
  - type: text
    content: If ye were Abraham's children, ye would do the works of Abraham.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'they say unto him, Master, this woman was taken in adultery, in the very act. '
  '40':
  - type: text
    content: 'But now ye seek to kill me, a man that hath told you the truth, which I have heard of God: this did not Abraham.'
  - type: text
    content: ' '
  '41':
  - type: text
    content: Ye do the deeds of your father.
  - type: text
    content: ' Then said they to him, We be not born of fornication; we have one Father, '
  - type: text
    content: even
  - type: text
    content: ' God.'
  '42':
  - type: text
    content: 'Jesus said unto them, '
  - type: text
    content: 'If God were your Father, ye would love me: for I proceeded forth and came from God; neither came I of myself, but he sent me.'
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'Why do ye not understand my speech? '
  - type: text
    content: even
  - type: text
    content: ' because ye cannot hear my word.'
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'Ye are of '
  - type: text
    content: your
  - type: text
    content: ' father the devil, and the lusts of your father ye will do. He was a murderer from the beginning, and abode not in the truth, because there is no truth in him. When he speaketh a lie, he speaketh of his own: for he is a liar, and the father of it.'
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'And because I tell '
  - type: text
    content: you
  - type: text
    content: ' the truth, ye believe me not.'
  - type: text
    content: ' '
  '46':
  - type: text
    content: Which of you convinceth me of sin? And if I say the truth, why do ye not believe me?
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'He that is of God heareth God''s words: ye therefore hear '
  - type: text
    content: them
  - type: text
    content: ' not, because ye are not of God.'
  '48':
  - type: text
    content: 'Then answered the Jews, and said unto him, Say we not well that thou art a Samaritan, and hast a devil? '
  '49':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: I have not a devil; but I honour my Father, and ye do dishonour me.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Now Moses in the law commanded us, that such should be stoned: but what sayest thou? '
  '50':
  - type: text
    content: 'And I seek not mine own glory: there is one that seeketh and judgeth.'
  - type: text
    content: ' '
  '51':
  - type: text
    content: Verily, verily, I say unto you, If a man keep my saying, he shall never see death.
  - type: text
    content: ' '
  '52':
  - type: text
    content: 'Then said the Jews unto him, Now we know that thou hast a devil. Abraham is dead, and the prophets; and thou sayest, If a man keep my saying, he shall never taste of death. '
  '53':
  - type: text
    content: 'Art thou greater than our father Abraham, which is dead? and the prophets are dead: whom makest thou thyself? '
  '54':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: 'If I honour myself, my honour is nothing: it is my Father that honoureth me; of whom ye say, that he is your God:'
  - type: text
    content: ' '
  '55':
  - type: text
    content: 'yet ye have not known him; but I know him: and if I should say, I know him not, I shall be a liar like unto you: but I know him, and keep his saying.'
  - type: text
    content: ' '
  '56':
  - type: text
    content: 'Your father Abraham rejoiced to see my day: and he saw '
  - type: text
    content: it
  - type: text
    content: ', and was glad.'
  - type: text
    content: ' '
  '57':
  - type: text
    content: 'Then said the Jews unto him, Thou art not yet fifty years old, and hast thou seen Abraham? '
  '58':
  - type: text
    content: 'Jesus said unto them, '
  - type: text
    content: Verily, verily, I say unto you, Before Abraham was, I am.
  - type: text
    content: ' '
  '59':
  - type: text
    content: 'Then took they up stones to cast at him: but Jesus hid himself, and went out of the temple, going through the midst of them, and so passed by.'
  '6':
  - type: text
    content: 'This they said, tempting him, that they might have to accuse him. But Jesus stooped down, and with '
  - type: text
    content: his
  - type: text
    content: ' finger wrote on the ground, '
  - type: text
    content: as though he heard them not
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'So when they continued asking him, he lifted up himself, and said unto them, '
  - type: text
    content: He that is without sin among you, let him first cast a stone at her.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'And again he stooped down, and wrote on the ground. '
  '9':
  - type: text
    content: 'And they which heard '
  - type: text
    content: it
  - type: text
    content: ', being convicted by '
  - type: text
    content: their own
  - type: text
    content: ' conscience, went out one by one, beginning at the eldest, '
  - type: text
    content: even
  - type: text
    content: ' unto the last: and Jesus was left alone, and the woman standing in the midst. '
