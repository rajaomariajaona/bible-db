document_id: EZK.7
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: A Day of Doom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moreover the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came unto me, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Also, thou son of man, thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: ' unto the land of Israel; An end, the end is come upon the four corners of the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Now '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the end '
  - type: usfm
    marker: add
    children:
    - type: text
      text: come
  - type: text
    text: ' upon thee, and I will send mine anger upon thee, and will judge thee according to thy ways, and will recompense upon thee all thine abominations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And mine eye shall not spare thee, neither will I have pity: but I will recompense thy ways upon thee, and thine abominations shall be in the midst of thee: and ye shall know that I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Thus saith the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: GOD
  - type: text
    text: '; An evil, an only evil, behold, is come. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'An end is come, the end is come: it watcheth for thee; behold, it is come. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The morning is come unto thee, O thou that dwellest in the land: the time is come, the day of trouble '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' near, and not the sounding again of the mountains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now will I shortly pour out my fury upon thee, and accomplish mine anger upon thee: and I will judge thee according to thy ways, and will recompense thee for all thine abominations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And mine eye shall not spare, neither will I have pity: I will recompense thee according to thy ways and thine abominations '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' are in the midst of thee; and ye shall know that I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' that smiteth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Behold the day, behold, it is come: the morning is gone forth; the rod hath blossomed, pride hath budded. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Violence is risen up into a rod of wickedness: none of them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall remain
  - type: text
    text: ', nor of their multitude, nor of any of their''s: neither '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall there be
  - type: text
    text: ' wailing for them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The time is come, the day draweth near: let not the buyer rejoice, nor the seller mourn: for wrath '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon all the multitude thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For the seller shall not return to that which is sold, although they were yet alive: for the vision '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' touching the whole multitude thereof, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' shall not return; neither shall any strengthen himself in the iniquity of his life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'They have blown the trumpet, even to make all ready; but none goeth to the battle: for my wrath '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' upon all the multitude thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The sword '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' without, and the pestilence and the famine within: he that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the field shall die with the sword; and he that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the city, famine and pestilence shall devour him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But they that escape of them shall escape, and shall be on the mountains like doves of the valleys, all of them mourning, every one for his iniquity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'All hands shall be feeble, and all knees shall be weak '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'They shall also gird '
  - type: usfm
    marker: add
    children:
    - type: text
      text: themselves
  - type: text
    text: ' with sackcloth, and horror shall cover them; and shame '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' upon all faces, and baldness upon all their heads. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'They shall cast their silver in the streets, and their gold shall be removed: their silver and their gold shall not be able to deliver them in the day of the wrath of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': they shall not satisfy their souls, neither fill their bowels: because it is the stumblingblock of their iniquity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'As for the beauty of his ornament, he set it in majesty: but they made the images of their abominations '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' of their detestable things therein: therefore have I set it far from them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And I will give it into the hands of the strangers for a prey, and to the wicked of the earth for a spoil; and they shall pollute it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'My face will I turn also from them, and they shall pollute my secret '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'place:'
  - type: text
    text: ' for the robbers shall enter into it, and defile it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Make a chain: for the land is full of bloody crimes, and the city is full of violence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Wherefore I will bring the worst of the heathen, and they shall possess their houses: I will also make the pomp of the strong to cease; and their holy places shall be defiled. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Destruction cometh; and they shall seek peace, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there shall be
  - type: text
    text: ' none. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mischief shall come upon mischief, and rumour shall be upon rumour; then shall they seek a vision of the prophet; but the law shall perish from the priest, and counsel from the ancients. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The king shall mourn, and the prince shall be clothed with desolation, and the hands of the people of the land shall be troubled: I will do unto them after their way, and according to their deserts will I judge them; and they shall know that I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
