document_id: PSA.9,1
type_code: eng
verses:
  '1':
  - type: text
    content: To the chief Musician upon Muth-labben, A Psalm of David.
  - type: heading
    content: א Aleph
  - type: text
    content: 'I will praise '
  - type: text
    content: thee
  - type: text
    content: ', O '
  - type: text
    content: LORD
  - type: text
    content: ', with my whole heart;'
  - type: text
    content: I will shew forth all thy marvellous works.
  '10':
  - type: text
    content: 'And they that know thy name will put their trust in thee:'
  - type: text
    content: 'For thou, '
  - type: text
    content: LORD
  - type: text
    content: ', hast not forsaken them that seek thee.'
  - type: heading
    content: ז Zain
  '11':
  - type: text
    content: 'Sing praises to the '
  - type: text
    content: LORD
  - type: text
    content: ', which dwelleth in Zion:'
  - type: text
    content: Declare among the people his doings.
  '12':
  - type: text
    content: 'When he maketh inquisition for blood, he remembereth them:'
  - type: text
    content: He forgetteth not the cry of the humble.
  - type: heading
    content: ח Het
  '13':
  - type: text
    content: 'Have mercy upon me, O '
  - type: text
    content: LORD
  - type: text
    content: '; Consider my trouble '
  - type: text
    content: which I suffer
  - type: text
    content: ' of them that hate me,'
  - type: text
    content: 'Thou that liftest me up from the gates of death:'
  '14':
  - type: text
    content: 'That I may shew forth all thy praise in the gates of the daughter of Zion:'
  - type: text
    content: I will rejoice in thy salvation.
  - type: heading
    content: ט Tet
  '15':
  - type: text
    content: 'The heathen are sunk down in the pit '
  - type: text
    content: that
  - type: text
    content: ' they made:'
  - type: text
    content: In the net which they hid is their own foot taken.
  '16':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' is known '
  - type: text
    content: by
  - type: text
    content: ' the judgment '
  - type: text
    content: which
  - type: text
    content: ' he executeth:'
  - type: text
    content: 'The wicked is snared in the work of his own hands. '
  - type: text
    content: Higgaion. Selah.
  - type: heading
    content: י Yod
  '17':
  - type: text
    content: The wicked shall be turned into hell,
  - type: text
    content: And
  - type: text
    content: ' all the nations that forget God.'
  - type: heading
    content: כ Kaph
  '18':
  - type: text
    content: 'For the needy shall not alway be forgotten:'
  - type: text
    content: 'The expectation of the poor shall '
  - type: text
    content: not
  - type: text
    content: ' perish for ever.'
  '19':
  - type: text
    content: 'Arise, O '
  - type: text
    content: LORD
  - type: text
    content: '; let not man prevail:'
  - type: text
    content: Let the heathen be judged in thy sight.
  '2':
  - type: text
    content: 'I will be glad and rejoice in thee:'
  - type: text
    content: I will sing praise to thy name, O thou Most High.
  - type: heading
    content: ב Bet
  '20':
  - type: text
    content: 'Put them in fear, O '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: That
  - type: text
    content: ' the nations may know themselves '
  - type: text
    content: to be but
  - type: text
    content: ' men. '
  - type: text
    content: Selah.
  '3':
  - type: text
    content: When mine enemies are turned back,
  - type: text
    content: They shall fall and perish at thy presence.
  '4':
  - type: text
    content: For thou hast maintained my right and my cause;
  - type: text
    content: Thou satest in the throne judging right.
  - type: heading
    content: ג Gimel
  '5':
  - type: text
    content: Thou hast rebuked the heathen, thou hast destroyed the wicked,
  - type: text
    content: Thou hast put out their name for ever and ever.
  '6':
  - type: text
    content: 'O thou enemy, destructions are come to a perpetual end:'
  - type: text
    content: And thou hast destroyed cities; Their memorial is perished with them.
  - type: heading
    content: ה He
  '7':
  - type: text
    content: 'But the '
  - type: text
    content: LORD
  - type: text
    content: ' shall endure for ever:'
  - type: text
    content: He hath prepared his throne for judgment.
  '8':
  - type: text
    content: And he shall judge the world in righteousness,
  - type: text
    content: He shall minister judgment to the people in uprightness.
  - type: heading
    content: ו Waw
  '9':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' also will be a refuge for the oppressed,'
  - type: text
    content: A refuge in times of trouble.
