document_id: PSA.9,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the chief Musician upon Muth-labben, A Psalm of David.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: א Aleph
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will praise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thee
    - type: text
      text: ', O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', with my whole heart;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will shew forth all thy marvellous works.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And they that know thy name will put their trust in thee:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For thou, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', hast not forsaken them that seek thee.'
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ז Zain
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sing praises to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', which dwelleth in Zion:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Declare among the people his doings.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When he maketh inquisition for blood, he remembereth them:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He forgetteth not the cry of the humble.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ח Het
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Have mercy upon me, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; Consider my trouble '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which I suffer
    - type: text
      text: ' of them that hate me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Thou that liftest me up from the gates of death:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'That I may shew forth all thy praise in the gates of the daughter of Zion:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will rejoice in thy salvation.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ט Tet
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The heathen are sunk down in the pit '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' they made:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the net which they hid is their own foot taken.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' is known '
    - type: usfm
      marker: add
      children:
      - type: text
        text: by
    - type: text
      text: ' the judgment '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' he executeth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The wicked is snared in the work of his own hands. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Higgaion. Selah.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: י Yod
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked shall be turned into hell,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' all the nations that forget God.'
  - type: usfm
    marker: qa
    children:
    - type: text
      text: כ Kaph
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the needy shall not alway be forgotten:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The expectation of the poor shall '
    - type: usfm
      marker: add
      children:
      - type: text
        text: not
    - type: text
      text: ' perish for ever.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Arise, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; let not man prevail:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let the heathen be judged in thy sight.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will be glad and rejoice in thee:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will sing praise to thy name, O thou Most High.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ב Bet
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Put them in fear, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ':'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: That
    - type: text
      text: ' the nations may know themselves '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be but
    - type: text
      text: ' men. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When mine enemies are turned back,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They shall fall and perish at thy presence.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For thou hast maintained my right and my cause;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou satest in the throne judging right.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ג Gimel
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thou hast rebuked the heathen, thou hast destroyed the wicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou hast put out their name for ever and ever.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O thou enemy, destructions are come to a perpetual end:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thou hast destroyed cities; Their memorial is perished with them.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ה He
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall endure for ever:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He hath prepared his throne for judgment.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he shall judge the world in righteousness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shall minister judgment to the people in uprightness.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ו Waw
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' also will be a refuge for the oppressed,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A refuge in times of trouble.
