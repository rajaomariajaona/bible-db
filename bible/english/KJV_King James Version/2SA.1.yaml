document_id: 2SA.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now it came to pass after the death of Saul, when David was returned from the slaughter of the Amalekites, and David had abode two days in Ziklag; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'So I stood upon him, and slew him, because I was sure that he could not live after that he was fallen: and I took the crown that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' upon his head, and the bracelet that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' on his arm, and have brought them hither unto my lord.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then David took hold on his clothes, and rent them; and likewise all the men that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with him: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'and they mourned, and wept, and fasted until even, for Saul, and for Jonathan his son, and for the people of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and for the house of Israel; because they were fallen by the sword. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And David said unto the young man that told him, Whence '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' thou? And he answered, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the son of a stranger, an Amalekite. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And David said unto him, How wast thou not afraid to stretch forth thine hand to destroy the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '''s anointed? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And David called one of the young men, and said, Go near, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' fall upon him. And he smote him that he died. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And David said unto him, Thy blood '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' upon thy head; for thy mouth hath testified against thee, saying, I have slain the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '''s anointed.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: David's Lament
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And David lamented with this lamentation over Saul and over Jonathan his son: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '(Also he bade them teach the children of Judah '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the use of
    - type: text
      text: ' the bow: behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' written in the book of Jasher.)'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'The beauty of Israel is slain upon thy high places:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How are the mighty fallen!
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'it came even to pass on the third day, that, behold, a man came out of the camp from Saul with his clothes rent, and earth upon his head: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' it was, when he came to David, that he fell to the earth, and did obeisance. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Tell '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' not in Gath,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Publish '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' not in the streets of Askelon;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lest the daughters of the Philistines rejoice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lest the daughters of the uncircumcised triumph.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ye mountains of Gilboa,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Let there be
    - type: text
      text: ' no dew, neither '
    - type: usfm
      marker: add
      children:
      - type: text
        text: let there be
    - type: text
      text: ' rain, upon you, nor fields of offerings:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For there the shield of the mighty is vilely cast away,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The shield of Saul, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as though he had
    - type: text
      text: ' not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: been
    - type: text
      text: ' anointed with oil.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: From the blood of the slain, from the fat of the mighty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The bow of Jonathan turned not back,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the sword of Saul returned not empty.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Saul and Jonathan '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' lovely and pleasant in their lives,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And in their death they were not divided:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They were swifter than eagles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They were stronger than lions.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ye daughters of Israel, weep over Saul,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who clothed you in scarlet, with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: other
    - type: text
      text: ' delights,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who put on ornaments of gold upon your apparel.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: How are the mighty fallen in the midst of the battle!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O Jonathan, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thou wast
    - type: text
      text: ' slain in thine high places.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'I am distressed for thee, my brother Jonathan:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Very pleasant hast thou been unto me:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thy love to me was wonderful,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Passing the love of women.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: How are the mighty fallen,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the weapons of war perished!
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And David said unto him, From whence comest thou? And he said unto him, Out of the camp of Israel am I escaped. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And David said unto him, How went the matter? I pray thee, tell me. And he answered, That the people are fled from the battle, and many of the people also are fallen and dead; and Saul and Jonathan his son are dead also. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And David said unto the young man that told him, How knowest thou that Saul and Jonathan his son be dead? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And the young man that told him said, As I happened by chance upon mount Gilboa, behold, Saul leaned upon his spear; and, lo, the chariots and horsemen followed hard after him. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And when he looked behind him, he saw me, and called unto me. And I answered, Here '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' I. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And he said unto me, Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: art
    - type: text
      text: ' thou? And I answered him, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' an Amalekite. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'He said unto me again, Stand, I pray thee, upon me, and slay me: for anguish is come upon me, because my life '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' yet whole in me. '
