document_id: 1CH.20
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And it came to pass, that after the year was expired, at the time that kings go out '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to battle
  - type: text
    text: ', Joab led forth the power of the army, and wasted the country of the children of Ammon, and came and besieged Rabbah. But David tarried at Jerusalem. And Joab smote Rabbah, and destroyed it. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And David took the crown of their king from off his head, and found it to weigh a talent of gold, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there were
  - type: text
    text: ' precious stones in it; and it was set upon David''s head: and he brought also exceeding much spoil out of the city. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And he brought out the people that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in it, and cut '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' with saws, and with harrows of iron, and with axes. Even so dealt David with all the cities of the children of Ammon. And David and all the people returned to Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And it came to pass after this, that there arose war at Gezer with the Philistines; at which time Sibbechai the Hushathite slew Sippai, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that was
  - type: text
    text: ' of the children of the giant: and they were subdued. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And there was war again with the Philistines; and Elhanan the son of Jair slew Lahmi the brother of Goliath the Gittite, whose spear staff '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' like a weaver''s beam. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And yet again there was war at Gath, where was a man of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: great
  - type: text
    text: ' stature, whose fingers and toes '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' four and twenty, six '
  - type: usfm
    marker: add
    children:
    - type: text
      text: on each hand
  - type: text
    text: ', and six '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'on each foot:'
  - type: text
    text: ' and he also was the son of the giant. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But when he defied Israel, Jonathan the son of Shimea David''s brother slew him. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: These were born unto the giant in Gath; and they fell by the hand of David, and by the hand of his servants.
