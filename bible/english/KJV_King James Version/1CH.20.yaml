  '1':
  - type: text
    content: 'And it came to pass, that after the year was expired, at the time that kings go out '
  - type: text
    content: to battle
  - type: text
    content: ', Joab led forth the power of the army, and wasted the country of the children of Ammon, and came and besieged Rabbah. But David tarried at Jerusalem. And Joab smote Rabbah, and destroyed it. '
  '2':
  - type: text
    content: 'And David took the crown of their king from off his head, and found it to weigh a talent of gold, and '
  - type: text
    content: there were
  - type: text
    content: ' precious stones in it; and it was set upon David''s head: and he brought also exceeding much spoil out of the city. '
  '3':
  - type: text
    content: 'And he brought out the people that '
  - type: text
    content: were
  - type: text
    content: ' in it, and cut '
  - type: text
    content: them
  - type: text
    content: ' with saws, and with harrows of iron, and with axes. Even so dealt David with all the cities of the children of Ammon. And David and all the people returned to Jerusalem.'
  '4':
  - type: text
    content: 'And it came to pass after this, that there arose war at Gezer with the Philistines; at which time Sibbechai the Hushathite slew Sippai, '
  - type: text
    content: that was
  - type: text
    content: ' of the children of the giant: and they were subdued. '
  '5':
  - type: text
    content: 'And there was war again with the Philistines; and Elhanan the son of Jair slew Lahmi the brother of Goliath the Gittite, whose spear staff '
  - type: text
    content: was
  - type: text
    content: ' like a weaver''s beam. '
  '6':
  - type: text
    content: 'And yet again there was war at Gath, where was a man of '
  - type: text
    content: great
  - type: text
    content: ' stature, whose fingers and toes '
  - type: text
    content: were
  - type: text
    content: ' four and twenty, six '
  - type: text
    content: on each hand
  - type: text
    content: ', and six '
  - type: text
    content: 'on each foot:'
  - type: text
    content: ' and he also was the son of the giant. '
  '7':
  - type: text
    content: 'But when he defied Israel, Jonathan the son of Shimea David''s brother slew him. '
  '8':
  - type: text
    content: These were born unto the giant in Gath; and they fell by the hand of David, and by the hand of his servants.
