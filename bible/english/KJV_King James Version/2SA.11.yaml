document_id: 2SA.11,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: David and Bath-sheba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, after the year was expired, at the time when kings go forth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to battle
    - type: text
      text: ', that David sent Joab, and his servants with him, and all Israel; and they destroyed the children of Ammon, and besieged Rabbah. But David tarried still at Jerusalem.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they had told David, saying, Uriah went not down unto his house, David said unto Uriah, Camest thou not from '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thy
    - type: text
      text: ' journey? why '
    - type: usfm
      marker: add
      children:
      - type: text
        text: then
    - type: text
      text: ' didst thou not go down unto thine house? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Uriah said unto David, The ark, and Israel, and Judah, abide in tents; and my lord Joab, and the servants of my lord, are encamped in the open fields; shall I then go into mine house, to eat and to drink, and to lie with my wife? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' thou livest, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' thy soul liveth, I will not do this thing. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David said to Uriah, Tarry here to day also, and to morrow I will let thee depart. So Uriah abode in Jerusalem that day, and the morrow. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when David had called him, he did eat and drink before him; and he made him drunk: and at even he went out to lie on his bed with the servants of his lord, but went not down to his house.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass in the morning, that David wrote a letter to Joab, and sent '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' by the hand of Uriah. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he wrote in the letter, saying, Set ye Uriah in the forefront of the hottest battle, and retire ye from him, that he may be smitten, and die. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, when Joab observed the city, that he assigned Uriah unto a place where he knew that valiant men '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the men of the city went out, and fought with Joab: and there fell '
    - type: usfm
      marker: add
      children:
      - type: text
        text: some
    - type: text
      text: ' of the people of the servants of David; and Uriah the Hittite died also. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joab sent and told David all the things concerning the war; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and charged the messenger, saying, When thou hast made an end of telling the matters of the war unto the king, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass in an eveningtide, that David arose from off his bed, and walked upon the roof of the king''s house: and from the roof he saw a woman washing herself; and the woman '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' very beautiful to look upon. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and if so be that the king''s wrath arise, and he say unto thee, Wherefore approached ye so nigh unto the city when ye did fight? knew ye not that they would shoot from the wall? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Who smote Abimelech the son of Jerubbesheth? did not a woman cast a piece of a millstone upon him from the wall, that he died in Thebez? why went ye nigh the wall? then say thou, Thy servant Uriah the Hittite is dead also.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the messenger went, and came and shewed David all that Joab had sent him for. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the messenger said unto David, Surely the men prevailed against us, and came out unto us into the field, and we were upon them even unto the entering of the gate. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the shooters shot from off the wall upon thy servants; and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: some
    - type: text
      text: ' of the king''s servants be dead, and thy servant Uriah the Hittite is dead also. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David said unto the messenger, Thus shalt thou say unto Joab, Let not this thing displease thee, for the sword devoureth one as well as another: make thy battle more strong against the city, and overthrow it: and encourage thou him.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the wife of Uriah heard that Uriah her husband was dead, she mourned for her husband. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the mourning was past, David sent and fetched her to his house, and she became his wife, and bare him a son. But the thing that David had done displeased the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David sent and enquired after the woman. And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' said, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is
    - type: text
      text: ' not this Bath-sheba, the daughter of Eliam, the wife of Uriah the Hittite? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David sent messengers, and took her; and she came in unto him, and he lay with her; for she was purified from her uncleanness: and she returned unto her house. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the woman conceived, and sent and told David, and said, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' with child.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David sent to Joab, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: saying
    - type: text
      text: ', Send me Uriah the Hittite. And Joab sent Uriah to David. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Uriah was come unto him, David demanded '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of him
    - type: text
      text: ' how Joab did, and how the people did, and how the war prospered. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David said to Uriah, Go down to thy house, and wash thy feet. And Uriah departed out of the king''s house, and there followed him a mess '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of meat
    - type: text
      text: ' from the king. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Uriah slept at the door of the king''s house with all the servants of his lord, and went not down to his house. '
