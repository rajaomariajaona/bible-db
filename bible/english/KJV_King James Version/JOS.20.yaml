document_id: JOS.20
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Cities of Refuge
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' also spake unto Joshua, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Speak to the children of Israel, saying, Appoint out for you cities of refuge, whereof I spake unto you by the hand of Moses: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'that the slayer that killeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' person unawares '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' unwittingly may flee thither: and they shall be your refuge from the avenger of blood. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And when he that doth flee unto one of those cities shall stand at the entering of the gate of the city, and shall declare his cause in the ears of the elders of that city, they shall take him into the city unto them, and give him a place, that he may dwell among them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And if the avenger of blood pursue after him, then they shall not deliver the slayer up into his hand; because he smote his neighbour unwittingly, and hated him not beforetime. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he shall dwell in that city, until he stand before the congregation for judgment, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' until the death of the high priest that shall be in those days: then shall the slayer return, and come unto his own city, and unto his own house, unto the city from whence he fled.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And they appointed Kedesh in Galilee in mount Naphtali, and Shechem in mount Ephraim, and Kirjath-arba, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Hebron, in the mountain of Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And on the other side Jordan by Jericho eastward, they assigned Bezer in the wilderness upon the plain out of the tribe of Reuben, and Ramoth in Gilead out of the tribe of Gad, and Golan in Bashan out of the tribe of Manasseh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'These were the cities appointed for all the children of Israel, and for the stranger that sojourneth among them, that whosoever killeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' person at unawares might flee thither, and not die by the hand of the avenger of blood, until he stood before the congregation.'
