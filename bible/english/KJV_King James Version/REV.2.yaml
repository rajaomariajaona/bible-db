  - type: text
    content: ' '
  '5':
  - type: text
    content: Remember therefore from whence thou art fallen, and repent, and do the first works; or else I will come unto thee quickly, and will remove thy candlestick out of his place, except thou repent.
  - type: text
    content: ' '
  '6':
  - type: text
    content: But this thou hast, that thou hatest the deeds of the Nicolaitanes, which I also hate.
  - type: text
    content: ' '
  '7':
  - type: text
    content: He that hath an ear, let him hear what the Spirit saith unto the churches; To him that overcometh will I give to eat of the tree of life, which is in the midst of the paradise of God.
  '8':
  - type: text
    content: ' '
  - type: text
    content: And unto the angel of the church in Smyrna write; These things saith the first and the last, which was dead, and is alive;
  - type: text
