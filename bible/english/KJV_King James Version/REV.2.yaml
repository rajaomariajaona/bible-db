  - type: text
    content: ' '
  - type: text
    content: 'And unto the angel of the church in Thyatira write; These things saith the Son of God, who hath his eyes like unto a flame of fire, and his feet '
  - type: text
    content: are
  - type: text
    content: ' like fine brass;'
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'I know thy works, and charity, and service, and faith, and thy patience, and thy works; and the last '
  - type: text
    content: to be
  - type: text
    content: ' more than the first.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'I know thy works, and thy labour, and thy patience, and how thou canst not bear them which are evil: and thou hast tried them which say they are apostles, and are not, and hast found them liars:'
  - type: text
    content: ' '
  '20':
  - type: text
    content: Notwithstanding I have a few things against thee, because thou sufferest that woman Jezebel, which calleth herself a prophetess, to teach and to seduce my servants to commit fornication, and to eat things sacrificed unto idols.
  - type: text
    content: ' '
  '21':
  - type: text
    content: And I gave her space to repent of her fornication; and she repented not.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Behold, I will cast her into a bed, and them that commit adultery with her into great tribulation, except they repent of their deeds.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'And I will kill her children with death; and all the churches shall know that I am he which searcheth the reins and hearts: and I will give unto every one of you according to your works.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: But unto you I say, and unto the rest in Thyatira, as many as have not this doctrine, and which have not known the depths of Satan, as they speak; I will put upon you none other burden.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'But that which ye have '
  - type: text
    content: already
  - type: text
    content: ' hold fast till I come.'
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'And he that overcometh, and keepeth my works unto the end, to him will I give power over the nations:'
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'and he shall rule them with a rod of iron; as the vessels of a potter shall they be broken to shivers: even as I received of my Father.'
  - type: text
    content: ' '
  '28':
  - type: text
    content: And I will give him the morning star.
  - type: text
    content: ' '
  '29':
  - type: text
    content: He that hath an ear, let him hear what the Spirit saith unto the churches.
  '3':
  - type: text
    content: and hast borne, and hast patience, and for my name's sake hast laboured, and hast not fainted.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Nevertheless I have '
  - type: text
