  '1':
  - type: text
    content: 'Lo, mine eye hath seen all '
  - type: text
    content: this
  - type: text
    content: ','
  - type: text
    content: Mine ear hath heard and understood it.
  '10':
  - type: text
    content: He will surely reprove you,
  - type: text
    content: If ye do secretly accept persons.
  '11':
  - type: text
    content: Shall not his excellency make you afraid?
  - type: text
    content: And his dread fall upon you?
  '12':
  - type: text
    content: 'Your remembrances '
  - type: text
    content: are
  - type: text
    content: ' like unto ashes,'
  - type: text
    content: Your bodies to bodies of clay.
  '13':
  - type: text
    content: Hold your peace, let me alone, that I may speak,
  - type: text
    content: 'And let come on me what '
  - type: text
    content: will
  - type: text
    content: .
  '14':
  - type: text
    content: Wherefore do I take my flesh in my teeth,
  - type: text
    content: And put my life in mine hand?
  '15':
  - type: text
    content: 'Though he slay me, yet will I trust in him:'
  - type: text
    content: But I will maintain mine own ways before him.
  '16':
  - type: text
    content: 'He also '
  - type: text
    content: shall be
  - type: text
    content: ' my salvation:'
  - type: text
    content: For an hypocrite shall not come before him.
  '17':
  - type: text
    content: Hear diligently my speech,
  - type: text
    content: And my declaration with your ears.
  '18':
  - type: text
    content: 'Behold now, I have ordered '
  - type: text
    content: my
  - type: text
    content: ' cause;'
  - type: text
    content: I know that I shall be justified.
  '19':
  - type: text
    content: 'Who '
  - type: text
    content: is
  - type: text
    content: ' he '
  - type: text
    content: that
  - type: text
    content: ' will plead with me?'
  - type: text
    content: For now, if I hold my tongue, I shall give up the ghost.
  '2':
  - type: text
    content: 'What ye know, '
  - type: text
    content: the same
  - type: text
    content: ' do I know also:'
  - type: text
    content: 'I '
  - type: text
    content: am
  - type: text
    content: ' not inferior unto you.'
  '20':
  - type: text
    content: 'Only do not two '
  - type: text
    content: things
  - type: text
    content: ' unto me:'
  - type: text
    content: Then will I not hide myself from thee.
  '21':
  - type: text
    content: 'Withdraw thine hand far from me:'
  - type: text
    content: And let not thy dread make me afraid.
  '22':
  - type: text
    content: 'Then call thou, and I will answer:'
  - type: text
    content: Or let me speak, and answer thou me.
  '23':
  - type: text
    content: 'How many '
  - type: text
    content: are
  - type: text
    content: ' mine iniquities and sins?'
  - type: text
    content: Make me to know my transgression and my sin.
  '24':
  - type: text
    content: Wherefore hidest thou thy face,
  - type: text
    content: And holdest me for thine enemy?
  '25':
  - type: text
    content: Wilt thou break a leaf driven to and fro?
  - type: text
    content: And wilt thou pursue the dry stubble?
  '26':
  - type: text
    content: For thou writest bitter things against me,
  - type: text
    content: And makest me to possess the iniquities of my youth.
  '27':
  - type: text
    content: Thou puttest my feet also in the stocks,
  - type: text
    content: And lookest narrowly unto all my paths;
  - type: text
    content: Thou settest a print upon the heels of my feet.
  '28':
  - type: text
    content: And he, as a rotten thing, consumeth,
  - type: text
    content: As a garment that is moth eaten.
  '3':
  - type: text
    content: Surely I would speak to the Almighty,
  - type: text
    content: And I desire to reason with God.
  '4':
  - type: text
    content: 'But ye '
  - type: text
    content: are
  - type: text
    content: ' forgers of lies,'
  - type: text
    content: 'Ye '
  - type: text
    content: are
  - type: text
    content: ' all physicians of no value.'
  '5':
  - type: text
    content: O that ye would altogether hold your peace!
  - type: text
    content: And it should be your wisdom.
  '6':
  - type: text
    content: Hear now my reasoning,
  - type: text
    content: And hearken to the pleadings of my lips.
  '7':
  - type: text
    content: Will ye speak wickedly for God?
  - type: text
    content: And talk deceitfully for him?
  '8':
  - type: text
    content: Will ye accept his person?
  - type: text
    content: Will ye contend for God?
  '9':
  - type: text
    content: Is it good that he should search you out?
  - type: text
    content: 'Or as one man mocketh another, do ye '
  - type: text
