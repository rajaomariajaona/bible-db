document_id: JOB.13
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lo, mine eye hath seen all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: Mine ear hath heard and understood it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'What ye know, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the same
  - type: text
    text: ' do I know also:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' not inferior unto you.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Surely I would speak to the Almighty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And I desire to reason with God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' forgers of lies,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' all physicians of no value.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: O that ye would altogether hold your peace!
- type: usfm
  marker: q2
  children:
  - type: text
    text: And it should be your wisdom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hear now my reasoning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And hearken to the pleadings of my lips.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Will ye speak wickedly for God?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And talk deceitfully for him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Will ye accept his person?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will ye contend for God?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Is it good that he should search you out?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Or as one man mocketh another, do ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' mock him?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He will surely reprove you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: If ye do secretly accept persons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Shall not his excellency make you afraid?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And his dread fall upon you?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Your remembrances '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' like unto ashes,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your bodies to bodies of clay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hold your peace, let me alone, that I may speak,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And let come on me what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: will
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Wherefore do I take my flesh in my teeth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And put my life in mine hand?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Though he slay me, yet will I trust in him:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But I will maintain mine own ways before him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' my salvation:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: For an hypocrite shall not come before him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Hear diligently my speech,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And my declaration with your ears.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Behold now, I have ordered '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my
  - type: text
    text: ' cause;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I know that I shall be justified.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' will plead with me?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: For now, if I hold my tongue, I shall give up the ghost.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Only do not two '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' unto me:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Then will I not hide myself from thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Withdraw thine hand far from me:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And let not thy dread make me afraid.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then call thou, and I will answer:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or let me speak, and answer thou me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'How many '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' mine iniquities and sins?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Make me to know my transgression and my sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Wherefore hidest thou thy face,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And holdest me for thine enemy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Wilt thou break a leaf driven to and fro?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And wilt thou pursue the dry stubble?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: For thou writest bitter things against me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And makest me to possess the iniquities of my youth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Thou puttest my feet also in the stocks,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And lookest narrowly unto all my paths;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou settest a print upon the heels of my feet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: And he, as a rotten thing, consumeth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: As a garment that is moth eaten.
