document_id: LUK.2,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'And it came to pass in those days, that there went out a decree from Cæsar Augustus, that all the world should be taxed. '
  '10':
  - type: text
    content: 'And the angel said unto them, Fear not: for, behold, I bring you good tidings of great joy, which shall be to all people. '
  '11':
  - type: text
    content: 'For unto you is born this day in the city of David a Saviour, which is Christ the Lord. '
  '12':
  - type: text
    content: 'And this '
  - type: text
    content: shall be
  - type: text
    content: ' a sign unto you; Ye shall find the babe wrapped in swaddling clothes, lying in a manger. '
  '13':
  - type: text
    content: And suddenly there was with the angel a multitude of the heavenly host praising God, and saying,
  '14':
  - type: text
    content: Glory to God in the highest,
  - type: text
    content: And on earth peace, good will toward men.
  '15':
  - type: text
    content: 'And it came to pass, as the angels were gone away from them into heaven, the shepherds said one to another, Let us now go even unto Bethlehem, and see this thing which is come to pass, which the Lord hath made known unto us. '
  '16':
  - type: text
    content: 'And they came with haste, and found Mary, and Joseph, and the babe lying in a manger. '
  '17':
  - type: text
    content: 'And when they had seen '
  - type: text
    content: it
  - type: text
    content: ', they made known abroad the saying which was told them concerning this child. '
  '18':
  - type: text
    content: 'And all they that heard '
  - type: text
    content: it
  - type: text
    content: ' wondered at those things which were told them by the shepherds. '
  '19':
  - type: text
    content: 'But Mary kept all these things, and pondered '
  - type: text
    content: them
  - type: text
    content: ' in her heart. '
  '2':
  - type: text
    content: (
  - type: text
    content: And
  - type: text
    content: ' this taxing was first made when Cyrenius was governor of Syria.) '
  '20':
  - type: text
    content: And the shepherds returned, glorifying and praising God for all the things that they had heard and seen, as it was told unto them.
  '21':
  - type: text
    content: And when eight days were accomplished for the circumcising of the child, his name was called JESUS, which was so named of the angel before he was conceived in the womb.
  '22':
  - type: text
    content: 'And when the days of her purification according to the law of Moses were accomplished, they brought him to Jerusalem, to present '
  - type: text
    content: him
  - type: text
    content: ' to the Lord; '
  '23':
  - type: text
    content: '(as it is written in the law of the Lord, Every male that openeth the womb shall be called holy to the Lord;) '
  '24':
  - type: text
    content: and to offer a sacrifice according to that which is said in the law of the Lord, A pair of turtledoves, or two young pigeons.
  - type: heading
    content: The Song of Simeon
  '25':
  - type: text
    content: 'And, behold, there was a man in Jerusalem, whose name '
  - type: text
    content: was
  - type: text
    content: ' Simeon; and the same man '
  - type: text
    content: was
  - type: text
    content: ' just and devout, waiting for the consolation of Israel: and the Holy Ghost was upon him. '
  '26':
  - type: text
    content: 'And it was revealed unto him by the Holy Ghost, that he should not see death, before he had seen the Lord''s Christ. '
  '27':
  - type: text
    content: 'And he came by the Spirit into the temple: and when the parents brought in the child Jesus, to do for him after the custom of the law, '
  '28':
  - type: text
    content: then took he him up in his arms, and blessed God, and said,
  '29':
  - type: text
    content: Lord, now lettest thou thy servant depart in peace,
  - type: text
    content: 'According to thy word:'
  '3':
  - type: text
    content: 'And all went to be taxed, every one into his own city. '
  '30':
  - type: text
    content: For mine eyes have seen thy salvation,
  '31':
  - type: text
    content: Which thou hast prepared before the face of all people;
  '32':
  - type: text
    content: A light to lighten the Gentiles,
  - type: text
    content: And the glory of thy people Israel.
  '33':
  - type: text
    content: And Joseph and his mother marvelled at those things which were spoken of him.
  '34':
  - type: text
    content: 'And Simeon blessed them, and said unto Mary his mother, Behold, this '
  - type: text
    content: child
  - type: text
    content: ' is set for the fall and rising again of many in Israel; and for a sign which shall be spoken against; '
  '35':
  - type: text
    content: (yea, a sword shall pierce through thy own soul also,) that the thoughts of many hearts may be revealed.
  '36':
  - type: text
    content: 'And there was one Anna, a prophetess, the daughter of Phanuel, of the tribe of Aser: she was of a great age, and had lived with an husband seven years from her virginity; '
  '37':
  - type: text
    content: 'and she '
  - type: text
    content: was
  - type: text
    content: ' a widow of about fourscore and four years, which departed not from the temple, but served '
  - type: text
    content: God
  - type: text
    content: ' with fastings and prayers night and day. '
  '38':
  - type: text
    content: And she coming in that instant gave thanks likewise unto the Lord, and spake of him to all them that looked for redemption in Jerusalem.
  '39':
  - type: text
    content: 'And when they had performed all things according to the law of the Lord, they returned into Galilee, to their own city Nazareth. '
  '4':
  - type: text
    content: 'And Joseph also went up from Galilee, out of the city of Nazareth, into Judæa, unto the city of David, which is called Bethlehem; (because he was of the house and lineage of David:) '
  '40':
  - type: text
    content: 'And the child grew, and waxed strong in spirit, filled with wisdom: and the grace of God was upon him.'
  - type: heading
    content: The Boyhood of Jesus
  '41':
  - type: text
    content: 'Now his parents went to Jerusalem every year at the feast of the passover. '
  '42':
  - type: text
    content: 'And when he was twelve years old, they went up to Jerusalem after the custom of the feast. '
  '43':
  - type: text
    content: 'And when they had fulfilled the days, as they returned, the child Jesus tarried behind in Jerusalem; and Joseph and his mother knew not '
  - type: text
    content: of it
  - type: text
    content: '. '
  '44':
  - type: text
    content: 'But they, supposing him to have been in the company, went a day''s journey; and they sought him among '
  - type: text
    content: their
  - type: text
    content: ' kinsfolk and acquaintance. '
  '45':
  - type: text
    content: And when they found him not, they turned back again to Jerusalem, seeking him.
  '46':
  - type: text
    content: 'And it came to pass, that after three days they found him in the temple, sitting in the midst of the doctors, both hearing them, and asking them questions. '
  '47':
  - type: text
    content: 'And all that heard him were astonished at his understanding and answers. '
  '48':
  - type: text
    content: 'And when they saw him, they were amazed: and his mother said unto him, Son, why hast thou thus dealt with us? behold, thy father and I have sought thee sorrowing. '
  '49':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: How is it that ye sought me? wist ye not that I must be about my Father's business?
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'to be taxed with Mary his espoused wife, being great with child. '
  '50':
  - type: text
    content: 'And they understood not the saying which he spake unto them. '
  '51':
  - type: text
    content: 'And he went down with them, and came to Nazareth, and was subject unto them: but his mother kept all these sayings in her heart. '
  '52':
  - type: text
    content: And Jesus increased in wisdom and stature, and in favour with God and man.
  '6':
  - type: text
    content: 'And so it was, that, while they were there, the days were accomplished that she should be delivered. '
  '7':
  - type: text
    content: And she brought forth her firstborn son, and wrapped him in swaddling clothes, and laid him in a manger; because there was no room for them in the inn.
  - type: heading
    content: The Angels' Song
  '8':
  - type: text
    content: 'And there were in the same country shepherds abiding in the field, keeping watch over their flock by night. '
  '9':
  - type: text
    content: 'And, lo, the angel of the Lord came upon them, and the glory of the Lord shone round about them: and they were sore afraid. '
