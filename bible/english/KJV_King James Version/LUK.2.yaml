document_id: LUK.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And it came to pass in those days, that there went out a decree from Cæsar Augustus, that all the world should be taxed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: (
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' this taxing was first made when Cyrenius was governor of Syria.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And all went to be taxed, every one into his own city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Joseph also went up from Galilee, out of the city of Nazareth, into Judæa, unto the city of David, which is called Bethlehem; (because he was of the house and lineage of David:) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'to be taxed with Mary his espoused wife, being great with child. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And so it was, that, while they were there, the days were accomplished that she should be delivered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And she brought forth her firstborn son, and wrapped him in swaddling clothes, and laid him in a manger; because there was no room for them in the inn.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Angels' Song
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And there were in the same country shepherds abiding in the field, keeping watch over their flock by night. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And, lo, the angel of the Lord came upon them, and the glory of the Lord shone round about them: and they were sore afraid. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the angel said unto them, Fear not: for, behold, I bring you good tidings of great joy, which shall be to all people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For unto you is born this day in the city of David a Saviour, which is Christ the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' a sign unto you; Ye shall find the babe wrapped in swaddling clothes, lying in a manger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And suddenly there was with the angel a multitude of the heavenly host praising God, and saying,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Glory to God in the highest,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And on earth peace, good will toward men.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And it came to pass, as the angels were gone away from them into heaven, the shepherds said one to another, Let us now go even unto Bethlehem, and see this thing which is come to pass, which the Lord hath made known unto us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And they came with haste, and found Mary, and Joseph, and the babe lying in a manger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And when they had seen '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', they made known abroad the saying which was told them concerning this child. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And all they that heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' wondered at those things which were told them by the shepherds. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But Mary kept all these things, and pondered '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' in her heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: And the shepherds returned, glorifying and praising God for all the things that they had heard and seen, as it was told unto them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: And when eight days were accomplished for the circumcising of the child, his name was called JESUS, which was so named of the angel before he was conceived in the womb.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And when the days of her purification according to the law of Moses were accomplished, they brought him to Jerusalem, to present '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' to the Lord; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '(as it is written in the law of the Lord, Every male that openeth the womb shall be called holy to the Lord;) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: and to offer a sacrifice according to that which is said in the law of the Lord, A pair of turtledoves, or two young pigeons.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Song of Simeon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And, behold, there was a man in Jerusalem, whose name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Simeon; and the same man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' just and devout, waiting for the consolation of Israel: and the Holy Ghost was upon him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And it was revealed unto him by the Holy Ghost, that he should not see death, before he had seen the Lord''s Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And he came by the Spirit into the temple: and when the parents brought in the child Jesus, to do for him after the custom of the law, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: then took he him up in his arms, and blessed God, and said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Lord, now lettest thou thy servant depart in peace,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'According to thy word:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: For mine eyes have seen thy salvation,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Which thou hast prepared before the face of all people;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: A light to lighten the Gentiles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the glory of thy people Israel.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: And Joseph and his mother marvelled at those things which were spoken of him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And Simeon blessed them, and said unto Mary his mother, Behold, this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: child
  - type: text
    text: ' is set for the fall and rising again of many in Israel; and for a sign which shall be spoken against; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: (yea, a sword shall pierce through thy own soul also,) that the thoughts of many hearts may be revealed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And there was one Anna, a prophetess, the daughter of Phanuel, of the tribe of Aser: she was of a great age, and had lived with an husband seven years from her virginity; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'and she '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' a widow of about fourscore and four years, which departed not from the temple, but served '
  - type: usfm
    marker: add
    children:
    - type: text
      text: God
  - type: text
    text: ' with fastings and prayers night and day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: And she coming in that instant gave thanks likewise unto the Lord, and spake of him to all them that looked for redemption in Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And when they had performed all things according to the law of the Lord, they returned into Galilee, to their own city Nazareth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And the child grew, and waxed strong in spirit, filled with wisdom: and the grace of God was upon him.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Boyhood of Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Now his parents went to Jerusalem every year at the feast of the passover. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And when he was twelve years old, they went up to Jerusalem after the custom of the feast. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'And when they had fulfilled the days, as they returned, the child Jesus tarried behind in Jerusalem; and Joseph and his mother knew not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of it
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'But they, supposing him to have been in the company, went a day''s journey; and they sought him among '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' kinsfolk and acquaintance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: And when they found him not, they turned back again to Jerusalem, seeking him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'And it came to pass, that after three days they found him in the temple, sitting in the midst of the doctors, both hearing them, and asking them questions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'And all that heard him were astonished at his understanding and answers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'And when they saw him, they were amazed: and his mother said unto him, Son, why hast thou thus dealt with us? behold, thy father and I have sought thee sorrowing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'And he said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: How is it that ye sought me? wist ye not that I must be about my Father's business?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'And they understood not the saying which he spake unto them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'And he went down with them, and came to Nazareth, and was subject unto them: but his mother kept all these sayings in her heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: And Jesus increased in wisdom and stature, and in favour with God and man.
