document_id: GEN.40,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And it came to pass after these things, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the butler of the king of Egypt and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' baker had offended their lord the king of Egypt. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'and in the vine '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' three branches: and it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' as though it budded, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' her blossoms shot forth; and the clusters thereof brought forth ripe grapes: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'and Pharaoh''s cup '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in my hand: and I took the grapes, and pressed them into Pharaoh''s cup, and I gave the cup into Pharaoh''s hand. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And Joseph said unto him, This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the interpretation of it: The three branches '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' three days: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'yet within three days shall Pharaoh lift up thine head, and restore thee unto thy place: and thou shalt deliver Pharaoh''s cup into his hand, after the former manner when thou wast his butler. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But think on me when it shall be well with thee, and shew kindness, I pray thee, unto me, and make mention of me unto Pharaoh, and bring me out of this house: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'for indeed I was stolen away out of the land of the Hebrews: and here also have I done nothing that they should put me into the dungeon.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'When the chief baker saw that the interpretation was good, he said unto Joseph, I also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in my dream, and, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: I had
    - type: text
      text: ' three white baskets on my head: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'and in the uppermost basket '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' of all manner of bakemeats for Pharaoh; and the birds did eat them out of the basket upon my head. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And Joseph answered and said, This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the interpretation thereof: The three baskets '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' three days: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: yet within three days shall Pharaoh lift up thy head from off thee, and shall hang thee on a tree; and the birds shall eat thy flesh from off thee.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And Pharaoh was wroth against two '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' his officers, against the chief of the butlers, and against the chief of the bakers. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And it came to pass the third day, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which was
    - type: text
      text: ' Pharaoh''s birthday, that he made a feast unto all his servants: and he lifted up the head of the chief butler and of the chief baker among his servants. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And he restored the chief butler unto his butlership again; and he gave the cup into Pharaoh''s hand: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'but he hanged the chief baker: as Joseph had interpreted to them. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Yet did not the chief butler remember Joseph, but forgat him.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And he put them in ward in the house of the captain of the guard, into the prison, the place where Joseph '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' bound. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And the captain of the guard charged Joseph with them, and he served them: and they continued a season in ward.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And they dreamed a dream both of them, each man his dream in one night, each man according to the interpretation of his dream, the butler and the baker of the king of Egypt, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' bound in the prison. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And Joseph came in unto them in the morning, and looked upon them, and, behold, they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' sad. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And he asked Pharaoh''s officers that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with him in the ward of his lord''s house, saying, Wherefore look ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' sadly to day? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And they said unto him, We have dreamed a dream, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no interpreter of it. And Joseph said unto them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Do
    - type: text
      text: ' not interpretations '
    - type: usfm
      marker: add
      children:
      - type: text
        text: belong
    - type: text
      text: ' to God? tell me '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ', I pray you.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And the chief butler told his dream to Joseph, and said to him, In my dream, behold, a vine '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' before me; '
