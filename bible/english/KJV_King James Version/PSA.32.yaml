  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the man unto whom the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' imputeth not iniquity,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And in whose spirit '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no guile.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: When I kept silence, my bones waxed old
- type: usfm
  marker: q2
  children:
  - type: text
    text: Through my roaring all the day long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For day and night thy hand was heavy upon me:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'My moisture is turned into the drought of summer. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I acknowledged my sin unto thee,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And mine iniquity have I not hid.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I said, I will confess my transgressions unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And thou forgavest the iniquity of my sin. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For this shall every one that is godly pray unto thee in a time when thou mayest be found:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Surely in the floods of great waters they shall not come nigh unto him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' my hiding place; thou shalt preserve me from trouble;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Thou shalt compass me about with songs of deliverance. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I will instruct thee and teach thee in the way which thou shalt go:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will guide thee with mine eye.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Be ye not as the horse, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: or
  - type: text
    text: ' as the mule, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' have no understanding:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Whose mouth must be held in with bit and bridle, lest they come near unto thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Many sorrows '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' to the wicked:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But he that trusteth in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', mercy shall compass him about.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Be glad in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and rejoice, ye righteous:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And shout for joy, all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: ye that are
  - type: text
    text: ' upright in heart.'
