  '3':
  - type: text
    content: When I kept silence, my bones waxed old
  - type: text
    content: Through my roaring all the day long.
  '4':
  - type: text
    content: 'For day and night thy hand was heavy upon me:'
  - type: text
    content: 'My moisture is turned into the drought of summer. '
  - type: text
    content: Selah.
  '5':
  - type: text
    content: I acknowledged my sin unto thee,
  - type: text
    content: And mine iniquity have I not hid.
  - type: text
    content: 'I said, I will confess my transgressions unto the '
  - type: text
    content: LORD
  - type: text
    content: ;
  - type: text
    content: 'And thou forgavest the iniquity of my sin. '
  - type: text
    content: Selah.
  '6':
  - type: text
    content: 'For this shall every one that is godly pray unto thee in a time when thou mayest be found:'
  - type: text
    content: Surely in the floods of great waters they shall not come nigh unto him.
  '7':
  - type: text
    content: 'Thou '
  - type: text
    content: art
  - type: text
    content: ' my hiding place; thou shalt preserve me from trouble;'
  - type: text
