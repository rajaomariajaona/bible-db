document_id: DEU.12,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Book of the Covenant
  - type: heading
    content: Statutes and Judgements
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the statutes and judgments, which ye shall observe to do in the land, which the '
  - type: text
    content: LORD
  - type: text
    content: ' God of thy fathers giveth thee to possess it, all the days that ye live upon the earth.'
  - type: heading
    content: Religious Statutes
  '10':
  - type: text
    content: 'But '
  - type: text
    content: when
  - type: text
    content: ' ye go over Jordan, and dwell in the land which the '
  - type: text
    content: LORD
  - type: text
    content: ' your God giveth you to inherit, and '
  - type: text
    content: when
  - type: text
    content: ' he giveth you rest from all your enemies round about, so that ye dwell in safety; '
  '11':
  - type: text
    content: 'then there shall be a place which the '
  - type: text
    content: LORD
  - type: text
    content: ' your God shall choose to cause his name to dwell there; thither shall ye bring all that I command you; your burnt offerings, and your sacrifices, your tithes, and the heave offering of your hand, and all your choice vows which ye vow unto the '
  - type: text
    content: LORD
  - type: text
    content: ': '
  '12':
  - type: text
    content: 'and ye shall rejoice before the '
  - type: text
    content: LORD
  - type: text
    content: ' your God, ye, and your sons, and your daughters, and your menservants, and your maidservants, and the Levite that '
  - type: text
    content: is
  - type: text
    content: ' within your gates; forasmuch as he hath no part nor inheritance with you. '
  '13':
  - type: text
    content: 'Take heed to thyself that thou offer not thy burnt offerings in every place that thou seest: '
  '14':
  - type: text
    content: 'but in the place which the '
  - type: text
    content: LORD
  - type: text
    content: ' shall choose in one of thy tribes, there thou shalt offer thy burnt offerings, and there thou shalt do all that I command thee.'
  '15':
  - type: text
    content: 'Notwithstanding thou mayest kill and eat flesh in all thy gates, whatsoever thy soul lusteth after, according to the blessing of the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God which he hath given thee: the unclean and the clean may eat thereof, as of the roebuck, and as of the hart. '
  '16':
  - type: text
    content: 'Only ye shall not eat the blood; ye shall pour it upon the earth as water. '
  '17':
  - type: text
    content: 'Thou mayest not eat within thy gates the tithe of thy corn, or of thy wine, or of thy oil, or the firstlings of thy herds or of thy flock, nor any of thy vows which thou vowest, nor thy freewill offerings, or heave offering of thine hand: '
  '18':
  - type: text
    content: 'but thou must eat them before the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God in the place which the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God shall choose, thou, and thy son, and thy daughter, and thy manservant, and thy maidservant, and the Levite that '
  - type: text
    content: is
  - type: text
    content: ' within thy gates: and thou shalt rejoice before the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God in all that thou puttest thine hands unto. '
  '19':
  - type: text
    content: Take heed to thyself that thou forsake not the Levite as long as thou livest upon the earth.
  '2':
  - type: text
    content: 'Ye shall utterly destroy all the places, wherein the nations which ye shall possess served their gods, upon the high mountains, and upon the hills, and under every green tree: '
  '20':
  - type: text
    content: 'When the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God shall enlarge thy border, as he hath promised thee, and thou shalt say, I will eat flesh, because thy soul longeth to eat flesh; thou mayest eat flesh, whatsoever thy soul lusteth after. '
  '21':
  - type: text
    content: 'If the place which the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God hath chosen to put his name there be too far from thee, then thou shalt kill of thy herd and of thy flock, which the '
  - type: text
    content: LORD
  - type: text
    content: ' hath given thee, as I have commanded thee, and thou shalt eat in thy gates whatsoever thy soul lusteth after. '
  '22':
  - type: text
    content: 'Even as the roebuck and the hart is eaten, so thou shalt eat them: the unclean and the clean shall eat '
  - type: text
    content: of
  - type: text
    content: ' them alike. '
  '23':
  - type: text
    content: 'Only be sure that thou eat not the blood: for the blood '
  - type: text
    content: is
  - type: text
    content: ' the life; and thou mayest not eat the life with the flesh. '
  '24':
  - type: text
    content: 'Thou shalt not eat it; thou shalt pour it upon the earth as water. '
  '25':
  - type: text
    content: 'Thou shalt not eat it; that it may go well with thee, and with thy children after thee, when thou shalt do '
  - type: text
    content: that which is
  - type: text
    content: ' right in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'Only thy holy things which thou hast, and thy vows, thou shalt take, and go unto the place which the '
  - type: text
    content: LORD
  - type: text
    content: ' shall choose: '
  '27':
  - type: text
    content: 'and thou shalt offer thy burnt offerings, the flesh and the blood, upon the altar of the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God: and the blood of thy sacrifices shall be poured out upon the altar of the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God, and thou shalt eat the flesh. '
  '28':
  - type: text
    content: 'Observe and hear all these words which I command thee, that it may go well with thee, and with thy children after thee for ever, when thou doest '
  - type: text
    content: that which is
  - type: text
    content: ' good and right in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God.'
  '29':
  - type: text
    content: 'When the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God shall cut off the nations from before thee, whither thou goest to possess them, and thou succeedest them, and dwellest in their land; '
  '3':
  - type: text
    content: 'and ye shall overthrow their altars, and break their pillars, and burn their groves with fire; and ye shall hew down the graven images of their gods, and destroy the names of them out of that place. '
  '30':
  - type: text
    content: 'take heed to thyself that thou be not snared by following them, after that they be destroyed from before thee; and that thou enquire not after their gods, saying, How did these nations serve their gods? even so will I do likewise. '
  '31':
  - type: text
    content: 'Thou shalt not do so unto the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God: for every abomination to the '
  - type: text
    content: LORD
  - type: text
    content: ', which he hateth, have they done unto their gods; for even their sons and their daughters they have burnt in the fire to their gods. '
  '32':
  - type: text
    content: 'What thing soever I command you, observe to do it: thou shalt not add thereto, nor diminish from it.'
  '4':
  - type: text
    content: 'Ye shall not do so unto the '
  - type: text
    content: LORD
  - type: text
    content: ' your God. '
  '5':
  - type: text
    content: 'But unto the place which the '
  - type: text
    content: LORD
  - type: text
    content: ' your God shall choose out of all your tribes to put his name there, '
  - type: text
    content: even
  - type: text
    content: ' unto his habitation shall ye seek, and thither thou shalt come: '
  '6':
  - type: text
    content: 'and thither ye shall bring your burnt offerings, and your sacrifices, and your tithes, and heave offerings of your hand, and your vows, and your freewill offerings, and the firstlings of your herds and of your flocks: '
  '7':
  - type: text
    content: 'and there ye shall eat before the '
  - type: text
    content: LORD
  - type: text
    content: ' your God, and ye shall rejoice in all that ye put your hand unto, ye and your households, wherein the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God hath blessed thee. '
  '8':
  - type: text
    content: 'Ye shall not do after all '
  - type: text
    content: the things
  - type: text
    content: ' that we do here this day, every man whatsoever '
  - type: text
    content: is
  - type: text
    content: ' right in his own eyes. '
  '9':
  - type: text
    content: 'For ye are not as yet come to the rest and to the inheritance, which the '
  - type: text
    content: LORD
  - type: text
    content: ' your God giveth you. '
