document_id: 1CO.14
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Gift of Tongues
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Follow after charity, and desire spiritual '
  - type: usfm
    marker: add
    children:
    - type: text
      text: gifts
  - type: text
    text: ', but rather that ye may prophesy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For he that speaketh in an '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unknown
  - type: text
    text: ' tongue speaketh not unto men, but unto God: for no man understandeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: '; howbeit in the spirit he speaketh mysteries. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But he that prophesieth speaketh unto men '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to
  - type: text
    text: ' edification, and exhortation, and comfort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He that speaketh in an '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unknown
  - type: text
    text: ' tongue edifieth himself; but he that prophesieth edifieth the church. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I would that ye all spake with tongues, but rather that ye prophesied: for greater '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' he that prophesieth than he that speaketh with tongues, except he interpret, that the church may receive edifying.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now, brethren, if I come unto you speaking with tongues, what shall I profit you, except I shall speak to you either by revelation, or by knowledge, or by prophesying, or by doctrine? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And even things without life giving sound, whether pipe or harp, except they give a distinction in the sounds, how shall it be known what is piped or harped? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For if the trumpet give an uncertain sound, who shall prepare himself to the battle? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So likewise ye, except ye utter by the tongue words easy to be understood, how shall it be known what is spoken? for ye shall speak into the air. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'There are, it may be, so many kinds of voices in the world, and none of them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' without signification. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Therefore if I know not the meaning of the voice, I shall be unto him that speaketh a barbarian, and he that speaketh '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' a barbarian unto me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Even so ye, forasmuch as ye are zealous of spiritual '
  - type: usfm
    marker: add
    children:
    - type: text
      text: gifts
  - type: text
    text: ', seek that ye may excel to the edifying of the church. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Wherefore let him that speaketh in an '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unknown
  - type: text
    text: ' tongue pray that he may interpret. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For if I pray in an '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unknown
  - type: text
    text: ' tongue, my spirit prayeth, but my understanding is unfruitful. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'What is it then? I will pray with the spirit, and I will pray with the understanding also: I will sing with the spirit, and I will sing with the understanding also. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Else when thou shalt bless with the spirit, how shall he that occupieth the room of the unlearned say Amen at thy giving of thanks, seeing he understandeth not what thou sayest? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For thou verily givest thanks well, but the other is not edified. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I thank my God, I speak with tongues more than ye all: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'yet in the church I had rather speak five words with my understanding, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: by my voice
  - type: text
    text: ' I might teach others also, than ten thousand words in an '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unknown
  - type: text
    text: ' tongue.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Brethren, be not children in understanding: howbeit in malice be ye children, but in understanding be men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'In the law it is written, With '
  - type: usfm
    marker: add
    children:
    - type: text
      text: men of
  - type: text
    text: ' other tongues and other lips will I speak unto this people; and yet for all that will they not hear me, saith the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Wherefore tongues are for a sign, not to them that believe, but to them that believe not: but prophesying '
  - type: usfm
    marker: add
    children:
    - type: text
      text: serveth
  - type: text
    text: ' not for them that believe not, but for them which believe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'If therefore the whole church be come together into one place, and all speak with tongues, and there come in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: those that are
  - type: text
    text: ' unlearned, or unbelievers, will they not say that ye are mad? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'But if all prophesy, and there come in one that believeth not, or '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' unlearned, he is convinced of all, he is judged of all: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'and thus are the secrets of his heart made manifest; and so falling down on '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' face he will worship God, and report that God is in you of a truth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'How is it then, brethren? when ye come together, every one of you hath a psalm, hath a doctrine, hath a tongue, hath a revelation, hath an interpretation. Let all things be done unto edifying. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'If any man speak in an '
  - type: usfm
    marker: add
    children:
    - type: text
      text: unknown
  - type: text
    text: ' tongue, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: let it be
  - type: text
    text: ' by two, or at the most '
  - type: usfm
    marker: add
    children:
    - type: text
      text: by
  - type: text
    text: ' three, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' by course; and let one interpret. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'But if there be no interpreter, let him keep silence in the church; and let him speak to himself, and to God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Let the prophets speak two or three, and let the other judge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'If '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any thing
  - type: text
    text: ' be revealed to another that sitteth by, let the first hold his peace. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'For ye may all prophesy one by one, that all may learn, and all may be comforted. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And the spirits of the prophets are subject to the prophets. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'For God is not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the author
  - type: text
    text: ' of confusion, but of peace, as in all churches of the saints.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Let your women keep silence in the churches: for it is not permitted unto them to speak; but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they are commanded
  - type: text
    text: ' to be under obedience, as also saith the law. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And if they will learn any thing, let them ask their husbands at home: for it is a shame for women to speak in the church. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: What? came the word of God out from you? or came it unto you only?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'If any man think himself to be a prophet, or spiritual, let him acknowledge that the things that I write unto you are the commandments of the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'But if any man be ignorant, let him be ignorant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Wherefore, brethren, covet to prophesy, and forbid not to speak with tongues. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Let all things be done decently and in order.
