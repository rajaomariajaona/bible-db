document_id: 1CO.14,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Gift of Tongues
  - type: text
    content: 'Follow after charity, and desire spiritual '
  - type: text
    content: gifts
  - type: text
    content: ', but rather that ye may prophesy. '
  '10':
  - type: text
    content: 'There are, it may be, so many kinds of voices in the world, and none of them '
  - type: text
    content: is
  - type: text
    content: ' without signification. '
  '11':
  - type: text
    content: 'Therefore if I know not the meaning of the voice, I shall be unto him that speaketh a barbarian, and he that speaketh '
  - type: text
    content: shall be
  - type: text
    content: ' a barbarian unto me. '
  '12':
  - type: text
    content: 'Even so ye, forasmuch as ye are zealous of spiritual '
  - type: text
    content: gifts
  - type: text
    content: ', seek that ye may excel to the edifying of the church. '
  '13':
  - type: text
    content: 'Wherefore let him that speaketh in an '
  - type: text
    content: unknown
  - type: text
    content: ' tongue pray that he may interpret. '
  '14':
  - type: text
    content: 'For if I pray in an '
  - type: text
    content: unknown
  - type: text
    content: ' tongue, my spirit prayeth, but my understanding is unfruitful. '
  '15':
  - type: text
    content: 'What is it then? I will pray with the spirit, and I will pray with the understanding also: I will sing with the spirit, and I will sing with the understanding also. '
  '16':
  - type: text
    content: 'Else when thou shalt bless with the spirit, how shall he that occupieth the room of the unlearned say Amen at thy giving of thanks, seeing he understandeth not what thou sayest? '
  '17':
  - type: text
    content: 'For thou verily givest thanks well, but the other is not edified. '
  '18':
  - type: text
    content: 'I thank my God, I speak with tongues more than ye all: '
  '19':
  - type: text
    content: 'yet in the church I had rather speak five words with my understanding, that '
  - type: text
    content: by my voice
  - type: text
    content: ' I might teach others also, than ten thousand words in an '
  - type: text
    content: unknown
  - type: text
    content: ' tongue.'
  '2':
  - type: text
    content: 'For he that speaketh in an '
  - type: text
    content: unknown
  - type: text
    content: ' tongue speaketh not unto men, but unto God: for no man understandeth '
  - type: text
    content: him
  - type: text
    content: '; howbeit in the spirit he speaketh mysteries. '
  '20':
  - type: text
    content: 'Brethren, be not children in understanding: howbeit in malice be ye children, but in understanding be men. '
  '21':
  - type: text
    content: 'In the law it is written, With '
  - type: text
    content: men of
  - type: text
    content: ' other tongues and other lips will I speak unto this people; and yet for all that will they not hear me, saith the Lord. '
  '22':
  - type: text
    content: 'Wherefore tongues are for a sign, not to them that believe, but to them that believe not: but prophesying '
  - type: text
    content: serveth
  - type: text
    content: ' not for them that believe not, but for them which believe. '
  '23':
  - type: text
    content: 'If therefore the whole church be come together into one place, and all speak with tongues, and there come in '
  - type: text
    content: those that are
  - type: text
    content: ' unlearned, or unbelievers, will they not say that ye are mad? '
  '24':
  - type: text
    content: 'But if all prophesy, and there come in one that believeth not, or '
  - type: text
    content: one
  - type: text
    content: ' unlearned, he is convinced of all, he is judged of all: '
  '25':
  - type: text
    content: 'and thus are the secrets of his heart made manifest; and so falling down on '
  - type: text
    content: his
  - type: text
    content: ' face he will worship God, and report that God is in you of a truth.'
  '26':
  - type: text
    content: 'How is it then, brethren? when ye come together, every one of you hath a psalm, hath a doctrine, hath a tongue, hath a revelation, hath an interpretation. Let all things be done unto edifying. '
  '27':
  - type: text
    content: 'If any man speak in an '
  - type: text
    content: unknown
  - type: text
    content: ' tongue, '
  - type: text
    content: let it be
  - type: text
    content: ' by two, or at the most '
  - type: text
    content: by
  - type: text
    content: ' three, and '
  - type: text
    content: that
  - type: text
    content: ' by course; and let one interpret. '
  '28':
  - type: text
    content: 'But if there be no interpreter, let him keep silence in the church; and let him speak to himself, and to God. '
  '29':
  - type: text
    content: 'Let the prophets speak two or three, and let the other judge. '
  '3':
  - type: text
    content: 'But he that prophesieth speaketh unto men '
  - type: text
    content: to
  - type: text
    content: ' edification, and exhortation, and comfort. '
  '30':
  - type: text
    content: 'If '
  - type: text
    content: any thing
  - type: text
    content: ' be revealed to another that sitteth by, let the first hold his peace. '
  '31':
  - type: text
    content: 'For ye may all prophesy one by one, that all may learn, and all may be comforted. '
  '32':
  - type: text
    content: 'And the spirits of the prophets are subject to the prophets. '
  '33':
  - type: text
    content: 'For God is not '
  - type: text
    content: the author
  - type: text
    content: ' of confusion, but of peace, as in all churches of the saints.'
  '34':
  - type: text
    content: 'Let your women keep silence in the churches: for it is not permitted unto them to speak; but '
  - type: text
    content: they are commanded
  - type: text
    content: ' to be under obedience, as also saith the law. '
  '35':
  - type: text
    content: 'And if they will learn any thing, let them ask their husbands at home: for it is a shame for women to speak in the church. '
  '36':
  - type: text
    content: What? came the word of God out from you? or came it unto you only?
  '37':
  - type: text
    content: 'If any man think himself to be a prophet, or spiritual, let him acknowledge that the things that I write unto you are the commandments of the Lord. '
  '38':
  - type: text
    content: 'But if any man be ignorant, let him be ignorant. '
  '39':
  - type: text
    content: 'Wherefore, brethren, covet to prophesy, and forbid not to speak with tongues. '
  '4':
  - type: text
    content: 'He that speaketh in an '
  - type: text
    content: unknown
  - type: text
    content: ' tongue edifieth himself; but he that prophesieth edifieth the church. '
  '40':
  - type: text
    content: Let all things be done decently and in order.
  '5':
  - type: text
    content: 'I would that ye all spake with tongues, but rather that ye prophesied: for greater '
  - type: text
    content: is
  - type: text
    content: ' he that prophesieth than he that speaketh with tongues, except he interpret, that the church may receive edifying.'
  '6':
  - type: text
    content: 'Now, brethren, if I come unto you speaking with tongues, what shall I profit you, except I shall speak to you either by revelation, or by knowledge, or by prophesying, or by doctrine? '
  '7':
  - type: text
    content: 'And even things without life giving sound, whether pipe or harp, except they give a distinction in the sounds, how shall it be known what is piped or harped? '
  '8':
  - type: text
    content: 'For if the trumpet give an uncertain sound, who shall prepare himself to the battle? '
  '9':
  - type: text
    content: 'So likewise ye, except ye utter by the tongue words easy to be understood, how shall it be known what is spoken? for ye shall speak into the air. '
