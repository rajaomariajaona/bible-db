document_id: REV.14,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Church Triumphant
  - type: text
    content: 'And I looked, and, lo, a Lamb stood on the mount Sion, and with him an hundred forty '
  - type: text
    content: and
  - type: text
    content: ' four thousand, having his Father''s name written in their foreheads. '
  '10':
  - type: text
    content: 'the same shall drink of the wine of the wrath of God, which is poured out without mixture into the cup of his indignation; and he shall be tormented with fire and brimstone in the presence of the holy angels, and in the presence of the Lamb: '
  '11':
  - type: text
    content: 'and the smoke of their torment ascendeth up for ever and ever: and they have no rest day nor night, who worship the beast and his image, and whosoever receiveth the mark of his name. '
  '12':
  - type: text
    content: 'Here is the patience of the saints: here '
  - type: text
    content: are
  - type: text
    content: ' they that keep the commandments of God, and the faith of Jesus.'
  '13':
  - type: text
    content: 'And I heard a voice from heaven saying unto me, Write, Blessed '
  - type: text
    content: are
  - type: text
    content: ' the dead which die in the Lord from henceforth: Yea, saith the Spirit, that they may rest from their labours; and their works do follow them.'
  '14':
  - type: text
    content: 'And I looked, and behold a white cloud, and upon the cloud '
  - type: text
    content: one
  - type: text
    content: ' sat like unto the Son of man, having on his head a golden crown, and in his hand a sharp sickle. '
  '15':
  - type: text
    content: 'And another angel came out of the temple, crying with a loud voice to him that sat on the cloud, Thrust in thy sickle, and reap: for the time is come for thee to reap; for the harvest of the earth is ripe. '
  '16':
  - type: text
    content: And he that sat on the cloud thrust in his sickle on the earth; and the earth was reaped.
  '17':
  - type: text
    content: 'And another angel came out of the temple which is in heaven, he also having a sharp sickle. '
  '18':
  - type: text
    content: 'And another angel came out from the altar, which had power over fire; and cried with a loud cry to him that had the sharp sickle, saying, Thrust in thy sharp sickle, and gather the clusters of the vine of the earth; for her grapes are fully ripe. '
  '19':
  - type: text
    content: 'And the angel thrust in his sickle into the earth, and gathered the vine of the earth, and cast '
  - type: text
    content: it
  - type: text
    content: ' into the great winepress of the wrath of God. '
  '2':
  - type: text
    content: 'And I heard a voice from heaven, as the voice of many waters, and as the voice of a great thunder: and I heard the voice of harpers harping with their harps: '
  '20':
  - type: text
    content: 'And the winepress was trodden without the city, and blood came out of the winepress, even unto the horse bridles, by the space of a thousand '
  - type: text
    content: and
  - type: text
    content: ' six hundred furlongs.'
  '3':
  - type: text
    content: 'and they sung as it were a new song before the throne, and before the four beasts, and the elders: and no man could learn that song but the hundred '
  - type: text
    content: and
  - type: text
    content: ' forty '
  - type: text
    content: and
  - type: text
    content: ' four thousand, which were redeemed from the earth. '
  '4':
  - type: text
    content: 'These are they which were not defiled with women; for they are virgins. These are they which follow the Lamb whithersoever he goeth. These were redeemed from among men, '
  - type: text
    content: being
  - type: text
    content: ' the firstfruits unto God and to the Lamb. '
  '5':
  - type: text
    content: 'And in their mouth was found no guile: for they are without fault before the throne of God.'
  '6':
  - type: text
    content: 'And I saw another angel fly in the midst of heaven, having the everlasting gospel to preach unto them that dwell on the earth, and to every nation, and kindred, and tongue, and people, '
  '7':
  - type: text
    content: 'saying with a loud voice, Fear God, and give glory to him; for the hour of his judgment is come: and worship him that made heaven, and earth, and the sea, and the fountains of waters.'
  '8':
  - type: text
    content: And there followed another angel, saying, Babylon is fallen, is fallen, that great city, because she made all nations drink of the wine of the wrath of her fornication.
  '9':
  - type: text
    content: 'And the third angel followed them, saying with a loud voice, If any man worship the beast and his image, and receive '
  - type: text
    content: his
  - type: text
    content: ' mark in his forehead, or in his hand, '
