document_id: REV.14
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Church Triumphant
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And I looked, and, lo, a Lamb stood on the mount Sion, and with him an hundred forty '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' four thousand, having his Father''s name written in their foreheads. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And I heard a voice from heaven, as the voice of many waters, and as the voice of a great thunder: and I heard the voice of harpers harping with their harps: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and they sung as it were a new song before the throne, and before the four beasts, and the elders: and no man could learn that song but the hundred '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' forty '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' four thousand, which were redeemed from the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'These are they which were not defiled with women; for they are virgins. These are they which follow the Lamb whithersoever he goeth. These were redeemed from among men, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' the firstfruits unto God and to the Lamb. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And in their mouth was found no guile: for they are without fault before the throne of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And I saw another angel fly in the midst of heaven, having the everlasting gospel to preach unto them that dwell on the earth, and to every nation, and kindred, and tongue, and people, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'saying with a loud voice, Fear God, and give glory to him; for the hour of his judgment is come: and worship him that made heaven, and earth, and the sea, and the fountains of waters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And there followed another angel, saying, Babylon is fallen, is fallen, that great city, because she made all nations drink of the wine of the wrath of her fornication.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the third angel followed them, saying with a loud voice, If any man worship the beast and his image, and receive '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' mark in his forehead, or in his hand, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'the same shall drink of the wine of the wrath of God, which is poured out without mixture into the cup of his indignation; and he shall be tormented with fire and brimstone in the presence of the holy angels, and in the presence of the Lamb: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and the smoke of their torment ascendeth up for ever and ever: and they have no rest day nor night, who worship the beast and his image, and whosoever receiveth the mark of his name. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Here is the patience of the saints: here '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' they that keep the commandments of God, and the faith of Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And I heard a voice from heaven saying unto me, Write, Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the dead which die in the Lord from henceforth: Yea, saith the Spirit, that they may rest from their labours; and their works do follow them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And I looked, and behold a white cloud, and upon the cloud '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' sat like unto the Son of man, having on his head a golden crown, and in his hand a sharp sickle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And another angel came out of the temple, crying with a loud voice to him that sat on the cloud, Thrust in thy sickle, and reap: for the time is come for thee to reap; for the harvest of the earth is ripe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And he that sat on the cloud thrust in his sickle on the earth; and the earth was reaped.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And another angel came out of the temple which is in heaven, he also having a sharp sickle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And another angel came out from the altar, which had power over fire; and cried with a loud cry to him that had the sharp sickle, saying, Thrust in thy sharp sickle, and gather the clusters of the vine of the earth; for her grapes are fully ripe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And the angel thrust in his sickle into the earth, and gathered the vine of the earth, and cast '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' into the great winepress of the wrath of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the winepress was trodden without the city, and blood came out of the winepress, even unto the horse bridles, by the space of a thousand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' six hundred furlongs.'
