verses:
  '1':
  - type: heading
    content: Sons of Reuben
  - type: text
    content: 'Now the sons of Reuben the firstborn of Israel, (for he '
  - type: text
    content: was
  - type: text
    content: ' the firstborn; but, forasmuch as he defiled his father''s bed, his birthright was given unto the sons of Joseph the son of Israel: and the genealogy is not to be reckoned after the birthright. '
  '10':
  - type: text
    content: 'And in the days of Saul they made war with the Hagarites, who fell by their hand: and they dwelt in their tents throughout all the east '
  - type: text
    content: land
  - type: text
    content: ' of Gilead.'
  '11':
  - type: text
    content: 'And the children of Gad dwelt over against them, in the land of Bashan unto Salcah: '
  '12':
  - type: text
    content: 'Joel the chief, and Shapham the next, and Jaanai, and Shaphat in Bashan. '
  '13':
  - type: text
    content: 'And their brethren of the house of their fathers '
  - type: text
    content: were
  - type: text
    content: ', Michael, and Meshullam, and Sheba, and Jorai, and Jachan, and Zia, and Heber, seven. '
  '14':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the children of Abihail the son of Huri, the son of Jaroah, the son of Gilead, the son of Michael, the son of Jeshishai, the son of Jahdo, the son of Buz; '
  '15':
  - type: text
    content: 'Ahi the son of Abdiel, the son of Guni, chief of the house of their fathers. '
  '16':
  - type: text
    content: 'And they dwelt in Gilead in Bashan, and in her towns, and in all the suburbs of Sharon, upon their borders. '
  '17':
  - type: text
    content: All these were reckoned by genealogies in the days of Jotham king of Judah, and in the days of Jeroboam king of Israel.
  '18':
  - type: text
    content: 'The sons of Reuben, and the Gadites, and half the tribe of Manasseh, of valiant men, men able to bear buckler and sword, and to shoot with bow, and skilful in war, '
  - type: text
    content: were
  - type: text
    content: ' four and forty thousand seven hundred and threescore, that went out to the war. '
  '19':
  - type: text
    content: 'And they made war with the Hagarites, with Jetur, and Nephish, and Nodab. '
  '2':
  - type: text
    content: 'For Judah prevailed above his brethren, and of him '
  - type: text
    content: came
  - type: text
    content: ' the chief ruler; but the birthright '
  - type: text
    content: was
  - type: text
    content: ' Joseph''s:) '
  '20':
  - type: text
    content: 'And they were helped against them, and the Hagarites were delivered into their hand, and all that '
  - type: text
    content: were
  - type: text
    content: ' with them: for they cried to God in the battle, and he was intreated of them; because they put their trust in him. '
  '21':
  - type: text
    content: 'And they took away their cattle; of their camels fifty thousand, and of sheep two hundred and fifty thousand, and of asses two thousand, and of men an hundred thousand. '
  '22':
  - type: text
    content: 'For there fell down many slain, because the war '
  - type: text
    content: was
  - type: text
    content: ' of God. And they dwelt in their steads until the captivity.'
  '23':
  - type: text
    content: 'And the children of the half tribe of Manasseh dwelt in the land: they increased from Bashan unto Baal-hermon and Senir, and unto mount Hermon. '
  '24':
  - type: text
    content: 'And these '
  - type: text
    content: were
  - type: text
    content: ' the heads of the house of their fathers, even Epher, and Ishi, and Eliel, and Azriel, and Jeremiah, and Hodaviah, and Jahdiel, mighty men of valour, famous men, '
  - type: text
    content: and
  - type: text
    content: ' heads of the house of their fathers.'
  '25':
  - type: text
    content: 'And they transgressed against the God of their fathers, and went a whoring after the gods of the people of the land, whom God destroyed before them. '
  '26':
  - type: text
    content: And the God of Israel stirred up the spirit of Pul king of Assyria, and the spirit of Tilgath-pilneser king of Assyria, and he carried them away, even the Reubenites, and the Gadites, and the half tribe of Manasseh, and brought them unto Halah, and Habor, and Hara, and to the river Gozan, unto this day.
  '3':
  - type: text
    content: 'the sons, '
  - type: text
    content: I say
  - type: text
    content: ', of Reuben the firstborn of Israel '
  - type: text
    content: were
  - type: text
    content: ', Hanoch, and Pallu, Hezron, and Carmi. '
  '4':
  - type: text
    content: 'The sons of Joel; Shemaiah his son, Gog his son, Shimei his son, '
  '5':
  - type: text
    content: 'Micah his son, Reaia his son, Baal his son, '
  '6':
  - type: text
    content: 'Beerah his son, whom Tilgath-pilneser king of Assyria carried away '
  - type: text
    content: 'captive:'
  - type: text
    content: ' he '
  - type: text
    content: was
  - type: text
    content: ' prince of the Reubenites. '
  '7':
  - type: text
    content: 'And his brethren by their families, when the genealogy of their generations was reckoned, '
  - type: text
    content: were
  - type: text
    content: ' the chief, Jeiel, and Zechariah, '
  '8':
  - type: text
    content: 'and Bela the son of Azaz, the son of Shema, the son of Joel, who dwelt in Aroer, even unto Nebo and Baal-meon: '
  '9':
  - type: text
    content: 'and eastward he inhabited unto the entering in of the wilderness from the river Euphrates: because their cattle were multiplied in the land of Gilead. '
