document_id: 1CH.5
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sons of Reuben
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the sons of Reuben the firstborn of Israel, (for he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the firstborn; but, forasmuch as he defiled his father''s bed, his birthright was given unto the sons of Joseph the son of Israel: and the genealogy is not to be reckoned after the birthright. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For Judah prevailed above his brethren, and of him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: came
  - type: text
    text: ' the chief ruler; but the birthright '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Joseph''s:) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'the sons, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I say
  - type: text
    text: ', of Reuben the firstborn of Israel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ', Hanoch, and Pallu, Hezron, and Carmi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The sons of Joel; Shemaiah his son, Gog his son, Shimei his son, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Micah his son, Reaia his son, Baal his son, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Beerah his son, whom Tilgath-pilneser king of Assyria carried away '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'captive:'
  - type: text
    text: ' he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' prince of the Reubenites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And his brethren by their families, when the genealogy of their generations was reckoned, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' the chief, Jeiel, and Zechariah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and Bela the son of Azaz, the son of Shema, the son of Joel, who dwelt in Aroer, even unto Nebo and Baal-meon: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and eastward he inhabited unto the entering in of the wilderness from the river Euphrates: because their cattle were multiplied in the land of Gilead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And in the days of Saul they made war with the Hagarites, who fell by their hand: and they dwelt in their tents throughout all the east '
  - type: usfm
    marker: add
    children:
    - type: text
      text: land
  - type: text
    text: ' of Gilead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the children of Gad dwelt over against them, in the land of Bashan unto Salcah: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Joel the chief, and Shapham the next, and Jaanai, and Shaphat in Bashan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And their brethren of the house of their fathers '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ', Michael, and Meshullam, and Sheba, and Jorai, and Jachan, and Zia, and Heber, seven. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the children of Abihail the son of Huri, the son of Jaroah, the son of Gilead, the son of Michael, the son of Jeshishai, the son of Jahdo, the son of Buz; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ahi the son of Abdiel, the son of Guni, chief of the house of their fathers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And they dwelt in Gilead in Bashan, and in her towns, and in all the suburbs of Sharon, upon their borders. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: All these were reckoned by genealogies in the days of Jotham king of Judah, and in the days of Jeroboam king of Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The sons of Reuben, and the Gadites, and half the tribe of Manasseh, of valiant men, men able to bear buckler and sword, and to shoot with bow, and skilful in war, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' four and forty thousand seven hundred and threescore, that went out to the war. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And they made war with the Hagarites, with Jetur, and Nephish, and Nodab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And they were helped against them, and the Hagarites were delivered into their hand, and all that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with them: for they cried to God in the battle, and he was intreated of them; because they put their trust in him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And they took away their cattle; of their camels fifty thousand, and of sheep two hundred and fifty thousand, and of asses two thousand, and of men an hundred thousand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'For there fell down many slain, because the war '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' of God. And they dwelt in their steads until the captivity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And the children of the half tribe of Manasseh dwelt in the land: they increased from Bashan unto Baal-hermon and Senir, and unto mount Hermon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' the heads of the house of their fathers, even Epher, and Ishi, and Eliel, and Azriel, and Jeremiah, and Hodaviah, and Jahdiel, mighty men of valour, famous men, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' heads of the house of their fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And they transgressed against the God of their fathers, and went a whoring after the gods of the people of the land, whom God destroyed before them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: And the God of Israel stirred up the spirit of Pul king of Assyria, and the spirit of Tilgath-pilneser king of Assyria, and he carried them away, even the Reubenites, and the Gadites, and the half tribe of Manasseh, and brought them unto Halah, and Habor, and Hara, and to the river Gozan, unto this day.
