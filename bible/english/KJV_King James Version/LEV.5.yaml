document_id: LEV.5,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if a soul sin, and hear the voice of swearing, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a witness, whether he hath seen or known '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of it
    - type: text
      text: '; if he do not utter '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', then he shall bear his iniquity. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he shall offer the second '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a burnt offering, according to the manner: and the priest shall make an atonement for him for his sin which he hath sinned, and it shall be forgiven him.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if he be not able to bring two turtledoves, or two young pigeons, then he that sinned shall bring for his offering the tenth part of an ephah of fine flour for a sin offering; he shall put no oil upon it, neither shall he put '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' frankincense thereon: for it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a sin offering. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then shall he bring it to the priest, and the priest shall take his handful of it, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' a memorial thereof, and burn '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' on the altar, according to the offerings made by fire unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a sin offering. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the priest shall make an atonement for him as touching his sin that he hath sinned in one of these, and it shall be forgiven him: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the remnant
    - type: text
      text: ' shall be the priest''s, as a meat offering.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Trespass Offering
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If a soul commit a trespass, and sin through ignorance, in the holy things of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; then he shall bring for his trespass unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' a ram without blemish out of the flocks, with thy estimation by shekels of silver, after the shekel of the sanctuary, for a trespass offering: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he shall make amends for the harm that he hath done in the holy thing, and shall add the fifth part thereto, and give it unto the priest: and the priest shall make an atonement for him with the ram of the trespass offering, and it shall be forgiven him. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if a soul sin, and commit any of these things which are forbidden to be done by the commandments of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; though he wist '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' not, yet is he guilty, and shall bear his iniquity. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he shall bring a ram without blemish out of the flock, with thy estimation, for a trespass offering, unto the priest: and the priest shall make an atonement for him concerning his ignorance wherein he erred and wist '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' not, and it shall be forgiven him. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a trespass offering: he hath certainly trespassed against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or if a soul touch any unclean thing, whether '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it be
    - type: text
      text: ' a carcase of an unclean beast, or a carcase of unclean cattle, or the carcase of unclean creeping things, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: if
    - type: text
      text: ' it be hidden from him; he also shall be unclean, and guilty. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or if he touch the uncleanness of man, whatsoever uncleanness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it be
    - type: text
      text: ' that a man shall be defiled withal, and it be hid from him; when he knoweth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of it
    - type: text
      text: ', then he shall be guilty. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or if a soul swear, pronouncing with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' lips to do evil, or to do good, whatsoever '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it be
    - type: text
      text: ' that a man shall pronounce with an oath, and it be hid from him; when he knoweth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of it
    - type: text
      text: ', then he shall be guilty in one of these. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall be, when he shall be guilty in one of these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ', that he shall confess that he hath sinned in that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'thing:'
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he shall bring his trespass offering unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' for his sin which he hath sinned, a female from the flock, a lamb or a kid of the goats, for a sin offering; and the priest shall make an atonement for him concerning his sin. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if he be not able to bring a lamb, then he shall bring for his trespass, which he hath committed, two turtledoves, or two young pigeons, unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; one for a sin offering, and the other for a burnt offering. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he shall bring them unto the priest, who shall offer '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' for the sin offering first, and wring off his head from his neck, but shall not divide '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' asunder: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he shall sprinkle of the blood of the sin offering upon the side of the altar; and the rest of the blood shall be wrung out at the bottom of the altar: it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a sin offering. '
