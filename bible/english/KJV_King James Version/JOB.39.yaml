document_id: JOB.39,1
type_code: eng
verses:
  '1':
  - type: text
    content: Knowest thou the time when the wild goats of the rock bring forth?
  - type: text
    content: Or
  - type: text
    content: ' canst thou mark when the hinds do calve?'
  '10':
  - type: text
    content: Canst thou bind the unicorn with his band in the furrow?
  - type: text
    content: Or will he harrow the valleys after thee?
  '11':
  - type: text
    content: 'Wilt thou trust him, because his strength '
  - type: text
    content: is
  - type: text
    content: ' great?'
  - type: text
    content: Or wilt thou leave thy labour to him?
  '12':
  - type: text
    content: Wilt thou believe him, that he will bring home thy seed,
  - type: text
    content: 'And gather '
  - type: text
    content: it into
  - type: text
    content: ' thy barn?'
  '13':
  - type: text
    content: ' '
  - type: text
    content: Gavest thou
  - type: text
    content: ' the goodly wings unto the peacocks?'
  - type: text
    content: Or wings and feathers unto the ostrich?
  '14':
  - type: text
    content: Which leaveth her eggs in the earth,
  - type: text
    content: And warmeth them in dust,
  '15':
  - type: text
    content: And forgetteth that the foot may crush them,
  - type: text
    content: Or that the wild beast may break them.
  '16':
  - type: text
    content: 'She is hardened against her young ones, as though '
  - type: text
    content: they were
  - type: text
    content: ' not her''s:'
  - type: text
    content: Her labour is in vain without fear;
  '17':
  - type: text
    content: Because God hath deprived her of wisdom,
  - type: text
    content: Neither hath he imparted to her understanding.
  '18':
  - type: text
    content: What time she lifteth up herself on high,
  - type: text
    content: She scorneth the horse and his rider.
  '19':
  - type: text
    content: Hast thou given the horse strength?
  - type: text
    content: Hast thou clothed his neck with thunder?
  '2':
  - type: text
    content: 'Canst thou number the months '
  - type: text
    content: that
  - type: text
    content: ' they fulfil?'
  - type: text
    content: Or knowest thou the time when they bring forth?
  '20':
  - type: text
    content: Canst thou make him afraid as a grasshopper?
  - type: text
    content: 'The glory of his nostrils '
  - type: text
    content: is
  - type: text
    content: ' terrible.'
  '21':
  - type: text
    content: 'He paweth in the valley, and rejoiceth in '
  - type: text
    content: his
  - type: text
    content: ' strength:'
  - type: text
    content: He goeth on to meet the armed men.
  '22':
  - type: text
    content: He mocketh at fear, and is not affrighted;
  - type: text
    content: Neither turneth he back from the sword.
  '23':
  - type: text
    content: The quiver rattleth against him,
  - type: text
    content: The glittering spear and the shield.
  '24':
  - type: text
    content: 'He swalloweth the ground with fierceness and rage:'
  - type: text
    content: 'Neither believeth he that '
  - type: text
    content: it is
  - type: text
    content: ' the sound of the trumpet.'
  '25':
  - type: text
    content: He saith among the trumpets, Ha, ha;
  - type: text
    content: And he smelleth the battle afar off,
  - type: text
    content: The thunder of the captains, and the shouting.
  '26':
  - type: text
    content: Doth the hawk fly by thy wisdom,
  - type: text
    content: And
  - type: text
    content: ' stretch her wings toward the south?'
  '27':
  - type: text
    content: Doth the eagle mount up at thy command,
  - type: text
    content: And make her nest on high?
  '28':
  - type: text
    content: She dwelleth and abideth on the rock,
  - type: text
    content: Upon the crag of the rock, and the strong place.
  '29':
  - type: text
    content: From thence she seeketh the prey,
  - type: text
    content: And
  - type: text
    content: ' her eyes behold afar off.'
  '3':
  - type: text
    content: They bow themselves, they bring forth their young ones,
  - type: text
    content: They cast out their sorrows.
  '30':
  - type: text
    content: 'Her young ones also suck up blood:'
  - type: text
    content: 'And where the slain '
  - type: text
    content: are
  - type: text
    content: ', there '
  - type: text
    content: is
  - type: text
    content: ' she.'
  '4':
  - type: text
    content: Their young ones are in good liking, they grow up with corn;
  - type: text
    content: They go forth, and return not unto them.
  '5':
  - type: text
    content: Who hath sent out the wild ass free?
  - type: text
    content: Or who hath loosed the bands of the wild ass?
  '6':
  - type: text
    content: Whose house I have made the wilderness,
  - type: text
    content: And the barren land his dwellings.
  '7':
  - type: text
    content: He scorneth the multitude of the city,
  - type: text
    content: Neither regardeth he the crying of the driver.
  '8':
  - type: text
    content: 'The range of the mountains '
  - type: text
    content: is
  - type: text
    content: ' his pasture,'
  - type: text
    content: And he searcheth after every green thing.
  '9':
  - type: text
    content: Will the unicorn be willing to serve thee,
  - type: text
    content: Or abide by thy crib?
