document_id: JOB.39
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Knowest thou the time when the wild goats of the rock bring forth?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Or
  - type: text
    text: ' canst thou mark when the hinds do calve?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Canst thou number the months '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' they fulfil?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or knowest thou the time when they bring forth?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They bow themselves, they bring forth their young ones,
- type: usfm
  marker: q2
  children:
  - type: text
    text: They cast out their sorrows.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Their young ones are in good liking, they grow up with corn;
- type: usfm
  marker: q2
  children:
  - type: text
    text: They go forth, and return not unto them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Who hath sent out the wild ass free?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or who hath loosed the bands of the wild ass?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Whose house I have made the wilderness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the barren land his dwellings.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He scorneth the multitude of the city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Neither regardeth he the crying of the driver.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The range of the mountains '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' his pasture,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And he searcheth after every green thing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Will the unicorn be willing to serve thee,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or abide by thy crib?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Canst thou bind the unicorn with his band in the furrow?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or will he harrow the valleys after thee?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Wilt thou trust him, because his strength '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' great?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or wilt thou leave thy labour to him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Wilt thou believe him, that he will bring home thy seed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And gather '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it into
  - type: text
    text: ' thy barn?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Gavest thou
  - type: text
    text: ' the goodly wings unto the peacocks?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or wings and feathers unto the ostrich?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Which leaveth her eggs in the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And warmeth them in dust,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And forgetteth that the foot may crush them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or that the wild beast may break them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'She is hardened against her young ones, as though '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they were
  - type: text
    text: ' not her''s:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Her labour is in vain without fear;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Because God hath deprived her of wisdom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Neither hath he imparted to her understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: What time she lifteth up herself on high,
- type: usfm
  marker: q2
  children:
  - type: text
    text: She scorneth the horse and his rider.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Hast thou given the horse strength?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hast thou clothed his neck with thunder?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Canst thou make him afraid as a grasshopper?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The glory of his nostrils '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' terrible.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'He paweth in the valley, and rejoiceth in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' strength:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He goeth on to meet the armed men.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: He mocketh at fear, and is not affrighted;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Neither turneth he back from the sword.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The quiver rattleth against him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: The glittering spear and the shield.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'He swalloweth the ground with fierceness and rage:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Neither believeth he that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' the sound of the trumpet.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: He saith among the trumpets, Ha, ha;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And he smelleth the battle afar off,
- type: usfm
  marker: q2
  children:
  - type: text
    text: The thunder of the captains, and the shouting.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Doth the hawk fly by thy wisdom,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' stretch her wings toward the south?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Doth the eagle mount up at thy command,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And make her nest on high?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: She dwelleth and abideth on the rock,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Upon the crag of the rock, and the strong place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: From thence she seeketh the prey,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' her eyes behold afar off.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Her young ones also suck up blood:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And where the slain '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ', there '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' she.'
