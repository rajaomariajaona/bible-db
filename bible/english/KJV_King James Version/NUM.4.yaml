document_id: NUM.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses and unto Aaron, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Take the sum of the sons of Kohath from among the sons of Levi, after their families, by the house of their fathers, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'from thirty years old and upward even until fifty years old, all that enter into the host, to do the work in the tabernacle of the congregation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the service of the sons of Kohath in the tabernacle of the congregation, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: about
  - type: text
    text: ' the most holy things: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and when the camp setteth forward, Aaron shall come, and his sons, and they shall take down the covering vail, and cover the ark of testimony with it: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and shall put thereon the covering of badgers'' skins, and shall spread over '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' a cloth wholly of blue, and shall put in the staves thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And upon the table of shewbread they shall spread a cloth of blue, and put thereon the dishes, and the spoons, and the bowls, and covers to cover withal: and the continual bread shall be thereon: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and they shall spread upon them a cloth of scarlet, and cover the same with a covering of badgers'' skins, and shall put in the staves thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And they shall take a cloth of blue, and cover the candlestick of the light, and his lamps, and his tongs, and his snuffdishes, and all the oil vessels thereof, wherewith they minister unto it: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and they shall put it and all the vessels thereof within a covering of badgers'' skins, and shall put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon a bar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And upon the golden altar they shall spread a cloth of blue, and cover it with a covering of badgers'' skins, and shall put to the staves thereof: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and they shall take all the instruments of ministry, wherewith they minister in the sanctuary, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' in a cloth of blue, and cover them with a covering of badgers'' skins, and shall put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' on a bar: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and they shall take away the ashes from the altar, and spread a purple cloth thereon: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and they shall put upon it all the vessels thereof, wherewith they minister about it, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the censers, the fleshhooks, and the shovels, and the basons, all the vessels of the altar; and they shall spread upon it a covering of badgers'' skins, and put to the staves of it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And when Aaron and his sons have made an end of covering the sanctuary, and all the vessels of the sanctuary, as the camp is to set forward; after that, the sons of Kohath shall come to bear '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'it:'
  - type: text
    text: ' but they shall not touch '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' holy thing, lest they die. These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things are
  - type: text
    text: ' the burden of the sons of Kohath in the tabernacle of the congregation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And to the office of Eleazar the son of Aaron the priest '
  - type: usfm
    marker: add
    children:
    - type: text
      text: pertaineth
  - type: text
    text: ' the oil for the light, and the sweet incense, and the daily meat offering, and the anointing oil, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the oversight of all the tabernacle, and of all that therein '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ', in the sanctuary, and in the vessels thereof.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses and unto Aaron, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Cut ye not off the tribe of the families of the Kohathites from among the Levites: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'but thus do unto them, that they may live, and not die, when they approach unto the most holy things: Aaron and his sons shall go in, and appoint them every one to his service and to his burden: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: but they shall not go in to see when the holy things are covered, lest they die.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Take also the sum of the sons of Gershon, throughout the houses of their fathers, by their families; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'from thirty years old and upward until fifty years old shalt thou number them; all that enter in to perform the service, to do the work in the tabernacle of the congregation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the service of the families of the Gershonites, to serve, and for burdens: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'and they shall bear the curtains of the tabernacle, and the tabernacle of the congregation, his covering, and the covering of the badgers'' skins that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' above upon it, and the hanging for the door of the tabernacle of the congregation, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and the hangings of the court, and the hanging for the door of the gate of the court, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' by the tabernacle and by the altar round about, and their cords, and all the instruments of their service, and all that is made for them: so shall they serve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'At the appointment of Aaron and his sons shall be all the service of the sons of the Gershonites, in all their burdens, and in all their service: and ye shall appoint unto them in charge all their burdens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the service of the families of the sons of Gershon in the tabernacle of the congregation: and their charge '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' under the hand of Ithamar the son of Aaron the priest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'As for the sons of Merari, thou shalt number them after their families, by the house of their fathers; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'from thirty years old and upward even unto fifty years old shalt thou number them, every one that entereth into the service, to do the work of the tabernacle of the congregation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the charge of their burden, according to all their service in the tabernacle of the congregation; the boards of the tabernacle, and the bars thereof, and the pillars thereof, and sockets thereof, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'and the pillars of the court round about, and their sockets, and their pins, and their cords, with all their instruments, and with all their service: and by name ye shall reckon the instruments of the charge of their burden. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the service of the families of the sons of Merari, according to all their service, in the tabernacle of the congregation, under the hand of Ithamar the son of Aaron the priest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And Moses and Aaron and the chief of the congregation numbered the sons of the Kohathites after their families, and after the house of their fathers, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'from thirty years old and upward even unto fifty years old, every one that entereth into the service, for the work in the tabernacle of the congregation: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'and those that were numbered of them by their families were two thousand seven hundred and fifty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' they that were numbered of the families of the Kohathites, all that might do service in the tabernacle of the congregation, which Moses and Aaron did number according to the commandment of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' by the hand of Moses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And those that were numbered of the sons of Gershon, throughout their families, and by the house of their fathers, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'from thirty years old and upward even unto fifty years old, every one that entereth into the service, for the work in the tabernacle of the congregation, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'even those that were numbered of them, throughout their families, by the house of their fathers, were two thousand and six hundred and thirty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' they that were numbered of the families of the sons of Gershon, of all that might do service in the tabernacle of the congregation, whom Moses and Aaron did number according to the commandment of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And those that were numbered of the families of the sons of Merari, throughout their families, by the house of their fathers, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'from thirty years old and upward even unto fifty years old, every one that entereth into the service, for the work in the tabernacle of the congregation, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'even those that were numbered of them after their families, were three thousand and two hundred. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' those that were numbered of the families of the sons of Merari, whom Moses and Aaron numbered according to the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' by the hand of Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'All those that were numbered of the Levites, whom Moses and Aaron and the chief of Israel numbered, after their families, and after the house of their fathers, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'from thirty years old and upward even unto fifty years old, every one that came to do the service of the ministry, and the service of the burden in the tabernacle of the congregation, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'even those that were numbered of them, were eight thousand and five hundred and fourscore. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'According to the commandment of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' they were numbered by the hand of Moses, every one according to his service, and according to his burden: thus were they numbered of him, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses.'
