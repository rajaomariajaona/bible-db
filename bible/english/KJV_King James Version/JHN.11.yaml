document_id: JHN.11,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord of Life
  - type: text
    content: 'Now a certain '
  - type: text
    content: man
  - type: text
    content: ' was sick, '
  - type: text
    content: named
  - type: text
    content: ' Lazarus, of Bethany, the town of Mary and her sister Martha. '
  '10':
  - type: text
    content: But if a man walk in the night, he stumbleth, because there is no light in him.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'These things said he: and after that he saith unto them, '
  - type: text
    content: Our friend Lazarus sleepeth; but I go, that I may awake him out of sleep.
  '12':
  - type: text
    content: 'Then said his disciples, Lord, if he sleep, he shall do well. '
  '13':
  - type: text
    content: 'Howbeit Jesus spake of his death: but they thought that he had spoken of taking of rest in sleep. '
  '14':
  - type: text
    content: 'Then said Jesus unto them plainly, '
  - type: text
    content: Lazarus is dead.
  - type: text
    content: ' '
  '15':
  - type: text
    content: And I am glad for your sakes that I was not there, to the intent ye may believe; nevertheless let us go unto him.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Then said Thomas, which is called Didymus, unto his fellowdisciples, Let us also go, that we may die with him. '
  '17':
  - type: text
    content: 'Then when Jesus came, he found that he had '
  - type: text
    content: lain
  - type: text
    content: ' in the grave four days already. '
  '18':
  - type: text
    content: 'Now Bethany was nigh unto Jerusalem, about fifteen furlongs off: '
  '19':
  - type: text
    content: and many of the Jews came to Martha and Mary, to comfort them concerning their brother.
  '2':
  - type: text
    content: '(It was '
  - type: text
    content: that
  - type: text
    content: ' Mary which anointed the Lord with ointment, and wiped his feet with her hair, whose brother Lazarus was sick.) '
  '20':
  - type: text
    content: 'Then Martha, as soon as she heard that Jesus was coming, went and met him: but Mary sat '
  - type: text
    content: still
  - type: text
    content: ' in the house. '
  '21':
  - type: text
    content: 'Then said Martha unto Jesus, Lord, if thou hadst been here, my brother had not died. '
  '22':
  - type: text
    content: 'But I know, that even now, whatsoever thou wilt ask of God, God will give '
  - type: text
    content: it
  - type: text
    content: ' thee. '
  '23':
  - type: text
    content: 'Jesus saith unto her, '
  - type: text
    content: Thy brother shall rise again.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Martha saith unto him, I know that he shall rise again in the resurrection at the last day. '
  '25':
  - type: text
    content: 'Jesus said unto her, '
  - type: text
    content: 'I am the resurrection, and the life: he that believeth in me, though he were dead, yet shall he live:'
  - type: text
    content: ' '
  '26':
  - type: text
    content: and whosoever liveth and believeth in me shall never die. Believest thou this?
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'She saith unto him, Yea, Lord: I believe that thou art the Christ, the Son of God, which should come into the world. '
  '28':
  - type: text
    content: 'And when she had so said, she went her way, and called Mary her sister secretly, saying, The Master is come, and calleth for thee. '
  '29':
  - type: text
    content: 'As soon as she heard '
  - type: text
    content: that
  - type: text
    content: ', she arose quickly, and came unto him. '
  '3':
  - type: text
    content: 'Therefore his sisters sent unto him, saying, Lord, behold, he whom thou lovest is sick. '
  '30':
  - type: text
    content: 'Now Jesus was not yet come into the town, but was in that place where Martha met him. '
  '31':
  - type: text
    content: The Jews then which were with her in the house, and comforted her, when they saw Mary, that she rose up hastily and went out, followed her, saying, She goeth unto the grave to weep there.
  '32':
  - type: text
    content: 'Then when Mary was come where Jesus was, and saw him, she fell down at his feet, saying unto him, Lord, if thou hadst been here, my brother had not died. '
  '33':
  - type: text
    content: 'When Jesus therefore saw her weeping, and the Jews also weeping which came with her, he groaned in the spirit, and was troubled, '
  '34':
  - type: text
    content: 'and said, '
  - type: text
    content: Where have ye laid him?
  - type: text
    content: ' They said unto him, Lord, come and see. '
  '35':
  - type: text
    content: 'Jesus wept. '
  '36':
  - type: text
    content: 'Then said the Jews, Behold how he loved him! '
  '37':
  - type: text
    content: And some of them said, Could not this man, which opened the eyes of the blind, have caused that even this man should not have died?
  '38':
  - type: text
    content: 'Jesus therefore again groaning in himself cometh to the grave. It was a cave, and a stone lay upon it. '
  '39':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: Take ye away the stone.
  - type: text
    content: ' Martha, the sister of him that was dead, saith unto him, Lord, by this time he stinketh: for he hath been '
  - type: text
    content: dead
  - type: text
    content: ' four days. '
  '4':
  - type: text
    content: 'When Jesus heard '
  - type: text
    content: that
  - type: text
    content: ', he said, '
  - type: text
    content: This sickness is not unto death, but for the glory of God, that the Son of God might be glorified thereby.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Jesus saith unto her, '
  - type: text
    content: Said I not unto thee, that, if thou wouldest believe, thou shouldest see the glory of God?
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'Then they took away the stone '
  - type: text
    content: from the place
  - type: text
    content: ' where the dead was laid. And Jesus lifted up '
  - type: text
    content: his
  - type: text
    content: ' eyes, and said, '
  - type: text
    content: Father, I thank thee that thou hast heard me.
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'And I knew that thou hearest me always: but because of the people which stand by I said '
  - type: text
    content: it
  - type: text
    content: ', that they may believe that thou hast sent me.'
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'And when he thus had spoken, he cried with a loud voice, '
  - type: text
    content: Lazarus, come forth.
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'And he that was dead came forth, bound hand and foot with graveclothes: and his face was bound about with a napkin. Jesus saith unto them, '
  - type: text
    content: Loose him, and let him go.
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'Then many of the Jews which came to Mary, and had seen the things which Jesus did, believed on him. '
  '46':
  - type: text
    content: But some of them went their ways to the Pharisees, and told them what things Jesus had done.
  '47':
  - type: text
    content: 'Then gathered the chief priests and the Pharisees a council, and said, What do we? for this man doeth many miracles. '
  '48':
  - type: text
    content: 'If we let him thus alone, all '
  - type: text
    content: men
  - type: text
    content: ' will believe on him: and the Romans shall come and take away both our place and nation. '
  '49':
  - type: text
    content: 'And one of them, '
  - type: text
    content: named
  - type: text
    content: ' Caiaphas, being the high priest that same year, said unto them, Ye know nothing at all, '
  '5':
  - type: text
    content: Now Jesus loved Martha, and her sister, and Lazarus.
  '50':
  - type: text
    content: 'nor consider that it is expedient for us, that one man should die for the people, and that the whole nation perish not. '
  '51':
  - type: text
    content: 'And this spake he not of himself: but being high priest that year, he prophesied that Jesus should die for that nation; '
  '52':
  - type: text
    content: 'and not for that nation only, but that also he should gather together in one the children of God that were scattered abroad. '
  '53':
  - type: text
    content: 'Then from that day forth they took counsel together for to put him to death. '
  '54':
  - type: text
    content: Jesus therefore walked no more openly among the Jews; but went thence unto a country near to the wilderness, into a city called Ephraim, and there continued with his disciples.
  - type: heading
    content: The Approaching Passover
  '55':
  - type: text
    content: 'And the Jews'' passover was nigh at hand: and many went out of the country up to Jerusalem before the passover, to purify themselves. '
  '56':
  - type: text
    content: 'Then sought they for Jesus, and spake among themselves, as they stood in the temple, What think ye, that he will not come to the feast? '
  '57':
  - type: text
    content: 'Now both the chief priests and the Pharisees had given a commandment, that, if any man knew where he were, he should shew '
  - type: text
    content: it
  - type: text
    content: ', that they might take him.'
  '6':
  - type: text
    content: 'When he had heard therefore that he was sick, he abode two days still in the same place where he was. '
  '7':
  - type: text
    content: 'Then after that saith he to '
  - type: text
    content: his
  - type: text
    content: ' disciples, '
  - type: text
    content: Let us go into Judæa again.
  - type: text
    content: ' '
  '8':
  - type: text
    content: His
  - type: text
    content: ' disciples say unto him, Master, the Jews of late sought to stone thee; and goest thou thither again? '
  '9':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: Are there not twelve hours in the day? If any man walk in the day, he stumbleth not, because he seeth the light of this world.
  - type: text
    content: ' '
