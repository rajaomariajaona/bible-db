document_id: JHN.11,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Lord of Life
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now a certain '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' was sick, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: named
    - type: text
      text: ' Lazarus, of Bethany, the town of Mary and her sister Martha. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But if a man walk in the night, he stumbleth, because there is no light in him.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These things said he: and after that he saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Our friend Lazarus sleepeth; but I go, that I may awake him out of sleep.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said his disciples, Lord, if he sleep, he shall do well. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Howbeit Jesus spake of his death: but they thought that he had spoken of taking of rest in sleep. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said Jesus unto them plainly, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Lazarus is dead.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And I am glad for your sakes that I was not there, to the intent ye may believe; nevertheless let us go unto him.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said Thomas, which is called Didymus, unto his fellowdisciples, Let us also go, that we may die with him. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then when Jesus came, he found that he had '
    - type: usfm
      marker: add
      children:
      - type: text
        text: lain
    - type: text
      text: ' in the grave four days already. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Bethany was nigh unto Jerusalem, about fifteen furlongs off: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and many of the Jews came to Martha and Mary, to comfort them concerning their brother.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(It was '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' Mary which anointed the Lord with ointment, and wiped his feet with her hair, whose brother Lazarus was sick.) '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Martha, as soon as she heard that Jesus was coming, went and met him: but Mary sat '
    - type: usfm
      marker: add
      children:
      - type: text
        text: still
    - type: text
      text: ' in the house. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said Martha unto Jesus, Lord, if thou hadst been here, my brother had not died. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I know, that even now, whatsoever thou wilt ask of God, God will give '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' thee. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus saith unto her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Thy brother shall rise again.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Martha saith unto him, I know that he shall rise again in the resurrection at the last day. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said unto her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I am the resurrection, and the life: he that believeth in me, though he were dead, yet shall he live:'
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and whosoever liveth and believeth in me shall never die. Believest thou this?
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She saith unto him, Yea, Lord: I believe that thou art the Christ, the Son of God, which should come into the world. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when she had so said, she went her way, and called Mary her sister secretly, saying, The Master is come, and calleth for thee. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As soon as she heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ', she arose quickly, and came unto him. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore his sisters sent unto him, saying, Lord, behold, he whom thou lovest is sick. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Jesus was not yet come into the town, but was in that place where Martha met him. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Jews then which were with her in the house, and comforted her, when they saw Mary, that she rose up hastily and went out, followed her, saying, She goeth unto the grave to weep there.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then when Mary was come where Jesus was, and saw him, she fell down at his feet, saying unto him, Lord, if thou hadst been here, my brother had not died. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus therefore saw her weeping, and the Jews also weeping which came with her, he groaned in the spirit, and was troubled, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Where have ye laid him?
    - type: text
      text: ' They said unto him, Lord, come and see. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus wept. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said the Jews, Behold how he loved him! '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And some of them said, Could not this man, which opened the eyes of the blind, have caused that even this man should not have died?
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus therefore again groaning in himself cometh to the grave. It was a cave, and a stone lay upon it. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Take ye away the stone.
    - type: text
      text: ' Martha, the sister of him that was dead, saith unto him, Lord, by this time he stinketh: for he hath been '
    - type: usfm
      marker: add
      children:
      - type: text
        text: dead
    - type: text
      text: ' four days. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ', he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: This sickness is not unto death, but for the glory of God, that the Son of God might be glorified thereby.
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus saith unto her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Said I not unto thee, that, if thou wouldest believe, thou shouldest see the glory of God?
    - type: text
      text: ' '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they took away the stone '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from the place
    - type: text
      text: ' where the dead was laid. And Jesus lifted up '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' eyes, and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Father, I thank thee that thou hast heard me.
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And I knew that thou hearest me always: but because of the people which stand by I said '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ', that they may believe that thou hast sent me.'
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he thus had spoken, he cried with a loud voice, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Lazarus, come forth.
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he that was dead came forth, bound hand and foot with graveclothes: and his face was bound about with a napkin. Jesus saith unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Loose him, and let him go.
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then many of the Jews which came to Mary, and had seen the things which Jesus did, believed on him. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But some of them went their ways to the Pharisees, and told them what things Jesus had done.
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then gathered the chief priests and the Pharisees a council, and said, What do we? for this man doeth many miracles. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If we let him thus alone, all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' will believe on him: and the Romans shall come and take away both our place and nation. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And one of them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: named
    - type: text
      text: ' Caiaphas, being the high priest that same year, said unto them, Ye know nothing at all, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now Jesus loved Martha, and her sister, and Lazarus.
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nor consider that it is expedient for us, that one man should die for the people, and that the whole nation perish not. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And this spake he not of himself: but being high priest that year, he prophesied that Jesus should die for that nation; '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and not for that nation only, but that also he should gather together in one the children of God that were scattered abroad. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then from that day forth they took counsel together for to put him to death. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus therefore walked no more openly among the Jews; but went thence unto a country near to the wilderness, into a city called Ephraim, and there continued with his disciples.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Approaching Passover
    marker-yv: yv-h
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the Jews'' passover was nigh at hand: and many went out of the country up to Jerusalem before the passover, to purify themselves. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then sought they for Jesus, and spake among themselves, as they stood in the temple, What think ye, that he will not come to the feast? '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now both the chief priests and the Pharisees had given a commandment, that, if any man knew where he were, he should shew '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', that they might take him.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he had heard therefore that he was sick, he abode two days still in the same place where he was. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then after that saith he to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Let us go into Judæa again.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: His
    - type: text
      text: ' disciples say unto him, Master, the Jews of late sought to stone thee; and goest thou thither again? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Are there not twelve hours in the day? If any man walk in the day, he stumbleth not, because he seeth the light of this world.
    - type: text
      text: ' '
