document_id: ECC.11,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Cast thy bread upon the waters: for thou shalt find it after many days. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Therefore remove sorrow from thy heart, and put away evil from thy flesh: for childhood and youth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' vanity.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Give a portion to seven, and also to eight; for thou knowest not what evil shall be upon the earth. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'If the clouds be full of rain, they empty '
    - type: usfm
      marker: add
      children:
      - type: text
        text: themselves
    - type: text
      text: ' upon the earth: and if the tree fall toward the south, or toward the north, in the place where the tree falleth, there it shall be. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'He that observeth the wind shall not sow; and he that regardeth the clouds shall not reap. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'As thou knowest not what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the way of the spirit, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: nor
    - type: text
      text: ' how the bones '
    - type: usfm
      marker: add
      children:
      - type: text
        text: do grow
    - type: text
      text: ' in the womb of her that is with child: even so thou knowest not the works of God who maketh all. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'In the morning sow thy seed, and in the evening withhold not thine hand: for thou knowest not whether shall prosper, either this or that, or whether they both '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' alike good. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Truly the light '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' sweet, and a pleasant '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thing it is
    - type: text
      text: ' for the eyes to behold the sun: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'but if a man live many years, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' rejoice in them all; yet let him remember the days of darkness; for they shall be many. All that cometh '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' vanity.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Rejoice, O young man, in thy youth; and let thy heart cheer thee in the days of thy youth, and walk in the ways of thine heart, and in the sight of thine eyes: but know thou, that for all these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' God will bring thee into judgment. '
