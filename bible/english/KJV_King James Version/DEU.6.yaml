  - type: text
    content: LORD
  - type: text
    content: ' sware unto thy fathers, '
  '19':
  - type: text
    content: 'to cast out all thine enemies from before thee, as the '
  - type: text
    content: LORD
  - type: text
    content: ' hath spoken.'
  '2':
  - type: text
    content: 'that thou mightest fear the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God, to keep all his statutes and his commandments, which I command thee, thou, and thy son, and thy son''s son, all the days of thy life; and that thy days may be prolonged. '
  '20':
  - type: text
    content: ' '
  - type: text
    content: And
  - type: text
    content: ' when thy son asketh thee in time to come, saying, What '
  - type: text
    content: mean
  - type: text
    content: ' the testimonies, and the statutes, and the judgments, which the '
  - type: text
    content: LORD
  - type: text
    content: ' our God hath commanded you? '
  '21':
  - type: text
    content: 'Then thou shalt say unto thy son, We were Pharaoh''s bondmen in Egypt; and the '
  - type: text
    content: LORD
  - type: text
    content: ' brought us out of Egypt with a mighty hand: '
  '22':
  - type: text
    content: 'and the '
  - type: text
    content: LORD
  - type: text
    content: ' shewed signs and wonders, great and sore, upon Egypt, upon Pharaoh, and upon all his household, before our eyes: '
  '23':
  - type: text
    content: 'and he brought us out from thence, that he might bring us in, to give us the land which he sware unto our fathers. '
  '24':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded us to do all these statutes, to fear the '
  - type: text
    content: LORD
  - type: text
    content: ' our God, for our good always, that he might preserve us alive, as '
  - type: text
    content: it is
  - type: text
    content: ' at this day. '
  '25':
  - type: text
    content: 'And it shall be our righteousness, if we observe to do all these commandments before the '
  - type: text
    content: LORD
  - type: text
    content: ' our God, as he hath commanded us.'
  '3':
  - type: text
    content: 'Hear therefore, O Israel, and observe to do '
  - type: text
    content: it
  - type: text
    content: '; that it may be well with thee, and that ye may increase mightily, as the '
  - type: text
    content: LORD
  - type: text
    content: ' God of thy fathers hath promised thee, in the land that floweth with milk and honey.'
  '4':
  - type: text
    content: 'Hear, O Israel: The '
  - type: text
    content: LORD
  - type: text
    content: ' our God '
  - type: text
    content: is
  - type: text
    content: ' one '
  - type: text
    content: LORD
  - type: text
    content: ': '
  '5':
  - type: text
    content: 'and thou shalt love the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God with all thine heart, and with all thy soul, and with all thy might. '
  '6':
  - type: text
    content: 'And these words, which I command thee this day, shall be in thine heart: '
  '7':
  - type: text
    content: 'and thou shalt teach them diligently unto thy children, and shalt talk of them when thou sittest in thine house, and when thou walkest by the way, and when thou liest down, and when thou risest up. '
  '8':
  - type: text
    content: 'And thou shalt bind them for a sign upon thine hand, and they shall be as frontlets between thine eyes. '
  '9':
  - type: text
    content: And thou shalt write them upon the posts of thy house, and on thy gates.
