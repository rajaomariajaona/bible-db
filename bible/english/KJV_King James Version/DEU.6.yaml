  '12':
  - type: text
    content: then
  - type: text
    content: ' beware lest thou forget the '
  - type: text
    content: LORD
  - type: text
    content: ', which brought thee forth out of the land of Egypt, from the house of bondage. '
  '13':
  - type: text
    content: 'Thou shalt fear the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God, and serve him, and shalt swear by his name. '
  '14':
  - type: text
    content: 'Ye shall not go after other gods, of the gods of the people which '
  - type: text
    content: are
  - type: text
