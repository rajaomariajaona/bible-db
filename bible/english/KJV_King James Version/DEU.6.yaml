  '15':
  - type: text
    content: '(for the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God '
  - type: text
    content: is
  - type: text
    content: ' a jealous God among you) lest the anger of the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God be kindled against thee, and destroy thee from off the face of the earth.'
  '16':
  - type: text
    content: 'Ye shall not tempt the '
  - type: text
    content: LORD
  - type: text
    content: ' your God, as ye tempted '
  - type: text
    content: him
  - type: text
    content: ' in Massah. '
  '17':
  - type: text
    content: 'Ye shall diligently keep the commandments of the '
  - type: text
    content: LORD
  - type: text
    content: ' your God, and his testimonies, and his statutes, which he hath commanded thee. '
  '18':
  - type: text
    content: 'And thou shalt do '
  - type: text
    content: that which is
  - type: text
    content: ' right and good in the sight of the '
  - type: text
    content: LORD
  - type: text
