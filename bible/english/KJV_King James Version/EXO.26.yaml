document_id: EXO.26
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moreover thou shalt make the tabernacle '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' ten curtains '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' fine twined linen, and blue, and purple, and scarlet: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' cherubims of cunning work shalt thou make them. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The length of one curtain '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' eight and twenty cubits, and the breadth of one curtain four cubits: and every one of the curtains shall have one measure. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The five curtains shall be coupled together one to another; and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: other
  - type: text
    text: ' five curtains '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' coupled one to another. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And thou shalt make loops of blue upon the edge of the one curtain from the selvedge in the coupling; and likewise shalt thou make in the uttermost edge of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: another
  - type: text
    text: ' curtain, in the coupling of the second. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fifty loops shalt thou make in the one curtain, and fifty loops shalt thou make in the edge of the curtain that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the coupling of the second; that the loops may take hold one of another. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And thou shalt make fifty taches of gold, and couple the curtains together with the taches: and it shall be one tabernacle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And thou shalt make curtains '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' goats'' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hair
  - type: text
    text: ' to be a covering upon the tabernacle: eleven curtains shalt thou make. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The length of one curtain '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' thirty cubits, and the breadth of one curtain four cubits: and the eleven curtains '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be all
  - type: text
    text: ' of one measure. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And thou shalt couple five curtains by themselves, and six curtains by themselves, and shalt double the sixth curtain in the forefront of the tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And thou shalt make fifty loops on the edge of the one curtain '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' outmost in the coupling, and fifty loops in the edge of the curtain which coupleth the second. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And thou shalt make fifty taches of brass, and put the taches into the loops, and couple the tent together, that it may be one. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And the remnant that remaineth of the curtains of the tent, the half curtain that remaineth, shall hang over the backside of the tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And a cubit on the one side, and a cubit on the other side of that which remaineth in the length of the curtains of the tent, it shall hang over the sides of the tabernacle on this side and on that side, to cover it. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And thou shalt make a covering for the tent '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' rams'' skins dyed red, and a covering above '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' badgers'' skins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And thou shalt make boards for the tabernacle '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' shittim wood standing up. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ten cubits '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the length of a board, and a cubit and a half '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the breadth of one board. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Two tenons '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall there be
  - type: text
    text: ' in one board, set in order one against another: thus shalt thou make for all the boards of the tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And thou shalt make the boards for the tabernacle, twenty boards on the south side southward. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And thou shalt make forty sockets of silver under the twenty boards; two sockets under one board for his two tenons, and two sockets under another board for his two tenons. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And for the second side of the tabernacle on the north side '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there shall be
  - type: text
    text: ' twenty boards: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'and their forty sockets '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' silver; two sockets under one board, and two sockets under another board. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And for the sides of the tabernacle westward thou shalt make six boards. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And two boards shalt thou make for the corners of the tabernacle in the two sides. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And they shall be coupled together beneath, and they shall be coupled together above the head of it unto one ring: thus shall it be for them both; they shall be for the two corners. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And they shall be eight boards, and their sockets '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' silver, sixteen sockets; two sockets under one board, and two sockets under another board.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And thou shalt make bars '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' shittim wood; five for the boards of the one side of the tabernacle, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'and five bars for the boards of the other side of the tabernacle, and five bars for the boards of the side of the tabernacle, for the two sides westward. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And the middle bar in the midst of the boards shall reach from end to end. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And thou shalt overlay the boards with gold, and make their rings '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' gold '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' places for the bars: and thou shalt overlay the bars with gold. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: And thou shalt rear up the tabernacle according to the fashion thereof which was shewed thee in the mount.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And thou shalt make a vail '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' blue, and purple, and scarlet, and fine twined linen of cunning work: with cherubims shall it be made: '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'and thou shalt hang it upon four pillars of shittim '
  - type: usfm
    marker: add
    children:
    - type: text
      text: wood
  - type: text
    text: ' overlaid with gold: their hooks '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be of
  - type: text
    text: ' gold, upon the four sockets of silver. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And thou shalt hang up the vail under the taches, that thou mayest bring in thither within the vail the ark of the testimony: and the vail shall divide unto you between the holy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: place
  - type: text
    text: ' and the most holy. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And thou shalt put the mercy seat upon the ark of the testimony in the most holy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: place
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And thou shalt set the table without the vail, and the candlestick over against the table on the side of the tabernacle toward the south: and thou shalt put the table on the north side.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And thou shalt make an hanging for the door of the tent, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' blue, and purple, and scarlet, and fine twined linen, wrought with needlework. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And thou shalt make for the hanging five pillars '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' shittim '
  - type: usfm
    marker: add
    children:
    - type: text
      text: wood
  - type: text
    text: ', and overlay them with gold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' their hooks '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be of
  - type: text
    text: ' gold: and thou shalt cast five sockets of brass for them.'
