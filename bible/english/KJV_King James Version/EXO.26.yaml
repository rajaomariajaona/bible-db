  - type: text
    content: ' their hooks '
  - type: text
    content: shall be of
  - type: text
    content: ' gold: and thou shalt cast five sockets of brass for them.'
  '4':
  - type: text
    content: 'And thou shalt make loops of blue upon the edge of the one curtain from the selvedge in the coupling; and likewise shalt thou make in the uttermost edge of '
  - type: text
    content: another
  - type: text
    content: ' curtain, in the coupling of the second. '
  '5':
  - type: text
    content: 'Fifty loops shalt thou make in the one curtain, and fifty loops shalt thou make in the edge of the curtain that '
  - type: text
    content: is
  - type: text
    content: ' in the coupling of the second; that the loops may take hold one of another. '
  '6':
  - type: text
    content: 'And thou shalt make fifty taches of gold, and couple the curtains together with the taches: and it shall be one tabernacle.'
  '7':
  - type: text
    content: 'And thou shalt make curtains '
  - type: text
