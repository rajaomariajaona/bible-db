verses:
  '1':
  - type: text
    content: 'Moreover thou shalt make the tabernacle '
  - type: text
    content: with
  - type: text
    content: ' ten curtains '
  - type: text
    content: of
  - type: text
    content: ' fine twined linen, and blue, and purple, and scarlet: '
  - type: text
    content: with
  - type: text
    content: ' cherubims of cunning work shalt thou make them. '
  '10':
  - type: text
    content: 'And thou shalt make fifty loops on the edge of the one curtain '
  - type: text
    content: that is
  - type: text
    content: ' outmost in the coupling, and fifty loops in the edge of the curtain which coupleth the second. '
  '11':
  - type: text
    content: 'And thou shalt make fifty taches of brass, and put the taches into the loops, and couple the tent together, that it may be one. '
  '12':
  - type: text
    content: 'And the remnant that remaineth of the curtains of the tent, the half curtain that remaineth, shall hang over the backside of the tabernacle. '
  '13':
  - type: text
    content: 'And a cubit on the one side, and a cubit on the other side of that which remaineth in the length of the curtains of the tent, it shall hang over the sides of the tabernacle on this side and on that side, to cover it. '
  '14':
  - type: text
    content: 'And thou shalt make a covering for the tent '
  - type: text
    content: of
  - type: text
    content: ' rams'' skins dyed red, and a covering above '
  - type: text
    content: of
  - type: text
    content: ' badgers'' skins.'
  '15':
  - type: text
    content: 'And thou shalt make boards for the tabernacle '
  - type: text
    content: of
  - type: text
    content: ' shittim wood standing up. '
  '16':
  - type: text
    content: 'Ten cubits '
  - type: text
    content: shall be
  - type: text
    content: ' the length of a board, and a cubit and a half '
  - type: text
    content: shall be
  - type: text
    content: ' the breadth of one board. '
  '17':
  - type: text
    content: 'Two tenons '
  - type: text
    content: shall there be
  - type: text
    content: ' in one board, set in order one against another: thus shalt thou make for all the boards of the tabernacle. '
  '18':
  - type: text
    content: 'And thou shalt make the boards for the tabernacle, twenty boards on the south side southward. '
  '19':
  - type: text
    content: 'And thou shalt make forty sockets of silver under the twenty boards; two sockets under one board for his two tenons, and two sockets under another board for his two tenons. '
  '2':
  - type: text
    content: 'The length of one curtain '
  - type: text
    content: shall be
  - type: text
    content: ' eight and twenty cubits, and the breadth of one curtain four cubits: and every one of the curtains shall have one measure. '
  '20':
  - type: text
    content: 'And for the second side of the tabernacle on the north side '
  - type: text
    content: there shall be
  - type: text
    content: ' twenty boards: '
  '21':
  - type: text
    content: 'and their forty sockets '
  - type: text
    content: of
  - type: text
    content: ' silver; two sockets under one board, and two sockets under another board. '
  '22':
  - type: text
    content: 'And for the sides of the tabernacle westward thou shalt make six boards. '
  '23':
  - type: text
    content: 'And two boards shalt thou make for the corners of the tabernacle in the two sides. '
  '24':
  - type: text
    content: 'And they shall be coupled together beneath, and they shall be coupled together above the head of it unto one ring: thus shall it be for them both; they shall be for the two corners. '
  '25':
  - type: text
    content: 'And they shall be eight boards, and their sockets '
  - type: text
    content: of
  - type: text
    content: ' silver, sixteen sockets; two sockets under one board, and two sockets under another board.'
  '26':
  - type: text
    content: 'And thou shalt make bars '
  - type: text
    content: of
  - type: text
    content: ' shittim wood; five for the boards of the one side of the tabernacle, '
  '27':
  - type: text
    content: 'and five bars for the boards of the other side of the tabernacle, and five bars for the boards of the side of the tabernacle, for the two sides westward. '
  '28':
  - type: text
    content: 'And the middle bar in the midst of the boards shall reach from end to end. '
  '29':
  - type: text
    content: 'And thou shalt overlay the boards with gold, and make their rings '
  - type: text
    content: of
  - type: text
    content: ' gold '
  - type: text
    content: for
  - type: text
    content: ' places for the bars: and thou shalt overlay the bars with gold. '
  '3':
  - type: text
    content: 'The five curtains shall be coupled together one to another; and '
  - type: text
    content: other
  - type: text
    content: ' five curtains '
  - type: text
    content: shall be
  - type: text
    content: ' coupled one to another. '
  '30':
  - type: text
    content: And thou shalt rear up the tabernacle according to the fashion thereof which was shewed thee in the mount.
  '31':
  - type: text
    content: 'And thou shalt make a vail '
  - type: text
    content: of
  - type: text
    content: ' blue, and purple, and scarlet, and fine twined linen of cunning work: with cherubims shall it be made: '
  '32':
  - type: text
    content: 'and thou shalt hang it upon four pillars of shittim '
  - type: text
    content: wood
  - type: text
    content: ' overlaid with gold: their hooks '
  - type: text
    content: shall be of
  - type: text
    content: ' gold, upon the four sockets of silver. '
  '33':
  - type: text
    content: 'And thou shalt hang up the vail under the taches, that thou mayest bring in thither within the vail the ark of the testimony: and the vail shall divide unto you between the holy '
  - type: text
    content: place
  - type: text
    content: ' and the most holy. '
  '34':
  - type: text
    content: 'And thou shalt put the mercy seat upon the ark of the testimony in the most holy '
  - type: text
    content: place
  - type: text
    content: '. '
  '35':
  - type: text
    content: 'And thou shalt set the table without the vail, and the candlestick over against the table on the side of the tabernacle toward the south: and thou shalt put the table on the north side.'
  '36':
  - type: text
    content: 'And thou shalt make an hanging for the door of the tent, '
  - type: text
    content: of
  - type: text
    content: ' blue, and purple, and scarlet, and fine twined linen, wrought with needlework. '
  '37':
  - type: text
    content: 'And thou shalt make for the hanging five pillars '
  - type: text
    content: of
  - type: text
