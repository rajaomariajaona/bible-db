  - type: text
    content: ' goats'' '
  - type: text
    content: hair
  - type: text
    content: ' to be a covering upon the tabernacle: eleven curtains shalt thou make. '
  '8':
  - type: text
    content: 'The length of one curtain '
  - type: text
    content: shall be
  - type: text
    content: ' thirty cubits, and the breadth of one curtain four cubits: and the eleven curtains '
  - type: text
    content: shall be all
  - type: text
