  '29':
  - type: text
    content: 'And on the eighth day she shall take unto her two turtles, or two young pigeons, and bring them unto the priest, to the door of the tabernacle of the congregation. '
  '3':
  - type: text
    content: 'And this shall be his uncleanness in his issue: whether his flesh run with his issue, or his flesh be stopped from his issue, it '
  - type: text
    content: is
  - type: text
