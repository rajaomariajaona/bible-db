document_id: LEV.15,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Personal Cleanliness
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses and to Aaron, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And whosoever toucheth any thing that was under him shall be unclean until the even: and he that beareth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any of
    - type: text
      text: ' those things shall wash his clothes, and bathe '
    - type: usfm
      marker: add
      children:
      - type: text
        text: himself
    - type: text
      text: ' in water, and be unclean until the even. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And whomsoever he toucheth that hath the issue, and hath not rinsed his hands in water, he shall wash his clothes, and bathe '
    - type: usfm
      marker: add
      children:
      - type: text
        text: himself
    - type: text
      text: ' in water, and be unclean until the even. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And the vessel of earth, that he toucheth which hath the issue, shall be broken: and every vessel of wood shall be rinsed in water. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And when he that hath an issue is cleansed of his issue; then he shall number to himself seven days for his cleansing, and wash his clothes, and bathe his flesh in running water, and shall be clean. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And on the eighth day he shall take to him two turtledoves, or two young pigeons, and come before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' unto the door of the tabernacle of the congregation, and give them unto the priest: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'and the priest shall offer them, the one '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a sin offering, and the other '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a burnt offering; and the priest shall make an atonement for him before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' for his issue. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And if any man''s seed of copulation go out from him, then he shall wash all his flesh in water, and be unclean until the even. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And every garment, and every skin, whereon is the seed of copulation, shall be washed with water, and be unclean until the even. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The woman also with whom man shall lie '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' seed of copulation, they shall '
    - type: usfm
      marker: add
      children:
      - type: text
        text: both
    - type: text
      text: ' bathe '
    - type: usfm
      marker: add
      children:
      - type: text
        text: themselves
    - type: text
      text: ' in water, and be unclean until the even.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And if a woman have an issue, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' her issue in her flesh be blood, she shall be put apart seven days: and whosoever toucheth her shall be unclean until the even. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Speak unto the children of Israel, and say unto them, When any man hath a running issue out of his flesh, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: because of
    - type: text
      text: ' his issue he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' unclean. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And every thing that she lieth upon in her separation shall be unclean: every thing also that she sitteth upon shall be unclean. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And whosoever toucheth her bed shall wash his clothes, and bathe '
    - type: usfm
      marker: add
      children:
      - type: text
        text: himself
    - type: text
      text: ' in water, and be unclean until the even. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And whosoever toucheth any thing that she sat upon shall wash his clothes, and bathe '
    - type: usfm
      marker: add
      children:
      - type: text
        text: himself
    - type: text
      text: ' in water, and be unclean until the even. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And if it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' on '
    - type: usfm
      marker: add
      children:
      - type: text
        text: her
    - type: text
      text: ' bed, or on any thing whereon she sitteth, when he toucheth it, he shall be unclean until the even. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And if any man lie with her at all, and her flowers be upon him, he shall be unclean seven days; and all the bed whereon he lieth shall be unclean. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And if a woman have an issue of her blood many days out of the time of her separation, or if it run beyond the time of her separation; all the days of the issue of her uncleanness shall be as the days of her separation: she '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' unclean. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Every bed whereon she lieth all the days of her issue shall be unto her as the bed of her separation: and whatsoever she sitteth upon shall be unclean, as the uncleanness of her separation. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And whosoever toucheth those things shall be unclean, and shall wash his clothes, and bathe '
    - type: usfm
      marker: add
      children:
      - type: text
        text: himself
    - type: text
      text: ' in water, and be unclean until the even. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'But if she be cleansed of her issue, then she shall number to herself seven days, and after that she shall be clean. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And on the eighth day she shall take unto her two turtles, or two young pigeons, and bring them unto the priest, to the door of the tabernacle of the congregation. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And this shall be his uncleanness in his issue: whether his flesh run with his issue, or his flesh be stopped from his issue, it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' his uncleanness. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And the priest shall offer the one '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a sin offering, and the other '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a burnt offering; and the priest shall make an atonement for her before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' for the issue of her uncleanness. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Thus shall ye separate the children of Israel from their uncleanness; that they die not in their uncleanness, when they defile my tabernacle that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' among them. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the law of him that hath an issue, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of him
    - type: text
      text: ' whose seed goeth from him, and is defiled therewith; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: and of her that is sick of her flowers, and of him that hath an issue, of the man, and of the woman, and of him that lieth with her that is unclean.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Every bed, whereon he lieth that hath the issue, is unclean: and every thing, whereon he sitteth, shall be unclean. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And whosoever toucheth his bed shall wash his clothes, and bathe '
    - type: usfm
      marker: add
      children:
      - type: text
        text: himself
    - type: text
      text: ' in water, and be unclean until the even. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And he that sitteth on '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' thing whereon he sat that hath the issue shall wash his clothes, and bathe '
    - type: usfm
      marker: add
      children:
      - type: text
        text: himself
    - type: text
      text: ' in water, and be unclean until the even. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And he that toucheth the flesh of him that hath the issue shall wash his clothes, and bathe '
    - type: usfm
      marker: add
      children:
      - type: text
        text: himself
    - type: text
      text: ' in water, and be unclean until the even. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And if he that hath the issue spit upon him that is clean; then he shall wash his clothes, and bathe '
    - type: usfm
      marker: add
      children:
      - type: text
        text: himself
    - type: text
      text: ' in water, and be unclean until the even. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And what saddle soever he rideth upon that hath the issue shall be unclean. '
