  - type: text
    content: and
  - type: text
    content: ' her issue in her flesh be blood, she shall be put apart seven days: and whosoever toucheth her shall be unclean until the even. '
  '2':
  - type: text
    content: 'Speak unto the children of Israel, and say unto them, When any man hath a running issue out of his flesh, '
  - type: text
