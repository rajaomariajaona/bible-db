    content: 'And whomsoever he toucheth that hath the issue, and hath not rinsed his hands in water, he shall wash his clothes, and bathe '
  - type: text
    content: himself
  - type: text
    content: ' in water, and be unclean until the even. '
  '12':
  - type: text
    content: 'And the vessel of earth, that he toucheth which hath the issue, shall be broken: and every vessel of wood shall be rinsed in water. '
  '13':
  - type: text
    content: 'And when he that hath an issue is cleansed of his issue; then he shall number to himself seven days for his cleansing, and wash his clothes, and bathe his flesh in running water, and shall be clean. '
