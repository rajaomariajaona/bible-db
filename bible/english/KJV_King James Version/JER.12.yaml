  - type: text
    content: they wearied thee
  - type: text
    content: ', then how wilt thou do in the swelling of Jordan? '
  '6':
  - type: text
    content: 'For even thy brethren, and the house of thy father, even they have dealt treacherously with thee; yea, they have called a multitude after thee: believe them not, though they speak fair words unto thee.'
  '7':
  - type: text
    content: 'I have forsaken mine house, I have left mine heritage; I have given the dearly beloved of my soul into the hand of her enemies. '
  '8':
  - type: text
    content: 'Mine heritage is unto me as a lion in the forest; it crieth out against me: therefore have I hated it. '
