  '14':
  - type: text
    content: 'Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ' against all mine evil neighbours, that touch the inheritance which I have caused my people Israel to inherit; Behold, I will pluck them out of their land, and pluck out the house of Judah from among them. '
  '15':
  - type: text
    content: 'And it shall come to pass, after that I have plucked them out I will return, and have compassion on them, and will bring them again, every man to his heritage, and every man to his land. '
  '16':
  - type: text
    content: 'And it shall come to pass, if they will diligently learn the ways of my people, to swear by my name, The '
  - type: text
    content: LORD
  - type: text
    content: ' liveth; as they taught my people to swear by Baal; then shall they be built in the midst of my people. '
  '17':
  - type: text
    content: 'But if they will not obey, I will utterly pluck up and destroy that nation, saith the '
  - type: text
    content: LORD
  - type: text
    content: .
  '2':
  - type: text
    content: 'Thou hast planted them, yea, they have taken root: they grow, yea, they bring forth fruit: thou '
  - type: text
    content: art
  - type: text
    content: ' near in their mouth, and far from their reins. '
  '3':
  - type: text
    content: 'But thou, O '
  - type: text
