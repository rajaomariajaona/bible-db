  - type: text
    content: ', knowest me: thou hast seen me, and tried mine heart toward thee: pull them out like sheep for the slaughter, and prepare them for the day of slaughter. '
  '4':
  - type: text
    content: How long shall the land mourn, and the herbs of every field wither, for the wickedness of them that dwell therein? the beasts are consumed, and the birds; because they said, He shall not see our last end.
  '5':
  - type: text
    content: 'If thou hast run with the footmen, and they have wearied thee, then how canst thou contend with horses? and '
  - type: text
