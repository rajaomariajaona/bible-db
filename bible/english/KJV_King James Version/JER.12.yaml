document_id: JER.12
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Prophet's Problem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Righteous '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' thou, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', when I plead with thee: yet let me talk with thee of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thy
  - type: text
    text: ' judgments: Wherefore doth the way of the wicked prosper? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: wherefore
  - type: text
    text: ' are all they happy that deal very treacherously? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Thou hast planted them, yea, they have taken root: they grow, yea, they bring forth fruit: thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' near in their mouth, and far from their reins. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But thou, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', knowest me: thou hast seen me, and tried mine heart toward thee: pull them out like sheep for the slaughter, and prepare them for the day of slaughter. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: How long shall the land mourn, and the herbs of every field wither, for the wickedness of them that dwell therein? the beasts are consumed, and the birds; because they said, He shall not see our last end.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'If thou hast run with the footmen, and they have wearied thee, then how canst thou contend with horses? and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: if
  - type: text
    text: ' in the land of peace, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: wherein
  - type: text
    text: ' thou trustedst, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: they wearied thee
  - type: text
    text: ', then how wilt thou do in the swelling of Jordan? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For even thy brethren, and the house of thy father, even they have dealt treacherously with thee; yea, they have called a multitude after thee: believe them not, though they speak fair words unto thee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'I have forsaken mine house, I have left mine heritage; I have given the dearly beloved of my soul into the hand of her enemies. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mine heritage is unto me as a lion in the forest; it crieth out against me: therefore have I hated it. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mine heritage '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' unto me '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' a speckled bird, the birds round about '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' against her; come ye, assemble all the beasts of the field, come to devour. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Many pastors have destroyed my vineyard, they have trodden my portion under foot, they have made my pleasant portion a desolate wilderness. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'They have made it desolate, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and being
  - type: text
    text: ' desolate it mourneth unto me; the whole land is made desolate, because no man layeth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to heart. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The spoilers are come upon all high places through the wilderness: for the sword of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall devour from the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' end of the land even to the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: other
  - type: text
    text: ' end of the land: no flesh shall have peace. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'They have sown wheat, but shall reap thorns: they have put themselves to pain, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: but
  - type: text
    text: ' shall not profit: and they shall be ashamed of your revenues because of the fierce anger of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' against all mine evil neighbours, that touch the inheritance which I have caused my people Israel to inherit; Behold, I will pluck them out of their land, and pluck out the house of Judah from among them. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And it shall come to pass, after that I have plucked them out I will return, and have compassion on them, and will bring them again, every man to his heritage, and every man to his land. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And it shall come to pass, if they will diligently learn the ways of my people, to swear by my name, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' liveth; as they taught my people to swear by Baal; then shall they be built in the midst of my people. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But if they will not obey, I will utterly pluck up and destroy that nation, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
