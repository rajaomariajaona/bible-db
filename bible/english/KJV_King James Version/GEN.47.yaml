document_id: GEN.47
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Joseph came and told Pharaoh, and said, My father and my brethren, and their flocks, and their herds, and all that they have, are come out of the land of Canaan; and, behold, they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' in the land of Goshen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he took some of his brethren, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' five men, and presented them unto Pharaoh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Pharaoh said unto his brethren, What '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' your occupation? And they said unto Pharaoh, Thy servants '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' shepherds, both we, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' also our fathers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'They said moreover unto Pharaoh, For to sojourn in the land are we come; for thy servants have no pasture for their flocks; for the famine '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' sore in the land of Canaan: now therefore, we pray thee, let thy servants dwell in the land of Goshen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And Pharaoh spake unto Joseph, saying, Thy father and thy brethren are come unto thee: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'the land of Egypt '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' before thee; in the best of the land make thy father and brethren to dwell; in the land of Goshen let them dwell: and if thou knowest '
  - type: usfm
    marker: add
    children:
    - type: text
      text: any
  - type: text
    text: ' men of activity among them, then make them rulers over my cattle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And Joseph brought in Jacob his father, and set him before Pharaoh: and Jacob blessed Pharaoh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Pharaoh said unto Jacob, How old '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' thou? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And Jacob said unto Pharaoh, The days of the years of my pilgrimage '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' an hundred and thirty years: few and evil have the days of the years of my life been, and have not attained unto the days of the years of the life of my fathers in the days of their pilgrimage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And Jacob blessed Pharaoh, and went out from before Pharaoh.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Joseph placed his father and his brethren, and gave them a possession in the land of Egypt, in the best of the land, in the land of Rameses, as Pharaoh had commanded. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Joseph nourished his father, and his brethren, and all his father''s household, with bread, according to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' families.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' no bread in all the land; for the famine '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' very sore, so that the land of Egypt and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: all
  - type: text
    text: ' the land of Canaan fainted by reason of the famine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And Joseph gathered up all the money that was found in the land of Egypt, and in the land of Canaan, for the corn which they bought: and Joseph brought the money into Pharaoh''s house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And when money failed in the land of Egypt, and in the land of Canaan, all the Egyptians came unto Joseph, and said, Give us bread: for why should we die in thy presence? for the money faileth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And Joseph said, Give your cattle; and I will give you for your cattle, if money fail. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And they brought their cattle unto Joseph: and Joseph gave them bread '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in exchange
  - type: text
    text: ' for horses, and for the flocks, and for the cattle of the herds, and for the asses: and he fed them with bread for all their cattle for that year. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'When that year was ended, they came unto him the second year, and said unto him, We will not hide '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' from my lord, how that our money is spent; my lord also hath our herds of cattle; there is not ought left in the sight of my lord, but our bodies, and our lands: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'wherefore shall we die before thine eyes, both we and our land? buy us and our land for bread, and we and our land will be servants unto Pharaoh: and give '
  - type: usfm
    marker: add
    children:
    - type: text
      text: us
  - type: text
    text: ' seed, that we may live, and not die, that the land be not desolate.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Joseph bought all the land of Egypt for Pharaoh; for the Egyptians sold every man his field, because the famine prevailed over them: so the land became Pharaoh''s.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And as for the people, he removed them to cities from '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ' end of the borders of Egypt even to the '
  - type: usfm
    marker: add
    children:
    - type: text
      text: other
  - type: text
    text: ' end thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Only the land of the priests bought he not; for the priests had a portion '
  - type: usfm
    marker: add
    children:
    - type: text
      text: assigned them
  - type: text
    text: ' of Pharaoh, and did eat their portion which Pharaoh gave them: wherefore they sold not their lands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then Joseph said unto the people, Behold, I have bought you this day and your land for Pharaoh: lo, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: here is
  - type: text
    text: ' seed for you, and ye shall sow the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And it shall come to pass in the increase, that ye shall give the fifth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: part
  - type: text
    text: ' unto Pharaoh, and four parts shall be your own, for seed of the field, and for your food, and for them of your households, and for food for your little ones. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And they said, Thou hast saved our lives: let us find grace in the sight of my lord, and we will be Pharaoh''s servants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And Joseph made it a law over the land of Egypt unto this day, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' Pharaoh should have the fifth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: part
  - type: text
    text: '; except the land of the priests only, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' became not Pharaoh''s.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And Israel dwelt in the land of Egypt, in the country of Goshen; and they had possessions therein, and grew, and multiplied exceedingly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And Jacob lived in the land of Egypt seventeen years: so the whole age of Jacob was an hundred forty and seven years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And the time drew nigh that Israel must die: and he called his son Joseph, and said unto him, If now I have found grace in thy sight, put, I pray thee, thy hand under my thigh, and deal kindly and truly with me; bury me not, I pray thee, in Egypt: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'but I will lie with my fathers, and thou shalt carry me out of Egypt, and bury me in their buryingplace. And he said, I will do as thou hast said. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: And he said, Swear unto me. And he sware unto him. And Israel bowed himself upon the bed's head.
