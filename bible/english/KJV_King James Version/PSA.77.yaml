document_id: PSA.77,1
type_code: eng
verses:
  '1':
  - type: text
    content: To the chief Musician, to Jeduthun, A Psalm of Asaph.
  - type: text
    content: I Cried unto God with my voice,
  - type: text
    content: Even
  - type: text
    content: ' unto God with my voice; and he gave ear unto me.'
  '10':
  - type: text
    content: 'And I said, This '
  - type: text
    content: is
  - type: text
    content: ' my infirmity:'
  - type: text
    content: But I will remember
  - type: text
    content: ' the years of the right hand of the Most High.'
  '11':
  - type: text
    content: 'I will remember the works of the '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: Surely I will remember thy wonders of old.
  '12':
  - type: text
    content: I will meditate also of all thy work,
  - type: text
    content: And talk of thy doings.
  '13':
  - type: text
    content: 'Thy way, O God, '
  - type: text
    content: is
  - type: text
    content: ' in the sanctuary:'
  - type: text
    content: 'Who '
  - type: text
    content: is so
  - type: text
    content: ' great a God as '
  - type: text
    content: our
  - type: text
    content: ' God?'
  '14':
  - type: text
    content: 'Thou '
  - type: text
    content: art
  - type: text
    content: ' the God that doest wonders:'
  - type: text
    content: Thou hast declared thy strength among the people.
  '15':
  - type: text
    content: 'Thou hast with '
  - type: text
    content: thine
  - type: text
    content: ' arm redeemed thy people,'
  - type: text
    content: 'The sons of Jacob and Joseph. '
  - type: text
    content: Selah.
  '16':
  - type: text
    content: 'The waters saw thee, O God, the waters saw thee; they were afraid:'
  - type: text
    content: The depths also were troubled.
  '17':
  - type: text
    content: 'The clouds poured out water: The skies sent out a sound:'
  - type: text
    content: Thine arrows also went abroad.
  '18':
  - type: text
    content: 'The voice of thy thunder '
  - type: text
    content: was
  - type: text
    content: ' in the heaven:'
  - type: text
    content: 'The lightnings lightened the world: The earth trembled and shook.'
  '19':
  - type: text
    content: 'Thy way '
  - type: text
    content: is
  - type: text
    content: ' in the sea, and thy path in the great waters,'
  - type: text
    content: And thy footsteps are not known.
  '2':
  - type: text
    content: 'In the day of my trouble I sought the Lord:'
  - type: text
    content: 'My sore ran in the night, and ceased not: My soul refused to be comforted.'
  '20':
  - type: text
    content: Thou leddest thy people like a flock
  - type: text
    content: By the hand of Moses and Aaron.
  '3':
  - type: text
    content: 'I remembered God, and was troubled:'
  - type: text
    content: 'I complained, and my spirit was overwhelmed. '
  - type: text
    content: Selah.
  '4':
  - type: text
    content: 'Thou holdest mine eyes waking:'
  - type: text
    content: I am so troubled that I cannot speak.
  '5':
  - type: text
    content: I have considered the days of old,
  - type: text
    content: The years of ancient times.
  '6':
  - type: text
    content: 'I call to remembrance my song in the night:'
  - type: text
    content: 'I commune with mine own heart: And my spirit made diligent search.'
  '7':
  - type: text
    content: Will the Lord cast off for ever?
  - type: text
    content: And will he be favourable no more?
  '8':
  - type: text
    content: Is his mercy clean gone for ever?
  - type: text
    content: 'Doth '
  - type: text
    content: his
  - type: text
    content: ' promise fail for evermore?'
  '9':
  - type: text
    content: Hath God forgotten to be gracious?
  - type: text
    content: 'Hath he in anger shut up his tender mercies? '
  - type: text
    content: Selah.
