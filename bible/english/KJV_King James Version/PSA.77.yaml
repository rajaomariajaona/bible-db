document_id: PSA.77
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: To the chief Musician, to Jeduthun, A Psalm of Asaph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I Cried unto God with my voice,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Even
  - type: text
    text: ' unto God with my voice; and he gave ear unto me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'In the day of my trouble I sought the Lord:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'My sore ran in the night, and ceased not: My soul refused to be comforted.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I remembered God, and was troubled:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I complained, and my spirit was overwhelmed. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Thou holdest mine eyes waking:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am so troubled that I cannot speak.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I have considered the days of old,
- type: usfm
  marker: q2
  children:
  - type: text
    text: The years of ancient times.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I call to remembrance my song in the night:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I commune with mine own heart: And my spirit made diligent search.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Will the Lord cast off for ever?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And will he be favourable no more?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Is his mercy clean gone for ever?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Doth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' promise fail for evermore?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hath God forgotten to be gracious?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Hath he in anger shut up his tender mercies? '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And I said, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my infirmity:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: But I will remember
  - type: text
    text: ' the years of the right hand of the Most High.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I will remember the works of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ':'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Surely I will remember thy wonders of old.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I will meditate also of all thy work,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And talk of thy doings.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Thy way, O God, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the sanctuary:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is so
  - type: text
    text: ' great a God as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: our
  - type: text
    text: ' God?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' the God that doest wonders:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou hast declared thy strength among the people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Thou hast with '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thine
  - type: text
    text: ' arm redeemed thy people,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The sons of Jacob and Joseph. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The waters saw thee, O God, the waters saw thee; they were afraid:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The depths also were troubled.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The clouds poured out water: The skies sent out a sound:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thine arrows also went abroad.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The voice of thy thunder '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' in the heaven:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The lightnings lightened the world: The earth trembled and shook.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Thy way '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the sea, and thy path in the great waters,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And thy footsteps are not known.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Thou leddest thy people like a flock
- type: usfm
  marker: q2
  children:
  - type: text
    text: By the hand of Moses and Aaron.
