- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Let them be ashamed and confounded that seek after my soul:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them be turned backward, and put to confusion, that desire my hurt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Let them be turned back for a reward of their shame
- type: usfm
  marker: q2
  children:
  - type: text
    text: That say, Aha, aha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Let all those that seek thee rejoice and be glad in thee:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And let such as love thy salvation say continually, let God be magnified.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' poor and needy;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Make haste unto me, O God:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' my help and my deliverer;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', make no tarrying.'
