document_id: PSA.70,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'To the chief Musician, '
  - type: text
    content: A Psalm
  - type: text
    content: ' of David, to bring to remembrance.'
  - type: text
    content: ' '
  - type: text
    content: Make haste
  - type: text
    content: ', O God, to deliver me;'
  - type: text
    content: 'Make haste to help me, O '
  - type: text
    content: LORD
  - type: text
    content: .
  '2':
  - type: text
    content: 'Let them be ashamed and confounded that seek after my soul:'
  - type: text
    content: Let them be turned backward, and put to confusion, that desire my hurt.
  '3':
  - type: text
    content: Let them be turned back for a reward of their shame
  - type: text
    content: That say, Aha, aha.
  '4':
  - type: text
    content: 'Let all those that seek thee rejoice and be glad in thee:'
  - type: text
    content: And let such as love thy salvation say continually, let God be magnified.
  '5':
  - type: text
    content: 'But I '
  - type: text
    content: am
  - type: text
    content: ' poor and needy;'
  - type: text
    content: 'Make haste unto me, O God:'
  - type: text
    content: 'Thou '
  - type: text
    content: art
  - type: text
    content: ' my help and my deliverer;'
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ', make no tarrying.'
