document_id: NEH.5
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: A Cry of the People
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And there was a great cry of the people and of their wives against their brethren the Jews. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For there were that said, We, our sons, and our daughters, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' many: therefore we take up corn '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for them
  - type: text
    text: ', that we may eat, and live. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Some
  - type: text
    text: ' also there were that said, We have mortgaged our lands, vineyards, and houses, that we might buy corn, because of the dearth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'There were also that said, We have borrowed money for the king''s tribute, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and that upon
  - type: text
    text: ' our lands and vineyards. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Yet now our flesh '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' as the flesh of our brethren, our children as their children: and, lo, we bring into bondage our sons and our daughters to be servants, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' of our daughters are brought unto bondage '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'already:'
  - type: text
    text: ' neither '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is it
  - type: text
    text: ' in our power to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: redeem them
  - type: text
    text: ; for other men have our lands and vineyards.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And I was very angry when I heard their cry and these words. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then I consulted with myself, and I rebuked the nobles, and the rulers, and said unto them, Ye exact usury, every one of his brother. And I set a great assembly against them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And I said unto them, We after our ability have redeemed our brethren the Jews, which were sold unto the heathen; and will ye even sell your brethren? or shall they be sold unto us? Then held they their peace, and found nothing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to answer
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Also I said, It '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not good that ye do: ought ye not to walk in the fear of our God because of the reproach of the heathen our enemies? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I likewise, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' my brethren, and my servants, might exact of them money and corn: I pray you, let us leave off this usury. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Restore, I pray you, to them, even this day, their lands, their vineyards, their oliveyards, and their houses, also the hundredth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: part
  - type: text
    text: ' of the money, and of the corn, the wine, and the oil, that ye exact of them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then said they, We will restore '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ', and will require nothing of them; so will we do as thou sayest. Then I called the priests, and took an oath of them, that they should do according to this promise. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Also I shook my lap, and said, So God shake out every man from his house, and from his labour, that performeth not this promise, even thus be he shaken out, and emptied. And all the congregation said, Amen, and praised the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: . And the people did according to this promise.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Moreover from the time that I was appointed to be their governor in the land of Judah, from the twentieth year even unto the two and thirtieth year of Artaxerxes the king, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ', twelve years, I and my brethren have not eaten the bread of the governor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But the former governors that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: had been
  - type: text
    text: ' before me were chargeable unto the people, and had taken of them bread and wine, beside forty shekels of silver; yea, even their servants bare rule over the people: but so did not I, because of the fear of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Yea, also I continued in the work of this wall, neither bought we any land: and all my servants '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' gathered thither unto the work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Moreover '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there were
  - type: text
    text: ' at my table an hundred and fifty of the Jews and rulers, beside those that came unto us from among the heathen that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' about us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Now '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' which was prepared '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for me
  - type: text
    text: ' daily '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' one ox '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' six choice sheep; also fowls were prepared for me, and once in ten days store of all sorts of wine: yet for all this required not I the bread of the governor, because the bondage was heavy upon this people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Think upon me, my God, for good, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: according
  - type: text
    text: ' to all that I have done for this people.'
