document_id: 1KI.14
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Jeroboam's Son
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'At that time Abijah the son of Jeroboam fell sick. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Jeroboam said to his wife, Arise, I pray thee, and disguise thyself, that thou be not known to be the wife of Jeroboam; and get thee to Shiloh: behold, there '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Ahijah the prophet, which told me that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: I should be
  - type: text
    text: ' king over this people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And take with thee ten loaves, and cracknels, and a cruse of honey, and go to him: he shall tell thee what shall become of the child. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Jeroboam''s wife did so, and arose, and went to Shiloh, and came to the house of Ahijah. But Ahijah could not see; for his eyes were set by reason of his age. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Ahijah, Behold, the wife of Jeroboam cometh to ask a thing of thee for her son; for he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' sick: thus and thus shalt thou say unto her: for it shall be, when she cometh in, that she shall feign herself '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' another '
  - type: usfm
    marker: add
    children:
    - type: text
      text: woman
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And it was '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ', when Ahijah heard the sound of her feet, as she came in at the door, that he said, Come in, thou wife of Jeroboam; why feignest thou thyself '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' another? for I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' sent to thee '
  - type: usfm
    marker: add
    children:
    - type: text
      text: with
  - type: text
    text: ' heavy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: tidings
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Go, tell Jeroboam, Thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel, Forasmuch as I exalted thee from among the people, and made thee prince over my people Israel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and rent the kingdom away from the house of David, and gave it thee: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yet
  - type: text
    text: ' thou hast not been as my servant David, who kept my commandments, and who followed me with all his heart, to do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' only '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which was
  - type: text
    text: ' right in mine eyes; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'but hast done evil above all that were before thee: for thou hast gone and made thee other gods, and molten images, to provoke me to anger, and hast cast me behind thy back: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'therefore, behold, I will bring evil upon the house of Jeroboam, and will cut off from Jeroboam him that pisseth against the wall, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' him that is shut up and left in Israel, and will take away the remnant of the house of Jeroboam, as a man taketh away dung, till it be all gone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Him that dieth of Jeroboam in the city shall the dogs eat; and him that dieth in the field shall the fowls of the air eat: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath spoken '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Arise thou therefore, get thee to thine own house: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' when thy feet enter into the city, the child shall die. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And all Israel shall mourn for him, and bury him: for he only of Jeroboam shall come to the grave, because in him there is found '
  - type: usfm
    marker: add
    children:
    - type: text
      text: some
  - type: text
    text: ' good thing toward the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel in the house of Jeroboam. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Moreover the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall raise him up a king over Israel, who shall cut off the house of Jeroboam that day: but what? even now. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall smite Israel, as a reed is shaken in the water, and he shall root up Israel out of this good land, which he gave to their fathers, and shall scatter them beyond the river, because they have made their groves, provoking the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' to anger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And he shall give Israel up because of the sins of Jeroboam, who did sin, and who made Israel to sin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And Jeroboam''s wife arose, and departed, and came to Tirzah: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' when she came to the threshold of the door, the child died; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and they buried him; and all Israel mourned for him, according to the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', which he spake by the hand of his servant Ahijah the prophet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And the rest of the acts of Jeroboam, how he warred, and how he reigned, behold, they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' written in the book of the chronicles of the kings of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the days which Jeroboam reigned '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' two and twenty years: and he slept with his fathers, and Nadab his son reigned in his stead.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judah
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Rehoboam
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And Rehoboam the son of Solomon reigned in Judah. Rehoboam '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' forty and one years old when he began to reign, and he reigned seventeen years in Jerusalem, the city which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' did choose out of all the tribes of Israel, to put his name there. And his mother''s name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Naamah an Ammonitess. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And Judah did evil in the sight of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and they provoked him to jealousy with their sins which they had committed, above all that their fathers had done. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For they also built them high places, and images, and groves, on every high hill, and under every green tree. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And there were also sodomites in the land: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' they did according to all the abominations of the nations which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' cast out before the children of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And it came to pass in the fifth year of king Rehoboam, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' Shishak king of Egypt came up against Jerusalem: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and he took away the treasures of the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and the treasures of the king''s house; he even took away all: and he took away all the shields of gold which Solomon had made. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And king Rehoboam made in their stead brasen shields, and committed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' unto the hands of the chief of the guard, which kept the door of the king''s house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And it was '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ', when the king went into the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that the guard bare them, and brought them back into the guard chamber.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Now the rest of the acts of Rehoboam, and all that he did, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' they not written in the book of the chronicles of the kings of Judah? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And there was war between Rehoboam and Jeroboam all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: their
  - type: text
    text: ' days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And Rehoboam slept with his fathers, and was buried with his fathers in the city of David. And his mother''s name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Naamah an Ammonitess. And Abijam his son reigned in his stead.'
