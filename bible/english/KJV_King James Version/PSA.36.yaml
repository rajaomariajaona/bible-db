document_id: PSA.36
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'To the chief Musician, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: A Psalm
  - type: text
    text: ' of David the servant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The transgression of the wicked saith within my heart,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: That there is
  - type: text
    text: ' no fear of God before his eyes.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For he flattereth himself in his own eyes, until his iniquity be found to be hateful.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The words of his mouth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' iniquity and deceit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He hath left off to be wise, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' to do good.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He deviseth mischief upon his bed;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He setteth himself in a way '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' not good;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He abhorreth not evil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Thy mercy, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the heavens;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' thy faithfulness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: reacheth
  - type: text
    text: ' unto the clouds.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Thy righteousness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' like the great mountains;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Thy judgments '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' a great deep:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', thou preservest man and beast.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'How excellent '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thy lovingkindness, O God!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore the children of men put their trust under the shadow of thy wings.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They shall be abundantly satisfied with the fatness of thy house;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And thou shalt make them drink of the river of thy pleasures.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For with thee '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the fountain of life:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: In thy light shall we see light.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: O continue thy lovingkindness unto them that know thee;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And thy righteousness to the upright in heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Let not the foot of pride come against me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And let not the hand of the wicked remove me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'There are the workers of iniquity fallen:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are cast down, and shall not be able to rise.
