document_id: PSA.36,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'To the chief Musician, '
  - type: text
    content: A Psalm
  - type: text
    content: ' of David the servant of the '
  - type: text
    content: LORD
  - type: text
    content: .
  - type: text
    content: The transgression of the wicked saith within my heart,
  - type: text
    content: That there is
  - type: text
    content: ' no fear of God before his eyes.'
  '10':
  - type: text
    content: O continue thy lovingkindness unto them that know thee;
  - type: text
    content: And thy righteousness to the upright in heart.
  '11':
  - type: text
    content: Let not the foot of pride come against me,
  - type: text
    content: And let not the hand of the wicked remove me.
  '12':
  - type: text
    content: 'There are the workers of iniquity fallen:'
  - type: text
    content: They are cast down, and shall not be able to rise.
  '2':
  - type: text
    content: For he flattereth himself in his own eyes, until his iniquity be found to be hateful.
  '3':
  - type: text
    content: 'The words of his mouth '
  - type: text
    content: are
  - type: text
    content: ' iniquity and deceit:'
  - type: text
    content: 'He hath left off to be wise, '
  - type: text
    content: and
  - type: text
    content: ' to do good.'
  '4':
  - type: text
    content: He deviseth mischief upon his bed;
  - type: text
    content: 'He setteth himself in a way '
  - type: text
    content: that is
  - type: text
    content: ' not good;'
  - type: text
    content: He abhorreth not evil.
  '5':
  - type: text
    content: 'Thy mercy, O '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: is
  - type: text
    content: ' in the heavens;'
  - type: text
    content: And
  - type: text
    content: ' thy faithfulness '
  - type: text
    content: reacheth
  - type: text
    content: ' unto the clouds.'
  '6':
  - type: text
    content: 'Thy righteousness '
  - type: text
    content: is
  - type: text
    content: ' like the great mountains;'
  - type: text
    content: 'Thy judgments '
  - type: text
    content: are
  - type: text
    content: ' a great deep:'
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ', thou preservest man and beast.'
  '7':
  - type: text
    content: 'How excellent '
  - type: text
    content: is
  - type: text
    content: ' thy lovingkindness, O God!'
  - type: text
    content: Therefore the children of men put their trust under the shadow of thy wings.
  '8':
  - type: text
    content: They shall be abundantly satisfied with the fatness of thy house;
  - type: text
    content: And thou shalt make them drink of the river of thy pleasures.
  '9':
  - type: text
    content: 'For with thee '
  - type: text
    content: is
  - type: text
    content: ' the fountain of life:'
  - type: text
    content: In thy light shall we see light.
