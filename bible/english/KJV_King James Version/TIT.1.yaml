document_id: TIT.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Paul, a servant of God, and an apostle of Jesus Christ, according to the faith of God''s elect, and the acknowledging of the truth which is after godliness; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'in hope of eternal life, which God, that cannot lie, promised before the world began; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'but hath in due times manifested his word through preaching, which is committed unto me according to the commandment of God our Saviour; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'to Titus, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: mine
  - type: text
    text: ' own son after the common faith: Grace, mercy, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' peace, from God the Father and the Lord Jesus Christ our Saviour.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Stewards of God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For this cause left I thee in Crete, that thou shouldest set in order the things that are wanting, and ordain elders in every city, as I had appointed thee: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'if any be blameless, the husband of one wife, having faithful children not accused of riot or unruly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For a bishop must be blameless, as the steward of God; not selfwilled, not soon angry, not given to wine, no striker, not given to filthy lucre; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'but a lover of hospitality, a lover of good men, sober, just, holy, temperate; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: holding fast the faithful word as he hath been taught, that he may be able by sound doctrine both to exhort and to convince the gainsayers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For there are many unruly and vain talkers and deceivers, specially they of the circumcision: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'whose mouths must be stopped, who subvert whole houses, teaching things which they ought not, for filthy lucre''s sake. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'One of themselves, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' a prophet of their own, said, The Cretians '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' alway liars, evil beasts, slow bellies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'This witness is true. Wherefore rebuke them sharply, that they may be sound in the faith; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'not giving heed to Jewish fables, and commandments of men, that turn from the truth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Unto the pure all things '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' pure: but unto them that are defiled and unbelieving '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' nothing pure; but even their mind and conscience is defiled. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'They profess that they know God; but in works they deny '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', being abominable, and disobedient, and unto every good work reprobate.'
