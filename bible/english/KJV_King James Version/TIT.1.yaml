document_id: TIT.1,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Paul, a servant of God, and an apostle of Jesus Christ, according to the faith of God''s elect, and the acknowledging of the truth which is after godliness; '
  '10':
  - type: text
    content: 'For there are many unruly and vain talkers and deceivers, specially they of the circumcision: '
  '11':
  - type: text
    content: 'whose mouths must be stopped, who subvert whole houses, teaching things which they ought not, for filthy lucre''s sake. '
  '12':
  - type: text
    content: 'One of themselves, '
  - type: text
    content: even
  - type: text
    content: ' a prophet of their own, said, The Cretians '
  - type: text
    content: are
  - type: text
    content: ' alway liars, evil beasts, slow bellies. '
  '13':
  - type: text
    content: 'This witness is true. Wherefore rebuke them sharply, that they may be sound in the faith; '
  '14':
  - type: text
    content: 'not giving heed to Jewish fables, and commandments of men, that turn from the truth. '
  '15':
  - type: text
    content: 'Unto the pure all things '
  - type: text
    content: are
  - type: text
    content: ' pure: but unto them that are defiled and unbelieving '
  - type: text
    content: is
  - type: text
    content: ' nothing pure; but even their mind and conscience is defiled. '
  '16':
  - type: text
    content: 'They profess that they know God; but in works they deny '
  - type: text
    content: him
  - type: text
    content: ', being abominable, and disobedient, and unto every good work reprobate.'
  '2':
  - type: text
    content: 'in hope of eternal life, which God, that cannot lie, promised before the world began; '
  '3':
  - type: text
    content: 'but hath in due times manifested his word through preaching, which is committed unto me according to the commandment of God our Saviour; '
  '4':
  - type: text
    content: 'to Titus, '
  - type: text
    content: mine
  - type: text
    content: ' own son after the common faith: Grace, mercy, '
  - type: text
    content: and
  - type: text
    content: ' peace, from God the Father and the Lord Jesus Christ our Saviour.'
  - type: heading
    content: Stewards of God
  '5':
  - type: text
    content: 'For this cause left I thee in Crete, that thou shouldest set in order the things that are wanting, and ordain elders in every city, as I had appointed thee: '
  '6':
  - type: text
    content: 'if any be blameless, the husband of one wife, having faithful children not accused of riot or unruly. '
  '7':
  - type: text
    content: 'For a bishop must be blameless, as the steward of God; not selfwilled, not soon angry, not given to wine, no striker, not given to filthy lucre; '
  '8':
  - type: text
    content: 'but a lover of hospitality, a lover of good men, sober, just, holy, temperate; '
  '9':
  - type: text
    content: holding fast the faithful word as he hath been taught, that he may be able by sound doctrine both to exhort and to convince the gainsayers.
