document_id: ECC.2,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Vanity of Pleasure
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'I said in mine heart, Go to now, I will prove thee with mirth, therefore enjoy pleasure: and, behold, this also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' vanity. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And whatsoever mine eyes desired I kept not from them, I withheld not my heart from any joy; for my heart rejoiced in all my labour: and this was my portion of all my labour. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then I looked on all the works that my hands had wrought, and on the labour that I had laboured to do: and, behold, all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' vanity and vexation of spirit, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' no profit under the sun.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And I turned myself to behold wisdom, and madness, and folly: for what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: can
    - type: text
      text: ' the man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: do
    - type: text
      text: ' that cometh after the king? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' that which hath been already done. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then I saw that wisdom excelleth folly, as far as light excelleth darkness. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The wise man''s eyes '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in his head; but the fool walketh in darkness: and I myself perceived also that one event happeneth to them all. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then said I in my heart, As it happeneth to the fool, so it happeneth even to me; and why was I then more wise? Then I said in my heart, that this also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' vanity. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'For '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no remembrance of the wise more than of the fool for ever; seeing that which now '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the days to come shall all be forgotten. And how dieth the wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man?
    - type: text
      text: ' as the fool. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Therefore I hated life; because the work that is wrought under the sun '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' grievous unto me: for all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' vanity and vexation of spirit.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Vanity of Work and Riches
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Yea, I hated all my labour which I had taken under the sun: because I should leave it unto the man that shall be after me. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And who knoweth whether he shall be a wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' or a fool? yet shall he have rule over all my labour wherein I have laboured, and wherein I have shewed myself wise under the sun. This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' also vanity. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'I said of laughter, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' mad: and of mirth, What doeth it? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Therefore I went about to cause my heart to despair of all the labour which I took under the sun. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'For there is a man whose labour '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in wisdom, and in knowledge, and in equity; yet to a man that hath not laboured therein shall he leave it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' his portion. This also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' vanity and a great evil. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'For what hath man of all his labour, and of the vexation of his heart, wherein he hath laboured under the sun? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'For all his days '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' sorrows, and his travail grief; yea, his heart taketh not rest in the night. This is also vanity.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: There is
    - type: text
      text: ' nothing better for a man, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: than
    - type: text
      text: ' that he should eat and drink, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' he should make his soul enjoy good in his labour. This also I saw, that it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' from the hand of God. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'For who can eat, or who else can hasten '
    - type: usfm
      marker: add
      children:
      - type: text
        text: hereunto
    - type: text
      text: ', more than I? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'For '
    - type: usfm
      marker: add
      children:
      - type: text
        text: God
    - type: text
      text: ' giveth to a man that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' good in his sight wisdom, and knowledge, and joy: but to the sinner he giveth travail, to gather and to heap up, that he may give to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him that is
    - type: text
      text: ' good before God. This also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' vanity and vexation of spirit.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'I sought in mine heart to give myself unto wine, yet acquainting mine heart with wisdom; and to lay hold on folly, till I might see what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' that good for the sons of men, which they should do under the heaven all the days of their life. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I made me great works; I builded me houses; I planted me vineyards: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'I made me gardens and orchards, and I planted trees in them of all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: kind of
    - type: text
      text: ' fruits: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'I made me pools of water, to water therewith the wood that bringeth forth trees: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'I got '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ' servants and maidens, and had servants born in my house; also I had great possessions of great and small cattle above all that were in Jerusalem before me: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'I gathered me also silver and gold, and the peculiar treasure of kings and of the provinces: I gat me men singers and women singers, and the delights of the sons of men, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' musical instruments, and that of all sorts. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'So I was great, and increased more than all that were before me in Jerusalem: also my wisdom remained with me. '
