document_id: EZK.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it came to pass in the thirtieth year, in the fourth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: month
    - type: text
      text: ', in the fifth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the month, as I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' among the captives by the river of Chebar, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the heavens were opened, and I saw visions of God. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for the likeness of their faces, they four had the face of a man, and the face of a lion, on the right side: and they four had the face of an ox on the left side; they four also had the face of an eagle. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' their faces: and their wings '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' stretched upward; two '
    - type: usfm
      marker: add
      children:
      - type: text
        text: wings
    - type: text
      text: ' of every one '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' joined one to another, and two covered their bodies. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they went every one straight forward: whither the spirit was to go, they went; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' they turned not when they went. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for the likeness of the living creatures, their appearance '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' like burning coals of fire, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' like the appearance of lamps: it went up and down among the living creatures; and the fire was bright, and out of the fire went forth lightning. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the living creatures ran and returned as the appearance of a flash of lightning.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now as I beheld the living creatures, behold one wheel upon the earth by the living creatures, with his four faces. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The appearance of the wheels and their work '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' like unto the colour of a beryl: and they four had one likeness: and their appearance and their work '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' as it were a wheel in the middle of a wheel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they went, they went upon their four sides: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' they turned not when they went. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for their rings, they were so high that they were dreadful; and their rings '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' full of eyes round about them four. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the living creatures went, the wheels went by them: and when the living creatures were lifted up from the earth, the wheels were lifted up. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the fifth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the month, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the fifth year of king Jehoiachin''s captivity, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whithersoever the spirit was to go, they went, thither '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was their
    - type: text
      text: ' spirit to go; and the wheels were lifted up over against them: for the spirit of the living creature '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in the wheels. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When those went, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: these
    - type: text
      text: ' went; and when those stood, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: these
    - type: text
      text: ' stood; and when those were lifted up from the earth, the wheels were lifted up over against them: for the spirit of the living creature '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in the wheels.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the likeness of the firmament upon the heads of the living creature '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' as the colour of the terrible crystal, stretched forth over their heads above. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And under the firmament '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' their wings straight, the one toward the other: every one had two, which covered on this side, and every one had two, which covered on that side, their bodies. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they went, I heard the noise of their wings, like the noise of great waters, as the voice of the Almighty, the voice of speech, as the noise of an host: when they stood, they let down their wings. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there was a voice from the firmament that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' over their heads, when they stood, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' had let down their wings.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And above the firmament that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' over their heads '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the likeness of a throne, as the appearance of a sapphire stone: and upon the likeness of the throne '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the likeness as the appearance of a man above upon it. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I saw as the colour of amber, as the appearance of fire round about within it, from the appearance of his loins even upward, and from the appearance of his loins even downward, I saw as it were the appearance of fire, and it had brightness round about. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As the appearance of the bow that is in the cloud in the day of rain, so '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the appearance of the brightness round about. This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the appearance of the likeness of the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. And when I saw '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', I fell upon my face, and I heard a voice of one that spake.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came expressly unto Ezekiel the priest, the son of Buzi, in the land of the Chaldeans by the river Chebar; and the hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' was there upon him.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: His Vision
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I looked, and, behold, a whirlwind came out of the north, a great cloud, and a fire infolding itself, and a brightness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' about it, and out of the midst thereof as the colour of amber, out of the midst of the fire. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also out of the midst thereof '
    - type: usfm
      marker: add
      children:
      - type: text
        text: came
    - type: text
      text: ' the likeness of four living creatures. And this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' their appearance; they had the likeness of a man. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And every one had four faces, and every one had four wings. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And their feet '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' straight feet; and the sole of their feet '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' like the sole of a calf''s foot: and they sparkled like the colour of burnished brass. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they had
    - type: text
      text: ' the hands of a man under their wings on their four sides; and they four had their faces and their wings. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Their wings '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' joined one to another; they turned not when they went; they went every one straight forward. '
