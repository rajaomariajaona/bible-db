verses:
  '1':
  - type: text
    content: 'Now it came to pass in the thirtieth year, in the fourth '
  - type: text
    content: month
  - type: text
    content: ', in the fifth '
  - type: text
    content: day
  - type: text
    content: ' of the month, as I '
  - type: text
    content: was
  - type: text
    content: ' among the captives by the river of Chebar, '
  - type: text
    content: that
  - type: text
    content: ' the heavens were opened, and I saw visions of God. '
  '10':
  - type: text
    content: 'As for the likeness of their faces, they four had the face of a man, and the face of a lion, on the right side: and they four had the face of an ox on the left side; they four also had the face of an eagle. '
  '11':
  - type: text
    content: 'Thus '
  - type: text
    content: were
  - type: text
    content: ' their faces: and their wings '
  - type: text
    content: were
  - type: text
    content: ' stretched upward; two '
  - type: text
    content: wings
  - type: text
    content: ' of every one '
  - type: text
    content: were
  - type: text
    content: ' joined one to another, and two covered their bodies. '
  '12':
  - type: text
    content: 'And they went every one straight forward: whither the spirit was to go, they went; '
  - type: text
    content: and
  - type: text
    content: ' they turned not when they went. '
  '13':
  - type: text
    content: 'As for the likeness of the living creatures, their appearance '
  - type: text
    content: was
  - type: text
    content: ' like burning coals of fire, '
  - type: text
    content: and
  - type: text
    content: ' like the appearance of lamps: it went up and down among the living creatures; and the fire was bright, and out of the fire went forth lightning. '
  '14':
  - type: text
    content: And the living creatures ran and returned as the appearance of a flash of lightning.
  '15':
  - type: text
    content: 'Now as I beheld the living creatures, behold one wheel upon the earth by the living creatures, with his four faces. '
  '16':
  - type: text
    content: 'The appearance of the wheels and their work '
  - type: text
    content: was
  - type: text
    content: ' like unto the colour of a beryl: and they four had one likeness: and their appearance and their work '
  - type: text
    content: was
  - type: text
    content: ' as it were a wheel in the middle of a wheel. '
  '17':
  - type: text
    content: 'When they went, they went upon their four sides: '
  - type: text
    content: and
  - type: text
    content: ' they turned not when they went. '
  '18':
  - type: text
    content: 'As for their rings, they were so high that they were dreadful; and their rings '
  - type: text
    content: were
  - type: text
    content: ' full of eyes round about them four. '
  '19':
  - type: text
    content: 'And when the living creatures went, the wheels went by them: and when the living creatures were lifted up from the earth, the wheels were lifted up. '
  '2':
  - type: text
    content: 'In the fifth '
  - type: text
    content: day
  - type: text
    content: ' of the month, which '
  - type: text
    content: was
  - type: text
    content: ' the fifth year of king Jehoiachin''s captivity, '
  '20':
  - type: text
    content: 'Whithersoever the spirit was to go, they went, thither '
  - type: text
    content: was their
  - type: text
    content: ' spirit to go; and the wheels were lifted up over against them: for the spirit of the living creature '
  - type: text
    content: was
  - type: text
    content: ' in the wheels. '
  '21':
  - type: text
    content: 'When those went, '
  - type: text
    content: these
  - type: text
    content: ' went; and when those stood, '
  - type: text
    content: these
  - type: text
    content: ' stood; and when those were lifted up from the earth, the wheels were lifted up over against them: for the spirit of the living creature '
  - type: text
    content: was
  - type: text
    content: ' in the wheels.'
  '22':
  - type: text
    content: 'And the likeness of the firmament upon the heads of the living creature '
  - type: text
    content: was
  - type: text
    content: ' as the colour of the terrible crystal, stretched forth over their heads above. '
  '23':
  - type: text
    content: 'And under the firmament '
  - type: text
    content: were
  - type: text
    content: ' their wings straight, the one toward the other: every one had two, which covered on this side, and every one had two, which covered on that side, their bodies. '
  '24':
  - type: text
    content: 'And when they went, I heard the noise of their wings, like the noise of great waters, as the voice of the Almighty, the voice of speech, as the noise of an host: when they stood, they let down their wings. '
  '25':
  - type: text
    content: 'And there was a voice from the firmament that '
  - type: text
    content: was
  - type: text
    content: ' over their heads, when they stood, '
  - type: text
    content: and
  - type: text
    content: ' had let down their wings.'
  '26':
  - type: text
    content: 'And above the firmament that '
  - type: text
    content: was
  - type: text
    content: ' over their heads '
  - type: text
    content: was
  - type: text
    content: ' the likeness of a throne, as the appearance of a sapphire stone: and upon the likeness of the throne '
  - type: text
    content: was
  - type: text
    content: ' the likeness as the appearance of a man above upon it. '
  '27':
  - type: text
    content: 'And I saw as the colour of amber, as the appearance of fire round about within it, from the appearance of his loins even upward, and from the appearance of his loins even downward, I saw as it were the appearance of fire, and it had brightness round about. '
  '28':
  - type: text
    content: 'As the appearance of the bow that is in the cloud in the day of rain, so '
  - type: text
    content: was
  - type: text
    content: ' the appearance of the brightness round about. This '
  - type: text
    content: was
  - type: text
    content: ' the appearance of the likeness of the glory of the '
  - type: text
    content: LORD
  - type: text
    content: '. And when I saw '
  - type: text
    content: it
  - type: text
    content: ', I fell upon my face, and I heard a voice of one that spake.'
  '3':
  - type: text
    content: 'the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came expressly unto Ezekiel the priest, the son of Buzi, in the land of the Chaldeans by the river Chebar; and the hand of the '
  - type: text
    content: LORD
  - type: text
    content: ' was there upon him.'
  - type: heading
    content: His Vision
  '4':
  - type: text
    content: 'And I looked, and, behold, a whirlwind came out of the north, a great cloud, and a fire infolding itself, and a brightness '
  - type: text
    content: was
  - type: text
    content: ' about it, and out of the midst thereof as the colour of amber, out of the midst of the fire. '
  '5':
  - type: text
    content: 'Also out of the midst thereof '
  - type: text
    content: came
  - type: text
    content: ' the likeness of four living creatures. And this '
  - type: text
    content: was
  - type: text
    content: ' their appearance; they had the likeness of a man. '
  '6':
  - type: text
    content: 'And every one had four faces, and every one had four wings. '
  '7':
  - type: text
    content: 'And their feet '
  - type: text
    content: were
  - type: text
    content: ' straight feet; and the sole of their feet '
  - type: text
    content: was
  - type: text
    content: ' like the sole of a calf''s foot: and they sparkled like the colour of burnished brass. '
  '8':
  - type: text
    content: 'And '
  - type: text
    content: they had
  - type: text
    content: ' the hands of a man under their wings on their four sides; and they four had their faces and their wings. '
  '9':
  - type: text
    content: 'Their wings '
  - type: text
    content: were
  - type: text
    content: ' joined one to another; they turned not when they went; they went every one straight forward. '
