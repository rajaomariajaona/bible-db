verses:
  '1':
  - type: text
    content: 'The words of Jeremiah the son of Hilkiah, of the priests that '
  - type: text
    content: were
  - type: text
    content: ' in Anathoth in the land of Benjamin: '
  '10':
  - type: text
    content: See, I have this day set thee over the nations and over the kingdoms, to root out, and to pull down, and to destroy, and to throw down, to build, and to plant.
  '11':
  - type: text
    content: 'Moreover the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came unto me, saying, Jeremiah, what seest thou? And I said, I see a rod of an almond tree. '
  '12':
  - type: text
    content: 'Then said the '
  - type: text
    content: LORD
  - type: text
    content: ' unto me, Thou hast well seen: for I will hasten my word to perform it.'
  '13':
  - type: text
    content: 'And the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came unto me the second time, saying, What seest thou? And I said, I see a seething pot; and the face thereof '
  - type: text
    content: is
  - type: text
    content: ' toward the north. '
  '14':
  - type: text
    content: 'Then the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto me, Out of the north an evil shall break forth upon all the inhabitants of the land. '
  '15':
  - type: text
    content: 'For, lo, I will call all the families of the kingdoms of the north, saith the '
  - type: text
    content: LORD
  - type: text
    content: '; and they shall come, and they shall set every one his throne at the entering of the gates of Jerusalem, and against all the walls thereof round about, and against all the cities of Judah. '
  '16':
  - type: text
    content: 'And I will utter my judgments against them touching all their wickedness, who have forsaken me, and have burned incense unto other gods, and worshipped the works of their own hands. '
  '17':
  - type: text
    content: 'Thou therefore gird up thy loins, and arise, and speak unto them all that I command thee: be not dismayed at their faces, lest I confound thee before them. '
  '18':
  - type: text
    content: 'For, behold, I have made thee this day a defenced city, and an iron pillar, and brasen walls against the whole land, against the kings of Judah, against the princes thereof, against the priests thereof, and against the people of the land. '
  '19':
  - type: text
    content: 'And they shall fight against thee; but they shall not prevail against thee; for I '
  - type: text
    content: am
  - type: text
    content: ' with thee, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', to deliver thee.'
  '2':
  - type: text
    content: 'to whom the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came in the days of Josiah the son of Amon king of Judah, in the thirteenth year of his reign. '
  '3':
  - type: text
    content: It came also in the days of Jehoiakim the son of Josiah king of Judah, unto the end of the eleventh year of Zedekiah the son of Josiah king of Judah, unto the carrying away of Jerusalem captive in the fifth month.
  - type: heading
    content: The Prophet's Call
  '4':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: LORD
  - type: text
    content: ' came unto me, saying, '
  '5':
  - type: text
    content: 'Before I formed thee in the belly I knew thee; and before thou camest forth out of the womb I sanctified thee, '
  - type: text
    content: and
  - type: text
    content: ' I ordained thee a prophet unto the nations. '
  '6':
  - type: text
    content: 'Then said I, Ah, Lord '
  - type: text
    content: GOD
  - type: text
    content: '! behold, I cannot speak: for I '
  - type: text
    content: am
  - type: text
    content: ' a child. '
  '7':
  - type: text
    content: 'But the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto me, Say not, I '
  - type: text
    content: am
  - type: text
    content: ' a child: for thou shalt go to all that I shall send thee, and whatsoever I command thee thou shalt speak. '
  '8':
  - type: text
    content: 'Be not afraid of their faces: for I '
  - type: text
    content: am
  - type: text
    content: ' with thee to deliver thee, saith the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Then the '
  - type: text
    content: LORD
  - type: text
    content: ' put forth his hand, and touched my mouth. And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto me, Behold, I have put my words in thy mouth. '
