document_id: DEU.20
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When thou goest out to battle against thine enemies, and seest horses, and chariots, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' a people more than thou, be not afraid of them: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with thee, which brought thee up out of the land of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And it shall be, when ye are come nigh unto the battle, that the priest shall approach and speak unto the people, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and shall say unto them, Hear, O Israel, ye approach this day unto battle against your enemies: let not your hearts faint, fear not, and do not tremble, neither be ye terrified because of them; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' he that goeth with you, to fight for you against your enemies, to save you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the officers shall speak unto the people, saying, What man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is there
  - type: text
    text: ' that hath built a new house, and hath not dedicated it? let him go and return to his house, lest he die in the battle, and another man dedicate it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And what man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is he
  - type: text
    text: ' that hath planted a vineyard, and hath not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yet
  - type: text
    text: ' eaten of it? let him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: also
  - type: text
    text: ' go and return unto his house, lest he die in the battle, and another man eat of it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And what man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is there
  - type: text
    text: ' that hath betrothed a wife, and hath not taken her? let him go and return unto his house, lest he die in the battle, and another man take her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the officers shall speak further unto the people, and they shall say, What man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is there that is
  - type: text
    text: ' fearful and fainthearted? let him go and return unto his house, lest his brethren''s heart faint as well as his heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: And it shall be, when the officers have made an end of speaking unto the people, that they shall make captains of the armies to lead the people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When thou comest nigh unto a city to fight against it, then proclaim peace unto it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And it shall be, if it make thee answer of peace, and open unto thee, then it shall be, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' all the people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that is
  - type: text
    text: ' found therein shall be tributaries unto thee, and they shall serve thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And if it will make no peace with thee, but will make war against thee, then thou shalt besiege it: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God hath delivered it into thine hands, thou shalt smite every male thereof with the edge of the sword: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'but the women, and the little ones, and the cattle, and all that is in the city, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' all the spoil thereof, shalt thou take unto thyself; and thou shalt eat the spoil of thine enemies, which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God hath given thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Thus shalt thou do unto all the cities '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which are
  - type: text
    text: ' very far off from thee, which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' not of the cities of these nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But of the cities of these people, which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God doth give thee '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' an inheritance, thou shalt save alive nothing that breatheth: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'but thou shalt utterly destroy them; '
  - type: usfm
    marker: add
    children:
    - type: text
      text: namely
  - type: text
    text: ', the Hittites, and the Amorites, the Canaanites, and the Perizzites, the Hivites, and the Jebusites; as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thy God hath commanded thee: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'that they teach you not to do after all their abominations, which they have done unto their gods; so should ye sin against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'When thou shalt besiege a city a long time, in making war against it to take it, thou shalt not destroy the trees thereof by forcing an axe against them: for thou mayest eat of them, and thou shalt not cut them down (for the tree of the field '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' man''s '
  - type: usfm
    marker: add
    children:
    - type: text
      text: life
  - type: text
    text: ') to employ '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' in the siege: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'only the trees which thou knowest that they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' not trees for meat, thou shalt destroy and cut them down; and thou shalt build bulwarks against the city that maketh war with thee, until it be subdued.'
