document_id: JHN.12,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then Jesus six days before the passover came to Bethany, where Lazarus was which had been dead, whom he raised from the dead. '
  '10':
  - type: text
    content: 'But the chief priests consulted that they might put Lazarus also to death; '
  '11':
  - type: text
    content: because that by reason of him many of the Jews went away, and believed on Jesus.
  '12':
  - type: text
    content: 'On the next day much people that were come to the feast, when they heard that Jesus was coming to Jerusalem, '
  '13':
  - type: text
    content: 'took branches of palm trees, and went forth to meet him, and cried, Hosanna: Blessed '
  - type: text
    content: is
  - type: text
    content: ' the King of Israel that cometh in the name of the Lord. '
  '14':
  - type: text
    content: 'And Jesus, when he had found a young ass, sat thereon; as it is written, '
  '15':
  - type: text
    content: 'Fear not, daughter of Sion: behold, thy King cometh, sitting on an ass''s colt. '
  '16':
  - type: text
    content: 'These things understood not his disciples at the first: but when Jesus was glorified, then remembered they that these things were written of him, and '
  - type: text
    content: that
  - type: text
    content: ' they had done these things unto him. '
  '17':
  - type: text
    content: 'The people therefore that was with him when he called Lazarus out of his grave, and raised him from the dead, bare record. '
  '18':
  - type: text
    content: 'For this cause the people also met him, for that they heard that he had done this miracle. '
  '19':
  - type: text
    content: The Pharisees therefore said among themselves, Perceive ye how ye prevail nothing? behold, the world is gone after him.
  '2':
  - type: text
    content: 'There they made him a supper; and Martha served: but Lazarus was one of them that sat at the table with him. '
  '20':
  - type: text
    content: 'And there were certain Greeks among them that came up to worship at the feast: '
  '21':
  - type: text
    content: 'the same came therefore to Philip, which was of Bethsaida of Galilee, and desired him, saying, Sir, we would see Jesus. '
  '22':
  - type: text
    content: 'Philip cometh and telleth Andrew: and again Andrew and Philip tell Jesus.'
  '23':
  - type: text
    content: 'And Jesus answered them, saying, '
  - type: text
    content: The hour is come, that the Son of man should be glorified.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Verily, verily, I say unto you, Except a corn of wheat fall into the ground and die, it abideth alone: but if it die, it bringeth forth much fruit.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: He that loveth his life shall lose it; and he that hateth his life in this world shall keep it unto life eternal.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'If any man serve me, let him follow me; and where I am, there shall also my servant be: if any man serve me, him will '
  - type: text
    content: my
  - type: text
    content: ' Father honour.'
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Now is my soul troubled; and what shall I say? Father, save me from this hour: but for this cause came I unto this hour.'
  - type: text
    content: ' '
  '28':
  - type: text
    content: Father, glorify thy name.
  - type: text
    content: ' Then came there a voice from heaven, '
  - type: text
    content: saying
  - type: text
    content: ', I have both glorified '
  - type: text
    content: it
  - type: text
    content: ', and will glorify '
  - type: text
    content: it
  - type: text
    content: ' again. '
  '29':
  - type: text
    content: 'The people therefore, that stood by, and heard '
  - type: text
    content: it
  - type: text
    content: ', said that it thundered: others said, An angel spake to him. '
  '3':
  - type: text
    content: 'Then took Mary a pound of ointment of spikenard, very costly, and anointed the feet of Jesus, and wiped his feet with her hair: and the house was filled with the odour of the ointment. '
  '30':
  - type: text
    content: 'Jesus answered and said, '
  - type: text
    content: This voice came not because of me, but for your sakes.
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Now is the judgment of this world: now shall the prince of this world be cast out.'
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'And I, if I be lifted up from the earth, will draw all '
  - type: text
    content: men
  - type: text
    content: ' unto me.'
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'This he said, signifying what death he should die. '
  '34':
  - type: text
    content: 'The people answered him, We have heard out of the law that Christ abideth for ever: and how sayest thou, The Son of man must be lifted up? who is this Son of man? '
  '35':
  - type: text
    content: 'Then Jesus said unto them, '
  - type: text
    content: 'Yet a little while is the light with you. Walk while ye have the light, lest darkness come upon you: for he that walketh in darkness knoweth not whither he goeth.'
  - type: text
    content: ' '
  '36':
  - type: text
    content: While ye have light, believe in the light, that ye may be the children of light.
  - type: text
    content: ' These things spake Jesus, and departed, and did hide himself from them.'
  '37':
  - type: text
    content: 'But though he had done so many miracles before them, yet they believed not on him: '
  '38':
  - type: text
    content: That the saying of Esaias the prophet might be fulfilled, which he spake,
  - type: text
    content: Lord, who hath believed our report?
  - type: text
    content: And to whom hath the arm of the Lord been revealed?
  '39':
  - type: text
    content: Therefore they could not believe, because that Esaias said again,
  '4':
  - type: text
    content: 'Then saith one of his disciples, Judas Iscariot, Simon''s '
  - type: text
    content: son
  - type: text
    content: ', which should betray him, '
  '40':
  - type: text
    content: He hath blinded their eyes, and hardened their heart;
  - type: text
    content: 'That they should not see with '
  - type: text
    content: their
  - type: text
    content: ' eyes, nor understand with '
  - type: text
    content: their
  - type: text
    content: ' heart,'
  - type: text
    content: And be converted,
  - type: text
    content: And I should heal them.
  '41':
  - type: text
    content: These things said Esaias, when he saw his glory, and spake of him.
  '42':
  - type: text
    content: 'Nevertheless among the chief rulers also many believed on him; but because of the Pharisees they did not confess '
  - type: text
    content: him
  - type: text
    content: ', lest they should be put out of the synagogue: '
  '43':
  - type: text
    content: for they loved the praise of men more than the praise of God.
  '44':
  - type: text
    content: 'Jesus cried and said, '
  - type: text
    content: He that believeth on me, believeth not on me, but on him that sent me.
  - type: text
    content: ' '
  '45':
  - type: text
    content: And he that seeth me seeth him that sent me.
  - type: text
    content: ' '
  '46':
  - type: text
    content: I am come a light into the world, that whosoever believeth on me should not abide in darkness.
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'And if any man hear my words, and believe not, I judge him not: for I came not to judge the world, but to save the world.'
  - type: text
    content: ' '
  '48':
  - type: text
    content: 'He that rejecteth me, and receiveth not my words, hath one that judgeth him: the word that I have spoken, the same shall judge him in the last day.'
  - type: text
    content: ' '
  '49':
  - type: text
    content: For I have not spoken of myself; but the Father which sent me, he gave me a commandment, what I should say, and what I should speak.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Why was not this ointment sold for three hundred pence, and given to the poor? '
  '50':
  - type: text
    content: 'And I know that his commandment is life everlasting: whatsoever I speak therefore, even as the Father said unto me, so I speak.'
  '6':
  - type: text
    content: 'This he said, not that he cared for the poor; but because he was a thief, and had the bag, and bare what was put therein. '
  '7':
  - type: text
    content: 'Then said Jesus, '
  - type: text
    content: 'Let her alone: against the day of my burying hath she kept this.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: For the poor always ye have with you; but me ye have not always.
  '9':
  - type: text
    content: 'Much people of the Jews therefore knew that he was there: and they came not for Jesus'' sake only, but that they might see Lazarus also, whom he had raised from the dead. '
