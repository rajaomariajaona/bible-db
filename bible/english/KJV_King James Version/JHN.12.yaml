document_id: JHN.12,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus six days before the passover came to Bethany, where Lazarus was which had been dead, whom he raised from the dead. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the chief priests consulted that they might put Lazarus also to death; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: because that by reason of him many of the Jews went away, and believed on Jesus.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the next day much people that were come to the feast, when they heard that Jesus was coming to Jerusalem, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'took branches of palm trees, and went forth to meet him, and cried, Hosanna: Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the King of Israel that cometh in the name of the Lord. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus, when he had found a young ass, sat thereon; as it is written, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fear not, daughter of Sion: behold, thy King cometh, sitting on an ass''s colt. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These things understood not his disciples at the first: but when Jesus was glorified, then remembered they that these things were written of him, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' they had done these things unto him. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people therefore that was with him when he called Lazarus out of his grave, and raised him from the dead, bare record. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this cause the people also met him, for that they heard that he had done this miracle. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Pharisees therefore said among themselves, Perceive ye how ye prevail nothing? behold, the world is gone after him.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There they made him a supper; and Martha served: but Lazarus was one of them that sat at the table with him. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there were certain Greeks among them that came up to worship at the feast: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the same came therefore to Philip, which was of Bethsaida of Galilee, and desired him, saying, Sir, we would see Jesus. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Philip cometh and telleth Andrew: and again Andrew and Philip tell Jesus.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus answered them, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The hour is come, that the Son of man should be glorified.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Verily, verily, I say unto you, Except a corn of wheat fall into the ground and die, it abideth alone: but if it die, it bringeth forth much fruit.'
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He that loveth his life shall lose it; and he that hateth his life in this world shall keep it unto life eternal.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'If any man serve me, let him follow me; and where I am, there shall also my servant be: if any man serve me, him will '
      - type: usfm
        marker: add
        children:
        - type: text
          text: my
      - type: text
        text: ' Father honour.'
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Now is my soul troubled; and what shall I say? Father, save me from this hour: but for this cause came I unto this hour.'
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Father, glorify thy name.
    - type: text
      text: ' Then came there a voice from heaven, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: saying
    - type: text
      text: ', I have both glorified '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and will glorify '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' again. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people therefore, that stood by, and heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', said that it thundered: others said, An angel spake to him. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then took Mary a pound of ointment of spikenard, very costly, and anointed the feet of Jesus, and wiped his feet with her hair: and the house was filled with the odour of the ointment. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: This voice came not because of me, but for your sakes.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Now is the judgment of this world: now shall the prince of this world be cast out.'
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And I, if I be lifted up from the earth, will draw all '
      - type: usfm
        marker: add
        children:
        - type: text
          text: men
      - type: text
        text: ' unto me.'
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This he said, signifying what death he should die. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people answered him, We have heard out of the law that Christ abideth for ever: and how sayest thou, The Son of man must be lifted up? who is this Son of man? '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus said unto them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Yet a little while is the light with you. Walk while ye have the light, lest darkness come upon you: for he that walketh in darkness knoweth not whither he goeth.'
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: While ye have light, believe in the light, that ye may be the children of light.
    - type: text
      text: ' These things spake Jesus, and departed, and did hide himself from them.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But though he had done so many miracles before them, yet they believed not on him: '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That the saying of Esaias the prophet might be fulfilled, which he spake,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord, who hath believed our report?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to whom hath the arm of the Lord been revealed?
  '39':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Therefore they could not believe, because that Esaias said again,
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then saith one of his disciples, Judas Iscariot, Simon''s '
    - type: usfm
      marker: add
      children:
      - type: text
        text: son
    - type: text
      text: ', which should betray him, '
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He hath blinded their eyes, and hardened their heart;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'That they should not see with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' eyes, nor understand with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' heart,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And be converted,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I should heal them.
  '41':
  - type: usfm
    marker: m
    children:
    - type: text
      text: These things said Esaias, when he saw his glory, and spake of him.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nevertheless among the chief rulers also many believed on him; but because of the Pharisees they did not confess '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ', lest they should be put out of the synagogue: '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: for they loved the praise of men more than the praise of God.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus cried and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He that believeth on me, believeth not on me, but on him that sent me.
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And he that seeth me seeth him that sent me.
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I am come a light into the world, that whosoever believeth on me should not abide in darkness.
    - type: text
      text: ' '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And if any man hear my words, and believe not, I judge him not: for I came not to judge the world, but to save the world.'
    - type: text
      text: ' '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'He that rejecteth me, and receiveth not my words, hath one that judgeth him: the word that I have spoken, the same shall judge him in the last day.'
    - type: text
      text: ' '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For I have not spoken of myself; but the Father which sent me, he gave me a commandment, what I should say, and what I should speak.
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Why was not this ointment sold for three hundred pence, and given to the poor? '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And I know that his commandment is life everlasting: whatsoever I speak therefore, even as the Father said unto me, so I speak.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This he said, not that he cared for the poor; but because he was a thief, and had the bag, and bare what was put therein. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said Jesus, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Let her alone: against the day of my burying hath she kept this.'
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For the poor always ye have with you; but me ye have not always.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Much people of the Jews therefore knew that he was there: and they came not for Jesus'' sake only, but that they might see Lazarus also, whom he had raised from the dead. '
