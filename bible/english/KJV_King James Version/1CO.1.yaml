document_id: 1CO.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Paul, called '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' an apostle of Jesus Christ through the will of God, and Sosthenes '
    - type: usfm
      marker: add
      children:
      - type: text
        text: our
    - type: text
      text: ' brother, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Now I beseech you, brethren, by the name of our Lord Jesus Christ, that ye all speak the same thing, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' there be no divisions among you; but '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' ye be perfectly joined together in the same mind and in the same judgment. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For it hath been declared unto me of you, my brethren, by them '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which are of the house
    - type: text
      text: ' of Chloe, that there are contentions among you. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Now this I say, that every one of you saith, I am of Paul; and I of Apollos; and I of Cephas; and I of Christ. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Is Christ divided? was Paul crucified for you? or were ye baptized in the name of Paul? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'I thank God that I baptized none of you, but Crispus and Gaius; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'lest any should say that I had baptized in mine own name. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And I baptized also the household of Stephanas: besides, I know not whether I baptized any other. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For Christ sent me not to baptize, but to preach the gospel: not with wisdom of words, lest the cross of Christ should be made of none effect.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'For the preaching of the cross is to them that perish foolishness; but unto us which are saved it is the power of God. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: For it is written,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will destroy the wisdom of the wise,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And will bring to nothing the understanding of the prudent.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'unto the church of God which is at Corinth, to them that are sanctified in Christ Jesus, called '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' saints, with all that in every place call upon the name of Jesus Christ our Lord, both their''s and our''s: '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the wise? where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the scribe? where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the disputer of this world? hath not God made foolish the wisdom of this world?'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'For after that in the wisdom of God the world by wisdom knew not God, it pleased God by the foolishness of preaching to save them that believe. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'For the Jews require a sign, and the Greeks seek after wisdom: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'but we preach Christ crucified, unto the Jews a stumblingblock, and unto the Greeks foolishness; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'but unto them which are called, both Jews and Greeks, Christ the power of God, and the wisdom of God. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Because the foolishness of God is wiser than men; and the weakness of God is stronger than men.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'For ye see your calling, brethren, how that not many wise men after the flesh, not many mighty, not many noble, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are called
    - type: text
      text: ': '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'but God hath chosen the foolish things of the world to confound the wise; and God hath chosen the weak things of the world to confound the things which are mighty; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'and base things of the world, and things which are despised, hath God chosen, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yea
    - type: text
      text: ', and things which are not, to bring to nought things that are: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'that no flesh should glory in his presence. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'grace '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' unto you, and peace, from God our Father, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from
    - type: text
      text: ' the Lord Jesus Christ.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'But of him are ye in Christ Jesus, who of God is made unto us wisdom, and righteousness, and sanctification, and redemption: '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: that, according as it is written, He that glorieth, let him glory in the Lord.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I thank my God always on your behalf, for the grace of God which is given you by Jesus Christ; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'that in every thing ye are enriched by him, in all utterance, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' all knowledge; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'even as the testimony of Christ was confirmed in you: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'so that ye come behind in no gift; waiting for the coming of our Lord Jesus Christ: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'who shall also confirm you unto the end, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that ye may be
    - type: text
      text: ' blameless in the day of our Lord Jesus Christ. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' faithful, by whom ye were called unto the fellowship of his Son Jesus Christ our Lord.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Divisions in the Church
    marker-yv: yv-h
