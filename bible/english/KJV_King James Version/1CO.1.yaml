verses:
  '1':
  - type: text
    content: 'Paul, called '
  - type: text
    content: to be
  - type: text
    content: ' an apostle of Jesus Christ through the will of God, and Sosthenes '
  - type: text
    content: our
  - type: text
    content: ' brother, '
  '10':
  - type: text
    content: 'Now I beseech you, brethren, by the name of our Lord Jesus Christ, that ye all speak the same thing, and '
  - type: text
    content: that
  - type: text
    content: ' there be no divisions among you; but '
  - type: text
    content: that
  - type: text
    content: ' ye be perfectly joined together in the same mind and in the same judgment. '
  '11':
  - type: text
    content: 'For it hath been declared unto me of you, my brethren, by them '
  - type: text
    content: which are of the house
  - type: text
    content: ' of Chloe, that there are contentions among you. '
  '12':
  - type: text
    content: 'Now this I say, that every one of you saith, I am of Paul; and I of Apollos; and I of Cephas; and I of Christ. '
  '13':
  - type: text
    content: 'Is Christ divided? was Paul crucified for you? or were ye baptized in the name of Paul? '
  '14':
  - type: text
    content: 'I thank God that I baptized none of you, but Crispus and Gaius; '
  '15':
  - type: text
    content: 'lest any should say that I had baptized in mine own name. '
  '16':
  - type: text
    content: 'And I baptized also the household of Stephanas: besides, I know not whether I baptized any other. '
  '17':
  - type: text
    content: 'For Christ sent me not to baptize, but to preach the gospel: not with wisdom of words, lest the cross of Christ should be made of none effect.'
  '18':
  - type: text
    content: 'For the preaching of the cross is to them that perish foolishness; but unto us which are saved it is the power of God. '
  '19':
  - type: text
    content: For it is written,
  - type: text
    content: I will destroy the wisdom of the wise,
  - type: text
    content: And will bring to nothing the understanding of the prudent.
  '2':
  - type: text
    content: 'unto the church of God which is at Corinth, to them that are sanctified in Christ Jesus, called '
  - type: text
    content: to be
  - type: text
    content: ' saints, with all that in every place call upon the name of Jesus Christ our Lord, both their''s and our''s: '
  '20':
  - type: text
    content: 'Where '
  - type: text
    content: is
  - type: text
    content: ' the wise? where '
  - type: text
    content: is
  - type: text
    content: ' the scribe? where '
  - type: text
    content: is
  - type: text
    content: ' the disputer of this world? hath not God made foolish the wisdom of this world?'
  '21':
  - type: text
    content: 'For after that in the wisdom of God the world by wisdom knew not God, it pleased God by the foolishness of preaching to save them that believe. '
  '22':
  - type: text
    content: 'For the Jews require a sign, and the Greeks seek after wisdom: '
  '23':
  - type: text
    content: 'but we preach Christ crucified, unto the Jews a stumblingblock, and unto the Greeks foolishness; '
  '24':
  - type: text
    content: 'but unto them which are called, both Jews and Greeks, Christ the power of God, and the wisdom of God. '
  '25':
  - type: text
    content: Because the foolishness of God is wiser than men; and the weakness of God is stronger than men.
  '26':
  - type: text
    content: 'For ye see your calling, brethren, how that not many wise men after the flesh, not many mighty, not many noble, '
  - type: text
    content: are called
  - type: text
    content: ': '
  '27':
  - type: text
    content: 'but God hath chosen the foolish things of the world to confound the wise; and God hath chosen the weak things of the world to confound the things which are mighty; '
  '28':
  - type: text
    content: 'and base things of the world, and things which are despised, hath God chosen, '
  - type: text
    content: yea
  - type: text
    content: ', and things which are not, to bring to nought things that are: '
  '29':
  - type: text
    content: 'that no flesh should glory in his presence. '
  '3':
  - type: text
    content: 'grace '
  - type: text
    content: be
  - type: text
    content: ' unto you, and peace, from God our Father, and '
  - type: text
    content: from
  - type: text
    content: ' the Lord Jesus Christ.'
  '30':
  - type: text
    content: 'But of him are ye in Christ Jesus, who of God is made unto us wisdom, and righteousness, and sanctification, and redemption: '
  '31':
  - type: text
    content: that, according as it is written, He that glorieth, let him glory in the Lord.
  '4':
  - type: text
    content: 'I thank my God always on your behalf, for the grace of God which is given you by Jesus Christ; '
  '5':
  - type: text
    content: 'that in every thing ye are enriched by him, in all utterance, and '
  - type: text
    content: in
  - type: text
    content: ' all knowledge; '
  '6':
  - type: text
    content: 'even as the testimony of Christ was confirmed in you: '
  '7':
  - type: text
    content: 'so that ye come behind in no gift; waiting for the coming of our Lord Jesus Christ: '
  '8':
  - type: text
    content: 'who shall also confirm you unto the end, '
  - type: text
    content: that ye may be
  - type: text
    content: ' blameless in the day of our Lord Jesus Christ. '
  '9':
  - type: text
    content: 'God '
  - type: text
    content: is
  - type: text
    content: ' faithful, by whom ye were called unto the fellowship of his Son Jesus Christ our Lord.'
  - type: heading
    content: Divisions in the Church
