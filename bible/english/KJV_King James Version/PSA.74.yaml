document_id: PSA.74,1
type_code: eng
verses:
  '1':
  - type: text
    content: Maschil of Asaph.
  - type: text
    content: 'O God, why hast thou cast '
  - type: text
    content: us
  - type: text
    content: ' off for ever?'
  - type: text
    content: Why
  - type: text
    content: ' doth thine anger smoke against the sheep of thy pasture?'
  '10':
  - type: text
    content: O God, how long shall the adversary reproach?
  - type: text
    content: Shall the enemy blaspheme thy name for ever?
  '11':
  - type: text
    content: Why withdrawest thou thy hand, even thy right hand?
  - type: text
    content: 'Pluck '
  - type: text
    content: it
  - type: text
    content: ' out of thy bosom.'
  '12':
  - type: text
    content: 'For God '
  - type: text
    content: is
  - type: text
    content: ' my King of old,'
  - type: text
    content: Working salvation in the midst of the earth.
  '13':
  - type: text
    content: 'Thou didst divide the sea by thy strength:'
  - type: text
    content: Thou brakest the heads of the dragons in the waters.
  '14':
  - type: text
    content: Thou brakest the heads of leviathan in pieces,
  - type: text
    content: And
  - type: text
    content: ' gavest him '
  - type: text
    content: to be
  - type: text
    content: ' meat to the people inhabiting the wilderness.'
  '15':
  - type: text
    content: 'Thou didst cleave the fountain and the flood:'
  - type: text
    content: Thou driedst up mighty rivers.
  '16':
  - type: text
    content: 'The day '
  - type: text
    content: is
  - type: text
    content: ' thine, the night also '
  - type: text
    content: is
  - type: text
    content: ' thine:'
  - type: text
    content: Thou hast prepared the light and the sun.
  '17':
  - type: text
    content: 'Thou hast set all the borders of the earth:'
  - type: text
    content: Thou hast made summer and winter.
  '18':
  - type: text
    content: 'Remember this, '
  - type: text
    content: that
  - type: text
    content: ' the enemy hath reproached, O '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: 'And '
  - type: text
    content: that
  - type: text
    content: ' the foolish people have blasphemed thy name.'
  '19':
  - type: text
    content: 'O deliver not the soul of thy turtledove unto the multitude '
  - type: text
    content: 'of the wicked:'
  - type: text
    content: Forget not the congregation of thy poor for ever.
  '2':
  - type: text
    content: 'Remember thy congregation, '
  - type: text
    content: which
  - type: text
    content: ' thou hast purchased of old;'
  - type: text
    content: 'The rod of thine inheritance, '
  - type: text
    content: which
  - type: text
    content: ' thou hast redeemed;'
  - type: text
    content: This mount Zion, wherein thou hast dwelt.
  '20':
  - type: text
    content: 'Have respect unto the covenant:'
  - type: text
    content: For the dark places of the earth are full of the habitations of cruelty.
  '21':
  - type: text
    content: 'O let not the oppressed return ashamed:'
  - type: text
    content: Let the poor and needy praise thy name.
  '22':
  - type: text
    content: 'Arise, O God, plead thine own cause:'
  - type: text
    content: Remember how the foolish man reproacheth thee daily.
  '23':
  - type: text
    content: 'Forget not the voice of thine enemies:'
  - type: text
    content: The tumult of those that rise up against thee increaseth continually.
  '3':
  - type: text
    content: Lift up thy feet unto the perpetual desolations;
  - type: text
    content: Even
  - type: text
    content: ' all '
  - type: text
    content: that
  - type: text
    content: ' the enemy'
  - type: text
    content: hath done wickedly in the sanctuary.
  '4':
  - type: text
    content: Thine enemies roar in the midst of thy congregations;
  - type: text
    content: 'They set up their ensigns '
  - type: text
    content: for
  - type: text
    content: ' signs.'
  '5':
  - type: text
    content: ' '
  - type: text
    content: A man
  - type: text
    content: ' was famous according as he had lifted up axes upon the thick trees.'
  '6':
  - type: text
    content: But now they break down the carved work
  - type: text
    content: Thereof at once with axes and hammers.
  '7':
  - type: text
    content: They have cast fire into thy sanctuary,
  - type: text
    content: 'They have defiled '
  - type: text
    content: by casting down
  - type: text
    content: ' the dwelling place of thy name to the ground.'
  '8':
  - type: text
    content: 'They said in their hearts, Let us destroy them together:'
  - type: text
    content: They have burned up all the synagogues of God in the land.
  '9':
  - type: text
    content: 'We see not our signs: '
  - type: text
    content: There is
  - type: text
    content: ' no more any prophet:'
  - type: text
    content: 'Neither '
  - type: text
    content: is there
  - type: text
    content: ' among us any that knoweth how long.'
