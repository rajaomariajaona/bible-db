document_id: PSA.74
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: Maschil of Asaph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'O God, why hast thou cast '
  - type: usfm
    marker: add
    children:
    - type: text
      text: us
  - type: text
    text: ' off for ever?'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Why
  - type: text
    text: ' doth thine anger smoke against the sheep of thy pasture?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Remember thy congregation, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' thou hast purchased of old;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The rod of thine inheritance, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' thou hast redeemed;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: This mount Zion, wherein thou hast dwelt.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Lift up thy feet unto the perpetual desolations;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Even
  - type: text
    text: ' all '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' the enemy'
- type: usfm
  marker: q2
  children:
  - type: text
    text: hath done wickedly in the sanctuary.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Thine enemies roar in the midst of thy congregations;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They set up their ensigns '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' signs.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: A man
  - type: text
    text: ' was famous according as he had lifted up axes upon the thick trees.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: But now they break down the carved work
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thereof at once with axes and hammers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They have cast fire into thy sanctuary,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They have defiled '
  - type: usfm
    marker: add
    children:
    - type: text
      text: by casting down
  - type: text
    text: ' the dwelling place of thy name to the ground.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'They said in their hearts, Let us destroy them together:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They have burned up all the synagogues of God in the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'We see not our signs: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' no more any prophet:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Neither '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is there
  - type: text
    text: ' among us any that knoweth how long.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: O God, how long shall the adversary reproach?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Shall the enemy blaspheme thy name for ever?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Why withdrawest thou thy hand, even thy right hand?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Pluck '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' out of thy bosom.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my King of old,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Working salvation in the midst of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Thou didst divide the sea by thy strength:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou brakest the heads of the dragons in the waters.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Thou brakest the heads of leviathan in pieces,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' gavest him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' meat to the people inhabiting the wilderness.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Thou didst cleave the fountain and the flood:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou driedst up mighty rivers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The day '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thine, the night also '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' thine:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou hast prepared the light and the sun.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Thou hast set all the borders of the earth:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou hast made summer and winter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Remember this, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' the enemy hath reproached, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' the foolish people have blasphemed thy name.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'O deliver not the soul of thy turtledove unto the multitude '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'of the wicked:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Forget not the congregation of thy poor for ever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Have respect unto the covenant:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: For the dark places of the earth are full of the habitations of cruelty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'O let not the oppressed return ashamed:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let the poor and needy praise thy name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Arise, O God, plead thine own cause:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Remember how the foolish man reproacheth thee daily.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Forget not the voice of thine enemies:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The tumult of those that rise up against thee increaseth continually.
