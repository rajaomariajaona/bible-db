    content: Among the Philistines
  - type: text
    content: 'And Samson went down to Timnath, and saw a woman in Timnath of the daughters of the Philistines. '
  '10':
  - type: text
    content: 'So his father went down unto the woman: and Samson made there a feast; for so used the young men to do. '
  '11':
  - type: text
    content: 'And it came to pass, when they saw him, that they brought thirty companions to be with him. '
  '12':
  - type: text
    content: 'And Samson said unto them, I will now put forth a riddle unto you: if ye can certainly declare it me within the seven days of the feast, and find '
  - type: text
    content: it
  - type: text
    content: ' out, then I will give you thirty sheets and thirty change of garments: '
