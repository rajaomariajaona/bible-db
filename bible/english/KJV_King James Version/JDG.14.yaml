  - type: text
    content: ' thee? '
  '17':
  - type: text
    content: 'And she wept before him the seven days, while their feast lasted: and it came to pass on the seventh day, that he told her, because she lay sore upon him: and she told the riddle to the children of her people. '
  '18':
  - type: text
    content: 'And the men of the city said unto him on the seventh day before the sun went down, What '
  - type: text
