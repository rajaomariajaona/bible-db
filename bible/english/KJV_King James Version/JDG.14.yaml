document_id: JDG.14,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Among the Philistines
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Samson went down to Timnath, and saw a woman in Timnath of the daughters of the Philistines. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So his father went down unto the woman: and Samson made there a feast; for so used the young men to do. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, when they saw him, that they brought thirty companions to be with him. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Samson said unto them, I will now put forth a riddle unto you: if ye can certainly declare it me within the seven days of the feast, and find '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' out, then I will give you thirty sheets and thirty change of garments: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but if ye cannot declare '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' me, then shall ye give me thirty sheets and thirty change of garments. And they said unto him, Put forth thy riddle, that we may hear it. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he said unto them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Out of the eater came forth meat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And out of the strong came forth sweetness.
  - type: usfm
    marker: m
    children:
    - type: text
      text: And they could not in three days expound the riddle.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass on the seventh day, that they said unto Samson''s wife, Entice thy husband, that he may declare unto us the riddle, lest we burn thee and thy father''s house with fire: have ye called us to take that we have? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is it
    - type: text
      text: ' not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so?
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Samson''s wife wept before him, and said, Thou dost but hate me, and lovest me not: thou hast put forth a riddle unto the children of my people, and hast not told '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' me. And he said unto her, Behold, I have not told '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' my father nor my mother, and shall I tell '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' thee? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And she wept before him the seven days, while their feast lasted: and it came to pass on the seventh day, that he told her, because she lay sore upon him: and she told the riddle to the children of her people. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the men of the city said unto him on the seventh day before the sun went down, What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' sweeter than honey? And what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' stronger than a lion? And he said unto them,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If ye had not plowed with my heifer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ye had not found out my riddle.
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came upon him, and he went down to Ashkelon, and slew thirty men of them, and took their spoil, and gave change of garments unto them which expounded the riddle. And his anger was kindled, and he went up to his father''s house. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he came up, and told his father and his mother, and said, I have seen a woman in Timnath of the daughters of the Philistines: now therefore get her for me to wife. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But Samson''s wife was '
    - type: usfm
      marker: add
      children:
      - type: text
        text: given
    - type: text
      text: ' to his companion, whom he had used as his friend.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then his father and his mother said unto him, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is there
    - type: text
      text: ' never a woman among the daughters of thy brethren, or among all my people, that thou goest to take a wife of the uncircumcised Philistines? And Samson said unto his father, Get her for me; for she pleaseth me well. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But his father and his mother knew not that it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', that he sought an occasion against the Philistines: for at that time the Philistines had dominion over Israel.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then went Samson down, and his father and his mother, to Timnath, and came to the vineyards of Timnath: and, behold, a young lion roared against him. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' came mightily upon him, and he rent him as he would have rent a kid, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he had
    - type: text
      text: ' nothing in his hand: but he told not his father or his mother what he had done. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he went down, and talked with the woman; and she pleased Samson well. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And after a time he returned to take her, and he turned aside to see the carcase of the lion: and, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' a swarm of bees and honey in the carcase of the lion. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he took thereof in his hands, and went on eating, and came to his father and mother, and he gave them, and they did eat: but he told not them that he had taken the honey out of the carcase of the lion.'
