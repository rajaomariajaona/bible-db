  - type: text
    content: ' came upon him, and he went down to Ashkelon, and slew thirty men of them, and took their spoil, and gave change of garments unto them which expounded the riddle. And his anger was kindled, and he went up to his father''s house. '
  '2':
  - type: text
    content: 'And he came up, and told his father and his mother, and said, I have seen a woman in Timnath of the daughters of the Philistines: now therefore get her for me to wife. '
  '20':
  - type: text
    content: 'But Samson''s wife was '
  - type: text
