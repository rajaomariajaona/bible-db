    content: Burning of the City
  - type: text
    content: 'Then I looked, and, behold, in the firmament that was above the head of the cherubims there appeared over them as it were a sapphire stone, as the appearance of the likeness of a throne. '
  '10':
  - type: text
    content: 'And '
  - type: text
    content: as for
  - type: text
