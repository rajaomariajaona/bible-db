  '11':
  - type: text
    content: 'When they went, they went upon their four sides; they turned not as they went, but to the place whither the head looked they followed it; they turned not as they went. '
  '12':
  - type: text
    content: 'And their whole body, and their backs, and their hands, and their wings, and the wheels, '
  - type: text
