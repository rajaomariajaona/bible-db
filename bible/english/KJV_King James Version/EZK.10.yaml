document_id: EZK.10,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Burning of the City
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then I looked, and, behold, in the firmament that was above the head of the cherubims there appeared over them as it were a sapphire stone, as the appearance of the likeness of a throne. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as for
    - type: text
      text: ' their appearances, they four had one likeness, as if a wheel had been in the midst of a wheel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'When they went, they went upon their four sides; they turned not as they went, but to the place whither the head looked they followed it; they turned not as they went. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And their whole body, and their backs, and their hands, and their wings, and the wheels, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' full of eyes round about, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the wheels that they four had. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'As for the wheels, it was cried unto them in my hearing, O wheel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And every one had four faces: the first face '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the face of a cherub, and the second face '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the face of a man, and the third the face of a lion, and the fourth the face of an eagle.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And the cherubims were lifted up. This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the living creature that I saw by the river of Chebar. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And when the cherubims went, the wheels went by them: and when the cherubims lifted up their wings to mount up from the earth, the same wheels also turned not from beside them. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'When they stood, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: these
    - type: text
      text: ' stood; and when they were lifted up, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: these
    - type: text
      text: ' lifted up themselves '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'also:'
    - type: text
      text: ' for the spirit of the living creature '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in them.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' departed from off the threshold of the house, and stood over the cherubims. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And the cherubims lifted up their wings, and mounted up from the earth in my sight: when they went out, the wheels also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' beside them, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: every one
    - type: text
      text: ' stood at the door of the east gate of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '''s house; and the glory of the God of Israel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' over them above.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And he spake unto the man clothed with linen, and said, Go in between the wheels, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' under the cherub, and fill thine hand with coals of fire from between the cherubims, and scatter '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' over the city. And he went in in my sight.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'This '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the living creature that I saw under the God of Israel by the river of Chebar; and I knew that they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' the cherubims. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Every one had four faces apiece, and every one four wings; and the likeness of the hands of a man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' under their wings. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And the likeness of their faces '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the same faces which I saw by the river of Chebar, their appearances and themselves: they went every one straight forward.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Now the cherubims stood on the right side of the house, when the man went in; and the cloud filled the inner court. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' went up from the cherub, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and stood
    - type: text
      text: ' over the threshold of the house; and the house was filled with the cloud, and the court was full of the brightness of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '''s glory. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And the sound of the cherubims'' wings was heard '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' to the outer court, as the voice of the Almighty God when he speaketh. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And it came to pass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' when he had commanded the man clothed with linen, saying, Take fire from between the wheels, from between the cherubims; then he went in, and stood beside the wheels. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' cherub stretched forth his hand from between the cherubims unto the fire that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' between the cherubims, and took '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thereof
    - type: text
      text: ', and put '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' into the hands of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him that was
    - type: text
      text: ' clothed with linen: who took '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', and went out. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: And there appeared in the cherubims the form of a man's hand under their wings.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And when I looked, behold the four wheels by the cherubims, one wheel by one cherub, and another wheel by another cherub: and the appearance of the wheels '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' as the colour of a beryl stone. '
