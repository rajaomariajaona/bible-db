document_id: ISA.24
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Whole World
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Behold, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' maketh the earth empty, and maketh it waste, and turneth it upside down, and scattereth abroad the inhabitants thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And it shall be, as with the people, so with the priest; as with the servant, so with his master; as with the maid, so with her mistress; as with the buyer, so with the seller; as with the lender, so with the borrower; as with the taker of usury, so with the giver of usury to him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The land shall be utterly emptied, and utterly spoiled: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath spoken this word. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The earth mourneth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' fadeth away, the world languisheth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' fadeth away, the haughty people of the earth do languish. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The earth also is defiled under the inhabitants thereof; because they have transgressed the laws, changed the ordinance, broken the everlasting covenant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Therefore hath the curse devoured the earth, and they that dwell therein are desolate: therefore the inhabitants of the earth are burned, and few men left.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The new wine mourneth, the vine languisheth, all the merryhearted do sigh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The mirth of tabrets ceaseth, the noise of them that rejoice endeth, the joy of the harp ceaseth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'They shall not drink wine with a song; strong drink shall be bitter to them that drink it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The city of confusion is broken down: every house is shut up, that no man may come in. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' a crying for wine in the streets; all joy is darkened, the mirth of the land is gone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'In the city is left desolation, and the gate is smitten with destruction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When thus it shall be in the midst of the land among the people, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there shall be
  - type: text
    text: ' as the shaking of an olive tree, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' as the gleaning grapes when the vintage is done. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'They shall lift up their voice, they shall sing for the majesty of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', they shall cry aloud from the sea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Wherefore glorify ye the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' in the fires, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of Israel in the isles of the sea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'From the uttermost part of the earth have we heard songs, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' glory to the righteous. But I said, My leanness, my leanness, woe unto me! the treacherous dealers have dealt treacherously; yea, the treacherous dealers have dealt very treacherously.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fear, and the pit, and the snare, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' upon thee, O inhabitant of the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And it shall come to pass, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' he who fleeth from the noise of the fear shall fall into the pit; and he that cometh up out of the midst of the pit shall be taken in the snare: for the windows from on high are open, and the foundations of the earth do shake. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The earth is utterly broken down, the earth is clean dissolved, the earth is moved exceedingly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The earth shall reel to and fro like a drunkard, and shall be removed like a cottage; and the transgression thereof shall be heavy upon it; and it shall fall, and not rise again.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And it shall come to pass in that day, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall punish the host of the high ones '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that are
  - type: text
    text: ' on high, and the kings of the earth upon the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And they shall be gathered together, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' prisoners are gathered in the pit, and shall be shut up in the prison, and after many days shall they be visited. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then the moon shall be confounded, and the sun ashamed, when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' of hosts shall reign in mount Zion, and in Jerusalem, and before his ancients gloriously.'
