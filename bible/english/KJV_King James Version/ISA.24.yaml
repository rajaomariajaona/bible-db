document_id: ISA.24,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Whole World
  - type: text
    content: 'Behold, the '
  - type: text
    content: LORD
  - type: text
    content: ' maketh the earth empty, and maketh it waste, and turneth it upside down, and scattereth abroad the inhabitants thereof. '
  '10':
  - type: text
    content: 'The city of confusion is broken down: every house is shut up, that no man may come in. '
  '11':
  - type: text
    content: There is
  - type: text
    content: ' a crying for wine in the streets; all joy is darkened, the mirth of the land is gone. '
  '12':
  - type: text
    content: 'In the city is left desolation, and the gate is smitten with destruction. '
  '13':
  - type: text
    content: 'When thus it shall be in the midst of the land among the people, '
  - type: text
    content: there shall be
  - type: text
    content: ' as the shaking of an olive tree, '
  - type: text
    content: and
  - type: text
    content: ' as the gleaning grapes when the vintage is done. '
  '14':
  - type: text
    content: 'They shall lift up their voice, they shall sing for the majesty of the '
  - type: text
    content: LORD
  - type: text
    content: ', they shall cry aloud from the sea. '
  '15':
  - type: text
    content: 'Wherefore glorify ye the '
  - type: text
    content: LORD
  - type: text
    content: ' in the fires, '
  - type: text
    content: even
  - type: text
    content: ' the name of the '
  - type: text
    content: LORD
  - type: text
    content: ' God of Israel in the isles of the sea. '
  '16':
  - type: text
    content: 'From the uttermost part of the earth have we heard songs, '
  - type: text
    content: even
  - type: text
    content: ' glory to the righteous. But I said, My leanness, my leanness, woe unto me! the treacherous dealers have dealt treacherously; yea, the treacherous dealers have dealt very treacherously.'
  '17':
  - type: text
    content: 'Fear, and the pit, and the snare, '
  - type: text
    content: are
  - type: text
    content: ' upon thee, O inhabitant of the earth. '
  '18':
  - type: text
    content: 'And it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ' he who fleeth from the noise of the fear shall fall into the pit; and he that cometh up out of the midst of the pit shall be taken in the snare: for the windows from on high are open, and the foundations of the earth do shake. '
  '19':
  - type: text
    content: 'The earth is utterly broken down, the earth is clean dissolved, the earth is moved exceedingly. '
  '2':
  - type: text
    content: 'And it shall be, as with the people, so with the priest; as with the servant, so with his master; as with the maid, so with her mistress; as with the buyer, so with the seller; as with the lender, so with the borrower; as with the taker of usury, so with the giver of usury to him. '
  '20':
  - type: text
    content: The earth shall reel to and fro like a drunkard, and shall be removed like a cottage; and the transgression thereof shall be heavy upon it; and it shall fall, and not rise again.
  '21':
  - type: text
    content: 'And it shall come to pass in that day, '
  - type: text
    content: that
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' shall punish the host of the high ones '
  - type: text
    content: that are
  - type: text
    content: ' on high, and the kings of the earth upon the earth. '
  '22':
  - type: text
    content: 'And they shall be gathered together, '
  - type: text
    content: as
  - type: text
    content: ' prisoners are gathered in the pit, and shall be shut up in the prison, and after many days shall they be visited. '
  '23':
  - type: text
    content: 'Then the moon shall be confounded, and the sun ashamed, when the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts shall reign in mount Zion, and in Jerusalem, and before his ancients gloriously.'
  '3':
  - type: text
    content: 'The land shall be utterly emptied, and utterly spoiled: for the '
  - type: text
    content: LORD
  - type: text
    content: ' hath spoken this word. '
  '4':
  - type: text
    content: 'The earth mourneth '
  - type: text
    content: and
  - type: text
    content: ' fadeth away, the world languisheth '
  - type: text
    content: and
  - type: text
    content: ' fadeth away, the haughty people of the earth do languish. '
  '5':
  - type: text
    content: 'The earth also is defiled under the inhabitants thereof; because they have transgressed the laws, changed the ordinance, broken the everlasting covenant. '
  '6':
  - type: text
    content: 'Therefore hath the curse devoured the earth, and they that dwell therein are desolate: therefore the inhabitants of the earth are burned, and few men left.'
  '7':
  - type: text
    content: 'The new wine mourneth, the vine languisheth, all the merryhearted do sigh. '
  '8':
  - type: text
    content: 'The mirth of tabrets ceaseth, the noise of them that rejoice endeth, the joy of the harp ceaseth. '
  '9':
  - type: text
    content: 'They shall not drink wine with a song; strong drink shall be bitter to them that drink it. '
