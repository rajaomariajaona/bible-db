document_id: MAT.18,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus and His Disciples
  - type: text
    content: 'At the same time came the disciples unto Jesus, saying, Who is the greatest in the kingdom of heaven? '
  '10':
  - type: text
    content: Take heed that ye despise not one of these little ones; for I say unto you, That in heaven their angels do always behold the face of my Father which is in heaven.
  - type: text
    content: ' '
  '11':
  - type: text
    content: For the Son of man is come to save that which was lost.
  - type: text
    content: ' '
  '12':
  - type: text
    content: How think ye? if a man have an hundred sheep, and one of them be gone astray, doth he not leave the ninety and nine, and goeth into the mountains, and seeketh that which is gone astray?
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'And if so be that he find it, verily I say unto you, he rejoiceth more of that '
  - type: text
    content: sheep
  - type: text
    content: ', than of the ninety and nine which went not astray.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: Even so it is not the will of your Father which is in heaven, that one of these little ones should perish.
  '15':
  - type: text
    content: ' '
  - type: text
    content: 'Moreover if thy brother shall trespass against thee, go and tell him his fault between thee and him alone: if he shall hear thee, thou hast gained thy brother.'
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'But if he will not hear '
  - type: text
    content: thee, then
  - type: text
    content: ' take with thee one or two more, that in the mouth of two or three witnesses every word may be established.'
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'And if he shall neglect to hear them, tell '
  - type: text
    content: it
  - type: text
    content: ' unto the church: but if he neglect to hear the church, let him be unto thee as an heathen man and a publican.'
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Verily I say unto you, Whatsoever ye shall bind on earth shall be bound in heaven: and whatsoever ye shall loose on earth shall be loosed in heaven.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: Again I say unto you, That if two of you shall agree on earth as touching any thing that they shall ask, it shall be done for them of my Father which is in heaven.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And Jesus called a little child unto him, and set him in the midst of them, '
  '20':
  - type: text
    content: For where two or three are gathered together in my name, there am I in the midst of them.
  '21':
  - type: text
    content: 'Then came Peter to him, and said, Lord, how oft shall my brother sin against me, and I forgive him? till seven times? '
  '22':
  - type: text
    content: 'Jesus saith unto him, '
  - type: text
    content: 'I say not unto thee, Until seven times: but, Until seventy times seven.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: Therefore is the kingdom of heaven likened unto a certain king, which would take account of his servants.
  - type: text
    content: ' '
  '24':
  - type: text
    content: And when he had begun to reckon, one was brought unto him, which owed him ten thousand talents.
  - type: text
    content: ' '
  '25':
  - type: text
    content: But forasmuch as he had not to pay, his lord commanded him to be sold, and his wife, and children, and all that he had, and payment to be made.
  - type: text
    content: ' '
  '26':
  - type: text
    content: The servant therefore fell down, and worshipped him, saying, Lord, have patience with me, and I will pay thee all.
  - type: text
    content: ' '
  '27':
  - type: text
    content: Then the lord of that servant was moved with compassion, and loosed him, and forgave him the debt.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'But the same servant went out, and found one of his fellowservants, which owed him an hundred pence: and he laid hands on him, and took '
  - type: text
    content: him
  - type: text
    content: ' by the throat, saying, Pay me that thou owest.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: And his fellowservant fell down at his feet, and besought him, saying, Have patience with me, and I will pay thee all.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'and said, '
  - type: text
    content: Verily I say unto you, Except ye be converted, and become as little children, ye shall not enter into the kingdom of heaven.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'And he would not: but went and cast him into prison, till he should pay the debt.'
  - type: text
    content: ' '
  '31':
  - type: text
    content: So when his fellowservants saw what was done, they were very sorry, and came and told unto their lord all that was done.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'Then his lord, after that he had called him, said unto him, O thou wicked servant, I forgave thee all that debt, because thou desiredst me:'
  - type: text
    content: ' '
  '33':
  - type: text
    content: shouldest not thou also have had compassion on thy fellowservant, even as I had pity on thee?
  - type: text
    content: ' '
  '34':
  - type: text
    content: And his lord was wroth, and delivered him to the tormentors, till he should pay all that was due unto him.
  - type: text
    content: ' '
  '35':
  - type: text
    content: So likewise shall my heavenly Father do also unto you, if ye from your hearts forgive not every one his brother their trespasses.
  '4':
  - type: text
    content: Whosoever therefore shall humble himself as this little child, the same is greatest in the kingdom of heaven.
  - type: text
    content: ' '
  '5':
  - type: text
    content: And whoso shall receive one such little child in my name receiveth me.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'But whoso shall offend one of these little ones which believe in me, it were better for him that a millstone were hanged about his neck, and '
  - type: text
    content: that
  - type: text
    content: ' he were drowned in the depth of the sea.'
  '7':
  - type: text
    content: ' '
  - type: text
    content: Woe unto the world because of offences! for it must needs be that offences come; but woe to that man by whom the offence cometh!
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Wherefore if thy hand or thy foot offend thee, cut them off, and cast '
  - type: text
    content: them
  - type: text
    content: ' from thee: it is better for thee to enter into life halt or maimed, rather than having two hands or two feet to be cast into everlasting fire.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'And if thine eye offend thee, pluck it out, and cast '
  - type: text
    content: it
  - type: text
    content: ' from thee: it is better for thee to enter into life with one eye, rather than having two eyes to be cast into hell fire.'
  - type: text
    content: ' '
