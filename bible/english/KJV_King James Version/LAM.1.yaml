document_id: LAM.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: How doth the city sit solitary,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: That was
    - type: text
      text: ' full of people!'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: How
    - type: text
      text: ' is she become as a widow!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'She '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that was
    - type: text
      text: ' great among the nations,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' princess among the provinces,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: How
    - type: text
      text: ' is she become tributary!'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The adversary hath spread out his hand
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Upon all her pleasant things:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For she hath seen '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' the heathen'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Entered into her sanctuary,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whom thou didst command
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: That
    - type: text
      text: ' they should not enter into thy congregation.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: All her people sigh,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They seek bread;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have given their pleasant things
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For meat to relieve the soul:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'See, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and consider;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For I am become vile.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is it
    - type: text
      text: ' nothing to you,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All ye that pass by?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold, and see if there be any sorrow
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like unto my sorrow, which is done unto me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Wherewith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath afflicted'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Me
    - type: text
      text: ' in the day of his fierce anger.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: From above hath he sent fire into my bones,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And it prevaileth against them:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He hath spread a net for my feet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He hath turned me back:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He hath made me desolate
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' faint all the day.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The yoke of my transgressions is bound
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'By his hand:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They are wreathed, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' come up upon my neck:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He hath made my strength to fall,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Lord hath delivered me into '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' hands,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: From whom
    - type: text
      text: ' I am not able to rise up.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The Lord hath trodden under foot all my mighty '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In the midst of me:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He hath called an assembly against me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To crush my young men:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord hath trodden the virgin,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The daughter of Judah, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' in a winepress.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'For these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' I weep;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Mine eye, mine eye runneth down with water,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because the comforter that should relieve my
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Soul is far from me:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My children are desolate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because the enemy prevailed.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Zion spreadeth forth her hands,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And there is
    - type: text
      text: ' none to comfort her:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath commanded concerning Jacob,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: That
    - type: text
      text: ' his adversaries '
    - type: usfm
      marker: add
      children:
      - type: text
        text: should be
    - type: text
      text: ' round about him:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jerusalem is as
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A menstruous woman among them.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' is righteous;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For I have rebelled against his commandment:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear, I pray you, all people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And behold my sorrow:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My virgins and my young men
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Are gone into captivity.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: I called for my lovers,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: But
    - type: text
      text: ' they deceived me:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My priests and mine elders
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Gave up the ghost in the city,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: While they sought their meat
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To relieve their souls.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: She weepeth sore in the night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And her tears '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' on her cheeks:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Among all her lovers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'She hath none to comfort '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'her:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All her friends have dealt treacherously with her,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are become her enemies.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Behold, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; for I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' in distress:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My bowels are troubled;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mine heart is turned within me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For I have grievously rebelled:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Abroad the sword bereaveth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'At home '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' as death.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'They have heard that I sigh:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: There is
    - type: text
      text: ' none to comfort me:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All mine enemies have heard of my trouble;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They are glad that thou hast done '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'it:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou wilt bring the day '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' thou hast called,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they shall be like unto me.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Let all their wickedness come before thee;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And do unto them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As thou hast done unto me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For all my transgressions:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For my sighs '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' many,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And my heart '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' faint.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Judah is gone into captivity because of affliction,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And because of great servitude:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She dwelleth among the heathen,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'She findeth no rest:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All her persecutors overtook her
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Between the straits.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The ways of Zion do mourn,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Because none come to the solemn feasts:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All her gates are desolate:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Her priests sigh,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her virgins are afflicted,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And she '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in bitterness.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Her adversaries are the chief,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Her enemies prosper;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath afflicted her'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the multitude of her transgressions:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her children are gone
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Into captivity before the enemy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: And from the daughter of Zion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'All her beauty is departed:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her princes are become like harts
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: That
    - type: text
      text: ' find no pasture,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they are gone without strength
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Before the pursuer.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Jerusalem remembered
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the days of her affliction and of her miseries
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All her pleasant things
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That she had in the days of old,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When her people fell into the hand of the enemy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And none did help her:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The adversaries saw her,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' did mock at her sabbaths.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Jerusalem hath grievously sinned;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Therefore she is removed:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All that honoured her despise her,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Because they have seen her nakedness:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yea, she sigheth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And turneth backward.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Her filthiness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in her skirts;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She remembereth not her last end;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Therefore she came down wonderfully:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She had no comforter.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', behold my affliction:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the enemy hath magnified '
    - type: usfm
      marker: add
      children:
      - type: text
        text: himself
    - type: text
      text: .
