document_id: LAM.1,1
type_code: eng
verses:
  '1':
  - type: text
    content: How doth the city sit solitary,
  - type: text
    content: That was
  - type: text
    content: ' full of people!'
  - type: text
    content: How
  - type: text
    content: ' is she become as a widow!'
  - type: text
    content: 'She '
  - type: text
    content: that was
  - type: text
    content: ' great among the nations,'
  - type: text
    content: And
  - type: text
    content: ' princess among the provinces,'
  - type: text
    content: How
  - type: text
    content: ' is she become tributary!'
  '10':
  - type: text
    content: The adversary hath spread out his hand
  - type: text
    content: 'Upon all her pleasant things:'
  - type: text
    content: 'For she hath seen '
  - type: text
    content: that
  - type: text
    content: ' the heathen'
  - type: text
    content: Entered into her sanctuary,
  - type: text
    content: Whom thou didst command
  - type: text
    content: That
  - type: text
    content: ' they should not enter into thy congregation.'
  '11':
  - type: text
    content: All her people sigh,
  - type: text
    content: They seek bread;
  - type: text
    content: They have given their pleasant things
  - type: text
    content: 'For meat to relieve the soul:'
  - type: text
    content: 'See, O '
  - type: text
    content: LORD
  - type: text
    content: ', and consider;'
  - type: text
    content: For I am become vile.
  '12':
  - type: text
    content: ' '
  - type: text
    content: Is it
  - type: text
    content: ' nothing to you,'
  - type: text
    content: All ye that pass by?
  - type: text
    content: Behold, and see if there be any sorrow
  - type: text
    content: Like unto my sorrow, which is done unto me,
  - type: text
    content: 'Wherewith the '
  - type: text
    content: LORD
  - type: text
    content: ' hath afflicted'
  - type: text
    content: Me
  - type: text
    content: ' in the day of his fierce anger.'
  '13':
  - type: text
    content: From above hath he sent fire into my bones,
  - type: text
    content: 'And it prevaileth against them:'
  - type: text
    content: He hath spread a net for my feet,
  - type: text
    content: 'He hath turned me back:'
  - type: text
    content: He hath made me desolate
  - type: text
    content: And
  - type: text
    content: ' faint all the day.'
  '14':
  - type: text
    content: The yoke of my transgressions is bound
  - type: text
    content: 'By his hand:'
  - type: text
    content: 'They are wreathed, '
  - type: text
    content: and
  - type: text
    content: ' come up upon my neck:'
  - type: text
    content: He hath made my strength to fall,
  - type: text
    content: 'The Lord hath delivered me into '
  - type: text
    content: their
  - type: text
    content: ' hands,'
  - type: text
    content: From whom
  - type: text
    content: ' I am not able to rise up.'
  '15':
  - type: text
    content: 'The Lord hath trodden under foot all my mighty '
  - type: text
    content: men
  - type: text
    content: 'In the midst of me:'
  - type: text
    content: He hath called an assembly against me
  - type: text
    content: 'To crush my young men:'
  - type: text
    content: The Lord hath trodden the virgin,
  - type: text
    content: 'The daughter of Judah, '
  - type: text
    content: as
  - type: text
    content: ' in a winepress.'
  '16':
  - type: text
    content: 'For these '
  - type: text
    content: things
  - type: text
    content: ' I weep;'
  - type: text
    content: Mine eye, mine eye runneth down with water,
  - type: text
    content: Because the comforter that should relieve my
  - type: text
    content: 'Soul is far from me:'
  - type: text
    content: My children are desolate,
  - type: text
    content: Because the enemy prevailed.
  '17':
  - type: text
    content: Zion spreadeth forth her hands,
  - type: text
    content: And there is
  - type: text
    content: ' none to comfort her:'
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' hath commanded concerning Jacob,'
  - type: text
    content: That
  - type: text
    content: ' his adversaries '
  - type: text
    content: should be
  - type: text
    content: ' round about him:'
  - type: text
    content: Jerusalem is as
  - type: text
    content: A menstruous woman among them.
  '18':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' is righteous;'
  - type: text
    content: 'For I have rebelled against his commandment:'
  - type: text
    content: Hear, I pray you, all people,
  - type: text
    content: 'And behold my sorrow:'
  - type: text
    content: My virgins and my young men
  - type: text
    content: Are gone into captivity.
  '19':
  - type: text
    content: I called for my lovers,
  - type: text
    content: But
  - type: text
    content: ' they deceived me:'
  - type: text
    content: My priests and mine elders
  - type: text
    content: Gave up the ghost in the city,
  - type: text
    content: While they sought their meat
  - type: text
    content: To relieve their souls.
  '2':
  - type: text
    content: She weepeth sore in the night,
  - type: text
    content: 'And her tears '
  - type: text
    content: are
  - type: text
    content: ' on her cheeks:'
  - type: text
    content: Among all her lovers
  - type: text
    content: 'She hath none to comfort '
  - type: text
    content: 'her:'
  - type: text
    content: All her friends have dealt treacherously with her,
  - type: text
    content: They are become her enemies.
  '20':
  - type: text
    content: 'Behold, O '
  - type: text
    content: LORD
  - type: text
    content: '; for I '
  - type: text
    content: am
  - type: text
    content: ' in distress:'
  - type: text
    content: My bowels are troubled;
  - type: text
    content: Mine heart is turned within me;
  - type: text
    content: 'For I have grievously rebelled:'
  - type: text
    content: Abroad the sword bereaveth,
  - type: text
    content: 'At home '
  - type: text
    content: there is
  - type: text
    content: ' as death.'
  '21':
  - type: text
    content: 'They have heard that I sigh:'
  - type: text
    content: There is
  - type: text
    content: ' none to comfort me:'
  - type: text
    content: All mine enemies have heard of my trouble;
  - type: text
    content: 'They are glad that thou hast done '
  - type: text
    content: 'it:'
  - type: text
    content: 'Thou wilt bring the day '
  - type: text
    content: that
  - type: text
    content: ' thou hast called,'
  - type: text
    content: And they shall be like unto me.
  '22':
  - type: text
    content: Let all their wickedness come before thee;
  - type: text
    content: And do unto them,
  - type: text
    content: As thou hast done unto me
  - type: text
    content: 'For all my transgressions:'
  - type: text
    content: 'For my sighs '
  - type: text
    content: are
  - type: text
    content: ' many,'
  - type: text
    content: 'And my heart '
  - type: text
    content: is
  - type: text
    content: ' faint.'
  '3':
  - type: text
    content: Judah is gone into captivity because of affliction,
  - type: text
    content: 'And because of great servitude:'
  - type: text
    content: She dwelleth among the heathen,
  - type: text
    content: 'She findeth no rest:'
  - type: text
    content: All her persecutors overtook her
  - type: text
    content: Between the straits.
  '4':
  - type: text
    content: The ways of Zion do mourn,
  - type: text
    content: 'Because none come to the solemn feasts:'
  - type: text
    content: 'All her gates are desolate:'
  - type: text
    content: Her priests sigh,
  - type: text
    content: Her virgins are afflicted,
  - type: text
    content: 'And she '
  - type: text
    content: is
  - type: text
    content: ' in bitterness.'
  '5':
  - type: text
    content: Her adversaries are the chief,
  - type: text
    content: Her enemies prosper;
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ' hath afflicted her'
  - type: text
    content: 'For the multitude of her transgressions:'
  - type: text
    content: Her children are gone
  - type: text
    content: Into captivity before the enemy.
  '6':
  - type: text
    content: And from the daughter of Zion
  - type: text
    content: 'All her beauty is departed:'
  - type: text
    content: Her princes are become like harts
  - type: text
    content: That
  - type: text
    content: ' find no pasture,'
  - type: text
    content: And they are gone without strength
  - type: text
    content: Before the pursuer.
  '7':
  - type: text
    content: Jerusalem remembered
  - type: text
    content: In the days of her affliction and of her miseries
  - type: text
    content: All her pleasant things
  - type: text
    content: That she had in the days of old,
  - type: text
    content: When her people fell into the hand of the enemy,
  - type: text
    content: 'And none did help her:'
  - type: text
    content: The adversaries saw her,
  - type: text
    content: And
  - type: text
    content: ' did mock at her sabbaths.'
  '8':
  - type: text
    content: Jerusalem hath grievously sinned;
  - type: text
    content: 'Therefore she is removed:'
  - type: text
    content: All that honoured her despise her,
  - type: text
    content: 'Because they have seen her nakedness:'
  - type: text
    content: Yea, she sigheth,
  - type: text
    content: And turneth backward.
  '9':
  - type: text
    content: 'Her filthiness '
  - type: text
    content: is
  - type: text
    content: ' in her skirts;'
  - type: text
    content: She remembereth not her last end;
  - type: text
    content: 'Therefore she came down wonderfully:'
  - type: text
    content: She had no comforter.
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ', behold my affliction:'
  - type: text
    content: 'For the enemy hath magnified '
  - type: text
    content: himself
  - type: text
    content: .
