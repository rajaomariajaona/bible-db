document_id: 1SA.14,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jonathan's Exploit
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it came to pass upon a day, that Jonathan the son of Saul said unto the young man that bare his armour, Come, and let us go over to the Philistines'' garrison, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' on the other side. But he told not his father. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if they say thus, Come up unto us; then we will go up: for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath delivered them into our hand: and this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' a sign unto us. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And both of them discovered themselves unto the garrison of the Philistines: and the Philistines said, Behold, the Hebrews come forth out of the holes where they had hid themselves. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the men of the garrison answered Jonathan and his armourbearer, and said, Come up to us, and we will shew you a thing. And Jonathan said unto his armourbearer, Come up after me: for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath delivered them into the hand of Israel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jonathan climbed up upon his hands and upon his feet, and his armourbearer after him: and they fell before Jonathan; and his armourbearer slew after him. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And that first slaughter, which Jonathan and his armourbearer made, was about twenty men, within as it were an half acre of land, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' a yoke '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of oxen might plow
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there was trembling in the host, in the field, and among all the people: the garrison, and the spoilers, they also trembled, and the earth quaked: so it was a very great trembling. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the watchmen of Saul in Gibeah of Benjamin looked; and, behold, the multitude melted away, and they went on beating down '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one another
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said Saul unto the people that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with him, Number now, and see who is gone from us. And when they had numbered, behold, Jonathan and his armourbearer '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Saul said unto Ahiah, Bring hither the ark of God. For the ark of God was at that time with the children of Israel. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, while Saul talked unto the priest, that the noise that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in the host of the Philistines went on and increased: and Saul said unto the priest, Withdraw thine hand. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Saul tarried in the uttermost part of Gibeah under a pomegranate tree which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in Migron: and the people that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' about six hundred men; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Saul and all the people that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with him assembled themselves, and they came to the battle: and, behold, every man''s sword was against his fellow, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and there was
    - type: text
      text: ' a very great discomfiture. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover the Hebrews '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' were with the Philistines before that time, which went up with them into the camp '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from the country
    - type: text
      text: ' round about, even they also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: turned
    - type: text
      text: ' to be with the Israelites that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with Saul and Jonathan. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Likewise all the men of Israel which had hid themselves in mount Ephraim, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: when
    - type: text
      text: ' they heard that the Philistines fled, even they also followed hard after them in the battle. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' saved Israel that day: and the battle passed over unto Beth-aven.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the men of Israel were distressed that day: for Saul had adjured the people, saying, Cursed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' the man that eateth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' food until evening, that I may be avenged on mine enemies. So none of the people tasted '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' food. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they of
    - type: text
      text: ' the land came to a wood; and there was honey upon the ground. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the people were come into the wood, behold, the honey dropped; but no man put his hand to his mouth: for the people feared the oath. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jonathan heard not when his father charged the people with the oath: wherefore he put forth the end of the rod that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in his hand, and dipped it in an honeycomb, and put his hand to his mouth; and his eyes were enlightened. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then answered one of the people, and said, Thy father straitly charged the people with an oath, saying, Cursed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' the man that eateth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' food this day. And the people were faint. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said Jonathan, My father hath troubled the land: see, I pray you, how mine eyes have been enlightened, because I tasted a little of this honey. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Ahiah, the son of Ahitub, I-chabod''s brother, the son of Phinehas, the son of Eli, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '''s priest in Shiloh, wearing an ephod. And the people knew not that Jonathan was gone. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: How much more, if haply the people had eaten freely to day of the spoil of their enemies which they found? for had there not been now a much greater slaughter among the Philistines?
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they smote the Philistines that day from Michmash to Aijalon: and the people were very faint. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people flew upon the spoil, and took sheep, and oxen, and calves, and slew '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' on the ground: and the people did eat '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' with the blood. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they told Saul, saying, Behold, the people sin against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', in that they eat with the blood. And he said, Ye have transgressed: roll a great stone unto me this day. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Saul said, Disperse yourselves among the people, and say unto them, Bring me hither every man his ox, and every man his sheep, and slay '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' here, and eat; and sin not against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in eating with the blood. And all the people brought every man his ox with him that night, and slew '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' there. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Saul built an altar unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': the same was the first altar that he built unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Saul said, Let us go down after the Philistines by night, and spoil them until the morning light, and let us not leave a man of them. And they said, Do whatsoever seemeth good unto thee. Then said the priest, Let us draw near hither unto God. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Saul asked counsel of God, Shall I go down after the Philistines? wilt thou deliver them into the hand of Israel? But he answered him not that day. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Saul said, Draw ye near hither, all the chief of the people: and know and see wherein this sin hath been this day. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' liveth, which saveth Israel, though it be in Jonathan my son, he shall surely die. But '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' not a man among all the people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' answered him. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And between the passages, by which Jonathan sought to go over unto the Philistines'' garrison, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there was
    - type: text
      text: ' a sharp rock on the one side, and a sharp rock on the other side: and the name of the one '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Bozez, and the name of the other Seneh. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said he unto all Israel, Be ye on one side, and I and Jonathan my son will be on the other side. And the people said unto Saul, Do what seemeth good unto thee. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore Saul said unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of Israel, Give a perfect '
    - type: usfm
      marker: add
      children:
      - type: text
        text: lot
    - type: text
      text: '. And Saul and Jonathan were taken: but the people escaped. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Saul said, Cast '
    - type: usfm
      marker: add
      children:
      - type: text
        text: lots
    - type: text
      text: ' between me and Jonathan my son. And Jonathan was taken.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Saul said to Jonathan, Tell me what thou hast done. And Jonathan told him, and said, I did but taste a little honey with the end of the rod that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in mine hand, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ', lo, I must die. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Saul answered, God do so and more also: for thou shalt surely die, Jonathan. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people said unto Saul, Shall Jonathan die, who hath wrought this great salvation in Israel? God forbid: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' liveth, there shall not one hair of his head fall to the ground; for he hath wrought with God this day. So the people rescued Jonathan, that he died not. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Saul went up from following the Philistines: and the Philistines went to their own place.'
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Saul took the kingdom over Israel, and fought against all his enemies on every side, against Moab, and against the children of Ammon, and against Edom, and against the kings of Zobah, and against the Philistines: and whithersoever he turned himself, he vexed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: '. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he gathered an host, and smote the Amalekites, and delivered Israel out of the hands of them that spoiled them.
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the sons of Saul were Jonathan, and Ishui, and Melchi-shua: and the names of his two daughters '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were these
    - type: text
      text: '; the name of the firstborn Merab, and the name of the younger Michal: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The forefront of the one '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' situate northward over against Michmash, and the other southward over against Gibeah.'
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the name of Saul''s wife '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Ahinoam, the daughter of Ahimaaz: and the name of the captain of his host '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Abner, the son of Ner, Saul''s uncle. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Kish '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the father of Saul; and Ner the father of Abner '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the son of Abiel.'
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there was sore war against the Philistines all the days of Saul: and when Saul saw any strong man, or any valiant man, he took him unto him.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jonathan said to the young man that bare his armour, Come, and let us go over unto the garrison of these uncircumcised: it may be that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will work for us: for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no restraint to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' to save by many or by few. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And his armourbearer said unto him, Do all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in thine heart: turn thee; behold, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' with thee according to thy heart. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said Jonathan, Behold, we will pass over unto '
    - type: usfm
      marker: add
      children:
      - type: text
        text: these
    - type: text
      text: ' men, and we will discover ourselves unto them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If they say thus unto us, Tarry until we come to you; then we will stand still in our place, and will not go up unto them. '
