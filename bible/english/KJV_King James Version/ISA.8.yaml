document_id: ISA.8,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Moreover the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto me, Take thee a great roll, and write in it with a man''s pen concerning Mahershalalhashbaz. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Take counsel together, and it shall come to nought; speak the word, and it shall not stand: for God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' with us.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake thus to me with a strong hand, and instructed me that I should not walk in the way of this people, saying, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Say ye not, A confederacy, to all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them to
    - type: text
      text: ' whom this people shall say, A confederacy; neither fear ye their fear, nor be afraid. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Sanctify the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts himself; and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: let
    - type: text
      text: ' him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' your fear, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: let
    - type: text
      text: ' him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' your dread. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And he shall be for a sanctuary; but for a stone of stumbling and for a rock of offence to both the houses of Israel, for a gin and for a snare to the inhabitants of Jerusalem. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: And many among them shall stumble, and fall, and be broken, and be snared, and be taken.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Bind up the testimony, seal the law among my disciples. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And I will wait upon the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', that hideth his face from the house of Jacob, and I will look for him. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Behold, I and the children whom the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath given me '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' for signs and for wonders in Israel from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, which dwelleth in mount Zion.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And when they shall say unto you, Seek unto them that have familiar spirits, and unto wizards that peep, and that mutter: should not a people seek unto their God? for the living to the dead? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And I took unto me faithful witnesses to record, Uriah the priest, and Zechariah the son of Jeberechiah. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'To the law and to the testimony: if they speak not according to this word, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' because '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' no light in them. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And they shall pass through it, hardly bestead and hungry: and it shall come to pass, that when they shall be hungry, they shall fret themselves, and curse their king and their God, and look upward. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And they shall look unto the earth; and behold trouble and darkness, dimness of anguish; and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they shall be
    - type: text
      text: ' driven to darkness.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And I went unto the prophetess; and she conceived, and bare a son. Then said the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' to me, Call his name Mahershalalhashbaz. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: For before the child shall have knowledge to cry, My father, and my mother, the riches of Damascus and the spoil of Samaria shall be taken away before the king of Assyria.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake also unto me again, saying, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Forasmuch as this people refuseth the waters of Shiloah that go softly, and rejoice in Rezin and Remaliah''s son; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'now therefore, behold, the Lord bringeth up upon them the waters of the river, strong and many, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the king of Assyria, and all his glory: and he shall come up over all his channels, and go over all his banks: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'and he shall pass through Judah; he shall overflow and go over, he shall reach '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' to the neck; and the stretching out of his wings shall fill the breadth of thy land, O Immanuel.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Associate yourselves, O ye people, and ye shall be broken in pieces; and give ear, all ye of far countries: gird yourselves, and ye shall be broken in pieces; gird yourselves, and ye shall be broken in pieces. '
