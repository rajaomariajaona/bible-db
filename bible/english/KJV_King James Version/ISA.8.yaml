  '1':
  - type: text
    content: 'Moreover the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto me, Take thee a great roll, and write in it with a man''s pen concerning Mahershalalhashbaz. '
  '10':
  - type: text
    content: 'Take counsel together, and it shall come to nought; speak the word, and it shall not stand: for God '
  - type: text
    content: is
  - type: text
    content: ' with us.'
  '11':
  - type: text
    content: 'For the '
  - type: text
    content: LORD
  - type: text
    content: ' spake thus to me with a strong hand, and instructed me that I should not walk in the way of this people, saying, '
  '12':
  - type: text
    content: 'Say ye not, A confederacy, to all '
  - type: text
    content: them to
  - type: text
    content: ' whom this people shall say, A confederacy; neither fear ye their fear, nor be afraid. '
  '13':
  - type: text
    content: 'Sanctify the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts himself; and '
  - type: text
    content: let
  - type: text
    content: ' him '
  - type: text
    content: be
  - type: text
    content: ' your fear, and '
  - type: text
    content: let
  - type: text
    content: ' him '
  - type: text
    content: be
  - type: text
    content: ' your dread. '
  '14':
  - type: text
    content: 'And he shall be for a sanctuary; but for a stone of stumbling and for a rock of offence to both the houses of Israel, for a gin and for a snare to the inhabitants of Jerusalem. '
  '15':
  - type: text
    content: And many among them shall stumble, and fall, and be broken, and be snared, and be taken.
  '16':
  - type: text
    content: 'Bind up the testimony, seal the law among my disciples. '
  '17':
  - type: text
    content: 'And I will wait upon the '
  - type: text
    content: LORD
  - type: text
    content: ', that hideth his face from the house of Jacob, and I will look for him. '
  '18':
  - type: text
    content: 'Behold, I and the children whom the '
  - type: text
    content: LORD
  - type: text
    content: ' hath given me '
  - type: text
    content: are
  - type: text
    content: ' for signs and for wonders in Israel from the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, which dwelleth in mount Zion.'
  '19':
  - type: text
    content: 'And when they shall say unto you, Seek unto them that have familiar spirits, and unto wizards that peep, and that mutter: should not a people seek unto their God? for the living to the dead? '
  '2':
  - type: text
    content: 'And I took unto me faithful witnesses to record, Uriah the priest, and Zechariah the son of Jeberechiah. '
  '20':
  - type: text
    content: 'To the law and to the testimony: if they speak not according to this word, '
  - type: text
    content: it is
  - type: text
    content: ' because '
  - type: text
    content: there is
  - type: text
    content: ' no light in them. '
  '21':
  - type: text
    content: 'And they shall pass through it, hardly bestead and hungry: and it shall come to pass, that when they shall be hungry, they shall fret themselves, and curse their king and their God, and look upward. '
  '22':
  - type: text
    content: 'And they shall look unto the earth; and behold trouble and darkness, dimness of anguish; and '
  - type: text
    content: they shall be
  - type: text
    content: ' driven to darkness.'
  '3':
  - type: text
    content: 'And I went unto the prophetess; and she conceived, and bare a son. Then said the '
  - type: text
    content: LORD
  - type: text
    content: ' to me, Call his name Mahershalalhashbaz. '
  '4':
  - type: text
    content: For before the child shall have knowledge to cry, My father, and my mother, the riches of Damascus and the spoil of Samaria shall be taken away before the king of Assyria.
  '5':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' spake also unto me again, saying, '
  '6':
  - type: text
    content: 'Forasmuch as this people refuseth the waters of Shiloah that go softly, and rejoice in Rezin and Remaliah''s son; '
  '7':
  - type: text
    content: 'now therefore, behold, the Lord bringeth up upon them the waters of the river, strong and many, '
  - type: text
    content: even
  - type: text
    content: ' the king of Assyria, and all his glory: and he shall come up over all his channels, and go over all his banks: '
  '8':
  - type: text
    content: 'and he shall pass through Judah; he shall overflow and go over, he shall reach '
  - type: text
    content: even
  - type: text
    content: ' to the neck; and the stretching out of his wings shall fill the breadth of thy land, O Immanuel.'
  '9':
  - type: text
    content: 'Associate yourselves, O ye people, and ye shall be broken in pieces; and give ear, all ye of far countries: gird yourselves, and ye shall be broken in pieces; gird yourselves, and ye shall be broken in pieces. '
