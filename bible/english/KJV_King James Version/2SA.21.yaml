    content: Famine
  - type: text
    content: 'Then there was a famine in the days of David three years, year after year; and David enquired of the '
  - type: text
    content: LORD
  - type: text
    content: '. And the '
  - type: text
    content: LORD
  - type: text
    content: ' answered, '
  - type: text
    content: It is
  - type: text
    content: ' for Saul, and for '
  - type: text
    content: his
  - type: text
    content: ' bloody house, because he slew the Gibeonites. '
  '10':
  - type: text
    content: 'And Rizpah the daughter of Aiah took sackcloth, and spread it for her upon the rock, from the beginning of harvest until water dropped upon them out of heaven, and suffered neither the birds of the air to rest on them by day, nor the beasts of the field by night. '
  '11':
  - type: text
    content: And it was told David what Rizpah the daughter of Aiah, the concubine of Saul, had done.
  '12':
  - type: text
    content: 'And David went and took the bones of Saul and the bones of Jonathan his son from the men of Jabesh-gilead, which had stolen them from the street of Beth-shan, where the Philistines had hanged them, when the Philistines had slain Saul in Gilboa: '
  '13':
  - type: text
    content: 'and he brought up from thence the bones of Saul and the bones of Jonathan his son; and they gathered the bones of them that were hanged. '
  '14':
  - type: text
    content: 'And the bones of Saul and Jonathan his son buried they in the country of Benjamin in Zelah, in the sepulchre of Kish his father: and they performed all that the king commanded. And after that God was intreated for the land.'
  '15':
  - type: text
    content: 'Moreover the Philistines had yet war again with Israel; and David went down, and his servants with him, and fought against the Philistines: and David waxed faint. '
  '16':
  - type: text
    content: 'And Ishbi-benob, which '
  - type: text
    content: was
  - type: text
    content: ' of the sons of the giant, the weight of whose spear '
  - type: text
    content: weighed
  - type: text
    content: ' three hundred '
  - type: text
    content: shekels
  - type: text
    content: ' of brass in weight, he being girded with a new '
  - type: text
    content: sword
  - type: text
    content: ', thought to have slain David. '
  '17':
  - type: text
    content: But Abishai the son of Zeruiah succoured him, and smote the Philistine, and killed him. Then the men of David sware unto him, saying, Thou shalt go no more out with us to battle, that thou quench not the light of Israel.
  '18':
  - type: text
    content: 'And it came to pass after this, that there was again a battle with the Philistines at Gob: then Sibbechai the Hushathite slew Saph, which '
  - type: text
    content: was
  - type: text
    content: ' of the sons of the giant. '
  '19':
  - type: text
    content: 'And there was again a battle in Gob with the Philistines, where Elhanan the son of Jaare-oregim, a Beth-lehemite, slew '
  - type: text
    content: the brother of
  - type: text
    content: ' Goliath the Gittite, the staff of whose spear '
  - type: text
    content: was
  - type: text
    content: ' like a weaver''s beam. '
  '2':
  - type: text
    content: 'And the king called the Gibeonites, and said unto them; (now the Gibeonites '
  - type: text
    content: were
  - type: text
    content: ' not of the children of Israel, but of the remnant of the Amorites; and the children of Israel had sworn unto them: and Saul sought to slay them in his zeal to the children of Israel and Judah.) '
  '20':
  - type: text
    content: 'And there was yet a battle in Gath, where was a man of '
  - type: text
    content: great
  - type: text
    content: ' stature, that had on every hand six fingers, and on every foot six toes, four and twenty in number; and he also was born to the giant. '
  '21':
  - type: text
    content: 'And when he defied Israel, Jonathan the son of Shimeah the brother of David slew him. '
  '22':
  - type: text
    content: These four were born to the giant in Gath, and fell by the hand of David, and by the hand of his servants.
  '3':
  - type: text
    content: 'Wherefore David said unto the Gibeonites, What shall I do for you? and wherewith shall I make the atonement, that ye may bless the inheritance of the '
  - type: text
    content: LORD
  - type: text
    content: '? '
  '4':
  - type: text
    content: 'And the Gibeonites said unto him, We will have no silver nor gold of Saul, nor of his house; neither for us shalt thou kill any man in Israel. And he said, What ye shall say, '
  - type: text
    content: that
  - type: text
    content: ' will I do for you. '
  '5':
