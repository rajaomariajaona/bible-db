document_id: 2SA.21,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Famine
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then there was a famine in the days of David three years, year after year; and David enquired of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' answered, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' for Saul, and for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' bloody house, because he slew the Gibeonites. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Rizpah the daughter of Aiah took sackcloth, and spread it for her upon the rock, from the beginning of harvest until water dropped upon them out of heaven, and suffered neither the birds of the air to rest on them by day, nor the beasts of the field by night. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And it was told David what Rizpah the daughter of Aiah, the concubine of Saul, had done.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David went and took the bones of Saul and the bones of Jonathan his son from the men of Jabesh-gilead, which had stolen them from the street of Beth-shan, where the Philistines had hanged them, when the Philistines had slain Saul in Gilboa: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he brought up from thence the bones of Saul and the bones of Jonathan his son; and they gathered the bones of them that were hanged. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the bones of Saul and Jonathan his son buried they in the country of Benjamin in Zelah, in the sepulchre of Kish his father: and they performed all that the king commanded. And after that God was intreated for the land.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover the Philistines had yet war again with Israel; and David went down, and his servants with him, and fought against the Philistines: and David waxed faint. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Ishbi-benob, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' of the sons of the giant, the weight of whose spear '
    - type: usfm
      marker: add
      children:
      - type: text
        text: weighed
    - type: text
      text: ' three hundred '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shekels
    - type: text
      text: ' of brass in weight, he being girded with a new '
    - type: usfm
      marker: add
      children:
      - type: text
        text: sword
    - type: text
      text: ', thought to have slain David. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Abishai the son of Zeruiah succoured him, and smote the Philistine, and killed him. Then the men of David sware unto him, saying, Thou shalt go no more out with us to battle, that thou quench not the light of Israel.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass after this, that there was again a battle with the Philistines at Gob: then Sibbechai the Hushathite slew Saph, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' of the sons of the giant. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there was again a battle in Gob with the Philistines, where Elhanan the son of Jaare-oregim, a Beth-lehemite, slew '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the brother of
    - type: text
      text: ' Goliath the Gittite, the staff of whose spear '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' like a weaver''s beam. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king called the Gibeonites, and said unto them; (now the Gibeonites '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' not of the children of Israel, but of the remnant of the Amorites; and the children of Israel had sworn unto them: and Saul sought to slay them in his zeal to the children of Israel and Judah.) '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there was yet a battle in Gath, where was a man of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: great
    - type: text
      text: ' stature, that had on every hand six fingers, and on every foot six toes, four and twenty in number; and he also was born to the giant. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he defied Israel, Jonathan the son of Shimeah the brother of David slew him. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These four were born to the giant in Gath, and fell by the hand of David, and by the hand of his servants.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wherefore David said unto the Gibeonites, What shall I do for you? and wherewith shall I make the atonement, that ye may bless the inheritance of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the Gibeonites said unto him, We will have no silver nor gold of Saul, nor of his house; neither for us shalt thou kill any man in Israel. And he said, What ye shall say, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' will I do for you. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they answered the king, The man that consumed us, and that devised against us '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' we should be destroyed from remaining in any of the coasts of Israel, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'let seven men of his sons be delivered unto us, and we will hang them up unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in Gibeah of Saul, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whom
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' did choose. And the king said, I will give '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the king spared Mephibosheth, the son of Jonathan the son of Saul, because of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '''s oath that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' between them, between David and Jonathan the son of Saul. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the king took the two sons of Rizpah the daughter of Aiah, whom she bare unto Saul, Armoni and Mephibosheth; and the five sons of Michal the daughter of Saul, whom she brought up for Adriel the son of Barzillai the Meholathite: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he delivered them into the hands of the Gibeonites, and they hanged them in the hill before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': and they fell '
    - type: usfm
      marker: add
      children:
      - type: text
        text: all
    - type: text
      text: ' seven together, and were put to death in the days of harvest, in the first '
    - type: usfm
      marker: add
      children:
      - type: text
        text: days
    - type: text
      text: ', in the beginning of barley harvest.'
