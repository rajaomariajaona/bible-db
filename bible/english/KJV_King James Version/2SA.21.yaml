  - type: text
    content: .
  '7':
  - type: text
    content: 'But the king spared Mephibosheth, the son of Jonathan the son of Saul, because of the '
  - type: text
    content: LORD
  - type: text
    content: '''s oath that '
  - type: text
    content: was
  - type: text
