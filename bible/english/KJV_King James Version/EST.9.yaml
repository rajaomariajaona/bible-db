verses:
  '1':
  - type: text
    content: 'Now in the twelfth month, that '
  - type: text
    content: is
  - type: text
    content: ', the month Adar, on the thirteenth day of the same, when the king''s commandment and his decree drew near to be put in execution, in the day that the enemies of the Jews hoped to have power over them, (though it was turned to the contrary, that the Jews had rule over them that hated them;) '
  '10':
  - type: text
    content: the ten sons of Haman the son of Hammedatha, the enemy of the Jews, slew they; but on the spoil laid they not their hand.
  '11':
  - type: text
    content: 'On that day the number of those that were slain in Shushan the palace was brought before the king. '
  '12':
  - type: text
    content: 'And the king said unto Esther the queen, The Jews have slain and destroyed five hundred men in Shushan the palace, and the ten sons of Haman; what have they done in the rest of the king''s provinces? now what '
  - type: text
    content: is
  - type: text
    content: ' thy petition? and it shall be granted thee: or what '
  - type: text
    content: is
  - type: text
    content: ' thy request further? and it shall be done. '
  '13':
  - type: text
    content: 'Then said Esther, If it please the king, let it be granted to the Jews which '
  - type: text
    content: are
  - type: text
    content: ' in Shushan to do to morrow also according unto this day''s decree, and let Haman''s ten sons be hanged upon the gallows. '
  '14':
  - type: text
    content: 'And the king commanded it so to be done: and the decree was given at Shushan; and they hanged Haman''s ten sons. '
  '15':
  - type: text
    content: 'For the Jews that '
  - type: text
    content: were
  - type: text
    content: ' in Shushan gathered themselves together on the fourteenth day also of the month Adar, and slew three hundred men at Shushan; but on the prey they laid not their hand. '
  '16':
  - type: text
    content: 'But the other Jews that '
  - type: text
    content: were
  - type: text
    content: ' in the king''s provinces gathered themselves together, and stood for their lives, and had rest from their enemies, and slew of their foes seventy and five thousand, but they laid not their hands on the prey, '
  '17':
  - type: text
    content: 'on the thirteenth day of the month Adar; and on the fourteenth day of the same rested they, and made it a day of feasting and gladness. '
  '18':
  - type: text
    content: 'But the Jews that '
  - type: text
    content: were
  - type: text
    content: ' at Shushan assembled together on the thirteenth '
  - type: text
    content: day
  - type: text
    content: ' thereof, and on the fourteenth thereof; and on the fifteenth '
  - type: text
    content: day
  - type: text
    content: ' of the same they rested, and made it a day of feasting and gladness. '
  '19':
  - type: text
    content: 'Therefore the Jews of the villages, that dwelt in the unwalled towns, made the fourteenth day of the month Adar '
  - type: text
    content: a day of
  - type: text
    content: ' gladness and feasting, and a good day, and of sending portions one to another.'
  - type: heading
    content: The Feast of Purim
  '2':
  - type: text
    content: 'the Jews gathered themselves together in their cities throughout all the provinces of the king Ahasuerus, to lay hand on such as sought their hurt: and no man could withstand them; for the fear of them fell upon all people. '
  '20':
  - type: text
    content: 'And Mordecai wrote these things, and sent letters unto all the Jews that '
  - type: text
    content: were
  - type: text
    content: ' in all the provinces of the king Ahasuerus, '
  - type: text
    content: both
  - type: text
    content: ' nigh and far, '
  '21':
  - type: text
    content: 'to stablish '
  - type: text
    content: this
  - type: text
    content: ' among them, that they should keep the fourteenth day of the month Adar, and the fifteenth day of the same, yearly, '
  '22':
  - type: text
    content: 'as the days wherein the Jews rested from their enemies, and the month which was turned unto them from sorrow to joy, and from mourning into a good day: that they should make them days of feasting and joy, and of sending portions one to another, and gifts to the poor. '
  '23':
  - type: text
    content: 'And the Jews undertook to do as they had begun, and as Mordecai had written unto them; '
  '24':
  - type: text
    content: 'because Haman the son of Hammedatha, the Agagite, the enemy of all the Jews, had devised against the Jews to destroy them, and had cast Pur, that '
  - type: text
    content: is
  - type: text
    content: ', the lot, to consume them, and to destroy them; '
  '25':
  - type: text
    content: 'but when '
  - type: text
    content: Esther
  - type: text
    content: ' came before the king, he commanded by letters that his wicked device, which he devised against the Jews, should return upon his own head, and that he and his sons should be hanged on the gallows.'
  '26':
  - type: text
    content: 'Wherefore they called these days Purim after the name of Pur. Therefore for all the words of this letter, and '
  - type: text
    content: of that
  - type: text
    content: ' which they had seen concerning this matter, and which had come unto them, '
  '27':
  - type: text
    content: 'the Jews ordained, and took upon them, and upon their seed, and upon all such as joined themselves unto them, so as it should not fail, that they would keep these two days according to their writing, and according to their '
  - type: text
    content: appointed
  - type: text
    content: ' time every year; '
  '28':
  - type: text
    content: 'and '
  - type: text
    content: that
  - type: text
    content: ' these days '
  - type: text
    content: should be
  - type: text
    content: ' remembered and kept throughout every generation, every family, every province, and every city; and '
  - type: text
    content: that
  - type: text
    content: ' these days of Purim should not fail from among the Jews, nor the memorial of them perish from their seed.'
  '29':
  - type: text
    content: 'Then Esther the queen, the daughter of Abihail, and Mordecai the Jew, wrote with all authority, to confirm this second letter of Purim. '
  '3':
  - type: text
    content: 'And all the rulers of the provinces, and the lieutenants, and the deputies, and officers of the king, helped the Jews; because the fear of Mordecai fell upon them. '
  '30':
  - type: text
    content: 'And he sent the letters unto all the Jews, to the hundred twenty and seven provinces of the kingdom of Ahasuerus, '
  - type: text
    content: with
  - type: text
    content: ' words of peace and truth, '
  '31':
  - type: text
    content: 'to confirm these days of Purim in their times '
  - type: text
    content: appointed
  - type: text
    content: ', according as Mordecai the Jew and Esther the queen had enjoined them, and as they had decreed for themselves and for their seed, the matters of the fastings and their cry. '
  '32':
  - type: text
    content: And the decree of Esther confirmed these matters of Purim; and it was written in the book.
  '4':
  - type: text
    content: 'For Mordecai '
  - type: text
    content: was
  - type: text
    content: ' great in the king''s house, and his fame went out throughout all the provinces: for this man Mordecai waxed greater and greater. '
  '5':
  - type: text
    content: 'Thus the Jews smote all their enemies with the stroke of the sword, and slaughter, and destruction, and did what they would unto those that hated them. '
  '6':
  - type: text
    content: 'And in Shushan the palace the Jews slew and destroyed five hundred men. '
  '7':
  - type: text
    content: 'And Parshandatha, and Dalphon, and Aspatha, '
  '8':
  - type: text
    content: 'and Poratha, and Adalia, and Aridatha, '
  '9':
  - type: text
    content: 'and Parmashta, and Arisai, and Aridai, and Vajezatha, '
