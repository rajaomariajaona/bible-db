document_id: EST.9,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now in the twelfth month, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ', the month Adar, on the thirteenth day of the same, when the king''s commandment and his decree drew near to be put in execution, in the day that the enemies of the Jews hoped to have power over them, (though it was turned to the contrary, that the Jews had rule over them that hated them;) '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: the ten sons of Haman the son of Hammedatha, the enemy of the Jews, slew they; but on the spoil laid they not their hand.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On that day the number of those that were slain in Shushan the palace was brought before the king. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king said unto Esther the queen, The Jews have slain and destroyed five hundred men in Shushan the palace, and the ten sons of Haman; what have they done in the rest of the king''s provinces? now what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy petition? and it shall be granted thee: or what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy request further? and it shall be done. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said Esther, If it please the king, let it be granted to the Jews which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in Shushan to do to morrow also according unto this day''s decree, and let Haman''s ten sons be hanged upon the gallows. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king commanded it so to be done: and the decree was given at Shushan; and they hanged Haman''s ten sons. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the Jews that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in Shushan gathered themselves together on the fourteenth day also of the month Adar, and slew three hundred men at Shushan; but on the prey they laid not their hand. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the other Jews that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in the king''s provinces gathered themselves together, and stood for their lives, and had rest from their enemies, and slew of their foes seventy and five thousand, but they laid not their hands on the prey, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'on the thirteenth day of the month Adar; and on the fourteenth day of the same rested they, and made it a day of feasting and gladness. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the Jews that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' at Shushan assembled together on the thirteenth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' thereof, and on the fourteenth thereof; and on the fifteenth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' of the same they rested, and made it a day of feasting and gladness. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore the Jews of the villages, that dwelt in the unwalled towns, made the fourteenth day of the month Adar '
    - type: usfm
      marker: add
      children:
      - type: text
        text: a day of
    - type: text
      text: ' gladness and feasting, and a good day, and of sending portions one to another.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Feast of Purim
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the Jews gathered themselves together in their cities throughout all the provinces of the king Ahasuerus, to lay hand on such as sought their hurt: and no man could withstand them; for the fear of them fell upon all people. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Mordecai wrote these things, and sent letters unto all the Jews that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' in all the provinces of the king Ahasuerus, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: both
    - type: text
      text: ' nigh and far, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to stablish '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: ' among them, that they should keep the fourteenth day of the month Adar, and the fifteenth day of the same, yearly, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'as the days wherein the Jews rested from their enemies, and the month which was turned unto them from sorrow to joy, and from mourning into a good day: that they should make them days of feasting and joy, and of sending portions one to another, and gifts to the poor. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the Jews undertook to do as they had begun, and as Mordecai had written unto them; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because Haman the son of Hammedatha, the Agagite, the enemy of all the Jews, had devised against the Jews to destroy them, and had cast Pur, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ', the lot, to consume them, and to destroy them; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but when '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Esther
    - type: text
      text: ' came before the king, he commanded by letters that his wicked device, which he devised against the Jews, should return upon his own head, and that he and his sons should be hanged on the gallows.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wherefore they called these days Purim after the name of Pur. Therefore for all the words of this letter, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of that
    - type: text
      text: ' which they had seen concerning this matter, and which had come unto them, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the Jews ordained, and took upon them, and upon their seed, and upon all such as joined themselves unto them, so as it should not fail, that they would keep these two days according to their writing, and according to their '
    - type: usfm
      marker: add
      children:
      - type: text
        text: appointed
    - type: text
      text: ' time every year; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' these days '
    - type: usfm
      marker: add
      children:
      - type: text
        text: should be
    - type: text
      text: ' remembered and kept throughout every generation, every family, every province, and every city; and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' these days of Purim should not fail from among the Jews, nor the memorial of them perish from their seed.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Esther the queen, the daughter of Abihail, and Mordecai the Jew, wrote with all authority, to confirm this second letter of Purim. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the rulers of the provinces, and the lieutenants, and the deputies, and officers of the king, helped the Jews; because the fear of Mordecai fell upon them. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he sent the letters unto all the Jews, to the hundred twenty and seven provinces of the kingdom of Ahasuerus, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' words of peace and truth, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to confirm these days of Purim in their times '
    - type: usfm
      marker: add
      children:
      - type: text
        text: appointed
    - type: text
      text: ', according as Mordecai the Jew and Esther the queen had enjoined them, and as they had decreed for themselves and for their seed, the matters of the fastings and their cry. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the decree of Esther confirmed these matters of Purim; and it was written in the book.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For Mordecai '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' great in the king''s house, and his fame went out throughout all the provinces: for this man Mordecai waxed greater and greater. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus the Jews smote all their enemies with the stroke of the sword, and slaughter, and destruction, and did what they would unto those that hated them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in Shushan the palace the Jews slew and destroyed five hundred men. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Parshandatha, and Dalphon, and Aspatha, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Poratha, and Adalia, and Aridatha, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Parmashta, and Arisai, and Aridai, and Vajezatha, '
