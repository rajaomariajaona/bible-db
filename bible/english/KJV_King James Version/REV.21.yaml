document_id: REV.21,1
type_code: eng
verses:
  '1':
  - type: heading
    content: A New Heaven and Earth
  - type: text
    content: 'And I saw a new heaven and a new earth: for the first heaven and the first earth were passed away; and there was no more sea. '
  '10':
  - type: text
    content: 'And he carried me away in the spirit to a great and high mountain, and shewed me that great city, the holy Jerusalem, descending out of heaven from God, '
  '11':
  - type: text
    content: 'having the glory of God: and her light '
  - type: text
    content: was
  - type: text
    content: ' like unto a stone most precious, even like a jasper stone, clear as crystal; '
  '12':
  - type: text
    content: 'and had a wall great and high, '
  - type: text
    content: and
  - type: text
    content: ' had twelve gates, and at the gates twelve angels, and names written thereon, which are '
  - type: text
    content: the names
  - type: text
    content: ' of the twelve tribes of the children of Israel: '
  '13':
  - type: text
    content: 'on the east three gates; on the north three gates; on the south three gates; and on the west three gates. '
  '14':
  - type: text
    content: 'And the wall of the city had twelve foundations, and in them the names of the twelve apostles of the Lamb. '
  '15':
  - type: text
    content: 'And he that talked with me had a golden reed to measure the city, and the gates thereof, and the wall thereof. '
  '16':
  - type: text
    content: 'And the city lieth foursquare, and the length is as large as the breadth: and he measured the city with the reed, twelve thousand furlongs. The length and the breadth and the height of it are equal. '
  '17':
  - type: text
    content: 'And he measured the wall thereof, an hundred '
  - type: text
    content: and
  - type: text
    content: ' forty '
  - type: text
    content: and
  - type: text
    content: ' four cubits, '
  - type: text
    content: according to
  - type: text
    content: ' the measure of a man, that is, of the angel. '
  '18':
  - type: text
    content: 'And the building of the wall of it was '
  - type: text
    content: of
  - type: text
    content: ' jasper: and the city '
  - type: text
    content: was
  - type: text
    content: ' pure gold, like unto clear glass. '
  '19':
  - type: text
    content: 'And the foundations of the wall of the city '
  - type: text
    content: were
  - type: text
    content: ' garnished with all manner of precious stones. The first foundation '
  - type: text
    content: was
  - type: text
    content: ' jasper; the second, sapphire; the third, a chalcedony; the fourth, an emerald; '
  '2':
  - type: text
    content: 'And I John saw the holy city, new Jerusalem, coming down from God out of heaven, prepared as a bride adorned for her husband. '
  '20':
  - type: text
    content: 'the fifth, sardonyx; the sixth, sardius; the seventh, chrysolyte; the eighth, beryl; the ninth, a topaz; the tenth, a chrysoprasus; the eleventh, a jacinth; the twelfth, an amethyst. '
  '21':
  - type: text
    content: 'And the twelve gates '
  - type: text
    content: were
  - type: text
    content: ' twelve pearls; every several gate was of one pearl: and the street of the city '
  - type: text
    content: was
  - type: text
    content: ' pure gold, as it were transparent glass. '
  '22':
  - type: text
    content: 'And I saw no temple therein: for the Lord God Almighty and the Lamb are the temple of it. '
  '23':
  - type: text
    content: 'And the city had no need of the sun, neither of the moon, to shine in it: for the glory of God did lighten it, and the Lamb '
  - type: text
    content: is
  - type: text
    content: ' the light thereof. '
  '24':
  - type: text
    content: 'And the nations of them which are saved shall walk in the light of it: and the kings of the earth do bring their glory and honour into it. '
  '25':
  - type: text
    content: 'And the gates of it shall not be shut at all by day: for there shall be no night there. '
  '26':
  - type: text
    content: 'And they shall bring the glory and honour of the nations into it. '
  '27':
  - type: text
    content: 'And there shall in no wise enter into it any thing that defileth, neither '
  - type: text
    content: whatsoever
  - type: text
    content: ' worketh abomination, or '
  - type: text
    content: maketh
  - type: text
    content: ' a lie: but they which are written in the Lamb''s book of life.'
  '3':
  - type: text
    content: 'And I heard a great voice out of heaven saying, Behold, the tabernacle of God '
  - type: text
    content: is
  - type: text
    content: ' with men, and he will dwell with them, and they shall be his people, and God himself shall be with them, '
  - type: text
    content: and be
  - type: text
    content: ' their God. '
  '4':
  - type: text
    content: 'And God shall wipe away all tears from their eyes; and there shall be no more death, neither sorrow, nor crying, neither shall there be any more pain: for the former things are passed away. '
  '5':
  - type: text
    content: 'And he that sat upon the throne said, Behold, I make all things new. And he said unto me, Write: for these words are true and faithful. '
  '6':
  - type: text
    content: 'And he said unto me, It is done. I am Alpha and Omega, the beginning and the end. I will give unto him that is athirst of the fountain of the water of life freely. '
  '7':
  - type: text
    content: 'He that overcometh shall inherit all things; and I will be his God, and he shall be my son. '
  '8':
  - type: text
    content: 'But the fearful, and unbelieving, and the abominable, and murderers, and whoremongers, and sorcerers, and idolaters, and all liars, shall have their part in the lake which burneth with fire and brimstone: which is the second death.'
  '9':
  - type: text
    content: 'And there came unto me one of the seven angels which had the seven vials full of the seven last plagues, and talked with me, saying, Come hither, I will shew thee the bride, the Lamb''s wife. '
