document_id: REV.21
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: A New Heaven and Earth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And I saw a new heaven and a new earth: for the first heaven and the first earth were passed away; and there was no more sea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And I John saw the holy city, new Jerusalem, coming down from God out of heaven, prepared as a bride adorned for her husband. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And I heard a great voice out of heaven saying, Behold, the tabernacle of God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with men, and he will dwell with them, and they shall be his people, and God himself shall be with them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and be
  - type: text
    text: ' their God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And God shall wipe away all tears from their eyes; and there shall be no more death, neither sorrow, nor crying, neither shall there be any more pain: for the former things are passed away. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And he that sat upon the throne said, Behold, I make all things new. And he said unto me, Write: for these words are true and faithful. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he said unto me, It is done. I am Alpha and Omega, the beginning and the end. I will give unto him that is athirst of the fountain of the water of life freely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He that overcometh shall inherit all things; and I will be his God, and he shall be my son. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But the fearful, and unbelieving, and the abominable, and murderers, and whoremongers, and sorcerers, and idolaters, and all liars, shall have their part in the lake which burneth with fire and brimstone: which is the second death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And there came unto me one of the seven angels which had the seven vials full of the seven last plagues, and talked with me, saying, Come hither, I will shew thee the bride, the Lamb''s wife. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And he carried me away in the spirit to a great and high mountain, and shewed me that great city, the holy Jerusalem, descending out of heaven from God, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'having the glory of God: and her light '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' like unto a stone most precious, even like a jasper stone, clear as crystal; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and had a wall great and high, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' had twelve gates, and at the gates twelve angels, and names written thereon, which are '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the names
  - type: text
    text: ' of the twelve tribes of the children of Israel: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'on the east three gates; on the north three gates; on the south three gates; and on the west three gates. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And the wall of the city had twelve foundations, and in them the names of the twelve apostles of the Lamb. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And he that talked with me had a golden reed to measure the city, and the gates thereof, and the wall thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the city lieth foursquare, and the length is as large as the breadth: and he measured the city with the reed, twelve thousand furlongs. The length and the breadth and the height of it are equal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And he measured the wall thereof, an hundred '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' forty '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' four cubits, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: according to
  - type: text
    text: ' the measure of a man, that is, of the angel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And the building of the wall of it was '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' jasper: and the city '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' pure gold, like unto clear glass. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And the foundations of the wall of the city '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' garnished with all manner of precious stones. The first foundation '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' jasper; the second, sapphire; the third, a chalcedony; the fourth, an emerald; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'the fifth, sardonyx; the sixth, sardius; the seventh, chrysolyte; the eighth, beryl; the ninth, a topaz; the tenth, a chrysoprasus; the eleventh, a jacinth; the twelfth, an amethyst. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And the twelve gates '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' twelve pearls; every several gate was of one pearl: and the street of the city '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' pure gold, as it were transparent glass. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And I saw no temple therein: for the Lord God Almighty and the Lamb are the temple of it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And the city had no need of the sun, neither of the moon, to shine in it: for the glory of God did lighten it, and the Lamb '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the light thereof. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And the nations of them which are saved shall walk in the light of it: and the kings of the earth do bring their glory and honour into it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And the gates of it shall not be shut at all by day: for there shall be no night there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And they shall bring the glory and honour of the nations into it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And there shall in no wise enter into it any thing that defileth, neither '
  - type: usfm
    marker: add
    children:
    - type: text
      text: whatsoever
  - type: text
    text: ' worketh abomination, or '
  - type: usfm
    marker: add
    children:
    - type: text
      text: maketh
  - type: text
    text: ' a lie: but they which are written in the Lamb''s book of life.'
