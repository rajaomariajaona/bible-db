document_id: LUK.9
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Commissions His Apostles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then he called his twelve disciples together, and gave them power and authority over all devils, and to cure diseases. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he sent them to preach the kingdom of God, and to heal the sick. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And he said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Take nothing for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: your
    - type: text
      text: ' journey, neither staves, nor scrip, neither bread, neither money; neither have two coats apiece.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And whatsoever house ye enter into, there abide, and thence depart.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And whosoever will not receive you, when ye go out of that city, shake off the very dust from your feet for a testimony against them.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And they departed, and went through the towns, preaching the gospel, and healing every where.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now Herod the tetrarch heard of all that was done by him: and he was perplexed, because that it was said of some, that John was risen from the dead; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and of some, that Elias had appeared; and of others, that one of the old prophets was risen again. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And Herod said, John have I beheaded: but who is this, of whom I hear such things? And he desired to see him.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Feeding Five Thousand
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the apostles, when they were returned, told him all that they had done. And he took them, and went aside privately into a desert place belonging to the city called Bethsaida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the people, when they knew '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', followed him: and he received them, and spake unto them of the kingdom of God, and healed them that had need of healing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And when the day began to wear away, then came the twelve, and said unto him, Send the multitude away, that they may go into the towns and country round about, and lodge, and get victuals: for we are here in a desert place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But he said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Give ye them to eat.
  - type: text
    text: ' And they said, We have no more but five loaves and two fishes; except we should go and buy meat for all this people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For they were about five thousand men. And he said to his disciples, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Make them sit down by fifties in a company.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And they did so, and made them all sit down. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then he took the five loaves and the two fishes, and looking up to heaven, he blessed them, and brake, and gave to the disciples to set before the multitude. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And they did eat, and were all filled: and there was taken up of fragments that remained to them twelve baskets.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Great Confession
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And it came to pass, as he was alone praying, his disciples were with him: and he asked them, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Whom say the people that I am?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'They answering said, John the Baptist; but some '
  - type: usfm
    marker: add
    children:
    - type: text
      text: say
  - type: text
    text: ', Elias; and others '
  - type: usfm
    marker: add
    children:
    - type: text
      text: say
  - type: text
    text: ', that one of the old prophets is risen again. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'He said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But whom say ye that I am?
  - type: text
    text: ' Peter answering said, The Christ of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And he straitly charged them, and commanded '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' to tell no man that thing; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The Son of man must suffer many things, and be rejected of the elders and chief priests and scribes, and be slain, and be raised the third day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And he said to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' all, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'If any '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' will come after me, let him deny himself, and take up his cross daily, and follow me.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For whosoever will save his life shall lose it: but whosoever will lose his life for my sake, the same shall save it.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For what is a man advantaged, if he gain the whole world, and lose himself, or be cast away?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For whosoever shall be ashamed of me and of my words, of him shall the Son of man be ashamed, when he shall come in his own glory, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in his
    - type: text
      text: ' Father''s, and of the holy angels.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But I tell you of a truth, there be some standing here, which shall not taste of death, till they see the kingdom of God.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Transfiguration
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And it came to pass about an eight days after these sayings, he took Peter and John and James, and went up into a mountain to pray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And as he prayed, the fashion of his countenance was altered, and his raiment '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' white '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' glistering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And, behold, there talked with him two men, which were Moses and Elias: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'who appeared in glory, and spake of his decease which he should accomplish at Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'But Peter and they that were with him were heavy with sleep: and when they were awake, they saw his glory, and the two men that stood with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And it came to pass, as they departed from him, Peter said unto Jesus, Master, it is good for us to be here: and let us make three tabernacles; one for thee, and one for Moses, and one for Elias: not knowing what he said. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'While he thus spake, there came a cloud, and overshadowed them: and they feared as they entered into the cloud. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And there came a voice out of the cloud, saying, This is my beloved Son: hear him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And when the voice was past, Jesus was found alone. And they kept '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' close, and told no man in those days any of those things which they had seen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And it came to pass, that on the next day, when they were come down from the hill, much people met him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And, behold, a man of the company cried out, saying, Master, I beseech thee, look upon my son: for he is mine only child. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And, lo, a spirit taketh him, and he suddenly crieth out; and it teareth him that he foameth again, and bruising him hardly departeth from him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And I besought thy disciples to cast him out; and they could not. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And Jesus answering said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: O faithless and perverse generation, how long shall I be with you, and suffer you? Bring thy son hither.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And as he was yet a coming, the devil threw him down, and tare '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: . And Jesus rebuked the unclean spirit, and healed the child, and delivered him again to his father.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Shadow of His Passion
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'And they were all amazed at the mighty power of God. But while they wondered every one at all things which Jesus did, he said unto his disciples, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Let these sayings sink down into your ears: for the Son of man shall be delivered into the hands of men.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'But they understood not this saying, and it was hid from them, that they perceived it not: and they feared to ask him of that saying.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Then there arose a reasoning among them, which of them should be greatest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'And Jesus, perceiving the thought of their heart, took a child, and set him by him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'and said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Whosoever shall receive this child in my name receiveth me: and whosoever shall receive me receiveth him that sent me: for he that is least among you all, the same shall be great.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'And John answered and said, Master, we saw one casting out devils in thy name; and we forbad him, because he followeth not with us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'And Jesus said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Forbid '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' not: for he that is not against us is for us.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: On the way to Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'And it came to pass, when the time was come that he should be received up, he stedfastly set his face to go to Jerusalem, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'and sent messengers before his face: and they went, and entered into a village of the Samaritans, to make ready for him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'And they did not receive him, because his face was as though he would go to Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'And when his disciples James and John saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ', they said, Lord, wilt thou that we command fire to come down from heaven, and consume them, even as Elias did? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'But he turned, and rebuked them, and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ye know not what manner of spirit ye are of.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For the Son of man is not come to destroy men''s lives, but to save '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: .
  - type: text
    text: ' And they went to another village.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Would-be Disciples
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'And it came to pass, that, as they went in the way, a certain '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' said unto him, Lord, I will follow thee whithersoever thou goest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'And Jesus said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Foxes have holes, and birds of the air '
    - type: usfm
      marker: add
      children:
      - type: text
        text: have
    - type: text
      text: ' nests; but the Son of man hath not where to lay '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' head.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'And he said unto another, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Follow me.
  - type: text
    text: ' But he said, Lord, suffer me first to go and bury my father. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Jesus said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Let the dead bury their dead: but go thou and preach the kingdom of God.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'And another also said, Lord, I will follow thee; but let me first go bid them farewell, which are at home at my house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'And Jesus said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: No man, having put his hand to the plough, and looking back, is fit for the kingdom of God.
