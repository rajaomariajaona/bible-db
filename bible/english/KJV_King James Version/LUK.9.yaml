verses:
  '1':
  - type: heading
    content: Commissions His Apostles
  - type: text
    content: 'Then he called his twelve disciples together, and gave them power and authority over all devils, and to cure diseases. '
  '10':
  - type: text
    content: 'And the apostles, when they were returned, told him all that they had done. And he took them, and went aside privately into a desert place belonging to the city called Bethsaida. '
  '11':
  - type: text
    content: 'And the people, when they knew '
  - type: text
    content: it
  - type: text
    content: ', followed him: and he received them, and spake unto them of the kingdom of God, and healed them that had need of healing. '
  '12':
  - type: text
    content: 'And when the day began to wear away, then came the twelve, and said unto him, Send the multitude away, that they may go into the towns and country round about, and lodge, and get victuals: for we are here in a desert place. '
  '13':
  - type: text
    content: 'But he said unto them, '
  - type: text
    content: Give ye them to eat.
  - type: text
    content: ' And they said, We have no more but five loaves and two fishes; except we should go and buy meat for all this people. '
  '14':
  - type: text
    content: 'For they were about five thousand men. And he said to his disciples, '
  - type: text
    content: Make them sit down by fifties in a company.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'And they did so, and made them all sit down. '
  '16':
  - type: text
    content: 'Then he took the five loaves and the two fishes, and looking up to heaven, he blessed them, and brake, and gave to the disciples to set before the multitude. '
  '17':
  - type: text
    content: 'And they did eat, and were all filled: and there was taken up of fragments that remained to them twelve baskets.'
  - type: heading
    content: The Great Confession
  '18':
  - type: text
    content: 'And it came to pass, as he was alone praying, his disciples were with him: and he asked them, saying, '
  - type: text
    content: Whom say the people that I am?
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'They answering said, John the Baptist; but some '
  - type: text
    content: say
  - type: text
    content: ', Elias; and others '
  - type: text
    content: say
  - type: text
    content: ', that one of the old prophets is risen again. '
  '2':
  - type: text
    content: 'And he sent them to preach the kingdom of God, and to heal the sick. '
  '20':
  - type: text
    content: 'He said unto them, '
  - type: text
    content: But whom say ye that I am?
  - type: text
    content: ' Peter answering said, The Christ of God. '
  '21':
  - type: text
    content: 'And he straitly charged them, and commanded '
  - type: text
    content: them
  - type: text
    content: ' to tell no man that thing; '
  '22':
  - type: text
    content: 'saying, '
  - type: text
    content: The Son of man must suffer many things, and be rejected of the elders and chief priests and scribes, and be slain, and be raised the third day.
  '23':
  - type: text
    content: 'And he said to '
  - type: text
    content: them
  - type: text
    content: ' all, '
  - type: text
    content: 'If any '
  - type: text
    content: man
  - type: text
    content: ' will come after me, let him deny himself, and take up his cross daily, and follow me.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'For whosoever will save his life shall lose it: but whosoever will lose his life for my sake, the same shall save it.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: For what is a man advantaged, if he gain the whole world, and lose himself, or be cast away?
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'For whosoever shall be ashamed of me and of my words, of him shall the Son of man be ashamed, when he shall come in his own glory, and '
  - type: text
    content: in his
  - type: text
    content: ' Father''s, and of the holy angels.'
  - type: text
    content: ' '
  '27':
  - type: text
    content: But I tell you of a truth, there be some standing here, which shall not taste of death, till they see the kingdom of God.
  - type: heading
    content: The Transfiguration
  '28':
  - type: text
    content: 'And it came to pass about an eight days after these sayings, he took Peter and John and James, and went up into a mountain to pray. '
  '29':
  - type: text
    content: 'And as he prayed, the fashion of his countenance was altered, and his raiment '
  - type: text
    content: was
  - type: text
    content: ' white '
  - type: text
    content: and
  - type: text
    content: ' glistering. '
  '3':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: 'Take nothing for '
  - type: text
    content: your
  - type: text
    content: ' journey, neither staves, nor scrip, neither bread, neither money; neither have two coats apiece.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'And, behold, there talked with him two men, which were Moses and Elias: '
  '31':
  - type: text
    content: 'who appeared in glory, and spake of his decease which he should accomplish at Jerusalem. '
  '32':
  - type: text
    content: 'But Peter and they that were with him were heavy with sleep: and when they were awake, they saw his glory, and the two men that stood with him. '
  '33':
  - type: text
    content: 'And it came to pass, as they departed from him, Peter said unto Jesus, Master, it is good for us to be here: and let us make three tabernacles; one for thee, and one for Moses, and one for Elias: not knowing what he said. '
  '34':
  - type: text
    content: 'While he thus spake, there came a cloud, and overshadowed them: and they feared as they entered into the cloud. '
  '35':
  - type: text
    content: 'And there came a voice out of the cloud, saying, This is my beloved Son: hear him. '
  '36':
  - type: text
    content: 'And when the voice was past, Jesus was found alone. And they kept '
  - type: text
    content: it
  - type: text
    content: ' close, and told no man in those days any of those things which they had seen.'
  '37':
  - type: text
    content: 'And it came to pass, that on the next day, when they were come down from the hill, much people met him. '
  '38':
  - type: text
    content: 'And, behold, a man of the company cried out, saying, Master, I beseech thee, look upon my son: for he is mine only child. '
  '39':
  - type: text
    content: 'And, lo, a spirit taketh him, and he suddenly crieth out; and it teareth him that he foameth again, and bruising him hardly departeth from him. '
  '4':
  - type: text
    content: And whatsoever house ye enter into, there abide, and thence depart.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'And I besought thy disciples to cast him out; and they could not. '
  '41':
  - type: text
    content: 'And Jesus answering said, '
  - type: text
    content: O faithless and perverse generation, how long shall I be with you, and suffer you? Bring thy son hither.
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'And as he was yet a coming, the devil threw him down, and tare '
  - type: text
    content: him
  - type: text
    content: . And Jesus rebuked the unclean spirit, and healed the child, and delivered him again to his father.
  - type: heading
    content: The Shadow of His Passion
  '43':
  - type: text
    content: 'And they were all amazed at the mighty power of God. But while they wondered every one at all things which Jesus did, he said unto his disciples, '
  '44':
  - type: text
    content: 'Let these sayings sink down into your ears: for the Son of man shall be delivered into the hands of men.'
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'But they understood not this saying, and it was hid from them, that they perceived it not: and they feared to ask him of that saying.'
  '46':
  - type: text
    content: 'Then there arose a reasoning among them, which of them should be greatest. '
  '47':
  - type: text
    content: 'And Jesus, perceiving the thought of their heart, took a child, and set him by him, '
  '48':
  - type: text
    content: 'and said unto them, '
  - type: text
    content: 'Whosoever shall receive this child in my name receiveth me: and whosoever shall receive me receiveth him that sent me: for he that is least among you all, the same shall be great.'
  '49':
  - type: text
    content: 'And John answered and said, Master, we saw one casting out devils in thy name; and we forbad him, because he followeth not with us. '
  '5':
  - type: text
    content: And whosoever will not receive you, when ye go out of that city, shake off the very dust from your feet for a testimony against them.
  - type: text
    content: ' '
  '50':
  - type: text
    content: 'And Jesus said unto him, '
  - type: text
    content: 'Forbid '
  - type: text
    content: him
  - type: text
    content: ' not: for he that is not against us is for us.'
  - type: heading
    content: On the way to Jerusalem
  '51':
  - type: text
    content: 'And it came to pass, when the time was come that he should be received up, he stedfastly set his face to go to Jerusalem, '
  '52':
  - type: text
    content: 'and sent messengers before his face: and they went, and entered into a village of the Samaritans, to make ready for him. '
  '53':
  - type: text
    content: 'And they did not receive him, because his face was as though he would go to Jerusalem. '
  '54':
  - type: text
    content: 'And when his disciples James and John saw '
  - type: text
    content: this
  - type: text
    content: ', they said, Lord, wilt thou that we command fire to come down from heaven, and consume them, even as Elias did? '
  '55':
  - type: text
    content: 'But he turned, and rebuked them, and said, '
  - type: text
    content: Ye know not what manner of spirit ye are of.
  - type: text
    content: ' '
  '56':
  - type: text
    content: 'For the Son of man is not come to destroy men''s lives, but to save '
  - type: text
    content: them
  - type: text
    content: .
  - type: text
    content: ' And they went to another village.'
  - type: heading
    content: Would-be Disciples
  '57':
  - type: text
    content: 'And it came to pass, that, as they went in the way, a certain '
  - type: text
    content: man
  - type: text
    content: ' said unto him, Lord, I will follow thee whithersoever thou goest. '
  '58':
  - type: text
    content: 'And Jesus said unto him, '
  - type: text
    content: 'Foxes have holes, and birds of the air '
  - type: text
    content: have
  - type: text
    content: ' nests; but the Son of man hath not where to lay '
  - type: text
    content: his
  - type: text
    content: ' head.'
  - type: text
    content: ' '
  '59':
  - type: text
    content: 'And he said unto another, '
  - type: text
    content: Follow me.
  - type: text
    content: ' But he said, Lord, suffer me first to go and bury my father. '
  '6':
  - type: text
    content: And they departed, and went through the towns, preaching the gospel, and healing every where.
  '60':
  - type: text
    content: 'Jesus said unto him, '
  - type: text
    content: 'Let the dead bury their dead: but go thou and preach the kingdom of God.'
  - type: text
    content: ' '
  '61':
  - type: text
    content: 'And another also said, Lord, I will follow thee; but let me first go bid them farewell, which are at home at my house. '
  '62':
  - type: text
    content: 'And Jesus said unto him, '
  - type: text
    content: No man, having put his hand to the plough, and looking back, is fit for the kingdom of God.
  '7':
  - type: text
    content: 'Now Herod the tetrarch heard of all that was done by him: and he was perplexed, because that it was said of some, that John was risen from the dead; '
  '8':
  - type: text
    content: 'and of some, that Elias had appeared; and of others, that one of the old prophets was risen again. '
  '9':
  - type: text
    content: 'And Herod said, John have I beheaded: but who is this, of whom I hear such things? And he desired to see him.'
  - type: heading
    content: Feeding Five Thousand
