  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Song of degrees.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In my distress
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I cried unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and he heard me.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Deliver my soul, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', from lying lips,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' from a deceitful tongue.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What shall be given unto thee? or what shall be done unto thee, thou false tongue?
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Sharp arrows of the mighty, with coals of juniper.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe is me, that I sojourn in Mesech,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: That
    - type: text
      text: ' I dwell in the tents of Kedar!'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My soul hath long dwelt
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With him that hateth peace.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am for
    - type: text
      text: ' peace:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But when I speak, they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' for war.'
