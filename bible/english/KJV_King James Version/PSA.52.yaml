document_id: PSA.52,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'To the chief Musician, Maschil, '
  - type: text
    content: A Psalm
  - type: text
    content: ' of David, when Doeg the Edomite came and told Saul, and said unto him, David is come to the house of Ahimelech.'
  - type: text
    content: Why boastest thou thyself in mischief, O mighty man?
  - type: text
    content: 'The goodness of God '
  - type: text
    content: endureth
  - type: text
    content: ' continually.'
  '2':
  - type: text
    content: Thy tongue deviseth mischiefs;
  - type: text
    content: Like a sharp razor, working deceitfully.
  '3':
  - type: text
    content: Thou lovest evil more than good;
  - type: text
    content: And
  - type: text
    content: ' lying rather than to speak righteousness. '
  - type: text
    content: Selah.
  '4':
  - type: text
    content: Thou lovest all devouring words,
  - type: text
    content: 'O '
  - type: text
    content: thou
  - type: text
    content: ' deceitful tongue.'
  '5':
  - type: text
    content: God shall likewise destroy thee for ever,
  - type: text
    content: 'He shall take thee away, and pluck thee out of '
  - type: text
    content: thy
  - type: text
    content: ' dwelling place, and root thee out of the land of the living. '
  - type: text
    content: Selah.
  '6':
  - type: text
    content: The righteous also shall see, and fear,
  - type: text
    content: 'And shall laugh at him:'
  '7':
  - type: text
    content: 'Lo, '
  - type: text
    content: this is
  - type: text
    content: ' the man '
  - type: text
    content: that
  - type: text
    content: ' made not God his strength;'
  - type: text
    content: 'But trusted in the abundance of his riches, '
  - type: text
    content: and
  - type: text
    content: ' strengthened himself in his wickedness.'
  '8':
  - type: text
    content: 'But I '
  - type: text
    content: am
  - type: text
    content: ' like a green olive tree in the house of God:'
  - type: text
    content: I trust in the mercy of God for ever and ever.
  '9':
  - type: text
    content: 'I will praise thee for ever, because thou hast done '
  - type: text
    content: 'it:'
  - type: text
    content: 'And I will wait on thy name; for '
  - type: text
    content: it is
  - type: text
    content: ' good before thy saints.'
