document_id: PSA.52,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the chief Musician, Maschil, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: A Psalm
    - type: text
      text: ' of David, when Doeg the Edomite came and told Saul, and said unto him, David is come to the house of Ahimelech.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why boastest thou thyself in mischief, O mighty man?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The goodness of God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: endureth
    - type: text
      text: ' continually.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thy tongue deviseth mischiefs;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like a sharp razor, working deceitfully.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thou lovest evil more than good;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' lying rather than to speak righteousness. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thou lovest all devouring words,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thou
    - type: text
      text: ' deceitful tongue.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God shall likewise destroy thee for ever,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He shall take thee away, and pluck thee out of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thy
    - type: text
      text: ' dwelling place, and root thee out of the land of the living. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The righteous also shall see, and fear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And shall laugh at him:'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lo, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this is
    - type: text
      text: ' the man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' made not God his strength;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But trusted in the abundance of his riches, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' strengthened himself in his wickedness.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' like a green olive tree in the house of God:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I trust in the mercy of God for ever and ever.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will praise thee for ever, because thou hast done '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'it:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And I will wait on thy name; for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' good before thy saints.'
