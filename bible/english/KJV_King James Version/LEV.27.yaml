document_id: LEV.27,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Vows and Tithes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'He shall not alter it, nor change it, a good for a bad, or a bad for a good: and if he shall at all change beast for beast, then it and the exchange thereof shall be holy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it be
    - type: text
      text: ' any unclean beast, of which they do not offer a sacrifice unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', then he shall present the beast before the priest: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'and the priest shall value it, whether it be good or bad: as thou valuest it, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: who art
    - type: text
      text: ' the priest, so shall it be. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But if he will at all redeem it, then he shall add a fifth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: part
    - type: text
      text: ' thereof unto thy estimation.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And when a man shall sanctify his house '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' holy unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', then the priest shall estimate it, whether it be good or bad: as the priest shall estimate it, so shall it stand. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And if he that sanctified it will redeem his house, then he shall add the fifth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: part
    - type: text
      text: ' of the money of thy estimation unto it, and it shall be his. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And if a man shall sanctify unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: some part
    - type: text
      text: ' of a field of his possession, then thy estimation shall be according to the seed thereof: an homer of barley seed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be valued
    - type: text
      text: ' at fifty shekels of silver. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'If he sanctify his field from the year of jubile, according to thy estimation it shall stand. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'But if he sanctify his field after the jubile, then the priest shall reckon unto him the money according to the years that remain, even unto the year of the jubile, and it shall be abated from thy estimation. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And if he that sanctified the field will in any wise redeem it, then he shall add the fifth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: part
    - type: text
      text: ' of the money of thy estimation unto it, and it shall be assured to him. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Speak unto the children of Israel, and say unto them, When a man shall make a singular vow, the persons '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' by thy estimation. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And if he will not redeem the field, or if he have sold the field to another man, it shall not be redeemed any more. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'But the field, when it goeth out in the jubile, shall be holy unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', as a field devoted; the possession thereof shall be the priest''s. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: a man
    - type: text
      text: ' sanctify unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' a field which he hath bought, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not of the fields of his possession; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'then the priest shall reckon unto him the worth of thy estimation, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' unto the year of the jubile: and he shall give thine estimation in that day, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' a holy thing unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'In the year of the jubile the field shall return unto him of whom it was bought, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' to him to whom the possession of the land '
    - type: usfm
      marker: add
      children:
      - type: text
        text: did belong
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And all thy estimations shall be according to the shekel of the sanctuary: twenty gerahs shall be the shekel.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Only the firstling of the beasts, which should be the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '''s firstling, no man shall sanctify it; whether '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it be
    - type: text
      text: ' ox, or sheep: it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '''s. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it be
    - type: text
      text: ' of an unclean beast, then he shall redeem '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' according to thine estimation, and shall add a fifth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: part
    - type: text
      text: ' of it thereto: or if it be not redeemed, then it shall be sold according to thy estimation. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Notwithstanding no devoted thing, that a man shall devote unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of all that he hath, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: both
    - type: text
      text: ' of man and beast, and of the field of his possession, shall be sold or redeemed: every devoted thing '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' most holy unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'None devoted, which shall be devoted of men, shall be redeemed; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' shall surely be put to death. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And thy estimation shall be of the male from twenty years old even unto sixty years old, even thy estimation shall be fifty shekels of silver, after the shekel of the sanctuary. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And all the tithe of the land, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whether
    - type: text
      text: ' of the seed of the land, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: or
    - type: text
      text: ' of the fruit of the tree, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '''s: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' holy unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And if a man will at all redeem '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ought
    - type: text
      text: ' of his tithes, he shall add thereto the fifth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: part
    - type: text
      text: ' thereof. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And concerning the tithe of the herd, or of the flock, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' of whatsoever passeth under the rod, the tenth shall be holy unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'He shall not search whether it be good or bad, neither shall he change it: and if he change it at all, then both it and the change thereof shall be holy; it shall not be redeemed. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'These '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the commandments, which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commanded Moses for the children of Israel in mount Sinai.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And if it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' a female, then thy estimation shall be thirty shekels. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it be
    - type: text
      text: ' from five years old even unto twenty years old, then thy estimation shall be of the male twenty shekels, and for the female ten shekels. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it be
    - type: text
      text: ' from a month old even unto five years old, then thy estimation shall be of the male five shekels of silver, and for the female thy estimation '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' three shekels of silver. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it be
    - type: text
      text: ' from sixty years old and above; if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it be
    - type: text
      text: ' a male, then thy estimation shall be fifteen shekels, and for the female ten shekels. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But if he be poorer than thy estimation, then he shall present himself before the priest, and the priest shall value him; according to his ability that vowed shall the priest value him. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it be
    - type: text
      text: ' a beast, whereof men bring an offering unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any man
    - type: text
      text: ' giveth of such unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall be holy. '
