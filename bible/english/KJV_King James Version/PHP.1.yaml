document_id: PHP.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Paul and Timotheus, the servants of Jesus Christ, to all the saints in Christ Jesus which are at Philippi, with the bishops and deacons: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'grace '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' unto you, and peace, from God our Father, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: from
  - type: text
    text: ' the Lord Jesus Christ.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Heart of the Apostle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I thank my God upon every remembrance of you, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'always in every prayer of mine for you all making request with joy, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'for your fellowship in the gospel from the first day until now; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'being confident of this very thing, that he which hath begun a good work in you will perform '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' until the day of Jesus Christ: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'even as it is meet for me to think this of you all, because I have you in my heart; inasmuch as both in my bonds, and in the defence and confirmation of the gospel, ye all are partakers of my grace. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For God is my record, how greatly I long after you all in the bowels of Jesus Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And this I pray, that your love may abound yet more and more in knowledge and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' all judgment; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'that ye may approve things that are excellent; that ye may be sincere and without offence till the day of Christ; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: being filled with the fruits of righteousness, which are by Jesus Christ, unto the glory and praise of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But I would ye should understand, brethren, that the things '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which happened
  - type: text
    text: ' unto me have fallen out rather unto the furtherance of the gospel; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'so that my bonds in Christ are manifest in all the palace, and in all other '
  - type: usfm
    marker: add
    children:
    - type: text
      text: places
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: and many of the brethren in the Lord, waxing confident by my bonds, are much more bold to speak the word without fear.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Some indeed preach Christ even of envy and strife; and some also of good will: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'the one preach Christ of contention, not sincerely, supposing to add affliction to my bonds: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: but the other of love, knowing that I am set for the defence of the gospel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'What then? notwithstanding, every way, whether in pretence, or in truth, Christ is preached; and I therein do rejoice, yea, and will rejoice. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For I know that this shall turn to my salvation through your prayer, and the supply of the Spirit of Jesus Christ, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'according to my earnest expectation and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: my
  - type: text
    text: ' hope, that in nothing I shall be ashamed, but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' with all boldness, as always, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' now also Christ shall be magnified in my body, whether '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it be
  - type: text
    text: ' by life, or by death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For to me to live '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Christ, and to die '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' gain. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But if I live in the flesh, this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the fruit of my labour: yet what I shall choose I wot not. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For I am in a strait betwixt two, having a desire to depart, and to be with Christ; which is far better: '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'nevertheless to abide in the flesh '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' more needful for you. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And having this confidence, I know that I shall abide and continue with you all for your furtherance and joy of faith; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: that your rejoicing may be more abundant in Jesus Christ for me by my coming to you again.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Only let your conversation be as it becometh the gospel of Christ: that whether I come and see you, or else be absent, I may hear of your affairs, that ye stand fast in one spirit, with one mind striving together for the faith of the gospel; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and in nothing terrified by your adversaries: which is to them an evident token of perdition, but to you of salvation, and that of God. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'For unto you it is given in the behalf of Christ, not only to believe on him, but also to suffer for his sake; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'having the same conflict which ye saw in me, and now hear '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' in me.'
