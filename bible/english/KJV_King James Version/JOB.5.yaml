document_id: JOB.5,1
type_code: eng
verses:
  '1':
  - type: text
    content: Call now, if there be any that will answer thee;
  - type: text
    content: And to which of the saints wilt thou turn?
  '10':
  - type: text
    content: Who giveth rain upon the earth,
  - type: text
    content: 'And sendeth waters upon the fields:'
  '11':
  - type: text
    content: To set up on high those that be low;
  - type: text
    content: That those which mourn may be exalted to safety.
  '12':
  - type: text
    content: He disappointeth the devices of the crafty,
  - type: text
    content: 'So that their hands cannot perform '
  - type: text
    content: their
  - type: text
    content: ' enterprise.'
  '13':
  - type: text
    content: 'He taketh the wise in their own craftiness:'
  - type: text
    content: And the counsel of the froward is carried headlong.
  '14':
  - type: text
    content: They meet with darkness in the daytime,
  - type: text
    content: And grope in the noonday as in the night.
  '15':
  - type: text
    content: But he saveth the poor from the sword, from their mouth,
  - type: text
    content: And from the hand of the mighty.
  '16':
  - type: text
    content: So the poor hath hope,
  - type: text
    content: And iniquity stoppeth her mouth.
  '17':
  - type: text
    content: 'Behold, happy '
  - type: text
    content: is
  - type: text
    content: ' the man whom God correcteth:'
  - type: text
    content: 'Therefore despise not thou the chastening of the Almighty:'
  '18':
  - type: text
    content: 'For he maketh sore, and bindeth up:'
  - type: text
    content: He woundeth, and his hands make whole.
  '19':
  - type: text
    content: 'He shall deliver thee in six troubles:'
  - type: text
    content: Yea, in seven there shall no evil touch thee.
  '2':
  - type: text
    content: For wrath killeth the foolish man,
  - type: text
    content: And envy slayeth the silly one.
  '20':
  - type: text
    content: 'In famine he shall redeem thee from death:'
  - type: text
    content: And in war from the power of the sword.
  '21':
  - type: text
    content: 'Thou shalt be hid from the scourge of the tongue:'
  - type: text
    content: Neither shalt thou be afraid of destruction when it cometh.
  '22':
  - type: text
    content: 'At destruction and famine thou shalt laugh:'
  - type: text
    content: Neither shalt thou be afraid of the beasts of the earth.
  '23':
  - type: text
    content: 'For thou shalt be in league with the stones of the field:'
  - type: text
    content: And the beasts of the field shall be at peace with thee.
  '24':
  - type: text
    content: 'And thou shalt know that thy tabernacle '
  - type: text
    content: shall be
  - type: text
    content: ' in peace;'
  - type: text
    content: And thou shalt visit thy habitation, and shalt not sin.
  '25':
  - type: text
    content: 'Thou shalt know also that thy seed '
  - type: text
    content: shall be
  - type: text
    content: ' great,'
  - type: text
    content: And thine offspring as the grass of the earth.
  '26':
  - type: text
    content: 'Thou shalt come to '
  - type: text
    content: thy
  - type: text
    content: ' grave in a full age,'
  - type: text
    content: Like as a shock of corn cometh in in his season.
  '27':
  - type: text
    content: 'Lo this, we have searched it, so it '
  - type: text
    content: is
  - type: text
    content: ;
  - type: text
    content: 'Hear it, and know thou '
  - type: text
    content: it
  - type: text
    content: ' for thy good.'
  '3':
  - type: text
    content: 'I have seen the foolish taking root:'
  - type: text
    content: But suddenly I cursed his habitation.
  '4':
  - type: text
    content: His children are far from safety,
  - type: text
    content: And they are crushed in the gate,
  - type: text
    content: 'Neither '
  - type: text
    content: is there
  - type: text
    content: ' any to deliver '
  - type: text
    content: them
  - type: text
    content: .
  '5':
  - type: text
    content: Whose harvest the hungry eateth up,
  - type: text
    content: And taketh it even out of the thorns,
  - type: text
    content: And the robber swalloweth up their substance.
  '6':
  - type: text
    content: Although affliction cometh not forth of the dust,
  - type: text
    content: Neither doth trouble spring out of the ground;
  '7':
  - type: text
    content: Yet man is born unto trouble,
  - type: text
    content: As the sparks fly upward.
  '8':
  - type: text
    content: I would seek unto God,
  - type: text
    content: 'And unto God would I commit my cause:'
  '9':
  - type: text
    content: Which doeth great things and unsearchable;
  - type: text
    content: 'Marvellous things without number:'
