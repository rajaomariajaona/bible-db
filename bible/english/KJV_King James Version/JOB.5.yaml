document_id: JOB.5,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Call now, if there be any that will answer thee;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And to which of the saints wilt thou turn?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who giveth rain upon the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And sendeth waters upon the fields:'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To set up on high those that be low;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That those which mourn may be exalted to safety.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He disappointeth the devices of the crafty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So that their hands cannot perform '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' enterprise.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He taketh the wise in their own craftiness:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the counsel of the froward is carried headlong.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They meet with darkness in the daytime,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And grope in the noonday as in the night.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he saveth the poor from the sword, from their mouth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And from the hand of the mighty.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So the poor hath hope,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And iniquity stoppeth her mouth.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Behold, happy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the man whom God correcteth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Therefore despise not thou the chastening of the Almighty:'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For he maketh sore, and bindeth up:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He woundeth, and his hands make whole.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He shall deliver thee in six troubles:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yea, in seven there shall no evil touch thee.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For wrath killeth the foolish man,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And envy slayeth the silly one.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In famine he shall redeem thee from death:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And in war from the power of the sword.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou shalt be hid from the scourge of the tongue:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Neither shalt thou be afraid of destruction when it cometh.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'At destruction and famine thou shalt laugh:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Neither shalt thou be afraid of the beasts of the earth.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For thou shalt be in league with the stones of the field:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the beasts of the field shall be at peace with thee.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And thou shalt know that thy tabernacle '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' in peace;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thou shalt visit thy habitation, and shalt not sin.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou shalt know also that thy seed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' great,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And thine offspring as the grass of the earth.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou shalt come to '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thy
    - type: text
      text: ' grave in a full age,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like as a shock of corn cometh in in his season.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lo this, we have searched it, so it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Hear it, and know thou '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' for thy good.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I have seen the foolish taking root:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But suddenly I cursed his habitation.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His children are far from safety,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they are crushed in the gate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Neither '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is there
    - type: text
      text: ' any to deliver '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whose harvest the hungry eateth up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And taketh it even out of the thorns,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the robber swalloweth up their substance.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Although affliction cometh not forth of the dust,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Neither doth trouble spring out of the ground;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet man is born unto trouble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As the sparks fly upward.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I would seek unto God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And unto God would I commit my cause:'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which doeth great things and unsearchable;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Marvellous things without number:'
