document_id: 2SA.22,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Hymn of Praise
  - type: text
    content: 'And David spake unto the '
  - type: text
    content: LORD
  - type: text
    content: ' the words of this song in the day '
  - type: text
    content: that
  - type: text
    content: ' the '
  - type: text
    content: LORD
  - type: text
    content: ' had delivered him out of the hand of all his enemies, and out of the hand of Saul: '
  '10':
  - type: text
    content: He bowed the heavens also, and came down;
  - type: text
    content: 'And darkness '
  - type: text
    content: was
  - type: text
    content: ' under his feet.'
  '11':
  - type: text
    content: 'And he rode upon a cherub, and did fly:'
  - type: text
    content: And he was seen upon the wings of the wind.
  '12':
  - type: text
    content: And he made darkness pavilions round about him,
  - type: text
    content: 'Dark waters, '
  - type: text
    content: and
  - type: text
    content: ' thick clouds of the skies.'
  '13':
  - type: text
    content: Through the brightness before him
  - type: text
    content: Were coals of fire kindled.
  '14':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' thundered from heaven,'
  - type: text
    content: And the Most High uttered his voice.
  '15':
  - type: text
    content: And he sent out arrows, and scattered them;
  - type: text
    content: Lightning, and discomfited them.
  '16':
  - type: text
    content: And the channels of the sea appeared,
  - type: text
    content: The foundations of the world were discovered,
  - type: text
    content: 'At the rebuking of the '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: At the blast of the breath of his nostrils.
  '17':
  - type: text
    content: He sent from above, he took me;
  - type: text
    content: He drew me out of many waters;
  '18':
  - type: text
    content: He delivered me from my strong enemy,
  - type: text
    content: And
  - type: text
    content: ' from them that hated me: for they were too strong for me.'
  '19':
  - type: text
    content: 'They prevented me in the day of my calamity:'
  - type: text
    content: 'But the '
  - type: text
    content: LORD
  - type: text
    content: ' was my stay.'
  '2':
  - type: text
    content: and he said,
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' my rock, and my fortress, and my deliverer;'
  '20':
  - type: text
    content: 'He brought me forth also into a large place:'
  - type: text
    content: He delivered me, because he delighted in me.
  '21':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' rewarded me according to my righteousness:'
  - type: text
    content: According to the cleanness of my hands hath he recompensed me.
  '22':
  - type: text
    content: 'For I have kept the ways of the '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: And have not wickedly departed from my God.
  '23':
  - type: text
    content: 'For all his judgments '
  - type: text
    content: were
  - type: text
    content: ' before me:'
  - type: text
    content: 'And '
  - type: text
    content: as for
  - type: text
    content: ' his statutes, I did not depart from them.'
  '24':
  - type: text
    content: I was also upright before him,
  - type: text
    content: And have kept myself from mine iniquity.
  '25':
  - type: text
    content: 'Therefore the '
  - type: text
    content: LORD
  - type: text
    content: ' hath recompensed me according to my righteousness;'
  - type: text
    content: According to my cleanness in his eye sight.
  '26':
  - type: text
    content: With the merciful thou wilt shew thyself merciful,
  - type: text
    content: And
  - type: text
    content: ' with the upright man thou wilt shew thyself upright.'
  '27':
  - type: text
    content: With the pure thou wilt shew thyself pure;
  - type: text
    content: And with the froward thou wilt shew thyself unsavoury.
  '28':
  - type: text
    content: 'And the afflicted people thou wilt save:'
  - type: text
    content: 'But thine eyes '
  - type: text
    content: are
  - type: text
    content: ' upon the haughty, '
  - type: text
    content: that
  - type: text
    content: ' thou mayest bring '
  - type: text
    content: them
  - type: text
    content: ' down.'
  '29':
  - type: text
    content: 'For thou '
  - type: text
    content: art
  - type: text
    content: ' my lamp, O '
  - type: text
    content: LORD
  - type: text
    content: ':'
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' will lighten my darkness.'
  '3':
  - type: text
    content: 'The God of my rock; in him will I trust:'
  - type: text
    content: He is
  - type: text
    content: ' my shield, and the horn of my salvation, my high tower, and my refuge,'
  - type: text
    content: My saviour; thou savest me from violence.
  '30':
  - type: text
    content: 'For by thee I have run through a troop:'
  - type: text
    content: By my God have I leaped over a wall.
  '31':
  - type: text
    content: ' '
  - type: text
    content: As for
  - type: text
    content: ' God, his way '
  - type: text
    content: is
  - type: text
    content: ' perfect;'
  - type: text
    content: 'The word of the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' tried:'
  - type: text
    content: 'He '
  - type: text
    content: is
  - type: text
    content: ' a buckler to all them that trust in him.'
  '32':
  - type: text
    content: 'For who '
  - type: text
    content: is
  - type: text
    content: ' God, save the '
  - type: text
    content: LORD
  - type: text
    content: '?'
  - type: text
    content: 'And who '
  - type: text
    content: is
  - type: text
    content: ' a rock, save our God?'
  '33':
  - type: text
    content: 'God '
  - type: text
    content: is
  - type: text
    content: ' my strength '
  - type: text
    content: and
  - type: text
    content: ' power:'
  - type: text
    content: And he maketh my way perfect.
  '34':
  - type: text
    content: 'He maketh my feet like hinds'' '
  - type: text
    content: 'feet:'
  - type: text
    content: And setteth me upon my high places.
  '35':
  - type: text
    content: He teacheth my hands to war;
  - type: text
    content: So that a bow of steel is broken by mine arms.
  '36':
  - type: text
    content: 'Thou hast also given me the shield of thy salvation:'
  - type: text
    content: And thy gentleness hath made me great.
  '37':
  - type: text
    content: Thou hast enlarged my steps under me;
  - type: text
    content: So that my feet did not slip.
  '38':
  - type: text
    content: I have pursued mine enemies, and destroyed them;
  - type: text
    content: And turned not again until I had consumed them.
  '39':
  - type: text
    content: 'And I have consumed them, and wounded them, that they could not arise:'
  - type: text
    content: Yea, they are fallen under my feet.
  '4':
  - type: text
    content: 'I will call on the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: who is
  - type: text
    content: ' worthy to be praised:'
  - type: text
    content: So shall I be saved from mine enemies.
  '40':
  - type: text
    content: 'For thou hast girded me with strength to battle:'
  - type: text
    content: Them that rose up against me hast thou subdued under me.
  '41':
  - type: text
    content: Thou hast also given me the necks of mine enemies,
  - type: text
    content: That I might destroy them that hate me.
  '42':
  - type: text
    content: 'They looked, but '
  - type: text
    content: there was
  - type: text
    content: ' none to save;'
  - type: text
    content: Even
  - type: text
    content: ' unto the '
  - type: text
    content: LORD
  - type: text
    content: ', but he answered them not.'
  '43':
  - type: text
    content: Then did I beat them as small as the dust of the earth,
  - type: text
    content: 'I did stamp them as the mire of the street, '
  - type: text
    content: and
  - type: text
    content: ' did spread them abroad.'
  '44':
  - type: text
    content: Thou also hast delivered me from the strivings of my people,
  - type: text
    content: 'Thou hast kept me '
  - type: text
    content: to be
  - type: text
    content: ' head of the heathen:'
  - type: text
    content: 'A people '
  - type: text
    content: which
  - type: text
    content: ' I knew not shall serve me.'
  '45':
  - type: text
    content: 'Strangers shall submit themselves unto me:'
  - type: text
    content: As soon as they hear, they shall be obedient unto me.
  '46':
  - type: text
    content: Strangers shall fade away,
  - type: text
    content: And they shall be afraid out of their close places.
  '47':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' liveth; and blessed '
  - type: text
    content: be
  - type: text
    content: ' my rock;'
  - type: text
    content: And exalted be the God of the rock of my salvation.
  '48':
  - type: text
    content: 'It '
  - type: text
    content: is
  - type: text
    content: ' God that avengeth me,'
  - type: text
    content: And that bringeth down the people under me,
  '49':
  - type: text
    content: 'And that bringeth me forth from mine enemies:'
  - type: text
    content: 'Thou also hast lifted me up on high above them that rose up against me:'
  - type: text
    content: Thou hast delivered me from the violent man.
  '5':
  - type: text
    content: When the waves of death compassed me,
  - type: text
    content: The floods of ungodly men made me afraid;
  '50':
  - type: text
    content: 'Therefore I will give thanks unto thee, O '
  - type: text
    content: LORD
  - type: text
    content: ', among the heathen,'
  - type: text
    content: And I will sing praises unto thy name.
  '51':
  - type: text
    content: ' '
  - type: text
    content: He is
  - type: text
    content: ' the tower of salvation for his king:'
  - type: text
    content: And sheweth mercy to his anointed,
  - type: text
    content: Unto David, and to his seed for evermore.
  '6':
  - type: text
    content: The sorrows of hell compassed me about;
  - type: text
    content: The snares of death prevented me;
  '7':
  - type: text
    content: 'In my distress I called upon the '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: 'And cried to my God:'
  - type: text
    content: And he did hear my voice out of his temple,
  - type: text
    content: 'And my cry '
  - type: text
    content: did enter
  - type: text
    content: ' into his ears.'
  '8':
  - type: text
    content: Then the earth shook and trembled;
  - type: text
    content: The foundations of heaven moved
  - type: text
    content: And shook, because he was wroth.
  '9':
  - type: text
    content: There went up a smoke out of his nostrils,
  - type: text
    content: 'And fire out of his mouth devoured:'
  - type: text
    content: Coals were kindled by it.
