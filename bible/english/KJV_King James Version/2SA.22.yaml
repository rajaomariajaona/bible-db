document_id: 2SA.22
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Hymn of Praise
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And David spake unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' the words of this song in the day '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had delivered him out of the hand of all his enemies, and out of the hand of Saul: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: and he said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my rock, and my fortress, and my deliverer;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The God of my rock; in him will I trust:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: He is
  - type: text
    text: ' my shield, and the horn of my salvation, my high tower, and my refuge,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: My saviour; thou savest me from violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I will call on the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: who is
  - type: text
    text: ' worthy to be praised:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: So shall I be saved from mine enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: When the waves of death compassed me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The floods of ungodly men made me afraid;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The sorrows of hell compassed me about;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The snares of death prevented me;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'In my distress I called upon the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And cried to my God:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he did hear my voice out of his temple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And my cry '
  - type: usfm
    marker: add
    children:
    - type: text
      text: did enter
  - type: text
    text: ' into his ears.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then the earth shook and trembled;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The foundations of heaven moved
- type: usfm
  marker: q1
  children:
  - type: text
    text: And shook, because he was wroth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: There went up a smoke out of his nostrils,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And fire out of his mouth devoured:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Coals were kindled by it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He bowed the heavens also, and came down;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And darkness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' under his feet.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And he rode upon a cherub, and did fly:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he was seen upon the wings of the wind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And he made darkness pavilions round about him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dark waters, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' thick clouds of the skies.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Through the brightness before him
- type: usfm
  marker: q1
  children:
  - type: text
    text: Were coals of fire kindled.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' thundered from heaven,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the Most High uttered his voice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And he sent out arrows, and scattered them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lightning, and discomfited them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And the channels of the sea appeared,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The foundations of the world were discovered,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'At the rebuking of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: At the blast of the breath of his nostrils.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He sent from above, he took me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He drew me out of many waters;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: He delivered me from my strong enemy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' from them that hated me: for they were too strong for me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'They prevented me in the day of my calamity:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' was my stay.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'He brought me forth also into a large place:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He delivered me, because he delighted in me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' rewarded me according to my righteousness:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: According to the cleanness of my hands hath he recompensed me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'For I have kept the ways of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: And have not wickedly departed from my God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For all his judgments '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' before me:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as for
  - type: text
    text: ' his statutes, I did not depart from them.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: I was also upright before him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And have kept myself from mine iniquity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Therefore the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath recompensed me according to my righteousness;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: According to my cleanness in his eye sight.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: With the merciful thou wilt shew thyself merciful,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' with the upright man thou wilt shew thyself upright.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: With the pure thou wilt shew thyself pure;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And with the froward thou wilt shew thyself unsavoury.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And the afflicted people thou wilt save:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But thine eyes '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' upon the haughty, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' thou mayest bring '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' down.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'For thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' my lamp, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will lighten my darkness.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'For by thee I have run through a troop:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: By my God have I leaped over a wall.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As for
  - type: text
    text: ' God, his way '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' perfect;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' tried:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a buckler to all them that trust in him.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'For who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' God, save the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And who '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' a rock, save our God?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my strength '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' power:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he maketh my way perfect.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'He maketh my feet like hinds'' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'feet:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And setteth me upon my high places.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: He teacheth my hands to war;
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that a bow of steel is broken by mine arms.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Thou hast also given me the shield of thy salvation:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And thy gentleness hath made me great.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Thou hast enlarged my steps under me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that my feet did not slip.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: I have pursued mine enemies, and destroyed them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And turned not again until I had consumed them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And I have consumed them, and wounded them, that they could not arise:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yea, they are fallen under my feet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'For thou hast girded me with strength to battle:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Them that rose up against me hast thou subdued under me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Thou hast also given me the necks of mine enemies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That I might destroy them that hate me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'They looked, but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' none to save;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: Even
  - type: text
    text: ' unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', but he answered them not.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Then did I beat them as small as the dust of the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I did stamp them as the mire of the street, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' did spread them abroad.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Thou also hast delivered me from the strivings of my people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Thou hast kept me '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to be
  - type: text
    text: ' head of the heathen:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'A people '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which
  - type: text
    text: ' I knew not shall serve me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Strangers shall submit themselves unto me:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: As soon as they hear, they shall be obedient unto me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Strangers shall fade away,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they shall be afraid out of their close places.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' liveth; and blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' my rock;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And exalted be the God of the rock of my salvation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'It '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' God that avengeth me,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And that bringeth down the people under me,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'And that bringeth me forth from mine enemies:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Thou also hast lifted me up on high above them that rose up against me:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Thou hast delivered me from the violent man.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Therefore I will give thanks unto thee, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', among the heathen,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will sing praises unto thy name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: He is
  - type: text
    text: ' the tower of salvation for his king:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And sheweth mercy to his anointed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Unto David, and to his seed for evermore.
