document_id: 2SA.17,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Moreover Ahithophel said unto Absalom, Let me now choose out twelve thousand men, and I will arise and pursue after David this night: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And he also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is
    - type: text
      text: ' valiant, whose heart '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' as the heart of a lion, shall utterly melt: for all Israel knoweth that thy father '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a mighty man, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they
    - type: text
      text: ' which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' with him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' valiant men. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Therefore I counsel that all Israel be generally gathered unto thee, from Dan even to Beer-sheba, as the sand that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' by the sea for multitude; and that thou go to battle in thine own person. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'So shall we come upon him in some place where he shall be found, and we will light upon him as the dew falleth on the ground: and of him and of all the men that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' with him there shall not be left so much as one. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Moreover, if he be gotten into a city, then shall all Israel bring ropes to that city, and we will draw it into the river, until there be not one small stone found there. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And Absalom and all the men of Israel said, The counsel of Hushai the Archite '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' better than the counsel of Ahithophel. For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had appointed to defeat the good counsel of Ahithophel, to the intent that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' might bring evil upon Absalom.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then said Hushai unto Zadok and to Abiathar the priests, Thus and thus did Ahithophel counsel Absalom and the elders of Israel; and thus and thus have I counselled. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Now therefore send quickly, and tell David, saying, Lodge not this night in the plains of the wilderness, but speedily pass over; lest the king be swallowed up, and all the people that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' with him. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Now Jonathan and Ahimaaz stayed by En-rogel; for they might not be seen to come into the city: and a wench went and told them; and they went and told king David. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Nevertheless a lad saw them, and told Absalom: but they went both of them away quickly, and came to a man''s house in Bahurim, which had a well in his court; whither they went down. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And the woman took and spread a covering over the well''s mouth, and spread ground corn thereon; and the thing was not known. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'and I will come upon him while he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' weary and weak handed, and will make him afraid: and all the people that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' with him shall flee; and I will smite the king only: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And when Absalom''s servants came to the woman to the house, they said, Where '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Ahimaaz and Jonathan? And the woman said unto them, They be gone over the brook of water. And when they had sought and could not find '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ', they returned to Jerusalem.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And it came to pass, after they were departed, that they came up out of the well, and went and told king David, and said unto David, Arise, and pass quickly over the water: for thus hath Ahithophel counselled against you. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Then David arose, and all the people that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with him, and they passed over Jordan: by the morning light there lacked not one of them that was not gone over Jordan. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And when Ahithophel saw that his counsel was not followed, he saddled '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' ass, and arose, and gat him home to his house, to his city, and put his household in order, and hanged himself, and died, and was buried in the sepulchre of his father.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Then David came to Mahanaim. And Absalom passed over Jordan, he and all the men of Israel with him. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And Absalom made Amasa captain of the host instead of Joab: which Amasa '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' a man''s son, whose name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Ithra an Israelite, that went in to Abigail the daughter of Nahash, sister to Zeruiah Joab''s mother. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: So Israel and Absalom pitched in the land of Gilead.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And it came to pass, when David was come to Mahanaim, that Shobi the son of Nahash of Rabbah of the children of Ammon, and Machir the son of Ammiel of Lo-debar, and Barzillai the Gileadite of Rogelim, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'brought beds, and basons, and earthen vessels, and wheat, and barley, and flour, and parched '
    - type: usfm
      marker: add
      children:
      - type: text
        text: corn
    - type: text
      text: ', and beans, and lentiles, and parched '
    - type: usfm
      marker: add
      children:
      - type: text
        text: pulse
    - type: text
      text: ', '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'and honey, and butter, and sheep, and cheese of kine, for David, and for the people that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with him, to eat: for they said, The people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' hungry, and weary, and thirsty, in the wilderness.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'and I will bring back all the people unto thee: the man whom thou seekest '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' as if all returned: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' all the people shall be in peace. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: And the saying pleased Absalom well, and all the elders of Israel.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then said Absalom, Call now Hushai the Archite also, and let us hear likewise what he saith. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And when Hushai was come to Absalom, Absalom spake unto him, saying, Ahithophel hath spoken after this manner: shall we do '
    - type: usfm
      marker: add
      children:
      - type: text
        text: after
    - type: text
      text: ' his saying? if not; speak thou. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And Hushai said unto Absalom, The counsel that Ahithophel hath given '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' not good at this time. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'For, said Hushai, thou knowest thy father and his men, that they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' mighty men, and they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' chafed in their minds, as a bear robbed of her whelps in the field: and thy father '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a man of war, and will not lodge with the people. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Behold, he is hid now in some pit, or in some '
    - type: usfm
      marker: add
      children:
      - type: text
        text: other
    - type: text
      text: ' place: and it will come to pass, when some of them be overthrown at the first, that whosoever heareth it will say, There is a slaughter among the people that follow Absalom. '
