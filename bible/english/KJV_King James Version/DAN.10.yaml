verses:
  '1':
  - type: heading
    content: The End of the Age
  - type: text
    content: 'In the third year of Cyrus king of Persia a thing was revealed unto Daniel, whose name was called Belteshazzar; and the thing '
  - type: text
    content: was
  - type: text
    content: ' true, but the time appointed '
  - type: text
    content: was
  - type: text
    content: ' long: and he understood the thing, and had understanding of the vision. '
  '10':
  - type: text
    content: 'And, behold, an hand touched me, which set me upon my knees and '
  - type: text
    content: upon
  - type: text
    content: ' the palms of my hands. '
  '11':
  - type: text
    content: 'And he said unto me, O Daniel, a man greatly beloved, understand the words that I speak unto thee, and stand upright: for unto thee am I now sent. And when he had spoken this word unto me, I stood trembling.'
  '12':
  - type: text
    content: 'Then said he unto me, Fear not, Daniel: for from the first day that thou didst set thine heart to understand, and to chasten thyself before thy God, thy words were heard, and I am come for thy words. '
  '13':
  - type: text
    content: 'But the prince of the kingdom of Persia withstood me one and twenty days: but, lo, Michael, one of the chief princes, came to help me; and I remained there with the kings of Persia. '
  '14':
  - type: text
    content: 'Now I am come to make thee understand what shall befall thy people in the latter days: for yet the vision '
  - type: text
    content: is
  - type: text
    content: ' for '
  - type: text
    content: many
  - type: text
    content: ' days. '
  '15':
  - type: text
    content: 'And when he had spoken such words unto me, I set my face toward the ground, and I became dumb. '
  '16':
  - type: text
    content: 'And, behold, '
  - type: text
    content: one
  - type: text
    content: ' like the similitude of the sons of men touched my lips: then I opened my mouth, and spake, and said unto him that stood before me, O my lord, by the vision my sorrows are turned upon me, and I have retained no strength. '
  '17':
  - type: text
    content: For how can the servant of this my lord talk with this my lord? for as for me, straightway there remained no strength in me, neither is there breath left in me.
  '18':
  - type: text
    content: 'Then there came again and touched me '
  - type: text
    content: one
  - type: text
    content: ' like the appearance of a man, and he strengthened me, '
  '19':
  - type: text
    content: 'and said, O man greatly beloved, fear not: peace '
  - type: text
    content: be
  - type: text
    content: ' unto thee, be strong, yea, be strong. And when he had spoken unto me, I was strengthened, and said, Let my lord speak; for thou hast strengthened me.'
  '2':
  - type: text
    content: 'In those days I Daniel was mourning three full weeks. '
  '20':
  - type: text
    content: 'Then said he, Knowest thou wherefore I come unto thee? and now will I return to fight with the prince of Persia: and when I am gone forth, lo, the prince of Grecia shall come. '
  '21':
  - type: text
    content: 'But I will shew thee that which is noted in the scripture of truth: and '
  - type: text
    content: there is
  - type: text
    content: ' none that holdeth with me in these things, but Michael your prince.'
  '3':
  - type: text
    content: 'I ate no pleasant bread, neither came flesh nor wine in my mouth, neither did I anoint myself at all, till three whole weeks were fulfilled. '
  '4':
  - type: text
    content: 'And in the four and twentieth day of the first month, as I was by the side of the great river, which '
  - type: text
    content: is
  - type: text
    content: ' Hiddekel; '
  '5':
  - type: text
    content: 'then I lifted up mine eyes, and looked, and behold a certain man clothed in linen, whose loins '
  - type: text
    content: were
  - type: text
    content: ' girded with fine gold of Uphaz: '
  '6':
  - type: text
    content: 'his body also '
  - type: text
    content: was
  - type: text
    content: ' like the beryl, and his face as the appearance of lightning, and his eyes as lamps of fire, and his arms and his feet like in colour to polished brass, and the voice of his words like the voice of a multitude.'
  '7':
  - type: text
    content: 'And I Daniel alone saw the vision: for the men that were with me saw not the vision; but a great quaking fell upon them, so that they fled to hide themselves. '
  '8':
  - type: text
    content: 'Therefore I was left alone, and saw this great vision, and there remained no strength in me: for my comeliness was turned in me into corruption, and I retained no strength. '
  '9':
  - type: text
    content: 'Yet heard I the voice of his words: and when I heard the voice of his words, then was I in a deep sleep on my face, and my face toward the ground.'
