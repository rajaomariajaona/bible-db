document_id: DAN.10,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The End of the Age
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the third year of Cyrus king of Persia a thing was revealed unto Daniel, whose name was called Belteshazzar; and the thing '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' true, but the time appointed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' long: and he understood the thing, and had understanding of the vision. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And, behold, an hand touched me, which set me upon my knees and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: upon
    - type: text
      text: ' the palms of my hands. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said unto me, O Daniel, a man greatly beloved, understand the words that I speak unto thee, and stand upright: for unto thee am I now sent. And when he had spoken this word unto me, I stood trembling.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said he unto me, Fear not, Daniel: for from the first day that thou didst set thine heart to understand, and to chasten thyself before thy God, thy words were heard, and I am come for thy words. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the prince of the kingdom of Persia withstood me one and twenty days: but, lo, Michael, one of the chief princes, came to help me; and I remained there with the kings of Persia. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now I am come to make thee understand what shall befall thy people in the latter days: for yet the vision '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: many
    - type: text
      text: ' days. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he had spoken such words unto me, I set my face toward the ground, and I became dumb. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And, behold, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' like the similitude of the sons of men touched my lips: then I opened my mouth, and spake, and said unto him that stood before me, O my lord, by the vision my sorrows are turned upon me, and I have retained no strength. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For how can the servant of this my lord talk with this my lord? for as for me, straightway there remained no strength in me, neither is there breath left in me.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then there came again and touched me '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' like the appearance of a man, and he strengthened me, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said, O man greatly beloved, fear not: peace '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' unto thee, be strong, yea, be strong. And when he had spoken unto me, I was strengthened, and said, Let my lord speak; for thou hast strengthened me.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In those days I Daniel was mourning three full weeks. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then said he, Knowest thou wherefore I come unto thee? and now will I return to fight with the prince of Persia: and when I am gone forth, lo, the prince of Grecia shall come. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I will shew thee that which is noted in the scripture of truth: and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none that holdeth with me in these things, but Michael your prince.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I ate no pleasant bread, neither came flesh nor wine in my mouth, neither did I anoint myself at all, till three whole weeks were fulfilled. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in the four and twentieth day of the first month, as I was by the side of the great river, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Hiddekel; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then I lifted up mine eyes, and looked, and behold a certain man clothed in linen, whose loins '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' girded with fine gold of Uphaz: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'his body also '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' like the beryl, and his face as the appearance of lightning, and his eyes as lamps of fire, and his arms and his feet like in colour to polished brass, and the voice of his words like the voice of a multitude.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I Daniel alone saw the vision: for the men that were with me saw not the vision; but a great quaking fell upon them, so that they fled to hide themselves. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore I was left alone, and saw this great vision, and there remained no strength in me: for my comeliness was turned in me into corruption, and I retained no strength. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet heard I the voice of his words: and when I heard the voice of his words, then was I in a deep sleep on my face, and my face toward the ground.'
