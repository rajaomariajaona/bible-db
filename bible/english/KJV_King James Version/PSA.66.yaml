document_id: PSA.66
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'To the chief Musician, A Song '
  - type: usfm
    marker: add
    children:
    - type: text
      text: or
  - type: text
    text: ' Psalm.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Make a joyful noise unto God, all ye lands:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Sing forth the honour of his name: Make his praise glorious.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Say unto God, How terrible '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art thou in
  - type: text
    text: ' thy works!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Through the greatness of thy power shall thine enemies submit themselves unto thee.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: All the earth shall worship thee,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And shall sing unto thee; They shall sing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: to
  - type: text
    text: ' thy name. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Come and see the works of God:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: He is
  - type: text
    text: ' terrible '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in his
  - type: text
    text: ' doing toward the children of men.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He turned the sea into dry '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'land:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They went through the flood on foot: There did we rejoice in him.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He ruleth by his power for ever; His eyes behold the nations:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Let not the rebellious exalt themselves. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: O bless our God, ye people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And make the voice of his praise to be heard:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Which holdeth our soul in life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And suffereth not our feet to be moved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For thou, O God, hast proved us:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou hast tried us, as silver is tried.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Thou broughtest us into the net;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Thou laidst affliction upon our loins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Thou hast caused men to ride over our heads;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'We went through fire and through water: But thou broughtest us out into a wealthy '
  - type: usfm
    marker: add
    children:
    - type: text
      text: place
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I will go into thy house with burnt offerings:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I will pay thee my vows, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: which my lips have uttered, and my mouth hath spoken, when I was in trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I will offer unto thee burnt sacrifices of fatlings, with the incense of rams;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I will offer bullocks with goats. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Come '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' hear, all ye that fear God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And I will declare what he hath done for my soul.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I cried unto him with my mouth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And he was extolled with my tongue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: If I regard iniquity in my heart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The Lord will not hear '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'me:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: But
  - type: text
    text: ' verily God hath heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: me
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: He hath attended to the voice of my prayer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' God, which hath not turned away my prayer,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nor his mercy from me.
