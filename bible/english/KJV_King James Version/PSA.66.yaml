verses:
  '1':
  - type: text
    content: 'To the chief Musician, A Song '
  - type: text
    content: or
  - type: text
    content: ' Psalm.'
  - type: text
    content: 'Make a joyful noise unto God, all ye lands:'
  '10':
  - type: text
    content: 'For thou, O God, hast proved us:'
  - type: text
    content: Thou hast tried us, as silver is tried.
  '11':
  - type: text
    content: Thou broughtest us into the net;
  - type: text
    content: Thou laidst affliction upon our loins.
  '12':
  - type: text
    content: Thou hast caused men to ride over our heads;
  - type: text
    content: 'We went through fire and through water: But thou broughtest us out into a wealthy '
  - type: text
    content: place
  - type: text
    content: .
  '13':
  - type: text
    content: 'I will go into thy house with burnt offerings:'
  - type: text
    content: 'I will pay thee my vows, '
  '14':
  - type: text
    content: which my lips have uttered, and my mouth hath spoken, when I was in trouble.
  '15':
  - type: text
    content: I will offer unto thee burnt sacrifices of fatlings, with the incense of rams;
  - type: text
    content: 'I will offer bullocks with goats. '
  - type: text
    content: Selah.
  '16':
  - type: text
    content: 'Come '
  - type: text
    content: and
  - type: text
    content: ' hear, all ye that fear God,'
  - type: text
    content: And I will declare what he hath done for my soul.
  '17':
  - type: text
    content: I cried unto him with my mouth,
  - type: text
    content: And he was extolled with my tongue.
  '18':
  - type: text
    content: If I regard iniquity in my heart,
  - type: text
    content: 'The Lord will not hear '
  - type: text
    content: 'me:'
  '19':
  - type: text
    content: ' '
  - type: text
    content: But
  - type: text
    content: ' verily God hath heard '
  - type: text
    content: me
  - type: text
    content: ;
  - type: text
    content: He hath attended to the voice of my prayer.
  '2':
  - type: text
    content: 'Sing forth the honour of his name: Make his praise glorious.'
  '20':
  - type: text
    content: 'Blessed '
  - type: text
    content: be
  - type: text
    content: ' God, which hath not turned away my prayer,'
  - type: text
    content: Nor his mercy from me.
  '3':
  - type: text
    content: 'Say unto God, How terrible '
  - type: text
    content: art thou in
  - type: text
    content: ' thy works!'
  - type: text
    content: Through the greatness of thy power shall thine enemies submit themselves unto thee.
  '4':
  - type: text
    content: All the earth shall worship thee,
  - type: text
    content: 'And shall sing unto thee; They shall sing '
  - type: text
    content: to
  - type: text
    content: ' thy name. '
  - type: text
    content: Selah.
  '5':
  - type: text
    content: 'Come and see the works of God:'
  - type: text
    content: He is
  - type: text
    content: ' terrible '
  - type: text
    content: in his
  - type: text
    content: ' doing toward the children of men.'
  '6':
  - type: text
    content: 'He turned the sea into dry '
  - type: text
    content: 'land:'
  - type: text
    content: 'They went through the flood on foot: There did we rejoice in him.'
  '7':
  - type: text
    content: 'He ruleth by his power for ever; His eyes behold the nations:'
  - type: text
    content: 'Let not the rebellious exalt themselves. '
  - type: text
    content: Selah.
  '8':
  - type: text
    content: O bless our God, ye people,
  - type: text
    content: 'And make the voice of his praise to be heard:'
  '9':
  - type: text
    content: Which holdeth our soul in life,
  - type: text
    content: And suffereth not our feet to be moved.
