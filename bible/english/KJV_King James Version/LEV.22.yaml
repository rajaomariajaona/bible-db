document_id: LEV.22,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'There shall no stranger eat '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' the holy thing: a sojourner of the priest, or an hired servant, shall not eat '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' the holy thing. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But if the priest buy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any
    - type: text
      text: ' soul with his money, he shall eat of it, and he that is born in his house: they shall eat of his meat. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'If the priest''s daughter also be '
    - type: usfm
      marker: add
      children:
      - type: text
        text: married
    - type: text
      text: ' unto a stranger, she may not eat of an offering of the holy things. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But if the priest''s daughter be a widow, or divorced, and have no child, and is returned unto her father''s house, as in her youth, she shall eat of her father''s meat: but there shall no stranger eat thereof.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And if a man eat '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of
    - type: text
      text: ' the holy thing unwittingly, then he shall put the fifth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: part
    - type: text
      text: ' thereof unto it, and shall give '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' unto the priest with the holy thing. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And they shall not profane the holy things of the children of Israel, which they offer unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'or suffer them to bear the iniquity of trespass, when they eat their holy things: for I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' do sanctify them.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Speak unto Aaron, and to his sons, and unto all the children of Israel, and say unto them, Whatsoever '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he be
    - type: text
      text: ' of the house of Israel, or of the strangers in Israel, that will offer his oblation for all his vows, and for all his freewill offerings, which they will offer unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' for a burnt offering; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: add
      children:
      - type: text
        text: ye shall offer
    - type: text
      text: ' at your own will a male without blemish, of the beeves, of the sheep, or of the goats. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Speak unto Aaron and to his sons, that they separate themselves from the holy things of the children of Israel, and that they profane not my holy name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in those things
    - type: text
      text: ' which they hallow unto me: I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: add
      children:
      - type: text
        text: But
    - type: text
      text: ' whatsoever hath a blemish, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' shall ye not offer: for it shall not be acceptable for you. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And whosoever offereth a sacrifice of peace offerings unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' to accomplish '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' vow, or a freewill offering in beeves or sheep, it shall be perfect to be accepted; there shall be no blemish therein. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Blind, or broken, or maimed, or having a wen, or scurvy, or scabbed, ye shall not offer these unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', nor make an offering by fire of them upon the altar unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Either a bullock or a lamb that hath any thing superfluous or lacking in his parts, that mayest thou offer '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' a freewill offering; but for a vow it shall not be accepted. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ye shall not offer unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' that which is bruised, or crushed, or broken, or cut; neither shall ye make '
    - type: usfm
      marker: add
      children:
      - type: text
        text: any offering thereof
    - type: text
      text: ' in your land. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Neither from a stranger''s hand shall ye offer the bread of your God of any of these; because their corruption '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' blemishes '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' in them: they shall not be accepted for you.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' spake unto Moses, saying, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'When a bullock, or a sheep, or a goat, is brought forth, then it shall be seven days under the dam; and from the eighth day and thenceforth it shall be accepted for an offering made by fire unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whether it be
    - type: text
      text: ' cow or ewe, ye shall not kill it and her young both in one day. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And when ye will offer a sacrifice of thanksgiving unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', offer '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' at your own will. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Say unto them, Whosoever '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he be
    - type: text
      text: ' of all your seed among your generations, that goeth unto the holy things, which the children of Israel hallow unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', having his uncleanness upon him, that soul shall be cut off from my presence: I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'On the same day it shall be eaten up; ye shall leave none of it until the morrow: I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Therefore shall ye keep my commandments, and do them: I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Neither shall ye profane my holy name; but I will be hallowed among the children of Israel: I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' which hallow you, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'that brought you out of the land of Egypt, to be your God: I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'What man soever of the seed of Aaron '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' a leper, or hath a running issue; he shall not eat of the holy things, until he be clean. And whoso toucheth any thing '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is
    - type: text
      text: ' unclean '
    - type: usfm
      marker: add
      children:
      - type: text
        text: by
    - type: text
      text: ' the dead, or a man whose seed goeth from him; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'or whosoever toucheth any creeping thing, whereby he may be made unclean, or a man of whom he may take uncleanness, whatsoever uncleanness he hath; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'the soul which hath touched any such shall be unclean until even, and shall not eat of the holy things, unless he wash his flesh with water. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And when the sun is down, he shall be clean, and shall afterward eat of the holy things; because it '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' his food. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'That which dieth of itself, or is torn '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with beasts
    - type: text
      text: ', he shall not eat to defile himself therewith: I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'They shall therefore keep mine ordinance, lest they bear sin for it, and die therefore, if they profane it: I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' do sanctify them.'
