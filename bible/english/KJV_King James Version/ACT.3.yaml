document_id: ACT.3
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: At the Gate of the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now Peter and John went up together into the temple at the hour of prayer, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' the ninth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hour
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And a certain man lame from his mother''s womb was carried, whom they laid daily at the gate of the temple which is called Beautiful, to ask alms of them that entered into the temple; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'who seeing Peter and John about to go into the temple asked an alms. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Peter, fastening his eyes upon him with John, said, Look on us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: And he gave heed unto them, expecting to receive something of them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then Peter said, Silver and gold have I none; but such as I have give I thee: In the name of Jesus Christ of Nazareth rise up and walk. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And he took him by the right hand, and lifted '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' up: and immediately his feet and ankle bones received strength. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And he leaping up stood, and walked, and entered with them into the temple, walking, and leaping, and praising God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And all the people saw him walking and praising God: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and they knew that it was he which sat for alms at the Beautiful gate of the temple: and they were filled with wonder and amazement at that which had happened unto him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And as the lame man which was healed held Peter and John, all the people ran together unto them in the porch that is called Solomon's, greatly wondering.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Peter's Answer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And when Peter saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', he answered unto the people, Ye men of Israel, why marvel ye at this? or why look ye so earnestly on us, as though by our own power or holiness we had made this man to walk? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The God of Abraham, and of Isaac, and of Jacob, the God of our fathers, hath glorified his Son Jesus; whom ye delivered up, and denied him in the presence of Pilate, when he was determined to let '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' go. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But ye denied the Holy One and the Just, and desired a murderer to be granted unto you; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and killed the Prince of life, whom God hath raised from the dead; whereof we are witnesses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And his name through faith in his name hath made this man strong, whom ye see and know: yea, the faith which is by him hath given him this perfect soundness in the presence of you all. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And now, brethren, I wot that through ignorance ye did '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', as '
  - type: usfm
    marker: add
    children:
    - type: text
      text: did
  - type: text
    text: ' also your rulers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: But those things, which God before had shewed by the mouth of all his prophets, that Christ should suffer, he hath so fulfilled.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Repent ye therefore, and be converted, that your sins may be blotted out, when the times of refreshing shall come from the presence of the Lord; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'and he shall send Jesus Christ, which before was preached unto you: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'whom the heaven must receive until the times of restitution of all things, which God hath spoken by the mouth of all his holy prophets since the world began. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'For Moses truly said unto the fathers, A prophet shall the Lord your God raise up unto you of your brethren, like unto me; him shall ye hear in all things whatsoever he shall say unto you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And it shall come to pass, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' every soul, which will not hear that prophet, shall be destroyed from among the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Yea, and all the prophets from Samuel and those that follow after, as many as have spoken, have likewise foretold of these days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ye are the children of the prophets, and of the covenant which God made with our fathers, saying unto Abraham, And in thy seed shall all the kindreds of the earth be blessed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Unto you first God, having raised up his Son Jesus, sent him to bless you, in turning away every one of you from his iniquities.
