document_id: ACT.3,1
type_code: eng
verses:
  '1':
  - type: heading
    content: At the Gate of the Temple
  - type: text
    content: 'Now Peter and John went up together into the temple at the hour of prayer, '
  - type: text
    content: being
  - type: text
    content: ' the ninth '
  - type: text
    content: hour
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'and they knew that it was he which sat for alms at the Beautiful gate of the temple: and they were filled with wonder and amazement at that which had happened unto him. '
  '11':
  - type: text
    content: And as the lame man which was healed held Peter and John, all the people ran together unto them in the porch that is called Solomon's, greatly wondering.
  - type: heading
    content: Peter's Answer
  '12':
  - type: text
    content: 'And when Peter saw '
  - type: text
    content: it
  - type: text
    content: ', he answered unto the people, Ye men of Israel, why marvel ye at this? or why look ye so earnestly on us, as though by our own power or holiness we had made this man to walk? '
  '13':
  - type: text
    content: 'The God of Abraham, and of Isaac, and of Jacob, the God of our fathers, hath glorified his Son Jesus; whom ye delivered up, and denied him in the presence of Pilate, when he was determined to let '
  - type: text
    content: him
  - type: text
    content: ' go. '
  '14':
  - type: text
    content: 'But ye denied the Holy One and the Just, and desired a murderer to be granted unto you; '
  '15':
  - type: text
    content: 'and killed the Prince of life, whom God hath raised from the dead; whereof we are witnesses. '
  '16':
  - type: text
    content: 'And his name through faith in his name hath made this man strong, whom ye see and know: yea, the faith which is by him hath given him this perfect soundness in the presence of you all. '
  '17':
  - type: text
    content: 'And now, brethren, I wot that through ignorance ye did '
  - type: text
    content: it
  - type: text
    content: ', as '
  - type: text
    content: did
  - type: text
    content: ' also your rulers. '
  '18':
  - type: text
    content: But those things, which God before had shewed by the mouth of all his prophets, that Christ should suffer, he hath so fulfilled.
  '19':
  - type: text
    content: 'Repent ye therefore, and be converted, that your sins may be blotted out, when the times of refreshing shall come from the presence of the Lord; '
  '2':
  - type: text
    content: 'And a certain man lame from his mother''s womb was carried, whom they laid daily at the gate of the temple which is called Beautiful, to ask alms of them that entered into the temple; '
  '20':
  - type: text
    content: 'and he shall send Jesus Christ, which before was preached unto you: '
  '21':
  - type: text
    content: 'whom the heaven must receive until the times of restitution of all things, which God hath spoken by the mouth of all his holy prophets since the world began. '
  '22':
  - type: text
    content: 'For Moses truly said unto the fathers, A prophet shall the Lord your God raise up unto you of your brethren, like unto me; him shall ye hear in all things whatsoever he shall say unto you. '
  '23':
  - type: text
    content: 'And it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ' every soul, which will not hear that prophet, shall be destroyed from among the people. '
  '24':
  - type: text
    content: 'Yea, and all the prophets from Samuel and those that follow after, as many as have spoken, have likewise foretold of these days. '
  '25':
  - type: text
    content: 'Ye are the children of the prophets, and of the covenant which God made with our fathers, saying unto Abraham, And in thy seed shall all the kindreds of the earth be blessed. '
  '26':
  - type: text
    content: Unto you first God, having raised up his Son Jesus, sent him to bless you, in turning away every one of you from his iniquities.
  '3':
  - type: text
    content: 'who seeing Peter and John about to go into the temple asked an alms. '
  '4':
  - type: text
    content: 'And Peter, fastening his eyes upon him with John, said, Look on us. '
  '5':
  - type: text
    content: And he gave heed unto them, expecting to receive something of them.
  '6':
  - type: text
    content: 'Then Peter said, Silver and gold have I none; but such as I have give I thee: In the name of Jesus Christ of Nazareth rise up and walk. '
  '7':
  - type: text
    content: 'And he took him by the right hand, and lifted '
  - type: text
    content: him
  - type: text
    content: ' up: and immediately his feet and ankle bones received strength. '
  '8':
  - type: text
    content: 'And he leaping up stood, and walked, and entered with them into the temple, walking, and leaping, and praising God. '
  '9':
  - type: text
    content: 'And all the people saw him walking and praising God: '
