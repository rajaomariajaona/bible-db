document_id: EPH.2
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Household of God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And you '
  - type: usfm
    marker: add
    children:
    - type: text
      text: hath he quickened
  - type: text
    text: ', who were dead in trespasses and sins; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'wherein in time past ye walked according to the course of this world, according to the prince of the power of the air, the spirit that now worketh in the children of disobedience: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'among whom also we all had our conversation in times past in the lusts of our flesh, fulfilling the desires of the flesh and of the mind; and were by nature the children of wrath, even as others. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But God, who is rich in mercy, for his great love wherewith he loved us, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'even when we were dead in sins, hath quickened us together with Christ, (by grace ye are saved;) '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and hath raised '
  - type: usfm
    marker: add
    children:
    - type: text
      text: us
  - type: text
    text: ' up together, and made '
  - type: usfm
    marker: add
    children:
    - type: text
      text: us
  - type: text
    text: ' sit together in heavenly '
  - type: usfm
    marker: add
    children:
    - type: text
      text: places
  - type: text
    text: ' in Christ Jesus: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'that in the ages to come he might shew the exceeding riches of his grace in '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' kindness toward us through Christ Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For by grace are ye saved through faith; and that not of yourselves: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' the gift of God: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'not of works, lest any man should boast. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For we are his workmanship, created in Christ Jesus unto good works, which God hath before ordained that we should walk in them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Wherefore remember, that ye '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' in time past Gentiles in the flesh, who are called Uncircumcision by that which is called the Circumcision in the flesh made by hands; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'that at that time ye were without Christ, being aliens from the commonwealth of Israel, and strangers from the covenants of promise, having no hope, and without God in the world: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'but now in Christ Jesus ye who sometimes were far off are made nigh by the blood of Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For he is our peace, who hath made both one, and hath broken down the middle wall of partition '
  - type: usfm
    marker: add
    children:
    - type: text
      text: between us
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'having abolished in his flesh the enmity, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the law of commandments '
  - type: usfm
    marker: add
    children:
    - type: text
      text: contained
  - type: text
    text: ' in ordinances; for to make in himself of twain one new man, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' making peace; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and that he might reconcile both unto God in one body by the cross, having slain the enmity thereby: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'and came and preached peace to you which were afar off, and to them that were nigh. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For through him we both have access by one Spirit unto the Father. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now therefore ye are no more strangers and foreigners, but fellowcitizens with the saints, and of the household of God; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'and are built upon the foundation of the apostles and prophets, Jesus Christ himself being the chief corner '
  - type: usfm
    marker: add
    children:
    - type: text
      text: stone
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'in whom all the building fitly framed together groweth unto an holy temple in the Lord: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: in whom ye also are builded together for an habitation of God through the Spirit.
