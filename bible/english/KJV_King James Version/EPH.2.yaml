document_id: EPH.2,1
type_code: eng
verses:
  '1':
  - type: heading
    content: The Household of God
  - type: text
    content: 'And you '
  - type: text
    content: hath he quickened
  - type: text
    content: ', who were dead in trespasses and sins; '
  '10':
  - type: text
    content: For we are his workmanship, created in Christ Jesus unto good works, which God hath before ordained that we should walk in them.
  '11':
  - type: text
    content: 'Wherefore remember, that ye '
  - type: text
    content: being
  - type: text
    content: ' in time past Gentiles in the flesh, who are called Uncircumcision by that which is called the Circumcision in the flesh made by hands; '
  '12':
  - type: text
    content: 'that at that time ye were without Christ, being aliens from the commonwealth of Israel, and strangers from the covenants of promise, having no hope, and without God in the world: '
  '13':
  - type: text
    content: 'but now in Christ Jesus ye who sometimes were far off are made nigh by the blood of Christ. '
  '14':
  - type: text
    content: 'For he is our peace, who hath made both one, and hath broken down the middle wall of partition '
  - type: text
    content: between us
  - type: text
    content: '; '
  '15':
  - type: text
    content: 'having abolished in his flesh the enmity, '
  - type: text
    content: even
  - type: text
    content: ' the law of commandments '
  - type: text
    content: contained
  - type: text
    content: ' in ordinances; for to make in himself of twain one new man, '
  - type: text
    content: so
  - type: text
    content: ' making peace; '
  '16':
  - type: text
    content: 'and that he might reconcile both unto God in one body by the cross, having slain the enmity thereby: '
  '17':
  - type: text
    content: 'and came and preached peace to you which were afar off, and to them that were nigh. '
  '18':
  - type: text
    content: 'For through him we both have access by one Spirit unto the Father. '
  '19':
  - type: text
    content: 'Now therefore ye are no more strangers and foreigners, but fellowcitizens with the saints, and of the household of God; '
  '2':
  - type: text
    content: 'wherein in time past ye walked according to the course of this world, according to the prince of the power of the air, the spirit that now worketh in the children of disobedience: '
  '20':
  - type: text
    content: 'and are built upon the foundation of the apostles and prophets, Jesus Christ himself being the chief corner '
  - type: text
    content: stone
  - type: text
    content: '; '
  '21':
  - type: text
    content: 'in whom all the building fitly framed together groweth unto an holy temple in the Lord: '
  '22':
  - type: text
    content: in whom ye also are builded together for an habitation of God through the Spirit.
  '3':
  - type: text
    content: 'among whom also we all had our conversation in times past in the lusts of our flesh, fulfilling the desires of the flesh and of the mind; and were by nature the children of wrath, even as others. '
  '4':
  - type: text
    content: 'But God, who is rich in mercy, for his great love wherewith he loved us, '
  '5':
  - type: text
    content: 'even when we were dead in sins, hath quickened us together with Christ, (by grace ye are saved;) '
  '6':
  - type: text
    content: 'and hath raised '
  - type: text
    content: us
  - type: text
    content: ' up together, and made '
  - type: text
    content: us
  - type: text
    content: ' sit together in heavenly '
  - type: text
    content: places
  - type: text
    content: ' in Christ Jesus: '
  '7':
  - type: text
    content: 'that in the ages to come he might shew the exceeding riches of his grace in '
  - type: text
    content: his
  - type: text
    content: ' kindness toward us through Christ Jesus. '
  '8':
  - type: text
    content: 'For by grace are ye saved through faith; and that not of yourselves: '
  - type: text
    content: it is
  - type: text
    content: ' the gift of God: '
  '9':
  - type: text
    content: 'not of works, lest any man should boast. '
