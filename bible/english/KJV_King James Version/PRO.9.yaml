document_id: PRO.9,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wisdom hath builded her house,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'She hath hewn out her seven pillars:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the beginning of wisdom:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the knowledge of the holy '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' understanding.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For by me thy days shall be multiplied,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the years of thy life shall be increased.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'If thou be wise, thou shalt be wise for thyself:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: add
      children:
      - type: text
        text: if
    - type: text
      text: ' thou scornest, thou alone shalt bear '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A foolish woman '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' clamorous:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: She is
    - type: text
      text: ' simple, and knoweth nothing.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For she sitteth at the door of her house,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: On a seat in the high places of the city,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To call passengers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Who go right on their ways:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Whoso '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' simple, let him turn in hither:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as for
    - type: text
      text: ' him that wanteth understanding, she saith to him,'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stolen waters are sweet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And bread '
    - type: usfm
      marker: add
      children:
      - type: text
        text: eaten
    - type: text
      text: ' in secret is pleasant.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But he knoweth not that the dead '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' there;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And that
    - type: text
      text: ' her guests '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in the depths of hell.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She hath killed her beasts; she hath mingled her wine;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She hath also furnished her table.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'She hath sent forth her maidens: she crieth'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Upon the highest places of the city,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Whoso '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' simple, let him turn in hither:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: As for
    - type: text
      text: ' him that wanteth understanding, she saith to him,'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come, eat of my bread,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And drink of the wine '
    - type: usfm
      marker: add
      children:
      - type: text
        text: which
    - type: text
      text: ' I have mingled.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Forsake the foolish, and live;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And go in the way of understanding.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He that reproveth a scorner getteth to himself shame:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And he that rebuketh a wicked '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man getteth
    - type: text
      text: ' himself a blot.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Reprove not a scorner, lest he hate thee:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Rebuke a wise man, and he will love thee.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Give '
    - type: usfm
      marker: add
      children:
      - type: text
        text: instruction
    - type: text
      text: ' to a wise '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ', and he will be yet wiser:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Teach a just '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ', and he will increase in learning.'
