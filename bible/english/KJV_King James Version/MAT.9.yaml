document_id: MAT.9
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Forgives Sin
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And he entered into a ship, and passed over, and came into his own city. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And, behold, they brought to him a man sick of the palsy, lying on a bed: and Jesus seeing their faith said unto the sick of the palsy; '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Son, be of good cheer; thy sins be forgiven thee.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And, behold, certain of the scribes said within themselves, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: man
  - type: text
    text: ' blasphemeth. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Jesus knowing their thoughts said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Wherefore think ye evil in your hearts?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For whether is easier, to say, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Thy
    - type: text
      text: ' sins be forgiven thee; or to say, Arise, and walk?'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But that ye may know that the Son of man hath power on earth to forgive sins,
  - type: text
    text: ' (then saith he to the sick of the palsy,) '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Arise, take up thy bed, and go unto thine house.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And he arose, and departed to his house. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But when the multitudes saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', they marvelled, and glorified God, which had given such power unto men.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Calls Publicans and Sinners
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And as Jesus passed forth from thence, he saw a man, named Matthew, sitting at the receipt of custom: and he saith unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Follow me.
  - type: text
    text: ' And he arose, and followed him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And it came to pass, as Jesus sat at meat in the house, behold, many publicans and sinners came and sat down with him and his disciples. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And when the Pharisees saw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', they said unto his disciples, Why eateth your Master with publicans and sinners? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But when Jesus heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ', he said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: They that be whole need not a physician, but they that are sick.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But go ye and learn what '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' meaneth, I will have mercy, and not sacrifice: for I am not come to call the righteous, but sinners to repentance.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Signs of Change
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then came to him the disciples of John, saying, Why do we and the Pharisees fast oft, but thy disciples fast not? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Jesus said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Can the children of the bridechamber mourn, as long as the bridegroom is with them? but the days will come, when the bridegroom shall be taken from them, and then shall they fast
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: No man putteth a piece of new cloth unto an old garment, for that which is put in to fill it up taketh from the garment, and the rent is made worse.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Neither do men put new wine into old bottles: else the bottles break, and the wine runneth out, and the bottles perish: but they put new wine into new bottles, and both are preserved.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Signs of Faith
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'While he spake these things unto them, behold, there came a certain ruler, and worshipped him, saying, My daughter is even now dead: but come and lay thy hand upon her, and she shall live. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And Jesus arose, and followed him, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so did
  - type: text
    text: ' his disciples.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And, behold, a woman, which was diseased with an issue of blood twelve years, came behind '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ', and touched the hem of his garment: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'for she said within herself, If I may but touch his garment, I shall be whole. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But Jesus turned him about, and when he saw her, he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Daughter, be of good comfort; thy faith hath made thee whole.
  - type: text
    text: ' And the woman was made whole from that hour. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And when Jesus came into the ruler''s house, and saw the minstrels and the people making a noise, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'he said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Give place: for the maid is not dead, but sleepeth.'
  - type: text
    text: ' And they laughed him to scorn. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But when the people were put forth, he went in, and took her by the hand, and the maid arose. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: And the fame hereof went abroad into all that land.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And when Jesus departed thence, two blind men followed him, crying, and saying, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Thou
  - type: text
    text: ' Son of David, have mercy on us. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And when he was come into the house, the blind men came to him: and Jesus saith unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Believe ye that I am able to do this?
  - type: text
    text: ' They said unto him, Yea, Lord. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then touched he their eyes, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: According to your faith be it unto you.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And their eyes were opened; and Jesus straitly charged them, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'See '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' no man know '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: But they, when they were departed, spread abroad his fame in all that country.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'As they went out, behold, they brought to him a dumb man possessed with a devil. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And when the devil was cast out, the dumb spake: and the multitudes marvelled, saying, It was never so seen in Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'But the Pharisees said, He casteth out devils through the prince of the devils. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: And Jesus went about all the cities and villages, teaching in their synagogues, and preaching the gospel of the kingdom, and healing every sickness and every disease among the people.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus and His Apostles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'But when he saw the multitudes, he was moved with compassion on them, because they fainted, and were scattered abroad, as sheep having no shepherd. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Then saith he unto his disciples, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'The harvest truly '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' plenteous, but the labourers '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' few;'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pray ye therefore the Lord of the harvest, that he will send forth labourers into his harvest.
