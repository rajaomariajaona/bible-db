    content: 'As they went out, behold, they brought to him a dumb man possessed with a devil. '
  '33':
  - type: text
    content: 'And when the devil was cast out, the dumb spake: and the multitudes marvelled, saying, It was never so seen in Israel. '
  '34':
  - type: text
    content: 'But the Pharisees said, He casteth out devils through the prince of the devils. '
  '35':
  - type: text
    content: And Jesus went about all the cities and villages, teaching in their synagogues, and preaching the gospel of the kingdom, and healing every sickness and every disease among the people.
  - type: heading
    content: Jesus and His Apostles
  '36':
  - type: text
    content: 'But when he saw the multitudes, he was moved with compassion on them, because they fainted, and were scattered abroad, as sheep having no shepherd. '
  '37':
  - type: text
