document_id: EXO.9,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Moses, Go in unto Pharaoh, and tell him, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of the Hebrews, Let my people go, that they may serve me. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they took ashes of the furnace, and stood before Pharaoh; and Moses sprinkled it up toward heaven; and it became a boil breaking forth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' blains upon man, and upon beast. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the magicians could not stand before Moses because of the boils; for the boil was upon the magicians, and upon all the Egyptians. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hardened the heart of Pharaoh, and he hearkened not unto them; as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had spoken unto Moses.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Moses, Rise up early in the morning, and stand before Pharaoh, and say unto him, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God of the Hebrews, Let my people go, that they may serve me. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I will at this time send all my plagues upon thine heart, and upon thy servants, and upon thy people; that thou mayest know that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there is
    - type: text
      text: ' none like me in all the earth. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For now I will stretch out my hand, that I may smite thee and thy people with pestilence; and thou shalt be cut off from the earth. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in very deed for this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: cause
    - type: text
      text: ' have I raised thee up, for to shew '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' thee my power; and that my name may be declared throughout all the earth. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As yet exaltest thou thyself against my people, that thou wilt not let them go? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, to morrow about this time I will cause it to rain a very grievous hail, such as hath not been in Egypt since the foundation thereof even until now. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Send therefore now, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' gather thy cattle, and all that thou hast in the field; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for upon
    - type: text
      text: ' every man and beast which shall be found in the field, and shall not be brought home, the hail shall come down upon them, and they shall die. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if thou refuse to let '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' go, and wilt hold them still, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He that feared the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' among the servants of Pharaoh made his servants and his cattle flee into the houses: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he that regarded not the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' left his servants and his cattle in the field.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Moses, Stretch forth thine hand toward heaven, that there may be hail in all the land of Egypt, upon man, and upon beast, and upon every herb of the field, throughout the land of Egypt. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses stretched forth his rod toward heaven: and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' sent thunder and hail, and the fire ran along upon the ground; and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' rained hail upon the land of Egypt. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So there was hail, and fire mingled with the hail, very grievous, such as there was none like it in all the land of Egypt since it became a nation. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the hail smote throughout all the land of Egypt all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in the field, both man and beast; and the hail smote every herb of the field, and brake every tree of the field. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Only in the land of Goshen, where the children of Israel '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ', was there no hail.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Pharaoh sent, and called for Moses and Aaron, and said unto them, I have sinned this time: the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' righteous, and I and my people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' wicked. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Intreat the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' (for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' enough) that there be no '
    - type: usfm
      marker: add
      children:
      - type: text
        text: more
    - type: text
      text: ' mighty thunderings and hail; and I will let you go, and ye shall stay no longer. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses said unto him, As soon as I am gone out of the city, I will spread abroad my hands unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the thunder shall cease, neither shall there be any more hail; that thou mayest know how that the earth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '''s. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'behold, the hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' is upon thy cattle which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' in the field, upon the horses, upon the asses, upon the camels, upon the oxen, and upon the sheep: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there shall be
    - type: text
      text: ' a very grievous murrain. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But as for thee and thy servants, I know that ye will not yet fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' God. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the flax and the barley was smitten: for the barley '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in the ear, and the flax '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' bolled. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the wheat and the rie were not smitten: for they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' not grown up. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses went out of the city from Pharaoh, and spread abroad his hands unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': and the thunders and hail ceased, and the rain was not poured upon the earth. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Pharaoh saw that the rain and the hail and the thunders were ceased, he sinned yet more, and hardened his heart, he and his servants. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the heart of Pharaoh was hardened, neither would he let the children of Israel go; as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had spoken by Moses.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall sever between the cattle of Israel and the cattle of Egypt: and there shall nothing die of all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is
    - type: text
      text: ' the children''s of Israel. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' appointed a set time, saying, To morrow the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shall do this thing in the land. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' did that thing on the morrow, and all the cattle of Egypt died: but of the cattle of the children of Israel died not one. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Pharaoh sent, and, behold, there was not one of the cattle of the Israelites dead. And the heart of Pharaoh was hardened, and he did not let the people go.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Moses and unto Aaron, Take to you handfuls of ashes of the furnace, and let Moses sprinkle it toward the heaven in the sight of Pharaoh. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall become small dust in all the land of Egypt, and shall be a boil breaking forth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with
    - type: text
      text: ' blains upon man, and upon beast, throughout all the land of Egypt. '
