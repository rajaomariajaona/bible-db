document_id: LUK.13,1
type_code: eng
verses:
  '1':
  - type: heading
    content: A Warning to the Nation
  - type: text
    content: 'There were present at that season some that told him of the Galilæans, whose blood Pilate had mingled with their sacrifices. '
  '10':
  - type: text
    content: And he was teaching in one of the synagogues on the sabbath.
  '11':
  - type: text
    content: 'And, behold, there was a woman which had a spirit of infirmity eighteen years, and was bowed together, and could in no wise lift up '
  - type: text
    content: herself
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'And when Jesus saw her, he called '
  - type: text
    content: her to him
  - type: text
    content: ', and said unto her, '
  - type: text
    content: Woman, thou art loosed from thine infirmity.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'And he laid '
  - type: text
    content: his
  - type: text
    content: ' hands on her: and immediately she was made straight, and glorified God. '
  '14':
  - type: text
    content: 'And the ruler of the synagogue answered with indignation, because that Jesus had healed on the sabbath day, and said unto the people, There are six days in which men ought to work: in them therefore come and be healed, and not on the sabbath day. '
  '15':
  - type: text
    content: 'The Lord then answered him, and said, '
  - type: text
    content: Thou
  - type: text
    content: ' hypocrite, doth not each one of you on the sabbath loose his ox or '
  - type: text
    content: his
  - type: text
    content: ' ass from the stall, and lead '
  - type: text
    content: him
  - type: text
    content: ' away to watering?'
  - type: text
    content: ' '
  '16':
  - type: text
    content: And ought not this woman, being a daughter of Abraham, whom Satan hath bound, lo, these eighteen years, be loosed from this bond on the sabbath day?
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'And when he had said these things, all his adversaries were ashamed: and all the people rejoiced for all the glorious things that were done by him.'
  '18':
  - type: text
    content: 'Then said he, '
  - type: text
    content: Unto what is the kingdom of God like? and whereunto shall I resemble it?
  - type: text
    content: ' '
  '19':
  - type: text
    content: It is like a grain of mustard seed, which a man took, and cast into his garden; and it grew, and waxed a great tree; and the fowls of the air lodged in the branches of it.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And Jesus answering said unto them, '
  - type: text
    content: Suppose ye that these Galilæans were sinners above all the Galilæans, because they suffered such things?
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'And again he said, '
  - type: text
    content: Whereunto shall I liken the kingdom of God?
  - type: text
    content: ' '
  '21':
  - type: text
    content: It is like leaven, which a woman took and hid in three measures of meal, till the whole was leavened.
  - type: text
    content: ' '
  '22':
  - type: text
    content: And he went through the cities and villages, teaching, and journeying toward Jerusalem.
  - type: heading
    content: The Strait Gate
  '23':
  - type: text
    content: 'Then said one unto him, Lord, are there few that be saved? And he said unto them, '
  '24':
  - type: text
    content: 'Strive to enter in at the strait gate: for many, I say unto you, will seek to enter in, and shall not be able.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'When once the master of the house is risen up, and hath shut to the door, and ye begin to stand without, and to knock at the door, saying, Lord, Lord, open unto us; and he shall answer and say unto you, I know you not whence ye are:'
  - type: text
    content: ' '
  '26':
  - type: text
    content: then shall ye begin to say, We have eaten and drunk in thy presence, and thou hast taught in our streets.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'But he shall say, I tell you, I know you not whence ye are; depart from me, all '
  - type: text
    content: ye
  - type: text
    content: ' workers of iniquity.'
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'There shall be weeping and gnashing of teeth, when ye shall see Abraham, and Isaac, and Jacob, and all the prophets, in the kingdom of God, and you '
  - type: text
    content: yourselves
  - type: text
    content: ' thrust out.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'And they shall come from the east, and '
  - type: text
    content: from
  - type: text
    content: ' the west, and from the north, and '
  - type: text
    content: from
  - type: text
    content: ' the south, and shall sit down in the kingdom of God.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'I tell you, Nay: but, except ye repent, ye shall all likewise perish.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: And, behold, there are last which shall be first, and there are first which shall be last.
  '31':
  - type: text
    content: 'The same day there came certain of the Pharisees, saying unto him, Get thee out, and depart hence: for Herod will kill thee. '
  '32':
  - type: text
    content: 'And he said unto them, '
  - type: text
    content: 'Go ye, and tell that fox, Behold, I cast out devils, and I do cures to day and to morrow, and the third '
  - type: text
    content: day
  - type: text
    content: ' I shall be perfected.'
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'Nevertheless I must walk to day, and to morrow, and the '
  - type: text
    content: day
  - type: text
    content: ' following: for it cannot be that a prophet perish out of Jerusalem.'
  - type: heading
    content: Lament over Jerusalem
  '34':
  - type: text
    content: ' '
  - type: text
    content: 'O Jerusalem, Jerusalem, which killest the prophets, and stonest them that are sent unto thee; how often would I have gathered thy children together, as a hen '
  - type: text
    content: doth gather
  - type: text
    content: ' her brood under '
  - type: text
    content: her
  - type: text
    content: ' wings, and ye would not!'
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Behold, your house is left unto you desolate: and verily I say unto you, Ye shall not see me, until '
  - type: text
    content: the time
  - type: text
    content: ' come when ye shall say, Blessed '
  - type: text
    content: is
  - type: text
    content: ' he that cometh in the name of the Lord.'
  '4':
  - type: text
    content: Or those eighteen, upon whom the tower in Siloam fell, and slew them, think ye that they were sinners above all men that dwelt in Jerusalem?
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'I tell you, Nay: but, except ye repent, ye shall all likewise perish.'
  '6':
  - type: text
    content: 'He spake also this parable; '
  - type: text
    content: 'A certain '
  - type: text
    content: man
  - type: text
    content: ' had a fig tree planted in his vineyard; and he came and sought fruit thereon, and found none.'
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Then said he unto the dresser of his vineyard, Behold, these three years I come seeking fruit on this fig tree, and find none: cut it down; why cumbereth it the ground?'
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'And he answering said unto him, Lord, let it alone this year also, till I shall dig about it, and dung '
  - type: text
    content: it
  - type: text
    content: ':'
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'and if it bear fruit, '
  - type: text
    content: well
  - type: text
    content: ': and if not, '
  - type: text
    content: then
  - type: text
    content: ' after that thou shalt cut it down.'
  - type: text
    content: ' '
