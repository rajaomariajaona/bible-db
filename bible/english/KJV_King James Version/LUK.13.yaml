document_id: LUK.13
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: A Warning to the Nation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'There were present at that season some that told him of the Galilæans, whose blood Pilate had mingled with their sacrifices. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Jesus answering said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Suppose ye that these Galilæans were sinners above all the Galilæans, because they suffered such things?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I tell you, Nay: but, except ye repent, ye shall all likewise perish.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Or those eighteen, upon whom the tower in Siloam fell, and slew them, think ye that they were sinners above all men that dwelt in Jerusalem?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I tell you, Nay: but, except ye repent, ye shall all likewise perish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He spake also this parable; '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'A certain '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' had a fig tree planted in his vineyard; and he came and sought fruit thereon, and found none.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Then said he unto the dresser of his vineyard, Behold, these three years I come seeking fruit on this fig tree, and find none: cut it down; why cumbereth it the ground?'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And he answering said unto him, Lord, let it alone this year also, till I shall dig about it, and dung '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ':'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and if it bear fruit, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: well
    - type: text
      text: ': and if not, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: then
    - type: text
      text: ' after that thou shalt cut it down.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And he was teaching in one of the synagogues on the sabbath.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And, behold, there was a woman which had a spirit of infirmity eighteen years, and was bowed together, and could in no wise lift up '
  - type: usfm
    marker: add
    children:
    - type: text
      text: herself
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And when Jesus saw her, he called '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her to him
  - type: text
    text: ', and said unto her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Woman, thou art loosed from thine infirmity.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And he laid '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' hands on her: and immediately she was made straight, and glorified God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And the ruler of the synagogue answered with indignation, because that Jesus had healed on the sabbath day, and said unto the people, There are six days in which men ought to work: in them therefore come and be healed, and not on the sabbath day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The Lord then answered him, and said, '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Thou
    - type: text
      text: ' hypocrite, doth not each one of you on the sabbath loose his ox or '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' ass from the stall, and lead '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' away to watering?'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And ought not this woman, being a daughter of Abraham, whom Satan hath bound, lo, these eighteen years, be loosed from this bond on the sabbath day?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And when he had said these things, all his adversaries were ashamed: and all the people rejoiced for all the glorious things that were done by him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then said he, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Unto what is the kingdom of God like? and whereunto shall I resemble it?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: It is like a grain of mustard seed, which a man took, and cast into his garden; and it grew, and waxed a great tree; and the fowls of the air lodged in the branches of it.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And again he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Whereunto shall I liken the kingdom of God?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: It is like leaven, which a woman took and hid in three measures of meal, till the whole was leavened.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: And he went through the cities and villages, teaching, and journeying toward Jerusalem.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Strait Gate
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then said one unto him, Lord, are there few that be saved? And he said unto them, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Strive to enter in at the strait gate: for many, I say unto you, will seek to enter in, and shall not be able.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'When once the master of the house is risen up, and hath shut to the door, and ye begin to stand without, and to knock at the door, saying, Lord, Lord, open unto us; and he shall answer and say unto you, I know you not whence ye are:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: then shall ye begin to say, We have eaten and drunk in thy presence, and thou hast taught in our streets.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But he shall say, I tell you, I know you not whence ye are; depart from me, all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: ye
    - type: text
      text: ' workers of iniquity.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'There shall be weeping and gnashing of teeth, when ye shall see Abraham, and Isaac, and Jacob, and all the prophets, in the kingdom of God, and you '
    - type: usfm
      marker: add
      children:
      - type: text
        text: yourselves
    - type: text
      text: ' thrust out.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And they shall come from the east, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from
    - type: text
      text: ' the west, and from the north, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: from
    - type: text
      text: ' the south, and shall sit down in the kingdom of God.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And, behold, there are last which shall be first, and there are first which shall be last.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'The same day there came certain of the Pharisees, saying unto him, Get thee out, and depart hence: for Herod will kill thee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And he said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Go ye, and tell that fox, Behold, I cast out devils, and I do cures to day and to morrow, and the third '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' I shall be perfected.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Nevertheless I must walk to day, and to morrow, and the '
    - type: usfm
      marker: add
      children:
      - type: text
        text: day
    - type: text
      text: ' following: for it cannot be that a prophet perish out of Jerusalem.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Lament over Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'O Jerusalem, Jerusalem, which killest the prophets, and stonest them that are sent unto thee; how often would I have gathered thy children together, as a hen '
    - type: usfm
      marker: add
      children:
      - type: text
        text: doth gather
    - type: text
      text: ' her brood under '
    - type: usfm
      marker: add
      children:
      - type: text
        text: her
    - type: text
      text: ' wings, and ye would not!'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Behold, your house is left unto you desolate: and verily I say unto you, Ye shall not see me, until '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the time
    - type: text
      text: ' come when ye shall say, Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' he that cometh in the name of the Lord.'
