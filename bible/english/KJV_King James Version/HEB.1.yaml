document_id: HEB.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'God, who at sundry times and in divers manners spake in time past unto the fathers by the prophets, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'hath in these last days spoken unto us by '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' Son, whom he hath appointed heir of all things, by whom also he made the worlds; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'who being the brightness of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' glory, and the express image of his person, and upholding all things by the word of his power, when he had by himself purged our sins, sat down on the right hand of the Majesty on high; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'being made so much better than the angels, as he hath by inheritance obtained a more excellent name than they. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For unto which of the angels said he at any time,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Thou art my Son,
- type: usfm
  marker: q1
  children:
  - type: text
    text: This day have I begotten thee?
- type: usfm
  marker: m
  children:
  - type: text
    text: And again,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will be to him a Father,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he shall be to me a Son?
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And again, when he bringeth in the firstbegotten into the world, he saith, And let all the angels of God worship him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And of the angels he saith,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who maketh his angels spirits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his ministers a flame of fire.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But unto the Son '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he saith
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Thy throne, O God, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' for ever and ever:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'A sceptre of righteousness '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the sceptre of thy kingdom.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Thou hast loved righteousness, and hated iniquity;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Therefore God, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' thy God, hath anointed thee'
- type: usfm
  marker: q1
  children:
  - type: text
    text: With the oil of gladness above thy fellows.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Thou, Lord, in the beginning hast laid the foundation of the earth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the heavens are the works of thine hands:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'They shall perish; but thou remainest:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they all shall wax old as doth a garment;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And as a vesture shalt thou fold them up,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And they shall be changed:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But thou art the same,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And thy years shall not fail.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But to which of the angels said he at any time,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sit on my right hand,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Until I make thine enemies thy footstool?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Are they not all ministering spirits, sent forth to minister for them who shall be heirs of salvation?
