document_id: HEB.1,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'God, who at sundry times and in divers manners spake in time past unto the fathers by the prophets, '
  '10':
  - type: text
    content: And,
  - type: text
    content: Thou, Lord, in the beginning hast laid the foundation of the earth;
  - type: text
    content: 'And the heavens are the works of thine hands:'
  '11':
  - type: text
    content: 'They shall perish; but thou remainest:'
  - type: text
    content: And they all shall wax old as doth a garment;
  '12':
  - type: text
    content: And as a vesture shalt thou fold them up,
  - type: text
    content: 'And they shall be changed:'
  - type: text
    content: But thou art the same,
  - type: text
    content: And thy years shall not fail.
  '13':
  - type: text
    content: But to which of the angels said he at any time,
  - type: text
    content: Sit on my right hand,
  - type: text
    content: Until I make thine enemies thy footstool?
  '14':
  - type: text
    content: Are they not all ministering spirits, sent forth to minister for them who shall be heirs of salvation?
  '2':
  - type: text
    content: 'hath in these last days spoken unto us by '
  - type: text
    content: his
  - type: text
    content: ' Son, whom he hath appointed heir of all things, by whom also he made the worlds; '
  '3':
  - type: text
    content: 'who being the brightness of '
  - type: text
    content: his
  - type: text
    content: ' glory, and the express image of his person, and upholding all things by the word of his power, when he had by himself purged our sins, sat down on the right hand of the Majesty on high; '
  '4':
  - type: text
    content: 'being made so much better than the angels, as he hath by inheritance obtained a more excellent name than they. '
  '5':
  - type: text
    content: For unto which of the angels said he at any time,
  - type: text
    content: Thou art my Son,
  - type: text
    content: This day have I begotten thee?
  - type: text
    content: And again,
  - type: text
    content: I will be to him a Father,
  - type: text
    content: And he shall be to me a Son?
  '6':
  - type: text
    content: 'And again, when he bringeth in the firstbegotten into the world, he saith, And let all the angels of God worship him. '
  '7':
  - type: text
    content: And of the angels he saith,
  - type: text
    content: Who maketh his angels spirits,
  - type: text
    content: And his ministers a flame of fire.
  '8':
  - type: text
    content: 'But unto the Son '
  - type: text
    content: he saith
  - type: text
    content: ','
  - type: text
    content: 'Thy throne, O God, '
  - type: text
    content: is
  - type: text
    content: ' for ever and ever:'
  - type: text
    content: 'A sceptre of righteousness '
  - type: text
    content: is
  - type: text
    content: ' the sceptre of thy kingdom.'
  '9':
  - type: text
    content: Thou hast loved righteousness, and hated iniquity;
  - type: text
    content: 'Therefore God, '
  - type: text
    content: even
  - type: text
    content: ' thy God, hath anointed thee'
  - type: text
    content: With the oil of gladness above thy fellows.
