document_id: PSA.54
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'To the chief Musician on Neginoth, Maschil, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: A Psalm
  - type: text
    text: ' of David, when the Ziphim came and said to Saul, Doth not David hide himself with us?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Save me, O God, by thy name,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And judge me by thy strength.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hear my prayer, O God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Give ear to the words of my mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For strangers are risen up against me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And oppressors seek after my soul: They have not set God before them. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Behold, God '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' mine helper:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The Lord '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with them that uphold my soul.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He shall reward evil unto mine enemies:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Cut them off in thy truth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I will freely sacrifice unto thee:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I will praise thy name, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; for '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' good.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For he hath delivered me out of all trouble:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And mine eye hath seen '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his desire
  - type: text
    text: ' upon mine enemies.'
