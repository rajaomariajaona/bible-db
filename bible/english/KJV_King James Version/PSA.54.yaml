document_id: PSA.54,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'To the chief Musician on Neginoth, Maschil, '
  - type: text
    content: A Psalm
  - type: text
    content: ' of David, when the Ziphim came and said to Saul, Doth not David hide himself with us?'
  - type: text
    content: Save me, O God, by thy name,
  - type: text
    content: And judge me by thy strength.
  '2':
  - type: text
    content: Hear my prayer, O God;
  - type: text
    content: Give ear to the words of my mouth.
  '3':
  - type: text
    content: For strangers are risen up against me,
  - type: text
    content: 'And oppressors seek after my soul: They have not set God before them. '
  - type: text
    content: Selah.
  '4':
  - type: text
    content: 'Behold, God '
  - type: text
    content: is
  - type: text
    content: ' mine helper:'
  - type: text
    content: 'The Lord '
  - type: text
    content: is
  - type: text
    content: ' with them that uphold my soul.'
  '5':
  - type: text
    content: 'He shall reward evil unto mine enemies:'
  - type: text
    content: Cut them off in thy truth.
  '6':
  - type: text
    content: 'I will freely sacrifice unto thee:'
  - type: text
    content: 'I will praise thy name, O '
  - type: text
    content: LORD
  - type: text
    content: '; for '
  - type: text
    content: it is
  - type: text
    content: ' good.'
  '7':
  - type: text
    content: 'For he hath delivered me out of all trouble:'
  - type: text
    content: 'And mine eye hath seen '
  - type: text
    content: his desire
  - type: text
    content: ' upon mine enemies.'
