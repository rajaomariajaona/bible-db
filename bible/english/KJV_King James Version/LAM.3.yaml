  '2':
  - type: text
    content: 'He hath led me, and brought '
  - type: text
    content: me
  - type: text
    content: Into
  - type: text
    content: ' darkness, but not '
  - type: text
    content: into
  - type: text
    content: ' light.'
  '20':
  - type: text
    content: 'My soul hath '
  - type: text
    content: them
  - type: text
    content: ' still in remembrance,'
  - type: text
    content: And is humbled in me.
  '21':
  - type: text
    content: This I recall to my mind,
  - type: text
    content: Therefore have I hope.
  '22':
