  - type: text
    content: And
  - type: text
    content: ' their song all the day.'
  '15':
  - type: text
    content: He hath filled me with bitterness,
  - type: text
    content: He hath made me drunken with wormwood.
  '16':
  - type: text
    content: He hath also broken my teeth with gravel stones,
  - type: text
    content: He hath covered me with ashes.
  '17':
  - type: text
    content: 'And thou hast removed my soul far off from peace:'
  - type: text
    content: I forgat prosperity.
  '18':
