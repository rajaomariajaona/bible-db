  - type: text
    content: The yoke in his youth.
  '28':
  - type: text
    content: He sitteth alone and keepeth silence,
  - type: text
    content: 'Because he hath borne '
  - type: text
    content: it
  - type: text
    content: ' upon him.'
  '29':
  - type: text
    content: He putteth his mouth in the dust;
  - type: text
    content: If so be there may be hope.
  '3':
  - type: text
    content: Surely against me is he turned; he turneth his hand
  - type: text
    content: Against me
  - type: text
    content: ' all the day.'
  '30':
  - type: text
    content: 'He giveth '
  - type: text
    content: his
  - type: text
    content: ' cheek to him that smiteth him:'
  - type: text
    content: He is filled full with reproach.
  '31':
  - type: text
    content: For the Lord will not
  - type: text
    content: 'Cast off for ever:'
  '32':
  - type: text
    content: But though he cause grief, yet will he have compassion
  - type: text
    content: According to the multitude of his mercies.
  '33':
  - type: text
    content: For he doth not afflict willingly
  - type: text
    content: Nor grieve the children of men.
  '34':
  - type: text
    content: To crush under his feet
  - type: text
    content: All the prisoners of the earth,
  '35':
  - type: text
    content: To turn aside the right of a man
  - type: text
    content: Before the face of the Most High,
  '36':
  - type: text
    content: To subvert a man in his cause,
  - type: text
    content: The Lord approveth not.
  '37':
  - type: text
    content: 'Who '
  - type: text
    content: is
  - type: text
    content: ' he '
  - type: text
    content: that
  - type: text
    content: ' saith, and it cometh to pass,'
  - type: text
    content: When
  - type: text
    content: ' the Lord commandeth '
  - type: text
    content: it
  - type: text
    content: ' not?'
  '38':
  - type: text
    content: Out of the mouth of the Most High
  - type: text
    content: Proceedeth not evil and good?
  '39':
  - type: text
    content: Wherefore doth a living man complain,
  - type: text
    content: A man for the punishment of his sins?
  '4':
  - type: text
    content: My flesh and my skin hath he made old;
  - type: text
    content: He hath broken my bones.
  '40':
  - type: text
    content: Let us search and try our ways,
  - type: text
    content: 'And turn again to the '
  - type: text
    content: LORD
  - type: text
    content: .
  '41':
  - type: text
    content: 'Let us lift up our heart with '
  - type: text
    content: our
  - type: text
    content: ' hands'
  - type: text
    content: Unto God in the heavens.
  '42':
  - type: text
    content: 'We have transgressed and have rebelled:'
  - type: text
    content: Thou hast not pardoned.
  '43':
  - type: text
    content: 'Thou hast covered with anger, and persecuted us:'
  - type: text
    content: Thou hast slain, thou hast not pitied.
  '44':
  - type: text
    content: Thou hast covered thyself with a cloud,
  - type: text
    content: 'That '
  - type: text
    content: our
  - type: text
    content: ' prayer should not pass through.'
  '45':
  - type: text
    content: 'Thou hast made us '
  - type: text
    content: as
  - type: text
    content: ' the offscouring and refuse'
  - type: text
    content: In the midst of the people.
  '46':
  - type: text
    content: All our enemies
  - type: text
    content: Have opened their mouths against us.
  '47':
  - type: text
    content: Fear and a snare is come upon us,
  - type: text
    content: Desolation and destruction.
  '48':
  - type: text
    content: Mine eye runneth down with rivers of water
  - type: text
    content: For the destruction of the daughter of my people.
  '49':
  - type: text
    content: Mine eye trickleth down, and ceaseth not,
  - type: text
    content: Without any intermission,
  '5':
  - type: text
    content: He hath builded against me,
  - type: text
    content: 'And compassed '
  - type: text
    content: me
  - type: text
    content: ' with gall and travail.'
  '50':
  - type: text
    content: 'Till the '
  - type: text
    content: LORD
  - type: text
    content: ' look down,'
  - type: text
    content: And behold from heaven.
  '51':
  - type: text
    content: Mine eye affecteth mine heart
  - type: text
    content: Because of all the daughters of my city.
  '52':
  - type: text
    content: Mine enemies chased me sore, like a bird,
  - type: text
    content: Without cause.
  '53':
  - type: text
    content: They have cut off my life in the dungeon,
  - type: text
    content: And cast a stone upon me.
  '54':
  - type: text
    content: Waters flowed over mine head;
  - type: text
    content: Then
  - type: text
    content: ' I said, I am cut off.'
  '55':
  - type: text
    content: 'I called upon thy name, O '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: Out of the low dungeon.
  '56':
  - type: text
    content: 'Thou hast heard my voice:'
  - type: text
    content: Hide not thine ear at my breathing, at my cry.
  '57':
  - type: text
    content: 'Thou drewest near in the day '
  - type: text
    content: that
  - type: text
    content: ' I called upon thee:'
  - type: text
    content: Thou saidst, Fear not.
  '58':
  - type: text
    content: O Lord, thou hast pleaded the causes of my soul;
  - type: text
    content: Thou hast redeemed my life.
  '59':
  - type: text
    content: 'O '
  - type: text
    content: LORD
  - type: text
    content: ', thou hast seen my wrong:'
  - type: text
    content: Judge thou my cause.
  '6':
  - type: text
    content: He hath set me in dark places,
  - type: text
    content: 'As '
  - type: text
    content: they that be
  - type: text
    content: ' dead of old.'
  '60':
  - type: text
    content: Thou hast seen all their vengeance
  - type: text
    content: And
  - type: text
    content: ' all their imaginations against me.'
  '61':
  - type: text
    content: 'Thou hast heard their reproach, O '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: And
  - type: text
    content: ' all their imaginations against me;'
  '62':
  - type: text
    content: The lips of those that rose up against me,
  - type: text
    content: And their device against me all the day.
  '63':
  - type: text
    content: Behold their sitting down, and their rising up;
  - type: text
    content: 'I '
  - type: text
    content: am
  - type: text
    content: ' their musick.'
  '64':
  - type: text
    content: 'Render unto them a recompence, O '
  - type: text
    content: LORD
  - type: text
    content: ','
  - type: text
    content: According to the work of their hands.
  '65':
  - type: text
    content: Give them sorrow of heart,
  - type: text
    content: Thy curse unto them.
  '66':
  - type: text
    content: Persecute and destroy them in anger
  - type: text
    content: 'From under the heavens of the '
  - type: text
    content: LORD
  - type: text
    content: .
  '7':
  - type: text
    content: 'He hath hedged me about, that I cannot get out:'
  - type: text
    content: He hath made my chain heavy.
  '8':
  - type: text
    content: Also when I cry and shout,
  - type: text
