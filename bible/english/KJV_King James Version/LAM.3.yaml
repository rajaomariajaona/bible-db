document_id: LAM.3,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' hath seen affliction'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: By the rod of his wrath.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' unto me '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' a bear lying in wait,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And as
    - type: text
      text: ' a lion in secret places.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He hath turned aside my ways, and pulled me in pieces:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He hath made me desolate.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He hath bent his bow, and set me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As a mark for the arrow.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He hath caused the arrows of his quiver
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To enter into my reins.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was a derision to all my people;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' their song all the day.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He hath filled me with bitterness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He hath made me drunken with wormwood.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He hath also broken my teeth with gravel stones,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He hath covered me with ashes.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And thou hast removed my soul far off from peace:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I forgat prosperity.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I said, My strength and my hope
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Is perished from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ':'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remembering mine affliction and my misery,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The wormwood and the gall.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He hath led me, and brought '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Into
    - type: text
      text: ' darkness, but not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: into
    - type: text
      text: ' light.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My soul hath '
    - type: usfm
      marker: add
      children:
      - type: text
        text: them
    - type: text
      text: ' still in remembrance,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And is humbled in me.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This I recall to my mind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore have I hope.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is of
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '''s mercies that we are not consumed,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because his compassions fail not.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: They are
    - type: text
      text: ' new every morning:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Great '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' thy faithfulness.'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' my portion, saith my soul;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore will I hope in him.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' good unto them that wait for him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To the soul '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' seeketh him.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' good that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: a man
    - type: text
      text: ' should both hope and quietly'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Wait for the salvation of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: It is
    - type: text
      text: ' good for a man that he bear'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The yoke in his youth.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sitteth alone and keepeth silence,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Because he hath borne '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' upon him.'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He putteth his mouth in the dust;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If so be there may be hope.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surely against me is he turned; he turneth his hand
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Against me
    - type: text
      text: ' all the day.'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He giveth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' cheek to him that smiteth him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He is filled full with reproach.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the Lord will not
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Cast off for ever:'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But though he cause grief, yet will he have compassion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: According to the multitude of his mercies.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he doth not afflict willingly
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor grieve the children of men.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To crush under his feet
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All the prisoners of the earth,
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To turn aside the right of a man
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Before the face of the Most High,
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To subvert a man in his cause,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The Lord approveth not.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' saith, and it cometh to pass,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: When
    - type: text
      text: ' the Lord commandeth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' not?'
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Out of the mouth of the Most High
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Proceedeth not evil and good?
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wherefore doth a living man complain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A man for the punishment of his sins?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My flesh and my skin hath he made old;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He hath broken my bones.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let us search and try our ways,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And turn again to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let us lift up our heart with '
    - type: usfm
      marker: add
      children:
      - type: text
        text: our
    - type: text
      text: ' hands'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Unto God in the heavens.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'We have transgressed and have rebelled:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou hast not pardoned.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou hast covered with anger, and persecuted us:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou hast slain, thou hast not pitied.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thou hast covered thyself with a cloud,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That '
    - type: usfm
      marker: add
      children:
      - type: text
        text: our
    - type: text
      text: ' prayer should not pass through.'
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou hast made us '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' the offscouring and refuse'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the midst of the people.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All our enemies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Have opened their mouths against us.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fear and a snare is come upon us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Desolation and destruction.
  '48':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mine eye runneth down with rivers of water
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For the destruction of the daughter of my people.
  '49':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mine eye trickleth down, and ceaseth not,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Without any intermission,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He hath builded against me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And compassed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: me
    - type: text
      text: ' with gall and travail.'
  '50':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Till the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' look down,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And behold from heaven.
  '51':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mine eye affecteth mine heart
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because of all the daughters of my city.
  '52':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mine enemies chased me sore, like a bird,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Without cause.
  '53':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have cut off my life in the dungeon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And cast a stone upon me.
  '54':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Waters flowed over mine head;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Then
    - type: text
      text: ' I said, I am cut off.'
  '55':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I called upon thy name, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Out of the low dungeon.
  '56':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou hast heard my voice:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Hide not thine ear at my breathing, at my cry.
  '57':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou drewest near in the day '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' I called upon thee:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou saidst, Fear not.
  '58':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Lord, thou hast pleaded the causes of my soul;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thou hast redeemed my life.
  '59':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', thou hast seen my wrong:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Judge thou my cause.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He hath set me in dark places,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'As '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they that be
    - type: text
      text: ' dead of old.'
  '60':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thou hast seen all their vengeance
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' all their imaginations against me.'
  '61':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thou hast heard their reproach, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' all their imaginations against me;'
  '62':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The lips of those that rose up against me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their device against me all the day.
  '63':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold their sitting down, and their rising up;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' their musick.'
  '64':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Render unto them a recompence, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: According to the work of their hands.
  '65':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give them sorrow of heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thy curse unto them.
  '66':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Persecute and destroy them in anger
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'From under the heavens of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He hath hedged me about, that I cannot get out:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He hath made my chain heavy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Also when I cry and shout,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shutteth out my prayer.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He hath inclosed my ways with hewn stone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He hath made my paths crooked.
