verses:
  '1':
  - type: text
    content: 'The Revelation of Jesus Christ, which God gave unto him, to shew unto his servants things which must shortly come to pass; and he sent and signified '
  - type: text
    content: it
  - type: text
    content: ' by his angel unto his servant John: '
  '10':
  - type: text
    content: 'I was in the Spirit on the Lord''s day, and heard behind me a great voice, as of a trumpet, '
  '11':
  - type: text
    content: 'saying, '
  - type: text
    content: 'I am Alpha and Omega, the first and the last: and, What thou seest, write in a book, and send '
  - type: text
    content: it
  - type: text
    content: ' unto the seven churches which are in Asia; unto Ephesus, and unto Smyrna, and unto Pergamos, and unto Thyatira, and unto Sardis, and unto Philadelphia, and unto Laodicea.'
  '12':
  - type: text
    content: 'And I turned to see the voice that spake with me. And being turned, I saw seven golden candlesticks; '
  '13':
  - type: text
    content: 'and in the midst of the seven candlesticks '
  - type: text
    content: one
  - type: text
    content: ' like unto the Son of man, clothed with a garment down to the foot, and girt about the paps with a golden girdle. '
  '14':
  - type: text
    content: 'His head and '
  - type: text
    content: his
  - type: text
    content: ' hairs '
  - type: text
    content: were
  - type: text
    content: ' white like wool, as white as snow; and his eyes '
  - type: text
    content: were
  - type: text
    content: ' as a flame of fire; '
  '15':
  - type: text
    content: 'and his feet like unto fine brass, as if they burned in a furnace; and his voice as the sound of many waters. '
  '16':
  - type: text
    content: 'And he had in his right hand seven stars: and out of his mouth went a sharp twoedged sword: and his countenance '
  - type: text
    content: was
  - type: text
    content: ' as the sun shineth in his strength. '
  '17':
  - type: text
    content: 'And when I saw him, I fell at his feet as dead. And he laid his right hand upon me, saying unto me, '
  - type: text
    content: 'Fear not; I am the first and the last:'
  - type: text
    content: ' '
  '18':
  - type: text
    content: I am
  - type: text
    content: ' he that liveth, and was dead; and, behold, I am alive for evermore, Amen; and have the keys of hell and of death.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: Write the things which thou hast seen, and the things which are, and the things which shall be hereafter;
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'who bare record of the word of God, and of the testimony of Jesus Christ, and of all things that he saw. '
  '20':
  - type: text
    content: 'the mystery of the seven stars which thou sawest in my right hand, and the seven golden candlesticks. The seven stars are the angels of the seven churches: and the seven candlesticks which thou sawest are the seven churches.'
  '3':
  - type: text
    content: 'Blessed '
  - type: text
    content: is
  - type: text
    content: ' he that readeth, and they that hear the words of this prophecy, and keep those things which are written therein: for the time '
  - type: text
    content: is
  - type: text
    content: ' at hand.'
  '4':
  - type: text
    content: 'John to the seven churches which are in Asia: Grace '
  - type: text
    content: be
  - type: text
    content: ' unto you, and peace, from him which is, and which was, and which is to come; and from the seven Spirits which are before his throne; '
  '5':
  - type: text
    content: 'and from Jesus Christ, '
  - type: text
    content: who is
  - type: text
    content: ' the faithful witness, '
  - type: text
    content: and
  - type: text
    content: ' the first begotten of the dead, and the prince of the kings of the earth. Unto him that loved us, and washed us from our sins in his own blood, '
  '6':
