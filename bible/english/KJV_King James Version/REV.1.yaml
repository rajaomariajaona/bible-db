document_id: REV.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Revelation of Jesus Christ, which God gave unto him, to shew unto his servants things which must shortly come to pass; and he sent and signified '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' by his angel unto his servant John: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I was in the Spirit on the Lord''s day, and heard behind me a great voice, as of a trumpet, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I am Alpha and Omega, the first and the last: and, What thou seest, write in a book, and send '
      - type: usfm
        marker: add
        children:
        - type: text
          text: it
      - type: text
        text: ' unto the seven churches which are in Asia; unto Ephesus, and unto Smyrna, and unto Pergamos, and unto Thyatira, and unto Sardis, and unto Philadelphia, and unto Laodicea.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I turned to see the voice that spake with me. And being turned, I saw seven golden candlesticks; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and in the midst of the seven candlesticks '
    - type: usfm
      marker: add
      children:
      - type: text
        text: one
    - type: text
      text: ' like unto the Son of man, clothed with a garment down to the foot, and girt about the paps with a golden girdle. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His head and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' hairs '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' white like wool, as white as snow; and his eyes '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' as a flame of fire; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and his feet like unto fine brass, as if they burned in a furnace; and his voice as the sound of many waters. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he had in his right hand seven stars: and out of his mouth went a sharp twoedged sword: and his countenance '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' as the sun shineth in his strength. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when I saw him, I fell at his feet as dead. And he laid his right hand upon me, saying unto me, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Fear not; I am the first and the last:'
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: add
        children:
        - type: text
          text: I am
      - type: text
        text: ' he that liveth, and was dead; and, behold, I am alive for evermore, Amen; and have the keys of hell and of death.'
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Write the things which thou hast seen, and the things which are, and the things which shall be hereafter;
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'who bare record of the word of God, and of the testimony of Jesus Christ, and of all things that he saw. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'the mystery of the seven stars which thou sawest in my right hand, and the seven golden candlesticks. The seven stars are the angels of the seven churches: and the seven candlesticks which thou sawest are the seven churches.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' he that readeth, and they that hear the words of this prophecy, and keep those things which are written therein: for the time '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' at hand.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'John to the seven churches which are in Asia: Grace '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' unto you, and peace, from him which is, and which was, and which is to come; and from the seven Spirits which are before his throne; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and from Jesus Christ, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: who is
    - type: text
      text: ' the faithful witness, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' the first begotten of the dead, and the prince of the kings of the earth. Unto him that loved us, and washed us from our sins in his own blood, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and hath made us kings and priests unto God and his Father; to him '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' glory and dominion for ever and ever. Amen. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, he cometh with clouds; and every eye shall see him, and they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: also
    - type: text
      text: ' which pierced him: and all kindreds of the earth shall wail because of him. Even so, Amen. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I am Alpha and Omega, the beginning and the ending,
    - type: text
      text: ' saith the Lord, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: which is, and which was, and which is to come, the Almighty.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I John, who also am your brother, and companion in tribulation, and in the kingdom and patience of Jesus Christ, was in the isle that is called Patmos, for the word of God, and for the testimony of Jesus Christ. '
