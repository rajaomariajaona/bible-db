  - type: text
    content: 'Behold, he cometh with clouds; and every eye shall see him, and they '
  - type: text
    content: also
  - type: text
    content: ' which pierced him: and all kindreds of the earth shall wail because of him. Even so, Amen. '
  '8':
  - type: text
    content: I am Alpha and Omega, the beginning and the ending,
  - type: text
    content: ' saith the Lord, '
  - type: text
    content: which is, and which was, and which is to come, the Almighty.
  '9':
  - type: text
    content: 'I John, who also am your brother, and companion in tribulation, and in the kingdom and patience of Jesus Christ, was in the isle that is called Patmos, for the word of God, and for the testimony of Jesus Christ. '
