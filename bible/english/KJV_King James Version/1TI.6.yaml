verses:
  '1':
  - type: text
    content: 'Let as many servants as are under the yoke count their own masters worthy of all honour, that the name of God and '
  - type: text
    content: his
  - type: text
    content: ' doctrine be not blasphemed. '
  '10':
  - type: text
    content: 'For the love of money is the root of all evil: which while some coveted after, they have erred from the faith, and pierced themselves through with many sorrows.'
  - type: heading
    content: Fight the Good Fight
  '11':
  - type: text
    content: 'But thou, O man of God, flee these things; and follow after righteousness, godliness, faith, love, patience, meekness. '
  '12':
  - type: text
    content: 'Fight the good fight of faith, lay hold on eternal life, whereunto thou art also called, and hast professed a good profession before many witnesses. '
  '13':
  - type: text
    content: 'I give thee charge in the sight of God, who quickeneth all things, and '
  - type: text
    content: before
  - type: text
    content: ' Christ Jesus, who before Pontius Pilate witnessed a good confession; '
  '14':
  - type: text
    content: 'that thou keep '
  - type: text
    content: this
  - type: text
    content: ' commandment without spot, unrebukeable, until the appearing of our Lord Jesus Christ: '
  '15':
  - type: text
    content: 'which in his times he shall shew, '
  - type: text
    content: who is
  - type: text
    content: ' the blessed and only Potentate, the King of kings, and Lord of lords; '
  '16':
  - type: text
    content: 'who only hath immortality, dwelling in the light which no man can approach unto; whom no man hath seen, nor can see: to whom '
  - type: text
    content: be
  - type: text
    content: ' honour and power everlasting. Amen.'
  - type: heading
    content: The Use of Riches
  '17':
  - type: text
    content: 'Charge them that are rich in this world, that they be not highminded, nor trust in uncertain riches, but in the living God, who giveth us richly all things to enjoy; '
  '18':
  - type: text
    content: 'that they do good, that they be rich in good works, ready to distribute, willing to communicate; '
  '19':
  - type: text
    content: laying up in store for themselves a good foundation against the time to come, that they may lay hold on eternal life.
  '2':
  - type: text
    content: 'And they that have believing masters, let them not despise '
  - type: text
    content: them
  - type: text
    content: ', because they are brethren; but rather do '
  - type: text
    content: them
  - type: text
    content: ' service, because they are faithful and beloved, partakers of the benefit. These things teach and exhort.'
  '20':
  - type: text
    content: 'O Timothy, keep that which is committed to thy trust, avoiding profane '
  - type: text
    content: and
  - type: text
    content: ' vain babblings, and oppositions of science falsely so called: '
  '21':
  - type: text
    content: 'which some professing have erred concerning the faith. Grace '
  - type: text
    content: be
  - type: text
    content: ' with thee. Amen.'
  - type: text
    content: The first to Timothy was written from Laodicea, which is the chiefest city of Phrygia Pacatiana.
  '3':
  - type: text
    content: 'If any man teach otherwise, and consent not to wholesome words, '
  - type: text
    content: even
  - type: text
    content: ' the words of our Lord Jesus Christ, and to the doctrine which is according to godliness; '
  '4':
  - type: text
    content: 'he is proud, knowing nothing, but doting about questions and strifes of words, whereof cometh envy, strife, railings, evil surmisings, '
  '5':
  - type: text
    content: 'perverse disputings of men of corrupt minds, and destitute of the truth, supposing that gain is godliness: from such withdraw thyself. '
  '6':
  - type: text
    content: 'But godliness with contentment is great gain. '
  '7':
  - type: text
    content: 'For we brought nothing into '
  - type: text
    content: this
  - type: text
    content: ' world, '
  - type: text
    content: and it is
  - type: text
    content: ' certain we can carry nothing out. '
  '8':
  - type: text
    content: 'And having food and raiment let us be therewith content. '
  '9':
  - type: text
    content: 'But they that will be rich fall into temptation and a snare, and '
  - type: text
    content: into
  - type: text
    content: ' many foolish and hurtful lusts, which drown men in destruction and perdition. '
