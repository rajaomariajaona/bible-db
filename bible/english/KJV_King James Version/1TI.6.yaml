document_id: 1TI.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Let as many servants as are under the yoke count their own masters worthy of all honour, that the name of God and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' doctrine be not blasphemed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And they that have believing masters, let them not despise '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ', because they are brethren; but rather do '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' service, because they are faithful and beloved, partakers of the benefit. These things teach and exhort.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'If any man teach otherwise, and consent not to wholesome words, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the words of our Lord Jesus Christ, and to the doctrine which is according to godliness; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'he is proud, knowing nothing, but doting about questions and strifes of words, whereof cometh envy, strife, railings, evil surmisings, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'perverse disputings of men of corrupt minds, and destitute of the truth, supposing that gain is godliness: from such withdraw thyself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But godliness with contentment is great gain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For we brought nothing into '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' world, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and it is
  - type: text
    text: ' certain we can carry nothing out. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And having food and raiment let us be therewith content. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But they that will be rich fall into temptation and a snare, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: into
  - type: text
    text: ' many foolish and hurtful lusts, which drown men in destruction and perdition. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For the love of money is the root of all evil: which while some coveted after, they have erred from the faith, and pierced themselves through with many sorrows.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fight the Good Fight
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But thou, O man of God, flee these things; and follow after righteousness, godliness, faith, love, patience, meekness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fight the good fight of faith, lay hold on eternal life, whereunto thou art also called, and hast professed a good profession before many witnesses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I give thee charge in the sight of God, who quickeneth all things, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: before
  - type: text
    text: ' Christ Jesus, who before Pontius Pilate witnessed a good confession; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'that thou keep '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' commandment without spot, unrebukeable, until the appearing of our Lord Jesus Christ: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'which in his times he shall shew, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: who is
  - type: text
    text: ' the blessed and only Potentate, the King of kings, and Lord of lords; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'who only hath immortality, dwelling in the light which no man can approach unto; whom no man hath seen, nor can see: to whom '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' honour and power everlasting. Amen.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Use of Riches
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Charge them that are rich in this world, that they be not highminded, nor trust in uncertain riches, but in the living God, who giveth us richly all things to enjoy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'that they do good, that they be rich in good works, ready to distribute, willing to communicate; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: laying up in store for themselves a good foundation against the time to come, that they may lay hold on eternal life.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'O Timothy, keep that which is committed to thy trust, avoiding profane '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' vain babblings, and oppositions of science falsely so called: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'which some professing have erred concerning the faith. Grace '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' with thee. Amen.'
- type: usfm
  marker: iex
  children:
  - type: text
    text: The first to Timothy was written from Laodicea, which is the chiefest city of Phrygia Pacatiana.
