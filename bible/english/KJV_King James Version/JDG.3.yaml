document_id: JDG.3,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Now these '
  - type: text
    content: are
  - type: text
    content: ' the nations which the '
  - type: text
    content: LORD
  - type: text
    content: ' left, to prove Israel by them, '
  - type: text
    content: even
  - type: text
    content: ' as many of '
  - type: text
    content: Israel
  - type: text
    content: ' as had not known all the wars of Canaan; '
  '10':
  - type: text
    content: 'And the Spirit of the '
  - type: text
    content: LORD
  - type: text
    content: ' came upon him, and he judged Israel, and went out to war: and the '
  - type: text
    content: LORD
  - type: text
    content: ' delivered Chushan-rishathaim king of Mesopotamia into his hand; and his hand prevailed against Chushan-rishathaim. '
  '11':
  - type: text
    content: And the land had rest forty years. And Othniel the son of Kenaz died.
  - type: heading
    content: Ehud
  '12':
  - type: text
    content: 'And the children of Israel did evil again in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ': and the '
  - type: text
    content: LORD
  - type: text
    content: ' strengthened Eglon the king of Moab against Israel, because they had done evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'And he gathered unto him the children of Ammon and Amalek, and went and smote Israel, and possessed the city of palm trees. '
  '14':
  - type: text
    content: So the children of Israel served Eglon the king of Moab eighteen years.
  '15':
  - type: text
    content: 'But when the children of Israel cried unto the '
  - type: text
    content: LORD
  - type: text
    content: ', the '
  - type: text
    content: LORD
  - type: text
    content: ' raised them up a deliverer, Ehud the son of Gera, a Benjamite, a man lefthanded: and by him the children of Israel sent a present unto Eglon the king of Moab. '
  '16':
  - type: text
    content: 'But Ehud made him a dagger which had two edges, of a cubit length; and he did gird it under his raiment upon his right thigh. '
  '17':
  - type: text
    content: 'And he brought the present unto Eglon king of Moab: and Eglon '
  - type: text
    content: was
  - type: text
    content: ' a very fat man. '
  '18':
  - type: text
    content: 'And when he had made an end to offer the present, he sent away the people that bare the present. '
  '19':
  - type: text
    content: 'But he himself turned again from the quarries that '
  - type: text
    content: were
  - type: text
    content: ' by Gilgal, and said, I have a secret errand unto thee, O king: who said, Keep silence. And all that stood by him went out from him. '
  '2':
  - type: text
    content: 'only that the generations of the children of Israel might know, to teach them war, at the least such as before knew nothing thereof; '
  '20':
  - type: text
    content: 'And Ehud came unto him; and he was sitting in a summer parlour, which he had for himself alone. And Ehud said, I have a message from God unto thee. And he arose out of '
  - type: text
    content: his
  - type: text
    content: ' seat. '
  '21':
  - type: text
    content: 'And Ehud put forth his left hand, and took the dagger from his right thigh, and thrust it into his belly: '
  '22':
  - type: text
    content: 'and the haft also went in after the blade; and the fat closed upon the blade, so that he could not draw the dagger out of his belly; and the dirt came out. '
  '23':
  - type: text
    content: Then Ehud went forth through the porch, and shut the doors of the parlour upon him, and locked them.
  '24':
  - type: text
    content: 'When he was gone out, his servants came; and when they saw that, behold, the doors of the parlour '
  - type: text
    content: were
  - type: text
    content: ' locked, they said, Surely he covereth his feet in his summer chamber. '
  '25':
  - type: text
    content: 'And they tarried till they were ashamed: and, behold, he opened not the doors of the parlour; therefore they took a key, and opened '
  - type: text
    content: 'them:'
  - type: text
    content: ' and, behold, their lord '
  - type: text
    content: was
  - type: text
    content: ' fallen down dead on the earth.'
  '26':
  - type: text
    content: 'And Ehud escaped while they tarried, and passed beyond the quarries, and escaped unto Seirath. '
  '27':
  - type: text
    content: 'And it came to pass, when he was come, that he blew a trumpet in the mountain of Ephraim, and the children of Israel went down with him from the mount, and he before them. '
  '28':
  - type: text
    content: 'And he said unto them, Follow after me: for the '
  - type: text
    content: LORD
  - type: text
    content: ' hath delivered your enemies the Moabites into your hand. And they went down after him, and took the fords of Jordan toward Moab, and suffered not a man to pass over. '
  '29':
  - type: text
    content: 'And they slew of Moab at that time about ten thousand men, all lusty, and all men of valour; and there escaped not a man. '
  '3':
  - type: text
    content: namely
  - type: text
    content: ', five lords of the Philistines, and all the Canaanites, and the Sidonians, and the Hivites that dwelt in mount Lebanon, from mount Baal-hermon unto the entering in of Hamath. '
  '30':
  - type: text
    content: So Moab was subdued that day under the hand of Israel. And the land had rest fourscore years.
  '31':
  - type: text
    content: 'And after him was Shamgar the son of Anath, which slew of the Philistines six hundred men with an ox goad: and he also delivered Israel.'
  '4':
  - type: text
    content: 'And they were to prove Israel by them, to know whether they would hearken unto the commandments of the '
  - type: text
    content: LORD
  - type: text
    content: ', which he commanded their fathers by the hand of Moses. '
  '5':
  - type: text
    content: 'And the children of Israel dwelt among the Canaanites, Hittites, and Amorites, and Perizzites, and Hivites, and Jebusites: '
  '6':
  - type: text
    content: and they took their daughters to be their wives, and gave their daughters to their sons, and served their gods.
  - type: heading
    content: Othniel
  '7':
  - type: text
    content: 'And the children of Israel did evil in the sight of the '
  - type: text
    content: LORD
  - type: text
    content: ', and forgat the '
  - type: text
    content: LORD
  - type: text
    content: ' their God, and served Baalim and the groves. '
  '8':
  - type: text
    content: 'Therefore the anger of the '
  - type: text
    content: LORD
  - type: text
    content: ' was hot against Israel, and he sold them into the hand of Chushan-rishathaim king of Mesopotamia: and the children of Israel served Chushan-rishathaim eight years. '
  '9':
  - type: text
    content: 'And when the children of Israel cried unto the '
  - type: text
    content: LORD
  - type: text
    content: ', the '
  - type: text
    content: LORD
  - type: text
    content: ' raised up a deliverer to the children of Israel, who delivered them, '
  - type: text
    content: even
  - type: text
    content: ' Othniel the son of Kenaz, Caleb''s younger brother. '
