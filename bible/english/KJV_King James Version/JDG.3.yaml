document_id: JDG.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the nations which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' left, to prove Israel by them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' as many of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Israel
  - type: text
    text: ' as had not known all the wars of Canaan; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'only that the generations of the children of Israel might know, to teach them war, at the least such as before knew nothing thereof; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: add
    children:
    - type: text
      text: namely
  - type: text
    text: ', five lords of the Philistines, and all the Canaanites, and the Sidonians, and the Hivites that dwelt in mount Lebanon, from mount Baal-hermon unto the entering in of Hamath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And they were to prove Israel by them, to know whether they would hearken unto the commandments of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', which he commanded their fathers by the hand of Moses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the children of Israel dwelt among the Canaanites, Hittites, and Amorites, and Perizzites, and Hivites, and Jebusites: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: and they took their daughters to be their wives, and gave their daughters to their sons, and served their gods.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Othniel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the children of Israel did evil in the sight of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and forgat the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' their God, and served Baalim and the groves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Therefore the anger of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' was hot against Israel, and he sold them into the hand of Chushan-rishathaim king of Mesopotamia: and the children of Israel served Chushan-rishathaim eight years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And when the children of Israel cried unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' raised up a deliverer to the children of Israel, who delivered them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' Othniel the son of Kenaz, Caleb''s younger brother. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the Spirit of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' came upon him, and he judged Israel, and went out to war: and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' delivered Chushan-rishathaim king of Mesopotamia into his hand; and his hand prevailed against Chushan-rishathaim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And the land had rest forty years. And Othniel the son of Kenaz died.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ehud
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And the children of Israel did evil again in the sight of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' strengthened Eglon the king of Moab against Israel, because they had done evil in the sight of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And he gathered unto him the children of Ammon and Amalek, and went and smote Israel, and possessed the city of palm trees. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: So the children of Israel served Eglon the king of Moab eighteen years.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But when the children of Israel cried unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' raised them up a deliverer, Ehud the son of Gera, a Benjamite, a man lefthanded: and by him the children of Israel sent a present unto Eglon the king of Moab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But Ehud made him a dagger which had two edges, of a cubit length; and he did gird it under his raiment upon his right thigh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And he brought the present unto Eglon king of Moab: and Eglon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' a very fat man. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And when he had made an end to offer the present, he sent away the people that bare the present. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But he himself turned again from the quarries that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' by Gilgal, and said, I have a secret errand unto thee, O king: who said, Keep silence. And all that stood by him went out from him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Ehud came unto him; and he was sitting in a summer parlour, which he had for himself alone. And Ehud said, I have a message from God unto thee. And he arose out of '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' seat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And Ehud put forth his left hand, and took the dagger from his right thigh, and thrust it into his belly: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'and the haft also went in after the blade; and the fat closed upon the blade, so that he could not draw the dagger out of his belly; and the dirt came out. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Then Ehud went forth through the porch, and shut the doors of the parlour upon him, and locked them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'When he was gone out, his servants came; and when they saw that, behold, the doors of the parlour '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' locked, they said, Surely he covereth his feet in his summer chamber. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And they tarried till they were ashamed: and, behold, he opened not the doors of the parlour; therefore they took a key, and opened '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'them:'
  - type: text
    text: ' and, behold, their lord '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' fallen down dead on the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And Ehud escaped while they tarried, and passed beyond the quarries, and escaped unto Seirath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And it came to pass, when he was come, that he blew a trumpet in the mountain of Ephraim, and the children of Israel went down with him from the mount, and he before them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And he said unto them, Follow after me: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath delivered your enemies the Moabites into your hand. And they went down after him, and took the fords of Jordan toward Moab, and suffered not a man to pass over. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And they slew of Moab at that time about ten thousand men, all lusty, and all men of valour; and there escaped not a man. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: So Moab was subdued that day under the hand of Israel. And the land had rest fourscore years.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And after him was Shamgar the son of Anath, which slew of the Philistines six hundred men with an ox goad: and he also delivered Israel.'
