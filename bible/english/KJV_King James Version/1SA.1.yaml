  '1':
  - type: text
    content: 'Now there was a certain man of Ramathaim-zophim, of mount Ephraim, and his name '
  - type: text
    content: was
  - type: text
    content: ' Elkanah, the son of Jeroham, the son of Elihu, the son of Tohu, the son of Zuph, an Ephrathite: '
  '10':
  - type: text
    content: 'And she '
  - type: text
    content: was
  - type: text
    content: ' in bitterness of soul, and prayed unto the '
  - type: text
    content: LORD
  - type: text
    content: ', and wept sore. '
  '11':
  - type: text
    content: 'And she vowed a vow, and said, O '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts, if thou wilt indeed look on the affliction of thine handmaid, and remember me, and not forget thine handmaid, but wilt give unto thine handmaid a man child, then I will give him unto the '
  - type: text
    content: LORD
  - type: text
    content: ' all the days of his life, and there shall no razor come upon his head.'
  '12':
  - type: text
    content: 'And it came to pass, as she continued praying before the '
  - type: text
    content: LORD
  - type: text
    content: ', that Eli marked her mouth. '
  '13':
  - type: text
    content: 'Now Hannah, she spake in her heart; only her lips moved, but her voice was not heard: therefore Eli thought she had been drunken. '
  '14':
  - type: text
    content: 'And Eli said unto her, How long wilt thou be drunken? put away thy wine from thee. '
  '15':
  - type: text
    content: 'And Hannah answered and said, No, my lord, I '
  - type: text
    content: am
  - type: text
    content: ' a woman of a sorrowful spirit: I have drunk neither wine nor strong drink, but have poured out my soul before the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Count not thine handmaid for a daughter of Belial: for out of the abundance of my complaint and grief have I spoken hitherto. '
  '17':
  - type: text
    content: 'Then Eli answered and said, Go in peace: and the God of Israel grant '
  - type: text
    content: thee
  - type: text
    content: ' thy petition that thou hast asked of him. '
  '18':
  - type: text
    content: 'And she said, Let thine handmaid find grace in thy sight. So the woman went her way, and did eat, and her countenance was no more '
  - type: text
    content: sad
  - type: text
    content: .
  '19':
  - type: text
    content: 'And they rose up in the morning early, and worshipped before the '
  - type: text
    content: LORD
  - type: text
    content: ', and returned, and came to their house to Ramah: and Elkanah knew Hannah his wife; and the '
  - type: text
    content: LORD
  - type: text
    content: ' remembered her. '
  '2':
  - type: text
    content: 'and he had two wives; the name of the one '
  - type: text
    content: was
  - type: text
    content: ' Hannah, and the name of the other Peninnah: and Peninnah had children, but Hannah had no children. '
  '20':
  - type: text
    content: 'Wherefore it came to pass, when the time was come about after Hannah had conceived, that she bare a son, and called his name Samuel, '
  - type: text
    content: saying
  - type: text
    content: ', Because I have asked him of the '
  - type: text
    content: LORD
  - type: text
    content: .
  '21':
  - type: text
    content: 'And the man Elkanah, and all his house, went up to offer unto the '
  - type: text
    content: LORD
  - type: text
    content: ' the yearly sacrifice, and his vow. '
  '22':
  - type: text
    content: 'But Hannah went not up; for she said unto her husband, '
  - type: text
    content: I will not go up
  - type: text
    content: ' until the child be weaned, and '
  - type: text
    content: then
  - type: text
    content: ' I will bring him, that he may appear before the '
  - type: text
    content: LORD
  - type: text
    content: ', and there abide for ever. '
  '23':
  - type: text
    content: 'And Elkanah her husband said unto her, Do what seemeth thee good; tarry until thou have weaned him; only the '
  - type: text
    content: LORD
  - type: text
    content: ' establish his word. So the woman abode, and gave her son suck until she weaned him. '
  '24':
  - type: text
    content: 'And when she had weaned him, she took him up with her, with three bullocks, and one ephah of flour, and a bottle of wine, and brought him unto the house of the '
  - type: text
    content: LORD
  - type: text
    content: ' in Shiloh: and the child '
  - type: text
    content: was
  - type: text
    content: ' young. '
  '25':
  - type: text
    content: 'And they slew a bullock, and brought the child to Eli. '
  '26':
  - type: text
    content: 'And she said, Oh my lord, '
  - type: text
    content: as
  - type: text
    content: ' thy soul liveth, my lord, I '
  - type: text
    content: am
  - type: text
    content: ' the woman that stood by thee here, praying unto the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'For this child I prayed; and the '
  - type: text
    content: LORD
  - type: text
    content: ' hath given me my petition which I asked of him: '
  '28':
  - type: text
    content: 'therefore also I have lent him to the '
  - type: text
    content: LORD
  - type: text
    content: '; as long as he liveth he shall be lent to the '
  - type: text
    content: LORD
  - type: text
    content: '. And he worshipped the '
  - type: text
    content: LORD
  - type: text
    content: ' there.'
  '3':
  - type: text
    content: 'And this man went up out of his city yearly to worship and to sacrifice unto the '
  - type: text
    content: LORD
  - type: text
    content: ' of hosts in Shiloh. And the two sons of Eli, Hophni and Phinehas, the priests of the '
  - type: text
    content: LORD
  - type: text
    content: ', '
  - type: text
    content: were
  - type: text
    content: ' there. '
  '4':
  - type: text
    content: 'And when the time was that Elkanah offered, he gave to Peninnah his wife, and to all her sons and her daughters, portions: '
  '5':
  - type: text
    content: 'but unto Hannah he gave a worthy portion; for he loved Hannah: but the '
  - type: text
    content: LORD
  - type: text
    content: ' had shut up her womb. '
  '6':
  - type: text
    content: 'And her adversary also provoked her sore, for to make her fret, because the '
  - type: text
    content: LORD
  - type: text
    content: ' had shut up her womb. '
  '7':
  - type: text
    content: 'And '
  - type: text
    content: as
  - type: text
    content: ' he did so year by year, when she went up to the house of the '
  - type: text
    content: LORD
  - type: text
    content: ', so she provoked her; therefore she wept, and did not eat. '
  '8':
  - type: text
    content: 'Then said Elkanah her husband to her, Hannah, why weepest thou? and why eatest thou not? and why is thy heart grieved? '
  - type: text
    content: am
  - type: text
    content: ' not I better to thee than ten sons?'
  - type: heading
    content: Hannah's Prayer
  '9':
  - type: text
    content: 'So Hannah rose up after they had eaten in Shiloh, and after they had drunk. Now Eli the priest sat upon a seat by a post of the temple of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
