document_id: 1SA.1,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now there was a certain man of Ramathaim-zophim, of mount Ephraim, and his name '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Elkanah, the son of Jeroham, the son of Elihu, the son of Tohu, the son of Zuph, an Ephrathite: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And she '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in bitterness of soul, and prayed unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and wept sore. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And she vowed a vow, and said, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts, if thou wilt indeed look on the affliction of thine handmaid, and remember me, and not forget thine handmaid, but wilt give unto thine handmaid a man child, then I will give him unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' all the days of his life, and there shall no razor come upon his head.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And it came to pass, as she continued praying before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', that Eli marked her mouth. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Now Hannah, she spake in her heart; only her lips moved, but her voice was not heard: therefore Eli thought she had been drunken. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And Eli said unto her, How long wilt thou be drunken? put away thy wine from thee. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And Hannah answered and said, No, my lord, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' a woman of a sorrowful spirit: I have drunk neither wine nor strong drink, but have poured out my soul before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Count not thine handmaid for a daughter of Belial: for out of the abundance of my complaint and grief have I spoken hitherto. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then Eli answered and said, Go in peace: and the God of Israel grant '
    - type: usfm
      marker: add
      children:
      - type: text
        text: thee
    - type: text
      text: ' thy petition that thou hast asked of him. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And she said, Let thine handmaid find grace in thy sight. So the woman went her way, and did eat, and her countenance was no more '
    - type: usfm
      marker: add
      children:
      - type: text
        text: sad
    - type: text
      text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And they rose up in the morning early, and worshipped before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and returned, and came to their house to Ramah: and Elkanah knew Hannah his wife; and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' remembered her. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'and he had two wives; the name of the one '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' Hannah, and the name of the other Peninnah: and Peninnah had children, but Hannah had no children. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Wherefore it came to pass, when the time was come about after Hannah had conceived, that she bare a son, and called his name Samuel, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: saying
    - type: text
      text: ', Because I have asked him of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And the man Elkanah, and all his house, went up to offer unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' the yearly sacrifice, and his vow. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'But Hannah went not up; for she said unto her husband, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: I will not go up
    - type: text
      text: ' until the child be weaned, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: then
    - type: text
      text: ' I will bring him, that he may appear before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and there abide for ever. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And Elkanah her husband said unto her, Do what seemeth thee good; tarry until thou have weaned him; only the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' establish his word. So the woman abode, and gave her son suck until she weaned him. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And when she had weaned him, she took him up with her, with three bullocks, and one ephah of flour, and a bottle of wine, and brought him unto the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in Shiloh: and the child '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' young. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And they slew a bullock, and brought the child to Eli. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And she said, Oh my lord, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' thy soul liveth, my lord, I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' the woman that stood by thee here, praying unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'For this child I prayed; and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' hath given me my petition which I asked of him: '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'therefore also I have lent him to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '; as long as he liveth he shall be lent to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. And he worshipped the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' there.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And this man went up out of his city yearly to worship and to sacrifice unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' of hosts in Shiloh. And the two sons of Eli, Hophni and Phinehas, the priests of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' there. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And when the time was that Elkanah offered, he gave to Peninnah his wife, and to all her sons and her daughters, portions: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'but unto Hannah he gave a worthy portion; for he loved Hannah: but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had shut up her womb. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And her adversary also provoked her sore, for to make her fret, because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' had shut up her womb. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: as
    - type: text
      text: ' he did so year by year, when she went up to the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', so she provoked her; therefore she wept, and did not eat. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then said Elkanah her husband to her, Hannah, why weepest thou? and why eatest thou not? and why is thy heart grieved? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: am
    - type: text
      text: ' not I better to thee than ten sons?'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Hannah's Prayer
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'So Hannah rose up after they had eaten in Shiloh, and after they had drunk. Now Eli the priest sat upon a seat by a post of the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
