document_id: 2KI.4
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Vessels of Oil
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now there cried a certain woman of the wives of the sons of the prophets unto Elisha, saying, Thy servant my husband is dead; and thou knowest that thy servant did fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': and the creditor is come to take unto him my two sons to be bondmen. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Elisha said unto her, What shall I do for thee? tell me, what hast thou in the house? And she said, Thine handmaid hath not any thing in the house, save a pot of oil. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then he said, Go, borrow thee vessels abroad of all thy neighbours, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' empty vessels; borrow not a few. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And when thou art come in, thou shalt shut the door upon thee and upon thy sons, and shalt pour out into all those vessels, and thou shalt set aside that which is full. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So she went from him, and shut the door upon her and upon her sons, who brought '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the vessels
  - type: text
    text: ' to her; and she poured out. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And it came to pass, when the vessels were full, that she said unto her son, Bring me yet a vessel. And he said unto her, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: There is
  - type: text
    text: ' not a vessel more. And the oil stayed. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then she came and told the man of God. And he said, Go, sell the oil, and pay thy debt, and live thou and thy children of the rest.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Shunammite's Son
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And it fell on a day, that Elisha passed to Shunem, where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' a great woman; and she constrained him to eat bread. And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' it was, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' as oft as he passed by, he turned in thither to eat bread. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And she said unto her husband, Behold now, I perceive that this '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' an holy man of God, which passeth by us continually. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Let us make a little chamber, I pray thee, on the wall; and let us set for him there a bed, and a table, and a stool, and a candlestick: and it shall be, when he cometh to us, that he shall turn in thither. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And it fell on a day, that he came thither, and he turned into the chamber, and lay there. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And he said to Gehazi his servant, Call this Shunammite. And when he had called her, she stood before him. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And he said unto him, Say now unto her, Behold, thou hast been careful for us with all this care; what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' to be done for thee? wouldest thou be spoken for to the king, or to the captain of the host? And she answered, I dwell among mine own people. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And he said, What then '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' to be done for her? And Gehazi answered, Verily she hath no child, and her husband is old. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And he said, Call her. And when he had called her, she stood in the door. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And he said, About this season, according to the time of life, thou shalt embrace a son. And she said, Nay, my lord, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thou
  - type: text
    text: ' man of God, do not lie unto thine handmaid. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And the woman conceived, and bare a son at that season that Elisha had said unto her, according to the time of life.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And when the child was grown, it fell on a day, that he went out to his father to the reapers. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And he said unto his father, My head, my head. And he said to a lad, Carry him to his mother. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And when he had taken him, and brought him to his mother, he sat on her knees till noon, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: then
  - type: text
    text: ' died. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And she went up, and laid him on the bed of the man of God, and shut '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the door
  - type: text
    text: ' upon him, and went out. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And she called unto her husband, and said, Send me, I pray thee, one of the young men, and one of the asses, that I may run to the man of God, and come again. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And he said, Wherefore wilt thou go to him to day? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it is
  - type: text
    text: ' neither new moon, nor sabbath. And she said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It shall be
  - type: text
    text: ' well. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then she saddled an ass, and said to her servant, Drive, and go forward; slack not '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thy
  - type: text
    text: ' riding for me, except I bid thee. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: So she went and came unto the man of God to mount Carmel.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And it came to pass, when the man of God saw her afar off, that he said to Gehazi his servant, Behold, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: yonder is
  - type: text
    text: ' that Shunammite: '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'run now, I pray thee, to meet her, and say unto her, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: Is it
  - type: text
    text: ' well with thee? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is it
  - type: text
    text: ' well with thy husband? '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is it
  - type: text
    text: ' well with the child? And she answered, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' well. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And when she came to the man of God to the hill, she caught him by the feet: but Gehazi came near to thrust her away. And the man of God said, Let her alone; for her soul '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' vexed within her: and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath hid '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' from me, and hath not told me. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then she said, Did I desire a son of my lord? did I not say, Do not deceive me? '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then he said to Gehazi, Gird up thy loins, and take my staff in thine hand, and go thy way: if thou meet any man, salute him not; and if any salute thee, answer him not again: and lay my staff upon the face of the child. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And the mother of the child said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' liveth, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' thy soul liveth, I will not leave thee. And he arose, and followed her. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And Gehazi passed on before them, and laid the staff upon the face of the child; but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' neither voice, nor hearing. Wherefore he went again to meet him, and told him, saying, The child is not awaked.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And when Elisha was come into the house, behold, the child was dead, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' laid upon his bed. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'He went in therefore, and shut the door upon them twain, and prayed unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And he went up, and lay upon the child, and put his mouth upon his mouth, and his eyes upon his eyes, and his hands upon his hands: and he stretched himself upon the child; and the flesh of the child waxed warm. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Then he returned, and walked in the house to and fro; and went up, and stretched himself upon him: and the child sneezed seven times, and the child opened his eyes. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And he called Gehazi, and said, Call this Shunammite. So he called her. And when she was come in unto him, he said, Take up thy son. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Then she went in, and fell at his feet, and bowed herself to the ground, and took up her son, and went out.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And Elisha came again to Gilgal: and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' a dearth in the land; and the sons of the prophets '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' sitting before him: and he said unto his servant, Set on the great pot, and seethe pottage for the sons of the prophets. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And one went out into the field to gather herbs, and found a wild vine, and gathered thereof wild gourds his lap full, and came and shred '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' into the pot of pottage: for they knew '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' not. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'So they poured out for the men to eat. And it came to pass, as they were eating of the pottage, that they cried out, and said, O '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thou
  - type: text
    text: ' man of God, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' death in the pot. And they could not eat '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thereof
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'But he said, Then bring meal. And he cast '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' into the pot; and he said, Pour out for the people, that they may eat. And there was no harm in the pot.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And there came a man from Baal-shalisha, and brought the man of God bread of the firstfruits, twenty loaves of barley, and full ears of corn in the husk thereof. And he said, Give unto the people, that they may eat. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'And his servitor said, What, should I set this before an hundred men? He said again, Give the people, that they may eat: for thus saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', They shall eat, and shall leave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thereof
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'So he set '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' before them, and they did eat, and left '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thereof
  - type: text
    text: ', according to the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: .
