verses:
  '1':
  - type: text
    content: 'Who hath believed our report? and to whom is the arm of the '
  - type: text
    content: LORD
  - type: text
    content: ' revealed? '
  '10':
  - type: text
    content: 'Yet it pleased the '
  - type: text
    content: LORD
  - type: text
    content: ' to bruise him; he hath put '
  - type: text
    content: him
  - type: text
    content: ' to grief: when thou shalt make his soul an offering for sin, he shall see '
  - type: text
    content: his
  - type: text
    content: ' seed, he shall prolong '
  - type: text
    content: his
  - type: text
    content: ' days, and the pleasure of the '
  - type: text
    content: LORD
  - type: text
    content: ' shall prosper in his hand. '
  '11':
  - type: text
    content: 'He shall see of the travail of his soul, '
  - type: text
    content: and
  - type: text
    content: ' shall be satisfied: by his knowledge shall my righteous servant justify many; for he shall bear their iniquities. '
  '12':
  - type: text
    content: 'Therefore will I divide him '
  - type: text
    content: a portion
  - type: text
    content: ' with the great, and he shall divide the spoil with the strong; because he hath poured out his soul unto death: and he was numbered with the transgressors; and he bare the sin of many, and made intercession for the transgressors.'
  '2':
  - type: text
    content: 'For he shall grow up before him as a tender plant, and as a root out of a dry ground: he hath no form nor comeliness; and when we shall see him, '
  - type: text
    content: there is
  - type: text
    content: ' no beauty that we should desire him. '
  '3':
  - type: text
    content: 'He is despised and rejected of men; a man of sorrows, and acquainted with grief: and we hid as it were '
  - type: text
    content: our
  - type: text
    content: ' faces from him; he was despised, and we esteemed him not.'
  '4':
  - type: text
    content: 'Surely he hath borne our griefs, and carried our sorrows: yet we did esteem him stricken, smitten of God, and afflicted. '
  '5':
  - type: text
    content: 'But he '
  - type: text
    content: was
  - type: text
    content: ' wounded for our transgressions, '
  - type: text
    content: he was
  - type: text
    content: ' bruised for our iniquities: the chastisement of our peace '
  - type: text
    content: was
  - type: text
    content: ' upon him; and with his stripes we are healed. '
  '6':
  - type: text
    content: 'All we like sheep have gone astray; we have turned every one to his own way; and the '
  - type: text
    content: LORD
  - type: text
    content: ' hath laid on him the iniquity of us all.'
  '7':
  - type: text
    content: 'He was oppressed, and he was afflicted, yet he opened not his mouth: he is brought as a lamb to the slaughter, and as a sheep before her shearers is dumb, so he openeth not his mouth. '
  '8':
  - type: text
    content: 'He was taken from prison and from judgment: and who shall declare his generation? for he was cut off out of the land of the living: for the transgression of my people was he stricken. '
  '9':
  - type: text
    content: 'And he made his grave with the wicked, and with the rich in his death; because he had done no violence, neither '
  - type: text
    content: was any
  - type: text
    content: ' deceit in his mouth.'
