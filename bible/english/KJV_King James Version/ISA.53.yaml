document_id: ISA.53
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Who hath believed our report? and to whom is the arm of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' revealed? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For he shall grow up before him as a tender plant, and as a root out of a dry ground: he hath no form nor comeliness; and when we shall see him, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' no beauty that we should desire him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He is despised and rejected of men; a man of sorrows, and acquainted with grief: and we hid as it were '
  - type: usfm
    marker: add
    children:
    - type: text
      text: our
  - type: text
    text: ' faces from him; he was despised, and we esteemed him not.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Surely he hath borne our griefs, and carried our sorrows: yet we did esteem him stricken, smitten of God, and afflicted. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But he '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' wounded for our transgressions, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: he was
  - type: text
    text: ' bruised for our iniquities: the chastisement of our peace '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' upon him; and with his stripes we are healed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'All we like sheep have gone astray; we have turned every one to his own way; and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath laid on him the iniquity of us all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He was oppressed, and he was afflicted, yet he opened not his mouth: he is brought as a lamb to the slaughter, and as a sheep before her shearers is dumb, so he openeth not his mouth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He was taken from prison and from judgment: and who shall declare his generation? for he was cut off out of the land of the living: for the transgression of my people was he stricken. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And he made his grave with the wicked, and with the rich in his death; because he had done no violence, neither '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was any
  - type: text
    text: ' deceit in his mouth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Yet it pleased the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' to bruise him; he hath put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' to grief: when thou shalt make his soul an offering for sin, he shall see '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' seed, he shall prolong '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' days, and the pleasure of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' shall prosper in his hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He shall see of the travail of his soul, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' shall be satisfied: by his knowledge shall my righteous servant justify many; for he shall bear their iniquities. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Therefore will I divide him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: a portion
  - type: text
    text: ' with the great, and he shall divide the spoil with the strong; because he hath poured out his soul unto death: and he was numbered with the transgressors; and he bare the sin of many, and made intercession for the transgressors.'
