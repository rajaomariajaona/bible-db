document_id: ISA.38,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Hezekiah's Sickness
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In those days was Hezekiah sick unto death. And Isaiah the prophet the son of Amoz came unto him, and said unto him, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', Set thine house in order: for thou shalt die, and not live. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'I said in the cutting off of my days, I shall go to the gates of the grave:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am deprived of the residue of my years.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'I said, I shall not see the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', in the land of the living:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I shall behold man no more with the inhabitants of the world.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Mine age is departed, and is removed from me as a shepherd''s tent:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I have cut off like a weaver my life: he will cut me off with pining sickness:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'From day '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' to night wilt thou make an end of me.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'I reckoned till morning, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ', as a lion, so will he break all my bones:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'From day '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' to night wilt thou make an end of me.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Like a crane '
    - type: usfm
      marker: add
      children:
      - type: text
        text: or
    - type: text
      text: ' a swallow, so did I chatter:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I did mourn as a dove: mine eyes fail '
    - type: usfm
      marker: add
      children:
      - type: text
        text: with looking
    - type: text
      text: ' upward:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', I am oppressed; undertake for me.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'What shall I say? he hath both spoken unto me, and himself hath done '
    - type: usfm
      marker: add
      children:
      - type: text
        text: 'it:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I shall go softly all my years in the bitterness of my soul.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'O Lord, by these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things men
    - type: text
      text: ' live,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And in all these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things is
    - type: text
      text: ' the life of my spirit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So wilt thou recover me, and make me to live.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Behold, for peace I had great bitterness:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But thou hast in love to my soul '
    - type: usfm
      marker: add
      children:
      - type: text
        text: delivered it
    - type: text
      text: ' from the pit of corruption:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For thou hast cast all my sins behind thy back.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'For the grave cannot praise thee, death cannot celebrate thee:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They that go down into the pit cannot hope for thy truth.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'The living, the living, he shall praise thee, as I '
    - type: usfm
      marker: add
      children:
      - type: text
        text: do
    - type: text
      text: ' this day:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The father to the children shall make known thy truth.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then Hezekiah turned his face toward the wall, and prayed unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was ready
    - type: text
      text: ' to save me:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore we will sing my songs to the stringed instruments
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All the days of our life in the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: .
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'For Isaiah had said, Let them take a lump of figs, and lay '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' for a plaister upon the boil, and he shall recover.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Hezekiah also had said, What '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the sign that I shall go up to the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '?'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'and said, Remember now, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', I beseech thee, how I have walked before thee in truth and with a perfect heart, and have done '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that which is
    - type: text
      text: ' good in thy sight. And Hezekiah wept sore. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then came the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' to Isaiah, saying, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Go, and say to Hezekiah, Thus saith the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', the God of David thy father, I have heard thy prayer, I have seen thy tears: behold, I will add unto thy days fifteen years. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And I will deliver thee and this city out of the hand of the king of Assyria: and I will defend this city. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' a sign unto thee from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' will do this thing that he hath spoken; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Behold, I will bring again the shadow of the degrees, which is gone down in the sun dial of Ahaz, ten degrees backward. So the sun returned ten degrees, by which degrees it was gone down.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Hymn of Thanksgiving
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The writing of Hezekiah king of Judah, when he had been sick, and was recovered of his sickness:'
