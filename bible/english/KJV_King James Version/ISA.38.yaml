    content: Hezekiah's Sickness
  - type: text
    content: 'In those days was Hezekiah sick unto death. And Isaiah the prophet the son of Amoz came unto him, and said unto him, Thus saith the '
  - type: text
    content: LORD
  - type: text
    content: ', Set thine house in order: for thou shalt die, and not live. '
