  - type: text
    content: ' no cause: this evil in sending me away '
  - type: text
    content: is
  - type: text
    content: ' greater than the other that thou didst unto me. But he would not hearken unto her. '
  '17':
  - type: text
    content: 'Then he called his servant that ministered unto him, and said, Put now this '
  - type: text
    content: woman
  - type: text
    content: ' out from me, and bolt the door after her. '
  '18':
  - type: text
    content: 'And '
  - type: text
    content: she had
  - type: text
    content: ' a garment of divers colours upon her: for with such robes were the king''s daughters '
  - type: text
    content: that were
  - type: text
    content: ' virgins apparelled. Then his servant brought her out, and bolted the door after her. '
  '19':
  - type: text
    content: 'And Tamar put ashes on her head, and rent her garment of divers colours that '
  - type: text
    content: was
  - type: text
    content: ' on her, and laid her hand on her head, and went on crying.'
  '2':
  - type: text
    content: 'And Amnon was so vexed, that he fell sick for his sister Tamar; for she '
  - type: text
    content: was
  - type: text
    content: ' a virgin; and Amnon thought it hard for him to do any thing to her. '
  '20':
  - type: text
    content: 'And Absalom her brother said unto her, Hath Amnon thy brother been with thee? but hold now thy peace, my sister: he '
  - type: text
    content: is
  - type: text
    content: ' thy brother; regard not this thing. So Tamar remained desolate in her brother Absalom''s house. '
  '21':
  - type: text
    content: 'But when king David heard of all these things, he was very wroth. '
  '22':
  - type: text
    content: 'And Absalom spake unto his brother Amnon neither good nor bad: for Absalom hated Amnon, because he had forced his sister Tamar.'
  '23':
  - type: text
    content: 'And it came to pass after two full years, that Absalom had sheepshearers in Baal-hazor, which '
  - type: text
    content: is
  - type: text
    content: ' beside Ephraim: and Absalom invited all the king''s sons. '
  '24':
  - type: text
    content: 'And Absalom came to the king, and said, Behold now, thy servant hath sheepshearers; let the king, I beseech thee, and his servants go with thy servant. '
  '25':
  - type: text
    content: 'And the king said to Absalom, Nay, my son, let us not all now go, lest we be chargeable unto thee. And he pressed him: howbeit he would not go, but blessed him. '
  '26':
  - type: text
    content: 'Then said Absalom, If not, I pray thee, let my brother Amnon go with us. And the king said unto him, Why should he go with thee? '
  '27':
  - type: text
    content: 'But Absalom pressed him, that he let Amnon and all the king''s sons go with him. '
  '28':
  - type: text
    content: 'Now Absalom had commanded his servants, saying, Mark ye now when Amnon''s heart is merry with wine, and when I say unto you, Smite Amnon; then kill him, fear not: have not I commanded you? be courageous, and be valiant. '
  '29':
  - type: text
    content: And the servants of Absalom did unto Amnon as Absalom had commanded. Then all the king's sons arose, and every man gat him up upon his mule, and fled.
  '3':
  - type: text
    content: 'But Amnon had a friend, whose name '
  - type: text
    content: was
  - type: text
    content: ' Jonadab, the son of Shimeah David''s brother: and Jonadab '
  - type: text
    content: was
  - type: text
    content: ' a very subtil man. '
  '30':
  - type: text
    content: 'And it came to pass, while they were in the way, that tidings came to David, saying, Absalom hath slain all the king''s sons, and there is not one of them left. '
  '31':
  - type: text
    content: 'Then the king arose, and tare his garments, and lay on the earth; and all his servants stood by with their clothes rent. '
  '32':
  - type: text
    content: 'And Jonadab, the son of Shimeah David''s brother, answered and said, Let not my lord suppose '
  - type: text
    content: that
  - type: text
    content: ' they have slain all the young men the king''s sons; for Amnon only is dead: for by the appointment of Absalom this hath been determined from the day that he forced his sister Tamar. '
  '33':
  - type: text
    content: 'Now therefore let not my lord the king take the thing to his heart, to think that all the king''s sons are dead: for Amnon only is dead.'
  '34':
  - type: text
    content: 'But Absalom fled. And the young man that kept the watch lifted up his eyes, and looked, and, behold, there came much people by the way of the hill side behind him. '
  '35':
  - type: text
    content: 'And Jonadab said unto the king, Behold, the king''s sons come: as thy servant said, so it is. '
  '36':
  - type: text
    content: 'And it came to pass, as soon as he had made an end of speaking, that, behold, the king''s sons came, and lifted up their voice and wept: and the king also and all his servants wept very sore.'
  '37':
  - type: text
    content: 'But Absalom fled, and went to Talmai, the son of Ammihud, king of Geshur. And '
  - type: text
    content: David
  - type: text
    content: ' mourned for his son every day. '
  '38':
  - type: text
    content: 'So Absalom fled, and went to Geshur, and was there three years. '
  '39':
  - type: text
    content: 'And '
  - type: text
    content: the soul of
  - type: text
    content: ' king David longed to go forth unto Absalom: for he was comforted concerning Amnon, seeing he was dead.'
  '4':
  - type: text
    content: 'And he said unto him, Why '
  - type: text
    content: art
  - type: text
