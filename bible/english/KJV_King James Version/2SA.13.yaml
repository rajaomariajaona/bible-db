  - type: text
    content: it
  - type: text
    content: ' at her hand. '
  '6':
  - type: text
    content: 'So Amnon lay down, and made himself sick: and when the king was come to see him, Amnon said unto the king, I pray thee, let Tamar my sister come, and make me a couple of cakes in my sight, that I may eat at her hand.'
  '7':
  - type: text
    content: 'Then David sent home to Tamar, saying, Go now to thy brother Amnon''s house, and dress him meat. '
  '8':
  - type: text
    content: 'So Tamar went to her brother Amnon''s house; and he was laid down. And she took flour, and kneaded '
  - type: text
    content: it
  - type: text
    content: ', and made cakes in his sight, and did bake the cakes. '
  '9':
  - type: text
    content: 'And she took a pan, and poured '
  - type: text
    content: them
  - type: text
    content: ' out before him; but he refused to eat. And Amnon said, Have out all men from me. And they went out every man from him. '
