  - type: text
    content: 'And it came to pass after this, that Absalom the son of David had a fair sister, whose name '
  - type: text
    content: was
  - type: text
    content: ' Tamar; and Amnon the son of David loved her. '
  '10':
  - type: text
    content: 'And Amnon said unto Tamar, Bring the meat into the chamber, that I may eat of thine hand. And Tamar took the cakes which she had made, and brought '
  - type: text
    content: them
  - type: text
    content: ' into the chamber to Amnon her brother. '
  '11':
  - type: text
    content: 'And when she had brought '
  - type: text
    content: them
  - type: text
    content: ' unto him to eat, he took hold of her, and said unto her, Come lie with me, my sister. '
  '12':
  - type: text
    content: 'And she answered him, Nay, my brother, do not force me; for no such thing ought to be done in Israel: do not thou this folly. '
  '13':
  - type: text
    content: 'And I, whither shall I cause my shame to go? and as for thee, thou shalt be as one of the fools in Israel. Now therefore, I pray thee, speak unto the king; for he will not withhold me from thee. '
  '14':
  - type: text
    content: 'Howbeit he would not hearken unto her voice: but, being stronger than she, forced her, and lay with her.'
  '15':
  - type: text
    content: 'Then Amnon hated her exceedingly; so that the hatred wherewith he hated her '
  - type: text
    content: was
  - type: text
    content: ' greater than the love wherewith he had loved her. And Amnon said unto her, Arise, be gone. '
  '16':
  - type: text
    content: 'And she said unto him, '
  - type: text
