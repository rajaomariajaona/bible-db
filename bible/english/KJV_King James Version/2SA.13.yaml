  - type: text
    content: being
  - type: text
    content: ' the king''s son, lean from day to day? wilt thou not tell me? And Amnon said unto him, I love Tamar, my brother Absalom''s sister. '
  '5':
  - type: text
    content: 'And Jonadab said unto him, Lay thee down on thy bed, and make thyself sick: and when thy father cometh to see thee, say unto him, I pray thee, let my sister Tamar come, and give me meat, and dress the meat in my sight, that I may see '
  - type: text
    content: it
  - type: text
