  '54':
  - type: text
    content: 'Then he called hastily unto the young man his armourbearer, and said unto him, Draw thy sword, and slay me, that men say not of me, A woman slew him. And his young man thrust him through, and he died. '
  '55':
  - type: text
    content: 'And when the men of Israel saw that Abimelech was dead, they departed every man unto his place. '
  '56':
  - type: text
    content: 'Thus God rendered the wickedness of Abimelech, which he did unto his father, in slaying his seventy brethren: '
  '57':
