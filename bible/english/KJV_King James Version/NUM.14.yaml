verses:
  '1':
  - type: heading
    content: Murmurings
  - type: text
    content: 'And all the congregation lifted up their voice, and cried; and the people wept that night. '
  '10':
  - type: text
    content: 'But all the congregation bade stone them with stones. And the glory of the '
  - type: text
    content: LORD
  - type: text
    content: ' appeared in the tabernacle of the congregation before all the children of Israel.'
  '11':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Moses, How long will this people provoke me? and how long will it be ere they believe me, for all the signs which I have shewed among them? '
  '12':
  - type: text
    content: I will smite them with the pestilence, and disinherit them, and will make of thee a greater nation and mightier than they.
  - type: heading
    content: Moses' Intercession
  '13':
  - type: text
    content: 'And Moses said unto the '
  - type: text
    content: LORD
  - type: text
    content: ', Then the Egyptians shall hear '
  - type: text
    content: it
  - type: text
    content: ', (for thou broughtest up this people in thy might from among them;) '
  '14':
  - type: text
    content: 'and they will tell '
  - type: text
    content: it
  - type: text
    content: ' to the inhabitants of this land: '
  - type: text
    content: for
  - type: text
    content: ' they have heard that thou '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: art
  - type: text
    content: ' among this people, that thou '
  - type: text
    content: LORD
  - type: text
    content: ' art seen face to face, and '
  - type: text
    content: that
  - type: text
    content: ' thy cloud standeth over them, and '
  - type: text
    content: that
  - type: text
    content: ' thou goest before them, by day time in a pillar of a cloud, and in a pillar of fire by night. '
  '15':
  - type: text
    content: 'Now '
  - type: text
    content: if
  - type: text
    content: ' thou shalt kill '
  - type: text
    content: all
  - type: text
    content: ' this people as one man, then the nations which have heard the fame of thee will speak, saying, '
  '16':
  - type: text
    content: 'Because the '
  - type: text
    content: LORD
  - type: text
    content: ' was not able to bring this people into the land which he sware unto them, therefore he hath slain them in the wilderness. '
  '17':
  - type: text
    content: 'And now, I beseech thee, let the power of my '
  - type: text
    content: LORD
  - type: text
    content: ' be great, according as thou hast spoken, saying, '
  '18':
  - type: text
    content: 'The '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' longsuffering, and of great mercy, forgiving iniquity and transgression, and by no means clearing '
  - type: text
    content: the guilty
  - type: text
    content: ', visiting the iniquity of the fathers upon the children unto the third and fourth '
  - type: text
    content: generation
  - type: text
    content: '. '
  '19':
  - type: text
    content: Pardon, I beseech thee, the iniquity of this people according unto the greatness of thy mercy, and as thou hast forgiven this people, from Egypt even until now.
  - type: heading
    content: God's Judgement
  '2':
  - type: text
    content: 'And all the children of Israel murmured against Moses and against Aaron: and the whole congregation said unto them, Would God that we had died in the land of Egypt! or would God we had died in this wilderness! '
  '20':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said, I have pardoned according to thy word: '
  '21':
  - type: text
    content: 'but '
  - type: text
    content: as
  - type: text
    content: ' truly '
  - type: text
    content: as
  - type: text
    content: ' I live, all the earth shall be filled with the glory of the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Because all those men which have seen my glory, and my miracles, which I did in Egypt and in the wilderness, and have tempted me now these ten times, and have not hearkened to my voice; '
  '23':
  - type: text
    content: 'surely they shall not see the land which I sware unto their fathers, neither shall any of them that provoked me see it: '
  '24':
  - type: text
    content: 'but my servant Caleb, because he had another spirit with him, and hath followed me fully, him will I bring into the land whereinto he went; and his seed shall possess it. '
  '25':
  - type: text
    content: (Now the Amalekites and the Canaanites dwelt in the valley.) To morrow turn you, and get you into the wilderness by the way of the Red sea.
  '26':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses and unto Aaron, saying, '
  '27':
  - type: text
    content: 'How long '
  - type: text
    content: shall I bear with
  - type: text
    content: ' this evil congregation, which murmur against me? I have heard the murmurings of the children of Israel, which they murmur against me. '
  '28':
  - type: text
    content: 'Say unto them, '
  - type: text
    content: As truly as
  - type: text
    content: ' I live, saith the '
  - type: text
    content: LORD
  - type: text
    content: ', as ye have spoken in mine ears, so will I do to you: '
  '29':
  - type: text
    content: 'your carcases shall fall in this wilderness; and all that were numbered of you, according to your whole number, from twenty years old and upward, which have murmured against me, '
  '3':
  - type: text
    content: 'And wherefore hath the '
  - type: text
    content: LORD
  - type: text
    content: ' brought us unto this land, to fall by the sword, that our wives and our children should be a prey? were it not better for us to return into Egypt?'
  '30':
  - type: text
    content: 'doubtless ye shall not come into the land, '
  - type: text
    content: concerning
  - type: text
    content: ' which I sware to make you dwell therein, save Caleb the son of Jephunneh, and Joshua the son of Nun. '
  '31':
  - type: text
    content: 'But your little ones, which ye said should be a prey, them will I bring in, and they shall know the land which ye have despised. '
  '32':
  - type: text
    content: 'But '
  - type: text
    content: as for
  - type: text
    content: ' you, your carcases, they shall fall in this wilderness. '
  '33':
  - type: text
    content: 'And your children shall wander in the wilderness forty years, and bear your whoredoms, until your carcases be wasted in the wilderness. '
  '34':
  - type: text
    content: 'After the number of the days in which ye searched the land, '
  - type: text
    content: even
  - type: text
    content: ' forty days, each day for a year, shall ye bear your iniquities, '
  - type: text
    content: even
  - type: text
    content: ' forty years, and ye shall know my breach of promise. '
  '35':
  - type: text
    content: 'I the '
  - type: text
    content: LORD
  - type: text
    content: ' have said, I will surely do it unto all this evil congregation, that are gathered together against me: in this wilderness they shall be consumed, and there they shall die.'
  '36':
  - type: text
    content: 'And the men, which Moses sent to search the land, who returned, and made all the congregation to murmur against him, by bringing up a slander upon the land, '
  '37':
  - type: text
    content: 'even those men that did bring up the evil report upon the land, died by the plague before the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '38':
  - type: text
    content: 'But Joshua the son of Nun, and Caleb the son of Jephunneh, '
  - type: text
    content: which were
  - type: text
    content: ' of the men that went to search the land, lived '
  - type: text
    content: still
  - type: text
    content: '. '
  '39':
  - type: text
    content: 'And Moses told these sayings unto all the children of Israel: and the people mourned greatly.'
  - type: heading
    content: Selfwilled People
  '4':
  - type: text
    content: 'And they said one to another, Let us make a captain, and let us return into Egypt. '
  '40':
  - type: text
    content: 'And they rose up early in the morning, and gat them up into the top of the mountain, saying, Lo, we '
  - type: text
    content: be here
  - type: text
    content: ', and will go up unto the place which the '
  - type: text
    content: LORD
  - type: text
    content: ' hath promised: for we have sinned. '
  '41':
  - type: text
    content: 'And Moses said, Wherefore now do ye transgress the commandment of the '
  - type: text
    content: LORD
  - type: text
    content: '? but it shall not prosper. '
  '42':
  - type: text
    content: 'Go not up, for the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' not among you; that ye be not smitten before your enemies. '
  '43':
  - type: text
    content: 'For the Amalekites and the Canaanites '
  - type: text
    content: are
  - type: text
    content: ' there before you, and ye shall fall by the sword: because ye are turned away from the '
  - type: text
    content: LORD
  - type: text
    content: ', therefore the '
  - type: text
    content: LORD
  - type: text
    content: ' will not be with you. '
  '44':
  - type: text
    content: 'But they presumed to go up unto the hill top: nevertheless the ark of the covenant of the '
  - type: text
    content: LORD
  - type: text
    content: ', and Moses, departed not out of the camp. '
  '45':
  - type: text
    content: 'Then the Amalekites came down, and the Canaanites which dwelt in that hill, and smote them, and discomfited them, '
  - type: text
    content: even
  - type: text
    content: ' unto Hormah.'
  '5':
  - type: text
    content: 'Then Moses and Aaron fell on their faces before all the assembly of the congregation of the children of Israel. '
  '6':
  - type: text
    content: 'And Joshua the son of Nun, and Caleb the son of Jephunneh, '
  - type: text
    content: which were
  - type: text
    content: ' of them that searched the land, rent their clothes: '
  '7':
  - type: text
    content: 'and they spake unto all the company of the children of Israel, saying, The land, which we passed through to search it, '
  - type: text
    content: is
  - type: text
    content: ' an exceeding good land. '
  '8':
  - type: text
    content: 'If the '
  - type: text
    content: LORD
  - type: text
    content: ' delight in us, then he will bring us into this land, and give it us; a land which floweth with milk and honey. '
  '9':
  - type: text
    content: 'Only rebel not ye against the '
  - type: text
    content: LORD
  - type: text
    content: ', neither fear ye the people of the land; for they '
  - type: text
    content: are
  - type: text
    content: ' bread for us: their defence is departed from them, and the '
  - type: text
    content: LORD
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' with us: fear them not. '
