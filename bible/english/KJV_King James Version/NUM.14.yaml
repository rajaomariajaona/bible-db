document_id: NUM.14
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Murmurings
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And all the congregation lifted up their voice, and cried; and the people wept that night. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And all the children of Israel murmured against Moses and against Aaron: and the whole congregation said unto them, Would God that we had died in the land of Egypt! or would God we had died in this wilderness! '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And wherefore hath the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' brought us unto this land, to fall by the sword, that our wives and our children should be a prey? were it not better for us to return into Egypt?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And they said one to another, Let us make a captain, and let us return into Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then Moses and Aaron fell on their faces before all the assembly of the congregation of the children of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Joshua the son of Nun, and Caleb the son of Jephunneh, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which were
  - type: text
    text: ' of them that searched the land, rent their clothes: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and they spake unto all the company of the children of Israel, saying, The land, which we passed through to search it, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' an exceeding good land. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'If the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' delight in us, then he will bring us into this land, and give it us; a land which floweth with milk and honey. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Only rebel not ye against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', neither fear ye the people of the land; for they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' bread for us: their defence is departed from them, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' with us: fear them not. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But all the congregation bade stone them with stones. And the glory of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' appeared in the tabernacle of the congregation before all the children of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said unto Moses, How long will this people provoke me? and how long will it be ere they believe me, for all the signs which I have shewed among them? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I will smite them with the pestilence, and disinherit them, and will make of thee a greater nation and mightier than they.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Moses' Intercession
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Moses said unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', Then the Egyptians shall hear '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ', (for thou broughtest up this people in thy might from among them;) '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and they will tell '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to the inhabitants of this land: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' they have heard that thou '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' among this people, that thou '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' art seen face to face, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' thy cloud standeth over them, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' thou goest before them, by day time in a pillar of a cloud, and in a pillar of fire by night. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Now '
  - type: usfm
    marker: add
    children:
    - type: text
      text: if
  - type: text
    text: ' thou shalt kill '
  - type: usfm
    marker: add
    children:
    - type: text
      text: all
  - type: text
    text: ' this people as one man, then the nations which have heard the fame of thee will speak, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' was not able to bring this people into the land which he sware unto them, therefore he hath slain them in the wilderness. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And now, I beseech thee, let the power of my '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' be great, according as thou hast spoken, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' longsuffering, and of great mercy, forgiving iniquity and transgression, and by no means clearing '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the guilty
  - type: text
    text: ', visiting the iniquity of the fathers upon the children unto the third and fourth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: generation
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Pardon, I beseech thee, the iniquity of this people according unto the greatness of thy mercy, and as thou hast forgiven this people, from Egypt even until now.
- type: usfm
  marker: s2
  children:
  - type: text
    text: God's Judgement
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' said, I have pardoned according to thy word: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'but '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' truly '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as
  - type: text
    text: ' I live, all the earth shall be filled with the glory of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Because all those men which have seen my glory, and my miracles, which I did in Egypt and in the wilderness, and have tempted me now these ten times, and have not hearkened to my voice; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'surely they shall not see the land which I sware unto their fathers, neither shall any of them that provoked me see it: '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'but my servant Caleb, because he had another spirit with him, and hath followed me fully, him will I bring into the land whereinto he went; and his seed shall possess it. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: (Now the Amalekites and the Canaanites dwelt in the valley.) To morrow turn you, and get you into the wilderness by the way of the Red sea.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses and unto Aaron, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'How long '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall I bear with
  - type: text
    text: ' this evil congregation, which murmur against me? I have heard the murmurings of the children of Israel, which they murmur against me. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Say unto them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: As truly as
  - type: text
    text: ' I live, saith the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', as ye have spoken in mine ears, so will I do to you: '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'your carcases shall fall in this wilderness; and all that were numbered of you, according to your whole number, from twenty years old and upward, which have murmured against me, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'doubtless ye shall not come into the land, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: concerning
  - type: text
    text: ' which I sware to make you dwell therein, save Caleb the son of Jephunneh, and Joshua the son of Nun. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'But your little ones, which ye said should be a prey, them will I bring in, and they shall know the land which ye have despised. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'But '
  - type: usfm
    marker: add
    children:
    - type: text
      text: as for
  - type: text
    text: ' you, your carcases, they shall fall in this wilderness. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And your children shall wander in the wilderness forty years, and bear your whoredoms, until your carcases be wasted in the wilderness. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'After the number of the days in which ye searched the land, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' forty days, each day for a year, shall ye bear your iniquities, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' forty years, and ye shall know my breach of promise. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'I the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' have said, I will surely do it unto all this evil congregation, that are gathered together against me: in this wilderness they shall be consumed, and there they shall die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And the men, which Moses sent to search the land, who returned, and made all the congregation to murmur against him, by bringing up a slander upon the land, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'even those men that did bring up the evil report upon the land, died by the plague before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'But Joshua the son of Nun, and Caleb the son of Jephunneh, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which were
  - type: text
    text: ' of the men that went to search the land, lived '
  - type: usfm
    marker: add
    children:
    - type: text
      text: still
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And Moses told these sayings unto all the children of Israel: and the people mourned greatly.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Selfwilled People
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And they rose up early in the morning, and gat them up into the top of the mountain, saying, Lo, we '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be here
  - type: text
    text: ', and will go up unto the place which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath promised: for we have sinned. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And Moses said, Wherefore now do ye transgress the commandment of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '? but it shall not prosper. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Go not up, for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' not among you; that ye be not smitten before your enemies. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'For the Amalekites and the Canaanites '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' there before you, and ye shall fall by the sword: because ye are turned away from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', therefore the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' will not be with you. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'But they presumed to go up unto the hill top: nevertheless the ark of the covenant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and Moses, departed not out of the camp. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Then the Amalekites came down, and the Canaanites which dwelt in that hill, and smote them, and discomfited them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' unto Hormah.'
