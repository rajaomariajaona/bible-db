  '8':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' God planted a garden eastward in Eden; and there he put the man whom he had formed. '
  '9':
  - type: text
    content: 'And out of the ground made the '
  - type: text
    content: LORD
  - type: text
    content: ' God to grow every tree that is pleasant to the sight, and good for food; the tree of life also in the midst of the garden, and the tree of knowledge of good and evil. '
