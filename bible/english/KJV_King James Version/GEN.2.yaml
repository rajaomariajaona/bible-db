document_id: GEN.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Thus the heavens and the earth were finished, and all the host of them. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And on the seventh day God ended his work which he had made; and he rested on the seventh day from all his work which he had made. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And God blessed the seventh day, and sanctified it: because that in it he had rested from all his work which God created and made.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' the generations of the heavens and of the earth when they were created, in the day that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God made the earth and the heavens, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and every plant of the field before it was in the earth, and every herb of the field before it grew: for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God had not caused it to rain upon the earth, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there was
  - type: text
    text: ' not a man to till the ground. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But there went up a mist from the earth, and watered the whole face of the ground. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God formed man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of
  - type: text
    text: ' the dust of the ground, and breathed into his nostrils the breath of life; and man became a living soul.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God planted a garden eastward in Eden; and there he put the man whom he had formed. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And out of the ground made the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God to grow every tree that is pleasant to the sight, and good for food; the tree of life also in the midst of the garden, and the tree of knowledge of good and evil. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And a river went out of Eden to water the garden; and from thence it was parted, and became into four heads. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The name of the first '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Pison: that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' it which compasseth the whole land of Havilah, where '
  - type: usfm
    marker: add
    children:
    - type: text
      text: there is
  - type: text
    text: ' gold; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and the gold of that land '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' good: there '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' bdellium and the onyx stone. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And the name of the second river '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Gihon: the same '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' it that compasseth the whole land of Ethiopia. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And the name of the third river '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Hiddekel: that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' it which goeth toward the east of Assyria. And the fourth river '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' Euphrates. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God took the man, and put him into the garden of Eden to dress it and to keep it. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God commanded the man, saying, Of every tree of the garden thou mayest freely eat: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'but of the tree of the knowledge of good and evil, thou shalt not eat of it: for in the day that thou eatest thereof thou shalt surely die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God said, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It is
  - type: text
    text: ' not good that the man should be alone; I will make him an help meet for him. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And out of the ground the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God formed every beast of the field, and every fowl of the air; and brought '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' unto Adam to see what he would call them: and whatsoever Adam called every living creature, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the name thereof. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Adam gave names to all cattle, and to the fowl of the air, and to every beast of the field; but for Adam there was not found an help meet for him. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God caused a deep sleep to fall upon Adam, and he slept: and he took one of his ribs, and closed up the flesh instead thereof; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'and the rib, which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God had taken from man, made he a woman, and brought her unto the man. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And Adam said, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' now bone of my bones, and flesh of my flesh: she shall be called Woman, because she was taken out of Man. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Therefore shall a man leave his father and his mother, and shall cleave unto his wife: and they shall be one flesh. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: And they were both naked, the man and his wife, and were not ashamed.
