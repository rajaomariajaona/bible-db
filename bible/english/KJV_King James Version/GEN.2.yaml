  - type: text
    content: ' God made the earth and the heavens, '
  '5':
  - type: text
    content: 'and every plant of the field before it was in the earth, and every herb of the field before it grew: for the '
  - type: text
    content: LORD
  - type: text
    content: ' God had not caused it to rain upon the earth, and '
  - type: text
    content: there was
  - type: text
    content: ' not a man to till the ground. '
  '6':
  - type: text
    content: 'But there went up a mist from the earth, and watered the whole face of the ground. '
  '7':
  - type: text
    content: 'And the '
  - type: text
