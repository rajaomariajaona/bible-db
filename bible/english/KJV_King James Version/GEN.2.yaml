  '15':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' God took the man, and put him into the garden of Eden to dress it and to keep it. '
  '16':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' God commanded the man, saying, Of every tree of the garden thou mayest freely eat: '
  '17':
  - type: text
    content: 'but of the tree of the knowledge of good and evil, thou shalt not eat of it: for in the day that thou eatest thereof thou shalt surely die.'
  '18':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' God said, '
  - type: text
    content: It is
  - type: text
    content: ' not good that the man should be alone; I will make him an help meet for him. '
  '19':
  - type: text
    content: 'And out of the ground the '
  - type: text
    content: LORD
  - type: text
    content: ' God formed every beast of the field, and every fowl of the air; and brought '
  - type: text
    content: them
  - type: text
    content: ' unto Adam to see what he would call them: and whatsoever Adam called every living creature, that '
  - type: text
    content: was
  - type: text
    content: ' the name thereof. '
  '2':
  - type: text
    content: 'And on the seventh day God ended his work which he had made; and he rested on the seventh day from all his work which he had made. '
  '20':
  - type: text
    content: 'And Adam gave names to all cattle, and to the fowl of the air, and to every beast of the field; but for Adam there was not found an help meet for him. '
  '21':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' God caused a deep sleep to fall upon Adam, and he slept: and he took one of his ribs, and closed up the flesh instead thereof; '
  '22':
  - type: text
    content: 'and the rib, which the '
  - type: text
    content: LORD
  - type: text
    content: ' God had taken from man, made he a woman, and brought her unto the man. '
  '23':
  - type: text
    content: 'And Adam said, This '
  - type: text
    content: is
  - type: text
    content: ' now bone of my bones, and flesh of my flesh: she shall be called Woman, because she was taken out of Man. '
  '24':
  - type: text
    content: 'Therefore shall a man leave his father and his mother, and shall cleave unto his wife: and they shall be one flesh. '
  '25':
  - type: text
    content: And they were both naked, the man and his wife, and were not ashamed.
  '3':
  - type: text
    content: 'And God blessed the seventh day, and sanctified it: because that in it he had rested from all his work which God created and made.'
  '4':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
