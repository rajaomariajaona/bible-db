  - type: text
    content: it
  - type: text
    content: ' upon the tip of Aaron''s right ear, and upon the thumb of his right hand, and upon the great toe of his right foot. '
  '24':
  - type: text
    content: 'And he brought Aaron''s sons, and Moses put of the blood upon the tip of their right ear, and upon the thumbs of their right hands, and upon the great toes of their right feet: and Moses sprinkled the blood upon the altar round about. '
  '25':
  - type: text
