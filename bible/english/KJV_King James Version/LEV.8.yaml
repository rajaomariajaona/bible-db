    content: 'And Moses did as the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded him; and the assembly was gathered together unto the door of the tabernacle of the congregation. '
  '5':
  - type: text
    content: 'And Moses said unto the congregation, This '
  - type: text
