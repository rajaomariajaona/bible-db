  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses.'
  '18':
  - type: text
    content: 'And he brought the ram for the burnt offering: and Aaron and his sons laid their hands upon the head of the ram. '
  '19':
  - type: text
    content: 'And he killed '
  - type: text
    content: it
  - type: text
    content: '; and Moses sprinkled the blood upon the altar round about. '
  '2':
  - type: text
    content: 'Take Aaron and his sons with him, and the garments, and the anointing oil, and a bullock for the sin offering, and two rams, and a basket of unleavened bread; '
  '20':
  - type: text
    content: 'And he cut the ram into pieces; and Moses burnt the head, and the pieces, and the fat. '
  '21':
  - type: text
    content: 'And he washed the inwards and the legs in water; and Moses burnt the whole ram upon the altar: it '
  - type: text
