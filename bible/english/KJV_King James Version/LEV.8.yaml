  - type: text
    content: LORD
  - type: text
    content: '; as the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses.'
  '22':
  - type: text
    content: 'And he brought the other ram, the ram of consecration: and Aaron and his sons laid their hands upon the head of the ram. '
  '23':
  - type: text
    content: 'And he slew '
  - type: text
    content: it
  - type: text
