  '6':
  - type: text
    content: 'And Moses brought Aaron and his sons, and washed them with water. '
  '7':
  - type: text
    content: 'And he put upon him the coat, and girded him with the girdle, and clothed him with the robe, and put the ephod upon him, and he girded him with the curious girdle of the ephod, and bound '
  - type: text
    content: it
  - type: text
    content: ' unto him therewith. '
  '8':
