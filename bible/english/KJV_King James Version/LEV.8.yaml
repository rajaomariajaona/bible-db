  '12':
  - type: text
    content: 'And he poured of the anointing oil upon Aaron''s head, and anointed him, to sanctify him. '
  '13':
  - type: text
    content: 'And Moses brought Aaron''s sons, and put coats upon them, and girded them with girdles, and put bonnets upon them; as the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses.'
  '14':
  - type: text
    content: 'And he brought the bullock for the sin offering: and Aaron and his sons laid their hands upon the head of the bullock for the sin offering. '
  '15':
  - type: text
    content: 'And he slew '
  - type: text
    content: it
  - type: text
    content: '; and Moses took the blood, and put '
  - type: text
    content: it
  - type: text
    content: ' upon the horns of the altar round about with his finger, and purified the altar, and poured the blood at the bottom of the altar, and sanctified it, to make reconciliation upon it. '
  '16':
  - type: text
    content: 'And he took all the fat that '
  - type: text
    content: was
  - type: text
