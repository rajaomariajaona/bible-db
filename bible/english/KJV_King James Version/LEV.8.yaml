document_id: LEV.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Priesthood
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Take Aaron and his sons with him, and the garments, and the anointing oil, and a bullock for the sin offering, and two rams, and a basket of unleavened bread; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and gather thou all the congregation together unto the door of the tabernacle of the congregation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Moses did as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded him; and the assembly was gathered together unto the door of the tabernacle of the congregation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And Moses said unto the congregation, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the thing which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded to be done.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Consecration
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Moses brought Aaron and his sons, and washed them with water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And he put upon him the coat, and girded him with the girdle, and clothed him with the robe, and put the ephod upon him, and he girded him with the curious girdle of the ephod, and bound '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' unto him therewith. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And he put the breastplate upon him: also he put in the breastplate the Urim and the Thummim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And he put the mitre upon his head; also upon the mitre, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' upon his forefront, did he put the golden plate, the holy crown; as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Moses took the anointing oil, and anointed the tabernacle and all that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' therein, and sanctified them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And he sprinkled thereof upon the altar seven times, and anointed the altar and all his vessels, both the laver and his foot, to sanctify them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And he poured of the anointing oil upon Aaron''s head, and anointed him, to sanctify him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Moses brought Aaron''s sons, and put coats upon them, and girded them with girdles, and put bonnets upon them; as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And he brought the bullock for the sin offering: and Aaron and his sons laid their hands upon the head of the bullock for the sin offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And he slew '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '; and Moses took the blood, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon the horns of the altar round about with his finger, and purified the altar, and poured the blood at the bottom of the altar, and sanctified it, to make reconciliation upon it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And he took all the fat that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' upon the inwards, and the caul '
  - type: usfm
    marker: add
    children:
    - type: text
      text: above
  - type: text
    text: ' the liver, and the two kidneys, and their fat, and Moses burned '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But the bullock, and his hide, his flesh, and his dung, he burnt with fire without the camp; as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And he brought the ram for the burnt offering: and Aaron and his sons laid their hands upon the head of the ram. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And he killed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '; and Moses sprinkled the blood upon the altar round about. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And he cut the ram into pieces; and Moses burnt the head, and the pieces, and the fat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And he washed the inwards and the legs in water; and Moses burnt the whole ram upon the altar: it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' a burnt sacrifice for a sweet savour, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' an offering made by fire unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And he brought the other ram, the ram of consecration: and Aaron and his sons laid their hands upon the head of the ram. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And he slew '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: '; and Moses took of the blood of it, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon the tip of Aaron''s right ear, and upon the thumb of his right hand, and upon the great toe of his right foot. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And he brought Aaron''s sons, and Moses put of the blood upon the tip of their right ear, and upon the thumbs of their right hands, and upon the great toes of their right feet: and Moses sprinkled the blood upon the altar round about. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And he took the fat, and the rump, and all the fat that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' upon the inwards, and the caul '
  - type: usfm
    marker: add
    children:
    - type: text
      text: above
  - type: text
    text: ' the liver, and the two kidneys, and their fat, and the right shoulder: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and out of the basket of unleavened bread, that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', he took one unleavened cake, and a cake of oiled bread, and one wafer, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' on the fat, and upon the right shoulder: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'and he put all upon Aaron''s hands, and upon his sons'' hands, and waved them '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' a wave offering before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And Moses took them from off their hands, and burnt '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' on the altar upon the burnt offering: they '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' consecrations for a sweet savour: it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' an offering made by fire unto the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And Moses took the breast, and waved it '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' a wave offering before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' of the ram of consecration it was Moses'' part; as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And Moses took of the anointing oil, and of the blood which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' upon the altar, and sprinkled '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' upon Aaron, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' upon his garments, and upon his sons, and upon his sons'' garments with him; and sanctified Aaron, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' his garments, and his sons, and his sons'' garments with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And Moses said unto Aaron and to his sons, Boil the flesh '
  - type: usfm
    marker: add
    children:
    - type: text
      text: at
  - type: text
    text: ' the door of the tabernacle of the congregation: and there eat it with the bread that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the basket of consecrations, as I commanded, saying, Aaron and his sons shall eat it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And that which remaineth of the flesh and of the bread shall ye burn with fire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And ye shall not go out of the door of the tabernacle of the congregation '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' seven days, until the days of your consecration be at an end: for seven days shall he consecrate you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'As he hath done this day, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: so
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath commanded to do, to make an atonement for you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Therefore shall ye abide '
  - type: usfm
    marker: add
    children:
    - type: text
      text: at
  - type: text
    text: ' the door of the tabernacle of the congregation day and night seven days, and keep the charge of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', that ye die not: for so I am commanded. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'So Aaron and his sons did all things which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded by the hand of Moses.'
