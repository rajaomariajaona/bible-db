document_id: HOS.5
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Against Priests and Kings
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hear ye this, O priests; and hearken, ye house of Israel; and give ye ear, O house of the king; for judgment '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' toward you, because ye have been a snare on Mizpah, and a net spread upon Tabor. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the revolters are profound to make slaughter, though I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: have been
  - type: text
    text: ' a rebuker of them all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I know Ephraim, and Israel is not hid from me: for now, O Ephraim, thou committest whoredom, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' Israel is defiled. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'They will not frame their doings to turn unto their God: for the spirit of whoredoms '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' in the midst of them, and they have not known the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the pride of Israel doth testify to his face: therefore shall Israel and Ephraim fall in their iniquity; Judah also shall fall with them. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'They shall go with their flocks and with their herds to seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '; but they shall not find '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: '; he hath withdrawn himself from them. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'They have dealt treacherously against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': for they have begotten strange children: now shall a month devour them with their portions.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Blow ye the cornet in Gibeah, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' the trumpet in Ramah: cry aloud '
  - type: usfm
    marker: add
    children:
    - type: text
      text: at
  - type: text
    text: ' Beth-aven, after thee, O Benjamin. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ephraim shall be desolate in the day of rebuke: among the tribes of Israel have I made known that which shall surely be.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The princes of Judah were like them that remove the bound: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: therefore
  - type: text
    text: ' I will pour out my wrath upon them like water. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ephraim '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' oppressed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' broken in judgment, because he willingly walked after the commandment. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Therefore '
  - type: usfm
    marker: add
    children:
    - type: text
      text: will
  - type: text
    text: ' I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' unto Ephraim as a moth, and to the house of Judah as rottenness. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When Ephraim saw his sickness, and Judah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: saw
  - type: text
    text: ' his wound, then went Ephraim to the Assyrian, and sent to king Jareb: yet could he not heal you, nor cure you of your wound. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: will be
  - type: text
    text: ' unto Ephraim as a lion, and as a young lion to the house of Judah: I, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' I, will tear and go away; I will take away, and none shall rescue '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I will go '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' return to my place, till they acknowledge their offence, and seek my face: in their affliction they will seek me early.'
