  - type: text
    content: him
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'I will go '
  - type: text
    content: and
  - type: text
    content: ' return to my place, till they acknowledge their offence, and seek my face: in their affliction they will seek me early.'
  '2':
  - type: text
    content: 'And the revolters are profound to make slaughter, though I '
  - type: text
    content: have been
  - type: text
    content: ' a rebuker of them all.'
  '3':
  - type: text
    content: 'I know Ephraim, and Israel is not hid from me: for now, O Ephraim, thou committest whoredom, '
  - type: text
    content: and
  - type: text
    content: ' Israel is defiled. '
  '4':
  - type: text
    content: 'They will not frame their doings to turn unto their God: for the spirit of whoredoms '
  - type: text
    content: is
  - type: text
    content: ' in the midst of them, and they have not known the '
  - type: text
    content: LORD
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'And the pride of Israel doth testify to his face: therefore shall Israel and Ephraim fall in their iniquity; Judah also shall fall with them. '
  '6':
  - type: text
    content: 'They shall go with their flocks and with their herds to seek the '
  - type: text
    content: LORD
  - type: text
    content: '; but they shall not find '
  - type: text
    content: him
  - type: text
    content: '; he hath withdrawn himself from them. '
  '7':
  - type: text
    content: 'They have dealt treacherously against the '
  - type: text
    content: LORD
  - type: text
    content: ': for they have begotten strange children: now shall a month devour them with their portions.'
  '8':
  - type: text
    content: 'Blow ye the cornet in Gibeah, '
  - type: text
