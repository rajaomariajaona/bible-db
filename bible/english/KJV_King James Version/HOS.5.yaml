  - type: text
    content: ' the trumpet in Ramah: cry aloud '
  - type: text
    content: at
  - type: text
    content: ' Beth-aven, after thee, O Benjamin. '
  '9':
  - type: text
    content: 'Ephraim shall be desolate in the day of rebuke: among the tribes of Israel have I made known that which shall surely be.'
