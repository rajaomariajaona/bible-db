    content: Against Priests and Kings
  - type: text
    content: 'Hear ye this, O priests; and hearken, ye house of Israel; and give ye ear, O house of the king; for judgment '
  - type: text
    content: is
  - type: text
    content: ' toward you, because ye have been a snare on Mizpah, and a net spread upon Tabor. '
  '10':
  - type: text
    content: 'The princes of Judah were like them that remove the bound: '
  - type: text
    content: therefore
  - type: text
    content: ' I will pour out my wrath upon them like water. '
  '11':
  - type: text
    content: 'Ephraim '
  - type: text
    content: is
  - type: text
    content: ' oppressed '
  - type: text
    content: and
  - type: text
    content: ' broken in judgment, because he willingly walked after the commandment. '
  '12':
  - type: text
    content: 'Therefore '
  - type: text
    content: will
  - type: text
    content: ' I '
  - type: text
    content: be
  - type: text
    content: ' unto Ephraim as a moth, and to the house of Judah as rottenness. '
  '13':
  - type: text
    content: 'When Ephraim saw his sickness, and Judah '
  - type: text
    content: saw
  - type: text
    content: ' his wound, then went Ephraim to the Assyrian, and sent to king Jareb: yet could he not heal you, nor cure you of your wound. '
  '14':
  - type: text
    content: 'For I '
  - type: text
    content: will be
  - type: text
    content: ' unto Ephraim as a lion, and as a young lion to the house of Judah: I, '
  - type: text
    content: even
  - type: text
