document_id: NUM.2,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' spake unto Moses and unto Aaron, saying, '
  '10':
  - type: text
    content: 'On the south side '
  - type: text
    content: shall be
  - type: text
    content: ' the standard of the camp of Reuben according to their armies: and the captain of the children of Reuben '
  - type: text
    content: shall be
  - type: text
    content: ' Elizur the son of Shedeur. '
  '11':
  - type: text
    content: 'And his host, and those that were numbered thereof, '
  - type: text
    content: were
  - type: text
    content: ' forty and six thousand and five hundred. '
  '12':
  - type: text
    content: 'And those which pitch by him '
  - type: text
    content: shall be
  - type: text
    content: ' the tribe of Simeon: and the captain of the children of Simeon '
  - type: text
    content: shall be
  - type: text
    content: ' Shelumiel the son of Zurishaddai. '
  '13':
  - type: text
    content: 'And his host, and those that were numbered of them, '
  - type: text
    content: were
  - type: text
    content: ' fifty and nine thousand and three hundred. '
  '14':
  - type: text
    content: 'Then the tribe of Gad: and the captain of the sons of Gad '
  - type: text
    content: shall be
  - type: text
    content: ' Eliasaph the son of Reuel. '
  '15':
  - type: text
    content: 'And his host, and those that were numbered of them, '
  - type: text
    content: were
  - type: text
    content: ' forty and five thousand and six hundred and fifty. '
  '16':
  - type: text
    content: 'All that were numbered in the camp of Reuben '
  - type: text
    content: were
  - type: text
    content: ' an hundred thousand and fifty and one thousand and four hundred and fifty, throughout their armies. And they shall set forth in the second rank.'
  '17':
  - type: text
    content: 'Then the tabernacle of the congregation shall set forward with the camp of the Levites in the midst of the camp: as they encamp, so shall they set forward, every man in his place by their standards.'
  '18':
  - type: text
    content: 'On the west side '
  - type: text
    content: shall be
  - type: text
    content: ' the standard of the camp of Ephraim according to their armies: and the captain of the sons of Ephraim '
  - type: text
    content: shall be
  - type: text
    content: ' Elishama the son of Ammihud. '
  '19':
  - type: text
    content: 'And his host, and those that were numbered of them, '
  - type: text
    content: were
  - type: text
    content: ' forty thousand and five hundred. '
  '2':
  - type: text
    content: 'Every man of the children of Israel shall pitch by his own standard, with the ensign of their father''s house: far off about the tabernacle of the congregation shall they pitch. '
  '20':
  - type: text
    content: 'And by him '
  - type: text
    content: shall be
  - type: text
    content: ' the tribe of Manasseh: and the captain of the children of Manasseh '
  - type: text
    content: shall be
  - type: text
    content: ' Gamaliel the son of Pedahzur. '
  '21':
  - type: text
    content: 'And his host, and those that were numbered of them, '
  - type: text
    content: were
  - type: text
    content: ' thirty and two thousand and two hundred. '
  '22':
  - type: text
    content: 'Then the tribe of Benjamin: and the captain of the sons of Benjamin '
  - type: text
    content: shall be
  - type: text
    content: ' Abidan the son of Gideoni. '
  '23':
  - type: text
    content: 'And his host, and those that were numbered of them, '
  - type: text
    content: were
  - type: text
    content: ' thirty and five thousand and four hundred. '
  '24':
  - type: text
    content: 'All that were numbered of the camp of Ephraim '
  - type: text
    content: were
  - type: text
    content: ' an hundred thousand and eight thousand and an hundred, throughout their armies. And they shall go forward in the third rank.'
  '25':
  - type: text
    content: 'The standard of the camp of Dan '
  - type: text
    content: shall be
  - type: text
    content: ' on the north side by their armies: and the captain of the children of Dan '
  - type: text
    content: shall be
  - type: text
    content: ' Ahiezer the son of Ammishaddai. '
  '26':
  - type: text
    content: 'And his host, and those that were numbered of them, '
  - type: text
    content: were
  - type: text
    content: ' threescore and two thousand and seven hundred. '
  '27':
  - type: text
    content: 'And those that encamp by him '
  - type: text
    content: shall be
  - type: text
    content: ' the tribe of Asher: and the captain of the children of Asher '
  - type: text
    content: shall be
  - type: text
    content: ' Pagiel the son of Ocran. '
  '28':
  - type: text
    content: 'And his host, and those that were numbered of them, '
  - type: text
    content: were
  - type: text
    content: ' forty and one thousand and five hundred. '
  '29':
  - type: text
    content: 'Then the tribe of Naphtali: and the captain of the children of Naphtali '
  - type: text
    content: shall be
  - type: text
    content: ' Ahira the son of Enan. '
  '3':
  - type: text
    content: 'And on the east side toward the rising of the sun shall they of the standard of the camp of Judah pitch throughout their armies: and Nahshon the son of Amminadab '
  - type: text
    content: shall be
  - type: text
    content: ' captain of the children of Judah. '
  '30':
  - type: text
    content: 'And his host, and those that were numbered of them, '
  - type: text
    content: were
  - type: text
    content: ' fifty and three thousand and four hundred. '
  '31':
  - type: text
    content: 'All they that were numbered in the camp of Dan '
  - type: text
    content: were
  - type: text
    content: ' an hundred thousand and fifty and seven thousand and six hundred. They shall go hindmost with their standards.'
  '32':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' those which were numbered of the children of Israel by the house of their fathers: all those that were numbered of the camps throughout their hosts '
  - type: text
    content: were
  - type: text
    content: ' six hundred thousand and three thousand and five hundred and fifty. '
  '33':
  - type: text
    content: 'But the Levites were not numbered among the children of Israel; as the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses. '
  '34':
  - type: text
    content: 'And the children of Israel did according to all that the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded Moses: so they pitched by their standards, and so they set forward, every one after their families, according to the house of their fathers.'
  '4':
  - type: text
    content: 'And his host, and those that were numbered of them, '
  - type: text
    content: were
  - type: text
    content: ' threescore and fourteen thousand and six hundred. '
  '5':
  - type: text
    content: 'And those that do pitch next unto him '
  - type: text
    content: shall be
  - type: text
    content: ' the tribe of Issachar: and Nethaneel the son of Zuar '
  - type: text
    content: shall be
  - type: text
    content: ' captain of the children of Issachar. '
  '6':
  - type: text
    content: 'And his host, and those that were numbered thereof, '
  - type: text
    content: were
  - type: text
    content: ' fifty and four thousand and four hundred. '
  '7':
  - type: text
    content: Then
  - type: text
    content: ' the tribe of Zebulun: and Eliab the son of Helon '
  - type: text
    content: shall be
  - type: text
    content: ' captain of the children of Zebulun. '
  '8':
  - type: text
    content: 'And his host, and those that were numbered thereof, '
  - type: text
    content: were
  - type: text
    content: ' fifty and seven thousand and four hundred. '
  '9':
  - type: text
    content: 'All that were numbered in the camp of Judah '
  - type: text
    content: were
  - type: text
    content: ' an hundred thousand and fourscore thousand and six thousand and four hundred, throughout their armies. These shall first set forth.'
