- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' spake unto Moses and unto Aaron, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Every man of the children of Israel shall pitch by his own standard, with the ensign of their father''s house: far off about the tabernacle of the congregation shall they pitch. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And on the east side toward the rising of the sun shall they of the standard of the camp of Judah pitch throughout their armies: and Nahshon the son of Amminadab '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' captain of the children of Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And his host, and those that were numbered of them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' threescore and fourteen thousand and six hundred. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And those that do pitch next unto him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the tribe of Issachar: and Nethaneel the son of Zuar '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' captain of the children of Issachar. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And his host, and those that were numbered thereof, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' fifty and four thousand and four hundred. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: add
    children:
    - type: text
      text: Then
  - type: text
    text: ' the tribe of Zebulun: and Eliab the son of Helon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' captain of the children of Zebulun. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And his host, and those that were numbered thereof, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' fifty and seven thousand and four hundred. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'All that were numbered in the camp of Judah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' an hundred thousand and fourscore thousand and six thousand and four hundred, throughout their armies. These shall first set forth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'On the south side '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the standard of the camp of Reuben according to their armies: and the captain of the children of Reuben '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' Elizur the son of Shedeur. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And his host, and those that were numbered thereof, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' forty and six thousand and five hundred. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And those which pitch by him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the tribe of Simeon: and the captain of the children of Simeon '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' Shelumiel the son of Zurishaddai. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And his host, and those that were numbered of them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' fifty and nine thousand and three hundred. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then the tribe of Gad: and the captain of the sons of Gad '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' Eliasaph the son of Reuel. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And his host, and those that were numbered of them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' forty and five thousand and six hundred and fifty. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'All that were numbered in the camp of Reuben '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' an hundred thousand and fifty and one thousand and four hundred and fifty, throughout their armies. And they shall set forth in the second rank.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then the tabernacle of the congregation shall set forward with the camp of the Levites in the midst of the camp: as they encamp, so shall they set forward, every man in his place by their standards.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'On the west side '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the standard of the camp of Ephraim according to their armies: and the captain of the sons of Ephraim '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' Elishama the son of Ammihud. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And his host, and those that were numbered of them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' forty thousand and five hundred. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And by him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the tribe of Manasseh: and the captain of the children of Manasseh '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' Gamaliel the son of Pedahzur. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And his host, and those that were numbered of them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' thirty and two thousand and two hundred. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then the tribe of Benjamin: and the captain of the sons of Benjamin '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' Abidan the son of Gideoni. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And his host, and those that were numbered of them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' thirty and five thousand and four hundred. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'All that were numbered of the camp of Ephraim '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' an hundred thousand and eight thousand and an hundred, throughout their armies. And they shall go forward in the third rank.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The standard of the camp of Dan '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' on the north side by their armies: and the captain of the children of Dan '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' Ahiezer the son of Ammishaddai. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And his host, and those that were numbered of them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' threescore and two thousand and seven hundred. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And those that encamp by him '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the tribe of Asher: and the captain of the children of Asher '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' Pagiel the son of Ocran. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And his host, and those that were numbered of them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' forty and one thousand and five hundred. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then the tribe of Naphtali: and the captain of the children of Naphtali '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' Ahira the son of Enan. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And his host, and those that were numbered of them, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' fifty and three thousand and four hundred. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'All they that were numbered in the camp of Dan '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' an hundred thousand and fifty and seven thousand and six hundred. They shall go hindmost with their standards.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'These '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' those which were numbered of the children of Israel by the house of their fathers: all those that were numbered of the camps throughout their hosts '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' six hundred thousand and three thousand and five hundred and fifty. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'But the Levites were not numbered among the children of Israel; as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And the children of Israel did according to all that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' commanded Moses: so they pitched by their standards, and so they set forward, every one after their families, according to the house of their fathers.'
