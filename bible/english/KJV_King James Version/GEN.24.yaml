document_id: GEN.24
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Isaac and Rebekah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Abraham was old, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: and
  - type: text
    text: ' well stricken in age: and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had blessed Abraham in all things. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Abraham said unto his eldest servant of his house, that ruled over all that he had, Put, I pray thee, thy hand under my thigh: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and I will make thee swear by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', the God of heaven, and the God of the earth, that thou shalt not take a wife unto my son of the daughters of the Canaanites, among whom I dwell: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'but thou shalt go unto my country, and to my kindred, and take a wife unto my son Isaac. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the servant said unto him, Peradventure the woman will not be willing to follow me unto this land: must I needs bring thy son again unto the land from whence thou camest? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Abraham said unto him, Beware thou that thou bring not my son thither again. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of heaven, which took me from my father''s house, and from the land of my kindred, and which spake unto me, and that sware unto me, saying, Unto thy seed will I give this land; he shall send his angel before thee, and thou shalt take a wife unto my son from thence. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And if the woman will not be willing to follow thee, then thou shalt be clear from this my oath: only bring not my son thither again. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: And the servant put his hand under the thigh of Abraham his master, and sware to him concerning that matter.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the servant took ten camels of the camels of his master, and departed; for all the goods of his master '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' in his hand: and he arose, and went to Mesopotamia, unto the city of Nahor. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And he made his camels to kneel down without the city by a well of water at the time of the evening, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: even
  - type: text
    text: ' the time that women go out to draw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: water
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And he said, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of my master Abraham, I pray thee, send me good speed this day, and shew kindness unto my master Abraham. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Behold, I stand '
  - type: usfm
    marker: add
    children:
    - type: text
      text: here
  - type: text
    text: ' by the well of water; and the daughters of the men of the city come out to draw water: '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and let it come to pass, that the damsel to whom I shall say, Let down thy pitcher, I pray thee, that I may drink; and she shall say, Drink, and I will give thy camels drink also: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: let the same be
  - type: text
    text: ' she '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that
  - type: text
    text: ' thou hast appointed for thy servant Isaac; and thereby shall I know that thou hast shewed kindness unto my master.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And it came to pass, before he had done speaking, that, behold, Rebekah came out, who was born to Bethuel, son of Milcah, the wife of Nahor, Abraham''s brother, with her pitcher upon her shoulder. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the damsel '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' very fair to look upon, a virgin, neither had any man known her: and she went down to the well, and filled her pitcher, and came up. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the servant ran to meet her, and said, Let me, I pray thee, drink a little water of thy pitcher. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And she said, Drink, my lord: and she hasted, and let down her pitcher upon her hand, and gave him drink. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And when she had done giving him drink, she said, I will draw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: water
  - type: text
    text: ' for thy camels also, until they have done drinking. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And she hasted, and emptied her pitcher into the trough, and ran again unto the well to draw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: water
  - type: text
    text: ', and drew for all his camels. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And the man wondering at her held his peace, to wit whether the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' had made his journey prosperous or not. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And it came to pass, as the camels had done drinking, that the man took a golden earring of half a shekel weight, and two bracelets for her hands of ten '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shekels
  - type: text
    text: ' weight of gold; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'and said, Whose daughter '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' thou? tell me, I pray thee: is there room '
  - type: usfm
    marker: add
    children:
    - type: text
      text: in
  - type: text
    text: ' thy father''s house for us to lodge in? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And she said unto him, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' the daughter of Bethuel the son of Milcah, which she bare unto Nahor. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'She said moreover unto him, We have both straw and provender enough, and room to lodge in. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And the man bowed down his head, and worshipped the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And he said, Blessed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of my master Abraham, who hath not left destitute my master of his mercy and his truth: I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: being
  - type: text
    text: ' in the way, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' led me to the house of my master''s brethren. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And the damsel ran, and told '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them of
  - type: text
    text: ' her mother''s house these things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And Rebekah had a brother, and his name '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' Laban: and Laban ran out unto the man, unto the well. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And it came to pass, when he saw the earring and bracelets upon his sister''s hands, and when he heard the words of Rebekah his sister, saying, Thus spake the man unto me; that he came unto the man; and, behold, he stood by the camels at the well. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And he said, Come in, thou blessed of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ; wherefore standest thou without? for I have prepared the house, and room for the camels.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And the man came into the house: and he ungirded his camels, and gave straw and provender for the camels, and water to wash his feet, and the men''s feet that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with him. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And there was set '
  - type: usfm
    marker: add
    children:
    - type: text
      text: meat
  - type: text
    text: ' before him to eat: but he said, I will not eat, until I have told mine errand. And he said, Speak on. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And he said, I '
  - type: usfm
    marker: add
    children:
    - type: text
      text: am
  - type: text
    text: ' Abraham''s servant. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath blessed my master greatly; and he is become great: and he hath given him flocks, and herds, and silver, and gold, and menservants, and maidservants, and camels, and asses. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And Sarah my master''s wife bare a son to my master when she was old: and unto him hath he given all that he hath. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And my master made me swear, saying, Thou shalt not take a wife to my son of the daughters of the Canaanites, in whose land I dwell: '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'but thou shalt go unto my father''s house, and to my kindred, and take a wife unto my son. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And I said unto my master, Peradventure the woman will not follow me. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And he said unto me, The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', before whom I walk, will send his angel with thee, and prosper thy way; and thou shalt take a wife for my son of my kindred, and of my father''s house: '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'then shalt thou be clear from '
  - type: usfm
    marker: add
    children:
    - type: text
      text: this
  - type: text
    text: ' my oath, when thou comest to my kindred; and if they give not thee '
  - type: usfm
    marker: add
    children:
    - type: text
      text: one
  - type: text
    text: ', thou shalt be clear from my oath. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And I came this day unto the well, and said, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of my master Abraham, if now thou do prosper my way which I go: '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'behold, I stand by the well of water; and it shall come to pass, that when the virgin cometh forth to draw '
  - type: usfm
    marker: add
    children:
    - type: text
      text: water
  - type: text
    text: ', and I say to her, Give me, I pray thee, a little water of thy pitcher to drink; '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'and she say to me, Both drink thou, and I will also draw for thy camels: '
  - type: usfm
    marker: add
    children:
    - type: text
      text: let
  - type: text
    text: ' the same '
  - type: usfm
    marker: add
    children:
    - type: text
      text: be
  - type: text
    text: ' the woman whom the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath appointed out for my master''s son. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'And before I had done speaking in mine heart, behold, Rebekah came forth with her pitcher on her shoulder; and she went down unto the well, and drew '
  - type: usfm
    marker: add
    children:
    - type: text
      text: 'water:'
  - type: text
    text: ' and I said unto her, Let me drink, I pray thee. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'And she made haste, and let down her pitcher from her '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shoulder
  - type: text
    text: ', and said, Drink, and I will give thy camels drink also: so I drank, and she made the camels drink also. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'And I asked her, and said, Whose daughter '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' thou? And she said, The daughter of Bethuel, Nahor''s son, whom Milcah bare unto him: and I put the earring upon her face, and the bracelets upon her hands. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'And I bowed down my head, and worshipped the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', and blessed the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' God of my master Abraham, which had led me in the right way to take my master''s brother''s daughter unto his son. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'And now if ye will deal kindly and truly with my master, tell me: and if not, tell me; that I may turn to the right hand, or to the left.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Then Laban and Bethuel answered and said, The thing proceedeth from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ': we cannot speak unto thee bad or good. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Behold, Rebekah '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' before thee, take '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her
  - type: text
    text: ', and go, and let her be thy master''s son''s wife, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath spoken. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'And it came to pass, that, when Abraham''s servant heard their words, he worshipped the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ', '
  - type: usfm
    marker: add
    children:
    - type: text
      text: bowing himself
  - type: text
    text: ' to the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'And the servant brought forth jewels of silver, and jewels of gold, and raiment, and gave '
  - type: usfm
    marker: add
    children:
    - type: text
      text: them
  - type: text
    text: ' to Rebekah: he gave also to her brother and to her mother precious things. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'And they did eat and drink, he and the men that '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' with him, and tarried all night; and they rose up in the morning, and he said, Send me away unto my master. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'And her brother and her mother said, Let the damsel abide with us '
  - type: usfm
    marker: add
    children:
    - type: text
      text: a few
  - type: text
    text: ' days, at the least ten; after that she shall go. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'And he said unto them, Hinder me not, seeing the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: LORD
  - type: text
    text: ' hath prospered my way; send me away that I may go to my master. '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'And they said, We will call the damsel, and enquire at her mouth. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'And they called Rebekah, and said unto her, Wilt thou go with this man? And she said, I will go. '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'And they sent away Rebekah their sister, and her nurse, and Abraham''s servant, and his men. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'And they blessed Rebekah, and said unto her, Thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: art
  - type: text
    text: ' our sister, be thou '
  - type: usfm
    marker: add
    children:
    - type: text
      text: the mother
  - type: text
    text: ' of thousands of millions, and let thy seed possess the gate of those which hate them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'And Rebekah arose, and her damsels, and they rode upon the camels, and followed the man: and the servant took Rebekah, and went his way. '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'And Isaac came from the way of the well Lahai-roi; for he dwelt in the south country. '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'And Isaac went out to meditate in the field at the eventide: and he lifted up his eyes, and saw, and, behold, the camels '
  - type: usfm
    marker: add
    children:
    - type: text
      text: were
  - type: text
    text: ' coming. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'And Rebekah lifted up her eyes, and when she saw Isaac, she lighted off the camel. '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'For she '
  - type: usfm
    marker: add
    children:
    - type: text
      text: had
  - type: text
    text: ' said unto the servant, What man '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' this that walketh in the field to meet us? And the servant '
  - type: usfm
    marker: add
    children:
    - type: text
      text: had
  - type: text
    text: ' said, It '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' my master: therefore she took a vail, and covered herself. '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'And the servant told Isaac all things that he had done. '
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'And Isaac brought her into his mother Sarah''s tent, and took Rebekah, and she became his wife; and he loved her: and Isaac was comforted after his mother''s '
  - type: usfm
    marker: add
    children:
    - type: text
      text: death
  - type: text
    text: .
