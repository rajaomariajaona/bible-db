document_id: HEB.9,1
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then verily the first '
  - type: text
    content: covenant
  - type: text
    content: ' had also ordinances of divine service, and a worldly sanctuary. '
  '10':
  - type: text
    content: which stood
  - type: text
    content: ' only in meats and drinks, and divers washings, and carnal ordinances, imposed '
  - type: text
    content: on them
  - type: text
    content: ' until the time of reformation.'
  '11':
  - type: text
    content: 'But Christ being come an high priest of good things to come, by a greater and more perfect tabernacle, not made with hands, that is to say, not of this building; '
  '12':
  - type: text
    content: 'neither by the blood of goats and calves, but by his own blood he entered in once into the holy place, having obtained eternal redemption '
  - type: text
    content: for us
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'For if the blood of bulls and of goats, and the ashes of an heifer sprinkling the unclean, sanctifieth to the purifying of the flesh: '
  '14':
  - type: text
    content: how much more shall the blood of Christ, who through the eternal Spirit offered himself without spot to God, purge your conscience from dead works to serve the living God?
  '15':
  - type: text
    content: 'And for this cause he is the mediator of the new testament, that by means of death, for the redemption of the transgressions '
  - type: text
    content: that were
  - type: text
    content: ' under the first testament, they which are called might receive the promise of eternal inheritance. '
  '16':
  - type: text
    content: 'For where a testament '
  - type: text
    content: is
  - type: text
    content: ', there must also of necessity be the death of the testator. '
  '17':
  - type: text
    content: 'For a testament '
  - type: text
    content: is
  - type: text
    content: ' of force after men are dead: otherwise it is of no strength at all while the testator liveth. '
  '18':
  - type: text
    content: 'Whereupon neither the first '
  - type: text
    content: testament
  - type: text
    content: ' was dedicated without blood. '
  '19':
  - type: text
    content: 'For when Moses had spoken every precept to all the people according to the law, he took the blood of calves and of goats, with water, and scarlet wool, and hyssop, and sprinkled both the book, and all the people, '
  '2':
  - type: text
    content: 'For there was a tabernacle made; the first, wherein '
  - type: text
    content: was
  - type: text
    content: ' the candlestick, and the table, and the shewbread; which is called the sanctuary. '
  '20':
  - type: text
    content: 'saying, This '
  - type: text
    content: is
  - type: text
    content: ' the blood of the testament which God hath enjoined unto you. '
  '21':
  - type: text
    content: 'Moreover he sprinkled with blood both the tabernacle, and all the vessels of the ministry. '
  '22':
  - type: text
    content: And almost all things are by the law purged with blood; and without shedding of blood is no remission.
  '23':
  - type: text
    content: ' '
  - type: text
    content: It was
  - type: text
    content: ' therefore necessary that the patterns of things in the heavens should be purified with these; but the heavenly things themselves with better sacrifices than these. '
  '24':
  - type: text
    content: 'For Christ is not entered into the holy places made with hands, '
  - type: text
    content: which are
  - type: text
    content: ' the figures of the true; but into heaven itself, now to appear in the presence of God for us: '
  '25':
  - type: text
    content: 'nor yet that he should offer himself often, as the high priest entereth into the holy place every year with blood of others; '
  '26':
  - type: text
    content: 'for then must he often have suffered since the foundation of the world: but now once in the end of the world hath he appeared to put away sin by the sacrifice of himself. '
  '27':
  - type: text
    content: 'And as it is appointed unto men once to die, but after this the judgment: '
  '28':
  - type: text
    content: so Christ was once offered to bear the sins of many; and unto them that look for him shall he appear the second time without sin unto salvation.
  '3':
  - type: text
    content: 'And after the second veil, the tabernacle which is called the Holiest of all; '
  '4':
  - type: text
    content: 'which had the golden censer, and the ark of the covenant overlaid round about with gold, wherein '
  - type: text
    content: was
  - type: text
    content: ' the golden pot that had manna, and Aaron''s rod that budded, and the tables of the covenant; '
  '5':
  - type: text
    content: 'and over it the cherubims of glory shadowing the mercyseat; of which we cannot now speak particularly. '
  '6':
  - type: text
    content: 'Now when these things were thus ordained, the priests went always into the first tabernacle, accomplishing the service '
  - type: text
    content: of God
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'But into the second '
  - type: text
    content: went
  - type: text
    content: ' the high priest alone once every year, not without blood, which he offered for himself, and '
  - type: text
    content: for
  - type: text
    content: ' the errors of the people: '
  '8':
  - type: text
    content: 'the Holy Ghost this signifying, that the way into the holiest of all was not yet made manifest, while as the first tabernacle was yet standing: '
  '9':
  - type: text
    content: 'which '
  - type: text
    content: was
  - type: text
    content: ' a figure for the time then present, in which were offered both gifts and sacrifices, that could not make him that did the service perfect, as pertaining to the conscience; '
