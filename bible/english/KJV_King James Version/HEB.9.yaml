document_id: HEB.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then verily the first '
  - type: usfm
    marker: add
    children:
    - type: text
      text: covenant
  - type: text
    text: ' had also ordinances of divine service, and a worldly sanctuary. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For there was a tabernacle made; the first, wherein '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the candlestick, and the table, and the shewbread; which is called the sanctuary. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And after the second veil, the tabernacle which is called the Holiest of all; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'which had the golden censer, and the ark of the covenant overlaid round about with gold, wherein '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' the golden pot that had manna, and Aaron''s rod that budded, and the tables of the covenant; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and over it the cherubims of glory shadowing the mercyseat; of which we cannot now speak particularly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now when these things were thus ordained, the priests went always into the first tabernacle, accomplishing the service '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of God
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But into the second '
  - type: usfm
    marker: add
    children:
    - type: text
      text: went
  - type: text
    text: ' the high priest alone once every year, not without blood, which he offered for himself, and '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for
  - type: text
    text: ' the errors of the people: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'the Holy Ghost this signifying, that the way into the holiest of all was not yet made manifest, while as the first tabernacle was yet standing: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'which '
  - type: usfm
    marker: add
    children:
    - type: text
      text: was
  - type: text
    text: ' a figure for the time then present, in which were offered both gifts and sacrifices, that could not make him that did the service perfect, as pertaining to the conscience; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: add
    children:
    - type: text
      text: which stood
  - type: text
    text: ' only in meats and drinks, and divers washings, and carnal ordinances, imposed '
  - type: usfm
    marker: add
    children:
    - type: text
      text: on them
  - type: text
    text: ' until the time of reformation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But Christ being come an high priest of good things to come, by a greater and more perfect tabernacle, not made with hands, that is to say, not of this building; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'neither by the blood of goats and calves, but by his own blood he entered in once into the holy place, having obtained eternal redemption '
  - type: usfm
    marker: add
    children:
    - type: text
      text: for us
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For if the blood of bulls and of goats, and the ashes of an heifer sprinkling the unclean, sanctifieth to the purifying of the flesh: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: how much more shall the blood of Christ, who through the eternal Spirit offered himself without spot to God, purge your conscience from dead works to serve the living God?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And for this cause he is the mediator of the new testament, that by means of death, for the redemption of the transgressions '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that were
  - type: text
    text: ' under the first testament, they which are called might receive the promise of eternal inheritance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For where a testament '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ', there must also of necessity be the death of the testator. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For a testament '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' of force after men are dead: otherwise it is of no strength at all while the testator liveth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Whereupon neither the first '
  - type: usfm
    marker: add
    children:
    - type: text
      text: testament
  - type: text
    text: ' was dedicated without blood. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For when Moses had spoken every precept to all the people according to the law, he took the blood of calves and of goats, with water, and scarlet wool, and hyssop, and sprinkled both the book, and all the people, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'saying, This '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' the blood of the testament which God hath enjoined unto you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Moreover he sprinkled with blood both the tabernacle, and all the vessels of the ministry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: And almost all things are by the law purged with blood; and without shedding of blood is no remission.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: add
    children:
    - type: text
      text: It was
  - type: text
    text: ' therefore necessary that the patterns of things in the heavens should be purified with these; but the heavenly things themselves with better sacrifices than these. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'For Christ is not entered into the holy places made with hands, '
  - type: usfm
    marker: add
    children:
    - type: text
      text: which are
  - type: text
    text: ' the figures of the true; but into heaven itself, now to appear in the presence of God for us: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'nor yet that he should offer himself often, as the high priest entereth into the holy place every year with blood of others; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'for then must he often have suffered since the foundation of the world: but now once in the end of the world hath he appeared to put away sin by the sacrifice of himself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And as it is appointed unto men once to die, but after this the judgment: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: so Christ was once offered to bear the sins of many; and unto them that look for him shall he appear the second time without sin unto salvation.
