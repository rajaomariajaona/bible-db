  '1':
  - type: heading
    content: The Problem of the Jews
  - type: heading
    content: The Rejection of Israel
  - type: text
    content: 'I say the truth in Christ, I lie not, my conscience also bearing me witness in the Holy Ghost, '
  '10':
  - type: text
    content: 'And not only '
  - type: text
    content: this
  - type: text
    content: '; but when Rebecca also had conceived by one, '
  - type: text
    content: even
  - type: text
    content: ' by our father Isaac; '
  '11':
  - type: text
    content: '(for '
  - type: text
    content: the children
  - type: text
    content: ' being not yet born, neither having done any good or evil, that the purpose of God according to election might stand, not of works, but of him that calleth;) '
  '12':
  - type: text
    content: 'it was said unto her, The elder shall serve the younger. '
  '13':
  - type: text
    content: As it is written, Jacob have I loved, but Esau have I hated.
  - type: heading
    content: The Problem
  '14':
  - type: text
    content: 'What shall we say then? '
  - type: text
    content: Is there
  - type: text
    content: ' unrighteousness with God? God forbid. '
  '15':
  - type: text
    content: 'For he saith to Moses, I will have mercy on whom I will have mercy, and I will have compassion on whom I will have compassion. '
  '16':
  - type: text
    content: 'So then '
  - type: text
    content: it is
  - type: text
    content: ' not of him that willeth, nor of him that runneth, but of God that sheweth mercy. '
  '17':
  - type: text
    content: 'For the scripture saith unto Pharaoh, Even for this same purpose have I raised thee up, that I might shew my power in thee, and that my name might be declared throughout all the earth. '
  '18':
  - type: text
    content: 'Therefore hath he mercy on whom he will '
  - type: text
    content: have mercy
  - type: text
    content: ', and whom he will he hardeneth.'
  '19':
  - type: text
    content: 'Thou wilt say then unto me, Why doth he yet find fault? For who hath resisted his will? '
  '2':
  - type: text
    content: 'that I have great heaviness and continual sorrow in my heart. '
  '20':
  - type: text
    content: 'Nay but, O man, who art thou that repliest against God? Shall the thing formed say to him that formed '
  - type: text
    content: it
  - type: text
    content: ', Why hast thou made me thus? '
  '21':
  - type: text
    content: 'Hath not the potter power over the clay, of the same lump to make one vessel unto honour, and another unto dishonour? '
  '22':
  - type: text
    content: What
  - type: text
    content: ' if God, willing to shew '
  - type: text
    content: his
  - type: text
    content: ' wrath, and to make his power known, endured with much longsuffering the vessels of wrath fitted to destruction: '
  '23':
  - type: text
    content: 'and that he might make known the riches of his glory on the vessels of mercy, which he had afore prepared unto glory, '
  '24':
  - type: text
    content: 'even us, whom he hath called, not of the Jews only, but also of the Gentiles? '
  '25':
  - type: text
    content: As he saith also in Osee,
  - type: text
    content: I will call them my people, which were not my people;
  - type: text
    content: And her beloved, which was not beloved.
  '26':
  - type: text
    content: 'And it shall come to pass, '
  - type: text
    content: that
  - type: text
    content: ' in the place where it was said unto them, Ye '
  - type: text
    content: are
  - type: text
    content: ' not my people;'
  - type: text
    content: There shall they be called the children of the living God.
  '27':
  - type: text
    content: 'Esaias also crieth concerning Israel, Though the number of the children of Israel be as the sand of the sea, a remnant shall be saved: '
  '28':
  - type: text
    content: 'for he will finish the work, and cut '
  - type: text
    content: it
  - type: text
    content: ' short in righteousness: because a short work will the Lord make upon the earth. '
  '29':
  - type: text
    content: And as Esaias said before,
  - type: text
    content: Except the Lord of Sabaoth had left us a seed,
  - type: text
    content: We had been as Sodoma, and been made like unto Gomorrha.
  - type: heading
    content: The Divine Justice of It
  '3':
  - type: text
    content: 'For I could wish that myself were accursed from Christ for my brethren, my kinsmen according to the flesh: '
  '30':
  - type: text
    content: 'What shall we say then? That the Gentiles, which followed not after righteousness, have attained to righteousness, even the righteousness which is of faith. '
  '31':
  - type: text
    content: 'But Israel, which followed after the law of righteousness, hath not attained to the law of righteousness. '
  '32':
  - type: text
    content: 'Wherefore? Because '
  - type: text
    content: they sought it
  - type: text
    content: ' not by faith, but as it were by the works of the law. For they stumbled at that stumblingstone; '
  '33':
  - type: text
    content: as it is written,
  - type: text
    content: 'Behold, I lay in Sion a stumblingstone and rock of offence:'
  - type: text
    content: And whosoever believeth on him shall not be ashamed.
  '4':
  - type: text
    content: 'who are Israelites; to whom '
  - type: text
    content: pertaineth
  - type: text
    content: ' the adoption, and the glory, and the covenants, and the giving of the law, and the service '
  - type: text
    content: of God
  - type: text
    content: ', and the promises; '
  '5':
  - type: text
    content: 'whose '
  - type: text
    content: are
  - type: text
    content: ' the fathers, and of whom as concerning the flesh Christ '
  - type: text
    content: came
  - type: text
    content: ', who is over all, God blessed for ever. Amen. '
  '6':
  - type: text
    content: 'Not as though the word of God hath taken none effect. For they '
  - type: text
    content: are
  - type: text
    content: ' not all Israel, which are of Israel: '
  '7':
  - type: text
    content: 'neither, because they are the seed of Abraham, '
  - type: text
    content: are they
  - type: text
    content: ' all children: but, In Isaac shall thy seed be called. '
  '8':
  - type: text
    content: 'That is, They which are the children of the flesh, these '
  - type: text
    content: are
  - type: text
    content: ' not the children of God: but the children of the promise are counted for the seed. '
  '9':
  - type: text
    content: 'For this '
  - type: text
    content: is
  - type: text
    content: ' the word of promise, At this time will I come, and Sarah shall have a son. '
