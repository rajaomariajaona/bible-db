document_id: ROM.9,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Problem of the Jews
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Rejection of Israel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'I say the truth in Christ, I lie not, my conscience also bearing me witness in the Holy Ghost, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And not only '
    - type: usfm
      marker: add
      children:
      - type: text
        text: this
    - type: text
      text: '; but when Rebecca also had conceived by one, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' by our father Isaac; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '(for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: the children
    - type: text
      text: ' being not yet born, neither having done any good or evil, that the purpose of God according to election might stand, not of works, but of him that calleth;) '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'it was said unto her, The elder shall serve the younger. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: As it is written, Jacob have I loved, but Esau have I hated.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Problem
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'What shall we say then? '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Is there
    - type: text
      text: ' unrighteousness with God? God forbid. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'For he saith to Moses, I will have mercy on whom I will have mercy, and I will have compassion on whom I will have compassion. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So then '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it is
    - type: text
      text: ' not of him that willeth, nor of him that runneth, but of God that sheweth mercy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For the scripture saith unto Pharaoh, Even for this same purpose have I raised thee up, that I might shew my power in thee, and that my name might be declared throughout all the earth. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Therefore hath he mercy on whom he will '
    - type: usfm
      marker: add
      children:
      - type: text
        text: have mercy
    - type: text
      text: ', and whom he will he hardeneth.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Thou wilt say then unto me, Why doth he yet find fault? For who hath resisted his will? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'that I have great heaviness and continual sorrow in my heart. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Nay but, O man, who art thou that repliest against God? Shall the thing formed say to him that formed '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ', Why hast thou made me thus? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Hath not the potter power over the clay, of the same lump to make one vessel unto honour, and another unto dishonour? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: add
      children:
      - type: text
        text: What
    - type: text
      text: ' if God, willing to shew '
    - type: usfm
      marker: add
      children:
      - type: text
        text: his
    - type: text
      text: ' wrath, and to make his power known, endured with much longsuffering the vessels of wrath fitted to destruction: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'and that he might make known the riches of his glory on the vessels of mercy, which he had afore prepared unto glory, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'even us, whom he hath called, not of the Jews only, but also of the Gentiles? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: As he saith also in Osee,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will call them my people, which were not my people;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And her beloved, which was not beloved.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And it shall come to pass, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' in the place where it was said unto them, Ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' not my people;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There shall they be called the children of the living God.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Esaias also crieth concerning Israel, Though the number of the children of Israel be as the sand of the sea, a remnant shall be saved: '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'for he will finish the work, and cut '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' short in righteousness: because a short work will the Lord make upon the earth. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: And as Esaias said before,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Except the Lord of Sabaoth had left us a seed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We had been as Sodoma, and been made like unto Gomorrha.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Divine Justice of It
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For I could wish that myself were accursed from Christ for my brethren, my kinsmen according to the flesh: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'What shall we say then? That the Gentiles, which followed not after righteousness, have attained to righteousness, even the righteousness which is of faith. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'But Israel, which followed after the law of righteousness, hath not attained to the law of righteousness. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Wherefore? Because '
    - type: usfm
      marker: add
      children:
      - type: text
        text: they sought it
    - type: text
      text: ' not by faith, but as it were by the works of the law. For they stumbled at that stumblingstone; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: as it is written,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Behold, I lay in Sion a stumblingstone and rock of offence:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And whosoever believeth on him shall not be ashamed.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'who are Israelites; to whom '
    - type: usfm
      marker: add
      children:
      - type: text
        text: pertaineth
    - type: text
      text: ' the adoption, and the glory, and the covenants, and the giving of the law, and the service '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of God
    - type: text
      text: ', and the promises; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'whose '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the fathers, and of whom as concerning the flesh Christ '
    - type: usfm
      marker: add
      children:
      - type: text
        text: came
    - type: text
      text: ', who is over all, God blessed for ever. Amen. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Not as though the word of God hath taken none effect. For they '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' not all Israel, which are of Israel: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'neither, because they are the seed of Abraham, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are they
    - type: text
      text: ' all children: but, In Isaac shall thy seed be called. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'That is, They which are the children of the flesh, these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' not the children of God: but the children of the promise are counted for the seed. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the word of promise, At this time will I come, and Sarah shall have a son. '
