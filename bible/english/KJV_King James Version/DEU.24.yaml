  '7':
  - type: text
    content: If a man be found stealing any of his brethren of the children of Israel, and maketh merchandise of him, or selleth him; then that thief shall die; and thou shalt put evil away from among you.
  '8':
  - type: text
    content: 'Take heed in the plague of leprosy, that thou observe diligently, and do according to all that the priests the Levites shall teach you: as I commanded them, '
  - type: text
    content: so
  - type: text
