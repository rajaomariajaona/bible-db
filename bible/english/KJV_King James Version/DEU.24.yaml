verses:
  '1':
  - type: text
    content: 'When a man hath taken a wife, and married her, and it come to pass that she find no favour in his eyes, because he hath found some uncleanness in her: then let him write her a bill of divorcement, and give '
  - type: text
    content: it
  - type: text
    content: ' in her hand, and send her out of his house. '
  '10':
  - type: text
    content: 'When thou dost lend thy brother any thing, thou shalt not go into his house to fetch his pledge. '
  '11':
  - type: text
    content: 'Thou shalt stand abroad, and the man to whom thou dost lend shall bring out the pledge abroad unto thee. '
  '12':
  - type: text
    content: 'And if the man '
  - type: text
    content: be
  - type: text
    content: ' poor, thou shalt not sleep with his pledge: '
  '13':
  - type: text
    content: 'in any case thou shalt deliver him the pledge again when the sun goeth down, that he may sleep in his own raiment, and bless thee: and it shall be righteousness unto thee before the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God.'
  '14':
  - type: text
    content: 'Thou shalt not oppress an hired servant '
  - type: text
    content: that is
  - type: text
