  - type: text
    content: ' his hire, neither shall the sun go down upon it; for he '
  - type: text
    content: is
  - type: text
    content: ' poor, and setteth his heart upon it: lest he cry against thee unto the '
  - type: text
    content: LORD
  - type: text
    content: ', and it be sin unto thee.'
  '16':
  - type: text
    content: 'The fathers shall not be put to death for the children, neither shall the children be put to death for the fathers: every man shall be put to death for his own sin.'
  '17':
  - type: text
    content: 'Thou shalt not pervert the judgment of the stranger, '
  - type: text
    content: nor
  - type: text
    content: ' of the fatherless; nor take a widow''s raiment to pledge: '
  '18':
  - type: text
    content: 'but thou shalt remember that thou wast a bondman in Egypt, and the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God redeemed thee thence: therefore I command thee to do this thing.'
  '19':
  - type: text
    content: 'When thou cuttest down thine harvest in thy field, and hast forgot a sheaf in the field, thou shalt not go again to fetch it: it shall be for the stranger, for the fatherless, and for the widow: that the '
  - type: text
    content: LORD
  - type: text
    content: ' thy God may bless thee in all the work of thine hands. '
  '2':
  - type: text
    content: 'And when she is departed out of his house, she may go and be another man''s '
  - type: text
    content: wife
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'When thou beatest thine olive tree, thou shalt not go over the boughs again: it shall be for the stranger, for the fatherless, and for the widow. '
  '21':
  - type: text
    content: 'When thou gatherest the grapes of thy vineyard, thou shalt not glean '
  - type: text
    content: it
  - type: text
    content: ' afterward: it shall be for the stranger, for the fatherless, and for the widow. '
  '22':
  - type: text
    content: 'And thou shalt remember that thou wast a bondman in the land of Egypt: therefore I command thee to do this thing.'
  '3':
  - type: text
    content: 'And '
