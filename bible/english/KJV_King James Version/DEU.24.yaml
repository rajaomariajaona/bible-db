document_id: DEU.24,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'When a man hath taken a wife, and married her, and it come to pass that she find no favour in his eyes, because he hath found some uncleanness in her: then let him write her a bill of divorcement, and give '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' in her hand, and send her out of his house. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'When thou dost lend thy brother any thing, thou shalt not go into his house to fetch his pledge. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Thou shalt stand abroad, and the man to whom thou dost lend shall bring out the pledge abroad unto thee. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And if the man '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' poor, thou shalt not sleep with his pledge: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'in any case thou shalt deliver him the pledge again when the sun goeth down, that he may sleep in his own raiment, and bless thee: and it shall be righteousness unto thee before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Thou shalt not oppress an hired servant '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that is
    - type: text
      text: ' poor and needy, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: whether he be
    - type: text
      text: ' of thy brethren, or of thy strangers that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in thy land within thy gates: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'at his day thou shalt give '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' his hire, neither shall the sun go down upon it; for he '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' poor, and setteth his heart upon it: lest he cry against thee unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and it be sin unto thee.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The fathers shall not be put to death for the children, neither shall the children be put to death for the fathers: every man shall be put to death for his own sin.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Thou shalt not pervert the judgment of the stranger, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: nor
    - type: text
      text: ' of the fatherless; nor take a widow''s raiment to pledge: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'but thou shalt remember that thou wast a bondman in Egypt, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God redeemed thee thence: therefore I command thee to do this thing.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'When thou cuttest down thine harvest in thy field, and hast forgot a sheaf in the field, thou shalt not go again to fetch it: it shall be for the stranger, for the fatherless, and for the widow: that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God may bless thee in all the work of thine hands. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And when she is departed out of his house, she may go and be another man''s '
    - type: usfm
      marker: add
      children:
      - type: text
        text: wife
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'When thou beatest thine olive tree, thou shalt not go over the boughs again: it shall be for the stranger, for the fatherless, and for the widow. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'When thou gatherest the grapes of thy vineyard, thou shalt not glean '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' afterward: it shall be for the stranger, for the fatherless, and for the widow. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And thou shalt remember that thou wast a bondman in the land of Egypt: therefore I command thee to do this thing.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: if
    - type: text
      text: ' the latter husband hate her, and write her a bill of divorcement, and giveth '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it
    - type: text
      text: ' in her hand, and sendeth her out of his house; or if the latter husband die, which took her '
    - type: usfm
      marker: add
      children:
      - type: text
        text: to be
    - type: text
      text: ' his wife; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'her former husband, which sent her away, may not take her again to be his wife, after that she is defiled; for that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' abomination before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ': and thou shalt not cause the land to sin, which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God giveth thee '
    - type: usfm
      marker: add
      children:
      - type: text
        text: for
    - type: text
      text: ' an inheritance.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'When a man hath taken a new wife, he shall not go out to war, neither shall he be charged with any business: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: but
    - type: text
      text: ' he shall be free at home one year, and shall cheer up his wife which he hath taken.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'No man shall take the nether or the upper millstone to pledge: for he taketh '
    - type: usfm
      marker: add
      children:
      - type: text
        text: a man's
    - type: text
      text: ' life to pledge.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: If a man be found stealing any of his brethren of the children of Israel, and maketh merchandise of him, or selleth him; then that thief shall die; and thou shalt put evil away from among you.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Take heed in the plague of leprosy, that thou observe diligently, and do according to all that the priests the Levites shall teach you: as I commanded them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: so
    - type: text
      text: ' ye shall observe to do. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Remember what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' thy God did unto Miriam by the way, after that ye were come forth out of Egypt.'
