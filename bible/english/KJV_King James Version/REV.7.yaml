document_id: REV.7,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Sealing the Servants of God
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And after these things I saw four angels standing on the four corners of the earth, holding the four winds of the earth, that the wind should not blow on the earth, nor on the sea, nor on any tree. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: and cried with a loud voice, saying, Salvation to our God which sitteth upon the throne, and unto the Lamb.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And all the angels stood round about the throne, and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: about
    - type: text
      text: ' the elders and the four beasts, and fell before the throne on their faces, and worshipped God, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'saying, Amen: Blessing, and glory, and wisdom, and thanksgiving, and honour, and power, and might, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' unto our God for ever and ever. Amen.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And one of the elders answered, saying unto me, What are these which are arrayed in white robes? and whence came they? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And I said unto him, Sir, thou knowest. And he said to me, These are they which came out of great tribulation, and have washed their robes, and made them white in the blood of the Lamb. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Therefore are they before the throne of God, and serve him day and night in his temple: and he that sitteth on the throne shall dwell among them. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'They shall hunger no more, neither thirst any more; neither shall the sun light on them, nor any heat. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For the Lamb which is in the midst of the throne shall feed them, and shall lead them unto living fountains of waters: and God shall wipe away all tears from their eyes.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And I saw another angel ascending from the east, having the seal of the living God: and he cried with a loud voice to the four angels, to whom it was given to hurt the earth and the sea, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'saying, Hurt not the earth, neither the sea, nor the trees, till we have sealed the servants of our God in their foreheads. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And I heard the number of them which were sealed: '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and there were
    - type: text
      text: ' sealed an hundred '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' forty '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' four thousand of all the tribes of the children of Israel. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Of the tribe of Juda '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' sealed twelve thousand. Of the tribe of Reuben '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' sealed twelve thousand. Of the tribe of Gad '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' sealed twelve thousand. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Of the tribe of Aser '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' sealed twelve thousand. Of the tribe of Nepthalim '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' sealed twelve thousand. Of the tribe of Manasses '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' sealed twelve thousand. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Of the tribe of Simeon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' sealed twelve thousand. Of the tribe of Levi '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' sealed twelve thousand. Of the tribe of Issachar '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' sealed twelve thousand. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Of the tribe of Zabulon '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' sealed twelve thousand. Of the tribe of Joseph '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' sealed twelve thousand. Of the tribe of Benjamin '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' sealed twelve thousand.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'After this I beheld, and, lo, a great multitude, which no man could number, of all nations, and kindreds, and people, and tongues, stood before the throne, and before the Lamb, clothed with white robes, and palms in their hands; '
