document_id: REV.7,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Sealing the Servants of God
  - type: text
    content: 'And after these things I saw four angels standing on the four corners of the earth, holding the four winds of the earth, that the wind should not blow on the earth, nor on the sea, nor on any tree. '
  '10':
  - type: text
    content: and cried with a loud voice, saying, Salvation to our God which sitteth upon the throne, and unto the Lamb.
  '11':
  - type: text
    content: 'And all the angels stood round about the throne, and '
  - type: text
    content: about
  - type: text
    content: ' the elders and the four beasts, and fell before the throne on their faces, and worshipped God, '
  '12':
  - type: text
    content: 'saying, Amen: Blessing, and glory, and wisdom, and thanksgiving, and honour, and power, and might, '
  - type: text
    content: be
  - type: text
    content: ' unto our God for ever and ever. Amen.'
  '13':
  - type: text
    content: 'And one of the elders answered, saying unto me, What are these which are arrayed in white robes? and whence came they? '
  '14':
  - type: text
    content: 'And I said unto him, Sir, thou knowest. And he said to me, These are they which came out of great tribulation, and have washed their robes, and made them white in the blood of the Lamb. '
  '15':
  - type: text
    content: 'Therefore are they before the throne of God, and serve him day and night in his temple: and he that sitteth on the throne shall dwell among them. '
  '16':
  - type: text
    content: 'They shall hunger no more, neither thirst any more; neither shall the sun light on them, nor any heat. '
  '17':
  - type: text
    content: 'For the Lamb which is in the midst of the throne shall feed them, and shall lead them unto living fountains of waters: and God shall wipe away all tears from their eyes.'
  '2':
  - type: text
    content: 'And I saw another angel ascending from the east, having the seal of the living God: and he cried with a loud voice to the four angels, to whom it was given to hurt the earth and the sea, '
  '3':
  - type: text
    content: 'saying, Hurt not the earth, neither the sea, nor the trees, till we have sealed the servants of our God in their foreheads. '
  '4':
  - type: text
    content: 'And I heard the number of them which were sealed: '
  - type: text
    content: and there were
  - type: text
    content: ' sealed an hundred '
  - type: text
    content: and
  - type: text
    content: ' forty '
  - type: text
    content: and
  - type: text
    content: ' four thousand of all the tribes of the children of Israel. '
