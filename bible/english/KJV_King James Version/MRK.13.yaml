document_id: MRK.13
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And as he went out of the temple, one of his disciples saith unto him, Master, see what manner of stones and what buildings '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are here!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Jesus answering said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Seest thou these great buildings? there shall not be left one stone upon another, that shall not be thrown down.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And as he sat upon the mount of Olives over against the temple, Peter and James and John and Andrew asked him privately, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tell us, when shall these things be? and what '
  - type: usfm
    marker: add
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the sign when all these things shall be fulfilled? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And Jesus answering them began to say, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Take heed lest any '
    - type: usfm
      marker: add
      children:
      - type: text
        text: man
    - type: text
      text: ' deceive you:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'for many shall come in my name, saying, I am '
    - type: usfm
      marker: add
      children:
      - type: text
        text: Christ
    - type: text
      text: ; and shall deceive many.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And when ye shall hear of wars and rumours of wars, be ye not troubled: for '
    - type: usfm
      marker: add
      children:
      - type: text
        text: such things
    - type: text
      text: ' must needs be; but the end '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall
    - type: text
      text: ' not '
    - type: usfm
      marker: add
      children:
      - type: text
        text: be
    - type: text
      text: ' yet.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For nation shall rise against nation, and kingdom against kingdom: and there shall be earthquakes in divers places, and there shall be famines and troubles: these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' the beginnings of sorrows.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But take heed to yourselves: for they shall deliver you up to councils; and in the synagogues ye shall be beaten: and ye shall be brought before rulers and kings for my sake, for a testimony against them.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And the gospel must first be published among all nations.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But when they shall lead '
    - type: usfm
      marker: add
      children:
      - type: text
        text: you
    - type: text
      text: ', and deliver you up, take no thought beforehand what ye shall speak, neither do ye premeditate: but whatsoever shall be given you in that hour, that speak ye: for it is not ye that speak, but the Holy Ghost.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Now the brother shall betray the brother to death, and the father the son; and children shall rise up against '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their
    - type: text
      text: ' parents, and shall cause them to be put to death.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And ye shall be hated of all '
    - type: usfm
      marker: add
      children:
      - type: text
        text: men
    - type: text
      text: ' for my name''s sake: but he that shall endure unto the end, the same shall be saved.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But when ye shall see the abomination of desolation, spoken of by Daniel the prophet, standing where it ought not, (let him that readeth understand,) then let them that be in Judæa flee to the mountains:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and let him that is on the housetop not go down into the house, neither enter '
    - type: usfm
      marker: add
      children:
      - type: text
        text: therein
    - type: text
      text: ', to take any thing out of his house:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and let him that is in the field not turn back again for to take up his garment.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But woe to them that are with child, and to them that give suck in those days!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And pray ye that your flight be not in the winter.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' those days shall be affliction, such as was not from the beginning of the creation which God created unto this time, neither shall be.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And except that the Lord had shortened those days, no flesh should be saved: but for the elect''s sake, whom he hath chosen, he hath shortened the days.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And then if any man shall say to you, Lo, here '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' Christ; or, lo, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: he is
    - type: text
      text: ' there; believe '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him
    - type: text
      text: ' not:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'for false Christs and false prophets shall rise, and shall shew signs and wonders, to seduce, if '
    - type: usfm
      marker: add
      children:
      - type: text
        text: it were
    - type: text
      text: ' possible, even the elect.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But take ye heed: behold, I have foretold you all things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But in those days, after that tribulation, the sun shall be darkened, and the moon shall not give her light,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and the stars of heaven shall fall, and the powers that are in heaven shall be shaken.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And then shall they see the Son of man coming in the clouds with great power and glory.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And then shall he send his angels, and shall gather together his elect from the four winds, from the uttermost part of the earth to the uttermost part of heaven.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Now learn a parable of the fig tree; When her branch is yet tender, and putteth forth leaves, ye know that summer is near:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'so ye in like manner, when ye shall see these things come to pass, know that it is nigh, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' at the doors.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Verily I say unto you, that this generation shall not pass, till all these things be done.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Heaven and earth shall pass away: but my words shall not pass away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But of that day and '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that
    - type: text
      text: ' hour knoweth no man, no, not the angels which are in heaven, neither the Son, but the Father.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Take ye heed, watch and pray: for ye know not when the time is.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: For the Son of man is
    - type: text
      text: ' as a man taking a far journey, who left his house, and gave authority to his servants, and to every man his work, and commanded the porter to watch.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Watch ye therefore: for ye know not when the master of the house cometh, at even, or at midnight, or at the cockcrowing, or in the morning:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: lest coming suddenly he find you sleeping.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And what I say unto you I say unto all, Watch.
