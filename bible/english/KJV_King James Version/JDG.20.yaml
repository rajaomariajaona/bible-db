document_id: JDG.20,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all the children of Israel went out, and the congregation was gathered together as one man, from Dan even to Beer-sheba, with the land of Gilead, unto the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' in Mizpeh. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and we will take ten men of an hundred throughout all the tribes of Israel, and an hundred of a thousand, and a thousand out of ten thousand, to fetch victual for the people, that they may do, when they come to Gibeah of Benjamin, according to all the folly that they have wrought in Israel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So all the men of Israel were gathered against the city, knit together as one man.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the tribes of Israel sent men through all the tribe of Benjamin, saying, What wickedness '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' this that is done among you? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore deliver '
    - type: usfm
      marker: add
      children:
      - type: text
        text: us
    - type: text
      text: ' the men, the children of Belial, which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' in Gibeah, that we may put them to death, and put away evil from Israel. But the children of Benjamin would not hearken to the voice of their brethren the children of Israel: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but the children of Benjamin gathered themselves together out of the cities unto Gibeah, to go out to battle against the children of Israel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Benjamin were numbered at that time out of the cities twenty and six thousand men that drew sword, beside the inhabitants of Gibeah, which were numbered seven hundred chosen men. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Among all this people '
    - type: usfm
      marker: add
      children:
      - type: text
        text: there were
    - type: text
      text: ' seven hundred chosen men lefthanded; every one could sling stones at an hair '
    - type: usfm
      marker: add
      children:
      - type: text
        text: breadth
    - type: text
      text: ', and not miss.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the men of Israel, beside Benjamin, were numbered four hundred thousand men that drew sword: all these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' men of war. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Israel arose, and went up to the house of God, and asked counsel of God, and said, Which of us shall go up first to the battle against the children of Benjamin? And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said, Judah '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall go up
    - type: text
      text: ' first.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Israel rose up in the morning, and encamped against Gibeah. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the chief of all the people, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' of all the tribes of Israel, presented themselves in the assembly of the people of God, four hundred thousand footmen that drew sword. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the men of Israel went out to battle against Benjamin; and the men of Israel put themselves in array to fight against them at Gibeah. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Benjamin came forth out of Gibeah, and destroyed down to the ground of the Israelites that day twenty and two thousand men. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people the men of Israel encouraged themselves, and set their battle again in array in the place where they put themselves in array the first day. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(And the children of Israel went up and wept before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' until even, and asked counsel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', saying, Shall I go up again to battle against the children of Benjamin my brother? And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said, Go up against him.)'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Israel came near against the children of Benjamin the second day. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Benjamin went forth against them out of Gibeah the second day, and destroyed down to the ground of the children of Israel again eighteen thousand men; all these drew the sword. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all the children of Israel, and all the people, went up, and came unto the house of God, and wept, and sat there before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', and fasted that day until even, and offered burnt offerings and peace offerings before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Israel enquired of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ', (for the ark of the covenant of God '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' there in those days, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Phinehas, the son of Eleazar, the son of Aaron, stood before it in those days,) saying, Shall I yet again go out to battle against the children of Benjamin my brother, or shall I cease? And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said, Go up; for to morrow I will deliver them into thine hand.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Israel set liers in wait round about Gibeah. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(Now the children of Benjamin heard that the children of Israel were gone up to Mizpeh.) Then said the children of Israel, Tell '
    - type: usfm
      marker: add
      children:
      - type: text
        text: us
    - type: text
      text: ', how was this wickedness? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Israel went up against the children of Benjamin on the third day, and put themselves in array against Gibeah, as at other times. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Benjamin went out against the people, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' were drawn away from the city; and they began to smite of the people, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' kill, as at other times, in the highways, of which one goeth up to the house of God, and the other to Gibeah in the field, about thirty men of Israel. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the children of Benjamin said, They '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' smitten down before us, as at the first. But the children of Israel said, Let us flee, and draw them from the city unto the highways. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the men of Israel rose up out of their place, and put themselves in array at Baal-tamar: and the liers in wait of Israel came forth out of their places, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: even
    - type: text
      text: ' out of the meadows of Gibeah. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there came against Gibeah ten thousand chosen men out of all Israel, and the battle was sore: but they knew not that evil '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' near them. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' smote Benjamin before Israel: and the children of Israel destroyed of the Benjamites that day twenty and five thousand and an hundred men: all these drew the sword.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the children of Benjamin saw that they were smitten: for the men of Israel gave place to the Benjamites, because they trusted unto the liers in wait which they had set beside Gibeah. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the liers in wait hasted, and rushed upon Gibeah; and the liers in wait drew '
    - type: usfm
      marker: add
      children:
      - type: text
        text: themselves
    - type: text
      text: ' along, and smote all the city with the edge of the sword. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now there was an appointed sign between the men of Israel and the liers in wait, that they should make a great flame with smoke rise up out of the city. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the men of Israel retired in the battle, Benjamin began to smite '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' kill of the men of Israel about thirty persons: for they said, Surely they are smitten down before us, as '
    - type: usfm
      marker: add
      children:
      - type: text
        text: in
    - type: text
      text: ' the first battle. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the Levite, the husband of the woman that was slain, answered and said, I came into Gibeah that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: belongeth
    - type: text
      text: ' to Benjamin, I and my concubine, to lodge. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when the flame began to arise up out of the city with a pillar of smoke, the Benjamites looked behind them, and, behold, the flame of the city ascended up to heaven. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the men of Israel turned again, the men of Benjamin were amazed: for they saw that evil was come upon them. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore they turned '
    - type: usfm
      marker: add
      children:
      - type: text
        text: their backs
    - type: text
      text: ' before the men of Israel unto the way of the wilderness; but the battle overtook them; and them which '
    - type: usfm
      marker: add
      children:
      - type: text
        text: came
    - type: text
      text: ' out of the cities they destroyed in the midst of them. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: Thus
    - type: text
      text: ' they inclosed the Benjamites round about, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' chased them, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' trode them down with ease over against Gibeah toward the sunrising. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there fell of Benjamin eighteen thousand men; all these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' men of valour. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they turned and fled toward the wilderness unto the rock of Rimmon: and they gleaned of them in the highways five thousand men; and pursued hard after them unto Gidom, and slew two thousand men of them. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So that all which fell that day of Benjamin were twenty and five thousand men that drew the sword; all these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' men of valour. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But six hundred men turned and fled to the wilderness unto the rock Rimmon, and abode in the rock Rimmon four months. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the men of Israel turned again upon the children of Benjamin, and smote them with the edge of the sword, as well the men of '
    - type: usfm
      marker: add
      children:
      - type: text
        text: every
    - type: text
      text: ' city, as the beast, and all that came to hand: also they set on fire all the cities that they came to.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the men of Gibeah rose against me, and beset the house round about upon me by night, '
    - type: usfm
      marker: add
      children:
      - type: text
        text: and
    - type: text
      text: ' thought to have slain me: and my concubine have they forced, that she is dead. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I took my concubine, and cut her in pieces, and sent her throughout all the country of the inheritance of Israel: for they have committed lewdness and folly in Israel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, ye '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' all children of Israel; give here your advice and counsel.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the people arose as one man, saying, We will not any '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of us
    - type: text
      text: ' go to his tent, neither will we any '
    - type: usfm
      marker: add
      children:
      - type: text
        text: of us
    - type: text
      text: ' turn into his house. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But now this '
    - type: usfm
      marker: add
      children:
      - type: text
        text: shall be
    - type: text
      text: ' the thing which we will do to Gibeah; '
    - type: usfm
      marker: add
      children:
      - type: text
        text: we will go up
    - type: text
      text: ' by lot against it; '
