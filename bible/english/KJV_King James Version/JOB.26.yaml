document_id: JOB.26,1
type_code: eng
verses:
  '1':
  - type: heading
    content: Job's Reply
  - type: text
    content: But Job answered and said,
  '10':
  - type: text
    content: He hath compassed the waters with bounds,
  - type: text
    content: Until the day and night come to an end.
  '11':
  - type: text
    content: The pillars of heaven tremble
  - type: text
    content: And are astonished at his reproof.
  '12':
  - type: text
    content: He divideth the sea with his power,
  - type: text
    content: And by his understanding he smiteth through the proud.
  '13':
  - type: text
    content: By his spirit he hath garnished the heavens;
  - type: text
    content: His hand hath formed the crooked serpent.
  '14':
  - type: text
    content: 'Lo, these '
  - type: text
    content: are
  - type: text
    content: ' parts of his ways:'
  - type: text
    content: But how little a portion is heard of him?
  - type: text
    content: But the thunder of his power who can understand?
  '2':
  - type: text
    content: 'How hast thou helped '
  - type: text
    content: him that is
  - type: text
    content: ' without power?'
  - type: text
    content: How
  - type: text
    content: ' savest thou the arm '
  - type: text
    content: that hath
  - type: text
    content: ' no strength?'
  '3':
  - type: text
    content: 'How hast thou counselled '
  - type: text
    content: him that hath
  - type: text
    content: ' no wisdom?'
  - type: text
    content: 'And '
  - type: text
    content: how
  - type: text
    content: ' hast thou plentifully declared the thing as it is?'
  '4':
  - type: text
    content: To whom hast thou uttered words?
  - type: text
    content: And whose spirit came from thee?
  '5':
  - type: text
    content: 'Dead '
  - type: text
    content: things
  - type: text
    content: ' are formed'
  - type: text
    content: From under the waters, and the inhabitants thereof.
  '6':
  - type: text
    content: 'Hell '
  - type: text
    content: is
  - type: text
    content: ' naked before him,'
  - type: text
    content: And destruction hath no covering.
  '7':
  - type: text
    content: He stretcheth out the north over the empty place,
  - type: text
    content: And
  - type: text
    content: ' hangeth the earth upon nothing.'
  '8':
  - type: text
    content: He bindeth up the waters in his thick clouds;
  - type: text
    content: And the cloud is not rent under them.
  '9':
  - type: text
    content: He holdeth back the face of his throne,
  - type: text
    content: And
  - type: text
    content: ' spreadeth his cloud upon it.'
