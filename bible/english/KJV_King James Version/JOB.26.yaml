document_id: JOB.26,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Job's Reply
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Job answered and said,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He hath compassed the waters with bounds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Until the day and night come to an end.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The pillars of heaven tremble
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And are astonished at his reproof.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He divideth the sea with his power,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And by his understanding he smiteth through the proud.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By his spirit he hath garnished the heavens;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His hand hath formed the crooked serpent.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lo, these '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' parts of his ways:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But how little a portion is heard of him?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the thunder of his power who can understand?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'How hast thou helped '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him that is
    - type: text
      text: ' without power?'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: How
    - type: text
      text: ' savest thou the arm '
    - type: usfm
      marker: add
      children:
      - type: text
        text: that hath
    - type: text
      text: ' no strength?'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'How hast thou counselled '
    - type: usfm
      marker: add
      children:
      - type: text
        text: him that hath
    - type: text
      text: ' no wisdom?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: add
      children:
      - type: text
        text: how
    - type: text
      text: ' hast thou plentifully declared the thing as it is?'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To whom hast thou uttered words?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And whose spirit came from thee?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dead '
    - type: usfm
      marker: add
      children:
      - type: text
        text: things
    - type: text
      text: ' are formed'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: From under the waters, and the inhabitants thereof.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hell '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' naked before him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And destruction hath no covering.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He stretcheth out the north over the empty place,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' hangeth the earth upon nothing.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He bindeth up the waters in his thick clouds;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the cloud is not rent under them.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He holdeth back the face of his throne,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: add
      children:
      - type: text
        text: And
    - type: text
      text: ' spreadeth his cloud upon it.'
