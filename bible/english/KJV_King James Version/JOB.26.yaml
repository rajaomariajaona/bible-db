document_id: JOB.26
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Job's Reply
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: But Job answered and said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'How hast thou helped '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him that is
  - type: text
    text: ' without power?'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: How
  - type: text
    text: ' savest thou the arm '
  - type: usfm
    marker: add
    children:
    - type: text
      text: that hath
  - type: text
    text: ' no strength?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'How hast thou counselled '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him that hath
  - type: text
    text: ' no wisdom?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: add
    children:
    - type: text
      text: how
  - type: text
    text: ' hast thou plentifully declared the thing as it is?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: To whom hast thou uttered words?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And whose spirit came from thee?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dead '
  - type: usfm
    marker: add
    children:
    - type: text
      text: things
  - type: text
    text: ' are formed'
- type: usfm
  marker: q2
  children:
  - type: text
    text: From under the waters, and the inhabitants thereof.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hell '
  - type: usfm
    marker: add
    children:
    - type: text
      text: is
  - type: text
    text: ' naked before him,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And destruction hath no covering.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He stretcheth out the north over the empty place,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' hangeth the earth upon nothing.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He bindeth up the waters in his thick clouds;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the cloud is not rent under them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He holdeth back the face of his throne,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: add
    children:
    - type: text
      text: And
  - type: text
    text: ' spreadeth his cloud upon it.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He hath compassed the waters with bounds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Until the day and night come to an end.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The pillars of heaven tremble
- type: usfm
  marker: q2
  children:
  - type: text
    text: And are astonished at his reproof.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He divideth the sea with his power,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And by his understanding he smiteth through the proud.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: By his spirit he hath garnished the heavens;
- type: usfm
  marker: q2
  children:
  - type: text
    text: His hand hath formed the crooked serpent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lo, these '
  - type: usfm
    marker: add
    children:
    - type: text
      text: are
  - type: text
    text: ' parts of his ways:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But how little a portion is heard of him?
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the thunder of his power who can understand?
