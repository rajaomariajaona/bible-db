type_code: eng
verses:
  '1':
  - type: text
    content: 'And the '
  - type: text
    content: LORD
  - type: text
    content: ' said unto Noah, Come thou and all thy house into the ark; for thee have I seen righteous before me in this generation. '
  '10':
  - type: text
    content: And it came to pass after seven days, that the waters of the flood were upon the earth.
  - type: heading
    content: The Great Flood
  '11':
  - type: text
    content: 'In the six hundredth year of Noah''s life, in the second month, the seventeenth day of the month, the same day were all the fountains of the great deep broken up, and the windows of heaven were opened. '
  '12':
  - type: text
    content: 'And the rain was upon the earth forty days and forty nights. '
  '13':
  - type: text
    content: 'In the selfsame day entered Noah, and Shem, and Ham, and Japheth, the sons of Noah, and Noah''s wife, and the three wives of his sons with them, into the ark; '
  '14':
  - type: text
    content: 'they, and every beast after his kind, and all the cattle after their kind, and every creeping thing that creepeth upon the earth after his kind, and every fowl after his kind, every bird of every sort. '
  '15':
  - type: text
    content: 'And they went in unto Noah into the ark, two and two of all flesh, wherein '
  - type: text
    content: is
  - type: text
    content: ' the breath of life. '
  '16':
  - type: text
    content: 'And they that went in, went in male and female of all flesh, as God had commanded him: and the '
  - type: text
    content: LORD
  - type: text
    content: ' shut him in. '
  '17':
  - type: text
    content: 'And the flood was forty days upon the earth; and the waters increased, and bare up the ark, and it was lift up above the earth. '
  '18':
  - type: text
    content: 'And the waters prevailed, and were increased greatly upon the earth; and the ark went upon the face of the waters. '
  '19':
  - type: text
    content: 'And the waters prevailed exceedingly upon the earth; and all the high hills, that '
  - type: text
    content: were
  - type: text
    content: ' under the whole heaven, were covered. '
  '2':
  - type: text
    content: 'Of every clean beast thou shalt take to thee by sevens, the male and his female: and of beasts that '
  - type: text
    content: are
  - type: text
    content: ' not clean by two, the male and his female. '
  '20':
  - type: text
    content: 'Fifteen cubits upward did the waters prevail; and the mountains were covered. '
  '21':
  - type: text
    content: 'And all flesh died that moved upon the earth, both of fowl, and of cattle, and of beast, and of every creeping thing that creepeth upon the earth, and every man: '
  '22':
  - type: text
    content: 'all in whose nostrils '
  - type: text
    content: was
  - type: text
    content: ' the breath of life, of all that '
  - type: text
    content: was
  - type: text
    content: ' in the dry '
  - type: text
    content: land
  - type: text
    content: ', died. '
  '23':
  - type: text
    content: 'And every living substance was destroyed which was upon the face of the ground, both man, and cattle, and the creeping things, and the fowl of the heaven; and they were destroyed from the earth: and Noah only remained '
  - type: text
    content: alive
  - type: text
    content: ', and they that '
  - type: text
    content: were
  - type: text
    content: ' with him in the ark. '
  '24':
  - type: text
    content: And the waters prevailed upon the earth an hundred and fifty days.
  '3':
  - type: text
    content: 'Of fowls also of the air by sevens, the male and the female; to keep seed alive upon the face of all the earth. '
  '4':
  - type: text
    content: 'For yet seven days, and I will cause it to rain upon the earth forty days and forty nights; and every living substance that I have made will I destroy from off the face of the earth. '
  '5':
  - type: text
    content: 'And Noah did according unto all that the '
  - type: text
    content: LORD
  - type: text
    content: ' commanded him. '
  '6':
  - type: text
    content: 'And Noah '
  - type: text
    content: was
  - type: text
    content: ' six hundred years old when the flood of waters was upon the earth.'
  '7':
  - type: text
    content: 'And Noah went in, and his sons, and his wife, and his sons'' wives with him, into the ark, because of the waters of the flood. '
  '8':
  - type: text
    content: 'Of clean beasts, and of beasts that '
  - type: text
    content: are
  - type: text
    content: ' not clean, and of fowls, and of every thing that creepeth upon the earth, '
  '9':
  - type: text
    content: 'there went in two and two unto Noah into the ark, the male and the female, as God had commanded Noah. '
