document_id: GEN.7,1
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' said unto Noah, Come thou and all thy house into the ark; for thee have I seen righteous before me in this generation. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And it came to pass after seven days, that the waters of the flood were upon the earth.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Great Flood
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the six hundredth year of Noah''s life, in the second month, the seventeenth day of the month, the same day were all the fountains of the great deep broken up, and the windows of heaven were opened. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the rain was upon the earth forty days and forty nights. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the selfsame day entered Noah, and Shem, and Ham, and Japheth, the sons of Noah, and Noah''s wife, and the three wives of his sons with them, into the ark; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'they, and every beast after his kind, and all the cattle after their kind, and every creeping thing that creepeth upon the earth after his kind, and every fowl after his kind, every bird of every sort. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they went in unto Noah into the ark, two and two of all flesh, wherein '
    - type: usfm
      marker: add
      children:
      - type: text
        text: is
    - type: text
      text: ' the breath of life. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they that went in, went in male and female of all flesh, as God had commanded him: and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' shut him in. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the flood was forty days upon the earth; and the waters increased, and bare up the ark, and it was lift up above the earth. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the waters prevailed, and were increased greatly upon the earth; and the ark went upon the face of the waters. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the waters prevailed exceedingly upon the earth; and all the high hills, that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' under the whole heaven, were covered. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of every clean beast thou shalt take to thee by sevens, the male and his female: and of beasts that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' not clean by two, the male and his female. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fifteen cubits upward did the waters prevail; and the mountains were covered. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all flesh died that moved upon the earth, both of fowl, and of cattle, and of beast, and of every creeping thing that creepeth upon the earth, and every man: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'all in whose nostrils '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' the breath of life, of all that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' in the dry '
    - type: usfm
      marker: add
      children:
      - type: text
        text: land
    - type: text
      text: ', died. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And every living substance was destroyed which was upon the face of the ground, both man, and cattle, and the creeping things, and the fowl of the heaven; and they were destroyed from the earth: and Noah only remained '
    - type: usfm
      marker: add
      children:
      - type: text
        text: alive
    - type: text
      text: ', and they that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: were
    - type: text
      text: ' with him in the ark. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the waters prevailed upon the earth an hundred and fifty days.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of fowls also of the air by sevens, the male and the female; to keep seed alive upon the face of all the earth. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For yet seven days, and I will cause it to rain upon the earth forty days and forty nights; and every living substance that I have made will I destroy from off the face of the earth. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Noah did according unto all that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: LORD
    - type: text
      text: ' commanded him. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Noah '
    - type: usfm
      marker: add
      children:
      - type: text
        text: was
    - type: text
      text: ' six hundred years old when the flood of waters was upon the earth.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Noah went in, and his sons, and his wife, and his sons'' wives with him, into the ark, because of the waters of the flood. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of clean beasts, and of beasts that '
    - type: usfm
      marker: add
      children:
      - type: text
        text: are
    - type: text
      text: ' not clean, and of fowls, and of every thing that creepeth upon the earth, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'there went in two and two unto Noah into the ark, the male and the female, as God had commanded Noah. '
