document_id: MAT.14,1
type_code: eng
verses:
  '1':
  - type: heading
    content: From Place to Place
  - type: text
    content: 'At that time Herod the tetrarch heard of the fame of Jesus, '
  '10':
  - type: text
    content: 'And he sent, and beheaded John in the prison. '
  '11':
  - type: text
    content: 'And his head was brought in a charger, and given to the damsel: and she brought '
  - type: text
    content: it
  - type: text
    content: ' to her mother. '
  '12':
  - type: text
    content: And his disciples came, and took up the body, and buried it, and went and told Jesus.
  - type: heading
    content: Into a Desert Place
  '13':
  - type: text
    content: 'When Jesus heard '
  - type: text
    content: of it
  - type: text
    content: ', he departed thence by ship into a desert place apart: and when the people had heard '
  - type: text
    content: thereof
  - type: text
    content: ', they followed him on foot out of the cities. '
  '14':
  - type: text
    content: And Jesus went forth, and saw a great multitude, and was moved with compassion toward them, and he healed their sick.
  - type: heading
    content: Feeding Five Thousand
  '15':
  - type: text
    content: 'And when it was evening, his disciples came to him, saying, This is a desert place, and the time is now past; send the multitude away, that they may go into the villages, and buy themselves victuals. '
  '16':
  - type: text
    content: 'But Jesus said unto them, '
  - type: text
    content: They need not depart; give ye them to eat.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'And they say unto him, We have here but five loaves, and two fishes. '
  '18':
  - type: text
    content: 'He said, '
  - type: text
    content: Bring them hither to me.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'And he commanded the multitude to sit down on the grass, and took the five loaves, and the two fishes, and looking up to heaven, he blessed, and brake, and gave the loaves to '
  - type: text
    content: his
  - type: text
    content: ' disciples, and the disciples to the multitude. '
  '2':
  - type: text
    content: and said unto his servants, This is John the Baptist; he is risen from the dead; and therefore mighty works do shew forth themselves in him.
  '20':
  - type: text
    content: 'And they did all eat, and were filled: and they took up of the fragments that remained twelve baskets full. '
  '21':
  - type: text
    content: And they that had eaten were about five thousand men, beside women and children.
  - type: heading
    content: Walking on the Sea
  '22':
  - type: text
    content: 'And straightway Jesus constrained his disciples to get into a ship, and to go before him unto the other side, while he sent the multitudes away. '
  '23':
  - type: text
    content: 'And when he had sent the multitudes away, he went up into a mountain apart to pray: and when the evening was come, he was there alone. '
  '24':
  - type: text
    content: 'But the ship was now in the midst of the sea, tossed with waves: for the wind was contrary. '
  '25':
  - type: text
    content: 'And in the fourth watch of the night Jesus went unto them, walking on the sea. '
  '26':
  - type: text
    content: 'And when the disciples saw him walking on the sea, they were troubled, saying, It is a spirit; and they cried out for fear. '
  '27':
  - type: text
    content: 'But straightway Jesus spake unto them, saying, '
  - type: text
    content: Be of good cheer; it is I; be not afraid.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'And Peter answered him and said, Lord, if it be thou, bid me come unto thee on the water. '
  '29':
  - type: text
    content: 'And he said, '
  - type: text
    content: Come.
  - type: text
    content: ' And when Peter was come down out of the ship, he walked on the water, to go to Jesus. '
  '3':
  - type: text
    content: 'For Herod had laid hold on John, and bound him, and put '
  - type: text
    content: him
  - type: text
    content: ' in prison for Herodias'' sake, his brother Philip''s wife. '
  '30':
  - type: text
    content: 'But when he saw the wind boisterous, he was afraid; and beginning to sink, he cried, saying, Lord, save me. '
  '31':
  - type: text
    content: 'And immediately Jesus stretched forth '
  - type: text
    content: his
  - type: text
    content: ' hand, and caught him, and said unto him, '
  - type: text
    content: O thou of little faith, wherefore didst thou doubt?
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'And when they were come into the ship, the wind ceased. '
  '33':
  - type: text
    content: Then they that were in the ship came and worshipped him, saying, Of a truth thou art the Son of God.
  - type: heading
    content: At Gennesaret
  '34':
  - type: text
    content: 'And when they were gone over, they came into the land of Gennesaret. '
  '35':
  - type: text
    content: 'And when the men of that place had knowledge of him, they sent out into all that country round about, and brought unto him all that were diseased; '
  '36':
  - type: text
    content: 'and besought him that they might only touch the hem of his garment: and as many as touched were made perfectly whole.'
  '4':
  - type: text
    content: 'For John said unto him, It is not lawful for thee to have her. '
  '5':
  - type: text
    content: 'And when he would have put him to death, he feared the multitude, because they counted him as a prophet. '
  '6':
  - type: text
    content: 'But when Herod''s birthday was kept, the daughter of Herodias danced before them, and pleased Herod. '
  '7':
  - type: text
    content: 'Whereupon he promised with an oath to give her whatsoever she would ask. '
  '8':
  - type: text
    content: 'And she, being before instructed of her mother, said, Give me here John Baptist''s head in a charger. '
  '9':
  - type: text
    content: 'And the king was sorry: nevertheless for the oath''s sake, and them which sat with him at meat, he commanded '
  - type: text
    content: it
  - type: text
    content: ' to be given '
  - type: text
    content: her
  - type: text
    content: '. '
