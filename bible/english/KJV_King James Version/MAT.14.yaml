document_id: MAT.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: From Place to Place
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'At that time Herod the tetrarch heard of the fame of Jesus, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: and said unto his servants, This is John the Baptist; he is risen from the dead; and therefore mighty works do shew forth themselves in him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For Herod had laid hold on John, and bound him, and put '
  - type: usfm
    marker: add
    children:
    - type: text
      text: him
  - type: text
    text: ' in prison for Herodias'' sake, his brother Philip''s wife. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For John said unto him, It is not lawful for thee to have her. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And when he would have put him to death, he feared the multitude, because they counted him as a prophet. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But when Herod''s birthday was kept, the daughter of Herodias danced before them, and pleased Herod. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Whereupon he promised with an oath to give her whatsoever she would ask. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And she, being before instructed of her mother, said, Give me here John Baptist''s head in a charger. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the king was sorry: nevertheless for the oath''s sake, and them which sat with him at meat, he commanded '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to be given '
  - type: usfm
    marker: add
    children:
    - type: text
      text: her
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And he sent, and beheaded John in the prison. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And his head was brought in a charger, and given to the damsel: and she brought '
  - type: usfm
    marker: add
    children:
    - type: text
      text: it
  - type: text
    text: ' to her mother. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And his disciples came, and took up the body, and buried it, and went and told Jesus.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Into a Desert Place
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When Jesus heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: of it
  - type: text
    text: ', he departed thence by ship into a desert place apart: and when the people had heard '
  - type: usfm
    marker: add
    children:
    - type: text
      text: thereof
  - type: text
    text: ', they followed him on foot out of the cities. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And Jesus went forth, and saw a great multitude, and was moved with compassion toward them, and he healed their sick.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Feeding Five Thousand
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And when it was evening, his disciples came to him, saying, This is a desert place, and the time is now past; send the multitude away, that they may go into the villages, and buy themselves victuals. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But Jesus said unto them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: They need not depart; give ye them to eat.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And they say unto him, We have here but five loaves, and two fishes. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'He said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Bring them hither to me.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And he commanded the multitude to sit down on the grass, and took the five loaves, and the two fishes, and looking up to heaven, he blessed, and brake, and gave the loaves to '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' disciples, and the disciples to the multitude. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And they did all eat, and were filled: and they took up of the fragments that remained twelve baskets full. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: And they that had eaten were about five thousand men, beside women and children.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Walking on the Sea
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And straightway Jesus constrained his disciples to get into a ship, and to go before him unto the other side, while he sent the multitudes away. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And when he had sent the multitudes away, he went up into a mountain apart to pray: and when the evening was come, he was there alone. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'But the ship was now in the midst of the sea, tossed with waves: for the wind was contrary. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And in the fourth watch of the night Jesus went unto them, walking on the sea. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And when the disciples saw him walking on the sea, they were troubled, saying, It is a spirit; and they cried out for fear. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'But straightway Jesus spake unto them, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Be of good cheer; it is I; be not afraid.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And Peter answered him and said, Lord, if it be thou, bid me come unto thee on the water. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Come.
  - type: text
    text: ' And when Peter was come down out of the ship, he walked on the water, to go to Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'But when he saw the wind boisterous, he was afraid; and beginning to sink, he cried, saying, Lord, save me. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And immediately Jesus stretched forth '
  - type: usfm
    marker: add
    children:
    - type: text
      text: his
  - type: text
    text: ' hand, and caught him, and said unto him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: O thou of little faith, wherefore didst thou doubt?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And when they were come into the ship, the wind ceased. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Then they that were in the ship came and worshipped him, saying, Of a truth thou art the Son of God.
- type: usfm
  marker: s2
  children:
  - type: text
    text: At Gennesaret
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And when they were gone over, they came into the land of Gennesaret. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And when the men of that place had knowledge of him, they sent out into all that country round about, and brought unto him all that were diseased; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'and besought him that they might only touch the hem of his garment: and as many as touched were made perfectly whole.'
